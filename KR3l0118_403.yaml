body:
  text: 馬腦馬腦帝顓頊時丹丘之國獻馬腦甕以盛甘露帝德所被殊方入貢以露充于廚也馬腦石類也南方者為上令善別者馬死則扣其腦而視其色如血者則日行萬里能騰飛空虛腦色黃者日行千里腦色青者嘶聞數百里外腦色黑者入水毛鬣不濡日行五百里腦色白者多力而駑今為器多用赤色者若是人功所制者多不成器成器亦拙其國人聽馬鳴別其腦色犀犀牛大約似牛而豬頭腳似象蹄有三甲首有二角一在額上為兕犀一在鼻上校小為胡帽犀鼻上者皆窘束而花點少多有奇文牯犀亦有二角皆為毛犀俱粟文堪為腰帶千百犀中或偶有通者花點大小奇異固無常定有偏花路者有項花大而根花小者謂之倒插通此二種亦五色無常矣若通白黑分明花點奇異則價計巨萬乃希世之寶也又有墮羅犀犀中最大一株有重七八斤者云是牯牛額上者必花多是撒頭豆點色深者堪為銙散而淺即拍為盤碟器皿之類又有駭雞犀辟塵犀辟水犀明犀此數犀但聞其説即不可得而見也月鏡周靈王起處昆昭之台有侍臣萇弘巧智如流因而得侍長夜宴樂或俳諧舞笑有殊俗之伎百戲駢列鐘石并奏亦獻異方珍寶有如玉之人如龍之錦亦有如鏡之石如石之鏡此石色白如月照面如雪謂之月鏡玉人皆有機類自能轉動謂之機妍萇弘言于王曰聖德所招也故周人以弘媚諂而卒殺之流血成石或言成璧不見其尸矣秦寶漢高祖初入咸陽宮周行府庫金玉珍寶不可稱言其所驚異者有玉五支燈高七尺五寸下作蟠螭以口銜燈燈燃則鱗甲皆動煥炳若列星而盈室焉復鑄銅人十二枚皆高三尺列在一筵上琴築笙竽各有所執皆結華彩若生人筵下有二銅管上口高數尺出筵后其一管空一管內有繩大如指使一人吹空管一人紐繩則琴築笙竽皆作與真樂不異焉玉琴長六尺上安十三弦二十六徽皆用七寶飾之銘曰璵璠之樂玉笛長二尺三寸六孔吹之則見車馬山林隱嶙相次吹息則不復見銘曰昭華之管有方鏡廣四尺高五尺九寸表里洞明人直來照之影則倒見以手掩心而來即見腸胃五髒歷歷無疑人有疾病在內者則掩心而照之必知病之所在又女子有邪心則膽張心動秦始皇帝常以照宮人膽張心動則殺之也高祖悉封閉以待項羽羽并將以東后不知所在珊瑚漢宮積草池中有珊瑚高一丈二尺一本三柯上有四百六十三條是南越王趙他所獻號曰烽火樹夜有光常欲然又郁林郡有珊瑚市海客市珊瑚處也珊瑚碧色一株株數十枝枝間無葉大者高五六尺尤小者尺余蛟人云海上有珊瑚宮漢元封二年郁林郡獻珊瑚婦人帝命植于殿前謂之女珊瑚忽柯葉甚茂至靈帝時樹死咸以為漢室將衰之征也又柫籃國海去都城二千里有飛橋渡海而西至且蘭國自且蘭有積石積石南有大海海中珊瑚生于水底大船載鐵网下海中初生之時漸漸似菌經一年挺出网目間變作黃色支格交錯小者三尺大者丈余三年色青以鐵鈔發其根于舶上為絞車舉鐵网而出之故名其所為珊瑚洲久而不采卻蠹爛糜朽四寶宮武帝為七寶床雜寶按屏風雜寶帳設于桂宮時人謂之四寶宮延清室董偃常臥延清之室以畫石為床蓋石文如畫也石體盛輕出郅支國上設紫琉璃帳火齊屏風列靈麻之燭以紫玉為盤如屈龍皆雜寶飾之視者于戶外扇偃偃曰玉石豈須扇而后清涼耶侍者屏扇以手摹之方知有屏風也偃又以玉精為盤貯冰于膝前玉精與冰同潔徹侍者言以冰無盤必融濕席乃和玉盤拂之落階下冰玉俱碎偃更以為樂此玉精千塗國所貢也武帝以此賜偃哀平之世民皆猶有此器而多殘破王莽之世不復知所在玉如意吳孫權時有掘得銅匣長二尺七寸以琉璃為蓋又一白玉如意所執處皆刻龍虎及蟬形莫能識其由使人問綜綜博物者也曰昔秦皇以金陵有天子氣平諸山阜處處埋寶以當王氣此蓋是乎七寶鞭晉明帝單騎潛入窺王敦營敦覺使騎追之帝奔仍以七寶鞭顧逆旅嫗扇馬屎王敦追之人見馬屎以為帝去已遠仍寶鞭不復前追犀導晉東海蔣潛嘗至不其縣見林下踣一尸已臭爛烏來食之輒見一小兒長三尺許來驅烏烏乃起如此非一潛異之乃就看之見死人頭上著通天犀導價數萬錢乃拔取之既去衆烏爭集無復驅者潛后以此導上晉武陵王王薨以襯衆僧王武剛以九萬錢買之后落褚太宰處褚以餉齊故丞相豫章王王死后內人江夫人遂斷以為叉每夜輒見一兒繞床頭啼叫云何為見屠割必當相報終不獨受枉酷江夫人惡之月余遂薨玉清三寶杜陵韋弇字景昭開元中舉進士第寓遊于蜀蜀多勝地會春末弇與其友數輩為花酒宴雖夜不殆一日有請者曰郡南去十里有鄭氏亭亭起苑中真塵外境也願偕去弇聞其説喜甚遂與俱南出十里得鄭氏亭端空危危橫然四峙門用花辟砌用煙矗弇望之不暇他視真所謂塵外境也使者揖弇入既入見亭上有神仙十數皆極色也凝立若佇半掉云袂飄飄然其侍列左右者亦十數紋繡杳眇殆不可識有一人望弇而語曰韋進士來命左右請上亭斜欄層去既上且拜群仙喜曰君不聞劉阮事乎今日亦如是願奉一醉將盡春色君以為何如弇謝曰不意今日得為劉阮幸何甚哉然則次為何所女郎又何為者願一聞知群仙曰我玉清之女也居于此久矣此乃玉清宮也向聞君為下第進士寓遊至此將以一言奉請又懼君子不顧且貽其辱是以假鄭氏之亭以命君果副吾志雖然此仙府也雖云不可滯世間人君居之固無損耳幸不以為疑即命酒樂宴亭中絲竹盡舉飄然泠然凌玄越冥不為人間聲曲酒既酣群仙曰吾聞唐天子尚神仙吾有新樂一曲曰紫云願授聖主君唐人也為吾傳之一進可乎曰弇一儒也在長安中徒為區區于塵土間望天子門且不可見之又非知音者曷能致是群仙曰君既不能吾將以夢傳于天子可也又曰吾有三寶將以贈君能使君富敵王侯君其受之乃命左右取其寶始出一杯其色碧而光瑩洞徹顧謂弇曰碧瑤杯也又出一枕似玉微紅曰紅蕤枕也又出一小函其色紫亦似玉而瑩徹則過之曰紫玉函也已而皆授弇弇拜謝別去行未及一里回望其亭茫然無有弇異之亦竟不知何所也遂挈其寶還長安明年下第東遊至廣陵因以其寶集于廣陵市有胡人見而拜曰此天下之奇寶也雖千萬年人無得者君何得而有弇以告之因問曰此何寶乎曰乃玉清真三寶也遂以數千萬為值而易之弇由是建甲第居廣陵中為豪士竟卒于白衣也寶骨長安平康坊菩提寺緣李林甫宅在東故建鐘樓于西寺內有郭令玳瑁鞭及郭令王夫人七寶帳寺主元意多識故事云李相每至生日常轉請此寺僧就宅設齋有一僧嘗贊佛施鞍一具賣之價直七萬又僧廣有聲口經數年次當贊佛因極祝林甫功德冀獲厚襯畢簾下出彩篚香羅帊籍一物如朽釘長數寸僧歸大失所望慚惋數日且意大臣不容欺已遂攜至西市示于胡商索價一千胡見之大笑曰未也更極意言之加至五百千胡人曰此寶價直一千萬遂與之僧訪其名曰此寶骨也紫羜羯乾元中國家以克復二京糧餉不給監察御史康云間為江淮度支率諸江淮商旅百姓五分之一以補時用洪州江淮之間一都會也云間令録事參軍李惟燕典其事有一僧人請率百萬乃于腋下取一小瓶大如合拳問其所實詭不實對惟燕以所納給衆難違其言詐驚曰上人安得此物必貨此當不違價有波斯胡人見之如其價以市之而去胡人至揚州長史鄧景山知其事以問胡胡云瓶中是紫羜羯人得之者為鬼神所護入火不燒涉水不溺有其物而無其價非明珠雜貨寶所能及也又率胡人一萬貫胡樂輸其財而不為恨瓶中有珠十二顆紫貝紫貝即砑螺也儋振夷黎海畔采以為貨南越志云土産大貝即紫貝也魏生唐安史定后有魏生者少以勳戚歷任王友家財纍萬然其交結不軌之徒由是窮匱為士旅所擯因避亂將妻入嶺南數年方寧后歸舟行至虔州界因暴雨息后登岸肆目忽于砂磧間見一地氣直上沖數十丈從而尋之石間見石片如手掌大狀如甕片又類如石半青半赤甚辨焉試取以歸致之書篋及至家故舊蕩盡無財賄以求敘録假屋以居市肆多賈客胡人等舊相識者哀之皆分以財帛嘗因胡客自為寶會胡客法每年一度與鄉人大會名閲寶物寶物多者戴帽居于坐上其余以次分列召生觀焉生忽憶所拾得物取懷之而去亦不敢先言之坐于席末食訖諸胡出寶上坐者出明珠四其大逾徑寸余胡皆起稽首禮拜其次以下所出者或三或二悉是寶至坐末諸胡咸笑戲謂生君亦有寶否生曰有之遂所出懷以示之而自笑三十余胡皆起扶生于座首禮拜各足生初為見謔不勝慚悚后知誠意大驚異其老胡見此石亦有泣者衆遂求生請市此寶恣其所索生遂大言索百萬衆皆怒之何故辱吾此寶加至千萬乃已潛問胡此寶名何胡云此是某本國之寶因亂遂失之已經三十余年我王求募之云獲者拜國相此歸皆獲厚賞豈止于數百萬哉問其所用云此寶母也但每月望王自出海岸設壇致祭之以此置壇上一夕明珠寶貝等皆自聚故名寶母也生得財倍其先資也
