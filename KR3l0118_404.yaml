body:
  text: 肅宗朝八寶肅宗朝八寶開元中有李氏者嫁于賀若氏賀若氏卒乃舍俗為尼號曰真如家于鞏縣孝義橋其行高洁遠近宗推之天寶元年七月七日真如于精舍戶外盥濯之間忽有五色云氣自東而來云中引手不見其形徐以囊授真如曰寶之慎勿言也真如謹守不敢失墜天寶末祿山作亂中原鼎沸衣冠南走真如展轉流寓于楚州安宜縣肅宗元年建子月十八日夜真如所居忽見二人衣皂衣引真如東南而行可五六十步值一城樓觀嚴飾兵衛整肅皂衣者指之曰化城也城有大殿一人衣紫衣戴寶冠號為天帝复有二十余人衣冠亦如之呼為諸天諸天坐命真如進而諸天相謂曰下界喪亂時久殺戮過多腥穢之氣達于諸天不知何以救之一天曰莫若以神寶壓之又一天曰當用第三寶又一天曰今厲氣方盛穢毒凝固第三寶不足以胜之須以第二寶則兵可息亂世可清也天帝曰然因出寶授真如曰汝往令刺史崔侁進達于天子复謂真如曰前所授汝小囊有寶五段人臣可得見之今者八寶唯王者所宜見之汝慎勿易也乃具以寶名及所用之法授真如已而复令皂衣者送之翼日真如詣縣攝令王滔之以狀聞州州得滔之狀會刺史將行以縣狀示從事盧恒曰安宜縣有妖尼之事怪之甚也亟往訊之恒至縣召真如欲以王法加之真如曰上帝有命誰敢廢墜且寶非人力所致又何疑焉乃以囊中五寶示恒其一曰玄黃天符形如笏長可八寸余闊三寸上圓下方近圓有孔黃玉也色比蒸栗潭若凝脂辟人間兵疫邪癘其二曰玉雞毛文悉備白玉也王者以孝理天下則見其三曰谷璧白玉也徑五六寸其文粟粒自生無異雕鐫之狀王者得之即五谷丰稔其四曰王母玉環二枚亦白玉也徑六寸好倍于肉王者得之能令外國歸复其玉色光彩益發特異于常盧恒曰玉信玉矣安知寶乎真如乃悉出寶盤向空照之其光皆射日仰望不知光之所极也恒與縣吏同視咸異之翌日侁至恒白于侁曰寶蓋天授非人事也侁覆驗無異歎駭久之即具事白報節度使崔圓圓異之征真如詣府欲歷觀之真如曰不可圓固強之真如不得已又出八寶一曰如意寶珠其形正圓大如雞卵光色瑩澈置之堂中明如滿月其二曰紅靺鞨大如巨栗赤爛若朱櫻視之可應手而碎触之則堅重不可破也其三曰琅王干珠其形如環四分缺一徑可五六寸其四曰玉印大如半手其文如鹿陷之印中著物則形見其五曰皇后采桑鉤二枚長五六寸其細如筋屈其末似金又似銀又類熟銅其六曰雷公石二枚斧形長可四寸闊寸許無孔膩如青玉八寶置之日中則白氣連天措諸陰室則燭耀如月其所壓胜之法真如皆秘不可得而知也圓為錄表奏之真如曰天命崔侁事為若何圓懼而止侁乃遺盧恒隨真如上獻時史朝義方圍宋州又南陷申州淮河道絕遂取江路而上抵商山入關以建巳月十三日達京時肅宗寢疾方甚視寶促召代宗謂曰汝自楚王為皇太子今上天賜寶獲于楚州天許汝也宜保愛之代宗再拜受賜得寶之故即日改為寶應元年上既登位及升楚州為上州縣為望縣改縣名安宜為寶應焉刺史及進寶官皆有超擢號真如為寶和大師寵錫有加自后兵革漸偃年谷丰登封域之內幾至小康寶應之符驗也真如所居之地得寶河壖高敞境物潤茂遺址后為六合縣尉崔珵所居西堂之間相傳云西域胡人過其傍者至今莫不望其處而瞻禮焉靈光豆代宗大歷中日林國獻靈光豆龍角釵因其國有海東北四方里國西怪石方數百里光明澄澈可鑒人五髒六腑亦謂之仙人鏡國人有疾輒照之使知起于某髒某腑即自采神草餌之無不愈焉靈光豆大小類中華之菉豆其色殷紅而光芒可長數尺本國亦謂之詰多珠和石上菖蒲葉煮之即大如鵝卵其中純紫稱之可重一斤帝啗一丸歎其香美無比而數日不复言饑渴龍角釵類玉紺色上刻蛟龍之形精巧奇麗非人所制帝賜獨孤妃子與帝同泛舟于龍池有紫云自二上而生俄頃滿于舟中帝由是命置之于堂內以水噴之化為二龍騰空東去矣萬佛山上崇釋氏教乃春百品香和銀粉以涂佛室遇新羅國獻五色氍毹及萬佛山可高一丈上置于佛室以氍毹籍其地氍毹之巧麗亦冠絕于一時每方寸之內即有歌舞妓樂列國山川之狀或微風入室其上复有蜂蝶動搖燕雀飛舞俯而視之莫辨其真假萬佛山雕沉檀珠玉以成之其佛形大者或逾寸小者八九分其佛之首有如黍米者有如菽者其眉目口耳螺髻毫相悉具而辮縷金玉水精為蟠蓋流蘇庵贍匐羅等樹构百寶為樓閣台殿其狀雖微勢若飛動前有行道僧不啻千數下有紫金鐘闊三寸以蒲牢銜之每擊鐘行道僧禮拜至地其中隱隱謂之梵聲蓋關綟在乎鐘也其山雖以萬佛為名其數則不可胜計上置九光扇于岩巘間四月八日召兩街僧徒入內道場禮萬佛山是時觀者歎非人工及見有光出于殿中咸謂之佛光即九光扇也由是上命三藏僧不空念天竺密語千口而退玳瑁盆寶歷元年南昌國獻玳瑁盆浮光裘夜明犀云其國有酒山紫海蓋山有泉其味如酒飲之甚醉則經日不醒紫海水色如爛椹可以染衣其魚龍龜鱉砂石草木無不紫焉玳瑁盆可容十斛外以金玉飾之及盛夏上置于殿內貯水令滿遣嬪御持金銀杓酌水相沃以為嬉戲浮光裘即紫海色染其地也以五彩絲蹙成龍鳳各一千三百仍綴以九色真珠上衣之以獵于北苑為朝日所照而光彩動搖觀者皆眩其目上亦不為之貴一日馳馬從禽勿際暴雨而裘無纖毫沾濡方歎為異物夜明犀其狀類通天犀夜則光明可照百步覆繒十重終不能掩其耀煥上遂命解為腰帶每游獵夜則不施其蜡炬有如晝日辟塵巾高瑀在蔡州有軍將甲知回易折欠數百萬回之外縣去州二百餘里高方令錮身勘甲甲憂迫計無所出其類因為設酒食間解之座客十余中有稱處士皇甫玄真者衣白若鵝羽貌甚都雅眾皆有寬勉之辭皇甫但微笑曰此亦小事眾散乃獨留謂甲曰余嘗游東獲二寶物當為君解此難甲謝之請具車馬悉辭行甚疾甚晚至州舍于店中遂晨謁高高一見不覺敬之因謂高曰玄真此來特從尚書乞甲性命高遂曰甲欠官錢非瑀私財如何皇甫請避左右言某於新羅獲巾子可辟塵欲獻此贖甲即于懷探出授高高才執已覺體中清涼惊曰此非人臣所有且無价矣甲之性命恐足酬也皇甫請試之翼日因宴于郭外時久旱埃塵且甚高顧視馬尾鬣及左右騶卒數人并無纖塵監軍使覺問高何事尚書獨不沾塵坌豈遭逢異人獲至寶乎高不敢隱監軍故求見處士高乃與俱往監軍戲曰道者獨知有尚書乎更有何寶愿得一觀皇甫具述救甲之意且言藥出海東今余一針力差不及巾可令一身無塵監軍拜請曰獲此足矣皇甫即于巾上抽與之針色如金監軍乃扎巾試之驟于塵中唯身及馬鬃尾無塵高與監軍旦具禮往謁將請其道要一夕忽失所在有目無文重明枕有海外國貢重明枕長一尺二寸高六寸洁白類于水精中有樓台之形四面有十道士持香執簡循環無已謂之行道真人其鏤木丹青真人之首簪帔無不悉具仍通瑩焉三寶村扶風縣之西南有三寶村故老相傳云建村之時有胡僧謂村人曰此地有寶氣而今人莫得之其啟發將自有時耳村人曰是何寶也曰此交趾之寶數有三焉故因以三寶名其村蓋識其事開成元年春村中民夜夢一丈夫者黑簪幘被廣袂之衣腰佩長劍儀狀峻古謂民曰吾嘗仕東漢當光武時與飛將馬公同征交趾嘗得南人之寶其后馬公遭謗以為多掠南貨盡載以歸光武怒將命索其家吾懼且及禍故埋于此地言未訖而寤民即以所夢具告于鄰伍中是歲仲夏夕云月陰晦有牧豎望見西京原下炯然有光若曳練焉久而不滅牧豎惊告其父即馳往視之其光愈甚至明夕亦然于是里人數輩夜尋其光俯而觀之其光在土而出若焰薪火里人乃相與植准以表之其明日攜鍤具窮表之下深約丈余得一金龜長二寸許制度奇妙代所未識又得寶劍一長二尺有四寸又得古鏡一徑一尺余皆塵跡蒙然里人得之遂持以詣縣時縣令沛國劉隨得之發硎其劍淡然若水波之色雖利如切玉無以加焉其長二尺四寸者蓋古以八寸為尺乃古三尺其鏡皆文跡繁會有異獸環繞鏡鼻而年代綿邈形理無缺乃命磨瑩其清若上水之洁真天下之奇寶也縣令劉君曰此為古之珍玩宜歸王府可與天球和璧焜燿于上庠遂緘膠其事聞岐陽帥愿表獻天子時陳君亦節度岐隴得而愛之因有其寶由是人無知者火玉會昌元年扶余國貢三寶曰火玉曰澄明酒及風松石火玉色赤長半寸上尖下圓光照數十步積之可以燃鼎置之室內冬則不复亦挾纊宮人常用澄明酒亦異方所貢也色紫如膏飲之令人骨香風松石方一丈瑩澈如玉其中有樹形若古松偃蓋颯颯焉而涼飆生于其間至盛夏上令置于殿內稍秋氣颼颼即令徹去馬腦柜武宗好神仙術遂起望仙台以崇朝禮更修隆真室舂百寶屑以涂地瑤楹金拱銀欄玉砌晶瑩炫耀看之不足內設玳瑁之帳火齊之床焚龍光之香荐無憂之酒此皆他國所獻也帝每齋戒沐浴召道士趙歸真以下用探希夷之理由是室內生靈芝二株皆如紅玉更遇渤海貢馬腦柜方三尺深色如茜所作工巧無以為比帝用貯神仙之書置之帳側紫瑰盆量容半斛內外通瑩其色純紫厚可一寸舉之則若鴻毛帝嘉其光洁遂處于仙室以和藥餌后王才人擲玉環誤缺其半菽上猶歎惜久之岑氏臨川人岑氏嘗游山溪水中見二白石大如蓮實自相馳逐捕而獲之歸置巾箱中其夕夢二白衣美女自言姊妹來侍左右既寤蓋知二石之異也恒結于衣帶中后至豫章有波斯胡人邀而問之君有寶乎曰然即出二石示之胡人求以三萬為市岑雖寶之而無用得錢喜即以與之以錢為生資遂致殷贍而恨不能問其石與其所用云耳
