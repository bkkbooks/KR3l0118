body:
  text: 宣律師宣律師大唐乾封二年春二月西明寺道律師逐靜在京師城南故淨業寺修道律師積德高遠抱素日久忽有一人來至律師所致敬申禮具敘暄涼律師問曰檀越何處姓字誰耶答曰弟子姓王名璠是大吳之蘭臺臣也會師初至建業孫主即未許之令感希有之瑞為立非常之廟於時天地神祗咸加靈被於三七曰遂感舍利吳王手執銅瓶傾銅盤內舍利所衝盤即破裂乃至火燒鎚試俱不能損闞澤張昱之徒亦是天人護助入其身中令其神爽通敏答對諧允今業在天弘護佛法為事弟子是南方天王韋將軍下之使者將軍事物極多擁護三洲之佛法有鬭爭凌危之事無不躬往和喻令解今附和南天欲即至前事擁鬧不久當至具令弟子等共師言不久復有人來云姓羅氏是蜀人也言作蜀音廣說律相初相見時如俗禮儀敘述緣由多有次第遂用忽忘次又一人云姓費氏禮敬如前云弟子迦葉佛時生在初天在韋將軍下諸天貪欲所醉弟子以宿願力不交天欲清靜梵行偏敬毗尼韋將軍童真梵行不受天欲一王之下有八將軍四王三十二將周四天下往還護助諸出家人四天下中北天一洲少有佛法餘三天下佛法大弘然出家之人多犯禁戒少有如法東西天下人少黠慧煩惱難化南方一洲雖多犯罪化令從善心易調伏佛臨涅槃親受付囑並令守護不使魔嬈若不守護如是破戒誰有行我之法教者故佛垂誡不敢不行雖見毀禁愍而護之見行一善萬過不咎事等忘瑕不存往失且人中臭氣上薰空界四十萬里諸天清淨無不厭之但以受佛付囑令護佛法尚與人同止諸天不敢不來韋將軍三十二將之中最存弘護多有魔子魔女輕弄比丘道力微者並為惑亂將軍棲遑奔至應機除剪故有事至須往四王所時王見皆起為韋將軍修童真行護正法故弟子性樂戒律如來一代所制毗尼並在座中聽受戒法因問律中諸隱文義無不決滯然此東華三寶素有山海水石往往多現但謂其靈而敬之顧訪失由莫知投詣遂因此緣隨而咨請且沈冥之相以理括之未曾持觀不可以語也宣師又以感通記問天人云益州成都多寶石佛者何代時像從地湧出答曰蜀都元基青城山上今之成都大海之地昔迦葉佛時有人於西洱河造之擬多寶佛全身相也在西洱河鷲山寺有成都人往彼興易請像將還至今多寶寺處為海神踏船所沒初取像人見海神於岸上遊謂是山鬼遂即殺之因爾神瞋覆沒人像俱溺同在一船其多寶舊在鷲頭山寺古基尚在仍有一塔常有光明令向彼土道由郎州過大小不算三千餘里方達西洱河河大闊或百里或五百里中有山洲亦有古寺經像尚存而無僧住經同此文時聞鐘聲百姓殷實每年二時供養古塔塔如戒壇三重石砌上有覆釜其數極多彼土諸人但言神冢每發光明人以蔬食祭之求其福祚也其地西北去西州二千餘里問去天竺非遠往往有至彼者自下云云至晉時有僧於此地見土墳隨出隨除怪不可平後見拆開深怪其爾乃深掘丈餘獲像及人骨在船其髏骨肘脛悉皆粗大數倍過於今人即迦葉佛時閻浮人壽二萬歲時人也今時劫減命促人小固其常然不可怪也初出之時牽曳難得弟子化為老人指撝方便須臾至周滅法暫隱到隋重興更復出之蜀人但知其靈從地而出亦不測其根源見其花趺有多寶字因遂名焉又名多寶寺又問多寶字是其隸書出於亡秦之代如何迦葉佛時已有神州書耶答曰亡秦李斯隸書此乃近代遠承隸書之興興於古佛之世見今南洲四面千有餘洲莊嚴閻浮一方百有餘國文字言音同今唐國但以海路遼遠動數十萬里重譯莫傳故使此方封守株柱不足怪也師不聞乎梁顧野王太學之大博也周訪字源出沒不定故玉篇序云有開春申君墓得其銘文皆是隸字檢春申是周武明鈔本無周武二字六國同時隸文則非吞併之日也此國篆隸諸書尚有茫昧寧知迦葉佛時之事決非其耳目之所聞見也又問今西京城西高四土臺俗諺云是蒼頡造書臺如何云隸書字古時已有答曰蒼頡於此臺上增土造臺觀鳥跡者非無其事且蒼頡之傳此土罕知其源或云黃帝之臣或云古帝王也鳥跡之書時變一途今所絶有無益之言不勞述也又有天人姓陸名玄暢來謁律師云弟子是周穆王時生在初天本是迦葉佛時天為通化故周時暫現所問高四土臺者其本迦葉佛於此第三會說法度人至穆王時文殊目連來化穆王從之即列子所謂化人者是也化人示穆王云高四臺是迦葉佛說法處因造三會道場至秦穆公時扶風獲一石佛穆公不識棄馬坊中穢污此像護像神瞋令公染疾公又夢遊上帝極被責疏覺問侍臣由余便答云臣聞周穆王時有化人來此土云是佛神穆王信之於終南山造中天臺高千餘尺基址見在又于蒼頡臺造神廟名三會道場公今所患殆非佛為之耶公聞大怖語由余曰吾近獲一石人衣冠非今所製棄之馬坊得非此是佛神耶由余聞往視之對曰此真佛神也公取像澡浴安清淨處像遂放光公又怖謂神瞋也宰三牲以祭之諸善神等擎棄遠處公又大怖以問由余答曰臣聞佛清淨不進酒肉愛重物命如護一子所有供養燒香而已所可祭祀餅果之屬公大悅欲造佛像絶於工人又問由余答曰昔穆王造寺之側應有工匠遂於高四臺南村內得一老人娃王名安年百八十自云曾於三會道場見人造之臣今年老無力能作所住村北有兄弟四人曾於道場內為諸匠執作請追共造依言作之成一銅像相好圓備公悅大賞賚之彼人得財並造功德於土臺上造重閣高三百尺時人號之高四臺或曰高四樓其人姓高大者名四或曰兄弟四人同立故也或取大兄名以目之故有高四之名至今稱也又問目連舍利弗佛在已終如何重見答曰同名六人此目連非大目連也至宇文周時文殊師利化為梵僧來遊此土云欲禮拜迦葉佛說法處並往文殊所住之處名清涼山遍問道俗無有知者時有智猛法師年始十八反問梵僧何因知有二聖餘迹答曰在秦都城南二十里有蒼頡造書臺即其地也又云在沙河南五十里青山北四十里即其處也又問沙河青山是何語答曰渭水終南山也此僧便從渭水直南而步遂得高四臺便云此是古佛說法處也於時智猛法師隨往禮拜不久失梵僧所在智猛長大具為太常韋卿說之請其臺處依本置寺遂奏周主名三會寺至隋大業廢入大寺因被廢毀配入菩提今京城東市西平康坊南門東菩提寺西堂佛首即是三會寺佛釋迦如來得度大迦葉後十二年中來至此臺其下見有迦葉佛舍利周穆王遊大夏佛告彼土見有古塔可返禮事王問何方佛答在鄗京之東南也西天竺國具有別傳云歲長年是師子國僧年九十九夏是三果阿那含人聞斯勝迹躬至禮拜又奏請欲往北岱清涼山文殊師利菩薩坐處皇帝聞喜敕給驛馬內使及弟子官佐二十餘人在處供給諸官人弟子等並乘官馬唯長年一人少小已來精誠苦行不乘雜畜既到岱州清涼山即便肘行膝步而上至中臺佛堂即是文殊廟堂從下至上可行三十餘里山石徑利入肉到骨無血乳出至於七日五體投地布面在土不起不食七日滿已忽起踴躍指揮四方上下空界具見文殊師利菩薩聖僧羅漢從者道俗數十人有見不見復有一蟒蛇身長數里從北而來直上長年長年見喜銜師腳過變為僧形諸人懼怕皆悉四散唯長年一人心不驚動種種靈應不可具述律師又問天人曰自昔相傳文殊在清涼山領五百仙人說法經中明文殊是久住娑婆世界菩薩娑婆則大千總號如何偏在此方答曰文殊是諸佛之元帥隨緣利見應變不同大士大功非人境界不勞評泊但知仰信多在清涼山五臺之中今屬北岱州西見有五臺縣清涼府皇唐已來有僧名解脫在巖窟亡來三十餘年身肉不壞似如入滅盡定復有一尼亦入定不動各經多年聖迹迦藍菩薩聖僧仙人仙花屢屢人見具在別篇豈得不信又問今五臺山中臺之東南三十里見有大孚靈鷲寺兩堂隔澗猶存南有花園可二頃許四時發彩色類不同四周樹圍人移移原作侈據法苑珠林二二改花栽栽原作伏據法苑珠林二二改別處種植皆悉不生唯在園內方得久榮榮原作營據法苑珠林二二改人究年月莫知來由或云漢明所立或云魏孝文帝栽植古老相傳互說不同如何為實答曰但是二帝所作昔周穆之時已有佛法此山靈異文殊所居周穆於中造寺供養及阿育王亦依置塔漢明之初摩騰法師是阿羅漢天眼亦見有塔請帝立寺其山形像似靈鷲山名曰大孚孚者信也帝深信佛法立寺勸人元魏孝文北臺不遠常來禮謁見人馬行跡石上分明其事可驗豈唯五臺獨驗今終南太白太華五巖名山皆有聖人為住持佛法令法久住有人設供感訃徵應事在別篇不煩此術也又問今涼州西番音盤和縣山裂像出何代造耶答云迦葉佛時有利賓菩薩見此山人不信業報以殺害為事於時住處有數萬家無重佛法者菩薩救之為立迦藍大梵天王手造像身初成以後菩薩神力能令如真佛不異遊步說法教化諸人雖蒙此道猶故不信於時菩薩示行怖畏手擎大石可於聚落欲下壓之菩薩揚威勸化諸人便欻回心敬信於佛所有殺具變成蓮花隨處街巷華如種植瑞像方攝神力菩薩又勸諸清信士令造七寺南北一百四十里東西八十里彌山亘谷處處僧坊佛殿營造經十三年方得成就同時出家者有二萬人在七寺住經三百年彼諸人等現業力大昔所造惡當世輕受不入地獄前所害者在惡趣中又發惡願彼害我者及未成聖我當害之若不加害惡業便盡我無以報共吐大火焚燒寺舍及彼聚落一時焚蕩縱盜得活又以大水漂溺殺之無一得存時彼山神寺未破前收取此像遠在空中寺破已後下內石室安置供養年月既久石生室滅至劉薩訶師禮山逆示像出其薩訶者前身元是利賓菩薩身首別處更在別篇也又問江表龍光瑞像人傳羅什將來有言扶南所得如何為定答曰此非羅什所得斯乃宋孝武帝征扶南獲之昔佛滅後三百年中北天竺大阿羅漢優婆質那以神力加工匠後三百年中鑿大石山安置佛窟從上至下凡有五重高三百餘尺請彌勒菩薩指揮作檀室處之玄奘師傳云百餘尺聖跡記云高八丈足趺八尺六齊日常放光明其初作時羅漢將工人上天三往方成第二牛頭旃檀第三金第四玉第五銅像凡夫今見止在下重上四重閉石窟映徹見人臟腑第六百年有佛奈遮阿羅漢生已母亡復生扶南國念母重恩從上重中取小檀像令母供養母終生揚州出家住新興寺獲得三果宋孝武征扶南獲此像來都亦是羅漢神力母今見在時往羅浮天台西方諸處昔法盛曇無謁者再往西方有傳五卷略述此緣何忽云羅什法師背負而來耶宣律師因問什師一代所翻之經人多偏樂受持轉盛何耶答曰其人聰明善解大乘已下諸人同時翻譯者並俊又一代之寶也絶後光前仰之所不及故其所譯以悟達為先得佛遺寄之意也又問俗中常論被秦姚興抑破重戒云何得佛意耶答曰此非悠悠凡所籌度何須評論什師德行在三賢所在通化那繁補闕隨機而作故大論一部十分略九自餘經論例此可知冥祥感應歷代彌新深會聖旨罕逢難遇又蒙文殊指受令其刪定特異恆倫豈以別室見譏頓亡玄致者也又問邡州顯際寺山出石像者何代所立答曰像是秦穆公所造像元出處是周穆王造寺處也佛去世後育王第四女又造像塔於此供養於時此寺有一二三果人住中秦相由余常所奉敬往者迦葉佛時亦於此立寺是彼沙彌顯際造也仍將本名以顯寺額又問金玉華宮南檀臺山上有磚塔面別四十步下層極壯四面石龕傍有碎磚又有三十餘窯磚古老莫知何代然每聞鐘聲答曰此穆王寺也名曰靈山至育王時敕山神於此造塔西晉末亂五胡控權劉曜京都長安數夢此山佛見在磚塔中坐語曜曰汝少飲酒莫耽色欲黜去邪佞進用忠良曜不能從後於洛陽酒醉落馬為石勒所擒初曜因夢所悟令人尋山訪之遂見此像坐小磚塔與夢符同便毀小塔更造大者高一十九級並造寺宇極存壯麗寺名法燈度三百僧住之曜沒趙後寺有四十三人修得三果山神於今塔後又造一寺供三果僧神往太白採取芝草供養聖僧皆獲延齡寺今現在凡人不見所聞鐘聲即是寺鐘也其塔本基雖因劉曜仍是穆王立寺之處也又是迦葉如來之古寺也至貞觀年於玉華北慈烏川山上常見群鹿來集其所逐去還來有人異之於鹿集處掘深一丈獲一石像長一丈許見今供養又問荊州前大明寺旃檀像者云是優填王所造依傳從彼摸來將至梁朝今京師復有何者是本答曰大明是本像梁高既崩像來荊渚至元帝承聖三年周平梁後收薄國寶皆入北周其檀像者有僧珍師藏隱房內多以財物贈遺使人像遂得停至隋開皇九年文帝遺使人柳顧言往迎寺僧又求像令鎮荊楚顧是鄉人從之令別刻檀將往恭旨當時訪匠得一婆羅門僧名真達為造即今西京大興善寺像是也亦甚靈異本像在荊州僧以漆布幔之相好不及真者大明本是古佛住處靈像不肯北遷故也近有長沙義法師天人冥讚遂悟開發別除漆布真容重顯大動信心披覿靈儀令檀所作本無補接光趺殊異象牙雕刻卒非人工所成興善像身一一乖本又問涪州相思寺側多有古迹篆銘勒之不識其緣此事云何答曰此迦葉佛時有山神姓羅名子明蜀人也舊是持戒比丘生憎破戒者發諸惡願令我死後作大惡鬼噉破戒人因願受身作此山神多有眷屬所主土地東西五千餘里南北二千餘里年噉萬人已上此神本僧為迦葉佛兄後為弟子彼佛憐愍故來教化種種神變然始調伏與受五戒隨識宿命因不噉人恐後心變故佛留跡育王於上起塔在山頂神便藏於石中塔是白玉所作其神現在其郭下寺塔育王所立見付囑儀中又問南海循州北山興寧縣界靈龕寺多有靈跡何也答曰此乃文殊聖者弟子為此山神多造惡業文殊愍之便來教化遂識宿命請為留跡我常禮事得離諸惡文殊為現今者是也於貞觀三年山神命終生兜率天別有一鬼來居此地即舊神親家也大造諸惡生天舊神憐之下請文殊為現小跡以化後神又從正法故今此山大小跡現莫匪有由焉見付囑儀又問沁州北山石窟佛常有光明此像出來久近耶答曰此窟迦葉佛釋迦佛二時備有往昔周穆王弟子造迦葉佛像也又問渭南終南二山有佛面山七佛澗者答曰此事同於前南山庫谷天藏是迦葉佛自手所造之藏也今現有十三緣覺在谷內住又問此土常傳有佛是殷時周昭莊王等造互說不同如何取定答曰皆有所以弟子夏桀時生天具見佛之垂化且佛有三身法報二身則非凡見並化登地以上唯有化身被該三千百億釋迦隨人所感前後不定或在殷末或在魯莊俱在大千之中前后咸傳一化感見隨機前後何定若據法報常自湛然不足歎也又問漢地所見諸瑞像多傳育王第四女所造其爭幽冥難得其實此事云何答曰此實不疑為育王第四女厥貌非妍久而未出常恨其醜乃圖佛形相還如自身成已發願佛之相好挺異於人如何同我之形儀也以此苦邀彌經年月後感佛現忽異本形父具問之述其所願今北山玉華荊州長沙楊都高悝及京城崇敬寺像並是育王第四女造或有書其光趺依梵本書漢人讀者罕識其文育王因將此像令諸鬼神隨緣所感流傳開悟今覩像面莫非女形其崇敬寺地本是戰場西晉將末有五胡大起兵戈相殺此地特多地下人骨今掘猶得所殺無辜殘害酷濫故諸神鬼攜以鎮之令諸冤魂得生善念周朝滅法神亦徙之隋祖載法苑珠林二二載作再隆佛還重起又問幽冥所感俗中常有神去形朽如何重來或經七日多日如生不異答曰人稟七識各有神神原作人據法苑珠林二二改心識為主主雖前去餘神守護不足怪也如五戒中一戒五神五戒便有二十五神戒破五神去餘者仍在如大僧受戒戒有二百五十神亦戒戒之中感得二百五十防衛比丘若毀一重戒但二百五十神去餘者恆隨律師又問天人曰其蜀地簡簡原作蘭據道宣律師感通録改州三學山寺空燈常照因何而有答曰山有菩薩寺迦葉佛正法時初立有歡喜王菩薩造之寺名法燈自彼至今常明室表有小菩薩三百人斷粒遐齡常住此山此燈又是山神李特續後供養故至正月處處燃燈以供佛寺云爾出法苑珠林
