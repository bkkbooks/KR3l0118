body:
  text: 杜鵬舉杜鵬舉景龍末韋庶人專制故安州都督贈太師杜鵬舉時尉濟源縣為府召至洛城修籍一夕暴卒親賓將具小殮夫人尉遲氏敬德之孫也性通明彊毅曰公筭術神妙自言官至方伯今豈長往耶安然不哭洎二日三夕乃心上稍溫翌日徐蘇數日方語云初見兩人持符來召遂相引徽安門出門隙容寸過之尚寬直北上邙山可十餘里有大坑視不見底使者令入鵬舉大懼使者曰可閉目執手如飛須臾足已履地尋小徑東行凡數十里天氣昏慘如冬凝陰遂至一廨墻宇宏壯使者先入有碧衣官出趨拜頗恭既退引入碧衣者踞坐案後命鵬舉前旁有一狗人語云誤姓名同非此官也笞使者改符令去有一馬半身兩足跳樑而前曰往為杜鵬舉殺今請理冤鵬舉亦醒然記之訴云曾知驛敕使將馬令殺非某所願碧衣命吏取按審然之馬遂退旁見一吏揮手動目教以事理意相庇脫所證既畢遂揖之出碧衣拜送門外云某是生人安州編戶少府當為安州都督故先施敬願自保持言訖而向所教之吏趨出云姓韋名鼎亦是生人在上都務本坊自稱向來有力祈錢十萬鵬舉辭不能致鼎云某雖生人今於此用紙錢易致耳遂許之亦囑云焚時願以物籍之幸不著地兼呼韋鼎某即自使人受鼎又云既至此豈不要見當家簿書遂引入一院題云戶部房廊四周簿帳山積當中三間架閣特高覆以赤黃幃帕金字牓曰皇籍餘皆露架往往有函紫色蓋之韋鼎云宰相也因引詣杜氏籍書籤云濮陽房有紫函四發開卷鵬舉三男時未生者籍名已具遂求筆書其名於臂意願踟躕更欲周覽韋鼎云既不住亦要早歸遂引出令一吏送還吏云某苦飢不逢此便無因得出願許別去冀求一食但尋此道自至其所留之不可鵬舉遂西行道左忽見一新城異香聞數里環城皆甲士持兵鵬舉問之甲士云相王於此上天子有四百天人來送鵬舉曾為相王府官忻聞此說墻有大隙窺見分明天人數百圍繞相王滿地綵雲並衣仙服皆如畫者相王前有女人執香爐引行近窺諦衣裙帶狀似剪破一如鴈齒狀相王戴一日光明輝赫近可丈餘相王後凡有十九日壘壘成行大光明皆如所戴須臾有綈騎來迎甲土令鵬舉走遂至故道不覺已及徽安門門閉閑過之亦如去時容易為群犬遮齧行不可進至家見身在牀上躍入身中遂寤臂上所記如朽木書字尚分明遂焚紙錢十萬呼贈韋鼎心知卜代之數中興之期遂以假故來謁睿宗上握手曰豈敢忘德尋求韋鼎適卒矣及睿宗登極拜右拾遺詞云思入風雅靈通鬼神敕宮人妃主數十同其粧服令視執鑪者鵬舉遙識之乃太平公主也問裙帶之由其公主云方熨龍袞忽為火迸驚忙之中不覺爇帶倉惶不及更服公主歔欷陳賀曰聖人之興固自天也鵬舉所見先睿宗龍飛前三年故鵬舉墓誌云及睿宗踐祚陰騭祥符啟聖期於化元定成命於幽數後果為安州都督又一說鵬舉得釋復入一院問簾下者為誰曰魏元忠也有頃敬揮至下馬眾接拜之云是大理卿對推事見武三思著枷韋溫宗楚客趙履溫等著鏁李嶠露頭散腰立聞元忠等云今年大計會果至六月誅逆韋宗趙韋等並斬嶠解官歸第皆如其言河東縣尉妻景雲中河東南縣尉李某妻王氏有美色著稱三輔李朝趨府未歸王粧梳向畢焚香閑坐忽見黃門數人御犢車自雲中下至堂所王氏驚問所以答曰華山府君使來奉迎辭不獲放倉卒欲去謂家人曰恨不得見李少府別揮淚而行死於階側俄而綵雲捧車浮空冉冉遂滅李自州還既不見妻撫屍號慟絕而復蘇者數四少頃有人詣門自言能活夫人李罄折拜謁求見衛護其人坐牀上覔朱書符朱未至因書墨符飛之須臾未至又飛一符笑謂李曰無苦尋常得活有頃而王氏蘇李拜謝數十竭力贈遺人大笑曰救災恤患焉用物乎遂出門不見王氏既悟云初至華山見王王甚悅列供帳於山椒與其徒數人歡飲宴樂畢方申繾綣適爾杯酌忽見一人乘黑雲至云太一令喚王夫人神猶從容請俟畢會尋又一人乘赤雲大怒曰太一問華山何以輒取生人婦不速送還當有深譴神大惶懼便令送至家三衛開元初有三衛自京還青州至華嶽廟前見青衣婢衣服故惡來白云娘子欲見因引前行遇見一婦人年十六七容色慘悴曰己非人華嶽第三新婦夫婿極惡家在北海三年無書信以此尤為嶽子所薄聞君遠還欲以尺書仰累若能為達家君當有厚報遂以書付之其人亦信士也問北海於何所送之婦人云海池上第二樹但扣之當有應者言訖訣去及至北海如言送書扣樹畢忽見朱門在樹下有人從門中受事人以書付之入頃之出云大王請客入隨行百餘步後入一門有朱衣人長丈餘左右侍女數千百人坐畢乃曰三年不得女書讀書大怒曰奴輩敢爾乃傳教召左右虞侯須臾而至悉長丈餘巨頭大鼻狀貌可惡令調兵五萬至十五日乃西伐華山無令不勝二人受教走出乃謂三衛曰無以上報命左右取絹二疋贈使者三衛不說心怨二疋之少也持別朱衣人曰兩絹得二萬貫方可賣慎無賤與人也三衛既出欲驗其事復往華陰至十五日既暮遙見東方黑氣如蓋稍稍西行雷震電掣聲聞百里須臾華山大風折樹自西吹雲雲勢益壯直至華山雷火喧薄遍山涸赤久之方罷及明山色焦黑三衛乃入京賣絹買者聞求二萬莫不嗤駭以為狂人後數日有白馬丈夫來買直還二萬不復躊躇其錢先已鏁在西市三衛因問買所用丈夫曰今以渭川神嫁女用此贈遺天下唯北海絹最佳方欲令人往市聞君賣北海絹故來爾三衛得錢數月貨易畢東還青土行至華陰復見前時青衣云娘子故來謝恩便見看蓋犢車自山而下左右從者十餘輩既至下車亦是前時女郎容服炳煥流目清眄迨不可識見三衛拜乃言曰蒙君厚恩遠報父母自鬧戰之後恩情頗深但愧無可仰報爾然三郎以君達書故移怒於君今將五百兵於潼關相候君若往必為所害可且還京不久大駕東幸鬼神懼鼓車君若坐於鼓車則無慮也言訖不見三衛大懼即時還京後數十日會玄宗幸洛乃以錢與鼓者隨鼓車出關因得無憂李湜趙君李湜以開元中謁華岳廟過三夫人院忽見神女悉是生人邀入寶帳中備極歡洽三夫人迭與結歡言終而出臨訣謂湜曰每年七月七日至十二日岳神當上計於天至時相迎無宜辭讓今者相見亦是其時故得盡歡爾自爾七年每悟其日奄然氣盡家人守之三日方悟說云靈帳瑇筵綺席羅薦搖月扇以輕暑曳羅衣以縱香玉珮清冷香風斐亹候湜之至莫不笑開星靨花媚玉顏敘離異則涕零論新歡則情洽三夫人皆其有也湜才偉於器尤為所重各盡其歡情及還家莫不惆悵嗚咽延景惜別湜既寤形貌流浹輒病十來日而後可有術者見湜云君有邪氣為書一符後雖相見不得相近二夫人一姓王一姓杜罵云酷無行何以帶符為小夫人姓蕭恩義特深涕泣相顧誡湜三年勿言言之非獨損君亦當損我湜問以官云合進士及第終小縣令皆如其言葉淨能開元初玄宗以皇后無子乃令葉淨能道士奉章上玉京天帝問皇后有子否久之章下批云無子跡甚分明王昌齡開元中琅邪王昌齡自吳抵京國舟行至馬當山屬風便而舟人云貴識至此皆令謁廟昌齡不能駐亦先有禱神之備見舟人言乃命使齎酒脯紙馬獻於廟及草履致於夫人題詩云青驄一匹崑崙牽奏上大王不取錢直為猛風波滾驟莫怪昌齡不下船讀畢而過當市草履時兼市金錯刀一副貯在履內至禱神時忘取之誤并將往昌齡至前程求錯刀子方轉其誤又行數里忽有赤鯉魚可長三尺躍入昌齡舟中呼使者烹之既剖腹得金錯刀宛是誤送廟中者張嘉祐開元中張嘉祐為相州刺史使宅舊凶嘉祐初至便有鬼祟迴祐家備極擾亂祐不之懼其西院小廳鋪設及他食物又被翻倒嘉祐往觀之見一女子嘉祐問女郎何神女云己是周故大將軍相州刺史尉遲府君女家有至屈欲見使君陳論嘉祐曰敬當以領有頃而至容服魁岸視瞻高遠先致敬於嘉祐祐延坐問之曰生為賢人死為明神胡為宵窣幽瞑恐動兒女遂令此州前後號為凶闕何為正直而至是耶云往者周室作殫楊堅篡奪我忝周之臣子寧忍社稷崩殞所以欲全臣節首倡大義冀乎匡復宇宙以存太祖之業韋孝寬周室舊臣不能聞義而舉反受楊堅銜勒為其所用以一州之眾當天下累益之師精誠雖欲貫天四海竟無救助尋而失守一門遇害合家六十餘口骸骨在此廳下日月既多幽怨愈甚欲化別不可欲白於人悉皆懼死無所控告至此明公幸垂顧盻若沉骸儻得不棄幽魅有所招立則雖死之日猶生之年嘉祐許諾他日出其積骸以禮葬於廳後便以廳為廟歲時禱祠焉祐有女年八九歲家人欲有所問則令啟白神必有應神欲白嘉祐亦令小女出見以為常也其後嘉祐家人有所適神必使陰兵送出境兵還具白送至某處其西不過河陽橋
