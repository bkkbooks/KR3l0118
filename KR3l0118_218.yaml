body:
  text: 華他華他魏華他善醫嘗有郡守病甚他過之郡守令他診候他退謂其子曰使君病有異於常積淤血在腹中當極怒嘔血即能去疾不爾無生矣子能盡言家君平昔之愆吾疏而責之其子曰若獲愈何謂不言於是具以父從來所為乖誤者盡示他他留書責罵之父大怒發吏捕他他不至遂嘔黑血升餘其疾乃平又有女子極美麗過時不嫁以右膝常患一瘡膿水不絶華他過其父問之他曰使人乘馬牽一栗色狗走三十里歸而熱截右足柱瘡上俄有一赤蛇從瘡出而入犬足中其疾遂平出獨異志又後漢末有人得心腹瘕病晝夜切痛臨終敕其子曰吾氣絶後可剖視之其子不忍違言剖之得一銅槍容數合許後華他聞其病而解之因出巾箱中藥以投鎗鎗即成酒焉出志怪張仲景何顒妙有知人之鑒初郡張仲景總角造顒顒謂曰君用思精密而韻不能高將為良醫矣仲景後果有奇術王仲宣年十七時過仲景仲景謂之曰君體有病宜服五石湯若不治年及三十當眉落仲宣以其賒遠不治後至三十果覺眉落其精如比世咸嘆顒之知人出小説吳太醫吳孫和寵鄧夫人嘗醉舞如意誤傷鄧頰血流嬌惋彌苦命太醫合藥言得白獺髓雜玉與虎魄屑當滅此痕和以百金購得白獺乃合膏琥魄太多及差痕不滅左頰有赤點如痣出酉陽雜俎句驪客魏時有句驪客善用針取寸髮斬為十餘段以針貫取之言發中虛也其妙如此出酉陽雜俎范光祿有范光祿者得病兩腳並腫不能飲食忽有一人不自通名徑入齋中坐於光祿之側光祿謂曰先不識君那得見詣答云佛使我來理君病也光祿遂廢衣示之因出針出針原作以刀據明鈔本改針腫上倏忽之間頓針兩腳及膀胱百餘下出黃膿水三升許而去至明日並無針傷而患漸愈出齊諧録徐文伯宋徐文伯嘗與宋少帝出樂遊苑門逢婦人有娠帝亦善診候診之曰是女也問文伯伯曰一男一女男在左邊青黑色形小於女帝性急令剖之文伯惻然曰臣請針之必落便針足太陰補手陽明胎應針而落果效如言文伯有學行不屈公卿不以醫自業為張融所善歷位泰山太守文伯祖熙之好黃老隱於秦望山有道士過乞飲留一胡蘆子曰君子孫宜以此道術救世當得二千石熙開視之乃扁鵲醫經一卷因精學之遂名振海內仕至濮陽太守子秋夫為射陽令嘗有鬼呻吟聲甚淒苦秋夫問曰汝是鬼也何所須鬼曰我姓斛斯家在東陽患腰痛而死雖為鬼疼痛猶不可忍聞君善術願見救濟秋夫曰汝是鬼無形云何措治鬼曰君但縛芻作人按孔穴穴原作定據明鈔本改針之秋夫如其言為針四處又針肩井三處設祭而埋之明日見一人來謝曰蒙君療疾復為設祭除飢解疾感惠實多忽然不見當代服其通靈出談藪又宋明帝宮人患腰疼牽心發即氣絶衆醫以為肉癥徐文伯曰此髮瘕也以油灌之則吐物如髮稍稍引之長三尺頭已成蛇能動懸柱上水滴盡一髮而已病即愈出談藪徐嗣伯徐嗣伯字德紹善清言精於醫術曾有一嫗患滯淤積年不差嗣伯為之診疾曰此尸注也當須死人枕煮服之可愈於是就古冢中得一枕枕以半邊腐缺服之即差後秣陵人張景年十五腹脹面黃衆醫不療以問嗣伯嗣伯曰此石蛔耳當以死人枕煮服之依語煮枕以服之得大利出出字原闕據明鈔本補蛔蟲頭堅如石者五六升許病即差後沈僧翼眼痛又多見鬼物以問之嗣伯曰邪氣入肝可覓死人枕煮服之竟可埋枕於故處如其言又愈王晏知而問之曰三病不同而皆用死人枕療之俱差何也答曰尸注者鬼氣也伏而未起故令人沉滯得死人枕促之魂氣飛越不復附體故尸注可差石蛔者醫療即僻蛔蟲轉堅世間藥不能除所以須鬼物驅之然後可散也夫邪氣入肝故使眼痛而見魍魎應須邪物以釣其氣因而去之所以令埋於故處也晏深歎其神妙出南史腹瘕病昔有一人與奴同時得腹瘕病奴既死令剖腹視之得一白鱉乃試以諸藥澆灌之並內藥於腹中悉無損動乃繫鱉於床腳忽有一客來看之乘一白馬既而馬溺濺鱉鱉乃惶駭疾走避之既繫之不得去乃縮藏頭頸足焉病者察之謂其子曰吾病或可以救矣乃試以白馬溺灌鱉須臾消成水焉病者遂頓服升餘白馬溺病卻豁然除愈出續搜神記李子豫許永為豫州刺史鎮歷陽其弟得病心腹堅痛居一夜忽聞屏風後有鬼言何不速殺之明日李子豫當以赤丸打汝汝即死矣及旦遂使人迎子豫既至病者忽聞腹中有呻吟之聲子豫遂於巾箱中出八毒赤丸與服之須臾腹中雷鳴絞絞原作彭據明鈔本改轉大利所病即愈出續搜神記徐之才北齊右僕射徐之才善醫術時有人患腳跟腫痛諸醫莫能識之窺之曰蛤精疾也得之當由乘船入海垂腳水中疾者曰實曾如此為割之得蛤子二箇如榆莢出太原故事甄權甄權精究醫術為天下最年一百三歲唐太宗幸其宅拜朝散大夫出談賓録孫思邈唐鄧王元裕高祖第十八子也好學善談名理與典籤盧照鄰為布衣之交常稱曰寡人之相如也照鄰范陽人為新都尉因染惡惡原作患據明鈔本改疾居於陽翟之具茨山著釋疾文及五悲雅有騷人之風竟自沈於潁水而死照鄰寓居於京城鄱陽公主之廢府顯慶三年詔徵太白山隱士孫思邈亦居此府思邈華原人年九十餘而視聽不衰照鄰目年才強仕沈疾困憊乃作蒺藜樹賦以傷其稟受之不同詞甚美麗思邈既有推步導養之術照鄰與當時知名之士宋令文孟詵皆執師資之禮嘗問思貌曰名醫愈疾其道何也思邈曰吾聞善言天者必質於人善言人者必本於天故天有四時五形日月相推寒暑迭代其轉運也和而為雨怒而為風散而為露亂而為霧凝而為霜雪張而為虹霓此天之常數也人有四肢五臟一覺一寐呼吸吐納精氣往來流而為榮衛彰而為氣色發而為音聲此亦人之常數也陽用其精陰用其形天人之所同也及其失也蒸則為熱否則生寒結而為瘤贅隔而為癰疽奔而為喘乏竭而為焦枯診發乎面變動乎形推此以及天地亦如之故五緯盈縮星辰錯行日月薄蝕彗孛流飛此天地之危診也寒暑不時此天地之蒸否也石立土踊此天地之瘤贅也山崩地陷此天地之癰疽也奔風暴雨此天地之喘乏也雨澤不降川澤涸竭此天地之焦枯也良醫導之以藥石救之以針灸聖人和之以至德輔之以人事故體有可消之疾天有可消之災通乎數也照鄰曰人事如何思邈曰膽欲大而心欲小智欲圓而行欲方照鄰曰何謂也思邈曰心為五臟之君君以恭順為主故心欲小膽為五髒之將將以果決為務故膽欲大智者動象天故欲圓仁者靜象地故欲方詩曰如臨深淵如履薄冰為小心也赳赳武夫公侯干城為大膽也傳曰不為利回不為義疚仁之方也易曰見幾而作不俟終日智之圓也照鄰又問養性之道其要何也思邈曰天道有盈缺人事多屯厄苟不自慎而能濟於厄者未之有也故養性之士先知自慎自慎者恆以憂畏為本經曰人不畏威天威至矣憂畏者死生之門存亡之由禍福之本吉凶之源故士無憂畏則仁義不立農無憂畏則稼穡不滋工無憂畏則規矩不設商無憂畏則貨殖不盈子無憂畏則孝敬不篤父無憂畏則慈愛不著臣無憂畏則勳庸不建君無憂畏則社稷不安故養性者失其憂畏則心亂而不理形躁而不寧神散而氣越志蕩而意昏應生者死應存者亡應成者敗應吉者凶夫憂畏者其猶水火不可暫忘也人無憂畏子弟為勍敵妻妾為寇仇是故太上畏道其次畏天其次畏物其次畏人其次畏身憂於身者不拘於人畏於己者不制於彼慎於小者不懼於大戒於近者不懼於遠能知此者水行蛟龍不能害陸行虎兕不能傷五兵不能及疫癘不能染讒賊不能謗毒螫不加害知此則人事畢矣思邈尋授承務郎直尚藥局以永淳初卒遺令薄葬不設冥器祭祀無牲牢死經月餘顏色不變舉尸就木如空衣焉撰千金方三十卷行於代出談賓録許裔宗許裔宗名醫若神人謂之曰何不著書以貽將來裔宗曰醫乃意也在人思慮又脈候幽玄甚難別意之所解口莫能宣古之名手唯是別脈脈既精別然後識病病之於藥有正相當者唯須用一味直攻彼病即立可愈今不能別脈莫識病源以情億度多安藥味譬之於獵不知兔處多發人馬空廣遮圍或冀一人偶然逢也以此療病不亦疏乎脈之深趣既不可言故不能著述出談賓録秦鳴鶴唐高宗苦風眩頭目不能視召侍醫秦鳴鶴診之秦曰風毒上攻若刺頭出少血愈矣天后自簾中怒曰此可斬也天子頭上豈是出血處耶鳴鶴叩頭請命上曰醫人議病理不加罪且吾頭重悶殆不能忍出血未必不佳朕意決矣命刺之鳴鶴刺百會及腦戶出血上曰吾眼明矣言未畢后自簾中頂禮以謝之曰此天賜我師也躬負繒寶以遺之出談賓録盧元欽泉州有客盧元欽染大風唯鼻根未倒屬五月五日官取蚺蛇膽欲進或言肉可治風遂取一截蛇肉食之三五日頓漸可百日平復出朝野僉載又商州有人患大風家人惡之山中為起茅舍有烏蛇墜酒罌中病人不知飲酒漸差罌底見蛇骨方知其由也出朝野僉載周允元則天時鳳閣侍郎周允元朝罷入閣太平公主喚一醫人自光政門入見一鬼撮允元頭二鬼持棒隨其後直出景運門醫白公主公主奏之上令給使覘問在閣無事食訖還房午後如廁長參典怪其久思往候之允元踣面於廁上目直視不語口中涎落給使奏之上問醫曰此可得幾時對曰緩者三日急者一日上與錦被覆之並床舁送宅止夜半而卒上自為詩以悼之出朝野僉載楊玄亮久視年中襄州人楊玄亮年二十餘於虔州汶山觀傭力晝夢見天尊云我堂舍破壞汝為我修造遣汝能醫一切病寤而説之試療無不愈者贛縣里正背有腫大如拳亮以刀割之數日平復療病日獲十千造天尊堂成療病漸漸無效出朝野僉載趙玄景如意年中洛州人趙玄景病卒五日而蘇云見一僧與一木長尺餘教曰人有病者汝以此木拄之即愈玄景得見機上尺乃是僧所與者試將療病拄之立差門庭每日數百人御史馬知己以其聚衆追之禁左臺病者滿於臺門則天聞之召召原作追據明鈔本改入內宮人病拄之即愈放出任救病百姓數月以後得錢七百餘貫後漸漸無驗遂絶出朝野僉載張文仲洛州有士人患應病語即喉中應之以問善醫張文仲張經夜思之乃得一法即取本草令讀之皆應至其所畏者即不言仲乃録取藥合和為丸服之應時而止一云問醫蘇澄云出朝野僉載郝公景郝公景於泰山採藥經市過有見鬼者怪群鬼見公景皆走避之遂取藥和為殺鬼丸有病患者服之差出朝野僉載崔務定州人崔務墜馬折足醫令取銅末和酒服之遂痊平乃亡後十餘年改葬視其脛骨折處銅末束之出朝野僉載
