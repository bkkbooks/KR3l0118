body:
  text: 狼狼狽狼大如狗蒼色作聲諸竅皆沸䏶中筋大如鴨卵有犯盜者熏之當令手攣縮或言狼筋如織絡小囊蟲所作也狼糞煙直上烽火用之或言狼狽是兩物狽前足絶短每行常駕兩狼失狼則不能動故世言事乖者稱狼狽狼冢臨濟郡西有狼冢近世有人曾獨行於野遇狼數十頭其人窘急遂登草積上有兩狼乃入穴中負出一老狼老狼至以口拔數莖草群狼遂競拔之積將崩遇獵者救之而免其人仍相率掘此冢得狼百餘頭殺之疑老狼即狽也冀州刺史子唐冀州刺史子傳者忘其姓名初其父令之京求改任子往未出境見貴人家賓從衆盛中有一女容色美麗子悅而問之其家甚愕老婢怒云汝是何人輒此狂妄我幽州盧長史家娘子夫主近亡還京君非州縣之吏何詰問頓劇子乃稱父見任冀州欲求姻好初甚驚駭稍稍相許後數日野合中路卻還刺史夫妻深念其子不復詰問然新婦對答有理殊不疑之其來人馬且衆舉家莫不欣悅經三十餘日一夕新婦馬相踏連使婢等往視遂自拒戶及曉刺史家人至子房所不見奴婢至櫪中又不見馬心頗疑之遂白刺史刺史夫妻遂至房前呼子不應令人壞窗門開之有大白狼衝人走去其子遇食略盡矣王含太原王含者為振武軍都尉其母金氏本胡人女善弓馬素以獷悍聞常馳健馬臂弓腰矢入深山取熊鹿狐兔殺獲甚多故北人皆憚其能而推重之後年七十餘以老病遂獨止一室辟侍婢不許輒近左右至夜即扃戶而寢往往發怒過杖其家人輩後一夕既扃其戶家人忽聞軋然之聲遂趨而視之望見一狼自室內開戶而出天未曉而其狼自外還入室又扃其門家人甚懼具白于含是夕于隙中潛窺如家人言含憂悸不自安至曉金氏召含且令即市糜鹿含熟以獻金氏曰吾所須生者耳於是以生麋鹿致于前金氏啖立盡含益懼家人輩或竊語其事金氏聞之色甚慚是夕既扃門家人又伺而覘之有狼遂破戶而出自是竟不還正平縣村人唐永泰末絳州正平縣有村間老翁患疾數月後不食十餘日至夜輒失所在人莫知其所由他夕村人有詣田採桑者為牡狼所逐遑遽上樹樹不甚高狼乃立銜其衣裾村人危急以桑斧斫之正中其額狼頓臥久之始去村人平曙方得下樹因尋狼迹至老翁家入堂中遂呼其子説始末子省父額上斧痕恐更傷人因扼殺之成一老狼詣縣自理縣不之罪又其年絳州他村有小兒年二十許因病後頗失精神遂化為狼竊食村中童兒甚衆失子者不知其故但追尋無所小兒恆為人傭作後一日從失兒家過失兒父呼其名曰明可來我家作當為置一盛饌因大笑曰我是何人更為君家作也男兒豈少異味耶失兒父怪其辭壯遂詰問答云天比使我食人昨食一小兒年五六歲其肉至美失兒父視其口吻內有臊血遂亂毆化為狼而死張某妻晉州神山縣民張某妻忽夢一人衣黃褐衣腰腹甚細逼而淫之兩接而去已而妊娠遂好食生肉常恨不飽恆秪唇咬齒而怒性益狠戾居半歲生二狼子既生即走其父急擊殺之妻遂病恍惚歲餘乃復鄉人謂之狼母子路東土呼熊為子路以物擊樹云子路可起於是便下不呼則不動也熊膽春在首夏在腹秋在左足冬在右足升平入山人晉升平中有人入山射鹿忽墮一坎窅然深絶內有數頭熊子須臾有一大熊入來瞪視此人人謂必以害己良久出藏果栗分與諸子末後作一分以置此人前此人飢久於是冒死取啖之既轉相狎習熊母每旦覓食果還輒分此人此人賴以延命後熊子大其母一一負將出子既盡人分死坎中窮無出路熊母尋復還入坐人邊人解意便抱熊之足於是跳出遂得毋他黃秀邵陵高平黃秀以宋元嘉三年入山經月不還其兒根生尋覓見秀蹲空樹中從頭至腰毛色如熊問其何故答曰天謫我如此汝但自去根生哀慟而歸逾年伐山人見其形盡為熊矣董仲舒漢董仲舒嘗下帷獨詠忽有客來風姿音氣殊為不凡與論五經究其微奧仲舒素不聞有此人而疑其非常乃謂之曰巢居卻風穴處知雨卿非狐狸即是老鼠客聞此言色動形壞化成老狸蹶然而走張華張華字茂先晉惠帝時為司空于時燕昭王墓前有一斑狸積年能為幻化乃變作一書生欲詣張公過問墓前華表曰以我才貌可得見張司空否華表曰子之妙解為無不可但張司空智度恐難籠絡出必遇辱殆不得返非但喪子千歲之質亦當深誤老表書生不從遂詣華華見其總角風流潔白如玉舉動容止顧盼生姿雅重之於是論及文章辨校聲實華未嘗聞此復商略三史探頤百家談老莊之奧區披風雅之絶旨包十聖貫三才針八儒擲五禮華無不應聲屈滯乃嘆曰天下豈有此年少若非鬼怪則是狐狸書生乃曰明公當尊賢容衆嘉善而矜不能奈何憎人學問墨子兼愛其若是耶言卒便請退華已使人防門不得出既而又謂華曰公門置甲兵欄騎當是疑于僕也將恐天下之人捲舌而不言智謀之士望門而不進深為明公惜之華不應而使人禦防甚嚴豐城令雷煥博物士也謂華曰聞魑魅忌狗所別者數百年物耳千年老精不復能別唯有千年枯木照之則形見燕昭王墓前華表已當千年乃遣人伐之使人既至華表嘆曰老狸自不自知果誤我事于華表空中得青衣小兒長二尺餘將還至洛陽而變成枯木燃之以照書生乃是一斑狸茂先嘆曰此二物不值我千年不可復得山中孝子晉海西公時有一人母終家貧無以葬因移柩深山於其側作屐晝夜不休將暮有一婦人抱兒來寄宿轉夜孝子作屐不已婦人求眠于火邊睡乃是一狸抱一烏雞孝子因打殺擲後坑中明日有男子來問細小昨行以寄宿今為何在孝子云一狸即已殺之男子曰君枉殺吾婦何誣得言狸狸今何在因共至坑視狸已成婦人男子因縳孝子赴官應償死乃謂令曰此實妖魅但出獵犬則可知魅復來催殺孝子令因問獵事能別犬否答云性畏犬亦不別也因放犬便化為老狸乃射殺之視婦人已復成狸矣淳于矜晉太元中瓦棺佛圖前淳于矜年少潔白送客至石頭城南逢一女子美姿容矜悅之因訪問二情既洽將入城北角共盡欣好便各分別期更克集將欲結為伉儷女曰得壻如君死何恨我兄弟多翁母並在當問我翁母矜便令女歸問其翁母翁母亦願許之女因敕婢取銀百斤絹百匹助矜成婚經久生兩兒當作祕書監明果騶卒來召車馬導後前後部鼓吹經少日有獵者過覓矜將數十狗徑突入咋婦及兒並成狸絹帛金銀並是草及死人骨劉伯祖晉博陵劉伯祖為河東太守所止承塵上有神能語京師詔書每下消息輒預告伯祖伯祖問其所食啖欲得羊肝買羊肝于前切之臠隨刀不見兩羊肝盡有一老狸露形在案前視者舉刀欲砍之伯祖呵止自舉著承塵上須臾大笑曰向者啖肝醉忽失形與府君相見大慚愧後伯祖當為司隸神復先語伯祖某月某日書當到到期如言及入司隸府神隨逐承塵上輒言省內事伯祖大恐懼謂神曰今職在刺舉左右貴人聞神在此得以相害神答曰如府君所慮當相捨去遂絶無聲吳興田父吳興一人有二男田中作時嘗見父來罵詈趕打之兒歸以告母母問其父父大驚知是鬼魅便令兒斫之鬼便寂不往父憂恐兒為所困便自往兒謂是鬼便殺而埋之鬼遂歸作其父形且語其家二兒已殺妖矣積年不覺後一師過其家語二兒云君尊侯有大邪氣兒白父父大怒師便作聲入父即成一老狸入床下遂擒殺之向所殺者乃真父也改殯治服一兒遂自殺一忿憤亦死孫乞烏傷縣人孫乞義熙中齎文書到郡達石亭天雨日暮顧見一女戴青傘年可十六七姿容豐艷通身紫衣爾夕電光照室乃是大狸乞因抽刀斫殺傘是荷葉黃審句容縣麋村民黃審于田中耕有一婦人過其田自塍上度從東適下而復還審初謂是人日日如此意甚怪之審因問曰婦數從何來也婦人少住但笑不言便去審愈疑之預以長鎌伺其還未敢斫婦但斫所隨婢婦化為狸走去視婢但狸尾耳審追之不及後人有見此狸出坑頭掘之無復尾焉留元寂長山留元寂宋元嘉十九年曾捕得一狸剖腹得一狸又破之更獲一狸方見五臟三狸雖相包懷而大小不殊元寂不以為怪以皮挂于屋後其夜有群狸繞之號呼失皮所在元寂家亦無他鄭氏子近世有鄭氏子者寄居吳之重玄寺暇日登閣忽于閣上見婦人容色甚美因與結歡婦人初不辭憚自後恆至房鄭氏由是惡其本妻不與居止常自安處者數月婦人恆在其所後本妻求高行尼令至房念誦婦人遂不復來鄭大怒何以呼此妖尼令我家口不至尼或還寺婦人又至尼來復去如是數四後恆罵其妻令勿用此尼妻知有效遂留尼在房日夜持誦婦人忽謂鄭曰曩來欲與君畢歡恨以尼故使某屬厭今辭君去矣我只是閣頭狸二娘耳言訖不見遂絶晉陽民家晉陽以北地寒而少竹故居人多種葦成林所以代南方之竹也唐長慶初北都有民其家地多林葦里中嘗有會宴置餘食于其舍至明日輒不知其所在其民有貯繒帛于其室者亦亡之民竊異焉後夜聞嬰兒號者甚衆迫而聽之則闃然矣明夕又聞民懼且甚後一日乃語里中他民曰數夕聞林中有嬰兒號吾度此地不當有嬰兒懼其怪耳即相與芟除其林剃其草既窮得一穴中有繒帛食器見野狸十餘有嚬而俯者呻而仰者瞬而乳者偃而踞者嗷嗷然若相愁狀民盡殺之自是里民用安其居費祕梁末蜀人費祕刈麥值暴風雨隱於巖石間避雨去家數里遙望前路有數十婦人皆著紅紫欄衣歌吟而來祕竊怪田野何因有一群綵衣婦女心異之漸近寂然無聲去祕數步乃各住立少時悉轉背向祕祕到邊過看之其面並無眉耳鼻口唯垂烏毛而已於是祕驚怖心迷悶倒地至一更祕父怪不來把火尋之見祕臥在道旁左側有十刺蝟見火爭散走祕至其家百餘日而死許欽明客唐東都仁和坊有許欽明宅嘗有人於許氏廳事冬夜燃火讀書假寐聞蟲鼠行聲密視見一老母通體白毛上床就爐炙肚搔癢形容短小不類于人客懼猝然發聲大叫妖物便撲落地絶走而去客以宅舍墻高無從出入乃呼一奴持火院內尋索于竹林中見一大石發石得一白蝟便殺之戲場蝟京國頃歲街陌中有聚觀戲場者詢之乃云二刺蝟對打既合節奏又中章程時座中有將作李少監韞亦云曾見蝟見虎則跳入虎耳
