body:
  text: 陰隱客陰隱客唐神龍元年房州竹山縣百姓陰隱客家富莊後穿井二年已濬一千餘尺而無水隱客穿鑿之志不輟二年外一月餘工人忽聞地中雞犬鳥雀聲更鑿數尺傍通一石穴工人乃入穴探之初數十步無所見但捫壁傍行俄轉有如日月之光遂下其穴下連一山峰工人乃下山正立而視則別一天地日月世界其山傍向萬仞千岩萬壑莫非靈景石盡碧琉璃色每岩壑中皆有金銀宮闕有大樹身如竹有節葉如芭蕉又有紫花如盤五色蛺蝶趐大如扇翔舞花間五色鳥大如鶴翱翔樹杪每岩中有清泉一眼色如鏡白泉一眼白如乳工人漸下至宮闕所欲入詢問行至闕前見牌上署曰天桂山宮以銀字書之門兩閣內各有一人驚出各長五尺餘童顏如玉衣服輕細如白霧緑煙絳唇皓齒鬚髮如青絲首冠金冠而跣足顧謂工人曰汝胡為至此工人具陳本末言未畢門中有數十人出云怪有昏濁氣令責守門者二人惶懼而言曰有外界工人不意而到詢問途次所以未未原作來據明鈔本改奏須臾有緋衣一人傳敕曰敕門吏禮而遣之工人拜謝未畢門人曰汝已至此何不求遊覽畢而返工人曰向者未敢儻賜從容乞乘便言之門人遂通一玉簡入旋而玉簡卻出門人執之引工人行至清泉眼令洗浴及浣衣服又至白泉眼令盥漱之味如乳甘美甚連飲數掬似醉而飽遂為門人引下山每至宮闕只得於門外而不許入如是經行半日至山趾有一國城皆是金銀珉玉為宮室城樓以玉字題云梯仙國工人詢于門人曰此國何如門人曰此皆諸仙初得仙者關送此國修行七十萬日然後得至諸天或玉京蓬萊崑閬姑射然方得仙宮職位主籙主印飛行自在工人曰既是仙國何在吾國之下界門人曰吾此國是下界之上仙國也汝國之上還有仙國如吾國亦曰梯仙國一無所異言畢謂工人曰卿可歸矣遂卻上山尋舊路又令飲白泉數掬臨至山頂求穴門人曰汝來此雖頃刻人間已數十年矣卻出舊穴應不可矣待吾奏請通天關鑰匙送卿歸工人拜謝須臾門人攜金印及玉簡又引工人別路而上至一大門勢侔樓閣門有數人俯伏而候門人示金印讀玉簡劃然開門門人引工人上才入門為風雲擁而去因無所覩唯聞門人云好去為吾致意於赤城貞伯須臾雲開已在房州北三十里孤星山頂洞中出後詢陰隱客家時人云已三四世矣開井之由皆不能知工人自尋其路唯見一巨坑乃崩井之所為也時貞元七年矣工人尋覔家人了不知處自後不樂人間遂不食五穀信足而行數年後有人於劍閣雞冠山側近逢之後莫知所在出博異志談宜談宜者陵州民叔皮子也開元末年生生而有異墮地能言數歲之中身逾六尺髭鬢風骨不與常兒同不飲不食行及奔馬二十餘歲忽失所在遠近異之以為神人也至是父母思念鄉里追立廟以祀之大曆元年丙午忽然到家即霞冠羽衣真仙流也白父母曰兒為仙官不當久有人世雖父母憶念又不宜作此祠廟恐物所憑妄作威福以害於人請為毀之廟基之下昔藏黃金甚多撤廟之後鑿地取金可以分濟貧民散遺鄉里矣言訖騰空而去如其言毀廟掘地皆得金焉所掘之處靈泉涌出澄徹異常積雨不加至旱不減郡邑禱祝必有靈應因名談子池亦謂之天池進士周郭籓為詩以記其事曰澄水一百步世名談子池余詰陵陽叟此池當因誰父老謂余說本郡談叔皮開元末年中生子字阿宜墜地便能語九歲多鬚眉不飲亦不食未嘗言渴饑十五能行走快馬不能追二十入山林一去無還期父母憶念深鄉閭為立祠大曆元年春此兒忽來歸頭冠簪鳳凰身著霓裳衣普遍拯疲俗丁寧告親知余為神仙官下界不可祈恐為妖魅假不如早平夷此有黃金藏鎮在茲廟基發掘散生聚可以救貧羸金出繼靈泉湛若清琉璃泓澄表符瑞水旱無竭時言訖辭冲虛杳靄上玄微凡情留不得攀望衆號悲尋稟神仙誡徹廟斸開窺果獲無窮寶均融沾困危巨源出嶺頂噴涌世間稀異境流千古終年福四維出仙傳拾遺王可交蘇州崑山人也以耕釣自業居於松江南趙屯村年三十餘莫知有真道常取大魚自喜以槌擊殺煮之搗蒜韭以食常謂樂無以及一旦棹漁舟方擊楫高歌入江行數里間忽見一綵畫花舫漾于中流有道士七人皆年少玉冠霞帔服色各異侍從十餘人總角雲鬟又四人黃衣乘舫一人呼可交以姓名方驚異不覺漁舟已近舫側一道士令總角引可交上舫見七人面前各有青玉盤酒器果子皆瑩徹有光可交莫識又有女妓十余人悉持樂器可交遠立於筵末遍拜七人共視可交一人曰好骨相合仙生於凡賤眉間已灸破矣一人曰與酒喫侍者瀉酒而樽中酒再三瀉之不出侍者具以告道士曰酒是靈物必得入口當換其骨瀉之不出亦乃命也一人又曰與栗吃俄一人於筵上取二栗付侍者與可交令便吃視之其栗青赤光如棗長二寸許嚙之有皮非人間之栗肉脆而甘如飴久之食方盡一人曰王可交已見之矣可令去命一黃衣送上岸於船邊覓所乘漁舟不見黃衣曰不必漁舟但合眼自到於是合眼若風水林木浩浩之聲令開眼已到失黃衣所在但見峰巒重疊松柏參天坐於草中石上及望見有門樓人出入俄頃採樵者並僧十餘人到問可交何人可交具以前事對又問何日離家可交曰今日早離家又問今日是何日對是三月三日樵者與僧驚今日是九月九去三月三日已半年餘可交問地是何所僧曰此是天台山瀑布寺前也又問此去華亭多少地僧曰水陸千餘里可交自訝不已乃為僧邀歸寺設食可交但言飽不喜聞食氣唯飲水耳衆僧審問極異之乃以狀白唐興縣以達台州以聞越州廉使王渢素奉道召之見極以為非常之事神仙變化不可測也可交身長七尺餘儀貌殊異言語清爽渢歎曰此誠真仙人也又以同姓益敬之飾以道服而遣人至蘇州以詰其實具言三月三日可交乘漁舟入江不歸家人尋得漁舫謂墮江死漉之無跡妻子以招魂葬訖王渢具以表聞詔甚稱異後可交卻歸鄉里備話歷歷及與鄉人到江上指所逢花船之處依然可交食栗後已絶穀動靜若有神助不復耕釣乃挈妻子往四明山二十餘年復出明州賣藥使人沽酒得錢但施於人時言藥則壺公所授酒則餘杭阿母相傳藥極去疾酒甚醉人明州里巷皆言王仙人藥酒世間不及道俗多圖其形像有患𣷀及邪魅者圖於其側即愈後三十餘年卻入四明山不復出今人時有見之者出續神仙傳楊通幽本名什伍廣漢什邠人幼遇道士教以檄召之術受三皇天文役命鬼神無不立應驅毒癘剪氛邪禳水旱致風雨是皆能之而木訥疏傲不拘於俗其術數變異遠近稱之玄宗幸蜀自馬嵬之後屬念貴妃往往輟食忘寐近侍之臣密令求訪方士冀少安聖慮或云楊什伍有考召之法徵至行朝上問其事對曰雖天上地下冥寞之中鬼神之內皆可歷而求之上大悅於內置場以行其術是夕奏曰已於九地之下鬼神之中遍加搜訪不知其所上曰妃子當不墜于鬼神之伍矣二日夜又奏曰九天之上星辰日月之間虛空杳冥之際亦遍尋訪而不知其處上悄然不懌曰未歸天復何之矣炷香冥燭彌加懇至三日夜又奏曰於人寰之中山川嶽瀆祠廟之內十洲三島江海之間亦遍求訪莫知其所後於東海之上蓬萊之頂南宮西廡有群仙所居上元女仙太真者即貴妃也謂什伍曰我太上侍女隸上元宮聖上太陽朱宮真人偶以宿緣世念其願頗重聖上降居於世我謫於人間以為侍衛耳此後一紀自當相見願善保聖體無復意念也乃取開元中所賜金叉鈿合各半玉龜子一寄以為信曰聖上見此自當醒憶矣言訖流涕而別什伍以此物進之上潸然良久乃曰師升天入地通幽達冥真得道神仙之士也手筆賜名通幽賜物千段金銀各千兩良田五千畝紫霞帔白玉簡特加禮異暇日問其所受之道曰臣師乃西城王君青城真人昔於後城山中教以召命之術曰可以輔贊太平之君然後方得飛升之道戒以護氣希言目不妄視絶聲利遠囂塵則可以凌三界登太清矣又問升天入地何門而往何所為礙曰得道之人入火不爇入水不濡躡虛如履實觸實如蹈虛雖九地之厚巨海之廣八極之遠萬方之大應念倏忽何所拘滯乎九地之厚起二十五字據明鈔本補所以然者形與道合道無不在毫芒之細萬物之衆道皆居之上善其對居數載乃登後城山葺靜室於其頂時還其家門人言天真纍降於靜室一旦與群真俱去出仙傳拾遺
