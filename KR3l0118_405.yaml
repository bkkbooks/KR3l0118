body:
  text: 錢淯陽童子晉義熙十二載淯陽縣群童子浴于淯水忽見側有錢出如流沙因競取之手滿放隨流去又以衣盛裹各有所得又見流線中有一銅車小牛牽之勢甚奔迅兒等奔逐掣得一輪徑可五寸豬鼻轂有六輻通然青色缸內黃脫狀如恆運于時沈敞守南陽求得此物然莫測之文德皇后錢有文如甲跡者因文德皇后也武德中廢五銖錢行開通元寶錢此四字及書皆歐陽洵所為也初進樣日后掐一甲跡因是有之岑文本唐貞觀中岑文本下朝多于山亭避暑日午時寤初覺忽有扣山亭院門者藥豎報云上清童子元寶故此參奉文本性素慕道束帶命入乃年二十已下道士儀質爽邁衣服纖異冠淺青圓角冠衣淺青圓用帔履青圓頭履衣服輕細如霧非齊褲魯縞之比文本與語乃曰仆上清童子自漢朝而果成本生于吳已得不凝滯之道遂為吳王進入見漢帝漢帝有事擁遏教化不得者無不相問仆嘗與方圓行下皆得通暢由是自著文武二帝迄至哀帝皆相眷王莽作亂方出外方所至皆沐人憐愛自漢成帝時遂厭人間乃尸解而去或秦或楚不常厥居聞公好道故此相謁耳文本詰以漢魏齊梁間君王社稷之事了了如目睹因言史傳間屈者虛者亦甚多文本曰吾人冠帔何制度之異對曰夫道在于方圓之中仆外服圓而心方正相時之儀也又問曰衣服皆輕細何土所出對曰此是上清五銖服又問曰比聞六銖者天人衣何五銖之異對曰尤細者則五銖也談論不覺日晚乃別去才出門而忽不見文本知是異人乃每下朝即令伺之到則話論移時后令人潛送詣其所止出山亭門東行數步于院牆下瞥然而沒文本命工力掘之三尺至一古墓墓中無余物惟得古錢一枚文本方悟上青童子是青銅名元寶錢之文也外圓心方錢之狀也青衣銅衣也五銖服亦錢之文也漢時生于吳是漢朝鑄五銖錢子吳王也文本雖知之而錢帛日盛至中書令十年忽失古錢所在文本遂薨王清元和初洛陽村百姓王清傭力得錢五鍰因買田畔一枯栗樹將為薪以求利經宿為鄰人盜斫創及腹忽有黑蛇舉首如臂語人曰我王清本也汝勿斫其人驚懼失斤而走及明王清率子孫薪之復掘其根下得大瓮二散錢實之王清因是獲利如歸十余年巨富遂甃錢成形龍號王清本建安村人建安有村人乘小舟往來建溪中賣薪為業嘗泊舟登岸將伐薪忽見山上有數錢流下稍上尋之纍獲數十可及山半有大樹下有大瓮高五六尺錢滿其中而瓮小欹故錢流出子是推而正之以石搘之以衣襟貯五百餘而歸盡率家人復往將盡取既至得舊路見大樹而亡其瓮村人徘徊數日不能去夜夢人告之曰此錢有主向為瓮欹以五百顧爾正之余不可妄想也徐仲寶徐仲寶者長沙人所居道南有大枯樹合數大抱有仆夫灑掃其下沙中獲錢百餘以告仲寶仲寶自往亦獲數百自爾每須錢即往掃其下必有所得如是積年凡得數十萬仲寶后至揚都選授舒城令暇日與家人共坐地中忽有白氣甚徑烈斜飛向外而去中若有物其妻以手攫之得一玉蛺蝶制作精妙人莫能測后為樂平令家人復往于廚側鼠穴中得錢甚多仲寶即率人掘之深數尺有一白雀飛出止于庭樹其下獲錢至百萬錢盡白雀乃去不知所之邢氏建業有庫子姓邢家貧聚錢滿二千輒病或失去其妻竊聚錢埋于地中一夕忽聞有聲如蟲飛自地出穿窗戶而去有觸牆壁墜地者明日視之皆錢其妻乃告埋瘞之處發視皆亡矣邢后得一自然石龜其狀如真置庭中石榴樹下或見之曰此寶物也因收置筐篋中自爾稍充足后頗富矣林氏汀州有林氏其先嘗為郡守罷任家居一日天忽雨錢充積其家林氏乃整衣冠仰天而祝曰非常之事必將為禍于此速止林氏之福也應聲則止所收已巨萬至今為富人云曹真壽春人曹真出行野外忽見坡下有數十錢自遠而來飛聲如鈴真逐之入一小穴以手掬之可得數十而已又舒州桐城縣雙戌港有回風卷錢經市而過市人隨攫其錢以衣襟貯之風入古墓荊棘中人不能入而止所得錢歸家視之與常錢無異而皆言亡八九矣徐景晉時有徐景于宣陽門外得一錦麝袱至家開視有蟲如蟬五色后兩足各綴一五銖錢中牟鐵錐中牟縣魏任城王台下池中有漢時鐵錐長六尺入地三尺頭西南指不可動毒槊南蠻有毒槊無刃狀如朽鐵中人無血而死言從天雨下入地丈余祭地方掘入蠻中呼為鐸刃集翠裘則天時南海郡獻集翠裘珍麗異常張昌宗侍側則天因以賜之遂命披裘供奉雙陸宰相狄仁杰時入奏事則天令升坐因命仁杰與昌宗雙陸狄拜恩就局則天曰卿二人賭何物狄對曰爭三籌賭昌宗所衣毛裘則天謂曰卿以何物為對狄曰指所衣紫絁袍曰臣以此敵則天笑曰卿未知此裘價逾千金卿之所指為不等矣狄起曰臣此袍乃大臣朝見奏對之衣昌宗所衣乃嬖幸寵遇之服對臣此袍臣猶怏怏則天業已處分遂依其說而昌宗心赧神沮氣勢索寞纍局連北狄對御就脫其裘拜恩而出至光范門遂付家奴衣之促馬而去謝靈運須晉謝靈運須美臨刑施于南海祇洹寺為維摩詰須寺人寶惜初不虧損中宗樂安公主五月斗百草欲廣其物色令馳取之又恐他人所得因剪棄其余今遂絶開元漁者開元末登州漁者負擔行海邊遙見近水煙霧朦朧人衆填雜若市里者遂前見多賣藥物僧道尤衆良久呻悉無所睹唯拾得青黛數十斗許大亦不敢他用而施之浮圖人矣楊妃襪玄宗至馬嵬驛令高力士縊貴妃于佛堂梨樹之前馬嵬媼得襪一隻過客求而玩之百錢一觀獲錢無數紫米元和八年大軫國貢碧麥紫米上異之翼日出示術士白元佐李元戢碧麥粒大于中華之麥表里皆碧香氣如粳米食之令人體輕久則可以御風紫米有類巨勝炊一升得飯一斗食之令人髭發縝黑顏色不老嘉陵江巨木閬州城臨嘉陵江江之滸有烏陽巨木長百餘尺圍將半焉漂泊搖撼于江波者久矣而莫知奚自閬之耆舊相傳云堯時泛洪水而至亦靡据焉襄漢節度使勃海高元裕大和九年自中書舍人牧閬中下車未幾亦嘗見之固以為異矣忽一日津吏啓事曰江中巨木由來東首去夜無端翻然西顧高益奇之即與賓僚徑往觀焉因廣召舟子洎軍吏群民輩則以大索羈而出之初無艱阻隨拖登岸太半之后屹而不前雖千夫百牛莫能引之人力既竭復如前時自是日曝風吹僵然沙上或則寺僧欲以為窣堵波之獨柱或則州吏請支分剞劂以備衆材高以奇偉異常皆莫之許每擬還之于江但慮勞人逡巡未果開成三年上元日高准式行香于開元觀僚吏畢至高欲因衆力得共牽復其木焉及至則又廣備縻索多聚勇力將作氣引拽之際而巨木因依假籍若自轉移輕然已復于江矣拒江尚余尺許欻然驚迸百支巨索皆如斬截其木則沿洄汨沒徑去絶江上及中流寂然遂隱高遣善泅者數輩遽往觀之江水清徹毫發可見善游者熟視而回皆曰水中別有東西二木巨細與斯木無異適自岸而至者則南北叢焉高顧坐客靡不駭愕自是則不復得而見矣有頃高除諫議大夫制到詳其授官之日即高役功之辰也向使斯旬朔未獲移徙高之新命既至則那復留意乎轉遷俾之仍舊江淮市人桃核水部員外郎杜涉嘗見江淮市人桃核扇量米止容一升言于九嶷山溪中得玉龍膏安南有玉龍膏南人用之能化銀液說者曰此膏不可持北來苟有犯者則禍且及矣大和中韓約都護安南得其膏及還遂持以歸人有謂曰南人傳此膏不可持以北而公持去得無有悔于后耶約不聽卒以歸焉后約為執金吾是歲京師亂約以附會鄭注竟赤其族豈玉龍膏之所歸禍乎由士南去者不敢持以北也段成式段成式群從有言少時嘗毀鳥巢得一黑石大如雀卵圓滑可愛后偶置醋器中忽覺石動徐之見有四足如綖舉之足亦隨縮李德裕李德裕在文宗武宗朝方秉相權威勢與恩澤無比每好搜掇殊異朝野歸附者多求寶玩獻之常因暇日休浣邀同列宰輔及朝士晏語時畏景赫曦咸有郁蒸之苦軒蓋候門已及亭午縉紳名士交扇不暇時共思憩息于清涼之所既延入小齊不覺寬敞四壁施設皆有古書名畫而炎鑠之患未已及列坐開樽煩暑都盡良久覺清飆凜冽如涉高秋備設酒肴及昏而罷出戶則火云烈日熇然焦灼有好事者求親信察問之云此日以金盆貯水浸白龍皮置于坐末東都平泉莊去洛城三十里卉木台榭若造仙府有虛檻前引泉水瀠回疏鑿像巴峽洞庭十二峰九派迄于海門江山景物之狀竹間竹徑有平石以手摩之皆隱隱云霞龍鳳草樹之形有魚肋骨一條長二丈五尺八其上刻云會昌二年海州送到初德裕之營平泉也遠方之人多以土産異物奉之求數年之間無所不有時文人有題平泉詩者隴右諸侯供語鳥日南太守送名花威勢之使人也夏侯孜夏侯孜為宣宗山陵使開真陵用功尤至鑿皇堂深及袤丈于堅石中得折金叉半股其長如掌余尚銜石中工乃扶取以獻孜孜以寢園方近其事稍異因隱而不奏嚴遵仙槎唐置之于麟德殿長五十余尺聲如銅鐵堅而不蠹李德裕截細枝尺余刻為道像往往飛去復來廣明以來失之槎亦飛走
