body:
  text: 果下櫻桃唐時新進士尤重櫻桃宴乾符四年劉鄴第三子覃及第時鄴以故相鎮淮南敕邸吏曰以銀一錠資醵置而覃所費往往數倍邸吏以聞鄴命取足而已會時及荐新狀頭已下方議醵率覃潛遣人厚以金帛預購數十樹矣于是獨置是宴大會公卿時京國櫻桃初出雖貴達未適口而覃山積鋪席復和以糖酪用享人蠻獻一小盤亦不啻數升以至參御輩靡不沾足檽棗晉趙瑩家庭有檽棗樹婆娑異常四遠俱見有望氣者訪其鄰里問人云此家合有登宰輔者里叟曰無之然主人小字相兒得非此乎術士曰王氣方盛不在其身當在其子孫其后瑩由太原判官大拜出將入相柿俗謂柿樹有七德一壽二多陰三無鳥窠四無蟲五霜葉可玩六嘉實七落葉肥大底櫟樹實阿驛波斯呼為阿驛拂林呼為底櫟樹長丈四五枝葉繁茂葉有五出似蜱麻無花而實實赤色類蜱子味似干柿而一年一熟柿盤木中根固柿為最俗謂之柿盤融峰梨仙梨融峰上有青壇方五丈有燒香行道處古形銅器數種有梨樹高三十丈子如斗至搖落時但見其汁核無得味者六斤梨洛陽報國寺梨重六斤紫花梨清泰中薄游京輦曾與盧泳巡官鄭扆博士僧季雅及三五知友夜會與越波隄僧院是時清秋欲杪明月方高句聯五字之奇酒飲八仙之美柿新紅脯茗釅緑芽一詠一觴或醒或醉座上因相與征引古今遂及果實之事有敘及紫花梨者衆云真定有之雅公獨顰蹙而言曰此微僧先祖之遺恨衆驚而問之雅曰昔武宗皇帝御天下之五載萬國事殷聖情不懌忽患心熱之疾名醫進藥厥疾罔瘳遂博詔良能遐徵和緩時有言青城山邢道士者妙于方藥帝即召見之道士以肘后緑囊中青丹兩粒及取梨數枚絞汁而進之帝疾尋愈旬日之內所賜萬金仍加廣濟先生之號帝從容問其丹為何物先生曰赤城山頂有青芝兩株太白南溪有紫花梨一樹臣之昔歲曾游二山偶獲兩寶合煉成丹五十年來服食殆盡唯余兩粒幸逢陛下服之更欲此丹須求二物也經數月邢生辭帝歸山后疾復作再詔邢先生于青城則不知何適也帝遂詔示天下有紫花梨即時奏上時恆州節度太尉公王達尚壽春公主即會昌之女弟聞真定李令種梨數株其一紫花梨即遣寺人就加封檢剪其旁樹匝以朱欄寶惜纖枝有同月桂當花發之時防蜂蝶之窺耗每以輕綃紗縠遠加籠罩焉守樹者不勝艱苦洎及秋實公主必手選而進之此達帝庭十得其六七帝多食此梨雖不及邢氏者亦粗解其煩躁耳是時有李遵來侍御任恆州記室作進梨表云紫花開處擅美春林縹蒂懸時迥光秋景離離玉潤落落珠圓甘不待嘗脆難勝口表達闕下公卿見者多大笑之曰常山公何用進殘梨于天府也蓋以其表有脆難勝口之字明年武宗崩公主亦相次逝此梨自后以為貢賦之常物縣官歲久亦漸怠于寶守焉至天祐末焉趙王為德明之所篡弒其后縣邑公署多歷兵戎紫花之梨亦已枯朽今之真定無復繼種者焉當武宗時縣宰李公名尚即雅之祖也嘗以守樹不謹曾風折一枝降為冀州典午由是追感而顰蹙也胡榛子阿月生西國蕃人言與胡榛子同樹一年榛子二年阿月酸棗耆舊說周秦時河南雨酸棗遂生野酸棗今酸棗縣是也酸棗之甚小者為野酸棗蒲萄俗言蒲萄蔓好引于西南庾信謂魏使尉瑾曰我在鄴遂大得蒲萄奇有滋味陳招曰作何形狀徐君房曰有類軟棗信曰君殊不體物何得不言似生荔枝魏肇師曰魏武有言末夏涉秋尚有余暑酒醉宿醒掩露而食甘而不飴酸而不酢道之固以流沫稱奇況親食之者瑾曰此物出自大宛張騫所致有黃白黑三種成熟之時子實逼側星編珠聚西域多釀以為酒每來歲貢在漢西京似亦不少杜陵田五十畝中有蒲萄百樹今在京邑非直止禁林也信曰乃園種戶植接蔭連架昭曰其味何如桔柚信曰津液勝奇芬芳減之瑾曰金衣素里見苞作貢向齒自消良應不及王母蒲萄具丘之南有蒲萄谷谷中蒲萄可就其所食之或有取歸者即失道世言王母蒲萄也天寶中沙門曇霄因游諸嶽至此谷得蒲萄食之又見枯蔓堪為杖大如指五尺余持還本寺植之遂活長高數仞蔭地幅員十丈仰觀若帷蓋焉其旁實磊落紫瑩如墜時人號為草龍珠帳焉侯騷子侯騷蔓生如雞卵既甘且冷輕身消酒廣志言因王太仆所獻蔓胡桃蔓胡桃出南詔大如扁螺兩隔味似胡桃或言蠻中藤子也仙樹實祁連山上有仙樹實行旅得之止饑渴一名四味木其實如棗以竹刀剖則甘鐵刀剖則苦木刀剖則酸蘆刀剖則辛橄欖子獨根樹東向枝曰木威南向枝曰橄欖東荒栗東方荒中有木名曰栗有殼徑三尺三寸殼刺長丈余實徑三尺殼亦黃其味甜食之令人短氣而渴猴栗唐衛公李德裕一夕甘子園會客盤中有猴栗無味陳堅處士云虔州南有漸栗形如素核瓜漢明帝陰貴人夢食瓜甚美帝使求諸方國時有敦煌獻異瓜種常山獻巨桃核名穹窿長三尺而形屈其味臭如粨父老云昔道士從蓬萊山得此瓜云是空洞靈瓜四劫一實東王公西王母遺種于地世代遐絶其實頗存又說此桃霜下始花隆冬可熟亦云仙人所食常使植于霜林園此園皆植寒果積冰之節百果方盛俗為相陵瓜故霜園之聲訛也后曰王母之桃王公之瓜可得而食五萬歲矣安可食乎后崩內侍者見鏡奩中有瓜桃之核視之涕零疑其非數五色瓜吳桓王時會稽生五色瓜今吳中有五色瓜歲充貢賦瓜惡香中尤忌麝唐鄭注太和初赴職河中姬妾百餘盡騎香氣數里逆于人鼻是歲自京至河中所過路瓜盡死一蒂不獲蔓菁諸葛所止令兵士獨種蔓菁者取其才出甲可生啖一也葉舒可煮食二也久居則隨以滋長三也棄不令惜四也回則易尋而采之五也冬有根可斸食六也比諸蔬屬其利不亦博哉劉禹錫曰信矣三蜀之人也今呼蔓菁為諸葛菜江陵亦然越蒜異苑曰晉安平有越王余蒜菜長尺許白者似骨黑者如角古云越王曾于舟中作籌算有余者棄之水而生焉三蔬晉咸寧四年立芳圃于金墉城東多種異菜名曰云薇類有三種紫色者最繁滋其根爛漫春敷夏密秋榮冬馥其實若珠五色隨時而盛一名云芝其紫色者為上蔬而味辛其黃色者為中蔬而味甘其青色者為下蔬而味咸常以此蔬充御其葉可以藉飲食以供宗廟祭祀亦止人饑渴宮中掐其莖葉者歷月不歇菠薐菜之菠薐者本西國中有僧自彼將其子來如苜蓿蒲萄因張騫而至也菠薐本是頗陵國將來語訛耳多不知也芥菹廣州人以巨芥為咸菹埋地中有三十年者貴尚親賓以相餉遺芥末掌中芥末多國出也取子置掌中吹之一吹一長長三尺乃植于地水韭水韭生于水湄狀如韭而葉細長可食茄子樹南中草菜經冬不衰故蔬圃之中栽種茄子宿根有三二年者漸長枝干乃為大樹每夏秋熟則梯樹摘之三年后漸樹老子稀即伐去別栽嫩者昆侖紫瓜隋煬帝大業末改茄子為昆侖紫瓜茄子故事茄子茄字連莖名革遐反今呼伽未知所自昔段成式因就廊下食茄子數蒂偶問工部員外張周封茄子故事張云一名落蘇事具食料本草成式記得隱侯行園詩云寒瓜方臥壟秋瓜正滿陂紫茄紛爛漫緑芋郁參差又一名昆侖瓜嶺南茄子宿根成樹高五六尺姚向曾為南選使親見之故本草記廣州有慎火樹樹大三四圍慎火即景天也俗呼為護火草茄子熟者食之厚腸胃動氣發疾根能理龜瘃欲其子繁候其花時取葉布于過路以灰規之人踐之子必繁也俗謂嫁茄子曾火炙之甚美有新羅種者色稍白形如雞卵西明寺僧造玄院中有其種水經云石頭西對蔡浦長百里上有大荻荻浦下有茄浦儋崖瓠儋崖種瓠成實率皆石余芥高者亦五六尺子大如雞卵
