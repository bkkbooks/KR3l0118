body:
  text: 東方朔東方朔漢武帝見畫伯夷叔齊形象問東方朔是何人朔曰古之愚夫帝曰夫伯夷叔齊天下廉士何謂愚邪朔對曰臣聞賢者居世與之推移不凝滯於物彼何不升其堂飲其漿泛泛如水中之鳧與彼徂遊天子轂下可以隱居何自苦於首陽上喟然而歎又漢武遊上林見一好樹問東方朔朔曰名善哉帝陰使人落其樹後數歲復問朔朔曰名為瞿所帝曰朔欺久矣名與前不同何也朔曰夫大為馬小為駒長為雞小為雛大為牛小為犢人生為兒長為老且昔為善或今為瞿所長少死生萬物敗成豈有定哉帝乃大笑出小説匡衡匡衡字稚圭勤學而無燭鄰人有燭而不與衡乃穿壁引其光以書映之而讀之邑人大姓文不識家富多書衡乃為其傭作而不求直主人怪而問之衡曰願得主人書遍讀之主人感歎資給以書遂成大學能説詩時人為之語曰無説詩匡鼎來匡説詩解人頤鼎衡小名也時人畏服之如此聞之皆解頤歡笑衡邑人有言詩者衡從之與語質疑邑人挫服倒屣而去衡追之曰先生留聽更理前論邑人曰窮矣遂去不顧出西京雜記邊文禮邊文禮見袁奉高失次序奉高因嘲之曰昔堯聘許由面無怍色先生何為顛倒衣裳文禮答曰明府初臨堯德未彰是以賤民顛倒衣裳耳出世説荀慈明荀慈明與汝南袁少朗相見問潁川士慈明先及諸兄少朗歎之曰但可私親而已慈明答曰足下相難依據何經少朗曰方問國士始及諸兄是以尤之慈明曰昔祁奚內舉不失其子外舉不失其讎以為至公公旦周文王之子詩不論堯舜之德而頌文武者何先親之義也春秋之義內中國而外諸夏且不能愛其親而愛他人者不當以是勃德乎出世説曹植魏文帝嘗與陳思王植同輦出遊逢見兩牛在牆間鬥一牛不如墜井而死詔令賦死牛詩不得道是牛亦不得云是井不得言其鬥不得言其死走馬百步令成四十言步盡不成加斬刑子建策馬而馳既攬筆賦曰兩肉齊道行頭上戴橫骨行至凶士頭垏起相唐突二敵不俱剛一肉臥土窟非是力不如盛意不得泄賦成步猶未竟重作三十言自愍詩云煮豆持作羹漉豉取作汁萁在釜下然豆向釜中泣本自同根生相煎何太急出世説諸葛恪孫權暫巡狩武昌語群臣曰在後好共輔導太子太子有益諸君厚賞如其無益必有重責張昭薛綜並未能對諸葛恪曰今太子精微特達比青蓋來旋太子聖睿之姿必聞一知十豈為諸臣虛當受賞孫權嘗問恪君何如丞相恪曰臣勝之權曰丞相受遺輔政國富刑清雖伊尹格於皇天周公光於四表無以遠過且為君叔何宜言勝之邪恪對曰實如陛下明詔但至於仕于汙君甘于偽主暗于天命則不如臣從容清泰之朝讚揚天下之君也權復問恪君何如步騭恪答曰臣不如之又問何如朱然亦曰不如之又問何如陸遜亦曰不如之權曰君不如此三人而言勝叔者何恪曰不敢欺陛下小國之有君不如諸夏之亡是以勝也出劉氏小説車浚陸遜聞車浚令名請與相見謂曰早欽風彩何乃龍蟠鳳峙不肯降顧邪答曰誠知公侯敦公旦之博納同尼父之善誘然蜥蜴不能假重雲以升舉鷃雀不能從激風以飛揚是以無因爾時坐上賓客多是吳人皆相顧謂曰武陵蠻夷郡乃有此奇人也浚曰吳太伯端委之化以改被髮文身之俗今乃上挺聖主下生賢佐亦何常之有遜歎曰國其昌也乃有斯人出劉氏小説諸葛靚諸葛靚在吳於朝堂大會孫皓問卿字仲思為何所思對曰在家思孝事君思忠朋友思信如斯而已出世説新語蔡洪晉蔡洪赴洛中人問曰幕府初開群公辟命求英奇於仄陋拔賢俊於巖穴君吳楚之人亡國之餘有何異才而應斯舉答曰夜光之珠不必出於孟津之河盈尺之璧不必採於崑崙之山大禹生於東夷文王出於西羌賢聖所出何必常處昔武王伐紂遷頑民於洛邑得無諸君是其苗裔乎又問洪吳舊姓何如答曰吳府君聖朝之盛佐明時之俊乂朱永長理物之宏德清選之高望嚴仲弼九皋之鴻鵠空谷之白駒顧彥先八音之琴瑟五色之龍章張威伯歲寒之茂松幽夜之逸光陸士龍鴻鵠之徘徊懸鼓之待槌凡此諸君以洪筆為鋤耒以紙札為良田以玄墨為稼穡以義禮為豐年以談論為英華以忠恕為珍寶著文章為錦繡蘊五經為繒帛坐謙虛為席薦張議意為幃幕行仁義為室宇循道德為牆宅者矣出劉氏小説范百年宋梁州范百年因事謁明帝帝言次及廣州貪泉因問之曰卿州復有此水否百年答曰梁州唯有文川武鄉廉泉讓水又問卿宅在何處曰臣居廉讓之間上稱善後除梁州刺史出談藪張融吳郡張融字思光長史暢之子郎中緯之孫融神明俊出機辨如流嘗謁太祖於太極西堂彌時之方登上笑曰卿至何遲答曰自地升天理不得速融為中書郎嘗歎曰不恨我不見古人恨古人不見我融善草隸太祖嘗語曰卿書殊有骨力但恨無二王法答曰非恨臣無二王法亦恨二王無臣法出談藪庾杲之齊武帝嘗謂群臣曰我後當何諡莫有對者王儉因目庾杲之對果之曰陛下壽比南山與日月齊明千載之後豈是臣子輕所度量時人稱其辨答出談藪王儉齊王儉字仲寶金紫僧綽之子侍中曇首之孫少孤幼有圭璋器四五歲與凡童有異常為五言詩曰稷契匡虞夏伊呂翼商周撫己愧前哲斂袵歸山丘故論者以宰相許之後為吏部尚書有客姓談詣儉求官儉曰齊桓滅談那得有汝答曰談子奔莒所以有僕儉賞之帝常幸樂遊宴群臣奉樂帝曰好音樂孰與朕同對曰沐浴皇風並沾比屋亦既在齊不知肉味帝稱善儉嘗集才學之士纍物而麗之謂之麗事麗事自此始也諸客皆窮唯廬江何憲為勝乃賞以五色花簟白團扇憲坐簟執扇意氣自得秣陵令王摛後至操筆便成事既煥美詞復華麗摛乃命左右抽簟掣扇登車而去儉笑曰所謂大力負之而趨出談藪周顒汝南周顒隱居鍾山長齋蔬食王儉謂之曰卿在山中何所啖食答曰赤米白鹽緑葵紫蓼又曰菜何者最美顒曰春初早韭秋暮晚菘顒歷中書侍郎出談藪王融魏使宋辨至敕王融兼主客郎中融問辨曰秦西冀北實多駿驥而彼所獻乃駑駘之不若求名檢事殊為未知且將信誓有時而爽而駉駉牧馬或未能嗣辨曰不容虛為之名當是不習水土融曰周穆馬迹遍周天下若騏驥之性因地而遷則造父之策有時而躓辨曰卿何勤勤於千里融曰卿國既名其優劣卿以相訪若於千里必至聖主將駕之鼓車辨不能答出談藪李膺梁李膺有才辨武帝謂之曰今之李膺何如昔時李膺答曰臣以為勝昔時李膺仕桓靈之朝今之李膺奉唐虞之主衆皆悅服出談藪商鏗東郡商鏗名子為外臣外臣仕為廷尉評鏗入謝恩武帝問卿名子外臣何為令其入仕鏗答曰外臣生於齊季故人思匿迹今幸遭聖代草澤無復遺人上大悅出談藪蕭琛武帝嘗以棗擲蘭陵蕭琛琛仍取栗擲帝正中面曰陛下投臣以赤心臣敢戰栗於陛下琛嘗於御座飲酒於北使員外常侍李道固不受曰公庭無私禮不容受卿勸衆皆失色恐無以酬琛徐曰詩所謂雨我公田遂及我私道固乃屈狀受酒琛歷尚書左丞出談藪朱淹後魏太皇太后馮氏崩齊使散騎常侍裴昭明來弔欲以朝服行事主客問之昭明曰不聽朝服行禮義出何典著作佐郎朱淹接對謂之曰吉凶不同禮有成數玄冠不弔童孺共知昔季孫將行請遭喪之禮千載之後猶共稱之卿遠自江南奉慰不能式遵成事乃云義出何典行人得失何甚異哉昭明曰齊帝昔崩李彪通弔於時初不素服齊朝不以為報那見苦得邀迫淹曰彼朝不遵高宗追遠之慕乃逾月即吉李彪行弔之時齊之君臣皆以鳴玉盈廷朱紫照日彪既不被主人之命何容獨以素服間廁衣冠之中哉來責雖高未敢聞命我皇帝仁孝之性侔於有虞諒暗已來百官聽於冢宰卿豈得以此方彼也明乃搖手而言曰三皇不同禮亦知得失所歸淹曰若如來談卿以虞舜高宗非邪明對曰非孝無親請裁弔服今為魏朝所逼必獲罪於本邦淹曰彼有君子卿將命抗中應有高賞若無君子但令有光國之譽雖復非理得罪亦復何嫌南史董狐自當直筆高祖賞之轉著作郎齊又使員外郎何憲主客邢宗慶來朝遣淹接對宗慶謂淹曰南北連和既久而比棄信絶好為利而動豈是大國善鄰之義淹曰夫為王者不拘小節中原有菽工採者獲多豈得眷眷守尾生之信且齊先王歷事宋朝荷恩積世豈應便爾篡奪慶等相顧失色何憲知淹昔從南入北謂淹曰卿何不作于禁而作魯肅淹曰我捨危就順欲追蹤陳韓何于禁之有憲不能答出談藪崔光後魏高祖名子曰恂愈悅懌崔光名子勵勗勉高祖謂光曰我兒名傍皆有心卿兒名傍皆有力答曰所謂君子勞心小人勞力上大嗟悅出談藪陳元康北齊河陽陳元康刀筆吏也善暗書嘗雪夜太祖命作軍書頃爾數十紙筆不暇凍太祖喜曰此人何如孔子自此信任焉故時人謂之語曰三崔兩張不如一陳元康三崔暹季舒昂也兩張德微纂也出談藪李諧北齊頓丘李諧彭城王嶷之孫吏部尚書平之子少俊爽有才辨為黃門侍郎除名作述身賦其略曰獨浩然而任己同虛舟而不繫既未識其所以來豈知其所以逝於是得喪同遣忘懷自深遇物棲息觸地山林雖類西浮之迹何異東都之心除散騎常侍為聘梁使至梁遣主客范胥迎接胥問曰今猶可暖北間當少寒於此諧答曰地居陰陽之正寒暑適時不知多少胥曰所訪鄰下豈是側景之地諧曰是皇居帝里相去不遠可得統而言之胥曰洛陽既稱盛美何事廷鄴諧曰不常厥邑於茲五遷王者無外所在關河復何怪胥曰殷人毀厄故遷相圯耿貴朝何為而遷諧曰聖人藏往知來相時而動何必候於隆替胥曰金陵王氣肇於先代黃旗紫蓋本出東南君臨萬邦故宜在此諧曰帝王符命豈得與中國比隆紫蓋黃旗終於入洛胥默而無答江南士子莫不嗟尚事畢江浦賦詩曰帝獻二儀合黃華千里清邊笳城上響寒月浦中明出談藪盧愷禮部尚書范陽盧愷兼吏部選達野客師為蘭州總管客師辭曰客師何罪遣與突厥隔牆愷曰突厥何處得有牆客師曰肉為酪冰為漿穹廬為帳氈為牆愷中書監子剛之子也出談藪盧思道武陽太守盧思道常曉醉於省門見從姪賁賁曰阿父何處飲來凌晨嵬峨思道曰長安酒二百價不嵬峨何嵬峨賁燕郡公景仁之子中書侍郎景裕之猶子位歷太常卿出談藪王元景王元景嘗大醉楊遵彥謂之曰何太低昂元景曰黍熟頭低麥熟頭昂黍麥俱有所以低昂矣出談藪
