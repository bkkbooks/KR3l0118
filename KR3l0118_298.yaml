body:
  text: 柳智感柳智感唐河東柳智感以貞觀初為長舉縣令一夜暴死明旦而蘇說云始忽為冥官所追大官府使者以智感見謂感曰今有一官闕故枉君任之智感辭以親老且自陳福業未應便死王使勘籍信然因謂曰君未當死可權判録事智感許諾謝吏引退至曹有五判官感為第六其廳事是長屋人坐三間各有牀案務甚繁擁西頭一坐處無判官吏引智感就空坐群吏將文書簿帳來取智感署署案上退立階下智感問之對曰氣惡逼公但遙以中事答智感省讀如人間者於是為判句文有頃食來諸判官同食智感亦欲就之諸判官曰君既權判不宜食此感從之日暮吏送智感歸家蘇而方曉自歸家中日暝吏復來迎至旦如故知幽顯晝夜相反矣於是夜判冥事晝臨縣職歲餘智感在冥曹因起至廁於堂西見一婦女年三十許姿容端正衣服鮮明立而掩涕智感問何人答曰興州司倉參軍之婦也攝來此方別夫子是以悲傷智感以問吏史曰官攝來有所案問且以證其夫事智感因謂女人曰感長舉縣令也夫人若被堪問幸自分就無為牽引司倉俱死無益婦人曰誠不願引之恐官相逼耳感曰夫人幸勿相牽可無逼迫之慮婦人許之既而還州先問司倉婦有疾司倉曰吾婦年少無疾智感以所見告之說其衣服形貌且勸令作福司倉走歸家見婦在機中織無患也不甚信之後十餘日司倉婦暴死司倉始懼而作福禳之又興州官二人考滿當赴京選謂智感曰君判冥道事請問吾選得何官智感至冥以某姓名問小録事曰名簿並封左右函中檢之二日方可得後日乃具告二人二人至京選吏部擬官皆與報不同州官聞之以語智感後問小録事覆檢簿云定如所檢不錯也既而選人過門下門下審退之吏部重送名果是名簿檢報者於是衆咸信服智感每於冥簿見其親識名狀及死時日月報之使修福多得免智感權判三年其吏部來告曰已得隆州李司戶授正官以代公不復判矣智感至州因告刺史李德鳳遣人往隆州審焉其司戶已卒問其死日即吏來告之時也從此遂絶州司遣智感領囚送至鳳州界囚四人皆逃智感憂懼捕捉不獲夜宿傳舍忽見其故部吏來告曰囚盡得矣一人死三人在南山西谷中並已擒縛願公勿憂言畢辭去智惑即請共入南山西谷果得四囚知走不免因來抗拒智感格之殺一囚三囚受縛果如所告智感今存任慈州司法光祿卿柳亨說之亨為邛州刺史見智感親問之然御史裴同節亦云見數人說如此李播高宗將封東嶽而天久霖雨帝疑之使問華山道士李播為奏玉京天帝播淳風之父也因遣僕射劉仁軌至華山問播封禪事播云待問泰山府君遂令呼之良久府君至拜謁庭下禮甚恭播云唐皇帝欲封禪如何府君對曰合封後六十年又合一封播揖之而去時仁軌在播側立見府君屢顧之播又呼回曰此是唐宰相不識府君無宜見怪既出謂仁軌曰府君薄怪相公不拜令左右録此人名恐纍盛德所以呼回處分耳仁軌惶汗久之播曰處分了當無苦也其後帝遂封禪狄仁傑高宗時狄仁傑為監察御史江嶺神祠焚燒略盡至端州有蠻神仁傑欲燒之使人入廟者立死仁傑募能焚之者賞錢百千時有二人出應募仁傑問往復何用人云願得敕牒仁傑以牒與之其人持往至廟便云有敕因開牒以入宣之神不復動遂焚毀之其後仁傑還至汴州遇見鬼者曰侍御後有一蠻神云被焚舍常欲報復仁傑問事竟如何見鬼者云侍御方須台輔還有鬼神二十餘人隨從彼亦何所能為久之其神還嶺南矣王萬徹武太后暮年宮人多死一月之間已數百人太后乃召役鬼者王萬徹使視宮中徹奏曰天皇以陛下久臨萬國神靈不樂以致是也太后曰可奈何徹曰臣能禳之乃施席於殿前持刀噀水四向而呪有頃曰皇帝至徹乃廷詰帝曰天道有去就時運有廢興昔皇帝佐陛下母臨四海大弘姜嫄文母之化遂見推載萬國歸心此天意非人事也陛下聖靈在天幽明理隔何至不識機會損害生人若此之酷哉帝乃空中謂之曰殆非我意此王皇后訴冤得申耳何止後宮將不利於汝君太后及左右了了聞之太后默然改容乃命撤席明年而五王援立中宗遷太后於上陽宮以幽崩太學鄭生垂拱中駕在上陽宮太學進士鄭生晨發銅駝里乘曉月度洛橋下有哭聲甚哀生即下馬察之見一艷女翳然蒙袂曰孤養於兄嫂嫂惡苦我今欲赴水故留哀須臾生曰能逐我歸乎應曰婢御無悔遂載與之歸所居號曰汜人能誦楚詞九歌招魂九辨之書亦常擬詞賦為怨歌其詞艷麗也莫有屬者因撰風光詞曰隆往秀兮昭盛時播薰緑兮淑華歸故室荑與處萼兮潛重房以飾姿見耀態之韶華兮蒙長靄以為幃醉融光兮眇眇瀰瀰遠千里兮涵煙眉晨陶陶兮暮熙熙無蜲娜之穠條兮娉盈盈以披遲酬遊顏兮倡蔓卉縠流倩電兮髮隨旎生居貧汜人嘗出輕繒一端賣之有胡人酬千金居歲餘生將遊長安是夕謂生曰我湖中蛟室之妹也謫而從君今歲滿無以久留君所乃與生訣生留之不能竟去後十餘年生兄為嶽州刺史會上巳日與家徒登嶽陽樓望鄂渚張宴樂酣生愁思吟曰情無限兮蕩洋洋懷佳期兮屬三湘聲未終有畫艫浮漾而來中為綵樓高百餘尺其上帷帳欄籠盡飾帷囊有彈弦鼓吹者皆神仙峨眉被服煙電裾袖皆廣尺中一人起舞含嚬怨慕形類汜人舞而歌曰泝青春兮江之隅拖湖波兮裊緑裾荷拳拳兮來舒非同歸兮何如舞畢斂袖索然須臾風濤崩怒遂不知所往趙州參軍妻趙州盧參軍新婚之任其妻甚美數年罷官還都五月五日妻欲之市求續命物上於舅姑車已臨門忽暴心痛食頃而卒盧生號哭畢往見正諫大夫明崇儼扣門甚急崇儼驚曰此端午日款關而厲是必有急遂趨而出盧氏再拜具告其事明云此泰山三郎所為遂書三符以授盧還家可速燒第一符如人行十里不活更燒其次若又不活更燒第三符橫死必當復生不來真死矣盧還如言纍燒三符其妻遂活頃之能言初云被車載至泰山頂別有宮室見一年少云是三郎令侍婢十餘人擁入別室侍粧梳三郎在堂前與他少年雙陸候粧梳畢方擬宴會婢等令速粧已緣眷戀故人尚且悲淚有頃聞人款門云是上利功曹適奉都使處分令問三郎何以取戶家婦宜即遣還三郎怒云自取他人之妻預都使何事呵功曹令去相與往復其辭甚惡須臾又聞款門云是直符使者都使令取盧家婦人對局勸之不聽對局曰非獨纍君當禍及我又不聽尋有疾風吹黑雲從崖頂來二使唱言太一直符今且至矣三郎有懼色風忽卷宅高百餘丈放之人物糜碎唯盧氏獲存三使送還至堂上見身臥牀上意甚悽恨被推入形遂活
