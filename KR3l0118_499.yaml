body:
  text: 崔鉉崔鉉元略之子京兆參軍盧甚之死鉉之致也時議冤之鉉子沆乾符中亦為丞相黃巢亂赤其族物議以為甚之報焉初崔瑄雖諫官婚姻假回私事也甚雖府職乃公事也相與爭驛廳甚既下獄與宰相書則以己比孟子而方瑄錢鳳瑄既朋党宏大莫不為盡力甚者出于單微加以鉉亦瑄之門生方為宰相遂加誣罔奏焉瑄自左補闕出為陽翟宰甚行及長樂坡賜自盡中使適回遇瑄囊出其喉曰補闕此盧甚結喉也瑄殊不懌京城不守崔氏之子亦血其族嗚呼謂天道高何其明哉王鐸故相晉國公王鐸為丞郎時李駢判度支每年江淮運米至京水陸腳錢斗計七百京國米价每斗四十議欲令江淮不運米但每斗納錢七百鐸曰非計也若干京國糴米必耗京國之食若運米實關中自江淮至京兼濟無限貧民也時糴米之制業已行竟無敢沮其議者都下官糴米果大貴未經旬而度支請罷以民無至者故也于是識者乃服鐸之察事矣鐸卒以此大用李蠙李蠙與王鐸進士同年后俱得路嘗恐鐸之先相而己在其后也迨路岩出鎮益失其勢鐸柔弱易制中官愛焉洎韋保衡將欲大拜不能先于恩地將命鐸矣蠙陰知之挈一壺家酒詣鐸曰公將登庸矣吾恐不可以攀附也愿先事少接左右可乎即命酒以飲鐸妻李氏疑其堇焉使女奴傳言于鐸曰一身可矣愿為妻兒謀蠙惊曰以吾斯酒為鴆乎即命一大爵自引滿飲之而去韋保衡韋保衡欲除裴修為省郎時李璋為右丞韋先遣盧望來申意探其可否李曰相公但除不合先問某盧以時相事權設為李所沮則傷威重因勸韋勿除衲衣道人唐有士人退朝詣友生見衲衣道人在坐不懌而去他日謂友生曰公好毳褐夫何也吾不知其言適且覺其臭友生答曰毳褐之外也豈甚銅乳銅乳之臭并肩而立接跡而趨公處其間曾不嫌恥乃譏予與山野有道之士游乎南朝高人以蛙鳴及蒿菜胜鼓吹吾視毳褐愈于今之朱紫遠矣路群盧弘正中書舍人路群與給事中盧弘正性相異而相善路清瘦古淡未嘗言市朝盧魁梧富貴未嘗言山水路日謀高臥有制草則就宅視之盧未嘗請告有客旅則就省謁之雖所好不同而相親至一日都下大雪路在假盧將晏入道過新昌第路方于南垣茅亭肆目山雪鹿巾鶴氅构火命觴以賞嘉致聞盧至大喜曰適我愿兮亟命迎入盧金紫華煥意氣軒昂路道服而坐情趣孤洁路曰盧六盧六曾莫顧我何也盧曰月限向滿家食相仍日詣相庭以圖外任路色慘曰駕肩權門何至于是且有定分徒勞爾形家釀稍醇能一醉否盧曰省有急事俟吾決之路又呼侍兒曰盧六欲去特早來藥糜分二器我與盧六同食盧振聲曰不可路曰何也盧曰今旦飯冷且欲遐征家饌已食炮炙矣時人聞之以為路之高雅盧之俊邁各盡其性畢諴畢諴家本寒微咸通初其舅尚為太湖縣伍伯諴深恥之常使人諷令解役為除官反复數四竟不從命乃特除選人楊載為太湖令諴延至相第囑之為舅除其猥藉津送入京楊令到任具達諴意伍伯曰某賤人也豈有外甥為宰相耶楊堅勉之乃曰某每歲秋夏恒相享六十千事例錢苟無敗缺終身优足不審相公欲除何官耶楊乃具以聞諴諴亦然其說竟不奪其志也王蜀偽相庾傳素與其從弟凝績曾宰蜀州唐興縣郎吏有楊會者微有才用庾氏昆弟念之洎迭秉蜀政欲為楊會除馬長以酬之會曰某之吏役遠近皆知忝冒為官寧掩人口豈可將數千家供侍而博一虛名馬長乎后雖假職名止除檢校官竟不舍縣役矣李師望乃宗屬也自負才能欲以方面為己任因旅游邛蜀備知南蠻勇怯遂上書請割西川數州于臨邛建定邊軍節度詔旨允之乃以師望自鳳翔少尹擢領此任于時西川大將嫉其分裂巡屬陰通南詔于是蠻軍為近界鄉豪所道侵軼蜀川戎校竇滂不能止遏師望亦因此受黜焉高駢渤海王太尉高駢鎮蜀日因巡邊至資中郡舍于刺史衙對郡山頂有開元佛寺是夜黃昏僧徒禮贊螺唄間作渤海命軍候悉擒械之來晨笞背斥逐召將吏而謂之曰僧徒禮念亦無罪過但以此寺十年后當有禿子數十作亂我故以是厭之其后土人皆髡執兵號大髡小髡据此寺為寨韋宙相國韋宙善治生江陵府東有別業良田美產最號膏腴積稻如坻皆為滯穗咸通初授岭南節度使懿宗以番禺珠翠之地垂貪泉之戒宙從容奏曰江陵庄積谷尚有七千堆固無所貪矣帝曰此所謂足谷翁也王氏子京輦自黃巢退后修葺殘毀之處時定州王氏有一兒俗號王酒胡居于上都巨富納錢三十萬貫助修朱雀門僖宗詔令重修安國寺畢親降車輦以設大齋乃扣新鐘十撞舍錢一萬貫命諸大臣各取意而擊上曰有能舍一千貫文者即打一槌齋罷王酒胡半醉入來徑上鐘樓連打一百下便于西市運錢十萬入寺劉蛻桐廬人早以文學進士其父嘗戒之曰任汝舉進取窮之與達不望于汝吾沒后慎勿祭祀乃乘扁舟以漁釣自娛竟不知其所適蛻后登華貫出典商于霜露之思于是乎止臨終亦戒其子如先考之命蜀禮部尚書纂即其息也常為同列言之君子曰名教之家重喪祭劉氏先德是何人斯以蛻之通人抑有其說時未諭也皮日休咸通中進士皮日休上書兩通其一請以孟子為學科其略云臣聞聖人之道不過乎經經之降者不過乎史史之降者不過乎子子不異道者孟子也舍是而諸子必斥乎經史聖人之賊也文多不載請廢庄列之書以孟子為主有能通其義者科選請同明經其二請以韓愈配饗太學其略曰臣聞聖人之道不過乎求用用于生前則一時可知也用于死后則萬世可知也又云孟子荀卿翼輔孔道以至于文中子文中子之道曠矣能嗣其美者其唯韓愈乎日休字襲美襄陽竟陵人幼攻文隱于鹿門山號醉吟先生初至場中禮部侍郎鄭愚以其貌不揚戲之曰子之才學甚富其如一日何對曰侍郎不可以一日而廢二日謂不以人廢言也舉子咸推伏之官至國子博士寓蘇州與陸龜蒙為文友著文藪十卷皮子三卷人多傳之為錢鏐判官郭使君江陵有郭七郎者其家資產甚殷乃楚城富民之首江淮河朔間悉有賈客仗其貨買易往來者乾符初年有一賈者在京都久無音信郭氏子自往訪之既相遇盡獲所有僅五六萬緡生耽悅煙花迷于飲博三數年后用過太半是時唐季朝政多邪生乃輸數百萬于鬻爵者門以白丁易得橫州刺史遂決還鄉時渚宮新罹王仙芝寇盜里閭人物與昔日殊生歸舊居都無舍宇訪其骨肉數日方知弟妹遇兵亂已亡獨母與一二奴婢處于數間茅舍之下囊橐蕩空旦夕以紉針為業生之行李間猶有二三千緡緣茲复得蘇息乃佣舟與母赴秩過長沙入湘江次永州北江墂有佛寺名兜率是夕宿于斯結纜于大槦樹下夜半忽大風雨波翻岸崩樹臥枕舟舟不胜而沉生與一梢工拽母登岸僅以獲免其余婢仆生計悉漂于怒浪遲明投于僧室母氏以惊得疾數日而殞生慞惶馳往零陵告州牧州牧為之殯葬日复贈遺之既丁憂遂寓居永郡孤且貧又無親識日夕厄于凍餒生少小素涉于江湖頗熟風水間事遂與往來舟船執梢以求衣食永州市人呼為捉梢郭使君自是狀貌異昔共篙工之党無別矣李德權京華有李光者不知何許人也以諛佞事田令孜令孜嬖焉為左軍使一旦奏授朔方節度使敕下翌日無疾而死光有子曰德權年二十余令孜遂署劇職會僖皇幸蜀乃從令孜扈駕止成都時令孜與陳敬瑄盜專國柄人皆畏威李德權者處于左右遐邇仰奉奸豪輩求名利多賂德權以為關節數年之間聚賄千萬官至金紫光祿大夫檢校右仆射后敬瑄敗為官所捕乃脫身遁于复州衣衫百結丐食道途有李安者常為复州后槽健兒與父相熟忽睹德權念其藍縷邀至私舍安無子遂認以為侄未半載安且死德權遂更名彥思請繼李安效力蓋慕彼衣食耳尋獲為牧守圉人有識者皆目之曰看馬李仆射
