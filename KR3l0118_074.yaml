body:
  text: 俞叟俞叟尚書王公潛節度荊南時有呂氏子衣敝舉策有飢寒之色投刺來謁公不為禮甚怏怏因寓於逆旅月餘窮乏益甚遂鬻所乘驢於荊州市有市門監俞叟者召呂生而語且問其所由呂生曰吾家于渭北家貧親老無以給旨甘之養府帥公吾之重表丈也吾不遠而來冀哀吾貧而周之入謁而公不一顧豈非命也叟曰某雖貧無資食以賙吾子之急然向者見吾子有飢寒色甚不平今夕為吾子具食幸宿我宇下生無以辭焉呂生許諾於是延入一室湫隘卑陋摧簷壞垣無床榻茵褥致敝席於地與呂生坐語久命食以陶器進脫粟飯而已食訖夜既深謂呂生曰吾早年好道常隱居四明山從道士學卻老之術有志未就自晦迹於此僅十年而荊人未有知者以吾子困於羇旅得無動於心耶今夕為吾子設一小術以致歸路裹糧之費不亦可乎呂生雖疑誕妄然甚覺其異叟因取一缶合於地僅食頃舉而視之見一人長五寸許紫綬金腰帶俯而拱焉俞叟指曰此乃尚書王公之魂也呂生熟視其狀貌果類王公心默而異之因戒曰呂乃汝之表姪也家苦貧無以給旦夕之贍故自渭北不遠而來汝宜厚給館穀盡親親之道汝何自矜曾不一顧豈人心哉今不罪汝宜厚資之無使為留滯之客紫衣僂而揖若受教之狀叟又曰呂生無僕馬可致一匹一僕縑二百匹以遺之紫衣又僂而揖於是卻以缶合於上有頃再啓之已無見矣明旦天將曉叟謂呂生曰子可疾去王公旦夕召子矣及歸逆旅王公果使召之方見且謝曰吾子不遠見訪屬軍府務殷未果一日接言深用為愧幸吾子察之是日始館呂生驛亭與宴遊纍日呂生告去王公贈僕馬及縑二百呂生益奇之然不敢言及歸渭北後數年因與友人數輩會宿語及靈怪始以其事説於人也出宣室志陳季卿陳季卿者家於江南辭家十年舉進士志不能無成歸羇棲輦下鬻書判給衣食常訪僧於青龍寺遇僧他適因息於暖閣中以待僧還有終南山翁亦伺僧歸方擁爐而坐揖季卿就爐坐久謂季卿曰日已晡矣得無餒乎季卿曰實飢矣僧且不在為之奈何翁乃於肘後解一小囊出藥方寸止煎一杯與季卿曰粗可療飢矣季卿啜訖充然暢適飢寒之苦洗然而愈東壁有寰瀛圖季卿乃尋江南路因長歎曰得自渭泛於河遊於洛泳於淮濟于江達于家亦不悔無成而歸翁笑曰此不難致乃命僧童折階前一竹葉作葉舟置圖中渭水之上曰公但注目於此舟則如公向來所願耳然至家慎勿久留季卿熟視久之稍覺渭水波浪一葉漸大席帆既張恍然若登舟始自渭及河維舟於禪窟蘭若題詩於南楹云霜鐘鳴時夕風急亂鴉又望寒林集此時輟掉悲且吟獨向蓮花一峰立明日次潼關登岸題句於關門東普通院門云度關悲失志萬緒亂心機下坂馬無力掃門塵滿衣計謀多不就心口自相違已作羞歸計還勝羞不歸自陝東凡所經歷一如前願旬余至家妻子兄弟拜迎於門夕夕原作側據明鈔本改有江亭晚望詩題于書齋云立向江亭滿目愁十年前事信悠悠田園已逐浮雲散鄉里半隨逝水流川上莫逢諸釣叟浦邊難得舊沙鷗不緣齒髮未遲暮吟對遠山堪白頭此夕謂其妻曰吾試期近不可久留即當進掉乃吟一章別其妻云月斜寒露白此夕去留心酒至添愁飲詩成和淚吟離歌棲鳳管別鶴怨瑤琴明夜相思處秋風吹半衾將登舟又留一章別諸兄弟云謀身非不早其奈命來遲舊友皆霄漢此身猶路歧北風微雪後晚景有雲時惆悵清江上區區趁試期一更後復登葉舟泛江而逝兄弟妻屬慟哭於濱謂其鬼物矣一葉漾漾遵舊途至於渭濱乃賃乘復遊青龍寺宛然見山翁擁褐而坐季卿謝曰歸則歸矣得非夢乎翁笑曰後六十日方自知而日將晚僧尚不至翁去季卿還主人後二月季卿之妻子金帛自江南來謂季卿厭世矣故來訪之妻曰某月某日歸是夕作詩於西齋並留別二章始知非夢明年春季卿下第東歸至禪窟及關門蘭若見所題兩篇翰墨尚新後年季卿成名遂絶粒入終南山去出慕異記陳生茅山陳生者休糧服氣所居草堂數間偶至延陵到傭作坊求人負擔藥物却歸山居以價賤賤原作錢據明鈔本改多不肯有一夫壯力然神少頗若癡者疥瘡滿身前拜曰去得遂令挈囊而從行其直多少亦不問也既至因願留採薪都不計其價與陳生約日五束陳曰吾辟穀無飯與餐答曰某是貧窮人何處得食但斸草根餐亦可矣遂每日斫柴十束五束留於房內自燒五束供陳生會山下有衣冠家妻患齒詣陳生覓藥其家日求之又令小婢送梨果餅子之類陳生休糧果食亦不食也每至則被傭者接而食之仍笑謂曰明日更送來我當有藥如此者數四一日傭者並送柴十束納陳生處為兩日用夜後遂扃門熾火攜一小鍋入陳生密窺之見于葫蘆中瀉水銀數合煎之攪如稀餳投一丸藥乃為金矣傭者撚兩丸以紙裹置懷中餘作一金餅密出門去明日日高起求藥者已至乃持丸者付之令患齒者含之一丸未半乃平復矣痛止第出蟲數十陳生伺傭者出于房內搜而觀之得書二卷不喻其旨遂藏之傭者至大怒罵陳生生不敢隱却還之曰某今去矣遂出門入水沐浴乃變為美少年無復瘡疥也拜訖跳入深澗中遂不知所之出逸史張定張定者廣陵人也童幼入學天寒月曉起早街中無人獨行百餘步有一道士行甚急顧見之立而言曰此可教也因問汝何所好答曰好長命耳道流曰不難致汝有仙骨求道必成且教汝變化之術勿泄於人十年外吾自迎汝因以口訣教之定謹訥小心於家甚孝亦曾私為此術召鬼神化人物無不能者與父母往連水省親至縣有音樂戲劇衆皆觀之定獨不往父母曰此戲甚盛親表皆去汝何獨不看邪對曰恐尊長要看兒不得去父母欲往定曰此有有原作又據明鈔本改青州大設可亦看也即提一水瓶可受二斗以來空中無物置於庭中禹步繞三二匝乃傾於庭院內見人無數皆長六七寸官寮將吏士女看人喧闐滿庭即見無比設廳戲場局筵隊仗音樂百戲樓閣車棚無不精審如此宴設一日父母與看之至夕復側瓶於庭人物車馬千群萬隊邐迤俱入瓶內父母取瓶視之亦復無一物又能自以刀劍剪割手足刳剔五藏分挂四壁良久自復其身晏然無苦每見圖障屏風有人物音樂者以手指之皆能飛走歌舞言笑趨動與真無異父母問其從何學之曰我師姓藥海陵山神仙也已錫升天之道約在十年今七年矣辭家入天柱潛山臨去白父母曰若有意念兒自歸來無深慮也如是父母念之即便還家尋復飛去一日謂父母曰十六年後廣陵為瓦礫矣可移家海州以就福地留丹二粒與父母曰服之百餘年無疾自此不復歸父母服丹神氣輕爽飲食嗜好倍於少壯者遂移居海州乾符中父母猶在出仙傳拾遺石旻有石旻者不知何許人也浪迹江湖之間有年數矣道術玄妙殆不可測長慶中客于宛陵郡有雷氏子常為宣城部將一日與友人數輩會飲於郡南別墅旻亦在座其家僮網得一魚長數尺致于舍是日雷生與客俱深醉諸客盡去獨旻宿雷氏別墅時夏暑方甚及明日視其魚已敗爛不可食矣家僮將棄之旻謂之曰此魚雖敗吾有良藥尚可活之安可棄耶雷生笑曰先生妄矣誠有良劑安能活此魚耶曰吾子幸觀之于是衣中出一小囊囊有藥數粒投於敗魚之上僅食頃其魚鮮潤如初俄而搖鬣振鱗若在洪流中雷生驚異再拜謝曰先生之術可謂神矣某輩塵俗聾瞽望先生高蹤若井鮒與雲禽焉得而為伍乎先是雷生有癥疾積年既而求旻衣中之丹餌欲冀瘳其久苦旻不可且曰吾之丹至清至廉爾曹俗人嗜好無節臟腑之內腥羶委集設使以吾丹餌求置其中則臟腑之氣與藥相攻若水火之交戰寧有全人乎慎不可食旻又言神仙不難得但塵俗多纍若檻猿籠鳥徒有騫翔超騰之心安可致乎會昌中卒于吳郡也出宣室志唐武宗朝術士唐武宗皇帝好神仙異術海內道流方士多至輦下趙歸真探賾玄機以制鉛汞見之者無不竦敬請於禁中築望仙臺高百尺以為驂鸞馭鶴可刻期而往常云飛鍊須得生銀詔使於樂平山收採既而大役工徒所出者皆頑石礦無從而得歸真乃齋醮數朝以御札致于巖穴俄有老人杖策而至曰山川寶物蓋為有道而出況明主以修真為念是何感應不臻尊師無復懷憂明日當從請語罷而出莫知所之是夕有聲如雷山礦豁開數十丈銀液坌然而湧與入用之數相符禁中修煉至多外人少知其術復有金陵人許元長王瓊者善書符幻變近于役使鬼神會昌中召至京國出入宮闈武皇謂之曰吾聞先朝有明崇儼善於符籙常取羅浮柑子以資御果萬里往來止於旬日我師得不建先朝之術比美崇儼乎建字疑是逮字之訛按劇談録下此句作我雖聖德不逮先朝卿之術豈便劣於崇儼元長起謝曰臣之受法未臻玄妙若涉越山海恐誣聖德但千里之間可不日而至武宗曰東都常進石榴時已熟矣卿是今夕當致十顆元長奉詔而出及旦寢殿始開以金盤貯石榴置于御榻俄有中使進奏亦以所失之數上聞靈驗變通皆此類也王瓊妙於祝物無所不能方冬以藥封桃杏數株一夕繁英盡發芳芬穠艷月餘方謝及武皇厭代歸真與瓊俱竄逐嶺表唯元長逸去莫知所在出列仙談録明鈔本作出列仙傳按見劇談録卷下
