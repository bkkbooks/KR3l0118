body:
  text: 夢遊下元稹元相稹為御史鞫獄梓潼時白樂天在京與名輩遊慈恩寺小酌花下為詩寄元曰花時同辭破春愁醉折花枝作酒籌忽憶故人天際去計程今日到梁州時元果及褒城亦寄夢遊詩曰夢君兄弟曲江頭也向慈恩院裡游驛吏喚人排馬去忽驚身在古梁州千里魂交合若符契也段成式段成式常言聞於醫曰藏氣陰多則夢數陽壯則少夢夢亦不復記夫瞽者無夢則知者習也成式表兄盧有則夢看擊鼓及覺小弟戲叩門為衙鼓也又姊壻裴元裕言群從中有悅鄰女者夢妓遺二櫻桃食之及覺核墜枕側李鉉著李子正辨言至精之夢則夢中之身可見如劉幽求見妻夢中身也則知夢不可以一事推矣愚者少夢不獨至人聞之騶皂百夕無一夢也邢鳳元和十年沈亞之始以記室從事隴西公軍涇州而長安中賢士皆來客之五月十八日隴西公與客期宴于東池便館既半隴西公曰余少從邢鳳遊記得其異請言之客曰願聽公曰鳳帥家子無他能後寓居長安平康里南以錢百萬買故豪洞門曲房之第即其寢而晝偃夢一美人自西楹來環步從容執卷且吟為古粧而高鬟長眉衣方領繡帶被廣袖之襦鳳大悅曰麗者何自而臨我哉美人曰此妾家也妾好詩而常綴此鳳曰幸少留得觀覽於是美人授詩坐西牀鳳發卷視首篇題之曰春陽曲終四句其後他篇皆類此數十句美人曰君必欲傳無令過一篇鳳即起從東廡下几上取彩箋傳春陽曲其詞曰長安少女玩春陽何處春陽不斷腸舞袖弓彎渾忘却羅帷空度九秋霜鳳卒吟請曰何謂弓彎曰妾昔年父母使教妾此舞美人乃起整衣張袖舞數拍為彎弓狀以示鳳既罷美人低頭良久即辭去鳳曰願復少留須臾間竟去鳳亦尋覺昏然忘有所記及更於襟袖得其辭驚視復省所夢事在貞元中後鳳為餘言如是是日監軍使與賓府郡佐及宴隴西獨狐鉉范陽盧簡辭常山張又新武功蘇滌皆歎息曰可記故亞之退而著録明日客復有至者渤海高元中京兆韋諒晉昌唐炎廣漢李吳興姚合洎亞之復集於明玉泉因出所著以示之於是姚合曰吾友王生者元和初夕夢遊吳侍吳王久之聞宮中出輦吹簫擊鼓言葬西施王悲悼不止立詔門客作挽歌詞生應教為詞曰西望吳王闕雲書鳳字牌連江起珠帳擇土葬金叉滿地紅心草三層碧玉階春風無處所悽恨不勝懷詞進王甚佳之及寤能記其事王生本太原人也沈亞之太和初沈亞之將之邠出長安城客索泉邸舍春時晝夢入秦主內史廖舉亞之秦公召至殿前膝前席曰寡人欲強國願知其方先生何以教寡人亞之以昆彭齊桓對公悅遂試補中涓使佐西乞術伐河西亞之帥將卒前攻下五城還報公大悅起勞曰大夫良苦休矣居久之公幼女弄玉壻蕭史先死公謂亞之曰微大夫晉五城非寡人有甚德大夫寡人有愛女而欲與大夫備灑掃可乎亞之少自立雅不欲遇幸臣蓄之固辭不得請拜左庶長尚公主賜金二百斤民間猶謂蕭家公主其日有黃衣人中貴疾騎馬來延亞之入宮闕甚嚴呼公主出鬒髮著偏袖衣裝不多飾其芳殊明媚筆不可模樣侍女祗承分立左右者數百人召見亞之便館居亞之於宮題其門曰翠微宮宮人呼為沈郎院雖備位下大夫繇公主故出入禁衛公主喜鳳簫每吹簫必翠微宮高樓上聲調遠逸能悲人聞者莫不身廢公主七月七日生亞之當無貺壽內史廖會為秦以女樂遺西戎戎主與之水犀小合亞之從廖得以獻公主主悅賞愛重結裙帶上穆公遇亞之禮兼同列恩賜相望於道復一年春公之始平公主忽無疾卒公追傷不已將葬咸陽原公命亞之作挽歌應教而作曰泣葬一枝紅生同死不同金鈿墜芳草香繡滿春風舊日聞簫處高樓當月中梨花寒食夜深閉翠微宮進公公讀詞善之時宮中有出聲若不忍者公隨泣下又使亞之作墓志銘獨憶其銘曰白楊風哭兮石甃髯莎雜英滿地兮春色煙和珠愁紛瘦兮不生綺羅深深埋玉兮其恨如何亞之亦送葬咸陽原宮中十四人殉亞之以悼悵過戚被病猶在翠微宮然處殿外特室不宮中矣居月餘病良已公謂亞之曰本以小女相託久要不謂不得周奉君子而先物故弊秦區區小國不足辱大夫然寡人每見子即不能不悲悼大夫盍適大國乎亞之對曰臣無狀肺腑申公室待罪左庶長不能從死公主君免罪戾使得歸骨父母國臣不忘君恩如日將去公追酒高會聲秦聲舞秦舞舞者擊髆附髀嗚嗚而音有不快聲甚怨公執酒亞之前曰壽豫顧此聲少善願沈郎賡楊歌以塞別公命趣進筆硯亞之受命立為歌辭曰擊髆舞恨滿煙光無處所淚如雨欲擬著辭不成語金鳳銜紅舊繡衣幾度宮中同看舞人間春日正歡樂日暮東風何處去歌卒授舞者雜其聲而道之四座皆泣既再拜辭去公復命至翠微宮與公主侍人別重入殿內時見珠翠遺碎青階下窗紗檀點依然宮人泣對亞之亞之感咽良久因題宮門詩曰君王多感放東歸從此秦宮不復期春景自傷秦喪主落花如雨淚燕脂竟別去命車駕送出函谷關出關已送吏曰公命盡此且去亞之與別語未卒忽驚覺臥邸舍明日亞之為友人崔九萬具道之九萬博陵人諳古謂余曰皇覽云秦穆公葬雍橐泉祈年宮下非其神靈憑乎亞之更求得秦時地志說如九萬言嗚呼弄玉既仙矣惡又死乎張生有張生者家在汴州中牟縣東北赤城坂以饑寒一旦別妻子遊河朔五年方還自河朔還汴州晚出鄭州門到板橋已昏黑矣乃下道取陂中徑路而歸忽於草莽中見燈火熒煌賓客五六人方宴飲次生乃下驢以詣之相去十餘步見其妻亦在坐中與賓客語笑方洽生乃蔽形於白楊樹間以窺之見有長鬚者持杯請措大夫人歌生之妻文學之家幼學詩書甚有篇詠欲不為唱四座勤請乃歌曰歎衰草絡緯聲切切良人一去不復還今夕坐愁鬢如雪長鬚云勞歌一杯飲訖酒至白面年少復請歌張妻曰一之謂甚其可再乎長鬚持一籌筯云請置觥有拒請歌者飲一鍾歌舊詞中笑語准此罰于是張妻又歌曰勸君酒君莫辭落花徒繞枝流水無返期莫恃少年時少年能幾時酒至紫衣者復持杯請歌張妻不悅沉吟良久乃歌曰怨空閨秋日亦難暮夫壻斷音書遙天鴈空度酒至黑衣胡人復請歌張妻連唱三四曲聲氣不續沉吟未唱間長鬚拋觥云不合推辭乃酌一鍾張妻涕泣而飲復唱送胡人酒曰切切夕風急露滋庭草濕良人去不回焉知掩閨泣酒至緑衣少年持杯曰夜已久恐不得從容即當睽索無辭一曲便望歌之又唱云螢火穿白楊悲風入荒草疑是夢中遊愁迷故園道酒至張妻長鬚歌以送之曰花前始相見花下又相送何必言夢中人生盡如夢酒至紫衣胡人復請歌云須有艷意張妻低頭未唱間長鬚又拋一觥於是張生怒捫足下得一瓦擊之中長鬚頭再發一瓦中妻額闃然無所見張君謂其妻已卒慟哭連夜而歸及明至門家人驚喜出迎君問其妻婢僕曰娘子夜來頭痛張君入室問其妻病之由曰昨夜夢草莽之處有六七人遍令飲酒各請歌孥凡歌六七曲有長鬚者頻拋觥方飲次外有發瓦來第二中孥額因驚覺乃頭痛張君因知昨夜所見乃妻夢也劉道濟光化中有文士劉道濟止於天台山國清寺嘗夢見一女子引生入窗下有側柏樹葵花遂為伉儷後頻於夢中相遇自不曉其故無何於明州奉化縣古寺內見有一窗側柏葵花宛若夢中所遊有一客官人寄寓於此室女有美才貧而未聘近中心疾而生所遇乃女子之魂也又有彭城劉生夢入一倡樓與諸輩狎飲爾後但夢便及彼處自疑非夢所遇之姬芳香常襲衣亦心邪所致聞於劉山甫也鄭昌圖鄭昌圖登第歲居長安夜後納涼於庭夢為人毆擊擒出春明門至合大路處石橋上乃得解遺其紫羅履一隻奔及居而寤甚困言於弟兄而牀前果失一履旦今人於石橋上追尋得之韓確越州有盧冊者舉秀才家貧未及入京在山陰縣顧樹村知堰與表兄韓確同居自幼嗜鱠嘗憑吏求魚韓方寐夢身為魚在潭有相忘之樂見二漁人乘艇張網不覺身入網被取擲桶中覆之以葦復覩所憑吏就潭商價吏即揭鰓貫綆楚痛殆不可忍及至舍歷認妻子奴僕有頃置砧斫之苦若脫膚首落方覺神癡良久盧驚問之具述所夢遽呼吏訪所市魚處洎漁子形狀與夢不差韓後入釋住祗園寺時開成二年也
