body:
  text: 龍張溫王蜀時梓州有張溫者好捕魚曾作客館鎮將夏中攜賓觀魚偶游近龍潭之下熱甚志不快自入水舉网獲一魚長尺許鬐鱗如金撥刺不已俯岸人皆異之逡巡晦暝風雨驟作溫惶駭奔走數里依然烈景或曰所獲金魚即潭龍也是知龍為魚服自貽其患苟無風雨之變亦難逃鼎俎矣龍潭取魚亦宜戒慎郭彥郎世言乖龍苦于行雨而多竄匿為雷神捕之或在古木及楹柱之內若曠野之間無處逃匿即入牛角或牧童之身往往為此物所纍而震死也蜀邸有軍將郭彥郎者行舟俠江至羅云溉方食而臥心神恍惚如夢見一黃衣人曰莫錯而于口中探得一物而去覺來但覺咽喉中痛于是篙工輩但見船上雷電晦暝震聲甚厲斯則乖龍入口也南山宣律師乖龍入中指節又非虛說所以孔聖之言迅雷風烈必變可不敬之乎王宗郎蜀庚午歲金州刺史王宗郎奏洵陽縣洵水畔有青煙廟數日廟上煙云昏晦晝夜奏樂忽一旦水波騰躍有群龍出于水上行入漢江大者數丈小者丈余如五方之色有如牛馬驢羊之形大小五十纍纍接跡行入漢江卻過廟所往復數里或隱或見三日乃止犀浦龍癸酉年犀浦界田中有小龍青黑色割為兩片旬日臭敗尋亦失去摩呵池大廳西面亦有龍井甚靈人不可犯井魚成都書台坊武侯宅南乘煙觀內古井中有魚長六七寸往往游于井上水必騰涌相傳井中有龍安天龍后唐同光中滄洲民有子母苦于科徭流移近界封店路逢白蛇其子以繩系蛇項約而行無何擺其頭落須臾一片白云起雷電暴作撮將此子上天空中為雷火燒殺墜地而背有大書人莫之識忽有一人云何不以青物蒙之即識其字遂以青裙被之有識字讀之曰此人殺害安天龍為天神所誅葆光子曰龍神物也況有安天之號必能變化無方豈有一豎子繩系而殞之遽致天人之罰斯又何哉曹寬石晉時常山帥安重榮將謀干紀其管界與邢台連接斗殺一龍鄉豪有曹寬者見之取其雙角前有一物如帘文如亂錦人莫知之曹寬經年為寇所殺壬寅年討鎮州誅安重榮也葆光子讀北史見陸法和在梁時將兵拒侯景將任約于江上曰彼龍睡不動吾軍之龍甚自躍踊遂擊之大敗而擒任約是則軍陳之上龍必先斗常山龍死得非王師大捷重榮授首乎黃巢敗于陳州李克用脫梁王之難皆大雨震雷之助夢青衣孟蜀主母后之宮有衛聖神龍堂亦嘗修飾嚴潔蓋即世俗之家神也一旦別欲廣其殿宇因晝寢夢一青衣謂后曰今神龍意欲出宮外居止宜于寺觀中安排可也后欲從之而子未許后又夢見青衣重請因選昭覺寺廊廡間特建一廟土木既就繪事云畢遂宣教坊樂自宮中引出奏送神曲歸新廟中奏迎神曲其日玄云四合大風振起及神歸位雨即滂沱或曰衛聖神龍出離宮殿是不祥也逾年國亡滅而去土地歸廟中矣漢武白蛟漢武帝恆以季秋之月泛靈溢之舟于琳池之上窮夜達晝于季台之下以香金為鉤縮絲綸以舟鯉為餌不逾旬曰釣一白蛟長三四丈若龍而無鱗甲帝曰非龍也于是付太官為鮮而肉紫青脆美無倫詔賜臣下以為神感所獲后竟不得潯陽橋潯陽城東門通大橋常有蛟為百姓害董奉疏符沉水中少日見一蛟死浮出王述吳大帝赤烏三年七月有王述者采藥于天台山時熱息于石橋下臨溪飲忽見溪中有一小青衣長尺余執一青衣乘赤鯉魚徑入云中漸漸不見述良久登峻岩四望見海上風云起頃刻雷電交鳴俄然將至述懼伏于虛樹中見牽一物如布而色如漆不知所適及天霽又見所乘之赤鯉小童還入溪中乃黑蛟耳王植新贛人也乘舟過襄江時晚日遠眺謂友朱壽曰此中昔楚昭王獲萍實之處仲尼言童謠之應也壽曰他人以童謠為偶然而聖人必知之言訖見二人自岸下青衣持蘆杖謂植曰卿來何自植曰自新贛而至于此爾二人曰觀君皆儒士也習何典教植壽曰各習詩禮二人且笑曰尼父云子不語神怪又云敬鬼神而遠之何也壽曰夫子聖人也不言神怪者恐惑典教又言敬鬼神而遠之者以戒彝倫其意在奉宗之孝二人曰善又曰卿信乎曰然二人曰我實非鬼神又非人類今日偶與卿談乃天使也又謂植曰明日此岸有李環戴政俱商徒以利剝萬民所貪未已上帝惡欲懲其罪于三日內卿無此泊慎之言訖沒于江壽植但驚異之未明何怪也及明植謂壽曰有此之不祥可移于遠矣乃牽舟于上流五有余步纜訖見十余大舟自上流而至果泊于植木處植曰可便詳問其故要知姓字于是壽杖策而問之二商姓字果如其所言壽心驚曰事定矣乃謂植曰夫陰晦之間惡人之不善今夕方信之矣植曰夫言幽明者以幽有神而神之明奈何不信乎時晉恭帝元熙元年七月也八日至十日果有大風雷雨而二商一時沉溺植初聞二人之言私告于人及是共觀者有數百人內有耿談者年七十素諳土事謂植曰此中有二蛟如青蛇長丈余往往見于波中時化游于洲渚然亦不甚傷物卿所見二人青衣者恐是此蛟有靈奉上帝之命也陸社兒陸社兒者江夏民常種稻于江際夜歸路逢一女子甚有容質謂社兒曰我昨自縣前來今欲歸浦里願投君宿然辭色甚有憂容社兒不得已同歸閉室共寢未幾便聞暴風震雷明照社兒但覺此女驚惶制之不止須臾雷震只在帘前社兒寢室有物突開乘電光見一大毛手拿此女去社兒仆地絶而復蘇及明鄰里異而問之社兒告以女子投宿之事少頃鄉人有渡江來者云此去九里有大蛟龍無首長百餘丈血流注地盤泊數畝有千萬禽鳥臨而噪之也長沙女長沙有人忘姓名家江邊有女下渚浣衣覺身中有異后不以為患遂妊身生三物皆如蝦魚女以己所生甚憐之著澡盤水中養經三月此物遂大乃是蛟子各有字大者為當洪次者名破阻小者曰撲岸天暴雨三蛟一時俱去遂失所在后天欲雨此物輒來女亦知其當來便出望之蛟子亦出頭望母良久復去經年此女亡后三蛟一時俱至墓所哭泣經日乃去聞其哭聲狀如狗嗥蘇頲唐蘇頲始為烏程尉暇日曾與同寮泛舟沿溪醉后諷詠因至道磯寺寺前是雪溪最深處此水深不可測中有蛟螭代為人患頲乘醉步行還自駱駝橋遇橋壞墮水直至潭底水中有令人扶尚書出遂冉冉至水上頲遂得濟斗蛟唐天寶末歙州牛與蛟斗初水中蛟殺人及畜等甚衆其牛因飲為蛟所繞直入潭底水中便爾相觸數日牛出潭水赤時人謂為蛟死洪氏女歙州祁門縣蛟潭俗傳武陵鄉有洪氏女許嫁與鄱陽黎氏將娶吉日未定蛟化為男子貌如其壻具禮而娶去后月余黎氏始到知為蛟所娶遂就蛟穴求之于路逢其蛟化為人容貌殊麗其壻心疑為蛟視見蛟竊笑遂殺之果復蛟形又前到蛟穴見其妻并一犬在妻之旁乃取妻及犬以歸始登船而風雨暴至木石飛騰其妻及犬皆化為蛟而去其壻為惡風飄到余姚后數年歸焉其后道人許旌陽又斬蛟于此仍以板窒其穴今天清日朗尚有仿佛見之洪貞雞籠山在婺源縣南九十五里高一百六十丈回環一十五里九十步形如雞籠焉唐開元中有蛟龍變為道人歙人洪貞以弟子之禮師之道流將卜居尋諸名山到黃山貞問此山何如道流曰確而寒次到飛布山又問之道流曰高而無輔到此山又問之道流曰此山宜葬葬者可致侯王不然即出妖怪而已貞問其所以而不之告道流于室中寢貞入但見蛟龍由是候睡覺而辭歸道流遂入鄱陽而去貞歸遷其父于此山后二年鄱陽洪水大發漂蕩數千家貞本好道常焚香持念頗有方術居于祁南之回玉鄉鄉人遂稱其變現神通將圖非望潛署百官州中豪杰皆應之后州發兵就捕獲數十人而貞竟不知所在老蛟蘇州武丘寺山世言吳王闔閭陵有石穴出于岩下若嵌鑿狀中有水深不可測或言秦王鑿取劍之所唐永泰中有少年經過見一美女在水中浴問少年同戲否因前牽拽少年遂解衣而入因溺死數日尸方浮出而身盡干枯其下必是老蛟潛窟媚人以吮血故也其同行者述其狀云武休潭王蜀先主時修斜谷閣道鳳州衙將白掌其事焉至武休潭見一婦人浮水而來意其溺者命仆夫鉤至岸濱忽化為大蛇沒于潭中白公以為不祥因而致疾愚為誦岑參招北客賦云瞿塘之東下有千歲老蛟化為婦人炫服靚妝游于水濱白公聞之方悟蛟也厥疾尋瘳又內官宋愈昭自言于柳州江岸為二三女人所招里民叫而止之亦蛟也岑賦所言斯足為證伐蛟月令季秋伐蛟取鼉以明蛟可伐而龍不可觸也蛟之為物不識其形狀非有鱗鬣四足乎或曰虯蜧蛟蝹狀如蛇也南僧說蛟之形如馬蟥即水蛭也涎沫腥粘掉尾纏人而噬其血蜀人號為馬絆蛇頭如貓鼠有一點白漢州古城潭內馬絆蛇往往害人鄉里募勇者伐之身涂藥游泳于潭底蛟乃躍于沙汭蟠蜿力困里灌噪以助竟斃之
