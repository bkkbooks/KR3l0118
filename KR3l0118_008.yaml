body:
  text: 劉安劉安漢淮南王劉安者漢高帝之孫也其父厲王長得罪徙蜀道死文帝哀之而裂其地盡以封長子故安得封淮南王時諸王子貴侈莫不以聲色游獵犬馬為事唯安獨折節下士篤好儒學兼占候方術養士數千人皆天下俊士作內書二十二篇又中篇八章言神仙黃白之事名為鴻寶萬畢三章論變化之道凡十萬言武帝以安辨博有才屬為諸父甚重尊之特詔及報書常使司馬相如等共定草乃遣使召安入朝嘗詔使為離騷經旦受詔食時便成奏之安每宴見談說得失及獻諸賦頌晨入夜出乃天下道書及方術之士不遠千里卑辭重幣請致之於是乃有八公詣門皆鬚眉皓白門吏先密以白王王使閽人自以意難問之曰我王上欲求延年長生不老之道中欲得博物精義入妙之大儒下欲得勇敢武士扛鼎暴虎橫行之壯士今先生年已耆矣似無駐衰之術又無賁育之氣豈能究於三墳五典八索九丘鉤深致遠窮理盡性乎三者既乏餘不敢通八公笑曰我聞王尊禮賢士吐握不倦苟有一介之善莫不畢至古人貴九九之好養鳴吠之技誠欲市馬骨以致騏驥師郭生以招群英吾年雖鄙陋不合所求故遠致其身且欲一見王雖使無益亦豈有損何以年老而逆見嫌耶王必若見年少則謂之有道皓首則謂之庸叟恐非發石採玉探淵索珠之謂也薄吾老今則少矣言未竟八公皆變為童子年可十四五角髻青絲色如桃花門吏大驚走以白王王聞之足不履跣而迎登思仙之臺張錦帳象床燒百和之香進金玉之几執弟子之禮北面叩首而言曰安以凡才少好道德羇鎖世務沈淪流俗不能遣纍負笈出林然夙夜饑渴思願神明沐浴滓濁精誠淺薄懷情不暢邈若雲漢不期厚厚原作原據雲笈七籤卷一九引神仙傳改幸道君降屈是安祿命當蒙拔擢喜懼屏營不知所措唯願道君哀而教之則螟蛉假翼於鴻鵠可沖天矣八童子乃復為老人告王曰餘雖復淺識備為先學聞王好士故來相從未審王意有何所欲吾一人能坐致風雨立起雲霧畫地為江河撮土為山嶽一人能崩高山塞深泉收束虎豹召致蛟龍使役鬼神一人能分形易貌坐存立亡隱蔽六軍白日為暝一人能乘雲步虛越海凌波出入無間呼吸千里一人能入火不灼入水不濡刃射不中冬凍不寒夏曝不汗一人能千變萬化恣意所為禽獸草木萬物立成移山駐流行宮易室一人能煎泥成金凝鉛為銀水煉八石飛騰流珠乘雲駕龍浮於太清之上在王所欲安乃日夕朝拜供進酒脯各試其向所言千變萬化種種異術無有不效遂授玉丹經三十六卷藥成未及服而太子遷好劍自以人莫及也於時郎中雷被召與之戲而被誤中遷遷大怒被怖恐為遷所殺乃求擊胸奴以贖罪安聞不聽被大懼乃上書於天子云漢法諸侯壅閼不與擊胸奴其罪入死安合當誅武帝素重王不咎但削安二縣耳安怒被被恐死與伍被素為交親伍被曾以奸私得罪於安安怒之未發二人恐為安所誅乃共誣告稱安謀反天子使宗正持節治之八公謂安曰可以去矣此乃是天之發遣王王若無此事日復一日未能去世也八公使安登山大祭埋金地中即白日升天八公與安所踏山上石皆陷成跡至今人馬跡猶存八公告安曰夫有藉之人被人誣告者其誣人當即死滅伍被等今當復誅矣於是宗正以失安所在推問云王仙去矣天子悵然乃諷使廷尉張湯奏伍被云為畫計乃誅二被九族一如八公之言也漢史祕之不言安得神仙之道恐後世人主當廢萬機而競求於安道乃言安得罪後自殺非得仙也按左吳記云安臨去欲誅二被八公諫曰不可仙去不欲害行蟲況於人乎安乃止又問八公曰可得將素所交親俱至彼便遣還否公曰何不得爾但不得過五人安即以左吳王眷傅生等五人至玄洲便遣還吳記具說云安未得上天遇諸仙伯安少習尊貴稀為卑下之禮坐起不恭語聲高亮或誤稱寡人於是仙伯主者奏安云不敬應斥遣去八公為之謝過乃見赦謫守都廁三年後為散仙人不得處職但得不死而已武帝聞左吳等隨王仙去更還乃詔之親問其由吳具以對帝大懊恨乃歎曰使朕得為淮南王者視天下如脫屣耳遂便招募賢士亦冀遇八公不能得而為公孫卿欒大等所欺意猶不已庶獲其真者以安仙去分明方知天下實有神仙也時人傳八公安臨去時餘藥器置在中庭雞犬舐啄之盡得升天故雞鳴天上犬吠雲中也出神仙傳陰長生陰長生者新野人也漢皇后之親屬少生富貴之門而不好榮貴唯專務道術聞馬鳴生得度世之道乃尋求之遂得相見便執奴僕之役親運履之勞鳴生不教其度世之法但日夕別與之高談論當世之事治農田之業如此十餘年長生不懈同時共事鳴生者十二人皆悉歸去唯長生執禮彌肅鳴生告之曰子真能得道矣乃將入青城山中煮黃土為金以示之立壇西面乃以太清神丹經授之鳴生別去長生乃歸合之丹成服半劑不盡雲笈七籤卷一六引陰真君傳無盡字即升天乃大作黃金十數萬斤以布惠天下貧乏不問識與不識者周行天下與妻子相隨一門皆壽而不老在民間三百餘年後於平都山東白日升天而去著書九篇云上古仙者多矣不可盡論但漢興以來得仙者四十五人連餘為六矣二十人尸解餘並白日升天抱朴子曰洪聞諺書有之曰子不夜行則安知道上有夜行人今不得仙者亦安知天下山林間不有學道得仙者陰君已服神藥未盡升天然方以類聚同聲相應便自與仙人相集尋索聞見故知此近世諸仙人數耳而俗民謂為不然以己所不聞則謂無有不亦悲哉夫草澤間士以隱逸得志以經籍自娛不耀文采不揚聲名不修求進不營聞達人猶不能識之況仙人亦何急急令聞達朝闕之徒知其所云為哉陰君自敘云漢延光元年新野山北子受仙君神丹要訣道成去世付之名山如有得者列為真人行乎去來何為俗聞不死之要道在神丹行氣導引俯仰屈伸服食草木可得延年不能度世以至乎仙子欲聞道此是要言積學所致無為合神上士為之勉力加勤下愚大笑以為不然能知神丹久視長安於是陰君裂黃素寫丹經一通封一文石之函置嵩高山一通黃櫨之簡漆書之封以青玉之函置太華山一通黃金之簡刻而書之封以白銀之函置蜀綏山一封縑書合為十篇付弟子使世世當有所傳付又著詩三篇以示將來其一曰惟余之先佐命唐虞爰逮漢世紫艾重紆余余字原闕據明鈔本補獨好道而為匹夫高尚素志不仕王侯貪生得生亦又何求超跡蒼霄乘龍駕浮青要要字原闕據明鈔本補清黃晟刻本青要作青風承翼與我為讎入火不灼蹈波不濡消遙太極何慮何憂傲戲仙都顧愍群愚年命之逝如彼川流奄忽未幾泥土為儔奔馳索死不肯暫休其二章曰余余字原闕據明鈔本補之聖師體道之真升降變化喬松為鄰唯余同學十有二人寒苦求道歷二十年中多怠墮志行不堅痛乎諸子命也自天天不妄授道必歸賢身沒幽壤何時可還嗟爾將來勤加精研勿為流俗富貴所牽神道一成升彼九天壽同三光何但億千其三章曰惟余束發少好道德棄家隨師東西南北委放五濁明鈔本委作悉濁作經避世自匿三十餘年名山之側寒不遑衣饑不暇食思不敢歸勞不敢息奉事聖師承歡悅色面垢足胝乃見褒飾褒飾二字原闕據明鈔本補遂受要訣恩深不測妻子延年咸享無極黃白已成貨財千億使役鬼神玉女侍側今得度世神丹之力陰君處民間百七十年色如女子白日升天而去出神仙傳張道陵張道陵者沛國人也本太學書生博通五經晚乃歎曰此無益於年命遂學長生之道得黃帝九鼎丹法欲合之用藥皆糜費錢帛陵家素貧欲治生營田牧畜非己所長乃不就聞蜀人多純厚易可教化且多名山乃與弟子入蜀住鵠鳴山著作道書二十四篇乃精思鍊志忽有天人下千乘萬騎金車羽蓋驂龍駕虎不可勝數或自稱柱下史或稱東海小童乃授陵以新出正一明威之道陵受之能治病於是百姓翕然奉事之以為師弟子戶至數萬即立祭酒分領其戶有如官長并立條制使諸弟子隨事輪出米絹器物紙筆樵薪什物等領人修復道路不修復者皆使疾病縣有應治橋道於是百姓斬草除溷無所不為皆出其意而愚者不知是陵所造將為此文從天上下也陵又欲以廉恥治人不喜施刑罰乃立條制使有疾病者皆疏記生身已來所犯之罪乃手書投水中與神明共盟約不得復犯法當以身死為約於是百姓計念邂逅疾病輒當首過一則得愈二使羞慚不敢重犯且畏天地而改從此之後所違犯者皆改為善矣陵乃多得財物以市其藥合丹丹成服半劑不願即升天也乃能分形作數十人其所居門前水池陵常乘舟戲其中而諸道士賓客往來盈庭巷巷原作蓋據明鈔本改座上常有一陵與賓客對談共食飲而真陵故在池中也其治病事皆採取玄素但改易其大較轉其首尾而大途猶同歸也行氣服食故用仙法亦無以易故陵語諸人曰爾輩多俗態未除不能棄世正可得吾行氣導引房中之事或可得服食草木數百歲之方耳其有九鼎大要唯付王長而後合有一人從東方來當得之此人必以正月七日日中到其說長短形狀至時果有趙升者不從東方來明鈔本無不字生平未未原作原據明鈔本陳校本改相見其形貌一如陵所說陵乃七度試升皆過乃受升丹經七試者第一試升到門不為通使人罵辱四十餘日露宿不去乃納之第二試使升於草中守黍驅獸暮遣美女非常託言遠行過寄宿與升接床明日又稱腳痛不去遂留數日亦復調戲升終不失正第三試升行道忽見遺金三十瓶升乃走過不取第四令升入山採薪三虎交前咬升衣服唯不傷身升不恐顏色不變謂虎曰我道士耳少年不為非故不遠千里來事神師求長生之道汝何以爾也豈非山鬼使汝來試我乎須臾虎乃起去第五試升於市買十餘匹絹付直訖而絹主誣之云未得升乃脫己衣買絹而償之殊無吝色第六試升守田穀有一人往叩頭乞食衣裳破弊面目塵垢身體瘡膿臭穢可憎升愴然為之動容解衣衣之以私糧設食又以私米遺之第七試陵將諸弟子登雲臺絶巖之上下有一桃樹如人臂傍生石壁下臨不測之淵桃大有實陵謂諸弟子曰有人能得此桃實當告以道要于時伏而窺之者三百餘人股戰流汗無敢久臨視之者莫不卻退而還謝不能得升一人乃曰神之所護何險之有聖師在此終不使吾死於谷中耳師有教者必是此桃有可得之理故耳乃從上自擲投樹上足不蹉跌取桃實滿懷而石壁險峻無所攀緣不能得返於是乃以桃一一擲上正得二百二顆陵得而分賜諸弟子各一陵自食留一以待升陵乃以手引升衆視之見陵臂加長三二丈引升升忽然來還乃以向所留桃與之升食桃畢陵乃臨谷上戲笑而言曰趙升心自正能投樹上足不蹉跌吾今欲自試投下當應得大桃也衆人皆諫唯升與王長默然陵遂投空不落桃上失陵所在四方皆仰上則連天下則無底往無道路莫不驚歎悲涕唯升長二人良久乃相謂曰師則父也自投於不測之崖吾何以自安乃俱投身而下正墮陵前見陵坐局腳床斗帳中見升長二人笑曰吾知汝來乃授二人道畢三日乃還歸治舊舍諸弟子驚悲不息後陵與升長三人皆白日沖天而去衆弟子仰視之久而乃沒於雲霄也初陵入蜀山合丹半劑雖未沖舉已成地仙故欲化作七試以度趙升乃知知原作如據明鈔本陳校本改其志也出神仙傳
