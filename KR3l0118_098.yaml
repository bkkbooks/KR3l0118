body:
  text: 李德裕李德裕唐相國李德裕為太子少保分司東都嘗召一僧問己之休咎僧曰非立可知願結壇設佛像僧居其中凡三日謂公曰公災戾未已當萬里南去耳公大怒叱之明日又召其僧問焉慮所見未仔細請更觀之即又結壇三日告公曰南行之期不旬月矣不可逃公益不樂且曰然則吾師何以明其不妄耶僧曰願陳目前事為驗庶表某之不誣也公曰果有説也即指其地曰此下有石函請發之即命窮其下數尺果得石函啓之亦無㶿焉公異而稍信之因問南去誠不免矣然乃遂不還乎僧曰當還耳公訊其事對曰相國平生當食萬羊今食九千五百矣所以當還者未盡五百羊耳公慘然而歎曰吾師果至人且我元和十三年為丞相張公從事於北都嘗夢行於晉山見山上盡目皆羊有牧者十數迎拜我我因問牧者牧者曰此侍御平生所食羊吾嘗記此夢不泄於人今者果如師之説耶乃知陰騭固不誣也後旬日振武節度使米暨遣使致書於公且饋五百羊公大驚即召告其事僧歎曰萬羊將滿公其不還乎公曰吾不食之亦可免耶曰羊至此已為相國所有公戚然旬日貶潮州司馬連貶崖州司戶竟沒於荒裔也出宣室志齊州僧史論在齊州時出獵至一縣界憩蘭若中覺桃香異常訪其僧僧不及隱言近有一人施二桃因從經案下取出獻論大如飯碗論時飢盡食之核大如雞卵論因詰其所自僧笑曰向實謬言之此桃去此十餘里道路危險貧道偶行腳見之覺異因掇數枚論曰願去騎從與和尚偕往僧不得已導論出荒榛中經五里許抵一水僧曰恐中丞不能渡此論志訣往乃依僧解衣載之而浮登岸又經西北涉二水上山越澗數里至一處奇泉怪石非人境也有桃數百株枝幹掃地高二三尺其香破鼻論與僧各食一蒂腹飽矣論解衣將盡力包之僧曰此域靈境不可多取貧道常聽長老説昔有人亦嘗至此懷五六枚迷不得出論亦疑僧僧原作生據明鈔本改非常取兩顆而返僧切戒論不言論至州使召僧僧已逝矣出酉陽雜俎抱玉師抱玉師以道行聞居長安中師而事者千數每夕獨處一室闔戶撤燭嘗有僧於門隙視之見有慶雲自口中出後年九十卒時方大暑而其尸無萎敗唐宰相第五琦與師善及卒來治喪將以香乳灌其口已而有祥光自口出晃然四照公甚奇之或曰佛有慶祥光今抱玉師有之真佛矣出宣室志束草師長安平康坊菩提寺先有僧不言姓名常負束藁坐臥於寺西廊下不肯住院經數年寺綱維或勸其住房曰爾厭我耶其夕遂以束藁焚身至明唯灰燼耳無血膋之臭衆方知為異人遂塑灰為僧於佛殿上世號為束草師出酉陽雜俎惠寬綿州淨慧寺僧惠寬先時年六歲隨父設黃籙齋衆禮石天尊像惠寬時在不肯禮曰禮則石像遂倒不勝致也既禮而天尊像果倒腰已折矣後出家在寺寺近池人多捕魚為業惠寬與受戒且曰爾輩不當以此為給吾能令汝所得不失於舊因指其池畔盡生菌菌魚人採之省力得利後人呼為和尚菌也出成都記素和尚長安興善寺素和尚院庭有青桐數株皆素之手植唐元和中卿相多遊此院桐至夏有汗污人衣如輠脂不可浣昭國鄭相嘗與丞郎數人避暑惡其汗謂素曰弟子為和尚伐此桐各植一松也及暮素戲祝樹曰我種汝二十餘年汝以汗為人所惡來歲若復有汗我必薪之自是無汗矣素公不出院轉法華經三萬七千部夜常有狼子聽經齋時有烏鵲就案酉陽雜俎續五案作掌取食長慶初有僧玄幽題此院詩云三萬華經三十春半生不踏院門塵當時以為佳句也出酉陽雜俎懷信揚州西靈塔中國之尤峻峙者唐武宗末拆寺之前一年有淮南詞客劉隱之薄遊明州夢中如泛海見塔東渡海時見門僧懷信居塔三層憑闌與隱之言曰暫送塔過東海旬日而還數日隱之歸揚州即訪懷信信曰記海上相見時否隱之了然省記數夕後天火焚塔俱盡白雨如瀉旁有草堂一無所損出獨異志佛陀薩有佛陀薩者其籍編於岐陽法門寺自言姓佛氏陀薩其名也常獨行岐隴間衣黃持錫年雖老然其貌類童騃好揚言於衢中或詬辱群僧僧皆怒焉其資膳裘紵俱乞於里人里人憐其愚厚與衣食以故資用獨饒於群僧陀薩亦轉均於里中窮餓者焉里人益憐其心開成五年夏六月陀薩召里中民告曰我今夕死矣汝為吾塔瘞其尸果端坐而卒於是里中之人建塔於岐陽之西岡上漆其尸而瘞焉後月餘或視其首髮僅寸餘弟子即剃去已而又生里人大異遂扃其戶竟不開焉出宣室志興元上座興元縣西墅有蘭若上座僧常飲酒食肉群輩皆效焉一旦多作大餅招群徒衆入尸𧒰林以餅裹腐尸肉而食數啖不已衆僧掩鼻而走上座曰汝等能食此肉方可食諸肉自此緇徒因成精進也出雲溪友議趙蕃唐國子祭酒趙蕃大和七年為南宮郎忽一日有僧乞食於門且謂其家僮曰吾願見趙公可乎家僮告蕃蕃即命延入與坐僧乃曰君將有憂然亦可禳去蕃即拜而祈之僧曰遺我裁刀一千五百庶可脫君之禍不然未旬日當為東南一郡耳蕃許之約來日就送焉且訪其名暨所居僧曰吾居青龍寺法安其名也言已遂去明日蕃即辦送之使者至寺以物色訪群僧僧皆不類且詢法安師所止周𡾋院宇無影響蹤迹後數日蕃出為袁州刺史出宣室志懷濬秭歸郡草聖僧懷濬者不知何處人唐乾寧初到彼知來藏往皆有神驗愛草書或經或釋或老至於歌詩鄙瑣之言靡不集其筆端與之語即阿唯而已里人以神聖待之刺史于公以其惑衆繫而詰之乃以詩代通狀曰家在閩川西復西其中歲歲有鶯啼如今不在鶯啼處鶯在舊時啼處啼又詰之復有詩曰家住閩川東復東其中歲歲有花紅而今不在花紅處花在舊時紅處紅郡牧異而釋之詳其詩意似在海中得非杯渡之流乎行旅經過必維舟而禮謁告其吉凶唯書三五行終不明言事往果驗荊南大校周崇賓謁之書字遺之曰付皇都勘爾後入貢因王師南討遂縶於南府竟就戮也押衙孫道能謁之書字曰付竹林寺其年物故營葬乃古竹林寺基也皇甫鉉知州乃畫一人荷校一女子在旁後為娶民家女遭訟錮身入府波斯穆昭嗣幼好藥術隨其父謁之乃畫一道士乘雲把胡盧書云指揮使高牒衙推穆生後以醫藥有逭南平王高從誨與巾裹攝府衙推王師伐荊州師寄南平王詩云馬頭漸入揚州路親眷應須洗眼看是歲輸誠淮海獲解重圍其他不可殫記或一日題庭前芭蕉葉上云今日還債幸州縣無更勘窮來日為人所害尸首宛然刺史高公為之荼毗之出北夢瑣言智者禪師唐越州山陰縣有智禪師院內有池恆贖生以放之有一鼉長三尺恆食其魚禪師患之取鼉送向禹王廟前池中至夜還來禪師之曰汝勿食我魚即從汝在此鼉於是出外放糞皆是青泥禪師每至池上喚鼉即出於師前伏地經數十年漸長七八尺禪師亡後鼉亦不復見出朝野僉載法本晉天福中考功員外趙洙言近日有僧自相州來云貧道於襄州禪院內與一僧名法本同過夏朝昏共處心地相洽法本常言曰貧道於相州西山中住持竹林寺寺前有石柱他日有暇請必相訪其僧追念此言因往彼尋訪洎至山下村中投一蘭若寄宿問其村僧曰此去竹林寺近遠僧乃遙指孤峰之側曰彼處是也古老相傳昔聖賢所居之地今則但有名存焉故無院舍僧疑之詰朝而往既至竹林叢中果有石柱罔然不知其涯涘當法本臨別云但扣其柱即見其人其僧乃以小杖扣柱數聲乃風雨四起咫尺莫窺俄然耳目豁開樓臺對峙身在山門之下逡巡法本自內而出見之甚喜問南中之舊事乃引其僧度重門升祕殿參其尊宿尊宿問其故法本云早年相州同過夏期此相訪故及山門也尊宿曰可飯後請出在此無座位食畢法本送至山門相別既而天地昏暗不知所進頃之宛在竹叢中石柱之側餘並莫㶿即知聖賢之在世隱顯難涯豈金粟如來獨能化見者乎出玉堂間話
