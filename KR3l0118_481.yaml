body:
  text: 新羅新羅新羅國東南與日本鄰東與長人國接長人身三丈鋸牙鉤爪不火食逐禽獸而食之時亦食人裸其軀黑毛覆之其境限以連山數千里中有山峽固以鐵門謂之鐵關常使弓弩數千守之由是不過又新羅國有第一貴族金哥其遠祖名旁篪有弟一人甚有家財其兄旁篪因分居乞衣食國人有與其隙地一畝乃求蠶谷種于弟弟蒸而與之旁篪不知也至蠶時止一生焉日長寸余居旬大如牛食數樹葉不足其弟知之伺間殺其蠶經日四方百里內蠶悉飛集其家國人謂之巨蠶意其蠶之王也四鄰共繅之不供谷唯一莖植焉其穗長尺余旁篪常守之忽為鳥所折銜去旁篪逐之上山五六里鳥入一石罅日沒徑黑旁篪因止石側至夜半月明見群小兒赤衣共戲一小兒曰汝要何物一曰要酒小兒出一金錐子擊石酒及樽悉具一曰要食又擊之餅餌羹炙羅于石上良久飲食而去以金錐插于石罅旁篪大喜取其錐而還所欲隨擊而辦因是富侔國力常以珠璣贍其弟弟云我或如兄得金錐也旁篪知其愚諭之不及乃如其言弟蠶之止得一金如常者谷種之復一莖植焉將熟亦為鳥所銜其弟大悅隨之入山至鳥入處遇群鬼怒曰是竊余錐者乃執之謂曰爾欲為我筑糖三版乎爾欲鼻長一丈乎其弟請筑糖三版三日饑困不成求哀于鬼鬼乃拔其鼻鼻如象而歸國人怪而聚觀之慚恚而卒其后子孫戲錐求狼糞因雷震錐失所在又登州賈者馬行余轉海擬取昆山路適桐廬時遇西風而吹到新羅國新羅國君聞行余中國而至接以賓禮乃曰吾雖夷狄之邦歲有習儒者舉于天闕登第榮歸吾必祿之甚厚乃知孔子之道被于華夏乎因與行余論及經籍行余避位曰庸陋賈豎長養雖在中華但聞土地所宜不讀詩書之義熟詩書明禮義者其唯士大夫乎非小人之事也乃辭之新羅君訝曰吾以中國之人盡聞典教不謂尚有無知之俗歟行余還至鄉井自慚以貪吝衣食愚昧不知學道為夷狄所嗤況哲英乎又天寶初使贊善大夫魏曜使新羅策立幼主曜年老深憚之有客曾到新羅因訪其行路客曰永徽中新羅日本皆通好遣使兼報之使人既達新羅將赴日本國海中遇風波濤大起數十日不止隨波漂流不知所屆忽風止波靜至海岸邊日方欲暮時同志數船乃維舟登岸約百有余人岸高二三十丈望見屋宇爭往趨之有長人出長二丈身具衣服言語不通見唐人至大喜于是遮擁令入宅中以石填門而皆出去俄有種類百餘相隨而到乃簡閲唐人膚體肥充者得五十余人盡烹之相與食啖兼出醇酒同為宴樂夜深皆醉諸人因得至諸院后院有婦人三十人皆前后風漂為所虜者自言男子盡被食之唯留婦人使造衣服汝等今乘其醉何為不去吾請道焉衆悅婦人出其練縷數百匹負之然后取刀盡斷醉者首乃行至海岸岸高昏黑不可下皆以帛系身自縋而下諸人更相縋下至水濱皆得入船及天曙船發聞山頭叫聲顧來處已有千余矣絡繹下山須臾至岸既不及船虓吼振騰使者及婦人并得還又近有海客往新羅次至一島上滿地悉是黑漆匙箸其處多大木客仰窺匙箸乃木之花與須也因拾百餘雙還用之肥不能使偶取攪茶隨攪隨消焉又六軍使西門思恭常銜命使于新羅風水不便纍月漂泛于滄溟罔知邊際忽南抵一岸亦有田疇物景遂登陸四望俄有一大人身長五六丈衣裾差異聲如震雷下顧西門有如驚歎于時以五指撮而提行百餘里入一岩洞間見其長幼群聚遞相呼集競來看玩言語莫能辨皆有歡喜之容如獲異物遂掘一坑而置之亦來看守之信宿之后遂攀緣躍出其坑徑尋舊路而竄才跳入船大人已逐而及之矣便以巨手攀其船舷于是揮劍斷下三指指粗于今槌帛棒大人失指而退遂解纜舟中水盡糧竭經月無食以身上衣服嚙而啖之后得達北岸遂進其三指漆而藏于內庫洎拜主軍寧以金玉遺人平生不以飲饌食客為省其絶糧之難也東女國西羌別種俗以女為王與茂州鄰有八十余城以所居名康延州中有弱水南流用牛皮為船以渡戶口兵萬人散山谷號曰賓就有女官號曰高霸平議國事在外官僚并男夫為之五日一聽政王侍左右女數百人王死國中多斂物至數萬更于王族中求令女二人而立之大者為大王小者為小王大王死則小王位之或姑死婦繼無墓所居皆重屋王至九重國人至六層其王服青毛裙平領衫其袖委地以文錦為小髻飾以金耳垂璫足履素靴重婦人而輕丈夫文字同于天竺以十一月為正每十月令巫者繼酒肴詣山中散糟麥于空大咒呼鳥俄有鳥如雉飛入巫者之懷因剖腹視之有谷來歲必登若有霜雪必有大災其俗名為鳥卜人死則納骨肉金瓶中和金屑而埋之廩君李時字玄休廩君之后昔武落鐘離山崩有石穴一赤如丹一黑如漆有人出于丹穴者名務相姓巴氏有出于黑穴者凡四姓婂氏樊氏柏氏鄭氏五姓出而爭焉于是務相以矛刺穴能著者為廩君四姓莫著而務相之劍懸又以土為船雕畫之而浮水中曰若其船浮者為廩君務相船又獨浮于是遂稱廩君乘其土船將其徒卒當夷水而下至于鹽陽水神女子止廩君曰此魚鹽所有地又廣大與君俱生可無行廩君曰我當為君求廩地不能止也鹽神夜從廩君宿旦輒去為飛蟲諸神皆從其飛蔽日廩君欲殺之不可別又不知天地東西如此者十日廩君即以青縷遺鹽神曰嬰此即宜之與汝俱生不宜將去汝鹽神受而嬰之廩君至碭石上望膺有青縷者跪而射之中鹽神鹽神死群神與俱飛者皆去天乃開朗廩君復乘土船下及夷城石岸曲泉水亦曲望之如穴狀廩君歎曰我新從穴中出今又入此奈何岸即為崩廣三丈余而階階相承廩君登之岸上有平石長五尺方一丈廩君休其上投策計算皆著石焉因立城其旁有而居之其后種類遂繁秦并天下以為黔中郡薄賦斂之歲出錢四十萬巴人以賦為賨因謂之賨人焉大食國大食西南二千里有國山谷間樹枝上生花如人首但不語人借問笑而已頻笑輒落私阿修國私阿修國金遼山寺中有石鼉衆僧飲食將盡向石鼉作禮于是飲食悉具俱振提國俱振提國尚鬼神城北隔真珠江二十里有神春秋之時國王所須什物金銀器神廚中自然而出祠畢亦滅天后使人驗之不妄牂牁獠在牂牁其婦人七月生子死則豎棺埋之木耳夷舊牢西以鹿角為器其死則屈而燒而埋其骨木耳夷人黑如漆小寒則焙沙自處但出其面龜茲古龜茲國主阿主兒者有神異力能降伏毒蛇龍時有人買市人金銀寶貨至夜中錢并化為炭境內數百家皆失金寶王有男先出家成阿羅漢果王問之羅漢曰此龍所為居北山其頭若虎今在某處眠耳王乃易衣持劍默至龍所見龍臥將斬之思曰吾斬寐龍誰知吾有神力遂叱龍龍驚起化為獅子王即乘其上龍怒作雷聲騰空至城北二十里王謂龍曰爾不降當斷爾頭龍懼王神力人語曰勿殺我我當與王為乘欲有所向隨心即至王許之后遂乘龍而行蔥嶺以東人好淫僻故龜茲于闐置女市以收錢龜茲元日斗羊馬駝為戲七日觀勝負以占一年羊馬減耗繁息也婆邏遮并服狗頭猴面男女無晝夜歌舞八月十五日行像及透索為戲焉耆元日二月八日婆摩遮三日野祀四月十五日游林五月五日彌勒下生七月七日祀生祖九月九日麻撒十月十日王為厭法王領家出宮首領代王焉一日一夜處分王事十月十四日每日作樂至歲窮拔汗那十二月及元日王及首領分為兩朋各出一人著甲衆人執瓦石棒棍東西互擊甲人先死即止以占當年丰儉乾陀國昔有王神男多謀號伽當討襲諸國所向悉降至五天竺國得上細紲二條自留一一與妃妃因衣其紲謁王紲當妃乳上有郁金香手印跡王見驚恐謂妃曰爾忽衣此手跡衣服何也妃言向王所賜之紲王怒問藏臣藏臣曰紲本有是非臣之咎王追商者問之商言天竺國娑陀婆恨王有宿願每年所賦細紲并重疊積之手染郁金柘于紲上千萬重手印即透丈夫衣之手印當背婦人衣之手印當乳王令左右披之皆如商者王因叩劍曰吾若不以此劍裁娑陀恨王手足無以寢食乃遣使就南天竺索娑陀婆恨王手足使至其國娑陀婆恨王與群臣紿報曰我國雖有王名娑陀婆恨元無王也但以金為王設于殿上凡統領教習皆臣下耳王遂起象馬兵南討其國國隱其王于地窟中鑄金人來迎伽王伽王知其僞且自恃神力因斷金人手足娑陀婆恨王于窟中手足悉皆自落乾陀國者尸毗王倉庫為火所燒其中粳米焦者于今尚存服一粒永不患瘧
