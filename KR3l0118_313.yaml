body:
  text: 楊鑣楊鑣唐楊鑣相國收之子少年為江西從事秋祭大孤神鑣悅神像之容偶以言戲之祭畢回舟而見空中雲霧有一女子容質甚麗詣鑣呼為楊郎云家姊多幸蒙楊郎採顧便希回橈以成禮也故來奉迎鑣驚怪乃曰前言戲之耳神女曰家姊本無意輒慕君子而楊郎先自發言苟或中輟立恐不利於君鑣不得已遂諾之希從容一月處理家事歸家理命訖倉卒而卒似有鬼神迎也補闕薛澤與鑣有姻嘗言此事甚詳近者故鄧州節度判官史在德郎中子光澤甚聰俊方修舉業自別墅歸乘醉入泰山廟謂神曰與神做第三兒可乎自是歸家精神恍惚似有召之者踰月而卒張璟廬山書生張璟乾寧中以所業之桂州至衡州犬嗥灘損船上岸寢於江廟為神所責璟以素業對之神為改容延坐從容云有巫立仁者罪合族廟神為理之於嶽神無人作奏璟為草之既奏嶽神許之廟神喜以白全十鉼為贈劉山甫與校書郎廖隲親見璟說其事甚詳崔從事福建崔從事忘其名正直檢身幕府所重奉使湖湘復命在道遇賊同行皆死唯崔倉皇中忽有人引路獲免中途復患痁疾求藥無所途次延平津廟夢為廟神賜藥三丸服之驚覺頓愈彭城劉山甫自云外族李敬彝為郎中宅在東都育財坊土地最靈家人張行周事之有應未大水前預夢告張求飲食至其日率其類遏水頭並不衝圮李宅王審知福州海口黃崎岸橫石免巉峭常為舟楫之患王審知為福建觀察使思欲制置憚於役力乾寧中因夢金甲神自稱吳安王許助開鑿及覺言於賓寮因命判官劉山甫往設祭祭未終海內靈怪俱見山甫憩於僧院憑高觀之風雷暴興見一物非魚非龍鱗黃鬣赤凡三日風雷乃霽已別開一港甚便行旅驛表以聞賜號甘棠港閩從事劉山甫乃中朝舊族也著金溪間談十二卷具載其事張懷武南平王鍾傅鎮江西遣道士沈太虛禱廬山九天使者廟太虛醮罷夜坐廊廡間恍然若夢見壁畫一人前揖太虛曰身張懷武也常為將軍上帝以微有陰功及物今配此廟為靈官既寤起視壁畫署曰五百靈官太虛歸以語進士沈彬彬後二十年游醴陵縣令陸生客之方食有軍吏許生後至語及張懷武彬因問之許曰懷武者蔡之裨將某之長史也頃甲辰年大饑聞豫章獨稔即與一他將各帥其屬奔預章既即路兩軍稍不相能比至五昌一隙大構剋日將決戰禁之不可懷武乃攜劍上戍樓去其梯謂其徒曰吾與汝今日之行非有他圖直救性命耳奈何不忍小忿而相攻戰夫戰必彊者傷而弱者亡如是則何為去父母之國而死於道路耶凡兩軍所以致爭者以有懷武故也今為汝等死兩軍為一無構難也遂自刎於是兩軍之士皆伏樓下慟哭遂相與和親比及預章無一逃亡者許但懷其舊恩亦不知靈官之事彬因述記以申明之豈天意將感發死義之事故以肸蠁告人乎李玫天祐初舒州有倉官李玫自言少時有病遂見鬼為人言禍福多中淮南大將張皓專廢立之權威振中外玫時宿於灊山司命真君廟翌日與道士崔繟然數人將入城去廟數里忽止同行於道側自映大樹以窺之良久乃行繟然曰復見鬼耶曰向見一人桎梏甚嚴吏卒數十人衛之向廟而去是必為真君考召也雖意氣尚在已不自免矣或問為誰久之乃肯言曰張皓也聞者皆懼共祕之不旬日而聞皓誅李宗造開元寺成大會文武僧道於寺中既罷玫復謂繟然曰向坐中有客為二吏固揖之而去是不久矣言其衣服容貌則團練巡官陳絳也不數日絳暴疾卒道士邵修默崔之弟子視見之趙瑜明經趙瑜魯人纍舉不第困厄甚因游太山祈死于嶽廟將出門忽有小吏自後至曰判官召隨之而去奄至一廳事簾中有人云人所重者生君何為祈死對曰瑜應鄉薦纍舉不第退無歸耕之資湮厄貧病無復生意故祈死耳良久聞簾中檢閲簿書既而言曰君命至薄名第祿仕皆無分既此見告當有以奉濟今以一藥方授君君以此足給衣食然不可置家置家則貧矣瑜拜謝而出至門外空中飄大桐葉至瑜前視之乃書巴豆丸方於其上亦與人間之方正同瑜遂自稱前長水令賣藥於夷門市餌其藥者病無不愈獲利甚多道士李德陽親見其桐葉已十餘年尚如新關承湍妻青城縣岷江暴漲漂墊民居縣民關承湍妻計氏有孩提子在懷抱乃上木匱為駭浪推漾大江唯見赤幘佩刀者洎朱衣秉簡者安存之令洎縣溉植乃隨流泛泛至縣溉為舟子迎拯而出子母無恙李冰祠天祐七年夏成都大雨岷江漲將壞京口江灌堰上夜聞呼噪之聲若千百人列炬無數大風暴雨而火影不滅及明大堰移數百丈堰水入新津江李陽冰祠中所立旗幟皆濕是時新津嘉眉水害尤多而京江不加溢焉鄭君雄鄭君雄為遂州刺史一日晚忽見兵士數千人在水東灞內旗幟弋甲人物喧鬧與軍行無異不敢詰問警備而已未曉密偵之大軍已去只三五人在後偵者問之曰江囗神也數年川府不安移在峽內今遠近安矣却歸川中復視之有下營及火幕蹤跡一一可驗焉鍾離王祠遂州東岸唐村云昔有一人衣大袖戴古冠幘立於道左語村人曰我鍾離王也舊有廟在下流十餘里因水摧損今像泝流而止將至矣汝可於此為我立廟村人詣江視之得一木人長數尺遂於所見處立廟號唐村神至今禱祈皆驗或云初見時如道士狀盤古祠廣都縣有盤古三郎廟頗有靈應民之過門稍不致敬多為毆擊或道途顛蹶縣民楊知遇者嘗受正一明威一夕醉甚將還其家路遠月黑無伴還家願得神力示以歸路俄有一炬火自廟門出前引至其家二十餘里雖狹橋編路無蹉跌火炬亦無見矣鄉里之人尤驚狄仁傑祠魏州南郭狄仁傑廟即生祠堂也天后朝仁傑為魏州刺史有善政吏民為之立生祠及入朝魏之士女每至月首皆詣祠奠醊仁傑方朝是日亦有醉色天后素知仁傑初不飲酒詰之具以事對天后使驗問乃信莊宗觀霸河朔嘗有人醉宿廟廊之下夜分即醒見有人於堂陛下罄折咨事堂中有人問之對曰奉符於魏州索萬人堂中語曰此州虛耗災禍頻仍移於他處此人曰諾請往白之遂去少頃復至則曰已移命於鎮州矣語竟不見是歲莊宗分兵討鎮州至於攻下兩軍所殺甚衆焉葛氏婦兗之東鈔里泗水上有亭亭下有天齊王祠中有三郎君祠神者巫云天齊王之愛子其神甚靈異相傳岱宗之下樵童牧豎或有逢羽獵者騎從華麗有如侯王即此神也魯人畏敬過於天齊朱梁時葛周鎮兗部署嘗舉家婦女遊於泗亭遂至神祠周有子十二郎者其婦美容止拜於三郎君前熟視而退俄而病心痛踣地悶絶久之舉族大悸即禱神有頃乃瘳自是神情失常夢寐恍惚嘗與神遇其家懼送婦往東京以避之未幾其神亦至謂婦曰吾尋汝久矣今復相遇其後信宿輒來每神將至婦則先伸缺呵嚏謂侍者曰彼已至矣即起入帷中侍者屬耳伺之則聞私竊語笑逡巡方去率以為常其夫畏神竟不敢與婦同宿久之婦卒馬希聲湖南馬希聲嗣父位連年亢旱祈禱不應乃封閉南嶽司天王廟及境內神祠竟亦不雨其兄希振入諫之飲酒至中夜而退聞堂前喧譟連召希振復入見希聲倒立於階下衣裳不披其首已碎令親信輿上以帛蒙首翌日發喪以弟希範嗣位先是大將周達自南嶽回見江上雲霧中擁執希聲而去祕不敢言夕有物如黑幕突入空堂即時而卒龐式唐長興三年進士龐式肄業于嵩陽觀之側臨水結菴以居一日晨往前村未返菴內唯薛生東郡人也少年純愨師事於式晨興就澗水盥漱畢見菴之東南林內有五人皆星冠霞帔或縫掖之衣衣各一色神彩俊拔語音清響目光射人香聞十餘步薛生驚異遍拜之問薛曰爾何人生具以對又問爾能隨吾去否薛辭以父母年老期之異日又曰爾既不去吾當書爾之背志之遂令肉袒唯覺其背上如風之吹書畢却入林中並失其處斯須龐式至具述且示之背見朱書字一行字體雜以篆籀唯兩字稍若官體貴人字餘皆不別薛生又以手捫之數字拏破色鮮如血數日香尚不銷後龐式登第除樂鄉縣令為叛帥安從進所殺薛氏子尋歸滑臺殂於家
