body:
  text: 僧伽大師僧伽大師西域人也俗姓何氏唐龍朔初來遊北土隸名於楚州龍興寺後於泗州臨淮縣信義坊乞地施標將建伽藍於其標下掘得古香積寺銘記並金像一軀上有普照王佛字遂建寺焉唐景龍二年中宗皇帝遣使迎師入內道場尊為國師尋出居薦福寺常獨處一室而其頂有一穴恆以絮塞之夜則去絮香從頂穴中出煙氣滿房非常芬馥及曉香還入頂穴中又以絮塞之師常濯足人取其水飲之痼疾皆愈一日中宗於內殿語師曰京畿無雨已是數月願師慈悲解朕憂迫師乃將瓶水泛灑俄頃陰雲驟起甘雨大降中宗大喜詔賜所修寺額以臨淮寺為名師請以普照王字明鈔本陳校本字作寺為名蓋欲依金像上字也中宗以照字是天后廟諱乃改為普光王寺仍御筆親書其額以賜焉至景龍四年三月二日於長安薦福寺端坐而終中宗即令於薦福寺起塔漆身供養俄而大風欻起臭氣遍滿於長安中宗問曰是何祥也近臣奏曰僧伽大師化緣在臨淮恐是欲歸彼處故現此變也中宗默然心許其臭頓息頃刻之間奇香郁烈即以其年五月送至臨淮起塔供養即今塔是也後中宗問萬回師曰僧伽大師何人耶萬回曰是觀音化身也如法華經普門品云應以比丘比丘尼等身得度者即皆見之而為說法此即是也先是師初至長安萬回禮謁甚恭師拍其首曰小子何故久留可以行矣及師遷化後不數月萬回亦卒師平生化現事跡甚多具在本傳此聊記其始終矣出本傳及紀聞録回向寺狂僧唐玄宗開元末夢人云將手巾五百條袈裟五百領於回向寺布施及覺問左右並云無乃遣募緇徒道高者令尋訪有一狂僧本無住著人亦不知其所來自出應召曰某知回向寺處問要幾人曰但得齎持所物及名香一斤即可去授之其僧徑入終南行兩日至極深峻處都無所見忽遇一碾石驚曰此地人迹不到何有此物乃於其上焚所攜香禮祝哀祈自午至夕良久谷中霧起咫尺不辨近來漸散當半崖有朱柱粉壁玲瓏如畫少頃轉分明見一寺若在雲間三門巨額諦視之乃回向也僧喜甚攀陟遂到時已黃昏聞鐘磬及禮佛之聲守門者詰其所從來遂引入見一老僧曰唐皇帝萬福令與人相隨歷房散手巾等唯餘一分一房但空榻者亦無人也又具言之僧笑令坐顧侍者曰彼房取尺八來乃玉尺八也僧曰汝見彼胡僧否曰見僧曰此是權代汝主也國內當亂人死無數此名磨滅王其一室是汝主房也汝主在寺以愛吹尺八謫在人間此常吹者也今限已滿即却歸矣明日遣就坐齊齊訖曰汝當回可將此玉尺八付與汝主并手巾袈裟令自收也狂僧膜拜而回童子送出才數步又雲霧四合及散則不復見寺所在矣乃持手巾尺八進於玄宗及召見具述本末玄宗大感悅持尺八吹之宛是先所御者後二十餘年遂有安祿山之亂其狂僧所見胡僧即祿山也出逸史懶殘懶殘者唐天寶初衡嶽寺執役僧也退食即收所餘而食性懶而食殘故號懶殘也晝專一寺之工夜止群牛之下曾無倦色已二十年矣時鄴侯李泌寺中讀書察懶殘所為曰非凡物也聽其中宵梵唱響徹山林李公情頗知音能辨休戚謂懶殘經音悽惋而後喜悅必謫墮之人時將去矣候中夜李公潛往謁焉望席門通名而拜懶殘大詬仰空而唾曰是將賊我李公愈加敬謹惟拜而已懶殘正撥牛糞火出芋啖之良久乃曰可以席地取所啖芋之半以授焉李公捧承盡食而謝謂李公曰慎勿多言領取十年宰相公又拜而退居一月刺史祭嶽修道甚嚴忽中夜風雷而一峰穨下其緣山磴道為大石所欄乃以十牛縻絆以挽之又以數百人鼓噪以推之力竭而愈固更無他途可以修事懶殘曰不假人力我試去之衆皆大笑以為狂人懶殘曰何必見嗤試可乃已寺僧笑而許之遂履石而動忽轉盤而下聲若雷震山路既開衆僧皆羅拜一郡皆呼至聖刺史奉之如神懶殘悄然乃懷去意寺外虎豹忽爾成群日有殺傷無由禁止懶殘曰授我箠為爾盡驅除衆皆曰大石猶可推虎豹當易制遂與之荊梃皆躡而觀之才出門見一虎銜之而去懶殘既去之後虎豹亦絶蹤跡後李公果十年為相也出甘澤謠韋皋唐故劍南節度使太尉兼中書令韋皋既生一月其家召群僧會食有一胡僧貌甚陋不召而至韋氏家童咸怒之以斃席坐於庭中既食韋氏命乳母出嬰兒請群僧祝其壽胡僧忽自升階謂嬰兒曰別久無恙乎嬰兒若有喜色衆皆異之韋氏先君曰此子生才一月吾師何故言別久耶胡僧曰此非檀越之所知也韋氏固問之胡僧曰此子乃諸葛武侯之後身耳武侯當東漢之季為蜀丞相蜀人受其賜且久今降生於世將為蜀門帥且受蜀人之福吾往歲在劍門與此子友善今聞降於韋氏吾固不遠而來韋氏異其言因以武侯字之後韋氏自少金吾節制劍南軍纍遷太尉兼中書令在蜀十八年果契胡僧之語也出宣室志釋道欽釋道欽住陘山有問道者率爾而對皆造宗極劉忠州晏常乞心偈令執爐而聽再三稱諸惡莫作衆善奉行晏曰此三尺童子皆知之欽曰三尺童子皆知之百歲老人行不得至今以為名理又梁元帝雜傳云晉惠末洛中沙門耆域蓋得道者長安人與域食於長安寺流沙人與域食於石人前數萬里同日而見沙門竺法行嘗稽首乞言域升高座曰守口攝意心莫犯戒竺語曰得道者當授所未聽今有八歲沙彌亦以誦之域笑曰八歲而至百歲誦不能行明鈔本至作致酉陽雜俎續四作八歲而致誦百歲不能行嗟乎人皆敬得道者不知行即自得出酉陽雜俎辛七師陝人辛其姓也始為兒時甚謹肅未嘗以狎弄為事其父母異而憐之十歲好浮圖氏法日閲佛書自能辨梵音不由師教其後父為陝郡守先是郡南有瓦窰七所及父卒辛七哀毀甚一日發狂遁去其家僮迹其所往至郡南見辛七在一瓦窰中端坐身有奇光粲然若鍊金色家僮驚異次至一窰又見一辛七在焉歷七窰俱有一辛七在中由是呼為辛七師出宣室志嘉州僧利州廣福禪院則故戎帥張處釗所創因請長老靈貴主掌以安僧衆經數年矣靈貴好燒鍊忽一日取衆僧小便以大鑊鍊而成霜穢惡之氣充滿衢路堂有一僧元自嘉州來似不得意咄咄焉靈貴覺之遂請收買衆僧食米冀其少在院內不旬日其僧盡將簿曆錢物就方丈納之云緣有小事暫出近地遂欲辭去其夜於堂內本位跏趺奄然而逝衆僧皆訝其無疾告行常儀堂內有僧遷化即例破柴五十束必普請衆僧人擎一枝送至郊外壘而為棚焚燒訖即歸院集衆以其所有衣鉢盡歸衆用以為常例其日日原作名曰據陳校本改坐亡僧於柴棚之上維那十念訖將欲下火其僧忽然驚起謂維那曰有米錢二貫文在監明鈔本監作藍行者處又合掌謂衆僧曰來去是常謝諸人遠來相送瞑目斂手端然不動右脅火燃即成灰燼衆咸驚駭是知園明真往死而不亡或來或去得火自在者信有之矣出野人閒話金剛仙唐開成中有僧金剛仙者西域人也居於清遠峽山寺能梵音彈舌搖錫而呪物物無不應善囚拘鬼魅束縛蛟螭動錫杖一聲召雷立震是日峽山寺有李朴者持斧翦巨木刳而為舟忽登山見一磐石上有穴覩一大蜘蛛足廣尺餘四馳馳原作蛇據明鈔本陳校本改囓卉窒其穴而去俄聞林木有聲暴猛吼驟工人懼而緣木伺之果覩雙雙原作枳據下文改首之虺長可數十丈屈曲蹙怒環其蛛穴東西其首俄而躍西之首吸穴之卉團而飛去頴脫俱盡後回東之首大劃其目大呀其口吸其蜘蛛蜘蛛馳出以足擒穴之口翹屈毒丹然若火焌虺之咽喉去虺之目虺懵然而復蘇舉首又吸之蛛不見更毒虺虺遂倒於石而殞蛛躍出緣虺之腹咀內齒折二頭俱出絲而囊之躍入穴去朴訝之返峽山寺語金剛仙仙乃祈朴驗穴振環杖而呪之蛛即出於僧前儼若神聽及引錫觸之蛛乃殂於穴側及夜金剛仙夢見老人捧匹帛而前曰我即蛛也復能織耳禮金剛仙曰願為福田之衣語畢遂亡僧及覺布已在側其精妙奇巧非世繭絲之所能製也僧乃製而為衣塵垢不觸後數年僧往番禺泛舶歸天竺乃於峽山金鎖潭畔搖錫大呼而呪水俄而水闢見底矣以澡缶張之有一泥鰍魚可長三寸許躍入缶中語衆僧曰此龍矣吾將至海門以藥煮為膏塗足則渡海若履坦途是夜有白衣叟挈轉關榼詣寺家人傅經曰知金剛仙好酒此榼一邊美醞一邊毒醪其榼即晉帝曾用鴆牛將軍者也今有黃金百兩奉公為持此酒毒其僧也是僧無何取吾子欲為膏恨伊之深痛貫骨髓但無計而奈何傅經喜受金與酒得轉關之法詣金剛仙仙持杯向口次忽有數歲數歲二字原闕據陳校本補小兒躍出就手覆之曰酒是龍所將來而毒師耳僧大駭詰傅經傅經遂不敢隱僧乃問小兒曰爾何人而相救耶小兒曰吾昔日之蛛也今已離其惡業而託生為人七稔矣吾之魂稍靈於常人知師有難故飛魂奉救言訖而沒衆僧憐之共禮金剛仙求捨其龍子僧不得已而縱之後仙果泛舶歸天竺矣出傳奇鴟鳩和尚鄧州有老僧日食鴟鳩僧俗共非之老僧終無所避當饌之際貧士求餐分其二足而食食訖僧盥漱雙鳩從口而出一則能行一則匍匐在地貧士驚怪亦吐其飯其鳩二腳亦生僧後不食此味都雲溪友議都作覩驗衆加敬之號曰南陽鴟鳩和尚也出雲溪友議
