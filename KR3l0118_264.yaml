body:
  text: 南荒人娶婦南荒人娶婦南荒之人娶婦或有喜他室之女者率少年持刀挺往趨虛路以偵之候其過即擒縛擁歸為妻間一二月復與妻偕首罪於妻之父兄常俗謂縛婦女壻非有父母喪不復歸其家出投荒雜錄趙高李夷簡元和末在蜀蜀市人趙高好鬭嘗入獄滿背鏤毗沙門天王吏欲杖背見之輒止轉為坊市害左右言於李李大怒擒就廳前索新造筋棒題徑三寸叱杖家打天王盡則已數三十餘不死經旬日但袒而歷門乞修理破功德錢出酉陽雜俎韋少卿蜀小將韋少卿韋表微堂兄也少不喜書嗜好劄青其叔父嘗令解衣視之胸上劄一樹樹杪鳥集數十其下懸鏡其其字原空闕據黃本補鼻繫有人止於側牽之叔不解問焉少卿笑曰叔曾讀張燕公詩否挽鏡寒鴉集也出酉陽雜俎葛清荊州街子葛清勇自頸已下遍劄白居易詩段成式嘗與荊客陳至呼觀之令其自解背上亦能闇記反手指其劄處至不是花中偏愛菊則有一人持杯臨菊叢黃夾纈窠寒有葉則持一樹樹上掛纈纈窠勝絕細凡劄三十餘首體無完膚陳至呼為白舍人行詩圖也出酉陽雜俎三王子楊虞卿為京兆尹時市里有三王子力能揭巨石遍身圖劄體無完膚前後合抵死數四皆匿軍以免會有過楊令所由數人捕獲閉關杖殺之判云刺劄四肢口稱王子何須訊問便合當辜出酉陽雜俎樂從訓王鐸落都統除滑州節度尋罷鎮以河北安靜於楊全玖有舊避地浮陽與其幕客從行皆朝中士子及過魏樂彥禎禮之甚至鐸之行李甚侈從客侍姬有輦下昇平之故態彥禎有子曰從訓素無賴愛其車馬姬妾以問其父之幕客李山甫又咸通中數舉不第尤私憤於中朝貴達因勸從訓圖之伺鐸至甘陵以輕騎數百盡掠其囊裝姬僕而還賓客皆遇害及奏朝廷云得貝貝原作具據許本改州報某日殺却一人姓王名令公其兇誕也如此彥禎父子尋為亂軍所殺出北夢瑣言張從晦梁祖圖霸之初壽州刺史江彥溫以郡歸我乃遣親吏張從晦勞其勤而從晦無賴酣酒有飲徒何藏燿者與之偕甚昵狎從晦致命於郡彥溫大張樂邀不至乃與藏燿食於主將家彥溫果疑恐曰汴王謀我矣不然何使者之如是也乃殺其主將連誅數十人而以狀白其事既而又疑疑字原空闕據許本補懼曰訴其腹心亡我族乃自縊而死梁祖大怒按其事腰事腰二字原空闕據許本補斬從晦留何藏燿裂其禁械斬於壽春市出北夢瑣言李仁矩後唐明宗皇帝時董璋授東川將有跋扈之心於時遣客省使李仁矩出使潼梓仁矩北節使下小校驟居內職性好狎邪元戎張筵以疾辭不至乃與營妓曲宴璋聞甚怒索馬詣館遽欲害之仁矩鞹足端簡迎門璋怒稍解他日作叛兩川舉兵並由仁矩獻謀於安重晦之所致也出北夢瑣言李罕之河陽人也少為桑門無賴所至不容曾乞食於滑州酸棗縣自旦及脯無與之者擲鉢於地毀僧衣投河陽諸葛爽為卒罕之即僧號便以為名素多力或與人相毆毆其左頰右頰血流爽尋署為小校每遣討賊無不擒之蒲絳之北有摩雲山設堡於上號摩雲寨前後不能攻取時罕之下焉由此號李摩雲累歷郡侯河南尹節將官至侍中卒卒字原空缺據北夢瑣言補於汴州亦荊南成汭之流也自唐仕梁出北夢瑣言韓伸有韓伸者渠州人也善飲博長於灼龜遊謁五侯之門常懷一龜殼隔宿先灼一龜來日之兆吉即博不吉即已又或去某方位去吉即往之諸方縱人牽之不去即取人錢貨如徵赤債或經年忘其家而不歸多於花柳之間落魄其妻怒甚時復自來恥頓驅趁而同歸如是往往有之又嘗遊謁于東川經年不歸忽一日聚其博徒契飲妓而致幽會夜坐洽樂之際其妻又自家領女僕一兩人潛至匿於鄰舍俟其夜會筵合遂持棒伺于暗處伸不知覺遂塌聲唱池水清聲不絕腦後一棒打落幞頭撲滅燈燭伸即竄于飯床之下有同坐客暗中遭鞭撻一頓不勝其苦後遣二青衣把髻子牽行一步一棒決之罵曰這老漢落魄不歸也無何何字原闕據許本補牽至燭下照之乃是同坐客其良人尚頭潛于飯床之下蜀人大以為歡笑矣時輩呼韓為池水清出王氏見聞李令渚宮有李令者自宰延安本狡猾之徒也強為篇章而干謁時有歸評事任江陵鹺院常懷䘏士之心李令既識歸君累求救貸而悉皆允諾又曰某尋親湖外輒假舍而安家族歸君亦慜諾之李且乘舟而去不二旬其妻遣僕使告丐餱糧歸亦拯其乏絕李忽寄書於鹺院情況款密是異尋常書中有贈家室等詩一首意欲組織歸君歸君悔恨而不能自明與武陵渠江之務以糊其口焉舉士沈擢每述於同院眾賓用茲戒慎也李令寄其妻詩曰有人教我向衡陽一度思歸一斷腸為報艷妻兼少女與吾覔取朗州場出雲溪友議孟弘微唐孟弘微郎中誕妄不拘宣宗朝因次對曰陛下何以不知有臣不以文字召用上怒曰卿何人斯朕耳冷不知有卿翌日上謂宰臣曰此人噪妄欲求翰林學士大容易哉哉字原空闕據許本補於是宰臣歸中書貶其官示小懲也又嘗忿狷擠其弟落井外議喧然乃致書告親友曰懸身井半風言沸騰尺水丈波古今常事與鄭諷鄰居諷為南海從事因墻頹侵入墻界五六丈知宅者有狀請退其所侵判其狀曰海隅從事少有生還地勢尖斜打墻夾入平生操履率皆如此不遭擯棄幸矣哉出北夢瑣言僧鸞僧鸞有逸才而無拘檢早歲稱鄉銜謁薛能於嘉州能以其顛率難為舉子乃佴出家自於百尺丈像前披剃不肯師於常僧也後入京為文章供奉賜紫柳玭甚愛其才租庸張濬亦曾加敬盛言其可大用由是反初號鮮于鳳修刺謁柳柳鄙之不接又謁張張亦拒之於是失望而為李鋌江西判官後為西班小將軍竟於黃州遇害出北夢瑣言路德延河中判官路德延相國巖之姪嶽之子時謂才俊擢進士第西平王朱友謙幕寮放恣凌傲主公容之友謙背梁乞於晉陽并使初至禮遇方謹路公筵上言語及之友謙憂憤因投德延於黃河以紓禍也先是紀綱之僕近判官入謁幕次遂有請易舍之說蓋義兄弟同處不欲聞郎官穢談也路子得非其人也出北夢瑣言蕭希甫蕭希甫進士及第有文才口辯多機數梁時不得意棄母妻渡河易姓名為皇甫校書莊宗即位於魏州徵希甫知制誥莊宗平汴洛希甫奉詔宣慰青齊方知其母死妻嫁乃持報於魏州時議者戲引李陵書云老母終堂生妻去室後為諫議大夫性褊忿躁於進取䟽宰臣豆盧革韋說至於貶斥又以毀訾宰相責授嵐州司馬焉出北夢瑣言
