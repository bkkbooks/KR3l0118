body:
  text: 袁炳袁炳宋袁炳字叔煥陳郡人秦始末為臨湘令亡後積年友人司馬遜于將曉間如夢見炳來陳敘闊別訊問安否既而謂遜曰吾等平生立意著論常言生為馳役死為休息今日始知定不然矣恆患在世為人務馳求金幣共相贈遺幽途此事亦復如之遜問罪福應報定實何如炳曰如我舊見與經教所說不盡符同將是聖人抑引之談耳如今所見善惡大科略不異也然殺生故最為重禁慎不可犯也遜曰卿此徵相示良不可言當以語白尚書也炳曰甚善亦請卿敬詣尚書時司空王僧虔為吏部炳遜世為其遊賓故及之往返可數百語辭去遜曰闊別之久恆思少集相值甚難何不且住炳曰止暫來耳不可得久留且此輩語不容得委悉揖別而去初炳來暗夜遜亦了不覺所以天明得覩見炳既去遜下牀送之始躡履而還暗見炳腳間有光可尺許亦得照其兩足餘地猶皆暗云費慶伯宋費慶伯者孝建中仕為州治中假歸至家忽見三騶皆赤幘同來云官喚慶伯云才謁歸那得見召且汝常黑幘今何得皆赤幘也騶答云非此間官也慶後方知非生人遂叩頭祈之三騶同詞因許回換言却後四日當更詣君可辦少酒食見待慎勿泄也如期果至云已得為力矣慶伯欣喜拜謝躬設酒食見鬼飲噉不異生人臨去曰哀君故爾乞祕隱也慶伯妻性猜妬謂伯云此必妖魅所罔也慶伯不得已因具告其狀俄見向三騶楚撻流血怒而立于前曰君何相誤也言訖失所在慶伯遂得暴疾未旦而卒劉朗之梁安成王在鎮以羅舍故宅借録事劉朗之嘗見丈夫衣冠甚偉斂襟而立朗之驚問忽然失之未久而朗之以罪見黜時人謂君章有神長孫紹祖常行陳蔡間日暮路側有一人家呼宿房內聞彈箜篌聲竊于窗中窺之見一少女容態閒婉明燭獨處紹祖微調之女撫絃不輟笑而歌曰宿昔相思苦今宵良會稀欲持留客被一願撫君衣紹祖悅懌直前撫慰女亦欣然曰何處公子橫來相干因與會合又謂紹祖曰昨夜好夢今果有徵屏風衾枕率皆華整左右有婢仍命饌頗有珍羞而悉無味又飲白醪酒女曰猝值上客不暇更營佳味才飲數杯女復歌歌曰星漢縱復斜風霜悽已切薄陳君不御誰知思欲絶因前擁紹祖呼婢撤燭共寢仍以小婢配其蒼頭將曙女揮淚與別贈以金縷小盒子無復後期時可相念紹祖乘馬出門百餘步顧視乃一小墳也愴然而去其所贈合子塵埃積中非生人所用物也劉導字仁成沛國人梁真簡先生瓛三從姪父謇梁左衛率導好學篤志專勤經籍慕晉關康曾隱京口與同志李士炯同宴于時秦江初霽共歎金陵皆傷興廢俄聞松間數女子笑聲乃見一青衣女童立導之前曰館娃宮歸路經此聞君志道高閒欲冀少留願垂顧眄語訖二女已至容質甚異皆如仙者衣紅紫絹縠馨香襲人俱年二十餘導與士炯不覺起拜謂曰人間下俗何降神仙二女相視而笑曰住爾輕言願從容以陳幽抱導揖就席謂曰塵濁酒不可以進二女笑曰既來敘會敢不同觴衣紅絹者西施也謂導曰適自廣陵渡江而至殆不可堪深願思飲焉衣紫絹者夷光也謂導曰同官三妹久曠深幽與妾此行蓋謂君子導語夷光曰夫人之姊固為導匹乃指士炯曰此夫人之偶也夷光大笑而熟視之西施曰李郎風儀亦足相匹夷光曰阿婦夫容貌豈得動人合座喧笑俱起就寢臨曉請去尚未天明西施謂導曰妾本浣沙之女吳王之姬君固知之矣為越所遷妾落他人之手吳王歿後復居故國今吳王已耄不任妾等夷光是越王之女越昔貢吳王者妾與夷光相愛坐則同席出則同車今者之行亦因緣會言訖惘然導與士炯深感恨聞京口曉鍾各執手曰後會無期西施以寶鈿一隻留與導夷光拆裙珠一雙亦贈士炯言訖共乘寶車去如風雨音猶在耳頃刻無見時梁武帝天監十一年七月也劉氏梁武帝末年有人姓劉而不知名于堂屋脊見一物面如獅子兩頰垂白毛長尺許手足如人徐徐舉一足須臾不見少時劉死崔羅什長白山西有夫人墓魏孝昭之世搜揚天下清河崔羅什弱冠有令望被徵詣州道經于此忽見朱門粉壁樓閣相接俄有一青衣出語什曰女郎須見崔郎什恍然下馬兩重門內有一青衣通問引前什曰行李之中忽重蒙厚命素既不敘無宜深入青衣曰女郎平陵劉府君之妻侍中吳質之女府君先行故欲相見什遂前什就牀坐其女在戶東坐與什敘溫涼室內二婢秉燭女呼一婢令以玉夾膝置什前什素有才藻頗善諷詠雖疑其非人亦愜心好也女曰比見崔郎息駕庭樹皆若吟嘯故入一敘玉顏什遂問曰魏帝與尊公書稱尊公為元城令然否也女曰家君元城之日妾生之歲什仍與論漢魏時事悉與魏史符合言多不能備載什曰貴夫劉氏願告其名女曰狂夫劉孔才之第二子名瑤字仲璋比有罪被攝乃去不返什下牀辭出女曰從此十年當更奉面什遂以玳瑁簪留之女以指上玉環贈什什上馬行數十步回顧乃見一大冢什屆歷下以為不祥遂躬設齊以環布施天統末什為王事所牽築河堤于桓家冢遂于幕下話斯事于濟南奚叔布因下泣曰今歲乃是十年如何什在園中食杏忽見一人云報女郎信俄即去食一杏未盡而卒十二為郡功曹為州里推重及死無不傷歎沈警字玄機吳興武康人美風調善吟詠為梁東宮常侍名著當時每公卿宴集必致騎邀之語曰玄機在席顛倒賓客其推重如此後荊楚陷沒入周為上柱國奉使秦隴途過張女郎廟旅行多以酒肴祈禱警獨酌水具祝詞曰酌彼寒泉水紅芳掇巖谷雖致之非遙而薦之隨俗丹誠在此神其感録既暮宿傳舍憑軒望月作鳳將雛含嬌曲其詞曰命嘯無人嘯含嬌何處嬌徘徊花上月空度可憐宵又續為歌曰靡靡春風至微微春露輕可惜關山月還成無用明吟畢聞簾外歎賞之聲復云閒宵豈虛擲朗月豈無明音旨清婉頗異于常忽見一女子褰簾而入拜云張女郎姊妹見使致意警異之乃具衣冠未離坐而二女已入謂警曰跋涉山川因勞動止警曰行役在途春宵多感聊因吟咏稍遣旅愁豈意女郎猥降仙駕願知伯仲二女郎相顧而微笑大女郎謂警曰妾是女郎妹適廬山夫人長男指小女郎云適衡山府君小子並以生日同覲大姊屬大姊今朝層城未旋山中幽寂良夜多懷輒欲奉屈無憚勞也遂攜手出門共登一輜軿車駕六馬馳空而行俄至一處朱樓飛閣備極煥麗令警止一水閣香氣自外入內簾幌多金縷翠羽間以珠璣光照滿室須臾二女郎自閣後冉冉而至揖警就坐又具酒殽於是大女郎彈箜篌小女郎援琴為數弄皆非人世所聞警嗟賞良久願請琴寫之小女郎笑而謂警曰此是秦穆公周靈王太子神仙所製不可傳于人間警粗記數弄不復敢訪及酒酣大女郎歌曰人神相合兮後會難邂逅相遇兮暫為歡星漢移兮夜將闌心未極兮且盤桓小女郎歌曰洞簫響兮風生流清夜闌兮管絃遒長相思兮衡山曲心斷絶兮秦隴頭又題曰隴上雲車不復居湘川斑竹淚沾餘誰念衡山煙霧裏空看鴈足不傳書警歌曰義熙曾歷許多年張碩凡得幾時憐何意今人不及昔暫來相見更無緣二女郎相顧流涕警亦下淚小女郎謂警曰蘭香姨智瓊姊亦常懷此恨矣警見二郎歌詠極歡而未知密契所在警顧小女郎曰潤玉此人可念也良久大女郎命履與小女郎同出及門謂小女郎曰潤玉可使伴沈郎寢警欣喜如不自得遂攜手入門已見小婢前施臥具小女郎執警手曰昔從二妃遊湘川見君于舜帝廟讀相王碑此時想念頗切不意今宵得諧宿願警亦備記此事執手款敘不能自已小婢麗質前致詞曰人神路隔別促會賒況姮娥妬人不肯留照織女無賴已復斜河寸陰幾時何勞煩瑣遂掩戶就寢備極歡昵將曉小女郎起謂警曰人神事異無宜卜晝大姊已在門首警於是抱持置于膝共敘衷款須臾大女郎即復至前相對流涕不能自勝復置酒警又歌曰直恁行人心不平那宜萬里阻關情只今隴上分流水更泛從來嗚咽聲警乃贈小女郎指環小女郎贈警金合歡結歌曰結心纏萬縷結縷幾千回結怨無窮極結心終不開大女郎贈警瑤鏡子歌曰憶昔窺瑤鏡相望看明月彼此俱照人莫令光彩滅贈答極多不能備記粗憶數首而已遂相與出門復駕輜軿送至下廟乃執手嗚咽而別及至館懷中探得瑤鏡金縷結良久乃言于主人夜而失所在時同侶咸怪警夜有異香警後使回至廟中于神座後得一碧箋乃是小女郎與警書備敘離恨書末有篇云飛書報沈郎尋已到衡陽若存金石契風月兩相望從此遂絶矣
