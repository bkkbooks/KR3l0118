body:
  text: 河上公河上公河上公者莫知其姓字漢文帝時公結草為庵於河之濱帝讀老子經頗好之勑諸王及大臣皆誦之有所不解數事時人莫能道之聞時皆稱河上公解老子經義旨乃使齎所不決之事以問公曰道尊德貴非可遙問也帝即幸其庵躬問之帝曰普天之下莫非王土率土之濱莫非王臣域中四大王居其一子雖有道猶朕民也不能自屈何乃高乎公即撫掌坐躍冉冉在虛空中去地數丈俯仰而答曰余上不至天中不纍人下不居地何民臣之有帝乃下車稽首曰朕以不德忝統先業才小任大憂於不堪雖治世事而心敬道直以暗昧多所不了唯願道君有以教之公乃授素書二卷與帝曰熟研之此經所疑皆了不事多言也余注此經以來一千七百餘年凡傳三人連子四矣勿以示非其人言畢失其所在須臾雲霧晦冥天地泯合帝甚貴之論者以為文帝好老子之言世不能盡通故神人特下教之而恐漢文心未至信故示神變所謂聖人無常心以百姓心為心耶出神仙傳劉根劉根者字君安京兆長安人也少明五經以漢孝成皇帝綏和二年舉孝廉除郎中後棄世學道入嵩高山石室碀嶸峻絶之上直下五千餘丈冬夏不衣身毛長一二尺其顏色如十四五歲人深目多鬚鬢皆黃長三四寸每與坐或時忽然變著高冠玄衣人不覺換之時衡府君自說先祖與根同歲者至王莽時頻使使者請根根不肯往衡府君使府掾王珍問起居根不答再令功曹趙公往山達敬根唯言謝府君更無他言後頴川太守高府君到官郡民大疫死者過半太守家大小悉得病高府君復遣珍往求根請消除疫氣之術珍叩頭述府君之言根教言於太歲宮氣上掘地深三尺以沙著其中及酒沃之君依言病者悉愈疫氣尋絶每用有效後太守張府君以根為妖遣吏召根擬戮之一府共諫府君府君不解如是諸吏達根欲令根去根不聽府君使至請根根曰張府君欲吾何為耶間當至耳若不去恐諸君招咎謂卿等不敢來呼我也根是日至府時賓客滿座府君使五十餘人持刀杖繩索而立根顏色不怍府君烈聲問根曰若有何道術也答曰唯唯府君曰能召鬼乎曰能府君曰既能即可捉鬼至廳前不爾當大戳根曰召鬼至易見耳借筆硯及奏按鎗鎗然作銅鐵之聲聞於外又長嘯嘯音非常清亮聞者莫不肅然衆客震悚須臾廳上南壁忽開數丈見兵甲四五百人傳呼赤衣兵數十人齎刀劍將一車直從壞壁中入來又壞壁復如故根勑下車上鬼其赤衣便乃發車上披見下有一老翁老姥大繩反縛囚之懸頭廳前府君熟視之乃其亡父母也府君驚愕流涕不知所措鬼乃責府君曰我生之時汝官未達不得汝祿養我死汝何為犯神仙尊官使我被收困辱如此汝何面目立於人間府君下階叩頭向根伏罪受死請求放赦先人根勑五百兵將囚出散遣之車出去南壁開後車過壁復如故既失車所在根亦隱去府君惆悵恍惚狀若發狂妻登時死良久乃蘇云見府君家先捉者大怒言汝何故犯神仙尊官使我見收今當來殺汝其後一月府君夫婦男皆卒府掾王珍數得見數承顏色歡然時伏地叩頭請問根學仙時本末根曰吾昔入山精思無所不到後如華陰山見一人乘白鹿車從者十餘人左右玉女四人執采旄之節皆年十五六余載拜稽首求乞一言神人乃告余曰爾聞有韓衆否答曰實聞有之神人曰我是也余乃自陳曰某少好道而不遇明師頗習方書按而為之多不驗豈根命相不應度世也有幸今日得遇大神是根宿昔夢想之願願見哀憐賜其要訣神未肯告余余乃流涕自摶重請神人曰坐吾將告汝汝有仙骨故得見吾耳汝今髓不滿血不暖氣少腦減筋息肉沮故服藥行氣不得其力必欲長生且先治病十二年乃可服仙藥耳夫仙道有升天躡雲者有遊行五嶽者有服食不死者有尸解而仙者凡修仙道要在服藥藥有上下仙有數品不知房中之事及行氣導引並神藥者亦不能仙也藥之上者有九轉還丹太乙金液服之皆立登天不積日月矣其次有雲母雄黃之屬雖不即乘雲駕龍亦可役使鬼神變化長生次乃草木諸藥能治百病補虛駐顏斷穀益氣不能使人不死也上可數百歲下即全其所稟而已不足久賴也余頓首曰今日蒙教乃天也神人曰必欲長生先去三尸三尸去即志意定嗜欲除也乃以神方五篇見授云伏尸常以月望晦朔上天白人罪過司命奪人算使人不壽人身中神欲得人生而尸欲得人死人死則神散無形之中而成鬼祭祀之則得歆饗故欲人死也夢與惡人鬥爭此乃尸與神相戰也余乃從其言合服之遂以得仙珍又每見根書符了有所呼召似人來取或數聞推問有人答對及聞鞭撻之聲而悉不見其形及地上時時有血莫測其端也根乃教珍守一行氣存神坐三綱六紀謝過上名之法根後入雞頭山仙去出神仙傳李仲甫李仲甫者豐邑中益里人也少學道於王君服水丹有效兼行遁甲能步訣隱形年百餘歲轉少初隱百日一年復見形後遂長隱但聞其聲與人對語飲食如常但不可見有書生姓張從學隱形術仲甫言卿性褊急未中教然守之不止費用數十萬以供酒食殊無所得張患之乃懷匕首往先與仲甫語畢因依其聲所在騰足而上拔匕首左右刺斫仲甫已在床上笑曰天下乃有汝輩愚人道學未得而欲殺之我寧得殺耶我真能死汝但恕其頑愚不足間耳使人取一犬來置書生前曰視我能殺犬否犬適至頭已墮地腹已破乃叱書生曰我能使卿如犬行矣書生下地叩頭乃止遂赦之仲甫有相識人居相去五百餘里常以張羅自業一旦張羅得一鳥視之乃仲甫也語畢別去是日仲甫已復至家在民間三百餘年後入西嶽山去不復還也出神仙傳李意期李意期者本蜀人傳世見之漢文帝時人也無妻息人欲遠行速至者意期以符與之並丹書兩腋下則千里皆不盡日而還或說四方國土宮觀市鄽人未曾見聞說者意不解意期則為撮土作之但盈寸其中物皆是須臾消滅或行不知所之一年許復還於是乞食得物即度於貧人於城都角中作土窟居之冬夏單衣飲少酒食脯及棗栗劉玄德欲伐吳報關羽之死使迎意期意期到甚敬之問其伐吳吉凶意期不答而求紙畫作兵馬器杖十數萬乃一一裂壞之曰咄又畫作一大人掘地埋之乃徑還去備不悅果為吳軍所敗十餘萬衆才數百人得還甲器軍資略盡玄德忿怒遂卒於永安宮意期少言人有所問略不對答蜀人有憂患往問之凶吉自有常候但占其顏色若歡悅則善慘戚則惡後入琅琊山中不復見出也出神仙傳王興王興者陽城人也居壺谷中乃凡民也不知書無學道意漢武上嵩山登大愚石室起道宮使董仲舒東方朔等齊潔思神至夜忽見有仙人長二丈耳出頭巔垂下至肩武帝禮而問之仙人曰吾九嶷之神也聞中嶽石上菖蒲一寸九節可以服之長生故來採耳忽然失神人所在帝顧侍臣曰彼非復學道服食者必中嶽之神以喻朕耳為之採菖蒲服之經二年帝覺悶不快遂止時從官多服然莫能持久唯王興聞仙人教武帝服菖蒲乃採服之不息遂得長生鄰里老少皆云世世見之竟不知所之出神仙傳趙瞿趙瞿者字子榮上黨人也得癩病重垂死或告其家云當及生棄之若死於家則世世子孫相蛀耳家人為作一年糧送置山中恐虎狼害之從外以木寨之瞿悲傷自恨晝夜啼泣如此百餘日夜中忽見石室前有三人問瞿何人瞿度深山窮林之中非人所行之處必是神靈乃自陳乞叩頭求哀其人行諸寨中有如雲氣了無所礙問瞿必欲愈病當服藥能否瞿曰無狀多罪嬰此惡疾已見踈棄死在旦夕若刖足割鼻而可活猶所甚願況服藥豈不能也神人乃以松子松柏脂各五升賜之告瞿曰此不但愈病當長生耳服半可愈愈即勿廢瞿服之未盡病愈身體強健乃歸家家人謂是鬼具說其由乃喜遂更服之二年顏色轉少肌膚光澤走如飛鳥年七十餘食雉兔皆嚼其骨能負重更不疲極年百七十夜臥忽見屋間光有如鏡者以問左右云不見後一日一室內盡明能夜書文再見面上有二人長三尺乃美女也甚端正但小耳戲其鼻上如此二女稍長大至如人不復在面上出在前側常聞琴瑟之聲欣然歡樂在人間三百餘年常如童子顏色入山不知所之出神仙傳王遙王遙者字伯遼鄱陽人也有妻無子頗能治病病無不愈者亦不祭祀不用符水針藥其行治病但以八尺布帊敷坐於地不飲不食須臾病愈便起去其有邪魅作禍者遙畫地作獄因召呼之皆見其形入在獄中或狐狸鼉蛇之類乃斬而燔燒之病者即愈遙有竹篋長數寸有一弟子姓錢隨遙數十年未嘗見遙開之一夜大雨晦暝遙使錢以九節杖擔此篋將錢出冒雨而行遙及弟子衣皆不濕所行道非所曾經又常有兩炬火導前約行三十里許登小山入石室室中有二人遙既至取弟子所擔篋發之中有五舌竹簧三枚遙自鼓一枚以二枚與室中二人並坐鼓之良久遙辭去收三簧皆納篋中使錢擔之室中二人出送語遙曰卿當早來何為久在俗間遙答曰我如是當來也遙還家百日天復雨遙夜忽大治裝遙先有葛單衣及葛布巾已五十餘年未嘗著此夜皆取著之其妻即問曰欲捨我去乎遙曰暫行耳妻曰當將錢去不遙曰獨去耳妻即泣涕曰為且復少留遙曰如是還耳因自擔篋而去之遂不復還後三十餘年弟子見遙在馬蹄山中顏色更少蓋地仙也出神仙傳按目録此下應尚有陳永伯一篇今佚
