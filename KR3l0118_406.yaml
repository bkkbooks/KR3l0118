body:
  text: 木夫子墓木魯曲阜孔子墓上時多楷木又曰曲阜城有顏回墓上石柟二株可三四十圍土人云顏回手植之木五柞漢五柞宮有五柞樹皆連抱上枝覆蔭數十里宮西有青梧觀觀前有三梧桐樹樹下有石麒麟二枚刊其肋為文字是秦始王驪山墓上物也頭高一丈三尺東邊左腳折折處有赤如血父老謂有神皆含血屬筋焉白銀樹平原郡高苑城西晉寧州刺史辟閭允墓前有白銀樹二十株合離樹終南山多合離樹葉似江離而紅綠相雜莖皆紫色氣如羅勒其樹直上百尺無枝上結藂條狀如車蓋一青一丹斑駁如錦繡長安謂之丹青樹亦云華蓋樹亦生于熊耳山中玉樹云陽縣界多漢離宮故地有樹似槐而葉細土人謂之玉樹楊子云甘泉賦云玉樹菁蔥后左思以為假稱珍蓋未詳也豫樟豫樟之為木也生七年而后可知也漢武寶鼎二年立豫樟宮于昆明池中作豫樟木殿荔枝木南海郡多荔枝樹荔枝為名者以其結實時枝條弱而蒂牢不可摘取以刀斧劙取其枝故以為名凡什具以木制者率皆荔枝酒樹頓遜國有酒樹如安石榴華汁停杯中數日成酒美而醉人博物志酒樹出典遜國名榐酒娑羅綿樹黎州通望縣有銷樟院在縣西一百步內有天王堂前古柏樹下有大池池南有娑羅綿樹三四人連手合抱方匝先生花而后生葉其花盛夏方開謝時不背而墮宛轉至地其花蕊有綿謂之娑羅棉善政郁茂違時枯凋古老相傳云是肉齒和尚住持之靈跡也縣界有和尚山和尚廟皆肉齒也刺桐蒼桐不知所謂蓋南人以桐為蒼梧因以名郡刺桐南海至福州皆有之叢生繁茂不如福建梧州子城外有三四株憔悴不榮未嘗見花反用名郡亦未喻也黃漆樹日濟國西南海中有三島各相去數十里其島出黃漆似中夏漆樹彼土六月破樹腹承取汁以漆器物若黃金其光奪目木蘭樹七里洲中有魯斑刻木蘭為舟舟至今在洲中詩家所云木蘭舟出于此也木蘭洲在潯陽江中多木蘭樹昔吳王闔閭植木蘭于此用构宮殿也椰子樹亦類海棕實名椰子大如甌盂外有粗皮如大腹子次有硬殼圓而且堅厚二三分有圓好者即截開頭砂石摩之去其皴皮其爛斑錦文以白金裝之以為水罐子珍奇可愛殼中有液數合如乳亦可飲之而動氣菩提樹自此木下凡二十三種木菩提樹出摩伽阤國在摩訶菩提樹寺蓋釋迦如來成道時樹一名思惟樹莖干黃白枝葉青翠經冬不凋至佛入滅日變色凋落過已還生此日國王人民大小作佛事收葉而歸以為瑞也樹高四百尺下有銀塔周回繞之彼國人四時常焚香散化繞樹下作禮唐貞觀中頻遣使往于寺設供并施袈裟至高宗顯慶五年于寺立碑以紀聖德此樹有梵名二一曰賓撥梨婆力義西域記謂之卑缽羅以佛于其下成道即以道為稱故號菩提婆刀叉漢翻為道樹昔中天無憂王翦伐之令事大婆羅門積薪焚焉熾焰之中忽生兩樹無憂王因忏悔號灰菩提樹遂周以石垣至賞設迦王复掘之至泉其根不絕坑火焚之溉以甘蔗汁欲其焦爛后摩揭阤國滿胄王無憂之曾孫也乃以千牛乳澆之信宿樹生如舊更增石垣高二丈四尺玄奘至西域見樹出石垣上二丈余婆羅樹巴陵有寺僧房床下忽生一木隨伐隨長外國僧見曰此婆羅也元嘉初出一花如蓮唐天寶初安西進婆羅枝狀言臣所管四鎮有拔汗那最為密近木有婆羅樹特為奇絕不庇凡草不止惡禽聳干無慚于松栝成陰不愧于桃李近差官拔汗那使令采得前件樹枝二百莖如得托根長樂擢穎建章布葉垂陰鄰月中之丹桂連枝接影對天上之白榆獨梪樹頓丘南有應足山山上有一樹高十丈余皮青滑似流碧枝干上聳子若五彩囊葉如亡子鏡世名之仙人獨梪樹波斯皂莢樹波斯皂莢出波斯國呼為忽野詹默拂林呼為阿梨去伐樹長三四丈圍五六尺葉似拘綠而短小經寒不凋不花而實其莢長二尺中有隔隔內各有一子大如指赤色至堅硬中黑如墨甜如飴可啖亦宜藥用木龍樹徐之高冢城南有木龍寺寺有三層磚塔高丈余塔側生一大樹縈繞至塔頂枝干交橫上平容十余人坐枝杪四向下垂如百子帳莫有識此木者僧呼為龍木梁武曾遣人圖寫焉貝多樹貝多出摩伽陀國長六七丈經冬不凋此樹有三種一者多羅婆力義多二者多梨婆力義貝多三者部婆力義多羅多梨并書其部闍一色取其皮書之貝多是梵語漢翻為葉貝多婆力義者漢言樹葉也西域經書用此三種皮葉若能保護亦得五六百年嵩山記稱貝多葉似枇杷并謬交趾近出貝多枝材中第一沒樹出波斯國拂林呼為阿縒長一丈許皮青白色葉如槐而長花似橘而大子黑色大如山茱萸其味酸甜可食槃碧穡波樹出波斯國亦出拂林國拂林呼為群漢樹長三丈圍四五尺葉似細榕經寒不凋花似橘白色子綠大如酸棗其味甜膩可食西域人壓為油以涂身可出風痒齊暾樹出波斯國亦出拂林呼為齊曶樹長二三丈皮青白花似柚极芳香子似楊桃六月熟西域人壓為油以煮餅果如中國之巨胜也通脫木如蜱麻生山側花上粉主治惡瘡如空中有瓤輕白可愛女工取以飾物山桂葉如麻細花紫色黃葉簇生與慎火草出丹陽山中五鬣松松凡言兩粒五粒粒當言鬣段成式修行里私第大堂前有五鬣松兩株大才如碗結實味與新羅者不別五鬣松皮不鱗唐中使仇士良水磑亭子有兩鬣皮不鱗者又有七鬣者不知自何而得俗謂孔雀三鬣松也松命根下遇石則偃差不必千年也三鬣松唐衛公李德裕言三鬣松與孔雀松別又云欲松不長以石抵其直下根便偃不必千年方偃魚甲松洛中有魚甲松合掌柏唐太常博士崔石云汝西有練溪多異柏及暮秋葉斂俗呼合掌柏黃楊木黃楊木性難長世重黃楊以無火或曰以水試之沉則無火取此木以陰晦夜無一星則伐之為枕不裂青楊木出峽中為床臥之無蚤俱那衛葉如竹三莖一層莖端分條如貞桐花小類木槲出桂州山茶山茶似海石榴出桂州蜀地亦有夏州槐夏州唯一郵有槐樹數株鹽州或要葉行牒求之赤白檉赤白檉出涼州大者無灰傷人灰汁煮銅可以為銀楷木蜀中有木類柞眾木榮時如枯蘗隆冬方蔭芽布陰蜀人呼為楷木楮殼田久廢必生构葉有瓣大曰楮小曰构宗廟文木宗廟地中生赤木人君禮各得其宜也文木簡齊建元初延陵季子廟舊有涌井井北忽有金石聲掘深二丈得沸泉泉中得木簡長尺廣一寸二分隱起字曰廬山道士張陵再拜謁木堅而白字色黃古文柱齊建元二年夏廬陵長溪水沖擊山麓崩長六七尺下得柱千余根皆十圍長者一丈短者八九尺頭題古文字不可識江淹以問王儉儉云江東不閒隸書秦漢時柱也三字薪齊永明九年秣陵安時寺有古樹伐以為薪木理自然有法天德三字天尊薪唐都官員外陳修古言西川一縣不記名吏因換獄卒木為薪有天尊形像存焉太平木異木唐大歷中成都百姓郭遠因樵獲瑞木一莖理成字曰天下太平詔藏于秘閣天王槐長安持國寺寺門前有槐樹數株金監買一株令所使巧工解之及入內回工言木無他異金大嗟惋令膠之曰此不堪矣但使爾知予工也及別理解之每片一天王塔戟成就焉色陵木台山有色陵木理如綾窠百姓取為枕呼為色陵枕馬文木鳳翔知客郭璩其父曾主作坊將解一木其間疑有鐵石鋸不可入遂以新鋸兼焚香祝之其鋸乃行及破木文有二馬形一黑一赤相嚙其口鼻鬃尾蹄腳筋骨與生無異
