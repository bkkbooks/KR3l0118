body:
  text: 王妙想王妙想蒼梧女道士也辟穀服氣住黃庭觀邊之水傍朝謁精誠想念丹府由是感通每至月旦常有光景雲物之異重嶂幽壑人所罕到妙想未嘗言之於人如是歲餘朔旦忽有音樂遙在半空虛徐不下稍久散去又歲餘忽有靈香郁烈祥雲滿庭天樂之音震動林壑光燭壇殿如十日之明空中作金碧之色烜爚亂眼不可相視須臾千乘萬騎懸空而下皆乘麒麟鳳凰龍鶴天馬人物儀衛數千人皆長丈餘持戈戟兵杖旌幡幢蓋良久乃鶴蓋鳳車導九龍之輦下降壇前有一人羽衣寶冠佩劍曳履昇殿而坐身有五色光赫然群仙擁從亦數百人妙想即往視謁大仙謂妙想曰吾乃帝舜耳昔勞厭萬國養道此山每欲誘教後進使世人知道無不可教授者且大道在于內不在於外道在身不在他人玄經所謂修之於身其德乃具此蓋修之自己證仙成真非他人所能致也吾覩地司奏汝於此山三十餘歲始終如一守道不邪存念貞神遵稟玄戒汝亦至矣若無所成證此乃道之棄人也玄經云常善救物而無棄物道之布惠周普念物物皆欲成之人人皆欲度之但是世人福果單微道氣浮淺不能精專於道既有所修又不勤久道氣未應而己中怠是人自棄道非道之棄人也汝精誠一至將以百生千生望於所誠不怠不退深可悲愍吾昔遇太上老君示以道德真經理國理身度人行教此亦可以亘天地塞乾坤通九天貫萬物為行化之要修證之本不可譬論而言也吾常銘之於心布之與物弘化濟俗不敢斯須輒有怠替至今稟奉師匠終劫之寶也但世俗浮詐迷妄者多嗤謙光之人以為懦怯輕退身之道以為迂劣笑絕聖棄智之旨以為荒唐鄙絕仁棄義之詞以為勁捷此蓋迷俗之不知也玄聖之意將欲還淳復朴崇道黜邪斜徑既除至道自顯淳朴已立澆兢自祛此則裁制之義無所施兼愛之慈無所措昭灼之聖無所用機譎之智無所行天下混然歸乎大順此玄聖之大旨也奈何世俗浮偽人奔奢巧帝王不得以靜理則萬緒交馳矣道化不得以坦行則百家紛競矣故曰人之自迷其日固久若洗心潔己獨善其身能以至道為師資長生為歸趣亦難得其人也吾以汝修學勤篤暫來省視爾天骨宿稟復何疑乎汝必得之也吾昔于民間年尚沖幼忽感太上大道君降於曲室之中教以修身之道理國之要使吾瞑目安坐冉冉乘空至南方之國曰揚州上直牛斗下瞰淮澤入十龍之門泛昭回之河瓠瓜之津得水源號方山四面各闊千里中有玉城瑤闕云九疑之山山有九峰峰有一水九江分流其下以注六合周而復始泝上於此以灌天河故九水源出此山也上下流注周于四海使我導九州開八域而歸功此山山有三宮一名天帝宮二名紫微宮三名清源宮吾以曆數既往歸理此山上居紫微下鎮于此常以久視無為之道分命仙官下教於人夫諸天上聖高真大仙愍劫曆不常代運流轉陰陽倚伏生死推遷俄爾之間人及陽九百六之會孜孜下教以救於人愈切於世人之求道也世人求道若存若亡繫念存心百萬中無一人勤久者天真憫俗常在人間隱景化形隨方開悟而千萬人中無一人可教者古有言曰修道如初得道有餘多是初勤中惰前功併棄耳道豈負於人哉汝布宣我意廣令開曉也此山九峰者皆有宮室命真官主之其下有寶玉五金靈芝神草三天所鎮之藥太上所藏之經或在石室洞臺雲崖嵌谷故亦有靈司主掌巨虬猛獸螣蛇毒龍以為備衛一曰長安峰二曰萬年峰三曰宗正峰四曰大理峰五曰天寶峰六曰廣得峰七曰宜春峰八曰宜城峰九曰行化峰下有宮闕各為理所九水者一曰銀花水二曰復淑水三曰巢水四曰許泉五曰歸水六曰沙水七曰金花水八曰永安水九曰晉水此九水支流四海周灌無窮山中異獸珍禽無所不有無毒螫鷙玃之物可以度世可以養生可以修道可以登真也汝居山以來未嘗遊覽四表拂衣塵外遐眺空碧俯睇岑巒固不可得而知也吾為汝導之得不勉之修之佇駕景策空然後倒景而研其本末也於是命侍臣以道德二經及駐景靈丸授之而去如是一年或三五年降于黃庭觀十年後妙想白日昇天茲山以舜修道之所故曰道州營道縣出集仙錄成公智瓊魏濟北郡從事椽弦超字義起以嘉平中夕獨宿夢有神女來從之自稱天上玉女東郡人姓成公字智瓊早失父母上帝哀其孤苦令得下嫁超當其夢也精爽感悟美其非常人之容覺而欽想如此三四夕一旦顯然來駕輜軿車從八婢服羅綺之衣姿顏容色狀若飛仙自言年七十視之如十五六車上有壺榼清白琉璃飲啗奇異饌具醴酒與超共飲食謂超曰我天上玉女見遣下嫁故來從君蓋宿時感運宜為夫婦不能有益亦不能為損然常可得駕輕車肥馬飲食常可得遠味異膳繒素可得充用不乏然我神人不能為君生子亦無妒忌之性不害君婚姻之義遂為夫婦贈詩一篇曰飄搖浮勃逢敖曹雲石滋芝英不須潤至德與時期神仙豈虛降應運來相之納我榮五族逆我致禍災此其詩之大較其文二百餘言不能悉舉又著易七卷有卦有象以彖為屬故其文言既有義理又可以占吉凶猶楊子之太玄薛氏之中經也超皆能通其旨意用之占候經七八年父母為超取婦之後分日而燕分夕而寢夜來晨去倏忽若飛唯超見之他人不見也每超當有行來來原作永據明鈔本改智瓊已嚴駕於門百里不移兩時千里不過半日超後為濟北王門下掾文欽作亂魏明帝東征諸王見移于鄴宮宮屬亦隨監國西徙鄴下狹窄四吏共一小屋超獨臥智瓊常得往來同室之人頗疑非常智瓊止能隱其形不能藏其聲且芬香之氣達于室宇遂為伴吏所疑後超嘗使至京師空手入市智瓊給其五匣弱緋五端絪紵采色光澤非鄴市所有同房吏問意狀超性疎辭拙遂具言之吏以白監國委曲問之亦恐天下有此妖幻不咎責也後夕歸玉女己求去曰我神仙人也雖與君交不願人知而君性疎漏我今本末已露不復與君通接積年交結恩義不輕一旦分別豈不愴恨勢不得不爾各自努力矣呼侍御下酒啗發簏取織成裙衫兩襠遺超又贈詩一首把臂告辭涕零溜漓肅然升車去若飛流超憂感積日殆至委頓去後積五年超奉郡使至洛到濟北魚山下陌上西行遙望曲道頭有一馬車似智瓊驅馳前至視之果是遂披帷相見悲喜交至授綏同乘至洛克復舊好至太康中猶在但不日月往來三月三日五月五日七月七日九月九日月旦十五每來來輒經宿而去張茂先為之賦神女其序曰世之言神仙者多矣然未之或驗如弦氏之歸則近信而有徵者甘露中河濟間往來京師者頗說其事聞之常以鬼魅之妖耳及遊東土論者洋洋異人同辭猶以流俗小人好傳浮偽之事直謂訛謠未遑考核會見濟北劉長史其人明察清信之士也親見義起受其所言讀其文章見其衣服贈遺之物自非義起凡下陋才所能搆合也又推問左右知識之者云當神女之來咸聞香薰之氣言語之聲此即非義起淫惑夢想明矣又人見義起強甚雨行大澤中而不沾濡益怪之鬼魅之近人也無不羸病損瘦今義起平安無恙而與神人飲燕寢處縱情兼慾豈不異哉出集仙錄龐女龐女者幼而不食常慕清虛每云我當昇天不願住世父母以為戲言耳因行經東武山下忽見神仙飛空而來自南向北將逾千里女即端立不敢前進仙人亦至山頂不散即便化出金城玉樓璚宮珠殿彌滿山頂有一人自山而下身光五色來至女前召女升宮闕之內眾仙羅列儀仗肅然謂曰汝有骨籙當為上真太上命我授汝以靈寶赤書五篇真文按而行之飛昇有期矣昔阿丘曾皇妃皆奉行於此證位高真可不勤耶既受真文群仙亦隱十年之後白日昇天其所遇天真處東武山者即今庚除化也其後道士張方亦居此山於石室中棲止常有赤虎來往室外方不為懼亦得道昇天龐女一本作逄字出集仙錄褒女褒女者漢中人也褒君之後因以為姓居漢沔二水之間幼而好道冲靜無營既笄浣紗於濜水上雲雨晦冥若有所感而孕父母責之憂患而疾臨終謂其母曰死後見葬願以牛車載送西山之上言訖而終父母置之車中未及駕牛其車自行踰沔漢二水橫流而渡直上濜口平元山頂平元即濜口化也家人追之但見五雲如蓋天樂駭空幢節導從見女昇天而去及視車中空棺而已邑人立祠祭之水旱祈禱俱驗今濜口山頂有雙轍跡猶存其後陳世安亦於此山得道白日昇天出集仙錄李真多神仙李脫妹也脫居蜀金堂山龍橋峰下修道蜀人歷代見之約其往來八百餘年因號曰李八百焉初以周穆王時居來廣漢棲玄山合九華丹成雲遊五岳十洞二百餘年於海上遇飛陽君授水木之道還歸此山鍊藥成又去數百年或隱或顯遊於市朝又登龍橋峰作九鼎金丹丹成已八百年三於此山學道故世人號此山為三學山亦號為賢山蓋因八百為號丹成試之抹於崖石上頑石化玉光彩瑩潤試藥處於今猶在人或鑿崖取之即風雷為變真多隨兄修道居綿竹中今有真多古跡猶在或來往浮山之側今號真多化即古浮山化也亦如地肺得水而浮真多幼挺仙姿耽尚玄理八百授其朝元默貞之要行之數百年狀如二十許人耳神氣莊肅風骨英偉異於弱女之態人或見之不敢正視其後太上老君與玄古三師降而度之授以飛昇之道先於八百白日昇天化側有潭其水常赤乃古之神仙煉丹砂之泉浮山亦名萬安山上有二師井飲之愈疾今以真多之名故為真多化也八百又於什邡仙居山三月八日白日昇天出集仙錄班孟班孟者不知何許人也或云女子也能飛行經日又能坐空虛中與人語又能入地中初去時沒足至胸漸入但餘冠幘良久而盡沒不見以指刺地即成井可吸吹人屋上瓦瓦飛入人家間桑果數千株孟皆拔聚之成一積如山如此十餘日吹之各還其故處如常又能含墨一口中舒紙著前嚼墨噴之皆成文字竟紙各有意義服酒丹年四百歲更少入大治山中出神仙傳天台二女劉晨阮肇入天台採藥遠不得返經十三日饑遙望山上有桃樹子熟遂躋險援葛至其下噉數枚饑止體充欲下山以杯取水見蕪菁葉流下甚鮮妍復有一杯流下有胡麻飯焉乃相謂曰此近人矣遂渡山出一大溪溪邊有二女子色甚美見二人持盃便笑曰劉阮二郎捉向杯來劉阮驚二女遂忻然如舊相識曰來何晚耶因邀還家南東二壁南東二壁原作雨璧東壁據明鈔本改黃本作西壁東壁各有絳羅帳帳角懸鈴上有金銀交錯各有數侍婢使令其饌有胡麻飯山羊脯牛肉甚美食畢行酒俄有群女持桃子笑曰賀汝婿來酒酣作樂夜後各就一帳宿婉態殊絕至十日求還苦留半年氣候草木常是春時百鳥啼鳴更懷鄉歸思甚苦女遂相送指示還路鄉邑零落已十世矣出神仙記明鈔本作出搜神記
