body:
  text: 夢咎徵蕭吉大業中有人嘗夢鳳凰集手上深以為善徵往詣蕭吉占之吉曰此極不祥之夢夢者恨之而以為妾言後十餘日夢者母死遣所親往問吉所以吉云鳳鳥非梧桐不棲非竹實不食所以止君手上者手中有桐竹之象禮云苴杖竹也削杖桐也是以知必有重憂耳侯君集唐貞觀中侯君集與庶人承乾通謀意不自安忽夢二甲士錄至一處見一人高冠奮髯叱左右取君集威骨來俄有數人操屠刀開其腦上及右臂間各取一骨片狀如魚尾因啽囈而覺腦臂猶痛自是心悸力耗至不能引一鈞弓欲自首不決而敗崔湜唐右丞盧藏用中書令崔湜太平黨被流嶺南至荊州湜夜夢講坐下聽法而照鏡問善占夢張猷謂盧右丞曰崔令公大惡夢坐下聽講法從上來也鏡字金旁竟也其竟於今日乎尋有御史陸遺免齎敕令湜自盡李林甫李林甫夢一人細長有髯逼林甫推之不去林甫寤而言曰此裴寬欲謀替我杜玄洛州杜玄有牛一頭玄甚憐之夜夢見其牛有兩尾以問占者李仙藥曰牛字有兩尾失字也經數日果失之召皎安祿山以討君側為名歸罪楊氏表陳其惡乃牒東京送表議者以其辭不利楊氏難於傳送又恐他日祿山見殛乃使大理主簿召皎送表至京玄宗覽之不悅但傳詔言皎還皎出中書見國忠問送胡之表無乃勞耶賴其不相非狀忽有惡言亦當送之乎呵使速去皎還至戲口驛意甚忙忙坐廳上繩牀恍然如夢忽覺繩牀去地數丈仰視見一人介胄中立呵叱左右二十餘人令撲己雖被拖拽廳上復有一人短帽紫衣來云此非蔣清無宜殺也遂見釋放皎數日還至洛逆徒尋而亦至皎與流輩數人守扃待命悉被收縛皎長大有容止而立居行首往見賊將田乾貞乾貞介胄而立即前牀間所夢者也逆呵呼皎云何物小人敢抗王師命左右僕殺手力始至嚴莊遽從廳下曰此非蔣清無宜加罪乾貞方問其姓云姓召因而見釋次至蔣遂遇害也李捎雲隴西李捎雲範陽盧若虛女壻也性誕率輕肆好縱酒聚飲其妻一夜夢捕捎雲等輩十數人雜以娼妓悉被髮肉袒以長索繫之連驅而去號泣顧其妻別驚覺淚沾枕席因為說之而捎雲亦夢之正相符會因大畏惡遂棄斷葷血持金剛經數請僧齋三年無他後以夢滋不驗稍自縱怠因會中友人逼以酒炙捎雲素無檢遂縱酒肉如初明年上巳與李蒙裴士南梁褒等十餘人泛舟曲江中盛選長安名倡大縱歌妓酒正酣舟覆盡皆溺死李叔霽監察御史李叔霽者與兄仲雲俱進士擢第有名當代大曆初叔霽卒經歲餘其妹夫與仲雲同寢忽夢叔霽相見依依然語及仲雲音容慘愴曰幽明理絕歡會無由正當百年之後方得聚耳我有一詩可為誦呈大兄詩云忽作無期別沉冥恨有餘長安雖不遠無信可傳書後數年仲雲亦卒李愬涼武公愬以殊勳之子將元和之兵擒蔡破鄆數年攻戰收城下壁皆以仁恕為先未嘗枉殺一人誠信遇物發於深懇長慶元年秋自魏博節度使左僕射平章事詔徵還京師將入洛其衙門將石季武先在洛夢涼公自北登天津橋季武為導以宰相行呵叱動地有道士八人乘馬持絳節幡幢從南欲上導騎呵之對曰我迎仙公安知宰相招季武與語季武驟馬而前持節道士曰可記我言聞於相公其言曰聳轡排金闕乘軒上漢槎浮名何足戀高舉入煙霞季武元不識字記性又少及隨道士信之再聞已得道士曰已記得可先白相公乃驚覺汗流被體喜以為相國猶當上仙況俗官乎後三日涼公果自北登天津橋季武為導因入憩天宮寺月餘而薨時人以仁恕端愨之心固合於道安知非謫仙數滿而去乎薛存誠御史中丞薛存誠元和末由臺丞入給事中未期復亞臺長憲閣清嚴俗塵罕到再入之日浩然有閑曠之思及廳吟曰捲簾疑客到入戶似僧歸後月閽吏因晝寢未熟髣髴間見僧童數十人持香花幢蓋作梵唱次第入臺閽吏呵之曰此御史臺是何法事高聲入來其一僧自稱識達是中丞弟子來迎本師師在臺可入省迎乎閽吏曰此中丞官亞臺本非僧侶奈何敢入臺門即欲擒之識達曰中丞元是須彌山東峰靜居院羅漢大德緣誤與天人言意涉近俗謫來俗界五十年年足合歸故來迎耳非汝輩所知也閽吏將馳報遂驚覺後數日薛公自臺中遇疾而薨潛伺其年正五十矣李伯憐威遠軍小將梅伯成善占夢有優人李伯憐遊涇州乞錢得米百斛及歸令弟取之過期不至夜夢洗白馬訪伯成占之伯成抒思曰凡顐人好反語洗白馬瀉白米也君所憂或有風水之虞乎數日弟至果言渭河中覆舟一粒無餘張瞻江淮有王生者牓言解夢賈客張瞻將歸夢炊於臼中問王生生言君歸不見妻矣臼中炊因無釜也賈客至家妻卒數月矣于堇有一人夢松生戶前一人夢棗生屋上以問補闕于堇堇言松丘壠間所植棗字重來重來呼魄之象後二人俱卒盧彥緒許州司倉盧彥緒所居溷夏雨暴至水滿其中須臾漏盡彥緒使人觀之見其下有古壙中是瓦棺有婦人年二十餘潔白凝淨指爪長五六寸頭插金釵十餘隻銘誌云是秦時人千載後當為盧彥緒開運數然也閉之吉啟之凶又有寶鏡一枚背是金花持以照日花如金輪彥緒取釵鏡等數十物乃閉之夕夢婦人云何以取吾玩具有怒色經一年而彥緒卒柳宗元柳員外宗元自永州司馬徵至京意望重用一日詣卜者問命且告以夢曰余柳姓也昨夢柳樹仆地其不祥乎卜者曰無苦但憂為遠官耳徵其意曰夫生則樹柳死則柳木木者牧也君其牧柳州乎竟如其言後卒于柳州焉衛中行衛中行為中書舍人時有故舊子弟赴選投衛論囑衛欣然許之駁牓將出其人忽夢乘驢渡水蹶墜水中登岸而靴不沾濕選人與祕書郎韓皋有舊訪之韓被酒半戲曰公今年選事不諧矣據夢衛生相負足下不沾及牓出果駮放韓有學術韓僕射猶子也張省躬枝江縣令張汀子名省躬汀亡因住枝江有張垂者舉秀才下第客於蜀與省躬素未相識大和八年省躬晝寤忽夢一人自言當家名垂與之接歡狎彌日將去留贈詩一首曰戚戚復戚戚秋堂百年色而我獨茫茫荒郊遇寒食驚覺遽錄其詩數日而卒王惲進士王惲才藻雅麗尤長體物著送君南浦賦為詞人所稱會昌二年其友人陸休符忽夢被錄至一處有騶卒止之屏外見若胥縻數十王惲在其中陸欲就之惲面若愧色陸彊牽之語惲垂泣曰近受一職司厭人聞指其類此悉同職也休符恍惚而覺時惲住楊州其子住太平休符異所夢遲明訪其家信得王至洛書又七日其訃至計其卒日乃陸之夢夕也柳淩司農卿韋正貫應舉時嘗至汝州汝州刺史柳凌留署軍事判官柳嘗夢有人呈案中言欠柴一千七百束因訪韋解之韋曰柴薪木也公將此不久乎月餘柳疾卒素貧韋為部署米麥鏹帛悉前請於官數月矣唯官中欠柴一千七百束韋披案方省柳前夢崔暇中書舍人崔暇弟嘏娶李續女李為曹州刺史令兵馬使國邵南勾當障車後邵南因睡忽夢崔女在一廳中女立於牀西崔嘏在牀東女執紅牋題詩一首笑授嘏嘏因朗吟之詩言莫以貞留妾從他理管絃容華難久駐知得幾多年夢後纔一歲崔嘏妻卒蘇檢蘇檢登第歸吳省家行及同州澄城縣止於縣樓上醉後夢其妻取筆硯篋中取紅牋剪數寸而為詩曰楚水平如鏡周迴白鳥飛金陵幾多地一去不知歸檢亦裁蜀牋而賦詩曰還吳東去下澄城樓上清風酒半醒想得到家春欲暮海棠千樹已凋零詩成俱送于所臥席下又見其妻笞檢所挈小青極甚及寤乃於席下得其詩視篋中紅牋亦有剪處小青其日暴疾已而東去及鄂岳已來捨陸登舟小青之疾轉甚去家三十餘里乃卒夢小青云瘞我北岸新塋之後及殯于北岸乃遇一新塋依夢中所約瘞之及歸妻已卒問其日乃澄城縣所夢之日謁其塋乃瘞小青墳之前也時乃春暮其塋四面多是海棠花也韋檢韋檢舉進士不第常有美姬一日捧心而卒檢追痛悼殆不勝情舉酒吟詩悲怨可掬因吟曰寶劍化龍歸碧落嫦娥隨月下黃泉一杯酒向青春晚寂寞書牕恨獨眠一日忽夢姬曰某限於修短不盡箕箒涕淚潸然當有後期今和來篇口占曰春雨濛濛不見天家家門外柳和煙如今腸斷空垂淚歡笑重追別有年檢終日悒悒後更夢姬曰即遂相見覺來神魂恍惚乃題曰白浪漫漫去不迴浮雲飛盡日西頹始皇陵上千年樹銀鴨金鳧也變灰後果即世皆符兆朱少卿王蜀時有朱少卿者不記其名貧賤客於成都因寢於旅舍夢中有人扣扉覔朱少卿其聲甚厲驚覺訪之寂無影響復睡夢中又連呼之俄見一人手中執一卷云少卿果在此朱曰吾姓即同少卿即不是其人遂卷文書兩頭只留一行以手遮上下果有朱少卿三字續有一人自外牽馬一疋直入云少卿領取朱視之其馬無前足步步側蹶匍匐而前其狀異常苦楚朱大驚而覺常自惡之後蜀王開國有親知引薦累至司農少卿無何膝上患瘡雙足自膝下俱落痛苦經旬五月五日殂乃馬夢之徵也覃騭孟蜀工部侍郎劉義度判雲安日有押衙覃騭夢與友人胡鍼同在一官署廳前見有數人引入劉公則五木備體孑然音旨說理分解似有三五人執對久而方退於行廊下坐見進食者皆是鮮血覃因問旁人答曰公為斷刑錯誤所致追來亦數日矣遂覺及早見胡鍼話之鍼曰余昨夜所夢一與君叶豈非同夢乎因共祕之劉公其日果吟感懷詩十韻其一首曰昨日方髽髻如今滿頷髯紫閣無心戀青山有意潛今其詩皆刊於石上人皆訝其詩意不數日而卒豈非斷刑之有錯誤乎孟德崇蜀宗正少卿孟德崇燕王貽鄴之子也自恃貴族脫略傲誕嘗太廟行香攜妓而往一夕夢一老人責之且取案上筆叱令開手大書九十字而覺翌日與賓客話及此事自言老人責我是惜我也書九十字賜我壽至九十也客有封璉戲之曰九十字迺是行書卒字亞卿其非吉徵乎不旬日果卒孫光憲荊南節度使高保融有疾幕吏孫光憲夢在渚宮池與同僚偶坐而保融在西廳獨處唯姬妾侍焉俄而高公弟保勗見召上橋授以筆硯令光憲指撝發軍仍遣廳頭二三子障蔽光憲不欲保融遙見逡巡有具橐鞬將校列行俟命次見掌節吏嚴光楚鞹而前趨手捧兩黑物其一則如黑漆鞾而光其一即尋常鞾也謂光憲曰某曾失墨兩挺蒙王黜責今果尋獲也良久夢覺翌日說於同僚踰月而保融卒節院將嚴光楚具帖子取處分倒節光憲請行軍司馬王甲判之墨者陰黑之物節而且黑近於凶象即向之所夢倒雙節之謂也陸洎江南陸洎為常州刺史不克之任為淮南副使性和雅重厚時輩推仰之副使李承嗣尤與之善乙丑歲九月承嗣與諸客訪之洎從客曰某明年此月當與諸客別矣承嗣問其故答曰吾向夢人以一騎召去止大明寺西可數里至一大府署曰陽明府入門西序復有東向大門下馬入一室久之吏引立階下門中有二綠衣吏捧一案案上有書有一紫衣秉笏取書宣云洎三世為人皆行慈孝功成業就宜授此官可封陽明府侍郎判九州都監事來年九月十七日本府上事復以騎送歸奄然遂寤靈命已定不可改矣諸客皆嘻然至明年九月日使候其起居及十六日承嗣復與向候之客詣之謂曰君明日當上事今何無恙也洎曰府中已辦明當行也承嗣曰吾常以長者重君今無乃近妖乎洎曰唯君與我有緣他日必當卜鄰承嗣默然而去明日遂卒葬於茱萸灣承嗣後為楚州刺史卒葬於洎墓之北云周延翰江南太子校書周延翰性好道頗修服餌之事嘗夢神人以一卷書授之若道家之經其文皆七字為句唯記其末句云紫髯之畔有丹砂延翰寤而自喜以為必得丹砂之效從事建業卒葬於吳大帝陵側無妻子唯一婢名丹砂王瞻虔化縣令王瞻罷任歸建業泊舟秦淮病甚夢朱衣吏執牒至曰君命已盡今奉召瞻曰命不敢辭但舟中狹隘欲寬假之使得登岸卜居無所憚也吏許諾以五日為期至日平明且當來也既寤便能下牀自出僦舍營辦凶具教其子哭踊之節召六親為別至期登榻安臥向曙乃卒邢陶江南大理司直邢陶癸卯歲夢人告云君當為涇州刺史既而為宣州涇縣令考滿復夢其人告云宣州諸縣官人來春皆替而君官誥不到邢甚惡之至明年春罷歸有薦邢為水部員外郎牒下而所司失去復請二十餘日竟未拜而卒
