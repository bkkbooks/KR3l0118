body:
  text: 郭翻郭翻晉郭翻字長翔武昌人敬言之弟子也徵聘不起亡數日其少子忽如中惡狀不復識人作靈語音聲如其父多知陰世所問皆答而昔時庾亮欲取為上佐不就家問曰君生有令德沒為神明今豈有官職也答曰我本無仕進之志以庾公欲見取不願放得脫今復為羈縶不得從初願故爾戚戚也問庾今何官答云為天所用作撫軍大將軍現居東海之東統領神兵取吾為司馬本欲取謝仁為祖之選以為資望未足且蔣大侯先取為都尉是以不能因問陶太尉何官答云陶辛苦不可言方在罪謫之候過此大得敘用也又問王承相今何職答曰王公為尚書郎大屈事更萬機位雖不及生時而貴勢無異也諸人曰亡後還思後人否長翔曰亡已久則不復念生人如吾始死私心未歇猶自有念也靈語兒求紙筆欲作書與親舊捉筆以命兒書之皆橫行似胡書已成一紙曰此是鬼書人莫能識使人持紙口授作書書畢諸人言蘇孝先多作此語久下作後授作詩二首曰神散登旻蒼性軀忽以亡追念疇昔志精魂還逍遙秉心不得令不免時所要薄言告所親恐謂言妖忘大沒無識在昔有蘇韶于是絕響而去王瑗之廣漢王瑗之為信安令在縣忽有一鬼自稱姓蔡名伯喈俄復談議詩揆知古今靡所不諳問是昔日蔡邕否答云非也與之同姓字耳問前伯喈今何在云在天上作仙人甚是受福甚快樂非復疇昔也牽騰以咸和三年為沛郡太守出行不節夢烏衣人告云何數出不輟唯當斷馬足騰後出行馬足自斷騰近行廓外忽然而闇有一人長丈餘玄冠白衣遙叱將車人使避之俄而長人至以馬鞭擊御者即倒既明從人視車空覓騰所在行六七十步見在榛莽中隱几而坐云了不自知騰五十日被誅新鬼有新死鬼形疲瘦頓忽見生時友人死及二十年肥健相問訊曰卿那爾曰吾飢餓殆不自任卿知諸方便故當以法見教友鬼云此甚易耳但為人作怪人必大怖當與卿食新鬼往入大墟東頭有一家奉佛精進屋西廂有磨鬼就推此磨如人推法此家主語子弟曰佛憐吾家貧令鬼推磨乃輦麥與之至夕磨數斛疲頓乃去遂罵友鬼卿那誑我又曰但復去自當得也復從墟西頭入一家家奉道門傍有碓此鬼便上碓為人舂狀此人言昨日鬼助某甲今復來助吾可輦穀與之又給婢簸篩至夕力疲甚不與鬼食鬼暮歸大怒曰吾自與卿為婚婣非他比如何見欺二日助人不得一甌飲食友鬼曰卿自不偶耳此二家奉佛事道情自難動今去可覓百姓家作怪則無不得鬼復出得一家門首有竹竿從門入見有一群女子窗前共食至庭中有一白狗便抱令空中行其家見之大驚言自來未有此怪占云有客鬼索食可殺狗並甘果酒飯于庭中祀之可得無他其家如師言鬼果大得食自此後恒作怪友鬼之教也劉青松廣陵劉青松晨起見一人著公服繼板云召為魯郡太守言訖便去去後亦不復見至來日復至曰君便應到職青松知必死入告妻子處分家事沐浴至晡見車馬吏侍左右青松奄忽而絕家人咸見其升車南出百餘步漸高而沒庾亮庾亮鎮荊州亮登廁忽見廁中一物如方相兩眼盡赤身有光耀漸漸從土中出庾乃攘臂以拳擊之應手有聲縮入地因而寢疾遂亡司馬義金吾司馬義妾碧玉善絃歌義以太元中病篤謂碧玉曰吾死汝不得別嫁當殺汝曰謹奉命葬後其鄰家欲娶之碧玉當去見義乘馬入門引弓射之正中其喉喉便痛亟姿態失常奄忽便絕十餘日乃甦不能語四肢如被撾損周歲始能言猶不分明碧玉色甚不美本以聲見取既被患遂不得嫁李元明前唐李元明嘗在牀上臥時夜半忽聞人呼云元明元明久乃出應有二人便牽將去入屋下捨去不知所在至逾時竟鮮所見徐捫所坐牀是棺木四壁皆是冢恐怖不安欲去難如升天不復能出家人左右索不知所往因率領僕從乃共大呼其名元明于冢中聞遙應之乃鑿門出之張闓城張闓以建武二年從野還宅見一人臥道側問之云足病不能復去家在南楚無所告訴闓憫之有後車載物棄以載之既達家此人了無感色且語闓曰向實不病聊相試耳闓大怒曰君是何人而敢弄我也答曰我是鬼耳承北臺使來相收錄見君長者不忍相取故佯為病臥道側向乃捐物見載誠銜此意然被命而來不自由奈何闓驚請留鬼以豚酒祀之鬼相為酹享於是流涕固請求救鬼曰有與君同名字者否闓曰有僑人黃闓鬼曰君可詣之我當自往闓到家主人出見鬼以赤摽摽其頭因回手以小鈹刺其心主人覺鬼便出謂闓曰君有貴相某為惜之故虧法以相濟然神道幽密不可宣泄闓後去主人暴心痛夜半便死闓年六十位至光祿大夫庾紹之晉新埜庾紹之小字道覆湘東太守與南陽宗協中表昆弟情好綢繆紹元興末病亡義熙中忽見形詣協形貌衣服具如平生而兩腳著械既至脫械置地而坐協問何由得來顧答云暫蒙假歸與卿親好故相過也協問鬼神之事言輒漫略不甚諧對唯云宜勤精進不可殺生若不能都斷可勿宰牛食肉之時勿啗物心協云五臟與肉乃有異耶答曰心者藏神之宅也其罪尤重具問親戚因談世事末復求酒恊時與茱萸酒因為設之酒至杯不飲云有茱萸氣恊曰為惡耶答云下官皆畏之非獨我也紹之為人語聲高壯比言倫時不異恒日有頃恊兒邃之來紹聞屐聲極有懼色謂恊曰生氣見陵不復得住與卿三年別耳因貫械而起出戶便滅恊後為正員郎果三年而卒韋氏安定人姓韋北伐姚泓之時歸國至都住親知家時擾亂齊有客來問之韋云今雖免慮而體氣惙然未有氣力思作一羹尤莫能得至淒苦夜中眠熟忽有叩牀而來告者云官與君錢便驚出戶忽一千錢在外又見一烏紗冠幘于執板背戶而立呼主人共視比來已不復見而取錢用之胡馥之上郡胡馥之娶婦李氏十餘年無子而婦卒哭之慟汝竟無遺體怨酷何深婦忽起坐曰感君痛悼我不即朽可人定後見就依平生時當為君生一男語畢還臥馥之如言不取燈燭暗而就之復曰亡人亦無生理可側作屋見置須伺滿十月然後殯爾後覺婦身微煖如未亡既十月後生一男男名靈產賈雍豫章太守賈雍有神術出界討賊為賊所殺失頭上馬回營胸中語曰戰不利為賊所傷諸君視有頭佳乎無頭佳乎吏涕泣曰有頭佳雍曰不然無頭亦佳言畢遂死宋定伯南陽宋定伯年少時夜行逢鬼問之鬼言我是鬼鬼問汝復誰定伯誑之言我亦鬼鬼問欲至何所答曰欲至宛市鬼言我亦欲至宛市遂行數里鬼言步行太遲可共遞相擔何如定伯曰大善鬼便先擔定伯數里鬼言卿太重不是鬼也定伯言我新鬼故身重耳定伯因復擔鬼鬼略無重如是再三定伯復言我新鬼不知有何所惡忌鬼答言唯不喜人唾于是共行道遇水定伯令鬼渡聽之了然無水音定伯自渡漕漼作聲鬼復言何以有聲定伯曰新死不習渡水故爾勿怪吾也行欲至宛市定伯便擔鬼至肩上急執之鬼大呼聲咋咋然索下不復聽之經至宛市中下著地化為一羊便賣之恐其變化唾之得錢千五百乃去當時有言定伯賣鬼得錢千五呂光呂光承康元年有鬼叫於都街曰兄弟相滅百姓弊徼吏尋視之則無所見其年光死子紹代立五日紹庶兄篡殺紹自立
