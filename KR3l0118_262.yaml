body:
  text: 崔育崔育唐前進士崔育以中原亂離客于邊上亦聞輒事輕薄刺郡者亦是朝僚多勉而牛帶竹笠大如雨席仍牛前遣撾角村城郭士女隨觀謂之精怪每謁州郡騎咍之者怒之者相半至則投刺其名銜耽酒嗜肉憐蔥愛蒜不得已而懸宰視之如土木藩帥郡侯奈之不可州民臠其肉族其家蓋輕薄之所致也唐唐字原空闕據許本補進士宇文翃深慕上科有女及笄國色朝中令及第者求之不得時竇年四十求之至四十九字原空闕據北夢瑣言四補餘方謀繼室兄回為諫議能為人致登第能為人致登第六字原空闕據北夢瑣言四補遂娉女於璠為言於回矣果有所獲相公韋公説即有中表甚鄙之因果有至之因十六字原空闕據北夢瑣言四補滑臺杜志名時有喪遭火幾爇棺柩家人云老鼠尾曳火入庫內家人至庫內十一字原空闕據北夢瑣言四補因而延燎杜謂宇文曰魚將化龍雷為燒尾近日老鼠亦雷為至鼠亦九字原空闕據北夢瑣言四補有燒尾尾字原空闕據北夢瑣言四補之事用以譏之之字原空闕據北夢瑣言四補出北夢瑣言韓簡唐魏博節度使韓簡性粗質每對文士不曉其説心常恥之乃召一孝廉講論語至為政篇翌日謂諸從事曰僕近方知古人淳朴年至三十方能行立外有聞者無不絶倒出北夢瑣言胡令奉先縣有令姓胡忘其名瀆貨靳食僻好博奕邑寄張巡官好尚既同往來頗洽每會棋必自旦及暮品格既停略無厭倦然宰君時入中門少頃又來對棋如是日日早入晚歸未嘗設食於張不勝飢凍潛知之時入蓋自食而復出及暮辭宰曰且去也極是叨鐵胡唯唯而已張去胡忽思之曰此人相別云極是叨鐵出何文談急令追之既至問明公適云極是叨鐵其義安在張復款坐謂曰長官豈不知有叨鐵耶曰不知曰還見冶爐家置一鐵䂎長杖乎只此是爐中猛火炎熾鐵汁或未銷融使此杖時時於爐中橦猛火了却出來移時又橦猛火了却出來只此是叨鐵也言訖而去胡入室話於妻子再三思之方知諷其每日自入噇猛火了却出來棋也凡靳食倦客之士時人多以此諷之出玉堂間話蜀秀才楊錚錚音竹觥反自言楊錚不均駟馬奔鄭是以字奔鄭行惡思或故作落韻或醜穢語取人笑玩裝修卷軸投謁王侯門到者無不逄迎雄藩火幕爭馳車馬迎之錚每行僕馬甚盛平頭騎從騾攜書袋偏郡小邑尤更精意承事之慮其謗瀆黔南節度使王茂權聰明有文武才四方負藝之士罔不集其門召錚至飭東閣盡禮待之時令貢惡詩以為歡笑諸客客字原空闕據黃本補請召有不得次者以為怏怏茂權一日忽屏忽屏二字原空闕據黃本補從謂之曰秀才客子當州必欲咨留相伴至罷鎮同歸可乎如可則當則當二字原空闕據黃本補奉為卜娶所居居字原空闕據黃本補奉留錚欣然從之權令媒氏與問名某氏名某氏三字原空闕據黃本補之屬至于成迎筵宴筵宴二字原空闕據黃本補為備焉仍邀諸從事赴會錚親見女見女二字原空闕據黃本補容質異常端麗及成禮遽遭毆毆字原空闕據黃本補辱左右婢僕皆是扶同共扶同共三字原空闕據黃本補相毀詈不勝其苦乃是茂權詐飭無鬚少年數輩皆穠裝皆穠裝三字原空闕據黃本補艷服以紿之然後茂權自赴會大笑此後復就茂權屢自屢自二字原空闕據黃本補乞一邑初有難色賓從其咨方許之遂命給蕳署及其治期治二字原空闕據黃本補行李擇良日辭謝本邑迎候人力自衙門外至通衢忽有二健步手執一牒當街趨拽下馬奪去中帶云有府府字原空闕據黃本補斷攝官送獄荷校滅耳茂權遂詐作計贈遺二夫令脫逃逃字原空闕據黃本補而遁潛藏旬日方召出之軍州大以為笑出王氏見聞謝柴書唐有內大臣學作別紙言語鳳翔節度使寄柴數車回書謝云蒙惠也愚若干出盧氏雜説郡牧唐有膏梁子出刺郡人迎候甚至前任與之設交代之禮儀無闕者二禮生具頭冠禮衣相其賓主升降揖讓而新牧巑岏踧踖斂容低視不敢正面對禮生及禮畢使人再三傳語慰勞感謝皆莫涯其意翌日於內閣從禮生從容生極惶恐罔知去就既坐頻蹙低語曰賢尊安否禮生唯唯又曰頃年營大事時極煩賢尊心力生亦矒然及罷有親知細詢之乃曰此禮生緣方相子弟昔曾使他家君是以再三感謝且士流中亦有故為輕薄者亦有昧於菽爽不能分別者信而有之出玉堂間話張咸光梁龍德年有貧衣冠張咸光遊丐無度於梁宋之間復有劉月明者與咸光相類常懷匕著每遊貴門即遭虐戲方飱則奪其匕著則袖中出而用之梁駙馬溫積諫議權判開封府事咸光忽遍詣豪門告別問其所詣則曰往投溫諫議也問有何紹介而往答曰頃年大承記録此行必厚遇也大諫嘗製碣山潛龍宮上梁文云饅頭似碗胡餅如籭暢殺劉月明主簿喜殺張咸光秀才以此知必承顧盻聞者絶倒出玉堂間話長鬚僧三蜀有長鬚長老自言是宰相孔謙子莫知誰何不剃髮鬚皓然垂腹擁百餘衆自江湖入蜀所在氓俗瞻駭儀表爭相騰踐而禮其足凡所經由傾城而出河目海口人莫之測至蜀螺鈸迎焉先謁樞密使宋光嗣因問曰師何不剃鬚答曰落髮除煩惱留髭表丈夫宋大恚曰吾無髭豈是老婆耶遂揖出俟剃却髭即引朝見徒衆既多旬日盤桓不得已剃髭而入徒衆恥其失節悉各散亡偽蜀主問曰遠聞師有長鬚之號何得如是對曰臣在江湖嘗聞陛下已證須陀洹果是以和鬚而來今見陛下將證阿那舍果是以剃鬚而見少主初未喻喻原作預據許本改首肯之及近臣解釋大為歡笑後住持靜亂寺數為大衆論訟有上足以不謹獲罪伶人藏柯曲深慕空門而不知其中猥細謂是清靜舍俗落髮謹事瓶鉢漸見穢濫詬詈而出以袈裟挂于寺門曰吾比厭俗塵投身清潔之地以滌其業鄣今大師之門甚於花柳曲吾不能為之遂復歸于樂籍蜀人謂師曰一事南南字原空闕據黃本補無折却長鬚出王氏見聞道流任興元節判離秦州鄉地未及歲年忽有來尋師者齎親表施州刺史劉緘封衣紫而來兼言往洋州求索詢其行止云某忝竊鄉關之分先於秦州西升觀入道多年遂沉吟思之當離鄉日觀中無此道流深感其命服所求其人亦忩忩而過旬月間自洋源回薄有所獲告辭之意亦甚揮遽遂設計延佇拂榻止之夜靜沃以醲醪數甌然後徐詢之曰尊師身邊紫綬自何而得宜以直誠相告對曰此是先和尚命服傳而衣之乃是廣修寺著紫僧弟弟原作身據黃本改子師既殂乃舍空門投西升觀入道便以紫衣而服之自謂傳得本師衣鉢豈有道士竊衣先先原作元據黃本改和尚紫衣未之前聞出玉堂間話三妄人孫光憲在蜀時曾到資州見應貞觀李道士話州有姓趙人閉關却掃以廊廟自期都虞侯閻普敬異之躬自趨謁閻魁梧丈夫趙生迎門愕眙良久磬折敘寒溫曰伏惟貔貅閻乃質於先容者俾詢之趙生曰若云熊羆即須宰相之才方當此語閻公止於都頭已來只銷呼為貔貅人聞咸笑之又一士自稱張舍人訴於光憲曰兄長以術惑我心神憲謂曰得非蠱毒厭勝之術耶張曰非也乃用鬼谷子押闔捭破我心神至今患心風不禁又江陵顏雲偶收諸葛亮兵書自言可用十萬軍吞并四海每至論兵必攘袂叱吒若對大敵時人謂之檢譜角抵也時有行軍王副使幽燕舊將聲聞宇內顏生候謁稱是同人自言大志不伸伸字原空闕據黃本補喪良友也每慟哭焉出北夢瑣言周周字原闕據黃本補韋巽太尉昭度之子也尪懦昏鈍率由婢嫗仕偽蜀王氏以事舊優容之因至卿監或為同列所譏云三公門前出死鼠巽曰死鼠門前出三公周即蜀相周博雅之子為王氏駙馬都尉性識庸鄙國亡後與貧丐者為伍俾一人先導爵里於闤闠酒肆有哀之者日獲三二百錢即與其徒飲噉而已咸嗟嘆之出北夢瑣言不識鏡有民妻不識鏡夫市之而歸妻取照之驚告其母曰某郎又索一婦歸也其母亦照曰又領親家母來也出笑林嚙鼻甲與乙鬭爭甲嚙下乙鼻官吏欲斷之甲稱乙自嚙落吏曰夫人鼻高耳口低豈能就嚙之乎甲曰他踏床子就嚙之出笑林助喪禮有人弔喪并欲齎物助之問人可與何等物答曰錢布帛任君所有爾因齎大豆一斛置孝子前謂曰無可有以大豆一斛相助孝子哭孤窮奈何曰造豉豉原作鼓據黃本改孝子又哭孤窮曰適得便窮更送一石出笑林外學歸甲父母在出學三年而歸舅氏問其學何得并序別父久乃答曰渭陽之思過於秦康既而父數之爾學奚益答曰少失過庭之訓故學無益出笑林行吊傖人欲相共吊喪各不知儀一人言粗習謂同伴曰汝隨我舉止既至喪所舊習者在前伏席上餘者一一相髡於背而為首者以足觸詈曰癡物諸人亦為儀當爾各以足相踏曰癡物最後者近孝子亦踏孝子而曰癡物出笑林癡壻有癡壻婦翁死婦教以行吊禮於路值水乃脫襪而渡惟惟字原空闕據黃本補遺一襪又覩林中鳩鳴云𡅂鴣𡅂鴣而私誦之都忘吊禮及至乃以有襪一足立而縮其跣者但云𡅂鴣𡅂鴣孝子皆笑又曰莫笑莫笑如拾得襪即還我出笑林魯人執竿魯有執長竿入城門者初豎執之不可入橫執之亦不可入計無所出俄有老父至曰吾非聖人但見事多矣何不以鋸中截而入遂依而截之出笑林齊人學瑟齊人就趙人學瑟因之先調膠柱而歸三年不成一曲齊人怪之有從趙來者問其意方知向人之愚出笑林市馬洛中有大寮世籍膏梁不分牝牡偶市一馬都莫知其妍媸為駔儈所所字原空闕據黃本補欺曰此馬不唯馴良齒及二十餘歲合直兩馬之資況行不動塵可謂馴良之甚也遂多金以市之儈既倍獲利臨去又曰此馬兼有榲桲牙出也於是大喜詰旦乘出如鵝鴨之行及至家矜衒曰此馬不唯馴熟兼饒得果子牙兩所復召儈別贈二十出玉堂間話昭應書生唐有德音搜訪懷才抱器不求聞達者有人於昭應逢一書人奔馳入京問求何事答曰將應不求聞達科出因話録
