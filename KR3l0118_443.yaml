body:
  text: 麈吳唐吳唐者廬陵人也少好射獵矢不虛發嘗方春將其子出獵乃值一麈將麑戲焉麈覺有人氣引麑潛去麑未知所畏因前就唐唐射之而死麈驚還悲鳴唐乃置麑淨地自藏草中麈來俯舐頓伏唐又射之應弦而倒既而又逢一麈張弩之間箭忽自發激中其子唐即投弓抱子撫膺而哭忽聞空中呼曰吳唐麈之愛子與汝何異驚視左右虎從旁出遙前搏折其臂還家一宿而卒李嬰有李嬰者與弟縚皆善用弩曾射得一麈解其四腳懸置樹間剖以為炙列於火上方欲共食忽見山下有一神人長三丈許鼓步而來手持大囊既至悉斂肉及皮骨并列火上者於囊中徑還山去嬰與弟縚驚駭莫知所措亦竟無他焉劉憣青州有劉憣者元嘉初射得一獐剖腹以草塞之蹶然而起俄而前走憣怪而拔其塞草須叟還臥如此三焉憣密録此種以求其類理創多驗蒼鹿鹿千年為蒼鹿又五百年為白鹿又五百年化為玄鹿漢成帝時中山人得玄鹿烹而視其骨皆黑色仙方云玄鹿為脯食之壽至二千歲餘干縣有白鹿土人傳千歲矣晉成帝遣人捕得有銅牌鐫字在角後云寶鼎二年臨江所獻蒼鹿科藤合浦康頭山有一鹿額上戴科藤一枚四條直上各一丈許雷郡有鹿腥無味不可食俗云海魚所化郡人嘗見魚首而身為鹿者斯信矣與鷹鳩雀雉之化奚異哉銅環胡向為虢州時獵人殺一鹿重一百八十斤蹄下貫銅環環上有篆字博物者不能識鹿馬洮陽縣東有華山去縣九十里回跨峙堞峰嶺參差昔有人因獵見二鹿其一者霜毛純素照耀山谷一者五彩成文煥爛曜日獵人驚其奇異而不射前行數里見二人訶責云使君何來不見二馬耶答云唯見雙鹿曰吾為虞帝所使至衡山與安邱道士相聞君所見鹿是吾馬也紫石晉安有東山樵人陳氏恆見山中有火光燭天伺之久乃見一大鹿光自口出設罝捕而獲之剖其腹得一紫石圓瑩如珠因寶藏之家自是富至其孫奢縱好酒醉而玩其珠以為石何神因擊碎之家自是貧矣陸紹第唐虞部郎中陸紹第為盧氏縣尉掌時獵遇鹿五六頭臨澗見人不驚毛斑如畫陸怪獵人不射問之獵者言此是仙鹿也射之不能傷且復不利陸不信強之獵者不得已一發矢鹿帶箭而去及返射者墜崖折左足唐玄宗開元二十三年秋玄宗皇帝狩于近郊駕至咸陽原有大鹿興于前贔然其軀頗異于常者上命弓射之一發而中及駕還乃敕廚吏炙其䏶已進而尚食具熟俎獻時張果老先生侍上命果坐于前以其肉賜之果謝而食既食且奏曰陛下以此鹿為何如上曰吾只知其鹿也亦未知何如哉果曰此鹿年且千歲矣陛下幸問臣上笑曰此一獸耳何遂言其千歲耶果曰昔漢元狩五年秋臣侍武帝畋于上林其從臣有生獲此鹿而獻者帝以示臣奏曰此仙鹿也壽將千歲今既生獲不如活之會武帝尚神仙由是納臣之奏上曰先生紿矣且漢元狩五年及今八百歲其鹿長壽豈歷八百歲而不為畋所獲乎況苑囿內麋鹿亦多今所獲何妨為他鹿乎果曰曩時武帝既獲此鹿將捨去之且命東方朔以練銅為牌刻成文字以識其年系于左角下願得驗之庶表臣之不誣也上即命置鹿首于前詔內臣高力士驗之凡食頃曾無所見上笑曰先生果謬矣左角之下銅牌安在果曰臣請自索之即顧左右命鐵鉗鉗出一小牌實銅製者可二寸許蓋以年月悠久為毛革蒙蔽始不見耳持以進上命磨瑩視之其文字刓斃不可識矣上於是信果之不謬又問果曰漢元狩五年甲子何次史編何事吾將徵諸記傳先生第為我言之果曰是歲歲次癸亥武帝始開昆明池用習水戰因搜狩以順禮焉逮今甲戍歲八百五十二年上即命按漢史其昆明池果元狩五年所開其甲子亦無差上顧謂力士曰異乎哉張果能言漢武時事真所謂至人矣吾固不可得而知也彭世鄱陽樂安彭世晉咸康中以獵射為業每入山與子俱行後忽蹶然而倒化成一鹿跳躍而去其子終身不復弋獵至孫卻習其事曾射一鹿兩角間有道家七星符并其祖名字及鄉居年月焉睹之悔懊自此永斷射獵鹿娘常州江陰縣東北石筏山者梁時有伐材人入此山見有麀鹿産仍聞小兒啼聲往視見産一女子因收取養之及長乃令出家為道士時人謂之鹿娘梁武帝為置觀名為聖觀張盍踏昔張盍踏寧成二人並出家于蜀雲臺山石室中忽有一人著黃練單衣葛巾到其前曰勞乎道士因以鏡照之見是一鹿遂責問之曰汝草中老鹿何敢詐為人形言訖化成老鹿而走去車甲陶潛搜神記曰有一士人姓車是淮南人天雨舍中獨坐忽有二年少女來就之著紫纈襦立其床前共語笑車疑之天雨如此女人從外來而衣服何不沾濕必是異物其壁上先挂一銅鏡徑數寸回顧鏡中有二鹿在床前因將刀斫之而悉成鹿一走去獲一枚以為脯食之嵩山老僧嵩山內有一老僧結茅居薜蘿間修持不出忽見一小兒獨參禮懇求為弟子僧但誦經不顧其小兒自旦至暮不退僧乃問之曰此深山內人迹甚稀小兒因何至又因何求為弟子小兒曰本居山前父母皆喪幼失所依必是前生不修善果所致今是以發願捨離塵俗來求我師實欲修來世福業也僧曰能如是耶其奈僧家寂寞不同于俗人志願雖嘉能從道心惟一乎小兒曰若心與言違皇天后土自不容耳不唯我師不容也僧察其敏悟知有善緣遂與落髮小兒為弟子後精進勤劬罕有倫等或演法于僧僧不能對或問道于僧僧不能折老僧深重之以為聖賢也後數年時在素秋萬木凋落涼風悲起磎谷凄清忽慨然四望朗吟曰我本長生深山內更何入他不二門爭如訪取舊時伴休更朝夕勞神魂吟訖復長嘯良久有一群鹿過小兒躍然脫僧衣化一鹿跳躍隨群而去王祜岐州西二十里王祜者豪富之家也第宅華麗擬于貴顯常開館舍以待往來至于珍饌芳醪雖有千人詣之曾不缺乏忽一日有一道士謁祜自稱華山道士學真攜一張琴負一壺藥來求寄泊祜性且好道既問之欣然出迎延于深院敬待倍常道士問祜曰君如是富足敵侯伯之樂也福則福矣其如不賢祜笑而起拜道士曰君設食于門下以俟賢俊耶以待餓者而飼之耶若以待餓方今天下安樂餘糧栖畝人無乏絶又何飼之若以俟賢俊則不聞君延一賢揖一俊足以知君自不賢耳無訝我言我恐君有憑癡之名喧譁于人口故以此直言以悟君亦緣感君倍常敬仰我也祜遂慨然動容再拜之道士又曰我聞人之好樂必有其師事縱橫者實存遊説之志讀孫吳者那無爭戰之心哉某手攜一張琴負一壺藥者豈獨欲勞頓也抑有旨耳攜琴者我知琴有古風欲人知我好古又欲化人還淳朴省澆浮也負藥壺者我知人之多病欲人知我有痊平人病之意也我琴非止自化也化人也我藥非止痊自病也痊人病也噫君之富濟于人與夫家纍千金剝割人者則殊如以古之豪貴之家待士則怍矣必以賢愚有別慎保身名無反招謗耳祜復再拜道士乃命酒自酌才曙遽辭而去祜令人潛偵之見道士化一大鹿西走不知所之雜説江陵松滋枝江村射鹿者率以淘河烏脛骨為管以鹿心上脂膜作簧吹作鹿聲有大號小號呦呦之異或作麀鹿聲則麚鹿畢集蓋為牝聲所誘人得彀矢而注之南中多鹿每一牡管牝百頭至春羸瘦蓋遊牝多也及夏則唯食菖蒲一味卻肥當角解之時其茸甚痛獵人逢之其鹿不敢逸走伏而不動獵者以繩繫其茸截而取之先以其血來啖然後斃鹿何其苦也歟夫狨麝孔雀以有用賈害良可愍之嵐州永淳年嵐勝州兔暴千萬為群食苖並盡不知何物變化及暴已即並失卻莫知何所異哉楊邁司農卿楊邁少好畋獵自云在長安時放鷹於野遙見草中一兔跳躍鷹亦自見即奮往搏之既至無有收鷹上鞴行數十步回顧其處復見兔走又搏之亦不獲如是者三即命芟草以求之得兔骨一具蓋兔之鬼也
