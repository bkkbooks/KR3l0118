body:
  text: 客隱遊客隱遊魏安釐王觀翔鵠而樂之曰寡人得如鵠之飛視天下如芥也客有隱遊者聞之作木鵠而獻王王曰此有形無用者也夫作無用之器世之奸民也召隱遊欲加刑焉隱遊曰大王知有用之用未悟無用之用也今臣請為大王翔之乃取而騎焉遂翻然飛去莫知所之也天毒國道人燕昭王七年沐骨之國來朝則申毒國之一名也有道術人名尸羅問其年云百四十歲荷錫持瓶云發其國五年乃至燕都喜衒惑之術於其指端出浮圖十層高三尺乃諸天神仙巧麗特絶列幢蓋鼓舞繞塔而行人皆長五六分歌唱之音如真人矣尸羅噴水為氛霧暗數里間俄而復吹為疾風氛霧皆止又吹指上浮圖漸入雲裏又於左耳出青龍右耳出白虎始入之時才一二寸稍至八九尺俄而風至雲起即以一手揮之即龍虎皆入耳中又張口向日則見人乘羽蓋駕螭鵠直入於口內復以手抑胸上而聞衣袖之中轟轟雷聲更張口則向見羽蓋螭鵠相隨從口中而出尸羅常坐日中漸漸覺其形小或化為老叟或變為嬰兒倏忽而死香氣盈室時有清風來吹之更生如向之形呪術衒惑神怪無窮騫霄國畫工秦始皇元年騫霄國獻刻玉善畫工名裔使含丹青以漱地即成魑魅及鬼怪群物之象刻石為百獸之形毛髮宛若真矣皆銘其臆前記以年月工人以絹畫地方寸之內寫四瀆五嶽列國之圖又為龍鳳騫翥若飛皆不得作目作必飛走也始皇嗟曰刻畫之形何能飛走使以淳漆各點兩玉虎一眼睛旬日則失之不知何所在山澤人云見二白虎各無一眼相隨而行毛色形相異於常見者至明年西方獻兩白虎皆無一眼始皇發檻視之疑是先所失者乃刺殺之檢其臆前果是元年所刻玉虎也營陵人漢北海營陵有道人能令人與已死人相見其同郡婦死已數年聞而往見之曰願令我一見亡婦死不恨矣道人曰卿可往見之若聞鼓聲即出勿留乃語其相見之術於是與婦言語悲喜恩情如生良久聞鼓聲恨恨不能得往當出戶時奄忽其衣裙戶間掣絶而去至後歲餘此人身亡室家葬之開冢見婦棺蓋下有衣裾扶婁國人南垂有扶婁之國其人善能機巧變化易形改服大則興雲霧小則入纖毫綴金玉毛羽為衣服能吐雲噴火鼓腹則如雷霆之聲或為巨象獅子龍蛇犬馬之狀或為虎口中生人或於掌中備百獸之樂宛轉屈曲於指間人形或長數分或復數寸神怪倏忽炫麗於時樂府皆傳此伎至末代猶學焉得粗得精代代不絶乃俗謂之婆侯伎則扶婁之音訛耳徐登閩中有徐登者女子化為丈夫與東陽趙昞並善方術時遭兵亂相遇於溪各矜其所能登先禁溪水為不流昞次禁枯柳為生稊二人相視而笑登年長昞師事之後登身故昞東入長安百姓未知昞乃升茅屋據鼎而爨主人驚怪昞笑而不應屋亦不損又嘗臨水求渡船人不許昞乃張蓋坐中長嘯呼風亂流而濟於是百姓敬服從者如歸長安令惡而殺之民立祠於永寧而蚊蚋不能入周眕奴魏時尋陽縣北山中蠻人有術能使人化作虎毛色爪身悉如真虎鄉人周眕有一奴使入山伐薪奴有婦及妹亦與俱行既至山奴語二人云汝且上高樹去我欲有所為如其言既而入草須臾一大黃斑虎從草山奮越哮吼甚為可畏二人大怖良久還草中少時復還為人語二人歸家慎勿道後遂向等輩說之周尋復之乃以醇酒飲之令熟醉使人解其衣服乃身體事事祥視了無異唯於髻髮中得一紙畫作虎虎邊有符周密取録之奴既喚醒問之見事已露遂具說本末云先嘗於蠻中告糴有一蠻師云有此符以三尺布一斗米一隻雞一斗酒受得此法趙侯晉趙侯少好諸術姿形悴陋長不滿數尺以盆盛水作禁魚龍立見侯有白米為鼠所盜乃披髮持刀畫作地獄四面為門向東嘯群鼠俱到呪之曰凡非噉者過去盜者令止止者十餘剖腹看臟有米在焉曾徒跣須屐因仰頭微吟雙屐自至人有笑其形容者便陽設以酒杯向日即掩鼻不脫仍稽顙謝過著地不舉永康有騎石山山上有石人騎石馬侯以印指之人馬一時落首今猶在山下天竺胡人晉永嘉中有天竺胡人來渡江南有幻術能斷舌吐火所在人士聚觀將斷舌先吐以示衆然後刀截血流覆地乃燒取置器中傳以示人視之舌半猶在既而還取合續之有頃如故不知其實斷否也嘗取絹布與人各執一頭中斷之已而取兩段合祝之絹布還連續故一體也又取書紙及繩縷之屬投火中衆共視之見其燒爇了盡乃撥灰舉而出之故向物也鞫道龍葛洪云余少所知有鞫道龍善為幻術向余說古時事有東海人黃公少時能乘龍御虎佩赤金為刀以絳繒束髮立興雲霧坐成山河及衰老氣力羸憊飲酒過度不能行其術秦末有白虎見於東海黃公以赤刀厭之術既不行為虎所殺三輔人俗用以為戲漢朝亦取以為角抵之戲焉陽羡書生東晉陽羡許彥於綏安山行遇一書生年十七八臥路側云腳痛求寄彥鵝籠中彥以為戲言書生便入籠籠亦不更廣書生亦不更小宛然與雙鵝並坐鵝亦不驚彥負籠而去都不覺重前息樹下書生乃出籠謂彥曰欲為君薄設彥曰甚善乃於口中吐一銅盤奩子奩子中具諸饌殽海陸珍羞方丈其器皿皆是銅物氣味芳美世所罕見酒數行乃謂彥曰向將一婦人自隨今欲暫要之彥曰甚善又於口中吐出一女子年可十五六衣服綺麗容貌絶倫共坐宴俄而書生醉臥此女謂彥曰雖與書生結好而實懷外心向亦竊將一男子同來書生既眠暫喚之願君勿言彥曰甚善女人於口中吐出一男子年可二十三四亦頴悟可愛仍與彥敘寒溫書生臥欲覺女子吐一錦行幛書生仍留女子共臥男子謂彥曰此女子雖有情心亦不盡向復竊將女人同行今欲暫見之願君勿泄言彥曰善男子又於口中吐一女子年二十許共宴酌戲調甚久聞書生動聲男曰二人眠已覺因取所吐女子還內口中須臾書生處女子乃出謂彥曰書生欲起更吞向男子獨對彥坐書生然後謂彥曰暫眠遂久君獨坐當悒悒耶日已晚便與君別還復吞此女子諸銅器悉內口中留大銅盤可廣二尺餘與彥別曰無此藉君與君相憶也彥大元中彥為蘭臺令史以盤餉侍中張散散看其題云是漢永平三年所作也侯子光安定人侯子光弱冠美姿儀自稱佛太子從大秦國來當王小秦國易姓名為李氏依鄘爰赤眉家頗見其妖怪事微有驗赤眉信之妻以二女轉相扇惑京兆樊綏竺龍謹諶謝樂等衆聚數千於杜陽山稱大皇帝改元龍興立官屬大將軍鎮西石廣斬平之子光頸無血十餘日面色如生
