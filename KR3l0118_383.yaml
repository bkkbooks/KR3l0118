body:
  text: 索盧貞索盧貞北府索盧貞者本中郎荀羡之吏也以晉太元五年六月中病亡經一宿而蘇云見羡之子粹驚喜曰君算未盡然官須得三將故不得便爾相放君若知有干捷如君者當以相代盧貞即舉龔穎粹曰穎堪事否盧貞曰穎不復下己粹初令盧貞疏其名緣書非鬼用粹乃索筆自書之盧貞遂得出忽見一曾鄰居者死已七八年矣為太山門主謂盧貞曰索都督獨得歸耶因囑盧貞曰卿歸為謝我婦我未死時埋萬五千錢于宅中大床下我乃本欲與女市釧不意奄終不得言于妻女也盧貞許之及蘇遂使人報其妻已賣宅移居武進矣因往語之仍告買宅主令掘之果得錢如其數焉即遣其妻與女市釧尋而龔穎亦亡時輩共奇其事琅邪人姓王忘名居錢塘妻朱氏以太元九年病亡有三孤兒王復以其年四月暴死時有二十余人皆烏衣見録云到朱門白壁狀如宮殿吏朱衣素帶玄冠介情或所被著悉珠玉相連接非世中儀服復將前見一人長大所著衣狀如云氣王向叩頭自說婦已亡余孤兒尚小無相奈何便流涕此人為之動容云汝命自應來為汝孤兒特與三年之期王訴云三年不足活兒左右一人語云俗尸何癡此間三年是世中三十年因便送出又活三十年胡勒湖熟人胡勒以隆安三年冬亡三宿乃蘇云為人所録赭土封其鼻以印印之將至天門外有三人從門出曰此人未應到何故來且裸身無衣不堪驅使所録勒者云下土所送已攝來到當受之勒鄰人張千載死已經年見在門上為亭長勒告訴之千載入內出語勒已語遣汝便可去于是見人以杖挑其鼻土印封落地恍惚而還見有諸府舍門或向東或向南皆白壁赤柱禁衛嚴峻始到門時遙見千載叔文懷在曹舍料理文書文懷素強聞勒此言甚不信之后百餘日果亡勒今為縣吏自說病時悉脫衣在被中及魂爽去實裸身也顏畿晉咸寧中琅邪顏畿字世都得病就醫張瑳死于瑳家家人迎喪旐每繞樹不可解乃托夢曰我壽命未應死但服藥太多傷我五髒耳今當復活慎無葬我乃開棺形骸如故微有人色而手爪所刮摩棺板皆傷漸有氣急以綿飲瀝口能咽飲食稍多能開目不能言語十余年家人疲于供護不復得操事其弟弘都絶棄人事躬自侍養以後便衰劣卒復還死也余杭廣晉升平末故章縣老公有一女居深山余杭廣求為婦不許公后病死女上縣買棺行半道逢廣女具道情事女因曰窮逼君若能往家守父尸須吾還者便為君妻廣許之女曰我欄中有豬可為殺以飴作兒廣至女家但聞屋中有鼓掌欣舞之聲廣披離見衆鬼在堂共捧弄公尸廣把杖大呼入門群鬼盡走廣守尸取豬殺至夜見尸邊有老鬼伸手乞肉廣因捉其臂鬼不復得去持之愈堅但聞戶外有諸鬼共呼云老奴貪食至此甚快廣語老鬼殺公者必是汝可速還精神我當放汝汝若不還者終不置也老鬼曰我兒等殺公耳即喚鬼子可還之公漸活因放老鬼女載棺至相見驚悲因取女為婦曲阿人景平元年曲阿有一人病死見父于天上謂父曰汝算録正余八牛若此限竟死便入罪謫中吾比欲安處汝職局無缺者唯有雷公缺當啓以補其職即奏按入內便得充此任令至遼東行雨乘露車中有水東西灌灑未至于中路復被符至遼西事畢還見父苦求還云不樂處職父遣去遂得蘇活賀瑀會稽山陰賀瑀字彥琚曾得疾不知人惟心下尚溫居三日乃蘇云吏將上天見官府府君居處甚嚴使人將瑀入曲房房中有層架其上有印及劍使瑀取之及雖意所好短不及上層取劍以出問之子何得也瑀曰得劍吏曰恨不得印可以驅策百神今得劍唯使社公耳疾既愈每行即社公拜謁道下瑀深惡之食牛人桓玄時牛大疫有一人食死牛肉因得病亡云死時見人執録將至天上有一貴人問云此人何罪對曰此坐食疫死牛肉貴人云今須牛以轉輪肉以充百姓食何故復殺之催令還既更生具說其事于是食牛肉者無復有患丘友烏程丘友嘗病死經一日活云將去上天入大廨舍見一人著紫幘坐或告友爾祖丘孝伯也今作主録告人言友不應死使人遣之友得還去出門見其祖父母系一足在門外樹后一月亡庾申穎川庾某宋孝建中遇疾亡心下猶溫經宿未殯忽然而寤說初死有兩人黑衣來收縛之驅使前行見一大城門樓高峻防衛重復將庾入廳前同入者甚衆廳上一貴人南向坐侍直數百呼為府君府君執筆簡閲到者次至庾曰此人算尚未盡催遣之一人階上來引庾出至城門語吏差人送之門吏云須復白然后得去門外一女子年十五六容色閒麗曰庾君幸得歸而留停如此是門司求物庾云向被録輕來無所繼持女脫左臂三隻金釧投庾云并此與之庾問女何姓云姓張家在茅渚昨霍亂亡庾曰我臨亡遣繼五千錢擬市材若更生當送此錢相報女曰不忍見君艱厄此我私物不煩還家中也瘐以釧與吏吏受竟不復白便差人送去庾與女別女長歎泣下庾既恍惚蘇至茅渚尋求果有張氏新亡少女云李除襄陽李除中時氣死其婦守尸至夜三更崛然起坐搏婦臂上金釧甚劇婦因助脫既手執之還死婦伺察之至曉心中更暖漸漸得蘇既活云吏將去比伴甚多見有行貨得免者乃許吏金釧吏令還故歸取以與吏吏得釧便放令還見吏取釧去不知猶在婦衣內婦不敢復著依事咒埋張導齊武帝建元元年太子左率張導字進賢少讀書老餌術每食不過二味衣服不修裝既得疾謂妻朱氏曰我死后棺足周身斂我服但取今著者慎勿改易及卒子乾護欲奉遺旨朱氏曰汝父雖遺言如此不忍依其言因別制四時服而斂焉斂后一月日家人忽聞棺中呼乾護之聲人皆一時驚懼及至殯棺見導開目乃扶出于舊寢翌日坐責妻曰我平生素儉奈何違言易我故服謂子曰復斂我故服乾護乃取故衣斂之斂后又曰但安棺中后三日看之若儼然即葬如目開必重生矣后三日乾護等啓棺見眼開人皆驚喜扶出遂生謂子曰地府以我平生修善著德放再生二十年導后位至建德令而卒石長和趙石長和者趙國高邑人也年十九病月余卒家貧未及殯殮經四日而蘇說初死時東南行見二人治道在長和前五十步長和行有遲疾二人亦隨緩速常五十步而道之兩邊棘刺森然如鷹爪見人甚衆群足棘中身體傷裂地皆流血見長和獨行平道俱歎息曰佛子獨行大道中前至瓦屋御樓可數千間屋甚高上有一人形面狀大著皂袍四縫臨窗而坐長和拜之閣上人曰石君來耶一別二千余年長和便若憶得此別時也相識中有馮翊牧孟丞夫妻先死已積歲閣上人曰君識孟丞不長和答曰識閣上人曰孟丞生時不能精進今恆為我司掃除之役孟妻精進居處甚樂舉手指西南一房曰孟妻在此也孟妻開窗見長和厚相慰問遍訪其家中大小安否曰石君還時可更見過當因附書也俄見孟丞執帚提箕自閣西來亦問家消息閣上人曰聞魚龍超精進為信耳何所修行長和曰不食魚肉酒不經口恆轉尊經救諸疾痛閣上人曰所傳不妄也語久之閣上人問都圌主者審案石君録勿謬濫也主者按菉余三十年閣上人曰君欲歸不長和對願歸乃敕主者以車騎兩吏送之長和拜辭上車而歸前所行道更有傳館吏民飲食儲峙之具倏忽至家惡其尸不欲附之于尸頭立見其亡妹于后推之踣尸面上因得蘇法道人山時未出家聞長和所說遂定入道之志法山者咸和時人也古元之后魏尚書令古弼族子元之少養于弼因飲酒而卒弼憐之特甚三日殮畢追思欲與再別因命啓棺開已卻生矣元之云當昏醉忽然如夢有人沃冷水于體仰視乃見一神人衣冠絳裳霓帔儀貌甚俊顧元之曰吾乃古說也是汝遠祖適欲至和神國中無人擔囊侍從因來取汝即令負一大囊可重一鈞又與一竹杖長丈二余令元之乘騎隨后飛舉甚速常在半天西南行不知里數山河逾遠欻然下地已至和神國其國無大山高者不過數十丈皆積碧鈱石際生青彩簬筱異花珍果軟草香媚好禽嘲哳山頂皆平整如砥清泉迸下者三二百道原野無凡樹悉生百果及相思石榴之輩每果樹花卉俱發實色鮮紅翠葉于香叢之下紛錯滿樹四時不改唯一歲一度暗換花實更生新嫩人不知覺田疇盡長大瓠瓠中實以五谷甘香珍美非中國稻梁可比人得足食不假耕種原顯滋茂蕕穢不生一年一度樹木枝干間悉生五色絲纊人得隨色收取任意紝織異錦纖羅不假蠶杼四時之氣常熙熙和淑如中國二三月無蚊虻蟆蟻虱蜂蝎蛇虺守宮蜈蚣蛛蠓之蟲又無梟鴟鴉鷂鴝鵒蝙蝠之屬及無虎狼豺豹狐狸驀駮之獸又無貓鼠豬犬擾害之類其人長短妍蚩皆等無有嗜欲愛憎之者人生二男二女為鄰則世世為婚姻笄年而嫁二十而娶人壽一百二十中無夭折疾病喑聾跛躄之患百歲已下皆自記憶百歲已外不知其壽幾何壽盡則欻然失其所在雖親族子孫皆忘其人故常無憂戚每日午時一食中間唯食酒漿果實耳餐亦不知所化不置溷所人無私積囷倉余糧栖畝要者取之無灌園鬻蔬野菜皆足人食十畝有一酒泉味甘而香國人日相攜游覽歌詠陶陶然暮夜而散未嘗昏醉人人有婢仆皆自然謹慎知人所要不煩促使隨意屋室靡不壯麗其國六畜唯有馬馴極而駿不用趨秣自食野草不近積聚人要乘則乘乘訖而卻放亦無主守其國千官皆足而仕官不知身之在事雜于下人以無職事操斷也雖有君主而君不自知為君雜于千官以無職事升貶故也又無迅雷風雨其風常微輕如煦襲萬物不至于搖落其雨十日一降降必以夜津潤條暢不有淹流一國之人皆自相親有如戚屬各各明惠無市易商販之事以不求利故也古說既至其國顧謂元之曰此和神國也雖非神仙風俗不惡汝回當為世人說之吾既至此回即別求人負囊不用汝矣因以酒令元之飲飲滿數巡不覺沉醉既而復醒身已活矣自是元之疏逸人事都忘宦情游行山水自號知和子后竟不知其所終也
