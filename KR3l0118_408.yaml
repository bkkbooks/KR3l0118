body:
  text: 草奈祗草奈祗出拂林國苗長三四尺根大如鴨卵葉似蒜葉中心抽條甚長莖端有花六出紅白色花心黃赤不結子其草冬生夏死與薺麥相類取其花壓以為油涂身除風氣拂林國王及國內貴人用之三賴草曹州及揚州淮口出夏梨三賴草如金色出于高崖魅藥中最切用席箕草席箕一名塞蘆生北胡地古詩云千里席箕草護門草常山北有草名護門置諸門上夜有人過輒叱之仙人絛衡嶽出仙人絛無根多生石上狀如帶三股色緑亦不常有合離草合離根如芋魁有游子十二環之相須而生而實不連以氣相屬一名獨搖一名離母若土人所食者呼為赤箭矣老鴉笊篱草老鴉笊篱葉如牛蒡而狹子熟時色黑狀如笊篱鬼皂莢生江南地澤如皂莢高一二尺沐之長發葉亦去衣垢青草槐龍陽縣裨牛山南有青草槐叢生高尺余花若金燈仲夏發花銅匙草生水中葉如剪刀水耐冬此草終冬在水不死段成式城南別墅池中有之三白草初生不白入夏葉端方白農人候之蒔田三葉白草畢秀矣其葉似署預無心草蚍蜉酒草一曰鼠耳像形也亦曰無心草盆甑草即牽牛子也秋節后斷之狀如盆甑其中有子似龜蔓署預女草葳蕤草一名麗草亦呼為女草江湖中呼為娃草美女曰娃故以為名媚草鶴子草蔓生也其花曲塵色淺紫蒂葉如柳而短當夏開花南人云是媚草采之曝干以代面靨形如飛鶴翅尾觜足無所不具此草蔓至春生雙蟲只食其葉越女收于妝奩中養之如蠶摘其草飼之蟲老不食而蛻為蝶赤黃色婦女收而帶之謂之媚蝶醉草尸子赤縣洲為昆侖之墟其東則鹵水島山左右玉紅之草生焉食其一實醉臥三百歲舞草舞草出雅州獨莖三葉葉如決明一葉在莖端兩葉居莖半相對人或近之則欹抵掌謳曲則搖動如舞矣相思草秦趙間有相思草狀若石竹而節節相續一名斷腸草又名愁婦草亦名孀草又呼為寡婦莎蓋相思之流也無情草左行草使人無情范陽長貢忘憂草萱草一名紫萱又名忘憂草吳中書生謂之療愁嵇康養生論云萱草忘憂睡草桂林有睡草見之則令人睡一名醉草亦呼懶婦針出南海地記千步香草南海出百步香風聞于千步也今海隅有千步香是其種也葉似杜若而紅碧間雜貢籍云日南郡貢千步香麝草龜甲香即桂香善者紫術香一名金杜香一名麝草香出蒼梧桂林二郡界今吳中有麝草似紅而甚芳香治盅草新州郡境有藥土人呼為吉財解諸毒及盅神用無比昔有人嘗至雷州途中遇毒面貌頗異自謂即斃以吉財數寸飲之一吐而愈俗云昔人有遇毒其奴吉財得是藥因以奴名名之實草根也類芍藥遇毒者夜中潛取二三寸或銼或磨少加甘草詰旦煎飲之得吐即愈俗傳將服是藥不欲顯言故云潛取而不詳其故或云昔有里媼病盅其子為小胥邑宰命以吉財飲之暮乃具藥及旦其母謂曰吾夢人告我若飲是且死亟去之即仆于地其子又告縣尹縣尹固令飲之果愈豈中盅者亦有神若二豎哉蛇銜草異苑云昔有田父耕地值見傷蛇在焉有一蛇銜草著瘡上經日傷蛇走田父取其草餘葉以治瘡皆驗本不知草名因以蛇銜為名抱朴子云蛇銜能續已斷之指如故是也鹿活草天名精一曰鹿活草青州劉炳宋元嘉中射一鹿剖五髒以此草塞之蹶然而起炳密録此草種之多愈傷折俗呼為劉炳草解毒草建寧郡烏句山南五百里生牧靡草可以解毒百卉方盛烏多誤食烏啄中毒必急飛牧靡山啄牧靡以解毒草博落回有大毒生江淮山谷中莖葉如麻莖中空吹作聲如勃邏故名之蕉毒草蕉毒草如芋巨狀如雀頭置干地則潤置濕地則干炊飯時種于灶上比飯熟即著花結子人食之立死牧麻草有牧麻草大毒有此草值風吹其氣所至則數里內稻皆即死李淳風云其汁本清得水則稠見日則濕入蔭即干在夏欲涼在冬欲溫龍芻東海島龍駒川穆天子養八駿處島中有草名龍芻馬食之日行千里古語一株龍芻化為龍駒紅草山戎之北有草莖長一丈葉如車輪色如朝霞齊桓時山戎獻其種乃植于庭以表霸者之瑞宮人草楚中往往有宮人草狀似金橙而甚芬氳花似紅翠俗說楚靈王時宮人數千皆多怨曠有因死于宮中者葬之墓上悉生此草焦茅高五丈火燃之成灰以水灌之復成茅是謂靈茅銷明草夜視如列星晝則光自銷滅也黃渠草黃渠照日如火實甚堅內食者焚身不熱聞遐草服者輕身葉如桂莖如蘭其國獻根植之多不生實草葉多萎黃詔并除焉始皇蒲齊南城東有蒲台秦始皇所頓處時始皇在台下縈蒲以系馬至今蒲生猶榮俗謂之秦始皇蒲夢草漢武時異國獻夢草似蒲晝縮入地夜若抽萌懷其草自知夢之善惡帝思李夫人懷之輒夢漢武牧馬草漢武于湖中牧馬處至今野草皆有嚼嚙之狀湖中呼為馬澤澤中有漢武彈棋方石上有勒銘焉水网藻漢武昆靈池中有水网藻枝橫倒水上長八九尺有似网目鳧鴨入此草中皆不得出因名之地日草南方有地日草三足烏欲下食此草羲和之馭以手掩烏目食此則悶不復動東方朔言為小兒時井陷墜至地下數十年無所寄托有人引之令往此草中隔紅泉不得渡其人以一隻履因乘泛紅泉得草處食之書帶草鄭司農常居不其城南山中教授黃巾亂乃避遣生徒崔琰王經諸賢于此揮涕而散所居山下草如薤葉長尺余許堅韌異常時人名作康成書帶金橙草晉武帝為撫軍時府內後堂砌下忽生異草三株莖黃葉緑若總金抽翠花蓧苒弱狀如金橙時人未得知是何祥瑞也故隱蔽不聽外人窺視有羌人姓姚名馥字世芬充廄養馬妙解陰陽之術云此草以應金德之瑞馥年九十歲姚襄即其祖也馥好讀書嗜酒每醉歷月不醒于醉時好言王者興亡之事善戲笑滑稽無窮常歎云九河之水不足以為蒸薪七澤麋鹿不足以充庖俎每言凡人稟天地精靈不知飲酒者動肉含氣耳何必土木之偶而無心識乎好啜濁嚼糟恆言渴于醇酒群輩常弄狎之呼為渴羌及晉武踐位忽見馥立于階下帝奇其倜儻擢為朝歌邑宰馥辭曰氐羌異域遠隔風化得游中華已為殊幸請辭朝歌之縣長充馬圉之役時賜美酒以樂余年帝曰朝歌郡紂之故都地有酒池故使老羌不復呼渴馥于階下高聲而應曰馬圉老羌漸染皇教溥天夷貊皆為王臣今者歡酒池之樂受朝歌之地更為殷紂之比乎帝撫玉幾大悅即遷為酒泉太守其地有青泉其味如酒馥乘酒而拜之遂為善政民為立生祠后以府地賜張華猶有此草故茂先金橙賦云擢九莖于漢庭美二株于茲館貴表祥乎金德名比類而相亂至惠帝咸熙元年三株草化為樹條葉似楊樹高五尺以應三楊擅之事時有楊雋弟瑤弟濟號曰三楊醉羌之驗也望舒草晉太始十年立河橋之歲有扶支國獻望舒草其色紅葉如荷近望則如卷荷遠望則如舒荷團團如蓋亦云月出則葉舒月沒則葉卷植于宮內穿池廣百步名曰望舒池愍帝之末胡人移其種于胡中至今絶矣其池尋亦平也神草魏明時苑中有合歡草狀如蓍一株百莖晝則衆條扶疏夜乃合作一莖謂之神
