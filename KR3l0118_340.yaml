body:
  text: 韓弇韓弇河中節度使侍中渾瑊與西蕃會盟蕃戎背信掌書記韓弇遇害弇素與櫟陽尉李績友因晝寢忽夢弇被髮披衣面目盡血績初不識乃稱姓名相勞勉如平生謂弇曰今從禿髮大使填漳河憔悴困辱不可言間來奉詣耳別後有一詩奉呈悲吟曰我有敵國讎無人可為雪每至秦隴頭遊魂自鳴咽臨別謂績曰吾久飢渴君至明日午時於宅西南為置酒饌錢物亦平生之分盡矣績許之及覺悲愴待旦至午時如言祭之忽有黑風自西來旋轉筵上飄卷紙錢及酒食皆飛去舉邑人觀之時貞元四年盧頊貞元六年十月范陽盧頊家於錢塘妻弘農楊氏其姑王氏早歲出家隸邑之安養寺頊宅於寺之北里有家婢曰小金年可十五六頊家貧假食於郡內郭西堰堰去其宅數十步每令小金於堰主事常有一婦人不知何來年可四十餘著瑟瑟裙蓬髮曳漆履直詣小金坐自言姓朱第十二久之而去如是數日時天寒小金爇火以燎須臾婦人至顧見牀下炭怒謂小金曰有炭而焚煙薰我何也舉足踏火火即滅以手批小金小金絶倒於地小金有弟年可四五歲在傍大駭馳報於家家人至已失婦人而小金瞑然如睡其身殭強如束命巫人祀之釋然如是具陳其事居數日婦人至抱一物如狸狀而尖觜捲尾尾類犬身斑似虎謂小金曰何不食我猫兒小金曰素無為之奈何復批之小金又倒火亦撲滅童子奔歸以報家人至小金復瞑然又祝之隨而愈自此不令之堰後數日令小金引船於寺迎外姑船至寺門外寺殿復有一塔小金忽見塔下有車馬朱紫甚盛佇立而觀之即覺身不自制須臾車馬出左右辟易小金遂倒見一紫衣人策馬問小金是何人旁有一人對答二人舉扶階上不令損紫衣者駐馬促後騎曰可速行冷落他筵饌小金問傍人曰行何適人曰過大雲寺主家耳須臾車馬過盡其院中人來方見小金倒於階上復驚異載歸祀酹之而醒是夕冬至除夜盧家方備粢盛之具其婦人鬼倏閃於牖戶之間以其鬧不得入盧生以二虎目繫小金左右臂夜久家人怠寢婦人忽曳小金驚叫婦人怒曰作餅子何不啖我家人驚起小金乃醒而左臂失一虎目忽窗外即言還你遂擲窗有聲燭之果得後數日視之帛裹乾茄子不復虎目矣冬至方旦有女巫來坐話其事未畢而婦人來小金即瞑然其女巫甚懼方食遂策一枚餫飩置戶限上祝之於時小金笑曰笑朱十二喫餫飩以兩手拒地合面於餫飩上吸之盧生以古鏡照之小金遂泣言朱十二母在鹽官縣若得一頓餫飩及顧船錢則不復來盧生如言遂訣別而去方欲焚錢財之時已見婦人背上負錢焚畢而去小金遂釋然居間者小金母先患風疾不能言忽於廚中應諾便入房切切然語出大門良久摳衣闊步而入若人騎馬狀直至堂而拜曰花容起居其家大驚花容即楊氏家舊婢死來十餘年語聲行動酷似之乃問花容何得來答曰楊郎遣來傳語娘子別久好在楊郎盧生舅也要小金母子故遣取來盧生具傳懇辭以留受語而出門久之復命曰楊郎見傳語切令不用也急作紙人代之依言剪人題其名字焚之又言楊郎在安養寺塔上與楊二郎雙陸又問楊二郎是何人答曰神人耳又有木下三郎亦在其中又問小金前見車馬何人曰此是精魅耳本是東鄰吳家阿嫂朱氏平生苦毒罰作蛇身今在天竺寺褚樹中有穴久而能變化通靈故化作婦人又問既是蛇身如何得衣裳著答曰向某家冢中偷來又問前抱來者何物言野狸遂辭去即酌一杯令飲飲訖更請一杯與門前鑊八問鑊八是何人云是楊二郎下行官又問楊二郎出入如此人遇之皆禍否答曰如他楊二郎等神物出入如風如雨在虛中下視人如螻蟻然命衰者則自禍耳他亦無意焉言訖而去至門方醒醒後問之皆不知也後小金夜夢一老人騎大獅子獅子如文殊所乘毛彩奮迅不可視旁有二崑崙奴操轡老人謂小金曰吾聞爾被鬼物纏繞故萬里來救汝是衰厄之年故鬼點爾作客云以取錢應點而已渠亦自得錢汝若不值我來至四月當被作土戶汝則不免死矣汝於某日拾得繡佛子否小金曰然汝看此樣繡取七軀佛子七口幡子言訖又曰作八口吾誤言耳八口一伴四口又截頭髮少許贖香以供養之其厄則除矣小金曰受教矣今苦腰背痛不可忍慈悲為除之老人曰易耳即令崑崙奴向前令展手便於手掌摩指則如黑漆染指上便背上點二灸處小金方醒具說其事即造佛及幡視背上信有二點處遂灸之背痛立愈盧頊秉志剛直不信其事又罵之曰焉有聖賢來救一婢此必是鬼耳其夜又夢老人曰吾哀爾疾危是以來救汝愚郎主却喚我作鬼魅也吾亦不計此事汝至四月必作土戶然至三月末當須出杭州界以避之矣夫鬼神所部州縣各異亦猶人有逃戶小金曰於餘杭可乎老人曰餘杭亦杭州耳何益也又曰嘉興可乎曰可老人曰汝於嘉興投誰家答曰某家有親欲投之老人曰某家是孝汝今避鬼還投鬼家何益也凡孝有靈筵神道交通他則知汝所在汝投吉人家則可矣又臨發時脫汝所愛惜衣一事剪去身留領縫襟帶餘處盡去之縛一草人衣之著宅之陰暗處汝則易衣而潛去也小金曰諾聖賢前度灸背當時獲愈今尚苦腰痛老人曰吾前不除爾腰者令爾知有我耳汝今欲除之耶復於崑崙手掌中研黑點腰間一處而去悟而驗之信有點跡便灸之又差其後婦人亦不來矣至三月盡如言潛之嘉興自後無事李章武字飛卿其先中山人生而敏博遇事便了工文學皆得極至雖弘道自高惡為潔飾而容貌間美即之溫然與清河崔信友善信亦雅士多聚古物以章武精敏每訪辨論皆洞達玄微研究原本時人比之張華貞元三年崔信任華州別駕章武自長安詣之數日出行於市北街見一婦人甚美因紿信云須州外與親故知聞遂賃舍於美人之家主人姓王此則其子婦也乃悅而私焉居月餘日所計用直三萬餘子婦所供費倍之即而兩心克諧情好彌切無何章武繫事先歸長安殷勤敘別章武留交頸鴛鴦綺一端仍贈詩曰鴛鴦綺知結幾千絲別後尋交頸應傷未別時子婦答白玉指環一又贈詩曰捻指環相思見環重相憶願君永持玩循環無終極章有僕楊果者子婦齎錢一千以獎其敬事之勤既別積八九年章武家長安亦無從與之相聞至貞元十一年因友人張元宗寓居下邽縣章武又自京師與元會忽思曩好乃回車涉渭而訪之日暝達華州將舍於王氏之室至其門則闃無行跡但外有賓榻而已章武以為下里或廢業即農暫居郊野或親賓邀集未始歸復但休止其門將別適他舍見東鄰之婦就而訪之乃云王氏之長老皆捨業而出遊其子婦歿已再周矣又詳與之談即云某姓楊第六為東鄰妻復訪郎何姓章武具語之又云曩曾有傔姓楊名果乎曰有之因泣告曰某為里中婦五年與王氏相善嘗云我夫室猶如傳舍閲人多矣其於往來見調者皆殫財窮産甘辭厚誓未嘗動心頃歲有李十八郎曾舍於我家我初見之不覺自失後遂私侍枕席實蒙歡愛今與之別纍年矣思慕之心或竟日不食終夜無寢我家人故不可託復被彼夫東西不時會遇脫有至者願以物色名氏求之如不參差相託祗奉並語深意但有僕夫楊果即是不二三年子婦寢疾臨死復見託曰我本寒微曾辱君子厚顧心常感念久以成疾自料不治曩所奉託萬一到此願申九泉銜恨千古睽離之嘆仍乞留止此冀神會於髣佛之中章武乃求鄰婦為開門命從者市薪芻食物方將具絪席忽有一婦人持帚掃地鄰婦亦不之識章武因訪所從者云是舍中人又逼而詰之即徐曰王家亡婦感郎恩情深將見會恐生怪怖致使相聞章武許諾云章武所由來者正為此也雖顯晦殊途人皆忌憚而思念情至實所不疑言畢執帚人欣然而去逡巡映門即不復見乃具飲饌呼祭自食飲畢安寢至二更許燈在牀之東南忽爾稍暗如此再三章武心知有變因命移燭背墻置室東南隅旋聞室北角悉窣有聲如有人形冉冉而至五六歲即可辨其狀視衣服乃主人子婦也與昔見不異但舉止浮急音調輕清耳章武下牀迎擁攜手欸若平生之歡自云在冥録以來都忘親戚但思君子之心如平昔耳章武倍與狎匿亦無他異但數請令人視明星若出當須還不可久住每交歡之暇即懇託在鄰婦楊氏云非此人誰達幽恨至五更有人告可還子婦泣下牀與章武連臂出門仰望天漢遂嗚咽悲怨却入室自於裙帶解錦囊囊中取一物以贈之其色紺碧質又堅密似玉而冷狀如小葉章武不之識也子婦曰此所謂靺鞨寶出崑崙玄圃中彼亦不可得妾近於西嶽與玉京夫人戲見此物在衆寶璫上愛而訪之夫人遂假以相授云洞天群仙每得此一寶皆為光榮以郎奉玄道有精識故以投獻常願寶之此非人間之有遂贈詩曰河漢已傾斜神魂欲超越願郎更回抱終天從此訣章武取白玉寶簪一以酬之並答詩曰分從幽顯隔豈謂有佳期寧辭重重別所嘆去何之因相持泣良久子婦又贈詩曰昔辭懷後會今別便終天新悲與舊恨千古閉窮泉章武答曰後期杳無約前恨已相尋別路無行信何因得寄心款曲敘別訖遂却赴西北隅行數步猶回顧拭淚云李郎無捨念此泉下人復哽咽佇立視天欲明急趨至角即不復見但空室窅然寒燈半滅而已章武乃促裝却自下邽歸長安武定堡下邽郡官與張元宗攜酒宴飲既酣章武懷念因即事賦詩曰水不西歸月暫圓令人惆悵古城邊蕭條明早分歧路知更相逢何歲年吟畢與郡官別獨行數里又自諷誦忽聞空中有嘆賞音調悽惻更審聽之乃王氏子婦也自云冥中各有地分今於此別無日交會知郎思眷故冒陰司之責遠來奉送千萬自愛章武愈惑之及至長安與道友隴西李助話亦感其誠而賦曰石沉遼海闊劍別楚天長會合知無日離心滿夕陽章武既事東平丞相府因間召玉工視所得靺鞨寶工不知不敢雕刻後奉使大梁又召玉工粗能辨乃因其形雕作檞葉象奉使上京每以此物貯懷中至市東街偶見一胡僧忽近馬叩頭云君有寶玉在懷乞一見爾乃引於靜處開視僧捧玩移時云此天上至物非人間有也章武後往來華州訪遺楊六娘至今不絶
