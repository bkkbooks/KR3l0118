body:
  text: 吉頊吉頊周明堂尉吉頊夜與監察御史王助同宿王助以親故為説綦連耀男大覺小覺云應兩角麒麟也耀字光翟言光宅天下也頊明日録狀付來俊臣敕差河內王懿宗推誅王助等四十一人皆破家後俊臣犯事司刑斷死進狀三日不出朝野怪之上入苑吉頊攏馬上問在外有何事意頊奏曰臣幸預控鶴為陛下耳目在外唯怪來俊臣狀不出上曰俊臣于國有功朕思之耳頊奏曰于安遠告虺貞反其事並驗今貞為成州司馬俊臣聚結不逞誣遘賢良贓賄如山冤魂滿路國之賊也何足惜哉上令狀出誅俊臣于西市敕追于安遠還除尚食奉御頊有力焉除頊中丞賜緋頊理綦連耀事以為己功授天官侍郎平章事與河內王競出為溫州司馬卒成王千里唐成王千里使嶺南取大蛇長八九尺以繩縛口橫于門限之下州縣參謁者呼令入門但知直視無復瞻仰踏蛇而驚惶懼僵仆被蛇繞數匝良久解之以為戲笑又取龜及鱉令人脫衣縱龜等囓其體終不肯放死而後已其人酸痛號呼不可復言王與姬妾共看以為玩樂然後以竹刺龜鱉口遂囓竹而放人艾灸鱉背灸痛乃放口人被驚者皆失魂至死不平復矣張亶唐朔方總官張亶好殺時有突厥投化亶乃作檄文罵默啜言詞甚不遜書其腹背鑿其肌膚涅之以墨灸之以火不勝痛楚日夜作蟲鳥鳴然後送與默啜字者宣訖臠而殺之胸奴怨望不敢降王旭唐殿中侍御史王旭括宅中及別宅女婦風聲目色有不承者以繩勒其陰令壯士彈竹擊之酸痛不可忍倒懸一女婦以石縋其髮遣證與長安尉房恆姦經三日不承女婦曰侍御如此苦毒兒死必訴于冥司若配入宮必申于主上終不相放旭慚懼乃捨之京師三豹唐監察御史李嵩李全交殿中王旭京師號為三豹嵩為赤黧豹交為白額豹旭為黑豹皆狠虐不軌鴆毒無儀體性狂踈精神慘刻每訊囚必鋪棘臥削竹籤指方梁壓髁碎瓦搘膝遣作仙人獻果玉女登梯犢子懸拘驢兒拔橛鳳凰晒翅獼猴鑽火上麥索下闌單人不聊生囚皆乞死肆情鍛鍊證是為非任意指麾傳空為實周公孔子請伏殺人伯夷叔齊求其劫罪訊劾乾塹水必有期推鞠濕泥塵非不入來俊臣乞為弟子索元禮求作門生被追者皆相謂曰牽羊付虎未有出期縛鼠與貓終無脫日妻子永別朋友長辭京人相要作呪曰若違心負教橫遭三豹其毒害也如此張孝嵩京兆人高麗家貧于御史臺替勛官遞送文牒其時令史作偽帖付高麗追人擬嚇錢事敗令史逃亡追討不獲御史張孝嵩捉高麗拷膝骨落地兩腳俱攣抑遣代令史承偽準法斷死訖大理卿狀上故事準名例律篤疾不合加刑孝嵩勃然作色曰腳攣何廢造偽命兩人舁上市斬之王弘義衡水人也告變授遊擊將軍天授中拜御史與俊臣羅告衣冠俊臣敗義亦流於嶺南妄稱敕追時胡元禮以御史使嶺南次于襄鄧會而按之弘義詞窮乃謂曰與公氣類元禮曰足下昔任御史禮任洛陽尉禮今任御史公乃流囚復何氣類乃榜殺之弘義每暑月繫囚必于小房中積蒿而施氈褥遭之者期須氣將絶矣苟自誣或他引則易于別房俊臣常行移牒州縣懾懼自矜曰我之文牒有如狼毒冶葛也弘義嘗于鄉里求旁舍瓜瓜主吝之義乃狀言瓜園中有白兔縣吏會人捕逐期須苗盡矣內史李昭德曰昔聞蒼鷹獄吏今見白兔御史謝祐周黔府都督謝祐凶險忍毒則天朝徙曹王于黔中祐嚇云則天賜自盡祐親奉進止更無別敕王怖而縊死後祐于平閣上臥婢妾十餘人同宿夜不覺刺客截祐首去後曹王破家簿録事得祐首漆之題謝祐字以為穢器方知王子令刺客殺之河內王懿宗周默啜賊之陷恆定州和親使楊齊莊敕授三品入胸奴遂沒賊將至趙州襄公段瓆同沒喚莊共出走莊懼不敢發瓆遂先歸則天賞之復舊任齊莊尋至敕付河內王懿宗鞫問莊曰昔有人相莊位至三品有刀箭厄莊走出被趕砍射不死走得脫來願王哀之懿宗性酷毒奏莊初懷猶豫請殺之敕依引至天津橋南于衛士鋪鼓格上縛磔手足令段瓆先射三發皆中又段瑾射之中又令諸司百官謝箭如蝟毛仍氣韘韘然微動即以刀當心直下破至陰剖取心擲地仍趌趌跳數十回懿宗之忍毒也如此酷吏來俊臣侯思止王弘義郭霸等數十人為推官俊臣父操與鄉人蔡本善本與操樗蒲贏本錢數十萬本無以酬遂將其妻馮折及至操家已有娠而産俊臣于禾州犯盜遂因密告則天以忠纍拜侍御史按制獄無不會意拜左臺中丞道路以目與侯思止等以告事為羅織則天于麗景門側別置推院令俊臣等按之但入新開門百不全一弘義戲為例竟門俊臣與其黨朱南山等造羅織經一卷每鞫囚無輕重先以醋灌鼻禁地牢中以火圍繞絶其糧多抽衣絮以啖之將有赦必先盡殺其囚又作大枷凡十遭其枷者悶轉於地莫不自誣則天尤賞之朝士每入朝多與妻子訣別及禁狄仁傑仁傑置書于綿衣中請獄吏付家人家人得之訟于則天則天令驗之果冤問仁傑何以自誣對曰若不承反即已死于枷棒矣俊臣後坐贓御史劾之除殿中丞又拜中丞復坐贓出為同州參軍奪同列參軍妻旋為合官尉又拜洛陽令復圖西番酋長阿史那斛瑟羅婢稱其謀反其黨剺面詣闕訟之得免將告諸武太平公主乃反為其所發棄市人競臠其肉中宗詔酷吏並配流遠惡處子孫不得仕進周興纍為司刑少卿上疏請除李家屬籍後徙嶺表為仇人所殺傅遊藝除左補闕上書言武氏革命拜給事中又為鸞臺平章事天授元年改姓武氏夢登湛露殿陳于所親及事發伏誅遊藝一年內青緑緋紫皆遍轉號為四時仕宦請則天置六道使死後竟從其言於是萬國俊丘神績皆酷虐思止告舒王元名反授遊擊將軍初元禮教思止上必問候大不識字但云獬豸豈識字只能觸邪果問而對則天大悅授左臺侍御史又教上若問要宅得賜沒官者但云臣惡其名不願居止上又悅嘗按魏元忠曰急承白司馬不然吃孟青孟青者姓孟名青即殺琅邪王沖者也白司馬坂名思止庸奴常以此語嚇元忠元忠不撓思止以其拒制命倒曳之元忠曰我如乘惡驢而墜為鐙所挂思止又怒欲奏斬之元忠曰汝為御史須識禮數若要元忠頭便將去何必以鋸截將思止驚悚與之坐思止言音不正霍獻可笑之思止怒奏之則天知亦大笑時俊臣逼娶太原王慶詵女思止亦奏娶趙郡李自挹女昭德撫掌謂諸宰相曰往年來俊臣賊劫王慶詵女已大辱國今此奴又請索李自挹女無乃又辱乎竟為昭德榜殺萬國俊按嶺南流人三百餘人擁于水次一時殺之來子珣除右臺監察時朝士有不著靴帶而朝者必彈之曰臣聞束帶立于朝舉朝大噱後賜武氏家臣多按制獄常衣錦半臂郭霸應革命舉為監察又為侍御史見則天曰往年征除敬業臣願抽其筋食其肉飲其血絶其髓上大悅人呼為郭四其御史大夫魏元忠患病霸請嘗其糞元忠不許竟嘗之曰其味苦病即愈元忠以以其佞大惡之嘗推芳州刺史索思微微不勝其捶拷而死後屢見思微遂設齋轉經俄見思微止于庭曰汝陷我今來取汝霸恐懼遂自刳腹而卒時洛橋初成人便之則天問人曰外有何好事舍人張元一素滑稽曰喜洛橋成幸郭霸死楊務廉唐楊務廉孝和時造長寧安樂宅倉庫成特授將作大匠坐贓數千萬免官又上章奏開陝州三門鑿山燒石巖側施棧道牽船河流湍急所顧夫並未與價值苟牽繩一斷棧梁一絶則撲殺數十人取顧夫錢糴米充數即注夫逃走下本貫禁父母妻子其牽船夫皆令繫二鈲于胸背落棧著石百無一存道路悲號聲動山谷皆稱楊務廉為人妖天生此妖以破殘百姓李全交唐監察御史李全交等以羅織酷虐為業臺中號為人頭羅剎殿中王旭號為鬼面夜叉訊囚引枷柄向前名為驢駒拔橛縛枷頭著樹名曰犢子懸車兩手捧枷纍磚于上號為仙人獻果立高木之上枷柄向後拗之名玉女登梯拷郴州典廖福司門令史張性並求神狐魅皆遣喚鶴作鳳證蛇成龍也
