body:
  text: 魏夫人魏夫人魏夫人者任城人也晉司徒劇陽文康公舒之女名華存字賢安幼而好道靜默恭謹讀莊老三傳五經百氏無不該覽志慕神仙味真耽玄欲求沖舉常服胡麻散茯苓丸吐納氣液攝生夷靜親戚往來一無關見常欲別居閒處父母不許年二十四彊適太保掾南陽劉文字幼彥生二子長曰璞次曰瑕幼彥後為修武令夫人心期幽靈精誠彌篤二子粗立乃離隔宇室齊於別寢將逾三月忽有太極真人安度明東華大神方諸青童扶桑碧阿陽谷神王景林真人小有仙女清虛真人王裒來降裒謂夫人曰聞子密緯真氣注心三清勤苦至矣扶桑大帝君敕我授子神真之道青童君曰清虛天王即汝之師也度明曰子苦心求道道今來矣景林真人曰虛皇鑒爾勤感太極已注子之仙名於玉札矣子其勗哉青童君又曰子不更聞上道內法法字原闕據明鈔本補晨景玉經者仙道無緣得成後日當會暘滌山中爾謹密之王君乃命侍女華散條李明兌等便披雲蘊開玉笈出太上寶文八素隱書大洞真經靈書八道紫度炎光石精金馬神真虎文高仙羽玄等經凡三十一卷即手授夫人焉王君因告曰我昔於此學道遇南極夫人西城王君授我寶經三十一卷行之以成真人位為小有洞天仙王令所授者即南極元君西城王君之本文也此山洞臺乃清虛之別宮耳於是王君起立北向執書而祝曰太上三元九星高真虗微入道上清玉晨褒為太帝所敕使教於魏華存是月丹良吉日戊申謹按寶書神金虎文大洞真經八素玉篇合三十一卷是褒昔精思於陽明西山受真人太師紫元夫人書也華存當謹按明法以成至真誦修虛道長為飛仙有泄我書族及一門身為下鬼塞諸河源九天有命敢告華存祝畢王君又曰我受祕訣於紫元君言聽教於師云此篇當傳諸真人不但我得而已子今獲之太帝命焉此書自我當七人得之以白玉為簡青玉為字至華存則為四矣於是景林又授夫人黃庭內景經令晝夜存念讀之萬遍後乃能洞觀鬼神安適六府調和三魂五臟主華色反嬰孩乃不死之道也於是四真吟唱各命玉女彈琴擊鐘吹簫合節而發歌歌畢王君乃解摘經中所修之節度及寶經之指歸行事之口訣諸要備訖徐乃別去是時太極真人命北寒玉女宋聯涓彈九氣之璈青童命東華玉女煙景珠擊西盈之鐘暘谷神王命神林玉女賈屈廷吹鳳唳之簫青虛真人命飛玄玉女鮮於虛拊九合玉節太極真人發排空之歌青童吟太霞之曲神王諷晨啓文章清虛詠駕飆之詞既散後諸真元君日夕來降雖幼彥隔壁寂然莫如其後幼彥物故值天下荒亂夫人撫養內外旁救窮乏亦為真仙默示其兆知中原將亂攜二子渡江璞為庾亮司馬又為溫太真司馬後至安成太守遐為陶太尉侃從事中郎將夫人自洛邑達江南盜寇之中凡所過處神明保佑常果元吉二子位既成立夫人因得冥心齊靜纍感真靈修真之益與日俱進凡住世八十三年以晉成帝咸和九年歲在甲午王君復與青童東華君來降授夫人成藥二劑一曰遷神白騎神散一曰石精金光化形靈丸使頓服之稱疾不行凡七日太乙玄仙遣飆車來迎夫人乃託劍化形而去徑入陽洛山中明日青童君太極四真人清虛王君令夫人清齊五百日讀大洞真經併分別真經要祕道陵天師又授明威章奏存祝吏兵符籙之訣衆真各摽至訓三日而去道陵所以遍教委曲者以夫人在世當為女官祭酒領職理民故也夫人誦經萬遍積十六年顏如少女於是龜山九虛太真金母金闕聖君南極元君共迎夫人白日升天北詣上清宮玉闕之下太微帝君中央黃老君三素高元君太上玉晨太道君太素三元君扶桑太帝君金闕後聖君各令使者致命授天人玉札金文位為紫虛元君領上真司命南嶽夫人比秩仙公使治天台大霍山洞臺中主下訓奉道教授當為仙者男曰真人女曰元君夫人受錫事畢王母及金闕聖君南極元君各去使夫人於王屋小有天中更齊戒二月畢九微元君龜山王母三元夫人衆諸真仙並降於小有清虛上上字下雲笈七籤九六有宮絳房之中時夫人與王君為賓主焉設瓊酥玉酒金觴二十二字四奏各命侍女陳鈞成之曲九靈合節八音靈際王母擊節而歌三元夫人彈雲璈而答歌餘真各歌須臾司命神仙諸隸屬及南嶽迎官並至虎旗龍輦激耀百里中王母諸真乃共與夫人東南而行俱詣天台霍山臺又便道過句由金壇茅叔申宴會二日二夕共適於霍山夫人安駕玉宇然後各別初王君告夫人曰學者當去疾除病因授甘草穀仙方夫人服之夫人能隸書小有王君並傳事甚詳悉又述黃庭內景注敘青精飯方後屢降茅山子璞後至侍中夫人令璞傳法于司徒琅邪王舍人楊羲護軍長史許穆穆子玉斧並皆升仙陶貞白真誥所呼南真即夫人也以晉興寧三年乙丑降楊家謂楊君曰修道之士不欲見血肉見雖避之不如不見又云向過東海中波聲如雷又云裴清靈真人錦囊中有寶神經昔從紫微夫人所受吾亦有是西宮定本即是玄圃北壇西瑤之上臺天真珍文盡藏其中也因授書云若夫仰擲雲輪總轡太空手攜宵煙足陟王庭身升帝闕披寶吸青論九玄之逸度沉萬椿之長生真言玄朗高談玉清今則回靈塵埃訓我弟子周目五濁勞神臭腥子所營者道研詠者妙道妙既得吾子加之慮斯蕩散念且慎之仍云河東桐柏山之西頭適崩二百餘丈吾昨與茅叔申詣清虛宮授真仙之籍得失之事頓落四十七人復上者三人耳固當洗心虛邁勤注理盡心殫意竭如履冰火久久如此仙道亦不隱矣但在莊敬丹到而絶淫色之念也若抱淫欲之心行上真之道者清宮所落皆此輩也豈止落名生籍方將被考於三官也勉之慎之宗道者貴無邪棲真者安恬愈至寂非引順之主淡然非教授之匠故當困煩以領無耳為道者精則可矣有精而不勤能而不專無益也要在吝心消豁穢念疾開可以數看東山勤望三秀差復益耳言者性命之全敗信者得失之關籥張良三期可謂篤道而明心矣又曰得道去世或顯或隱託體遺跡者道之隱也昔有再酣瓊液而叩棺一服刀圭而尸爛鹿皮公吞玉華而流蟲出戶賈季子咽金液而臭聞百里黃帝火九鼎於荊山尚有喬嶺之墓李玉明鈔本李作季酉陽雜俎二作季主服雲散以潛升猶頭足異處墨狄飲虹丹以沒水寧生服石腦而赴火務光翦薤以入清冷之泉柏成納氣而腸胃三腐如此之比不可勝紀微乎得道趣捨之跡固無常矣保命君曰所謂尸解者假形而示死非真死也南真曰人死必視其形如生人者尸解也足不青皮不皺者亦尸解也目落不光明鈔本作目光不落無異生人者尸解也髮盡落而失形骨者尸解也白日尸解自是仙矣若非尸解之例死經太陰暫過三官者肉脫脈散血沉灰爛而五臟自生骨如玉七魄營侍三魂守宅者或三十年二十年十年三年當血肉再生復質成形必勝於昔日未死之容者此名鍊形太陰易貌三官之仙也天帝云太陰鍊身形勝服九轉丹形容端且嚴面色似靈雲上登太極闕受書為真人是也若暫遊太陰者太一守尸三魂營骨七魄侍肉胎靈録氣皆數滿再生而飛天其用他藥尸解非是靈丸者即不得返故鄉三官執之也其死而更生者未殮而失其尸有形皮存而無者有衣結不解衣存而形去者有髮脫而形飛者有頭斷已死乃從一旁出者皆尸解也白日解者為上夜半解者為下向晚向暮去者為地下主者此得道之差降也夫人之修道或災逼禍生形壞氣亡者似由多言而守一多端而期苟免也是以層巢頽枝而墜落百勝失於一敗惜乎通仙之才安可為二豎子而致斃耶智以無涯傷性心以欲惡蕩真豈若守根靜中棲研三神彌貫萬物而洞玄鏡寂混然與泥丸為一而內外均福也真人歸心於一任於永信心歸則正神和信順利真之兆自然之感無假兩際也若外見察觀之氣內有慍結之哂有如此者我見其敗未見其立地下主者乃下道之文官地下鬼師乃下道之武官文解一百四年一進武解倍之世人勤心於嗜欲兼味於清正華目以隨世畏死而希仙者皆多武解尸之最下也夫人與衆真吟詩曰玄感妙象外和聲自相招靈雲鬱紫晨蘭風扇緑軺上真宴瓊臺邈為地仙標所期貴遠邁故能秀頴翹玩彼八素翰道成初不遼人事胡可預使爾形氣消夫人既遊江南遂於撫州并山立靜室又於臨汝水西置壇宇歲久蕪梗蹤跡殆平有女道士黃靈徽年邁八十貌若嬰孺號為花姑特加修飾纍有靈應夫人亦寓夢以示之後亦升天玄宗敕道士蔡偉編入後仙傳大曆三年戊申魯國公顏真卿重加修葺立碑以紀其事焉出集仙録及本傳
