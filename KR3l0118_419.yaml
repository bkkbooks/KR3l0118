body:
  text: 柳毅柳毅唐儀鳳中有儒生柳毅者應舉下第將還湘濱念鄉人有客于涇陽者遂往告別至六七里鳥起馬驚疾逸道左又六七里乃止見有婦人牧羊于道畔毅怪視之乃殊色也然而蛾臉不舒中袖無光凝聽翔立若有所伺毅詰之曰子何苦而自辱如是婦始楚而謝終泣而對曰賤妾不幸今日見辱于長者然而恨貫肌骨亦何能愧避幸一聞焉妾洞庭龍君小女也父母配嫁涇川次子而夫壻樂逸為婢仆所惑日以厭薄既而將訴于舅姑舅姑愛其子不能御逮訴頻切又得罪舅姑舅姑毀黜以至此言訖歔欷流涕悲不自勝又曰洞庭于茲相遠不知其幾多也長天茫茫信耗莫通心目斷盡無所知哀聞君將還吳密通洞庭或以尺書寄托侍者未卜將以為可乎毅曰吾義夫也聞子之說氣血俱動恨無毛羽不能奮飛是何可否之謂乎然而洞庭深水也吾行塵間寧可致意耶唯恐道途顯晦不相通達致負誠托又乖懇願子有何術可導我邪女悲泣且謝曰負載珍重不復言矣脫獲回耗雖死必謝君不許何敢言既許而問則洞庭之與京邑不足為異也毅請聞之女曰洞庭之陰有大橘樹焉鄉人謂之社橘君當解去茲帶束以他物然后叩樹三發當有應者因而隨之無有礙矣幸君子書敘之外悉以心誠之話倚托千萬無渝毅曰敬聞命矣女遂于襦間解書再拜以進東望愁泣若不自勝毅深為之戚乃置書囊中因復問曰吾不知子之牧羊何所用哉神祗豈宰殺乎女曰非羊也雨工也何為雨工曰雷霆之類也數顧視之則皆矯顧怒步飲齕甚異而大小毛角則無別羊焉毅又曰吾為使者他日歸洞庭幸勿相避女曰寧止不避當如親戚耳語竟引別東去不數十步回望女與羊俱亡所見矣其夕至邑而別其友月余到鄉還家乃訪于洞庭洞庭之陰果有橘社遂易帶向樹三擊而止俄有武夫出于波間再拜請曰貴客將自何所至也毅不告其實曰走謁大王耳武夫揭水指路引毅以進謂毅曰當閉目數息可達矣毅如其言遂至其宮始見台閣相向門戶千萬奇草珍木無所不有夫乃止毅停于大室之隅曰客當居此以伺焉毅曰此何所也夫曰此靈虛殿也諦視之則人間珍寶畢盡于此柱以白璧砌以青玉床以珊瑚帘以水精雕琉璃于翠楣飾琥珀于虹棟奇秀深杳不可殫言然而王久不至毅謂夫曰洞庭君安在哉曰吾君方幸玄珠閣與太陽道士講大經少選當畢毅曰何謂大經夫曰吾君龍也龍以水為神舉一滴可包陵谷道士乃人也人以火為神聖發一燈可燎阿房然而靈用不同玄化各異太陽道士精于人理吾君邀以聽言語畢而宮門辟景從云合而見一人披紫衣執青玉夫躍曰此吾君也乃至前以告之君望毅而問曰豈非人間之人乎毅對曰然毅而設拜君亦拜命坐于靈虛之下謂毅曰水府幽深寡人暗昧夫子不遠千里將有為乎毅曰毅大王之鄉人也長于楚游學于秦昨下第間驅涇水右涘見大王愛女牧羊于野風環雨鬢所不忍視毅因詰之謂毅曰為夫壻所薄舅姑不念以至于此悲泗淋漓誠怛人心遂托書于毅毅許之今以至此因取書進之洞庭君覽畢以袖掩面而泣曰老父之罪不能鑒聽坐貽聾瞽使閨窗孺弱遠罹構害公乃陌上人也而能急之幸被齒發何敢負德詞畢又哀吒良久左右皆流涕時有宦人密視君者君以書授之令達宮中須臾宮中皆慟哭君驚謂左右曰疾告宮中無使有聲恐錢塘所知毅曰錢塘何人也曰寡人之愛弟昔為錢塘長今則致政矣毅曰何故不使知曰以其勇過人耳昔堯遭洪水九年者乃此子一怒也近與天將失意塞其五山上帝以寡人有薄德于古今遂寬其同氣之罪然猶縻系于此故錢塘之人日日候焉語未畢而大聲忽發天拆地裂宮殿擺簸云煙沸涌俄有赤龍長千余尺電目血舌朱鱗火鬣項掣金鎖鎖牽玉柱千雷萬霆激繞其身霰雪雨雹一時皆下乃臂青天而飛去毅恐蹶仆地君親起持之曰無懼固無害毅良久稍安乃獲自定因告辭曰願得生歸以避復來君曰必不如此其去則然其來則不然幸為少盡繾綣因命酌互舉以欸人事俄而祥風慶云融融怡怡幢節玲瓏簫韶以隨紅妝千萬笑語熙熙后有一人自然蛾眉明璫滿身綃縠參差迫而視之乃前寄辭者然若喜若悲零淚如系須臾紅煙蔽其左紫氣舒其右香氣環旋入于宮中君笑謂毅曰涇水之囚人至矣君乃辭歸宮中須臾又聞怒苦久而不已有頃君復出與毅飲食又有一人披紫裳執青玉貌聳神溢立于君左右謂毅曰此錢塘也毅起趨拜之錢塘亦盡禮相接謂毅曰女侄不幸為頑童所辱賴明君子信義昭彰致達遠冤不然者是為涇陵之土矣饗德懷恩詞不悉心毅手為退辭謝俯仰唯唯然后回告兄曰向者辰發靈虛已至涇陽午戰于彼未還于此中間馳至九天以告上帝帝知其冤而宥其失前所遣責因而獲免然而剛腸激發不遑辭候驚擾宮中復忤賓客愧惕慚懼不知所失因退而再拜君曰所殺幾何曰六十萬傷稼乎曰八百里無情郎安在曰食之矣君撫然曰頑童之為是心也誠不可忍然汝亦太草草賴上帝顯聖諒其至冤不然者吾何辭焉從此已去勿復如是錢塘復再拜是夕遂宿毅于凝光殿明日又宴毅于凝碧宮會友戚張廣樂具以醪醴羅以甘潔初笳角鼙鼓旌旗劍戟舞萬夫于其右中有一夫前曰此錢塘破陳樂旌鈚杰氣顧驟悍栗坐客視之毛發皆豎復有金石絲竹羅綺珠翠舞千女于其左中有一女前進曰此貴主還宮樂清音宛轉如訴如慕坐客聽之不覺淚下二舞既畢龍君太悅錫以褲綺頒于舞人然后密席貫坐縱酒極娛酒酣洞庭君乃擊席而歌曰大天蒼蒼兮大地茫茫人各有志兮何可思量狐神鼠聖兮薄社依牆雷霆一發兮其孰敢當荷真人兮信義長令骨肉兮還故鄉齊言慚愧兮何時忘洞庭君歌罷錢塘君再拜而歌曰上天配合兮生死有途此不當婦兮彼不當夫腹心辛苦兮涇水之隅風霜滿鬢兮雨雪羅襦賴明公兮引素書令骨肉兮家如初永言珍重兮無時無錢塘君歌闋洞庭君俱起奉觴于毅毅踧踖而受爵飲訖復以二觴奉二君乃歌曰碧云悠悠兮涇水東流傷美人兮雨泣花愁尺書遠達兮以解君憂哀冤果雪兮還處其休荷和雅兮感甘羞山家寂寞兮難久留欲將辭去兮悲綢繆歌罷皆呼萬歲洞庭君因出碧玉箱貯以開水犀錢塘君復出紅珀盤貯以照夜璣皆起進毅毅辭謝而受然后宮中之人咸以綃彩珠璧投于毅側重疊煥赫須臾埋沒前后毅笑語四顧愧揖不暇泊酒闌歡極毅辭起復宿于凝光殿翌日又宴毅于清光閣錢塘因酒作色踞謂毅曰不聞猛石可裂不可卷義士可殺不可羞耶愚有衷曲欲一陳于公如可則俱在云霄如不可則皆夷糞壤足下以為何如哉毅曰請聞之錢塘曰涇陽之妻則洞庭君之愛女也淑性茂質為九姻所重不幸見辱于匪人今則絶矣將欲求托高義世為親戚使受恩者知其所歸懷愛者知其所付豈不為君子始終之道者毅肅然而作欻然而笑曰誠不知錢塘君孱困如是毅始聞跨九州懷五嶽泄其憤怒復見斷鎖金掣玉柱赴其急難毅以為剛決明直無如君者蓋犯之者不避其死感之者不愛其生此真丈夫之志奈何簫管方洽親賓正和不顧其道以威加人豈仆之素望哉若遇公于洪波之中玄山之間鼓以鱗須被以云雨將迫毅以死毅則以禽獸視之亦何恨哉今體被衣冠坐談禮義盡五常之志性負百行之微旨雖人世賢杰有不如者況江河靈類乎而欲以蠢然之軀悍然之性乘酒假氣將迫于人豈近直哉且毅之質不足以藏王一甲之間然而敢以不伏之心勝王不道之氣惟王籌之錢塘乃逡巡致謝曰寡人生長宮房不聞正論向者詞述狂妄搪突高明退自循顧戾不容責幸君子不為此乖間可也其夕復歡宴其樂如舊毅與錢塘遂為知心友明日毅辭歸洞庭君夫人別宴毅于潛景殿男女仆妾等悉出預會夫人泣謂毅曰骨肉受君子深恩恨不得展愧戴遂至暌別使前涇陽女當席拜毅以致謝夫人又曰此別豈有復相遇之日乎毅其始雖不諾錢塘之請然當此席殊有歎恨之色宴罷辭別滿宮凄然贈遺珍寶怪不可述毅于是復循途出江岸見從者十余人擔囊以隨至其家而辭去毅因適廣陵寶肆鬻其所得百未發一財以盈兆故淮右富族咸以為莫如遂娶于張氏而又娶韓氏數月韓氏又亡徙家金陵常以鰥曠多感或謀新匹有媒氏告之曰有盧氏女范陽人也父名曰浩嘗為清流宰晚歲好道獨游云泉今則不知所在矣母曰鄭氏前年適清河張氏不幸而張夫早亡母憐其少惜其慧美欲擇德以配焉不識何如毅乃卜日就禮既而男女二姓俱為豪族法用禮物盡其丰盛金陵之士莫不健仰居月余毅因晚入戶視其妻深覺類于龍女而逸艷丰厚則又過之因與話昔事妻謂毅曰人世豈有如是之理乎經歲余有一子毅益重之既産逾月乃濃飾換服召親戚相會之間笑謂毅曰君不憶余之于昔也毅曰夙為洞庭君女傳書至今為憶妻曰余即洞庭君之女也涇川之冤君使得白銜君之恩誓心求報洎錢塘季父論親不從遂至暌違天各一方不能相問父母欲配嫁于濯錦小兒某惟以心誓難移親命難背既為君子棄絶分無見期而當初之冤雖得以告諸父母而誓報不得其志復欲馳白于君子值君子纍娶當娶于張已而又娶于韓逮張韓繼卒君卜居于茲故余之父母乃喜余得遂報君之意今日獲奉君子咸善終世死無恨矣因嗚咽泣涕交下對毅曰始不言者知君無重色之心今乃言者知君有感余之意婦人匪薄不足以確厚永心故因君愛子以托相生未知君意如何愁懼兼心不能自解君附書之日笑謂妾曰他日歸洞庭慎無相避誠不知當此之際君豈有意于今日之事乎其后季父請于君君固不許君乃誠將不可邪抑忿然邪君其話之毅曰似有命者仆始見君子長涇之隅枉抑憔悴誠有不平之志然自約其心者達君之冤余無及也以言慎勿相避者偶然耳豈思哉洎錢塘逼迫之際唯理有不可直乃激人之怒耳夫始以義行為之志寧有殺其壻而納其妻者邪一不可也善素以操真為志尚寧有屈于己而伏于心者乎二不可也且以率肆胸臆酬酢紛綸唯直是圖不遑避害然而將別之日見君有依然之容心甚恨之終以人事扼束無由報謝吁今日君盧氏也又家于人間則吾始心未為惑矣從此以往永奉歡好心無纖慮也妻因深感嬌泣良久不已有頃謂毅曰勿以他類遂為無心固當知報耳夫龍壽萬歲今與君同之水陸無往不適君不以為妄也毅嘉之曰吾不知國客乃復為神仙之餌乃相與覲洞庭既至而賓主盛禮不可具紀后居南海僅四十年其邸第輿馬珍鮮服玩雖侯伯之室無以加也毅之族咸遂濡澤以其春秋積序容狀不衰南海之人靡不驚異洎開元中上方屬意于神仙之事精索道術毅不得安遂相與歸洞庭凡十余歲莫知其跡至開元末毅之表弟薛嘏為京畿令謫官東南經洞庭晴晝長望俄見碧山出于遠波舟人皆側立曰此本無山恐水怪耳指顧之際山與舟相逼乃有彩船自山馳來迎問于嘏其中有一人呼之曰柳公來候耳嘏省然記之乃促至山下攝衣疾上山有宮闕如人世見毅立于宮室之中前列絲竹后羅珠翠物玩之盛殊倍人間毅詞理益玄容顏益少初迎嘏于砌持嘏手曰別來瞬息而發毛已黃嘏笑曰兄為神仙弟為枯骨命也毅因出藥五十丸遺嘏曰此藥一丸可增一歲耳歲滿復來無久居人世以自苦也歡宴畢嘏乃辭行自是已后遂絶影響嘏常以是事告于人世殆四紀嘏亦不知所在隴西李朝威敘而歎曰五蟲之長必以靈者別斯見矣人裸也移信鱗蟲洞庭含納大直錢塘迅疾磊落宜有承焉嘏詠而不載獨可鄰其境愚義之為斯文
