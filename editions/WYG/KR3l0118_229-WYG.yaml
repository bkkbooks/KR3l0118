body:
  text: 太平廣記卷二百二十九器玩一周穆王周靈王王子喬方丈山昆吾山漢太上皇漢武帝輕玉磬李夫人吉光裘西毒國桂宫西胡渠王漢宣帝劉表周穆王周穆王時西戎獻玉杯光照一室置杯于中庭明日水滿杯香而甘羙斯仙人之器也岀十洲記周靈王周靈王二十三年起昆陽臺渠胥國來獻玉駱駝高五尺琥珀鳯凰高六尺火齊鏡高三尺暗中視物如晝向鏡則聞影應聲周人見之如神靈王末不知所之岀王子年拾遺王子喬王子喬墓在京陵戰國時有人盜發之都無見惟有一劍懸在壙中欲取而劍作龍虎之聲遂不敢近俄而徑飛上天神仙經云眞人去世多以劍代五百年後劍亦能靈化此其驗也岀世説方丈山方丈山一名巒稚東有龍塲千里玉瑤爲林龍常鬬此處膏血如流水膏色黑者著地堅凝如漆而有紫光可爲寶器岀王子年拾遺記昆吾山昆吾山其下多赤金色如火昔黄帝伐􅃖尤陳兵於此地掘深百丈猶未及泉惟見火光如星地中多丹鍊石爲銅銅色青而利泉色赤山草木皆勁利土亦剛而精至越王句踐使工人以白牛馬祠昆吾之神採金鑄之以成八劍一名掩日以之指日則光晝暗金陰物也陰盛則陽滅二名斷水以之畫水開而卽不合三名轉魄以之指月則蟾為之側轉四名懸翦飛鳥遊蟲遇觸其刃如斬截焉五名驚鯢以之泛海則鯨鯢為之深入六名滅魂挾之夜行不逢魑魅七名却邪有妖魅者見之則止八名眞剛以之切玉斷金如刻削土木矣以應八方之氣鑄之者王子年拾遺記漢太上皇漢太上皇㣲時常佩一刀長三尺上有銘其字雖難識疑是殷高宗伐鬼方時作此物也太上皇遊豐沛山澤中窮谷裏有人歐冶鑄上皇息其傍問曰此鑄何器工人笑而答曰為天子鑄劍勿泄言上皇謂為戲言了無疑色工曰今所鑄鐵鋼礪難成若得翁腰間佩刀雜而冶之卽成神器可以尅定天下星精為輔佐以殱三猾水衰火盛此為異兆也上皇曰余有此物名為七首其利難儔水斷虬龍陸斬虎兕魑魅魍魎莫能逢之削玉鐫金其刃不卷工人曰若不得此七首以和鑄雖歐冶專精越工砥鍔終為鄙器上皇卽解腰間七首以投於罏中俄而􅃄㷔衝天日為之晝闇及乎劍成殺三牲釁祭之鑄工問上皇何時得此七首曰秦昭襄王之時余行逢一野人於路授余云殷時靈物世世相傳上有古書記其年月及劍成工人視之其銘尚存叶前疑也工人卽持劍授上皇上皇以賜高祖高祖長佩於身以殱三猾及天下已定授吕后藏於寶庫之中守藏者見白氣如雲出於戸外如龍蛇改其庫名曰靈金藏及諸吕擅權白氣亦滅及惠帝卽位以此庫貯禁兵器改曰靈金内府出王子年拾遺記又漢帝相傳以秦王子嬰所奉白玉璽高祖斬白蛇劍劍上皆用七綵珠九華玉以為飾雜厠五色琉璃為劍匣劍在室中其光景猶照於外與挺劍不殊十二年一加磨礱刃上常若霜雪開匣板鞘輒有風氣光彩射人出酉陽雜爼漢武帝孫氏應瑞圖六神鼎者文質精也知吉凶知存亡能輕能重能息能行不灼自沸不汲自滿中生五味王者興則出衰則去説苑云孝武時汾陰人得寶鼎獻之甘泉宫羣臣畢賀上夀曰陛下得周鼎侍中吾丘夀王曰非周鼎上召問之有説則生無説則死夀王對曰周德者始於天授成於文武顯於周公德澤上暢於天下漏三泉上天報應鼎為周出今漢繼周德澤顯行六合和同至陛下之身而逾盛天瑞並至昔秦始皇親求鼎於彭城而不得天昭有德神寳自至此天所以遺漢乃漢鼎非周鼎也上曰善魏文帝典論亦云墨子曰昔夏后啓使飛亷折金以精神於昆吾使翁乙灼自若之龜鼎成四定而方不灼自烹不舉自滅不遷自行拾遺録云周末大亂九鼎飛入天池末世書論云入泗水聲轉謬焉岀小説輕玉磬漢武帝起招仙閣於甘泉宫西其上懸浮金輕玉之磬浮金者自浮水上輕玉者其質貞明而輕也出洞㝠記李夫人漢武帝過李夫人就取玉簮搔頭自此宫人搔頭皆用玉簮玉倍貴焉又以𧰼牙為箆賜李夫人出小説吉光裘漢王莾時西戎獻吉光裘入水數日不濡入火不焦元鳯不道之時服此裘以視朝焉出十洲記西毒國漢武帝時西毒國獻連環羈皆以白玉作之瑪瑙石為勒白光琉璃為鞍安在暗室中嘗照十餘丈其光如晝西京雜記桂宫漢武帝為七寳􅇃雜寳案雜寳屏風雜寳帳設於桂宫時人謂之四寳宫出西京雜記西胡渠王漢武帝塜裏先有玉箱瑤杖各一是西胡渠王所獻帝平素常玩之後有人扶風郿市買得二物帝左右識而認之説賣者形狀乃帝也出異苑漢宣帝漢綵女常以七月七日夜穿七孔針於開襟樓俱以習之宣帝被收繫郡邸獄臂上猶帶史良娣合采婉轉絲繩係身毒國寳鏡一枚大如八銖錢舊傳此鏡照見妖魅得佩之者為天神所福故宣帝從危獲濟及卽大位每持此鏡感咽移辰常以琥珀笥盛之緘以戚里織成一曰斜紋織成宣帝崩不知所在出西京雜記劉表劉表跨有南土子弟驕貴並好酒為三爵大曰伯雅受七升次曰仲雅受六升次曰季雅受五升出魏文典論太平廣記卷二百二十九
