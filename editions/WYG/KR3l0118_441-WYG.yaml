body:
  text: 太平廣記巻四百四十一宋李昉等編畜獸八獅子魏武帝後魏莊帝雜說犀通天犀雜説象白象閬州莫徭華容莊象安南獵者淮南獵者蔣武雜說雜獸蕭至忠獅子魏武帝魏武帝伐冒頓經白狼山逢獅子使人格之殺傷甚衆王乃自率常從健兒數百人擊之獅子哮吼奮迅左右咸驚汗忽見一物從林中出如狸超上王車軛上獅子將至此獸便跳於獅子頭上獅子即伏不敢起於是遂殺之得獅子一子此獸還未至洛陽三十里路中雞狗皆伏無鳴吠者出愽物志後魏莊帝後魏波斯國獻獅子永安末始達京師莊帝謂侍中李彧曰朕聞虎見獅子必伏可覓試之於是詔近山郡縣捕虎以進鞏縣山陽並送二虎一豹見獅子悉皆瞑目不敢仰視園中素有一盲熊性甚馴善帝令取試之虞人牽盲熊至聞獅子氣驚怖跳踉曵鎻而走帝大笑出伽藍記雜說釋氏書言獅子筋為絃鼔之衆絃皆絶西域有黑獅子棒獅子集賢校理張希復言舊有獅子尾拂夏月蠅蚋不敢集其上舊説蘇合香獅子糞也出酉陽雜俎犀通天犀通天犀角有一白理如綖者以盛米置羣雞中雞欲往啄米至輙驚却故南人名為駭雞也得真角一尺刻以為魚而銜以入水水常為開方三尺可得息氣水中以其角為叉𨗳者將煮毒藥為湯以此叉𨗳攪之皆生白末無復毒矣出抱朴子雜説犀之通天者必惡影常飲濁水當其溺時人趕不復移足角之理形似百物或理不通者是其病然其理有倒揷正揷腰鼓倒揷者一半已下通正揷者一半已上通腰鼔者中斷不通故波斯謂牙為白暗犀為黑暗段成式門下醫人吳士臯常職於南海郡見舶主說本國取犀先於山路多植木如狙杙云犀前脚直常倚木而息木爛折則不能起犀角一名奴角有鶴處必有犀也犀三毛一孔劉孝標言犀墮角埋之人以假角易之出酉陽雜俎象白象後魏洛水橋南道東有白象坊白象者永平二年乾陁羅國所獻背設五采屏風七寳坐床容數十人眞是異物常養于乘黄象常曾壞屋毀牆走出于外逢𣗳即㧞遇墻亦倒百姓驚怖奔走交馳太后遂徙象於此坊出伽藍記閬州莫徭閬州莫徭以樵採為事常於江邊刈蘆有大象奄至捲之上背行百餘里深入澤中澤中有老象卧而喘息痛聲甚苦至其所下於地老象舉足足中有竹丁莫徭曉其意以腰繩係竹丁為拔出濃血五六升許小象復鼻捲青艾欲令塞瘡莫徭摘艾熟按以次塞之盡艾方滿久之病象能起東西行立已而復卧回顧小象以鼻指山呦呦有聲小象乃去須臾得一牙至病象見牙大吼意若嫌之小象持牙去頃之又將大牙莫徭呼象為將軍言未食患飢象徃折山栗數枝食之乃飽然後送人及牙還行五十里忽爾却轉人初不了其意乃還取其遺刀人得刀畢送至本處以頭抵人左右揺耳久之乃去其牙酷大載至洪州有商胡求買累自加直至四十萬尋至他人肆胡遽以葦席覆牙他胡問是何寳而輙見避主人除席云止一大牙耳他胡見牙色動私白主人許酬百萬又以一萬為主人紹介佯各罷去頃間荷錢而至本胡復爭之云本買牙者我也長者參市違公法主人若求千百之貫我豈無耶往復交爭遂相毆擊所由白縣縣以白府府詰其由胡初不肯以牙為寳府君曰此牙㑹獻天子汝輩不言亦終無益固靳胡方白云牙中有二龍相躩而立可絶為簡本國重此者以為貨當值數十萬萬得之為大商賈矣洪州乃以牙及牙主二胡並進之天后命剖牙果得龍簡謂牙主曰汝貎貧賤不可多受錢物賜敕閬州每年給五十千盡而復取以終其身出廣異記華容莊象上元中華容縣有象入莊家中庭卧其足下有槎人為出之象乃伏令人騎入深山以鼻掊土得象牙數十以報之出朝野僉載安南獵者安南人以射獵為業每藥附箭鏃射鳥獸中者必斃開元中其人曾入深山假寐𣗳下忽有物觸之驚起見是白象大倍他象南人呼之為將軍祝之而拜象以鼻捲人上背復取其弓矢藥筒等以授之因爾遂騁行百餘里入邃谷至平石逈望十里許兩崖悉是大𣗳圍如巨屋森然隱天象至平石戰懼且行且望經六七里往倚大𣗳以鼻仰拂人人悟其意乃擕弓箭縁𣗳上象於𣗳下望之可上二十餘丈欲止象鼻直指意如𨗳令復上人知其意逕上六十丈象視畢走去其人夜宿𣗳上至明見平石上有二目光久之見巨獸髙十餘丈毛色正黑須臾清朗昨所見大象領凡象百餘頭循山而來伏於其前巨獸躩食二象食畢各引去人乃思象意欲令其射因傅藥矢端極力射之累中二矢獸視矢吼奮聲震林木人亦大呼引獸獸來尋人人附𣗳㑹其開口又當口中射之獸吼而自擲久之方死俄見大象從平石入一歩一望至獸所審其已死以頭觸之仰天大吼頃間羣象五六百輩雲萃吼呌聲徹數十里大象來至𣗳所屈膝再拜以鼻招人人乃下𣗳上其背象載人前行羣象從之尋至一所植木如隴大象以鼻揭楂羣象皆揭日旰而盡中有象牙數萬枚象載人行數十歩内必披一枝蓋示其路訖尋至昨寐之處下人於地再拜而去其人歸白都䕶都䕶發使隨之得牙數萬嶺表牙為之賤使人至平石所巨獸但餘骨存都䕶取一節骨十人舁致之骨有孔通人來去出廣異記淮南獵者張景伯之為和州淮南多象州有獵者常逐獸山中忽有羣象來圍獵者令不得去有大象至獵夫前鼻絞獵夫置之於背獵夫刀仗墜者象皆為取送還之於是䭾獵夫徑入深山羣象送於山口而返入山五十里經大盤石石際無他物盡象之皮革餘血肉存焉獵夫念曰得無於此㗖我乎象負之且過去石五十步有大松𣗳象以背依𣗳獵夫因得登木焉弓墜於地象又鼻取仰送之獵夫深怪其故象既送獵夫訖因馳去俄而有一青獸自松𣗳南細草中出毳毛髬髵爪牙可畏其大如屋電目雷音來止磐石若有所待有頃一次象自北而來遥見猛獸俯伏膝行既至磐石􅂲懼戰慄獸見之喜以手取之投於空中投已接取猶未食噉獵夫望之歎曰畜獸之愚猶請救於人向來將余於山欲予斃此獸也予善其意曷可不救於是引滿縱毒箭射之洞其左腋獸既中箭來趨獵夫又迎射貫心獸踣焉宛轉而死小象乃馳還俄而諸象二百餘頭來至𣗳下皆長跪展轉獵夫下前所負象又以背承之負之出山諸象圍繞喧號將獵夫至一處諸象以鼻破阜而出所藏之牙焉凡三百餘莖以示獵夫又負之至所遇處象又皆跪謝恩而去獵夫乃取其牙貨得錢數萬出紀聞蔣武寳歴中有蔣武者循州河源人也魁梧偉壯膽氣豪勇獨處山巖惟求獵射而已善於蹶張每賫弓挾矢遇熊羆虎豹靡不應弦而斃剖視其鏃皆一一貫心焉忽有物叩門甚急速武隔扉而窺之見一猩猩跨白象武知猩猩能言而詰曰與象叩吾門何也猩猩曰象有難知我能言故負吾而相投耳武曰汝有何苦請話其由猩猩曰此山南二百餘里有嵌空之大巖穴中有巴蛇長數百尺電光而閃其目劎刃而利其牙象之經過咸被吞噬遭者數百無計避匿今知山客善射願持毒矢而射之除得此患衆各思報恩矣其象乃跪地灑涕如雨猩猩曰山客若許行便請挾矢而登武感其言以毒淬矢而登果見雙目在其巖下光射數百步猩猩曰此是蛇目也武怒蹶張端矢一發而中其目象乃負而奔避俄若穴中雷吼蛇躍出蜿蜒或挾或踴數里之内林木草芥如焚至暝蛇殞乃窺穴側象骨與牙其積如山於是有十象以長鼻各捲其紅牙一枝跪獻於武武受之猩猩亦辭而去遂以前象負其牙而歸武乃大有資産出傳奇雜說安南有象能黙識人之是非曲直其往來山中遇人相爭有理者即過負心者以鼻捲之擲空中數丈以牙接之應時碎矣莫敢競者出朝野僉載龍象六十嵗骨方足今荆地象色黑兩牙江猪也咸亨二年周澄國遣使上表言訶伽國有白象口􅂷四牙身運五足象之所在其土必豐以水洗牙飲之愈疾請發兵迎取象膽隨四時在四腿春在前左夏在前右如無定體也鼻端有爪可拾針肉有十二般惟鼻是其本肉陶貞白言夏月合藥宜置牙於藥旁南人言象尤惡犬聲獵者裹糧登髙𣗳搆熊巢伺之有羣象過則為犬聲悉舉鼻吼呌循守不復去或經五六日困倒則下􅅗刺殺之耳穴薄如鼓皮一刺而斃胷前小横骨灰之酒服令人能浮水出没食其肉令人體重古訓言象孕五歲始生出酉陽雜俎環王國野象成羣一牡管牝三十餘牝者牙纔二尺迭供牡者水草卧則環守牝象死共穵地埋之號吼移時方散又國人養馴者可令代樵出酉陽雜俎廣之屬郡潮循州多野象牙小而紅最堪作笏潮循人或捕得象争食其鼻云肥脆偏堪作炙或云象肉有十二種象膽不附肝隨月轉在諸肉楚越之間象皆青黑唯西方佛林大食國即多白象劉恂有親表曽奉使雲南彼中豪族各家養象負重致逺如中夏之畜牛馬也蠻王宴漢使於百花樓樓前入舞象曲動樂作優倡引入象以金羈絡首錦繡垂身隨拍騰蹋動頭揺尾皆合節奏即天寳中舞馬之類也唐乾符四年占城國進馴象三頭當殿引對亦能拜舞後放還本國出嶺表録異雜獸蕭至忠唐中書令蕭至忠景雲元年為晉州刺史將以臘日畋遊大事至羅先一日有薪者樵於霍山暴瘧不能歸因止巖穴之中呻吟不寐夜將艾似聞悉窣有人聲初以為盜賊將至則匍匐伏於林木中時山月甚明有一人身長丈餘鼻有三角體被豹鞟目閃閃如電向谷長嘯俄有虎兕鹿豕狐兔雉雁駢匝百許步長人即宣言曰余𤣥冥使者奉北帝之命明日臘日蕭使君當順時畋獵爾等若干合箭死若干合鎗死若干合網死若干合棒死若干合狗死若干合鷹死言訖羣獸皆俯伏戰懼若請命者老虎洎老麋皆屈膝向長人言曰以某等之命即實以分然蕭公仁者非意欲害物以行時令耳若有少故則止使者豈無術救某等乎使者曰非余欲殺汝輩但今自以帝命宣示汝等刑名即余使乎之事畢矣自此任爾自為計然余聞東谷嚴四兄善謀爾等可就彼祈求羣獸皆輪轉歡呌使者即東行羣獸畢從時薪者疾亦少閒隨往覘之既至東谷有茅堂數間黄冠一人架懸虎皮身正熟寢驚起見使者曰濶别既久每多思望今日至此得非配羣生臘日刑名乎使者曰正如髙明所問然彼皆求救於四兄四兄當為謀之老虎老麋即屈膝哀請黄冠曰蕭使君每役人必恤其飢寒若祈滕六降雪巽二起風即不復遊獵矣余昨得滕六書知已喪偶又聞索泉家第五娘子為歌􅁎以妬忌黜矣若汝求得美人納之則雪立降矣又巽二好飲汝若求得醇醪賂之則風立至矣有二狐自稱多媚能取之河東縣尉崔知之第三妹美淑嬌艶絳州盧司户善釀醪妻産必有美酒言訖而去諸獸皆有歡聲黄冠乃謂使者曰憶含質在仙都豈意千年為獸身悒悒不得志聊有述懷一章乃吟曰昔為仙子今為虎流落隂涯足風雨更將班毳破余身千載空山萬般苦然含質譴謫已滿唯有十一日即歸紫府矣久居於此將别不無恨恨因題數行於壁使後人知僕曽居於此矣乃書北壁曰下𤣥八千億甲子丹飛先生嚴含質謫下中天被班革六十甲子血食澗飲厠猿狖下濁界景雲元紀昇太一時薪者素曉書誦因密記得之少頃老狐負美人至纔及笄嵗紅袂拭目殘粧妖媚又有一狐負美酒二瓶香氣酷烈嚴四兄即以美女及美酒瓶各納一囊中以朱書一符取水噀之二囊即飛去薪者懼且為所見即尋路却回未明風雪暴至竟日乃罷而蕭使君不復獵矣出𤣥怪録太平廣記卷四百四十一
