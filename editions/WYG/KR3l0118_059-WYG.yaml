body:
  text: 太平廣記卷五十九女仙四明星玉女昌容園客妻太𤣥女西河少女梁玉清江妃毛女秦宫人鈎翼夫人南陽公主程􅊆妻梁母董永妻酒母女儿明星玉女明星玉女者居華山服玉漿白日昇天山頂石龜其廣數畝高三仭其側有梯磴逺皆見玉女祠前有五石臼號曰玉女洗頭盆其中水色碧緑澄澈雨不加溢旱不减耗祠内有玉石馬一匹焉出集仙録昌容昌容者商王女也修道於常山食蓬蔂根二百餘年顏如二十許能致紫草鬻與染工得錢以與貧病者往來城市世世見之逺近之人奉事者千餘家竟不知其所修之道常行日中不見其影或云昌容能鍊形者也忽冲天而去出女仙傳園客妻園客妻神女也園客者濟陰人也美姿貎而良邑人多欲以女妻之客終不娶常種五色香草積數十年服食其實忽有五色蛾集香草上客收而薦之以布生華蠶焉至蠶出時有一女自來助客養蠶亦以香草飼之蠶壯得繭百三十枚繭大如甕每一繭繰六七日乃盡繰訖此女與園客俱去濟陰今有華蠶祠焉出女仙傳太𤣥女太𤣥女姓顓名和少喪父或相其母子皆曰不夀惻然以為憂常曰人之處世一失不可復生况聞夀限之促非修道不可以延生也遂行訪明師洗心求道得王子之術行之累年遂能入水不濡盛雪寒時單衣冰上而顏色不變身體温煖可至積日又能徙官府宫殿城市屋宅於他處視之無異指之即失其所在門户櫝櫃有闗鑰者指之即開指山山搉指樹樹折更指之即復如故將弟子行山間日暮以杖叩石即開門户入其中屋宇床褥幃帳廩供酒食如常雖行萬里所在常爾能令小物忽大如屋大物忽小如毫芒或吐火張天嘘之即滅又能坐炎火之中衣履不燃須臾之間或化老翁或為小兒或為車馬無所不為行三十六術甚效起死㢠廻生救人無數不知其何所服食亦無得其術者顏色益少鬂髮如鴉忽白日昇天而去出女仙傳西河少女西河少女者神仙伯山甫外甥也山甫雍州人入華山學道精思服食時還鄉里省親族一百餘年容狀益少入人家即知其家先世已來善惡功過有如目擊又知將來吉凶言無不效見其外甥女年少多病與之藥女服藥時年已七十稍稍還少色如嬰兒漢遣使行經西河於城東見一女子笞一老翁頭白如雪跪而受杖使者怪而問之女子答曰此是妾兒也昔妾舅伯山甫得神仙之道隱居華山中愍妾多病以神藥授妾漸復少壯今此兒妾令服藥不肯致此衰老行不及妾妾恚之故因杖耳使者問女及兒年各㡬許女子答云妾年一百三十嵗兒年七十一矣此女亦入華山而去出女仙傳梁玉清東方朔内傳云秦并六國太白星竊織女侍兒梁玉清衞承莊逃入衞城少仙洞四十六日不出天帝怒命五岳搜捕焉太白歸位衞承莊逃焉梁玉清有子名休玉清謫於北斗下常舂其子乃配於河伯驂乘行雨子休每至少仙洞耻其母淫奔之所輒廻馭故此地常少雨焉出獨異志江妃鄭交甫常遊漢江見二女皆麗服華裝佩兩明珠大如雞卵交甫見而悦之不知其神人也謂其僕曰我欲下請其佩僕曰此間之人皆習於辭不得恐罹悔焉交甫不聽遂下與之言曰二女勞矣二女答曰客子有勞妾何勞之有交甫曰橘是橙也我盛之以笥令附漢水將流而下我遵其旁搴之知吾為不遜也願請子佩二女曰橘是橙也盛之以莒令附漢水將流而下我遵其旁捲其芝而茹之手解佩以與交甫交甫受而懷之既趨而去行數十步視懷空無珠二女忽不見詩云漢有遊女不可求思言其以禮自防人莫敢犯況神仙之變化乎出列仙傳毛女毛氏字玉姜在華陰山中山客獵師世世見之形體生毛自言秦始皇宫人也秦亡流亡入山道士教食松葉遂不饑寒身輕如此至西漢時已百七十餘年矣出列仙傳秦宫人漢成帝時獵者於終南山中見一人無衣服身生黑毛獵人欲取之而其人踰坑越谷有如飛騰不可追及於是乃宻伺其所在合圍而得之問之言我本秦之宫人聞闗東賊至秦王出降宫室燒燔驚走入山饑無所飡當餓死有一老翁教我食松葉松實當時苦澁後稍便之遂不饑渴冬不寒夏不熱計此女定是秦王子嬰宫人至成帝時一百許嵗獵人將歸以榖食之初時聞榖臭嘔吐累日乃安如是一年許身毛稍脱落轉老而死向使不為人所得便成仙人也出抱朴子鈎翼夫人鈎翼夫人齊人也姓趙少好清淨病卧六年右手捲飲食少漢武帝時望氣者云東北有貴人氣推而得之召到姿色甚􅊆武帝發其手而得玉鈎手得展幸之生昭帝武帝尋害之殯尸不冷而香一月後昭帝即位更葬之棺空但有絲履故名其宫曰鈎翼後避諱改為弋出列仙傳南陽公主漢南陽公主出降王咸屬王莾秉政公主夙慕空虚崇尚至道每追文景之為理世又知武帝之世累降神仙謂咸曰國危世亂非女子可以扶持但當自保恬和退身修道稍逺囂競必可延生若碌碌隨時進退恐不可免於支離之苦奔迫之患也咸曰黽俛世禄未從其言公主遂於華山結廬棲止嵗餘精思苦切真靈感應遂捨廬室而去人或見之徐徐絶壑乘雲氣冉冉而去咸入山追之越巨壑昇層巔涕泗追望漠然無跡忽於嶺上見遺朱履一雙前而取之已化為石因謂為公主峰潘安仁為記行於世出集仙録程偉妻漢期門即程偉妻得道者也能通神變化偉不甚異之偉當從駕出行而服餙不備甚以為憂妻曰止闕衣耳何愁之甚耶即致兩匹縑忽然自至偉亦好黄白之術煉時即不成妻乃出囊中藥少許以器盛水銀投藥而煎之須臾成銀矣􅊆欲從之受方終不能得云偉骨相不應得逼之不已妻遂蹷然而死尸解而去出集仙録梁母梁母者盱眙人也寡居無子舍逆旅于平原亭客來投憩咸若還家客還錢多少未嘗有言客住經月亦無所厭自家衣食之外所得施諸貧寒常有少年住經日舉動異常臨去曰我東海小童也母亦不知小童何人也宋元徽四年丙辰馬耳山道士徐道盛暫至蒙陰於蜂城西遇一青羊車車自行見一童呼為徐道士前道盛行進去車三歩許止又見二童子年並十二三許齊着黄衣綘褁頭上髻容服端整世所無也車中人遣一童子傳語曰我平原客舍梁母也今被太上召還應過蓬萊尋子喬經太山考召意欲相見果得子來靈轡飄飄𤣥崗嶮􅇖隂津驛有限日程三千三子侍對在近我心憂勞便當乗烟三清此三子見送到𤣥都國汝為我謝東方諸清信士女太平在近十有餘一好相開度過此憂危舉手謝云太平相見馳車騰逝極目乃沒道盛還逆旅訪之正梁母度世日相見也出集仙録董永妻董永父亡無以塟乃自賣為奴主知其賢與錢千萬遣之永行三年喪畢欲還詣主供其奴職道逢一婦人曰願為子妻遂與之俱主謂永曰以錢丐君矣永曰蒙君之恩父喪收藏永雖小人必欲服勤致力以報厚德主曰婦人何能永曰能織主曰必爾者但令君婦為我織縑百匹於是永妻為主人家織十日而百匹具焉出搜神記酒母酒母闕下酒婦遇師呼于老者不知何許人也年五十餘云已數百嵗酒婦異之每加禮敬忽來謂婦曰急裝束與汝共應中陵王去是夜果有異人來持二茅狗一與于老一與酒婦俱令騎之乃龍也相隨上華陰山上常大呼云于老酒母在此出女仙傳女几女几者陳市上酒婦也作酒常美仙人過其家飲酒即以素書五卷質酒錢几開視之乃仙方養性長生之術也儿私寫其要訣依而修之三年顔色更少如二十許人數嵗質酒仙人復來笑謂之曰盜道無師有翅不飛女几隨仙人去居山歴年人常見之其後不知所適今所居即女几山也出女仙傳太平廣記卷五十九
