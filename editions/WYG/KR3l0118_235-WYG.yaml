body:
  text: 太平廣記卷二百三十五交友宗世林禰衡荀巨伯管寧竹林七賢嵇康山濤王安期王敦孫伯翳湘東王繹唐霍王元軌王方翼吳少微張説柳芳杜佑李舟白居易許棠陸龜蒙顔蕘宗世林漢宋南陽宗世林與魏武同時而薄其為人不與交及武帝拜司空總朝政從容問宗曰可以交未答曰松柏之志猶存既忤㫖見疎位不配德而文帝兄弟每造其門必拜􅇃下其禮重如此出世説襧衡襧衡字正平少與孔文舉作爾汝之交時衡未二十而文舉已五十餘矣出本傳荀巨伯荀巨伯遠看友人疾値胡賊攻郡友人語伯曰吾且死矣子可去伯曰遠來視子今有難而捨之去豈伯行耶賊既至謂伯曰大軍至此一郡俱空汝何人獨止耶伯曰有友人疾不忍委之寧以巳身代友人之命賊聞其言異之乃相謂曰我軍無義之人而入有義之國乃偃兵而退一郡獲全出殷芸口説管寧魏管寧與華歆友善嘗共園中鋤菜見地有黄金一片管揮鋤不顧與瓦石無異華捉而擲之又嘗同席讀書有乘軒冕者過門管讀書如故華廢書出看管割席分坐曰子非吾友也出世説竹林七賢陳畱阮籍譙國嵇康河内山濤三人年相比預此契者沛國劉伶陳畱阮咸河内向秀琅琊王戎七人常集于竹林之下肆意酣暢世謂之竹林七賢出世説嵇康嵇康素與吕安友每一相思千里命駕安來値康不在兄喜出迎安不前題門上作鳯字而去喜不悟康至云鳯凡鳥也出語林山濤山濤與嵇阮一面契若金蘭山妻韓氏覺濤與二人異於常交問之濤曰當年可以為友者唯此二人妻曰負羈之妻亦親觀趙狐意欲窺之可乎濤曰可他日二人來勸濤止之宿具酒食妻穿牆視之逹旦忘返濤入曰二人何如曰君才致不如正當以識度耳濤曰伊輩亦以我識度為勝出世説王安期晉太傅東海王越鎭許昌以王安期為記室參軍雅相知重敕世子毘曰夫學之所益者淺體之所安者深間習禮度不如式瞻儀形諷味遺言不如親承音旨王參軍人倫之表汝其師之出世説王敦庾亮見王敦問曰聞君有四友何者為是答曰君家中郎我家太尉阿平胡毋彦國阿平故當最劣庾曰似未劣又問何者居其右王曰自有人庾曰何者是王曰噫左右躡庾公之足乃止出世説孫伯翳齊太原孫伯翳家貧嘗映雪讀書放情物外棲志丘壑與王令君亮范將軍雲為莫逆之交王范既相二朝欲以吏職相處伯翳曰人生百年有如風燭宜怡神養性琴酒寄情安能棲棲役曵若此嵇康所不堪予亦未能也出談藪湘東王繹梁湘東王繹博覽羣書才辨冠世不好聲色愛重名賢與河東裴子野蘭陵蕭子雲為布衣之交出談藪唐霍王元軌唐霍王元軌高祖第十四子也謙愼自守不妄接士在徐州與處士劉𤣥平為布衣交或問𤣥平王之所長𤣥平曰無問者怪而詰之𤣥平曰夫人有短所以見其長至于霍王無所不備吾何以稱之哉出談賓錄王方翼涼州長史趙持滿與長孫無忌親許敬宗既陷無忌懼持滿為已患乃誣其同反追至京拷訊嘆曰身可殺辭不可辱吏為代占而結奏遂死獄中尸于城西親戚莫敢收視者王方翼嘆曰欒布之哭彭越大義也周文之掩朽骸至仁也絶友之義蔽主之仁何以事君遂具禮葬焉高宗義之而不問出新語吳少㣲吳少㣲東海人也少負文華與富嘉謨友善少㣲進士及第累授晉陽太原尉拜御史時嘉謨疾卒為文哭之其詞曰維三月癸丑河南富嘉謨卒于京邸少㣲時在官署聞之投袂而起疾行乎衫席匍匐于寢門之外病不能起仰天而呼曰天乎天乎予曷所朋曷有律曷可得而見抑斯文也以存乎哀太常少卿徐公鄜州刺史尹公中書徐元二舍人兵部張郎中説未嘗値我不嘆于朝夫情悼之賦詩以寵亡也其詞曰吾友適不死於戲社稷臣直祿非造利常懐大庇人乃無承明藉遘此敦䍧春藥礪其可畏皇穹故匪仁疇昔與夫子孰云異天倫同病一相失茫茫不重陳子之文章在其殆尼父新鼓興幹河岳眞詞毒鬼神可悲不可朽東輤没荒榛聖主賢為寳吁兹大國貧詞人莫不嘆美既而病亟長嘆曰生死人之大分吾何恨焉然官職十分未作其一乃至是耶慷慨而終出御史臺記張説張説之謫岳州也常鬱鬱不樂時宰以説機辨才略互相排擯蘇頲方當大用而張説與瓌善張因為五君詠致書封其詩以遺頲戒其使曰候忌日近暮送之使者既至因忌日齎書至頲門下㑹積隂累旬近暮吊客至多説先公寮舊頲因覽詩嗚咽流涕悲不自勝翌日乃上封大陳説忠貞謇諤有勤乎王室亦人望所屬不宜淪滯于遐方上乃降璽書勞問俄而遷荆州長史由是陸𧰼先韋嗣立張廷珪賈曾皆以譴逐歲乆因加甄收頲常以説父之執友事之甚謹而説重其才器深加敬慕焉出明皇雜錄柳芳柳芳與韋述友善俱為史學述卒後所著書未畢者芳多續成之出國史𥙷杜佑劉禹錫言司徒杜公佑視穆贊也如故人子弟佑見贊為闕因謂之曰闕有一言為入郎乆闕蔽為珪穆闕納之友闕威也出嘉語録李舟隴西李舟與齊暎友善暎為將相舟為布衣舟致書于暎以交不以貴也時暎左遷于䕫書曰三十三官足下近年以來宰臣當國多與故人禮絶僕以禮處足下則足下長者僕心未忍欲以故人處足下則慮悠悠之人以僕為諂幾欲修書逡廵至今忽承足下出守䕫國為蒼生之望不為不幸為足下之謀則名遂身退斯又為難僕知時者謹以為賀但鄱陽雲安道阻且長音塵寂蔑永望増嘆僕所病沉痼方率子弟力農與世疎矣足下亦焉能不疎僕􅁘足下素僕所知其于得䘮固恬如也然朝臣如足下者寡矣明主豈當不察之􅁘唯强飯自愛珍重珍重出摭言白居易白少𫝊居易與元相國稹友善以詩道著名號元白其集内有哭元相詩云相看掩淚俱無語别有傷心事豈知想得咸陽原上樹已抽三丈白楊枝出北夢瑣言許棠許棠乆困名塲咸通末馬戴佐大同軍幕棠徃謁之一見如舊識畱連數月但詩酒而己未嘗問所欲忽一旦大㑹賓友命使者以棠家書授之棠驚愕莫知其來啓緘乃是戴潛遣一价䘏其家矣出摭言陸龜蒙吳郡陸龜蒙字魯望父賓虞進士甲科浙東從事家于蘇臺龜蒙幼精六籍長而攻文與顔蕘皮日休羅隱吳融為益友性高潔家貧思飬親之禄與張搏為廬江吳興二郡倅丞相李蔚盧㩦景重之羅隱寄龜蒙詩云龍樓李丞相昔歲仰高文黄閣今無主青山竟不焚葢嘗有徴聘之意唐末以左拾遺授之詔下之日疾終于家與皮日休為詩友出北夢瑣言顔蕘顔給事蕘謫官殁于湖外未間自草墓志性躁急不能容物其志詞云寓于東吳與吳郡陸龜蒙為詩文之交一紀無渝龜蒙卒為其就木至穴情禮不缺其後即故諫議大夫高公丞之故丞相陸公扆二君于蕘至死不變其餘面交皆如㩦手過市見利即解㩦而去莫我知也後有吏部尚書薛公貽矩兵部侍郎于公兢中書舍人鄭公撰三君子者予今日以前不變不知後日見予骨肉孤幼復如何哉出北夢瑣言太平廣記卷二百三十五
