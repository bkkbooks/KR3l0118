body:
  text: 太平廣記卷四百九十五宋李昉等編雜録宇文融哥舒翰崔𨼆甫蕭嵩陳懐卿鄒鳯熾高力士王維史思明豆榖潤州樓邱為裴佶李抱真楊志堅宇文融𤣥宗命宇文融為括田使融方恣睢稍不附己者必加誣譖密奏以為盧從愿廣置田園有地數百頃帝素噐重亦倚為相者數矣而又族望宦婚鼎盛於一時故帝亦重言其罪但目從愿為多田翁從愿少家相州應明經常從五舉制䇿三等授夏縣尉自前明經至吏部侍即纔十年自吏部員外至侍郎只七箇月出明皇雜録哥舒翰天寶中哥舒翰為安西節度控地數千里甚著威令故西鄙人歌之曰北斗七星高哥舒夜帶刀吐蕃總殺盡更䇿两重濠時差都兵馬使張擢上都奏事值楊國忠專權黷貨擢逗遛不返因納賄交結翰續又朝奏擢知翰至懼求國忠㧞用國忠乃除擢兼御史大夫充劔南西川節度使敕下就第辭翰翰命部下捽于庭數其事杖而殺之然後奏聞帝却賜擢尸更令翰决尸一百出乾􅍧子崔𨼆甫梨園弟子有胡雛善吹笛尤承恩甞犯洛陽令崔𨼆甫已而走入禁中𤣥宗非時託以他事召𨼆甫對胡雛在側指曰就卿乞此得否𨼆甫對曰陛下此言是輕臣而重樂人也臣請休官再拜而去𤣥宗遽曰朕與卿戱也遂令曵出至門外立杖殺之俄而復敕釋已死矣乃賜𨼆甫絹百匹出國史𥙷蕭嵩𤣥宗甞器重蘇頲欲倚以為相禮遇顧問與羣臣特異欲命相前一日上祕密不欲令左右知迨夜艾乃令草詔訪於侍臣曰外庭值宿誰遂命秉燭召來至則中書舍人蕭嵩上即以頲姓名授嵩令草制書既成其詞曰國之瓌寶上尋續三四謂嵩曰頲瓌之子朕不欲斥其父名卿為刋削之上乃命撒帳中屏風與嵩嵩慙懼流汗筆不能下者久之上以嵩杼思移時必當精密不覺前席以觀唯改曰國之珍寶他無更易嵩既退上擲其草于地曰虚有其表耳嵩長大多髯上故有是名左右失笑上聞遽起掩其口曰嵩雖才藝非長人臣之貴亦無與比前言戱耳其黙識神覧皆此𩔖也出明皇雜録陳懷卿陳懷卿嶺南人也養鴨百餘頭後于鴨欄中除糞糞中有光爛然試以盆水沙汰之得金十兩乃覘所食處于舍後山足下土中有麩金消得数千斤時人莫知卿遂巨富仕至梧州刺史出朝野僉載鄒鳳熾西京懷德坊南門之東有富商鄒鳯熾肩高背曲有似駱駝時人號為鄒駱駝其家巨富金寶不可勝計常與朝貴遊邸店園宅遍滿海内四方物盡為所收雖古之猗白不是過也其家男女婢僕錦衣玉食服用器物皆一時驚異甞因嫁女邀諸朝士徃臨禮席賔客数千夜擬供帳備極華麗及女即將出侍婢圍遶綺羅珠翠垂釵曳履尤艶麗者至数百人衆皆愕然不知孰是新婦矣又甞謁見高宗請市終南山中樹估絹一匹自云山樹雖盡臣絹未竭事雖不行終為天下所誦後犯事流𤓰州㑹赦還及卒子孫窮匱又有王元寶者年老好戱謔出入里市為人所知人以為錢文有元寶字因呼錢為王老盛流于時矣出西京記又一説𤣥宗甞召王元寶問其家私多少對曰臣請以絹一匹繫陛下南山樹南山樹盡臣絹未窮又𤣥宗御含元殿望南山見一白龍横亘山間問左右皆言不見令急召王元寶問之元寶曰見一白物横在山頂不辨其狀左右貴臣啓曰何故臣等不見𤣥宗曰我聞至富可敵貴朕天下之貴元寶天下之富故見耳出獨異志高力士高力士既譴于巫山州谷多薺而人不食力士感之因為詩寄意兩京五斤賣五溪無人採夷夏雖有殊氣味終不改其後㑹赦歸至武溪道遇開元中羽林軍士坐事謫嶺南停車訪舊方知上皇已厭世力士北望號泣嘔血而死出明皇雜録王維天寶末羣賊䧟兩京大掠文武朝臣及黄門宫嬪樂工騎士每獲數百人以兵仗嚴衛送于雒陽至有逃于山谷者而卒能羅捕追脅授以冠帶禄山尤致意樂工求訪頗切于旬日獲梨園弟子數百人羣賊因相與大㑹于凝碧池宴偽官數十人大陳御庫珍寶羅列于前後樂既作梨園舊人不覺欷歔相對泣下羣逆皆露刄持滿以脅之而悲不能已有樂工雷海清者投樂器于地西向慟哭逆黨乃縛海清於戯馬殿支解以示衆聞之者莫不傷痛王維為賊拘於菩提佛寺中聞之賦詩曰萬戸傷心生野烟百官何日更朝天秋槐葉落空宫􅂻凝碧池頭奏管絃出明皇雜録史思明安禄山敗史思明繼逆至東都遇櫻桃熟其子在河北欲寄遺之因作詩同去詩云櫻桃一籠子半已赤半已黄一半與懷王一半與周至詩成左右贊美之皆曰明公此詩大佳若能言一半周至一半懷王即與黄字聲韻稍稳思明大怒曰我兒豈可居周至之下思明長驅至永寧縣為其子朝義所殺思明曰爾殺我太早禄山尚得至東都而爾何亟也思明子偽封懷王周至即其傅也出芝田錄豆􅂖至德初安史之亂河東大饑􅂽地十五里生豆􅂖一夕掃而復生約得五六千石其實甚圓細美人皆頼此活焉出傳載潤州樓潤州城南隅有樓名萬歳樓俗傳樓上烟出刺史即死不死即貶開元已前以潤州為店闕董琬為江東採訪使甞居此州其時晝日烟出刺史皆憂懼狼狽愁情至死乾元中忽然又晝日烟出圓可一尺餘直上數丈有吏密伺之就視其烟乃出於樓角隙中更近而視之乃蚊子也樓下有井井中無水黑而且深小虫蠛蠓蛛蝄之𩔖色黑而小每晩晴出自于隙中作團而上遥看𩔖烟以手􅄃之即蚊蚋耳從此知非刺史亦無慮矣出辨疑志邱為邱為致仕還鄉特給禄俸之半既丁母䘮州郡疑所給請于觀察使韓滉滉以為授官致仕本不理務特令給禄以恩養老臣不可以在䘮為義命仍舊給之唯春秋二時羊酒之直則不給雖程式無文見稱折衷出談賔録裴佶朱泚既亂裴佶與衣冠數人佯為奴求出城佶貎寢自出稱甘草門兵曰此數子必非人奴如甘草不疑也出國史𥙷李抱貞李抱貞鎮潞州軍資匱缺計無所為有老僧大為郡人信服抱貞因請之曰假和尚之道以濟軍中可乎僧曰無不可抱貞曰但言擇日鞠塲焚身謀當于使宅鑿一地道通連俟火作既潛以僧出僧喜從之遂陳狀聲言抱貞命于鞠塲積薪貯油因為七日道塲晝夜香燈梵唄雜作抱貞亦引僧入地道使之不疑僧乃升壇執爐對衆説法抱貞率監軍僚屬及將吏膜拜其下以俸入擅施堆於其旁由是士女駢填捨財億計滿七日遂送柴積灌油發㷔擊鐘念佛抱貞密已遣人填塞地道俄頃之際僧薪並灰數日籍所得貨財輦入軍資庫别求所謂舍利者數十粒造墖貯焉出尚書故實楊志堅顔真卿為撫州刺史邑人有楊志堅者嗜學而居貧鄉人未之知也其妻以資給不充索書求離志堅以詩送之曰當年立志早從師今日翻成􅁂有絲落托自知求事晩蹉跎甘道出身遲金釵任意撩新髪鸞鏡從他别畫眉此去便同行路客相逢即是下山時其妻持詩詣州公牒以求别適真卿判其牘曰楊志堅早親儒教頗負詩名心雖慕夫高科身未霑于寸禄愚妻覩其未遇曾不少留靡追冀缺之妻贊成好事專學買臣之婦厭棄良人汚辱鄉閭傷敗風教若無懲誡孰遏浮囂妻可笞二十任自改嫁楊志堅秀才餉粟帛仍署随軍四逺聞之無不悦服自是江表婦人無敢棄其夫者出雲溪友議太平廣記卷四百九十五
