body:
  text: 太平廣記卷四百五十七宋李昉等編蛇二䝉山秦瞻廣州人袁𤣥瑛薛重顧楷樹提家隋煬帝興福寺張騎士李崇貞馬嶺山至相寺賢者李林甫韋子春宣州江李齊物嚴挺之天寶樵人無畏師張鎬畢乾泰杜暐海州獵人䝉山魯國費縣䝉山上有寺廢乆民欲架堂者輙大蛇數十丈長出來驚人故莫得安焉出異苑秦瞻秦瞻居曲河彭星野忽有物如蛇突入其腦中蛇來先聞臭氣便從鼻入盤其頭中覺泓泓冷聞其腦間食聲咂咂數日出去㝷復來取手巾􅇥縳口鼻故不得入積年無他唯患頭重出廣古今五行記廣州人廣州云人共在山中伐木忽見石窠中有三卵大如升便取煮之湯始熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來於湯中銜卵去三人無㡬皆死出續搜神記袁𤣥瑛吳興太平袁𤣥瑛當之官徃日者問吉凶曰法至官當有赤蛇為妖不可殺至果有赤蛇在銅虎符石函上蟠𤣥瑛命殺之其後果為賊徐馥所害也出廣古今五行記薛重㑹稽郡吏鄖縣薛重得假還家夜至家户閉聞婦狀上有丈夫眠聲喚婦乆從牀上出未開户持刀便逆問婦曰牀上醉人是誰婦大驚愕因且苦自申明實無人重家唯有一戸既入便閉婦索了無所見見一蛇隠在牀脚酒醉臭重研蛇寸㫁擲於後溝經日而婦死數日重又死後忽然而生說始死有人桎梏之將到一處有官寮問曰何以殺人重曰實不行凶曰爾云不殺者近寸㫁擲著後溝此是何物重曰正殺蛇耳府君愕然有悟曰我當用為神而敢媱人婦又訟人敕左右持來吏將一人著平巾幘具詰其媱妄之罪命付獄重為官司使遣將出重倐忽而還出廣古今五行記顧楷陳時吴興顧楷在田上樹取桑葉見五色大蛇入一小穴其後蛇相次或三尺五尺次第相隨畧有數百楷􅇥下樹看所入之處了不見有孔日暮還家楷病口啞不復得語出廣古今五行記樹提家隋絳州夏縣樹提家新造宅欲移入忽有蛇無數從室中流出門外其稠如箔上蠶盖地皆遍時有行客云觧符鎮取桃枝四枚書符繞宅四面釘之蛇漸退符亦移就之蛇入堂中心有一孔大如盆口蛇入並盡令煎湯一百斛灌之經宿以鍬掘之深數尺得古銅錢二十萬貫因陳破鑄新錢遂巨富蛇乃是古銅之精出朝野僉載隋煬帝搜神記蛇千年則斷復續淮南子云神蛇自斷其身而自相續隋煬帝遣人於嶺南邉海窮山求此蛇數四而至洛下所得之者長可三尺而色黄黒其頭錦文全似金色不能毒人觧食肉若欲令自斷其身者則先觸之令怒使不任其憤毒則自斷為三四其斷之處如刀截焉見其皮骨文理亦有血焉良乆怒定則三四斷稍稍自相就而連續體復如故亦似不相斷隋著作郎鄧隆云此靈蛇一𩔖自斷不必千嵗也出窮神祕苑興福寺長安興福寺有十光佛院其院宇極壯麗云是隋所制貞觀中寺僧以其年紀綿逺慮有摧圮即經費計工且欲新其土木反將毁撤既啓户見有蛇萬數連貫在地蛇蟠遶如積揺首呿喙若吞噬之狀寺僧大懼以為天憫重勞故假靈變於是不敢除毁出宣室志張騎士張騎士者自云㓜時随英公李勣渡海遇風十餘日不知行㡬萬里風靜不波忽見二物黒色頭狀𩔖蛇大如巨船其長望而不極須臾至船所皆以頭遶船横推其疾如風舟人惶懼不知所抗已分為所啖食唯念佛求速死耳乆之到一山破船如積各自念云彼人皆為此物所食須臾風勢甚􅇥顧視船後復有三蛇追逐亦至意如爭食之狀一蛇放船迴與三蛇鬬於沙上各相蜿蟺於孤島焉舟人因是乗風舉帆遂得免難後數日復至一山遙見烟火謂是人境落帆登陵與二人同行門户甚大遂前欵關有人長數丈通身生白毛出見二人食之一人遽走至船所纔上船未及開白毛之士走來牽䌫船人人各執弓刀斫射之累揮數刀然後見釋離岸一里許岸上已有數十頭㦸手大呼因又随風飄帆五六日遙見海島泊舟問人云是清逺縣界属南海出廣異記李崇貞高宗光宅中李崇貞仕益州長史㕔前柑子樹有一子如雞子晚熟微有小孔如針羣官咸異之方欲將進乆而乃罷因剖之得一赤斑蛇長尺餘崇貞後竟以罪死出廣古今五行記又連州見一柑樹四月中有子如拳大剖之有兩頭蛇出廣古今五行記馬嶺山開元四年六月郴州馬嶺山側有白蛇長六七尺黒蛇長丈餘須臾二蛇鬬白者吞黒蛇到麄處口兩嗌皆裂血流滂沛黒蛇頭入囓白蛇肋上作孔頭出二尺餘俄而兩蛇並死後十餘日大雨山水暴漲漂歿五百餘家失三百餘人出朝野僉載至相寺賢者長安至相寺有賢者自十餘嵗便在西禪院修道院中佛堂座下恒有一蛇賢者初修道時蛇大一圍及後四十餘年蛇如堂柱大蛇雖相見而不能相惡開元中賢者夜中至佛堂禮拜堂中無燈而光粲滿堂心甚怪之因於蛇出之處得徑寸珠至市高舉價冀其識者數日有胡人交市定還百萬賢者曰此夜光珠當無價何以如此酬直胡云蚌珠則貴此乃蛇珠多至千貫賢者歎伏遂賣焉出廣異記李林甫李林甫宅即李靖宅有泓師者以道術聞於睿宗時常與過其宅謂人曰後之人有能居此者貴不可言其後乆無居人開元初林甫官為奉御遂徙而居焉人有告於泓師曰異乎哉吾言果如是十有九年居相位稱豪貴於天下者一人也雖然吾懼其易製中門則禍且及矣林甫果相𤣥宗恃權貴為人觖望者乆之及末年有人獻良馬甚髙而其門稍庳不可乗以過遂易門製既毁其簷忽有蛇千萬數在屋瓦中林甫惡之即罷而不能毁焉未㡬林甫竟籍没其始相至籍没果十九年矣出宣室志韋子春臨淮郡有館亭濱泗水上亭有大木周數十拱突然勁㧞隂合百歩徃徃有甚風迅雷夕發其中人望見亭有二光對而上下赫然若電風雷既息其光亦閉開元中有韋子春以勇力聞㑹子春客於臨淮有人語其事者子春曰吾能伺之於是挈衣槖止於亭中以伺焉後一夕遂有大風雷震於地亭屋搖撼果見二光照燿亭宇子春乃歛衣而下忽覺有物蟠遶其身冷如水凍束不可觧廻視見二光在其身後子春即奮身揮臂騞然有聲其縳亦觧遂歸亭中未㡬而風雨霽開亭中腥若鮑肆明日視之見一巨蛇中斷而斃血遍其地里人相與來觀謂子春且死矣及見之大驚自是其亭無風雷患出宣室志宣州江宣州鵲頭鎮天寶七載江水盛漲漫三十里吴俗善泅皆入水接柴木江中流有一材下長十餘丈泅者徃觀之乃大蛇也其色黄為水所浮中江而下泅者懼而返蛇遂開口銜之泅者正横蛇口舉其頭去水數尺泅者猶大呼請救觀者莫敢救焉出紀聞李齊物河南尹李齊物天寶中左遷竟陵太守郡城南樓有白烟刺史不改即死土人以為常占齊物􅀍黜意甚恨恨樓中忽出白烟乃發怒云吾不畏死神如余何使人尋烟出處云白烟悉白蟲恐是大蛇齊物令掘之其孔漸大中有大蛇身如巨甕命以鑊煎油數十斛沸則灼之蛇初雷吼城堞震動經日方死乃使人下塹塞之齊物亦更無他出廣異記嚴挺之嚴挺之為魏州刺史初到官臨􅆹事有小蛇從門入至案所以頭枕案挺之初不逹遽持牙笏壓其頭下地正立凝想頃之蛇化成一符挺之意是術士所為尋索無獲而止出廣異記天寶樵人天寶中有樵人入山醉卧為蛇所吞其人微醒怪身動搖開視不得方知為物所吞因以樵刀畫腹得出之眩然迷悶乆之方悟其人自爾半身皮脱如白風狀出廣異記無畏師天寶中無畏師在洛是時有巨蛇狀甚異髙丈餘廣二三尺蜿蜒若盤遶出於山下洛民咸見之於是無畏曰後此蛇决水瀦洛城即説佛書義甚精蛇至夕則駕風雷來若傾聽狀無畏乃責之曰爾蛇也營居深山中固安其所何為將欲肆毒於世􅁘速去無患生人其蛇聞之遂俯于地若有慚色須臾而死焉其後禄山據洛陽盡毁宫廟果無畏所謂決洛水瀦城之應出宣室志張鎬洪州城自馬援置立後不復修革相傳云修者必死永泰中都督張鎬修之不疑必城西北陬遇一大坎坎中見二蛇一白一黒頭𩔖牛形如巨甕長六十餘尺蜿蟺在坑中其餘小蛇不可勝數遽以白鎬鎬命逐之出乃以竹􅑪縳其頭牽之蛇初不開目随牽而出小蛇甚多軍人或有傷其小者十餘頭然猶大如飲椀二蛇相随入徐孺亭下放生池中池水深數丈其龜皆走出上岸為人所獲魚亦鼓鰓出水須臾皆死後七日鎬薨判官鄭從南昌令馬皎二子相繼而卒闕畢乾泰唐左𥙷闕畢乾泰瀛州任邱人父母年五十自營生藏訖至父年八十五又自造棺稍髙大嫌藏小更加磚二萬口開藏欲修之有蛇無數時正月尚寒蟄未能動取蛇投一空井中仍受蛇不盡其蛇金色泰自與奴開之尋病而卒月餘父母俱亡此開之不得其所也出朝野僉載杜暐殿中侍御史杜暐嘗使嶺外至康州驛騎思上白曰請避毒物於是見大蛇截道南出長數丈元武後追之道南有大松樹蛇昇髙枝盤繞垂頭下視元武元武自樹下仰其鼻鼻中出兩道碧烟直衝蛇頭蛇遂裂而死墜於樹下又見蜈蚣大如耕牛肅曽以其事問康州司馬狄公狄公曰昔天寳四載廣西因海潮漂一蜈蚣死剖其一爪則得肉百二十斤至廣州市有人籠盛兩頭蛇集人衆中言汝識二首蛇乎汝見二首蛇則其首並出吾今異於是首蛇各一頭欲見之乎市人請見之乃出其蛇蛇長二尺頭在首尾市人伶者常以弄蛇為業每執諸蛇不避毒害見两頭蛇則以手執之蛇螫其手伶者言痛棄蛇於地加藥焉不愈其囓處腫遂浸滛俄而遍身伶者死身遂洪大其􅇧肉皆化為水身如貯水囊有頃水潰遂化盡人與兩頭蛇失所在出紀聞海州獵人海州人以射獵為事曽於東海山中射鹿忽見一蛇黒色大如連山長近十丈兩目成日自海而上人見蛇驚懼知不免死因仗念佛蛇至人所以口銜人及其弓矢渡海而去遙至一山置人於髙巖之上俄而復有一蛇自南來至山所狀𩔖先蛇而大倍之兩蛇相與鬬於山下初以身相蜿蟺久之口相噬射士知其求己助乃傅藥矢欲射之大蛇先患一目人乃復射其目數矢累中久之大蛇遂死倒地上小蛇首尾俱碎乃銜大真珠瑟瑟等數斗送人歸至本所也出廣異記太平廣記卷四百五十七
