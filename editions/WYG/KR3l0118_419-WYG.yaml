body:
  text: 太平廣記卷四百十九龍二柳毅柳毅唐儀鳳中有儒生栁毅者應舉下第將還湘濵念鄉人有客於涇陽者遂往告别至六七里鳥起馬驚疾逸道左又六七里乃止見有婦人牧羊於道畔毅怪視之乃殊色也然而蛾臉不舒巾袖無光凝聽翔立若有所伺毅詰之曰子何苦而自辱如是婦始楚而謝終泣而對曰賤妾不幸今日見辱於長者然而恨貫肌骨亦何能媿避幸一聞焉妾洞庭龍君小女也父母配嫁涇川次子而夫壻樂逸為婢僕所惑日以厭薄既而將訴於舅姑舅姑愛其子不能禦迨訴頻切又得罪舅姑舅姑毁黜以至此言訖􅒣欷流涕悲不自勝又曰洞庭於茲相逺不知其㡬多也長天茫茫信耗莫通心目斷盡無所知哀聞君將還吳密邇洞庭或以尺書寄託侍者未卜將以為可乎毅曰吾義夫也聞子之説氣血俱動恨無毛羽不能奮飛是何可否之謂乎然而洞庭深水也吾行塵間寜可致意􅁘唯恐道途顯晦不相通逹致負誠託又乖懇願子有何術可導我􅁘女悲泣且謝曰負載珍重不復言矣脫獲回耗雖死必謝君不許何敢言既許而問則洞庭之與京邑不足為異也毅請聞之女曰洞庭之隂有大橘樹焉鄉人謂之社橘君當解去鎡𢃄束以他物然後叩樹三發當有應者因而隨之無有碍矣幸君子書叙之外悉以心誠之話倚託千萬無渝毅曰敬聞命矣女遂于襦間􅄙書再拜以進東望愁泣若不自勝毅深為之戚乃置書囊中因復問曰吾不知子之牧羊何所用哉神祇豈宰殺乎女曰非羊也雨工也何為雨工曰雷霆之𩔖也毅顧視之則皆矯顧怒歩飲齕甚異而大小毛角則無别羊焉毅又曰吾為使者他日歸洞庭幸勿相避女曰寜止不避當如親戚耳語竟引别東去不數十歩囬望女與羊俱亡所見矣其夕至邑而别其友月餘到鄉還家乃訪於洞庭洞庭之隂果有橘社遂易𢃄向樹三擊而止俄有武夫出於波間再拜請曰貴客將自何所至也毅不告其實曰走謁大王耳武夫掲水指路引毅以進謂毅曰當閉目數息可逹矣毅如其言遂至其宫始見䑓閣相向門户千萬竒草珍木無所不有夫乃止毅停於大室之隅曰客當居此以伺焉毅曰此何所也夫曰此靈虚殿也諦視之則人間珍寶畢盡於此柱以白璧砌以青玉牀以珊瑚簾以水精雕琉璃於翠楣飾琥珀於虹棟竒秀深杳不可殫言然而王乆不至毅謂夫曰洞庭君安在哉曰吾君方幸𤣥珠閣與太陽道士講火經少𨕖當畢毅曰何謂人經夫曰吾君龍也龍以水為神舉一滴可包陵谷道士乃人也人以火為神聖發一燈可燎阿房然而靈用不同𤣥化各異太陽道士精於人理吾君邀以聽言語畢而宫門闢景從雲合而見一人披紫衣執青玉夫躍曰此吾君也乃至前以告之君望毅而問曰豈非人間之人乎毅對曰然毅趨而拜君亦拜命坐於靈虗之下謂毅曰水府幽深寡人暗昧夫子不逺千里將有為乎毅曰毅大王之鄉人也長於楚遊學於秦昨下第間驅涇水右涘見大王愛女牧羊於野風鬟雨􅁂所不忍視毅因詰之謂毅曰為夫壻所薄舅姑不念以至於此悲泗淋漓誠怛人心遂託書於毅毅許之今以至此因取書進之洞庭君覽畢以袖掩面而泣曰老父之罪不診堅聽坐貽聾瞽使閨牕孺弱逺罹搆害公乃陌上人也而能急之幸被齒髪何敢負徳詞畢又哀咤良乆左右皆流涕時有宦人密視君者君以書授之令逹宫中須㬰宫中皆慟哭君驚謂左右曰疾告宫中無使有聲恐錢塘所知毅曰錢塘何人也曰寡人之愛弟昔為錢塘長今則致政矣毅曰何故不使知曰以其勇過人耳昔堯遭洪水九年者乃此子一怒也近與天將失意塞其五山上帝以寡人有薄徳於古今遂寛其同氣之罪然猶縻繫於此故錢塘之人日日候焉語未畢而大聲忽發天拆地裂宫殿擺簸雲烟沸湧俄有赤龍長千餘尺電目血舌朱鱗火鬛項掣金鎖鎖牽玉柱千雷萬霆激繞其身霰雪雨雹一時皆下乃擘青天而飛去毅恐蹶仆地君親起持之曰無懼固無害毅良乆稍安乃獲自定因告辭曰願得生歸以避復來君曰必不如此其去則然其來則不然幸為少盡繾綣因命酌互舉以欵人事俄而祥風慶雲融融怡怡幢節玲瓏簫韶以隨紅籹千萬笑語熈熈後有一人自然蛾眉眀璫滿身綃縠參差廹而視之乃前寄辭者然若喜若悲零淚如絲須㬰紅烟蔽其左紫氣舒其右香氣環旋入於宫中君笑謂毅曰涇水之囚人至矣君乃辭歸宫中須㬰又聞怨苦乆而不已有頃君復出與毅飲食又有一人披紫裳執青玉貌聳神溢立於君左右謂毅曰此錢塘也毅起趨拜之錢塘亦盡禮相接謂毅曰女姪不幸為頑童所辱頼明君子信義昭彰致逹逺寃不然者是為涇陵之土矣饗徳懐恩詞不悉心毅撝退辭謝俯仰唯唯然後回告兄曰向者辰發靈虚已至涇陽午戰於彼未還於此中間馳至九天以告上帝帝知其寃而宥其失前所譴責因而獲免然而剛腸激發不遑辭候驚擾宫中復忤賔客愧惕慚懼不知所失因退而再拜君曰所殺㡬何曰六十萬傷稼乎曰八百里無情郎安在曰食之矣君憮然曰頑童之為是心也誠不可忍然汝亦太草草頼上帝顯聖諒其至寃不然者吾何辭焉從此已去勿復如是錢塘復再拜是夕遂宿毅於凝光殿明日又宴毅於凝碧宫㑹友戚張廣樂具以醪醴羅以甘潔初笳角鼙鼓旌旗劍㦸舞萬夫於其右中有一夫前曰此錢塘破陣樂旌􅀈傑氣顧驟悍慄坐客視之毛髪皆竪復有金石絲竹羅綺珠翠舞千女於其左中有一女前進曰此貴主還宫樂清音宛轉如訴如慕坐客聽之不覺淚下二舞既畢龍君大悦錫以紈綺頒於舞人然後密席貫坐縱酒極娱酒酣洞庭君乃擊席而歌曰大天蒼蒼兮大地茫茫人各有志兮何可思量狐神鼠聖兮薄社依墻雷霆一發兮其孰敢當荷真人兮信義長令骨肉兮還故鄉齊言慚愧兮何時忘洞庭君歌罷錢塘君再拜而歌曰上天配合兮生死有途此不當婦兮彼不當夫腹心辛苦兮涇水之隅風霜滿鬂兮雨雪羅襦頼明公兮引素書令骨肉兮家如初永言珍重兮無時無錢塘君歌闋洞庭君俱起奉觴於毅毅踧踖而受爵飲訖復以二觴奉二君乃歌曰碧雲悠悠兮涇水東流傷美人兮雨泣花愁尺書逺逹兮以􅄙君憂哀寃果雪兮還處其休荷和雅兮感甘羞山家寂寞兮難乆留欲將辭去兮悲綢繆歌罷皆呼萬歳洞庭君因出碧玉箱貯以開水犀錢塘君復出紅珀盤貯以照夜璣皆起進毅毅辭謝而受然後宫中之人咸以綃綵珠璧投於毅側重疊煥赫須臾埋没前後毅笑語四顧愧揖不暇洎酒闌歡極毅辭起復宿於凝光殿翌日又宴毅於清光閣錢塘因酒作色踞謂毅曰不聞猛石可裂不可捲義士可殺不可羞􅁘愚有衷曲欲一陳於公如可則俱在雲霄如不可則皆夷糞壤足下以為何如哉毅曰請聞之錢塘曰涇陽之妻則洞庭君之愛女也淑性茂質為九姻所重不幸見辱於匪人今則絶矣將欲求託髙義世為親戚使受恩者知其所歸懐愛者知其所付豈不為君子始終之道者毅肅然而作歘然而笑曰誠不知錢塘君孱困如是毅始聞跨九州懐五岳洩其憤怒復見斷鎖金掣玉柱赴其急難毅以為剛决眀直無如君者盖犯之者不避其死感之者不愛其生此真丈夫之志奈何簫管方洽親賔正和不顧其道以威加人豈僕之素望哉若遇公於洪波之中𤣥山之間鼓以鱗鬚􅀍以雲雨將廹毅以死毅則以禽獸視之亦何恨哉今體被衣冠坐談禮義盡五常之志性負百行之㣲㫖雖人世賢傑有不如者况江河靈𩔖乎而欲以蠢然之軀悍然之性乗酒假氣將廹於人豈近直哉且毅之質不足以藏王一甲之間然而敢以不伏之心勝王不道之氣惟王籌之錢塘乃逡廵致謝曰寡人生長宫房不聞正論向者詞渉狂妄突髙明退自循顧戾不容責幸君子不為此乖間可也其夕復歡宴其樂如舊毅與錢塘遂為知心友明日毅辭歸洞庭君夫人别宴毅於潛景殿男女僕妾等悉出預㑹夫人泣謂毅曰骨肉受君子深恩恨不得展媿戴遂至暌别使前涇陽女當席拜毅以致謝夫人又曰此别豈有復相遇之日乎毅其始雖不諾錢塘之請然當此席殊有歎恨之色宴罷辭别滿宫悽然贈遺珍寶怪不可述毅於是復尋途出江岸見從者十餘人擔囊以隨至其家而辭去毅因適廣陵寶肆鬻其所得百未發一財已盈兆故淮右富族咸以為莫如遂娶於張氏亡又娶韓氏數月韓氏又亡徙家金陵常以鰥曠多感或謀新匹有媒氏告之曰有盧氏女范陽人也父名曰浩嘗為清流宰晚歳好道獨遊雲泉今則不知所在矣母曰鄭氏前年適清河張氏不幸而張夫早亡母憐其少惜其慧美欲擇徳以配焉不識何如毅乃卜日就禮既而男女二姓俱為豪族法用禮物盡其豐盛金陵之士莫不健仰居月餘毅因晚入户視其妻深覺𩔖於龍女而逸艶豐厚則又過之因與話昔事妻謂毅曰人世豈有如是之理乎然君與余有一子毅益重之既産踰月乃穠飾換服召親戚相㑹之間笑謂毅曰君不憶余之於昔也毅曰夙為洞庭君女傳書至今為憶妻曰余即洞庭君之女也涇川之寃君使得白銜君之恩誓心求報洎錢塘季父論親不從遂至暌違天各一方不能相問父母欲配嫁於濯錦小兒某惟以心誓難移親命難背既為君子棄絶分無見期而當初之寃雖得以告諸父母而誓報不得其志復欲馳白於君子值君子累娶當娶於張已而又娶於韓迨張韓繼卒君卜居於兹故余之父母乃喜余得遂報君之意今日獲奉君子咸善終世死無恨矣因嗚咽泣涕交下對毅曰始不言者知君無重色之心今乃言者知君有感余之意婦人匪薄不足以確厚永心故因君愛子以託相生未知君意如何愁懼兼心不能自解君附書之日笑謂妾曰他日歸洞庭慎無相避誠不知當此之際君豈有意於今日之事乎其後季父請於君君固不許君乃誠將不可􅁘抑忿然􅁘君其話之毅曰似有命者僕始見君於長涇之隅枉抑憔悴誠有不平之志然自約其心者逹君之寃餘無及也以言慎勿相避者偶然耳豈思哉洎錢塘逼廹之際唯理有不可直乃激人之怒耳夫始以義行為之志寜有殺其壻而納其妻者􅁘一不可也善素以操貞為志尚寜有屈於已而伏於心者乎二不可也且以率肆胷臆酧酢紛綸唯直是圖不遑避害然而將别之日見君有依然之容心甚恨之終以人事扼束無由報謝吁今日君盧氏也又家於人間則吾始心未為惑矣從此以往永奉懽好心無纎慮也妻因深感嬌泣良乆不已有頃謂毅曰勿以他𩔖遂為無心固當知報耳夫龍夀萬歳今與君同之水陸無往不適君不以為妄也毅嘉之曰吾不知國客乃復為神仙之餌乃相與覲洞庭既至而賔主盛禮不可具紀後居南海僅四十年其邸第輿馬珍鮮服玩雖侯伯之室無以加也毅之族咸遂濡澤以其春秋積序容狀不衰南海之人靡不驚異洎開元中上方屬意於神仙之事精索道術毅不得安遂相與歸洞庭凡十餘歳莫知其跡至開元末毅之表弟薛嘏為京畿令謫官東南經洞庭晴晝長望俄見碧山出於逺波舟人皆側立曰此本無山恐水怪耳指顧之際山與舟相逼乃有彩船自山馳來迎問於嘏其中有一人呼之曰栁公來候耳嘏省然記之乃促至山下攝衣疾上山有宫闕如人世見毅立於宫室之中前列絲竹後羅珠翠物玩之盛殊倍人間毅詞理益𤣥容顔益少初迎嘏於砌持嘏手曰别來瞬息而毛髪已黄嘏笑曰兄為神仙弟為枯骨命也毅因出藥五十丸遺嘏曰此藥一丸可増一歳耳歳滿復来無乆居人世以自苦也歡宴畢嘏乃辭行自是以後遂絶影響嘏常以是事告於人世殆四紀嘏亦不知所在隴西李朝威叙而嘆曰五蟲之長必以靈者别斯見矣人裸也移信鱗蟲洞庭含納大直錢塘迅疾磊落宜有承焉嘏詠而不載獨可鄰其境愚義之為斯文出異聞集太平廣記卷四百十九
