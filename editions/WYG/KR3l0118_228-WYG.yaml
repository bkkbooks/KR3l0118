body:
  text: 太平廣記卷二百二十八博戲奕棊羊𤣥保王積薪一行韋延祐日本王子彈棊漢成帝魏文帝藏鈎桓𤣥高映石旻雜戲奕棊羊𤣥保宋文帝善奕棊常與太平羊𤣥保棊𤣥保戲賭得宣城太守當敕除以爲虛受出談藪王積薪𤣥宗南狩百司奔赴行在翰林善棊者王積薪從焉蜀道隘狹每行旅止息道中之郵亭人舍多爲尊官有力之所先積薪棲無所入因沿溪深逺寓宿於山中孤姥之家但有婦姑皆闔户止給水火纔暝婦姑皆闔户而休積薪棲于簷下夜䦨不寢忽聞堂内姑謂婦曰良宵無以適興與子圍棊一賭可乎婦曰諾積薪私心竒之堂内素無燈燭又婦姑各在東西室積薪乃附耳門扉俄聞婦曰起東五南九置子矣姑應曰東五南十二置子矣婦又曰起西八南十置子矣姑又應曰西九南十置子矣每置一子皆良乆思唯夜將盡四更積薪一一密記其下止三十六忽聞姑曰子已敗矣吾止勝九枰耳婦亦甘焉積薪遲明具衣冠請問孤姥曰爾可率已之意而按局置子焉積薪即出囊中局盡平生之祕妙而布子未及十數孤姥顧謂婦曰是子可敎以常勢耳婦乃指示攻守殺奪救應防拒之法其意甚略積薪即更求其說孤姥笑曰止此亦無敵於人間矣積薪䖍謝而别行十數步再詣則失向來之室閭矣自是積薪之藝絕無其倫即布所記婦姑對敵之勢罄竭心力較其九枰之勝終不得也因名鄧艾開蜀勢至今棊圖有焉而世人終莫得而解矣出集異記一行一行本不解奕棊因㑹燕公宅觀王積薪棊一局遂與之敵笑謂燕公曰此但爭先耳若念貧道四句乘除語則人人爲國手晉羅什與人棊拾敵死子空處如龍鳳形或言王積薪對𤣥宗棊局畢悉持出出酉陽雜俎韋延祐韋延祐圍棊與李士秀敵手士秀惜其名不肯先寧輸延祐籌終饒兩路延祐本應明經舉道過大梁其䕶戎知其善棊表進之遂因言江淮足棊人就中奕棊明經者多解出嘉話録日本王子大中中日本國王子來朝獻寳器音樂上設百戲珍饌以禮焉王子善圍棊上敕待詔顔師言對手王子出楸玉棊局冷暖玉棊子云本國之東三萬里有集眞島島上有凝霞臺臺上有手譚池池中出玉子不由制度自然黑白分明冬温夏冷故謂之冷暖玉更産如楸玉狀𩔖楸木琢之爲棊局光潔可鑑及師言與之敵手至三十三下勝負未決師言懼辱君命而汗手凝思方敢落指即謂之鎭神頭乃是解兩征勢也王子瞪目縮臂已伏不勝㢠廻話鴻臚曰待詔第幾手􅁘鴻臚詭對曰第三手也師言實稱國手王子曰願見第一曰王子勝第三方得見第二勝第二方得見第一今欲躁見第一其可得乎王子掩局而吁曰小國之第一不如大國之第三信矣今好事者尚有顔師言三十三下鎭神頭圖出杜陽編彈棊漢成帝漢成帝好蹙鞠羣臣以蹙鞠勞體非尊者所宜帝曰朕好之可擇似而不勞者奏之劉向奏彈棊以獻上悅賜之青羔裘紫絲履服以朝覲出小說魏文帝彈棊魏宫内用裝棊戲也文帝爲之特妙用手巾角拂之無不中者有客自云能帝使爲之客著葛巾角低頭拂棊妙殆踰於帝出世說又文帝嘗云予於他戲弄之事少所喜唯彈棊略盡其妙少時嘗爲之賦昔京師妙工有二焉合卿侯東方世安張公子常恨不得與之對也今彈棊用棊二十四色色别貴賤又魏戲法先立一棊於局中餘者間白黑圓繞之十八籌成都出世說藏鈎舊言藏鈎起於鉤弋葢依辛氏三秦記云漢武鉤弋夫人手拳時人傚之目爲藏鈎也殷敬順敬訓曰彄與摳同衆人分曹手藏物探取之又令藏鈎剩一人則來往於兩朋謂之誐鴟風土記曰藏鈎之戲分二曹以較勝負若人偶則敵對若竒則使一人爲游附或屬上曹或屬下曹爲飛鳥又今爲此戲必於正月據風土記在臘祭後也庾闡藏鈎賦云予以臘後命中外以行鈎爲戲矣出酉陽雜俎桓𤣥殷仲堪與桓𤣥共藏鈎一朋百籌桓朋欲不勝唯餘虎探在顧愷之爲殷仲堪叅軍屬病疾在􅅟桓遣信請顧起病令射取虎探即來坐定語顧云君可取鈎顧答云賞百匹布顧即取得鈎桓朋遂勝出渚宫故事高映舊說藏彄令人生離或言占語有徴也舉人高映善意彄段成式常於荆州藏鈎每曹五十餘人十中其九同曹鈎亦知其處當時疑有他術訪之映言但意舉止辭色若察囚視盜也出酉陽雜俎石旻山人石旻尤妙打彄與張又新兄弟善暇夜㑹客因試其意彄注之必中張遂寘鈎於巾襞中旻良乆笑曰盡張空拳有頃眼鈎在張君幞頭左翅中其妙如此旻後居揚州段成式因識之曾祈其術石謂成式可先畫人首數十遣胡越異貌辯其相當授疑其見紿竟不及畫出酉陽雜俎雜戲武帝時郭舍人善投壺以竹爲矢不用􅁄也古之投壺取中而不求還故實小豆於中惡其矢躍而出也郭舍人則激矢令還一矢百餘反謂之爲驍言如博之羿棊於輩中爲驍傑也每爲武帝投壺輒賜金帛出西京雜記小戲中於耍局一枰各布五子角遲速名蹙融段成式讀座右方爲之蹙戎出酉陽雜俎貞元中董叔儒進博局并經一卷頗有新意不行於時洛陽令崔師本又好爲古文樗蒱其法三分其子三百六十限以二關人執六馬其骰五枚分上爲黒下爲白黑者刻二爲犢白者刻二爲雉擲之全黑乃爲盧其彩十六二雉三黑爲雉其彩十四二犢三白爲犢其彩十全白爲白其彩八四者貴彩也開爲十二塞爲十一塔爲五秃爲四梟爲二撅爲三二六者雜彩也貴彩得連擲得打馬得過關餘彩則否新加進六兩彩出國史補貞元中有杜勸好長行皆有佳名各記有輕妙夏中用者爲冷子取其似蕉葛之輕健而名之出嘉話録今之博戲有長行最盛其具有局有子子黑黄各十五擲采之骰有二其法生於握槊變於雙六天后嘗夢雙六不勝狄梁公言宫中無子是也後人新意長行出焉又有小雙六圍透大㸃小㸃遊談鳳翼之名然無如長行也監險易者喻時事焉適變通者方易象焉王公大人頗或耽翫至於廢慶弔忘寢食及博徒用之於是彊各爭勝謂之撩零假借分畫謂之囊家囊家什一而取謂之乞頭有通宵而戰者有破産而輸者其工者近有譚鎬崔師本首出圍棊次於長行其工者近有韋延祐楊芃首出如彈棊之戲甚古法雖設鮮有爲之其工者近有吉達高越首出焉出國史補太平廣記卷二百二十八
