body:
  text: 太平廣記卷三百九十八宋李昉等編石黄石馬肝石石鼓採石青石石文石連理太白精古鐵鏵走石石橋石磨釡瀨石魚墜石立石孤石網石卵石卧石僧化霣石目巖石駞石柱石響石女藏珠石化石松化自然石熱石犬吠石甕形石三石人石金蠶坡沙飛坡鳴沙石黄石帝堯時有五星自天而霣一是土之精墜於穀城山下其精化為圯橋老人以兵書授張子房云讀此當為帝王師後求我於穀城山下黄石是也子房佐漢功成求於穀城山下果得黄石焉子房𨼆于商山從四皓學道其家葬其衣冠于黄石焉古者常見墓上黄氣高數十丈後赤眉所發不發其尸黄石亦失其氣自絶出録異記馬肝石元鼎五年郅支國貢馬肝石百斤長以水銀養内於玉函中金泥封其上其國人長四尺唯餌馬肝石此石半青半白如金肝石碎之以和九轉丹吞之一丸彌年不饑渴以之拭髪白者皆黑帝嘗坐羣臣於甘泉殿有髪白者以此拭之應手皆黑是時公卿語曰不用作方伯唯願拭馬肝石此石酷烈不雜丹砂唯可近髪出洞𡨕記石鼓吳郡臨江半岸崩出一石鼓搥之無聲武帝以問張華華曰可取蜀中桐材刻為魚形扣之則鳴矣於是如其言果聲聞數里出録異記採石石季龍立河橋於雲昌津採石為中濟石無大小下輒隨流用工五百餘萬不成季龍遣使致祭沈璧於河俄而所沈璧流于渚上地震水波騰上津所樓殿傾壞壓死者百餘人出録異記青石唐顯慶四年漁人於江中網得一青石長四尺濶九寸其色光潤異於衆石懸而擊之鳴聲清越行者聞之莫不駐足都督滕王表送納瑞府出豫章記石文昌松瑞石文初李襲譽為涼州刺史奏昌松有瑞石自然成字凡千一十字其略曰高皇海宇字李九王八千太平天子李世王千年太子治書燕山人士國主尚任諤奬文通千古大王五王七王十王鳳手才子武文貞觀昌大聖四方上下萬古忠孝為喜勅禮部郎中柳逞馳驛檢覆并同所奏出録異記石連理永昌年中台州司馬孟詵奏臨海水下馮義得石連理樹三株皆白石出洽聞記太白精金星之精墜於中南圭峰之西因號為太白山其精化為白石狀如美玉時有紫氣覆之天寶中𤣥宗立𤣥元廟於長安大寧里臨淄舊邸欲塑𤣥元像夢神人曰太白北谷中有玉石可取而琢之紫氣見處是也翌日令使入谷求之山下人云旬日來嘗有紫氣連日不散果於其下掘獲玉石琢為𤣥元像高二尺許又為二眞人二侍童及李林南陳希烈之形髙六尺已來出録異記古鐵鏵天寶中𤣥宗以三門河道險阨漕轉艱阻乃令旁北山鑿石為月河以避湍急名曰天寶河歲省運夫五十餘萬又無覆溺淹滯之患天下稱之其河東西徑直長五里餘濶四五丈深二丈三丈至五六丈皆鑿堅石匠人於堅石之下得古鐵鏵長三尺餘上有平陸兩字皆篆文也𤣥宗異之藏於内庫遂命改河北縣為平陸縣旌其事也出開天傳信記走石寶歴元年乙巳歲資州資陽縣清弓村山有大石可三間屋大從此山下忽然吼踴下山越澗却上坡可百步其石走時有鋤禾人見之各手執鋤赶至止所其石髙二丈出朝野僉載石橋趙州石橋甚工磨瓏宻緻如削焉望之如初月出雲長虹飲澗上有勾欄皆石也勾欄並為石獅子龍朔年中髙麗諜者盜二獅子去後復募匠修之莫能相𩔖者至天后大足年黙啜破趙定州賊欲南過至石橋馬跪地不進但見一青龍卧橋上奮迅而怒賊乃遁去出朝野僉載石磨吳興故彰縣東三十里有梅溪山山根直􅆆一石可髙百餘丈至青而團如兩間屋大四面斗絶仰之于雲外無登陟之理其上復有盤石正員如車葢恒轉如磨聲若風雨土人號為石磨轉駃則年豐遲則歲儉欲知歲之豐儉以石磨候之無差焉出續齊諧記釡瀬夷道縣有釡瀬其石大者如釡小者如斗形色亂眞唯石中耳出酉陽雜俎石魚衡陽相鄉縣有石魚山山石黑色理若生雌黄開發一重輒有魚形鱗鰭首尾有若畫焉長數寸燒之作魚腥出酉陽雜俎墜石伊闕縣令李師晦有兄弟任江南官與一僧往還嘗入山採藥暴風雨避於榿樹須臾大震有物瞥然墜地倐而晴朗僧就視乃一石形如藥器可以懸擊其上平齊如削中有竅其下漸濶而員狀若垂嚢長二尺厚三分左小􅆙色理如碎錦光澤可鑒叩之有聲僧意其異物置於樵中歸櫃而埋於禪牀下為其徒所見往往有知者李生墾求一見僧確然無言忽一日僧召李生既至執手曰貧道已力衰弱無常將至君前所求物􅂓用為别乃盡去侍者引李生入卧内撤榻掘地捧匣授之而卒出酉陽雜俎立石萊子國海上有石人長一丈五尺大十圍昔始皇遣此石人追勞山不得遂立出酉陽雜俎孤石筑陽縣水中有孤石挺出其下澄潭時有見此石根如竹根色黄見者多凶俗號承受石出酉陽雜俎網石于季有為和州刺史時臨江有一寺寺前漁釣所聚有漁子下網舉之覺重壞網視之乃一石如拳因乞寺僧寘於佛殿中石遂長不已經年重四十斤張司封員外入蜀時親覩其事出酉陽雜俎卵石常侍崔元亮在洛中常閒步涉岸得一石子大如雞卵黑潤可愛玩之行一里劃然而破有鳥大如巧婦飛去出酉陽雜俎卧石荆州永豐縣東鄉里有卧石一長九尺六寸其形似人而舉體青黄𨼆起狀若雕刻境若旱使祭而舉之小雨小舉之大雨大舉之相傳此石忽見如此本長九尺今加六寸矣出酉陽雜俎僧化天台僧乾符中自台山之東臨海縣界得洞穴同志僧相將尋之初一二十里徑路低狹率多泥塗自外稍平濶漸有山山十許里見市肆居人與世無異此僧素習嚥氣不覺饑渴其同行之僧饑甚詣食市肆乞食人或謂曰若能忍饑渇速還無苦或飡啖此地之食必難出矣饑甚固求食焉食畢相與行十餘里路漸隘小得一穴而出飡物之僧立化為石矣天台僧出山逢人問其所管已在牟平海濱矣出録異記霣石唐天復十年庚午夏洪州霣石于越王山下昭仙觀前有聲如雷光彩五色濶十丈袁吉江洪四州之界皆見光聞聲觀前五色烟霧經月而散有石長七八尺圍三丈餘清碧如玉墮於地上節度使劉威命舁入昭仙觀内設齋祈謝七日之内石稍小長三尺又齋數日石長尺餘今只有七八寸留在觀出録異記目巖平樂縣有山林石巖間有目如人眼極大瞳子白黑分明名曰目巖出荆州記石駞于闐國北五日行又有山山上石駱駞溺水滴下以金銀等器承之皆漏人掌亦漏唯瓠取不漏或執之令人身臭皮毛改出洽聞記石柱刼比他國中天竺之屬國也有石柱髙七十尺紺色有光或觀其身隨其罪福悉見影中見之出洽聞記石響南嶽岣嶁峰有響石呼喚則應如人共語而不可解也南州南河縣東南三十里丹溪亦有響石高三丈五尺濶二丈狀如卧獸人呼之應笑亦應之塊然獨處亦號曰獨石也出洽聞記石女桂陽有貞女峽傳云秦世數女取螺於此遇雨一女化為石人今石人形髙七尺狀似女人出王歆始興記藏珠石江州南五十里有店名七里店在沱江之南小山下有十餘枚如流星往來或聚或散石上石有光景相傳云珠藏于此乃無價寶也或有見者密認其處尋求不得出録異記化石會稽進士李晀偶拾得小石清黑平正温滑可玩用為書鎭焉偶有蛇集其上驅之不去視之化為石求他蟲試之隨亦化焉殻落堅重與石無異出録異記松化婺州永康縣山亭中有枯松樹因斷之悞墮水中化為石取未化者試於水中隨亦化焉其所化者枝榦及皮與松無異且堅勁有未化者數段相兼留之以旌異物出録異記自然石洪州建昌縣界田中有自然石碑石人及石龜散在地中莫知其數皆如鐫琢之狀而無文字石人多倒卧者時有立者又云側近有石井深而無水有好事者持火入其中旁有横道莫知逺近道側亦皆是石人焉出録異記熱石新北市是景雲觀舊基有一巨石大如柱礎人或坐之蹋之逡巡如火燒應心煩熱因便成疾往往致死或云若聚火燒此石吼即瞿塘山吼而水沸古老相傳耳又蜀州晉原縣山亭中有二大石各徑二尺已來出地七八寸人或坐之心痛往往不救又是落星石東邊者坐即靈者西邊者與諸石無異色並帶青白也出録異記犬吠石􅄔源縣有大黄石自山墜于谿側瑩徹可愛羣犬見而競吠之數日村人不堪其喧乃相與推致水中犬又俯水而吠愈急取而碎之犬乃不吠出稽神録甕形石潘祚為鄱陽縣令後連帶古城其中隙荒數十畆祚嘗與家人望月於此見城下草中有光髙數丈其間荆棘䝉密不可夜行即取弓射其處以誌之明日掘其地得一甕大腹小口青石塞之祚命舁歸其家發其口不可開令擊碎之乃一石如甕之形若氷凍之凝結者復碎而棄之訖無所得出稽神録三石處州石人山在泥水口近有三石形甚似人居中者為君左曰夫人右曰女郎出鄧徳明南康記人石昔有夫妻二人將兒入山獵其父落崖妻子將下救之並變為三石因以為人石出周地圖記金蠶右千牛兵曹王文秉丹陽人世善刻石其祖嘗為浙西㢘使裴璩采碑於積石之下得一自然員石如毬形式如礱斵乃重叠如殻相包斵之至盡其大如拳復破之中有一蠶如蠐螬蠕蠕能動人不能識因棄之數年浙西亂王出奔至下蜀與鄉人夜會語及青蚨還錢事佐中或云人欲求富莫如得石中金蠶畜之則寶貨自至矣問其形狀則石中蠐螬也出稽神録坡沙飛坡永昌年太州敷水店南西坡白日飛四五里直塞赤水坡上桑畦麥壟依然仍舊出朝野僉載鳴沙靈州鳴沙縣有沙人馬踐之輒鎗然有聲持至他處信宿之後無復有聲出國史異纂太平廣記卷三百九十八
