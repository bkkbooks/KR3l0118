body:
  text: 太平廣記卷二百九雜編程邈已下邯鄲淳已下姜詡已下王羲之王廙潞州盧桓𤣥褚遂良蘭亭真跡王方慶二王真跡八體李都東都乞兒盧𢎞宣嶺南􅇠程邈已下秦獄吏程邈善大篆得罪始皇囚於雲陽獄増減大篆篆體去其繁複始皇善之出為御史名書曰隸書扶風曹喜後漢人不知其官善篆隸小異李斯見師一時陳留蔡邕後漢人左中郎將善篆採喜之法真定直父碑文猶𫝊於世篆者師焉杜陵陳遵後漢人不知官善篆隸每書一坐皆驚時人謂為陳驚坐上谷王次仲後漢人作八分楷法師宜官後漢不知何許人宜官為大字方一丈小字方寸千言耿球碑是宜官書甚自矜重或空至酒家先書其壁觀者雲集酒因大售至飲足削書而退安定梁鵠後漢人官至選部尚書乃師宜官法魏武重之常以書懸帳中宫殿題署多是鵠手也出王僧䖍名耆録邯鄲淳已下陳留邯鄲淳為魏臨淄侯文學得次仲名在鵠後毛𢎞鵠弟子祕書八分皆𫝊𢎞法又有左子邑與淳小異亦有名京兆杜度為魏齊相始有草名安平崔瑗後漢濟北相亦善草書平苻堅得摹崔瑗書王子敬云極似張伯英瑗子湜官至尚書亦能草𢎞農張芝髙尚不仕善草書精勁絕倫家之衣帛必先書而後練臨池學書池水盡墨每書云匆匆不暇草時人謂為草聖芝弟㫤漢黄門侍郎亦能草今世人所云芝書者多是㫤也出王僧䖍名書録姜詡已下姜詡梁宣田彦和及司徒韋誕皆伯英弟子並善草誕最優魏宫館寳器皆是誕書魏明帝起凌雲臺誤先釘榜而未之題以籠盛誕轆轤引上書之去地二十五丈誕甚危懼乃戒子孫絕此楷法子少季亦有能稱羅暉趙㳟不詳何許人與伯英同時見稱西州而矜許自與衆頗惑之伯英與朱寛書自叙云上比崔杜不足下方羅趙有餘河間張起亦善草書不及崔張劉德升善為行書不詳何許人潁川鍾繇魏太尉同郡胡昭公車徴二家俱學於德升而胡書肥鍾書瘦有三體一曰銘石之書最妙者也二曰章程書三曰狎書相聞者也繇子㑹鎮西將軍絕能學人書改易鄧艾上章事莫有知者河東魏顗魏尚書僕射善草及古文略盡其妙草體㣲痩而筆跡精熟顗子瓘為晉太保採芝法以顗法參之更為草藁藁是相聞書也瓘子恒亦善書博識古文字燉煌索靖張芝姊子孫晉征西司馬亦善草陳國何元公亦善草書呉人皇象能草世稱沉著痛快滎陽陳暢晉祕書令善八分出名書録王羲之王羲之告誓文今之所𫝊即其藁本不具年月日朔其真夲維永和十年三月癸卯九月辛亥而書亦真開元初潤州江寧縣瓦棺寺修講堂匠人於鴟吻内竹筒中得之與一沙門至八年縣丞李延業求得上岐王王以獻上留内不出或云其後却借岐王十二年王家失火圖書悉為灰燼此書亦見焚矣出國史異纂王廙王廙羲之之叔也善書畫嘗謂右軍曰吾諸事不足道唯書畫可法晉明帝師其畫王右軍學其書出尚書故實潞州盧東都頃年創造防秋館穿掘多蔡邕鴻都學所書石經後洛中人家往往有之王羲之借船帖書之尤工者也故山北盧匡寳惜有年盧公致書借之不得云只可就看未嘗借人也盧除潞州旌節在途纔數程忽有人將書帖就盧求售閲之乃借船帖也驚異問之云盧家郎君要錢遣賣耳盧歎異移時不問其價還之後不知落於何人京師書僧孫盈者名甚著盈父曰仲容亦鑒書畫精於品目豪家所寳多經其手真偽無所逃焉公借船帖是孫盈所蓄人以厚價求之不果盧公時其急切減而賑之日乆滿百千方得盧公韓太仲外孫也故書畫之尤者多閲而識焉出尚書故實桓𤣥晉書中有飲食名寒具者亦無注解處後於齊民要術并食經中檢得是今所謂􅠑餅桓𤣥嘗盛陳法書名畫請客觀之客有食寒具不濯手而執書畫因有汚𤣥不懌自是㑹客不設寒具出尚書故實褚遂良貞觀十年太宗謂魏徴曰世南沒後無人可與論書徴曰褚遂良後来書流甚有法則於是召見太宗嘗以金帛購王羲之書跡天下爭齎古書詣闕以獻時莫能辨其真偽遂良備論所出咸為證據一無舛誤十四年四月二十三日太宗為真草書屏風以示羣臣筆力遒利為一時之絕購求得人間真行凡二百九十紙裝為七十卷草書二十紙裝為八十卷每聽政之暇時閲之嘗謂朝臣曰書學小道初非急務時或留心亦勝棄日凡諸藝未嘗有學而不得者也病在心力懈怠不能專精耳今人學古人之書殊不學其形勢唯在求其骨力得其骨力形勢自生出譚賔録蘭亭真跡太宗酷學書法有大王真跡三千六百紙率以一丈二尺為一軸寳惜者獨蘭亭為最置於座側朝夕觀覽嘗一日附耳語髙宗曰吾千秋萬歳後與吾蘭亭將去也及奉諱之日用玉匣貯之藏於昭陵出尚書故實王方慶龍朔二年四月髙宗自書與遼東諸將許敬宗曰陛下書法之妙臣謂鍾王不過是矣上謂鳯閣侍郎王方慶曰卿家合有書法方慶奏曰臣十代再從伯祖羲之先有四十餘紙貞觀十二年先臣進訖有一卷臣近已進訖臣十一代祖洽九代祖詢八代祖曇首七代祖僧綽六代祖仲寳五代祖騫髙祖規曾祖褒并九代三從伯祖晉中書令獻之已下二十八人書共十卷見在上御武成殿召羣臣取而觀之仍令鳯閣舍人崔融作序自為寳章集以賜方慶朝野榮之出譚賔録二王真跡開元十六年五月内出二王真跡及張芝張昶等書總一百六十卷付集賢院令集字搨兩夲進賜諸王其書皆是貞觀中太宗令魏徴虞世南褚遂良等定其真偽八十卷小王張芝等跡各隨多少勒帙以貞觀字為印印縫及卷之首尾其草跡又令褚遂良真書小字帖紙影之其中古夲亦有是梁隋官夲者梁則滿騫徐僧權沈熾文朱异隋則江總姚察等署記太宗又令魏褚等卷下更署名以記之其蘭亭夲相𫝊云在昭陵𤣥宫中樂毅論長安中太平公主奏借出外搨寫因此遂失所在五年勅陸元悌魏哲劉懐信等檢挍換標每卷分為兩卷總見在有八十卷餘並失墜元悌又割去前代記署以己之名氏代焉𤣥宗自書開元二字為印記之右軍凡一百三十卷小王二十八卷張芝張昶各一卷右軍真行書惟有黄庭告誓等卷存焉又得滑州人家所藏右軍扇上真尚書宣示及小王行書白騎遂等二卷其書有貞觀年舊標織成字出譚賔録八體張懐瓘書斷曰篆籀八分隸書章草草書飛白行書通謂之八體而右軍皆在神品右軍嘗醉書數字㸃畫𩔖龍爪後遂有龍爪書如科斗玉筯偃波之𩔖諸家共二十五般出尚書故實李都李都荆南從事時朝官親熟自京寓書蹤甚惡李寄詩戲曰草緘千里到荆門章草縱横任意論應笑鍾張虛用力却敎羲獻枉勞魂惟堪愛惜為珍寳不敢留𫝊誤子孫深荷故人相厚處天行時氣許敎吞出抒情詩東都乞兒大歴中東都天津橋有乞兒無兩手以右足夾筆寫經乞錢欲書時先用擲筆髙尺餘以足接之未嘗失落書跡官楷書不如也出酉陽雜俎盧𢎞宣李德裕作相日人獻書帖德裕得之執翫頗愛其書盧𢎞宣時為度支郎中有善書名召至出所獲者書帖令觀之𢎞宣持帖乆之不對德裕曰何如𢎞宣有恐悚狀曰是某頃年所臨小王帖太尉彌重之出盧氏雜説嶺南􅇠嶺南􅇠嘗有郡牧得其皮使工人削筆醉失之大懼因剪已鬚為筆甚善更使為之工者辭焉詰其由因實對遂下令使一户輸人鬚或不能致輒責其直出嶺南異物志太平廣記卷二百九
