body:
  text: 太平廣記卷五百宋李昉等編雜録孔緯李克助京都儒士孟乙振武角抵人趙崇韓偓薛昌緒姜太師康義成高季昌沈尚書妻楊蘧𡊮繼謙孔緯魯國公孔緯入相後言於甥姪曰吾頃任兵部侍郎與王晋公鐸充𢎞文館學士判館事上任後巡㕔晋公乃言曰余昔任兵部侍郎與相國杜邠公悰充𢎞文館直學士判館事暮春留余看牡丹于斯㕔内言曰此㕔比令無逸無逸乃邠公子終金州刺史居之止要一間今壯麗如此子殊不知非久須為灰燼余聞此言心常銘之又語余曰明公慎厚端誠此座猶或庻幾由公而下者罹其事矣以吾今日而追念邠公之言得其大概矣是時昭宗纂承孔緯入相朝廷大體掃地無餘故緯感昔言而傷時也出聞竒録李克助李克助為大理卿昭宗在華州鄭縣令崔鑾有民告舉放民絹事刺史韓建令計以為贓奏下二司定罪御史邢臺部奏罪當絞大理寺數月不奏建問李尚書崔令乃親情耶何不奏克助云裨公之政也韓云崔令犯贓柰何言我之過也李云聞公舉放數將及萬矣韓曰我華州節度華民我民也李曰華民乃天子之民非公之民若爾即鄭縣民乃崔令民也建服其論乃捨崔令之罪謫潁陽尉出聞竒録京都儒士近者京都有數生㑹宴因説人有勇怯必由膽氣膽氣若盛自無所懼可謂丈夫座中有一儒士自媒曰若言膽氣余實有之衆人笑曰必須試然可信之或曰某親故有宅昔大凶而今已空鎻君能獨宿于此宅一宵不懼者我等酧君一􅈰此人曰唯命明日便徃實非凶宅但暫空耳遂為置酒果燈燭送于此宅中衆曰公更要何物曰僕有一劍可以自衛請無憂也衆乃出宅鎻門却歸此人實怯懦者時已向夜繫所乗驢别屋奴客並不得隨遂向閤宿了不敢睡唯滅燈抱劍而坐驚怖不已至三更有月上斜照窻隙見衣架頭有物如鳥鼓翼飜飜而動此人凛然强起抱劍一揮應手落璧磕然有聲役寢無音响恐懼既甚亦不敢尋究但把劔坐及更忽有一物上階推門門不開于狗竇中出頭氣休休然此人大怕把劔前斫不覺自倒劔失手抛落又不敢覔劔恐此物入來牀下跧伏更不敢動忽然困睡不覺天明諸奴客已開關至閤子間但見狗竇中血淋漓狼籍衆大驚呼儒士方悟開門尚自戰慄具說昨宵與物戰爭之狀衆大駭異遂于此壁下尋唯見席㡌半破在地即夜所斫之鳥也乃故㡌破弊為風所吹如鳥動翼耳劔在狗竇側衆又遶堂尋血踪乃是所乗驢已斫口喙唇齒缺破乃是向曉因解頭入狗門遂遭一劔衆大笑絶倒扶持而歸士人驚悸旬日方愈出原化記孟乙徐之蕭縣有田民孟乙者善網狐狢百無一失偶乗暇持矟行曠野㑹日將夕見道左數百歩􅂽冡巋然草間細逕若有人跡遂入之以矟于黑闇之處攪之若有人捉拽之不得動問爾􅄦􅁘人耶怪耶魅耶何故執吾矟而不置闇中應曰吾人也乃命出之具以誠告云我姓李昨為盗􅀍繫兗州軍候獄五木備體捶楚之處瘡痏徧身因伺隙踰獄垣亡命之此死生唯命焉孟哀而將歸置于􅃨壁中後經赦乃出孟氏以善獵知名飛走之屬無得脱者一旦􅂽塜之中而得叛獄囚以歸聞者皆大笑之出玉堂閒話振武角觝人光啓年中左神䇿軍四軍軍使王卞出鎮振武置宴樂戲既畢乃命角抵有一夫甚魁岸自鄰州來此較力軍中十數輩軀貌膂力悉不能敵主帥亦壯之遂選三人相次而敵之魁岸者俱勝帥及座客稱善久之時有一秀才坐于席上忽起告主帥曰某撲得此人主帥頗駭其言所請既堅遂許之秀才降階先入厨少頃而出遂掩綰衣服握左拳而前魁梧者㣲笑曰此一指必倒矣及漸相逼急展左手示之魁㟁者懵然而倒合座大笑秀才徐歩而出盥手而登席焉主帥詰之何術也對曰頃年客遊曽于道店逄此人纔近食案踉蹌而倒有同伴曰怕醬見之輒倒某聞而志之適詣設厨求得少醬握在手中此人見之果自倒聊助宴設之歡笑耳有邊岫判官目覩其事出玉堂閒話趙崇趙崇凝重清介門無雜賔慕王濛劉真長之風也標格清峻不為文章號曰無字碑每遇轉官舊例各舉一人自代而崇未甞舉人云朝中無可代己者世以此少之出北夢𤨏言韓偓韓偓天復初入翰林其年冬車駕幸鳳翔偓有扈從之功返正初帝面許用偓為相偓奏云陛下運契中興當須用重德鎮風俗臣座主右僕射趙崇可以副陛下是選乞回臣之命授崇天下幸甚帝甚嘉歎翼日制用崇暨兵部侍即王贊為相時梁太祖在京素聞崇輕佻贊又有嫌釁乃馳入請見于帝前具言二公長短帝曰趙崇乃韓偓薦時偓在側梁王叱之偓奏臣不敢與大臣爭帝曰韓偓出尋謫官入閩故偓詩曰手風慵展八行書眼病休看九局棊窓裏日光飛野馬桉前筠管長蒲盧謀身拙為安蛇足報國危曾捋虎􅂡滿世可能無黙識未知誰擬試齊竽出摭言薛昌緒岐王李茂貞覇秦隴也涇州書記薛昌緒為人迂僻禀自天性飛文染翰即不可得之矣與妻相見亦有時必有禮容先命女僕通轉徃來數四可之然後秉燭造室至于高談虚論茶果而退或欲詣幃房其禮亦然甞曰某以繼嗣事重輒欲卜其嘉㑹必候請而可之及從涇帥統衆於天水與蜀人相拒于青泥嶺岐衆廹于輦運又聞梁人入境遂潛師宵遁頗懼蜀人之掩襲涇帥臨行攀鞍忽記曰傳語書記速請上馬連促之薛在草菴下藏身曰傳語太師但請先行今晨是某不樂日戎帥怒使人提上鞍轎捶其馬而逐之尚以物蒙其面云忌日禮不見客此葢人妖也秦隴人皆知之出玉堂閒話姜太師蜀有姜太師者失其名許田人也幼年為黄巾所掠亡失父母從先主征伐屢立功勲後繼領數鎮節鉞官至極品有掌廐夫姜老者事芻秣數十年姜每入廐見其小過必笞之如是積年計其數將及數百後老不任鞭箠因泣告夫人乞放歸鄉里夫人曰汝何許人對曰許田人復有何骨肉對曰當􅀍掠之時一妻一男迄今不知去處又問其兒小字及妻姓氏行第并房眷近親皆言之及姜歸宅夫人具言姜老欲乞假歸鄉因問得所失男女親屬姓名姜大驚疑其父也使人細問之其男身有何記驗曰我兒脚心上有一黑子餘不記之姜大哭宻遣人送出劔門之外奏先主曰臣父近自關東來遂將金帛車馬迎入宅父子如初姜報撻父之過齋僧數萬終身不撻從者出王氏見聞康義誠後唐長興中侍衛使康義誠常軍中差人于𢎞宅充院子亦曾小有笞責忽一日憐其老而詢其姓氏則曰姓康别詰其鄉土親族息𦙍方知是父遂相持而泣聞者莫不驚異出玉堂閒話高季昌後唐莊宗過河荆渚高季昌謂其門客梁震曰某事梁祖僅獲自免龍德已來止求安活我今入覲亦要甞之彼若經營四方必不縻我若移入他鎮可為子孫之福此行决矣既自闕回謂震曰新主百戰方得河南對勲臣誇手抄春秋又􅆆指云我於指頭上得天下則功在一人臣佐何有且遊獵旬日不回中外情何以堪吾高枕無憂乃築西面羅城拒敵之具不三年莊宗不守英雄之料頃刻不差宜乎貽厥子孫出北夢𤨏言沈尚書妻有沈尚書失其名常為秦帥親吏其妻狼戾而不謹又妬忌沈常如在狴牢之中後因閒退挈其妻孥寄于鳯州自徃東川遊索意是與怨偶永絶矣華洪鎮東蜀與沈有布衣之舊呼為兄既至郊迎執手叙其契濶待之如親兄遂特創一第僕馬金帛器玩無有闕者送姬僕十餘輩斷不令歸北沈亦㣲訴其事無心還家及經年家信至其妻已離鳯州自至東蜀沈聞之大懼遂白于主人及遣人却之其妻致書重設盟誓云自此必改從前之性願以偕老不日而至其初至頗亦柔和渉旬之後前行復作諸姬婢僕悉鞭箠星散良人頭面皆拏擘破損華洪聞之召沈謂之曰欲為兄殺之如何沈不可如是旬日後又作沈因入衙精神沮䘮洪知之宻遣二人提劔牽出帷房刃于階下棄尸于潼江然後報沈沈聞之不勝驚悸遂至失神其尸住急流中不去遂使人以竹竿撥之便隨流來日復在舊湍之上如是者三洪使繫石縋之沈亦不逾旬日魂神失措知怨偶為仇也悲哉沈之宿有仇乎出王氏見聞楊蘧王贊中朝名士有𢎞農楊蘧者曾至嶺外見楊朔荔浦山水心常愛之談不容口蘧甞出入贊門下稍接從容不覺形于言曰侍即曾見楊朔荔浦山水乎贊曰未曾打人唇綻齒落安得見􅁘因大笑此言嶺外之地非貶不去出稽神録袁繼謙晋將作少監袁繼謙常說頃居青社假一第而處之聞多凶怪昏暝即不敢出戸庭合門驚懼莫能安寢忽一夕聞吼聲若有呼于瓮中者其聲重濁舉家怖懼必謂其怪之尤者遂于忩隙窺之見一物蒼黑色來徃庭中是夕月色晦覩之既久似若狗身而首不能舉遂以撾擊其腦忽轟然一聲家犬驚呌而去葢其日莊上人輸稅至此就于其地而糜釜尚有餘者故犬以首入空器中而不能出也因舉家大笑遂安寢出玉堂閒話太平廣記卷五百
