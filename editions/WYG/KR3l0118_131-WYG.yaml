body:
  text: 太平廣記卷一百三十一報應三十田倉臨海人陳甲麻姑謝盛李嬰許憲益州人章安人元稚宗王曇畧廣州人東興人陳莽沛國人齊朝請伍寺之蘇巷阮倪邵文立梁元帝望蔡令僧曇歡釋僧羣竺法惠冀州小兒田倉後漢溪夷田彊遣子魯居上城次子玉居中城小子倉居下城三壘相次以拒王莽光武二十四年遣威武將軍劉尚征之尚未至倉獲白鼈為臛舉烽請兩兄兄至無事及劉尚軍來倉舉火魯等以為不實倉遂戰死焉出酉陽雜俎臨海人呉末臨海人入山射獵夜中有人長一丈著黃衣白帶來謂射人曰我有讐尅明當戰君可見助當有相報射人曰自可助君耳何用謝為答曰明食時君可出溪邊敵從北來我南徃應白帶者我黃帶者彼射人許之明出果聞岸北有聲狀如風雨草木四靡視南亦爾唯見二大蛇長十餘丈于溪中相遇便相盤繞白鱗勢弱射人因引弩射之黃鱗者即死日將暮復見昨人來辭謝云住此一年獵明年以去愼勿復來來必有禍射人曰善遂停獵數年後忽思前言更徃獵復見白帶人告曰我語君不能見用讐子已甚今必報君非我所知射人聞之甚怖便欲走乃見三烏衣人俱張口向之射人即死出續捜神記陳甲吳郡海鹽縣北鄉亭里有士人陳甲本下邳人晉元帝時寓居華亭獵於東野大藪歘見大蛇長六七丈形如百斛船𤣥黃五色卧岡下士人即射殺之不敢説三年後與鄉人共獵至故見蛇處語同行云昔在此殺大蛇其夜夢見一人烏衣黑幘來至其家問曰我昔昏醉汝無狀殺我吾昔醉不識汝面故三年不相知今自來就死其人即驚覺明旦腹痛而卒出捜神記麻姑晉孝武大元八年富陽民麻姑者好噉膾華本者好噉鱉臛二人相善麻姑見一鱉大如釡蓋頭尾猶是大蛇繫之經一月盡變鱉便取作臛報華本食之非常味美麻姑不肯食華本彊令食之麻姑遂噉一臠便大惡心吐逆委頓遂生病喉中有物塞喉不下開口向本本見有一蛇頭開口吐舌本驚而走姑僅免本後于宅得一蛇大二圍長五六尺打殺作膾喚麻姑麻姑得食甚美苦求此魚本因醉喚家人捧蛇皮肉來麻姑見之嘔血而死出齊諧記謝盛晉安帝隆安中曲阿民謝盛乗船入湖採菱見一蛟來向船船迴避又從其後盛便以义殺之懼而還家至興寧中普天亢旱盛與同旅數人步至湖中見先义在地拾取之云此是我义人問其故具以實對行數步乃得心痛還家一宿便死出幽㝠録李嬰東晉義熈中鄱陽李嬰李滔兄弟二人善于用弩嘗射大麈解其四足懸著樹間以臟為炙方欲共食遥見山下有人長三丈許鼓步而來手持大囊既至斂取麈頭骼皮骨并火上雜肉悉内囊中徑負入山嬰兄弟須臾俱卒出廣古今五行記許憲晉義熈中餘杭縣有仇王廟高陽許憲為縣令憲男于廟側放火獵便穢祠前忽有三白麞從屋走出男引弓射忽失所在復以火圍之風吹火反覆其面欲去莫從遂燒死而憲以事免官出廣古今五行記益州人宋元嘉初益州刺史遣三人入山伐樵路迷忽見一龜大如車輪四足各躡一小龜而行又有百餘黃龜從其後三人叩頭請示出路龜乃伸頸若有意焉因共随逐即得出路一人無故取小龜割以為臛食之須臾暴死唯不噉者無恙出異苑章安人宋元嘉中章安縣人嘗屠虎至海口見一蟹匡大如笠脚長三尺取食甚美其夜夢一少嫗語云汝噉我肉我食汝心明日其人為虎所食出廣古今五行記元稚宗宋元稚宗者河東人也元嘉十六年隨鍾離太守阮愔在郡愔使稚宗行至遠村郡吏蓋茍邊定隨焉行至民家恍惚如眠便不復寤民以為死舁出門外方營殯具經夕能言説初有一百許人縛稚宗去數十里至一佛圖僧衆供養不異于世有一僧曰汝好獵今應受報便取稚宗皮剝臠截具如治諸牲獸之法復納于澡水釣口出之剖破解切若為膾狀又鑊煮爐炙初悉糜爛隨以還復痛惱苦毒至三乃止問欲活否稚宗便叩頭請命道人令其蹲地以水灌之云一灌除罪五百稚宗苦求多灌沙門曰唯三足矣見有蟻𩔖數頭道人曰此雖微物亦不可殺無復論巨此者也魚肉自此可噉耳齋㑹之日悉著新衣無新可浣也稚宗因問我行旅有三而獨嬰苦何也道人曰彼二人自知罪福知而無犯唯爾愚蒙不識縁報故以相戒因爾便蘇數日能起由是遂斷漁獵云出祥異記王曇畧宋譙國城父人王曇畧常以牛作脯為業欲殺一牛牛見刀輒跳躑欲走去曇畧怒乃先以刀刺牛目經少時其人眼無故血流出出廣古今五行記廣州人宋元嘉中廣州有三人共在山中伐木忽見石窠有三卵大如升取煮之湯始熱聞林中如風雨聲須臾一蛇大十圍長四五丈逕來湯中銜卵而去三人無幾皆死出捜神記東興人臨川東興有人入山得猿子便將歸猿母自後逐至家此人縛猿子於庭中樹上以示之其母便摶頰向人欲哀乞直謂口不能言耳此人既不能放竟擊殺之猿母悲喚自擲而死此人破腸視之皆斷裂矣未半年其人家疫一時死盡滅門出捜神後記陳莽臨川陳莽少以射獵為業與人逐鹿入山有一大樹可三十圍莽息其下忽有白氣去地十丈許莽因射之若有所中洒血布地聞空中語云正中大王俄見一大蛇掛樹身有箭頃刻有羣蛇輳輻向莽莽雖驅擊而來者數多盤繞莽身咂咂有聲須臾散去視莽唯見一聚白骨出廣古今五行記沛國人沛國有一士人同生三子年將弱冠皆有聲無言忽有一人從門過因問曰此是何聲答曰是僕之子皆不能言客曰君可内省何以致此主人異其言思忖良久乃謂客曰昔為小兒時當牀上有燕巢中有三子其母從外得哺三子皆出口受之積日如此試以指内巢中燕雛亦出口受之因以三薔茨食之既而皆死昔有此事今實悔之客曰是也言訖其三子之言語忽然周穩蓋能知過之故也出續捜神記齊朝請齊國有一奉朝請家甚豪侈非手殺牛則噉之不美年三十許病篤見大牛來舉體如被刀刺呌呼而終又江陵高偉入齊凡數年向幽州淀中捕魚後病每見羣魚囓之而死出顔氏家訓伍寺之南野人伍寺之見社樹上有猴懐孕便登樹擺殺之夢一人稱神責以殺猴之罪當令重謫寺之乃化為大蟲入山不知所在出述異記蘇巷新野蘇巷常與婦佃于野舍毎至田時輒有一物來其狀似蛇長七八尺五色光鮮巷異而餉之經數載産業加焉婦後密打殺即得能食之病進三斛飯猶不為飽少時而死也出異苑阮倪阮倪者性特忍害因醉出郭見有放牛直探牛舌本割之以歸為炙食之其後倪生一子無舌人以為牛之報也出述異記邵文立梁小莊嚴寺在建業定陰里本是晉零陵王廟地天監六年度禪師起造時有邵文立者世以烹屠為業嘗欲殺一鹿鹿跪而流淚以為不祥鹿懐一麑㝷當産育就庖哀切同被刳割因斯患疾眉鬚皆落身瘡並壊後乃深起悔責求道度禪師發大誓願罄捨家資迴買此地為立伽藍出梁京寺記梁元帝梁元帝諱繹母阮脩容曾失一珠元帝時絶幼吞之謂是左右所盜乃炙魚眼以厭之信宿之間珠便出帝㝷一目致眇蓋魚之報也出韻對記望蔡令梁孝元在江州時有人為望蔡縣令經劉敬躬亂縣廨被焚寄寺而住民將牛酒作禮縣令以牛擊殺屏除設鋪陳牀座於堂上接賓客未殺之頃牛係解徑來至階而拜縣令大笑遂令左右宰之飲噉醉飽便卧於簷下及醒即覺體痒爬搔隱疹因爾成癩十許年死出顔氏家訓僧曇歡後周武帝時敷州義陽寺僧曇歡有羊數百口恒遣沙彌及奴放於山谷後沙彌云頻有人來驅逐此羊歡乃多將手力自徃伺之後見此人立于東岸樹下遙謂歡曰汝之畜養猪羊其罪最甚不久自知何勞䕶惜歡驟馬繞谷就之而覓不見少時滅法教資財並送官府公私牽挽並皆分散歡還俗貧病而死出廣古今五行記釋僧羣釋僧羣清貧守節蔬食持經居羅江縣之霍山搆立茅室孤在海中上有石盂水深六尺常有清流古老相傳是羣仙所宅羣因絶粒其菴舍與石㿻隔一小澗常以木為梁由之以汲水年至一百三十忽見一折翅鴨舒翼當梁頭羣將舉錫撥之恐有轉傷因此迴歸遂絶水數日而終臨終謂左右曰我少時曾折一鴨翅驗此以為報也出高僧傳竺法惠竺法惠本關中人方直有戒行行至嵩高山忽謂弟子法昭曰汝過去時折一鴨脚其殃即至俄而昭為人所擲物折脚遂永疾廢焉出高僧傳冀州小兒隋開皇初冀州外邑中有小兒年十三常盜鄰卵燒煨食之翌日侵旦有人叩門呼此兒聲父令兒出應之見一人云官喚汝兒曰呼我役者入取衣糧使者曰不須也因引兒去村南舊是桑田耕訖未下種此小兒忽見道右有一小城四面門樓丹素甚嚴此兒怪曰何時有此城使者呵之勿言因至城北門令小兒前入小兒入閫城門忽閉不見一人唯是空城地皆熱灰碎火深纔没踝小兒忽呼呌走趨南門垂至即閉又走趨東西亦皆如是未到則開既至便闔時村人出田採桑男女甚衆皆見兒在耕田中啼泣四方馳走皆相謂曰此兒狂耶旦來如此遊戲不息至于食時採者皆歸兒父問曰見吾兒否桑人答曰父兒在村南走戲喚不肯來父出村外遙見兒走大呼其名一聲便住城灰忽然不見父兒倒號泣言之視其足半脛已上血肉燋乾膝已下紅爛如炙抱歸養療髀已上肉如故膝已下遂為枯骨鄰里聞之看其走處足跡通利了無灰火良因實業觸處見獄有道惠法師本冀州人與小兒鄰邑親見其事出㝠報記太平廣記卷一百三十一
