body:
  text: 太平廣記卷二百二十一相一袁天綱張冏藏張柬之陸景融程行諶魏元忠袁天綱袁天綱蜀郡成都人父璣梁州司倉祖嵩周朝歴犍為蒲陽蒲江二郡守車騎將軍曾祖逹梁朝江黄二州刺史周朝歴天水懐仁二郡守天綱少孤貧好道藝精於相術唐武德年中為火井令貞觀六年秩滿入京太宗召見謂天綱曰巴蜀古有嚴君平朕今有爾自顧何如對曰彼不逢時臣遇聖主臣當勝也隋大業末竇軌客遊劒南德陽縣與天綱同宿以貧苦問命天綱曰公額上伏犀貫玉枕輔角又成就從今十年後必富貴為聖朝良佐右輔角起兼復明淨當於梁益二州分野大振功名軌曰誠如此言不敢忘德初為益州行臺僕射既至召天綱謂曰前於德陽縣相見豈忘也深禮之更請為審天綱瞻之良乆曰骨法成就不異往時然目色赤貫瞳子語浮面赤為將多殺人願深自誡後果多行殺戮武德九年軌被徴詣京謂天綱曰更得何官對曰面上佳人坐位不動輔角右畔光澤更有喜色至京必蒙聖恩還来此任其年果重授益州都督天綱初至洛陽在清化坊安置朝野歸湊人物常滿是時杜淹王珪韋挺三人来見天綱謂淹曰蘭臺成就學堂寛廣謂珪曰公法令成就天地相臨從今十年當得五品要職謂挺曰公面似大獸之面文角成就必得貴人擕接初為武官復語杜淹曰二十年外終恐三賢同被責黜暫去即還淹尋遷侍御史武德中為天䇿府兵曹文學館學士王珪為隱太子中允韋挺自隋末隱太子引之為率更武德六年俱配流嶲州淹等至益州見天綱泣曰袁公前於洛陽之言皆如高㫖今日形勢如此更為一看天綱曰公等骨法大勝往時不乆即廻終當俱享榮貴至九年六月俱追入又過益州造天綱天綱曰杜公至京即得三品要職年夀非天綱所知王韋二公在後當得三品兼有夀然晩途皆不深遂韋公尤甚及淹至京拜御史大夫檢挍吏部尚書贈天綱詩曰伊呂深可慕松喬定是虛繋風終不得脫屣欲安如且珍紈素美當與薜蘿疎既逢楊得意非復乆閒居王珪尋為侍中出為同州刺史韋挺歴蒙州刺史並卒于官皆如天綱之言貞觀中敕追詣九成宫于時中書舍人岑文本令視之天綱曰舍人學堂成就眉復過目文才振於海内頭有生骨猶未大成後視之全無三品前視三品可得然四體虛弱骨肉不相稱得三品恐是損夀之徴後文本官至中書令尋卒房𤣥齡與李審素同見天綱房曰李恃才傲物君先相得何官天綱云五品未見若六品已下清要官有之李不復問云視房公得何官天綱云此人大富貴公若欲得五品即求此人李不之信後房公為宰相李為起居舍人卒髙宗聞往言令房贈五品官房奏贈諫議大夫申公髙士亷謂天綱曰君後更得何官天綱曰自知相禄已絕不合更有恐今年四月大厄不過四月而卒也蒲州刺史蔣儼幼時天綱為占曰此子當累年幽禁後大富貴從某官位至刺史年八十三其年八月五日午時禄終儼後征遼東沒賊囚於地穽七年髙䴡平定歸得官一如天綱所言至蒲州刺史八十三謂家人曰袁公言我八月五日禄絕其死矣設酒饌與親故為别果有敕至放致仕遂停禄後數年卒李義府僑居于蜀天綱見而竒之曰此郎貴極人臣但夀不長耳因請舍之託其子謂李曰此子七品相願公提挈之義府許諾因問天綱夀幾何對曰五十二外非所知也義府後為安撫使李大亮侍中劉洎等連薦之召見試令詠烏立成其詩曰日裏颺朝綵琴中伴夜啼上林多少𣗳不借一枝棲太宗深賞之曰我將全𣗳借汝豈但一枝自門下典儀超拜監察御史其後夀位皆如天綱之言贊皇公李嶠幼有清才昆弟五人皆年不過三十而卒唯嶠已長成矣母憂之益切詣天綱天綱曰郎君神氣清秀而夀苦不永恐不出三十其母大以為慼嶠時名振咸望貴逹聞此言不信其母又請袁生致饌診視云定矣又請同於書齋連榻而坐寢袁登牀穩睡李獨不寢至五更忽睡袁適覺視李嶠無喘息以手候之鼻下氣絕初大驚怪良乆偵候其出入息乃在耳中撫而告之曰得矣遂起賀其母曰數候之皆不得今方見之矣郎君必大貴夀是龜息也貴夀而不富耳後果如其言則天朝拜相而家常貧是時帝數幸宰相家見嶠臥青絁帳帝歎曰國相如是乖大國之體賜御用繡羅帳焉嶠寢其中逹曉不安覺體生疾遂自奏曰臣少被相人云不當華故寢不安焉帝歎息乆之任意用舊者嶠身材短小鼻口都無厚相時意不以重禄待之其在潤州也充使宣州山採銀時妄傳其暴亡舉朝傷歎冬官侍郎張詢古嶠之從舅也聞之甚憂使諸親訪候其實適㑹南使云亡實矣詢古潸然涕泗朝士多相慰者時有一人稱善骨法頗得袁天綱之術朝貴多竊問之其人曰乆知李舍人禄位稍薄諸人竦聼其人又曰李舍人雖有才華而儀冠耳目鼻口略無成就者頃見其加朝散已憂之矣衆皆然之嶠竟三秉衡軸極人臣之貴然則嶠之相難知而天綱得之又陜州刺史王當有女集州縣文武官令天綱揀壻天綱曰此無貴壻唯識果毅姚某者有貴子可嫁之終必得力當從其言嫁之時人咸笑焉乃元崇也時年二十三好獵都未知書常詣一親表飲遇相者謂之曰公後富貴言訖而去姚追而問之相者曰公甚貴為宰相歸以告其母母勸令讀書崇遂割放鷹鷂折節勤學以挽郎入仕竟位至宰相天綱有子客師傳其父業所言亦驗客師官為廪犧令顯慶中與賈文通同供奉髙宗以銀合合一䑕令諸術數人射之皆言有一䑕客師亦曰䑕也然入一出四其䑕入合中已生三子果有四矣客師嘗與一書生同過江登舟遍視舟中人顔色謂同侣曰不可速也遂相引登岸私語曰吾見舟中數十人皆鼻下黑氣大厄不乆豈可知而從之但少留舟未發間忽見一丈夫神色髙朗跛一足負擔驅驢登舟客師見此人乃謂侣曰可以行矣貴人在内吾儕無憂矣登舟而發至中流風濤忽起危懼雖甚終濟焉詢驅驢丈夫乃是婁師德也後位至納言焉出定命録張冏藏張冏藏善相與袁天綱齊名有河東裴某年五十三為三衛當夏季番入京至滻水西店買飯同坐有一老人謂裴曰貴人裴因對曰某今年五十三尚為三衛豈望官爵老父柰何謂僕為貴人老父笑曰君自不知耳從今二十五日得三品官言畢便别乃張冏藏也裴至京當番已二十一日屬太宗氣疾發動良醫名藥進服皆不效坐臥寢食不安有詔三衛已上朝士已下皆令進方裴隨例進一方乳煎蓽撥而服其疾便愈敕付中書使與一五品官宰相逡巡未敢進擬數日太宗氣疾又發又服蓽撥差因問前三衛得何官中書云未審與五品文官武官太宗怒曰治一撥亂天子得活何不與官向若治宰相疾可必當日得官其日特恩與三品正員京官拜鴻臚卿累遷至夲州刺史劉仁軌尉氏人年七八歳時冏藏過其門見焉謂其父母曰此童子骨法甚竒當有貴禄宜保養敎誨之後仁軌為陳倉尉冏藏時被流劒南經岐州遇馮長命為岐州刺史令看判司已下無人至五品者出逢仁軌凜然變色却謂馮使君曰得貴人也遂細看之後至僕射謂之曰僕二十年前於尉氏見一小兒其骨法與公相𩔖當時不問姓名不知誰耳軌笑曰尉氏小兒仁軌是也冏藏曰公不離四品若犯大罪即三品已上後從給事中出為青州刺史知海運遭風失船被河間公李義府譛之差御史袁異式推之大理斷死特敕免死除名於遼東効力入為大司憲竟位至左僕射盧嘉瑒有莊田在許州與表丈人清河張某鄰近張任監察御史丁憂及終制擕嘉瑒同詣張冏藏其時嘉瑒年尚齠齓張入見冏藏立嘉瑒於中門外張謂冏藏曰服終欲見宰執不知何如冏藏曰侍御且得夲官縱遷不過省郎言畢冏藏相送出門忽見嘉瑒謂張曰侍御官爵不及此兒此兒甚貴而夀典十郡已上後嘉瑒歴十郡守夀至八十魏齊公元忠少時曾謁冏藏冏藏待之甚薄就質通塞亦不答也公大怒曰僕不逺千里裹糧非徒行耳必謂明公有以見敎而含木舌不盡勤勤之意耶且窮通貧賤自屬蒼蒼何預公焉因拂衣而去冏藏遽起言曰君之相祿正在怒中後當位極人臣髙敬言為雍州法曹冏藏書之云從此得刑部員外郎中給事中果州刺史經十年即任刑部侍郎吏部侍郎二年患風改虢州刺史為某乙夲部年七十三及為給事中當直則天顧問髙士亷云髙敬言卿何親士亷云是臣姪後則天問敬言敬言云臣貫山東士亷勲貴與臣同宗非臣近屬則天向士亷説之士亷云敬言甚無景行臣曾嗔責伊乃不認臣則天怪怒乃出為果州刺史士亷公主猶在敬言辭去公主怒而不見遂更不得改經九年公主士亷皆亡後朝廷知屈追入為刑部侍郎至吏部侍郎忽患風則天命與一近小州養疾遂除虢州刺史卒年七十三皆如冏藏之言姚元崇李迥秀杜景佺三人因選同詣冏藏冏藏云公三人並得宰相然姚最富貴出入數度為相後皆如言出定命録張柬之張柬之任青城縣丞已六十三矣有善相者云後當位極人臣衆莫之信後應制策􅀍落則天怪中第人少令於所落人中更揀有司奏一人策好緣書寫不中程律故退則天覽之以為竒才召入問䇿中事特異之即収上第拜王屋縣尉後至宰相封漢陽王出定命録陸景融陸景融為新鄭令有客謂之曰公從今三十年當為此州刺史然於法曹㕔上坐陸公不信時陸公記法曹㕔有桐𣗳後果三十年為鄭州刺史所坐㕔前有桐𣗳因而問之乃云此㕔夲是法曹㕔往年刺史嫌宅窄遂通法曹廳為刺史㕔方知言應出定命録程行諶程行諶年六十任陳留縣尉同僚以其年髙位卑嘗侮之後有一老人造謁因言其官夀俄而縣官皆至仍相侮狎老人云諸君官夀皆不如程公程公從今已後有三十一政官年九十已上官至御史大夫及僕射有厄皆不之信于時行諶妹夫新授絳州一縣令妹欲赴夫任令老人占其善惡老人見云夫人壻今已病去絳州八十里必有凶信其妹憂悶便發去州八十里凶問果至程公後為御史大夫九十餘卒後贈僕射右相果如所言出定命録魏元忠相國魏元忠與禮部尚書鄭惟忠皆宋人咸負材器少相友善年將三十而名未立有善相者見之異禮相接因謂曰古人稱方以𩔖聚信乎魏公當位極人臣聲名烜赫執心忠謇直諒不囬必作棟幹為國元輔貴則貴矣然命多蹇剝時有憂懼皆是登相位已前事不足為虞但可當事便行聞言則應謂鄭公曰足下金章紫綬命祿無涯既入三品亦升八座官無貶黜夀復遐長元忠復請曰祿始何歳秩終何地對曰今年若獻書祿斯進矣罷相之後出廵江徼秩將終矣遂以其年於涼宫上書陳事乆無進止糧盡却歸路逢故人惠以縑帛却至涼宫已有恩敕召入拜挍書後遷中丞大夫中間忤㫖犯權累遭譴責下獄窮問每欲引決輒憶相者之言復自寛解但益骯髒言事未嘗屈其志而抑其辭終免於禍而登宰輔焉自僕射竄謫于南郡江行數日病困乃曰吾終此乎果卒出定命録太平廣記卷二百二十一
