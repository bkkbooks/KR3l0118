body:
  text: 太平廣記卷四百七十五宋李昉等編昆蟲三淳于棼淳于棼東平淳于棼吳楚游俠之士嗜酒使氣不守細行累巨産養豪客曾以武藝補淮南軍裨将因使酒忤帥斥逐落魂縱誕飲酒為事家住廣陵郡東十里所居宅南有大古槐一株枝幹修宻清隂數畝淳于生日與羣豪大飲其下唐貞元七年九月因沈醉致疾時二友人於坐扶生歸家卧於堂東廡之下二友謂生曰子其寝矣余将秣馬濯足俟子小愈而去生解巾就枕昏然忽忽髣髴若夢見二紫衣使者跪拜生曰槐安國王遣小臣致命奉邀生不􅁴下榻整衣随二使至門見青油小車駕以四牡左右從者七八扶生上車出大户指古槐穴而去使者即驅入穴中生意頗甚異之不敢致問忽見山川風候草木道路與人世甚殊前行數十里有郛郭城堞車輿人物不絶於路生左右傳車者傳呼甚嚴行者亦争闢於左右又入大城朱門重樓樓上有金書題曰大槐安國執門者趨拜奔走旋有一騎傳呼曰王以駙馬逺降令且息東華舘因前導而去俄見一門洞開生降車而入彩檻雕楹華木珍果列植於庭下几案茵褥簾幃殽膳陳設於庭上生心甚自悦復有呼曰右相且至生降階祗奉有一人紫衣象簡前趨賔主之儀敬盡焉右相曰寡君不以弊國逺僻奉迎君子託以姻親生曰某以賤劣之軀豈敢是望右相因請生同詣其所行可百歩入朱門矛㦸斧鉞布列左右軍吏數百辟易道側生有平生酒徒周弁者亦趨其中生私心悦之不敢前問右相引生升廣殿御衛嚴肅若至尊之所見一人長大端嚴居正位衣素練服簪朱華冠生戰慄不敢仰視左右侍者令生拜王曰前奉賢尊命不棄小國許令次女瑶芳奉事君子生但俯伏而已不敢致詞王曰且就賔宇續造儀式有㫖右相亦與生偕還館舍生思念之意以為父在邊將因歿虜中不知存亡將謂父北蕃交遜而致兹事心甚迷惑不知其由是夕羔鴈幣帛威容儀度妓樂絲竹殽膳燈燭車騎禮物之用無不咸備有羣女或稱華陽姑或稱青溪姑或稱上仙子或稱下仙子若是者數輩皆侍從數千冠翠鳯冠衣金霞帔綵碧金鈿目不可視遨遊戲樂往来其門爭以淳于郎為戲弄風態妖麗言詞巧艶生莫能對復有一女謂生曰昨上已日吾從靈芝夫人過禪智寺於天竺院觀右延舞婆羅門吾與諸女坐北牖石榻上時君少年亦解騎来看君獨强来親洽言調笑謔吾與瓊英妺結絳巾挂於竹枝上君獨不憶念之乎又七月十六日吾於孝感寺悟上真子聽契𤣥法師講觀音經吾於講下捨金鳯􅁫兩􅃗上真子捨水犀合子一枚時君亦講筵中於師處請釵合視之賞歎再三嗟異良久顧余輩曰人之與物皆非世間所有或問吾民或訪吾里吾亦不答情意戀戀矚盻不捨君豈不思念之乎生曰中心藏之何日忘之羣女曰不意今日與君為眷屬復有三人冠帯甚偉前拜生曰奉命為駙馬相者中一人與生且故生指曰子非馮翊田子華乎田曰然生前執手敘舊久之生謂曰子何以居此子華曰吾放遊獲受知於右相武成侯段公因以栖託生復問曰周弁在此知之乎子華曰周生貴人也職為司𨽻權勢甚盛吾數蒙庇䕶言笑甚歡俄傳聲曰駙馬可進矣三子取劒佩冕服更衣之子華曰不意今日獲覩盛禮無以相忘也有仙姬數十奏諸異樂婉轉清亮曲調悽悲非人間之所聞聴有執燭引導者亦數十左右見金翠歩障彩碧玲瓏不斷數里生端坐車中心意恍惚甚不自安田子華數言笑以觧之向者羣女姑姊亦紛然在側令生降車輦拜揖讓升降一如人間徹障去扇見一女子云號金枝公主年可十四五儼若神仙交歡之禮頗亦明顯生自爾情義日洽榮曜日盛出入車服遊宴賔御次于王者王命生與群寮備武衛大獵於國西靈龜山山阜峻秀川澤廣遠林樹豐茂飛禽走獸無不蓄之師徒大獲竟夕而還生因他日啟王曰臣頃結好之日大王云奉臣父之命臣父頃佐邉将用兵失利陷沒胡中爾来絶書信十七八嵗矣王既知所在臣請一往拜觀王遽謂曰親家翁職守北土信問不絶卿但具書状知聞未用便去遂命妻致饋賀之禮一以遣之數夕還答生驗書本意皆父平生之跡書中憶念教誨情意委曲皆如昔年復問生親戚存亡閭里興廢復言路道乖逺風烟阻絶詞意悲苦言語哀傷又不令生来覲云嵗在丁丑當與女相見生捧書悲咽情不自堪他日妻謂生曰子豈不思為政乎生曰我放蕩不習政事妻曰卿但為之余當奉賛妻遂白於王累日謂生曰吾南柯政事不理太守黜廢欲藉卿才可曲就之便與小女同行生敦受教命王遂勅有司備太守行李因出金玉錦繡箱奩僕妾車馬列於廣衢以餞公主之行生少遊侠曾不敢有朢至是甚悦因上表曰臣将門餘子素無藝術猥當大任必敗朝章自悲負乗坐致覆餗今欲廣求賢哲以賛不逮伏見司𨽻潁川周弁忠亮剛直守法不回有毗佐之器處士馮翊田子華清慎通變逹政化之源二人與臣有十年之舊備知才用可託政事周請署南柯司憲田請署司農庶使臣政績有聞憲章不紊也王並依表以遣之其夕王與夫人餞於國南王謂生曰南柯國之大郡土地豐壤人物豪盛非惠政不足以治之况有周田共賛卿其勉之以副國念夫人戒公主曰淳于郎性剛好酒加之少年為婦之道貴乎柔順爾善事之吾無憂矣南柯雖封境不遥晨昏有間今日暌别寜不沾巾生與妻拜首南去登車擁騎言笑甚歡累夕逹郡有官吏僧道耆老音樂車轝武衛鑾鈴争来迎奉人物闐咽鐘鼓喧譁不絶十數里見雉堞臺觀佳氣鬱鬱入大城門門亦有大榜題以金字曰南柯郡城見朱軒棨户森然深􅃉生下車省風俗療病苦政事委以周田郡中大理自守郡二十載風化廣被百姓歌謡建功徳碑立生祠宇王甚重之賜食邑錫爵位居台輔周田皆以政治著聞逓遷大位生有五男二女男以門䕃授官女亦聘於王族榮耀顯赫一時之盛代莫比之是嵗有檀蘿國者来伐是郡王命生練将訓師以征之乃表周弁将兵三萬以拒賊之衆於瑶臺城弁剛勇輕敵師徒敗績弁單騎裸身潛遁夜歸城賊亦收輜重鎧甲而還生因囚弁以請罪王並捨之是月司憲周弁疽發背卒生妻公主遘疾旬日又薨生因請罷郡䕶喪赴國王許之便以司農田子華行南柯太守事生哀慟發引威儀在途男女呌號人吏奠饌攀轅遮道者不可勝數遂逹於國王與夫人素衣哭於郊候靈轝之至諡公主曰順儀公主備儀仗羽葆鼔吹葬於國東十里盤龍岡是月故司憲子榮信亦䕶喪赴國生久鎮外藩結好中國貴門豪族靡不是洽自罷郡還國出入無恒交遊賔從威福日盛王意疑憚之時有國人上表云𤣥象謫見國有大恐都邑遷徙宗廟崩壊釁起他族事在蕭牆時議以生侈僭之應也遂奪生侍衛禁生遊從處之私第生自恃守郡多年曾無敗政流言怨悖鬱鬱不樂王亦知之因命生曰姻親二十餘年不幸小女夭枉不得與君子偕老良用痛傷夫人因留孫自鞠育之又謂生曰卿離家多時可暫歸本里一見親族諸孫留此無以為念後三年當令迎生生曰此乃家矣何更歸焉王笑曰卿本人間家非在此生忽若惽睡瞢然久之方乃發悟前事遂流涕請還王顧左右以送生生再拜而去復見前二紫衣使者從焉至大户外見所乗車甚劣左右親使御僕遂無一人心甚歎異生上車行可數里復出大城宛是昔年東来之途山川源野依然如舊所送二使者甚無威勢生逾怏怏生問使者曰廣陵郡何時可到二使謳歌自若久乃答曰少頃即至俄出一穴見本里閭巷不改往日澘然自悲不覺流涕二使者别生下車入其門升自階已身臥於堂東廡之下生甚驚畏不敢前近二使因大呼生之姓名數聲生遂發寤如初見家之僮僕擁篲於庭二客濯足於榻斜日未隐於西垣餘樽尚湛於東牖夢中倐忽若度一世矣生感念嗟嘆遂呼二客而語之驚駭因與生出外尋槐下穴生指曰此即夢中所驚入處二客将謂狐狸木媚之所為祟遂命僕夫荷斤斧斷擁腫折查枿尋穴究源旁可袤丈有大穴根洞然明朗可容一榻上有積土壤以為城郭臺殿之狀有蟻數斛隠聚其中中有小臺其色若丹二大蟻處之素翼朱首長可三寸左右大蟻數十輔之諸蟻不敢近此其王矣即槐安國都也又窮一穴直上南枝可四丈宛轉方中亦有土城小樓羣蟻亦處其中即生所領南柯郡也又一穴西去二丈磅礴空圬嵌窞異狀中有一腐龜殻大如斗積雨浸潤小草叢生繁茂翳薈掩暎振殻即生所獵靈龜山也又窮一穴東去丈餘古根盤屈若龍虺之狀中有小土壤髙尺餘即生所葬妻盤龍岡之墓也追想前事感歎於懐披閲窮跡皆符所夢不欲二客壊之遽令掩塞如舊是夕風雨暴發旦視其穴遂失羣蟻莫知所去故先言國有大恐都邑遷徙此其騐矣復念檀蘿征伐之事又請二客訪跡於外宅東一里有古涸澗側有大檀𣗳一株藤蘿擁織上不見日旁有小穴亦有羣蟻隐聚其間檀蘿之國豈非此耶嗟乎蟻之靈異猶不可窮况山藏木伏之大者所變化乎時生酒徒周弁田子華並居六合縣不與生過從旬日矣生遽遣家僮疾往候之周生暴疾已逝田子華亦寝疾於牀生感南柯之浮虚悟人世之倐忽遂栖心道門絶棄酒色後三年嵗在丁丑亦終於家時年四十七将符宿契之限矣公佐貞元十八年秋八月自吳之洛暫泊淮浦偶覿淳于生棼詢訪遺跡飜覆再三事皆摭實輒編録成𫝊以資好事雖稽神語怪事渉非經而竊位著生冀将為戒後之君子幸以南柯為偶然無以名位驕於天壤間云前華州参軍李肇賛曰貴極禄位權傾國都逹人視此蟻聚何殊出異聞録太平廣記卷四百七十五
