body:
  text: 太平廣記卷四百五十九宋李昉等編蛇四僧令因衛中丞姊蒲州人相魏貧民番禺書生郫縣民游邵成汭孫光憲朱漢賔牛存節水清池王思同徐坦張氏顔遂瞿塘峽靳老景煥舒州人賈潭姚景王稔安陸人僧令因僧令因者於子午谷過山往金州見一竹輿先行有女僕服縗而從之數日終不見其人令因乃急引簾窺之乃一婦人首而蛇身甚偉令因甚驚婦人曰不幸業重身忽變化上人何乃窺之問其僕曰欲送秦嶺之上令因遂與誦功徳送及秦嶺亦不見婦人之首而入林中矣出聞竒録衛中丞姊御史中丞衛公有姊為性剛戾毒惡婢僕鞭笞多死忽得熱疾六七日自云不欲見人常獨閉室而欲至者必嗔喝呵怒經十餘日忽聞屋中窸窣有聲潛來窺之昇堂便覺腥臊毒氣開牖已見變為一大蛇長丈餘作赤斑色衣服爪髮散在床褥其蛇怒目逐人一家驚駭衆共送之於野葢性暴虐所致也出原化記蒲州人蒲州人穿地作井坎深丈餘遇一方石而不及泉欲去石更鑿忽墮深坑蟄蛇如覆舟小者與凡蛇等其人初甚驚懼乆之稍熟饑無所食其蛇吸氣因亦効之遂不復饑積累月聞雷聲初一聲蛇乃起首須臾悉動頃之散去大者前去相次出復入人知不害已乃前抱其項蛇遂徑去縁上白道如行十里前有烽火乃致人於地而去人往借問烽者云是平州也出廣異記相魏貧民相魏有貧民劚園荒地見一大蛇钁而殺之尋見一大穴穴中十餘小蛇又復殺而埋之既畢歸家明日有人持狀訴論云被殺一家大小埋在園中官捕獲此人訊問了然不伏於園中驗之得一坑者共十餘人但言昨打殺者十餘條蛇埋之於此並不殺人不知此禍而來若為就決實為大枉官疑之勘本告者尋覓無人又令重就園檢驗昨所埋之處但見十餘死蛇不復見人乃得免焉出原化記番禺書生有書生遊番禺歴諸郡經山中見有氣髙丈餘如烟鄉人曰此岡子蛇吞象也遂告鄉里振鼓呌噪而蛇退入一巖谷中經宵鄉里人各持缻甕往見一象尚立而肌骨皆化為水遂針破取其水里人云此過海置舟中辟去蛟龍又有官人於南中見一大蛇長數丈徑可一尺五寸腹内有物如㭬橛之類㳂一樹食其葉腹中之物漸消無所有而里人云此蛇吞鹿此木葉能消之遂令從者採其葉收之歸後或食不消腹脹乃取其葉作湯飲之經宵及午不報及撤被視之唯殘枯骸餘化為水矣出聞竒録郫縣民郫縣有民於南郭渠邉得一小蛇長尺餘刳剔五臟盤而串之置于火焙之數日民家孩子數嵗忽遍身腫赤皮膚炮破因自語曰汝家無狀殺我刳剔腹中胃置於火上且令汝兒知此痛苦民家聞之驚異取蛇㧞去剗竹以水灑之焚香祈謝送於舊所良乆蜿蜒而去兒亦平愈焉出録異記游邵汝州魯山縣所治即元魏時西廣州也今子城東南有妖神祠其前庭廣袤數百歩古老云當時大毬場也正門左右雙槐各二十圍枝幹扶疎亦云當時植焉至中和初嵗釁起東夏郡邑騷然刺史游邵許將也令屬縣伐木為柵以自固雖桑柘梓檟靡有孑遺將伐雙槐其夕有巨蟒蟠于上聲若震霆目若飛星鎮將李璠主其事璠武人也聞之以為妖且率徒親斬之下斧而流血雨迸腥氣薄人亦心動而止雙槐至今尚存闕成汭荆州節度使成汭領蔡州軍戍江陵為節度使張璝謀害之遂棄本部奔於秭歸一夜為巨蛇繞身㡬至于殞乃曰茍有所負死生唯命逡廵蛇亦亡去邇後招緝户口訓練士卒移鎮渚宫㝷受節旄撫綏凋殘勵精為理初年居民唯一十七家末年至萬户勤王奉國通商務農有足稱焉朝廷號北韓南郭韓即華州韓建成初姓郭後歸本姓出北夢𤨏言孫光憲孫光憲曽行次叙谷宿於神山見嶺上板屋中以木根為巨虺前列香燈因詰居叟彼何神也叟曰光化中楊守亮鎮褒日有一蛇横此嶺路髙七八尺莫知其首尾四面小蛇翼之無數每一拖身即林木摧折殆旬半方過盡阻絶行旅因聚草焚燎路隅慮其遺毒然後方行明年楊伏誅出北夢𤨏言朱漢賔梁貞明中朱漢賔鎮安陸之初忽一日曙色纔辨有大蛇見於城之西南首枕大城尾拖於壕南岸土地廟中其魁可大如五斗器雙目如電呀巨吻以瞰于城其身不翅百尺粗可數圍跨于羊馬之堞兼壕池之上其餘尚蟠於廟垣之内有宿城軍校卒然遇之大呼一聲失魂而逝一州惱懼莫知其由來年淮宼非時而至圍城攻討數日不破而返豈神祗之先告歟出玉堂閒語牛存節梁牛存節鎮鄆州於子城西南角大興一第因板築穿地得蛇一穴大小無數存節命殺之載于野外十數車載之方盡時有人云此蛇藪也是嵗存節疽背而薨出玉堂閒話水清池太原屬邑有水清池本府祈禱雨澤及投龍之所也後唐莊宗末過河南獵射都捕獵就池卓帳為憇宿之所忽見巨蛇數頭自洞穴中出皆入池中良久有一蛇紅白色遙見可圍四尺以來其長稱是獵卒齊彀弩連發射之而斃四山火光池中魚鼈咸死浮在水上獵夫輩共刲剝食之其肉甚羙莊宗㝷知之于時謟事者以為剋梁之兆有五䑓僧曰吾王宜速過河決戰將來梁祚其能久乎此亦斷白蛇之類也出北夢𤨏言王思同後唐少帝朝清泰王起于岐陽朝廷詔西京留守王思同綂禁旅征之王師西出之後尋聞劘壘雍京僚屬日登西樓望其㨗書忽一日官僚凭檻西向見羊馬城上有二大蛇東西以首相向為從者輩遙擲彈丸以警之于時一人擲中東蛇之腦蜿蜒然墮于牆下挺然不動使人視之已卒矣其西蛇徐徐入于穴隟之間識者竊議之曰潞王乙巳生統帥王公亦乙巳生俱為蛇相今東蛇中腦而卒豈非王師不利乎未逾旬日羣師叛歸潞王思同腹心都將王彦暉已下並投岐城納欵同單馬而遯竟沒于王事焉蛇亡之兆得不明乎出王氏見聞徐坦清泰末有徐坦應進士舉下第南遊渚宫因之峽州㝷訪故舊旅次富堆山下有古店是夜憇琴書訖忽見一樵夫形貎枯瘠似有哀慘之容坦遂詰其由樵夫濡瞍而答曰某比是此山居人姓李名孤竹有妻先遘沈疴歴年不愈昨因入山採木經再宿未返其妻身形忽變恐人驚悸謂鄰母曰我之身已變矣請為報夫知之及歸語曰我已弗堪也唯尸在焉請君託鄰人舁我置在山口為幸如其言遷至於彼逡廵忽聞如大風雨聲衆人皆懼之又言曰至時速廻慎勿返顧遂叙訣别之恨俄見羣山中有大蛇無數競凑其妻妻遂下牀伸而復屈化為一蟒與羣蛇相接而去仍於大石上捽其首迸碎在地至今有蛇種李氏在焉出玉堂閒話張氏王蜀時杜判官妻張氏士流之子與杜齊體數十年誕育一子壽過旬六而殂殁洎殯于家累旬後方窆于外啓攅之際覺其秘器搖動謂其還魂剖而視之見化作大蛇蟠蜿屈曲骨肉奔散俄頃徐徐入林莽而去出玉堂閒話又興元静明寺尼曰王三姑亦於棺中化為大蛇其杜妻即晩年不敬其夫老病視聽歩履皆不任持張氏顧之若犬彘凍餒而卒人以為化蛇其應也出玉堂閒話顧遂郎中顧遂嘗密話其先人嘗宰公安罷秩後僑寄于縣側荆江之壖四面多林木蘆荻月夜未寢徐歩出門見一條物巨如椽横於地謂是門闗舉足踢之其物應足而起自胸背至於腰下纒繳數十匝仆于地懵無所知其家訝其深夜不歸使人看之見腰間皎皛而明來往䃂于地上逼而視之見大蛇纒其身解之不可於是取利刃斷其蛇一叚叚置於地彎彎然不展繳勒悶絶因而失喑旬日而卒出玉堂閒話瞿塘峽有人遊於瞿塘峽時冬月草木乾枯有野火燎其峯巒連山跨谷紅焰照天忽聞巖崖之間若大石崩墜輷磕然有聲遂駐足伺之見一物圓如大囷䃂至平地莫知其何物也細而看之乃是一蛇也遂剖而驗之乃蛇吞一鹿在於腹内野火燒然墮于山下所謂巴蛇吞象信而有之出玉堂閒話靳老恒州井陘縣豐隆山西北長谷中有毒蛇據之能傷人里民莫敢至其所採藥人靳四翁入北山忽聞風雨聲乃上一孤石望之見一條白蛇從東而來可長三尺急上一樹蟠在西南枝上垂頭而歇須臾有一物如盤許大似蝦蟇色如烟熏褐土色四足而跳至蛇蟠樹下仰視蛇垂頭而死自是蛇妖不作前澧州有鵾鵊雛為蛇所吞有物如蝦蟇吐白氣直衝墜而致死得非靳老所見之物乎凡毒物必有能制者殆天意也出北夢𤨏言景煥景煥為壁州白石縣令行陟巴嶺峻險萬仞約七八程達玉女廟或有巨虺横亘其前徑可七八尺鱗甲不啻開扇許大頭尾垂在山下唯聞折木震響山谷童僕輩盡股慄驚駭莫能前進於是且駐山穴因登髙望之竟日方見其尾欲謂之龍龍之行動必有風雨隨之其日晴明方見是蛇也因知吞舟之魚翳天之鳥蟲禽之絶大者信有之焉出野人閒話舒州人舒州有人灊山見大蛇擊殺之視之有足甚以為異因負之出將以示人遇縣吏數人於路因告之曰我殺此蛇而有四足吏皆不見曰爾何在曰在爾前何故不見卽棄蛇於地乃見之於是負此蛇者皆不見人以為怪乃棄之案此蛇生不自𨼆其形死乃能𨼆人之形此理有不可窮者出稽神錄賈潭偽吳兵部尚書賈潭言其所知為嶺南節度使獲一橘其大如升將表上之監軍中使以為非常物不可輕進因取針微刺其蒂下乃蝡而動命破之中有小赤蛇長數寸出稽神錄姚景偽吳壽州節度使姚景為兒時事濠州節度使劉金給使廐中金嘗卒行至廐見景方寢有二小赤蛇戯於景面出入兩鼻中良久景寤乃不見金由是驟加寵擢妻之以女卒至大官出稽神錄王稔偽吳壽州節度使王稔罷歸揚都為統軍坐㕔事與客語忽有小赤蛇自屋墜地向稔而蟠稔令以器覆之良久發視唯一蝙蝠飛去其年稔加平章事出稽神錄安陸人安陸人姓毛善食毒蛇以酒吞之嘗遊齊安遂至豫章恒弄蛇於市以乞丏為事積十年餘有賣薪者自鄱陽來宿黄倍山下夢老父云為我寄一蛇與江西弄蛇毛生也乃至豫章觀歩門賣薪將盡有蛇蒼白色盤於船中觸之不動薪者方省向夢即攜之至市訪毛生因以與之毛始欲振撥應手囓其乳毛失聲顛仆遂卒食久即腐壊蛇亦不知所在焉出稽神錄太平廣記卷四百五十九
