body:
  text: 太平廣記卷四百四十六宋李昉等編畜獸十三猿下楚江漁者王仁裕獼猴翟昭徐寂之張寓言薛放曾祖楊于度獼猴猩猩好酒能言焦封果然狨猿下楚江漁者楚江邊有一漁者結茅臨流唯一草衣小舟綸竿而已别無所有時以魚換酒輒自狂歌醉舞人雖笑之略無慙色亦不言其姓氏識者皆以為漁之𨼆者或有問之曰君之漁𨼆人之漁耶漁人之漁耶漁者曰昔姜子牙之漁嚴子陵之漁書于青史皆以為𨼆人之漁也殊不知不釣其魚釣其名耳𨼆人之漁髙尚乎漁人之漁髙尚乎若以漁人之漁但有明月和風浪静得魚供庖宰一身足餘則易酒獨醉又焉知𨼆人之漁漁人之漁也問者深歎伏之忽一日有一人挈一小猿經於此其漁者見之悲號不止其小猿亦不肯前去似有愴戀之情其人甚怪漁者乃堅拜求此小猿言是余前年中所失者是一山僧付與幸垂憫察以見賜庶余不負山僧之義其人驚念遂特賜之漁者常恩養是小猿經一載忽告漁人輩曰我自於南山中有族屬今日辭爾輩歸之遂跳躍化為一老猿㩦其小猿奔走不知所之出瀟湘録王仁裕王仁裕嘗從事於漢中家於公署巴山有採捕者獻猿兒焉憐其小而慧􅃛使人養之名曰野賓呼之則聲聲應對經年則充博壯盛縻縶稍解逢人必齧之頗亦為患仁裕叱之則弭伏而不動餘人縱鞭箠亦不畏其公衙子城繚繞並是榆槐雜樹漢高廟有長松古栢上鳥巢不知其數時中春日野賓解逸躍入叢林飛趕于樹梢之間遂入漢高廟破鳥巢擲其雛卵于地是州衙門有鈴架羣鳥遂集架引鈴主使令尋鳥所來見野賓在林間即使人投瓦礫彈射皆莫能中薄暮腹枵方餒而就縶乃遣人送入巴山百餘里溪洞中人方囘詢問未畢野賓已在厨内謀餐矣又復縶之忽一日解逸入主帥厨中應動用食器之屬並遭掀撲穢汚而後登屋擲瓦拆塼主帥大怒使衆箭射之野賓騎屋脊而毁拆塼瓦箭發如雨野賓目不妨視口不妨呼手拈足擲左右避箭竟不能損其一毫有使院老將馬元章曰市上有一人善弄猢猻乃使召至指示之曰速擒來于是大猢猻躍上衙屋趕之踰垣驀巷擒得至前野賓流汗體浴而伏罪主帥亦不甚詬怒衆皆看而笑之于是頸上係紅綃一縷題詩送之曰放爾丁寜復故林舊來行處好追尋月明巫峽堪憐静路隔巴山莫厭深棲宿免勞青嶂夢躋攀應愜碧雲心三秋果熟松梢健任抱髙枝徹曉吟又使人送入孤雲兩角山且使縶在山家旬日後方解而縱之不復再來矣後罷職入蜀行次嶓冡廟前漢江之壖有羣猿自峭巖中連臂而下飲於清流有巨猿捨羣而前於道畔古木之間垂身下顧紅綃彷彿而在從者指之曰此野賓也呼之聲聲相應立馬移時不覺惻然及聳轡之際哀呌數聲而去及陟山路轉壑回溪之際尚聞嗚咽之音疑其腸斷矣遂繼之一篇曰嶓冡祠邊漢水濱此猿連臂下嶙峋漸來子細窺行客認得依稀是野賓月宿縱勞羈絏夣松餐非復稻粱身數聲腸斷和雲呌識是前年舊主人出王氏見聞獼猴翟昭晉太元中丁零王翟昭後宫養一獼猴在妓女房前前後妓女同時懐娠各産子三頭出便跳躍昭方知是猴所為乃殺猴及十子六妓同時號哭昭問之云初見一年少着黄練單衣白紗帢甚可愛語笑如人出續搜神記徐寂之太元末徐寂之常野行見一女子操荷舉手麾寂之寂之悦而延住此後來往如舊寂之便患瘦瘠時或言見華房深宇芳茵廣筵寂之與女觴餚宴樂數年其弟晬之聞屋内羣語潜往窺之見數女子從後戸出唯餘一者𨼆在簣邊晬之逕入寂怒曰今方歡集何故唐突忽復共言云簣中有人晬之即發看有一牝猴遂殺之寂病漸瘳出異苑張寓言山人張寓言素有道術博學多才常寓居於朝士家其宅大且凶主人移出寓言出飲甚醉而還不知其家已出遂寝於堂廡下夜半後頗醒豎告之寓言懼時夜昏黑乃有引其架上書者寓言自暗窺之乃鬼也集于書案之旁寓言計將撃之因起寓言多力先叱之鬼稱革寓言毆之而􅂿其喉就地又擊之因絶聲大呌云吾擒得鬼守者遂以火至乃一獼猴也被擊已死方知悞焉先是一沐猴不知何來每夜入人家偷竊及寓言以為鬼而殺之一里無患矣出紀聞薛放曾祖薛放尚書曾祖為湖南刺史罷郡京中閒居善治家且暮必策杖檢挍其宅常晨起因至厨中見竈内有燈熒熒然薛怒其㸑者曰燈不滅又置竈中何也及至竈前視之忽見一獼猴子長六七寸前有一小臺盤子方圓尺餘内食品物皆極小而甚備又前置一盞燈猴對之而食薛大駭異乃以拄杖刺之竈雖淺而盡其杖終不能及乃命妻子僮僕觀之皆莫測不知所為其猴忽置燈于盤子上以頭戴盤而出竈人行至堂前階上復設燈置盤而食傍若無人薛氏驚懼乃令子弟出外訪求術士以禳之及出門忽逢一道士乘驢謂薛氏子曰郎君神情極甚倉卒必有事故適過此宅見妖氣甚盛某平生所學道術以濟急難如有事請為郎君除之薛子大喜下馬拜請至宅使君具簪簡出迎妻女等悉拜迎坐于中堂猴見道士亦無懼色道士曰此乃使君積世深寃今之此來為禍不淺使君及薛子悲涕求請良久道士曰有幸相遇當為祛除然此物終當屈辱使君方肯解釋薛曰茍得無他敢辭屈辱道士曰此猴今欲將臺盤及燈上使君頭上食必當去可乎薛不敢辭妻子皆泣曰此是精魅物安可置頭上乞尊師别為一計道士曰不然先將臺盤子于頭上後令于盤中食之可乎妻子又曰不可道士曰不然無計矣薛又哀祈之良久道士曰家有厨櫃之𩔖乎令使君入其中令猴于其上食可乎皆曰可乃取木櫃中施裀褥薛入櫃中閉之猴即戴臺盤提燈而上乃置之而食妻子環繞其旁共憂涕泣忽失道士所在驚駭求覔之次猴及臺盤燈亦皆不見遂開櫃視之使君亦不見舉家號哭求覔無復踪跡遂具䘮服以櫃招魂而塟焉出靈保集楊于度蜀中有楊于度者善弄胡猻于闤闠中乞丐于人常飼養胡猻大小十餘頭㑹人語或令騎犬作叅軍行李則呵殿前後其執鞭驅策戴㡌穿靴亦可取笑一時如弄醉人則必倒之卧于地上扶之久而不起于度唱曰街使來輒不起御史中丞來亦不起或微言侯侍中來胡猻即便起走眼目張惶佯作懼怕人皆笑之侯侍中𢎞實廵檢内外主嚴重人皆懼之故弄此戲一日内廄胡猻維絶走上殿閣蜀主令人射之以其蹻㨗皆不之中竟不能捉獲者三日内豎奏楊于度善弄胡猻試令捉之遂以十餘頭入望殿上拜拱手作一行立内廐胡猻亦在舍上窺覷于度高聲唱言􅆢敇捉舍上胡猻來手下胡猻一時上舍齊手把捉内廐胡猻立在殿上蜀主大悅因賜楊于度緋衫錢帛收係敎坊有内臣因問楊于度胡猻何以敎之而㑹人言語對曰胡猻乃獸寔不㑹人語于度緣飼之靈砂變其獸心然後可敎内臣深訝其說則有好事者知之多以靈砂飼胡猻鸚鵡犬鼠等以敎之故知禽獸食靈砂尚變人心人食靈砂足變凡質出野人閒話獼猴獼猴見僧即必圍遶狀如供養戎瀘夷獠亦啗此物但於野外石上跏趺而坐以物蒙首有如坐禪則必相悦而來馴擾之逡廵衆去唯留一個伴假僧偶坐僧以斧擊將歸充食他日更要亦如前法擊之然衆竟不之覺又被人以其害稼乃致酒糟盆盛措於野逕仍削木棒可長一二尺者三五十條於側邉其猴啗糟醉後拈棒相擊脚手損折由此併獲是知嗜酒者得不鑒斯獸之賈害乎出北夢𤨏言猩猩好酒猩猩好酒與屐人欲取者置二物以誘之猩猩始見必大詈云誘我也乃疾走而去之去而復至稍稍相勸頃盡醉其足皆絆或圖而贊之曰爾形唯猿爾面唯人言不忝面智不逾身淮隂佐漢李斯相秦曷若箕山髙卧養真出國史𥙷能言安南武平縣封溪中有猩猩焉如羙人解人語知往事以嗜酒故以屐得之檻百數同牢欲食之衆自推肥者相送流涕而别時餉封溪令以帊葢之令問何物猩猩乃籠中語曰唯有僕并酒一壺耳令笑而受之養畜能傳送言語人不知也出朝野僉載焦封前浚儀令焦封罷任後䘮妻開元初客遊于蜀朝夕與蜀中富人飲博忽一日侵夜獨乘騎歸逢一青衣如舊相識馬前傳語邀封封方酒酣遂笑而從之心亦疑是悞相邀俄至一甲第屋宇峥嶸既堅請入封乃下馬入之須臾有十餘婢僕至並衣以羅紈飾之珠翠皆羙麗其容質此女僕齊稱夫人欲披揖封驚疑未已有花燭兩行前引見大扇擁蔽一女子年約十七八殊常儀貌遂令開扇引封前拜揖于堂而坐前後設瓊漿玉饌奏以女樂乃勸金樽于封夫人索紅牋寫詩一首以贈詩曰妾失鴛鴦伴君方萍梗遊小年懽醉後只恐苦相留封捧詩披閲沉吟良久方飲盡遂復酌金樽仍酧以一絶詩曰心常名宦外終不恥狂遊誤入桃源裏仙家爭肯留夫人覽詩笑而言曰誰教他誤入來要不留亦恐不得也封亦笑而答曰却恐不留誰怕留千年萬年夫人甚喜動顔色乃徐起佯醉歸帳命封伸伉儷之情至曙復開綺席歌樂嘹亮又與封共醉仍謂之曰妾是都督府孫長史女少􅃴王茂王茂客長安死妾今寡居幸見託于君子無以妾自媒為過當念卓王孫家文君慕相如曽若此也封復聞是語轉深眷戀不出經月餘忽自獨行而語曰我本讀詩書為名宦今日名與宦諸未稱心而沉迷于酒色月餘不出非丈夫也侍婢聞者告于夫人夫人謂封曰妾是􅆪纓家女君是宦途中人與君匹偶亦不相虧耳至于却欲以名宦榮身足得詣金闕謁明主也妾爭敢固留君身抑君顯達乎何傷歎若是封曰幸夫人念我無使我虛老蜀城夫人遂以金寳送封入闗及臨岐泣别仍贈玉環一枚謂封曰可珍重藏之我阿母與我幼時所弄之物也復吟詩一首以送詩曰鵲橋織女㑹也是不多時今日送君處羞言連理枝封覽詩受玉環愴情尤甚不覺沾灑留詩别曰但保同心結無勞織錦詩蘇秦求富貴自有一囘時夫人見詩悲哽良久復勸金爵而别封雖已發志囘京洛為名宦亦常悵恨别是佳麗方登閣道見嶮巇深所鬰鬰忽囘顧遙見夫人奔逐遂驚異以伺之遽至封前悲泣不已謂封曰我不忍與君離因潜奔趂君不謂今日復覩君之容幸挈我之京輦封疑訝復且喜遂相携達前旅次至昏黑有十餘猩猩來其妻奔出見之喜躍倍常乃顧謂封曰君亦不顧我東去我今幸女伴相召歸山願自保愛言訖化為一猩猩與同伴相逐而走不知所之出瀟湘録果然劍南人之采果然者得一果然其數十果然可得何哉果然有傷其𩔖者聚族悲啼雖殺之不去此禽獸之狀而人心也樂羊張仁願史牟則人之狀而禽獸心也出國史補狨狨者猿猱之屬其雄毫長一尺尺五者常自愛䕶之如人披錦繡之服也極嘉者毛如金色今之大官為暖座者是也生於深山中羣隊動成千萬雄而小者謂之狨奴獵師採取者多以桑弧檑矢射之其雄而有毫者聞人犬之聲則捨羣而竄抛一樹枝接一樹枝去走如飛或于繁柯穠葉之内藏隱其身自知茸好獵者必取之其雌與奴則緩緩旋食而𫝊其樹殊不揮霍知人不取之則有擕一子至十子者甚多其雄有中箭者則拔其矢齅之覺有藥氣則折而擲之嚬眉愁沮攀枝蹲于樹巔于時藥作抽掣手足俱散臨墮而却􅄃其枝􅄃是者數十度前後嘔噦呻吟之聲與人無别每口中涎出則悶絶手散墮在半樹接得一細枝稍懸身移時力所不濟乃墮于地則人犬齊到㫁其命焉獵人求嘉者不獲則便射其雌雌若中箭則解摘其子摘去復來抱其母身去離不獲乃母子俱斃若使仁人觀之則不忍寢其皮食其肉若無憫惻之心者其肝是銕石其人為禽獸昔鄧芝射猿其子㧞其矢以木葉塞瘡芝曰吾違物性必將死焉於是擲􅃓矢于水中山民無識安知鄧芝之為心乎出玉堂閒話大平廣記巻四百四十六
