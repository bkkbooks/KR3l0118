body:
  text: 太平廣記卷二百九十一神一龍門山太公望四海神延娟齊桓公晉文公鄭繆公晉平公齊景公妬女廟伍子胥屈原李冰土羊神梅姑秦始皇觀亭江神宛若竹王劉向何比干龍門山禹鑿龍關之山亦謂之門門至一空巖深數十里幽闇不可復行禹負火而進有獸狀如豕銜夜明之珠其光如燭又有青色犬行吠於前禹計行十餘里迷於晝夜既覺漸明見向來豕犬變爲人形皆著𤣥衣又見一神人靣禹因與之語神即示禹八卦之圖列於金板之上又有八神侍於此圖之側禹問曰華胥生聖子是汝邪答曰華胥是孔江神女以生余也乃探玉簡以授禹簡長一尺二寸以合十二時之數使度量天地禹即執持此簡以平定水土授簡披圖蛇身之神則羲皇之身也出拾遺錄太公望文王以太公望爲灌壇令朞年風不鳴條文王夢見有一婦人甚麗當道而哭問其故婦人言曰我東海泰山神女嫁爲西海婦欲東歸灌壇令當吾道太公有徳吾不敢以暴風疾雨過也文王夢覺明日召太公三日三夕果有疾風驟雨去者皆西來也文王乃拜太公爲大司馬出博物志四海神武王伐紂都洛邑明年陰寒雨雪十餘日深丈餘甲子平旦五丈夫乘馬車從兩騎止王門外師尚父使人持一器粥出曰大夫在内方對天子未有出時且進熱粥以知寒粥皆畢師尚父曰客可見矣乗車兩騎四海之神與河伯風伯雨師耳南海之神曰祝融東海之神曰勾芒北海之神曰顓頊西海之神曰蓐收河伯風伯雨師請使謁者各以其名召之武王乃於殿上謁者於殿下門内引祝融進五神皆驚相視而歎祝融等皆拜武王曰天隂乃遠來何以教之皆曰天伐殷立周謹來授命顧勅風伯雨師各使奉其職也出太公金匱延娟周昭王二十年東甌貢女一曰延娟二曰延娛俱辯麗詞巧能歌笑步塵無跡日中無影及王遊江漢與二女俱溺故江漢之間至今思之乃立祠於江上後十年人每見二女擁王泛舟戲於水際至暮春上巳之日禊集祠間或以時鮮甘果採蘭杜包裹之以沈於水中或結五色綵以包之或以金鐵繫其上乃蛟龍不侵故祠所號招祗之祠出拾遺錄齊桓公齊桓公遊於澤管仲御公見怪焉管仲曰澤有委蛇其大如轂其長如轅紫衣朱冠見人則捧其首而立見之者殆霸乎公曰此寡人之所見也出荘子又桓公北征孤竹來至卑耳之谿十里見人長尺而立人則具右袪衣走馬前以問管仲管仲曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山之神見走前導也袪衣前有水也右袪示從右渉也至如言出管子晉文公晉文公出有大蛇如拱當道文公乃修德使吏守蛇守蛇吏夢天使殺蛇謂曰蛇何故當聖君道覺而視之蛇則臭矣出博物志鄭繆公鄭繆公晝日處廟有神人面鳥身素服面狀方正繆公大懼神曰無懼帝厚汝明徳使錫汝壽十年使若國昌公問神明曰予爲勾芒也出墨子晉平公晉平公至澮上見人乘白驂八駟以來有狸身而狐尾去其車而隨公之車公問師曠師曠曰狸身而狐尾其名曰首陽之神飲酒於霍太山而歸其逢君於澮乎君其有喜焉出古文瑣語齊景公齊景公伐宋過泰山夢見二人怒公恐謂泰山之神晏子以宋祖湯與伊尹爲言其狀湯晢容多髭鬚伊尹黒而短即所夢也景公進軍不聽軍鼓毁公恐乃散軍不伐宋出物異志妬女廟幷州石艾壽陽二界有妬女泉有神廟泉瀵水深沈潔澈千丈祭者投錢及羊骨皎然皆見俗傳妬女者介子推妹與兄競去泉百里寒食不許斷火至今猶然女錦衣紅鮮裝束盛服及有人取仙丹百合經過者必雷風電雹以震之出朝野僉載伍子胥伍子胥累諫吳王賜屬鏤劒而死臨終戒其子曰懸吾首於南門以觀越兵來以鮧魚皮裹吾尸投於江中吾當朝暮乘潮以觀吳之敗自是自海門山潮頭洶高數百尺越錢塘漁浦方漸低小朝暮再來其聲震怒雷奔電走百餘里時有見子胥乘素車白馬在潮頭之中因立廟以祠焉廬州城内淝河岸上亦有子胥廟每朝暮潮時淝河之水亦鼔怒而起至其廟前高一二尺廣十餘丈食頃乃定俗云與錢塘潮水相應焉出錢塘志屈原屈原以五月日投汨羅水而楚人哀之至此日以竹筒貯米投水以祭之漢建武中長沙區曲白日忽見一士人自云三閭大夫謂曲曰聞君當見祭甚善但常年所遺恒爲蛟龍所竊今若有惠可以楝葉塞其上以綵絲纒之此二物蛟龍所憚也曲依其言今世人五月五日作粽幷帶棟葉及五色絲皆汨羅水之遺風出續齊諧志李冰李冰爲蜀郡守有蛟歲暴漂墊相望冰乃入水戮蛟已爲牛形江神龍躍冰不勝及出選卒之勇者數百持彊􅃓大箭約曰吾前者爲牛今江神必亦爲牛矣我以太白練自束以辨汝當殺其無記者遂吼呼而入須臾雷風大起天地一色稍定有二牛鬭於上公練甚長白武士乃齊射其神遂斃從此蜀人不復爲水所病至今大浪衝濤欲及公之祠皆瀰瀰而去故春冬設有鬬牛之戲未必不由此也祠南數千家邊江低圮雖甚秋潦亦不移適有石牛在廟庭下唐大和五年洪水驚潰冰神爲龍復與龍鬭於灌口猶以白練爲誌水遂漂下左綿梓潼皆浮川溢峽傷數十郡唯西蜀無害出成都記土羊神隴州汧源縣有土羊神廟昔秦始皇開御道見二白羊鬬遣使逐之至此化爲土堆使者驚而囘秦始皇乃幸其所見二人拜於路隅始皇問之答曰臣非人乃土羊之神也以君至此故來相謁言訖而滅始皇遂令立廟至今祭享不絶出隴州圖經梅姑秦時丹陽縣湖側有梅姑廟生時有道術能著履行水上後負道法夫怒殺之投屍於水乃隨波漂流至今廟處巫人常令殯斂不須墳𦵏即時有方頭漆棺在祠堂下晦朢之日時見水霧中瞹然有著履形廟左右不得取魚射獵輙有迷徑溺沒之患巫云姑既傷死所以惡見殘殺出法苑珠林秦始皇秦始皇作石橋欲過海觀日所出處傳云時有神能驅石下海陽城十一山今盡起立嶷嶷東傾如相隨行狀又云石去不速神人輙鞭之皆流血石莫不悉赤至今猶爾秦皇於海中作石橋或云非人功所建海神爲之竪柱始皇感其惠乃通敬於神求與相見神云我形醜約莫圖我形當與帝㑹始皇乃從石橋入三十里與神相見帝左右有巧者潜以脚畫神怒曰帝負約可速去始皇即轉馬前脚猶立後脚隨崩僅得登岸出三齊要略觀亭江神秦時有中宿縣千里水觀亭江神祠壇經過有不恪者必狂走入山變爲虎中宿縣民至洛及路見一行旅寄其書曰吾家在觀亭廟前石間懸藤即是也但扣藤自有應者乃歸如言果有二人從水中出取書而淪尋還云江伯欲見君此人不覺隨去便覩屋宇精麗飲食鮮香言語接對無異世間也出南越志宛若漢武帝起栢梁臺以處神君神君者長陵女嫁爲人妻生一男數歲死女悼痛之歲中亦死死而有靈其姒宛若祠之遂聞言宛若爲主民人多往請福説人家小事頗有驗平原君亦亊之其後子孫尊顯以爲神君力益尊貴武帝即位太后迎於宫中祭之聞其言不見其人至是神君求出乃營栢梁臺舍之初霍去病㣲時數自禱神神君乃見其形自修飾欲與去病交接去病不肯責神君曰吾以神君清潔故齋戒祈福今欲爲淫此非神明也自絶不復往神君亦慙及去病疾篤上令禱神君神君曰霍將軍精氣少命不長吾嘗欲以太一精補之可得延年霍將軍不曉此意乃見斷絶今不可救也去病竟卒衛太子未敗一年神君乃去東方朔娶宛若爲小妻生子三人與朔俱死出漢武故事竹王漢武帝時有竹王興有豚水有一女子浣於濵有三節大竹流入女子足間推之不去聞有聲持破之得一男兒及長遂雄夷濮氏竹爲姓所捐破竹於野成林王祠竹林是也王嘗從人止大石上命作羮從者曰無水王以劒擊石出水今竹王水是也後唐䝉開䍧牱斬竹王首夷獠咸怨以竹王非血氣所生求爲立祠帝封三子爲侯及死配父廟今竹王三郎祠其神也出水經劉向劉向於成帝之末挍書天禄閣專精覃思夜有老人著黄衣植青藜之杖扣閣而進見向暗中獨坐誦書老人乃吹杖端爛然火出因以照向具説開闢以前向因受五行洪範之文辭説繁廣向乃裂裳紳以記其言至曙而去向請問姓名云我太一之精天帝聞金卯之子有博學者下而教焉乃出懷中所牒有天文地圖之書余略授子焉向子歆從向授其術向亦不悟此人也出王子年拾遺記何比干汝南何比干通律法元朔中公孫洪辟爲廷尉右平獄無寃民號曰何公征和初去官在家天大陰雨晝寢夢有客車騎覺而一老嫗年八十餘頭盡白求寄避雨雨方甚而嫗衣履不濡比干異之延入座須臾雨止嫗辭去出送至門跪謂比干曰君先出自后稷堯至晉有隂徳及公之身當繼公一人今天賜䇿以廣公子孫佩印綬者當隨簡長九寸凡百九十板以授比干曰子孫佩印綬者當隨此算嫗東行忽不見比干年五十八有六男後三歲復生三男徙平陵八男去一子留常祭嫗如東行及終遺令東首自比干已下與張氏俱授靈瑞累世爲名族三輔舊語曰何氏䇿張氏鉤也出三輔決録太平廣記卷二百九十一
