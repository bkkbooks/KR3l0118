body:
  text: 太平廣記卷六十二女仙七魯妙典諶母旴母杜蘭香白水素女蔡女仙蓬球紫雲觀女道士秦時婦人何二娘魯妙典魯妙典者九嶷山女冠也生即敏慧高潔不食葷飲酒十餘嵗即謂其母曰旦夕聞食物臭濁往往鼻腦疼痛願求不食舉家憐之復知服氣餌藥之法居十年常悒悒不樂因謂母曰人之上夀不過百二十年哀樂日以相害況女子之身豈可復埋没真性混於凡俗乎有麓床道士過之授以大洞黄庭經謂曰黄庭經扶桑大帝君宫中金書誦詠萬遍者得為神仙但在勞心不倦耳經云詠之萬徧昇三天千災已消百病痊不憚虎狼之凶殘亦已却老年永延居山獨處詠之一遍如與十人為侣輒無怖畏何者此經召集身中諸神澄正神氣神氣正則外邪不能干諸神集則怖畏不能及若形全神集氣正心清則徹見千里之外纖毫無隱矣所患人不能知知之而不能修修之而不能精精之而不能乆中道而喪自棄前功不惟有𤣥科之責亦將流蕩生死苦報無窮也妙典奉戒受經入九嶷山岩棲靜默累有魔試而貞介不撓積十餘年有神人語之曰此山大舜所理天地之總司九州之宗主也古有高道之士作三處麓床可以棲庇風雨宅形念貞嵗月既乆旋皆朽敗今為制之可以遂性宴息也又十年真仙下降授以靈藥白日昇天初妙典居山峰上無水神人化一石盆大三尺長四尺盆中常自然有水用之不竭又有大鐵臼亦神人所送不知何用今並在上仙壇石上宛然有仙人履跡各古鏡一面大三尺鐘一口形如偃月皆神人送來並妙典昇天所留之物今在無為觀出集仙錄諶母嬰母者姓諶氏字曰嬰不知何許人也西晉之時丹陽郡黄堂觀居焉潛修至道時人自童幼逮衰老見之顏狀無改衆號為嬰母因入吳市見一童子可年十四五前拜於母云合為母兒母曰年少自何而來拜吾為母既非其𩔖不合大道童子乃去月餘又吳市逢有三嵗孩子悲啼呼呌倐遇諶母執母衣裾曰我母何來母哀而收育之逾於所生既長明頴孝敬異於常人冠嵗以來風神挺邁所居常有異雲氣光景彷彿時説蓬萊閬苑之事母異之謂曰吾與汝暫此相因汝以何為號也子曰昔蒙天真盟授靈章錫以名品約為孝道明王今宜稱而呼之矣遂告母修真之訣曰每須高處𤣥臺踈絶異黨修閒丘阜餌順陽和靜夷𤣥圃委鑒前非無英公子黄老玉書大洞真經豁落七元太上隱𤣥之道可致宴息以流霞之障睠眄乎文昌之臺得此道者九鳳齊唱天籍駭虚竦身御節入景浮空龍車虎旂遊遍八方矣母宜寳之一旦孝道明王漠然隱去母宻修道法積數十年人莫知也其後吳猛許遜自高陽南遊詣母請傳所得之道因盟而授之孝道之法遂行江表閒日每告二子曰世雲昔為遜師今玉皇𤣥譜之中猛為御史而遜為高明大使總領仙籍五品已􅁶又所主十二辰配十二國之分野遜領𤣥枵之野於辰為子猛統星紀之邦於辰為丑許當居吳之上以從仙階之等降也又數年有雲龍之駕千乘萬騎來迎諶母白日昇天今洪州高安縣東四十里有黄堂靜壇即許君立祠朝拜聖母之所其昇天事迹在丹陽郡中後避唐宣宗廟諱鍾陵祠號為諶母其孝道之法與靈寳小異豫章人世世行之出墉城集仙録旴母旴母者豫章人也外混世俗而内修真要常云我千年之前曽居西山世累稍息當歸真於彼其子名烈字道㣲少喪父事母以孝聞家貧而營侍甘㫖未嘗有闕鄉里推之西晉武帝時同郡吳猛許遜精修通感道化宣行居洪崖山築壇立靜猛既去世遜即以寳符真籙拯俗救民逺近宗之遜仕闕州為記室後每朔望還家朝拜人或見其乘龍往來徑速如咫尺耳旴君淳篤忠厚遜委用之即與母結草於遜宅東北八十餘歩旦夕侍奉謹愿恭肅未嘗有怠母常於山下採擷花果以奉許君君惜其誠志常欲拯度之元慶二年壬子八月十五日太上命玉真上公崔文子太𤣥真卿瑕丘仲册命徵拜許君為九州都仙大使高明主者白日昇天許謂道㣲及母曰我承太帝之命不得乆留汝可後隨仙轝期於異日母子悲不自勝再拜告請願侍雲輦君許之即賜靈藥服之躬禀真訣於是午時從許君昇天今壇井存焉鄉人不敢華繕盖旴君母子儉約故也世號為旴母井焉出集仙錄杜蘭香杜蘭香者有漁父於湘江洞庭之㟁聞兒啼聲四顧無人惟三嵗女子在㟁側漁父憐而舉之十餘嵗天姿竒􅊆靈顏姝瑩迨天人也忽有青童靈人自空而下來集其家㩦女而去臨昇天謂其父曰我仙女杜蘭香也有過謫于人間𤣥期有限今去矣自後時亦還家其後於洞庭包山降張碩家盖修道者也蘭香降之三年授以舉形飛化之道碩亦得仙初降時留玉簡玉唾盂紅火浣布以為登真之信焉又一夕命侍女賫黄麟羽帔絳履𤣥冠鶴氅之服丹玉珮揮劍以授於碩曰此上仙之所服非洞天之所有也不知張碩仙官定何班品漁父亦老因益少往往不食亦學道江湖不知所之出集仙錄白水素女謝端晉安侯官人也少喪父母無有親屬為鄰人所養至年十七八恭謹自守不履非法始出作居未有妻鄉人共愍念之規為娶婦未得端夜卧早起躬耕力作不捨晝夜後於邑下得一大螺如三升壺以為異物取以歸貯甕中畜之十數日端每早至野還見其户中有飯飲湯火如有人為者端謂是鄰人為之惠也數日如此端便往謝鄰人鄰人皆曰吾初不為是何見謝也端又以為鄰人不喻其意然數爾不止後更實問鄰人笑曰卿以自取婦宻着室中炊㸑而言吾為人炊耶端默然心疑不知其故後方以雞初鳴出去平早潛歸於籬外竊窺其家見一少女從甕中出至竈下燃火端便入門徑造甕所視螺但見女仍到竈下問之曰新婦從何所來而相為炊女人惶惑欲還甕中不能得答曰我大漢中白水素女也天帝哀卿少孤恭慎自守故使我權相為守舍炊烹十年之中使卿居富得婦自當還去而卿無故竊相伺掩吾形已見不宜復留當相委去雖爾後自當少差勤於田作漁採治生留此殻去以貯米糓常可不乏端請留終不肯時天忽風雨翕然而去端為立神座時節祭祀居常饒足不致大富耳於是鄉人以女妻端端後仕至令長云今道中素女是也出搜神記蔡女仙蔡女仙者襄陽人也幼而巧慧善刺繡隣里稱之忽有老父詣其門請繡鳳眼畢功之日自當指㸃既而繡成五綵光煥老父觀之指視安眼俄而功畢雙鳳騰躍飛舞老父與仙女各乘一鳳昇天而去時降於襄陽南山林木之上時人名為鳳林山後於其地置鳳林闗闗南山側有鳳臺𠡠於其宅置靜貞觀有女仙真像存焉云晉時人也出仙傳拾遺蓬球貝丘西有玉女山傳云晉太始中北海蓬球字伯堅入山伐木忽覺異香遂遡風尋至北山廓然宫殿盤鬱樓臺博敞球入門窺之見五株玉樹復稍前有四婦人端妙絶世共彈棊於堂上見球俱驚起謂球曰蓬君何故得來球曰尋香而至遂復還戲一小者便上樓彈琴留戲者呼之曰元暉何為獨昇樓球樹下立覺少饑乃以舌䑛葉上垂露俄然有一女乘鶴而至迎惠曰玉華汝等何故有此俗人王母即令王方平行諸仙室球懼而出門囘顧忽然不見至家乃是建平中其舊居閭舍皆為墟矣出酉陽雜爼紫雲觀女道士唐開元二十四年春二月駕在東京以李適之為河南尹其日大風有女冠乘風而至玉貞觀集于鐘樓人觀者如堵以聞于尹尹率略人也怒其聚衆袒而笞之至十而乘風者既不哀祈亦無傷損顏色不變於是適之大駭方禮請奏聞𠡠召入内殿訪其故乃蒲州紫雲觀女道士也辟榖乆輕身因風遂飛至此𤣥宗大加敬畏錫金帛送還蒲州數年後又因大風遂飛去不返出紀聞秦時婦人唐開元中代州都督以五臺多客僧恐妖偽事起非有住持者悉逐之客僧懼逐多權竄山谷有法朗者深入鴈門山幽澗之中有石洞容人出入朗多賫乾糧欲住此山遂尋洞入數百歩漸闊至平地渉流水渡一岸日月甚明更行二里至草屋中有婦人並衣草葉容色端麗見僧懼愕問云汝乃何人僧曰我人也婦人笑云寧有人形骸如此僧曰我事佛佛須擯落形骸故爾因問佛是何者僧具言之相顧笑曰語甚有理復問宗㫖如何僧為講金剛經稱善數四僧因問此處是何世界婦人云我自秦人隨蒙恬築長城恬多使婦人我等不勝其弊逃竄至此初食草根得以不死此來亦不知年嵗不復至人間遂留僧以草根哺之澁不可食僧住此四十餘日暫辭出人間求食及至代州備糧更去則迷不知其所矣出廣異記何二娘廣州有何二娘者以織鞋子為業年二十與母居素不修仙術忽謂母曰住此悶意欲行遊後一日便飛去上羅浮山寺山僧問其來由答云願事和尚自爾恒留居止初不飲食每為寺衆採山果充齋亦不知其所取羅浮山北是循州去南海四百里循州山寺有楊梅樹大數十圍何氏每採其實及齋而返後循州山寺僧至羅浮山説云某月日有仙女來採楊梅驗之果是何氏所採之日也由此逺近知其得仙後乃不復居寺或旬月則一來耳唐開元中𠡠令黄門使往廣州求何氏得之與使俱入京中途黄門使悦其色意欲挑之而未言忽云中使有如此心不可留矣言畢踊身而去不知所之其後絶跡不至人間矣出廣異記太平廣記卷六十二
