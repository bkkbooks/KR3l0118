body:
  text: 太平廣記卷七十四道術四俞叟陳季卿陳生張定石旻唐武宗朝術士俞叟尚書王公潜莭度荆南時有吕氏子衣敝舉䇿有飢寒之色投刺來謁公不為禮甚怏怏因寓扵逆旅月餘窮乏益甚遂鬻所乗驢扵荆州市有市門監俞叟者召吕生而語且問其所由吕生曰吾家扵渭北家貧親老無以給㫖甘之飬府帥公吾之重表丈也吾不逺而來兾哀吾貧而周之入謁而公不一顧豈非命也叟曰某雖貧無資食以賙吾子之急然向者見吾子有飢寒色甚不平今夕為吾子具食幸宿我宇下生無以辭焉吕生既諾扵是延入一室湫隘卑陋摧簷壊垣無牀榻茵褥致敝蓆扵地與吕生坐語久命食以陶器進脱粟飯而已食訖夜既深謂吕生曰吾早年好道常隐居四明山従道士學却老之術有志未遂自晦迹扵此僅十年而荆人未有知者以吾子困扵覊旅得無動扵心耶今夕為吾子設一小術以致歸路裹糧之費不亦可乎吕生雖疑誕妄然甚覺其異叟因取一缶合扵地僅食頃舉而視之見一人長五寸許紫綬金腰帶俛而拱焉俞叟指曰此乃尚書王公之魂也吕生熟視其狀貌果𩔖王公心黙而異之因戒曰吕乃汝之表姪也家苦貧無以給旦夕之膳故自渭北不逺而來汝宜厚給館榖盡親親之道汝何自矜曽不一顧豈人心哉今不罪汝宜厚貲之無使為留滯之客紫衣僂而揖若受教之狀叟又曰吕生無僕馬可致一匹一僕縑二百疋以遺之紫衣又僂而揖扵是却以缶合扵上有頃再啓之已無見矣明旦天將曉叟謂吕生曰子可疾去王公旦夕召子矣及歸逆旅王公果使召之方見且謝曰吾子不逺見訪属軍府務殷未果一日接言深用為愧幸吾子察之是日始館吕生驛亭與宴逰累日吕生告去王公贈僕馬及縑二百吕生益竒之然不敢言及歸渭北後數年因與友人數軰㑹宿語及靈怪始以其事説扵人也出宣室志陳季卿陳季卿者家于江南辭家十年舉進士志不能無成歸覊棲輦下鬻書判給衣食常訪僧扵青龍寺遇僧他適因息扵暖閣中以待僧還有終南山翁亦伺僧歸方擁爐而坐揖季卿就爐坐久謂季卿曰日已晡矣得無餒乎季卿曰實飢矣僧且不在為之奈何翁乃扵肘後􅄙一小嚢出藥方寸止煎一杯與季卿曰粗可療飢矣季卿啜訖充然暢適飢寒之苦洗然而愈東壁有寰瀛圗季卿乃尋江南路因長嘆曰得自渭泛于河逰扵洛泳于淮濟于江達于家亦不悔無成而歸翁笑曰此不難致乃命僧童折堦前一竹葉作葉舟置圗中渭水之上曰公但注目扵此舟則如公向來所願耳然至家慎勿久留季卿熟視久之稍覺渭水波浪一葉漸大蓆帆既張恍然若登舟始自渭及河維舟扵禪窟蘭若題詩扵南楹云霜鐘鳴時夕風急亂鴉又望寒林集此時輟棹悲且吟獨向蓮花一峯立明日次潼闗登岸題句扵闗門東普通院門云度闗悲失志萬緒亂心機下坂馬無力掃門塵滿衣計謀多不就心口自相違已作羞歸計還勝羞不歸自陕東凡所經厯一如前願旬餘至家妻子兄弟拜迎扵門側有江亭晚望詩題于書齋云立向江亭滿目愁十年前事信悠悠田園已逐浮雲散鄉里半随逝水流川上莫逢諸釣叟浦邉難得舊沙鷗不縁齒髪未遲暮吟對逺山堪白頭此夕謂其妻曰吾試期近不可久留即當返棹乃吟一章别其妻云月斜寒露白此夕去留心酒至添愁飲詩成和淚吟離歌凄鳯管别鶴怨瑶琹明夜相思處秋風吹半衾將登舟又留一章别諸兄弟云謀身非不早其柰命來遲舊友皆霄漢此身猶路岐北風㣲雪後晚景有雲時惆悵清江上區區趂試期一更後復登葉舟泛江而逝兄弟妻属慟哭於濵謂其鬼物矣一葉漾漾遵舊途至扵渭濵乃賃乗復逰青龍寺宛然見山翁擁褐而坐季卿謝曰歸則歸矣得非夢乎翁笑曰後六十日方自知而日將晚僧尚不至翁去季卿還主人後二月季卿之妻子賫金帛自江南來謂季卿厭世矣故來訪之妻曰某月某日歸是夕作詩扵西齋并留别二章始知非夢明年春季卿下第東歸至禪窟及闗門蘭若見所題兩篇翰墨尚新後年季卿成名遂絶粒入終南山去出纂異記陳生茅山陳生者休糧服氣所居草堂數間偶至延陵到傭作坊求人負擔藥物却歸山居以價錢多不肯有一夫壯力然神少頗若癡者疥瘡滿身前拜曰去得遂令挈嚢而従行其直多少亦不問也既至因願留採薪都不計其價與陳生約日五束陳生曰吾辟榖無飯與飡曰某是貧窮人何處得食但㔉草根飡亦可矣遂每日斫柴十束五束留扵房内自燒五束供陳生㑹山下有衣冠家妻患齒詣陳生覔藥其家日求之又令小婢送棃果餅子之𩔖陳生休糧果食亦不食也每至則􅀍傭者接而食之仍笑謂曰明日更送來我當有藥如此者數四一日傭者并送柴十束納陳生處為兩日用夜後遂扃門熾火擕一小鍋入陳生宻窺之見扵葫蘆中瀉水銀數合煎之攪如稀餳投一丸藥乃為金矣傭者撚両丸以紙裹置懐中餘作一金餅宻賫出門去明日日髙起求藥者已至乃持丸者付之令患齒者含之一丸未半乃平復矣痛止第出蟲數十陳生伺傭者出于房内搜而觀之得書二卷不喻其㫖遂藏之傭者至大怒罵陳生生不敢隐却還之曰某今去矣遂出門入水沐浴乃變為美少年無復瘡疥也拜訖跳入深澗中遂不知所之出逸史張定張定者廣陵人也童幼入學天寒月曉起早街中無人獨行百餘歩有一道士行甚急顧見之立而言曰此可教也因問汝何所好荅曰好長命耳道流曰不難致汝有仙􅇧求道必成且教汝變化之術勿泄于人十年外吾自迎汝因以口訣教之定謹訥小心扵家甚孝亦曽私為此術召鬼神化人物無不能者與父母往連水省親至縣有音樂戯劇衆皆觀之定獨不往父母曰此戱甚盛親表皆去汝何獨不看耶對曰恐尊長要看兒不得去父母欲往定曰此有青州大設可亦看也即提一水瓶可受二斗以來空中無物置扵庭中禹步遶三二匝乃傾扵庭院内見人無數皆長六七寸官僚將吏士女看人喧闐滿庭即見無比設㕔戯塲局筵隊仗音樂百戯樓䑓車棚無不精審如此宴設一日父母與看之至夕復側瓶扵庭人物車馬千羣萬隊邐迤俱入瓶内父母取瓶視之亦復無一物又能自以刀劍剪割手足刳剔五臟分掛四壁良久自復其身晏然無苦每見圗障屏風有人物音樂者以手指之皆能飛走歌舞言笑趨動與真無異父母問其従何學之曰我師姓藥海陵山神仙也已錫昇天之道約在十年今七年矣辭家入天柱潜山臨去白父母曰若有意念兒自歸來無深慮也如是父母念之即便還家尋復飛去一日謂父母曰十六年後廣陵為瓦礫矣可移家海州以就福地留丹三粒與父母曰服之百餘年無疾自此不復歸父母服丹神氣輕爽飲食嗜好倍扵少壯者遂移居海州乾符中父母猶在出仙傳拾遺石旻有石旻者不知何許人也浪迹江湖之間有年數矣道術𤣥妙殆不可測長慶中客扵宛陵郡有雷氏子常為宣城部將一日與友人數輩㑹飲于郡南别墅旻亦在座其家僮網得一魚長數尺致扵舍是日雷生與客俱深醉諸客盡去獨旻宿雷氏别墅時夏暑方盛及明日視其魚已敗爛不可食矣家僮將棄之旻謂之曰此魚雖敗吾有良藥尚可活之安可棄耶雷生笑曰先生妄矣誠有良劑安能活此魚耶曰吾子幸觀之于是衣中出一小嚢嚢有藥數粒投扵敗魚之上僅食頃其魚鮮潤如初俄而揺鬛振鱗若在洪流中雷生驚異再拜謝曰先生之術可謂神矣某輩塵俗聾瞽望先生髙踪若井鮒之與雲禽焉得而為伍乎先是雷生有癥疾積年既而求旻衣中之丹餌欲冀瘳其久苦旻不可且曰吾之丹至清至亷爾曹俗人嗜好無莭臟腑之内腥羶委集設使以吾丹餌求置其中則臟腑之氣與藥力相攻若水火之交戰寜有全人乎慎不可食旻又言神仙不難得但塵俗多累若檻猿籠鳥徒有騫翔超騰之心安可致乎㑹昌中卒扵呉郡也出宣室志唐武宗朝術士唐武宗皇帝好神仙異術海内道流方士多至輦下趙歸真探賾𤣥機以制鉛汞見之者無不竦敬請扵禁中築望仙䑓髙百尺以為驂鸞馭鶴可刻期而往常云飛錬須得生銀詔使扵樂平山收採既而大役工徒所出者皆頑石礦無従而得歸真乃齋醮數朝以御札致扵巖穴俄有老人杖䇿而至曰山川寳物葢為有道而出況明主以修真為念是何感應不臻尊師無復懐憂明日當従請語罷而出莫知所之是夕有聲如雷山礦豁開數十丈銀液坌然而湧與入用之數相符禁中修煉至多外人不知其術復有金陵人許元長王瓊者善書符幻變近于役使鬼神㑹昌中召至京國出入宫闈武皇謂之曰吾聞先朝有明崇儼善扵符籙常取羅浮柑子以資御果萬里往来止扵旬日我師得不建先朝之術比美崇儼乎元長起謝曰臣之受法未臻𤣥妙若渉越山海恐誣聖徳但千里之間可不日而至武宗曰東都常進石榴時已熟矣卿是今夕當致十顆元長奉詔而出及旦寢殿始開以金盤貯石榴置扵御榻俄有中使進奏亦以所失之數上聞靈騐變通皆此𩔖也王瓊妙扵祝物無所不能方冬以藥封桃杏數株一夕繁英盡發芳芬穠艶月餘方謝及武皇厭代歸真與瓊俱竄逐嶺表唯元長逸去莫知所在出列仙譚録太平廣記卷七十四
