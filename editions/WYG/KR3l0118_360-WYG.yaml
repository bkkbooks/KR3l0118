body:
  text: 太平廣記卷三百六十宋李昉等編妖怪二庾翼庾謹商仲堪夀頒李勢郗恢庾實乞佛熾盤姚紹桓振賈弼之江陵趙姥諸葛長民鹽官張氏王愉朱宗之虞定國丁譁富陽王氏樂遐劉斌王徵張仲舒蕭思話傅氏女郭仲産劉順王譚周登之黄尋荆州人田騷鄧差司馬申段暉庾翼庾翼為南蠻校尉南郡太守夜登厠忽見厠中一物頭如方相兩眼大而有光從土中坐庾乃攘袂以拳擊之應拳有聲忽失所在出渚宫故事庾謹新埜庾謹母病兄弟三人悉在侍疾忽聞牀前狗鬭聲非常舉家共視了不見狗只見一死人頭在地猶有血兩眼尚動其家怖懼夜持出於後園中埋之明旦視之出在土上兩眼猶爾即又埋之後旦已復出乃以塼著頭令埋之不復出後數日其母遂亡出幽㝠錄商仲堪晉商仲堪曽從桓𤣥行至鶴穴逢一老公驅一青牛形色瓌異堪即以所乗牛易而取之行至零陵溪牛忽駿駃非常因息駕顧之牛乃徑走入江伺之終日不出堪心以為怪未幾𤣥敗堪亦被誅戮焉出幽㝠錄夀頒晉孝武大元十二年吳郡夀頒道志邊水為居渚次忽生一雙物狀若青藤而無枝葉數日盈拱試共伐之即有血出聲在空中如雄鵞呌兩音相應腹中得一卵形如鴨子其根頭似虵面眼出異苑李勢蜀王李勢宫人張氏有妖容勢寵之一旦化為大斑理虵長丈餘送於苑中夜復求寢牀下勢懼遂殺之復有鄭美人勢亦寵之化為雌虎一夕食勢寵姬未幾勢為桓温所殺出獨異志郗恢安帝隆安初雍州刺史髙平郗恢家内忽有一物如蜥蜴每來輙先扣户則便有數枚便滅燈火兒女大小莫不驚懼以白郗不信須臾即來至龍安二年郗恢與殷仲堪謀議不同下奔京師道路遇害并及諸子出幽㝠錄庾實義熙中新野庾實妻滎陽毛氏五月暴曬薦席忽有三嵗女在蓆下卧驚怛乃滅女真形在别牀如故不旬日而女夭出五行記乞佛熾盤西秦乞佛熾盤都長安端門外又有井人常宿汲水亭之下而夜聞磕磕有聲驚起照視瓮中如血中有丹魚長可三寸而有寸光時東羌西虜互相攻伐國尋滅亡出異苑姚紹後秦姚泓義熙十三年遣叔父大將軍紹帥衆攻函谷闗厨人為紹炊飯氣蒸汗溜輙成血腥甚如此積日紹心惡之令勿復炊乞飯於諸軍後八十日紹病死泓為晉將劉裕所擒斬於建康市出五行記桓振桓振在淮南夜聞人登牀聲振聽之𨼆然有聲求火看之見大聚血俄為義師所滅桓振𤣥從父之弟出異苑賈弼之河東賈弼之晉義熈中為瑯琊府參軍夜夢一人面查醜甚多鬚大鼻詣之曰愛君之貌欲易頭可乎弼曰人各有頭面豈容此理明晝又夢意甚惡之乃於夢中許之明朝起不覺而人見悉驚走弼取鏡自看方知怪異還家家人悉驚入内婦女走藏曰那得異男子弼自陳說良久并遣至府檢閱方信後能半面笑兩手各執一筆俱書辭意皆美俄而安帝崩恭帝立出西明雜録江陵趙姥江陵趙姥以酤酒為業義熙中屋内土忽自隆起察為異朝夕以酒酹土嘗見一物出頭似驢而地初無孔穴及姥死鄰人聞土下朝夕有聲如哭後人掘宅見一異物蠢而動不測大小須臾失之謂土龍出異苑諸葛長民安帝時諸葛長民為豫州刺史有搗衣杵相與語如人聲不可􅄙令移各一處俱遙相喚又長民在豫州時見屋中柱及椽梠間悉見有一蛇頭令人以刀砟之應刃藏𨼆或一月或數十日輙於夜眠中驚起跳踉如與人相打毛修之嘗與之同宿駭愕不達此意長民曰此物竒健非我無以制之毛曰是何物長民曰我正見一物甚黒而有手足不分明莫知其形狀而來輙共鬭甚自懼焉長民俄而伏誅出五行志鹽官張氏晉末有張氏在鹽官閒居端坐忽聞煎食香斯須風吹一盤食至酒肉肴饌畢備有黄袍人乗輿來上牀與張共食問其姓含笑不答久之登輿而去後張為孫恩所害而已出廣古今五行記王愉王愉自茂和義熙初愉在庭中行帽忽自脫仍椉空如人所著及愉母喪月朝上祭酒器在几上酒器須臾下地覆還登牀尋而第三兒懐緩貳伏誅出異苑朱宗之㑹稽國司理令朱宗之常見亡人殯去頭三尺許有一青物狀如覆瓮人或當其處則滅人去隨復見凡屍頭無不有此青物者又云人殯時鬼無不暫還臨之出幽㝠錄虞定國餘姚虞定國有好儀容同縣􅂫氏女亦有美色定國嘗見恱之後見定國來主人留宿中夜告􅂫公曰賢女令色意甚欽之此夕寜能令暫出否主人以其鄉里貴人便令女出從之往來漸數語􅂫公無以相報若有官事其為君任之主人喜自爾後有役召事往造定國定國大驚曰都未嘗面命何由便爾此必有異具說之定國曰僕寜當請人之父而婬人之女君復見來便斫之後果得怪出搜神記丁譁東陽丁譁出􅀈於方山亭宿亭渚有劉散騎遭母艱於京還𦵏夜中忽有一婦自通云劉郎患瘡聞參軍能治故來耳譁使前姿形端媚從婦數人命僕具肴饌酒酣嘆曰今夕之㑹令人無復貞白之操丁云女郎盛徳豈顧老夫便令婢取琵琶彈之歌曰久聞忻重名今遇方山亭肌體雖朽老故是悦人情放琵琶上膝抱頭又歌曰女形雖薄賤願得忻作婿繾綣觀良覿千載結同契聲氣婉媚令人絶倒便令滅火共展好情比曉忽不見吏云此亭舊有妖魅出幽㝠記富陽王氏宋元嘉初富陽人姓王於窮瀆中作蟹斷旦徃視之見一材長二尺許在斷中而斷裂開蟹都出盡乃修治斷出材岸上明往視之材復在斷中斷敗於前王又治斷出材晨視所見如初王疑此材妖異乃取内蟹籠中束頭擔歸云至家當斧斫然之未至家三里聞籠中窣窣動轉頭見向材頭變成一物人面猴身一手一足語王曰我性嗜蟹比日實入水破君蟹斷入斷食蟹相負已爾望君見恕開籠出我我是山神當相祐助并令斷大得蟹王曰汝犯暴人前後非一罪自應死此物種𩔖專請乞放王廻顧不應物曰君何名我欲知之頻問不已王遂不答去家轉近物曰既不放我又不告我何姓名當復何計但應就死耳王至家熾火焚之後寂然無復異土俗謂之山􅀈云知人姓名則能中傷人所以勤勤問王欲害人自免出搜神記樂遐元嘉九年南陽樂遐嘗在内坐忽聞空中有人呼其夫婦名甚急半夜乃止殊自驚懼後數日婦屋後還忽舉體衣服悉是血未一月夫婦相繼病卒出幽㝠記劉斌劉斌在吳郡時婁縣有一女忽夜椉風雨恍恍至郡城内自覺去家正一炊頃衣不霑濡曉在門上求通言我天使也府君宜起延我當大富貴不爾必有凶禍劉問所來不自知後二十許日劉被誅出幽㝠錄王徵元嘉中交州刺史太原王徵始拜椉車出行聞其前錚鋒有聲見一輀車當路而餘人不見至州遂亡出幽㝠記張仲舒張仲舒元嘉十七年七月中晨夕間輙見門側有赤氣赫然後庭中忽雨綘羅於其庭廣七八寸長五六寸皆以箋繫之紙廣長亦與羅等紛紛甚駃仲舒惡而焚之信宿暴疾而死出異苑蕭思話蕭思話在青州常所用銅升覆在藥厨下忽於其下得二死雀思話歎曰升覆雀殯其不祥乎既而被繫出宋書傅氏女北地傅尚書小女嘗拆荻作鼠以狡獪放地荻鼠忽能行徑入户眼土中又拆荻更作咒之云汝若為家怪者當更行不者不動放地便復行如前即掘限内覓入地數尺了無所見後諸女相繼喪亡出列異傳􅀈仲産􅀈仲産宅在江陵枇杷寺南宋元嘉中起齋屋竹以為牕櫺竹遂漸生枝葉長數丈鬱然成林仲産以為吉祥及孝建中被誅出述異記劉順宋大元中頓丘令劉順酒酣蚤入妾許房眠晨起見榻上有一聚凝血如覆盆形劉是武人了不驚怪乃令作虀親自切血染虀食之棄其有餘後十許載至元徽二年為王道隆所害出述異記王譚大明中琅琊王譚字思𤣥為南陽太守母喪去職寄郡城南設廬位於庭有一光大如鴨卵黄色分明從東來入㕔事上俄頃又二枚續至其狀如前良久而去自此夕夕來往或單至雙來久停則滅一夜或四五來如此十許日不見其年譚二婢死明年弟亡譚患疾至都而卒出廣古今五行記周登之周登之家在都宋明帝時統諸靈廟甚被恩寵母謝氏奉佛法泰始三年夏月暴雨有物形𨼆烟霧垂頭屬㕔事前地頭如大赤馬飲庭中水登之驚駭謂是善神降之汲水益之飲百餘斗水竭乃去二年而謝氏亡後半載而明帝崩登之自此事業衰敗出述異記黄尋後魏宣武帝景明年中海陵人黄尋先居家單貧忽風雨飛錢至其家後巨富錢至數萬其年被誅出五行記荆州人梁元帝天監元年荆州刑人殺了其身不僵手墮於地動口張目血如箭直上丈餘然後如雨細下是嵗荆州大旱與晉愍帝督運令史湻于伯同出廣古今五行記田騷田騷南陽人梁末晚暮執弓箭從婦家還去舍十里無伴畏懼遥望前路坂頭有緋衣小兒急逐之及到問曰汝何材小兒小兒曰家在樹頭騷謂欺已謂之曰吾長者與爾童稚共語何為輕薄見報更行百許歩至坂頭道邊有極大樹小兒徑上樹狀如猿猴心以為異乃張弓遶樹覓見一物如幡長數丈高而滅至家困病幾死出五行記鄧差梁鄧差南郡臨沮人於麥城耕地得古銅數斛因此大富行值雨止於皁莢樹下遇一老公謂差曰君雖富明年舍神若出方衰耗之後君必因火味獲殃差以為此叟假稱邪術妄求施與都不採錄明年宅内見一物青黒色似鱉而非可長二尺許自出自入或𨼆或見紳縮舉頭狗見輙圍繞共吠吠則縮頭家人亦不敢觸如此者百餘日後有人種作黄昏從外入見之謂是蚖乃以䥥砟之傷其足血曳脚入稻積下因失所在自後遭火兒姪喪去官役連及差又於道逢估人先不相識道邊相對共食羅布甘美味皆珍味二人呼差同飲謂曰觀君二人遊行商估勢在不豐何為頓爾珍羞美食估人曰寸光可惜人生在世終止為身口耳一朝病死安能復進甘美乎終不如臨沮鄧生平生不用為守錢奴耳差亦不告姓名黙然歸至家宰鵞以自食動筯齩骨哽其喉病而死出廣古今五行記司馬申陳後主時㚔臣司馬申任右衞將軍常譖毁朝臣後於尚書省晝寢有鳥啄其口流血及蓆時論以譖毁之效而陳漸微之徵後主竟降隋出廣古今五行記段暉段暉字長祚有一童子辭歸從暉請馬暉戲作木馬與之童子謂暉曰吾泰山府君子謝子厚贈言終椉木馬騰空而去出魏收後魏書太平廣記卷三百六十
