body:
  text: 太平廣記卷一百六十三䜟應厯陽媪孫權髙熲神堯唐髙祖太行山桑條歌突厥鹽封中嶽楊柳謡黄麞歌苾挈兒安樂寺烏鵲窠鯉魚兒挽天樞黄犢子駱賔王天后閻知微長孫無忌魏王武媚娘孝和魏叔麟武三思孫佺張易之飲酒令白馬寺李蒙李遐周誌公詞李懷光王鐸木成文草重生唐國閏竹􅥫厯陽媪厯陽縣有一媪常為善忽有少年過門求食媪待之甚恭臨去謂媪曰時往縣門見門閫有血可登山避難自是媪日往之門吏問其狀媪具以少年所教答之吏即戲以雞血塗門閫明日媪見有血乃㩦雞籠走上山其夕縣陷為湖今和州厯陽湖是也出獨異記孫權湓口城漢髙祖六年灌嬰所築建安中孫權經住此城自標作井地遂得故井井中有銘石云漢六年潁隂侯開此井卜云三百年當塞塞後不度百年當為應運者所開權見銘欣悦以為己瑞人咸異之出張僧鑒潯陽記髙熲西京朝堂北頭有大槐樹隋曰唐興村門首文皇帝移長安城將作木匠髙熲常坐此樹下檢挍後栽樹行不正欲去之帝曰髙熲坐此樹下不須殺之至今先天一百三十年其樹尚在柯葉森竦根株盤礴與諸樹不同承天門正當唐興村門首今唐家居焉出朝野僉載神堯隋煬帝與神堯髙祖俱是獨孤外家然則神堯與煬帝常悔恡每朝謁退煬帝背有詞然後因賜宴煬帝於衆因戲神堯神堯髙顔面皺帝目為阿婆面神堯忿恚不樂洎歸就第怏悵不已見文皇已下吿文皇皆無言次吿竇皇后曰某身世可悲今日更被上顯毁云阿婆面據是兒孫不免飢凍矣竇后欣躍曰此言可以室家相賀神堯不喻謂是解免之詞后曰公封於唐阿婆乃是堂主堂者唐也神堯渙然氷釋喜悦與秦齊諸王私相賀焉出芝田錄唐髙祖唐北京受瑞壇隋大業十三年髙祖令齊王元吉留守辛丑獲青石若龍形文有丹書四字曰李淵萬吉齊王獻之文字映澈宛若龜形帝乃令水漬磨以驗之數日其字愈明内外畢賀帝曰上天明命貺以萬吉宜以少牢祀石龜而爵龜人因立受瑞壇出太原事跡雜記太行山唐武德初太行山大聲曰唐國興理萬年出太原事跡雜記桑條歌唐永徽年以後人唱桑條歌云桑條韋也女時韋也至神龍年中逆韋應之諂佞者鄭愔作桑條樂詞十餘首進之逆韋大喜擢為吏部侍郎賞縑百匹出朝野僉載突厥鹽唐龍朔已來人唱歌名突厥鹽後周聖厯年中差閻知微和匈奴授三品春官尚書送武延秀娶成黙啜女送金銀器物錦綵衣裳以為禮聘不可勝紀突厥翻動漢使並沒立知微為可汗突厥鹽之應出朝野僉載封中嶽唐調露中大帝欲封中嶽屬突厥叛而止後又欲封土蕃入寇又停至永淳年又駕幸嵩嶽謠云嵩山凡幾層不畏登不得只畏不得登三度徵兵馬傍道打騰騰嶽下遘疫不愈迴至宫而崩出朝野僉載楊柳謡唐永淳之後天下皆唱楊柳楊柳漫頭駞後徐敬業犯事出柳州司馬遂作偽敇自授揚州司馬殺長史陳敬之據江淮反使李孝逸討之斬業首驛馬䭾入洛楊柳楊柳漫頭駞此其應也出朝野僉載黄麞歌周如意年已來始唱黄麞歌其詞曰黄麞黄麞草裏藏彎弓射你傷俄而契丹反叛殺都督趙翽營府陷沒差總管曹仁師張𤣥遇麻仁節王孝傑前後百萬衆被賊敗於黄麞谷諸軍並沒罔有孑遺黄麞之歌斯為驗矣出朝野僉載苾挈兒周垂拱已來京都唱苾挈兒歌詞皆是邪曲後張易之小名苾挈出朝野僉載安樂寺唐景龍年安樂公主洛州道光坊造安樂寺用錢數百萬童謡曰可憐安樂寺了了樹頭懸後誅逆韋并殺安樂斬首懸於竿上改為悖逆庶人出朝野僉載烏鵲窠唐神龍已後謡曰山南烏鵲窠山北金駱駝鎌柯不鑿孔斧子不施柯此突厥彊盛百姓不得斫桑養蠶種禾刈榖之應也出朝野僉載鯉魚兒唐景龍中謡曰可憐聖善寺身著綠毛衣牽來河裏飲􅂿殺鯉魚兒至景雲中譙王從均州入都作亂敗走投洛川而死出朝野僉載挽天樞唐景雲中謠曰一條麻線挽天樞絶去也神武即位敕令推倒天樞收銅並入尚方此其應驗出朝野僉載黄犢子唐景龍中謡云黄牸犢子挽紖斷兩脚􅂿地鞋􅀈斷六月平王誅逆韋挽紖斷者韋欲作亂鞋􅀈斷者事不成阿韋是黄犢之後也出朝野僉載駱賔王唐明堂主簿駱賔王帝京篇曰倐忽摶風生羽翼須臾失浪委泥沙賔王後與徐敬業興兵揚州大敗投江水而死此其䜟也出朝野僉載天后唐太宗之代有祕記云唐三代之後即女主武王代有天下太宗密召李淳風以詢其事淳風對曰臣據𤣥𧰼推算其兆已成然其人已生在陛下宮内從今不踰四十年當有天下誅殺唐氏子孫殆將殱盡帝曰求而殺之如何淳風曰天之所命不可廢也王者不死雖求恐不可得且據占已長成復在宮内已是陛下眷屬更四十年又當衰老老則仁慈其於陛下子孫或不甚損今若殺之即當復生更四十年亦堪御天下矣少壯嚴毒殺之為血讐即陛下子孫無遺𩔖矣出談賔錄閻知微唐麟德已來百姓飲酒唱歌曲終而不盡者號為族鹽後閻知微從突厥領賊破趙定後知微來則天大怒磔於西市命百官射之河内王武懿宗去七步射三發皆不中其怯懦也如此知微身上箭如蝟毛剉其骨肉夷其九族疎親先不相識者皆斬之小兒年七八歳驅抱向西市百姓哀之擲餅果與者仍相爭奪以為戲笑監刑御史不􅃘害奏捨之其族鹽之言於斯應矣出朝野僉載長孫無忌唐趙公長孫無忌以烏羊毛為渾脱氊㡌天下慕之其㡌為趙公渾脱後坐事長流嶺南渾脱之言於是效焉出朝野僉載魏王唐魏王為巾子向前踣天下欣欣慕之名為魏王踣後坐死至孝和時陸頌亦為巾子同此樣時人又名為陸頌踣未一年而陸頌殞出朝野僉載武媚娘唐永徽後天下唱武媚娘歌後立武氏為皇后大帝崩則天臨朝改號大周二十餘年武氏彊盛武氏三王梁魏定等並開府自餘郡五十餘人幾遷鼎矣出朝野僉載孝和唐咸亨已後人皆云莫浪語阿婆嗔三叔聞時笑殺人後果則天即位至孝和嗣之阿婆者則天也三叔者孝和為第三也出朝野僉載魏叔麟唐魏僕射子名叔麟識者曰叔麟反語身戮也後果被羅織而殺之出朝野僉載武三思梁王武三思唐神龍初改封德靖王識者言德靖鼎賊也果有窺鼎之志被鄭克等斬之出朝野僉載孫佺唐孫佺為幽州都督五月北征時軍師李處郁諫五月南方火北方水火入水必滅佺不從果沒八萬人昔竇建德救王世充於牛口谷時謂竇入牛口豈有還期果被秦王所擒其孫佺之北也處郁曰飱若入咽百無一全山東人謂濕飯為飱音孫幽州以北並為燕地故云出朝野僉載張易之天后時謡言曰張公喫酒李公醉張公者斥易之兄弟也李公者言李氏太盛也出朝野僉載飲酒令唐龍朔年已來百姓飲酒作令云子母相去離連臺抝倒子母者盞與盤也連臺者連盤抝盞倒也及天后永昌中羅織事起有宿衞十餘人於清化坊飲為此令此席人進狀吿之十人皆棄市自後廬陵徙均州則子母相去離也連臺抝倒者則天被廢諸武遷放之兆出朝野僉載白馬寺唐神武皇帝七月即位東都白馬寺鐵像頭無故自落於殿門外自後捉搦僧尼嚴急令拜父母等未成者並停革後出者科決還俗者十八九焉出朝野僉載李蒙開元五年春司天奏𤣥𧰼有謫見其災甚重𤣥宗震驚問曰何祥對曰當有名士三十人同日寃死今新及第進士正應其數其年及第李蒙者貴主家壻上不言其事密戒主曰每有大遊宴汝愛壻可閉留其家主居昭國里時大合樂音曲逺暢曲江漲水聨舟數艘進士畢集蒙聞乃踰垣奔赴羣衆愜望才登舟移就水中暴風忽起畫舸平沉聲妓篙工不知紀極三十進士無一生者出獨異志李遐周天寶中李遐周頗有道術多在禁署徙居宮觀於所居院内題詩不啻千言皆預紀上皇幸蜀祿山僣位之事初亦不悟後方豁然略舉一篇云燕市人皆去函關馬不歸如逢山下鬼環上繫羅衣貴妃小字阿環山下鬼嵬字也出杼野情詩誌公詞劉禹錫曰逆胡之將亂中原梁朝誌公大師已贈詞曰兩角女子綠衣裳却背太行邀君王一止之月必消亡兩角女子安字也綠者祿也一止正月也果正月敗亡聖矣符誌公之寓言也出劉公嘉話錄李懷光馬燧討李懷光自太原引兵至寶鼎下營問其地名埋懷村乃大喜曰擒賊必矣出國史補王鐸唐乾符中荆州節度使晉公王鐸後為諸道都統時木星入南斗數夕不退鐸觀之問諸星者吉凶安在咸曰金火土犯斗即為災惟木當為福耳或然之時有術士邊岡洞曉天文精通厯數謂晉公曰惟斗帝王之宮宿惟木為福神當以帝王占之然則非福於今必當有驗於後未敢言之他日晉公屏左右密問岡曰木星入斗當王之兆木在斗中朱字也識者言唐世嘗有緋衣之䜟或言將來革運或姓裴或姓牛以裴字為緋衣牛字著人即朱也所以裴晉公度牛相國僧孺每罹此謗李衞公斥周秦行記乃斯事也安知鍾於碭山之朱乎出北夢𤨏言木成文梁開平二年使其將李思安攻潞州營於壺口關伐木為柵破一大木木中朱書𨽻文六字曰天十四載石進思安表上之其羣臣皆賀以為十四年必有逺夷貢珍寶者其司天少監徐鴻謂所親曰自古無一字為年號者上天符命豈闕文乎吾以丙申之年當有石氏王此地者移四字中兩豎畫置天字左右即丙字也移四之外圍以十字貫之即申字也後至丙申歳晉高祖以石姓起并州如鴻之言出稽神錄草重生初董昌未敗前狂人於越中旗亭客舍多題詩四句曰日日草重生悠悠傍素城諸侯逐白兔夏滿鏡湖平初人不曉其詞及昌敗方悟草重董字日日昌字素城越城隋越國公楊素所築也諸侯者猴乃錢鏐申生屬也白兔昌卯生屬也夏滿六月也鏡湖者越中也出㑹稽錄唐國閏偽蜀後主王衍以唐襲宅建上清宮於老君尊像殿中列唐朝十八帝真乃備法駕謁之識者以為拜唐乃歸命之先兆也先是司天監胡秀林進厯移閏在丙戌年正月有向隱者亦進厯用宣明法閏乙酉年十二月既有異同彼此紛訴仍於界上取唐國厯日近臣曰宜用唐國閏月也因更改閏十二月街衢賣厯者云只有一月也其年十二月二十八日國滅胡秀林是唐朝司天少監仕蜀别造永昌正𧰼厯推步之妙天下一人然移閏之事不爽厯議常人不可輕知之出北夢瑣言竹􅥫竹􅥫者食竹之鼠也生於深山溪谷竹林之中無人之境非竹不食巨如野貍其肉肥脆山民重之每發地取之甚艱岐梁睚眦之年秦隴之地無逺近巖谷之間此物爭出投城隍及所在民家或穿墉壞城或自門閾而入犬食不盡則並入人家房内秦民之口腹飫焉忽有童謡曰􅥫􅥫引黑牛天差不自由但看戊寅歳揚在蜀江頭智者不能議之庚午歳大梁同州節度使劉知俊叛梁入秦家于天水天水破流入蜀居數年間蜀人又謡曰黑牛無繫絆㯶繩一時斷偽蜀先主聞之懼曰黑牛者劉之小字㯶繩者吾子孫之名也葢前輩連宗字後輩連承字為名㯶繩與宗承音同吾老矣得不為子孫之患乎於是害劉公以厭之明年歳在戊寅先主不豫合眼劉公在目前蜀人懼之遂粉劉之骨揚入于蜀江先主尋崩議者方知􅥫者劉也黑牛者劉之小字戊寅歳揚骨入于蜀江之應出王氏見聞太平廣記卷一百六十三
