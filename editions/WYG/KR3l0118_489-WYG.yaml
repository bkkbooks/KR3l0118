body:
  text: 太平廣記卷四百八十九宋李昉等編雜傳記六周秦行記㝠音録周秦行記牛僧孺譔余貞元中舉進士落第歸宛葉間至伊闕南道鳴臯山下將宿大安民舎㑹暮失道不至更十餘里行一道甚易夜月始出忽聞有異氣如貴香因趨進行不知厭逺見火明意莊家更前驅至一宅門庭若富家有黄衣閽人曰郎君何至余答曰僧孺姓牛應進士落第本往大安民舎誤道來此直乞宿無他中有小髻青衣出責黄衣曰門外謂誰黄衣曰有客有客黄衣入告少時出曰請郎君入余問誰大宅黄衣曰但進無須問入十餘門至大殿蔽以珠簾有朱衣黄衣閽人數百立階左右曰拜簾中語曰妾漢文帝母薄太后此是廟郎君不當來何辱至此余曰臣家宛葉將歸失道恐死豺虎敢託命語訖太后命使軸簾避席曰妾故漢室老母君唐朝名士不相君臣幸希簡敬便上殿來見太后著練衣狀貌瑰瑋不甚年高勞余曰行役無苦乎召坐食頃聞殿内有笑聲太后曰今夜風月甚佳偶有二女伴相尋况又遇嘉賓不可不成一㑹呼左右屈二娘子出見秀才良久有女子二人從中至從者數百前立者一人狹腰長面多髪不妝衣青衣僅可二十餘太后曰高祖戚夫人余下拜夫人亦拜更一人柔肌穏身貌舒態逸光彩射逺近多服花繡年低太后后曰此元帝王嬙余拜如戚夫人王嬙復拜各就坐坐定太后使紫衣中貴人曰迎楊家潘家來久之空中見五色雲下聞笑語聲寖近太后曰楊潘至矣忽車音馬跡相雜羅綺煥燿旁視不給有二女子從雲中下余起立於側見前一人纎腰修眸儀容甚麗衣黄衣冠玉冠年三十許太后曰此是唐朝太真妃子予即伏謁拜如臣禮太真曰妾得罪先帝先帝謂肅宗也皇朝不置妾在后妃數中設此禮豈不虛乎不敢受却荅拜更一人厚肌敏視小質潔白齒極卑被寛博衣太后曰齊潘淑妃余拜之如妃子既而太后命進饌少時饌至芳潔萬端皆不得名余但欲充腹不能足食已更具酒其器用盡如王者太后語太真曰何久不來相看太真謹容對曰三郎天寶中宫人呼𤣥宗多曰三郎數幸華清宫扈從不得至太后又謂潘妃曰子亦不來何也潘妃匿笑不禁不成對太真乃視潘妃而對曰潘妃向玉奴太真名也說懊惱東昏侯疎狂終日出獵故不得時謁耳太后問余今天子為誰余對曰今皇帝先帝長子太真笑曰沈婆兒作天子也大奇太后曰何如主余對曰小臣不足以知君徳太后曰然無嫌但言之余曰民間傳聖武太后首肯三四太后命進酒加樂樂妓皆年少女子酒環行數周樂亦隨輟太后請戚夫人鼓琴夫人約指玉環光照於座西京雜記云高祖與夫人環照見指骨也引琴而鼔其聲甚怨太后曰牛秀才邂逅到此諸娘子又偶相訪今無以盡平生歡牛秀才固才士盍各賦詩言志不亦善乎遂各授與牋筆逡巡詩成太后詩曰月寢花宫得奉君至今猶媿管夫人漢家舊是笙歌處煙草幾經秋復春王嬙詩曰雪裏穹廬不見春漢衣雖舊淚痕新如今最恨毛延壽愛把丹青錯畫人戚夫人詩曰自别漢宫休楚舞不能妝粉恨君王無金豈得迎商􅅱吕氏何曾畏木强太真詩曰金釵墮地别君王紅淚流珠滿御牀雲雨馬嵬分散後驪宫不復舞霓裳潘妃詩曰秋月春風幾度歸江山猶是鄴宫非東昏舊作蓮花地空想曾披金縷衣再三邀余作詩余不得辭遂應命作詩曰香風引到大羅天月地雲階拜洞仙共道人間惆悵事不知今夕是何年别有善笛女子短髪麗服貌甚美而且多媚潘妃偕來太后以接座居之時令吹笛往往亦及酒太后顧而問曰識此否石家緑珠也潘妃養作妹故潘妃與俱來太后因曰緑珠豈能無詩乎緑珠乃謝而作詩曰此日人非昔日人笛聲空怨趙王倫紅殘翠碎花樓下金谷千年更不春詩畢酒既至太后曰牛秀才逺來今夕誰人為伴戚夫人先起辭曰如意兒長成固不可且不可如此潘妃辭曰東昏以玉兒身死國除玉兒不宜負也緑珠辭曰石衛尉性嚴急今有死不可及亂太后曰太真今朝先帝貴妃不可言其他乃顧謂王嬙曰昭君始嫁呼韓單于復為株絫弟單于婦固自困且苦寒地胡鬼何能為昭君幸無辭昭君不對低眉羞恨俄各歸休余為左右送入昭君院㑹將旦侍人告起昭君垂泣持别忽聞外有太后命余遂出見太后太后曰此非郎君久留地宜亟還便别矣幸無忘向來歡更索酒酒再行已戚夫人潘妃緑珠皆泣竟辭去太后使朱衣送往大安抵西道旋失使人所在時始明矣余就大安里問其里人里人云此十餘里有薄后廟余却回望廟宇荒毁不可入非向者所見矣余衣上香經十餘日不歇竟不知其何如㝠音録廬江尉李侃者隴西人家於洛之河南太和初卒於官有外婦崔氏本廣陵倡家生二女既孤且幼孀母撫之以道逺子未成人因寓家廬江侃既死雖侃之宗親居顯要者絶不相聞廬江之人咸哀其孤藐而能自强崔氏性酷嗜音雖貧苦求活常以弦歌自娛有女弟􅉅奴風容不下善鼓箏為古今絶妙知名於時年十七未嫁而卒人多傷焉二女幼傳其藝長女適邑人丁𤣥夫性識不甚聰慧幼時每教其藝小有所未至其母輒加鞭箠終莫究其妙每心念其姨曰我姨之甥也今乃死生殊途恩愛久絶姨之生乃聰明死何蔑然而不能以力祐助使我心開目明粗及流輩哉每至節朔輒舉觴酹地哀咽流涕如此者八歳母亦哀而憫焉開成五年四月三日因夜寐驚起號泣謂其母曰向者夢姨執手泣曰我自辭人世在隂司簿屬教坊授曲於博士李元慿元慿屢薦我於憲宗皇帝帝召居宫一年以我更直穆宗皇帝宫中以箏導諸妃出入一年上帝誅鄭注天下大酺唐氏諸帝宫中互選妓樂以進神堯太宗二宫我復得侍憲宗每一月之中五日一直長秋殿餘日得肆遊觀但不得出宫禁耳汝之情懇我乃知也但無由得來近日襄陽公主以我為女思念頗至得出入主第私許我歸成汝之願汝早圖之隂中法嚴帝或聞之當獲大譴亦生累於主復與其母相持而泣翼日乃灑掃一室列虚筵設酒果髣髴如有所見因執箏就坐閉目彈之隨指有得初授人間之曲十日不得一曲此一日獲十曲曲之名品殆非生人之意聲調哀怨幽幽然鴞啼鬼嘯聞之者莫不歔欷曲有迎君樂正商調三十八疊槲林歎分絲調四十四疊秦王賞金歌小石調二十八疊廣陵散正商調二十八疊行路難正商調二十八疊上江虹正商調二十八疊晉城仙小石調二十八疊絲竹賞金歌小石調二十八疊紅窗影雙柱調四十疊十曲畢慘然謂女曰此皆宫闈中新翻曲帝尤所愛重槲林歎紅窗影等每宴飲即飛毬舞盞為佐酒長夜之歡穆宗敕修文舎人元稹撰其詞數十首甚美醼酣令宫人遞歌之帝親執玉如意擊節而和之帝袐其調極切恐為諸國所得故不敢泄歳攝提地府當有大變得以流傳人世幽明路異人鬼道殊今者人事相接亦萬代一時非偶然也㑹以吾之十曲獻陽地天子不可使無聞於明代於是縣白州州白府刺史崔璹親召試之則絲桐之音鎗鏦可聴其差琴調不𩔖秦聲乃以衆樂合之則宫商調殊不同矣母令小女再拜求傳十曲亦備得之至暮訣去數日復來曰聞揚州連帥欲取汝恐有謬誤汝可一一彈之又留一曲曰思歸樂無何州府果令送至揚州一無差錯廉使故相李徳裕議表其事女尋卒太平廣記卷四百八十九
