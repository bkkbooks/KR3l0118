body:
  text: 太平廣記卷三百五十六宋李昉等編夜义一哥舒翰章仇兼瓊楊慎矜江南吳生朱峴女杜萬韋自東馬燧哥舒翰哥舒翰少時有志氣長安交游豪俠宅新書坊有愛妾曰裵六娘者容範曠代宅于崇仁舒翰常悦之居無何舒翰有故遊近畿數月方廽及至妾已病死舒翰甚悼之既而日暮因宿其舍尚未塟殯于堂奥既無他室舒翰曰平生之愛存沒何間獨宿繐帳中夜半後庭月皓然舒翰悲歎不寐忽見門屏間有一物傾首而窺進退逡巡入庭中乃夜义也長丈許著豹皮裩鋸牙披髮更有三鬼相繼進乃拽朱索舞于月下相與言曰牀上貴人柰何又曰寢矣便昇階入殯所拆發舁襯於月中破而取其尸糜割肢體環坐共食之血流於庭衣物狼藉舒翰恐怖且痛之自分曰向呌我作貴人我今擊之必無苦遂潜取帳外竿忽於暗中擲出大呌擊鬼鬼大駭走舒翰乗勢逐之西北隅踰垣而去有一鬼最後不得上舒翰擊中流血乃得去家人聞變亂􅁸来救之舒翰具道其事將收餘骸及至堂殯所儼然如故而噉處亦無所見舒翰恍忽以為夢中騐其墻有血其上有迹竟不知其然後數年舒翰顯達出通幽記章仇兼瓊章仇兼瓊鎮蜀日佛寺設大會百戲在庭有十嵗童兒舞於竿杪忽有一物狀如鵰鶚掠之而去羣衆大駭因罷樂後數日其父母見在髙塔之上梯而取之而神形如癡乆之方語云見如畫壁飛天夜义者將入塔中日飼果實飲食之味亦不知其所自旬日方精神如初出尚書故實楊慎矜開元中楊慎矜為御史中丞一日将入朝家童開其外門既啟鏁其門噤不可觧慎矜且驚且異洎天将曉其導從吏自外見慎矜門有夜义長丈餘狀極異立於宇下以左右手噤其門火吻電眸不顧左右從吏見之俱驚慓四去久而衢中輿馬人物稍多其夜叉方南向而去行者見之咸辟易仆地慎矜聞其事懼甚後月餘遂為李林甫所誣弟兄皆誅死出宣室志江南吳生有吳生者江南人嘗遊㑹稽娶一劉氏女為妾後數年吳生宰縣於鴈門郡與劉氏偕之官劉氏初以柔婉聞凡數年其後忽曠烈自恃不可禁往往有逆意者即發怒毆其婢僕或齧其肌血且甚而怒不可解吳生始知劉氏悍戾心稍外之嘗一日吳與鴈門部將數輩獵於野獲狐兎甚多致庖舍下明日吳生出劉氏即潛入庖舍取狐兎生啗之且盡吳生歸因詰狐􅇠所在而劉氏俛然不語吳生怒訊其婢婢曰劉氏食之盡矣生始疑劉氏為他怪旬餘有縣吏以一鹿獻吳生命致於庭已而吳生始言將逺適既出門即匿身潜伺之見劉氏散髪袒肱目眥盡裂狀貎頓異立庭中左手執鹿右手拔其脾而食之吳生大懼仆地不能􅁸乆之乃召吏卒十數輩持兵仗而入劉氏見吳生来盡去襦袖挺然立庭乃一夜义耳目若電光齒如㦸刄筋骨盤蹙身盡青色吏卒俱戰慄不敢近而夜义四顧若有所懼僅食頃忽東向而走其勢甚疾竟不知所在出宣室志朱峴女武陵郡有浮屠祠其髙數百尋下瞰大江每江水汎揚則浮屠勢若揺動故里人無敢登其上者有賈人朱峴家極贍有一女無何失所在其家尋之僅旬餘莫窮其適一日天雨霽郡民望見浮屠之顛若有人立者𨼆然紋纈衣郡民且以為他怪峴聞之即往觀焉望其衣裝甚𩔖其女即命人登其上取之果見女也峴驚訊其事女曰某向者獨處有夜义長丈餘甚詭異自屋上躍而下入某之室謂某曰無懼我也即攬衣馳去至浮屠上既而兀兀然若甚醉者凡數日方稍寤因懼且甚其夜义率以將曉則下浮屠行里中取食飲某一日夜义方去某下視之見其行里中會遇一白衣夜义見辟易退逺百歩不敢竊視及暮歸某因詰之何為懼白衣者乎夜义曰向者白衣自小不食太牢故我不得近也某問何故夜义曰牛者所以耕田疇為生人之本人不食其肉則上帝祐之故我不得而近也某黙念曰吾人也去父母與異𩔖為伍可不悲乎眀日夜义去而祝曰某願不以太牢為食凡三祝其夜义忽自郡中来至浮屠下望某而語曰何為有異志而棄我乎使我終不得近子矣從此别去詞畢即東向走而竟不知所往某喜甚由浮屠中得以歸出宣室志杜萬杜萬員外其兄為􅊐南縣尉將至任妻遇毒瘴數日卒時盛夏無殯歛權以葦蓆裹束瘞於絶巖之側某到官拘於吏事不復重歛及北歸方至巖所欲収妻骸骨及觀坎穴但葦尚存某歎其至深而為所取悲感乆之會上巖有一徑某試尋行百餘歩至石窟中其妻裸露容貌狰獰不可復識懐中抱一子子旁亦有一子狀𩔖羅刹極嘑方寤婦人口不能言以手畫地書云我頃重生為夜义所得今此二子即我所生書之悲涕頃之亦能言謂云君急去夜义倘至必當殺君某問汝能去否曰能去便􅁸抱小兒隨某至船所便發夜义尋抱大兒至岸望船嘑呌以兒相示船行既逺乃擘其兒作數十片方去婦人手中之子狀如羅刹解人語大厯中母子並存出廣異記韋自東貞元中有韋自東者義烈之士也嘗逰太白山棲止段將軍莊段亦素知其壯勇者一日與自東眺望山谷見一徑甚㣲若舊有行跡自東問主人曰此何詣也叚將軍曰昔有二僧居此山頂殿宇宏壯林泉甚佳葢唐開元中萬迴師弟子之所建也似驅役鬼工非人力所能及或問樵者説其僧為怪物所食今絶踪二三年矣又聞人説有二夜义於此山亦無人敢窺焉自東怒曰余操心在平侵暴夜义何𩔖而敢噬人今夕必挈夜义首至於門下將軍止曰暴虎馮河死而無悔自東不顧仗劍奮衣而往勢不可遏將軍悄然曰韋生當其咎耳自東捫蘿躡石至精舍悄寂無人覩二僧房大敞其戸履錫俱全衾枕儼然而塵埃凝積其上又見佛堂内細草茸茸似有巨物偃寢之處四壁多掛野彘𤣥熊之𩔖或庖炙之餘亦有鍋鑊薪自東乃知是樵者之言不謬耳度其夜义未至遂㧞柏樹徑大如碗去枝葉為大杖扄其戸以石佛拒之是夜月白如晝夜未分夜义挈鹿而至怒其扄鐍大呌以首觸戸折其石佛而踣於地自東以柏𣗳撾其腦再舉而死之拽之入室又闔其扉頃之復有夜义繼至似怒前歸者不接已亦哮吼觸其扉復踣於戸閾又撾之亦死自東知雌雄已殞應無儕𩔖遂掩闗烹鹿而食及明㫁二夜义首挈餘鹿而示段段大駭曰真周處之儔矣乃烹鹿飲酒盡歡逺近觀者如堵有道士出於稠人中揖自東曰某有衷懇欲披告於長者可乎自東曰某一生濟人之急何為不可道士曰某棲心道門懇志靈藥非一朝一夕耳三二年前神仙為吾配合龍虎丹一爐據其洞而修之有日矣今靈藥將成而數有妖魔入洞就爐擊觸藥幾廢散思得剛烈之士仗劍衛之靈藥倘成當有分恵未知能一行否自東踊躍曰乃平生所願也遂仗劍從道士而去躋險躡峻當太白之髙峰將半有一石洞可百餘歩即道士燒丹之室唯弟子一人道士約曰明晨五更初請君仗劍當洞門而立見有怪物但以劍擊之自東曰謹奉教久立燭於洞門外以伺之俄頃果有巨虺長數丈金目雪牙毒氣氤鬱將欲入洞自東以劍擊之似中其首俄頃若輕霧而化去食頃有一女子顔色絶麗執芰荷之花緩歩而至自東又以劍拂之若雲氣而滅食頃將欲曙有道士椉雲駕鶴導從甚嚴勞自東曰妖魔已盡吾弟子丹將成矣吾當来為證也盤旋候眀而入語自東曰喜汝道士丹成今有詩一首汝可繼和詩曰三秋稽䫙叩真靈龍虎交時金液成絳雪既凝身可度蓬壺頂上彩雲生自東詳詩意曰此道士之師遂釋劒而禮之俄而突入藥鼎爆烈更無遺在道士慟哭自東悔恨自咎而已二人因以泉滌其鼎器而飲之自東後更有少容而適南岳莫知所止今叚將軍莊尚有夜义骷髏見在道士亦莫知所之出傳竒馬燧馬燧貧賤時寓遊北京謁府主不見而返寄居於園吏吏曰莫欲謁䕶戎否若謁即須先言當為其岐路耳䕶戎諱數字而甚切君當在意若犯之無迯其死也然若㚔惬之則所益與諸人不同慎勿暗投也某乃䕶戎先乳母子得以詳悉而輒賛君子焉燧信與疑半眀晨入謁䕶戎果犯其諱庭叱而去畏懼之色見於園吏吏曰是必忤䕶戎耳燧問計求脫園吏曰君子戾我而恓惶如是然敗則死不得瀆我也遂匿燧於糞車中載出郭而迯於是䕶戎果索燧一報不獲散鐵騎者毎門十人燧狼狽竄六十餘里日暮度不出境求蔽於迯民散室中尚未安聞車馬嗁歕聲人相議言能更三二十里否果䕶戎之使也俄聞車馬勢漸逺稍安焉未復常息又聞有窸窣人行聲燧危慄次忽於戸牖見一女人衣布衣身形絶長手携一襆曰馬燧在此否燧黙然不敢對又曰大驚怕否胡二姊知君在此故来安慰無生憂疑也燧乃應諾而出胡二姊曰大厄然已過尚有餘恐矣君固餒我食汝乃解所携襆有熟肉一甌胡餅一箇燧食甚飽卻令於舊處更不可動胡二姊以灰數斗放於燧前地上横布一道乃授之言曰今夜半有異物相恐劫輒不可動過此厄後勲貴無雙言畢而去夜半有物閃閃照人漸近戸牖間見一物長丈餘乃夜义也赤髪蝟奮金身鋒鑠臂曲癭木甲駕獸爪衣豹皮褲携短兵直入室来獰目電燮吐火噴血跳躅哮吼鐵石消鑠燧之惴慄殆喪魂亡精矣然此物終不敢越胡二姊所布之灰乆之物乃撤一門扉藉而熟寢俄又聞車馬来聲有人相謂曰此乃迯人室不妨馬生匿於此乎時數人持兵器下馬入来衝動夜义夜义奮􅁸大吼數聲裂人馬噉食血肉殆盡夜义食既飽徐歩而出四更東方月上燧覺寂静乃出而去見人馬骨肉狼藉乃獲免後立大勛官爵穹崇詢訪胡二姊之由竟不能得思報不獲乃毎春秋祠饗别置胡二姊一座列於廟左出傳異記太平廣記卷三百五十六
