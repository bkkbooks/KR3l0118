body:
  text: 太平廣記卷三百八十五宋李昉等編再生十一崔紹辛察僧彦先陳龜範崔紹崔紹者博陵王元暐曾孫其大父武嘗從事於桂林其父直元和初亦從事於南海常假郡符於端州直處官清苦不蓄羡財給家之外悉拯親故在郡嵗餘因得風疾退卧客舍伏枕累年居素貧無何寢疾復久身謝之日家徒索然繇是眷屬輩不克北歸紹遂孜孜履善不墮素業南越㑹府有攝官承乏之利濟淪落羇滯衣冠紹迫於凍餒常屈至於此賈繼宗外表兄夏侯氏之子則紹之子壻因縁還往頗熟其家太和六年賈繼宗自瓊州招討使改換康州牧因舉請紹為掾屬康之附郭縣曰端谿端谿假尉隴西李彧則前大理評事景休之猶子紹與彧錫𩔖之情素頗友洽崔李之居復隅落相近彧之家畜一女猫常往來紹家捕鼠南土風俗惡他舍之猫産子其家以為大不祥彧之猫産二子於紹家紹甚惡之因命家童縶三猫於筐篋加之以石復以繩固筐口投之於江是後不累月紹丁所出滎陽鄭氏之喪解職居且苦貧孤孀數輩饘粥之費晨暮不充遂薄遊羊城之郡丐於親故太和八年五月八日發康州官舍厯抵海隅諸郡至其年九月十六日達雷州紹家常事一字天王已兩世矣雷州舍於客館中其月二十四日忽得熱疾一夕遂重二日遂殛將殛之際忽見二人焉一人衣黄一人衣皂手執文帖云奉王命追公紹初拒之云平生履善不省為惡今有何事被此追呼二使人大怒曰公殺無辜三人寃家上訴奉天符下降令按劾公方當與寃家對命奈何猶敢稱屈違拒王命遂展帖云紹見文字分明但不許細讀耳紹頗畏讋不知所裁頃刻間見一神人來二使者俯伏禮敬神謂紹曰爾識我否紹曰不識神曰我一字天王也常為爾家供養久矣每思以報之今知爾有難故來相救紹拜伏求救天王曰爾但共我行必無憂患王遂行紹次之二使者押紹之後通衢廣陌杳不可知際行五十許里天王問紹爾莫困否紹對曰亦不甚困猶可支持二三十里天王曰欲到矣逡廵遙見一城門墻髙數十仞門樓甚大有二神守之其神見天王側立敬懼更行五里又見一城門四神守之其神見天王之禮亦如第一門又行三里許復有一城門其門闗閉天王謂紹曰爾且立於此待我先入天王遂乗空而過食頃聞搖鏁之聲城門洞開見十神人天王亦在其間神人色甚憂懼更行一里又見一城門有八街街極廣闊街兩邊有雜樹不識其名目有神人甚多不知數皆羅立於樹下八街之中有一街最大街西而行又有一城門門兩邊各有數十間樓並垂簾街衢人物頗衆車轝合雜朱紫繽紛亦有乗馬者亦有乗驢者一似人間模様此門無神看守更一門盡是髙樓不記間數珠簾翠幕眩惑人目樓上悉是婦人更無丈夫衣服鮮明装飾新異窮極奢麗非人寰所覩其門有朱旗銀泥畫旗旗數甚多亦有著紫人數百天王立紹於門外便自入去使者遂領紹到一㕔使者先領見王判官既至㕔前見王判官著緑降階相見情禮甚厚而答紹拜兼通寒暄問苐行延昇階與坐命煎茶良久顧紹曰公尚未生紹初不曉其言心甚疑懼判官云隂司諱死所以喚死為生催茶茶到判官云勿喫此非人間茶逡巡有著黄人提一瓶茶來云此是陽官茶紹可喫矣紹喫三椀訖判官則領紹見大王手中把一紙文書亦不通入大王正對一字天王坐天王向大王云祗為此人來大王曰有寃家上訴手雖不殺口中處分令殺於江中天王令喚崔紹寃家有紫衣十餘人齊唱喏走出頃刻間有一人著紫襕衫執牙笏下有一紙状領一婦人來兼領二子皆人身而猫首婦人著慘裙黄衫子一女子亦然一男子亦然著皂衫三寃家號泣不已稱崔紹非理相害天王向紹言速開口與功徳紹忙懼之中都忘人間經佛名目唯記得佛頂尊勝經遂發願各與寫經一卷言訖便不見婦人等大王及一字天王遂令紹昇階與坐紹拜謝大王王答拜紹謙讓曰凡夫小生寃家陳訴罪當不赦敢望生迴大王尊重如是答拜紹實所不安大王曰公事已畢即還生路存殁殊途固不合受拜大王問紹公是誰家子弟紹具以房族答之大王曰此若然者與公是親家總是人間馬僕射紹即起申敘馬僕射猶子磻夫則紹之妹夫大王問磻夫安在紹曰闊别已久知家寄杭州大王又曰莫怪此來奉天符令勘今則却還人道便迴顧王判官云崔子停止何處判官曰便在某㕔中安置天王云甚好紹復咨啟大王大王在生名徳至重官位極崇則合却歸人天為貴人身何得在隂司職大王笑曰此官職至不易得先是杜司徒任此職總濫䝉司徒知愛舉以自代所以得處此職豈容易致哉紹復問曰司徒替何人曰替李若初若初性嚴寡恕所以上帝不遣久處此杜公替之紹又曰無因得一至此更欲咨問大王紹聞㝠司有世人生籍紹不才兼本抱疾不敢望人間官職然顧有親故願一知之不知可否曰他人則不可得見縁與公是親情特為致之大王顧謂王判官曰從許一見之切須誡約不得令漏泄漏泄之則終身喑啞又曰不知紹先父在此復以受生大王曰見在此充職紹涕泣曰願一拜覲不知可否王曰亡殁多年不得相見紹起辭大王共一字天王送紹到王判官㕔中鋪陳贍給一似人間判官遂引紹到一瓦廊下廊下又有一樓便引紹入門滿壁悉是金牓銀牓備列人間貴人姓名將相二色名列金牓將相以下悉列銀牓更有長鐵牓列州縣府僚屬姓名所見三牓之人悉是在世人若謝世者則隨所落籍王判官謂紹曰見之則可慎勿向世間説牓上人官職已在位者猶可言之未當位者不可漏泄當犯大王向來之誡世人能行好心必受善報其隂司誅責惡心人頗甚紹在王判官㕔中停止三日旦暮嚴打更皷數百面唯不吹角而已紹問判官曰㝠司諸事一切盡似人間惟空皷而無角不知何謂判官曰夫角聲者象龍吟也龍者金精也金精者陽之精也隂府者至隂之司所以至隂之所不欲聞至陽之聲紹又問判官曰聞隂司有地獄不知何在判官曰地獄名目不少去此不逺罪人隨業輕重而入之又問此處城池人物何盛如是判官曰此王城也何得怪盛紹又問王城之人如海豈得俱無罪乎而不入地獄耶判官曰得處王城者是業輕之人不合入地獄候有生闗則隨分髙下各得受生又康州流人宋州院官田洪評事流到州二年與紹鄰居紹洪復累世通舊情愛頗洽紹發康州之日評事猶甚康寧去後半月染疾而卒紹未迴都不知之及追到㝠司已見田生在彼田崔相見彼此涕泣田謂紹曰洪别公後來未經旬日身已謝世矣不知公何事忽然到此紹曰被大王追勘少事事亦尋了即得放迴洪曰有少情事切敢奉託洪本無子養外孫鄭氏之子為兒已喚致得身名年六十方自有一子今被㝠司責以奪他人之嗣以異姓承家既自有子又不令外孫歸本族見為此事被勘劾頗甚今公却迴望為洪百計致一書與洪兒子速令鄭氏子歸本宗又與洪傳語康州賈使君洪垂盡之年竄逐逺地主人情厚每事相依及身殁之後又發遣小兒北歸使道體歸葬本土眷屬免滯荒陬雖仁者用心固合如是在洪淺劣何以當之但荷恩於重泉恨無力報言訖二人慟哭而别居三日王判官曰歸可矣不可久處於此一字天王與紹欲迴大王出送天王行李頗盛道引騎從闐塞街衢天王乗一小山自行大王處分與紹馬騎盡諸城門大王下馬拜别天王天王坐山不下然從紹相别紹跪拜大王亦還拜訖大王便迴紹與天王自歸行至半路見四人皆人身而魚首著慘緑衫把笏衫上微有血汚臨一峻坑立泣拜諸紹曰性命危急欲墮此坑非公不能相活紹曰僕何力以救四人曰公但許諾則得紹曰灼然得四人拜謝又云性命已䝉君放訖更欲啟難發之口有無厭之求公莫怪否紹曰但力及者盡力而應之曰四人共就公乞一部金光明經則得度脱罪身矣紹復許言訖四人皆不見却迴至雷州客館見本身偃卧於床以被蒙覆手足天王曰此則公身也但徐徐入之莫懼如天王言入本身便活及蘇問家人輩死已七日矣唯心及口鼻微暖蘇後一日許猶依稀見天王在眼前又見階前有一木盆盆中以水養四鯉魚紹問此是何魚家人曰本買充㕑膳以郎君疾殛不及修理紹曰得非臨坑四人乎遂命投之於陂池中兼發願與寫金光明經一部出𤣥怪録辛察太和四年十二月九日邊上從事魏式暴卒於長安延福里沈氏私廟中前二日之夕勝業里有司門令史辛察者忽患頭痛而絶心上微暖初見有黄衫人就其牀以手相就而出既而返顧本身則已殭矣其妻兒等方抱持號泣噀水炙灼一家倉惶察心甚惡之而不覺隨黄衣吏去矣至門外黄衫人踟蹰良久謂察曰君未合去但致錢二千緡便當相捨察曰某素貧何由致此黄衫曰紙錢也遂相與却入庭際大呼其妻數聲皆不應黄衫哂曰如此不可也乃指一家僮教察以手扶其背因令達語求錢於是其家果取紙錢焚之察見紙錢燒訖皆化為銅錢黄衫及次第抽拽積之又謂察曰一等為恵請兼致脚直送出城察思度良久忽悟其所居之西百餘歩有一力車傭載者亦常往來遂與黄衫俱詣其門門即閉闗矣察叩之車者出曰夜已久安得來耶察曰有客要相顧載錢至延平門外車曰諾即來装其錢訖察將不行黄衫又邀曰請相送至城門三人相引部領厯城西街抵長興西南而行時落月輝輝鐘皷將動黄衫曰天方曙不可行矣當且止延福沈氏廟逡巡至焉其門亦閉黄衫叩之俄有一女人可年五十餘紫裙白襦自出應門黄衫謝曰夫人幸勿怪其後日當有公事方來此廟中今有少錢未可遽提去請借一隙處暫貯收之後日公事了即當搬取女人許之察與黄衫及車人共搬置其錢於廟西北角又於戸外見有葦席數領遂取之覆纔畢天色方曉黄衫辭謝而去察與車者相隨歸至家見其身猶為家人等抱持炙療如故不覺形神合而蘇良久思如夢非夢乃曰向者更何事妻具言家僮中惡作君語索六百張紙作錢以焚之皆如前事察頗驚異遽至車子家車家見察曰君來正解夢耳夜來所夢不似尋常分明自君家别與黄衫人載一車子錢至延福沈氏廟厯厯如在目前察愈驚駭復與車子偕往沈氏廟二人素不至此既而宛然昨宵行止即於廟西北角見一兩片蘆席其下紙緡存焉察與車夫皆識夜來致錢之所即訪女人守門者曰廟中但有魏侍御於此無他人也沈氏有臧獲亦住廟旁聞語其事及形状衣服乃泣曰我太夫人也其夕五更魏氏一家聞打門聲使候之即無所見如是者三四式意謂之盗明日宣言於縣胥求備之其日式夜邀客為煎餅食訖而卒察欲驗黄衫公事嘗自於其側偵之至是果然矣出河東記僧彦先青城寳園山僧彦先嘗有隱慝離山往蜀州宿於中路天王院暴卒被人追攝詣一官曹未領見王先見判官詰其所犯彦先抵諱之判官乃取一猪脚與彦先彦先推辭不及僶俛受之乃是一鏡照之見自身在鏡中從前愆過猥䙝一切厯然彦先慙懼莫知所措判官安存戒而遣之洎再生遍與人説然不言所犯隱􅁾之事出北夢𤨏言陳龜範陳龜範明州人客遊廣陵因事贊善馬潛一夕暴卒至一府署有府官視牒曰吾追陳龜謀何故追龜範也範對曰範本名龜謀近事馬贊善馬公諱言故改一字耳府公乃曰取明州簿來頃之一吏持簿至視之乃龜謀也因引至曹署吏云有人訟君已引退矣君當得還也龜範因自言平生多難貧苦備至人生固當死今已至此不願還也吏固遣之又曰若是願知將來窮達之事吏因為檢簿曰君他日甚善雖不至富貴然職禄無闕又問夀幾何曰此固不可言也又問卒於何處曰不在揚州不在鄂州送還家寤後潛厯典二郡甚見委用潛卒歸於揚州奉使鄂州既還卒於彭澤出稽神録太平廣記卷三百八十五
