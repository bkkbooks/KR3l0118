body:
  text: 太平廣記卷二百七十六夢一周昭王吳夫差漢武帝司馬相如陰貴人張奐鄭𤣥范邁許攸薛夏蔣濟周宣王戎鄒湛陳桃吕蒙王穆張天錫張駿索充宋桶苻堅後趙宣咸張甲張茂晉明帝馮孝將徐精殷仲堪啇靈均桓豁司馬恬賈弼王奉先宗叔林沙門法稱劉穆之徐羡之沈慶之明􅀢之劉誕袁愍孫劉沙門諸仲務孫氏桓誓張尋徐祖桓邈周氏婢何敬叔周昭王昭王即位二十年王坐祇明之室晝而假寐忽白雲蓊鬱而起有人衣服皆毛羽因名羽人王夢中與語問以上仙之術羽人曰大王精智未開求長生乆視不可得也王跪而苦請絶欲之教羽人乃以指畫王心應手即裂王乃驚悟而汗濕於衿席因患心疾即却膳徹樂移於旬日忽見所夢者來語王曰先欲易王之心乃出方寸緑囊中有藥名曰續脈丸補血精散以手摩王之臆俄而即愈王即請此藥貯以玉缶緘以金繩以之塗足則飛天地之外如游咫尺之内有得服之後天而死出王子年拾遺記吳夫差吳王夫差夜夢三黑狗號以南以北炊甑無氣及覺召羣臣言夢羣臣不能解乃召公孫聖聖被召與妻訣曰以惡夢召我我豈欺心者必爲王所殺於是聖至以所夢告之聖曰王無國矣犬號者宗廟無主炊甑無氣不食矣王果怒殺之及越兵至王謂左右曰吾無道殺公孫聖汝可呼之於是三呼三應吳卒爲越所滅出越絶書漢武帝漢武帝夢大魚求去口中鉤明日遊昆明池見一魚銜鉤帝取鉤放之三日池濵得明珠一雙出三秦記司馬相如司馬相如字長卿將獻賦而未知所爲夢一黄衣翁謂之曰可爲大人賦言神仙之事賦成以獻帝大嘉賞出西京雜記陰貴人漢明帝陰貴人夢食𤓰甚美時燉煌獻異𤓰種名穹隆父老云有道士從蓬萊得此種食之不饑出王子年拾遺記張奐後漢張奐爲武威太守其妻夢帝與印綬登樓而歌覺以告奐奐令占之曰夫人方生男復臨此郡命終此樓後生子猛建安中爲武威太守殺刺史邯鄲商州兵圍急猛恥見擒乃登樓自焚而死出捜神記鄭𤣥鄭𤣥師馬融三載無聞融遣之𤣥過樹陰下假寐夢一人以刀開其心謂曰子可學矣於是寤而即返遂洞精典籍後東歸融曰詩書禮樂皆東矣出異苑范邁林邑謂紫磨金爲上金俗謂之楊邁金范邁母夢人鋪楊邁金席與其生兒兒生席色昭晰後因生兒名曰楊邁爲林邑王出林邑記許攸許攸夢烏衣吏奉漆案案上有六封文書拜跪曰府君明年七月當為北斗君復有一案四封文書云陳康爲主簿覺後陳康至曰今來當謁攸聞益懼問康曰我作道師死不過作社公今日得北斗主簿余爲忝矣明年七月二人同日而死出幽明録薛夏薛夏天水人也博學絶倫母孕夏之時夢有人遺一篋衣云夫人必生賢明之子爲帝王所宗母記其夢之時及生夏年及弱冠才術過人魏文帝與之講論彌日不息辭華旨暢應對如流無有凝滯帝曰昔公孫龍稱爲辯㨗而迂誕誣妄今子所説非聖人言不談則子游子貢之儔不能過也若仲尼在魏復爲入室焉帝手製書與夏題云入室生位至祕書丞居甚貧帝解御衣以賜之果符先夢名冠當時爲一代高士出王子年拾遺記蔣濟魏蔣濟爲領軍時其妻夢亡兒涕泣言曰死生異路我生時爲卿相子孫今在地下爲泰山伍伯憔悴困辱不可復言今太廟西有孫阿者將召爲泰山令願母爲白領軍囑阿轉我令得樂處言訖母遂驚寤以白濟濟曰夢不足憑耳明日母復夢之言曰我今來迎新君止在廟下未發之間暫得歸來新君明日日中當發臨發多事不得復歸於此願重啓之何惜一試驗也遂説阿形狀言甚備悉天明母又爲言之曰昨又夢如此雖知夢不足憑何惜一驗之乎濟乃遣人詣太廟下推問孫阿果得之形狀如其夢濟乃涕泣曰幾負我兒於是乃見孫阿具語其事阿不懼當死而喜爲泰山令惟恐濟言之不信也乃謂濟曰若誠如所言某之願也不知賢郎欲得何職濟曰隨地下樂者與之阿許諾言訖遣還濟欲速知其驗從領軍門下至廟下十歩安一人以傳阿之消息辰時傳阿心痛日中傳阿亡濟泣曰雖哀兒之不幸見喜亡者之有知後月餘母復夢兒來告曰已得轉爲録事矣出列異傳周宣魏周宣字孔和善占夢或有問宣者吾夢芻狗宣曰君當得美食未幾復云夢芻狗曰當墮車折脚尋而又云夢芻狗宣曰當有火災後皆如所言其人曰吾實不夢聊試君耳三占不同皆驗何也宣曰意形於言便占吉凶且芻狗者祭神之物故君初言夢之當得美食也祭祀既畢則爲所轢當墮車傷折車轢之後必載以樵故云失火出魏志王戎王戎夢有人以七枚椹子與之著衣襟中既覺得之占曰椹桑子也自後男女大小凡七䘮出異苑鄒湛鄒湛夢一人拜自稱甄仲舒求𦵏湛覺思之曰舍西瓦土中人也乃取𦵏之復夢其人來拜謝出晉書陳桃虞翻注易上奏曰臣郡吏陳桃夢臣與道士相遇散髪麤裘付易六爻燒其三以飲臣臣乞盡吞之道士言易在天上三爻足以豈臣受命應當知也出夢雋吕蒙吕蒙入吳王勸其學乃博覽羣籍以易爲宗常在孫䇿座酣醉忽於眠中誦易一部俄而驚起衆人皆問之蒙云向夢見伏羲文王周公與我言論世祚興亡之事日月廣明之道莫不窮精極妙未該𤣥㫖政空誦其文耳皆云呂蒙囈語通周易出王子年拾遺記王穆洛陽王穆起兵酒泉西伐索嘏長史郭瑀諫不從夜夢乘青龍上天至屋而止覺歎曰屋字尸至也龍飛屋上尸至吾其死矣後果驗出前凉録張天錫張天錫在涼州夢一緑色犬甚長從南來欲咋天錫上牀避之乃墮地後苻堅遣苟萇者緑地錦袍從南來攻入門大破之出李産集異傳張駿涼文王張駿夢一人鬂眉皓白自稱子瑜曰地上之事付汝地下之事付我王寤問之有侯子瑜先死得其曾孫亮爲祁連令矣出燉煌録索充宋桶索充夢一虜脱上衣來詣充索紞占曰虜下男字也君妻當生男已後果驗闕又宋桶夢内中有一人著衣桶一手把兩杖極打之索紞占曰内中有人是肉字也兩杖箸之象極打肉食也過三日過三家皆得肉食矣出劉彦明燉煌録苻堅苻堅將欲南伐夢滿城出菜又地東南傾其占曰菜多難爲醬也東南傾江左不得平也出夢書後趙宣咸宣咸卒後五年石虎夢見咸涕泗囑其子奮曰非心慮所逹也通夢之言而有徵奮今何在左右對曰爲趙郡守於是即擢拜廷尉爲太常才力不及父因咸夢而登列卿也出趙書張甲張甲者與司徒蔡謨有親僑住謨家蹔數宿行過期不及謨晝眠夢甲云蹔行忽暴病患心腹痛病脹滿不得吐下某時死謨曰何以治之甲曰蜘蛛生斷去脚吞之則愈謨覺使人徃甲行所驗之果死出幽明録張茂會稽張茂嘗夢大象以問萬推曰君當爲大郡而不能善終大象者大獸也取諸其音獸者守也象以齒焚其身後必爲人所殺茂永昌中爲吳興太守値王敦問鼎執正不移敦遣沈充滅之出異苑晉明帝晉明時獻馬者夢河神請之及至與帝夢同即投河以奉神始太傅褚褒亦好此馬帝云已與河神及褚公卒軍人見公乘此馬矣出孔約志怪馮孝將廣平太守馮孝將男馬子夢一女人年十八九歲言我乃前太守徐元方之女不幸早亡亡來四年爲鬼所枉殺按生籙乃壽至八十餘今聽我更生還爲君妻能見聘否馬子掘開棺視之其女已活遂爲夫婦出幽明録徐精晉咸和初徐精遠行夢與妻寢有身明年歸妻果産後如其言矣出幽明録殷仲堪殷仲堪在舟夢一人曰君有濟物之心豈能移我在高燥處則恩及枯骨矣明日果有一棺逐水仲堪取而塟之於高岡酹酒其夕夢見其人來拜謝出夢雋商靈均商靈均義熙中夢人來縛其身將去形神乖散復有一人云且置之須作衡陽當取之耳後除衡陽守辭不得免果卒官出夢苑桓豁荆州刺史桓豁所住齋中見一人長丈餘夢曰我龍山之神來無好意使君既貞固我當自去耳出述異記司馬恬京口新城有鄧艾廟毁已乆晉譙王司馬恬爲都督夢一人自稱鄧公求治舍宇恬乃令與修造之出異苑賈弼河東賈弼爲琅琊參軍夜夢一人􅖟􆃆大鼻瞷目請曰愛君之貌換君之頭可乎夢中不獲已遂被換去覺而人見者悉驚走還家家人悉藏自此後能半靣笑啼兩手足及口中各題一筆書之詞翰俱美出幽明録王奉先有貴人亡後永興令王奉先夢與之相對如平生奉先問還有情色乎答云某日至其家問婢後覺問其婢云此日其夢郎君來出幽明録宗叔林晉陽守宗叔林得十頭鼈付㕑曰每日以二頭作臛其夜夢十丈夫皂布衣袴褶叩頭求哀不悟而食二枚明夜又夢八人求命方悟乃放之後夢八人來謝出捜神記沙門法稱宋沙門法稱臨終曰有松山人告我江東劉將軍應受天命吾以三十二璧一餅金爲信宋祖聞之命僧惠義徃松山七日七夜行道夢有一長鬚翁指示及覺分明憶所在掘而得之出冥祥記劉穆之劉穆之常渡楊子江宿夢合兩船爲舫上施華葢儀飾甚盛以升天既曉有一姥問曰君昨夜有佳夢否穆之乃具説之姥曰君必位居端揆言訖不見後官至僕射丹陽尹以元功也出異苑穆之又夢有人稱劉鎭軍相迎旦占之曰吾死矣今豈有劉鎭軍耶後宋武帝遣人迎共定大業武帝時爲鎭軍將軍出續異記徐羡之徐羡之爲王雄少傅主簿夢父作謂曰汝從今已後勿渡朱雀桁當貴羡之後行半桁憶先人夢㢠廻馬而以此除主簿後果為宰相出幽明録沈慶之沈慶之元嘉中始夢牽鹵簿入厠中雖忻清道而甚惡之或為之解曰君必貴然未也鹵簿者富貴之容厠中所謂後帝也君富貴不在今主矣後果中焉出拾遺録明􅒨之元嘉九年征北叅軍明􅒨之有一從者夜眠大魘􅒨之自徃喚之頃閒不能應又失其頭髻三日乃寤説云被三人捉足一人髠之忽夢見一道人以丸藥與之如桐子令以水服之及悟手中有藥服之遂瘥出幽明録劉誕竟陵劉誕在廣陵左右直眠夢人告之曰官須髪為矟旄則覺已失髪矣如此數十人出續異記袁愍孫袁愍孫世祖出為海陵守夢日墮身上尋而追還與機密出拾遗記劉沙門劉沙門居彭城病亡妻貧兒幼遭暴風雨牆宇破壊其妻泣擁穉子曰汝爺若在豈至於此其夜夢沙門將數十人料理宅舍明日完矣出甄異傳諸仲務諸仲務一女顯姨嫁為米元宗妻産亡於家俗聞産亡者以墨㸃靣其母不忍仲務宻自㸃之無人見者元宗為始新縣丞夢妻來上牀分明見新白粧靣上有墨㸃出捜神記孫氏有孫氏求官夢雙鳳集其兩拳以問占者宋董曰鳳凰非梧桐不棲非竹實不食卿當大凶非苴杖即削杖後孫氏果遭母䘮出集異記桓誓桓誓字明期居豫章時梅元龍為太守先已病矣誓徃看之語元龍云吾昨夜忽夢見君着䘮衣來迎我經數日復夢如前云二十八日當拜二十七日桓忽中惡就元龍索麝香丸聞令作凶具二十七日桓亡二十八日龍卒出續捜神記張尋巴西張尋夢庭生一竹節相似都爲一門以問竺法度云當暴貴但不得乆耳後果如其所言出述異記徐祖嘉興徐祖㓜孤叔隗養之如所生隗病祖營作甚勤是夜夢二人來云汝叔應合死也祖叩頭祈請哀愍二人云念汝如此為活之祖覺叔乃瘥出捜神記桓邈桓邈為汝南郡人齎四烏鴨作禮大兒夢四烏衣人請命覺忽見鴨將殺遂救之買肉以代還夢四人來謝而去出幽明録周氏婢陳留周氏婢入山取樵倦寢忽夢一女子坐中謁之曰吾目中有刺願乞㧞之及覺忽見一棺中有髑髏眼中草生遂與㧞之後於路傍得雙金指環出述異記何敬叔何敬叔少奉法作一檀像未有木先夢一沙門衲衣杖錫來云縣後何家桐甚良覺如夢求之果得出冥祥記太平廣記卷二百七十六
