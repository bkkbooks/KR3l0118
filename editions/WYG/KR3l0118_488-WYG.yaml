body:
  text: 太平廣記卷四百八十八宋李昉等編雜傳記五鸎鸎傳元稹譔唐貞元中有張生者性温茂美風容内秉堅孤非禮不可入或朋從遊宴擾雜其間他人皆洶洶拳拳若將不及張生容順而已終不能亂以是年二十三未嘗近女色知者詰之謝而言曰登徒子非好色者是有淫行余真好色者而適不我值何以言之大凡物之尤者未嘗不留連於心是知其非忘情者也詰者哂之無幾何張生遊於蒲蒲之東十餘里有僧舎曰普救寺張生寓焉適有崔氏孀婦將歸長安路出於蒲亦止兹寺崔氏婦鄭女也張出於鄭緒其親乃異派之從母是歳渾瑊薨於蒲有中人丁文雅不善於軍軍人因喪而擾大掠蒲人崔氏之家財産甚厚多奴僕旅寓惶駭不知所托先是張與蒲將之黨有善請吏䕶之遂不及於難十餘日廉使杜確將天子命以總戎節令於軍軍由是戢鄭厚張之徳甚因飾饌以命張中堂宴之復謂張曰姨之孤嫠未亡提攜幼稚不幸屬師徒大潰實不保其身弱子幼女猶君之生豈可比常恩哉今俾以仁兄禮奉見冀所以報恩也命其子曰歡郎可十餘歳容甚温美次命女出拜爾兄爾兄活爾久之辭疾鄭怒曰張兄保爾之命不然爾且擄矣能復逺嫌乎久之乃至常服悴容不加新飾垂鬟接黛雙臉銷紅而已顔色豔異光輝動人張驚為之禮因坐鄭旁以鄭之抑而見也凝睇怨絶若不勝其體者問其年紀鄭曰今天子甲子歳之七月終於貞元庚辰生年十七矣張生稍以詞導之不對終席而罷張自是惑之願致其情無由得也崔之婢曰紅娘生私為之禮者數四乘間遂道其衷婢果驚沮腆然而奔張生悔之翼日婢復至張生乃羞而謝之不復云所求矣婢因謂張曰郎之言所不敢言亦不敢泄然而崔之姻族君所詳也何不因其徳而求娶焉張曰余始自孩提性不茍合或時紈綺閒居曾莫流盼不為當年終有所蔽昨日一席間幾不自持數日來行忘止食忘飽恐不能逾旦暮若因媒氏而娶納采問名則三數月間索我於枯魚之肆矣爾其謂我何婢曰崔之貞慎自保雖所尊不可以非語犯之下人之謀固難入矣然而善屬文往往沈吟章句怨慕者久之君試為喻情詩以亂之不然則無由也張大喜立綴春詞二首以授之是夕紅娘復至持綵牋以授張曰崔所命也題其篇曰明月三五夜其詞曰待月西廂下迎風户半開拂牆花影動疑是玉人來張亦微喻其㫖是夕歳二月旬有四日矣崔之東有杏花一株攀援可踰既望之夕張因梯其樹而踰焉達於西廂則户半開矣紅娘寢於牀生因驚之紅娘駭曰郎何以至張因紿之曰崔氏之牋召我也爾為我告之無幾紅娘復來連曰至矣至矣張生且喜且駭必謂獲濟及崔至則端服嚴容大數張曰兄之恩活我之家厚矣是以慈母以弱子幼女見託奈何因不令之婢致淫逸之詞始以䕶人之亂為義而終掠亂以求之是以亂易亂其去幾何誠欲寢其詞則保人之姦不義明之於母則背人之惠不祥將寄於婢僕又懼不得發其真誠是用託短章願自陳啓猶懼兄之見難是用鄙靡之詞以求其必至非禮之動能不媿心特願以禮自持無及於亂言畢翻然而逝張自失者久之復踰而出於是絶望數夕張生臨軒獨寢忽有人覺之驚駭而起則紅娘歛衾攜枕而至撫張曰至矣至矣睡何為哉並枕重衾而去張生拭目危坐久之猶疑夢寐然而修謹以俟俄而紅娘捧崔氏而至至則嬌羞融冶力不能運支體曩時端莊不復同矣是夕旬有八日也斜月晶瑩幽輝半牀張生飄飄然且疑神仙之徒不謂從人間至矣有頃寺鐘鳴天將曉紅娘促去崔氏嬌啼宛轉紅娘又捧之而去終夕無一言張生辨色而興自疑曰豈其夢邪及明覩妝在臂香在衣淚光熒熒然猶瑩於茵席而已是後又十餘日杳不復知張生賦㑹真詩三十韻未畢而紅娘適至因授之以貽崔氏自是復容之朝𨼆而出暮𨼆而入同安於曩所謂西廂者幾一月矣張生常詰鄭氏之情則曰知不可奈何矣因欲就成之無何張生將之長安先以情諭之崔氏宛無難詞然而愁怨之容動人矣將行之再夕不可復見而張生遂西不數月復遊於蒲㑹於崔氏者又累月崔氏甚工刀札善屬文求索再三終不可見往往張生自以文挑亦不甚覩覽大畧崔之出人者藝必窮極而貌若不知言則敏辯而寡於酬對待張之意甚厚然未嘗以詞繼之時愁豔幽􅃉恒若不識喜愠之容亦罕形見異時獨夜操琴愁弄悽惻張竊聴之求之則終不復鼓矣以是愈惑之張生俄以文調及期又當西去當去之夕不復自言其情愁歎於崔氏之側崔已隂知將訣矣恭貌怡聲徐謂張曰始亂之終棄之固其宜矣愚不敢恨必也君亂之君終之君之惠也則殁身之誓其有終矣又何必深感於此行然而君既不懌無以奉寜君常謂我善鼓琴向時羞顔所不能及今且往矣既君此誠因命拂琴鼓霓裳羽衣序不數聲哀音怨亂不復知其是曲也左右皆歔欷崔亦遽止之投琴泣下流連趨歸鄭所遂不復至明旦而張行明年文戰不勝張遂止於京因貽書於崔以廣其意崔氏緘報之詞粗載於此曰捧覽來問撫愛過深兒女之情悲喜交集兼惠花勝一合口脂五寸致耀首膏唇之飾雖荷殊恩誰復為容睹物增懷但積悲歎耳伏承使於京中就業進修之道固在便安但恨僻陋之人永以遐棄命也如此知復何言自去秋已來常忽忽如有所失於諠譁之下或勉為語笑閒宵自處無不淚零乃至夢寐之間亦多感咽離憂之思綢繆繾綣暫若㝷常幽㑹未終驚魂已斷雖半衾如暖而思之甚遙一昨拜辭倐逾舊歳長安行樂之地觸緒牽情何幸不忘幽微眷念無斁鄙薄之志無以奉酬至於終始之盟則固不忒鄙昔中表相因或同宴處婢僕見誘遂致私誠兒女之心不能自固君子有援琴之挑鄙人無投梭之拒及薦寢席義盛意深愚陋之情永謂終託豈期既見君子而不能定情致有自獻之羞不復明侍巾櫛没身永恨含歎何言倘仁人用心俯遂幽眇雖死之日猶生之年如或達士畧情捨小從大以先配為醜行以要盟為可欺則當骨化形銷丹誠不泯因風委露猶託清塵存没之誠言盡於此臨紙嗚咽情不能申千萬珍重珍重千萬玉環一枚是兒嬰年所弄寄充君子下體所佩玉取其堅潤不渝環取其終始不絶兼亂絲一約文竹茶碾子一枚此數物不足見珍意者欲君子如玉之真俾志如環不解涙痕在竹愁緒縈絲因物達情永以為好耳心邇身遐拜㑹無期幽憤所鍾千里神合千萬珍重春風多厲强飯為嘉慎言自保無以鄙為深念張生發其書於所知由是時人多聞之所善楊巨源好屬詞因為賦崔娘詩一絶云清潤潘郎玉不如中庭􅈍草雪銷初風流才子多春思腸斷蕭娘一紙書河南元稹亦續生㑹真詩三十韻詩曰微月透簾櫳螢光度碧空遙天初縹緲低樹漸葱蘢龍吹過庭竹鸞歌拂井桐羅綃垂薄霧環珮響輕風絳節隨金母雲心捧玉童更深人悄悄晨㑹雨濛濛珠瑩光文履花明𨼆繡龍瑤釵行綵鳯羅帔掩丹虹言自瑤華浦將朝碧玉宫因遊洛城北偶向宋家東戲調初微拒柔情已暗通低鬟蟬影動回歩玉塵蒙轉面流花雪登牀抱綺叢鴛鴦交頸舞翡翠合歡籠眉黛羞偏聚唇朱暖更融氣清蘭蘂馥膚潤玉肌豐無力慵移腕多嬌愛歛躬汗流珠㸃㸃髪亂緑葱葱方喜千年㑹俄聞五夜窮留連時有恨繾綣意難終慢臉含愁態芳詞誓素衷贈環明運合留結表心同啼粉流清鏡殘燈遶暗蟲華光猶苒苒旭日漸曈曈乘鶩還歸洛吹簫亦上嵩衣香猶染麝枕膩尚殘紅羃羃臨塘草飄飄思渚蓬素琴鳴怨鶴清漢望歸鴻海濶誠難渡天高不易冲行雲無處所簫史在樓中張之友聞之者莫不聳異之然而張志亦絶矣稹特與張厚因徵其詞張曰大凡天之所命尤物也不妖其身必妖於人使崔氏子遇合富貴秉寵嬌不為雲為雨則為蛟為螭吾不知其所變化矣昔殷之辛周之幽據百萬之國其勢甚厚然而一女子敗之潰其衆屠其身至今為天下僇笑予之徳不足以勝妖孽是用忍情於時坐者皆為深歎後歳餘崔已委身於人張亦有所娶適經所居乃因其夫言餘崔求以外兄見夫語之而崔終不為出張怨念之誠動於顔色崔知之潛賦一章詞曰自從消痩減容光萬轉千迴懶下牀不為旁人羞不起為郎憔悴却羞郎竟不之見後數日張生將行又賦一章以謝絶云棄置今何道當時且自親還將舊時意憐取眼前人自是絶不復知矣時人多許張為善補過者予常於朋㑹之中往往及此意者使夫知者不為為之者不惑貞元歳九月執事李公垂宿於予靖安里第語及於是公垂卓然稱異遂為鸎鸎歌以傳之崔氏小名鸎鸎公垂以命篇太平廣記卷四百八十八
