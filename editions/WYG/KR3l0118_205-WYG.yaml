body:
  text: 太平廣記卷二百五羯皷𤣥宗宋璟李龜年曹王臯李琬杜鴻漸銅皷張直方鄭續琵琶羅黑黑裴洛兒楊妃段師漢中王瑀韋應物宋沇皇甫直王沂關别駕王氏女五絃趙辟箜篌徐月華羯皷羯皷出外夷樂以戎羯之皷故曰羯皷其音主太簇一云龜兹部高昌部疎勒部天竺部皆用之次在都曇皷答臘皷之下都曇皷狀腰皷而小答臘者卽揩皷也雞婁皷之上􅀈如漆桶山桑水為之下以牙牀承之撃用兩杖其聲焦殺鳴烈尤宜但曲急破作㦸杖連碎之又宜高樓翫景明月清風凌空透遠極異衆樂杖用黄檀狗骨花椒等木須至乾𦂳絕濕氣而復柔膩乾取發越響膩取戰䮍健舉捲用剛鐡鐡當精鍊捲當至勻若不剛卽應絛髙下搊捩不停不勻卽皷面緩急若琴徽之㪇病矣出羯皷録𤣥宗唐𤣥宗洞曉音律由之天縱凡是管絃必造其妙若製作調曲隨意卽成不立章度取適短長應指散聲皆中㸃指至於清濁變轉律吕呼召君臣事物迭相制使雖古之䕫曠不能過也尤愛羯皷常云八音之領袖諸樂不可為比嘗遇二月初詰旦巾櫛方畢時宿雨始晴景色明麗小殿内亭柳杏將吐覩而歎曰對此景物豈可不與他判斷之乎左右相目將命備酒獨髙力士遣取羯皷上旋命之臨軒縱擊一曲曲名春光好上自製也神思自得及顧柳杏皆已發拆指而笑謂嬪嬙内官曰此一事不喚我作天公可乎皆呼萬歳又製秋風髙每至秋空迥激纎翳不起卽奏之必遠風徐来庭葉徐下其妙絶入神如此出羯皷録𤣥宗嘗伺察諸王寧王夏中揮汗鞔皷所讀書乃龜兹樂譜也上知之喜曰天子兄弟當極此樂出酉陽雜俎又汝陽王璡寧王長子也姿容妍美秀出藩邸𤣥宗特鍾愛焉自𫝊授之又以其聰悟敏慧妙逹其㫖每隨遊幸頃刻不捨璡嘗戴砑絹㡌打曲上自摘紅槿花一朶置於㡌上其二物皆極滑乆之方安遂奏舞山香一曲而花不墜本色所謂定頭項難在不揺動也上大喜笑賜金器因誇曰花奴璡小名姿質明瑩肌髪光細非人間人必神仙謫墜也寧王謙謝隨而短斥之上笑曰大哥不必過慮阿暪自是相師夫帝王之相且須英特越逸之氣不然有深沈包育之度花奴但秀邁人悉無此狀固無猜也而又舉止閒雅當更得公卿間令譽耳寧王又謝之而曰若於此臣乃輸之上曰若此一條阿暪亦輸大哥矣寧王又謙謝上笑曰阿瞞􅑿處多大哥亦不用撝揖衆皆歡賀𤣥宗性俊邁酷不好琴曾聽彈正弄未及畢叱琴者曰待詔出去謂内官曰速召花奴將羯皷来為我解穢又黄幡綽亦知音上曾使人召之不時至上怒絡繹遣使尋捕之綽既至及殿側聞上理皷固止謁者不令報俄頃上又問侍官奴来未綽又止之曲罷復改曲纔三數十聲綽即走入上問何處来曰有親故逺適送至城外上頷之皷畢上謂曰頼稍遲我向来怒意至必禍焉適方思之長入供􅆢五十餘日蹔一日出外不可不許他東西過往綽拜謝畢内官有相偶語笑者上詰之具言綽尋至聽皷而候其時入上問綽綽語上方怒其解怒之際皆無少差誤上竒之復厲聲謂之曰我心脾骨下事安有侍官奴聽小皷能料之耶今且謂我如何綽遂走下階面北鞠躬大聲曰奉敇監金雞上大笑而止並岀羯皷録宋璟宋開府璟雖耿介不羣亦深好聲樂尤善羯皷始承恩顧與𤣥宗論皷事曰不是青州石末即是魯山花甕撚小碧上掌下須有朋去聲肯聲據此乃是漢震第一皷也且磉用石末花甕固是腰皷掌不朋去聲肯聲是以手指非羯皷明矣第二皷者左以足右以手指璟又謂上曰頭如青山峰手如白雨㸃按此即羯皷之能事山峰取不動雨㸃取其急𤣥宗與璟兼善両皷也而羯皷偏好以其比漢震稍雅細焉開府之家悉𫝊之東都留守鄭叔明祖母即開府之女今尊賢里鄭氏第有小樓即宋夫人習皷之所也出羯皷録李龜年李龜年善羯皷𤣥宗問卿打多少枚對曰臣打五十枚訖上曰汝殊未我打却三豎櫃也後數年又聞打一豎櫃因錫一拂枚羯皷捲出傳記曹王臯嗣曹王臯有巧思精於噐用為荆州節度使有羇旅士人懐二捲欲求通謁先啓於賔府觀者訝之曰豈足尚耶士曰但啓之尚書當解矣及見臯捧而歎曰不意今日獲逢至寳指其剛勻之狀賔坐唯唯或腹非之臯曰諸公未必信命取食柈自選其極平者遂重二捲於柈心以油注捲滿而油不寖漏相葢契際也臯曰此必開元天寳中供御捲不然無以至此問其所自客曰先人在黔得於髙力士之家衆方深伏闕李琬廣德中蜀客前雙流縣丞李琬者亦能之調集至長安居務本里嘗夜聞羯皷曲頗工妙於月下歩尋至一小宅門戸極卑隘叩門請謁謂皷工曰君所擊者豈非耶婆色雞乎一本作耶婆娑雞雖至精能而無尾何也工大異之曰君固知音者此事無有知某太常工人也祖父𫝊此藝尤能此曲近者張儒入長安其家流散父沒河西此曲遂絕今但按舊譜數本尋之竟無結尾之聲因夜夜求之也琬曰曲下意盡乎工曰盡琬曰意盡即曲盡又何索焉工曰奈聲不盡何琬曰可言矣夫曲有如此者須以他曲解之方可盡其聲也夫耶婆娑雞當用屈柘急遍解工如所敎果相諧協聲意皆盡如柘枝用渾解甘州用急了解之𩔖也工泣而謝之即言於寺卿奏為主簿後累官至太常少卿宗正卿出羯皷録杜鴻漸代宗朝宰相杜鴻漸亦能羯皷永太中為三副元帥西川節度使至成都李琬有削杖者在蜀以杖獻鴻漸鴻漸以示於衆曰此尤物也當衣衾中収貯積時矣匠曰某於脊溝中養者十年及蜀至利州西界望嘉驛路入漢川矣自西南来始㑹嘉陵江頗有山水景致其夜月色又佳乃與從事楊炎杜悰輩登驛樓望江月行酒讌語曰今日岀艱危猜廹外即不辱命於朝廷内即免中禍於㣲質既保此安歩又瞰此殊境安得不自賀乎遂命家僮取皷與板笛以所得杖奏數曲四山猿鳥皆驚飛噭走從事悉異之曰昔䕫之摶拊百獸舞庭此豈逺耶鴻漸曰若某於此稍曾致力猶未臻妙尚能及是况至聖遇夫賢臣考樂飛走之𩔖何有不感因言此有别墅近花巖閣每遇風景清明即時或登閣奏此初見羣羊牧於川下忽數頭躑躅不已某不謂之以皷然也及止皷亦止復皷之亦復然遂以疾徐髙下而節之無不應之而變旋有二犬自其家走而吠之及羣羊側遂漸止聲仰首若有所聽少選又復宛頸揺尾亦從而變態是知率舞固無難矣近士林中無習之者唯僕射韓臯善亦不甚露為鄂州節度使時聞於黄鶴樓一兩習而已岀羯皷録銅皷蠻夷之樂有銅皷焉形如腰皷而一頭有面皷面圓二尺許面與身連全用銅鑄其身遍有虫魚花草之狀通體均勻厚二分以来爐鑄之妙實為竒巧撃之響亮不下鳴鼉貞元中驃國進樂有玊螺銅皷玊螺皆螺之白者非琢玊所為也即知南蠻酋首之家皆有此皷也張直方咸通末幽州張直方貶龔州刺史到任後修葺州城因掘土得一銅皷滿任載以歸京到襄漢以為無用之物遂捨延夀慶院用大木魚懸於齋室今見存焉並出嶺表録異鄭續僖宗朝鄭續鎮番禺日有林藹者為髙州太守有牧兒因放牛聞田中有蛤鳴蛤即是蝦蟇牧童遂捕之蛤跳入一穴掘之深大即蠻酋塜也蛤乃無蹤穴中得一銅皷其色翠緑土蝕數處損缺其上隱起多鑄蛙黽之狀疑其鳴蛤即皷精也遂狀其緣由納於廣帥懸於武庫今尚存焉出嶺表録異琵琶羅黑黑太宗時西國進一胡善彈琵琶作一曲琵琶絃撥倍麤上每不欲番人勝中國乃置酒髙㑹使羅黑黑隔帷􅃪之一遍而得謂胡人曰此曲吾宫人能之取大琵琶遂於帷下令黑黑彈之不遺一字胡人謂是宫女也驚歎辭去西國聞之降者數十國出朝野僉載裴洛兒貞觀中彈琵琶裴洛兒始廢撥用手今俗所謂搊琵琶是也出國史纂異楊妃開元中有中官白秀貞自蜀使廻得琵琶以獻其槽邏皆桫檀為之温潤如玊光耀可鑒有金縷紅文影成雙鳳楊妃每抱是琵琶奏於梨園音韻淒清飄如雲外而諸王貴主自虢國已下競為貴妃琵琶弟子每受曲畢皆廣有進獻出譚賔録段師古琵琶絃用鵾雞筋開元中段師能彈琵琶用皮絃賀懐智破撥彈之不能成聲出酉陽雜俎漢中王瑀漢中王瑀見康崐崘彈琵琶云琵聲多琶聲少未可彈五十四絃大絃也自下而上謂之琵自上而下謂之琶出𫝊記韋應物韋應物為蘇州刺史有屬官因建中之亂得國工康崐崘琴瑟琵琶至是送官表進入内出國史補宋沇宋開府孫沇有音律之學貞元中進樂書三卷德宗覽而嘉焉又知是璟之孫遂召賜對坐與論音樂喜數日又召至宣徽張樂使觀焉曰有舛誤乖濫悉可言之沇曰容臣與樂官商𣙜講論具狀條奏上使宣徽使敎坊與樂官參議數日然後奏進樂工多言沇不解聲律不審節拍兼又瞶疾不可議樂上頗異之又宣召見對曰臣年老多疾耳實失聰若迨於音律不至無業上又使作樂曲罷問其得失承禀舒遲衆工多笑之沇顧笑忿怒作色奏曰曲雖妙其間有不可者上驚問之即指一琵琶云此人大逆戕忍不日間即抵法不宜在至尊前又指一笙云此人神魂已逰墟墓不可更令共􅆢上大駭焉令主者潛伺察之既而琵琶者為同儕告訐稱其六七年前其父自縊不得端由即令按鞫遂伏罪笙者乃憂恐不食旬日而卒上轉加欽重面賜章服累召對每令察樂樂工悉惴恐脇息不敢正視沇懼罹禍辭病而退出羯皷録皇甫直蜀將皇甫直别音律撃陶器能知時月好彈琵琶元和中嘗造一調乘凉臨水池彈之本黄鍾而聲入㽔賔因更絃再三奏之聲猶㽔賔也直甚惑不悦自意不祥隔日又奏於池上聲如故試彈於他處則黄鍾也直因切調㽔賔夜復鳴於池上覺近岸波動有物激水如魚跳及下絃則沒矣直遂集客車水竭池窮泥索之數日泥下丈餘得鐡一片乃方響㽔賔鐡也出酉陽雜俎王沂王沂者平生不解絃管忽旦睡至夜乃寤索琵琶絃之成數曲一名雀啅蛇一名胡王調一名胡𤓰苑人不識聞􅃪之者莫不流淚其妹請學之乃敎數聲須㬰總忘不復成曲岀朝野僉載關别駕昭宗末京都名娼妓兒皆為強諸侯所有供􅆢彈琵琶樂工號關别駕小紅者小名也梁太宗求之既至謂曰爾解彈手不採桑乎關俛而奏之及出又為親近者俾其彈而飲酒由是失意不乆而殂復有琵琶石潨者號石司馬自言早為相國令狐綯見賞俾與諸子渙渢連水邉作名亂後入蜀不隸樂籍多逰諸大官家皆以賔客待之一日㑹軍挍數員飲酒作歡石潨以胡琴在坐非知音者諠譁語笑殊不傾􅃪潨乃撲檀槽而詬曰某曾為中朝宰相供􅆢今日與健兒彈而不我􅃪何其苦哉于時識者歎訝之出北夢𤨏言王氏女王蜀黔南節度使王保義有女適荆南髙從誨之子保節未行前蹔寄羽服性聰敏善彈琵琶因夢異人頻授樂曲所授之人其形或道或俗其衣或紫或黄有一夕而𫝊數曲有一􅃪而便記者其聲清越與常異𩔖於仙家紫雲之亞也乃曰此曲譜請元昆製序刋石於甲寅之方其兄即荆南推官王少監貞範也為製序刋石所𫝊曲有道調宫玉宸宫夷則宫神林宫㽔賔宫無射宫𤣥宗宫黄鍾宫散水宫仲呂宫商調獨指泛清商好仙商側商紅綃商鳯抹商玉仙商角調雙調角醉吟角大呂角南吕角中呂角髙大殖角㽔賔角羽調鳯吟羽背風香背南羽背平羽應聖羽玉宫羽玉宸羽風香調大吕調其曲名一同人世有涼州伊州胡渭州甘州綠腰莫靼項盆樂安公子水牯子阿濫泛之屬凡二百以上曲所異者徴調中有湘妃怨哭顔回當時胡琴不彈徴調也王適髙氏數年而亡得非謫墜之人乎孫光憲子父即王氏之姪也記得一兩曲嘗聞彈之亦異事也出北夢瑣言五絃趙辟趙辟彈五絃人間無其術辟曰吾之於五絃也始則神遇之終則天隨之方吾浩然眼如耳目如鼻不知五絃為辟辟之為五絃也出國史補箜篌徐月華魏髙楊王雍美人徐月華能彈臥箜篌為明妃出塞之聲有田僧起能吹笳為壯士歌項羽吟將軍崔延伯岀師每臨敵令僧起為壯士聲遂單馬入陣出酉陽雜俎太平廣記卷二百五
