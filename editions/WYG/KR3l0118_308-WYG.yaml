  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_308-1a, image: WYG1045/WYG1045-0268a.png}
body:
  text: 太平廣記卷三百八宋李昉等編神十八李回李序蔡榮劉元迥鄭翦柳澥馬總崔龜從李回唐故相李回少時常久疾兄軿召巫覡于庭中設酒食以樂神方面壁而卧忽聞庭中喧然回視見堂下有數十人或衣黄衣緑競接酒食而啖之良久將散巫欲徹其席忽有一人自空而下左右兩翅諸鬼皆辟易而退且曰陸大夫神至矣巫者亦驚曰陸大夫神來即命致酒食於庭其首俯於筵上食之且盡乃就飲其酒俄頃其貌赬然若有醉色遂飛去羣鬼亦隨而失後數日回疾愈出宣室志李序元和四年壽州霍丘縣有李六郎自稱神人御史大夫李序與人言不見其形有王筠者為之役至霍丘月餘賃宅住更無餘物惟几案繩床而已有人請事者皆投狀王筠鋪於案側文字温潤須臾滿紙能書字體分明休咎皆應時河南長孫郢為鎮遏使初不之信及見實時與來往先是官宅後院空寛夜後或梟鳴狐呌小大為畏乃命李六郎與疏理遂云諾每行似風雨霎霎之聲須臾聞笞捶之聲遣之云更不得來自是後院遂安時御史大夫李湘為州牧侍御史張宗本為副史嵗餘宗本行縣先知有李序之異而不信乃令長孫郢召之須臾而至宗本求一札欲以呈於牧守取紙筆而請序曰接對諸公便書可乎張曰可也初案上三管筆俄而忽失一管旋見文字滿紙後云御史大夫李序頓首宗本心服歸而告湘湘乃令使邀之遂往來數日云是五嶽之神之弟也第七舎弟在蘄州某於隂道管此郡亦飲酒語聲如女人言詞切要宛暢笑詠常作笑巫詩曰魍魎何曾見頭旋即下神圖他衫子段詐道大王嗔如此極多亦不全記後云暫往蘄州看舎弟到蘄乃七月中仍令王筠送新粳米二斗札一封與長孫郢近姿州人皆請休咎於李序其批判處猶存出博異志蔡榮中牟縣三異鄉木工蔡榮者自幼信神祗每食必分置於地潛祝土地至長未常暫忘也元和二年春卧疾六七日方暮有武吏走來謂母曰蔡榮衣服器用速藏之勿使人見乃速為婦人服飾有來問者必紿之曰出矣求其處則亦意對勿令知所在也言訖走去妻母從其言才畢有將軍乗馬從十餘人執弓矢直入堂中呼蔡榮其母驚惶曰不在曰何往對曰榮醉歸怠於其業老婦怒而笞之榮或潛去不知何在也十餘日矣將軍遣吏入搜摉者出曰房中無丈夫亦無器物將軍連呼地界敎藏者出曰諾責曰蔡榮出行豈不知處對曰怒而私出不告所由將軍曰王後殿傾須此巧匠期限向盡何人堪替對曰梁城鄉葉幹者巧於蔡榮計其年限正當追役將軍者走馬而去有頃教藏者復來曰某地界所由也以蔡榮每食必相召故報恩耳遂去母視榮即汗浹矣自此疾愈俄聞梁城鄉葉幹者暴卒幹妻乃榮母之猶子也審其死者正當榮服雌服之時有李復者從母夫楊曙為中弁團户於三異鄉徧聞其事就召榮母問之回以相告其泛祭之見德者豈其然乎出續𤣥怪録劉元迥劉元迥者狡妄人也自言能鍊水銀作黄金又巧以鬼道惑衆衆多迷之以是致富李師古鎮平盧招延四方之士一藝者至則厚給之元迥遂以此術干師古師古異之而試其能或十銖五銖皆立成焉葢先以金屑置於汞中也師古曰此誠至寶宜何用元迥貴成其姧不虞後害乃曰雜之他藥徐燒三年可以飛仙為食器可以避毒為翫用可以避邪師古大神之因曰再燒其期稍緩子且為我化十斤將備吾所急之器也元迥本􅃷此術規師古錢帛逡巡則謀遯去為師古縻之專令燒金其數極廣元迥無從而致因以鬼道説師古曰公紹續一方三十餘載雖戎馬倉廩天下莫與之儔然欲遣四方仰歸威德所圖必遂者須假神祗之力師古甚悦因而詢之元迥則曰泰嶽天齊王𤣥宗東封因以沈香刻製其像所以𤣥宗享國永年公能以他寶易其像則受福與開元等矣師古狂悖甚然之元迥乃曰全軀而致或恐卒不能辦且以黄金十五斤鑄換其首固當獲祐矣師古曰君便先為燒之速成其事元迥大笑曰天齊雖曰貴神乃鬼𩔖耳若以吾金為其首豈㝠鬼敢依至靈之物哉是則斥逐天齊何希其福哉但以山澤純金而易之則可矣師古尤異之則以藏金二十斤恣元迥所為仍命元迥就嶽廟而易焉元迥乃以鉛錫雜𩔖鎔其外而置之懷其真金以歸為師古作飲食器皿靡不辦集矣師古尤加禮重事之如兄玉帛姬妾居第資奉甚厚明年師古方宴僚屬將吏忽有庖人自㕑徑詣師古於衆會之中因舉身丈餘蹈空而立大詬曰我五嶽之神是何賊盜殘我儀質我上訴於帝涉嵗方歸及歸我之甲兵軍馬帑藏財物皆為黄石公所掠去則又極罵復聳身數丈良久履地師古令曳去庖人無復知覺但若沈醉者數日師古則令畫作戎車戰士戈甲旌旗及紙錢綾帛數十車就泰山而焚之尚未悟元迥之姧方將理之而師古暴瘍不數日腦潰而卒其弟師道領事即令判官李文會虞早等按之元迥辭窮戮之于市出集異記鄭翦穆宗有事於南郊將謁太清宫長安縣主簿鄭翦主役於御院之西序見白衣老人云此下有井正值皇帝過路汝速實之不然罪在不測翦惶遽使修之其處已陷數尺發之則古井也驚顧之際已失老人所在功徳使護軍中尉劉宏規奏之帝至宫朝獻畢赴南郊於宫門駐馬宰臣及供奉官稱賀遂命翰林學士韋處厚撰記令起居郎柳公權書於實井之上名曰聖瑞感應紀仍賜鄭翦緋衣出唐統紀柳澥柳澥少貧遊嶺表廣州節度使孔戣遇之甚厚贈百餘金諭令西上遂與秀才嚴燭曽黯數人同舟北歸至陽朔縣南六十里方博於舟中忽推去博局起離席以手接一物初視之若有人投刺者即急命衫帶泊舟而下立於沙岸拱揖而言曰澥幸得與諸君同事符命雖至當須到桂州然議行李君宜前路相候曽嚴見澥之所為不覺懔然亦皆􅆄蠁如有所覩澥即却入舟中偃卧吁嗟良久謂二友曰僕已受泰山主簿向者車乗吏從畢至已與約至桂州矣自是無復笑言亦無疾但每至夜泊之處則必箕踞而坐指揮處分皆非生者所為陽朔去州尚三日程其五十灘常須舟人盡力乃過至是一宿而至澥常見二紫衣具軍容執鎚驅百餘卒在水中推挽其舟澥至桂州修家書纔畢而卒時唐元和十四年八月也出河東記馬總馬總為天平節度使暇日方修逺書時術人程居在傍總憑几忽若假寐而神色慘蹙不𩔖於常程不敢驚乃徐起詣其佐相元封告之俄而總召元封屏人謂曰異事異事某適有所詣嚴邃崇閟王者之居不若也為人導前見故杜十丈司徒笑而下階相迎曰久延望甚喜相見因留連曰祐之此官亦人世之中書令耳六合之内靡不闗由然久處會劇心力殆倦將求賢自代公之識度誠克大用況親且故所以奉邀敬以相授總因辭退至於泣下良久杜乃曰既未為願則且歸矣然二十年當復相見總既寤大喜其壽之遐逺自是後二年而薨豈馬公誤聽將祐增其年以悦其意也出集異記崔龜從崔龜從長慶三年以大理評事從事河中府一夕夢與人入官署及其庭望見室内有人當陽儀衛甚盛又一人側坐容飾略同皆隆準盱目搦管視狀若決事者因疾趨及階拜唯而退行及西廟視廡下牖間文簿堆積於大格若今之吏舍有吏抱案而出因迎問之此當是隂府某願知禄壽幾何吏應曰二人後且皆為此州刺史無勞閲簿也及出門又見同時從事席地而樗蒲歸寤大異之髣髴在目唯所與同行者夢中顧之其姓名是常所交逰及覺遂忘其人明日入公府話於同舍皆以為吉解曰君夢得君而又見樗蒲者蒲也君後當如主公節臨蒲州矣爾後每入祠廟輒思所夢嘗屢謁河瀆及為華州拜西嶽廟宇神像皆非夢中所見開成中自户部侍郎出為宣州去前夢二十年矣五月至郡吏告曰敬亭神實州人所嚴奉每嵗無貴賤必一祀焉其他祈禱報謝無虚日以故亷使輒備禮祀謁龜從時病至秋乃愈因謁廟及門怳然屏上有畫人抱案而鞠躬乃夢中之吏也入廟所經厯無非昔夢唯無同行者歸以告妻子明年七月龜從又病苦下泄尤不喜食暮夜輒大劇因自證前夢以為吏所告者吾其終於此乎因心禱之既寐又夢晨起視事如常時將就便室及側門有家吏姚珪者附耳言曰左府君使人傳語聞之心悸而毛􅆆意其非常人就室未及坐有一人戎服提刀奔趨而入視其狀魁岸面黝而加赤不𩔖人色紫衣黦剝乃敬亭廟中階下土偶人也未及語龜從厲聲言曰我年得㡬許遂應曰得六十㡬夢中記其言及覺遂忘其奇載意者神不欲人逆知其終歟遲明自為文以祝神具道所以命兒姪將酒牢廟中以禱先是疾作醫言疾由寒而發服熱藥輒劇遂求醫於浙西醫沈中遂乗驛而至既切脈直言公之疾熱過而氣壅當以陽治之藥劑以甘草犀角為主如其言涉旬而稍間經月而良已自以為必神之助又自為文以助神因出私俸修廟之壞隳加置土偶人寫垣墉之畫繪皆新之大設樂以享神自舉襟袖以舞始長慶感夢之時絶不為五木之戱及至江南方與從事復為之龜從後入相罷為少保歸洛大中七年卒出龜從自叙太平廣記卷三百八
