body:
  text: 太平廣記卷三百六十九宋李昉等編精怪二雜器用蘓丕女蔣惟岳華隂村正韋諒東萊客交城里人岑順元無有李楚賓蘇丕女武功蘇丕天寶中為楚丘令女適李氏李氏素寵婢因與丕女情好不篤其婢求術者行魘蠱之法以符埋李氏宅糞土中又縳綵婦人形七枚長尺餘藏於東牆窟内而泥飾之人不知也數歲李氏内婢相繼死亡女寡居四五年魘蠱術成綵婦人出逰宅内蘇氏因爾疾發悶絶李婢已死莫知所由經一載累求術士禁咒備至而不能制後伺其復出乃率數十人掩捉得一枚視其眉目形體悉具在人手中恒動不止以刀斫之血流于地遂積柴焚之其徒皆來焚所號呌或在空中或在地上燒畢宅中作炙人氣翌日皆白衣號哭數日不已其後半歲累獲六枚悉焚之唯一枚得而復逸逐之忽乃入糞土中蘇氏率百餘人掘糞深七八尺得桃符符上朱書字宛然可識云李氏婢魘蘇氏家女作人七枚在東壁上土龕中其後九年當成遂依破壁又得一枚丕女自爾無恙出廣異記蔣惟岳蔣惟岳不懼鬼神常獨卧窻下聞外有人聲岳祝云汝是寃魂可入相見若是閑鬼無宜相驚於是窣然排户而欲昇其牀見岳不懼旋立壁下有七人焉問其所為立而不對岳以枕擊之皆走出户因走趂沒於庭中明日掘之得破車輻七枚其怪遂絶又其兄常患重疾岳親自看視夜深又見三婦人鬼至兄牀前叱退之三遍鬼悉倒地久之走出其兄遂愈出廣異記華陰村正華陰縣七級趙村村路因囓成谷梁之以濟往來有村正常夜渡橋見羣小兒聚火為戲村正知其魅射之若中木聲火即滅聞啾啾曰射著我阿連頭村正上縣迴尋之見破車輪六七片有頭杪尚銜其箭者出酉陽雜俎韋諒乾元中江寧縣令韋諒堂前忽見小鬼以下脣掩面來至燈所去又來使人逐之沒于堦下明旦掘其沒處得一故門扇長尺餘頭作卷荷狀出廣異記東萊客東都郡有館亭其西軒常有怪異客有寢其下者夜常聞有犬吠聲甚微以燭視之則一無所見如是者累年矣其後郡守命扄鍵為庫嘗一夕月皎有庫吏見一犬甚小蒼色自軒下環庭而走庫吏怪其與常犬異因投石擊之其犬吠而去入西軒下明日庫吏以其事白於郡守郡守命於西軒窮其跡見門上狗有蒼毛甚多果庫吏所見蒼犬之色衆方悟焉出宣室志交城里人交城縣南十數里常夜有怪見於人多悸而病且死焉里人患之久矣其後里中人有執弧矢夜行者縣南見一魁然若巨人狀衣朱衣以皁巾蒙其首緩步而來欹偃若甚醉者里人懼即引滿而發果中焉其怪遂退里人懼少解即北走至旅舍且語其事明日抵縣城見郭之西丹桂有一矢貫其上果里人之矢取之以歸鏃有血甚多白於縣令令命焚之由是縣南無患出宣室志岑順汝南岑順字孝伯少好學有文老大尤精武略旅於陜州貧無第宅其外族吕氏有山宅將廢之順請居焉人有勸者順曰天命有常何所懼耳卒居之後歲餘順常獨坐書閣下雖家人莫得入夜中聞皷􅤯之聲不知所來及出户則無聞而獨喜自負之以為石勒之祥也祝之曰此必陰兵助我若然當示我以富貴期數夕後夢一人被甲胄前報曰金象將軍使我語岑君軍城夜警有喧諍者蒙君見嘉敢不敬命君甚有厚祿幸自愛也既負壯志能猥顧小國乎今敵國犯壘側席委賢欽味芳聲願執旌鉞順謝曰將軍天質英明師貞以律猥煩徳音屈顧疵賤然犬馬之志惟欲用之使者復命順忽然而寤恍若自失坐而思夢之徵俄然皷角四起聲愈振厲順整巾下牀再拜祝之須臾户牖風生帷簾飛揚燈下忽有數百鐵騎飛馳左右悉高數寸而被堅執銳星散遍地倐閃之間雲陣四合順驚駭定神氣以觀之須臾有卒賫書云將軍𫝊檄順受之云地連獯虜戎馬不息向數十年將老兵窮邊墻卧甲天設勍敵勢不可止明公養素畜徳進業及時屢承嘉音願託神契然明公陽官固當享大祿於聖世今小國安敢望之緣天那國北山賊合從尅日會戰事圖子夜否滅未期良用惶駭順謝之室中益燭坐觀其變夜半後皷角四發先是東面壁下有䑕穴化為城門壘敵崔嵬三奏金革四門出兵連旗萬計風馳雲走兩皆列陣其東壁下是天那軍西璧下全家軍部後各定軍師進曰天馬斜飛度三止上將横行係四方輜車直入無迴翔六甲次第不乖行王曰善於是皷之兩軍俱有一馬斜去三尺止又皷之各有一歩卒横行一尺又皷之車進如是皷漸急而各出物包矢石亂交須臾之間天那軍大敗奔潰殺傷塗地王單馬南馳數百人投西南隅僅而免焉先是西南有藥王栖曰中化為城堡金象軍火振收其甲卒輿尸横地順俯伏觀之于時一騎至禁頒曰隂陽有厝得之者昌亭亭天威風驅連激一陣而勝明公以為何如順曰將軍英貫白日乘天用時竊窺神化靈文不勝慶快如是數日會戰勝敗不常王神貌偉然雄姿罕儔宴饌珍筵與順致寶貝明珠珠璣無限順遂榮於其中所欲皆備焉後遂與親朋稍絶閑間不出家人異之莫究其由而順顔色憔悴為鬼氣所中親戚共意有異詰之不言因飲以醇醪醉而究泄之其親人潛備鍬鍤因順如厠而隔之荷鍤亂作以掘室内八九尺忽坎陷是古墓也墓有塼堂其盟器悉多甲胄數百前有金牀戲局列馬滿枰皆金銅成形其干戈之事備矣乃悟軍師之詞乃象戲行馬之勢也既而焚之遂平其地多得寶貝皆墓内所畜者順閱之恍然而醒乃大吐自此充悅宅亦不復凶矣時寶應元年也出𤣥怪錄元無有寶應中有元無有常以仲春末獨行維揚郊野値日晚風雨大至時兵荒後人户多逃遂入路旁空莊須臾霽止斜月方出無有坐北窻忽聞西廊有行人聲未幾見月中有四人衣冠皆異相與談諧吟詠甚暢乃云今夕如秋風月若此吾輩豈可無一言以展平生之事也其一人即曰云云吟詠既朗無有聽之具悉其一衣冠長人即先吟曰齊紈魯縞如霜雪寥亮高聲予所發其二黑衣冠短陋人詩曰嘉賔良會清夜時煌煌燈燭我能持其三故弊黄衣冠人亦短陋詩曰清冷之泉候朝汲桑綆相牽常出入其四故黒衣冠人詩曰爨薪貯泉相煎熬充他口腹我為勞無有亦不以四人為異四人亦不虞無有之在堂隍也遞相褒賞觀其自負則雖阮嗣宗詠懷亦若不能加矣四人遲明方歸舊所無有就尋之堂中惟有故杵燈臺水桶破鐺乃知四人即此物所為也出𤣥怪錄李楚賔李楚賔者楚人也性剛傲惟以畋獵為事凡出獵無不火獲時童元範家住青山母嘗染疾晝常無苦至夜即發如是一載醫藥備至而絶無瘳減時建中初有善易者朱邯歸豫章路經範舎邯為筮之乃謂元範曰君今日未時可具衫服於道側伺之當有執弓挾矢過者君能求之斯人必愈君母之疾且究其原矣元範如言果得楚賔張弓驟馬至元範拜請過舍賔曰今早未有所獲君何見留元範以其母疾告之賔許諾元範備飲膳遂宿楚賔於西廡是夜月明如晝楚賔乃出户見空中有一大鳥飛來元範堂舎上引喙啄屋即聞堂中呌聲痛楚難忍楚賔揆之曰此其妖魅也乃引弓射之兩發皆中其鳥因爾飛去堂中哀痛之聲亦止至曉楚賔謂元範曰吾昨夜已為子除母害矣乃與元範遶舎遍索俱無所見因至壞屋中碓程古址有箭兩隻所中箭處皆有血光元範遂以火燔之精怪乃絶母患自此平復出集異記太平廣記卷三百六十九
