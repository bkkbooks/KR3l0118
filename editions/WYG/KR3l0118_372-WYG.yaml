body:
  text: 太平廣記卷三百七十二宋李昉等編精怪五凶器下桓彦範蔡四李華商鄉人盧涵張不疑凶器下桓彦範扶陽王桓彦範少放誕節不飾細行常與諸客遊俠飲於荒澤中日暮諸客罷散範與數人大醉遂卧澤中二更後忽有一物長丈餘大十圍手持矛㦸瞋目大喚直來趨範等衆皆俯伏不動範有膽力乃奮起呌呼張拳而前其物乃返走遇一大栁樹範手斷一枝持以擊之其聲策策如中虚物數下乃匍匐而走範逐之愈急因入古壙中洎明就視乃是一敗方相焉出廣異記蔡四潁陽蔡四者文詞之士也天寶初家于陳留之浚儀吟詠之際每有一鬼來登其榻或問義或賞詩蔡君問何鬼神忽此降顧鬼曰我姓王最大慕君才徳而來耳蔡初甚驚懼後稍狎之其鬼毎至恒以王大蔡氏相呼言笑歡樂蔡氏故人有小奴見鬼試令觀之其奴戰慄問其形云有大鬼長丈餘餘小鬼數人在後蔡氏後作小木屋置宅西南隅植諸菓木其外候鬼至謂曰人神道殊君所知也昨與君造小舎宜安堵鬼甚喜辭謝主人其後毎言笑畢便入此居偃息以為常矣久之謂蔡氏曰我欲嫁女暫借君宅蔡氏不許曰老親在堂若染鬼氣必不安穏君宜别求宅也鬼云太夫人堂但閉之必當不入餘借七日耳蔡氏不得已借焉七日之後方還住而安穏無他事也後數日云設齋慿蔡為借食器及帳幕等蔡云初不識他人唯借已物因問欲於何處設齋云近在繁臺北世間月午即地下齋時問至時欲往相看得乎曰何適不可蔡氏以鬼舉家持千手千眼呪家人清浄鬼即不來盛食葷血其鬼必至欲至其齋家人皆精心念誦着新浄衣乘月往繁臺遙見帳幕僧徒極盛家人並誦呪前逼之見鬼惶遽紛披知其懼人乃益前進既至翕然而散其王大者與徒侣十餘人北行蔡氏隨之可五六里至一墓林乃没記其所而還明與家人往視之是一廢墓中有明器數十當壙者最大額上作王字蔡曰斯其王大乎積火焚之其鬼遂絶出廣異記李華唐吏部員外李華幼時與流輩五六人在濟源山莊讀書半年後有一老人􅂡眉雪色恒持一裹石大如拳毎日至晚即騎院牆坐以石擲華等當忩前後數月居者苦之鄰有秦别將善射知名華自往詣之具說其事秦欣然持弓至山所伺之及晚復來投石不已秦乃於隙中縱矢一發便中視之乃木明器出廣異記商鄉人近世有人旅行商鄉之郊初與一人同行數日忽謂人曰我乃是鬼為家中明器叛逆日夜戰鬭欲假一言以定禍亂將如之何云茍可成事無所憚會日晚道左方至一大墳鬼指墳言是已冢君於冢前大呼有敕斬金銀部落如是畢矣鬼言訖入塚中人便宣敕須臾聞斬決之聲有頃鬼從中出手持金銀人馬數枚頭悉斬落謂人曰得此足一生福以報恩耳人至西京為長安捉事人所告縣官云此古器當是破冢得之人以實對縣白尹奏其事發使人隨開冢得金銀人馬斬頭落者數百枚出廣異記盧涵開成中有盧涵學究家於洛下有莊于萬安山之陰夏麥既登時果又熟獨跨小馬造其莊去十餘里見大栢林之畔有新潔室數間而作店肆時日欲沈涵因憩馬覩一雙鬟甚有媚態詰之云是耿將軍守塋青衣父兄不在涵悅之與語言多巧麗意甚虚襟盼睞明眸轉資態度謂涵曰有少許家醖郎君能飲三兩杯否涵曰不惡遂捧古銅罇而出與涵飲極歡青衣遂擊席而謳送盧生酒曰獨持巾櫛掩𤣥關小帳無人燭影殘昔日羅衣今化盡白楊風起隴頭寒涵惡其詞之不稱但不曉其理酒盡青衣謂涵曰更與郎君入室添杯去秉燭挈罇而入涵躡足窺之見懸大烏虵以刀刺虵之血滴于樽中以變為酒涵大恐慄方悟怪魅遂擲出户解小馬而走青衣連呼數聲曰今夕事須留郎君一宵且不得去知勢不可又呼東邊方大且與我趂取遮郎君俄聞栢林中有一大漢應聲甚偉須臾迴顧有物如大枯樹而趨舉足甚沈重相去百餘步涵但疾加鞭又經一小栢林中有一巨物𨼆𨼆雪白處有人言云今宵必須擒取此人不然者明晨君當受禍涵聞之愈怖怯及莊門已三更扄户閴然唯有數乘空車在門外羣羊方咀草次更無人物涵棄馬潛跧于車箱之下窺見大漢徑扺門牆極髙只及斯人腰跨手持㦸瞻視莊内遂以㦸刺莊内小兒但見小兒手足撈空于㦸之巔只無聲耳良久而去涵度其已逺方能起扣門莊客乃啓關驚涵之夜至喘汗而不能言及旦忽聞莊院内客哭聲云三歲小兒因昨宵寐而不蘇矣涵甚惡之遂率家僮及莊客十餘人持刀斧弓矢而究之但見夜來飲處空逃户環屋數間而已更無人物遂搜栢林中見一大明器婢子髙二尺許傍有烏虵一條已斃又東畔栢林中見一大方相骨遂俱毁折而焚之尋夜來白物而言者即是人白骨一具肢節筋綴而不欠分毫鍜以銅斧終無缺損遂投之于壍而已涵本有風疾因飲虵酒而愈焉出𫝊竒張不疑南陽張不疑開成四年宏詞登科授祕書遊京假丏於諸侯迴以家逺無人患其孤寂寓居京國欲市青衣散耳目於閭里聞旬月内亦累有呈告者適憎貌未偶月餘牙人來去有新鬻僕者請閱焉不疑與期於翌日及所約時至抵其家有披朱衣牙笏者稱前浙西胡司馬揖不疑就位與語甚爽朗云某少曾在名塲幾及成事曩以當家使於南海蒙攜引數年記於嶺中偶獲婢僕等三數十人自浙右已歴南荆貨鬻殆盡今但有六七人承牙人致君子至焉語畢一青衣捧小盤各設於賔主位俄􅂝銀罇金盞醪醴芳新馨香撲鼻不疑奉道常御酒止肉是日不覺飲數杯餘命諸青衣六七人並列於庭曰唯所選耳不疑曰某以乏於僕使今唯有錢六萬願貢其價却望髙明度六萬之直者一人以示之朱衣人曰某價翔庳各有差等遂指一鵶鬟重耳者曰春條可以償耳不疑覩之則果是私目者矣即日操契付金春條善書錄音旨清婉所有指使無不愜適又好學月餘日潛為小詩往往自於户牖間題詩云幽室鏁妖艷無人蘭􅈍芳春風三十載不盡羅衣香不疑深惜其才貌明慧如此兩月餘不疑素有禮奉門徒尊師居旻天觀相見因謂不疑曰郎君有邪氣絶多不疑莫知所自尊師曰得毋新聘否不疑曰聘納則無市一子耳尊師曰禍矣不疑恐遂問計焉尊師曰明旦告歸慎勿令覺明早尊師至謂不疑曰喚怪物出來不疑召春條泣於屏幕間亟呼之終不出來尊師曰果怪物耳斥於室内閉之尊師焚香作法以水向東而噀者三謂不疑曰可往觀之何如也不疑視之曰大抵是舊貌但短小尺寸間耳尊師曰未也復作法禹步又以水向門而噴者三謂不疑可更視之何如也不疑視之長尺餘小小許殭立不動不疑因更視之乃仆地撲然作聲視之一朽明器背上題曰春條其衣服若蟬蛻然繫結仍舊不疑大驚尊師曰此雖然腰腹間已合有異令不疑命刀劈之腰頸間果有血浸潤於木矣遂焚之尊師曰向使血徧體則郎君一家皆遭此物也自是不疑鬱悒無已豈有與明器同居而不之省殆非永年毎念至惘然數日如有所失因得沈痼遂請告歸寧明年為江西辟至日使淮南中路疾罷又明年八月而卒卒後一日尊夫人繼殁道士之言果驗出𫝊竒又一說張不疑常與道士共辦往來道士將他適乃誡不疑曰君有重厄不宜居太夫人膝下又不可進買婢僕之輩某去矣幸勉之不疑即啓母盧氏盧氏素奉道常日亦多在别所求静因擇寺院以居不疑旦問省數月有牙儈言有崔氏孀婦甚貧有妓女四人皆鬻之今有一婢曰金釭有姿首最其所惜者今貧不得已將欲貨之不疑喜遂令召至即酬其價十五萬而獲焉寵侍無比金釭美言笑明利輕便事不疑皆先意而知不疑愈惑之無幾道士詣門及見不疑言色慘沮吁嘆不已不疑詰之道士曰嘻禍已成無奈何矣非獨於君太夫人亦不免矣不疑驚怛起曰别後皆如師敎尊長寓居佛寺某守道殊不敢怠不知何以致禍且如之何哀祈備至道士曰家無計矣但為君辦明之因詰其别後有所進否不疑曰家少人力昨唯買一婢耳道士曰可見乎不疑即召之金釭不肯出不疑連促之終不出不疑自詬之即至道士曰即此是矣金釭大罵曰婢有過鞭撻之可也不要鬻之可也一百五十千尚在何所憂乎何物道士預人家事耶道士曰惜乎不疑曰焉有此事唯尊師命敢不聽從道士即以拄杖擊其頭沓然有聲如擊木遂倒乃一明器女子也背書其名道士命掘之五六尺得古墓柩傍有明器四五制作悉𩔖所焚者一百五十千在柩前儼然即不疑買婢之資復取之不疑惝怳發疾累月而卒親盧氏旬日繼殁焉出博異記又出靈怪集太平廣記卷三百七十二
