body:
  text: 太平廣記卷四百八十三宋李昉等編蠻夷四狗國南蠻縛婦民南海人日南拘彌國南詔獠婦南中僧番禺嶺南女工芋羮􅁡啷南州狗國陵州刺史周遇不茹葷血嘗語劉恂云頃年自青杜之海歸閩遭惡風飄五日夜不知行幾千里也凡厯六國第一狗國同船有新羅云是狗國逡巡果見如人裸形抱狗而出見船驚走又經毛人國形小皆被髪面身有毛蔽如􅀈又到野义國船抵暗石而損遂船人物上岸伺潮落閣船而修之初不知在此國有數人同入深林採野蔬忽為野叉所逐一人被擒餘人驚走囘顧見數輩野义同食所得之人同舟者驚怖無計頃刻有百餘野叉皆赤髮裸形呀口怒目而至有執木鎗者有雌而挾子者篙工賈客五十餘人遂齊将弓弩鎗劍以敵之果射倒二野义即舁拽朋嘯而遁既去遂伐木下寨以防再來野义畏弩亦不復至駐兩日修船方畢随風而逝又經大人國其人悉長大而野見船上鼓噪即驚走不出又經流虬國其國人么麽一槩皆服麻布而有禮競将食物求易釘鐵新羅客亦半譯其語遣客速過言此國遇華人飄泛至者慮有災禍既而又行經小人國其人祼形小如五六歳兒船人食盡遂相率尋其巢穴俄頃果見捕得三四十枚以歸烹而充食後行兩日遇一洲島而取水忽有羣山羊見人但聳視都不驚避既肥且偉初疑島上有人牧羊而又絶無人踪捕之僅獲百口皆食之出嶺表録異南蠻南道之酋豪多選鵝之細毛夾以布帛絮而為被復縱横納之其温柔不下于挾纊也俗云鵝毛柔暖而性冷徧宜覆嬰兒辟驚癎也出嶺表録異縛婦民縛婦民喜他室女者率少年持白梃往趨墟路值之俟過即共擒縛歸一二月與其妻首罪俗謂之縳婦也出南海異事南海人南海男子女人皆縝髪每沐以灰投流水中就水以沐以彘膏其髪至五六月稻禾熟民盡髠鬻於市既髠復取彘膏塗來歲五六月又可鬻出南海異事南海解牛多女人謂之屠婆屠娘皆縛牛于大木執刀以數罪某峕牽若耕不得前某旹乗若渡水不時行今何免死耶以䇿舉頸揮刀斬之出南海異事南海貧民妻方孕則詣富室指腹以賣之俗謂指脂賣或己子未勝衣隣之子稍可賣往貸取以鬻折杖以識其短長俟己子長與杖等即償貸者鬻男女如糞壤父子兩不戚戚出南海異事日南天寳實録云日南廏山連接不知幾千里裸人所居白民之後也刺其胸前作花有物如粉而紫色畫其兩目下去前二齒以為美飾出酉陽雜俎拘彌國順宗即位年拘彌之國貢却火雀一雌一雄履水珠常堅冰變畫草其却火雀純黒大小𩔖燕其聲清亮不並尋常禽鳥置于烈火中而火自散上嘉其異遂盛于火精籠懸于寝殿夜則宮人併蠟炬燒之終不能損其毛羽履水珠色黒𩔖銕大如雞卵其上鱗皴其中有竅云將入江海可長行洪波之上下上始不謂之實遂命善㳺者以五色絲貫之繫之于左臂毒龍畏之遣入龍池其人則步驟于波上若在平地亦潛于水中良久復出而遍體畧無沾濕上竒之因以御饌賜使人至長慶中嬪御試弄于海池上遂化為異龍入于池内俄而雲烟暴起不復追討矣常堅冰云其國有大凝山其中有氷千年不釋及齎至京師潔冷如故雖盛暑赫日終不消嚼之即與中國氷凍無異變晝草𩔖芭蕉可長數尺而一莖千葉樹之則百步内昏黒如夜始蔵于百寳匣其上緘以胡畫及上見而怒曰背明向暗此草何足貴也命并匣焚之于使前使初不為樂及退謂鴻臚曰本國以變晝為異今皇帝以向暗為非可謂明德矣出杜陽編南詔南詔以十二月十六日謂之星囘節日逰于避風臺命清平官賦詩驃信詩曰避風善闡臺極目見藤越鄰國之名也悲哉古與今依然烟與月自我居震旦謂天子為震旦翊衛𩔖䕫契伊昔經皇運艱難仰忠烈不覺歲云暮感極星囘節元昶謂朕曰元謂卿曰昶同一心子孫堪貽厥清平官趙叔達曰謂詞臣為清平官法駕避星囘波羅毘勇猜波羅虎也毘勇野馬也驃信昔年幸此曽射野馬并虎河濶氷難合地暖梅先開下令俚柔洽俚柔百姓也獻賝弄㨂國名來願将不才質千載侍㳺臺出玉谿編事獠婦南方有獠婦生子便起其夫卧牀褥飲食皆如乳婦稍不衛䕶其孕婦疾皆生焉其妻亦無所苦炊㸑樵蘇自若又云越俗其妻或誕子經三日便澡身于溪河返具糜以餉壻壻擁衾抱雛坐于寝榻稱為產翁其顛倒有如此出南楚新聞南中僧南人率不信釋氏雖有一二佛寺吏課其為僧以督責釋之土田及施財間有一二僧喜擁婦食肉但居其家不能少解佛事土人以女配僧呼之為師郎或有疾以紙為圓錢置佛像旁或請僧設食翌日宰羊豕以噉之目曰除齋出投􅂽雜録又南中小郡多無緇流每宣德音須假作僧道陪位唐昭宗即位栁韜為客廣宣告使赦文到下屬州崖州自來無僧家臨事差攝宣時有一假僧不伏排位太守王𢎞夫怪而問之僧曰役次未當差遣編併去去歲已曽攝文宣王今年又差作和尚見者莫不絶倒出嶺表録異番禺廣州番禺縣常有部民諜訴云前夜亡失蔬圃今認得在于某處請縣宰判状往取之有北客駭其説因詰之民云海之淺水中有藻荇之屬被風吹沙與藻荇相雜其根既浮其沙或厚三五尺處可以耕墾或灌或圃故也夜則被盜者盜之百餘里外若桴蔑之乗流也以是植蔬者海上往往有之出玉堂閒話有在番禺逢端午聞街中喧然賣相思藥聲訝笑觀之乃老媪舊揭山中異草鬻于富婦人為媚男藥用此日採取為神又云採鵲巢中獲兩小石號鵲枕此日得之者佳婦人遇之有抽金簮解耳璫而償其值者出投荒録嶺南女工嶺南無問貧富之家教女不以針縷績紡為功但躬庖厨勤刀機而已善醯醢葅鮓者得為大好女矣斯豈遐裔之天性歟故偶民争婚聘者相與語曰我女裁袍補襖即灼然不㑹若修治水蛇黄鱔即一條必勝一條矣出投􅂽録芋羮百越人好食蝦蟆凡有筵㑹斯為上味先于釡中置氷次下小芋烹之候湯沸如魚眼即下其蛙乃一一捧芋而熟如此呼為抱芋羮又或先于湯内安笋笴後投蛙及進于筵上皆執笋笴瞪目張口而座客有戲之曰賣燈心者又云介皮者最佳擲于沸湯即躍出其皮自脱矣皮既脱乃可以修饌時有一叟聞兹語大以為不可云切不得除此錦襖子其味絶珎聞之者莫不大笑出南楚新聞􅁡啷嶺南獠民好為􅁡啷即䑕胎未瞬通身赤蠕者飼之以􅁡釘之筵上囁囁而行以筯挾取咬之啷啷作聲故曰􅁡啷出朝野僉載南州王蜀有劉𨼆者善于篇章嘗説少年賫益部監軍使書案于黔巫之南謂之南州州多山險路細不通乗騎貴賤皆䇿杖而行其囊槖悉皆差夫背負夫役不到處便遣縣令主簿自荷而行將至南州州牧差人致書迓之至則有一二人背籠而前将𨼆入籠内掉手而行凡登山入谷皆絶髙絶深者日至百所皆用指爪攀縁寸寸而進在于籠中必與負荷者相背而坐此即彼中車馬也洎至近州州牧亦坐籠而迓于郊其郡在桑林之間茅屋數間而已牧守皆華人甚有心義翌日牧曰須畧謁諸大将乎遂差人引之衙院衙各相去十餘里亦在林木之下一茅齋大挍三五人逢迎極至于是烹一犢兒乃先取犢兒結膓中細糞置在盤筵以筯和調在醯中方餐犢肉彼人謂細糞為聖虀若無此一味者即不成局筵矣諸味将半然後下麻虫裹蒸裹蒸乃取麻蕨蔓上虫如今之刺猱者是也以荷葉裹而蒸之𨼆勉强餐之明日所遺甚多出玉堂閒話太平廣記卷四百八十三
