  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_451-1a, image: WYG1046/WYG1046-0335a.png}
body:
  text: 太平廣記巻四百五十一宋李昉等編狐五馮玠賀蘭進明崔昌長孫甲王老劉衆愛王黯𡊮嘉祚李林甫孫甑生王璿李黁李揆宋溥僧晏通馮玠唐馮玠者患狐魅疾其父後得術士療玠疾魅忽啼泣謂玠曰本圖共終今為術者所廹不復得在流涙經日方贈玠衣一襲云善保愛之聊為久念耳玠初得懼家人見悉卷書中疾愈入京應舉未得開視及第後方還開之乃是紙焉出廣異記賀蘭進明唐賀蘭進明為狐所婚每到時節狐新婦恒至京宅通起居兼持賀遺及問信家人或有見者狀貎甚美至五月五日自進明已下至其僕隸皆有續命家人以為不祥多焚其物狐悲泣云此並真物奈何焚之其後所得遂以充用後家人有就求膝背金花鏡者入人家偷鏡挂項緣牆行為主人家擊殺自爾怪絶焉出廣異記崔昌唐崔昌在東京莊讀書有小兒顔色殊異來止庭中久之漸升階坐昌牀頭昌不之顧方以手卷昌書昌徐問汝何人斯來何所欲小兒云本好讀書慕君學問爾昌不之却常問文義甚有理經數月日暮忽扶一老人乘醉至昌所小兒暫出老人醉吐人之爪髪等昌甚惡之昌素有所持利劒因斬斷頭成一老狐頃之小兒至大怒云君何故無狀殺我家長我豈不能殺君但以舊恩故爾大罵出門自爾乃絶出廣異記長孫甲唐坊州中部縣令長孫甲者其家篤信佛道異日齋次舉家見文殊菩薩乘五色雲從日邊下須臾至齋所簷際凝然不動合家禮敬懇至乆之乃下其家前後供養數十日唯其子心疑之入京求道士為設禁遂擊殺狐令家􅆢馬一匹錢五十千後數十日復有菩薩乘雲來至家人敬禮如故其子復延道士禁呪如前盡十餘日菩薩問道士法術如何答曰已盡菩薩云當決一頓因問道士汝讀道經知有狐剛子否答曰知之菩薩云狐剛子者即我是也我得仙來已三萬嵗汝為道士當修清淨何事殺生且我子孫為汝所殺寜宜活汝耶因杖道士一百畢謂令曰子孫無狀至相勞擾慚愧何言當令君永無災横以此相報顧謂道士可即還他馬及錢也言訖飛去出廣異記王老唐睢陽郡宋王冡旁有老狐每至衙日邑中之狗悉往朝之狐坐冢上狗列其下東都王老有􅀟犬能咋魅前後殺魅甚多宋人相率以財雇犬咋狐王老牽犬徃犬乃逕詣諸犬之下伏而不動大失宋人之望今世人有不了其事者相戲云取睢陽野狐犬出廣異記劉衆愛唐劉全白說云其乳母子衆愛少時好夜中將網斷道取野猪及狐狸等全白莊在岐下後一夕衆於莊西數里下網已伏網中以伺其至暗中聞物行聲覘見一物伏地窺網因爾起立變成緋裙婦人行而違網至愛前車側忽捉一䑕食愛連呵之婦人忙遽入網乃棒之致斃而人形不改愛反疑懼恐或是人因和網没漚麻池中夜還與父母議及明舉家欲潛逃去愛竊云寧有婦人食生䑕此必狐耳復徃麻池視之見婦人已活因以大斧自腰後斫之便成老狐愛大喜將還村中有老僧見狐未死勸令養之云狐口中有媚珠若能得之當為夫所愛以繩縳狐四足又以火籠罩其上養數日狐能食僧用小缻口窄者埋地中令口與地齊以兩胾猪肉炙於缻中狐愛炙而不能得但以口屬缻候炙冷復下兩臠狐涎沫久之炙與缻滿狐乃吐珠而死狀如碁子通圓而潔愛每帶之大為其夫所貴出廣異記王黯王黯者結婚崔氏唐天寶中妻父士同為沔州刺史黯隨至江夏為狐所媚不欲渡江發狂大呌恒欲赴水妻屬惶懼縳黯著牀櫪上舟行半江忽爾欣笑至岸大喜曰本謂諸女郎軰不隨過江今在州城上復何慮也士同蒞官便求術士左右言州人能射狐者士同延至入令堂中悉施牀席寘黯於屋西北陬家人數十持更迭守已於堂外别施一牀持弓矢以候狐至三夕忽云諸人得飽睡否適已中狐明當取之衆以為狂而未之信及明見忩中有血衆隨血去入大坑中草下見一牝狐帶箭垂死黯妻燒狐為灰服之至盡自爾得平復後為原武縣丞在㕔事忽見老狐奴婢詣黯再拜云是大家阿嬭徃者娘子枉為崔家殺害翁婆追念未嘗離口今欲將小女更與王郎續親故令申意兼取吉日成納黯甚懼辭以厚利萬計料理遽出羅錦十餘匹於通衢焚之老奴乃謂其婦云天下美丈夫亦復何數安用王家老翁為女壻言訖不見出廣異記袁嘉祚唐寜王傳袁嘉祚年五十應制授垣縣縣丞門素凶為者盡死嘉祚到官而丞宅數任無人居屋宇摧殘荆􅁄充塞嘉祚剪其荆􅁄理其墻垣坐㕔事中邑老吏人皆懼勸出不可既而魅夜中為怪嘉祚不動伺其所入明日掘之得狐狐老矣兼子孫數十頭嘉祚盡烹之次至老狐狐乃言曰吾神能通天預知休咎願置我我能益於人今此宅已安捨我何害嘉祚前與之言備告其官秩又曰願為耳目長在左右乃免狐後祚如狐言秩滿果遷數年至御史狐乃去出紀聞李林甫唐李林甫方居相位嘗退朝坐於堂之前軒見一𤣥狐其質甚大若牛馬而毛色黯黑有光自堂中出馳至庭顧望左右林甫命弧矢將射之未及已亡見矣自是凢數日每晝坐輙有一𤣥狐出焉其嵗林甫籍没出宣室志孫甑生唐道士孫甑生本以飬鷹為業後因放鷹入一窟見狐數十枚讀書有一老狐當中坐迭以傳授甑生直入奪得其書而還明日有十餘人持金帛詣門求贖甑生不與人云君得此亦不能解用之若寫一本見還當以口訣相授甑生竟傳其法為世術士狐初與甑生約不得示人若違者必當非命天寳末𤣥宗固就求之甑生不與竟爾㐲法出廣異記王璿唐宋州刺史王璿少時儀貌甚美為牝狐所媚家人或有見者丰姿端麗雖僮㓜過之者必歛容致敬自稱新婦抵對皆有理由是人樂見之每至端午及佳節悉有贈儀相送云新婦上其郎某娘續命衆人笑之然所得甚衆後璿職髙狐乃不至盖其禄重不能為怪出廣異記李黁東平尉李黁初得官自東京之任夜投故城店中有故人賣胡餅為業其妻姓鄭有美色李目而悦之因宿其舎留連數日乃以十五千轉索胡婦既到東平寵遇甚至性婉約多媚􅃛風流女工之事罔不心了於音聲特究其妙在東平三嵗有子一人其後李充租綱入京與鄭同還至故城大㑹鄉里飲宴累十餘日李催發數四鄭固稱疾不起李亦憐而從之又十餘日不獲已事理須去行至郭門忽言腹痛下馬便走勢疾如風李與其僕數人極騁追不能及便入故城轉入易水村足力少息李不能捨復逐之垂及因入小穴極聲呼之寂無所應戀結悽愴言發淚下㑹日暮村人以草塞穴口還店止宿及明又徃呼之無所見乃以火燻乆之村人為掘深數丈見牝狐死穴中衣服脱卸如蜕脚上著錦襪李嘆息良久方埋之歸店取獵犬噬其子子略不驚怕便將入都寄親人家養之輸納畢復還東京婚於蕭氏蕭氏常呼李為野狐婿李初無以答一日晚李與蕭擕手歸房狎戲復言其事忽聞堂前有人聲李問阿誰夜來答曰君豈不識鄭四娘耶李素所鍾念者聞其言遽欣然躍起問鬼乎人乎答曰身即鬼也欲近之而不能四娘因謂李人神道殊賢夫人何至數相謾罵且所生之子逺寄人家其人皆言狐生不給衣食豈不念乎宜早為撫育九泉無恨也若夫人云云相侮又小兒不收必將為君之患言畢不見蕭遂不復敢説其事唐天寳末子年十餘甚無恙出廣異記李揆唐丞相李揆乾元初為中書舎人嘗一日退朝歸見一白狐在庭中搗練石上命侍僮逐之已亡見矣時有客於揆門者因話其事客曰此祥符也某敢賀至明日果選禮部侍郎出宣室誌宋溥宋溥者唐大厯中為長城尉自言㓜時與其黨暝扱野狐數夜不獲後因月夕復為其事見一鬼戴笠騎狐唱獨盤子至扱所狐欲入扱鬼乃以手搭狐頰因而復迴如是數四其後夕溥復下扱伺之鬼又乘狐兩小鬼引前徃來扱所溥等無所獲而止有談衆者亦云㓜時下扱忽見一老人扶杖至已所止樹下仰問樹上是何人物衆時尚小甚惶懼其兄因怒罵云老野狐何敢如此下樹逐之遂變狐走出廣異記僧晏通晉州長寜縣有沙門晏通修頭陀法將夜則必就藂林亂塜寓宿焉雖風雨露雪其操不易雖魑魅魍魎其心不揺月夜棲於道邉積骸之左忽有妖狐踉蹌而至初不虞晏通在樹影也乃取髑髏安於其首遂揺動之儻振落者即不再顧因别選焉不四五遂得其一岌然而綴乃褰擷木葉草花障蔽形體随其顧盻即成衣服湏臾化作婦人綽約而去乃於道右以伺行人俄有促馬南來者妖狐遥聞則慟哭于路過者駐騎問之遂對曰我歌人也随夫入秦今曉夫為盗殺掠去其財伶俜孤逺思願北歸無由致脱能收採當誓微軀以執婢役過者易定軍人也即下馬熟視悦其都冶詞意叮嚀便以後乗挈行焉晏通遽出謂曰此妖狐也君何容易因舉錫杖叩狐腦髑髏應手即墜遂復形而竄焉出集異記太平廣記卷四百五十一
