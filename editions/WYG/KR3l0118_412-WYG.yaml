body:
  text: 太平廣記卷四百十二宋李昉等編草木七竹叙竹𩔖涕竹􅁄竹􅓁簩竹䈄􅀢竹慈竹筋竹百葉竹桃枝竹癭竹羅浮竹童子寺竹竹花竹䈙竹實五榖雨稻雨粟雨麥彫葫雨榖揺枝粟鳳冠粟繞明豆延精麥紫沉麻雨五榖野粟石殻芋雀芋甘蔗茶荈叙茶獲神茗饗茗獲報消食茶竹叙竹類竹譜竹類有三十九出酉陽雜俎涕竹南方荒中有涕竹長數百丈圍三丈六尺厚八九寸可以為船其笋甚美煑食之可止瘡癘出神異經􅁄竹􅁄竹一名笆竹節皆有刺數十莖為叢南夷種以為城猝不可攻或自崩根出大如酒甕縱横相承狀如縲車食之下人髮出酉陽雜俎􅓁簩竹􅓁簩竹皮薄而空多大者徑不逾二寸皮上有麄澁文可為錯子錯甲利勝于鐵若鈍以漿水澆之還復快利出廣州記古林之竹勁而利削為刀割象皮如切芋出嶺表録異䈄􅀢竹䈄􅀢竹大如脚指腹中白幕攔隔狀如濕麪將成而筒皮未落輙有細蟲齧處成赤跡似繡畫可愛出酉陽雜俎慈竹慈竹夏月經雨滴汁下地生蓐似鹿角色白食之已痢出酉陽雜俎筋竹筋竹南方以為矛筍未成竹時堪為弩弦出酉陽雜俎百葉竹百葉竹一枝百葉有毒出酉陽雜俎桃枝竹東官郡漢順帝時屬南海西接髙凉郡又以其地為司監都尉東有蕪地西接臨大海有長洲多桃枝竹縁岸而生闕癭竹東洛勝境有三溪張文規有莊近溪忽有竹一竿生癭大如李出酉陽雜俎羅浮竹唐貞元中有鹽户犯禁逃于羅浮山深入第十三嶺南越志云本只羅山忽海上有山浮来相合是謂羅浮山有十五嶺二十二峯九百八十瀑泉洞穴則山無出其右也曾有詩曰四百餘崖海上排根連蓬島䕃天台百靈若為移中土嵩華都為一小堆遇巨竹萬千竿連直巖谷竹圍皆二丈餘有三十九節二丈許逃者遂取竹一竿破以為篾㑹赦宥遂挈以歸有人得一篾竒之獻於太守李復乃圖而紀之予嘗覽竹譜曰雲邱帝竹帝陵上所生竹一節為船又何偉哉南海以竹為甑者𩔖見之矣皆羅浮之竹也出嶺表録異童子寺竹唐李衞公言北都惟童子寺有竹一窠纔長數尺相傳其寺綱維每日報竹平安出酉陽雜俎竹花山海經曰竹生花其年便枯竹六十年易根易根必花結實而枯死實落復生六年而成町子作穗似小麥出感應經竹䈙竹復死曰䈙六十年一易根易根則結實枯死出酉陽雜俎竹實唐天復甲子歲自隴而西迨于褒梁之境數千里内亢陽民多流散自冬經春飢民啖食草木至有骨肉相食者甚多是年忽山中竹無巨細皆放花結子飢民採之舂米而食珍于粳糯其子粗顔色紅纎與今紅粳不殊其味尤更馨香數州之民皆挈眷入山就食之至于溪山之内居人如市人力及者競置囤廩而貯之家有羡糧者不貧者又取與葷茹血肉而同食者嘔噦如其中毒十死其九其竹自此千蹊萬谷並皆立枯十年之後復産此君可謂百萬圓顱活之于貞筠之下出玉堂閑話五榖雨稻夏禹時天雨稻古詩云安得天雨稻飼我天下民出述異記雨粟吕后三年秦中天雨粟出述異記雨麥漢武帝時廣陽縣雨麥彫葫太液池邊皆是彫葫紫蘀緑節蒲叢之𩔖菰之有米者長安人謂為彫葫葭蘆之未解葉者謂為紫蘀菰之有首者謂為緑節其間鳬雛子布滿充積又多紫龜緑鼈池邊多平沙沙上鵜鶘鸊􅀈鵁鶄鴻鶂動輙成羣出西京雜記雨榖漢宣帝時江淮饑饉人相食天雨榖三日尋魏地奏亡榖二千頃出述異記揺枝粟宣帝地節元年樂浪東有背明之國人至貢方物言其鄉土在扶桑之東見日出于西方其國昏昏恒闇宜五榖名曰融澤方三千里五榖皆良食者延年清腹一粒歴年不饑有揺枝粟言其枝長而弱無風常揺食之益髓出王子年拾遺記鳳冠粟鳳冠粟似鳳鳥之冠食者多力有遊龍粟枝葉屈曲如遊龍有瓊膏色白如銀食此二粟令人骨輕出王子年拾遺記繞明豆繞明豆言其莖弱自相縈纏有挾劍豆言莢形似人挾劍而横斜生有傾籬豆言見日則葉垂覆地食者不老不疾出王子年拾遺記延精麥延精麥言延夀益氣有昆和麥調暢六腑有輕心麥食者體輕有淳和麥麪以醸酒一醉累月食之凌冬不寒有含露麥穟中有露甘如飴出王子年拾遺記紫沉麻紫沉麻其實不浮有雲水麻實冷而光宜為油澤有光通麻食者行不待燭則巨勝也食之延夀後天而死出王子年拾遺記雨五榖吴桓王時金陵雨五榖于貧民家富民家則不雨出述異記野粟石殻宋髙宗之初當晉末饑饉之後既即位而江表二千餘里野粟生焉又淮南諸山石殻生石上生殻也𡊮安云石殻藥名穗之尤小者是也出述異記芋天芋生終南山中葉如荷而厚出酉陽雜俎雀芋雀芋狀如雀頭置乾地反濕置濕處反乾飛鳥觸之墮走獸遇之僵出酉陽雜俎甘蔗南方山有􅦠􅀈甘蔗二音之林其髙百丈圍三尺八寸促節多汁甜如蜜咋嚙其汁令人潤澤可以節􅀈蟲人腹中􅀈蟲其狀如蚓此消榖蟲也多則傷人少則榖不消是甘蔗能滅多益少凡蔗亦然出神異經茶荈叙茶茶之名器益衆劍南有蒙頂石花或小方或散芽號為第一湖州有顧渚之紫笋東川神泉昌明硤州有碧澗明月芳蕋茱茰簝福州有方山之生芽䕫州有香山江陵有楠木湖南有衡山岳州有㴩湖之含膏常州有義興紫笋􅄔州有来白睦州有鳩坑洪州有西山白露夀州有霍山黄芽蘄州有蘄門團黄浮梁商賈不在焉出國史補獲神茗神異記曰餘姚人虞茫入山採茗遇一道士牽三百青羊飲瀑布水曰吾丹邱子也聞子善茗飲常思惠山中有大茗可以相給祈子他日有甌檥之餘必相遺也因立茶祠後與人往山獲大茗焉出顧渚山記饗茗獲報劉敬叔異苑曰剡縣陳􅄔妻少與二子寡居好飲茶茗以宅中有古冢每飲先輙祀之二子恚之曰冢何知徒以勞祀欲掘去之母苦禁而止及夜母夢一人曰吾止此冢三百餘年母二子恒欲見毁賴相保䕶又饗吾嘉茗雖泉壤朽骨豈忘翳桑之報及報于庭内獲錢十萬似久埋者唯貫新母吿二子二子慙之從是禱酹愈至出顧渚山記消食茶唐有人授舒州牧李徳裕謂之曰到彼郡日天柱峯茶可惠三數角其人獻之數十觔李不受退還明年罷郡用意精求獲數角投之徳裕閲之而受曰此茶可以消酒食毒乃命烹一甌沃于肉食内以銀合閉之詰旦開視其肉已化為水矣衆伏其廣識也出中朝故事太平廣記卷四百十二
