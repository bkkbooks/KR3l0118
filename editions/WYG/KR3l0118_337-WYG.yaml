body:
  text: 太平廣記卷三百三十七宋李昉等編鬼二十二韋璜薛萬石范俶李澣張勍牛爽李咸李晝元載蕭審韋璜潞城縣令周混妻者姓韋名璜容色妍麗性多􅃛惠恒與其嫂妹若雲若月約先死幽㝠之事期以相報後適周氏生二女乾元中卒月餘忽至其家空間靈語謂家人曰本期相報故以是來我已見閻羅王兼親屬家人問見鑊湯劒樹否答云我是何人得見是事後復附婢靈語云太山府君嫁女知我能粧梳所以見召明日事了當復來耳明日婢又靈語云我至太山府君嫁女理極榮貴令我為女作粧今得胭脂及粉來與諸女因而開手有胭脂及赤與粉並不異人間物又云府君家撒帳錢甚大四十鬼不能舉一枚我亦致之因空中落錢錢大如盞復謂府君知我善染紅乃令我染我辭已雖染不親下手平素是家婢所以但承己指揮耳府君令我取婢今不得已暫將婢去明日當遣之還女云一家唯仰此婢奈何奪之韋云但借兩日耳若過兩日汝宜擊磬呼之夫磬聲一振鬼神畢聞婢忽氣盡經二日不返女等鳴磬少選復空中語云我朝染畢已遣婢還何以不至當是迷路耳須臾婢至乃活兩手忽變作深紅色又制五言詩與妹嫂夫數首其寄妹詩云修短各有分浮華亦非真斷腸泉壤下幽憂難具陳淒淒白楊風日暮堪愁人又二章寄夫題云泉臺客人韋璜詩云不得長相守青春夭舜華舊逰今永已泉路却為家其二早知别離切人心悔作從来恩愛深黄泉㝠寞雖長逝白日屏帷還重尋贈嫂一章序云阿嫂相疑留詩曰赤心用盡為相知慮後防前秪定疑案牘可申生節目桃符雖聖欲何為見其親説云爾出廣異記薛萬石薛萬石河東人廣徳初浙東觀察薛兼訓用萬石為永嘉令數月忽謂其妻曰後十日家内食盡食盡時我亦當死米榖荒貴為之奈何婦曰君身康强何為自作不祥之語萬石云死甚可惡有言者不得已耳至期果暴卒殮畢棺中忽令呼録事佐史等既至謂曰萬石不幸身死言之悽愴然自此未嘗擾君今妻子飢窮逺歸無路所相召者欲以親愛累君爾時永嘉米貴斗至萬錢萬石於録事已下求米有差吏人凶懼罔不依送迨至丞尉亦有贈後數日謂家人曰我暫徃越州謁見薛公汝輩既有糧食吾不憂矣自爾十餘日無言婦悲泣疲頓晝寢忽聞其語驚起曰君何所來答曰吾從越還中丞已知吾亡見令張卿來迎又為見兩女擇得兩壻兄弟之情可為厚矣宜速裝飾張卿到來即可便發不爾當罹山賊之劫第宜速去也家人因是裝束㑹卿至即曰道途去永嘉二百里温州為賊所破家人在道危急即焚香諮白必有所言不問即否親見家人白之岀廣異記范俶范俶者廣徳初於蘇州開酒肆日晩有婦人從門過色態甚異俶留宿婦人初不辭讓乃秉燭以髮覆面向暗而坐其夜與申宴私之好未明求去云失梳子覔不得臨别之際嚙俶臂而去及曉於牀前得一紙梳心甚惡之因而體痛紅腫六七日死矣岀廣異記李澣河中少尹李澣以廣徳二年薨初七日家人設齋畢忽於中門見澣獨騎從門而入奴等再拜持澣下馬入座於西廊諸子拜謁泣澣云生死是命何用悲耶只攪亡者心耳判屬家事久之澣先娶項妃妹生子四人項卒再娶河南竇滔女有美色特為澣所愛時竇懼不岀澣使呼之逆謂之曰生死雖殊至於恩情所未嘗替何懼而不岀耶每在地下聞君哭聲輒令悽斷悲卿亦壽命不永於我相去不岀二年夫妻義重如今同行豈不樂乎人生㑹當有死不必一二年在人間為勝卿意如何竇初不言澣云卿欲不從亦不及矣後日當使車騎至此相迎幸無辭也遂呼諸婢謂四人曰汝等素事娘子亦宜從行復取其妻衣服手自别之分為數袋以付四婢曰後日可持此隨娘子來又謂諸子曰吾雖先婚汝母然在地下殊不相見不宜以汝母與吾合葬可以竇氏同穴若違吾言神道是殛言畢便岀奴等送至門外見澣駛騎走而從東轉西不復見後日車騎至門他人不之見唯四婢者見之便裝束竇取所選衣服與家人訣遂各倒地死亡岀廣異記張勍代宗時河朔未寧冦賊劫掠張勍者恒陽人也因岀遊被掠其後亦自聚衆因殺害行旅而誓不傷恒陽人一日引衆千人至恒陽東界夜半月明方息大林下忽逢百餘人列花燭奏歌樂與數婦人同行見勍遙叱之曰官軍耶賊黨耶勍左右曰張將軍也行人曰張將軍是緑林將軍耶又何軍容之整士卒之整也左右怒白勍請殺之因領小將百人與戰行人持戈甲者不過二三十人合戰多傷士卒勍怒自領兵直前又數戰不利内一人自稱幽地王得恒陽王女為妻今來親迎比夜静月下渉原野欲避繁雜不謂偶逢將軍候從無禮方叱止之因不犯將軍之怒然素聞將軍誓言不害恒陽人將軍幸不違言以恒陽之故勍許捨之乃曰君輩皆捨婦人即留對曰留婦人即不可欲鬭即可勍又入戰復不利勍欲退左右皆憤怒願死格遂盡岀其兵分三隊更鬭又數戰不利見幽地王揮劍岀入如風勍懼乃力止左右勍獨退而問曰君兵士是人也非人也何不見傷幽地王笑言曰君為短賊之長行不平之事而復欲與我隂軍競力也勍方下馬再拜又謂勍曰安禄山父子死史氏僭命君為盜奚不以衆歸之自當富貴勍又拜曰我無戰術偶然賊衆推我為長我何可佐人幽地王乃岀兵書一卷以授之而去勍得此書頗逹兵術尋以兵歸史思明果用之為將數年而卒出瀟湘録牛爽永泰中牛爽授盧州别駕將之任有乳母乘驢為鐙研破股歳餘瘡不差一旦苦瘡痒抑搔之若虫形狀忽有數蟬從瘡中飛岀集庭樹悲鳴竟夕家人命巫卜之有女巫頗通神鬼巫至向樹呵之咄咄人詰之答見一鬼黑衣冠據枝間以手指蟬以導其詞曰東堂下余所處享我致福欺我致禍及三女巫又言黑衣者竈神耳爽不信之網蟬殺之逐巫者後歳餘無異變爽有三女在閨房夏月夜褰闈爽忽覺前牀有一長大尸白衾覆而殭卧爽大怖私語其妻妻見甚懾爽嘗畜寶劍潛取擊之劃然而内驚呌及燭失其鬼而閨中長女腰斷矣流血滿地爽驚慟失據大小亂哭莫知其由既後半年夜晦㝠爽列燈於奥方寢心動驚覺又見前鬼在牀爽神迷倉卒復刎之斷去閨中亂喧次女又斷腰矣舉家惶振議者令爽徙居明鬼神不可與競爽終不改明年又見卒殺三女而親友强徙之他第爽抱疾亦卒果如蟬言後有華岳道士褚乗霞善驅除素與爽善聞之而來郡以是宅凶廢之霞至獨入結壇守其日暮内聞雷霆搜索及明發屋拔木道士告郡命鍬鍤發堂下丈餘得古墳銘曰卓女墳道士説宵中初有甲兵與霞戰鬼敗而潰散須臾有一女子言二十許叩頭謝言是卓女郎霞讓之答曰非某過也宿命有素值爽及女命盡且不修徳而强梁誣欺自當爾乘霞遂徙其墳宅後不復凶矣岀通幽録李咸太原王容與姨弟趙郡李咸居相衞間永泰中有故之荆襄假公行乘𫝊次鄧州夜宿郵之㕔時夏月二人各據一牀於東西間僕𨽻息外舍二人相與言論將夕各罷息而王生竊不得寐三更後雲月朦朧而王卧視庭木䕃宇蕭蕭然忽見厨屏間有一婦人窺覘去而復還者再三須臾岀半身緑裙紅衫素顔奪目時又竊見李生起坐招手以挑之王生謂李昔日有契又必謂婦人是驛吏之妻王生乃佯寐以窺其變俄而李子起就婦人相執於屏間語切切然久之遂擕手大門外王生潛行隂處遙覘之二人俱坐言笑殊狎須臾見李獨歸行甚急婦人在外屏立以待李入厨取燭開岀書笥顔色慘悽取紙筆作書又取衣物等皆緘題之王生竊見之直謂封衣以遺婦人輒不忍驚伺其睡乃擬掩執封衣畢置牀上却岀顧王生且睡遂出屏與婦人語久之把被俱入下㕔偏院院中有堂堂有牀帳供樹森森然既入食頃王生自度曰我徃襲之必同私狎乃持所卧枕徃潛欲驚之比至入簾正見李生卧於牀而婦人以披帛絞李之頸咯咯然垂死婦人白面長三尺餘不見面目下按悉力以勒之王生倉卒驚呌因以枕投之不中婦人遂走王生乗勢奔逐直入西北隅厨屋中據牀坐頭及屋梁久之方滅童𨽻聞呼聲悉起見李生斃七竅流血心猶稍煖耳方為招魂將養及明而蘇王生取所封書開視之乃是寄書與家人敘以辭訣衣物為信念不陳所徃但詞句鄭重讀書惻愴及李生能言問之都不省記但言髣髴夢一麗人相誘去耳諸不記焉驛之故吏云舊傳厠有神先天中已曾殺一客使此事王容逢人則説勸人夜不令獨寐出通幽録李晝李晝為許州吏莊在扶溝永泰二年春因清明歸欲至伯梁河先是路旁有塜去路約二十歩其上無草牧童所戲其夜李晝忽見塜上有穴大如盤兼有火光晝異之下馬躋塜焉見五女子衣華服依五方坐而紉釙俱低頭就燭矻吃不歇晝叱之一聲五燭皆滅五女亦失所在晝恐上馬而走未上大路五炬火從塜岀逐晝晝走不能脱以鞭揮拂為火所􅅡近行十里方逹伯梁河有犬至方滅明日看馬尾被燒盡及股脛亦燒損自後遂目此為五女塜今存焉出博異志元載大厯九年春中書侍郎平章事元載早入朝有獻文章者令左右收之此人若欲載讀載云候至中書當為看人言若不能讀請自誦一首誦畢不見方知非人耳詩曰城東城西舊居處城裏飛花亂如絮海燕啣泥欲下来屋裏無人却飛去載後竟破家妻子被殺云出𤣥怪録蕭審蕭審者工部尚書旻之子永泰中為長洲令性貪暴然有理跡邑人懼憚焉審居長洲三年前後取受無紀極四年五月守門者見紫衣人三十餘騎從外入門迎問所以騎初不言直至堂院㕔内治書者皆見門者走入白審曰適有紫衣將軍三十騎直入不待通審問其人安在焉得不見門者岀至㕔須臾見騎從内岀以白衫蒙審歩行門者又曰竒事審顧不言諸吏送至門不復見俄聞内哭方委審卒後七日其弟宇復墓忽倒地作審靈語責宇不了家事數十百言又云安胡者將吾米二百石絹八十疋經紀求利今幸我死此胡辜恩已走矣明日食時為物色捉之宇還至舍記事白嫂婢爾日亦靈語云然宇具以白刺史常元甫元甫令押衙候捉果得安胡米絹具在初又云米是己錢絹是枉法物可施之宇竟施絹出廣異記太平廣記卷三百三十七
