body:
  text: 太平廣記卷四百二十九宋李昉等編虎四張魚舟申屠澄丁嵓王用張逢張魚舟唐建中初青州北海縣北有秦始皇望海臺臺之側有别濜泊泊邉有取魚人張魚舟結草菴止其中常有一虎夜突入菴中值魚舟方睡至欲曉魚舟乃覺有人初不知是虎至明方見之魚舟驚懼伏不敢動虎徐以足捫魚舟魚舟心疑有故因起坐虎舉前左足示魚舟魚舟視之見掌有刺可長五六寸乃為除之虎躍然出菴若拜伏之状因以身劘魚舟良久回顧而去至夜半忽聞菴前墜一大物魚舟走出見一野豕腯甚幾三百斤在菴前見魚舟復以身劘之良久而去自後毎夜送物來或豕或鹿村人以為妖送縣魚舟陳始末縣使吏隨而伺之至二更又送麋來縣遂釋其罪魚舟為虎設一百一齋功徳其夜又銜絹一匹而來一日其菴忽被虎拆之意者不欲魚舟居此魚舟知意遂别卜居焉自後虎亦不復來出廣異記申屠澄申屠澄者貞元九年自布衣調補濮州什邡尉之官至真符縣東十里許遇風雪大寒馬不能進路旁茅舍中有烟火甚温煦澄往就之有老父嫗及處女環火而坐其女年方十四五雖蓬髪垢衣而雪膚花臉舉止妍媚父嫗見澄來遽起曰客衝雪寒甚請前就火澄坐良久天色已晚風雪不止澄曰西去縣尚逺乞宿於此父嫗曰茍不以蓬室為陋敢不承命澄遂解鞍施衾幬焉其女見客更修容靚飾自帷箔間復出而閑麗之態尤倍昔時有頃嫗自外挈酒壺至於火前煖飲謂澄曰以君冒寒且進一杯以禦凝冽因揖讓曰始自主人翁即廵行澄當婪尾澄因曰座上尚欠小娘子父嫗皆笑曰田舍家所育豈可備賔主女子即囘眸斜睨曰酒豈足貴謂人不宜預飲也母即牽裙使坐於側澄始欲探其所能乃舉令以觀其意澄執盞曰請徴書語意屬目前事澄曰厭厭夜飲不醉無歸女低鬟微笑曰天色如此歸亦何往哉俄然廵至女女復令曰風雨如晦雞鳴不已澄愕然歎曰小娘子明慧若此某幸未婚敢請自媒如何翁曰某雖寒賤亦嘗嬌保之頗有過客以金帛為問某先不忍别未許不期貴客又欲援拾豈敢惜即以為託澄遂修子壻之禮袪囊以遺之嫗悉無所取曰但不棄寒賤焉事資貨明日又謂澄曰此孤逺無隣又復湫溢不足以久留女既事君便可行矣又一日咨嗟而别澄乃以所乗馬載之而行既至官俸禄甚薄妻力以成其家交結賔客旬日之内大獲名譽而夫妻情義益浹其於厚親族撫甥姪洎僮僕厮養無不歡心後秩滿將歸已生一男一女亦甚明慧澄尤加敬焉常作贈内詩一篇曰一官慙梅福三年愧孟光此情何所喻川上有鴛鴦其妻終日唫諷似黙有和者然未嘗出口毎謂澄曰為婦之道不可不知書倘更作詩反似嫗妾耳澄罷官即罄室歸秦過利州至嘉江畔臨泉藉草憇息其妻忽悵然謂澄曰前者見贈一篇尋即有和初不擬奉示今遇此景物不能終黙之乃吟曰琴瑟情雖重山林志自深常憂時節變辜負百年心吟罷澘然良久若有慕焉澄曰詩則麗矣然山林非弱質所思倘憶賢尊今則至矣何用悲泣乎人生因縁業相之事皆由前定後二十餘日後至妻家草舍依然但不復有人矣澄與其妻即止其舍妻思慕之深盡日涕泣於壁角故衣之下見一虎皮塵埃積滿妻見之忽大笑曰不知此物尚在耶披之即變為虎哮吼拏攫突門而去澄驚走避之擕二子尋其路望林大哭數日竟不知所之出河東記丁嵓貞元十四年中多虎暴白晝噬人時淮上阻兵因以武將王徴牧申州焉徴至則大修擒虎具兵仗坑穽靡不備設又重懸購得一虎而酬十縑焉有老卒丁嵓者善為陷穽遂列於太守請山間至路隅張設以圖之徴既許不數日而獲一虎焉虎在深坑無施勇力嵓遂俯而下視加以侮誚虎則跳躍哮吼怒聲如雷而聚觀之徒千百其衆嵓衒其計得誇喜異常時方被酒因為衣襟􅇢挂樹根而墜穽中衆共嗟駭謂糜粉於暴虎之爪牙矣及就窺嵓乃端坐而虎但瞪視耳嵓之親愛憂嵓乃共設計以轆轤下巨索伺嵓自縛當遽引上或希十一之全嵓得索則纒縛腰肢揮手外人則共引之去地三二尺其虎則以前足捉其索而留焉意態極仁如此數四嵓因而謂之曰爾軰縱暴入郭犯人事須剪除理宜及此顧爾之命且在頃刻吾因沉醉誤落此中衆所未便屠者盖以我故也爾若損我固激怒衆人我氣未絶即當薪火亂投爾為灰燼矣爾若不然吾當啟白太守捨爾之命冀爾率領羣軰逺離此土斯亦渡河他適爾所知者矣我當質之天日不渝此約其虎諦聽若有知解嵓則引繩衆共出之虎乃弭耳矚目不復留嵓既得出遂以其事白於邦伯曰今殺一虎不足禳羣軰之暴況與試約乞捨之冀其率侣四出管界獲寧耳徴許之嵓遂以太守之意丁寧告諭虎於陷中踴躍盤旋如荷恩施嵓即積土坑側稍益淺猶深丈許虎乃躍而出奮迅躑騰嘯風而逝自是旬朔之内羣虎屏跡而山野晏然矣吁保全軀命之計雖在異𩔖亦有可觀者焉若暴虎之猛悍況厄陷穽得人固當恣其狂怒決裂噬嚙以豁其情斯虎乃因嵓以圖全而果諧焉何其智哉而嵓能以言詞誘諭通於强戾果致族行出境之異況免挂罥之害又何智哉斯乃信誠交感之致耳於戲信誠之為物也何其神歟出集異記王用貎州王成縣黒魚谷貞元中百姓王用業炭於谷中谷中有水方數歩常見二黒魚長尺餘遊水上用伐木饑困遂食一魚其弟驚曰此魚或是谷中靈物兄奈何殺之有頃其妻餉之用運斤不已久乃轉面妻覺状貎有異呼其弟視之忽脱衣嘷躍變為虎焉徑入山時時殺麞鹿𩔖以食如此三年一日日昏叩門自名曰我用也弟應曰我兄變為虎三年矣何鬼假其姓名又曰我往年殺黒魚㝠謫為虎又因殺人㝠官笞余一百今放免傷徧體汝弟視余無疑也弟喜遂開門見一人頭猶是虎因怖死舉家呌呼奔避竟為村人格殺驗其身有黒誌信王用也但首未變元和中處士趙齊約嘗至谷中見村人説出酉陽雜俎張逢南陽張逢貞元末薄遊嶺表行次福州福唐縣横山店時初霽日將暮山色鮮媚烟嵐靄然策杖尋勝不覺極逺忽有一段細草縱廣百餘歩碧藹可愛其旁有一小樹遂脱衣挂樹以杖倚之投身草上左右翻轉既而酣睡若獸蹍然意足而起其身已成虎也文彩爛然自視其爪牙之利胸膊之力天下無敵遂騰躍而起越山超壑其疾如電夜久頗饑因傍村落徐行犬􅇾駒犢之軰悉無可取意中恍惚自謂當得福州鄭録事乃旁道潛伏未幾有人自南行乃候吏迎鄭者見人問曰福州鄭録事名璠計程當宿前店見説何時發來人曰吾之主人也聞其飾装到亦非久候吏曰只一人來且復有同行吾當迎拜時慮其誤也曰三人之中縿緑者是其時逢方餓而鄭到導從甚衆衣縿緑甚肥昻昻而來適到逢銜之走而上山時天未曙人雖多莫敢逐得恣食之唯餘腸髪既而行於山林孑然無侣乃忽思曰我本人也何樂為虎自囚於深山盍求初化之地而復焉乃歩歩尋求日暮方到其所衣服猶挂杖亦在細草依然翻復轉身於其上意足而起即復人形矣於是衣衣策杖而歸昨往今來一復時矣初其僕夫驚失乎逢也訪之於隣或云策杖登山多歧尋之杳無形迹及其來驚喜問其故逢紿之曰偶尋山泉到一山院共談釋教不覺移時僕夫曰今旦側近有虎食福州鄭録事求餘不得山林故多猛獸不易獨行郎之未回憂負實極且喜平安無他逢遂行元和六年旅次淮陽舍於公館館吏宴客坐有為令者曰廵若到各言己之竒事事不竒者罰廵到逢逢言横山之事末坐有進士鄭遐者乃鄭璠之子也怒目而起持刀將殺逢言復父讐衆共隔之遐怒不已遂入白郡將於是送遐南行敕津吏勿復渡使逢西邁且勸改名以避之或曰聞父之讐不可以不報然此讐非故殺若必死殺逢遐亦當坐遂遁去而不復其讐焉吁亦可謂異矣出續元怪録太平廣記卷四百二十九
