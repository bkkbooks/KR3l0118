body:
  text: 太平廣記卷三百八十宋李昉等編再生六王璹魏靖楊再思金壇王丞韓朝宗韋延之張質鄭潔王璹唐尚書刑部郎中宋行質博陵人也性不信佛有慢謗之言永徽二年五月病死至六月九日尚書都官令史王璹暴死經二日而蘇言初死之時見四人來云官府追汝璹隨行入一大門見㕔事甚壯西間有一人坐形容肥黑東間有一僧坐與官相當皆面向北各有牀几案褥侍童二百許人或冠或弁皆美容貌階下有吏文案有一老人著枷被縛立東階下璹至庭亦已被縛吏執紙筆問璹曰貞觀十八年在長安佐史之日因何改李須達籍答曰璹前任長安佐史貞觀十六年轉選至十七年䝉授司農寺府史十八年改籍非璹罪也㕔上大官讀其辭辯顧謂東階下老囚曰何囚妄訴耶囚曰須達年實未至由璹改籍加須達年豈敢妄耶璹曰至十七年改任告身見在請追驗之官呼領璹者三人解璹縛將取告身既至大官自讀之謂老囚曰他改任分明汝無理令送老囚出門外門外昏闇有城城上皆有女墻似是惡處大官因書案上謂璹曰汝無罪放汝去璹辭拜吏引璹至東階拜辭僧印璹臂曰好去吏引璹出東南行度三重門皆勘視臂印然後出至四門門甚壯大重樓朱粉三户並開狀如城門守衞嚴切又驗印聴出門東南行數十步聞有人從後喚璹璹廻顧見郎中宋行質面色慘黑色如濕地露頭散腰著故緋袍頭髮短垂如胡人者立於㕔事階下有吏主守之西近城有一大木牌髙十丈二尺許大書牌曰此是勘當過王人其字大方尺餘甚分明㕔上有牀座几案如官府者而無人坐行質見璹悲喜云汝何故得來璹曰官追勘問改籍無事放還行質捉其兩手謂璹曰吾被官責問功德簿吾手中無受此困苦加之飢渇寒苦不可説君可努力至我家急語令作功徳也如是殷勤數四囑之璹乃辭去行數十步又呼璹還未及言㕔上有官人來坐怒璹曰我方勘事如何人輒至囚處使卒搭其耳推令去璹走又至一門門吏曰汝被搭耳耳當聾吾為汝却其中物因以手枕其耳耳中鳴乃驗印放出門外黑如漆璹不知所在以手摸西及南皆是墻壁唯東無障礙而闇不可行立待少時見向者追璹之吏從門來曰君尚能待我甚善可乞我錢一千璹因媿謝曰依命吏曰吾不用銅錢欲得白紙錢期十五日來取璹許因問歸路吏曰但東行二百步有墻穿破見明可推倒即至君家璹如言已至所居隆政坊南門矣於是歸家見人坐泣入户而蘇至十五日璹忘與錢明日復病困絶見吏來怒曰君果無行期與我錢遂不與今復將汝因即驅行出金光門令入坑璹拜謝百餘遂即放歸又蘇璹告家人買紙百張作錢送之明日璹又病困復見吏曰君幸能與我錢而錢不好璹辭謝請更作許之又蘇至二十日璹令用錢別買白紙作錢并酒食自於隆政坊西渠水上燒之既而身康體健遂平復如故出㝠報記魏靖魏靖鉅鹿人解褐武城尉時曹州刺史李融令靖知捕賊賊之叔為僧而止盜賊靖案之原其僧刺史讓靖以寛典自案之僧辭引伏融命靖杖殺之載初二年夏六月靖會疾暴卒權殮已畢將𡨕婚舅女故未果塟經十二日靖活呻吟棺中弟姪懼走其母獨命斧開棺以口候靖口氣微暖久之目開身肉俱爛徐以牛乳乳之既愈言初死經曹司門衞旗㦸甚肅引見一官謂靖何為打殺僧僧立於前與靖相論引僧辭窮官謂靖曰公無事放還左右曰肉已壞官令取藥以紙裹之曰可還他舊肉既領還至門聞哭聲驚懼不願入使者彊引之及房門使者以藥散棺中引靖臂推入棺頺然不復覺矣既活肉蠧爛都盡月餘日如故初至宅中犬馬雞鵝悉鳴當有所見矣出廣異記楊再思神龍元年中書令楊再思卒其日中書供膳亦死同為地下所由引至王所王問再思在生何得有許多罪狀既多何以收贖再思言已實無罪王令取簿來須臾有黄衣吏持簿至唱再思罪云如意元年黙啜陷瀛檀等國州家遣兵赴救少不敵有人上書諫再思違諫遣行為黙啜所敗殺千餘人大定元年河北蝗蟲為災烝人不粒再思為相不能開倉賑給至令百姓流離餓死者二萬餘人宰相燮理陰陽再思刑政不平用傷和氣遂令河南三郡大水漂溺數千人如此者凡六七件示再思再思再拜伏罪忽有手大如牀毛鬛可畏再思再攫指間血流騰空而去王問供膳何得至此所由對云欲問其人云無過宜放回供膳既活多向人說其事為中宗所聞召問具以實對中宗命列其事跡於中書㕔記之云出廣異記金壇王丞開元末金壇縣丞王甲以充綱領户稅在京於左藏庫輸納忽有使者至庫所云王令召丞甲倉卒隨去出城行十餘里到一府署入門聞故左常侍崔希逸語聲王與希逸故三十年因問門者具知所以求為通刺門者入白希逸問此人何在遽令呼入相見驚喜謂甲曰知此是地府否甲始知身死悲感久之復問曾見崔翰否翰是希逸子王云入城已來為開庫司未暇至宅希逸笑曰真輕薄士以死生易懷因問其來由王云適在庫中隨使至此未了其故有頃外傳王坐崔令傳語白王云金壇王丞是已親友計未合死事了願早遣時熱恐其舍壞王引入謂甲曰君前任縣丞受贓相引見丞著枷坐庭樹下問云初不同情何故見誣丞言受罪辛苦權救倉卒王云若不相關即宜放去出門詣希逸別希逸云卿已得還甚善𫝊語崔翰為官第一莫為人作枉後自當之取錢必折今生壽毎至月朝十五日宜送清水一瓶置寺中佛殿上當獲大福甲問此功德云何逸云㝠間事卿勿預知但有福即可言畢送出至其所遂活出廣異記韓朝宗天寶中萬年主簿韓朝宗嘗追一人來遲決五下將過縣令令又決十下其人患天行病而卒後於㝠司下狀言朝宗朝宗遂􅀍追至入烏頸門極大至中門前一雙桐樹門邉一閣垂簾幕窺見故御史洪子輿坐子輿曰韓大何為得此來朝宗云被追來不知何事子輿令早過大使入屏墻見故刑部尚書李乂朝宗參見云何為決殺人朝宗訴云不是朝宗打殺縣令重決因患天行病自卒非朝宗過又問縣令決汝何牽他主簿朝宗無事然亦縣丞悉見例皆受行杖木決二十放還朝宗至晩始蘇脊上青腫疼痛不復可言一月已後始可於後巡檢坊曲遂至京城南羅城有一坊中一宅門向南開宛然記得追來及喫杖處其宅空無人居問人云此是公主凶宅人不敢居乃知大凶宅皆鬼神所處信之出朝野僉載韋延之睦州司馬韋延之秩滿寄居蘇州嘉興大歴八年患痢疾夏月獨寐㕔中忽見二吏云長官令屈延之問長官為誰吏云奉命追公不知其他延之疑是鬼魅下地欲歸吏便前持其袂云追君須去還欲何之延之身在牀前神乃隨出去郭復不見陂澤但是陸路行數十里至一所有府署吏將延之過大使大使傳語領過延之判官吏過延之襴笏下階敬肅甚謹因謂延之曰有人論訟事須對答乃令典領于司馬對事典引延之至房房有判官㕔前㕔如今之縣令㕔有兩行屋屋間悉是房房前有斜眼格子格子内板牀坐人典引延之坐板牀對事須臾引囚徒六七人或枷或鎻或露手者至延之所典云汝所論訟韋司馬取錢今宜獻酬自直也問云所訴是誰曰是韋冰司馬寔不識此人典便賀司馬云今得重生甚喜乃引延之至判官所具白判官亦甚相賀處分令還白大使放司馬迴典復領延之至大使㕔大使已還内𫝊語放韋司馬去遣追韋冰須臾綠衫吏把案來呵追吏何故錯追他人各決六十流血被地令便送還延之曰欲見向後官職吏云何用知之延之苦請吏開簿延之名後但見白紙不復有字因爾逐出行百餘步見吏抱清流縣令鄭晉客至是延之外甥延之問汝何故來答曰被人見訟晉客亦問延之云何故來延之云吾錯被追今得放還晉客稱善數四欲有傳語吏拘而去意不得言但累迴顧云舅氏千萬延之至舍乃活問晉客云死來五六日韋冰宅住上元即以延之重生其明日韋冰卒出廣異記張質張質者猗氏人貞元中明經授亳州臨渙尉到任月餘日暮見數人執符來追其僕亦持馬俟于階下乘馬隨之出縣門縣吏列坐門下略無起者質怒曰州司暫追官不遽發人吏敢無禮耶人亦不顧出數十里至一栢林使者曰到此宜下馬遂步行百餘步入城直北有大府門署曰北府入府徑西有門題曰推院吏士甚衆門人曰臨渙尉張質遂入見一美􅂡髯衣緋人據案而坐責曰為官本合理人因何曲推事遣人枉死質被捽搶地呼曰質本任解褐得到官月餘未嘗推事又曰案牘分明訴人不逺府命追勘仍敢言欺言欺取枷枷之質又曰訴人既近請與相見寃人來有一老人眇目自西房出疾視質曰此人年少非推某者仍刺録庫檢猗氏張質貞元十七年四月二十七日上臨渙尉又檢訴狀被屈事又牒隂道亳州其年三月臨渙見任尉年名如已受替替人年名并受上月日得牒其年三月見任尉江陵張質年五十一貞元十一年四月十一日任十七年四月二十一日受替替人猗氏張質年四十七檢狀過判官曰名姓偶同遂不審勘本典決十下改追正身執符者復引而迴若行高山墜於岩下如夢覺乃在栢林中伏於馬項上雨裛背痛不能自起且不知何處𨼆𨼆聞樵歌之聲知其有人遂大呼救命樵人來驚曰縣失官人及馬此非耶競來問質不能對扶正其身策以送縣質之馬為鬼所加僕人不知縣既失質其宰惑之且疑質之初臨嚴於吏吏怨而殺之是夜坐門者及門人當宿之吏莫不禁錮尋求不得者已七日矣質歸憩數日方能言然神識遂闕出續𤣥怪錄鄭潔鄭潔本滎陽人寓於壽春郡嘗以假攝丞尉求食婚李氏則善約之猶子也潔假攝停秩寄跡安豐之里開成五年四月中旬日向暮李氏忽得心痛疾乃如狂言拜於空云且更乞須臾間而卒唯心尚暖耳一家號慟呼醫命巫竟無效者唯備死而已至五更鷄鳴一聲忽然迴轉衆皆驚捧良久口鼻間覺有嘘吸消息至明方語云鬼兩人把帖來追初將謂州縣間猶冀從容而俄被使人曵將怕懼行亦不覺甚難至一城郭引入見一官人似曹官之軰又領入曹司然讀元追之由云某前生姓劉是丈夫有妻曰馬氏馬氏悍戾劉乃殺而剔其腹令馬氏無五藏不可託生所訴者馬母某便告本司云居欲得馬氏託生即放某迴盡平生所有與作功德為計即可也若今追某徒寘於無間獄亦何裨於馬氏哉本司云此則自辨之須臾馬氏者到李恐馬氏無禮遂對官人云何得如此狡毒李具以私中之言對之官人問馬氏曰何如馬氏曰寃係多年別罪受畢令歸生路無計伏取裁斷李氏又云且請檢某算壽幾何若未合來即請依前說若合命盡伏聽處分官人云灼然有理遂召司命須臾一主者抱案入來云李未合來昨追時已檢訖須臾更檢檢出捧呈官云更有十八年合在人間本司云且令隨衙勘責夜則放歸耳彼處欲夜所司放出似夢而歸也自是人間日暮追使即來鷄鳴即放迴如常矣鄭雖貧苦百計祇待來使三五日後使人慙謝鄭曰百味之物深所反側然不如賜茶漿水粥耳茶酒不如賜漿水又貧居之易辦自是毎晚則備漿水及粥紙錢三五張月十日後毎來皆語言商議出拔李氏李氏初毎歸來並不敢言自使人同和兼許微說𡨕間事常言人罪之重者無如枉法殺人而取金帛又曰布施者不必造佛寺不如先救骨肉間饑寒如有餘即分錫類更有餘則救街衢間也其福最大鄭君兼憑問還往間一人壽命官爵迴報云此人好受金帛今被折壽已欲盡矣然更有一官如能改即得終此秩若踵前則不離任矣又云毎燒錢財如明旦欲送錢與某神祇即先燒三十二張紙錢以求五道其神祇到必獲矣如尋常燒香多不達如是春秋祭祀者即不假告報也其燒時輒不得就地須以柴或草薦之從一頭以火爇不得剔其錢即不破碎一一可達也至八月中李却迴忽喜曰已有計可脫矣鄭詢之曰奈何然須致紙錢三五萬令他行下可矣鄭乃求於還往一邑官吏並知之共與司力依言救之後數日方肯說因云𡨕司又有剔五藏而殺人者𡨕司勘覆未畢且取彼五藏寘諸馬氏腹令脫生矣自是追呼稍稀或十日方一去但云磨勘文案未畢所言受罪亦不見其餘但拷問科決而已又嘗言當邑某坊曲某姓名人合至某月日卒至時更無差謬又鄭君自云某即合得攝安豊尉至明年正月三日果為崔中丞邀攝安豊縣尉皆其妻素知之自正月已後更免其追呼矣鄭君自有記錄四十餘紙此略而言也出博異記太平廣記卷三百八十
