body:
  text: 太平廣記卷一百三十七徵應三吕望仲尼文翁董仲舒何比干五鹿充宗王溥應樞袁安陳仲舉張承張氏司馬休之杜慈武士彠張文成上官昭容崔行功李正已李揆賈隱林張子良鄭絪吕望吕望釣于渭濱獲鯉魚剖腹得書曰吕望封于齊出説苑仲尼周靈王二十一年孔子生魯襄之代夜有二神女擎香露沐浴徵在天帝下奏鈞天樂空中有言曰天感生聖子故降以和樂有五老列徵在之庭中五老者蓋五星精也夫子未生之前麟吐玉書於闕里人家文云水精子繼衰周為素王徵在以繡􅌧繫麟之角相者云夫子殷湯之後水德而為素王至定公二十四年鉏商畋于大澤得麟示夫子繫􅌧尚存夫子見之抱而解􅌧涕下沾􅁭出王子年拾遺記文翁漢文翁嘗起田斫柴為陂夜有百十野猪鼻載土著柴中比曉塘成稻常収嘗欲斷一大樹欲斷處去地一丈八尺翁先呪曰吾得二千石斧當著此處因擲之正斫所欲後果為蜀郡守出小説董仲舒漢董仲舒常夢蛟龍入懐中乃作春秋繁露出小説何比干漢何比干夢有貴客車騎滿門覺以語妻子未已門首有老姥年可八十餘求避雨雨甚盛而衣不沾濡比干延入禮待之乃曰君先出自后稷佐堯至晉有隂功今天賜君䇿如簡長九寸凡九百九十枚以授之曰子孫能佩者富貴言訖出門不復見出幽明錄五鹿充宗漢五鹿充宗受學于𢎞成子成子少時嘗有人過已授以文石大如燕卵成子吞之遂大明悟為天下通儒成子後病吐出此石以授充宗又為名學也出西京雜記王溥後漢永初三年國用不足令民吏入錢者得為官琅邪王溥其先吉為昌邑中尉溥奕世衰凌及安帝時家貧無貲不得仕乃挾竹簡搖筆洛陽市傭書為人美形貌又多文詞僦其書者丈夫賜其衣冠婦人遺其金玉一日之中衣寶盈車而歸積粟十廩九族宗親莫不仰其衣食洛陽稱為善而富也溥先時家貧穿井得鐵印銘曰傭力得富至億庾一土三田軍門主溥以得錢輸官得中壘校尉三田一土壘字校尉掌北軍壘門故曰軍門主也出拾遺録應樞後漢汝南應樞生四子見神光照社樞見光以問卜人卜人曰此天符也子孫其興乎乃探得黃金自是諸子官學並有才名至瑒七世通顯出孝子傳袁安漢袁安父亡母使安以鷄酒詣卜工問葬地道逢三書生問安何之具以告書生曰吾知好葬地安以鷄酒禮之畢告安地處云當此世為貴公便與别數步顧視皆不見安疑是神人因葬其地遂登司徒子孫昌盛四世五公焉出幽明録陳仲舉陳仲舉微時嘗行宿主人黃申家申家夜産仲舉不知夜三更有扣門者久許聞應云門裏有貴人不可前宜從後門徃俄聞徃者還門内者問之見何兒名何當幾歲還者云是男兒名阿奴當十五歲又問曰後當若為死答曰為人作屋落地死仲舉聞此黙志之後十五年為豫章太守遣吏徃問昔兒阿奴所在家云助東家作屋墮棟而死矣仲舉後果大貴出幽明録張承孫氏懐張承時乗輕舠于江浦忽見白虵長三丈騰入舟中呪曰若為吉祥勿毒噬我縈而將還置于房中一宿不復見母嗟惜之隣中相謂曰昨者張家有白鵠聳翮入雲以告承母母使筮之筮者曰吉祥鵠是延年之物從室入雲自卑升高之象昔吳闔閭葬其妹殉以美人寶劒珍物窮江南之富未及千年雕雲覆其溪谷美女遊於塚上白鵠翔乎林中白虎嘯於山側皆昔時之精靈今出於世當使子孫位極人臣擅名江表若生子可以名為白鵠後承生昭位輔吳將軍年九十虵鵠之祥也出王子年拾遺記張氏晉長安有張氏者晝獨處室有鳩自外入止于牀張氏惡之披懐而呪曰鳩爾來為我禍耶飛上承塵為我福耶飛入我懐鳩飛入懐乃化為一銅鈎從爾資産巨萬出法苑編珠司馬休之晉司馬休之安帝族子遇難出奔所乗騅常于牀前養之忽連鳴不食注目視鞍休之即試鞴之則不動休之還坐馬又驚因騎馬即驟出行十里餘慕容超収使已至奔馳僅得歸晉出廣古今五行記杜慈秦苻生壽光年毎宴集後入者皆斬之尚書郎杜慈奔馳疲倦假寢省中夢一人乗黑驢曰寧畱而同死將去而獨生慈聞驚覺取馬遁走乃免餘皆斬出廣古今五行記武士彠唐武士彠太原文水縣人微時與邑人許文寶以鬻材為事常聚材木數萬莖一旦化為叢林森茂因致大富士彠與文寶讀書林下自稱為厚材文寶自稱枯木私言必當大貴及高祖起義兵以鎧胄從入關故鄉人云士彠以鬻材之故果逢構厦之秋及士彠貴達文寶依之位終刺史出太原事跡張文成唐率更令張文成梟晨鳴于庭樹其妻以為不祥連唾之文成云急灑掃吾當改官言畢賀客已在門矣出國史異纂又一説文成景雲二年為鴻臚寺丞帽帶及緑􅂁並被䑕囓又蜘蛛大如栗當寢門上懸絲經數日大赦加階授五品男不宰䑕亦囓腰帶欲斷㝷選授博野尉出朝野僉載上官昭容唐上官昭容者侍郎儀之孫也儀子有罪婦鄭氏塡宫遺腹生昭客其母將誕之夕夢人與秤曰持此秤量天下文士鄭氏冀其男也及生昭容母視之曰秤量天下豈是汝耶口中嘔嘔如應曰是出嘉話録崔行功唐祕書少監崔行功未得五品前忽有鸜鵒銜一物入其室置案上去乃魚袋鉤鐵不數日加大夫也出國史異纂李正巳唐李正巳本名懐玉侯希逸之内弟也侯鎭淄青署懐玉為兵馬使㝷搆飛語侯怒囚之將置于法懐玉抱寃無訴於獄中疊石像佛黙祈㝠助時近臘月心慕同儕歎咤而睡覺有人在頭上語曰李懐玉汝富貴時至即驚覺顧不見人天尚黑意甚怪之復睡又聽人謂曰汝看牆上有青鳥子噪即是富貴時至即驚覺復不見人有頃天曙忽有青鳥數十大如雀時集牆上俄聞三軍呌呼逐出希逸壊鏁取懐玉權知畱後出酉陽雜俎李揆唐代宗帝臨軒送上計郡守百僚外辦御輦俯及殿之橫門帝忽駐輦召北省官謂曰我常記先朝毎餞計吏皆有德音以申誡勵今獨無有可乎宰相匆遽不暇奏對帝曰且罷朝撰詞以俟異日中書舍人李揆越班伏奏曰陛下送計吏勅下已久逺近咸知今忽臨朝改移或恐四方乍聞妄生疑惑今止須制詞臣請立操翰伏乞陛下稍駐鑾輅帝俞之遂命紙筆即令御前起草隨遣書工寫録頃刻而畢及宣詔毎遇要處帝必目揆于班中外日俟揆之新命時方盛暑揆夜寢于堂之前軒而空其中堂為晝日避暑之所於一夜忽有巨狐鳴噪于庭仍人立跳躍目光迸射久之踰垣而去揆甚惡之是夜未艾忽聞中堂動盪喧豗若有異物即令執燭開門以視人輩驚駭返走皆曰有物甚異揆即就窺乃有蝦蟇大如三斗釡兩目朱殷蹲踞嚼沫揆不令損害堦前素有漬瓜果大銅盆可受一斛遂令家人覆其盆而合之因扄其門亦無他變將曉揆入朝其日拜相及歸親族列賀因話諸怪即遣啓戸掲盆視之已失其物矣出異苑賈隱林唐德宗欲西幸有知星者奏云逢林即住帝曰豈敢令朕止於林木間姜公輔曰不然但地亦應乃奉天尉賈隱林謁帝于行在帝觀隱林氣色雄傑兼是忠烈之家而名叶星者所奏之語隱林即天寶末賈修之猶子帝因召于卧内以探籌畧之深淺隱林于御榻前以手板畫地陳攻守之䇿帝甚異之隱林奏曰臣昨夢日墮于地臣以頭戴日上天帝曰朕此來也乃已前定遂拜隱林為侍御史糾劾行在㝷遷左常侍出神異録張子良唐永貞二年春三月彩虹入潤州大將張子良宅初入漿甕水盡入井飲之是月九日節度使李錡詔召不赴闕欲亂令子良領兵収宣歙子良翻然反兵圍城李錡就擒子良拜金吾將軍㝷拜方鎭出祥異集驗鄭絪唐丞相鄭絪宅在昭國坊南門忽有物來投瓦礫五六夜不絶及移於安仁西門宅避之瓦礫又隨而至久之復還昭國鄭公歸心釋門宴處常在禪室及歸昭國入方丈蟢子滿室懸絲去地一二尺不知其數其夕瓦礫亦絶翌日拜相出祥異集驗太平廣記卷一百三十七
