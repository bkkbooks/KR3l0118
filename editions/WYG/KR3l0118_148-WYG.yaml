body:
  text: 太平廣記卷一百四十八定數三韋氏張嘉福宋惲房琯孫生張嘉貞杜暹鄭䖍崔圓韋氏唐平王誅逆韋崔日用將兵杜曲誅諸韋畧盡綳子中嬰孩亦揑殺之諸枉濫及者非一浮休子曰此逆韋之罪疎族何辜亦如冉閔殺胡高鼻者橫死董卓誅閹人無鬚者枉戮死生命也岀朝野僉載張嘉福唐逆韋之變吏部尚書張嘉福河北道存撫使至懐州武陟驛有敕所至處斬之尋有敕放使人馬上昏睡遲行一驛比至已斬訖命非天乎天非命乎岀朝野僉載宋惲明皇在府之日與絳州刺史宋宣逺兄惲有舊及登極之後常憶之欲用爲官惲自知命薄乃隱匿外州緣親老歸侍至定鼎門外逢一近臣其人入奏云適見宋惲上喜遂召入經十數年每欲與官即自知無祿奏云若與惲官是速微命後因國子監丞杜幼竒除左贊善大夫詔令隨例與一五品官遂除右贊善大夫至夜卒岀定命錄房琯開元中房琯之宰盧氏也邢眞人和璞自太山來房琯虚心禮敬因與攜手閒歩不覺行數十里至夏谷村遇一廢佛堂松竹森映和璞坐松下以杖叩地令侍者掘深數尺得一缾缾中皆是婁師德與永公書和璞笑謂曰省此乎房遂洒然方記其爲僧時永公即房之前身也和璞謂房曰君殁之時必因食魚鱠既歿之後當以梓木爲棺然不得歿於君之私第不處公館不處𤣥壇佛寺不處親友之家其後譴於閬州寄居州之紫極宫卧疾數日使君忽具鱠邀房於郡齋房亦欣然命駕食竟而歸暴卒州主命攢櫝於宫中棺得梓木爲之岀明皇雜錄孫生開元末杭州有孫生者善相人因至睦州郡守令遍相僚吏時房琯爲司户崔渙自萬年縣尉貶桐廬丞孫生曰二君位皆至台輔然房神器大寳合在掌握中崔後合爲杭州刺史某雖不見亦合䝉其恩惠既而房以宰輔齎册書自蜀往靈武授肅宗崔後果爲杭州刺史下車訪孫生即已亡旬日矣署其子爲牙將以粟帛賑䘏其家岀明皇雜錄張嘉貞開元中上急於爲理尤注意於宰輔常欲用張嘉貞爲相而忘其名夜令中人持燭於省中訪其直宿者訪還奏中書侍即韋抗上即令召入寢殿上曰朕欲命一相常記得風標爲當時重臣姓張而重名今爲北方侯伯不欲訪左右旬日念之終忘其名卿試言之抗奏曰張齊丘今爲朔方節度上即令草詔仍令宫人持燭抗跪於御前援筆而成上甚稱其敏㨗典麗因促命寫詔敕抗歸宿省中上不解衣以待且將降其詔書夜漏未半忽有中人復促抗入見上迎謂曰非張齊丘乃太原節度張嘉貞别命草詔上謂抗曰維朕志先定可以言命矣適朕因閲近日大臣章疏首舉一通乃嘉貞表也因此洒然方記得其名此亦天啓非人事也上嘉其得人復歎用捨如有人主張岀明皇雜錄杜暹杜暹幼時曽自蒲津濟河河流湍急時入舟者衆舟人已解䌫岸上有一老人呼杜秀才可蹔下其言極苦暹不得已往見與語乆之船人待暹不至棄襆於岸便發暹與老人交言未盡顧視船去意甚恨恨是日風急浪麤忽見水中有數十手攀船沒徒侣皆死唯暹獲存老人謂暹曰子卿業貴極故來相救言終不見暹後累遷至公卿岀廣異記鄭䖍開元二十五年鄭䖍爲廣文博士有鄭相如者年五十餘自隴右來應明經以從子謁䖍䖍待之無異禮他日復謁禮亦如之相如因謂䖍曰叔父頗知某之能否夫子云其或繼周者雖百世可知也某亦庶幾於此若存孔門未敢隣於顔子如言偃子夏之徒固無所讓䖍大異之因詰所驗其應如響䖍乃杜門累日與言狎因謂之曰若然君何不早爲進取而遲暮如是相如曰某來歲方合成名所以不預來者時未至耳䖍曰君當爲何官曰後七年選授衢州信安縣尉秩滿當卒䖍曰吾之後事可得聞乎曰自此五年國家當改年號又十五年大盜起幽薊叔父此時當被玷汚如能赤誠向國即可以遷謫不爾非所料矣明年春相如果明經及第後七年調改衢州信安尉將之官告以永訣涕泣爲别後三年有考使來䖍問相如存否曰替後數月暴卒於佛寺至二十九年改天寳天寳十五年安祿山亂東都遣僞署西京留守張通儒至長安驅朝官就東洛䖍至東都僞署水部即中乃思相如之言佯中風疾求攝市令以自汚而亦潛有章疏上肅宗即位靈武其年東京平令三司以按受逆命者罪䖍以心不附賊貶温州司户而卒岀前定錄崔圓崔相國圓少貧賤落拓家於江淮間表丈人李彦允爲刑部尚書崔公自南方至京候謁將求小職李公處於學院與弟子肄業然待之蔑如也一夜李公夢身被桎梏其輩三二百人爲兵仗所擁入大府署至㕔所皆以姓名唱入見一紫衣人據案彦允視之乃崔公也遂於階下哀叫請命紫衣笑曰且收禁驚覺甚駭異語於夫人夫人曰宜厚待之安知無應乎自此優禮日加置於别院會食中堂數月崔公請出將求職於江南李公及夫人因具盛饌兒女悉坐食罷崔公拜謝曰恩慈如此不知何以報効某每度過分未測其故願丈人示之李公笑而不爲答夫人曰親表姪與子無異但慮不足亦何有恩慈之事李公起夫人因謂曰賢丈人昨有異夢即君必貴他日丈人迍難事在郎君能特達免之乎崔公曰安有是也李公至復重言之崔公踧踖而已不復致詞李公云江淮路逺非求進之所某素熟楊司空以奉託時國忠以宰相領西川節度崔既謁見甚爲楊所禮乃奏崔公爲節度巡官知留後事發日李公厚以金帛贈送至西川未一歲遇安祿山反亂𤣥宗播遷遂爲節度使旬日拜相時京城初尅復脅從僞官陳希烈等並爲誅夷彦允在數中既議罪崔公爲中書令詳決之果盡以兵仗圍入具姓名唱過判云准法至李公乃呼曰相公記昔年之夢否崔公頷之遂判收禁既罷具表其事因請以官贖彦允之罪肅宗許之特詔免死流嶺外岀逸史太平廣記卷一百四十八
