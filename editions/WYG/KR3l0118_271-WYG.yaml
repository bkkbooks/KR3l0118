body:
  text: 太平廣記卷二百七十一婦人二賢婦徐才人盧氏董氏髙叡妻崔敬女李畬母盧獻女鄧廉妻肅宗朝公主潘炎妻劉皇后河池婦人賀氏才婦謝道韞楊容華上官昭容張氏杜羔妻張暌妻關圖妹魚𤣥機牛肅女愼氏薛媛孫氏賢婦徐才人徐氏名惠堅之女也生五月能言唐太宗以爲才人特遷爲充容軍旅未寧上疏諫修宮室詞甚典美上然之盧氏狄仁傑之爲相也有盧氏堂姨居于午橋南别墅姨止有一子而未嘗來都城親戚家仁傑每伏臘晦朔修禮甚謹常經雪後休暇仁傑因候盧姨安否適表弟挾弓矢攜雉兔而來歸進膳於母顧揖仁傑意甚輕簡仁傑因啓於姨曰某今爲相表弟有何樂從願悉力從其㫖姨曰相自貴爾姨止有一子不欲令其事女主仁傑大慙而退出松窓雜録董氏則天朝太僕卿來俊臣之彊盛朝官側目上林令侯敏偏事之其妻董氏諫止之曰俊臣國賊也勢不久一朝事壞奸黨先遭君可敬而遠之敏稍稍而退俊臣怒出爲涪州武隆令敏欲棄官歸董氏曰速去莫求住遂行至州投刺參州將錯題一張紙州將展看尾後有字大怒曰修名不了何以爲縣令不放上敏憂悶無已董氏曰但住莫求去停五十日忠州賊破武隆殺舊縣令略家口並盡敏以不許上獲全後俊臣誅逐其黨流嶺南敏又獲免出朝野僉載高叡妻趙州刺史高叡妻秦氏黙啜賊破定州部至趙州長史已下開門納賊叡計無所出與秦氏仰藥而詐死舁至啜所良久啜以金獅子帶紫袍示之曰降我與爾官不降即死叡視而無言陽顧其婦秦氏秦氏曰受國恩報在此今日受賊一品何足爲榮俱合眼不語經兩日賊知不可屈乃殺之出朝野僉載崔敬女唐冀州長史吉懋欲爲男頊娶南宮縣丞崔敬女敬不許因有故脅以求親敬懼而許之擇日下函并花車卒至門首敬妻鄭氏初不知抱女大哭曰我家門戸低不曾有吉郎女堅卧不起其小女白其母曰父有急難殺身救解設令爲婢尚不合辭姓望之門何足爲恥姊若不可兒自當之遂登車而去頊遷平章事賢妻達節談者榮之頊坐與河内王武懿宗爭競出爲溫州司馬而卒出朝野僉載李畬母監察御史李畬母清素貞潔畬請禄米送至宅母遣量之賸三石問其故令史曰御史例不槩又問脚錢幾又曰御史例不還脚車錢母怒令送所賸米及脚錢以責畬畬乃追倉官科罪諸御史皆有慙色出朝野僉載盧獻女文昌左丞盧獻第二女先適鄭氏其夫早亡誓不再醮姿容端秀顔調甚高姊夫羽林將軍李思冲姊亡之後奏請續親許之兄弟並不敢白思冲擇日備禮贄幣甚盛執致就宅盧氏拒關抗聲詈曰老奴我非汝匹也乃踰垣至所親家截髪冲奏之敕不奪其志後爲尼甚精進出朝野僉載鄧亷妻滄州弓高鄧亷妻李氏女嫁未周年而亷卒李年十八守志設靈几每日三上食臨哭布衣蔬食六七年忽夜夢一男子容止甚都欲求李氏爲偶李氏睡中不許之自後每夜夢見李氏竟不受以爲精魅書符呪禁終莫能絶李氏歎曰吾誓不移節而爲此所撓葢吾容貌未衰故也乃援刀截髪麻衣不濯蓬􅁂不理垢面灰身其鬼又謝李氏曰夫人竹栢之操不可奪也自是不復夢見郡守旌其門閭至今尚有節婦里出朝野僉載肅宗朝公主肅宗讌于宫中女優弄假戲有緑衣秉簡爲參軍者天寳末蕃將阿布恩伏法其妻配掖庭善爲優因隸樂工是以遂令爲參軍之戲公主諫曰禁中妓女不少何必須得此人使阿布恩眞逆人耶其妻亦同刑人不合近至尊之座若果寃横又豈忍使其妻與羣優雜處爲笑謔之具哉妾雖至愚深以爲不可上亦憫惻遂罷戲而免阿布恩之妻由是賢重公主公主即栁晟之母也出因話録潘炎妻潘炎侍郎德宗時爲翰林學士恩渥極異其妻劉晏女也京尹某有故伺候累日不得見乃遺閽者三百縑夫人知之謂潘曰豈爲人臣而京尹願一謁見遺奴三百縑其危可知也遽勸潘公避位子孟陽初為戸部侍郎夫人憂惕謂曰以爾人材而在丞郎之位吾懼禍之必至也戸部解喻再三乃曰不然試㑹爾同列吾觀之因遍招深熟者客至夫人垂簾視之既罷會喜曰皆爾儔也不足憂矣問末座慘緑少年何人也曰補闕杜黄裳夫人曰此人全别必是有名卿相出幽閒鼔吹劉皇后後唐太祖至州上源驛之變太祖憤恨欲廻軍攻之劉皇后時隨軍行謂太祖曰公爲國討賊而以柸酒私忿若攻城即曲在於我不如廻師自有朝廷可以論列於是班師天復中周德威爲汴軍所敗三軍潰散汴軍乘我太祖危懼與德威議出保雲州劉皇后曰妾聞王欲棄城而入外藩誰爲此畫曰存信輩所言劉后曰存信本北蕃牧羊兒也焉顧成敗王常笑王行瑜棄權失勢被人屠割今復欲效之也王頃歲避難逹靼幾遭陷害頼遇朝廷多事方得復歸今一旦出城便有不測之變焉能遠及北蕃遂止居數日亡散之士復集軍城安堵劉后之力也出北夢瑣言河池婦人梁祖攻圍岐隴之年引兵至于鳳翔秦帥李茂貞遣戎挍李繼朗統衆救之至則大㨗生降七千餘人及旋軍於河池縣掠獲一少婦甚有顔色繼朗悅之寢處於兵幕之下西邁十五餘程毎欲逼之即云我姑嚴夫妬請以死代之戎帥怒脅之以威終莫能屈帥笑而憫之竟不能犯使人送還其家出玉堂閒話賀氏兗州有民家婦姓賀氏里人謂之織女父母以農爲業其丈夫則負擔販賣徃來于郡賀初爲婦未浹旬其夫出外每出數年方至至則數日復出其所獲利蓄别婦於他所不以一錢濟家賀知之每夫還欣然奉事未嘗形於顔色夫慙愧不自得更非理毆罵之婦亦不之酬對其姑已老且病凍餒切骨婦傭織以資之所得傭直盡歸其姑已則寒餒姑又不慈日有凌虐婦益加恭敬下氣怡聲以悦其意終無怨歎夫嘗挈所愛至家賀以女弟呼之略無慍色賀爲婦二十餘年其夫無半年在家而能勤力奉養始終無怨可謂賢孝矣出玉堂閒話才婦謝道韞王凝之妻謝道韞王獻之與客談義不勝道韞遣婢白曰請與小郎解圍乃施青綾步障自蔽與客談客不能屈出獨異志楊容華楊臨川姪女曰容華㓜善屬文甞為新籹詩好事者多𫝊之詩曰宿鳥驚眠罷房攏乗曉開鳯釵金作縷鸞鏡玉為臺粧似臨池出人疑月下来自憐終不見欲去復徘徊上官昭容唐上官昭容之方娠母鄭氏夢神人畀之大秤以此可稱量天下生彌月鄭弄之曰爾非秤量天下孩啞應之曰是襁中遇家禍入掖庭年十四聰達敏識才華無比天后聞而試之援筆立成皆如宿搆自通天後逮景龍前恒掌宸翰其軍國謀猷殺生大柄多其所决至若幽求英雋鬱興詞藻國有好文之士朝希不學之臣二十年間野無遺逸此其力也而晚年頗外通朋黨輕弄權勢朝廷畏之矣𤣥宗平難􅀍誅出景龍文館記張氏燕文貞公張説其女嫁盧氏甞為舅求官候父朝下而問焉父不語但指搘牀龜而示之女拜而歸室告其夫曰舅得詹事矣出𫝊載杜羔妻杜羔妻劉氏善為詩羔累舉不中第乃歸將至家妻即先寄詩與之曰良人的的有竒才何事年年􅀍放回如今妾面羞君面君到来時近夜来羔見詩即時迴去竟登第出玉泉子張暌妻㑹昌中邉將張暌防戍十有餘年其妻侯氏繡迴文作龜形詩詣闕進上詩曰暌離已是十秋彊對鏡那堪重理粧聞雁㡬迴修尺素見霜先為製衣裳開箱叠練先垂淚拂杵調砧更斷腸繡作龜形獻天子願教征客早還鄊敇賜絹三百疋以彰才美出杼情詩闗圗妹闗圗有一妹甚聰恵文學書札㒺不動人圗常語同􅒼曰某家有一進士所恨不櫛耳後寓居江陵有鹺賈常某者嚢畜千金三峡人也亦家于江陵深結託圗圗亦以長者待之數載常公殂有一子狀貎頗有儒雅之風紀而略曉文墨圗竟以其妹妻之則常修也闗氏乃與修讀書習二十餘年才學優博越絶流輩咸通六年登科座主司空李公蔚也初江東羅𨼆下第東歸有詩别修云六載辛勤九陌中却尋岐路五湖東名慙桂苑一枝綠鱠憶松江滿棹紅浮世到頭須適性男兒何必盡成功惟應鮑叔深知我他日蒲帆百尺風又廣陵秋夜讀修所賦三篇復吟寄修云入蜀還吳三首詩蔵於箧笥重於師劍闗夜讀相如聴𤓰步秋吟煬帝悲物景也知輸健筆時情誰不許高枝明年二月東風裏江島閒人慰所思修名望若此闗氏亦有助焉後修卒闗氏自為文祭之時人競相𫝊冩出南楚新聞魚𤣥機女道士魚𤣥機字恵蘭甚有才思咸通中適李億補闕後愛衰下山隸咸宜觀為道士詩曰易求無價寳難得有心郎又云􅈍蘭銷歇歸春圃楊栁東西絆客舟自是縦懐乃倡婦也竟以殺侍婢為京尹温璋殺之有集行於世出北夣瑣言牛肅女牛肅長女曰應貞適𢎞農楊唐源少而聰頴經耳必誦年十三凡誦佛經二百餘卷儒書子史又數百餘卷親族驚異之初應貞未讀左𫝊方擬授之而夜初眠中忽誦春秋起恵公元妃孟子卒終智伯貪而愎故韓魏反而䘮之凡三十卷一字無遺天曉而畢當誦時若有教之者或相酬和其父驚駭數呼之都不答誦已而覺問何故亦不知試令開卷則已精熟矣問不答著文章百餘首後遂學窮三教博涉多能毎夜中眠熟與文人談論文皆古之知名者往来答難或稱王弼鄭𤣥王衍陸機辯論鋒起或論文章談名理往往數夜不已年二十四而卒今採其文魍魎問影賦著扵篇其序曰庚辰嵗子嬰沈痛之疾不起者十旬毁頓精神羸悴形體藥物救療有加無瘳感莊子有魍魎責影之義故假之爲賦庶解疾焉魍魎問於予影曰君英逹之人聰明之子學包六藝文兼百氏賾道家之秘言探釋部之幽旨既䖍恭於中饋又希慕於前史不矯枉以干名不毁物而成巳伊淑德之如此即精神之足恃何故羸厥姿貌沮其精神煩寃枕席憔悴衣巾子惟形兮是寄形與子兮相親何不誨之以崇德而教之以自倫異萊妻之樂道殊鴻婦之安貧豈痼疾而無生頼將㣲賤而欲忘身今節變歲移臘終春首照晴光於郊甸動暄氣於梅栁水解凍而繞軒風扇和而入牖固可解憂釋疾怡神養夀何黙爾無營自貽伊咎僕於是勃然而應曰子居於無人之域遊乎魑魅之鄉形既圖於夏鼎名又著於蒙荘何所見之不博何所談之不長夫影依日而生像因人而見豈言談之足曉何節物之能辨随晦明以興滅逐形骸以遷變以愚夫畏影而蒙鄙之性以彰智者視隂而遲暮之心可見伊羙惡兮由巳影何辜而遇譴且予聞至道之精􅆼兮冥至道之極昏兮黙達人委性命之修短君子任時運之通塞悔吝不能纒榮耀不能惑䘮之不以爲䘮得之不以爲得君子何乃怒予之不賞芳春責予之不貴華餙且吾之秉操奚子智之能測言未卒魍魎惕然而驚歎而起曰僕生絶域之外長於荒遐之境未曉智者之處身是以造君而問影既談𤣥之至妙請終身以藏屏初應貞夢製書而食之每夢食數十卷則文體一變如是非一遂工爲賦頌文名曰遺芳出記聞慎氏愼氏北陵䖍亭儒家之女也三史嚴灌夫因㳺覽遂結姻好同載歸蘄春經十餘年無嗣息灌夫乃拾其過而出妻令歸二浙愼氏慨然登舟親戚臨流相送妻乃爲詩以訣灌夫灌夫覽之悽感遂爲夫婦如初愼氏詩曰當時心事已相關雨㪚雲飛一餉間便是孤㠶從此去不堪重上望夫山出雲谿友議薛媛濠梁人南楚材者旅遊陳潁歲乆潁守慕其儀範將欲以子妻之楚材家有妻以受知於潁牧忽不思義而輒已諾之遂遣家僕歸取琴書似無返舊之心或謂求道青城訪僧衡嶽不復留心於名宦也其妻薛媛善書畫妙屬文亦㣲知其意乃對鏡畫其形并詩四韻以寄之楚材得妻眞及詩甚慙遽有雋不疑之讓夫婦遂偕老焉里語曰當時婦棄夫今日夫棄婦若不逞丹青空房應獨自薛媛寫眞寄夫詩曰欲下丹青筆先拈寳鏡端已經顔索寞漸覺􅁂凋殘淚眼描將易愁腸寫出難恐君渾忘却時展畫圖看出雲谿友議孫氏樂昌孫氏進士孟昌期之内子善爲詩一旦併焚其集以爲才思非婦人之事自是専以婦道内治孫有代夫贈人白蠟燭詩曰景勝銀缸香比蘭一條白玉逼人寒他時紫禁春風夜醉草天書仔細看又有聞琴詩曰玉指朱絃軋復清湘妃愁怨最難聴初疑颯颯凉風動又似蕭蕭暮雨零近若流泉来碧嶂逺如𤣥鶴下青㝠夜深彈罷堪惆悵霧濕叢蘭月滿庭又謝人送酒詩曰詩將清酒寄愁人澄徹甘香氣味真好是綠窻風月夜一盃揺蕩滿懐春出北夣瑣言太平廣記卷二百七十一
