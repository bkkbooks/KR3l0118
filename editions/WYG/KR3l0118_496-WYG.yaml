body:
  text: 太平廣記卷四百九十六宋李昉等編雜録趙存嚴震盧把韋臯陸暢馬暢吳凑𡊮傪李勉于公異邢君牙張造呂元膺李章武元稹于頔薛尚衍趙存馮翊之東窟谷有𨼆士趙存者元和十四年壽逾九十服精朮之藥體甚輕健自云父諱君乗亦享遐夀甞事兗公陸象先言兗公之量固非凡可以測度兗公崇信内典弟景融竊非曰家兄溺此教何利乎象先曰若果無㝠道津梁百嵗之後吾固當與汝等萬一有罪福吾則分數勝汝及為馮翊太守恭軍等多名族子弟以象先性仁厚於是與府寮共約戲賭一人曰我能旋笏于㕔前硬努眼眶衡揖使君唱喏而出可乎衆皆曰誠如是其輸酒食一席其人便為之象先視之如不見又一叅軍曰爾所為全易吾能於使君㕔前墨塗其面着衫子作神舞一曲慢趨而出羣寮皆曰不可誠敢如此吾輩當歛俸錢五千為所輸之費其二叅軍便為之象先亦如不見皆賽所賭以為戲笑其第三叅軍又曰爾之所為絶易吾能于使君㕔前作女人梳粧學新嫁女拜舅姑四拜則如之何衆曰如此不可仁者一怒必遭叱辱倘敢為之吾輩願出俸錢十千充所輸之費其第三叅軍遂施粉黛高髻笄釵女人衣疾入深拜四拜象先又不以為怪景融大怒曰家兄為三輔刺史今乃成天下笑具象先徐語景融曰是渠叅軍兒等笑具我豈為笑哉初房琯甞尉馮翊象先下孔目官党芬于廣衢相遇避馬遲琯拽芬下决脊數十下芬訴之象先曰汝何處人芬曰馮翊人又問房琯何處官人芬曰馮翊尉象先曰馮翊尉决馮翊百姓告我何也琯又入見訴其事請去官象先曰如党芬所犯打亦得不打亦得官人打了去亦得不去亦得後數年琯為𢎞農湖城令移攝閔鄉値象先自江東徵入次閔鄉日中遇琯留迨至昏黑琯不敢言忽謂琯曰携衾裯來可以賔話琯從之竟不交一言到闕日薦琯為監察御史景融又曰比年房琯在馮翊兄全不知之今别四五年因途次㑹不交一詞到闕薦為監察御史何哉公曰汝不自解房琯為人百事不欠只欠不言今則不言矣是以為用之班行間大服其量矣出乾􅍧子嚴震嚴震鎮山南有一人乞錢三百千去就過活震召子公弼等問之公弼曰此誠不可旨輒如此乃患風耳大人不足應之震怒曰爾必墜吾門只可勸吾力行善事奈何勸吾恡惜金帛且此人不辨向吾乞三百千的非凡也命左右准數與之於是三川之士歸心恐後亦無造次過求者出紀聞盧把盧把為相令李揆入蕃揆對德宗曰臣不憚遠恐死于道路不逹君命帝惻然憫之謂盧曰李揆莫老無把曰和戎之使且須諳練朝廷事非揆不可且使揆去則羣臣少于揆年者不敢辭逺使矣揆既至蕃蕃長曰聞唐家有第一人李揆公是否揆曰非也他那李揆争肯到此恐為拘留以慢之也揆門戸第一文學第一官職第一揆致仕歸東都司徒杜佑羅淮海入洛見之言及第一之説揆曰若道門户門户有所自承餘裕也官職遭遇耳今形骸凋悴看即下世一切為空何第一之有出嘉話録韋臯韋臯在西川凡軍士將吏有婚嫁則以熟錦衣給其夫氏以銀泥衣給其女氏各給錢一萬死䘮稱是訓練稱是内附者富贍之遠遊者將迎之極其賦歛坐有餘力以故軍府盛而􅀺甿重困及晚年為月進終致劉闢之亂天下譏之出國史𥙷陸暢李白甞為蜀道難歌曰蜀道難難於上青天白以刺嚴武也後陸暢復為蜀道易曰蜀道易易於履平地暢佞韋臯也初暢受知於臯乃為蜀道易獻之臯大喜贈羅八百疋及韋薨朝廷欲繩其既徃之事復閱先所進兵噐刻定秦二字不相與者因欲搆成罪名暢上疏理之云臣在蜀日見造所進兵噐定秦者匠名也由是得釋出尚書故實馬暢馬燧之子暢以第中大杏饋竇文塲以進德宗德宗未甞見頗怪之令中使就封杏樹暢懼進宅廢為奉誠園屋木皆拆入内出國史𥙷吳湊德宗非時召拜吳湊為京兆尹便令赴上湊疾驅諸客至府已列筵矣或問曰何速吏曰两市日有禮席舉鐺釜而取之故三百人饌常可立辦出國史𥙷袁傪袁傪之破袁晁擒其偽公卿數十人州縣大具桎梏謂必生致闕下傪曰此惡百姓何足煩人乃遣笞臋逐之出國史𥙷李勉故相李勉任江西觀察使時部人有父病蠱乃為木偶人置勉名位瘞于其壟或發以告勉勉曰為父禳災是亦可矜也捨之或曰李勉失守梁城亦宜貶黜議曰不然當李希烈之怙亂其􅄡不可當天方厚其罪而降之罰也矧應變非長援軍不至又其時關輔已俶擾矣人心揺動矣以文吏之才當虎狼之隧乃全師南奔非量力者能乎出談賔録于公異李晟平朱泚之亂德宗覽收城露布曰臣已肅清宫禁祗謁寢園鐘簴不移廟貎如故上感涕失聲左右六宫皆嗚咽露布乃于公異之辭也議者以朝廷捷書露布無如此者公異後為陸䞇所忌誣以家行不謹賜孝經一卷故坎坷而終出國史補邢君牙元貞初邢君牙為隴右臨洮節度進士劉師老許堯佐往謁焉二客方坐一人儀形甚異頭大足短衣麻衣而入都不待賓司引報直入見君牙拱手于額曰進士張汾不敢拜君牙從戎多年殊不以為怪乃揖汾曾不顧堯佐師老汾坐俄而有吏過接宴設司所失錢物君牙閲歴簿書有五十餘千散落為所由𨼆漏君牙大怒方令分折去處汾乃拂衣而起曰且奉辭君牙謝曰某適有公事略須次遣來有所失于君子不知遽吿辭何也汾對曰汾在京之日每聞京西有邢君上柱天下柱地今日于汾前與設吏論三五十千錢此漢爭中君牙甚怪便放設吏與汾相親汾謂君牙曰某在京應舉每年常用二千貫文皆出往還劒南韋二十三徐州張十三一日之内客有數等上至給舍即須法味中至𥙷遺即須煮鷄豚或生或鱠既而指師老堯佐云如舉子此公之徒遠相訪即􅧐胡而已何不如此耶堯佐矍然逡巡二客告辭而退君牙各贈五縑張汾洒掃内㕔安置留連月餘贈五百縑汾却至武功堯佐方臥病在館汾都不相揖後二年及第又不肯選遂患腰脚疾武元衡鎮四川哀其龍鍾奏充安撫巡官仍攝廣都縣令一年而殂出乾􅍧子張造貞元中度支欲取兩京道中槐樹為薪更栽小樹先下符牒華隂華尉張造判牒曰召伯所憇尚不翦除先皇舊遊豈宜斬伐乃止出國史𥙷呂元膺呂元膺為鄂岳團練夜登城女墻已鎻守者曰軍法夜不可開乃告之曰中丞自登守者又曰夜中不辨是非中丞亦不可元膺乃歸及明擢為大職出國史𥙷李章武李章武學識好古有名于時唐太和末敕僧尼試經若干紙不通者勒還俗章武時為成都少尹有山僧來謁云禪觀有年未甞念經今􅀍追試前業棄矣願長者念之章武贈詩曰南宗向許通方便何處心中更有經好去苾蒭雲水畔何山松栢不青青主者免之出本事詩元稹元稹為御史奉使東川于襄城題黄明府詩其序云昔年曾于解縣飲酒余恒為觥録事甞于竇少府㕔有一人後至頻犯語令連飛十數觥不勝其困逃席而去醒後問人前虞卿黄丞也此後絶不復知元和四年三月奉使東川十六日至裒城望驛有大池樓榭甚盛逡廵有黄明府見近瞻其形容彷彿以識問其前銜即曩日之逃席黄丞也説向事黄生惘然而悟因饋酒一尊􅋈舟邀余同載余時在諸葛所征之路次不勝感今懐古遂作贈黄明府詩云昔年曾痛飲黄令困飛觥席上當時走馬前今日迎依稀迷姓字即漸識平生故友身皆遠他鄉眼暫明便邀聨榻坐兼共刺船行酒思臨風亂霜稜拂地平不堪深淺酌還愴古今情邐迤七盤路坡陁數丈城花疑褒女笑棧想武侯征一種埋幽石老閒千載名出本事詩于頔丞相牛僧孺應舉時知于頔竒俊特詣襄陽求知住數日兩見以㳺客遇之牛怒而去去後忽召客將問曰累日前有牛秀才發未曰已去何以贈之曰與錢五百受乎曰擲於庭而去于大怒謂賔佐曰某事繁總葢有闕遺者立命小將齎絹五百疋書一函追之曰未出界即領來如已出界即以書付小將界外追及牛不拆書揖回出幽閒鼓吹薛尚衍于頔方熾於襄陽朝廷以大閹薛尚衍監其軍尚衍至頔初不厚待尚衍晏如也後旬日請出遊及暮歸第幄幕茵毯什器一以新矣又列犢車五十乗實以綵綾尚衍頷之亦不言頔歎曰是何祥也出國史𥙷太平廣記卷四百九十六
