body:
  text: 太平廣記卷一百七十七器量二陸象先元載董晉裴度于頔武元衡李紳盧攜歸崇敬夏侯孜陳敬瑄葛從周陸象先唐陸兗公象先為同州刺史有家僮遇參軍不下馬參軍欲賈其事鞭背見血曰卑吏犯公請去兗公從容謂之曰奴見官人不下馬打也得不打也得官人打了去也得不去也得參軍不測而退出國史補元載魚朝恩於國子監髙坐講易盡言鼎卦以挫元載王縉是日百官皆在縉不堪其辱載怡然朝恩退曰怒者常情笑者不可測也出國史補董晉董晉與竇參同列時政事決在竇參晉但奉詔唯諾而已既而竇參驕盈犯上德宗漸惡之參諷晉奏給事中竇申為吏部侍郎上正色曰豈不是竇參遣卿奏也晉不敢𨼆諱上因問參過失晉具奏之旬日參貶官晉累上表辭官罷相受兵部尚書㝷除東都留守㑹汴州節度李萬榮疾甚其子乃為亂以晉為汴州節度使時晉既受命唯將判官傔從十數人都不召集兵馬既至鄭宣武將吏都無至者晉將吏及鄭州官吏皆懼共勸晉云都虞候鄧惟恭合來迎候乘萬榮疾甚遂總領軍事今相公到此尚不使人迎候其情狀豈可料􅁘恐須且迴避以候事勢晉曰某奉詔為汴州節度使准敕赴任何可妄為逗留人皆憂其不測晉獨恬然來至汴州數十里鄧惟恭方來迎候晉俾其不下馬既入仍委惟恭以軍衆惟恭探晉何如事體而未測淺深初萬榮既逐劉士寧代為節度使委兵於惟恭及疾甚李乃歸朝廷惟恭自以當便代居其位故不遣候吏以疑懼晉心冀其不敢進不虞晉之速至晉之速至留以近方迎然心常怏怏惟恭以驕盈慢法潛圖不軌配流嶺南朝廷恐晉柔懦㝷以汝州刺史陸長源為晉行軍司馬晉寛厚謙恭簡儉每事因循多可兵粗安長源性滋彰云為請改易舊事務從峭刻晉初皆許之及案牘已成晉乃且罷又委錢􅂖支許於判官孟叔度輕佻好慢易軍人人皆惡之晉卒於位卒後十日汴州大亂殺長源叔度軍人臠食之長源輕言無威儀自到汴州不為軍州所禮重及董晉疾仍令之節度晉後事長源便揚言文武將吏多弛慢不可執守憲章當盡以法繩之由是人人怨懼叔度性亦苛刻又縱恣聲色數至樂營與諸婦人戲自稱孟郎由是人輕而惡之出談賓錄裴度裴晉公度為門下侍郎過吏部選人官謂同過給事中曰吾徒僥倖至多此輩優一資半級何足問也一皆注定未曾限量公不信術數不好服食每語人曰雞猪魚蒜逢著則喫生老病死時至即行其器抱𢎞達皆此𩔖出因話錄又晉公在中書左右忽白以印失所在聞之者莫不失色度即命張筵舉樂人不曉其故竊怪之夜半宴酣左右復白印存度不答極歡而罷或問度以其故度曰此徒出於胥吏輩盜印書券耳緩之則存急之則投詣水火不復更得之矣時人伏其𢎞量臨事不撓出玉泉子于頔鄭太穆郎中為金州刺史致書於襄陽于司空頔鄭書傲睨自若似無郡吏之禮書曰閣下為南溟之大鵬作中天之一柱騫騰則日月暗搖動則山嶽頽真天子之爪牙諸侯之龜鑑也太穆孤幼二百餘口飢凍兩京小郡俸薄尚唯衣食之憂伏唯賢公賜錢一千貫絹一千疋器物一千事米一千石奴婢各十人且曰分千樹一葉之影即是濃隂減四海數滴之泉便為膏澤于公覽書亦不嗟訝曰鄭使君所須各依來數一半以戎費之際不全副其本望也又有匡廬符戴山人遣三尺童子齎數尺之書乞買山錢百萬公遂與之仍加紙墨衣服等又有崔郊秀才者寓居於漢上藴積文藝而物產罄縣無何與姑婢通每有阮咸之縱其婢端麗饒音伎之能漢南之最姝也姑貧鬻婢於連帥連帥愛之以𩔖無雙給錢四十萬寵盼彌深郊思慕無已即强親府署願一見焉其婢因寒食果出値郊立於栁隂馬上連泣誓若山河崔生贈之以詩曰公子王孫逐後塵綠珠垂淚滴羅巾侯門一入深如海從此蕭郎是路人或有疾郊者寫詩於座于公覩詩令召崔生左右莫之測也郊甚憂悔而已無處潛遁也及見郊握手曰侯門一入深如海從此蕭郎是路人便是公製作耶四百千小哉何惜一書不早相示遂命婢同歸至幃幌奩匣悉為増飾之小阜崔生矣初有客自零陵來稱戎昱使君席上有善歌者襄陽公遽命召焉戎使君不敢違命逾月而至及至令唱歌歌乃戎使君送伎之什也公曰丈夫不能立功業為異代之所稱豈有奪人姬愛為已之嬉娛遂多以繒帛贈行手書遜謝於零陵之守焉雲谿子曰王敦驅女樂以給軍士楊素歸德言妻臨財莫貪於色不恡者罕矣時人用為雅談厯觀相國挺特英雄未有于襄陽公者也戎使君詩曰寶鈿香娥翡翠裙粧成掩泣欲行雲殷勤好取襄王意莫向陽臺夢使君出雲溪友議武元衡武黄門之西川大宴從事楊嗣復狂酒逼元衡大觥不飲遂以酒沐之元衡拱手不動沐訖徐起更衣終不令散宴出乾􅍧子李紳李相紳鎭淮南張郎中又新罷江南郡素與李隙事具别錄時於荆溪遇風漂沒二子悲慼之中復懼李之讎已投長牋自首謝李深憫之復書曰端溪不讓之詞愚罔懐怨荆浦沈淪之禍鄙實憫然既厚遇之殊不屑意張感涕致謝釋然如舊交與張宴飲必極歡醉張嘗為廣陵從事有酒妓嘗好致情而終不果納至是二十年猶在席目張悒然如將涕下李起更衣張以指染酒題詞盤上妓深曉之李既至張持盃不樂李覺之即命妓歌以送酒遂唱是詞曰雲雨分飛二十年當時求夢不曾眠今來頭白重相見還上襄王玳瑁筵張醉歸李令妓隨去出本事詩又劉尚書禹錫罷和州為主客郎中集賢學士李紳罷鎭在京慕劉名嘗邀至第中厚設飲饌酒酣命妙妓歌以送之劉於座上賦詩曰䰀鬌梳頭宫様粧春風一曲杜韋娘司空見慣渾間事斷盡江南刺史腸李因以妓贈之䰀鬌字亦作浮喧並上聲古今注言即墮馬之遺像出本事詩盧攜故相盧攜為監察日御史中丞歸仁紹初上日傳語攜曰昔自淛東推事迴鞴袋中何得有綾四十疋請出臺後攜官除洛陽縣令㝷改鄭州刺史以諫議徵入至京除兵部侍郎入相自洛陽入相一百日數日問何不見歸侍郎或對云相公大拜請假攜即除仁紹兵部尚書人情大洽也出聞竒錄歸崇敬歸崇敬累轉膳部郎中充新羅冊立使至海中流波濤迅急舟船壊漏衆咸驚駭舟人請以小艇載崇敬曰舟人凡數十百我豈獨濟逡巡波濤稍息舉舟竟免為害出談賓錄夏侯孜夏侯孜有王生與孜同在舉塲王生有時價孜且不侔矣嘗落第偕遊於京西鳯翔連帥館之一日從事有宴召焉酣從事以骰子祝曰二秀才明年若俱得登第當擲堂印王生自負才雅如有得色怒曰吾誠淺薄與夏侯孜同年乎不悅而去孜及第累官至宰相王生竟無所聞孜在蒲津王生之子不知其故偶獲孜與父平昔所嘗來往事禮札十數幅皆孜手迹也欣然掣之以謁孜孜既見問其所欲一以依之即召諸從事以話其事出玉泉子陳敬瑄陳太師敬瑄雖濫升重位而頗有偉量自鎭西川日乃委政事於幕客委軍旅於護戎日食蒸犬一頭酒一壺一月六設曲宴即自有平生酒徒五人狎昵焦菜一盌破三十千常有告設吏偷錢拂其牒而不省營妓玉兒者太師賜之巵酒拒而不飲乃誤傾潑於太師汚頭面遽􅁸更衣左右驚憂立候玉兒為虀粉更衣出却坐又以酒賜之玉兒請罪笑而恕之其寛裕率皆此𩔖出北夢瑣言葛從周梁葛侍中從周鎮兖日嘗遊從此亭公有㕔頭甲者年壯未壻有神彩善騎射膽力出人偶因白事葛公召入時諸姬妾並侍左右内有一愛姬乃國色也專寵得意常在公側甲窺見愛姬目之不已葛公有所顧問至于再三甲方流眄於殊色竟􅁯其對答公但俛首而已既罷公微哂之或有告甲者甲方懼但云神思迷惑亦不記憶公所處分事數日之間慮有不測之罪公知其憂甚以温顏接之未幾有詔命公出征拒唐師於河上時與敵決戰交鋒數日敵軍堅陣不動日暮軍士飢渴殆無人色公乃召甲謂之曰汝能陷此陣否甲曰諾即攬轡超乘與數十騎馳赴敵軍斬首數十級大軍繼之唐師大敗及葛公凱旋乃謂愛姬曰大立戰功宜有酬賞以汝妻之愛姬泣涕辭命公勉之曰為人之妻可不愈於為人之妾耶令具飾資粧其直數千緡召甲告之曰汝立功於河上吾知汝未婚今以某妻兼署列職此女即所目也甲固稱死罪不敢承命公堅與之乃受噫古有絶纓盜馬之臣豈逾於此葛公為梁名將威名著於敵中河北諺曰山東一條葛無事莫撩撥云出玉堂閒話太平廣記卷一百七十七
