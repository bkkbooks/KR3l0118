body:
  text: 太平廣記卷一百六十定數十五秀師言記李行脩灌園嬰女朱顯侯繼圖秀師言記唐崔晤李仁鈞二人中外弟兄崔年長於李在建中末偕來京師調集時薦福寺有僧神秀曉隂陽術得供奉禁中會一日崔李同詣秀師師泛叙寒温而已更不開一語别揖李於門扇後曰九郎能惠然獨賜一宿否小僧有情曲欲陳露左右李曰唯唯後李特赴宿約饌且豐潔禮甚謹敬及夜半師曰九郎今合選得江南縣令甚稱意從此後更六年攝本府糺曹斯乃小僧就刑之日監刑官人即九郎耳小僧是吳兒酷好瓦棺寺後松林中一段地最髙敞處上元佳境盡在其間死後乞九郎作窣堵波梵語浮圖於此為小師藏骸骨之所李徐曰斯言不謬違之如皎日秀泫然流涕者良久又謂李曰為余寄謝崔家郎君且崔只有此一政官家事零落飄寓江徼崔之孤終得九郎殊力九郎終為崔家女壻祕之祕之李詰旦歸旅舍見崔唯説秀師云某説終為兄之女壻崔曰我女縱薄命死且何能嫁與田舍老翁作婦李曰比昭君出降單于猶是生活二人相顧大笑後李補南昌令到官有能稱罷攝本府糺曹有驛逓流人至州坐洩宫内密事者遲明宣詔書宜付府笞死流人解衣就刑次熟視監刑官果李糺也流人即神秀也大呼曰瓦棺松林之請子勿食言秀既死乃掩泣請吿捐俸賃扁舟擇幹事小吏送尸柩於上元縣買瓦棺寺松林中地壘浮圖以葬之時崔令即棄世已數年矣崔之異母弟曄㩦孤幼來于髙安曄落拓者好逺游惟小妻殷氏獨在殷氏號太乗又號九天仙也殷學秦箏於常守堅盡傳其妙䕶食孤女甚有恩意會南昌軍伶能箏者求丐髙安亦守堅之弟子故殷得見之謂軍伶曰崔家小娘子容德無比年已及笄供奉與把取家狀到府日求秦晉之匹可乎軍伶依其請至府以家狀厯抵士人門曾無影響後因謁鹽鐵李侍御即李仁鈞也出家狀於懷袖中鋪張几案上李憫然曰余有妻喪已大朞矣待余飢飽寒燠者頑童老媪而已徒增余孤生半死之恨蚤夜往來于心矧崔之孤女實余之表姪女也余視之等於女弟矣彼亦視余猶兄焉徵曩秀師之言信如符契納為繼室余固崔兄之夙眷也遂定婚崔氏出異聞錄李行脩故諫議大夫李行脩娶江西廉使王仲舒女貞懿賢淑行脩敬之如賔王氏有幼妹嘗挈以自隨行脩亦深所鞠愛如已之同氣元和中有名公與淮南節度李公鄘論親諸族人在洛下時行脩罷宣州從事寓居東洛李家吉期有日固請行脩為儐是夜禮竟行脩昏然而寐夢已之再娶其婦即王氏之幼妹行脩驚覺甚惡之遽命駕而歸入門見王氏晨興擁膝而泣行脩家有舊使蒼頭性頗兇横往往忤王氏意其時行脩意王氏為蒼頭所忤乃罵曰還是此老奴欲杖之尋究其由家人皆曰老奴於厨中自説五更作夢夢阿郎再娶王家小娘子行脩以符已之夢尤惡其事乃强喻王氏曰此老奴夢安足信無何王氏果以疾終時仲舒出牧吳興及凶問至王公悲慟且極遂有書疏意託行脩續親行脩傷悼未忘固阻王公之請有祕書衛隨者即故江陵尹伯玉之子有知人之鑒言事屢中忽謂行脩曰侍御何懷亡夫人之深乎如侍御要見夫人奚不問稠桑王老後二三年王公屢諷行脩託以小女行脩堅不納及行脩除東臺御史是歳汴人李介逐其帥詔徵徐泗兵討之道路使者星馳又大掠馬行脩緩轡出闗程次稠桑驛已聞敇使數人先至遂取稠桑店宿至是日迨曛暝往逆旅間有老人自東而過店之南北爭牽衣請駐行脩訊其由店人曰王老善錄命書為鄉里所敬行脩忽悟衛祕書之言密令召之遂説所懷之事老人曰十一郎欲見亡夫人今夜可也乃引行脩使去左右屣屨由一徑入土山中又陟一坡近數仞坡側隱隱若見叢林老人止于路隅謂行脩曰十一郎但於林下呼妙子必有人應應即答云傳語九娘子今夜暫將妙子同看亡妻行脩如王老教呼於林間果有人應仍以老人語傳入有頃一女子出行年十五便云九娘子遣隨十一郎去其女子言訖便折竹一枝跨焉行脩觀之迅疾如馬須臾與行脩折一竹枝亦令行脩跨與女子並馳依依如抵西南行約數十里忽到一處城闕壯麗前經一大宫宫有門仍云但循西廊直北從南第二院則賢夫人所居内有所覩必趨而過慎勿怪行脩心記之循西廊見朱裏緹幕下燈明其内有横眸寸餘數百行脩一如女子之言趨至北廊及院果見行脩十數年前亡者一青衣出焉迎行脩前拜乃齎一榻云十一郎且坐娘子續出行脩比苦肺疾王氏嘗與行脩備治疾皂莢子湯自王氏之亡也此湯少得至是青衣持湯令行脩啜焉即宛是王氏手煎之味言未竟夫人遽出涕泣相見行脩方欲申離恨之久王氏固止之曰今與君幽顯異途深不願如此貽某之患茍不忘平生但得納小妹鞠養即於某之道盡矣所要相見奉託如此言訖已聞門外女子呌李十一郎速出聲甚切行脩食卒而出其女子且怒且責措大不别頭腦宜速返依前跨竹枝同行有頃却至舊所老人枕塊而寐聞行脩至遽起云豈不如意乎行脩答曰然老人曰須謝九娘子遣人相送行脩亦如其教行脩困憊甚因問老人曰此等何哉老人曰此原上有靈應九子母祠耳老人行引行脩却至逆旅壁釭熒熒􅌴馬啖芻如故僕夫等昏憊熟寐老人因辭而去行脩心憒然一嘔所飲皂莢子湯出焉時王公已移鎮江西矣從是行脩續王氏之婚後官至諫議大夫出續定命錄灌園嬰女頃有一秀才年及弱冠切於婚娶經數十處託媒氏求問竟未諧偶乃詣善易者以決之卜人曰伉儷之道亦繫宿緣君之室始生二歳矣又問當在何州縣是何姓氏卜人曰在滑州郭之南其姓某氏父母見灌園為業只生一女當為君嘉偶其秀才自以門第才望方求華族聞卜人之言懷抱鬱怏然未甚信也遂詣滑質其事至則於滑郭之南尋訪果有一蔬圃問老圃姓氏與卜人同又問有息否則曰生一女始二歳矣秀才愈不樂一日伺其女嬰父母出外遂就其家誘引女嬰使前即以細針內於䪿中而去尋離滑臺謂其女嬰之死矣是時女嬰雖遇其酷竟至無恙生五六歳父母俱喪本鄉縣以孤女無主申報廉使廉使即養育之一二年間廉使憐其㸃慧育為己女恩愛備至廉使移鎮他州女亦成長其問卜秀才已登科第兼厯簿官與廉使素不相接因行李經由投刺謁廉使一見慕其風采甚加禮遇問及婚娶答以未婚廉使知其衣冠子弟且慕其為人乃以幼女妻之潛令道達其意秀才欣然許之未幾成婚廉使資送甚厚其女亦有殊色秀才深過所望且憶卜者之言頗有責其謬妄耳其後每因天氣隂晦其妻輙患頭痛數年不止為訪名醫醫者曰病在頂腦間即以藥封腦上有頃内潰出一針其疾遂愈因潛訪廉使之親舊問女子之所出方知圃者之女信卜人之不紿也襄州從事陸憲嘗話此事出玉堂閒話朱顯射洪簿朱顯頃欲婚郫縣令杜集女甄定後值前蜀選入宫中後咸康歸命顯作掾彭州散求婚媾得王氏之孫亦宫中舊人朱因與話昔欲婚杜氏嘗記得有通婚㢠廻書云但慙南院之貧曷稱東牀之美王氏孫乃長歎曰某即杜氏王氏冒稱自宫中出後無所託遂得王氏收某朱顯悲喜夫妻情義轉重也出玉溪編事侯繼圖侯繼圖尚書本儒素之家手不釋卷口不停吟秋風四起方倚檻於大慈寺樓忽有木葉飄然而墜上有詩曰拭翠斂雙蛾為鬱心中事搦管下庭除書成相思字此字不書石此字不書紙書向秋葉上願逐秋風起天下有心人盡解相思死後貯巾篋凡五六年旋與任氏為婚嘗念此詩任氏曰此是書葉詩時在左綿書争得至此侯以今書辨驗與葉上無異也出玉溪編事太平廣記卷一百六十
