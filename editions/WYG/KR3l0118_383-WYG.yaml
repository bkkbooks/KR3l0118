body:
  text: 太平廣記卷三百八十三宋李昉等編再生九索盧貞琅邪人胡勒顔畿餘杭廣曲阿人賀瑀食牛人邱友庾申李除張導石長和古元之索盧貞北府索盧貞者本中郎荀羡之吏也以晉太元五年六月中病亡經一宿而蘇云見羡之子粹驚喜曰君算未盡然官須得三將故不得便爾相放君若知有幹㨗如君者當以相代盧貞即舉龔頴粹曰頴堪事否盧貞曰頴不復下已粹初令盧貞疏其名縁書非鬼用粹乃索筆自書之盧貞遂得出忽見一曽鄰居者死已七八年矣為太山門主謂盧貞曰索都督獨得歸耶因囑盧貞曰卿歸為語我婦我未死時埋萬五千錢於宅中大牀下我乃本欲與女市釧不意奄終不得言於妻女也盧貞許之及蘇遂使人報其妻已賣宅移居武進矣固往語之仍告買宅主令掘之果得錢如其數焉即遣其妻與女市釧尋而龔頴亦亡時果共竒其事出幽明録瑯邪人瑯邪人姓王忘名居錢塘妻朱氏以太元九年病亡有三孤兒王復以其年四月暴死時有二十餘人皆烏衣見録去到朱門白壁狀如宫殿吏朱衣素帶𤣥冠介幘或所被著悉珠玉相連結非世中儀服復將前見一人長大所著衣狀如雲氣王向叩頭自説婦已亡餘孤兒尚小無相奈何便流涕此人為之動容云汝命自應來為汝孤兒特與三年之期王訴云三年不足活兒左右一人語云俗尸何癡此間三年是世中三十年因便送出又活三十年出幽明録胡勒湖熟人胡勒以隆安三年冬亡三宿乃蘇云為人所録赭土封其鼻以印印之將至天門外有三人從門出曰此人未應到何故來且倮身無衣不堪驅使所録勒者云下土所送已攝來到當受之勒鄰人張于載死已經年見在門上為亭長勒苦訴之于載入内出語勒已語遣汝便可去於是見人以杖挑其鼻土印封落地恍惚而還見有諸府舍門或向東或向南皆白壁赤柱禁衛嚴峻始到門時遙見于載叔文懐在曹舍料理文書文懐素彊聞勒此言甚不信之後百餘日果亡勒今為縣吏自說病時悉脫衣在被中及魂爽去實倮身也出廣異記顔畿晉咸寧中琅邪顔畿字世都得病就醫張瑳死於瑳家家人迎喪旐每繞樹不可解乃託夢曰我夀命未應死但服藥太多傷我五臟耳今當復活慎無葬我乃開棺形骸如故微有人色而手爪所刮摩棺板皆傷漸有氣急以綿飲瀝口能咽飲食稍多能開目不能言語十餘年家人疲於供護不復得操事其弟宏都絶棄人事躬自侍養以後便衰劣卒復還死也出搜神記餘杭廣晉升平末故章縣老公有一女居深山餘杭廣求為婦不許公後病死女上縣買棺行半道逢廣女具道情事女因曰窮逼君若能往家守父屍須吾還者便為君妻廣許之女曰我欄中有猪可為殺以飴作兒廣至女家但聞屋中有拚掌欣舞之聲廣披離見衆鬼在堂共捧弄公尸廣把杖大呼入門羣鬼盡走廣守尸取猪殺至夜見尸邊有老鬼伸手乞肉廣因捉其臂鬼不復得去持之愈堅但聞戸外有諸鬼共呼云老奴貪食至此甚快廣語老鬼殺公者必是汝可速還精神我當放汝汝若不還者終不置也老鬼曰我兒等殺公耳即喚鬼子可還之公漸活因放老鬼女載棺至相見驚悲因娶女為婦出幽明録曲阿人景平元年曲阿有一人病死見父於天上父謂曰汝算録正餘八年若此限竟死便入罪謫中吾比欲安處汝職局無缺者唯有雷公缺當啟以補其職即奏按入内便得充此任令至遼東行雨乗露車牛以水東西灌灑未至於中路復被符至遼西事畢還見父苦求還去不樂處職父遣去遂得蘇活出幽明録賀瑀㑹稽山隂賀瑀字彦琚曽得疾不知人惟心下尚温居三日乃蘇云吏將上天見官府府君居處甚嚴使人將瑀入曲房房中有層架其上有印及劒使瑀取之印雖意所好短不及上層取劒以出問之子何得也瑀曰得劒吏曰恨不得印可以驅䇿百神今得劒惟使社公耳疾既愈每行即社公拜謁道下瑀深惡之出録異傳食牛人桓𤣥時牛大疫有一人食死牛肉因得病亡云死時見人執録將至天上有一貴人問云此人何罪對曰此坐食疫死牛肉貴人云今須牛以轉輪肉以充百姓食何故復殺之推令還既更生具説其事於是食牛肉者無復有患出幽明録邱友烏程邱友嘗病死經一日活云將去上天入大􅅟舍見一人著紫幘坐或告友爾祖邱孝伯也今作主録告人言友不應死使人遣之友得還去出門見其祖父母繫一足在門外樹後一月亡出録異傳庾申潁川庾某宋孝建中遇疾亡心下猶温經宿未殯忽然而寤説初死有兩人黒衣來收縳之驅使前行見一大城門樓髙峻防衛重複將庾入㕔前同入者甚衆㕔上一貴人南向坐侍直數百呼為府君府君執筆簡閲到者次至庾曰此人算尚未盡催遣之一人階上來引庾出至城門語吏差人送之門吏云須覆白然後得去門外一女子年十五六容色閒麗曰庾君幸得歸而留停如此是門司求物庾云向被録輕來無所齎持女脱左臂三隻金釧投庾云并此與之庾問女何姓云姓張家在茅渚昨霍亂亡庾曰我臨亡遣齎五千錢擬市材若更生當送此錢相報女曰不忍見君艱厄此我私物不煩還家中也庾將釧與吏吏受竟不覆白便差人送去庾與女别女長歎泣下庾既恍惚蘇至茅渚尋求果有張氏新亡少女云出還異記李除襄陽李除中時氣死其婦守尸至夜三更崛然起坐摶婦臂上金釧甚遽婦因助脱既手執之還死婦伺察之至曉心中更暖漸漸得蘇既活云吏將去比伴甚多見有行貨得免者乃許吏金釧吏令還故歸取以與吏吏得釧便放令還見吏取釧去不知猶在婦衣内婦不敢復著依事呪埋出續捜神記張導齊武帝建元元年太子左率張導字進賢少讀書老餌术每食不過二味衣服不修装既得疾謂妻朱氏曰我死後棺足周身歛我服但取今著者慎勿改易及卒子乾護欲奉遺㫖朱氏曰汝父雖遺言如此不忍依其言因别制四時服而歛焉歛後一月日家人忽聞棺中呼乾護之聲人皆一時驚懼及至啓棺見導開目乃扶出於舊寢翌日坐責妻曰我平生素儉奈何違言易我故服謂子曰復歛我故服乾護乃取故衣歛之歛後又曰但安棺中後三日看之當儼然即葬如目開必重生矣後三日乾護等啟棺見眼開人皆驚喜扶出遂生謂子曰地府以我平生修善著徳放再生二十年導後位至建徳令而卒出窮神秘苑石長和趙石長和者趙國髙邑人也年十九病月餘卒家貧未及殯殮經四月而蘇説初死時東南行見二人治道在長和前五十歩長和行有遲疾二人亦隨緩速常五十歩而道之兩邊􅁄刺森然如鷹爪見人甚衆羣走􅁄中身體傷裂地皆流血見長和獨行平道俱歎息曰佛子獨行大道中前至瓦屋御樓可數千間屋甚髙上有一人形面壯大著皂袍四縫臨窓而坐長和拜之閣上人曰石君來耶一别二千餘年長和便若憶得此别時也相識中有馬放孟丞夫妻先死已積嵗閣上人曰君識孟丞否長和答曰識閣上人曰孟丞生時不能精進今恒為我司掃除之役孟妻精進居處甚樂舉手指西南一房曰孟妻在此也孟妻開窓見長和厚相慰問遍訪其家中大小安否曰石君還時可更見過當因附書也俄見孟丞執箒提箕自閣西來亦問家消息閣上人曰聞魚龍超積進為信耳何所修行長和曰不食魚肉酒不經口恒轉尊經救諸疾痛閣上人曰所傳不妄也語久之閣上人問都籙主者審案石君籙勿謬濫也主者按籙餘三十年閣上人曰君欲歸否長和對願歸乃敕主者以車騎兩吏送之長和拜辭上車而歸前所行道更有傳館吏民飲食儲峙之具倐忽至家惡其尸不欲附之於屍頭立見其亡妹於後推之踣屍面上因得蘇法道人山時未出家聞長和所説遂定入道之志法山者咸和時人也出㝠祥記古元之後魏尚書令古弼族子元之少養於弼因飲酒而卒弼憐之特甚三日殮畢追思欲與再别因命斵棺開已却生矣元之云當昏醉忽然如夢有人沃冷水於體仰視乃見一衣冠絳裳蜺帔儀貌甚俊顧元之曰吾乃古説也是汝逺祖適欲至和神國中無人擔囊侍從因來取汝即令負一大囊可重一鈞又與一竹杖長丈二餘令元之乗騎隨後飛舉甚速常在半天西南行不知里數山河逾逺歘然下地已至和神國其國無大山髙者不過數十丈皆積碧珉石際生青彩簵篠異花珍果軟草香媚好禽嘲􅑜山頂皆平正如砥清泉迸下者三二百道原野無凡樹悉生百果及相思石榴之輩每果樹花卉俱發實色鮮紅翠葉於香叢之下紛錯滿樹四時不改唯一嵗一度暗換花實更生新嫩人不知覺田疇盡長大瓠瓠中實以五榖甘香珍美非中國稻粱可比人得足食不假耕種原隰滋茂蕕􅁾不生一年一度樹木枝榦間生五色絲纊人得隨色收取任意絍織錦纎羅不假蠶杼四時之氣常熙熙和淑如中國二三月無蚊虻蟆蟻蝨蜂蝎地虺守宫蜈蚣蛛蠓之蟲又無梟鴟鵶鷂鴝鵒蝙蝠之屬及無虎狼豺豹狐狸驀駮之獸又無猫䑕猪犬擾害之𩔖其人長短妍蚩皆等無有嗜欲愛憎之者人生二男二女為鄰則世世為婚姻笄年而嫁二十而娶人夀一百二十中無夭折疾病瘖聾跛躄之患百嵗已下皆自記憶百嵗已外不知其夀幾何夀盡則歘然失其所在雖親族子孫皆忘其人故常無憂戚每日午時一食中間唯食酒漿果實耳餐亦不知所化不置溷所人無私積囷倉餘糧棲畝要者取之無灌園鬻蔬野菜皆足人食十畝有一酒泉味甘而香國人日相􅂝遊覽歌詠陶陶然暮夜而散未嘗昏醉人人有婢僕皆自然謹慎知人所要不煩促使隨意屋室靡不壯麗其國六畜唯有馬馴極而駿不用芻秣自食野草不近積聚人要乗則乗乗訖而却放亦無主守其國千官皆足而仕官不知身之在事雜於下人以無職事操斷也雖有君王而君不自知為君雜於千官以無職事昇貶故也又無迅雷風雨其風常微輕如煦襲萬物不至於搖落其雨十日一降降必以夜津潤條暢不有淹流一國之人皆自相親有如戚屬各各明恵無市易商販之事以不求利故也古説既至其國顧謂元之曰此和神國也雖非神仙風俗不惡汝迴當為世人説之吾既至此迴即别求人負囊不用汝矣因以酒令元之飲飲滿數廵不覺沉醉既而復醒身已活矣自是元之疎逸人事都忘宦情遊行山水自號知和子後竟不知其所終也出𤣥怪記太平廣記卷三百八十三
