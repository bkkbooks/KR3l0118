body:
  text: 太平廣記卷二百二十二相二裴光庭安祿山孫思邈孫生衡相馬祿師李含章尚衡桞芳陳昭盧齊卿梁十二馮七馬生裴光庭姚元崇開元初為中書令有善相者来見元崇令密於朝堂視諸官後當為宰輔者見裴光庭白之時光庭為武官姚公命至宅與語復使相者於堂中埀簾重審焉光庭既去相者曰定矣姚公曰宰相者所以佐天成化非其人莫可居之向者與裴君言非應務之士詞學又寡寧有其祿乎相者曰公之所云者才也僕之所述者命也才與命固不同焉姚黙然不信後裴公果為宰相數年及在廟堂亦稱名相出定命録安祿山𤣥宗御勤政樓下設百戲坐安祿山於東閒觀看肅宗諫曰歴觀今古無臣下與君上同坐閲戲者𤣥宗曰渠有異相我欲禳之故耳又嘗與之夜宴祿山醉臥化為一猪而龍頭左右遽告帝曰渠豬龍無能為也終不殺之祿山初為韓公張仁願帳下走使之吏仁願常令祿山洗脚仁願脚下有黑子祿山因洗而竊窺之仁願顧笑曰黑子吾貴相也汝獨竊視之豈汝亦有之乎祿山曰某賤人也不幸兩足皆有之比將軍者色黑而加大竟不知其何祥也仁願觀而異之益親厚之約為義兒而加寵薦焉出定命録孫思邈孫思邈年百餘歳善醫術謂髙仲舒曰君有貴相當數政刺史若為齊州刺史邈有一兒作尉事使君雖合得杖君當憶老人言願放之後果如其言已剝其衣訖忽記憶遂放出定命録孫生有孫生者不載其名善相人因至睦州郡守令遍相僚吏時房琯為司户崔渙為萬年尉貶桐廬縣丞孫生曰此二公位至台輔然房神噐大寳合在掌握中崔後為杭州刺史某雖不覩然尚蒙其恩惠既後房以齎册文自蜀至􅂕武授肅宗崔果為杭州下車訪生則已亡殁旬日矣因署其子為牙將以綵帛贈恤其家出廣德神異録衡相開元中有相者不知姓名自言衡山来人謂之衡相在京舍宣平里時李林甫為太子諭德往見之入門則鄭少㣲嚴杲已在中庭相者引坐謂李公曰自僕至此見人衆矣未有如公貴者也且國家以刑法為重則公典司宼之職朝廷以銓管為先則公居冢宰之任然又秉丹青之筆當節制之選加以列茅分土窮榮極盛主㤙綢繆人望浹洽兼南省之官秩增數四握中樞之務載盈二九縉紳仰威􅀺庻瞻惠將古所未有也顧嚴鄭曰預聞此者非不幸也公二人宜加禮􅆢否則悔吝生矣時嚴鄭各負才名李猶聲譽未逹二公有轥轢之心及聞相者言以為甚不然唯唯而起更不復問李因辭去後李公拜中書鄭時已為刑部侍郎因述往事謂鄭曰曩者宣平相人咸以􅂽唐之説乃㣲有中者無何鄭出為岐州刺史與所親話其事未朞又貶為萬州司馬嚴自郎中亦牧逺郡出定命録又李林甫少孤為元氏姨所育住在伊川時林甫年十歳與諸兒戲于路旁有老父歎而目焉人問之老父曰富貴誠不自知指李公曰此童後當為中書令凡二十年所歎與凡小戲誰辨也出定命録馬祿師武功馬祿師善相長安主簿蕭璿與縣尉李嶠李全昌同詣求決馬生云三人俱貴逹大李少府位極人臣聲名振耀南省官無不虛任三入中書小李少府亦有清資得五品已上要官位終卿監蕭主簿中年湮沈晚逹亦大富貴從今後十年家有大難兄弟並流唯公與一弟獲全又十年之後方却得官遇大李少府在朝堂日當得引用小李少府入省官時為其斷割後璿離長安任作祕書郎則天既貴皇后王氏破滅蕭璿是其外姻舉家流竄兄弟六人配向嶺南唯璿與弟瑗配遼東無何有處置流移使出嶺南者俱死唯遼東者獲全兄弟二人因亡命十餘年至神龍初方蒙洗滌其時李嶠作相於街中忽逢璿使人問是蕭祕書􅁘因謂之曰公豈忘武功馬生之言乎於是擢用時小李少府作刑部員外判還其家蕭公竟歴中外清要位至崇班三品官十餘政出定命録李含章崔圓㣲時欲舉進士於魏縣見市令李含章云君合武出身官更不停直至宰相開元二十三年應將帥舉科又於河南府充鄉貢進士其日正於福唐觀試遇敕下便於試場中喚將拜執㦸參謀河西軍事應制時與越州剡縣尉竇公衡同場並坐親見其事後官更不停不踰二十年拜中書令趙國公食實封五百户又圓當作司勲員外釋服往見會昌寺克慎師師笑云人皆自臺入省公乃自省入臺從此常合在鎗槊中行後當大貴無何為刑部員外兼侍御史充劒南節度留後入劒門後每行常有兵戈未逾一年便致勲業崔初入蜀常於親知自説如此出定命録尚衡御史中丞尚衡童幼之時遊戲曾脱其碧衫唯著紫衫有善相者見之曰此兒已後當亦脱碧著紫矣後衡為濮陽丞遇安祿山反守節不受賊官將軍某乙使衡將緋衣魚袋差攝一官衡不肯受曰吾當脱碧著紫此非吾衣曾未旬月即有敕命改官賜紫於是脱碧著紫衡自又云當作七十政今歴十餘政已為中丞大夫矣出定命録柳芳柳芳嘗應進士舉累歳不及第詣朝士宴坐客八九人皆朱紱亦有畿赤官芳最居坐末又衣服麤故客咸輕焉有善相者衆情屬目獨謂芳曰柳子合無兄弟姊妹無莊田資産孑然一身羇旅辛苦甚多後二年當及第後祿位不歇一座之客夀命官祿皆不如君諸客都不之信後二年果及第歴挍書郎畿尉丞遊索於梁宋間遇太常博士有闕工部侍郎韋述知其才通明譜第又識古今儀注遂舉之於宰輔恩敕除太常博士時同座客亡者已六七人矣出定命録陳昭僕射房琯相國崔渙並曾貶任睦歙州官時有婺州人陳昭見之云後二公並為宰相然崔公為一大使来江南及至德初上皇入蜀房崔二公同時拜相崔後為選補使巡按江東至蘇杭間崔公自説出定命録盧齊卿盧齊卿有知人之鑒年六七歳時性慢率諸叔父每令一奴人隨後至十五六好夜起於後園空庭中坐奴見火炬甚多侍衛亦衆有人持繖葢葢之以告叔父叔父以為妖精怪媚有巫者敎以艾灸在手中心袁天綱見之大驚異曰此人夲合知三世事緣灸掌損遂遣滅却兩世事只知當世事從此每有所論無不中者官至祕書監張嘉貞之任宰相也有人訴之自慮左貶命齊卿視焉不為決定因其入朝乃書笏上作台字令張見之張以為不離台座及敕出貶台州刺史張守珪河北人事縣尉梁萬頃萬頃令捉馬失衣襟遂撻一頓因此發憤從軍為幽州一果毅齊卿常引對坐云公後當富貴秉節鉞守珪踧踖不意如此下階拜盧公未離幽州而守珪為將軍節度矣梁萬頃為河南縣尉初考滿守珪喚與相見萬頃甚懼守珪都不恨之謂曰向者不因公責怒某亦不發憤自逹乃遺其財物使療病出定命録梁十二有梁十二者名知人至宋州刺史司馬詮作書薦與蘇州刺史李無言云梁十二今之管輅李無言遣日暮引入宅無言乃著黄衣衫令一客著紫替作無言與相抵對梁子謂客云向聞公語聲未有官祿又聞黄衣語乃是三品今章服不同豈看未審無言信之乃以實對云某昨有事恐被宣慰使惡奏君視如何梁云公即合改得上州刺史後果改為睦州刺史無言贈錢二百貫梁子云公至彼州必得重厄某為公作一法禳之公當須嗔責某乙云是妄語人鞭背十下仍不得令妻子知也無言再三不可梁子再三以請無言閔黙而從之明早李公當衙決梁子十下小蒼頭走報其妻無言入門妻云何以打梁子無言恨云忘却他不遣家内知俄而梁子叩鈴請見無言曰公何以遣妻子知厄不免矣公既彊與某二百千文有一事以報公德公厄雖不免然令公得二千貫以充家資取之必無事無言在州果取得二千貫錢而死梁十二又謂丹徒主簿盧惟雅云從此得通事舍人如其言後於京見之云至某年財物莊宅合破散公當與某五十千文某敎公一言即免盧不之信不與是錢至某年盧果因蒱博賭賽莊宅等並盡出定命録馮七進士李湯赴選欲求索入京至汴州有日者馮七謂之曰今年得留東南三千里外授一尉李不信曰某以四選得留官不合惡挍書正字雖一兩資亦望得之奈何一尉馮曰君但記之從此更作一縣尉即騎馬不住矣又問李君婚未李云未婚有一兒母在家馮曰君從今便不復與相見矣李到京選得留屬祿山之亂不願作京官欲與挍正不受自索湖州烏程縣尉經一年亷使奏為丹陽尉遂充判官因乘官馬不住離亂之後道路隔絕果與兒母不復相見出定命録馬生天寳十四年趙自勤合入考有東陽縣瞽者馬生相謂云足下必不動縱去亦却来於此祿尚未盡後至三品著紫又云自六品即登三品自勤其年果不入考至冬有敕賜紫乾元二年九月馬生又來自勤初誑云龎倉曹家喚至則揑自勤頭骨云合是三品與趙使君骨法相似所言年夀并官政多少與前時所説並同也出定命録太平廣記卷二百二十二
