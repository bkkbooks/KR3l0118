body:
  text: 太平廣記卷一百十一報應十竺恵慶卞悦之張暢王𤣥謨釋道冏伏萬夀彭子喬釋慧和齊建安王毛徳祖李儒俊沈甲張達孫敬徳髙荀史雋東山沙彌徐善才杜智楷張氏許儼僧道憲成珪王琦竺恵慶宋沙門竺恵慶廣陵人也經行修明元嘉十二年荆揚大水恵慶將入廬山船至江而暴風忽起同旅已得依浦唯恵慶舫飄颺中江風疾浪湧唯待淪覆恵慶正心端意誦觀世音經洲際之人望見其舫迎飈截流如有數十人牽挽之者逕到其岸一舫全濟出法苑珠林卞悦之宋居士卞悦之濟陰人也作朝請居在潮溝行年五十未有子息婦為取妾復積載不孕將祈求繼嗣發願誦觀音經千遍其數垂竟妾即有娠遂生一男時即元嘉十四年也出㝠祥記張暢宋張暢常奉持觀音南譙之搆逆也暢不從王欲害之夜夢觀世音曰汝不可殺暢遂不敢害及王敗暢繫獄誦觀世音經千遍鏁寸寸斷獄司易之復斷吏白曰釋之出談藪王𤣥謨宋太原王𤣥謨爽邁不羣北征失律軍法當死夢人謂之曰汝誦觀世音千遍可得免禍謨曰命懸旦夕千遍何可得乃授云觀世音南無佛與佛有因與佛有緣佛法相緣常樂我情朝念觀世音暮念觀世音念念從心起念佛不離心既而誦滿千遍將就戮將軍沈慶之諫遂免厯位尚書金紫豫州刺史釋道冏姚秦沙門釋道冏𢎞始十八年師道懿遣至河南霍山采鍾乳與同道道朗等四人共行持炬深穴入且三里遇一深流横木而過冏最先濟後輩墜水而死時火又滅㝠然昏闇冏生念已盡慟哭而已猶固一心呼觀世音誓願若蒙出路供百人㑹表報威神經一宿而見小光烱然狀若螢火倐忽之間穴中盡明於是見路得出岩下由此信悟彌深屢覩靈異元嘉十九年臨川王作鎮廣陵請冏供養其年九月於西齋中作十日觀世音齋已得九日夜四更盡衆僧皆眠冏起禮拜謝欲坐禪忽見四壁有無數沙門悉半身出見一佛螺髻分明了了有一長人著平上幘布袴褶手把長刀貌極雄異捻香授道冏道冏時不肯受壁中沙門語云冏公可為受香以覆䕶主人俄而霍然無所復見當此之時都不見衆㑹諸僧唯覩置釋迦文行像而已出法苑珠林伏萬夀伏萬夀平昌人宋元嘉十九年在廣陵為衞府參軍乞假返州四更初涉江長波安流至中而風起如箭時又夜莫知所向萬夀先奉法唯一心歸命觀世音念無間倐爾與船中數人同覩北岸有光狀如村火喜曰此必是陽火也迴船趨之未旦而至問彼人皆云昨夜無燃火者於是方悟神力焉出法苑珠林彭子喬宋彭子喬者益陽縣人也任本郡主簿事太守沈文龍建元元年以罪被繫子喬少年嘗出家還俗後常誦觀世音經時文龍盛怒防械稍急必欲殺之子喬憂懼無復餘計唯至誠誦經至百餘遍疲而晝寢同繫者有十許人亦俱睡有湘西縣吏杜道榮亦繫在獄乍寐乍寤不甚得熟忽有􅀟白鶴集子喬屏風上有頃一鶴下至子喬邊時復覺如美麗人道榮起見子喬􅀟械脱在脚外而械㾗猶在焉道榮驚視子喬亦寤共視械咨嗟問道榮曰有所夢不答曰不夢道榮以所見説之子喬雖知必已尚慮獄家疑其欲叛乃取械著之經四五日而蒙釋放出法苑珠林釋慧和宋慧和沙門者京師衆造寺僧也元嘉之難和猶為白衣屬劉胡部下胡常遣將士數十人作諜東和亦預行行至鵲渚而值臺軍西上諜衆離散各逃草澤和得竄下至新林見野老衣服縷弊和乃以貌整袴褶易其衣提籃負擔若𩔖田人時諸遊軍捕此散諜視和形色疑而問之和答對謬畧因被笞掠登時見斬和自散走便恒誦念觀世音經至將斬時祈懇彌至既而軍人揮刃屢跌三舉三折並驚而釋之和於是出家遂成精業出法苑珠林齊建安王齊建安王患瘡念觀音不息夜夢見觀音手為傅藥明旦瘡愈也岀感應傳毛徳祖滎陽人毛徳祖初投江南偷道而過道逢虜騎所追伏在路側蓬蒿半身猶露分意受死合家念觀世音俄然雲起雨注得免死也岀辨正論李儒俊隊主李儒俊鎮虎牢為魏虜所圍危急欲降夜踰城出見賊縱横並卧儒俊乃一心念觀世音便過賊處趨空澤賊即隨來儒俊便入草未及藏伏賊掩至儒俊驚恐一心専念觀音經忽得馬馳去因此遂得脱出辨正論沈甲吳郡人沈甲被繫處死臨刑市中日誦觀音名號心口不息刀刃自斷因而被放一云吳人陸暉繫獄分死乃令家人造觀音像冀得免死臨刑三刀其刀皆折官問之故答云恐是觀音慈力及看像項上乃有三刀痕現因奏獲免出宣驗記張達張達有罪繫獄分當受死乃専念觀世音鏁械自脱因遂獲免終身齋戒出張氏傳孫敬徳東魏孫敬徳天平中定州募士奉釋教嘗造觀音像自加禮敬後為刼賊所引不勝拷楚忽夢一沙門令誦救生觀世音千遍執縛臨刑誦念數滿刀自折為三段膚頸不傷三易其刀終折如故所司以狀奏聞丞相髙歡表請免死及歸覩其家觀音像項有刃迹三敕寫其經布於世今謂髙王觀世音經自晉宋梁陳秦趙國觀音地藏彌勒彌陀稱名念誦得救者不可勝紀出㝠祥記髙荀滎陽髙荀年已五十為殺人被收鏁頓地牢分意必死同牢人云努力共念觀音荀云我罪至重甘心受誣何由可免同禁勸之曰始發心誓當捨惡行善専念觀音不離造次若得免脱願起五層浮圖捨身作奴供養衆僧旬日用心鉗鏁自解監司驚懼語荀云若佛神憐汝斬應不死臨刑之日舉刀刃斷奏得原免出宣驗記史雋史雋有學識奉道而慢佛常語人云佛是小神不足事也每見尊像恒輕誚之後因病脚攣種種祈福都無效驗其友人趙文謂曰經道福中第一可試造觀音像雋以病急如言鑄像像成夢觀音果得差出宣驗記東山沙彌隋開皇初有揚州僧忘其本名誦通湼槃自矜其業岐州東山下村中沙彌誦觀世音經二俱暴死同至閻羅王所乃處沙彌金髙座甚敬之處湼槃僧銀髙座敬心稍惰僧情大恨問沙彌住處既蘇從南來至岐州訪得沙彌具問所由沙彌云每誦觀音於别所衣浄衣燒名香咒願然後乃誦斯法不怠更無他術謝曰吾罪深矣所誦湼槃威儀不整身口不浄於今驗矣出法苑珠林徐善才唐武徳中醴泉縣人徐善才常修齋戒誦觀世音經逾千遍曾往京城延興寺修營功徳及還家道逢胡賊賊所掠漢人千百將向洪崖次第殺之善才知不免唯至心念觀音經當殺之時了不自覺至初夜方悟身在深澗樹枝上去岸三百餘尺以手摩項覺微痛而無傷漸下樹循澗南行可五六十里天漸曉去賊已逺得官路遂還家琬法師嘗説此事出法苑珠林杜智楷杜智楷曹州離狐人少好釋典不仕不娶被僧衣𨼆居太山以讀誦為事唐貞觀二十一年於山中還忽患疾垂死以袈裟覆體昏然如夢見老人及美女十數屢來相擾智楷端然不動漸相逼斥並云輿智楷擲置北澗裏遂總近前同執捉有攬著袈裟者忽齊聲念佛却後懴悔請為造阿彌陀佛誦觀音菩薩三十餘遍少間遂覺體上大汗即愈離狐今濟陰也出法苑珠林張氏陳𤣥範妻張氏精心奉佛恆願自作一金像終身供養有願莫從専心日久忽有觀世音金像連光五尺現髙座上衆歎其精感所致出辨正論許儼唐龍朔麟徳中京師永興坊許儼取魚為業後患疾㝠然若死身赤如火痛似火炙自云但見火車來燒身官府責取魚多遣生受罪已經數日乍生乍死親戚勸作功徳遂造觀音像兩軀仍令合家不食酒肉病遂差出法苑珠林僧道憲唐聖善寺僧道憲俗姓元氏開元中住持於江州大雲寺法侣稱之時刺史元某欲畫觀世音七座以憲練行委之勾當憲令畫工持齋潔已諸綵色悉以乳頭香代膠備極清浄元深嘉之事畢往預寧斫排造文殊堂排成將還忽然墮水江流湍急同侣求拯無由憲墮水之際便思念觀世音見水底有異光久而視之見所畫七菩薩立在左右謂憲曰爾但念南無菩薩憲頂禮如常猶知在水底懼未免死乃思計云念阿彌陀佛又念阿彌佛其七菩薩並來捧足將至水上衣服無所汚染與排相隨俱行四十餘里憲大寶初滅度今江州大雲寺七菩薩見在兼畫落水事云耳出廣異記成珪成珪者唐天寶初為長沙尉部送河南橋木始至揚州累遭風水遺失差衆揚州所司謂珪盜賣其木拷掠行夫不勝楚痛妄云破用揚州轉帖潭府時班景倩為潭府嚴察之吏也長沙府别將錢堂楊覲利其使與景倩左右搆成景倩使覲來收珪等覲至揚州以小枷枷珪陸路遞行至寧江方入船乃以連鏁鏁枷附於船梁四面悉皆釘塞唯開小孔出入飰食等珪意若至潭府必死發揚州便心念救苦觀世音菩薩恆一日一食或時不食但飲水清齋經十餘日至滁口夕暮之際念誦懇至其枷及鏁忽然開解形體蕭然無所累著伺夜深舟人盡卧珪乃拆所釘拔除出船背至覲房上呼曰楊覲汝如我何覲初驚起問何得至此珪曰當葬江魚腹中豈與汝輩成功耶因決意赴水初至潭底須㬰遇一浮木中有竪枝珪騎木抱得至水面中夜黑暗四顧茫然木既至潭底又復浮出珪意至心念觀世音乃漂然忽爾翻轉隨水中木而行知已至岸便蘆中潛伏又江邊多猛獸往來顧視亦不相害至明投近村村中為珪裝束送至滁州州官寮歎美為市驢馬糧食等珪便入京於御史臺申理初楊覲既失珪一時潰散覲因此亦出家焉出卓異記王琦唐王琦太原人也居榮陽自童孺不茹葷血大歴初為衢州司户性好善常持誦觀音經自少及長數患重病其於念誦無不差愈念誦之時必有異𩔖譎詭之狀來相觸惱以琦心正不能干初琦年九歳時患病五六日因不能言忽聞門外一人呼名云我來追汝因便隨去行五十里許至一府舍舍中官長大驚云何以誤將此小兒來即宜遣還旁人云凡召人來不合放去當合作使方可去爾官云有狗合死令琦取狗訴幼小不任獨行官令與使者同去中路使者授一丸與琦狀如毬子令琦擊狗家門狗出乃以擲之狗吞丸立死官云使畢可還後又遇病忽覺四支内有八十二人眉眼口鼻各有所守其在臂脚内者往來攻其血肉每至腕節之間必有相衝擊病悶不可忍琦問汝輩欲殺我耶答云為君理病何殺之有琦言若理病當致盛饌哺爾鬼等大喜叫肉中翌日為設食食畢皆去所病亦愈琦先畜一浄刀子長尺餘每念誦即持之及患天行恆置刀牀頭以自衞䕶後疾甚暗中乃力起念觀世音菩薩暗忽如晝見刀刃向上有僧來與琦偶坐問琦此是何刀琦云是殺魔刀僧遂奄滅俄有鐵鎚空中下擊刀累擊二百餘下鎚悉破碎而刀不損又見大鐵鍱水罐可受二百餘石覆向下有二大人執杵旁問琦君識此否琦答云不識人云此鐵鍱獄也琦云正要此獄禁魔鬼言畢並滅又見牀舁珍饌可百牀從門而出又見數百人皆炫服列在宅中因見其亡父手持一刀怒云無屋處汝其人一時潰散頃之疾愈乾元中在江陵又疾篤復至心念觀音遥見數百鬼乗船而至逺來飢餓就琦求食遂令家人造食施於庭中羣鬼列坐琦口中有二鬼躍出就坐食訖初云未了琦云非要衣耶鬼言正爾乃令家人造紙衣數十對又為緋綠等衫庭中焚之鬼著而散疾亦尋愈永泰中又病篤乃於燈下澄心誦多心經忽有一聲如鳥飛從坐處肉中寖淫向上因爾口呿不得合心念此必有魔相惱乃益澄定須臾如故復見牀前死屍胮脹有蛇大如甕兼諸鬼多是先識死人撩亂爍已琦閉目至心誦經二十四遍寂然而滅至三十九遍懈而獲寐翌日復愈又其妻李氏曾遇疾疫癘琦燈下至心為誦多心經得四五句忽見燈下有三人頭中間一頭是李氏近死之婢便聞李氏口中作噫聲因自扶坐李瞪目不能言但以手指東西及上下狀如見物琦令奴以長刀隨李所指斬之久乃寤云王三郎耶盖以弟呼琦琦問所指云何李云見窗中一人鼻長數尺復見牀前二物狀如駱駝又見屋上悉張朱簾幕皆被奴刀斫獲斷破一時消散琦却誦經四十九遍李氏尋愈也出廣異記太平廣記卷一百十一
