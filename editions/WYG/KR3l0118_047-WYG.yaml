body:
  text: 太平廣記卷四十七神仙四十七唐憲宗皇帝李球宋𤣥白許棲巖韋善俊唐憲宗皇帝唐憲宗好神仙不死之術元和五年内給事張惟則自新羅國廻云於海中泊山島間忽聞雞犬鳴吠似有烟火遂乘月閒步約及一二里則見花木樓臺殿閣金户銀關其中有數公子戴章甫冠衣紫霞衣吟嘯自若惟則知其異遂請謁公子曰汝何所從來惟則具言其故公子曰唐皇帝乃吾友也當汝旋去願為傳語俄而命一青衣捧出金龜印以授惟則乃置之於寳匣復謂惟則曰致意皇帝惟則遂持之還舟中廻顧舊路悉無踪跡金龜印長五寸上負黄金玉印面方一寸八分其曰鳳芝龍木受命無疆惟則至京師即具以事上進憲宗曰朕前生豈非仙人乎及覽金龜印歎異良久但不能諭其文耳因緘以紫泥玉鏁置於帳内其後往往見五色光可長丈餘是月寢殿前連理樹上生靈芝二株宛如龍鳯憲宗因歎曰鳯芝龍木寧非此兆乎時又有處士伊祁𤣥解縝髪童顔氣息香潔常乘一黄牝馬纔三尺髙不㗖芻粟但飲醇酎不施韁轡惟以青氊藉其背常遊厯青兖間若與人欵曲話千百年事皆如目擊帝知其異人遂令密詔入宫内館於九華之室設紫茭之席飲龍膏之酒紫茭席類茭葉光軟香静夏凉冬温龍膏酒黑如純漆飲之令人神爽此本烏弋山離國所獻也烏弋山離國已見班固西京傳也帝每日親自訪問頗加敬仰而𤣥解魯朴未嘗嫻人臣禮帝因問之曰先生春秋髙而顔色不老何也𤣥解曰臣家于海上種靈草食之故得然也即於衣間出三等藥實為帝種於殿前一曰雙麟芝二曰六合葵三曰萬根藤雙麟芝色褐一莖兩穗穗形如麟頭尾悉具其中有子如瑟瑟焉六合葵色紅而葉類於茙葵始生六莖其上合為一株共生十二葉内出二十四花花如桃花而一朶千葉一葉六影其成實如相思子萬根藤子一子而生萬根枝葉皆碧鈎連盤屈䕃一畝其狀類芍藥而蘂色殷紅細如絲髪可長五六寸一朶之内不啻干莖亦謂之絳心藤靈草既成人乃莫見而𤣥解請帝自采餌之頗覺神驗由是益加禮重焉遇西域有進美玉者一圓一方徑各五寸光彩凝冷可鑒毛髮時𤣥解方坐於帝前熟視之曰此一龍玉也一虎玉也驚而問曰何謂龍玉虎玉也𤣥解曰圓者龍也生於水中為龍所寳若投之於水必有霓虹出焉方者虎也生於巖谷為虎所寳若以虎毛拂之紫光迸逸而百獸攝服帝異其言遂令嘗之各如所説詢得玉之由使人曰一自漁者得一自獵者獲帝因命取龍虎二玉以錦囊盛之於内府𤣥解將還東海亟請於帝未許之遇宫中刻木作海上三山絲繪華麗間以珠玉帝元日與𤣥解觀之帝指蓬萊曰若非上仙朕無由得及是境𤣥解笑曰三島咫尺誰曰難及臣雖無能試為陛下一逰以探物𧰼妍醜即踴體於空中漸覺微小俄而入於金銀闕内左側連聲呼之竟不復有所見帝追思歎恨近成羸疹因號其山為藏真島每詰旦於島前焚鳯腦香以崇禮敬後旬日青州奏云𤣥解乘黄牝馬過海矣李球李球者燕人也寳厯二年與其友劉生遊五臺山山有風穴遊人稍或諠呼及投物擊觸即大風震發揭屋拔木必為物害故登山之時互相戒勅不敢觸球至穴口戲投巨石於穴中良久石聲方絶果有奔風迅發有一木如柱隨風飛出球性軒悍無所顧忌遂力扳其木却墜入穴中球為木所載亦不得出良久至地見一人形如獅子而人語引球入洞中齋内見二道士奕碁道士見球喜問球所修之道球素不知通修行之事黙然無以為對二仙責引者曰吾至道之要當授有骨相之士習道之人汝何妄引凡庸入吾仙府耶速引去之因以一杯水遺令飲謂之曰汝雖凡流得覩吾洞府踐吾真境將亦有少道分矣所恨素不習道不可語汝修行之要耳但去茍有希生之心出世之志他日可復來也飲此神漿亦延年壽矣球飲水拜謝訖引者將球至向來洞側示以别路曰此山道家紫府洞也五峰之上皆籍四海奇寳以鎮峰頂亦如茅山洞鎮以安息金墉城之寳春山雜玉環水香瓊以固上真之宅此山東峰有離岳火球西峰有麗農瑤室南峰有洞光珠樹北峰有玉澗瓊芝中峰有自明之金環光之璧每積隂將散久暑將雨即衆寳交光照灼巖嶺春曉秋旦則九色之氣屬天光輝爍乎雲表太帝命韓司少卿東方君與紫府先生統六年仙寮神王力士以鎮於此故謂神仙之府也洞有三門一徑西通崑崙一徑出北巖之下一向來風穴是洞之端門也皆有龍蛇守之先生有勅曰有巨石投於洞門中吾柱者是世間將有得道之人受事於此即使我引進我亦久遠學道當證仙品而積功之外口業不除以宿功所廕得守此洞穴之口後三百年亦當超昇矣以口業之故假此形耳我守先生之命適聞投石中柱依教引子誠不知子戲投石耳然數百年來投石者少亦未嘗中柱神仙之宫不易一至子亦將有所得於𤣥妙之津矣此有北巖之徑可使子得速還人間因衣帶解藥三丸貫一槁枝之末謂球曰路側如見異物以藥指之不為害此藥食之可以無病球持此藥行於洞中黑處藥有光如火有數巨蛇張口向球以藥指之伏不敢動因出洞門門外古樹半朽洞欲堙塞球摧壤土朽樹久方得出已在寺門之外矣先是劉生既失球子方執誣劉生疑害其父欲訟於官寺有大齋未得便去既見球還衆皆忻喜具話所見之異因以三丸藥與劉及子各餌一丸乾符中進士司徒鐵與球相别三十餘年别時球年六十鬚已􅂷白於河東見球年九十餘容狀如三十許人話所遇之事云服藥至今老而復壯性不食其子亦如三十嵗許鋭志修道與其子入王屋山去出仙傳拾遺宋𤣥白宋𤣥白不知何許人也為道士身長七尺餘眉目如畫端美肥白言談秀麗人見皆愛之有道術多遊名山自茅山出潤州希𤣥觀復遊括蒼仙都辟穀服氣然嗜酒或食􅇾肉五斤以蒜虀一盆手撮肉吃畢即飲酒二斗用一白梅人有求得其一片蒜食之者言不作蒜氣味有如異香終日在齒舌間香不歇人間得蒜食者頗多而畢身無病壽皆八九十𤣥白到處住則以金帛求置三二美妾行則捨之人皆以為有老彭補腦還元之術又遊越州適大旱方暴尫禜龍以祈雨涉旬亢陽愈甚𤣥白見之以為凡所降雨須俟天命非上奏無以致之遂於所止𤣥真觀焚香上祝經夕大㴻雨吿足越人極神異之復南遊到撫州又逢天旱祈禱有道士知𤣥白能致雨州人請之遽作術飛釘城隍神雙目刺史韋徳隣恠其貯婦女復釘城隍神此𩔖狂也將加責辱健步輩欲向之手脚皆不能動悉自仆倒枷杖亦自摧折𤣥白笑謂徳隣曰使君干忤劉根欲見誅罰祖禰耶徳隣方懼祈謝須臾致雨禮而遣之其靈術屢施不可備録後之南城縣白日上昇而去出續神仙傳許棲巖許棲巖岐陽人也舉進士習業於昊天觀每晨夕必瞻仰真像朝祝靈仙以希長生之福時南康韋臯太尉鎮蜀延接賔客遠近慕義遊蜀者甚多巖將為入蜀之計欲市一馬而力不甚豐自入西市訪之有蕃人牽一馬瘦削而價不髙因市之而歸以其將遠涉道途日加芻秣而肌膚益削疑其不達前所試詣卜肆筮之得乾卦九五道流曰此龍馬也宜善寳之洎登蜀道危棧棲巖與馬俱墜岸下積葉承之幸無所損仰不見頂四面路絶計無所出乃解鞍去衛任馬所往於槁葉中得栗如拳棲巖食之亦不饑矣尋其崖下見一洞穴行而乘之或下或髙約十餘里忽爾及平川花木秀異池沼澄澈有一道士臥於石上二女侍之巖進而求見問二玉女云是太乙真君巖即以行止吿玉女玉女憫之白於真君曰爾於人世亦好道乎曰讀莊老黄庭而已曰三景之中得何句也答曰老子云其精甚真莊子云息之以踵黄庭云但思以郤壽無窮笑曰去道近矣可教也命坐酌小盃以飲之曰此石髓也􅄞康不能得近爾得之矣乃邀入别室有道士云是潁陽尊師為真君布算言今夕當東遊十萬里巖熟視之乃卜馬道士也是夕巖與潁陽從太乙君登東海西龍山石橋之上以赴羣真之㑹座内仙客有東黄君見棲巖喜曰許長史孫也有仙相矣及明復從太乙君歸太白洞中居半月思家求還太乙曰汝飲石髓已壽千嵗無輸泄無荒淫復此來再相見也以所乘馬送之將行謂曰此馬吾洞中龍也以作怒傷稼謫其負荷子有仙骨故得值之不然此太白洞天瑤華上宮何由而至也到人間放之渭曲任其所適勿復留之既别逡巡已達虢縣則無復故居矣問鄉人年代已六十年出洞時二玉女託買虢縣田婆針乃市之杖繫馬鞍上解鞍放之化龍而去棲巖幼在鄉里已見田婆至此惟田婆容狀如舊葢亦仙人也棲巖大中末年復入太白山去出傳奇韋善俊韋善俊者京兆杜陵人也訪道周遊遍尋名岳遇神仙授三皇檄召之文得神化之道或静棲林野或醉臥道途常攜一犬號之曰烏龍所至之處必分己食以飼之犬復病疥毛盡秃落無不嫌惡之其兄為僧久居嵩寺最為長老善俊將欲昇天忽謂人曰我有少債未償耳遂入山見兄衆僧以師長之弟多年忽歸彌加敬奉每昇堂齋食即牽犬於其側分食與之衆既惡之白於長老長老怒召而責之笞擊十數遣出寺善俊禮謝曰某宿債已還此去不復來矣更乞一浴然後乃去許之及浴移時牽犬而去犬已長六七尺行至殿前犬化為龍長數十丈善俊乘龍昇天拏其殿角蹤跡猶在出仙傳拾遺太平廣記卷四十七
