body:
  text: 太平廣記卷四百二十七宋李昉等編虎二費忠虎婦稽胡碧石黿齧虎李徵天寶選人費忠費州蠻人舉族姓費氏境多虎暴俗皆樓居以避之開元中狄光嗣為刺史其孫博望生于官舍博望乳母壻費忠勁勇能射嘗自州負米還家山路見阻不覺日暮前程尚三十餘里忠懼不免以所持刃刈薪數束敲石取火焚之自守須㬰聞虎之聲震動林藪忠以頭巾冐米袋腰𢃄束之立於火光之下挺身上大樹頃之四虎同至望見米袋大虎前躩既知非人相顧黙然次虎引二子去大虎獨留火所忽爾脱皮是一老人枕手而寐忠素勁捷心頗輕之乃徐下樹扼其喉以刃擬頸老人乞命忠縛其手而詰問之云是北村費老被罰為虎天曹有日厯令食人今夜合食費忠故候其人適來正值米袋意甚欎怏留此須其復來耳不意為君所執如不信可於我腰邉看日厯當知之忠觀厯畢問何以救我答曰若有同姓名人亦可相代異時事覺我當為受罰不過十日饑餓耳忠云今有南村費忠可代我否老人許之忠先持其皮上樹杪然後下解老人老人曰君苐牢縛其身附樹我若入皮則不相識脱聞吼落地必當被食事理則然非負約也忠與訣上樹擲皮還之老人得皮從後脚入復形之後大吼數十聲乃去忠得還家數日南村費忠鋤地遇噉也出廣異記虎婦唐開元中有虎取人家女為妻於深山結室而居經二載其婦不之覺後忽有二客㩦酒而至便於室中羣飲戒其婦云此客稍異慎無窺覷須㬰皆醉眠婦因往視悉虎也心大驚駭而不敢言乆之虎復為人形還謂婦曰得無窺乎婦言初不敢離此後忽云思家願一歸覲經十日夫將酒肉與婦偕行漸到妻家遇深水婦人先渡虎方褰衣婦戲云卿背後何得有虎尾出虎大慚遂不渡水因爾疾馳不返出廣異記稽胡慈州稽胡者以弋獵為業唐開元末逐鹿深山鹿急走投一室室中有道士朱衣凭案而坐見胡驚愕問其来由胡遂具言姓名云適逐一鹿不覺深入辭謝衝突道士謂胡曰我是虎王天帝令我主施諸虎之食一切獸各有對無枉也適聞汝稱姓名合為吾食案頭有朱筆及盃兼簿籍因開簿以示胡胡戰懼良乆固求釋放道士云吾不惜放汝天命如此為之奈何若放汝便失我一食汝既相遇必為取免乆之乃云明日可作草人以已衣服之及猪血三升絹一匹持與俱來或當得免胡遲回未去見羣虎來朝道士處分所食遂各散去胡尋再拜而還翌日乃持物以詣道士笑曰爾能有信故為佳士因令置草人庭中置猪血於其側然後令胡上樹以下望之髙十餘丈云止此得矣可以絹縛身著𣗳不爾恐有損落尋還房中變作一虎出庭仰視胡大嘷吼數四向樹跳躍知胡不可得乃攫草人擲髙數丈往食猪血盡入房復為道士謂胡曰可速下來胡下再拜便以朱筆勾胡名於是免難出廣異記碧石開元末渝州多虎暴設機穽恒未得之月夕人有登樹候望見一倀鬼如七八歳小兒無衣輕行通身碧色来發其機及過人又下樹止之須㬰一虎徑來為陷機所中而死乆之小兒行哭而返因入虎口及明開視有碧石大如雞子在虎喉焉出廣異記黿齧虎天寳七載宣城郡江中黿出虎搏之黿齧虎二瘡虎怒㧞黿之首而虎瘡甚亦死出紀聞李徵隴西李徵皇族子家於虢略徵少博學善屬文弱冠從州府貢焉時號名士天寶十載春於尚書右丞楊没榜下登進士第後數年調補江南尉徵性疎逸恃才倨傲不能屈跡卑僚嘗欎欎不樂每同舎㑹既酣顧謂其羣官曰生乃與君等為伍􅁘其寮佐咸嫉之及謝秩則退歸閉門不與人通者近嵗餘後廹衣食乃具粧東遊吳楚之間以干郡國長吏吳楚人聞其聲固乆矣及至皆開館以俟之宴遊極懽將去悉厚遺以實其囊橐徵在吳楚且周嵗所獲饋遺甚多西歸虢略未至舎於汝墳逆旅中忽􅀍疾發狂鞭捶僕者僕者不勝其苦如是旬餘疾益甚無何夜狂走莫知其適家僮跡其去而伺之至一月而徵竟不回於是僕者驅其乗馬挈其囊橐而逺遁去至明年陳郡𡊮傪以監察御史奉詔使嶺南乗傳至商於界晨將發其驛吏白曰道有虎暴而食人故過於此者非晝而莫敢進今尚早願且駐車決不可前傪怒曰我天子使衆騎極多山澤之獸能為害􅁘遂命駕去行未盡一里果有一虎自草中突出傪驚甚俄而虎匿身草中人聲而言曰異乎哉㡬傷我故人也傪聆其音似李徵傪昔與徵同登進士第分極深别有年矣忽聞其語既驚且異而莫測焉遂問曰子為誰得非故人隴西子乎虎呻唫數聲若嗟泣之狀已而謂傪曰我李徵也君幸少留與我一語傪即降騎因問曰李君李君何為而至是也虎曰我自與足下别音曠阻且乆矣幸喜得無恙乎今又去何適向者見君有二吏驅而前驛𨽻挈印囊以導庸非為御史而出使乎傪曰近者幸得備御史之列今乃使嶺南虎曰吾子以文學立身位登朝序可謂盛矣况憲䑓清峻分糺百揆聖眀慎擇尤異於人心喜故人居此地甚可賀傪曰往者吾與執事同年成名交契深密異於常友自聲容間阻時去如流想望風儀心目俱斷不意今日獲君念舊之言雖然執事何為不我見而自匿於草莽中故人之分豈當如是􅁘虎曰我今不為人矣安得見君乎傪即詰其事虎曰我前身客吳楚去嵗方還道次汝墳忽嬰疾發狂走山谷中俄以左右手據地而歩自是覺心愈狠力愈倍及視其肱髀則有犛毛生焉又見冕衣而行於道者負而奔者翼而翺者毳而馳者則欲得而啗之既至漢隂南以饑腸所廹值一人腯然其肌因擒以咀之立盡由此率以為常非不念妻孥思朋友直以行負神祗一日化為異獸有靦於人故分不見矣嗟夫我與君同年登第交契素厚今日執天憲耀親友而我匿身林藪永謝人寰躍而吁天俛而泣地身毁不用是果命乎因呼吟咨嗟殆不自勝遂泣傪且問曰君今既為異𩔖何尚能人言􅁘虎曰我今形變而心甚悟故有摚突以悚以恨難盡道耳幸故人念我深恕我無狀之咎亦其願也然君自南方回車我再值君必當昧其平生耳此時視君之軀猶吾机上一物君亦宜嚴其警從以備之無使成我之罪取笑於士君子又曰我與君真忘形之友也而我將有所託其可乎傪曰平昔故人安有不可哉恨未知何如事願盡教之虎曰君不許我我何敢言今既許我豈有隐􅁘初我於逆旅中為疾發狂既入荒山而僕者驅我乗馬衣囊悉逃去吾妻孥尚在虢略豈念我化為異𩔖乎君若自南回為賫書訪妻子但云我已死無言今日事幸記之又曰吾於人世且無資業有子尚稚固難自謀君位列周行素秉風義昔日之分豈他人能右哉必望念其孤弱時賑其乏無使殍死於道途亦恩之大者言已又悲泣傪亦泣曰傪與足下休戚同焉然則足下子亦傪子也當力副厚命又何虞其不至哉虎曰我有舊文數十篇未行於代雖有遺稿盡皆㪚落君為我傳錄誠不可列人之閾然亦貴傳於子孫也傪即呼僕命筆隨其口書近二十章文甚髙理甚逺傪閱而嘆者再三虎曰此吾平生之素也安敢望其傳乎又曰君衘命乗傳當甚奔廹今乆留驛𨽻兢悚萬端與君永訣異途之恨何可言哉傪亦與之叙别乆而方去傪自南回遂專命持書及賵􅉠之禮寄於徵子月餘徵子自虢畧來京詣傪門求先人之柩傪不得已具疏其事後傪以巳俸均給徵妻子免饑凍焉傪後官至兵部侍郎出宣室志天寶選人天寳年中有選人入京路行日暮投一村僧房求宿僧不在時已昏黒他去不得遂就榻假宿鞍馬置于别室遲明將發偶廵行院内至院後破屋中忽見一女子年十七八容色甚麗盖虎皮熟寢之次此人乃徐行掣虎皮藏之女子覺甚驚懼因而為妻問其所以乃言逃難至此藏伏去家已逺載之别乗赴𨕖𨕖既就又與同之官數年秩滿生子數人一日俱行復至前宿處僧有在者延納而宿明日未發間因笑語妻曰君豈不記余與君初相見處耶妻怒曰某本非人𩔖偶爾為君所收有子數人能不見嫌敢且同處今如見耻豈徒為語耳還我故衣從我所適此人方謝以過言然妻怒不已索故衣轉急此人度不可制乃曰君衣在北屋間自往取女人大怒目如電光猖狂入北屋間尋覓虎皮披之於體跳躍數􅇍已成巨虎哮吼回顧望林而往此人驚懼收子而行出原化記太平廣記卷四百二十七
