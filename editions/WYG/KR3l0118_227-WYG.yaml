body:
  text: 太平廣記卷二百二十七伎巧三華清池重明枕韓志和絕藝督君謨李欽瑤蘇州游僧江西人僧靈鑒張芬河北將軍西蜀客陟屺寺僧伎巧華清池𤣥宗於華清宫新廣一池制度宏麗安禄山於范陽以白玉石爲魚龍鳳鴈仍爲石梁及石蓮花獻雕鐫巧妙殆非人工上大悦命於池中仍以石梁横亘其上而下蓮花出於水際上因幸華清宫至其所解衣將入而魚龍鳳鴈皆若奮鱗舉翼狀欲飛動上甚恐遽命撤去去之而蓮花石梁尚存又嘗於宮中置長湯池數十間屋宇環迴甃以文石為銀鏤漆船及檀香水船致於其中至檝棹皆飾以珠玉又於湯池中壘瑟瑟及檀香木為山狀瀛洲方丈出談賓録重明枕元和八年大軫國貢重明枕神錦衾云其國在海東南三萬里當軫宿之位故曰大軫國合丘禺藳山合丘禺藁山見山海經重明枕長一尺二寸髙六寸潔白逾於水精中有樓臺之狀四方有十道士持香執簡循環無已謂之行道真人其樓臺瓦木丹青真人簪帔無不悉具通瑩焉如水覩物神錦衾水蠶絲所織方二尺厚一寸其上龍文鳳彩殆非人工其國以五色石甃池塘採大柘葉飼蠶於池中始生如蚊睫游泳其間及長可五六寸池中有挺荷雖驚風疾吹不能動大者可濶三四尺而蠶經十五日即跳入荷中以成其繭形如方斗自然五色國人繅之以織神錦亦謂之靈泉絲上始覽錦衾與嬪御大笑曰此不足以為嬰兒綳褯曷能為我被耶使者曰此錦之絲水蠶也得水即舒水火相反遇火則縮遂於上前令四官張之以水一噴即方二丈五色煥爛逾於向時上歎曰本乎天者親上本乎地者親下不亦然哉却令以火逼之須臾如故出杜陽編韓志和穆宗朝有飛龍士韓志和本倭國人也善雕木作鸞鶴鴉鵲之狀飲啄悲鳴與真無異以關捩置於腹内發之則凌空奮翼可髙百尺至一二百步外方始却下兼刻木猫兒以捕雀䑕飛龍使異其機巧奏之上覩而悦之志和更雕踏牀髙數尺其上飾之以金銀綵繪謂之見龍牀置之則不見龍形踏之則鱗鬛爪角俱出始進上以足履之而龍天矯若得雲雨上恐畏遂令撤去志和伏於上前稱臣愚昧而致有驚忤聖躬臣願别進薄伎以娛陛下耳目以贖死罪上笑曰所解何伎試為我出志和於懐中將出一桐木合方數寸其中有物名蠅虎子數不啻一二百焉其形皆赤云以丹砂㗖之故也乃分爲五隊令舞梁州上召國樂以舉其曲而虎子盤㢠廻宛轉無不中節每遇致詞處則隱隱如蠅聲及曲終累累而退若有尊卑等級志和臂虎子於指上獵蠅於數步之内如鷂擒雀罕有不獲者上嘉其伎小有可觀即賜以雜彩銀器而志和出宫門悉轉施於人不逾年竟不知志和所在上於殿前種千葉牡丹及花始開香氣襲人一朶千葉大而且紅上每覩芳盛歎人間未有自是宫中每夜即有黄白蝴蝶萬數飛集於花間輝光照耀達曙方去宫人競以羅巾撲之無有不獲者上令張網於宫中遂得數百於殿内縱嬪御追捉以爲娯樂遲明視之則皆金玉也其狀工巧無以爲比而内人爭用絲縷絆其脚以爲首飾夜則光起於粧奩中其後開寳厨視金屑玉屑藏内將有化爲蝶者宫中方覺焉出杜陽編絕藝督君謨隋末有督君謨善閉目而射志其目則中目志其口則中口有王靈智者學射於君謨以爲曲盡其妙欲射殺君謨獨擅其美君謨製一短刀箭來輒截之惟有一矢君謨張口承之遂囓其鏑而笑曰汝學射三年未敎汝囓鏃法列子甘蠅古之善射者弟子名飛衛巧過於師紀昌又學射於飛衛以徴角之弧朔􅅫之簳射貫虱心既盡飛衛之術計天下敵已一人而已乃謀殺飛衛相遇於野二人交射矢鋒相觸墜地而塵下揚飛衛之矢先窮紀遺一矢既發飛衛以􅁄刺之端捍之而無差焉於是二子泣而投弓請爲父子刻背爲誓不得告術於人孟子曰逢蒙學射於羿盡羿之道惟羿爲愈已於是殺羿出酉陽雜俎李欽瑶天寳末有騎將李欽瑶者弓矢絕倫以勞累官至郡守兼御史大夫至德中𨽻臨淮與史思明相持於陜西晨朝合戰臨淮布陣徐進去敵尚十許里忽有一狐起於軍前踉蹌而趨若導引者臨淮不懌曰越王軾怒蛙葢激勵官軍士耳狐乃持疑妖邪之物豈有前陣哉即付欽瑶以三矢令取狐焉欽瑶受命而馳適有淺蕪三二十畝狐奔入其中欽瑶逐之歘有野雉驚起馬足徑入雲霄欽瑶翻身仰射一發而墜然後鳴鞭逐狐十步之内拾矢又中於是擕二物以復命焉舉軍懽呼聲振山谷時囘鶻列騎置陣於北原其首領僅一二百輩棄軍飛馬而來爭捧欽瑶以爲神異仍謂曰爾非囘鶻之甥不然何能弧矢之妙乃得如此哉出集異記蘇州游僧蘇州重𤣥寺閣一角忽墊計其扶薦之功當用錢數千貫有游僧曰不足勞人請得一夫斫木爲楔可以正之寺主從焉游僧每食訖輒取楔數十執柯登閣敲椓其間未旬日閣柱悉正舊說聖善寺閣常貯醋十瓮恐爲蛟龍所伏以致雷電出國史補江西人江西人有善展竹數節可成器又有人熊葫蘆云翻葫蘆易於翻鞠出酉陽雜俎僧靈鑒貞元末閬州僧靈鑒善彈常自爲彈丸其彈丸方用洞庭沙岸下土三斤炭末三兩資末一兩榆皮半兩泔澱二勺紫礦二兩細沙三分藤紙五張渴􅛑汁半合九味和搗三千杵齊丸之隂乾鄭彚爲刺史時有當家名寅讀書善飲酒彚甚重之寅常與靈鑒較角放彈寅指一𣗳節相去數十步曰中之獲五千寅自一發而中之彈丸反射而不破靈鑒控弦百發百中皆節陷而丸碎焉出酉陽雜俎張芬張芬曾爲韋臯行軍曲藝過人力舉七尺碑定雙輪水磑常於福感寺趯鞠高及半塔彈弓力五斗常揀向陽巨筍織竹籠之隨長旋培常畱寸許度竹籠高四尺然後放長秋深方去籠伐之一尺十節其色如金用成弓焉每塗牆方丈彈成天下太平字字體端妍如人摸成出酉陽雜俎河北將軍建中初有河北將軍姓夏彎弓數百斤常於毬場中累錢千餘走馬以撃鞠杖撃之一撃一錢飛起高六七丈其妙如此又於新泥牆安棘刺數十取爛豆相去一丈擲豆貫於刺上百不差一又能走馬書一紙出酉陽雜俎西蜀客又張芬在韋臯幕中有一客於宴席上以籌椀中綠豆撃蠅十不失一一座驚笑芬曰無費吾豆遂指起蠅拈其後脚略無脫者出酉陽雜俎陟屺寺僧荆州陟屺寺僧那善照射毎言照射之法凡光長而搖者鹿貼地而明滅者兔低而不動者虎又言夜格虎時必見三虎並來挾者虎威當刺其中者虎死威乃入地得之可却百邪虎初死記其頭所藉處候月黑夜掘之欲掘時必有虎來吼擲前後不足畏此虎之鬼也深二尺當得物如琥珀葢虎目光淪入地所爲也出酉陽雜俎太平廣記卷二百二十七
