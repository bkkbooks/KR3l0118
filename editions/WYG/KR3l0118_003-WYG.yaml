body:
  text: 太平廣記卷三神仙三漢武帝漢武帝漢孝武皇帝景帝子也未生之時景帝夢一赤彘從雲中下直入崇芳閣景帝􅁴而坐閣下果有赤龍如霧來蔽戸牖宫内嬪御望閣上有丹霞蓊蔚而起霞滅見赤龍盤廻棟間景帝召占者姚翁以問之翁曰吉祥也此閣必主命世之人攘夷狄而獲嘉瑞為劉宗盛主也然亦大妖景帝使王夫人移居崇芳閣欲以順姚翁之言也乃改崇芳閣為猗蘭殿旬餘景帝夢神女捧日以授王夫人夫人吞之十四月而生武帝景帝曰吾夢赤氣化為赤龍占者以為吉可名之吉至三嵗景帝抱於膝上撫念之知其心藏洞徹試問児樂為天子否對曰由天不由児願每日居宫垣在陛下前戲弄亦不敢逸豫以失子道景帝聞而愕然加敬而訓之他日復抱之几前試問児悦習何書為朕言之乃誦伏羲以來羣聖所録隂陽診候及龍圖龜䇿數萬言無一字遺落至七嵗聖徹過人景帝令改名徹及即位好神仙之道常禱祈名山大川五嶽以求神仙元封元年正月甲子登嵩山起道宫帝齋七日祠訖乃還至四月戊辰帝閒居承華殿東方朔董仲舒在側忽見一女子着青衣美麗非常帝愕然問之女對曰我墉宫玉女王子登也向為王母所使從崑崙山來語帝曰聞子輕四海之禄尋道求生降帝王之位而屢禱山嶽勤哉有似可教者也從今日清齋不閑人事至七月七日王母暫來也帝下席跪諾言訖玉女忽然不知所在帝問東方朔此何人朔曰是西王母紫蘭宫玉女常傳使命往來扶桑出入靈洲交關常陽傳言𤣥都阿母昔出配北燭仙人近又召還使領命禄真靈官也帝於是登延靈之臺盛齋存道其四方之事權委於冡宰焉到七月七日乃修除宫掖設坐大殿以紫羅薦地燔百和之香張雲錦之幃燃九光之燈列玉門之􅀥酌蒲萄之醴宫監香果為天宫之􅄿帝乃盛服立于階下敇端門之内不得有妄窺者内外寂謐以候雲駕到夜二更之後忽見西南如白雲起鬱然直來逕趨宫庭須臾轉近聞雲中簫鼓之聲人馬之響半食頃王母至也懸投殿前有似鳥集或駕龍虎或乗白麟或乗白鶴或乗軒車或乗天馬羣仙數千光耀庭宇既至從官不復知所在唯見王母乗紫雲之輦駕九色斑龍别有五十天仙側近鸞輿皆長丈餘同執綵旄之節佩金剛靈璽戴天真之冠咸住殿下王母唯扶二侍女上殿侍女年可十六七服青綾之袿容眸流盼神姿清發真美人也王母上殿東向坐著黄金褡䙱文采鮮明光儀淑穆帶􅂕飛大綬腰佩分景之劒頭上太華髻戴太真晨嬰之冠履𤣥璚鳳文之舄視之可年三十許修短得中天姿掩藹容顔絶世真􅂕人也下車登牀帝跪拜問寒暄畢立因呼帝共坐帝面南王母自設天厨真妙非常豐珍上果芳華百味紫芝萎㽔芬芳填樏清香之酒非地上所有香氣殊絶帝不能名也又命侍女更索桃果須臾以玉盤盛仙桃七顆大如鴨卵形圓青色以呈王母母以四顆與帝三顆自食桃味甘美口有盈味帝食輙收其核王母問帝帝曰欲種之母曰此桃三千年一生實中夏地薄種之不生帝乃止於坐上酒觴數遍王母乃命諸侍女王子登彈八琅之璈又命侍女董雙成吹雲和之笙石公子擊昆庭之金許飛瓊鼓震靈之簧婉凌華拊五靈之石范成君擊湘隂之磬叚安香作九天之鈞於是衆聲澈朗靈音駭空又命法嬰歌𤣥靈之曲歌畢王母曰夫欲修身當營其氣太仙真經所謂行益易之道益者益精易者易形能益能易名上仙籍不益不易不離死厄行益易者謂常思靈寶也靈者神也寳者精也子但愛精握固閉氣吞液氣化為血血化為精精化為神神化為液液化為骨行之不倦神精充溢為之一年易氣二年易血三年易精四年易􅎃五年易髓六年易骨七年易筋八年易髮九年易形形易則變化變化則道成道成則為仙人吐納六氣口中甘香欲食􅂕芝存得其味㣲息揖吞從心所適氣者水也無所不成至柔之物通致神精矣此元始天王在丹房之中所説㣲言今敇侍笈玉女李慶孫書録之以相付子善録而修焉於是王母語言既畢嘯命􅂕官使駕龍嚴車欲去帝下席叩頭請留殷勤王母乃止王母乃遣侍女郭密香與上元夫人相問云王九光之母敬謝但不相見四千餘年矣天事勞我致以愆面漢主好道適來視之見某了了似可成進然形慢神穢腦血淫漏五臟不淳關胄彭孛骨無精液脈浮反升肉多精少瞳子不夷三尸狡亂𤣥白失時雖當語之以至道殆恐非仙才也吾乆在人間實為臭濁然時復可遊望以寫細念庸主對坐悒悒不樂夫人可暫來否若能屈駕當停相須帝見侍女下殿俄失所在須臾郭侍女返上元夫人又遣一侍女答問云阿環再拜上問起居逺隔絳河擾以官事遂替顔色近五千年仰戀光潤情係無違密香至奉信承降尊於漢主處聞命之際登當命駕先被太帝君敕使詣𤣥洲挍定天元正爾暫住如是當還還便束帶願暫少留帝因問王母不審上元何真也王母曰是三天上元之官統領十萬玉女名籙者也俄而夫人至亦聞雲中簫鼓之聲既至從官文武千餘人並是女子年皆十八九許形容明逸多服青衣光彩耀目真靈官也夫人年可二十餘天姿精耀靈眸絶朗服青霜之袍雲彩亂色非錦非繡不可名字頭作三角髻餘髮散垂至腰戴九雲夜光之冠曳六出火玉之佩垂鳯文林華之綬腰流黄揮精之劒上殿向王母拜王母坐而止之呼同坐北向夫人設厨厨亦精珍與王母所設者相似王母敕帝曰此真元之母尊貴之神汝當起拜帝拜問寒温還坐夫人笑曰五濁之人耽酒營利嗜味淫色固其常也且帝以天子之貴其亂目者倍於凡焉而復于華麗之墟拔嗜欲之根願無為之事良有志焉王母曰所謂有心哉夫人謂帝曰汝好道乎聞數招方術祭山嶽祠􅂕神禱河川亦為勤矣勤而不獲實有由也汝胎性暴胎性滛胎性奢胎性酷胎性賊五者恒舍於榮衛之中五臟之内雖獲良針固難愈也暴則使氣奔而攻神是故神擾而氣竭滛則使精漏而魂疲是故精竭而魂消奢則使真離而魄穢是故命逝而􅂕失酷則使喪仁而自攻是故失仁而眼亂賊則使心鬭而口乾是故内戰而外絶此五事者皆是截身之刀鋸刳命之斧斤矣雖復志好長生不能遣兹五難亦何為損性而自勞乎然由是得此小益以自知往爾若從今已捨爾五性反諸柔善明務察下慈務矜寃恵務濟貧賑務施勞念務存孤惜務及愛身恒為隂徳救濟死厄旦夕孜孜不泄精液於是閉諸滛飬汝神放諸奢從至儉勤齋戒節飲食絶五穀去羶腥鳴天鼔飲玉漿蕩華池叩金梁按而行之當有異耳今阿母迂天尊之重下降於蟪蛄之窟霄虗之􅂕而詣狐鳥之爼且阿母至誡妙唱𤣥音驗其敬朂節度明修所奉比及百年阿母必能致汝於𤣥都之墟迎汝於昆閬之中位以仙官遊於十方信吾言矣子勵之哉若不能爾無所言矣帝下席跪謝曰臣受性凶頑生長亂濁面墻不啓無由開達然貪生畏死奉􅂕敬神今日受教此乃天也某戢聖命以為身範是小醜之臣當獲生活唯垂哀䕶願賜上元夫人使帝還坐王母謂夫人曰卿之為戒言甚急切更使未解之人畏於志意夫人曰若其志道將以身投餓虎忘軀破滅蹈火履水固於一志必無憂也若其志道則心凝真性嫌惑之徒不畏急言急言之發欲成其志耳阿母既有念必當賜以尸􅄙之方耳王母曰此子勤心已乆而不遇良師遂欲毁其正志當疑天下必無仙人是故我發閬宫暫舎塵濁既欲堅其仙志又欲令向化不惑也今日相見令人念之至於尸􅄙下方吾甚不惜後三年吾必欲賜以成丹半劑石象散一具與之則帝不得復停當今匈奴未彌邊陲有事何必令其倉卒舎天下之尊而便入林岫但當問篤向之志何如如其㢠廻改吾方數來王母因拊帝背曰汝用上元夫人至言必得長生可不朂勉􅁘帝跪曰臣書之金簡以身佩之焉帝又見王母巾笈中有一卷書盛以紫錦之囊帝問此書是仙􅂕方􅁘不審其目可得瞻盻否王母出以示之曰此五嶽真形圖也昨青城諸仙就吾請求今當過以付之乃三天太上所出文祕禁重豈汝穢質所宜佩乎今且與汝􅂕光生經可以通神勸心也帝下地叩頭固請不已王母曰昔上皇清虚元年三天太上道君下觀六合瞻河海之長短察丘山之髙卑立天柱而安於地理植五嶽而擬諸鎮輔貴昆陵以舍􅂕仙尊蓬丘以館真人安水神於極隂之源棲太帝於扶桑之墟於是方丈之阜為理命之室滄浪海島飬九老之堂祖瀛𤣥炎長元流光生鳳麟聚窟各為洲名並在滄流大海𤣥津之中水則碧黑俱流波則震蕩羣精諸仙玉女聚居滄溟其名難測其實分明乃因山源之規矩覩河嶽之盤曲陵迴阜轉山髙隴長周旋逶迤形似書字是故因象制名定實之號書形祕於𤣥臺而出為􅂕真之信諸仙佩之皆如傳章道士執之經行山川百神羣􅂕尊奉親近汝雖不正然數訪仙澤扣求不忘于道欣子有心今以相與當深奉慎如事君父泄示凡夫必禍及也上元夫人語帝曰阿母今以瓊笈妙韞發紫臺之文賜汝八㑹之書五嶽真形可謂至珍且貴上帝之𤣥觀矣子自非受命合神弗見此文矣今雖得其真形觀其妙理而無五帝六甲左右􅂕飛之符太隂六丁通真逐􅂕玉女之籙太陽六戊招神天光策精之書左乙混沌東蒙之文右庚素収攝殺之律壬癸六遯𨼆地八術丙丁入火赤班符六辛入金致黄水月華之法六巳石精金光藏景化形之方子午卯酉八稟十訣六􅂕咸儀丑辰未戌地真素訣長生紫書三五順行寅申巳亥紫度炎光内視中方凡􅆙此十二事者當何以召山􅂕朝地神攝總萬精驅策百鬼束虎豹役蛟龍乎子所謂適知其一未見其他也帝下席叩頭曰某下土濁民不識清真今日聞道是生命㑹遇聖母今當賜以真形修以度世夫人云今告帝應須五帝六甲六丁六符致􅂕之術既蒙啓發𢎞益無量唯願告誨濟臣飢渇使已枯之木蒙􅂕陽之潤焦炎之草幸甘雨之溉不敢多陳帝啓叩不已王母又告夫人曰夫真形寳文􅂕宫所貴此子守求不已誓以必得故虧科禁特以與之然五帝六甲通真招神此術𦕈邈必須清潔至誠殆非流濁所宜施行吾今既賜彼以真形夫人當授之以致􅂕之途矣吾嘗憶與夫人共登𤣥隴朔野及曜真之山視王子童王子立就吾求請太上隱書吾以三元祕言不可傳泄於中仙夫人時亦有言見助於子童之言志矣吾既難違來意不獨執惜至於今日之事有以相似後造朱火丹陵食􅂕𤓰味甚好憶此未乆而已七千嵗矣夫人既以告帝篇目十二事畢必當匠而成之縁何令人主稽首請乞叩頭流血􅁘上元夫人曰阿環不茍惜向不持來耳此是太虚羣文真人赤童所出傳之既自有男女之限禁又宜授得道者恐彼下才未應得此耳王母色不平乃曰天禁漏泄犯違明科傳必其人授必知真者夫人何向下才而説其􅂕飛之篇目乎妄説則泄泄而不傳是衒天道此禁豈輕於傳􅁘别敇三官司直推夫人之輕泄也吾之五嶽真形太寳乃太上天皇所出其文寳妙而為天仙之信豈復應下授於漢主􅁘直以某孜孜之心數請川嶽勤修齋戒以求神仙之應志在度世不􅇜明師故吾等有以下眄之耳至於教仙之術不復限惜而弗傳夫人且有致􅂕之方能獨執之乎吾今所以授某真形文者非謂其必能得道欲使其精誠有驗求仙之不惑可以誘進向化之徒又欲令悠悠者知天地間有此靈真之事足以却不信之狂夫耳吾意在此也此子性氣滛暴服精不純何能得成真仙浮空參差十方乎勤而行之適可度於不死耳明科所云非長生難聞道難也行之難非行之難也終之難良匠能與人規矩不能使人必巧也何足𨼆之􅁘夫人謝曰謹受命矣但環疇昔蒙倒景君無常先生二君傳靈飛之約以四千年一傳女授女不授男太上科禁已表於昭生之符矣環受書以來并賢大女即抱蘭凡傳六十八女子固不可授男也伏見扶廣山青真小童受六甲􅂕飛於太甲中元凡十二事與環所受者同青真是環入火弟子所受六甲未聞别授於人彼男官也今止敇取之將以授帝也先所以告篇目者意是愍其有心將欲堅其専氣令且廣求他日與之亦欲以男授男承科而行使勤而方獲令知天真之珍貴耳非徒茍執衒泄天道阿環主臣願不罪焉阿母真形之貴愍於勤志亦已授之可謂大不宜矣王母笑曰亦可恕乎上元夫人即命侍女紀離容徑到扶廣山敇青真小童出六甲左右􅂕飛致神之方十二事當以授漢主也須臾侍女還捧五色玉笈鳳文之藴以出六甲之文曰弟子何昌言向奉使絳河攝南真七元君檢校羣龍猛獸之數事畢授教承阿母相詣漢主家不意天靈至尊乃復下降於臭濁中也不審起居比來何如侍女紀離容至云尊母欲得金書祕字六甲􅂕飛左右䇿精之文十二事欲授漢主輒封一通付信曰帝雖有心實非仙才詎宜以此傳泄於行尸乎昌近在帝處見有上言者甚衆云山鬼哭於叢林孤魂號於絶域興師旅而族有功忘賞勞而刑士卒縱横白骨煩擾黔首滛酷自恣罪已彰於太上怨已見於天氣囂言互聞必不得度世也奉尊見敇不敢違耳王母歎曰言此子者誠多然帝亦不必推也夫好道慕仙者精誠志念齋戒思愆輒除過一月克已反善奉敬真神存真守一行此一月輒除過一年帝念道累年齋亦勤矣累禱名山願求度脱校計功過殆已相掩但今以去勤修至誠奉上元夫人之言不宜復奢淫暴虐使萬兆勞殘寃魂窮鬼有被屈之訴流血之尸忘功賞之辭耳夫人乃下席起立手執八色玉笈鳳文之藴仰帝而祝曰九天浩洞太上耀靈神照𤣥寂清虚朗明登虚者妙守氣者生至念道臻寂感真誠役神形辱安精年榮授帝􅂕飛及此六丁左右招神天光策精可以歩虚可以𨼆形長生乆視還白留青我傳有四萬之紀授帝傳在四十之齡違犯泄漏禍必族傾反是天真必沉幽𠖇爾其慎禍敢告劉生爾師主是真青童小君太上中黄道君之師真元始十天王入室弟子也姓延陵名陽字庇華形有嬰孩之貎故仙宫以青真小童為號其為器也玉朗洞照聖周萬變𤣥鏡幽覽才為真俊游於扶廣權此始運館𤣥圃治仙職分子在師居從爾所願不存所授命必傾淪言畢夫人一一手指所施用節度以示帝焉凡十二事都畢又告帝曰夫五帝者方面之天精六甲六位之通􅂕佩而尊之可致長生此書上帝封於𤣥景之臺子其寳祕焉王母曰此三天太上之所撰藏於紫陵之臺𨼆以􅂕壇之房封以華琳之函韞以蘭繭之帛約以紫羅之素印以太帝之璽受之者四十年傳一人無其人八十年可頓授二人得道者四百年一傳得仙者四千年一傳得真者四萬年一傳昇太上者四十萬年一傳非其人謂之泄天道得其人不傳是謂蔽天寳非限妄傳是謂輕天老受而不敬是謂慢天藻泄蔽輕慢四者取死之刀斧延禍之車乗也泄者身死於道路受上刑而骸裂蔽者盲聾於來世命凋枉而卒殁輕則鍾禍於父母詣𤣥都而考罰慢則暴終而墮惡道棄疾於後世此皆道之科禁故以相戒不可不慎也王母因授以五嶽真形圖帝拜受俱畢夫人自彈雲林之璈歌歩𤣥之曲王母命侍女曰四非答哥哥畢乃告帝從者姓名及冠帶執佩物名所以得知而紀焉至明旦王母與上元夫人同乗而去人馬龍虎導從音樂如初而時雲彩鬱勃盡為香氣極望西南良乆乃絶帝既見王母及上元夫人乃信天下有神仙之事其後帝以王母所授五真圖􅂕光經及上元夫人所授六甲􅂕飛十二事自撰集為一卷及諸經圖皆奉以黄金之箱封以白玉之函以珊瑚為軸紫錦為囊安著柏梁臺上數自齋㓗朝拜燒香灑掃然後乃執省焉帝自受法出入六年意㫖清暢髙韻自許為神真見降必當度世恃此不修至徳更興起臺館勞弊萬民坑降殺服逺征夷狄路盈怒歎流血膏城每事不從至太初元年十一月乙酉天火燒柏梁臺真形圖靈飛經録十二事靈光經及自撰所受凡十四卷并函並失王母當知武帝既不從訓故火災耳其後東方朔一旦乗龍飛去同時衆人見從西北上冉冉仰望良乆大霧覆之不知所適至元狩二年二月帝病行盩厔西憇五柞宫丁卯帝崩入殯未央宫前殿三月葬茂陵是夕帝棺自動而有聲聞宫外如此數遍又有芳香異常陵畢墳埏間大霧門柱壊霧經一月許日帝塜中先有一玉箱一玉杖此是西胡康渠王所獻帝甚愛之故入梓宫中其後四年有人於扶風市中買得此二物帝時左右侍人有識此物是先帝所珍玩者因認以告有司詰之買者乃商人也從關外來宿鄽市其日見一人於北車巷中賣此二物青布三十疋錢九萬即售之度實不知賣箱杖主姓名事實如此有司以聞商人放還詔以二物付太廟又帝崩時遺詔以雜經三十餘卷常讀玩之使随身斂到元康二年河東功曹李友入上黨抱犢山採藥於巖室中得此經盛以金箱卷後題東觀臣姓名記日月武帝時也河東太守張純以經箱奏進帝問武帝時左右侍臣有典書中即冉登見經及箱流涕對曰此孝武皇帝殯殮時物也臣當時以著梓宫中不知何縁得出宣帝大愴然驚愕以經付孝武帝廟中按九都龍真經云得仙之下者皆先死過太隂中鍊尸骸度地戸然後乃得尸􅄙去耳且先斂經杖乃忽顯出貨於市中經見山室自非神變幽妙孰能如此者乎出漢武帝内傳太平廣記卷三
