body:
  text: 太平廣記卷三十四神仙三十四裴氏子崔煒裴氏子唐開元中長安裴氏子於延平門外莊居兄弟三人未仕以孝義聞雖貧好施惠常有一老父過之求漿衣服顔色稍異裴子待之甚謹問其所事云以賣藥為業問其族曰不必言也因是往來憇宿於裴舍積數年而無倦色一日謂裴曰觀君兄弟至窶而常能恭己不倦於客君實長者積徳如是必有大福吾亦厚君之惠今為君致少財物以備數年之儲裴敬謝之老父遂命求炭數斤坎地為鑪熾火少頃命取小磚瓦如手指大者數枚燒之少頃皆赤懷中取少藥投之乃生紫烟食頃變為金矣約重百兩以授裴子謂裴曰此價倍於常者度君家事三年之蓄矣吾自此去候君家罄盡當復來耳裴氏兄弟益敬老父拜之因問其居曰後當相示焉訣别而去裴氏乃貨其金而積糧明年遇水旱獨免其災後三年老父復至又燒金以遺之裴氏兄弟一人願從學老父遂將西去數里至太白山西巖下一大盤石左有石壁老父以杖叩之須臾開乃一洞天有黄冠及小童迎接老父引裴生入洞初覺暗黑漸即明朗乃見城郭人物内有宮闕堂殿如世之寺觀焉道士玉童仙女無數相迎入盛歌樂諸道士或琴碁諷誦言論老父引裴氏禮謁謂諸人曰此城中主人也遂留一宿食以胡麻飯麟脯仙酒裴吿歸相與訣别老父復送出洞遺以金寳遣之謂裴曰君今未合久住且歸後二十年天下當亂此是太白左掩洞君至此時可還來此吾當迎接裴子拜别比至安史亂裴氏全家而去𨼆於洞中數年居處仙境咸受道術亂定復出兄弟數人皆至大官一家良賤亦蒙壽考焉出原化記崔煒貞元中有崔煒者故監察向之子也向有詩名於人間終于南海從事煒居南海意豁然也不事家産多尚豪俠不數年財業殫盡多棲止佛舍時中元日番禺人多陳設珍異於佛廟集百戲於開元寺煒因窺之見乞食老嫗因蹶而覆人之酒甕當壚者毆之計其直僅一緡耳煒憐之脱衣為償其所直嫗不謝而去異日又來吿煒曰謝子為脱吾難吾善灸贅疣今有越井岡艾少許奉子每遇疣贅只一炷耳不獨愈苦兼獲美艷煒笑而受之嫗倐亦不見後數日因遊海光寺遇老僧贅于耳煒因出艾試灸之而如其説僧感之甚謂煒曰貧道無以奉酬但轉經以資郎君之福祐耳此山下有一任翁者藏鏹巨萬亦有斯疾君子能療之當有厚報請為書導之煒曰然任翁一聞喜躍禮請甚謹煒因出艾一􅅡而愈任翁吿煒曰謝君子痊我所苦無以厚酬有錢十萬奉子幸從容無草草而去煒因留彼煒善絲竹之妙聞主人堂前彈琴聲詰家童對曰主人之愛女也因請其琴而彈之女潛聽而有意焉時任翁家事鬼曰獨脚神每三嵗必殺一人饗之時已逼矣求人不獲任翁俄負心召其子計之曰門下客既不來無血屬可以為饗吾聞大恩尚不報况愈小疾耳遂令具神饌夜將半擬殺煒已潛扃煒所處之室而煒莫覺女密知之潛持刃於窻隙間吿煒曰吾家事鬼今夜當殺汝而祭之汝可持此破窻遁去不然者少頃死矣此刃亦望持去無相累也煒恐悸汗流揮刃携艾斷窻櫺躍出拔鍵而走任翁俄覺率家僮十餘軰持刃秉炬追之六七里幾及之煒因迷道失足墜于大枯井中追之失蹤而返煒雖墜井為槁葉所籍而無傷及曉視之乃一巨穴深百餘丈無計可出四旁嵌空宛轉可容千人中有一白虵盤屈可長數丈前有石臼巖上有物滴下如飴蜜注臼中虵就飲之煒察虵有異乃叩首祝之曰龍王某不幸墜于此願王憫之幸不相害因飲其餘亦不饑渴細視虵之唇吻亦有疣焉煒感虵之見憫欲為灸之奈無從得火既久有遙火飄入于穴煒乃燃艾啓虵而灸之是贅應手墜地虵之飲食久妨礙及去頗以為便遂吐徑寸珠酬煒煒不受而啓虵曰龍王能施雲雨隂陽莫測神變由心行藏在已必能有道拯援沉淪倘賜挈維得還人世則死生感激銘在肌膚但得一歸不願懷寳虵遂咽珠蜿蜒將有所適煒遂再拜跨虵而去不由穴口只於洞中行可數十里其中幽暗若漆但虵之光燭兩壁時見繪畫古丈夫咸有冠帶最後觸一石門門有金獸齧環洞然明朗虵低首不進而卸下煒煒將謂已達人世矣入戸但見一室空闊可百餘步穴之四壁皆鐫為房室當中有錦繡幃帳數間垂金泥紫更飾以珠翠炫晃如明星之連綴帳前有金爐爐上有蛟龍鸞鳳龜虵鸞雀皆張口噴出香烟芳芬蓊欝傍有小池砌以金璧貯以水銀鳬鷖之類皆琢以瓊瑤而泛之四壁有床咸飾以犀𧰼上有琴瑟笙簧鼗鼓柷敔不可勝記煒細視手澤尚新煒乃恍然莫測是何洞府也良久取琴試彈之四壁戸牖咸啓有小青衣出而笑曰玉京子已送崔家郎君至矣遂却走入須臾有四女皆古環髻曵霓裳之衣謂煒曰何崔子擅入皇帝𤣥宫耶煒乃舍琴再拜女亦酬拜煒曰既是皇帝𤣥宫皇帝何在曰暫赴祝融宴爾遂命煒就榻鼓琴煒乃彈胡笳女曰何曲也曰胡笳也曰何為胡笳吾不曉也煒曰漢蔡文姬即中郎邕之女也沒于胡中及歸感胡中故事因撫琴而成斯弄像胡中吹笳哀咽之韻女皆怡然曰大是新曲遂命酌醴傳觴煒乃叩首求歸之意頗切女曰崔子既來皆是宿分何必匆遽幸且淹駐羊城使者少頃當來可以隨往謂崔子曰皇帝已許田夫人奉箕箒便可相見崔子莫測端倪不敢應答遂命侍女召田夫人夫人不肯至曰未奉皇帝詔不敢見崔家郎也再命不至謂煒曰田夫人淑徳美麗世無儔匹願君子善奉之亦宿業耳夫人即齊王女也崔子曰齊王何人也女曰王諱横昔漢初亡齊而居海島者逡廵有日影入照坐中煒因舉首上見一穴𨼆𨼆然覩人間天漢耳四女曰羊城使者至矣遂有一白羊自空冉冉而下須臾至座背有一丈夫衣冠儼然執大筆兼封一青竹簡上有字進於香几上四女命侍女讀之曰廣州刺史徐紳死安南都䕶趙昌充替女酌醴飲使者曰崔子欲歸番禺願為挈往使者唱喏廻謂煒曰他日須與使者易服緝宇以相酬勞煒但唯唯四女曰皇帝有勅令與郎君國寳陽燧珠將往至彼當有胡人具十萬緡而易之遂命侍女開玉函取珠授煒煒再拜捧受謂四女曰煒不曾朝謁皇帝又非親族何遽貺遺如是女曰郎君先人有詩于越臺感悟徐紳遂見修緝皇帝媿之亦有詩繼和賚珠之意已露詩中不假僕説郎君豈不曉耶煒曰不識皇帝何詩女命侍女書題于羊城使者筆管上云千載􅂽臺隳路隅一煩太守重椒塗感君拂拭意何極報爾美婦與明珠煒曰皇帝原何姓字女曰已後當自知耳女謂煒曰中元日須具美酒豐饌于廣州蒲澗寺静室吾軰當送田夫人往煒遂再拜吿去欲躡使者之羊背女曰知有鮑姑艾可留少許煒但留艾即不知鮑姑是何人也遂留之瞬息而出穴履于平地遂失使者與羊所在望星漢時已五更矣俄聞蒲澗寺鐘聲遂抵寺僧人以早糜見餉遂歸廣州崔子先有舍税㞐至日徃舍詢之曰已三年矣主人謂崔煒曰子何所適而三秋不返煒不實吿開其户塵榻儼然頗懷悽愴問刺史則徐紳果死而趙昌替矣乃抵波斯邸潛鬻是珠有老胡人一見遂匍匐禮手曰郎君的入南越王趙佗墓中來不然者不合得斯寳蓋趙佗以珠為殉故也崔子乃具實吿方知皇帝是趙佗佗亦曾稱南越武帝故耳遂具十萬緡易之崔子詰胡人曰何以辨之曰我大食國寳陽燧珠也昔漢初趙佗使異人梯山航海盜歸番禺今僅千載矣我國有能𤣥𧰼者言來嵗國寳當歸故我王召我具大舶重資抵番禺而搜索今日果有所獲矣遂出玉液而洗之光鑒一室胡人遽泛舶歸大食去煒得金遂具家産然訪羊城使者竟無影響後有事于城隍廟忽見神像有類使者又覩神筆上有細字乃侍女所題也方具酒脯而奠之兼重粉繢及廣其宇是知羊城即廣州城廟有五羊焉又徵任翁之室則村老云南越尉任囂之墓耳又登越王殿臺覩先人詩云越井岡頭松栢老越王臺上生秋草古墓多年無子孫野人􅂿踐成官道兼越王繼和詩蹤跡頗異乃詢主者主者曰徐大夫紳因登此臺感崔侍御詩故重粉飾臺殿所以煥赫耳後將及中元日遂豐潔香饌甘醴留蒲澗寺僧室夜將半果四女伴田夫人至容儀艷逸言㫖雅淡四女與崔生進觴諧謔將曉吿去崔子遂再拜訖致書達於越王卑辭厚禮敬荷而已遂與夫人歸室煒詰夫人曰既是齊王女何以配南越人夫人曰某國破家亡遭越王所虜為嬪御王崩因以為殉乃不知今是幾時也看烹酈生如昨日耳每憶故事輙一澘然煒問曰四女何人曰其二甌越王搖所獻其二閩越王無諸所進俱為殉者又問曰昔四女云鮑姑何人也曰鮑靚女葛洪妻也多行灸於南海煒方歎駭昔日之嫗耳又曰呼虵為玉京子何也曰昔安期生長跨斯龍而朝玉京故號之玉京子煒因在穴飲龍餘沫肌膚少嫩筋力輕徤後居南海十餘載遂散金破産棲心道門乃挈室往羅浮訪鮑姑後竟不知所適出傳竒太平廣記卷三十四
