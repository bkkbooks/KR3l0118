body:
  text: 太平廣記巻四百五十二宋李昉等編狐六任氏李萇任氏任氏女妖也有韋使君者名崟第九信安王禕之外孫少落拓好飲酒其從父妺婿曰鄭六不記其名早習武藝亦好酒色貧無家託身於妻族與崟相得遊處不間唐天寳九年夏六月崟與鄭子偕行於長安陌中將㑹飲于新昌里至宣平之南鄭子辭有故請間去繼至飲所崟乗白馬而東鄭子乗驢而南入昇平之北門偶值三婦人行於道中中有白衣者容色姝麗鄭子見之驚悦策其驢忽先之忽後之將挑而未敢白衣時時盼睞意有所受鄭子戲之曰美艷若此而徒行何也白衣笑曰有乗不解相假不徒行何為鄭子曰劣乗不足以代佳人之歩今輙以相奉某得歩從足矣相視大笑同行者更相眩誘稍已狎暱鄭子随之東至樂遊園已昬黒矣見一宅土垣車門室宇甚嚴白衣將入顧曰願少踟蹰而入女奴從者一人留於門屏間問其姓第鄭子既告亦問之對曰姓任氏第二十少項延入鄭縶驢於門置㡌于鞍始見婦人年三十餘與之承迎即任氏姊也列燭置膳舉酒數觴任氏更粧而出酣飲極歡夜乆而寢其妍姿美質歌笑態度舉措皆艷殆非人世所有將曉任氏曰可去矣某兄弟名係教坊職属南衙晨興將出不可淹留乃約後期而去既行及里門門扄未發門旁有胡人鬻餅之舎方張燈熾爐鄭子憇其簾下坐以候鼓因與主人言鄭子指宿所以問之曰自此東轉有門者誰人之宅主人曰此隤墉棄地無第宅也鄭子曰適過之曷以云無與之固爭主人適悟乃曰吁我知之矣此中有一狐多誘男子偶宿嘗三見矣今子亦遇乎鄭子赧而隠曰無質明復視其所見土垣車門如故窺其中皆蓁荒及廢圃耳既歸見崟崟責以失期鄭子不泄以他事對然想其艷冶願復一見之心嘗存之不忘經十許日鄭子遊入西市衣肆瞥然見之曩女奴從鄭子遽呼之任氏側身周旋於稠人中以避焉鄭子連呼前迫方背立以扇障其後曰公知之何相近焉鄭子曰雖知之何患對曰事可愧恥難施靣目鄭子曰勤想如是忍相棄乎對曰安敢棄也懼公之見惡耳鄭子發誓詞㫖益切任氏乃迴眸去扇光彩艷麗如初謂鄭子曰人間如某之比者非一公自不識耳無獨怪也鄭子請之與叙歡對曰凢某之流為人惡忌者非他為其傷人耳某則不然若公未見惡願終己以奉巾櫛鄭子許與謀棲止任氏曰從此而東大樹出於棟間者門巷幽靜可税以居前時自宣平之南乗白馬而東者非君妻之昆弟乎其家多什器可以假用是時崟伯叔從役於四方三院什器皆貯藏之鄭子如言訪其舎而詣崟假什器問其所用鄭子曰新獲一麗人已稅得其舎假具以備用崟笑曰觀子之貌必獲詭陋何麗之絶也崟乃悉假帷帳榻席之具使家僮之慧􅃛者隨以覘之俄而奔走返命氣吁汗洽崟迎問之有乎曰有又問客若何曰奇怪也天下未嘗見之矣崟姻族廣茂且夙從逸遊多識美麗乃問曰孰若某美僮曰非其倫也崟遍比其佳者四五人皆曰非其倫是時吴王之女有第六者則崟之内妹穠艷如神仙中表素推第一崟問曰孰與吴王家第六女美又曰非其倫也崟撫手大駭曰天下豈有斯人乎遽命汲水澡頸巾首膏脣而徃既至鄭子適出崟入門見小僮擁篲方掃有一女奴在其門他無所見徴於小僮小僮笑曰無之崟周視室内見紅裳出於戸下廹而察焉見任氏戢身匿於扇間崟别出就明而觀之殆過於所傳矣崟愛之發狂乃擁而淩之不服崟以力制之方􅇥則曰服矣請少廻旋既從則捍禦如初如是者數四崟乃悉力􅇥持之任氏力竭汗若濡雨自度不免乃縱體不復拒抗而神色慘變崟問曰何色之不悦任氏長嘆息曰鄭六之可哀也崟曰何謂對曰鄭生有六尺之軀而不能庇一婦人豈丈夫哉且公少豪侈多獲佳麗遇某之比者衆矣而鄭生窮賤耳所稱愜者唯某而已忍以有餘之心而奪人之不足乎哀其窮餒不能自立衣公之衣食公之食故為公所繋耳若糠糗可給不當至是崟豪俊有義烈聞其言遽置之歛袵而謝曰不敢俄而鄭子至與崟相視咍樂自是凢任氏之薪粒牲餼皆崟給焉任氏時有經過出入或車馬轝歩不常所止崟日與之逰甚歡每相狎暱無所不至唯不及亂而已是以崟愛之重之無所怪惜一食一飲未嘗忘焉任氏知其愛己因言以謝曰愧公之見愛甚矣顧以陋質不足以答厚意且不能負鄭生故不得遂公歡某秦人也生長秦城家本伶倫中表姻族多為人寵媵以是長安狹斜悉與之通或有妹麗恱而不得者為公致之可矣願持此以報徳崟曰幸甚􅆵中有鬻衣之婦曰張十五娘者肌體凝潔崟常悦之因問任氏識之乎對曰是某表娣妺致之易耳旬餘果致之數月厭罷任氏曰市人易致不足展効或有幽絶之難謀者試言之願得盡智力焉崟曰昨者寒食與二三子遊於千福寺見刁將軍緬張樂於殿堂有善吹笙者年二八䨇鬟垂耳嬌姿艷絶當識之乎任氏曰此寵奴也其母即妾之内姊也求之可也崟拜於席下任氏許之乃出入刁家月餘崟促問其計任氏願得䨇縑以為賂崟依給焉後二日任氏與崟方食而緬使蒼頭控青驪以迓任氏任氏聞召笑謂崟曰諧矣初任氏加寵奴以病針餌莫減其母與緬憂之方甚將徴諸巫任氏宻賂巫者指其所居使言從就為吉及視疾巫曰不利在家宜出居東南某所以取生氣緬與其母詳其地則任氏之第在焉緬遂請居任氏謬辭以偪狹勤請而後許乃輦服玩并其母偕送于任氏至則疾愈未數日任氏宻引崟以通之經月乃孕其母懼遽歸以就緬由是遂絶他日任氏謂鄭子曰公能致錢五六千乎將為謀利鄭子曰可遂假求於人獲錢六千任氏曰鬻馬於市者馬之股有疵可買以居之鄭子如市果見一人牽馬求售者青在左股鄭子買以歸其妻昆弟皆􅅓之曰是棄物也買將何為無何任氏曰馬可鬻矣當獲三萬鄭子乃賣之有醻二萬鄭子不與一市盡曰彼何苦而貴買此何愛而不鬻鄭子乗之以歸買者随至其門累増其估至二萬五千也不與曰非三萬不鬻其妻昆弟聚而詬之鄭子不獲已遂賣登三萬既而宻伺買者徴其由乃昭應縣之御馬疵股者死三嵗矣厩吏不時除籍官徴其估計錢六萬設其以半買之所獲尚多矣若有馬以備數則三年芻粟之估皆吏得之且所償蓋寡是以買耳任氏又以衣服故弊乞衣於崟崟將買全綵與之任氏不欲曰願得成製者崟召市人張大為買之使見任氏問所欲張大見之驚謂崟曰此必天人貴戚為郎所竊且非人間所宜有者願速歸之無及於禍其容色之動人也如此竟買衣之成者而不自紉縫也不曉其意後嵗餘鄭子武調授槐里府果毅尉在金城縣時鄭子方有妻室雖晝遊於外而夜寢于内多恨不得轉其夕將之官邀與任氏俱去任氏不欲徃曰旬月同行不足以為歡請計給糧餼端居以遲歸鄭子懇請任氏愈不可鄭子乃求崟資助崟與更勸勉且詰其故任氏良乆曰有巫者言某是嵗不利西行故不欲耳鄭子甚惑也不思其他與崟大笑曰明智若此而為妖惑何哉固請之任氏曰儻巫者言可徴徒為公死何益二子曰豈有斯理乎懇請如初任氏不得已遂行崟以馬借之出祖于臨臯揮􅃑别去信宿至馬嵬任氏乗馬居其前鄭子乗驢居其後女奴别乘又在其後是時西門圉人敎獵狗于洛川已旬日矣適值於道蒼犬騰出于草間鄭子見任氏歘然墜于地復本形而南馳蒼犬逐之鄭子随走呌呼不能止里餘為犬所獲鄭子銜涕出囊中錢贖以瘞之削木為記迴覩其馬囓草于路隅衣服悉委于鞍上履襪猶懸于鐙間若蟬蜕然唯首飾墜地餘無所見女奴亦逝矣旬餘鄭子還城崟見之喜迎問曰任子無恙乎鄭子泫然對曰殁矣崟聞之亦慟相持於室盡哀徐問疾故答曰為犬所害崟曰犬雖猛安能害人答曰非人崟駭曰非人何者鄭子方述本末崟驚訝嘆息不能已明日命駕與鄭子俱適馬嵬發瘞視之長慟而歸追思前事唯衣不自製與人頗異焉其後鄭子為総監使家甚富有􅇫馬十餘匹年六十五卒大厯中沈既濟居鍾陵甞與崟遊屢言其事故最詳悉後崟為殿中侍御史兼隴州刺史遂殁而不返嗟乎異物之情也有人焉遇暴不失節狥人以至死雖今婦人有不如者矣惜鄭生非精人徒恱其色而不徴其性情向使淵識之士必能揉變化之理察神人之際著文章之美𫝊要妙之情不止於賞翫風態而已惜哉建中二年既濟自左拾遺與金吴將軍裴冀京兆少尹孫成戸部郎中崔需右拾遺陸淳皆適居東南自秦徂吴水陸同道時前拾遺朱放因旅遊而随焉浮頴渉淮方舟㳂流晝讌夜話各徴其異説衆君子聞任氏之事共深嘆駭因請既濟傳之以志異云沈既濟撰李萇唐天寳中李萇為綘州司士攝司戸事舊傳此闕素凶㕔事若有小孔子出者司户必死天下共傳司户孔子萇自攝職便處此㕔十餘日兒年十餘嵗如厠有白裙婦人持其頭將上墻人救獲免忽不復見萇大怒罵空中以瓦擲中萇手表弟崔氏為本州恭軍是日至萇所言此野狐耳曲沃饒鷹犬當大致之俄又擲糞於崔杯中後數日犬至萇大獵獲狡狐數頭懸於簷上夜中聞簷上呼李司士云此是狐婆作祟何以枉殺我孃兒欲就司士一飲明日可具觴相待萇云已正有酒明早來及明酒具而狐至不見形影具聞其言萇因與交杯至狐其酒翕然而盡狐累飲三斗許萇唯飲二升忽言云今日醉矣恐失禮儀司士可罷狐婆不足憂矣明當送法禳之翌日萇將入衙忽聞簷上云領取法尋有一團紙落萇便開視中得一帖令施燈心席席後乃書符符法甚備萇依行之其怪遂絶出廣異記太平廣記巻四百五十二
