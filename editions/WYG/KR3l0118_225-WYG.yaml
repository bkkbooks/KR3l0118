body:
  text: 太平廣記卷二百二十五伎巧一因祇國葛由魯般弓人燕巧人雲明臺淫淵浦新豐張衡王肅凌雲臺陳思王呉夫人區純水芝欹器蘭陵王僧靈昭七寳鏡臺因祇國周成王五年有因祇國去王都九萬里來獻女功一人善工巧體貌輕潔披纎羅繡縠之衣長袖脩裾風至則結其衿帶恐飄颻不能自止也其人善織以五色絲内口中引而結之則成文錦其國人又獻雲崑錦文似雲從山嶽中出也有列堞錦文似雲霞覆城雉樓堞也有雜珠錦文似貫珮珠也有篆文錦文似大篆之文也有列明錦文似羅列燈燭也幅皆廣三尺其國丈夫皆勤於耕稼一日鋤十頃之地又貢嘉禾一莖盈車故時俗四言詩曰力耕十頃能致嘉穎出拾遺記葛由葛由蜀羗人能刻木爲羊賣之一旦乘羊入蜀城蜀之豪貴或隨之上綏山綏山高峻在峨眉之西隨者皆得道不復還故里語曰得綏山一桃雖不能仙亦足以豪山下多立祠焉出法苑珠林魯般魯般燉煌人莫詳年代巧侔造化於凉州造浮圖作木鳶每擊楔三下乘之以歸無何其妻有姙父母詰之妻具說其故其父後伺得鳶楔十餘下乘之遂至呉㑹呉人以爲妖遂殺之般又爲木鳶乘之遂獲父屍怨呉人殺其父於肅州城南作一木仙人舉手指東南呉地大旱三年卜曰般所爲也齎物巨千謝之般爲斷其一手其月呉中大雨國初土人尚祈禱其木仙六國時公輸班亦爲木鳶以窺宋城出酉陽雜俎弓人宋景公造弓九年乃成而進之弓人歸家三日而卒葢匠者心力盡於此弓矣後公登獸圏之臺用此弓射之矢越西霸之山彭城之東餘勁中石飲羽焉出淮南子燕巧人燕王徴巧術人請以棘之端爲沐母猴母猴成巧人曰人主欲觀之必半歲不入宫不飲酒食肉而霽日出視之宴隂之間而􅁄刺之母猴乃可見矣燕王恩養不能觀也出藝文𩔖聚雲明臺始皇起雲明臺窮四方之珍木捜天下之巧工南得烟丘碧𣗳酈水燃沙賁都朱泥雲岡素竹東得葱巒錦栢縹檖龍杉寒河星柘岏山雲梓西得漏海浮金浪淵羽璧滌嶂霞桑沈塘員籌北得㝠阜乾漆隂坂文梓寒流黑魄闇海香瓊珍異是集有二人皆騰虚椽木運斤斧於空中子時起功至午時已畢秦人皆謂之子午臺也亦言於子午之地各起一臺二說有疑出拾遺記淫淵浦日南之南有淫泉之浦言其水浸淫從地而出以成淵故曰淫泉也或言此泉甘軟男女飲之則淫其水小處可濫觴褰渉大處可方舟沿泝隨流屈直其水激石之聲似人之歌笑聞者令人淫動故俗謂之淫泉時有鳬鴈色如金羣飛戲於沙瀨羅者得之乃眞金鳬也昔秦破驪山之墳行野者見金鳬向南而飛至淫泉寳鼎元年張善爲日南太守郡民有得金鳬以獻太守張善善博識多通考其年月即是秦始皇墓金鳬也昔始皇爲塜斂天下瓌異生殉工人傾逺方竒寳於塜中爲江海川瀆及列山嶽之形以沙棠沉檀爲舟檝金銀爲鳬鴈以琉璃雜寳爲龜魚又於海中作玉象鯨魚銜火珠爲星以代膏燭光出塜間精靈之偉也皆生埋巧匠於塜裏又列燈燭如皎日焉先所埋工匠於塜内至被開時皆不死巧人於塚裏琢石爲龍鳳仙人之像及作碑文辭讚漢初發此塚驗諸史傳皆無列仙龍鳳之製則知生埋匠者之所作也後人更寫此碑文而辭多怨酷之言乃謂怨碑史記略而不録矣出拾遺記新豐高祖既作新豐并移舊社街巷棟宇物色如舊士女老幼相擕路首各知其室放犬羊雞鴨於通衢望途亦競識其家匠人胡寛所爲也移者皆喜其似而憐之故加賞贈月餘致累百金出西京雜記張衡後漢張衡字平子造候風地動儀以精銅鑄之圓徑八尺葢合隆起形如酒罇飾以篆文及山龜鳥獸之狀中有都柱傍行八道施關發機外八龍首各銜銅丸下有蟾蜍張口承之其牙機巧制皆隱在罇中覆葢周密無際如有地震則罇動機發龍吐丸而蟾蜍銜之震動激揚伺者因此覺知一龍發機而七首不動尋其方面乃知震動之所在儀之合契若神自書典所記未之有也曾一龍發機而地不動京師學者初咸怪其無徴數日驛至果地動於是皆服其神妙出後漢書王肅王肅造逐䑕丸以銅爲之晝夜自轉出酉陽雜俎凌雲臺凌雲臺樓觀極精巧先稱平衆材輕重當宜然後造構乃無錙銖相負揭臺雖高峻恒隨風揺動而終無崩殞魏明帝登臺懼其勢危别以大材扶持之樓即便頽壊論者謂輕重力偏故也出世說陳思王魏陳思王有神思爲鴨頭杓浮於九曲酒池王意有所勸鴨頭則廻向之又爲鵲尾杓柄長而直王意有所到處於罇上鏇之鵲則指之闕呉夫人呉主趙夫人趙達之妹也善畫巧妙無雙能於指間以彩絲織爲雲龍虬鳳之錦大則盈尺小則方寸宫中謂之機絕孫權常嘆魏蜀未夷軍旅之隙思得善畫者使圖作山川地勢軍陣之像達乃進其妹權使寫九州江湖方嶽之勢夫人曰丹青之色甚易歇滅不可乆寳妾能刺繡列萬國於方帛之上寫以五嶽河海城邑行陣之形乃進於呉主時人謂之針絕雖􅁄刺木猴雲梯飛鳶無過此麗也權居昭陽宫倦暑乃褰紫綃之帷夫人曰此不足貴也權使夫人指其意思焉答曰妾欲窮慮盡思能使下絹帷而清風自入視外無有蔽礙列侍者飄然自凉若馭風而行也權稱善夫人乃㭊髮以神膠續之神膠出鬱夷國接弓弩之斷絃者百斷百續乃織爲羅縠累月而成裁之爲幔内外視之飄飄如煙氣輕動而房内自凉時權尚在軍旅常以此幔自隨以爲征幕舒之則廣縱數丈卷之則可内於枕中時人謂之絲絕故呉有三絕四海無儔其妙後有貪寵求媚者言夫人多耀於人主因而致退黜雖見疑墜猶存録其巧工及呉亡不知所在出王子年拾遺區純大興中衡陽區純作䑕市四方丈餘開四門門有木人縱四五䑕於中欲出門木人輒以椎椎之出晉陽秋水芝欹器西魏文帝造二欹器其一爲二仙人共持一鉢同處一盤葢有山山有香氣别有一仙人持一金缾以臨器上以水灌山則出於缾而注於器煙氣通發山中謂之仙人欹器也其一爲二荷同處一盤相去盈尺中有芙蓉下埀器上以水注芙蓉而盈於器又爲鳬鴈蟾蜍以飾之謂之水芝欹器二盤各有一牀一鉢鉢圓而牀方中有人焉言三才之象也器如觥形滿則平溢則傾置之前殿以警滿盈焉闕蘭陵王北齊蘭陵王有巧思爲舞胡子王意欲所勸胡子則捧盞以揖之人莫知其所由也出朝野僉載僧靈昭北齊有沙門靈昭甚有巧思武成帝令於山亭造流杯池船每至帝前引手取杯船即自住上有木小兒撫掌遂與絲竹相應飲訖放杯便有木人刺還上飲若不盡船終不去未幾靈昭忽拊心疑有刀刺須㬰吐血而終七寳鏡臺胡太后使靈昭造七寳鏡臺合有三十六室别有一婦人手各執鏁纔下一關三十六户一時自閉若抽此關諸門咸啓婦人各岀户前出皇覽太平廣記卷二百二十五
