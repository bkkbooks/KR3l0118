body:
  text: 太平廣記卷三百一神十一汝陰人崔敏慤張安仇嘉福食羊人王晙汝陰人汝陰男子姓許少孤爲人白晳有姿調好鮮衣良馬遊騁無度常牽黄犬逐獸荒澗中倦息大樹下樹高百餘尺大數十圍高柯旁挺􅂷陰連數畝仰視枝間懸一五色綵囊以爲誤有遺者乃取歸而結不可解甚愛異之置巾箱中向暮化成一女子手把名紙直前云王女郎令相聞致名訖遂去有頃異香滿室漸聞車馬之聲許出户望見列燭成行有一少年乘白馬從十餘騎在前直來詣許曰小妹麤家竊慕盛徳欲託良緣於君子如何許以其神不敢苦辭少年即命左右灑掃别室須臾女車至光香滿路侍女乘馬數十人皆有美色持歩障擁女郎下車延入别室幃帳茵蓆畢具家人大驚視之皆見少年促許沐浴進新衣侍女扶入女室女郎年十六七豔麗無雙著青袿䙱珠翠璀錯下階答拜共升堂訖少年乃去房中施雲母屛風芙蓉翠帳以鹿瑞錦障暎四壁大設珍殽多諸異果甘美鮮香非人間者食器有七子螺九枝盤紅螺杯蕖葉碗皆黃金隱起錯以瑰碧有玉罍貯車師葡萄酒芬馨酷烈座上置連心蠟燭悉以紫玉爲盤光明如晝許素輕薄無檢又爲物色夸眩意甚悦之坐定許問曰鄙夫固陋蓬室湫隘不意乃能見顧之深歡忭交幷未知所措答曰大人爲中樂南部將軍不以兒之幽賤欲使託身君子躬奉砥礪幸遇良會欣願誠深又問南部將軍今何官也曰是嵩君别部所治若古之四鎮將軍也酒酣歎曰今夕何夕見此良人詞韻清􅆺非所聞見又援箏作飛鴻别鶴之曲宛頸而歌爲許送酒清聲哀暢容態蕩越殆不自持許不勝其情遽前擁之乃㣲盼而笑曰既爲詩人感帨之譏又玷其客挂纓之笑如何因顧令徹筵去燭就帳恣其歡狎豐肌弱骨柔滑如飴明日徧召家人大申婦禮賜與甚厚積三日前少年又來曰大人感愧良甚願得相見使某奉迎乃與俱去至前獵處無復大樹矣但見朱門素壁若今大官府中左右列兵衛皆迎拜少年引入見府君冠平天幘絳紗衣坐高殿上庭中排㦸設纛許拜謁府君爲起揖之升階勞問曰小女幼失所恃幸得託奉高明感慶無量然此亦冥期神契非至精相感何能及此許謝乃與入内門宇嚴邃環廊曲閣連亘相通中堂高會酣燕正歡因令設樂絲竹繁錯曲度新竒歌妓數十人皆妍冶上色既罷乃以金帛厚遺之幷資僕馬家送贍給仍爲起宅於里中皆極豐麗女郎雅善𤣥素養生之術許體力精爽倍於常矣以此知其審神人也後時一歸皆女郎相隨府君輒饋送甚厚數十年有子五人而姿色無損後許卒乃攜子俱去不知所在也出廣異記崔敏慤博陵崔敏慤性耿直不懼神鬼年十歲時嘗暴死死十八年而後活自説被枉追敏慤苦自申理歲餘獲放王謂敏慤曰汝合却還然屋舍已壞如何敏慤祈固求還王曰宜更托生倍與官禄敏慤不肯王難以理屈徘徊久之敏慤陳訴稱寃王不得已使人至西國求重生藥數載方還藥至布骨悉皆生肉唯腳心不生骨遂露焉其後家頻夢敏慤云吾已活遂開棺初有氣養之月餘方愈敏慤在㝠中檢身當得十政刺史遂累求凶闕輕侮鬼神卒獲無恙其後為徐州刺史皆不敢居正㕔相𫝊云項羽故殿也敏慤到州即敕灑掃視事數日空中忽聞大呌曰我西楚霸王也崔敏慤何人敢奪吾所居敏殼徐云鄙哉項羽生不能與漢高祖西嚮爭天下死乃與崔敏慤競一敗屋乎且王死烏江頭行萬里縦有餘靈何足畏也乃帖然無聲其㕔遂安後爲華州刺史華岳祠傍有人初夜聞廟中喧呼及視庭燎甚盛兵數百人陳列受勅云當與三郎迎婦又曰崔使君在州勿妄飄風暴雨皆云不敢既出遂無所見出廣異記張安𤣥宗時詔所在功臣烈士貞女孝婦令立祠祀之江州有張安者性落拓不羇有時獨醉高歌市中人或笑之則益甚以至於手舞足蹈終不愧耻時或冠帶潔淨懷刺謁官吏自稱浮生子後忽無疾而終家人既𦵏之每至夜其魂即謁州牧求立祠廟言詞慷慨不異生存時李𤣥爲牧氣直不信妖妄及累聞左右啓白遂朝服而坐召問之其魂隨召而至𤣥問曰爾已死何能復化如人言詞朗然求見於余得何道致此必須先言余即與爾議祠宇之事其魂曰大凡人之靈無以尚之物之妖怪雖竊有靈則雲與泥矣夫人禀天地和會之氣方能成形故人面負五嶽四瀆之相頭𧰼天之圓足象地之方自有智可以料萬事自有勇可以敵百惡又那無死後之靈耶況浮生子生之日不以生爲生死之日不以死爲死其生也既異於衆其死也亦異於衆生於今日聞使君之明遇天子之恩若不求一祠則後人笑浮生子不及前代死者婦人女子也幸詳而念之設若廟食自使君也則浮生子死且貴於生又足以見人間貪生惡死之非也州牧曰天子立前代之功臣烈士孝女貞婦之祠者示勸戒欲後人倣效之茍立祠於爾不知以何使後人倣效耶魂曰浮生子無功無孝無貞可紀也使君殊不知達人之道高尚於功烈孝貞也州牧無以屈命私立祠焉出瀟湘錄仇嘉福唐仇嘉福者京兆富平人家在簿臺村應舉入洛出京遇一少年狀若王者裘馬僕從甚盛見嘉福有喜狀因問何適嘉福云應舉之都人云吾亦東行喜君相逐嘉福問其姓云姓白嘉福竊思朝廷無白氏貴人心頗疑之經一日人謂嘉福君驢弱不能偕行乃以後乘見載數日至華嶽廟謂嘉福曰吾非常人天帝使我案天下鬼神今須入廟鞫問君命相與我有舊業已如此能入廟否事畢當俱入都嘉福不獲已隨入廟門便見翠幙雲黯陳設甚備當前有牀貴人當案而坐以竹倚牀坐嘉福尋有教呼嶽神神至俯伏貴人呼責數四因命左右曳出徧召關中諸神㸃名閲視末至昆明池神呼上階語請嘉福宜小逺無預此議嘉福出堂後幕中聞幕外有痛楚聲抉幕見已婦懸頭在庭樹上審其必死心色俱壊須臾貴人召還見嘉福色惡問其故具以實對再命審視還答不謬貴人驚云君婦若我婦也寧得不料理之遂傳教召嶽神神至問何以取簿臺村仇嘉福婦致楚毒神初不之知有碧衣人云是判官自後代對曰此事天曹所召今見書狀送貴人令持案來有左右封印之至天帝所當持出已自白帝顧謂嶽神可即放還亦謂嘉福本欲至都今不可矣宜速還富平因屈指料行程云四日方至恐不及事當以駿馬相借君後見思可於淨室焚香我當必至言訖辭去既出門神僕䇿馬亦至嘉福上馬便至其家家人倉卒悲泣嘉福直入去婦靣衣候氣頃之遂活舉家歡慶村里長老壺酒相資數日不已其後四五日本身騎驢與奴同還家人不之辨也内出外入相遇便合方知先還即其魂也後歲餘嘉福又應舉之都至華嶽祠下遇鄧州崔司法妻暴亡哭聲哀甚惻然憫之躬往詣崔令其輟哭許爲料理崔甚忻悦嘉福焚香淨室心念貴人有頃遂至歡叙畢問其故此是嶽神所爲誠可留也爲君致二百千先求錢然後下手因書九符云先燒三符若不愈更燒六符當還矣言訖飛去嘉福以神言告崔崔不敢違始燒三符日晚未愈又燒其餘須臾遂活崔問其妻初入店時忽見雲母車在階下健卒數百人各持兵器羅列左右𫝊言王使相迎倉卒隨去王見喜方欲結歡忽有三人來云太乙神問何以奪生人妻神惶懼持簿書云天配爲己妻非横取之然不肯遣須臾有大神五六人持斧杵至王庭徒衆駭散獨神立樹下乞宥其命王遂引已還嘉福自爾方知貴人是太乙神也爾後累思必至爲嘉福迴換五六政官大獲其力也出廣異記食羊人開元末有人好食羊頭者常晨出有怪在門焉羊頭人身衣冠甚偉告其人曰吾未之神也其屬在羊吾以汝好食羊頭故來求汝輟食則已若不爾吾將殺之其人大懼遂不復食出紀聞王晙王晙氣充雄壯有龍虎之狀慕義激勵有古人之風馭下整肅人吏畏而義之晙卒後信安王褘於幽州討奚告㨗奏稱軍士咸見晙領兵爲前軍討賊户部郎中楊伯成上疏請爲晙墳増封域降使享祭優其子孫𤣥宗從之出談實錄太平廣記卷三百一
