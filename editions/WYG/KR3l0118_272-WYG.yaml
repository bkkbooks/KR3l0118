body:
  text: 太平廣記卷二百七十二婦人三美婦人夷光麗娟趙飛鷰薛靈芸孫亮姬朝姝蜀甘后石崇婢翾風浙東舞女妬婦車武子妻段氏王道妻杜蘭香任環妻楊宏武妻房孺復妻李廷璧妻張楊妻吳宗文蜀功臣秦騎將美婦人夷光越謀滅吳畜天下竒寶美人異味以進於吳得隂峰之瑤古皇之驥湘沅之鱓又有美女一名夷光一名修明以貢於吳吳處於椒花之房貫細珠以為簾幌朝下以蔽景夕卷以待月二人當軒並坐理鏡靚粧於珠幌之内竊窺者莫不動心驚魂謂之神人吳王夫差目之若雙鸞之在輕霧沚水之漾秋蕖妖惑既深怠於國政及越兵入國乃抱二人以逃吳苑越軍既入見二人在竹樹下皆言神女望而不侵今吳城虵門内有折株尚為祠神女之處出王子年拾遺記麗娟漢武帝所幸宮人名曰麗娟年始十四玉膚柔軟吹氣如蘭身輕弱不欲衣纓拂恐傷為痕每歌李延年和之於闕芝生殿旁唱迴風之曲庭中樹為之翻落常致娟於琉璃帳恐垢汚體也常以衣帶繫娟袂閉於重幕中恐隨風起娟以琥珀為佩置衣裾裏不使人知乃言骨節自鳴相與為神怪也出洞冥記趙飛鷰漢趙飛鷰體輕腰弱善行步進退女弟昭儀不能及也但弱骨豐肌工笑語二人並色如紅玉當時第一擅殊寵後宫出西京雜記薛靈芸魏文帝所愛美人薛靈芸常山人也父名鄴爲酇鄉亭長母陳氏隨鄴舍於亭傍居生窮賤至夜每聚鄰婦以績燃麻藁自照靈芸年十五容貌絶世閭中少年多以夜時來窺終不得見咸熙元年谷習出守常山郡聞亭長有美女而家甚貧時文帝選良家子女以入六宫習以千金寳賂聘之既得便以獻文帝靈芸聞别父母㱆欷累日淚下霑衣至升車就路之時以玉唾壺盛淚壺中即如紅色既發常山及至京師壺中淚凝如血帝遣車十乘以迎靈芸車皆鏤金爲輪丹畫其轂軛前有雜寳爲龍鳳銜百子鈴鏘和鳴響於林野駕青色駢蹄之牛日行三百里此牛尸塗國所獻足如馬蹄也道側燒石葉之香此石重叠狀如雲母其氣辟惡厲之疾腹題國所獻也靈芸未至京師數十里膏燭之光相續不滅車從噎路塵起蔽於星月時人謂爲塵霄又築土爲臺基高三十丈列燭於臺下而名曰燭臺遠望如列星之墜地又於大道之傍一里致一銅表高五尺以誌里數故行者歌曰青槐夾道多塵埃龍樓鳳閣望崔嵬清風細雨雜香來土上出金火照臺此上七字是妖辭也時爲銅柱以誌里數於道側是土上出金之義以燭致臺下則火在土下之義漢火德王魏土德王火伏而土興也土上出金魏滅而晉興也靈芸未至京師十里帝乘雕玉之輦以望車徒之盛歎曰昔者言朝爲行雲暮爲行雨今非雲非雨非朝非暮因改靈芸之名爲夜來入宫承寵愛外國獻火珠龍鸞之釵帝曰明珠翡翠尚不勝况乎龍鸞之重乃止而不進夜來妙於女功雖處於深帷重幄之内不用燈燭裁製立成非夜來所縫製帝不服也宫中號曰針神出王子年拾遺記孫亮姬朝姝孫亮作緑琉璃屏風甚薄而瑩澈每於月下清夜舒之嘗愛寵四姬皆振古絶色一名朝姝二名麗居三名洛珍四名潔華使四人坐屏風内而外望之如無隔唯香氣不通於外爲四人合四氣香此香殊方異國所獻凡經歲踐躡宴息之處香氣沾衣歴年彌盛百浣不歇因名百濯香或以人名香故有朝姝麗居洛珍潔華香亮每遊此四人皆同與席使來侍皆以香名前後爲次不得相亂所居室爲思香媚寢出王子年拾遺記蜀甘后蜀先主甘后沛人生於賤微里中相者云此女後貴位極宫掖及后生而體貌特異年至十八玉質柔肌態媚容冶先主致后於白綃帳中於戸外望者如月下聚雪河南獻玉人高三尺乃取玉人致后側晝則講説軍謀夕則擁后而玩玉人常稱玉之所貴比德君子况爲人形而可不玩乎甘后與玉人潔白齊潤觀者殆相亂惑嬖寵者非唯嫉甘后而亦妬玉人后常欲琢毁壞之乃戒先主曰昔子罕不以玉爲寳春秋美之今吳魏未滅安以妖玩經懐凡淫惑生疑勿復進焉先主乃撤玉人像嬖者皆退當時君子以甘后爲神智婦人出王子年拾遺記石崇婢翾風石季倫所愛婢名翾風魏末於胡中買得之年始十歲使房内養之至年十五無有比其容貌特以姿態見美妙别玉聲能觀金色石氏之富財比王家驕侈當世珍寳瑰竒視如瓦礫聚如糞土皆殊方異國所得莫有辨識其處者使翾風别其聲色並如其所出之地言西方北方玉聲沈重而性温潤佩服益人性靈東方南方玉聲清潔而性清涼佩服者利人精神石氏侍人美艶者數千人翾風最以文辭擅愛石崇常語之曰吾百年之後當指白日以汝爲殉答曰生愛死離不如無愛妾得爲殉身其何朽於是彌見寵愛崇常擇美容姿相類者數十人裝飾衣服大小一等使忽視不相分别常侍于側使翾風調玉以付工人爲倒龍之珮縈金爲鳳冠之釵刻玉爲倒龍之勢鑄金像鳳凰之形結袖繞楹而舞晝夜相接謂之常舞若有所召者不呼姓名悉聽珮聲視釵色玉聲輕者居前金色艶者居後以爲行次而進也使數十人各含異香使行而笑語則口氣從風而颺又屑沈水之香如塵末布致象牀上使所愛踐之無跡即賜珍珠百琲若有跡者則節其飲食令體輕弱故閨中相戲曰爾非細骨輕軀那得百琲眞珠及翾風年至三十妙年者爭嫉之或言胡女不可爲羣競相排毁崇受譛潤之言即退翾風爲房老使主羣少乃懐怨懟而作五言詩詩曰春華誰不羡卒傷秋落時哽咽追自泣鄙退豈所期桂芬徒自蠧失愛在蛾眉坐見芳時歇憔悴空自嗤石氏房中並歌此爲樂曲至晉末乃止出王子年拾遺記淛東舞女寳厯二年浙東貢舞女二人一曰飛鸞一曰輕鳳修眉黰首蘭氣融冶冬不纊衣夏無汗體所食多荔枝榧實金屑龍腦之􅁼戴輕金之冠衣軿羅之衣無縫而成其文纎巧人未能識輕金冠以金絲結之爲鸞鶴之狀仍飾以五彩細珠玲瓏相續可高一尺秤之無三二錢上更琢玉芙蓉以爲頂二女歌舞臺每夜歌舞一發如鸞鳳之音百鳥莫不翔集其上及於庭際舞態艶逸非人間所有每歌罷上令内人藏之金屋寶帳葢恐風日所侵故也由是宫中語曰寶帳香重重一雙紅芙蓉出杜陽雜編妬婦車武子妻俗説車武子妻大妬呼其婦兄宿取一絳裙衣挂屏風上其婦拔刀徑上牀發被乃其兄也慙而退出要録段氏臨濟有妬婦津傳言晉太始中劉伯玉妻段氏字明光性妬忌伯玉嘗於妻前誦洛神賦語其妻曰取婦得如此吾無憾焉明光曰君何得以水神美而欲輕我吾死何患不爲水神其夜乃自沈而死死後七日夢見語伯玉曰君本願神吾今得為神矣伯玉遂終身不復渡水有婦人渡此津者皆壞衣枉粧然後敢濟不爾風波暴發醜婦雖盛粧飾而渡其神亦不妬也婦人渡河無風浪者以為醜不能致水神醜婦諱之莫不皆自毁形容以塞嗤笑也故齊人語曰欲求好婦立在津口婦人水旁好醜自彰出酉陽雜俎王導妻王導妻曹氏甚妬忌制丞相不得有侍御乃至左右小人有妍少者必加誚責乃密營别館衆妾羅列有數男曹氏知大驚恚乃將黄門及婢二十人入持食刀欲出討尋王公遽命駕患遲乃親以麈尾柄助御者打牛狼狽奔馳乃得先去司徒蔡謨聞乃詣王謂曰朝廷欲加公九錫知否王自叙謀志蔡曰不聞餘物惟聞短轅犢車長柄麈尾耳導大慙出妬記杜蘭香杜蘭香降張碩碩妻無子取妾妻妬無已碩謂香如此云何香曰此易治耳言卒而碩妻患創委頓碩曰妻將死如何香曰此創所以治妬創已亦當瘥數日之間創損而妻無妬心遂生數男出杜蘭香别傳任環妻唐初兵部尚書任環敕賜宫女二人皆國色妻妬爛二女頭髪禿盡太宗聞之令上宫齎金胡缾酒賜之云飲之立死環三品合置姬媵爾後不妬不須飲之若妬即飲栁氏拜敕訖曰妾與環結髪夫妻俱出微賤更相輔翼遂致榮官環今多内嬖誠不如死遂飲盡然非酖也既睡醒帝謂環曰其性如此朕亦當畏之因詔二女令别宅安置出朝野僉載又房𤣥齡夫人至妬太宗將賜美人屢辭不受乃令皇后召夫人語以媵妾之流令有常制且司空年近遲暮帝欲有優崇之意夫人執心不廻帝乃令謂曰寧不妬而生寧妬而死曰妾寧妬而死乃遣酌一巵酒與之曰若然可飲此一酖一舉便盡無所留難帝曰我尚畏見何况於𤣥齡乎出國史異纂楊宏武妻楊宏武爲司戎少常伯高宗謂之曰某人何因輒授此職對曰臣妻韋氏性剛悍昨以此見屬臣若不從恐有後患帝嘉不隠笑而遣之出國史異纂房孺復妻房孺復妻崔氏性妬忌左右婢不得濃粧高髻見給臙脂一豆粉一錢有一婢新買粧稍佳崔怒謂曰汝好粧耶吾爲汝粧乃令刻其眉以青塡之燒鏁桁灼其兩眼角皮隨焦卷以朱傅之及痂落瘢如粧焉出酉陽雜爼李廷璧妻李廷璧二十年應舉方於蜀中䇿名歌篇靡麗詩韻精能嘗爲舒州軍倅其妻猜妬一日鈴閣連宴三宵不歸妻逹意云來必刅之泣告州牧徙居佛寺浹辰晦迹因詠愁詩曰到來難遣去難留着骨黏心萬事休潘岳愁絲生􅁂裏婕妤悲色上眉頭長途詩盡空騎馬遠雁聲初獨倚樓更有相思不相見酒醒燈背月如鉤出杼情集張楊妻張楊尚書典晉州外貯所愛營妓生一子其内蘇氏妬忌不敢取歸乃與所善張處士爲子居江津間常致書題問其存亡資以錢帛及漸成長教其讀書有人告以非處士之子爾父在朝官高因竊其父與張處士緘札不告而遁歸京國楊已死至宅門僮僕無有識者但云江淮郎君兄弟皆愕然其嫡母蘇夫人泣而謂諸子曰誠有此子吾知之矣我少年無端致其父子死生永隔我罪多矣家眷衆泣取入宅齒諸兄之列名仁龜有文學修詞應進士舉及第歴侍御史因奉使江浙而死出北夢瑣言吳宗文王蜀吳宗文以功勲繼領名郡少年富貴其家姬僕樂妓十餘輩皆其精選也其妻妬每怏怏不愜其志忽一日鼓動趨朝已行數坊忽報云放朝遂密戒從者潛入遍幸之至十數輩遂據腹而卒出王氏見聞蜀功臣蜀有功臣忘其名其妻妬忌家畜妓樂甚多居常即隔絶之或宴飲即使隔簾幙奏樂某未嘗見也其妻左右常令老醜者侍之某嘗獨處更無侍者而居第器服甚盛後妻病甚語其夫曰我死若近婢妾立當取之及屬纊某乃召諸姬日夜酣飲爲樂有掌衣婢尤屬意即幸之方寢息忽有聲如霹􅋬帷帳皆裂某因驚成疾而死出王氏見聞秦騎將秦騎將石某者甚有戰功其妻悍且妬石常患之後其妻獨處乃夜遣人刺之妻手接其刃號救呌喊婢妾共撃賊遂折鐔而去竟不能害婦十指皆傷後數年秦亡入蜀蜀遣石將兵屯于褒梁復於軍中募俠士就家刺之褒蜀相去數千里俠士於是挾刃懐家書至其門曰褒中信至令面見夫人夫人喜出見俠拜而授其書捧接之際揮刃斫之妻有一女躍出舉手接刃相持乆之竟不能害外人聞而救之女十指並傷後十年蜀亡歸秦邦竟與其夫偕老死於牖下出玉堂閒話太平廣記卷二百七十二
