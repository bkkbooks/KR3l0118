body:
  text: 太平廣記卷二百四十六詼諧二蔡謨諸葛恢周顗韓博習鑿齒孫盛祖納郝隆羅友張融何承天王絢何朂謝靈運劉繪徐孝嗣沈文季沈昭畧胡諧之梁武柳信言徐摛徐陵李諧周捨王琳蔡謨晉王導妻妬導有衆妾在别館妻知之持食刀將往公遽命駕患牛遲手捉麈尾以柄助打牛蔡謨聞之後詣王謂曰朝廷欲加公九錫王自敘謙志蔡曰不聞餘物唯聞短轅犢車長柄麈尾導大慙出晉史諸葛恢晉諸葛恢與丞相王導共爭姓族先後王曰何以不言葛王而言王葛答曰譬如言驢馬驢寕勝馬也出啓顏録周顗晉庾亮造周顗顗曰君何忻悦而忽肥庾曰君何憂慘而瘦周曰吾無所憂直是清虚日來􅁾滓日去出南史韓博晉張天錫從事中郎韓博􅆢表并送盟文博有口才桓温甚稱之嘗大㑹温使司馬刁彛謂博曰卿是韓盧後博曰卿是韓盧後温笑曰刁以君姓韓故相問耳他人自姓刁那得是韓盧後博曰明公未之思爾短尾者則為刁闔坐推歎焉出啓顏録習鑿齒秦苻堅尅襄陽獲習鑿齒釋道安時鑿齒足疾堅見之與語大悦歎曰昔晉平吳利在二陸今破南土獲士一人有半蓋刺其蹇也初鑿齒嘗造道安譚論自贊曰四海習鑿齒安應聲曰彌天釋道安咸以為精對出晉春秋孫盛晉孫盛與殷浩談論往反精苦客主無間左右進食冷而復暖者數四彼我奮擲麈尾毛悉脱落滿餐飯中賓主遂至暮忘食殷乃語孫曰莫作强口馬我當捩卿鼻孫曰卿不見決鼻牛人當勞卿頸出南史祖納東晉光禄祖納少孤苦性至孝常自為母炊㸑作食王平聞其住知其常親供養乃以二婢餉之因以為吏人有戲之者奴價倍於婢祖答曰百里奚亦何必輕于五羖之皮耶出世説郝隆晉郝隆為南蠻參軍三月三日作詩曰娵隅躍清池桓温問何物答曰蠻名魚為娵隅桓曰何為作蠻語隆曰千里投公始得一蠻府參軍那得不作蠻語出世説羅友晉羅友家貧乞禄於桓温雖以才學遇之而謂其誕肆非治民才許而不用後同府人有得郡者温為坐飲叙别友亦被命至尤遲晩温問之答曰臣昨􅆢教㫖出門於中路見鬼揶揄云我只見汝送人上郡何不見人送汝上郡友始終慙廻以還解不覺成淹緩之罪温笑其滑稽而頗愧焉後以為襄陽太守出渚宮舊事張融宋張融嘗乞假還帝問所居答曰臣陸居非屋舟居非水上未解問張緒緒曰融近東山未有居止權牽小船上岸住在其間上大笑太祖嘗面許融為司徒長史敇竟不出融乘一馬甚痩太祖曰卿馬何痩給粟多少融曰日給一石帝曰何瘦如此融曰臣許而不與明日即除司徒長史融與謝寶積俱謁太祖融於御前放氣寶積起謝曰臣兄觸忤宸扆上笑而不問須臾食至融排寶積不與同食上曰何不與賢弟同食融曰臣不能與謝氣之口同盤上大笑出談藪何承天宋東海何承天徐廣之甥也除著作佐郎年已邁諸佐郎並名家少年潁川荀伯子嘲之嘗呼為妳母承天曰卿當知鳳凰將九子妳母何言耶出談藪王絢晉王絢彧之子六嵗外祖何尚之特加賞異受論語至郁郁乎文哉尚之戲曰可改為耶耶乎文哉吳蜀之人呼父為耶絢捧手對曰尊者之名安得為戲亦可道草翁之風必舅論語云草上之風必偃翁即指外祖也絢外祖何尚之舅即尚之子偃也出啓顏録何朂宋江夏王義恭性愛古物常遍就朝士求之侍中何朂已有所送而王徵索不已何甚不平嘗出行於道中見狗枷犢鼻乃命左右取之還以箱擎送之牋曰承復須古物今奉李斯狗枷相如犢鼻出因話錄謝靈運宋㑹稽太守孟顗事佛精懇謝靈運輕之謂顗曰得道應須慧業文人生天當在靈運前成佛必在靈運後顗深恨之出南史劉繪齊劉繪為南康郡郡人郅𩔖所居名􅁾里繪戲之曰君有何􅁾而居􅁾里答曰未審孔丘何闕而居闕里繪歎其辯給出談藪徐孝嗣齊僕射東海徐孝嗣修輯髙座寺多在彼宴息法雲師在蕭寺日夕各遊二寺鄰接而不相往來孝嗣嘗謂法雲曰法師嘗在高座而不遊高座寺答曰檀越既事蕭門何不至蕭寺出談藪沈文季齊太祖之為齊王也置酒為樂清河崔思祖侍宴謂侍中沈文季曰羮膾為南北所推文季答曰羮膾中乃是吳食非卿所知思祖曰炰鼈膾鯉似非句吳之詩文季曰千里蓴羮豈關魯衛之士帝稱美曰蓴羮頗須歸沈出談藪沈昭略齊黄門郎吳興沈昭略侍中文叔之子性狂俊使酒任氣朝士常憚而容之嘗醉負杖至蕪湖苑遇瑯琊王約張目視之曰汝王約耶何肥而癡約曰汝是沈昭略耶何痩而狂昭略撫掌大笑曰痩已勝肥狂又勝癡約景文之子出談藪胡諧之齊豫章胡諧之初為江州治中太祖委任之以其家人語傒語音不正乃遣宮内數人至諧之家教其子女二年上問之卿家語音正未答曰宮人少臣家人多非惟不能正音遂使宮人頓傒語上大笑徧向朝臣説之諧之歴位度支尚書豫州刺史出談藪梁武梁高祖嘗作五字叠韻曰後牖有榴柳命朝士並作劉孝綽曰梁王長康强沈約曰偏眠船舷邉庾肩吾曰載匕毎礙埭徐摛曰臣昨祭禹廟殘六斛熟鹿肉何遜用曹瞞故事曰暯蘇姑枯廬吳均沈思良久竟無所言高祖愀然不悦俄有詔曰吳均不均何遜不遜宜付廷尉出談藪柳信言梁安城王蕭佽博學善屬文天保之朝為一代文宗專掌詞令沈博歴侍中僕射尚書令有集三十卷著梁史百卷初佽以文詞擅名所敵擬者唯河東柳信言然柳内雖不伏而莫與抗及聞佽卒時為吏部尚書賓客候之見其屈一脚跳連稱曰獨歩來獨歩來衆賓皆舞忭以為笑樂出渚宮舊事徐摛梁侍中東海徐摛散騎常侍超之子也博學多才好為新變不拘舊體常體一人病癰曰朱血夜流黄膿晝瀉斜㸔紫肺正視紅肝又曰戸上懸簾明知是箔魚遊畏網判是見罾又曰牀非快馬蹋脚相連席異儒生帶經長臥摛子陵通直散騎常侍聘魏魏主客魏收曰今日之熱當由徐常侍來陵答曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收不能對出談藪徐陵北齊使來聘梁訪東海徐陵春秋荅曰小如來五嵗大孔子三年謂七十五也出談藪李諧梁陸晏子聘魏魏遣李諧郊勞過朝歌城晏子曰殷之餘人正應在此諧曰永嘉南渡盡在江外出談藪周捨梁汝南周捨少好學有才辯顧諧被使高麗以海路艱問於捨捨曰晝則揆日而行夜則考星而泊海大便是安流從風不足為遠河東裴子野在晏筵謂賓僚曰從事未嘗薑食捨曰孔稱不徹裴曰未嘗一座皆笑捨學通内外兼有口才謂沙門法雲師曰孔子不飲盜泉之水雲師何以捉鍮石香爐答曰檀越既能戴纛貧道何為不執鍮出談藪王琳後梁王琳明帝時為中書舍人博學有才藻好臧否人物衆畏其口常擬孔稚珪又為䱉表以託刺當時其詞曰臣䱉言伏見除書以臣為糝蒸將軍油蒸校尉臞州刺史脯腊如故者肅承明命灰身屏息慿臨鼎鑊俯仰兢懼臣聞高沙走姬非有意於綺羅江陵城西二十里有高秀湖其中有魚白鮹女兒豈期心於珠翠江陵丙河縈結呼曰􅀈河臣美愧夏鱣味慙冬鯉常恐鮐腹之譏懼貽鼈巖五甘反之誚是以潄流湖底枕石泥中不意高賞殊宏曲蒙鈞㧞遂得起昇綺席忝預玉盤爰厠玳筵猥煩象筯澤覃紫腴恩加黄腹方當鳴薑動桂紆蘇佩欓輕瓢纔動則樞槊如雲濃汁暫停則蘭膏成列婉轉綠韲之中逍遥朱脣之内銜恩噬澤九殞弗辭不任屏營之至謹到銅鐺門奉表以聞詔答曰省表是公卿池沼縉紳波渠後又穿蒲入苻一作藻肥滑素彰正膺兹選無勞謝也時惡之或以譏誚聞孝明亦弗之罪也其文傳於江表闕太平廣記卷二百四十六
