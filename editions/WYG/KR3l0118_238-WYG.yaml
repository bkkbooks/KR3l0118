body:
  text: 太平廣記卷二百三十八詭詐劉龍子郭純王燧唐同泰胡延慶朱前疑寜王安祿山白鐵余李慶遠劉𤣥佐張祜大安寺王使君劉崇龜李延召成都丏者薛氏子秦中子李全臯文處子劉龍子唐高宗峕有劉龍子妖言惑衆作一金龍頭藏袖中以羊腸盛蜜水繞繋之每聚衆出龍頭言聖龍吐水飲之百病皆差遂轉羊腸水于龍口中出與人飲之皆妄云病愈施捨無數遂起逆謀事發逃竄捕訪擒獲斬之于市并其黨十餘人出朝野僉載郭純東海孝子郭純䘮母每哭則羣烏大集使檢有實旌表門閭後訊乃是孝子每哭即撒飯于地羣烏爭來食其後數如此烏聞哭聲以為度莫不競湊非有靈也出朝野僉載王燧河東孝子王燧家猫犬互乳其子州縣上言遂䝉旌表乃是猫犬同峕産子取猫兒置犬窠中取犬子置猫窠内飲慣其乳遂以為常殆不可以異論也自知連理木合歡𤓰麥分岐禾同穗觸𩔖而長寔繁其徒並是人作不足怪焉出朝野僉載唐同泰唐同泰于洛水得白石紫文云聖母臨水永昌帝業進之授五品果毅置永昌縣乃是將石鑿作字以紫石末和藥嵌之後并州文水縣于谷中得一石還如此有武興字改文水為武興縣自是往往作之後知其偽不復採用乃止出國史補胡延慶襄州胡延慶得一龜以丹漆書其腹曰天子萬萬年以進之鳯閣侍郎李昭德以刀刮之並盡奏請付法則天曰此非惡心也捨而不問出國史補朱前疑則天好禎祥拾遺朱前疑説夢云則天頭白更黑齒落更生即授都官郎中司刑寺繫三百餘人秋分後無計可作乃于内獄外羅牆角邊作聖人跡長五尺至夜半衆人一時大呌内使推問對云昨夜有聖人見身長三丈面作金色云汝等並寃枉不須憂慮天子萬年即有恩赦放汝把火照視見有巨跡即大赦天下改為大足元年出唐國史寜王寜王嘗獵于鄠縣界搜林忽見草中一櫃扄鑰甚固命發視之乃一少女也詢其所自女言姓莫氏父亦曽仕昨夜遇一火賊賊中二人是僧因刼某至此含嚬上訴冶態横生王驚悦之遂載以後乘峕方生獲一熊置櫃中如舊鎻之値上方求極色王以莫氏衣冠子女即日表上之言其所由上令充才人經三日京兆府奏鄠縣食店有僧二人以萬錢獨賃房一日夜言作法事唯舁一櫃入店中夜深腷膊有聲店主怪日出不啓門撤戸視之有熊衝人走去二僧已死體骨悉露上知之大笑書報寜王大哥善能處置此僧也莫氏能為新聲當峕號莫才人囀出酉陽雜俎安禄山𤣥宗幸愛安禄山呼禄山為子嘗于便殿與楊妃同宴坐祿山每就見不拜𤣥宗而拜楊妃因顧問曰此胡不拜我而拜妃子意何在也祿山對云臣胡家只知有母不知有父故也笑而捨之祿山豐肥大腹帝嘗問曰此胡腹中何物其大乃爾祿山應聲對曰臣腹中更無他物唯赤心耳以其言誠而益親善之出開天傳信記白鐵余白鐵余者延州嵇胡也左道惑衆先于深山中埋一銅佛像栢樹之下經數年草生其上紿鄉人曰吾昨夜山下過見有佛光於是卜日設齋以出聖佛及期集數百人命于非所藏處劚不得則詭曰諸人不至誠布施佛不可見是日男女爭施捨百餘萬即于埋處劚之得其銅像鄉人以為聖人遠近相傳莫不欲見宣言曰見聖佛者百病即愈余遂左計數百里老小士女皆就之乃以紺紫紅緋黄綾為袋數十重盛佛像人來觀去其一重一回布施施獲十萬乃見其像如此矯偽一二年鄉人歸伏遂作亂自稱光王署置官屬設長吏為患數年命將軍程務挺討斬之出朝野僉載李慶遠中即李慶遠狡詐輕險初事皇太子頗得出入暫峕出外即恃威權宰相以下咸謂之要人宰執方食即來諸人命坐即遣一人門外急喚云殿下見召匆忙吐飯而去諸司皆如此計請謁囑事賣官鬻獄所求必遂焉東宫後稍稍疎之仍潛入仗内食侍官之飯晩出外腹痛大作猶詐云太子賜𤓰㗖之太多以致斯疾須臾霍亂吐出衞士所食麤米飯及黄臭韭虀狼藉凡是小人得寵多為此状也出朝野僉載劉𤣥佐汴州相國寺言佛有汗流節度使劉𤣥佐遽命駕自持金帛以施日中其妻亦至明日復起齋塲由是將吏商賈奔走道路唯恐輸貨不及因令官為簿書以籍所入十日乃閉寺曰佛汗止矣得錢巨萬以贍軍資出國史補張祜進士崔涯張祜下第後多遊江淮常嗜酒侮謔峕軰或乗其飲興即自稱豪俠二子好尚既同相與甚洽崔嘗作俠士詩云太行嶺上三尺雪崔涯袖中三尺鐵一朝若遇有心人出門便與妻兒别由是往往傳于人口曰崔張眞俠士也是此人多設酒饌待之得以互相推許後張以詩上鹽鐵使授其子漕渠小職得堰名冬𤓰或戲之曰賢郎不宜作此職張曰冬𤓰合出祜子戲者相與大哂歲餘薄有資力一夕有非常人粧束甚武腰劔手囊囊中貯一物流血殷于外入門謂曰此非張俠士居耶曰然揖客甚謹既坐客曰有一讐人之恨十年矣今夜獲之喜不能已因指囊曰此其首也問張曰有酒店否命酒飲之飲訖曰去此三四里有一義士予欲報之若濟此夕則平生恩讐畢矣聞公氣義能假予十萬緡否立欲酧之是予願畢此後赴蹈湯火誓無所憚張深喜其説且不吝嗇即傾囊燭下籌其縑素中品之物量而與焉客曰快哉無所恨也遂留囊首而去期以卻囘既去及其不至五皷絶聲杳無踪跡又慮囊首彰露以為已累客且不來計無所出乃遣家人開囊視之乃豕首也由是豪俠之氣頓衰矣出桂苑叢談大安寺唐懿宗用文理天下海内晏清多變服私遊寺觀民間有奸猾者聞大安國寺有江淮進奏官寄吳綾千匹在院於是暗集其羣就内選一人肖上之状者衣上私行之服多以龍腦諸香薰裛引二三小僕潛入寄綾之院其峕有丐者一二人至假服者遺之而去逡廵諸色丐求之人接跡而至給之不暇假服謂院僧曰院中有何物可借之僧未諾間小僕擲眼向僧僧驚駭曰櫃内有人寄綾千匹唯命是聽於是啓櫃罄而給之小僕謂僧曰來日早于朝門相覔可􅆢引入内所酧不輕假服者遂跨衛而去僧自是經日訪于内門杳無所見方知羣丐並是奸人之黨焉出玉堂閒話王使君王凝侍郎案察長沙日有新授柳州刺史王某者不知何許人將赴所任抵于湘川謁凝凝召預宴于賓佐王啓凝云某是侍郎諸從子姪合受拜凝遽問云既是吾族小名何也答曰名通即凝乃謂左右曰促召郎君來逡巡其子至凝詰曰家籍中有通郎者乎其子沉思少頃乃曰有之合是兄矣凝始命邀王君則受以從姪之禮因從容問云前任何官答曰昨罷職北海鹽院旋有此授凝聞之不悦既退凝復召其子謂曰適來王君資歴頗雜的非吾之枝葉也遂徴屬籍尋其𣲖乃有通郎已于某年某日物化矣凝覩之怒翌日㕔内備饌招之王君望凝欲屈膝忽被二壮士挾而扶之鞠躬不得凝前語曰使君非吾宗也昨日誤受君之拜今謹奉還遂拜之如其數訖二壯士退乃命坐與餐復謂之曰當今清平之代此後不可更亂入人家也在庭吏卒悉笑王君慚赧飲食為之不下斯須踧踖而出出南楚新聞劉崇龜劉崇龜以清儉自居甚招物論嘗召同列餐苦蕒饆饠朝士有知其矯乃潛問小蒼頭曰僕射晨餐何物蒼頭寔對食潑生朝中聞而哂之及鎮番方京國親之貧乏者俟其濡救但畫荔枝圖自作賦以遺之後卒于嶺表歸葬經渚宮家人鬻海珍珠翠于市為當峕所鄙出北夢瑣言李延召王蜀將王宗儔帥南梁日聚糧屯師日興工役鑿山刋木畧不暫停運粟泛舟軍人告倦岷峨之人酷好釋氏軍中皆右執㓙器左秉佛書誦習之聲混于刁斗旹有健卒李延召繼年役于三泉黑水以來採斫材木力竭形枯不任其事遂設詐陳狀云近者得見諸佛如来乘輿跨象出入巖崖之中飛昇松栢之上如是之報甚頻某雖在戎門早歸釋教以其課誦至誠是有如此感應今乞蠲兵籍截足事佛俾將來希証無上之果宗儔判曰雖居兵籍心在佛門修心于行伍之間達理于幻泡之外歸心而依佛氏截足以事空王壯哉􅆛貅何太猛利大願難阻眞誠可嘉准状付本軍除落名氏仍差虞候監截一足訖送眞元寺收管灑掃焚修比欲矯妄免其役及臨斷足峕則怖懼益切於是遷延十餘日哀號宛轉避其鋒釯宗儔聞之大笑而不罪焉出玉堂閒話成都丐者成都有丐者詐稱落泊衣冠弊服繿縷常巡成都市􅆵見人即展手希一文云失墜文書求官不遂人皆哀之為其言語悲嘶形容顦顇居于早遷橋側後有勢家于所居旁起園亭欲廣其池館遂强買之及闢其圭竇則見兩間大屋皆滿貯散錢計數千萬鄰里莫有知者成都人一槩呼求事官人為乞措大出朝野僉載薛氏子有薛氏二子野居伊闕先世嘗典大郡資用甚豐一日木隂初盛清和届候偶有叩扉者啓關視之則一道士也草履雪髯氣質清古曰半途病渴幸分一盃漿二子延入賓位雅談高論深味道腴又曰某非渴漿者杖藜過此氣色甚佳自此東南百歩有五松虬偃在疆内否曰某之良田也道士愈喜因屏人曰此下有黄金百斤寶劔二口其氣隱隱浮張翼間張翼洛之分野某尋之乆矣黄金可以分贈親屬甚困者其龍泉自佩當位極人臣某亦請與一効斬魔之術二子大驚異道士曰命家僮役客軰悉具畚鍤候擇日發土則可以目驗矣然若無術以制則逃匿黄壤不復能追今俟良宵剪方為壇用法水噀之不能遁矣且戒僮僕無得泄者問其結壇所須曰徽􅅶三百尺赤黑索也隨方色綵縷素甚多洎几案爐香裀褥之具且曰某非利財者假以為法又用祭膳十座酒茗隨之器皿須以中金者二子則竭力經營尚有所缺貸于親友又言某善㸃化之術視金銀如糞土常以濟人之急為務今有囊篋寓太微宫欲以暫寄二子許諾即召人負荷而至巨笈有四重不可勝緘鐍甚嚴祈託以寄旋至吉日因大設法具于五松間命二子拜祝訖亟令返居閉門以俟且戒無得窺隙某當效景純散髮衘劒之術脱為人窺則禍立至俟行法畢當舉火相召可率僮僕備畚鍤來及夜而發之冀得靜觀至寶也二子依所教自夜分危坐專望燭光杳不見舉不得已闢戸覘之黙絶影響歩至樹下則擲盃覆器飲食狼籍綵縑器皿悉已㩦去輪蹄之跡錯于其所疑用徽纒束固以遁因發所寄之笈瓦礫實中自此家産甚困失信于人驚愕憂慚黙不得訴出唐國史秦中子秦川富室少年有能規利者藏鏹巨萬一日逮夜有投書于其戸者僕執以進少年啓封則蒲紙加蠟昧墨斜翰為其先考所遺者曰汝之獲利吾之㝠助也今將有大禍然吾已請于隂隲矣汝及朔旦宜齋躬潔服出于春明門外逆旅備縑帛隨其年三十有五俟夜分往㶚水橋歩及石岸見黄衣者即置于前禮祝而退灾當可免或無所遇即挈縑以歸急理家事當為竄計禍不旋踵矣少年捧書大恐合室素服而泣專誌朔旦則捨棄他事彈冠振衣止于春明門外矜嚴不寐恭俟夜分乃從一僕乘一馬馳往㶚橋唯恐無所覩至則果有一物形質詭怪蓬頭黄衣交臂束膝負柱而坐俛首以寐少年驚喜捧縑于前祈祝設拜不敢郤顧疾驅而囘返轅相慶以為幸免矣獨有僕夫疑其不直曽未逾旬復有擲書者僕夫立擒之乃鄰宇之導青襟者啓其緘札蒲蠟昩墨如初詞曰汝灾甚大曩之夀帛禍源未塞宜更以縑三十五重置河梁其家則状始末訴于官司詰問具伏遂寘于法時李常侍叢為萬年令訟牒數年尚在出缺史李全臯䕶軍李全臯罷淮海監臨日寓止于開元寺以朝廷艱梗未獲西歸一旦有小校引一道人云能通爐火之事全臯乃延而禮之自此與之善一日語及黄白之事道人曰唯某頗能得之可求一鐵鼎容五六升以上者黄金二十餘兩為母日給水銀藥物火候足而換之莫窮歲月終而復始李甚喜其説顧囊有金帶一條可及其數以付道人諸藥既備周火之日後日躬自看驗居數日微倦乃令家人親愛者守之日數既滿齋沭而後開視黄金爛然的不虚也李拜而信之三日之内添換有徴一旦道人不來藥爐一切如舊疑駭之際俄經再宿乆待訝其不至不得已啓爐視之不見其金矣事及導引小挍代塡其金而止道人絶無踪跡出桂苑叢談文處子有處子姓文不記其名居漢中常遊兩蜀侯伯之門以燒煉為業但留意于爐火者咸為所欺有富商李十五郎者積貨甚多為文所惑三年之内家財罄空復為識者所誚追而恥之以至自經又有蜀中大將屯兵漢中者亦為所惑華陽坊有成太尉新造一第未居言其空靜遂求主者賃以燒藥因火發焚其第延及一坊掃地而靜文遂夜遁欲向西取桑林路東趨斜谷以脱其身出門便為猛虎所逐不得西去遂北入王子山谿谷之中其虎隨之不離跬歩既窘迫遂攀枝上一樹以帶自縳于喬柯之上其虎遶樹跑哮及曉官司捕逐者及樹下虎乃徐去遂就樹擒之斬于燒藥之所出王氏見聞太平廣記卷二百三十八
