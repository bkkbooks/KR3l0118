body:
  text: 太平廣記卷四百二十三宋李昉等編龍六盧君暢元義方平昌井虎頭骨法善寺龍廟豢龍者孔威華隂湫崔道樞金龍子黄馴臨漢豕燒龍栁翁盧君暢故東都留守判官祠部郎中范陽盧君暢為白衣時僑居漢上嘗一日獨驅郊野見二白犬腰甚長而其臆豐飄然若墜俱馳走田間盧訝其異於常犬因立馬以望俄而其犬俱跳入於一湫中已而湫浪汎騰旋有二白龍自湫中起雲氣噎空風雷大震盧懼甚鞭馬而歸未及行數里衣盡沾濕方悟二犬乃龍也出宣室志元義方元義方使新羅發雞林州遇海島中有泉舟人皆汲飲之忽有小蛇自泉中出海師遽曰龍怒遂發未數里風雲雷電皆至三日三夜不絶及雨霽見逺㟁城邑乃萊州出國史𥙷平昌井平昌城􅃇與荆水通有神出入焉故曰龍城外國有寺曰咀呵羅寺有神龍往米倉中奴取米龍輙却奴若常取米龍即不與倉中米若盡奴向龍拜倉即盈溢出外國事虎頭骨南中旱即以長繩繫虎頭骨投有龍處入水即數人牽制不定俄頃雲起潭中雨亦隨降出尚書故實法善寺政陽郡東南有法善寺去郡逺百里而正居渭水西唐元和末寺僧有頻夢一白龍者自渭水來止於佛殿西楹蟠遶且乆乃直東而去眀日則雨如是者數矣其僧異之因語於人人曰福地盖神祗所居固龍之宅也而佛寺亦為龍所依焉故釋氏有天龍八部其義在矣况郊野外寺殿宇清敞為龍之止不亦宜乎願以土龍置於寺楹間且用識其夢也僧召工合土為偶龍具告其狀而於殿西楹置焉功畢甚得雲間勢蜿蜒鱗鬛曲盡其妙雖丹青之巧不能加也至長慶初其寺居人有偃於外門者見一物從西軒直出飄飄然若升雲狀飛馳出寺望渭水而去夜將分始歸西軒下細而視之果白龍也明日因告寺僧僧竒之又數日寺僧盡赴村民㑹齋去至午方歸因入殿視像龍已失矣寺僧且歎且異相顧語曰是龍也雖假以土尚能變化無方去莫知其適來莫究其自果靈物乎及晚有隂雲起於渭水俄而將逼殿宇忽有一物自雲中躍而出指西軒以入寺僧驚懼且視之乃見像龍已在西楹上廹而觀之其龍鬐鬛鱗角若盡沾濕自是因以鐡鎖系之其後里中有旱澇祈禱之應若影響出宣室志龍廟汾水貫太原而南注水有二橋其南橋下嘗有龍見由是架龍廟於橋下故相國令狐楚居守北都時有一龍自廟中出傾都士女皆縱觀近食頃方拏奮而去旋有震雷暴雨焉又明年秋汾水延溢有一白蛇自廟中出既出而廟屋摧圯其橋亦壊時唐太和初也出宣室志豢龍者牛僧孺鎮襄州日以乆旱祈禱無應有處士自云豢龍者公請致雨處士曰江漢間無龍獨一湫泊中有之黒龍也强驅逐之慮為災難制公固命之果有大雨漢水漫漲漂溺萬户處士懼罪亦亡去出尚書故實孔威唐咸通末舒州刺史孔威進龍骨一具因有表錄其事狀云州之桐城縣善政鄉百姓胡舉有青龍鬭死於庭中時四月尚有繭箔在庭忽雲雷暴起聞雲中擊觸聲血如釃雨灑繭箔上血不汙箔漸旋結聚可拾置掌上須臾令人冷痛入骨初龍拖尾及地繞一泔桶即騰身入雲及雨悉是泔也龍既死剖之喉中有大瘡凡長十餘尺身尾相半尾本􅄶薄鱗鬛皆魚唯有鬚長二丈有足有赤膜翳之雙角各長二丈其腹相自齟齬時遣大雲倉使督送州而以肉重不能全舉乃剸之為數十段載之赴官出唐年𥙷錄華隂湫唐咸通九年春華隂縣南十里餘一夕風雷暴作有龍移湫自逺而至先其崕㟁髙無貯水之處此夕徙開數十丈小山東西直南北峰巒草𣗳一無所傷碧波廻塘湛若疏鑿京洛行旅無不枉道就觀有好事者自輦轂蒲津相率而至車馬不絶音逮於累日京城南􅂕應䑓有三娘湫與炭谷相近水波澄眀莫測深淺每秋風揺落常有草木之葉飄於其上雖片葉纎芥必飛禽銜而去禱祈者多致花細錦綺之𩔖啓視投之歘然而没乾符初有朝士數人同遊於終南山遂及湫所因話􅂕應之事其間不信者試以木石投之尋有巨魚躍出波心鱗甲如雪俄而風雨晦暝車馬㡬為暴水所漂爾後人愈敬服莫有犯者出劇談錄崔道樞唐中書舍人韋顔子壻崔道樞舉進士者屢矣一年春下第歸寜漢上所居因井渫得鯉魚一頭長五尺鱗鬛金色其目光射人衆視異於常魚令僕者投于江中道樞與表兄韋氏密備鼎俎烹而食之經信宿韋得疾暴卒有碧衣使人引至府舎􅇬宇頗甚嚴肅既入門見㕔事有女子戴金翠冠著紫繡衣據案而坐左右侍者皆黄衫巾櫛如宫内之飾有一吏人從後執簿領出及軒陛間付雙鬟青衣置于繡衣案上吏引韋生東廡曹署理殺魚之狀韋引過道樞云非某之罪吏曰此雨龍也若潛伏於江海湫湄雖為人所食即從而可辨矣但昨者得之於井中崔氏與君又非愚昧殺而食之俱難獲免然君且還試與崔君廣為佛道功徳庶㡬稍减其過自兹浹旬當復相召韋忽然而寤且以所説話於親屬命道樞具述其事道樞雖懐憂廹亦未深信纔及旬餘韋生果殁韋乃道樞之姑子也數日後寄魂於母云已因殺魚獲罪所至之地即水府非乆當受重譴可急修黄籙道齋尚冀得寛刑辟表弟之過亦成矣今夕當自知其事韋母泣告道樞及暝昏然而寢復見碧衣人引至公署俱是韋氏之所述俄有吏執黒紙丹文書字立道樞於屏側疾趨而入俄見繡衣舉筆而書訖吏接之而出令道樞覽之其初云崔道樞官至三品夀至八十後有判云所害雨龍事闗天府原之不可案罪急追所有官爵並皆削除年亦减一半時道樞冬季其母方修崇福力纔及春首抱疾數日而終時崔妻孥咸在京師韋顔備述其事舊傳䕫及牛渚磯是水府未詳道樞所至何許金龍子唐昭宗文徳二年正朔御武徳殿有紫氣出於昭徳殿東隅鬱鬱如烟令大内留後司尋其所出得金龍子一枚長五寸許羣臣稱賀帝曰朕不以金龍為祥瑞以偃息干戈為祥瑞卿等各宜盡忠以體朕懐門下奏請改文徳二年為龍紀元年出大唐雜記黄馴荆州當陽縣倚山為􅅟宇内有井極深井中有龍窠旁入不知㡬許欲晴霽及將雨往往有雲氣自井而出唐光化中有道士稱自商山來入井中取龍窠及草藥而去其後有令黄馴者到任之後常繫馬於井旁滓穢流漬盡入於井中或有譏之者飾辭以對嵗餘馴及馬皆瞽出錄異記臨漢豕卭州臨漢縣内有湫往往人見牝豕出入號曰母豬龍湫唐天復四年蜀城大旱因使守宰躬往􅂕跡求雨於時邑長具牢醴命邑宰偕往祭之三奠迨終乃張筵於湫上以神胙客坐於烈日鋪席以湫為上每酒廵至湫上黒氣如雲氛氲直上狂電煜然𤣥雲􅈝闇雨雹立至令長與寮吏鼓舞去盖蒙濕而歸翌日此一境雨足他邑依然赤地焉夫人之至誠則龍畜亦能感動享徳濟旱勿謂不智出北夢瑣言燒龍大江之南蘆荻之間往往燒起龍唐天復中澧州葉源村民鄧氏子燒畬柴草積於天井山中穴也火勢既盛龍突出騰在半空縈𢃄為火所燎風力益壯狂焰彌熾擺之不落竟以仆地而斃長亘數百歩村民徙居而避之朱梁末辰州民向氏因燒起一龍四面風雷急雨不能撲㓕尋為煨燼而角不化瑩白如玉向氏寶而藏之湖南行軍髙郁酧其價而强取於時術士曰髙司馬其禍乎安用不祥之物以速之俄而被誅出北夢瑣言栁翁天祐中饒州有栁翁常乗小舟釣鄱陽江中不知其居處妻子亦不見其飲食凡水族之𩔖與山川之深逺者無不周知之鄱陽人漁釣者咸諮訪而後行吕師造為刺史修城掘濠至城北則雨止後則晴或問柳翁翁曰此下龍穴也震動其上則龍不安而出穴龍出則雨矣掘之不已必得其穴則霖雨方將為患矣既深數丈果得方木長數十尺交搆疊之累積數十重其下霧氣衝人不可入而止其木皆腥涎縈之刻削平正非人力所及自是果霖雨為患吕氏諸子將網魚于鄱陽江召問栁翁翁指南㟁一處今日唯此處有魚然有一小龍在焉諸子不信網之果大獲舟中以巨盆貯之中有一鱓魚長一二尺雙目精眀有二長鬚繞盆而行羣魚皆翼從之將至北岸遂失所在栁翁竟不知所終出稽神錄太平廣記卷四百二十三
