body:
  text: 太平廣記卷四百十四草木九香藥荃蕪香三名香五名香沉香龍腦香安息香一木五香訶黎勒白豆蔲􅶵齊香無石子紫䤵阿魏蓽撥胡椒阿勃參山􅘂麻黄荆三稜服餌服松脂餌松蘂賜茯苓服茯苓服菖蒲服桂餌柠實服五味子食术服桃膠服地黄服逺志服天門冬飲菊潭水飲甘菊谷水食黄精香藥荃蕪香燕昭王時有波弋之國貢荃蕪香若焚著衣彌月不絶所遇地土石皆香經朽木腐草皆榮秀用薰枯骨則肌肉再生出獨異志三名香漢雍仲子進南海香物拜為涪陽尉時人謂之香尉日南郡有香市商人交易諸香處南海郡有村香户日南郡有千畝香林名香出其中香州在朱崖郡洲中出諸異香往往不知其名千年松香聞十里亦謂之三名香也五名香聚窟洲在西海中申來洲上有大樹與楓木相似而葉香聞數百里名此為返魂樹叩其樹樹亦能自聲聲如牛吼聞之者皆心振神駭伐其根心于玉釡中煑取汁更火煎之如黒飴可令丸名曰驚精香或名之為振靈丸或名之為返生香或名之為人鳥精香或名為却死香一種五名斯靈物也香氣聞數百里死尸在地聞氣乃活十洲記沉香唐太宗問髙州首領馮盎云卿宅去沉香逺近對曰宅左右即出香𣗳然其生者無香唯朽者始香矣出國史纂異龍腦香龍腦香𣗳出婆利國婆利呼為箇不婆律亦出波斯國𣗳髙八九丈大可六七圍葉圓而背白無花實其𣗳有肥有痩痩者出婆律膏香在木心中斷其𣗳劈取之膏于𣗳端流出斫𣗳作坎而承之入藥用别有法出酉陽雜俎安息香安息香𣗳出波斯國波斯呼為辟邪𣗳長三丈皮色黄黒葉有四角經寒不凋二月開花黄色心微碧不結實刻其葉而其膠如飴名安息香六七月堅凝乃取之燒之通神明辟衆惡出酉陽雜俎一木五香一木五香根栴檀節沉花雞舌葉藿膠薫陸出酉陽雜俎訶黎勒髙仙芝伐大食得訶黎勒長五六寸初置抹肚中便覺腹痛因快痢十餘行初謂訶黎勒為祟因欲棄之以問大食長老長老云此物人帶一切病消痢者出惡物耳仙芝甚寳惜之天寳末被誅遂失所在出廣異記白荳蔲白荳蔲出加古羅國呼為多骨形如芭蕉葉似杜若長八九尺冬夏不凋花淺黄色子作朶如蒲萄其子初出微青熟則變白七月採出酉陽雜俎􅶵齊香􅶵齊香出波斯國佛林呼為頂勃梨咃長一丈圍一尺許皮青色薄而極光浄葉似阿魏每三葉生于條端無花實西域人常八月伐之至臘月更抽新條極滋茂若不剪除枯死七月斷其枝有黄汁其狀如蜜微有香氣入缶療百病出酉陽雜俎無石子無石子出波斯國波斯呼為摩賊𣗳長六七丈圍八九尺葉如桃葉而長三月開花白色花心微紅子圓如彈丸初青熟乃黄白蟲食成孔者正熟皮無孔者入藥用其𣗳一年生無石子一年生跋屢子大如指長三寸上有殻中仁如栗黄可啖出酉陽雜俎紫䤵紫䤵𣗳出真臘國真臘呼為勒住亦出波斯國𣗳長一丈枝條鬱茂葉似橘經冬不凋三月開花白色不結子天大霧露及雨霑其𣗳枝條即出紫䤵波斯國使烏海及沙利深所説並同真臘國使折衝都尉渉門陁沙尼拔陁言蟻運土于𣗳作窠蟻壤得雨露凝結而成紫䤵崑崙國者善波斯國者次之出酉陽雜俎阿魏阿魏出伽闍那國即北天竺也伽闍那呼為形虞亦出波斯國波斯呼為阿虞截𣗳長八九丈皮青黄三月生葉形似鼠耳無花實斷其枝汁出如飴久乃堅凝佛林國僧變所説同摩伽陁國僧提婆言取其汁和米豆屑合成阿魏出酉陽雜俎蓽撥蓽撥出摩伽陀國呼為蓽撥梨佛林國呼為阿梨訶咃苖長三四尺莖細如著葉似蕺葉子似桑椹八月採出酉陽雜俎胡椒胡椒出摩伽陁國呼為昧履支其苗蔓生莖極柔弱葉長寸半有細條與葉齊條上結子兩兩相對其葉晨開暮合合則裹其子于葉中子形似漢椒至芳辣六月採今作胡盤肉食皆用之出酉陽雜俎阿勃參阿勃參出佛林國長一丈餘皮色青白葉細兩兩相對花似蔓菁正黄子似胡椒赤色斫其枝汁如油以塗癬疥無不瘳其油極貴價重千金出酉陽雜俎山􅘂熙穆縣里多山􅘂本草云南山之隂曰署預消熱下氣補五臟出南越志麻黄麻黄莖端開花花小而黄簇生子如覆盆可食至冬枯死如草及春却青出酉陽雜俎荆三稜唐河東裴同父患腹痛數年不可忍囑其子曰吾死後必出吾病子從之出得一物大如鹿條脯懸之久乾有客竊之其堅如骨削之文彩煥發遂以為刀欛子佩之在路放馬抽刀子割三稜草坐其上欛盡消成水客怪之回以問同同泣具言之後病狀同者服三稜草汁多驗出朝野僉載服餌服松脂上黨有趙瞿者病癩歴年衆治之不愈垂死或云不如及活流棄之否則後子孫轉相注易其家乃為賫糧而送之置山穴中瞿居穴中自怨不幸晝夜悲歎涕泣經日有仙人行過穴口而哀之具問訊焉瞿知其異人乃叩頭自陳乞哀于仙人以嚢藥賜之教其服法瞿服之百許日瘡愈顔色豐悦肌膚玉澤仙人又過視之瞿謝受更生活之恩乞丐其方仙人告之云此是松脂耳此山中更多此物汝鍊之服可以長生不死瞿乃歸家人初謂之鬼也甚驚愕遂具言狀後服松脂不撤身體轉輕氣力百倍登髙越險終日不倦年百七十歳齒不墮髮不白夜卧忽見屋間有光大如鏡者以問左右皆云不見久而漸大一室盡明如晝日夜又見面上有婇女二人長二三寸面目皆具但為小耳遊戲其口鼻之間如是且一年此女稍長如大人在側又常聞琴瑟之音欣然獨笑在人間二百許年色如少童乃抱犢入山去必地仙也其間聞瞿服松脂如此于是競服其多力者乃車運驢負誓積之盈室服之逺者不過一月未覺有大益輙止有志者難得如是也出抱朴子餌松蘂遁甲經云沙土之福雲陽之墟可以隱居雲陽氏古之仙人方記曰南岳百里有福地松髙一千尺圍即數尋而蘂甘仙人可餌相傳服食錬行之人採此松膏而服不苦澁與諸處松别出十道記賜茯苓沈約謝始安王賜茯苓一枝重一十二觔八兩有表出酉陽雜俎服茯苓任子季服茯苓十八年仙人玉女往從之能隱能彰不復食榖灸瘢皆滅面體玉光出抱朴子服菖蒲韓衆服菖蒲十三年身生毛日視書萬言皆誦之冬袒不寒又菖蒲須生得石上一寸九節已上紫花者尤善出抱朴子服桂趙他子服桂二十一年毛生日行五百里力舉千觔出抱朴子餌柠實柠與楮同柠木實之赤者餌之一年老者還少令人徹食見鬼昔道士梁頃年七十乃服之轉更少年至百四十歲能夜書走及奔馬入青龍山去出抱朴子服五味子移門子食服五味子六十年色如玉女入水不霑入火不灼出抱朴子食术南陽文氏説其先祖漢末大亂逃壺山中饑困欲死有一人教之食术云遂不饑十年乃来還鄉里顔色更少氣力勝故自説在山中時身輕欲跳登髙履險歴日不倦行氷雪中了不知寒常見一髙岩上有數人對博戲者有讀書者俛而視之文氏因聞其相問言此子可呼上否其一人答未可也林子明服术十一年耳長五寸身輕如飛能超踰淵谷二丈許出抱朴子服桃膠桃膠以桑木灰漬服之百病愈久久身有光在晦夜之地如月出也多服之則可以斷榖矣出抱朴子服地黄楚子服地黄八年夜視有光手上車弩出抱朴子服逺志陵陽子仲服逺志二十年有子二十七人開書所視不忘出抱朴子服天門冬杜子微服天門冬八十年妾有子百四十人日行二百里出抱朴子飲菊潭水荆州菊潭其源傍芳菊被涯澳其滋液極甘深谷中有三十餘家不得穿井仰飲此水上夀二三百中夀百餘其七十八十猶以為夭菊能輕身益氣令人久夀有徵出十洲記飲甘菊谷水南陽酈縣山中有甘谷水所以甘者谷上左右皆生甘菊菊花墮其中歴世彌久故水味為變其臨此谷中居民皆不穿井悉飲甘谷水飲者無不考夀髙者百四五十歲下者不失八九十無夭年人得此菊力也故司空王暢太尉劉寛太傅𡊮隗皆為南陽太守每到官常使酈縣月送甘谷水四十斛以為飲食此諸公多患風痺及眩冒皆得愈但不能大得其益如甘谷上居民生小便飲食此水者耳又菊花與薏花相似直以甘苦别之耳菊甘而薏苦諺言所謂苦如薏也今所在有貢菊但為少耳率多生于水側也緱氏山與酈縣最多仙方所謂白精更生周盈皆一菊而根莖花實異名其説甚美而近来服之者略無效正由不得真菊也夫甘菊谷水南方氣味亦未足言而其上居民以延年况得服好藥安得無益乎出抱朴子食黄精臨川有士人虐遇其所使婢婢不堪其毒乃逃入山中久之糧盡饑甚坐水邊見野草枝葉可愛即拔取濯水中連根食之甚美自是恒食久之遂不饑而更輕健夜息大𣗳下聞草中獸走以為虎而懼因念得上𣗳杪乃佳也正爾念之而身已在𣗳杪矣及曉又念當下平地又歘然而下自是意有所之身即飄然而去或自一峰之一峰頂若飛鳥焉數歲其家人伐薪見之以吿其主使捕之不得一日遇其在絶壁下即以細繩三面圍之俄騰上山頂其主益駭異必欲致之或曰此婢也安有仙骨不過得靈藥餌之耳試以盛􅄿多其五味令甚香美值其往来之路觀其食之否如其言果来就食食訖不復能逺去遂為所擒具述其故問其所食草之形即黄精也復使之遂不能得其婢數年亦卒出稽神録太平廣記卷四百十四
