body:
  text: 太平廣記卷一百五十五定數十衞次公李固言楊收鄭朗段文昌崔從郭八郎張宣韓臮衞次公唐吏部侍郎衞次公早負耿介淸直之譽憲宗皇帝將欲相之久矣忽夜召翰林學士王涯草麻内兩句褒美云雞樹之徒老風烟鳯池之空淹歲月詰旦將宣麻案出忽有飄風墜地左右收之未竟上意中輟令中使止其事仍云麻已出即放下未出即止由此遂不拜終於淮南節度出續定命錄李固言相國李固言元和六年下第遊蜀遇一姥言郎君明年芙蓉鏡下及第後二紀拜相當鎮蜀土某已不復見郎君出將之榮也願以季女為託明年果狀頭及第詩賦有人鏡芙蓉之目後二十年李公登庸其姥來謁李公忘之姥通曰蜀民老姥嘗囑李氏者李公省前事具公服謝之延入中堂見其女坐定又曰出將入相定矣李公為設盛􅄿不食唯飲酒數杯便請别李固留不得但言乞庇我女因贈金皂襦幗並不受唯取其妻牙梳一枚題字記之李公從至門不復見及李公鎮蜀日盧氏外孫子九齡不語忽弄筆硯李戲曰爾竟不語何用筆硯為忽曰但庇成都老姥愛女何愁筆硯無用耶李公驚悟即遣使分訪之有巫董氏者事金天神即姥之女言能語此兒請祈華岳三郎李公如巫所說是兒忽能言因是蜀董如神祈無不應富積數百金怙勢用事莫敢言者洎相國崔鄲來鎮蜀遽毁其廟投土偶於江仍判事金天王董氏杖背遞出西界尋在貝州李公壻盧生舍於家其靈歇矣岀酉陽雜爼又李固言初未第時過洛有胡盧先生者知神靈間事曽詣而問命先生曰紗籠中人勿復相問及在長安寓歸德里人言聖壽寺中有僧善術數乃往詣之僧又謂曰子紗籠中人是歲元和七年許孟容以兵部侍郎知舉固言訪中表間人在場屋之近事者問以求知遊謁之所未詳姓氏斯人且以固言文章甚有聲稱必取甲科因紿之曰吾子須首謁主文仍要求見固言不知其誤之則以所業徑謁孟容孟容見其著述甚麗乃密令從者延之謂曰舉人不合相見必有嫉才者使詰之固言遂以實對孟容許第固言於牓首而落其教者姓名乃遣秘焉既第再謁聖壽寺問紗籠中之事僧曰吾常於陰府往來有為相者皆以形貌用碧紗籠於廡下故所以知固言竟出入將相皆驗焉出蒲錄紀傳又元和初進士李固言就舉忽夢去看牓見李固言第二人上第及放牓自是顧言亦第二人固言其年又落至七年許孟容下狀頭登第出感定錄楊收唐國相楊收江州人祖為本州都押衙父維直蘭溪縣主簿生四子發嘏收嚴皆登進士第收即大拜發已下皆至丞郎發以春為義其房子以柷以乘為名嘏以夏為義其房子以照為名收以秋為義其房子以鉅鏻鑑為名嚴以冬為義其房子以注涉洞為名盡有文學登髙第號曰修行楊家與静恭諸楊比於華盛收少年於廬山修業一日尋幽至深隱之地遇一道者謂曰子若學道即有仙分若必作官位至三公終焉有禍能從我學道乎收持疑堅進取之心忽其道人之語他日雖登廊廟竟罹南荒之殛出北夢瑣言鄭朗長慶中靑龍寺僧善知人之術知名之士靡不造焉進士鄭朗特謁了不與語及放牓朗首登第焉朗未之信也累日内索重試朗果落後却謁靑龍僧怡然相接禮過前時朗詰之僧曰前時以郎君無名若中第却不嘉自此位極人臣其後果厯台鉉出感定錄段文昌故西川節帥段文昌字景初父鍔為支江宰後任江陵令文昌少好屬文長自渚宫困於塵土客遊成都謁韋南康臯臯與奏釋褐道不甚行每以事業自負與遊皆髙名之士遂去南康之府金吾將軍裴邠之鎮梁川辟為從事轉假廷評裴公府罷因抵興元之西四十里有驛曰鵠鳴濵漢江前倚巴山有淸僧依其隈不知何許人也常嘿其詞忽復一言未嘗不中公自府遊聞淸僧之異徑詣淸公求宿願知前去之事自夕達旦曾無詞忽問蜀中聞極盛旌斾而至者誰公曰豈非髙崇文乎對曰非也更言之公曰代崇文者武黄門也淸曰十九郎不日即為此人更盛更盛公尋徵之便曰害風妄語阿師不知因大笑而已由是頗亦自負户部員外韋處厚出開州刺史段公時任都官員外判鹽鐵案公送出都門處厚素深於釋氏洎到鵠鳴先訪之淸喜而迎處厚處厚因問還期曰一年半歲一年半歲又問終止何官對曰宰相須江邊得又問終止何處僧遂不答又問段十九郎何如答曰已說矣近也近也及處厚之歸朝正三歲重言一年半歲之驗長慶初段公自相位節制西川果符淸師之言處厚唯不喻河邊得宰相廣求智者解焉或有旁徴義者謂處厚必除浙西夏口從是而入拜相及文宗皇帝踐阼自江邸首命處厚為相至是方驗與鄒平公同發師修淸公塔因刻石記其事焉又趙宗儒節制興元日問其移動遂命紙作兩句詩云梨花初發杏花初甸邑南來慶有餘宗儒遂考之淸公但云害風阿師取次語明年二月除檢挍太尉僕射鄭餘慶代其位出定命錄崔從寶厯二年崔從鎮淮南五月三日𤓰步鎮申浙右試競渡船十艘其三船平没於金山下一百五十人俱溺死從見申紙歎憤時軍司馬皇甫曙入啓事與從同異之座有宋生歸儒者語曰彼之禍不及怪也此亦有之人數相𩔖但其死不同耳浹日有大讌陳於廣場百戲俱呈俄暴風雨庭前戲者并馬數百疋繫在廡下迅雷一震馬皆驚奔大廡數十間平塌凡居其下者俱壓死公令較其數與浙右無一人差焉出獨異志郭八郎河中少尹鄭復禮始應進士舉十上不第困厄且甚千福寺僧𢎞道者人言晝閉闗以寐夕則視事於陰府十祈叩者八九拒之復禮方蹇躓憤惋乃擇日齋沐候焉道頗温容之且曰某未嘗妄洩於人今茂才抱積薪之歎且久不能忍耳勉旃進取終成美名然其事𩔖異不可言也鄭拜請其期道曰唯君期須四事相就然後遂志四缺其一則復負寃如是者骨肉相繼三牓三牓之前猶梯天之難三牓之後則反掌之易也鄭愕視不可喻則又拜請四事之目道持疑良久則曰慎勿言於人君之成名其事有四亦可以為異矣其一須國家改元之第二年其二須是禮部侍郎再知貢舉其三須是第二人姓張其四同年須有郭八郎四者闕一則功虧一簣矣如是者賢弟姪三牓率須依此鄭雖大疑其説欝欝不樂以為無復望也敬謝而退長慶二年人有導其名姓於主文者鄭以且非再知貢舉意甚疑之果不中第直至改元寶厯二年新昌楊公再司文柄乃私喜其事未敢洩言來春果登第第二人姓張名知實同年郭八郎名言揚鄭竒嘆且久因紀於小書之抄私自謂曰道言三牓率須如此一之已異其可至於再乎至於三乎次至故尚書右丞韓憲應舉太和二年頗有籍甚之譽以主文非再知舉試日果有朞周之恤爾後應大和九年舉敗於垂成直至改元開成二年高鍇再司文柄右轄私異事明年果登上第二人姓張名棠同年郭八郎名植因又附於小書之末三牓雖欠其一兩牓且無小差閨門之内私相謂曰豈其然乎時僧𢎞道已不知所往矣次至故駙馬都尉顥應舉時譽轉洽至改元會昌之二年禮部柳侍郎璟再司文柄都尉以狀頭及第第二人姓張名潛同年郭八郎名京𢎞道所說無差焉出野史張宣杭州臨安縣令張宣寶厯中自越府戸曹掾調授本官以家在浙東意求蕭山宰去唱已前三日忽夢一女子年二十餘修刺來謁宣素貞介夢中不與女子見女子云某是明年邑中之客安得不相見耶宣遂見之禮貌甚肅曰妾有十一口依在貴境有年數矣今聞明府將至故來拜謁宣因問縣名竟不對宣告其族人曰且誌之及後補湖州安吉縣令宣以家事不便將退之其族人曰不然前夕所夢女子非安字乎十一口非吉字乎此陰隲已定退亦何益宣悟且笑曰若然固應有定遂受之及秩滿數年又將𨕖時江淮水歉宣移家河南固求宋亳一官將引家往又夢前時女子顔貌如舊曰明府又當宰邑妾之邑也宣曰某前已為夫人之邑今豈再授乎女子曰妾自明府罷秩當即遷之居今之所止非舊地然往者家屬凋喪略盡今唯三口為累耳明府到後數月亦當辭去言訖似若悽愴宣亦未諭及唱官乃得杭州臨安縣令宣嘆曰三口臨字也數月而去吾其憂乎到任半年而卒出前定錄韓臮昌黎韓臮故晉公滉之支孫博通經史太和五年自大理丞調𨕖平判入第名第既不絶髙又非馳逐而致為後輩所謔時太常丞馮芫除岳州刺史因説人事固有前定德皇之末芫任太常寺奉禮於時與臮同官其年前進士時元佐任協律郎三人同約上丁日釋奠武成王廟行事芫任常樂臮任親仁元佐任安邑芫皷動拉二官同之太平興道西南角元佐忽云某適馬上與二賢作一善夢足下二人皆判入等何也請記之芫固書之紀於篋中憲宗六年芫判入等授興平縣尉臮實無心望於科第此後二十七八年臮方判入等皆不差忒芫臨發岳陽召臮特説當時之事并取篋中所記以示之曰諸公何足為謔命使之然臮亦去未嘗暫忘則僕與公何前後相懸如此臮其年授大理正出續定命錄太平廣記卷一百五十五
