body:
  text: 太平廣記卷二百七十七夢二閭英宋瓊宋穎妻盧元明元淵許超北齊李廣蕭鏗徐孝嗣梁江淹代宗徐善隋文帝唐高祖戴胄婁師德顧琮天后薛季昶𤣥宗魏仍陳安平李瞿曇趙良器奚陟張鷟裴元質潘玠樊系呂諲閭英後魏閭英為肥城令夢日墮所居黄山水中村人以車牛挽致不出英抱戴而歸後至散騎常侍出夢雋宋瓊後魏宋瓊母病冬月思𤓰瓊夢見人與𤓰覺得之手中時稱孝感出夢雋宋穎妻後魏宋穎妻鄧氏亡十五年忽夢亡妻向穎拜曰今被處分為高崇妻故來辭流涕而去數日崇卒出夢雋盧元明後魏盧元明字㓜章為中書侍郎孝武永熙末乃居洛東緱山時元明夢友王由㩦酒就之言别賦詩為贈及覺憶其詩十字云自兹一去後朝市不復遊元明歎曰由性不狎俗旅寄人間乃有今夢詩復如此必有他故也經三日果聞由為亂兵所害尋其亡日乃是發夢之夜焉出夢記元淵後魏廣陽王元淵夢著袞衣倚槐樹問占者楊元􅍬元􅍬言當得三公退謂人曰死後得三公耳槐字木傍鬼果為爾朱榮所殺贈司徒出酉陽雜俎許超許超夢盜羊入獄問楊元稹元稹曰當得城陽令後封城陽侯出酉陽雜爼北齊李廣北齊侍御史李廣博覽羣書修史夜夢一人曰我心神也君役我太苦辭去俄而廣疾卒出獨異志蕭鏗齊宜都王鏗年七歲出閤陶𢎞景為侍讀八九年中甚相接遇後鏗遇害時𢎞景隠山中夢鏗來慘然言别曰某今命過無罪後三年當生某家𢎞景訪之以幽中事多祕不出及覺即使人至都參訪果與夢符𢎞景因此著夢記出夢記徐孝嗣徐孝嗣字始昌曾在率府晝臥北壁下夢兩童子遽云移公牀孝嗣驚起壁有聲行數歩而壁倒壓牀出談藪梁江淹宣城太守濟陽江淹少時嘗夢人授以五色筆故文彩俊發後夢一丈夫自稱郭景純謂淹曰前借卿筆可以見還探懐得五色筆與之自爾淹文章躓矣故時人有才盡之論出南史代宗李輔國恣横無君代宗漸惡之因寢夢登樓見高力士領數百鐵騎以㦸刺輔國流血灑地前後歌呼自北而去遣謁者問其故力士曰明皇之命也帝覺不輒言及輔國為盜所殺帝異之方以其夢話於左右出杜陽雜編徐善江南偽中書舍人徐善幼孤家于豫章楊吳之尅豫章善之妹為一軍挍所虜既定軍挍得善請以禮聘之善自以舊族不當與戎士為婚固不許乃强納幣焉悉擲棄之臨以白刃亦不懼然竟虜之而去善即詣楊都求見吳楊渥而訴之時渥初嗣藩服府廷甚嚴僭擬王者布衣游士旬歲不得一見而善始至白沙渥夜夢人來言曰江西有秀才徐善將來見公今在白沙逆旅矣其人良士也且有情事公可厚遇之旦即遣騎迎之既至禮遇甚厚且問所欲言善具白其妹事即命贖歸于徐氏時歙州刺史陶雅聞而異之因辟為從事出稽神録隋文帝隋文帝未貴時常舟行江中夜泊中夢無左手及覺甚惡之及登岸詣一草庵中有一老僧道極高具以夢告之僧起賀曰無左手者獨拳也當為天子後帝興建此庵為吉祥寺在武昌下三十里出獨異志唐高祖唐太宗為秦王時年十八與晉陽令劉文靜首謀之夜高祖夢墮牀下見遍身為蟲蛆所食甚惡之諮詢於安樂寺智滿禪師師俗姓賈氏西河人也戒行高潔師曰此可拜乎夫牀下者陛下也羣蛆食者所謂羣生共仰一人活耳高祖喜其言又云貧僧頗習易以卦之象明夷之兆按易曰巽在牀下紛若無咎而早吉晚凶斯固體大不可以小小則敗大則濟可作大事以濟羣生無徃不亨乃必成乎高祖動容曰雖蒙善誘未敢當禪師眄秦王曰郎君與大人並叶兆夢是謂幹父之蠱考用無咎天理人事昭然可知不可固拒天之與也天與不取必受其咎無乃不可乎高祖拜而謝曰弟子何幸再煩鄭重丁寧之意敢不敬從出廣德神異録戴胄戴胄素與舒州别駕沈裕善胄以唐貞觀七年死至八年八月裕在州夢其身行於京師義寧坊西南街每見胄著故弊衣顔容甚顇見裕悲喜問公生平修福今者何為答曰吾昔誤奏殺人吾死後他人殺羊祭我由此二事辯答辛苦不可具言今亦勢了矣因謂裕曰吾平生與君善友竟不能進君官位深恨于懷君今自得五品文書已過天曹相助欣慶故以相報言畢而寤向人説之冀夢有徵其年冬裕入京叅選有銅罰不得官又向人説所夢無驗九年春裕將歸江南行至徐州奉詔書授裕五品為婺州治中出㝠報記婁師德婁師德布衣時常因沉疾夢一人衣紫來榻前再拜曰君之疾且間矣幸與某偕去即引公出忽覺力甚㨗自謂疾愈行路數里見有􅅟署左右吏卒朱門甚高曰地府院驚曰何地府院而在人間乎紫衣者對曰㝠道固與人接跡世人又安得而知之公入其院吏卒辟易而退見一空室曰司命署問職何如對曰主世人禄命之籍也公因竊視之有書數千幅在几上傍有緑衣者稱為按掾公命出已之籍按取一軸以進公閲之書已名載其禄位年月履歴清貴出入台輔壽至八十有五覽之喜謂按掾曰某一布衣耳無饑凍足矣又安敢有他望乎言未畢忽有一聲㳂空而下震徹簷宇按掾驚曰天皷且動君宜疾歸不可留矣聞其聲遂驚悟始為夢遊耳時天已曙其所居東鄰有佛寺擊曉鐘葢按掾所謂天皷者也是日疾亦間焉後入仕厯官咸所載者及為西京帥一日見黄衣使者至閤前曰㝠途小吏奉命請公公曰吾嘗見司命之籍紀吾之位當至上台壽凡八十有五何為遽見命耶黄衣人曰公任某官時嘗悞殺無辜人位與壽為主吏所降今則窮矣言訖忽亡所見自是臥疾三日乃薨也出宣室志顧琮顧琮為補闕嘗有罪繫詔獄當伏法琮一夕憂愁坐而假寐忽夢見其母下體琮愈懼形於顔色流輩問琮以夢告之自謂不祥之甚也時有善解者賀曰子其免乎問何以知之曰太夫人下體是足下生路也重見生路何吉如之吾是以賀也明日門下侍郎薛稷奏刑失入竟得免琮後至宰相出廣異記天后唐則天后夢一鸚鵡羽毛甚偉兩翅俱折以問宰臣羣公黙然内史狄仁傑曰鵡者陛下姓也兩翅折者陛下二子廬陵相王也陛下起此二子兩翅全也武承嗣武三思連項皆赤後契丹圍幽州檄朝廷曰還我廬陵相王來則天乃憶狄公之言曰卿曽為我占夢今乃應矣朕欲立太子何者為得傑曰陛下内有賢子外有賢姪取舍詳擇斷在聖𠂻則天曰我自有聖子承嗣三思是何疥癬承嗣等懼掩耳而走即降敇追廬陵立為太子充元帥初募兵無有應者聞太子行北邙山頭皆兵滿無容人處賊自退散出朝野僉載薛季昶唐薛季昶為荆州長史夢猫兒伏臥於堂限上頭向外以問占者張猷猷曰猫兒者爪牙伏門限者閫外之事君必知軍馬之要未旬日除桂州都督嶺南招討使出朝野僉載𤣥宗𤣥宗嘗夢落殿有孝子扶上他日以問高力士力士云孝子素衣此是韋見素耳帝深然之數日自吏部侍郎拜相出廣異記又𤣥宗夢入井有一兵士著緋褌背負而出明日使於兵號中尋訪總無此人又於苑中捜訪見一掌闗着緋褌便引見上問汝昨夜作何夢對曰從井中背負日出登天上覩其形狀與夢相似乃問汝欲官乎答曰臣不解作官臣家貧遂敕賜錢五百千出定命録魏仍魏仍與李龜年同選相與夢魏夢見侍郎李彭年使人喚仍於銓門中側耳聽之龜年夢有人報侍郎注與君一畿丞明日共解此夢以為門中側耳是聞字應是聞喜果唱聞喜尉李龜年果唱蘄州蘄縣丞仍後貶齊安郡黄崗尉准敕量移乞夢夢拾得一毛蠅子與李龜年占議云毛字千下有七應去此一千七百里如其言出定命録陳安平給事中陳安平子年滿赴選與鄉人李仙藥臥夜夢十一月養蚕仙藥占曰十一月養蚕冬絲也君必送東司數日果送吏部出朝野僉載李瞿曇饒陽李瞿曇勲官番滿選夜夢一母猪極大李仙藥占曰母猪㹠主也君必得屯主數日果如其言出朝野僉載趙良器趙良器嘗夢有十餘棺並頭而列良器從東厯踐其棺至第十一棺破陷其脚後果厯任十一政至中書舍人卒高適任廣陵長史嘗謂人曰近夢於大㕔上見叠累棺木從地至屋脊又見旁有一棺極為寛大身入其中四靣不滿不知此夢如何其後累厯諸任改為詹事亦寛慢之官矣出定命録奚陟奚侍郎陟少年未從官夢與朝客二十餘人就一㕔中喫茶時方甚熱陟東行首坐茶起西自南而去二盌行不可得至奚公渴甚不堪其忍俄有一吏走入肥大抱簿書近千餘紙以案致筆硯請押陟方熱又渴兼惡其肥忿之乘高推其案曰且將去濃墨滿硯正中文書之上并吏人之面手足衣服無不沾汚乃驚覺夜索紙筆細録藏于巾笥後十五年為吏部侍郎時人方漸以茶為上味日事修潔陟性素奢先爲茶品一副餘公卿家未之有也風爐越甌盌托角匕甚佳妙時已熱飡罷因請同舍外郎就㕔茶會陟為主人東面首坐坐者二十餘人兩甌緩行盛又至少揖客自西面始雜以笑語其茶益遲陟先有痟疾加之熱乏茶不可得燥悶頗極逡廵有一吏肥黑抱大文簿兼筆硯滿面瀝汗遣押陟惡忿不能堪乃於階上推曰且將去并案皆倒正中令史面及簿書盡汚坐客大笑陟方悟昔年之夢語於同省明日取所記事驗之更無毫分之差焉出逸史張鷟張鷟曾夢一大鳥紫色五彩成文飛下至庭前不去以告祖父云此吉祥也昔蔡衡云鳳之𩔖有五其色赤文者鳳也青者鸞也黄者鵷雛也白者鴻鵠也紫者鸑鷟也此鳥為鳳凰之佐汝當為帝輔也遂以為名字焉鷟初舉進士至懐州夢慶雲覆其身其年對䇿考功員外騫味道以為天下第一又初為岐王屬夜夢著緋乘驢睡中自怪我衣緑裳乘馬何為衣緋却乘驢其年應舉及第授鴻臚丞未經考而授五品此其應也出朝野僉載裴元質河東裴元質初舉進士明朝唱策夜夢一狗從竇出挽弓射之其箭遂撆以為不祥問曹良史曰吾徃唱䇿之夜亦為此夢夢神為吾解之曰狗者第字頭也弓第字身也箭者第􅆆也有撆為第也尋而唱第果如夢焉出朝野僉載潘玠潘玠自稱出身得官必先有夢與趙自勤同選俱送名上堂而官乆不出後玠云已作夢官欲出矣夢玠與自勤同謝官玠在前行自勤在後及謝處玠在東公在西相視而笑其後三日果官出玠為御史自勤為拾遺同日謝初引玠在前先行自勤在後入朝則玠於東立自勤於西立兩人遂相視而笑如其夢焉出定命録樊系員外郎樊系未應舉前一年嘗夢及第牓出王正卿為牓頭一牓二十六人明年方舉登科之後果是王正卿為首人數亦同系又自挍書郎調選吏部侍郎逹奚珣深器之一注金城縣尉系不受逹奚公云挍書得金城縣尉不作更作何官系曰不敢嫌畿尉但此官不是系官經月餘本銓更無闕與換抑令入甲系又不伏其時崔異於東銓注涇陽尉縁是憂闕不授異尚書崔翹之子遂别求換一闕適遇系此官不定當日牓引逹奚謂云不作金城耶與公改注了公自云合得何官耶系云夢官合𢃄陽字逹奚歎曰是命也因令唱云乃涇陽縣尉出定命録吕諲吕諲嘗晝夢為地府所追隨見判官判官云此人勲業甚高當不為用諲便仰白母老子幼家無所主控告甚切判官令將過王尋問左右白王此人已得一替問替為誰云是蒯適王曰蒯適名士職當其任遂放諲諲時與妻兄顧況同宿既覺為況説之後數十日而適攝吳縣丞甚無恙而況數玩諲以為歡笑適月餘罷職修第於吳之積善里忽有走卒衝入謁云丁侍御傳語令參三郎適云初不聞有丁侍御為誰卒曰是仙芝適曰仙芝卒於餘杭何名侍御卒曰地下侍御耳適惡之曰地下侍御何意傳語生人卒曰兼令相追不獨傳語名籍已定難可改移適求其白丁侍御已未合死乞為求代卒去復來云侍御不許催令促裝因中疾數日而死出廣異記太平廣記卷二百七十七
