body:
  text: 太平廣記卷三十九神仙三十九劉晏崔希真韋老師麻陽村人慈心仙人劉晏唐宰相劉晏少好道術精懇不倦而無所遇常聞異人多在市肆間以其喧雜可混跡也後遊長安遂至一藥舗偶問云常有三四老人紗帽拄杖來取酒飲訖即去或兼覔藥看亦不多買其亦非凡俗者劉公曰早晚當至曰明日合來劉公平旦往少頃果有道流三人到引滿飲酒談謔極歡旁若無人良久曰世間還有得似我軰否一人曰王十八遂去自後每憶之不可尋求及作刺史往南中過衡山縣時春初風景和暖喫冷淘一盤香菜茵陳之類甚為芳潔劉公異之吿郵史曰側近莫有衣冠居否此菜何所得答曰縣有官園子王十八能種所以館中常有此蔬菜劉公忽驚記所遇道者之説乃曰園近逺行去得否曰即館後遂往見王十八衣犢鼻灌畦狀貌山野望劉公趨拜戰栗漸與同坐問其鄉里家屬曰蓬飄不省亦無親族劉公異疑之命坐索酒與飲固不肯却歸晏乃詣縣自請同往南中縣令都不喻當時發遣王十八亦不甚拒破衣草履登舟而行劉公漸與之熟令妻子見拜之同坐茶飯形容衣服日益􅁾敝家人並竊惡之夫人曰豈兹有異何為如此劉公不懈去所詣數百里患痢朝夕困極舟船隘窄不離劉公之所左右掩鼻罷食不勝其苦劉公都無厭怠之色但憂慘而已勸就湯粥數日遂斃劉公嗟歎涕泣送終之禮無不精備乃葬於路隅後一年官替歸朝至衡山縣令郊迎既坐曰使君所將園子去尋却回乃應是不堪驅使劉公驚問何時歸曰後月餘日即歸云奉處分放廻劉公大駭當時步至園中茅屋雖存都無所覩隣人云王十八昨暮去矣怨悵加甚向屋再拜泣涕而返審其到縣之日乃途中疾卒之辰也遣人往發其墓空存衣服而已數月至京城官居朝列偶得重疾將至屬纊家人妻子圍視號呌俄聞叩門甚急閽者走呼曰有人稱王十八令報一家皆歡躍迎拜王十八微笑而入其卧所疾已不知人久矣乃盡令去幛蔽等及湯藥自於腰間取一葫蘆開之瀉出藥三丸如小豆大用葦筒引水半甌灌而搖之少頃腹中如雷鳴逡廵開眼蹷然而起都不似先有疾狀夫人曰王十八在此晏乃涕泗交下牽衣再拜若不勝情妻女及僕使並泣王十八悽然曰奉酬舊情故來相救此藥一丸可延十嵗至期某却來自取啜茶一椀而去劉公固請少淹留不可又欲與之金帛復大笑後劉公拜相兼領鹽鐵坐事貶忠州三十年矣一旦有疾王十八復來曰要見相公劉公感歎頗極延入閣中又懇求王十八曰所疾即愈且還其藥遂以鹽一兩投水令飲飲訖大吐吐中有藥三丸顏色與三十年前服者無異王十八索香湯洗之劉公堂姪侍疾在側遂攫其二丸吞之王十八熟視笑曰汝有道氣我固知為汝掠也趨出而去不復言别劉公尋痊復數月有詔至乃卒出逸史崔希真大厯初鍾陵客崔希真家于郡西善鼓琴工繪事好修養之術二年十月初朔夜大雪希真晨出門見一老人衣簑戴笠避雪門下崔異之請入既去簑笠見神色毛骨非常人也益敬之問曰家有大麥麪聊以充飯叟能是乎老父曰大麥受四時氣穀之善者也能沃以豉汁則彌佳崔因命家人具之間又獻松花酒老父曰花澁無味某野人也能令其醇美乃於懷中取一丸藥色黄而堅老人以石碎之置於酒中則頓甘美矣復以數丸遺希真希真請問老父笑而不答崔入宅於窻窺之見老父於幃幄前所掛素上如有所塗瞬息而罷崔少頃具饌獻受而不辭崔後入内出已去矣遂踐雪尋跡數里至江入蘆洲中見一大船船中數人狀貌皆奇而樵客在側其人顧笑曰葛三乃見逼於伊人廻謂崔曰尊道嚴師之禮不必然也崔拜而謝之歸視幄中得圖焉有三人二樹一白鹿一藥笈其二人蓋方外之狀手執𤣥芝採藥者一仙樹似栢皆斷岌為風雨所敗枯槁之狀根相連屬皆非常意所及後將圖并丸藥詣茅山問李涵光天師天師曰此真人葛洪第三子所畫也李君又曰寫神人形狀於朽木之下意若得道者壽過松栢也其藥乃千嵗松膠也出原化記韋老師嵩山道士韋老師者性沉黙少語不知以何術得仙常養一犬多毛黄色每以自隨或獨坐山林或宿雨雪中或三日五日至岳寺求齋餘而食人不能知也唐開元末嵗牽犬至岳寺求食僧徒爭競怒問何故復來老師云求食以與犬耳僧發怒慢罵令奴盛殘食與乞食老道士食老師悉以與犬僧之壯勇者又慢罵欲毆之犬視僧色怒老師撫其首久之衆僧稍引去老師乃出於殿前池上洗犬俄有五色雲遍滿溪谷僧駭視之雲悉飛集池上頃刻之間其犬長數丈成一大龍老師亦自洗濯服綃衣騎龍坐定五色雲捧足冉冉昇天而去僧寺作禮懴悔已無及矣出驚聼録麻陽村人辰州麻陽縣村人有猪食禾人怒持弓矢伺之後一日復出人射中猪猪走數里入大門門中見室宇壯麗有一老人雪髯持杖青衣童子隨後問人何得至此人云猪食禾因射中之隨逐而來老人云牽牛蹊人之田而奪之牛不亦甚乎命一童子令與人酒飲前行數十步至大㕔見羣仙羽衣烏幘或摴蒲或奕碁或飲酒童子至飲所傳教云公令與此人一杯酒飲畢不饑又至一所有數十床床上各坐一人持書狀如聼講久之却至公所公責守門童子曰何以開門令猪得出入而不能知乃謂人曰此非真猪君宜出去因命向童子送出人問老翁為誰童子云此所謂河上公上帝使為諸仙講易耳又問君復是誰童子云我王輔嗣也受易已來向五百嵗而未能通精義故被罰守門人去後童子蹴一大石遮門遂不復見出廣異記慈心仙人唐廣徳二年臨海縣賊袁晁寇永嘉其船遇風東漂數千里遙望一山青翠森然有城壁五色照曜廻舵就泊見精舍瑠璃為瓦瑇瑁為墻既入房廊寂不見人房中唯有胡㹻子二十餘枚器物悉是黄金無諸雜類又有衾茵亦甚炳煥多是異蜀重錦又有金城一所餘碎金成堆不可勝數賊等觀不見人乃竟取物忽見婦人從金城出可長六尺身衣錦繡上服紫綃裙謂賊曰汝非袁晁黨耶何得至此此器物須爾何與輙敢取之向見㹻子汝謂此為狗乎非也是龍耳汝等所將之物吾誠不惜但恐諸龍蓄怒前引汝船死在須臾耳宜速還之賊等列拜各送物歸本處因問此是何處婦人曰此是鏡湖山慈心仙人修道處汝等無故與袁晁作賊不出十日當有大禍宜深慎之賊黨因乞便風還海岸婦人廻頭處分尋而風起羣賊拜别因便揚帆數日至臨海船上沙塗不得下為官軍格死唯婦人六七人獲存浙東押衙謝詮之配得一婢名曲葉親説其事出廣異記太平廣記卷三十九
