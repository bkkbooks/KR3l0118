body:
  text: 太平廣記卷四百三宋李昉等編寶四馬腦犀月鏡秦寶珊瑚四寳宫延清室玉如意七寶鞭犀導王清三寶寶骨紫靺鞨紫貝魏生馬腦帝顓頊時丹邱之國獻馬腦甕以盛甘露帝徳所被殊方入貢以露充於厨也馬腦石𩔖也南方者為上今善别者馬死則扣其腦而視其色如血者則日行萬里能騰飛空虚腦色黄者日行千里腦色青者嘶聞數百里外腦色黑者入水毛鬛不濡日行五百里腦色白者多力而駑今為器多用赤色者若是人功所製者多不成器成器亦拙其國人聴馬鳴别其腦色出王子年拾遺犀犀牛大約似牛而猪頭脚似象蹄有三甲首有二角一在額上為兕犀一在鼻上挍小為胡帽犀鼻上者皆窘束而花㸃少多有奇文牯犀亦有二角皆為毛犀俱粟文堪為腰帶千百犀中或偶有通者花㸃大小奇異固無常定有偏花路通者有頂花大而根花小者謂之倒插通此二種亦五色無常矣若通白黑分明花㸃奇差則價計巨萬乃希世之寶也又有堕羅犀犀中最大一株有重七八觔者云是牯牛額上者必花多是撒頭豆㸃也深者堪為銙散而淺即拍為盤楪器皿之𩔖又有駭雞犀羣雞見之驚散辟塵犀為婦人簮梳塵不着也辟水犀云此犀行於海水為之開色於霧之中不濕矣明犀處於暗室則有光明此數犀但聞其説即不可得而見也出嶺表録異月鏡周靈王起處昆昭之臺有侍臣萇𢎞巧智如流因而得侍長夜宴樂或俳諧舞笑有殊俗之技百戲駢列鐘石並奏亦獻異方珍寳有如玉之人如龍之錦亦有如鏡之石如石之鏡此石色白如月照靣如雪謂之月鏡玉人皆有機𩔖自能轉動謂之機妍萇𢎞言於王曰聖德所招也故周人以𢎞媚諂而卒殺之流血成石或言成璧不見其尸矣出王子年拾遺秦寶漢高祖初入咸陽宫周行府庫金玉珍寶不可稱言其所驚異者有玉五支燈髙七尺五寸下作蟠螭以口銜燈燈燃則鱗甲皆動煥炳若列星而盈室焉復鑄銅人十二枚皆髙三尺列在一筵上琴筑笙竽各有所執皆結華彩若生人筵下有二銅管上口髙數尺出筵後其一管空一管内有繩大如指使一人吹空管一人紐繩則琴筑笙竽皆作與眞樂不異焉玉琴長六尺上安十三絃二十六徽皆用七寳飾之銘曰璵璠之樂玉笛長二尺三寸六孔吹之則見車馬山林𨼆嶙相攻吹息亦不復見銘曰昭華之管有方鏡廣四尺髙五尺九寸表裏洞明人直來照之影則倒見以手掩心而來即見腸胃五臟厯厯無礙人有疾病在内者則掩心而照之必知病之所在又女子有邪心則膽張心動秦始皇帝常以照宫人膽張心動則殺之也高祖悉封閉以待項羽羽并將以東後不知所在出西京雜記珊瑚漢宫積草池中有珊瑚高一丈二尺一本三柯上有四百六十三條是南越王趙佗所獻號曰烽火樹夜有光常欲然出西京雜記又鬱林郡有珊瑚市海客市珊瑚處也珊瑚碧色一株株數十枝枝間無葉大者髙五六尺尤小者尺餘蛟人云海上有珊瑚宫漢元封二年鬱林郡獻珊瑚婦人帝命植於殿前謂之女珊瑚忽柯葉甚茂至靈帝時樹死咸以為漢室將衰之徵也出述異記又􅀢箖國海去都城二千里有飛橋渡海而西至且蘭國自且蘭有積石積石南有大海海中珊瑚生於水底大船載鐵網下海中初生之時漸漸似菌經一年挺出網目間變作黄色支格交錯髙者三尺大者丈餘三年色青似鐵鈔發其根於舶上為絞車舉鐵網而出之故名其所為珊瑚州久而不採却蠧爛糜朽出洽聞記四寶宫武帝為七寶牀雜寶按屏風雜寶帳設於桂宫時人謂之四寶宫出拾遺錄延清室董偃常卧延清之室以畫石為牀葢石文如畫也石體甚輕出郅支國上設紫瑠璃帳火齊屏風列靈麻之燭以紫玉為盤如屈龍皆雜寶飾之視者於戸外扇偃偃曰玉石豈須扇而後清涼耶侍者屏扇以手摹之方知有屏風也偃又以玉精為盤貯冰於膝前玉精與冰同潔徹侍者言以冰無盤必融濕席乃和玉盤拂之落階下冰玉俱碎偃更以為樂此玉精千塗國所貢也武帝以此賜偃哀平之世民皆猶有此器而多殘破王莽之世不復知所在出拾遺記玉如意吳孫權時有掘得銅匣長二尺七寸以琉璃為葢又一白玉如意所執處皆刻龍虎及蟬形莫能識其由使人問綜綜博物者也曰昔秦皇以金陵有天子氣平諸山阜處處埋寶以當王氣此葢是乎出酉陽雜俎七寶鞭晉明帝單騎潛入窺王敦營敦覺使騎追之帝奔仍以七寳鞭顧逆旅嫗扇馬屎王敦追之人見馬屎以為帝去已逺仍寳鞭不復前追出世説犀導晉東海蔣潛嘗至不其縣見林下踣一屍已臭爛烏來食之輒見一小兒長三尺許來驅烏烏乃起如此非一􅅗異之乃就看之見死人頭上著通天犀導價數萬錢乃㧞取之既去衆烏爭集無復驅者􅅗後以此導上晉武陵王王薨以襯衆僧王武剛以九萬錢買之後落褚太宰處褚以餉齊故丞相豫章王王死後内人江夫人遂斷以為釵每夜輒見一兒繞床頭啼呌云何為見屠割必當相報終不獨受枉酷江夫人惡之月餘遂薨出續齊諧記玉清三寶杜陵韋弇字景昭開元中舉進士第寓遊於蜀蜀多勝地㑹春末弇與其友數輩為花酒宴雖夜不怠一日有請者曰郡南去十里有鄭氏亭亭起苑中眞塵外境也願偕去弇聞其説喜甚遂與俱南出十里得鄭氏亭端空危危横然四峙門用花闢砌用烟矗弇望之不暇他視眞所謂塵外境也使者揖弇入既入見亭上有神仙十數皆極色也凝立若佇半掉雲袂飄飄然其侍列左右者亦十數紋繡杳𦕈殆不可識有一人望弇而語曰韋進士來命左右請上亭斜欄層去既上且拜羣仙喜曰君不聞劉阮事乎今日亦如是願奉一醉將盡春色君以為何如弇謝曰不意今日得為劉阮幸何甚哉然則此為何所女郎义何為者願一聞知羣仙曰我玉清之女也居於此久矣此乃玉清宫也向聞君為下第進士寓遊至此將以一言奉請又懼君子不顧且貽其辱是以假鄭氏之亭以命君果副吾志雖然此仙府也雖云不可滯世間人君居之固無損耳幸不以為疑即命酒樂宴亭中絲竹盡舉飄然泠然凌𤣥越㝠不為人閒聲曲酒既酣羣仙曰吾聞唐天子尚神仙吾有新樂一曲曰紫雲願授聖主君唐人也為吾傳之一進可乎曰弇一儒也在長安中徒為區區於塵土間望天子門且不可見之又非知音者曷能致是羣仙曰君既不能吾將以夢傳於天子可也又曰吾有三寳將以贈君能使君富敵王侯君受之乃命左右取其寳始出一杯其色碧而光瑩洞澈顧謂弇曰碧瑤盃也又出一枕似玉微紅紅㽔枕也又出一小函其色紫亦似玉而瑩澈則過之曰紫玉函也已而皆授弇弇拜謝别去行未及一里迴望其亭茫然無有弇異之亦竟不知何所也遂挈其寳還長安明年下第東遊至廣陵因以其寳集於廣陵市有胡人見而拜曰此天下之奇寳也雖千萬年人無得者君何得而有弇以告之因問曰此何寶乎曰乃玉清眞三寶也遂以數千萬為直而易之弇由是建甲第居廣陵中為豪士竟卒於白衣也出宣室志寶骨長安平康坊菩提寺緣李林甫宅在東故建鐘樓於西寺内有郭令玳瑁鞭及郭令王夫人七寶帳寺主元意多識故事云李相每至生日常轉請此寺僧就宅設齋有一僧嘗讚佛施鞍一具賣之價直七萬又僧廣有聲口經數年次當讚佛因極祝林甫功徳冀獲厚襯畢簾下出綵篚香羅帊籍一物如朽釘長數寸僧歸大失所望慚惋數日且意大臣不容欺己遂攜至西市示於胡商索價一千胡見之大笑曰未也更極意言之加至五百千胡人曰此寶價直一千萬遂與之僧訪其名曰此寶骨也出酉陽雜俎紫䍪羯乾元中國家以尅復二京糧餉不給監察御史康云間為江淮度支率諸江淮商旅百姓五分之一以補時用洪州江淮之間一都㑹也云間令錄事叅軍李惟燕典其事有波斯胡人者率一萬五千貫腋下小瓶大如合拳問其所實詭不實對請率百萬惟燕以所納紿衆難違其言詐驚曰上人安得此物必貨此當不違價僧試求五千而去胡人至揚州長史鄧景山知其事以問胡胡云瓶中是紫䍪羯人得之者為鬼神所䕶入火不燒涉水不溺有其物而無其價非明珠雜貨寶所能及也又率胡人一萬貫胡樂輸其財而不為恨瓶中有珠十二顆出廣異記紫貝紫貝即砑螺也儋振夷黎海畔採以為貨南越志云土產大貝即紫貝也出嶺表錄異魏生唐安史定後有魏生者少以勲戚厯任王友家財累萬然其交結不􅁤之徒由是窮匱為士旅所擯因避亂將妻入嶺南數年方寧後歸舟行至䖍州界因暴雨息後登㟁肆目忽於砂磧閒見一地氣直上衝數十丈從而尋之石閒見石片如手掌大狀如甕片又𩔖如石半青半赤甚辨焉試取以歸致之書篋及至家故舊蕩盡無財賄以求叙錄假屋以居市肆多賈客胡人等舊相識者哀之皆分以財帛嘗因胡客自為寶㑹胡客法每年一度與鄉人大㑹各閲寶物寶物多者戴帽居於坐上其餘以次分列召生觀焉生忽憶所拾得物取懷之而去亦不敢先言之坐於席末食訖諸胡出寶上坐者出明珠四其大逾徑寸餘胡皆起稽首禮拜其次以下所出者或三或二悉是寶至坐末諸胡咸笑戲謂生君亦有寶否生曰有之遂所出懷以示之而自笑三十餘胡皆起扶生於座首禮拜各足生初為見謔不勝慚悚後知誠意大驚異其老胡見此石亦有泣者衆遂求生請市此寶恣其所索生遂大言索百萬衆皆怒之何故辱吾此寳加至千萬乃已􅅗問胡此寶名何胡云此是某本國之寶因亂遂失之已經三十餘年我王求募之云獲者拜國相此歸皆獲厚賞豈止於數百萬哉問其所用云此寶母也但每月望王自出海㟁設壇致祭之以此置壇上一夕明珠寶貝等皆自聚故名寶母也生得財倍其先資也出原化記太平廣記卷四百三
