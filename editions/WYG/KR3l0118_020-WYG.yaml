body:
  text: 太平廣記卷二十神仙二十隂隱客譚宜王可交楊通幽隂隱客唐神龍元年房州竹山縣百姓隂隱客家富莊後穿井二年已濬一千餘尺而無水隱客穿鑿之志不輟二年外一月餘工人忽聞地中雞犬鳥雀聲更鑿數尺傍通一石穴工人乃入穴探之初數十歩無所見但捫壁傍行俄轉有如日月之光遂下其穴下連一山峰工人乃下山正立而視則别一天地日月世界其山傍向萬仞千岩萬壑莫非靈景石盡碧琉璃色每岩壑中皆有金銀宫闕有大樹身如竹有節葉如芭蕉又有紫花如盤五色蛺蝶翅大如扇翔舞花間五色鳥大如鶴翺翔樹杪每岩中有清泉一眼色如鏡白泉一眼白如乳工人漸下至宫闕所欲入詢問行至闕前見牌上署曰天桂山宫以銀字書之門兩閣内各有一人驚出各長五尺餘童顔如玉衣服輕細如白霧綠煙綘脣皓齒鬒髪如青絲首冠金冠而跣足顧謂工人曰汝胡為至此工人具陳本末言未畢門中有數十人出云恠有昏濁氣令責守門者二人惶懼而言曰有外界工人不意而到詢問途次所以來奏須臾有緋衣一人傳敕曰敕門吏禮而遣之工人拜謝未畢門人曰汝已至此何不求遊覽畢而返工人曰向者未敢儻賜從容乞乘便言之門人遂通一玉簡入旋而玉簡却出門人執之引工人行至清泉眼令洗浴及澣衣服又至白泉眼令盥漱之味如乳甘美甚連飲數掬似醉而飽遂為門人引下山每至宫闕只得於門外而不許入如是經行半日至山趾有一國城皆是金銀珉玉為宫室城樓以玉字題云梯仙國工人詢于門人曰此國何如門人曰此皆諸仙初得仙者關送此國修行七十萬日然後得至諸天或玉京蓬萊崑䦘姑射然方得仙宫職位主籙主印飛行自在工人曰既是仙國何在吾國之下界門人曰吾此國是下界之上仙國也汝國之上還有仙國如吾國亦曰梯仙國一無所異言畢謂工人曰卿可歸矣遂却上山尋舊路又令飲白泉數掬臨至山頂求穴門人曰汝來此雖頃刻人間已數十年矣却出舊穴應不可矣待吾奏請通天關鑰匙送卿歸工人拜謝須臾門人􅂝金印及玉簡又引工人别路而上至一大門勢侔樓閣門有數人俯伏而候門人示金印讀玉簡劃然開門門人引工人上纔入門為風雲擁而去因無所覩唯聞門人云好去為吾致意於赤城真伯須臾雲開已在房州北三十里孤星山頂洞中出後詢隂隱客家時人云已三四世矣開井之由皆不能知工人自尋其路唯見一巨坑乃崩井之所為也時貞元七年矣工人尋覔家人了不知處自後不樂人間遂不食五榖信足而行數年後有人於劍閣鷄冠山側近逢之後莫知所在出博異志譚宜譚宜者陵州民叔皮子也開元末年生生而有異墮地能言數歳之中身逾六尺髭鬂風骨不與常兒同不飲不食行及奔馬二十餘歳忽失所在逺近異之以為神人也至是父母思念鄉里追立廟以祀之大歴元年丙午忽然還家即霞冠羽衣真仙流也白父母曰兒為仙官不當久在人世雖父母憶念又不宜作此祠廟恐物所憑妄作威福以害於人請為毁之廟基之下昔藏黄金甚多撤廟之後鑿地取金可以分濟貧民散遺鄉里矣言訖騰空而去如其言毁廟掘地皆得金焉所掘之處靈泉湧出澄澈異常積雨不加至旱不減郡邑禱祝必有靈應因名譚子池亦謂之天池進士周郭籓為詩以記其事曰澄水一百歩世名譚子池余詰陵陽叟此池當因誰父老謂余說本郡譚叔皮開元末年中生子字阿宜墜地便能語九歳多􅂡眉不飲亦不食未嘗言渴饑十五能行走快馬不能追二十入山林一去無還期父母憶念深鄉閭為立祠大歴元年春此兒忽來歸頭冠􅆪鳯凰身着霓裳衣普遍拯疲俗丁寧告親知余為神仙官下界不可祈恐為妖魅假不如早平夷此有黄金藏鎮在兹廟基發掘散生聚可以救貧羸金出繼靈泉湛若清琉璃泓澄表符瑞水旱無竭時言訖辭冲虛杳靄上𤣥微凡情留不得攀望衆號悲尋稟神仙誡徹廟斸開窺果獲無窮寳均融沾困危巨源出嶺頂噴湧世間稀異境流千古終年福四維出仙傳拾遺王可交王可交蘇州崑山人也以耕釣自業居於松江南趙屯村年三十餘莫知有真道常取大魚自喜以槌擊殺煮之擣蒜韮以食常謂樂無以及一旦棹漁舟方擊檝髙歌入江行數里間忽見一綵畵花舫漾于中流有道士七人皆年少玉冠霞帔服色各異侍從十餘人總角雲鬟又四人黄衣乘舫一人呼可交以姓名方驚異不覺漁舟已近舫側一道士令總角引可交上舫見七人面前各有青玉盤酒器果子皆瑩徹有光可交莫識又有女妓十餘人悉持樂噐可交逺立於筵末遍拜七人共視可交一人曰好骨相合仙生於凡賤眉間已灸破矣一人曰與酒喫侍者瀉酒而樽中酒再三瀉之不出侍者具以告道士曰酒是靈物必得入口當換其骨瀉之不出亦乃命也一人又曰與栗吃俄一人於筵上取二栗付侍者與可交令便吃視之其栗青赤光如棗長二寸許囓之有皮非人間之栗肉脆而甘如飴久之食方盡一人曰王可交已見之矣可令去命一黄衣送上岸於船邊覔所乘漁舟不見黄衣曰不必漁舟但合眼自到於是合眼若風水林木浩浩之聲令開眼已到失黄衣所在但見峰巒重疊松栢參天坐於草中石上及望見有門樓人出入俄頃採樵者并僧十餘人到問可交何人可交具以前事對又問何日離家可交曰今日早離家又問今日是何日對是三月三日樵者與僧驚今日是九月九去三月三日已半年餘可交問地是何所僧曰此是天台山瀑布寺前也又問此去華亭多少地僧曰水陸千餘里可交自訝不已乃為僧邀歸寺設食可交但言飽不喜聞食氣唯飲水耳衆僧審問極異之乃以狀白唐興縣以達台州以聞越州㢘使王渢素奉道召之見極以為非常之事神仙變化不可測也可交身長七尺餘儀貌殊異言語清爽渢歎曰此誠真仙人也又以同姓益敬之餙以道服而遣人至蘇州以詰其實具言三月三日可交乘漁舟入江不歸家人尋得漁舫謂墮江死漉之無跡妻子以招魂塟訖王渢具以表聞詔甚稱異後可交却歸鄉里備話歴歴及與鄉人到江上指所逢花船之處依然可交食栗後已絶榖動靜若有神助不復耕釣乃挈妻子往四明山二十餘年復出明州賣藥使人沽酒得錢但施於人時言藥則壺公所授酒則餘杭阿母相傳藥極去疾酒甚醉人明州里巷皆言王仙人藥酒世間不及道俗多圖其形像有患痁及邪魅者圖於其側即愈後三十餘年却入四明山不復出今人時有見之者出續神仙傳楊通幽楊通幽本名什伍廣漢什邡人幼遇道士教以檄召之術受三皇天文役命鬼神無不立應驅毒厲翦氛邪禳水旱致風雨是皆能之而木訥踈傲不拘於俗其術數變異逺近稱之𤣥宗幸蜀自馬嵬之後屬念貴妃往往輟食忘寐近侍之臣密令求訪方士冀少安聖慮或云楊什伍有考召之法徴至行朝上問其事對曰雖天上地下㝠寞之中鬼神之内皆可歴而求之上大悦於内置塲以行其術是夕奏曰已於九地之下鬼神之中遍加搜訪不知其所上曰妃子當不墜于鬼神之伍矣二日夜又奏曰九天之上星辰日月之間虛空杳㝠之際亦遍尋訪而不知其處上悄然不懌曰未歸天復何之矣炷香燃燭彌加懇至三日夜又奏曰於人寰之中山川岳瀆祠廟之内十洲三島江海之間亦遍求訪莫知其所後於東海之上蓬萊之頂南宫西廡有羣仙所居上元女仙太真者即貴妃也謂什伍曰我太上侍女𨽻上元宫聖上太陽朱宫真人偶以宿緣世念其願頗重聖上降居於世我謫於人間以為侍衛耳此後一紀自當相見願善保聖體無復意念也乃取開元中所賜金釵鈿合各半玉龜子一寄以為信曰聖上見此自當醒憶矣言訖流涕而别什伍以此物進之上澘然良久乃曰師昇天入地通幽達㝠真得道神仙之士也手筆賜名通幽賜帛千叚金銀各千兩良田五千畝紫霞帔白玉簡特加禮異暇日問其所受之道曰臣師乃西城王君青城真人昔於後城山中教以召命之術曰可以輔贊太平之君然後方得飛昇之道戒以䕶氣希言目不妄視絶聲利逺囂塵則可以凌三界登太清矣又問昇天入地何門而往何所為礙曰得道之人入火不熱入水不濡躡虛如履實觸實如蹈虛其所以然者形與道合道無不在毫芒之細萬物之衆道皆居之上善其對居數載乃登後城山葺静室於其頂時還其家門人言天真累降於静室一旦與羣真俱去出仙傳拾遺太平廣記卷二十
