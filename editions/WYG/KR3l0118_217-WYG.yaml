body:
  text: 太平廣記卷二百十七卜筮二沈七潁隂日者王栖巖路生鄒生五明道士黄賀鄧州卜者沈七有沈七者越州人善卜李丹貟外謂之曰聞消息李侍郎知政事某又得給事中如何沈七云李侍郎即被追不得社日肉喫後此無禄公亦未改不得給事中其時去社纔十四日果有敇追李侍郎去社兩日而上道至汴卒李亦不得給事中出定命録又天寶十四年王諸應舉欲入京於越州沈七處卜得純乾卦下四位動變觀卦沈云公今應舉得此卦觀國之光利用賓于王本是嘉兆然交動羣隂咸陽下成乾卦上變至四又不至五五是君位未得利見大人恐公此行不至京而迴果至東京屬安禄山反奔走却歸江東出定命録潁隂日者陳㴻為潁隂太守屬安禄山反遣縣尉姓孫向東京孫不肯行陳怒促之至東京遇禄山請往潁隂取陳澍頭禄山𥙷孫為潁隂太守賜緋并領二十餘人取澍澍聞便欲至薄晩出城走録事參軍扣馬令迴澍憂悶服痢藥託疾令一日者卜之曰從今五日當有家便來取公然有五百車禄在必亦不死至七日食時公無恙矣然當去此求住不得後五日孫到陳於是潛以庫物遺諸衙内人至夜後偽作敇書追入京令向西兩驛上差人逆來夜半敕書至明早召集諸官宣敕便令手刃就館中誅殺孫并手刃二十餘人殺録事參軍其孫尉先令入取妻及女等夜半齊到明日平明盡殺之令上住知州事便發入京以官絹五匹賞卜者出定命録王栖巖王栖巖自湘川寓江陵白鷺洲善治易窮律候隂陽之術所居桃杏手植成數十列四藩其宇時人比董奉栖巖笑曰吾獨利其花核袪風𨗳氣耳安取迹古人餘事每清旦布蓍為人决事取資足一日為生則閉齋治園大厯中嘗有老父持百錢求筮卦成參驗其年栖巖驚曰家去幾何父往矣不然將仆於道老父出栖巖顧百錢乃紙也因悟其所騐之辰則栖巖甲子乃歎曰吾雖少而治易不自意能幽入鬼鑒死復何恨乃沐浴更新衣與妻子訣少時而卒出渚宫舊事路生趙自勤嘗謁選卜於長安縣路生路云公之官若非重日即是重口後六月六日又卜路云公之官九日不出十二日出至九日宰相果索吏部由歴至十二日敕出為左拾遺拾遺之字各有一口又𥙷闕王晃七月内訪卜於路生路云九月當入省官有禮字時禮部貟外陶翰在座乃曰公即是僕替人九月陶病請假敕除王禮部貟外後又令卜云必出當為倉字官果貶温州司倉既而路生以其二子託晃晃又問畢竟當何如路云某所以令兒託公其意可知也闕鄒生武宗朝宰相李囘舊名􅄤累舉未捷嘗之洛橋有二術士一能筮一能龜乃先訪筮者曰某欲改名赴舉如之何筮者曰改名甚善不改終不成事也又訪龜者鄒生生曰君子此行慎勿易名名將逺布矣然則成遂之後二十年終當改名今則已應𤣥象異時方測余言將行又戒之曰郎君必䇿榮名後當重任接誘後來勿以白衣為隙他年必為深釁矣長慶二年李及第至武宗登極與上同名始改為囘從辛丑至庚申二十年矣乃曰筮短龜長鄒生之言中矣李公既為丞郎魏謩為給事因省㑹謂囘曰昔求府解侍郎為試官送一百二人獨小生不蒙一解今日還忝金章厠諸公之列也合坐皆驚此説欲其遜容囘曰如今脱却紫衫稱魏秀才僕為試官依前不送公公何得以舊事相讓耶囘乃尋秉獨坐之權三臺肅畏而昇相府後三五年魏公亦自同州入相而囘累被貶謫䟦涉江湖喟然嘆曰洛橋先生之誡吾自取尤耳然亦命之所牽也出雲溪友議五明道士長慶之代鄴中有五明道士者不知何許人善隂陽厯數尤攻卜筮成徳軍節度田𢎞正御下稍寛而冒於財賄誅求不息民衆怨咨時王庭湊為部將遣使於鄴既至忽有微恙數日求醫未能愈因詣五明究平生否泰道士即為卜之卦成而三錢並舞良乆方定而六位俱重道士曰此卦純乾變為坤坤土也地也大夫將來秉旄不逺兼有土地山河之分事將集矣宜速歸乎庭湊聞其言遽自掩其耳是夜又夢白鬚翁形容偉異侍從十餘人皆手持小玉斧召王公而前謂曰患難將及不可乆留既覺庭湊疑懼即辭魏帥而迴比及還家未踰旬值軍民大變𢎞正為亂兵所害士大夫將校共推庭湊庭湊再三退讓衆不聽擁脇而立之翌日飛章上奏朝廷聞之大駭徵兵攻討以裴度為元帥趙人拒命二年王師不能下俄而敬宗即世文皇帝嗣位詔曰念彼生靈乆罹塗炭雖元兇是罪而赤子何辜宜一切赦而宥之就加節制仍詔庭湊子元逵入侍因以夀春公主妻焉庭湊既立甚有治聲朝廷稱之在位十三年卒贈太師子元逵繼立官至太尉二十六年薨長子紹懿立二年荒淫暴亂衆議廢而殺之立其弟紹鼎紹鼎立六年卒子景崇立十三年官至中書令爵常山王卒子鎔立即趙王也後恣横不道為下所殺立四十一年自庭湊至鎔凡五世六主一百餘年滅初庭湊之立也遣人詣鄴取五明置於府為營館舍號五明先生院公曾從容問曰某今已忝藩侯將來禄夀更為推之道人曰三十年願明公竭節勤王愛民恤物次則保神嗇氣常以清儉為心必享殊夀後裔兼有二王皆公餘慶之所致也春秋所謂五世其昌八世之後莫之與京公曰幸事已多素無勲徳此言非所敢望因以數百金為夀道士固辭不受公亦固與之載歸其室數日盡施之一無留焉二王景崇封常山王鎔為趙王也出耳目記黃賀唐昭宗時有黄賀者自云鞏洛人也因避地來渉河遊趙家於常山以卜筮為業而言吉凶必效時趙王鎔方在幼沖而燕軍㓂北鄙王方選將拒之有勇士陳立劉榦投刺於軍門願以五百人嘗㓂必面縛戎首王壯而許之翌日二夫率師而出夜擊燕壘大振捷音燕人駭而奔退立卒於鋒刃之下榦即凱唱而還王悦賜上廐馬數匹金帛稱是俄為閹人所譖曰此皆陳立之功非榦之效王母何夫人聞之曰不必身死為君未若全身為國即賜錦衣銀帶加錢二十萬擢為中堅尉初榦曾詣賀卜卦成而謂榦曰是卦也火水未濟終有立也九二之動曳輪貞吉以正救難往有功也變而之晋明出地中奮發光揚恩澤相接子今行也利用禦戎大獲慶捷王當有車馬之賜其間小釁不足憂之行軍司馬路晏曾夜適厠有盗伏焉晏忽心動取燭照之盗即告言請無驚懼某禀命有自察公正直不忍倳刃即匣劒而去晏由是晝夜警惕以備不虞召黄生筮之卦成賀曰惕號暮夜有戎勿恤察象徵辭人有害公之意然難已過矣但守其中正請釋憂心晏亦終無患也又贊皇縣尉張師曾卧病經年日覺危殆良醫不復進藥請賀卜之卦就黄生告曰无妄之疾勿藥有喜請停理療五日必大瘳也師果應期而愈又數十年師夢白鳥飛翔墜於雲際既覺心神恍惚召賀卜算之賀即決卦慘然而問師曰朝來寢息不有夢乎必若有夢其飛禽之象乎且雷震山上鳥墮雲間聲跡兩消不可復見願加保愛樂天委命而已張竟不起時年七十一也又有叚誨者任藁城鎮將曾夜宿郵亭馬斷韁而逸數日不知所適使人詣肆而筮之賀曰據卦暌也初九動者應有亡失之事無乃䘮馬乎勿逐自復必有縶而送之者也迴未及舍已有邊鄙惡少牽而還之賀所占卜皆此𩔖也時人謂之易聖公劉巖曾詣之生謂曰君他日必成偉器然勿以春日為恨初不曉其意及老悟葢遲之謂也出耳目記鄧州卜者有書生住鄧州嘗遊郡南數月不返其家詣卜者占之卜者視卦曰甚異吾未能了可重祝祝畢拂龜改灼復曰君所卜行人兆中如病非病如死非死逾年自至矣果半稔書生歸云遊某山深洞入值物蟄如中疾四支不能動昏昏若半醉見一物自明入穴中却返良乆又至直附身引頸臨口鼻細視之乃巨龜也十息頃方去書生酌其時日其家卜時吉焉出酉陽雜爼太平廣記卷二百十七
