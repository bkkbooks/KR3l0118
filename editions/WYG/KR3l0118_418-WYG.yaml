body:
  text: 太平廣記卷四百十八龍一蒼龍曹鳳張魯女江陵姥甘宗南鄩國龍場五色石震澤洞梁武后劉甲宋雲蔡玉李靖蒼龍孔子當生之夜二蒼龍亘天而下来附徵在之房因而生夫子有二神女擎香露空中而来以沐浴徵在出王子年拾遺曹鳳後漢建武中曹鳳字仲理為北地太守政化尤異黄龍見于九里谷髙岡亭角長二丈大十圍稍至十餘丈天子嘉之賜帛百匹加秩中二千石出水經注張魯女張魯之女曽浣衣于山下有白霧濛身因而孕焉恥之自裁將死謂其婢曰我死後可破腹視之婢如其言得龍子一雙遂送于漢水既而女殯于山後數有龍至其墓前成蹊出道家雜記江陵姥江陵趙姥以沽酒為業義熙中居室内忽地隆起姥察為異朝夕以酒酹之嘗見一物出頭似驢而地初無孔穴及姥死家人聞土下有聲如哭後人掘地見一異物蠢然不測大小須㬰失之俗謂之土龍出渚宫舊事甘宗秦使者甘宗所奏西域事云外國方士能神咒者臨川禹歩吹氣龍即浮出初出乃長數十丈方士吹之一吹則龍輙一縮至長數寸乃取置壺中以少水養之外國常苦旱災于是方士聞有旱處便賫龍往出賣之一龍直金數十觔舉國㑹歛以顧之直畢乃發壺出龍置淵中復禹歩吹之長數十丈須㬰雨四集矣出抱朴子南鄩國南鄩國有洞穴隂源其下通地脉中有毛龍毛魚時蜕骨于曠澤之中魚龍同穴而處其國獻毛龍一于殷殷置豢龍之官至夏代不絶因以命族至禹導川及四海㑹同乃放于洛汭出拾遺録龍場王子年拾遺曰方丈山東有龍塲地方千里龍皮骨如山阜布散百餘頃述異記晉寜縣有龍葬洲父老云龍蜕骨于此洲其水今猶多龍骨按山阜岡岫能興雲雨者皆有龍骨或深或淺多在土中齒角尾足宛然皆具大者數十丈或盈十圍小者纔一二尺或三四寸體皆具焉嘗因採取見之論衡云蟬生于腹中開背而出必因雨而蜕虵之蜕皮亦然近蒲洲人家拆草屋于棟上得龍骨長一丈許宛然皆具出感應經五色石天目山人全文猛于新豐後湖觀音寺西岸獲一五色石大如斗文彩盤蹙如有夜光文猛以為神異抱獻之梁武梁武喜命置于太極殿側將年餘石忽光照廊廡有聲如雷帝以為不祥召杰公示之對曰此上界化生龍之石也非人間物若以洛水赤礪石和酒合藥煮之百餘沸柔輭可食琢以為飲食之器令人延夀福徳之人所應受用有聲者龍欲取之帝令馳取赤石如其法命工琢之以為甌各容五斗之半以盛御膳香美殊常以其餘屑置于舊處忽有赤龍揚鬚鼓鬣掉尾入殿擁石騰躍而去帝遣推驗乃是普通二年始平郡石鼓村鬭龍所競之石其甌遭侯景之亂不知所之出梁四公記震澤洞震澤中洞庭山南有洞穴深百餘尺有長城乃仰公馳誤墮洞中旁行升降五十餘里至一龍宫周圍四五里下有青泥至膝有宫室門闕龍以氣闢水霏如輕霧晝夜光明遇守門小蛟龍張鱗奮爪拒之不得入公馳在洞百有餘日食青泥味若粳米忽彷彿識得歸路尋出之為吴郡守時乃具事聞梁武帝帝問杰公公曰此洞穴有四枝一通洞庭湖西岸一通蜀道青衣浦北岸一通羅浮兩山間穴谿一通枯桑島東岸葢東海龍王第七女掌龍王珠藏小龍千數衞䕶此珠龍畏蠟愛美玉及空青而嗜燕若遣使信可得寳珠帝聞大嘉乃詔有能使者厚賞之有㑹稽郡鄮縣白水鄉即庾毗羅請行杰公曰汝五世祖燒殺鄮縣東海潭之龍百餘頭還為龍所害汝龍門之仇也可行乎毗羅伏實乃止于是合浦郡洛黎縣甌越羅子春兄弟二人上書自言家代於陵水羅水龍為婚逺祖矜能化惡龍晉簡文帝以臣祖和化毒龍今龍化縣即是臣祖住宅也象郡石龍剛猛難化臣祖化之化石龍縣是也東海南天台湘川彭蠡銅鼓石頭等諸水大龍皆識臣宗祖亦知臣是其子孫請通帝命杰公曰汝家制龍石尚在否答曰在在謹賫至都試取觀之公曰汝石但能制微風雨召戎虜之龍不能制海王珠藏之龍又問曰汝有西海龍腦香否曰無公曰奈之何御龍帝曰事不諧矣公曰西海大船求龍腦香可得昔桐栢真人敷揚道義許謐茅容乗龍各贈制龍石十觔今亦應在請訪之帝勅命求之于茅山華陽隱居陶𢎞景得石兩片公曰是矣帝勅百工以于闐舒河中美玉造小函二以桐木灰發其光取宣州空青汰其甚精者用海魚膠之成二缶大船之龍腦香尋亦繼至杰公曰以蠟塗子春等身及衣佩又乃賫燒燕五百枚入洞穴至龍宫守門小蛟聞蠟氣俯伏不敢動乃以燒燕百事賂之令其通問以其上上者獻龍女龍女食之大嘉又上玉函青缶具陳帝㫖洞中有千歲龍能變化出入人間有善譯時俗之言龍女知帝禮之以大珠三小珠七雜珠一石以報帝命子春乗龍載珠還國食頃之間便至龍辭去子春薦珠帝大喜得聘通靈異獲天人之寳以珠示杰公杰公曰三珠其一是天帝如意珠之下者其二是驪龍珠之中者七珠二是蟲珠五是海蚌珠人間之上者雜珠是蚌蛤等珠不如大珠之貴帝遍示百僚朝廷咸謂杰公虚誕莫不詰之杰公曰如意珠上上者夜光照四十餘里中者十里下者一里光之所及無風雨雷電水火刀兵諸毒厲驪珠上者夜光百歩中者十歩下者一室光之所及無蛇虺豸之毒蟲珠七色而多赤六足二目當其凹處有舊如鐡鼻蚌珠五色皆有夜光及數尺無瑕者為之上有瑕者為下珠蚌五于時與月盈虧虵珠所致隋侯噲參即其事也又問虵鶴之異對曰使其自適帝命杰公記虵鶴二珠斗餘雜珠散于殿前取大黄虵𤣥鶴各十數處布珠中間于是鶴㘅其珠鳴舞徘徊虵㘅其珠盤曲宛轉羣臣觀者莫不歎服帝復出如意龍蟲等珠光之逺近七八九數皆如杰公之言子春在龍宫得食如花如藥如膏如飴食之香美賫食至京師得人間風日乃堅如石不可咀咽帝令秘府藏之拜子春為奉車都尉二弟為奉朝請賜布帛各千匹追訪公馳往不為龍害之由為用麻油和蠟以作照魚衣乃身有蠟氣故也出梁四公記梁武后梁武郗皇后性妒忌武帝初立未及册命因忿怒忽投殿庭井中衆趨井救之后已化為毒龍烟熖衝天人莫敢近帝悲歎久之因册為龍天王便于井上立祠出兩京記劉甲宋劉甲居江陵元嘉中女年十四姿色端麗未常讀佛經忽能暗誦法華經女所住屋尋有竒光女云已得正覺宜作二七日齋家為置髙座設寳帳女登座講論詞𤣥又説人之災祥諸事皆驗逺近敬禮解衣投寳不可勝數衡陽王在鎮躬率參佐觀之經十二日有道士史𤣥真曰此怪邪也振褐往焉女即已知使人守門云魔邪尋至凡著道服咸勿納之真變服奄入女初猶喝罵真便直前以水灑之即頓絶良久乃甦問以諸事皆云不識真曰此龍魅也自是復常嫁為宣氏妻出渚宫舊記宋雲後魏宋雲使西域至積雪山中有池毒龍居之昔五百商人止宿池側值龍忿怒汎殺商人果阤王聞之捨位與子向鳥場國學婆羅門咒四年之中善得其術還復王位就池咒龍龍化為人悔過向王王即從之出洛陽伽藍記蔡玉𢎞農郡太守蔡玉以國忌日於照敬寺設齋忽有黒雲甚密從東北而上正臨佛殿雲中隱隱雷鳴官屬猶未行香並在殿前聚立仰看見兩童子赤衣兩童子青衣俱從雲中下来赤衣二童子先至殿西南角柱下抽出一白虵身長丈餘仰擲雲中雷聲漸漸大而下来少𨕖之間向白虵從雲中直下還入所出柱下於是雲氣轉低着地青衣童子乃下就住一人捧殿柱離地數寸一童子從下又拔出一白虵長二丈許仰擲雲中于是四童子亦一時騰上入雲而去雲氣稍髙布散遍天至夜雷雨大霪至晚方霽後看殿柱根乃蹉半寸許不當本處寺僧謂此柱腹空乃鑿柱至心其内果空為龍藏隱出大業拾遺李靖唐衞國公李靖微時嘗射獵靈山中寓食山中村翁竒其為人每豐饋焉歲久益厚忽遇羣鹿乃逐之㑹暮欲捨之不能俄而隂晦迷路茫然不知所歸悵悵而行因悶益甚極目有燈火光因馳赴焉既至乃朱門大第墻宇甚峻扣門久之一人出問靖告迷道且請寓宿人曰郎君已出獨太夫人在宿應不可靖曰試為咨白乃入告復出曰夫人初欲不許且以隂黒客又言迷不可不作主人邀入㕔中有頃一青衣出曰夫人来年可五十餘青裙素襦神氣清雅宛若士大夫家靖前拜之夫人答拜曰兒子皆不在不合奉留今天色隂晦歸路又迷此若不容遣將何適然此乃山野之居兒子還時或夜到而喧勿以為愳既而食頗鮮美然多魚食畢夫人入宅二青衣送牀席裀褥衾被香潔皆極鋪陳閉户繫之而去靖獨念山野之外夜到而閙者何物也懼不敢寢端坐聽之夜將半聞扣門聲甚急又聞一人應之曰天符報大郎子當行雨周此山七百里五更須足無慢滯無暴厲應者受符入呈聞夫人曰兒子二人未歸行雨符到固辭不可違時見責縱使報之亦已晚矣僮僕無任専之理當如之何一小青衣曰適觀㕔中客非常人也盍請乎夫人喜因自扣其門曰郎覺否請暫出相見靖曰諾遂下堦見之夫人曰此非人宅乃龍宫也妾長男赴東海婚禮小男送妹適奉天符次當行雨計兩處雲程合踰萬里報之不及求代又難輙欲奉煩頃刻間如何靖曰靖俗人非乗雲者奈何能行雨有方可教即唯命耳夫人曰茍從吾言無有不可也遂勅黄頭鞲青驄馬来又命取雨器乃一小瓶子繫于鞍前戒曰郎乗馬無漏銜勒信其行馬跑地嘶鳴即取瓶中水一滴滴馬鬃上慎勿多也于是上馬騰騰而行倐忽漸髙但訝其隱疾不自知其雲上也風急如箭雷霆起于歩下于是隨所躍輙滴之既而電掣雲開下見所憇村思曰吾擾此村多矣方徳其人計無以報今久旱苗稼將悴而雨在我手寜復惜之顧一滴不足濡乃連下二十滴俄頃雨畢騎馬復歸夫人者泣于㕔曰何相誤之甚本約一滴何私下二十尺之雨此一滴乃地上一尺雨也此村夜半平地水深二丈豈復有人妾已受譴杖八十矣但視其背血㾗滿焉兒子亦連坐奈何靖慙怖不知所對夫人復曰郎君世間人不識雲雨之變誠不敢恨只恐龍師来尋有所驚恐宜速去此然而勞煩未有以報山居無物有二奴奉贈總取亦可取一亦可唯意所擇於是命二奴出来一奴從東廊出儀貌和悦怡怡然一奴從西廊出憤氣勃然抝怒而立靖曰我獵徒以鬭猛事今但取一奴而取悦者人以我為怯也因曰兩人皆取則不敢夫人既賜欲取怒者夫人微笑曰郎之所欲乃爾遂揖與别奴亦隨去出門數歩回望失宅顧問其奴亦不見矣獨尋路而歸及明望其村水已極目大𣗳或露梢而已不復有人其後竟以兵權静冦難功葢天下而終不及于相豈非取奴之不得乎世言關東出相關西出將豈東西喻邪所以言奴者亦下之𧰼向使二奴皆取即極將相矣出續𤣥怪録太平廣記卷四百十八
