body:
  text: 太平廣記卷三百九十二宋李昉等編銘記二韓愈裴度張惟清王璠栁光李福熊博王敬之王承檢韓愈泉州之南有山焉其山峻起壁立下有潭水深不可測周十餘畆中有蛟鱷嘗為人患人有誤近或牛馬就而飲者輒為吞食泉人苦之有年矣由是近山居者或挈引妻子徙去他郡以逃其患元和五年一夕聞山南有雷震暴興震數百里若山崩之状一郡驚懼里人洎牛馬雞犬俱失聲仆地流汗􅀍體屋瓦交擊木樹顛拔自戌及子雷震方息明旦往視之其山摧墮石壁數百仞殆盡俱填其潭水溢流注滿四野蛟螭之血徧若𤣥黄而石壁之上有鑿成文字一十九言字勢甚古郡中士庶無能知者自是居人無復患矣懼者既息遷者亦歸結屋架廬接比其地郡守因之名其地為石銘里蓋因字為銘且識其異也後有客於泉者能𫝊其字持至東洛時故吏部侍郎韓愈自尚書郎為河南令見而識之其文曰詔赤黑示之鱷魚天公卑殺牛人壬癸神書急急然則詳究其義似上帝責蛟螭之辭令戮其害也其字則蝌蚪篆書故泉人無有識者矣出宣室志裴度元和元年秋九月淮西帥吴少誠死子元濟拒命詔隣淮西者以兵四面攻之凡數年不尅十三年召丞相晉國公裴度將而擊焉度既至因命封人深池濠且發其地有得一石者上有雕蟲文字為銘封人持以獻度文曰井底一竿竹竹色深緑緑雞未肥酒未熟障車兒郎且須縮度得之以示從事令辨其義焉咸不能究度方念之俄有一卒自行間躍而賀曰吴元濟逆天子命縱狂兵為反謀賴天子威聖與丞相徳合今日逆豎成擒矣敢賀丞相功度驚訊之對曰封人得石銘是其兆也且井底一竿竹竹色深緑緑者言吴少誠由行間一卒遂擁十萬兵為一方帥且喻其榮也雞未肥者言無肉也夫以肥去肉為已字也酒未熟者言無水也以酒去水為酉字障車兒郎謂兵革之士也且縮者謂宜退守其所也推是言之則己酉日當尅也茍未及期則可俟矣度喜顧左右曰卒辨者也歎而異之是嵗冬十月相國李愬將兵入淮西生得元濟盡諸反者度因挍其日果己酉焉於是度益竒卒之辨擢為禆將出宣室志張惟清黑山之隂有李衛公廟寳歴中張惟清都䕶單于其從事盧立嘗夢一人頎長黑衣告立曰吾居於衞公廟且久矣子幸遷我於軍城中已而遂去及曉立不諭即入白於惟清曰衞公於國有大勲今廟宇隳殘飄濡且甚願新其土木之製惟清喜而可其請先是單于府以惟清有美化状其政績遣䕶軍駱忠表聞於上有詔命中書舎人髙公釴文其事刻于碑詔既至而未有碑石惟清方命使採石於雲中郡未還及修衞公廟鏟其西得一石方而長其下有刻出張字歴然可辨工人持以獻惟清惟清喜曰天賜吾之碑石即召從事視之立且驚且異因起賀而白前夢於是以石為碑刻髙公之文焉出宣室志王璠太和中王璠亷問丹陽因溝其城既鑿深數尺得一石銘文曰山有石石有玉玉有瑕即休也工人得之具以事告白獻於璠詳其義久而不能解即命僚佐辨之皆無能析其理者數日有一叟請謁璠之吏且宻謂曰吾聞王公得石銘今有辨者乎吏曰公方念之其義為何如耶君即能究􅁘叟曰是不祥也夫山有石石有玉玉有瑕即休也皆敘王公之世也且公之先曰崟崟生礎以文而觀是山有石也礎生璠是石有玉也璠之子曰瑕休是玉有瑕即休休者絶之兆推是而辨其絶緒乎吏謝之叟言竟而去至太和九年冬璠卒夷其宗果符叟之觧也出宣室志柳光太和中有柳光者嘗南逰因行山道㑹日晩誤入山崦中松引盤曲行數里至一石室雲水環擁清泉交噴室有茵榻若人居者前對霞翠固非人境光因臨流凝佇忽見一缶合於地光即啟之其缶下有泉周不盡尺其水清激舉巵以飲若甘醴盡十餘巵而已醉甚遂偃於榻及曉方寤因視石壁有彫刻文字極多遂寫其字置於袖詞曰武之在夘堯王八季我棄其寢我去其扆深深然髙髙然人不吾知又不吾謂由今之後二百餘祀焰焰其光和和其始東方有兔小首元尾經過吾道来至吾里飲吾泉以醉登吾榻而寐刻乎其壁奥乎其義人誰以辨其東平子光先閲閲而異之遂行出徑數十步回望其室盡亡見矣光究之不得有吕生者視而解之未幾告曰吾盡詳矣此乃得道者語也夫唐氏之初建號武徳武之二年其嵗己夘則武之在夘其義見矣葢武徳二年也堯王者謂高祖之號神堯曰八季者亦二年也我棄其寢我去其扆者言其去蓋絶去之時乃武徳二年也深深然髙髙然人不吾知又不吾謂者言其𨼆而人不知也由今之後二百餘祀者言君之来也且唐氏之初今果二百餘矣焰焰其光和和其始者焰焰其光謂嵗在丁未也焰者火豈非南方之丙丁之謂乎未亦火之位也和和其始謂今天子建號曰太和其始蓋元年也東方有兎小首元尾者叙君之名氏東方甲乙木也兔者卯也卯以附木是栁字也小首元尾者是光也經吾道来吾里言君之来也飲吾泉以醉登吾榻而寐言君之止也刻乎其壁奥乎其義誰人以辨其東平子謂其義奥而𨼆獨吾能辨之東平吾之邑也益又信矣如是而辨果得道者之遺記也出宣室志李福洛京北邙太清觀鐘樓唐咸通年中忽然摧塌有屋檁一條其中空虚毎撑動觸動轉内敲磕有聲人遂相𫝊来競觀之道士李威儀不欲聚人乃令破之於其間得一黑漆板上有陷金之字曰山水誰無言元年遇福重脩道士齎呈洛中諸官皆不能詳之李福相公罷鎮西川歸洛見此𨼆文反覆詳讀數四遂謂觀主曰但請度工鳩徒當以俸餘之金獨力完葺也百年之前智者勒其志已㝠合今日安得不重興觀宇乎洎觀成或請其由福曰山水誰無言者今上御名也咸通名漼也元年遇福者福元之初作鎮獲俸而迴福其不修復待何人者哉出玉堂閒話熊博熊博者本建安津吏岸崩得一古塚藤蔓􅅶其棺旁有石銘云欲陷不陷􅀍藤縛欲落不落􅀍沙閣五百年後遇熊博博時貧老僧率錢葬之博後至建州刺史出稽神録王敬之故鄴都之西北門曰芳林鄉齊村民王敬之編户中尤貧者常以樵蘇為業丙午嵗秋九月因掘一株銅雀臺下其地欻然小陷隨而鍤之三尺許得一蒼石大如盆遂力索之石忽破為二若摧殻然中有蒼石匣長尺有咫厚三寸廣四寸敬之駭内諸畚中以歸潔之以水則温潤昭爛真竒寳也四傍及背引起龍􅋮鳯翥及花葩之状雕鏤竒詭殆非人工徐啓之中有白玉板上刻大篆六行文曰上土巴灰除虚除伊尹東北八九餘秦趙多應分五玉白絲竹木子世世居但㸔六六百中外世主留難如國如於是敬之持以獻魏帥樂彦真彦真賚以束帛而蠲其地征焉亦無能洞達其𨼆詞者噫當曹氏石氏髙氏之代斯則鄴之王氣休運所鍾於是諸賢衆矣焉知不有隂覩後代總括風雲幅裂山河之事而瘞玉以䜟之今石既出其事將兆矣出皇甫牧玉匣記王承檢王蜀秦州節度使王承檢築防蕃城至土邽山下獲瓦棺内無屍唯有一片舌肉色紅潤堅如鐡石其舌上只有髑髏中有一古錢有二蠅振然飛去片石刻篆字曰大隋開皇二年渭州刺史張崇妻夫人王氏年二十五嫁於崇三年而娠惡其姙娠遂卒銘曰車道之北邽山之陽深深𦵏玉鬱鬱埋香刻斯貞石煥乎遺芳地變陵谷嶮列城隍乾徳丙年壊者合郎是嵗偽乾徳六年丙子嵗也言壞者合郎即王承檢小字也出玉溪縮事太平廣記卷三百九十二
