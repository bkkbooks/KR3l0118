body:
  text: 太平廣記卷一百五十九定數十四定婚店崔元綜盧承業女琴臺子武殷盧生鄭還古定婚店杜陵韋固少孤思早娶婦多岐求婚不成貞觀二年將遊清河旅次宋城南店客有以前清河司馬潘昉女為議者來旦期於店西龍興寺門固以求之意切旦往焉斜月尚明有老人倚巾囊坐於階上向月檢書覘之不識其字固問曰老父所尋者何書固少小苦學字書無不識者西國梵字亦能讀之唯此書目所未覿如何老人笑曰此非世間書君何得見固曰然則何書也曰幽㝠之書固曰幽㝠之人何以到此曰君行自早非某不當來也凡幽吏皆主人生之事生人可不行其中乎今道途之行人鬼各半自不辨耳固曰然則君何主曰天下之婚牘耳固喜曰固少孤嘗願早娶以廣後嗣爾來十年多方求之竟不遂意今者人有期此與議潘司馬女可以成乎曰未也君之婦適三歳矣年十七當入君門因問囊中何物曰赤繩子耳以繫夫婦之足及其坐則潛用相繫雖讐敵之家貴賤懸隔天涯從宧吳楚異鄉此繩一繫終不可逭君之脚已繫於彼矣他求何益曰固妻安在其家何為曰此店北賣菜家嫗女耳固曰可見乎曰陳嘗抱之來賣菜於是能隨我行當示君及明所期不至老人卷書掲囊而行固逐之入米市有眇嫗抱三歳女來弊陋亦甚老人指曰此君之妻也固怒曰殺之可乎老人曰此人命當食大祿因子而食邑庸可殺乎老人遂隱固磨一小刀付其奴曰汝素幹事能為我殺彼女賜汝萬錢奴曰諾明日袖刀入菜肆中於衆中刺之而走一市紛擾奔走獲免問奴曰所刺中否曰初刺其心不幸才中眉間爾後求婚終不遂又十四年以父䕃叅相州君刺史王泰俾攝司户掾專鞫獄以為能因妻以女可年十六七容色華麗固稱愜之極然其眉間常貼一花鈿雖沐浴閒處未嘗暫去歳餘固逼問之妻潸然曰妾郡守之猶子也非其女也疇昔父曾宰宋城終其官時妾在襁褓母兄次殁唯一庄在宋城南與乳母陳氏居去店近鬻蔬以給朝夕陳氏憐小不忍暫棄三歳時抱行市中為狂賊所刺刀痕尚在故以花子覆之七八年間叔從事盧龍遂得在左右以為女嫁君耳固曰陳氏眇乎曰然何以知之固曰所刺者固也乃曰竒也因盡言之相敬愈極後生男鯤為鴈門太守封太原郡太夫人知隂隲之定不可變也宋城宰聞之題其店曰定婚店出續幽怪録崔元綜崔元綜任益州叅軍日欲娶婦吉日已定忽假寐見人云此家女非君之婦君婦今日始生乃夢中相隨向東京履信坊十字街西道北有一家入宅内東行屋下正見一婦人生一女子云此是君婦崔公驚寤殊不信之俄而所平章女忽然暴亡自此後官至四品年五十八乃婚侍郎韋陟堂妹年始十九雖嫌崔公之年竟嫁之乃於履信坊韋家宅上成親果在東行屋下居住尋勘歳月正是所夢之日其妻適生崔公至三品年九十韋夫人與之偕老向四十年食其貴祿也出定命錄盧承業女户部尚書范陽盧承慶有兄子將笄而嫁之謂弟尚書左丞承業曰吾為此女擇得一壻乃曰裴居道其相位極人臣然恐其非命破家不可嫁也承業曰不知此女相命終他富貴否因呼其姪女出兄弟熟視之承業又曰裴即位至郎官其女即合喪逝縦後遭事不相及也卒嫁與之居道官至郎中其妻果歿後居道竟拜中書令被誅籍沒久而方雪出定命錄琴臺子趙郡李希仲天寶初宰偃師有女曰閑儀生九歳嬉戲於􅅟署之花欄内忽有人遽招閑儀曰鄙有懇誠願託賢淑幸畢詞勿甚驚駭乃曰鄙為崔氏妻有二男一女男名琴臺子鄙尤鍾念生六十日鄙則謝去夫人當為崔之繼室敢以念子為託實仁愍之因悲慟怨咽俄失所在閑儀亦沉迷無所覺知矣家人善養之旬日無恙希仲秩滿因家洛京天寶末幽薊起戎希仲則挈家東邁以避兵亂行至臨淮謁縣尹崔祈既相見情欵依然各叙相姻崔乃内外三從之昆仲也時崔喪妻半歳中饋無主幼稚零丁因求娶於希仲希仲家貧時危方為逺適女况成立遂許成親女既有歸將謀南度偃師故事初不省記一日忽聞崔氏中堂沉痛大哭即令詢問乃閑儀耳希仲遇自詢問則出一年孤孩曰此花欄所謂琴臺子者也因是倍加撫育名之靈遇及長出仕官至陳郡太守出續𤣥怪錄武殷武殷者鄴郡人也嘗娶同郡鄭氏則殷從母之女姿色絶世雅有令德殷甚悦慕女意亦願從之因求為壻有成約矣無何迫於知己所薦將舉進士期以三年從母許之至洛陽聞勾龍生善相人兼好飲酒時特造焉生極喜與之竟夕因為殷曰子之祿與壽甚厚然而晚遇未至七十而有小厄殷曰今日之慮未暇於此請以近事言之生曰君言近事非名與婚乎殷曰然生曰自此三年必成大名如婚娶殊未有兆殷曰約有所娶何言無兆生笑曰君之娶鄭氏乎曰然生曰此固非君之妻也君當娶韋氏後二年始生生十七年而君娶之時當官未踰年而韋氏卒殷異其言因問鄭氏之夫曰即同郡郭子元也子元娶五年而卒然將嫁之夕君其夢之既三年殷下第有内黄人郭紹家富於財聞鄭氏美納賂以求其婚鄭氏之母聚族謀曰女年既笄殷未成事吾老矣且願見有所適今有郭紹者求娶吾欲許之何如諸子曰唯命鄭氏聞之泣恚將斷髮為尼者數四及嫁之夕忽得疾昏眩若將不救時殷在京師其夕夢一女嗚咽流涕似有所訴視之乃鄭氏也乃驚問久之言曰某嘗慕君子之德亦知君之意且曾許事君矣今不幸為尊長所逼將適他氏沒身之歎知復何言言訖相對而泣因驚覺悲惋且異其事乃發使驗之則果適人問其姓氏則郭紹也殷數日思勾龍生言頗驗然疑其名之異耳及肅宗在儲名紹遂改為子元也殷明年擢第更二年而子元卒後十餘年厯位清顯每求娶輒不應後自尚書郎謫官韶陽郡守韋安貞固以女妻之殷念勾龍生之言懇辭不免娶數月而韋氏亡矣其後皆驗如勾龍生之言爾出前定錄盧生𢎞農令之女既笄適盧生卜吉之日女巫有來者李氏之母問曰小女今夕適人盧郎常來巫當屢見其人官祿厚薄巫者曰所言盧郎非長髯者乎曰然然則非夫人之子壻也夫人之壻中形而白且無鬚也夫人驚曰吾之女今夕適人得乎巫曰得夫人曰既得適人又何以云非盧郎乎曰不知其由則盧終非夫人之子壻也俄而盧納采夫人怒巫而示之巫曰事在今夕安敢妄言其家大怒共唾而逐之及盧乗軒車來展親迎之禮賔主禮具解珮約花盧生忽驚而奔出乘馬而遁衆賔追之不返主人素負氣不勝其憤且恃其女之容邀客皆入呼女出拜其貌之麗天下罕敵指之曰此女豈驚人者耶今而不出人其以為獸形也衆人莫不憤歎主人曰此女已奉見賔客中有能聘者願赴今夕時鄭某官某為盧之儐在坐起拜曰願事門館於是奉書擇相登車成禮巫言之貌宛然乃知巫之有知也後數年鄭任於京逢盧問其事盧曰兩眼赤且大如朱盞牙長數寸出口之兩角得無驚奔乎鄭素與盧相善驟出其妻以示之盧大慙而退乃知結褵之親命固前定不可茍而求之也出續𤣥怪錄鄭還古太學博士鄭還古婚刑部尚書劉公之女納吉禮後與道士寇璋宿昭應縣夜夢乘車過小三橋至一寺後人家就與婚姻主人姓房驚覺與寇君細言以紙筆記其事寇君曰新婚偶為此夢不足怪也劉氏尋卒後數年向東洛再娶李氏於昭城寺後假宅拜席日正三橋宅主姓韓時房直温為東洛少尹是妻家舊筵饌之𩔖皆房公所主還古乃悟昔年之夢話於賔客無不歎焉出逸史太平廣記卷一百五十九
