body:
  text: 太平廣記卷二百五十五嘲誚三張鷟石抱忠鄭愔宋務先傅巖侯味虚賈言忠司馬承禎李敬𤣥格輔元祝欽明姜師度姜晦魏光乘邵景黄幡綽賀知章王維甘洽喬琳契綟禿宋濟安陵佐史崔䕶張鷟則天革命舉人不試皆與官起家至御史評事拾遺𥙷闕者不可勝數張鷟為謡曰補闕連車載拾遺平斗量杷椎侍御史捥脫挍書郎時有沈全交者傲誕自縱露才揚已髙巾子長布衫南院吟之續四句曰評事不讀律博士不尋章麪糊存撫使眯目聖神皇遂􅀍杷椎御史紀先知捉向右臺對仗彈劾以為謗朝政敗國風請於朝堂决杖然後付法則天笑曰但使卿等不濫何慮天下人語不須與罪即宜放却先知於是手面無色唐豫章令賀若瑾眼皮急項轅粗鷟號為飽乳犢子出朝野僉載石抱忠石抱忠檢挍天官郎中與侍郎劉竒張詢古同知選抱忠素非静慎劉竒久著清平詢古通婚名族將分鈐時人語曰有錢石下好無錢劉下好士大夫張下好斯言果徵復與許子儒同知選劉竒獨以公清稱抱忠師範子儒頗任令史勾直每注官呼曰勾直乎時人又為之語曰碩學師劉子儒生用與言抱忠後與竒同棄市選人或為擯抑者後為語曰今年柿子併遭霜為語石榴須早摘抱忠在始平嘗為諧詩曰平明發始平薄暮至何城庫塔朝雲上晃池夜月明略彴橋頭逢長史欞星門外揖司兵一羣縣尉驢騾驟數箇叅軍鵞鴨行出御史臺記鄭愔唐鄭愔曾罵選人為癡漢選人曰僕是吳癡漢即是公愔令詠癡吳人曰榆兒復榆婦造屋兼造車十七八九夜還書復借書愔本姓鄭改姓鄭時人號為鄭鄭出朝野僉載宋務先唐有監察御史不工文而好作不已既居權要多為人所䛕不之覺也每篇輙為宋務先書以光臺月俸幾盡其妻謂曰公經生素非文筆所稱篇詠不為外人所傳此必臺中玩公折俸助厨耳奈何受人嗤玩自後雖吟詠不輟不復出光臺錢矣或問之以妻言對諸御史退相謂曰彼有人焉未可玩也乃止出御史臺記傅巖唐傅巖魏州人本名佛慶嘗在左臺監察中霤而中霤小祠無犠牲之禮比廻悵望曰初以為大祠乃全踈薄殿中梁載言詠之曰聞道監中霤初言是大祠狼傍索傳馬偬動出安徽衞司無帟幕供膳乏鮮肥形容消瘦盡空往復空歸出御史臺記侯味虚唐户部郎侯味虚著百官本草題御史曰大熱有毒又朱書云大熱有毒主除邪佞杜姦回報寃滯止淫濫尤攻貪濁無大小皆搏之畿尉簿為之相畏逺使惡儤直忌按權豪出於雍洛州諸縣其外州出者尤可用日炙乾硬者為良服之長精神減姿媚久服令人冷峭出朝野僉載賈言忠唐賈言忠撰監察本草云服之心憂多驚悸生白髮時議云裏行及試員外者為合口椒最有毒監察為開口椒毒微歇殿中為蘿蔔亦曰生薑雖辛辣而不為患侍御史為脆梨漸入佳味遷員外郎為甘子可久服或謂合口椒少毒而脆梨毒者此由觸之則發亦無常性唯拜員外郎號為摘去毒歡悵相半喜遷又惜其權也出御史臺記司馬承禎唐盧藏用始隐於終南山中宗朝累居要職道士司馬承禎睿宗追至京將還山藏用指終南山謂之曰此中大有佳處何必在逺承禎徐答曰以僕視之乃仕宦捷徑耳藏用有慙色出唐新語李敬𤣥唐中書令李敬𤣥為元帥討吐蕃至樹敦城聞劉尚書沒蕃着鞾不得狼狽而走王杲副總管曹懐舜等驚退遺却麥飯首尾千里地上尺餘時軍中謡曰洮河李阿婆鄯州王伯母見賊不敢闘總由曹新婦出朝野僉載格輔元唐格輔元拜監察遷殿中充使次龍門遇盜行裝都盡袒􅀍而坐監察御史杜易簡戲詠之曰有恥宿龍門精彩先瞰渾眼痩呈近店睡響徹遥林捋嚢將舊識掣􅀍異新婚誰言驄馬使翻作蟄熊蹲出御史臺記祝欽明唐禮部尚書祝欽明頗渉經史不閑時務博碩肥腯頑滯多疑臺中小吏號之為媪媪者肉塊無七竅秦穆公時野人得之出朝野僉載姜師度唐先天中姜師度於長安城中穿渠繞朝堂坊市無所不至上登西樓望之師度堰水瀧柴栰而下遂授司農卿於後水漲則奔突水縮則竭涸又前開黄河引水向棣州費億兆功百姓苦其淹漬又役夫塞河口開元六年水泛溢河口堰破棣州百姓一槩沒盡師度以為功官品益進又有傅孝忠為太史令自言明𤣥象專行矯譎京中語曰姜師度一心看地𫝊孝忠兩眼相天神武即位知其矯並斬之出朝野僉載姜晦唐姜晦為吏部侍郎眼不識字手不解書濫掌銓衡曾無分别選人歌曰今年選數恰相當都由座主無文章案後一腔凍猪肉所以名為姜侍郎出朝野僉載魏光乘唐兵部尚書姚元崇長大行急魏光乘目為趂蛇鸛鵲黄門侍郎盧懐慎好視地目為覷䑕猫兒殿中監姜皎肥而黑目為飽椹母猪紫微舍人倪若水黑而無鬚鬂目為醉部落精舍人齊處冲好𦕈目視目為暗燭底覓虱老母舍人呂延嗣長大少髪目為日本國使人又目舍人鄭勉為醉髙麗目拾遺蔡孚為小州醫博士詐諳藥性又有殿中侍御史短而醜黑目為煙熏地木目御史張孝嵩為小村方相目舍人楊伸嗣為熱熬上猢猻目𥙷闕袁輝為王門下彈琴博士目員外郎魏恬為祈雨婆羅門目李全交為品官給使目黄門侍郎李廣為飽水蝦蟇由是坐此品題朝士自左拾遺貶新州新興縣尉出朝野僉載邵景唐邵景安陽人擢第授汾隂尉累轉歙州司倉遷至右臺監察考功員外時神武皇帝即位景與殿中御史蕭嵩韋鏗俱昇殿行事職掌殊别而制出景嵩俱授朝㪚大夫而鏗無命景嵩狀貌𩔖胡景鼻高而嵩􅂡多同時服朱紱對立於庭鏗獨簾中竊窺而詠曰一雙胡子著緋􅂁一箇􅂡多一鼻高相對㕔前捺且去聲立自慙身品世閒毛舉朝歡詠之他日睿宗御承天門百僚備列鏗忽風眩而倒鏗肥而短景詠之曰飄風忽起團圞旋倒地還如着脚䭔莫怪殿上空行事却為元非五品才出御史臺記黄幡綽唐安西牙將劉文樹口辯善奏對明皇每嘉之文樹髭生頷下貌𩔖猴上令黄幡綽嘲之文樹切惡猿猴之號乃密賂幡綽不言之幡綽許而進嘲曰可憐好箇劉文樹髭􅂡共頦頤别住文樹面孔不似猢猻猢猻面孔强似文樹上知其遺賂大笑出開天𫝊信記賀知章唐祕監賀知章有高名告老歸吳中明皇嘉重之毎事加異知章將行泣涕辭上問何所欲曰臣有男未有定名幸陛下賜之歸為郷里之榮上曰為道之要莫若於信孚者信也履信思乎順卿之子必信順之人也宜名之曰孚再拜而受命焉久而謂人曰上何謔我邪我實吳人孚乃爪下著子豈非呼我兒為爪子邪出開天傳信記王維唐宰相王嶼好與人作碑誌有送潤毫者誤扣右丞王維門維曰大作家在那邊出盧氏雜記甘洽唐甘洽與王仙客友善因以姓相嘲洽曰王訃爾應姓田為你面撥獺抽却你兩邊仙客應聲曰甘計你應姓丹為你頭不曲廻脚向上安出啓顔録喬琳唐朱泚始亂源休姚令言等收圖書貯倉廪作蕭曹事業休退語偽黄門侍郎蔣練曰若度其才即吾為蕭姚為曹耳識者聞之謂休不奈官職喬琳性好諧謔因語舊僚曰源公眞謂火迫鄼侯爾出唐新語契綟禿唐京城有僧性甚機悟病足有人於路中見嘲之曰法師是雲中郡僧曰與君先不相知何因辱貧道作契綟秃其人詐之曰雲中郡言法師高逺何為是辱僧曰雲中郡是天州翻為偷氊是毛賊毛賊翻為墨槽傍邊有曲録鉄翻為契綟禿何事過相罵邪前人於是愧伏出啓顔録宋濟唐許孟容與宋濟為布素之交及許知舉宋不第放牓後許頗慙累請人申意兼遣門生就看宋不得已乃謁焉許但分訴首過因命酒酣乃曰雖然某今年為國家取卿相時有姚嗣卿及第後翌日而卒因起慰許曰邦國不幸姚令公薨謝許大慙出盧氏雜記安陵佐史唐安陵人善嘲邑令至者無不為隐語嘲之有令口無一齒常畏見嘲初至謂邑吏我聞安陵大喜嘲弄汝等不得復踵前也初上判三道佐史抱案在後曰明府書處甚疾其人不覺為嘲乃謂稱已之善遂甚信之居數月佐史仇人告曰言明府書處甚疾者其人嘲明府令曰何為是言曰書處甚疾者是奔墨奔墨者翻為北門北門是缺後缺後者翻為口穴此嘲弄無齒也令始悟鞭佐史而解之出啓顔録崔䕶唐劉禹錫云崔䕶不登科怒其考官苖登即崔之三從舅也乃私試為判頭毁其舅曰甲背有猪皮之異人問曰何不去之有所受其判曰曹人之坦重耳駢脅再觀相里之剝苖登猪皮斯見初登為東畿尉相里造為尹曾欲笞之􅃝其背有猪毛長數寸故又曰當偃兵之時則隧而無用在穴之日則搖而有求皆言其尾也出嘉話録太平廣記卷二百五十五
