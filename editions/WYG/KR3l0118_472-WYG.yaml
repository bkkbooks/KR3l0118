body:
  text: 太平廣記卷四百七十二宋李昉等編水族九龜陶唐氏禹葛洪張廣定贛縣吏郗世了孟彦暉營陵興業寺唐太宗劉彦回吳興漁者唐明皇帝寜晉民史論徐仲髙崇文汴河賈客南人閻居敬池州民李宗陶唐氏陶唐之世越裳國獻千嵗神龜方三尺餘背上有文皆科斗書記開闢已来帝命録之龜歴伏㴞述帝功徳銘曰朱書龜歴之文出述異記禹禹盡力渠溝導川夷岳黄龍曵尾於前𤣥龜負青泥於後𤣥龜河精之使者也龜頷下有印文皆古言作九州山水之字禹所穿鑿之處皆以青泥封記其所使𤣥龜印其上今人聚土為界此之遺像也出王子年拾遺葛洪葛洪云千嵗靈龜五色具焉其雄額上兩骨起似角以末朱浴之乃剔取其甲火炙擣服方寸匕日三盡一具夀千嵗出抱朴子張廣定陳仲弓異聞記曰張廣定􅇜亂避地有一女四嵗不能歩又不忍棄之乃縣籠於古塜中冀他日得收其骨及三年歸取之見其尚活問之女答曰食盡即餒見其旁有一物引頸呼吸效之故能活廣定入冡視之乃一龜也陳寔之言固不妄矣出獨異志贛縣吏晉義熙中范寅為南康郡時贛縣吏說先入山採薪得二龜皆如二尺盤大薪未足遇有兩𣗳駢生吏以龜側置𣗳間復行採伐去龜處稍逺天雨懶復取後經十二年復入山見先龜一者甲巳枯一者尚生極長𣗳木所處可厚四寸許兩頭厚尺餘如馬鞍狀出幽明録郗世了郗世了在㑹稽造墓其地多石後破大石得一龜長尺二寸許在石中石了無孔也得非龜石俱生乎既破出之龜行動如常龜無異石受龜如人刻安之出靈異志孟彦暉武成三年庚午六月五日癸亥廣漢太守孟彦暉奏西湖有金龜徑寸遊於荷葉之上畫圖上聞出録異記營陵道州營陵中鼉甲長八尺下自然有文字前後四足各􅂿一龜􅂿龜有時行或踰山越水俗莫敢犯出録異記興業寺九曲靈龜池在襄陽縣東北三里遍學寺東古城舊有興業寺今併入遍學寺唐景龍元年有陳留阮氏寓居襄陽捨財於此寺東院創造堂宇時嵗旱池涸即掘廣深之急暴雨池溢乃是一大龜髙數尺如半張牀大岸側而行衆即驚呼龜遂躍入池中寺僧靈岫云院有折碑云興業寺碑碑文梁散騎常侍庾元威撰其文可傳者云此寺有靈龜一頭長三尺五寸冬潛春現多歴年所隨衆上堂應時而食刺史安陸王照頻遇此龜其壊碑因即扶豎今在遍學寺東院阮氏所修寺堂庭中浮屠前池見在深五尺方二十歩出襄沔記唐太宗唐武徳末太宗欲平内難苑池内有白龜遊於荷葉之上太宗取之化為白石瑩潔如玉登極之後降制曰皇天眷祐錫以寳龜出録異記劉彦回唐劉彦回父為湖州刺史有下寮於銀坑得一龜長一尺持獻刺史羣官畢賀云得此龜人夀一千嵗使君謝已非其人故自騎馬送龜即至坑所其後十餘年刺史亡彦回為房州司士將家屬之官屬山水泛溢平地盡沒一家惶懼不知所􅃴俄有大龜来引其路彦回與家人謀曰龜乃靈物今来相導状若神三十餘口隨龜而行悉是淺處歴十餘里乃至平地得免水難舉家驚喜亦不知其由至此夕彦回夢龜云已昔在銀坑蒙先使君之惠故此報恩出廣異記吳興漁者唐開元中吳興漁者於苕溪上每見大龜四足各蹋一龜而行漁者知是靈龜持石投之中而獲焉久之以獻州從事裴裴召龜人龜人云此王者龜不可以卜小事所卜之物必死裴素狂妄時庭中有鵲其雛尚毨乃騐誌之令卜者鑚龜焉數日大風損鵲巢鵲雛皆死尋又命卜其婢所懐娠是兒女兆云當生兒兒生尋亦死裴後竟進此龜也出廣異記唐明皇帝唐明皇帝嘗有方士獻一小龜徑寸而金色可愛云此龜神明而不食可置之枕笥之中辟巨蛇之毒上常貯巾箱中有小黄門恩渥方深而坐親累將竄南徼不欲屈法免之宻授此龜曰南荒多巨蟒常以龜置於側可以無苦閹者拜受之及象郡之屬邑里市舘舍悄然無一人投宿於旅館是夜月明如晝而有風雨之聲其勢漸近因出此龜置於階上良乆神龜伸頸吐氣其火如綖直上髙三四尺徐徐散去已而龜遊息如常向之風雨聲亦已絶矣及明驛吏稍稍而至羅拜庭下曰昨知天使將至合備迎奉適縁行旅誤殺一蛇衆知報寃蛇必此夕為害側近居人皆出三五十里外避其毒氣某等不敢逺出止在近山巖穴之中伏而待旦今則天使無恙乃神明所祐非人力也久之行人漸至當道有巨蛇十數皆已糜爛自此無復報寃之物人莫測其由逾年黄門召歸長安復以金龜進上泣而謝曰不獨臣之性命頼此生全南方之人永袪毒𩔖所全人命不知紀極實聖徳所及神龜之力也出録異記寧晉民唐建中四年趙州寧晉縣沙河北有大棠梨百姓常祈禱忽有羣蛇數千自東南来渡北岸集棠梨𣗳下為二積留南岸者為一積俄見三龜徑寸纔繞行積蛇盡死乃各登積視蛇腹悉有瘡若矢所中刺史康日知圖甘棠梨三龜来獻出酉陽雜俎史論唐史論作將軍時忽􅁴妻所居房中有光異之因與妻索房中且無所見一日妻早粧開奩奩中忽有金色龜如錢吐五色氣彌滿一室後常養之出異記徐仲福州唐貞元末有村人賣一籠龜其數十三販藥人徐仲以五鍰獲之村人云此聖龜不可殺徐置庭中一龜藉龜而行八龜為導悉大六寸徐遂放於乾元寺後林中一夕而失出酉陽雜俎髙崇文唐賛皇公李徳裕曰蜀𫝊張儀築成都城屢有頽壊時有龜周行旋走至是一龜行路築之既而城果就予未至郡日嘗聞龜殻猶在城内昨詢訪􅂄舊有軍資庫官宇文遇者言比常在庫中元和初節度使髙崇文知之命工人截為腰帶胯具自張儀至崇文千餘載龜殻尚在而武臣毀之深可惜也出戎幕閑談汴河賈客唐有賈客維舟汴河上獲一巨龜於竈火中煨之是夕忘出之明日取視殻已燋矣拂拭去灰置於食牀上欲食良久伸頸足動徐行牀上其生如常衆共異之投於水中游泳而去出録異記南人南人採龜溺以其性妬而與蛇交或雌蛇至有相趂闘噬力小致斃者採時取雄龜置瓷盌及小盤中於龜後以鏡照之既見鏡中龜即淫發而失溺又以紙炷火上㶸熱㸃其尻亦致失溺然不及鏡照也得於道士陳釗又海上人云龍生三卵一為吉弔也其吉弔上岸與鹿交或於水邉遺精流槎遇之粘裹木枝如蒲桃焉色微青黄復似灰色號紫稍花益陽道别有方說出北夢瑣言閻居敬新安人閻居敬所居為山水所浸恐屋壊移榻於户外而寝夢一烏人曰君避水在此我亦避水至此於君何害而廹迮我如是不快甚矣居敬寤不測其故爾夕三夢居敬曰豈吾不當止此耶因命移牀乃牀脚斜壓一龜於户限外放之乃去出稽神録池州民池州民楊氏以賣鮓為業嘗烹鯉魚十頭令兒守之將熟忽聞釜中乞命者數四兒驚懼走告其親共往視之釜中無復一魚求之不得朞年所畜犬恒窺户限下而吠數日其家人曰去年鯉魚得非在此耶即撒户視之得龜十頭送之水中家亦無恙出稽神録李宗李宗為楚州刺史郡中有尼方行於市忽據地而坐不可推挽不食不語者累日所由司以告宗命武士扶起掘其地得大龜長數尺送之水中其尼乃愈出稽神録太平廣記卷四百七十二
