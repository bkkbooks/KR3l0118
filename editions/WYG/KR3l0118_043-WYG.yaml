body:
  text: 太平廣記卷四十三神仙四十三尹真人盧山人薛𤣥真于濤尹真人犍為郡東十餘里有道觀在深巖中石壁四壅有顔道士居之觀殿有石函長三尺餘其上鏨出鳥獸花卉文理纎妙隣於鬼工而緘鏁極固泯然無毫縷之隙里人相傳云是尹喜石函真人事跡顯於紀傳詳矣真人將上昇以石函付門弟子約之曰此函中有符籙慎不得啓之必有大禍於是郡人盡敬之大厯中有清河崔君為犍為守崔君素有剛果自恃既至郡聞有尹真人函笑謂屬官曰新垣平之詐見矣即詣之且命破鏁顔道士曰此尹真人石函真人有遺教曰啓吾函者有大禍幸君侯無犯仙官之約崔君怒曰尹真人死千嵗安得獨有石函在乎吾不信顔道士􅃀其詞而崔君固不從於是命破其鏁久之而堅然不可動崔君怒又以巨絙係函鼻用數十牛拽其絙鞭而驅之僅半日石函遂開中有符籙數十軸以黄縑為幅丹書其文皆炳然如新崔君既觀畢顧謂顔道士曰吾向者意函中有奇寳故開而閲之今徒有符籙而已於是令緘鏁如舊既歸郡是夕令忽暴卒後三日而寤其官屬將吏輩悉詣崔君問之且訊焉崔君曰吾甚戅未嘗聞神仙事前者偶開尹真人石函果為㝠官追攝初見一人衣紫衣至寢謂吾曰我吏於㝠司者也今奉命召君固不可拒拒則禍益大矣宜疾去吾始聞憂欲以辭免然不覺與使者俱出郡城僅行五十里至㝠司其官即故相吕公也謂吾曰子何為開尹真人石函乎奉上帝命且削君之禄壽果如何哉已而召掾吏至令按吾禄壽之籍掾吏白吕公曰崔君有官五任有壽十七年今奉上帝符盡奪五任官又削十五年壽今獨有二年任矣於是聽崔君還後二年果卒出宣室志盧山人唐寳厯中荆州盧山人常販燒朴石灰往來於白洑南草市時時微露奇跡人不之測賈人趙元卿好事將從之逰乃頻市其所貨設果茗訪其息利之術盧覺謂曰觀子意似不在所市意何也趙乃言竊知長者埋形𨼆徳洞過蓍龜願垂一言盧笑曰今日且驗君主人午時有非常之禍若信吾言當免子可吿之將午當有匠者負囊而至囊中有銀二兩餘必非意相干也可閉闗戒妻孥勿輕應對及午必極罵須盡家臨水避之若爾徒費錢三千四百時趙停於百姓張家即遽歸吿之張亦素神盧生乃閉門伺之欲午果有人狀如盧所言叩門求糴怒其不應因蹴其門張重簀捍之少頃聚人數百張乃由後門與妻子廻避纔差午其人乃去行數百步忽蹶倒而死其妻至衆人具吿其所為妻痛哭乃適張家誣其夫死有因官不能評衆具言張閉户逃避之狀理者謂張曰汝固無罪可為辦其送死張欣然從斷其妻亦喜及市槥僦轝正當三千四百文因是人赴之如市盧意以為煩潛逝至復州界維舟於陸奇秀才莊門或語陸盧山人非常人也陸乃請之陸時將入京投相知因請決疑盧曰君今年不可動憂旦夕禍作君所居堂後有錢一瓿覆以板非君有也錢主今始三嵗君其勿用一錢用必成禍能從吾戒乎陸矍然謝之及盧生去水波未定陸笑謂妻曰盧生言如是吾更何求乎乃命家童掘地未數尺果遇板徹之有巨瓮散錢滿焉陸喜甚妻亦搬運紉草貫之將及一萬兒女忽暴頭痛不可􅃘陸曰豈盧生言將徵乎因奔馬追及謝違戒盧生怒曰君用之必禍骨肉骨肉與利輕重君自度也掉舟去之不顧陸馳歸醮而瘞焉兒女乃愈盧生到復州又常與數人閒行途遇六七人盛服俱帶酒氣逆鼻盧生忽叱之曰汝等所為不悛性命無幾其人悉羅拜塵中曰不敢不敢其侣訝之盧曰此輩盡刼賊也其異如此元卿言盧卿狀貌老少不常亦不常見其飲食常語趙生曰世間刺客𨼆形者不少道者得𨼆形術能不試二十年可以化形名曰脱離後二十年名籍於地仙矣又言刺客之死屍亦不見所論多奇恠葢神仙之流也出酉陽雜爼薛𤣥真薛𤣥真者唐給事中伯髙之髙祖也少好道不嗜名宦遨遊雲泉得長生之道常於五嶺間棲憇每遇人曰九疑五嶺神仙之墟山水幽竒烟霞勝異如陽朔之峯巒挺拔博羅之洞府清虚不可忘也所以祝融棲神於衡阜虞舜登仙於蒼梧赫胥耀跡於潛峰黄帝飛輪於鼎湖其餘髙真列仙人臣輔相騰翥逍遙者無山無之其故何哉山幽而靈水深而清松竹交映雲蘿杳㝠固非凡骨塵心之所愛也况䆳洞之中别開天地瓊膏滴乳靈草秀芝豈塵目能窺凡屣可履也得延年之道而優游其地信為樂哉貞元末鄭餘慶郴州長史門吏有自遠省餘慶者未至郴十餘里店中駐歇與𤣥真相遇狀貌如二十三四神彩俊邁詞多稽古時語及開元麟徳間事有如目覩又言明年二月餘慶當復歸朝餘言皆神異問其姓氏再三不答懇詰之云某有志林泉久棄鄉國不欲骨肉知此行止姓薛名𤣥真門吏話於餘慶令人訪尋無復蹤跡明年二月餘慶徵還及到長安語及異事給事中薛伯髙流涕對曰某髙祖自左常侍棄官入道𨼆終南不知所終是矣出仙傳拾遺于濤于濤者唐宰相琮之姪也琮南遷途經平望驛維舟方食有一叟自門而進直抵㕔側小閤子以詣濤焉叟之來也驛吏疑從相國而行不之問相國疑是驛中人又不之詰既及濤所憇濤問叟何人也對曰曹老兒問其所來對曰郎君極有好官職此行不用憂濤方將逺陟深抱憂慮聞其言欣然迎待揖之即席濤與表弟前秘書省薛校書俱與之語問其所能云老叟無解但見郎君此後官職髙顯不可一一叙之請濡毫執筆隨語記録之也如是濤隨叟所授數章詞多𨼆密迨若謠䜟亦叙相國牽復之事因問薛校書如何叟曰千里之外遇西則止其有官職雖非真刺史亦作假郡守濤又問某京中宅内事可以知否叟俛首良久曰京宅甚安今日堂前有某夫人某尼賓客名字一一審識某廊下有小童某牽一銅龜子馳戲濤亦審其諦實皆書於編上荏苒所載已是數幅相顧笑語即將昏暝濤因指薛芸香姬者謂叟曰此人如何對曰極好三千里外亦得好官濤初隨語書事心志鋭信及聞此姬亦有好官訝其踈誕意亦中怠矣時濤表弟杜孺休給事刺湖州寄箬下酒一壺可五斗因問叟頗好酒否叟忻然為請即以銀盂授之令自酌飲頃之酒盡已昏晦矣遂以銀盂枕首而睡時蚊蚋盛無有近叟者及旦失叟唯銀盂在焉方驚問訪求莫知所止人或云此即曹休博士也曹休魏之宗室仕晉為史官齊梁間或處朝列得神仙之道多遊江湖間往來賈販常拯救人以隂功及物人多有見之受其遺者濤自後授泗州防禦使歙州刺史佐淮南吳王楊公行密為副使相國尋亦北歸薛校書佐江西賔幕知袁州軍務值用軍之際挈家之閩至一小邑姬者俄以疾終山中無求閟器之所托一村翁輟其壽棺而瘞斯棺裝漆金彩頗甚珍華既瘞之後方驗得好棺之言及京宅是日賔客小童牽銅龜遊戲之事無不驗者出神仙感應傳太平廣記卷四十三
