body:
  text: 太平廣記巻四百五十三宋李昉等編狐七王生李自良李令緒裴少尹王生杭州有王生者建中初辭親之上國收拾舊業將投於親知求一官耳行至圃田下道尋訪外家舊莊日晚栢林中見二野狐倚樹如人立手執一黄紙文書相對言笑旁若無人生乃叱之不為變動生乃取彈因引滿彈之且中其執書者之目二狐遺書而走王生遽徃得其書纔一兩紙文字𩔖梵書而莫究識遂緘於書袋中而去其夕宿於前店因話於主人方訝其事忽有一人㩦裝來宿眼疾之甚若不可忍而語言分明聞王之言曰大是異事如何得見其書王生方將出書主人見患眼者一尾垂下牀因謂生曰此狐也王生遽收書於懐中以手摸刀逐之則化為狐而走一更後復有人扣門王生心動曰此度更来當與刀箭敵汝矣其人隔門曰爾若不還我文書後無悔也自是更無消息王生祕其書緘縢甚宻行至都下以求官伺謁之事期方賖緩即乃典貼舊業田園卜居近坊為生生之計月餘有一僮自杭州而至縗裳入門手執凶訃王生迎而問之則生已丁家難矣數日聞慟生因視其書則母之手字云吾本家秦不願葬於外地今江東田地物業不可分毫破除但都下之業可一切處置以資䘮事備具皆畢然後自來迎接王生乃盡貨田宅不候善價得其資備塗芻之禮無所欠少既而復籃舁東下以迎靈輿及至揚州遥見一船子上有數人皆喜笑歌唱漸近視之則皆王生之家人也意尚謂其家貨之今属他人矣湏臾又有小弟妹搴簾而出皆綵服笑語驚怪之際則其家人船上驚呼又曰郎君来矣是何服飾之異也王生潛令人問之乃聞其母驚出生遽毁其縗絰行拜而前母迎而問之其母駭曰安得此理王生乃出母送遺書乃一張空紙耳母又曰吾所以來此者前月得汝書云近得一官令吾盡貨江東之産為入京之計今無可歸矣及母出王生所寄之書又一空紙耳王生遂發使入京盡毁其㓙䘮之具因鳩集餘資自淮却扶侍且徃江東所有十無一二纔得數間屋僅以庇風雨而已有弟一人别且數嵗一旦忽至見其家道敗落因徴其由王生具話夲末又述妖狐事曰但應以此為禍耳其弟驚嗟因出妖狐之書以示之其弟纔執其書退而置於懐中曰今日還我天書言畢化作一狐而去出靈怪録李自良唐李自良少在兩河間落拓不事生業好鷹鳥常竭囊貨為韝紲之用馬燧之鎮太原也募以能鷹大從禽者自良即詣軍門自上陳自良質狀驍健燧一見悦之置於左右每呼鷹逐獸未嘗不惬心快意焉數年之間累職至牙門大將因從禽縱鷹逐一狐狐挺入古壙中鷹相随之自良即下馬乗勢跳入壙中深三丈許其間朗明如燭見塼塌上有壊棺復有一道士長尺餘執兩紙文書立於棺上自良因掣得文書不復有他物矣遂臂鷹而出道士随呼曰幸留文書當有厚報自良不應乃視之其字皆古篆人莫之識明旦有一道士儀状風雅詣自良自良曰仙師何所道士曰某非世人以將軍昨日逼奪天符也此非將軍所宜有若見還必有重報自良固不與道士因屏左右曰將軍神將耳某能三年内致本軍政無乃極所願乎自良曰誠如此願亦未可信如何道士即超然奮身上騰空中俄有仙人絳節玉童白鶴徘徊空際以迎接之湏臾復下謂自良曰可不見乎此豈是妄言者耶自良遂再拜持文書歸之道士喜曰將軍果有福祚後年九月内當如約矣於時貞元二年也至四年秋馬燧入覲太原耆舊有功大將官秩崇高者十餘人從焉自良職最卑上問太原北門重鎮誰可代卿者燧昏然不省唯記自良名氏乃奏曰李自良可上曰太原將校當有耆舊功勲者自良後輩素所未聞卿更思量燧倉卒不知所對又曰以臣所見非自良莫可如是者再三上亦未之許燧出見諸將愧汗洽背私誓其心後必薦其年徳最髙者明日復問竟誰可代卿燧依前昏迷唯記舉自良上曰當俟議定於宰相耳他日宰相入對上問馬燧之將孰賢宰相愕然不能知其餘亦皆以自良對之乃拜工部尚書太原節度使也出河東記李令緒李令緒即兵部侍郎李紓堂兄其叔選授江夏縣丞令緒因徃覲叔及至坐久門人報云某小娘子使家人傳語喚入見一婢甚有姿態云娘子參拜兄嫂且得令緒逺到丞妻亦𫝊語云娘子能來此看兒姪否又云妹有何飲食可致之婢去後其叔謂令緒曰汝知乎吾與一狐知聞逾年矣湏臾使人齎大食器至黄衫奴舁并向來傳語婢同到云娘子續來俄頃間乗四鐶金飾轝僕從二十餘人至門丞妻出迎見一婦人年可三十餘雙梳雲髻光彩可鑒婢等皆以羅綺異香滿宅令緒避入其婦升堂坐訖謂丞妻曰令緒既是子姪何不出來令緒聞之遂出拜謂曰我姪真大人君子之風坐良久謂令緒曰觀君甚長厚心懐中應有急難于衆人令緒亦知其故談話盡日辭去後數來每至皆有珍􅄿經半年令緒擬歸東洛其姑遂言此度阿姑得令緒心矣阿姑縁有厄擬随令緒到東洛可否令緒驚云行李貧迫要致車乗計無所出又云但許阿姑家事假車乗只將女子兩人并向来所使婢金花去阿姑事令緒應知不必言也但空一衣籠令逐馳家人每至關津店家即略開籠阿姑暫過歇了開籠自然出行豈不易乎令緒許諾及發開籠見三四黒影入籠中出入不失前約至東都將到宅令緒云何處可安置金花云娘子要於倉中甚便令緒即灑掃倉宻為都置唯逐駞奴知之餘家人莫有知者每有所要金花即自來取之阿姑時時一見後數月云厄已過矣擬去令緒問云欲徃何處阿姑云胡璿除豫州刺史縁二女成長湏有匹配今與渠處置令緒明年合格臨欲選家貧無計乃徃豫州及入境見牓云我單門孤立亦無親表恐有擅託親故妄索供擬即獲時申報必當科㫁徃來商旅皆𫝊胡使君清白干謁者絶矣令緒以此懼進退乆之不獲已乃潛入豫州見有人叅謁亦無所得令緒便投刺使君即時引入一見極喜如故人云雖未奉見知公有􅇥難乆佇光儀來何晚也即授舘供給頗厚一州云自使君到未曽有如此每日入宅歡讌但論時事亦不言他經月餘令緒告别璿云即與處置路糧充選時之費便集縣令曰璿自到州不曽有親故擾李令緒天下俊秀某平生永展奉昨一見知是丈夫以此重之諸公合見耳今請赴選各湏與致糧食無令輕尠官吏素畏其威自縣令已下贈絹無數十匹已下者令緒獲絹千匹仍備行裝又留宴别令緒因出㦸門見别有一門金花自内出云娘子在山亭院要相見及入阿姑已出喜盈顔色曰豈不能待嫁二女又云令緒買得甘子不與令姑太慳也令緒驚云實買得不敢持送笑云此戲言耳君所買者不堪阿姑自有上者與令緒將去命取之一一皆大如拳既别又喚令緒㢠廻云時方艱難所將絹帛行李恐遇賊盗為之奈何乃曰借與金花將去但有事􅇥一念金花即當無事令緒行數日果遇盗五十餘人令緒恐懼墜馬忽思金花便見精騎三百餘人自山而來軍容甚盛所持器械光可以鑒殺賊略盡金花命騎士却掣馳仍處分兵馬好去欲至京路店宿其主人女病云是妖魅令緒問主人曰是何疾答云似有妖魅歴諸醫術無能暫愈令緒云治却何如主人珍重辭謝乞相救但得挍損報效不輕遂念金花須臾便至具陳其事略見女之病乃云易也遂結一璮焚香為呪俄頃有一狐甚疥癘縳至壇中金花决之一百流血遍地遂逐之其女便愈及到京金花辭令緒令緒云逺勞相送無可贈别乃致酒饌飲酣謂曰既無形跡亦有一言得無難乎金花曰有事但言令緒云願聞阿姑家事來由也對曰娘子本某太守女其叔父昆弟與令緒不逺嫁為蘓氏妻遇疾終金花是從嫁後數月亦卒故得在娘子左右天帝配娘子為天狼將軍夫人故有神通金花亦承阿郎餘䕃胡使君即阿郎親子姪昨所治店家女其狐是阿郎門側役使此軰甚多金花能制之云鋭騎救難者是天兵金花要喚不復多少令緒謝之云此何時當再㑹金花云本以姻緣遇合只到今日自此姻縁斷絶便當永辭令緒惆悵良久傳謝阿姑千萬珍重厚與金花贈遺悉不肯受而去胡璿後歴數州刺史而卒出騰聽異志録裴少尹唐貞元中江陵少尹裴君者亡其名有子十餘嵗聰敏有文學風貎明秀裴君深念之後􅀍病旬日益甚醫藥無及裴君方求道術士用呵禁之冀瘳其苦有叩門者自稱髙氏子以符術為業裴即延入令視其子生曰此子非他疾乃妖狐所為耳然某有術能愈之即謝而祈焉生遂以符術考召近食頃其子忽起曰某病今愈裴君大喜謂高生為真術士具食飲已而厚贈緡帛謝遣之生曰自此當日日來候耳遂去其子他疾雖愈而神魂不足徃徃狂語或笑哭不可禁高生每至裴君即以此且祈之生曰此子精魄已為妖魅所撃今尚未還耳不旬日當間幸無以憂裴信之居數日又有王生者自言有神符能以呵禁除去妖魅疾來謁裴與語謂裴曰聞君愛子􅀍病且未瘳願得一見矣裴即使見其子生大驚曰此郎君病狐也不速治當加甚耳裴君因話高生王笑曰安知高生不為狐乃坐方設席為呵禁高生忽至既入大罵曰奈何此子病愈而乃延一狐於室内耶即為病者耳王見高來又罵曰果然妖狐今果至安用為他術考召哉二人紛然相詬辱不已裴氏家方大駭異忽有一道士至門私謂家僮曰聞裴公有子病狐吾善視鬼汝但告請入謁家僮馳白裴君出話其事道士曰易愈耳入見二人二人又詬曰此亦妖狐安得為道士惑人道士亦罵之曰狐當還郊野墟墓中何為撓人乎既而閉户相鬬毆數食頃裴君益恐其家僮􅀈惑計無所出及暮閴然不聞聲開視三狐皆仆地而喘不能動矣裴君盡鞭殺之其子後旬月乃愈矣出宣室志太平廣記卷四百五十三
