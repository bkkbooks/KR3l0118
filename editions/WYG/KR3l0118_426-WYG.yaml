  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_426-1a, image: WYG1046/WYG1046-0182c.png}
body:
  text: 太平廣記卷四百二十六宋李昉等編虎一白虎漢景帝种僮封邵亭長嚴猛𡊮雙吳道宗牧牛兒師道宣謝允鄭襲劉廣雅易㧞蕭泰黄乾酋耳獸虎塔傅黄中栁州左史巴人峽口道士白虎秦昭襄王時白虎為害自秦蜀巴漢患之昭王乃重募國中有能殺虎者邑萬家金帛如之於是夷朐䏰廖仲藥何射虎秦精等乃作白竹弩如髙樓上射白虎中頭三矢白虎常從羣虎瞋恚盡搏殺羣虎大吼而死昭王嘉之曰虎厯四郡害千二百人一朝患除功莫大焉欲如約且嫌其夷人乃刻石為盟約復夷人頃田不租十妻不筭傷人不論殺人不死秦犯夷輸黄金一兩夷犯秦輸清酒一壺夷人安之出華陽洞志漢景帝漢景帝好遊獵見虎不能得之乃為珍􅄿祭所見之虎帝乃夢虎曰汝祭我欲得我牙皮􅁘我自殺從汝取之明日帝入山果見此虎死在祭所乃命剝取皮牙餘肉復為虎出獨異志种僮种僮為畿令常有虎害人僮令設檻得二虎僮曰害人者低頭一虎低頭僮取一虎放之自是猛獸皆出境吏目之為神君出獨異志封邵漢中有虎生角道家云虎千歳則牙蜕而角生漢宣城郡守封邵一日忽化為虎食郡民民呼曰封使君因去不復來故時人語曰無作封使君不治民死食民出述異記亭長長沙有民曽作檻捕虎忽見一亭長赤幘大冠在檻中因問其故亭長怒曰昨被縣召誤入此中耳於是出之乃化為虎而去出捜神記嚴猛晉時㑹稽嚴猛婦出採薪為虎所害此後猛行至蒿中忽見婦云君今日行必遭不善我當相免也既而俱前忽逢一虎跳梁向猛婦舉手指麾狀如􅃒䕶須臾有一胡人荷㦸而過婦因指之虎即擊胡猛卒獲免出法苑珠林𡊮雙晉孝武太元五年譙郡譙縣𡊮雙家貧作客暮還家道逢一女年十五六姿容端正即與雙為婦五六年後家資甚豐又生二男至十嵗家乃巨富後里有新死者𦵏後此女逃往至墓所乃解衣脱釧挂樹便變形作虎發冢曳棺出墓外取死人食之食飽後還變作人有見之者竊語其壻卿婦非人恐將相害雙聞之不信經時復有死者輙復如此後將其壻共看之述知其實後乃越縣趨墟還食死人出五行記吳道宗晉義熙四年東陽郡太末縣吳道宗少失父與母居未娶婦一日道宗他適隣人聞屋中窣磕之聲窺不見其母但有烏斑虎在屋中隣人恐虎食道宗母遂鳴鼓㑹里人共救之圍宅突進不見有虎但見其母語如平常不觧其意兒還母語之曰宿罪見譴當有變化事後一月忽失母縣界内虎災屢起皆云烏斑虎百姓患之衆共格之傷數人後人射虎箭𢃄膺并戟刺中其腹然不能即死經數日後虎還其家不能復人形伏牀上而死其兒號泣葬之如母出齊諧記牧牛兒晉復陽縣里民家兒常牧牛牛忽䑛此兒䑛處肉悉白兒俄而死其家𦵏此兒殺牛以供賔客凡食此牛肉男女二十餘人悉變作虎出廣異記師道宣晉太元元年江夏郡安陸縣師道宣年二十二少未了了後忽發狂變為虎食人不可紀後有一女子樹上採桑虎取食之竟乃藏其釵釧於山石間後復人形知而取之經年還家復為人遂出仕官為殿中令史夜共人語忽道天地變怪之事道宣自云我曽得病發狂遂化作虎啗人言其姓名同坐人或有食其父子兄弟者於是號哭捉送赴官遂餓死建康獄中出齊諧記謝允厯陽謝允字道通少為賊所掠為奴於蔣鳳家常於山中見穽中虎饑因出之後詣縣自白令長不為申理考訊無不至允夜夢人曰此中易入難出汝自有慈惠當相拯㧞覺見一少年通身黄衣遥在栅外與允語獄吏以告令長令長由是不敢誣辱既還乃上武當山時唐公亮聞之愍之給以資履遂於襄陽見道士曰吾師戴先生者成人君子嘗言有志者與之俱來得非爾􅁘隨入山齊三日進見之乃昔日所夢人也問允欲見黄衣童否賜以神藥三丸服之不饑渇無所思欲先生亦無常處時有祥光紫氣䕃其上芬馥之氣遍於山谷出甄異記鄭襲滎陽鄭襲晉太康中為太守門下騶忽如狂奄失其所經日尋得裸身呼吟膚血淋漓問其故社公令其作虎以斑皮衣之辭以執鞭之士不堪虓躍神怒還使剥皮皮已著肉瘡毁慘痛旬日乃差出異苑劉廣雅彭城劉廣雅以太元元年為京府佐被使還路經竹里亭多虎劉防衛甚至牛馬繫於前手㦸布於地中宵與士庻同睡虎乗間跳入獨取劉而去出異苑易㧞晉時豫章郡吏易㧞義熙中受番還家違遁不返郡遣追見㧞言語如常亦為設食使者催令束妝㧞因語曰女看我面乃見眼目角張身有黄斑色便竪一足徑出門去家先依山為居至麓即變成三足大虎竪一足即成其尾也出異苑蕭泰梁衡山侯蕭泰為雍州刺史鎮襄陽時虎甚暴村門設檻機發村人炬火燭之見一老道士自陳云從村丐乞還誤落檻裏共開之出檻即成虎奔馳而去出五行志黄乾梁末始興人黄乾有妹小珠聘同縣人李肅小珠共嫂入山採木實過神廟而小珠在廟戀慕不肯歸及將還復獨走上廟見人即入草中乾妻來告肅肅以為更有他意肅被縣召將一伴夜還值風雨見廟屋有火二人向火炙衣見神牀上有衣少間聞外有行聲二人惶怖入神牀屏風後須臾見一虎振尾奮迅直至火邉自脱牙爪捲其皮置牀上著衣向火坐肅看乃小珠也肅徑出抱之與語不應明日將歸送向乾家乃閉置一室擲生肉則接食之其家看守少日又成虎郡縣檢驗村人乃將弓弩上舎即發屋射殺之明日有虎暴百姓白日閉門太守熊基表聞之出五行記酋耳獸唐天后中涪州武龍界多虎暴有一獸似虎而絶大日正午逐一虎直入人家噬殺之亦不食由是縣界不復有虎矣錄奏檢瑞圖乃酋耳不食生物有虎暴則殺之也出朝野僉載虎塔唐天后中成王千里將一虎子來宫中養損一宫人遂令生餓數日而死天后令葬之其上起塔設千人供勒碑號為虎塔至今猶在出朝野僉載傅黄中唐傅黄中為越州諸暨縣令有部人飲大醉夜中山行臨崖而睡忽有虎臨其上而嗅之虎鬚入醉人鼻中遂噴啑聲震虎遂驚躍便落崕腰胯不便為人所得出朝野僉載郴州左史唐長安年中郴州左史因病而為虎將噉其嫂村人擒獲乃左史也雖形未全改而尾實虎矣因縶樹數十日還復為人長史崔𤣥簡親問其故左史云初被一虎引見一婦人盛服諸虎恒參集各令取當日之食時某新預虎列質未全不能别覓他人將取嫂以供遂為所擒今雖作虎不得尚能其聲耳簡令試之史乃作虎聲震駭左右簷瓦振落出五行志巴人巴人好羣伐樹木作板開元初巴人百餘輩自褒中隨山伐木至太白廟廟前松樹百餘株各大數十圍羣巴喜曰天賛也止而伐之已倒二十餘株有老人戴㡌拄杖至其所謂巴曰此神樹何故伐之羣巴初不輟作老人曰我是太白神已倒者未倒者無宜作意巴等不止老人曰君若不止必當俱死無益也又不止老人乃登山呼斑子倐爾有虎數頭相繼而至噬巴殆盡唯五六人獲免神謂之曰以汝好心因不令殺宜速去也其倒樹至天寳末尚存有詔修理内殿楊國忠令人至山所宣敕取樹作板以用焉神竟與之出廣異記峽口道士開元中峽口多虎往來舟船皆被傷害自後但是有船將下峽之時即預一人充飼虎方舉船無患不然則船中被患者衆矣自此成例船留一人上㟁飼虎經數日其後有一船内皆豪强數内有一人單寒被衆推出令上㟁飼虎其人自度力不能拒乃為出船而謂諸人曰某貧窮合為諸公代死然人各有定分茍使不為其所害某别有懇誠請諸公能允許否衆人聞其語言甚切為之愴然而問曰爾有何事其人曰某今便上㟁尋其虎踨當自别有計較但懇為某留船灘下至日午時若不來即任船去也衆人曰我等如今便泊船灘下不止住今日午時兼為爾留宿俟明日若不來船即去也言訖船乃下灘其人乃執一長柯斧便上㟁入山尋虎並不見有人踨但見虎跡而已林木深邃其人乃見一路虎踨甚稠乃更尋之至一山隘泥極甚虎踨轉多更行半里即見一大石室又有一石牀見一道士在石牀上而熟寐架上有一張虎皮其人意是變虎之所乃躡足于架上取皮執斧衣皮而立道士忽驚覺已失架上虎皮乃曰吾合食汝汝何竊吾皮其人曰我合食爾爾何反有是言二人爭競移時不已道士詞屈乃曰吾有罪于上帝被謫在此為虎令食一千人吾今已食九百九十九人唯欠汝一人其數當足吾今不幸為汝竊皮若不歸吾必須别更為虎又食一千人矣今有一計吾與汝俱獲兩全可乎其人曰可也道士曰汝今但執皮還船中剪髪及鬚􅁂少許剪指爪甲兼頭靣脚手及身上各瀝少血二三升以故衣三兩事裹之待吾到㟁上汝可抛皮與吾吾取披已化為虎即將此物抛與吾取而食之即與汝無異也其人遂披皮執斧而歸船中諸人驚訝而備述其由遂於船中依虎所教待之遲明道士已在㟁上遂抛皮與之道士取皮衣振迅俄變成虎哮吼跳躑又抛衣與虎乃嚙食而去自後便不聞有虎傷人衆言食人數足自當歸天去矣出􅄙頤錄太平廣記卷四百二十六
