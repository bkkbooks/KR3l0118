body:
  text: 太平廣記卷三百九宋李昉等編神十九蔣琛張遵言蔣琛霅人蔣琛精熟二經嘗敎授於鄉里每秋冬於霅溪太湖中流設網罟以給食嘗獲巨龜以其質狀殊異乃顧而言曰雖入豫且之網俾免刳腸之患既在四靈之列得無愧於鄙叟乎乃釋之龜及中流凡返顧六七後嵗餘一夕風雨晦㝠聞波間洶洶聲則前之龜扣舷人立而言曰今夕太湖霅溪松江神境會川瀆諸長亦聞應召開筵解榻宻邇漁舟以足下淹滯此地持網且久纎鱗細介苦於數網脱禍之輩常懷怨心恐水族乗便得肆胸臆昔日恩遇常貯慤誠由斯而來冀答萬一能退咫尺以逺害乎琛曰諾遂於安流中纜舟以伺馬未頃有龜鼉魚鱉不可勝計周匝二里餘蹙波為城遏浪為地闢三門垣通衢異怪千餘皆人質螭首執戈㦸列行伍守衛如有所待續有蛟蜃數十東西馳来乃嘘氣為樓臺為瓊宫珠殿為歌筵舞席為坐榻裀褥頃刻畢偹其樽罍器皿玩用之物皆非人世所有又有神魚數百吐火珠引甲士百餘輩擁青衣黑冠者由霅溪南津而出復見水獸亦數百銜耀引鐵騎二百餘擁朱衣赤冠者自太湖中流而來至城門下馬交拜溪神曰一不展覿五紀于兹雖魚雁不絶而笑言久曠勤企盛德哀膓惄然湖神曰我心亦如之揖讓次有老蛟前唱曰安流王上馬於是二神立候焉則有衣虎豹之衣朱其額青其足執蠟炬引旌旗戈甲之卒凡千餘擁紫衣朱冠者自松江西派而至二神迎於門設禮甚謹敘暄凉竟江神曰此去有將為宰執者北渡而神貌未揚行李甚艱恐神不識不知事須詔屏翳收風馮夷息浪斯亦上帝素命禮宜躬親候吾子清塵得免舉罰否然竊於水濵拉得范相國來足以補其尤矣乃有披褐者仗劒而前溪湖神曰欽奉實久范君曰涼徳未泯吳人懷恩立祠於江濆春秋設薄祀為村醪所困遂為江公驅來唐突盛筵益增慙慄於是揖讓入門既即席則有老蛟前唱曰湘王至去城二里俄聞駢闐車馬聲則有緑衣𤣥冠者氣貌甚偉驅殿亦百餘既升階與三神相見曰適輒與汨羅屈副使同來乃有服飾與容貌慘悴者傴僂而進方即席范相笑謂屈原曰被放逐之臣負波濤之困讒痕謗跡骨銷未滅何慘靣目更獵其盃盤原正色曰湘江之孤魂魚腹之餘肉焉敢將喉舌酬對相國乎然吾聞穿七札之箭不射籠中之鳥刜洪鐘之劒不剸几上之肉且足下亡吳霸越功成身退逍遙於五湖之上輝煥於萬古之後故鄙夫竊仰重德盛名不敢以常意奉待何今日戯謔於綺席恃意氣於放臣則何異射病鳥於籠中剸腐肉於几上竊於君子惜金鏃與利刃也於是湘神動色命酒罰范君將飲有女樂數十輩皆執所習於舞筵有俳優揚言曰皤皤美女唱公無渡河歌其詞曰濁波揚揚兮凝曉霧公無渡河兮公竟渡風號水激兮呼不聞提衣㸔入兮中流去浪排衣兮遂步沒沈屍深入兮蛟螭窟蛟螭盡醉兮君血乾推出黄沙兮泛君骨當時君死兮妾何適遂就波瀾兮合魂魄願持精衛銜石心窮河源兮塞泉􅍺歌竟俳優復揚言謝秋娘採桑曲凡十餘叠曲韻哀怨舞未竟外有宣言申徒先生從河上來徐處士與䲭夷君自海濵至乃隨導而入江溪湘湖禮接甚厚屈大夫曰子非蹈甕抱石抉眼之徒與對曰然屈曰余得朋矣於是朱絃雅張清管徐奏酌瑤觥飛玉觴陸海珍味靡不臻極舞竟俳優又揚言曹娥唱怨江波凡五叠琛所記者唯三其詞云悲風淅淅兮波緜緜蘆花萬里兮凝蒼烟虬螭窟宅兮淵且𤣥排波叠浪兮沈我天所覆不全兮心寕全溢眸恨血兮徒漣漣誓將柔荑抉鋸牙之啄空水府而藏其腥涎青娥翠黛兮沈江壖碧雲斜月兮空嬋娟吞聲飲恨兮語無力徒揚哀怨兮登歌筵歌竟四座為之慘容江神把酒太湖神起舞作歌曰白露溥兮西風高碧波萬里兮翻洪濤莫言天下至柔者載舟覆舟皆我曹江神傾盃起舞作歌曰君不見夜來渡口擁千艘中載萬姓之脂膏當樓船泛泛於叠浪恨珠貝又輕於鴻毛又不見潮來津亭維一舠中有一士青其袍赴宰邑之良日任波吼而風號是知溺名溺利者不免為水府之腥臊湘王持盃霅溪神歌曰山勢縈迴水𣲖分水光山色翠連雲四時盡入詩人詠役殺吳興柳使君酒至溪神湘王歌曰渺渺烟波接九嶷㡬人經此泣江蘺年年緑水青山色不改重華南狩時於是范相國獻境會夜宴詩曰浪濶波澄秋氣涼沈沈水殿夜初長自憐休退五湖客何幸追陪百谷王香裊碧雲飄几席觥飛白玉灧椒漿酒酣獨泛扁舟去笑入琴高不死鄉徐衍處士獻境會夜宴并簡范詩曰珠光龍耀火燑燑夜接朝雲宴渚宫鳳管清吹凄極浦朱絃閒奏冷秋空論心幸遇同歸友揣分慙無輔佐功雲雨各飛真境後不堪波上起悲風屈大夫左持盃右擊盤朗朗作歌曰鳳鶱鶱以降瑞兮患山雞之雜飛玉温温以呈器兮因碔砆之爭輝當侯門之四闢兮墐嘉謨之重扉既瑞器而無庸兮宜昏暗之相㣲徒刳石以為舟兮顧沿流而志違將刻木而作羽兮與超騰之理非矜孑孑於空舉兮靡羣援之可依血淋淋而滂流兮顧江魚之腹而將歸西風蕭蕭兮湘水悠悠白芷芳歇兮江蘺秋日晼晼兮川雲收棹四起兮悲風幽羈魂汨沒兮我名永浮碧波雖涸兮厥譽長流向使甘言順行于曩昔豈今日居君王之座頭是知貪名徇祿而隨世磨滅者雖正寢之死乎無得與吾儔當鼎足之嘉會兮獲周旋於君侯雕盤玉豆兮羅珍羞金巵瓊斚兮方獻酬敢寫心兮歌一曲無誚余持盃以淹留申屠先生獻境會夜宴詩曰行殿秋未晚水宫風初涼誰言此中夜得接朝宗行靈鼉振􅕣􅕣神龍耀煌煌紅樓壓波起翠幄連雲張玊簫冷吟秋瑤瑟清含商賢臻江湖叟貴列川瀆王諒予衰俗人無能振頽綱分辭皆亂世樂寐蛟螭鄉棲遲幽島間㡬見波成桑爾來盡流俗難與傾壺觴今日登華筵稍覺神揚揚方歡滄浪侣遽恐白日光海人瑞錦前豈敢言文章聊歌靈境會此會誠難忘䲭夷君銜盃作歌曰雲集大野兮血波洶洶𤣥黄交戰兮吳無全壟既霸業之將墜宜嘉謨之不從國步顛蹶兮吾道遘凶處鴟夷之大困入淵泉之九重上帝愍余之非辜兮俾大江皷怒其寃蹤所以鞭浪山而疾驅波岳亦粗足展余拂鬱之心胷當靈境之良宴兮謬尊爼之相容擊簫皷兮撞歌鍾吳謳越舞兮歡未極遽軍城曉皷之􅕣􅕣願保上善之柔德何行樂之地兮難相逢歌終霅郡城樓早皷絶洞庭山寺晨鍾鳴而飄風勃興𤣥雲四起波間車馬音猶合沓頃之無所見曙色既分巨龜復延首於中流顧眄琛而去出集異記張遵言南陽張遵言求名下第塗次商山山館中夜晦黑因起㕔堂督芻秣見東牆下一物凝白耀人使僕者視之乃一白犬大如猫鬚睫爪牙皆如玉毛彩清潤悦懌可愛遵言憐愛之目為㨗飛言駿奔之㨗甚於飛也常與之俱初令僕人張志誠袖之毎飲飼則未嘗不持目前時或飲食不快則必伺其嗜而噉之茍或不足寧遵言輟味不令㨗飛之不足也一年餘志誠袖行意以懈怠由是遵言每行自袖之飲食轉加精愛夜則同寢晝則同處首尾四年後遵言因行於梁山路日將夕天且隂未至所詣而風雨驟來遵言與僕等𨼆大樹下於時昏晦黙無所覩忽失捷飛所在遵言驚歎命志誠等分頭搜討未獲次忽見一人衣白衣長八尺餘形狀可愛遵言豁然如月中立各得辯色問白衣人何許來何姓氏白衣人曰我姓蘇第四謂遵言曰我已知子姓字矣君知捷飛去處否則我是也君今災厄合死我縁受君恩深四年已來能活我至於盡力輟味曽無毫釐悔恨我今誓脱子厄然須損十餘人命耳言訖遂乗遵言馬而行遵言歩以從之可十里許遙見一塚上有三四人衣白衣冠人長丈餘手持弓劒形狀瓌偉見蘇四郎俯僂迎趨而拜拜訖莫敢仰視四郎問何故相見白衣人曰奉大王帖追張遵言秀才言訖偷目盜視遵言遵言恐欲踣地四郎曰不得無禮我與遵言往還君等須與我且去四人憂恚啼泣而去四郎謂遵言曰勿憂懼此輩亦不能戾君更行十里又見夜叉輩六七人皆持兵器銅頭鐵額狀貌可憎惡跳梁企躑進退獰暴遙見四郎戢毒慄立惕伏戰悚而拜四郎喝問曰作何來夜叉等霽獰毒為戚施之容肘行而前曰奉大王帖專取張遵言秀才偷目盜視之狀如初四郎曰遵言我之故人取固不可也夜叉等一時叩地流血而言曰在前白衣者四人為取遵言不到大王巳各使决鐵杖五百死者活者尚未分四郎今不與去某等盡死伏乞哀其性命暫遣遵言往四郎大怒叱夜叉夜叉等辟易崩倒者數十步外流血跳迸涕淚又言四郎曰小鬼等敢爾不然且急死夜叉等啼泣喑嗚而去四郎又謂遵言曰此數輩甚難與語今既去則奉為之事成矣行七八里見兵仗等五十餘人形神則常人耳又列拜於四郎前四郎曰何故來對答如夜叉等又言曰前者夜叉牛叔良等七人為追張遵言不到盡以付法某等惶懼不知四郎有何術救得某等全生四郎曰苐隨我來或希冀耳凡五十人言可者半須臾至大烏頭門又行數里見城堞甚嚴有一人具軍容走馬而前傳王言曰四郎逺到某為所主有限法不得迎拜於路請且於南舘小休即當邀迓入館未安信使相繼而召兼屈張秀才俄而從行宫室欄署皆真王者也入門見王披袞垂旒迎四郎而拜四郎酬拜禮甚輕易言詞唯唯而已大王盡禮前揖四郎升階四郎亦㣲揖而上迴謂遵言曰地主之分不可不爾王曰前殿淺陋非四郎所讌處又揖四郎凡過殿者三每殿中皆有陳設盤榻食具供帳之備至四重殿中方坐所食之物及器皿非人間所有食訖王揖四郎上夜明樓樓上四角柱盡飾明珠其光如晝命酒具樂飲數巡王謂四郎曰有佐酒者欲命之四郎曰有何不可女樂七八人飲酒者十餘人皆神仙間容貌糚飾耳王與四郎各衣便服談笑亦鄰於人間少年有頃四郎戯一美人美人正色不接四郎又戱之美人怒曰我是劉根妻不為奉上元夫人處分焉涉於此君子何容易乎中間許長史於雲林王夫人會上輕言某已贈語杜蘭香姊妹至多㣲言猶不敢掉謔君何容易歟四郎怒以酒巵擊牙盤一聲其柱上明珠轂轂而落暝然無所覩遵言良久懵而復醒元在樹下與四郎及鞍馬同處四郎曰君已過厄矣與君便别遵言曰某受生成之恩已極矣都不知四郎之由以歸感戴之所又某之一生更有何所賴􅁘四郎曰吾不能言汝但於商州龍興寺東廊縫衲老僧處問之可知也言畢騰空而去天已向曙遵言遂整轡適商州果有龍興寺見縫衲老僧遂禮拜初甚拒遵言遵言求之不已老僧夜深乃言曰君子苦求吾焉可不應蘇四郎者乃是太白星精也大王者仙府之謫官也今居於此遵言以他事問老僧老僧竟不對曰吾今已離此矣即命遵言歸明晨尋之已不知其處所矣出博異記太平廣記卷三百九
