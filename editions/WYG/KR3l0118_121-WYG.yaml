body:
  text: 太平廣記卷一百二十一報應二十杜通達邢文宗長孫無忌婁師徳王瑱江融李昭德弓嗣業周興魚思咺索元禮張楚金崔日知蘇頲李之唐王皇后楊慎矜師夜光崔尉子杜通達唐齊州高苑人杜通達貞觀年中縣承命令送一僧向北通達見僧經箱謂意其中是絲絹乃與妻共計擊僧殺之僧未死聞誦咒三兩句遂有一蠅飛入其鼻乆悶不出通達眼鼻遽喎眉􅁂即落迷惑失道精神沮喪未幾之間便遇惡疾不經一年而死臨終之際蠅遂飛出還入妻鼻其妻得病嵗餘復卒出法苑珠林邢文宗唐河間邢文宗家接幽燕稟性麄險貞觀年中忽遇惡風疾旬日之間眉􅁂落盡於後就寺歸懴自云近者向幽州路逢一客將絹十餘疋迥澤無人因即劫殺此人云將向房州欲買經紙終不得免少間屬一老僧復欲南去遇文宗懼事發覺揮刀擬僧僧叩頭曰乞存性命誓願終身不言文宗殺之棄之草間經二十餘日行還過僧死處時當暑月疑皆爛壞試往視之儼若生日文宗因以馬下策築僧之口口出一蠅飛鳴清徹直入宗鼻乆悶不出因得大病嵗餘而死出㝠報拾遺長孫無忌唐趙公長孫無忌奏别敕長流以爲永例後趙公犯事亦敕長流嶺南至死不復迴此亦爲法之弊出朝野僉載婁師德婁師德以殿中充河源軍使唐永和中破吐蕃於白羊澗八縱七捷優制褒美授左驍騎郎將高宗手詔曰卿有文武才幹故授卿武職勿辭也累遷納言臨終數日寢興不安無故驚曰撫我背者誰侍者曰無所見乃獨言似有所爭者曰我當壽八十今追我何也復自言爲官誤殺二人減十年詞氣若有屈伏俄而氣絶以婁公之明恕尚不免濫爲政得不慎之歟出大唐新語王瑱唐冀州刺史王瑱性酷烈時有敕使至州瑱與使語武彊縣尉藺奬曰日過移就隂處瑱怒令典獄撲之項骨折而死至明日獄典當州門限垂脚坐門扇無故自發打雙脚脛俱折瑱病見奬來起自以酒食求之不許瑱惡之廻面向梁奬在屋梁旬日而死出朝野僉載江融唐左史江融耿介正直揚州徐敬業反被羅織酷吏周興等枉奏殺之斬於東都都亭驛前融將被誅請奏事引見興曰囚何得奏事融怒叱之曰吾無罪枉戮死不捨汝遂斬之尸乃激揚而起蹭蹬十餘步行刑者踏倒還起坐如此者三乃絶雖斷其頭似怒不息無何周興死出朝野僉載李昭德唐鳯閣侍郎李昭德威權在已宣出一敕云自今已後公坐徒私坐流經恩百日不首依法科罪昭德先受孫萬榮賄財奏與三品後萬榮據營州反貨求事敗頻經恩赦以百日不首准贓斷絞出朝野僉載弓嗣業唐洛州司馬弓嗣業洛陽令張嗣明造大枷長六尺濶四尺厚五寸倚前人莫之犯後嗣明及嗣業資遣逆賊徐真北投突厥事敗業等自著此枷百姓快之也出朝野僉載周興唐秋官侍郎周興與來俊臣對推事俊臣别奏進止鞫興興不之知也及同食謂興曰囚多不肯承若爲作法興曰甚易也取大甕以炭四面炙之令囚人處之其中何事不吐卽索大甕以火圍之起謂興曰有内狀勘老兄請兄入此甕興惶恐叩頭咸卽欵伏斷死放流嶺南所破人家流者甚多爲讎家所殺傳曰多行無禮必自及信哉出朝野僉載魚思咺唐魚思咺有沈思極巧上欲造匭召工匠無人作得者咺應制爲之甚合規矩遂用之無何有人投匭言咺云徐敬業在揚州反咺爲敬業作刀輪以衝陣殺傷官軍甚衆推問具承誅之爲法自斃乃至於此出朝野僉載索元禮唐索元禮爲鐵籠頭以訊囚後坐贓賄不承使人曰取公鐵籠頭禮卽承伏出朝野僉載張楚金唐張楚金爲秋官侍郎奏反逆人持敕免死家口卽絞斬及配沒入官爲奴婢等並入律後楚金被羅織反持敕免死男子十五以上斬妻子配沒識者曰爲法自斃所謂交報也出朝野僉載崔日知唐京兆尹崔日知處分長安萬年及諸縣左降流移人不許暫停有違晷刻所由決杖無何日知貶歙縣丞被縣家催求與妻子别不得出朝野僉載蘇頲唐尚書蘇頲少時有人相之云當至尚書位終二品後至尚書三品病亟呼巫覡視之巫云公命盡不可復起頲因復論相者之言巫云公初實然由作桂府時殺二人今此二人地下訴公所司減二年壽以此不至二品頲夙蒞桂州有二吏訴縣令頲爲令殺吏乃嗟歎乆之而死出廣異記李之唐王恱爲唐昌令殺錄事李之而不􅇳之旣死長子作靈語曰王悅不道枉殺予予必報其聲甚厲經數日悅晝坐㕔事忽拳毆其腰聞者殷然驚顧無人既暮撃處㣲腫焉且痛其日李之男又言曰吾已撃王悅正中要害處卽當殺之悅疾甚則至蜀郡謁醫不愈未死之前日李之命其家造數人饌仍言曰吾與客三人至蜀郡録王悅食畢當行明日而悅死悅腫潰處正當右腎卽李之所爲也出紀聞唐王皇后唐惠妃武氏有專房之寵將謀奪嫡王皇后性妬稍不能平𤣥宗乃廢后爲庶人膚受日聞及太子之廢也𤣥宗訪於張九齡對曰太子天下本也動之則搖人心九齡自居東宫未聞大惡臣聞父子之道天性也子有過父恕而掩之無宜廢絶且其惡狀未著恐外人窺之傷陛下慈父之道𤣥宗不悅隱􅃘乆之李林甫等秉政隂中計於武妃將立其子以自固武妃亦結之乃先黜九齡而廢太子太子同生鄂王瑤光王琚同日併命海内痛之號爲三庶太子旣寃武氏及左右屢見爲祟宫中終夜相恐或聞鬼聲呌笑召覡巫視之皆曰三庶爲厲先是收鄂王光王行刑者射而瘞之乃命改塟祝而酹之武妃死其厲乃息𤣥宗乃立肅宗爲太子林甫之計不行惕然懼矣三庶人以二十五年四月二十二日死武妃至十二月而薨識者知有神通焉出大唐新語楊慎矜唐監察御史王掄爲朔方節度判官乘驛在途暴卒而顔色不變猶有暖氣懼不敢殯凡十五日復生云至㝠司與𡨕吏語㝠吏悅之立於房内吏出掄試開其案牘乃楊慎矜於帝所訟李林甫王鉷也已斷王鉷族滅矣於是不敢開置於舊處而謁王王庭前東西廊下皆垂簾坐掄簾下愼矜兄弟入見王稱寃王曰已族王鉷即當到矣須臾鏁鉷至兼其子弟數人皆械繋面縳七竅流血王令送訊所於是與慎矜同出乃引掄既蘇月餘有邢縡之事王鉷死之出紀聞師夜光唐師夜光者薊門人少聰敏好學雅尚浮屠氏遂爲僧居于本郡僅十年盡通内典之奥又有沙門惠達者家甚富有金錢巨萬貪夜光之學因與爲友是時𤣥宗皇帝好神僊釋氏窮索名僧方士而夜光迫於貧不得西去心常怏怏惠達知之因以錢七十萬資其行且謂夜光曰師之學藝材用愚竊以爲無出於右者聖上拔天下英俊吾子必將首出羣輩沐浴恩渥自此託跡緇徒爲明天子臣可翹足而待也然當是時必有擁篲子門幸无忘半靣之舊夜光謝曰幸師厚貺我得遂西上儻爲君之五品則以報師之惠矣夜光至長安因賂九仙公主左右得以温泉命内臣選碩學僧十輩與方士議論夜光在選演暢𤣥奥發揮疑義羣僧無敢比者上竒其辯詔賜銀印朱綬拜四門博士日侍左右賜甲第洎金錢繒綵以千數時號幸臣惠達遂自薊門入長安訪之夜光聞惠達至以爲収債於已甚不懌惠達悟其㫖因告去既已北歸月餘夜光慮其再來卽宻書與薊門帥張廷珪近者惠達師至輦下誣毁公繕完兵革將為逆謀人亦頗有知者以公之忠天下莫不聞之積毁銷金不可不戒廷珪驚怒即召惠達鞭殺之後數日夜光忽見惠達來庭中罵夜光曰我以七十萬錢資汝西上奈何遽相誣謗使我寃死何負我之深也言訖遂躍而上捽拽夜光乆之乃亡所見師氏家僮咸見之其後數日夜光卒出宣室志崔尉子唐天寳中有清河崔氏家居于滎陽母盧氏幹於治生家頗富有子䇿名京都受吉州太和縣尉其母戀故産不之官爲子娶太原王氏女與財數十萬奴婢數人赴任乃謀賃舟而去僕人曰今有吉州人姓孫云空舟欲返傭價極亷儻與商量亦恐穩便遂擇發日崔與王氏及婢僕列拜堂下泣别而登舟不數程晚臨野岸舟人素窺其囊囊伺崔尉不意遽推落于深潭佯爲拯溺之勢退而言曰恨力救不及矣其家大慟孫以刃示之皆惶懼無復喘息是夜抑納王氏王方娠遂以財物居於江夏後王氏生男舟人養爲己子極愛焉其母亦竊誨以文字母亦不告其由崔之親老在鄭州訝乆不得消息積望數年天下離亂人多飄流崔母分與子永隔矣爾後二十年孫氏因崔財致産極厚養子年十八九學藝已成遂遣入京赴舉此子西上途過鄭州去州約五十里遇夜迷路常有一火前引而不見人隨火而行二十餘里至莊門扣開以寄宿主人容之舍於㕔中乃崔莊也其家人竊窺報其母曰門前宿客面貌相似郎君家人又伺其言語行步輒無少異又白其母母欲自審之遂召入升堂與之語話一如其子問乃孫氏矣其母又垂泣其子不知所以母曰郎君逺來明日且住一食此子不敢違長者之意遂諾之明日母見此子告去遂發聲慟哭謂此子曰郎君勿驚此哭者昔年唯有一子頃因赴官遂絶消息已二十年矣今見郎君狀貌酷似吾子不覺悲慟耳郎君西去迴日必須相過老身心孤見郎君如己兒也亦有奉贈努力早迴此子至春應舉不捷却歸至鄭州還過母莊母見欣然遂留停歇數日臨行贈貲糧兼與衣一副曰此是吾亡子衣服去日爲念今既永隔以郎君貌似吾子便以奉贈號哭而别他時過此亦須相訪此子却歸亦不爲父母言之後忽著老母所遺衣衫下襟有火燒孔其母驚問何處得此衣乃述本末母因屏人泣與子言其事此衣是吾與汝父所製初熨之時誤遺火所􅋹汝父臨發之日阿婆留此以爲念比爲汝幼小恐申理不了豈期今日神理昭然其子聞言慟哭詣府論寃推問果伏誅孫氏而妻以不早自陳斷合從坐其子哀請而免出原化記太平廣記卷一百二十一
