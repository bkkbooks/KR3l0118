body:
  text: 太平廣記卷四百九十宋李昉等編雜傳記七東陽夜怪録前進士王洙字學源其先琅琊人元和十三年春擢第嘗居鄒魯間名山習業洙自云前四年時因隨籍入貢暮次滎陽逆旅值彭城客秀才成自虚者以家事不得就舉言旋故里遇洙因話辛勤往復之意自虚字致本語及人間目覩之異是歳自虚十有一月八日東還乃元和八年也翼日到渭南縣方屬隂曀不知時之早晚縣宰黎謂留飲數巡自虚恃所乘壯乃命僮僕輜重悉令先於赤水店俟宿聊踟蹰焉東出縣郭門則隂風刮地飛雪霿天行未數里迨將昏黑自虚僮僕既悉令前去道上又行人已絶無可問程至是不知所屆矣路出東陽驛南尋赤水谷口道去驛不三四里有下塢林月依微畧辨佛廟自虚啓扉投身突入雪氣愈甚自虚竊意佛宇之居有住僧將求委焉則策馬入其後纔認居横數間空屋寂無燈燭久之傾聴微似有人喘息聲遂繫馬於西面柱連問院主和尚今夜慈悲相救徐聞人應老病僧智高在此適僮僕已出使村中教化無從以致火燭雪若是復當深夜客何為者自何而來四絶親鄰何以取濟今夕脫不惡其病穢且此相就則免暴露兼撤所藉芻藁分用委質可矣自虚他計既窮聞此内亦頗喜乃問高公生縁何鄉何故棲此又俗姓云何既接恩容當還審其出處曰貧道俗姓安以本身肉鞍之故也生在磧西本因捨力隨縁來詣中國到此未幾房院疎蕪秀才卒降無以供待不垂見怪為幸自虚如此問荅頗忘前倦乃謂高公曰方知探寶化成如來非妄立喻今高公是我導師矣高公本宗固有如是降伏其心之教俄則沓沓然若數人聨歩而至者遂聞云極好雪師丈在否高公未應間聞一人云曹長先行或曰朱八丈合先行又聞人曰路甚寛曹長不合苦讓偕行可也自虚竊謂人多私心益壯有頃即似悉造座隅矣内謂一人曰師丈此有宿客乎高公對曰適有客來詣宿耳自虚昏昏然莫審其形質唯最前一人俯簷暎雪彷彿若見著皁裘者背及肋有搭白補處其人先發問自虚云客何故瑀瑀邱主反然犯雪昏夜至此自虚則具以實告其人因請自虚姓名對曰進士成自虚自虚亦從而語曰暗中不可悉揖清揚他日無以為子孫之舊請各稱其官及名氏便聞一人云前河隂轉運巡官試左驍衛胃曹㕘軍盧倚馬次一人云桃林客副輕車將軍朱中正次一人曰去文姓敬次一人曰銳金姓奚此時則似周坐矣初因成公應舉倚馬旁及論文倚馬曰某兒童時即聞人詠師丈聚雪為山詩今猶記得今夜景象宛在目中師丈有之乎高公曰其詞謂何試言之倚馬曰所記云誰家掃雪滿庭前萬壑千峰在一拳吾心不覺侵衣冷曾向此中居幾年自虚茫然如失口呿眸眙尤所不測高公乃曰雪山是吾家山往年偶見小兒聚雪屹有峰巒之狀西望故國悵然因作是詩曹長大聰明如何記得貧道舊時惡句不因曹長誠念在口實亦遺忘倚馬曰師丈騁逸歩於遐荒脫塵機機當為羈於維縶巍巍道徳可謂首出儕流如小子之徒望塵奔走曷曷當為褐用毛色而譏之敢窺其高逺哉倚馬今春以公事到城受性頑鈍闕下柱玉煎迫不堪旦夕羈羈當為饑旅雖勤勞夙夜料入况微負荷非輕常懼刑責近蒙本院轉一虚銜謂空驅作替驢意在苦求脫免昨晚出長樂坡下宿自悲塵中勞役慨然有山鹿野麋之志因寄同侣成兩篇惡詩對諸作者輒欲口占去就未敢自虚曰今夕何夕得聞佳句倚馬又謙曰不揆荒淺况師丈文宗在此敢呈醜拙邪自虚苦請曰願聞願聞倚馬因朗吟其詩曰長安城東洛陽道車輪不息塵浩浩爭利貪前競著鞭相逢盡是塵中老其一日晚長川不計程離羣獨歩不能鳴賴有青青河畔草春來猶得慰慰當作餵羈羈當作饑情合座咸曰大高作倚馬謙曰拙惡拙惡中正謂高公曰比聞朔漠之士吟諷師丈佳句絶多今此是頴川况側聆盧曹長所念開洗昏鄙意爽神清新製的多滿座渴咏豈不能見示三兩首以沃羣矚高公請俟他日中正又曰眷彼名公悉至何惜兔園雅論高談抑一時之盛事今去市肆苦逺夜艾興餘杯觴固不可求炮炙無由而致賓主禮闕慙恧空多吾輩方以觀心朶頤謂齕草之性與師丈同而諸公通宵無以充腹赧然何補高公曰吾聞嘉話可以忘乎饑渴祗如八郎力濟生人動循軌轍攻城犒士為己所長但以十二因縁皆從觴起茫茫苦海煩惱隨生何地而可見菩提提當為蹄何門而得離火宅亦用事譏之中正對曰以愚所謂覆轍相尋輪回惡道先後報應事甚分明引領修行義歸於此高公大笑乃曰釋氏尚其清淨道成則為正覺覺當為角覺則佛也如八郎向來之談深得之矣倚馬大笑自虚又曰適來朱將軍再三有請和尚新製在小生下情實願觀寶和尚豈以自虚逺客非我法中而見鄙之乎且和尚器識非凡岸谷深峻必當格韻才思貫絶一時妍妙清新擺落俗態豈終祕咳唾之餘思不吟一兩篇以開耳目乎高公曰深荷秀才苦請事則難於固違况老僧殘疾衰羸習讀久廢章句之道本非所長却是朱八無端挑抉吾短然於病中偶有兩篇自述匠石能聴之乎曰願聞其詩曰擁褐藏名無定蹤流沙千里度衰容𫝊得南宗心地後此身應便老雙峰為有閻浮珍重因逺離西國越咸秦自從無力休行道且作頭陀不繫身又聞滿座稱好聲移時不定去文忽於座内云昔王子猷訪戴安道於山隂雪夜皎然及門而返遂𫝊何必見戴之論當時皆重逸興今成君可謂以文㑹友下視𡊮安蔣詡吾少年時頗負雋氣性好鷹鸇曾於此時畋遊馳騁吾故林在長安之巽維御宿川之東畤此處地名茍家觜也詠雪有獻曹州房一篇不覺詩狂所攻輒汚泥高鑒耳因吟詩曰愛此飄颻六出公輕瓊洽絮舞長空當時正逐秦丞相騰躑川原喜北風獻詩訖曹州房頗甚賞僕此詩因難云呼雪為公得無檢束乎余遂徵古人尚有呼竹為君後賢以為名論用以證之曹州房結舌莫知所對然曹州房素非知詩者烏大嘗謂吾曰難得臭味同斯言不妄今渉彼逺官㕘東州軍事事見古今注相去數千苗十以五五之數故第十氣候啞吒憑恃羣親索人承事魯無君子者斯焉取諸銳金曰安敢當不見苗生幾日曰渉旬矣然則苗子何在去文曰亦應非逺知吾輩㑹於此計合解來居無幾苗生遽至去文偽為喜意拊背曰適我願兮去文遂引苗生與自虚相揖自虚先稱名氏苖生曰介立姓苗賓主相諭之詞頗甚稠沓銳金居其側曰此時則苦吟之矣諸公皆由老奚詩病又發如何如何自虚曰向者承奚生眷與之分非淺何為尚吝瑰寶大失所望銳金退而逡巡曰敢不貽廣席一噱乎輒念三篇近詩云舞鏡爭鸞綵臨塲定鶻拳正思仙仗日翹首仰樓前養鬭形如木迎春質似泥信如風雨在何憚跡卑棲為脫田文難常懷紀涓恩欲知疎野態霜曉呌荒村銳金吟訖暗中亦大聞稱賞聲高公曰諸賢勿以武士見待朱將軍此公甚精名理又善屬文而乃猶無所言皮裏臧否吾輩抑將不可况成君逺客一夕之聚空門所謂多生有縁宿鳥同樹者也得不因此留異時之談端哉中正起曰師丈此言乃與中正樹荆棘耳茍衆情疑阻敢不唯命是聴然盧探手作事自貽伊戚如何高公曰請諸賢靜聴中正詩曰亂魯負虚名遊秦感甯生候驚丞相喘用識葛盧鳴黍稷兹農興軒車乏道情近來筋力退一志在歸耕高公歎曰朱八文華若此未離散秩引駕者又何人哉屈甚屈甚倚馬曰扶風二兄偶有所繫意屬自虚所乘吾家龜兹蒼文斃甚樂喧厭靜好事揮霍興在結束勇於前驅謂般輕貨首隊頭驢此㑹不至恨可知也去文謂介立曰胃家兄弟居處匪遥莫往莫來安用尚志詩云朋友攸攝而使尚有遐心必須折簡見招鄙意頗成其美介立曰某本欲訪胃大去方以論文興酣不覺遲遲耳敬君命予今且請諸公不起介立略到胃家即回不然便拉胃氏昆季同至可乎皆曰諾介立乃去無何去文於衆前竊是非介立曰蠢兹為人有甚爪距頗聞潔廉善主倉庫其如蜡姑之醜難以掩於物論何殊不知介立與胃氏相攜而來及門瞥聞其說介立攘袂大怒曰天生苗介立鬬伯比之胄下得姓於楚逺祖棼皇茹分二十族祀典配享至於禮經謂郊特牲八蜡迎虎迎貓也奈何一敬去文盤瓠之餘長細無别非人倫所齒只合馴狎稚子獰守酒旗諂同妖狐竊脂媚竈安敢言人之長短我若不呈薄藝敬子謂我咸秩無文使諸人異日藐我今對師丈念一篇惡詩且看如何詩曰為慙食肉主恩深日晏蟠蜿卧錦衾且學志人知白黑那將好爵動吾心自虚頗甚佳歎去文曰卿不詳本末厚加矯誣我實春秋向戌之後卿以我為盤瓠裔如辰陽比房於吾殊所華闊中正深以兩家獻酬未絶為病乃曰吾願作宜僚以釋二忿可乎昔我逢丑父實與向家棼皇春秋時屢同盟㑹今座上有名客二子何乃互毁祖宗語中忽有綻露是取笑於成公齒冷也且盡吟詠固請息喧於是介立即引胃氏昆仲與自虚相見初襜襜然若自色二人來前長曰胃藏瓠次曰藏立自虚亦稱姓名藏瓠又巡座云令兄令弟介立乃於廣衆延譽胃氏昆弟潛跡草野行著及於名族上參列宿親密内達肝膽况秦之八水實貫天府故林二十族多是咸京聞弟新有題舊業詩時稱甚美如何得聞乎藏瓠對曰小子謬厠賓筵作者雲集欲出口吻先增慙怍今不得已塵汗諸賢耳目詩曰鳥鼠是家川周王昔獵賢一從離子卯䑕兔皆變為蝟也應見海桑田介立稱好弟他日必負重名公道若存斯文不朽藏瓠歛躬謝曰藏瓠幽蟄所宜幸陪羣彦兄揄揚太過小子謬當重言若負芒刺座客皆笑時自虚方聆諸客嘉什不假自念己文但曰諸公清才綺靡皆是目牛遊刃中正將謂有譏潛然遁去高公求之不得曰朱八不告而退何也倚馬對曰朱八世與炮氏為讐惡聞發硎之說而去耳自虚謝不敏此時去文獨與自虚論詰語自虚曰凡人行藏卷舒君子尚其達節搖尾求食猛虎所以見幾或為知己吠鳴不可以主人無徳而廢斯義也去文不才亦有兩篇言志奉呈詩曰事君同樂義同憂那挍糟糠滿志休不是守株空待兔終當逐鹿出林邱少年嘗負饑鷹用内願曾無寵鶴心秋草毆除思去宇平原毛血興從禽自虚賞激無限全忘一夕之苦方欲自誇舊制忽聞逺寺撞鐘則比膊鍧然聲盡矣注目略無所覩但覺風雪透窗臊穢撲鼻唯窣颯如有動者而厲聲呼問絶無由答自虚心神恍惚未敢遽前捫攖退尋所繫之馬宛在屋之西隅鞍韉被雪馬則齕柱而立遲疑間曉色已將辨物矣乃於屋壁之北有橐駝一䀡腹跪足儑耳􅀈口自虚覺夜來之異得以遍求之室外北軒下俄又見一瘁瘠烏驢連脊有磨破三處白毛茁然將滿舉視屋之北拱微若振迅有物乃見一老雞蹲焉前及設像佛宇塌座之北東西有隙地數十歩牖下皆有彩畫處土人曾以麥穏之長者積於其間見一大駁貓兒眠於上咫尺又有盛餉田漿破瓠一次有牧童所棄破笠一自虚因蹴之果獲二刺蝟蠕然而動自虚周求四顧悄未有人又不勝一夕之凍乏乃攬轡振雪上馬而去週出村之北道左經柴攔舊圃覩一牛踣雪齕草次此不百餘歩合村悉輦糞幸此藴崇自虚過其下羣犬喧吠中有一犬毛悉齊躶其狀甚異睥睨自虚自虚驅馬久之值一􅅱闢荆扉晨興開徑雪自虚駐馬訊焉對曰此故友右軍彭特進莊也郎君昨宵何止行李間有似迷途者自虚語及夜來之見􅅱倚篲驚訝曰極差極差昨晚天氣風雪莊家先有一病橐駝慮其為所斃遂覆之佛宇之北念佛社屋下有數日前河隂官脚過有乏驢一頭不任前去某哀其殘命未捨以粟斛易留之亦不羈絆彼欄中瘠牛皆莊家所畜適聞此說不知何縁如此作怪自虚曰昨夜已失鞍䭾今餒凍且甚事有不可率話者大略如斯難於悉述遂策馬奔去至赤水店見僮僕方訝其主之相失始忙於求訪自虚慨然如喪魂者數日太平廣記卷四百九十
