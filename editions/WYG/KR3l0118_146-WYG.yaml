body:
  text: 太平廣記卷一百四十六定數一寳誌史溥耿詢尉遲敬德魏徵婁師德王顯張寳藏授判㝠人官王無㝵宇文融路敬潛甘子布李迥秀狄仁傑崔元綜蘇味道盧崇道劉仁軌任之選寳誌梁簡文之生誌公謂武帝此子與寃家同年生其年侯景生於雁門亂梁誅蕭氏畧盡岀朝野僉載史溥陳霸先未貴時有直閣吏史溥夢有人朱衣執玉簡自天而降簡上金字書曰陳氏五世三十四年及後主降隋史溥尚在岀獨異志耿詢隋大業中耿詢造渾儀成進之帝召太史令袁充少府監何稠等檢驗三辰度數晝夜不轉毫釐不差帝甚嘉之賜物一百段欲用爲太史令詢聞之笑曰詢故未得此官六十四五所不論耳然得太史令即命終後宇文化及簒逆詢爲太史令詢知化及不識謀欲歸唐事覺被害時年六十五觀詢之藝能數術蓋亦張衡郭璞之流岀大業拾遺尉遲敬德隋末有書生居太原苦於家貧以教授爲業所居抵官庫因穴而入其内有錢數萬貫遂欲攜挈有金甲人持戈曰汝要錢可索取尉遲公帖來此是尉遲敬德錢也書生訪求不見至鐵冶處有煅鐵尉遲敬德者方袒露蓬首煅鍊之次書生伺其歇乃前拜之尉遲公問曰何故曰某貧困足下富貴欲乞錢五百貫得否尉遲公怒曰某打鐵人安有富貴乃侮我耳生曰若能哀憫但賜一帖他日自知尉遲不得已令書生執筆曰錢付某乙五百貫具月日署名於後書生拜謝持去尉遲公與其徒拊掌大笑以爲妄也書生既得帖却至庫中復見金甲人呈之笑曰是也令繫於梁上高處遣書生取錢止於五百貫後敬德佐神堯立殊功請歸鄉里敕賜錢并一庫物未曽開者遂得此錢閲簿欠五百貫將罪主者忽於梁上得帖子敬德視之乃打鐵時書帖累日驚歎使人密求書生得之具陳所見公厚遣之仍以庫物分惠故舊出逸史魏徵唐魏徵爲僕射有二典事之長參時徵方寢二人窓下平章一人曰我等官職總由此老翁一人曰總由天上徵聞之遂作一書遣由此老翁人者送至侍郎處云與此人一員好官其人不知岀門心痛憑由天人者送書明日引注由老人者被放由天者得留徵怪之問焉具以實對乃歎曰官職祿料由天者蓋不虚也岀朝野僉載婁師德唐婁師德爲揚州江都尉馮元常亦爲尉共見張冏藏冏藏曰二君俱貴馮位不如婁馮唯取錢多官益進婁若取一錢官即敗後馮爲浚儀尉多肆慘虐巡察以爲彊奏授雲陽尉又緣取錢事雪以爲清彊監察婁竟不敢取一錢位至台輔家極貧匱馮位至尚書左丞後得罪賜自盡婁至納言卒岀朝野僉載王顯唐王顯與文武皇帝有嚴子陵之舊每掣褌爲戲將帽爲歡帝微時常戲曰王顯抵老不作繭及帝登極而顯謁因奏曰臣今日得作繭耶帝笑曰未可知也召其三子皆授五品顯獨不及謂曰卿無貴相朕非爲卿惜也曰朝貴而夕死足矣時僕射房𤣥齡曰陛下既有龍潛之舊何不試與之帝與之三品取紫袍金帶賜之其夜卒岀朝野僉載張寳藏貞觀中張寳藏爲金吾長常因下直歸櫟陽路逢少年畋獵割鮮野食倚樹歎曰張寳藏身年七十未嘗得一食酒肉如此者可悲哉傍有一僧指曰六十日内官登三品何足歎也言訖不見寳藏異之即時還京時太宗苦病痢疾衆醫不效即下詔問殿庭左右有能治此疾者當重賞之時寳藏曽困其疾即具疏以乳煎蓽茇方進上服之立差宣下宰臣與五品官魏徵難之逾月不進擬上疾復發問左右曰吾前飲乳煎蓽茇有效復命進之一啜又平復因思曰嘗令與進方人五品官不見除授何也徵懼曰奉詔之際未知文武二吏上怒曰治得宰相不妨已授三品官我天子也豈不及汝耶乃厲聲曰與三品文官授鴻臚卿時正六十日矣岀獨異志授判㝠人官唐太宗極康豫太史令李淳風見上流淚無言上問之對曰陛下夕當晏駕太宗曰人生有命亦何憂也留淳風宿太宗至夜半上奄然入定見一人云陛下蹔合來還即去也帝問君是何人對曰臣是生人判㝠事太宗入見判官問六月四日事即令還向見者又迎送引導岀淳風即觀𤣥象不許哭泣須臾乃寤至曙求昨所見者令所司與一官遂注蜀道一丞上怪問之選司奏奉進止與此官上亦不記旁人悉聞方知官皆由天也出朝野僉載王無㝵唐王無㝵好博戲善鷹鷂文武聖皇帝微時與無㝵蒲戲爭彩有李陽之宿憾焉帝登極㝵藏匿不岀帝令給使將一鷂子於市賣之索錢二十干㝵不之知也酬錢十八貫給使以聞帝曰必王無㝵也遂召至惶懼請罪帝笑而賞之令於春明門待諸州庸車三日並與之㝵坐三日屬灞橋破唯得麻三車更無所有帝知其命薄更不復賞頻請五品帝曰非不與卿惜卿不勝也固請乃許之其夜遂卒岀朝野僉載宇文融劉禹錫曰官不前定何名眞宰乎永徽中盧齊卿卒亡及蘇説見其舅李某爲㝠司判官有吏押案曰宇文融合爲宰相舅曰宇文融豈堪爲宰相吏曰天曹符已下數日多少即由判官舅乃判一百日既而拜宰相果百日而罷岀嘉話錄路敬潛懷州錄事參軍路敬潛遭綦連輝事於新開推鞫免死配流後訴雪授睦州遂安縣令前邑宰皆卒於官潛欲不赴其妻曰君若合死新開之難早已無身今得縣令豈非命乎遂至州去縣水路數百里上寢堂西間有三殯坑皆埋舊縣令潛命坊夫塡之有梟鳴於屏風又鳴於承塵上並不以爲事每與妻對食有䑕數十頭或黃或白或青或黒以杖驅之則抱杖而叫自餘妖怪不可具言至一考滿一無損失選授衛令除衛州司馬入爲即中位至中書舍人岀朝野僉載甘子布周甘子布博學有才年七十爲左衛長史不入五品登封年病以驢轝强至嶽下天恩加兩階合入五品竟不能起鄉里親戚來賀衣冠不得遂以緋袍覆其上帖然而終岀朝野僉載李迥秀李迥秀爲兵部尚書有疾朝士問之秀曰僕自知當得侍中有命固不憂也朝士退未岀巷而薨有司奏有詔贈侍中岀定命錄狄仁傑唐狄仁傑之貶也路經汴州欲留半日醫疾開封縣令霍獻可追逐當日岀界狄公甚銜之及回爲宰相霍已爲郎中狄欲中傷之而未果則天命擇御史中丞凡兩度承㫖皆忘後則天又問之狄公卒對無以應命唯記得霍獻可遂奏之恩制除御史中丞後狄公謂霍曰某初恨公今却薦公乃知命也豈由於人耶岀定命錄崔元綜崔元綜則天朝爲宰相令史奚三兒云公從今六十日内當流南海六年三度合死然竟不死從此後發初更作官職後還於舊處坐壽將百歲終以餒死經六十日果得罪流於南海之南經數年血痢百日至困而不死㑹赦得歸乗船渡海遇浪漂沒同船人並死崔公獨抱一板隨波上下漂泊至一海渚入叢葦中板上一長釘刺脊上深入數寸其釘板壓之在泥水中晝夜忍痛呻吟而已忽遇一船人來此渚中聞其呻吟哀而救之扶引上船與踏血拔釘良乆乃活問其姓名云是舊宰相衆人哀之濟以糧食隨路求乞於船上卧見一官人著碧是其宰相時令史喚與語又濟以糧食得至京師六年之後收錄乃還選曹以舊相奏上則天令超資與官及過謝之日引於殿庭對崔公著碧則天見而識之問得何官具以狀對乃詔吏部令與赤尉及引謝之日又敕與御史自御史得郎官累遷至中書侍即九十九矣子姪並死唯獨一身病臥在牀顧令奴婢取飯粥奴婢欺之皆笑而不動崔公既不能責罰奴婢皆不受處分乃感憤不食數日而死矣岀定命錄蘇味道蘇味道三度合得三品並辭之則天問其故對曰臣自知不合得三品則天遣行歩視之曰卿實道今得三品十三年中書侍郎平章事不登三品其後岀爲眉州刺史改爲益州長史敕賜紫綬至州日衣紫畢其夜暴卒岀定命錄盧崇道唐太常卿盧崇道坐女婿中書令崔湜反羽林即將張仙坐與薛介然口陳欲反之狀俱流嶺南經年無日不悲號兩目皆腫不勝悽戀遂並逃歸崇道至都宅藏隱爲男娶崔氏女未成有内給使來取充貴人崇道乃賂給使别取一崔家女去入内事敗給使具承掩崇道并男三人亦被糺捉敕杖各決一百俱至喪命岀朝野僉載劉仁軌唐青州刺史劉仁軌知海運失船極多除名爲民遂遼東効力遇病臥平壤城下褰幕看兵士攻城有一卒直來前頭背坐叱之不去仍惡罵曰你欲看我亦欲看何預汝事不肯去須臾城頭放箭正中心而死微此兵仁軌幾爲流矢所中岀朝野僉載任之選唐任之選與張説同時應舉後説爲中書令之選竟不及第來謁張公公遺絹一束以充糧用之選將歸至舍不經一兩日疾大作將絹市藥絹盡疾自損非但此度餘處亦然何薄命之甚也岀朝野僉載太平廣記卷一百四十六
