body:
  text: 太平廣記卷一百二十二報應二十一陳義郎達奚珣華陽李尉段秀實馬奉忠鄆卒樂生宋申錫蜀營典陳義郎陳義郎父彞爽與周茂方皆東洛福昌人同於三鄉習業彞爽擢第歸娶郭愔女茂方名竟不就唯與彞爽交結相誓唐天寳中彞爽調集受蓬州儀隴令其母戀舊居不從子之官行李有日郭氏以自織染縑一匹裁衣欲上其姑誤爲交刀傷指血沾衣上啓姑曰新婦七八年溫凊晨昏今將隨夫之官逺違左右不勝咽戀然手自成此衫子上有剪刀誤傷血痕不能澣去大家見之即不忘息婦其姑亦哭彞爽固請茂方同行其子義郎纔二嵗茂方見之甚於骨肉及去儀隴五百餘里磴石臨險巴江浩渺攀蘿遊覽茂方忽生異志命僕夫等先行爲吾郵亭具饌二人徐步自牽馬行忽於山路斗拔之所抽金鎚撃彞爽碎顙擠之於浚湍之中佯號哭云某内逼比迴見馬驚踐長官殂矣今將何之一夜㑹喪爽妻及僕御致酒感慟茂方曰事既如此如之何况天下四方人一無知者吾便權與夫人乘名之官且利一政俸禄逮可歸北即與發哀僕御等皆懸厚利妻不知本末乃從其計到任安帖其僕一年已後謂郭曰吾志已成誓無相背郭氏藏恨未有所施茂方防虞甚切秩滿移官家于遂州長江又一選授遂州曹掾居無何已十七年子長十九嵗矣茂方謂必無人知教子經業既而欲成遂州秩滿挈其子應舉是年東都舉選茂方取北路令子取南路茂方意令覘故園之存沒塗次三鄉有鬻飯媼留食再三瞻矚食訖將酬其直媼曰不然吾憐子似吾孫姿狀因啓衣篋出郭氏所留血汚衫子以遺泣而送之其子袐於囊亦不知其由與父之本末明年下第歸長江其母忽見血跡衫子驚問其故子具以三鄊媪所遺對及問年状即其姑也因大泣引子於静室具言之此非汝父汝父爲此人所害吾久欲言慮汝之幼吾婦人謀有不臧則汝亡父之寃無復雪矣非惜死也今此吾手留血襦還乃天意乎其子宻礪霜刃候茂方寢乃斷吭仍挈其首詣官連帥義之免罪即侍母東歸其姑尚存且叙契濶取衫子驗之歔欷對泣郭氏養姑三年而終出乾􅍧子達奚珣唐肅宗収復兩都崔器爲三司使性刻樂禍陰忍寡恩希㫖深文奏陷賊官據合處死李峴執之曰夫事有首從情有輕重若一㮣處死恐非含𢎞之義昔者明王用刑殱厥渠魁脅從罔理况河北殘冦今尚未平茍容漏網適開自新之路若盡行誅是堅叛逆之心守文之吏不識大體累日方從峴奏陳希烈已下定六等科罪呂諲驟薦器爲吏部侍郎御史大夫器病脚踵月餘漸亟瞑目即見達奚珣但口稱叩頭大尹不自由左右問之良乆答曰達奚尹訴寃我求之如此經三月不止而死出譚賓録華陽李尉唐天寶後有張某爲劒南節度使中元日令郭下諸寺盛其陳列以縱士女遊觀有華陽李尉者妻貌甚美聞於蜀人張亦知之及諸寺嚴設傾城皆至其從事及州縣官家人看者所由必白於張唯李尉之妻不至異之令人潛問其鄰果以貌美不出張乃令於開元寺選一大院遣蜀之衆工絕巧者極其妙思作一鋪木人音聲關捩在内絲竹皆備令百姓士庶恣觀三日云三日滿即將進内殿百里車輿闐噎兩日李君之妻亦不來三日欲夜人散李妻乘兜子從婢一人而至將出宅人已奔走啓于張矣張乃易其衣服先往於院内一脫空佛中坐覘覷之須臾至先令探屋内都無人乃下張見之乃神仙之人非代所有及歸潛求李尉之家來往者浮圖尼及女巫更致意焉李尉妻皆驚而拒之㑹李尉以推事受贓爲其僕所發張乃令能吏深文按之奏杖六十流於嶺徼死于道張乃厚賂李尉之母彊取之適李尉愚而陋其妻每有庸奴之恨遂肯置于州張寵敬無與倫比然自此後亦常髣髴見李尉在於其側令術士禳謝竟不能止嵗餘李之妻亦卒數年張疾病見李尉之狀亦甚分明忽一日覩李尉之妻宛如平生張驚前問之李妻曰某感公恩深思有所報李某已上訴於帝期在此嵗然公亦有人救拔但過得茲年必無虞矣彼已來迎公若不出必不敢升公之堂慎不可下言畢而去其時華山道士符籙極高與張結壇場於宅内言亦略同張數月不敢降階李妻亦同來皆教以嚴慎之道又一日黃昏時堂下東廂有叢竹張見一紅衫子袖於竹側招已者以其李妻之來也都忘前所戒便下階奔往赴之左右隨後呌呼止之不得至則見李尉衣婦人衣拽張於林下毆撃良乆云此賊若不著紅衫子招肯下階耶乃執之出門去左右如醉及醒見張仆於林下矣眼鼻皆血唯心上暖扶至堂而卒矣出逸史段秀實唐朱泚敗奔涇州京師副元帥李晟収復宮闕朱泚既敗走收殘兵士纔餘一二百人忽昏迷不辨南北因問路於田父田父曰豈非朱太尉耶僞宰相源休止之曰漢皇帝田父曰天地不長兇惡虵䑕不爲龍虎天網恢恢去將何適泚怒欲殺之俄而亡其所在及去涇州百餘里泚於馬上忽叩頭連稱乞命手足紛紜若有拒捍因之墜馬良乆却蘇左右問其故曰見段司農尋被韓旻梟斬出廣徳神異錄馬奉忠唐元和四年憲宗伐王承宗中尉吐突承璀獲恒陽生口馬奉忠等三十人馳詣闕憲宗令斬之於東市西坡資聖寺側斬畢勝業坊王忠憲者屬羽林軍弟忠弁行營爲恒陽所殺忠憲􅅤弟之讎聞恒陽生口至乃佩刃往視之敕斬畢忠憲乃剖其心兼兩䏶肉歸而食之至亱有紫衣人扣門忠憲出見自云馬奉忠忠憲與坐問所須答何以苦剖我心割我肉忠憲曰汝非鬼耶對曰是忠憲云我弟爲汝逆賊所殺我乃不反兵之􅄷以直報怨汝何怪也奉忠曰我恒陽冦是國賊我以死謝國矣汝弟爲恒陽所殺則罪在恒陽帥我不殺汝弟汝何妄報吾子不聞父子之罪尚不相及而汝妄報衆讎則汝讎極多矣須還吾心還吾䏶則怨可釋矣忠憲如失理云與汝萬錢可乎答曰還我無寃然亦貰公嵗月可矣言畢遂滅忠憲乃設酒饌紙錢萬貫於資聖寺前送之經年忠憲兩䏶漸瘦又言語倒錯惑亂如失心人更三嵗而卒則知志於報􅄷者亦須詳而後報之出博異志鄆卒唐元和末王師討平鄆汴卒有食鄆士之肉者數嵗暴疾夢其所食卒曰我無宿憾既已殺之又食其肉何不仁也我已訴於上帝矣當還我肉我亦食之徴債足矣汴卒驚覺流汗及曉疼楚宛轉視其身唯皮與骨如人腊一夕斃矣出逸史樂生唐中丞杜式方爲桂州觀察使㑹西原山賊反叛奉詔討捕續令郎中裴某承命招撫及過桂州式方遣押衙樂某并副將二人當直至賔州裴命樂生與副將二人至賊中傳詔命并以書遺其賊帥招令歸復樂生素儒士也有心義既至賊帥黃少卿大喜留讌數日悅樂生之佩刀懇請與之少卿以小婢二人酬其直既復命副將與生不相得遂告于裴云樂某以官軍虚實露于賊帥暱之故贈女口裴大怒遣人搜檢果得樂生具言本末云某此刀價直數萬意頗寶惜以方奉使賊帥求之不得不與彼歸其直二口之價尚未及半某有何過生使氣者辭色頗厲裴君逾怒乃禁於賔州獄以書與式方并牒誣爲大過請必殺之式方以逺鎮制使言其下受賂於賊方將誅剪不得不寘之于法然亦心知其寃樂生亦有狀具言式方遂令持牒追之面約其使曰彼欲逃避汝慎勿禁兼以吾意語之使者至傳式方意樂生曰我無罪寕死若逃之是有罪也既至式方乃召入問之生具述根本式方乃以制使書牒示之曰今日之事非不知公之寃然無路以相救矣如何遂令推訊樂生問推者曰中丞意如何曰中丞以制使之意押衙不得免矣曰中丞意如此某亦奚訴遂索筆通欵言受賊帥贓物之狀式方頗甚憫惻將刑引入曰知公至屈有何事相託生曰無之式方曰公有男否曰一人何職曰得衙前虞候足矣式方便授牒兼贈錢百千文用爲塟具又問所欲曰某自誣死必無逃逸請去桎梏沐浴見妻子囑付家事公皆許至時式方乃登州南門令引出與之訣别樂生沐浴巾櫛樓前拜啓曰某今死矣雖死不已式方曰子怨我乎曰無中丞爲制使所迫耳式方灑泣遂令領至毬場内厚致酒饌飡訖召妻子别問曰買得棺未可速買兼取紙一千張筆十管置棺中吾死當上訴於帝前問監刑者曰今何時曰日中生曰吾日中死至黃昏時便往賔州取副將某乙及明年四月殺制使裴郎中舉頭見執捉者一人乃虞候所由樂曾攝都虞候語之汝是我故吏我今分死矣爾慎無折吾頸若如此我亦死即當殺汝所由至此時亦不暇聽信遂以常法拉其頭殺之然後笞笞畢拽之於外拉者忽驚蹷面仆于地死矣數日賔州報副將以其日黃昏暴心痛終制使裴君以明年四月卒其年十月式方方於毬場宴敕使次飲酒正洽忽舉首瞪目曰樂某汝今何來也我亦無過索酒瀝地祝之良乆又曰我知汝屈而竟殺汝亦我之罪遂瘖不語舁到州及夜而殞至今桂州城南門樂生死所方圓丈餘竟無草生後有從事於桂者視之信然自古寃死者亦多樂生一何神異也出逸史宋申錫唐丞相宋申錫初爲宰相恩渥甚重申錫亦頗以致昇平爲己任時鄭注交通縱放以擅威柄欲除去之乃以友人王璠爲京兆尹密與之約令察注不法將獻其狀擒於京兆府杖殺之既約定璠飜覆小人也以注方爲中貴所愛因欲親厚之乃盡以申錫之謀語焉注因報知右軍不旬日乃僞作申錫之罪狀令人告之云以文字結於諸王圖謀不軌以衣物金寶竒玉爲質且令人倣其手疏皆至逼以獄成於内公卿衆庶無不知其寃也三事已降迭入論之方得謫爲開州司馬至任數月不勝其憤而卒明年有恩詔令歸塟京城至太和元年春其夫人亭午於堂前假寐次見申錫從中門入不覺驚起申錫以手招之乃下階曰且來有少事要令君見便引出城似至滻水北去數里到一墟開見一大坑坑邊有小竹籠及小板匣者數枚皆有封記申錫乃提一示夫人曰此是那賊因憤怒叱吒問曰是誰曰王璠也我得請於上帝矣復詰其餘曰即自知言訖拂然而醒遍身流汗當時言於家人及親屬且以筆記於衣箱中至其年十一月璠果以事腰斬於市同受戮者數人皆同坎埋於城外乃知宋公之神靈爲不誣矣出逸史蜀營典唐蜀將尹偃營有卒晚㸃後數刻不至偃將責之卒被酒自理聲高偃怒杖數十幾至死卒弟爲營典性友愛不平偃乃以刀剓肌作殺尹兩字以墨湼之偃陰知乃以他事杖殺典及太和中南蠻入㓂偃領衆數萬保卭崍關偃膂力絕人常戲左右以􅁄節杖撃其脛隨撃筋脹擁腫恃其力悉衆出關逐蠻數里蠻伏發夾攻之大敗馬倒中數十槍而死初出關時忽見所殺典擁黃案大如轂在前引心甚惡之問左右咸無見者竟死於陣出酉陽雜俎太平廣記卷一百二十二
