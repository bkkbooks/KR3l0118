body:
  text: 太平廣記卷二百三十六奢侈一吳王夫差漢武帝丁緩淋池霍光妻韓嫣袁廣漢霄遊宫沙棠舟趙飛燕郭況漢靈帝石崇王敦魏高陽王雍元琛隋煬帝則天后許敬宗張易之宗楚客安樂公主楊愼交唐睿宗𤣥宗虢國夫人吳王夫差吳王夫差築姑蘇臺三年乃成周環詰屈横亘五里崇飾土木殫耗人力宫妓千人又别立春宵宫為長夜飲造千石酒鍾又作大池池中造青龍舟陳妓樂日與西施為水戲又于宫中作靈舘舘娃閣銅鋪玉檻宫之欄楯皆珠玉飾之出述異記漢武帝漢武帝時身毒國獻連環羈皆以白玉作之瑪瑙石為勒白光琉璃為鞍在闇室中常照十餘丈如晝焉自是長安始盛飾鞍馬競加雕鏤或一馬之飾直百金皆以南海白蜃為珂紫金為花以飾其上猶以不鳴為患或加鈴鑷飾以流蘇走如鐘磬動若飛幡後得貳師天馬當以玫瑰石為鞍鏤以金銀鍮石以綠地五色錦為蔽泥後稍以熊羆皮為之熊毛有綠光皆長三尺者直百金卓王孫闕百餘雙詔使獻二十枚出西京雜記丁緩長安巧工丁緩者為恒滿燈七龍五鳯雜以芙蓉蓮藕之屬又作卧褥香爐又一名被中香爐本出房風其法後絶至媛始更為之設機環轉運四周而爐體常平可置之被褥故取被褥以為名又作九層博山香爐鏤刻為竒禽怪獸窮諸靈異皆能自然運動又作七輪扇其輪大皆徑尺逓相連續一人運之滿堂皆寒凛焉出西京雜記淋池漢昭帝元始元年穿淋池廣千歩中植分枝荷一莖四葉状如駢葢日照則葉低䕃根若葵之衛足也名曰低光荷實如𤣥珠可以飾珮花葉雜萎芬芳之氣徹十餘里食之令人口氣常香益人肌理宫人貴之每遊宴出入皆含咀或剪以為衣或折以蔽日相為戲楚詞謂折芰荷以為衣意在斯也又有倒生菱莖如亂絲一花十葉根浮水上實沉泥裡泥如紫色謂之紫泥菱食之令人不老時命水戲遊宴永日工人進一巨槽帝曰檜楫松舟嫌其重朴況乎此槽豈可得而乘也乃命文梓為舟木蘭為枻刻飛鸞翔鷁飾其船首隨風輕漾畢景忘歸乃至通夜使宫人為歌歌曰商秋素景泛洪波誰云好手折芰荷凉風凄凄揭棹歌雲光開曙月低河萬歲為樂豈為多帝大悦起游商臺于池上及乎末歲諫者多遂省遊蕩奢侈堙毁臺池鸞舟荷芰隨時廢滅今臺址無遺池亦平焉出拾遗錄霍光妻漢霍光妻遺淳于衍蒲桃錦二十匹散花綾二十五匹綾出鉅鹿陳寳光妻傳其法霍顯召入第使作之機用一百二十鑷六十日成一匹直萬錢又與越珠一斛琲綠綾七百端直錢百萬黄金百兩又為起第宅奴婢不可勝數衍猶怨薄曰吾為若何成功而報我若是哉出西京雜記韓嫣韓嫣好彈常以金為丸一日所失者十餘長安為之語曰苦饑寒逐金丸京師兒童每聞嫣出彈輒隨逐之望丸之所落而競拾取焉出西京雜記袁廣漢茂陵富人袁廣漢藏鏹巨萬家童八九百人于北芒山下築園東西四里南北三里引流注其内搆石為山高十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青竒禽怪獸積委其間移沙為洲嶼激水為波潮其中育江鷗海鶴孕雛産鷇延漫林池竒樹異草靡不具植屋徘徊重屬間以修廊行之移晷不能徧也袁廣漢後得罪誅没入官其園鳥獸草木皆移植于上苑中矣出西京雜記霄遊宫漢成帝好㣲行於太液池旁起霄遊宫以漆為柱鋪黑綈之幕器服乘輿皆尚黑色悦于暗行憎燈燭之照宫中之羙御皆服皂衣自班姬以下咸帶𤣥綬衣珮雖加錦繡更以木蘭紗綃罩之至霄遊宫方秉炬燭宴幸既罷靜鼓息罩而歩不揚塵好夕出遊造飛行殿方一丈如今之輦選期門羽林之士負之以趨帝于輦上坐但覺耳中若聞風雷之聲以其疾也一名雲雷宫所行之處咸以氈綈藉地惡車轍馬跡之喧也雖惑于微行䁥宴民無勞怨每乘輿返駕以愛幸之姫寳衣珍食捨于道旁國之窮老皆呼萬歲是以鴻嘉永始之間國富家豐兵戈長戢故劉向谷永竊言指諫于是焚宵遊飛行之殿罷宴逸之樂所謂從繩則直如轉圜焉出拾遺記沙棠舟漢成帝常以三秋暇日與飛燕遊戲太液池以沙棠為舟貴其不沉也以雲母飾于鷁首一名雲舟又刻大桐木為虬龍雕飾如眞𧰼以夾雲舟而行以紫文桂為柂枻每觀雲棹水玩擷菱渠則憂輕蕩以驚飛燕命佽飛之士乃以金鎻䌫雲舟使佽飛于水底引之値輕風時至飛燕殆以風飄颻隨風入水帝以翠纓結飛燕之裾遊倦乃返飛燕後漸見疎常怨恚曰以妾㣲何時復預纓裾之遊漾雲舟于波上􅁘帝為之憮然今液池中尚有成帝避風臺飛燕結裾處出拾遺記趙飛燕趙飛燕為皇后其女弟昭儀在昭陽殿遺飛燕書曰今日佳晨貴姊懋膺洪册上貢三十五條以陳踴躍之至金花紫綸㡌金花紫羅面衣織成下裾同心七寳釵七寳綦履玉環五色文綬鴛鴦褥雲母屏風琉璃屏風雲母七寳扇琥珀枕龜文枕金錯綉襠琉璃瑪瑙彄珊瑚玦黄金歩搖金博山爐七支燈㢠廻風席茆葉席金浦圓璫孔雀扇五明扇九華扇同心梅合枝李三清水香螺巵出南中螺田麝香沉水香九眞黄鴛鴦襦及被出西京雜記郭況漢郭況光武皇后之弟也累金數億家童四百人以金為器皿鑄冶之聲徹于都鄙時人謂郭氏之室不雨而雷言鑄冶之聲盛也于庭中起高閣厝衡石于其上以穪量下有藏金窟列武士衛之錯雜寳以飾臺榭懸明珠于梁棟間光彩射目晝視如星夜望如月里語曰洛陽多錢郭氏萬千都城之富難匹其内寵者皆以玉器盛食故東京謂郭氏家為瓊厨金窟況小心畏愼雖居富勢閉門優游未曽干世為一時所知也出拾遺記後漢靈帝靈帝初平三年于西園起裸遊舘十間採綠苔以被階引渠水以遶砌周流澄澈乘小舟以游􅃞宫人乘之選玉色輕體者以執篙楫搖蕩于渠中其水清淺以盛暑之時使舟覆没視宫人玉色奏招商七言之歌以來凉氣也其歌曰凉風起兮日照渠青荷晝偃葉夜舒唯日不足樂有餘清絃流管歌玉鳬千年萬歲喜難渝渠中植蓮大如葢枝長一丈南國所獻也其葉夜舒晝捲一莖有四蓮叢生名曰夜舒荷亦言日出見葉舒亦名望舒荷帝乃盛夏避暑于裸遊館長夜飲宴帝嘆曰使萬年如此則為上仙矣宫人年二七以上三六以下皆靚粧而解上衣或共裸浴西域所獻茵墀香煮為浴湯宫人以之沐浴浴畢餘汁入渠名曰流香渠又使内監為雞鳴于舘北起雞鳴堂多畜雞每醉樂迷于天曉内閹競作雞鳴以亂眞聲也仍以炬燭投于殿下帝乃驚寤及董卓破京師收其羙人焚其堂舘至魏咸熙中于先帝投燭處溟溟有光如星後人以為神光于此地建屋名曰餘光祠以祈福至魏明之末乃掃除焉出王子年拾遺石崇晉石崇與王愷爭豪晉武帝愷甥也嘗以一珊瑚樹與愷高二尺許枝柯扶疎世間罕比愷以示崇崇視訖舉鐵如意擊碎之應手瓦裂愷甚惋惜又以為嫉巳之寳聲色方厲崇曰不足恨今還卿乃命左右悉取珊瑚樹有高三尺條􅆬絶俗光彩溢目者六七枚如愷比者甚衆愷悵然自失出世説王敦王敦初尚主如厠見漆箱盛乾棗本以塞鼻王謂上厠果食至盡既還婢擎金盆貯水琉璃碗盛澡豆因倒置水中而飲之羣婢莫不掩口出世説新書魏高陽王雍後魏高陽王雍居近清陽門外數里御道西旁洛中之甲第也正光中雍為丞相給羽葆鼓吹虎賁班劍百人貴極人臣富兼山海居第匹于帝宫白壁丹檻􅆼窕連亘飛簷華宇膠葛周通僮僕六千妓女五百隋珠照日羅綺從風自漢晉以來諸王豪侈未之有也出則鳴騶御道文物成行鐃吹競響笳聲哀囀入則歌姫舞女擊筑吹笙而絲管迭奏連宵盡日竹林魚池侔于禁苑芳草如積珍木連隂及雍薨後諸妓女悉令入道或有出家者羙人徐月華善箜篌能為明妃出塞之歌聞者莫不動容永安中與衙將軍原士康為側室士康宅亦近清陽外徐鼓箜篌而歌哀聲入雲行路聽者俄而成市徐常語士康云王有二羙姬一名修容一名艶姿並蛾眉皓齒潔貌傾城修容能為綠水歌艶姿善為逐鳯舞並愛傾後室寵冠諸姫士康聞此常令徐歌綠水文鳯之曲焉出伽藍記元琛後魏王侯外戚公主阻山海之富居川林之饒爭修園宅互相誇競崇門豐室阿戸連房飛館生風重樓起霧高臺芳樹家家而築花林曲池園園而有莫不桃李夏綠竹栢冬青而河間王琛最為豪首常與高陽爭衡造文栢堂如徽音殿置玉井金鑵以五色絲為繩妓女三百人盡皆國色有婢朝雲善吹篪能為團扇歌隴上聲琛為秦州刺史諸羌外叛屢討之不降琛令朝雲假為貧嫗吹篪而乞諸羌聞之悉皆流涕迭相謂曰何為棄墳井在山谷為宼􅁘相率歸降秦民語曰快馬徤兒不如老嫗吹篪琛在秦中多無政績遣使向西域求名馬遠至波斯國得千里馬號曰追風赤次有七百里者十餘皆有名字以銀為槽金為環鎖諸王服其豪富琛嘗語人云晉室石崇乃是庻姓猶能雉頭狐腋畵卵雕薪況我大魏天王不為華侈造迎風舘于後園窗戸之上列錢青瑣玉鳯銜鈴金龍吐斾素奈朱李枝條入簷妓女樓上坐而摘食琛嘗㑹宗室陳諸寳器金瓶銀甕百餘口甌擎盤合稱是其餘酒器有水晶鉢瑪瑙琉璃碗赤玉巵數十枚作工竒妙中土所無皆從西來又陳女樂及諸名馬復引諸王按行庫藏錦罽珠璣冰羅霧縠充積其内琛謂章武王融曰不恨我不見石崇恨石崇不見我融立性貪暴志欲無厭見之歎惋不覺成疾還家卧三日不能起江陽王繼來省疾諭之曰卿之財産應得抗衡何為羡歎以至于此融曰常謂高陽一人寳貨多于融誰知河間瞻之在前繼曰卿欲作袁術之在淮南不知世間復有劉備也及爾朱氏亂後王侯第宅多題為寺宇壽邱里閭列刹相望祇洹鬱起寳塔高壯四月八日京都士女多至河間寺觀其堂廡綺麗無不歎息以為蓬萊仙室亦不是過也出伽藍記隋煬帝煬帝廵狩北邉作大行殿七寳帳容數百人飾以珍寳光輝洞徹引匈奴啓民可汗宴㑹其中可汗恍然疑非人世之有識者云大行殿者不祥之兆也是非王莽輕車之比此寔天心非關人事也出朝野僉載又唐貞觀初天下乂安百姓富贍公私少事時屬除夜太宗盛飾宫掖明設燈燭殿内諸房莫不綺麗后妃嬪御皆盛衣服金翠煥爛設庭燎于階下其明如晝盛奏歌樂乃延蕭后與同觀之樂闋帝謂蕭曰朕施設孰與隋主蕭后笑而不答固問之后曰彼乃亡國之君陛下開基之主奢儉之事固不同矣帝曰隋主何如后曰隋主享國十有餘年妾常侍從見其滛侈隋主每當除夜至歲夜殿前諸院設火山數十盡沈香木根也每一山焚沉香數車火光暗則以甲煎沃之熖起數丈沉香甲煎之香旁聞數十里一夜之中則用沉香二百餘乗甲煎二百石又殿内房中不然膏火懸大珠一百二十以照之光比白日又有明月寳夜光珠大者六七寸小者猶三寸一珠之價直數千萬妾觀陛下所施都無此物殿前所焚盡是柴木殿内所燭皆是膏油但乍覺烟氣薰人寔未見其華麗然亡國之事亦願陛下遠之太宗良乆不言口刺其奢而心服其盛出紀聞則天后則天造明堂于頂上鑄銕為鸑鷟高二丈以金飾之軒軒若飛數年大風吹動猶存其址更鑄銅為大火珠飾以黄金煌煌耀日今見存焉又造天樞于定鼎門並番客胡商聚錢百萬億所成其高九十尺下以鐵山為脚鑄銅為二麒麟以鎮四方上有銅盤徑三丈蛟龍人立兩足捧大火珠望之如日初出鐫文于柱曰大周萬國述德天樞後開元中推倒銅入上方出唐新話許敬宗唐許敬宗奢豪嘗造飛樓七十間令妓女走馬于其上以為戲樂出獨異記張易之張易之為母阿臧造七寳帳金銀珠玉寳貝之𩔖罔不畢萃曠古以來未曾聞見鋪𧰼牙床織犀角簟鼲貂之褥蛩蟁之氈汾晉之龍鬚臨河之鳯翮以為席阿臧與鳯閣侍郎李逈秀私通逼之也以鴛鴦盞一雙共飲取其常相逐逈秀畏其盛嫌其老乃荒飲無度昏醉是務常頻喚不覺出為恒州刺史易之敗阿臧入官逈秀被坐降為衛州長史出朝野僉載宗楚客宗楚客造一宅新成皆是文栢為梁沉香和紅粉以泥壁開門則香氣蓬勃磨文石為階砌及地着吉莫靴者行則仰仆楚客被建昌王推得賍萬餘貫兄弟配流太平公主就其宅看歎曰觀其行坐處我等虚生浪死一年追入為鳯閣侍即景龍中為中書令韋氏之敗被誅出朝野僉載安樂公主洛州昭成佛寺有安樂公主造百寳香爐高三尺開四門綘橋勾欄花草飛禽走獸諸天妓樂麒麟鸞鳯白鶴飛仙絲來線去鬼出神入隱起鈒鏤􅆼窕便娟眞珠瑪瑙琉璃琥珀頗梨珊瑚車渠琬琰一切寳貝用錢三萬庫藏之物盡于是矣出朝野僉載又安樂公主改為悖逆庶人奪百姓莊田造定昆池四十九里直抵南山擬昆明池累石為山以𧰼華岳引水為澗以𧰼天津飛閣歩簷斜牆磴道被以錦繡畵以丹青飾以金銀瑩以珠玉又為九曲流杯池作石蓮花臺泉于臺中流出窮天下之壯麗言之難盡悖逆之敗配入司農每日士女游觀車馬塡咽奉敕輒到者官人解見任凡人決一頓乃止出朝野僉載又安樂公主造百鳥毛裙以後百官百姓家效之山林竒禽異獸搜山蕩谷掃地無遺至于網羅殺獲無數開元中焚寳器于殿前禁人服珠玉金銀羅綺之屬於是採捕乃止出朝野僉載楊愼交景龍中妃主家競為奢侈駙馬楊愼交武崇訓至以油灑地築毬場出國史纂異唐睿宗唐睿宗先天二年正月十四十五十六夜于京師安福門外作燈輪高二十丈被以錦綺飾以金銀燃五萬盞燈俱堅之如花樹宫女千數衣綺羅曵錦繡耀珠翠施香粉一花冠一巾帔皆至萬錢装束一妓女皆至三百貫妙簡長安萬年縣年少婦女千餘人衣服花釵媚子亦稱是於燈下􅂿歌三日夜觀樂之極未始有之出朝野僉載𤣥宗𤣥宗幸華清宫新廣湯池制作宏麗安祿山于范陽以白玉石為魚龍鳬鴈仍為石梁及石蓮花以獻雕鐫巧妙殆非人功上大悦命陳于湯中又以石梁横亘湯上而蓮花纔出于水際上因幸華清宫至其所解衣將入而魚龍鳬鴈皆若奮鱗舉翼状欲飛動上甚恐遽命撤去其蓮花至今猶存又嘗于宫中置長湯屋數十間環㢠廻甃以文石為銀鏤漆船及白香木船置于其中至于楫櫓皆飾以珠玉又于湯中壘瑟瑟及沉香為山以状瀛洲方丈上將幸華清宫貴妃姊妺競飾車服為一犢車飾以金翠間以珠玉一車之費不啻數十萬貫既而重甚牛不能引因復上聞請各乘馬於是競購名馬以黄金為銜䪊組繡為障泥共㑹于國忠宅將同入禁中炳炳照燭觀者如堵自國忠宅至于城東南隅僕御車馬紛紜其間國忠方與客坐于門下指而謂客曰某家起于細㣲因緣椒房之親以至于是吾今未知税駕之所念終不能致令名要當取樂于富貴耳由是驕奢僭侈之態紛然而昩處滿持盈之道矣太平公主玉葉冠虢國夫人夜光枕楊國忠鎻子帳皆稀代之寳不能計其直出明皇雜錄虢國夫人楊貴妃姊虢國夫人恩寵一時大治第宅棟宇之盛舉無與比所居韋嗣立舊宅韋氏諸子方午偃息于堂廡間忽見婦人衣黄羅帔衫降自歩輦有侍婢數十人笑語自若謂韋氏諸子曰聞此宅欲貨其價幾何韋氏降階曰先人舊廬所未忍捨語未畢有工數百人登東西廂撤其瓦木韋氏諸子乃率家童挈其琴書委于路中而授韋氏隙地十數畆其宅一無所酧虢國中堂既成召匠汙鏝授二百萬償其値而復以金盞瑟瑟三斗為賞後曾有暴風拔樹委其堂上已而視之略無所傷既撤瓦以觀之皆乘以木瓦其制作精緻皆此􅁼也虢國每入禁中常乘驄馬使小黄門御紫驄之俊徤黄門之端秀皆冠絶一時出明皇雜録太平廣記卷二百三十六
