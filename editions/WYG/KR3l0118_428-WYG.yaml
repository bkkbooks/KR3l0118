body:
  text: 太平廣記卷四百二十八宋李昉等編虎三裴旻斑子劉薦勤自勵宣州兒笛師張竭忠裴越客盧造裴旻裴旻為龍華軍使守北平北平多虎旻善射嘗一日斃虎三十有一既而於山下四顧自矜有父老至曰此皆彪也似虎而非将軍若遇真虎無能為也旻曰真虎安在老父曰自此而北三十里往往有之旻躍馬而往次叢薄中果有一虎騰出狀小而勢猛據地一吼山石震裂旻馬辟易􅃓矢皆墜殆不得免自此慙懼不復射虎出國史補斑子山魈者嶺南所在有之獨足反踵手足三歧其牝好傅脂粉於大樹空中作窠有木屏風帳幔食物甚備南人山行者多持黄脂鈆粉及錢等以自隨雄者謂之山公必求金錢遇雌者謂之山姑必求脂粉與者能相䕶唐天寶中北客有嶺南山行者多夜懼虎欲上樹宿忽遇雌山魈其人素有輕賫因下樹再拜呼山姑樹中遥問有何貨物人以脂粉與之甚喜謂其人曰安卧無慮也人宿樹下中夜有二虎欲至其所山魈下樹以手撫虎頭曰斑子我客在宜速去也二虎遂去明日辭别謝客甚謹其難曉者毎嵗中與人營田人出田及種餘耕地種植並是山魈穀熟則來喚人平分性質直與人分不取其多人亦不敢取多取多者遇天疫病出廣異記劉薦天寶末劉薦者為嶺南判官山行忽遇山魈呼為妖鬼山魈怒曰劉判官我自遊戲何累於爾乃爾罵我遂於下樹枝上立呼斑子有頃虎至令取劉判官薦大懼策馬而走須㬰為虎所攫坐脚下魈乃笑曰劉判官更罵我否薦大懼左右再拜乞命徐曰可去虎方捨薦薦怖懼幾絶扶歸病數日方愈薦毎向人説其事出廣異記勤自勵漳浦人勤自勵者以天寶末充健兒隨軍安南及擊吐蕃十年不還自勵妻林氏為父母奪志将改嫁同縣陳氏其婚夕而自勵還父母具言其婦重嫁始末自勵聞之不勝忿怒婦宅去家十餘里當破吐蕃得利劒是晚因仗劒而行以詣林氏行八九里屬暴雨天晦進退不可忽遇電明見道左大樹有旁孔自勵權避雨孔中須臾復去自勵聞有人呻唫徑前捫之即婦人也自勵問其為誰婦人云已是林氏女先嫁勤自勵為妻自勵從軍未還父母無状見逼改嫁以今夕成親我心念舊不肯再嫁憤恨莫已遂持巾於宅後桑林自縊為虎所取幸而遇君今猶未損倘能相救當有後報自勵謂曰我自勵也曉還至舍父母言君適人故仗劒而來相訪何期於此相遇乃相持而泣頃之虎至初大吼呌然後倒身入孔自勵以劍揮之虎腰中斷恐又有虎故未敢出尋而月明後果一虎至見其偶斃吼呌愈甚自爾復倒入又為自勵所殺乃負妻還家今尚無恙出廣異記宣州兒天寶末宣州有小兒其居近山毎至夜恒見一鬼引虎逐已如是已十數度小兒謂父母云鬼引虎來則必死世人云為虎所食其鬼為倀我死為倀必矣若虎使我則引來村中村中宜設穽於要路以待虎可得也後數日果死於虎久之見夢於父云身已為倀明日引虎來宜於西偏速修一穽父乃與村人作穽穽成之日果得虎出廣異記笛師唐天寶末祿山作亂潼闗失守京師之人於是烏散棃園子弟有笛師者亦竄於終南山谷中有蘭若因而寓居清宵朗月哀亂多思乃援笛而吹嘹唳之聲散漫山谷俄而有物虎頭人形著白袷單衣自外而入笛師驚懼下堦愕眙虎頭人曰美哉笛乎可復吹之如是累奏五六曲曲終久之忽寐乃咍嘻大鼾師懼覺乃抽身走出得上髙樹枝葉隂密能蔽人形其物覺後不見笛師因大懊歎云不早食之被其逸也乃立而長嘯須㬰有虎十餘頭悉至狀如朝謁虎頭云適有吹笛小兒乗我之寐因而奔竄可分路四逺取之言訖各散去五更後復來皆人語云各行四五里求之不獲會月落斜照忽見人影在髙樹上虎顧視笑曰謂汝雲行電滅而乃在兹遂率諸虎使皆取攫既不可及虎頭復自跳身亦不至遂各散去少間天曙行人稍集笛師乃得隨還出廣異記張竭忠天寶中河南緱氏縣東太子陵仙鶴觀常有道士七十餘人皆精専修習法籙齋戒咸備有不専者不之住矣常毎年九月三日夜有一道士得仙已有舊例至旦則具姓名申報以為常其中道士毎年到其夜皆不扄户各自獨寝以求上昇之應後張竭忠攝緱氏令不信至時乃令二勇士持兵器潛覘之初無所覩至三更後見一黒虎入觀來須㬰啣出一道士二人射之不中虎棄道士而去至明無人得仙者具以此物白竭忠申府請􅃓矢大獵於太子陵東石穴中格殺數虎有金簡玉籙洎冠帔及人之髪骨甚多斯皆謂毎年得仙道士也自後仙鶴觀中即漸無道士今並休廢為陵使所居出博異記裴越客唐乾元初吏部尚書張鎬貶扆州司户先是鎬之在京以次女徳容與僕射裴冕第三子前藍田尉越客結婚為己尅迎日而鎬左遷遂改期來嵗之春季其年越客則速装南邁以畢嘉禮春仲拒扆百里鎬知其将至矣張斥在逺方抱憂惕深嘉越客遵約而至因命家族宴於花園而徳容亦隨姑姨妹遊焉山郡蕭條竹樹交密日暮衆将歸或後或先紛紜笑語忽有猛虎出自竹間遂擒徳容跳入翳薈衆皆驚駭奔告張夜色已昏計力俱盡舉家號哭莫知所為及曉則大發人徒求骸骨於山野間週廻逺近曾無蹤跡由是夕之前夜越客行舟去郡三二十里尚未知其妻之為虎暴乃召僕夫十數軰登㟁徐行而船亦隨焉不二三里遇水次板屋屋内有榻因掃拂即之憇焉僕從羅列於前後俄聞有物來自林木之間衆乃静伺微月之下忽見猛虎負一物至衆皆惶撓則共闞喝之仍大擊板屋并物其虎徐行尋俯於板屋側留下所負物遂入山間共窺㸔云是人尚有餘喘越客即令舁之登舟因促使解纜然後船中烈燭熟視乃是十六七美女也容貎衣服固非村間之所有越客深異之則遣羣婢看診之雖髻被散衣破服裂而身膚無少損羣婢漸以湯飲灌之即能微微入口久之神氣安集俄復開目與之言語莫肯應夜久即有自郡至者皆云張尚書次女昨夜遊園為暴虎所食至今求其殘骸未獲聞者遂以告之於越客即遣羣婢具以此詢徳容因號啼不止越客既登㟁遂以其事列於鎬鎬凌晨躍馬而至既悲且喜遂與同歸而婚媾果諧其期自是黔峽往往建立虎媒之祠焉今尚有存者出集異記盧造汝州葉縣令盧造者有幼女大歴中許嫁同邑鄭楚之子元方俄而楚録潭州軍事造亦辭而寓葉後楚卒元方䕶䘮居江陵數年間音問兩絶縣令韋計為子娶焉其吉辰元方無所容徑往縣東十餘里佛舍舍西北隅有若小獸號鳴者出火視之乃三虎雛目尚未開以其小未能害人且不忍殺閉門堅拒而已約三更初虎來觸其門不得入其西有窗亦甚堅虎怒搏之櫺折陷頭於中為左右所轄進退不得元方取佛塔磚擊之虎吼怒拏攫終莫能去連擊之俄頃而斃既而門外若女人呻唫氣甚困劣元方問曰門外呻唫者人耶鬼耶曰人也曰何以到此曰妾前盧令女也今夕將適韋氏親迎方登車為虎所執負荷而来投此今夕無損而又畏其復來能救乎元方竒之執炬出視乃真衣纓也年十七八禮服儼然泥水皆澈扶入復固其門遂拾佛塔毁像以繼其明女曰此何處也曰縣東佛舍爾元方言姓名且話舊諾女亦能記之曰妾父曾許妻君一旦以君之絶耗也將嫁韋氏天命難改虎送歸君荘去此甚近君能送歸請絶韋氏而奉巾櫛及明送歸其家其家以虎攫去方將制服忽見其來喜若天降元方致虎於縣且具言其事縣宰異之以盧氏歸於鄭焉當時聞者莫不嗟異之出續元怪錄太平廣記卷四百二十八
