body:
  text: 太平廣記卷一百三十四報應三十三竹永通宜城民韋慶植趙太李信謝氏王珍王㑹師解奉先童安玗劉自然李明府劉鑰匙上公施汴公乗通僧審言竹永通隋并州盂縣竹永通曾貸寺家粟六十石年久不還索之云還訖遂于佛堂誓言云若實未還當與寺家作牛此人死後寺家生一黃犢足有白文後漸分明仍是竹永通字鄉人漸知觀者日數千此家已知遂用粟百石于寺贖牛别立一屋事之如生仍為造像寫經月餘遂死出異録宜城民隋大業八年宜州城東南里民姓皇甫其家兄弟四人大兄小弟並皆勤事生業其第二弟名遷交遊惡友不事生活母嘗取錢欲令市買且置牀上母向舍後遷從外來入堂不見人便偷錢去母還覓錢不得遂勘合家良賤並云不知母怒悉加鞭捶大小皆怨至後年遷亡其家猪生一㹠子八月社至賣與逺村社家遂託夢于婦曰我是汝夫為盜取婆錢枉及合家浪受楚拷今我作猪來償債將賣與社家縛我欲殺汝是我婦何忍不語男女贖我婦初夢忽寤仍未信之復眠其夢如初因起報姑姑曰吾夢亦如之遲明令兄齎錢詣社官収贖之後二年方死長安𢎞法寺静琳師是遷之隣里親見其猪嘗話其事焉出法苑珠林韋慶植唐貞觀中魏王府長史韋慶植有女先亡韋夫婦痛惜之後二年慶植將聚親賓客備食家人買得羊未殺夜慶植妻夢見亡女著青練裙白衫頭髪上有一雙玉釵是平生所服者來見母涕泣言昔常用物不語父母坐此業報今受羊身來償父母命明旦當見殺青羊白頭者是特願慈恩垂乞性命母驚寤旦而自徃觀果有青羊項膊皆白頭側有兩條白相當如玉釵形母對之悲泣止家人勿殺待慶植至放送之俄而植至催食㕑人白言夫人不許殺青羊植怒即令殺之宰夫懸羊欲殺賓客數人已至乃見懸一女子容貌端正訴客曰是韋長史女乞救命客等驚愕止宰夫宰夫懼植怒但見羊鳴遂殺之既而客坐不食植怪問之客具以言慶植悲痛發病遂不起京下士人多知此事出法苑珠林趙太唐長安市里風俗毎至歲元日已後遞飲食相邀號為傳坐東市筆生趙太次當設之有客先到向後見其碓上有童女年十三四著青衫白帽以急索繫頸屬于碓柱泣淚謂客曰我主人女也徃年未死時盜父母錢欲買脂粉未及而死其錢今在舍㕑内西北角壁中然我未用既以盜之坐此得罪今當償父母命言畢化為青羊白頭客驚告主人主人問其形貌乃是小女死已二年矣于㕑壁取得錢似久安處於是送羊僧寺合門不復食肉出法苑珠林李信唐居士李信者并州文水縣之太平里人也身為隆政府衞士至顯慶年冬隨例徃朔州赴審乗赤草馬一匹并將草駒是時歲晚凝隂風雪嚴厚行十數里馬遂不進信以程期逼促撾之數十下馬遂作人語語信曰我是汝母為生平避汝父將石餘米與女故獲此報此駒即是汝妹也以力償債向了汝復何苦敦逼如是信聞之驚愕流涕不能自勝乃拜謝之躬弛鞍轡謂曰若是信母當自行歸家馬遂前行信負鞍轡隨之至家信兄弟等見之悲哀相對别為厰櫪養飼有同事母屈僧營齋合門莫不精進鄉閭道俗咸歎異之時工部侍郎孫無隱岐州司司法張金庭為丁艱在家聞而竒之故就信家顧訪見馬猶在問其由委並如所傳出㝠報拾遺謝氏唐雍州萬年縣閻村即灞渭之間也有婦女謝適周縣元氏有女適迴龍村人來阿照謝氏永徽末亡龍朔元年八月託夢于來氏女曰我生時酤酒小作升乃取價太多量酒復少今坐此罪於北山下人家為牛近被賣與法界寺夏侯師今將我向城南耕稻田非常辛苦及寤其女涕泣為阿照言之至二年正月有法界寺尼至阿照村女乃問尼尼報云有夏侯師是實女即就寺訪之云近於北山下買得一牛見在城南耕地其女涕泣求請寺尼乃遣人送其女就之此牛平常唯一人禁制若遇餘人必陸梁觝觸見其女至乃䑛其遍體又流淚焉女即日就夏侯師贖之乃隨其女去今現在阿照家養飼女常為阿娘承奉不闕京師王侯妃媵多令召視競施財物出㝠報記王珍唐定州安嘉縣人王珍能金銀作曾與寺家造功德得絹五百疋同作人私費十疋王珍不知此人死後王家有禮事買羊未殺間其羊頻跪無數珍已怪之夜繫于柱珍將寢有人扣房門甚急看之無所見珍復卧又聞之起看還無所見怪之遂開門卧未睡見一人云昔日與公同作功德偷十疋絹私用公竟不知今已作羊公將殺之叩頭乞命再三懇苦言訖出房門即變作羊王珍妹于别所見此人叩頭一如珍所見遂放羊作長生珍及妹家即斷食肉珍以咸亨五年入海運船上無菜人皆食肉珍不食唯飡空飯而已出廣古今五行記王㑹師唐京都西市北店有王㑹師者母亡服制已畢其家乃産一青黃牝狗㑹師妻為其盜食乃以杖擊之數下狗遂作人語曰我是汝姑新婦杖我大錯我為嚴酷家人過甚遂得此報今既􅀍打羞向汝家因即走出㑹師聞而涕泣抱以歸家而復還去凡經四五㑹師見其意正乃于市北已店大牆後作小舍安置毎日送食市人及行客就觀者極衆投餅與者不可勝數此犬恒不離此舍過齋時即不食經一二歲莫知所之出法苑珠林解奉先洛陽畫工解奉先為嗣江王家畫像壁未畢而逃及見擒乃妄云功直已相當因于像前誓曰若負心者願死為汝家牛歲餘奉先卒卒後王家牸牛産一騂犢有白毛於背曰解奉先觀者日夕如市焉出國史異纂童安玗唐大中末信州貴溪縣乳口鎭有童安玗者鄉里富人也初甚貧窶與同里人郭珙相善珙嘗假借錢六七萬即以經販安玗後遂豐富及珙徵所借錢安玗拒諱之珙焚香告天曰童安玗背惠忘義借錢不還倘神理難誣願安玗死後作牛以償某詞甚懇苦安玗亦紿言曰某若實負郭珙錢願死作一白牛以償珙債未逾月安玗死死後半年珙家牸牛生一白牯犢左肋有黑毛作字曰童安玗厯厯然逺邇聞之觀者雲集珙遣人告報安玗妻玗妻子并親屬等徃視之大以為恥厚納金帛請収贖之郭珙憤其欺負終不允許以牛母并犢别欄餵飼安玗家率童僕持白挺刼取珙多置人守禦竟不能獲出報應録劉自然唐天祐中秦州有劉自然者主管義軍按因連帥李繼宗㸃鄉兵捍蜀城紀縣百姓黃知感者妻有美髮自然欲之謂知感曰能致妻髮即免是行知感之妻曰我以弱質託於君髮有再生人死永訣矣君若南征不返我有美髮何為焉言訖攬髮剪之知感深懐痛愍既迫于差㸃遂獻于劉知感竟亦不免繇戍㝷殁于金沙之陣黃妻晝夜禱天號訴是歲自然亦亡後黃家牝驢忽産一駒左脇下有字云劉自然邑人傳之遂達于郡守郡守召其妻子識認劉自然長子曰某父平生好飲酒食肉若能飲啖即是某父也驢遂飲酒數升啖肉數臠食畢奮迅長鳴淚下數行劉子請備百千贖之黃妻不納日加鞭捶曰猶足以報吾夫也後經喪亂不知所終劉子竟慚憾而死出儆戒録李明府唐火井縣令李明府經過本縣館于押司録事私第主人將設酒饌欲刲一白羊方有胎其夜明府夢一素衣婦人將二子拜明府乞命詞甚哀切李不測其由云某不曾殺人婦人哀祈不已李睡覺思惟無端倪又寢復夢前婦人乞命稱某命在須臾忍不救也李竟不諭其意但驚怛不已再寢又夢前婦人曰長官終不能相救某已死訖然亦償債了某前身即押司録事妻有女僕方妊身懐二子時某嫉妬因笞殺之紿夫云女僕盜金釵并盒子拷訊致斃今獲此報然已還其寃債其金釵并盒子在堂西栱枓内為某告於主人請不食其肉為作功德李驚起召主人詰曰君刲一白羊耶有雙羔否曰是具話夜來之夢更歎異及㝷栱枓内果得二物乃取羊埋之為作功德追薦焉出報應録劉鑰匙隴右水門村有店人曰劉鑰匙者不記其名以舉債為家業累千金能於規求善聚難得之貨取民間資財如秉鑰匙開人箱篋帑藏盜其珠珍不異也故有鑰匙之號隣家有殷富者為鑰匙所餌放債與之積年不問忽一日執劵而算之即倍數極廣既償之未畢即以年繫利畧無期限遂至資財物産俱歸鑰匙負債者怨之不已後鑰匙死彼家生一犢有鑰匙姓名在膁肋之間如毫墨書出乃為債家鞭箠使役無完膚鑰匙妻男廣以重貨購贖之置于堂室之内事之如生及斃則棺斂葬之于野葢與劉自然之事髣髴矣此則報應之道其不誣矣出玉堂閒話上公宜春郡東安仁鎭有齊覺寺寺有一老僧年九十餘門人弟子有一二世者彼俗皆只呼為上公不記其法名也其寺常住莊田孳畜甚多上公偶一夜夢見一老姥衣青布之衣拜辭而去云只欠寺内錢八百上公覺而異之遂自取筆書于寢壁同住僧徒亦無有知之者不三五日後常住有老牸牛一頭無故而死主事僧於街市鬻之只酬錢八百如是數處不移前價主事僧具白上公云常住牛死欲貨之屠者數輩皆酧價八百上公歎曰償債足矣遂令主事僧入寢所讀壁上所題處無不嗟歎出玉堂閒話施汴廬州營田吏施汴嘗恃勢奪民田數十頃其主退為其耕夫不能自理數年汴卒其田主家生一牛腹下有白毛方數寸既長稍斑駁不逾年成施汴字㸃畫無缺道士邵修黙親見之出稽神錄公乗通渚宫有民公乗通者平生隱慝人或難知死後湖南民家生一黑驢駒白毛作荆南公乗通字其子孫聞之懐恥竟不能㝷贖江陵人皆知之出北夢瑣言僧審言雲頂山慈雲寺四方歸輳供食者甚厚寺主僧審言性貪鄙欺隱本寺施財飲酒食肉畜養妻子無所不為僧衆稍孤潔者必遭凌辱一旦疾篤自言見空中繩懸一石臼有鼠囓之繩斷正中其心大呌氣絶久而復蘇如此數十度方卒逾年寺下村中牛生一犢腹下分明有審言二字出儆戒録太平廣記卷一百三十四
