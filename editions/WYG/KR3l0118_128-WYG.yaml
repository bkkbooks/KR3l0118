body:
  text: 太平廣記卷一百二十八報應二十七公孫綽王安國尼妙寂李文敏樊宗諒滎陽氏公孫綽唐王屋主簿公孫綽到官數月暴疾而殞未及葬縣令獨在㕔中見公孫具公服從門而入驚起曰與公幽顯異路何故相干公孫曰某有􅁈要見長官請雪嘗忝僚佐豈遽無情某命未合盡爲奴婢所厭以利盜竊某宅在河陰縣長官有心儻爲宻選健吏齎牒往捉必不漏網宅堂􅉉從東第七瓦壠下有某形狀以桐爲之釘布其上已變易矣言訖而沒令異甚乃擇彊卒素爲綽所厚者持牒并書與河隂宰其奴婢盡捕得遂於堂簷上搜之果獲人形長尺餘釘遶其身木漸爲肉撃之啞然有聲綽所貯粟麥以俟閒居之費者悉爲所盜矣縣遂申府奴婢數人皆殪枯木出逸史王安國涇之北鄙農人有王安國者力穡衣食自給唐寳厯三年冬夜有二盜踰牆而入皆執利刃安國不敢支梧而室内衣裘挈之無孑遺安國一子名何七年甫六七嵗方眠驚起因呌有賊登時爲賊射應弦而斃安國閭外有二驢紫色者亦爲攘去遲明村人集聚共商量捕逐之路俄而何七之魂登房門而號我死自是命那復多痛所痛者永訣父孃耳遂寃泣乆之鄰人㑹者五六十人皆爲雪涕因曰勿謀追逐明年五月當自送死乃召安國附耳告之名氏仍期勿洎麥秋安國有麥半頃方收拾晨有二牛來蹊踐狼藉安國牽歸遍謂里中曰誰牛傷暴我苖我已繫之牛主當齎償以購不爾吾將詣官焉里中共往皆曰此非左側人之素畜者聚視乆之忽有二客至曰我牛也昨暮驚逃不虞至此所損之田請酬倍資而歸我畜焉共里人詰所從因驗契書其一乃以紫驢交致也安國即醒何七所謂及詢名姓皆同遂縳之曰爾即去冬射我子盡我財者二盜相顧不復隱曰天也命也死不可逭也即􅄒其故曰我既行劫殺遂北竄寧慶之郊謂事已積乆因買牛將歸岐上昨牛扺村北二十里徘徊不進俟夜黑方將過此既寐夢一小兒五嵗許裸形亂舞紛紜相迷經宿方寤及覺二牛之縻紖不斷如被解脫則已竄矣因蹤跡之田徑來至此去冬之冦詎敢逃焉里人送邑皆准於法出集異記尼妙寂尼妙寂姓葉氏江州潯陽人也初嫁任華潯陽之賈也父昇與華往復長沙廣陵間唐貞元十一年春之潭州不復過期數月妙寂忽夢父被髮裸形流血滿身泣曰吾與汝夫湖中遇盜皆已死矣以汝心似有志者天許復讐但幽𡨕之意不欲顯言故吾隱語報汝誠能思而復之吾亦何恨妙寂曰隱語云何昇曰殺我者車中猴門東草俄而見其夫形狀若父泣曰殺我者禾中走一日夫妙寂撫膺而哭遂爲女弟所呼覺泣告其母闔門大駭念其隱語杳不可知訪於鄰叟及鄉閭之有知者皆不能解秋詣上元縣舟檝之所交處四方士大夫多憇焉而又邑有瓦棺寺寺上有閣倚山瞰江萬里在目亦江湖之極境遊人弭棹莫不登眺吾將緇服其間伺可問者必有醒吾惑者於是褐衣上元捨力瓦棺寺日持箕帚灑掃閣下閒則徙倚欄檻以伺識者見高冠博帶吟嘯而來者必拜而問居數年無能辨者十七年嵗在辛巳有李公佐者罷嶺南從事而來􅄃衣登閣神彩雋逸頗異常倫妙寂前拜泣且以前事問之公佐曰吾平生好爲人解疑况子之寃懇而神告如此當爲子思之默行數步喜招妙寂曰吾得之矣殺汝父者申蘭殺汝夫者申春耳妙寂悲喜嗚咽拜問其說公佐曰夫猴申生也車去兩頭而言猴故申字耳草而門門而東非蘭字耶禾中走者穿田過也此亦申字也一日又加夫葢春字耳鬼神欲惑人故交錯其言妙寂悲喜若不自勝乆而掩涕拜謝曰賊名既彰雪寃有路茍或釋惑誓報深恩婦人無他唯潔誠奉佛祈増福海初泗州普光王寺有梵氏戒壇人之爲僧者必由之四方輻輳僧尼䌓會觀者如市焉公佐自楚之秦維舟而往觀之有一尼眉目朗秀若舊識者毎過必凝視公佐若有意而未言者乆之公佐將去其尼遽呼曰侍御貞元中不爲南海從事乎公佐曰然然則記小師乎公佐曰不記也妙寂曰昔瓦棺寺閣求解車中猴者也公佐悟曰竟獲賊否對曰自悟夢言乃男服易名士寂泛傭於江湖之間數年聞蘄黃之間有申村因往焉流轉周星乃聞其村西北隅有名蘭者默往求傭輒賤其價蘭喜召之俄又聞其從父弟有名春者於是勤恭執事晝夜不離見其可爲者不顧輕重而爲之未嘗待命蘭家器之晝與羣傭苦作夜寢他席無知其非丈夫者逾年益自勤幹蘭逾敬念視士寂即自視其子不若也蘭或農或商或畜貨於武昌關鏁啓閉悉委焉因驗其櫃中半是已物亦見其父及夫常所服者垂涕而記之而蘭春叔出季處未嘗偕出慮其擒一而驚逸也銜之數年永貞年重陽二盜飲既醉士寂奔告于州乗醉而獲一問而辭伏就法得其所喪以歸盡奉母而請從釋教師洪州天宮寺尼洞微即昔時受教者也妙寂一女子也血誠復讐天亦不奪遂以夢寐之言獲悟於君子與其讐者得不同天碎此微軀豈酬明哲梵宇無他唯䖍誠法象以報効耳公佐大異之遂爲作傳太和庚戍嵗隴西李復言遊巴南與進士沈田㑹於蓬州田因話竒事持以相示一覽而復之録怪之日遂纂於此焉出續幽怪録李文敏唐李文敏者𨕖授廣州録事參軍將至州遇冦殺之沈於江俘其妻崔氏有子五嵗隨母而去賊即廣州都虞候也其子漸大令習明經甚聰俊詣京赴舉下第乃如華州及渭南縣東馬驚走不可制及夜入一莊中遂投莊宿有所衣天淨紗汗衫半臂者主嫗見之曰此衣似頃年夫人與李郎送路之衣郎既似李即復似小娘子取其衣視之乃頃嵗製時爲燈燼燒破半臂帶猶在其家遂以李文敏遭冦之事説之此子罷舉徑歸問母具以其事對乃白官官乃擒都虞候縶而詰之所告一詞不謬乃誅之而給其物力令歸渭南焉出聞竒録樊宗諒唐樊宗諒爲宻州刺史時屬邑有羣盜提兵入邑甿殷氏家掠奪金帛殺其父子死者三人刺史捕之甚急月餘不獲有鉅鹿魏南華者寓居齊魯之間家甚貧宗諒命攝司法掾一夕南華夢數人皆被髮列訴於南華曰姓殷氏父子三人俱無罪而死願明公雪其寃南華曰殺汝者爲誰對曰某所居東十里有姓姚者乃賊之魁也南華許諾驚寤數日宗諒謂南華曰盜殺吾甿且一月矣莫窮其跡豈非吏不奉職乎爾爲司法官第往驗之南華馳往未至忽見一狐起於路旁深草中馳入里人姚氏所居譟而逐者以百數其狐入一穴中南華命以鍤發之得金帛甚多乃羣盜劫殷氏財也即召姚氏子訊其所自目動詞訥即收劾之果盜之魁也自是盡擒其支黨且十輩其狐雖匿於穴中窮之卒無所見也豈非寃魂之所假歟時太和中也出宣室志滎陽氏唐盈川令將之任夜止屬邑古寺方寢見老嫗以桐葉蒙其首傴僂而前令以拄杖拂其葉嫗俯拾而去俄亦復來如是者三乆之不復來矣頃有縗裳者自北戸升階褰簾而前曰將有告於公公無懼焉令曰是何妖物曰實鬼也非妖也以形容衰瘵不敢干謁向者竊令張妳少達幽情而三遭拄扙之辱老妳固辭恥其復進是以自往哀訴冀不逢怒焉某滎陽氏子嚴君牧此州未逾年鍾家禍乃䕶喪歸洛夜止此寺繼母賜野葛花湯并室妹同夕而斃張妳將哭首碎鐵鎚同瘞於北牆之竹陰某隴西先夫人即日訴於上帝帝敕云爲人之妻已殘戮僕妾爲人之母又毒殺孤嬰居闇室事難彰明在天鑒理宜誅殛以死酬死用謝諸孤付司命處置訖報是日先君復訴於上帝云某遊魂不靈乖於守慎致令嚚室害及孤孩彰此家風黷于天聽豈止一死能謝罪名某三任縣令再剖符竹實有能績以安黎甿豈圖餘慶不流見此狼狽悠揚丹旐未越屬城長男既已無辜孀婦又俾酬死念某旅櫬難爲瘞埋伏乞延其生命使某得歸葬洛陽獲祔先人之塋闕某無恨矣明年繼母到洛陽發背疽而卒上帝譴怒已至如此今某即無怨焉所苦者被僧徒築溷於骸骨之上糞􅁾之弊所不堪􅃘况妹爲厠神姬僕身爲厠神役夫積世􅆪纓一日陵墜天門阻越上訴無階藉公仁徳故來奉告令曰吾將奈何答曰公能發某朽骨沐以蘭湯覆以衣衾遷於高原之上脫能賜木皮之棺蘋藻之奠亦望外也令曰諾乃吾反掌之易爾鬼嗚咽再拜令張妳宻召鸞娘子同謝明公張妳遽至疾呼曰郭君怒晚來軒屏狼藉已三召矣於是縗裳者倉皇而去明旦令召僧徒具以所告遂命土工發溷以求之三四尺乃得骸骨與改瘞焉闕太平廣記巻一百二十八
