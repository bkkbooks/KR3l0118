body:
  text: 太平廣記卷四百三十宋李昉等編虎五李奴馬拯張昇楊真王居貞歸生鄭思逺李琢譙本李奴詞舉人姓李忘其名寄居宣州山中常使一奴奴頗慵惰李數鞭笞多有忿恨唐元和九年李與二友人㑹於别墅時呼奴奴已睡李大怒鞭之數十奴懐恚恨出謂同儕曰今是閏年人𫝊多虎何不食我言訖出門忽聞呌聲奴輩尋逐無所見循虎跡十餘里谿邉奴已食訖一半其衣服及巾鞋皆疊摺置於草上盖虎能役使所殺者魂神所為也出原化記馬拯唐長慶中有處士馬拯性沖淡好尋山水不擇嶮峭盡能躋攀一日居湘中因之衡山祝融峰詣伏虎師佛室内道塲嚴潔果食馨香兼列白金皿于佛榻上見一老僧眉毫雪色朴野魁梧甚喜拯來使僕挈囊僧曰假君僕使近縣市少鹽酪拯許之僕乃挈金下山去僧亦不知去向俄有一馬沼山人亦獨登此來見拯甚相慰悦乃告拯曰適來道中遇一虎食一人不知誰氏之子説其服飾乃拯僕夫也拯大駭沼又云遥見虎食人盡乃脱皮改服禪衣為一老僧也拯甚怖懼及沼見僧曰只此是也拯白僧曰馬山人來云某僕使至半山路已被虎傷奈何僧怒曰貧道此境山無虎狼草無毒螫路絶蛇虺林絶鴟鴞無信妄語耳拯細窺僧吻猶帶殷血向夜二人宿其食堂牢扄其户明燭伺之夜已深聞庭中有虎怒首觸其扉者三四賴户壯而不隳二子懼而焚香䖍誠叩首於堂内土偶賔頭盧者良久聞土偶吟詩曰寅人但溺欄中水午子須分艮畔金若教特進重張弩過去將軍必損心二子聆之而解其意曰寅人虎也欄中即井午子即我耳艮畔金即銀皿耳其下兩句未能解及明僧叩門曰郎君起來食粥二子方敢啟闗食粥畢二子計之曰此僧且在我等何由下山遂詐僧云井中有異使窺之細窺次二子推僧墮井其僧即時化為虎二子以巨石鎮之而斃矣二子遂取銀皿下山近昏黒而遇一獵人於道旁張窩弓樹上為棚而居語二子曰無觸我機兼謂二子曰去山下猶逺諸虎方暴何不且上棚來二子悸怖遂攀縁而上將欲入定忽三五十人過或僧或道或丈夫或婦女歌唫者戲舞者前至窩􅃓所衆怒曰朝來被二賊殺我禪和方今追捕之又敢有人張我將軍遂發其機而去二子並聞其説遂詰獵者曰此是倀鬼被虎所食之人也為虎前呵道耳二子因徴獵者之姓氏曰名進姓牛二子大喜曰土偶詩下句有驗矣特進乃牛進也將軍即此虎也遂勸獵者重張其箭獵者然之張畢登棚果有一虎哮吼而至前足觸機箭乃中其三斑貫心而踣逡廵諸倀奔走却回伏其虎哭甚哀曰誰人又殺我將軍二子怒而叱之曰汝輩無知下鬼遭虎齧死吾今為汝報仇不能報謝猶敢慟哭豈有為鬼不靈如是遂悄然忽有一鬼答曰都不知將軍乃虎也聆郎君之説方大醒悟就其虎而罵之感謝而去及明二子分銀與獵者而歸耳出傳竒張昇唐故吏部員外張昇隨僖宗幸蜀以年少未舉遂就攝涪州衙推州司差里正游章當直他日遂告辭問何往章不答但云有老母及妻男乞時為存問言訖而去所居近隣夜聞章家大哭翌日使問其由言章夜辭其家入山變為虎矣二三日又聞章家大驚呌翌日又問其故曰章昨夜思家而歸自上半身已變而尚能語出聞竒録楊真鄴中居人楊真者家富平生癖好畫虎家由甚多虎毎坐卧必欲見之後至老年盡令家人毁去所畫之虎至年九十忽卧疾召兒孫謂之曰我平生不合癖好畫虎我好之時見畫虎則喜不見則不樂我毎夢中多與羣虎游我不欲言於兒孫輩至晚年尤甚至於縱歩遊賞之處往往見虎及問同遊人又不見我方恐懼尋乃盡毁去所畫之虎今卧疾後又夢化身為虎兒又夢覺既久而方復人身我死之後恐必化為虎兒孫軰遇虎慎勿殺之其夕卒家方謀塟其尸忽化為虎跳躍而出其一子逐出觀之其虎回趕其子食之而去數日忽家人夜夢真歸謂家人曰我已為虎甚是安健但離家時便得一人食之至今猶不饑至曙家之人疑不識其子而食之述於隣里有識者曰今為人即識人之父子既化虎又何記為人之父也夫人與獸豈不殊耶若為虎尚記前生之事人奚不記前生之事也人尚不記前生足知獸不靈於人也出瀟湘記王居貞明經王居貞者下第歸洛之潁陽出京與一道士同行道士盡日不食云我咽氣術也毎至居貞睡後燈滅即開一布囊取一皮披之而去五更復來他日居貞佯寢急奪其囊道士叩頭乞居貞曰言之即還汝遂言吾非人衣者虎皮也夜即求食於村鄙中衣其皮即夜可馳五百里居貞以離家多時甚思歸曰吾可披乎曰可也居貞去家猶百餘里遂披之暫歸夜深不可入其門乃見一豬立於門外擒而食之逡廵回乃還道士皮及至家云居貞之次子夜出為虎所食問其日乃居貞回日自後一兩日甚飽並不食他物出傳竒歸生𢎞文學士歸生亂後家寓巴州遣使入蜀早行遇虎於道遂昇木以避數虎迭來攫躍取之不及虎相謂曰無過巴西縣黄二郎也一虎乃去俄有白狸者至視其人而哮吼攫躍使人昇木愈髙既皆不得環而守之移時有羣騾撼鈴聲遂各散使人至巴西果有黄二郎者乃巴西吏人為虎所食也出聞竒録鄭思逺虎交而月暈仙人鄭思逺嘗騎虎故人許𨼆齒痛求治鄭曰唯得虎鬚及熱揷齒間即愈乃㧞數莖與之因知虎鬚治齒也虎殺人能令尸起自解衣方食之虎威如一字長一寸在脇兩傍皮内尾端佩之者臨官使無官人所憎疾虎夜視一目放光一目㸔物獵人候而射之光墜入地成白石主小兒驚出酉陽雜爼李琢許州西三四十里有雌虎暴損人不一統軍李琢聞之驚怪其視事日厲聲曰忠武軍十萬豈無勇士有壮夫跳躍曰某能除琢壮其言給利器壮夫請不用􅃓刀只要一大白棒壮夫徑詣榛塢㝷之果得其穴也其虎已出唯三子眼欲開壮夫初不見其母欲回度琢必不信遂抱持三子至其家藏之入白於琢琢見空手來訝之曰已取得伊三兒琢聞驚異果取到大賞賚之給廩帛加軍職曰嘗聞不探虎穴焉得虎子此夫是也壮夫竟除其巨者不復更有虎暴出芝田録譙本偽蜀建武四五年間有百姓譙本者兇率人也不孝不義隣里衆皆惡之少無父常毁罵母母毎含忍一旦歸日晚其母倚門而迎本遥見便罵母曰我只有汝一人憂汝歸夜汝反罵我也遂撫膺大哭且歎且怨本在城巷住此時便出門近城㳂路上坐忽大呌一聲脱其衣變為一赤虎直上城去至來日猶在城上蜀主命趙庭𨼆射之一發正中其口衆分而食之蜀主初霸一方天雨毛人變虎地震者再出野人閒話太平廣記卷四百三十
