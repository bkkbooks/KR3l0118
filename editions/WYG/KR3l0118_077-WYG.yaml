body:
  text: 太平廣記卷七十七方士二杜生泓師羅思逺張景藏葉法善錢知微葫蘆生杜生唐先天中許州杜生善卜筮言走失官禄皆驗如神有亡奴者造杜問之生曰汝但尋驛路歸道逢驛使有好鞭者叩頭乞之彼若不與以情告云杜生教乞如是必得如其言果遇驛使以杜生語告乞鞭其使異之曰鞭吾不惜然無以撾馬汝可道左折一枝見代予與汝鞭遂徃折之乃見亡奴伏於𣗳下擒之問其故奴曰適循道走遥見郎故潛于斯復有亡奴者見杜生生曰歸取五百錢於官道候之見進鷂子使過求買其一必得奴矣如言候之俄有鷂子使至告以情求市其一使者異之以副鷂子與焉將至手鷂忽飛集于灌莽乃徃取奴果伏在其下遂執之言人禄位中者至多兹不縷述出紀聞泓師唐張敬之在則天朝每思唐德謂子冠宗曰吾今佩服乃莽朝服耳累官至春官侍郎當入三品其子將道由歴於天官有僧泓師善隂陽算術與敬之有舊謂敬之曰侍郎無煩求三品敬之曰弟子無所求此兒子意耳敬之弟訥之為司禮博士時有疾甚危殆指訥之曰八郎得三品敬之曰憂其疾亟豈望三品也曰八郎今日如臨萬仞淵必不墜矣皆如其言泓復與張燕公説置買永樂東南第一宅有求土者戒之曰此宅西北隅最是王地愼勿於此取土越月泓又至謂燕公此宅氣候忽然索漠甚必恐有取土于西北隅者公與泓偕行至宅西北隅果有取土處三數坑皆深丈餘泓大驚曰禍事令公富貴止一身而已更二十年外諸郎君皆不得天年燕公大駭曰塡之可乎泓曰客土無氣與地脈不相連今摠塡之亦猶人有瘡痏縱以他肉補之終無益燕公子均垍皆為禄山委任授賊大官克復後三司定罪肅宗時以減死論太上皇召肅宗謂曰張均兄弟皆與逆賊作權要官就中張垍更與賊毁阿奴家事犬􅇾之不若也其罪無赦肅宗下殿叩頭再拜曰臣比在東宮被人誣譖三度合死皆張説保䕶得全首領以至今日張説兩男一度合死臣不能力爭脱死者有知臣將何面目見張説於地下嗚咽俯伏太上皇命左右曰扶皇帝起乃曰與阿奴處置張垍宜長流逺惡處竟終於嶺表張均宜棄市更不要苦救這箇也肅宗掩泣奉詔故均遇害皆如其言出大唐新語及戎幕閒談羅思逺唐羅思逺多祕異術最善隱形明皇樂隱形之法就思逺勤求而學之思逺雖傳授不盡其要帝每與思逺同為之則隱没人不能知若自試則或餘衣帶或露幞頭脚宮中人每知帝所在也帝多方賜賚或懼以死而求之終不盡傳帝怒命力士裹以油襆置於油榨下壓殺而埋瘞之不旬日有中官自蜀道回逢思逺於路乘驢而笑謂使者曰上之為戲一何虐也出開天傳信記張景藏中書令河東公裴光庭開元中居相位張景藏能言休咎一日忽詣公以一幅紙大書台字授公公曰余見居台司此何意也數日貶台州刺史出尚書故實葉法善唐𤣥宗於正月望夜上陽宮大陳影燈設庭燎自禁門望殿門皆設蠟炬連屬不絶洞照宮室熒煌如晝時尚方都匠毛順心多巧思結搆繒采為燈樓十二間高百五十尺懸以珠玉金銀每微風一至鏘然成韻仍以燈為龍鳯虎豹騰躍之狀似非人力有道士葉法善在聖真觀上促命召來既至潛引法善觀於樓下人莫知者法善謂上曰影燈之盛天下固無與比惟凉州信為亞匹上曰師頃嘗遊乎法善曰適自彼來便蒙召上異其言曰今欲一徃得否法善曰此易耳于是令上閉目約曰必不得妄視若有所視必當驚駭上依其言閉目距躍身在霄漢已而足及地法善曰可以觀覽既視燈燭連亘十數里車馬駢闐士女紛雜上稱其善久之法善曰觀覽畢可回矣復閉目與法善騰虛而上俄頃還故處而樓下歌吹猶未終法善至西凉州將鐵如意質酒肆異日上命中官託以他事使凉州因求如意以還法善又嘗引上遊於月宮因聆其天樂上自曉音律黙記其曲而歸傳之遂為霓裳羽衣曲法善生隋大業丙子終於開元壬申凡一百七十年矣寧州有人卧疾連年求法善飛符以制之令於居宅井南七步掘約五尺許得一古曲几几上有十八字歌曰歲年永悲羽翼殆歸哀哉罹殃苦令我不得飛疾者遂愈案孔懌㑹稽記云葛𤣥得仙後几遂化為三足獸至今上虞人徃徃於山中見此案几蓋欲飛騰之兆也金陵六朝記曰吳帝赤烏七年八月十七日葛𤣥於方山上得道白日昇天至今有煮藥鐺山有洗藥池見在又白仲都葛𤣥弟子亦白日昇天至今祠壇見在白都山下又姚光亦葛𤣥弟子自言得為火仙吳大帝積薪焚之光安坐火中手閱素書一卷法善盡傳符籙尤能厭鬼神先是高宗曾檢挍諸術士黄白之法遂出九十餘人曾於東都凌空觀設壇醮士女徃觀之俄有數十人自投火中人大驚師曰皆鬼魅吾法攝之也卒諡越國公出廣徳神異録錢知微唐天寳末術士錢知微嘗至洛居天津橋賣卜云一卦帛十疋歴旬人皆不詣之一日有貴公子意其必異命取帛如數卜焉錢命蓍而卦成曰予筮可期一生君何戲焉其人曰卜事甚切先生豈悞乎錢請為韻語曰兩頭㸃土中心虛懸人足踏䟦不肯下錢其人本意賣天津橋紿之其精如此出酉陽雜爼胡蘆生唐劉闢初登第詣卜者胡蘆生筮卦以質官禄生雙瞽卦成謂闢曰自此二十年禄在西南然不得善終闢留束素與之釋褐從韋臯於西川至御史大夫軍司馬既二十年韋病命闢入奏請益東川如開元初之制詔未允闢乃微服單騎復詣胡蘆生筮之生揲蓍成卦謂闢曰吾二十年前嘗為一人卜乃得旡妄之隨今復前卦得非曩賢乎闢聞之即依阿唯諾生曰若審其人禍將至矣闢甚不信乃歸蜀果叛憲宗皇帝擒戮之宰相李蕃嘗漂寓東洛妻即庶子崔謙女年近三十未有名宦多寄託崔氏待之亦不甚盡禮時胡蘆生在中橋李患足瘡欲挈家居揚州甚悶與崔氏兄弟同徃候之生好飲酒詣者必擕一壺李與崔各㩦酒賫錢三鍰徃焉生方箕踞在幕屋倚蒲團已半酣矣崔兄弟先至生不為之起但伸手請坐而已曰須臾當有貴人來顧小童曰掃地方畢李生至級下蘆生笑迎執手而入曰郎君貴人也何問李公曰某且老矣復病又欲以家徃數千里外何有如此貴人也曰更逺亦可公在兩紗籠中豈畏此厄李公詢紗籠之由終不復言遂徃揚州居參佐橋而李公閒談寡合居之左近有高員外素相善時李疾不出高已來謁至晚又報高至李甚怪及見云朝來看公歸到家困甚就寢夢有人召出城荆棘中行見舊使莊客亡已十數年矣謂某曰員外不合至此為物所誘且須臾􅇥返某送員外去遂即引至城門某謂曰汝安得在此曰為隂吏蒙差當直李三郎某曰何李三郎也曰住參佐橋知員外與三郎徃還故此祗候某曰李三郎安得如此曰是紗籠中人詰之不肯言因云飢甚員外能賜少酒飯錢銀否此城不敢入請于城外致之某曰就李三郎宅得否其人驚曰若如此是殺某也遂覺特奉報此好消息李公笑而謝之心異紗籠之説後數年張建封鎮徐州奏李為廵官校書郎㑹有新羅僧能相人言張公不得為宰相甚不快因令使院看諸判官有得為宰相否及至曰並無張尤不快曰某妙擇賔僚豈無一人至相座者因更問曰莫有判官更入院否報李廵官便令促召至僧降堦迎謂張公曰判官是紗籠中人僕射不及張大喜因問紗籠事曰宰相㝠司必潛以紗籠䕶之恐為異物所擾餘官不得也方悟蘆生及高公所説李公竟為相滎陽鄭子少貧窶有才學不遇時年近四十將獻書策求禄仕鄭遂造之請占後事謂鄭曰此卦大吉七日内婚禄皆逹鄭既欲干禄求婚皆被擯斥以卜者謬已即告云吾將死矣請審之胡蘆生曰豈欺誑言哉必無致疑也鄭自度無因而致請其由生曰君明日晩自乘驢出永通門信驢而行不用將從者隨二十里内的見其驗鄭依言明日信驢行十七八里因倦下驢驢忽驚走南去至疾鄭逐一里餘驢入一莊中頃聞莊内呌呼云驢踏破醬瓮牽驢索主忽見鄭求驢其家奴僕訴詈鄭子巽謝之良久日向暮聞門内語云莫辱衣冠即主人母也遂問姓名鄭具對因叙家族乃鄭之五從姑也遂留宿傳語更無大子弟姑即自出見郎君延鄭㕔内須臾列燈火備酒饌夫人年五十餘鄭拜謁叙寒暄兼言驢事慚謝姑曰小子隔闊都不知聞不因今日何由相見遂與欵洽詢問中外無不識者遂問婚姻鄭云未婚初姑似喜少頃慘容曰姑事韋家不幸兒女幼小偏露一子纔十餘歲一女去年事鄭郎選授江隂尉將赴任至此身亡女子孤弱更無所依郎即未宦若能就此親便赴官任即亦姑之幸也鄭私喜又思卜者之神遂謝諾之姑曰赴官須及程限五日内須成親郎君行李一切我備果不出七日婚宦兩全鄭厚謝蘆生㩦妻赴任出原化記太平廣記卷七十七
