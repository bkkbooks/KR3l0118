body:
  text: 太平廣記卷四百十三宋李昉等編草木八芝竹芝樓闕芝天尊芝紫芝參成芝夜光芝隱晨芝鳳腦芝白符芝五徳芝石桂芝滴芝木芝螢火芝肉芝小人芝地下肉芝異菌石菌竹肉毒菌苔叙苔地錢蔓金苔如苣苔石髪瓦松瓦松賦芝竹芝梁簡文延香閣大同十年竹林吐芝長八寸頭葢似雞頭實黒色其柄似藕柄内通榦空皮質皆純白根下微紅雞頭實處似竹節脱之又得脱也自節處别生一重如結網羅四面周可五六寸圓繞周匝以罩柄上相逺不相著也其似結網衆目輕巧可愛其與柄皆得相脱驗仙書與威喜芝相類出酉陽雜俎樓闕芝隋大業中東都永康門内㑹昌門東生芝草百二十莖散在地周十歩許紫莖白頭或白莖黒頭或有枝或無枝亦有三枝如古出字者地内根並如線大道相連著乾陽殿東東上閣門槐𣗳上生芝九莖共本相扶而生中莖最長兩邊八莖相次而短有如𣗳闕甚潔白武賁郎將叚文操留守圖畫表奏出大業拾遺天尊芝唐天寳初臨川郡人李嘉所居柱上生芝草形𩔖天尊太守張景佚截獻之出酉陽雜俎紫芝唐大歴八年盧州廬江縣紫芝生髙一丈五尺芝類至多出酉陽雜俎參成芝參成芝斷而可續出酉陽雜俎夜光芝夜光芝一株九實實墜地如七寸鏡夜視如牛目茅君種於句曲山出酉陽雜俎隱晨芝隱晨狀如斗以星為節以莖為網出酉陽雜俎鳳腦芝仙經言穿地六尺以環寳一枚種之灌以黄水五合以土堅築之三年生苖如匏實如桃五色名鳳腦芝食其實唾地為鳳乗昇太極出酉陽雜俎白符芝白符芝大雪而白華出酉陽雜俎五徳芝五徳芝如車馬出酉陽雜俎石桂芝石桂芝生山石穴中似桂𣗳而實石也髙如大絞尺光明而味辛有枝條搗服之一觔得千歲也出酉陽雜俎滴芝少室石户中更有深谷不可得過以石投谷中半日猶聞其聲也去户外十餘丈有石柱柱上有偃葢石南度徑可一丈許望之蜜芝從石上隨石偃葢中良久輙有一滴有似雨屋後之餘漏時時一落耳然蜜芝墮不息而偃葢亦終滴也户上刻石為科斗字曰得服石蜜芝一斗者夀萬歲諸道士共思惟其處不可得往唯當以椀器置勁竹木端以承取之然竟未有能為之者按此户上刻題如此前世必已有之者也出抱朴子木芝木芝者松栢脂淪地千歲化為茯苓萬歲其上生小木狀似蓮花名曰木威喜芝夜視有光持之甚滑燒之不燋帶之辟兵以帶雞而雜以雞十二頭籠之去其處十二歩射十二箭他雞皆傷帶威喜芝者終不傷也出抱朴子螢火芝良常山有螢火芝其實是草大如豆紫花夜視有光食一枚中心一孔明食至七心七竅洞澈可以夜書出酉陽雜俎肉芝昔有人泊渚登岸忽見蘆葦間有十餘崑崙偃卧手足皆動驚報舟人舟人有常行海中者識之菌也往視之首皆連地割取食之菌但無七竅抱朴子云肉芝如人形産于地亦此𩔖也何足怪哉出嶺南異物志小人芝或山中見小人乗車馬長七八寸者肉芝也取服之即仙矣出抱朴子地下肉芝蘭陵蕭逸人亡其名嘗舉進士下第遂焚其書隱居潭水上從道士學神仙因絶粒吸氣每旦屈伸肢體冀延其夀積十年餘髮盡白色枯而背僂齒有墮者一旦引鏡自視勃然發怒且曰吾棄聲利隱身田野間絶粒吸氣冀得長生今亦衰瘠如是豈我之心哉即還居鄴下學商人逐什一之利凡數年資用大饒為富家後因治園屋發地得物狀𩔖人手肥而且潤色微紅逸人得之驚曰豈非禍之芽且吾聞太歲所在不可興土事脱有犯者當有修肉出其下固不祥也今果有奈何然吾聞得肉食之或可以免于是烹而食味甚美食且盡自是逸人聽視明力愈壯貌愈少髮之秃者盡黰然而長矣齒之墮者亦駢然而生矣逸人黙自竒異不敢吿于人後有道士至鄴下逢逸人驚曰先生嘗得餌仙藥乎何神氣清悟如是道士因胗其脉久之又曰先生嘗食靈芝矣夫靈芝狀𩔖人手肥而且潤色微紅者是也逸人悟其事以吿道士賀曰先生之夀可與龜鶴齊矣然不宜居塵俗間當退休山林棄人事神仙可致逸人喜而從其語遂去竟不知所在出宣室志異菌唐開成元年春叚成式修行里私第書齋前有枯紫荆數株蠧折因伐之餘尺許至三年秋枯根上生一菌大如斗下布五足頂黄白兩暈緑垂裙如鵞鞴髙尺餘至午色變黒而死焚之氣如茅香成式嘗置香爐於枿臺上念經問僧以為善徵後覽諸志怪南齊吴郡褚思莊素奉釋氏眠于梁下短柱是柟木去地四尺餘有節大明中忽有一物如芝生于節上黄色鮮明漸漸長數日遂成千佛狀面目指爪及光相衣服莫不宛具如金鐷起隱摩之殊軟嘗以春末落落時佛形如故但色褐耳至落時其家貯之箱中積五年思莊不復住其下亦無他顯盛闔門夀老思莊父終九十七兄年七十健如壯年出酉陽雜俎石菌宋州莆田縣破崗山唐武宗二年巨石上生菌大如合簣莖及葢黄白色其下淺紅盡為過僧所食云美倍諸菌出酉陽雜俎竹肉竹肉江淮有竹肉生節上如彈丸味如白雞竹皆向北又有大𣗳雞如杯棬呼為胡猻頭盧山有石耳性熱出酉陽雜俎毒菌江夏漢陽縣出毒菌號茹閭非茅蒐也每歲供進縣司常令人於田野間候之茍有此菌即立表示人不敢從下風而過避其氣也採之日以竹竿芟倒遽捨竿于地毒氣入竹一時爆裂直候毒歇仍以櫸栁皮蒙手以取用氊包之亦櫸栁皮重裹縣宰封印而進其賫致役夫倍給其直為其道路多為毒薰以致頭痛也張康隨侍其父宰漢陽備言之人有為野菌所毒而笑者煎魚椹汁服之即愈僧光逺説也出北夢瑣言苔叙苔苔錢亦謂之澤葵又名董錢草亦呼為宣癬南人呼為垢草出述異記地錢地錢葉圓莖細有蔓多生谿澗邊一曰積雪草亦曰連錢草出酉陽雜俎蔓金苔晉祖梁國獻蔓金苔色如金若螢火之聚大如雞卵投之水中蔓延波瀾之上光出照日皆如火生水上也乃于宫中穿池廣百歩時時觀此苔以樂宫人宫人有幸者則以金苔賜之以置漆椀中照耀滿室名曰夜明苔着衣襟則如火光矣帝慮外人得之􅃷惑百姓詔使除苔塞池及皇家喪亂猶有此物皆入胡中出王子年拾遺記如苣苔慈恩寺唐三藏院後簷堦開成末有苔狀如古苣布於塼上色如藍緑輕軟可愛談論僧義林太和初改𦵏基法師初開冡香氣襲人側卧塼臺上形如生塼上苔厚二寸餘作金色氣如爇檀出酉陽雜俎石髮張乗言南中水底有草如石髮每月三四日始生至八九已後可採及月盡悉爛似隨月盛衰也出酉陽雜俎瓦松博雅在屋曰昔耶在墻曰垣衣廣志謂之蘭香生於久屋之瓦於落陽以覆屋前後詞人詩中多用昔耶梁簡文帝詠薇曰縁階覆碧綺依簷暎昔耶或言構木上多松栽土木氣洩則瓦生松大歴中修含元殿有一人投狀請瓦且言瓦工唯我所能祖父時嘗瓦此殿矣衆工不能服因曰若有能瓦畢不生瓦松乎衆方服焉又有李阿黒者亦能至屋布瓦如齒間不通綖亦無瓦松本草瓦衣謂之屋遊出酉陽雜俎瓦松賦崔融瓦松賦序云崇文館瓦松者産于屋霤之下謂之木也訪山客而未詳謂之草也驗農皇而罕記賦云煌煌特秀狀金芝之産霤歴歴虛懸若星榆之種天葩條郁毓根柢連拳間紫苔而裛露凌碧瓦而含煙又曰慚魏宫之烏韭恧漢殿之紅蓮崔公學博無不該悉豈不知瓦松已有著説乎出酉陽雜俎太平廣記卷四百十三
