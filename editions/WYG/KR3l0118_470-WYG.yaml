body:
  text: 太平廣記卷四百七十宋李昉等編水族七魚李鷸謝二荆州漁人劉成薛二娘趙平原髙昱僧法志李鷸唐燉煌李鷸開元中為邵州刺史挈家之任泛洞庭時晴景登岸因鼻衂血沙上為江鼉所䑛俄然復生一鷸其形體衣服言語與其身無異鷸之本身為鼉法所制縶於水中其妻子家人迎奉鼉妖就任州人亦不能􅁴悟為郡幾數年因天下大旱西江可渉道士葉静能自羅浮山赴𤣥宗急詔過洞庭忽沙中見一人面縛問曰君何為者鷸以狀對静能書一符帖巨石上石即飛起空中鼉妖方擁案晨衙為巨石所擊乃復本形時張説為岳州刺史具奏并以舟檝送鷸赴郡家人妻子乃信今舟行者相戒不瀝血於波中以此故也出獨異記謝二唐開元時東京士人以遷歴不給南遊江淮求丐知巳困而無獲徘徊揚州乆之同亭有謝二者矜其失意恒欲恤之謂士人曰無爾悲為若欲北歸當有三百錢相奉及别以書付之曰我宅在魏王池東至池叩大柳樹家人若出宜付其書便取錢也士人如言逕叩大𣗳乆之小婢出問其故云謝二令送書忽見朱門白壁婢往却出引入見姥充壯當堂坐謂士人曰兒子書勞君送令付錢三百千竟不違其意及人出已見三百錢在岸悉是官家排斗錢而色小壊士人疑其精怪不知何處得之疑用恐非物理因以告官具言始末河南尹奏其事皆云魏王池中有一黿窟恐是耳有敕使擊射之得崑崙數十人悉持刀鎗沉入其窟得黿大小數十頭末得一黿大如連牀官皆殺之得錢帛數千事其後五年士人選得江南一尉之任至揚州市中東店前忽見謝二怒曰於君不薄何乃相負以至於斯老母家人皆遭非命君之故也言訖辭去士人大懼十餘日不之官徒侣所促乃發行百餘里遇風一家盡没時人云以為謝二所損也出廣異記荆州漁人唐天寳中荆州漁人釣得青魚長一丈鱗上有五色圓花異常端麗漁人不識以其與常魚異不持詣市自烹食無味頗怪焉後五日忽有車騎數十人至漁者所漁者驚懼出拜聞車中怒云我之王子往朝東海何故殺之我令將軍訪王子汝又殺之當令汝身崩潰分裂受苦痛如王子及將軍也言訖呵漁人漁人倒因大惶汗乆之方悟家人扶還便得癩病十餘日形體口鼻手足潰爛身肉分散數月方死也出廣異記劉成宣城郡當塗民有劉成者李暉者俱不識農事嘗用巨舫載魚蟹鬻於吳越間唐天寳十三年春三月皆自新安江載往丹陽郡行至下查浦去宣城四十里㑹天暮泊舟二人俱登陸時李暉往浦岸村舎中獨劉成在江上四顧雲島閴無人跡忽聞舫中有連呼阿彌陀佛者聲甚厲成驚而視之見一大魚自舫中振鬛揺首人聲而呼阿彌陀佛焉成且懼且悚毛髪盡勁即匿身蘆中以伺之俄而舫中萬魚俱跳躍呼佛聲動地成大恐遽登舫盡投羣魚於江中有頃而李暉至成具以告暉暉怒曰豎子安得為妖妄乎唾而罵者且乆成無以自白即用衣資酧其直既而餘百錢易荻草十餘束至于岸明日遷於舫中忽􅁴重不可舉解而視之得緡十五千簽題云歸汝魚直成益竒之是日於𤓰洲㑹羣僧食併以緡施焉時有萬莊者自涇陽令退居𤓰洲備得其事傳於紀述出宣室志薛二娘唐楚州白田有巫曰薛二娘者自言事金天大王能驅除邪厲邑人崇之村民有沈某者其女患魅發狂或毁壊形體蹈火赴水而腹漸大若人之姙者父母患之迎薛巫以辨之既至設壇於室卧患者於壇内旁置大火坑燒鐵釜赫然巫遂盛服奏樂鼓舞請神須臾神下觀者再拜巫奠酒祝曰速召魅来言畢巫入火坑中坐顔色自若良乆振衣而起以所燒釜覆頭鼓舞曲終去之遂據胡牀叱患人令自縛患者反手如縛敕令自陳初泣而不言巫大怒操刀斬之剨然刃過而體如故患者乃曰伏矣自陳云淮中老獺因女浣紗悦之不意遭逢聖師乞自此屏迹但痛腹中子未育若生而不殺以還某是望外也言畢嗚咽人皆憫之遂秉筆作别詩曰潮来逐潮上潮落在空灘有来終有去情易復情難腸斷腹中子明月秋江寒其患者素不識書至是落筆詞翰俱麗須臾患者昏睡翌日乃釋然方説初浣紗時有美少年相誘因而來往亦不自知也後旬月産獺子三頭欲殺之或曰彼魅也而信我人也而妄不如釋之其人送於湖中有巨獺迎躍負而没之出通幽記趙平原唐元和初天水趙平原漢南有别墅嘗與書生彭城劉簡辭武威叚齊眞詣無名湖捕魚為鱠須臾獲魚數十頭内有一白魚長三尺餘鱗甲如素錦耀人目精鬐鬛五色鮮明可愛劉與叚曰此魚狀貎異常不可殺之平原曰子輩迂濶不能食吾能食之矣言未畢忽見湖中有羣小兒俱著半臂白袴馳走水上呌嘯来往略無畏憚二客益懼復以白魚為請平原不許之叱庖人曰速所鱠来逡廵鱠至平原及二客食方半風雷暴作霆震一聲湖面小兒脚下生白􅃄大風隨起二客􅁴氣候有變顧望三里内有一蘭若遂投而去平原㣲哂方復下筯于時飛沙折木雨火相雜而下霆電掣拽天崩地拆二客惶駭相顧失色謂平原已為虀粉矣俄頃雨霽二客奔詣鱠所見平原坐於地㝠然已無知矣二客扶翼呼問之良乆張目曰大差事大差事辛勤食鱠盡被一青衫人向吾喉中拔出擲於湖中吾腹今甚空乏矣其操刀之僕遂亡失所在經數月方歸平原詰其由云初見青衫人於電火中嗔罵遂被領將令負衣襆行僅十餘日至一處人物稠廣市肆駢雜青衣人云此是益州又行五六日復至一繁㑹處青衫人云此是潭州其夕領入曠野中言曰汝隨我行已乆得無困苦􅁘今與汝别因懐中取乾脯一脡與某云饑即食之可逹家也又曰為我申意趙平原無天害生命暴殄天物神道所惡再犯之必無赦矣平原自此終身不釣魚出博物志高昱元和中有高昱處士以釣魚為業嘗艤舟於昭潭夜僅三更不寐忽見潭上有三大芙蕖紅芳頗異有三美女各踞其上但衣白光潔如雪容華艷媚瑩若神仙共語曰今夕濶水波澄高天月皎怡情賞景堪話幽𤣥其一曰旁有小舟莫聴我語否又一曰縱有非濯纓之士不足憚也相謂曰昭潭無底橘洲浮信不虚耳又曰各請言其所好何道其次曰吾性習釋其次曰吾習道其次曰吾習儒各談本教道義理極精㣲一曰吾昨宵得不祥之夢二子曰何夢也曰吾夢子孫倉皇窟宅流徙遭人斥逐舉族奔波是不祥也二子曰遊魂偶然不足信也三子曰各􅄸来晨得何物食乆之曰從其所好僧道儒耳吁吾適來所論便成先兆然未必不為禍也言訖逡巡而没昱聴其語歴歴記之及旦果有一僧来渡至中流而溺昱大駭曰昨宵之言不謬耳旋踵一道士艤舟將濟昱遽止之道士曰君妖也僧偶然耳吾赴知者所召雖死無悔不可失信叱舟人而渡及中流又溺焉續有一儒生挈書囊徑渡昱懇曰如前去僧道已没矣儒正色而言死生命也今日吾族祥齋不可虧其弔禮將鼓棹昱挽書生衣袂曰臂可斷不可渡書生方呌呼於岸側忽有物如練自潭中飛出繞書生而入昱與渡人遽前捉其衣襟漦涎流滑手不可制昱長吁曰命也頃刻而没三子而俄有二客乘葉舟而至一􅅱一少昱遂謁􅅱問其姓字􅅱曰余祁陽山唐勾鼈今適長沙訪張法明威儀昱乆聞其高道有神術禮謁甚謹俄聞岸側有數人哭聲乃三溺死者親屬也􅅱詰之昱具述其事􅅱怒曰焉敢如此害人遂開篋取丹筆字命同舟弟子曰為吾持此符入潭勒其水怪火急他徙弟子遂捧符而入如履平地循山脚行數百丈觀大穴明瑩如人間之屋室見三白猪寐於石榻有小猪數十方戲於旁及持符至三猪忽驚起化白衣美女小者亦俱為童女捧符而泣曰不祥之夢果中矣曰為某啓仙師住此多時寧無愛戀容三日徙歸東海各以明珠為獻弟子曰吾無所用不受而返具以白􅅱􅅱大怒曰汝更為我語此畜生明晨速離此不然當使六丁就穴斬之弟子又去三美女號慟曰敬依處分弟子歸明晨有黑氣自潭面而出須臾烈風迅雷激浪如島有三大魚長數丈小魚無數周繞㳂流而去􅅱曰吾此行甚有所利不因子何以去昭潭之害遂與昱乘舟東西耳出傳竒僧法志臺山僧法志遊至淮隂見一漁者堅禮而命焉法志隨至草庵中漁者設食甚謹法志頗怪因問曰弟子以漁為業自是造罪之人何見僧如此敬禮答曰我昔於㑹稽山遇雲遠上人為衆講法暫曾隨喜得悟聖教邇來見僧即歡喜無量僧異之勸令改業漁者曰我雖聞善道而滯於罟網亦猶和尚為僧未能以戒律為事其罪一也又何疑焉僧慙而退迴顧見漁者化為大黿入淮亦失草庵所在出瀟湘録太平廣記卷四百七十
