body:
  text: 太平廣記卷二百十二畫三吳道𤣥馮紹正張藻陳閎韋無忝盧稜伽畢宏浄域寺資聖寺老君廟金橋圖崔圎壁吳道𤣥唐吳道𤣥字道子陽翟人也少孤貧天授之性年未弱冠窮丹青之妙浪跡東洛𤣥宗知其名召入供奉大畧宗師張僧繇千變萬狀縱横過之兩都寺觀圖畫牆壁四十餘間變像即同人相詭狀無一同者其見在為人所覩之妙者上都興唐侍御注金剛經院兼自題經文慈恩寺㙮前面文殊普賢西面降魔盤龍等又小殿前門菩薩景公寺地獄帝釋龍神永夀寺中三門兩神皆妙絶當時朱景𤣥云有舊家人尹老年八十餘嘗云見吳生畫中門内神圎光最在後一筆成當時坊市老幼日數百人競候觀之縳闌施錢帛與之齊及下筆之時望者如堵風落電轉規成月圎諠呼之聲驚動坊邑或謂之神也又景公寺老僧𤣥縱云吳生畫此地獄變成之後都人咸觀皆懼罪修善兩市屠沽魚肉不售又開元中駕幸東洛吳生與裴旻張旭相遇各陳所能裴劒舞一曲張書一壁吳畫一壁都邑人士一日之中獲覩三絶又畫𤣥元廟五聖千官宫殿冠冕勢傾雲龍心若造化故杜貟外甫詩云妙絶動宫牆也又𤣥宗天寶中忽思蜀中嘉陵江山水遂假吳生驛遞令往冩貎及迴日帝問其狀奏云臣無粉本並記在心遣於大同殿圖之嘉陵江三百里山水一日而畢時有李將軍山水擅名亦畫大同殿壁數月方畢𤣥宗云李思訓數月之功吳道𤣥一日之跡皆極其妙也又畫殿内五龍鱗甲飛動每欲大雨即生煙霧吳生常持金剛經自此識本身當天寶中有楊庭光與之齊名潛畫吳生真於講席衆人之中引吳觀之一見便驚語庭光云老夫衰醜何用圖之因斯歎伏其畫人物佛像鬼神禽獸山水臺殿草木皆神妙也國朝第一張懐瓘云吳生畫張僧繇後身斯言當矣出唐畫斷又開元中將軍裴旻居母䘮詣道子請於東都天宫寺畫神鬼數壁以資㝠助道子答曰廢畫已乆若將軍有意為吾纒結舞劒一曲庶因猛勵獲通幽㝠旻於是脱去縗服若常時裝飾走馬如飛左旋右抽擲劒入雲髙數十丈若電光下射旻引手執鞘承之劒透室而入觀者數千百人無不驚慄道子於是援毫圖壁䬃然風起為天下之壯觀道子平生所畫得意無出於此出獨異志又道子訪僧請茶僧不加禮遂請筆硯於壁上畫驢一頭而去一夜僧房家具並踏破被惱亂不可堪僧知是道子懇邀到院祈求乃塗却畫處出盧氏雜説又西明慈恩多名畫慈恩㙮前壁有濕耳獅子趺心花為時所重聖善敬愛亦有古畫聖善木㙮院多鄭廣文畫并書敬愛山亭院有雉尾若真砂于上有進士房魯題名處後有人題詩曰姚家新壻是房郎未解芳顔意欲狂見説正調穿羽箭莫教射破寺家牆寺西北角有病龍院並吳畫出盧氏雜説馮紹正唐開元闗輔大旱京師闕雨尤甚亟命大臣遍禱於山澤間而無感應上於龍池新剏一殿因召少府監馮紹正令於四壁各圖一龍紹正乃先於西壁畫素龍竒狀蜿蜒如欲振躍繪事未半若風雲隨筆而生上及從官於壁下觀之鱗甲皆濕設色未終有白氣若簷廡間出入于池中波濤洶湧雷電隨起侍御數百人皆見白龍自波際乘雲氣而上俄頃隂雲四布風雨暴作不終日而甘澤遍於畿内出明皇雜録張藻唐張藻衣冠文學時之名流松石山水擅當代名唯松樹特出古今能用筆常以手握雙管亦一時齊下一為生枝一為枯枝氣傲煙霧勢踰風雨其槎枿鱗皴之質隨意縱横生枝則潤合春澤枯枝則乾裂秋風其山水之狀則髙低秀絶咫尺深重石突欲落泉噴如吼其近也逼人而寒其逺也極天之浄圖障在人間最多今寶應寺西院山水松石具有題記精巧之跡也松石山水並居神品出畫斷又後士人家有張藻松石障士人云兵部李貟外約好畫成癖知而購之其家弱妻已練為衣裏矣唯得兩幅雙栢一石在焉嗟惋乆之出名畫記陳閎唐陳閎㑹稽人以能冩真人物子女等本道薦之𤣥宗開元中召入供奉每令冩御容妙絶當時𤣥宗射豬鹿兎按鷹等并按舞圖真容皆受詔冩貎又太清宫肅宗真容匪唯龍頭鳳姿日角月宇之狀而筆力遒潤風彩英逸合符應瑞天假其能也國朝閻令公之後一人而已今咸宜觀天尊殿内畫上仙圖及當時供奉道士等真皆其蹤也又曾為故吏部侍郎徐畫本行經幡二口有女能織成妙絶無並唯冩真人神人物子女等妙品上上出畫斷韋無忝唐韋無忝京兆人也𤣥宗朝以畫馬異獸擅其名時稱韋畫四足無不妙也曾見貎外國所獻獅子酷似其真後獅子放歸本國唯畫者在圖時因觀覽百獸見之皆懼又𤣥宗時獵一箭中兩野豬詔於𤣥武北門冩貌傳在人間英妙之極也夫以百獸之性有雄毅逸羣之駿有馴擾之良爪距既殊毛鬛各異前輩或狀其怒則張口善則垂頭若展一筆以辨其性情奮一毛而知其名字古所未能也韋公能之異獸圖破分人家往往有之京都寺觀無畫處其畫獸等妙品上上出畫斷盧稜伽唐盧稜伽吳道𤣥弟子也畫迹似吳但才力有限頗能細畫咫尺間山水寥廓物像精備經變佛事是其所長吳生嘗於京師畫總持寺三門大獲衆貨稜伽乃竊畫莊嚴寺三門鋭思開張頗臻其妙一日吳生忽見之驚歎曰此子筆力常時不及我今乃𩔖我是子也精爽盡於此矣居一月稜伽果卒出名畫記畢宏唐畢宏大歴二年為給事中畫松石於左省㕔壁好事者皆詩之改京兆少尹為右庶子樹石擅名於代樹木改步變古自宏始也出名畫記浄域寺唐大穆皇后宅寺僧云三階院門外是神堯皇帝射孔雀處襌院門内外游自記云王昭𨼆畫門西裏面和修吉龍王有靈門内之西火目藥叉及北方天王甚竒猛門東裏靣賢門也野义部落鬼首上蟠虵汗煙可懼東廊樹石嶮怪髙僧亦怪西廊萬夀菩薩院門裏南壁皇甫軫畫鬼神及雕形勢若脱出酉陽雜爼資聖寺資聖寺中門忩門吳道子畫髙僧韋述讚李嚴書中三門外兩面上層不知何人畫人物頗𩔖閻今寺西廊北隅楊坦畫近㙮天女明睇將舞圖㙮院北堂有鐡觀音髙三丈餘觀音院兩廊四十二賢聖韓幹畫元載讚東廊北散馬不意見者如將嘶蹀聖僧中龍樹商船和循絶妙團㙮上菩薩李貞畫四面花鳥邉鸞畫當藥上菩薩頂上茙葵尤佳㙮中藏千部法華經詞人作諸畫連句栢梁體吳生畫勇矛㦸攢出竒騁變勢萬端蒼蒼鬼怪層壁寛覩之忽忽毛髮寒稜伽効之力所癉李真周昉優劣難活禽生卉推邊鸞花方嫰彩猶未乾韓幹變態如激湍惜哉壁畫勢未殫後人新畫何漫汗出酉陽雜爼老君廟東郡北邙山有𤣥元觀觀南有老君廟臺殿髙敞下瞰伊洛神仙泥塑之像皆開元中楊惠之所製竒巧精嚴見者增敬壁有吳道𤣥畫五聖真容及老子化胡經事丹青妙絶古今無比杜工部詩云配極𤣥都閟憑髙禁籞長守祧嚴具禮掌節鎮非常碧瓦初寒外金莖一氣旁山河扶繡戸日月近雕梁仙李蟠根大猗蘭奕葉光世家遺舊史道徳付今王畫手看前輩吳生逺擅塲森羅迴地軸妙絶動宫牆五聖聨龍衮千官列雁行冕旒俱秀發旌斾盡飛揚翠栢深留景紅棃迥得霜風筝吹玉柱露井凍銀牀身退卑周室經傳拱漢皇谷神如不死養拙更何鄉出劇談録金橋圖𤣥宗封泰山迴車駕次上黨潞之父老負擔壺漿逺近迎謁上皆親加存問受其獻饋錫賚有差父老有先與上相識者上悉賜以酒食與之話舊故所過村部必令詢訪孤老䘮疾之家加弔恤之父老欣欣然莫不瞻戴叩乞駐留焉及車駕過金橋橋在潞州御路縈轉上見數千里間旗纛鮮潔羽衛齊整謂左右曰張説言我勒兵三十萬旌旂經千里間陜右上黨至于太原見后土碑真才子也左右皆稱萬嵗上遂召吳道𤣥韋無忝陳閎令同製金橋圖聖容及上所乘照夜白馬陳閎主之橋梁山水車輿人物草樹鷹鳥器仗帷幕吳道𤣥主之狗馬驢騾牛羊槖駞猫猴豬􅀈四足之屬韋無忝主之圖成時謂三絶焉出開天𫝊信記崔圓壁安禄山之䧟兩京王維鄭䖍張通皆處於賊庭洎尅復俱囚於楊國忠舊宅崔相國圎因召於私第令畫名畫數壁當時皆以圎勲貴莫二望其救解故運思精深頗極能事故皆獲寛典至於貶降亦獲善地出明皇雜録太平廣記卷二百十二
