body:
  text: 太平廣記卷一百七十九貢舉二杜正𤣥李義琛陳子昻王維楊瑄蕭穎士喬彝許孟容張正甫閻濟美潘炎令狐峘熊執易杜正𤣥隋仁夀中杜正𤣥正蔵正倫俱以秀才擢第隋代舉進士摠一十人正倫一家三人出談賓錄李義琛武徳五年李義琛與弟義琰三従弟上徳同年三人進士義琛等隴西人世居鄴城國初草創未定家業素貧乏與上徳同居事従姑定省如親焉隨計至潼闗遇大雪逆旅不容有咸陽商人見而憐之延與同寢處居數日雪霽而去琛等議鬻驢以一醉酬之商人竊知不辭而去復先贈以稻糧琛後宰咸陽召商人與之抗禮親厚位至刑部侍郎雍州長史義琰相髙宗上徳司門郎中出摭言陳子昻陳子昻蜀射洪人十年居京師不為人知時東市有賣胡琴者其價百萬日有豪貴𫝊視無辨者子昻突出於衆謂左右可輦千緡市之衆咸驚問曰何用之答曰余善此樂㦯有好事者曰可得一聞乎答曰余居宣陽里指其第處并具有酒明日専候不唯衆君子榮顧且各宜邀召聞名者齊赴乃幸遇也來晨集者凡百餘人皆當時重譽之士子昻大張讌席具珍羞食畢起捧胡琴當前語曰蜀人陳子昻有文百軸馳走京轂碌碌塵土不為人所知此樂賤工之役豈愚留心哉遂舉而棄之舁文軸兩案遍贈㑹者㑹既散一日之内聲華溢都時武攸宜為建安王辟為記室後拜拾遺歸覲為叚簡所害出獨異記王維王維右丞年未弱冠文章得名性閑音律妙能琵琶遊厯諸貴之間尤為岐王之所眷重時進士張九臯聲稱藉甚客有出入公主之門者為其地公主以詞牒京兆試官令以九臯為解頭維方將應舉言於岐王仍求庇借岐王曰貴主之強不可力争吾為子畫焉子之舊詩清越者可錄十篇琵琶新聲之怨切者可度一曲後五日至吾維即依命如期而至岐王謂曰子以文士請謁貴主何門可見哉子能如吾之教乎維曰謹奉命岐王乃出錦繡衣服鮮華竒異遣維衣之仍令齎琵琶同至公主之第岐王入曰承貴主出内故擕酒樂奉醼即令張筵諸伶旅進維妙年潔白風姿都美立於行公主顧之謂岐王曰斯何人哉答曰知音者也即令獨奏新曲聲調哀切滿坐動容公主自詢曰此曲何名維起曰號鬱輪袍公主大竒之岐王因曰此生非止音律至於詞學無出其右公主尤異之則曰子有所為文乎維則出獻懐中詩卷呈公主公主既讀驚駭曰此皆兒所誦習常謂古人佳作乃子之為乎因令更衣昇之客右維風流蘊藉語言諧戱大為諸貴所欽瞩岐王因曰若令京兆府今年得此生為解頭誠為國華矣公主乃曰何不遣其應舉岐王曰此生不得首薦義不就試然已承貴主論託張九臯矣公主笑曰何預兒事本為他人所託顧謂維曰子誠取當為子力致焉維起謙謝公主則召試官至第遣宫婢𫝊教維遂作解頭而一舉登第矣及為太樂丞為伶人舞黄師子坐出官黄師子者非一人不舞也天寳末祿山初陷西京維及鄭䖍張通等皆處賊庭洎尅復俱囚於宣楊里楊國忠舊宅崔圓因召於私第令畫數壁當時皆以圓勲貴無二望其救解故運思精巧頗絶其藝後由此事皆従寛典至於貶黜亦獲善地今崇義里竇丞相易直􅀻第即圓舊宅也畫尚在焉維累為給事中祿山授以偽官及賊平兄縉為北都副留守請以已官爵贖之由是免死累為尚書右丞於藍田置别業畱心釋典焉出集異記楊暄楊國忠之子暄舉明經禮部侍郎逹奚珣考之不及格將黜落懼國忠而未敢定時駕在華清宫珣子撫為㑹昌尉珣遽召使以書報撫令候國忠具言其狀撫既至國忠私第五鼓初起列火滿門將欲趨朝軒葢如市國忠方乘馬撫因趨入謁於燭下國忠謂其子必在選中撫葢㣲笑意色甚歡撫乃白曰奉大人命相君之子試不中然不敢黜退國忠却立大呼曰我兒何慮不富貴豈藉一名為鼠輩所賣耶不顧乘馬而去撫惶駭遽奔吿於珣曰國忠恃勢倨貴使人之慘舒出於咄嗟奈何以挍其曲直因致暄於上第既為户部侍郎珣纔自禮部侍郎轉吏部侍郎與同列暄話於所親尚嘆已之淹徊而謂珣遷改疾速出明皇雜錄蕭穎士蕭穎士開元二十三年及第恃才傲物漫無與比常自􅂝一壺逐勝郊野偶憩於逆旅獨酌獨吟㑹有風雨暴至有紫衣老人領一小僮避雨於此穎士見其散冗頗肆陵侮逡巡風定雨霽車馬卒至老人上馬呵殿而去穎士倉􅋉覘之左右曰吏部王尚書尚書名丘穎士常造門未之面極驚愕明日具長牋造門謝丘命引至廡下坐責之且曰所恨與子非親屬當庭訓之耳頃曰子負文學之名倨忽如此止於一第乎穎士終揚州功曹出明皇雜錄喬彞喬彞京兆府解試時有二試官彞日午扣門試官令引入則已曛醉視題曰幽蘭賦彞不肯作曰兩箇漢相對作得此題速改之遂改渥洼馬賦曰此可矣奮筆斯須而成警句云四蹄曳練翻瀚海之驚瀾一噴生風下湘山之亂葉便欲首送京兆曰喬彞峥嶸甚以解副薦之可也出幽閒鼓吹許孟容許孟容進士及第學究登科時號錦襖子上著莎衣蔡京與孟容同出摭言張正甫李丞相絳先人為襄州督部方赴舉求鄉薦時樊司空澤為節度使張常侍正甫為判官主鄉薦張公知絳有前途啓司空曰舉人中悉不如李秀才請只送一人諸人之資悉以奉之欣然允諾又薦絳弟為同舍郎絳感澤殊常之恩不十年登庸澤之子宗易為朝官人問宗易之文於絳絳戯而答曰葢代時人因以葢代為口實相見論文必曰莫是李三葢代否及絳為户部侍郎也常侍為本司郎中因㑹把酒請侍郎唱歌李終不唱而哂之滿席大噱出嘉話錄閻濟美閻濟美前朝公司卿許與定分一志不為某三舉及第初舉劉單侍郎下雜文落第二舉坐王侍郎雜文落第某當是時年已蹭蹬常於江激往徑山欽大師處問法是春某既下第又將出闗因獻座主六韻律詩曰謇諤王臣直文明雅量全望鑪金自躍應物鏡何偏南國幽沈盡東堂禮樂宣輸今逰異士更昔至公年芳樹歡新景青雲泣暮天唯愁鳯池拜孤賤更誰憐座主覽焉問某今年何者退落具以實告先榜落第座主赧然變色深有遺才之嘆乃曰所投六韻必展後效足下南去幸無疑將來之事某遂出闗秋月江東求薦名到省後兩都置舉座主已在洛下比某到洛更無相知便投跡清化里店屬時物翔貴囊中但有五縑䇿蹇驢而已有舉公盧景莊已為東府首薦亦同處焉僕馬甚豪與某相揖未交一言久乃問某曰閻子自何至止對曰従江東來敬奉不敢怠景莊一旦際暮醉歸忽蒙問某行第乃曰閻二十消息絶好景莊大險某對曰不然必先大府首薦聲價已振京洛如某逺地一送豈敢望有成哉景莊曰足下定矣十一月下旬遂試雜文十二月三日天津橋放雜文榜景莊與某俱過其日苦寒是月四日天津橋作鋪帖經景莊尋被黜落某具前白主司曰某早畱心章句不工帖書必恐不及格主司曰可不知禮闈故事亦許詩贖某致詞後紛紛去畱某又遽前白主司曰侍郎開奬勸之路許作詩贖帖未見題出主司曰賦天津橋望洛城殘雪詩某只作得二十字某詩曰新霽洛城端千家積雪寒未収清禁色偏向上陽殘已聞主司催納詩甚急日勢又晚某告主司天寒水凍書不成字便聞主司䖏分得句見在將來主司一覽所納稱賞再三遂唱過其夕景莊相賀云前與足下並鋪試蜡日祈天宗賦竊見足下用魯丘對衛賜據義衛賜則子貢也足下書衛賜作駟馬字唯以此奉憂耳某聞是說反思之實作駟馬字意甚惶駭比榜出某濫忝第與狀頭同參座主座主曰諸公試日天寒急景寫札雜文或有不如法今恐文書到西京須呈宰相請先輩等各買好紙重來請印如法寫浄送納抽其退本諸公大喜及某撰本却請出駟字上朱㸃極大座主還闕之日獨揖前曰春間遺才所投六韻不敢暫忘聊副素約耳出乾􅍧子潘炎侍郎潘炎進士牓有六異朱遂為朱滔太子王表為李納女壻彼軍呼為駙馬趙博宣為冀定押衙𡊮同直入番為阿師竇常二十年稱前進士奚某亦有事時謂之六差竇常新及第薛某給事宅中逢桑道茂給事曰竇秀才新及第早晚得官桑生曰二十年後方得官一坐皆哂不信然果耳五度奏官皆敇不下即攝職數四其如命何出嘉話錄令狐峘大厯十四年改元建中禮部侍郎令狐峘下二十二人及第時執政間有怒薦託不従勢擬傾覆峘惶恐甚因進其私書上謂峘無良放牓日竄逐不得與生徒相面後十年門人田敦為明州刺史峘量移本州别駕敦始使陳謝恩之禮出摭言熊執易熊執易通於易義建中四年侍郎李紓試易簡知險阻論執易端座割析傾動塲中一舉而㨗出國史𥙷太平廣記卷一百七十九
