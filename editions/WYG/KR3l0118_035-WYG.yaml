body:
  text: 太平廣記卷三十五神仙三十五成真人栢葉仙人齊映王四郎韋丹馮大亮成真人成真人者不知其名亦不知所自唐開元末有中使自嶺外廻謁金天廟奠祝既畢戲問巫曰大王在否對曰不在中使訝其所答乃詰之曰大王何往而云不在巫曰關外三十里迎成真人耳中使遽令人於關候之有一道士弊衣負布囊自關外來問之姓成延於傳舍問以所習皆不對以驛騎載之到京館於私第密以其事奏焉𤣥宗大異之召入内殿館於蓬萊院詔問道術及所修之事皆拱黙不能對沉真朴畧而已半嵗餘懇求歸山既無所訪問亦聴其所適自内殿挈布囊徐行而去見者咸笑焉所司掃灑其居改張幃幕見壁上題曰蜀路南行燕師北至本擬白日昇天且看黑龍飲渭其字刮洗愈明以事上聞上黙然良久頗亦追思之其後禄山起燕聖駕幸蜀皆如其䜟出仙傳拾遺栢葉仙人栢葉仙人田鸞家居長安世有冠冕至鸞家富而兄弟五六人皆年未至三十而夭鸞年二十五母憂甚鸞亦自懼常聞道者有長生術遂入華山求問真侣心願懇至至山下數十里見黄冠自山而出鸞遂禮謁祈問𨼆訣黄冠舉頭指栢樹示之曰此即長生藥也何必深遠但問志如何爾鸞遂披尋仙方云側栢服之久而不已可以長生乃取栢葉暴乾為末服之稍節葷味心志專一服可至六七十日未有他益但覺時時煩熱而服終不輟至二年餘病熱頭目如裂舉身生瘡其母泣曰本為延年今返為藥所殺而鸞意終不舍尚服之至七八年熱疾益甚其身如火人不可近皆聞栢葉氣諸瘡潰爛黄水遍身如膠母亦意其死忽自云體今小可須一沐浴遂命置一斛温水於室數人舁卧斛中自病來十餘日不寢忽若思寢乃令左右掩戸勿驚遂於斛中寢三日方悟呼人起之身上諸瘡皆已掃去光彩明白眉鬚紺緑蝢覺耳目鮮明自云初寢夢黄冠數人持旌節導引謁上清遍禮古來列仙皆相謂曰栢葉仙人來此遂授以仙術勒其名於玉牌金字藏於上清謂曰且止於人世修行後有位次當相召也復引而歸鸞自此絶穀並不思飲食𨼆於嵩陽至貞元中已年百二十三嵗矣常有少容忽吿門人無疾而終顔色不改蓋屍解也臨終異香滿室空中聞音樂聲乃造清都赴仙約耳出原化記齊映齊相公映應進士舉至省訪消息歇禮部南院遇雨未食徬徨不知所之徐步墻下有一老人白衣策杖二小奴從揖齊公曰日已髙公應未飡某居處不遠能暫往否映愧謝相隨至門外老人曰某先去留一奴引郎君躍上白驢如飛齊公乃行至西市北入一静坊新宅門曲嚴潔良久老人復出侍婢十餘皆有所執至中堂坐華潔侈盛良久因鋪設于樓酒饌豐異逡廵人報有送錢百千者老人曰此是酒肆所入某以一丸藥作一瓮酒及晚請去老人曰郎君有竒表要作宰相耶白日上昇耶齊公思之良久云宰相老人笑曰明年必及第此官一定贈帛數十疋云慎不得言於人有暇即一來齊公拜謝自後數往皆有䘏賚至春果及第同年見其車服修整乘醉詰之不覺盡言偕二十餘人期約俱詣就謁老人聞之甚悔至則以廢疾託謝不見各奉一縑獨召公入責之曰爾何乃輕泄也比者昇仙之事亦得今不果矣公哀謝負罪出門去旬日復來宅已貨訖不知所詣出逸史王四郎洛陽尉王琚有孽姪小名四郎孩提之嵗其母他適因隨去自後或十年五年至琚家而王氏不復録矣唐元和中琚因常調自鄭入京道出東都方過天津橋四郎忽於馬前跪拜布衣草履形貌山野琚不識因自言其名琚哀愍久之乃曰叔今赴選費用固多少物奉獻以助其費即於懷中出金可五兩許色如雞冠因曰此不可與常者等價也到京但於金市訪張蓬子付之當得二百千琚異之即謂曰爾頃在何處今復何適對曰向居王屋山下洞今將往峨嵋山知叔到此故候拜覲琚又曰爾今停泊在何處對曰中橋逆旅席氏之家時方小雨㑹琚不賫雨衣遽去曰吾即至爾居四郎又拜曰行李有期恐不獲祗候琚逕歸易服而往則已行矣因詢之席氏乃曰妻妾四五人皆有殊色至於衣服鞍馬華侈非常其王處士肩輿先行云徃劒南琚私竒之然未信也及至上都時物翔貴財用頗乏因謂家奴吉兒曰爾將四郎所留者一訪之果有張蓬子乃出金示之蓬子驚喜捧而叩顙曰何從得此所要幾緡吉兒即曰二百干耳蓬子遂置酒食宴吉兒即依請而付又曰若更有可以再來吉兒以錢歸琚大異之明日自詣蓬子蓬子曰此王四郎所貨化金也西域商胡專此伺買且無定價但四郎本約多少耳逾則不必受也琚遂更不取焉自後留心訪問冀一㑹遇終不復見之出集異記韋丹韋丹大夫及第後厯任西臺御史每常好道未曾有遇京國有道者與丹交逰嵗久忽一日謂丹曰子好道心堅大抵骨格不成某不能盡知其事可自往徐州問黑老耳丹乃求假出往徐州經數日問之皆云無黑老召一衙吏問之曰此州城有黑老家在何處其吏曰此城郭内並無去此五里𤓰園中有一人姓陳黑瘦貧寒為人傭作賃半間茅屋而住此州人見其黑瘦衆皆呼為黑老韋公曰可為某邀取來吏人至𤓰園中喚之黑老終不肯來乃驅迫之至驛韋公已具公服在門首祗候韋公一見便再拜黑老曰某傭作求食不知有何罪今被捉來願得生廻又復怖畏驚恐欲走出門為吏人等遮攔不放自辰及酉韋公禮貌益恭黑老驚惶轉甚畧請上㕔終不能得至二更來方上堦不肯正坐韋公再拜諮請叩問不已至三更黑老忽然倒卧於床上鼻息如雷韋公兢兢床前而立久因困極不覺兼公服亦倒卧在床前地上睡至五更黑老起來以手撫韋公背云汝起汝起汝似好道吾亦愛之大抵骨格不成就且須向人間富貴待合得時吾當來迎汝不然恐汝失路耳初秋日可再來此當為汝盡話言訖倐已不見韋公却歸至立秋前一日晚至徐州黑老己辰時死矣韋公惆悵埋之而去自後寂絶二十年不知信息韋公官江西觀察使到郡二年忽一日有一叟謂閽人曰爾報公可道黑老來也公聞之倒屣相迎公明日無疾忽然卒皆言黑老迎韋公上仙矣出㑹昌解頤録馮大亮馮大亮者導江人也家貧好道亦無所修習每道士方術之人過其門必留連延接唯一牛拽步磨以自給一旦牛死其妻對泣歎曰衣食所給在此牛爾牛既死矣何以資口食乎慈母山道士每過其家即憇歇累日是時道士復來夫婦以此語之道士曰皮角在乎曰在即取皮攣綴如牛形斫木為脚以繩繫其口驅之遂起肥徤如常曰此牛不復飲食但晝夜使之可也慎勿解其口爾以此牛拽磨力倍於常道士亦不復來數年盛暑牛喘甚急牧童憐之因解其口遽成皮骨而已然其家已漸富改置酒肆常以奉道祈感遇仙人仍力行救物好賓客有樵叟三五人詣其家飲酒常不言錢禮而接之雖數益敬忽一人曰我軰八人明日具來共謀一醉無以人多為訝至時樵叟八人偕至客於袖中出柟木一枝纔五六寸栽於庭中便飲酒盡歡而去曰勞置美酒無以為報此樹徑尺則家財百萬此時可貢助天子垂名國史十年後㑹於岷嶺巨人宫當授以飛仙之道言訖而去旬日而樹已凌空髙十餘丈大已徑尺其家金玉自至寳貨自積殷富彌甚雖王孫糜竺之家不能及也五年𤣥宗幸蜀大亮貢錢三十萬貫以資國用出仙傳拾遺太平廣記卷三十五
