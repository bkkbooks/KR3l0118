body:
  text: 太平廣記卷二百五十三嘲誚一程季明諸葛恪張湛賀循陸士龍繁欽劉道真祖士言髙爽徐之才司馬消難馬王酒肆盧思道李愔薛道衡解嘲辛亶牛𢎞侯白程季明晉程季明嘲熱客詩曰平生三伏時道路無行車閉門避暑臥出入不相過今代褦襶子觸熱到人家主人聞客來嚬蹙柰此何謂當起行去安坐正咨嗟所說無一急􅊱􅊱語何多搖扇腕中疼流汗正滂沱莫謂爲小事亦是人一瑕傳誡諸朋友熱行宜見呵出啓顔録諸葛恪吳主引蜀使費褘飲使諸葛恪監酒恪以馬鞭拍褘背甚痛褘啓吳主曰蜀丞相比之周公都䕶君侯此之孔子今有一兒執鞭之士恪啓曰君至大國傲慢天常以鞭拍之於義何傷衆皆大笑又諸葛瑾爲豫州語别駕向臺云小兒知談卿可與語比往詣恪不相見後張昭坐中相遇别駕呼恪咄郎君恪因嘲曰豫州亂矣何咄之有答曰君聖臣賢未聞有亂恪復云昔唐堯在上四凶在下答曰豈唯四凶亦有丹朱出啓顔録張湛晉張湛好於齋前種松柏袁山松出遊每好令左右挽歌時人謂張屋下陳尸袁道上行殯出世説賀循晉太傅賀循作吳郡初不出門吳中彊族輕之乃題府門㑹稽雞不能啼賀聞故出行至門反顧索筆答之云不可啼殺吳兒於是至諸屯及邸閣檢挍諸顧陸使官兵及藏逋亡悉以事言上遭罪者衆陸抗時為江陵郡都督故下自請孫皓然後得釋闕陸士龍晉陸士龍荀鳴鶴二人未相識俱會張茂先坐張令接語以並有大才可勿常談陸抗手曰雲間陸士龍荀曰日下荀鳴鶴陸曰既開青天覩白雉何不張爾弓布爾矢荀曰本謂雲龍騤騤乃是山鹿野麋獸微而弩彊是以發遲張撫掌大笑而已出世說繁欽魏繁欽嘲杜巨明曰杜伯𤣥孫字子巨皇祖虐暴死射之神明不聴天地不與降生之初狀似時䑕厥性蟊蠈不文不武粗記粗略不能悉舉出啓顔録劉道真晉劉道眞遭亂於河側與人牽船見一老嫗操櫓道眞嘲之曰女子何不調機弄杼因甚傍河操櫓女答曰丈夫何不跨馬揮鞭因甚傍河牽船又嘗與人共飯素盤草舍中見一嫗將兩小兒過並著青衣嘲之曰青羊引雙羔婦人曰兩猪共一槽道真無語以對出啓顔錄祖士言晉祖士言與鍾雅相嘲鍾云我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍槌打爾利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神槌鍾遂屈出啓顔録髙爽髙爽辯博多才時劉蒨為晉陵令爽經途詣之了不相接爽甚銜之俄而爽代蒨為縣蒨追迎贈遺甚厚悉受之答書云髙晉陵自答或問其故曰劉蒨乃晉陵令耳何關爽事稍遷國子助敎孫挹為蘭陵縣爽又詣之挹了無故人之懐爽出從閣下過取筆題鼓靣云身有八尺圍腹無一寸腸面皮如許厚􅀍打未遽央挹體肥壯腰帶十圍故以此激之出談藪徐之才北齊徐之才封西陽王時王訢與之才嘲戲之才即嘲王訢姓曰王之為字有言則䚾近犬則狂加頭足而為馬施尾角而成羊訢無以對又嘗宴賔客時盧元明在座戲弄之才姓云卿姓徐字乃未入人之才即嘲元明姓盧字安亡為虐在丘為虚生男成虜配馬成驢嘲元明二字去頭則是兀明出頸則是无明減半則是无目變聲則是元盲元明亦無以對出啓顔録司馬消難周司馬消難以安陸附陳宣帝遇之甚厚以為司空見朝士皆􅂷學術積經史消難切慕之乃多卷黄紙加之朱軸詐為典籍以矜僚友尚書令濟陽江總戲之曰黄紙五經赤軸三史消難齊司空子如之子出談藪馬王隋姓馬王二人嘗聚宴談笑馬遂嘲王曰王是你元來本姓二為你漫走來將丁釘你鼻王曰馬是你元來本姓匡減你尾子來背上負王郎出啓顔録酒肆隋時數人入酒肆味酸且淡乃共嘲此酒一人云酒何處漫行來騰騰失却酉諸人問云此何義答云有水在次一人云酒頭似阿濫䭔頭諸人問云何因酒得似阿濫䭔頭答曰非鶉頭又一人云酒向他籬得頭四脚距地也獨宿諸人云此有何義答云更無餘義諸人共笑云此嘲最是無豆即答云我若有豆即歸舍作醬何因此間飲醋來衆歡大笑出啓顔録盧思道隋盧思道嘗共壽陽庾知禮作詩已成而思道未就禮曰盧詩何太春日思道答曰自許編苫疾嫌他織錦遲思道初下武陽入京内史李徳林向思道揖思道謂人曰徳林在齊恒拜思道今日官髙向雖拜乃作跪狀思道嘗在賔門日中立徳林謂之曰何不就𣗳䕃思道曰熱則熱矣不能林下立思道為周齊興亡論周則武皇宣帝悉有惡聲齊髙祖太上咸無善譽思道嘗謁東宮東宮謂之曰周齊興亡論是卿作不思道曰是東宮曰為卿君者不亦難乎思道不能對隋文帝以徐陵辯捷無人酬對深以為恥乃訪朝官誰可對使當時舉思道文帝甚喜即詔對南使朝官俱往徐陵遥見思道最小笑曰此公甚小思道遥應曰以公臣不勞長者須臾坐定徐陵謂思道曰昔殷遷頑人本居兹邑今存併是其人思道應聲笑曰昔永嘉南渡盡居江左今之存者唯君一人衆皆大笑徐陵無以對又隋令思道聘陳陳主敕在路諸處不得共語致令失機思道既渡江過一寺諸僧與思道設亦不敢有言只供索飲食而已於是索蜜浸益智勸思道嘗之思道笑曰法師久服無故何勞以此勸人僧既違敇失機且懼思道至陳手執國圭陳主既見思道因用觀世音經語弄思道曰是何商人齎持重寳思道應聲還以觀世音經報曰忽遇惡風漂墮羅刹鬼國陳主大慙遂無以對出啓顔録李愔魏髙祖山陵既就詔令魏收祖孝徴劉逖盧思道等各作挽歌詞十首尚書令楊遵彦詮之魏收四首祖劉各二首􅀍用而思道獨取八首故時人號八米盧郎思道嘗在魏收席舉酒勸劉逖收曰盧八勸劉二邪中書郎趙郡李愔亦戲之曰盧八問訊劉二逖銜之及愔後坐事􅀍鞭撲逖戲之曰髙槌兩下熟鞭一百何如言問訊劉二時出啓顔録薛道衡隋薛道衡為聘南使南朝無問道俗但機辯者即方便引道衡見之一僧甚辯捷令於寺上佛堂中讀法華經將道衡向寺禮拜至佛堂門僧大引聲讀法華經云鳩槃荼鬼今在門外道衡即應聲還以法華經答云毗舍闍鬼乃在其中僧徒愧服更無以報出啟顔録解嘲隋末劉黑闥據有數州縱其威虐合意者厚加賞賜違意者即被屠割嘗閒暇訪得解嘲人召入庭前立須臾水惡鳥飛過命嘲之即云水惡鳥頭如鎌杓尾如鑿河裏搦魚無僻錯大悦又令嘲駱駝嘲曰駱駝項曲緑蹄被他負物多因大笑賜絹五十疋拜畢左膊上負絹走出未至㦸門倒臥不起黑闥令問何意倒地答云為是偏檐更命五十屯綿置右膊將去令明日更來及還村路逢一知識問云在何處得此綿絹具説其事乃乞誦此嘲語并問倒地之由大喜而歸語其婦曰我明日定得綿絹及晩即詣門言極善解嘲黑闥大喜令引之適繫一獼猴在庭命嘲之即曰獼猴頭如鎌杓尾如鑿河裏搦魚無僻錯黑闥已恠猶未之責又一鴟飛度復令嘲之又云老鴟項曲緑蹄􅀍他負物多於是大怒令割一耳走出至庭又即倒地令問之又云偏檐復令割一耳還家婦迎問綿絹何答云綿絹割兩耳只有面出啓顔録辛亶隋辛亶為吏部侍郎選人為之牓略曰枉州抑縣屈滯郷不申里銜恨先生問隋吏部侍郎辛亶曰當今天子聖明羣僚用命外拓四方内齊七政而子位處權衡職當水鏡居進退之首握褒貶之柄理應識是識非知滯知微使無才者泥伏有用者雲飛柰何尸禄素餐濫處上官黜陟失所選補傷殘小人在位君子駮彈莫不代子戰灼而子獨何以安辛亶曰百姓之子萬國之人不可皆識誰厚誰親為桀賞者不可不喜􅀍堯責者寧有不嗔得官者見喜失官者見疾細而論之非亶之失先生曰是何疾歟是何疾歟不識何不訪其名官少何不簡其精細尋狀跡足識法家細尋判驗足識文華寧不知石中出玉黄金出沙量子之才度子之智祗可投之四裔以禦魑魅怨嗟不少實傷和氣辛亶再拜而謝曰幸蒙先生見責實覺多違謹當刮肌貫骨改過懲非請先生縱亶自修捨亶之罰如更有違甘從斧鉞先生曰如子之輩車載斗量朝廷多少立須相代那得久曠天官待子自作急去急去不得久住喚取師巫却行無處亶掩泣而言曰罪過自招自滅自消豈敢更將面目來汚聖朝先生曵杖而歌曰辛亶去吏部明開賢路遇太平今年定知不可得後歲依期更入京出朝野僉載牛𢎞隋牛𢎞為吏部尚書有選人馬敞者形貌最陋𢎞輕之側臥食果子嘲敞曰嘗聞扶風馬謂言天上下今見扶風馬得驢亦不假敞應聲曰嘗聞隴西牛千石不用軥今見隴西牛臥地打草頭𢎞驚起遂與官出朝野僉載侯白陳朝嘗令人聘隋不知其使機辯深淺乃密令侯白變形貌著故弊衣為賤人供承客謂是微賤甚輕之乃傍臥放氣與之言白心頗不平問白曰汝國馬價貴賤報云馬有數等貴賤不同若從伎倆筋脚好形容不惡堪得乘騎者直二十千已上若形容麄壯雖無伎倆堪䭾物直四五千已上若彌音卜結反尾燥蹄絶無伎倆傍臥放氣一錢不直使者大驚問其姓名知是侯白方始愧謝出啓顔録太平廣記卷二百五十三
