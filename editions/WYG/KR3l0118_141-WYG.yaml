body:
  text: 太平廣記卷一百四十一徵應七孔子蕭士義王導謝安庾亮王仲文諸葛侃劉波鄭微周超謝南康傅亮王徽之劉興道郭仲産沈慶之孔子孔子謂子夏曰得麟之月天當有血書魯端門孔聖沒周室亡子夏往觀逢一郎云門有血飛爲赤鳥化而爲書云岀説題辭蕭士義後漢黃門郎蕭士義和帝永元二年被戮數日前家中常所養狗來向其婦前而語曰汝極無相祿汝家尋當破敗當奈此何其婦黙然亦不駭狗少時自去及士義還内婦仍學説狗語未畢收捕便至岀續異記王導晉丞相王導夢人欲以百萬錢買長豫導甚惡之潛爲祈禱者備矣後作屋忽掘得一窖錢料之百億大不歡一皆藏閉俄而長豫亡長豫名悦導之次子也岀世説新書謝安東晉謝安於後府接賓婦劉氏見狗銜安頭來乆之乃失所在是月安薨岀異苑庾亮晉庾亮初鎭武昌岀石頭百姓看者於岸上歌曰庾公上武昌翩翩如飛鳥庾公還揚州白馬牽旈旐又曰庾公初上時翩翩如飛鴉庾公還揚州白馬牽旐車後連徵不入㝷薨還都葬之岀世説新書王仲文王仲文爲河南主簿居緱氏縣夜歸道經大澤中顧車後有一白狗甚可愛便欲呼取忽變爲人形長五六尺狀似方相或前或却如欲上車仲文大怖走至舍提火來視便失所在月餘日仲文將奴共在路忽復見與奴並頓伏俱死岀幽明錄諸葛侃諸葛侃晉孝武太元中於内寢婦高平張氏窻外聞有如雞雛聲甚畏驚而視之見有龜蛇之象似今畫𤣥武之形侃登九􅁄而竟被誅出廣古今五行記劉波劉波字道則晉孝武太元年中移居京口晝寢聞屏風外悒咤聲開屏風見一狗蹲地而語語畢自去波隗孫也後爲前將軍敗見殺岀異苑鄭微晉時信安鄭微少見一老公以囊與微云此是命愼勿令零落若有破碎便爲凶兆言訖失所在後密開㸔是一挺炭意甚祕之雖家人不知也後遭盧龍冦亂恒保錄之至宋永初三年微年八十三疾篤語弟云吾齒盡矣可試啓囊見炭悉碎折於是遂卒出廣古今五行記周超宋初義興周超爲謝晦司馬在江陵妻許氏在家遙見屋裏有光人頭在地血流甚多大驚怪即便失去後超被法岀劉義慶幽明錄謝南康宋永初三年謝南康家婢行逢一黑狗語婢曰汝㸔我背後人婢舉頭見一人長三尺有兩頭婢驚怖返走人狗亦隨婢後至家庭中舉家避走婢問狗汝來何爲狗云欲乞食耳於是婢與設食並食食訖兩頭人岀婢因謂狗曰人已去狗曰正已復來良乆沒不知所在後家人死喪岀續搜神記傅亮宋永初中北地傅亮爲䕶軍兄子珍住府西夜忽見北窻外樹有物面廣三尺眼横豎狀若方相珍遑遽以被自䝉乆乃自滅後亮被誅出廣古今五行記王徽之王徽之宋文帝元嘉四年爲交州刺史在道有客命索酒炙炙至取自割之終不入投地怒顧視向炙已變爲徽之頭又覩其首在空中至州便殞岀異苑劉興道零陵太守廣陵劉興道罷郡住齋中安牀在西壁下忽見東壁邊有一眼斯須之間便有四漸漸見多遂至滿室乆乃消散不知所在又見牀前有頭髪從土中稍稍繁多見一頭而岀乃是方相頭奄忽自滅劉憂怖沈疾不起岀續異記郭仲産宋郭仲産爲南郡王從事宅有枇杷樹元嘉末起齋屋以竹爲栭竹遂漸生枝葉條長數尺扶疎蓊翠鬱然如林仲産以爲吉祥俄而同義宣之謀被誅焉岀渚宫故事沈慶之宋太尉沈慶之求致仕上不許慶之曰張良名賢漢高猶許其退臣有何用爲聖朝所須乃稽顙流涕帝有詔授開府便詣廷尉待罪慶之目不識字手不知書而聰悟過人嘗對上爲詩令僕射顔師伯執筆慶之口占曰微生値多幸得逢時運昌衰朽筋骨盡徒歩還南岡辭榮此聖代何媿張子房並歎其辭意之美慶之嘗歲旦夢人餉絹兩疋曰此絹足度覺而歎曰兩疋八十尺足度無盈餘老子今年不免矣其年果爲原和所誅出談藪太平廣記卷一百四十一
