body:
  text: 太平廣記卷一百九十九文章杜牧天嶠遊人譚銖周匡物王播朱慶餘唐宣宗温庭筠李商隱劉瑑鄭畋司空圖髙蟾杜牧唐白居易初為杭州刺史令訪牡丹花獨開元寺僧惠澄近於京師得之始植於庭欄門甚密他處未之有也時春景方深惠澄設油幕覆其上牡丹自此東越分而種之也㑹徐凝自富春來未知白先題詩曰此花南地知難種慚愧僧閒用意栽海鷰解憐頻睥睨胡蜂未識更徘􅆦虚生芍藥徒勞妬羞殺玫瑰不敢開唯有數苞紅幞在含芳只待舍人來白尋到寺㸔花乃命徐同醉而歸時張祐榜舟而至甚若疎誕然張徐二生未之習稔各希首薦焉白曰二君論文若亷白之鬭鼠穴勝負在於一戰也遂試長劍倚天外賦餘霞散成綺詩試訖解送以凝為元祐次之張曰祐詩有地勢遥尊岳河流側讓關多士以陳後主日月光天德山河壯帝居此徒有前名矣又祐題金山寺詩曰𣗳影中流見鐘聲兩岸聞雖綦毋濳云塔影挂青漢鐘聲和白雲此句未為佳也白又以祐宫詞四句之中皆數對何足竒乎不如徐生云今古長如白練飛一條界破青山色祐歎曰榮辱糺紛亦何常也遂行歌而邁凝亦鼓枻而歸自是二生終身偃仰不隨鄉試矣先是李林宗杜牧與白輦下較文具言元白詩體舛雜而為清苦者見嗤因兹有恨白為河南尹李為河南令道上相遇尹乃乘馬令則肩輿似乖趨事之禮李嘗謂白為囁嚅兒聞者皆笑樂天之名稍減矣白曰李直木林宗字也吾之猘子也其鋒不可當後杜牧守秋浦與張祐為詩酒之交酷吟祐宫詞亦知錢塘之嵗白有非祐之論嘗不平之乃為詩二首以髙之曰誰人得似張公子千首詩輕萬戸侯又云如何故國三千里虚唱歌詞滿六宫張詩曰故國三千里深宫二十年一聲河滿子􅀟涙落君前此為祐得意之語也李杜以下盛言其美者欲以茍異於白而曲成於張也故牧又著論言近有元白者喜為淫言媟語鼓扇浮囂吾恨方在下位未能以法治之斯亦敷佐於祐耳出雲溪友議天嶠遊人麻姑山山谷之秀草木多竒有鄧先客至延康四五代為國道師而錫紫服洎死自京歸葬是山云是屍解也然悉為邱隴松栢相望詞人經過必當興詠幾千首矣忽有一少年偶題一絶不言姓字但云天嶠遊人耳後來觀其所刺無復為文且鄧氏之名因斯稍減矣詩曰鶴老芝田雞在籠上清那與俗塵同既言白日昇仙去何事人間有殯宮出雲溪友議譚銖真娘者吳國之佳人也比於錢塘蘇小小死葬吳宫之側行客感其華麗競為詩題於墓𣗳櫛比鱗臻有舉子譚銖者吳門之秀士也因書一絶後之來者覩其題處稍息筆矣詩曰虎邱山下塜纍纍松栢蕭條盡可悲何事世人偏重色真娘墓上獨題詩出雲溪友議周匡物周匡物字幾本漳州人唐元和十二年王播榜下進士及第時以歌詩著名初周以家貧徒歩應舉落魄風塵懐刺不偶路經錢塘江乏僦船之資久不得濟乃於公館題詩云萬里茫茫天塹遥秦皇底事不安橋錢塘江口無錢過又阻西陵兩信潮郡牧出見之乃罪津吏至今天下津渡尚傳此詩諷誦舟子不敢取舉𨕖人錢者自此始也出閩川名士傳王播唐王播少孤貧嘗客揚州惠照寺木蘭院隨僧齋食後厭怠乃齋罷而後擊鐘後二紀播自重位出鎭是邦因訪舊遊向之題名皆以碧紗罩其詩播繼以二絶句曰三十年前此院遊木蘭花發院新修如今再到經行處𣗳老無花僧白頭上堂未了各西東慚愧闍黎飯後鐘三十年來塵撲面如今始得碧紗籠出摭言朱慶餘唐朱慶餘遇水部郎中張籍知音索慶餘新舊篇什數通吟改只留二十六章籍置於懐抱而推贊之時人以籍重名無不繕録諷詠遂登科第初慶餘尚為謙退作閨意一篇以獻張曰洞房昨夜停紅燭待曉堂前拜舅姑粧罷低聲問夫婿畫眉深淺入時無籍酬之曰越女新粧出鏡心自知明艷更沈吟齊紈未足人間貴一曲菱歌敵萬金由是朱之詩名流於四海内矣出雲溪友議唐宣宗唐宣宗朝前進士陳玩等三人應博士宏詞所司考定名第及詩賦論上於延英殿詔中書舍人李藩等問曰凡考試之中重用字如何藩對曰賦忌偏枯庸雜論則褒貶是非詩則緣題落韻緣題如白雲起封中詩云封中白雲起是也其間重用文字乃是庶幾亦非有常例也又曰孰詩重用字對曰錢起湘靈鼓瑟詩云善撫雲和瑟嘗聞帝子靈馮夷空自舞楚客不堪聼逸韻諧金石清音發杳㝠蒼梧來怨慕白芷動芳馨流水傳湘浦悲風過洞庭曲終人不見江上數峯青中有二不字上曰錢起雖重用字他詩似不及起雖謝朓云洞庭張樂地瀟湘帝子遊雲去蒼梧遠水還江漢流之篇無以比也其宏詞詩重用字者登科起詩便付史𨕖出雲溪友議又宣宗因重陽賜宴羣臣有御製詩其略曰欵塞旋征騎和戎委廟賢傾心方倚注叶力共安邉宰臣以下應制皆和上曰宰相魏謩詩最出其兩聨云四方無事去神豫杪秋來八水寒光起千山霽色開上嘉賞久之魏蹈舞拜謝羣寮聳視魏有徳色極歡而罷出抒情詩温庭筠唐温庭筠字飛卿舊名岐與李商隱齊名時號温李才思艶麗工於小賦毎入試押官韻作賦凡八义手而八韻成多為鄰鋪假手號曰救數人也而士行有􅆙搢紳薄之李義山謂曰近得一聨句云遠比趙公三十六年宰輔未得偶句温曰何不云近同郭令二十四考中書宣宗嘗賦詩上句有金歩揺未能對遣未第進士對之庭筠乃以玉條脱續之宣宗賞焉又有藥名白頭翁温以蒼耳子為對他皆此𩔖也宣帝愛唱菩薩蠻詞丞相令狐綯假其新撰密進之戒令勿他泄而遽言於人由是疎之温亦有言云中書内坐將軍譏相國無學也宣皇好㣲行遇於逆旅温不識龍顏傲然而詰之曰公非長史司馬之流耶帝曰非也又曰得非六參簿尉之𩔖耶帝曰非也謫為方城尉其制詞曰孔門以德行為先文章為末爾既德行無取文章何以補焉徒負不羈之才罕有適時之用竟流落而死也豳國公杜悰自西川除淮海庭筠詣韋曲杜氏林亭留詩云卓氏爐前金線栁隋家堤畔錦帆風貪為兩地行霖雨不見池蓮照水紅豳公聞之遺絹千疋吳興沈徽云温曾於江淮為親表檟楚由是改名庭筠又毎嵗舉塲多為舉人假手侍郎沈詢知舉别施鋪席授庭筠不與諸公鄰比翌日於簾前謂庭筠曰向來䇿名者皆是文賦託於學士某今嵗塲中並無假託學士勉旃因遣之由是不得意也出北夢瑣言李商隱唐李商隱字義山為彭陽公令狐楚從事彭陽之子綯繼有韋平之拜似疎商隱未嘗展分重陽日商隱詣宅於㕔事上留題其略云十年泉下無消息九日樽前有所思郎君官重施行馬東閣無因許再窺相國覩之慚悵而已乃扄閉此㕔終身不處也出北夢𤨏言劉瑑唐劉瑑字子全㓜苦學能屬文才藻優贍大中初為翰林學士是時新復河湟邉上戎事稍繁㑹院中諸學士或多請告瑑獨當制一日連草詔百函筆不停綴詞理精當夜艾帝復詔至御前令草喻天下制瑑濡毫抒思頃刻而告就遲明詔對帝大嘉賞因而面賜金紫之服瑑以文學受知不數年卒至大用其吿喻制曰自昔皇王之有國也何嘗不文以守成武以集事參諸二柄歸於大寜朕猥荷丕圖思𢎞景業憂勤戒惕四載于兹毎念河湟土疆綿亘遐濶天寶末犬戎乘我多難無力禦姦遂縱腥羶不遠京邑事更十葉時近百年卿士獻能靡不竭其長䇿朝廷下議皆亦聼其直詞盡以不生邉事為永圖且守舊地為明理荏苒於是收復無由今者天地儲祥祖宗垂祐將士等櫛沐風雨暴露郊原披荆榛而刁斗夜嚴出豺狼而穹廬曉破動皆如意古無與京念此誠勤宜加寵賞詞不多載出鄭處誨所撰劉瑑碑鄭畋馬嵬佛堂楊妃縊所邇後才士經過賦詠以道其幽怨者不可勝紀皆以翠翹香鈿委於塵泥紅淒碧怨令人傷悲雖調苦詞清無逃此意也丞相鄭畋為鳳翔從事日題詩曰𤣥宗廻馬楊妃死雲雨雖亡日月新終是聖朝天子事景陽宫井又何人觀者以為真輔國之句出闕史司空圖唐晉國公裴度討淮西題名於華嶽廟之闕門後司空圖題詩紀之曰嶽前大隊赴淮西從此中原息戰鼙石闕莫教苔蘚上分明認取晉公題出摭言髙蟾唐髙蟾詩思雖清務為竒險意疎理寡實風雅之罪人薛能謂人曰儻見此公欲贈其掌然而落第詩曰天上碧桃和露種日邉紅杏倚雲栽芙蓉生在秋江上不向東風怨未開蓋守寒素之分無躁競之心公卿間許之先是胡曾有詩云翰苑何曾休嫁女文昌早晩罷生兒上林新桂年年發不許平人折一枝羅隱亦多怨刺當路子弟忌之由是蟾獨䇿名也前軰李賀歌篇逸才竒險雖然嘗疑其無理杜牧有言長吉若使稍加其理即奴僕命騷人可也是知通論不相遠也出北夢瑣言太平廣記卷一百九十九
