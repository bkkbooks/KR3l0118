body:
  text: 太平廣記卷三百二十二宋李昉等編鬼七陶侃謝尚襄陽軍人吕順庾崇曹公船王志都唐邦王矩周義袁乞王坦之劉遁王思規華逸張君林蠻兵陳臯袁無忌新蔡王昭平逺學諸生陶侃陶侃字士行曾如厠見數十人悉持大印有一人單衣平上幘自稱後帝云君長者故出見三載勿言富貴至極侃便起旋失所在有大印作公字當其穢所雜五行書曰厠神曰後帝也出異苑謝尚夏侯𢎞自云見鬼與共言語鎮西謝尚所乗馬忽死憂惱甚至謝曰卿若能令此馬生者卿真爲見鬼也𢎞去良久還曰廟神樂君馬故取之當活尚對死馬坐須臾馬忽自門外走還至馬尸間便滅應時能動起行謝曰我無嗣是我一身之罰𢎞經時無所告曰頃所見小鬼耳必不能辨此源由後忽逢一鬼乗新車從十許人著青絲布袍𢎞前提牛鼻車中人謂𢎞曰何以見阻𢎞曰欲有所問鎮西將軍謝尚無兒此君風流令望不可使之絶祀車中人動容曰君所道正是僕兒年少時與家中婢通誓約不再婚而違約今此婢死在天訴之是故無兒𢎞具以告尚曰吾少時誠有此事𢎞於江陵見一大鬼提矛㦸有小鬼隨從數人𢎞畏懼下路避之大鬼過後捉得一小鬼問此何物曰殺人以此矛㦸若中心腹者無不輒死𢎞曰治此病有方否鬼曰以烏雞薄之即差𢎞又曰今欲何行也鬼曰當至荆揚二州爾時比户行心腹病無有不死者𢎞乃教人殺烏雞以薄之十不失八九今有中惡輒用烏雞薄之𢎞之由也出志怪錄襄陽軍人晉太元初苻堅遣將楊安侵襄陽其一人於軍中亡有同鄉人扶喪歸明日應到家死者夜與婦夢云所送者非我尸倉樂面下者是也汝昔爲吾作結髮猶存可解看便知迄明日送喪者果至婦語母如此母不然之婦自至南豐細撿他家尸髮如先分明是其手迹出幽明錄吕順吕順喪婦更娶妻之從妹因作三墓搆累垂就輒無成一日順晝臥見其婦来就同寢體冷如冰順以死生之隔語使去後婦又見其妹怒曰天下男子復何限汝乃與我共一壻作冢不成我使然也俄而夫婦俱殪出幽明錄庾崇庾崇者建元中於江州溺死爾日即還家見形一如平生多在妻樂氏室中妻初恐懼每呼諸從女作伴於是作伴漸疎時或暫来輒恚罵云貪與生者接耳反致疑惡豈副我歸意耶從女在内紡績忽見紡績之具在空中有物撥亂或投之於地從女怖懼皆去鬼即常見有一男纔三歲就母求食母曰無錢食那可得鬼乃悽愴撫其兒頭曰我不幸早世令汝窮乏愧汝念汝情何極也忽見將二百錢置妻前云可爲兒買食如此經年妻轉貧苦不立鬼云卿既守節而貧苦若此直當相迎耳未㡬妻得疾亡鬼乃寂然出幽明錄曹公船濡須口有大船船覆在水中水小時便出見長老云是曹公船常有漁人夜宿其旁以船繋之但聞竽笛絃歌之音又香氣非常漁人始得眠夢人驅遣云勿近官妓傳云曹公載妓船覆於此至今在焉出廣古今五行記王志都馬仲叔王志都並遼東人也相知至厚叔先亡後年忽形見謂曰吾不幸早亡心恒相念念卿無婦當爲卿得婦期至十一月二十日送詣卿家但埽除設牀席待之至日都密埽除施設天忽大風白日晝昏向暮風止寢室中忽有紅帳自施發視其中牀上有一婦花媚莊嚴臥牀上纔能氣息中表内外驚怖無敢近者唯都得往須臾便蘇起坐都問卿是誰婦曰我河南人父爲清河太守臨當見嫁不知何由忽然在此都具語其意婦曰天應令我爲君妻遂成夫婦往詣其家大喜亦以爲天相與也遂與之生一男後爲南郡太守出幽明錄唐邦恒山唐邦義熈中聞扣門者出視見兩朱衣吏云官欲得汝遂將至縣東岡殷安冢中冢中有人語吏云本取唐福何以濫取唐邦敕鞭之遣將出唐福少時而死出異苑王矩衡陽太守王矩爲廣州矩至長沙見一人長丈餘著白布單衣將奏在岸上呼矩奴子過我矩省奏爲杜靈之入船共語稱敘希闊矩問君京兆人何時發来答矩朝發矩怪問之杜曰天上京兆身是鬼見使来詣君耳矩大懼因求紙筆曰君必不解天上書乃更作折卷之從矩求一小箱盛之封付矩曰君今毋開比到廣州可視耳矩到數月悁悒乃開視書云令召王矩爲左司命主簿矩意大惡因疾卒出幽明錄周義汝南周義取沛國劉旦孫女爲妻義豫章艾縣令弟路中得病未至縣十里義語弟必不濟便留家人在後先與弟至縣一宿死婦至臨尸義舉手别婦婦爲梳頭因復拔婦釵殮訖婦房宿義乃上牀謂婦曰與卿共事雖淺然情相重不幸至此兄不仁離隔人室家終沒不得執别實爲可恨我向舉手别又拔卿釵因欲起人多氣逼不果自此每夕来寢息與平生無異出述異記袁乞吳興袁乞妻臨亡把乞手云我死君再婚否乞曰不忍後遂更娶白日見其婦語云君先結誓何爲負言因以刀割隂雖不致死人理永廢也出異苑王坦之沙門竺法師㑹稽人與北中郎王坦之周旋甚厚共論死生罪福報應之事茫昧難明因便共要若有先死當相報語後王於廟中忽見法師来曰貧道以某月日命過罪福皆不虚應若影響檀越當勤修道徳以升躋神明耳先與君要先死者相報故来相語言訖不復見出續搜神記劉遁安帝義熈中劉遁母憂在家常有一鬼来住遁家搬徙牀几傾覆器物歌哭罵詈好道人之隂私僕役不敢爲非遁令弟守屋遁見繩繋弟頭懸著屋梁狼狽下之因失魂踰月乃差遁毎爨欲熟輒失之遁宻市野葛煑作糜鬼復竊之於屋北乃聞吐聲從此寂滅故世傳劉遁藥鬼遁後爲劉毅參軍爲宋髙祖所殺出廣古今五行記王思規長沙王思規爲海鹽令忽見一吏思規問是誰吏云命召君爲主簿因出版置牀前吏又曰期限長逺在十月若不信我到七月十五日日中時視天上當有所見思規敕家人至期看天聞有哭聲空中見人垂旐羅列狀如送葬出甄異錄華逸廣陵華逸寓居江陵亡後七年来還初聞語聲不見其形家人苦請求得見之答云我困悴未忍見汝問其所由云我本命雖不長猶應未盡坐平生時罰撻失道又殺卒反奴以此減算云受使到長沙還當復過如期果至教其二子云我既早亡汝等當勤自勗勵門户淪沒豈是人子又責其兄不垂教誨色甚不平乃曰孟禺已名配死錄正餘百日限耳爾時禺氣强力壯後到所期暴亡出甄異錄張君林吳縣張君林居東鄉楊里隆安中忽有鬼来助驅使林原有舊藏器物中破甑已無所用鬼使撞甕底穿為甑比家人起飯已熟此鬼無他須唯啗甘蔗自稱髙褐或云此鬼爲反器髙褐者葛號丘壟累積尤多古冢疑此物是其鬼也林毎獨見之形如少女年可十七八許面青黒色遍身青衣乃令林家取白甖盛水覆頭明旦視之有物在中林家素貧遂致富嘗語毋惡我日月盡自去後果去出甄異錄蠻兵南平國蠻兵義熈初隨衆來姑熟便有鬼附之聲呦呦細長或在簷宇之際或在庭樹上若占言凶輒先索琵琶隨彈而言於時郄倚爲府長史問當遷官云不久持節也尋爲南蠻校尉轉爲國郎中親領此土荆州俗語云是老鼠所作名曰鬼侯出靈鬼志陳臯平原陳臯於義熈中從廣陵樊梁後乗船出忽有一赤鬼長可丈許首戴絳冠形如鹿角就臯求載倐爾上船臯素能禁氣因歌俗家南地之曲鬼乃吐舌張眼以杖竿擲之即四散成火照於野臯無幾而死出靈鬼志袁無忌晉陳國袁無忌寓居東平永嘉初得疫癘家百餘口死亡垂盡徙避大宅權住田舎有一小屋兄弟共寢板牀薦席數重夜眠及曉牀出在户外宿昔如此兄弟怪怖不能得眠後見一婦人来在户前知忌等不眠前却户外時未曙月明共窺之綵衣白粧頭上有花插及銀釵象牙梳無忌等共逐之初繞屋走而倒頭髻及花插之屬皆墮無忌悉拾之仍復出門南走臨道有井遂入其中無忌還眠天曉視花釵牙梳並是真物遂壊井得一楸棺俱已朽壊乃易棺并服遷於髙燥處葬之遂斷出志怪錄新蔡王昭平晉世新蔡王昭平犢車在㕔事上夜無故自入齋室中觸壁而後出又數聞呼噪攻擊之聲四面而來昭乃聚衆設弓弩戰鬭之備指聲弓弩俱發而鬼應聲接矢數枚皆倒入土中出搜神記逺學諸生有諸生逺學其父母夜作兒忽至歎息曰今我但魂魄耳非復生人父母問之兒曰此月初病以今日某時亡今在琅邪任子成家明日當殮来迎父母父母曰去此千里雖復顛倒那得及汝兒曰外有車乗但乗之自得至矣父母從之上車忽若睡比雞鳴已至所在視其駕乗但魂車木馬遂與主人相見臨兒悲哀問其疾消息如其言出續搜神記太平廣記卷三百二十二
