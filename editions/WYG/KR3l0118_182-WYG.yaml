body:
  text: 太平廣記卷一百八十二貢舉五崔蠡盧肇丁稜顧非熊李徳裕張濆宣宗盧渥劉蛻苗台符張讀許道敏崔殷夢顔標温庭筠盧彖翁彦樞劉虚白封定卿馮藻趙琮崔蠡唐崔蠡知制誥日丁太夫人憂居東都里第時尚清苦儉嗇四方寄遺茶藥而已不納金帛故朝賢家不異寒素雖名姬愛子服無輕細崔公卜兆有期居一日宗門士人有謁請于蠡者閽吏拒之告曰公居喪未嘗見他客乃曰某崔家宗門子弟又知尊夫人有卜逺之日願一見公公聞之延入與語直云知公居縉紳間清且約太夫人喪事所須不能無費某以辱孫姪之行又且貲用稍給願以錢三百萬濟公大事蠡見其慷慨深竒之但嘉納其意終却而不受此人調舉久不第亦頗有屈聲蠡未㡬服闋拜尚書右丞知禮部貢舉此人就試蠡第之為狀元衆頗驚異謂蠡之主文以公道取士崔之獻藝由善價成名一第則可矣首冠未為得以是人有吿於蠡者答曰崔某固是及第人但狀頭是某私恩所致耳具以前事告之於是中外始服名益重焉出芝田錄盧肇李徳裕抑退浮薄奬拔孤寒於時朝貴朋黨徳裕破之由是結怨而絶於附㑹門無賔客唯進士盧肇宜春人有竒才徳裕嘗左宦宜陽肇投以文卷由此見知後隨計京師毎謁見待以優禮舊例禮部放榜先呈宰相㑹昌三年王起知舉問徳裕所欲答曰安用問所欲為如盧肇丁稜姚鵠豈可不與及第邪起於是依其次而放出玉泉子丁稜盧肇丁稜之及第也先是放牓訖則須謁宰相其導啓詞語一出榜元者俯仰疾徐尤宜精審時肇首冠有故不至次乃稜也稜口吃又形體小陋迨引見即俛而致詞意本言稜等登科而稜赬然發汗鞠躬移時乃曰稜等登稜等登竟不能發其後語而罷左右皆笑翌日友人戯之曰聞君善筝可得聞乎稜曰無之友人曰昨日聞稜等登稜等登非筝聲耶出玉泉子顧非熊顧非熊况之子滑稽好辯凌轢氣焰子弟為衆所怒非熊既為所排在舉塲垂三十年屈聲聒人耳㑹昌中陳商放牓上怪無非熊名召有司追牓放及第時天下寒進皆知勸矣詩人劉得仁賀詩曰愚為童稚時已解念君詩及得髙科晚須逢聖主知出摭言李徳裕李徳裕以己非由科第恒嫉進士舉者及居相位貴要束手徳裕嘗為藩府従事日同院李評事以詞科進適與徳裕官同時有舉子投文軸誤與徳裕舉子既誤復請之曰某文軸當與及第李評事非與公也由是徳裕志在排斥出玉泉子張濆張濆㑹昌五年陳商下狀元及第翰林覆落濆等八人趙渭南貽濆詩曰莫向春風訴酒杯謫仙真箇是仙才猶堪與世為祥瑞曾到􅅫山頂上來出摭言宣宗宣宗酷好進士及第毎對朝臣問及第茍有科名對者必大喜便問所試詩賦題目并主司姓名或有人物稍好者偶不中第嘆惜移時常於内自題鄉貢進士李道龍出盧氏雜說盧渥唐陜州廡使盧渥在舉塲甚有時稱曾於滻水逆旅遇宣宗皇帝㣲行意其貴人斂身迴避帝揖與相見乃自稱進士盧渥帝請詩卷袖之乘驢而去他日對宰臣語及盧渥令主司擢第渥不自安恐僭冒之辱宰相問渥與主上有何階緣渥乃具陳因由時亦不以為忝葢事業亦得之矣渥後自廉察入朝知舉遇黄寇犯闕不及終塲趙崇大夫戯之曰出腹不生養主司也然盧家未嘗知舉盧相􅂝恥之拔為主文章不果也出北夢𤨏言劉蛻荆南解比號天荒大中四年劉蛻以是府解及第時崔鉉作鎮以破天荒錢七十萬資蛻蛻謝書略曰五十年來自是人廢一千里外豈曰天荒出摭言苗台符張讀苗台符六嵗能屬文聰悟無比十餘嵗博覽羣籍著皇心三十卷年十六及第張讀亦幼擅詞賦年十八及第同年進士又同佐鄭薫少師宣州幕二人常列題於西明寺東廊或竊注之曰一雙前進士兩箇阿孩兒台符十七不祿讀位至禮部侍郎出摭言許道敏許道敏隨鄉薦之初獲知於時相是冬主文者將蒞事於貢院謁於相門相大稱其卓苦藝學宜在公𨕖主文受命而去許潛知其旨則磨礪以須屈指試期大掛人口俄有張希復員外結婚於丞相竒章公之門親迎之夕辟道敏為儐道敏乘其喜氣縦酒飛章搖珮髙譚極歡而罷無何時相敷奏不稱旨移秩他郡人情恐異主文不敢第於甲乙自此晦昧􅇄坎不復振舉繼丁家故􅂷二十載至大中六年崔璵知舉方擢於上科時有同年張讀一舉成事年十有九乃道敏敗於垂成之冬儐導張希復之子牛夫人所生也出唐闕史崔殷夢崔殷夢宗人瑶門生也夷門節度使龜従之子同年首冠於壤壤白瑤曰夫一名男子飾身世以為美他不可以等將也近嵗闗試内多以假為名求適他處甚無謂也今乞侍郎不可循其舊轍瑶大以為然一日壤等率集同年詣瑤起居既坐瑶笑謂壤等曰昨得大梁相公書且欲崔先輩一到駿馬健僕徃復當不至稽滯幸諸先輩畱意壤以坐主之命無如之何出玉泉子顔標鄭侍郎薰主文舉人中有顔標者薰誤謂是魯公之後時徐方未寕志在激勸忠烈即以標為狀元及謝恩日従容問及廟院標曰標寒進也未嘗有廟院薫始大悟塞黙而已尋為無名子所嘲曰主司頭腦太冬烘錯認顔標作魯公出摭言温庭筠温庭筠燈燭下未嘗起草但籠袖凭几毎賦一韻一吟而已故塲中號為温八吟出摭言盧彖崔沆及第年為主罰錄事同年盧彖俯近關讌堅請假徃洛下拜慶既而淹緩久之及同年讌於曲江亭子彖以雕幰載妓㣲服嚲鞚縦觀於側遽為團司所發沆判之略曰深􅍴席帽宻映氊車紫陌尋春便隔同年之面青雲得路可知異日之心出摭言翁彦樞翁彦樞蘇州人應進士舉有僧與彦樞同鄉里出入故相國裴公坦門下以其年耄優惜之雖中門内亦不禁其出入手持貫珠閉目以誦佛經非寢食未嘗輟也坦主文柄入貢院子勛質日議牓于私室僧多處其間二子不之虞也其擬議名氏迨與奪進退僧悉熟之矣歸寺而彦樞訪焉僧問彦樞將來得失之耗彦樞具對以無有成遂狀僧曰公成名須第㡬人彦樞謂僧戯已答曰第八人足矣即復徃裴氏之家二子所議如初僧忽張目謂之曰侍郎知舉邪郎君知舉邪夫科第國家重事朝廷委之侍郎意者欲侍郎剗革前弊孤平得路今之與奪率由郎君侍郎寕偶人邪且郎君所與者不過權豪子弟未嘗以一平人藝士議之郎君可乎即屈其指自首至末不差一人其豪族私讎曲折畢中二子所諱勛等大懼即問僧所欲且以金帛啗之僧曰貧僧老矣何用金帛為有鄉人翁彦樞者徒要及第耳勛等曰即列在丙科僧曰非第八人不可也勛不得已許之僧曰與貧僧一文書來彦樞其年及第竟如其言出玉泉子劉虚白劉虚白與裴坦早同硯席坦主文虚白猶是舉子試雜文日簾前獻一絶句云二十年前此夜中一般燈燭一般風不知嵗月能多少猶著麻衣待至公孟棨年長於魏公放牓日棨出行曲謝沆泣曰先輩吾師也沆泣棨亦泣棨出入塲籍三十年長孫籍與張公舊交公兄呼籍公嘗諷其改圖籍曰朝聞道夕死可矣出摭言封定卿大中後進士尤盛封定卿丁茂珪舉子與其交者必先登第而二公各二十舉方成名何進退之相懸也先是李都崔雍孫瑝鄭嵎四君子蒙其眄睞者因是進昇故曰欲得命通問瑝嵎都雍出北夣瑣言馮藻唐馮藻常侍宿之子涓之叔父世有科名藻文彩不髙酷愛名第已十五舉有相識道士謂曰某曾入静觀之此生無名第但有官職也亦未之信更應十舉已二十五舉矣姻親勸令罷舉且謀官藻曰譬如一生無成更誓五舉無成遂三十舉方就仕宦厯卿監峽牧終於騎省出北夢𤨏言趙琮趙琮妻父為鍾陵大將琮以久隨計不第窮悴甚妻族益相薄雖妻父母不能不然也一日軍中髙㑹州郡謂之春設者大將家相率列棚以觀之其妻雖貧不能無徃然所服故敝衆以帷隔絶之設方酣廉使忽馳吏呼將將驚且懼既至廉使臨軒手持一書笑曰趙琮得非君子壻乎曰然乃告之適報至已及第矣即授所持書乃牓也將遽以榜歸呼曰趙即及第矣妻之族即撤去帷障相與同席競以簪服而慶遺焉出玉泉子太平廣記卷一百八十二
