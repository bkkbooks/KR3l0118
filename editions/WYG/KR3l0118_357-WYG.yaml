body:
  text: 太平廣記卷三百五十七宋李昉等編夜义二東洛張生薛淙邱濡陳越石張融藴都師東洛張生牛僧孺任伊闕縣尉有東洛客張生應進士舉携文往謁至中路遇暴雨雷雹日已昏黒去店尚逺歇於樹下逡巡雨定微月遂解鞍放馬張生與僮僕宿於路側困倦甚昏睡良乆方覺見一物如夜义長數丈拏食張生之馬張生懼甚伏於草中不敢動纔訖又取其驢驢將盡遽以手拽其從奴提兩足裂之張生惶駭甚狼狽走野义隨後呌呼詬罵里餘漸不聞路抵大塜塜畔有一女立張生連呼救命女人問之具言事女人曰此是古塜内空無物後有一孔郎君且避之不然不免矣張生遂尋塜孔投身而入内至深良久亦不聞聲須臾覺月轉明忽聞塜上有人語推一物便聞血腥氣視之乃死人也身首皆異矣少頃又推一人至於數四皆死者也既訖聞其上分錢物衣服聲乃知是劫賊其帥且唱曰某色物與某乙某衣某錢與某乙都唱十餘人姓名又有言不平相怨怒者乃各罷去張生恐懼甚將出復不得乃熟念其賊姓名記得五六人至明鄉村有尋賊者至墓旁覩其血乃圍墓掘之覩賊所殺人皆在其中見生驚曰兼有一賊墮於墓中乃持出縳之張生具言其事皆不信曰此是劫賊殺人送於此偶墮下耳笞撃數十乃送於縣行一二里見其從奴驢馬鞍䭾悉至張生驚問曰何也從者曰昨夜困甚於路傍睡着至明不見郎君故此尋求張生乃説所見從者曰皆不覺也遂送至縣牛公先識之知必無此乃為保明張生又記劫賊數人姓名言之於令令遣捕捉盡獲之遂得免究其意乃神物寃魄假手於張生以擒賊耳出逸史薛淙前進士薛淙元和中遊河北衛州界村中古精舍日暮欲宿與數人同訪主人僧主人僧㑹不在唯聞庫西黒室中呻吟聲迫而視見一老僧病鬚髮不剪如雪狀貌可恐淙乃呼其侣曰異哉病僧僧怒曰何異耶少年子要聞異乎病僧略為言之淙等曰唯唯乃曰病僧年二十時好遊絶國服藥休糧北至居延去海三五十里是日平明病僧已行十數里日欲出忽見一枯立木長三百餘丈數十圍而其中空心僧因根下窺之直上其明通天可容人病僧又北行數里遥見一女子衣緋裙跣足袒􅈩被髮而走其疾如風漸近女人謂僧曰救命可乎對曰何也云後有人覓但言不見恩至極矣須臾遂入枯木中僧更行三五里忽見一人乗甲馬衣黄金衣備弓劍之器奔跳如電毎歩可三十餘丈或在空或在地歩驟如一至僧前曰見某色人否僧曰不見又曰勿藏此非人乃飛天夜义也其黨數千相繼諸天傷人已八十萬矣今已並擒戮唯此乃尤者也未獲昨夜三奉天帝命自沙吒天逐來至此已八萬四千里矣如某之使八千人散捉此乃獲罪於天師無庇之爾僧乃具言須臾便至枯木所僧返歩以觀之天使下馬入木窺之却上馬騰空繞木而上人馬可半木已來見木上一緋㸃走出人馬逐之去七八丈許漸入霄漢沒於空碧中久之雨三數十㸃血意已為中矢矣此可以為異少年以病僧為異無乃陋乎出博異𫝊丘濡博士丘濡説汝州傍縣五十年前村人失其女數嵗忽自歸言初被物寐中牽去倐止一處及明乃在古塔中見美丈夫謂曰我天人分合得汝為妻自有年限勿生疑懼且誡其不窺外也日兩返下取食有時炙餌猶熱經年女伺其去竊窺之見其騰空如飛火􅄠藍膚磔耳如驢及地方乃復人焉女驚怖汗洽其物返覺曰爾固窺我我實夜义與爾有縁終不害爾女素慧謝曰我既為君妻豈有惡乎君既靈異何不居人間使我時見父母乎其物言我罪業或與人雜處則疫作今形跡已露任爾縱觀不久當歸爾也其塔去人居止甚近女常下視其物在空中不能化形至地方與人雜或有白衣塵中者其物歛手則避或見枕其頭唾其面者行人悉若不見及歸女問之向者君街中有敬之者有戲狎之者何也物笑曰世有吃牛肉者予得而欺矣遇忠直孝飬釋道守戒律法籙者吾悞犯之當為天戮又經年忽悲泣語女縁已盡候風雨送爾歸因授一青石大如雞卵言至家可磨此服之能下毒氣後一夕風雨其物遽持女曰可去矣如釋氏言屈伸臂項已至其家墜在庭中其母因磨石飲之下物如青泥斗餘出酉陽雜俎陳越石潁州陳越石初名黄石郊居于王屋山下有妾張氏者元和中越石與張氏俱夜食忽聞燭影後有呼吸之聲甚異已而出一手至越石前其手青黒色指短爪甲纎長有黄毛連臂似乞食之狀越石深知其怪惡而且懼乆之聞燭影下有語我病飢故來奉謁願以少肉致掌中幸無見阻越石即以少肉投于地其手即取之而去又曰此肉味甚美食訖又出手越石前越石怒罵曰妖鬼何為輒來宜疾去不然且撃之得無悔耶其手即引去若有所懼俄頃又出其手至張氏前謂張曰女郎能以少肉見惠乎越石謂張氏曰慎無與張氏竟不與久之忽於燭影旁出一面乃一夜义也赤髮蓬然兩目如電四牙若鋒刃之狀甚可懼以手撃張氏遽仆於地㝠然不能動越石有膽勇即起而逐之夜义遂走不敢囘視明日窮其跡於垣上有過踪越石曰此物今夕將再來矣於是至夜持杖立東北垣下以伺之僅食頃夜义果來既踰墻足未及地越石即以杖連撃數十及夜义去以燭視其垣下血甚多有皮尺餘亦在地葢撃而墮者自是張氏病愈至夕聞數里外有呼者曰陳黄石何為不歸我皮也連呼不止僅月餘毎夕嘗聞呼聲越石度不可禁且惡其見呼於是遷居以避之因改名越石元和十五年登第進士至㑹昌二年卒於藍田令出宣室志張融渤海張融字眉嵎晉咸寕中子婦産男初不覺有異至七嵗聰慧過人融曽將看射令人拾箭還恒苦遲融孫云自為公取也後射纔發便赴遂與箭俱至棚倐已捉矢而歸舉坐怪愕還經再宿孫忽暴病而卒將殯呼諸沙門燒香有一胡道人謂云君速歛此孫是羅刹鬼也當噉害人家既見取箭之事即狼狽闔棺須臾聞棺中有撲擺聲咸輟悲駭愕遽送葬埋後數形見融作八闗齋於是便去出宣騐記藴都師經行寺僧行藴為其寺都僧嘗及初秋將備盂蘭㑹洒掃堂殿齊整佛事見一佛前化生姿容妖冶手持蓮花向人似有意師因戲謂所使家人曰世間女人有似此者我以為婦其夕歸院夜未分有欵扉者曰蓮花娘子來藴都師不知悟也即應曰官家法禁極嚴今寺門已閉夫人何從至此既開門蓮花及一從婢妖資麗質妙絶無倫謂藴都師曰多種中無量勝因常得親奉大圓正智不謂今日聞師一言忽生俗想今已謫為人當奉執巾鉢朝來之意豈遽忘耶藴都師曰某信愚昧常獲僧戒素非省相識何嘗見夫人遂相紿也對曰師朝來佛前見我謂家人曰儻貌𩔖我將以為婦言猶在耳我感師此言誠願委質因自袖中出化生曰豈相紿乎藴師悟非人廻惶之際蓮花即顧侍婢曰露仙可備帷幄露仙乃陳設寢處皆極華美藴雖駭異然心亦喜之謂蓮花曰某便誓心矣但以僧法不容久居寺舍如何蓮花大笑曰某天人豈凡識所及且終不以累師遂綢繆敘語詞氣清婉俄而滅燭童子等猶潛聽伺之未食頃忽聞藴失聲寃楚頗極遽引燎照之至則拒户闥禁不可發但聞狺牙齧詬嚼骨之聲如胡人語音而大罵曰賊秃奴遣爾辭家剃髮因何起妄想之心假如我真女人豈嫁與爾作婦耶於是馳告寺衆壊垣以窺之乃二夜义也鋸牙植髮長比巨人哮呌拏獲騰踔而出後僧見佛座壁上有二畫夜义正𩔖所覩脣吻間猶有血痕焉出河東記太平廣記卷三百五十七
