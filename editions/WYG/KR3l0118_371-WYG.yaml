body:
  text: 太平廣記卷三百七十一宋李昉等編精怪四雜器用獨孤彥姚康成馬舉吉州漁者凶器上梁氏曹惠竇不疑獨孤彥建中末有獨孤彦者嘗客於淮泗間會天大風舟不得進因泊於岸一夕步月登至一佛寺中寺僧悉赴里民會去彦步遶於庭俄有二丈夫來一人身甚長衣黑衣稱姓甲名侵許第五一人身廣而短衣青衣稱姓曾名元與彥揖而語其吐論𤣥微出於人表彦素耽竒奥常與方外士議語且有年矣至于𤣥門釋氏靡不窮其指歸乃遇二人則自以為不能加也竊竒之且將師焉因再拜請曰某好竒者今日幸遇先生願為門弟子其可乎二人謝曰何敢彦因徵其所自黑衣者曰吾之先本盧氏吾少以剛勁聞大凡物有滯而不通者必侵犯以許悟之時皆謂我為侵許因名之其後適野遇仇家擊斷遂易姓甲氏且逃其患又吾素精藥術嘗侍忝醫之職非不能精熟而升降上下即假手於吾後以年老力衰止欲以我為折腰吏吾固辭免退居田間吾有舅氏常為同僚其行止起居未嘗不俱然我自擯棄常思吾舅直以用舍殊致分不見矣今夕君子問我我得以語平生事幸何甚哉語罷曾元曰吾之先陶唐氏之後也唯唐陶之官受姓於姚曾者與子孫以字為氏故為曾氏焉我其後也吾早從萊候居推署之職職當要熱素以褊躁又當負氣以凌上由是遭下流沸騰之謗因而解棄蓋吾忠州之罪我自棄置處塵土之間且有年矣甘同瓦礫豈敢他望乎然自昔與吾父遭事吾父性堅正雖鼎鑊不避其危賙人之急必赴湯蹈火人亦以此重之今拘於舊職窘若囚繫余以父棄擲之故不近於父迨今亦數歲足下有問又安敢黙乎語未卒寺僧俱歸二人見之若有所懼即馳去數十步已亡見矣彦訊僧僧曰吾居此寺且久未嘗見焉懼為怪耳彦竒其才且異之因祈其名氏久而悟曰所謂曽元者豈非甑乎夫文以瓦附曾是甑字也名元者蓋以瓦中之畫致瓦字之上其義在矣甲侵許者豈非鐵杵乎且以午木是杵字姓甲者東方甲乙木也第五者亦假午字也推是而辯其杵字乎名侵許者蓋反其語為金截以截附金是鐵字也總而辯焉得非甑及鐵杵耶明日即命窮其跡果於朽壞中得一杵而鐵者又一甑自中分蓋用之餘者彦大異之盡符其解也出宣室志姚康成太原掌書記姚康成奉使之汧隴會節使交代入蕃使迴郵館塡咽遂假邢君牙舊宅設中室以為休息之所其宅久空廢庭木森然康成晝為公宴所牽夜則醉歸及明復出未嘗暫歇於此一夜自軍城歸早其屬有博戲之會故得不醉焉乃坐堂中因命茶又復召客客無至者乃令館人取酒徧賜僕使以慰其道路之勤既而皆醉康成就寢二更後月色如練因披衣而起出於宅門獨步移時方歸入院遙見一人入一廊房内尋聞數人飲樂之聲康成乃躡履而聽之聆其言語吟嘯即非僕夫也因坐於門側且窺伺之仍聞曰諸公知近日時人所作皆務一時巧麗其於託情喻已體物賦懷皆失之矣又曰今三人可各賦一篇以取樂乎皆曰善乃見一人細長而甚黑吟曰昔人炎炎徒自知今無烽竈欲何為可憐國柄全無用曾見人人下第時又見一人亦長細而黄面多瘡孔而吟曰當時得意氣填心一曲君前直萬金今日不如庭下竹風來猶得學龍吟又一人肥短鬂髮垂散而吟曰頭焦髮秃但心存力盡塵埃不復論莫笑今來同腐草曾經終日掃朱門康成不覺失聲大贊其美因推門求之則皆失矣俟曉召館吏詢之曰近並無此色人康心疑其必魅精也遂尋其處方見有鐵銚子一柄破笛一管一秃黍穰帚而已康成不欲傷之遂各埋於他處出靈怪集馬舉馬舉鎭淮南日有人携一碁局獻之皆飾以珠玉舉與錢千萬而納焉數日忽失其所在舉命求之未得而忽有一叟策杖詣門請見舉多言兵法舉遙坐以問之叟曰方今正用兵之時也公何不求兵機戰術而將禦寇讎若不如是又何作鎭之為也公曰僕且治疲民未暇於兵機戰法也幸先生辱顧其何以敎之老叟曰夫兵法不可廢也廢則亂生亂生則民疲民疲而治則非所聞曷若先以法治兵兵治而後將校精將校精而後士卒勇且夫將校者在乎識虚盈明向背冐矢石觸鋒刃也士卒者在乎赴湯蹈火出死入生不旋踵而一焉今公既為列藩連帥當有為帥之才不可曠職也舉曰敢問為帥之事何如叟曰夫為帥也必先取勝地次對於敵軍用一卒必思之於生死見一路必察之於出入至於衝關入劫雖軍中之餘事亦不可忘也仍有全小而捨大急殺而屢逃據其險地張其疑兵妙在急攻不可持疑也其或遲速未決險易相懸前進不能差須求活屢勝必敗愼在欺敵若深測此術則為帥之道畢矣舉驚異之謂叟曰先生何許人何學之深耶叟曰余南山木強之人也自幼好竒尚異人人多以為有韜玉含珠之舉屢經戰争故盡識兵家之事但乾坤之内物無不衰况六合之體殊不堅牢豈得更久耶聊得晤言一述兵家之要耳幸明公稍留意焉因遽辭公堅留延於客館至夜令左右召之見室内唯一碁局耳乃是所失之者公知其精怪遂令左右以古鏡照之碁局忽躍起墜地而碎似不能變化公甚驚異乃令盡焚之出瀟湘錄吉州漁者吉州龍興觀有巨鐘上有文曰晉元康年鑄鐘頂有一竅古老相𫝊則天時鐘聲震長安遂有詔鑿之其竅是也天祐年中忽一夜失鐘所在至旦如故見蒲牢有血痕并􅀢草􅀢草者江南水草也葉如薤隨水淺深而生觀前大江數夜居人聞江水風浪之聲至旦有漁者見江心有一紅旗水上流下漁者掉小舟往接取之見金鱗光耀波濤洶湧漁者急迴始知蒲牢鬭傷江龍出玉堂閒話㓙器上梁氏後魏洛陽阜財里有開善寺京兆人韋英宅也英早卒其妻梁不治䘮而嫁更納河内向子集為夫雖云改嫁仍居英宅英聞梁嫁白日來歸乘馬將數人至於庭前呼曰阿梁卿忘我也子集驚怖張弓射之應箭而倒即變為桃人所騎之馬亦化為茅馬從者數人盡為蒲人梁氏惶懼捨宅為寺出洛陽伽藍記曹恵武徳初有曹恵為江州參軍官舍有佛堂堂中有二木偶人長尺餘雕飾甚巧妙丹青剝落恵因持歸與稚兒後稚兒方食餅木偶引手請之兒驚報恵恵笑曰取木偶來即言曰輕素自有名何呼木偶於是轉盻馳走無異於人恵問曰汝何時物頗能作怪輕素與輕紅曰是宣城太守謝家俑偶當時天下工巧皆不及沈𨼆侯家老蒼頭孝忠也輕素輕紅即孝忠所造𨼆侯哀宣城無常葬日故有此贈時素壙中方持湯與樂夫人濯足聞外有持兵稱敕聲夫人畏懼跣足化為白螻少頃二賊執炬至盡掠財物謝郎持舒瑟瑟環亦為賊敲頤脫之賊人照見輕紅等曰二明器不惡可與小兒為戲具遂持出時天平二年也自爾流落數家陳末麥鐵杖猶子將至此恵又問曰曾聞謝宣成婚王敬則女爾何遽云樂夫人輕素曰王氏乃生前之妻樂氏乃𡨕婚耳王氏本屠酤種性麤率多力至㝠中猶與宣城不睦伺宣城嚴顏則磔石拄闗以為威脅宣城自密啓於天帝許逐之二女一男悉隨母歸矣遂再娶樂彦輔第八女美姿質善書好彈琴尤與殷東陽仲文謝荆州晦夫人相得日恣追尋宣城常云我才方古詞人唯不及東阿耳其餘文士皆吾杌中之肉可以宰割矣見為南曹典銓郎與潘黄門同列乘肥衣輕貴於生前百倍然十月一朝晉宋齊梁可以為勞近聞亦已停矣恵又問曰汝二人靈異若此吾欲捨汝如何即皆言曰以輕素等變化雖無不可君意如不放終不能逃廬山山神欲取輕素為舞姬久矣今此奉辭便當受彼榮富然君能終恩請命畫工便賜粉黛恵即令工人為圖之使摛錦繡輕素笑曰此度非論舞伎亦當彼夫人無以奉酬請以微言留别百代之中但以他人會者無不為忠臣居大位矣雞角入骨紫鶴喫黄䑕中不害五通泉室為六代吉昌後有人禱廬山神女巫言神君新納二妾要翠釵花簮汝宜求之當降大福禱者求而焚之遂如願焉恵亦不能知其微言訪之時賢皆不悟或云中書令岑文本識其三句亦不為人說出𤣥怪錄竇不疑武徳功臣孫竇不疑為中郎將告老歸家家在太原宅於北郭陽曲縣不疑為人勇有膽力少而任俠常結伴十數人鬭雞走狗摴蒲一擲數萬皆以意氣相期而太原城東北數里常有道鬼身長二丈毎陰雨昏黑後多出人見之或怖而死諸少年言曰能往射道鬼者與錢五千餘人無言唯不疑請行迨昏而往衆曰此人出城便潛藏而夜紿我以射其可信乎盍密隨之不疑既至魅所鬼正出行不疑逐而射之鬼被箭走不疑追之凡中三矢鬼自投于岸下不疑乃還諸人笑而迎之謂不疑曰吾恐子潛而紿我故密隨子乃知子膽力若此因授之財不疑盡以飲焉明日往尋所射岸下得一方相身則編荆也今京中方相編竹太原無竹用荆作之其傍仍得三矢自是道鬼遂亡不疑因從此以雄勇聞及歸老七十餘矣而意氣不衰天寶二年冬十月不疑往陽曲從人飲飲酣欲返主苦留之不疑盡令從者先獨留所乘馬昏後歸太原陽曲去州三舎不疑馳還其間則沙場也狐狸鬼火叢聚更無居人其夜忽見道左右皆為店肆連延不絶時月滿雲薄不疑怪之俄而店肆轉衆有諸男女或歌或舞飲酒作樂或結伴踏蹄有童子百餘人圍不疑馬踏蹄且歌馬不得行道有樹不疑折其柯長且大以擊歌者走而不疑得前又至逆旅復見二百餘人身長且大衣服甚盛來繞不疑踏蹄歌焉不疑大怒又以樹柯擊之長人皆失不疑恐以所見非常乃下道馳將投村野忽得一處百餘家屋宇甚盛不疑叩門求宿皆寂無人應雖甚呌擊人猶不出村中有廟不疑入之繫馬於柱據階而坐時朗月夜未半有婦人素服靚粧突門而入直向不疑再拜問之婦人曰吾見夫壻獨居故此相偶不疑曰孰為夫壻婦人曰公即其人也不疑知是魅擊之婦人乃去㕔房内有牀不疑息焉忽梁間有物墮於其腹大如盆盎不疑毆之則為犬音不疑自投牀下化為火人長二尺餘光明照耀入于壁中因爾不見不疑又出户乘馬而去遂得入林木中憇止天曉不能去會其家求而得之已疲且䘮魂矣舁之還猶說其所見乃病月餘卒出紀聞太平廣記卷三百七十一
