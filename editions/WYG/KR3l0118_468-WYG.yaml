  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_468-1a, image: WYG1046/WYG1046-0445a.png}
body:
  text: 太平廣記巻四百六十八宋李昉等編水族五魚子路長水縣姑蘇男子永康人王素費長房張福丁初謝非顧保宗武昌民寡婦嚴尹兒廣陵王女楊醜奴謝宗子路孔子厄於陳絃歌於舘中夜有一人長九尺餘皂衣高冠咤聲動左右子路引出與戰於庭即仆於地乃是大鯷魚也長九尺餘孔子嘆曰此物也何為来哉吾聞物老則羣精依之因衰而至此其来也豈以吾遇厄絶糧從者病乎夫六畜之物及龜蛇魚鼈草木之屬神皆能為祅怪故謂之五酉五行之方皆有其物酉者老也故物老則為怪矣殺之則已夫何患焉出捜神記長水縣秦時長水縣有童謡曰城門當有血則陷没為湖有老嫗聞之憂懼旦旦往窺焉門衛欲縛之嫗言其故嫗去後門衛殺犬以血塗門嫗又往見血走去不敢顧忽有大水長欲没縣主簿何幹入白令令見幹曰何忽作魚幹曰明府亦作魚矣遂淪陷為谷出神鬼傳姑蘇男子後漢時姑蘇有男子衣白衣冠幘容貎甚偉身長七尺眉目踈朗從者六七人遍歴人家姦通婦女晝夜不畏於人人欲掩捕即有風雨雖守郡有兵亦不敢制茍犯之者無不被害月餘術人趙杲在趙聞吳患泛舟遽来杲適下舟歩至姑蘇北堤上遥望此祅見路人左右奔避無所杲曰此呉人所患者也時㑹稽守送臺使遇亦避之於舘杲因謁焉守素知杲有術甚喜杲謂郡守曰君不欲見乎因請水燒香長嘯數聲天風歘至聞空中數十人響應杲擲手中符符去如風頃刻見此祅如有人持至者甚惶懼杲謂曰何敢幻惑不畏乃按劍曰誅之便有旋風擁出杲謂守曰可視之矣使未出門已報去此百歩有大白蛟長三丈斷首於路旁餘六七者皆身首異處亦黿鼉之𩔖也左右觀者萬餘人咸稱自此無患矣出三吳記永康人吳孫權時永康有人入山遇一大龜即逐之龜便言曰遊不良時為君所得人甚怪之載出欲上吳王夜泊越里纜舡於大桑𣗳宵中𣗳呼龜曰勞乎元緒奚事爾􅁘龜曰我被拘縶方見烹臛雖盡南山之樵不能潰我樹曰諸葛元遜博識必致相苦令求如我之徒計從安出龜曰子明無多辭禍將及爾𣗳寂而止既至權命煮之焚柴百車語猶如故諸葛恪曰燃以老桑方熟獻之人仍説龜樹共言權登使伐取煮龜立爛今烹龜猶多用桑薪野人故呼龜為元緒也出異苑王素吳少帝五鳯元年四月㑹稽餘姚縣百姓王素有室女年十四美貎鄰里少年求娶者頗衆父母惜而不嫁嘗一日有少年􅐾貎玉潔年二十餘自稱江郎願婚此女父母愛其容質遂許之問其家族云居㑹稽後數日領三四婦人或老或少者及二少年俱至素因持資財以為聘遂成婚媾已而經年其女有孕至十二月生下一物如絹囊大如升在地不動母甚怪異以刀剖之悉白魚子素因問江郎所生皆魚子不知何故素亦未語江郎曰我所不幸故産此異物其母心獨疑江郎非人因以告素素宻令家人候江郎解衣就寢収其所著衣視之皆有鱗甲之狀素見之大駭命以巨石鎮之及曉聞江郎求衣服不得異常詬罵尋聞有物􅅯踣聲震於外家人急開户視之見牀下有白魚長六七尺未死在地撥剌素砍斷之投江中女後别嫁出三吳記費長房汝南有妖常作太守服詣府門椎鼓郡患之及費長房来知是魅乃呵之即解衣冠叩頭乞自改變為老鼈大如車輪長房令復就太守服作一札敕葛陂君叩頭流涕持札去視之以札立陂邊以頸繞之而死出列異傳張福鄱陽人張福舡行還野水邊忽見一女子甚有容色自乘小舟福曰汝何姓作此輕行無笠雨駛可入見就避雨因共相調遂入就福寢以所乘小舟繫福舡邊三更許雨晴明月福視婦人乃一大鼉欲執之遽走入水向小舟乃是一槎段長丈餘出捜神記丁初吳郡無錫有上湖大陂陂吏丁初天每大雨輒循隄防春盛雨初出行塘日暮間顧後有小婦人上下青衣戴青傘追後呼初掾待我初時悵然意欲留伺之復疑本不見此今忽有婦人冐隂雨行恐必鬼物初便疾行顧見婦人追之亦速初因急走去之轉遠顧視婦人乃自投陂中汜然作聲衣葢飛散視是大蒼獺衣􅏛皆荷葉也此獺化為人形數媚年少者也出搜神記謝非道士丹陽謝非往石城冶買釜還日暮不及家山中有廟舎於溪水上入中宿大聲語曰吾是天帝使者停此宿猶畏人劫奪其釜意苦搔搔不安夜二更中有来至廟門者呼曰何銅銅應諾廟中有人氣是誰銅云有人言是天帝使者少頃便還須臾又有来者呼銅問之如前銅答如故復嘆息而去非驚擾不得眠遂起呼銅問之先来者是誰銅答言是水邊穴中白鼉汝是何等物是廟北巖嵌中龜也非皆隂識之天明便告居人言此廟中無神但是龜鼉之輩徒費酒肉祀之急具鍤来共往伐之諸人亦頗疑之於是並㑹伐掘皆殺之遂壊廟絶祀自後安静出捜神記顧保宗顧保宗字世嗣江夏人也每釣魚江中嘗夏夜於草堂臨月未卧忽有一人􅂡髪皓然自稱為翁有如漁父直至堂下乃揖保宗便箕踞而坐唯哭而已保宗曰翁何至不語良乆謂保宗曰陸行甚困言不得速保宗曰翁適何至今何往答曰来自江州復歸江夏言訖又哭保宗曰翁非異人乎答曰我實非人以君閒退故来相話保宗曰野人漁釣用釋勞生何閒退之有答曰世方兵亂閒退何詞保宗曰今世清平亂當何有答曰君不見桓𤣥之志也保宗因問若是有兵可言歳月否翁曰今不是隆安五年耶保宗曰是又屈指復哭謂宗曰後年易號復一歲桓𤣥盜國盜國未幾為卯金所敗保宗曰卯金為誰答曰君當後識耳言罷復謂保宗曰不及二十稔當見大命變革保宗曰翁遠至何所食答曰請君常食保宗因命筆記之翁食訖謂保宗曰今夕奉使須向前江来日平旦幸願觀之又曰百里之中獨我偏異故驗災祥我等是也宗曰未審此言何以驗之答曰兵甲之兆也言訖乃出保宗送之於户外乃訣去及曉宗遂臨江觀之聞水風漸急魚皆出浪極目不知其數觀者相傳首尾百餘里其中有大白魚長百餘丈驤首四望移時乃没是歲隆安五年六月十六日也保宗大異之後二歲改隆安七年為元興元興二年十一月壬午桓𤣥果篡位三年二月建武將軍劉裕起義兵滅桓𤣥復晉安帝位後十七年劉裕受晉禪一如魚之所言出九江記武昌民宋髙帝永初中張春為武昌太守時有人嫁女未及升車女忽然失怪出外敺擊人仍云已不樂嫁巫云是邪魅將女至江際遂擊鼓以術呪療翌日有一青蛇来到坐所即以大釘釘頭至日中復見大龜從江来伏於巫前巫以朱書龜背作符遣入江至暮有大白鼉從江出乍沉乍浮龜隨後催逼鼉自分死冐来先入㡌與女辭訣慟哭云失其同好於是漸差或問魅者歸於一物今安得有三巫云蛇是傳通龜是媒人鼉是其對所獲三物悉殺之出廣古今五行記寡婦嚴建康大夏營寡婦嚴宋元嘉初有人稱華督與嚴結好街卒夜見一丈夫行造䕶軍府府在建陽門内街卒呵問答云我華督還府徑㳂西墻欲入街卒以其犯夜邀擊之乃變為鼉察其所出入處甚瑩滑通府中池池先有鼉窟歲乆因能為魅殺之遂絶出異苑尹兒安城民尹兒宋元嘉中父暫出令守舎忽見一人年可二十騎馬張斗繖從者四人衣並黄色從東方来於門呼尹兒求暫寄息因入舎中庭下坐胡牀一人捉繖覆之尹兒看其衣悉無縫五色爛斑似鱗甲而非毛也有頃雨將至此人上馬去顧語尹兒曰明當更来乃西行躡虚而昇須臾雲氣四合白晝為之晦暝明日大水暴至川谷沸湧丘壑淼漫將掩尹舎忽見大魚長三丈餘盤屈當水衝尹族乃免漂蕩之患出廣古今五行記廣陵王女沙門竺僧瑶得神呪猶能治邪廣陵王家女病邪瑶治之入門瞑目罵云老魅不念守道而干犯人女乃大哭云人殺我夫魅在其側曰吾命盡於今因歔欷又曰此神不可與事乃成老鼉走出庭中瑶令撲殺之也出志怪楊醜奴河南楊醜奴常詣章安湖拔蒲將瞑見一女子衣裳不甚鮮潔而容貎美乘船載蓴前就醜奴家湖側逼暮不得返乃停舟寄住借食器以食盤中有乾魚生菜食畢因戲笑醜奴歌嘲之女答曰家在西湖側日暮陽光頽託䕃遇良主不􅁴寛中懐俄滅火共寢􅁴其臊氣又手指甚短乃疑是魅此物知人意遽出户變為獺徑走入水出甄異志謝宗㑹稽王國吏謝宗赴假經吳臯橋同船人至市宗獨在船有一女子姿性婉娩来詣船因相為戲女即留宿歡讌乃求寄載宗許之自爾船人夕夕聞言笑後逾年往來彌數同房宻伺不見有人知是邪魅遂共掩被良乆得一物大如枕須臾又獲二物並小如拳視之乃是三龜宗悲思數日方悟向説如是云此女子一歲生二男大者名道愍小者名道興宗又云此女子及二兒初被索之時大怖形並縮小謂宗曰可取我枕投之時族叔道明為郎中令籠三龜示之出志怪太平廣記卷四百六十八
