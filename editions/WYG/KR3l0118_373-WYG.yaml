body:
  text: 太平廣記卷三百七十三宋李昉等編精怪六火賈躭劉希昂范璋胡榮楊稹盧郁劉威土馬希範火賈耽唐相賈耽退歸第急令召上東門卒至耽嚴戒之曰明日當午有異色人入門爾必痛擊之死且無妨門卒禀命自已至午果有二尼自東百步相序而至更無他異直至門其尼施朱傅粉冶容艷佚如倡人之婦其内服殷紅下飾亦紅二尼悉然卒計曰尼髠未之有也因以撾痛擊之傷腦流血呌號稱寃返走疾如奔馬旋擊又旋傷其足殆狼籍毁裂百步已上落草映樹已失所在更無蹤焉門卒報耽具述别無異色只遇二尼衣服容色之異耽曰打得死否具對傷腦折足痛楚殆極但打不死而失所在無可尋之耽歎曰然不免小有災矣翌日東市奏失火延袤百千家救之得止出芝田錄劉希昻元和中内侍劉希昻將遇禍家人上厠忽聞厠中云即來且從容家人驚報希昻希昻自往聽之又云即出來即出來昻曰何不出來遂有一小人可長尺餘一家持鎗跨馬而走出迅疾趂不可及出門而無所見未幾而復至七月十三日中忽有一白衣女人獨行至門曰緣遊看去家逺暫借後院盤旋可乎希昻令借之勒家人領過姿質甚分明良久不見出遂令人覘之已不見希昻不信自去觀之無所見唯有一火柴頭在厠門前家屬相謂曰恐及火災起覓術士鎭厭之當鎭厭日火從厨上發燒半宅且盡至冬希昻忤憲宗罪族誅出博異志范璋寶歴二年明經范璋居梁山讀書夏中深夜忽㕔厨中有拉物聲范慵省之至明見束薪長五寸餘齊整可愛積於竈上地上危累蒸餅五枚又一夜有物扣門因拊掌大笑聲如嬰兒如此經三夕璋素有膽氣乃乘其笑曵巨薪逐之其物狀如小犬連却擊之變成火滿川而滅出酉陽雜俎胡榮長慶元年春楚州淮岸屯官胡榮家有精物或𨼆或見或作小兒為著女人紅裙擾亂於人或稱阿姑時復一處火發所燒即少皆救得之三月火大起延燒河市營戍廬舎殆盡歲中胡榮亦死出祥異集檢楊稹進士楊稹家于渭橋以居處繁雜頗妨肄業乃詣照應縣長借石甕寺文殊院居旬餘有紅裳既夕而至容色姝麗姿華動人稹常悅者皆所不及徐步於簾外歌曰涼風暮起驪山空長生殿鏁霜葉紅朝來試入華清宫分明憶得開元中稹曰歌者誰􅁘何清苦之若是紅裳又歌曰金殿不勝秋月斜石樓冷誰是相顧人褰帷弔孤影稹拜迎於門既即席問稹之姓氏稹具告稹祖父母叔兄弟中外親族曾遊石甕寺者無不熟識稹異之曰得非鬼物乎對曰吾聞魂氣升於天形魄歸於地是無質矣何鬼之有曰又非狐狸乎對曰狐狸者接人矣一中其媚禍必能及某世業功徳實利生民某雖不淑焉能苟媚而欲奉禍乎稹曰可聞姓氏乎某燧人氏之苗裔也始祖有功烈於人乃統丙丁鎭南方復以徳王神農陶唐氏後又王於西漢因食采於宋逺祖無忌以威猛暴耗人不可親遂為白澤氏所執今樵童牧豎得以知名漢明帝時佛法東流摩勝竺法蘭二羅漢奏請某十四代祖令顯揚釋敎遂封為長明公魏武季年滅佛法誅道士而長明公幽死文成嗣位佛法重興復以長明世子襲之至開元初𤣥宗治驪山起至華清宫作朝元閣立長生殿以餘材因修此寺羣像既立遂設東幢帝與妃子自湯殿宴罷微行佛廟禮陁伽竟妃子謂帝曰當于飛之秋不當令東幢巋然無偶帝即日命立西幢遂封某為西明夫人因賜琥珀膏潤於肌骨設珊瑚帳固予形貌於是選生及蛾即不復彊暴矣稹曰歌舞絲竹四者孰妙曰非不能也蓋承先祖之明德禀炎上之烈性故奸聲亂色不入於心某所能者大則鑠金為五兵為鼎鼐鐘鏞小則化食為百品為炮燔烹灸動即煨山嶽而燼原野静則燭幽暗而破昏蒙然則撫朱絃咀玉管騁纎腰矜皓齒皆冶容之末事是不為也昨聞足下有幽𨼆之志籍甚既久願一欵顏由斯而來非敢自獻然宵清月朗喜覿良人桑中之譏亦不能恥儻運與時會少承周旋必無累於盛徳稹拜而納之自是晨去而暮還唯霾晦則不復至常遇風雨有嬰兒送紅裳詩其詞云煙滅石樓空悠悠永夜中虚心怯秋雨艷質畏飄風向壁殘花碎侵階墜葉紅還如失羣鶴飲恨在彫籠毎侵星請歸稹追而止之答曰公違晨夕之養就巖谷而居者得非求静専習文乎奈何欲使採過之人稱君違親而就偶一被瑕玷其能洗滌乎非但損公之盛名亦當速某之生命耳處半年家童歸告稹乳母母乃潛伏於佛榻俟明以觀之果自隙而出入西幢澄澄一燈矣因撲滅後遂絶紅裳者出纂異記盧郁進士盧郁者河朔人徙家長安嘗北遊燕趙遂客於内黃郡守館郁於廨舍先是其舍無居人及郁至見一姥髪盡白身庳而肥被素衣來謂郁曰妾僑居於此且久矣故相候謁已而告去是夕郁獨居堂之前夜深寒有風雪其姥又至謂郁曰貴客獨處何以為歡耶命坐語謂姥曰妾姓石氏家于華陰郡後隨吕御史者至此且四十年家苦貧幸貴客見哀於是郁命食而老姥卒不顧郁問之曰姑何為不食姥曰妾甚饑然不食粟以故壽而安郁好竒聞之甚喜且以為有道術者因問曰姑既不食粟何飽其腹耶豈常餌仙藥乎姥曰妾家於華陰先人好神仙廬於太華妾亦常𨼆於山中從道士學長生法道士敎妾吞火自是絶粒今已年九十矣未審一日有寒暑之疾郁又問曰某早歲常遇至人敎吸氣之術自謂竒妙後以奔走否利從都國之貢晝趨而夜息不意今夕遇姑語及平生之好然不知吞火豈神仙之旨乎姥曰子不聞至人寒暑不能侵者耶故入火火不能焚入水水不能溺如是則吞火固其宜也郁曰願觀姑吞火可乎姥曰有何不可哉於是以手採爐中火而吞之火且盡其色不動郁且驚且異遂起束帶再拜謝曰鄙野之人未嘗聞神仙事今夕遇仙姑以吞火之異實平生所未聞者姥曰此小術爾何足貴哉言訖且告去郁因降階送之既别郁遂歸於寢堂既寐有僕者告郁曰西廡下有火發郁驚起而視之其西廡舍已焚於是里中人俱至競以水沃之迨旦方絶及窮火發之跡於廡下坎中得一石火通中有火甚多先是有敗草積其上故延而至燒郁方悟老姥乃此火通耳果所謂姓石氏居于華山者也郁因質問吕御史有郡中老吏謂郁曰吕御史魏之從事也居此宅迨今四十年矣咸如老姥言也又青州濟南平陵城北石虎一夜自移城東南善石溝上有狼狐千餘迹隨之迹皆成路出宣室異錄記劉威丁夘歲廬州刺史劉威移鎭江西既去任而郡中大火廬候吏巡火甚急而往往有持火夜行者捕之不獲或射之殪就視之乃棺材板腐木敗帚之𩔖郡人愈恐數月除張宗為廬州刺史火災乃止出稽神錄土馬希範楚王馬希範修長沙城開濠畢忽有一物長十丈餘無頭尾手足狀若土山自北岸來游泳水上久之入南岸而没出入俱無蹤跡或謂之土龍無幾何而馬氏亡出稽神錄太平廣記卷三百七十三
