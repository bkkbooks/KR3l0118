  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_185-1a, image: WYG1044/WYG1044-0230c.png}
body:
  text: 太平廣記卷一百八十五銓選一蔡廓謝莊劉林甫張說溫彥博戴胄唐皎楊師道髙季輔薛元超楊思𤣥張仁禕裴行儉三人優劣劉奇狄仁傑鄭杲薛季昶鄧渇李至逺張文成鄭愔崔湜糊名蔡廓宋廢帝時以蔡廓為吏部尚書錄尚書徐羡之謂中書令傅亮曰黄門已下悉委蔡吾徒不復厯懐自此已上故宜共參同異廓聞之曰我不能為徐羡之署紙尾也遂辭不拜出建康實錄謝莊宋謝莊字希逸侍中㣲之子黄門思之孫美儀容善談論工書屬文好言𤣥理少為文帝所賞帝一見之輒嘆曰藍田生美玉豈虚也㢤莊代顔竣為吏部尚書竣容貎嚴毅常有不可犯之色莊風姿溫美人有喧訴嘗歡笑答之故時人語曰顏吏部瞋而與人官謝吏部笑不與人官莊遷中書令侍中諡曰憲莊家世無年五十者莊年四十二祖四十七曾祖四十三髙祖三十子朏瀹並知名出談藪劉林甫唐武徳初因隋舊制以十一月起選至春即停至貞觀二年劉林甫為吏部侍郎以選限促多不究悉遂奏四時聽選隨到注擬當時以為便出唐㑹要張說武徳七年髙祖謂吏部侍郎張說曰今年選人之内豈無才用者卿可簡試將來欲縻之好爵於是說以張行成張知運等數人應命時以為知人出唐㑹要溫彥博貞觀元年溫彥博為吏部郎中知選意在沙汰多所擯抑而退者不伏囂訟盈庭彥博惟騁辯與之相詰終日喧擾頗為識者所嗤出唐㑹要戴胄貞觀四年杜如晦臨終請委選舉於民部尚書戴胄遂以兼檢挍吏部尚書及在銓衡頗抑文雅而奬法吏不適輪轅之用物以是刺之出唐㑹要唐皎唐貞觀八年十一月唐皎除吏部侍郎常引人入銓問何方穏便或云其家在蜀乃注與吳復有云親老先住江南即唱之隴右論者莫測其意有一信都人希河朔因紿云願得江淮即注與河北一尉由是大被選人紿言欺之出唐㑹要楊師道貞觀十七年楊師道為吏部尚書貴公子四海人物未能委練所署多非其才深抑勢貴及親黨將以避嫌時論譏之出唐㑹要髙季輔貞觀十七年吏部侍郎髙季輔知選凡所銓綜時稱允愜至十八年於東都獨知𨕖事上賜金鏡一面以表清鑒出唐㑹要薛元超永徽元年中書舍人薛元超好汲引寒俊嘗表薦任希古髙智周郭正一王義方孟利真等十餘人時論稱美出唐㑹要楊思𤣥龍朔二年司列少常伯楊思𤣥恃外戚貴侍選流多不以禮而排斥之為𨕖者夏侯彪所訟御史中丞郎餘慶彈奏免官時中書令許敬宗曰必知楊吏部之敗或問之對曰一彪一狼共著一羊不敗何待出唐㑹要張仁褘唐總章二年十一月吏部侍郎李敬𤣥委事於員外張仁褘有識畧幹能始造姓厯改修狀抹銓替等程式敬𤣥用仁褘之法銓總式序仁褘感國士見委竟以心勞嘔血而死出唐㑹要裴行儉咸亨二年有楊烱王勃盧照鄰駱賓王並以文章見稱吏部侍郎李敬𤣥咸為延譽引以示裴行儉行儉曰才名有之爵祿葢寡楊應至令長餘並鮮能令終是時蘇味道王勮未知名因調選遂為行儉深禮異仍謂曰有晚生子息恨不見其成長二公十數年當居衡石願識此輩其後果如其言行儉嘗所引偏禆將有程務挺張䖍朂崔智􅈯王方翼党金毘劉敬同郭待封李多祚黑齒常之盡為名將出唐㑹要三人優劣長夀二年裴子餘為鄠縣尉同列李𨼆朝程行諶皆以文法著稱子餘獨以詞學知名或問雍州長史陳崇業三人優劣孰先崇業曰譬之春蘭秋菊俱不可廢闕劉奇證聖元年劉奇為吏部侍郎注張文長司馬鍠為監察御史二人因申屠瑒以謝之奇正色曰舉賢本自無私二君何為見謝出唐㑹要狄仁傑聖厯初狄仁傑為納言頗以藻鑒自任因舉桓彥範敬暉崔𤣥暐張柬之𡊮恕己等五人後皆有大勲復舉姚元崇等數十人悉為公相聖厯中則天令宰相各舉尚書郎一人仁傑獨薦其子光嗣由是拜地官員外蒞事有聲則天謂之曰祁奚内舉果得人也出唐㑹要鄭杲聖厯二年吏部侍郎鄭杲注韓思復為太常博士元希聲京兆士曹嘗謂人曰今年掌選得韓元二子則吏部不負朝廷矣出唐㑹要薛季昶長安三年則天令雍州長史薛季昶擇僚吏堪為御史者季昶以問錄事叅軍盧齊卿齊卿舉長安縣尉盧懷慎李體光萬年縣尉李義崔湜咸陽縣丞倪若水盩厔縣尉田崇壁新豐縣尉崔日用後皆至大官出唐㑹要鄧渇𢎞道元年十二月吏部侍郎魏克已銓綜人畢放長榜遂出得留人名於是衢路喧嘩大為冬集人援引指擿貶為太子中允遂以中書舍人鄧𤣥挺替焉又無藻鑒之目及患消渇選人因號鄧渇出唐㑹要李至逺如意元年九月天官郎中李至逺權知侍郎事時有選人姓刁又有王元忠並被放乃宻與令史相知滅其㸃畫刁改為丁王改為士擬授官後即添成文字至逺一覽便覺曰今年銓覆萬人總識姓名安有丁士者㢤此刁某王某也省内以為神明出唐㑹要張文成唐張文成曰乾封以前選人每年不越數千垂拱以後每嵗常至五萬人不加衆選人益繁者葢有由矣嘗試論之祗如明經進士十周三衞勲散雜色國官直司妙簡實材堪入流者十分不過一二選司考練總是假手冒名勢家囑請手不把筆即送東司眼不識文被舉南館正員不足權補試攝撿挍之官賄貨縦横贓汚狼籍流外行署錢多即畱或帖司助曹或員外行案更有挽郎輦脚營田當屯無尺寸功夫並優與處分皆不事學問唯求財賄是以選人冗冗甚於羊羣吏部喧喧多於蟻聚若銓實用百無一人積薪化薪所従來逺矣出朝野僉載鄭愔崔湜唐鄭愔為吏部侍郎掌選贓汚狼藉引銓有選人繫百錢於靴帶上愔問其故答曰當今之選非錢不行愔黙而不言時崔湜亦為吏部侍郎掌銓有選人引過分疏云某能翹闗負米湜曰若壯何不兵部選答曰外邉人皆云崔侍郎下有氣力者即得出朝野僉載糊名武后以吏部選人多不實乃令試日自糊其名暗考以定等第判之糊名自此始也武后時投匭者或不陳事而有嘲謔之言於是乃置使先閲其書奏然後投之匭院有司自此始也出國史異纂太平廣記卷一百八十五
