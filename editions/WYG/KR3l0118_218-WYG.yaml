body:
  text: 太平廣記卷二百十八醫一華佗張仲景吳太醫句驪客范光禄徐文伯徐嗣伯腹瘕病李子豫徐之才甄權孫思邈許裔宗秦鳴鶴盧元欽周允元楊𤣥亮趙𤣥景張文仲郝公景崔務華佗魏華佗善醫嘗有郡守病甚佗過之郡守令佗診候佗退謂其子曰使君病有異於常積瘀血在腹中當極怒嘔血即能去疾不爾無生矣子能盡言家君平昔之􅄽吾疏而責之其子曰若獲愈何謂不言於是具以父從來所為乖誤者盡示佗佗留書責罵之父大怒發吏捕佗佗不至遂嘔黒血升餘其疾乃平又有女子極美麗過時不嫁以右膝常患一瘡膿水不絶華佗過其父問之佗曰使人乘馬牽一栗色狗走三十里歸而熱截右足柱瘡上俄有一赤蛇從瘡出而入犬足中其疾遂平出獨異志又後漢末有人得心腹瘕病晝夜切痛臨終敕其子曰吾氣絶後可剖視之其子不忍違言剖之得一銅鎗容數合許後華佗聞其病而解之因出巾箱中藥以投鎗鎗即成酒焉出志恠張仲景何顒妙有知人之鑒初郡張仲景總角造顒顒謂曰君用思精宻而韻不能髙將為良醫矣仲景後果有竒術王仲宣年十七時過仲景仲景謂之曰君體有病宜服五石湯若不治年及三十當眉落仲宣以其賒逺不治後至三十果覺眉落其精如此世咸嘆顒之知人出小説吳太醫吳孫和寵鄧夫人嘗醉舞如意誤傷鄧頰血流嬌惋彌苦命太醫合藥言得白􅆩髓雜玉與虎魄屑當滅此痕和以百金購得白􅆩乃合膏虎魄太多及差痕不滅左頰有赤㸃如痣出酉陽雜爼句驪客魏時有句驪客善用針取寸髮斬為十餘叚以針貫取之言髮中虛也其妙如此出酉陽雜爼范光禄有范光禄者得病兩脚並腫不能飲食忽有一人不自通名徑入齋中坐於光禄之側光禄謂曰先不識君那得見詣答云佛使我來理君病也光禄遂發衣示之因以刀針腫上倐忽之間頓針兩脚及膀胱百餘下出黄膿水三升許而去至明日並無針傷而患漸愈出齊諧記徐文伯宋徐文伯嘗與宋少帝出樂遊苑門逢婦人有娠帝亦善診候診之曰是女也問文伯伯曰一男一女男在左邊青黒色形小於女帝性急令剖之文伯惻然曰臣請針之必落便針足太隂補手陽明胎應針而落果效如言文伯有學行不屈公卿不以醫自業為張融所善歴位泰山太守文伯祖熈之好黄老𨼆於秦望山有道士過乞飲留一胡蘆子曰君子孫宜以此道術救世當得二千石熈開視之乃扁鵲醫經一卷因精學之遂名振海内仕至濮陽太守子秋夫為射陽令嘗有鬼呻吟聲甚淒苦秋夫問曰汝是鬼也何所湏鬼曰我姓斛斯家在東陽患腰痛而死雖為鬼疼痛猶不可忍聞君善術願見救濟秋夫曰汝是鬼無形云何措治鬼曰君但縳芻作人按孔穴針之秋夫如其言為針四處又針肩井三處設祭而埋之明日見一人來謝曰蒙君療疾復為設祭除飢解疾感惠實多忽然不見當代服其通靈出談藪又宋明帝宫人患腰疼牽心發即氣絶衆醫以為肉癥徐文伯曰此髮瘕也以油灌之則吐物如髮稍稍引之長三尺頭已成蛇能動懸柱上水滴盡一髮而已病即愈出談藪徐嗣伯徐嗣伯字徳紹善清言精於醫術曾有一嫗患滯瘀積年不差嗣伯為之診疾曰此屍注也當須死人枕煮服之可愈於是就古塜中得一枕枕已半邊腐缺服之即差後秣陵人張景年十五腹脹靣黄衆醫不療以問嗣伯嗣伯曰此石蚘耳當以死人枕煮服之依語煮枕以服之得大利蚘蟲頭堅如石者五六升許病即差後沈僧翼眼痛又多見鬼物以問之嗣伯曰邪氣入肝可覔死人枕煮服之竟可埋枕於故處如其言又愈王晏知而問之曰三病不同而皆用死人枕療之俱差何也答曰屍注者鬼氣也伏而未起故令人沉滯得死人枕促之魂氣飛越不復附體故屍注可差石蚘者醫療既僻蚘蟲轉堅世間藥不能除所以須鬼物驅之然後可散也夫邪氣入肝故使眼痛而見魍魎應須邪物以釣其氣因而去之所以令埋於故處也晏深歎其神妙出南史腹瘕病昔有一人與奴同時得腹瘕病奴既死令剖腹視之得一白鼈乃試以諸藥澆灌之并内藥於腹中悉無損動乃繫鼈於牀脚忽有一客來看之乘一白馬既而馬溺濺鼈鼈乃惶駭疾走避之既繫之不得去乃縮藏頭頸足焉病者察之謂其子曰吾病或可以救矣乃試以白馬溺灌鼈須臾消成水焉病者遂頓服升餘白馬溺病即豁然除愈出續搜神記李子豫許永為豫州刺史鎮歴陽其弟得疾心腹堅痛居一夜忽聞屏風後有鬼言何不速殺之明日李子豫當以赤丸打汝汝即死矣及旦遂使人迎子豫既至病者忽聞腹中有呻吟之聲子豫遂於巾箱中出八毒赤丸與服之須臾腹中雷鳴彭轉大利所病即愈出續搜神記徐之才北齊右僕射徐之才善醫術時有人患脚跟踵痛諸醫莫能識之之才曰蛤精疾也得之當由乘船入海垂脚水中疾者曰實曾如此為割之得蛤子二箇如榆莢出太原故事甄權甄權精究醫術為天下最年一百三嵗唐太宗幸其宅拜朝散大夫出譚賓録孫思邈唐鄧王元裕髙祖第十八子也好學善談名理與典籖盧照鄰為布衣之交常稱曰寡人之相如也照鄰范陽人為新都尉因染患疾居於陽翟之具茨山著釋疾文及五悲雅有騷人之風竟自沉於潁水而死照鄰寓居于京城鄱陽公主之廢府顯慶三年詔徵太白山𨼆士孫思邈亦居此府思邈華原人年九十餘而視聽不衰照鄰自傷年纔彊仕沈疾困憊乃作病梨樹賦以傷其禀受之不同詞甚美麗思邈既有推步導養之術照鄰與當時知名之士宋令文孟詵皆執師資之禮嘗問思邈曰名醫愈疾其道何也思邈曰吾聞善言天者必質於人善言人者必本於天故天有四時五行日月相推寒暑迭代其轉運也和而為雨怒而為風散而為露亂而為霧凝而為霜雪張而為虹霓此天之常數也人有四肢五臓一覺一寐呼吸吐納精氣往來流而為榮衛彰而為氣色發而為音聲此亦人之常數也陽用其精隂用其形天人之所同也及其失也蒸則為熱否則生寒結而為瘤贅隔而為癰疽奔而為喘乏竭而為焦枯診發乎内而變動乎形推此以及天地亦如之故五緯盈縮星辰錯行日月薄蝕彗孛流飛此天地之危診也寒暑不時此天地之蒸否也石立土踊此天地之瘤贅也山崩地䧟此天地之癰疽也奔風暴雨此天地之喘乏也雨澤不降川澤涸竭此天地之焦枯也良醫𨗳之以藥石救之以針灸聖人和之以至徳輔之以人事故體有可消之疾天有可消之災通乎數也照鄰曰人亊如何思邈曰膽欲大而心欲小智欲圎而行欲方照鄰曰何謂也思邈曰心為五臓之君君以㳟順為主故心欲小膽為五臓之將將以果决為務故膽欲大智者動象天故欲圎仁者靜象地故欲方詩曰如臨深淵如履薄冰為小心也赳赳武夫公侯干城為大膽也傳曰不為利回不為義疚仁之方也易曰見幾而作不俟終日智之圓也照鄰又問養性之道其要何也思邈曰天道有盈缺人事多屯厄茍不自慎而能濟於厄者未之有也故養性之士先知自慎自慎者恒以憂畏為本經曰人不畏威天威至矣憂畏者死生之門存亡之由禍福之本吉凶之源故士無憂畏則仁義不立農無憂畏則稼穡不滋工無憂畏則規矩不設商無憂畏則貨殖不盈子無憂畏則孝敬不篤父無憂畏則慈愛不著臣無憂畏則勲庸不建君無憂畏則社稷不安故養性者失其憂畏則心亂而不理形躁而不寧神散而氣越志蕩而意昏應生者死應存者亡應成者敗應吉者凶夫憂畏者其猶水火不可暫忘也人無憂畏子弟為勍敵妻妾為㓂仇是故太上畏道其次畏天其次畏物其次畏人其次畏身憂於身者不拘於人畏於巳者不制於彼慎於小者不懼於大戒於近者不懼於逺能知此者水行蛟龍不能害陸行虎兕不能傷五兵不能及疫癘不能染䜛賊不能謗毒螫不加害知此則人事畢矣思邈尋授承務郎直尚藥局以永淳初卒遺令薄𦵏不設㝠器祭祀無牲牢死經月餘顔色不變舉屍就木如空衣焉撰千金方三十卷行於代出譚賓録許裔宗許裔宗名醫若神人謂之曰何不著書以貽將來裔宗曰醫乃意也在人思慮又脈候幽𤣥甚難别意之所解口莫能宣古之名手唯是别脈脈既精别然後識病病之於藥有正相當者唯須用一味直攻彼病即立可愈今不能别脈莫識病原以情億度多安藥味譬之於獵不知兎處多發人馬空廣遮圍或兾一人偶然逢也以此療病不亦踈乎脈之深趣既不可言故不能著述出譚賓録秦鳴鶴唐髙宗苦風眩頭目不能視召侍醫秦鳴鶴診之秦曰風毒上攻若刺頭出少血愈矣天后自簾中怒曰此可斬也天子頭上豈是出血處耶鳴鶴叩頭請命上曰醫人議病理不加罪且吾頭重悶殆不能忍出血未必不佳朕意决矣命刺之鳴鶴刺百㑹及腦戸出血上曰吾眼明矣言未畢后自簾中頂禮以謝之曰此天賜我師也躬負繒寶以遺之出譚賓録盧元欽泉州有客盧元欽染大風唯鼻根未倒屬五月五日官取蚺蛇膽欲進或言肉可治風遂取一截蛇肉食之三五日頓漸可百日平復出朝野僉載又商州有人患大風家人惡之山中為起茅舍有烏蛇墜酒罌中病人不知飲酒漸差罌底見蛇骨方知其由也出朝野僉載周允元則天時鳯閣侍郎周允元朝罷入閣太平公主喚一醫人自光政門入見一鬼撮允元頭二鬼持棒隨其後直出景運門醫白公主公主奏之上令給使覘問在閣無事食訖還房午後如厠長參典怪其乆私往候之允元踣靣於厠上目直視不語口中涎落給使奏之上問醫曰此可得幾時對曰緩者三日急者一日上與錦被覆之并牀舁送宅止夜半而卒上自為詩以悼之出朝野僉載楊𤣥亮乆視年中襄州人楊𤣥亮年二十餘於䖍州汶山觀傭力晝夢見天尊云我堂舍破壊汝為我修造遣汝能醫一切病悟而説之試療無不愈者贑縣里正背有腫大如拳亮以刀割之數日平復療病日獲十千造天尊堂成療病漸漸無效出朝野僉載趙𤣥景如意年中洛州人趙𤣥景病卒五日而蘇云見一僧與一木長尺餘教曰人有病者汝以此木拄之即愈𤣥景得見機上尺乃是僧所與者試將療病拄之立差門庭每日數百人御史馬知巳以其聚衆追之禁左臺病者滿於臺門則天聞之追入内宫人病拄之即愈放出任救病百姓數月以後得錢七百餘貫後漸無騐遂絶出朝野僉載張文仲洛州有士人患應病語即喉中應之以問善醫張文仲張經夜思之乃得一法即取本草令讀之皆應至其所畏者即不言仲乃録取藥合和為丸服之應時而止一云問醫蘇澄云出朝野僉載郝公景郝公景於泰山採藥經市過有見鬼者怪羣鬼見公景皆走避之遂取藥和為殺鬼丸有病患者服之差出朝野僉載崔務定州人崔務墜馬折足醫令取銅末和酒服之遂痊平及亡後十餘年改𦵏視其脛骨折處銅末束之出朝野僉載太平廣記卷二百十八
