body:
  text: 太平廣記巻四百四十宋李昉等編畜獸七猫唐道襲賣醋人歸係䑕王周南終祚清河郡守淳于智徐宻蔡喜夫茅崇邱蕭悉達逆旅道士李測天寳彍騎畢杭崔懷嶷李甲王縉郗士美李知㣲建康人盧嵩柴再用蘇長史盧樞朱仁李昭嘏䑕狼張文蔚猫猫目睛旦暮圓及午􅆆斂如綖其鼻端常冷惟夏至一日暖其毛不容蚤虱黑者闇中逆循其毛即若火星俗言猫洗靣過耳則客至楚州謝陽出猫有褐花者靈武有紅叱撥及青驄色者猫一名蒙貴一名烏圓平陵城古譚國也城中有一猫常𢃄金鏁有錢飛若蛺蝶土人往往見之出酉陽雜俎唐道襲王建稱尊於蜀其嬖臣唐道襲為樞宻使夏日在家㑹大雨其所蓄猫戲水於簷溜下道襲視之稍稍而長俄而前足及簷忽爾雷電大至化為龍而去出稽神録賣醋人建康有賣醋人某者畜一猫甚俊健愛之甚辛亥嵗六月猫死某不忍棄置猫坐側數日腐且臭不得已㩦棄秦淮水既入水猫活某自下救之遂溺死而猫登岸走金烏鋪吏獲之縛置鋪中鎻其户出白官司將以其猫為證既還則已斷其索齧壁而去矣竟不復見出稽神録歸係進士歸係暑月與一小孩子於㕔中寢忽有一猫大呌恐驚孩子使僕以枕擊之猫偶中枕而斃孩子應時作猫聲數日而殞出聞奇録䑕舊說䑕王其溺精一滴成一䑕一說䑕母頭脚似䑕尾蒼口鋭大如水中獺性畏狗溺一滴成一䑕時有䑕災多起於䑕母䑕母所至處動成萬萬䑕其肉極美凡䑕食死人目睛則為䑕王俗云䑕齧上服有喜凡齧衣欲得有益無益凶出酉陽雜俎西域有䑕大如狗中者如兎小者如常大䑕頭悉已白然𢃄以金枷商估有經過其國不先祈祀者則齧人衣裳也得沙呪願更獲無他釋道安昔至西方親見如此出異苑不盡木火中有䑕重千斤毛長二尺餘細如絲恒居火中洞赤時時出外而毛色白以水逐而沃之即死人紡績其毛織以為布用之若有垢涴以火燒之則净也出神異記北方層氷萬里厚百丈有磎䑕在氷下土中其形如䑕食草木肉重千斤可以作脯食之已熱其毛八尺可以為褥卧之却寒其皮可以蒙皷聲聞千里其毛可以來䑕此尾所在䑕聚今江南䑕食草木為災此𩔖也出神異録紅飛䑕多出交趾及廣管隴州皆有深毛茸茸然惟肉翼淺黑色多􅀟伏紅蕉花間採捕者若獲一則其一不去南中婦人買而帶之以為媚藥出嶺表異録拱䑕形如常䑕行田野中見人即拱手而立人近欲捕之跳躍而去秦川中有之出録異記鼴䑕首尾如䑕色青黑短足有指形大重千餘斤出零陵郡界不知所來民有災及為惡者䑕輙入其田中振落毛衣皆成小䑕食其苗稼而去或捕得鼴䑕者治其皮飾為帶頗能澁芻為其三毛出於一孔與常皮有異人多寳之出録異記義䑕形如䑕短尾每行遞相咬尾三五為羣驚之則散俗云見之者當有吉兆成都有之出録異記唐䑕形如䑕稍長青黑色腹邊有餘物如腸時亦汚落亦名易腸䑕昔仙人唐昉㧞宅升天雞犬皆去唯䑕墜下不死而腸出數尺三年易之俗呼為唐䑕城固川中有之出異苑白䑕身如皎白耳足紅色眼眶赤赤者乃金玉之精伺其所出掘之當獲金玉云䑕五百歲即白耳足不紅者乃常䑕也出録異記王周南魏齊王芳時中山有王周南者為襄邑長忽有䑕從穴出語曰周南爾以某日死周南不應至期更冠幘皂衣而出曰周南爾以日中死亦不應䑕復入穴日適中䑕又冠幘而出曰周南汝不應我何道言絶顚蹶而死即失衣冠所在就視之與常䑕無異出幽明録終祚吳北寺終祚道人卧齋中鼠從坎出言終祚後數日當死祚呼奴令買犬鼠云亦不畏此其犬入户必死犬至果爾祚常為商閉户謂鼠曰汝正欲使我富耳今既逺行勤守吾房勿令有所零失時桓𤣥在南州禁殺牛甚急終祚數宰竊買牛皮還東貨之得二十萬還時户猶闔也都無所失其怪亦絶自後稍富出幽明録清河郡守清河郡太守至前後輙死新太守到如厠有人長三尺冠幘皂服云府君某日死太守不應意甚不樂催使吏為作主人外頗怪其事日中如厠復見前所見人言府君今日中當死三言亦不應乃言府君當道而不道鼠為死乃頓仆地大如豚郡内遂安出幽明録淳于智淳于智字叔平濟北人性深沉有恩義少為書生善易髙平劉柔夜卧鼠齧其左手中指意甚惡之以問智智為筮之曰鼠本欲殺君而不能當相為使之反死乃以朱書其手腕横文後為田字可方一寸使夜露手以卧有大鼠伏死於前出捜神記徐宻上虞魏䖍祖婢名皮納有色宻樂之鼠乃託為其形而就宻宿宻心疑之以手摩其四體便覺縮小因化為鼠而走出幽明録蔡喜夫宋前廢帝景平中東陽大夫蔡喜夫避住南壟夜有大鼠形如㹠子浮水而來徑伏喜夫奴床角奴愍而不犯每食輙以餘飯與之水勢既退喜夫得返居鼠以前脚捧青紙裹二個珠置奴前啾啾似語從此去來不絶亦能隱形又知人旤福後同縣吕慶祖牽狗野獵暫過遂齧殺之出異苑茅崇邱齊世祖永明十年丹陽郡民茅崇邱家夜夜厨中有人語笑復明燈火有宴饌之聲及開門視之即無所見及閉户即依然聞如此數旬忽有一道士詣崇邱問曰君夜夜有妖患乎崇邱曰然道士乃懷中取一符與之謂崇邱曰但釘於竈上及北壁來日早視之言訖遂失其道士崇邱喜乃以符如其言明日見厨中有五六大鼠各長二尺無毛而色如朱盡死於北壁乃竟絶出窮怪録蕭悉達北齊平原太守蘭陵蕭悉達腰帶為鼠齧楊遵彦以俗事戲之曰當遷官未幾除家令尋失職鼠後齧其鞾遵彦曰當復得官悉達曰鼠便為吏部尚書何闗人事出談藪逆旅道士唐萬嵗元年長安道中有群寇晝伏夜動行客往往遭殺害至明旦略無蹤由人甚畏懼不敢晨發及暮至旅次後有一道士宿於逆旅聞此事乃謂衆曰此必不是人當是恠耳深夜後遂自於道旁持一古鏡潜伺之俄有一隊少年至兵甲完具齊呵責道士曰道旁何人何不顧生命也道士以鏡照之其少年棄兵甲奔走道士逐之仍誦呪語約五七里其少年盡入一大穴中道士守之至曙却復逆旅召衆以發掘有大鼠百餘走出乃盡殺之其患乃絶出瀟湘録李測李測開元中為縣令在㕔問事有鳥髙三尺無毛羽肉色通赤來入其宅測以為不祥命卒擊之卒以柴斧砍鳥刃入木而鳥不傷測甚惡之又於油鑊煎之以物覆上數日開視鳥隨油氣飛去其後又來測命以繩縛之係於巨石沉之於河月餘復至斷繩猶在頸上測取大木鑿空其中實鳥於内鐡冒兩頭又沉諸河自爾不至天寳中測移官其宅亦凶涖事數日宅中有小人長數寸四五百頭滿測官舍測以物擊中一頭仆然而殪視之悉人也後夕小人等群聚哭泣有車載棺成服祭弔有行葬於西堦之下及明才發測便掘塟處得一鼠通赤無毛於是乃命人力尋孔發掘得鼠數百其怪遂絶測家亦甚無恙出廣異記天寳彍騎天寳初邯鄲縣境恒有魘鬼所至村落十餘日方去俗以為常彍騎三人夜投村宿媪云不惜留住但恐魘鬼客至必當相苦宜自防之雖不能傷人然亦小至迷悶騎初不畏鬼遂留止宿二更後其二人前榻寐熟一人少頃而忽覺見一物從外入狀如鼠黑而毛牀前著緑衫持笏長五六寸向睡熟者曲躬而去其人遂魘魘至二人次至覺者覺者竟往把脚鬼不動然而體冷如氷三人易持之至曙村人悉共詰問鬼初不言騎怒云汝竟不言我以油鑊煎汝遂令村人具油鑊乃言已是千年老鼠若魘三千人當轉為狸然所魘亦未嘗損人若能見釋當去此千里外騎乃釋之其怪遂絶御史大夫當為邯鄲尉崔懿親見其事懿再從弟恒說之出廣異記畢杭天寳末御史中丞畢杭為魏州刺史陷於禄山賊中尋欲謀歸順而未發數日於庭中忽見小人長五六寸數百枚遊戲自若家人擊殺明日羣小人皆白服而哭載死者以喪車凶器一如士人送喪之備仍於庭中作塜塟畢遂入南墻穴中甚驚異之發其塜得一死鼠乃作熱湯沃中久而掘之得死鼠數百枚後十餘日杭以事不尅一門遇害出廣異記崔懷嶷崔懷嶷其宅有鼠數百頭於庭中兩足行口中作呱呱聲家人無少長盡出觀其屋轟然而塌壞嶷外孫王汶自向余說出廣輿記近世有人養女年十餘歲一旦失之經歲無蹤跡其家房中屢聞地下有小兒啼聲掘之初得一孔漸深大縱廣丈餘見女在坎中坐手抱孩子旁有秃䑕大如斗女見家人不識主領父母乃知為鼠所魅擊鼠殺之女便悲泣云我夫也何忽為人所殺家人又殺其孩子女乃悲泣不已未及療之遂死出廣異記李甲寳應中有李氏子亡其名家於洛陽其世以不好殺故家未嘗畜貓所以宥鼠之死也迨其孫亦能世祖父意嘗一日李氏大集其親友㑹食於堂既坐而門外有數百鼠俱人立以前足相鼓如甚喜狀家僮驚異告於李氏李氏親友乃空其堂而縱觀人去且盡堂忽摧圮其家無一傷者堂既摧羣鼠亦去悲乎䑕固㣲物也尚能識恩而知報況人乎如是則施恩者宜廣其恩而報恩者亦宜力其報有不顧者當視此以愧出宣室志王縉唐相國王公縉大歴中與元載同執政事嘗因入朝天尚早坐於燭下其榻前有囊公遂命侍童取之侍童挈以進覺其重不可舉公啓視之忽有一鼠長尺餘質甚豐白囊中躍出公大懼顧謂其子曰我以不才謬居卿相無德而貴常懼有意外之咎今異物接於手足豈非禍之將萌耶後數日果得罪貶為縉雲守出宣室志郗士美許昌郗尚書士美元和末為鄂州觀察仁以撫下忠以􅆢上政化之美載於冊書一日晨興出視事束𢃄已畢左手引鞾未及陷足忽有一巨鼠過庭北靣拱手而舞入座大怒驚叱之略無懼意因擲鞾以擊鼠即奔逸有毒虺墜於鞾中珠目錦身尺長筴細螫焰勃勃起於舌端向無鼠妖則以致臃指潰足之患參寥子曰是知梟鳴鼠舞不恒為災大人君子遇之則吉出闕史李知㣲李知㣲曠達士也嘉遯自髙愽通書史至於古今成敗無不通曉常以家貧夜遊過文成宫下初月㣲明見數十小人皆長數寸衣服車乘𨗳從呵喝如有位者聚立於古槐之下知㣲側立屏氣伺其所為東復有垝垣數雉旁通一穴中有紫衣一人冠帶甚嚴擁侍十餘輩悉稍長諸小人方理事之狀須臾小人皆趨入穴中有一人白長者曰某當為西閣舍人一人曰某當為殿前録事一人曰某當為司文府史一人曰某當為南宫書佐一人曰某當為馳道都尉一人曰某當為司城主簿一人曰某當為遊仙使者一人曰某當為東垣執㦸如是各有所責而不能盡記喜者憤者若有所恃者似有果求者唱呼激切皆請所欲長者立盼視不復有詞有似唯領而已食頃諸小人各率部位呼呵引從入於古槐之下俄有一老父顔狀枯瘦杖䇿自東而來謂紫衣曰大為諸子所擾也紫衣笑而不言老父亦笑曰其可言耶言訖相引入穴而去明日知㣲掘古槐而求唯有群䑕百數奔走四散紫衣與老父不知何物也出河東記建康人建康人方食魚棄魚頭於地俄而壁下穴中有人乘馬鎧甲分明大不盈尺手執長槊徑刺魚頭馳入穴去如是數四即掘地求之見數大䑕魚頭在旁惟有筯一􅃗了不見甲馬之狀無何其人卒出稽神録盧嵩太廟齋郎盧嵩所居釜鳴竈下有鼠如人哭聲因祀竈竈下有五大鼠各如方色盡食所祀之物復入竈中其年嵩補興化尉竟無他怪出稽神録柴再用龍武統軍柴再用常在㕔事凭几獨坐忽有一鼠走至庭下向再用拱手而立如欲拜揖之狀再用怒呼左右左右皆不至即起逐之鼠乃去而㕔屋梁折所坐床几盡壓麋碎再用後為廬鄂宣三鎮節度使卒出稽神録蘇長史蘇長史將卜居京口此宅素凶妻子諫止之蘇曰爾惡此宅吾必獨住始宿之夕有三十餘人皆長尺餘衣道士冠褐來詣蘇曰此吾等所居君必速去不然及禍蘇怒持杖逐之皆走入宅後竹林中而没即掘之獲白鼠三十餘頭宅不復凶出稽神録盧樞侍御史盧樞言其親為建州刺史暑夜獨出寢室望月於庭始出户聞堂西堦下若有人語笑聲躡足窺之見七八白衣人長不盈尺男女雜坐飲酒几席食器皆具而㣲獻酬久之其席一人曰今夕甚樂然白老將至奈何因歎吒須臾坐中皆哭入隂溝中遂不見後罷郡新政家有猫名白老既至白老入堂西堦地中獲白䑕七八皆殺之出稽神録朱仁朱仁者世居嵩山下耕耘為業後仁忽失一幼子年方五歲求尋十餘年終不知存亡後一日有僧經遊造其門㩦一弟子其形容似仁所失之幼子也仁遂延僧於内設供養良久問僧曰師此弟子觀其儀貎稍似余家十年前所失一幼子也僧驚起問仁曰僧住嵩山薜蘿内三十年矣十年前偶此弟子悲號來投我我問其故此弟子方孩幼迷其蹤由不甚明僧因養育之及與落髪今聰悟無敵僧常疑是一聖人也君子乎試自熟騐察之仁乃與家屬共詢問察視其母言我子背上有一黶記逡巡驗得實是親子父母家屬一齊號哭其僧便留與父母而去父母安存養育倍於常子此子每至夜即失所在曉却至家如此二三年父母以為作盜伺而窺之見子每至夜化為一大鼠走出及曉却來父母問之此子不語多時對曰我非君子也我是嵩山下䑕王下小鼠既見我形我不復至矣其父母疑惑間其夜化鼠走去出瀟湘録李昭嘏李昭嘏舉進士不第登科年已有主司並無薦託之地主司晝寢忽寤見一巻軸在枕前看其題乃昭嘏之巻令送於架上復寢暗視有一大䑕取其巻銜其軸復送枕前如此再三昭嘏來春及第主司問其故乃三世不養猫皆云鼠報出聞竒録鼠狼張文蔚相國張文蔚莊在東都柏坡莊内有鼠狼穴養四子為蛇所吞鼠狼雌雄情切乃於穴外坋土恰容蛇頭伺蛇出穴果入所坋處出頭度其迴轉不及當腰齧斷而劈蛇腹銜出四子尚有氣置之穴外銜豆葉嚼而傅之皆活何㣲物而有情有智之如是乎最靈者人胡不思之出北夢𤨏言太平廣記巻四百四十
