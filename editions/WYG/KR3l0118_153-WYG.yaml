body:
  text: 太平廣記卷一百五十三定數八李公李宗囘崔朴李藩韋執誼袁滋裴度張轅趙昌時李公唐貞元中萬年縣捕賊官李公春月與所知街西官亭子置鱠一客偶至淹然不去氣色甚傲衆問所能曰某善知人食料李公曰且看今日鱠坐中有人不得喫者否客微笑曰唯足下不得喫李公怒曰某為主人故置此鱠安有不得喫之理此事若中奉五千若是妄語當遭契濶請坐中為證因促􅄿將就有一人走馬來云京兆尹召李公奔馬去適會有公事李公懼晚使報諸客但飡恐鱠不可停語庖人但留我兩楪欲破術人之言諸客甚訝良久走馬來諸人已飡畢獨所留鱠在焉李公脱衫就座執筯而罵術士顔色不動曰某所見不錯未知何故李公曰鱠見在此尚敢大言前約已定安知某不能忽忽酬酢言未了官亭子仰泥土壞方數尺墮落食器粉碎鱠並雜於糞埃李公驚異問厨者更有鱠否曰盡矣乃厚謝術士以錢五千與之出逸史李宗囘李宗囘者有文詞應進士舉曽與一客自洛至關客云吾能先知人飲􅄿毫釐不失臨正旦一日將往華陰縣縣令與李公舊知先遣書報李公謂客曰歲節人家皆有異􅄿况縣令與我舊知看明日到何物喫客撫掌曰大哥與公各飲一盞椒葱酒食五般餛飩不得飯喫李公亦未信及到華陰縣縣令傳語遣鞍馬䭾乘店中安下請二人就縣相見喜曰二賢衝寒且速煖兩大盞酒來著椒葱良久臺盤到有一小奴與縣令耳語令曰總煮來謂二客曰某有一女子年七八歲常言何不令我勾當家事某昨惱渠遣檢校作歲飯食適來云有五般餛飩問煮那盤某云總煮來逡巡以大椀盛二客食盡忽有佐吏從外走云敕使到舊例合迎縣令驚忙揖二客鞭馬而去客遂出欲就店終飡其僕者已歸結束先發已行數里二人大笑相與登途竟不得飲喫異哉飲啄之分也出逸史崔朴唐渭北節判崔朴故滎陽太守祝之兄也常會客夜宿有言及宦途通塞則曰崔琯及第後五任不離釋褐令狐相七考河東廷評六年太常博士嘗自賦詩嗟其蹇滯曰何日肩三署終年尾百寮其後出入清要張宿遭遇除諫議大夫宣慰山東憲宗面許迴日與相至東洛都亭驛暴卒崔元章在舉場無成為執權者所嘆主司要約必與及第入試日中風不得一名如此朴因話家世曾經之事朴父清故平陽太守建中初任藍田尉時德宗初即位用法嚴峻是月三日之内大臣出貶者七中途賜死者三劉晏黎幹皆是其數戸部侍郎楊炎貶道州司戸叅軍自朝受責馳驛出城不得歸第炎妻先病至是炎慮耗達妻聞驚必至不起其日炎夕次藍田清方主郵務炎纔下馬屈崔少府相見便曰某出城時妻病綿惙聞某得罪事情可知欲奉煩為申辭疾請假一日發一急脚附書寛兩處相憂以候其來耗便當首路可乎清許之郵知事呂華進而言曰此故不可敕命嚴迅清謂呂華楊侍郎迫切不然申府以闕馬可乎華久而對曰此即可矣清於是以此聞於京府又自出俸錢二十千買細氊令造氊舁顧夫直詣炎宅取炎夫人夫人扶病登舁仍戒其丁勤夜行旦日達藍田時炎行李簡約妻亦病稍愈便與炎偕往炎執清之手問第行清對曰某第十八清又率俸錢數千具商於己來山程之費至韓公驛執清之袂令妻出見曰此崔十八死生不相忘無復多言矣炎至商於洛源驛馬乏驛僕王新送騾一頭又逢道州司倉叅軍李全方輓運入奏全方輒傾囊以濟炎行李後二年秋炎自江華除中書侍郎入相還至京兆界問驛使崔十八郎在否驛吏答曰在炎喜甚頃之清迎謁於前炎便止之曰崔十八郎不合如此相待今日生還乃是子之恩也仍連鑣而行話湘楚氣候因曰足下之才何適不可老夫今日可以力致栢臺諫署唯所𨕖擇清因遜讓無敢希僥倖意炎又曰勿疑但言之清曰小諫閒且貴敢懷是望炎曰吾聞命矣無慮參差及炎之發藍田謂清曰前言當一月有期炎居相位十日追洛源驛王新為中書主事仍奏授鄂州唐年縣尉李全方監察御史仍知商州洛源監清之所約沉然清罷職特就炎第謁之初見則甚喜留坐久之但飲數盃而已並不及前事逾旬清又往焉炎則已有怠色清從此退居不復措意後二年再貶崖州至藍田喟然太息若負者使人召清清辭疾不往乃自咎曰楊炎可以死矣竟不還他崔清官出續定命錄李藩李相藩嘗寓東洛年近三十未有宦名夫人即崔庶子之女李公寄託崔氏待之不甚厚時中橋胡蘆生者善卜聞女人聲即知貴賤李公患腦瘡又欲挈家居揚州甚愁悶乃與崔氏弟兄訪胡蘆生蘆生好飲酒人詣之必攜一壺故謂為胡蘆生李公與崔氏各㩗錢三百生倚蒲圑已半酣崔氏弟兄先至胡蘆生不為之起但伸手請坐李公以疾後至胡蘆生曰有貴人來乃命侍者掃地既畢李公已到未下驢胡蘆生笑迎執手曰郎君貴人也李公曰某貧且病又欲以家往數千里外何有貴哉蘆生曰紗籠中人豈畏迍厄李公請問紗籠之事終不説遂往揚州居於參佐橋使院中有一高員外與藩往還甚熟一旦來詣藩既去際晚又至李公甚訝之既相見高曰朝來拜候却歸困甚晝寢夢有一人召出城外於荆􅁄中行見舊使莊戸卒已十年謂某曰員外不合至此為物所誘且便須迴某送員外去却引至城門某謂之曰汝安得在此云我為小吏差與李三郎當直某曰何處李三郎曰住參佐橋知員外與李三郎往還故此祇候某曰三郎安得如此曰是紗籠中人詰之不肯言因曰某饑員外能與少酒飯錢財否乎城不敢入請與城外置之某謂曰就三郎宅中得否曰若如此是殺某也遂覺已令於城外與置酒食且奉報好消息李公微笑數年張建封僕射鎮揚州奏李公為巡官校書郎會有新羅僧能相人且言張公不得為宰相甚懷怏因令於使院中看郎官有得為宰相者否遍視良久曰並無張公尤不樂曰莫有郎官未入院否報云李巡官未入便令促召逡巡至僧降階迎謂張公曰巡官是紗籠中人僕射且不及張公大喜因問紗籠中之事僧曰宰相㝠司必潛紗籠䕶之恐為異物所擾餘官即不得也方悟胡蘆生及高所説李公竟為宰相也信哉人之貴賤分定矣出逸史韋執誼韋執誼自相座貶太子賔客又貶崖州司馬執誼前為職方員外所司呈諸州圖毎至嶺南州圖必速令將去未嘗省之及為相北壁有圖經數日試往閲焉乃崖州圖矣意甚惡之至是果貶崖州二年死於海上出感定錄袁滋復州清溪山煥麗無比袁相公滋未達時復郢間居止因晴日登臨此山行數里幽小漸竒險阻絶無踪有儒生以賣藥為業宇於山下袁公與語甚相狎因留宿袁公曰此處合有靈仙隱士儒生曰有道者五六人每三兩日即一來不知居處與其雖熟即不肯細言袁公曰求修謁得否曰彼甚惡人然頗好酒足下但得美酒一榼可相見也袁公辭歸後攜酒再往經數宿五人果來或鹿巾紗帽杖藜草履遙相與通寒温大笑乃臨澗濯足戲弄儒生儒生為列席致酒五人覩甚喜曰何處得此物且各三五盞儒生曰非某所能致有客攜來願謁先生乃引袁公出厯拜五人相顧失色悔飲其酒并怒儒生曰不合以外人相擾儒生曰此人志誠可賞且是道流稍從容亦何傷也意遂漸解見袁公謙恭甚乃時與笑語目袁公曰坐袁公再拜就席少頃酒酣乃注視袁公謂曰此人大似西華坐禪和尚良久云直是便屈指數此僧亡來四十七年問袁公之歳正四十七撫掌曰須求官職福禄已至遂與袁公握手言别前過洞上山頭捫蘿跳躍翩翻如鳥飛去逡巡不見袁公果拜相為西川節度使出逸史裴度故中書令晉國公裴度自進士及第博學宏詞制䇿三科官途二十餘載從事浙右為河南掾至憲宗朝聲聞隆赫厯官三署拜御史中丞上意推重人情翕然明年夏六月東平帥李師道包藏不軌畏朝廷忠臣有賊殺宰輔意密遣人由京師靖安東門禁街候相國武元衡仍闇中傳聲大呼云往驛坊取中丞裴某頭是時京師始重揚州氊帽前一日廣陵師獻公新樣者一枚公翫而服之將朝燭下既櫛乃取其盖張焉導馬出坊之東門賊奄至唱殺甚厲賊遂揮刀中帽墜馬賊為公已喪元矣掠地求其墜頗急驂乗王義遽迴鞚以身蔽公賊知公全再以刀擊義斷臂且死度賴帽子頂厚經刀處微傷如線數寸旬餘如平常及昇台袞討淮西立大勲出入六朝登庸授鉞門館僚吏雲布四方其始終遐永也如此出續定命錄張轅吳郡張轅自奉天尉將調集時李庶人錡在浙西兼𣙜筦轅與之有舊將往謁且求資糧未至夢一人將官誥至云張轅可知袁州新喻縣令轅夢中已曽為赤尉不宜為此固不肯受其人曰兩季之俸支牒已行不受何為遂委之而去轅覺甚惡之及見錡具言將𨕖告以乏困錡留之數日將辭去錡因謂曰足下𨕖限猶遠且能為一職乎亦可資桂玉之費轅不敢讓因署毗陵郡鹽鐵場官轅以職雖卑而利厚遂受之既至所職及視其簿書所用印乃袁州新喻廢印也轅以四月領務九月而罷兩季之俸皆如其言出前定錄趙昌時元和十二年憲宗平淮西趙昌時為吳元濟裨將屬張伯良於靑陵城與李愬九月二十七日戰項後中刀墮馬死至夜四更忽如睡覺聞將家㸃閲兵姓名聲呼某乙即聞唱唯應聲如是可㸃千餘人趙生專聽之將謂㸃名姓及㸃竟不聞呼之俄而天明趙生漸醒乃彊起視左右死者皆是夜來聞呼名字者也乃知㝠中㸃閲耳趙生方知身不死行歸月餘瘡愈方知戰死者亦有宿命耳出博異志太平廣記卷一百五十三
