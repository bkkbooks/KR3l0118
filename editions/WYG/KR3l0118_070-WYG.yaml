body:
  text: 太平廣記卷七十女仙十五許飛瓊裴𤣥靜戚𤣥符徐仙姑緱仙姑王氏女薛𤣥同戚逍遥茶姥張建章周寳許飛瓊唐開成初進士許瀍逰河中忽得大病不知人事親友數人環坐守之至三日蹷然而起取筆大書扵壁曰曉入瑶䑓露氣清坐中唯有許飛瓊塵心未盡俗縁在十里下山空月明書畢復寐及明日又驚起取筆改其第二句曰天風飛下歩虚聲書訖兀然如醉不復寐矣良久漸言曰昨夢到瑶䑓有仙女三百餘人皆處大屋内一人云是許飛瓊遣賦詩及成又令改曰不欲世間人知有我也既畢甚被賞歎令諸仙皆和曰君終至此且歸若有人導引者遂得回耳出逸史裴𤣥静裴𤣥静緱氏縣令昇之女鄠縣尉李言妻也幼而聪慧母教以詩書皆誦之不忘及笄以婦功容自飾而好道請扵父母置一静室披戴父母亦好道許之日以香火瞻禮道像女使侍之必逐扵外獨居别有女伴言笑父母看之復不見人詰之不言潔思閒淡雖􅇧肉常見亦執禮曽無慢容及年二十父母欲歸扵李言聞之固不可唯願入道以求度世父母抑之曰女生有歸是婦禮時不可失禮不可虧倘入道不果是無所歸也南嶽魏夫人亦従人育嗣後為上仙遂適李言婦禮臻備未一月告扵李言以素修道神人不許為君妻請絶之李言亦慕道従而許焉乃獨居静室焚修夜中聞言笑聲李言稍疑未之敢驚潜壁隙窺之見光明滿室異香芬馥有二女子年十七八鳯髻霓衣姿態婉麗侍女數人皆雲髻綃服綽約在側𤣥静與二女子言談李言異之而退及旦問扵𤣥静荅曰有之此崑崙仙侣相省上仙也知君窺以術止之而君未覺更來慎勿窺也􅂲君為仙官所責然𤣥静與君宿縁甚薄非久在人間之道念君後嗣未立候上仙來當為言之後一夕有天女降李言之室經年復降送一兒與李言此君之子也𤣥静即當去矣後三日有五雲盤旋仙女奏樂白鳯載𤣥静昇天向西北而去時大中八年八月十八日在温縣供道村李氏别業出續仙傳戚𤣥符戚𤣥符者兾州民妻也三嵗得疾而卒父母號痛方甚有道士過其門曰此可救也抱出示之曰此必為神仙適是氣蹷耳衣帶中觧黒符以救之良久遂活父母致謝道士曰我北嶽真君也此女可名𤣥符後得昇天之道言訖不見遂以為名及為民妻而舅姑嚴酷侍奉益謹常謂諸女曰我得人身生中國尚為女子此亦所闕也父母早喪唯舅姑為尊耳雖􅀍箠楚亦無所怨夜有神仙降之授以靈藥不知其所修何道大中十年丙子八月十日昇天出墉城集仙録徐仙姑徐仙姑者北齊僕射徐之才女也不知其師已數百嵗狀貌常如二十四五嵗耳善禁呪之術獨逰海内名山勝境無不周徧多宿巖麓林窟之中亦寓止僧院忽為豪僧十輩㣲詞所嘲姑罵之羣僧􅈭怒欲以力制詞色愈悖姑笑曰我女子也而能棄家雲水不避蛟龍虎狼豈懼汝䑕輩乎即觧衣而卧遽徹其燭僧喜以為得志遲明姑理䇿出山諸僧一夕皆僵立尸坐若􅀍拘縛口噤不能言姑去數里僧乃如故來往江表呉人見之四十餘年顔色如舊其行若飛所至之處人畏敬若神明矣無敢戱侮者咸通初謂剡縣白鶴觀道士陶蕢雲曰我先君仕北齊以方術聞名隂功及物今亦得道故我為福所及亦延年長生耳以此推之即之才女也出墉城集仙録緱仙姑緱仙姑長沙人也入道居衡山年八十餘容色甚少扵魏夫人仙壇精修香火十餘年孑然無侣壇側多虎逰者須結隊執兵而入姑隐其間曽無怖畏數年後有一青鳥形如鳩鴿紅頂長尾飛來所居自語云我南嶽夫人使也以姑修道精苦獨棲窮林命我為伴他日又言西王母姓緱乃姑之祖也聞姑修道勤至將有真官降而授道但時未至耳宜勉扵修勵也每有人逰山必青鳥先言其姓字又曰河南緱氏乃王母修道之故山也又一日青鳥飛來曰今夕有暴客無害勿以為怖也其夕果有十餘僧來毁魏夫人仙壇乃一大石方可丈餘其下空浮寄他石之上每一人推之則揺動人多則屹然而住是夕羣僧持火挺刃將害仙姑入其室姑在牀上而僧不見僧既出門即摧壊仙壇轟然有聲山震谷裂謂已顛墜矣而終不能動僧相率奔走及明有逺村至者云十僧中九僧為虎所食其一不共推故免嵗餘青鳥語姑􅁶居他所因徙居湖南鳥亦随之而往人未嘗㑹其語鄭畋自承㫖學士左􅁶梧州師事扵姑姑謂畋曰此後四海多難人間不可久居吾將隐九嶷矣一日遂去出墉城集仙録王氏女王氏女者徽之姪也父随兄入闗徽之時在翰林王氏與所生母劉及嫡母裴寓居常州義興縣湖洑渚桂巖山與洞靈觀相近王氏自幼不食酒肉攻詞翰善琹好無為清静之道及長誓志不嫁常持大洞三十九章道徳章句户室之中時有異香氣父母敬異之一旦小疾裴與劉扵洞靈觀修齋祈福是日稍愈亦同詣洞靈佛像前焚香祈祝及曉歸坐扵門右片石之上題絶句曰翫水登山無足時諸仙頻下聽吟詩此心不戀居人世唯見天邉雙鶴飛此夕奄然而終及明有二鶴棲扵庭樹有仙樂盈室覺有異香逺近驚異共奔看之鄰人以是白扵湖洑鎮吏詳騐鶴已飛去因囚所報者裴及劉焚香告之曰汝若得道却為降鶴以雪隣人勿使其濫獲罪也良久雙鶴降于庭旬日又降𦵏扵桂巖之下棺輕但聞香氣異常發棺視之止衣舄而已今以桂巖所居為道室即乾符元年也出墉城集仙録薛𤣥同薛氏者河中少尹馮徽妻也自號𤣥同適馮徽二十年乃言素志稱疾獨處焚香誦黄庭經日二三遍又十三年夜有青衣玉女二人降其室將至有光如月照其庭廡香風颯然時秋初殘暑方甚而清凉虛爽飄若洞中二女告曰紫虚元君主領南方下校文籍命諸真大仙扵六合之内名山大川有志道者必降而教之𤣥同善功地司累奏簡在紫虛之府况聞女子立志君尤嘉之即日將親降扵此如此凡五夕皆焚香嚴盛以候元君咸通十五年七月十四日元君與侍女羣真二十七人降于其室𤣥同拜迎扵門元君憇坐良久示以黄庭澄神存修之㫖賜九華丹一粒使八年後吞之當遣玉女飈車迎汝扵嵩嶽矣言訖􅄆去𤣥同自是㝠心静神往往不食雖真仙降眄光景燭空靈風異香雲璈鈞樂奏扵其室馮徽亦不知也常復毁笑及黄巢犯闗馮與𤣥同寓晋陵中和元年十月舟行至瀆口欲抵别墅忽見河濵有朱紫官吏及戈甲武士立而序列若迎候狀所在㓂盗舟人見之驚愕不進𤣥同曰無懼也即移舟及之官吏皆拜𤣥同曰未也猶在春中但去無速也遂各􅄆去同舟者莫測之明年二月𤣥同沐浴餌紫虚所授之丹二仙女亦宻降其室十四日稱疾而卒有仙鶴三十六隻翔集庭宇形質柔緩狀若生人額中有白光一㸃良久化為紫氣沐浴之際𤣥髪重生立長數寸十五日夜雲彩滿空忽爾雷電棺葢飛在庭中失尸所在空衣而已異香羣鶴浃旬不休時僖宗在蜀浙西節度使周寳表其事詔付史官出墉城集仙錄戚逍遥戚逍遥兾州南宫人也父以教授自資逍遥十餘嵗好道清淡不為兒戯父母亦好道常行隂徳父以女誡授逍遥逍遥曰此常人之事耳遂取老子仙經誦之年二十餘適同邑蒯潯舅姑酷責之以􅅙農怠惰而逍遥旦夕以齋潔修行為事殊不以生計在心蒯潯亦屢責之逍遥白舅姑請返扵父母及父母家亦逼廹終以不能為塵俗事願獨居小室修道以資舅姑蒯潯及舅姑俱疑乃棄之扵室而逍遥但以香水為資絶食静想自歌曰笑看滄海欲成塵王母花前别衆真千嵗却歸天上去一心珍重世間人蒯氏及隣里悉以為妖夜聞室内有人語聲及曉見逍遥獨坐亦不驚又三日晨起舉家聞屋裂聲如雷但見所服衣履在室内仰視半天有雲霧鸞鶴復有仙樂香軿彩仗羅列逍遥與仙衆俱在雲中厯厯聞分别言語蒯潯馳報逍遥父母到猶見之郭邑之人咸奔觀望無不驚歎出續仙傳茶姥廣陵茶姥者不知姓氏鄉里常如七十嵗人而輕健有力耳聪目眀髪鬂滋黒耆舊相傳云晋元南渡後見之數百年顔狀不改每旦將一器茶賣扵市市人争買自旦至暮而器中茶常如新熟未嘗减少吏繫之扵獄姥持所賣茶器自牖中飛去出墉城集仙録張建章張建章為幽州行軍司馬尤好經史聚書至萬􅃃所居有書樓但以披閱清净為事曾賫府帥命往渤海遇風波泊舟忽有青衣泛一葉舟而至謂建章曰奉大仙命請大夫建章應之至一大島見樓䑓巋然中有女仙處之侍翼甚盛器食皆建章故郷之常味也食畢告退女仙謂建章曰子不欺暗室所謂君子也勿患風濤之苦吾令此青衣往來導之及還風波寂然往來皆無所懼及廻至西岸經太宗征遼碑半沒水中建章以帛裹面摸而讀之不失一字其篤學如此薊門之人皆能説之出北夢瑣言周寳周寳為浙西節度使治城隍至鶴林門得古冡棺櫝將腐發之有一女子面如生鉛粉衣服皆不敗掌役者以告寳親視之或曰此當時是嘗餌靈藥待時而發發則觧化之期矣寳即命改𦵏之具車轝聲樂以送寳與僚属登城望之行數里有紫雲覆輀車之上衆咸見一女子出自車中坐于紫雲冉冉而上久之乃沒開棺則空矣出稽神録太平廣記卷七十
