body:
  text: 太平廣記卷七十一道術一趙髙董仲君葛𤣥竇德𤣥趙髙秦王子嬰常寢扵望夷宫夜夢有人身長十丈􅂡髪絶青納玉舄而乗丹車駕朱馬至宫門云欲見秦王嬰閽者許進焉子嬰乃與之言謂嬰曰予是天使也従沙丘來天下將亂當有欲誅暴者翌日乃起子嬰既疑趙髙因囚髙扵咸陽獄納髙扵井中七日不死更以鑊煮之亦七日不沸戮之子嬰問獄吏曰髙其神乎獄吏曰初囚髙之時見髙懐有一青丸大如雀卵時方士説云趙髙先世受韓終丹法受此丹者冬日坐扵氷夏日卧扵爐上不覺寒熱也及髙戮子嬰棄尸扵九逵之路泣送者千家咸見一青雀従髙尸中出直飛入雲九轉之騐信于是乎出王子年拾遺記董仲君漢武帝嬖李夫人及夫人死後帝欲見之乃詔董仲君與之語曰朕思李氏其可得見乎仲君曰可逺見而不可同扵帷席帝曰一見足矣可致之仲君曰黒河之北有暗海之都也出潜英之石其色青質輕如毛羽寒盛則石温夏盛則石冷刻之為人像神語不異真人使此石像往則夫人至矣此石人能譯人語有聲無氣故知神異傳也帝曰此石可得乎仲君曰願得樓船百艘巨力千人能浮水登木者皆使明扵道術賫不死之藥乃至闇海經十年而還昔之去人或昇雲不歸或託形假死獲反者四五人得此石即令工人依先圗刻作李夫人形俄而成置扵輕紗幕中宛若生時帝大悦問仲君曰可得近乎仲君曰譬如中宵忽夢而晝可得親近乎此石毒特宜逺望不可廹也勿輕萬乗之尊惑此精魅也帝乃從其諫見夫人畢仲君使人舂此石人為九段不復思夢乃築夢靈䑓旹祀之出王子年拾遺記葛𤣥葛𤣥字孝先従左元放受九丹金液仙經未及合作常服餌术尤長扵治病鬼魅皆見形或遣或殺能絶榖連年不飢能積薪烈火而坐其上薪盡而衣冠不灼飲酒一斛便入深泉澗中卧酒觧乃出身不濡濕𤣥備覧五經又好談論好事少年數十人従𤣥逰學嘗船行見器中藏書札符數十枚因問此符之騐能為何事可見得否𤣥曰符亦何所為乎即取一符投江中逆流而上曰何如客曰異矣又取一符投江中停立不動須臾下符上上符下三符合一處𤣥乃取之又江邉有一洗衣女𤣥謂諸少年曰吾為卿等走此女何如客曰善乃投一符扵水中女便驚走數里許不止𤣥曰可以使止矣復以一符投水中女即止還人問女何怖而走荅曰吾自不知何故也𤣥常過主人主人病祭祀道精主人使𤣥飲酒精人言語不遜𤣥大怒曰奸鬼敢爾敕伍伯曵精人縳柱鞭􅆃即見如有人牽精人出者至庭抱柱觧衣投地但聞鞭聲血出淋漓精人故作鬼語乞命𤣥曰赦汝死罪汝能令主人病愈否精人曰能𤣥曰與汝三日期病者不愈當治汝精人乃見放𤣥常行過廟此神常使往來之人未至百歩乃下騎乗中有大樹數十株上有衆鳥莫敢犯之𤣥乗車過不下須臾有大風廻逐𤣥車塵埃漫天従者皆辟易𤣥乃大怒曰小邪敢爾即舉手止風風便止𤣥還以符投廟中樹上鳥皆墮地而死後數日廟樹盛夏皆枯尋廟屋火起焚燒悉盡𤣥見買魚者在水邉𤣥謂魚主曰欲煩此魚至河伯處可乎魚人曰魚已死矣何能為𤣥曰無苦也乃以魚與𤣥𤣥以丹書紙納魚腹擲魚水中俄頃魚還躍上岸吐墨書青色如大葉而飛去𤣥常有賔後來者出迎之坐上又有一𤣥與客語迎送亦然時天寒𤣥謂客曰貧居不能人人得爐火請作火共使得煖𤣥因張口吐氣赫然火出湏臾滿屋客盡得如在日中亦不甚熱諸書生請𤣥作可以戱者𤣥旹患熱方仰卧使人以粉粉身未及結衣荅曰熱甚不能起作戱𤣥因徐徐以腹揩屋棟數十過還復牀上及下冉冉如雲氣腹粉着屋棟連日猶在𤣥方與客對食食畢潄口口中飯盡成大蜂數百頭飛行作聲良久張口羣蜂還飛入口中𤣥嚼之故是飯也𤣥手拍牀蝦䗫及諸蟲飛鳥燕雀魚鼈之属使之舞皆應絃節如人𤣥止之即止𤣥冬中能為客設生𤓰夏致氷雪又能取數十錢使人􅄆投井中𤣥徐徐以器扵上呼錢出扵是一一飛従井中出悉入器中𤣥為客致酒無人傳杯杯自至人前或飲不盡杯亦不去畫流水即為逆流十丈許于時有一道士頗能治病従中國來欺人言我數百嵗𤣥知其誑後㑹衆坐𤣥謂所親曰欲知此公年否所親曰善忽有人従天上下舉坐瞩目良久集地着朱衣進賢冠入至此道士前曰天帝詔問公之比年㡬許而欺誑百姓道士大怖下牀長跪荅曰無狀實年七十三𤣥因撫手大笑忽然失朱衣所在道士大慚遂不知所之呉大帝請𤣥相見欲加榮位𤣥不聽求去不得以客待之常共逰宴坐上見道間人民請雨帝曰百姓請雨安可得乎𤣥曰易得耳即便書符著社中一時之間天地晦𡨕大雨流注中庭平地水尺餘帝曰水寜可使有魚乎𤣥曰可復書符水中須臾有大魚百許頭亦各長一二尺走水中帝曰可食乎𤣥曰可遂使取治之乃真魚也常従帝行舟遇大風百官船無大小多濡沒𤣥船亦淪失所在帝歎曰葛公有道亦不能免此乎乃登四望山使人船鈎船沒已經宿忽見𤣥従水上來既至尚有酒色謝帝曰昨因侍従而伍子胥見彊牽過卒不得捨去煩勞至尊暴露水次𤣥每行卒逢所親要于道間樹下折草刺樹以杯器盛之汁流如泉杯滿即止飲之皆如好酒又取土石草木以下酒入口皆是鹿脯其所刺樹以杯盛之杯至即汁出杯滿即止他人取之終不為出也或有請𤣥𤣥意不欲往主人彊之不得已随去行數百歩𤣥腹痛止而卧地須臾死舉頭頭斷舉四肢四肢斷更臭爛蟲生不可復近請之者遽走告𤣥家更見𤣥故在堂上此人亦不敢言之走還向𤣥死處已失𤣥尸所在與人俱行能令去地三四尺仍並而歩又𤣥逰㑹稽有賈人従中國過神廟廟神使主簿教語賈人曰欲附一封書與葛公可為致之主簿因以函書擲賈人船頭如釘着不可取及達㑹稽即以報𤣥𤣥自取之即得語弟子張大言曰吾為天子所逼留不遑作大藥今當尸觧八月十三日日中旹當發至期𤣥衣冠入室卧而氣絶其色不變弟子燒香守之三日夜半忽大風起發屋折木聲如雷炬滅良久風止忽失𤣥所在但見委衣床上帶無觧者旦問隣家隣家人言了無大風風止止一宅籬落樹木皆敗折也出神仙傳竇徳𤣥竇徳𤣥河南人也貞觀中任都水使者旹年五十七奉使江西發路上船有一人附載竇公每食餘恒啗附載者如是數日欲至揚州附載辭去公問曰何速荅曰某是司命使者因竇都水往揚州司命遣某追之公曰都水即是某也何不早言荅曰某雖追公公命合終于此地此行未至不可漏洩所以随公至此在路䝉公餘食常愧扵懐意望免公此難以報長者深恵公曰可禳否荅曰頗聞道士王逺和乎公曰聞之使者曰今見居揚州府幽𡨕間事甚機宻幸勿泄之但某在船日恒賴公賜食懐愧甚深今不拯公遂成負徳王尊師行業幽顯衆共尊敬其所施為人天欽尚與人章醮有阨難者天曹皆赦公可屈節咨請得度斯難明晚奉報旋滅去公既奉敕初到揚州長史以下諸官皆來迎公未論事但問官僚見王尊師乎于旹諸官莫測其意催遣迎之須臾王尊師至屏左右具陳情事師曰比内修行正法至于祭醮之業皆所不為公銜命既重勉勵為作法之效騐未敢懸知于是命侍童寫章登壇拜奏明晚使者來報公曰不免矣公又求哀甚切使者曰事已如此更令奏之明晚當報仍買好白帋作錢扵净處咨白天曹吏使即燒却若不燒還不得用不爾曹司稽留行更得罪公然之又白師師甚不悦公曰惟命是遵􅂅垂拯濟師哀之又奏明晚使者来還報云不免公苦問其故初不肯言後俛首荅曰道家章奏猶人間上章表耳前上之章有字失體次上之章復草書仍乞二字表奏人主猶須整肅况天尊大道其可忽諸所上之章咸􅀍棄擲既不聞徹有何濟乎公又重使令其請託兼具以事白師師甚悦云審爾乎比竊疑章表符奏繆妄而已如公所言騐若是乎乃扵壇上取所奏之章見字誤書草一如公言師云今奏之章貧道自寫再三合格如法奏之明旦使者報公云事已諧矣師曰此更延十二年公謂親表曰比見道家法未嘗信之今䝉濟㧞其騐如兹従今以往請終身事之便就清都觀尹尊師受法籙舉家奉道春秋六十九而卒出𤣥門靈妙記太平廣記卷七十一
