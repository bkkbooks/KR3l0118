body:
  text: 太平廣記卷四十神仙四十巴卭人章仇兼瓊石巨李山人陶尹二君許碏楊雲外杜悰南嶽真君巴卭人有巴卭人不知姓家有橘園因霜後諸橘盡收餘有二大橘如三四斗盎巴人異之即令攀摘輕重亦如常橘剖開每橘有二老叟鬚眉皤然肌體紅潤皆相對𧰼戲身僅尺餘談笑自若剖開後亦不驚怖但與決賭賭訖叟曰君輸我海龍神第七女髪十兩智瓊額黄十二枚紫綃披一副綘臺山霞實散二庾瀛洲玉塵九斛阿母療髓凝酒四鍾阿母女態盈娘子躋虛龍縞襪八緉後日於王先生青城草堂還我耳又有一叟曰王先生許來竟待不得橘中之樂不減商山但不得深根固蒂為摘下耳又一叟曰僕饑矣須龍根脯食之即於袖中抽出一草根方圓徑寸形狀宛轉如龍毫釐罔不周悉因削食之隨削隨滿食訖以水噀之化為一龍四叟共乘之足下泄泄雲起須臾風雨晦㝠不知所在巴人相傳云百五十年已來如此似在隋唐之間但不知指的年號耳出𤣥恠録章仇兼瓊章仇兼瓊尚書鎮西川常令左右搜訪道術士有一鬻酒者酒勝其黨又不急於利賒貸甚衆每有紗帽藜杖四人來飲酒皆至數斗積債十餘石即併還之談諧笑謔酣暢而去其話言愛説孫思邈又云此小兒有何所㑹或報章仇公乃遣親吏候其半醉前拜言曰尚書令傳語某苦心修學知仙官在此欲候起居不知俯賜許否四人不顧酣樂如舊逡巡問酒家曰適飲酒幾斗曰一石皆拍掌笑太多言訖不離席上已不見矣使者具報章仇公公遂專令探伺自後月餘不至一日又來章仇公遂潛駕往詣從者三四人公服至前躍出載拜公自稱姓名相顧徐起唯柴燼四枚在於坐前不復見矣時𤣥宗好道章仇公遂奏其事詔召孫公問之公曰此太白酒星耳仙格絶髙每遊人間飲酒處處皆至尤樂蜀中自後更令尋訪絶無踪跡出逸史石巨石巨者胡人也居幽州性好服食大厯中遇疾百餘日形體羸瘦而神氣不衰忽謂其子曰河橋有卜人可蹔屈致問之子還云初無卜人但一老姥爾巨云正此可召子延之至舍巨臥堂前紙槅中姥徑造巨所言甚細密巨子在外聽之不聞良久姥去後數日旦有白鶴從空中下穿巨紙槅入巨所和鳴食頃俄升空中化一白鶴飛去巨子往視之不復見巨子便隨鶴而去至城東大墩上見大白鶴數十相隨上天冉冉而滅長史李懷仙召其子問其事具答云然懷仙不信謂其子曰此是妖訛事必汝父得仙吾境内苦旱當為致雨不雨殺汝子歸焚香上陳懷仙使金叅軍齎酒脯至巨宅致祭其日大雨遠近皆足懷仙以所求靈驗乃於巨宅立廟歳時享祀焉出廣異記李山人李中丞汶在朝日好術士時李山人寓居門館汶敬之汶有子數人其長曰元允先與襄陽韋氏結婚乃自京之襄陽遠就嘉㑹發後山人白汶曰賢郎有厄某能相救只要少時不交人事以圖静處汶許之山人别居良久出曰賢郎厄已過然所乘馬死從者斃其一身少見血餘無大損汶疑信半之乃使人至襄州沿路偵候使廻得信云中道過大橋橋壞馬死奴斃身為横木決破頤頷間少許出血尋即平復公歎異之後忽辭云某久此為客將有没化之期但益悵然汶曰何忽若是曰運數且爾亦當委順汶曰然可少留乎曰可汶固留之月餘又云欲遂前期汶又留半月曰此須去矣乃晨起與汶訣别其後諸相識人家皆云同日見李山人來吿别初别時曰某有少事欲言之於第三郎君問何事乃云十五年後於昆明池邊見人家小兒頰有疵者即某身也乃行其後亦不知所之出原化記陶尹二君唐大中初有陶太白尹子虛二老人相契為友多遊嵩華二峰採松脂茯苓為業二人因攜釀醖陟芙蓉峰尋異境憇于大松林下因傾壺飲聞松梢有二人撫掌笑聲二公起而問曰莫非神仙乎豈不能下降而飲斯一爵笑者曰吾二人非山精木魅僕是秦之役夫彼即秦宫女子聞君酒馨頗思一醉但形體改易毛髮恠異恐子悸慄未能便降子但安心徐待吾當返穴易衣而至幸無遽捨我去二公曰敬聞命矣遂久伺之忽松下見一丈夫古服儼雅一女子鬟髻綵衣俱至二公拜謁忻然還坐頃之陶君啓神仙何代人何以至此既獲拜侍願袪未悟古丈夫曰余秦之役夫也家本秦人及稍成童值始皇帝好神仙術求不死藥因為徐福所惑搜童男童女干人將之海島余為童子乃在其選但見鯨濤蹙雪蜃閣排空石橋之柱欹危蓬岫之烟杳𣺌恐葬魚腹猶貪雀生於難厄之中遂出奇計因脱斯禍歸而易姓業儒不數年中又遭始皇煨燼典墳坑殺儒士搢紳泣血􅆪紱悲號余當此時復在其數時於危懼之中又出奇計乃脱斯苦又改姓氏為板築夫又遭秦皇歘信妖妄遂築長城西起臨洮東之海曲隴鴈悲晝塞雲咽空鄉關之思魂飄砂磧之勞力竭墮趾傷骨䧟雪觸氷余為役夫復在其數遂於辛勤之中又出奇計得脱斯難又改姓氏而業工乃屬秦皇帝崩穿鑿驪山大修塋域玉墀金砌珠樹瓊枝綺殿錦宫雲樓霞閣工人匠石盡閉幽隧余為工匠復在數中又出奇謀得脱斯苦凡四設權奇之計俱脱大禍知不遇世遂逃此山食松脂木實乃得延齡耳此毛女者乃秦之宫人同為殉者余乃同與脱驪山之禍共匿於此不知於今經幾甲子耶二子曰秦於今世繼正統者九代千餘年興亡之事不可厯數二公遂俱稽顙曰余二小子幸遇大仙多刼因依使今諧遇金丹大藥可得聞乎朽骨腐肌實冀庥䕃古丈夫曰余本凡人但能絶其世慮因食木實乃得凌虚嵗久日深毛髮紺緑不覺生之與死俗之與仙鳥獸為隣猱狖同樂飛騰自在雲氣相隨亡形得形無性無情不知金丹大藥為何物也二公曰大仙食木實之法可得聞乎曰余初餌栢子後食松脂遍體瘡瘍膓中痛楚不及旬朔肌膚瑩滑毛髮澤潤未經數年凌虛若有梯步險如履地飄飄然順風而翔皓皓然隨雲而昇漸混合虛無潛孚造化彼之與我視無二物凝神而神爽養氣而氣清保守胎根含藏命􅎞天地尚能覆載雲氣尚能􅉱蒸日月尚能晦明川岳尚能融結即余之體莫能敗壞矣二公拜曰敬聞命矣飲將盡古丈夫折松枝叩玉壺而吟曰餌栢身輕疊嶂間是非無意到塵寰冠裳暫備論浮世一餉雲遊碧落間毛女繼和曰誰知古是與今非間躡青霞逺翠微簫管秦樓應寂寂綵雲空惹薜蘿衣古丈夫曰吾與子邂逅相遇那無戀戀耶吾有萬嵗松脂千秋栢子少許汝可各分餌之亦應出世二公捧受拜荷以酒吞之二仙曰吾當去矣善自導養無令漏泄伐性使神氣暴露于窟舍耳二公拜别但覺超然莫知其蹤去矣旋見所衣之衣因風化為花片蝶趐而揚空中陶尹二公今巢居蓮花峰上顏臉微紅毛髪盡緑言語而芳馨滿口履步而塵埃去身雲臺觀道士往往遇之亦時細話得道之來由爾出傳奇許碏許碏自稱髙陽人也少為進士累舉不第晚學道於王屋山周遊五岳名山洞府後從峨眉山經兩京復自襄汴來抵江淮茅山天台四明仙都委羽武夷霍桐羅浮無不遍厯到處皆于石厓峭壁人不及處題云許碏自峨眉山尋偃月子到此覩筆蹤者莫不歎其神異竟莫詳偃月子也後多遊廬江間常醉吟曰閬苑花前是醉鄉􅂿飜王母九霞觴羣仙拍手嫌輕薄謫向人間作酒狂好事者或詰之曰我天仙也方在崑崙就宴失儀見謫人皆笑之以為風狂後當春景揷花滿頭把花作舞上酒家樓醉歌昇雲飛去出續神仙傳楊雲外唐乾寧中雲安縣漢城宫道士楊雲外常以酒自晦而行止異常前進士錢若愚甚敬之一旦齋沐詣其山觀宿於道齋翌日䖍誠歛袵而白之曰師丈小子凡鄙神仙之事雖聆其説果有之乎楊曰有之我即其人也若示以飛空躡虚履水蹈火即日有千萬人就我不亦煩䙝乎因騰躍上升冉冉在空中良久而下若愚稽顙自是信有神仙矣出北夢𤨏言杜悰杜邠公悰為小兒時常至昭應觀與羣兒戲于野忽有一道士獨呼悰以手摩挲曰郎君勤讀書勿與諸兒戲指其觀曰吾居此頗能相訪否既去悰即詣之但見􅂽凉他無所有獨一殿巍然存焉内有老君像初道士半面紫黑色至是詳視其像頗類向所見道士乃半面為漏雨所淋故也出玉泉子南岳真君南岳道士秦保言勤于焚修曾白真君云上仙何以須紙錢有所未諭既而夜夢真君曰紙錢即㝠吏所藉我又何須此由是岳中益信重之出北夢瑣言太平廣記卷四十
