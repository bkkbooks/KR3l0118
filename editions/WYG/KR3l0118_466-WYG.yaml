body:
  text: 太平廣記卷四百六十六宋李昉等編水族三魚夏鯀東海人昆明池徐景山潘惠延葛𤣥介象龍門池中魚通川河行海人隂火裴伷王旻之韓愈鄖鄉民赤嶺溪夏鯀堯命夏鯀治水九載無績鯀自沉於羽淵化為𤣥魚時植鬐振鱗横遊波上見者謂為河精羽淵與河海通源也上古之人於羽山之下修立鯀廟四時以致祭祀常見此黑魚與蛟龍瀺灂而出觀者驚而畏之至舜命禹疏川奠岳行遍日月之下唯不踐羽山之地濟巨海則黿龜為梁踰峻山則神龍為負皆聖徳之感也鯀之化其事互説神變猶一而色狀不同𤣥魚黄熊四音相亂傳寫流誤並略記焉出王子年拾遺東海人昔人有遊東海者既而風惡船破補治不能制隨風浪莫知所之一日一夜得一孤洲其侣懽然下石植纜登洲煮食食未熟而洲没在船者砍斷其纜船復漂蕩向者孤洲乃大魚也吸波吐浪去疾如風在洲上死者十餘人出西京雜記昆明池昆明池刻石為鯨魚每至雷雨魚常鳴吼鬐尾皆動漢世祭之以祈雨往往有驗出西京雜記徐景山魏明帝遊洛水水中有白獺數頭美净可憐見人輒去帝欲取之終不可得侍中徐景山奏云臣聞獺嗜鯔魚乃不避死可以此誑之乃畫板作兩鯔魚懸置岸上於是羣獺競逐一時執得帝甚嘉之謂曰聞卿能畫何以妙也答曰臣未嘗執筆然人之所作自可庶幾耳帝曰是善用所長也出續齊諧記潘恵延平原高苑城東有魚津傳云魏末平原潘府君字恵延自白馬登舟之部手中筭􅇸遂墜於水囊中本有鍾乳一兩在郡三年濟水泛溢得一魚長三丈廣五尺刳其腹中得頃時墜水之嚢金針尚在鍾乳消盡其魚得脂數十斛時人異之出酉陽雜記葛𤣥葛𤣥見遺大魚者𤣥云暫煩此魚到河伯處乃以丹書紙内魚口擲水中有頃魚還躍上岸吐還書青黑色如木葉而飛又𤣥與吳主坐樓上見作請雨土人𤣥曰雨易得耳即書符著社中一時之間大雨流淹帝曰水中有魚乎𤣥復書符擲水中須臾有大魚數百頭使人取食之出神仙傳介象介𧰼與吳主共論鯔魚之美乃於殿庭作坎汲水滿之并求釣𧰼起餌之須臾得鯔魚帝驚喜乃使厨人切食之出神仙傳龍門龍門山在河東界禹鑿山斷門一里餘黄河自中流下兩岸不通車馬每暮春之際有黄鯉魚逆流而上得者便化為龍又林登云龍門之下每歲季春有黄鯉魚自海及諸川争來赴之一歲中登龍門者不過七十二初登龍門即有雲雨隨之天火自後燒其尾乃化為龍矣其龍門水浚箭湧下流七里深三里出三秦記池中魚風俗通曰城門失火禍及池魚舊説池仲魚人姓字也居宋城門城門失火延及其家仲魚燒死又云宋城門失火人汲取池中水以沃灌之池中空竭魚悉露死喻惡之滋并傷良謹也出風俗通通川河通川界内多獺各有主養之並在河側岸間獺若入穴插雉尾於獺孔前獺即不敢出去却尾即出取得魚必須上岸人便奪之取得多然後自喫喫飽即鳴板以驅之還插雉尾更不敢出出朝野僉載行海人昔有人行海得洲木甚茂乃維舟登岸㸑於水傍半炊而林没於水遽斷其纜乃得去詳視之大蠏也出異物志隂火海中所生魚蜄置隂處有光初見之以為怪異土人常推其義葢鹹水所生海中水遇隂物波如然火滿海以物擊之迸散如星火有月即不復見木𤣥虛海賦云隂火退然豈謂此乎出嶺南異物志裴伷唐裴伷開元七年都督廣州仲秋夜漏未艾忽然天曉星月皆没而禽鳥飛鳴矣舉郡驚異之未能諭然已晝矣裴公於是衣冠而出軍州將吏則已集門矣遽召叅佐泊賔客至則皆異之但謂衆惑固非中夜而曉即詢挈壺氏乃曰常夜三更尚未也裴公罔測其倪因留賔客於㕔事共須日之昇良乆天色昏暗夜景如初官吏則執燭而歸矣詰旦裴公大集軍府詢訪其説而無能辨者裴因命使四訪闔界皆然即令北訪湘嶺湘嶺之北則無斯事數月之後有商舶自遠南至因謂郡人云我八月十一日夜舟行忽遇巨鼇出海舉首北向而雙目若日照耀千里毫末皆見乆之復没夜色依然徴其時則裴公集賔寮之夕也出集異記王旻之唐王旻之在牢山使人告琅琊太守許誡言曰貴部臨沂縣其沙村有逆鱗魚要之調藥物逆鱗魚仙經云謂之肉芝故是欲以調藥也願與太守㑹於此誡言許之則令其沙村設儲峙以待太和先生先生既見誡言誡言命漁者捕所求其沙村西有水焉南北數百歩東西十丈色黑至深岸有神祠鄉老言於誡言曰十年前村中少年於水釣得一物狀甚大引之不出於是下釣數十道方引其首出狀如猛獸閉目其大如車輪村人謂其死也以繩束縛繞之樹十人同引之猛獸忽張目大震聲若霹􅆮近之震死者十餘人因怖䘮去精魂為患者二十人猛獸還歸於水乃建祠廟祈禱之水旱必有應若逆鱗魚未之有也誡言乃止出紀聞韓愈唐吏部侍郎韓文公愈自刑部侍郎貶潮陽守先是郡西有大湫湫有鰐魚約百餘尺每一怒則湫水騰盪林嶺如震民之馬牛有濵其水者輒吸而噬之一瞬而盡為所害者莫可勝計民患之有年矣及愈刺郡既至之三日問民不便事俱曰郡西湫中之鰐魚也愈曰吾聞至誠感神昔魯恭宰中牟雉馴而蝗避黄覇治九江虎皆遁去是知政之所感故能化禽獸矣即命庭掾以牢醴陳於湫之旁且祝曰汝水族也無為生人患既而沃以酒是夕郡西有風雷聲震山野迨夜分齊焉明日里民視其湫水已竭公命使窮其跡至湫西六十里易地為湫巨鰐亦隨而徙焉自是郡民獲免其患故工部郎中皇甫湜撰愈神道碑叙曰刑部為潮陽守云洞獠海夷陶然皆化鰐魚稻蟹不暴民物葢謂此矣出宣室志鄖鄉民唐元和末均州鄖鄉縣有百姓年七十飬獺十餘頭捕魚為業隔日一放將放時先閉於深溝斗門内令饑然後放之無網罟之勞而獲利甚厚令人抵掌呼之羣獺皆至縁衿藉膝馴若守狗户部郎中李福親見之出酉陽雜爼赤嶺溪歙州赤嶺下有大溪俗傳昔有人造横溪魚梁魚不得下夜半飛從此嶺過其人遂於嶺上張網以捕之魚有越網而過者有飛不過而變為石者今每雨其石即赤故謂之赤嶺而浮梁縣得名因此按吳都賦云文鰩夜飛而觸綸葢此𩔖也出歙州圖經太平廣記卷四百六十六
