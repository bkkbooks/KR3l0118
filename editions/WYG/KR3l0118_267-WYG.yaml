body:
  text: 太平廣記卷二百六十七酷暴一麻秋宋幼帝髙洋南陽王朱粲陳承親薛震陳元光獨孤莊索元禮羅織人元楷武承嗣張易之兄弟郝𧰼賢周興侯思止來俊臣麻秋後趙石勒將麻秋者太原胡人也植性虓險鴆毒有兒啼母輙恐之麻胡來啼聲絶至今以為故事出朝野僉載宋幼帝明帝崩昱嗣位是為幼帝㓜帝狂暴恣行誅戮出入無度從者並執鋋矛錐鋸自隨有忤意擊腦椎陰刺心剖腹之誅日有數十孝武帝二十八子明帝殺其十六餘皆帝殺之子孫無在朝者出談藪髙洋北齊髙洋以光武中興為誅劉氏不盡於是大誅諸元死者千餘棄之漳水有捕魚者得爪甲謂之元郎漁人不忍食之唯元巒元長春元景安三家免誅巒以其女為常山王妃春安等以其多力善射故也景安兄景皓曰寜為玉碎不作瓦全景安奏其言帝復殺之自是元氏子孫老幼貴賤無遗矣出談藪南陽王北齊南陽王入朝上問何以為樂王曰致蠍最樂遂收蠍一宿得五斗置大浴斛中令一人脫衣而入被蠍所螫宛轉號呌苦痛不可言食頃而死帝與王看之極喜出朝野僉載朱粲隋末􅂽亂狂賊朱粲起於襄鄧間嵗飢米斛萬錢亦無得處人民相食粲乃驅男女小大仰一大銅鐘可三百石煮人肉以餧賊生靈殱於此矣闕陳承親周恩州刺史陳承親嶺南大首領也専使子弟兵刼江有一縣令從安南來承親馮買二婢令有難色承親每日重設邀屈甚殷勤送别江亭即遣子弟兵從後刼殺盡取財物將其妻及女至州妻叩頭求作婢不許亦縊殺之取其女前後官人家過承親禮遇厚者必隨後刼殺無有免者出朝野僉載薛震周杭州臨安尉薛震好食人肉有債主及奴詣臨安於客舍遂飲之醉殺而臠之以水銀和煎并骨消盡後又欲食其婦婦覺而遁縣令詰得其情申州錄事奏奉敇杖殺之出朝野僉載陳元光周嶺南首領陳元光設客令一袍袴行酒光怒令曳出遂殺之須臾爛煮以食諸客後呈其二手客懼攫喉而吐出摭言獨孤莊周瀛州刺史獨孤莊酷虐有賊問不承莊引前曰若健兒一一具吐放汝遂還巾帶賊並吐之諸官以為必放頃莊曰將我作具來乃以鐡鈎長尺餘甚銛利以繩掛於樹間謂賊曰汝不聞健兒鈎下死令以胲鈎之遣壯士掣其繩則鈎出於腦矣謂司法曰此法何如答曰弔民伐罪深得其宜莊大笑後莊左降施州刺史染病唯憶人肉部下有奴婢死者遣人割肋下肉食之嵗餘卒出朝野僉載索元禮周推事使索元禮時人號為索使訊囚作鐡籠頭􅀢呼角反其頭仍加楔焉多至腦裂髓出又為鳳凰曬翅獮猴鑽火等以椽闗手足而轉之並砍骨至碎又懸囚於梁下以石縋頭其酷法如此元禮故胡人薛師之假父後坐贜賄流死嶺南出朝野僉載羅織人周來俊臣羅織人罪皆先進狀敕依奏即籍没徐有功出死囚亦先進狀某人罪合免敕依然後斷雪有功好出罪皆先奉進止非是自専張湯探人主之情葢為此也出談藪元楷唐羽林將軍元楷三代告宻得官男彦瑋告劉誠之破家彦瑋處侍御麟徳二年七月三日楷以反逆誅家口配嶺南所謂積惡之家必有餘殃也出朝野僉載武承嗣周補闕喬知之有婢􅆼娘姝艶能歌舞有文章知之特幸為之不婚偽魏王武承嗣暫借教姬人粧梳納之更不放還知之乃作綠珠怨以寄之焉其詞曰石家金谷重新聲明珠十斛買娉婷此日可憐偏自許此時歌舞得人情君家閨閣不曽觀好將歌舞借人看意氣雄豪非分理驕矜勢力横相干辭君去君終不忍徒勞掩袂傷鉛粉百年離恨在髙樓一代容顔為君盡􅆼娘得詩飲泣不食三日投井而死承嗣出其尸於裙帶上得詩大怒乃諷羅織人告之遂斬知之於南市破家籍没出朝野僉載張易之兄弟周張易之為控鶴監弟昌宗為秘書監昌儀為洛陽令競為豪侈易之為大鐡籠置鵝鴨於其内當中爇炭火銅盆貯五味汁鵝鴨遶火走渴即飲汁火炙痛旋轉表裏皆熟毛落盡肉赤烘烘乃死昌宗活繫驢於小室内􅅡炭火置五味汁如前法昌儀取鐵橛釘入地縳狗四足於橛上放鷹鷂活按其肉食肉盡而狗未死號呌酸楚不復忍聽易之曽過昌儀憶馬腸儀取從騎破肋取腸良久方死後誅易之昌宗等百姓臠割其肉肥白如猪肪煎炙而食昌儀打雙脚折抉取心肝而後死斬其首送都時云狗馬報出朝野僉載郝𧰼賢郝𧰼賢處俊孫也武后宿怒其祖戮及其孫𧰼賢臨刑極罵而死自此法司恐是將殺人必先以木丸塞口然後加刑出談賔錄周興周秋官侍郎周興推劾殘忍法外苦楚無所不為時人號牛頭阿婆百姓怨謗興乃牓門判曰被告之人問皆稱枉斬决之後咸悉無言出朝野僉載侯思止周侍御史侯思止醴泉賣餅食人也羅告准例酬五品於上前索御史上曰卿不識字對曰獬豸豈識字但為國觸罪人而已遂授之凡推勘殺戮甚衆更無餘語唯謂囚徒曰不用你書言筆語止還我白司馬若不肯來俊即與你孟青横遭苦楚非命者不可勝數白司馬者北邙山白司馬坂也來俊者中丞來俊臣也孟青者將軍孟青棒也後坐私畜錦朝堂决殺之出朝野僉載來俊臣來俊臣雍人也父操松州長史俊臣少詭譎無賴反覆險詖殘忍􅂽慝舉世無比則天朝羅告諸王貴臣授朝散大夫拜侍御史按制獄少不㑹意者必牽引之前後坐夷滅千餘家朝廷累息無敢言者道路以目與侍御史王𢎞義侯思止腹心羅告衣冠無間春夏誅斬人不絶時於麗景門内置制獄亦號為新開門但入新開門百不全一𢎞義戲謂麗景門為例竟門言入此門例竟也俊臣與其黨朱南山等十餘輩造告宻羅織經數千言皆有條貫支節張本布置事狀由緒令其黨告之或投匭以聞則天多委俊臣按問俊臣别造枷號為突地吼遭其枷者輪轉於地斯須悶絶矣又作枷有十號棒名見即承復有鐵圏籠頭當訊囚圏中下楔其餘名號數十大略如此也囚人無貴賤必先列枷棒於地召囚前曰此是作具見之魂膽飛越無不自誣者則天重其爵賞以酬之故更競勸為酷矣由是告宻之徒紛然道路名流僶俛閲日而已朝士因朝黙遭掩襲至於族滅與其家訣曰不知重相見否天授中春官尚書狄仁傑天官侍郎任令暉文昌右丞盧獻等五人並為其羅告俊臣既以族人家為功欲引人承反乃奏請降敕一問即承同首例得減死以脇仁傑等令承反傑欵曰大周革命萬物惟新唐室舊臣甘從誅戮反是實俊臣乃少寛之其判官王徳夀謂傑曰尚書事已爾且得減死夀今業已受驅策意欲求少階級馮尚書牽楊執柔可乎傑曰若之何夀曰尚書昔在春官執柔任某司員外引之可也傑曰皇天后土遣狄仁傑行此事耶以頭觸柱血流被面德夀懼而謝焉仁傑既承反所司待日行刑不復嚴防得馮首者求筆硯折被頭帛書之叙寃苦置於綿衣中遣謂德夀曰時方熱請赴家人去其緜德夀不復疑也家人得衣中書傑子光逺持之稱變得召見則天覽之惘然召問俊臣曰卿言仁傑等承反今其子弟訟寃何也俊臣曰此等何能自伏其罪臣寢處之甚安亦不去其巾帶則天令通事舍人周綝往視之俊臣遂命獄人令假傑等巾帶行立於西命綝視之懼俊臣莫敢西顧但視東唯諾而已俊臣令綝少留附進狀乃令判官妄為傑等作謝死表代署而進之鳳閣侍郎樂思誨男年八九嵗其家已族且隸於司農上變得召見言俊臣等刻毒願陛下假條反狀以付之無大小皆如狀矣則天意少解乃召見傑等曰卿承反何也傑等曰向不承已死於枷棒矣則天曰何為作謝死表傑等曰無因以表示之乃知其代署因釋此五家俊臣復奏大將軍張乾最大將軍給使范雲仙於洛陽牧院勅按問不堪苦自訟於國有功言辭頗厲俊臣命衛士亂刀斫殺之雲仙亦歴事先朝稱使司寃苦俊臣言命截去其舌士庻破膽無敢言者俊臣累坐贓出同州參軍逼奪同列參軍妻仍辱其母莫敢言者尋授河南尉累遷太僕卿則天賜其奴婢十人當受於司農時西畨酋長大將軍斛瑟羅家有細婢善歌舞俊臣且止司農賜令其黨羅告斛瑟羅反將圖其婢諸酋長詣闕割耳􅋇面訟寃者數十人乃得不族時綦連耀與劉思禮等有議長安尉吉頊知之以語俊臣俊臣發之連坐族者數十俊臣恃擅其功復羅遘頊頊得召見庭訴僅而免俊臣先逼娶太原王慶說女俊臣素與河東衛遂忠有舊忠名行雖不著然好學有詞辨酒酣詣俊臣俊臣方與妻族宴集應門者妄云已出矣遂忠知妄入其家慢罵辱之俊臣耻其親族命毆擊反接既而免之自此搆隙俊臣將羅告武氏諸偽王及太平公主張易之等遂忠發之則天屢保持而諸武及公主皆懼共毁之乃棄市國人無少長皆怨恨競剮其肉斯須而盡則天覺悟降敕曰來俊臣閭巷小人輕險有素以其頗申糺謫當謂微効欵誠諸王等磐石宗枝必期毁敗南北衙文武將相咸擬傾危宜加赤族之誅以雪蒼生之憤既族之無問士庶男女相慶於道路咸曰自此後卧乃背得著牀不爾朝不謀夕矣出御史臺記太平廣記卷二百六十七
