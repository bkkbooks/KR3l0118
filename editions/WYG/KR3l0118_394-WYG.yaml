body:
  text: 太平廣記卷三百九十四宋李昉等編雷二陳鸞鳯建州山寺蕭氏子周洪蕭澣僧文浄徐智通雷公廟南海陳義葉遷韶元積裴用東陽郡山段成式伯智空陳鸞鳯唐元和中有陳鸞鳯者海康人也負義氣不畏鬼神鄉黨咸呼為後來周處海康者有雷公廟邑人䖍潔祭祀禱祝既淫妖妄亦作邑人每嵗聞新雷日記某甲子一旬復值斯日百工不敢動作犯者不信宿必震死其應如響時海康大旱邑人禱而無應鸞鳯大怒曰吾之鄉乃雷鄉也為神不福况受人奠酹如斯稼穡既焦陂池已涸牲牢饗盡焉用廟為遂秉炬􅅡之其風俗不得以黄魚􅇾肉相和食之亦必震死是日鸞鳯持竹炭刀於野田中以所忌物相和啖之將有所祠果怪雲生惡風起迅雷急雨震之鸞鳯乃以刃上揮果中雷左股而斷雷墮地狀𩔖熊猪毛角肉翼青色手執短柄剛石斧流血注然雲雨盡滅鸞鳯知雷無神遂馳赴家告其血屬曰吾斷雷之股矣請觀之親愛愕駭共往視之果見雷折股而已又持刀欲斷其頸齧其肉為羣衆共執之曰霆是天上靈物爾為下界庸人輒害雷公必我一鄉受禍衆捉衣袂使鸞鳯奮擊不得逡廵復有雲雷哀其傷者和斷股而去雖然雲雨自午及酉涸苖皆立矣遂􅀍長㓜共斥之不許還舍於是持刀行二十里詣舅兄家及夜又􅇜雷霆天火焚其屋復持刀立於庭雷終不能害旋有人告其舅兄向來事又為逐出復往僧室亦為霆震㷊爇如前知無容身處乃夜秉炬入於乳穴嵌孔之處後雷不復能震矣三暝然後返舍自後海康每有旱邑人即醵金與鸞鳯請依前調二物食之持刀如前皆有雲雨滂沱終不能震如此二十餘年俗號鸞鳳為雨師至太和中刺史林緒知其事召至州詰其端倪鸞鳳云少壯之時心如鐵石􅄦神雷電視之若無當者願殺一身請蘇萬姓即上𤣥焉能使雷􅄦敢逞其凶臆也遂獻其刀於緒厚酬其直出傳竒建州山寺唐栁公權侍郎嘗見親故説元和末止建州山寺夜半覺門外喧閙潛於忩櫺中窺之見數人運斤造雷車宛如圖畫者久之一􅅉氣忽斗暗其人雙目遂昏出酉陽雜俎蕭氏子唐長慶中蘭陵蕭氏子以膽勇稱客逰湘楚至長沙郡舎於仰山寺是夕獨處撤燭忽暴雷震蕩􅉉雨久而不止俄聞西垣下窣窣有聲蕭恃膂力曾不之畏榻前有巨捶持至垣下俯而撲焉一舉而中有聲甚厲若呼吟者因連撲數十聲遂絶風雨亦霽蕭喜曰怪且死矣迨曉西垣下覩一􅄦極異身盡青傴而庳有金斧木楔以麻縷結其體焉瞬而喘若甚困状於是具告寺僧觀之或曰此雷鬼也蓋上帝之使耳子何為侮於上帝禍且及矣里中人具牲酒祀之俄而雲氣曛晦自室中發出户昇天􅄦亦從去既而雷聲又興僅數食頃方息蕭氣益鋭里中人皆以壮士名焉出宣室志周洪唐處士周洪云寳歴中邑客十餘人逃暑㑹飲忽驟風雨有物墮如玃兩目睒睒衆驚伏於牀下倏忽上階周視俄失所在及雨定稍稍能起相顧但耳悉泥矣邑人云向来雷震牛戰鳥墜而邑客止覺殷殷然出酉陽雜俎蕭澣唐蕭澣初至遂州造二旛刹施於寺齋慶畢作樂忽暴雷震刹俱成數十片至来嵗雷震日澣死出酉陽雜俎僧文浄唐金州水陸院僧文浄因夏屋漏滴於腦遂作小瘡經年若一大桃來嵗五月後因雷雨霆震穴其贅文浄睡中不覺寤後唯贅痛遣人視之如刀割有物𨼆處乃蟠龍之状也出聞竒録徐智通唐徐智通楚州醫士也夏夜乗月於栁堤閒步忽有二客笑語於河橋不虞智通之在隂翳也相謂曰明晨何以為樂一曰無如南海赤巖山弄珠耳答曰赤巖主人嗜酒留客必醉僕来日未後有事於西海去恐復為縈滯也不如只於此郡龍興寺前與吾子較技耳曰君將何戲曰寺前古槐僅百株我霆震一聲剖為纎莖長短粗細悉如食筯君何以敵答曰寺前素為郡之戯場毎日中聚觀之徒通計不下三萬人我霆震一聲盡散其髮毎縷仍為七結二人因大笑約諾而去智通異之即告交友六七人遲明先俟之是時晴朗己午間忽有三雲大如車輪凝於寺上須臾昬黒咫尺莫辨俄而霆震兩聲人畜頓踣及開霽寺前槐林劈㭊分散布之於地皆如算子小大洪纎無不相肖而寺前負販戲弄觀㸔人數萬衆髮悉解散毎縷皆為七結出集異記又洛京天津橋有儒生逢二老人言話風骨甚異潛聴之云明日午時於寺中鬭疾速一人曰公欲如何一人曰吾一聲令寺内聴講驢馬盡結尾一人曰吾一聲令十丈旛竿盡為算子仍十枚為一積儒生乃與一二宻友於寺候之至午果雷雨霹􅆮一聲客走出視驢馬數百匹盡結尾一聲旛竿在廊下為算子十枚一積出録異記雷公廟雷州之西雷公廟百姓毎嵗配連皷雷車有以魚􅇾肉同食者立為霆震皆敬而憚之毎大雷雨後多於野中得黳石謂之雷公墨叩之鎗然光瑩如漆又如霹􅆮處或土木中得楔如斧者謂之霹􅆮楔小兒佩帶皆辟驚邪孕婦磨服為催生藥必驗出嶺表錄異南海南海秋夏間或雲物慘然則見其暈如虹長六七尺此候則颶風必發故呼為颶母見忽有震雷則颶風不作矣舟人常以為候預為備之出嶺表錄異陳義唐羅州之南二百里至雷州為海康郡雷之南瀕大海郡蓋因多雷而名焉其聲恒如在􅉉宇上雷之北髙亦多雷聲如在尋常之外其事雷畏敬甚謹毎具酒殽奠焉有以􅇾肉雜魚食者霹􅆮輒至南中有木名曰棹以煮汁漬梅李俗呼為棹汁雜􅇾肉食者霹􅆮亦至犯必響應牙門將陳義𫝊云義即雷之諸孫昔陳氏因雷雨晝㝠庭中得大卵覆之數月卵破有嬰兒出焉自後日有雷扣擊戸庭入其室中就於兒所似若乳哺者嵗餘兒能食乃不復至遂以為己子義即卵中兒也又云嘗有雷民畜畋犬其耳十二毎將獵必笞犬以耳動為獲數未嘗全動一日諸耳畢動既獵不復逐獸至海傍測中嘷鳴郡人視之得十二大卵以歸置於室中後忽風雨若出自室既霽就視卵破而遺甲存焉後郡人分其卵甲嵗時祀奠至今以獲得遺甲為豪族或隂㝠雲霧之夕郡人呼為雷耕曉視野中果有墾跡有是乃為嘉祥又時有雷火發於野中毎雨霽得黒石或圓或方號雷公墨凡訟者投牒必以雷墨雜常墨書之為利人或有疾即掃虚室設酒食鼓吹旛蓋迎雷於數十里外既歸屠牛􅇾以祭因置其門鄰里不敢輒入有誤犯者為唐突大不敬出猪牛以謝之三日又送如初禮又云嘗有雷民因大雷電空中有物豕首鱗身狀甚異民揮刀以斬其物踣地血流道中而震雷益厲其夕凌空而去自後揮刀民居室頻為天火所災雖逃去輒如故父兄遂擯出乃依山結廬以自處災復隨之因穴崖而居災方止或云其刀尚存雷民圖雷以祀者皆豕首鱗身也出投荒雜録葉遷韶唐葉遷韶信州人也幼嵗樵牧避雨於大樹下樹為雷霹俄而却合雷公為樹所夾奮飛不得遷韶取石楔開枝然後得去仍餽謝之約曰来日復至此可也如其言至彼雷公亦来以墨篆一卷與之曰依此行之可以致雷雨祛疾苦立功救人我兄弟五人要聞雷聲但喚雷大雷二即相應然雷五性剛躁無危急之事不可喚之自是行符致雨咸有殊驗嘗於吉州市大醉太守擒而責之欲加楚辱遷韶於庭下大呌雷五時郡中方旱日光猛熾霹震一聲人皆顛沛太守下階禮接之請為致雨信宿大霔田原遂足因為逺近所𫝊逰滑州時方久雨黄河泛溢官吏備水為勞忘其寝食遷韶以鐵札長二尺立一符於河岸上水湧溢堆阜之形而沿河流下不敢出其符外人免墊溺如今𫝊之或有疾請符不擇筆墨書而授之皆得其效多在江浙間周逰好啗葷腥不修道行後不知所之出神仙感遇𫝊元積唐元積鎮江夏㐮州賈墅有别業搆堂架梁纔畢疾風甚雨時户各輸油六七甕忽震一聲甕悉列於梁上都無滴汙於外是年積卒出劇談録裴用唐大和濮州軍吏裴用者家富於財年六十二疾死既葬旬日霆震其墓棺飛出百許步屍柩零落其家即選他處重瘞焉仍用大鐡索繫䌫其棺未幾震如前復選他處重瘞不旬日震復如前而棺柩灰盡不可得而收矣因設靈儀招魂以葬出集異記東陽郡山唐東陽郡濱於浙江有山周數百里江水曲而環焉迂滯舟楫人頗病之常侍敬昕大和中出守其山一夕雲物曛晦暴風雷電動蕩室廬江水騰溢莫不惶惑迨曉方霽人往視之已劈而中分相逺數百步引江流直而貫焉其環曲處悉填以石遂無縈繞之患出宣室志段成式伯唐段成式三從伯父少時於陽羡親舊舎夜值雷雨毎電起光中見有人頭數十大於栲栳出酉陽雜俎智空唐晉陵郡建元寺僧智空本郡人道行聞於里中年七十餘一夕既闔闗忽大風雷若起於禪堂殷然不絶燭滅而塵坌晦黒且甚􅉉宇揺震矍然自念曰吾棄家為僧迨兹四紀暴雷如是豈神龍有怒我者不然有罪當雷震死耳既而聲益甚復坐而祝曰某少學浮屠氏為沙門迨五十餘年豈所行乖於釋氏教􅁘不然且有黷神龍􅁘設如是安敢逃其死倘不然則愿亟使開霽俾舉寺僧得自解也言竟大聲一舉若發左右茵榻傾縻昏霾顛悖由是驚慴仆地僅食頃聲方息雲月晴朗然覺有腥腐氣如在室内因燭視之於垣下得一蛟皮長數丈血滿於地乃是禪堂北有槐髙數十尋為雷震死循理而裂中有蛟蟠之跡焉出宣室志太平廣記卷三百九十四
