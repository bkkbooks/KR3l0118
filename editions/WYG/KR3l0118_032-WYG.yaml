  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_032-1a, image: WYG1043/WYG1043-0166c.png}
body:
  text: 太平廣記卷三十二神仙三十二王賈顔真卿王賈婺州參軍王賈本太原人移家覃懷而先人之壟在於臨汝賈少而聰頴未嘗有過沉静少言年十四忽謂諸兄曰不出三日家中當恐且有大喪居二日宅中火延燒堂室祖母年老震驚自投於牀而卒兄以賈言聞諸父諸父訊賈賈曰卜筮而知後又白諸父曰太行南泌河灣澳内有兩龍居之欲識真龍請同觀之諸父怒曰小子好詭言駭物當笞之賈跪曰實有故請觀之諸父怒曰小子好詭與同行賈請具雨衣於是至泌河浦深處賈入水以鞭畫之水為之分下有大石二龍盤繞之一白一黑各長數丈見人冲天諸父大驚良久瞻視賈曰既見矣將復還因以鞭揮之水合如舊則雲霧晝昏雷電且至賈曰諸父駛去因馳未里餘飛雨大注方知非常人也賈年十七詣京舉孝亷既擢第乃娶清河崔氏後選授婺州叅軍還過東都賈母之表妹死已經年常於靈帳發言處置家事兒女僮妾不敢為非每索飲食衣服有不應求即加笞罵親戚咸怪之賈曰此必妖異因造姨宅唁姨諸子先是姨謂諸子曰明日王家外甥來必莫令進此小子大罪過人賈既至門不得進賈令召老蒼頭謂曰宅内言者非汝主母乃妖魅耳汝但私語汝主令引我入當為除去之家人素病之乃潛言於諸郎諸郎亦悟邀賈入賈拜弔已因向靈言曰聞姨亡來大有神言語如舊今故謁姨何不與賈言也不應賈又邀之曰今故來謁姨若不言終不去矣當止於此魅知不免乃帳中言曰甥比佳乎何期别後生死遂隔汝不忘吾猶能相訪愧不可言因涕泣言語皆姨平生聲也諸子聞之號泣姨令具饌坐賈於前命酒相對慇懃不已醉後賈因請曰姨既神異何不令賈見形姨曰幽明道殊何要相見賈曰姨不能全出請露半面不然呈一手一足令賈見之如不相示亦終不去魅既被邀苦至因見手於前手指宛然又姨之手也諸子又號泣賈因前執其手姨驚呼諸子曰外甥無禮何不舉手諸子未進賈遂引其手撲之於地尚猶哀呌撲之數四即死乃老狐也形既見體祼無毛命火焚之靈語遂絶賈至婺州以事到東陽令有女病魅數年醫不能愈令邀賈到宅置茗饌而不敢有言賈知之謂令曰聞君有女病魅當為去之因為桃符令置所卧床前女見符泣而罵須臾眠熟有大貍腰斬死於牀下疾乃止時杜暹為婺州叅軍與賈同列相得甚歡與暹同部領使於洛陽過錢塘江登羅刹山觀浙江潮謂暹曰大禹真聖者當以水時所有金櫃玉符以鎮川瀆若此杭州城不鎮壓尋當䧟矣暹曰何以知之賈曰此石下是相與觀焉因令暹閉目執其手令暹跳下暹忽閉目已至水㡳其空處如堂有大石櫃髙丈餘鏁之賈手開其鏁去其盖引暹手登之因同入櫃中又有金櫃可髙三尺金鏁鎻之賈曰玉符在中然世人不合見暹觀之既已又接其手令騰出暹距躍則至岸矣既與暹交熟乃吿暹曰君有宰相禄當自保愛因示其拜官厯任及於年壽周細語之暹後遷拜一如其説既而至吳郡停船而女子天死生五年矣母撫之哀慟而賈不哭暹重賈各見妻子如一家於是對其妻謂暹曰吾第三天人也有罪謫為世人二十五年今已滿矣後日當行此女亦非吾子也所以早天妻崔氏亦非吾妻即吉州别駕李乙妻也縁時嵗未到乙未合娶以世人亦合有室故司命權以妻吾吾今期盡妻即當過李氏李氏三品禄數任生五子世人不知何為妄哭妻久知其夫靈異因輟哭請曰吾方年盛君何忍見舍且暑月在途零丁如此請送至洛得遂棲息行路之人猶合矜愍况室家之好而忽遺棄耶賈笑而不答因令造棺器納亡女其中寘之船下又囑暹以身後事曰吾卒後為素棺漆其縫將至先塋與女子皆袝於墓殮後即發使至宋州崔氏伯任宋州别駕當留其姪聴之至冬初李乙必充計入京與崔氏伯相見即伯之故人因求婚崔别駕以姪妻之事已定矣暹然之其妻日夜涕泣請其少留終不答至日沐浴衣新衣暮時召暹相對言談頃而卧遂卒暹哭之慟為製朋友之服如其言殮之行及宋州崔别駕果留其姪暹至臨汝乃厚葬賈及其女其冬李乙至宋州求壻其妻崔别駕以妻之暹後作相厯中外皆如其語出紀聞顔真卿顔真卿字清臣瑯琊臨沂人也北齊黄門侍郎之推五代孫幼而勤學舉進士累登甲科真卿年十八九時卧疾百餘日醫不能愈有道士過其家自稱北山君出丹砂粟許救之頃刻即愈謂之曰子有清簡之名已志金臺可以度世上補仙官不宜自沉於名宦之海若不能擺脱塵網去世之日可以爾之形鍊神隂景然後得道也復以丹一粒授之戒之曰抗節輔主勤儉致身百年外吾期爾於伊洛之間矣真卿亦自負才器將俟大用而吟閲之暇常留心仙道既中科第四命為監察御史充河西隴左軍城覆屯交兵使五原有寃獄久不決真卿至辨之天時方旱獄決乃雨郡人呼為御史雨河東有鄭延祚者母卒二十九年殯於僧舍壖垣地真卿劾奏之兄弟三十年不齒天下聳動遷殿中侍御史武部員外楊國忠怒其不附己出為平原太守安禄山逆節頗著真卿託以霖雨修城浚壕隂料丁壯實儲廪佯命文士泛舟飲酒賦詩禄山密偵之以為書生不足虞也無幾禄山反河朔盡䧟唯平原城有備焉乃使司兵叅軍馳奏𤣥宗喜曰河北二十四郡唯真卿一人而已朕恨未識其形狀耳禄山既䧟洛陽殺留守李憕以其首招降河北真卿恐搖人心殺其使者乃謂諸將曰我識李憕此首非真也久之為冠飾以草續支體棺而葬之禄山以兵守土門真卿兄杲卿為常山太守共破土門十七郡同日歸順推真卿為帥得兵二十萬横絶燕趙詔加戸部侍郎平原太守時清河郡客李蕚謁於軍前真卿與之經畧共破禄山黨二萬餘人於堂邑肅宗幸靈武詔授工部尚書御史大夫真卿間道朝于鳯翔拜憲部尚書尋加御史大夫彈奏黜陟朝綱大舉連典蒲州同州皆有遺愛為御史唐實所搆宰臣所忌貶饒州刺史復拜昇州浙西節度使徵為刑部尚書又為李輔國所譛貶蓬州長史代宗嗣位拜利州刺史入為戸部侍郎荆南節度使尋除右丞封魯郡公宰相元載私樹朋黨懼朝臣言其長短奏令百官凡欲論事皆先白長官長官白宰相然後上聞真卿奏疏極言之乃止後因攝祭太廟以祭器不修言於朝元載以為誹謗時政貶硤州别駕復為撫州湖州刺史元載伏誅拜刑部尚書代宗崩為禮儀使又以髙祖已下七聖諡號繁多上議請取初諡為定為宰相楊炎所忌不行改太子少傅潛奪其權又改太子太師時李希烈陷汝州宰相盧杞素忌其剛正將中害之奏以真卿重徳四方所瞻使往諭希烈可不血刃而平大寇矣上從之事行朝野失色李勉聞之以為失一國老貽朝廷羞密表請留又遣人逆之於路不及既見希烈方宣詔㫖希烈養子千餘人雪刃爭前欲殺之叢遶詬罵神色不動希烈以身蔽之乃就館舍希烈因宴其黨召真卿坐觀之使倡優讟朝政以為戲真卿怒曰相公人臣也奈何使小輩如此遂起希烈使人問儀制於真卿答曰老夫耄矣曾掌國禮所記者諸侯朝覲禮耳其後希烈使積薪庭中以油沃之令人謂曰不能屈節當須自燒真卿投身赴火其逆黨救之真卿乃自作遺表墓誌祭文示以必死賊黨使縊之興元元年八月三日也年七十七朝廷聞之輟朝五日諡文忠公真卿四朝重徳正直敢言老而彌壯為盧杞所排身殃於賊天下寃之别傳云真卿將縊解金帶以遺使者曰吾嘗修道以形全為先吾死之後但割吾支節血為吾吭血以紿之則吾死無所恨矣縊者如其言既死復收瘞之賊平真卿家遷喪上京啓殯視之棺朽敗而尸形儼然肌肉如生手足柔軟髭髪青黑握拳不開爪透手背遠近驚異焉行及中路旅櫬漸輕後達葬所空棺而已開天傳信記詳而載焉别傳又云真卿將往蔡州謂其子曰吾與元載俱服上藥彼為酒色所敗故不及吾此去蔡州必為逆賊所害爾後可迎吾喪於華隂開棺視之必異於衆及是開棺果覩其異道士邢和璞曰此謂形仙者也雖藏於鐵石之中鍊形數滿自當擘裂飛去矣其後十餘年顔氏之家自雍遣家僕往鄭州徵庄租廻及洛京此僕偶到同徳寺見魯公衣長白衫張蓋在佛殿上坐此僕遽欲近前拜之公遂轉身去仰觀佛壁亦左右隨之終不令僕見其面乃下佛殿出寺去僕亦步隨之徑歸城東北隅􅂽菜園中有兩間破屋門上懸箔子公便揭箔而入僕遂隔箔子唱喏公曰何人僕對以名公曰入來僕既入拜輙擬哭公遽止之遂畧問一二兒姪了公探懷中出金十兩付僕以救家費仍遣速去歸勿與人説後家内闕即再來僕還雍其家大驚貨其金乃真金也顔氏子便市鞍馬與向僕疾來省覲復至前處但滿眼榛蕪一無所有時人皆稱魯公屍解得道焉出仙傳拾遺及戎幕閒譚玉堂閑話太平廣記卷三十二
