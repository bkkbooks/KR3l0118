body:
  text: 太平廣記卷四百一宋李昉等編金下張珽龔播宜春郡民張彦康氏豫章人陳濬建安村人蔡彦卿水銀吕生玉沈攸之玉龍江嚴唐𤣥宗五色玉玉辟邪軟玉鞭玉豬子金下張珽咸通末年張珽自徐之長安至圃田東時於大樹下俄頃有三書生繼來環坐珽因問之一書生曰我李特也一曰我王象之也一曰我黄眞也皆曰我三人俱自汴水來欲一遊龍門山耳乃共閒論其王象之曰我去年遊龍門山經於是路北一二里有一子亦儒流也命我於家再宿而囘可同一謁之珽因亦同行至路北一二里果見一宅甚荒毁既扣門有一子儒服自内而出見象之頗喜問象之曰彼三人者何人哉象之曰張珽秀才也李特黄眞即我同鄉之書生也其儒服子乃并揖入升堂設酒饌其所設甚陳故儒服子謂象之曰黄家弟兄將大也象之曰若皇上脩徳好生守帝王之道下念黎庶雖諸黄齒長又將若何黄眞遽起曰今日良會正可盡歡諸君何至亟頂人家事波及我孫耶珽性素剛决因大疑其俱非人也乃問之曰我偶與二三子會於一樹下又攜我至此適見高論我實疑之黄家弟兄竟是誰也且君輩人也非人也我平生性不畏懼但實言之象之笑曰黄氏將亂東夏弟兄三人也我三人皆精也儒服子即鬼也珽乃問曰是何物之精也是何鬼也象之曰我玉精也黄眞即金精也李特即枯樹精也儒服子即是二十年前死者鄭適秀才也我昔自此自化精又去年復遇鄭適今詣之君是生人當怯我輩既君不怯故聊得從容耳珽又問曰鄭秀才既與我同科奚不語耶鄭適曰乃命筆寫詩一首以贈詩曰昔為唫風嘯月人今是唫風嘯月身塜壊路邉唫嘯罷安知今日又勞神珽覽詩愴然歎曰人之死也反不及物物猶化精人不復化象之輩三人皆聞此歎怒而出適亦不留珽乃拂衣及至門外迴顧已見一壊塜因逐三精以所佩劍擊之金盃精皆中劍而踣唯枯樹精走疾追擊不及遂迴反見一故玉帶及一金盃在路傍珽拾得之長安貨之了無别異焉矣出瀟湘錄龔播龔播者峽中雲安監鹽賈也其初甚窮以販鬻蔬果自業結草廬於江邊居之忽遇風雨之夕天地陰黑見江南有炬火復聞人呼船求濟急時已夜深人皆息矣播即獨棹小艇涉風而濟之至則執炬者仆地視之即金人也長四尺餘播即載之以歸於是遂富經營販鬻動獲厚利不十餘年間積財巨萬竟為三蜀大賈出河東記宜春郡民宜春郡民章乙其家以孝義聞數世不分異居從同爨所居别墅有亭屋水竹諸弟子皆好善積書往來方士髙僧儒生賓客至者皆延納之忽一日晩際有一婦人年少端麗被服靚粧與一小青衣詣門求寄宿章氏諸婦忻然近接設酒饌至夜深而罷有一小子弟以文自業年少而敏俊見此婦人有色遂嘱其乳嫗别灑掃一室令其宿止至深夜章生􅅗身入室内略不聞聲息遂升榻就之其婦人身體如冰生大驚命燭照之乃是銀人兩頭可重千百斤一家驚喜然恐其變化即以炬炭燃之乃眞白金也其家至今巨富羣從子弟婦女共五百餘口每三日就食聲鼓而升堂江西郡内富盛無比出玉堂閒話張彦巴巫間民多積黄金每有聚會即於席上羅列三品以誇尚之雲安民有李仁表者施澤金臺盤以此相髙亂離之後州將皆武人競以貪虐蜀將張彦典忠州暴惡尤甚將挍苦之因而作叛連及黨與數千家張攫其金銀莫知紀極後於蜀中私第别搆一堂以貯其金忽一旦屋外有火烟頻起駭入驗之乃無延爇之處由是疑焉及開篋視之悉已空矣即向時火烟乃金化矣出北夢瑣言康氏偽吳楊行密初定揚州遠坊居人稀少烟火不接有康氏者以傭賃為業僦一室於太平坊空宅中康晨出未返其妻生一子方席藁忽有一異人赤面朱衣冠據門而坐妻驚怖叱之乃走如舍西踣然有聲康適歸欲至家路左忽有錢五千羊半邊尊酒在焉伺之久無行人因持之歸妻亦告其所見即往舍西尋之乃一金人仆於草間亦曵之歸因烹羊飲酒得以周給自是出必獲利日以富贍而金人留為家寶所生子名曰平平長遂為富人有李潯者為江都令行縣至新寧鄉見大宅即平家也其父老為李言如此出稽神錄豫章人天復中豫章有人治舍掘地得一木匱發之得金人十二頭各長數寸皆古衣冠首戴十二辰屬數欵精麗殆非人工其家寶祠之因以致福時兵革未定遂為戍將刼取之後不知所終出稽神錄陳濬江南陳濬尚書自言其諸父在鄉里好為詩里人謂之陳白舍人比之樂天也性疎簡喜賔客嘗有二道士一黄衣一白衣詣其家求宿舍之㕔事夜間聞二客牀壞訇然有聲久之若無人者秉燭視之見白衣卧於壁下乃銀人也黄衣不復見矣自是致富出稽神錄建安村人建安有人村居者常使一小奴出入城市經舍南大塜塜傍恒有一黄衣兒與之較力為戲其主遲之奴以實告覘之信然一日挾撾而往伏於草間小奴至黄衣兒復出即起擊之應手而踣乃金兒也因持以歸家自是富出稽神録蔡彦卿廬州軍吏蔡彦卿為拓臯鎭將暑夜坐鎭門外納涼忽見道南桑林中有白衣婦人獨舞就視即滅明夜彦卿挾杖先往伏於草間久之婦人復出方舞即擊之墮地乃白銀一缾復掘地獲銀千兩遂為富人云出稽神錄水銀吕生大厯中有吕生者自會稽上虞尉調集於京師既而僑居永崇里嘗一夕與其友數輩會食於其室食畢將就寢俄有一嫗容服潔白長二尺許出於室之北隅緩步而來其狀極異衆視之相目以笑其嫗漸迫其榻且語曰君有會不能一命耶何待吾之薄歟吕生叱之遂退去至北隅乃亡所見且驚且異莫知其來也明日生獨寤於室又見其嫗在北隅下將前且退皇然若有所懼生又叱之遂没明日生黙念曰是必怪也今夕將至若不除之必為吾患不朝夕矣即命一劍置其榻下是夕果是北隅徐步而來顔色不懼至榻前生以劍揮之其嫗忽上榻以臂揕生胸有餘躍於左右舉袂而舞久之又有一嫗忽上榻復以臂揕生生遽覺一身盡凛然若霜被於體生又以劍亂揮俄為數嫗亦隨而舞焉生揮劍不已又為十餘嫗各長寸許雖愈多而貌如一焉皆不可辨環走四垣生懼甚計不能出中者一嫗謂書生曰吾將合為一矣君且觀之言已遂相望而來俱至榻前翕然而合又為一嫗與始見者不異生懼益甚乃謂曰爾何怪而敢如是撓生人耶當疾去不然吾求方士將以神術制汝汝又安能為耶嫗笑曰君言過矣若有術士吾願見之吾之來戲君耳非敢害也幸君無懼吾亦還其所矣言畢遂退於北隅而没明日生以事語於人有田氏子者善以符術除去怪魅名聞長安中見説喜躍曰是我事也去之若爪一蟻耳今夕願往君舍且伺焉至夜生與田氏子俱坐於室未幾而嫗果来至榻前田氏子叱曰魅疾去嫗揚然其色不顧左右徐歩而來去者久之謂田生曰非吾之所知也其嫗忽揮其手手墮於地又為一嫗甚小躍而升榻突入田生口中田生驚曰吾死乎嫗謂生曰吾比言不為君害君不聽今田生之疾果何如哉然亦將成君之富耳言已又去明日有謂吕生者宜於北隅發之可見矣生喜而歸命家僮於其所没處窮焉至丈餘果得一瓶可受斛許貯水銀甚多生方悟其嫗乃水銀精也田生竟以寒慄而卒出宣室志玉沈攸之宋順帝昇明中荆州刺史沈攸之廐中羣馬輒躑蹋驚嘶若見他物攸之令人伺之見一白駒以綠繩繫腹直從外來圉者具言攸之使人夜伏櫪邊候之俄而見白駒來忽然復去視廐門猶閉計其蹤跡直入閣内時人見者咸謂為怪檢内人唯愛妾馮月華臂上一玉馬以綠絲繩穿之至夜輒脱置枕邊至夜有時失去曉時則還試取看之見蹄下有泥後攸之敗不知所在出宣室志玉龍梁大同八年戍主楊光欣獲玉龍一枚長一尺二寸高五寸雕鏤精妙不似人作腹中容斗餘頸亦空曲置水中令水滿倒之水從口出出聲如琴瑟水盡乃止出酉陽雜俎江嚴江嚴於富春縣清泉山遙見一美女紫衣而歌嚴就之數十步女遂𨼆唯見所據石如此數四乃得一紫玉廣一尺又邴浪於九田山見鳥狀如雞色赤鳴如吹笙射之中即入穴浪遂鑿石得一赤玉如鳥形狀也出列異録唐𤣥宗已見三百九十六卷唐天后嘗召諸皇孫坐於殿上觀其嬉戲因出西國所貢玉環釧盃盤列於前後縱令爭取以觀其志莫不奔競厚有所獲獨𤣥宗端坐略不為動后大奇之撫其背曰此兒當為太平天子因命取玉龍子以賜玉龍子太宗於晉陽宫得之文徳皇后常置之衣箱中及大帝載誕之三日後以珠絡衣褓并玉龍子賜焉其後常藏之内府雖其廣不數寸而温潤精巧非人間所有及𤣥宗即位每京師􅄽雨必䖍誠祈禱將有霖注逼而視之若奮鱗鬛開元中三輔大旱𤣥宗復祈禱而涉旬無雨帝密投南内之龍池俄而雲物暴起風雨隨作及幸西蜀車駕次渭水將渡駐蹕於水濱左右侍御或有臨流濯弄者於沙中得之上聞驚喜視之泫然流泣曰此吾昔時所寳玉龍子也自後每夜中光彩輝燭一室上既還京為小黄門攘竊以遺李輔國李輔國常置於櫃中輔國將敗夜聞櫃中有聲開視之已亡其所出明皇雜錄五色玉天寶初安思順進五色玉帶又於左藏庫中得五色玉上怪近日西貢無五色玉令責安西諸蕃蕃言此常進皆為小勃律所刼不達上怒欲征之羣臣多諌獨李林甫贊成上意且言武臣王天運謀勇可將乃命王天運將四萬人兼統諸蕃兵伐之及逼勃律城下勃律君長恐懼請罪悉出寳玉願歲貢獻天運不許即屠城擄二千人及某珠璣而還勃律中有術者言將軍無義不祥天將大風矣行數百里忽驚風四起雪花如翼風激小海水成氷柱起而復摧經半日小海漲湧四萬人一時凍死唯蕃漢各一人得還具奏𤣥宗大驚異即命中使隨二人驗之至小海側氷猶崢嶸如山隔水見兵士屍立者坐者瑩徹可數中使將返氷忽消釋衆屍亦不復見出酉陽雜俎玉辟邪肅宗賜李輔國香玉辟邪二各髙一尺五寸工巧殆非人工其玉之香可聞數百步雖鏁之於金函石櫃中不能掩其氣或以衣裾悞拂芬馥經年縱澣濯數四亦不消歇輔國常置之坐側一日方巾櫛而辟邪一則大笑一則悲號輔國驚愕失據而囅然者不已悲號者更涕泣交下輔國惡其怪遂碎之為粉没於厠中自後常聞寃痛之聲其輔國所居安邑里芬馥彌月猶在葢舂之為粉愈香故也不周歲而輔國死焉始碎辟邪輔國嬖奴慕容宫知異常物𨼆屑二合魚朝恩不惡輔國之禍以錢三十萬買之而朝恩將伏誅其香化為白蝶沖天而去當時議者以竒香異寶非人臣之所蓄也輔國家藏珍玩皆非世人所識夏即於堂中設迎􅈵草其色𩔖碧而幹似苦竹葉細於杉雖若乾枯未嘗凋落盛暑束之牕户間涼自至鳳首木髙一尺而雕刻如鸞鳳之形其木頗似枯槁故毛羽禿落不甚盡雖嚴凝之時置於髙堂大厦中而和煦之氣如二三月故别名曰常春水縱以烈火焚之終不燋黑涼草鳳木或出於薛王宅十洲記云火林國出也出杜陽編軟玉鞭德宗嘗幸興廢宫於複璧閒得寶匣中獲玉鞭其末有文曰軟玉鞭即天寳中異國所獻也瑞妍節文光明可鑒雖藍田之美不能過也屈之則首尾相就舒之則徑直如繩雖以斧鑕鍜研終不傷缺徳宗歎為神物遂命聨蟬繡為嚢碧蠶絲為鞘碧蠶絲即永泰元年東海彌羅國所貢也云其國有桑枝榦盤屈覆地而生大者亦連延十數里小者亦䕃百畆其上有蠶可長四寸其色金其絲碧亦謂之金蠶絲縱之一尺引之一丈反撚為鞘表裏通瑩如貫瑟雖併十夫之力挽之不斷為琴絃鬼神愁為弩絃則箭出一千步為􅃓絃則箭出五百步上令藏於内府至朱泚犯禁闕其鞭不知所在出杜陽編玉豬子執金吾陸大鈞從子某其妻嘗夜寢中聞有物啁啾鬭聲既覺於枕下攬之得二物遽以火照皆曰玉豬子也大數寸狀甚精妙置之枕中而寶之自此財貨日增家轉蕃衍有求必遂名位遷騰如此二十年一夕忽失所在而陸氏亦不昌矣出紀聞列異太平廣記卷四百一
