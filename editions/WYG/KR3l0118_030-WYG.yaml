body:
  text: 太平廣記卷三十神仙三十張果翟乾祐凡八兄張果張果者𨼆於恒州條山常往來汾晉間時人傳有長年祕術耆老云為兒童時見之自言數百嵗矣唐太宗髙宗累徴之不起則天召之出山佯死於妬女廟前時方盛熱須臾臭爛生蟲聞於則天信其死矣後有人於恒州山中復見之果常乘一白驢日行數萬里休則重疊之其厚如紙置於巾箱中乘則以水噀之還成驢矣開元二十三年𤣥宗遣通事舍人裴晤馳驛於恒州迎之果對晤氣絶而死晤乃焚香啟請宣天子求道之意俄頃漸蘇晤不敢逼馳還奏之乃命中書舍人徐嶠齎璽書迎之果隨嶠到東都於集賢院安置肩輿入宫備加禮敬𤣥宗因從容謂曰先生得道者也何齒髮之衰耶果曰衰朽之嵗無道術可憑故使之然良足耻也今若盡除不猶愈乎因於御前㧞去鬂髪擊落牙齒流血溢口𤣥宗甚驚謂曰先生休舍少𨕖晤語俄頃召之青鬂皓齒愈於壯年一日秘書監王迥質太常少卿蕭華嘗同造焉時𤣥宗欲令尚主果未之知也忽笑謂二人曰娶婦得公主甚可畏也迥質與華相顧未喻其言俄頃有中使至謂果曰上以玉真公主早嵗好道欲降於先生果大笑竟不承詔二人方悟向來之言是時公卿多往候謁或問以方外之事皆詭對之每云余是堯時丙子年人時莫能測也又云堯時為侍中善於胎息累日不食食時但進美酒及三黄丸𤣥宗留之内殿賜之酒辭以山臣飲不過二升有一弟子飲可一斗𤣥宗聞之喜令召之俄一小道士自殿簷飛下年可十六七美姿容㫖趣雅淡謁見上言詞清爽禮貌臻備𤣥宗命坐果曰弟子當侍立於側未宜賜坐𤣥宗目之愈喜遂賜之酒飲及一斗不辭果辭曰不可更賜過度必有所失致龍顔一笑耳𤣥宗又逼賜之酒忽從頂湧出冠子落地化為一榼𤣥宗及嬪御皆驚笑視之已失道士矣但見一金榼在地覆之榼盛一㪷驗之乃集賢院中榼也累試仙術不可窮紀有歸夜光者善視鬼𤣥宗常召果坐於前而􅃯夜光視之夜光至御前奏曰不知張果安在乎願視察也而果在御前久矣夜光卒不能見又有邢和璞者有算術每視人則布籌於前未幾已能詳其名氏窮達善惡夭壽前後所算計千數未嘗不析其苛細𤣥宗奇之久矣及命算果則運籌移時意竭神沮終不能定其甲子𤣥宗謂中貴人髙力士曰我聞神仙之人寒燠不能瘵其體外物不能凂其中今張果善算者莫得究其年視鬼者莫得見其狀神仙倐忽豈非真者耶然常聞堇斟飲之者死若非仙人必敗其質可試以飲也㑹天大雪寒甚𤣥宗命進堇斟賜果果遂舉飲盡三巵醺然有醉色顧謂左右曰此酒非佳味也即偃而寢食頃方寤忽覽鏡視其齒皆斑然焦黑遽命侍童取鐵如意擊其齒盡隨收於衣帶中徐解衣出藥一貼色微紅光瑩果以傅諸齒穴中已而又寢久之忽寤再引鏡自視其齒已生矣其堅然光白愈於前也𤣥宗方信其靈異謂力士曰得非真仙乎遂下詔曰恒州張果先生遊方之外者也跡先髙尚心入窅㝠久混光塵應召赴闕莫知甲子之數且謂羲皇上人問以道樞盡㑹宗極今則將行朝禮爰申寵命可授銀青光禄大夫仍賜號通𤣥先生未幾𤣥宗狩於咸陽獲一大鹿稍異常者庖人方饌果見之曰此仙鹿也已滿千嵗昔漢武元狩五年臣曾侍從畋於上林時生獲此鹿既而放之𤣥宗曰鹿多矣時遷代變豈不為獵者所獲乎果曰武帝舍鹿之時以銅牌誌於左角下遂命驗之果獲銅牌二寸許但文字凋暗耳𤣥宗又謂果曰元狩是何甲子至此凡幾年矣果曰是嵗癸亥武帝始開昆明池今甲戍嵗八百五十二年矣𤣥宗命太史氏校其長厯畧無差焉𤣥宗愈奇之時又有道士葉法善亦多術𤣥宗問曰果何人耶答曰臣知之然臣言訖即死故不敢言若陛下免冠跣足救臣即得活𤣥宗許之法善曰此混沌初分白蝙蝠精言訖七竅流血僵仆于地𤣥宗遽詣果所免冠跣足自稱其罪果徐曰此兒多口過不讁之恐敗天地間事耳𤣥宗復哀請久之果以水噀其面法善即時復生其後累陳老病乞歸恒州詔給驛送到恒州天寳初𤣥宗又遣徵召果聞之忽卒弟子葬之後發棺空棺而已出明皇雜録宣室志續神仙傳翟乾祐翟乾祐雲安人也龎眉廣顙巨目方頤身長六尺手大尺餘每揖人手過胸前常於黄鶴山師事來天師盡得其道能行氣丹陸制虎豹水伏蛟龍卧常虚枕往往言將來之事言無不驗因入䕫州市謂人曰今夜有八人過此宜善待之是夕火燒百餘家曉之者云八人乃火字也每入山羣虎隨之曾于江上與十許人翫月或問曰月中竟何所有乾祐笑曰可隨我手看之乃見月䂓半天瓊樓金闕滿焉良久乃𨼆雲安井自大江泝別派凡三十里近井十五里澄清如鏡舟檝無虞近江十五里皆灘石險惡難於㳂泝乾祐念商旅之勞於漢城山上結壇考召追命羣龍凡一十四處皆化為老人應召而至乾祐諭以灘波之險害物勞人使皆平之一夕之間風雷震擊一十四里盡為平潭矣唯一灘仍舊龍亦不至乾祐復嚴敇神吏追之又三日有一女子至焉因責其不伏應召之意女子曰某所以不來者欲助天師廣濟物之功耳且富商大賈力皆有餘而傭力負運者力皆不足雲安之貧民自江口負財貨至近井潭以給衣食者衆矣今若輕舟利涉平江無虞即邑之貧民無傭負之所絶衣食之路所困者多矣余寧險灘波以贍傭負不可利舟楫以安富商吾不至者理在此也乾祐善其言因使諸龍各復其故風雷頃刻而長灘如舊唐天寳中詔赴上京恩遇隆厚嵗餘還故山尋得道而去先是蜀有道士佯狂俗號為灰袋即乾祐晩年弟子也乾祐每戒其徒曰勿欺此人吾所不及常大雪中衣布裙入青城山暮投蘭若求僧寄宿僧曰貧僧一衲而已天寒此恐不能相活道者但云容一牀足矣至夜半雪深風起僧慮道者已死就視之去床數尺氣蒸如爐流汗袒寢僧始知其異人未明不辭而去多住村落每住人愈信之曾病口瘡不食數月狀若將死村人素神之因為設道齋齋散忽起就枕謂衆人曰試窺吾口中有何物也乃張口如箕五臟悉露同類驚異作禮問之唯曰此足惡此足惡後不知所終出酉陽雜爼仙傳拾遺凡八兄凡八兄者不知仙籍之中何品位也隋太子勇之孫名徳祖仕唐為尚輦奉御性頗好道以金丹延生為務鑪鼎所費家無餘財官散俸薄往往闕於饘粥稍有百金即輸於炭藥之直矣凡八兄忽詣其家談𤣥虛論方術以為金丹之制不足為勞黄白變化咳唾可致徳祖愈加尊敬而凡之剛躁諠雜嗜酒貪饕殊不可耐晝出夜還不畏街禁肥鮮醇酎非時即須徳祖了諳其性委曲預備必副所求由是淹留數月一日令徳祖取鼎釜鎗􅌯輩陳於藥房中凡自擊碎之壘鐵加炭烈火以煅焉投散藥寸匕于其上反扃其室背燈壁隅乃與徳祖庭中步月中夜謂徳祖曰我太極仙人也以子棲心至道抗節不回故來相教耳明月良夜能遠遊乎徳祖諾遂相與出門及反顧扃鑰如舊徐行若二三十里路頗平憇一山頂德祖覺倦八兄曰此去長安千里矣當甚勞乎徳祖驚其且遠亦以行倦為對八兄長嘯一聲逡巡有白獸至焉命徳祖乘之其行迅疾漸覺彌遠因問長安里數八兄曰此八萬里矣徳祖悄然忽念未別家小白獸屹然不行八兄笑曰果有塵俗之念去世未得如術遽命白獸送徳祖詣雲宫謁解空法師俄頃已至法師延坐使青童以金丹飼之徳祖捧接但見毒螫之物不可取食又以玉液飲之復聞其臭亦不可飲法師令白獸送徳祖還其家凡八兄不復見矣至其家燈燭宛然夜未央矣明晨視其所化黄白燦然雖資貨有餘而八兄仙儀杳不可覩一日忽見凡八兄之僕携筐筥而過其門問凡君所止在仙府矣使我暫至人寰若見奉御亦令同來可也自是徳祖隨凡君仙僕而去不復還矣出仙傳拾遺太平廣記卷三十
