body:
  text: 太平廣記卷八十九異僧三釋道安鳩摩羅什法朗李恒沙門釋道安釋道安姓魏氏常山扶柳人也家世為儒早失覆䕃為外兄孔氏所養年七嵗讀書再覽能誦鄉鄰嗟異至年十二出家神性聰敏而形貌甚陋不為師之所重數嵗之後方啟師求經與辯意經一卷可五千言安齎經入田因休息就覽暮歸以經還師更求餘者師曰昨經未讀今復求耶答曰即以闇誦師雖異之而未言也復與成具光明經一卷不減一萬言齎之如初暮復還師師執覆之不差一字師大驚嗟敬而異之後為受戒具恣其逰學至鄴遇佛圖澄因事澄為師及石氏將亂與弟子惠逺等四百餘人渡河南逰夜行値雷雨乗電光而進前行得人家見門裏有一馬樁樁之間懸一馬兜可容一斛安使呼林百升百升謂是神人厚相賞接既而弟子問何以知其姓字安曰兩木為林兜容百升也既達襄陽復宣佛法時襄陽習鑿齒鋒辯天逸籠罩當時其先籍安髙名及聞安至止即往修造既坐稱言四海習鑿齒安曰彌天􅇚道安時人以為名答時苻堅素聞安名每云襄陽有釋道安是神器方欲致之以輔朕躬後遣苻平南攻襄陽安與朱序俱獲於堅堅謂僕射權翼曰朕以十萬之師取襄陽唯得一人半翼曰誰耶堅曰安公一人習鑿齒半人也既至住長安五重寺初堅承石氏之亂至是户民殷富四方略定唯建業一隅未能尅伏每與侍臣談語未嘗不欲平一江左堅弟平陽公融及朝臣石越原紹等並切諌終不能廻衆以安為堅所延敬乃共請曰主上將有事東南公何能不為蒼生致一言耶㑹堅出東苑命安外輦同載僕射權翼諌曰臣聞天子法駕侍中倍乗道安毁形寧可參厠堅勃然作色曰安公道徳可尊朕以天下不易輿輦之榮未稱其徳即勅僕射扶安登輦俄而顧謂安曰朕將與公南逰吳越整六師而廵狩陟㑹稽而觀滄海不亦樂乎安對曰陛下應天御世有八州之富居中土而制四海宜棲神無為與堯舜比隆今欲以百萬之師求厥田下之土且東南一隅地卑氣厲禹逰而止舜狩而殂秦王適而不歸以貧道觀之非愚心所同也平陽公懿戚石越重臣謂並不可猶尚見距貧道輕淺言必不允既荷厚遇故盡丹誠耳堅曰非為地不廣民不足治也將簡天心明大運所在耳順時廵狩亦著前典若如師言則先帝王無省方之文乎安曰若鑾駕必動可先幸洛陽抗威蓄鋭傳檄江南如其不伏伐之未晚堅不從遣平陽公融等精鋭二十五萬為前鋒堅躬率歩騎六十萬至須城晉遣征虜將軍謝石徐州刺史謝𤣥距之堅前軍大潰於八公山晉軍逐北三十餘里堅單騎而遁如所諌焉安註諸經􅂲不合理乃誓曰若所説不甚道理願見瑞相乃夢見道人頭白眉長語安云君所註經殊合道理我不得入泥洹住在西域當相助通可時時設食後日誦律至逺公乃知和尚所夢賔頭盧也後至秦建元二十一年正月二十七日忽有異僧形甚庸陋來寺寄宿寺房既窄處之講堂時維那直殿夜見此僧從窻而出入遽以白安安驚起禮訊問其來意答云特相為來安曰自惟罪深詎可度脱答云甚可以度耳安請問來生所生之處彼乃以手虚撥天之西北即見雲開備覩兜率妙勝之報安至其年二月八日忽告衆曰吾當去矣是日齋畢無疾而卒塟城内五級寺中是嵗晉太元元年也出髙僧傳鳩摩羅什鳩摩羅什此云童夀天竺人也善經律論化行於西域及東逰龜兹龜兹王為造金獅子座一處之時苻堅僭號闗中有外國前部王及龜兹王弟並來朝堅堅引見二王説堅云西域多産珍竒請兵往定以求内附至堅建元十三年正月太史奏云有星見外國分野當有大徳智人入輔中國堅曰朕聞西域有鳩摩羅什襄陽有沙門道安將非此耶即遣使求之至十七年二月鄯善王前部王等又説堅請兵西伐十八年九月堅遣驍將吕光凌江將軍姜飛將前部王及車師王等率兵七萬西伐龜兹臨發堅餞光於建章謂光曰夫帝王應天而治以子愛蒼生為本豈貪其地而伐之正以懐逺之人故也朕聞西域有鳩摩羅什深觧法相善閑隂陽為後學之宗朕甚思之賢哲者國之大寳若尅龜兹即馳驛送什光軍未至什謂龜兹王白純曰國運衰矣尚有勍敵從東方來宜恭承之勿抗其鋒純不從而戰光遂破龜兹殺純立純弟震為主光既獲什未測其智量見年齒尚少乃以凡人戲之强妻以龜兹王女什距而不受辭甚苦至光曰道士之操不踰先父何所因辭乃飲以醇酒同閉宻室什被逼既至遂虧其節或令騎牛及乘惡馬欲使墜落什常懐忍辱曽無異色光慙愧而已光還中路置軍於山下將士已休什曰不可在此必見狼狽宜徙軍隴上光不納至夜果有大雨洪潦暴起水深數丈死者數千光始宻而異之什謂光曰此凶亡之地不宜淹留推遷揆數應速言歸中路必有福土可居光從之至凉州聞苻堅已為姚萇所害光三軍縞素大臨城南於是竊號闗外年稱太安太安二年正月姑臧大風什曰不祥之風當有姦叛然不勞自定也俄而梁謙彭晃相係而反尋亦殄滅至光龍飛二年張掖臨松盧水胡沮渠男成及從弟蒙遜反推建康太守段業為主遣庶子秦州刺史太原公纂率衆五萬討之時論謂業等烏合纂有威聲勢必全尅光以訪什什曰觀察此行未見其利既而纂敗績於合黎俄有郭黁作亂纂委大軍輕還為黁所敗僅以身免光中書監張資文翰温雅光甚器之資病光博營救療有外國道人羅叉云能差資疾光喜給賜甚重什知叉誑詐告資曰叉不能為徒煩費耳㝠運雖隱可以事試也乃以五色絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須㬰灰聚浮出復繩本形既叉治無效少日資亡頃之光又卒子紹襲位數日光庶子纂殺紹自立稱元咸寧咸寧二年猪生子一身三頭龍出東箱井中到殿前蟠卧比旦失之纂以為美瑞號大殿為龍翔殿俄而有黑龍升於當陽九宫門纂改為龍興門什奏曰比日􅅗龍出逰豕妖來異龍者隂𩔖出入有時而今屢見則為災𤯝必有下人謀上之變宜克己修徳以答天戒纂不納與什博戲殺棊曰斫胡奴頭什曰不能斫胡奴頭胡奴將斫人頭此言有㫖而纂終不悟也光弟保有子名超超小字胡奴後果殺纂斬首立其兄隆為主時人方驗什之言也什住凉積年吕光父子既不𢎞道敎故藴其深觧無所宣化苻堅已亡竟不相見及姚萇僭有闗中亦挹其髙名虚心要請吕以什智計多觧􅂲為姚謀不許東入及萇卒子興襲位復遣敦請興𢎞始三年三月有樹連理生於廟庭逍遥園葱變為茝以為美瑞謂智人應入至五月興遣隴西公碩徳西伐吕隆隆軍大破至九月隆上表歸降方得迎什入闗以其年十二月二十日至於長安興待以國師之禮甚見優寵自大法東被始於漢明渉歴魏晉經論漸多而支竺所出多滯文格義興少崇三寳鋭志講集什既至止仍請入西明閤及逍遥園譯出衆經什既率多諳誦無不究盡轉能漢言音譯流便既覽舊經義多紕僻皆由先度失音不與梵本相應於是興使沙門僧䂮僧遷法欽道流道恒道標僧叡僧肇等八百餘人諮受什㫖更令出大品什持梵本興執舊經以相讐校其新文異舊者義皆圓通衆心愜伏莫不欣贊什為人神情鑒徹傲岸出羣應機領會鮮有其匹且篤性仁厚汎愛為心虚已善誘終日無倦姚興常謂什曰大師聰明超悟天下莫二若一旦後世何可使法種無嗣遂以妓女十人逼令受之自爾已來不住僧坊别立􅇬舍供給豐盈每至講説常先自説譬譬如臭泥中生蓮華但採蓮華勿取臭泥也什初在龜兹從卑摩羅叉律師受律卑摩後入闗中什聞至欣然師敬盡禮卑摩未知被逼之事因問什曰汝於漢地大有重縁受法弟子可有㡬人什答云漢境經律未備新經及諸論等多是什所傳出三千徒衆皆從什受法但什累業障深故不受師敬耳又杯渡比丘在彭城聞什在長安乃歎曰吾與此子戲别三百餘年杳然未期遲有遇於來生耳什未終少日覺四大不愈乃口出三畨神呪令外國弟子誦之以自救未及致力轉覺危殆於是力疾與衆僧告别曰因法相遇殊未盡心方復後世惻愴何言自以闇昧謬充傳譚凡所出經論三百餘卷唯日誦一部未及刪繁存其本㫖必無差失願凡所宣譚傳流後世咸共𢎞通今於衆前發誠實誓若所傳無謬者當使焚身之後舌不焦爛以偽秦𢎞始十一年八月二十日卒於長安是嵗晉義熙五年也即於逍遥園依外國法以火焚屍薪滅形碎唯舌不灰耳出髙僧傳法朗晉沙門康法朗學於中山永嘉中與一比丘西入天竺行過流沙千有餘里見道邊敗壊佛圖無復堂殿蓬蒿沒人法朗等下拜瞻禮見有二僧各居其旁一人讀經一人患痢􅁾汚盈房其讀經者了不營視朗等惻然興念留為煮粥掃除浣濯至六日病者稍困注痢如泉朗等共料理之其夜朗等並謂病者必不起至明晨往視之容色光悦病狀頓除然屋中􅁾物皆是華馨朗等乃悟是得道之士以試人也病者曰隔房比丘是我和尚久得道惠可往禮覲法朗等先嫌讀經沙門無慈愛心聞已乃作禮悔過讀經者曰諸君誠契並至同當入道朗公宿學業淺此世未得願也謂朗伴云惠若植根深當現世得願因而留之法朗後還中山為大法師道俗宗之出㝠祥記李恒沙門晉李恒字元文譙國人少時有一沙門造恒謂曰君福報將至而復禍來隨之君能守貧脩道不仕宦者福増禍滅君其勉之恒性躁又寒門但問仕宦當何所至了不尋究修道意也沙門與一卷經恒不肯取固問榮途貴賤何如沙門曰當帶金紫極於三郡若能於一郡止者亦為善道恒曰且當富貴何顧後患因留宿恒夜起見沙門身滿一牀入呼家人闚視復變為大鳥跱屋梁上天曉而形如舊恒送出門忽不復見知是神人因此事佛而亦不能精至後為西陽江夏廬江太守加龍驤將軍太興中預錢鳳之亂被誅出法苑珠林太平廣記卷八十九
