body:
  text: 太平廣記卷二百五十四嘲誚二趙神徳賈嘉隐歐陽詢髙士廉裴略劉行敏竇昉狄仁傑楊茂直左右臺御史杜文範御史裏行張元一吉頊朱隨侯李詳趙神徳唐初梁寳好嘲戲曾因公行至貝州憇客舘中閑問貝州佐史云此州有趙神徳甚能嘲即令召之寳顔甚黑㕔上憑案以待須臾神徳入兩眼俱赤至階前梁寳即云趙神徳天上既無雲閃電何以無准則答云向者入門來案後唯見一挺墨寳又云官裏料朱砂半眼供一國又答云磨公小拇指塗得太社北寳更無以對媿謝遣之出啓顔録賈嘉隐唐賈嘉隐年七歲以神童召見長孫無忌徐世勣於朝堂立語徐戲之曰吾所倚者何樹曰松樹徐曰此槐也何得言松嘉隐曰以公配木何得非松邪長孫復問之吾所倚何樹曰槐樹長孫曰汝不復矯邪嘉隐曰何煩矯對但取其鬼對木耳年十一二貞觀年􅀍舉雖有俊辯儀容醜陋嘗在朝堂取進止朝堂官退朝並出俱來就看餘人未語英國公李勣先即諸宰貴云此小兒恰似獠靣何得聰明諸人未報賈嘉隐即應聲答之曰胡頭尚為宰相獠面何廢聰明舉朝人皆大笑出國史纂異歐陽詢唐宋國公蕭瑀不解射九月九日賜射瑀箭俱不著垜一無所獲歐陽詢詠之曰急風吹緩箭弱手馭彊弓欲髙翻復下應西還更東十廻俱著地兩手併擎空借問誰為此乃應是宋公出啓顔録髙士亷唐髙士廉掌選其人齒髙有選人自云解嘲謔士廉時著木履令嘲之應聲云刺鼻何曾􅅉􅂿面不知嗔髙生兩箇齒自謂得勝人士廉笑而引之出朝野僉載裴略唐初裴略宿衞考滿兵部試判為錯一字落第此人即向僕射溫彦博處披訴彦博當時共杜如晦坐不理其訴此人即云少小以來自許明辯至於通傳言語堪作通事舍人并解作文章兼能嘲戲彦博始廻意共語時㕔前有竹彦博即令嘲竹此人應聲嘲曰竹風吹青肅肅凌冬葉不凋經春子不熟虚心未能待國士皮上何須生節目彦博大喜即云既解通傳言語可傳語與㕔前屏牆此人走至屏牆大聲語曰方今聖上聰明闢四門以待士君是何物久在此妨賢路即推倒彦博云此意著博此人云非但著膊亦乃著肚當為杜如晦在坐有此言彦博如晦俱大歡笑即令送吏部與官出啓顔録劉行敏唐有人姓崔飲酒歸犯夜􅀍武侯執縛五更初猶未解長安令劉行敏鼓聲動向朝至街首逢之始與解縛因詠之曰崔生犯夜行武侯正嚴更幞頭拳下落髙髻掌中擎杖迹胸前出繩文腕後生愁人不惜夜隨意曉參横武陵公楊文瓘任戸部侍郎以能飲令宴蕃客渾王遂錯與延陀兒宴行敏詠曰武陵敬愛客終宴不知疲遣共渾王飲錯宴延陀兒始􅀍鴻臚識終蒙御史知精神既如此長嘆傷何為李叔愼賀蘭僧伽面甚黑杜善賢為長安令亦黑行敏詠之曰叔慎騎烏馬僧伽把漆弓喚取長安令共獵北山熊出啓顔録竇昉唐許子儒舊任奉禮郎永徽中造國子學子儒經祀當設有階級後不得階竇昉詠之曰不能專習禮虚心彊覓階一年辭爵弁半嵗履麻鞋瓦惡頻蒙􅀈音國牆虚屢􅀍杈初皆反映樹便側睡過匱即放乖嵗暮良功畢言是越朋儕今日綸言降方知愚計喎音口懐反出啓顔録狄仁傑唐狄仁傑倜儻不羇嘗授司農員外郎每判事多為正員卿同異仁傑不平之乃判曰員外郎有同側室正員卿位擅嫡妻此難曲事女君是終不蒙顔色正員頗亦慙悚時王及善豆盧欽望拜左右相仁傑以才望時議歸之頗冀此命每戲王豆盧略無屈色王豆盧俱善長行既拜謂時宰曰某無材行濫有此授狄謂曰公二人並能長行何為無材行或白左相事云適已白右相狄謂曰不審喚為右相合呼為有相王豆盧問故狄曰公不聞聰明兒不如有相子公二人可謂有相子也二公强笑意亦悒悒出御史臺記楊茂直唐楊茂直任拾遺有補闕姓王精九經不練時事每自言明三教時有僧名道儒妖訛則天捕逐甚急所在題云訪僧道儒茂直與薛兼金戲謂曰敇捕僧道儒足下何以安閒云何關吾事茂直曰足下明三教僧則佛教道則老教何不關吾事乃驚懼興寢不安遂不敢歸寓於曹局數宿祈左右慎其事意復共誑之憂懼不已遇人但云實不明三教事茂直等方寛慰云别訪人非三教也乃敢去出御史臺記左右臺御史唐孝和朝左右臺御史有遷南省仍内供奉者三墨敕授者五臺譏之為五墨三仍左臺呼右臺為高麗僧言隨漢僧赴齋不咒願嘆唄但飲食受䞋而已譏其掌外臺在京輦無所彈劾而俸禄同也自右臺授左臺號為出蕃自左臺授右臺號為没蕃每相遇必相嘲謔不已也出御史臺記杜文範唐杜文範襄陽人也自長安尉應舉擢第拜監察御史選殿中授刑部員外以承務郎特授西臺舍人先時與髙上智俱任殿中為侍御史張由古宋之順所排蹙與上智遷員外既五旬由古之順方入省文範衆中謂之曰張宋二侍御俱是俊才由古問之答曰若非俊才那得五十日騎土牛趂及殿中舉衆歡笑出御史臺記御史裏行武后初稱周恐下心未安乃令人自舉供奉官正員外多置裏行有御史臺令史將入臺值裏行御史數人聚立門内令史不下驢衝過諸御史大怒將杖之令史云今日之過實在此驢乞先數之然後受罰許之謂驢曰汝技藝可知精神機鈍何物驢畜敢於御史裏行於是御史羞慙而止出國朝雜記張元一周則天朝蕃人上封事多加官賞有為右臺御史者因則天嘗問郎中張元一曰在外有何可笑事元一曰朱前疑着緑逯仁傑著朱閭知微騎馬馬吉甫騎驢將名作姓李千里將姓作名吳栖梧左臺胡御史右臺御史胡胡元禮也御史胡蕃人為御史者㝷改他官周革命舉人貝州趙廓𦕈小起家監察御史時人謂之臺􅁾李昭徳詈之為中霜穀束元一目為梟坐鷹架時同州魯孔邱為拾遺有武夫氣時人謂之外軍主帥元一目為鶖入鳯池蘓味道才學識度物望攸歸王方慶體質鄙陋言詞魯鈍智不逾俗才不出凡俱為鳯閣侍郎或問元一曰蘓王孰賢答曰蘓九月得霜鷹王十月􅀍凍蠅或問其故答曰得霜鷹俊捷􅀍凍蠅頑怯時人伏能體物也契丹賊孫萬榮之㓂幽河内王武懿宗為元帥引兵至趙州圍賊駱務整從北數千騎來王乃棄兵甲南走荆州軍資器械遺於道路聞賊已退方更向前軍廻至都置酒髙㑹元一於御前嘲懿宗曰長弓短度箭蜀馬臨堦騙去賊七百里隈牆獨自戰甲杖摠抛却騎猪向南䞼上曰懿宗有馬因何騎猪對曰騎猪夾豕走也上大笑懿宗曰元一宿構不是卒辭上曰爾付韻與之懿宗曰請以菶韻元一應聲曰裹頭極草草掠鬂不菶菶未見桃花面皮漫作杏子眼孔則天大悦王極有慙色懿宗形貌短醜故曰長弓短度箭周靜樂縣主河内王懿宗妹懿宗短醜武氏最長時號大哥縣主與則天並馬行命元一詠曰馬帶桃花錦裙銜緑草羅定知幃㡌底儀容似大哥則天大笑縣主極慙納言婁師徳長大而黑一足蹇元一目為行轍方相亦號為衛靈公言防靈柩方相也天官侍郎吉頊長大好昻頭行視髙而望逺目為望柳駱駝殿中侍御史元本竦髆傴身黑而且瘦目為嶺南考典駕部郎中朱前疑粗黑肥短身體垢膩目為光禄掌膳東方虬身長衫短骨面粗眉目為外軍校尉唐波若矮短目為鬱屈蜀馬目李昭徳卒子鋭反歳胡孫修文學士馬吉甫𦕈一目為端箭師郎中長儒子視望陽目為呷醋漢氾水令蘇徵舉止輕薄目為失孔老䑕出朝野僉載吉頊周張元一腹粗而脚短項縮而眼跌吉頊目為逆流蝦蟇出朝野僉載朱隨侯周韶州曲江令朱隨侯女夫李逖遊客􅈛朱九並姿相少媚廣州人號為三穛七肖反人歌之曰奉敇追三穛隨侯傍道走廻頭語李郎喚取􅈛朱九張鷟目隨侯臛亂土梟出朝野僉載李詳周李詳河内人氣俠剛勁初為梓州監示尉主書考日刺史問平已否詳獨曰不平刺史曰不平君把筆書考詳曰請考使君即下筆曰怯斷大事好勾小稽自隐不清疑人總濁考中下刺史黙然而罷出朝野僉載太平廣記卷二百五十四
