body:
  text: 太平廣記卷四百七十九宋李昉等編昆蟲七蟻子蛙蛤金龜子海山蜈蚣蚊翼壁蟲白蟲蠶女砂俘效舍毒老蛛李禪蝗化水蛙蚓瘡蜂餘熊廼螽斯蝻化蟻子南方尤多蟻子凡柱楣户牖悉逰蟻循途奔走居有所營里棟相接莫窮其往來出投􅂽雜録蛙蛤南方又有水族狀如蛙其形尤惡土人呼為蛤為蛙食之味美如鷓鴣及治男子勞虚出投􅂽雜録金龜子金龜子甲蟲也春夏間生於草木上大如小指甲飛時即不𩔖泊草蔓上細視之真金色龜兒也行必成雙南人採之陰乾裝以金翠為首飾之物亦𩔖黔中所産青蟲子也出嶺表録異海山又珠崖人每晴明見海中逺山羅列皆如翠屏而東西不定悉蜈蚣也蝦鬚長四五十尺此物不足怪也出嶺表異物志蜈蚣蜈蚣南越志云大者其皮可以鞔鼓取其肉曝為脯美於牛肉又云大者能噉牛里人或遇之則鳴鼓然火炬以驅逐之出嶺表録異蚊翼南方蚊翼下有小蜚蟲焉自明者見之每生九卵復未嘗曾有􅖁徒亂反復成九子蜚而俱去蚊遂不知亦食人及百獸食者知言蟲小食人不去也此蟲既細且小因曰細蠛音蔑陳章對齊桓公小蟲是也此蟲常春生而以季夏冬蔵於鹿耳中名孆婗孆婗細小也出神異録壁蟲壁虱者土蟲之𩔖化生壁間暑月囓人其瘡雖愈每年及期必發數年之後其毒方盡其狀與牛虱無異北都廏中之馬忽相次痩劣致斃所損日甚主將雖督審芻藥勤至終莫能究而斃者狀𩔖相似亦莫知其疾之由掌厩獲罪者已數人矣皆傾家破産市馬以賠納然後伏刑有一裨将幹敏多識凡所主掌皆能立功衆所推舉俾其掌廐馬此人勤心養膳旦夕躬親旬月之後馬之殯斃如舊疑其有他乃明燭以守之二鼔之後馬皆立不食黒者變白白者變黒秉炬以視諸馬之上有物附之不可勝數乃壁虱所噆也五鼓之後壁虱皆去一道如繩連亘不絶翌日而以其事白於帥臣尋其去蹤於樓中得巨穴焉以湯灌之壊城門穴得壁虱死者數十斛穴中大者一所長數尺形如琵琶金色焚而殺之築塞其處其害乃絶出録異記白蟲有人忽面上生瘡暑月即甚略無完皮異常楚痛塗嘗餌藥不能致效忽一日既卧餘燭未滅同寝者見有物如絃如線以著其面因執燭視之白蟲如虱自瓷枕穴中出以噆其面既明遂道其事剖枕以視之白蟲無數因盡殺之面瘡乃愈出録異記蠶女蠶女者當髙辛帝時蜀地未立君長無所統攝其人聚族而居逓相侵噬蠶女舊跡今在廣漢不知其姓氏其父為隣所操去已逾年唯所乗之馬猶在女念父隔絶或廢飲食其母慰撫之因告誓於衆曰有得父還者以此女嫁之部下之人唯聞其誓無能致父歸者馬聞其言驚躍振􅌺絶其拘絆而去數日父乃乗馬歸自此馬嘶鳴不肯飲齕父問其故母以誓衆之言白之父曰誓於人不誓於馬安有配人而偶非𩔖乎能脱我於難功亦大矣所誓之言不可行也馬愈跑父怒射殺之曝其皮於庭女行過其側馬皮蹶然而起卷女飛去旬日皮復栖於桑樹之上女化為蠶食桑葉吐絲成繭以衣被於人間父母悔恨念之不已忽見蠶女乗流雲駕此馬侍衛數十人自天而下謂父母曰太上以我孝能致身心不忘義授以九宫仙嬪之任長生於天矣無復憶念也乃冲虚而去今家在什邡緜竹徳陽三縣界每歲祈蠶者四方雲集皆獲靈應宫觀諸化塑女子之像披馬皮謂之馬頭娘以祈蠶桑焉稽聖賦曰安有女感彼死馬化為蠶蟲衣被天下是也出原化𫝊拾遺砂俘效陳蔵器本草云砂俘又云倒行拘子蜀人號曰俘鬱旋乾土為孔常睡不動取致枕中令夫妻相悦愚有親表曾得此物未嘗試驗愚始逰成都止於逆旅與賣草藥李山人相熟見蜀城少年往往欣然而訪李生仍以善價酬因詰之曰媚藥徵其所用乃砂俘與陳氏所説信不虚語李生亦秘其所𫝊之法人不可得也武陵山川媚草無賴者以銀換之有因其術而男女發狂罹禍非細也出北夢瑣言舍毒舍毒者蚊蚋之屬江嶺間有之郴連界尤甚為客中者慎勿以手搔之但布鹽於上以物封裹半日間毒則解矣若以手搔癢不可止皮穿肉穴其毒彌甚湘衡北間有之其毒稍可峽江至蜀有蟆子色黑亦能咬人毒亦不甚視其生處即􅀈鹽樹葉背上春間生之葉卷成窠大如桃李名為五倍子治一切瘡毒收者曬而殺之即不化去不然者必竅穴而出飛為蟆子矣黔南界有微塵色白甚小視之不見能晝夜害人雖帳深宻亦不可斷以麤茶燒之煙如焚香狀即可斷之又如席鋪油帔隔之稍可滅出録異記老蛛泰嶽之麓有岱嶽觀樓殿咸古制年代寝逺一夕大風有聲轟然響震山谷及旦視即經樓之陊也樓屋徘徊之中雜骨盈車有老蛛在焉形如矮腹五升之茶鼎展手足則周數尺之地矣先是側近寺觀或民家亡失幼兒不計其數葢悉罹其啗食也多有網於其上或遭其黏縻絆不能自解而脱走則必遭其害矣於是觀主命薪以焚之臭聞十餘里出玉堂閒話李禪李禪楚州刺史承嗣少子也居廣陵宣平里大第晝日寝庭前忽有白蝙蝠繞庭而飛家僮輩竟以箒撲皆不能中久之飛去院門撲之亦不中又飛出門至外門之外遂不見其年禪妻卒輭車出入之路即白蝙蝠飛翔之所也出稽神録蝗化唐天祐末歲蝗蟲生地穴中生訖即衆蝗銜其足翅而拽出帝謂蝗曰予何罪食予苖遂化為蜻蜓洛中皆驗之是歲羣雀化燕出異記水蛙徐之東界接沂川有溝多盤車相𫝊是奚仲試車之所徐州有奚仲墓山上亦有試車處石上輙深數尺溝有水水有蛙可大如五石甕目如盌昔嘗有人於其項上得藥服之度世出玉堂閒話蚓瘡天祐中浙西重造慈和寺治地既畢每為蚯蚓穿穴執事者患之有一僧教以石灰覆之由是得定而殺蚯蚓無數頃之其僧病苦舉身皆癢須得長指爪者搔之以以至成瘡瘡中輙得死蚯蚓一條殆數百千條肉盡至骨而卒出稽神録蜂餘廬陵有人應舉行遇夜詣一村舍求宿有老翁出見客曰吾舍窄人多容一榻可矣因止其家屋室百餘間但窄小甚久之告飢翁曰居家貧所食唯野菜耳即以設客食之甚甘美與常菜殊及就寝唯聞訌訌之聲既曙而寤身卧田中旁有大蜂窠客嘗患風因爾遂愈葢食蜂之餘爾出稽神録熊廼信州有版山川谷深逺采版之所因以名之州人熊廼嘗與其徒入山伐木其弟從而追之日暮不及其兄忽見甲士清道自東來𫝊呼甚厲廼弟懼恐伏於草間俄而旗幟戈甲絡繹而至道傍亦有行人其犯清道者輒為所戮至軍中擁一人若大将者西馳而去度其逺乃敢起行迨曉方見其兄具道所見衆皆曰非巡邏之所而西去谿灘險絶往無所詣安得有此人即共尋之可十餘里隔谿灘猶見旌旗紛若布圍畋獵之狀其徒有勇者遙呼叱之忽無所見就視之人皆樹葉馬皆大螘取而碎之皆有血云出稽神録螽斯蝗之為孽也葢沴氣所生螽斯臭腥或曰魚卵所化每歲生育或三或四每一生其卵盈百自卵及翼凡一月而飛故詩稱螽斯子孫衆多螽斯即蝗屬也羽翼未成跳躍而行其名蝻晉天福之末天下大蝗連歲不解行則蔽地起則蔽天禾稼草木赤地無遺其蝻之盛也流引無數甚至浮河越嶺踰地渡壍如履平地入人家舍莫能制禦穿户入牖井溷填咽腥穢牀帳損齧書衣積日連宵不勝其苦鄆城縣有一農家豢豕十餘頭時于陂澤間值蝻大至羣豢豕躍而啗食之斯須復飫不能運動其蝻又飢唼齧羣豕有若堆積家竟困頓不能禦之皆為蝻所殺癸夘年其蝗皆抱草木而枯死所為天生殺也出玉堂閒話蝻化己酉年将軍許敬遷奉命於東洲按夏苗上言稱於陂野間見有蝻生十數里纔欲打捕其蟲化為白蛺蝶飛去出玉堂閒話太平廣記卷四百七十九
