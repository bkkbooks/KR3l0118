body:
  text: 太平廣記卷二十一神仙二十一孫思邈司馬承禎尹君孫思邈孫思邈雍州華原人也七歳就學日誦千餘言弱冠善談莊老及百家之説亦好釋典洛州總管獨孤信見而嘆曰此聖童也但恨其器大識小難為用也後周宣帝時思邈以王室多故遂隱居太白山隋文帝輔政徴為國子博士稱疾不起常謂所親曰過是五十年當有聖人出吾方助之以濟人及唐太宗即位召詣京師嗟其容色甚少謂曰故知有道者誠可尊重羡門廣成豈虛言哉將授以爵位固辭不受唐顯慶七年髙宗召見拜諫議大夫又固辭不受上元元年辭疾請歸特賜良馬及鄱陽公主邑司以居焉當時名士如宋之問孟詵盧照隣等皆執師弟之禮以事焉思邈嘗從幸九成宫照隣病留在其宅時庭前有大梨樹照隣為之賦其序曰癸酉之歳余卧疾長安光徳坊之官舎户老云是鄱陽公主邑司昔公主未嫁而卒故其邑廢時有處士孫思邈道洽古今學殫數術髙談正一則古之蒙莊子深入不二則今之維摩詰至于推歩甲乙度量乾坤則洛下閎安期先生之儔也自云開皇辛酉歳生年九十三矣察之鄉里咸云數百歳又共話周齊間事歴歴如目見以此參之不啻百歳人矣然猶視聽不衰神彩甚茂可謂古之聰明博達不死者也時照隣有盛名而染惡疾嗟禀受之不同昧遐天之殊致因問思邈曰名醫愈疾其道如何對曰吾聞善言天者必質於人善言人者必本於天天有四時五行寒暑迭代其轉運也和而為雨怒而為風凝而為霜雪張而為虹蜺此天地之常數也人有四肢五臟一覺一寐呼吸吐納循而為往來流而為榮衛彰而為氣色發而為音聲此人之常數也陽用其精隂用其形天人之所同也及其失也蒸則生熱否則生寒結而為疣贅陷而為癰疽奔而為喘乏竭而為焦枯診發乎面變動乎形推此以及天地則亦如之故五緯盈縮星辰失度日月錯行彗孛流飛此天地之危疹也寒暑不時此天地之蒸否也石立土踴此天地之疣贅也山崩地陷此天地之癰疽也奔風暴雨此天地之喘乏也雨澤不時川源涸竭此天地之焦枯也良醫導之以藥石救之以針劑聖人和之以道徳輔之以政事故體有可愈之疾天地有可消之災又曰膽欲大而心欲小智欲圓而行欲方詩曰如臨深淵如履薄氷謂小心也赳赳武夫公侯干城謂大膽也不為利囘不為義疚行之方也見機而作不俟終日智之圓也其文學也穎出如是其道術也不可勝紀焉初魏徴等受詔修齊梁周隋等五代史恐有遺漏屢訪於思邈口以傳授有如目覩東臺侍郎孫處約嘗將其五子􅪠儆俊侑佺以謁思邈思邈曰俊當先貴侑當晩達佺最居重位禍在執兵後皆如其言太子詹事盧齊卿自幼時請問人倫之事思邈曰汝後五十年位登方伯吾孫當為屬吏可自保也齊卿後為徐州刺史思邈孫溥果為徐州蕭縣丞邈初謂齊卿言時􅄎猶未生而預知其事凡諸異跡多如此焉永淳元年卒遺令薄葬不藏㝠器不奠生牢經月餘顔貌不改舉尸就木空衣而已時人異之自注老子莊子撰千金方三十卷福祿論三十卷攝生真籙枕中素書㑹三教論各一卷開元中復有人見隱於終南山與宣律師相接每來往參請宗㫖時大旱西域僧請於昆明池結壇祈雨詔有司備香燈凡七日縮水數尺忽有老人夜詣宣律師求救曰弟子昆明池龍也無雨時久匪由弟子胡僧利弟子腦將為藥欺天子言祈雨命在旦夕乞和尚法力救䕶宣公辭曰貧道持律而已可求孫先生老人因至思邈謂曰我知昆明龍宫有仙方三十首若能示予予將救汝老人曰此方上帝不許妄傳今急矣固無所恡有頃捧方而至思邈曰爾但還無慮胡僧也自是池水忽漲數日溢岸胡僧羞恚而死又嘗有神仙降謂思邈曰爾所著千金方濟人之功亦已廣矣而以物命為藥害物亦多必為尸解之仙不得白日輕舉矣昔真人桓闓謂陶貞白事亦如之固吾子所如也其後思邈取草木之藥以代䖟蟲水蛭之命作千金方翼三十篇每篇有龍宫仙方一首行之於世及𤣥宗避羯胡之亂西幸蜀既至蜀夢一叟􅂡鬂盡白衣黄􅃭再拜于前已而奏曰臣孫思邈也廬於峨眉山有年矣今聞鑾駕幸成都臣故候謁𤣥宗曰我熟識先生名久矣今先生不逺而至亦將有所求乎思邈對曰臣隱居雲泉好餌金石藥聞此地出雄黄願以八十兩為賜脫遂臣請幸降使齎至峨眉山𤣥宗諾之悸然而寤即詔侍臣陳忠盛挈雄黄八十兩往峨眉宣賜思邈忠盛既奉詔入峨眉至屏風嶺見一叟貌甚俊古衣黄􅃭立於嶺下謂忠盛曰汝非天子使乎我即孫思邈也忠盛曰上命以雄黄賜先生其叟僂而受既而曰吾蒙天子賜雄黄今有表謝屬山居無翰墨天使命筆札傳寫以進也忠盛即召吏執牘染翰叟指一石曰表本在石上君可錄焉忠盛目其石果有硃字百餘實表本也遂謄寫其字寫畢視其叟與石俱亡見矣於是具以其事聞於𤣥宗𤣥宗因問忠盛叟之貌與夢者果同由是益竒之自是或隱或見咸通末山下民家有兒十餘歳不食葷血父母以其好善使於白水僧院為童子曰有遊客稱孫處士周遊院中訖袖中出湯末以授童子曰為我如茶法煎來處士呷少許以餘湯與之覺湯極美願賜一碗處士曰此湯為汝來耳即以末方寸匕更令煎喫因與同侣話之出門處士已去矣童子亦乘空而飛衆方驚異顧視煎湯銚子已成金矣其後亦時有人見思邈者出仙傳拾遺及宣室志司馬承禎司馬承禎字子微博學能文攻篆迴為一體號曰金剪刀書隱於天台山玉霄峰自號白雲子有服餌之術則天累徴之不起睿宗雅尚道教屢加尊異承禎方赴召睿宗問隂陽術數之事承禎對曰老子經云損之又損以至於無為且心目所見知每損之尚未能已豈復攻乎異端而增智慮哉睿宗曰理身無為則清髙矣理國無為如之何對曰國猶身也老子曰㳺心於淡合氣於漠順物自然乃無私焉而天下理易曰聖人者與天地合其徳是知天不言而信無為而成無為之㫖理國之要睿宗深賞異留之欲加寵位固辭無何告歸山乃賜寳琴花帔以遣之公卿多賦詩以送常侍徐彦伯撮其美者三十餘篇為製序名曰白雲記見傳於世時盧藏用早隱終南山後登朝居要官見承禎將還天台藏用指終南謂之曰此中大有佳處何必在天台承禎徐對曰以僕所觀乃仕途之捷徑耳藏用有慙色𤣥宗有天下深好道術累徴承禎到京留於内殿頗加禮敬問以延年度世之事承禎隱而微言𤣥宗亦傳而祕之故人莫得知也由是𤣥宗理國四十餘年雖祿山犯闕鑾輿幸蜀及為上皇回又七年方始晏駕雖由天數豈非道力之助延長耶初𤣥宗登封太嶽回問承禎五嶽何神主之對曰嶽者山之巨鎮能出雲雨潛儲神仙國之望者為之然山林之神也亦有仙官主之于是詔五嶽於山頂列置仙官廟自承禎始也又蜀女真謝自然泛海將詣蓬萊求師船為風飄到一山見道人指言天台山司馬承禎名在丹臺身居赤城此真良師也蓬萊隔弱水三十萬里非舟楫可行非飛仙無以到自然乃回求承禎受度後白日上昇而去承禎居山修行勤苦年一百餘歳童顔輕徤若三十許人有弟子七十餘人一旦告弟子曰吾自居玉霄峯東望蓬萊常有真靈降駕今為東海青童君東華君所召必須去人間俄頃氣絶若蟬蜕然解化矣弟子葬其衣冠爾出續仙傳尹君唐故尚書李公鎭北門時有道士尹君者隱晉山不食粟常餌栢葉雖髪盡白而容狀若童子往往獨遊城市里中有老父年八十餘者顧謂人曰吾孩提時嘗見李翁言李翁吾外祖也且曰我年七歳已識尹君矣迨今七十餘年而尹君容狀如舊得非神仙乎吾且老自度能幾何為人間人汝方壯當志尹君之容狀自是及今七十餘歳矣而尹君曾無老色豈非以千百歳為瞬息耶北門從事馮翊嚴公綬好竒者慕尹之得道每旬休即驅駕而詣焉其後嚴公自軍為司馬為北門帥遂迎尹君至府庭舘於公署終日與同席常有異香自肌中發公益重之公有女弟學浮圖氏嘗曰佛氏與黄老固殊致且怒其兄與道士遊後一日密以堇斟致湯中命尹君飲之尹君既飲驚而起曰吾其死乎俄吐出一物甚堅有異香發其中公命剖而視之真麝臍也自是尹君貌衰齒墮其夕卒於舘中嚴公既知女弟之所為也怒且甚即命部將治其䘮後二日葬尹君於汾水西二十里明年秋有照聖觀道士朱太虛因投龍至晉山忽遇尹君在山中太虛驚而問曰師何為至此耶尹君笑曰吾去歳在北門有人以堇斟飲我者我故示之以死然則堇斟安能敗吾真耶言訖忽亡所見太虛竊異其事及歸具白嚴公曰吾聞仙人不死脱有死者乃尸解也不然何變異之如是耶將命發其墓以驗之然慮惑於人遂止其事出宣室志太平廣記卷二十一
