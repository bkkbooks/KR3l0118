body:
  text: 太平廣記卷二百八十五幻術二宋子賢胡僧祖珍儉葉道士河南妖主凉州妖主明崇儼劉靖妻鼎師李慈徳葉法善羅公逺北山道者東明觀道士東巖寺僧荆術士梵僧難陀太白老僧宋子賢隋煬帝大業九年唐縣人宋子賢善為幻術每夜樓上有光明能變作佛形自稱彌勒佛出世又懸鏡於堂中壁上盡為獸形有人來禮謁者轉其鏡遣觀來生像或作蛇獸形子賢輒告之罪業當更禮念乃轉人形示之逺近惑信聚數千百人遂潛作亂事洩官捕之夜至繞其所居但見火炕兵不敢進其將曰此地素無坑止妖妄耳及進復無火遂擒斬之出廣古今五行記胡僧唐貞觀中西域獻胡僧咒術能死人能生人太宗令于飛騎中取壯勇者試之如言而死如言而生帝以吿太常少卿傅奕奕曰此邪法也臣聞邪不犯正若使咒臣必不能行帝召僧咒奕奕對之無所覺須臾胡僧忽然自倒若為所擊便不復蘇矣出國朝雜記祖珍儉唐咸亨中趙州祖珍儉有妖術懸小甕於梁上以刀斫之繩斷而甕不落又於空房内密閉門置一甕水横刀其上人良久入看見儉支解五段水甕皆是血人去之後平復如初冬月極寒石臼冰凍呪之拔出賣卜於信都市日取百錢蓋君平之法也後被人糺吿引向市斬之顔色自若了無懼命紙筆作詞精彩不撓出朝野僉載葉道士唐陵空觀葉道士呪刀盡力斬病人肚横桃栁於腹上桃栁斷而肉不傷後將雙刀斫一女子應手兩段血流遍地家人大哭道士取續之噴水而咒須臾平復如故出朝野僉載河南妖主唐河南府立徳坊及南市西坊皆有胡妖神廟毎嵗商胡祈福烹猪殺羊琵琶鼓笛酣歌醉舞酧神之後募一胡為妖主㸔者施錢並與之其妖主取一横刀利同霜雪吹毛不過以刀刺腹刃出於背仍亂擾腸肚流血食頃噴水呪之平復如故此葢西域之幻法也出朝野僉載梁州妖主唐梁州妖神祠至祈禱日妖主以利鐵從額上釘之直洞腋下即出門身輕若飛須臾數百里至西妖神前舞一曲即却至舊妖所乃㧞釘一無所損卧十餘日平復如初莫知其所以然也出朝野僉載明崇儼唐明崇儼有術法文帝試之為地窖遣妓奏樂引儼至謂曰此地常聞絃管是何祥也卿能止之儼曰諾遂書二桃符於其上釘之其聲寂然上笑喚妓人問云見二龍頭張口向上遂怖懼不敢奏樂也上大悦出朝野僉載劉靖妻唐蜀縣令劉靖妻患疾正諫大夫明崇儼診之曰須得生龍肝食之必愈靖以為不可得儼乃書符乗風放之上天須臾有龍下入甕水中剔取肝食之而差文帝盛夏須雪及枇杷龍眼子儼坐頃間徃隂山取雪至嶺取果子並到食之無别時𤓰未熟上思之儼索百錢將去須臾得一大𤓰云緱氏老人園内得之上追老人至問之云土埋一𤓰擬進適賣唯得百錢耳儼獨卧堂中夜被刺死刀子仍在心上敕求賊甚急竟無踪緒或以為儼役鬼勞苦被鬼殺之孔子曰攻乎異端斯害也已信哉出朝野僉載鼎師唐則天朝有鼎師者瀛博野人有竒行太平公主進則天試之以銀甕盛酒三斗一舉而飲盡又曰臣能食醤即令以銀甕盛醤一斗鼎師以匙抄之須臾即竭則天欲與官鼎曰情願出家即與剃頭後則天之復辟也鼎曰如來螺髻菩薩寳首若能修道何必剃除遂長髪使張潛決一百不廢行動亦無瘡痍時人莫測出朝野僉載李慈徳唐大足年中有妖妄人李慈徳自云能行符書厭則天於内安置布豆成兵馬畫地為江河與給使相知削竹為鎗􅅶被為甲三更於内反宫人擾亂相投者十二三羽林將軍楊𤣥基聞内裏聲呌領兵斬闗而入殺慈徳閹豎數十人惜哉慈徳以厭為容以厭而䘮出朝野僉載葉法善唐孝和帝令内道場僧與道士各述所能久而不決𤣥都觀葉法善取胡桃二升並殻食之並盡僧仍不伏法善燒一鐵鉢赫赤兩手欲合老僧頭上僧唱賊袈裟掩頭而走孝和撫掌大笑出朝野僉載羅公逺唐道士羅公逺㓜時不慧遂入梁山數年忽有異見言事皆中敕追入京先天中皇太子設齋逺從太子乞金銀噐物太子靳固不與逺曰少時自取太子自封署房門須臾開視噐物一無所見東房先封閉徃視之噐物並在其中又借太子所乗馬太子怒不與逺曰已取得來見於後園中放在太子急徃櫪上檢㸔馬在如故侍御史𡊮守一將食噐數枚就羅公逺㸔年命奴擎衣襆在門外不覺須臾在逺公衣箱中諸人大驚莫知其然出朝野僉載北山道者唐張守珪之鎮范陽檀州宻雲令有女年十七姿色絶人女病踰年醫不愈宻雲北山中有道者衣黄衣在山數百年稱有道術令自至山請之道人既至與之方女病立已令喜厚其貨財居月餘女夜卧有人與之寢而私焉其人毎至女則昏魘及明人去女復如常如是數夕女懼告母母以告令乃移牀近已夜而伺之覺牀動掩焉擒一人遽命燈至乃北山道者令縛而訊之道者泣曰吾命當終被惑乃爾吾居北山六百餘載未嘗到人間吾今垂千嵗矣昨蒙召殷勤所以到縣及見公女意大悦之自抑不可於是徃來吾有道術常晝日能隐其形所以家人不見今遇此厄夫復何言令竟殺之出紀聞東明觀道士唐開元中宫禁有美人忽夜夢被人邀去縱酒宻㑹極歡而歸歸輒流汗倦怠後因從容奏於帝帝曰此必術士所為也汝若復徃但隨宜以物識之其夕熟寐飄然又徃美人半醉見石硯在前乃宻印手文於曲房屏風之上寤而具啟帝乃潛以物色令於諸宫觀中求之果於東明觀得其屏風手文尚在所居道士已遁矣出開天𫝊信記東巖寺僧博陵崔簡少敏恵好異術嘗遇道士張元肅曉以道要使役神物坐通變化唐天寳二載如蜀郡郡有吕誼者遇簡而厚幣以遺意有所為簡問所欲乃曰繼代有女未嘗見人閨帷之中一夕而失意者明公藴非常之術願知所捕瞑目無恨矣簡曰易耳即於别室夜設几席焚名香以降神靈簡令吕生伏劍於户若胡僧來可執之求女慎無傷也簡書符呵之符飛出食頃間風聲㧞樹發屋忽聞一甲卒進曰神兵備願王所用簡曰主人某日失女可捕來卒曰唯東山上人毎日以呪水取人得非是乎簡曰若然可速捕來卒去須臾還曰東山上人聞之駭怒將下金剛伐君奈何簡曰無苦又書符飛之倐忽有神兵萬計皆竒形異狀執劍㦸列庭俄而西北上見一金剛來長數十丈張目叱簡兵兵俯伏不敢動簡劍歩於壇前神兵忽隐即見金剛駭矣久之無所見忽有一物猪頭人形著豹皮水褌云上人願起居仙官簡路坐而命之紫衣胡僧趨入簡讓曰僧盗主人女安敢妄有役使初僧拒詐吕生忽於户間躍出執而尤之僧廹不隐即曰伏矣貧道行大力法葢聖者致耳非僧所求令即歸之無苦相逼向非仙官之命君豈望乎願令聖者取來俄頃見猪頭負女至𡨕然如睡簡曰宜取井花水為桃湯洗之即醒遂自陳云初睡中夢一物猪頭人身攝去不知行近逺至一小房中見胡僧相淩問何處乃云天上也便禁閉無得出是夜有兵騎造門猪頭又至云崔真人有命方得歸然某來時私於僧房門上塗少脂粉有三指跡若以此尋可獲吕生厚遗簡而隂求僧門所記餘數月遊東巖寺入曲房忽見指跡於門右扇遽追之僧宿昔已去莫知所之寺與吕生居處可十里有餘耳出通幽記荆術士唐大厯中荆州有術士從南來止于陟圮寺好酒少有醒時因寺中大齋㑹人衆數千術士忽曰余有一技可代柞瓦㕎珠之歡也乃合彩色於一噐中驔歩㧓目徐祝數十言方飲水再三噀壁上成維摩問疾變相五色相宣如新寫逮半日餘色漸薄至暮都滅惟金粟綸巾鶖子衣上一花經兩日猶在出酉陽雜爼梵僧難陀唐丞相魏公張延賞在蜀時有梵僧難陀得如幻三昧入水火貫金石變化無窮初入蜀與三尼俱行或大醉狂歌戍將將斷之及僧至且曰某寄迹桑門别有藥術因指三尼此妙於歌管戍將反敬之遂留連為辦酒夜㑹客與劇飲僧假襔襠巾幗市鉛黛飾其三尼及坐含睇調笑逸態絶世飲將䦨僧謂尼曰可爲押衙踏某曲也因徐進對舞曵緒廻雪迅赴摩趺技又絶倫也良久曲終而舞不已僧喝曰婦女風耶忽起取戍將佩刀衆謂酒狂驚走僧乃㧞刀斫之皆踣於地血及數尺戍將大懼呼左右縛僧僧笑曰無草草徐舉尼三枝笻枝也血乃酒耳又嘗在飲㑹令人斷其頭釘耳於柱無血身坐席上酒至瀉入脰瘡中面赤而歌手復抵節㑹罷自起提首安之初無痕也時時預言人凶衰皆謎語事過方曉成都有百姓供養數日僧不欲住閉闗留之僧因走入壁間百姓遽牽漸入惟餘袈裟角頃亦不見來日壁上有􅀞僧焉其狀形似日月漸薄積七日空有黒跡至八日黒跡亦滅已在彭州矣後不知所之出酉陽雜爼太白老僧大唐中有平陽路氏子性好竒少從道士遊後廬於太白山嘗一日有老僧叩門路君延坐與語久之僧曰檀越好竒者然未能臻𤣥奥之樞徒為居深山中莫若襲輕裘馳駿馬遊朝市可不快平生志寧能與麋鹿為伍乎路君謝曰吾師之言若真有道者然而不能示我𤣥妙之跡何為張虚詞以自炫耶僧曰請弟子觀我𤣥妙之踪言訖即於衣中出一合子徑寸餘其色黒而光既啟之即以身入俄而化為一鳥飛沖天出宣室志太平廣記卷二百八十五
