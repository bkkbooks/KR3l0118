body:
  text: 太平廣記卷九十八異僧十二李徳裕齊州僧抱玉師束草師惠寛素和尚懐信佛陁薩興元上座趙蕃懐濬智者禪師法本李徳裕唐相國李徳裕為太子少保分司東都嘗召一僧問己之休咎僧曰非立可知願結壇設佛像僧居其中凡三日謂公曰公災戾未已當萬里南去耳公大怒叱之明日又召其僧問焉慮所見未子細請更觀之即又結壇三日告公曰南行之期不旬月矣不可逃公益不樂且曰然則吾師何以明其不妄􅁘僧曰願陳目前事為驗庶表某之不誣也公曰果有說也即指其地曰此下有石函請發之即命窮其下數尺果得石函啓之亦無覩焉公異而稍信之因問南去誠不免矣然乃遂不還乎僧曰當還耳公訊其事對曰相國平生當食萬羊今食九千五百矣所以當還者未盡五百羊耳公慘然而歎曰吾師果至人且我元和十三年為丞相張公從事於北都嘗夢行於晉山見山上盡目皆羊有牧者十數迎拜我我因問牧者牧者曰此侍御平生所食羊吾嘗記此夢不洩於人今者果如師之說􅁘乃知㝠数固不誣也後旬日振武節度使米暨遣使致書於公且饋五百羊公大驚即召告其事僧歎曰萬羊將滿公其不還乎公曰吾不食之亦可免􅁘曰羊至此已為相國所有公戚然旬日貶潮州司馬連貶崖州司户竟没於荒裔也出宣室志齊州僧史論在齊州時出獵至一縣界憇蘭若中覺桃香異常訪其僧僧不及隱言近有一人施二桃因從經案下取出獻論大如飯碗論時飢盡食之核大如雞卵論因詰其所自僧笑曰向實繆言之此桃去此十餘里道路危險貧僧偶行脚見之覺異因掇數枚論曰願去騎從與和尚偕往僧不得已𨗳論出荒榛中經五里許抵一水僧曰恐中丞不能渡此論志訣往乃依僧解衣載之而浮登岸又經西北涉二水上山越澗數里至一處竒泉怪石非人境也有桃數百株枝􅆬掃地髙二三尺其香破鼻論與僧各食一蔕腹飽矣論解衣將盡力包之僧曰此域靈境不可多取貧僧常聽長老說昔有人亦嘗至此懐五六枚迷不得出論亦疑生非常取兩顆而返僧切戒論不言論至州使召僧僧已逝矣出酉陽雜俎抱玉師抱玉師以道行聞居長安中師而事者千數每夕獨處一室闔户撤燭嘗有僧於門隙視之見有慶雲自口中出後年九十卒時方大暑而其尸無萎敗唐宰相第五琦與師善及卒來治喪將以香乳灌其口已而有祥光自口出晃然四照公甚竒之或曰佛有慶祥光今抱玉師有之眞佛矣出宣室志束草師長安平康坊菩提寺先有僧不言姓名常負束藁坐卧於寺西廊下不肯住院經數年寺綱維或勸其住房曰爾厭我􅁘其夕遂以束藁焚身至明唯灰燼耳無血膋之臭衆方知為異人遂塑灰為僧於佛殿上世號為束草師出酉陽雜俎惠寛綿州浄慧寺僧惠寛先時年六嵗隨父設黄籙齋衆禮石天尊像惠寛時在不肯禮曰禮則石像遂倒不勝致也既禮而天尊像果倒腰已折矣後出家在寺寺近池人多捕魚為業惠寛與受戒且曰爾輩不當以此為給吾能令汝所得不失於舊因指其池畔盡生菌蕈漁人採之省力得利後人呼為和尚蕈也出成都記素和尚長安興善寺素和尚院庭有青桐數株皆素之手植唐元和中卿相多逰此院桐至夏有汗汚人衣如輠脂不可浣昭國鄭相嘗與丞郎數人避暑惡其汗謂素曰弟子為和尚伐此桐各植一松也及暮素戲祝樹曰我種汝二十餘年汝以汗為人所惡來嵗若復有汗我必薪之自是無汗矣素公不出院轉法華經三萬七千部夜常有狼子聽經齋時有烏鵲就案取食長慶初有僧𤣥幽題此院詩云三萬華經三十春半生不蹋院門塵當時以為佳句也出酉陽雜俎懐信揚州西靈塔中國之尤峻峙者唐武宗末拆寺之前一年有淮南詞客劉隱之薄㳺明州夢中如泛海見塔東渡海時見門僧懐信居塔三層凭䦨與隱之言曰暫送塔過東海旬日而還數日隱之歸揚州即訪懐信信曰記海上相見時否隱之了然省記數夕後天火焚塔俱盡白雨如瀉旁有草堂一無所損出獨異志佛陀薩有佛陀薩者其籍編於岐陽法門寺自言姓佛氏陀薩其名也常獨行岐隴間衣黄持錫年雖老然其貌𩔖童騃好揚言於衢中或詬辱羣僧僧皆怒焉其資膳裘紵俱乞於里人里人憐其愚厚與衣食以故資用獨饒於羣僧陀薩亦轉均於里中窮餓者焉里人益憐其心開成五年夏六月陀薩召里中民告曰我今夕死矣汝為吾塔瘞其尸果端坐而卒於是里中之人建塔於岐陽之西岡上漆其尸而瘞焉後月餘或視其首髪僅寸餘弟子即剃去已而又生里人大異遂扃其户竟不開焉出宣室志興元上座興元縣西墅有蘭若上座僧常飲酒食肉羣輩皆效焉一旦多作大餅招羣徒衆入尸陁林以餅裹腐尸肉而食數啖不已衆僧掩鼻而走上座曰汝等能食此肉方可食諸肉自此緇徒因成精進也出雲溪友議趙蕃唐國子祭酒趙蕃太和七年為南宫郎忽一日有僧乞食於門且謂其家僮曰吾願見趙公可乎家僮告蕃蕃即命延入與坐僧乃曰君將有憂然亦可禳去蕃即拜而祈之僧曰遺我裁刀一千五百庶可脫君之禍不然未旬日當為東南一郡耳蕃許之約來日就送焉且訪其名暨所居僧曰吾居青龍寺法安其名也言已遂去明日蕃即辦送之使者至寺以物色訪羣僧僧皆不𩔖且詢法安師所止周徧院宇無影響踪跡後數日蕃出為𡊮州刺史出宣室志懐濬秭歸郡草聖僧懐濬者不知何處人唐乾寧初到彼知來藏往皆有神驗愛草書或經或釋或老至於歌詩鄙瑣之言靡不集其筆端與之語即阿唯而已里人以神聖待之刺史于公以其惑衆繫而詰之乃以詩代通狀曰家在閩川西復西其中嵗嵗有鶯啼如今不在鶯啼處鶯在舊時啼處啼又詰之復有詩曰家住閩川東復東其中嵗嵗有花紅而今不在花紅處花在舊時紅處紅郡牧異而釋之詳其詩意似在海中得非盃渡之流乎行旅經過必維舟而禮謁告其吉凶唯書三五行終不明言事往果驗荆南大校周崇賔謁之書字遺之曰付皇都勘爾後入貢因王師南討遂縶於南府竟就戮也押衙孫道能謁之書字曰付竹林寺其年物故營葬乃古竹林寺之基也皇甫鉉知州乃畫一人荷挍一女子在旁後為娶民家女遭訟錮身入府波斯穆昭嗣幼好藥術隨其父謁之乃畫一道士乘雲把胡盧書云指揮使髙牒衙推穆生後以醫藥有效南平王髙從誨與巾裹攝府衙推王師伐荆州師寄南平王詩云馬頭漸入揚州路親眷應須洗眼看是嵗輸誠淮海獲解重圍其他不可殫記或一日題庭前芭蕉葉上云今日還債幸州縣無更勘窮來日為人所害尸首宛然刺史髙公為之荼毗之出北夢瑣言智者禪師唐越州山隂縣有智禪師院内有池恒贖生以放之有一鼉長三尺恒食其魚禪師患之取鼉送向禹王廟前池中至夜還來禪師咒之曰汝勿食我魚即從汝在此鼉於是出外放糞皆是青泥禪師每至池上喚鼉即出於師前伏地經數十年漸長七八尺禪師亡後鼉亦不復見出朝野僉載法本晉天福中考功員外趙洙言近日有僧自相州來云貧道於襄州禪院内與一僧名法本同過夏朝昏共處心地相洽法本常言曰貧道於相州西山中住持竹林寺寺前有石柱他日有暇請必相訪其僧追念此言因往彼尋訪洎至山下村中投一蘭若寄宿問其村僧曰此去竹林寺近逺僧乃遙指孤峰之側曰彼處是也古老相傳者聖賢所居之地今則但有名存焉故無院舍僧疑之詰朝而往既至竹林叢中果有石柱罔然不知其涯涘當法本臨别云但扣其柱即見其人其僧乃以小杖扣柱數聲乃風雨四起咫尺莫窺俄然耳目割開樓臺對峙身在三門之下逡巡法本自内出而見之甚喜問南中之舊事乃引其僧度重門升袐殿叅其尊宿尊宿問其故法本云早年相州同過夏期此相訪故及山門也尊宿曰可飯後請出在此無座位食畢法本送至山門相别既而天地昏暗不知所進頃之宛在竹叢中石柱之側餘並莫覩即知聖賢之在世隱顯難涯豈金粟如來獨能化見者乎出玉堂閒話太平廣記卷九十八
