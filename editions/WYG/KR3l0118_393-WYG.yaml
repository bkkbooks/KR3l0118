body:
  text: 太平廣記卷三百九十三宋李昉等編雷一李叔卿楊道和石勒虢州人封元則僧道宣蘓踐言狄仁傑偃師雷鬭漳泉界包超張須瀰蔡希閔徐景先歐陽忽雷宣州王幹華亭堰典李師道李鄘徐誗李叔卿漢河南李叔卿為郡功曹應孝亷同輩疾之宣言曰叔卿妻寡妹以故不得應孝㢘之目叔卿遂閉門不出妹悲憤乃詣府門自經叔􅀸亦自殺以明無私既而家人葬之後霹􅆮遂擊殺所疾者以置叔卿之墓所震之家收葬其尸葬畢又發其冢出列女𫝊楊道和晉扶風楊道和夏於田中值雷雨至桑樹下霹􅆮下擊之道和以鋤格折其肱遂落地不得去唇如丹目如鏡毛角長三尺餘状如六畜頭似獼猴出捜神記石勒後趙石勒時暴風大雨雷雹建徳殿端門襄國寺西門倒殺五人雹起西河介山大如雞子平地三尺洿下丈餘行人禽獸死者萬數歴千餘里樹木催折禾稼蕩然勒問徐光曰去年不禁寒食介推帝鄉之神也故有此災出五行記虢州人唐虢州人兄弟析居共分堂宇至顯慶元年夏夜雷震烈風可畏其兄甚懼欲於弟舎避之將去復止門前十數步先有長坑風雨拔住屋及老小十一口皆投坑死所拔之處盡坑也仍卷數千巨細家用物咸入於坑訖無遺者惟牆壁不動庭槐大可數圍枝條甚茂拔其根莖洪纎俱盡遂失所在終尋不得先是一年其妻見樹有羊但共怪之後遂遭此變而弟所居但拔露椽瓦有似人拆之餘無所損有子衛士在京番直刺史于立政奏之敕放子還仍賜物三十件時桓思緒為司功親檢其事出廣古今五行記封元則唐封元則渤海長河人顯慶中為光禄寺太官掌膳時于闐王来朝食料餘羊凡數十百口王並託元則送僧寺長生元則乃竊令屠家烹貨收直龍朔元年夏六月洛陽大雨雷震殺元則於宣仁門外街中折其項血流灑地觀者盈衢莫不驚愕出法苑珠林僧道宣唐劉禹錫云道宣持律第一忽一旦霹􅆮遶户外不絶宣曰我持律更無所犯若有宿業則不知之於是褫三衣於户外謂有蛟螭慿焉衣出而聲不已宣乃視其十指甲有一㸃如油麻者在右手小指上疑之乃出於隔子孔中一震而失半指黒㸃是蛟龍之藏處也禹錫曰在龍亦尤善求避地之所矣而終不免則一切分定豈可逃乎出嘉話録蘇踐言司禮寺蘓踐言左相温國公良嗣之長子居於嘉善里永昌年六月與其弟崇光府錄事參軍踐義退朝還第𢎞道觀東猝遇暴雨震雷電光来遶踐言等馬回旋甚急雷聲亦在其側有頃方散其年九月元肅與趙懐節謀逆踐言妻妾並􅀍縲絏數月各解職及良嗣薨並放流荒裔出五行記狄仁傑唐代州西十餘里有大槐震雷所擊中裂數丈雷公夹於樹間吼如霆震時狄仁傑為都督賓從徃觀欲至其所衆皆披靡無敢進者狄仁傑單騎勁進迫而問之乃云樹有乖龍所由令我逐之落勢不堪為𣗳所夾若相救者當厚報徳仁傑命鋸匠破樹方得出其後吉凶必先報命偃師唐元和元年六月偃師縣栢李村震電於民家地裂濶丈餘長十五里測無底所裂之處井厠相通所衝之墓棺出地亦不知所由也雷鬭唐開元末雷州有雷公與鯨鬭鯨身出水上雷公數十在空中上下或縱火或詬擊七日方罷海邊居人往㸔不知二者何勝但見海水正赤出廣異記漳泉界唐開元中漳泉二州分疆界不均互訟於臺者制使不能㫁迨數年辭理分亂終莫之決於是州官焚香告於天地山川以祈神應俄而雷雨大至霹􅆮一聲崖壁中裂所競之地拓為一逕髙千尺深僅五里因為官道壁中有古篆六行二十四字皆廣數尺雖約此為界人莫能識貞元初流人李協辯之曰漳泉兩州分地太平永安龍溪山髙氣清千年不惑萬古作程所云永安龍溪者兩郡界首鄉名也出錄異記包超唐安豐尉裴翾士淹孫也云𤣥宗嘗冬月詔山人包超令致雷聲對曰来日午當有雷遂令髙力士監之一夕醮式行法及明至已曾無纎翳力士懼之超曰將軍視南山當有黑氣如盤矣力士望之如其言有頃風起黑氣瀰漫疾雷數聲上令隨哥舒翰西征毎陣嘗得勝風出酉陽雜俎張須瀰唐上元中滁州全椒人倉督張須瀰縣遣送牲詣州山路險阻淮南多有義堂及井用庇行人日暮暴雨須瀰與沙門子隣同入義堂須瀰驅䭾又王老於雨中收驢頃之聞雲中有聲墮地忽見村女九人共扶一車王有女阿推死已半嵗亦在車所見王悲喜問母妹家事靡所不至其徒促之乃去初扶車漸上有雲擁蔽因作雷聲方知是雷車出廣異記蔡希閔唐蔡希閔家在東都暑夜兄弟數十人㑹於㕔忽大雨雷電晦暝墮一物於庭作䬃䬃聲命火視之乃婦人也衣黄紬裙布衫言語不通遂目為天女使五六年能漢語問其鄉國不之知但云本鄉食粳米無碗器用栁箱貯飯而食之竟不知是何國人初在本國夜出為雷取上俄墮希閔庭中出廣異記徐景先唐徐景先有弟阿四頑嚚縱佚毎誨辱之而母加愛念曲為申解因厲聲應答雲雷奄至曳景先於雲中有主者左右數十人訶詰景先答曰縁弟不調供養有缺所以詬辱母命釋之非當詈母主者不識其言尋一青衣自肩躍下為景先對曰若爾放去至家可答一辯釘東壁上吾自令取之遂排景先墮舎前池中出水了無所損求紙答辯釘東壁果風至而辯亡出廣異記歐陽忽雷唐歐陽忽雷者本名紹桂陽人勁徤勇於戰鬭嘗為郡將有名任雷州長史館於州城西偏前臨大池嘗出雲氣居者多死紹至處之不疑令人以度測水深淺别穿臣壑深廣𩔖是既成引决水於是雲興天地晦冥雷電大至火光屬地紹率其徒二十餘人持弓矢排鏘與雷師戰衣並焦卷形體傷腐亦不知止自辰至酉雷電飛散池亦涸竭中獲一虵状如􅁞長四五尺無頭目斫刺不傷蠕蠕然具大鑊油煎亦不死洋鐵汁方焦灼仍杵為粉而服之至盡南人因呼紹為忽雷出廣異記宣州唐貞元年宣州忽大雷雨一物墮地猪首手足各兩指執一赤虵囓之俄頃雷暗而失時皆圖而𫝊之出酉陽雜俎王幹唐貞元初鄭州王幹有膽勇夏中作田忽暴雷雨因入􅁞室中避之有頃雷電入室中黒氣陡暗幹遂掩户荷鋤亂擊雷聲漸小雲氣亦歛幹大呼擊之不已氣復如半牀已至如盤忽然墮地變為熨斗折刀小折足鐺焉出酉陽雜俎華亭堰典唐貞元中華亭縣界村堰典妻與人私又於鄰家盗一手巾鄰知覺至典家尋覓典與妻共諱詬罵此人寃憤乃報曰汝妻與他人私又盗物仍共諱罵神道豈容汝乎典曰我妻的不姦私盗物如汝所説遣我一家為天霹既各散已至夜大風雨雷震怒擊破典屋典及妻男女五六人並死至明雨猶未歇鄰人但見此家屋倒火燒不已衆共火中搜出覓得典及妻皆燒如燃燭状為禮拜求乞不更燒之火方自息典脇上題字云癡人保妻真將家口質妻脇上書行姦仍盗告縣檢視逺近咸知吴越聞震死者非少有牛及鱓魚樹木等為雷擊死者皆聞於縣辯識或曰人則有過天殺可也牛及樹木魚等豈有罪惡而殺之􅁘又有弑君弑父殺害非理者天何不誅請為略説洞庭子曰昔夏帝武乙射天而震死晉臣王導寝柏而移災斯則列於史籍矣至於牛魚以穿踏田地水傷害禾苗也或曰水所損亦㣲何罰之大對曰五穀者萬人命也國之寳重天故誅之以誡於人樹木之𩔖龍蔵於中神既取龍遂損樹木耳天道懸遠垂教及人委曲有情不可一槩余曽見漳泉故事漳泉接境縣南龍溪界域不分古来争競不決忽一年大雷雨霹一山石壁裂壁口刻字漳泉兩州分地太平南安龍溪山髙氣清千年不惑萬古作程其文今猶可識天之教令其可惑哉且論語云迅雷風烈必變又禮記曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐又曰洊雷震君子以恐懼修省夫聖人奉天教豈妄説哉今所以為之言者序述耳因為不爾豈足悲哉夫然弑君弑父殺害無辜人間法自有刑戮豈可以區區之意而責恢恢之網者歟出原化記李師道唐元和中李師道據青齊蓄兵勇銳地廣千里儲積數百萬不貢不覲憲宗命將討之王師不利而師道益驕乃建新宫擬天子正衙卜日而居是夕雲物遽晦風雷如撼遂為震擊傾圮俄復繼以天火了無遺者青齊人相顧語曰為人臣而逆其君者禍固宜矣今謫見於天安可逃其戾乎旬餘師道果誅死出宣室志李鄘唐李鄘在北都介休縣民送解牒夜止晋祠宇下夜半聞人叩門云介休王暫借霹􅆮車某日至介休收麥良久有人應曰大王𫝊語霹􅆮車正忙不及借其人再三借之遂見五六人秉燭自廟後出介山使者亦自門騎而入數人共持一物如幢扛上環綴旂旛授與騎者曰可㸃領騎即數其旛凡十八葉毎葉有光如電起民遂徧報鄰村令速收麥將有大風雨悉不之信乃自收刈至日民率親戚據髙阜候天色及午介山上有雲氣如窰煙須臾蔽天注雨如綆風吼雷震凡損麥千餘頃數村以民為妖訟之工部員外郎張周封親覩其推案出酉陽雜俎徐誗唐潤州延陵縣茅山界元和春大風雨墮一􅄦身二丈餘黑色面如猪首角五六尺肉翅丈餘豹尾又有半服絳裩豹皮纒腰手足兩爪皆金色執赤虵足踏之瞪目欲食其聲如雷田人徐誗忽見驚走聞縣尋縣令親往覩焉因令圖寫尋復雷雨翼之而去出録異記太平廣記卷三百九十三
