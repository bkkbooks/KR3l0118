body:
  text: 太平廣記卷二百十九醫二周廣白岑張萬福王彦伯李祐婦元頏梁革梁新趙鄂高駢田令孜于遘顔燧周廣開元中有名醫紀明者呉人也嘗授祕訣於隱士周廣觀人顔色談笑便知疾深淺言之精詳不待診候上聞其名徴至京師令於掖庭中召有疾者俾周驗焉有宫人每日昃則笑歌啼號若中狂疾而又足不能及地周視之曰此必因食且飽而大促力頃復仆於地而然也周乃飲以雲母湯既已令熟寐寐覺乃失所苦問之乃言嘗因大華公主載誕三日宫中大陳歌吹某乃主謳者懼其聲不能清且長食㹠蹄美遂飽而當筵歌數曲曲罷覺胸中甚熱戲於砌臺乘高而下未及其半復為後来者所激因仆於地乆而方蘇而病狂因兹足不能及地也上大異之有黄門奉使自交廣而至拜舞於殿下周顧謂曰此人腹中有蛟龍明日當産一子則不可活也上驚問黄門曰卿有疾否乃曰臣馳馬大庾嶺時當大熱既困且渴因於路傍飲野水遂腹中堅痞如石周即以消石雄黄煮而飲之立吐一物不數寸其大如指細視之鱗甲備具投之以水俄頃長數尺周遽以苦酒沃之復如故形以器覆之明日器中已生一龍矣上深加禮焉欲授以官爵周固請還呉中上不違其意遂令還鄉水部員外劉復為周作𫝊叙述甚詳出明皇雜録白岑白岑曾遇異人𫝊發背方其驗十全岑賣弄以求利後為淮南小將節度髙適脇取之其方遂不甚效岑至九江為虎所食驛吏於囊中乃得真本太原王昇之寫以𫝊布出國史補張萬福柳芳為郎中子登疾重時名醫張萬福初除泗州與芳故舊芳賀之具言子病惟恃故人一顧也張詰旦候芳芳遽引視登遙見登頂曰有此頂骨何憂也因診脈五六息復曰不錯夀且踰八十乃留芳數十字謂登曰不服此亦得後登為庻子年至九十出酉陽雜俎王彦伯荆人道士王彦伯天性善醫尤别脈斷人生死夀夭百不差一裴胄尚書有子忽暴中病衆醫拱手或説彦伯遽迎使視之候脈良乆曰都無疾乃煮散數味入口而愈裴問其狀彦伯曰中無鰓鯉魚毒也其子實因鱠得病裴初不信乃鱠鯉魚無鰓者令左右食之其疾悉同始大驚異焉出酉陽雜俎又彦伯自言醫道將行列三四竈煮藥於庭老幼塞門而請彦伯指曰熱者飲此寒者飲此風者飲此氣者飲此各負錢帛来酬無不效者岀國史補李祐婦李祐為淮西將元和十三年送欵歸國裴度破呉元濟入其城官軍有剝婦人衣至裸體者祐有新婦姜氏懐孕五月矣為亂卒所刼以刀劃其腹姜氏氣絕踣地祐歸見之腹開尺餘因脱衣襦裹之一夕復蘇傅以神藥而平滿十月産一子朝廷以祐歸國功授一子官子曰行修年三十餘為南海節度罷歸卒於道出獨異志元頏唐時京城有醫人忘其姓名元頏中表間有一婦人從夫南中曾誤食一蟲常疑之由是成疾頻療不損請看之醫者知其所患乃請主人姨妳中謹密者一人預戒之曰今以藥吐㵼但以盤盂盛之當吐之時但言有一小蝦蟇走去然切不得令病者知是誑紿也其妳僕遵之此疾永除又有一少年眼中常見一小鏡子俾醫工趙卿診之與少年期来晨以魚鱠奉候少年及期赴之延於内且令從容候客退後方接俄而設臺子止施一甌芥醋更無他味卿亦未出迨禺中乆候不至少年飢甚且聞醋香不免輕啜之逡巡又啜之覺胸中豁然眼花不見因竭甌啜之趙卿知之方出少年以啜醋慙謝卿曰郎君先因喫鱠太多醬醋不快又有魚鱗在胸中所以眼花適来所備醬醋只欲郎君因飢以啜之果愈此疾烹鮮之㑹乃權詐也請退謀朝餐他妙多斯𩔖也出北夢瑣言梁革金吾騎曹梁革得和扁之術太和初為宛陵巡官按察使于敖有青衣曰蓮子念之甚厚一旦以笑語獲罪斥出貨焉市吏定直曰七百緡從亊御史崔某者聞而召焉請革評其脈革診其臂曰二十春無疾之人也崔喜留之送其直於敖敖以常深念也一怒而逐之售於不識者斯已矣聞崔寵之不悦形於顔色然已去之難復召矣常貯於懐未一年蓮子暴死革方有外郵之事廻見城門逢柩車崔人有執紼者問其所葬曰蓮子也呼載歸而奔告崔曰蓮子非死葢尸蹶耳向者革入郭遇其柩載歸而往請蘇之崔怒革之初言悲蓮子之遽夭勃然曰匹夫也妄惑諸侯遂齒簮裾之列汝謂二十春無疾者一年而死今既葬矣召其柩而歸脱不能生何以相見革曰此固非死葢尸蹶耳茍不能生之是革術不仁於天下何如就死以謝過言乃令破棺出之遂刺其心及臍下各數處鑿去一齒以藥一刀圭於口中衣以單衣臥空牀上以練素縛其手足有㣲火於牀下曰此火衰蓮子生矣且戒其徒煮葱粥伺焉其氣通若狂者愼勿令起逡巡自定定而困困即解其縛以葱粥灌之遂活矣正狂令起非吾之所知也言竟復入府謂崔曰蓮子即生矣崔大釋其怒留坐㕔事俄而蓮子起坐言笑界吏報敖敖飛牘於崔蓮子復生乃何術也仍與革偕歸入門則蓮子来迎矣敖大竒之且夫蓮子事崔也非素意因勸以與革崔亦惡其無齒又重敖遂與革革得之以神藥𫝊齒未踰月而齒生如故太和壬子歳調金吾騎曹與蓮子偕在輦下其年秋髙損之以其元舅為天官即日與相聞故熟其事而言之出續異録梁新趙鄂唐崔鉉鎮渚宫有富商船居中夜暴亡待曉氣猶未絕鄰房有武陵醫工梁新聞之乃與診視曰此乃食毒也三兩日非外食耶僕夫曰主翁少出舫亦不食於他人梁新曰尋常嗜食何物僕夫曰好食竹雞每年不下數百隻近買竹雞併將充饌梁新曰竹雞喫半夏必是半夏毒也命擣薑捩汁析齒灌之由是而蘇崔聞而異之召至安慰稱奬資以僕馬錢帛入京致書於朝士聲名大振仕至尚醫奉御有一朝士詣之梁曰何不早見示風疾已深矣請速歸處置家事委順而已朝士聞而惶遽告退策馬而歸時有鄜州馬醫趙鄂者新到京都於通衢自牓姓名云攻醫術此朝士下馬告之趙鄂亦言疾危與梁生之説同謂曰只有一法請官人剩喫消梨不限多少咀齕不及捩汁而飲或希萬一此朝士又䇿馬而歸以書筒質消棃馬上旋齕行到家旬日唯喫消棃頓覺爽朗其恙不作却訪趙生感謝又訪梁奉御且言得趙生所教梁公驚異且曰大國必有一人相繼者遂召趙生資以僕馬錢帛廣為延譽官至太僕卿出北夢瑣言又省郎張廷之有疾詣趙鄂纔診脈説其疾宜服生薑酒一盞地黄酒一杯仍謁梁新所説並同皆言過此即卒自飲此酒後所疾尋平他日為時相堅虐一杯訴之不及其夕乃卒時論謂之二妙出聞竒録髙駢江淮州郡火令最嚴犯者無赦葢多竹屋或不慎之動則千百間立成煨燼髙駢鎮維揚之歳有術士之家延火燒數千户主者録之即付於法臨刃謂監刑者曰某之愆尤一死何以塞責然某有薄技可以𫝊授一人俾其救濟後人死無所恨矣時駢延待方術之士恒如飢渴監刑者即緩之馳白於駢駢召入親問之曰某無他術唯善醫大風駢曰可以覈之對曰但於福田院選一最劇者可以試之遂如言乃置患者於隙室中飲以乳香酒數升則懵然無知以利刃開其腦縫挑出蟲可盈掬長僅二寸然後以藥封其瘡别與藥服之而更節其飲食動息之候旬餘瘡盡愈纔一月眉鬚已生肌肉光淨如不患者駢禮術士為上客出玉堂閒話田令孜長安完盛日有一家於西市賣飲子用尋常之藥不過數味亦不閑方脈無問是何疾苦百文售一服千種之疾入口而愈常於寛宅中置大鍋鑊日夜剉斫煎煮給之不暇人無逺近皆来取之門市駢羅喧闐京國至有齎金守門五七日間未獲給付者獲利甚極時田令孜有疾海内醫工召遍至於國師待詔了無其徴忽見親知白田曰西市飲子何妨試之令孜曰可遂遣僕人馳乘往取之僕人得藥鞭馬而廻將及近坊馬蹶而覆之僕既懼其嚴難不復取去遂詣一染坊丐得池脚一缾子以給其主既服之其病立愈田亦只知病愈不知藥之所来遂償藥家甚厚飲子之家聲價轉髙此葢福醫也近年鄴都有張福醫者亦然積貨甚廣以此有名為蕃王挈歸塞外矣出玉堂閒話于遘近朝中書舍人于遘嘗中蠱毒醫治無門遂長告漸欲逺適尋醫一日策杖坐于中門之外忽有釘鉸匠見之問曰何苦而羸薾如是于即為陳之匠曰某亦曾中此遇良工為某鈐出一蛇而愈某亦傳得其術遘欣然且祈之彼曰此細事耳来早請勿食某當至矣翊日果至請遘於舍簷下向明張口執鈐俟之及欲夾之差跌而失則又約以来日經宿復至定意伺之一夾而中其蛇已及二寸許赤色麤如􅁫股矣遽命火焚之遘遂愈復累除官至紫㣲而卒其匠亦不受贈遺但云某有誓救人唯引數觴而别玉堂閒話顔燧京城及諸州郡闤闠中有醫人能出蠱毒者目前之驗甚多人皆惑之以為一時幻術膏肓之患即不可去郎中顔燧者家有一女使抱此疾常覺心肝有物唼食痛苦不可忍累年後痩瘁皮骨相連脛如枯木偶聞有善醫者於市中聚衆甚多看療此病顔試召之醫生見曰此是蛇蠱也立可出之於是先令熾炭一二十斤然後以藥餌之良乆醫工秉小鈐子於傍于時覺咽喉間有物動者死而復蘇少頃令開口鈐出一蛇子長五七寸急投於熾炭中燔之燔蛇屈曲移時而成燼其臭氣徹於親鄰自是疾平永無齧心之苦耳則知活變起虢肉徐甲之骨信不虛矣出玉堂閒話太平廣記卷二百十九
