body:
  text: 太平廣記卷二百八十八祅妄一蔡誕須曼卿馬太守鄴城人紇干狐尾李恒恵範史崇𤣥嶺南滛祀賀元景瀛州婦人薛懐義胡僧寳嚴胡超僧調猫兒鸚鵡駱賔王馮七姨姜撫先生蔡誕蔡誕好道廢家業晝夜誦黄庭太清中經觀即解之屬謂道盡於此矣其家患之巳亦慙悔忽棄家言我仙道成矣因走入深山賣薪以易衣三年不堪苦而還家黒瘦骨立欺家云吾但為地仙位卑為老君牧數十龍有一斑龍五色老君嘗與吾後與仙人博戲輸此龍為此見謫送吾付崑崙下芸鋤芝草三四頃皆生細石中多莽穢甚苦當十年乃得原㑹偓佺子喬來案行吾首訴之並為吾作力得免也出抱朴子須曼卿蒲坂有須曼卿者曰在山中三年精思有仙人來迎我乗龍昇天龍行甚疾頭昻尾低令人在上危怖及到天上先過紫府金牀玉几晃晃昱昱真貴處也仙人以流霞一杯飲我輒不饑渴忽然思家天帝前謁拜失儀見斥來還令更自修責乃可更徃昔淮南王劉安昇天見上帝而箕坐大言自稱寡人遂見謫守天厠三年吾何人哉河東因號曼卿為斥仙人出抱朴子馬太守興古太守馬氏在官有親故人投之求恤焉馬乃令此人出住外詐云是神人道士治病無不手下立愈又令辯士遊行為之虚聲云能令盲者明躄者即行于是四方雲集赴之如市而錢帛固已山積矣又敕諸來治病者雖不便愈其當告人已愈也如此則必愈矣若告人言未愈者則後終不愈也道法正爾不可不承信於是後人問前來者輒告之云已愈無敢言未愈者也旬月之間乃致巨富焉出抱朴子鄴城人北齊後主武平中和士開諷百官奏胡太后臨朝所在皆言有狐魅截人頭髪鄴城北兩三坊無人居住空墻時有某家婢子年十六七獨行荷一大黄襆襆内有錦被忽逄一嫗年可五十餘而作白粧漫糊可畏以皂巾抹頭四顧無人便走逐婢子脱却皂巾頭髪盡作屈髻十餘道綖束之手持一剃刀云我是狐魅汝急捨襆反走此嫗得襆趨走入東坊婢子行啼逄同州人乗馬來借問何為云狐奪我被襆始入東坊人馳馬徃執得之葢是人也數百人㸔之莫不競笑天下有如此造祅事經略財貨毆擊垂死行路勸放之出廣古今五行記紇干狐尾并州有人姓紇干好劇承間在外有狐魅遂得一狐尾綴着衣後至妻旁側坐露之其妻私心疑是狐魅遂宻持斧欲斫之其人叩頭云我不是魅妻不信走遂至鄰家鄰家又以刀杖逐之其人惶懼告言我戲劇不意専欲殺我此亦祅由人興矣出廣古今五行記李恒陳留男子李恒家事巫祝邑中之人徃徃吉凶為驗陳留縣尉陳増妻張氏召李恒恒索於大盆中置水以白紙一張沉於水中使増妻視之増妻正見紙上有一婦人被鬼把頭髻拽又一鬼後把棒驅之増妻惶懼涕泗取錢十千并沿身衣服與恒令作法禳之増至其妻具其事告増増明召恒還以大盆盛水沉一張紙使恒觀之正見紙上有十鬼拽頭把棒驅之題名云此李恒也恒慚走遂却還昨得錢十千及衣服物便潛竄出境衆異而問増曰但以白礬畫紙上沉水中與水同色而白礬乾驗之亦然出辨疑志恵範周有婆羅門僧恵範姦矯狐魅挾邪作蠱趦趄䑕􅃛左道弄權則天以為聖僧賞賚甚重太平以為梵王接納彌優生其羽翼長其光價孝和臨朝常乗官馬徃還宫掖太上登極從以給使出入禁門毎入即賜綾羅金銀噐物氣岸甚髙風神傲誕内府珍寳積在僧家矯説祅祥妄陳禍福神武斬之京師稱快也出朝野僉載史崇𤣥唐道士史崇𤣥懐河内縣縫靴人也後度為道士矯假人也附太平為太清觀主金仙玉真出俗立為尊師毎入内奏請賞賜甚厚無物不賜授鴻臚卿衣紫羅裙帔幄象笏佩魚符出入禁闈公私避路神武斬之京師中士女相賀出朝野僉載嶺南滛祀嶺南風俗家有人病先殺雞鵞等以祀之將為修福若不差即刺殺猪狗以祈之不差即次殺太牢以禱之更不差即是命也不復更祈死則打鼓鳴鐘於堂北至葬訖初死但走大呌而哭出朝野僉載賀𤣥景唐景雲中有長髪賀𤣥景自稱五戒賢者同為祅者十餘人陸渾山中結草舎幻惑愚人子女傾家産事之紿云至心求者必得成佛𤣥景為金薄袈裟獨坐暗室令愚者竊視云佛放光衆皆懾伏縁於懸崖下燒火遣數人於半崖間披紅碧紗為仙衣隨風習颺令衆觀之誑曰此仙也各令着仙衣以飛就之即得成道尅日設齋飲中置莨菪子與衆餐之女子好髪者截取為剃頭串仙衣臨崖下視眼花恍惚推崖底一時燒殺沒取資財事敗官司來檢灰中得焦拳屍柩數百餘人敕決殺𤣥景縣官左降出朝野僉載瀛州婦人唐景龍中瀛州進一婦人身上隐起浮圖塔廟諸佛形像按察使進之授五品其女婦留内道塲逆韋死後不知去處出朝野僉載薛懐義周證聖元年薛師名懐義造功徳堂一千尺於明堂北其中大像髙九百尺鼻如千斛船小指中容數十人並坐夾紵以漆之正月十五起無遮大㑹於朝堂掘地五丈深以亂彩為宫殿臺閣屈竹為胎張施為楨葢又為大像金剛並坑中引上詐稱從地涌出又刺牛血畫作大像頭頭髙二百尺誑言薛師膝上血作之觀者填城溢郭士女雲㑹内載錢抛之更相蹈藉老少死者非一至十六日張像於天津橋南設齋二更功徳堂火起延及明堂飛燄衝天洛城光如晝日其堂作仍未半已髙七十餘尺又延燒金銀庫鐵汁流液平地尺餘人不知錯入者便即焦爛其堂煨燼尺木無遺至曉乃更設㑹暴風歘起裂血像為數百叚浮休子曰梁武帝捨身同泰寺百官傾庫物以贖之其夜歘電霹􅋬風雨暝晦寺浮圖佛殿一時盪盡非理之事豈如來本意哉出朝野僉載胡僧寳嚴唐景雲中西京霖雨六十餘日有一胡僧名寳嚴自云有術法能止雨設壇塲讀經呪其時禁屠宰寳嚴用羊二十口馬兩疋以祭祈請經五十餘日其雨更盛於是斬逐胡僧雨遂止出朝野僉載胡超僧周聖厯年中洪州有胡超僧出家學道隐白鶴山微有法術自云數百歳則天使合長生藥所費巨萬三年乃成自進藥於三陽宫則天服之以為神妙望與彭祖同夀改元為久視元年放超還山賞賜甚厚服藥之後二年而則天崩出朝野僉載調猫兒鸚鵡則天時調猫兒鸚鵡同噐食命御史彭先覺監遍示百官及天下考使𫝊㸔未遍猫兒飢遂齩殺鸚鵡以餐之則天甚愧武者姓殆不祥之徵也出朝野僉載駱賔王唐裴炎為中書令時徐敬業欲反令駱賔王畫計取裴炎同起事賔王足踏壁静思食頃乃為謡曰一片火兩片火緋衣小兒當殿坐教炎莊上小兒誦之并都下童子皆唱炎乃訪學者令解之召賔王至數啖以寳物錦綺皆不言又賂以音樂妓女駿馬亦不語乃将古忠臣烈士圖共觀之見司馬宣王賔王歘然起曰此英雄丈夫也即説自古大臣執政多移社稷炎大喜賔王曰但不知謡䜟何如耳炎以謠言片片火非衣之事白賔王即下北面而拜曰此真人矣遂與敬業等合謀揚州兵起炎從内應書與敬業等書唯有青鵞字人有告者朝臣莫之能解則天曰此青字者十二月鵞字者我自與也遂誅炎敬業等尋敗出朝野僉載馮七姨唐逆韋之妹馮太和之妻號七姨信邪見豹頭枕以辟邪白澤枕以去魅作伏熊枕以為宜男太和死嗣虢王娶之韋之敗也虢王砟七姨頭送朝堂即知辟邪之枕無效矣出朝野僉載姜撫先生唐姜撫先生不知何許人也嘗著道士衣冠自云年已數百歳持符兼有長年之藥度世之術時人謂之姜撫先生元宗皇帝高拱穆清棲神物表常有昇仙之言姜撫供奉别氶恩澤於諸州採藥及修功徳州縣牧宰趨望風塵學道者乞容立於門庭不能得也有荆巖者於太學四十年不第退居嵩少自稱山人頗通南北史知近代人物嘗謁撫撫簡踞不為之動荆巖因過而問曰先生年㡬何撫曰公非信士何暇問年㡬巖曰先生既不能言甲子先生何朝人也撫曰梁朝人也巖曰梁朝絶近先生亦非長年之人不審先生梁朝出仕為復隐居撫曰吾為西梁州節度巖叱之曰何得誑妄上欺天子下惑世人梁朝在江南何處得西梁州只有四平四安四鎮四征将軍何處得節度使撫慙恨數日而卒出辨疑志太平廣記卷二百八十八
