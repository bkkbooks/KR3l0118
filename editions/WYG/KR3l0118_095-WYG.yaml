body:
  text: 太平廣記卷九十五異僧九洪昉禪師相衞間僧道林淨滿法通洪昉禪師陜州洪昉本京兆人幼而出家遂證道果志在禪寂而亦以講經為事門人常數百一日昉夜初獨坐有四人來前曰鬼王今為小女疾止造齋請師臨赴昉曰吾人汝鬼何以能至四人曰闍梨但行弟子能致之昉從之四人乘馬人持繩牀一足遂北行可數百里至一山山腹有小朱門四人請昉閉目未食頃人曰開之已到王庭矣其宮闕室屋崇峻非常侍衞嚴飾頗侔人主鬼王具冠衣降階迎禮王曰小女乆疾今幸而痊欲造小福修一齋是以請師臨顧齋畢自令侍送無慮於是請入宫中其齋場嚴飾華麗僧且萬人佛像至多一如人間事昉仰視空中不見白日如人間重隂狀須臾王夫人後宮數百人皆出禮謁王女年十四五貌獨病色昉為賛禮願畢見諸人持千餘牙盤食到以次布於僧前坐昉於大牀别置名饌饌甚香潔昉且欲食之鬼王白曰師若常住此當飡鬼食不敢留師請不食昉懼而止齋畢餘食猶數百盤昉見侍衞臣吏向千人皆有欲食之色昉請王賜之餘食王曰促持去賜之諸官拜謝相顧喜笑口開達於兩耳王因跪曰師旣惠顧無他供養有絹五百疋奉師請為受八關齋戒師曰鬼絹紙也吾不用之王曰自有人絹奉師因為受入闗齋戒戒畢王又令前四人者依前送之昉忽開目已到所居天猶未曙門人但為入禪不覺所適昉忽開目命火照牀前五百絹在焉弟子問之乃言其故昉既禪行素髙聲價日盛頃到鬼所但神往耳其形不動未幾晨坐有一天人其質殊麗拜謁請曰南天王提頭賴吒請師至天供養昉許之因敷天衣坐昉二人執衣舉而騰空斯須已到南天王領侍從曲躬禮拜曰師道行髙逺諸天願覩師講誦是以輒請師因置髙座坐昉其道場崇麗殆非人間過百千倍天人皆長大身有光明其殿堂樹木皆是七寶盡有光彩奪人目睛昉初到天形質猶人也見天王之後身自長大與天人等設諸珍饌皆自然味甘美非常食畢王因請入宮更設供具談話欵至其侍衞天官兼鬼神甚衆後忽言曰弟子欲至三十三天議事請師且少留又戒左右曰師欲游觀所在聽之但莫使到後園再三言而去去後昉念曰後園有何利而不欲吾到之伺無人之際竊至後園其園甚大泉流池沼樹林花藥處處皆有非人間所見漸漸深入遙聞大聲呌呼不可忍聽遂到其旁見大銅柱徑數百尺髙千丈柱有穿孔左右傍達或有鋃鐺鏁其項或穿其胸骨者至有數萬頭皆夜叉也鋸牙鈎爪身倍於天人見禪師至叩頭言曰我以食人故為天王所鏁今乞免我我若得脫但人間求他食必不敢食人為害為飢渴所逼發此言時口中火出問其鏁早晚或云毗婆師尸佛出世時動則數千萬年亦有三五輩老者志誠懇僧許解其縛而遽還斯須王至先問師頗遊後園乎左右曰否王乃喜坐定昉曰適到後園見鏁衆生數萬彼何過乎王曰師果遊後園然小慈是大慈之賊師不須問昉又固問王曰此諸惡鬼常害於人唯食人肉非諸天防䕶世人已為此鬼食盡此皆大惡鬼不可以禮待故鏁之昉曰適見三五輩老者發言頗誠言但於人間求他食請免之若此曺不食人餘者亦不可舍也王曰此鬼言不可信昉固請王目左右命解老者三五人來俄而解至叩頭言曰䝉恩釋放年已老矣今得去必不敢擾人王曰以禪師故放汝到人間若更食人此度重來當令若死皆曰不敢於是釋去未乆忽見王庭前有神至自稱山嶽川瀆之神被甲面金色奔波而言曰不知何處忽有四五夜叉到人間殺人食甚衆不可制故白之王謂昉曰弟子言何如適語師小慈是大慈之賊此等惡鬼言寧可保王語諸神曰促擒之俄而諸神執夜叉到王怒何違所請命斬其手足以鐵鏁貫腦曳去而鏁之昉乃請還又令前二人送至寺寺已失昉二七日而在天猶如少頃昉於陜城中選空曠地造龍光寺又建病坊常養病者數百人寺極崇麗逺近道俗歸者如雲則為釋提桓因所請矣昉晨方潄有夜叉至其前左肩頭負五色毯而言曰釋迦天王請師講大􅄺槃經昉黙然還座夜叉遂挈繩牀置於左膊曰請師合目因舉其左手而伸其右足曰請師開目視之已到善法堂禪師既到天堂天光眩目開不能得天帝曰師念彌勒佛昉遽念之於是目開不眩而人身卑小仰視天形不見其際天帝又曰禪師又念彌勒佛身形當大如言念之三念而身三長遂與天等天帝與諸天禮敬言曰弟子聞師善講大􅄺槃經為日乆矣今諸天欽仰敬設道場固請大師講經聽受昉曰此事誠不為勞然病坊之中病者數百待昉為命常行乞以給之今若流連講經人間動涉年月恐病人餒死今也固辭天帝曰道場已成斯願已乆固請大師勿為辭也昉不可忽空中有大天人身又數倍於釋天帝敬起迎之大天人言曰大梵天王有敕天帝憮然曰本欲留師講經今梵天有敕不許然師已至豈不能暫開經卷少講經㫖令天人信受昉許之於是置食食器皆七寶飲食香美精妙倍常禪師食已身諸毛孔皆出異光毛孔之中盡能觀見諸物方悟天身騰妙也既登髙座敷以天衣昉遂登座其善法堂中諸天數百千萬兼四天王各領徒衆同㑹聽法階下左右則有龍王夜叉諸鬼神非人等皆合掌而聽昉因開􅄺槃經首講一紙餘言辭典暢備宣宗旨天帝大稱贊功徳開經畢又令前夜叉送至本寺弟子失昉已二十七日矣按佛經善法堂在歡喜園天帝都㑹天王之正殿也其堂七寶所作四壁皆白銀階下泉池交注流渠暎帶其果木皆與樹行相直寶樹花果亦皆竒異所有物𩔖皆非世人所識昉略言其梗槩階下寶樹行必相直每相表裏必有一泉夤緣枝間自葉流下水如乳色味佳於乳下注樹根灑入渠中諸天人飲樹本中泉其溜下者衆鳥同飲以黄金為地地生軟草其軟如綿天人足履之沒至足舉後其地自平其鳥數百千色名無定相入七寶林即同其樹色其天中物皆自然化生若念食時七寳器盛食即至若念衣時寳衣赤至無日月光一天人身光踰於日月須至逺處飛空而行如念即到昉既覩其異備言其見乃請畫圖為屏風凡二十四扇觀者驚駭昉初到寺毛孔之中盡能見物既而弟子進食食訖毛孔皆閉如初乃知人食天食精粗之分如此昉既盡出天中之相人以為妖時則天在位為人告之則天命取其屏兼徴昉昉既至則天問之而不罪也留昉宫中則天手自造食大申供養留數月則天謂昉曰禪師遂無一言敎弟子乎昉不得已言曰貧道唯願陛下無多殺戮大損果報其言唯此則天信受之因賜墨敕昉所行之處修造功徳皆無得遏止昉年過下壽如入禪定遂卒於陜中焉出紀聞相衞間僧相衞間有僧自少博習經論善講說每有講筵自謂超絶然而聽者稀少財利寡薄如此積年其僧不憤遂將經論徧厯名山以訪知者後至衡嶽寺憇泊月餘常於寺閒齋獨坐尋繹經論又自咎曰所曉義理無乃乖於聖意乎沈思之次忽舉頭見一老僧杖錫而入曰師習讀何經論窮究何義理僧疑是異人乃述其由兼自咎曰儻遇知者分别此事即鉗口結舌不復開演耳老僧笑曰師識至廣豈不知此義大聖猶不能度無緣之人況其初心乎師只是與衆僧無緣耳僧曰若然者豈終世如此乎老僧曰吾試為爾結縁因問師今有幾許貲糧僧曰自徂南縣厯行萬里糧食所費皆已竭矣今惟大衣七條而已老僧曰只此可矣可賣之以所得直皆作麋餅油食之物僧如言作之約數千人食遂相與攜至平野之中散掇焚香長跪咒曰今日食我施者願當來之世與我為弟子我當敎之得至菩提言訖鳥雀亂下啄食地上螻蟻復不知數老僧謂曰爾後二十年方可歸開法席今且周遊未用講說也言訖而去僧如言後二十年却歸河北開講聽徒動千萬人皆年二十已下老壯者十無一二出原化記道林唐調露年中桂州人薛甲常供一僧法號道林道徳甚髙瞻敬尤切如是供給十有餘年忽一旦辭去云貧道在此撓瀆多年更無所酬今有舊經一函且寄宅中一周年不囘即可開展經嵗餘開鏁見有金數千兩後賣一半買地造菩提寺并建道林眞身供養至今像儀見存薛甲今見有孫禹賔在桂林効職出桂林風土記浄滿則天朝恒州鹿泉寺僧浄滿有髙行衆僧嫉之乃密畫女人居髙樓而浄滿引弓射之狀藏於經笥令其弟詣闕告之則天大怒命御史裴懐古推案便行誅戮懐古執之不屈李昭徳進曰懐古推事疎略請令重推懐古厲聲而言曰陛下法無親疎當與天下畫一奈何使臣誅無辜之人以希聖㫖向使浄滿有不臣之狀臣復何顔能寛之乎臣守平典庶無寃濫死無恨矣則天意乃解懐古後副閻知微和親於突厥立知微為南面可汗而入寇趙定懐古因得逃歸素羸弱不堪奔馳乃懇誠告天願投死南土力倦而寢夢一僧如浄滿者引之曰可從此路出覺而從之果獲全人以為忠恕之報出大唐新語法通長安懿徳禪院者唐中宗為懿徳太子追福改名加飾焉禪院内有大石臼重五百斤隋末鄠縣沙門法通自南莊致於此寺法通自少出家初極尫劣同侶輕之乃發憤乞願壯健晝寢樹下忽口中涎沫流出三升其母驚遽呼覺法通云忽夢有人遺三䭾筋使我噉之適噉一䭾筋遽覺便壯健試舉大石臼不以為困有寺僧行戡本稱有力通於是遂乃竊其所服之袈裟舉堂柱而壓之行戡見而驚異盡力莫能取通徐舉柱而取衆大駭之通力兼百人時咸服之以為神助焉出西京記太平廣記卷九十五
