body:
  text: 太平廣記卷四百十宋李昉等編草木五果上柤稼􅣮樹實如何樹實仙棃綺縞樹實波􅃚娑樹實瞻波異果神仙李武陵桃李金李漢帝杏仙人杏御李子朱李兎頭柰脂衣柰朱柰文林果聖柰木桃東方村桃仙桃勾桃一石桃偏桃王母桃食桃核韶子羅浮甘子天寳甘子北方棗西王母棗仙人棗仲思棗波斯棗果上柤稼􅣮樹實東方大荒之中有樹焉名曰柤稼􅣮柤柤棃也稼者株稼也􅣮暱也三千嵗作花九千嵗作實其花蕋紫色其實赤色亦髙百丈或千丈也敷張自輔東西南北方枝各近五十丈葉長七尺廣五尺色如緑青木皮如梓樹理如甘草味飴實長九尺圍如長無瓤核竹刀剖之如凝􅁡得食復見實即滅矣言復見後實熟者夀一萬二千嵗出神異經如何樹實南方大荒有樹焉名曰如何三百嵗作花九百嵗作實花色朱其實正黄髙五十丈敷張如蓋葉長一丈廣二尺餘似菅苧色青厚可五分似絮如厚朴材理如支九子味如飴實有核形如棗子長五尺圍如長金刀剖之則酸蘆刀剖之則辛食之者地仙不畏水火不畏白刃刃刀之屬言地仙者不能飛在地従之法也出神異經仙棃南方有樹焉髙百丈敷張自輔葉長一丈廣六尺名仙梨如今之柤棃但樹大耳其子徑三尺剖之少瓤白如素和羮食之地仙衣服不敗辟穀可以入水火也出神異經綺縞樹實東南荒中有邪音耶木焉髙三千丈或十餘圍或七八尺其枝有喬直上不可􅃚也葉如甘𤓰三百嵗晝落而生花形如甘𤓰花復二百嵗落而生萼萼下生子三嵗而成熟成熟之後不長不減子形如寒𤓰似冬𤓰也長七八寸徑四五寸萼復覆生頂言發萼而得成實此不取萬世如故若取子而留萼萼復生子如初年月復成熟復二年則成萼則復生子其子形如甘瓤少􅀈音練甘美食之令人身澤不可過三升令人㝠醉半日乃醒木髙人取不能得唯木下有多羅之人緣能得之多羅國名一名無葉世人後生不見葉謂之無葉也一名綺縞人見無葉謂之綺縞出神異經波􅃚婆樹實波􅃚婆樹出拂林國呼為阿薩嚲樹長五六丈皮色青緑葉極光浄冬夏不凋無花結實其實従樹莖出大如冬𤓰有皮裹之殻上有刺瓤至甘甜可食核大如棗一實有數枚核中仁如粟黄炒之食甚美出酉陽雜俎瞻波異果瞻波國有人牧牛百餘頭有一牛離羣忽失所在至暮方歸形色鳴吼異常牛主異之明日遂獨行主因隨之入一穴行五六里豁然明朗花木皆非人間所有牛於一處食草草不可識有果作黄金色牧牛人竊將還為鬼所奪又一日復往取此果至穴鬼復欲奪其人急吞之身遂暴長頭纔出身塞於穴數日化為石出酉陽雜俎神仙李防陵楚山有朱神李圃三十六所潘岳閒居賦云房陵朱神之李又李尤果賦云三十六之朱李蓋仙李縹而神李紅陸士衡果賦云中山之縹李是也出述異記武陵桃李武陵源在呉中山中無他木盡生桃李俗呼為桃李源源上有石洞洞中有乳水世傳秦亂呉人於此避難者食桃李實者皆得仙去出述異記金李杜陵有金李李之大者謂之夏李尢小者謂之鼠李出述異記漢帝杏濟南郡之東南有分流山山上多杏大如梨色黄如橘土人謂之漢帝杏亦曰金杏出酉陽雜俎仙人杏杏圃洲南海中多杏海上人云仙人種杏處漢時嘗有人舟行遇風泊此洲五六日日食杏故免死云洲中有冬杏王充果賦云冬實之杏春熟之甘晉郭太儀果賦云杏或冬而實出述異記御李子許昌節使小㕔是故魏景福殿董卓亂魏武挟令􅁶帝自洛都許許州有小李子色黄大如櫻桃謂之御李子即獻時所植至今有焉出述異記朱李魏文帝安陽殿前天降朱李八枚啖一枚數日不食今李種有安陽李大而甘者即其種也出述異記兎頭柰白柰出涼州野豬澤大如兎頭出酉陽雜俎脂衣柰脂衣柰漢時紫柰大如升核紫花青研之有汁可漆或著衣不可浣出酉陽雜俎朱柰唐貞觀年中頓邱縣有一賢者於黄河渚上拾菜得一樹子僅大如指持歸蒔之三年乃結子五顆味狀如柰又似林檎多汁異常酸美送縣縣上州以其奇味乃進之上賜綾一十匹後樹長成漸至三百顆每年進之號曰朱柰至今存徳具博等州取其枝接所在豐足人以為従西域浮来礙渚而住矣出朝野僉載文林果唐永徽中魏郡臨黄王國村人王方言嘗於河中灘上拾得一小樹栽埋之及長乃林檎也實大如小黄瓠色白如玉間以珠㸃亦不多三數而已有如纈實為奇果光眀瑩目又非常美紀王慎為曹州刺史有得之獻王王貢於髙宗以為朱柰又名五色林檎或謂之聫珠果種於苑中西域老僧見之云是奇果亦名林檎上大重之賜王方言文林郎亦號此果為文林郎果俗云頻婆果河東亦多林檎秦中亦不少河西諸郡亦有林檎皆小於文林果出洽聞記聖柰河州鳯林關有靈巖寺每七月十五日溪穴流出聖柰大如盞以為常出洽聞記木桃桃之大者木桃詩云投我以木桃是也出述異記東方村桃東方村有桃樹其子徑三尺二寸和核羮食之令人益夀食核中仁可以治𠻳小桃溫潤既𠻳人食之即止也出神異記仙桃出郴州蘇躭仙壇有人至心求之者桃落壇上或至五六顆形似石塊赤黄色破之如有核三重研飲之愈衆疾尤治邪氣出酉陽雜俎勾桃鄴華林苑勾桃子重三觔或二觔半亦有名梨者比衆果氣味甘美入口消釋人間有名果季龍作蝦蟇車四箱廣一丈深一丈合土載中植之則無不生也出洽聞記一石桃吐谷渾桃大如石甕出洽聞記偏桃偏桃出波斯國波斯呼為婆淡樹長五六丈圍四五尺葉似桃而濶大三月開花白色花落結實狀如桃子而形偏其肉苦澁不堪噉核中仁甘甜西域諸國並珍之出酉陽雜俎王母桃王母桃洛陽華林園内有之十月始熟形如括簍俗語曰王母甘桃食之解勞亦名西王母桃出酉陽雜俎食桃核楊子留後呉堯卿家有傭賃者役之既乆一日持一大桃核可容數升以獻堯卿堯卿知其異稍磨之取食食盡頗覺輕徤堯卿為吏貪猥殘虐畢師鐸之難投所居後閣井中死師鐸求得類堯卿者殺之後有得其故居者竊知其屍在井中取而得之舉體皆腐壊而藏府有成金者出稽神録韶子初寧縣里有石榆子一名山棗又時呼為韶子也出南越志羅浮甘子二種羅浮甘子唐開元中始有山僧種於南樓寺其後進獻幸蜀奉天之嵗皆不結實出國史補天寳甘子唐天寳十年上謂幸臣曰近於宫内種甘子數株今秋結實一百五十顆與江南蜀道所進不異宰臣賀表曰雨露所均混天區而齊被草木有性憑地氣而潛通故得資江外之珍果為禁中之華實相傳云元宗幸蜀年羅浮甘子不實嶺南有蟻大於秦中馬蟻結巢於甘樹實時常循其上故甘皮薄而滑往往甘實在巢中冬深取之味數倍於常者出酉陽雜俎北方棗北方荒中有棗林焉其髙五十丈敷張枝條數里餘疾風不能偃雷電不能摧其子長六七寸圍過其長熟色如朱乾之不縮氣味潤澤殊於常棗食之可以安軀益氣故方書云此棗枝條盛於常棗亦益氣安軀赤松子云北方大棗味有殊既可益氣又安軀出神異記西王母棗鄴華林苑中西王母棗冬夏有葉九月生花臘月乃熟三子一尺又有圭角亦三子一尺出洽聞記仙人棗晉時太倉南有翟泉西有華林園園有仙人棗長五寸核細如針出酉陽雜俎仲思棗信都獻仲思棗四百枚棗長四五寸圓紫色細又縐細核肥有味賢於青州棗北齊時有仙人仲思得此棗種之亦名仙棗時海内唯有數樹出大業拾遺波斯棗波斯棗出波斯國波斯呼為窟莽樹長三四丈圍五六尺葉如土藤不凋二月生花狀如蕉花有兩甲漸漸開罅中有十餘房子長二尺黄白色有核熟則紫黒狀類乾棗味甜如飴可食出酉陽雜俎太平廣記卷四百十
