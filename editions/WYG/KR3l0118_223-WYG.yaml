body:
  text: 太平廣記卷二百二十三相三桑道茂韋夏卿駱山人李生王鍔竇易直李潼賈餗婁千寳丁重夏侯生薛少尹周𤣥豹程遜桑道茂李西平晟之爲將軍也嘗謁桑道茂茂云將軍異日爲京兆尹愼少殺人西平曰武夫豈有京兆尹之望後興元收復西平兼京尹時桑公在俘囚之中當斷之際告西平公忘少殺人之言􅁘西平釋之出傳載韋夏卿韋獻公夏卿有知人之鑒人不知也因退朝於街中逢再從弟執􅁩從弟渠牟舟三人皆第二十四並爲郎官簇馬良乆獻公曰今日逢三二十四郎輒欲題目之語執􅁩曰汝必爲宰相善保其末耳語渠牟曰弟當别承主上恩而速貴爲公卿語舟曰三人之中弟最長逺而位極旄鉞由是竟如言出傳載駱山人王庭湊始生於恒山西南三十里石邑别墅當生之後常有鳩數十朝集庭𣗳暮宿簷户之下有里人路德播異之及長駢脇善隂符鬼谷之書歴居戎職頗得士心以長慶元年春二月曾使河陽廻及沇水酒困寢於道忽有一人荷䇿而過熟視之曰貴當列土非常人有從者竇載英寤以告庭湊庭湊馳數里及之致敬而問自云濟源駱山人向見君鼻中之氣左如龍右如虎龍虎氣交當王於今年秋子孫相繼滿一百年吾相人多矣未見有如此者復云家之庭合有大𣗳𣗳及於堂是兆也庭湊既歸遇田𢎞正之難中夜有軍士叩門僞呼官稱庭湊股慄欲逃載英曰駱山人之言時至矣是夜七月二十七日也庭湊意乃安及爲畱後他日歸其别墅視家庭之𣗳婆娑然暗北舍矣墅西有飛龍山神庭湊往祭之將及其門百歩見一人被衣冠折腰於庭凑庭凑問左右皆不見及入廟神乃側坐衆皆異之因令面東起宇今尚存焉尋以德播爲上賔載英列爲首校訪駱山人乆而方獲待以函丈之禮乃别搆一亭去則懸榻號駱氏亭報疇昔也出唐年譜録李生杜悰通貴日乆門下有術士李生悰待之厚悰任西川節度使馬埴罷黔南赴闕取路至西川李術士一見埴謂悰曰受相公恩乆思有以効答今有所報矣黔中馬中丞非常人也相公當厚遇之悰未之信也李生一日密言於悰曰相公將有甚禍非馬中丞不能救乞厚結之悰始驚信發日厚幣贈之仍令邸吏爲埴於闕下買宅生生之費無闕焉埴至闕方知感悰不知其㫖尋除光禄卿報狀至蜀悰謂李生曰貴人至闕也作光祿勲矣術士曰姑待之稍進大理卿又遷刑部侍郎充鹽鐵使悰始驚憂俄而作相懿安皇后宣宗幽崩悰懿安子壻也忽一日内牓子索檢責宰臣元載故事埴喻㫖翌日延英上前萬端營救素辯博能廻上意事遂寢出前定録王鍔王鍔爲辛杲下偏禆杲時帥長沙一旦擊毬馳騁既酣鍔向天呵氣氣高數丈若匹練上衝杲謂其妻曰此極貴相遂以女妻之鍔終爲將相出獨異志竇易直竇相易直幼時名祕家貧就業村學其敎授􅅱有道術而人不知一日近暮風雪暴至學童悉歸家不得而宿于漏屋之中寒爭附火唯竇公寢於榻夜深方覺􅅱撫公令起曰竇祕君後爲人臣貴夀之極勉勵自愛也及德宗幸奉天日公方舉進士亦隨駕而西乘一蹇驢至開逺門人稠路隘其扉將闔公懼勢不可進聞一人叱驢兼捶其後得疾馳而岀顧見一黑衣卒呼公曰秀才已後莫忘閭情及升朝訪得其子提挈累至吏中榮逹出因話録李潼韋處厚在開州也嘗有李潼崔沖二進士来謁畱連月餘日㑹有過客西川軍將某者能相術於席上言李潼三日内有虎厄後三日處厚與諸客遊山寺自上方抵下方日已暮矣李先下崔沖後来沖大呼李云待沖来待沖来李聞待沖来聲謂虎至顚蹶墜下山趾絕而復蘇數日方愈及軍將廻謂李曰君厄過矣出傳載賈餗賈餗布衣時謁滑臺節度使賈耽以餗宗黨分更喜其人文甚宏贍由是益所延納忽一日賔客大㑹有善相者在眈座下及餗退而相者曰向来賈公子神氣俊逸當位極人臣然惜哉是執政之時朝廷微變若當此際諸公宜早避焉耽頷之以至動容及太和末餗秉鈞衡有知者潛匿於山谷間十有三四矣出杜陽編婁千寳浙東李褒聞婺女婁千寳呂元芳二人有異術發使召之既到李公便令止從事廳從事問曰府主八座更作何官元芳對曰適見尚書但前浙東觀察使恐無别拜千寳所述亦爾從亊黙然罷問及再見李公公曰僕他日何如二術士曰稽山竦翠湖柳埀隂尚書畫鷁百艘正堪遊觀昔人所謂人生一世若輕塵之著草何論異日之榮悴榮悴定分莫敢面陳因問幕下諸公元芳曰崔副使芻言李推官正範器度相似但作省郎止于郡守團練李判官服古自此大醉不過數場何論官矣觀察判官任轂止於小諫不換朱衣楊損支使評事雖骨體清痩幕中諸賔福夀皆不如盧判官纁雖即狀貌光澤若比團練李判官在世日月稍乆夀亦不如副使與楊李三人禄秩區分矣二術士所言咸未之信黙以證焉是後李服古不過五日而逝誠大醉不過數場也李尚書及諸從事驗其所説敬之如神時羅郎中紹權赴任明州竇𢎞餘少卿常之子也赴台州李公於席上問台明二使君如何婁千寳曰竇使君必當再醉望海亭羅使君此去便應求道四明山不遊塵世矣後竇少卿罷郡再之府庭是重醉也羅郎中遷於海島故以學道爲名知其不還也李尚書歸義興未㡬物故是無他拜盧纁判官校理明年逝於宛陵使幕比李服古官稍乆矣爲少年也任轂判官纔爲補闕休官歸圃田是不至朱紫也崔芻言郎中止於呉興郡李範郎中止於九江二公皆自南宫出爲名郡是乃祿秩相參獨楊損尚書三十年來兩爲給事再任京尹防禦三峰青州節度使年逾耳順官歴藩垣浙東同院諸公福夀悉不如也皆依婁呂二生所說焉杜勝給事在杭州之日問千寳已爲宰相之事何如曰如筮得震卦有聲而無形也當此之時或隂人所譛也若領大鎭必憂悒成疾可以修禳之後杜公爲度支侍郎有直上之望草麻待宣府吏已上於杜公門搆板屋將布沙堤忽有東門驃騎奏以小疵而承㫖以蔣伸侍郎拜相杜出鎭天平憂悒不樂去其失望也乃歎曰金華婁山人之言果應矣欲令招千寳元芳又曰婁呂二生孤雲野鶴不知棲宿何處杜尚書尋亦終于鄆州鍾離侑少詹昔歲閒居東越覩斯異術每求之二生不可得也出雲溪友議丁重處士丁重善相人駙馬于悰方判鹽鐵頻有宰弼之耗時路巖秉鈞持權與之不恊一旦重至新昌私第値于公適至路曰某與之賔朋處士垂箔細看此人終作宰相否備陳飲饌畱連數刻既去問之曰所見何如重曰入相必矣兼在旬月之内巖笑曰見是貴戚復作鹽鐵使耳重曰不然請問于之恩澤何如宣宗朝鄭都尉巖曰又安可比乎重曰鄭爲宣宗注意者乆而竟不爲相豈將人事可以斟酌某比不熟識于侍郎今日見之觀其骨狀眞爲貴人其次風儀秀整禮貌謙抑如百斛重器所貯尚空其半安使不益於祿位哉茍踰月不居廊廟某無復更至門下巖曰處士之言可謂逺矣其後浹旬于果登台鉉巖每見朝賢大爲稱賞由兹聲動京邑車馬造門甚衆凡有所說其言皆驗後居終南山中好事者亦至其所出劇談録夏侯生廣南劉僕射崇龜常有台輔之望必謂罷鎭便期直上羅浮處士夏侯生有道崇龜重之因問將來之事夏生言其不入相發後三千里有不測之事洎歸闕至中路得疾而終劉山甫亦蒙夏生言示五年行止事無不驗蓋飲啄之有分也出北夢瑣言薛少尹荆南節度判司空董與京兆杜無隱即滑臺杜慆常侍之子洎蜀人梁震俱稱進士謁成中令欲希薦送有薛少尹者自蜀沿流至渚宫三賢常訪之一日薛亞謂董曰閣下與京兆勿議求名必無所遂杜亦不夀唯大賢忽爲人縶維官至朱紫如梁秀才者此舉必捷然登第後一命不沾也後皆如其言梁公却思歸蜀重到渚宫江路梗紛未及西泝淮師寇江陵渤海王邀致府衙俾草檄書欲辟於府幕堅以不仕爲志渤海敬諾之二紀依棲竟麻衣也薛尹之言果驗矣出北夢瑣言周𤣥豹後唐周𤣥豹燕人少爲僧其師有知人之鑒從遊十年不憚辛苦遂傳其祕還鄉歸俗盧程爲道士與同志三人謁之𤣥豹退謂人曰適二君子明年花發俱爲故人唯彼道士他年甚貴來歲二人果卒盧果登庸後歸晉陽張承業俾明宗易服列於諸挍之下以他人請之曰此非也𤣥豹指明宗於末綴曰骨法非常此爲内衙太保乎或問前程唯云末後爲鎭帥明宗夏皇后方事巾櫛有時忤㫖大犯檟楚𤣥豹曰此人有藩侯夫人之位當生貴子其言果驗凡言吉凶莫不神中事多不載明宗自鎭帥入謂侍臣曰周𤣥豹昔曾言朕事頗有徴可詔北京津置赴闕趙鳳曰袁許之事𤣥豹所長若詔至輦下即爭問吉凶恐近妖惑乃令就賜金帛官至光祿卿年至八十而終出北夢瑣言程遜晉太常卿程遜足下有龜文嘗招相者視之相者告曰君終有沉溺之厄其後使於浙右竟葬於海魚之腹漢李固傳云固足履龜紋而位至三公卒無水害同事而異應也出玉堂閒話太平廣記卷二百二十三
