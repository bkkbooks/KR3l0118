body:
  text: 太平廣記卷三百四十五宋李昉等編鬼三十郭承嘏張庾劉方元光澤坊民淮西軍將郭翥裴通逺鄭紹孟氏郭承嘏郭承嘏嘗寶惜法書一卷每攜隨身初應舉就雜文試駕畢夜猶早緘置篋中及納試而誤納所寶書帖却歸鋪於燭籠下取書帖觀覽則程試宛在篋中計無所出來徃於棘闈門外見一老吏詢其試事具以實告吏曰某能換之然某家貧居興道里倘換得願以錢三萬見酬承嘏許之逡巡齎程試入而書帖出授承嘏明日歸親仁里自以錢送詣興道里欵問久之吏家人出以姓氏質之對曰王父死三日力貧未辦周身之具承嘏驚歎久之方知􅁄闈所見乃鬼也遂以錢贈其家出尚書談錄張庾張庾舉進士元和十三年居長安昇道里南街十一月八日夜僕夫他宿獨庾在月下忽聞異香滿院方驚之俄聞履聲漸近庾屣履聽之數青衣年十八九艷美無敵推門而入曰步月逐勝不必樂遊原只此院小臺藤架可矣遂引少女七八人容色皆艷絶服餙華麗宛若豪貴家人庾走避堂中垂簾望之諸女徐行直詣藤下須臾陳設牀榻雕盤玉樽盃杓皆竒物八人環坐青衣執樂者十人執拍板立者二人左右侍立者十人絲管方動坐上一人曰不告主人遂欲張樂得無慢乎既是衣冠邀來同歡可也因命一青衣傳語曰娣妺步月偶入貴院酒食絲竹輒以自樂秀才能暫出為主否夜深計已脫冠紗巾而來可稱疎野庾聞青衣受命畏其來也乃閉門拒之青衣扣門庾不應推不可開遽走復命一女曰吾輩同歡人不敢預既入其門不召亦合來謁閉門塞户羞見吾徒呼既不來何須更召於是一人執樽一人糺司酒既巡行絲竹合奏殽饌芳珍音曲清亮庾度此坊南街盡是墟墓絶無人住謂從坊中出則坊門已閉若非妖狐乃是鬼物今吾尚未惑可以逐之少頃見迷何能自悟於是潛取搘牀石徐開門突出望塵而擊正中臺盤紛然而散庾逐之奪得一盞以衣繫之及明視之乃一白角盞竒不可名院中香氣數日不歇盞鏁於櫃中親朋來者莫不傳視竟不能辨其所自後十餘日傳觀數次忽墮地遂不復見庾明年進士上第出續元怪錄劉方元山人劉方元自漢南扺巴陵夜宿江岸古舘㕔西有巴籬隔之又有一㕔常扄鏁云多怪物使客不安已十年不開矣中間為㕔廊崩摧郡守完葺至新淨而無人敢入方元都不知之二更後月色滿庭江山清寂唯聞籬西有婦人言語笑咏之聲不甚辨惟一老青衣語稍重而秦音者言曰徃年阿郎貶宰時常令老身騎偏面騧抱阿荆郎阿荆郎嬌不肯穩坐或偏於左或偏於右墜損老身左膊至今天欲陰則酸疼焉今又發矣明日必天雨如今阿荆郎官髙也不知有老身無復聞相應答者俄而有歌者歌音清細若曵縷之不絶復吟詩吟聲切切如含酸和淚之詞不可辨其文久而老青衣又云昔日阿荆郎愛念青青河畔草今日亦可謂綿綿思逺道也僅四更方不聞明旦果大雨呼館吏詢之吏云此西㕔空無人方敘賔客不敢入之由方元因令開院視之則秋草蒼苔没階西則連山林無人跡也啟其㕔㕔則新净了無所有唯前間東柱上有詩一首墨色甚新其詞曰爺娘送我青楓根不記青楓幾迴落當時手刺衣上花今日為灰不堪着視其言則鬼之詩也館吏云此㕔成來不曾有人居亦先無此題詩處乃知夜來人也復以此訪於人終不能知之出𫝊異記光宅坊民元和中光宅坊民失姓名其家有病者將困迎僧持念妻兒環守之一夕衆髣髴見一人入户衆遂驚逐乃投於甕間其家以湯沃之得一袋葢鬼間取氣袋也忽聽空中有聲求其袋甚哀切且言我將别取人以代病者其家因擲還之病者即愈出酉陽雜爼淮西軍將元和末有淮西軍將使於汴州止驛中夜久眠將熟忽覺一物壓已軍將素健驚起與之角力其物遂退因奪得手中革囊鬼闇中哀祈甚苦軍將謂曰汝語我物名我當相還鬼良久曰此蓄氣袋耳軍將乃舉甓擊之語遂絶其囊可盛數升絳色如藕絲攜於日中無影出酉陽雜爼郭翥元和間有郭翥者常為鄂州武昌尉與沛國劉執謙友善二人每相語常恨幽顯不得通約先沒者當來告後執謙卒數月翥居華陰一夕獨處户外嗟吁久而言曰聞郭君無恙翥聆其音知執謙也曰可一面否曰請去燭當與子談耳翥即徹燭引其袂而入與同榻話舊歴歴然又言㝠話罪福甚明不可欺夜既分翥忽覺有穢氣發於左右須臾不可受即以手遽捫之其軀甚大不𩔖執謙翥有膂力知為他怪因攬其袂以身加之牢不可動掩鼻而卧既而告去翥佯與語留之將曉求去愈急曰將曙矣不遣我禍且及子翥不答頃之遂不聞語俄天曉見一胡人長七尺餘如卒數日者時當暑穢不可近即命棄去郊外忽有里人數輩望見疾來視之驚曰果吾兄也亡數日矣昨夜忽失所在乃取屍而去出宣室志裴通遠唐憲宗葬景陵都城人士畢至前集州司馬裴通逺家在崇賢里妻女輩亦以車輿縱觀於通化門及歸日晩馳馬驟至平康北街有白頭嫗步走隨車而來氣力殆盡至天門街夜鼓時動車馬轉速嫗亦忙遽車中有老青衣從四小女其中有哀其奔迫者問其所居對曰崇賢即謂曰與嫗同里可同載至里門􅁘嫗荷媿及至則申重辭謝將下車遺一小錦囊諸女共開之中有白羅製為逝者面衣四焉諸女驚駭棄於路不旬日四女相次而卒出集異記鄭紹商人鄭紹者䘮妻後方欲再娶行經華隂止於逆旅因恱華山之秀峭乃自店南行可數里忽見青衣謂紹曰有人令傳意欲暫命君紹曰何人也青衣曰南宅皇尚書女也適於宅内登臺望見君遂令致意紹曰女未適人􅁘何以止於此青衣曰女郎方自求佳婿故止此紹詣之俄及一大宅又有侍婢數人出命紹入延之於館舍逡巡有一女子出容質殊麗年可初笄從婢十餘並衣錦繡既相見謂紹曰既遂披覿當去形迹冀稍從容紹唯唯隨之復入一門見珠箔銀屏煥爛相照閨閫之内塊然無侣紹乃問女是何皇尚書家何得孤居如是􅁘尊親焉在嘉耦為誰雖荷寵招幸袪疑抱女曰妾故皇公之幼女也少䘮二親厭居城郭故止此宅方求自適不偶良人惠然辱顧既愜所願何樂如之女乃命紹升榻坐定具酒殽出妓樂不覺向夕女引一金罍獻紹曰妾求佳婿已三年矣今既遇君子寧無自得妾雖慙不稱敢以金罍合􅈟願求奉箕帚可乎紹曰余一商耳多遊南北惟利是求豈敢與簪纓家為眷屬也然遭逢顧遇謹以為榮但恐異日為門下之辱女乃再獻金罍自彈箏以送之紹聞曲音凄楚感動於心乃飲之交獻誓為伉儷女笑而起時夜已久左右侍婢以紅燭籠前導成禮至曙女復於前閣備芳醪美饌與紹歡醉經月餘紹曰我當暫出以緝理南北貨財女郎曰鴛鴦配對未聞經月而便相離也紹不忍後又經月餘紹復言之曰我本商人也泛江湖渉道途葢是常也雖深承戀戀然若久不出行亦吾心之所不樂者願勿以此為嫌當如期而至女以紹言切乃許之遂於家園張祖席以送紹乃橐囊就路至明年春紹復至此但見紅花翠竹流水青山杳無人迹紹乃號慟經日而返出瀟湘錄孟氏維揚萬貞者大商也多在於外運易財寶以為商其妻孟氏者先壽春之妓人也美容質能歌舞薄知書稍有詞藻孟氏獨逰於家園四望而怨乃吟曰可惜春時節依然獨自遊無端兩行淚長秖對花流吟詩罷泣下數行忽有一少年容貌甚秀美踰垣而入笑謂孟氏曰何吟之太苦􅁘孟氏大驚曰君誰家子何得遽至於此而復輕言之也少年曰我性落魄不自拘撿唯愛髙歌大醉適聞吟咏之聲不覺喜動於心所以踰垣而至茍能容我於花下一接良談而我亦或可以彊攀清調也孟氏曰欲吟詩􅁘少年曰浮生如寄年少幾何繁花正妍黄葉又墜人間之恨何啻千端豈如且偷頃刻之歡也孟氏曰妾有良人萬貞者去家已數載矣所恨當兹麗景逺在他方豈惟惋歎芳菲固是傷嗟契濶所以自吟拙句葢道幽懐不虞君之渉吾地也何故少年曰我向聞雅咏今覩麗容固死命猶􅂸且責言何害孟氏即命牋續賦詩曰誰家少年兒心中暗自欺不道終不可可即恐郎知少年得詩乃報之曰神女得張碩文君遇長卿逢時兩相得聊足慰多情自是孟氏遂私之挈歸己舍凡踰年而夫自外至孟氏憂且泣少年曰勿爾吾固知其不久也言訖騰身而去頃之方没竟不知其何怪也出瀟湘錄太平廣記卷三百四十五
