body:
  text: 太平廣記卷一百九十七博物東方朔劉向胡綜張華束晳沈約虞世南傅奕郝處俊孟詵唐文宗賈躭叚成式江陵書生東方朔漢武帝時嘗有獨足鶴人皆不知以爲怪異東方朔奏曰此山海經所謂畢方鳥也騐之果是因敕廷臣皆習山海經山海經伯翳所著劉向編次作序伯翳亦曰伯益書曰益典朕虞盖隨禹治水取山海之異遂成書出尚書故實劉向貳負之臣曰危與貳負殺窫窳帝乃梏之疏屬之山桎其右足反縛兩手與髪繫之山上在關提西北郭璞注云漢宣帝使人發上郡盤石石室中得一人徒裸被髪反縛械一足以問羣臣莫知劉向按此言之宣帝大驚由是人爭學山海經矣出山海經胡綜胡綜博物多識吳孫權時有掘地得銅匣長二尺七寸以琉璃爲盖雕鏤其上得一白玉如意所執處皆刻龍虎及蟬形時莫能識其所由者權以綜多悉徃事使人問之綜云昔秦始皇東逰以金陵有天子氣乃改縣名并掘鑿江湖平諸山阜處處輙埋寳物以當王土之氣事見於秦記此盖是乎衆人咸歎其洽聞而悵然自失出綜别傳張華魏時殿前鐘忽大鳴震駭省署華曰此蜀銅山崩故鐘鳴應之也蜀尋上事果云銅山崩時日皆如華言出小説又晉陸士衡嘗餉張華於時賔客盈座華開噐便曰此龍肉也衆雖素伏華博聞然意未之信華曰試以苦酒灌之必有異試之有五色光起士衡乃窮其所由鮓主曰家園中積茅下得一白魚質狀殊常以作鮓過羙故以餉陸出世説又中朝時有人畜銅澡盤晨夕恒鳴如人扣以白張華華曰此盤與洛鐘宫商相諧宫中朝暮撞故聲相應可鑢令輕則韻乗鳴自止也依言即不復鳴出小説又武庫内有雄雉時人咸謂爲怪華云此虵之所化也即使捜除庫中果見虵蛻之皮出小説又吴郡臨平岸崩出一石皷打之無聲以問華華曰可取蜀中桐材刻作魚形扣之則鳴矣即從華言聲聞數十里出小説又惠帝時有得一鳥毛長數丈華見而歎曰此所謂海鳬毛此毛出則天下土崩果如其言出異苑又洛中有一洞穴深不可測有一婦人欲殺夫謂夫曰未曾見此穴夫自過視之至穴婦推夫墜穴至底婦擲飰物如欲祭之此人當時顛墜恍惚良乆乃蘇得飯食之氣力稍彊周惶覔路乃得一穴匍匐從就﨑嶇反側行數十里穴小寛亦有㣲明遂得寛平廣逺之地歩行百餘里覺所踐如塵而聞粇米香啗之芬羙過於充饑即裹以爲糧縁穴行而食此物既盡復遇如泥者味似向塵又齎以去所歴幽逺里數難測就明曠而食所齎盡便入一都郛郭修整宫館壯麗䑓榭房宇悉以金魄爲餙雖無日月明踰三光人皆長三丈被羽衣奏竒樂非世所聞也便告請求哀長人語令前去從命進道凡遇如此者九處最後所至苦告饑餒長人入指中庭一大柏𣗳近百圍下有一羊令跪捋羊鬚初得一珠長人取之次捋亦取後捋令啗食即得療饑請問九處之名求停不去答曰君命不得停還問張華當悉此人便復隨穴而行遂得出交郡徃還六七年間即歸洛問華以所得二物視之華云如塵者是黄河龍涎泥是崑山下泥九處地仙名九館羊爲癡龍其初一珠食之與天地等夀次者延年後者充饑而已出幽明録又豫章有然石以水灌之便熱用以烹煮可使食成熱盡下可以冷水灌之更熱如此無窮世人貴其異不能識其名雷煥元康中入洛乃齎以示華華云此所謂然石出異物志又嵩髙山北有大穴空莫測其深百姓嵗時毎逰其上晉初嘗有一人悞墜穴中同輩冀其倘不死試投食於穴墜者得之爲糧乃縁穴而行可十許日忽曠然見明又有草屋一區中有二人對坐圍碁局下有一杯自飲墜者告以饑渇碁者曰可飲此墜者飲之氣力十倍碁者曰汝欲停此否墜者曰不願停碁者曰汝從西行數十歩有一井其中多怪異慎勿畏但投身入中當得出若饑即可取井中物食之墜者如其言井多蛟龍然遇墜者輙避其路墜者縁井而行井中有物若青泥墜者食之了不復饑可半年許乃出蜀中因歸洛下問張華華曰此仙館所飲者玉漿所食者龍穴石髓也出小說束晳晉武帝問尚書即摯仲冶三月三日曲水其義何㫖答曰漢章帝時平原徐肇以三月初生三女至三日而俱亡一村以爲怪乃相㩦之水濱盥洗因流以濫觴曲水之義盖起此也帝曰若如所談便非嘉事也尚書郎束晳進曰仲冶小生不足以知此臣請説其始昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波流又秦昭王三月上已置酒河曲見金人自淵而出奉水心劍曰令君制有西夏及秦覇諸侯乃因此處立爲曲水二漢相沿皆爲盛業帝曰善賜金五十斤而左遷仲冶爲陽城令出續齊諧記沈約梁武帝多䇿事因有貢徑寸栗者帝與沈約䇿栗事帝得十餘事約得九事及約出人問今日何不勝約曰此人忌前不譲必恐羞死時又䇿錦􅀍事出盧氏雜記又天監五年丹陽山南得瓦物髙五尺圍四尺上鋭下平盖如合焉中得劔一瓷具數十時人莫識沈約云此東夷罨盂也葬則用之代棺此制度卑小則隨當時矣東夷死則坐葬之武帝服其博識語在江右雜事出史系虞世南唐太宗令虞世南寫列女傳屏風已裝未及求本乃暗書之一字無悮出國史纂異又太宗常出行有司請載副書以從帝曰不須虞世南此行秘書也傅奕唐貞觀中有婆羅門僧言得佛齒所擊前無堅物於是士女奔湊其處如市傅奕方卧病聞之謂其子曰非佛齒吾聞金剛石至堅物莫能敵惟羚羊角破之汝徃試焉僧緘縢甚嚴固求良乆乃見出角扣之應手而碎觀者乃止今理珠玉者用之出國史纂異郝處俊唐太宗問光禄卿韋某須無脂肥羊肉充藥韋不知所從得乃就侍中郝處俊宅問之俊曰上好生必不爲此事乃進狀自奏其無脂肥羊肉須五十口肥羊一一對前殺之其羊怖懼破脂並入肉中取最後一羊則極肥而無脂也上不忍爲乃止賞處俊之博識也出朝野僉載孟詵唐孟詵平昌人也父曜明經擢第拜學官詵少敏悟博聞多竒舉世無與比進士擢第觧褐長樂尉累遷鳯閣舍人時鳯閣侍即劉褘之臥疾詵候問之因留飯以金椀貯酪詵視之驚曰此藥金非石中所出者褘之曰主上見賜當非假金詵曰藥金仙方所資不爲假也禕之曰何以知之詵曰藥金燒之其上有五色氣遽燒之果然褘之以聞則天以其近臣不當旁稽異術左授台州司馬累遷同州刺史每歴官多煩政人吏殆不堪薄其妻室常曰妻室可烹之以啖客人多議之出御史臺記唐文宗唐文宗皇帝聼政暇博覽羣書一日延英顧問宰臣毛詩云呦呦鹿鳴食野之苹苹是何草時宰相李珏楊嗣復陳夷行相顧未對珏曰臣按爾雅苹是藾蕭上曰朕看毛詩䟽苹葉圓而花白叢生野中似非藾蕭又一日問宰臣古詩云輕衫襯跳脫跳脫是何物宰臣未對上曰即今之腕釧也真誥言安妃有斵粟金跳脱是臂餙出盧氏雜記賈躭唐賈躭好地理學四方之使乃是蕃虜來者而與之坐問其土地山川之所終始凢三十年所聞既偹因撰海内華夷圖以問其郡人皆得其實事無虚詞出盧氏雜記叚成式唐叚成式詞學博聞精通三教復强記每披閲文字雖千萬言一覽略無遺漏嘗於私第鑿一池工人於土下獲鐡一片怪其異質遂持來獻成式命尺周而量之笑而不言乃静一室懸鐡其室中之北壁已而泥戸但開一牖方纔數寸亦緘鐍之時與近親闢牖窺之則有金書两字以報十二時也其博識如此出南楚新聞又成式多禽荒其父文昌嘗患之復以年長不加面斥其過而請從事言之幕客遂同詣學院具述丞相之㫖亦唯唯遜謝而已翌日復獵於郊原鷹犬倍多既而諸從事各送兎一䨇其書中徴引典故無一事重疊者從事軰愕然多莫曉其故實於是齊詣文昌各以書示之文昌方知其子藝文該贍山簡云吾年四十不為家公所知頗亦𩔖此出玉堂閒話江陵書生江陵南門之外雍門之内東垣下有小瓦堂室一所髙尺許具體而㣲詢其州人曰此息壤也詢其由曰數百年前此州忽爲洪濤所漫未沒者三二版州帥惶懼不知所爲忽有人白之曰州之郊墅間有一書生博讀甚廣才智出人請召詢之及召問之此是息壤之地在於南門僕嘗讀息壤記云禹湮洪水茲有海眼泛之無恒禹乃鎸石造龍之宫室寘於穴中以塞其水脈後聞版築此城毁其舊制是以有此懐襄之患請掘而求之果於東垣之下掘數尺得石宫室皆已毁損荆帥於是重葺以厚壤培之其洪水乃絶今於其上又起屋宇誌其處所旋以息壤記騐之不謬出玉堂閒話太平廣記卷一百九十七
