body:
  text: 太平廣記卷四百二十四宋李昉等編龍七閻浮龍吳山人白將軍温媪栁子華斑石張公洞五䑓山池張老費雞師汾水老姥李宣濛陽湫鹽井龍尹皓閻浮龍龍在閻浮提者五十七億龍於翟陁尼不降濁水西洲人食濁則夭單越人惡冷風雲不發冷於弗姿提洲不作雷聲不起電光東洲惡之也其雷聲兜率天作歌頌音閻浮提作海潮音其雨兜率天上雨摩尼獲世城雨美膳海中注雨不絶如連阿修中雨羅丘伏閻浮提中雨清浮水出酉陽雜俎吳山人隴州吳山縣有一人乗白馬夜行凡縣人皆夢之語曰我欲移居暫假爾牛言訖即過其夕數百家牛及眀皆被體汗流如水於縣南山曲出一湫方圓百餘歩里人以此湫因牛而遷謂之特牛湫也出獨異志白將軍僧元可言近傳有白將軍者嘗於曲江洗馬馬忽跳出驚走前足有物色白如衣𢃄縈繞數匝遽令解之血流數升白異之遂封紙帖中藏於衣箱一日送客至滻水出示諸客客曰盍以水試之白以劍劃地成竅置蟲於中沃盥其上少頃蟲蠕而長竅中泉湧倐忽自盤若一席有黒氣如香烟徑出簷外衆懼曰必龍也遂急歸未數里風雨驟至大震數聲出酉陽雜俎温媪温媪者即康州悦城縣孀婦也績布為業嘗於野㟁拾菜見沙草中有五卵遂收歸置績筐中不數日忽見五小蛇殻一斑四青遂送于江次固無意望報也媪常濯浣於江邉忽一日見魚在水跳躍戲於媪前自爾為常漸有知者鄉里咸為龍之母敬而事之或詢以災福亦言多徵應自是媪亦漸豐足朝廷知之遣使徵入京師至全義嶺有疾却返悦城而卒鄉里共葬之江東㟁忽一夕天地晦暝風雨隨作及明移其冢於西而草木悉於西岸出嶺表錄異栁子華栁子華唐時為成都令一旦方午忽有犢車一乗前後女騎導從徑入㕔事使一介告栁曰龍女且來矣俄而下車左右扶衛昇階與子華相見云宿命與君合為匹偶因止命酒樂極懽成禮而去自是往復為常逺近咸知之子華罷秩不知所之俗云入龍宫得水仙矣闕斑石京邑有一士子因山行拾得一石子青赤斑斕大如雞子甚異之置中箱中五六年因與嬰兒弄遂失之數日晝忽風雨暝晦庭前樹下降水不絶如瀑布狀人咸異其故風雨息樹下忽見此石已破中如雞卵出殻焉乃知為龍子也出原化記張公洞義興縣山水秀絶張公洞尤竒麗里人云張道陵修行之所也中有洞壑衆未敢入土氓姚生習道挈杖瓶火負囊以入約行數百歩漸漸明朗雲樹依稀近通歩武又十餘里見二道士對奕曰何人焉得來此具言始末曰大志之士也姚生餒甚因求食旁有青泥數斗道士指曰可飡此試探咀嚼覺芳馨食之遂飽道士曰爾可去慎勿語世人再拜而返密懐其餘以訪市肆偶胡賈見驚曰此龍食也何方而得乃述其事俱往尋之但黒巨穴不復有路青泥出外已硬如石不可復食出逸史五䑓山池五䑓山北䑓下有龍池約二畝有餘佛經云禁五百毒龍之所每至亭午昏霧暫開比邱及净行居士方可一覩比邱尼及女子近即時雷電風雨大作如近池必為毒氣所吸逡廵而没出傳竒張老荆湘有僧寺背山近水水中有龍時或雷風大作損壊樹木寺中有撞鐘張老者術士也而僧不知張老惡此龍損物欲禁殺之密為法此龍已知化為人潛告僧曰某寔龍也住此水多年或因出風雨損物為張老所禁性命危急非和尚救之不可倘救其命奉一寳珠以伸報答某即移於别處僧諾之夜喚張老求釋之張老曰和尚莫受此龍獻珠否此龍甚窮唯有此珠性又恡惡今若受珠他時悔無及僧不之信曰君但為我放之張老不得已乃放龍夜後送珠於僧而移出潭水張老亦辭僧去後數日忽大雷雨壊此僧舎奪其珠果如張老之言出原化記費雞師蜀川有一費雞師者善知將來之事而亦能為人禳救多在卭州蜀人皆神之時有一僧言往者雙流縣保唐寺寺有張二師者因廵行僧房見有空院將欲住持率家人掃灑之際於柱上得一小瓶子二師觀之見一蛇在瓶内覆瓶出之約長一尺文彩斑駁五色備具以杖觸之隨手而長衆悉驚異二師令一人挾之送於寺外當􅂝掇之際隨觸隨大以至丈餘如屋椽矣二人擔之方舉送者愈懼觀者隨而益多距寺約二三里所在撼動之時増長不已衆益懼遂擊傷至於死明日此寺院中有虹蜺亭午時下寺中僧有事至卭州見雞師説之雞師曰殺龍女矣張二師與汝寺之僧徒皆當死乎後卒如其言他應驗不可勝紀竟不知何術韋絢長兄為杜元頴從事其弟妹皆識費師於京中已悉知有此事自到即詢訪雞師之術凡有病者來告雞師即抱一雞而往及其門乃持呪其雞令入内抵病者之所雞入而死病者差雞出則病者不起矣時人遂號為費雞師又以石子置病者腹上作法結印其石子斷者其人亦不起也又能書符先焚符為灰和湯水與人吞之俄復吐出其符宛然如不燒又云城南建昌橋下其南㟁先有龍窟嵗常損人至有連馬而溺者如有攫拏於水當韋臯時前後運石凡㡬萬數頃之石復失焉後命道士投簡於内以土築之方滿自此之後龍窟移于建昌寺佛殿下與西廊龍井通焉而建昌橋下往往損人而不甚也詢問吏卒往時人馬溺於其間良乆尸浮皆白其血被咒吸已盡而尸乃出焉出戎幕閑談汾水老姥汾水邉有一老姥獲一頳鯉顔色異常不與衆魚同既􅂝歸老姥憐惜且竒之鑿一小池汲水養之經月餘後忽見雲霧興起其頳鯉即騰躍逡廵之間乃漸昇霄漢其水池即竭至夜又復來如故人見之者甚驚訝以為妖怪老姥恐為禍頗追悔焉遂親至小池邉禱祝曰我本惜爾命容爾生反欲禍我􅁘言纔絶其頳鯉躍起雲從風至即入汾水唯空中遺下一珠如彈丸光晶射人其老姥得之衆人不敢取後五年老姥長子患風病漸篤醫莫能療老姥甚傷忽憶取是珠以召良醫其珠忽化為一丸丹老姥曰此頳鯉遺我以救我子答我之惠也遂與子服之其病尋愈出滿湘錄李宣李宣宰陽縣縣左有潭傳有龍居而鱗物尤美李之子惰學愛釣術日往潭上一旦龍見滿潭水發如舒錦被李子褫魄委竿而走盖釣術多以煎燕為餌果發龍之嗜慾也出北夢瑣言濛陽湫彭州濛陽縣界地名清流有一湫鄉俗云此湫龍與西山慈母池龍為婚每嵗一㑹新繁人王睿乃博物者多所辨正嘗鄙之秋雨後經過此湫乃遇西邉雷雨冥晦狂風㧞樹王睿縶馬障樹而避須臾雷電之勢止於湫上倐然而霽天無纎雲詰彼居人正符前説也雲安縣西有小湯溪土俗云此溪龍與雲安溪龍為親此乃不經之談也或一日風雷自小湯溪循蜀江中而不至雲安縣雲物回薄入溪中疾電狂霆誠可畏有栁毅洞庭之事與此相符小湯之事自目覩也鹽井龍王蜀時䕫州大昌鹽井水中往往有龍或白或黄鱗鬛光眀攪之不動唯沮沫而已彼人不以為異近者秭歸永濟井鹵槽亦有龍蟠與大昌者無異識者曰龍之為􅂕瑞也負圖以昇天今乃見於鹵中豈能雲行雨施乎雲安縣漢成宫絶頂有天池深七八丈其中有物如蜥蜴長咫尺五色備具躍於水靣象小龍也有髙遇者為刺史詣宫設醮忽浮出或問監官李徳符曰是何祥也符曰某自生長於此且未常見漢成池中之物髙既無善政諂佛佞神亦已至矣安可定其是非也夷陵清衾覆水或浮出大木横塞水靣號為龍巢遂州髙棟溪潭每嵗龍見一如狼山之事出北夢瑣言尹皓朱梁尹皓鎮華州夏將半出城廵警時蒲雍各有兵戈相持故也因下馬於荒地中得一物如石又如卵其色青黒光滑可愛命左右收之又行三二十里見村院佛遂寘於像前其夜雷霆大震猛雨如注天火燒佛堂而不損佛像盖龍卵也院外柳樹數百株皆倒植之其卵已失出玉堂閑話太平廣記卷四百二十四
