body:
  text: 太平廣記卷八十五異人五趙知微撃竹子張濬金州道人李生徐明府華隂店嫗李客蜀城賣藥人劉處士張武茅山道士逆旅客教坊樂人子蔣舜卿趙知微九華山道士趙知微乃皇甫𤣥真之師少有凌雲之志入兹山結廬於鳳皇嶺前諷誦道書鍊志幽寂蕙蘭以為服松栢以為糧趙數十年遂臻𤣥牝由是好竒之士多從之𤣥真既申弟子禮服勤執敬亦十五年至咸通辛卯嵗知微以山中鍊丹須西土藥者乃使𤣥真來京師寓於玉芝觀之上清院皇甫枚時居蘭陵里第日與相從因詢趙君事業𤣥真曰自吾師得道人不見其惰容常云分杯結霧之術化竹釣鯔之方吾久得之固耻為耳去嵗中秋自朔霖霪至於望夕𤣥真謂同門生曰堪惜良宵而值苦雨語頃趙君忽命侍童曰可備酒果遂遍召諸生謂曰能昇天柱峰翫月否諸生雖唯應而竊議以為濃隂駚雨如斯若果行將有墊巾角折屐齒之事少頃趙君曳杖而出諸生景從既闢荆扉而長天廓清皓月如晝捫蘿援篠及峰之巔趙君處𤣥豹之茵諸生藉芳草列侍俄舉巵酒詠郭景純遊仙詩數篇諸生有清嘯者歩虚者鼔琴者以至寒蟾隐於逺岑方歸山舍既各就榻而淒風飛雨宛然衆方服其竒致𤣥真碁格無敵黄白術復得其要妙壬辰嵗春三月歸九華後亦不更至京洛出三水小牘撃竹子撃竹子不言姓名亦不知何許人年可三十餘在成都酒肆中以手持二竹節相學鏗然鳴響有聲可聽以唱歌應和乞丐於人宛然詞㫖皆合道意得錢多飲酒人莫識之如此則十餘年矣一旦自詣東市賣生藥黄氏子家從容謂曰余知長者好道復多氣義有日矣今欲將誠素奉訖得否黄氏子曰君有事但得言之撃竹子謂曰我乞丐之人也在北門外七里亭橋下盤泊今病甚多􅂲不濟若終焉之後敢望特與燒􅅡今自齎錢兩貫文充買柴用慎勿觸我之心肝是所託也隂隲自有相報因留其錢黄氏自不取則固留而去黄氏子翌日至橋下果見撃竹子卧於蒹葭之上見黄氏子來忻然感謝徐曰余疾不起復與黄氏子金二斤又曰昨言不用令人觸我心肝則幸也珍重且辭言訖而逝黄氏子亦憫然出涕太息者久之遂令人易衣服備棺歛將出於郊野堆積柴炭祭而焚之即聞異香馥郁林鳥鳴呌至晚只餘其心終不燃燼復又其大如斗黄氏子收以歸城速語令人以杖觸之忽聞炮烈其聲如雷人馬皆駭逡廵有人長尺餘自烟熖中出廼撃竹子也手撃其竹嘹然有聲杳杳而上黄氏子悔過作禮衆人皆歎竒異於戲得非不觸其心復在人間乎觸其心便可上賓乎復欲於黄氏子顯其蜕化乎始知成都廼神仙所聚之處如撃竹子者亦已多矣大凡不可以貧賤行乞之士而輕易者焉出野人閒話張濬黄巢犯闕僖宗幸蜀張濬白身未有名第時在河中永樂莊居里有一道人或麻衣或羽帔不可親狎一日張在邨路中行後有喚張三十四郎駕前待爾破賊廻顧乃是此道人濬曰一布衣爾何階縁而能破賊乎道者勉其入蜀時濬母有疾未果南行道者乃遺兩粒丹曰服此可十年無恙濬得藥奉親所疾痊復後歴登台輔道者亦不復見破賊之説何其驗哉出北夢𤨏言金州道人金統水在金州巢冦犯闕之年有崔某為安康守大駕已幸岷峨惟金州地僻户口晏如忽有一道人詣崔言事曰方今中原版蕩乗輿播遷宗社陵夷鞠為茂草使君豈無心殄冦乎崔曰泰山既隤一木搘之可乎客曰不然所言殄者不必以劔㦸爭鋒力戰原野崔曰公將如何客曰使君境内有黄巢谷金統水知之乎曰不知請詢其州人州人曰有之客曰巢賊禀此而生請使君差丁役齎畚鍤同往掘之必有所得乃去州數百里深山中果有此名號者客遂令尋源而斸之乃使斷其山岡窮其泉源泉源中有一窟窟中有一黄腰人既逼之遂舉身自撲呦然而卒穴中又獲寳劔一客又曰吾為天下破賊訖崔遂西向進劔及黄腰未逾劔利聞巢賊已平大駕復國矣出王氏見聞録李生中和末有明經李生應舉如長安途遇道士同行宿數日言意相得入關相别因言黄白之術道士曰㸃化之事神仙淺術也但世人多貪將以濟其侈故仙道秘之夫至道不煩仙方簡易今人或貴重其藥艱難其事皆非也吾觀子性靜而寡欲似可教者今以方授子趣以濟乏絶而已如遂能不仕亦當不匱衣食如得禄則勿復為為之則貪也仙道所不許也因手䟽方授之而别方常藥草數種而已每遇乏絶依方為之無不成者後及第歴州縣官時時為之所得轉少及為南昌令復為之絶不成矣從子智修為沙門李以數丸與之智修後逰鍾離止賣藥家燒銀得二十兩以易衣時劉仁軌為刺史方好其事為人所告遁而獲免出稽神録徐明府金鄉徐明府者隱而有道術人莫能測河南劉崇逺崇龜從弟也有妹為尼居楚州常有一客尼寓宿忽病勞痩甚且死其妹省之衆共見病者身中有氣如飛蟲入其姊衣中遂不見病者死姊亦病俄而劉氏舉院皆病病者輒死劉氏既函崇逺求於明府徐曰爾有别業在金陵可致金陵絹一匹吾為爾療之如言送絹訖翌日劉氏夢一道士執簡而至以簡徧撫其身身中白氣騰上如炊既寤遂輕爽能食異於常日頃之徐封絹而至曰置絹席下寢其上即差矣如其言遂愈已而視其絹乃畫一持簡道士如所夢者出稽神録華隂店嫗楊彦伯廬陵新淦人也童子及第天復辛酉嵗赴選至華隂舍於逆旅時京國多難朝無親識選事不能如期意甚憂悶㑹豫章邸吏姓楊鄉里舊知同宿於是因教已云凡行旅至此未嘗不禱金天必獲夢寐之報縱無夢則此店之嫗亦能知方來事茍獲一言亦可矣彦伯因留一日精意以祠之爾夕竟無夢既曙店嫗方迎送他客又無所言彦伯愈怏怏將行復失其所着鞋詰責童僕甚喧既即路嫗乃從而呼之曰少年何其喧耶彦伯因具道其事嫗曰嘻此即神告也夫將行而失其鞋是事皆不諧矣非徒如此而已也京國將有亂當不可復振君當百艱備歴然無憂也子之爵禄皆在江淮官當至門下侍郎彦伯因思之江淮安得有門下侍郎遂行至長安適㑹大駕西幸隨至岐隴梁冦圍城三年彦伯辛苦備至駕既出城彦伯逃還吉州刺史彭珍厚遇之累攝縣邑偽吳平江西復見選用登朝至户部侍郎㑹臨軒策命齊王彦伯攝門下侍郎行事既受命思店嫗之言大不悦數月遂卒出稽神録李客李客者不言其名嘗披蓑戴笠繋一布囊在城中賣殺䑕藥以一木䑕記或有人買藥即曰此不惟殺䑕兼能療人衆病但將拌飡之即愈人惡其䑕藥少有服餌者有百姓張贊賣書為業父年七十餘久患風疾一日因䑕囓其文字數卷贊甚怒買藥將以飼䑕贊未寢燈下見大䑕數頭出爭食之贊言必中其毒倐忽俄見皆有羽翼望門飛出贊深異之因就李客語之客曰應不是䑕汝勿誕言贊更求藥言已盡矣從此遁去其父取䑕殘食之頓覺四體能屈伸下牀履歩如舊日出野人閒話蜀城賣藥人前蜀嘉王頃為親王鎮使理􅅟置得一鐵鏡下有書十二字人莫能識命工磨拭光可鑒物挂於臺上百里之内並見復照見市内有一人㺯刀鎗賣藥遂喚問此人云只賣藥元不弄刀鎗嘉王曰吾有鐵鏡照見爾賣藥者遂不諱仍請鏡看以手劈破肚内鏡於肚中足不著地冉冉昇空而去竟不知何所人其列之如左世出王谿編事劉處士張易在洛陽遇處士劉某頗有竒術易恒與之逰劉嘗賣銀與市中人欠其直劉從易往索之市人既不酬直且大罵劉劉歸謂易曰彼愚人不識理於是吾當小懲之不爾必將為土地神靈之所重譴也既夜滅燭就寢劉牀前熾炭燒藥易寐未熟暗中見一人就爐吹火火光中識其面乃向之市人也迨曙不復見易後求之問市人云一夕夢人召去逼使吹火氣殆不續既寤脣腫氣乏旬日乃愈劉恒為河南尹張全義所禮㑹與梁太祖食思魚鱠全義曰吾有客能立致之即召劉劉使掘小坎汲水滿之垂釣良久即獲魚數頭梁祖大怒曰妖妄之甚者也即杖背二十械繋於獄翌日將殺之其夕亡去劉友人為登封令其日至縣謂令曰吾有難從此逝矣遂去不知所之出稽神録張武張武者始為廬江道中一鎮副將頗以拯濟行旅為事嘗有老僧過其所武謂之曰師年老前店尚逺今夕止吾廬中可乎僧忻然其鎮將聞之怒曰今南北交戰間諜如林知此僧為何人而敢留之也僧乃求去武曰吾業已留師行又益晚但宿無苦也武室中惟有一牀即以奉其僧已即席地而寢盥濯之備皆自具焉夜數起視之至五更僧乃起而歎息謂武曰少年乃能如是耶吾有藥贈子十丸每正旦吞一丸可延十年之夀善自愛珍重而去出門忽不見武今為常州團練副使有識者計其年已百嵗常自稱七十輕健如故出稽神録茅山道士茅山道士陳某壬子嵗逰海陵宿於逆旅雨雪方甚有同宿者身衣單葛欲與同寢而嫌其垢弊乃曰寒雪如此何以過夜答曰君但卧無以見憂既皆就寢陳竊視之見懐中出三角碎瓦數片鍊條貫之燒於燈上俄而火熾一室皆煖陳去衣被乃得寢未明而行竟不復也出稽神録逆旅客大梁逆旅中有客不知所從來恒賣皁莢百莖於市其莢豐大有異於常日獲百錢輒飲而去有好事者知其非常人乃與同店而宿及夜穴壁窺之方見鉏治牀前數尺之地甚熟既而出皁莢實數枚種之少頃即生時窺之轉復滋長向曙則已垂實矣即自采掇伐去其樹剉而焚之及明攜之而去自是遂出莫知所之出稽神録教坊樂人子教坊樂人有兒年十餘嵗恒病黄痩尤甚忽遇一道士於路謂之曰汝病食癥耳吾能療之因袖中出藥數丸使吞之既而復視袖中曰嘻誤矣此辟穀藥也自此當不食然病亦瘳矣爾必欲食嘗取少木耳食之吾他日復以食癥藥遺爾也遂去兒歸一二日病愈然其父母恒以不食為憂竟逼使餌木耳遂飯噉如故已而自悔曰我餌仙藥而不自知道士許我復送藥來㑹當再見乎因白父母求徧歴名山尋訪道士母不許其父許之曰向使不愈今亦死矣既志堅如此或當有分也遂遣之今不知所在出稽神録蔣舜卿光州檢田官蔣舜卿行山中見一人方採林檎一二枚與之食因爾不飢家人以為得鬼食不治將病求醫甚切而不能愈後聞夀春有叟善醫乃往訪之始行一日宿一所旅店有老父問以所患具告之父曰吾能救之無煩逺行也出藥方寸匕服之此二林檎如新父收之去舜卿之飲食如常既歸他日復訪之店與老父俱不見矣出稽神録太平廣記卷八十五
