body:
  text: 太平廣記巻十五神仙十五道士王纂貞白先生桓闓蘭公阮基道士王纂道士王纂者金壇人也居馬跡山常以陰功救物仁逮蠢𩔖值西晉之末中原亂離饑饉既臻疫癘乃作時有毒瘴殞斃者多閭里凋荒死亡枕藉纂於靜室飛章告𤣥三夕之中繼之以泣至第三夜有光如晝照其家庭即有瑞風景雲紛郁空際俄而異香天樂下集庭中介金執鋭之士三千餘人羅列若有所候頃之珠幢寳幡蜺斾羽節紅旂錦斾各二相對前引幢居其前節最居後又四青童執花捧香二侍女捧案地舒錦席前立巨屏左右龍虎將軍侍從官將各二十許人立屏兩面若有備衛焉復有金甲大將軍二十六人神五十人次龍虎二君之外班列肅如也須臾笙簧駭空自北而至五色竒光灼爍􅃩逸一人佩劒持版而前告纂曰太上道君至矣於是百寳大座自空而下太上大道君侍二真人二天帝在座之上道君五色蓮花二真二帝立侍焉纂拜手迎謁跪伏於地道君曰子愍念生民形于章真刳心投血感動幽㝠地司列言吾得以鑒躬於子矣纂匍匐禮謝竟道君告曰夫一陰一陽化育萬物而五行為之用五行且有相勝各有盛衰代謝推遷間不容息是以生生不停氣氣相勝億刼已來未始暫輟也得其生者合於純陽升於天而仙得其死者淪于至陰在地而為鬼鬼物之中自有優劣强弱剛柔善惡與人世無異玉皇天尊慮鬼神之肆横害於人也常命五帝三官檢制部御之律令刑章罔不明備然而季世之民澆偽者衆淳源既散妖詐萌生不忠於君不孝於親違三綱五常之教自投死地由是六天故氣魔鬼之徒與歴代已來將敗軍死聚結為黨亦戕害生民駕雨乘風因衰伺隙為種種病中傷極多亦有不終天年罹其夭枉者昔於杜陽宫出神呪經授真人唐平使其流布以救於物民間有之世人見王翦白起之名謂為虛誕此葢從來將領者生為兵綂死為鬼帥有功者遷為陰官殘害者猶居魔屬乘五行敗氣為瘵為瘥然以陽為憚以神呪服之自當弭戢矣今以神化神呪二經復授於子按而行之以拯護萬民也即命侍童披九光之韞以神化經及三五大齋之訣授之於纂曰勉而勤之陰功克成真階可冀也言訖千乘萬騎西北而舉昇還上清矣纂按經品齋科行於江表疫毒鎭弭生靈乂康自晉及兹蒙其福者不可勝紀焉出神仙感遇傳貞白先生貞白先生陶君諱𢎞景字通明吳荆州牧濬七世孫丹陽人也母初娠夢青龍出懷并二天人降手執香爐覺語左右言當孕男子非凡人多恐無後及生標異幼而聰識長而愽達因讀神仙傳有乘雲馭龍之志年十七與江斆褚炫劉俊為宋朝昇明四友仕齊歴諸王侍讀年二十餘稍服食後就興世觀主孫先生咨禀經法精行道要殆通幽洞微傳奉朝請乃拜表解職答詔優歎賜與甚厚公卿祖之於征虜亭供帳甚盛咸云宋齊已來未有斯事遂入茅山又得楊許真書遂登巖告静自稱華陽隱居書疏亦以此代姓名至明年時議欲迎往􅃽山懇辭得止然勅命餉賚恒為繁極乃造三層樓棲止身居其上弟子居中接賔於下令一小竪傳度而已潛光𨼆耀内修祕宻深誠所詣遠屬靈人可謂感而遂通矣身長七尺八寸為性圓通謙謹心如明鏡遇物便了深慕張良之為人率性輕虛飄飄然頗有雲間興其所通者皆得於心非傍識所能及長於詮正謬偽地理厯算文不空發成即為體造渾天儀轉之與天相會其撰真誥𨼆訣注老子等書二百餘卷至永平三年深藏向晦及梁武帝革命議國號未定先生乃引諸䜟記定梁應運之符又擇交禪日靈驗昭著勅使入山宣㫖酬謝帝既早與之交遊自此後動靜必報先生既得祕㫖妙訣以為神丹可成恒苦無藥帝給之又手敕咨迓先生因畫二牛一散放於水間一著金籠一人執䋲以杖驅之帝笑曰此人無所不作欲效曵尾龜豈可致邪其時每有大事無不已前陳奏時人謂之山中宰相以大同初獻二刀一名善勝一名成勝為佳寳梁武初未知道敎先生漸悟之後詣張天師道裕建立𤣥壇三百所皆先生之資也梁元帝金樓子云予於𨼆士重陶貞白士大夫重周𢎞正其於義理精博無窮亦一時名士也先生嘗作詩云夷甫任散誕平叔坐譚空不信昭陽殿化作單于宫其時人皆談空理不習武事侯景之難亦如所言先生以大同二年丙辰歲三月壬寅朔十二日癸丑告化時年八十一顔色不變屈伸如常室中香氣積日不散以其月十四日􅉎於雷平山同軒轅之葬衣冠如子喬之藏劒舄比於兹日可得符焉詔追贈中散大夫諡貞白先生仍勅舍人監䕶馬樞得道傳云受蓬萊都水監弟子數百人有先得道者唯王遠知陸逸冲桓清遠嗣先生之徳焉唐天寳元年追贈金紫光禄大夫太保梁邵陵王蕭綸為碑銘焉出神仙感遇傳桓闓桓闓者不知何許人也事華陽陶先生為執役之士辛勤十餘年性常謹黙沈静奉役之外無所營為一旦有二青童白鶴自空而下集𨼆居庭中𨼆居欣然臨軒接之青童曰太上命求桓先生耳𨼆居黙然心計門人無姓桓者命求之乃執役桓君耳問其所修何道而致此桓君曰修黙朝之道積年親朝太帝九年矣乃有今日之召將昇天陶君欲師之桓固執謙卑不獲請陶君曰某行敎修道勤亦至矣得非有過而淹延在世乎願為訪之他日相告於是桓君服天衣駕白鶴昇天而去三日宻降陶君之室言曰君之陰功著矣所修本草以䖟蟲水蛭軰為藥功雖及人而害於物命以此一紀之後當解形去世署蓬萊都水監耳言訖乃去陶君復以草木之藥可代物命者著别行本草三卷以贖其過焉後果解形得道出神仙感遇傳蘭公兗州曲阜縣髙平鄉九原里有至人蘭公家族百餘口精專孝行感動乾坤忽有斗中真人下降蘭公之舍自稱孝弟王云居日中為仙王月中為明王斗中為孝弟王夫孝至於天日月為之明孝至於地萬物為之生孝至於民王道為之成具其三才肇分始於三氣三氣者玉清三天也玉清境是元始太聖真王治化也太清者𤣥道流行虛無自然玉皇所治也吾於上清已下託化人間示陳孝道之敎後晉代嘗有真仙許遜傳吾孝道之宗是為衆仙之長因付蘭公至道秘㫖於是蘭公獲斯妙訣穎悟真機黙辨往由顧知前事因與里人共出郊野忽覩古塚三所乃云此是吾三仙解化之墳請民報官令移塜旁之路勿令人物踐蹋吏乃訊于蘭公此言以何驗實公曰第一塜者昔有真人骸骨今乃已得復形是為地仙長生久視第二塜見有仙衣一對道經一函復有一人方如醉臥發之良久乃能話談此以太陰錬形綿養真氣耳第三塜有玉液丹服之白日便當冲翥于時官吏與蘭公對開三塜其所明騐一一並同蘭公乃詣塜間躬取仙衣掛體又取金丹服之招邀臥塜二真人同共聳身而輕舉官吏悔謝䖍懇拜陳啓問蘭公何時下降公曰我自此每十日一至于斯更逾數年百日一降施行孝道宜准𤣥科接濟樊籠符臻至道自爾吳都十五童子丹陽三歲靈孩洎於蘭公並是仙之化現也所傳孝道之秘法别有寳經一帙金丹一合銅符鐵劵得之者唯高明大使許真君焉出十二真君傳阮基阮基者河内人也以周武帝建徳七年因射熊入王屋山東北見一道士坐松樹下神状竒異基遂捨弓矢稽首起居已師命基曰可暫往觀中眺望巖間忽有一童子引基到觀門臺殿嚴麗皆飾以金玉土地清淨皆紺碧琉璃行樹端直緑葉朱實清風時起鏘然有聲基於門下觀覽心神惶怖載拜請退即至師所師笑曰汝不敢進邪基曰凡夫肉人不識大道忽於今日得覩天堂情誠喜悦不能自勝願師𢎞慈濟基沈溺師曰汝積罪人也先身微縁今得遇我汝命將盡其奈之何基聞不勝惶悚叩頭千百求乞生津師遂令基捨惡從善誓棄弓矢乃授基智惠上品十戒兼為設蔬食食訖令去基載拜奉辭師曰汝命絶之時吾將度汝其年冬基得暴病而卒唯左手一指尚煖家人不即𦵏之三日而活久能言言云初見黄衣使者二人執文書引基去忽至一處状如臺府至屏門使者引入見大㕔上有官人𨼆隐階前小吏數十人皆執簿書或青或黒有一吏執黒簿謂基曰汝積罪深厚應入地獄基聞倉卒惶怖莫知何言良乆思之忽憶聖師心中作念初别之時言臨命絶時必來度汝今日危困幸垂救濟須臾天西北端雲忽起雲車冉冉自空而下直至階前去地丈餘而止乃見聖師在車中坐冥官見之皆稽首作禮聖師曰我有弟子在此故來度之乃取經一卷付基基載拜跪受題云太上救苦經令基讀之一遍㝠官皆稽首受命聽訖謂基曰可去勿住此深勤精進後更與汝相見言訖失師所在唯覺香氣氛氲久之乃見一黄衣使者引基至家唯聞家號泣之聲基乃還活凝坐良久追憶夢中經不遺一字乃慎持念遂抄録傳于世復辭親友入王屋山莫知所在出神仙感遇傳太平廣記卷十五
