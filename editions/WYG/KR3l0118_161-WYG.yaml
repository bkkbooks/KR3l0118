body:
  text: 太平廣記卷一百六十一感應一張寛漢武帝醴泉淮南子揚雄劉向𡊮安樊英五石精律呂陳業陳實三州人魏任城王呂䖍管寧河間男子宜陽女子張應南郡掾蒲坂精舍吳興經堂南徐士人徐祖劉京何敬叔蕭子懋蕭叡明解叔謙宗元卿匡昕曾康祖張寛張寛字叔文漢時為侍中從祀于甘泉至渭橋有女子浴于渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寛在第七車對曰天星主祭祀者齋戒不嚴即女人星見出漢武故事漢武帝漢武帝嘗微行造主人家家有婢國色帝悦之仍留宿夜與主婢臥有一書生亦寄宿善天文忽見客星將掩帝座甚逼書生大驚懼連呼咄咄不覺聲髙仍又見一男子操刀將入户聞書生聲急謂為己故遂縮走客星應時而退如此者數過帝聞其聲異而問之書生具説所見帝乃悟曰必此人壻也將欲肆兇惡於朕仍召集期門羽林語主人曰朕天子也於是擒奴問而欵服乃誅之帝歎曰斯葢天啓書生之心以扶祐朕躬乃厚賜書生焉醴泉太山之東有醴泉其形如井本體是石也欲取飲者皆洗心跪而挹之則泉出如流多少足用若或汚慢則泉縮焉葢神明之常志者也出法苑珠林淮南子淮南子曰東風至而酒汎溢許慎云東風震方也酒汎清酒也木味酸相感故也髙誘云酒汎為米麫麯之汎者風至而沸動李淳風又按今酒初熟甕上澄清時恒隨日轉在旦則清者在東畔午時在南日落在西夜半在子恒清者隨日所在又春夏間於地廕下停春酒者甕上蟻汎皆逐風而移雖居深密非風所至而感召動也出感應經揚雄揚雄讀書有人語云無為自苦𤣥故難𫝊忽然不見雄著𤣥夢吐白鳳皇集上頃之而滅出西京雜記劉向漢劉向於成哀之際校書于天祿閣專精覃思夜有老人著黄衣藜杖扣閣而進見向暗中獨坐誦書老人乃吹杖端爛然火明因以照向説開闢已前事乃授洪範五行之文向裂衣及紳以記其言至曙而去請問姓名云我是太乙之精聞金卯之姓有博學者下而觀之焉乃出懷中竹牓有天文地圖之事子歆從向授此術出王子年拾遺記𡊮安𡊮安為隂平長有惠化縣先有雹淵冬夏未嘗消釋歳中輒出飛布十數里大為民害安乃推誠潔齋引愆貶已至誠感神雹遂為之沉淪伏而不起乃無苦雨凄風焉出小説樊英漢樊英善圖緯洞達幽微永泰中見天子因西向南唾詔問其故對曰成都今日火後蜀郡上言火災如英所道云時有雨從東北來故火不為大害英嘗忽被髮拔刀斫擊舍中妻怪問其故英曰郗生遇賊郗生者名巡是英弟子時逺行後還説於道中逢賊賴一被髮老人來相救故得免永建時殿上鐘自鳴帝憂之公卿莫能解乃問英英曰蜀岷山崩母崩子故鳴非聖朝災也尋上蜀山崩事出英列傳五石精論衡曰陽燧取火方諸取水二物皆當以形勢得陽燧若偃月方諸若圬杯若二器如板狀安能得水火也鑄陽燧用五月丙午日午時鍊五色石為之形如圓鏡向日即得火方諸以十一月壬子夜半時鍊五色石為之狀如圬杯向月即得津水今取大蜯蛤向月亦有津潤淮南子云陽燧見日熯而為火方諸見月津而為水注云皆五石之精陽燧圓以仰日得火方諸圬而向月得水又云陽燧之取火於日方諸之取露於月天地之間𤣥微忽恍巧厯所不能推其數然以掌握之中引𩔖於太極之上而水火可立致者隂陽相感動然也出感應經律呂物理論云十二律呂候氣先於平地為室三重重有三重壁揚子所謂九閉之中也外室南户以布為幔次室北户内室南户並以布為幔皆上圓下方閉密無風人居其中三日觀之十二律各以木為按每律各内庳外髙以律加其上依位安置之以河内葭莩灰實其端若氣至吹灰去管首小動為和大動為臣彊李淳風云自古言樂聲律呂者皆本於十二管以氣應灰飛為驗後魏末孫僧化造六甲一周厯其序云以管律候某月某時律氣應推挍前後五六事皆不與算厯家術數相符此外諸書無言候氣得應驗者以理推尋恐無實錄後魏信都芳自云造風扇候二十四氣每一氣至其扇輒舉斯又驗矣出感應經陳業陳業字文理業兄渡海傾命時同依止者五六十人骨肉消爛而不可辨别業仰皇天誓后土曰聞親戚者必有異焉因割臂流血以灑骨上應時㰱血餘皆流去出㑹稽先賢傳陳實潁川陳實有子元方次曰仲方並以名德稱兄弟孝養閨門雍睦海内慕其風四府並命無所屈就兄弟嘗過同郡荀爽夜會飲宴太史奏德星聚出汝南先賢傳三州人晉三州人約為父子父令二人作舍於大澤中欲成父曰不如河邊乃徙焉又幾成父曰不如河中二人乃負土填河三旬不立有書生過為縛兩土豚投河中父乃止二人曰何嘗見江河填耶吾觀汝行耳明迴至河邊河中土為髙丈餘袤廣十餘里因居其上出孝子𫝊魏任城王魏任城王彰薨如漢東平王禮葬及喪出聞空中數百人泣聲送者言昔亂軍殺傷者皆無棺槨王之仁惠收其朽骨死者歡於地下精靈以之懷感焉出王子年拾遺記呂䖍魏長沙郡久雨太守呂䖍令户曹掾齋戒在社三日三夜祈晴夢見白頭翁曰汝來遲明日當霽果然出長沙𫝊管寧管寧死遼東三十七年歸柩而阻海風同行數十船俱沒惟寧船望見火光投之得島嶼及上岸無火亦無人𤣥晏先生以為積善之感出獨異志河間男子晉武帝世河間郡有男女相悦許相配適既而男從軍積年父母以女别適人無幾而憂死男還悲痛乃至塚所始欲哭之不勝其情遂發塚開棺即時蘇活因負還家將養數日平復其夫乃往求之其人不還曰卿婦已死天下豈聞死人可復活耶此天賜我非卿婦也於是相訟郡縣不能決讞於廷尉廷尉奏以精誠之至感於天地故死而更生在常理之外非理之所處刑之所裁斷以還開塚者出法苑珠林宜陽女子晉永嘉之亂郡縣無定主彊弱相暴宜陽縣有女子姓彭名娥父母昆弟十餘口為長沙賊所殺時娥負器出汲於溪間賊至走還正見牆壁已破不勝其哀與賊相格賊縛娥驅出溪邊將殺之溪際有大山石壁髙數十丈仰呼曰皇天寧有神否我為何罪而當如此因奔走向山山立開廣數丈平路如砥羣賊亦逐娥入山山遂崩合泯然如初賊皆壓死娥遂隱不復出娥所捨汲器化為石形似雞土人因號曰石雞山女娥潭出幽冥錄張應晉厯陽郡張應先奉魔娶佛家女為婦咸和八年移居蕪湖妻病因為魔事家財略盡而病不瘥妻曰我本佛家女為我作佛事應即往精舍中見竺曇鏡鏡曰普濟衆生但君當一心受持耳曇鏡期明當向其家應夕夢一人長五六尺趨步入門曰此家寂寂乃爾不淨見鏡隨此人後白曰此家始欲發意未可責之應眠覺便把火作髙座及鬼子母座鏡食時往髙座之屬具足已成應具向説夢遂夫妻受五戒病亦得瘥出辯正論南郡掾晉南郡議曹掾姓歐得病經年骨消肉盡巫醫備至無復方計其子夜如得睡眠夢見數沙門來視其父明旦便往詣佛圖見諸沙門問佛為何神沙門為説事狀便將諸道同歸請讀經再宿病人自覺病如輕晝得小眠如舉頭見門中有數十小兒皆五綵衣手中有持幡杖者持刀矛者於門走入有兩小兒在前徑至簾前忽便還走語後衆小人云住居中總是道人遂不復來前自此後病漸漸得差出靈鬼志蒲坂精舍宋元嘉八年河東蒲坂城大失火不可救惟精舍大小儼然及白衣家經像皆不損墜百姓驚異倍共發心出辯正論吳興經堂宋元嘉中吳興郡内嘗失火燒數百家蕩盡惟有經堂草舍儼然不燒時以為神出宣驗記南徐士人宋少帝時南徐有一士子從華山往雲陽見客舍中有一女子年可十八九悦之無因遂成心疾母問其故具以啓母母往至華山雲陽尋見女子具説之女聞感之因脱蔽膝令母密藏於席下臥之當愈數日果差忽舉席見蔽膝持而泣之氣欲絶謂母曰葬時從華山過母從其意比至女門牛打不行且待須臾女粧㸃沐浴竟而出歌曰華山畿君既為儂死獨活為誰施君若見憐時棺木為儂開言訖棺木開女遂投棺中因合葬呼曰神士塚出系䝉徐祖嘉興徐祖幼孤叔隗養之如所生隗病祖營侍甚勤是夜夢一神人吿云汝叔應合死也祖叩頭祈請哀愍二神人云念汝如此為汝活祖覺叔乃差出搜神記劉京臨江郡民劉京孝行鄉里推敬時江水暴溢居者皆漂溺京負其母號泣忽有大龜至其前舉家七口俱上龜背然行十許里及一髙岸龜遂失之出九江記何敬叔何敬叔少奉佛法作一檀像未有木先夢一沙門衲衣杖錫來云縣後何家桐甚精苦求庶可得如夢求之果獲出夢雋蕭子懋齊晉安王蕭子懋字雲昌武帝之子也始年七歳阮淑媛嘗病危篤請僧行道有獻蓮華供佛者衆僧以銅罌盛水浸之如此三日而花不萎子懋流涕禮佛誓曰若使阿姨因此勝緣遂獲㝠祐願華竟齋如故七日齋畢色更鮮紅看視罌中稍有根鬚淑媛病尋差當世稱其孝感出法􅁐珠林蕭叡明齊松滋令蘭陵蕭叡明母患積年叡明晝夜祈禱時寒凍叡明下淚凝結如筯額上扣血成氷不溜忽有一人以石函授之曰此能治太夫人病叡明跪而受之忽然不見以函奉母中惟三寸絹丹書為日月字母病即愈出談藪解叔謙齊鴈門解叔謙徵為朝請不赴母疾叔謙夜於庭中稽顙祈福聞空中云得丁公藤為酒便差訪醫及本草無識者乃﨑嶇求訪至宜都境遙見山中老翁伐木問其所用答曰此丁公藤治風尤驗叔謙再拜流涕具欵行求之意此翁愴然以藤與之并示其漬酒之法叔謙受領此人不復知處依法為酒母疾便愈出談藪宗元卿齊南陽宗元卿有志行早孤為母所養母病元卿在逺輒心痛大病則大痛小病則小痛以此為常則鄉里宗敬率號宗曾子出談藪匡昕齊廬陵匡昕隱金華山服食不與俗人交母亡已經數日昕奔還號呌母便蘇孝感致也出談藪曾康祖齊扶風曾康祖母患乳癰諸醫不能療康祖乃跪以兩手捧乳大悲泣母癰即差出談藪太平廣記卷一百六十一
