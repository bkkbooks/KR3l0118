body:
  text: 太平廣記卷三百八十六宋李昉等編再生十二賈偶章汎謝宏敞妻梁氏朱氏李彊名妻荆州女子周哲滯妻劉長史女盧頊表姨劉氏子妻延陵村人妻趙某妻賈偶漢建安中南陽賈偶字文合得病而亡時有吏將詣太山司命閱簿謂吏曰當召某郡文合何以召此人可速遣之時日暮遂至郭外樹下宿見一少女子獨行文合問曰子𩔖衣冠何乃徒歩姓字為誰女曰某三河人父見為弋陽令昨被召而來今得却還遇日暮懼獲𤓰田李下之譏望君之容必是賢者是以停留依馮左右文合曰悦子之心願交歡於今夕女曰聞之諸姑女子以貞專為徳潔白為稱文合反覆與言終無動志天明各去文合卒已再宿停喪將殮視其面有色捫心下稍温少頃却蘇文合欲驗其事遂至弋陽修刺謁令因問曰君女寧卒而却蘇耶具説女子姿質服色言語相反覆本末令人問女所言皆同初大驚嘆竟以女配文合焉出捜神記章汎臨海樂安章汎年二十餘死經日未殯而蘇云被録天曹天曹主者是其外兄料理得免初到時有少女子同被録送立住門外女子見汎事散知有力助因泣涕脱金釧三􅃗及臂上雜寳託汎與主者求見救濟汎即為請之并進釧物良久出語汎已論秋英亦同遣去秋英即此女之名也於是俱去脚痛疲頓殊不堪行㑹日亦暮止道側小窟状如客舍而不見主人汎共宿嬿接更相問女曰我姓徐家吳縣烏門臨瀆為居門前倒􅀥樹即是也明晨各去遂並活汎先為護軍府吏依假出都經呉乃對烏門依此尋索得徐氏舍與主人叙闊問秋英何在主人云女初不出入君何知其名汎因説昔日魂相見之由秋英先説之所言因得主人乃悟甚羞不及寝嬿之事而其鄰人或知以語徐氏徐氏試令侍婢數人遞出示汎汎曰非也乃令秋英見之則如舊識徐氏謂天意遂以妻汎生子名曰天賜出異苑謝宏敞妻唐吳王文學陳郡謝宏敞妻髙陽許氏武徳初遇患死經四日而蘇説云被二三十人拘至地獄未見官府即聞喚雖不識面似是姑夫沈吉光語音許問云語聲似是沈丈何因無頭南人呼姑姨夫皆為某姓丈也吉光即以手提其頭置於膊上而誡許曰汝且在此勿向西院待吾為汝造請即應得出許遂住吉光經再宿始來語許云汝今此來王欲令汝作女伎倘引見不須道解絃管如不為所悉可引吾為証也少間有吏拘按引入王果問解絃管否許曰不解沈吉光具知王問吉光答云不解王曰宜早放還不須留也於時吉光欲發遣即共執按人籌度許不解其語執按人云娘子功徳雖彊然為先有少罪隨便受却身業俱淨豈不快哉更東引入一院其門極小見有人受罪許甚驚懼乃求於主者曰平生修福何罪而至斯耶答曰娘子曽以不淨盌盛食與親須受此罪方可得去遂以銅汁灌口非常苦毒比蘇時口内皆爛吉光即云可於此人處受一本經記取將歸受持勿怠自今已去保年八十有餘許生時素未誦經蘇後遂誦得一卷詢訪人間所未曽有今見受持不闕吉光其時尚存後二年方始遇害凡諸親屬有欲死者三年前並於地下預見許之從父弟仁則説之出㝠祥記梁氏咸陽有婦人姓梁貞觀年中死經七日而蘇自云被收至一大院見㕔上有官人據按執筆翼侍甚盛令勘問此婦人合死否有吏人賫一按云與合死者同姓名所以追耳官人敕左右即放還吏白官人云不知梁有何罪請即受罪而歸官人即令勘按云梁生平唯有兩舌惡罵之罪更無别罪即令一人拔舌一人執斧斫之日常數四凡經七日始送令歸初似落深崖少時如睡覺家人視其舌上猶大爛腫從此以後永斷酒肉至今猶存出㝠報拾遺朱氏唐鄭州武陽縣婦女姓朱其夫先負外縣人絹夫死之後遂無人還貞觀末因病死經再宿而蘇自云被人執至一所見一人云我是司命府史汝夫生時負我家絹若干匹所以追汝今放汝歸宜急具物至某縣某村送還我母如其不送追捉更切兼為白我孃努力為造像修福朱即告某乙鄉閭得絹送還其母具言其男貌状有同平生其母亦對之流涕歔欷久之出法苑珠林李彊名妻隴西李彊名妻清河崔氏甚美其一子生七年矣開元二十二年彊名為南海丞方暑月妻因暴疾卒廣州囂熱死後埋棺於土其外以塹圍而封之彊名痛其妻夭年而且逺官哭之甚慟日夜不絶聲數日妻見夢曰吾命未合絶今帝許我活矣然吾形已敗帝命天鼠為吾生肌膚更十日後當有大鼠出入墼棺中即吾當生也然當封閉門戸待七七日當開吾門出吾身吾即生矣及旦彊名言之而其家僕妾夢皆協十餘日忽有白鼠數頭出入殯所其大如㹠彊名異之試發其柩見妻骨有肉生焉遍體皆爾彊名復閉之積四十八日其妻又見夢曰吾明晨當活盍出吾身既曉彊名發之妻則蘇矣扶出浴之妻素美麗人也及乎再生則美倍於舊膚體玉色倩盻多姿袨服靚粧人間殊絶矣彊名喜形於色時廣州都督唐昭聞之令其夫人觀焉於是别駕以下夫人皆從彊名妻盛服見都督夫人與抗禮頗受諸夫人拜薄而觀之神仙中人也言語飲食如常人而少言衆人訪之久而一對若問㝠間事即杜口雖夫子亦不答明日唐都督夫人置饌請至家諸官夫人皆同觀之悦其柔姿艶美皆曰目所未覩既而别駕長史夫人等次其日列筵請之至宅而都督夫人亦往如是已二十日矣出入如人唯沉靜異於疇日既彊名使於桂府七旬乃還其妻去後為諸家所迎往來無恙彊名至數日妻復言病病則甚間一日遂亡計其再生纔百日矣或曰有物憑焉出記聞荆州女子開元二十三年荆州女子死三日生自言具見㝠途善惡國家休咎鬼王令其傳語於人主荆州以聞朝廷駭異思見之敕給驛騎令至洛行至南陽遂喑不能言更無所識至都以其妄也遣歸出記聞周哲滯妻汝南周哲滯妻者戸部侍郎席豫之女也天寳中暴疾危亟殆死平生素有衣服悉捨為功徳唯有一紅地繡珠綴背襠是母所賜意猶惜之未言其疾轉劇又命佛工以背襠於疾所鑄二軀佛未畢而卒初羣鬼摶撮席氏登大山忽聞背後有二人喚令且住羣鬼乃遷延不敢動二人既至顔色滋黒灰土滿面羣鬼畏懼莫不駭散遂引席氏還家聞家人號哭二人直至屍前令入其中乃活二人即親鑄二佛也出廣異記劉長史女吉州劉長史無子獨養三女皆殊色甚念之其長女年十二病死官舍中劉素與司邱掾髙廣相善俱秩滿與同歸劉載女喪還髙廣有子年二十餘甚聰慧有姿儀路次豫章守氷不得行兩船相去百餘歩日夕相往來一夜髙氏子獨在船中披書二更後有一婢年可十四五容色甚麗直詣髙云長史船中燭滅來乞火耳髙子甚愛之因與戲調妾亦忻然就焉曰某不足顧家中小娘子艶絶無􅀟為郎通意必可致也髙甚驚喜意為是其存者因與為期而去至明夜婢又來曰事諧矣即可便待髙甚踊躍立候於船外時天無纎雲月甚清朗有頃遙見一女自後船出從此婢直來未至十歩光彩映發馨香襲人髙不勝其意便前持之女縱體入懐恣態横發乃與俱就船中倍加欵密此後夜夜輙來情念彌重如此月餘日忽謂髙曰欲論密事得無嫌難乎髙曰固請説之乃曰兒本長史亡女命當更生業得承奉君子若垂意相採當為白家令知也髙大驚喜曰幽明契合千載未有方當永同枕席何樂如之女又曰後三日必生使為開棺夜中以面乗霜露飲以薄粥當遂活也髙許諾明旦遂白廣廣未之甚信亦以其絶異乃使詣劉長史具陳其事夫人甚怒曰吾女今已消爛寧有玷辱亡靈乃至此耶深拒之髙求之轉苦至夜劉及夫人俱夢女曰某命當更生天使配合必謂喜而見許今乃靳固如此是不欲某再生耶及覺遂大感悟亦以其姿色衣服皆如所白乃許焉至期乃共開棺見女姿色鮮明漸有暖氣家中大驚喜乃設幃幕於岸則舉置其中夜以面承露晝哺飲父母皆守視之一日轉有氣息稍開目至暮能言數日如故髙問其婢云先女死屍柩亦在舟中女既蘇遂臨悲泣與決乃擇吉日遂於此地成婚後生數子因名其地號為禮㑹村也出廣異記盧頊表姨洺州刺史盧頊表姨常畜一猧子名花子每加念焉一旦而失為人所斃後數月盧氏忽亡㝠間見判官姓李乃謂曰夫人天命將盡有人切論當得重生一十二年拜謝而出行長衢中逢大宅有麗人侍婢十餘人將遊門屏使人呼夫人入謂曰夫人相識耶曰不省也麗人曰某即花子也平生蒙不以獸畜之賤常加養育某今為李判官别室昨所囑夫人者即某也㝠司不廣其請只加一紀某潛以改十二年為二十以報存育之恩有頃李至伏願白之本名無為夫人之號懇將力祈李逡巡而至至别坐語笑麗人首以圗乙改年白李李將讓之對曰妾平生受恩以此申報萬不獲一料必無難之李欣然謂曰事則匪易感言請之切遂許之臨將别謂夫人曰請收餘骸為瘞埋之骸在履信坊街之北牆委糞之中夫人既蘇驗而果在遂以子禮葬之後申謝於夢寐之間後二十年夫人乃亡也出𤣥怪録劉氏子妻劉氏子者少任俠有膽氣常客遊楚州淮隂縣交遊多市井惡少鄰人王氏有女求聘之王氏不許後數嵗因饑遂從戎數年後役罷再遊楚鄉與舊友相遇甚歡常恣遊騁晝事弋獵夕㑹狹邪因出郭十餘里見一壊墓棺柩暴露歸而合飲酒時將夏夜暴雨初止衆人戲曰誰能以物送至壊冢棺上者劉乗酒恃氣曰我能之衆曰若審能之明日衆置一筵以賞其事乃取一塼同㑹人列名於上令生持去餘人飲而待之生獨行夜半至墓月初上如有物蹲踞棺上諦視之乃一死婦人也生捨塼於棺背負此屍而歸衆方歡語忽聞生推門如負重之聲門開直入燈前置屍於地卓然而立面施粉黛髻髮半披一座絶倒亦有奔走藏伏者生曰此我妻也遂擁屍至牀同寢衆人驚懼至四更忽覺口鼻微微有氣診視之即已蘇矣問所以乃王氏之女因暴亡不知何由至此未明生取水與之洗面濯手整釵髻疾已平復乃聞鄰里相謂云王氏女將嫁暴卒未殮昨夜因雷遂失其屍生乃以告王氏王氏悲喜乃嫁生焉衆咸歎其㝠契亦伏生之不懼也出原化記延陵村人妻延陵靈寳觀道士謝又損近縣村人有喪婦者請又損為齋婦死已半月矣忽聞推棺而呼衆皆驚走其夫開棺視之乃起坐頃之能言云為舅姑所召去云我此無人使之執爨其居處甚閒潔但苦無水一日見溝中水甚清因取以漉饋姑見之大怒曰我不知爾不潔如是用爾何為因逐之使迴走出門遂蘇今尚無恙出稽神録趙某妻丁亥嵗浙西有典客吏趙某妻死未及大殮忽大呌而活云為吏所録至鶴林門内有府署侍衛嚴整官吏諮事及領囚禁者甚衆吏持已入至庭下堂上一緑衣一白衣偶坐緑衣謂吏曰汝誤非此人也急遣之白衣曰已追至此何用遣也緑衣不從相質食頃緑衣怒叱吏遣之吏持已疾趨出路經一橋數十人方修橋無板有釘吏持之走過釘傷足因痛失聲遂活視足果傷俄而鄰婦暴卒不復蘇矣出稽神録太平廣記卷三百八十六
