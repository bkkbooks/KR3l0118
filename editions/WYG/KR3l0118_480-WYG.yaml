body:
  text: 太平廣記卷四百八十宋李昉等編蠻夷一四方蠻夷無啟民帝女子澤毛人軒轅國白民國歐絲輆沐國泥離國然丘盧扶國浮忻國頻斯吳明國女蠻國都播骨利突厥吐蕃西北􅂽鶴民契丹沃沮僬僥四方蠻夷東方之人鼻大竅通於目筋力屬焉南方之人口大竅通於耳西方之人面大竅通於鼻北方之人竅通於陰短頸中央之人竅通於口出酉陽雜爼無啓民無啓民居穴食土其人死埋之其心不朽百年化為人録民膝不朽埋之百二十年化為人細民肝不朽八年化為人出酉陽雜俎帝女子澤帝女子澤性妒有從婢散逐四山無所依託東偶狐狸生子曰殃南交猴有子曰溪北通玃猳所育為傖出酉陽雜俎毛人八􅂽之中有毛人焉長七八尺皆於人形身及頭上皆有毛如獮猴毛長尺餘短􅸇􆀓上音生下音管見人則賏古陌反自開口吐舌上唇覆面下唇覆胷熹許記反食人舌鼻牽引共戲不與即去名曰髯公俗曰髯麗一名髯狎小兒髯可畏也出酉陽雜爼軒轅國軒轅之國在窮山之際其不夀者八百歲諸天之野和鸞鳥舞民食鳯卵飲甘露出博物志白民國白民之國有乗黄狀若狐背上有角乗之夀三千年出博物志歐絲歐絲之野女子乃跪據樹歐絲出博物志輆沐國越東有輆沐之國音善愛反其長子生則解而食之謂之冝弟父死則負其母而棄之言鬼妻不可與共居楚之南炎人之國其親戚死刳其肉而棄之然後埋其骨乃成孝子也秦之西有義渠之國其親戚死聚柴而焚之薰其煙上謂之登煙霞然後成為孝此上以為政下以為俗而未足為非也見墨子出博物志泥離國成王即位三年有泥離之國來朝其人稱自發其國常従雲裏而行聞雷霆之聲在下或入潛穴又聞波瀾之聲在上或泛巨水視日月以知方面所向計寒暑以知年月考以中國正朔則序厯相符王接以外賔之禮也出拾遺録然丘成王六年然丘之國獻比翼鳥雌雄各一以玉為樊其國使者皆拳頭尖鼻衣雲霞之布如今朝霞也經厯百餘國方至京師越鐵峴泛沸海有虵洲蜂岑鐵峴峭厲車輪各金剛為輞比至京師輪皆銚鋭幾盡沸海皆湧起如煎魚也魚鼈皮骨堅强如石可以為鎧泛沸海之時以銅薄舟底龍虵蛟不得近也又經虵洲則豹皮為屋於屋内推車經蜂岑燃胡蘇之木末以此木煙能殺百蟲經途五十餘年乃至洛邑成王封太山禪社首使發其國之時人並童稚乃至京師鬂髪皆白及還至然丘容貌還復壮比翼鳥多力状似鵠衝南海之舟泥巢崑岑之𤣥木而至其中遇聖則來翔集以表周公輔聖之神力也出王子年拾遺記盧扶國盧扶國燕昭王時來朝渡玉河萬里方至國中無惡禽獸水不揚波風不折枝人皆夀三百歲結草為衣是謂之卉服至死不老咸和孝讓夀登百歲已上拜敬如至親之禮塟於野外以香木靈草翳揜於尸閭里弔送號泣之聲動於林谷溪原為之止流春木為之改色居喪水漿不入口至死者骨為埃塵然後乃食昔大禹随山導川乃至其地為無老純孝之國出王子年拾遺浮忻國元封元年浮忻歲貢蘭金之泥此金出湯淵盛夏之時水常沸湧有若湯火飛鳥不能過國人行者常見水邉有人冶此金為器混若泥如紫磨之色百鑄其色變白有光如銀名曰銀燭常以為泥封諸函匣及諸宫門鬼魅不敢干當漢世上将出征及使絶國多以泥為印封衛青張騫蘇武傅介子之使皆受金泥之璽封也帝崩後乃絶出王子年拾遺頻斯魏帝為陳留王之歲有頻斯國人來朝以五色玉為衣如今之鎧不食中國滋味自齎金壺中有神漿凝如脂嘗一滴則夀千年其國有大楓木為林髙六七十里善算者以里計之雷電常出樹之半其枝交陰上蔽不見日月之光其下平净掃灑雨霧不能入焉樹東有大石室可容萬人坐壁上刻有三皇之像天皇十三頭地皇十一頭人皇九頭皆龍身亦有膏燭之處緝石為牀牀上有膝痕二三寸牀前有竹簡長二寸書大之文皆言開闢已來事人莫能識言是伏羲畫卦之時有此書或言蒼頡造字之處旁有丹石井非人工所鑿下及漏泉水常沸涌諸仙欲飲之時以長綆引汲頻斯國民皆多力拳頭不食五榖月中無影食桂漿其人髪引之則長置則目縮如螺續此人髪以為繩以及丹井方冬得升合之水水中有白蛙兩翅常去來井上征者食之至周王子晉臨井而窺有青雀吐杓以授子晉取而飲之乃有雲起雪飛子晉以衣袖撝雪則雲霽雪止白蛙化為白鴈入雲揺揺遂滅此則頻斯人所記葢其人年不可測也使圖其山川地勢瑰異之屬以示張華華云此神異之國難可驗信使車馬珍服送之出闗出拾遺録吳明國貞元八年吳明國貢常燃鼎鸞蜂蜜云其國去東海數萬里經揖婁沃沮等國其土宜五榖多珍玉禮樂仁義無剽劫人夀二百歲俗尚神仙術一歲之内乗雲駕鶴者往往有之常望黄氣如車葢知中國土德王遂願貢奉常燃鼎量容三斗光潔似玉其色紫毎修飲􅄿不熾火而俄頃自熟香潔異於常等久而食之令人返老為少百疾不生也鸞蜂􅁡云其蜂之聲有如鸞鳯而身被五彩大者可重十餘斤為窠於深巖峻嶺閒大者占地二三畝國人採其􅁡不逾二三合如過度即有風雷之異若螫人生瘡以石上菖蒲根傅之即愈其色碧貯之於白玉椀表裏瑩徹如碧琉璃久食令人長夀顔如童子髪白者應時而黒逮及沉疴眇跛無不療焉出杜陽雜編女蠻國大中初女蠻國貢雙龍犀有二龍鱗鬛爪角悉備明霞錦雲鍊水香麻以為色光輝映曜芬馥著人五色相間而美於中華錦其國人危髻金冠頭絡被體故謂之菩薩蠻當時倡優遂製菩薩蠻曲文士亦往往聲其詞更女王國貢龍油綾魚油錦文彩多異入水不濡云有龍油魚油也優者更作女王國曲音調宛暢𫝊於樂部矣出杜陽雜編都播都播國鐵勒之别種也分為三部自相統攝其俗結草為廬無牛羊不知耕稼多百合取以為糧衣貂鹿之皮貧者亦緝鳥羽為服國無刑罰偷盜者倍徵其􅂍出神異録骨利骨利國居廻紇北方瀚海之北勝兵四千地出名馬晝長夜短天色正曛煮一羊胛才熟東方已曙葢近日入之所也出神異録突厥突厥事祅神無祠廟刻氊為形盛於毛袋行動之處以脂蘇塗或繫之竿上四時祀之堅昆部落非狼種其先所生之窟在曲漫山北自謂上代有神與㹀牛交於此窟其人髪黄目緑赤髭髯其髭髯俱黒者漢將李陵及兵衆之後也西屠俗染齒令黒出酉陽雜俎又突厥之先曰射摩舍利海神神在阿史得􅁡西射摩有神異海神女每日暮以白鹿迎射摩入海至明送出經數十年後部落將大獵至夜中海神謂射摩曰明日獵時爾上代所生之窟當有金角白鹿出爾若射中此鹿畢形與吾往來或射不中即縁絶矣至明入圍果所生窟中有白鹿金角起射摩遣其左右固其圍将跳出圍遂殺之射摩怒遂手斬呵􅀈首領仍誓之曰自此之後須人祭天常取呵􅀈即取部落子孫斬之以祭也至今突厥以人祭部落用之射摩既斬阿􅀈至暮還海神女執射摩曰爾手斬人血氣腥穢因縁絶矣出酉陽雜俎吐蕃唐貞元中王師大破吐蕃於青海臨陣殺吐蕃大兵馬使乞蔵遮遮及諸者或云是尚結贊男女吐蕃乃収尸歸國有百餘人行哭隨尸威儀絶異使一人立尸旁代語使一人問瘡痛乎代語者曰痛即膏藥塗之又問曰食乎代者曰食即為具食又問曰衣乎代者曰衣即命裘衣之又問歸乎代者曰歸即具輿馬載尸而去譯語者傳也若此異禮必其國之貴臣也出咸通録西北􅂽西北􅂽中有玉饋之酒酒泉在焉廣一丈深三丈酒美如肉清澄如鏡上有玉樽玉􅇼取一樽復生焉與天同休無乾時石邉有脯焉味如麞脯飲此酒人不生死此井問人與天同生雖男女不夫婦故言不生死出神異記鶴民西北海戌亥之地有鶴民國人長三寸日行千里而歩疾如飛每為海鶴所吞其人亦有君子小人如君子性能機巧每為鶴患常刻土為己狀或數百聚於􅂽野水際以為小人吞之而有患凡百千度後見真者過去亦不能食人多在山澗溪岸之旁穿穴為國或三十步五十步為一國如此不啻千萬春夏則食路草實秋冬食草根值暑則裸形遇寒則編細草為衣亦解服氣出窮神祕苑又一説四海之外有鵠國焉男女皆長七寸為人自然有禮如經諭跪拜其人皆夀三百歲行千里百物不敢犯之雖畏海鶴陳章與齊桓公言鵠遇吞之亦夀三百歲此人鵠中不死而鵠亦一舉千里陳章與齊桓公所言小人也出神異録契丹盧文進幽州人也至南封范陽王嘗云陷契丹中屢又絶塞射獵以給軍食正晝方獵忽天色晦黒衆星粲然衆皆懼捕得蕃人問之至所謂笡却日也此地以為常尋當復矣頃之乃明日猶午也又云常於無定河見人腦骨一條大如柱長可七尺云出稽神録沃沮母邱儉遣王傾追髙麗王官盡沃沮東東界問其耆老海東有人不耆老言國人嘗乗船捕魚遭風見吹數十日東得一島上有人言語不相曉其俗嘗以七月取童女沉海又言有一國亦在海中純女無男又説得一布衣從海中浮出其身如中人其衣兩袖長二尺又得一破船隨浪出在海岸邉有一人項中復有面生就之與語不相通不食而死其地皆在沃沮東大海中出博物志僬僥李章武有人腊三寸餘頭髀肋成就眉目分明言是僬僥國人出酉陽雜俎太平廣記卷四百八十
