body:
  text: 太平廣記卷四百二十二龍五許漢陽劉禹錫周邯資州龍韋思㳟盧元裕尺木史氏子許漢陽許漢陽者其先汝南郡人也少攻文藻貞元中南逰舟行於洪饒間㑹日暮江波激湍舟人惶恐急尋小浦路入沿之行不覺已三四里俄到一湖中雖廣而水纔三二尺又北行一里許見湖岸竹樹森茂乃投以泊舟漸近見亭宇甚盛有二青衣雙鬟方鵶素靣如玉迎舟而笑漢陽訝之而調以游詞又大笑復走入宅漢陽束𢃄上岸投謁未行三數歩青衣延入宅内㕔揖坐云女郎易服次須臾青衣命漢陽入中門見滿庭皆大池池中荷芰芬芳四岸斐如碧玉作兩道虹橋以通南北北有大閣上階見白金書曰夜明宫四靣竒花果木森聳連雲青衣引上閣一層又有青衣六七人見者列拜又引第二層方見女郎六七人目未嘗睹皆拜問所來漢陽具述不意至此女郎揖坐訖青衣具飲食所用皆非人間見者食訖命酒其中有竒樹髙數丈枝幹如梧葉似芭蕉有紅花滿樹未吐盎如杯正對飲所一女郎執酒命一青衣捧一鳥如鸚鵡置飲前欄干上呌一聲而樹上花一時開芳香襲人每花中有美人長尺餘婉麗之姿掣曳之服各稱其質諸樂管絃盡備其人再拜女郎舉酒衆樂俱作蕭蕭泠泠音如神仙纔一廵已夕月色復明女郎所論皆非人間事漢陽所不測時因漢陽以人事辯之則女郎一無所酧答歡飲至二更筵宴已畢其樹花片片落池中人亦落便失所在一女郎取一卷文書以示漢陽覽之乃江海賦女郎令漢陽讀之遂為讀一遍女郎又請自讀一遍命青衣收之一女郎謂諸女郎兼語漢陽曰有感懐一章欲請誦之女郎及漢陽曰善乃吟曰海門連洞庭每去三千里十載一歸來辛苦瀟湘水女郎命青衣取諸卷兼筆硯請漢陽與錄之漢陽展卷皆金花之素上以銀字札之卷大如拱斗已半卷書過矣觀其筆乃白玉為管研乃碧玉以玻璃為匣研中皆研銀水寫畢令以漢陽之名押之展向前見數首皆有人名押署有名仲方者有名巫者有名朝陽者而不見姓女郎遂收索卷漢陽曰有一篇欲奉和擬繼此可乎女郎曰不可此亦每歸呈父母兄弟不欲雜爾漢陽曰適以弊名押署復可乎曰事别非君子所諭四更已來命悉收拾揮霍次一青衣曰郎可歸舟矣漢陽乃起諸女郎曰忻此旅泊接奉不得鄭重耳恨恨而别歸舟忽大風雲色陡暗寸歩黯黒至平明觀夜來飲所乃空林樹而已漢陽􅄙纜行至昨晚􅨀口江岸人家見十數人似有非常因泊舟而訊人曰江口溺殺四人至二更後却撈出三人已卒其一人雖似死而未甚有巫女以楊栁水灑拂禁呪乆之能言曰昨夜水龍王諸女及姨姊妹六七人歸過洞庭宵宴於此取我軰四人作酒掾客少不多飲所以我却得來漢陽異之乃問曰客者謂誰曰一措大耳不記姓名又云青衣言諸小娘子苦愛人間文字不可得嘗欲請一措大文字而無由又問今在何處已發舟也漢陽乃念昨宵之事及感懐之什皆可驗也漢陽黙然而歸舟覺腹中不安乃吐出鮮血數升知悉以人血為酒爾三日方平出博異志劉禹錫唐連州刺史劉禹錫貞元中寓居滎澤首夏獨坐林亭忽然間大雨天地昏黒乆方開霽獨亭中杏樹雲氣不散禹錫就視樹下有一物形如龜鱉腥穢頗甚大五斗釡禹錫因以瓦礫投之其物即緩緩登階止于簷柱禹錫乃退立於牀下支䇿以觀之其物仰視柱杪即以前趾抉去半柱因大震一聲屋瓦飛紛亂下亭内東壁上下罅裂丈許先是亭東紫花苜蓿數畝禹錫時於裂處分明遥見雷既收聲其物亦失而東壁之裂亦已自吻合矣禹錫亟視之苜蓿如故壁曽無動處出集異記周邯貞元中有處士周邯文學豪俊之士也因夷人賣奴年十四五視其貌甚慧􅃛言善入水如履平地令其沉潛雖經日移時終無所苦云蜀之溪壑潭洞無不届也邯因買之易其名曰水精異其能也邯自蜀乗舟下峽抵江陵經瞿塘艶澦遂令水精沉而視其邃逺水精入移時而出多探金銀器物邯喜甚每􅋈船於江潭皆令水精沉之復有所得㳂流抵江都經牛渚磯古云最深處是温嶠爇犀照水怪之濵又使没入移時復得寳玉云甚有水怪莫能名狀皆怒目㦸手身僅免禍因茲邯亦至富贍後數年邯有友人王澤牧相州邯適河北而訪之澤甚喜與之遊宴日不能暇因相與至州北隅八角井天然盤石而甃成八角焉濶可三丈餘旦暮烟雲蓊欎漫衍百餘歩晦夜有光如火紅射出千尺鑒物若晝古老相𫝊云有金龍潛其底或亢陽禱之亦甚有應澤曰此井應有至寶但無計而究其是非耳邯笑曰甚易遂命水精曰汝可與我投此井到底看有何怪異澤亦當有所賞也水精已乆不入水忻然脱衣沉之良乆而出語邯曰有一黄龍極大鱗如金色抱數顆明珠熟寐水精欲劫之但手無刃憚其龍忽覺是以不敢觸若得一利劍如龍覺當斬之無憚也邯與澤大喜澤曰吾有劍非常之寶也汝可持往而劫之水精飲酒伏劍而入移時四靣觀者如堵忽見水精自井靣躍出數百歩續有金手亦長數百尺爪甲鋒頴自空拏攫水精却入井去左右懾慄不敢近覩但邯悲其水精澤恨失其寶劍逡廵有一老人身衣褐裘貌甚古朴而謁澤曰某土地之神使君何容易而輕其百姓此穴金龍是上𤣥使者宰其瑰璧澤潤一方豈有信一微物欲因睡而劫之龍忽震怒作用神化揺天闗擺地軸搥山岳而碎邱陵百里為江湖萬人為魚鱉君之骨肉焉可保昔者鍾離不愛其寳孟嘗自返其珠子不之效乃肆其貪婪之心縱使奸猾之徒取寳無憚今已㗖其軀而鍜其珠矣澤赧恨無詞而對又曰君須火急悔過而禱焉勿使甚怒耳老人倐去澤遂具牲牢奠之出𫝊竒資州龍韋臯鎮蜀末年資州獻一龍身長丈餘鱗甲悉具臯以木匣貯之蟠屈於内時屬元日置於大慈寺殿上百姓皆傳縱觀二三日為香烟薫死國史闕書是何祥也出紀聞韋思恭元和六年京兆韋思恭與董生王生三人結友於嵩山岳寺肄業寺東北百餘歩有取水盆在岩下圍丈餘而深可容十斛旋取旋増終無耗一寺所汲也三人者自春居此至七月中三人乗暇欲取水路臻於石盆見一大蛇長數丈黒若純漆而有白花似錦蜿蜒盆中三子見而駭視之良乆王與董議曰彼可取而食之韋曰不可昔葛陂之竹漁父之梭雷氏之劍尚皆為龍安知此名山大鎮豈非龍潛其身􅁘况此蛇鱗甲尤異於常者是可戒也二子不納所言乃投石而扣蛇且死縈而歸烹之二子皆咄韋生之詐潔俄而報盆所又有蛇者二子之盆所又欲擊韋生諫而不允二子方舉石欲投蛇騰空而去及三子歸院烹蛇未熟忽聞山中有聲殷然地動覘之則此山間風雲暴起飛沙走石不瞬息至寺天地晦暝對面相失寺中人聞風雲暴起中云莫錯擊須臾雨火中半下書生之宇並焚蕩且盡王與董皆不知所在韋子於寺廊下無事故神化之理亦甚昭然不能全為善但吐少善言則蛟龍之禍不及矣而况於常行善道哉其二子尸迨兩日於寺門南隅下方索得斯乃韋自説至於好殺者足以為戒矣出博異志盧元裕故唐太守盧元裕未仕時嘗以中元設幡幢像置盂蘭于其間俄聞盆中有唧唧之音元裕視見一小龍纔寸許因盛諸盂水之内投之于江纔及中流風浪皆作蒸雲走雷咫尺昏晦俄有白龍百尺拏攫昇天衆咸觀之良乆乃㓕出集異記尺木龍頭上有一物如博山形名尺木龍無尺木不能昇天出酉陽雜俎史氏子有史氏子者唐元和中曽與道流遊華山時暑甚憇一小溪忽有一葉大如掌紅殷可愛隨流而下史獨接得寘於懐中坐食頃覺懷中冷重潛起觀之其上鱗栗栗而起史驚愳棄林中遂白衆人此必龍也可速去須臾林中白烟生彌布一谷史下山未半風雨大至出酉陽雜俎太平廣記卷四百二十二
