  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_476-1a, image: WYG1046/WYG1046-0488a.png}
body:
  text: 太平廣記卷四百七十六宋李昉等編昆蟲四赤腰蟻蘇湛石憲王叟歩蚓守宫冉端蚓齒韋君陸顒赤腰蟻段成式元和中假居在長興里庭有一穴蟻形狀竊赤蟻之大者而色正黒腰節微赤首鋭足髙走最輕迅每生致蠖及小蟲入穴輙壊垤窒穴盖防其逸也自後徙居數處更不復見蘇湛唐元和中蘇湛遊蓬鵲山裹糧鑚火境無遺趾忽謂妻曰我行山中都倒巖有光如鏡必靈境也明日將投之今與卿訣妻子號泣止之不得及明遂行妻子領奴婢潛随之入山數十里遥望巖有白光圓明徑丈蘇遂逼之纔及其光長呌一聲妻兒遽前救之身如繭矣有黒蜘蛛大如鈷䥈走集巖上奴以利刀决其網方斷蘇已腦陷而死妻乃積柴燒其巖臭滿一山並出酉陽雜爼石憲有石憲者其籍編太原以商為業常貨於代北長慶二年夏中鴈門關行道中時暑方盛因偃大木下忽夢一僧蜂目披褐衲其状竒異来憲前謂憲曰我廬於五臺山之南有窮林積水出塵俗甚逺實羣僧清暑之地檀越幸偕我而遊乎即不能吾見檀越病熱且死得無悔於心耶憲以時暑方盛僧且以禍福語相動因謂僧曰願與師偕去於是其僧引憲西去且數里果有窮林積水見羣僧在水中憲怪而問之僧曰此𤣥隂池故我徒浴於中且以蕩炎燠於是引憲環池行憲獨怪羣僧在水中又其狀貌無一異者已而天暮有一僧曰檀越可聴吾徒之梵音也於是憲立池上羣僧即於水中合聲而噪僅食頃有一僧挈手曰檀越與吾偕浴於𤣥隂池慎無畏憲即隨僧入池中忽􅁴一身盡冷噤而戰由是驚悟見已臥於大木下衣盡濕而寒慄且甚時已日暮即抵村舍中至明日病稍愈因行於道聞道中有蛙鳴甚𩔖羣僧之梵音於是徑往尋之行數里窮林積水有蛙甚多其水果謂𤣥隂池者其僧乃羣蛙耳憲曰此蛙能易形以惑於人豈非怪尤者乎於是盡殺之出宣室志王叟寳歴初長沙有民王叟者家貧力田為業一日耕於野為蚯蚓螫其臂痛楚甚遂馳以歸其痛益不可忍夜呻而曉晝吟而夕如是者凡旬餘有醫者云此毒之甚者也病之始庶藥有及状且深矣則吾不得而知也後數日病益甚忽聞臂有聲幽然而微若蚯蚓者又數日其聲益大如合千萬音其痛亦隨而多焉是夕乃卒出宣室志歩蚓段成式三從房伯父唐大和三年任廬州某官庭前忽有蚓出大如食指長大二三丈白項當項下有兩足正如雀脚歩於垣下經數日方死出酉陽雜爼守宫太和末荆南松滋縣有士人寄居親故莊中肄業初到之夕二更後方張燈臨案忽有小人半寸葛巾䇿杖入門謂士人曰乍到無主人當寂寞其聲大如蒼蠅士人素有膽氣初若不見乃登膝責曰遽不存主客禮乎復升案窺書詬詈不已因覆硯於書上士人不耐以筆擊之墮地呌數聲出門而滅有頃有婦人四五或老或少皆長一寸大呼曰貞官以君獨學故令郎君言展且論精奥何癡頑狂率輙致損害今可見貞官其来索續如蟻狀如騶卒撲縁士人士人恍然若夢因囓四支疾苦甚復曰汝不去将損汝眼四五頭遂上其靣士人驚懼隨出門至堂東遥望見一門絶小如節使牙門士人乃呌何物怪魅敢凌人如此復被衆囓之恍惚間已入小門内見一人峩冠當殿階下侍衛千數悉長寸餘叱士人曰吾憐汝獨處俾小兒往何苦致害罪當腰斬乃見數十人悉持刃攘臂逼之士人大懼謝曰某愚騃肉眼不識貞官乞賜餘生久之曰且解知悔叱令曳出不􅁴已在小門外及歸書堂已五更矣殘燈猶在及明尋其蹤跡東壁古堦下有小穴如栗守宫出入焉士人即雇數夫發之深數丈有守宮十餘石大者色赤長尺許盖其王也壤土如樓狀士人聚蘇焚之後亦無他出酉陽雜爼冉端忠州墊江縣吏冉端唐開成初父死有嚴師者善山岡為卜地云合有王氣羣聚之物掘深丈餘遇蟻城方數丈外重雉堞皆具子城樵櫓工若彫刻城内分徑街小垤相次每垤有蟻數千憧憧不絶徑甚淨滑樓中有二蟻一紫色長寸餘足作金色一有羽細腰稍小白翅翅有經􅍺疑是雌者衆蟻約有數斛城隅小壤上以堅土為盖故中樓不損既掘露蟻大擾若求救狀縣吏遽白縣令李𤣥之既覩勸吏改卜嚴師代其卜騐為其地告縣吏請遷蟻於巖側狀其所為仍布石粟覆之以板經旬嚴師忽得病若狂或自批觸穢詈大呼數日不已𤣥之素厚嚴師因為祝蟻療以雄黄丸方愈出酉陽雜爼蚓齒段成式姪女乳母阿史本荆州人嘗言小時見鄰居有姪孔謙籬下有蚓口露雙齒肚下足如蚿長尺五行疾於常蚓謙惡遽殺之其年謙喪母及兄叔因不得活出酉陽雜爼韋君有御史韋君嘗從事江夏後以奉使至京既還道次商於舘亭中忽見亭柱有白蜘蛛曳而下状甚微韋君曰是人之患也吾聞雖小螫人良藥無及因以指殺焉俄又有一白者下如前所殺之且觀其上有網為窟韋乃命左右挈帚盡掃去且曰為人患者吾已除矣明日将去因以手撫其柱忽􅁴指痛遂不可忍乃是有一白蜘蛛螫其上韋君驚即拂去俄遂腫延不數日而盡一臂由是肩舁至江夏醫藥無及竟以左臂潰為血血盡而終先是韋君先夫人在江夏夢一白衣人謂曰我弟兄三人其二人為汝子所殺吾告上帝帝用憫其寃且遂吾請言畢夫人驚寤甚異之惡不能言後旬餘而韋君至具得其狀方寤所夢􅁴為夢日果其館亭時也夫人泣曰其能乆乎數日而韋君終矣出宣室志陸顒吳郡陸顒家於長城其世以明經仕顒自幼嗜麵為食愈多而質愈瘦及長從本軍貢於禮部既下第遂為生太學中後數月有胡人數輩挈酒食詣其門既坐顧謂顒曰吾南越人長蠻貊中聞唐天子網羅天下英俊且欲以文物化動四夷故我航海梯山来中華将觀太學文物之光唯吾子峩焉其冠襜焉其裾莊然其容肅然其儀真唐朝儒生也故某願與子交歡顒謝曰顒幸得籍於太學然無他才能何足下見愛之深也於是相與酣宴極歡而去顒信士也以為羣胡不我欺旬餘羣胡又至持金繒為顒夀顒始疑其有他即固拒之胡人曰吾子居長安中惶惶然有飢寒色故持金繒為子僕馬一日之費所以交吾子歡耳豈有他哉幸勿疑我也顒不得已受金繒及胡人去太學中諸生聞之偕来謂顒曰彼胡率愛利不顧其身争鹽米之微尚致相賊殺者寧肯棄金繒為朋友夀乎且太學中諸生甚多何為獨厚君耶君匿身郊野間以避再来也顒遂僑居於渭水上杜門不出僅月餘羣胡又詣其門顒大驚胡人喜曰比君在太學中我未得盡言今君退居郊野果吾心也既坐胡人挈顒手而言曰我之来非偶然也盖有求於君耳幸望許之且我所祈於君固無害於君則大惠也顒曰謹受教胡人曰吾子好食麵乎曰然又曰食麵者非君也乃君肚中一蟲耳今我欲以一粒藥進君君餌之當吐出蟲則我以厚價從君易之其可乎顒曰若誠有之又安有不可耶已而胡人出一粒藥其色光紫命餌之有頃遂吐出一蟲長二寸許色青狀如蛙胡人曰此名消麺蟲實天下之竒寳也顒曰何以識之胡人曰吾每旦見寳氣亘天在太學中故我為君而取然自一月餘清旦望之見其氣移於渭水上果君遷居焉又此蟲禀天地中和之氣而結故好食麺盖以麥自秋始種至来年夏季方始成實受天地四時之全氣故嗜其味焉君宜以麺食之可見矣顒即以麺斗餘致其前蟲乃食之立盡顒又問曰此蟲安所用也胡人曰夫天下之竒寳俱禀中和之氣此蟲乃中和之粹也執其本而取其末其逺乎哉既而以筒盛其蟲又金函扄之命顒致於寢室謂顒曰明日當再来及明旦胡人以十兩車輦金玉繒帛約數萬獻於顒共持金函而去顒自此大富致園屋為治生具日食梁肉衣鮮衣遊於長安中號豪士僅歳餘羣胡又来謂顒曰吾子能與我偕遊海中乎我欲探海中之竒寳以耀天下而吾子豈非好竒之士耶顒既以甚富又素享閒逸自遂即與羣胡俱至海上胡人結宇而居於是置油膏於銀鼎中搆火其下投蟲於鼎中鍊之七日不絶燎忽有一童分髮衣青襦自海水中出捧月盤盤中有徑寸珠甚多来獻胡人胡人大聲叱之其童色懼捧盤而去僅食頃又有一玉女貌極冶衣霧綃之衣佩玉珥珠翩翩自海中而出捧紫玉盤中有珠數十来獻胡人胡人罵之玉女捧盤而去俄有一仙人戴瑶碧冠帔霞衣捧絳帕籍籍中有一珠徑上寸許竒光泛空照數十歩仙人以琛獻胡人胡人笑而受之喜謂顒曰至寳来矣即命絶燎自鼎中收蟲置金函中其蟲雖鍊之且乆而跳躍如初胡人吞其珠謂顒曰子随我入海中慎無懼顒即執胡人佩帶從而入焉其海水皆豁開數十歩鱗介之族俱辟易回去遊龍宮入蛟室珍珠怪寳惟意所擇纔一夕而獲甚多胡人謂顒曰此可以致億萬之貨矣已而又以珍貝數品遺於顒貨於南越獲金千鎰由是益富其後竟不仕老於閩越中也出宣室志太平廣記卷四百七十六
