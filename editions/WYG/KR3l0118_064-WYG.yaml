body:
  text: 太平廣記卷六十四女仙九楊正見董上仙張連翹張鎬妻太陰夫人楊正見楊正見者眉州通義縣民楊寵女也幼而聰悟仁憫雅尚清虛既笄父母聘同郡王生王亦鉅富好賓客一旦舅姑㑹親故市魚使正見為膾賓客博戱於㕔中日昃而盤食未備正見憐魚之生盆中戲弄之竟不忍殺既晡矣舅姑促責食遲正見懼竄於隣里但行野徑中已數十里不覺疲倦見夾道花木異於人世至一山舍有女冠在焉具以其由白之女冠曰子有愍人好生之心可以教也因留止焉山舍在蒲江縣主簿化側其居無水常使正見汲澗泉女冠素不食為正見故時出山外求糧以贍之如此數年正見恭慎勤恪執弟子之禮未嘗虧怠忽于汲泉之所有一小兒潔白可愛纔及年餘見人喜且笑正見抱而撫憐之以為常矣由此汲水歸遲者數四女冠疑怪而問之正見以事白女冠曰若復見必抱兒徑來吾欲一見耳自是月餘正見汲泉此兒復出因抱之而歸漸近家兒已殭矣視之尤如草樹之根重數斤女冠見而識之乃茯苓也命潔甑以蒸之㑹山中糧盡女冠出山求糧給正見一日食柴三小束諭之曰甑中之物但盡此三束柴止火可也勿輒視之女冠出山期一夕而囘此夕大風雨山水溢道阻十日不歸正見食盡飢甚聞甑中物香因竊食之數日俱盡女冠方歸聞之歎曰神仙固當有定分向不遇雨水壞道汝豈得盡食靈藥乎吾師嘗云此山有人形茯苓得食之者白日昇天吾伺之二十年矣汝今遇而食之真得道者也自此正見容狀益異光彩射人常有衆仙降其室與之論真宫天府之事嵗餘白日昇天即開元二十一年壬申十一月三日也常謂其師曰得食靈藥即日便合登仙所以遲㢠廻者幼年之時見父母揀税錢輸官有明浄圓好者竊藏二錢玩之以此為隱藏官錢過罰居人間更一年耳其昇天處即今卭州蒲江縣主簿化也有汲水之處存焉昔廣漢主簿王興上昇於此出集仙錄董上仙董上仙遂州方義女也年十七神姿艷冶寡於飲膳好靜守和不離於世鄉里以其容德皆謂之上仙之人故號曰上仙忽一旦紫雲垂布并天樂下於其庭青童子二人引之昇天父母素愚號哭呼之不已去地數十丈復下還家紫雲青童旋不復見居數月又昇天如初父母又號泣良乆復下唐開元中天子好尙神仙聞其事詔使徵入長安月餘乞還鄉里許之中使送還家百餘日復昇天父母又哭之因蜕其皮於地乃飛去皮如其形衣結不解若蟬蜕耳遂漆而留之詔置上仙唐興兩觀於其居處今在州北十餘里涪江之濱焉出集仙錄張連翹黄梅縣女道士張連翹者年八九嵗常持瓶汲水忽見井中有蓮花如小盤漸漸出井口往取便縮不取又出如是數四遂入井家人怪乆不囘往視見連翹立井水上及出忽得笑疾問其故云有人自後以手觸其腋痒不可忍父母以為鬼魅所加中夜潛移之舅族方不笑頃之又還其家云飢求食日食數斗米飯雖夜置葅餚於卧所覺即食之如是六七日乃聞食臭自爾不復食嵗時或進三四顆棗父母因命出家為道士年十八晝日於觀中獨坐見天上墮兩錢連翹起就拾之隣家婦人乃推籬倒亦争拾連翹以身據錢上又與黄藥三丸遽起取之婦人擘手奪一丸去因吞二丸俄而皆死連翹頃之醒便覺力强神清倍於常日其婦人吞一丸經日方蘇飲食如故天寳末連翹在觀忽悲思父母如有所適之意百姓邑官皆見五色雲擁一寳輿自天而下人謂連翹已去争來看視連翹初無所覺雲亦消散論者云人衆故不去連翹至今猶在兩脇相合形體枯悴而無所食矣出廣異記張鎬妻張鎬南陽人也少為業勤苦隱玉房山未嘗釋卷山下有酒家鎬執卷詣之飲二三杯而歸一日見美婦人在酒家揖之與語命以同飲欣然無拒色詞㫖明辯容狀佳麗既晚告去鎬深念之通夕不寐未明復往伺之已在酒家矣復召與飲㣲詞調之婦人曰君非常人願有所託能終身即所願也鎬許諾與之歸山居十年而鎬勤於墳典意漸疎薄時或忿恚婦人曰君情若此我不可乆住但得鯉魚脂一斗合藥即足矣鎬未測所用力求以授之婦以鯉魚脂投井中身亦隨下須臾乘一鯉自井躍出凌空欲去謂鎬曰吾比待子立功立事同昇太清今既如斯固子之薄福也他日守位不終悔亦何及鎬拜謝悔過於是乘魚昇天而去鎬後出山歴官位至宰輔為河南都統常心念不終之言每自咎責後貶辰州司户復徵用薨時年方六十每話於賓友終身為恨矣出神仙感遇傳太陰夫人盧把少時窮居東都於廢宅内賃舍鄰有麻氏嫗孤獨把遇暴疾卧月餘麻婆來作羮粥疾愈後晚從外歸見金犢車子在麻婆門外盧公驚異窺之見一女年十四五真神人明日潛訪麻婆麻婆曰莫要作婚姻否試與商量把曰某貧賤焉敢輒有此意麻曰亦何妨既夜麻婆曰事諧矣請齋三日會於城東廢觀既至見古木荒草乆無人居逡巡雷電風雨暴起化出樓臺金殿玉帳景物華麗有輜軿降空即前時女子也與把相見曰某即天人奉上帝命遣人間自求匹偶耳君有仙相故遣麻婆傳意更七日清齋當再奉見女子呼麻婆付兩丸藥須臾雷電黑雲女子已不見古木荒草如舊麻婆與把歸清齋七日斸地種藥纔種已蔓生未頃刻二葫蘆生於蔓上漸大如兩斛甕麻婆以刀刳其中麻婆與把各處其一仍令具油衣三領風雷忽起騰上碧霄滿耳只聞波濤之聲乆之覺寒令着油衫如在氷雪中復令着至三重甚煖麻婆曰去洛已八萬里良乆葫蘆止息遂見宫闕樓臺皆以水晶為墻垣被甲仗戈者數百人麻婆引把入見紫殿從女百人命把坐具酒􅄿麻婆屏立於諸衞下女子謂把君合得三事任取一事當留此宫夀與天畢次為地仙常居人間時得至此下為中國宰相把曰在此處實為上願女子喜曰此水晶宫也某為太陰夫人仙格已高足下便是白日昇天然須定不得改移以致相累也乃賫青紙為表當庭拜奏曰須啓上帝少頃聞東北間聲云上帝使至太陰夫人與諸仙趨降俄有幢節香幡引朱衣少年立階下朱衣宣帝命曰盧把得太陰夫人狀云欲住水晶宫如何杞無言夫人但令疾應又無言夫人及左右大懼馳入取鮫綃五匹以賂使者欲其稽緩食頃間又問盧把欲水晶宫住作地仙及人間宰相此度須决把大呼曰人間宰相朱衣趨去太陰夫人失色曰此麻婆之過速領囘推入葫蘆又聞風水之聲却至故居塵榻宛然時已夜半葫蘆與麻婆並不見矣出逸史太平廣記卷六十四
