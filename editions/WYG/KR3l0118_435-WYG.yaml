body:
  text: 太平廣記巻四百三十五宋李昉等編畜獸二馬周穆王八駿漢文帝九逸隋文帝獅子驄唐𤣥宗龍馬代宗九花虬徳宗神知驄曹洪司馬休之慕容廆秦叔寶張納之宋蔡舞馬續坤楊翁佛季南趙固韓晞江東客馬陳璋馬馬虜中䕶蘭馬五白馬也亦曰玉面謓真馬十三嵗馬也以十三嵗已下可以留種馬八尺戎馬八尺田馬七尺駑馬六尺𤓰州飼馬以薲草沙州以茨萁涼州以勃突渾蜀以稗草以蘿蔔根飼馬馬肥安北飼馬以沙蓬狼針出酉陽雜俎大食國解人語馬闕悉怛國怛幹國出好馬出洽聞記馬四嵗兩齒至二十嵗齒盡平體名有輸鼠外鳬烏頭龍翅虎口猪槽飼馬石灰泥槽汗而繫門三事落駒廻毛在頸白馬黒馬鞍下腋下廻毛在脇白毛左右後足白白馬四足黒目下横毛黄馬白喙旋毛在吻後汗溝上通尾本目赤睫亂及反睫白馬黒目目白却視並不可騎夜眼名附蟬户肝名縣熢亦曰雞舌綠秩方言以地黄甘草噉五十嵗生三駒出酉陽雜俎吐火羅國波訕山陽石壁上有一孔恒有馬尿流出至七月平旦石崖間有石閣道便不見至此日厭噠人取草馬置池邉與集生駒皆汗血日行千里今名無數頗棃隨西域中浴須臾即回圖記云吐火蘿國北有屋數頗棃山即宋雲所云波訕山者也南崖穴中神馬糞流出商胡曹波比親見焉出洽聞記浴馬港疎水流也漢時常有馬數百匹出其中焉形皆小似巴滇馬遂名其孔為馬穴初得此馬乗出沔水上浴之遂名其處曰浴馬溉沔頓宿今名騎亭三國時陸遜攻襄陽又值此穴中有馬十匹遜載還建業出洽聞記漢章帝時蜀郡王阜為益州太守治化尤異神馬四匹出滇池河中唐武徳五年三月景谷縣治西水有龍馬身長八九尺龍形有鱗甲横文五色龍身馬首頂有二角白色口銜一物長可三四尺凌波廻顧百餘歩而没出洽聞記西陵北陸行三十里有石穴名馬穴常有白馬出此穴人逐之潛行出漢中漢中人失馬亦出此穴相去數千里今馬穴山在峽州夷陵出洽聞記周穆王八駿周穆王即位三十二年廵行天下馭八龍之馬一名絶地足不踐土二名翻羽行越飛禽三名奔霄夜行萬里四名越影逐日而行五名踰輝毛色炳燿六名超光一形十影七名騰霧乗雲而趨八名挾翼身有肉翅遞而駕焉按轡徐行以廵天下之域穆王神智逺謀使轍迹徧於四海故絶地之物不期而自服出王子年拾遺記漢文帝九逸漢文帝自代還有良馬九匹皆天下之駿一名浮雲二名赤電三名絶羣四名逸驃五名紫燕騮六名緑螭驄七名龍子八名驎駒九名絶塵號為九逸有來宣能御馬代王號為王良焉出西京雜記隋文帝獅子驄隋文皇帝時大宛國獻千里馬􅎸曵地號獅子驄上置之馬羣陸梁人莫能制上令并羣驅來謂左右曰誰能馭之郎將裴仁基曰臣能制之遂攘袂向前去十餘歩踴身騰上一手撮耳一手摳目馬戰不敢動乃鞴乗之朝發西京暮至東洛後隋末不知所在唐文武聖皇帝敕天下訪之同州刺史宇文士及訪得其馬老于朝邑市麵家挽磑􅎸尾焦秃皮肉穿穴及見之悲泣帝自出長樂坡馬到新豐向西鳴躍帝得之甚喜齒口並平飼以鐘乳仍生五駒皆千里足也後不知所在出朝野僉載唐𤣥宗龍馬海岱之間出𤣥黄石或云茹之可以長生𤣥宗皇帝嘗命臨淄守毎嵗採而貢焉開元二十七年江夏李邕為臨淄守是嵗秋因入山採𤣥黄石忽遇一翁質甚妙而丰度明秀髭髯極豐衣褐衣自道左出叩李邕馬且告曰君侯躬自採藥豈不為延聖主之夀乎曰然翁曰聖主當獲龍馬則享國萬嵗無勞採藥耳邕曰龍馬安在答曰當在齊魯之郊若獲之即是太平之符雖麟鳯龜龍不足以並其瑞邕方命駕以後乘遽亡見矣邕大異之顧謂從事曰得非神人乎即命其吏王乾貞者求龍馬於齊魯之間至開元二十九年夏五月乾貞果得馬於北海郡民馬㑹恩之家其色騅毛兩脇有鱗甲鬃尾若龍之鬐鬛嘶鳴真虚苖之音日馳三百里乾貞訊其所自㑹恩曰吾獨有牝馬常浴於淄水遂有胎而産因以龍子呼之乾貞即白於邕邕甚喜以表其事獻之上大悦詔内閑廄異其芻豢命畫工圖其状用頒示中外出宣室志代宗九花虬代宗命御馬九花虬并紫玉鞭轡以賜郭子儀子儀固讓久之上曰此馬髙大稱卿儀質不必讓也子儀身長六尺八寸九花虬即范陽節度使李懐仙所貢也額髙九尺毛拳如鱗頭頸鬃鬛真虬龍也毎一嘶即羣馬聳耳以身被九花故號九花虬上往日東幸觀獵於田不覺日暮忽顧謂侍臣曰行宫去此幾里奏曰四十里上令速鞭恐礙夜而九花虬緩緩然如三五里而已侍從奔驟無有及者出杜陽編徳宗神智驄徳宗西幸有二馬一號神智驄一號如意騮皆如上意故常謂之功臣耳中有毛引之一尺馬經云耳中有毛者日行千里一日花栁方春上遊幸諸苑侍者進瑞鞭指二驄語近臣曰昔朕西幸有二駿謂之二絶今獲此鞭可謂三絶遂命酒飲之因吟曰鴛鴦赭白齒新齊曉日花開散碧蹄玉勒斗廻初噴沫金鞭欲下不成嘶即中書舍人韓翃詩也出杜陽編徳宗幸梁洋唯御騅馬號曰望雲騅駕還飼以一品料暇日牽而視之必長鳴四顧若感恩之状後老死飛龍廏中貴戚盡為圖出國史補曹洪魏曹洪武帝從弟家盈産業駿馬成羣武帝討董卓夜行失馬洪以其所乗馬曰白鶴與武帝乗此馬走唯覺耳中風聲脚似不踐地至汴水洪不能得渡武帝引洪上馬共濟汴水行數百里瞬息而至下視馬足毛尚皆濕帝衣猶沾濡時人謂乗風行也為一代神駿諺云憑空虚躍曹家白鶴出王子年拾遺司馬休之晉司馬休之為荆州宋公遣使圍之休之未覺常所乗馬養于牀前忽連鳴不食注目視鞍休之試鞴之即不動鞴訖還坐馬又驚跳如此者數四騎馬即驟出門奔馳數里休之顧望已有使至矣遂去而獲免出渚宮故事慕容廆慕容廆初有赭白馬常自乗之既為石虎所圍力弱分將危陷棄衆將逃以此馬奔而鞴之馬見鞍輙蹄齧不得近乃止俄而鄴使至石虎國有難虎旋歸至是時馬年四十九嵗矣出廣古今五行記秦叔寶唐秦叔寶所乗馬號忽雷駮嘗飲以酒毎于月明中試能竪越三領黒氊及胡公卒嘶鳴不食而死出酉陽雜俎張納之徳州刺史張納之一白馬其色如練父雄為數州刺史常乗雄薨子敬之為考功郎中改夀州刺史又乗此馬敬之薨弟納之從給事中相府司馬改徳州刺史入為國子祭酒出為常州刺史至今猶在計八十餘極肥健行驟脚不散出朝野僉載宋蔡廣平宋蔡娶同郡游昌女蔡先代胡人也歸漢三世矣忽生一子深目而髙鼻蔡疑其非嗣將不舉須㬰赤草馬生一白駒蔡悟曰我家先有白馬種絶已二十五年今又復生吾曾祖貎胡今此子復其先也遂養之故曰白馬活胡兒此其謂也出朝野僉載舞馬𤣥宗嘗命教舞馬四百蹄各為左右分為部目為某寵某家驕時塞外亦有善馬來貢者上俾之教習無不曲盡其妙因命衣以文繡絡以金銀飾其鬃鬛間雜珠玉其曲謂之傾盃樂者數十回奮首鼓尾縱横應節又施三層板牀乗馬而上旋轉如飛或命壮士舉一榻馬舞於榻上樂工數人立左右前後皆衣淡黄衫文玉帶必求少年而姿貎美秀者毎千秋節命舞於勤政樓下其後上既幸蜀舞馬亦散在人間祿山常覩其舞而心愛之自是因以數匹賣於范陽其後轉為田承嗣所得不之知也雜之戰馬置之外棧忽一日軍中享士樂作馬舞不能已厮養皆謂其為妖擁篲以擊之馬謂其舞不中節抑揚頓挫猶存故態廏吏遽以馬怪白承嗣命箠之甚酷馬舞甚整而鞭撻愈加竟斃於櫪下時人亦有知其舞馬者懼暴而終不敢言出明皇雜録續坤咸通乾符中京師醫者續坤頗得秦醫和之術評脉知吉凶休咎至於得失皆可預言適有燕中奏事大將暴得風疾服醫藥而愈所酧帛甚多仍以邉馬一匹留贈馬之骨相甚竒然歩驟多蹶雖制以銜勒加之鞭策而欵段之性竟莫能改坤以浪費芻粟託人以賤價賣之求駿者纔試還復如此累月不售鄰伍有王生貨易於中貴之門頗甚貧窶忽詣坤云有青州監軍將發須鞍馬備行李亦知馳騁非駿但欲置於牽控之間坤直以無用之畜付焉亦不約鬻馬之價自此經旬不至謂其脱略亡逸一旦復來所置且踰十萬坤既獲善價因以十千遺之俄見王生易衣装致僕馬至於妻孥服飾亦皆鮮潔或曰王生賣馬金帛兼資計三四百萬坤甚驚試詢其事王生初不備説坤曰某以無用之物獲價頗多但未知駑劣之材何以至此云初致馬於青社監軍舉足如有羈絆及將還途遇小馬坊中使因遣留試信宿而往不復見焉密詢左右數日前魏博進一馬毛骨大小與此同聖人常乗打毬駿異未有偶御廄有馬毛色相𩔖者或有其對將到日方遣調習歩驟縈轉如風今則進御數朝所賜之物甚厚其後王生因大索起價遂以四百萬酬之是以物逢時亦有數不遇其主則駑􅂹莫分乃知耕莘野築傅巖未遇良途奚異于此出劇談記楊翁佛别馬語漢廣陵楊翁佛聴鳥獸之音乘蹇驢之野田間有放卧馬相去鳴聲相聞翁佛謂其御者彼放馬目眇其御曰何以知之曰罵此轅中馬曰蹇此馬亦罵之曰眇其御不信使往視之目果眇焉出論衡季南季南乗赤馬行逢人乗白馬白馬先鳴赤馬應之南謂從者曰白馬言汝南見一黄馬左目盲是吾子可令快行相及也須臾果逢黄盲馬赤馬先鳴盲馬應之出抱朴子趙固晉趙固所乘馬忽死因問郭璞璞曰可遣數十人持竹竿東行三十里有山陵林樹便攪打之當有一物出急抱將歸於是如璞言果得一物似猴入門見死馬跳梁走往死馬頭嘘吸其鼻馬即能起亦不見猴出捜神記韓晞唐韓晞常知永豐倉有一馬乗來日久遇過客有一蜀馬齧頗甚晞令取來繫于庭樹晞謂客曰此小馬豈能如此但亦痛治耳晞有圉人善騎調惡馬即令召之遣取鞭轡此馬努目斜睨於晞忽然掣韁走上堦跑晞落牀屈膝于地將齧之時晞所乘馬繫在别柱見此亦掣斷韁來齧此馬遂齧數口方得免衆買此馬殺而食之晞自後彌愛其馬焉出原化記江東客馬頃嵗江東有一客常乗一馬頗有重性客常於飲處醉甚獨乗馬至半路沉醉從馬上倚著一樹而睡久不動直至五更客奴尋覔方始扶䇿而馬當時倒地久乃能起病十餘日方愈此人無何以馬賣與宣州館家經二年客後得一職奉使至宣州知馬在焉請乗此馬此馬索視良久知本主也既乗遂躍此人於地踐齧頗甚衆救乃免意恨其賣己也出原化記陳璋淮南統軍陳璋加平章事拜命於朝李昪時執政謂璋曰吾將詣公賀且求一女壻於公家公其先歸吾將至璋馳一赤馬而去中路馬蹶而墜頃之昪至璋扶疾而出昪至少選即去璋召馬數之曰吾以今日拜官又議親事爾乃以是而墜我畜生不忍即殺使牽去勿與芻秣餓殺之是夕圉人竊具芻粟馬視之而已逹旦不食如是累日圉人以告璋復召語之曰爾既知罪吾赦爾馬跳躍而去是夕乃飲䬣如故璋後出鎮宣城罷歸而薨旬月馬亦悲鳴而死出稽神録太平廣記巻四百三十五
