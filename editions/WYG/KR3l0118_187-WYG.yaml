body:
  text: 太平廣記卷一百八十七職官宰相上事蘇瓌两省獨孤及參酌院陽城吕温韋絢李程雜説御史同州御史崔薳嚴武押班臺門歴五院韓臯雜説使職尚書省崔日知度支桞闢省橋秘書省魚袋莎㕔宰相凢拜相禮絶班行府縣載沙填路自私第至於子城東街名曰沙堤有服假或問疾百僚就第有司設幕次排班元日冬至立仗大官皆偹珂傘列燭有五六百炬謂之火城宰相將至則皆撲滅以避之宰相判四方之事有都堂處分有司有堂帖下次押名曰花押黄敕既下小異同曰黄帖宰相呼為堂老初百官早朝必立馬建福望僊門外宰相則於光宅車坊以避風雨元和初始置待漏院出國史補上事凢中書門下並於西省上以便禮儀五品以上宰相送上乃並卿參出國史𥙷蘓瓌景龍三年蘓瓌除尚書右僕射時公卿大臣初拜官者例計獻食名曰燒尾瓌因侍内宴將作大匠宗晉卿謂曰拜僕射竟不燒尾豈不善邪帝黙然瓌奏曰臣聞宰相者主隂陽􅂇天理物今粒食踊貴百姓不足臣見宿衛兵至有三日不得食者臣愚不稱職所以不敢燒尾出談賔録兩省諫議無事不入每遇入省有厨食四孔炙中書舍人時謂宰相判官等相親嫌不拜知制誥為􅓏脚又云不由三字直拜中書舍人者謂之撻額裹頭其制誥之本出自王言皆人主所為故漢光武時第五倫為督鑄錢掾見詔書而嘆曰此聖明主也一見决矣近者凡有詔敕皆責成羣下褒貶之言哲王所慎凡百具僚王公卿士始褒則謂其珪璋特達善無可加旋有貶黜則比以斗筲下才罪不容責同為一字之行固出君上之言愚智生於倐忽是非變於俄頃葢天子無戱言言之茍失則取尤天下出盧氏雜説獨孤及獨孤及求知制誥試見元載元知其所欲迎謂曰制誥阿誰堪及心知不我與而與他也乃薦李紓時楊炎在閣下忌及之來故元阻之乃二人力也出嘉話録參酌院長慶初穆宗以刑法為重每大獄有司斷罪又令給事中中書舍人參酌出入之百司呼為參酌院出國史補陽城陽城居夏縣拜諫議大夫鄭錮居閿鄉拜拾遺李周南居曲江拜挍書郎時人以轉逺轉髙轉近轉卑出國史補吕温通事舍人宣詔舊命拾遺團句把麻者葢謁者不知書多失句讀故用拾遺低摘聲句以助之及吕温為拾遺被喚把麻不肯去遂成故事拾遺不把麻者自吕始也時栁宗元戱吕云幸識一文半字何不與他把也出嘉話録韋絢開成末韋絢自左補闕為起居舍人時文宗稽古尚文多行貞觀開元之事妙選左右史以魏謩為右史俄兼大諌入閣秉筆直聲逺聞帝倚以為相者期在旦暮對􅆒進諌細大必行公望羙事朝廷拭目以觀文貞公之風彩㑹文宗宴駕時事變移遂中輟焉時絢已除起居舍人楊嗣復於殿下先奏曰左補闕韋絢新除起居舍人未中謝奏取進止帝頷之李珪招而引之絢即置筆札於玉堦欄檻之石遽然趨而致詞拜舞焉左史得中謝自開成中至武宗即位隨仗而退無復簪筆之任矣遇簪筆之際因得密邇天顔故時人謂兩省為侍從之班則登選者不為不達矣出嘉話録李程李程為翰林學士以堦前塼日影為入候程性懶每入必踰八塼故號為八塼學士出傳載雜説兩省相呼為閣老尚書丞郎相呼為曹長員外郎御史拾遺相呼為院長上可兼下下不可兼上侍御史相呼為端公出國史補御史御史故事大朝㑹則監察押班常參則殿中分班入閤則侍御史監奏葢含元殿最逺用八品宣政其次用七品紫宸最近用六品殿中得立花塼緑衣用紫案褥之𩔖號為七貴監察院長與同院禮隔語曰事長如事端凡上堂絶言笑有不可忍雜端大笑則合座皆笑謂之哄堂哄堂不罰大夫中丞入三院罰直盡放其輕重尺寸由於吏人而大者存之黄卷三院上堂有除改者不得終食唯刑部郎中得終之出國史補同州御史王某云往歳任官同州見御史出案廻止州驛經宿不發忽索雜案又取印歴鎖驛門甚急一州大擾有老吏竊哂乃因庖人以通憲胥許以百縑為贈明日未明御史已啓驛門盡還案牘乘馬而去出國史補崔薳崔薳為監察廵囚至神䇿軍為吏所陷張葢而入又諷軍中索酒食意欲結歡竇文塲怒奏立敕就䑓鞭於直㕔而流之自是廵囚不至禁軍出國史補嚴武寳應二年大夫嚴武奏在外新除御史食宿私舍非宜自此乃給公乘元和中元稹為監察與中使争驛㕔為其所辱始有敕節度觀察使䑓官與中使先到驛者得處上㕔為定制出國史補押班凡大朝㑹監察押班不足則使下侍御史因朝奏者攝之出國史補臺門御史臺門北開葢取肅殺就隂之義故京臺門北開矣按鄴郡故事云御史臺在宫城西南其門北開故城御史臺亦北開龍朔中置桂坊為東朝憲府門亦北開然都御史䑓門南開當時創造者不經反於故事同諸司葢以權宜邪御史臺記又北開者或云是隋初移都之時兵部尚書李圓通兼御史大夫欲向省便近故開北門出談賔録歴五院臺儀自大夫已下至監察通謂之五院御史國朝歴䟦五院者共三人焉李尚𨼆張延賞温造也出尚書故實韓臯韓臯為御史中丞常有所陳必於紫宸殿對百寮而請未嘗詣便殿上謂之曰我與卿言於此不盡可來延英當與卿從容或無遺事親友或謂臯曰自乾元已來羣臣啟事皆詣延英方得詳盡公何獨於外庭對衆官以陳之無失於慎密乎韓曰御史天下之持平也權剛直枉唯在公共所言之事貴人知之奈何求請便殿避人竊語以私國家之法且延英之置也肅宗皇帝以苖晋卿年老艱歩故設之後來臣寮得詣便殿多以私自售希求恩寵欲狥其身奈何以此為望哉出傳載雜說諫院以章疏之故憂患略同䑓中則務糺舉省中多事㫖趨不一故言遺補相惜御史相憎郎官相輕出國史𥙷使職開元已前於外則命使臣否則止自置八節度十採訪始有坐而為使其後名號益廣於是有為使則重為官則輕故天寳末有佩印至三十者大厯中請俸有至千貫者今在朝太清宫太㣲宫度支鹽鐵轉運知苑閑廐左右廵分察監察館驛監倉監庫左右街外任則節度觀察諸軍押蕃防禦團練經略鎮遏招討㩁鹽水陸運營田給納監牧長春宫有時而置者則大禮禮儀㑹盟刪定三司黜陟廵撫宣慰推覆選𥙷禮㑹册立弔祭供軍糧料和糴此其大略經置而廢者不録宫官内外悉謂之使舊為權臣所綰州縣所理今屬中人者有之出國史𥙷尚書省即官故事吏部即中二㕔先小銓次格式員外郎二㕔先南曹次廢置刑部分四覆戸部分兩賦其制尚矣舊說吏部為省眼禮部為南省舍人考功度支為振行比部得廓下食以飯從者號比盤二十四曹呼左右司為都公省中語曰後行祠屯不博中行都門中行禮部不博前行駕庫出國史𥙷崔日知崔日知歴職中外恨不居八座及為太常卿於都寺㕔事後起一樓正與尚書省相望時人謂之崔公望省樓出國史異纂度支故事度支案即中判入員外判出侍即總疏押案而已貞元已後始為使額即官當直發敕為重水部員外即劉約直宿㑹河北繫囚配流嶺南夜發敕直宿令史不更事唯嶺南不下河北旬月後本州聞奏約遂岀官出國史補桞闢吏部甲庫有朱泚偽黄案數百道省中常取戲翫已而藏之桞闢知甲庫始白執政於都堂集八座丞郎焚之出國史補省橋尚書省東南隅通衢有小橋相目為拗項橋言侍御史及殿中乆次者至此必拗項南望南宫也都堂南門道東有古槐垂隂至廣相傳夜深聞絲竹之音省即有入相者俗呼為音聲樹祠部呼為氷去聲㕔言其清且冷也岀因話録秘書省唐初秘書省唯主寫書貯掌勘校而已自是門可張羅逈無統攝官屬望雖清雅而實非要劇權貴子弟及好利誇侈者率不好此職流俗以監為宰相病坊少監為給事中中書舍人病坊丞及著作即為尚書即病坊秘書即及著作左即為監察御史病坊言從職不任繁劇者當改入此省然其職在圖史非復喧卑故好學君子厭於趨競者亦求為此職焉出兩京記魚袋朝儀魚袋之餙唯金銀二等至武后乃改五品以銅中宗反正從舊出國史異纂莎㕔京兆府判司時云兩法士此兩㕔事多東士曹㕔時號為念珠㕔葢判案一百八道西士曹㕔為莎㕔㕔前有莎週廻可十五歩京兆府時云不立兩縣令不坐兩少尹兩縣引馬到府門傳門而報兩尹入㕔大尹亦到㕔不得候兩尹坐後出不得候兩尹立後出其京兆府縣之重亦表大尹之尊京兆府掾曹時人云倚國省郎河中府司録㕔亦有緑莎昔好事者相承常溉灌天祐已後為不好事者除之出聞竒録太平廣記卷一百八十七
