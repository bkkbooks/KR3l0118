body:
  text: 太平廣記卷三百一十一宋李昉等編神二十一蕭曠史遂田布進士崔生張偃裴氏子韋騶蕭曠太和處士蕭曠自洛東遊至孝義館夜憇于雙美亭時月朗風清曠善琴遂取琴彈之夜半調甚苦俄聞洛水之上有長歎者漸相逼乃一美人曠因捨琴而揖之曰彼何人斯女曰洛浦神女也昔陳思王有賦子不憶􅁘曠曰然曠又問曰或聞洛神即甄皇后謝世陳思王遇其魄於洛濵遂為感甄賦後覺事之不正改為洛神賦託意於宓妃有之乎女曰妾即甄后也為慕陳思王之才調文帝怒而幽死後精魄遇王洛水之上叙其寃抑因感而賦之覺事不典易其題乃不謬矣俄有雙鬟持茵席具酒殽而至謂曠曰妾為袁家新婦時性好鼔琴每彈至悲風及三峽流泉未嘗不盡夕而止適聞君琴韻清雅願一聽之曠乃彈别鶴操及悲風神女長歎曰真蔡中郎之儔也問曠曰陳思王洛神賦如何曠曰真體物瀏湸為梁昭明之精選爾女㣲笑曰狀妾之舉止云翩若驚鴻婉若游龍得無疎矣曠曰陳思王之精魄今何在女曰見為遮須國王曠曰何為遮須國女曰劉聰子死而復生語其父曰有人告某云遮須國久無主待汝父來作主即此國是也俄有一青衣引一女曰織綃娘子至矣神女曰洛浦龍王之處女善織綃于水府適令召之爾曠因語織綃曰近日人世或傳柳毅靈姻之事有之乎女曰十得其四五爾餘皆飾詞不可惑也曠曰或聞龍畏鐵有之乎女曰龍之神化雖鐵石金玉盡可透達何獨畏鐵乎畏者蛟螭輩也曠又曰雷氏子佩豐城劒至延平津躍入水化為龍有之乎女曰妄也龍木𩔖劒乃金金既尅木而不相生焉能變化豈同雀入水為蛤野雞入水為蜃哉但寶劒靈物金水相生而入水雷生自不能沉于泉信其下搜劒不獲乃妄言為龍且雷煥只言化去張司空但言俱合終不説為龍任劒之靈異且人之鼓鑄鍛鍊非自然之物是知終不能為龍明矣曠又曰梭化為龍如何女曰梭木也龍本屬木變化歸木又何怪也曠又曰龍之變化如神又何病而求馬師皇療之女曰師皇是上界高真哀馬之負重引逺故為馬醫愈其疾者萬有餘匹上天降鍳化其疾于龍唇吻間欲驗師皇之能龍後負而登天天假之非龍真有病也曠又曰龍之嗜燕血有之乎女曰龍之清虚食飲沆瀣若食燕血豈能行藏葢嗜者乃蛟蜃輩無信造作皆梁朝四公誕妄之詞爾曠又曰龍何好曰好睡大即千年小不下數百嵗偃仰于洞穴鱗甲間聚其沙塵或有鳥銜木實遺棄其上乃甲拆生樹至于合抱龍方覺悟遂振迅修行脱其體而入虚無澄其神而歸寂滅自然形之與氣隨其化用散入真空若未胚腪若未凝結如物在恍惚精奇杳㝠當此之時雖百骸五體盡可入于芥子之内隨舉止無所不之自得還元返本之術與造化爭功矣曠又曰龍之修行向何門而得女曰高真所修之術何異上士修之形神俱達中士修之神超形沉下士修之形神俱墮且當修之時氣爽而神凝有物出焉即老子所云恍兮惚兮其中有物也其於幽㣲不敢洩露恐為上天譴謫爾神女遂命左右傳觴敘語情况眤洽蘭艷動人若左瓊枝而右玉樹繾綣永夕感暢㝠懷曠曰遇二仙娥於此真所謂雙美亭也忽聞雞鳴神女乃留詩曰玉筯凝腮憶魏宫朱絲一弄洗清風明晨追賞應愁寂沙渚煙銷翠羽空織綃詩曰織綃泉底少歡娛更勸蕭郎盡酒壺愁見玉琴彈别鶴又將清淚滴真珠曠答二女詩曰紅蘭吐艷間夭桃自喜尋芳數已遭珠珮鵲橋從此斷遙天空恨碧雲高神女遂出明珠翠羽二物贈曠曰此乃陳思王賦云或採明珠或拾翠羽故有斯贈以成洛神賦之詠也龍女出輕綃一疋贈曠曰若有胡人購之非萬金不可神女曰君有奇骨異相當出世但淡味薄俗清襟養真妾當為隂助言訖超然躡虚而去無所睹矣後曠寶其珠綃多逰嵩嶽友人嘗遇之備寫其事今遁世不復見焉出傳記史遂會昌中小黄門史遂因疾退於家一日忽召所親自言初得疾時見一黄衣人執文牒曰陰司録君二魂對事壘一魂主身不覺隨去出通化門東南入􅂽徑渡灞滻陟藍田山山上約行數十里忽見一騎執黑旛云太一登殿已久罪人畢録爾何遲也督之而去至一城甲士翼門直北至一宫宫門守衛甚嚴有赤衣吏引使者同入蕭屏間有一吏自内出曰受敎受敎使者鞠躬受命宣曰史遂前世括蒼山主録大夫侍者始則恭恪中間廢墮謫官黄門冀其省悟今大夫復位侍者宜遷付所司准法遂領就一院見一人白鬚􅁂紫衣左右十數列侍拜訖仰視乃少傅白居易也遂元和初為翰林小吏因問曰少傅何為至此白怡然曰侍者憶前事􅁘俄如睡覺神氣頓如舊諸黄門聞其疾愈競訪之是夕居易薨於洛中臨終謂所親曰昔自蓬萊與帝謂武宗也有閻浮之因帝於閻浮為麟德之别言畢而逝人莫曉也較其日月當捐館之時乃上宴麟德殿也出唐年補録田布唐相崔鉉鎮淮南盧耽罷浙西張薦罷常州俱經維揚詣鉉鉉因暇日與二客方奕吏報女巫與故魏博節度使田布偕至泊逆旅某亭者鉉甚異之復曰顯驗與他巫異請改舍于都候之􅅟鉉趣召巫者至乃與神迭拜曰謝相公鉉曰何謝神答曰布有不肖子黷貨無厭郡事不治當犯大辟賴公隂德免焉使布之家廟血食不絶者公之恩也鉉矍然曰異哉鉉為相時夏州節度奏銀州刺史田􅁾犯贓罪私造鎧甲以易市邊馬布帛帝赫怒曰贓自别議且委以邊州所宜防盗以甲資敵非反而何命中書以法論將赤其族翌日鉉從容言於上曰􅁾贓罪自有憲章然是宏正之孫田布之子宏正首以河朔入覲奉吏員布亦成父之命繼以忠孝伏劒而死今若行法以固邊圉未若因事宏貸激勸忠烈上意乃解止黜授逺郡司馬而鉉未嘗一出口於親戚私眤已將忘之今神之言正是其事乃命廊下素服而見焉謂之曰君以義烈而死奈何區區為愚婦人所使乎神曰布嘗負此嫗八十萬錢今方忍耻償之鉉與二客及監軍使幕下共償其錢神乃辭去因言事不驗梁楫李琪作傳進士崔生進士崔生自闗東赴舉早行潼闗外十餘里夜方五皷路無人行惟一僕一擔一驢而已忽遇列炬呵殿旗幟戈甲二百許人若方鎮者生映樹自匿既過行不三二里前之導從復迴乃徐行隨之有健步押茶器行甚遲生因問為誰曰嶽神迎天官崔侍御也秀才方應舉何不一謁以卜身事生謝以無由自達健步許偵之既及廟門天猶未曙健步約生伺之於門側入良久出曰白侍御矣遽引相見甚喜逡巡嶽神至立語便邀崔侍御入廟中陳設帳幄筵席皷樂極盛頃之張樂飲酒崔臨赴宴約敕侍者祗待於生供以湯茶所須情旨敦厚飲且移時生倦徐行周覽不覺出門忽見其表丈人握手話舊顔色憔悴衣服􅀈縷生曰丈人久辭人間何得至此答曰僕離人世十五年矣未有所詣近作敷水橋神倦於送迎而窘於衣食窮困之狀迨不可濟知侄與天官侍御相善又宗姪之分必可相薦故來投誠若得南山觜神祗即粗免饑窮此後遷轉得居天秩矣生辭以乍相識不知果可相薦否然試為道之侍御尋亦罷宴而歸謂曰後年方及第今年不就試亦可余少頃公事亦畢即當歸去程期甚迫不可久留生因以表丈人所求告之侍御曰觜神似人間選𥙷極是清資敷水橋神卑雜豈可便得然試為言之嶽神必不相阻即復詣嶽神迎奉生潛近伺之厯聞所託嶽神果許之即命出牒補署俄爾受牒入謝迎官將吏一二百人侍從甚整生因出賀觜神泣曰非吾姪之力不可得此位也後一轉便入天司矣今年渭水泛溢姪莊當飄壞一道所損三五百家已令為姪䕶之五六月必免此禍更有五百縑相酬須臾觜神驅殿而去侍御亦發嶽神出送生獨在廟中歘如夢覺出訪僕使只在店中一無所覩於是不復入闗迴止别墅其夏渭水泛溢飄損甚多惟崔生莊獨免莊前泊一空船水涸之後船有絹五百疋明年果擢第矣出録異記張偃進士張偃者赴舉行及金天王廟前遇大雨於廟門避雨至暮不止不及詣店遂入廟中門宿至四更聞金天視事之聲嗢喝甚厲須臾聞喚張偃來日午時行至某村為赤狸虎所食偃聞之甚懼候庭下静遂于門下匍匐而入自通名而拜金天曰汝生人何事而來遂具以前事告金天金天曰召虎來須臾虎至金天曰與二大獸食而代偃虎曰寃家合食他物代之不可金天曰檢虎何日死有一吏來曰未時為某村王存射死金天曰命張偃過所食時即行及行至前路果見人喧閙問之乃曰某村王存射殺赤狸虎果金天所言偃遂自市酒求鹿脯親往廟謝之出聞奇録裴氏子天水彭郡裴氏子咸通中於東閬學孤林法淫其親表婦女事發繫獄每日供其飲食悉是孤林法神為致之獄吏怪而謂其神曰神既靈異何不為免此刑神曰受吾法者只可全身逺害方便濟人既違戒誓豈但王法神亦不容也今之慇懃以酬香火之功竟笞殺之出録異記韋騶韋騶者明五音善長嘯自稱逸羣公子舉進士一不第便已曰男子四方之志豈屈節於風塵哉遊岳陽岳陽太守以親知見辟數月謝病去騶親弟騋舟行溺於洞庭湖騶乃水濵慟哭移舟湖神廟下欲焚其廟曰千金估胡安穩獲濟吾弟窮悴乃罹此殃焉用爾廟為忽於舟中假寐夢神人盛服來謁謂騶曰幽㝠之途無枉殺者明公先君昔為城守方聞讜正鬼神避之撒淫祠甚多不當廢者有二二神上訴帝初不許固請十餘年乃許與後嗣一人謝二廢廟之主然亦須退不能知其道進無以𥙷於時者故賢弟當之耳儻求䘮不獲即我之過當令水工送屍湖上騶驚悟其事遽止遂命漁舟施鈎緡果獲弟之屍於岸是夕又夢神謝曰鬼神不畏忿怒而畏果敢以其誠也君今為人果敢昔洞庭張樂是吾所司願以至音酬君厚惠所冀觀咸池之節奏釋浮世之憂煩也忽覩金石羽籥鏗鏘振作騶甚歎異以為非據曲終乃寤出甘澤謠太平廣記卷三百一十一
