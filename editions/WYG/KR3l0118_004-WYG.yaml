body:
  text: 太平廣記卷四神仙四王子喬鳳綱琴髙鬼谷先生蕭史徐福王母使者月支使者衞叔卿張楷陽翁伯王子喬王子喬者周靈王太子也好吹笙作鳳凰鳴遊伊洛之間道士浮丘公接以上嵩山三十餘年後求之於山見桓良曰告我家七月七日待我於緱氏山頭果乗白鶴駐山嶺望之不到舉手謝時人數日而去後立祠於緱氏及嵩山出列仙傳鳳綱鳳綱者漁陽人也常採百草花以水漬封泥之自正月始盡九月末止埋之百日煎九火卒死者以藥内口中皆立活綱常服此藥至數百嵗不老後入地肺山中仙去出神仙傳琴髙琴髙者趙人也以鼓琴為宋康王舎人行涓彭之術浮遊冀州涿郡間二百餘年後辭入涿水中取龍子與弟子期之曰皆潔齋候於水旁設祠屋果乗赤鯉來坐祠中旦有萬人觀之留一月餘復入水去出列仙傳鬼谷先生鬼谷先生晉平公時人𨼆居鬼谷因為其號先生姓王名栩亦居清溪山中蘇秦張儀從之學縱横之術二子欲馳騖諸侯之國以智詐相傾奪不可化以至道夫至道𤣥微非下才得造次而傳先生痛其道廢絶數對蘇張涕泣然終不能寤蘇張學成别去先生與一隻履化為犬北引二子即日到秦矣先生凝神守一朴而不露在人間數百嵗後不知所之秦皇時大宛中多枉死者横道有鳥銜草以覆死人面遂活有司上聞始皇遣使齎草以問先生先生曰巨海之中有十洲曰祖洲瀛洲𤣥洲炎洲長洲元洲流洲光生洲鳯麟洲聚窟洲此草是祖洲不死草也生在瓊田中亦名飬神芝其葉似菰不叢生一株可活千人耳出仙傳拾遺蕭史蕭史不知得道年代貌如二十許人善吹簫作鸞鳯之響而瓊姿煒爍風神超邁真天人也混迹於世時莫能知之秦穆公有女弄玉善吹簫公以弄玉妻之遂教弄玉作鳳鳴居十數年吹簫似鳯聲鳯凰來止其屋公為作鳯臺夫婦止其上不飲不食不下數年一旦弄玉乗鳯蕭史乗龍昇天而去秦為作鳯女祠時聞簫聲今洪州西山絶頂有蕭史石仙壇石室及巖屋真像存焉莫知年代出神仙傳拾遺徐福徐福字君房不知何許人也秦始皇時大宛中多枉死者横道數有鳥銜草覆死人面皆登時活有司奏聞始皇始皇使使者齎此草以問北郭鬼谷先生云是東海中祖洲上不死之草生瓊田中一名飬神芝其葉似菰不叢生一株可活千人始皇於是謂可索得因遣福及童男童女各三千人乗樓船入海尋祖洲不返後不知所之逮沈羲得道黄老遣福為使者乗白虎車度世君司馬生乗龍車侍郎薄延之乗白鹿車俱来迎羲而去由是後人知福得道矣又唐開元中有士人患半身枯黑御醫張尚容等不能知其人聚族言曰形體如是寜可乆􅁘聞大海中有神仙正當求仙方可愈此疾宗族留之不可因與侍者齎糧至登州大海側遇空舟乃賫所攜挂帆随風可行十餘日近一孤島島上有數百人如朝謁狀須臾至岸岸側有婦人洗藥因問彼皆何者婦人指云中心牀坐鬚鬂白者徐君也又問徐君是誰婦人云君知秦始皇時徐福􅁘曰知之此則是也頃之衆各散去某遂登岸致謁具語始末求其醫理徐君曰汝之疾遇我即生初以美飯哺之器物皆竒小某嫌其薄君云能盡此為再餐也但恐不盡爾某連啖之如數甌物致飽而飲亦以一小器盛酒飲之致醉翌日以黑藥數丸令食食訖痢黑汁數升其疾乃愈某求住奉事徐君云爾有禄位未宜即留當以東風相送無愁歸路遥也復與黄藥一袋云此藥善治一切病還遇病者可以刀圭飲之某還數日至登州以藥奏聞時𤣥宗令有疾者服之皆愈出仙傳拾遺及廣異記王母使者漢武帝天漢三年帝廵東海祠恒山王母遣使獻靈膠四兩吉光毛裘武帝以付外庫不知膠裘二物之妙也以為西國雖逺而貢者不竒使者未遣之帝幸華林苑射虎兕弩絃㫁使者時随駕因上言請以膠一分以口濡其膠以續弩絃帝驚曰此異物也乃使武士數人對牽引之終日不脱勝未續時也膠青色如碧玉吉光毛裘黄白盖神馬之𩔖裘入水終日不沈入火不焦帝悟厚賂使者而遣去集絃膠出自鳳麟洲洲在西海中地靣正方皆一千五百里四靣皆弱水遶之上多鳳麟數萬為羣煮鳳喙及麟角合煎作膠名之集絃膠一名連金泥弓弩已斷之絃刀劒已斷之鐡以膠連續終不脱也出仙傳拾遺月支使者漢延和三年春武帝幸安定西胡月支國王遣使獻香四兩大如雀卵黑如桑椹帝以香非中國所乏以付外庫又獻猛獸一頭形如五六十日犬子大如貍其毛黄色國使將以呈帝帝見使者抱之以入其氣秃悴尤怪其所貢之非問使者曰此小物何謂猛獸使者對曰夫威加於百禽者不必計其大小是以神驎為巨象之王鳳凰為大􅉇之宗亦不在巨細也臣國去此三十萬里常占東風入律百旬不休青雲干吕連月不散者中國將有好道之君矣我國王將仰中土而慕道風薄金玉而厚靈物故搜竒藴而索神香歩天林而請猛獸乗肥車而濟弱水策􅂹足以度飛沙契濶途徑艱苦蹊路于今十三年矣神香辟天殘之死疾猛獸却百邪之魍魎夫此二物者實濟衆生之至要助至化之昇平豈圖陛下乃不知貴乎是臣國占風之謬也今日仰鑒天姿乃非有道之君也眼多視則貪恣口多言則犯難身多動則注賊心多節則奢侈未有用此四多而天下成治者也帝黙然不平帝乃使使者勑猛獸發聲試聽之使者乃指獸令發一聲獸䑛唇良乆忽如天雷霹􅆮之響又作兩目如䃸磹之炎光乆乃止帝登時顛蹷掩耳振動不能自止侍者乃武士皆失仗帝忌之因以此獸付上林苑令虎食之虎見獸皆相聚屈蹟如也帝恨使者言不遜欲罪之明日失使者及猛獸所在至始元元年京城大疫死者大半帝取月支神香燒之於城内其死未三日者皆活香氣經三月不歇帝信神香乃祕録餘香一旦函檢如故而失神香也此香出於聚窟洲人鳥山山上多𣗳與楓𣗳相似而香聞數里名為返魂𣗳亦能自作聲如羣牛吼聞之者心振神駭伐其木根於玉釡中煮取汁更以㣲火熟煎之如黑􅏁狀令可丸名為驚精香或名振靈丸或名返生香或名振檀香或名却死香一種六名斯實靈物也出仙傳拾遺衞叔卿衛叔卿者中山人也服雲母得仙漢儀鳳二年八月壬辰孝武皇帝閒居殿上忽有一人乗雲車駕白鹿從天而下來集殿前其人年可三十許色如童子羽衣星冠帝乃驚問曰為誰答曰吾中山衞叔卿也帝曰子若是中山人乃朕臣也可前共語叔卿本意謁帝謂帝好道見之必加優禮而帝今云是朕臣也於是大失望黙然不應忽然不知所在帝甚悔恨即遣使者梁伯至中山推求叔卿不得見但見其子名度世即將還見帝問云汝父今在何所對曰臣父少好仙道嘗服藥導引不交世事委家而去已四十餘年云當入太華山也帝即遣使者與度世共之華山求尋其父到山下欲上輒火不能上也積數十日度世謂使者曰豈不欲令吾與他人俱往乎乃齋戒獨上未到其嶺於絶巖之下望見其父與數人博戱於石上紫雲欝欝於其上白玉為牀又有數仙童執幢節立其後度世望而載拜叔卿曰汝來何為度世曰帝甚恨前日倉卒不得與父言語今故遣使者梁伯與度世共來願更得見父也叔卿曰前為太上所遣欲誡帝以大災之期及救危厄之法國祚可延而彊梁自貴不識真道而反欲臣我不足告語是以去耳今當與中黄太乙共定天元吾終不復往耳度世曰不審向與父並坐是誰也叔卿曰洪崖先生許由巢父火低公飛黄子王子晉薛容耳今世向大亂天下無聊後數百年間土滅金亡汝歸當取吾齋室西北隅大柱下玉函函中有神素書取而按方合服之一年可能乗雲而行道成來就吾於此勿得為漢臣也亦不復為語帝也度世於是拜辭而去下山見梁伯不告所以梁伯意度世必有所得乃叩頭於度世求乞道術先是度世與之共行見伯情行温實乃以語之梁伯但不見柱下之神方耳後掘得玉函封以飛仙之香取而餌服乃五色雲母遂合藥服之與梁伯俱仙去留其方與子而世人多有得之者出神仙傳張楷張楷字公超有道術居華山谷中能為五里霧有玉訣金匱之學坐在立亡之道人學其術者填門如市故云霧市金華山有張超谷焉出仙傳拾遺陽翁伯陽翁伯者盧龍人也事親以孝葬父母於無終山山髙八十里其上無水翁伯廬於墓側晝夜號慟神明感之出泉於其墓側因引水就官道以濟行人嘗有飲馬者以白玉一升與之令翁伯種之當生美玉果生白璧長二尺者數䨇一日忽有青童乗虗而至引翁伯至海上仙山謁羣仙曰此種玉陽翁伯也一仙人曰汝以孝於親神真所感昔以玉種與之汝果能種之汝當夫婦俱仙今此宫即汝他日所居也天帝將廵省於此開禮玉十珏汝可致之言訖使仙童與俱還翁伯以禮玉十珏以授仙童北平徐氏有女翁伯欲求婚徐氏謂媒者曰得白璧一䨇可矣翁伯以白璧五䨇遂壻徐氏數年雲龍下迎夫婦俱昇天今謂其所居為玉田坊翁伯仙去後子孫立大石柱於田中以紀其事出仙傳拾遺太平廣記卷四
