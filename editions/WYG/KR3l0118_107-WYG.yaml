body:
  text: 太平廣記卷一百七報應六王忠幹王偁李元一魚萬盈于李回强伯達僧惟恭王沔董進朝康仲戚吴可乆开行立僧法正沙彌道䕃何老勾龍義趙安王忠幹唐元和三年李同捷阻兵滄州景帝命李祐統齊德軍討之初圍德州城城堅不拔翌日又攻之自卯至未傷十八九竟不能拔時有齊州衙内八將官健兒王忠幹愽野縣人長念金剛經積二十餘年日數不闕其日忠幹上飛梯將及堞身中箭如蝟為櫑木擊落同火卒曵出羊馬城外置之水濠裏岸祐以暮夜命抽軍其時城上矢下如雨同火忙忘取忠幹尸忠幹既死如夢至荒野遇大河欲渡無因仰天哭忽聞人語聲忠幹見一人長丈餘疑其神人因求指營路其人云爾莫怕我令爾可得渡此河忠幹拜之纔頭低未舉神人把腰擲之空中乆方著地忽如夢覺聞賊城上交二更初不記過水亦不知瘡擡手捫面血塗眉睫方知傷損乃舉身强行百餘步却倒復見向人持刀叱曰起起忠幹驚懼走一里餘坐歇方聞本軍喝號聲遂及本營訪同火卒方知其身死水濠岸裏即是夢中所過河也出酉陽雜俎王偁王偁家於晉州性頑鄙唐元和四年其家疾疫亡者十八九唯偁偶免方疾食狗肉目遂盲不知醫藥唯禱鬼神數年無報忽有一異僧請飯謂曰吾師之文有金剛經能排衆苦報應神速居士能受之乎偁辭愚又無目固不可記僧勸冩之偁從其言得七卷請僧誦之數日夢前僧持刀決其目乃驚寤覺有所見乆而遍明數月如舊偁終身轉經不替出報應記李元一李元一唐元和五年任饒州司馬有女居别院中宵忽見神人驚悸而卒顔色不改其夫嚴訥自秦來至蒼湖恍惚見其妻行水上而至訥驚問之妻泣曰某已亡矣今鬼也訥駭異之曰近此鴈浦村有嚴夫子教衆學彼有竒術公往懇請哀救某庶得復生矣訥後果見嚴夫子拜謁泣訴盡啓根本嚴初甚怒郎君風疾何乃見凌訥又拜悲泣乆乃方許曰殺夫人者王將軍也塟在此堂内西北柱下可為冩金剛經令僧轉讀於其所祠焉小娘子必當還也訥拜謝疾往郡城明日到具白元一冩經速令讀之七遍女乃開目乆之能言媿謝其夫曰兹堂某柱下有王將軍枯骨抱一短劒為改塟之劒請使留以報公德發之果驗遂改瘞留其劒元一因冩經數百卷以施冥寞出報應記魚萬盈魚萬盈京兆市井粗猛之人唐元和七年其所居宅有大毒蛇其家見者皆驚怖萬盈怒一旦持巨棒伺其出擊殺之烹炙以食因得疾臟腑痛楚遂卒心尚微煖七日後蘇云初見冥使三四人追去行暗中十餘里見一人獨行其光繞身四照數尺口念經隨走就其光問姓字云我姓趙名某常念金剛經者汝但莫離我使者不敢進漸失所在乆之至其家萬盈拜謝曰向不遇至人定不回矣其人授以金剛經念得遂還及再生持本重念更無遺闕所疾亦失因斷酒肉不復殺害日念經五十遍出報應記于李回于李回舉進士唐元和八年下第將歸有僧勸曰郎君欲速及第何不讀金剛經遂日念數十遍至王橋宿因步月有一美女與言遂被誘去十餘里至一村舍戲笑甚喧引入升堂見五六人皆女郎李回慮是精怪乃隂念經忽有異光自口出羣女震駭奔走但聞腥􅁾之氣葢狐狸所宅榛􅁄滿目李回茫然不知所適俄有白犬色逾霜雪似導李回前行口中有光復照路逡巡達本所後至數萬遍出報應記强伯達唐强伯達元和九年家於房州世傳惡疾子孫少小便患風癩之病二百年矣伯達纔冠便患囑於父兄疾必不起慮貽後患請送山中父兄裹糧送之巖下泣涕而去絶食無幾忽有僧過傷之曰汝可念金剛經内一四句偈或脫斯苦伯達既念數日不絶方晝有虎來伯達懼甚但瞑目至誠念偈虎乃遍䑛其瘡唯覺涼泠如傅上藥了無他苦良乆自看其瘡悉已乾合明旦僧復至伯達具說僧即於山邊拾青草一握以授曰可以洗瘡但歸家煎此以浴乃嗚咽拜謝僧撫背而别及到家父母大驚異因啓本末浴訖身體鮮白都無瘡疾從此相傳之疾遂止念偈終身出報應記僧惟恭唐荆州法性寺僧惟恭三十餘年念金剛經日五十遍不拘僧儀好酒多是非為衆僧所惡遇病且死同寺有僧靈巋其跡類惟恭為一寺二害因他故出去寺一里逢五六人年少甚都衣服鮮潔各執樂器如龜兹部問靈巋惟恭上人何在靈巋即語其處所疑寺中有供也及晚回入寺聞鐘聲惟恭已死因說向來所見其日合寺聞絲竹聲竟無樂人入寺當時名僧云惟恭葢承經之力生不動罔亦以其迹勉靈巋也靈巋感悟折節緇門出酉陽雜俎王沔唐元和中嚴司空綬在江陵時岑陽鎮將王沔常持金剛經因使歸州勘事回至咤灘船破五人同溺沔初入水若有人授竹一竿隨波出没至下牢鎮著岸不死視手中物乃金剛經也咤灘至於下牢鎮三百餘里出酉陽雜俎董進朝董進朝唐元和中入軍時宿直城東樓上一夕月明忽見四人著黄從東來聚立城下說己姓名狀若追捕因相語曰董進朝常持金剛經以一分功徳祝庇冥司我輩蒙惠如何殺之須枉命相代若此人他去我等無所頼矣其一人云董進朝對門有一人同年同姓夀限相埒可以代矣因忽不見進朝驚異之及明聞對門哭聲問其故死者父母云子昨宵暴卒進朝感泣說之因為殯塟供養其母後出家法名慧通住興元寺岀報應記康仲戚康仲戚唐元和十一年往海東數嵗不歸其母唯一子日乆憶念有僧乞食母具語之僧曰但持金剛經兒疾回矣母不識字令冩得經乃鑿屋柱以䧟之加漆其上晨暮敬禮一夕雷霆大震拔此柱去月餘兒果還以錦囊盛巨木以至家入拜跪母母問之仲戚曰海中遇風舟破墜水忽有雷震投此木於波上某因就浮之得至岸某命是其所與敢不尊敬母驚曰必吾藏經之柱即破柱得經母子常同誦念出報應記吴可乆吴可乆越人唐元和十五年居長安奉摩尼教妻王氏亦從之嵗餘妻暴亡經三載見夢其夫曰某坐邪見為蛇在皇子陂浮圖下明旦當死願為請僧就彼轉金剛經冀免他苦夢中不信叱之妻怒唾其面驚覺面腫痛不可忍妻復夢於夫之兄曰園中取龍舌草搗傅立愈兄寤走取授其弟尋愈詰旦兄弟同往請僧轉金剛經俄有大蛇從塔中出舉首徧視經終而斃可乆歸佛常持此經出報應記开行立唐开行立陜州人不識字長慶初常持金剛經一卷隨身到處焚香拜禮忽駞貨岀同州遇十餘賊行立棄貨而逃不五六十斤賊舉之竟不能動相視驚異追行立問之對曰中有金剛經恐是神力賊發囊果有經焉却與百餘千請其去誓不作賊受持終身出報應記僧法正唐江陵開元寺般若院僧法正日持金剛經三七遍長慶初得病卒至冥司見若王者問師生平作何功德答曰常念金剛經乃揖上殿登綉座念經七遍侍衛悉合掌階下考掠論對皆停息而聽念畢遣一吏引還王下階送曰上人更得三十年在人間勿廢讀誦因隨吏行數十里至一大坑吏因臨坑自後推之若隕空焉死已七日惟面不冷荆州僧常靖親見其事出酉陽雜俎沙彌道䕃唐石首縣有沙彌道䕃常念金剛經長慶初因他出夜歸中路忽遇虎吼擲而前沙彌知不免乃閉目坐黙念金剛經心期救䕶虎遂伏草守之及曙村中人來往虎乃去視其蹲處涎流於地出酉陽雜俎何老何老鄂州人常為商專誦金剛經唐長慶中因傭人負貨夜憇於山路忽困寐為傭者剄其首投於澗中取貨而趨市方鬻見何老來惶駭甚何曰我得誦經之力誓不言於人遂相與為僧出報應記勾龍義勾龍義閬州里人唐長慶中於郪縣傭力自給常以邑人有疾往省之見冩金剛經龍義無故毁棄而止絶之歸即喑啞醫不能愈頑嚚無識亦竟不悔僅五六年忽聞鄰人有念是經者惕然自責曰我前謗真經得此啞病今若悔謝終身敬奉却能言否自後每聞念經即倚壁專心而聽之月餘疑如念得數日偶行入寺逢一老僧禮之僧問何事遂指口中啞僧遂以刀割舌下便能語因與念經正如鄰人之聲乆而訪僧都不復見壁畫須菩提指曰此是也乃寫經畫須菩提像終身禮拜出報應記趙安趙安成都人唐太和四年常持金剛經日十遍㑹蠻冦退歸安於道中見軍器輒收置於家為仇者所告吏捕至門涕泣禮經而去為獄吏所掠遂自誣服罪將科斷到節帥㕔枷杻自解乃詰之安曰某不為盗皆得之巷陌每讀金剛經恐是其力節帥叱之不信及過次忽於安名下書一放字後即云餘並准法竟不知何意也及還洗浴禮經開匣視之其經揉裂折軸若壯夫之拉也妻曰某忽聞匣中有聲如有斫扑乃安被考訊之時無差失也出報應記太平廣記卷一百七
