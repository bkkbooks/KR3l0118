body:
  text: 太平廣記卷三百九十六宋李昉等編雨房𤣥齡不空三藏一行無畏三藏玉龍子狄惟謙子朗風秦始皇王莽賈謐張華劉耀劉裔徐羡之栁世隆崔恵景許世宗徐妃李密虹夏世隆陳濟妻薛願劉義慶首陽山韋臯雨房𤣥齡唐貞觀末房𤣥齡避位歸第時天旱太宗將幸芙蓉園以觀風俗𤣥齡聞之戒其子曰鑾輿必當見幸亟使灑掃兼備饌具有頃太宗果先幸其第便載入宫其夕大雨咸以為優賢之應出大唐新語不空三藏唐梵僧不空得總持門能役百神𤣥宗禮之嵗旱命祈雨不空言可過某日今祈之必暴雨上乃命金剛三藏設壇請雨果連淋注不止坊市有漂溺者遽召不空止之遂於寺庭建泥龍五六乃溜水胡言詈之良久復置之大笑有頃雨霽𤣥宗又嘗詔術士羅公逺與不空祈雨互陳其效俱召問之不空曰臣昨焚白檀香龍上命左右掬庭水嗅之果有檀香氣毎祈雨無他軌則但設數繡座手旋數寸木神念呪擲之自立於座上伺木神口角牙出目瞚雨輒至出酉陽雜俎一行僧一行開元中嘗旱𤣥宗令祈雨曰當得一器上有龍狀者方可致之命如内府遍視皆言不𩔖後指一鏡鼻盤龍喜曰此真龍矣持入道塲一夕而雨或云是揚州所進初範模時有異人至請閉户入室數日開户模成其人已失有圖并𫝊見行於世此鏡五月五日於揚子江心鑄之出酉陽雜俎無畏三蔵𤣥宗嘗幸東都大旱聖善寺竺乾國三蔵僧無畏善召龍致雨術上遣力士疾召請雨奏云今旱數當然召龍必興烈風雷雨適足暴物不可為之上彊之曰人苦暑疾久矣雖暴風疾雷亦足快意不得已乃奉詔有司陳請雨之具幡幢像設甚備笑曰斯不足以致雨悉命撤之獨盛一鉢水以小刀子攪旋之胡言數百祝之須臾有龍状𩔖其大指赤色首撤水上俄復没于鉢中復以刀攪呪之三頃之白氣自鉢中興如爐烟徑上數尺稍稍引出講堂外謂力士曰亟去雨至矣力士疾馳去還顧白氣旋繞亘空若一匹素既而昏霾大風震雷而雨力士纔及天津之南風雨亦隨馬而至天衢大樹多拔力士比復奏衣盡沾濕出栁氏史玉龍子唐𤣥宗至渭水侍者得玉龍子進上皇曰吾為嬰兒時天后召諸孫坐於殿上觀其嬉戯因出西國所貢玉環兼盃盤羅列殿上縱令争取以觀其志莫不奔競厚其所得時吾在其中獨坐略不為動后撫吾背曰此兒當為太平天子因取玉龍子賜吾本太宗於晉陽宫得之文徳皇后嘗置之衣中及大帝載誕日后以珠絡衣褓并玉龍子賜焉其後嘗蔵於内府雖廣不數寸而温潤精巧非人間所有以為國瑞帝帝相𫝊上皇即位初毎京師憫雨即禱之必有霖注逼而視之若奮鱗鬛開元中三輔大旱上皇復祈禱而涉旬無應乃宻投於南山龍池俄而雲物暴興風雨隨作及上皇幸西蜀車駕迴次渭水將渡駐蹕於水濱左右侍者因臨流濯沙中得之自後夜中必有光彩輝煥一室上皇還京為小黄門私竊以遺李輔國常置櫃中輔國將敗夜聞櫃中如有聲開而視之已亡所在人有詩曰聖運潛符瑞玉龍自興雲雨更無蹤不如渭水沙中得争保鑾輿復九重出神異錄狄惟謙唐㑹昌中北都晉陽令狄帷謙仁傑之後守官清恪不畏彊禦屬邑境亢陽自春徂夏數百里田皆耗斁禱於晉祠略無其應時有郭天師暨一并州女巫少攻符術多行厭勝監軍使攜至京國因縁中貴出入宫掖遂賜天師號旋歸本土僉曰若得天師一至晉祠則不足憂矣惟謙請於天師初甚難之既而敦請主帥遂親徃迓焉巫者唯唯乃具車輿列旛蓋惟謙躬為控馬既至祠所盛設供帳罄折庭中翌日語惟謙曰我為爾飛符上界請雨已奉天帝命必在至誠三日雨當足矣繇是四郊士庶雲集期滿無徵又曰災軫所興良由縣令無徳我為爾再告天七日方合有雨惟謙引罪奉之愈謹竟無其效乃驟欲入州復拜留曰天師已為萬姓来更乞至心祈請悖然而詈曰庸瑣官人不知天道天時未肯下雨留我將復奚為乃謝曰非敢更煩天師俟明相餞耳於是宿戒左右我為巫者所辱豈可復言為官􅁘詰旦有所指揮汝等咸須相禀是非好惡予自當之迨曉時門未開郭已嚴飾歸騎而狄酒殽供設一無所施郭乃坐堂中大恣呵責惟謙遂曰左道女巫妖惑日久當須斃在此日焉敢言歸叱左右於神前鞭背二十投於漂水祠後有山髙可十丈遽命設席焚香從吏悉皆放還簮笏立其上於是闔城駭愕云邑長杖殺天師馳走紛紜觀者如堵時砂石流爍忽起片雲大如車蓋先覆惟謙立所四郊雲物㑹之雷震數聲甘雨大澍原野無不滂流士庶數千自山擁惟謙而下州將以殺巫者初亦怒之既而精誠感應深加歎異表列其事詔書褒異云惟謙劇邑良才忠臣華胄覩兹天厲將癉下民當請禱於晉祠𩔖投巫於鄴縣曝山椒之畏景事等焚軀起天際之油雲情同剪爪遂使旱風潛息甘澤旋流昊天猶監克誠予意豈忘褒善特頒朱紱俾耀銅章勿替令名更昭殊績乃賜錢五十萬出劇談録子朗偽蜀王氏梁州天旱祈禱無驗僧子朗詣州云能致雨乃具十石甕貯水僧坐其中水滅於頂者凡三日雨足州將王宗儔異禮之檀越雲集後莫知所適僧令藹他日於興州見之因問其術曰此閉氣耳習之一月就本法於湫潭中作觀與龍相繫龍為定力所制必致驚動因而致雨然不如甕中為之保無他害出北夢瑣言風秦始皇秦始皇二十八年渡淮至衡山浮江至湘遇大風博士云堯女舜妻𦵏於此始皇怒使刑徒三千人伐湘山樹出廣古今五行記王莽王莽地皇四年大風毁路堂其年司徒王尋司空王邑守昆陽光武起兵南陽至昆陽敗之風雷屋瓦皆飛雨下如注􅘷川盛溢尋邑乗死人而渡王尋見殺軍人皆散走王邑還長安莽敗俱伏誅出廣古今五行記賈謐西晉八年六月飄風吹賈謐朝衣飛數百丈明年謐誅其年十一月京都大風發屋折木十二月愍懐太子幽廢死於許昌三子幽于金墉殺太子母謝氏喪還洛又大風雷電帷蓋風裂出廣古今五行記張華西晉永康元年大風飛石沙折木其年四月張華舎風飄起折木飛繒軸六七枚是月趙王倫矯制廢賈后害張華裴頠等出廣古今五行記劉曜前趙劉曜葬父母費用億計發掘古塚暴骸骨原野哭聲盈衢大霖雨震曜父墓門屋大風飄發父寢堂于外垣五十餘步松柏植以成林至是悉枯死曜竟為石勒所擒出廣古今五行記劉裔東晉成帝時劉裔鎮守潯陽有迴風從東来入裔船中状如匹練長五六丈術人戴洋曰有刀兵死喪之亂頃為郭黙所殺出廣古今五行記徐羡之宋徐羨之文帝初任揚州有飄風起自西門須臾合直至㕔事繞㡌及席逕造西際尋而羡之為文帝所誅出廣古今五行記栁世隆宋孝武時栁太尉世隆乗車行還於庭中洗車有大風從門而入直来衝車有聲車葢覆向天是年明帝立合門􅀍誅出廣古今五行記崔恵景宋崔恵景圍臺城有五色旛風吹飛入雲中半日乃下衆見驚異相謂曰幡者事當翻覆數日而恵景敗許世宗北齊北海王許世宗時轉為錄尚書拜命其夜暴風震雷拔庭中桐樹六十圍者倒立本處識者知其不終竟為髙肇所譛旬日處死徐妃梁元帝妃徐妃初嫁夕車至西州而疾風大起發屋折木無何雪霰交下帷簾皆白及長還之日又大雷電西州㕔事兩柱俱碎帝以為不祥妃竟以淫􅁾自殺不終之應李密隋大業十三年二月李密於鞏縣南設壇刑白馬祭天稱魏公置僚佐改元昇壇時黑風從西北暴至吹密衣冠及左右僚屬皆倒於壇下沙塵暗天咫尺不相見良久乃息賊軍惡之俄而密敗并出廣古今五行記虹夏世隆故越王無諸舊宫上有大杉𣗳空中可坐十餘人越人夏世隆髙尚不仕常之故宫因雨霽欲暮斷虹飲於宫池漸漸縮小化為男子著黄赤紫之間衣而入樹良久不出世隆怪異乃召鄰之年少十數人徃視之見男子為大赤蛇盤繞衆懼不敢逼而少年遥擲瓦礫聞樹中有聲極異如婦人之哭須臾雲霧不相見又聞𨼆𨼆如遠雷之響俄有一彩龍與赤鵠飛去及曉世隆往觀之見𣗳中紫蛇皮及五色蛟皮欲取以歸有火生樹中樹焚蕩盡吴景帝永安三年七月也出東甌後記陳濟妻廬陵巴邱人陳濟為州吏其婦秦在家一丈夫長大端正著絳碧􅂁衫色炫耀来從之後常相期於一山澗至於寝處不覺有人道相感接如是積年村人觀其所至輒有虹見秦至水側丈夫有金瓶引水共飲後遂有身生而如人多肉濟假還秦懼見之内于盆中丈夫云兒小未可得我去自衣即以絳嚢盛時出與乳之時輒風雨鄰人見虹下其庭丈夫復少時来將兒去人見二虹出其家數年而来省母後秦適田見二虹於澗畏之須臾見丈夫云是我無所畏從此乃絶出神異𫝊薛願東晉義熙初晉陵薛願有虹飲其釜鬲噏響便竭願輦酒灌之隨投隨竭乃吐金滿器於是日益隆富出文樞竟要劉義慶宋長沙王道鄰子義慶在廣陵卧疾食粥次忽有白虹入室就飲其粥義慶擲器於階遂作風雨聲振於庭户良久不見出獨異志首陽山後魏明帝正光二年夏六月首陽山中有晩虹下飲於溪泉有樵人陽萬於嶺下見之良久化為女子年如十六七異之問不言乃告蒲津戍將宇文顯取之以聞明帝召入宫見其容貌姝美問云我天女也暫降人間帝欲逼幸而色甚難復令左右擁抱聲如鐘磬化為虹而上天出入廟窮經錄韋臯唐宰相韋臯鎮蜀嘗與賔客從事十餘人宴郡西亭暴風雨俄頃而霽方就食忽虹蜺自空而下直入庭垂首於筵韋與賔偕悸而退吸其食飲且盡首如驢霏然若晴霞狀紅碧相靄虚空五色四視左右久而方去公懼且惡之遂罷宴時故河南少尹豆盧署客于蜀亦列坐因起曰公何為色憂乎曰吾聞虹蜺者妖沴之氣今宴方酣而沴氣止吾筵豈非怪之甚者乎吾竊懼此署曰真天下祥符也固不為人之怪耳夫虹蜺天使也降於邪則為戾降於正則為祥理宜然矣公正人也是宜為慶為祥敢以前賀於是具以帛書其語而獻公覽而喜後旬餘有詔就拜中書令出祥驗集太平廣記卷三百九十六
