body:
  text: 太平廣記卷四百八十一宋李昉等編蠻夷二新羅東女國廩君大食國私阿修國俱振提國牂牁龜兹乾陁國新羅新羅國東南與日本隣東與長人國接長人身三丈鋸牙鈎爪不火食逐禽獸而食之峕亦食人祼其軀黒毛覆之其境限以連山數千里中有山峽固以銕門謂之銕闗常使弓弩數千守之由是不過出紀聞又新羅國有第一貴族金哥其逺祖名旁㐌有弟一人甚有家財其兄旁㐌因分居乞衣食國人有與其隙地一畆乃求蠶榖種于弟弟蒸而與之旁㐌不知也至蠶旹止一生焉日長寸餘居旬大如牛食數樹葉不足其弟知之伺間殺其蠶經日四方百里内蠶悉飛集其家國人謂之巨蠶意其蠶之王也四鄰共繰之不供榖唯一莖植焉其穗長尺餘旁㐌常守之忽為鳥所折銜去旁㐌逐之上山五六里鳥入一石罅日沒徑黒旁㐌因止石側至夜半月明見羣小兒赤衣共戲一小兒曰汝要何物一曰要酒小兒出一金錐子擊石酒及罇悉具一曰要食又擊之餅餌羮炙羅於石上良久飲食而久以金錐揷于石罅旁㐌大喜取其錐而還所欲随擊而辦因是富侔國力常以珠璣贍其弟弟云我或如兄得金錐也旁㐌知其愚諭之不及乃如其言弟蠶之止得一金如常者榖種之復一莖植焉將熟亦為鳥所啣其弟大悦随之入山至鳥入處遇羣鬼怒曰見竊余錐者乃執之謂曰爾欲為我築糠三版乎爾欲鼻長一丈乎其弟請築糠三版三日饑困不成求哀于鬼鬼乃拔其鼻鼻如𧰼而歸國人怪而聚觀之慙恚而卒其後子孫戲錐求狼糞因雷震錐失所在出酉陽雜俎又登州賈者馬行餘轉海擬取昆山路適桐廬峕遇西風而吹到新羅國新羅國君聞行餘中國而至接以賔禮乃曰吾雖夷狄之邦歲有習儒者舉于天闕登第榮歸吾必禄之甚厚乃知孔子之道被于華夏乎因與行餘論及經籍行餘避位曰庸陋賈䜿長養雖在中華但聞土地所宜不讀詩書之義熟詩書明禮義者其唯士大夫乎非小人之事也乃辭之新羅君訝曰吾以中國之人盡閑典教不謂尚有無知之俗歟行餘還至鄉井自慙以貪吝衣食愚昧不知學道為夷狄所嗤况英哲乎出雲溪友議又天寳初使贊善大夫魏曜使新羅䇿立幼主曜年老深憚之有客曽到新羅因訪其行路客曰永徽中新羅日本皆通好遣使兼報之使人既達新羅将赴日本國海中遇風波濤大起數十日不止随波漂流不知所届忽風止波静至海岸邉日方欲暮旹同志數船乃維舟登岸約百有餘人岸髙二三十丈望見屋宇争往趨之有長人出長二丈身具衣服言語不通見唐人至大喜于是遮擁令入宅中以石填門而皆出去俄有種𩔖百餘相随而到乃簡閲唐人膚體肥充者得五十餘人盡烹之相與食噉兼出醇酒同為宴樂夜深皆醉諸人因得至諸院後院有婦人三十人皆前後風漂為所擄者自言男子盡被食之唯留婦人使造衣服汝等今乗其醉何為不去吾請道焉衆悦婦人出其練縷數百匹負之然後取刀盡斷醉者首乃行至海岸岸髙昏黒不可下皆以帛繫身自縋而下諸人更相縋下至水濵皆得入船及天曙船發聞山頭呌聲顧來處已有千餘矣絡繹下山須臾至岸既不及船虓吼振騰使者及婦人並得還出紀聞又近有海客往新羅次至一島上滿地悉是黒漆匙筯其處多大木客仰窺匙筯乃木之花與鬚也因拾百餘雙還用之肥不能使偶取攪茶随攪随消焉出酉陽雜俎又六軍使西門思恭常銜命使于新羅風水不便累月漂泛于滄溟罔知邉際忽南抵一岸亦有田疇物景遂登陸四望俄有一大人身長五六丈衣踞差異聲如震雷下顧西門有如驚歎于旹以五指撮而提行百餘里入一巖洞間見其長幼羣聚逓相呼集競來看玩言語莫能辨皆有歡喜之容如獲異物遂掘一坑而寘之亦來看守之信宿之後遂攀縁躍出其坑逕尋舊路而竄纔跳入船大人已逐而及之矣便以巨手攀其船舷于是揮劒斷下三指指粗于今槌帛棒大人失指而退遂解䌫舟中水盡糧竭經月無食以身上衣服囓而㗖之後得達北岸遂進其三指漆而蔵于内庫洎拜主軍寧以金玉遺人平生不以飲饌食客為省其絶糧之難也出玉堂閒話東女國東女國西羌别種俗以女為王與茂州鄰有八十餘城以所居名康延州中有弱水南流用牛皮為船以渡户口兵萬人散山谷號曰賔就有女官號曰髙霸平議國事在外官僚並男夫為之五日一聼政王侍左右女數百人王死國中多斂物至數萬更于王族中求令女二人而立之大者為大王小者為小王大王死則小王位之或姑死婦繼無墓所居皆重屋王至九重國人至六層其王服青毛裙下領衫其袖委地以文錦為小髻飾以金耳垂璫足履素鞾重婦人而輕丈夫文字同于天竺以十一月為正每十月令巫者齎酒餚詣山中散糟麥于空大呪呼鳥俄有鳥如雉飛入巫者之懐因剖腹視之有谷來歲必登若有霜雪必有大災其俗名為島上人死則納骨肉金瓶中和金瓶而埋之出神異記廩君李旹字𤣥休廩君之後昔武洛鍾離山崩有石穴一赤如丹一黒如漆有人出於丹穴者名務相姓已氏有出于黒穴者凡四姓􅀈氏樊氏柏氏鄭氏五姓出而争焉于是務相以矛刺穴能著者為廩君四姓莫著而務相之劍懸又以土為船雕畫之而浮水中曰若其船浮者為廩君務相船又獨浮于是遂稱廩君乗其土船將其徙卒當夷水而下至于鹽陽水神女子止廩君曰此魚鹽所有地又廣大與君俱生可無行廩君君我當為君求廩地不能止也鹽神夜從廩君宿旦輒去為飛蟲諸神皆従其飛蔽日廩君欲殺之不可别又不知天地東西如此者十日廩君即以青縷遺鹽神曰嬰此即宜之與汝俱生不宜將去汝鹽神受而嬰之廩君至碭石上望膺有青縷者跪而射之中鹽神鹽神死羣神與俱飛者皆去天乃開朗廩君復乗土船不及夷城石岸曲泉水亦曲望之如穴状廩君歎曰我新從穴中出今又入此奈何岸即為崩廣三丈餘而階階相承廩君登之岸上有平石長五尺方一丈廩君休其上投策計算皆著石焉因立城其旁有而居之其後種𩔖遂繁秦并天下以為黔中郡薄賦斂之歲出錢四十萬巴人以賦為賨因謂之賨人焉出録異記大食國大食西南二千里有國山谷間樹枝上生花如人首但不語人借問笑而已頻笑輒落出酉陽雜俎私阿修國私阿修國金遼山寺中有石鼉衆僧飲食將盡向石鼉作禮于是飲食悉具出酉陽雜俎俱振提國俱振提國尚鬼神城北隔真珠江二十里有神春秋之峕國王所須什物金銀器神厨中自然而出祠畢亦滅天后使人驗之不妄出酉陽雜俎牂牁獠在牂牁其婦人七月生子死則􅆆棺埋之木耳夷舊牢西以鹿角為器其死則屈而燒而埋其骨木耳夷人黒如漆小寒則焙沙自處但出其面出酉陽雜俎龜兹古龜兹國主阿主皃者有神異力能降伏毒蛇龍峕有人買市人金銀寳貨至夜中錢並化為炭境内數百家皆失金寳王有男先出家成阿羅漢果王問之羅漢曰此龍所為居北山其頭若虎今在某處眠耳王乃易衣持劍黙至龍所見龍卧將斬之思曰吾斬寐龍誰知吾有神力遂叱龍龍驚起化為獅子王即乗其上龍怒作雷聲騰空至城北二十里王謂龍曰爾不降當斷爾頭龍懼王神力人語曰勿殺我我當與王為乗欲有所向随心所至王許之後遂乗龍而行出酉陽雜俎葱嶺以東人好淫僻故龜兹于闐置女市以収錢出十三州志龜兹元日闘羊馬駞為戲七日觀勝負以占一年羊馬減耗繁息也婆邏遮並服狗頭猴面男女無晝夜歌舞八月十五日行像及透索為戲焉耆元日二月八日婆摩遮三日野祀四月十五日逰林五月五日彌勒下生七月七日祀生祖九月九日麻撒十月十日王為厭法王領家出宫首領代王焉一日一夜處分王事十月十四日每日作樂至歲窮拔汗那十二月及元日王及首領分為兩朋各出一人著甲衆人執瓦石棒棍東西互撃甲人先死即止以占當年豐儉出酉陽雜俎乾陁國乾陁國昔有王神勇多謀號伽當討襲諸國所向悉降至五天竺國得上細緤二條自留一一與妃妃因衣其緤謁王緤當妃乳上有鬱金香手印跡王見驚恐謂妃曰爾忽衣此手跡衣服何也妃言向王所賜之緤王怒問蔵臣蔵臣曰緤本有是非臣之咎王追商者問之商言天竺國婆陁婆恨王有宿願每年所賦細緤並重疊積之手染鬱金柘于緤上手萬重手印即透丈夫衣之手印當背婦人衣之手印當乳王令左右披之皆如商者王因叩劍曰吾若不以此劍裁婆陀婆恨王手足無以寝食乃遣使就南天竺索娑陁婆恨王手足使至其國娑陁婆恨王與羣臣紿報曰我國雖有王名娑陁婆恨元無王也但以金為王設于殿上凡統領教習皆臣下耳王遂起象馬兵南討其國國𨼆其王于地窟中鑄金人來迎伽王伽王知其偽且自恃神力因斷金人手足娑陁婆恨王于窟中手足悉皆自落出酉陽雜俎乾陁國者尸毘王倉庫為火所燒其中糧米燋者于今尚存服一粒永不患瘧出酉陽雜俎太平廣記卷四百八十一
