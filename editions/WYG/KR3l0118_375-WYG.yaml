body:
  text: 太平廣記卷三百七十五宋李昉等編再生史姁范明友奴陳焦崔圅柳萇劉凱石涵中人杜錫家婢漢宫人李娥河間女子徐𤣥方女蔡支妻陳朗婢干寳家婢韋諷女奴鄴中婦人李仲通婢崔生妻東萊人女史姁漢陳留考城史姁字威明年少時嘗病臨死謂母曰我死當復生埋我以竹杖柱於瘞上若杖折掘出我及死埋之柱如其言七日往視杖果折即掘出之已活走至井上浴平復如故後與鄰船至下邳賣鋤不時售云欲歸人不信之曰何有千里暫得歸耶答曰一宿便還即不相信作書取報以為驗實一宿便還果得報考城令江夏􅢬賈和亦病在鄰里欲急知消息請往省之路遙三千再宿還報出捜神記范明友奴漢末人范明友家奴猶活明友是霍光女壻說光家事廢立之際多與漢書相應此奴常遊走民間無止住處竟不知所在出博物志陳焦孫休永安四年吳民陳焦死埋之六日更生穿土而出出五行記崔涵後魏菩提寺西域人所立也在慕義沙門達多發墓取塼得一人以送時太后與孝明帝在華林園以為妖異謂黄門郎徐紇曰上古以來頗有此事不紇曰昔魏時發塜得霍光女壻范明友家奴說漢朝廢立於史書相符此不足為異也后令紇問其姓名死來幾年何所飲食荅曰臣姓崔名涵字子洪博陵安平人父名暢母姓魏家在城西阜財里死時年十五今乃二十七在地下十二年常似醉卧無所食時復逰行或遇飲食如夢中不甚辨了后即遣門下錄事張雋詣阜財里訪涵父母果有崔暢其妻魏雋問暢曰卿有兒死不暢曰有息子涵年十五而亡雋曰為人所發今日蘇活主上在華林園遣我來問暢聞驚怖曰實無此兒向者謬言雋具以實聞后遣送涵向家暢聞涵至門前起火手持刀魏氏把桃杖拒之曰汝不須來吾非汝父汝非我子急速去可得無殃涵遂捨去遊於京師嘗宿寺門下汝南王賜黄衣一通性畏日不仰視天又畏水火及兵刃之屬常走於路疲則止不徐行也時人猶謂是鬼洛陽大市北有奉終里里内之人多賣送死之具及諸棺槨涵謂曰栢棺勿以桑木為榱人問其故涵曰吾在地下見發鬼兵有一鬼稱是栢棺應免兵吏曰爾雖栢棺桑木為榱遂不免兵京師聞此栢木湧貴人疑賣棺者化涵故發此言出塔寺栁萇梁承聖二年二月十日司徒府主簿栁萇卒子褒塟於九江三年因大雨塜壞移塟换棺見父棺中目開心有暖氣良久乃謂褒曰我生已一嵗無因令汝知九江神知我横死遣地神以乳飼我故不死今雨壞我塜亦江神之所為也扶出更生三十年卒出窮神祕苑劉凱唐貞觀二年陳留縣尉劉全素家于宋州父凱曽任衞縣令卒於官塟于郊三十餘年全素丁母憂䕶喪歸衞將合塟既至啓發其尸儼然如生稍稍而活其子踊躍舉扶將夕能言曰别久佳否全素泣而敘事乃曰勿言吾盡知之速命東流水為湯既至沐浴易衣飲以糜粥神氣屬乃曰吾在幽途蒙署為北鄷主者三十年考治幽滯以功業得再生恐汝有疑故粗言之仍戒全素不得泄於人全素遂呼為季父後半年之蜀不還不知所終出通幽記石函中人上都務本坊貞元中有一人家因打牆掘地遇一石函發之見物如絲滿函飛出於外視之次忽有一人起於函中被髮長丈餘振衣而起出門失所在其家亦無他前記中多言此事葢道太隂鍊形日將滿人必露之出酉陽雜俎杜錫家婢此已下婦人再生漢杜錫家葬而婢誤不得出後十餘年開塜袝塟而婢尚生問之曰其始如瞑目自謂當一再宿耳初婢埋時年十五六及開塜後姿質如故更生十五六年嫁之有子出捜神記漢宫人漢末關中大亂有發前漢時宫人冡者人猶活既出平復如舊魏郭后愛念之錄置宫中常在左右問漢時宫内事說之了了皆有次敘郭崩哭泣過禮遂死出博物記李娥漢末武陵婦人李娥年六十歳病卒埋於城外已半月娥鄰舍有蔡仲聞娥富乃發塜求金以斧剖棺娥忽棺中呼曰蔡仲䕶我頭仲驚便為縣吏所收當棄市娥兒聞母活來迎出之太守召娥問狀娥對曰誤為司命所召到時得遣出門外見内兄劉文伯驚相對泣娥曰我誤為所召今復得歸既不知道又不能獨行為我求一伴我在此已十餘日已為家人所葬那得自歸也文伯即遣門卒與户曹相聞荅曰今武陵西界有男子李黑亦得還便可為伴兼敕黒過娥鄰舍令蔡仲發出於是文伯作書與兒娥遂與黑同歸太守聞之即赦蔡仲仍遣馬吏於西界推問李黑如娥所述文伯所寄書與子子識其紙是父亡時所送箱中之書矣出窮神祕苑河間女子晉武帝時河間有男女相悅許相配􅆘而男從軍積年不歸女家更以適人女不願行父母逼之而去尋病死其夫戍還問女所在其家具說之乃至家欲哭之敘哀而不勝情遂發冢開棺女即蘇活因負還家將養平復後夫聞乃詣官争之郡縣不能決以讞廷尉奏以精誠之至感於天地故死而更生是非常事不得以常理斷請還開棺者出捜神記徐𤣥方女晉東馮孝將廣州太守兒名馬子年二十歳餘獨卧廏中夜夢見女子年十八九言我是太守北海徐𤣥方女不幸早亡亡來出入四年為鬼所枉殺案生錄當年八十餘聽我更生要當有依慿乃得活又應為君妻能從所委見救活不馬子答曰可爾與馬子尅期當出至期日牀前有頭髪正與地平令人埽去愈分明始悟所夢者遂屏左右便漸額面出次頭形體俱出馬子便令坐對榻上陳說語言竒妙非常遂與馬子寢息毎戒云我尚虚借問何時得出答曰出當待本生生日尚未至遂往廏中言語聲音人皆聞之女計生日至敎馬子出已養之方法語畢拜去馬子從其言至日以丹雄鷄一隻黍飯一盤清酒一升醊其喪前去廏十餘步祭訖掘棺出開視女身體完全如故徐徐抱出著氊帳中唯心下微暖口有氣令婢四守養護之常以青羊乳汁瀝其兩眼始開口能咽粥積漸能語二百日持杖起行一朞之後顔色肌膚氣力悉復常乃遣報徐氏上下盡來選吉日下禮聘為夫婦生二男長男字元慶嘉和初為祕書郎小男敬度作太傅掾女適濟南劉子彦徵士延世之孫出法苑珠林蔡支妻臨淄蔡支者為縣吏曽奉書謁太守忽迷路至岱宗山下見如城郭遂入致書見一官儀衞甚嚴具如太守乃盛設酒殽畢付一書謂曰掾為我致此書與外孫也吏答曰明府外孫為誰答曰吾太山神也外孫天帝也吏方驚乃知所至非人間耳掾出門乘馬所之有頃忽達天帝座太微宫殿左右侍臣具如天子支致書訖帝命坐賜酒食仍勞問之曰掾家屬幾人對父母妻皆已物故尚未再娶帝曰君妻卒經幾年矣支曰三年帝曰君欲見之否支曰恩唯天帝帝即命户曹尚書勅司命輟蔡支婦籍於生錄中遂命與支相隨而去歸家因發妻塜視其形骸果有生驗須臾起坐語遂如舊出列異𫝊陳朗婢義熙四年琅邪人陳朗婢死已葬府史夏假歸行塜前聞土中有人聲怪視之婢曰我今更活為我報家其日已暮旦方開土取之彊健如常出五行記干寶家婢干寶字令升父瑩為丹陽丞有寵婢母甚妬之及瑩亡葬之遂生持婢於墓干寶兄弟尚幼不之審也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父恩情如舊地中亦不覺為惡既而嫁之生子出五行記韋諷女奴唐韋諷家于汝潁常虚黙不務交朋誦習時暇緝園林親稼植小童薙草鋤地見人髪鋤漸深漸多而不亂若新梳理之狀諷異之即掘深尺餘見婦人頭其肌膚容色儼然如生更加鍬鍤連身臂全唯衣服隨手如紛其形氣漸盛頃能起便前再拜言是郎君祖之女奴也名麗容初有過娘子多妬郎不在便生埋於園中託以他事亡去更無外人知某初死被二黑衣人引去至一處大闕廣殿賁勇甚嚴拜其王略問事故黒衣人具述端倪某亦不敢訴娘子須臾引至一曹司見文案積屋吏人或三或五檢尋甚閙某初一吏執案而問檢案言某命未合死以娘子巨蠹非理強殺其斷減娘子十一年祿以與某又經一判官案問亦見娘子判官尋别有故被罰去職某案便被寢絶九十餘年矣彼此散行昨忽有天官來搜求幽繫㝠司積滯者皆決遣某方得處分如某之流亦甚多數葢以下賤之人㝠官不急故也天官一如今之道士絳服朱冠羽騎隨從方決幽滯令某重生亦不失十一年祿諷問曰魂既有所詣形何不壞答曰凡事未了之人皆地界主者以藥傅之遂不至壞諷驚異之乃為沐浴易衣貌如二十許來其後潛道幽㝠中事無所不至諷亦洞曉之常曰修身累徳天報以福神仙之道宜勤求之數年後失諷及婢所在親族於其家得遺文紀在生之事時武徳二年八月也出通幽記鄴中婦人竇建徳常發鄴中一墓無他物開棺見婦人顔色如生姿容絶麗可年二十餘衣物形制非近世者候之似有氣息乃收還軍養之三日而生能言云我魏文帝宫人隨甄皇后在鄴死葬於此命當更生而我無家屬可以申訴遂至幽隔不知今乃何時也說甄后見害了了分明建徳甚寵愛之其後建徳為太宗所滅帝將納之乃具以事白且辭曰妾幽閉黄壤已三百年非竇公何以得見今日死乃妾之分也遂飲恨而卒帝甚傷之出神異錄李仲通婢開元中李仲通者任鄢陵縣令婢死埋於鄢陵經三年遷蜀郫縣宰家人掃地見髪出土中頻掃不去因以手㧞之鄢陵婢隨手而出昏昏如醉家人問婢何以致此乃曰適如睡覺仲通以為鬼乃以桃湯灌洗書符禦之婢殊不懼喜笑如故乃閉於别室以餅哺之餐啖如常經月餘出之驅使如舊便配與奴妻生一男二女更十七年而卒出驚聽錄崔生妻元和間有崔生者前婚蕭氏育一兒卒後婚鄭氏蕭卒十二年託夢於子曰吾已得却生於陽間為吾告汝母能發吾邱乎子雖夢不能言後三日又夢如此子終不能言鄭氏有賢徳蕭乃下語於老家人云為吾報鄭夫人速出我更兩日即不及矣老家人呌曰娘子却活也夫人卜之曰無生象即罷來日家人又曰娘子却活也鄭夫人再占卜人曰有生象即開墳果活動矣舁歸鄭夫人以粥飲之氣通能言具說幽途知撫育賢徳之恩又說初有一龜環遶某遺骸而去數日又來環遶將去復來囓某足指則知前卜無生象者龜止環遶而已後云有生象者是龜咬足指也蕭氏與鄭氏為姊妹共居情若骨肉得十年而終出芝田錄東萊人女東萊人有女死已葬女至㝠司以枉見捕得還乃勅兩吏送之鬼送墓中雖活而無從出鬼亦患之乃問女曰家中父母之外誰最念汝女曰獨季父耳一鬼曰吾能使來刼墓季父見汝活則遂生也女曰季父仁惻未嘗有過豈能發吾冢耶鬼曰吾易其心也留鬼守之一鬼去俄而季父與諸刼賊發意開棺女忽從棺中起季父驚問之具以前白季父大加慙恨諸賊欲遂殺之而季父號泣哀求得免負之而歸出廣異記太平廣記卷三百七十五
