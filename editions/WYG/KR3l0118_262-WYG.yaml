body:
  text: 太平廣記卷二百六十二嗤鄙五崔育宇文翃韓簡胡令楊錚謝柴書郡牧張咸光長鬚僧道流三妄人周韋二子不識鏡嚙鼻助喪禮外學歸行弔癡壻魯人執竿齊人學瑟市馬昭應書生崔育唐闕前進士崔育以中原亂離客於邊上亦闕聞輙事輕薄刺郡者亦是朝僚多勉而闕牛帶竹笠大如雨席仍牛前遣撾角村闕城郭士女隨觀謂之精怪每謁州郡騎闕咍之者怒之者相半至則投刺其名銜闕躭酒嗜肉憐葱愛蒜不得已而闕懸宰視之如土木藩帥郡侯柰之不可闕州民臠其肉族其家葢輕薄之所致也闕宇文翃唐進士宇文翃深慕上科有女及笄國色朝中令及第者闕餘方謀繼室兄回為諫議闕遂娉女與璠為言於回矣闕滑臺杜志名時有喪遭火幾􅅡棺柩闕因而延燎杜謂宇文曰魚將化龍闕有燒闕之事用以譏闕出北夢瑣言韓簡唐魏博節度使韓簡性粗質每對文士不曉其說心常耻之乃召一孝㢘講論語至為政篇翌日謂諸從事曰僕近方知古人淳朴年三十方能行立外有聞者無不絶倒出北夢瑣言胡令奉先縣有令姓胡忘其名黷貨靳食僻好博奕邑寄張廵官好尚既同往來頗洽每㑹棊必自旦及暮品格既停略無厭倦然宰君時入中門少頃又來對棊如是日日早入晚歸未嘗設食於張不勝饑凍潛知之時入葢自食而復出及暮辭宰曰且去也極是叨鐵胡唯唯而已張去胡忽思之曰此人相别云極是叨鐵出何文譚急令追之既至問明公適云極是叨鐵其義安在張復欵坐謂曰長官豈不知有叨鐵􅁘曰不知曰還見冶爐家置一鐵􅗋長杖乎只此是爐中猛火炎熾鐵汁或未消融使此杖時時於爐中橦猛火了却出來移時又橦猛火了却出來只此是叨鐵也言訖而去胡入室話於妻子再三思之方知諷其每日自入噇猛火了却出來棋也凡靳食倦客之士時人多以此諷之出玉堂閑話楊錚蜀秀才楊錚錚音竹航反自言楊錚不均駟馬奔鄭是以字奔鄭行惡詩或故作落韻或醜􅁾語取人笑翫裝修卷軸投謁王侯門到者無不逢迎雄藩大幕爭馳車馬迎之錚每行僕馬甚盛平頭騎從騾攜書袋偏郡小邑尤更精意承事之慮其謗讟黔南節度使王茂權聰明有文武才四方負藝之士㒺不集其門召錚至飭東閣盡禮待之時令貢惡詩以為歡笑諸客請召有不得次者以為怏怏茂權一日忽屏從謂之曰秀才客于當州必欲諮留相伴至罷鎮同歸可乎如可則當奉為卜娶所居奉留錚欣然從之權令媒氏與問名某氏之屬至於成迎筵宴為備焉仍邀諸從事赴㑹錚親見女容質異常端麗及成禮遽遭毆辱左右婢僕皆是扶同共相毁詈不勝其苦乃是茂權訝飭無鬚少年數輩皆濃裝豔服以紿之然後茂權自赴㑹大笑此後復就茂權屢自乞一邑初有難色賔從共諮方許之遂命給簡署及期治行李擇良日辭謝本邑近候人力自衙門外至通衢忽有二健歩手執一牒當街趨拽下馬奪去巾帶云有府㫁攝官送獄荷校滅耳茂權遂詐作計贈遺二夫令脫逃而遁潛藏旬日方召出之軍州大以為笑出王氏見聞謝柴書唐有内大臣學作别紙言語鳯翔節度使寄柴數車囘書謝云蒙恵也愚若干出盧氏雜說郡牧唐有膏粱子出刺郡人迎候甚至前任與之設交代之禮儀無闕者二禮生具頭冠禮衣相其賔主升降揖讓而新牧巑岏踧踖斂容低視不敢正面對禮生及禮畢使人再三傳語慰勞感謝皆莫涯其意翌日於内閣從禮生從容生極惶恐㒺知去就既坐嚬蹙低語曰賢尊安否禮生唯唯又曰頃年營大事時極煩賢尊心力生亦懵然及罷有親知細詢之乃曰此禮生像方相子弟昔曽使他家君是以再三感謝且士流中亦有故為輕薄者亦有昧於菽麥不能分别者信而有之出玉堂閑話張咸光梁龍徳年有貧衣冠張咸光遊丐無度於梁宋之間復有劉月明者與咸光相𩔖常懐匕箸每遊貴門即遭虐戲方飱則奪其匕箸則袖中出而用之梁駙馬温積諫議權判開封府事咸光忽遍詣豪門告别問其所詣則曰往投温諫議也問有何紹介而往答曰頃年大承記録此行必厚遇也大諫嘗製碣山潛龍宫上梁文云饅頭似椀胡餅如籭暢殺劉月明主簿喜殺張咸光秀才以此知必承顧盼聞者絶倒出玉堂閒話長鬚僧三蜀有長鬚長老自言是宰相孔謙子究莫知誰何剃髮鬚皓然垂腹擁百餘衆自江湖入蜀所在甿俗瞻駭儀表争相騰踐而禮其足凡所經由傾城而出河目海口人莫之測至蜀螺鈸迎焉先謁樞宻使宋光嗣因問曰師何不剃鬚答曰落髪除煩惱留鬚表丈夫宋大恚曰吾無髭豈是老婆􅁘遂揖出俟剃却髭即引朝見徒衆既多旬日盤桓不得已剃髭而入徒衆耻其失節悉各散亡偽蜀主問曰逺聞師有長鬚之號何得如是對曰臣在江湖嘗聞陛下已證須陀洹果是以和鬚而來今見陛下將證阿那含果是以剃鬚而見少主初未喻首肯之及近臣解釋大為歡笑後住持静亂寺數為大衆論訟有上足以不謹獲罪伶人藏柯曲深慕空門而不知其中猥細謂是清静捨俗落髮謹事瓶鉢漸見􅁾濫詬詈而出以袈裟掛於寺門曰吾比厭俗塵投身清潔之地以滌其業障今大師之門甚於花栁曲吾不能為之遂復歸於樂籍蜀人謂師曰一事南無折却長鬚出王氏見聞道流闕任興元節判離秦州鄉地未及嵗年忽有來尋師者齎親表施州刺史劉緘封衣紫而來兼言往洋州求索詢其行止云某忝竊鄉闗之分元於秦州西昇觀入道多年遂沉吟思之當離鄉日觀中無此道流深感其命服所求其人亦忩忩而過旬月間自洋源廻薄有所獲告辭之意亦甚揮遽遂設計延佇佛榻止之夜静沃以醴醪數甌然後徐詢之曰尊師身邊紫綬自何而得宜以直誠相告對曰此是先和尚命服𫝊而衣之乃是廣修寺著紫僧弟子師既殂乃舍空門投西昇觀入道便以紫衣而服之自謂𫝊得本師衣鉢豈有道士竊衣先和尚紫衣未之前聞出玉堂閒話三妄人孫光憲在蜀時曽到資州見應真觀李道士話州有姓趙人閉闗却掃以廊廟自期都虞侯閻普敬異之躬自趨謁閻魁梧丈夫趙生迎門愕眙良久磬折叙寒温曰伏惟􅆛貅閻乃質於先容者俾詢之趙生曰若云熊羆即須宰相之才方當此語閻公止於都頭已來只銷呼為􅆛貅人聞咸笑之又一士自稱張舍人訴於光憲曰兄長以術惑我心神憲謂曰得非蠱毒厭勝之術􅁘張曰非也乃用鬼谷子捭闔捭破我心神至今患心風不禁又江陵顔雲偶收諸葛亮兵書自言可用十萬軍吞并四海每至論兵必攘袂叱咤若對大敵時人謂之檢譜角觝也時有行軍王副使幽燕舊將聲聞宇内顔生候謁稱是同人自言大志不伸喪良友也每慟哭焉出北夢瑣言周韋二子周韋巽太尉昭度之子也尫懦昬鈍率由婢嫗仕偽蜀王氏以故舊優容之因至卿監或為同列所譏云三公門前出死䑕巽曰死䑕門前出三公周即蜀相周博雅之子為王氏駙馬都尉性識庸鄙國亡後與貧丐者為伍俾一人先導爵里於闤闠酒肆有哀之者日獲三二百錢即與其徒飲噉而已咸嗟嘆之出北夢瑣言不識鏡有民妻不識鏡夫市之而歸妻取照之驚告其母曰某郎又索一婦歸也其母亦照曰又領親家母來也出北夢瑣言嚙鼻甲與乙鬭争甲嚙下乙鼻官吏欲斷之甲稱乙自嚙落吏曰夫人鼻髙耳口低豈能就嚙之乎甲曰他􅂿床子就嚙之出笑林助喪禮有人弔喪并欲齎物助之問人可與何等物答曰錢布帛任君所有爾因齎大豆一斛置孝子前謂曰無可有以大豆一斛相助孝子哭孤窮奈何曰造豉孝子又哭孤窮曰適得便窮更送一石出笑林外學歸甲父母在出學三年而歸舅氏問其學何得并序别父久乃答曰渭陽之思過於秦康既而父數之爾學奚益答曰少失過庭之訓故學無益出笑林行弔傖人欲相共弔喪各不知儀一人言麤習謂同伴曰汝隨我舉止既至喪所舊習者在前伏席上餘者一一相伏於背而為首者以足觸詈曰癡物諸人亦謂儀當爾各以足相􅂿曰癡物最後者近孝子亦􅂿孝子而曰癡物出笑林癡壻有癡壻婦翁死婦教以行弔禮於路値水乃脫襪而渡惟遺一襪又覩林中鳩鳴云􅀈鴣􅀈鴣而私誦之都忘弔禮及至乃以有襪一足立而縮其跣者但云􅀈鴣􅀈鴣孝子皆笑又曰莫笑莫笑如拾得襪卽還我出笑林魯人執竿魯有執長竿入城門者初竪執之不可入横執之亦不可入計無所出俄有老父至曰吾非聖人但見事多矣何不以鋸中截而入遂依而截之出笑林齊人學瑟齊人就趙人學瑟因之先調膠柱而歸三年不成一曲齊人怪之有從趙來者問其意方知向人之愚出笑林市馬洛中有大寮世籍膏粱不分牝牡偶市一馬都莫知其妍媸為駔儈所欺曰此馬不唯馴良齒及二十餘嵗合直兩馬之資况行不動塵可謂馴良之甚也遂多金以市之儈既倍獲利臨去又曰此馬兼有榅桲牙出也於是大喜詰旦乗出如鵞鴨之行及至家矜􅃷曰此馬不唯馴熟兼饒得果子牙兩所復召儈别贈二十出玉堂閒話昭應書生唐有德音搜訪懐才抱器不求聞達者有人於昭應逢一書生奔馳入京問求何事答曰將應不求聞達科出因話録太平廣記卷二百六十二
