body:
  text: 太平廣記卷四百九十一宋李昉等編雜傳記八謝小娥傳楊娼傳非烟傳謝小娥傳李公佐撰小娥姓謝氏豫章人估客女也生八歳喪母嫁歴陽俠士段居貞居貞負氣重義交遊豪俊小娥父蓄巨産𨼆名商賈間常與段壻同舟貨往來江湖時小娥年十四始及笄父與夫俱為盜所殺盡掠金帛段之弟兄謝之生姪與童僕輩數十悉沈於江小娥亦傷胷折足漂流水中為他船所獲經夕而活因流轉乞食至上元縣依妙果寺尼淨悟之室初父之死也小娥夢父謂曰殺我者車中猴門東草又數日復夢其夫謂曰殺我者禾中走一日夫小娥不自解悟常書此語廣求智者辨之歴年不能得至元和八年春余罷江西從事扁舟東下淹泊建業登瓦官寺閣有僧齊物者重賢好學與余善因告余曰有孀婦名小娥者每來寺中示我十二字謎語某不能辨余遂請齊公書於紙乃憑檻書空凝思黙慮坐客未倦予悟其文令寺童疾召小娥前至詢訪其由小娥嗚咽良久乃曰我父及夫皆為賊所殺邇後嘗夢父告曰殺我者車中猴門東草又夢夫告曰殺我者禾中走一日夫歳久無人悟之余曰若然者吾審詳矣殺汝父是申蘭殺汝夫是申春且車中猴車字去上下各一畫是申字又申屬猴故曰車中猴草下有門門中有東乃蘭字也又禾中走是穿田過亦是申字也一日夫者夫上更一畫下有日是春字也殺汝父是申蘭殺汝夫是申春足可明矣小娥慟哭再拜書申蘭申春四字於衣中誓將訪殺二賊以復其寃娥因問余姓氏官族垂涕而去爾後小娥便為男子服傭保於江湖間歳餘至潯陽郡見竹户上有紙牓子云召傭者小娥乃應召詣門問其主乃申蘭也蘭引歸娥心憤貌順在蘭左右甚見親愛金帛出入之數無不委娥已二歳餘竟不知娥之女人也先是謝氏之金寶錦繡衣物器具悉掠在蘭家小娥每執舊物未嘗不暗泣移時蘭與春宗昆弟也時春一家住大江北獨樹浦與蘭往來密洽蘭與春同去經月多獲財帛而歸每留娥與蘭宴蘭氏同守家室酒肉衣服給娥甚豐或一日春攜文鯉兼酒詣蘭娥私歎曰李君精悟𤣥鑒皆符夢言此乃天啟其心志將就矣是夕蘭與春㑹羣賊畢至酣飲暨諸兇既去春沈醉卧於内室蘭亦露寢于庭小娥潛鏁春於内抽佩刀先斷蘭首呼號鄰人並至春擒於内蘭死於外獲贓收貨數至千萬初蘭春有黨數十暗記其名悉擒就戮時潯陽太守張公善其志行為具其事上旌表乃得免死時元和十二年夏歳也復父夫之讐畢歸本里見親屬里中豪族爭求聘娥誓心不嫁遂剪髪披褐訪道於牛頭山師事大士尼將律師娥志堅行苦霜舂雨薪不倦筋力十三年四月始受具戒於泗州開元寺竟以小娥為法號不忘本也其年夏月余始歸長安途經泗濱過善義寺謁大徳尼令操戒新見者數十淨髪鮮帔威儀雍容列侍師之左右中有一尼問師曰此官豈非洪州李判官二十三郎者乎師曰然曰使我獲報家仇得雪寃恥是判官恩徳也顧余悲泣余不之識詢訪其由娥對曰某名小娥頃乞食孀婦也判官時為辨申蘭申春二賊名字豈不憶念乎余曰初不相記今即悟也娥因泣具寫記申蘭申春復父夫之仇志願相畢經營終始艱苦之狀小娥又謂余曰報判官恩當有日矣豈徒然哉嗟乎余能辨二盜之姓名小娥又能竟復父夫之讐寃神道不昧昭然可知小娥厚貌深辭聰敏端特鍊指跛足誓求真如爰自入道衣無絮帛齋無鹽酪非律儀禪理口無所言後數日告我歸牛頭山扁舟汎淮雲遊南國不復再遇君子曰誓志不捨復父夫之讐節也傭保雜處不知女人貞也女子之行唯貞與節能終始全之而已如小娥足以儆天下逆道亂常之心足以觀天下貞夫孝婦之節余備詳前事發明𨼆文暗與㝠㑹符於人心知善不録非春秋之義也故作傳以旌美之楊娼傳房千里譔楊娼者長安里中之殊色也態度甚都復以冶容自喜王公鉅人享客競邀致席上雖不飲者必為之引滿盡歡長安諸兒一造其室殆至亡生破産而不悔由是娼之名冠諸籍中大售於時矣嶺南帥甲貴遊子也妻本戚里女遇帥甚悍先約設有異志者當取死白刃下帥幼貴喜婬内苦其妻莫之措意乃隂出重賂削去娼之籍而挈之南海館之他舎公餘而同夕𨼆而歸娼有慧性事帥尤謹平居以女職自守非其理不妄發復厚帥之左右咸能得其歡心故帥益嬖之㑹間歳帥得病且不起思一見娼而憚其妻帥素與監軍使厚密遣導意使為方略監軍乃紿其妻曰將軍病甚思得善奉侍煎調者視之瘳當速矣某有善婢久給事貴室動得人意請夫人聴以婢安將軍四體如何妻曰中貴人信人也果然於吾無苦耳可促召婢來監軍即命娼冒為婢以見帥計未行而事洩帥之妻乃擁健婢數十列白梃熾膏鑊於廷而伺之矣須其至當投之沸鬲帥聞而大恐促命止娼之至且曰此自我意幾累於渠今幸吾之未死也必使脫其虎喙不然且無及矣乃大遺其奇寶命家僮傍輕舠衞娼北歸自是帥之憤益深不踰旬而物故娼之行適及洪矣問至娼乃盡返帥之賂設位而哭曰將軍由妾而死將軍且死妾安用生為妾豈孤將軍者耶即撤奠而死之夫娼以色事人者也非其利則不合矣而楊能報帥以死義也却帥之賂廉也雖為娼差足多乎非烟傳皇甫枚譔臨淮武公業咸通中任河南府功曹㕘軍愛妾曰非烟姓歩氏容止纎麗若不勝綺羅善秦聲好文筆尤工擊甌其韻與絲竹合公業甚嬖之其比鄰天水趙氏第也亦衣纓之族不能斥言其子曰象秀端有文纔弱冠矣時方居喪禮忽一日於南垣隙中窺見非烟神氣俱喪廢食忘寐乃厚賂公業之閽以情告之閽有難色復為厚利所動乃令其妻伺非烟間處具以象意言焉非烟聞之但含笑凝睇而不答門媪盡以語象象發狂心蕩不知所持乃取薛濤牋題絶句曰一覩傾城貌塵心只自猜不隨蕭史去擬學阿蘭來以所題密緘之祈門媪達非烟烟讀畢吁嗟良久謂媪曰我亦曾窺見趙郎大好才貌此生薄福不得當之葢鄙武生麤悍非良配耳乃復酧篇寫於金鳯牋曰緑慘雙蛾不自持只縁幽恨在新詩郎心應似琴心怨脈脈春情更擬誰封付門媪令遺象象啓緘吟諷數四拊掌喜曰吾事諧矣又以剡溪玉葉紙賦詩以謝曰珍重佳人贈好音綵牋芳翰兩情深薄於蟬翼難供恨密似蠅頭未寫心疑是落花迷碧洞只思輕雨灑幽襟百回消息千回夢裁作長謠寄緑琴詩去旬日門媪不復來象憂恐事泄或非烟追悔春夕於前庭獨坐賦詩曰緑暗紅藏起暝烟獨將幽恨小庭前沈沈良夜與誰語星隔銀河月半天明日晨起吟際而門媪來𫝊非烟語曰勿訝旬日無信葢以微有不安因授象以連蟬錦香囊并碧苔牋詩曰無力嚴妝倚繡櫳暗題蟬錦思難窮近來嬴得傷春病柳弱花敧怯曉風象結錦囊於懷細讀小簡又恐烟幽思增疾乃剪烏絲䦨為回簡曰春日遲遲人心悄悄自因窺覯長役夢魂雖羽駕塵襟難於㑹合而丹誠皎日誓以周旋况又聞乘春多感芳履違和耗冰雪之妍姿鬱􅈍蘭之佳氣憂抑之極恨不飜飛企望寛情無至憔悴莫孤短韻寧爽后期惚恍寸心書豈能盡兼持菲什仰繼華篇詩曰見說傷情為見春想封蟬錦緑蛾顰叩頭為報烟卿道第一風流最損人門媪既得回簡徑齎詣烟閤中武生為府掾屬公務繁夥或數夜一直或竟日不歸是時適值生入府曹烟拆書得以欵曲尋繹既而長太息曰丈夫之志女子之心情契魂交視逺如近也於是闔户垂幌為書曰下妾不幸垂髫而孤中間為媒妁所欺遂匹合於瑣𩔖每至清風朗月移玉桂以增懷秋帳冬釭汎金徽而寄恨豈期公子忽貽好音發華緘而思飛諷麗句而目斷所恨洛川波隔賈午牆高聨雲不及於秦臺薦夢尚遙於楚岫猶望天從素懇神假微機一拜清光九殞無恨兼題短什用寄幽懷詩曰畫簷春燕須同宿洛浦雙鴛肯獨飛長恨桃源諸女伴等閒花裏送郎歸封訖乃召門嫗令達于象象覽書及詩以烟意稍切喜不自持但靜室焚香䖍禱以俟息一日將夕門嫗促歩而至笑且拜曰趙郎願見神仙否象驚連問之𫝊烟語曰今夜功曹直府可謂良時妾家後庭郎君之前垣也若不踰恵好専望來儀方寸萬重悉俟晤語既曛黑象乃躋梯而登烟已令重榻於下既下見烟靚妝盛服立於花下拜訖俱以喜極不能言乃相攜自後門入堂中遂背釭解幌盡繾綣之意焉及曉鐘初動復送象於垣下烟執象泣曰今日相遇乃前生因縁耳勿謂妾無玉潔松貞之志放蕩如斯直以郎之風調不能自顧願深鑒之象曰挹希世之貌見出人之心已誓幽庸永奉歡狎言訖象踰垣而歸明日託門媪贈烟詩曰十洞三清雖路阻有心還得傍瑤臺瑞香風引思深夜知是蕋宫仙馭來烟覽詩微笑因復贈象詩曰相思只怕不相識相見還愁却别君願得化為松下鶴一雙飛去入行雲封付門媪仍令語象曰賴妾有小小篇詠不然君作幾許大才面目兹不盈旬常得一期於後庭展微密之思罄宿昔之心以為鬼神不知天人相助或景物寓目歌詠寄情來往頻繁不能悉載如是者周歳無何烟數以細過撻其女奴奴隂銜之乘間盡以告公業公業曰汝慎言我當伺察之後至直日乃偽陳狀請假迨夕如常入直遂潛於里門街鼓既作匍伏而歸循牆至後庭見烟方倚户微吟象則據垣斜睇公業不勝其忿挺前欲擒象覺跳去業搏之得其半襦乃入室呼烟詰之烟色動聲戰而不以實告公業愈怒縛之大柱鞭楚血流但云生得相親死亦何恨深夜公業怠而假寐烟呼其所愛女僕曰與我一盃水水至飲盡而絶公業起將復笞之已死矣乃解縛舉置閤中連呼之聲言烟暴疾致殞後數日窆於北邙而里巷間皆知其强死矣象因變服易名逺竄江浙間洛陽才士有崔李二生常與武掾游處崔賦詩末句云恰似傳花人飲散空牀抛下最繁枝其夕夢烟謝曰妾貌雖不迨桃李而零落過之捧君佳什媿仰無巳李生詩末句云豔魄香魂如有在還應羞見墜樓人其夕夢烟執手而言曰士有百行君得全乎何至矜片言苦相詆斥當屈君於地下面證數日李生卒時人異焉太平廣記卷四百九十一
