body:
  text: 太平廣記巻五十神仙五十嵩岳嫁女裴航嵩岳嫁女三禮田璆者甚有文通熟羣書與其友鄧韶博學相類皆以人昧不能彰其明家于洛陽元和癸巳歲中秋望夕携觴晚出建春門期望月于韶别墅行二三里遇韶亦携觴自東來駐馬道周未决所適有二書生乘驄復出建春門揖璆韶曰二君子挈榼得非求今夕望月地乎某敝莊水竹臺榭名聞洛下東南去此三二里儻能迂轡冀展傾蓋之分耳璆韶甚惬所望乃從而往問其姓氏多他語對行數里桂輪已昇至一車門始入甚荒涼又行數百歩有異香迎前而來則豁然眞境矣泉瀑交流松桂夾道竒花異草照燭如晝好鳥騰翥風和月瑩璆韶請疾馬飛觴書生曰足下榼中厥味何如璆韶曰乾和五酘雖上清醍醐計不加此味也書生曰某有瑞露之酒釀於百花之中不知與足下五酘孰愈耳謂小童曰折燭夜一花傾與二君子嘗其花四出而深紅圎如小瓶徑三寸餘緑葉形𩔖盃觸之有餘韻小童折花至於竹葉中凡飛數巡其味甘香不可比狀飲訖又東南行數里至一門書生揖二客下馬觴以燭夜花中之餘賚諸從者飲一盃皆大醉各止於户外乃引客入則有鸞鶴數十騰舞來迎步而前花轉繁酒味尤美其百花皆芳香壓枝於路傍凡歴池館堂榭率皆陳設盤筵若有所待但不留璆韶坐璆韶飲多行又甚倦請暫憇盤筵書生曰坐亦何難但不利於君耳璆韶詰其由曰今夕中天羣仙㑹於兹岳籍君神魄不離腥羶請以知禮導昇降此皆諸仙位坐不宜塵觸耳言訖見直北花燭亘天簫韶沸空駐雲母䨇車於金堤之上設水晶方盤於瑶幄之內羣仙方奏霓裳羽衣曲書生前進命璆韶拜夫人夫人褰帷笑曰下域之人而能知禮然服食之氣猶然射人不可近他貴壻可各賜薰髓酒一盃璆韶飲訖覺肌膚温潤稍異常人呼吸皆異香氣夫人問左右誰人召來曰衛符卿李八百夫人曰便令此二童接待於是二童引璆韶於神仙之後縱目璆問曰相者誰曰劉綱侍者誰曰茅盈東鄰女弹筝擊筑者誰曰麻姑謝自然幄中座者誰曰西王母俄有一人駕鶴而來王母曰乆望有玉女問曰禮生來未於是引璆韶進立於碧玉堂下左劉君笑曰適縁蓮花峰士奏章事須決遣尚多未來客何言乆望乎王母曰奏章事者有何所為曰浮梁縣令求延年矣以其人因賄賂履官以苛虐為政生情於案牘忠恕之道蔑聞唯雜於貨財巧偽之計更作自貽覆餗以促餘齡但以蓮花峰叟狥從於人奏章甚懇特紆死限量延五年璆問劉君誰曰漢朝天子續有一人駕黄龍戴黄旂導以笙歌從以嬪嬙及瑶幄而下王母復問曰李君來何遲曰為勅龍神設水旱之計作彌淮蔡以殱妖逆漢主曰柰百姓何曰上帝亦有此問予一表斷其惑矣曰可得聞乎曰不能悉記略舉大綱耳其表云某縣某克搆丕華德洽兆庻臨履深薄匪敢怠荒不勞師車平中夏巴蜀之孽不費天府掃東呉上黨之妖九有已見其廓清一方尚屯其氛䘲伏以虺蜴肆毒痛於淮蔡豺狼尚猜其口喙螻蟻猶固其封疆若遣時豐人安是稔羣醜但使年饑厲作必揺人心如此倒戈而攻可以席捲禍三州之逆黨所損至微安六合之疾甿其利則厚伏請神龍施水厲鬼行災由此天誅以資戰力漢主曰表至嘉帝既允許可以前賀誅鋤矣書生謂璆韶此開元天寳太平之主也未頃聞簫韶自空而來執絳節者前唱言穆天子來奏樂羣仙皆起王母避位拜迎二主降階入幄環坐而飲王母曰何不拉取老軒轅來曰他今夕主張月宫之醼非不勤請耳王母又曰瑶池一别後陵谷幾遷移向來觀洛陽東城已坵墟矣定鼎門西路忽焉復新市朝云名利如舊可以悲嘆耳穆王把酒請王母歌以珊瑚鈎擊盤而歌曰勸君酒為君悲且吟自從頻見市朝改無復瑶池宴樂心王母持盃穆天子歌曰奉君酒休歎市朝非早知無復瑶池興悔駕驊騮草草歸歌竟王母話瑶池舊事乃重歌一章云八馬廻乘汗漫風猶思往事憇昭宫宴移南圃情方洽樂奏鈞天曲未終斜漢露凝殘月冷流霞盃泛曙光紅崑崙回首不知處疑是酒酣魂夢中王母酬穆天子歌曰一曲笙歌瑤水濱曽留逸足駐征輪人間甲子週千歲靈境盃觴初一巡玉兎銀河終不夜竒花好樹鎭長春悄知碧海饒詞句歌向俗流疑悞人酒至漢武帝王母又歌曰珠露金風下界秋漢家陵樹冷翛翛當時不得仙桃力尋作浮塵飄隴頭漢主上王母酒曰五十餘年四海清自親丹竈得長生若言盡是仙桃力看取神仙簿上名帝把酒曰吾聞丁令威能歌命左右召來令威至帝又遣子晉吹笙以和歌曰月照驪山露泣花似悲先帝早昇遐至今猶有長生鹿時遶温泉望翠華帝持盃乆之王母曰應須召葉靜能來唱一曲當時事靜能續至跪獻帝酒復歌曰幽薊烟塵别九重貴妃湯殿罷歌鐘中宵扈從無全仗大駕蒼黃發六龍粧匣尚留金翡翠暖池猶浸玉芙蓉荆榛一閉朝元路唯有悲風吹晚松歌竟帝悽慘良乆諸仙亦慘然於是黄龍持盃亦於車前再拜祝曰上清神女玉京仙郎樂此今夕和鳴鳯凰鳯凰和鳴將翺將翔與天齊休慶流無央仙郎即以鮫綃五千疋海人文錦三千端琉璃琥珀器一百牀明月驪珠各十斛贈奏樂仙女乃有四鶴立於車前載仙郎並相者侍者兼有寳花臺俄進法膳凡數十味亦霑及璆韶璆韶飲有仙女捧玉箱托紅牋筆硯而至請催粧詩於是劉綱詩曰玉為質兮花為顏蝉為鬂兮雲為鬟何勞傅粉兮施渥丹早出娉婷兮縹緲間於是茅盈詩云水晶帳開銀燭明風揺珠珮連雲清休匀紅粉飾花態早駕䨇鸞朝玉京巢父詩曰三星在天銀河迴人間曙色東方來玉苖瓊蘂亦宜夜莫使一花衝曉開詩既入內有環珮聲即有玉女數十引仙郎入帳召璆韶行禮禮畢二書生復引璆韶辭夫人夫人曰非無至寶可以相贈但爾力不任挈耳各賜延壽酒一盃曰可増人間半甲子復命衞符卿等引還人間無使歸途寂寞於是二童引璆韶而去折花傾酒步步惜别衞君謂璆韶曰夫人白日上昇驂鸞駕鶴在積習而已未有積徳累仁抱才藴學卒不享爵祿者吾未之信儻吾子塵牢可踰俗桎可脫自今十五年後待子於三十六峰願珍重自愛復出來時車門握手告别别訖行四五步杳失所在唯有嵩山嵯峨倚天得樵徑而歸及還家已歳餘室人招魂葬於北邙之原墳草宿矣於是璆韶捐棄家室同入少室山今不知所在出纂異記裴航唐長慶中有裴航秀才因下第遊於鄂渚謁故舊友人崔相國値相國贈錢二十萬逺挈歸於京因傭巨舟載於湘漢同載有樊夫人乃國色也言詞問接幃帳昵洽航雖親切無計道達而㑹面焉因賂侍妾裊烟而求達詩一章曰同為胡越猶懷想况遇天仙隔錦屏儻若玉京朝㑹去願隨鸞鶴入青𠖇詩往乆而無答航數詰裊烟烟曰娘子見時若不聞如何航無計因在道求名醖珍果而獻之夫人乃使裊烟召航相識及褰帷而玉瑩光寒花明麗景雲低鬟鬂月淡修眉舉止烟霞外人肯與塵俗為偶航再拜揖􅌓眙良乆之夫人曰妾有夫在漢南將欲棄官而幽棲巖谷召某一訣耳深哀草擾慮不及期豈更有情留盼他人的不然耶但喜與郎君同舟共濟無以諧謔為意耳航曰不敢飲訖而歸操比冰霜不可干冒夫人後使裊烟持詩一章曰一飲瓊漿百感生𤣥霜搗盡見雲英藍橋便是神仙窟何必﨑嶇上玉清航覽之空愧佩而已然亦不能洞達詩之㫖趣後更不復見但使裊烟達寒暄而已遂抵襄漢與使婢挈粧奩不吿辭而去人不能知其所造航遍求訪之滅跡匿形竟無蹤兆遂飾粧歸輦下經藍橋驛側近因渴甚遂下道求漿而飲見茅屋三四間低而復隘有老嫗緝麻苧航揖之求漿嫗咄曰雲英擎一甌漿來郎君要飲航訝之憶樊夫人詩有雲英之句深不自㑹俄於葦箔之下出䨇玉手捧瓷甌航接飲之真玉液也但覺異香氤鬱透於户外因還甌遽揭箔覩一女子露裛瓊英春融雪彩臉欺膩玉鬢若濃雲嬌而掩面蔽身雖紅蘭之隱幽谷不足比其芳麗也航驚怛植足而不能去因白嫗曰某僕馬甚饑願憇於此當厚答謝幸無見阻嫗曰任郎君自便且遂飯僕秣馬良乆謂嫗曰向覩小娘子豔麗驚人姿容擢世所以躊躇而不能適願納厚禮而娶之可乎嫗曰渠已許嫁一人但時未就耳我今老病只有此女孫昨有神仙遺靈丹一刀圭但須玉杵臼搗之百日方可就吞當得後天而老君約取此女者得玉杵臼吾當與之也其餘金帛吾無用處耳航拜謝曰願以百日為期必擕杵臼而至更無他許人嫗曰然航恨恨而去及至京國殊不以舉事為意但於坊曲閙市喧衢而高聲訪其玉杵臼曽無影響或遇朋友若不相識衆言為狂人數月餘日或遇一貨玉老翁曰近得虢州藥舗卞老書云有玉杵臼貨之郎君懇求如此此君吾當為書導達航媿荷珍重果獲杵臼卞老曰非二百緡不可得航乃瀉嚢兼貨僕馬方及其數遂步驟獨挈而抵藍橋昔日嫗大笑曰有如是信士乎吾豈愛惜女子而不醻其勞哉女亦㣲笑曰雖然更為吾擣藥百日方議姻好嫗於襟帶間解藥航即擣之晝為而夜息夜則嫗収藥臼於內室航又聞擣藥聲因窺之有玉兎持杵臼而雪光輝室可鑒毫芒於是航之意愈堅如此日足嫗持而吞之曰吾當入洞而吿姻戚為裴郎具帳幃遂挈女入山謂航曰但少留此逡巡車馬僕隸迎航而往别見一大第連雲珠扉晃日內有帳幄屏幃珠翠珍玩莫不臻至愈如貴戚家焉仙童侍女引航入帳就禮訖航拜嫗悲泣感荷嫗曰裴郎自是清泠裴眞人子孫業當出世不足深媿老嫗也及引見諸賓多神仙中人也後有仙女鬟髻霓衣云是妻之姊耳航拜訖女曰裴郎不相識耶航曰昔非姻好不省拜侍女曰不憶鄂渚同舟回而抵襄漢乎航深驚怛懇悃陳謝後問左右曰是小娘子之姊雲翹夫人劉綱仙君之妻也已是高眞為玉皇之女吏嫗遂遣航將妻入玉峰洞中瓊樓珠室而居之餌以絳雪瓊英之丹體性清虚毛髪紺緑神化自在超為上仙至太和中友人盧顥遇之於藍橋驛之西因說得道之事遂贈藍田美玉十斤紫府雲丹一粒叙話永日使達書於親愛盧顥稽顙曰兄既得道如何乞一言而教授航曰老子曰虛其心實其腹今之人心愈實何由得道之理盧子懵然而語之曰心多妄想腹漏精溢即虛實可知矣凡人自有不死之術還丹之方但子未便可教異日言之盧子知不可請但終宴而去後世人莫有遇者出傳竒太平廣記卷五十
