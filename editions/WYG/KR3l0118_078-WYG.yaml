body:
  text: 太平廣記卷七十八方士三李秀才王山人王瓊王固符契元白皎賈躭茅安道駱山人石旻李秀才唐虞部郎中陸紹元和中嘗謁表兄於定水寺因為院僧具􅁡餌時菓隣院僧亦陸所熟也遂令左右邀之良久僧與李秀才偕至環坐笑語頗劇院僧顧弟子煑新茗巡將匝而不及李陸不平曰茶初未及李秀才何也僧笑曰如此秀才亦要知茶味且以餘茶飲之隣院僧曰秀才乃術士座主不可輕言其僧又言不逞之子弟何所憚秀才忽怒曰我與上人素未相識焉知予不逞徒也僧復大言望酒旗翫變場者豈有佳者乎李乃白座客某不免對貴客作造次矣因奉手袖中據兩膝叱其僧曰麤行阿師爭敢輒無禮拄杖何在可擊之僧房門後有笻杖子忽跳出連擊其僧時衆亦為蔽䕶杖伺人隙㨗中若有物執持也李復叱曰捉此僧向牆僧乃負牆拱手色青短氣唯言乞命李又曰阿師可下階僧又趨下自投無數衂鼻敗顙不已衆為請之李徐曰縁對衣冠不能殺此為累因揖客而去僧半日方能言如中惡狀竟不之測也出酉陽雜俎王山人唐太尉衛公李徳裕為并州從事到任未旬月有王山人詣門請謁與之及席乃曰某善按𠖇數初未之竒因請虚正寢備几案紙筆香水而已令垂簾靜伺之生與之偕坐於西廡下頃之王生曰可驗之矣紙上書八字甚大且有楷注曰位極人臣壽六十四生遽請歸竟亦不知所去及會昌朝三策至一品薨于海南果符王生所按之年出松窗録王瓊唐元和中江淮術士王瓊嘗在段君秀家令坐客取一瓦子畫作龜甲懐之一食頃取出乃一龜放於庭中循垣而行經宿却成瓦子又取花莟黙封於宻器中一夕開花出酉陽雜俎王固唐于頔在襄州嘗有山人王固謁見頔性快見其拜伏遲鈍不甚禮之别日遊讌復不得預王殊怏怏因至使院造判官曽叔政頗禮接之王謂曽曰予以相公好竒故不逺而来今實乖望予有一藝自古無者今將歸且荷公之厚聊為一設遂詣曽所居懐中出竹一節及小鼓規纔運寸良久去竹之塞折枝擊鼓筒中有蠅虎子數十枚列行而出分為二隊如對陣勢擊鼓或三或五隨鼓音變陣天衡地軸魚麗鶴列無不備也進退離附人所不及凡變陣數十復作隊入筒中曽覩之大駭乃言於于王已潜去于悔恨令物色求之不獲出酉陽雜俎符契元唐上都昊天觀道士符契元閩人也徳行法術為時所重長慶初中夏晨告門人曰吾習静片時慎無喧動乃扃户晝寢既而道流四人邀延出門心欲有詣身即輒至離鄉三十餘年因思一到俄造其居室宇摧落園圃荒蕪舊識故人孑遺殆盡時菓未熟乃有隣里小兒攀緣採摘契元䕶惜咄叱曽無應者契元愈怒旁道流止之曰熟與未熟同歸摘拾何苦掛意也又曽居條山錬藥乃亦思一遊忽已至矣恣意厯覽遍窮巖谷道流曰日色晩可歸矣因同行入京道上忽逢鳴騶導引甚盛契元遽即避路道流曰陽官不宜避隂官但遵路而行須臾前導數輩望契元即狼狽奔迸及官至諦視之乃僕射馬緫時方為刑部尚書素善契元馬亦無恙與契元晤心獨異之日已夕矣遲明即詣開化坊訪馬而與兵部韓侍即對奕因留連竟日而旁察辭氣神色曽無少異私怪其故有頃聞中疾不旬日而殁又給事李忠敏云此是陶天活有道術者中朝奉道者多歸之天活本安南人非閩人也能于入静日多神遊諸岳馬公事人皆知之出集異記白皎河陽從事樊宗仁長慶中客遊鄂渚因抵江陵途中頗為駕舟子王升所侮宗仁方舉進士力不能制每優容之至江陵具以事訴於在任因得重笞之宗仁以他舟上峡發荆不旬日而所乘之舟汎然失纜篙櫓皆不能制舟人曰此舟已為仇人之所禁矣昨水行豈常有所忤哉今無術以進不五百里當歴石灘險阻艱難一江之最計其奸心度我船適至則必觸碎沉溺不如先備焉宗仁方與僕登岸以臣索摯舟循岸随之而行翌日至灘所船果奔駭狂觸恣縱升沉須臾瓦解賴其有索人雖無傷物則蕩盡峡路深僻上下數百里皆無居人宗仁即與僕輩䕃於林下糧餼什具絶無所有羈危辛苦憂悶備至雖發人告于土官去二日不見返飢餒逮絶其夜因積薪起火宗仁洎僮僕皆環火假寢夜深忽寤見山獠五人列坐態貌殊異皆挟利兵瞻顧睢盱言語兇謾假令揮刃則宗仁輩束手延頸矣覩其勢逼因大語曰爾輩家業應此山中吾不幸舟船破碎萬物俱没涸然古岸俟為豺狼之餌爾輩圓首横目曽不傷急而乃瞷然笑侮幸人危禍一至此哉吾今絶糧已逾日矣爾家近者可遽歸營飲食以濟吾之將死也山獠相視遂令二人起未曉負米肉鹽酪而至宗仁賴之以候迴信因示舟破之由山獠曰峡中行此術者甚衆而遇此難者亦多然他人或有以解唯王升者犯之非没溺不已則不知果是此子否南山白皎者法術通神可以延之遣召行禁我知皎處試為一請宗仁因懇祈之山獠一人遂行明日皎果至黄冠野服杖策躡履姿狀山野禽獸為匿宗仁則又示以窮寓之端皎笑曰瑣事耳為君召而斬之因薙草剪木規地為壇仍列刀水而皎立中央夜䦨月曉水碧山青杉桂朦朧溪聲悄然時聞皎引氣呼呌召王升發聲清長激響遼絶達曙無至者宗仁私語僕使曰豈七百里王升而可一息致哉皎又詢宗仁曰物沉舟碎果如所言莫不自為風水所害耶宗仁暨舟子又實告皎曰果如是王升安所逃形哉又謂宗仁所使曰然請郎君三代名諱方審其術耳僕人告之皎遂入深逺别建壇墠暮夜而再召之長呼之聲又若昨夕良乆山中忽有應皎者咽絶因風始聞乆乃至皎處則王升之魄也皎於是責其奸蠧數以罪狀升求哀俯伏稽顙流血皎謂宗仁曰已得甘伏可以行戮矣宗仁曰原其奸兇尤甚實為難恕便行誅斬則又不可宜加以他苦焉皎乃叱王升曰全爾腰領當百日血痢而死升號泣而去皎告辭宗仁解衣以贈皎皎笑而不受有頃舟船至宗仁得進發江陵詢訪王升是其日皎召致之夕在家染血痢十旬而死出異聞集賈躭唐宰相賈躭秉政直道事君有未萌之禍必能制除至於隂陽象緯無不洞曉有村人失牛詣桑國師卜之卦成國師謂曰爾之牛是賈相國偷將置於巾帽笥中爾但候朝時突前告之叟乃如其言祈請公詰之具以卜者語告公公於馬上笑為發巾笥取式盤據鞍運轉以視之良乆謂失牛者曰相公不偷爾牛要相公知牛去處但可於安國觀三門後大槐樹之梢鵲巢探取之村叟逕詣三門上見槐樹杪果有鵲巢都無所獲乃下樹低頭見失牛在樹根繫之食草草次是盗者家出芝田録茅安道唐茅安道廬山道士能書符役鬼幻化無端從學者常數百人曽授二弟子以隱形洞視之術有頃二子皆以歸養為請安道遣之仍謂曰吾術傳示盡資爾學道之用即不得逆情而衒其術也茍違吾教吾能令爾之術臨事不驗耳二子受命而去時韓晉公滉在潤州深嫉此輩二子徑往修謁意者脱為晉公不禮即當遁形而去及召入不敬二子因弛慢縱誕攝衣登階韓大怒即命吏卒縛之於是二子乃行其術而法果無驗皆􅀍擒縛將加誅戮二子曰我初不敢若是蓋師之見誤也韓將併絶其源即謂曰爾但致爾師之姓名居處吾或釋汝之死二子方欲陳述而安道已在門矣卒報公公大喜謂得悉加戮焉遽召入安道龎眉美髯姿状髙古公望見不覺離席延之對坐安道曰聞弟子二人愚騃干冒尊嚴今日命之短長懸于指顧然我請詰而愧之然後俟公之行刑也公即臨以兵刀械繫甚堅召至階下二子叩頭求哀安道語公之左右曰請水一器公恐其得水遁術固不與之安道欣然遽就公之硯水飲之而噀二子當時化為雙黒䑕亂走於庭前安道奮迅忽變為臣鳶每足攫一䑕沖飛而去晉公驚駭良久終無奈何出集異記駱山人唐田𢎞正之領鎮州三軍殺之而立王廷湊即王武俊支屬也廷湊生於别墅嘗有鳩數十朝集庭樹暮集簷下有里人駱徳播異之及長駢脇喜隂符鬼谷之書歴軍職得士心曽使河陽迴在中路以酒困寢於路隅忽有一人荷䇿而過熟視之曰貴當列土非常人也僕者寤以告廷湊馳數里及之致敬而問自云濟源駱山人也向見君鼻中之氣左如龍而右如虎二氣交王應在今秋子孫相繼滿一百年又云家之庭合有大樹樹及於堂是其兆也是年果為三軍扶立後歸别墅而庭樹婆娑暗庇舎矣墅有飛龍山神廷湊往祭之將及祠百步有人具冠冕恭要於中路廷湊及入廟神像已側坐因而面東廟宇至今尚存廷湊清儉公正勤於朝廷惠於軍民子孫世嗣為鎮帥至朱梁時王鎔封趙王為部將張文禮滅之出北夢瑣言石旻唐石旻有竒術在揚州段成式數年不隔旬必與之相見至開成初在城親故間徃徃説石旻術不可測盛傳寶厯中石隨尚書錢徽至湖州學院子弟皆在時暑月獵者進一兎錢命作湯方共食叟笑曰可留兎皮聊志一事遂釘皮於地壘􅜘塗之上朱書一符獨言曰恨挍遲恨挍遲錢氏兄弟詰之石曰欲共請君共記卯年也至太和九年錢可復鳯翔遇害歲在乙卯也出集異記太平廣記卷七十八
