body:
  text: 太平廣記卷二百三十四食吳饌御厨五侯鯖劉孝儀䱉議䱉表熱洛河名食敗障泥尚食令大餅能食范汪宋明帝苻堅三將菲食茅容陸機羊曼食吳饌吳郡獻海鮸乾鱠四瓶瓶容一斗浸一斗可得徑尺數盤并狀奏作乾鱠法帝示羣臣云昔術人介象于殿庭釣得海魚此幻化耳亦何足為異今日之鱠乃是真海魚所作來自數千里亦是一時奇味虞世基對曰術人之魚既幻其鱠固亦不真出數盤以賜達官作乾鱠之法當五六月盛熱之日于海取得鮸魚大者長四五尺鱗細而紫色無細骨不腥者捕得之即于海船之上作鱠去其皮骨取其精肉縷切隨成隨曬三四日須極乾以新白甆瓶未經水者盛之密封泥勿令風入經五六十日不異新者取啖之時開出乾鱠以布裹大甕盛水漬之三刻久出帶布瀝却水則皦然散置盤上如新鱠無别細切香柔葉鋪上筯撥令調勻進之海魚體性不腥然鱕鮸魚肉軟而白色經乾又和以青葉晳然極可噉又獻海蝦子三十梃梃長一尺濶一寸厚一寸許甚精美作之法取海白蝦有子者每三五斗置密竹籃中于大盆内以水淋洗蝦子在蝦腹下赤如覆盆子則隨水從籃目中下通計蝦一石可得子五升從盆内漉出縫布作小袋子如徑寸半竹大長二尺以蝦子滿之急繫頭隨袋多少以末鹽封之周厚數寸經一日夜出曬夜則平板壓之明旦又出曬夜依前壓十日乾則拆破袋出蝦子梃色如赤琉璃光徹而肥美鹽于鯔魚數倍又獻鮸魚含肚千頭極精好作之法當六月七月盛熱之時取鮸魚長二尺許去鱗浄洗停二日待魚腹脹起方從口抽出腸去腮畱目滿腹納鹽竟即以末鹽封周徧厚數寸經宿乃以水浄洗日則曝夜則收還安平板上又以板置石壓之明日又曬夜還壓如此五六日乾即納乾甆甕封口經二十日出之其皮色光徹有如黄油肉則如糗又如沙棊之蘇者㣲醎而有味味美于石首含肚然石首含肚亦年常入獻而肉彊不及此法出自隨口味使大都督杜濟濟㑹稽人能别味善于鹽梅亦古之符朗今之謝諷也出大業拾遺又吳郡獻松江鱸魚乾鱠六瓶瓶容一斗作鱠法一同鮸魚然作鱸魚鱠須八九月霜降之時收鱸魚三尺以下者作乾鱠浸漬訖布裹瀝水令盡散置盤内取香柔花葉相間細切和鱠撥令調勻霜後鱸魚肉白如雪不腥所謂金虀玉鱠東南之佳味也紫花碧葉間以素鱠亦鮮潔可觀吳郡又獻􅁡蠏三千頭作如糖蠏法􅁡擁劍四甕擁劍似蠏而小二螯偏大吳郡賦所謂烏賊擁劍是也出大業拾遺御厨御厨進饌凡器用有少府監進者用九飣食以牙盤九枚装食味于其間置上前亦謂之看食見京都人説兩軍每行從進食及其宴設多食鷄鵝之𩔖就中愛食子鵝鵝每隻價値二三千每有設據人數取鵝燖去毛及去五臟釀以肉及糯米飯五味調和先取羊一口亦燖剥去腸胃置鵝于羊中縫合炙之羊肉若熟便堪去却羊鵝鵝渾食之謂之軍羊殁忽翰林學士每遇賜食有物若畢羅形麄大滋味香美呼為諸王從事出盧氏雜説五侯鯖婁䕶字君卿歴游五侯之門每旦五侯家各遺餉之君卿口壓滋味乃試合五侯所餉之鯖而食甚美世所謂五侯鯖君卿所致出語林或云䕶兼善五侯不偏食故合而為之鯖也出世説又五侯不相能賓客不得往來䕶豐辭辯傅㑹五侯問各得其心競致竒膳䕶乃合以為鯖世稱五侯鯖以為竒味焉出西京雜記劉孝儀梁劉孝儀食鯖鮓曰五侯九伯今盡征之魏使崔劼李騫在坐劼曰中丞之任未應已得分陕騫曰若然中丞當至穆陵劉孝儀曰鄴中鹿尾乃酒餚之最劼曰生魚熊掌孟子所稱雞跖猩唇吕氏所向鹿尾乃有竒味竟不載書籍每用為恨孝儀曰實自如此或古今好尚不同梁賀季曰青州蠏黄乃為鄭氏所記此物不書未解所以騫曰鄭亦稱益州鹿但未是珍味出酉陽雜俎䱉議何𦙍侈于味食必方丈後稍欲去其甚者猶食白魚䱉腊糖蟹使門人議之學士鍾岏議曰䱉之就腊驟于屈申蟹之將糖躁擾彌甚仁人用意深懐惻怛至于車螯蚶蠣眉目内缺慙渾淪之竒唇吻外緘非金人之愼不榮不悴曾草木之不若無馨無臭與瓦礫而何異故宜長充庖厨永為口實出酉陽雜俎䱉表後梁􅅊琳京兆人南遷于襄陽天保中為舍人渉獵有才藻善劇談嘗為䱉表以譏刺時人其詞曰臣䱉言伏見除書以臣為糝熬將軍油蒸挍尉臛州刺史脯腊如故肅承將命含灰屏息憑籠臨鼎載戰載兢臣美愧夏鱣味慙冬鯉常恐鮐腹之譏懼貽鼈巖五甘反之誚是以𠻳流湖底枕石泥中不意高賞殊臨曲蒙鈞拔遂得超昇綺席忝預玉盤遠厠玳筵猥頒𧰼箸澤覃紫腴恩加黄腹方當鳴姜動桂紆蘇佩欓輕瓢纔動則樞盤如烟濃汁暫停則蘭餚成列宛轉綠虀之中逍遙朱唇之内銜恩噬澤九殞弗辭無任屏營之誠謹詣銅鐺門奉表致謝以聞詔答曰省表具悉卿池沼縉紳陂渠俊乂穿蒲入荇肥滑有聞允堪兹選無勞致謝出酉陽雜俎熱洛河𤣥宗命射生官射鮮鹿取血煎鹿腸食之謂之熱洛河賜安祿山及哥舒翰出盧氏雜説名食今衣冠家名食有蕭家餫飩漉去其湯不肥可以瀹茗庾家粽子白瑩如玉韓約能作櫻桃饆饠其色不變又能造冷胡突鱠鱧魚臆連蒸麞麞皮索餅將軍曲良翰能為驢􅎸駝峯炙出酉陽雜俎敗障泥貞元中有一將軍家出飯食每説無物不堪喫唯在火候善五味嘗取敗障泥胡盝修理食之其味佳出酉陽雜俎尚食令馮給事入中書祇候宰相見一老官人衣緋在中書門立候通報時夏譙公為相留坐論事多時及出日勢已晩其官人猶尚在乃遣人問是何官官人近前相見曰某新除尚食局令有事相見相公因令省官通之官人入給事偶未去官人見宰相子出謝云若非給事恩遇某無因得見相公某是尚食局造䭔子手不知給事宅在何處曰在親仁坊曰欲試薄藝但不知給事何日在宅曰來日當奉候然欲相訪要何物曰要大臺盤一􅃗木楔子三五十枚及油鐺炭火好麻油一二斗南棗爛麵少許給事素精于飲饌歸宅便令排比仍垂簾家口同觀之至日初出果秉簡而入坐飲茶一甌便起出㕔脱衫靴帶小㡌子青半肩三幅袴花襜袜肚錦臂韝遂四面看臺盤有不平處以一楔塡之候其平正然後取油鐺爛麵等調停袜肚中取出銀盒一枚銀箆子銀笊籬各一候油煎熱于盒中取䭔子豏以手于爛麵中團之五指間各有麵透出以箆子刮卻便置䭔子于鐺中侯熟以笟籬漉出以新汲水中良乆郤投油鐺中三五沸取出抛臺盤上旋轉不定以太圓故也其味脆美不可名狀出盧氏雜説大餅王蜀時有趙雄武者衆號趙大餅累典名郡為一時之富豪嚴潔奉身精于飲饌居常不使膳夫六局之中各有二婢執役當厨者十五餘􅒰皆着窄袖鮮潔衣装事一餐邀一客必水陸俱備雖王侯之家不得相倣焉又能造大餅每三斗麵擀一枚大於數間屋或大内宴聚或豪家有廣筵多于衆賓内獻一枚裁剖用之皆有餘矣雖親宻懿分莫知擀造之法以此得大餅之號出北夢瑣言能食范汪晉范汪能噉生梅有人致一斛汪食之湏臾而盡出晉書宋明帝宋明帝諱彧能食􅁡漬􅀈鮧一食數升噉猪肉炙常至二百臠出宋書苻堅三將苻堅以乞伏夏黙為左鎮郎胡人䕶磨那為右鎮郎奄人申香為拂葢郎並身長一丈三尺多力善射三人每食飯一石肉三十斤出前秦録菲食茅容後漢茅容字季偉郭林宗曾寓宿焉及明旦容殺雞為饌林宗初以為已設既而容獨以供母自以草蔬與客同飯林宗因起拜之曰卿賢乎哉勸之就學竟以成德出陳畱耆舊𫝊陸機陸機詣王武子有數斛羊酪指示陸曰卿江東無敵此曰有千里蓴羮但未下鹽豉耳出世説羊曼晉羊曼為丹陽尹時朝士過江初拜官必飾供饌曼拜丹陽尹客來早者得佳設日晏即漸罄不復精珍隨客早晩不問貴賤有羊固者拜臨海太守備饌竟日皆精雖晩至者猶有盛饌論者以固之豐腆不如曼之眞率也出晉書太平廣記卷二百三十四
