body:
  text: 太平廣記卷八十二異人二陸法和王梵志王守一李子牟吕翁管子文袁嘉祚鄭相如陸法和陸法和隠於江陵百里洲衣食居處與沙門同自號居士不至城郭容色常定人莫測也侯景始降於梁法和謂南郡朱元英曰貧道應共檀越擊侯景為國立効元英問擊之何也法和曰正自如此及景渡江法和時在清溪山元英往問之曰侯景今圖城其事云何法和曰宜待熟時不撩自落檀越但待侯景熟何勞問也因問尅不乃曰亦尅亦不尅景遣將任約衆號五萬伐湘東王於江陵兵將逼法和乃出詣湘東云自有兵書乞征任約召諸蠻弟子八百人在江津二日便發王遣胡僧祜領千餘人與之同行法和登艦大笑曰無量兵馬江陵多神祠人俗常所祈禱自法和軍出無復一驗人以為諸神皆從行故也至赤沙湖與任約相對法和乗輕舟不介胄㳂流而下去約軍一里乃遠謂將士曰觀彼龍睡不動吾軍之龍甚自踊躍即攻之縱火舫扵前而逆風不便法和執白羽扇以麾風風勢即反約衆皆見梁兵歩扵水上於是大潰皆投水約逃竄不知所之法和曰明日午時當得及期未得人問之法和曰吾前於此洲水乾時建一刹語檀越等此雖為刹實是賊標今何不向標下求賊也如其言果見任約在水中抱刹柱頭纔出鼻遂擒之約言求就師目前死法和曰檀越有相必不死且扵王有緣決無他慮王扵後微得檀越力果釋用為郡守又西圍江陵約以兵赴救力戰焉法和既平任約乃還謂湘東王曰侯景自然平矣一無可慮蜀賊將至法和乃請守巫峽待之乃揔諸軍而往先運石以填江三日水遂分流横之以鐵鏁蕭紀果遣蜀將渡峽口勢蹙進退不可王琳與法和經畧一戰而殱之山中多毒蟲猛獸法和授其禁戒不復噬螫所近江湖必於岸側結草云此處放生漁者皆無得時將兵猶禁諸軍漁捕有竊為者中夜猛獸必來欲噬之有弟子戲截蛇頭來詣法和法和曰汝何意殺蛇因指以示之弟子乃見蛇頭齚袴襠而不落又有人以牛試刀一下而頭斷來詣法和法和曰有一斷頭牛就卿徴命殊急若不為作功徳一月内報至其人不信數日果死其言多驗元帝以法和為郢州刺史法和不稱臣其啓文印名上自稱居士後乃自稱司徒帝謂僕射王褒曰我來未嘗有意用陸為三公而自稱何也褒曰彼既以道術自命容是先知帝曰法和功業稍重遂就拜為司徒後大聚兵艦欲襲襄陽而入武關帝使止之法和乃盡致其兵謂使者曰法和求道之人尚不希釋梵天王豈窺人主之位但與主有香火因縁救援耳今既被疑是業定不可改也於是設供養具大䭔薄餅及西魏舉兵法和赴江陵帝使人逆之曰此自能破賊但鎮郢州不須動也法和乃還州堊其城門着麤白布衫布袴邪巾大繩束腰坐葦席終日乃脫之及聞梁滅復取前凶服着之受弔梁人西入魏果見䭔餅焉出渚宫舊事王梵志王梵志衞州􅀺陽人也􅀺陽城東十五里有王徳祖當隋文帝時家有林檎樹生癭大如斗經三年朽爛徳祖見之乃剖其皮遂見一孩兒抱胎而徳祖收養之至七嵗能語曰誰人育我復何姓名徳祖俱以實語之因名曰林木梵天後改曰梵志曰王家育我可姓王也梵志乃作詩示人甚有義㫖出史遺王守一唐貞觀初洛城有一布衣自稱終南山人姓王名守一常負一大壺賣藥人有求買之不得者病必死或急趁無疾人授與之者其人旬日後必染沈痼也栁信者世居洛陽家累千金唯有一子既冠後忽於眉頭上生一肉塊厯使療之不能除去及聞此布衣遂躬自禱請既至其家乃出其子以示之布衣先焚香命酒脯猶若祭祝後方於壺中探一丸藥嚼傅肉塊復請具樽爼須臾間肉塊破有小蛇一條突出在地約長五寸五色爛然漸漸長及一丈已來其布衣乃盡飲其酒叱蛇一聲其蛇騰起雲霧昏暗布衣忻然乗蛇而去不知所在出大唐竒事李子牟李子牟者唐蔡王第七子也風儀爽秀才調高雅性閑音律尤善吹笛天下莫比其能江陵舊俗孟春望夕尚列影燈其時士女緣江駢闐縱觀子牟客遊荆門適逢其㑹因謂朋從曰吾吹笛一曲能令萬衆寂爾無譁於是同遊贊成其事子牟即登樓臨軒逈奏清聲一發百戲皆停行人駐愁坐者起聽曲罷良乆衆聲復喧而子牟恃能意氣自若忽有白叟自樓下小舟行吟而至狀貎古峭辭韻清越子牟洎坐客爭前致敬叟謂子牟曰向者吹笛豈非王孫乎天格絶高惜者樂器常常耳子牟則曰僕之此笛乃先帝所賜也神鬼異物則僕不知音樂之中此為至寳平生視僅過萬數方僕所有皆莫能知而叟以為常常豈有說乎叟曰吾少而習焉老猶未倦如君所有非吾敢知王孫以為不然當為一試子牟以授之而叟引氣發聲聲成而笛裂四座駭愕莫測其人子牟因叩顙求哀希逢珍異叟對曰吾之所貯君莫能吹即令小僮自舟齎至子牟就視乃白玉耳叟付子牟令其發調氣力殆盡纖響無聞子牟彌不自寧䖍恭備極叟乃授之微弄座客心骨泠然叟曰吾愍子志尚試為一奏清音激越遐韻泛溢五音六律所不能偕曲未終風濤噴騰雲雨昏晦少頃開霽則不知叟之所在矣出集異記吕翁開元十九年道者吕翁經邯鄲道上邸舎中設榻施席擔囊而坐俄有邑中少年盧生衣短裘乗青駒將適于田亦止邸中與翁接席言笑殊暢久之盧生顧其衣装敝褻乃歎曰大丈夫生世不諧而困如是乎翁曰觀子膚極腴體胖無恙談諧方適而歎其困者何也生曰吾此茍生耳何適之為翁曰此而不適而何為適生曰當建功樹名出將入相列鼎而食選聲而聽使族益茂而家用肥然後可以言其適吾志于學而游于藝自惟當年朱紫可拾今已過壯室猶勤田畝非困而何言訖目昬思寐是時主人蒸黄粱為饌翁乃探囊中枕以授之曰子枕此當令子榮適如志其枕瓷而竅其兩端生俛首就之寐中見其竅大而明朗可處舉身而入遂至其家娶清河崔氏女女容甚麗而産甚殷由是衣裘服御日已華侈明年舉進士登甲科解褐授校書郎應制舉授渭南縣尉􅁶監察御史起居舎人為制誥三年即真出典同州尋轉陜州生好土功自陜西開河八十里以濟不通邦人賴之立碑頌徳遷汴州嶺南道採訪使入京為京兆尹是時神武皇帝方事夷狄吐蕃新諾羅龍莽布攻陷𤓰沙節度使王君􅎢新被敘投河隍戰恐帝思將帥之任遂除生御史中丞河西隴右節度使大破戎虜七千級開地九百里築三大城以防要害北邊頼之以石紀功焉歸朝䇿勲恩禮極崇轉御史大夫吏部侍郎物望清重羣情翕習大為當時宰相所忌以飛語中之貶端州刺史三年徴還除户部尚書未幾拜中書侍郎同中書門下平章事與蕭令嵩裴侍中光庭同掌大政十年嘉謀密命一日三接獻替啓沃號為賢相同列者害之遂誣與邊將交結所圖不軌下獄府吏引徒至其門追之甚急生惶駭不測泣語妻子曰吾家本山東良田數頃足以禦寒餒何苦求禄而今及此思復衣短裘乗青駒行邯鄲道中不可得也引刀欲自裁其妻救之得免共罪者皆死生獨有中人保䕶得減死論出授驩牧數歳帝知其寃復起為中書令封趙國公恩㫖殊渥備極一時生有五子僔倜儉位倚僔為考功員外儉為侍御史位為太常丞季子倚最賢年二十四為右補闕其姻媾皆天下族望有孫十餘人凡兩竄嶺表再登台鉉出入中外㢠廻翔臺閣三十餘年間崇盛赫奕一時無比末節頗奢蕩好逸樂後庭聲色皆第一前後賜良田甲第佳人名馬不可勝數後年漸老屢乞骸骨不許及病中人候望接踵扵路名醫上藥畢至焉將終上疏曰臣本山東書生以田圃為娯偶逢聖運得列官序過䝉榮奨特受鴻私出擁旄鉞入昇鼎輔周旋中外綿厯嵗年有忝恩造無禆聖化負乗致宼履薄戰兢日極一日不知老之將至今年逾八十位厯三公鐘漏並歇筋骸俱敝彌留沈困殆將溘盡顧無成效上答休明空負深恩永辭聖代無任感戀之至謹奉表稱謝以聞詔曰卿以俊徳作余元輔出雄藩垣入贊緝熈昇平二紀實卿是賴比因疾累日謂痊除豈遽沈頓良深憫黙今遣驃騎大將軍高力士就第候省其勉加針灸為余自愛讌冀无妄期丁有喜其夕卒盧生欠伸而寤見方偃扵邸中顧吕翁在傍主人蒸黄粱尚未熟觸𩔖如故蹶然而興曰豈其夢寐邪翁笑謂曰人世之事亦猶是矣生然之良久謝曰夫寵辱之數得䘮之理生死之情盡知之矣此先生所以窒吾欲也敢不受教再拜而去出異聞集管子文李林甫為相初年有一布衣詣謁之閽吏謂曰朝廷新命相國大寮尚未敢及門何布衣容易謁之邪布衣執刺待扵路傍高聲自稱曰業八體書生管子文欲見相國伸一言林甫召之扵賓館至夜靜月下揖之生曰僕實老扵書藝亦自少遊圖籍之圃嘗竊見古昔興亡明主賢臣之事故願謁公以伸一言林甫曰僕偶備位扵輔弼實非才器已恐不勝大任福過禍隨也君幸辱玉趾敢受教扵君君其無惜藥石之言以恵鄙人生曰古人不容易而談者蓋知談之易聴之難也必能少覽容易之言為不容易之聽則涓塵皆可以禆海岳也況聖哲云一言可以興邦一言可以䘮邦公若聞一言即欲奉而行之臨一事即恣心狥意如此則雖日納獻言之士亦無益也林甫乃容恭意謹而言曰君但一言教僕僕當書紳而永為箴誡生曰君聞美言必喜聞惡言必怒僕以美言譽君則無禆君之事以惡言諷君必犯君之顔色既犯君之顔色君復怒我即不得盡伸惡言矣美言狥而損惡言直而益君當悉察之容我之言勿復加怒林甫不覺膝席而聽生曰君為相相天子也相天子安宗社保國也宗社安萬國寧則天子無事天子無事則君之無事設或天下有一人失所即罪在天子罪在天子焉用君相夫為相之道不必獨任天下事當舉文治天下之民舉武定天下之亂用仁人撫疲瘵用義士和鬭戰自修節儉以諷上以化下自守忠貞以事主以律人固不暇躬勤庶政也庶政得人即治茍不得人雖才如伊吕亦不治噫相國慎之林甫聽之駭然遽起拜謝之生又曰公知斯運之通塞邪林甫曰君當盡教我我當終身不忘生曰夫治生亂亂生治今古不能易也我國家自革隋亂而治至扵今日亂將生矣君其記之林甫又拜謝至曙欲聞扵上縻以一爵祿令左右濳守之堅求退曰我本秪欲逹一言扵公今得竭愚悃而又辱見納又何用阻野人之歸也林甫堅留之不得遂去林甫令人暗逐之生至南山中一石洞其人尋亦入石洞遽不見生唯有故舊大筆一其人攜以白林甫林甫以其筆置於書閣焚香拜祝其夕筆忽化為一五色禽飛去不知所之出大唐竒事袁嘉祚唐寧王傅袁嘉祚為人正直不阿能行大節犯顔悟主雖死不避後為鹽州刺史以清白尤異昇聞時岑羲蕭至忠為相授嘉祚開州刺史嘉祚恨之頻言其屈二相大怒詭嘉祚曰愚夫叱令去嘉祚方惆悵飲馬于義井有一人背井坐以水濯手故濺水數驚嘉祚馬嘉祚忿之罵曰臭卒伍何事驚馬其人顧嘉祚曰眼看使扵蠮蠛國未知死所何怒我焉嘉祚思其言不能解異之明復至朝果為二相所召迎謂曰知公跡素高要公銜朝命充使今以公為衞尉少卿往蠮蠛國報聘可乎嘉辭以不才二相日行文下嘉祚大恐行至義井復遇昨驚馬人謂嘉祚曰聞宰相欲令使遠國信乎嘉祚下馬拜之異人曰公無憂也且止不行其二相頭已懸槍刃矣焉能怒公言畢不知所之間一日二相皆誅果如異人言矣其蠮蠛國在大秦國西數千里自古未嘗通二相死嘉祚竟不去鄭相如鄭䖍工詩嗜酒性甚間放𤣥宗愛其曠逹欲致之郎署又以其不事事故特置廣文館命䖍為博士名籍甚著門庭車馬無非才俊有鄭相如者滄州人應進士舉入京聞䖍重名以宗姓因謁䖍因之敘叔姪見其潦倒未甚敬之後數日謁䖍獨與坐問其藝業相如笑謂䖍曰叔未知相如應以凡人遇然人未易知既見問敢不盡其詞相如若在孔門當處四科猶居游夏之右若叔在孔門不得列為四科今生不遇時而應此常調但銷聲晦跡而已䖍聞之甚驚請窮其說相如曰孔子稱其或繼周者雖百世可知之也今相如亦知之然國家至開元三十年當改年號後十五年當有難天下至此兵革興焉賊臣簒位當此時叔應授偽官列在朝省仍為其累願守臣節可以免焉此後蒼生塗炭未已相如今年進士及第五𨕖得授衢州信安尉至三考死扵衢州官祿如此不可强致也其年果進士及第辭䖍歸鄉及期而𨕖見䖍京師為吏部一注信安尉相如有喜色扵是辭䖍赴任初一考問衢州考吏曰鄭相如如何曰甚善問其政曰如古人二考又問之曰無恙三考又問之考吏曰相如校考後暴疾不起䖍甚驚歎方思其言及天寳十五年祿山反遣兵入京城收諸官吏赴洛陽䖍時為著作郎抑授水部郎中及尅復貶衢州司户至任而暴死一如相如之言也太平廣記卷八十二
