body:
  text: 太平廣記卷一百三十報應二十九竇凝妾嚴武盜妾緑翹馬全節婢魯思郾女鄂州小將金巵竇凝妾唐開元二十五年晉州刺史栁渙外孫女博陵崔氏家于汴州有扶風竇凝者將聘焉行媒備禮而凝舊妾有孕崔氏約遣妾後成禮凝許之遂與妾俱之宋州揚舲下至車道口宿妾是夕産二女凝因其困羸斃之實沙於腹與女俱沈之既而還汴紿崔氏曰妾巳遣去遂擇日結親後一十五年崔氏産男女數人男不育女二人各成長永泰二年四月無何几上有書一函開見之乃凝先府君之札也言汝枉魂事發近在朞月宜疾理家事長女可嫁汴州參軍崔延幼女嫁前開封尉李馹並良偶也凝不信謂其妻曰此狐狸之變不足徵也更旬日又於室内見一書吾前已示汝危亡之兆又何顚倒之甚也凝尚猶豫明日庭中復得一書詞言哀切曰禍起旦夕凝方倉惶妻曰君自省如何宜禳避之凝雖祕之而實心憚妾事五月十六日午時人皆休息忽聞扣門甚急凝心動出候之乃是所殺妾盛粧飾前拜凝曰别久安否凝大怖疾走入内隱匿其鬼隨踵至庭見崔氏崔氏驚問之乃斂容自叙曰某是竇十五郎妾凝欲娶娘子時殺妾於車道口并二女同命但妾無負凝而凝枉殺妾凝欲娶妻某自屏迹奈何忍害某性命以至於此妾以賤品十五餘年訴諸嶽瀆怨氣上達聞于帝庭上帝降鑒許妾復讐今來取凝不干娘子無懼也崔氏悲惶請謝願以功德贖罪可乎鬼厲色曰凝以命還命足矣何功德而當命也譬殺娘子豈以功德可計乎詞不為屈乃罵凝曰天網不漏何用狐伏鼠竄便升堂擒得凝而囓咬掐捩宛轉楚毒竟日而去言曰汝未慮即死且可受吾能事耳如是每日輒至則啗嚼支體其鬼或竒形異貌變態非常舉家危懼而計無從出并搏二女不堪其苦于時有僧曇亮頗善持咒凝請之置壇内閣須臾鬼至不敢升階僧讓之曰鬼道不合干人何至是耶吾召金剛坐見麋碎鬼曰和尚事佛心合平等奈何掩義隱賊且凝非理殺妾妾豈干人乎上命照臨許妾讐凝金剛豈私殺負寃者耶言訖登階擒凝如初崔氏令僧潛求聘二女鬼知而怒曰和尚為人作媒得無怍乎僧慙而去後崔氏李氏聘女遁逃而鬼不追乃言曰吾長縛汝足豈能逺耶數年二女皆卒凝中鬼毒發狂自食支體入水火啗糞穢肌膚焦爛數年方死崔氏於東京出家衆共知之出通幽記嚴武盜妾唐西川節度使嚴武少時仗氣任俠嘗於京城與一軍使鄰居軍使有室女容色艶絶嚴公因窺見之乃賂其左右誘至宅月餘遂竊以逃東出關將匿於淮泗間軍使既覺且窮其跡亦訊其家人乃暴於官司亦以狀上聞有詔遣萬年縣捕賊官專徃捕捉捕賊乗遞日行數驛隨路已得其蹤矣嚴武自鞏縣方雇船而下聞制使將至懼不免乃以酒飲軍使之女中夜乗其醉解琵琶絃縊殺之沈于河明日制使至捜捕嚴公之船無跡乃已嚴公後為劍南節度使病甚性本彊尤不信巫祝之𩔖有云云者必罪之忽一日亭午有道士至衙門自云從峩眉山來欲謁武門者初不敢言道士聲厲不得已遂進白武亦異之引入見道士至階呵叱若與人論難者良久方止寒温畢謂武曰公有疾災厄至重寃家在側公何不自悔咎以香火陳謝奈何反固執如是武怒不答道士又曰公試思之曾有負心殺害人事否武静思良久曰無道士曰適入至階前寃死者見某披訴某初謂山精木魅與公為祟遂加呵責他云上帝有命為公所寃殺已得請矣安可言無也武不測且復問曰其狀若何曰女人年纔十六七項上有物是一條如樂器之絃武大悟叩頭於道士曰天師誠聖人矣是也為之奈何道士曰他即欲面見公公當自求之乃令洒掃堂中撤去餘物焚香於内乃舁武於堂門内遣清心具衫笏畱小僮一人侍側堂門外東間有一閤子亦令洒掃垂簾道士坐於堂外含水噴噀又以栁枝洒地却坐瞑目叩齒逡巡閤子中有人吁嗟聲道士曰娘子可出良久見一女子被髮項上有琵琶絃結于嚥下褰簾而至及堂門約髮於後向武拜武見驚慙甚且掩其面女子曰公亦太忍某從公是某之失行於公則無所負公懼罪棄某於他所即可何忍見殺武悔謝良久兼欲厚以佛經紙緡祈免道士亦懇為之請女子曰不可某為公手殺上訴於是僅三十年今不可矣期在明日日晚言畢却出至閤子門拂然而没道士乃謝去嚴公遂處置家事至其日黃昏而卒出逸史綠翹唐西京咸宜觀女道士魚𤣥機字幼微長安里家女也色既傾國思乃入神喜讀書屬文尤致意於一吟一咏破瓜之歲志慕清虚咸通初遂從冠帔于咸宜而風月賞翫之佳句徃徃播於士林然蕙蘭弱質不能自持復為豪俠所調乃從游處焉於是風流之士争修飾以求狎或載酒詣之者必鳴琴賦詩間以謔浪懵學輩自視􅆙然其詩有綺陌春望逺瑤徽秋興多又殷勤不得語紅淚一雙流又焚香登玉壇端簡禮金闕又雲情自鬱争同夢仙貌長芳又勝花此數聨為絶矣一女僮曰緑翹亦明慧有色忽一日機為鄰院所邀將行誡翹曰無出若有客但云在某處機為女伴所畱迨暮方歸院緑翹迎門曰適某客來知鍊師不在不舍轡而去矣客乃機素相暱者意翹與之私及夜張燈扄戸乃命翹入卧内訊之翹曰自執巾盥數年實自檢御不令有似是之過致忤尊意且某客至欵扉翹隔闔報云鍊師不在客無言策馬而去若云情愛不蓄於胸襟有年矣幸錬師無疑機愈怒裸而笞百數但言無之既委頓請盃水酹地曰鍊師欲求三清長生之道而未能忘解珮薦枕之歡反以沈猜厚誣貞正翹今必斃於毒手矣無天則無所訴若有誰能抑我彊魂誓不蠢蠢於㝠㝠之中縱爾淫佚言訖絶于地機恐乃坎後庭瘞之自謂人無知者時咸通戊子春正月也有問翹者則曰春雨霽逃矣客有宴于機室者因溲於後庭當瘞上見青蠅數十集于地驅去復來詳視之如有血痕且腥客既出竊語其僕僕歸復語其兄其兄為府街卒嘗求金於機機不顧卒深銜之聞此遽至觀門覘伺見偶語者乃訝不覩緑翹之出入街卒復呼數卒攜鍤具突入𤣥機院發之而緑翹貌如生卒遂錄𤣥機京兆府吏詰之辭伏而朝士多為言者府乃表列上至秋竟戮之在獄中亦有詩曰易求無價寶難得有心郎明月照幽隙清風開短襟此其美者也出三水小牘馬全節婢魏帥侍中馬全節嘗有侍婢偶不愜意自擊殺之後累年染重病忽見其婢立於前家人但訝全節之獨語如相問答初云爾來有何意又云與爾錢財復曰為爾造像書經哀祈移時其亡婢不受但索命而已不旬日而卒出玉堂閒話魯思郾女内臣魯思郾女生十七年一日臨鏡將粧鏡中忽見一婦人披髮徒跣抱一嬰兒迴顧則在其後因恐懼頓仆久之乃蘇自是日日恒見積久其家人皆見之思郾自問其故答云已揚子縣里民之女徃歲建昌縣錄事某以事至揚子因聘已為側室君女即其正妻歲餘生此子後錄事出旁縣君女因投已於井并此子以石塡之詐其夫云逃去我方訟於所司適㑹君女卒今雖後身固當償命也思郾使人馳至建昌驗事其錄事老猶在如言發井果得骸骨其家多方以禳之皆不可其女後嫁褚氏厲愈甚旦夕驚悸以至於卒出稽神録鄂州小將鄂州小將某者本田家子既仕欲結豪族而謀其故妻因相與歸寧殺之于路棄尸江側并殺其同行婢已而奔告其家號哭云為盜所殺人不之疑也後數年奉使至廣陵舍於逆旅見一婦人賣花酷𩔖其所殺婢既近乃眞是婢見已亦再拜因問為人耶鬼耶答云人也徃者為賊所擊幸而不死既蘇得賈人船寓載東下今在此與娘子賣花給食而已復問娘子何在曰在近可見之乎曰可即隨之而去一小曲中指一貧舍曰此是也婢先入頃之其妻乃出相見悲涕備述艱苦某亦怳然莫之測也俄而設食具酒復延入内室置飲食于從者皆醉日暮不出從者稍前覘之寂若無人因直入室中但見白骨一具衣服毁裂流血滿地問其鄰云此空宅久無居人矣闕金巵蜀青石鎭陳洪裕妻丁氏因妒忌打殺婢金巵潛於本家埋瘞仍牓通衢云婢金巵逃走經年遷居夾江因夏潦飄壊舊居渠岸見死婢容質不變鎭將具狀報州追勘欵伏其婢屍一夕壊爛遂寘丁氏于法出儆戒錄太平廣記卷一百三十
