body:
  text: 太平廣記卷三百一十宋李昉等編神二十張無頗王錡馬朝郄元位夏陽趙尉盧嗣宗三史王生張生張無頗長慶中進士張無頗居南康將赴舉遊丐番禺值府帥改移投詣無所愁疾臥于逆旅僕從皆逃忽遇善易者袁大娘來主人舎瞪視無頗曰子豈久窮悴􅁘遂脱衣買酒而飲之曰君窘厄如是能取某一計不旬朔自當富贍兼獲延齡無頗曰某困餓如是敢不受敎大娘曰某有玉龍膏一合子不惟還魂起死因此亦遇名姝但立一表白曰能治業疾若常人求醫但言不可治若遇異人請之必須持此藥而一往自能富貴耳無頗拜謝受藥以暖金合盛之曰寒時但出此合則一室暄熱不假爐炭矣無頗依其言立表數日果有黄衣若宦者扣門甚急曰廣利王知君有膏故使召見無頗誌大娘之言遂從使者而往江畔有畫舸登之甚輕疾食頃忽覩城宇極峻守衛甚嚴宦者引無頗入十數重門至殿庭多列美女服飾甚鮮卓然侍立宦者趨而言曰召張無頗至遂聞殿上使軸簾見一丈夫衣王者之衣戴逺逰冠二紫衣侍女扶立而臨砌招無頗曰請不拜王曰知秀才非南越人不相綂攝幸勿展禮無頗彊拜王罄折而謝曰寡人薄徳逺邀大賢葢縁愛女有疾一心鍾念知君有神膏儻獲痊平實所媿戴遂令阿監二人引入貴主院無頗又經數重户至一小殿廊宇皆綴明璣翠璫楹楣煥燿若布金鈿異香氲鬱滿其庭户俄有二女褰簾召無頗入覩眞珠繡帳中有一女子纔及笄年衣翠羅縷金之襦無頗切其脉良久曰貴主所疾是心之所苦遂出龍膏以酒吞之立愈貴主遂抽翠玉雙鸞箆而遺無頗目成者久之無頗不敢受貴主曰此不足酬君子但表其情耳然王當有獻遗無頗媿謝阿監遂引之見王王出駭雞犀翡翠盌麗玉明瑰而贈無頗無頗拜謝宦者復引送于畫舸歸番禺主人莫能覺纔貨其犀已巨萬矣無頗覩貴主華艷動人頗思之月餘忽有青衣扣門而送紅牋有詩二首莫題姓字無頗捧之青衣倏忽不見無頗曰此必仙女所製也詞曰羞解明璫尋漢渚但憑春夢訪天涯紅樓日暮鸎飛去愁殺深宫落砌花又曰燕語春泥墮錦筵情愁無意整花鈿寒閨欹枕不成夢香炷金爐自裊烟頃之前時宦者又至謂曰王令復召貴主有疾如初無頗忻然復往見貴主復切脉次左右云王后至無頗降階聞環珮之響宫人侍衞羅列見一女子可三十許服飾如后妃無頗拜之后曰再勞賢哲實所懷慙然女子所疾又是何苦無頗曰前所疾耳心有擊觸而復作焉若再餌藥當去根幹耳后曰藥何在無頗進藥合后覩之黙然色不樂慰喻貴主而去后遂白王曰愛女非疾其私無頗矣不然者何以宫中暖金合得在斯人處耶王愀然良久曰復為賈充女􅁘吾亦當繼其事而成之無使久苦也無頗出王命延之别館豐厚宴犒後王召之曰寡人竊慕君子之為人輒欲以愛女奉託如何無頗再拜辭謝心喜不自勝遂命有司擇吉日具禮待之王與后敬仰逾於諸壻遂止月餘懽宴俱極王曰張郎不同諸壻須歸人間昨夜檢於幽府云當是㝠數即寡人之女不至苦矣番禺地近恐為時人所怪南康又逺况别封疆不如歸韶陽甚便無頗曰某意亦欲如此遂具舟楫服飾異珍金珠寶玉無頗曰唯侍衛輩即須自置無使隂人此減算耳遂與王别曰三年即一到彼無言於人無頗挈家居於韶陽人罕知者住月餘忽袁大娘扣門見無頗無頗大驚大娘曰張郎今日賽口及小娘子酬媒人可矣二人各具珍寶賞之然後告去無頗詰妻妻曰此袁天綱女程先生妻也暖金合即某宫中寶也後毎三嵗廣利王必夜至張室後無頗為人疑訝於是去之不知所適出傳奇王錡天興丞王錡寶厯中嘗遊隴州道憇于大樹下解鞍籍地而寢忽聞道騎傳呼自西來見紫衣乗車從數騎勅左右曰屈王丞來引錡至則帳幄陳設已具與錡坐語良久錡不知所呼每承言即徘徊鹵莽紫衣覺之乃曰某潦倒一任二十年足下要相呼亦可謂為王耳錡曰未喻大王何所自曰恬昔為秦築長城以此微功屢蒙重任洎始皇帝晏駕某為羣小所搆横被誅夷上帝仍以長城之役勞功害民配守吳嶽當時吳山有嶽號衆咸謂某為王其後嶽職却歸於華山某罰配年月未滿官曹移便無所主管但守空山人跡所稀寂寞頗甚又縁已被虚名不能下就小職遂至今空竊假王之號偶此相遇思少從容錡曰某名跡幽沉質性孱懦幸蒙一顧之惠不知何以奉教恬曰本縁奉慕顧展風儀何幸遽垂厚意誠有事則又如何錡曰幸甚恬曰久閒散思有以効用如今士馬處處有主不可奪他權柄此後三年興元當有八百人無主健兒若早圖謀必可將領所必奉託者可致紙錢萬張某以此藉手方諧矣錡許諾而寤流汗霡霂乃市紙萬張以焚之及太和四年興元節度使李絳遇害後節度使温造誅其兇黨八百人出河東記馬朝馬朝者天平軍步卒也太和初滄州李同捷叛詔鄆師討之朝在是行至平原南與賊相持累旬朝之子士俊自鄆餽食適至軍中會戰有期朝年老啟其將曰長男士俊年少有力又善弓矢來日之行乞請自代主將許之及戰鄆師小北而士俊連中重瘡仆於鬭塲夜久得蘇忽有𫝊呼語言頗𩔖將吏十數人者且無燭士俊窺之不見但聞按據簿書稱㸃名姓俄次士俊則呼馬朝傍有人曰不是本身速令追召言訖遂過及逺猶聞其檢閲未已士俊惶惑力起徐歸四更方至營門營吏納之因扶持送至朝所朝謂其已死及見驚喜即洗瘡傅藥乃曰汝可飲少酒粥以求寢也即出汲水時營中士馬極衆每三二百人則同一井井乃周圓百步皆為隊道漸以及泉葢使衆人得以環汲也時朝以罌缶汲水引重之際泥滑顛仆於地地中素有折刀朝心正貫其刃久而士俊懼其未囘告於同幕者及到則已絶矣士俊旬日乃愈出河東記郄元位河東衙將郄元位者太和初常奉使京輦行至沙苑會日暮見一人長丈餘衣紫佩金容狀豐偉御白馬其馬亦高丈餘導從近十輩形狀非常執弧矢自南來元位甚驚異立馬避之神人忽舉鞭西指若有所見其導從輩俱隨指而望元位亦西望寂然無覩及迴視之皆不見矣元位瘁然汗發髀戰心慄不覺墮馬因病熱肩輿以歸旬餘方愈時河東連帥司空李愿卒出宣室記夏陽趙尉馮翊之屬縣夏陽據大河縣東有池館當太行中條煙靄嵐霏昏旦在望又有瀵泉穴其南泉水清激毫縷無隱太和中有趙生者尉于夏陽嘗一夕雨霽趙生與友數輩聫步望月於瀵泉之上忽見一人貌甚黑被緑袍自水中流沿泳久之吟曰夜月明皎皎緑波空悠悠趙生方驚其人忽迴望水濵若有所懼遂入水惟露其首有頃亦沒趙生明日又至泉所是岸傍數十步有神祠表其門曰瀵水神趙生因入廟見神坐之左右摶埴為偶人被綠袍者視其貌若前時所見水中人也趙生曰此瀵壤也尚能惑衆非怪而何將用剗其廟有縣吏曰此神廟且能以風雨助生植茍若毁其屋適足為邑人之患於是不果隳出宣室志盧嗣宗蒲津有舜祠又有娥皇女英祠在舜祠之側土偶之容頗盡巧麗開成中范陽盧嗣宗假職於蒲津一日與其友數輩同遊舜廟至娥皇女英祠嗣宗戱曰吾願為帝子之隸可乎再拜而祝者久之衆皆謂曰何侮易之言黷於神乎嗣宗笑益酣自是徃徃獨逰娥皇祠酒酣多為䙝黷語俄被疾肩舁以歸色悸而戰身汗如瀝其夕遂卒家僮輩見十餘人捽拽嗣宗出門望舜祠而去及視嗣宗尸其背有赤文甚多若為所撲蒲之人咸異其事出宣室志三史王生有王生者不記其名業三史博覽甚精性好誇炫語甚容易毎辯古昔多以臆斷旁有議者必大言折之嘗逰沛因醉入高祖廟顧其神座笑而言曰提三尺劒滅暴秦翦强楚而不能免其母烏老之稱徒歌大風起兮雲飛揚曷能威加四海哉徘徊庭廡間肆目久之乃還所止是夕纔寐而卒見十數騎擒至廟庭漢祖按劒大怒曰史籍未覽數紙而敢褻黷尊神烏老之言出自何典若無所據爾罪難逃王生頓首曰臣嘗覽大王本紀見司馬遷及班固云劉媪而注云烏老及釋云老母之稱也見之於史聞之於師載之於籍炳然明如白日非臣下敢出於胷襟爾漢祖益怒曰朕中外泗水亭長碑昭然俱載矣曷以外族温氏而妄稱烏老乎讀錯本書且不見義敢恃酒喧於殿庭付所司劾犯上之罪語未終而西南有清道者揚言太公來方及階顧王生曰斯何人而見辱之甚也漢祖降階對曰此虚妄侮慢之人也罪當斬之王生逞目太公遂厲聲而言曰臣覽史籍見侮慢其君親者尚無所貶而賤臣戱語於神廟豈期肆於市朝哉漢祖又怒曰在典冊豈載侮慢君親者當試徵之王生曰臣敢徵大王可乎漢祖曰然王生曰王即位會羣臣置酒前殿獻太上皇壽有之乎漢祖曰有之既獻壽乃曰大人常以臣無賴不事産業不如仲力今某之業孰與仲多有之乎漢祖曰有之殿上羣臣皆呼萬嵗大笑為樂有之乎曰有之王生曰是侮慢其君親矣太公曰此人理不可屈宜速逐之不爾必遭杯羮之讓也漢祖黙然良久曰斬此物汚我三尺刃令搦髪者摑之一摑惘然而蘇東方明矣以鏡視腮有若指蹤數日方滅出纂異記張生進士張生善鼔琴好讀孟軻書下第遊蒲闗入舜城日將暮乃排闥聳轡爭進因而馬蹶頃之馬斃生無所投足遂詣廟吏求止一夕吏指簷廡下曰捨此無所詣矣遂止初夜方寢見絳衣者二人前言曰帝召書生生遽往帝問曰業何道藝之人生對曰臣儒家子常習孔孟書帝曰孔聖人也朕知久矣孟是何人得與孔同科而語生曰孟亦傳聖人意也祖尚仁義設禮樂而施敎化帝曰著書乎生曰著書七篇二百餘章葢與孔門之徒難疑荅問及魯論齊論俱善言也帝曰記其文乎曰非獨曉其文抑亦深其義帝乃令生朗念傾耳聽之念萬章問舜徃於田號泣於旻天何為其號泣也孟子曰怨慕也萬章問曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎答曰長息問於公明高曰舜往于田則吾得聞命矣號泣於旻天怨於父母則吾不知也帝止生之詞憮然歎曰葢有不知而作之者亦此之謂矣朕捨天下千八百二十載暴秦竊位毒痡四海焚我典籍泯我帝圖蒙蔽羣言逞恣私欲百代之後經史差謬辭意相及鄰於詼諧常聞贊唐堯之美曰垂衣裳而天下理葢明無事也然則平章百姓協和萬邦至於滔天懷山襄陵下民其咨夫如是則與垂衣之義乖矣亦聞贊朕之美曰無為而治乃載於典則云賔四門齊七政𩔖上帝禋六宗望山川徧羣神流共工放驩兜殛鯀竄三苗夫如是與無為之道逺矣今又聞號泣于旻天怨慕也非朕之所行夫莫之為而為之者天也莫之致而致之者命也朕泣者怨已之命不合於父母而訴於旻天也何萬章之問孟軻不知其對傳聖人之意豈宜如是乎嗟不能已久之謂生曰學琴乎曰嗜之而不善帝乃顧左右取琴曰不聞鼔五絃歌南風奚足以光其歸路乃鼔琴以歌之曰南風薰薰兮草芊芊妙有之音兮歸清絃蕩蕩之敎兮由自然熙熙之化兮吾道全薰薰兮思何傳歌訖鼔琴為南風弄音韻清暢爽朗心骨生因發言曰妙哉乃遂驚寤出纂異記太平廣記卷三百一十
