body:
  text: 太平廣記卷三百五十二宋李昉等編鬼三十七牟頴游氏子李雲鄭總王紹王鮪李戴仁劉璪李矩陶福巴川崔令馮生牟頴洛陽人牟頴少年時因醉誤出郊野夜半方醒息於路傍見一發露骸骨穎甚傷念之達􅍼躬自掩埋其夕夢一少年可二十已來衣白練衣仗一劔拜頴曰我疆寇耳平生恣意殺害作不平事近與同軰争遂為所害埋於路傍久經風雨所以發露蒙君復藏我故來謝君我生為兇勇人死亦為兇勇鬼若能容我棲託但君毎夜微奠祭我我常應君指使我既得託於君不至飢渴足得令君所求狥意也穎夢中許之及覺乃試設祭饗暗以祀禱祈夜又夢鬼曰我已託君矣君毎欲使我即呼赤丁子一聲輕言其事我必應聲而至也穎遂毎潛告令竊盜盜人之財物無不應聲遂意後致富有金寳一日頴見鄰家婦有美色愛之乃呼赤丁子令竊焉鄰婦至半夜忽自外踰垣而至頴驚起欵曲問其所由來婦曰我本無心忽夜被一人擒我至君室忽如夢覺我亦不知何怪也不知何計却得還家悲泣不已頴甚閔之潛留數日而其婦家人求訪極切至於告官頴知之乃與婦人詐謀令婦人出别墅却自歸言不知被何妖精取去今却得廻婦人至家後再毎三夜或五夜依前被一人取至頴家不至曉即却送歸經一年家人皆不覺婦人深怪頴有此妖術後因至切問於頴曰若不白我我必自發此事頴遂具述其實鄰婦遂告於家人共圖此患家人乃宻請一道流潔浄作禁法以伺之赤丁子方夜至其門見符籙甚多却反白於頴曰彼以正法拒我但力微耳與君力争當惡取此婦人此來必須不放囘也言訖復去須臾鄰家飄風驟起一宅俱黒色但是符籙禁法之物一時如掃復失婦人至􅍼其夫遂告官同來頴宅擒捉頴乃携此婦人逃不知所之出瀟湘錄游氏子許都城西之北陬有趙將軍宅主父既沒子孫流移其處遂凶莫敢居者親近乃牓於里門曰有居得者便相奉乾符初許有游氏子者性剛悍拳捷過人見牓曰僕猛士也縱奇妖異鬼必有以制之時盛夏既夕携劔而入室宇深䆳前庭廣袤游氏子設簟庭中絺綌而坐一鼔盡閴寂無驚游氏子倦乃枕劔面堂而卧再鼓將半忽聞軋然開後門聲蠟炬齊列有役夫數十於堂中洒掃闢前軒張朱簾繡幕陳筵席寳器異香馥於簷楹游子心謂此小魅耳未欲廹之將觀其終少頃執樂器紆朱紫者數十軰自東廂升階歌舞妓數十軰自後堂出入于前堂紫衣者居前朱綠衣白衣者次之亦二十許人言笑自若揖讓而坐於是絲竹合奏飛觴舉白歌舞間作游氏子欲前突擒其渠魁將起乃覺髀間為物所壓冷且重不能興欲大呌口哆而不能聲但觀堂上歡洽直至嚴鼓席方㪚燈火既滅寂爾如初游氏子駭汗心悸匍伏而出至里門良乆方能語其宅後卒無敢居者出三水小牘李雲前南鄭縣尉李雲於長安求納一姬其母未許雲曰予誓不婚乃許之號姬曰楚賔數年後姬卒卒後經嵗遂婚前南鄭令沈氏女及婚日雲方浴于浄室見楚賔執一藥來徑前謂雲曰誓余不婚今又與沈家作女壻無物奉贈君香一帖以資浴湯瀉藥末入浴斛中釵子攪水訖而去雲甚覺不安困羸不能出浴遂卒肢體如綿筋骨並㪚出聞奇録鄭總進士鄭總以妾病欲不赴舉妾曰不可為一婦人而廢舉固請之總遂入京其春下第東歸及家妾卒既葬旬月後夜深偶來寢聞室外有人行聲開户觀之乃亡妾也召入室而坐問其所要但求好茶總自烹與之啜訖總以小兒女已睡欲呼與相見妾曰不可渠年小恐驚之言訖辭去纔出户不見出聞奇錄王紹明經王紹夜深讀書有人隔窓借筆紹借之於窓上題詩曰何人窓下讀書聲南斗闌干北斗横千里思家歸不得春風腸斷石頭城詩訖寂然無聲乃知非人也出聞奇録王鮪鳳翔少尹王鮪禮部侍郎凝之叔父也年十四五與童兒軰戲於果園竹林下見二枯首為糞壤所沒乃令小僕擇浄地瘞之祭以酒饌其後數夕陰晦忽聞窓外窸窣有聲良乆問之云某等受君深恩免在蕪􅁾未知所酬聊願驅策爾後凡有吉凶肸蠁間必來報如此數年遂與靈物通徹崔珙為度支使雅知於鮪一夕留飲家釀酒酣稍歡云有妓善歌者令召之良乆不至珙自入視之云理粧纔罷忽病心痛請飲湯而出珙復坐鮪具言歌者儀貌珙怪問之云適見一人著短綾緋衣控馬而去語未畢家僕報中惡救不返矣珙甚悲之鮪宻言有一事或可活之須得白牛頭及酒一斛因召左右試令求覓有度支所用甚幹事以善價取之不踰時而至鮪令扶歌者置於浄室榻上前以大盆盛酒横取板安牛頭於其上設席焚香宻封其户且誡曰専伺之曉鼔一動聞牛吼當急開户可以活矣鮪遂去禁鼓忽鳴果聞牛吼開户視之歌者㣲喘盆酒悉乾牛怒目出於外數日方能言云其夕治粧既畢有人促召出門乘馬而行約數里見室宇華麗開筵張樂四座皆朱紫少年見歌者至大喜致於妓席歡笑方洽忽聞有人大呼聲振庭廡座者皆失色相視妓樂俱罷俄見牛頭人長丈餘執㦸徑趨而出無不狼狽而走唯歌者在焉牛頭引於階前背負而出行十數步忽覺卧於室内珙後宻詢其事鮪終不言出劇談録李戴仁江河邊多倀鬼往往呼人姓名應之者必溺乃死魂者誘之也李戴仁嘗維舟於枝江縣曲浦中月色皎然忽見一嫗一男子出水面四顧失聲云此有生人遽馳水面若履平地登岸而去當陽令蘇汭居江陵嘗夜歸月明中見一美人被髮所著裾裾殆似水濕汭戲云非江倀耶婦人怒曰喚我作鬼奔而逐之汭走遇更廵方止見婦却返所來之路出北夢瑣言劉璪漢江北鄧州界地名穴口本無鎭戍有小河南流入于漢久為沙擁水道甚隘前江陵令劉璪丙子嵗往彼州訪親知至穴口宿舊知韓氏家家人曰鄰村張家新婦卒來三日適來却活主人蹔往省之至夜韓家歸云張婦為側近廟神召去見其中外親眷亡者咸在焉為廟神造軍頓無人作餅故令召來見㕔上門外將士列坐言開穴口江水士卒踣沙手皆血流供頓畢乃放囬鄉里未之信不久沙壖相次摧墊江路乃通出北夢瑣言李矩成汭鎮荆州有墊江縣令崔令與主簿李矩不協鄰於水火一旦羣盜劫縣殺崔令賊過後矩入宅檢校有一㕔子方避賊見矩以為與賊通明日言鎮將衆咸知矩與崔失歡頗疑之執送中州推問不伏遂解送江陵禁右廂獄廂吏速於具獄推吏常某言於判官范某曰李矩詆讕須栲䆒之范固不許常竟鍛鍊以成之矩臨刑戒家人多燒紙筆訟於地下纔一月常某暴亡後李矩主簿見身范見矩至曰某受判官深恩非敢造次但㝠府只要為證耳及妻子以誠祈之乞容旬月區分家事雖無痛苦飲食如常但困憊踰月而卒出北夢瑣言陶福蜀將陶福少年無賴偷狗屠牛後立功至郡守屯戍興元府之西縣暴得疾急命從人朱軍將詣府迎醫李令藹令藹與朱軍將連騎馳往至夜抵西縣近郭諸葛亮廟前見秉炬三對前道擁一人步行荷挍縶縳衆人相從後有陶親叟抱衣裘而隨之令藹先未識陶福朱軍將指謂令藹曰此是我家太尉胡為如此逡巡恐悚亦疑是鬼曉至其營已聞家人哭聲向來執録乃福之魂也出北夢瑣言巴川崔令合州巴川縣亂後官舍殘毁移居寨中稍可自固崔某為令嘗有徤卒盜寨木令擒送鎮将斬之卒家先事壁山人卒死神乃與令家為祟或見形往來或空中詬罵擲火毁器錢帛衣服無故遺失箱篋鏁閉如初其中衣服率皆剪碎求方術禳解都不能制令罷官還千里鬼亦隨之又日夕飲食與人無異一家承事不敢有怠費用甚多吏力將困忽一旦舉家聞大鳥鼔翼之聲止于屋久之空中大呼自稱大王曰汝比有災值我雍溪兄弟非理破除汝家活計損失財物作諸怪異計汝必甚畏之今已遣去矣汝災盡福生吾自來暫駐亦將不久且借天􅅫龕子中居此天􅅫樣極好借上天上傳寫一本三五日即送來數日後置天蓬於舍簷上自此日夕常在恒與主人語令小大誦詩賦作音樂一一隨聲唱之所誦文字或有謬誤必為改正其言多勸人為善亦令學氣術修道或云尋常乗鶴往來天上初邑中有羣鶴現神云數内只有兩隻真鶴我所騎來其餘皆常鳥矣又自云姓張毎日飲食與人無異有女名錦繡娘及妻妾食物所費亦不少凡見善人君子即肯與言稍强暴之人即不與語亦云上天去忽有醉僧健卒三人來謁之言詞無度有所淩毁因不語僧去後徐謂人曰此僧食狗肉兇暴無良不欲共語人之所行善惡災福言無不中至于小名第行一一皆知細問之即以他語為對未知是何神也出錄異記馮生遂寕有馮生見鬼知人吉凶潁川陳絢為武信軍留後而劉知俊代之捃其舊事馮謂絢曰劉公雖號元戎前無幢節殆不久乎幸勿憂也未踰嵗而知俊被殺有林泳者閩人常謂其僚友曰安有生人而終日見鬼乎無聽其祅馮聞之對衆謂之曰君為官多不克終葢曽殺一女人為祟以公祿夀未盡莫致其便我能言其姓名公信之乎於是慚懼言誠於馮許為􅄙其寃也出北夢瑣言太平廣記卷三百五十二
