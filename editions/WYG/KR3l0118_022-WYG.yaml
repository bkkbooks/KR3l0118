body:
  text: 太平廣記卷二十二神仙二十二羅公逺僕僕先生藍采和羅公逺羅公逺本鄂州人也刺史春設觀者傾郡有一白衣人長丈餘貌甚異隨羣衆而至門衛者皆恠之俄有小童傍過叱曰汝何故離本處驚怖官司耶不速去其人遂攝衣而走吏乃擒小童至醼所具白於刺史刺史問其姓名云姓羅名公逺自幼好道術適見守江龍上岸看某趣令回刺史不信曰須令我見本形曰請俟後日至期於水濵作一小坑深纔一尺去岸丈餘引水入刺史與郡人並看逡廵有魚白色長五六寸隨流而至騰躍漸大青煙如線起自坎中少頃黑氣滿空咫尺不辨公逺曰可以上津亭矣未至電光注雨如瀉須臾即定見一大白龍於江心頭與雲連食頃方滅時𤣥宗酷好仙術刺史具表其事以進時𤣥宗與張果葉法善碁二人見之大笑曰村童事亦何解乃各握碁子十數枚問曰此有何物曰空手及開果無並在公逺處方大駭異令與張葉等齒坐劒南有果初進名為日熟子張與葉以術取每過午必至其日暨夜都不到相顧而語曰莫是羅君否時天寒圍爐公逺笑於火中素樹一筯及此除之遂至葉詰使者云欲到京焰火亘天無路可過適火歇方得度從此衆皆敬伏開元中中秋望夜時𤣥宗於宫中翫月公逺奏曰陛下莫要至月中看否乃取拄杖向空擲之化為大橋其色如銀請𤣥宗同登約行數十里精光奪目寒色侵人遂至大城闕公逺曰此月宫也見仙女數百皆素練霓衣舞於廣庭𤣥宗問曰此何曲也曰霓裳羽衣也𤣥宗密記其聲調遂回却顧其橋隨歩而滅且召伶官依其聲調作霓裳羽衣曲時武惠妃尤信金剛三藏𤣥宗幸功徳院忽苦背痒公逺折竹枝化七寳如意以進𤣥宗大悦顧謂三藏曰上人能致此乎曰此幻化耳臣為陛下取真物乃袖中出七寳如意以進公逺所進者即時化為竹枝耳及𤣥宗幸東洛武妃同行在上陽宫麟趾殿方將修殿其庭有大方梁數丈徑六七尺時公逺葉尊師金剛三藏皆侍從焉𤣥宗謂葉尊師曰吾方閒悶可試小法以為樂也師試為朕舉此方木葉受詔作法方木一頭揭數尺而一頭不起𤣥宗曰師之神力何其失耶葉曰三藏使金剛善神衆壓一頭故不舉時𤣥宗奉道武妃宗釋武妃頗有悦色三藏亦隂心自懽惟公逺低頭微哂𤣥宗謂三藏曰師神呪有功葉不能及可為朕呪法善入澡瓶乎三藏受詔置瓶使法善敷座而坐遂呪法大佛頂真言未終遍葉身歘歘就瓶不三二遍葉舉至瓶嘴遍訖拂然而入瓶𤣥宗不悦良乆謂三藏曰師之功力當得自在既使其入能為出乎三藏曰是僧之本法也即呪之誦佛頂真言數遍葉都不出𤣥宗曰朕之法師今為三藏所呪而沒不得見矣武妃失色三藏大懼𤣥宗謂公逺曰將若之何得法善旋矣公逺笑曰法善不逺良久髙力士奏曰葉尊師入𤣥宗大驚曰銅瓶在此自何所來引入問之對曰寧王邀臣喫飯面奏的不放臣適寧王家食訖而來不因一呪何以去也𤣥宗大笑武妃三藏皆賀已而使葉設法籙於是取三藏金襴袈裟摺之以盆覆之葉禹歩叩齒繞三匝曰太上老君攝去盆下袈裟之縷隨色皆攝各為一聚三藏曰惜哉金襴至毁如此𤣥宗曰可正乎葉曰可又覆之呪曰太上老君正之啟之袈裟如故葉又取三藏鉢燒之烘赤手捧以合三藏頭失聲而走𤣥宗大笑公逺曰陛下以為樂乃道之末法也葉師何用逞之𤣥宗曰師不能為朕作一術以懼朕耶公逺曰請更問三藏法術何如三藏曰貧道請收固袈裟試令羅公取取不得則羅公輸取得則僧輸於是令就道塲院為之三藏結壇焚香自於壇上跏趺作法取袈裟貯之銀合又安數重木函皆有封鎖置於壇上𤣥宗與武妃葉公皆見中有一重菩薩外有一重金甲神人外以一重金剛圍之賢聖比肩環繞甚嚴三藏觀守目不暫捨公逺坐繩床言笑自若𤣥宗與葉公皆視之數食頃𤣥宗曰何太遲遲得無勞乎公逺曰臣鬭力安敢自衒其能但在陛下使三藏啓觀耳令開函取袈裟雖封鏁依然中已空矣𤣥宗大笑公逺奏曰請令人於臣院内勑弟開櫃取來即令中使取之須臾袈裟至𤣥宗問之公逺曰菩薩力士聖之中者甲兵諸神道之小者皆可功叅上界至於太上至真之妙非術士所知適使玉清神女取之則菩薩金剛不見其形取若坦途何礙之有𤣥宗大悦賞賚無數而葉公三藏然後伏焉時𤣥宗欲學隱遯之術對曰陛下玉書金格以簡於九清矣真人降化保國安人誠宜習唐虞之無為繼文景之儉約却寳劒而不御棄名馬而不乘豈可以萬乗之尊四海之貴宗廟之重社稷之大而輕狥小術為戱翫之事乎若盡臣術必懷璽入人家困於魚服矣𤣥宗怒罵之遂走入殿柱中數𤣥宗之過𤣥宗愈怒易柱破之復入玉磶中又易磶破之為數十片悉有公逺之形𤣥宗謝之乃如故𤣥宗後又堅學隱形之術强之不已因而教焉然託身隐常有不盡或露裾帶或見影跡𤣥宗怒斬之其後數歳中使輔仙玉奉使入蜀見公逺於黑水道中披雲霞衲帔策杖徐行仙玉策馬追之常去十餘歩竟莫能及仙玉呼曰天師雲水適意豈不念内殿相識耶公逺方佇立顧之仙玉下馬拜謁訖從行數里官道側俯臨長溪旁有巨石相與渡溪據石而坐謂仙玉曰吾棲息林泉以修真為務自晉咸和年入蜀訪師諸山久晦名跡聞天子好道崇𤣥乃捨烟霞放曠之樂冒塵世腥羶之路混跡鷄䳱之羣窺閲蜉蝣之境不以為倦者蓋欲以至道之貴俯教於人主耳聖上延我於别殿遽以靈藥為索我告以人間之腑臟葷血充積三田未虚六氣未潔請俟他日以授之以十年為限不能守此誡約加我以丹頸之戮一何遑遽哉然得道之人與道氣混合豈可以世俗兵刃水火害於我哉但念主上列丹華之籍有玉京交契之舊躬欲度之眷眷之情不能巳巳因袖中出書一緘謂仙玉曰可以此上聞云我姓維名厶遠靜真先生弟子也上必寤焉言罷而去仍以蜀當歸為寄遂失所在仙玉還京師以事及所寄之緘奏焉𤣥宗覽書惘然不懌仙玉出公逺已至因即引謁𤣥宗曰先生何改名姓耶對曰陛下嘗去臣頭固改之耳羅字去頭維字也公字去頭厶字也逺字去頭遠字也𤣥宗稽首陳過願捨其尤公逺欣然曰蓋戲之耳夫得神仙之道者刧運之災陽九之數天地淪毁尚不能害况兵刃之屬那能為害也異日𤣥宗復以長生為請對曰經有之焉我命在我匪由於他當先内求而外得也刳心滅智草衣木食非至尊所能因以三峰歌八首以進焉其大㫖乃𤣥素黄赤之使還嬰泝流之事𤣥宗行之逾年而神逸氣旺春秋愈髙而精力不憊歳餘公逺去不知所之天寳末𤣥宗幸蜀又於劒門奉迎鑾輅衛至成都拂衣而去及𤣥宗自蜀還京方悟蜀當歸之寄矣出神仙感遇傳及仙傳拾遺逸史等書僕僕先生僕僕先生不知何許人也自云姓僕名僕莫知其所由來家於光州樂安縣黄土山凡三十餘年精思餌杏丹衣服飲食如常人賣藥為業開元三年前無棣縣令王㴞寓居黄土山下先生過之㴞命男弁為主善待之先生因授以杏丹術時弁舅吳明珪為光州别駕弁在珪舎頃之先生乘雲而度人吏數萬皆覩之弁乃仰告曰先生教弁丹術未成奈何捨我而去時先生乘雲而度已十五過矣人莫測及弁與言觀者皆愕或以告刺史李休光休光召明珪而詰之曰子之甥乃與妖者友子當執其咎因令弁往召之弁至舎而先生至具以狀白先生曰余道者不欲與官人相遇弁曰彼致禮便當化之如妄動失節當威之使心伏於道不亦可乎先生曰善乃詣休光府休光踞見且詬曰若仙當遂往矣今去而復來妖也先生曰麻姑蔡經王方平孔申二茅之屬問道於余余説之未畢故止非他也休光愈怒叱左右執之龍虎見於側先生乘之而去去地丈餘𤣥雲四合斯須雷電大至碎庭槐十餘株府舎皆震壞觀者無不奔潰休光懼而走失頭巾直吏收頭巾引妻子跣出府因徙宅焉休光以狀聞𤣥宗乃詔改樂安縣為仙居縣就先生所居舎置仙堂觀以黄土村為仙堂村縣尉嚴正誨䕶營築焉度王弁為觀主兼諫議大夫號通真先生弁因餌杏丹却老至大厯十四年凡六十六歳而狀可四十餘筋力稱是其後果州女子謝自然白日上昇當自然學道時神仙頻降有姓崔者亦云名崔有姓杜者亦云名杜其諸姓亦爾則與僕僕先生姓名相𩔖矣無乃神仙降於人間不欲以姓名行於時俗乎後有人於義陽郊行者日暮不達前村忽見道旁草舎因往投宿室中惟一老人問客所以答曰天隂日短至此昬黑欲求一宿老人云宿即不妨但無食耳久之客苦饑甚老人與藥數丸食之便飽既明辭去及其還也忽見老人乘五色雲去地數十丈客便遽禮望之漸逺客至安陸多為人説之縣官以為惑衆繫而詰之客云實見神仙然無以自免乃向空祝曰仙公何事見今受不測之罪言訖有五色雲自北方來老人在雲中坐客方見釋縣官再拜問其姓氏老人曰僕僕野人也有何名姓州司畵圖奏聞勑令於草屋之所立僕僕先生廟今見在出異聞集及廣異記藍采和藍采和不知何許人也常衣破藍彩六銙黑木腰帶闊三寸餘一脚着靴一脚跣行夏則衫内加絮冬則卧於雪中氣出如蒸每行歌於城市乞索持大拍板長三尺餘常醉􅂿歌老少皆隨看之機捷諧謔人問應聲答之笑皆絶倒似狂非狂行則振靴言􅂿歌􅂿歌藍采和世界能幾何紅顔一春樹流年一擲梭古人混混去不返今人紛紛來更多朝騎鸞鳯到碧落暮見桑田生白波長景明暉在空際金銀宫闕髙嵯峨歌詞極多率皆仙意人莫之測但以錢與之以長繩穿拖地行或散失亦不回顧或見貧人即與之及與酒家周遊天下人有為兒童時至及斑白見之顔狀如故後􅂿歌於濠梁間酒樓乘醉有雲鶴笙簫聲忽然輕舉於雲中擲下靴衫腰帶拍板冉冉而去出續神仙傳太平廣記卷二十二
