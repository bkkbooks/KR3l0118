body:
  text: 太平廣記卷一百九報應八沙門静生釋曇邃釋慧慶費氏趙泰釋慧進沙門法尚釋𢎞明釋志湛五侯寺僧釋智聰曇韻禪師李山龍蘇長尼法信李氏徹師悟真寺僧釋道俗史阿誓石壁寺僧沙門静生西晉蜀郡沙門静生出家以苦行致稱為蜀三賢寺主誦法華經每誦經時常感虎來蹲前聽誦訖乃去又恒見左右有四人為侍年雖衰老而精勤彌勵遂終其業云出法苑珠林釋曇邃晉有釋曇邃未詳何許人少出家止河陰白馬寺蔬食布衣誦法華經又釋達經㫖亦為人解説常於夜中忽聞扣戸云欲請法師九旬説法邃不許固請乃赴之而猶是睡中覺己身已在白馬島神祠中并一弟子日日宻往餘無知者後寺僧經祠前過見有兩髙座邃在北弟子在南如有講説聲又聞有竒香之氣於是道俗共傳神異至夏覺神送白馬一疋白羊五頭絹九十疋呪願畢於是遂絶出法苑珠林釋慧慶宋釋慧慶廣陵人出家止廬山寺學通經律清潔有戒行誦法華經十地思益維摩每夜吟誦常聞空中有彈指讚嘆之聲曾於大雷遇風濤船將覆沒慶惟誦經不輟覺船在浪中如有人牽之倐忽至岸於是篤勵彌復精勤矣出法苑珠林費氏宋羅璵妻費氏者寧蜀人父悦為寧州刺史費少而敬信誦法華經數年勤至不倦後得病忽苦心痛闔門惶懼屬纊待時費心念我誦經勤苦宜有善祐庶不遂致死也既而睡臥食頃而寤乃夢見佛於窻中援手以摩其心應時都愈一堂男女婢僕悉覩金光亦聞香氣璵從妺於時省疾牀前亦具聞見於是大興信悟䖍戒至終每以此端進化子姪焉出述異記趙泰趙泰字文和清河貝丘人公府辟不就精進典籍鄉黨稱名年三十五宋太始五年七月十三日夜半忽心痛而死心上微煖身體屈伸停屍十日氣從咽喉如雷鳴眼開索水飲飲訖便起説初死時有二人乗黄馬從兵二人但言捉將去二人扶兩腋東行不知幾里便見大城如錫鐵崔㟴從城西門入見官府舍有二重黑門數十梁瓦屋男女當五六十主吏著皁單衫將泰名在第三十須㬰將入府君西坐斷勘姓名復將南入黑門一人絳衣坐大屋下以次呼名前問生時所行事有何罪過行功徳作何善行言者各各不同主者言許汝等辭恒遣六師督録使者常在人間疏記人所作善惡以相檢校人死有三惡道殺生禱祠最重奉佛持五戒十善慈心布施生在福舍安穏無為泰答一無所為上不犯惡斷問都竟使為水官監作吏將千餘人接沙著岸上晝夜勤苦啼泣悔言生時不作善今墮在此處後轉水官都督總知諸獄事給馬東到地獄按行復到泥犂地獄男子六千人有火樹縱廣五十餘步髙千丈四邊皆有劒樹上然火其下十十五五墮火劒上貫其身體云此人呪咀罵詈奪人財物假傷良善泰見父母及一弟在此獄中涕泣見二人賫文書來敕獄吏言有三人其家事佛為有寺中懸幡盖燒香轉法華經呪願救解生時罪過出就福舍己見自然衣服往詣一門云開光大舍有三重黑門皆白壁赤柱此三人即入門見大殿珍寶耀日堂前有二獅子併伏象一金玉牀云名獅子之座見一大人身可長丈餘姿顔金色項有日光坐此牀上沙門立侍甚衆四坐名真人菩薩見泰山府君來作禮泰問吏何人吏曰此名佛天上天下度人之師便聞佛言今欲度此惡道中及諸地獄人皆令出應時云有萬九千人一時得出地獄即時見呼十人當上生天有車馬迎之升虚空而去復見一城云縱廣二百餘里名為受變形城云生來不聞道法而地獄考治已畢者當於此城受更變報入北門見數千百土屋中央有大瓦屋廣五十餘步下有五百餘吏對録人名作善惡事狀受是變身形之路從其所趨去殺者云當作蜉蝣蟲朝生夕死苦為人常短命偷盗者作猪羊身屠肉償人淫逸者作鵠鶩蛇身惡舌者作鴟鴞鵂鶹惡聲人聞皆呪令死抵債者為驢馬牛魚鱉之屬大屋下有地房北向一户南向呼從北户又出南户者皆變身形作鳥獸又見一城縱廣百里其瓦屋安居快樂云生時不作惡亦不為善當在鬼􅃐千歳得出為人又見一城廣有五千餘步名為地中罰謫者不堪苦痛男女五六萬皆祼形無服飢困相扶見泰叩頭啼哭泰按行畢還主者問地獄如法否卿無罪故相凂為水官都督不爾與獄中人無異泰問人生何以為樂主者言唯奉佛弟子精進不犯禁戒為樂耳又問未奉佛時罪過山積今奉佛法其過得除否曰皆除主者又召都録使者問趙泰何故死來使開縢檢年紀之籍云有筭三十年横為惡鬼所取今遣還家由是大小發意奉佛為祖及弟懸旛盖誦法華經作福也出幽㝠錄釋慧進前齊永明中揚都髙座寺釋慧進者少雄勇游俠年四十忽悟非常因出家蔬食布衣誓誦法華用心勞苦執卷便病乃發願造百部以悔先障始聚得一千六百文賊來索物進示經錢賊慙而退爾後遂成百部故病亦愈誦經既廣情願又滿迴此誦業願生安養聞空中告曰法願已足必得往生無病而卒八十餘矣出祥異記沙門法尚齊武帝時東山人掘土見一物狀如兩脣其中舌鮮紅赤色以事奏聞帝問道俗沙門法尚曰此持法華者亡相不壊也誦滿千遍其驗徵矣乃集持法華者圍繞誦經纔發聲其脣舌一時鼓動見者毛竪以事奏聞詔石函緘之出梁髙僧傳釋𢎞明齊釋𢎞明㑹稽山陰人也少出家貞苦有戒節止山陰雲門寺誦法華習禪定精勤禮懴六時不輟每旦則水瓶自滿實感諸天童子以為給使也每明坐禪虎常伏於室内出法苑珠林釋志湛後魏末齊州釋志湛者住太山北䆳谷中衘草寺省事少言人鳥不亂恆誦法華將終時神僧寶誌謂梁武帝曰北方衘草寺須陁洹聖僧今日滅度湛之亡也無惱而化兩手各舒一指有梵僧云斯初果人也還塟山中後發看之唯舌如故衆為立塔表焉出法苑珠林五侯寺僧後魏范陽五侯寺僧失其名誦法華為常業初死權殮隄下後改塟骸骨並枯唯舌不壊雍州有僧誦法華𨼆白鹿山感一童子供給及死置尸巖下餘骸並枯唯舌不朽出法苑珠林釋智聰唐潤州攝山棲霞寺釋智聰嘗住揚州安樂寺大業之亂思歸無計𨼆江荻中誦法華經七日不食恒有虎遶之聰曰吾命須㬰卿須可食虎忽發言曰造天立地無有此禮忽有一老翁榜舟而至翁曰師欲渡江至棲霞寺可即上船四虎一時淚流聰曰爾與我有緣耶於是挾四虎利涉既達南岸船及老人不知所在聰領四虎往棲霞舍利塔西經行坐禪衆徒八十咸不出院若有所事一虎入寺鳴號以為恆式聰至貞觀中遷化年九十九矣出唐髙僧傳曇韻禪師唐曇韻禪師定州人隋末喪亂𨼆於離石北山常誦法華欲寫其經無人同志如此積年忽有書生來詣之仍以寫經為請禪師大歡喜清旦食訖澡浴著浄衣入浄室受八戒口含旃檀燒香懸幡寂然抄寫至暮方出明復如初曾不告倦及繕寫畢乃至裝褫一如正法書生告去送至門忽失所在禪師持誦曾無暫廢後遭胡賊倉卒逃避方箱盛其經置髙岩上經年賊敗乃㝷經於岩下獲之巾箱糜爛應手灰滅撥朽見經如舊鮮好出法苑珠林李山龍唐李山龍馮翊人左監門校尉武徳中暴亡而心不冷家人未忍殯殮至七日而甦自説云當死時見被收錄至一官署甚廣大庭前有數千囚人枷鏁杻械皆北面立吏將山龍至庭㕔上大官坐髙牀侍衞如王者尋呼山龍至階王問汝平生作何福業山龍對曰鄉人每設齋恆請施物助之王曰汝身作何善業山龍曰誦法華經日兩卷王曰大善可升階來北間有髙座王曰可昇座誦經王即起立山龍坐訖王乃向之而坐山龍開經曰妙法蓮華經序品第一王曰請法師下山龍復立階下顧庭前囚已盡去矣王曰君誦經之福非唯自利衆囚聞經皆已獲免豈不善哉今放君還謂吏曰可將此人厯觀諸獄吏即引東行百餘步見一鐵城甚廣大城旁多小窗見諸男女從地飛入窗中即不復出山龍怪問之吏曰此是大地獄中有分隔罪計各隨本業赴獄受罪耳山龍聞之悲懼稱南無佛請吏求出院見有大鑊火猛湯沸旁有二人坐卧山龍問之二人曰我罪報入此鑊湯蒙賢者稱南無佛故獄中諸罪人皆得一日休息疲睡耳山龍又稱南無佛吏謂山龍曰官府數移改今王放君去可白王請抄若不爾恐他官不知更復追録山龍即謁王請抄王書一行字付吏曰為取五道等署吏受命將山龍更厯兩曹各㕔事侍衞亦如此吏皆請其官署各書一行訖付山龍出門有三人謂之曰王放君去各希多少見遺吏謂山龍曰彼三人者是前收錄使人一人以赤繩縛君者一人以棒擊君頭者一人以袋吸君氣者今見君還故來求乞山龍惶懼謝曰愚不識公請至家備物但不知何處送之三人曰於水邊古樹下燒之山龍諾吏送歸家見親眷哀哭經營殯具山龍至屍旁即甦曰以紙錢束帛并酒食自於水邊燒之忽見三人來謝曰媿君不失信重相贈遺言畢不見出㝠報記蘇長蘇長武徳中為巴州刺史赴任至嘉陵江風浪覆舟溺其家六十餘人唯一妾常讀法華經水入船中妾頭戴經函誓與俱溺隨波泛濫頃之著岸逐經函而出開視其經了無濕汚獨存其命出法苑珠林尼法信唐武徳時河東有練行尼法信常讀法華經訪工書者一人數倍酧直特為浄室令寫此經一起一浴然香更衣仍於寫經之室鑿壁通加一竹筒令寫經人每欲出息徑含竹筒吐氣壁外寫經七卷八年乃畢供養殷重盡其恭敬龍門僧法端嘗集大衆講法華經以此尼經本精定遣人請之尼固辭不許法端責讓之尼不得已乃自送付法端等開讀唯見黄紙了無文字更開餘卷悉皆如此法端等慚懼即送還尼尼悲泣受以香水洗函沐浴頂戴遶佛行道七日夜不暫休息既而開視文字如初故知抄寫深加潔浄比來無驗只為不勤敬也出㝠報記李氏唐冀州封丘縣有老母姓李年七十無子孤老唯有奴婢兩人鎮沽酒添灰少量分毫經紀貞觀年中因病死經兩日凶器已具但以心上少温及甦説云初有兩人並著赤衣門前召出云有上符遣追便即隨去行至一城有若州郭引到側院見一官人衣冠大袖凭案而坐左右甚多階下大有著枷鎻人防守如生官府者遣問老母何因行濫沽酒多取他物擬作法華經已向十年何為不造老母具言酒使婢作量亦是婢經已付錢一千文與𨼆師即遣追婢須㬰婢至即笞四十放還遣問𨼆師報云是實乃語老母云放汝七日去經了當來得生善處遂爾得活勘校老母初死之時婢得惡逆久而始蘇股皆青腫盖是四十杖迹𨼆禪師者本是客僧配寺頓丘年向六七十自從出家即頭陀乞食常一食齋未嘗暫輟逺近大徳並皆敬慕老母病死之夜𨼆師夢有赤衣人來問夢中答云造經是實老母乃屈鄉閭眷屬及𨼆禪師行道顧召經生衆手寫經了正當七日還見往者二人來前母曰使人已來並皆好住聲絶即死𨼆師見存道俗欽敬出㝠祥記徹師唐絳州南孤山𨼆泉寺沙門徹禪師曾行遇癩人在穴中徹師引出山中為鑿穴給食念誦法華經素不識字加又頑鄙句句授之終不辭倦誦經向半夢有教者後稍聰悟已得五六卷瘡漸覺愈一部了􅂡眉平復容色如故經云病之良藥斯言驗矣出㝠報拾遺悟真寺僧唐貞觀中有玉潤山悟真寺僧夜如藍溪忽聞有誦法華經者其聲纎逺時星月逈臨四望數十里閴然無覩其僧慘然有懼及至寺具白其事於羣僧明夕俱於藍溪聽之乃聞經聲自地中發於是以標表其所明日窮表下得一顱骨在積壤中其骨槁然獨唇吻與舌鮮而且潤遂持歸寺乃以石函置於千佛殿西軒下自是每夕常有誦法華經聲在石函中長安士女觀者千數後新羅僧客於寺僅歳餘一日寺僧盡下山獨新羅僧在遂竊石函而去寺僧跡其往已歸海東矣時開元末年也出宣室志釋道俗唐釋道俗者不測所由止醴泉山原誦法華經為業乃至遍數千貞觀中因疾將終告友人慧廓禪師曰此雖誦經意望有驗吾死之後當以十年為限試發視之若舌朽滅知誦無功若舌如初為起一塔庶生俗信言訖而終至十一年依言發之身肉都盡唯舌不朽一縣士女咸共讚歎乃函盛舌本起塔於甘谷岸上出法苑珠林史阿誓唐郊南福水之陰有史村史阿誓者誦法華經職充令史往還步涉未嘗乘騎以依經云哀愍一切故也病終本邑香氣充村道俗驚怪而莫測其緣終後十年其妻死乃發塚合𦵏見其舌根如本生肉斯誠轉誦法華之靈驗也出法苑珠林石壁寺僧唐并州石壁寺有一老僧禪誦為業精進練行貞觀末有鵒巢其房楹上哺養二鶵法師每有餘食恆就巢哺之鵒鶵後雖漸長羽翼未成因學飛俱墜地死僧收瘞之經旬後僧夜夢二小兒曰某等為先有小罪遂受鵒身比來日聞法師誦法華既聞妙法得受人身兒等今於此寺側十餘里某村姓名家託生為男十月之外當即誕育僧乃依期往視之見此家婦果同時誕育二子因為作滿月僧呼為鵒兒並應之曰唯出㝠報拾遺太平廣記卷一百九
