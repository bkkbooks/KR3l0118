  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_469-1a, image: WYG1046/WYG1046-0450c.png}
body:
  text: 太平廣記巻四百六十九宋李昉等編水族六魚張方鍾道晉安民劉萬年㣲生亮蘆塘彭城男子朱法公王奐蔡興李增蕭騰柳鎮隋文帝大興村萬頃陂長鬚國張方廣陵下市廟宋元嘉十八年張方女道香送其夫壻北行日暮宿祠門下夜有一物假作其壻来云離情難遣不能便去道香俄昏惑失常時有王纂者能治邪魅道香被魅請治之始下針有一獺從女被内走入前港道香疾便愈出異苑鍾道宋永興縣吏鍾道得重病初差情欲倍常先樂白鶴墟中女子至是猶存想焉忽見此女子振衣而来即與燕好是後數至道曰吾甚欲雞舌香女曰何難乃掬香滿手以授道道邀女同舎咀之女曰我氣素芳不假此女子出户狗忽見隨咋殺之乃是老獺口香即獺糞頓􅁴臭穢出幽明録晉安民晉安郡民斷溪取魚忽有一人著白帢黄練單衣来詣之即同飲饌饌畢語之曰明日取魚當有大魚甚異最在前慎勿殺明日果有大魚長七八丈逕来衝網其人即取殺之破腹見所食飯悉有其人家死亡略盡出廣古今五行記劉萬年宋後廢帝元徽三年京口戍將劉萬年夜廵於北固山西見二男子容止端麗潔白如玉遥呼萬年謂曰君與今帝姓族近逺萬年曰族異姓同一人曰汝雖族異恐禍来及萬年曰吾有何過答曰去位禍即不及萬年見二人所言益異之萬年謂二人深謝預聞何用見酧萬年欲請歸鎮二人曰吾非世人不食世物萬年與語之次化為魚飛入江去萬年翌日託疾遂罷其位後果如魚所言出江表異同録微生亮明月峽中有二溪東西流宋順帝昇平二年溪人微生亮釣得一白魚長三尺投置船中以草覆之及歸取烹見一美女在草下潔白端麗年可十六七自言髙唐之女偶化魚游為君所得亮問曰既為人能為妻否女曰㝠契使然何為不得其後三年為亮妻忽曰數已足矣請歸髙唐亮曰何時復来答曰情不可忘者有思復至其後一歲三四往来不知所終出三峽記蘆塘耒陽縣東北有蘆塘八九頃其深不可測中有大魚常至五日一奮躍出水大可三圍其狀異常每出水則小魚奔迸隨水上岸不可勝計又云此塘有鮫魚五日一化或為美婦人或為美男子至於變亂尤多郡人相戒故不敢有害心後為雷電所擊此塘遂乾出録異記彭城男子彭城有男子娶婦不悦之在外宿月餘日婦曰何故不復入男曰汝夜輒出我故不入婦曰我初不出壻驚婦云君自有異志當為他所惑耳後有至者君便抱留之索火照視之為何物後所願還至故作其婦前却未入有一人從後推令前既上牀壻捉之曰夜夜出何為婦曰君與東舎女往来而驚欲託鬼魅以前約相掩耳壻放之與共卧夜半心悟乃計曰魅迷人非是我婦也乃向前攬捉大呼求火稍稍縮小發而視之得一鯉魚長二尺出列異傳朱法公山隂朱法公者嘗出行憇於臺城東橘𣗳下忽有女子年可十六七形甚端麗薄晩遣婢與法公相聞方夕欲詣宿至人定後乃來自稱姓檀住在城側因共眠寢至曉而去明日復来如此數夜每曉去婢輒来迎復有男子可六七歲端麗可愛女云是其弟後曉去女衣裙開見龜尾及龜脚法公方悟是魅欲執之向夕復来即然火照覓尋失所在出續異記王奐齊王奐自建業將之渚宫至江州泊舟於岸夜深風生月瑩忽聞前洲上有十餘人喧噪皆女子之音奐異之謂諸人曰江渚中豈有是人也乃獨棹小舟取葭蘆之隂循洲北岸而於藂葦中見十餘女子或衣緑或衣青碧半坐半立坐者一女子泣而言曰我始與姊妹同居隂宅長在江漢不意諸娘許為上峽小兒所娶乃至分離立者一女子嘆曰湖水有廻而我此去應無返日言未竟北風微起立者曰潮至矣可以還家奐急從蘆葦中出捕悉化為龜入水而去出九江記蔡興晉陵民蔡興忽得狂疾歌吟不恒常空中與數人言笑或云當再取誰女復一人云家已多後夜忽聞十餘人將物入里人劉餘之家餘之拔刀出後户見一人黑色大罵曰我湖長来詣汝而欲殺我即喚羣伴何不助余􅁘餘之即奮刀亂砍得一大鼉及狸出幽明録李増永陽人李増行經大溪見二蛟浮於水上發矢射之一蛟中焉増歸因復出市有女子素服銜涙捉所射箭増怪而問焉女答之何用問焉為暴若是便以相還授矢而滅増惡而驟走未逹家暴死於路出異苑蕭騰襄陽金城南門外道東有參佐􅇬舊傳甚凶往者不死必病梁昭明太子臨州給府寮呂休蒨休蒨常在㕔事北頭眠鬼牽休蒨休蒨墜地乆之悟俄而休蒨有罪賜死後今蕭騰初上至羊口岸忽有一丈夫著白紗髙室㡌烏布袴披袍造騰疑其服異拒之行數里復至求寄載騰轉疑焉如此數廻而騰有妓妾數人舉止所為稍異常日歌笑悲啼無復恒節及騰至襄陽此人亦經日一来後累辰不去好披袍縛袴跨狗而行或變易俄頃詠詩歌謡言笑自若自稱是周瑜恒止騰舎騰備為禳遣之術有時暫去尋復来騰又領門生二十人拔刀砍之或跳上室梁走入林中来往迅速竟不可得乃入妾屏風裏作歌曰逢歡羊口岸結愛桃林津胡桃擲去肉訝汝不識人頃之有道士趙曇義為騰設壇置醮行禁自道士入門諸妾並悲呌若將遠别俄而一龜徑尺餘自到壇而死諸妾亦差騰妾聲貎悉不佳諮議叅軍韋言辨善戲謔因宴而啓云常聞世間人道􅃛如鬼今見鬼定是癡鬼若􅃛不應魅蕭騰故以此而度足驗鬼癡出南雍州記柳鎮河東柳鎮字子元少樂閒静不慕榮貴梁天監中自司州遊上元便愛其風景於鍾山之西建業里買地結茅開泉種植𨼆操如耕父者其左右居民皆呼為柳父所居臨江水嘗曳䇿臨眺忽見前洲上有三四小兒皆長一尺許往来遊戲遥聞相呼求食聲鎮異之須臾風濤洶湧有大魚驚躍誤墜洲上羣小兒争前食之又聞小兒傳呼云雖食不盡留與柳父鎮益驚駭乃乘小舟逕捕之未及岸諸小兒悉化為獺入水而去鎮取巨魚以分鄉里未幾北還洛陽於所居書齋柱題詩一首云江山不乆計要適暫時心况念洛陽士今来歸舊林是嵗天監七年也出窮怪記隋文帝隋文帝開皇中掖庭宫每有人来挑宫人司宫以聞帝曰門衛甚嚴人從何而入當怪精耳因戒宫人曰若来但砍之其後夜来登牀宫人抽刀砍之若中枯骨其物走落宫人逐之因入池而没明日帝令涸池得一龜尺餘其上有刀㾗殺之遂絶出廣古今五行記大興村隋開皇末大興城西南村民設佛㑹一老翁皓首白裙襦求食而去衆莫識追而觀之行二里許遂不見但有一陂水中有白魚長丈餘小而從者無數人争射之或弓折弦斷後竟中之割其腹得秔米飯後數日漕梁暴溢射者家皆溺死出廣古今五行記萬頃陂唐齊州有萬頃陂魚鼈水族無所不有咸亨中忽一僧持鉢乞食村人長者施以蔬供食訖而去於時漁人網得一魚長六七尺緝鱗鏤甲錦質寳章特異常魚欲齎赴州餉遺至村而死遂共剖而分之於腹中得長者所施蔬食儼然并在村人遂於陂中設齋過度自是陂中無水族至今猶然絶出朝野僉載長􅂡國唐大定初有士人隨新羅使風吹至一處人皆長􅂡語與唐言通號長􅂡國人物甚盛棟宇衣冠稍異中國地曰扶桑洲其署官品有正長戢波日没島邏等號士人歴謁數處其國皆敬之忽一日有車馬數十言大王召客行兩日方至一大城甲士門焉使者導士人入伏謁殿宇髙厰儀衛如王者見士人拜伏小起乃拜士人為司風長兼駙馬其主甚美有􅂡數十根士人威勢烜爀富有珠玉然每歸見其妻則不悦其王多月滿夜則大㑹後遇㑹士人見嬪􅁎悉有􅂡因賦詩曰花無葉不妍女無􅂡亦醜丈人試遣惣無未必不如惣有王大笑曰駙馬竟未能忘情於小女頤頷間乎經十餘年士人有一兒二女忽一日其君臣憂蹙士人怪問之王泣曰吾國有難禍在旦夕非駙馬不能救士人驚曰茍難可弭性命不敢辭也王乃令具舟令兩使隨士人謂曰煩駙馬一謁海龍王但言東海第三􅆜第七島長􅂡國有難求救我國絶微須再三言之因涕泣執手而别士人登舟瞬息至岸岸沙悉七寳人皆衣冠長大士人乃前求謁龍王龍宫狀如佛寺所圖天宫光明迭激目不能視龍王降階迎士人齊級昇殿訪其来意士人具説龍王即命速勘良乆一人自外白境内並無此國士人復哀祈具言長􅂡國在東海第三􅆜第七島龍王復叱使者細尋勘速報經食頃使者返曰此島鰕合供大王此月食料前日已追到龍王笑曰客固為鰕所魅耳吾雖為王所食皆禀天符不得妄食今為客減食乃令引客視之見鐵鑊數十如屋滿中是鰕有五六頭色赤大如臂見客跳躍似求救狀引者曰此鰕王也士人不􅁴悲泣龍王命放鰕王一鑊令二使送客歸中國一夕至登州顧二使乃巨龍也出酉陽雜爼太平廣記卷四百六十九
