body:
  text: 太平廣記卷二百六十三無賴一劉誡之宗𤣥成孟神爽飛騎席人韓令珪李宏長孫昕張易之兄弟劉懷恩宋之愻張幹等彭先覺張徳士子吞舍利劉子振荆州鬻劄者劉誡之唐天授年彭城劉誡之粗險不調髙言庳語凌上忽下恐嚇財物口無闗鑰妄説妖災從萬年縣尉常彦瑋索錢一百干云我是劉果毅當與富貴彦瑋進狀告之上令二給使先入彦瑋房中下簾坐牕下聽之有頃誡之及盧千仭至於㕔上坐談話彦瑋引之説國家長短無所忌諱給使一一紙筆抄之以進上怒令金吾捕捉親問之具承遂腰斬誡之千仞處絞授彦瑋侍御史出朝野僉載宗𤣥成唐老三衛宗𤣥成邢州南和人祖齊黄門侍郎𤣥成性粗猛禀氣兇豪凌轢鄉村横行州縣紀王為邢州刺史𤣥成與之抗行李備為南和令聞之每䧏階引接分庭抗禮務在招延養成其惡屬河朔失稔開倉賑給𤣥成依勢作威鄉墅强乞粟一石備與客對不命𤣥成乃門外揚聲奮背直入備集門内典正一百餘人舉牒推窮强乞是實初令項上著鏁後却鏁上著枷文案既周且决六十杖下氣絶無敢言者出朝野僉載孟神爽孟神爽揚州人禀性狼戾執心鴆毒廵市索物應聲即來入邸須錢隨口而至長史縣令髙揖待之丞尉判司頷之而已張潛為揚州刺史聞其暴亂遣江都縣令店上捉來拖入府門髙聲唱速付法曹李廣業推鞫宻事並虚准敕决百杖下卒出朝野僉載飛騎席人則天之廢廬陵也飛騎十餘人於客户坊同飲有一人曰早知今日無功賞不如扶竪廬陵席上一人起出北門進狀告之席未散並擒送羽林鞫問皆實告者授五品言者斬自餘知反不告坐絞出朝野僉載韓令珪周令史韓令珪耐羞耻厚貌强梁王公貴人皆呼次第平生未面亦强干之曾選於陸元方下引銓時舍人王勮奪情與陸同㕔而坐珪佯驚曰未見王五勮便降階憫然令珪嚬眉蹙刺相慰而去陸與王有舊對面留住問勮是誰莫之識也後嚇人事敗於朝堂决杖遙呼河内王曰大哥何不相救懿宗目之曰我不識汝催杖苦鞭杖下取死出朝野僉載李宏唐李宏汴州浚儀人也兇悖無賴狼戾不仁每髙鞍壯馬廵坊歴店嚇庸調租船綱典動盈數百貫强貸商人巨萬竟無一還商旅驚波行綱側胆任正理為汴州刺史上十餘日遣手力捉來責情决六十杖下而死工商客生酣飲相歡逺近聞之莫不稱快出朝野僉載長孫昕唐長孫昕皇后之妹夫與妻表兄楊仙玉乗馬二十餘騎並列𤓰撾於街中行御史大夫李傑在坊内參姨母僮僕在門外昕與仙郎使奴打傑左右傑出來併波按頓須臾金吾及萬元縣官並到送縣禁之昕妻父王開府將二百萬騎刼昕等去傑與金吾萬年以狀聞上奉敕㫁昕殺積杖至數百而卒出朝野僉載張易之兄弟張易之兄弟驕貴强奪莊宅奴婢姬妾不可勝數昌儀於萬年縣街内行逢一女人壻抱兒相逐昌儀馬鞭撥其頭巾女婦罵之昌儀顧謂奴曰横䭾將來壻投匭三四狀並不出昌儀捉送萬年縣誣以他罪决死之昌儀常謂人曰丈夫當如此今時千人推我不能倒及其敗也萬人擎我不能起俄而事敗兄弟俱斬出朝野僉載權懐恩唐邢州刺史權懐恩無賴除洛州長史州差參軍劉犬子迎至懐州路次拜懐恩突過不與語步趁二百餘歩亦不遣乗馬犬子覺不似乃自上馬馳之至州令脫靴訖謂曰洛州幾箇參軍對曰正員六人員外一人懐恩曰何得有員外對曰餘一員遣為長史脫靴懐恩驚曰君誰家兒對曰阿父為僕射懐恩憮然而去僕射劉仁􅁤謂曰公草裏刺史至神州不可以造次參軍雖卑微豈可令脫靴􅁘懐恩慙請假不復出旬日為益州刺史出朝野僉載宋之愻唐洛陽丞宋之愻太常主簿之問弟羅織殺駙馬王同皎初之愻謟附張易之兄弟出為兖州司倉遂亡而歸王同皎匿之於小房同皎慷慨之士也忿逆韋與武三思亂國與一二所見言之毎至切齒之愻於簾下竊聽之遣姪曇上書告之以希韋之㫖武三思等果大怒奏誅同皎之黨兄弟並授五品官之愻為光禄丞之問為鴻臚丞曇為尚衣奉御天下怨之皆相謂曰之問等緋衫王同皎血染也誅逆韋之後之愻等長流嶺南客謂浮休子曰來俊臣之徒如何對曰昔有獅子王於深山獲一豺將食之豺曰請為王送二鹿以自贖獅子王喜周年之後無可送王曰汝殺衆生亦已多今次到汝汝其圖之豺黙然無應遂齚殺之俊臣之輩何異豺也出朝野僉載張幹等上都市肆惡少率髠而膚劄備衆物形狀恃諸軍張拳强劫至有以虵售酒捉羊甲擊人者京兆尹薛元賞上三日令里長潛捕約三十餘人悉杖棄屍於市市人有㸃青者皆炙滅之時大寜坊力者張幹劄左􅈩曰生不怕京兆尹右􅈩曰死不畏閻羅王又有王力奴以錢五千召劄工于胸腹為山亭院池樹草木鳥獸無不悉具細若設色公悉杖殺之又賊趙武建劄一百六處番印盤鵲等右􅈩刺言野雞灘頭宿朝朝被鶻捎忽驚飛入水留命到今朝又髙陵縣捉得鏤身者宋元素劄七十一處刺左臂曰昔日已前家未貧千金不惜結交親及至栖惶覓知己行盡闗山無一人右膞上劄瓠蘆上劄出人首如傀儡戲有郭公者縣吏不􅄙問之言胡蘆精也出酉陽雜俎彭先覺周御史彭先覺無面目如意年中㫁屠極急先覺知廵事定鼎門草車翻得两羫羊門卒告御史先覺進狀奏請合宫尉劉緬専當屠不覺察决一頓杖肉付南衙官人食緬惶恐縫新褌待罪明日則天批曰御史彭先覺奏決劉緬不須其肉乞緬喫却舉朝稱快先覺於是乎慙出朝野僉載張徳周長夀中㫁屠極切左拾遗張徳妻誕一男私宰一口羊宴客其日命諸遗補杜肅私嚢一餤肉進狀告之至明日在朝前則天謂張徳曰卿妻誕一男大歡喜徳拜謝則天又謂曰然何處得肉徳叩頭稱死罪則天曰朕㫁屠吉凶不預卿命客亦須擇交無賴之人不須共聚集出肅狀以示之肅流汗浹背舉朝唾其面闕士子吞舍利唐洛中頃年有僧以數粒所謂舍利者貯於瑠璃器中晝夜香火檀越之禮日無虛焉有士子迫於寒餒因請僧願得舍利掌而觀之僧遂出瓶授與遽即吞之僧惶駭如狂復慮聞之於外士子曰與吾幾錢當服藥出之僧喜聞遂贈二百緡乃服巴豆下瀉僧洗濯而收之出尚書故事劉子振劉子振蒲人頗富厚業而不知大體尤好凌轢同道詆訐公卿不耻干索州縣稍不如意立致寒暑以至就試明庭稠人廣衆罕有與立談者劉允章知舉嵗患舉子納卷繁多榜云納卷不得過三卷子振納四十軸因之大掇凶譽荆州鬻劄者荆州貞元中市中有鬻劄者有印上簇針為衆物狀如蟾蝎鳥獸隨人所欲一印之刷以石墨瘡愈後細於隨永印出酉陽雜俎太平廣記卷二百六十三
