body:
  text: 太平廣記卷三十一神仙三十一李遐周許老翁李珏章全素李遐周李遐周者頗有道術唐開元中嘗召入禁中後求出住𤣥都觀唐宰相李林甫嘗往謁之遐周謂曰公存則家泰殁則家亡林甫拜泣求其救解笑而不答曰戲之耳天寳末禄山豪横跋扈逺近憂之而上意未寤一旦遐周𨼆去不知所之但於其所居壁上題詩數章言禄山僭竊及幸蜀之事時人莫曉後方驗之其末篇曰燕市人皆去函關馬不歸若逢山下鬼環上繫羅衣燕市人皆去禄山悉幽薊之衆而起也函關馬不歸者哥舒翰潼關之敗疋馬不還也若逢山下鬼者馬嵬蜀中驛名也環上繫羅衣者貴妃小字玉環馬嵬時髙力士以羅巾縊之也其所先見皆此類矣出明皇雜録許老翁許老翁者不知何許人也𨼆於峨眉山不知年代唐天寳中益州士曹柳某妻李氏容色絶代時節度使章仇兼瓊新得吐番安戎城差栁送物至城所三嵗不復命李在官舍重門未啓忽有裴兵曹詣門云是李之中表丈人李云無裴家親門不令啓裴因言李小名兼説其中外氏族李方令開門致拜因欲飡裴人質甚雅因問栁郎去幾時答云已三載矣裴云三載義絶古人所言今欲如何且丈人與子業因合為伉儷願無拒此而竟為裴丈所迷似不由人可否也裴兵曹者亦既娶矣而章仇公聞李姿美欲窺覘之乃令夫人特設筵㑹屈府縣之妻罔不畢集唯李以夫壻在遠辭焉章仇妻以須必見乃云但來無苦推辭李懼責遂行着黄羅銀泥裙五暈羅銀泥衫子单絲羅紅地銀泥帔子蓋益都之盛服也裴顧衣而歎曰世間之服華麗止此耳廻謂小僕可歸開箱取第三衣來李云不與第一而與第三何也裴曰第三已非人世所有矣須臾衣至異香滿室裴再眎笑謂小僕曰衣服當須爾耶若章仇何知但恐許老翁知耳乃登車詣節度家既入夫人屏座客悉皆降階致禮李既服天衣貌更殊異觀者愛之坐定夫人令白章仇曰士曹之妻容飾絶代章仇徑來入院戒衆勿起見李服色歎息數四乃借帔觀之則知非人間物試之水火亦不焚汚因留詰之李具陳本末使人至裴居處則不見矣兼瓊乃易其衣而進并奏許老翁之事􅃯令以計須求許老章仇意疑仙者往來必在藥肆因令藥師候其出處居四日得之初有小童詣肆市藥藥師意是其徒乃以惡藥與之小童往而復來且囑云大人怒藥不佳欲見捶撻因問大人為誰童子云許老翁也藥師甚喜引童白府章仇令勁徤百人卒吏五十人隨童詣山且申􅃯令山峯巉絶衆莫能上童乃自下大呼須臾老翁出石壁上問何故領爾許人來童具白其事老翁問童曷不來童曷不來童遂冉冉躡虚而上諸吏叩頭求哀云大夫之暴翁所知也老翁乃許行謂諸吏曰君但返府我隨至及吏卒至府未久而翁亦至焉章仇見之再拜俯伏翁無敬色因問娶李者是誰翁曰此是上元夫人衣庫之官俗情未盡耳章仇求老翁詣帝許云往亦不難乃與奏事者尅期至長安先期而至有詔引見𤣥宗致禮甚恭既坐問云庫官有罪天上知否翁云已被流作人間一國主矣又問衣竟何如許云設席施衣於清淨之所當有人來取上􅃯人如其言初不見人但有旋風捲衣入雲顧盼之間亦失許翁所在矣出仙傳拾遺又一説云天寳中有士人崔姓者尉於巴蜀纔至成都而卒時連帥章仇兼瓊哀其妻少而無所投止因於青城山下置一别墅又以其色美有聘納之意計無所出因謂其夫人曰貴為諸侯妻何不盛陳盤筵邀召女客五百里内盡可迎致夫人甚悦兼瓊因命衙官遍報五百里内女即尅日㑹成都意欲因㑹便留亡尉妻也不謂己為族舅盧生納之矣盧舅密知兼瓊意令尉妻辭疾不行兼瓊大怒促左右百騎往收捕盧舅時方食兵騎繞宅已合盧談笑自若殊不介懷食訖謂妻曰兼瓊意可知矣夫人不可不行少頃即當送素色衣來便可服之而往言訖乘騾出門兵騎前􅄃不得徐徐而去追不能及俄使一小童捧箱内有故青裙白衫子緑帔子緋羅縠絹素皆非世人所有尉妻服之至成都諸女郎皆先期而至兼瓊覘於帷下及尉妻入光彩遶身美色傍射不可正視坐者皆攝氣不覺起拜㑹訖歸三日而卒兼瓊大駭具狀奏聞𤣥宗問張果果云知之不敢言請問青城王老𤣥宗即詔兼瓊求訪王老進之兼瓊搜索青城山前後並無此人唯草市藥肆云常有二人日來賣藥稱王老所使二人至兼瓊即令衙官隨之入山數里至一草堂王老皤然􅁂髮𨼆几危坐衙官隨入遂宣詔兼致兼瓊意王老曰此必多言小兒張果也因與兼瓊尅期到京師令先發表不肯乘傳兼瓊從之使纔至銀臺王老亦到𤣥宗即召問之時張果猶在𤣥宗側見王老惶恐再拜王老叱果曰小子何不言之又遣逺取吾來果言小仙不敢專候仙伯言耳王老乃奏曰盧二舅即太元夫人庫子因假下遊以亡尉妻微有仙骨故納為媵無何盜太元夫人衣服與着已受謫至重今為鬱單天子矣亡尉妻以衣太元夫人衣服墮無間獄矣奏訖苦不願留𤣥宗命放還後不知所在出𤣥恠録李珏李珏廣陵江陽人也世居城市販糴自業而珏性端謹異於常軰年十五時父適他行以珏專販事人有糴者與糴珏即授以升斗俾令自量不計時之貴賤一斗只求二文利以資父母嵗月既深衣食甚豐父恠而問之具以實對父曰吾之所業同流中無不用出入升斗出輕入重以規厚利雖官司以春秋較推終莫斷其弊吾但以升斗出入皆用之自以無偏久矣汝今更出入任之自量吾不可及也然衣食豐給豈非神明之助耶後父母殁及珏年八十餘不改其業適李珏出相節制淮南珏以新節度使同姓名極用自驚乃改名寛李珏下車後數月修道齋次夜夢入洞府中見景色正春烟花爛熳翔鸞舞鶴綵雲瑞霞樓閣連延珏獨步其下見石壁光瑩填金書字列人姓名似有李珏字長二尺餘珏視之極喜自謂生於明代久厯顯官又昇宰輔能無功徳及於天下今洞府有名我必仙人也再三為喜方喜之際有二仙童自石壁左右出珏問此何所也曰華陽洞天此姓名非相公也珏驚復問非珏何人也仙童曰此相公江陽部民也珏及曉厯記前事益自驚嘆問於道士無有知者復思試召江陽官屬詰之亦莫知也乃令府城内求訪同姓名者數日軍營里巷相推乃得李寛舊名珏遂聞於珏乃以車轝迎之置於静室齋沐拜謁謂為道兄一家敬事朝夕叅禮李情景恬澹道貌秀異鬚長尺餘皓然可愛年十六時曾有道士教其胎息亦久不食珏愈敬之及月餘乃問曰道兄平生得何道術服鍊何藥珏曾夢入洞府見石壁姓名仙童所指是以迎請師事願以相授寛辭以不知道術服鍊之事珏復䖍拜因問寛所修何術寛辭以愚民不知所修遂具販糴以對珏再三審問咨嗟曰此常人之難事隂功不可及也復曰乃知世之動静食息莫不有報茍積徳雖在貧賤神明䕶祐名書仙籍以警塵俗又問胎息不食之由具以對珏師其胎息亦不食寛年百餘嵗輕徤異常忽吿子孫曰吾寄世多年雖自養氣亦無益汝輩一夕而卒三日棺裂聲視之衣帶不解如蟬蜕已尸􅄙矣出續仙傳章全素吳郡蔣生好神仙弱嵗棄家𨼆四明山下嘗從道士學鍊丹遂葺鑪鼎㸑薪皷鞴積十年而鍊丹卒不成其後寓遊荆門見有行乞於市者膚甚顇躶然而病且寒噤不能語生憐其窮因解裘衣之因命執侍左右徵其家對曰楚人章氏子全素其名家於南昌有沃田數百畆屬年饑流徙荆江間且十年矣田歸於官身病不能自振幸君子憐而容焉於是與蔣生同歸四明山下而全素甚惰常旦寐自逸蔣生惡罵而捶者不可計生有石硯在几上忽一日全素白蔣生曰先生好神仙者學鍊丹且久矣夫仙丹食之則骨化為金如是安有不長生耶今先生神丹能化石硯為金乎若然者吾謂先生有道術士生自度不果心甚慚而以他詞拒之曰汝傭者豈能知神仙事乎若妄言自速笞罵之辱全素笑而去後月餘全素於衣中出一瓢甚小顧謂蔣生曰此瓢中有仙丹能化石為金願得先生石硯以一刀圭傅其上可乎蔣生性輕果且以為誕妄詬罵曰吾學鍊丹十年矣尚未能窮其妙傭者何敢與吾喋喋議語耶全素佯懼不對明日蔣生獨行山水間命全素守舍於是鍵其門而去至晚歸則見全素已卒矣生乃以簀蔽其尸將命棺而瘞於野及徹其簀而全素尸已亡去徒有冠帶衣履存焉生大異且以為神仙得道者即於几上視石硯亦亡矣生益異之後一日蔣生見藥鼎下有光生曰豈非吾仙丹乎即於燼中探之得石硯其上寸餘化為紫金光甚瑩徹蓋全素仙丹之所化也生始悟全素果仙人獨恨不能識益自慚恚其後蔣生學鍊丹卒不成竟死於四明山出宣室志太平廣記卷三十一
