body:
  text: 太平廣記卷一百八十一貢舉四李逢吉章孝標劉軻崔羣李翺女賀拔惎李宗閔庾承宣張祐盧求杜牧劉蕡薛保遜賈島畢諴裴徳融裴思謙李肱蘇景徹張元夫李逢吉元和十一年嵗在丙申李逢吉下三十三人皆取寒素時有語曰元和天子丙申年三十三人同得仙袍似爛銀文似錦相將白日上青天李徳裕頗為寒進開路及謫官南去或有詩曰八百孤寒齊下淚一時迴首望崖州出摭言章孝標章孝標元和十三年下第時輩多為詩以刺主司獨章為歸燕詩畱獻侍郎庾承宣承宣得詩展轉吟諷誠恨遺才仍候秋期必當薦引庾果重典禮章孝標來年擢第羣議以為二十八字而致大科則名路可遵逓相礱礪也詩曰舊壘危巢泥已落今年故向社前歸連雲大厦無棲處更傍誰家門戸飛出雲溪友議劉軻劉軻慕孟軻為人故以名焉少為僧止於豫章髙安之果園後復求黄老之術𨼆於廬山既而進士登第文章與韓栁齊名出摭言崔羣崔羣元和自中書舎人知貢舉夫人李氏因暇嘗勸樹莊田以為子孫之業笑曰予有三十所美莊良田遍在天下夫人何憂夫人曰不聞君有此業羣曰吾前嵗放春牓三十人豈非良田邪夫人曰若然者君非陸相門生乎曰然夫人曰徃年君掌文柄使人約其子簡禮不令就試如君以為良田即陸氏一莊荒矣羣慙而退累日不食出獨異志李翺女李翺江淮典郡有進士盧儲投卷翺禮待之置文卷几案間因出視事長女及笄閑步鈴閣前見文卷尋繹數四謂小青衣曰此人必為狀頭迨公退李聞之深異其語乃令賔佐至郵舍具白於盧選以為壻盧謙讓久之終不却其意越月隨計來年果狀頭及第纔過闗試徑赴嘉禮催粧詩曰昔年將去玉京逰第一仙人許狀頭今日幸為秦晉㑹早教鸞鳯下粧樓後盧止官舎迎内子有庭花開乃題曰芍藥斬新栽當庭數朶開東風與拘束畱待細君來信人生前定固非偶然耳出抒情詩賀拔惎王起長慶中再主文柄志欲以白敏中為狀元病其人與賀拔惎還徃惎有文而落拓因密令親知申意俾敏中與惎絶前人復約敏中忻然皆如所教既而惎造門左右紿以敏中他適惎遲畱不言而去俄頃敏中躍出連呼左右惎於是悉以實告乃曰一第何門不致奈輕負至交相與盡醉負陽而寢前人覩之大怒而去告於起且云不可必矣起曰我比秪得白敏中今當更取賀拔惎矣出摭言李宗閔李宗閔知貢舉門生多清秀俊茂唐伸薛庠𡊮都輩時謂之玉筍班出因話錄庾承宣庾承宣主文後六七年方授金紫時門生李石先於内庭恩賜矣承宣拜命之初石以所服紫袍金魚拜獻座主出摭言張祐張祐元和長慶中深為令狐楚所知楚鎮天平日自草薦表令以新舊格詩三百篇隨表進獻辭略曰凡制五言合苞六義近多放誕靡有宗師前件人久在江湖早攻篇什研㡬甚苦捜相頗深流輩所推風格罕及謹令錄新舊格詩三百首自光順門進獻望請宣付中書祐至京師方屬元稹在内庭上因召問祐之詞藻髙下稹對曰張祐雕蟲小巧壯夫恥不為者或奬激之恐變陛下風教上頷之由是失意而歸祐以詩自悼曰賀知章口徒勞說孟浩然身不更疑出摭言盧求楊嗣復第二牓盧求者李翺之子壻先是翺典合淝郡有一道人詣翺言事甚異翺後任楚州或曰桂州其人復至其年嗣復知舉求落第嗣復翺之妹壻由是頗以為嫌因訪於道人言曰細事亦可為奏章一通几硯紙筆復置醇酎數㪷於側其人以巨杯引滿而飲寢少頃而覺覺而復飲酒盡即整衣冠北望而拜遽對案手疏二緘遲明授翺曰今秋有主司且開小卷明年見牓開大卷翺如所教尋報至嗣復依前主文即開小卷詞云裴頭黄尾三求六李翺竒之遂寄嗣復已有所貯彼疑漏泄及放牓開大卷乃一牓煥然不差一字其年裴求為狀元黄駕居榜末次則盧求耳餘皆契合後翺領襄陽其人又至翺愈敬異之謂翶曰鄙人再來葢仰公之政也因命出諸子熟視皆曰不繼翶之所得遂遣諸女出拜之乃曰尚書他日外孫三人皆位至宰輔後求子􅂝鄭亞子畋杜審權子讓能皆為將相出摭言杜牧崔郾侍郎既拜命於東郡試舉人三署公卿皆祖於長樂傳舍冠葢之盛罕有加也時吴武陵任太學博士䇿蹇而至郾聞其來㣲訝之乃離席與言武陵曰侍郎以峻徳偉望為明天子𨕖才俊武陵敢不薄施塵露向者偶見太學生數十輩揚眉抵掌讀一卷文書就而觀之乃進士杜牧阿房宫賦若其人真王佐才也侍郎官重恐未暇披覽於是縉笏朗宣一遍郾大竒之武陵請曰侍郎與狀頭郾曰已有人武陵曰不然則第三人郾曰亦有人武陵曰不得已即第五人郾未遑對武陵曰不爾却請此賦郾應聲曰敬依所教既即席白諸公曰適吴太學以第五人見惠或曰為誰曰杜牧衆中有以杜不拘細行間之者郾曰已許吴君牧雖屠狗不能易也崔郾東都放榜西都過堂杜紫㣲詩曰東都放榜未花開三十三人走馬迴秦地少年多釀酒即將春色入闗來出摭言劉蕡太和二年裴休等二十三人登制科時劉蕡對䇿萬餘字深究治亂之本又多引春秋大義雖公孫𢎞董仲舒不􅀎肩也自休已下靡不斂袵然以指斥貴倖不顧忌諱有司知而不取時登科人李邵詣闕進疏請以己之所得易蕡之所失疏奏留中蕡朞月之間屈聲播于天下出摭言劉蕡楊嗣復之門生也以直言忤時中官尤所嫉怒中尉仇士良謂嗣復曰奈何以國家科第放此風漢耶嗣復懼答曰嗣復昔與蕡及第時猶未風耳出玉泉子薛保遜薛保遜好行巨編自號金剛杵太和中貢士不下千餘人公卿之門卷軸填委為閽媪脂燭之費因之平易者曰若薛保遜卷即所得倍於常也出摭言賈島賈島不善程試毎試自疊一幅巡鋪告人曰原夫之輩乞一聨乞一聨出摭言畢諴畢諴及第年與一二人同行聽響卜夜艾人稀久無所聞俄遇人投骨于地羣犬争趨又一人曰後來者必銜得出摭言裴徳融裴徳融諱臯值髙鍇知舉入試主司曰伊諱臯某某下就試與及第困一生事後除屯田員外郎將盧簡求為右丞裴與除郎官一人同參到宅右丞先屈前一人入従容多時前人啓云某與新除屯田裴員外同祗候右丞裴員外在門外多時盧遽使驅使官𫝊語曰員外是何人下及第偶有事不得奉見裴倉皇失措騎前人馬出門去出盧氏雜說裴思謙髙鍇第一牓裴思謙以仇士良闗節取狀頭鍇庭譴之思謙迴顧厲聲曰明年打春取狀頭第二年鍇知舉誡門下不得受書題思謙自懐士良一緘入貢院既而易以紫衣趨至堦下白鍇曰軍容有狀薦裴思謙秀才鍇不得已遂接之書中與思謙求巍峩鍇曰狀元已有人此外可副軍容詣思謙曰卑吏面奉軍容處分裴秀才非狀元請侍郎不放鍇俯首良久曰然則略要見裴學士思謙曰卑吏便是思謙人物堂堂鍇見之改容不得已遂従之出摭言李肱開成元年秋髙鍇復司貢籍上曰夫宗子維城本支百代封爵使宜無令廢絶常年宗正寺解送人恐有浮薄以忝科名在卿精揀藝能勿妨賢路其所試賦則准常規詩則依齊梁體格乃試琴瑟合奏賦霓裳羽衣曲詩主司先進五人詩其最佳者李肱次則王收日斜見賦則文𨕖中雪月賦也况肱宗室徳行素明人才俱美敢不公心以辜聖教乃以牓元及第霓裳羽衣曲詩李肱云開元太平時萬國賀豐嵗梨園獻舊曲玉座流新製鳯管遞參差霞衣統搖曳醼罷水殿空輦餘春草細􅅫壺事已久仙樂功無替詎肯聽遺音聖明知善繼上覽之曰近屬如肱者其不忝乎有劉安之識可令著書執馬孚之正可以為𫝊秦嬴統天下子弟同匹夫根本之不深固曹冏曷不非也出雲溪友議蘇景徹張元夫太和中蘇景徹張元夫為翰林主人楊汝士與弟虞卿及第漢公先為文林表試故後進相謂曰欲入舉塲先問蘇張蘇張猶可三楊殺我大中咸通中盛𫝊崔慎相公常寓尺題於知聞或曰王凝裴瓚舎弟安潛朝中無呼字知聞㕔裏絶脫靴賔客凝終宣城瓚禮部尚書安潛侍中太平王崇竇賢二家率以科目為資足以升沈後進故科目舉人相謂曰未見王竇徒勞謾走出摭言後有東西二甲東呼西為􅃼茫隊言其無藝也出盧氏雜說開成㑹昌中又曰鄭楊段薛炙手可熱又有薄徒多輕侮人故裴泌應舉行美人賦以譏之又有大小二甲又有汪已甲又有四字言深耀軒庭也又有四㓙甲又芳林十哲言其與内臣交逰若劉曄任息姜垍李巗士蔡鋋秦韜玉之徒鋋與巖士各將兩軍書題求狀元時謂之對軍解頭太和中又有杜顗竇紃蕭嶰極有時稱為後來領袖文宗曾言進士之盛時宰相對曰舉塲中自云鄉貢進士不博上州刺史上笑之曰亦無奈何出盧氏雜說太平廣記卷一百八十一
