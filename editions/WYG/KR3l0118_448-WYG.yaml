body:
  text: 太平廣記卷四百四十八宋李昉等編狐二李項生王義方何譲之沈東羙楊伯成葉法善劉甲李參軍李項生唐垂拱初譙國公李崇義男項生染病其妻及女于側侍疾忽有一狐從項生被中走出俄失其所在數日項生亡出五行記王義方唐前御史王義方黜萊州司戸叅軍去官歸魏州以講授為業時鄉人郭無為頗有術敎義方使野狐義方雖能呼得之不伏使却被羣狐競來惱每擲瓦甓以擊義方或正誦讀即裂碎其書聞空中有聲云有何神術而欲使我乎義方竟不能禁止無何而卒出朝野僉載何譲之唐神龍中廬江何譲之赴洛遇上巳日將陟老君廟瞰洛中遊春冠葢廟之東北二百餘歩有大丘三四時亦號後漢諸陵故張孟陽七哀詩云恭文遙相望原陵鬱膴膴原陵即光武陵一陵上獨有枯栢三四株其下盤石可容數十人坐見一翁姿貌有異常輩眉鬂皓然著賨幪巾襦袴幘烏紗抱膝南望吟曰野田荆棘春閨閣綺羅新出没頭上日生死眼前人欲知我家在何處北邙松栢正為鄰俄有一貴戚金翠車輿如花之婢數十連袂笑樂而出徽安門抵榆林店又睇中橋之南北垂楊拂于天津繁花明于上苑紫禁綺陌軋亂香塵譲之方歎棲遲獨行踽踽已訝前吟翁非人翁忽又吟曰洛陽女兒多無奈孤翁老去何譲之遽欲前執翁倏然躍入丘中譲之從焉初入丘曛黑不辨其逐翁已復本形矣遂見一狐跳出尾有火㷔如流星譲之却出𤣥堂之外門東有一筵已空譲之見一几案上有硃盞筆硯之𩔖有一帖文書紙盡慘灰色文字則不可曉解略記可辨者其一云正色鴻燾神思化代穹施后承光負𤣥設嘔淪吐萌垠倪散截迷陽郤曲䨴音朦零音乙林反霾曀入聲雀燬龜冰健馳御屈拿尾研動袾袾􅀢􅀢㳷用祕功以嶺以穴柂薪伐藥莾􅀢萬茁嘔律則祥佛倫惟薩牡虛無有頤咽蘂屑肇素未來晦明興滅其二辭曰五行七曜成此閏餘上帝降靈歲旦涒徐蛇蛻其皮吾亦神攎九九六六束身天除何以充喉吐納太虚何以蔽踝霞袂雲袽哀爾浮生櫛比荒墟吾復麗氣還形之初在帝左右道濟忽諸題云應天狐超異科策八道後文甚繁難以詳載讓之獲此書帖喜而懷之遂躍出丘穴後數日水北同徳寺僧志静來訪讓之說云前者所獲丘中文書非郎君所用留之不祥其人近㨗上界之科可以禍福中國郎君必能却歸此他亦酬謝不薄其人謂志静曰吾已備三百縑欲贖購此書如何讓之許諾志静明日挈三百縑送讓之譲之領訖遂紿志静言其書以為往還所借更一兩日當徵之便可歸本讓之復為朋友所說云此僧亦是妖魅奈何欲還之所納絹但諱之可也後志静來譲之悉諱云殊無此事兼不曾有此文書志静無言而退經月餘讓之先有弟在東吳别已踰年一旦其弟至焉與讓之話家私中外甚有道長夜則兄弟聨牀經五六日忽問讓之某聞此地多狐作怪誠有之乎譲之遂話其事而誇云吾一月前曾獲野狐之書文一帖今見存焉其弟固不信寜有是事讓之至遲旦掲篋取此文書帖示弟弟捧而驚歎即擲于讓之前化為一狐矣俄見一羙少年若新官之狀跨白馬南馳疾去適有西域胡僧賀云善哉常在天帝左右矣少年歎讓之相紿讓之嗟異未幾遂有敇捕内庫被人盜貢絹三百匹尋蹤及此俄有吏掩至直挈讓之嚢撿焉果獲其縑已費數十匹執讓之越法讓之不能雪卒斃枯木出乾􅍧子沈東羙唐沈東羙為員外郎太子詹事佺期之子家有青衣死且數歲忽還家曰吾死為神今憶主母故來相見但吾餓請一餐可乎因命之坐仍為具食青衣醉飽而去及暮僮發草積下得一狐大醉須臾狐乃吐其食盡婢之食也乃殺之出紀聞楊伯成楊伯成唐開元初為京兆少尹一日有人詣門通云吳南鶴伯成見年三十餘身長七尺容貌甚盛引之升座南鶴文辨無雙伯成接對不暇久之請屏左右欲有密語乃云聞君小娘子令淑願事門下伯成甚愕謂南鶴曰女因媒而嫁且邂逅相識君何得便爾南鶴大怒呼伯成為老奴我索汝女何敢有逆慢辭甚衆伯成不知所以南鶴逕脱衣入内直至女所坐紙隔子中久之與女兩隨而出女言今嫁吳家何因嗔責伯成知是狐魅令家人十餘輩撃之反被料理多遇泥塗兩耳者伯成以此請假二十餘日敕問何以不見楊伯成皆言其家為狐惱詔令學葉道士術者十餘輩至其家悉被泥耳及縳無能屈伏伯成以為媿恥及賜告舉家還莊于莊上立吳郎院家人竊罵皆為料理以此無敢言者伯成暇日無事自于田中看人刈麥休息于樹下忽有道士形甚瘦悴來伯成所求漿水伯成因爾設食食畢道士問君何故憂愁伯成懼南鶴附耳說其事道士笑曰身是天仙正􅆢帝命追捉此等四五輩因求紙筆楊伯成使小奴取之然猶愳其知覺戒令無喧紙筆至道士書作三字狀如古篆令小奴持至南鶴所放前云尊師喚汝奴持書入房見南鶴方與家婢相謔奴以書授之南鶴見書匍匐而行至樹下道士呵曰老野狐敢作人形遂變為狐異常病疥道士云天曹驅使此輩不可殺之然以君故不可徒爾以小杖決之一百流血被地伯成以珍寶贈饋道士不受驅狐前行自後隨之行百餘歩至栁林邉冉冉昇天久之遂滅伯成喜甚至于舉家稱慶其女睡食頃方起驚云本在城中隔子裏何得至此衆人方知為狐所魅精神如睡中出廣異記葉法善道士葉法善括蒼人有道術能符禁鬼神唐中宗甚重之開元初供􅆢在内位至金紫光禄大夫鴻臚卿時有名族得江外一宰將乘舟赴任于東門外親朋盛筵以待之宰令妻子與親故車先徃胥溪水濵日暮宰至舟旁饌已陳設而妻子不至宰復至宅尋之云去矣宰驚不知所以復出城問行人人曰適食時見一婆羅門僧執幡花前導有數乗車隨之比出城門車内婦人皆下從婆羅門齊聲稱佛因而北去矣宰遂尋車跡至北邙虛墓門有大冡見其車馬皆憇其旁其妻與親表婦二十餘人皆從一僧合掌繞冡口稱佛名宰呼之皆有怒色宰前擒之婦人遂駡曰吾正逐聖者今在天堂汝何小人敢此抑遏至于奴僕與言皆不應亦相與繞冡而行宰因執胡僧遂失于是縳其妻及諸婦人皆喧呌至第竟夕號呼不可與言宰遲明問于葉師師曰此天狐也能與天通斥之則已殺之不可然此狐齋時必至請與俱來宰曰諾葉師仍與之符令置所居門既置符妻及諸人皆寤謂宰曰吾昨見佛來領諸聖衆將我等至天堂其中樂不可言佛執花前後吾等方隨後作法事忽見汝至吾故駡不知乃是魅惑也齋時婆羅門果至叩門乞食妻及諸婦人聞僧聲爭走出門喧言佛又來矣宰禁之不可乃執胡僧鞭之見血面縳舁之往葉師所道遇洛陽令僧大呌稱寃洛陽令反咎宰宰具言其故仍請與俱見葉師洛陽令不信宰言強與之去漸至聖眞觀僧神色慘沮不言及門即請命及入院師命解其縛猶胡僧也師曰速復汝形魅即哀請師曰不可魅乃棄袈裟于地即老狐也師命鞭之百還其袈裟復為婆羅門約令去千里之外胡僧頂禮而去出門遂亡出紀聞劉甲唐開元中彭城劉甲者為河北一縣將之官途經山店夜宿人見甲婦美白云此間有靈祗好偷美婦前後至者多為所取宜慎防之甲與家人相勵不寐圍繞其婦仍以麵粉塗婦身首至五更後甲喜曰鬼神所為在夜中耳今天將曙其如我何因乃假寐頃之聞失婦所在甲以資帛僱村人悉持棒尋麵而行初從􅆤孔中出漸過牆東有一古墳墳上有大桑𣗳下小孔麵入其中因發掘之丈餘遇大𣗳坎如連屋有老狐坐據玉案前兩行有美女十餘輩持聲樂皆前後所偷人家女子也旁有小狐數百頭悉殺之出廣異記李叅軍唐兑州李叅軍拜職赴上途次新鄭逆旅遇老人讀漢書李因與交言便及姻事老人問先婚何家李辭未婚老人曰君名家子當選婚好今聞陶真益為彼州都督若逼以女妻君君何以辭之陶李為婚深駭物聴僕雖庸劣竊為足下羞之今去此數里有蕭公是吏部璿之族門第亦髙見有數女容色殊麗李聞而悦之因求老人紹介于蕭氏其人便許之去久之方還言蕭公甚歡敬以待客李與僕御偕行既至蕭氏門館清肅甲第顯煥高槐修竹蔓延連亘絶世之勝境初二黄門持金倚􅇃延坐少時蕭出著紫蜀衫䇿鳩杖兩袍袴扶側雪髯神鑒舉動可觀李望敬之再三陳謝蕭云老叟懸車之所久絶人事何期君子迂道見過延李入㕔服玩隱暎當世罕遇尋薦珍膳海陸交錯多有未名之物食畢觴宴老人乃云李叅軍向欲論親已䝉許諾蕭便叙數十句語深有士風作書與縣官請卜人尅日須臾卜人至云卜吉正在此宵蕭又作書與縣官借頭花釵絹兼手力等尋而皆至其夕亦有縣官來作儐相歌樂之事與世不殊至入青廬婦人又姝羙李生愈悦暨明蕭公乃言李郎赴上有期不可久住便遣女子隨去寳鈕犢車五乘奴婢人馬三十疋其他服玩不可勝數見者謂是王妃公主之流莫不健羡李至任積二年􅆢使入洛留婦在舍婢等並妖媚蠱冶眩惑丈夫往來者多經過焉異日叅軍王顒曵狗將獵李氏羣婢見狗甚駭多騁而入門顒素疑其妖媚爾日心動逕牽狗入其宅合家拒堂門不敢喘息狗亦掣攣號吠李氏婦門中大詬曰婢等頃為犬咋今尚遑懼王顒何事牽犬入人家同官為僚獨不為李叅軍之地乎顒意是狐乃决意排忩放犬咋殺羣狐唯妻死身是人而其尾不變顒往白貞益貞益往取驗覆見諸死狐嗟嘆久之時天寒乃埋一處經十餘日蕭使君遂至入門號哭莫不驚駭數日來詣陶聞訴言詞確實容服高貴陶甚敬待因收王顒下獄王固執是狐取前犬令咋蕭時蕭陶對食犬至蕭引犬頭膝上以手撫之然後與食犬無搏噬之意後數日李生亦還號哭累日剡然發狂嚙王通身盡腫蕭謂李曰奴輩皆言死者悉是野狐何其苦痛當日即欲開瘞恐李郎被眩惑不見信今宜開視以明姦妄也命開視悉是人形李愈悲泣貞益以顒罪重錮身推勘顒私白云已令持十萬千東都取咋狐犬往來可十餘日貞益又以公錢百千益之其犬旣至所由謁蕭對事陶于正㕔立待蕭入府顔色沮䘮舉動惶擾有異于常俄犬自外入蕭作老狐下階走數歩為犬咋死貞益使驗死者悉是野狐顒遂見免此難出廣異記太平廣記巻四百四十八
