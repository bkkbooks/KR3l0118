body:
  text: 太平廣記卷一百十七報應十六孫叔敖崔敬嗣裴度劉軻劉𢎞敬蕭倣孫泰李質范明府程彦賔孫叔敖楚孫叔敖為兒出遊還憂而不食母問其故泣曰見兩頭蛇恐死母曰今蛇安在曰敖聞見兩頭蛇者死恐後人又見殺而埋之矣母曰無憂矣聞有隂德天報之福出賈子崔敬嗣唐崔敬嗣為房州刺史中宗安置在房州官吏多無禮敬嗣獨申禮敬供給豐贍中宗常德之及登位有益州長史崔敬嗣既同名姓每進擬官皆御筆超拜之者數四後引與語知誤訪敬嗣已卒遣安石授其子注官後官至顯達其孫即光遠也出談賔録裴度唐中書令晉國公裴度質狀眇小相不入貴屢屈名場頗亦自惑㑹有相工在洛中大為縉紳所神公特造之問命相工曰郎君形神稍異於人不入相若不至貴即當餓死今則殊未見貴處可别日垂訪為君細看公然之他日出遊香山寺徘徊于廊廡間忽見一素衣婦人致緹褶於僧伽欄楯之上祈祝良久瞻拜而去少頃度方見緹褶在舊處知其遺忘也又料追付不及遂收取以待婦人再至日暮竟不至度挈歸逆旅詰旦復攜往寺門始闢覩昨日婦人疾趨而至憮聲惋歎若有非横度從而問之婦人曰阿父無罪被繫昨貴人假得玉帶二犀帶一直千餘緡以賂津要不幸失去於此今老父不測之禍無所逃矣度憮然復細詰其物色因而授之婦人拜泣請留其一度笑而遣之尋詣昔相者相者審度聲色頓異驚歎曰此必有隂德及物前途萬里非某所知也度因以前事告之度果位極人臣出摭言劉軻唐侍御劉軻者韶右人也幼之羅浮九疑讀黄老書欲學輕舉之道又於曹溪探釋氏關戒遂被僧服故釋名海納北之筠川方山等寺又居廬嶽東林寺習南山鈔及百法論咸得宗㫖焉獨處一室數夢一人衣短褐曰我書生也頃因遊學逝於此室以主寺僧不聞郡邑乃瘞於牖下而屍骸跼促死者從直何以安也君能遷葬必有酬謝乃訪于緇屬果然劉解所著之衣覆其骸骼具棺改窆於虎溪之上是夜夢書生來謝將三雞子勸軻立食之軻嚼一而吞其二焉後乃精於儒學而善屬文章因䇿名第厯任史館欲書夢中之事不可自為傳記吏部侍郎韓愈素知焉曰待余餘暇當為一文贊焉愈左遷其文不就也出雲溪友議劉𢎞敬唐彭城劉𢎞敬字元溥世居淮淝間資財數百萬常修德不耀人莫知之家雖富利人之財不及怨施人之惠不望報長慶初有善相人於壽春道逢元溥曰噫君子且止吾有告也元溥乃延入館而訊焉曰君財甚豐矣然更二三年大期將至如何元溥涕泗曰夫壽夭者天也先生其奈我何相人曰夫相不及德德不及度量君雖不壽而德且厚至於度量尤寛且告後事但二三年之期勤修令德冀或延之夫一德可以消百災猶享爵禄而況於壽乎勉而圖之吾三載當復此來言訖而去元溥流涕送之乃為身後之計有女將適抵維揚求女奴資行用錢八十萬得四人焉内一人名蘭蓀者有殊色而風骨姿態殊不𩔖賤流元溥詰其情久而乃對曰賤妾死罪無復敢言主君既深訝之何敢潛隱某代為名家家本河洛先父以卑官淮西不幸遭吳寇跋扈因縁姓與寇同疑為近屬身委鋒刃家仍沒官以此湮沉無處告訴其諸骨肉寇平之後悉被官軍收掠為俘不可復知矣賤妾一身再易其主今及此焉元溥太息久之乃言曰夫履雖新不加於首冠雖舊不踐於地雖家族喪亡且衣冠之女而又抱寃如此三尺童子猶能發憤况丈夫耶今我若不振雪爾寃是為神明之誅焉因問其親戚知其外氏劉也遂焚其劵收為甥以家財五十萬先其女而嫁之長慶二年春三月辛卯蘭蓀既歸元溥夢見一人被青衣秉簡望塵而拜迫之澘然曰余則蘭蓀之父也感君之恩何以報之某聞隂德所以動天地也今君壽限將盡余當為君請于上帝故奉告言訖乃去後三日元溥復夢蘭蓀之父立於庭紫衣象簡侍衞甚嚴前謝元溥曰余不佞幸得請君於帝帝許我延君壽二十五載而富及三代子孫無復後禍其所殘害吾家者悉獲案理之存者禍身沒者子孫受釁帝又憫余之寃署以重職獲主山川於淮海之間因嗚咽再拜而去詰旦元溥依依未所甚信後三年果相者復至迎而賀元溥曰君壽延矣且君自眉至髪而視之元溥側冠露額曰噫有隂德上動於天者自今後二十五載慶及三代元溥始以蘭蓀之父為告相者曰昔韓子隂存趙氏太史公以韓氏十世而位至王侯者有隂德故也况蘭蓀之家無後矣蘭蓀之身賤𨽻矣如是而能不顧多財之與殊色而恤其孤豈不謂隂德之厚哉出隂德傳蕭倣唐丞相蘭陵公蕭倣清譽儉德時所推伏嘗統戎于番禺有酌泉投香之譽以是夷估輻湊至於長安寶貨藥肆咸豐衍於南方之物由此人情歸美僖宗誕聖于壬午龍飛於癸巳皇算十有二載矣思命耆德佐佑大化乃自奉常卿起為上相時年八十有三居台席數載汲引才俊導暢皇慈儉德既彰澆風少革及薨于位上甚追悼而廢常朝者三日册贈之禮有加等焉議者曰高位重禄茍有其分隂靈必助其壽考不然安有過懸車之歲而命相之主始生也太公晩年七十而遇文王今逾釣渭之年一紀則知榮辱之分豈偶然哉出唐闕史孫泰唐孫泰山陽人少師皇甫穎守操頗有古賢之風泰妻即姨女也先是姨老以二女為託曰其長者損一目汝可娶其女弟姨卒泰娶其姊或詰之泰曰其人有廢疾非泰何適衆皆伏泰之義嘗于都市遇鐵燈臺市之而命磨洗即銀也泰亟往還之中和中將家于義興置一别墅用緡二百千既半授之矣泰遊吳興郡約迴日當詣所止居兩月泰迴倚舟墅前復以餘資授之俾其人他徙於時覩一老嫗長慟數聲泰驚悸召詰之嫗曰老婦嘗迨事舅姑于此子孫不肖為他人所有故悲耳泰憮然久之因紿曰吾適得京書已别除官固不可駐此也所居且命爾子掌之言訖解維而逝不復返矣子展進士及第入梁為省郎出摭言李質唐咸通中吉州牙將李質得疾將死忽夢入㝠見主吏曰嘗出七人性命合延十四年吏執簿書以取上命久之出謂質曰事畢矣遂命使者領送還家至一高山推落乃寤質潛志其事自是疾漸平愈後果十四年而終出報應録范明府唐范明府者忘其名頗曉術數選授江南一縣宰自課其命云來年秋禄壽俱盡將出京又訪于日者日者曰子來年七月數盡胡為遠官哉范曰某固知之一女未嫁利薄俸以資遣耳及之任買得一婢子因詰其姓氏婢子曰姓張父嘗為某堰官兵寇之亂略賣至此范驚起問其父名乃曩昔之交契也謂其妻曰某女不憂不嫁悉以女粧奩擇邑客謹善者配之秩滿歸京日者大駭曰子前何相紿之甚算子禄壽俱盡今乃無恙非甲子差繆即當有隂德為報耳范曰俱無之日者詰問不已范以嫁女僕事告之日者曰此即是矣子之福壽未可量也後厯官數任而終出報應録程彦賔偽蜀羅城使程彦賔臨淄人也攻取遂寧躬率百夫直冒矢石城破獲處女三人蔚有姿容彦賔以别室處之浹旬間父母持金請贖公還金歸女告以全人父母泣而謝曰願公早建旄節彦賔笑而答曰吾所願壽終時無病耳後年踰耳順果無疾而終出儆戒録太平廣記卷一百十七
