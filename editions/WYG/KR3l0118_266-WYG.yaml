body:
  text: 太平廣記卷二百六十六輕薄二姚岩傑朝士使朔方薛保遜薛昭緯劇燕韋薛輕髙氏胡翽輕薄士流張翺盧程崔祕王先主遭輕薄蔣貽恭姚岩傑姚岩傑梁公元崇之裔孫也童丱聰悟絶倫弱冠博通墳典慕班固司馬遷之為人時稱大儒常以詩酒放游江左尤肆凌忽先達旁若無人唐乾符中顔標典鄱陽郡鞠場公宇初搆請岩傑紀其事文成粲然千餘言標欲刪去二字岩傑不從標怒時已刋石命碎其碑岩傑以篇紀之曰為報顔公識我麽我心唯秪與天那眠前俗物闗情大醉後青山入意多馮子毎嫌彈鋏恨寗生休唱飯牛歌聖朝若為蒼生計合有公車到薜蘿盧肇牧歙州岩傑在婺源先以著述寄肇肇知其使酒以手書褒美贈以布帛辭云兵火之後郡中凋敝無以奉迎大賢岩傑復以長箋激之肇不得已迓至郡齋禮若公卿而姚傲晲自如肇以篇詠誇於岩傑曰明月照巴天岩傑笑曰明月照一天奈何獨言巴天􅁘肇慚甚無何㑹於江亭時蒯希逸在席盧請目前取事為酒令尾有樂器之名肇令曰逺望漁舟不濶尺八岩傑遂飲酒一罨凭欄嘔噦須臾即席還令曰凭欄一吐已覺空喉其侮慢倨傲如此出摭言朝士使朔方闕跳索百戲俱呈使臣觀之如不見闕意其不足為歡笑闕别非闕胡騰使臣仰視拓拔又斜盻胡騰遂歛袵恭闕位視有若慙闕之貌逡廵舞態趨而前謝曰已蒙相公排置宴筵百戲娛樂更不令煩賢郎闕歌舞頗闕再三辭謝葢見拓㧞中有與胡騰鼻相𩔖乃呼作賢郎以此輕薄之出玉堂閒話薛保遜薛保遜名家子恃才與地凡所評品士子以之升降時號為浮薄相國夏侯孜尤惡之其堂弟因名保厚以異之由是不睦内子盧氏與其良人保遜操尚略同季父薛監來省盧氏出參俟其去後命水滌門閾薛監知而甚怒經宰相疏之保遜因謫授澧州司馬凡七年不代夏侯公出鎮魏謨相登庸方有徴拜而殞於郡愚曽覩薛文數幅其一云餞交親於灞上止逆旅氏見數物𧰼人語之口輙動皆云江淮嶺表州縣官也嗚呼天之生民為此輩笞撻又觀優云緋胡推宰莾轉而出衆人皆笑唯保遜不㑹其輕物率皆此𩔖也盧䖍灌罷䕫州以其近親徑至澧州慰省還至郵亭回望而哭曰豈意薛保遜一旦接軍事李判官打楊栁枝乎出北夢瑣言薛昭緯羅九臯附唐薛昭緯即保遜之子也恃才傲物有父風每入朝省㺯笏而行旁若無人又好唱浣溪紗詞知舉後有一門生辭歸鄉里臨岐獻規曰侍郎重徳某既受恩爾後不弄笏唱浣溪紗詞即某幸甚時人謂之至言有一吏嘗學其行歩揖遜薛知之乃召謂曰試於庭前學得似即恕汝罪於是下簾擁姬妾而觀小吏安詳傲然舉動酷似笑而捨之路侍中在蜀嘗夏日納涼於毬塲㕔中使院小吏羅九臯褁巾步履有似裴條侍中遥見促召逼視方知其非因笞之出北夢瑣言又薛昭緯使於梁國諭以𫝊禪梁祖令客將約回乃謂謁者曰大君有命無容却回速轡前邁既至夷門梁祖不獲已而出迎接見其標韻詞辨方始改觀自是宴接莫不欵曲一日梁祖話及鷹鷂薛盛言鷙鳥之俊梁祖欣然謂其亦曽放㺯歸館後以鷂子為贈薛致書感謝仍對來人戒僮僕曰令公所賜直須愛惜可以紙褁安鞲袋中聞者笑之出北夢瑣言劇燕劇燕蒲坂闕時王重榮鎮河中燕投贈王曰闕重榮甚禮重之多縱闕韋薛輕髙氏江陵髙季昌唐末為荆南留後時宰相韋說鄭珏舅甥姻婭也朱梁太祖時皆得制方面髙氏以貴公子任行軍司馬常以歌筵酒饌欵待數公日常宴聚求取無恒皆優待之後莊宗過河奄有中原天下震懼髙王單騎入覲韋鄭二公繼登台席中朝士族子弟多不達時變復存舊態薛澤除補闕韋荆除春秋博士皆賜緋咸有徳色匆匆辨裝即俟歸朝視行軍蔑如也李載仁韋說之甥除祕書郎劉詵鄭珏之妹夫也除毛詩博士賜緋爾後韋屢督李入京髙氏欲津置之載仁遷延自以先徳遺戒不欲依舅氏但不能顯言竟不離髙氏門館劉詵無他才望性嗜酒口受新命殊無行意日於髙氏情敬不衰然則美醖肥羜之所引也無何以疾終髙氏贍給孤遺頗亦周至未間洛下有變明宗入統南方强侯人要姑息韋鄭二相皆罷去韋薛尚跧荆楚明年保最嗣襲辟李為掌記他日錄其長息為子壻第三子皆奏官一門朱紫韡如也劉詵三子迭加任遇三孫女適髙氏子弟向三十年享其祿食亦足稱也韋荆州幕而卒薛澤攝宰而終豈自掇乎亦命也夫出北夢瑣言胡翽有胡翽者佐幕大藩有文學稱善草軍書動皆中意時大駕西幸中原宿兵岐秦二藩最為巨屏其飛書走檄交聘諸夏莫不伏其筆舌也時大帥年幼生殺之柄斷在貳車張筠其宣辭假荆州任在張同張同為察廵翽常少其帥蔑視同輩不為禮帥因藉其才不甚加責但令論之而已其輕薄自如也常因公宴翽被酒呼張筠曰張十六張十六者筠第行也數以語言詆筠筠因帥故但銜之他日往荆州詣張同同僕不識問從者曰胡大夫翽至㕔已脫衫矣同聞翽來欲厚之因命家人精意具饌同遽出迎見忽報曰大夫已去矣同復歩至㕔但見雙椅間遗不潔而去卒不留一辭同亦笑而銜之張無能加害時帥請翽聘於大梁翽門下客陳評事者從行筠宻賂陳令伺其不法入梁果恣虛誕或以所見宻聞梁王皆為陳疏記之洎歸帥知其狂率亦優容之陳於是受教搆成其惡具以乖僻草藁袖而白帥帥方被酒聞之大怒遂盡室擁出坑於平戎谷口更無噍𩔖帥醒知之大驚痛惜者久之沉思移時曰殺汝者副使非我為之後草軍書不稱㫖則泣而思之此過亦非在筠葢翽自掇爾王仁裕嘗過平戎谷有詩弔之曰立馬􅂽郊滿目愁伊人何罪死林邱風號古木悲長在雨濕寒莎淚暗流莫道文章為衆嫉只應輕薄是身讎不緣魂寄孤山下此地堪名鸚鵡洲出王氏見聞輕薄士流唐朝有輕薄士流出刺一郡郡人集其歌樂百戲以迓之至有吞刀吐火吹竹按絲走圏跳索歌喉舞腰殊似不見州人曰我使君清峻無以恱之相顧憂戚忽一日盛夏登樓遽令命樂郡人喜曰使君非不好樂也及至樓下遂令色色引上其絃匏戛擊之𩔖迭進皆叱去不用有吹笙者末後至喜曰我比只要此一色問此一物何名曰名笙可吹之樂工甚有徳色方欲調弄數聲遽止之曰不要動指只一直吹之樂工亦禀之遂令臨檻長吹自午及申乃呼左右可賜與酒令退曰吾誰要曲調只藉爾喚風耳復一日入山召樂人比至怒目叱之曰只要長脚女人樂部忙然退出不知其所以遂遣六七婦人約束長脚鼔笛而入乃顧諸婦升大樹各持籠子令摘樹果其輕薄從事如此者甚多闕張翺唐乾寜中宿州刺史陳璠以軍旅出身擅行威斷進士張翶恃才傲物席上調璠寵妓張小泰怒揖起付吏責其無禮狀云有張翺兮寓止淮陰來綺席兮放恣胸襟璠益怒云據此分析合吃幾下又云只此両句合吃三下五下切求一笑宜費乎千金萬金竟鞭背而卒出劉山甫閒談詞多不載出北夢瑣言盧程盧程擢進士第為莊皇帝河東判官建國後命相無他才業唯以氏族傲物任圜常以公事入謁程烏紗𨼆几謂圜曰公是蟲豸輙來唐突圜慚愕驟告莊宗大怒俾殺之為盧質救解獲免自是出中書時人切齒焉江陵在唐世號衣冠藪澤人言琵琶多於飯甑措大多於鯽魚有邑宰盧生每於枝江縣差船入府舟子常苦之一旦王仙芝兵火盧生為船人挑其筋繫於船舷放流而死大凡無藝子弟率以門閥輕薄廣明之亂遭罹甚多咸自致也出北夢瑣言崔祕天成二年潘環以軍功授棣牧素無賔客或有人薦崔祕者博陵之士子也舉止閒雅詞翰亦工潘一見甚喜上館以待之經宿不復往潘訪之不獲既而辟一書生乃往後薦主見而詰之崔曰潘公雖勤厚鼻柱之左有瘡膿血常流每被薰灼腥􅁾難堪可目之為自死漢也薦主大咍崔之不顧名實而為輕薄也葢潘常中流矢於面骨銜其鏃故負重傷醫療至經年其鏃自出其瘡成漏終身不痊出玉堂閒話王先主遭輕薄韋昭度招討陳敬瑄時蜀帥顧彦暉為副王先主為都指揮使三府各署幕寮皆是朝達子弟視王先主蔑如也先主侍從髠髪行􅀈鯨面札脫如一部鬼神其輩以先主兢肅顧公詳緩一時失笑而散先主歸營左右以此為言亦自大笑他日克郪城輕薄幕寮皆害之出北夢瑣言蔣貽恭蔣貽恭者好嘲詠頻以此痛遭檟楚竟不能改蜀中士子好着襪頭袴蔣謂之曰仁賢既裹將仕郎頭何為作散子將脚也皆𩔖此蔣生雖嗜嘲詠然談笑儒雅凡被譏刺皆輕薄之徒以此縉紳中惡之官至令佐而卒出北夢瑣言太平廣記卷二百六十六
