body:
  text: 太平廣記卷七神仙七白石先生皇初平王逺伯山甫馬鳴生李八百李阿白石先生白石先生者中黄文人弟子也至彭祖時已二千嵗餘矣不肯修昇天之道但取不死而已不失人間之樂其所據行者正以交接之道為主而金液之藥為上也初以居貧不能得藥乃飬羊牧猪十數年間約衣節用置貨萬金乃大買藥服之常煮白石為糧因就白石山居時人故號曰白石先生亦食脯飲酒亦食榖食日行三四百里視之色如四十許人性好朝拜事神好讀幽經及太素傳彭祖問之曰何不服昇天之藥答曰天上復能樂比人間乎但莫使老死耳天上多至尊相奉事更苦於人間故時人呼白石先生為𨼆遁仙人以其不汲汲於昇天為仙官亦猶不求聞逹者也出神仙傳皇初平皇初平者丹溪人也年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年不復念家其兄初起行山尋索初平歴年不得後見市中有一道士初起召問之曰吾有弟名初平因令牧羊失之四十餘年莫知死生所在願道君為占之道士曰金華山中有一牧羊児姓皇字初平是卿弟非疑初起聞之即随道士去求弟遂得相見悲喜語畢問初平羊何在曰近在山東耳初起往視之不見但見白石而還謂初平曰山東無羊也初平曰羊在耳兄但自不見之初平與初起俱往看之初平乃叱曰羊起於是白石皆變為羊數萬頭初起曰弟獨得仙道如此吾可學乎初平曰唯好道便可得之耳初起便棄妻子留住就初平學共服松脂茯苓至萬日能坐在立亡行於日中無影而有童子之色後乃俱還鄉里親族死終畧盡乃復還去初平改字為赤松子初起改字為魯班其後服此藥得仙者數十人出神仙傳王遠王遠字方平東海人也舉孝亷除郎中稍加中散大夫學通五經尤明天文圖䜟河洛之要逆知天下盛衰之期九州吉凶如觀之掌握後棄官入山修道道成漢孝桓帝聞之連徴不出使郡國逼載以詣京師逺低頭閉口不答詔乃題宫門扇板四百餘字皆説方來之事帝惡之使削去外字適去内字復見墨皆徹板裏削之愈分明逺無子孫鄉里人累世相傳供飬之同郡太尉陳躭為逺營道室旦夕朝拜之但乞福未言學道也逺在陳家四十餘年陳家曽無疾病死喪奴婢皆然六畜繁息田桑倍獲逺忽語陳躭曰吾期運當去不得乆停明日日中當發至時逺死躭知其仙去不敢下着地但悲啼嘆息曰先生捨我我將何怙具棺器燒香就牀衣裝之至三日夜忽失其屍衣冠不觧如虵蜕耳逺卒後百餘日躭亦卒或謂耽得逺之道化去或謂知躭將終故委之而去也初逺欲東入括蒼山過吳住胥門蔡經家蔡經者小民耳而骨相當仙逺知之故住其家遂語經曰汝生命應得度世欲取汝以𥙷官僚耳然少不知道今氣少肉多不得上去當為屍觧如從狗竇中過耳於是告以要言乃委經而去經後忽身體發熱如火欲得冷水灌之舉家汲水灌之如沃焦石如此三日銷耗骨立乃入室以被自覆忽然失之視其被内唯有皮頭足具如蟬蜕也去十餘年忽還家容色少壯鬂髮鬒黒語家人曰七月七日王君當來其日可多作飲食以供從官至其日經家乃借瓮器作飲食百餘斛羅列布置庭下是日王君果來未至先聞金鼓簫管人馬之聲比近皆驚莫知所在及至經舎舉家皆見逺冠逺遊冠朱衣虎頭鞶囊五色綬帶劒黄色少髭長短中人形也乗羽車駕五龍龍各異色前後麾節幡旗導從威儀奕奕如大將軍也有十二隊五伯士皆以蠟封其口鼓吹皆乗龍從天而下懸集於庭從官皆長丈餘不從道衢既至從官皆𨼆不知所在唯獨見逺坐耳須臾引見經父母兄弟因遣人召麻姑亦莫知麻姑是何神也言曰王方平敬報乆不到民間今來在此想姑能暫來語否須臾信還不見其使但聞信語曰麻姑載拜不相見忽已五百餘年尊卑有序拜敬無階煩信承來在彼食頃即到先受命當按行蓬萊今便暫往如是當還還便親覲願未即去如此兩時聞麻姑來來時亦先聞人馬聲既至從官半於逺也麻姑至蔡經亦舉家見之是好女子年可十八九許於頂上作髻餘髮散垂至腰衣有文采又非錦綺光彩耀目不可名狀皆世之所無也八拜逺逺為之起立坐定各進行厨皆金盤玉盃無限也餚膳多是諸花而香氣達于内外擘脯而食之云麟脯麻姑自説云接侍以來已見東海三為桑田向到蓬萊又水淺於往日㑹時畧半耳豈將復為陵陸乎逺嘆曰聖人皆言海中行復揚塵也麻姑欲見蔡經母及婦等時經弟婦新産數日姑見知之曰噫且立勿前即求少許米來得米擲之墮地謂以米祛其􅁾也視其米皆成丹砂逺笑曰姑故年少也吾老矣不喜復作如此狡獪變化也逺謂經家人曰吾欲賜汝輩美酒此酒方出天厨其味醇醲非俗人所宜飲飲之或能爛腸今當以水和之汝輩勿怪也乃以斗水合升酒攪之以賜經家人人飲一升許皆醉良乆酒盡逺語左右曰不足復還取也以千錢與餘杭姥乞酒湏臾信還得一油囊酒五斗許使傳餘杭姥答言恐地上酒不中尊飲耳麻姑手爪似鳥經見之心中念曰背大癢時得此爪以爬背當佳也逺已知經心中所言即使人牽經鞭之謂曰麻姑神人也汝何忽謂其爪可爬背耶但見鞭着經背亦莫見有人持鞭者逺告經曰吾鞭不可妄得也經比舍有姓陳者失其名嘗罷縣尉聞經家有神人乃詣門叩頭求乞拜見於是逺使引前與語此人便欲從驅使比於蔡經逺曰君且向日而立逺從後觀之曰噫君心邪不正終未可教以仙道當授君地上主者之職司臨去以一符并一傳著以小箱中與陳尉告言此不能令君度世止能存君本夀自出百嵗向上可以禳災治病者命未終及無罪者君以符到其家便愈矣若邪鬼血食作祟禍者便帶此符以傳勑吏遣其鬼君心中亦當知其輕重臨時以意治之陳以此符治病有效事之者數百家夀一百一十嵗而死死後子弟行其符不復騐矣逺去後經家所作飲食數百斛皆盡亦不見有人飲食也經父母私問經曰王君是何神人復居何處經曰常在崑崙山往來羅浮括蒼等山山上皆有宫室主天曺事一日之中與天上相反覆者数十過地上五嶽生死之事皆先來吿王君王君出城盡將百官從行唯乗一黄麟將十數侍人每行常見山林在下去地常數百丈所到則山海之神皆來奉迎拜謁其後數十年經復暫歸家逺有書與陳尉其書廓落大而不工先是人無知方平名逺者因此乃知之陳尉家于今世世存録王君手書并符傳於小箱中出神仙傳伯山甫伯山甫者雍州人也入華山中精思服食時時歸鄉里省親如此二百年不老到人家即數人先世以来善惡功過有如臨見又知方來吉凶言無不效其外甥女年老多病乃以藥與之女時年已八十轉還少色如桃花漢武遣使者行河東忽見城西有一女子笞一老翁俛首跪受杖使者怪問之女曰此翁乃妾子也昔吾舅氏伯山甫以神藥教妾妾教子服之不肯今遂衰老行不及妾故杖之使者問女及子年㡬答曰妾已二百三十嵗児八十矣後入華山去出神仙傳馬鳴生馬鳴生者臨淄人也本姓和字君賢少為縣吏捕賊為賊所傷當時暫死忽遇神人以藥救之便活鳴生無以報之遂棄職随神初但欲治金瘡方耳後知有長生之道乃乆随之為負笈西之女几山北到𤣥丘南至廬江周遊天下勤苦歴年及受太陽神丹經三卷歸入山合藥服之不樂昇天但服半劑為地仙恒居人間不過三年輒易其處時人不知是仙人也架屋舎畜僕從車馬並與俗人皆同如此展轉經歴九州五百餘年人多識之悉怪其不老後乃白日昇天而去出神仙傳李八百李八百蜀人也莫知其名歴世見之時人計其年八百嵗因以為號或𨼆山林或居市㕓知漢中唐公房有志不遇明師欲教授之乃先往試之為作客傭賃者公昉不知也八百驅使用意異於他客公昉愛異之八百乃偽病困當欲死公昉即為迎醫合藥費數十萬錢不以為損憂念之意形於顔色八百又轉作惡瘡周徧身體膿血臭惡不可忍近公昉為之流涕曰卿為吾家使者勤苦歴年常得篤疾吾取醫欲令卿愈無所恡惜而猶不愈當如卿何八百曰吾瘡不愈須人舐之當可公昉乃使三婢三婢為舐之八百又曰婢舐不愈若得君為舐之即當愈耳公昉即舐復言無益欲公昉婦舐之最佳又復令婦舐之八百又告曰吾瘡乃欲差當得三十斛美酒浴身當愈公昉即為具酒置大器中八百即起入酒中浴瘡即愈體如凝脂亦無餘㾗乃吿公昉曰吾是仙人也子有志故此相試子真可教也今當授子度世之訣乃使公昉夫妻并舐瘡三婢以其浴酒自浴即皆更少顔色美悦以丹經一卷授公昉公昉入雲臺山中作藥藥成服之仙去出神仙傳李阿李阿者蜀人傳世見之不老常乞於成都市所得復散賜於貧窮者夜去朝還市人莫知所止或往問事阿無所言但占阿顔色若顔色欣然則事皆吉若容貌慘戚則事皆凶若阿含笑者則有大慶㣲嘆者則有深憂如此候之未曾不審也有古强者疑阿異人常親事之試隨阿還所宿乃在青城山中强後復欲隨阿去然身未知道恐有虎狼私持其父大刀阿見而怒强曰汝隨我行那畏虎也取强刀以擊石刀折壊强憂刀敗至旦隨出阿問强曰汝愁刀敗也强言實恐父怪怒阿則取刀左手擊地刀復如故强隨阿還成都未至道逢人奔車阿以脚置其車下轢脚皆折阿即死强怖守視之須臾阿起以手撫脚而復如常強年十八見阿年五十許强年八十餘而阿猶然不異後語人被崑崙山召當去遂不復還出神仙傳太平廣記卷七
