body:
  text: 太平廣記卷十四神仙十四劉子南郭文嵩山叟許真君吳眞君萬寳常李筌劉子南劉子南者乃漢冠軍將軍武威太守也從道士尹公受務成子螢火丸辟疾病疫氣百鬼虎狼虺蛇蜂蠆諸毒及五兵白刃賊盜凶害用雄黄各二兩螢火鬼箭蒺藜各一兩鐵槌柄燒令焦黒鍛竈中灰羖羊角各一分半研如粉􅋗以雞子黄并丹雄雞冠血丸如杏仁大者以三角綘囊盛五丸常帶左臂上從軍者繫腰中居家懸戸上辟盗賊諸毒物子南合而佩之永平十二年於武威邑界遇虜大戰敗績餘衆奔潰獨為冦所圍矢下如雨未至子南馬數尺矢輙墮地終不能中傷虜以為神人也乃􅄙圍而去子南以敎其子及兄弟為軍者皆未嘗􅀍傷喜得其驗傳世寶之漢末青牛道士封君逹得之以傳安定皇甫隆隆授魏武帝乃稍傳於人間一名冠軍丸亦名武威丸今載在千金翼中出神仙感遇傳郭文郭文字文舉洛陽人也晉書有傳𨼆餘杭天柱山或居大璧巖太和真人曾降其室授以冲真之道晦跡潛修世所不知有虎張口至石室前若有所告文舉以手探虎喉中得骨去之明日虎銜一死鹿致石室之外自此虎常馴擾於左右亦可撫而牽之文舉出山虎必隨焉雖在城市衆人之中虎俯首隨行不敢肆暴如犬羊耳或以書策致其背上亦負而行文嘗採木實竹葉以貨鹽米置於筐中虎負而隨之晉帝聞之徴詣闕下問曰先生馴虎有術邪對曰自然耳人無害獸之心獸無傷人之意何必術為撫我則后虎猶民也虐我則讐民猶虎也理民與馴虎亦何異哉帝髙其言拜官不就歸𨼆鰲亭山得道而去後人於其臥牀席下得蒻葉書金雄詩金雌記其言皆當時讖詞其蛻如蛇也出神仙拾遺嵩山叟嵩山叟晉時人也世說云嵩山北有大穴莫測其深淺百姓每嵗遊觀其上叟嘗悞墮穴中同輩冀其儻不死投食於穴墮者得而食之巡穴而行十許日忽曠然見明有草屋一區中有二仙對碁局下有數杯白飲墮者告以飢渇棊者與之飲飲畢氣力十倍碁者曰汝欲留此否答不願停碁者教云從此西行數十歩有大井井中多怪異慎勿畏之必投身井中自當得出若飢可取井中物食之如其言入井中多蛟龍然見叟輙避其路於是隨井而行井中物如青泥而香美食之了不飢半年許乃出蜀青城山因得歸洛下問張舉舉曰此仙館丈夫所飲者玉漿所食者龍穴石髓子其得仙者乎遂尋洞却往不知所之𤣥中記云蜀郡青城山有洞穴分為三道西北通崐崘茅君傳云青城是第五洞九仙寳室之天周迴二千里十洞天之一也入山十里得至焉出神仙拾遺許眞君許眞君名遜字敬之本汝南人也祖琰父肅世慕至道東晉尚書郎邁散騎常侍䕶軍長史穆皆真君之族子也真君弱冠師大洞君吳猛傳三清法要鄉舉孝亷拜蜀旌陽令尋以晉室棼亂棄官東歸因與吳君同遊江左會王敦作亂二君乃假為符竹求謁於敦盖將欲止敦之暴以存晉室也一日二君與郭璞同候於敦敦蓄怒以見之謂二君曰孤昨得一夢擬請先生圓之可乎真君曰請大將軍具述敦曰孤夢將一木上破其天孤禪帝位果十全乎許君曰此夢固非得吉敦曰請問其說吳君曰木上破天是未字也明公未可妄動晉祚固未衰耳王敦怒因令郭璞筮之卦成景純曰無成又問其壽璞曰明公若起事禍將不久若住武昌壽不可測敦大怒又問曰卿壽幾何璞曰余夀盡今日敦怒令武士執璞出將赴刑焉是時二真君方與敦飲酒許君擲杯梁上飛遶梁間敦等舉目㸔盃許君坐中𨼆身於是南出晉闗抵廬江口因召船師載往鍾陵是時船師曰我雖有此船且無人力乗駕無由載君二君曰汝但以船載我我當自與行船仍謂船師曰汝宜入船閉門深𨼆若聞船行疾速不得輒有潛窺於是騰舟離水凌空入雲二君談論端坐頃刻之間已抵廬山金闕洞之西北紫霄峰頂二君意欲暫過洞中龍行既抵其船拽撥林木戞刺響駭其聲異常舟師不免偷目潛窺二龍知人見之峰頂委舟而去二君謂船師曰汝違吾敎驚觸二龍委棄此船萬仞峰頂吾縁貪與衆真除盪妖害暫須離此遊渉江湖汝既失船徒返人世汝可𨼆此紫霄峰上遊覽匡廬示之以服餌靈草之門指之以遁跡地仙之術由是舟師之船底遺跡尚存後於豫章遇一少年容儀修整自稱慎郎許君與之談話知非人𩔖指顧之間少年告去真君謂門人曰適來年少乃是蛟蜃之精吾念江西累為洪水所害若非翦戮恐致逃遁蜃精知真君識之潛於龍沙洲北化為黄牛真君以道眼遥觀謂弟子施大王曰彼之精怪化作黄牛我今化其身為黒牛仍以手巾掛膊將以認之汝見牛犇鬭當以劒截後真君乃化身而去俄頃果見黒牛奔趁黄牛而來大王以劒揮牛中其左股因投入城西井中許君所化黒牛趁後亦入井中其蜃精復從此井奔走徑歸潭州却化為人先是蜃精化為美少年聰明爽雋而又富於寳貨知潭州刺史賈玉有女端麗欲求貴婿以匹之蜃精乃廣用財寳賂遺賈公親近遂獲為伉儷焉自後與妻於衙署後院而居每至春夏之間常求旅遊江湖歸則珍寳財貨數餘萬計賈使君之親姻童僕莫不頼之而成豪富至是蜃精一身空歸且云被盗所傷舉家歎惋之際典客者報云有道流姓許字敬之求見使君賈公遽見之真君謂賈公曰聞君有貴壻畧請見之賈公乃命慎郎出與道流相見慎郎怖畏託疾潛藏真君厲聲而言曰此是江湖害物蛟蜃老魅焉敢遁形於是蜃精復變本形宛轉堂下尋為吏兵所殺真君又令將其二子出以水噀之即化為小蜃妻賈氏㡬欲變身父母懇真君遂與神符救療仍令穿其宅下丈餘已旁亘無際矣真君謂賈玉曰汝家骨月㡬為魚鼈也今須速移不得暫停賈玉蒼黄徙居俄頃之間官舍崩没白浪騰涌即今舊跡宛然在焉真君以東晉孝武帝太康二年八月一日於洪州西山舉家四十二口㧞宅上昇而去惟有石函藥臼各一所車轂一具與真君所御錦帳復自雲中墮於故宅鄉人因於其地置遊帷觀焉出十二真君傳吳真君吳真君名猛字世雲家於豫章武寧縣七嵗事父母以孝聞夏寝臥不驅蚊蚋盖恐其去而噬其親也及長事南海太守鮑靚因語至道將遊鍾陵江波浩淼猛不假舟檝以白羽扇畫水而渡觀者竒之猛有道術忽一日狂風暴起猛乃書符擲於屋上有一青鳥銜符而去須臾風定人或問之答曰南湖有遭此風者其中二道人呼天求救故以此拯焉後人訪尋果如所述時武寧縣令千慶死三日未殯猛往哭之因云令長固未合死今吾當為上天訟之猛遂臥慶屍旁數日俱還時方盛暑屍柩壞爛其魂惡不欲復入猛强排之乃復重蘇慶弟晉著作郎寳感其兄及覩亡父殉妾復生因撰搜神記備行于世猛後於西平乗白鹿寳車冲虚而去出十二真君傳萬寳常萬寳常不知何許人也生而聰穎妙逹鍾律徧工八音常於野中遇十許人車服鮮麗麾幢森列如有所待寳常趨避之此人使人召至前曰上帝以子天授音律之性將傳八音於季末之世救將壊之樂然正始之聲子未備知也使鈞天之官以示子𤣥微之要命坐而敎以厯代之樂理亂之音靡不周述寳常畢記之良久羣仙凌空而去寳常還家已五日矣自此人間之樂無不精究嘗與人同食之際言及聲律時無樂器寳常以食器雜物以筯扣之品其髙下宫商畢備諧作絲竹大為時人所賞厯周洎隋落拓不仕開皇初沛國公鄭譯定樂成奏之文帝召寳常問其可否常曰此亡國之音哀怨浮散非正雅之聲極言其不可詔令寳常創造樂器而其聲率下不與舊同又云世有周禮旋宫之義自漢魏以來知音者皆不能通之寳常創之人皆哂笑於是試令為之應手成曲衆咸嗟異由是損益樂器不可勝紀然其聲雅澹不合於俗人皆不好卒寢而不行寳常聽太常之樂泣謂人曰淫厲而哀天下不久相殺盡當時海内晏安天下全盛人聞其言大為不爾及大業之末卒驗其事是時鄭譯何妥盧賁蘇道蕭吉王令言皆能於雅樂安馬駒曽妙逹王長通敦金樂等能作新聲皆心服寳常言其久假矣寳常無子嘗謂其友曰吾不堪病則孤矣因病妻竊其財物而逃㡬至餓殞忽一夕先所遇神仙來降其家曰汝捨九天之髙逸念下土之塵愛淪没於兹限將畢矣須記得雲亭宫之㑹乎寳常懵然良久乃悟他日謂鄰人曰吾偶自仙宫謫於人世即將去矣旬日不知所之出神仙拾遺李筌李筌號逹觀子居少室山好神仙之道常厯名山博採方術至嵩山虎口巖得黄帝隂符經本絹素書朱漆軸緘以玉匣題云大魏真君二年七月七日上清道士冦謙之藏諸名山用傳同好其本糜爛筌抄讀數千遍竟不曉其義理因入秦至驪山下逢一老母髽髻當頂餘髮半垂弊衣扶杖神狀甚異路傍見遺火燒𣗳因自語曰火生於木禍發必尅筌驚而問之曰此黄帝隂符上文母何得而言之母曰吾授此符已三元六周甲子矣少年從何而得之筌稽首載拜具告所得母曰少年顴骨貫於生門命輪齊於日角血脈未减心影不偏性賢而好法神勇而樂至真是吾弟子也然四十五當有大厄因出丹書符一通貫於杖端令筌跪而吞之曰天地相保於是坐於石上與筌說隂符之義曰此符凡三百言一百言演道一百言演術一百言演法上有神仙抱一之道中有富國安民之法下有强兵戰勝之術皆内出心機外合人事觀其精微黄庭内景不足以為𤣥鑒其至要經傳子史不足以為文任其巧智孫吳韓白不足以為竒非有道之士不可使聞之故至人用之得其道君子用之得其術常人用之得其殃識分不同也如傳同好必清齋而授之有本者為師受書者為弟子不得以富貴為重貧賤為輕違者奪紀二十本命日誦七遍益心機加年夀每年七月七日寫一本藏名山石巖中得加算久之母曰已晡時矣吾有麥飯相與為食袖中出一瓠令筌谷中取水水旣滿矣瓠忽重百餘斤力不能制而沉泉中及還已失老母但留麥飯數升於石上而已筌有將略作太白隂符十卷有相業著中台志十卷時為李林甫所排位不顯竟入名山訪道不知所終出神仙感遇傳太平廣記卷十四
