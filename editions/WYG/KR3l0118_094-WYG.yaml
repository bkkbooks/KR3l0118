body:
  text: 太平廣記卷九十四異僧八華嚴和尚唐休璟門僧儀光禪師𤣥覽法將華嚴和尚華嚴和尚學於神秀禪師謂之北祖常在洛都天宮寺弟子三百餘人每日堂食和尚嚴整瓶鉢必須齊集有弟子夏臘道業髙出流輩而性頗褊躁時因臥疾不隨衆赴㑹一沙彌瓶鉢未足來詣此僧頂禮云欲上堂無鉢如何暫借明日當自置之僧不與曰吾鉢已受持數十年借汝必恐損之沙彌懇告曰上堂食頃而歸豈便毁損至於再三僧乃借之曰吾愛鉢如命必若有損同殺我也沙彌得鉢捧持兢懼食畢將歸僧已催之沙彌持鉢下堂不意磚破蹴倒遂碎之少頃僧又催之既懼遂至僧所作禮承過且千百拜僧大呌曰汝殺我也怒罵至甚因之病亟一夕而卒爾後經時和尚於嵩山嶽寺與弟子百餘人方講華嚴經沙彌亦在聽㑹忽聞寺外山谷若風雨聲和尚遂招此沙彌令於已背後立須臾見一大蛇長八九丈大四五圍直入寺來努目張口左右皆欲奔走和尚戒之不令動蛇漸至講堂升階睥睨若有所求和尚以錫杖止之云住蛇欲至坐遂俛首閉目和尚誡之以錫杖扣其首曰既明所業今當回向三寶令諸僧為之齊聲念佛與受三歸五戒此蛇宛轉而出時亡僧弟子已有登㑹者和尚召謂曰此蛇汝之師也修行累年合證果之位為臨終之時惜一鉢破怒此沙彌遂作一蟒蛇適此來者欲殺此沙彌更若殺之當墮大地獄無出期也賴吾止之與受禁戒今當捨此身矣汝往尋之弟子受命而出蛇行所過草木開靡如車路焉行四十五里至深谷間此蛇自以其首叩石而死矣歸白和尚曰此蛇今已受生在裴郎中宅作女亦甚聰慧年十八當亡即却為男然後出家修道裴郎中即我門徒汝可入城為吾省問之其女今已欲生而甚艱難汝可救之時裴寛為兵部郎中即和尚門人也弟子受命入城遥指裴家遇裴請假在宅遂令報云華嚴和尚傳語郎中出見神色甚憂僧問其故云妻欲産已六七日燈燭相守甚危困矣僧曰我能救之遂令於堂門之外浄設牀席僧入焚香擊磬呼和尚者三其夫人安然而産一女後果年十八歲而卒出原化記唐休璟門僧唐中宗時唐公休璟為相嘗有一僧發言多中好為厭勝之術休璟甚敬之一日僧來謂休璟曰相國將有大禍且不逺數月然可以禳去休璟懼甚即拜之僧曰某無他術但奉一計耳願聽之休璟曰幸吾師敎焉僧曰天下郡守非相國命之乎曰然僧曰相國當於卑冗官中訪一孤寒家貧有才幹者使為曹州刺史其深感相國恩而可以指蹤也既得之願以報某休璟且喜且謝遂訪於親友張君者家甚貧為京卑官即日拜贊善大夫又旬日用為曹州刺史既而召僧謂曰已從師之計得張某矣然則可敎乎僧曰張君赴郡之時當令求二犬髙數尺而神俊者休璟唯之已而張君荷唐公特達之恩然莫喻其旨及將赴郡告辭於休璟既而謝之曰某名跡幽昧才識疎淺相國拔此沈滯牧守大郡由擔石之儲獲二千石之禄自涸轍而泛東溟出窮谷而陟層霄徳固厚矣然而感恩之外竊所憂惕者未知相國之旨何哉休璟曰用君之才耳非他也然常聞貴郡多善犬願得神俊非常者二焉張君曰謹奉敎既至郡數日乃悉召郡吏告之曰吾受丞相唐公深恩拔於不次得守大郡今唐公求二良犬可致之乎有一吏前曰某家育一犬質狀異常願獻之張大喜即獻焉既至其犬髙數尺而肥其臆廣尺餘神俊異常而又馴擾張君曰相國所求者二也如何吏白曰郡内唯有此他皆常也然郡南十里某村某民家其亦有一焉民極惜之非君侯親往不可取之張君即命駕齎厚直而訪之果得焉其狀與吏所獻者無異而神彩過之張君甚喜即召親吏以二犬獻休璟休璟大恱且竒其狀以為未常見遂召僧視之僧曰善育之脫相君之禍者二犬耳後旬日其僧又至謂休璟曰事在今夕願相君嚴為之備休璟即留僧宿是夜休璟坐於堂之前軒命左右十餘人執弧矢立於榻之隅其僧與休璟共處一榻至夜分僧笑曰相君之禍免矣可以就寢休璟大喜且謝之遂徹左右與僧寢焉迨曉僧呼休璟曰可起矣休璟即起謂僧曰禍誠免矣然二犬安所用乎僧曰俱往觀焉乃與休璟偕尋其跡至後園中見一人仆地而卒矣視其頸有血葢為物所噬者又見二犬在大木下仰視之見一人袒而匿其上休璟驚且詰曰汝為誰其人泣而指死者曰某與彼俱賊也昨夕偕來且將致害相國葢遇此二犬環而且吠彼遂為噬而死某懼因匿身於此伺其他去將逃焉迨曉終不去今即甘死於是矣休璟即召左右令縛之曰此罪固當死然非其心也葢受制於人耳願釋之休璟命解縛其賊拜泣而去休璟謝其僧曰賴吾師不然死於二人之手僧曰此葢相國之福也豈所能為哉休璟有表弟盧軫在荆門有術士告之君將有災戾當求一善禳厭者為庶可矣軫素知其僧因致書於休璟請求之僧即以書付休璟曰事在其中耳及書達荆州而軫已卒其家開視其書徒見一幅之紙竝無有文字焉休璟益竒之後數年其僧遯去竟不知其所適出宣室記儀光禪師長安青龍寺儀光禪師本唐室之族也父瑯琊王與越王起兵伐天后不克而死天后誅其族無遺惟禪師方在襁褓乳母抱而逃之其後數嵗天后聞瑯琊王有子在人間購之愈急乳母將至岐州界中鬻女工以自給時禪師年已八歲矣聰慧出𩔖狀貌不凡乳母恐以貌取而敗大憂之乃求錢為造衣服又置錢二百於腰下於桑野中具告以其本末泣而謂曰吾養汝已八年矣亡命無所不至今汝已長天后之敕訪不止恐事洩之後汝而與吾俱死今汝聰頴過人可以自立吾亦從此逝矣乳母因與流涕而訣禪師亦號慟不自勝方知其所出乳母既去師莫知其所之乃行至逆旅與諸兒戲有郡守夫人者之夫任處方息於逆旅見禪師與諸兒戲狀貌異於人因憐之召而謂曰郎家何在而獨行在此􅁘師偽答曰莊臨於此有時而戲夫人食之又賜錢五百師雖幼而有識恐人取其錢乃盡解衣置之於腰下時日已晚乃尋小逕將投村野遇一老僧獨行而呼師曰小子汝今一身家已破滅將何所適禪師驚愕佇立老僧又曰出家閒曠且無憂畏小子汝欲之乎師曰是所願也老僧因攜其手至桑隂下令禮十方諸佛已因削其髪又解衣裝出袈裟令服之大小稱其體因敎其披著之法禪師既披法服執持收掩有如舊僧焉老僧喜曰此習性使之然其僧將行因指東北曰去此數里有伽藍汝直詣彼謁寺主云我使爾為其弟子也言畢老僧已亡矣方知是聖像也師如言趣寺寺主駭其所以因留之向十年禪師已洞曉經律定於禪寂遇唐室中興求瑯琊王後師方謂寺僧言之寺僧大駭因出詣岐州李使君師從父也見之悲喜因舍之於家欲以狀聞師固請不可使君有女年與禪師侔見禪師恱之願致欵曲師不許月餘㑹使君夫人出女盛服多將使者來逼之師固拒萬端終不肯師紿曰身不潔浄沐浴待命女許諾方令沐湯師候女出因之噤門女還排户不果入自牖窺之師方持削髪刀顧而言曰以有此根故為慾逼今既除此何逼之為女懼止之不可遂斷其根棄於地而師亦氣絶户既閉不可開女惶惑不知所出俄而府君夫人到女言其情使君令破户師已復蘇命良醫至以火燒地既赤苦酒沃之坐師於燃地傅以膏數月疾愈使君奏禪師是瑯琊王子有敕命驛置至京引見慰問賞賜優給復以為王禪師曰父母非命鄙身殘毁今還俗為王不願也中宗降敕令禪師廣領徒衆尋山置蘭若恣聽之禪師性好終南山因居于興法寺又於諸谷口造禪菴蘭若凡數處或入山數十里從者僧俗常數千人迎候瞻侍甚於卿相禪師既登道果常先言將來事是以人益歸之開元二十三年六月二十三日無疾而終先告弟子以修身䕶戒之事言甚切至因臥頭指北方足指南方以手承頭右脇在下遂亡遺命葬於少陵原之南面鑿原為室而封之柩將發異香芬馥狀貌一如生焉車出城門忽有白鶴數百鳴舞於空中五色彩雲徘徊覆車而行數十里所封之處遂建天寶寺弟子輩留而守之出紀聞𤣥覽唐大厯末禪師𤣥覽住荆州陟屺寺道髙有風韻人不可得而親張璪常畫古松於齋壁符載賛之衛𧰼詩之亦一時三絶也悉加堊焉人問其故曰無事疥吾壁也僧那即其甥為寺之患發瓦探鷇壞牆熏䑕覽未嘗責之有弟子義詮布衣一食覽亦不稱之或有怪之乃題詩於竹上曰欲知吾道廓不與物情違大海從魚躍長空任鳥飛忽一夕有一梵僧排户而進曰和尚速作道場覽言有為之事吾未常作僧熟視而出反手闔户門扄如舊覽笑謂左右曰吾將歸矣遂遽浴訖隱几而化出酉陽雜俎法將長安有講湼槃經僧曰法將聰明多識聲名藉甚所在日講僧徒歸之如市法將僧到襄陽襄陽有客僧不持僧法飲酒食肉體貌至肥所與交不擇人僧徒鄙之見法將至衆僧迎而重之居處精華盡心接待客僧忽持斗酒及一蒸㹠來造法將法將方與道俗正開義理共志心聽之客僧逕持酒殽謂法將曰講說勞苦且止說經與我共此酒肉法將驚懼但為推讓客僧因坐户下以手擘㹠裹而飡之舉酒滿引而飲之斯須酒肉皆盡因登其牀且寢既夕講經僧方誦湼槃經醉僧起曰善哉妙誦然我亦嘗誦之因取少草布西牆下露坐草中因講湼槃經言詞明白落落可聽講僧因輟誦聽之每至義理深微常不能解處聞醉僧誦過經心自開解比天方曙遂終湼槃經四十卷法將生平所疑一朝散釋都盡法將方慶希有布座禮之比及舉頭醉僧已滅諸處尋訪不知所之出紀聞太平廣記卷九十四
