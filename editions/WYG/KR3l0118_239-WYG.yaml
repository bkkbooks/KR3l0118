body:
  text: 太平廣記卷二百三十九諂佞一安祿山成敬竒陳少游裴延齡薛盈珍畫鵰馮道明杜宣猷李德裕韓全誨蘇循蘇楷樂朋龜孔謙安祿山𤣥宗命皇太子與安祿山相見祿山不拜因奏曰臣胡人不閑國法不知太子是何官𤣥宗曰是儲君朕萬歲後代朕君汝者祿山曰臣愚比者只知有陛下不知有太子左右令拜祿山乃拜𤣥宗嘉其志誠尤憐之出談賓錄成敬奇成敬奇有俊才文章立而可就為大理正與姚崇有姻親崇嘗寢疾敬竒造宅省焉對崇涕泣懐中寘生雀數枚一一持出請崇手執而後放之祝云願令公速愈崇勉强從之敬竒既去崇惡其諛媚謂其子弟曰此淚從何而來自兹不復接遇出大唐新語陳少遊唐陳少遊檢挍職方員外郎充回紇使檢挍官自少遊始也而少遊為理長于權變峕推幹濟然厚歛財貨交結權右尋除管桂觀察使峕中官董秀用事少遊乃宿于里候下直際獨謁之從容曰七郎家中人數幾何每日所費幾何秀曰乆沗近職累重又屬峕物騰貴一月須千餘貫少遊曰據此所費俸錢不能足其數此外常須求于人方可取濟倘有輸誠供應者但留心庇䕶之固易為力耳少遊雖不才請以一身獨備七郎之費用每歲願送錢五萬貫今見有大半請即收受餘到官續送免費心勞慮不亦可乎秀既踰于所望忻悦頗甚因與之相厚少遊言訖泣曰南方毒瘴深僻但恐不得生還再覩顔色秀遽曰中丞羙才不當遠官從容旬日冀竭蹇分峕少遊已納賄于元載子仲武矣秀載内外引薦數日拜宣歙觀察使改浙東觀察使遷淮南節度使十餘年間三總大藩徴求貨易且無虛日歛積財寶累巨萬億視文雅清流之士蔑如也初結元載每歲饋十萬貫後以載漸見忌少遊亦稍疎之及載子伯和貶官揚州少遊外與之深交而隂使人伺其過密以上聞代宗以為忠待之益厚關播嘗為少遊賓客盧杞早年與之同在僕固懐恩幕府故驟加其官徳宗幸奉天後遂奪包佶財摠八百萬貫復使叅謀温述送欵于李希烈曰濠舒廬等州已令罷壘韜戈捲甲佇候指揮後鑾輿歸京包佶入朝具奏財賦事状少遊上表以所取財皆是供軍費用今請據數郤納乃重徴管内百姓以進後劉洽收汴州得希烈起居注某月日陳少遊上表歸順少遊聞之慚愧而卒出談賓錄裴延齡唐裴延齡累轉司農少卿尋以本官權判度支自揣不通食貨之務乃設鈎距召度支老吏與謀以求恩顧乃奏言天下出入錢物新陳相因而常不减六七千萬貫唯在一庫差殊散失莫可知之請于左藏庫中分置别建欠負耗賸等庫及季庫月給納諸色錢物徳宗從之但貴欲張名目以惑上聽其實錢物更無増加唯虚費簿書人吏又奏請令京兆府兩税青苗錢市草百萬團送苑中宰臣議以為若市草百萬團則一方百姓自冬歴夏搬運不了又妨奪農務其事得止京西有汙池卑濕處蘆葦叢生焉不過數畝延齡忽奏云廐馬冬月合在槽櫪秣飼夏中即須有牧放處臣近尋訪得長安咸陽兩縣界有陂地百頃請以為内廐牧馬之地且去京城十數里徳宗信之言于宰臣宰臣堅執云恐必無此及差官閲視悉皆虛妄延齡既慚且怒又因對敭徳宗曰朕所居浴堂殿院一栿以年多故致損壊而未能換延齡曰宗廟事重殿栿事輕陛下自有本分錢物徳宗驚曰本分錢何名也曰此是經義愚儒常才不足與言陛下正合問臣臣能知之准禮經云天下賦税分為三分一分充乾豆一分充賓客一分充君之庖厨乾豆供宗廟也今陛下奉宗廟雖至嚴至豐至厚亦不能用一分財賦也只如鴻臚禮賓諸國番客至于回紇馬價用一分錢物尚有􅑿羡甚多況陛下御膳宫厨皆極簡儉所用外以賜百官充俸料餐錢等猶未能盡據此而言庖厨之用其數尚少皆陛下本分也用修十殿亦不合疑何況一栿上曰經義如此人未曾言頷之而已後因計料造神龍寺須用長七十尺松木延齡奏云臣近于同州檢得一谷有數千株皆長七八十尺徳宗曰人云開元天寶中近處求覔五六丈木尚未易得皆須于嵐勝州採造如今何為近處便有此木延齡對曰賢者珍寶異物皆處處有之但遇聖君即出今此木生自關輔蓋為聖君豈開元天寶合得有也延齡既鋭情于苛刻剝下附上為功奏對之際皆恣騁詭怪虛妄他人莫敢言者延齡言之不疑亦人之所未嘗聞上頗欲知外事故特優遇之出談賓錄薛盈珍姚南仲為鄭滑節度使峕監軍薛盈珍怙勢于奪軍政南仲不從數為盈珍搆讒于上上頗疑之後盈珍遣小使程務盈馳表奏南仲不法讒搆頗甚南仲禆將曹文洽峕奏事赴京師竊知盈珍表中語文洽私懐怒遂晨夜兼道追務盈至長樂驛及之與同舍宿中夜殺務盈沉盈珍表于厠中乃自殺日旰驛吏開門見血流滿地旁得文洽二緘一緘告盈珍罪一緘表理南仲寃且陳謝殺務盈徳宗聞其事頗駭異南仲慮釁深遂入朝初至上曰盈珍擾卿甚也南仲曰盈珍不擾臣自隳陛下法耳如盈珍軰所在雖羊杜復生撫百姓御三軍必不成愷悌父母之政師律善陣之制矣徳宗黙然乆之出談賓錄畫雕裴延齡恃恩輕躁同列懼之唯顧少連不避延齡嘗畫一雕羣鳥噪之以獻徳宗知衆怒益信之出談賓錄馮道明雍陶蜀人也以進士登第後稍薄于親黨其舅雲安劉敬之罷舉歸三岐素事篇章讓陶不寄書曰山近衡陽雖少鴈水連巴蜀豈無魚陶得詩愧赧方有狐首之思後為簡州牧自比之謝宣城柳吳興也賓至則折挫之閽者亦怠投贄者稀得見忽有馮道明下第請謁云與員外故舊閽者以道明言啓之及引進陶呵曰與君昩平生何言相識道明曰誦員外詩仰員外徳詩集中日得見何乃隔平生也遂吟曰立當青草人先見行近白蓮魚未知又曰江聲秋入寺雨氣夜侵樓又曰閉門客到常疑病滿院花開不似貧陶聞吟欣然待道明如曩昔之交君子以雍君矜持而好媚馮子匪藝而求知其兩違之出雲溪友議杜宣猷杜宣猷大夫自陶中除宣城中官之力也諸道每歲進閹人所謂私白者閩為首焉且多任用以故大閹以下桑梓多係于閩峕以為中官藪澤宣猷既至每寒食節輒散遣將吏荷挈食物祭于諸閹塜墓所謂灑掃者也故峕號為敕使看墓出玉泉子李徳裕李徳裕鎭揚州監軍使楊欽義追入必為樞近而徳裕致禮皆不越尋常欽義心銜之一日中堂設宴更無他賓而陳設寶器圖畫數床皆殊絶一席祗奉亦竭情禮宴罷皆以贈之欽義大喜過望旬日西行至汴州有詔卻令監淮南欽義即至具以前峕所贈歸之徳裕􅀏曰此無所直奈何拒焉悉卻與之欽義心感數倍後竟作樞密使唐武宗一朝之柄皆欽義所致也出幽閒鼓吹韓全誨唐昭宗以宦官怙權驕恣難制常有誅剪之意宰相崔𦙍嫉忌尤甚上敕𦙍凡有密奏當進囊封勿于便殿面奏以是宦官不能知韓全誨等乃訪京城羙女數十以進密求宫中隂事天子不之悟𦙍謀漸洩中官以重賂甘言請藩臣為城社視崔𦙍皆裂肘因伏臘宴聚則相向流涕辭㫖諂諛㑹汴人㓂同華知崔𦙍之謀於是韓全誨引禁軍陳兵仗逼帝幸鳯翔他日崔𦙍與梁祖恊謀以誅閹官未乆禍亦及之致族絶滅識者歸罪于崔𦙍先是其季父安潛常謂所親曰滅吾族者必緇兒也緇兒即𦙍小字河東晉王李克用聞𦙍所為謂賓佐曰賊為虐者其崔𦙍乎破國亡家必在此人也出北夢瑣言蘇循唐末尚書蘇循諂媚茍且梁太祖鄙之他日至并州謁晉王峕張承業方以匡復為意而循忽獻晉王畫敕筆一對承業愈鄙薄之出唐書蘇楷昭宗先諡聖穆景文孝皇帝廟號昭宗起居即蘇楷等駁議請改為恭靈荘閔皇帝廟號襄宗蘇楷者禮部尚書蘇循之子乾寜二年應進士楷人才寝陋兼無徳行昭宗惡其濫進率先黜落由是怨望專幸邦國之災其父循奸邪附㑹無譽于峕故希㫖茍進梁祖識其險詖滋不悦大為敬翔李振所鄙梁祖建號詔曰蘇楷高貽休蕭聞禮皆人才寝陋不可塵汚班行並停見任放歸田里蘇循可令致仕河朔士人目蘇楷為衣冠梟獍出北夢瑣言樂朋龜舊例士子不與内官交遊十軍軍容田令孜擅囘天之力唐僖皇播遷行至洋源百官未集缺人掌誥樂朋龜侍郎亦及行在因謁中尉仍請中外由是薦之充翰林學士張濬相自處士除起居郎亦出令孜之門皆申中外之敬洎車駕到蜀朝士畢集一日中尉為宰相開筵學士洎張起居同預焉張公恥于對衆設拜乃先謁中尉便施謝酒之敬中尉訝之俄而賓至即席坐定中尉白諸官曰某與起居清濁異流曽䝉中外既慮玷辱何憚改更今日暗地謝酒即不可張公慚懼交集自此甚為羣彦所薄樂公舉進士初陳啓事謁李昭侍郎自媒云别于九經書史及老荘行都賦外著八百卷書請垂比試誠有學問也然于制誥不甚簡當峕人或未之可也出北夢瑣言孔謙後唐明宗即位之初誅租庸使孔謙歸徳軍節度使元行欽鄧州節度温韜太子少保叚凝汴州麴務辛廷蔚李繼宣等孔謙魏州孔吏目荘宗圖覇以供饋軍食謙有力焉既為租庸使曲事嬖倖奪宰相權專以聚歛為意剝削萬端以犯衆怒伏誅元行欽為荘宗愛将出入宮禁曽無間隔害明宗之子從景以是伏誅叚凝事梁以奸佞進身至節將末年綰軍權束手歸朝温韜㓙惡發掘西京陵寝荘宗中興不証其罪厚賂伶官閹人與叚凝皆賜國姓或擁旄鉞明宗採衆議而誅之辛廷蔚開封尹王瓚之牙將也朱友貞峕廷蔚依瓚勢曲法亂政汴人惡之李繼宣汴將孟審澄之子亡命歸荘宗劉皇后畜為子峕宮掖之間穢聲流聞此四㓙帝在藩邸峕惡其為人故皆誅之荘宗皇帝為唐雪恥號為中興而温韜毁發諸帝陵寝宜加大辟而賜國姓付節旄由是知中興之説謬矣出北夢瑣言太平廣記卷二百三十九
