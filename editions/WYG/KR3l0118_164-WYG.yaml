body:
  text: 太平廣記卷一百六十四名賢郭林宗李膺徐孺子鄭𤣥蔡邕崔仁師張文瓘虞世南馬周員半千嚴安之蕭穎士蕭嵩于休烈李廙鄭絪獨孤郁趙逢諷諫晏子優旃東方朔簡雍斛律豐樂髙季輔李景伯蘇頲黄幡綽李絳名賢郭林宗郭林宗來遊京師當還鄉里送車千許乘李膺亦在焉衆人皆詣大槐客舍而别獨膺與林宗共載乘薄笨車上大槐坂觀者數百人引領望之𦕈若松喬之在霄漢出商芸小説李膺李膺恒以疾不送迎賓客二十日乃一通客惟陳仲弓來輒乘轝出門迎之出膺家錄李元禮謖謖如勁松下風膺居陽城時門生在門下者恒有四五百人膺每作一文出手門下共爭之不得墮地陳仲弓初令大兒元方來見膺與言語訖遣㕑中食元方喜以為合意當復得見焉出商芸小説膺同縣聶季寶小家子不敢見膺杜周甫知季寶不能定名以語膺呼見坐置砌下牛衣上一與言即決曰此人當作國士卒如其言出商芸小説膺為侍御史青州凡六郡唯陳仲舉為樂安視事其餘皆病七十縣並棄官而去其威風如此出商芸小説膺坐黨事與杜密荀翊同繫新汲縣獄時歲日翊引杯曰正朝從小起膺謂曰死者人情所惡今子無恡色者何翊曰求仁得仁又誰恨也膺乃嘆曰漢其亡矣漢其亡矣夫善人天地之紀而多害之何以存國出李膺家錄徐孺子陳仲舉雅重徐孺子為豫章太守至便欲先詣之主簿曰羣情欲令府君先入拜陳曰武王軾商容之閭席不暇暖吾之禮賢有何不可出商芸小説徐孺子年九嵗嘗月下戲人語之若令月無物極當明邪徐曰不爾譬如人眼中有童子無此如何不暗出世説鄭𤣥鄭𤣥在徐州孔文舉時為北海相欲其返郡敦請懇惻使人繼踵又教曰鄭公久遊南夏今艱難稍平儻有歸來之思無寓人於室毁傷其籓垣林木必繕治牆宇以俟還及歸融吿僚屬昔周人尊師謂之尚父今可咸曰鄭君不得稱名也𡊮紹一見𤣥歎曰吾本謂鄭君東州名儒今乃是天下長者夫以布衣雄世斯豈徒然哉及去紹餞之城東必欲𤣥醉會者三百人皆使離席行觴自旦及暮計𤣥可飲三百餘杯而温克之容終日無怠出商芸小説蔡邕張衡死月蔡邕母始懷孕此二人才貌甚相𩔖時人云邕是衡之後身初司徒王允數與邕會議允詞常屈由是銜邕及允誅董卓并收邕衆人爭之不能得太尉馬日磾謂允曰伯喈忠直素有孝行且曠世逸才多識漢事當定十志今子殺之海内失望矣允曰無蔡邕獨當無十志何損遂殺之出商芸小説東國崇敬邕不言名咸稱蔡君兖州陳留並圖畫蔡邕形像而頌之曰文同三閭孝齊參騫出邕别傳崔仁師唐崔仁師為度支郎中奏財物數千言手不執本太宗怪之令杜正倫齎本對唱一無所誤出神異錄張文瓘宰相以政事堂供饌彌美議減之張文瓘曰此食天子所重以機務待賢才吾輩若不任其職當自陳乞以避賢路不宜減削公膳以邀求名譽國家所費不在於此茍有益於公道斯亦不為多也出談賔錄虞世南太宗嘗出行有司請載副書以從帝曰不須虞世南在此行祕書也太宗稱世南博聞德行書翰詞藻忠直一人而兼是五善太宗聞世南薨哭之慟曰石渠東觀之中無復人矣世南之為祕書於省後堂集羣書中事可為文用者號為北堂書抄今此堂猶存而書盛行於代出國朝雜事馬周馬周西行長安至新豐宿於逆旅主人唯供諸商販而不顧周遂命酒悠然獨酌主人翁深異之及為常何陳便宜二十餘事太宗怪其能問何何答曰此非臣發慮乃臣家客馬周也太宗即日召之未至間遣使催促者數四及謁見語甚悦授監察御史奏罷傳呼置皷每擊以驚衆時人便之遷中書令周病消渴彌年不瘳時駕幸翠微宮敕求勝地為周起宅名醫内使相望不絶每令常食以御膳供之太宗躬為調藥皇太子臨問出談賔錄員半千員半千本名餘慶與王義方善謂曰五百年一賢足下當之矣遂改為半千髙宗御武成殿召舉人問天陣地陣人陣如何半千曰師出以義有若時雨天陣也兵在足食且耕且戰地陣也卒乘輕利將帥和睦人陣也上竒之充土蕃使則天即位留之曰境外不足煩卿撰明堂新禮上之又撰封禪壇碑十二首遷正諫大夫兼控鶴供奉半千以古無此名又授者皆薄徒請罷之由是忤㫖出廣德神異錄嚴安之𤣥宗御勤政樓大酺縱士庶觀看百戲競作人物填咽金吾衞士白棒雨下不能制止上患之謂髙力士曰吾以海内豐稔四方無事故盛為宴欲與百姓同歡不知下人喧亂如此汝有何方止之力士奏曰臣不能也陛下試召嚴安之處分打場以臣所見必有可觀也上從之安之至則周行廣場以手板畫地示衆人約曰踰此者死以是終五日酺宴咸指其畫曰嚴公界無一人敢犯者出開天傳信記蕭穎士蕭頴士文章學術俱冠詞林負盛名而湮沈不遇常有新羅使至云東夷士庶願請蕭夫子為國師事雖不行其聲名逺播如此出翰林盛事蕭嵩蕭嵩為相引韓休同列及在相位稍與嵩不協嵩因乞骸骨上慰嵩曰朕未厭卿卿何庸去乎嵩俯伏曰臣待罪宰相爵位已極幸陛下未厭臣得以乞身如陛下厭臣臣首領不保又安得自遂因隕涕上為之動容曰卿言切矣朕思之未決卿歸私第至夕當有使如無使旦日宜如常朝謁及日暮命力士詔嵩曰朕惜卿欲固留而君臣終始貴全大義亦國家之美事也今除卿右丞相是日荆州始進黄柑上以素羅帕包其二以賜之出柳氏史于休烈于休烈至性真慤機鑒敏悟肅宗踐阼休烈自中都赴行在拜給事中遷太常少卿知禮儀使中原蕩覆文物未備休烈獻五代論肅宗甚嘉之遷工部在朝凡三十餘年厯掌清要家無擔石之蓄恭儉温仁未嘗見喜愠於顔色而親賢下士推轂後進雖位重年髙曾無倦色篤好書籍手不釋卷出談賔錄李廙尚書左丞李廙有清德其妹劉晏妻也晏方秉權嘗造廙延至寢室見其門簾甚弊乃令潛度廣狹以竹織成不加緣飾將以贈廙三㩦至門不敢發言而去出國史補鄭絪順宗風噤不言太子未立牛美人有異志上乃召學士鄭絪於小殿令草立儲宮德音絪搦管不請而書立嫡以長四字跪而呈上順宗深然之乃定出國史補獨孤郁獨孤郁權相之子壻也厯掌内外綸誥有美名憲宗歎曰我女壻不如德輿女壻出國史補趙逢太傅致仕趙逢仕唐及梁薨於天成中文學德行風神秀異號曰玉界尺揚厯臺省入翰林御史中丞梁時同平章事時以兩登廊廟四退丘園縉紳仰之出北夢瑣言諷諫晏子齊景公時有一人犯罪景公怒令支解曰有敢救者誅晏子遂左手提犯者頭右手執刀仰問曰自古聖主明君支解人從何而始公遽曰捨之寡人過也出獨異志優旃秦優旃善為笑言然合於道始皇嘗議欲大􅁐囿東至函谷西至陳倉優旃曰善多縱禽獸於其中寇賊從東方來令麋鹿觸之足矣始皇乃止及二世立欲漆其城優旃曰善雖百姓愁費然大佳哉漆城蕩蕩寇來不能上即欲漆之極易難為䕃室二世笑之而止出啓顔錄優旃侍始皇立於殿上秦法重非有詔不得輒移足時天寒雨甚武士陛楯立於庭中優旃欲救之戲曰陛楯郎汝雖長雨中立我雖短殿上幸無濕始皇聞之乃令徙立於廡下出獨異志東方朔漢武帝欲殺乳母母告急於東方朔曰帝怒而傍人言益死之速耳汝臨去但屢顧我當設竒以激之乳母如其言朔在帝側曰汝宜速去帝今已大豈念汝乳哺之時恩邪帝愴然遂赦之出獨異志簡雍蜀簡雍少與先主有舊隨從周旋為昭德將軍時天旱禁酒釀者刑吏於人家索得釀具論者欲令與造酒者同罰雍從先主遊觀見一男子路中行告先主曰彼人欲淫何以不縛先主曰卿何以知之雍對曰彼有淫具與欲釀何殊先主大笑而原捨釀者罪出啓顔錄斛律豐樂北齊髙祖嘗宴羣臣酒酣各令歌樂武衞斛律豐樂歌曰朝亦飲酒醉暮亦飲酒醉日日飲酒醉國計無取次上曰豐樂不諂是好人也出談藪髙季輔唐髙季輔切陳得失太宗特賜鍾乳一劑曰卿進藥石之言故以藥石相報尋更賜金背鏡一面以表其清鑒出談賔錄李景伯景龍中中宗游興慶池侍宴者逓起歌舞并唱迴波詞方便以求官爵給事中李景伯亦唱曰㢠廻波爾時酒巵微臣志在箴規侍宴已過三爵諠譁竊恐非宜於是乃罷坐出國史異纂蘇頲𤣥宗時以林邑國進白鸚鵡慧利之性特異常者因暇日以金籠飾之示於三相上再三美之時蘇頲初入相每以忠讜勵已因前進曰禮云鸚鵡能言不離飛鳥臣為陛下深以為志出松窻錄黄幡綽唐𤣥宗問黄幡綽是勿兒得人憐是勿兒猶言何兒也對曰自家兒得人憐時楊妃寵極中宮號祿山為子肅宗在東宮常危上聞幡綽言俛首久之出因話錄李絳憲宗時中官吐突承璀有恩澤欲為上立德政碑碑屋已成磨礱石訖請宣索文時李絳為翰林學士奏曰大人者與天地合其德日月合其明無立碑紀美之事恐取笑夷夏上深然之遽命拆屋廢石承璀奏碑屋用功極多難便毁拆欲堅其請上曰急索牛拽倒其納諫如此出盧氏雜説太平廣記卷一百六十四
