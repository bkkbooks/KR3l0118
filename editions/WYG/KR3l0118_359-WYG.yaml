body:
  text: 太平廣記卷三百五十九宋李昉等編妖怪一武都女東方朔䨇頭雞張遺翟宣臧仲英頓邱人王基應璩公孫淵諸葛恪零陵太守女滎陽廖氏陶璜趙王倫張騁懐瑶裴楷衛瓘賈謐劉嶠王敦王獻劉寵桓温府郭氏武都女武都有一丈夫化為女子美而豔葢女精也蜀王納為妃不習水土欲去王留之乃為東平之歌以樂之無幾物故王哀之乃遣五丁之武都擔土為妃作塚葢地數畝髙七丈上有石鏡今成都北商武擔是也出華陽國志東方朔漢武帝東遊至函谷闗有物當道其身長數丈其狀象牛青眼而曜精四足入土動而不徙百官驚懼東方朔乃請酒灌之灌之數十斛而消帝問其故曰此名怪哉憂患之所生也此必是秦之獄地不然罪人徒作地聚夫酒忘憂故能消之也帝曰博物之士至於此乎出搜神記雙頭雞漢太初二年大月氏貢雙頭雞四足一尾鳴則俱鳴武帝致于甘泉館更有餘雞嫓之得種𩔖也而不能鳴非吉祥也帝乃送還西域至西闗雞返顧望漢宫而哀鳴言曰三七末雞不鳴犬不吠宫中荆棘亂相移當有九虎争為帝至王莽篡位將軍九虎之號其後喪亂相継宫掖中並生蒿􅁄家無雞犬此雞未至月支乃飛而聲似鵾雞翺翔雲裏出拾遗錄張遺桂陽太守江夏張遺字叔髙𨼆居陵田中有大樹十圍餘盖六畝枝葉扶踈蟠地不生谷草遣客斫之斧數下樹大血出客驚怖歸白叔髙叔髙怒曰老樹汗出此等何恠因自斫之血大流出叔髙更斫之又有一空處白頭老翁長四五尺突出稱叔髙叔髙以刀迎斫殺之四五老翁並出左右皆驚怖伏地叔髙神慮恬然如舊諸人徐視之似人非人似獸非獸此所謂木石之恠䕫魍魎者乎其伐樹年中叔髙辟司空御史兖州刺史出法苑珠林翟宣王莽居攝東郡太守翟義知其將篡也謀舉兵兄宣教授諸生滿堂羣鴈數十中庭有狗從而齧之皆驚比救之皆斷頭狗走出門求不知處宣大惡之數日莾夷其三族出搜神記臧仲英扶風臧仲英為侍御史家人作食有塵垢在焉炊熟不知釡處兵弩自行火從箧中起衣盡燒而箧簏如故兒婦女婢使一旦盡亡其鏡數日後從堂下投庭中言還汝鏡女孫年四嵗亡失求之不知處二三日乃於圃中糞下嗁若此非一許季山卜之曰家當有青狗内中御者名葢喜與共為之誠欲絶之殺其狗遣葢喜歸鄉里從之遂絶仲英遷太尉長史魯相出搜神記頓丘人黄初中頓丘界騎馬夜行者見道中有物大如兎兩眼如鏡跳梁􅃒馬令不得前人遂驚懼墮馬魅便就地犯之人懼驚怖良久得解遂失魅不知所往乃更上馬前行數里逢一人至問訊因説向者之事變如此今相得甚懽人曰我獨行得君為伴快不可言君馬行疾前我在後相隨也遂共行乃問向者物何如乃令君如此怖對曰身如兎眼如鏡形狀可惡人曰試顧我眼又觀視之猶復是也魅就跳上馬人遂墮地怖死家人恠馬獨歸即行推索於道邉得之宿昔乃蘇説事如此狀出搜神記王基安平太守王基家數有恠使管輅筮之卦成輅曰君之卦當有一賤人生一男墮地便走入竈中死又牀上當有一大蛇銜筆大小共視須臾便去又烏來入室與燕鬭燕死烏去有此三怪王基大驚曰精義之致乃至於此幸為處其吉㓙輅曰非有他禍直以官舍久逺魑魅魍魎共為妖耳兒生入灶宋無忌之為也大蛇者老書佐也烏與燕鬭者老鈴下也夫神明之正者非妖能亂也萬物之變非道所止也久逺之浮精必能之定數也今卦中不見其㓙故知假託之𩔖非咎妖之徵昔髙宗之鼎非雉所雊太戊之階非桑所生然而妖並至二年俱興安知三事不為吉祥願府君安神養道勿恐於神姦也後卒無他遷為安南將軍出搜神記應璩朱建平善相相應璩曰君年六十二位為常伯先此一年當獨見白狗也璩年六十一為侍中直内省忽見白狗衆人悉不見乃急遊觀飲讌自娱六十二卒出魏志公孫淵魏司馬太傅懿平公孫淵斬淵父子先時淵家有犬著朱幘綘衣襄平城北市生肉有頭目無手足而動揺占者曰有形不成有體無聲其國滅亡出搜神記諸葛恪諸葛恪為丹陽太守出獵兩山之間有物如小兒伸手欲引人恪令伸之仍引去故地去故地即死既而叅佐問其故以為神明恪曰此事在白澤圖内曰兩山之間其精如小兒見人則伸手欲引人名曰俟引去故地則死無謂神明而異之諸君偶未之見耳出搜神記零陵太守女零陵太守史闕其名有女悦書吏乃宻使侍婢取吏盥殘水飲之遂有孕十月而生一子及晬太守令抱出門兒匍匐入吏懐吏推之仆地化為水窮問之省前事太守遂以女妻其吏出搜神記滎陽廖氏滎陽郡有一家姓廖累世為蠱以此致富後取新婦不以此語之曽遇家人咸出唯此婦守舍忽見屋中有大缸婦試發之見有大蛇婦乃作湯灌殺之及家人歸婦具白某事舉家驚惋未幾其家疾疫死亡略盡又有沙門曇遊戒行清苦時剡縣有一家事蠱人噉其食飲無不吐血而死曇遊曽詣之主人不食遊便呪焉見一雙蜈蚣長尺餘於盤中走出因飽食而歸竟無他出靈鬼志及搜神記陶璜盧王將陶璜掘地於土穴中得一物白色形似蠶長數丈大十圍餘蝡蝡而動莫能名剖腹内如猪肪遂以為􅌜甚香美璜啗一杯於是三軍盡食之臨海異物志云土内正黒如小兒臂長大五寸中有腸無目有三十足如釵股大者一頭長尺餘中肉味又有陽遂虫其背青黒腸下白有五色長短大小皆等不知首尾所在生時體軟死則乾脆出感應經趙王倫永康初趙王倫篡位京師得一鳥莫能名倫使人持出周旋城邑以問人積日有一小兒見之自言曰鵂鶹即還白倫倫使更求又見之乃將入宫宻籠鳥并閉小兒明日視之封閉如故悉不見時倫有目瘤之疾故言鵂鶹倫尋被誅出廣古今五行記張騁晉大安中江夏功曹張騁乗車周旋牛言曰天下方亂吾甚極為乗我何之騁及從者數人皆驚懼因紿之曰令汝還勿復言乃中道還至家未釋駕牛又言曰歸何也騁益憂懼袐而不言安樂縣有善卜者騁從之卜之曰大㓙非一家之禍天下將有起兵一郡之内皆破亡乎騁還家牛又人立而行百姓聚觀其秋張昌賊起先略江夏誑曜百姓以漢祚復興有鳯凰之瑞聖人當世從軍者皆綘抹額以彰火徳之祥百姓波蕩從亂如歸騁兄弟並為將軍都尉未期而敗於是一郡殘破死傷者半而騁家族矣京房易妖曰牛能言如其言占吉㓙出搜神記懐瑶晉元康中吳郡婁縣懐瑶家聞地中有犬子聲隱隱其聲上有小穿大如螾林以杖刺之入數尺覺如有物及掘視之得犬雌雄各一穴猶未開形大如常犬也哺之而食左右咸往觀焉長老或云此名犀犬得之者家富昌宜當養活以為目未開還置穿中覆以磨礱宿昔發視左右無孔而失所在瑶家積年無他福禍也出搜神記裴楷晉裴楷家中炊黍在甑或變為拳或化為血或作蕪菁子未幾而卒出五行記衞瓘衞瓘家人炊飯墮地悉化為螺出足而行尋為賈后所誅出五行記賈謐賈謐字長淵元康九年六月夜暴雷電謐齋柱陷壓毁牀帳飄風吹其服上天數百丈久乃下出異苑劉嶠永嘉末有劉嶠居晉陵其兄蚤亡嫂寡居夜嫂與婢在堂中眠二更中嫂忽大哭走往其房云嫂屋中及壁上奇怪不可看劉嶠便持刀然火將婦至見四壁上如人面張目吐舌或虎或龍千變萬形視其面長丈餘嫂即亡出廣古今五行記王敦元帝時王敦在於武昌鈴下儀仗生花如蓮花五六日而萎落干寳曰榮華之盛如狂花之不可久也敦以逆命自死加戮其屍焉出廣古今五行記王獻王獻失鏡鏡在罌中罌纔數寸而鏡尺餘以問郭璞曰此乃邪魅所為使燒車轄以擬鏡鏡即出焉出搜神記劉寵東陽劉寵字道𢎞居姑孰毎夜門庭自有血數斗不知所從來如此三四日後寵為折衝將將軍見遣北征將行而炊飯盡變為虫其家人蒸炒亦為虫火愈猛而虫愈壯寵遂北征軍敗於檀邱為徐龕之所殺出搜神記桓温府叅軍穆帝末年桓温府叅軍夜坐忽見屋梁上有伏兎張目切齒向之兎來轉近以刀砟之見正中兎而實反傷膝流血復以刀重砟又還自傷㚔刀不利不至於死出幽明録郭氏畢修之外祖母郭氏嘗夜獨寢喚婢應而不至郭屢喚猶爾後聞塌牀聲甚重郭厲聲呵婢又應諾諾不至俄見屏風上有一面如方相兩目如升光明一屋手中如簸箕指長數寸又挺動其耳目郭氏道精進一心至念凡物乃去久之婢輩悉來云向欲應如有物鎮壓之者體輕便來出幽明記太平廣記卷三百五十九
