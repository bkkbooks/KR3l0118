body:
  text: 太平廣記小説家𩔖二異聞之屬提要臣等謹案太平廣記五百卷宋李昉奉勅監修同修者扈蒙李穆湯悦徐鉉宋白王克貞張洎董淳趙隣陳鄂吕文仲吳淑十二人也以太平興國三年八月表進六年正月𠡠雕板印行凡分五十五部所采書三百四十五種古来軼聞𤨏事僻笈遺文咸在焉卷帙輕者往往全部收入盖小説之家淵海也後以言者謂非後學所急收板貯之太清樓故崇文總目不載鄭樵號為博洽亦未見其書通志藝文畧中遂謂太平廣記乃太平御覽中别出廣記一書専記異事悞矣其書雖多談神怪而采摭繁富名物典故錯出其間詞章家恒所取資又如皇覽三輔决録三國典畧晉陽秋晉中興書齊春秋唐歴益部耆舊傳汝南先賢傳㑹稽先賢傳古文𤨏語琴清英世語符子金樓子諸書世所不傳者斷簡殘編尚間存其什一尤足貴也此本為明嘉靖中右都御史談愷所刋卷頁間有闕佚無從校補今亦仍之焉乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c1201d848fa35c8186001d969b35c653b0f7349395fbe7e7bbaae09861e90878
