body:
  text: 太平廣記卷二百五十一詼諧七周愿劉禹錫袁徳師李程楊虞卿沈亞之張祜交廣客盧肇章孝標南卓王智興盧發裴休馮袞鄰夫關圖楊𤣥翼裴慶餘趙崇鄭光業周愿唐周愿嘗奉使魏州節度使田季安引之連轡路見一驢極肥季安指示闕聲答曰總是小闕建徳李巽性闕知河西鹽鐵留事將至李戒從事曰闕待之及愿至數讌李公寒闕無由得發一日饌親賔愿亦預焉李闕落拓不事遍問舊别墅及家童有之闕書有笞者悉云貨却李責曰未官家貧産業從貨何闕書籍古畵店彼除惆悵久之復問一曰有一本虞永興手書尚書此又在否某人慙懼不敢言貨云蹔將典錢愿忽言曰此尚書大迍厄李都忘先拒其詼諧遂問曰尚書何迍愿曰已遭堯典舜典又遭此兒郎典李之顔大開自更不拒闕又陸長源以舊徳爲宣武軍行司馬韓愈爲巡官同在使幕或譏年輩相懸愿曰大蟲老䑕俱爲十二屬何怪之有旬日布於長安出國史𥙷劉禹錫唐劉禹錫改連州替髙寓寓後入羽林將軍自京附書曰以承眷輒舉自代矣劉答書云昔有一話曾有老嫗山行見大蟲羸然跬歩而不進若傷其足嫗目之而虎遂自舉足以示嫗乃有芒刺在掌因爲㧞之俄奮迅闞吼而愧其恩自後擲麋鹿狐兎於庭日無闕焉嫗登垣視之乃前傷虎也因爲親族具言其事而心異之一旦忽擲一死人血肉狼藉嫗乃被村胥訶捕嫗具說其由始得釋縛嫗乃登垣伺其虎至而語曰感矣叩頭大王已後更莫抛死人來也出嘉話𫝊袁徳師唐汝南袁徳師故給事高之子嘗於東都買得婁師徳故園地起書樓洛人語曰昔日婁師徳園今乃袁徳師樓闕李程唐劉禹錫云李二十六丞相程善謔爲夏口日有客辭焉李曰且更住三兩日客曰業已行矣舟船已在漢口李曰但住那漢口不足信其客盧胡掩口而退又因與裳以丞相留守石投店酒飲石收頭子糺者罰之石曰何罰之有程曰汝忙閙時把他堂印將去又何辭焉酒家謂重四爲堂印葢譏石太和九年冬朝廷有事之際而登庸用也出嘉語録楊虞卿唐郎中張又新與䖍州楊虞卿齊名友善楊妻李氏即􅅠相女有徳無容楊未嘗介意敬待特甚張嘗語楊曰我年少成美名不憂仕矣唯得美室平生之望斯足楊曰必求是但與我同好定諧君心張深信之既婚殊不愜心楊秉笏觸之曰君何太癡言之數四張不勝其忿廻應之曰與君無間以情告君君誤我如是何爲癡楊於是厯數求名從宦之由曰豈不與君皆同邪曰然然則我得醜婦君詎不同邪張色解問君室何如我曰特甚張大笑遂如初張既成家乃爲詩曰牡丹一朶直千金將謂從來色最深今日滿欄開似雪一生辜負看花心出本事詩沈亞之唐沈亞之常客游爲小輩所試曰某改令書俗各兩句伐木丁丁鳥鳴嚶嚶東行西行遇飯遇羮亞之答曰如切如磋如琢如磨欺客打婦不當婁羅出摭言張祜唐張祜客淮南幕中赴宴時舍人杜牧爲御史座有妓人索骰子賭酒牧微吟曰骰子逡巡裹手拈無因得見玉纎纎祜應聲答曰但知報道金釵落髣髴還應露指尖祜未識白居易白刺史蘇州始來謁纔相見白謂曰久欽藉甚嘗記得右欵頭詩祜愕然曰舍人何所謂白曰鴛鴦鈿帶抛何處孔雀羅衫付阿誰非欵頭何邪張頫微笑仰而答之曰祜亦嘗記得舍人目連變白曰何也曰上窮碧落下黄泉兩處茫茫皆不見非目連變何邪遂歡宴竟日趙公令狐綯鎮維揚祜常預狎讌公因熟視祜改令曰上水船風太急帆下人須好立祜答曰上水船船底破好看客莫倚柂出摭言交廣客交廣間遊客各求舘帖所至迎接甚厚贐賂每處十千廣帥盧鈞深知其弊凡求舘帖者皆云累路舘驛供菜飯而已有客齎帖到驛驛司依帖供訖客不發驛吏曰恐後更有使客前驛又逺此非宿處客曰食帖如何處分吏曰供菜飯而已客曰菜飯供了還我而已驛吏相顧莫知所爲客又追促無計吏問曰不知而已大於驢小於騾若無可供但還我價直驛吏問每一而已其價幾何客曰三五千驛吏遂歛送耳出盧氏雜記盧肇當盧肇初舉先達或問所來肇曰某袁民也或曰袁州出舉人邪肇曰袁州出舉人亦猶沅江出鼈甲九肋者葢稀矣又肇就江西解試爲試官末送肇有啓事謝曰巨鼇屓贔首冠蓬山試官謂之曰某昨限以人數擠排雖獲申展深慙名第奉凂焉得翻有首冠蓬山之謂肇曰必知明公􅂷問大凡頑石處上巨鼇載之豈非首冠邪一座聞之大笑出摭言章孝標唐章孝標及第後寄淮南李紳詩曰及第全勝十政官金湯鍍了出長安馬頭漸入揚州路爲報時人洗眼看紳亟以一絶答之曰假金只用眞金鍍若是眞金不鍍金十載長安得一第何須空腹用高心出摭言南卓唐郎中南卓與李修古親表昆弟李性迂僻卓常輕之李俄授許州從事奏官勑下時許帥方大讌忽逓到開角有卓與李書遂執書喜白帥曰某與卓二十年表兄弟多蒙相輕今日某忝爲尚書賔幕又奏署勅下遽與某書大竒及啓緘云即日卓老不死生見李修古上除因帥請書看合座大笑李修古慙甚出盧氏雜記王智興唐王智興帶使侍中罷鎮歸京親戚間有以選事求智興論薦固不允遂請致一函與吏部侍郎吏部印尾狀云選人名銜謹領訖智興曰不知侍中也有用處出盧氏雜記盧發唐中書令白敏中鎮荆南杜藴廉問長沙請從事盧發致聘焉發酒酣傲睨公少不懌因改著詞令曰十姓胡中第六胡也曾金閣掌洪爐少年從事誇門地莫向罇前氣色粗發答曰十姓胡中第六胡文章官職勝崔盧暫來闗外分憂寄不稱賔筵語氣粗公極歡而罷出摭言裴休曲江池本秦時豐洲唐開元中疏鑿爲勝境南即紫雲樓芙蓉苑西即杏園慈恩寺花卉環周煙水明媚都人遊賞盛於中和上巳節即錫宴臣僚㑹于山亭賜太常教坊樂池備綵舟唯宰相三使北省官翰林學士登焉傾動皇州以爲盛觀裴休廉察宣城未離京值曲江池荷花盛發同省閣名士遊賞自慈恩寺各屏左右隨以小僕歩至紫雲樓見數人坐於水濵裴與朝士憇其旁中有黄衣半酣軒昻自若指諸人笑語輕脫裴意稍不平揖而問之吾賢所任何官率爾對曰喏郎不敢新授宣州廣徳令反問裴曰押衙所任何職裴效之曰喏郎不敢新授宣州觀察使於是狼狽而走同座亦皆奔㪚朝士撫掌大笑不數日布於京華後於銓司訪之云有廣徳令請換羅江矣宣皇在藩邸聞是説與諸王每為戲談其後龍飛裴入相因書麻制廻謂樞近曰喏郎不敢新授中書門下平章事矣出松窻雜録馮袞唐馮袞牧蘓州江外優佚暇日多縱飲博因㑹賔僚擲盧馮突勝以所得均遗一座乃吟曰八尺臺盤照面新千金一擲闘精神合是賭時須賭取不妨廻首乞閒人更因飲酣戲酒妓而軍倅留情索然無緒馮眄之曰老夫過戲無能為也倅歛袵而謝因吟曰醉眼從伊百度斜是他家屬是他家低聲向道人知也隔坐剛抛豆蔲花出抒情詩鄰夫有覩鄰人夫婦相諧和者夫自外歸見婦吹火乃贈詩曰吹火朱唇動添薪玉腕斜遙看烟裏面大似霧中花其妻亦候夫歸告之曰每見鄰人夫婦極甚多情適來夫見婦吹火作詩詠之君豈不能學也夫曰彼詩道何語乃誦之夫曰君當吹火為别製之妻亦效吹乃為詩曰吹火青唇動添薪黑腕斜遙看煙裏面恰似鳩盤茶出笑言闗圖唐荆州衣冠藪澤每歳解送舉人多不成名號曰天荒解劉蛻以荆州解及第號為破天荒爾來闗圖常翛皆荆人也率有高文連登上科圖即戎挍之子及第歸郷都押衙輩為其張筵乃指盤上醬甌戲老挍曰要挍卒為者其人以醋樽進之曰此亦挍卒為者也席人大噱闗圖妻即常修妹才思婦也有祭夫文行於世出北夢瑣言楊𤣥翼唐咸通中楊𤣥翼怒舉子車服太盛欲令騎驢時有詩曰今年詔下盡騎驢紫軸緋氊滿九衢清痩兒郎猶自可就中愁殺鄭昌圖出盧氏雜記裴慶餘唐裴慶餘咸通末佐北門李蔚淮南幕常遊江舟子刺船誤以篙竹濺水濕妓人衣蔚為之色變慶餘遽請彩牋紀一絶曰滿額蛾黄金縷衣翠翹浮動玉釵􅂷從教水濺羅裙濕知道巫山行雨歸蔚覽之極歡謔命讌者傳之出摭言趙崇雖盧氏衣冠之盛而累代未嘗知舉乾符中盧􅂝在中書以宗人無掌文柄者乃擢羣從陜虢觀察使盧渥司禮闈是年秋黄巢犯闕僖皇播遷舉人星迸迨復京都裴贄連知三舉渥有羡色趙崇戲之曰閣下所謂出腹不生養主司也出北夢瑣言鄭光業鄭光業中表間有同入試者時舉子率以白紙糊案子光業潛紀之曰新糊案子其白如銀入試出試千春萬春光業弟兄共有一巨皮箱凡同人投獻詞有可嗤者即投其中號苦海昆季或從容用資諧戲即命二僕舁苦海於前人閲一編皆極懽而罷光業常言及第之歳䇿試夜一同人突入試鋪為吳語謂光業曰必先必先可以相容否光業為輟半鋪之地又曰必先必先諮仗取一杓水亦為取之又曰便干託煎一椀茶得否欣然與之烹煎居二日光業狀元及第其人首貢一啓頗敘一宵之素累曰既蒙取水又使煎茶當時不識貴人凡夫肉眼今日俄為後進窮相骨頭出摭言太平廣記卷二百五十一
