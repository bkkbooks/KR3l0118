body:
  text: 太平廣記卷四百七十八宋李昉等編昆蟲六飯化蜈蚣氣蠮螉顛當蜾蠃沙虱水弩徐𤣥之短狐蜘蛛怨蜥蜴殷琅豫章民婢南海毒蟲諾龍飯化道士許象之言以盆覆寒食飯於闇室地入夏悉化為赤蜘蛛出酉陽雜爼蜈蚣氣綏縣多蜈蚣氣大者能以氣吸兎小者吸蜥蜴相去三四尺骨肉自消出酉陽雜爼蠮螉蠮螉段成式書齋多此蟲蓋好窠於書卷也或在筆管中祝聲可聽有時開卷視之悉是小蜘蛛大如蠅虎旋以泥隔之方知不獨負桑蟲也出酉陽雜爼顛當顛當段成式書齋前每雨後多顛當窠秦人所呼深如蚓穴網絲其中土葢與地平大如榆莢常仰捭其蓋伺蠅蠖過輒飜蓋捕之纔入復閉與地一色並無絲隙可尋也其形似蜘蛛如墻角負網中者爾雅謂之王蛈蝪鬼谷子謂之蛈母秦中兒童戲曰顛當牢守門蠮螉宼汝無處奔出酉陽雜爼蜾蠃蜾蠃今謂之蠮螉也其為物純雄無雌不交不産取桑蟲之子祝之則皆化為已子蜂亦如此耳出酉陽雜爼沙虱潭𡊮處吉等州有沙虱即毒虵鱗中虱也細不可見夏月虵為虱所苦倒掛身於江灘急流處水刷其虱或卧沙中碾虱入沙行人中之所咬處如針孔粟粒四面有五色文即其毒也得術士禁之乃剜其少許因以生肌膏救治之即愈不爾三兩日内死矣出録異記水弩水弩之蟲狀如蜣蜋黒色八足鉗曵其尾長三四寸尾即弩也常自四月一日上弩至八月卸之時彎其尾自背而上於頭前以鉗執之見人影則射中影之處人身隨有遼腫大小與沙虱之毒同矣速須禁氣制之剜去毒肉固保其命不爾一兩日死矣復多蠱毒行者尤宜慎之凡入蠱家慎告主人曰汝家有蠱毒不得容易害我如此則毒不行矣出録異記徐𤣥之有徐𤣥之者自浙東遷於吳於立義里居其宅素有凶藉𤣥之利以花木珍異乃營之月餘夜讀書見武士數百騎升自牀之西南隅於花氊上置繒繳縱兵大獵飛禽走獸不可勝計獵訖有旌旗豹纛并導騎數百又自外入至西北隅有戴劒操斧手執弓槌凡數百挈幄幙簾榻盤楪鼎鑊者又數百負器盛陸海之珍味者又數百道路往返奔走探值者又數百𤣥之熟視轉分明至中軍有錯綵信旗擁赤幘紫衣者侍從數千至案之右有大鐵冠執鉞前宣言曰殿下將欲觀漁於紫石潭其先鋒後軍并甲士執戈㦸者勿從於是赤幘者下馬與左右數百升𤣥之石硯之上北設紅拂廬帳俄爾盤榻幄幙歌筵舞席畢備賔旅數十緋紫紅綠執笙竽簫管者又數十輩更歌迭舞俳優之詞不可盡記酒數巡上客有酒容者赤幘顧左右曰索漁具復有舊網籠罩之𩔖凡數百齊入硯中未頃獲小魚數百千頭赤幘謂上客曰予深得任公之術請以樂賔乃持釣於硯中之南灘樂徒奏春波引曲未終獲魴鯉鱸鱖百餘遽命操膾促膳凡數十味皆馨香不可言金石絲竹鏗鞠齊奏酒至赤幘者持盃顧𤣥之而謂衆賔曰吾不習周公禮不習孔氏書而貴居王位今此儒髪鬂焦秃肌色可掬雖孜孜矻矻而又奚為肯折節為吾下卿亦得陪今日之宴𤣥之乃以書卷蒙之執燭以觀一無所見𤣥之捨卷而寢方寐間見被堅執銳者數千騎自西牖下分行布伍號令而至𤣥之驚呼僕夫數騎已至牀前乃宣言曰蚍蜉王子獵於羊林之茸釣於紫石之潭𤣥之牖奴遽有廹脅士卒潰亂宫車振驚既無髙共臨危之心須有晉文還國之伐付大將軍蠪虰追過宣訖以白練繫𤣥之頸甲士數十羅曳而去其行迅疾倐忽如入一城門觀者駕肩疊足逗五六里又行數里見子城有赤衣冠者唱言蚍蜉王大怒曰披儒服讀儒書不脩前言往行而肆勇敢凌上付三事已下議乃釋縛引入議堂見紫衣冠者十人𤣥之遍拜皆瞋目踞受所陳設之類尤炳煥於人間是時王子以驚恐入心厥疾彌甚三事已下議請寘肉刑議狀未下太史令馬知𤣥進狀論曰伏以王子日不遵典法遊觀失度視險如砥自貽震驚徐𤣥之性氣不回博識非淺况脩天爵難以妖誣今大王不能度已返恣胷臆信彼多士欲害哲人竊見雲物頻興沴怪屢作市言訛䜟衆情驚疑昔者秦射巨魚而衰殷格猛獸而滅今大王欲害非類是躡殷秦但􅂲季世之端自此而起王覽疏大怒斬太史馬知𤣥於國門以令妖言者是時大雨暴至草澤臣螱飛上疏曰臣聞縱盤遊恣漁獵者位必亡罪賢臣戮忠讜者國必喪伏以王子獵患於絶境釣禍於幽泉信任幻徒熒惑儒士䘮履之戚所謂自貽今大王不究遊務之非返聼詭隨之議况知𤣥是一國之元老實大朝之世臣是宜採其謀猷匡此顛仆全身或止於三諫犯上未傷於一言肝膽方期於畢呈身首俄驚於異處臣竊見兵書云無雲而雨者天泣今直臣就戮而天為泣焉伏恐比干不恨死於當時知𤣥恨死於今日大王又不貸𤣥之峻法欲正名於肉刑是抉吾眼而觀越兵又在今日昔者虞以宫之竒言為謬卒併於晉公吴以伍子胥見為非果滅於句踐非敢自周秦悉數累黷聰明竊敢以塵埃之卑少益嵩華王覽疏即拜螱飛為諌議大夫追贈太史馬知𤣥為安國大將軍以其子蚳為太史令賻布帛五百叚米各三百石其徐𤣥之待後進㫖於是蚳言移市門進官表曰伏奉恩制云馬知𤣥有殷王子比干之忠貞有魏侍中辛毗之諫諍而我亟以用已昩於知人爇棟梁於將為大厦之晨碎舟艥於方濟巨川之日由我不徳致爾非辜是宜褒贈其亡賞延于後者宸翰忽臨載驚載懼叩頭氣竭號斷血零伏以臣先父臣知𤣥學究天人藝窮歴數因𤣥鑒得居聖朝當大王採芻蕘之晨是臣父展嘉謨之日逆耳之言難聴驚心之說易誅今蒙聖澤旁臨照此非罪鴻恩霑洒猶驚已散之精魂好爵彌縫難續不全之腰領今臣豈可因亡父之誅戮定國家之寵榮報平王而不能效伯禹而安忍况今天圖將變歴數堪憂伏乞斥臣遐方免逢䘮亂王覽䟽不悦乃返寢於候雨殿既寤宴百執事於陵雲臺曰適有嘉夢能曉之使我心洗然而亮者賜爵一級羣臣有司皆頓首敬聴曰吾夢上帝云助爾金開爾國展爾彊土自南自北赤玉洎石以答爾徳卿等以為如何羣臣皆拜舞稱賀曰答鄰國之慶也螱飛曰大不祥何慶之有王曰何謂其然螱飛曰大王逼脇生人滯留幽穴錫兹咎夢由天怒焉夫助金者鋤也開國者闢也展彊土者分裂也赤玉洎石與火俱焚也得非𤣥之鋤吾土攻吾國縱火南北以答繫領之辱乎王於是赦𤣥之之罪戮方術之徒自壊其宫以禳厥夢乃以安車送𤣥之歸纔及榻𤣥之寤既明乃召家僮於西牖掘地五尺餘得蟻穴如三石缶因縱火以焚之靡有孑遺自此宅不復凶矣出纂異記短狐搜神記及鴻範五行傳曰蜮射生於南方謂之短狐者也南越夷狄男女同川而浴淫以女為主故曰多蜮蜮者淫女惑亂之氣所生出感應經蜘蛛怨頃有寺僧所住房前有蜘蛛為網其形絶大此僧見蜘蛛即以物戲打之蜘蛛見僧来即避𨼆如此數年一日忽盛熱僧獨於房内晝寢蜘蛛乃下在牀齧斷僧喉成瘡少頃而卒蜂蠆有毒非虚言哉出原化記蜥蜴曹叔雅異物志曰魚跳跳則蜥蜴從草中下稍相依近便共浮水上而相合事竟魚還水底蜥蜴還草中出三教珠英殷琅陳郡殷家養子名琅與一婢結好經年婢死後猶往来不絶心緒昏錯其母深察焉後夕見大蜘蛛形如斗様緣牀就琅便燕爾怡恱母取而殺之琅性理遂復出異苑豫章民婢豫章有一家婢在竈下忽有人長數寸来竈間婢誤以履踐殺一人遂有數百人着縗麻持棺迎喪凶儀皆備出東門入園中覆船下就視皆是鼠婦作湯澆殺遂絶出捜神記南海毒蟲南海有毒蟲者若大蜥蜴眸子尤精朗土人呼為十二時蟲一日一夜隨十二時變其色乍赤乍黄亦呼為籬頭蟲𫝊云傷人立死既潛噬人急走於藩籬之上望其死者親族之哭新州西南諸郡絶不産虵及蚊蠅余竄南方十年竟不覩虵盛夏露臥無噆膚之苦此人謂南方少虵以為夷獠所食别有水虵形狀稍短不居陸地非噴毒齧人者出投荒雜録諾龍南海郡有􅉕生橄㰖𣗳上雖有手足頗類木葉抱枝自附與木葉無别南人取者先伐仆𣗳候葉凋落然後取之有水蟲名諾龍狀如蜥蜴微有龍狀俗云此蟲欲食即出水據石上凡水族㳺泳過者至所據之石即跳躍自置其前因取食之有得者必雙雄者既死雌者即至雌者死亦然俗傳以雌雄俱置竹中以節間之少頃竹節自通里人貨其殭者幻人以􅉕俱用為婦人惑男子術出投荒雜録太平廣記卷四百七十八
