body:
  text: 太平廣記卷二百四十四褊急時苗王思李凝道堯君卿蕭穎士裴樞崔珙韓臯杜佑皇甫湜段文昌李德裕李潘盧罕王珙髙季昌時苗漢時苗為壽春令謁治中蔣濟濟醉不見之歸而刻木人書酒徒蔣濟以弓矢射之牧長聞之不能制出獨異志王思王思性急執筆作書蠅集筆端驅去復來思恚怒自起逐之不能得還取筆擲地蹋壊之出魏畧李凝道唐衢州龍游縣令李凝道性褊急姊男年七嵗故惱之即往逐之不及遂餅誘得之齩其胷背流血姊救之得免又乘驢於街中有騎馬人靴鼻撥其膝遂怒大罵將毆之走馬遂無所及忍惡不得遂嚼路傍棘子血流出朝野僉載堯君卿唐貞觀中冀州武强丞堯君卿失馬既得賊枷禁未決君卿指賊面罵曰老賊吃虎膽來敢偷我物賊舉枷擊之應時碎腦而死出朝野僉載蕭穎士唐蕭穎士開元中年十九擢進士第至二十餘該博三教性急躁忿戾舉無其比常使一傭僕杜亮毎一決責以待調養平復遵其指使如故或勸亮曰子傭夫也何不擇其善主而受苦若是乎亮曰愚豈不知但愛其才學博奥以此戀戀不能去卒至於死出朝野僉載裴樞河東裴樞字環中季父耀卿唐𤣥宗朝位至丞相開元二十一年春開河漕以贍國用上深嘉納之親姨夫中書舍人薛邕時有知貢舉之耗元日因來謁樞親乃曰幾姊有處分親故中舉人否其親指樞邕整容端手板對曰三十六郎自是公共積𨕖之才不待處分矣伏恐别有子弟樞即應聲曰娭子失言因舉酒瀝地誓曰薛姨夫知舉樞當絶跡匿形不履人世其親決責令拜謝邕樞竟不屈永泰二年賈至侍郎知舉樞一舉而登𨕖後大歴二年薛邕方知舉樞及第後歸丹陽里不與雜流交通及韋元甫除此州計到郡之明日合來拜其親元甫至丹陽之明日專使送衣服書狀信物樞怒言不納後三日元甫親擁騎到樞别業樞戒其僕不令報久停元甫車徒不得進元甫不怒但云裴君太褊某乍到須與軍吏監軍相識遽此深責未敢當也親乃遣女奴傳語延元甫就廰事置酒元甫陳以公亊樞方出歡話出乾􅍧子崔珙唐崔珙為東都留守判尚書省事中書舍人崔荆為庶子公務謁珙珙不為見荆乃求與珙素厚善者使候問之珙怒不已他日因酒酣復詰之居守益忿曰珙誓不與此人相面且人為文詞言語何限豈可以珙弟兄作假對耶荆尤不喻親族咸憂慄不安甥族中有穎悟者採取文集討之乃掌制日貶崔球為撫州郡丞云因縁鴈序鼓扇澆風荆因爾成疾出芝田録韓臯唐韓臯自中書舍人除御史中丞西省故事閣老改官詞頭送以次舍人是時呂渭草敕臯恐問曰僕何故轉皆不吿臯刼之曰與君一時左降渭急乃吿之臯又欲訴於改相渭執之奪其靴笏哅哅久之乃止出國史補杜佑唐楊茂卿客遊揚州與杜佑書詞多捭闔以周公吐握之事為諷佑訝之時劉禹錫在坐亦使召楊至共飲佑持茂卿書與禹錫曰請丈人一為讀之既畢佑曰如何禹錫曰大凡布衣之士皆須捭闔以動尊貴之心佑曰休休捭闔之事爛也獨不見王舍乎捭闔陳少遊少遊刎其頭今我與公飯吃過猶不及也翌日楊不辭而去出嘉話録皇甫湜唐皇甫湜氣貌剛質為文古雅恃才傲物性復褊直為郎時乘酒使氣忤同列者及醒不自適求分務東洛値伊瀍仍嵗歉食淹滯曹不遷省俸甚㣲困悴且甚嘗因積雪門無行跡庖突不烟裴度時保釐洛宅以美詞厚幣辟為留守府從事湜簡率少禮度亦優容之先是度討淮西日恩賜鉅萬貯於集賢私第度信浮圖教念其殺戮者衆恐貽其殃因捨討淮叛所得再修福先佛寺備極壯麗就有日矣將致書于白居易請為碑湜在座忽發怒曰近捨某而遠徵白信獲戾於門下矣某文若方白之作所謂寶琴瑶瑟而比之桑間濮上也然何門不可曵長裾某自此請長揖而退賔客無不驚慄度婉詞謝之且曰初不敢以仰煩長者慮為大手筆見拒今既爾是所願也湜怒稍解則請斗酒而歸至家獨飲其半乘醉揮毫其文立就又明日潔本以獻文思古謇字復怪僻度尋繹久之不能分其句讀畢歎曰木𤣥虗郭景純江海之流因以寶車名馬繒綵器玩約千餘緡置書遣小將就第酬之湜省書大怒擲書於地謂小將曰寄謝侍中何相待之薄也某之文非常流之文也曾與顧況為集序外未嘗造次許人今者請為此碑蓋受恩深厚耳其碑約三千字一字三疋絹更減五分錢不得小校既恐且怒歸具吿之僚屬列挍咸振腕憤悱思臠其肉度聞笑曰眞竒才也立遣依數酬之自居守府正郎里第輦負相望洛人聚觀比之雍絳泛舟之役湜領受之無媿色而卞急之性獨異於人嘗為蜂螫手指因大躁急命奴僕暨里中小兒輩箕斂蜂窠購以善價俄頃山聚於庭則命碎於砧几爛於杵臼絞取津液以酬其痛又常命其子松録詩數首一字小誤詬詈且躍手杖不及則嚙腕血流其性褊急皆若此出國史段文昌唐段相文昌性介狹讌席賓客有眉睫之失必致怪訝在西川日進士薛大白飲酒稱名太多明日遂不復召出因話録李德裕劉禹錫太和中為賓客時李徳裕分司東都禹錫因謁於德裕曰近曾得白居易文集否德裕曰累有相示别令收貯然未一披今日為吾子覽之及取㸔而箱笥盈溢塵土蒙覆既啓而復卷之謂禹錫曰吾於此人不足久矣其文章精絶何必覽焉但恐廻吾之心所以不欲㸔覽其抑才也如此初文宗命德裕朝中朋黨首以楊虞卿牛僧孺為言楊牛即白之密友也其不引翼皆如此𩔖出北夢瑣言李潘唐禮部侍郎李潘嘗綴李賀歌詩為之集序未成知賀有表兄與賀筆硯之交者召之見託以捜訪所遺其人敬謝且請曰某蓋記其所為亦常見其多㸃竄者請得所緝者視之當為改正潘喜併付之彌年絶跡潘怒復召詰之其人曰某與賀中外自少多同處恨其傲忽嘗思報之所得歌詩兼舊有者一時投溷中矣潘大怒叱出之嗟恨良久故賀謌什傳流者少也出幽閒鼔吹盧罕唐李訥除淛東路由淮楚時盧罕為郡守訥既到適値元日罕命設將送素膳於訥訥初見忻然迨覽狀乃將名與父諱同訥建子也雅性褊躁大怒翌日僅旦已命鼓棹前去罕聞之亟命駕而往舟且行矣罕知其故遜謝良久且言所由以不謹笞之訥去意益堅罕度不可留怒曰大約小人多名建公何怒之深也遂拂衣而去出玉泉子王珙唐給事中王柷名家子以剛鯁自任黄冦前典常州京國亂離盤桓江湖甚有時望及詔徵回路經于陜時王珙為帥頗兇暴然知柷將來必居廊廟亦加禮待之柷鄙其人殊不降接珙乃於内廰盛張宴席列女樂斂容白柷曰某雖鄙人叨沗旄鉞今日多幸遇軒葢經過茍不棄末宗願厠子姪之列柷堅不許珙勃然作色曰給事王程有限不敢淹留俄而罷宴命將吏速請王給事離館暗授意旨並令害之一家悉投黄河盡取其囊槖以舟行没溺聞奏朝廷多故捨而不問時柷有一子行至襄州亦無故投井而死出北夢瑣言高季昌闕董掌奏記府主褊急闕詣梁園勸梁太祖闕官入中原授大理闕季昌怒曰天下皆知四鎭令公必作天子闕偃仰乎詬怒而起久之召孔目官王仁厚謂曰我闕書記所見甚長且廣南湖南與梁王齊肩所以闕使我乃梁王將校安可輒同兩處差都押衙可闕董且召宴飲迎而謂曰集性急請一切勿言仍遺衣叚數十匹以安之董雖禀受莫知喜怒之由他日聞説自闕我本無此見誠出司徒之意都挍充使於禮合儀所遺衣段乃謬恩也出北夢瑣言太平廣記卷二百四十四
