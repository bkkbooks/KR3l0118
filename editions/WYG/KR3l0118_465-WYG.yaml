body:
  text: 太平廣記卷四百六十五宋李昉等編水族二魚峰州魚海蝦瓦屋子印魚石斑魚井魚異魚螃􅲶鱓魚玳瑁海术海鏡水母蠏百足蠏螗蠏䱜魚鸚鵡螺紅螺鴦龜鯢魚鱟飛魚虎蠏蠔赤鯶公雷穴魚虬尾牛魚蝤䗋奔䱐係臂雞嘴魚劍魚􅈸婦魚黄雀化蛤天牛魚峰州魚峰州有一道水從吐蕃中來夏冷如氷雪有魚長一二寸來去其時葢水上如粥人取烹之而食千萬家取不可盡不知所從來出朝野僉載海蝦劉恂者曽登海舶入䑨樓忽見牕板懸二巨蝦殻頭尾鉗足具全各七八尺首占其一分嘴尖利如鋒刃嘴上有􅂡如紅筯各長二三尺雙脚有鉗鉗麤如人大指長二尺餘上有芒刺如薔􅅔枝赤而銛硬手不可觸腦殻烘透彎環尺餘何止於盃盂也北户録云滕循為廣州刺史有客語循曰蝦􅂡有一丈者堪為拄杖循不之信客去東海取􅂡四尺以示循方伏其異出嶺表録異瓦屋子瓦屋子葢蚌蛤之𩔖也南中舊呼為蚶音憨子頃因盧鈞尚書作鎮遂改為瓦屋子以其殻上有稜如瓦壠故以此名焉殻中有肉紫色而滿腹廣人猶重之多燒以薦酒俗呼為天臠炙食多即壅氣背膊煩疼未測其性也出嶺表録異印魚印魚長一尺三寸額上四方如印有字諸大魚應死者先以印封之出酉陽雜爼石斑魚僧行儒言建州有石斑魚好與蛇交南中多隔蜂窠窠大如壺常羣螫人土人取石斑魚就蜂側炙之標於竿上向日令魚影落其窠上須臾有鳥大如燕數百互擊其窠窠碎落如葉蜂亦全盡出酉陽雜爼井魚唐段成式云井魚腦有穴每嗡水輒於腦穴蹙出如飛泉散落海中舟人競以空器貯之海水鹹苦經魚腦穴出反淡如泉水焉成式見梵僧善提勝説出酉陽雜爼異魚異魚東海人常獲魚長五六尺腹胃成胡鹿刀槊之狀或號秦皇魚出酉陽雜爼螃􅲶傍海大魚脊上有石十二時一名籬頭溺一名螃􅲶其溺甚毒出酉陽雜爼鱓魚郫縣侯生者於漚麻池側得鱓魚大可尺圍烹而食之髪白復黑齒落復生自此輕徤出録異記玳瑁玳瑁形狀似龜唯腹背甲有烘㸃本草云玳瑁觧毒其大者悉婆薩石兼云辟邪廣南盧亭海島夷人也獲活玳瑁龜一枚以獻連帥嗣薛王王令生取背甲小者二片帶於左臂上以辟毒龜被生掲其甲甚極苦楚後養於使宅後北池伺其掲處漸生復遣盧亭送於海畔或云玳瑁若生帶之有驗是飲饌中有蠱毒玳瑁甲即自揺動若死無此驗出嶺表録異海术南海有水族前左脚長前右脚短口在脇旁背上常以左脚捉物寘於右脚右脚中有齒嚙之方内於口大三尺餘其聲术术南人呼為海术出酉陽雜爼海鏡海鏡廣人呼為膏葉盤兩片合以成形殻圓中甚瑩滑日照如雲母光内有少肉如蚌胎腹中有紅蟹子其小如黄豆而螯具足海鏡饑則蟹出拾食蟹飽歸腹海鏡亦飽或廹之以火則蟹子走出離腸腹立斃或生剖之有蟹子活在腹中逡巡亦斃出嶺表録異水母水母廣州謂之水母閩謂之􅬅癡駕反其形乃渾然凝結一物有淡紫色者有白色者大如覆㡌小者如盌腸下有物如懸絮俗謂之足而無口眼當有數十蝦寄腹下咂食其涎浮泛水上捕者或遇之即歘然而没乃是蝦有所見耳越絶書云海鏡蟹為腹水母蝦為目南中好食之云性煖治河魚之疾然甚腥須以草木灰㸃生油再三洗之瑩净如水精紫玉肉厚可二寸薄處亦寸餘先煮椒桂或荳蔲生薑縷切而煠之或以五辣肉醋或以蝦醋如鱠食之最宜蝦醋亦物𩔖相攝耳水母本隂海凝結之物食而煖補其理未詳出嶺表録異蠏蠏八月腹内有芒芒真稻芒也長寸許向東輸與海神未輸芒不可食出酉陽雜爼百足蠏善苑國出百足蠏長九尺四螯煎為膠謂之螯膠勝鳯喙膠也出酉陽雜爼螗蠏平原郡貢螗蠏採於河間界每年生貢斵水火照懸老犬肉蠏覺犬肉即浮因取之一板直百錢以氊宻束於驛馬上馳之至京出酉陽雜爼䱜魚䱜魚章安縣出焉䱜子朝出索食暮還入母腹中容四子頰赤如金甚徤網不能制俗呼為河伯徤兒出酉陽雜爼鸚鵡螺鸚鵡螺旋尖處屈而咮如鸚鵡嘴故以此名殻上青緑斑大者可受二升殻内光瑩如雲母裝為酒盃竒而可玩出嶺表録異紅螺紅螺大小亦𩔖鸚鵡螺殻薄而紅亦堪為酒器刳小螺為足綴以膠漆尤可佳尚也出嶺表録異鴦龜初寧縣里多鴦龜殻薄狹而燥頭似鵝不與常龜同而能嚙犬也出南越志鯢魚鯢魚如鮎四足長尾能上樹天旱輒含水上山以草葉覆身張口鳥来飲水輒吸食之聲如小兒峽中人食之先縛於樹鞭之身上白汁出如構汁去此方可食不爾有毒出酉陽雜爼鱟鱟雌常負雄而行漁者必得其雙南人列肆賣之雄者少肉舊説過海輒相積於背高丈餘如帆乘風遊行今鱟殻上有物高七八寸如石珊瑚俗呼鱟帆至今閩嶺重鱟醬十二足殻可為冠次於白角南人取其尾大小如意出酉陽雜爼飛魚飛魚朗山朗水有之魚長一尺能飛即凌雲空息即歸潭底出酉陽雜爼虎蠏虎蠏殻上有虎斑可裝為酒器與紅蠏皆産瓊崖海邉雖非珍竒亦不易採得也出嶺表録異蠔蠔即牡蠣也其初生海島邊如拳石四面漸長有髙一二丈者巉巖如山每一房内蠔肉一片隨其所生前後大小不等每潮來諸蠔皆開房伺蟲蟻入即合之海夷盧亭者以斧楔取殻燒以烈火蠔即啓房挑取其肉貯以小竹筐赴虚市以易􅀈米蠔肉大者􅀈為炙小者炒食肉中有滋味食之即甚壅腸胃出嶺表録異赤鯶公鯉脊中鱗一道每鱗上有黑㸃大小皆三十六鱗唐朝律取得鯉魚即宜放仍不得喫説赤鯶公賣者决六十出酉陽雜爼雷穴魚興州有一處名雷穴水常半穴每雷聲水塞穴流魚隨流而出百姓每候雷聲繞𣗳布網獲魚無限非雷聲漁子聚擊鼓於穴口魚亦輒出所獲半於雷時韋行規為興州刺史時與親故書説其事出酉陽雜爼虬尾東海有魚虬尾似鴟鼓浪即降雨遂設像於屋脊出談賔録牛魚海上取牛魚皮懸之海潮至即毛竪出談賔録蝤䗋蝤䗋大者長尺餘兩螯至彊八月能與虎鬬虎不如隨大潮退殻一退一長出酉陽雜爼奔䱐奔䱐一名􅀈非魚非蛟大如船長二三丈若鮎有兩乳在腹下雄雌隂陽𩔖人取其子着岸上聲如嬰兒啼項上有孔通頭氣出嚇嚇作聲必大風行者以為候相傳􅈸婦所化殺一頭得膏三四斛取之燒燈照讀書紡績輒暗照懽樂之處則明出酉陽雜爼係臂係臂如龜入海捕之必先祭又陳所取之數則自出因取之若不信則風浪覆船出酉陽雜爼雞嘴魚李徳裕幼時常於明州見一水族有兩足嘴似雞身如魚出酉陽雜爼劍魚海魚千歲為劍魚一名琵琶魚形似琵琶而喜鳴因以為名虎魚老則為蛟江中小魚化為蝗而食五榖者百歲為䑕出酉陽雜爼􅈸婦魚淮南有􅈸婦魚俗云昔楊氏家婦為姑所怒溺水死為魚其脂膏可燃燈燭以之照鼓琴瑟愽奕則爛然有光若照紡績則不復明出述異記黄雀化蛤淮水中黄雀至秋化為蛤至春復為黄雀雀五百年化為蜃蛤出述異記天牛魚天牛魚方員三丈眼大如斗口在脇下露齒無脣兩肉角如臂兩翼長六尺尾五尺出南越記太平廣記卷四百六十五
