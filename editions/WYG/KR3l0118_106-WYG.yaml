body:
  text: 太平廣記卷一百六報應五太原孝亷李廷光陸康成薛嚴任自信段文昌劉逸淮孫咸僧智燈王氏左營伍佰宋衎陳昭太原孝亷唐大厯中太原偷馬賊誣一孝亷同情考掠旬日苦極强服推吏疑其寃未具獄其人唯念金剛經其聲哀切晝夜不絶一日有竹兩節墜獄中轉止其前他囚争取之獄卒意藏刃破視内有字兩行云法尚應捨何况非法書跡甚工賊首悲悔具承以舊嫌之故誣之也出酉陽雜俎李廷光唐李廷光者為德州司馬敬佛不茹葷血常持金剛經每念經時即有圓光在前用心苦至則光漸大少懐懈惰則光漸小暗因此砥礪轉加精進出報應記陸康成唐陸康成嘗任京兆府法曹掾不避强禦公退忽見亡故吏抱案數百紙請押問曰公已去世何得來曰此幽府文簿康成視之但有人姓名畧無他事吏曰皆來年兵刃死者問曰得無我乎有則檢示吏曰有因大駭曰君既舊吏得無情耶曰故我來啓明公耳唯金剛經可託即失之乃遂讀金剛經日數十遍明年朱泚果反署為御史康成叱泚曰賊臣敢干國士泚震怒命數百騎環而射之康成黙念金剛經矢無傷者泚曰儒以忠信為甲胄信矣乃舍去康成遂入𨼆於終南山竟不復仕出報應記薛嚴唐薛嚴忠州司馬蔬食長齋日念金剛經三十遍至七十二將終見幢葢音樂來迎其妻崔氏即御史安儼之姑也屬纊次見嚴隨幢葢冉冉昇天而去呼之不顧一家皆聞有異香之氣出報應記任自信任自信嘉州人唐貞元十五年曽往湖南常持金剛經潔白無㸃於洞庭湖中有異物如雲冒舟上俄頃而散舟中遂失自信不知所在乆之乃凌波而出云至龍宫謁龍王四五人命昇殿念金剛經與珠寶數十事二僧相送出宫一僧憑附少信至衡岳觀音臺紹真師付之云是汝和尚送來令轉金剛經至南岳訪僧果見云和尚滅度已五六年矣出報應記段文昌唐貞元十七年段文昌自蘄入蜀應南康王韋臯辟命洎韋之暮年為賊闢䜛構遂攝尉靈池縣韋尋卒賊闢知留後文昌舊與闢不合聞之連夜離縣至城東門闢尋有帖不令諸縣官離縣其夕隂風及返出郭二里見火兩炬夾道百步為導初意縣吏迎候怪其不前高下逺近不差欲及縣郭方滅及問縣吏尚未知府帖也時文昌念金剛經已五六年數無虚日信乎志誠必感有感必應向之道左右乃經所著迹也後闢逆節漸露詔以𡊮滋為節度使文昌從弟少從軍知左營事懼及禍與監軍定計以蠟丸帛書通謀於𡊮事旋發悉為魚肉賊謂文昌知其謀於一時文昌念經夜乆不覺困寐門戸悉閉忽聞開戸而入言不畏者再三若物投案暴然有聲驚起之際音尤在耳顧視左右吏僕皆睡俾燭樺四索初無所見向之門扄已開闢矣文昌受持此經十餘萬遍徵應孔著出酉陽雜俎劉逸淮唐劉逸淮在汴時韓𢎞為右廂虞候王某為左廂虞候與𢎞相善或謂二人取軍情將不利於劉劉大怒召俱詰之𢎞即劉之甥因控地叩首大言劉意稍解王某年老股戰不能自辯劉叱令拉坐杖三十時新造赤棒頭徑數寸固以筋漆立之不仆數五六當死矣韓意其必死及昏造其家怪無哭聲又謂其不敢哭訪兵門卒即云大使無恙𢎞素與熟遂至臥内問之云我讀金剛經四十年矣今方得力記初被坐時見巨手如箕翕然遮背因袒示韓都無撻㾗韓舊不好釋氏由此始與僧往來日自冩十紙及貴計數百軸矣後在中書盛暑有諫官因事見謁韓方洽汗冩經諫官怪問之韓乃具道王某事出因話録孫咸唐梁崇義在襄州未阻兵時有小將孫咸暴卒信宿却蘇言至一處如王者所居儀衛甚嚴有吏引一僧對事僧法號懐秀亡已經年在生極犯戒及入冥無善可録乃紿云我常囑孫咸冩法華經敕咸被追對初咸不省僧固執之經時不決忽見沙門曰地藏語云若弟子招承亦自獲祐咸乃依言因得無事又說對勘時見一戎王衛者數百自外來冥王降階齊級升殿坐未乆乃大風卷去又見一人被考覆罪福此人常持金剛經又好食肉左邊有經數千軸右邊積肉成山以肉多將入重論俄經堆中有火一星飛向肉山頃刻銷盡此人遂履空而去咸問地藏向來外國王風吹何處地藏王云彼王當入無間向來風即業風也因引咸看地獄及門煙熖扇赫聲若風雷懼不敢視臨視鑊湯跳沬滴落左股痛入心髓地藏令一吏送歸不許漏洩㝠事及廻如夢妻兒環泣已一日矣遂破家冩經因請出家夢中所滴處成瘡終身不差出酉陽雜俎僧智燈唐貞元中荆州天崇寺僧智燈常持金剛經遇疾死弟子啓手猶熱不即入木經七日却活云初見冥中若王者以念經故合掌降階因問訊曰更容上人十年在世勉出生死又問人間衆僧中後食薏苡仁及藥食此大違本教燈報云律中有開遮條如何云此後人加之非佛意也今荆州僧衆中無有飲藥者出酉陽雜俎王氏公安潺陵村百姓王從貴妹未嫁常持金剛經唐貞元中忽暴病卒埋已三日其家覆墓聞塚中呻吟遂發視之果有氣舁歸數日能言云初至冥間冥吏以持經功德放還王從貴能治木嘗於公安靈化寺起造其寺僧曙中嘗見從貴說云出酉陽雜俎左營伍伯唐南康王韋臯鎮蜀時有左營伍伯於西山行營與同火卒學念金剛經性頑初一日纔得題目其夜堡外拾薪為蕃騎縛去行百餘里乃止天未明遂踣之於地以髮繫橛覆以駞罽卧其上此人唯念經題忽見金一鋌放光止於前試舉首動身所縛悉脫遂潜起逐金鋌走計行未得十餘里遲明不覺已至家家在府東市妻兒初疑其鬼具陳來由到家五六日行營將方申其逃初韋不信以逃日與至家日不差始免之出酉陽雜俎宋衎宋衎江淮人應明經舉元和初至河隂縣因疾病廢業為鹽鐵院書手月錢兩千娶妻安居不議他業年餘有為米綱過三門者因不識字請衎同去通管簿書月給錢八千文衎謂妻曰今數月不得八千苟一月而致極為利也妻楊氏甚賢勸不令往曰三門舟路頗為險惡身或驚危利亦何救衎不納遂去至其所果遇暴風所擊彼羣船盡没唯衎入水捫得粟藁一束漸漂近岸浮藁以出乃活餘數十人皆不救因抱藁以謝曰吾之微命爾所賜也誓存没不相捨遂抱藁疾行數里有孤姥鬻茶之所茅舍兩間遂詣宿焉具以事白姥憫之乃為設粥及明旦於屋南曝衣解其藁以晒於藁中得一竹筒開之乃金剛經也尋以訊姥且不知其詳姥曰是汝妻自汝來後蓬頭禮念冩經誠切故能救汝衎感泣請歸姥指東南一徑曰但尋此去校二百里可以後日到家也與米二升拜謝遂發果二日達河隂見妻媿謝楊媛驚問曰何以知之盡述根本楊氏怪之衎乃出經楊媛涕泣拜禮頂戴衎曰用何以為記曰冩時執筆者悮羅漢字空維上無四遂詣䕶國寺禪和尚處請添和尚年老眼昏筆㸃過濃字皆昏黑但十日來不知其所在驗之果如其說衎更嗚咽拜其妻每日焚香禮經於浄室乃謂楊媛曰河濵之姥不可忘也遣使封茶及絹與之使至其居及人皆不見詰於牧竪曰比水漲無涯際何有人鬻茶復云路亦並無乃神化也數嵗相國鄭公絪為東都留守乃召衎及楊媛往問其本末并令將經來與其男武職食月給五千因求其經至今為鄭氏所尊奉故岳州刺史丞相𢎞農公因覩其事遂叙之名曰楊媛徴驗出報應記陳昭唐元和初漢州孔目典陳昭因患病見一人著黄衣至牀前云趙判官喚爾昭問所因云至自冥間劉闢與竇懸對事要召為証昭即留坐逡巡又一人手持一物如毬胞前吏怪其遲答曰只縁此候屠行開因笑謂昭曰君勿懼取生人氣須得猪胞君可面東側臥昭依其言不覺已隨二吏行路甚平可十里餘至一城大如府城甲士守門及入見一人怒容可駭即趙判官也語云劉闢敗東川竇懸捕牛四十七頭送梓州稱准劉闢判殺闢又云先無牒君為孔目典合知事實未及對隔壁聞竇懸呼陳昭何在及問兄弟妻子存亡昭即欲參見冥吏云竇使君形容極惡不欲相見昭乃具說殺牛實奉劉尚書委曲非牒也紙是麻見在漢州某私房架上即令吏領昭至漢州取之門館扄鏁乃於節竅中出入委曲至闢乃無言趙語昭爾自有一過知否竇懸所殺牛爾取一牛頭昭未及答趙曰此不同人間不可假也須臾見一卒挈牛頭而至昭即恐懼求救趙令檢格合決一百考五十日因謂昭曰爾有何功徳昭即自陳曽設若干齋畫佛像趙云此來生福耳昭又言曾於表兄家讀金剛經趙曰可合掌請昭如言有頃見黄襥箱經自天而下住昭前昭取視之即表兄所借本也褾有燒處尚在又合掌其經即滅趙曰此足以免便放回令昭往一司曰生禄按檢其修短吏報云昭本名釗是金旁刀至某年改為昭更得十八年昭聞惆悵趙笑曰十八年大得作樂事何不恱乎乃令吏送昭至半道見一馬當路吏云此爾本屬可乗此即騎乃活死半日矣出酉陽雜俎太平廣記卷一百六
