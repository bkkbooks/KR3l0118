body:
  text: 太平廣記卷一百三十八徵應四裴度段文昌李逢吉牛僧孺王智興牛師杜中立李蠙馬植高駢孔温裕孫偓李全忠侯𢎞實戴思逺張籛齊州民朱慶源裴度唐中書令晉公裴度微時覉寓洛中常乘蹇驢入皇城方上天津橋時淮西不庭已數年矣有二老人倚橋柱而立語云蔡州用兵日久徵發甚困於人未知何時平定忽覩度驚愕而退有僕者攜書囊後行相去稍逺聞老人云適憂蔡州未平須待此人為將既歸僕者具述其事度曰見我龍鍾相戲耳其秋果領鄉薦明年及第洎秉鈞衡朝廷議授呉元濟節鉞既而延英候對憲宗問宰臣度奏曰賊臣䟦扈四十餘年聖朝姑務含𢎞蓋慮凋傷一境不聞歸心効順乃欲坐據一方若以旄鉞授之翻恐恣其凶逆以陛下聰明神武藩鎭皆願勤王臣請一詔進兵可以平蕩妖孽于是命度為淮西節度使興師致討時許滑三帥先於郾城縣屯軍度統精甲五萬㑹之受律鼓行而進直造蔡州城下纔兩月擒賊以獻淮西遂平後入朝居廊廟大拜正司徒為侍中中書令儒生武德振耀古今洎畱守洛師毎話天津橋老人之事出征淮西請韓愈自中書舍人為掌書記及賊平朝覲樂和李僕射方為華州刺史戎服櫜鞬迎于道左愈有詩云荆山行盡華山來日照潼關四扇開刺史莫嫌迎候逺相公親破蔡州回出劇談録段文昌唐丞相鄒平公段文昌負才傲俗落拓荆楚間常半酣靸屐于江陵大街徃來雨霽泥甚街側有大宅門枕流渠公乘醉於渠上脱屐濯足旁若無人自言我作江陵節度使必買此宅聞者皆笑其後果鎭荆南遂買此宅又嘗佐太尉南康王韋皋為成都館驛巡官忽失意皋逐之使攝靈池尉羸童劣馬奔迫就縣縣去靈池六七里日已昏黑路絶行人忽有兩炬前引更呼曰太尉來既及郭門兩炬皆滅先時為皋奉使入長安素與劉禹錫深交禹錫時為禮部員外方與日者從容文昌入謁日者匿于箔下既去日者謂禹錫曰員外若圖省轉事勢殊逺須待十年後此客入相方轉本曹正郎耳是時禹錫失意連授外官後十餘年文昌入相方除禹錫禮部郎中出録異記李逢吉唐丞相涼公李逢吉始從事振武日振武有金城佛寺寺有僧年七十餘嘗一日獨處負壁而坐忽見婦人介甲持矛由寺門而入俄聞報李判官來僧具以告自是逢吉與僧善毎造其室即見其人先逢吉而至率以為常矣故逢吉出入將相二十餘年竟善終于家出𥙷録紀傳牛僧孺唐河南府伊闕縣前大溪毎僚佐有入臺者即水中先有小灘漲出石礫金沙澄澈可愛丞相牛僧孺為縣尉一旦忽報灘出翌日邑宰與同僚列筵於亭上觀之因召耆宿備詢其事有老吏云此必分司御史非西臺之命若是西臺灘上當有鸂􅈃雙立前後邑人以此為驗僧孺潛揣縣僚無出于已因舉杯曰既有灘何惜一雙鸂􅈃宴未終俄有鸂􅈃飛下不旬日拜西臺監察出劇談録王智興唐王智興始微時嘗為徐州門子有道士寓居門側智興毎旦起持帚因屏穢于道必掃其道士之門道士深感之後智興母終辭焉道士謂智興曰吾善審墓地若議葬當為子卜之智興他日引道士出視地道士以智興所執竹策表一處道士曰必窆此君當壽而兩世位至方伯及智興再徃理穴其竹䇿有枝葉叢生心甚異之遂葬焉智興又曾自郡齎事赴上都宿郾城逆旅遇店婦將産見二人入智興所寢之舍驚曰徐州王侍中在此又曰所生子後五歲當以金瘡死智興志之及期復過店問婦所生子云近因斧傷已卒矣岀唐年𥙷録紀傳牛師唐長慶中鄂州里巷間人毎語輒以牛字助之又有一僧自號牛師乍愚乍智人有忤之必云我兄即到豈奈我何未幾竒章公牛僧孺以舊相節度武昌軍其語乃絶而牛師尚存方知將相之任豈偶然耶先是元和初韓尚書臯鎭夏口就加節度使自後復為觀察使長慶三年崔相國植由刑部尚書除觀察使明年冬僧孺實來宰臣建節鎭夏口自僧孺始也出因話録杜中立唐杜臯字中立少年時贍於財産他無所采取其與游徒利于酒炙其實蔑視之也一日同送迎于城外客有善相者厯觀諸賓侣獨指中立曰此子異日當為將矣一坐大笑中立後尚眞源公主竟為滄州節度使初李瑑之出鎭旗竿道折乃钁殺其執旗者中立在道亦然杖之二十瑑竟無患而中立卒焉豈殺之可以應其禍出玉泉子李蠙唐司空李蠙始名虬赴舉之秋偶自題名于屋壁經宵忽覩名上為人添一畫乃成虱字矣蠙曰虱者蠙也遂改名蠙明年果登第出南楚新聞馬植唐丞相馬植罷安南都䕶與時宰不通又除黔南殊不得意維舟峽中古寺寺前長堤堤畔林木夜月甚明見人白衣緩步堤上吟曰截竹為筒作笛吹鳳凰池上鳳凰飛勞君更向黔南去即是陶鈞萬𩔖時厯厯可聽吟者數四遣人邀問即已失之矣後自黔南入為大理卿遷刑部侍郎判鹽鐵遂作相出本事詩高駢唐燕公高駢微時為朱叔明司馬總兵巡按見雙鵰謂衆曰我若貴矢當疊雙乃伺其上下果一矢貫二鵰衆大驚異因號為落鵰公出感定録孔温裕唐河南尹孔温裕任𥙷闕日諫討党項事貶栁州司馬久之得堂兄尚書温業書報云憲府欲爾作侍御史日望勅下忽又得書云宰相以右史處之皆無音耗一日有鵲喜于庭直若語狀孩稚拜且祝云願早得官鵲既飛去墜下方寸紙有補闕二字極異之無幾却除此官出因話録孫偓長安城有孫家宅居之數世堂室甚古其堂前一柱忽生槐枝孫氏初猶障蔽之不欲人見朞年之後漸漸滋茂以至柱身通體而變壊其屋上衝祕藏不及衣冠士庶之來觀者車馬塡咽不久偓處巖廊儲居節制人以為應三槐之眹亦甚異也近有孫煒乃偓之嗣備言其事出玉堂閒話李全忠唐乾符末范陽人李全忠少通春秋好鬼谷子之學曾為棣州司馬忽有蘆一枝生於所居之室盈尺三節焉心以為異告於别駕張建章建章博古之士也乃曰昔蒲洪以池中蒲生九節為瑞乃姓蒲後子孫昌盛蘆茅也合生陂澤間而生於室非其常矣君後必有分茅之貴三節者傳節鉞三人公其誌之全忠後事李可舉為戎校諸將逐可舉而立全忠累加至檢校太尉臨戎甚有威政全忠死子匡威為三軍所逐弟匡儔挈家赴闕至滄州景城為盧彦盛所害先是匡威少年好勇不拘小節以飲博為事曾一日與諸游俠輩釣于桑乾赤欄橋之側自以酒酹曰吾若有幽州節制分則獲大魚果釣得魚長三尺人甚異焉出北夢瑣言侯𢎞實侯𢎞實本蒲坂人也幼而家貧長為軍外子弟年方十三四常寐於簷下天將大雨有虹自河飲水俄貫於𢎞實之口其母見不敢驚焉良久虹自天没于𢎞實之口不復出焉及覺母問有夢否對曰適夢入河飲水飽足而歸母聞之黙喜知其必貴矣後數月忽有蜀僧詣門求食臨去謂侯母曰女弟子當有後福合得兒子力侯母呼𢎞實出請僧相之僧視之曰此蜺龍也但離去鄉井近江海客宦方有顯榮又曰此子性識慘毒必有生靈之患倘敬信三寶即得善終言訖而去𢎞實後果自行伍出身至于將領同光三年從興聖太子収蜀蜀平之後無何與陜府節度使康延孝等作叛及延孝誅滅𢎞實得赦㝷為眉州刺史節度䕫州復自寧江遷于黔府一州二鎭皆近大江官業崇高敬奉三寶信心無怠然于臨戎理務持法御下傷于嚴酷是知蜀僧所云不謬矣出鑑戒録戴思逺梁朝將戴思逺任浮陽日有部曲毛璋為性輕悍常與數十卒追捕盜賊還宿于逆旅毛枕劒而寢夜分其劒忽大吼躍出鞘外從卒聞者愕然驚異毛亦神之乃持劒呪曰某若異日有此山河爾當更鳴躍否則已毛復寢未熟劒吼躍如初毛深自負之其後戴離鎭毛請畱戴從之未幾毛以州歸命于唐莊宗莊宗以毛為其州刺史後竟帥滄海出玉堂閒話張籛密牧張籛少年時常有一飛鳥狀若尺鷃銜一青銅錢墮于張懐袖間張異之常繫錢于衣冠間其後累財巨萬至死物力不衰即蜚鳥墮錢將富之祥也出玉堂閒話齊州民齊州有一富家翁郡人呼曰劉十郎以鬻醋油為業自云壯年時窮賤至極與妻傭舂以自給忽一宵舂未竟其杵忽然有聲視之已中折矣夫婦相顧愁歎久之方寐凌旦既寤一新杵在臼旁不知自何而至夫婦前視且驚且喜自是因穿地頗得隱伏之貨以碓杵為神鬼所傷乃寶而藏之遂棄舂業漸習商估數年之内其息百倍家累千金夫婦神其杵即被以文繡置于匱匣中四時致祭焉自後夫婦富且老及其死也物力漸衰今則兒孫貧乏矣出玉堂閒話朱慶源婺源尉朱慶源罷任方選家在豫章之豐城庭中地甚爽塏忽生蓮一枝其家駭懼多方以禳之蓮生不已乃築堤汲水以迴之遂成大池芡荷甚茂其年慶源選授南豐令後三歲入為大理評事出稽神録太平廣記卷一百三十八
