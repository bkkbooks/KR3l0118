body:
  text: 太平廣記卷三百九十宋李昉等編塚墓二奴官冡盧涣趙冬曦丁永興嚴安之女媧墓李邈賈耽張式樊澤齊景公墓郭􅁩夀安土棺李思恭武瑜曹王墓韓建海陵夏氏廬陵彭氏武夷山林賛堯張匡紹軍卒馬黄谷冡秦進崇和文奴官冡鄼縣有後漢奴官冡初村人田於其側毎至秋穫近冡地多失穟不稔積數嵗己苦之後恒夜徃伺之見四大鵞從冢中出食禾逐即入去村人素聞奴官冡有寳乃相結開之初入埏前見有鵞鼓翅擊人賊以棒反擊之皆不復動乃銅鵞也稍稍入外㕔得寳劍二枚其他器物不可識者甚衆次至大藏水深有紫衣人當門立與賊相擊賊等羣争往擊次其人衝賊走出縣大呌云賊刼吾墓門主者曰君墓安在答曰正奴官冢是也縣令使里長逐賊至皆擒之開元末明州刺史進三十餘事出廣異記盧涣黄門侍郎盧渙為明州刺史屬邑翁山縣溪谷迥無人嘗有盗發墓云初行見車轍中有花塼因掲之知是古冢乃結十人縣投狀請路旁居止縣許之遂種麻令外人無所見即悉力發掘入其隧路漸至壙中有三石門皆以鐵封之其盗先能誦呪因齋戒近之至日兩門開毎門中各有銅人銅馬數百執持干戈其制精巧盗又齋三日中門半開有黄衣人出曰漢征南將軍劉忘名使来相聞某生有征伐大勲及死勅令䕶𦵏又鑄銅人馬等以象存日儀衞奉計来此必要財貨所居之室實無他物且官𦵏不瘞寳貨何必苦以神呪相侵若更不已當不免兩損言訖復入門合如初又誦呪數日不已門開一青衣又出𫝊語盗不聴兩扇欻闢大水漂蕩盗皆溺死一盗能泅而出自縳詣官具説本末渙令復視其墓中門内有一石牀骷體枕之水漂已半垂於牀下因却為封兩門窒隧路矣出元怪録趙冬曦華隂太守趙冬曦先人壟在皷城縣天寳初將合附焉啓其父墓而樹根滋蔓圍繞父棺懸之於空遂不敢發以母柩置於其旁封墓而返宣城太守刁緬改𦵏二親緬亦納母棺於其側封焉後門緒昌盛也冬曦兄弟七人皆秀才有名當世四人至二千石緬三為將軍門施長㦸開元二十年萬年有人父殁後家漸富遂𦵏父櫬亦為縈繞不可解其人遂刀斷之根皆流血遂以𦵏既而家道稍衰死亡俱盡出記聞丁永興髙唐縣南有鮮卑城舊𫝊鮮卑聘燕享於此城旁有盗跖冢冢極髙大賊盗嘗私祈焉齊天保初縣令丁永興有羣盗刼其部内興乃宻令人冢傍伺之果有祀者乃執詣縣按殺之自後祀者頗絶皇覽言盗跖冢在河東按盗跖死於東陵此地古名東平陵疑此近之出酉陽雜爼嚴安之天寳初嚴安之為萬年縣捕賊官亭午有中使黄衣乗馬自門馳入宣勅曰城南十里某公主墓見􅀍賊刼宣使往捕之不得漏失安之即領所由并器杖往掩捕見六七人方穴地道纔及埏路一時擒獲安之令求中使不得因思之曰賊方開冢天子何以知之至縣乃盡召賊訊其事賊曰纔開墓即覺有異自知必敗至第一門有明器勅使數人黄衣騎馬内一人揖鞭状如走勢幞頭脚亦如風吹直豎眉目已来悉皆飛動某即知必敗也安之即思前勅使状貌兩明器勅使耳出逸史女媧墓潼闗口河潭上有樹數株雖水暴漲亦不漂没時人號為女媧墓唐天寳十三年五月内因大風吹失所在乾元二年六月虢州刺史王晉光上言今月一日河上側近忽聞風雷曉見墳踊出上有雙栁樹下巨石栁各高丈餘出唐歴李邈劉晏判官李邈荘在髙陵荘客欠租課積五六年邈因罷歸荘方將責之見倉庫盈羡輸尚未畢邈怪問悉曰某久為盗近開一古冢冢西去荘十里極髙大入松林二百步方至墓墓側有碑斷倒草中字磨滅不可讀初旁掘數十丈遇一石門錮以鐵汁累日洋糞沃之方開開時箭出如雨射殺數人衆懼欲出某審無他必設機耳乃令投石其中毎投箭輒出投十餘石箭不復發因列炬而入至開重門有木人數十張目運劍又傷數人衆以棒擊之兵仗悉落四壁各畫兵衞之像南壁有大漆棺懸以鐡索其下金玉珠璣堆積衆懼未即掠之棺兩角忽䬃䬃風起有沙撲人而須臾風甚沙出如注遂殁至髁衆驚恐退走比出門已塞矣一人復為沙埋死乃同酹地謝之誓不發冢水經言越王句踐都瑯琊欲移允常冢冢中生風飛沙射人人不得近遂止按漢舊儀將作營陵地内方丈外設伏弩伏火􅃓矢與沙蓋古製有此機也出酉陽雜爼賈耽賈耽在滑州境内天旱耽召大將二人謂曰今嵗荒煩君二人救民也皆言茍利軍州死不足辭耽笑曰君可辱為健步明日當有兩騎衣慘緋所乗馬蕃步鬛長經市出城可隨之識其所滅處則吾事諧矣二將乃裹糧衣皁衣尋之果有二緋衣經市至野行二百餘里暎大冢而滅遂纍石表之信宿而返耽大喜發數百人具畚鍤與二將偕徃發冢得陳粟數十萬斛人竟莫之測出酉陽雑爼張式張式幼孤奉遺命葬於洛京時周士龍識地形稱郭璞青烏之流也式與同之外野歴覽三日而無獲夜宿村舎時冬寒室内惟一榻式則籍地士龍據榻以憩士龍夜久不寐式兼衣擁爐而寝欻然驚魘曰親家士龍遽呼之式固不自知久而復寐又驚魘曰親家士龍又呼之式亦自不知所謂及曉又與士龍同行出村之南南有土山士龍駐馬遥望曰氣勢殊佳則與式步履久之南有村夫伐木逺見士龍相地則荷斧遽至曰官等得非擇𦵏地乎此地乃某之親家所有如可則某請導致焉士龍謂式曰疇昔夜夢再驚皆曰親家豈非神明前定之證與遂卜𦵏焉而式累世清貴出集異記樊澤樊澤為襄陽節度有巡官張某者父為邕管經略使𦵏於鄧州北數十里張兄弟三人忽同時夢其父曰我𦵏墓某夜􅀍刼賊將衣物今日入城来停在席㡌行汝宜速徃擒之日出後即不得矣張兄弟夜起泣涕相告未明叩州門見澤具白其事立召都虞候令捕之同黨六人并賊帥之妻皆獲澤引入面問之曰汝刼此墓有異􅁘賊曰某今日之事亦無所𨼆必是為神理所殛某夫妻業刼冢已十餘年毎刼夫妻􅂝酒􅋹火諸徒黨即開墓至棺蓋某夫妻與其亡人遞為斟酌某自飲一盞曰客欲一盞即以酒瀝於亡人口中云主人飲一盞又妻飲一盞遍便云酒錢何處出其妻應云酒錢主人出遂取衣物寳貨等某昨開此墓見棺中人紫衣玉帶其状如生某依法飲酒及瀝酒云至主人一盞言訖亡人笑某等驚甚便扶起唯枯骨耳遂解腰帶亡人呼曰緩之我腰痛某輩皆驚懼遂馳出自此神魂惝怳即知必敗悉殺之數日鄧州方上其事出逸史齊景公墓貝邱縣東北齊景公墓近世有人開之下入三丈石函中得一鵞鵞迴轉翅以撥石復下入一丈便有青氣上騰望之如陶烟飛鳥過之輒墮死遂不敢入出酉陽雜爼郭􅁩潞州軍挍郭􅁩先為邯鄲郡牧使因兄亡遂入鄆州舉其先同塋於磁州滏陽縣接山上中多石有力者卒共鑿石為穴誼之所卜亦鑿焉即日倍加忽透一穴穴中有石長可四尺形如守宫支體首尾畢具役者誤斷焉􅁩惡之將别卜地白於劉從諫從諫不許因葬焉後月餘􅁩陷於厠幾死骨肉奴婢相繼死者二十餘口自是嘗恐悸寤寐不安因表請罷職從諫以都押衙焦長楚之務與誼對換及劉積阻兵誼為其魁軍破梟首其家無少長悉投死井中鹽州從事鄭賓于言石守宫見在磁州官庫中出酉陽雜爼夀安土棺夀安之南有土峯甚峻乾寕初因雨而圯半壁銜土棺棺下有木横亘之木見風成塵而土形尚固邑令滌之泥汨於水粉膩而蠟黄剖其腹依稀骸骨因徵近代無以土為周身之器者戴記云夏后氏堲周葢其時也出唐闕史李思恭乾寧三年丙辰蜀州刺史節度叅謀李思恭埋弟於成都錦浦里北門内西迴第一宅西與李冰祠鄰距宅之北地形漸髙岡走西南與祠相接於其堂北鑿池五六尺得大冢甎甓甚固於甎外得金錢數十枚各重十七八銖徑寸七八分圓而無孔去縁二分有𨼆起規規内面各有書二十一字其縁甚薄有刃焉督役者馳其二以白思恭命使者入青城雲溪山居以示道士杜光庭云此錢得有石餘思恭命并金錢復瘞之但不知誰氏之墓也其地北百步所有石笋知石笋即此墓之闕矣自此甚靈人不敢犯其後蜀主改置祠堂享之出廣異記武瑜安州城東二十餘里有大墓羣盗發之數日乃開得金釵百餘枚合重百斤有石座雜寳古腰帶陳列甚多取其一帶隨手有水湧俄頃滿墓所開之處尋自閉塞盗以二釵子獻刺史武瑜夜夢一人古服侍從極多来謁云南蠻武相公也為羣盗壊我居處以君宗姓願為修之盗當發狂相次皆卒出録異記曹王墓永平乙亥嵗有説開封人發曹王􅆏墓取其石人羊馬磚石之屬見其棺宛然而隨手灰滅無復形骨但有金器數事棺前有鑄銀盆廣三尺滿盆貯水中坐玉嬰兒髙三尺水無減耗則泓師所云墓中貯玉則草木温潤貯金多則草木焦枯曹王自貞元之後歴二百嵗矣盆水不減玉之潤也出録異記韓建韓建䘮母卜𦵏地有術士云秪有一穴可致大錢而不久即散若華州境内莫加於此也建乃於此𦵏母明年大駕来幸四海之人罔不臻湊建乃廣收商税二載之後有錢九百萬貫復三年為朱梁所有出中韓故事海陵夏氏戊戌嵗城海陵縣為郡侵人冢墓有市儈夏氏其先嘗為鹽商墓在城西夏改𦵏其祖百一十年矣開棺惟有白骨而衣服器物皆儼然如新無所損汚有紅錦􅀍文彩尤異夏方貧皆取賣之人競以善價買云其餘冢雖歴年未久而皆腐敗矣出稽神録廬陵彭氏廬陵人彭氏𦵏其父有術士為卜地曰𦵏此當世為藩牧郡守彭從之又掘坎術士曰深無過九尺久之術士暫憩他所役者遂掘丈餘欻有白鶴自地出飛入雲中術士歎恨而去今彭氏子孫有為縣令者出稽神録武夷山建州武夷山或風雨之夕聞人馬簫管之聲及明則有棺椁在懸崖之上中有脛骨一節土人謂之仙人換骨函近代有人深入絶壑俯見一函其上題云潤州朝京門内染師張某第三女好事者記之後至潤州果得張氏之居云第三女未嫁而卒已數嵗因發其墓則空棺矣出稽神録林賛堯丙午嵗漳州禆將林賛堯殺監軍中使據郡及保山巖以為營掘地得一古冢棺椁皆腐中有一女子衣服容貌皆如生舉體猶有暖氣軍士取其金銀釵鐶而棄其屍又發一冢開棺見一人披髪覆面蹲於棺中軍士駭懼致死者數人賛堯竟伏誅出稽神録張匡紹軍卒丙午嵗江南之師圍留安軍政不肅軍士發掘冢墓以取財物諸將莫禁監軍使張匡紹所將卒二人發城南一冢得一椰實柸以獻匡紹因曰某發此墓開棺見緑衣人面如生懼不敢犯墓中無他珍唯得此柸耳既還營而緑衣人已坐某房矣一日數見意甚惡之居一二日二卒皆戰死出稽神録馬黄谷冢安州城南馬黄谷冢左有大冢棺椁已腐唯一髑髏長三尺陳人左鵬親見之焉出稽神録秦進崇周顯徳乙夘嵗偽連水軍使秦進崇修城發一古冢棺椁皆腐得古錢破銅鏡數枚復得一缾中更有一缾黄質黒文成隷字云一雙青鳥子飛来五兩頭借問船輕重寄信到揚州其明年周師伐吴進崇死之出稽神録和文蜀人王昭逺戊午嵗為巡邊制置使及文州遇軍人喧聚問之言舊冢内有尸不壊或以磚石投之其聲鏗然昭逺往見其形質儼然如新逝者冢中得石版云有唐故文州馬步都虞候和文年五十八大中五年辛未五月五日卒𦵏於此昭逺致祭復令掩閉之於墓側刻石以銘之出野人閑話太平廣記卷三百九十
