body:
  text: 太平廣記卷九十一異僧五永那䟦摩法度通公阿專師阿禿師稠禪師釋知苑法喜法琳徐敬業駱賓王永那䟦摩永那䟦摩者西域僧也宋元嘉中東遊渡江居於金陵祇園寺宋文帝常謂之曰弟子恒願持齋不殺生命以身徇物不獲其志法師不逺萬里來化此國將何以敎之對曰道在心不在事法由已非由人且帝王與凡庶所修亦有殊矣若凡庶者身賤名微徳不及逺其敎不出於門庭其言不行於僕妾若不苦身刻己行善持誠將何以用其心哉帝王以四海為家萬民為子出一嘉言則士庶咸恱布一善政則人神以和刑清則不夭其命役簡則無勞其力然後辨鍾律正時令鍾律辨則風雨調號令時則寒暑節如此則持齋亦已大矣不殺亦已衆矣安在乎缺一時之膳全一禽之命然後乃為𢎞濟也文帝撫几嗟歎稱善者良乆乃曰俗人迷於逺理沙門滯於近敎迷逺理者謂為虛說滯近敎者拘戀章句如法師者眞所謂開悟明達可以言天人之際矣出劇談録法度釋法度黄龍人也南齊初遊于金陵髙士齊郡名僧紹隱居瑯琊之攝山挹度清眞待以師友及亡捨所居山為棲霞寺先是有道士欲以寺地為觀住者輒死後為寺猶多恐懼自度居之羣妖皆息經歲餘忽聞人馬鼓角之聲俄見一人投刺於度曰靳尚度命前之尚形甚間雅羽衛亦衆致敬畢乃言弟子主有此山七百餘年矣神道有法物不得于前後棲託或非真實故死病繼之亦其命也法師道徳所歸謹捨以奉給并願受五戒永結來緣度曰人神道殊無容相屈且檀越血食世祀此最五戒所禁尚曰若備門庭輒先去殺於是辭去明旦一人送錢一萬并香燭等疏云弟子靳尚奉供至其月十五日度為設㑹尚又來同衆禮拜行道受誡而去既而攝山廟巫夢神告曰吾已受戒於度法師矣今後祠祭者勿得殺戮由是廟中薦獻菜飯而已出圖經通公梁末有通公道人者不知其姓氏居處無常所語狂譎然必有應驗飲酒食肉遊行民間侯景甚信之揚州未陷之日多拾無數死魚頭積於西明門外又拔青草荆棘栽市里及侯景渡江先屠東門一城盡斃置其首于西明門外為京觀焉市井破落所在荒蕪通公言說得失於景不便景惡之又憚非常人不敢加害私遣小將于子恱將武士四人往候之景謂子恱云若知殺則勿害不知則密捉之子恱立四人於門外獨入見通脫衣燎火逆謂子恱曰汝來殺我我是何人汝敢輒殺子恱作禮拜云不敢於是馳往報景景禮拜謝之卒不敢害景後因宴召僧通僧通取肉揑鹽以進於景問曰好否景曰大鹹僧通曰不鹹則爛及景死數日衆以鹽五石置腹中送尸于建康市百姓争屠膾羮食之皆盡後竟不知所去出廣古今五行記阿專師侯景為定州刺史之日有僧不知氏族名阿專師多在州市聞人有㑹社齋供嫁娶喪𦵏之席或少年放鷹走狗追隨宴集之處未嘗不在其間鬬争喧囂亦曲助朋黨如此多年後正月十五日夜觸他長幼坐席惡口聚罵主人欲打死之市道之徒救解將去其家兄弟明旦捕覓正見阿專師騎一破牆上坐嘻笑謂之曰汝等此間何厭賤我我捨汝去捕者奮杖欲擲前人復遮約阿專師復云定厭賤我我去以杖擊牆口唱叱叱所騎之牆一堵忽然昇上可數十仭舉手謝鄉里曰好住百姓見者無不禮拜悔咎須臾暎雲而滅可經一年聞在長安還如舊態於後不知所終出廣古今五行記阿秃師北齊初并州阿秃師者亦不知鄉土姓名所出爾朱未滅之前已在晉陽遊諸郡邑不居寺舍出入民間語譎必有徴驗每行市里人衆圍繞之因大呼以手指胷曰憐你百姓無所知不識并州阿秃師人遂以此名焉齊神武遷鄴之後以晉陽兵馬之地王業所基常鎮守并州時來鄴下所有軍國大事未出帷幄者秃師先于人衆間泄露末年執置城内遣人防守不聽輒出若其越逸罪及門司當日并州時三門各有一秃師盪出遍執不能禁未㡬有人從北州來云禿師四月八日於雁門郡市捨命郭下大家以香花送之埋於城外并州人怪笑此語謂之曰禿師四月八日從汾橋過東出一脚有鞋一脚徒跣但不知入何巷坊人皆見之何云雁門死也此人復往北州報語鄉邑衆共開塜看之唯有一隻鞋耳後還遊并州齊神武以制約不從浪語不止慮動民庶遂以袄惑戮之沙門無髪以繩鉤首伏法之日舉州民衆詣寺觀之禿師含笑更無言語刑後六七日有人從河西部落來云道逢禿師形狀如故但背負一繩籠秃師欲與語不應急走西去出廣古今五行記稠禪師北齊稠禪師鄴人也初落髪為沙彌時輩甚衆每休暇常角力騰趠為戲而禪師以劣弱見凌紿侮毆擊者相繼禪師羞之乃入殿中閉户抱金剛足而誓曰我以羸弱為等𩔖輕負為辱已甚不如死也汝以力聞當祐我我捧汝足七日不與我力必死于此無還志約既畢因至心祈之初一兩夕恒爾念益固至六日將曙金剛形見手執大鉢滿中盛筋謂稠曰小子欲力乎曰欲念至乎曰至能食筋乎曰不能神曰何故稠曰出家人斷肉故耳神因操鉢舉匕以筋視之禪師未敢食乃怖以金剛杵稠懼遂食斯須入口神曰汝已多力然善持敎勉旃神去且曉乃還所居諸同列問曰竪子頃何至稠不答須臾於堂中㑹食食畢諸同列又戲毆禪師曰吾有力恐不堪於汝同列試引其臂筋骨彊勁殆非人也方驚疑禪師曰吾為汝試因入殿中横蹋壁行自西至東凡數百步又躍首至於梁數四乃引重千鈞其拳捷驍武動駭物聽先輕侮者俯伏流汗莫敢仰視禪師後證果居於林慮山入山數十里搆精廬殿堂窮極土木諸僧從其禪者常數千人齊文宣帝怒其聚衆因領驍勇數萬騎躬自往討將加白刃焉禪師是日領僧徒谷口迎候文宣問曰師何遽此來稠曰陛下將殺貧道恐山中血汚伽藍故至谷口受戮文宣大驚降駕禮謁請許其悔過禪師亦無言文宣命設饌施畢請曰聞師金剛處祈得力今欲見師効少力可乎稠曰昔力者人力耳今為陛下見神力欲見之乎文宣曰請與同行寓目先是禪師造寺諸方施木數千根臥在谷口禪師呪之諸木起空中自相搏擊聲若雷霆鬭觸摧折繽紛如雨文宣大懼從官散走文宣叩頭請止之因敕禪師度人造寺無得禁止後於并州營幢子未成遘病臨終歎曰夫生死者人之大分如來尚所未免但功徳未成以此為恨耳死後願為大力長者繼成此功言終而化至後三十年隋帝過并州見此寺心中渙然記憶有似舊修行處頂禮恭敬無所不為處分并州大興營葺其寺遂成時人謂帝為大力長者云出紀聞及朝野僉載釋知苑唐幽州沙門知苑精練有學識隋大業中發心造石室一切經藏以備法戒既而於幽州西山鑿巖為石室即摩四壁而以寫經又取方石别更摩寫藏諸室内每一室滿即以石塞門鎔鐵固之時隋煬帝幸涿郡内史侍郎蕭瑀皇后弟也性篤信佛法以其事白后后施絹千匹瑀施絹五百匹朝野聞之争共捨施故苑得成功苑常以役匠既多道俗奔湊欲與巖前造木佛堂并食堂寐而念木瓦難辦恐繁經費未能起作忽一夜暴雷震電明旦既晴乃見山下有大木松栢數千萬為水所漂積於道次道俗驚駭不知來處於是逺近歎服苑乃使匠擇取其木餘皆分與邑里邑里喜恱而助造堂宇頃之畢成如其志焉苑所造石經已滿七室矣貞觀十三年卒弟子繼其功焉出㝠報録法喜隋煬帝時南海郡送一僧名法喜帝令宮内安置於時内造一堂新成師忽升堂觀看因驚走下堦迴顧云幾壓殺我其日中夜天大雨堂崩壓殺數十人其後又於宫内環走索羊頭帝聞而惡之以為狂言命鏁著一室數日三衛于市見師還奏云法喜在市内慢行敕責所司撿驗所禁之處門鏁如舊守者亦云師在室内於是開户入室見袈裟覆一叢白骨鏁在項骨之上以狀奏聞勅遣長史王恒驗之皆然帝由是始信非常人也敕令勿驚動至日暮師還室内或語或笑守門者奏聞敕所司脫鏁放師出外隨意所適有時一日之中凡數十處齋供師皆赴㑹在在見之其間亦飲酒噉肉俄而見身有疾常臥牀去薦蓆令人於牀下鋪炭火甚熱數日而命終火炙半身皆焦爛葬于香山寺至大業四年南海郡奏云法喜見還在郡敕開棺視之則無所有出拾遺記法琳唐武徳中終南山宣律師修持戒律感天人韋將軍等十二人自天而降旁加衛䕶内有南天王子張璵常侍於律師時法琳道人飲酒食肉不擇交遊至有妻子律師在城内法琳過之律師不禮焉天王子謂律師曰自以為何如人律師曰吾頗聖也王子曰師未聖四果人耳法琳道人即是聖人律師曰彼破戒如此安得為聖王子曰彼菩薩地位非師所知然彼更來師其善待之律師乃改觀後法琳醉猝造律師直坐其牀吐於牀下臭穢雖甚律師不敢嫌之因以手攫造功徳錢納之袖中徑去便將沽酒市肉錢盡復取律師見即與之後唐髙祖納道士言將滅佛法法琳與諸道士競論道士慙服又犯髙祖龍顔固争佛法佛法得全琳之力也佛經䕶法菩薩其琳之謂乎出感通記徐敬業唐則天朝徐敬業揚州作亂則天討之軍敗而遁敬業竟養一人貌𩔖於已而寵遇之及敬業敗擒得所養者斬其元以為敬業而敬業實隱大孤山與同伴數十人結廬不通人事乃削髪為僧其侣亦多削髪天寳初有老僧法名住括年九十餘與弟子至南岳衡山寺訪諸僧而居之月餘忽集諸僧徒懴悔殺人罪咎僧徒異之老僧曰汝頗聞有徐敬業乎則吾身也吾兵敗入於大孤山精勤修道今命將終故來此寺令世人知吾已證第四果矣因自言死期果如期而卒遂葬於衡山出紀聞駱賔王唐考功員外郎宋之問以事累貶黜後放還至江南遊靈隱寺夜月極明長廊行吟且為詩曰鷲嶺鬱岧嶤龍宫鏁寂寥第一聯搜奇覃思終不如意有老僧㸃長命燈坐大禪牀問曰少年夜乆不寐而吟諷甚苦何􅁘之問答曰弟子業詩適遇欲題此寺而興思不屬僧曰試吟上聨即吟與之再三吟諷因曰何不云樓觀滄海日門對淛江潮之問愕然訝其遒麗又續終篇曰桂子月中落天香雲外飄捫蘿登塔逺刳木取泉遙霜薄花更發氷輕葉未凋待入天台路看余度石橋僧所贈句乃為一篇之警策遲明更訪之則不復見矣寺僧有知者曰此駱賔王也之問詰之答曰當徐敬業之敗與賔王俱逃捕之不獲將帥慮失大魁得不測罪時死者數萬人因求𩔖二人者函首以獻後雖知不死不敢捕送故敬業得為衡山僧年九十餘乃卒賔王亦落髪徧遊名山至靈隱以周歲卒當時雖敗且以興復唐朝為名故人多䕶脫之出本事詩太平廣記卷九十一
