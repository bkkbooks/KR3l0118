body:
  text: 太平廣記卷三百五十四宋李昉等編鬼三十九楊瑊𡊮繼謙邠州士人王商謝彦璋崇聖寺任彦思張仁寳楊藴中王延鎬僧恵進田達誠徐彦成鄭郊李茵栁鵬舉周潔楊瑊兖州龍興寺西南廊第一院有經藏有法寳大師者常於靈神佛堂之前見一白衣叟如此者數日怪而詰之叟曰余非人乃楊書記宅之土地僧曰何為至此叟曰彼公愎戾興造不輟致某無容身之地也僧曰何不禍之答曰彼福夀未衰無奈之何言畢不見後數年朱瑾棄城而遁軍亂一家皆遇害楊名瑊累舉不第為朱瑾書記出玉堂閒話𡊮繼謙殿中少監𡊮繼謙嘗居兖州侍親疾家在子城東南隅有僕人自外通刺者署云前某州長史許延年後云陳慰繼謙不樂命延入及束帶出則已去矣僕云徒歩衣故皂衣張帽而至裁投刺入車門則去矣其年親卒遂以其刺兼㝠錢焚之出玉堂閒話邠州士人朱梁時有士人自雍之邠數舍遇天晴月皎中夜而進行至曠野忽聞自後有車騎聲少頃漸近士人避於路旁草莽間見三騎冠帶如王者亦有徒歩徐行談話士人躡之數十歩聞言曰今奉命往邠州取三數千人未知以何道而取二君試為籌之其一曰當以兵取又一曰兵取雖優其如君子小人俱罹其禍何宜以疫取同行者深以為然既而車騎漸逺不復聞其言士人至邠州則部民大疫死者甚衆出玉堂閒話王商梁貞明甲戍嵗徐州帥王殷將叛八月二十日夜月明如晝居人咸聞通衢隊伍之聲自門隙覘之則皆青衣兵士而無甲胄初謂州兵潜以捕盜耳俄聞清嘯相呼或歌或歎刀盾矛槊囂隘閭巷怪狀竒形甚可畏懼乃知非人也比自府􅅟出於州南之東門扄鍵無阻比至仲冬殷乃拒詔朝命劉鄩以兵五萬致討凡八月而敗合境悉罹其禍出玉堂閒話謝彦璋梁許州節度使謝彦璋遇害朝廷命宣和庫副使郝昌遇往許昌籍其家財别開一室見彦璋真像之左目下鮮血在焉竟不知自何而有衆共異之彦璋性嗜鱉鎮河陽命漁者采以供膳無虛日焉不獲則必加重罰有漁人居於城東其日未曙將往取之未至一二里遇一人問其所適以實對此人曰子今日能且輟否漁人曰否則獲罪矣又曰子若不臨網罟則贈子以五千錢可乎漁人許之遂獲五千肩荷而囘比及曉唯呀其輕顧之其錢皆紙矣出玉堂閒話崇聖寺漢州崇聖寺寒食日忽有朱衣一人紫衣一人氣貌甚偉驅殿僕馬極盛寺僧謂其州官至奔出迎接皆非也與僧展揖甚恭唯少言語命筆各題一絶句于壁朱衣詩曰禁烟佳節同遊此正值酴醿夾岸香緬想十年前往事强吟風景亂愁腸紫衣詩曰䇿馬暫尋原上路落花芳草尚依然家亡國破一場夢惆悵又逢寒食天題罷上馬疾去出松徑失其所在但覺異香經月不散其詩于今見存出玉堂閒話任彦思蜀昌州牧任彦思家忽聞空中有樂聲極雅麗悲切竟日不休空中言曰與吾設食任問是何人竟不肯言本末乃與静室設之如人食無遺或不與食即致破什器蟲入人耳烈火四起彦思惡之移去廻避亦常先至凡七八年忽一日不聞樂聲置食無所餐㕔舍栿上血書詩曰物𩔖易􅁶變我行人不見珍重任彦思相别日已逺彦思尤惡其所題以刀剗之而字已入木終不知何鬼也出幽明録張仁寳挍書郎張仁寳素有才學年少而逝自成都歸塟閬中權殯東津寺中其家寒食日聞扣門甚急出視無人唯見門上有芭蕉葉上有題曰寒食家家盡禁烟野棠風墜小花鈿如今空有孤魂梦半在嘉陵半錦川舉族驚異端午日又聞扣門聲其父於門罅伺之乃見其子身長三丈許足不踐地門上題五月午日天中節題未畢其父開門即失所在頃之克塟不復至矣出述異記楊藴中進士楊藴中得罪下成都府獄夜夢一婦人雖形不揚而言詞甚秀曰吾即薛濤也頃幽死此室乃贈藴中詩曰玉漏深長燈耿耿東墻西墻時見影月明窓外子規啼忍使孤魂愁夜永出幽異記王延鎬梓州有陽闗神即蜀車騎將軍西鄉侯張飛也靈應嚴暴州人敬憚之龍州軍判官王延鎬納成都美妓人霞卿甚寵之携之赴官經陽闗神祠前過霞卿暴卒唯所生一女非延鎬之息倍哀憫之一日𫝊靈語具云為陽闗神所錄辭而得解從此又同寢處寫其貌而馮之至於盥潄飲食皆如生乃曰俟我嫁女方與君别延鎬將更娶告之鬼亦許焉乃娶沋彦循女自是或女客列坐即有一黒蝴蝶翩翻掠筵席而過卒以為常其後延鎬為新津令方嫁其女資送甚備自是無聞出靈異記僧恵進西蜀有僧恵進者姓王氏居福感寺早出至資福院門見一人長身如靛色廹之漸急奔走避之至竹簀橋馳入民家此人亦隨至撮拽牽頓勢不可解僧哀鳴祈之此人問汝姓何答曰姓王此人曰名同異姓乃捨之而去僧戰懾投民家移時稍定方歸寺中是夕有與之同名異姓者死焉出錄異記田達誠廬陵有賈人田達誠富於財頗以周給為務治第新成有夜扣門者就視無人如是再三因呼問之為人耶鬼耶良久答曰實非人也比居龍泉舍為暴水所毁求寄君家治舍畢乃去耳達誠不許曰人豈可與鬼同居耶對曰暫寄居耳無害於君且以君義氣聞於鄉里故告耳達誠許之因曰當止我何所達誠曰唯有㕔事耳即拜辭謝而去數日復來曰家已至㕔中亦無妨君賔客然可嚴整家人慎火萬一不意或當云吾等所為也達誠亦虛其㕔以奉之達誠嘗為詩鬼忽空中言曰君乃能詩耶吾亦嘗好之可唱和乎達誠即具酒置紙茟於前談論無所不至衆目視之酒與紙筆儼然不動試暫囘顧則酒已盡字亦著紙矣前後數篇皆有意義筆跡勁健作栁體或問其姓字曰吾儻言之將不益於主人可詩以寄言之乃賦詩云天然與我一靈通還與人間事不同要識吾家真姓字天地南頭一段紅衆亦不諭也一日復告曰吾有少子婚樟樹神女將以某日成禮復欲借君後堂三日以終君大恵可乎達誠亦虚其堂以幕圍之三日復謝曰吾事訖矣還君此堂主人之恩可謂至矣然君家老婢某可笞一百也達誠辭謝召婢笞數下鬼曰使之知過可止矣達誠徐問其婢言曽穴幕竊視見賔客男女厨膳花燭與人間不殊後嵗餘乃辭謝而去達誠以事至廣陵久之不歸其家憂之鬼復至曰君家憂主人耶吾將省之明日還曰主人在楊子甚無恙行當歸矣新納一妾與之同寢吾燒其帳後幅以戲之爾大笑而去達誠歸問其事皆同後至龍泉訪其居亦竟不獲出稽神錄徐彦成軍吏徐彦成恒業市木丁亥嵗往信州汭口塲無木可市泊舟久之一日晚有少年從二僕往來岸側狀若訪人而不遇者彦成因延入舟中為設酒食賔敬之少年甚媿焉將去謝曰吾家近此數里别業中君旦日能辱顧乎徐彦成許諾明日乃往行里餘有僕馬來迎奄至一大宅門館甚盛少年出延客酒膳豐備從容久之彦成因言住此久無木可市少年曰吾有木在山中明當令出也居一二日果有材木大至良而價廉市易既畢往辭少年少年復出大杉板四枚曰向之木吾所賣今以此贈君至吳當獲倍蓰彦成廻始至秦淮㑹吳帥殂納杉板為棺以為材之尤異者獲錢數十萬彦成大市珍玩復往汭口以酬少年少年復與交市如是三往頗獲其利間一嵗復詣之村落如故了無所見訪其里中竟無能知者出稽神錄鄭郊鄭郊河北人舉進士下第游陳蔡間過一塜上有竹二竿青翠可愛因駐馬吟曰塜上兩竿竹風吹常裊裊久不能續聞塜中言曰何不云下有百年人長眠不知曉郊驚問之不復言矣出述異記李茵進士李茵襄陽人嘗遊苑中見紅葉自御溝流出上題詩云流水何太急深宫盡日間殷勤謝紅葉好去到人間茵收貯書囊後僖宗幸蜀茵奔竄南山民家見一宫娥自云宫中侍書名雲芳子有才思茵與之欵接因見紅葉嘆曰此妾所題也同行詣蜀具述宫中之事及綿州逢内官田大人識之曰書家何得在此逼令上馬與之前去李甚怏悵其夕宿逆旅雲芳復至曰妾已重賂中官求得從君矣乃與俱歸襄陽數年李茵疾瘠有道士言其靣有邪氣雲芳子自陳往年綿竹相遇實已自經而死感君之意故相從耳人鬼殊途何敢貽患於君置酒賦詩告辭而去矣出北夢瑣言栁􅉇舉唐龍紀中有士人栁􅉇舉遊杭州避雨於伍相廟見一女子抱五絃云是錢大夫家女僕􅉇舉悦之遂誘而奔藏於舟中為廂吏所捕女僕自經而死一日却到栁處栁亦知其物故其僕具導其情故留之經時而去出北夢瑣言周潔霍丘令周潔甲辰嵗罷任客遊淮上時民大饑逆旅殆絶投宿無所升髙而望逺見村落煙火趨而詣之得一村舍扣門久之一女子出應門告以求宿女子曰家中饑餓老幼皆病無以延客至中堂一榻可矣遂入之女子侍立於前少頃其妹復出映姊而立不見其靣潔自其食取餅二枚以與二女持之入室閉闗而寢悄無人聲潔亦聳然而懼向曉將去便呼二女告之了無聲應者因壊户而入乃見積尸滿屋皆將枯朽唯女子死可旬日其妹面目已枯矣二餅猶置胸上潔皆為瘞之云出稽神錄太平廣記卷三百五十四
