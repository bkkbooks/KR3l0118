body:
  text: 太平廣記卷三百二十七宋李昉等編鬼十二崔子武馬道猷顧揔邢鸞蕭摩侯道人法力蕭思遇任胄董壽之樊孝謙李文府史萬歲房𤣥齡魏徵唐儉崔子武齊崔子武幼時宿於外祖揚州刺史趙郡李憲家夜夢一女子姿色甚麗自謂云龍王女願與崔郎私好子武悅之牽其衣裾微有裂綻未曉吿辭結帶而别至明往山祠中觀之傍有畫女容狀即夢中見者裂裾結帶猶在子武自是通夢恍惚成疾後逢醫禁之乃絶出三國典略馬道猷南齊馬道猷爲尚書令史永明元年坐省中忽見鬼滿前而傍人不見須臾兩鬼入其耳中推出魂魂落屐上指以示人諸君見否傍人並不見問魂形狀云何道猷曰魂正似蝦蟇云必無活理鬼今猶在耳中視其耳皆腫明日便死出述異記顧揔梁天監元年武昌小吏顧揔性昏戅不任事數爲縣令鞭扑嘗鬱鬱懷憤因逃墟墓之間彷徨惆悵不知所適忽有二黄衣顧見揔曰劉君頗憶疇日周旋耶揔曰弊宗乃顧氏先未曾面清顔何有周旋之問二人曰僕王粲徐幹也足下前生是劉楨爲坤明侍中以納賂金謫爲小吏公當自知矣然公言辭歴歴猶見記室音旨因出袖中軸書示之曰此君集也當諦視之揔試省覽乃了然明悟便覺文思坌涌其集人多有本唯卒後數篇記得詩一章題云從駕遊幽厲宫却憶平生西園文會因寄地文府正郎蔡伯喈詩曰在漢繩綱渚溟瀆多騰湍煌煌魏英祖拯溺靜波瀾天紀已垂定邦人亦保完大開相公府掇拾盡幽蘭始從衆君子日侍賢王歡文皇在春宫蒸孝踰問安監撫多餘暇園圃恣遊觀末臣戴簪筆翊聖從和鑾月出行殿涼珍木清露團天文信輝麗鏗鏘振琅玕被命仰爲和顧已試所難弱質不自持危脆朽萎殘豈意十餘年陵寢梧楸寒今來坤明國再顧簪蟬冠侍遊於離宫足躡浮雲端却想西園時生死暫悲酸君昔漢公卿未央冠羣賢倘若念平生覽此同愴然其餘七篇傳者失本王粲謂揔曰吾本短小無何娶樂進女女似其父短小尤甚自别君後改娶劉荆州女尋生一子荆州與字翁奴今年十八長七尺三寸所恨未得參丈人也當渠年十一與予同覽鏡予謂之曰汝首魁梧於予渠立應予曰防風骨節專車不如白起頭小而銳予又曰汝長大當爲將又應予曰仲尼三尺童子羞言覇道況承大人嚴訓敢措意於斫刺乎予知其了了過人矣不知足下生來有郎娘否良久沈思稍如相識因曰二君既是揔友人何計可脫小吏之厄徐幹曰君但執前集訴於縣宰則脫矣揔又問坤明是何國幹曰魏武開國鄴地也公昔爲其國侍中遽忘耶公在坤明家累悉無恙賢小嬌羞娘有一篇奉憶昨者已誦似丈人矣詩曰憶爺爺抛女不歸家不作侍中爲小吏就他辛苦棄榮華願爺相念早相見與兒買李市甘𤓰誦訖揔不覺涕泗交下因爲一章寄嬌羞娘云憶兒貌念兒心望兒不見淚沾襟時移世異難相見棄謝此生當重尋既而王粲徐幹與揔殷勤敘别乃遺劉楨集五卷見縣令具陳其事令見楨集後詩驚曰不可使劉公幹爲小吏即解遣以賔禮待之後不知揔所在集亦尋失時人勗子弟皆曰死劉楨猶庇得生顧揔可不修進哉出𤣥怪録邢鸞後魏洛陽永和里漢太師董卓之宅也里南北皆有池卓之所造水冬夏不竭里中太傅録尚書長孫稚尚書右僕射郭祚吏部尚書邢鸞廷尉卿元洪超衞尉卿許伯桃凉州刺史尉成興等六宅皆髙門華屋齋館敞麗楸槐䕃途桐楊夾植當世名爲貴里掘此地輒得金玉寳玩之物時邢鸞家常掘得丹砂及錢數十萬銘云董太師之物後卓夜中隨鸞索此物鸞不與之經年而鸞卒出洛陽伽藍記蕭摩侯後魏胡太后末年澤州田參軍蕭摩侯家人浣一黄衫晒之庭樹日暮忘收夜半摩侯家起出見此衣爲風所動彷彿類人謂是竊盗持刀往擊就視乃是衣自此之後内外恐懼更數日忽有二十騎盡爲戎服直造其家揚旗舉杖往來掩襲前後六七處家人惶懼不知何方禦之有一人云按藥方燒羖羊角妖自絶即於屠肆得之遂燒此等後來至掩鼻云此家不知燒何物臭穢如此翻然回自此便絶出五行記道人法力廣州顯明寺道人法力向晨詣厠於户中遇一鬼狀如崑崙兩目盡黄裸身無衣法力素有膂力便縛着堂柱以杖鞭之終無聲乃以鐵鎖縛之觀其能變去否日已昏暗失鬼所在出述異記蕭思遇蕭思遇梁武帝從姪孫父慤爲侯景所殺思遇以父遭害不樂仕進常慕道有冀神人故名思遇而字望明言望遇神明也居虎邱東山性簡靜愛琴書每松風之夜罷琴長嘯一山樓宇皆驚常雨中坐石酣歌忽聞扣柴門者思遇心疑有異令侍者遥問乃應曰不須問但言雨中從浣溪來及侍童開户見一美女二青衣女奴從之並神仙之容思遇加山人之服以禮見之曰適聞夫人云從浣溪來雨中道逺不知所乗何車耶女曰聞先生心懷異道以簡潔爲心不用車輿乗風而至思遇曰若浣沙來得非西施乎女回顧二童而笑復問先生何以知之思遇曰不必慮懷應就寢耳及天曉將别女以金釧子一隻留訣思遇稱無物敘情又曰但有此心不忘夫人曰此最珍竒思遇曰夫人此去何時來女乃掩涕曰未敢有期空勞情意思遇亦愴然言訖遂乗風而去須臾不見唯聞香氣猶在寢室時陳文帝天嘉元年二月二日也出博物志任胄東魏丞相司馬任胄謀殺高歡事洩伏誅其家未之知家内忽見其頭在飯甑上相召看之少頃失所在俄知被戮出三國典略董壽之北齊董壽之被誅其家尚未之知其妻夜坐忽見壽之居其側歎息不已妻問夜間何得而歸壽都不應答有頃出門遶雞籠而行籠中雞驚呌其妻疑有異持火出戸視之見其血數斗而壽失所在遂以吿姑因與大小號哭知有變及晨果得死問出續搜神記樊孝謙北齊樊孝謙少有才名年二十二答秀才䇿累遷至員外散騎侍郎嘗於其門首觀貴人𦵏車揖方相而别是後周年至此𦵏日有人扣門孝謙出視乃見所揖方相門首立云君去年此日共我語否孝謙驚倒須臾便卒貞觀初崔信明爲洋州與縣丞向瓘無二說出五行記李文府隋文帝開皇初安定李文府住鄴都石橋坊曾夜置酒瓶於牀下半夜覺忽聞瓶倒漏酒聲使婢看之酒瓶不倒蓋塞如舊須臾復聞有物㗳水聲索火照看屋内靜無所見滅燭下闗未睡似有以手指斵其膝至三文府起捫之又無所得乃拔刀四面揮之即聞有聲如飛蟬曳響衝而出文府後仕兗州須昌縣丞至開皇八年見州故録事孔瓚即須昌人先亡忽白日至文府㕔前再拜文府驚問何爲云太山府君選好人瓚以公明幹輒相薦舉文府憂惶叩頭瓚良久云今更爲方便慎勿漏言至十年自說之說訖便覺不快須臾而死出五行記史萬歲長安待賢坊隋北領軍大將軍史萬歲宅其宅初常有鬼怪居者輒死萬歲不信因即居之夜見人衣冠甚偉來就萬歲萬歲問其由鬼曰我漢將軍樊噲墓近君居厠常苦穢惡幸移他所必當厚報萬歲許諾因責殺生人所由鬼曰各自怖而死非我殺也及掘得骸柩因爲改葬後夜又來謝曰君當爲將吾必助君後萬歲爲隋將每遇賊便覺鬼兵助巳戰必大捷出兩京記房𤣥齡房𤣥齡杜如晦微時嘗自周偕之秦宿敷水店適有酒肉夜深對食忽見兩黑毛手出於燈下若有所請乃各以一炙置手中有頃復出若掬又各斟酒與之遂不復見食訖背燈就寢至二更聞街中有連呼王文昂者忽聞一人應於燈下呼者乃曰正東二十里村人有筵神者酒食甚豐汝能去否對曰吾已醉飽於酒肉有公事去不得勞君相召呼者曰汝終日飢困何有酒肉本非吏人安得公事何妄語也對曰吾被界吏差直二相蒙賜酒肉故不得去若常時聞命即子行吾走矣呼者謝而去出續𤣥怪録魏徵鄭國公魏徵少時好道學不信鬼神嘗訪道至恒山將及山下忽大風雪天地昏暗不能進忽有道士策青竹杖懸黄庭經亦至路次謂徵曰何之徵曰訪道來此爲風雪所阻道士曰去此一二里予家也可一宿會語乎徵許之遂同行至一宅外甚荒凉内即雕刻延徵於深閣對爐火而坐進以美酒嘉殽從容論道詞理博辨徵不能屈臨曙道士言及鬼神之事徵切言不能侵正直也道士曰子之所奉者仙道也何全誣鬼神乎有天地來有鬼神夫道髙則鬼神妖怪必伏之若奉道自未髙則鬼神妖怪反可致之也何輕之哉徵不答及平旦道士復命酒以送徵仍附一簡達恒山中𨼆士徵既行尋山路回顧宿處乃一大冢耳探其簡題云寄上恒山神佐徵惡之投於地其簡化一鼠而走徵自此稍信鬼神出瀟湘録唐儉唐儉少時乗驢將適吳楚過洛城渴甚見路傍一小室有婦人年二十餘向明縫衣投之乞漿則縫襪也遂問别室取漿郎渴甚爲求之逡巡持一盂至儉視其室内無厨竈及還而問曰夫人之居何不置火曰貧無以炊側近求食耳言既復縫襪意緒甚忙又問何故急速也曰妾之夫薛良貧販者也事之十餘年矣未嘗一歸侍舅姑明早郎來迎故忙耳儉微挑之拒不答儉媿謝之遺餅兩軸而去行十餘里忽記所要書有忘之者歸洛取之明晨復至此將出都爲塗芻之阻問何人對曰貨師薛良之柩也駭其姓名乃昨婦人之夫也遂問所往曰良婚五年而妻死葬故城中又五年而良死良兄發其柩將祔先塋耳儉隨觀焉至其殯所是求水之處俄而啓殯棺上有餅兩軸新襪一雙儉悲而異之遂東去舟次揚州禪智寺東南有士子二人各領徒相去百餘步發故殯者一人驚歎久之其徒往往聚笑一人執鍤碎其柩而罵之儉遽造之歎者曰璋姓韋前太湖令此發者璋之亡子窆十年矣適開易其棺棺中喪其履而有婦人履一隻彼乃裴冀前江都尉其發者愛姬也平生寵之裴到任二年而卒葬於此一年今秩滿將歸不忍棄去將還於洛既開棺喪其一履而有丈夫履一隻兩處互驚取合之彼此成對蓋吾不肖子淫於彼往復無常遽遺之耳儉聞言登舟靜思之曰貨師之妻死五年猶有事舅姑之心逾寵之姬死尚如此生復何望哉士君子可溺於此輩而薄其妻也出續𤣥怪録太平廣記卷三百二十七
