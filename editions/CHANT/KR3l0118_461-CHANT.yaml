body:
  text: 孔雀交趾交趾郡人多養孔雀或遺人以充口腹或殺之以為脯腊人又養其雛為媒旁施网罟捕野孔雀伺其飛下則牽网橫掩之采其金翠毛裝為扇拂或全株生截其尾以為方物云生取則金翠之色不減耳羅州羅州山中多孔雀群飛者數十為偶雌者尾短無金翠雄者生三年有小尾五年成大尾始春而生三四月后复凋與花萼相榮衰然自喜其尾而甚妒凡欲山栖必先擇有置尾之地然后止焉南人生捕者候甚雨往擒之尾沾而重不能高翔人雖至且愛其尾恐人所傷不复騫翔也雖馴養頗久見美婦人好衣裳與童子絲服者必逐而啄之芳時媚景聞管弦笙歌必舒張翅尾盼睇而舞若有意焉山谷夷民烹而食之味如鵝解百毒人食其肉飲藥不能愈病其血與其首解大毒南人得其卵使雞伏之即成其腳稍屈其鳴若曰都護土人取其尾者持刀于叢篁可隱之處自蔽伺過急斷其尾若不即斷回首一顧金翠無复光彩王軒盧肇住在京南海見從事王軒有孔雀一日奴來告曰蛇盤孔雀且毒死矣軒令救之其走卒笑而不救軒怒卒云蛇與孔雀偶漢燕蓐泥為窠聲多稍小者漢燕陶胜力注本草云紫胸輕小者是越燕胸斑黑聲大者是胡燕其作巢喜長越燕不入藥用越與漢亦小差耳胡燕凡狐白貂鼠之類燕見之則毛脫或燕蟄于水底舊說燕不入室取桐為男女各一投井中燕必來胸斑黑聲大名胡燕其窠有容匹素者千歲燕齊魯之間謂燕為乙作巢避戊己玄中記云千歲之燕戶北向述異要云五百歲燕生胡髯晉瑞魏禪晉歲北闕下有白光如鳥雀之狀時有飛翔去來有司即聞奏帝使羅者張之得一白燕以為神物以金為籠致于宮內旬日不知所在論者云金德之瑞昔師曠時有白燕來巢檢瑞應圖果如所論師曠晉人也古今之議相符焉元道康后魏元道康字景怡居林慮山云栖幽谷靜掩衡茅不下人間逾二十載服餌芝木以娛其志高歡為丞相前后三辟不就道康以時方亂不欲應之至高洋又征亦不起道康書齋常有雙燕為巢歲歲未嘗不至道康以連征不去又懼見禍不覺嗟咨是夕秋月朗然清風颯至道康向月微思忽聞燕呼康字云景怡卿本澹然為樂今何愁思之深耶道康惊異乃知是燕又曰景怡景怡樂以終身康曰爾為禽而語何巢我屋燕曰我為上帝所罪暫為禽耳以卿盛德故來相依道康曰我忘利不售人間所以閉關服道寧昌其德為卿所謂燕曰海內栖隱盡名譽耳獨卿知道卓然囂外所以神祇敬屬萬靈歸德燕曰我來日晝時往前溪相報道康乃策杖南溪以伺其至及晝見二燕自北岭飛來而投澗下一化為青衣童子一化為青衣女子前來謂道康曰今我便歸以卿相命故來此化然無以留別卿有隱志幽陰見嘉卿之壽更四十歲以此相報言訖复為雙燕飛去不知所往時道康已年四十后果終八十一范質漢戶部侍郎范質言嘗有燕巢于舍下育數雛已哺食矣其雌者為貓所搏食之雄者啁啾久之方去即時又與一燕為匹而至哺雛如故不數日諸雛相次墮地宛轉而僵兒童剖腹視之則有蒺藜子在嗉中蓋為繼偶者所害飛數鷓鴣飛數逐月如正月一飛而止于窠中不复起矣十二月十二起最難采南人設网取之飛南向鷓鴣似雌雉飛但南不向北楊孚交州異物志云鳥像雌雉名鷓鴣其志懷南不思北徂吳楚鷓鴣鷓鴣吳楚之野悉有岭南偏多此鳥肉白而脆遠胜雞雉能解冶葛并菌毒臆前有白圓點背上間紫赤毛其大如野雞多對啼南越志云鷓鴣雖東西回翔然開翅之始必先南翥其鳴自呼社薄州又本草云自呼鉤輈格磔李群玉山行聞鷓鴣詩云方穿詰曲崎嶇路又聽鉤輈格磔聲鵲知太歲鵲知太歲之所在博物志云鵲窠背太歲此非才智任自然爾淮南子曰鵲識歲多風去喬木巢傍枝又鵲构窠取在樹杪枝不取墮地者又纏枝受卵端午日午時焚其巢灸病者疾立愈張顥常山張顥為梁相天新雨后有鳥如山鵲稍下墮地民拾取即化為一圓石顥椎破之得一金印文曰忠孝侯印顥以上聞藏之秘府顥后官至太尉后議郎汝南樊行夷校書東觀上表言堯舜之時嘗有此官今天降印宜應复條支國章帝永寧元年條支國有來進異瑞有鳥名鳷鵲形高七尺解人言其國太平鳷鵲群翔昔漢武時四夷賓服有致此鵲馴善有吉樂事則鼓翼翔鳴按庄周云雕陵之鵲蓋其類也黎景逸唐貞觀末南康黎景逸居于空青山常有鵲巢其側每飯食餧之后鄰近失布者誣景逸盜之系南康獄月余劾不承欲訊之其鵲止于獄樓向景逸歡喜以傳語之狀其日傳有赦官司詰其來云路逢玄衣素衿人所說三日而赦果至景逸還山乃知玄衣素衿者鵲之所傳張昌期汝州刺史張昌期易之弟也恃寵驕貴酷暴群僚梁縣有人白云有白鵲見昌期令司戶楊楚玉捕之部人有鷂子七十籠矣以蜡涂爪至林見白鵲有群鵲隨之見鷂迸散唯白者存焉鷂竦身取之一無損傷而籠送之昌期笑曰此鵲贖君命也玉叩頭曰此天活玉不然投河赴海不敢見公拜謝而去崔圓妻鵲窠中必有棟崔圓相公妻在家時與姊妹于后園見一鵲构窠共銜一木大如筆管長尺余安窠中眾悉不見俗言見鵲上梁必貴乾陵大歷八年乾陵上仙觀之尊殿有雙鵲銜柴及泥補葺隙坏十五處宰臣表賀之鴿信大理丞鄭复禮言波斯舶上多養鴿鴿能飛行數千里輒放一隻至家以為平安信陳倉寶雞秦穆公時陳倉人掘地得物若羊非羊若豬非豬牽以獻穆公道逢二童子曰此為媼述常在地中食死人腦若欲殺之以柏插其首媼曰此二童子名為雞寶得雄者王得雌者伯陳倉人舍之逐二童子二童化為雉飛入于林陳倉人告穆公發徒大獵果得其雌又化為石置之汧渭之間至文公立祠名陳寶雄者飛南集今南陽雉飛縣即其地也楚雞楚人有擔山雞者路人問曰何鳥也擔者欺之曰鳳皇也路人曰我聞有鳳皇久矣今真見之汝賣之乎曰然乃酬千金弗與請加倍乃與之方將獻楚王經宿而鳥死路人不遑惜其金惟恨不得以獻耳國人傳之咸以為真鳳而貴宜欲獻之遂聞于楚王王感其欲獻己也召而厚賜之過買鳳之直十倍矣衛女雉朝飛操者衛女傅母所作也衛侯女嫁于齊太子中道聞太子死問傅母曰何如傅母曰且往赴喪喪畢不肯歸終之以死傅母悔之取女所自操琴于冢上鼓之忽有二雉俱出墓中傅母撫雌雉曰女果為雉耶言未卒俱飛而起忽然不見傅母悲痛授琴作操故曰雉朝飛長鳴雞漢成帝時交趾越雋獻長鳴雞伺晨雞即下漏驗之晷刻無差長鳴一食頃不絕長距善斗沉鳴雞建安三年胥圖獻沉鳴石雞色如丹大如燕常在地中應時而鳴聲能遠徹其國聞其鳴乃殺牲以祀之當聲處掘地得此雞若天下平翔飛頡頏以為嘉瑞亦謂寶雞其國無雞人聽地中以候晷刻道師云昔仙人相君采石入穴數里得丹石雞舂碎為藥服者令人有聲氣后天而死昔漢武寶鼎元年四方貢珍怪有琥珀燕置之靜室自然鳴翔此之類也洛書云胥圖之寶土德之征大魏嘉瑞焉孫休孫休好射雉至其時則晨往夕返群臣莫不上諫曰此小物何足甚耽答曰雖為小物耿介過人朕之所以好也吳清徐州民吳清以太元五年被差為征民殺雞求福煮雞頭在盤中忽然而鳴其聲甚長后破賊帥邵寶寶臨陣戰死其時僵尸狼藉莫之能識清見一人著白袍疑是主帥遂取以聞推校之乃是寶首清以功拜清河太守越自什伍遽升榮位雞之妖更為吉祥廣州刺史廣州刺史喪還其大兒安吉元嘉三年病死第二兒四年复病死或教以一雄雞置棺中此雞每至天欲曉輒在棺里鳴三聲甚悲徹不異栖中鳴一月日后不复聞聲祝雞公祝雞公者洛陽人也居尸鄉北山下養雞百餘年雞皆有名字千余頭暮栖樹下晝放散之欲取呼名即種別而至賣雞及子得千余萬輒置錢去之吳作養池魚后登吳山雞雀數百常出其旁朱綜臨淮朱綜遭母難恒外處住內有病因見前婦婦曰喪禮之重不煩數還綜曰自荼毒已來何時至內婦云君來多矣綜知是魅敕婦婢候來便即閉戶執之及來登往赴視此物不得去遽變老白雄雞推問是家雞殺之遂絕代郡亭代郡界中一亭作怪不可止有諸生壯勇者暮行欲止亭宿亭吏止之諸生曰我自能消此乃住宿食夜諸生前坐出一手吹五孔笛諸生笑謂鬼曰汝止有一手那得遍笛我為汝吹來鬼云卿為我少指耶乃复引手即有數十指出諸生知其可擊因拔劍砍之得老雄雞高嶷唐渤海高嶷巨富忽患月余日帖然而卒心上仍暖經日而蘇云有一白衣人眇目把牒冥司訟殺其妻子嶷對元不識此老人冥官云君命未盡且放歸遂悟白衣人乃是家中老瞎麻雞也令射殺魅遂絕天后唐文明已后天下諸州進雌雞變為雄者甚多或半已化半未化乃則天正位之兆衛鎬衛鎬為縣官下縣至里人王幸在家方假寐夢一烏衣婦人引十數小兒著黃衣咸言乞命叩頭再三斯須又至鎬甚惡其事遂催食欲前適鎬所親者報曰王幸在家窮無物設饌有一雞見抱兒已得十余日將欲殺之鎬方悟烏衣婦人果烏雞也遂命解放是夜复夢感欣然而去合肥富人合肥有富人劉某好食雞每殺雞必先刖雙足置木柜中血瀝盡力乃烹以為去腥氣某后病生瘡于鬢既愈复生小雞足于瘡瘢中每巾櫛必傷其足傷即流血被面痛楚竟日如是積歲無日不傷竟以是卒
