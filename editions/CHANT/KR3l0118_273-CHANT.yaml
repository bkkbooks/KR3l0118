body:
  text: 周皓周皓太僕卿周皓貴族子多力負氣天寶中皓少年常結客為花柳之遊竟蓄亡命訪城中名姬如蠅襲羶無不獲者時靖恭有姬子夜來稚齒巧笑歌舞絕倫貴公子破產迎之皓時與數輩富者更擅之會一日其母白皓曰某日夜來生日豈可寂寞乎皓與往還竟求珍貨合錢數十萬會飲其家樂工賀懷智紀孩孩皆一時絕手扃方合忽覺擊門聲甚急皓戒內忽開良久折關而入有少年紫衣騎從數十詬其母即將軍高力士之子也母與夜來泣拜諸客將散皓時血氣方剛且恃其力顧從者不相敵因前讓其怙勢攘臂格之紫衣者踣於拳下且絕其頷骨大傷流血皓遂突出時都亭驛所由魏貞有心義好養私客皓以情投之貞乃藏於妻女間時有司追捉急切貞恐蹤露乃夜辦裝具腰白金數錠謂皓曰汴州周簡老義士也復與郎君當家今可依之且宜謙恭不怠周簡老蓋大俠也見魏貞書喜甚皓因拜之為叔遂言其狀簡老令居一船中戒無妄出供與極厚居歲餘忽聽船上哭泣聲皓潛窺之見一少婦縞衣甚美與簡老相慰其夕簡老忽至皓處問君婚未某有表妹嫁與甲甲卒無子今無所歸可事君子皓拜謝之即夕其表妹歸皓有女二人男一人猶在舟中簡老忽語皓事已息君貌寢必無人識者可遊江淮乃贈百餘千號哭而別於是遂免李秀蘭李秀蘭以女子有才名初五六歲時其父抱於庭作詩詠薔薇其末句云過時未架却心緒亂縱橫父恚曰此女子將來富有文章然必為失行婦人矣竟如其言又秀蘭嘗與諸賢會烏程縣開元寺知河間劉長卿有陰疾謂之曰山氣日夕佳長卿對曰眾鳥欣有託舉坐大笑論者兩美之秀蘭有詩曰遠水浮仙棹寒星伴使車蓋五言之佳境也上方班姬即不足下比韓英則有餘亦女中之詩豪也嘗賦得三峽流泉歌曰妾家本住巫山雲巫山流水常自聞王琴彈出轉寥敻直似當時夢中聽三峽迢迢幾千里一時流入深閨裏巨石奔湍指下生飛渡走浪絃中起初疑噴湧含雷風又似嗚咽流不通迴湍瀨曲勢將盡時復滴瀝平沙中憶昔阮公為此曲能使仲容聽不足一彈既罷又一彈願與流泉鎮相續杜牧唐中書舍人杜牧少有逸才下筆成詠弱冠擢進士第復捷制科牧少雋性踈野放蕩雖為檢刻而不能自禁會丞相牛僧孺出鎮揚州辟節度掌書記牧供職之外唯以宴遊為事揚州勝地也每重城向夕倡樓之上常有絳紗燈萬數煇羅燿烈空中九里三十步街中珠翠填咽邈若仙境牧常出沒馳逐其間無虛夕復有卒三十人易服隨後潛護之僧孺之密教也而牧自謂得計人不知之所至成歡無不會意如是且數年及徵拜侍御史僧孺於中餞因戒之曰以侍御史氣概達馭固當自極夷塗然常慮風情不節或至尊體乖和牧因謬曰某幸常自檢守不至貽尊憂耳僧孺笑而不答即命侍兒取一小書簏對牧發之乃街卒之密報也凡數十百悉百某薨牧為之誌而極言其美報所之也牧既為御史久之分務洛陽時季司徒愿罷鎮閒居聲妓豪華為當時第一洛中名士咸謁見之李乃大開宴席當時朝客高流無不臻赴以牧持憲不敢邀致牧遣座客達意願預斯會李不得已馳書方對酒獨斟亦已酣暢聞命遽來時會中己飲酒女妓百餘人皆絕藝殊色牧獨坐南行瞪目注視引滿三巵問李云聞有紫雲者孰是李指示之牧復凝睇良久曰名不虛得宜以見惠李俯而笑諸妓皆亦迴首破顏牧又自飲三爵朗吟而起曰華堂今日綺筳開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時迴意氣閑逸旁若無人牧又自以漸遲暮常追賦感舊詩曰落魄江湖載酒行楚腰纖細掌中情三年一覺揚州夢嬴得青樓薄倖名又曰𦨻船一棹百分空十載青春不負公今日鬢絲禪榻伴茶煙輕颺落花風太和末牧復自侍御史出佐沈傳師江西宣州幕雖所至輒遊而終無屬意咸以非其所好也及聞湖州名郡風物妍好且多奇色因甘心遊之湖州刺史某乙牧素所厚者頗喻其意及牧至每為之曲宴周遊凡優姬倡女力所能致者悉為出之牧注目凝視曰美矣未盡善也乙復候其意牧曰願得張水嬉使州人畢觀候四面雲合某當閒行寓目冀於此際或有閱焉乙大喜如其言至日兩岸觀者如堵迨暮竟無所得將罷舟艤岸於叢人中有里姥引鵶頭女年十餘歲牧熟視曰此真國色向誠虛設耳因使語其母將接致舟中姥女皆懼牧曰且不即納當為後期姥曰他年失信復當何如牧曰吾不十年必守此郡十年不來乃從爾所適可也母許諾因以重幣結之為盟而別故牧歸朝頗以湖州為念然以官秩尚卑殊未敢發尋拜黃州池州又移睦州皆非意也牧素與周墀善會墀為相乃併以三牋干墀乞守湖州意以弟顗目疾冀於江外療之大中三年始授湖州刺史比至郡則已十四年矣所約者已從人三載而生三子牧既即政函使召之其母懼其見奪攜幼以同往牧詰其母曰曩既許我矣何為反之母曰向約十年十年不來而後嫁嫁已三年矣牧因取其載詞視之俛首移晷曰其詞也直彊之不祥乃厚為禮而遣之因賦詩以自傷曰自是尋春去校遲不須惆悵怨芳時狂風落盡深紅色綠葉成蔭子滿枝劉禹錫劉禹錫赴任姑蘇道過揚州州師杜鴻漸飲之酒大醉而歸驛稍醒見二女子在旁驚非己有也乃曰郎中席上與司空詩特令二樂妓侍寢且醉中之作都不記憶明旦修啟致謝杜亦優容之夫禹錫以郎吏州牧而輕忤三司豈不過哉詩曰高髻雲鬟宮樣粧春風一曲杜韋娘司空見慣尋常事斷盡蘇州刺史腸李逢吉李丞相逢吉性彊愎而沉猜多忌好危人略無怍色既為居守劉禹錫有妓甚麗為眾所知李恃風望恣行威福分務朝官取容不暇一旦陰以計奪之約曰某日皇城中堂前致宴應朝賢寵嬖並請早赴境會稍可觀矚者如期雲集敕閽吏先放劉家妓從門入傾都驚異無敢言者劉計無所出惶惑吞聲又翌日與相善數人謁之但相見如常從容久之並不言境會之所以然者座中默然相目而已既罷一揖而退劉嘆咤而歸無可奈何遂憤懣而作四章以擬四愁云爾玉釵重合兩無緣魚在深潭鶴在天得意紫鸞休舞鏡能言青鳥罷銜牋金盆已覆難收水玉軫長拋不續絃若向靡蕪山下過遙將紅淚灑窮泉鸞飛遠樹栖何處鳳得新巢已去心紅璧尚流香漠漠碧雲初斷信沈沈情知點污投泥玉猶自經營買笑金從此山頭似人石丈夫形狀淚痕深人曾何處更尋看雖是生離死一般買笑樹邊花已老畫眉牕下月猶殘雲藏巫峽音容斷路隔星橋過往難莫怪詩成無淚滴盡傾東海也須乾三山不見海沈沈豈有仙蹤更可尋青鳥去時雲路斷姮娥歸處月宮深紗窗遙想春相憶書幌誰憐夜獨吟料得夜來天上鏡只因偏照兩人心洛中舉人舉子某乙洛中居人也偶與樂妓茂英者相識英年甚小及乙到江外偶與飲席遇之因贈詩曰憶昔當初過柳樓茂英年小尚嬌羞隔牕未省聞高語對鏡曾窺學上頭一別中原俱老大重來南國見風流彈絃酌酒話前事零落碧雲生暮愁舉子因謁節使遂客遊留連數月帥遇之甚厚宴飲既頻與酒糺諧戲頗洽一日告辭帥厚以金帛贐行復開筵送別因暗留絕句與糺曰少插花枝少下籌須防女伴妬風流坐中若打占相令除却尚書莫點頭因設舞曲遺詩帥取覽之當時即令人所在送付舉子蔡京邕南朝度使蔡京過永州永州刺史鄭史與京同年連以酒樂相邀座有瓊枝者鄭之所愛而席之最妍蔡彊奪之行鄭莫之竟也邕南之所為多如此類為德義者見鄙終其不悛也及邕南制禦失律伏法武昌妓韋蟾廉問鄂州及罷任賓僚盛陳祖席蟾遂書文選句云悲莫悲兮生別離登山臨水送將歸以牋毫授賓從請續其句座中悵望皆思不屬逡巡女妓泫然起曰某不才不敢染翰欲口占兩句韋大驚異令隨口寫之武昌無限新栽柳不見楊花撲面飛座客無不嘉歎韋令唱作楊柳枝詞極歡而散贈數十箋納之翌日共載而發韋保衢韋保衢嘗訪同人方坐李新及第亦繼至保衢以其後先匿於帷下既入曰有客乎同人曰韋保衢秀才可以出否鉅新及第甚自得意徐曰出也何妨保衢竟不之出洎衢尚公主為相李蠙鎮岐下鉅方自山北舊從事辟焉初保衢既登第獨孤雲除東川辟在幕下樂籍間有佐飲者副史李甲屬意也時以逼於他適私期迴將納焉保衢既至不之知祈於獨孤且請降其籍李至意殊不平每在宴席輒以語侵保衢保衢不能容即攜其妓人以去李益怒之屢言於雲雲不得已命飛牒追之而迴無何堂牒追保衢赴輦下乃尚同昌公主也李固懼之矣不日保衢復入翰林李聞之登時而卒曹生盧常侍鉟牧瀘江日相座囑一曹生令署郡職不免奉之曹悅營妓名丹霞盧沮而不許會餞朝客於短亭曹獻詩曰拜玉亭間送客忙此時孤恨感離鄉尋思往歲絕纓事肯向朱門泣夜長盧演為長句和而勉之曰桑扈交飛百舌忙祖亭聞樂倍思鄉樽前有恨慚卑宦席上無寥愛艷粧莫為狂花迷眼界須求真理定心王遊蜂採掇何時已祗恐多言議短長羅虬羅虬詞藻富贍與宗人隱鄴齊名咸通乾符中時號三羅廣明庚子亂後去從鄜州李孝恭籍中有紅兒者善為音聲常為副戎屬意會副戎聘鄰道虬請紅兒歌而贈之繒綵孝恭以副車所盻不令受之虬怒拂衣而起詰旦手刃紅兒既而思之乃作絕句百編號比紅兒詩大行於時徐月英江淮間有徐月英者名娼也其送人詩云惆悵人間萬事違兩人同去一人歸生憎平望亭中水忍照鴛鴦相背飛又云枕前淚與階前雨隔個牕兒滴到明亦有詩集金陵徐氏諸公子寵一營妓卒乃焚之月英送葬謂徐公曰此娘平生風流沒亦帶焰時號美戲也
