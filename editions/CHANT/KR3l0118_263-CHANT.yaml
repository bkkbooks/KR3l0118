body:
  text: 劉誡之劉誡之唐天授年彭城劉誡之粗險不調高言庳語凌上忽下恐嚇財物口無關鑰妄說祅災從萬年縣尉常彥瑋索錢一百千云我是劉果毅當與富貴彥瑋進狀告之上令二給使先入彥瑋房中下簾坐牕下聽之有頃誡之及盧千仞至於廳上坐談話彥瑋引之說國家長短無所忌諱給使一一紙筆抄之以進上怒令金吾捕捉親問之具承遂腰斬誡之千仞處絞授彥瑋侍御史出朝野僉載宗玄成唐老三衛宗玄成邢州南和人祖齊黃門侍郎玄成性粗猛稟氣兇豪凌轢鄉村橫行州縣紀王為邢州刺史玄成與之抗行李備為南和令聞之每降階引接分庭抗禮務在招延養成其惡屬河朔失稔開倉賑給玄成依勢作威鄉墅彊乞粟一石備與客對不命玄成乃門外揚聲奮臂直入備集門內典正一百餘人舉牒推窮彊乞是實初令項上著鏁後却鏁上著枷文案既周且決六十杖下氣絕無敢言者出朝野僉載孟神爽揚州人稟性狼戾執心鴆毒巡市索物應聲即來入邸須錢隨口而至長史縣令高揖待之丞尉判司頷之而已張潛為揚州刺史聞其暴亂遣江都縣令店上捉來拖入府門高聲唱速付法曹李廣業推鞠密事並虛准敕決百杖下卒出朝僉載飛騎席人則天之廢廬陵也飛騎十餘人於客戶坊同飲有一人曰早知今日無功賞不及扶豎廬陵席上一人起出北門進狀告之席未散並擒送羽林鞠問皆實告者授五品言者斬自餘知反不告坐絞出朝野僉載韓令珪周令史韓令珪耐羞恥厚貌彊梁王公貴人皆呼次第平生未面亦彊干之曾選於陸元方下引銓時舍人王勮奪情與陸同廳而坐珪佯驚曰未見王五勮便降階階原作皆據黃本改憫然然原作默據黃本改令珪嚬眉蹙刺相慰而去陸與王有舊對面留住問勮是誰莫之識也後嚇人事敗於朝堂決杖遙呼河內王曰大哥何不相救懿宗目之曰我不識汝催杖苦鞭杖下取死出朝野僉載李宏唐李宏汴州浚儀人也兇悖無賴狠戾不仁每高鞍壯馬巡坊歷店嚇庸調租船綱典動盈數百貫彊貸商人巨萬竟無一還商旅驚波行綱側膽任正理為汴州刺史上十十原作下據黃本改餘日遣手力捉來責情決六十杖下而死工商客生酣飲相歡遠近聞之莫不稱快出朝野僉載長孫昕唐長孫昕皇后之妹夫與妻表兄楊仙玉乘馬二十餘騎並列並列二字原空闕據黃本補瓜撾於街中行御史大夫李傑在坊中內參姨母僮僕在門外昕與仙郎使奴打傑左右傑出來並波按頓須臾金吾及萬年縣官並到送縣禁之昕妻父王開府將二百百騎劫昕等去傑與金吾萬年以狀聞上奏敕斷昕殺積杖至數百而卒出朝野僉載張易之兄弟張易之兄弟驕貴彊奪莊宅奴婢姬妾不可勝數昌期於萬年縣街內行逢一女人壻抱兒相逐昌期馬鞭撥其頭巾女婦罵之昌期顧謂奴曰橫馱將來壻投匭三四狀並不出昌期捉送萬年縣誣以他罪決死之昌儀常謂人曰丈夫當如此今時千人推我不能倒及其敗也萬人擎我不能起俄而事敗兄弟俱斬出朝野僉載權懷恩唐邢州刺史權懷恩無賴除洛州長史州差參軍劉犬子迎至懷州路次拜懷恩突過不與語步趁二百餘步亦不遣乘馬犬子覺不似乃自上馬馳之至驛令脫靴訖謂曰洛州幾箇參軍對曰正員六人員外一人懷恩曰何得有員外對曰餘一員遣與長史脫靴懷恩驚曰君誰家兒對曰阿父為僕射懷恩撫然而去僕射劉仁軌謂曰公草裏刺史至神州不可以造次參軍雖卑微微原作維據黃本改豈可令脫靴耶懷恩慚請假不復出旬日為益州刺史出朝野僉載宋之愻唐洛陽丞宋之愻太常主簿之問弟羅織殺駙馬王同皎初之愻諂附張易之兄弟出為兗州司倉遂亡而歸王同皎匿之於小房同皎慷慨之士也忿逆韋與武三思亂國與一二所親論之每至切齒之愻於簾下竊聽之遣姪曇上書告之以希韋之旨武三思等果大怒奏誅同皎之黨兄弟並授五品官之愻為光祿丞之問為鴻臚丞曇為尚衣奉御天下怨之皆相謂曰之問等緋衫王同皎血染也誅逆韋之後之愻等長流嶺南客謂浮休子曰來俊臣之徒如何對曰昔有獅子王於深山獲一豺將食之豺曰請為王送二鹿以自贖獅子王喜周年之後無可送王曰汝殺眾生亦已多今次到汝汝其圖之豺默然無應遂齚殺之俊臣之輩何異豺也出朝野僉載張幹等上都市肆惡少率髡而膚劄備眾物形狀恃諸軍張拳彊劫至有以虵售酒捉羊甲擊人者京兆尹薛元賞上三日令里長潛捕約三十餘人悉杖殺屍于市市人有點青者皆炙滅之時大寧坊力者張幹劄左膊曰生不怕京兆尹右膊曰死不畏閻羅王又有王力奴以錢五千召劄工可胸腹為山亭院池榭草木鳥獸無不悉具細若設色公悉杖殺之又賊趙武建劄一百六處番印盤鵲等右膊刺言野雞灘頭宿朝朝被鶻捎忽驚飛入水留命到今朝又高陵縣捉得鏤身者宋元素劄七十一處刺左臂曰昔日已前家未貧千金不惜結交親及至恓惶覔知己行盡關山無一人右膊上劄瓠蘆上劄出人首如傀儡戲有郭公者縣吏不解問之言胡蘆精也出酉陽雜俎彭先覺周御史彭先覺無面目如意年中斷屠極急先覺知巡事定鼎門草車翻得兩腔羊門家告御史先覺進狀奏請合宮尉劉緬專當屠不覺察決一頓杖肉付南衙官人食緬惶恐縫新褌待罪明日則天批曰御史彭先覺奏決劉緬不須其肉乞緬喫却舉朝稱快先覺於是乎慚出朝野僉載周長壽周長壽三字原空闕據黃本補中斷屠極切左拾遺張德妻誕一男秘宰一口羊宴客其宴客其三字原空闕據黃本補日命諸遺補杜肅私囊一餤肉進狀告之至明日在朝在朝二字原空闕據黃本補前則天謂張德曰郎妻誕一男大歡喜德拜謝則天又謂曰又謂曰三字原空闕據黃本補然何處得肉德叩頭稱死罪則天曰朕斷屠吉凶不預卿預卿二字原空闕據黃本補命客亦須擇交無賴之人不須共聚集出肅狀以示之肅流汗浹背舉朝唾其面士子吞舍利唐洛中頃年有僧以以字原空闕據黃本補數粒所謂舍利者貯於琉璃器中晝夜香火檀越之禮日無虛焉有士子迫於寒餒因請僧願得舍利掌而觀之之字原空闕據黃本補僧遂出瓶授與遽即吞之僧惶駭如狂復慮聞之於外士子曰與吾幾錢當服藥出之僧喜聞遂贈二百緡乃服巴豆僧下瀉僧字瀉字原空闕據黃本補取濯而收之出尚書故事劉子振蒲人頗富學業而不知大體尤好凌轢同道詆訐公卿不恥干索州縣稍不留意立致寒暑以至就試明庭稠人廣眾罕有與立談者劉允章知舉歲患舉子納卷繁多榜云納卷不得過三卷子振納四十軸因之大掇凶譽原闕出處今見摭言荊州鬻劄者荊州貞元中市中有鬻劄者有印上簇針為眾物狀如蟾蝎鳥獸隨人所欲一印之刷以石墨瘡愈後細於隨永印出酉陽雜俎
