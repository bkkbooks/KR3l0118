body:
  text: 率然率然西方山中有蛇頭尾差大有色五彩人物触之者中頭則尾至中尾則頭至中腰則頭尾并至名曰率然會稽常山最多此蛇孫子兵法曰將之三軍勢如率然也蛇丘東海有蛇丘地險多漸洳眾蛇居之無人民蛇或人頭而蛇身昆侖西北山昆侖西北有山周回三萬里巨蛇繞之得三周蛇為長九萬里蛇常居此山飲食滄海綠蛇顧渚山石洞有綠蛇長可三尺余大類小指好栖樹杪視之若鞶帶纏于柯葉間無螫毒見人則空中飛報冤蛇岭南有報冤蛇人触之即三五里隨身即至若打殺一蛇則百蛇相集將蜈蚣自防乃免毒蛇山南五溪黔中皆有毒蛇烏而反鼻蟠于草中其牙倒勾去人數步直來疾如激箭螫人立死中手即斷手中足即斷足不然則全身腫爛百無一活謂蝮蛇也有黃喉蛇好在舍上無毒不害人唯善食毒蛇食飽垂頭直下滴沫地噴起變為沙虱中人為疾額上有大王字眾蛇之長常食蝮蛇種黍來蛇燒羚羊角及頭發則蛇不敢來蚺蛇大者五六丈圍五六尺以次者亦不下三四丈圍亦稱是身斑文如錦纈里人云春夏多于山林中等鹿鹿過則銜之自尾而吞唯頭角礙于口外即深入林樹間閣其首伺鹿坏頭角墜地鹿身方咽入腹如此后蛇极羸弱及其鹿消壯俊悅澤勇健于未食鹿者或云一年則食一鹿又一說蚺蛇常吞鹿鹿消盡乃繞樹出骨養瘡時肪腴甚美或以婦人衣投之則蟠而不起其膽上旬近頭中旬近尾蚺蛇膽泉建州進蚺蛇膽五月五日取時膽兩柱相去五六尺擊蛇頭尾以杖于腹下來去扣之膽即聚以刀刲取藥封放之不死复更取看肋下有痕即放雞冠蛇頭如雄雞有冠身長尺余圍可數寸中人必死會稽山下有之爆身蛇長一二尺形如灰色聞人行聲林中飛出狀若枯枝橫來擊人中者皆死黃領蛇長一二尺色如黃金居石縫中欲雨之時作牛吼聲中人亦死四明山有之藍蛇首有大毒尾能解毒出梧州陳家洞南人以首合毒藥謂之藍藥藥人立死取尾服反解毒藥巴蛇巴蛇食象三歲而出其骨食之無心腹之疾蠻江蛇南安蠻江蛇到五六月有巨蛇泛流登岸首如張帽萬萬蛇隨之入越王城兩頭蛇韶州多兩頭蛇為蟻封以避水蟻封者蟻子聚土為台也蒼梧亦多兩頭蛇長不過一二尺或云蚯蚓所化顏回顏回子路共坐于夫子之門有鬼魅求見孔子其目若合日其狀甚偉子路失魄口噤不得言顏淵乃納履杖劍前捲握其腰于是形化成蛇即斬之孔子出觀歎曰勇者不懼智者不惑智者不勇勇者不必有智蜀五丁周顯王三十二年蜀使使朝秦秦惠王數以美女進蜀王感之故朝惠王知蜀王好色許嫁五女于蜀蜀遣五丁迎之還到梓潼見一蛇入穴中一人攬其尾拽之不禁至五人相助大呼拔蛇山崩同時壓殺五丁及秦五女而山分為五岭直上有平石蜀王痛悼乃登之因命曰五女冢山于平石上為望婦侯作思妻台今其山或名五丁冢昭靈夫人小黃縣者宋地黃鄉也沛公起兵野戰喪皇妣于黃鄉天下平定乃使使者以梓宮招魂幽野于是有丹蛇在水自洒濯入于梓宮其浴處有遺發故謚曰昭靈夫人張寬漢武帝時張寬為揚州刺史先是有老翁二人爭地山詣州訟疆界連年不決寬視事复來寬窺二翁形狀非人令卒持戟將入問汝何等精翁走寬呵格之化為二蛇竇武後漢竇武母產武而并產一蛇送之野中后母卒及葬未窆有大蛇捧草而出徑至喪所以頭擊柩涕血皆流俯仰詰屈若哀泣之容有頃而去時人知為竇氏之祥楚王英女魯少千者得仙人符楚王的少兒英為魅所病請少千少千未至數十里止宿夜有乘鱉蓋車從數千騎來自稱伯敬候少千遂請內酒數榼肴餤數案臨別言楚王女病是吾所為君若相為一還我謝君二十萬千受錢即為還從他道詣楚為治之于女舍前有排戶者但聞云少千欺汝翁遂有風聲西北去視處有血滿盆女遂絕氣夜半乃蘇主使人尋風于城西北得一死蛇長數丈小蛇千百伏死其旁后詔下郡縣以其日月大司農失錢二十萬太官失案數具少千載錢上書具陳說天子異之張承母張承之母孫氏懷承之時乘輕舟游于江浦之際忽有白蛇長三丈騰入舟中母咒曰君為吉祥勿毒噬我乃篋而將還置諸房內一宿視之不复見蛇嗟而惜之鄰人相謂曰昨見張家有一白鶴聳翮凌云以告承母使筮之卜人曰此吉祥也蛇鶴延年之物從室入云自卑升高之象昔吳王闔閭葬其妹殉以美女名劍寶物窮江南之富未及十七年雕云覆于溪谷美女游于街上白鶴翔于林中白虎嘯于山側皆是昔之精靈今出世當使子孫位超臣极擅名江表若生子可以為名及生承名白鶴承生昭位至丞相為輔吳將軍年逾九十蛇鶴之祥也馮緄車騎將軍巴郡馮緄為議郎發綬笥有二赤蛇可長三尺分南北走大用憂怖卜云此吉祥也君后當為邊將以東為名复五年果為大將軍尋拜遼東太守魏舒晉咸寧中魏舒為司徒府中有蛇二其長十丈屋廳事平脊之上止之數年而人不知但怪府中數失小兒及雞犬之屬后一蛇夜出經柱側傷于刃病不能登于是覺之發徒數百共攻擊移時然得殺之視所居骨骼盈宇之間于是毀府舍更立之杜預杜預為荊州刺史鎮襄陽時有宴集大醉閉齋獨眠不聽人前后嘗醉外聞齋中嘔吐其聲甚苦莫不悚栗有一小吏私開戶看之正見床上一大蛇垂頭床邊吐都不見人出密道如此吳猛永嘉末豫章有大蛇長十余丈斷道經過者蛇輒吸取之吞噬已百數道士吳猛與弟子殺蛇猛曰此是蜀精蛇死而蜀賊當平既而果杜弢滅也顏含晉顏含嫂病須髯蛇膽不能得含憂歎累日有一童子持青囊授含含視乃蛇膽也童子化為青鳥飛去司馬軌之司馬軌之字道援善射雉太元中將媒下翳此媒雊野雉亦應試令尋覓所應者頭翅已成雉半身故是蛇晉中朝武庫內忽有雉時人或謂為怪張司空云此蛇所化耳即使搜庫中果得蛇蛻又太元中汝南人入山見一竹中蛇形已成上枝葉如故吳郡桐廬人嘗伐餘遺竹一宿見竿為雉頭頸盡就身猶未變化亦竹為蛇之化章苟吳興章苟于田中耕以飯置菰里每晚取食飯亦已盡如此非一后伺之見一大蛇偷食苟逐以叉之蛇走苟逐之至一穴但聞啼聲云斫傷我矣或言付雷公令霹靂殺須臾雷雨霹靂覆苟上苟乃跳梁大罵曰天使我貧窮展力耕墾蛇來偷食罪當在蛇反更霹靂我耶乃是無知雷公雷公若來吾當以斫汝腹須臾云雨漸散轉霹靂于蛇穴中蛇死者數十太元士人晉太元中士人有嫁女于近村者至時夫家遣人來迎女家好發遣又令女弟送之既至重門累閣擬于王侯廊柱下有燈火一婢子嚴妝直守后房帷帳甚美至夜女抱乳母涕泣而口不得言乳母密于帳中以手潛摸之得一蛇如數圍柱纏其女從足至頭乳母惊走出柱下守燈婢子悉是小蛇燈火是蛇眼慕容熙西晉末慕容熙光始三年熙出游還城南有柳樹如人呼曰大王止熙惡之伐其樹下有蛇長一丈至六年熙為馮政所滅邛都老姥益州邛都縣有老姥家貧孤獨每食輒有小蛇頭上有角在柈之間姥怜而飼之后漸漸長大丈余縣令有馬忽被蛇吸之令因大怒收姥姥云在床下遂令人發掘愈深而無所見縣令乃殺姥其蛇因夢于令曰何故殺我母當報仇耳自此每常聞風雨之聲三十日是夕百姓咸惊相謂曰汝頭何得戴魚相逢皆如此言是夜方四十里整個城一時俱陷為湖土人謂之邛河亦邛池其母之故宅基獨不沒至今猶存魚人采捕必止宿又言此水清其底猶見城郭樓檻宛然矣天門山山多峻秀岩谷逶邐有大岩壁直上數千仞草木交連云霧擁蔽其下有逕途微細行人往忽然上飛而出林表若升仙遂絕世如此者漸不可胜紀往來南北號為仙谷時有樂于道者不遠千里而來洗浴岩畔以來升仙在此林下無不飛去會一夕有智能者謂他人曰此必妖怪非是仙道因以石自系而牽一犬入其谷犬复飛去然知是妖邪之氣以吸之乃遣近山鄉里募年少者數百人執兵器持大棒而先縱火燒其草及伐竹木至山畔觀之遙見一物長數十丈高下隱隱垂頭下望及更漸逼乃一大蟒蛇于是命少年鼓躍擊射然后斫刺而口張尺余尚欲害人力不加眾久乃卒其所吞人骨與他獸之骸積在左右如阜焉又有人出行墜深泉澗者無出路饑餓分死左右見龜蛇甚多朝暮引頸向東方人因伏地學之遂不复饑體加輕便能登岩岸數年后試竦身舉臂遂超出澗上即得還家顏色悅懌頗更黠慧胜故還食谷啖滋味百餘日中复其本質忻州刺史唐忻州刺史是天荒闕前后歷任多死高宗時有金吾郎將來試此官既至夜獨宿廳中二更后見檐外有物黑色狀如大船兩目相去數丈刺史問為何神答云我是大蛇也刺史令其改貌相與語蛇遂化作人形來至廳中乃問何故殺人蛇云初無殺心其客自懼而死爾又問汝無殺心何故數見形軀曰我有屈滯當須府主謀之問有何屈曰昔我幼時曾入古冢爾來形體漸大求出不得狐兔狸貉等或時入冢方得食之今長在土中求死不得故求于使君爾問若然者當掘出之如何蛇云我逶迤已十余里若欲發掘城邑俱陷今城東有王村村西有楸樹使君可設齋戒人掘樹深二丈中有鐵函開函視之我當得出言畢辭去及明如言往掘得函歸廳開之有青龍從函中飛上天逕往殺蛇首尾中分蛇既獲死其怪絕矣余干縣令鄱陽余干縣令到官數日輒死后無就職者宅遂荒先天中有士人家貧來為之既至吏人請令居別廨中令因使治故宅剪薙榛草完葺牆宇令獨處其堂夜列燭伺之二更后有一物如三斗白囊跳轉而來床前直躍升幾上令無懼色徐以手倀触之真是韋囊而盛水也乃謂曰為吾徙燈直西南隅言訖而燈已在西南隅又謂曰汝可為我按摩囊轉側身上而甚便暢又戲之曰能使我床居空中否須臾已在空中所言無不如意將曙乃躍去令尋之至舍池旁遂滅明日于滅處視之見一穴才如蟻孔掘之長丈許而孔轉大圍三尺余深不可測令乃敕令多具鼎鑊樵薪悉汲池水為湯灌之可百餘斛穴中雷鳴地為震動又灌百斛乃怗然無聲因并力掘之數丈得一大蛇長百餘尺旁小者巨萬計皆并命穴中令取大者脯之頒賜縣中后遂平吉王真妻華陰縣令王真妻趙氏者燕中富人之女也美容貌少適王真洎隨之任近半年忽有一少年每伺真出即輒至趙氏寢室既頻往來因戲誘趙氏私之忽一日王真自外入乃見此少年與趙氏同席飲酌歡笑甚大惊訝趙氏不覺自仆氣絕其少年化一大蛇奔突而去真乃令侍婢扶腋起之俄而趙氏亦化一蛇奔突俱去王真遂逐之見隨前出者俱入華山久之不見朱覲朱覲者陳蔡游俠之士也旅游于汝南栖逆旅時主人鄧全賓家有女姿容端麗常為鬼魅之幻惑凡所醫療莫能愈之覲時過友人飲夜艾方歸乃憩歇于庭至二更見一人著白衣衣甚鮮洁而入全賓女房中逡巡聞房內語笑甚歡不成寢執弓矢于黑處以伺其出候至雞鳴見女送一少年而出覲射之既中而走覲复射之而失其跡曉乃聞之全賓遂與覲尋血跡出宅可五里已來其跡入一大枯樹孔中令人伐之果見一蛇雪色長丈余身帶二箭而死女子自此如故全賓遂以女妻覲
