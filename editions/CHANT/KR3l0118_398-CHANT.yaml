body:
  text: 石黃石帝堯時有五星自天而隕一是土之精墜于谷城山下其精化為圯橋老人以兵書授張子房云讀此當為帝王師后求我于谷城山下黃石是也子房佐漢功成求于谷城山下果得黃石焉子房隱于商山從四皓學道其家葬其衣冠黃石焉古者常見墓上黃氣高數十丈后赤眉所發不見其尸黃石亦失其氣自絕馬肝石元鼎五年郅支國貢馬肝石百斤長以水銀養內于玉函中金泥封其上其國人長四尺唯餌馬肝石此石半青半白如今之馬肝舂碎之以和九轉丹吞之一丸彌年不饑渴以之拭發白者皆黑帝嘗坐群臣于甘泉殿有發白者以此拭之應手皆黑是時公卿語曰不用作方伯唯愿拭馬肝石此石酷烈不雜丹砂唯可近發石鼓吳郡臨江半岸崩出一石鼓槌之無聲武帝以問張華華曰可取蜀中桐材刻為魚形扣之則鳴矣于是如其言果聲聞數里采石石季龍立河橋于云昌津采石為中濟石無大小下輒隨流用工五百餘萬不成季龍遣使致祭沉璧于河俄而所沉璧流于渚上地震水波騰上津所樓殿傾坏壓死者百餘人青石唐顯慶四年魚人于江中网得一青石長四尺闊九寸其色光潤異于眾石懸而擊之鳴聲清越行者聞莫不駐足都督滕王表送納瑞府石文昌松瑞石文初李襲譽為涼州刺史奏昌松有瑞石自然成字凡千一十字其略曰高皇海宇字李九王八千太平天子李世王千年太子治書燕山人士國主尚任諤獎文通千古大王五王七王十王鳳手才子武文貞觀昌大聖四方上下萬古忠孝為喜敕禮部郎中柳逞馳驛檢覆并同所奏石連理永昌年中台州司馬孟詵奏臨海水下馮義得石連理樹三株皆白石太白精金星之精墜于中南圭峰之西因號為太白山其精化為白石狀如玉美時有紫氣覆之天寶中玄宗立玄元廟于長安大寧里臨淄舊邸欲塑玄元像夢神人曰太白北谷中有玉石可取而琢之紫氣見處是也翌日令使入谷求之山下人云旬日來嘗有紫氣連日不散果于其下掘獲玉石琢為玄元像高二丈許又為二真人二侍童及李林甫陳希烈之形高六尺以來古鐵鏵天寶中玄宗以三門河道險厄漕轉艱阻乃令旁北山鑿石為月河以避湍急名曰天寶河歲省運夫五十余萬又無覆溺淹滯之患天下稱之其河東西徑直長五里余闊四五丈深二丈三丈至五六丈皆鑿堅石匠人于堅石之下得古鐵鏵長三尺余上有平陸兩字皆篆文也玄宗異之藏于內庫遂命改河北縣為平陸縣旌其事也走石寶歷元年乙巳歲資州資陽縣清弓村山有大石可三間屋大從此山下忽然吼踊下山越澗卻上坡可百步其石走時有鋤禾人見之各手執鋤趕至止所其石高二丈石橋趙州石橋甚工磨密致如削焉望之如初月出云長虹飲澗上有勾欄皆石也勾欄并為石獅子龍朔年中高麗諜者盜二獅子去后复募匠修之莫能相類者至天后大足年默啜破趙定州賊欲南過至石橋馬跪地不進但見一青龍臥橋上奮迅而怒賊乃遁去石磨吳興故彰縣東三十里有梅溪山山根直豎一石可高百餘丈至青而團如兩間屋大四面斗絕仰之于云外無登陟之理其上复有盤石正員如車蓋恒轉如磨聲若風雨土人號為石磨轉駃則年丰遲則歲儉欲知歲之丰儉以石磨候之無差焉釜瀨夷道縣有釜瀨其石大者如釜小者如斗形色亂真唯實中耳石魚衡陽相鄉縣有石魚山山石黑色理若生雌黃開發一重輒有魚形鱗鰭首尾有若畫焉長數寸燒之作魚腥墜石伊闕縣令李師晦有兄弟任江南官與一僧往還嘗入山采藥暴風雨避于榿樹須臾大震有物瞥然墜地倏而晴朗僧就視乃一石形如樂器可以懸擊其上平齊如削中有竅其下漸闊而員狀若垂囊長二尺厚三分左小缺色理如碎錦光澤可鑒叩之有聲僧意其異物置于樵中歸柜而埋于禪床下為其徒所見往往有知者李生懇求一見僧确然無言忽一日僧召李生既至執手曰貧道已力衰弱無常將至君前所求物聊用為別乃盡去侍者引李生入臥內撤榻掘地捧匣受之而卒立石萊子國海上有石人長一丈五尺大十圍昔始皇遣此石人追勞山不得遂立孤石筑陽縣水中有孤石挺出其下澄潭時有見此石根如竹根色黃見者多凶俗號承受石网石于季有為和州刺史時臨江有一寺寺前魚釣所聚有漁子下网舉之覺重坏网視之乃一石如拳因乞寺僧置于佛殿中石遂長不已經年重四十斤張司封員外入蜀時親睹其事卵石常侍崔元亮在洛中嘗閒步涉岸得一石子大如雞卵黑潤可愛玩之行一里划然而破有鳥大如巧婦飛去臥石荊州永丰縣東鄉里有臥石一長九尺六寸其形似人而舉體青黃隱起狀若雕刻境若旱使祭而舉之小雨小舉之大雨大舉之相傳此石忽見如此本長九尺今加六寸矣僧化天台僧乾符中自台山之東臨海縣界得洞穴同志僧相將尋之初一二十里徑路低狹率多泥涂自外稍平闊漸有山山十許里見市肆居人與世無異此僧素習咽氣不覺饑渴其同行之僧饑甚詣食市肆乞食人或謂曰若能忍饑渴速還無苦或餐啖此地之食必難出矣饑甚固求食焉食畢相與行十余里路漸隘小得一穴而出餐物之僧立化為石矣天台僧出山逢人問其所管已在牟平海濱矣隕石唐天复十年庚午夏洪州隕石于越王山下昭仙觀前有聲如雷光彩五色闊十丈袁吉江洪四州之界皆見光聞聲觀前五色煙霧經月而散有石長七八尺圍三丈余清碧如玉墮于地上節度使劉威命舁入昭仙觀內設齋祈謝七日之內石稍小長三尺又齋數日石長尺余今只有七八寸留在觀內目岩平樂縣有山林石岩間有目如人眼极大瞳子白黑分明名曰目岩石駝于闐國北五日行又有山山上石駱駝溺水滴下以金銀等器承之皆漏人掌亦漏唯瓠取不漏或執之令人身臭皮毛改石柱劫比他國中天竺之屬國也有石柱高七十尺紺色有光或觀其身隨其罪福悉見影中見之石響南岳岣嶁峰有響石呼喚則應如人共語而不可解也南州南河縣東南三十里丹溪之曲有響石高三丈五尺闊二丈狀如臥獸人呼之應笑亦應之塊然獨處亦號曰獨石也石女桂陽有貞女峽傳云秦世數女取螺于此遇雨一女化為石人今石人形高七尺狀似女子藏珠石江州南五十里有店名七里店在沱江之南小山下有十余枚如流星往來或聚或散石上常有光景相傳云珠藏于此乃無价寶也或有見者密認其處尋求不得化石會稽進士李眺偶拾得小石青黑平正溫滑可玩用為書鎮焉偶有蛇集其上驅之不去視以化為石求它虫試之隨亦化焉殼落堅重與石無異松化婺州永康縣山亭中有枯松樹因斷之誤墮水中化為石取未化者試于水中隨亦化焉其所化者枝干及皮與松無異且堅勁有未化者數段相兼留之以旌異物自然石洪州建昌縣界田中有自然石碑石人及石龜散在地中莫知其數皆如鐫琢之狀而無文字石人多倒臥者時有立者又云側近有石井深而無水有好事者持火入其中旁有橫道莫知遠近道側亦皆是石人焉熱石新北市是景云觀舊基有一巨石大如柱礎人或坐之蹋之逡巡如火燒應心煩熱因便成疾往往致死或云若聚火燒此石吼即瞿塘山吼而水沸古老相傳耳又蜀州晉原縣山亭中有二大石各徑二尺已來出地七八寸人或坐之心痛往往不救又是落星石東邊者坐即靈者西邊者與諸石無異色并帶青白也犬吠石婺源縣有大黃石自山墜于溪側瑩徹可愛群犬見而競吠之數日村人不堪其喧乃相與推致水中犬又俯水而吠愈急取而碎之犬乃不吠瓮形石潘祚為鄱陽縣令后連帶古城其中隙荒數十畝祚嘗與家人望月于此見城下草中有光高數丈其間荊棘蒙密不可夜行即取弓射其處以志之明日掘其地得一瓮大腹小口青石塞之祚命舁歸其家發其口不可開令擊碎之乃一石如瓮之形若冰凍之凝結者复碎而棄之卒無所得三石處州石人山在泥水口近有三石形甚似人居中者為君左曰夫人右曰女郎人石昔有夫妻二人將兒入山獵其父落崖妻子將下救之并變為三石因以為人石金蚕右千牛兵曹王文秉丹陽人世善刻石其祖嘗為浙西廉使裴璩采碑于積石之下得一自然圓石如球形式如礱斫乃重疊如殼相包斫之至盡其大如拳复破之中有一蚕如蠐螬蠕蠕能動人不能識因棄之數年浙西亂王出奔至下蜀與鄉人夜會語及青蚨還錢事佐中或云人欲求富莫如得石中金蚕畜之則寶貨自致矣問其形狀則石中蠐螬也飛坡永昌年太州敷水店南西坡白日飛四五里直塞赤水坡上桑畦麥壟依然仍舊鳴沙靈州鳴沙縣有沙人馬踐之輒鈖然有聲持至他處信宿之后無复有聲
