body:
  text: 李叔卿李叔卿漢河南李叔卿為郡工曹應孝廉同輩疾之宣言曰叔卿妻寡妹以故不得應孝廉之目叔卿遂閉門不出妹悲憤乃詣府門自經叔卿亦自殺以明無私既而家人葬之后霹靂遂擊殺所疾者以置叔卿之墓所震之家收葬其尸葬畢又發其冢楊道和晉扶風楊道和夏于田中值雷雨至桑樹下霹靂下擊之道和以鋤格折其肱遂落地不得去唇如丹目如鏡毛角長三尺余狀如六畜頭似獼猴石勒后趙石勒時暴風大雨雷雹建德殿端門襄國市西門倒殺五人雹起西河介山大如雞子平地三尺洿下丈余行人禽獸死者萬數歷千余里樹木摧折禾稼蕩然勒問徐光曰去年不禁寒食介推帝鄉之神也故有此災虢州人唐虢州有兄弟析居共分堂宇至顯慶元年夏夜雷震烈風可畏其兄甚懼欲于弟舍避之將去复止門前十數步先有長坑風雨拔住屋及老小十一口皆投坑死所拔之處盡坑也仍卷數千巨細家用物咸入于坑訖無遺者惟牆壁不動庭槐大可數圍枝條甚茂拔其根莖洪纖俱盡遂失所在終尋不得先是一年其妻見樹有羊但共怪之后遂遭此變而弟所居但拔露椽瓦有似人拆之余無所損有子衛士在京番直刺史于立政奏之敕放子還仍賜物三十件時桓思緒為司功親檢其事封元則唐封元則渤海長河人顯慶中為光祿寺太官掌膳時于闐王來朝食料余羊凡數十百口王并托元則送僧寺長生元則乃竊令屠家烹貨收直龍朔元年夏六月洛陽大雨雷震殺元則于宣仁門外街中折其項血流洒地觀者盈衢莫不惊愕僧道宣唐劉禹錫云道宣持律第一忽一旦霹靂繞戶外不絕宣曰我持律更無所犯若有宿業則不知之于是褫三衣于戶外謂有蛟螭憑焉衣出而聲不已宣乃視其十指甲有一點如油麻者在右手小指上疑之乃出于隔子孔中一震而失半指黑點是蛟龍之藏處也禹錫曰在龍亦尤善求避地之所矣而終不免則一切分定豈可逃乎蘇踐言司禮寺蘇踐言左相溫國公良嗣之長子居于嘉善里永昌年六月與其弟崇光府錄事參軍踐義退朝還第弘道觀東猝遇暴雨震雷電光來繞踐言等馬回旋甚急雷聲亦在其側有頃方散其年九月元肅言與趙懷節謀逆踐言妻妾并被縲絏數月仍各解職及良嗣薨并放流荒裔狄仁杰唐代州西十余里有大槐震雷所擊中裂數丈雷公夾于樹間吼如霆震時狄仁杰為都督賓從往觀欲至其所眾皆披靡無敢進者仁杰單騎勁進迫而問之乃云樹有乖龍所由令我逐之落勢不堪為樹所夾若相救者當厚報德仁杰命鋸匠破樹方得出其后吉凶必先報命偃師唐元和元年六月偃師縣柏李村震雷于民家地裂闊丈余長十五里測無底所裂之處井廁相通所沖之墓棺出地亦不知所由也雷斗唐開元末雷州有雷公與鯨斗鯨身出水上雷公數十在空中上下或縱火或詬擊七日方罷海邊居人往看不知二者何胜但見海水正赤漳泉界唐開元中漳泉二州分疆界不均互訟于台者制使不能斷迨數年辭理紛亂終莫之決于是州官焚香告于天地山川以祈神應俄而雷雨大至霹靂一聲崖壁中裂所競之地拓為一逕高千尺深僅五里因為官道壁中有古篆六行二十四字皆廣數尺雖約此為界人莫能識貞元初流人李協辯之曰漳泉兩州分地太平永安龍溪山高氣清千年不惑萬古作程所云永安龍溪者兩郡界首鄉名也包超唐安丰尉裴翾士淹孫也云玄宗嘗冬月詔山人包超令致雷聲對曰來日午當有雷遂令高力士監之一夕醮式行法及明至巳曾無纖翳力士懼之超曰將軍視南山當有黑氣如盤矣力士望之如其言有頃風起黑氣彌漫疾雷數聲上令隨哥舒翰西征每陣嘗得胜風張須彌唐上元中滁州全椒人蒼督張須彌縣遣送牲詣州山路險阻淮南多有義堂及井用庇行人日暮暴雨須彌與沙門子鄰同入義堂須彌驅馱人王老于雨中收驢頃之聞云中有聲墮地忽見村女九人共扶一車王有女阿推死已半歲亦在車所見王悲喜問母妹家事靡所不至其徒促之乃去初扶車漸上有云擁蔽因作雷聲方知是雷車蔡希閔唐蔡希閔家在東都暑夜兄弟數十人會于廳忽大雨雷電晦瞑墮一物于庭作颯颯聲命火視之乃婦人也衣黃紬裙布衫言語不通遂目為天女后五六年能漢語問其鄉國不之知但云本鄉食粳米無碗器用柳箱貯飯而食之竟不知是何國人初在本國夜出為雷取上俄墮希閔庭中徐景先唐徐景先有弟阿四頑嚚縱佚每誨辱之而母加愛念曲為申解因厲聲應答云雷奄至曳景先于云中有主者左右數十人訶詰景先答曰緣弟不調供養有缺所心詬辱母命釋之非當詈母主者不識其言尋一青衣自空躍下為景先對曰若爾放去至家可答一辯釘東壁上吾自令取之遂排景先墮舍前池中出水了無所損求紙答辯釘東壁果風至而辯亡歐陽忽雷唐歐陽忽雷者本名紹桂陽人勁健勇于戰斗嘗為郡將有名任雷州長史館于州城西偏前臨大池嘗出云氣居者多死紹至處之不疑令人以度測水深淺別穿巨壑深廣類是既成引決水于是云興天地晦冥雷電大至火光屬地紹率其徒二十余人持弓矢排鏘與雷師戰衣并焦卷形體傷腐亦不之止自辰至酉雷電飛散池亦涸竭中獲一蛇狀如蚕長四五尺無頭目斫刺不傷蠕蠕然具大鑊油煎亦不死洋鐵汁方焦灼仍杵為粉而服之至盡南人因呼紹為忽雷宣州唐貞元年宣州忽大雷雨一物墮地豬首手足各兩指執一赤蛇嚙之俄頃云暗而失時皆圖而傳之王干唐貞元初鄭州王干有膽勇夏中作田忽暴雷雨因入蚕室中避之有頃雷電入室中黑氣陡暗干遂掩戶荷鋤亂擊雷聲漸小云氣亦斂干大呼擊之不已氣复如半床已至如盤忽然墮地變為慰斗折刀小折足鐺焉華亭堰典唐貞元中華亭縣界村堰典妻與人私又于鄰家盜一手巾鄰知覺至典家尋覓典與妻共諱詬罵此人冤憤乃報曰汝妻與他人私又盜物仍共諱罵神道豈容汝乎典曰我妻的不奸私盜物如汝所說遣我一家為天霹既各散已至夜大風雨雷震怒擊破典屋典及妻男女五六人并死至明雨尤未歇鄰人但見此家屋倒火燒不已眾共火中搜出覓得典及妻皆燒如燃燭狀為禮拜求乞不更燒之火方自熄典肋上題字云痴人保妻貞將家口質妻肋上書行奸仍盜告縣檢視遠近咸知吳越聞震死者非少有牛及鱔魚樹木等為雷擊死者皆聞于縣辯識或曰人則有過天殺可也牛及樹木魚等豈有罪惡而殺之耶又有弒君弒父殺害非理者天何不誅請為略說洞庭子曰昔夏帝武乙射天而震死晉臣王導寢柏而移災斯則列于史籍矣至于牛魚以穿踏田地水傷害禾苗也或曰水所損亦微何罰之大對曰五谷者萬人命也國之寶重天故誅之以誡于人樹木之類龍藏于中神既取龍遂損樹木耳天道懸遠垂教及人委曲有情不可一概余曾見漳泉故事漳泉接境縣南龍溪界域不分古來爭競不決忽一年大雷雨霹一山石壁裂壁口刻字漳泉兩州分地太平萬里不惑千秋作程南安龍溪山高氣清其文今猶可識天之教令其可惑哉且論語云迅雷風烈必變又禮記曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐又曰洊雷震君子以恐懼修省夫聖人奉天教豈妄說哉今所以為之言者序述耳因為不爾豈足悲哉夫然弒君弒父殺害無辜人間法自有刑戮豈可以區區之意而責恢恢之网者歟李師道唐元和中李師道据青齊蓄兵勇銳地廣千里儲積數百萬不貢不覲憲宗命將討之王師不利而師道益驕乃建新宮擬天子正殿卜日而居是夕云物遽晦風雷如撼遂為震擊傾圮俄复繼以天火了無遺者青齊人相顧語曰為人臣而逆其君者禍固宜矣今謫見于天安可逃其戾乎旬余師道果誅死李鄘唐李鄘北都介休縣民送解牒夜止晉祠宇下夜半聞人叩門云介休王暫借霹靂車某日至介休收麥良久有人應曰大王傳語霹靂車正忙不及借其人再三借之遂見五六人秉燭自廟后出介山使者亦自門騎而入數人共持一物如幢扛上環綴旗幡授與騎者曰可點領騎即數其幡凡十八葉每葉有光如電起民遂遍報鄰村令速收麥將有大風雨悉不之信乃自收刈至日民率親戚据高阜候天色乃午介山上有云氣如窯煙須臾蔽天注雨如綆風吼雷震凡損麥千余頃數村以民為妖訟之工部員外郎張周封親睹其推案徐唐潤州延陵縣茅山界元和春大風雨墮一鬼身二丈余黑色面如豬首角五六尺肉翅丈余豹尾又有半服絳褌豹皮纏腰手足兩爪皆金色執赤蛇足踏之瞪目欲食其聲如雷田人徐忽見惊走聞縣尋邑令親往睹焉因令圖寫尋复雷雨翼之而去
