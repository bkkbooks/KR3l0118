body:
  text: 陳復休陳復休陳復休者號陳七子貞元中來居褒城耕農樵採與常無異如五十許人多變化之術褒人有好事少年承奉之者五六人常為設酒食以求學其術勤勤不已復休約之曰我出西郊行及我者授以術復休徐行群少年奔走追之終不能及遂止無得其術者後入市眾復奉之不已復休與出郊外坐大樹下語道未竟忽然暴卒須臾臭敗眾皆驚走莫敢廻視自此諸少年不敢干之常狂醉市中褒帥李讜怒而繫於獄中欲加其罪桎梏甚嚴忽不食而死尋即臭爛虫蛆流出棄之棄之二字原闕據明鈔本補郊外旋亦還家復在市中讜時加禮異為築室於褒城江之南岸遺與甚多略無受者河東柳公仲郢相國周墀燕國公高駢擁旄三州皆威望嚴重而深加禮敬書幣相屬復休亦無所受唯鶴氅布裘受而貯之亦未嘗衣著也昌明令胡倣常師事之將赴任留錢五千為復休市酒笑而不取曰吾金玉甚多恨不能用耳以鋤授倣使之斸地不二三寸金玉錢貨隨斸而出曰人間之物固若是矣但世人賦分有定不合多取若吾用之豈有限約乎倣之昌明復休祖之於仙流江上指砂中令倣取酒器倣攫砂數寸得器皿五六事飲酒畢復埋砂中又戲曰吾於砂中嘗藏菓子今亦應在又令取之皆得蜀相燕公使人致書至褒城所居延召復休同日離褒城使人經旬方達復休當日已至成都而又有一復休與使者偕行未嘗相捨燕公詰於使者益奇待之常於巴南太守筵中為酒妓所侮復休笑視其面須臾妓者髯長數尺泣訴於守為祈謝復休呪酒一盃使飲之良久如舊又有藥一丸投水中沉浮旋轉任人指呼變化隱顯其類極多不可備載中和五五字原闕據明鈔本許刻本補黃本作光啟元年年大駕還京復休亦至闕下田晉公軍容問至京國幾年安寧曰二十果自問後二十日再幸陳倉後於道中寄詩與田晉公曰夜坐空庭月色微一樹寒梅發兩枝及駕至梁洋邠帥朱玫立襄王監國寒梅兩枝驗矣自是衛駕詣都多在西縣三泉褒斜以來屯駐復休之術素為人所傳俄為人釘其手於柱上尋有人救而拔之竟亦無患歲餘卒於家葬於江南山下數月好事者掘其墓無復所有見復休在長安駕駐華州復休亦至興德府矣出仙傳拾遺殷天祥殷七七名天祥又名道筌嘗自稱七七俗多呼之不知何所人也遊行天下人言久見之不測其年壽面光白若四十許人到處或易其姓名不定曾於涇州賣藥時靈臺蕃漢疫癘俱甚得藥者入口即愈皆謂之神聖得錢卻施於人又嘗醉於城市間周寶舊於長安識之尋為涇原節度延之禮重慕其道術房中之事及寶移鎮浙西數年後七七忽到復賣藥寶聞之驚喜召之師敬益甚每日醉歌曰彈琴碧玉調藥鍊白朱砂解醞頃刻酒能開非時花寶常試之悉有驗復求種瓜釣魚若葛仙翁也鶴林寺杜鵑高丈餘每春末花爛熳寺僧相傳言貞元中有外國僧自天台來盂中以藥養其根來種之自後搆飾花院鏁閉時或窺見三女子紅裳艷麗共遊樹下人有輒採花枝者必為所祟俗傳女子花神也是以人共寶惜故繁盛異於常花其花欲開探報分數節使賓僚官屬繼日賞翫其後一城士女四方之人無不載酒樂遊縱連春入夏自旦及昏閭里之間殆於廢業寶一日謂七七曰鶴林之花天下奇絕常聞能開非時花此花可開否七七曰可也寶曰今重九將近能副此日乎七七乃前二日往鶴林宿焉中夜女子來謂七七曰道者欲開此花耶七七乃問女子何人深夜到此女子曰妾為上玄所命下司此花然此花在人間已逾百年非久即歸閬苑去今與道者共開之非道者無以感妾於是女子瞥然不見來日晨起寺僧忽訝花漸折蕊及九日爛熳如春乃以聞寶與一城士庶驚異之遊賞復如春間數日花俄不見亦無落花在地後七七偶到官僚家適值賓會次主與賓趨而迎奉之有佐酒倡優甚輕侮之七七乃白主人欲以二栗為令可乎咸喜謂必有戲術資於歡笑乃以栗巡行接者皆聞異香驚嘆唯佐酒笑七七者二人作石綴於鼻掣拽不落但言穢氣不可堪二人共起狂舞花鈿委地相次悲啼粉黛交下及優伶輩一時亂舞鼓樂皆自作聲頗合節奏曲止而舞不已一席之人笑皆絕倒久之主人祈謝於七七有頃石自鼻落復為栗嗅之異香及花鈿粉黛悉如舊略無所損咸敬事之又七七酌水為酒削木為脯使人退行指船即駐呼鳥自墜唾魚即活撮土畫地狀山川形勢折茅聚蟻變成城市人有曾經行處見之歷歷皆似但少狹耳凡諸術不可勝紀後二十年薛朗劉浩亂寶南奔杭州而寶總戍為政刑殺無辜前上饒牧陳全裕經其境搆之以禍盡赤其族寶八十三筋力尤壯女妓百數盡得七七之術後為無辜及全裕作厲一旦忽殂七七劉浩軍變之時甘露寺為眾推落北岸謂墜江死矣其後人見在江西十餘年賣藥入蜀莫知所之鶴林犯兵火焚寺樹失根株信歸閬苑矣出續仙傳閭丘子有滎陽鄭又玄名家子也居長安中自小與鄰舍閭丘氏子偕讀書於師氏又玄性驕率以門望清貴而閭丘氏寒賤者往往戲而罵之曰閭丘氏非吾類也而我偕學於師氏我雖不語汝寧不愧於心乎閭丘子嘿然有慚色後數歲閭丘子病死及十年又玄以明經上第其後調補參軍於唐安郡既至官郡守命假尉唐興有同舍仇生者大賈之子年始冠其家資產萬計日與又玄會又玄累受其金錢賂遺常與讌遊然仇生非士族未嘗以禮貌接之嘗一日又玄置酒高會而仇生不得預及酒闌有謂又玄者曰仇生與子同舍會讌而仇生不得預豈非有罪乎又玄慚即召仇生生至又玄以巵飲之生辭不能引滿固謝又玄怒罵曰汝市井之民徒知錐刀爾何為僭居官秩邪且吾與汝為伍實汝之幸又何敢辭酒乎因振衣起仇生羞且甚俛而退遂棄官閉門不與人往來經數月病卒明年鄭罷官僑居濛陽郡佛寺鄭常好黃老之道時有吳道士者以道藝聞廬于蜀門山又玄高其風即驅而就謁願為門弟子吳道士曰子既慕神仙當且居山林無為汲汲於塵俗間又玄喜謝曰先生真有道者某願為隸於左右其可乎道士許而留之凡十五年又玄志稍惰吳道士曰子不能固其心徒為居山林中無補矣又玄即辭去讌遊濛陽郡久之其後東入長安次褒城舍逆旅氏遇一童兒十餘歲貌甚秀又玄與之語其辨慧千轉萬化又玄自謂不能及已而謂又玄曰我與君故人有年矣君省之乎又玄曰忘矣童兒曰吾嘗生閭丘氏之門居長安中與子偕學於師氏子以我寒賤且曰非吾類也後又為仇氏子尉於唐興與子同舍子受我金錢賂遺甚多然子未嘗以禮貌遇我罵我市井之民何吾子驕傲之甚邪又玄驚因再拜謝曰誠吾之罪也然子非聖人安得知三生事乎童兒曰我太清真人上帝以汝有道氣故生我于人間與汝為友將授真仙之訣而汝以性驕傲終不能得其道吁可悲乎言訖忽亡所見又玄既寤其事甚慚恚竟以憂卒出宣室志張卓張卓者蜀人唐開元中明經及第歸蜀覲省唯有一驢衣與書悉背在上不暇乘但驅而行取便路自斜谷中數日將至洋州驢忽然奔擲入深箐中尋之不得天將暮又無人家欲宿林下且懼狼虎是夜月明約行數十里得大路更三二里見大宅朱門西開天既明有山童自宅中出卓問求水童歸逡巡見一人朱冠高履曳杖而出卓趨而拜之大仙曰觀子塵中之人何為至此卓具陳之仙曰有緣耳乃命坐賜杯水香滑清冷身覺輕健又設美饌訖就西院沐浴以衣一箱衣之仙曰子骨未成就分當留此某有一女兼欲聘之卓起拜謝是夕成禮數日卓忽思家仙人與卓二朱符二黑符一黑符可置於頭入人家能隱形一黑符可置左臂千里之內引手取之一朱符可置舌上有不可卻者開口示之一朱符可置左足即能蹙地脈及拒非常然勿恃靈符自顛狂耳卓至京師見一大宅人馬駢闐窮極華盛卓入之經數門至廳事見鋪陳羅列賓客滿堂又於帳內粧飾一女年可十五六卓領之潛於中門聞一宅切切之聲云相公失小娘子具事聞奏敕羅葉二師就宅尋之葉公踏步叩齒噴水化成一條黑氣直至卓前見一少年執女衣襟右座一見怒極令前擒之卓因舉臂如抵墻壁終不能近遽以狗馬血潑之又以刀劍擊刺之卓乃開口鋒刃斷折續又敕使宣云斷頸進上卓聞而懼因脫左鞋伸足推之右座及羅葉二師暨敕使皆仰仆焉葉公曰向來入門見非常之氣及其開口果有太乙使者相公但獲愛女何苦相害卓因縱女上使衛兵送歸舊山仙人曳杖途中曰張郎不聽吾語遽遭羅網也侍衛兵士尚隨之仙人以拄杖畫地化為大江波濤浩淼闊三二里妻以霞帔搭於水上須臾化一飛橋在半天之上仙人前行卓次之妻又次之三人登橋而過隨步旋收但見蒼山四合削壁萬重人皆遙禮歸奏玄宗俄發使就山祭醮之因呼為隔仙山在洋州西六十里至今存焉出會昌解頤錄
