body:
  text: 鳳旃塗國周時旃塗國獻鳳雛載以瑤華之車以五色玉為飾駕以赤象至京師育於靈禽之苑飲以瓊漿飴以雲實二物皆出上元經方鳳初至之時毛色未彪發及成王封泰山禪社首之復文彩炳耀中國飛走之類不復喧鳴咸服神禽之遠至及成王崩沖天而去鳳凰臺鳳骨黑雄雌旦夕鳴各異皇帝使伶倫製十二籥寫之其雄聲其雌音樂有鳳凰臺此鳳腳下物如白石者鳳有時來儀候其所止處掘深三尺有圓石如卵正白服之安心神元庭堅唐翰林學士陳王友元庭堅者昔罷遂州參軍於州界居山讀書忽有人身而鳥首來造庭堅衣冠甚偉眾鳥隨之數千而言曰吾眾鳥之王也聞君子好音律故來見君因留數夕教庭堅音律清濁文字音義兼教之以百鳥語如是來往歲餘庭堅由是曉音律善文字當時莫及陰陽術數無不通達在翰林撰韻英十卷未施行而西京陷胡庭堅亦卒焉睢陽鳳貞元十四年秋有異鳥其色青狀類鳩鵲翔于睢陽之郊止叢木中有群鳥千類俱率其類列于左右前后而又朝夕各銜蜚虫稻粱以獻焉是鳥每飛則群鳥咸噪而導其前咸翼其旁咸擁其復若傳喚警衛之狀止則環而向焉雖人臣侍天子之禮無以加矣睢陽人咸適野縱觀以為羽族之靈者然其狀不類鸞鳳由是益奇之時李翱客於睢陽翱曰此真鳳鳥也於是作知鳳一章備書其事鸞堯在位七年有鸞鶻歲歲來集麒麟遊於澤藪鴟梟逃於絕漠有折支之國獻重明之鳥一名重睛言雙睛在目狀如雞鳴似鳳時解落毛羽以肉翮而飛能搏逐猛虎使妖災不能為害飴以瓊膏或一歲數來或數歲不至國人莫不掃灑門戶以留重明之集國人或刻木或鑄金為此鳥之狀置於戶牖之間則魑魅醜類自然退伏今人每歲元日刻畫為雞於戶牖之上此遺像也鶴徐奭晉懷帝永嘉中徐奭出行田見一女子姿色鮮白就奭言調女因吟曰疇昔聆好音日月心延佇如何遇良人中懷邈無緒奭情既諧欣然延至一屋女施設飲食而多魚遂經日不返兄弟追覓至湖邊見與女相對坐兄以藤杖擊女即化成白鶴翻然高飛奭恍惚年餘乃差烏程採捕者隋煬帝大業三年初造羽儀毛氅多出江南為之略盡時湖州烏程縣人身被科毛入山捕採見一大樹高百尺其上有鶴巢養子人欲取之其下無柯高不可上因操斧伐樹鶴知人必取恐其殺子遂以口拔其毛放下人收得之皆合時用乃不伐樹戶部令史妻唐開元中戶部令史妻有色得魅疾而不能知之家有駿馬恒倍芻秣而瘦劣愈甚以問鄰舍胡人胡亦術士笑云馬行百里猶勌今反行千里餘寧不瘦耶令史言初不出入家又無人曷由至是胡云君每入直君妻夜出君自不知若不信至入直時試還察之當知耳令史依其言夜還隱他所一更妻起靚粧令婢鞍馬臨階御之婢騎掃帚隨後冉冉乘空不復見令史大駭明往見胡瞿然曰魅信之矣為之奈何胡令更一夕伺之其夜令史歸堂前幕中妻頃復還問婢何以有生人氣令婢以掃帚燭火遍然堂廡令史狼狽入堂大甕中須臾乘馬復往適已燒掃帚無復可騎妻云隨有即騎何必掃帚婢倉卒遂騎大甕隨行令史在甕中懼不敢動須臾至一處是山頂林間供帳帘幕筵席甚盛群飲者七八輩各有匹偶座上宴飲合昵備至數更後方散婦人上馬令婢騎向甕婢驚云甕中有人婦人乘醉令推著山下婢亦醉推令史出令史不敢言乃騎甕而去令史及明都不見人但有餘煙燼而已乃尋徑路崎嶇可數十里方至山口問其所云是閬州去京師千餘里行乞辛勤月餘僅得至舍妻見驚問之久何所來令史以他答復往問胡求其料理胡云魅已成伺其復去可遽縛取火以焚之聞空中乞命頃之有蒼鶴墮火中焚死妻疾遂愈裴沆同州司馬裴沆嘗說再從伯自洛中將往鄭州在路數日曉程偶下馬覺道左有人呻吟聲因披蒿萊尋之荊叢下見一病鶴垂翼俛咮翅下瘡壞無毛且異其聲忽有老人白衣曳杖數十步而至謂曰郎君少年豈解哀此鶴邪若得人血一塗則能飛矣裴頗知道性甚高逸遽曰某請刺此臂血不難老人笑曰君此志甚勁然須三世是人其血方中郎君前生非人唯洛中胡盧生三世人矣郎君此行非有急切豈能至洛中干胡盧生乎裴欣然而返未信宿至洛乃訪胡盧生具陳其事且拜祈之胡盧生初無難易開襆取一石合大若兩指授針刺臂滴血下滿合授裴曰無多言也及至鶴處老人已至喜曰固是信士乃令盡塗其鶴復邀裴云我所居去此不遠可少留也裴覺非常人以丈人呼之因隨行纔數里至一莊竹落草舍庭蕪狼藉裴渴甚求漿老人指一土龕此中有少漿可就取裴視龕中有一杏核一扇如笠滿中有漿漿色正白乃力舉飲之不復飢渴漿味如杏酪裴知隱者拜請為奴僕老人曰君有世間微祿縱住亦不終其志賢叔真有所得吾久與之遊君自不知今有一信憑君必達因裹一襆物大如合戒無竊開復引裴視鶴鶴損處毛已生矣又謂裴曰君向飲杏漿當哭九族親情且以酒色誡也裴復還洛中路閱其所持將發之襁四角各有赤蛇出頭裴乃止其叔得信即開之有物如乾大麥飯升餘其叔後因遊王屋不知其終裴壽至九十七又李相公遊嵩山見病鶴亦曰須人血李公解衣即刺血鶴曰世間人至少公不是乃令拔眼睫持往東都但映眼照之即知矣李公中路自視乃馬頭也至東洛所遇非少悉非全人皆犬彘驢馬一老翁是人李公言病鶴之意老翁笑下驢袒臂刺血李公得之以塗鶴即愈鶴謝曰公即為明時宰相復當上昇相見非遙慎無懈惰李公謝鶴遂沖天而去鵠鵠生百年而紅五百年而黃又五百年而蒼又五百年為白壽三千歲矣蘇瓊晉安帝元興中一人年出二十未婚對然目不干色曾無穢行嘗行田見一女甚麗謂少年曰聞君自以柳季之儔亦復有桑中之歡耶女便歌少年微有動色後復重見之少年問姓云姓蘇名瓊家在塗中遂要還盡歡從弟便突入以杖打女即化成雌白鵠鸚鵡能飛眾鳥趾前三後一唯鸚鵡四趾齊分凡鳥下瞼向上獨此鳥兩瞼俱動似人目張華張華有白鸚鵡華行還鳥輒說僮僕善惡后寂無言華問其故鳥云見藏甕中何由得知公時在外令喚鸚鵡鸚鵡曰昨夜夢惡不宜出戶彊之至庭為鴟所攫教其啄鴟喙僅而獲免鸚鵡救火有鸚鵡飛集他山山中禽獸輒相貴重鸚鵡自念雖樂不可久也便去後數日山中大火鸚鵡遙見便入水濡羽飛而灑之天神言汝雖有志意何足云也對曰雖知不能然嘗僑居是山鄰獸行善皆為兄弟不忍見耳天神嘉感即為滅火雪衣女天寶中嶺南獻白鸚鵡養之宮中歲久頗甚聰慧洞曉言詞上及貴妃皆呼為雪衣女性既馴擾常縱其飲啄飛鳴然不離屏幃間上命以近代詞臣篇詠授之數遍便可諷誦上每與嬪妃及諸王博戲上稍不勝左右呼雪衣女必飛局中鼓翼以亂之或啄嬪御及諸王手使不能爭道一旦飛於貴妃鏡臺上語曰雪衣女昨夜夢為鷙所搏將盡於此乎上令貴妃授以多心經自後授記精熟晝夜不息若懼禍難有祈禳者上與貴妃出遊別殿貴妃置鸚鵡於步輦上與之同去既至命從官校獵於前鸚鵡方嬉戲殿檻上瞥有鷹至搏之而斃上與貴妃歎息久之遂命瘞於苑中立鸚鵡塚開元中宮中有五色鸚鵡能言而惠上令左右試牽御衣輒瞋目叱之岐王文學熊延景因獻鸚鵡篇上以示群臣焉劉潛女隴右百姓劉潛家大富唯有一女初笄美姿質繼有求聘者其父未許家養一鸚鵡能言無比此女每日與之言話後得佛經一卷鸚鵡念之或有差誤女必證之每念此經女必焚香忽一日鸚鵡謂女曰開我籠爾自居之我當飛去女怪而問之何此言邪鸚鵡曰爾本與我身同偶託化劉潛之家今須却復本族無怪我言人不識爾我固識爾其女驚白其父母父母遂開籠放鸚鵡飛去曉夕監守其女后三日女無故而死父母驚哭不已方欲葬之其屍忽為一白鸚鵡飛去不知所之鷹楚文王楚文王好獵有人獻一鷹王見其殊常故為獵于雲夢毛群羽族爭噬共搏此鷹瞪目遠瞻雲際俄有一物鮮白不辨其形鷹便竦羽而升矗若飛電須臾羽墮如雪血下如雨有大烏墮地度其羽翅廣數十里時有博物君子曰此大鵬雛也劉聿唐永徽中萊州人劉聿性好鷹遂於之罘山懸崖自縋以取鷹雛欲至巢而繩絕落于樹歧間上下皆壁立進退無據大鷹見人銜肉不敢至巢所遙放肉下聿接取肉餧鷹雛以外即自食之經五六十日雛能飛乃裂裳而繫鷹足一臂上繫三聯透身而下鷹飛掣其兩臂比至澗底一無所傷仍繫鷹而歸鄴郡人薛嵩鎮魏時鄴郡人有好育鷹隼者一日有人持鷹來告於鄴人人遂市之其鷹甚神俊鄴人家所育鷹隼極多皆莫能比常臂以玩不去手後有東夷人見者請以繒百餘段為直曰吾方念此不知其所用其人曰此海鷂也善辟蛟螭患君宜於鄴城南放之可以見其用矣先是鄴城南陂蛟常為人患郡民苦之有年矣鄴人遂持往海鷂忽投陂水中頃之乃出得一小蛟既出食之且盡自是鄴民免其患有告於嵩乃命鄴人訊其事鄴人遂以海鷂獻焉鷂魏公子魏公子旡忌曾在室中讀書之際有一鳩飛入案下鷂逐而殺之忌忿其鷙戾因令國內捕鷂遂得二百餘頭忌按劍至籠曰昨殺鳩者當低頭伏罪不是者可奮翼有一鷂俯伏不動鶻寶觀寺滄州東光縣寶觀寺常有蒼鶻集重閣每有鴿數千鶻冬中每夕即取一鴿以暖足至曉放之而不殺自餘鷹鶻不敢侵之落鴈殿唐太宗養一白鶻號曰將軍取鳥常驅至於殿前然後擊殺故名落鴈殿上恒令送書從京至東都與魏王仍取報日往返數迴亦陸機黃耳之徒歟
