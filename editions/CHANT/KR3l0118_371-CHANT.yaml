body:
  text: 雜器用獨孤彥建中末有獨孤彥者嘗客于淮泗間會天大風舟不得進因泊于岸一夕步月登陸至一佛寺中寺僧悉赴里民會去彥步繞于庭俄有二丈夫來一人身甚長衣黑衣稱姓甲名侵訐第五一人身廣而短衣青衣稱姓曾名元與彥揖而語其吐論玄微出于人表彥素耽奇奧常與方外士議語且有年矣至于玄門釋氏靡不窮其指歸乃遇二人則自以為不能加也竊奇之且將師焉因再拜請曰某好奇者今日幸遇先生愿為門弟子其可乎二人謝曰何敢彥因征其所自黑衣者曰吾之先本盧氏吾少以剛勁聞大凡物有滯而不通者必侵犯以訐悟之時皆謂我為侵訐因名之其后適野遇仇家擊斷遂易姓甲氏且逃其患又吾素精藥術嘗侍忝醫之職非不能精熟而升降上下即假手于人后以年老力衰上欲以我為折腰吏吾固辭免退居田間吾有舅氏常為同僚其行止起居未嘗不俱然我自擯棄常思吾舅直以用舍殊致分不見矣今夕君子問我我得以語平生事幸何甚哉語罷曾元曰吾之先陶唐氏之后也唯陶唐之官受姓于姚曾者與子孫以字為氏故為曾氏焉我其后也吾早從萊侯居推署之職職當要熱素以褊躁又當負氣以凌上由是遭下流沸騰之謗因而解去蓋吾忠烈之罪我自棄置處塵土之間且有年矣甘同瓦礫豈敢他望乎然日昔與吾父遭事吾父性堅正雖鼎鑊不避其危賙人之急要赴湯蹈火人亦以此重之今拘于舊職窘若囚系余以父棄擲之故不近于父迨今亦數歲足下有問又安敢默乎語未卒寺僧俱歸二人見之若有所懼即馳去數十步已亡見矣彥訊僧僧曰吾居此寺且久未嘗見焉懼為怪耳彥奇其才且異之因祈其名氏久而悟曰所聞曾元者豈非甑乎夫文以瓦附曾是甑字也名元者蓋以瓦中之畫致瓦字之上其義在矣甲侵訐者豈非鐵杵乎且以午木是杵字姓甲者東方甲乙木也第五者亦假午字也推是而辯其杵字乎名侵訐者蓋反其語為全截以截附全是鐵字也總而辯焉得非甑及鐵杵耶明日即命窮其跡果于朽坏中得一杵而鐵者又一甑自中分蓋用之余者彥大異之盡符其解也姚康成太原掌書記姚康成奉使之汧隴會節使交代八蕃使回郵館填咽遂假邢君牙舊宅設中室以為休息之所其宅久空廢庭木森然康成晝為公宴所牽夜則醉歸及明复出未嘗暫歇于此一夜自軍城歸早其屬有博戲之會故得不醉焉而坐堂中因命茶又复召客客無至者乃命館人取酒遍賜仆使以慰其道路之勤既而皆醉康成就寢二更后月色如練因披衣而起出于宅門獨步移時方歸入院遙見一人入一廊房內尋聞數人飲樂之聲康成乃躡履而聽之聆其言語吟嘯即非仆夫也因坐于門側且窺伺之仍聞曰諸公知近日時人所作皆務一時巧麗其于托情喻己體物賦懷皆失之矣又曰今三人可各賦一篇以取樂乎皆曰善乃見一人細長而甚黑吟曰昔人炎炎徒自知今無烽灶欲何為可怜國柄全無用曾見人人下第時又見一人亦長細而黃面多瘡孔而吟曰當時得意氣填心一曲君前值萬金今日不如庭下竹風來猶得學龍吟又一人肥短鬢發垂散而吟曰頭焦鬢禿但心存力盡塵埃不复論莫笑今來同腐草曾經終日掃朱門康成不覺失聲大贊其美因推門求之則皆失矣俟曉召舒吏詢之曰近并無此色人康心疑其必魅精也遂尋其處方見有鐵銚子一柄破笛一管一禿黍穰帚而已康成不欲傷之遂各埋于他處馬舉馬舉鎮淮南日有人攜一棋局獻之皆飾以珠玉舉與錢千萬而納焉數日忽失其所在舉命求之未得而忽有一叟策杖詣門請見舉多言兵法舉遙坐以問之叟曰方今正用兵之時也公何不求兵机戰術而將御寇仇若不如是又何作鎮之為也公曰仆且治疲民未暇于兵机戰法也幸先生辱顧其何以教之老叟曰夫兵法不可廢也廢則亂生亂生則民疲而治則非所聞曷若先以法而治兵兵治而后將校精將校精而后士卒勇且夫將校者在乎識虛盈明向背冒矢石触鋒刃也士卒者在乎赴湯蹈火出死入生不旋踵而一焉今公既為列藩連帥當有為帥之才不可曠職也舉曰敢問為帥之事何如叟曰夫為帥也必先取胜地次對于敵軍用一卒必思之于生死見一路必察之于出入至于沖關入劫雖軍中之余事亦不可忘也仍有全小而舍大急殺而屢逃据其險地張其疑兵妙在急攻不可持疑也其或遲速未決險易相懸前進不能差須求活屢胜必敗慎在欺敵若深測此術則為帥之道畢矣舉惊異之謂叟曰先生何許人何學之深耶叟曰余南山木強之人也自幼好奇尚異人人多以為有韜玉含珠之譽屢經戰爭故盡識兵家之事但乾坤之內物無不衰況假合之體殊不堅牢豈得更久耶聊得晤言一述兵家之要耳幸明公稍留意焉因遽辭公堅留延于客館至夜令左右召之見室內唯一棋局耳乃是所失之者公知其精怪遂令左右以古鏡照之棋局忽躍起墜地而碎似不能變化公甚惊異乃令盡焚之吉州漁者吉州龍興觀有巨鐘上有文曰晉元康年鑄鐘頂有一竅古老相傳則天時鐘聲震長安遂有詔鑿之其竅是也天祐年中忽一夜失鐘所在至旦如故見蒲牢有血痕并焄草焄草者江南水草也葉如薤隨水淺深而生觀前大江數夜居人聞江水風浪之聲至旦有漁者見江心有一紅旗水上流下漁者棹小舟往接取之則見金鱗光波濤洶涌漁者急回始知蒲牢斗傷江龍梁氏后魏洛陽阜財里有開善寺京兆人韋英宅也英早卒其妻梁不治喪而嫁更納河內向子集為夫雖云改嫁仍居英宅英聞梁嫁白日來歸乘馬將數人至于庭前呼曰阿梁卿忘我也子集惊怖張弓射之應箭而倒即變為桃人所騎之馬亦化為茅馬從者數人盡為蒲人梁氏惶懼舍宅為寺曹惠武德初有曹惠為江州參軍官舍有佛堂堂中有二木偶人長尺余雕飾甚巧妙丹青剝落惠因持歸與稚兒后稚兒方食餅木偶引手請之兒惊報惠惠笑曰取木偶來即言曰輕素自有名何呼木偶于是轉盼馳走無異于人惠問曰汝何時物頗能作怪輕素與輕紅曰是宣城太守謝家俑偶當時天下工巧皆不及沈隱侯家老蒼頭孝忠也輕素輕紅即孝忠所造隱侯哀宣城無常葬日故有此贈時素壙中方持湯與樂夫人濯足聞外有持兵稱敕聲夫人畏懼跣足化為白螻少頃二賊執炬至盡掠財物謝郎持舒瑟瑟環亦為賊敲頤脫之賊人照見輕紅等曰二明器不惡可與小兒為戲具遂持出時天平二年也自爾流落數家陳末麥鐵杖猶子將至此惠又問曰曾聞謝宣城婚王敬則女爾何遽云樂夫人輕素曰王氏乃生前之妻樂氏乃冥婚耳王氏本屠酤種性粗率多力至冥中猶與宣城不睦伺宣城嚴顏則磔石拄關以為威脅宣城自密啟于天帝許逐之二女一男悉隨母歸矣遂再娶樂彥輔第八女美姿質善書好彈琴尤與殷東陽仲文謝荊州晦夫人相得日恣追尋宣城常云我才方古詞人唯不及東阿耳其余文士皆吾机中之肉可以宰割矣見為南曹典銓郎與潘黃門同列乘肥衣輕貴于生前百倍然十月一朝晉宋齊梁可以為勞近聞亦已停矣惠又問曰汝二人靈異若此吾欲舍汝如何即皆言曰以輕素等變化雖無不可君意如不放終不能逃廬山山神欲取輕素為舞姬久矣今此奉辭便當受彼榮富然君能終恩請命畫工便賜粉黛惠即令工人為圖之使摛錦繡輕素笑曰此度非論舞伎亦當彼夫人無以奉酬請以微言留別百代之中但以他人會者無不為忠臣居大位矣雞角入骨紫鶴吃黃鼠申不害五通泉室為六代吉昌后有人禱廬山神女巫言神君新納二妾要翠釵花簪汝宜求之當降大福禱者求而焚之遂如愿焉惠亦不能知其微言訪之時賢皆不悟或云中書令岑文本識其三句亦不為人說竇不疑武德功臣孫竇不疑為中郎將告老歸家家在太原宅于北郭陽曲縣不疑為人勇有膽力少而任俠常結伴十數人斗雞走狗樗蒲一擲數萬皆以意氣相期而太原城東北數里常有道鬼身長二丈每陰雨昏黑后多出人見之或怖而死諸少年言曰能往射道鬼者與錢五千余人無言唯不疑請行迨昏而往眾曰此人出城便潛藏而夜紿我以射其可信乎盍密隨之不疑既至魅所鬼正出行不疑逐而射之鬼被箭走不疑追之凡中三矢鬼自投于岸下不疑乃還諸人笑而迎之謂不疑曰吾恐子潛而紿我故密隨子乃知子膽力若此因授之財不疑盡以飲焉明日往尋所射岸下得一方相身則編荊也其傍仍得三矢自是道鬼遂亡不疑亦從此以雄勇聞及歸老七十余矣而意氣不衰天寶二年冬十月不疑往陽曲從人飲飲酣欲返主苦留之不疑盡令從者皆留己獨乘馬昏后歸太原陽曲去州三舍不疑馳還其間則沙場也狐狸鬼火叢聚更無居人其夜忽見道左右皆為店肆連延不絕時月滿云薄不疑怪之俄而店肆轉眾有諸男女或歌或舞飲酒作樂或結伴踏蹄有童子百餘人圍不疑馬踏蹄且歌馬不得行道有樹不疑折其柯長且大以擊歌者走而不疑得前又至逆旅复見二百餘人身長且大衣服甚盛來繞不疑踏蹄歌焉不疑大怒又以樹柯擊之長人皆失不疑恐以所見非常乃下道馳將投村野忽得一處百餘家屋宇甚盛不疑叩門求宿皆無人應雖甚叫擊人猶不出村中有廟不疑入之系馬于柱据階而坐時朗月夜未半有婦人素服靚妝突門而入直向不疑再拜問之婦人曰吾見夫婿獨居故此相偶不疑曰孰為夫婿婦人曰公即其人也不疑知是魅擊之婦人乃去廳房內有床不疑息焉忽梁間有物墜于其腹大如盆盎不疑毆之則為犬音自投床下化為火人長二尺余光明照耀入于壁中因爾不見不疑又出戶乘馬而去遂得入林木中憩止天曉不能去會其家求而得之已愚且喪魂矣舁之還猶說其所見乃病月余年
