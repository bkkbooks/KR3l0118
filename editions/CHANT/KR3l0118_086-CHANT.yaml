body:
  text: 黃萬祐黃萬祐黃萬祐修道於黔南無人之境累世常在每三二十年一出成都賣藥言人災禍無不神驗蜀王建迎入宮盡禮事之問其服食皆祕而不言曰吾非神仙亦非服餌之士但虛心養氣仁其行尠其過而已問其齒則曰吾只記夜郎侯王蜀之歲蠶叢氏都郫之年時被請出爾餘烏兔交馳花開木落竟不記其甲子矣忽一日南望嘉州曰犍為之地何其炎炎請遣人赴之如其言使至嘉州市肆已為瓦礫矣後堅辭歸山建泣留不住問其後事皆不言之既去於所居壁間見題處曰莫交牽動青猪足動即炎炎不可撲鷙獸不欲兩頭黃黃即其年天下哭智者不能詳之至乙亥年起師東取秦鳳諸州報捷之際宮內延火應是珍寶帑藏並為煨燼矣乃知太歲乙亥是為青猪為焚爇之期也後三年歲在戊寅土而建殂方知寅為鷙獸干與納音俱是土土黃色是以言鷙獸兩頭黃此言不差毫髮出錄異記明鈔本作野人閑話任三郎鳳州賓祐王鄑員外時在相國滿存幕中籌畫賓佐最為相善有客任三郎者在焉府中寮屬咸與之相識而獨親於王居無何忽謂王曰或有小失意即吾子之福也又旬月王忽失主公意因稱疾百餘日主公致於度外音問杳絕任亦時來一日謂王曰此地將受災官街大樹自枯事將逼矣葉墮之時事行也速求尋醫以脫此禍王以主公之怒未息深以為不可任曰但三貢啟事必有指揮如其言數日內三貢啟乞於關隴已來尋醫果使人傳旨相勉遽以出院例錢匹段相遺倍厚於常王乃入謝留宴又遺綵纈錦繡之物及其家不旬即促行北去滿相於郊外宴餞臨歧之際僅二百餘人五六日至吳山縣僦居又十日至鳳州人言已軍變矣滿公歸襃中同院皆死於難王獨免其禍又其年至長安開化坊西北角酒肆中復見任公問其所舍再往謁之失其所在矣出錄異記黃齊黃齊者蜀之偏裨也常好道行陰功有歲年矣於朝天嶺遇一老人髭髮皎白顏色孾孺肌膚如玉與之語曰子既好道五年之後當有大厄吾必相救勉思陰德無退前志其後齊下峽舟船覆溺至灘上如有人相拯得及於岸視之乃前所遇老人也尋失所在自是往往見之忽於什邡縣市中相見召齊過其所居出北郭外行榿林中可三二里即到其家山川林木境趣幽勝留止一宿及明相送出門已在後城山內去縣七十餘里既歸亦話於人出錄異記王處回王侍中處回常於私第延接布素之士一旦有道士龐眉大鼻布衣孾縷山童從後擎柱杖藥囊而已造詣王公於竹葉上大書道士王挑杖奉謁王公素重士得以相見因從容致酒觀其談論清風颯然處回曰弟子有志清閒願於青城山下致小道院以適閑性道士曰未也因於山童處取劍細點階前土廣尺餘囊中取花子二粒種子令以盆覆於上逡巡去盆花已生矣漸漸長大頗長五尺已來層層有花爛然可愛者兩苗尊師曰聊以寓目適性此則仙家旌節花也命食不飡唯飲數杯而退曰珍重善為保愛言訖而去出門不知所之餘王公果除二節鎮方致仕自後往往有人收得其花種出野人閑話天自在利州市鄽中有一人披髮跣足衣短布襦與人語多說天上事或遇紙筆則欣然畫樓臺人物執持樂器或雲龍鸞鳳之像夜則宿神廟中人謂之天自在州之南有市人甚闐咽一夕火起煙焰亘天天自在於廟中獨語曰此方人為惡日久天將殺之遂以手探階前石盆中水望空澆灑逡巡有異氣自廟門出變為大雨盡滅其火掌廟者往往與人說之天自在遂潛遁去其餘居人果為大火漂蕩始信前言有徵出野人閑話掩耳道士利州南門外乃商賈交易之所一旦有道士羽衣孾縷來於稠人中賣葫蘆子種云一二年間甚有用處每一苗只生一顆盤地而成兼以白土畫樣於地以示人其模甚大逾時竟無買者皆云狂人不足可聽道士又以兩手掩耳急走言風水之聲何太甚耶巷陌孩童競相隨而笑侮之時呼為掩耳道士至來年秋嘉陵江水一夕泛漲漂數百家水方渺瀰眾人遙見道士在水上坐一大瓢出手掩耳大叫水聲風聲何太甚耶泛泛而去莫知所之出野人閑話抱龍道士灌口白沙有太山府君廟每至春三月蜀人多往設齋迺至諸州醫卜之人亦嘗集會時有一人鶉衣百結顏貌憔悴亦往廟所眾人輕之行次江際眾人憩於樹蔭貧士亦坐石上逡巡謂人曰此水中有一龍睡眾不之應旁有一叟曰何得見貧士曰我則見眾曰我等要見如何貧士曰亦不難遂解衣入水抱一睡龍出腥穢頗甚深閉兩目而爪牙鱗角悉備雲霧旋合風起水湧眾皆驚走遙禮謂之聖人遂却沉龍於水底自掛鶉衣而行謂眾人曰諸人皆以醫卜為業救人疾急知人吉凶亦近於道也切不得見貧素之士便輕侮之眾人慚謝而已復同行十里瞥然不見出野人閑話偽蜀度支員外郎何昭原昭下有曰字據明鈔本刪翰嘗從知於黔南暇日因閒步野徑於水際見釣者謂翰曰子何何原作可據明鈔本改判官乎曰然曰我則野人張涉也余比與子交知久矣子今忘我也翰懵然不醒因籍草坐謂翰曰子有數任官然終於青城縣令我則住青城山也待君官滿與君同歸山中今不及到君公署也遂辭而去翰深志之後累歷官及出為青城縣令有憂色釣者亦常來往何甚重之一旦大軍到城劫賊四起釣者與翰相攜入山何之骨肉盡在城內賊眾入縣言殺縣令臠而食之賊首之子自號小將軍其日尋覓不見細視縣宰之首即小將軍之首也賊於是自相殘害莫知縣令所之餘有人入山見何與張同行何因寄語妻子曰吾本不死却歸舊山爾等善為生計無相追憶也自此人不復見莫知所之出野人閑話盧延貴盧延貴者為宣州安仁場官赴職中塗阻風泊大江次數日因登岸閑步不覺行遠遙望大樹下若有屋室稍近見室中一物若人若獸見人即行起而來延貴懼而却走此物連呼無懼吾乃人也即往就之狀貌奇偉裸袒而通身有毛長數寸自言商賈也頃歲泛舟至此遇風舉家沒溺而身獨得就岸數日食草根飲澗水因得不死歲餘身乃生毛自爾乃不飲不食自傷孤獨無復世念結廬於此已十餘年矣因問獨居於此得無虎豹之害乎答曰吾已能騰空上下虎豹無奈何也延貴留久之又問有所須乎對曰亦有之每浴於谿中恒患身下不速乾得數尺布為巾乃佳也又得小刀以掘藥物益善君能致之耶延貴延之至船固不肯乃送巾與刀而去罷任復尋之遂迷失路後無有遇之者出稽神錄杜魯賓建康人杜魯賓以賣藥為事嘗有客自稱豫章人恒來市藥未嘗還直魯賓善待之一日復至市藥甚多曰吾欠君藥錢多矣今更從君求此吾將還西天明鈔本天作大市版木比及再求明鈔本求作來足以併酬君矣杜許之既去久之乃還贈杜山桃木十條委之而去莫知所之杜得之不以介意轉移親友所存三條偶命工人剖之其中得小鐵杵臼一具高可五六寸臼有八足間作獸頭制作精巧不類人力杜亦凡人不知所用竟為人取今失所在杜又常治舍有賣土者自言金壇縣人來往甚數杜亦厚資給之治舍畢賣土者將去留方尺之土曰以比為別遂去不復來其土堅緻有異於常杜置藥肆中不以為貴數年杜之居為火所焚屋壞土裂視之有小赤蛇在其隙中剖之蛇縈繞一白石龜大可三二寸蛇去龜存至今寶於杜氏出稽神錄建州狂僧建州有僧不知其名常如狂人其所言動多有徵驗邵武縣前臨溪有大磐石去水猶百步一日忽以墨畫其石之半因坐石上持竿為釣魚之狀明日山水大發適至其墨畫而退癸卯歲盡斫去臨路樹枝之向南者人問之曰免礙旗幡又曰要歸一邊及吳師之入皆行其下又城外僧寺大署其壁某等若干人處書之及軍至城下分據僧寺以為柵所安置人數一無所差其僧竟為軍士所殺初王氏之季閩建多難民不聊生或問狂僧曰時世何時當安答曰儂去即安矣及其既死閩嶺克平皆如其言出稽神錄劉申有人姓劉在朱方不得共語若與之言人必遭禍難或本身死疾唯一士謂無此理偶值人有屯塞耳劉聞之忻然而往自說被謗君能見明答云世人雷同何足䘏須臾火發資畜服玩蕩盡於是舉世號為鵂鶹脫遇諸塗皆閑車走馬掩目奔避劉亦杜門自守歲時一出則人驚散過於見鬼出異苑盧嬰淮南有居客盧嬰者氣質文學俱為郡中絕人悉以盧三郎呼之但甚奇蹇若在群聚中主人必有橫禍或小兒墮井幼女入火既久有驗人皆捐之時元伯和為郡守始至愛其材氣特開中堂設宴眾客咸集食畢伯和戲問左右曰小兒墮井乎曰否小女入火乎曰否伯和謂坐客曰眾君不勝故也頃之合飲群客相目惴惴然是日軍吏圍宅擒伯和棄市時節度使陳少遊甚異之復見其才貌謂曰此人一舉非摩天不盡其才即厚以金帛寵薦之行至潼關西望煙塵有東馳者曰朱泚作亂上幸奉天縣矣出獨異志趙鷰奴趙鷰奴者合州石鏡人也居大雲寺地中初其母孕數月產一虎棄於江中復孕數月產一巨鼈又棄之又孕數月產一夜叉長尺餘棄之復孕數月而產鷰奴眉目耳鼻口一一皆具自項已下其身如斷瓠亦有肩脾兩手足各長數寸無肘臂腕掌於圓肉上各生六指纔寸餘爪甲亦具其下布兩足一二寸亦皆六指既產不忍棄之及長只長二尺餘善入水能乘舟性甚狡慧詞喙辯給頗好殺戮以捕魚宰豚為業每鬭船驅儺及歌竹枝詞較勝必為首冠市肆交易必為牙保常髮髡緇衣民間呼為趙師晚歲但禿頭白衫而已或拜跪跳躍倒踣於地形倮露人多笑之或乘驢遠適只使人持之橫臥鞍中若衣囊焉有二妻一女衣食豐足或擊室家力不可制乾德初年僅六十腰腹數圍面目如常人無異其女右手無名指長七八寸亦異於人出錄異記
