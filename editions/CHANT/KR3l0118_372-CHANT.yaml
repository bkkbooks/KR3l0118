body:
  text: 凶器下桓彥范扶陽王桓彥范少放誕有大節不飾細行常與諸客游俠飲于荒澤中日暮諸客罷散范與數人大醉遂臥澤中二更后忽有一物長丈余大十圍手持矛戟瞋目大喚直來趨范等眾皆俯伏不動范有膽力乃奮起叫呼張拳而前其物乃返走遇一大柳樹范手斷一枝持以擊之其聲策策如中虛物數下乃匍匐而走范逐之愈急因入古壙中洎明就視乃是一敗方相焉蔡四穎陽蔡四者文詞之士也天寶初家于陳留之浚儀吟詠之際每有一鬼來登其榻或問義或賞詩蔡問君何鬼神忽此降顧鬼曰我姓王最大慕君才德而來耳蔡初甚惊懼后稍狎之其鬼每至恒以王大蔡氏相呼言笑歡樂蔡氏故人有小奴見鬼試令觀之其奴戰栗問其形云有大鬼長丈余余小鬼數人在后蔡氏后作小木屋置宅西南隅植諸果木其外候鬼至謂曰人神道殊君所知也昨與君造小舍宜安堵鬼甚喜辭謝主人其后每言笑畢便入此居偃息以為常矣久之謂蔡氏曰我欲嫁女暫借君宅蔡氏不許曰老親在堂若染鬼氣必不安穩君宜別求宅也鬼云大夫人堂但閉之必當不入余借七日耳蔡氏不得已借焉七日之后方還住而安穩無他事也后數日云設齋憑蔡為借食器及帳幕等蔡云初不識他人唯借己物因問欲于何處設齋云近在繁台北世間月午即地下齋時問至時欲往相看得乎曰何適不可蔡氏以鬼舉家持千手千眼咒家人清淨鬼即不來盛食葷血其鬼必至欲至其齋家人皆精心念誦著新淨衣乘月往繁台遙見帳幕僧徒极盛家人并誦咒前逼之見鬼惶遽紛披知其懼人乃益前進既至翕然而散其王大者與徒侶十余人北行蔡氏隨之可五六里至一墓林乃沒記其所而還明與家人往視之是一廢墓中有盟器數十當壙者最大額上作王字蔡曰斯其王大乎積火焚之其鬼遂絕李華唐吏部員外李華幼時與流輩五六人在濟源山庄讀書半年后有一老人須眉雪色恒持一裹石大如拳每日至晚即騎院牆坐以石擲華等當窗前后數月居者苦之鄰有秦別將善射知名華自往詣之具說其事秦欣然持弓至山所伺之及晚复來投石不已秦乃于隙中縱矢一發便中視之乃木盟器商鄉人近世有人旅行商鄉之郊初與一人同行數日忽謂人曰我乃是鬼為家中明器叛逆日夜戰斗欲假一言以定禍亂將如之何云苟可成事無所憚會日晚道左方至一大墳鬼指墳言是己冢君于冢前大呼有敕斬金銀部落如是畢矣鬼言訖入冢中人便宣敕須臾間斬決之聲有頃鬼從中出手持金銀人馬數枚頭悉斬落謂人曰得此足一生福以報恩耳人至西京為長安捉事人所告縣官云此古器當是破冢得之人以實對縣白尹奏其事發使人隨開冢得金銀人馬斬頭落者數百枚盧涵開成中有盧涵學究家于洛下有庄于萬安山之陰夏麥既登時果又熟遂獨跨小馬造其庄去十余里見大柏林之畔有新洁室數間而作店肆時日欲沉涵因憩馬睹一雙鬟甚有媚態詰之云是耿將軍守塋青衣父兄不在涵悅之與語言多巧麗意甚虛襟盼睞明眸轉資態度謂涵曰有少許家醞郎君能飲三兩杯否涵曰不惡遂捧古銅樽而出與涵飲极歡青衣遂擊席而謳送盧生酒曰獨持巾櫛掩玄關小帳無人燭影殘昔日羅衣今化盡白楊風起隴頭寒涵惡其詞之不稱但不曉其理酒盡青衣謂涵曰更與郎君入室添杯去秉燭挈樽而入涵躡足窺之見懸大烏蛇以刀刺蛇之血滴于樽中以變為酒涵大恐栗方悟怪魅遂擲出戶解小馬而走青衣連呼數聲曰今夕事須留郎君一宵且不得去知勢不可又呼東邊方大且與我趁取遮郎君俄聞柏林中有一大漢應聲甚偉須臾回顧有物如大枯樹而趨舉足甚沉重相去百餘步涵但疾加鞭又經一小柏林中有一巨物隱隱雪白處有人言云今宵必須擒取此人不然者明晨君當受禍涵聞之愈怖怯及庄門已三更扃戶闃然唯有數乘空車在門外群羊方咀草次更無人物涵棄馬潛跧于車箱之下窺見大漢徑抵門牆极高只及斯人腰跨手持戟瞻視庄內遂以戟刺庄內小兒但見小兒手足撈空于戟之巔只無聲耳良久而去涵度其已遠方能起扣門庄客乃啟關惊涵之夜至喘汗而不能言及旦忽聞庄院內客哭聲云三歲小兒因昨宵寐而不蘇矣涵甚惡之遂率家僮及庄客十余人持刀斧弓矢而究之但見夜來飲處空逃戶環屋數間而已更無人物遂搜柏林中見一大盟器婢子高二尺許傍有烏蛇一條已斃又東畔柏林中見一大方相骨遂俱毀拆而焚之尋夜來白物而言者即是人白骨一具肢節筋綴而不欠分毫鍛以銅斧終無缺損遂投之于塹而已涵本有風疾因飲蛇酒而愈焉張不疑南陽張不疑開成四年宏詞登科授秘書游京假丐于諸侯回以家遠無人患其孤寂寓官京國欲市青衣散耳目于閭里間旬月內亦累有呈告者適憎貌未偶月余牙人來云有新鬻仆者請閱焉不疑與期于翌日及所約時至抵其家有披朱衣牙笏者稱前浙西胡司馬揖不疑就位與語甚爽朗云某少曾在名場幾及成事曩以當家使于南海蒙攜引數年記于岭中偶獲婢仆等三數十人自浙右以歷南荊貨鬻殆盡今但有六七人承牙人致君子至焉語畢一青衣捧小盤各設于賓主位俄攜銀樽金盞醪醴芳新馨香扑鼻不疑奉道常御酒止肉是日不覺飲數杯余命諸青衣六七人并列于庭曰唯所選耳不疑曰某以乏于仆使今唯有錢六萬愿貢其价卻望高明度六萬之直者一人以示之朱衣人曰某价翔庳各有差等遂指一丫鬟重耳者曰春條可以償耳不疑睹之則果是私目者矣即日操契符金春條善書錄音旨清婉所有指使無不愜適又好學月余日潛為小詩往往自于戶牖間題詩云幽室鎖妖艷無人蘭蕙芳春風三十載不盡羅衣香不疑深惜其才貌明慧如此兩月余不疑素有禮奉門徒尊師居旻天觀相見因謂不疑曰郎君有邪氣絕多不疑莫知所自尊師曰得無新聘否不疑曰聘納則無市一婢耳尊師曰禍矣不疑恐遂問計焉尊師曰明旦告歸慎勿令覺明早尊師至謂不疑曰喚怪物出來不疑召春條泣于屏幕間亟呼之終不出來尊師曰果怪物耳斥于室內閉之尊師焚香作法以水向東而噀者三謂不疑曰可往觀之何如也不疑視之曰大抵是舊貌但短小尺寸間耳尊師曰未也复作法禹步又以水向門而噴者三謂不疑可更視之何如也不疑視之長尺余小小許僵立不動不疑更前視之乃仆地扑然作聲視之一朽盟器背上題曰春條其衣服若蟬蛻然系結仍舊不疑大惊尊師曰此雖然腰腹間已合有異令不疑命刀劈之腰頸間果有血浸潤于木矣遂焚之尊師曰向使血遍體則郎君一家皆遭此物也自是不疑郁悒無已豈有與明器同居而不之省殆非永年每一念至惘然數日如有所失因得沉痼遂請告歸寧明年為江西辟至日使淮南中路府罷又明年八月而卒卒后一日尊夫人繼歿道士之言果驗又一說張不疑常與道士共辨往來道士將他適乃誡不疑曰君有重厄不宜居太夫人膝下又不可進買婢仆之輩某去矣幸勉之不疑即啟母盧氏盧氏素奉道常日亦多在別所求靜因持寺院以居不疑旦問省數月有牙僧言有崔氏孀婦甚貧有妓女四人皆鬻之今有一婢曰金釭有姿首最其所惜者今貧不得已將欲貨之不疑喜遂令召至即酬其价十五萬而獲焉寵侍無比金釭美言笑明利輕便事不疑皆先意而知不疑愈惑之無幾道士詣門及見不疑言色慘沮吁歎不已不疑詰之道士曰嘻禍已成無奈何矣非獨于君太夫人亦不免矣不疑惊怛起曰別后皆如師教尊長寓居佛寺某守道殊不敢怠不知何以致禍且如之何哀祈備至道士曰皆無計矣但為君辨明之因詰其別后有所進者不疑曰家少人力昨唯買二婢耳道士曰可見乎不疑即召之金釭不肯出不疑連促之終不出不疑自詬之即至道士曰即此是矣金釭大罵曰婢有過鞭撻之可也不要鬻之可也一百五十千尚在何所憂乎何物道士預人家事耶道士曰惜之乎不疑曰此事唯尊師命敢不聽德道士即以拄杖擊其頭沓然有聲如擊木遂倒乃一盟器女子也背書其名道士命掘之五六尺得古墓柩傍有盟器四五制作悉類所焚者一百五十千在柩前儼然即不疑買婢之資也复之不疑惝怳發疾累月而卒親盧氏旬日繼歿焉
