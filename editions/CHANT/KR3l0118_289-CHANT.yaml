body:
  text: 李泌李泌李泌以虛誕自任嘗對客教家人遣灑掃今夜洪崖來有人遺美酒一榼會有客至乃曰麻姑送酒與君同傾傾未畢閽者云某侍郎取榼泌命倒還亦無愧色紙衣師大曆中有一僧稱為苦行不衣繒絮布絁之類常衣紙衣時人呼為紙衣禪師代宗武皇帝召入禁中道場安置令禮念每月一度出外人轉崇敬後盜禁中金佛事發召京兆府決殺明思遠華山道士明思遠勤修道籙三十餘年常教人金水分形之法并閉氣存思師事甚眾永泰中華州虎暴思遠告人云虎不足畏但閉氣存思令十指頭各出一獅子但使向前虎即去思遠兼與人同行欲暮於谷口行逢虎其伴驚懼散去唯思遠端然閉氣存思俄然為虎所食其徒明日於谷口相尋但見松蘿及雙履耳周士龍周士龍者婺州東陽人能辨山岡卜擇墳墓之地與叔父齊名每至歲月大通門庭車馬如市人之夭壽官位吉凶利害一切以地斷大曆五年至鄴中鄴中兵馬使姚希晟新葬母氏于青都村士龍占其塚一年合家破到明年希晟犯事至死鄴中之人無不驚駭相與謂之神人又有兵馬使婁瓘舉大事遂懇祈士龍卜地前後餉千餘貫士龍大喜遂與月餘日尋訪山原忽得一處說其地勢迴抱是龍腹三年內必得節度使瓘亦以自負歲中鄴中軍變瓘因此謂地勢有憑便有異圖事發遂斬于軍門舉家無復遺類李長源李長源常服氣導引并學禹步方術之事凡數十年自謂得靈精妙而道已成遠近輩親敬師事者甚多洪州晝日火發風猛焰烈從北來家人等狼狽欲拆屋倒籬以斷其勢長源止之遂上屋禹步禁呪俄然火來轉盛長源高聲誦呪遂有迸火飛焰先著長源身遂墮于屋下所居之室燒蕩盡器用服玩無復孑遺其餘圖籙持呪之具悉為灰燼雙聖燈長安城南四十里有靈母谷呼為炭谷入谷五里有惠炬寺寺西南渡澗水緣崖側一十八里至峰謂之靈應臺臺上置塔塔中觀世音菩薩鐵像像是六軍散將安太清置造眾傳觀世音菩薩曾見身於此臺又說塔鐵像常見身光長安市人流俗之輩爭往觀謁去者皆背負米麯油醬之屬臺下并側近蘭若四十餘所僧及行童衣服飲食有餘每至大齋日送供士女僅至千人少不減數百同宿于臺上至於禮念求見光兼云常見聖燈出其燈或在半山或在平地高下無定大曆十四年四月八日夜大眾合聲禮念西南近臺見雙聖燈又有一六軍健卒遂自撲叫喚觀世音菩薩步步趨聖燈向前忽然被虎拽去其見者乃是虎目光也路神通段成式門下騶路神通每軍較力能戴石簦靸六百斤石齧破石粟數十背劄天王自言得神力入場神助之則力生當至朔望日具乳糜焚香袒坐使妻兒供養其背而拜焉五福樓元和初陰陽家言五福太一在蜀故劉闢造五福樓符載為文記魚目為舍利澤州僧洪密請舍利塔洪密以禪宗謎語鼓扇愚俗自云身出舍利曾至太原豪民迎請婦人羅拜洪密既辭婦人於其所坐之處拾得百粒人驗之皆枯魚之目也將辭去山中要十數番麤氈半日獲五百番其惑人也如此目老叟為小兒長安完盛之時有一道術人稱得丹砂之妙顏如弱冠自言三百餘歲京都人甚慕之至于輸貨術丹橫經請益者門如市肆時有朝士數人造其第飲啜方酣有閽者報曰郎君從莊上來欲參覲道士作色叱之坐客聞之或曰賢郎遠來何妨一見道士顰蹙移時乃曰但令入來俄見一老叟鬢髮如銀昏耄傴僂趨前而拜拜訖叱入中門徐謂坐客曰小兒愚騃不肯服食丹砂以至于是都未及百歲枯槁如斯常已斥于村墅間耳坐客愈更神之後有人私詰道士親知乃云傴僂者即其父也好道術者受其誑惑如欺嬰孩矣于世尊遂州巡屬村民姓于號世尊者與一女皆逆知人之吉凶數州敬奉捨財山積鏨鑿崖壁列為佛像所費莫知紀極節度許公存以其妖妄召至府衙俾其射覆不中乃械而殺之一無神變於其所居得五色文麻絙以牛載僅百馱錢帛即可知也每夜會自作阿彌陀佛宮殿池沼一如西方男女俱集念佛而已斯亦下愚之流豈術神耶將有物憑之耶捉佛光事高燕公鎮蜀日大慈寺僧申報堂佛光見燕公判曰付馬步使捉佛光過所司密察之誘其童子具云僧輩以鏡承隙日中影閃於佛上由此乖露擒而罪之大輪呪釋教五部持念中有大輪呪術以之救病亦不甚效然其攝人精魄率皆狂走或登屋樑或齧瓷碗閭閻敬奉殆似神聖此輩由是廣獲金帛陵州貴平縣牛鞞村民有周達者販鬻此術一旦沸油煎其陰以充供養觀者如堵或驚或笑初自忘痛尋以致殂也中間僧昭浦說朗州有僧號周大悲者行此呪術一旦鍊陰而斃與愚所見何姓氏恰同而其事無殊也蓋小人用道欺天殘形自罰以其事同因而錄之陳僕射唐軍容使田令孜擅權有迴天之力嘗致書於許昌為其兄陳敬瑄求兵馬使職節將崔侍中安潛拒而不與邇後崔公移鎮西川陳敬瑄與楊師立牛勗羅元杲以打毬爭三川敬瑄獲頭籌制授右蜀節度以代崔公中外驚駭報狀云陳僕射之命莫知誰何青城縣妖人作彌勒會窺此聲勢偽作陳僕射行李云山東盜起車駕必幸蜀先以陳公走馬赴任乃樹一魁妖共翼佐之軍府未諭亦差迎侯至近驛有指揮索白馬四匹察事者覺其非常乃羈糜之未及旋踵真陳僕射速轡而至其妖人等悉擒縛而俟命潁州俾隱而誅之識者曰陳太師由閹宦之力無涓塵之効盜處方鎮始為妖物所憑終亦自貽誅滅非不幸也解元龜道士解元龜本西蜀節將下軍校明宗入纂言自西來對於便殿進詩歌聖德自稱太白山正一道士上表乞西都留守兼三川制置使要修西京宮闕上謂侍臣曰此老耄自遠來朝此期別有異見乃為身名甚堪笑也賜號知白先生賜紫斯乃狂妄人也蔡畋唐高駢鎮成都甚好方術有處士蔡畋者以黃白干之取瓦一口研丹一粒塗半入火燒成半截紫磨金乃奇事也蔡生自貧人皆敬之以為地仙燕公求之不得久而乖露乃是得藥於人眩惑賣弄為元戎殺之張守一張守一者滄景田里人也少怠惰不事生計自言能易五金以溺好利者其後貧弊不能自存乃負一柳篋鬻粉黛以貿衣食流轉江淮間呂用之以妖妄見遇遂來廣陵客於蕭勝門下久不得志將捨勝去用之聞之止之曰男子以心誠期物何患無知己倘能與用之同即富貴之事當共圖之由是為用之所荐高駢見其鄙朴常以真仙待之及得志雖僣侈不及用之貪冒之心特甚二都建為左鏌鎁軍使累轉檢校左僕射其禮敬次於用之每話道對酌自旦及暮不能自捨誑惑之計與用之常相表裏以致數年其事不洩光啟二年偽朝授守一德州刺史明年渤海以閩川奏守一事未受而敗乃從楊行密入城又請為諸將合太還丹藥未就會有康知柔者本鄭昌圖家吏昌圖判戶部以知柔為發運使院胥伍諷嘗得罪於知柔鞭之楊行密入城諷遂發知柔贓罪二十餘事至是諷及知柔俱縶於軍侯獄知柔素與守一善曰願入財以贖罪守一即白於楊公公以守一知柔洎諷事跡皆不可原遂命就獄殺之
