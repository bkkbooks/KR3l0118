body:
  text: 麻姑麻姑漢孝桓帝時神仙王遠字方平降於蔡經家將至一時頃聞金鼓簫管人馬之聲及舉家皆見王方平戴遠遊冠著朱衣虎頭鞶囊五色之綬帶劍少鬚黃色中形人也乘羽車駕五龍龍各異色麾節幡旗前後導從威儀奕奕如大將軍鼓吹皆乘麟從天而下懸集於庭從官皆長丈餘不從道行既至從官皆隱不知所在唯見方平與經父母兄弟相見獨坐久之即令人相訪明鈔本訪下有麻姑二字經家亦不知麻姑何人也言曰王方平敬報姑余久不在人間今集在此想姑能暫來語乎有頃使者還不見其使但聞其語云麻姑再拜不見忽已五百餘年尊卑有敘修敬無階煩信來承在彼登山顛倒按本書卷七王遠條登山顛倒應作食頃即到而先受命當按行蓬萊今便暫往如是當還還便親覲願來明鈔本來作未即去如此兩時間麻姑至矣來時亦先聞人馬簫鼓聲既至從官半於方平麻姑至蔡經亦舉家見之是好女子年十八九許於頂中作髻餘髮垂至腰其衣有文章而非錦綺光綵耀目不可名狀入拜方平方平為之起立坐定召進行廚皆金盤玉杯餚膳多是諸花果而香氣達於內外擘脯行之如柏靈集仙錄四靈作炙按柏當作貊貊炙見干寶搜神記云是麟脯也麻姑自說云接侍以來已見東海三為桑田向到蓬萊水又淺于往者會時略半也豈將復還為陵陸乎方平笑曰聖人皆言海中復揚塵也姑欲見蔡經母及婦姪時弟婦新產數十日麻姑望見乃知之曰噫且止勿前即求少許米得米便撒之擲地視其米皆成真珠矣方平笑曰姑故年少吾老矣了不喜復作此狡獪變化也方平語經家人曰吾欲賜汝輩酒此酒乃出天廚其味醇醲非世人所宜飲飲之或能爛腸今當以水和之汝輩勿怪也乃以一升酒合水一斗攪之賜經家飲一升許良久酒盡方平語左右曰不足遠取也以千錢與餘杭姥相聞求其沽酒須臾信還得一油囊酒五斗許信傳餘杭姥答言恐地上酒不中尊飲耳又麻姑鳥爪蔡經見之心中念言背大癢時得此爪以爬背當佳方平已知經心中所念即使人牽經鞭之謂曰麻姑神人也汝何思謂爪可以爬背耶但見鞭著經背亦不見有人持鞭者方平告經曰吾鞭不可妄得也是日又以一符傳授蔡經鄰人陳尉能檄召鬼魔救人治疾蔡經亦得解蛻之道如蛻蟬耳經常從王君遊山海或暫歸家王君亦有書與陳尉多是篆文或真書字廓落而大陳尉世世寶之宴畢方平麻姑命駕昇天而去簫鼓道從如初焉出神仙傳玄俗妻河間王女者玄俗妻也玄俗得神仙之道住河間已數百年鄉人言常見之日中無影唯餌巴豆雲母亦賣之於都市七丸一錢可愈百病河間王有病買服之下蛇十餘頭問其藥意答言王之所以病乃六世餘殃所致非王所招也王嘗放乳鹿即麟母也仁心感天固當遇我耳王家老舍人云嘗見父母說玄俗日中無影王召而視之果驗王女幼絕葷血洁淨好道王以此女妻之居數年與女俱入常山時有見者出女仙傳陽都女陽都市酒家女也生有異相眉連耳細長眾以為異疑其天人也時有黑山仙人犢子者鄴人也常居黑山採松子茯苓餌之已數百年莫知其姓名常乘犢時人號為犢子時壯時老時醜時美來往陽都酒家女悅之遂相奉侍一旦女隨犢子出取桃一宿而返得桃甚多連葉甘美異於常桃邑人俟其去時既出門二人共牽犢耳而走其速如飛人不能追如是且還復在市中數十年夫婦俱去後有見在潘山之下冬賣桃棗焉出墉城集仙錄孫夫人三天法師張道陵之妻也同隱龍虎山修三元默朝之道積年累有感應時天師得黃帝龍虎中丹之術丹成服之能分形散影坐在立亡天師自鄱鄱原作潘據墉城集仙錄改陽入嵩高山得隱書制命之術能策召鬼神時海內紛擾在位多危又大道凋喪不足以拯危佐世年五十方修道及丹成又二十餘年既術用精妙遂入蜀遊諸名山率身行教夫人棲真江表道化甚行以漢桓帝按桓帝疑當作沖帝永嘉元年乙酉到蜀居陽平化煉金液還丹依太乙無君所授黃帝之法積年丹成變形飛化無所不能以桓帝永壽二年丙申九月九日與天師於閬中雲臺化白日昇天位至上真東岳夫人子衡字靈真繼志修煉世號嗣師以靈帝光和二年歲在己未正月二十三日於陽平化白日昇天孫魯守公期世號嗣師當漢祚陵夷中土紛亂為梁益二州牧鎮南將軍理於漢中魏祖行靈帝之命就加爵秩旋以劉璋失蜀蜀先主舉兵公期託化歸真隱影而去初夫人居化中遠近欽奉禮謁如市遂於山趾化一泉使禮奉之人以其水盥沐然後方詣道靜號曰解穢水至今在焉山有三重以象三境其前有白陽池即太上老君遊宴之所後有登真洞與青城峨眉青衣山西玄山洞府相通故為二十四化之首也出女仙傳樊夫人樊夫人者劉綱妻也綱仕為上虞令有道術能檄召鬼神禁制變化之事亦潛修密證人莫能知為理尚清靜簡易而政令宣行民受其惠無水旱疫毒鷙暴之傷歲歲大豐暇日常與夫人較其術用俱坐堂上綱作火燒客碓屋從東起夫人禁之即滅庭中兩株桃夫妻各呪一株使相鬭擊良久綱所呪者不如如原作知據明鈔本改數走出籬外綱唾盤中即成鯉魚夫人唾盤中成獺食魚綱與夫人入四明山路阻虎綱禁之虎伏不敢動適欲往虎即滅之夫人徑前虎即面向地不敢仰視夫人以繩繫虎於床腳下綱每共試術事事不勝將昇天縣廳側先有大皂莢樹綱昇樹數丈方能飛舉夫人平坐冉冉如雲氣之昇同昇天而去後至唐貞元中湘潭有一媼不云姓字但稱湘媼常居止人舍十有餘載矣常以丹篆文字救疾於閭里莫不響應鄉人敬之為結搆搆字下原有御名二字原為宋代避高宗名諱而註今刪華屋數間而奉媼媼曰不然但土木其宇是所願也媼鬢翠如雲肥潔如雪策杖曳履日可數百里忽遇里人女名曰逍遙年二八艷美攜筐採菊遇媼瞪視足不能移媼目之曰汝乃愛我可同之所止否逍遙欣然擲筐斂袵稱弟子從媼歸室父母奔追及以杖擊之叱而返舍逍遙操益堅竊索自縊親黨敦喻其父母請縱之度不可制遂捨之復詣媼但箒塵易水焚香讀道經而已後月餘媼白鄉人曰果暫之羅浮扃其戶慎勿開也鄉人問逍遙何之曰前往如是三稔人但於戶外窺見小松迸筍而叢生階砌及媼歸召鄉人同開鎖見逍遙懵坐於室貌若平日唯蒲履為竹稍串於棟宇間媼遂以杖叩地曰吾至汝可覺逍遙如寐醒方起將欲拜忽遺左足如刖於地媼遽令無動拾足勘膝噀之以水乃如故鄉人大駭敬之如神相率數百里皆歸之媼貌甚閑暇不喜人之多相識忽告鄉人曰吾欲往洞庭救百餘人性命誰有心為我設船一隻一兩日可同觀之有里人張拱家富請具舟楫自駕而送之欲至洞庭前一日有大風濤蹙一巨舟沒於君山島上而碎載數十家近百餘人然不至損未有舟楫來救各星居於島上忽有一白鼉長丈餘遊於沙上數十人攔之撾殺分食其肉明日有城如雪圍繞島上人家莫能辨其城漸窄狹束島上人忙怖號叫囊橐皆為齏粉束其人為簇其廣不三數丈又不可攀援勢已緊急岳陽之人亦遙覩雪城莫能曉也時媼舟已至岸媼遂登島攘劍步罡噀水飛劍而刺之白城一聲如霹靂城遂崩乃一大白鼉長十餘丈蜿蜒而斃劍立其胸遂救百餘人之性命不然頃刻即拘束為血肉矣島上之人感號泣禮謝命拱之舟返湘潭拱不忍便去忽有道士與媼相遇曰樊姑爾許時何處來甚相慰悅拱詰之道士曰劉綱真君之妻樊夫人也後人方知媼即樊夫人也拱遂歸湘潭後媼與逍遙一時返真出女仙傳東陵聖母廣陵海陵人也適杜氏師劉綱學道能易形變化隱見無方杜不信道常怒之聖母理疾救人或有所詣杜恚之愈甚訟之官云聖母姦妖不理家務官收聖母付獄頃之已從獄窗中飛去眾望見之轉高入雲中留所著履一雙在窗下於是遠近立廟祠之民所奉事禱之立效常有一青鳥在祭所人有失物者乞問所在青鳥即飛集盜物人之上路不拾遺歲月稍久亦不復爾至今海陵縣中不得為姦盜之事大者即風波沒溺虎狼殺之小者即復病也出女仙傳郝姑郝姑祠在莫州莫縣西北四十五里俗傳云郝姑字女君本太原人後居此邑魏青龍年中與鄰女十人於漚洟洩水邊挑蔬忽有三青衣童子至女君前云東海公娶女君為婦言訖敷茵褥於水上行坐往來有若陸地其青衣童子便在侍側沿流而下鄰女走告之家人往看莫能得也女君遙語云幸得為水仙願勿憂怖仍言每至四月送刀魚為信自古至今每年四月內多有刀魚上來鄉人每到四月祈禱州縣長更若謁此祠先拜然後得入於祠前忽生青白石一所縱橫可三尺餘高二尺餘有舊題云此是姑夫上馬石至今存焉出莫州圖經張玉蘭張玉蘭者天師之孫靈真之女也幼而潔素不茹葷血年十七歲夢赤光自天而下光中金字篆文繚繞數十尺隨光入其口中覺不自安因遂有孕母氏責之終不言所夢唯侍婢知之一旦謂侍婢曰吾不能忍恥而生死而剖腹以明我心其夕無疾而終侍婢以白其事母不欲違冀雪其疑忽有一物如蓮花自疈其腹而出開其中得素金書本際經十卷素長二丈許幅六七寸文明甚妙將非人功玉蘭死旬月常有異香乃傳寫其經而葬玉蘭百餘日大風雷雨天地晦瞑失經其玉蘭所在墳壙自開棺蓋飛在巨木之上視之空棺而已今墓在益州溫江縣女郎觀是也三月九日是玉蘭飛昇之日至今鄉里常設齋祭之靈真即天師之子名衡號曰嗣師自漢靈帝光和二年己未正月二十三日於陽平化白日昇天玉蘭產經得道當在靈真上昇之後三國紛兢之時也出傳仙錄
