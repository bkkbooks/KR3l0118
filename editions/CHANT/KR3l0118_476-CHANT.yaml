body:
  text: 赤腰蟻赤腰蟻段成式元和中假居在長興里庭有一穴蟻形狀竊赤蟻之大者而色正黑腰節微赤首銳足高走最輕迅每生致蠖及小虫入穴輒坏垤窒穴蓋防其逸也自后徙居數處更不复見蘇湛唐元和中蘇湛游蓬鵲山裹糧鑽火境無遺址忽謂妻曰我行山中睹倒岩有光如鏡必靈境也明日將投之今與卿訣妻子號泣止之不得及明遂行妻子領奴婢潛隨之入山數十里遙望岩有白光圓明徑丈蘇遂逼之才及其光長叫一聲妻兒遽前救之身如茧矣有黑蜘蛛大如鈷鉧走集岩上奴以利刀決其网方斷蘇已腦陷而死妻乃積柴燒其岩臭滿一山石憲有石憲者其籍編太原以商為業常貨于代北長慶二年夏中雁門關行道中時暑方盛因偃大木下忽夢一僧蜂目披褐衲其狀奇異來憲前謂憲曰我廬于五台山之南有窮林積水出塵俗甚遠實群僧清暑之地檀越幸偕我而游乎即不能吾見檀越病熱且死得無悔其心耶憲以時暑方盛僧且以禍福語相動因謂僧曰愿與師偕去于是其僧引憲西去且數里果有窮林積水見群僧在水中憲怪而問之僧曰此玄陰池故我徒浴于中且以蕩炎燠于是引憲環池行憲獨怪群僧在水中又其狀貌無一異者已而天暮有一僧曰檀越可聽吾徒之梵音也于是憲立池上群僧即于水中合聲而噪僅食頃有一僧挈手曰檀越與吾偕浴于玄陰池慎無畏憲即隨僧入池中忽覺一身盡冷噤而戰由是惊悟見己臥于大木下衣盡濕而寒栗且甚時已日暮即抵村舍中至明日病稍愈因行于道聞道中有蛙鳴甚類群僧之梵音于是徑往尋之行數里窮林積水有蛙甚多其水果謂玄陰池者其僧乃群蛙而憲曰此蛙能易形以感于人豈非怪尤者乎于是盡殺之王叟寶歷初長沙有民王叟者家貧力田為業一日耕于野為蚯蚓螫其臂痛楚甚遂馳以歸其痛益不可忍夜呻而曉晝吟而夕如是者九旬餘有醫者云此毒之甚者也病之始庶藥有及狀且深矣則吾不得而知也后數日病益甚忽聞臂有聲幽然而微若蚯蚓者又數日其聲益大如合千萬音其痛亦隨而多焉是夕乃卒步蚓段成式三從房伯父唐太和三年任廬州某官庭前忽有蚓出大如食指長大二三丈白項當項下有兩足正如雀腳步于垣下經數日方死守宮太和末松滋縣南有士人寄居親故庄中肄業初到之夕二更后方張燈臨案忽有小人半寸葛巾策杖入門謂士人曰乍到無主人當寂寞其聲大如蒼蠅士人素有膽氣初若不見乃登床責曰遽不存主客禮乎复升案窺書詬詈不已因复硯于書上士人不耐以筆擊之墮地叫數聲出門而滅有頃有婦人四五或老或少皆長一寸大呼曰貞官以君獨學故令郎君言展且論精奧何痴頑狂卒輒致損害今可見貞官其來索續如蟻狀如騶率扑緣士人士人恍然若夢因嚙四支疾苦甚复曰汝不去將損汝眼四五頭遂上其面士人惊懼隨出門至堂東遙望見一門絕小如節使牙門士人乃叫何物怪魅敢凌人如此复被眾嚙之恍惚間已入小門內見一人峨冠當殿階下侍衛千數悉長寸余叱士人曰吾怜汝獨處俾小兒往何苦致害罪當腰斬乃見數十人悉持刃攘臂逼之士人大懼謝曰某愚騃肉眼不識貞官乞賜余生久之曰且解知悔叱令曳出不覺已在小門外及歸書堂已五更矣殘燈猶在及明尋其蹤跡東壁古階下有小穴如栗守宮出入焉士人即雇數夫發之深數丈有守宮十余石大者色赤長尺許蓋其王也壤土如樓狀士人聚蘇焚之后亦無他冉端忠州墊江縣吏冉端唐開成初父死有嚴師者善山岡為卜地云合有王氣群聚之物掘深丈余遇蟻城方數丈外重雉堞皆具子城譙櫓工若雕刻城內分徑街小垤相次每垤有蟻數千憧憧不絕徑甚淨滑樓中有二蟻一紫色長寸余足作金色一有羽細腰稍小白翅翅有經脈疑是雌者眾蟻約有數斛城隅小坏上以堅土為蓋故中樓不損既掘露蟻大扰若求救狀縣吏遽白縣令李玄之既睹勸吏改卜嚴師代其卜驗為其地吉縣吏請遷蟻于岩側狀其所為仍布石粟覆之以板經旬嚴師忽得病若狂或自批触穢詈大呼數日不已玄之素厚嚴師因為祝蟻療以雄黃丸方愈蚓齒段成式侄女乳母阿史本荊州人嘗言小時見鄰居有侄孔謙篱下有蚓口露雙齒肚下足如蚿長尺五行疾于常蚓謙惡遽殺之其年謙喪母及兄叔因不得活韋君有御史韋君嘗從事江夏后以奉使至京既還道次商于館亭中忽見亭柱有白蜘蛛曳而下狀甚微韋君曰是人之患也吾聞雖小螫人良藥無及因以指殺焉俄又有一白者下如前所殺之且觀其上有网為窟韋乃命左右挈帚盡掃去且曰為人患者吾已除矣明日將去因以手撫其柱忽覺指痛不可忍之乃是有一白蜘蛛螫其上韋君惊即拂去俄遂腫延不數日而盡一臂由是肩舁至江夏醫藥無及竟以左臂潰為血血盡而終先是韋君先夫人在江夏夢一白衣人謂曰我弟兄三人其二人為汝子所殺吾告上帝帝用憫其冤且遂吾請言畢夫人惊寤甚異之惡不能言后旬余而韋君至具得其狀方寤所夢覺為夢日果其館亭時也夫人泣曰其能久乎數日而韋君終矣陸顒吳郡陸顒家于長城其世以明經仕顒自幼嗜面為食愈多而質愈瘦及長從本郡貢于禮部既下第遂為生太學中后數月有胡人數輩挈酒食詣其門即坐顧謂顒曰吾南越人長蠻貊中聞唐天子庠羅天下英俊且欲以文物化動四夷故我航海梯山來中華將觀太學文物之光唯吾子峨焉其冠襜焉其裾庄然其容肅然其儀真唐朝儒生也故我愿與子交歡顒謝曰顒幸得籍于太學然無他才能何足下見愛之深也于是相與酣宴极歡而去顒信士也以為群胡不我欺旬余群胡又至持金繒為顒壽顒至疑其有他即固拒之胡人曰吾子居長安中惶惶然有饑寒色故持金繒為子仆馬一日之費所以交吾子歡耳豈有他哉幸勿疑我也顒不得已受金繒及胡人去太學中諸生聞之偕來謂顒曰彼胡率愛利不顧其身爭鹽米之微尚致相賊殺者寧肯棄金繒為朋友壽乎且太學中諸生甚多何為獨厚君耶君匿身郊野間以避再來也顒遂僑居于渭水上杜門不出僅月余群胡又詣其門顒大惊胡人喜曰比君在太學中我未得盡言今君退居郊野果吾心也既坐胡人挈顒手而言曰我之來非偶然也蓋有求于君耳幸望許之且我所祈于君固無害于我則大惠也顒曰謹受教胡人曰吾子好食面乎曰然又曰食面者非君也乃君肚中一虫耳今我欲以一粒藥進君君餌之當吐出虫則我以厚价從君易之其可乎顒曰若誠有之又安有不可耶已而胡人出一粒藥其色光紫命餌之有頃遂吐出一虫長二寸許色青狀如蛙胡人曰此名消面虫實天下之奇寶也顒曰何以識之胡人曰吾每旦見寶氣亙天在太學中故我特訪而取之然自一月余清旦望之見其氣移于渭水上果君遷居焉又此虫稟天地中和之氣而結故好食面蓋以麥自秋始種至來年夏季方始成實受天地四時之全氣故嗜其味焉君宜以面食之可見矣顒即以面斗余致其前虫乃食之立盡顒又問曰此虫安使用也胡人曰夫天下之奇寶俱稟中和之氣此虫乃中和之粹也執其本而取其末其遠乎哉既而以筒盛其虫又金函扃之命顒致于寢室謂顒曰明日當再來及明旦胡人以十兩重輦金玉繒帛約數萬獻于顒共持金函而去顒自此大富致園屋為治生具日食梁肉衣鮮衣游于長安中號豪士僅歲余群胡又來謂顒曰吾子能與我偕游海中乎我欲探海中之奇寶以耀天下而吾子豈非好奇之士耶顒既以甚富又素用閒逸自遂即與群胡俱至海上胡人結宇而居于是置油膏于銀鼎中构火其下投虫于鼎中煉之七日不絕燎忽有一童分發衣青襦自海水中出捧月盤盤中有徑寸珠甚多來獻胡人胡人大聲叱之其童色懼捧盤而去僮去食頃又有一玉女貌极冶衣霧綃之衣佩玉珥珠翩翩自海中而出捧紫玉盤中有珠數十來獻胡人胡人罵之玉女捧盤而去俄有一仙人載瑤碧冠帔霞衣捧絳帕籍籍中有一珠徑三寸許奇光泛空照數十步仙人以珠獻胡人胡人笑而授之喜謂顒曰至寶來矣即命絕燎自鼎中收虫置金函中其虫雖煉之且久而跳躍如初胡人吞其珠謂顒曰子隨我入海中慎無懼顒即執胡人佩帶從而入焉其海水皆豁開數十步鱗介之族俱辟易回去游龍宮入蛟室珍珠怪寶惟意所擇才一夕而獲甚多胡人謂顒曰此可以致億萬之貨矣已而又以珍貝數品遺于顒貨于南越獲金千鎰由是益富其后竟不仕老于閩越中也
