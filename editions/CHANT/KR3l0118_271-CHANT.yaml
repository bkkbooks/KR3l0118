body:
  text: 賢婦徐才人徐氏名惠堅之女也生五月能言唐太宗以為才人特遷為充容軍旅未寧上疏諫修宮室詞甚典美上然之盧氏狄仁傑之為相也有盧氏堂姨居于午橋南別墅姨止有一子而未嘗來都城親戚家仁傑每伏臘晦朔修禮甚謹常經雪後休假仁傑因候盧姨安否適表弟挾弓矢攜雉兔而來歸進膳於母顧揖仁傑意甚輕簡仁傑因啟於姨曰某今為相表弟有何樂從願悉力從其旨姨曰相自貴爾姨止有一子不欲令其事女主仁傑大慚而退董氏則天朝太僕卿來俊臣之彊盛朝官側目上林令侯敏偏事之其妻董氏諫止之曰俊臣國賊也勢不久一朝事壞奸黨先遭君可敬而遠之敏稍稍而退俊臣怒出為涪州武隆令敏欲棄官歸董氏曰速去莫求住遂行至州投刺參州將錯題一張紙州將展看尾後有字大怒曰修名不了何以為縣令不放上敏憂悶無已董氏曰但住莫求去停五十日忠州賊破武隆殺舊縣令略家口並盡敏以不計上獲全後俊臣誅逐其黨流嶺南敏又獲免高叡妻趙州刺史高叡妻秦氏默啜賊破定州部至趙州長史已下開門納賊叡計無所出與秦氏仰藥而詐死舁至啜所良久啜以金獅子帶紫袍示之曰降我與爾官不降即死叡視而無言但顧其婦秦氏秦氏曰受國恩報在此今日受賊一品何足為榮俱合眼不語經兩日賊知不可屈乃殺之崔敬女唐冀州長史吉懋欲為男頊娶南宮縣丞崔敬女敬不許因有故脅以求親敬懼而許之擇日下函並花車卒至門首敬妻鄭氏初不知抱女大哭曰我家門戶底不曾有吉郎女堅臥不起其小女白其母曰父有急難殺身救解設令為婢尚不合辭姓望之門何足為恥姊若不可兒自當之遂登車而去頊遷平章事賢妻達節談者榮之頊坐與河內王武懿宗爭競出為溫州司馬而卒李畬母監察御史李畬母清素貞潔畬請祿米送至宅母遣量之賸三石問其故令史曰御史例不概又問車腳錢幾又曰御史例不還腳車錢母怒令送所賸米及腳錢以責畬畬乃追倉官科罪諸御史皆有慚色盧獻女文昌左丞盧獻第二女先適鄭氏其夫早亡誓不再醮姿容端秀顏調甚高姊夫羽林將軍李思沖姊亡之後奏請續親許之兄弟並不敢白思沖擇日備禮贄幣甚盛執致就宅盧氏拒關抗聲詈曰老奴我非汝匹也乃踰垣至所親家截髮沖奏之敕不奪其志後為尼甚精進鄧廉妻滄州弓高鄧廉妻李氏女嫁未周年而廉卒李年十八守志設靈几每日三上食臨哭布衣蔬食六七年忽夜夢一男子容止甚都欲求李氏為偶李氏睡中不許之自後每夜夢見李氏竟不受以為精魅書符呪禁終莫能絕李氏嘆曰吾誓不移節而為此所撓蓋吾容貌未衰故也乃援刀截髮麻衣不濯蓬鬢不理垢面灰身其鬼又謝李氏曰夫人竹柏之操不可奪也自是不復夢見郡守旌其門閭至今尚有節婦里肅宗朝公主肅宗讌于宮中女優弄假戲有綠衣秉簡為參軍者天寶末蕃將阿布恩伏法其妻配掖庭善為優因隸樂工是以遂令為參軍之戰公主諫曰禁中妓女不少何必須得此人使阿布恩真逆人耶其妻亦同刑人不合近至尊之座若果冤橫又豈忍使其妻與群優雜處為笑謔之具哉妾雖至愚深以為不可上亦憫惻遂罷戲而免阿布恩之妻由是賢重公主潘炎妻潘炎侍郎德宗時為翰林學士恩渥極其異妻劉晏女也京尹某有故伺候累日不得見乃遺閽者三百縑夫人知之謂潘曰豈為人臣而京尹願一謁見遺奴三百縑其危可知也遽勸潘公避位子孟陽初為戶部侍郎夫人憂惕謂曰以爾人材而在丞郎之位吾懼禍必之至也戶部解喻再三乃曰不然試會爾同列吾觀之因遍招深熟者客至夫人垂簾視之既罷會喜曰皆爾儔也不足憂矣問末座慘綠少年何人也曰補闕杜黃裳夫人曰此人全別必是有名卿相劉皇后後唐太祖至州上源驛之變太祖憤恨欲迴軍攻之劉皇后時隨軍行謂太祖曰公為國討賊而以杯酒私忿若攻城即曲在於我不如迴師自有朝廷可以論列於是班師天復中周德威為汴軍所敗三軍潰散汴軍乘我太祖危懼與德威議出保雲州劉皇后曰妾聞王欲棄城而入外藩誰為此畫曰存信輩所言劉后曰存信本北蕃牧羊兒也焉顧成敗王常笑王行瑜棄城失勢被人屠割今復欲效之也王頃歲避難達靼幾遭陷害賴遇朝廷多事方得復歸今一旦出城便有不測之變焉能遠及北蕃遂止居數日亡散之士復集軍城安堵劉后之力也河池婦人梁祖攻圍歧隴之年引兵至于鳳翔秦師李茂貞遣戎校李繼朗統眾救之至則大捷生降七千餘人及旋軍於河池縣掠獲一少婦甚有顏色繼朗悅之寢處於兵幕之下西邁十五餘程每欲逼之即云我姑嚴夫妬請以死代之戎師怒脅力以威終莫能屈師笑而憫之竟不能犯使人送還其家賀氏兗州有民家婦姓賀氏里人謂之織女父母以農為業其丈夫則負擔販賣往來于郡賀初為婦未浹旬其夫出外每出數年方至至則數日復出其所獲利蓄別婦於他所不以一錢濟家賀知之每夫還欣然奉事未嘗形於顏色夫慚愧不自得更非理毆罵之婦亦不之酬對其姑已老且病凜餒切骨婦傭織以資之所得傭直盡歸其姑已則寒餒姑又不慈日有淩虐婦益加恭敬下氣怡聲以悅其意終無怨歎夫嘗挈所愛至家賀以女弟呼之略無慍色賀為婦二十餘年其夫無半年在家而能勤力奉養始終無怨可謂賢孝矣謝道韞王凝之妻謝道韞王獻之與客談義不勝道韞遣婢白曰請與小郎解圍乃施青綾步障自蔽與客談客不能屈楊容華楊盈川姪女曰容華幼善屬文嘗為新粧詩好事者多傳之詩曰宿鳥驚眠罷房櫳乘曉開鳳釵金作縷鸞鏡玉為臺粧似臨池出人疑月下來自憐終不見欲去復徘徊上官昭容唐上官昭容之方娠母鄭氏夢神人畀之大秤以此可稱量天下生彌月鄭弄之曰爾非秤量天下乎孩啞應之曰是襁中遇家禍入掖庭年十四聰達敏識才華無比天后聞而試之援筆立成皆如宿搆自通天後建景龍前恒掌宸翰其軍國謀猷殺生大柄多其決至若幽求英雋鬱興詞藻國有好文之士朝希不學之臣二十年間野無遺逸此其力也而晚年頗外通朋黨輕弄權勢朝廷畏之矣玄宗平難被誅張氏燕文貞公張說其女嫁盧氏嘗謂舅求官候父朝下而問焉父不語但指搘牀龜而示之女拜而歸室告其夫曰舅得詹事矣杜羔妻杜羔妻劉氏善為詩羔累舉不中第乃歸將至家妻即先寄詩與之曰良人的的有奇才何事年年被放回如今妾面羞君面君到來時近夜來羔見詩即時迴去竟登第張睽妻會昌中邊將張睽防戍十有餘年其妻侯氏繡迴文作龜形詩詣闕進上詩曰睽離已是十秋彊對鏡那堪重理粧聞鴈幾迴修尺素見霜先為製衣裳開箱疊練先垂淚拂杵調砧更斷腸繡作龜形獻天子願教征客早還鄉敕賜絹三百疋以彰才美關圖妹關圖有一妹甚聰惠文學書札罔不動人圖常語同僚曰某家有一進士所恨不櫛耳後寓居江陵有鹺賈常某者囊畜千金三峽人也亦家于江陵深結託圖圖亦以長者待之數載常公殂有一子狀貌頗有儒雅之風紀而略曉文墨圖竟以其妹妻之則常修也關氏乃與修讀書習二十餘年才學優博越絕流輩咸通六年登科座主司空李公蔚也初江東羅隱下第東歸有詩別修云六載辛勤九陌中却尋歧路五湖東名慚桂苑一枝綠繪憶松江滿棹紅浮世到頭須適性男兒何必盡成功惟應鮑叔深知我他日蒲帆百尺風又廣陵秋夜讀修所賦三篇復吟寄修云入蜀還吳三首詩藏於篋笥重於師劍關夜讀相如聽瓜步秋吟煬帝悲物景也知輸健筆時情誰不許高枝明年二月東風裏江島閒人慰所思修名望若此關氏亦有助焉後修卒關氏自為文祭之時人竟相傳寫魚玄機女道士魚玄機字惠蘭甚有才思咸通中適李億補闕後愛衰下山隸咸宜觀為道士詩曰易求無價寶難得有心郎又云蕙蘭銷歇歸春圃楊柳東西絆客舟自是縱懷乃倡婦也竟以殺侍婢為京尹溫璋殺之有集行於世牛肅女牛肅長女曰應貞適弘農楊唐源少而聰頴經耳必誦年十三凡誦佛經三百餘卷儒書子史又數百餘卷親族驚異之初應貞未讀左傳方擬授之而夜初眠中忽誦春秋起惠西元妃孟子卒終智伯貪而復故韓魏反而喪之凡三十卷一字無遺天曉而畢當誦時若有教之者或相酬和其父驚駭數呼之都不答誦已而覺問何故亦不知試令開卷則亦精熟矣問不答著文章百餘首後遂學窮三教博涉多能每夜中眠熟與文人談論文皆古之知名者往來答難或稱王弼鄭玄王衍陸機辯論烽起或與文人論文皆古之知名者或論文章談名理往往數夜不已年二十四而卒今採其文魍魎問影賦著干篇其序曰庚辰歲予嬰沈痛之疾不起者十旬毀頓精神贏悴形體藥物救療有加無瘳感莊子有魍魎責影之義故假之為賦庶解疾焉魍魎問於予影曰君英達之人聰明之子學包六藝文兼百氏賾道家之秘言探釋部之幽旨既虔恭於中饋又希慕於前史不矯枉以干名不毀物而成已伊淑德之如此即精神之足恃何故贏厥姿貌沮其精神煩冤枕席憔悴衣巾子惟形兮是寄形與子兮相親何不誨之以崇德而教之以自倫異萊妻之樂道殊鴻婦之安貧豈痼疾而無生賴將微賤而欲忘身今節變歲移臘終春首照晴光於郊甸動暄氣於梅柳水解凍而繞軒風扇和而入牖固可蠲憂釋疾怡神養壽何默爾無營自貽伊咎僕於是勃然而應曰子居於無人之域遊乎魑魅之鄉形既圖於夏鼎名又著於蒙莊何所見之不博何所談之不長夫影依日而生像因人而見豈言談之足曉何節物之能辨隨晦明以興滅逐形骸以遷變以愚夫畏影而蒙鄙之性以彰智者視陰而遲暮之心可見伊美惡兮由己影何辜而遇譴且予聞至道之精窈兮冥至道之極昏兮默達人委性命之修短君子任時運之通塞悔吝不能纏榮耀不能惑喪之不以為喪得之不以為得君子何乃怒予之不賞芳春責予之不貴華飾且吾之秉操奚子智之能測言未卒魍魎惕然而驚歎而起曰僕生於絕域之外長於荒遐之境未曉智者之處身是以造君而問影既談玄之至妙請終身以藏屏初應貞夢裂書而食之每夢食數十卷則文體一變如是非一遂工為賦頌文名曰遺芳慎氏北陵虔亭儒家之女也三史嚴灌夫因遊覽遂結姻好同載歸蘄春經十餘年無嗣息灌夫乃拾其過而出妻令歸二浙慎氏慨然登舟親戚臨流相送妻乃為詩以訣灌夫灌夫覽之悽感遂為婦道如初慎氏詩曰當時心事已相關雨散雲飛一餉間便是孤帆從此去不堪重上望夫山薛媛濠梁人南楚材者旅遊陳潁歲久潁守慕其儀範將欲以子妻之楚材家有妻以受知於潁牧忽不思義而輒已諾之遂遣家僕歸取琴書似無返舊之心或謂求道青城訪僧衡嶽不復留心於名宦也其妻薛媛善書畫妙屬文亦微知其意乃對鏡圖其形并詩四韻以寄之楚材得妻真及詩甚慚遽有雋不疑之讓夫婦遂偕老焉里語曰當時婦棄夫今日夫棄婦若不逞丹青空房應獨自薛媛寫真寄夫詩曰欲下丹青筆先拈寶鏡端已經顏索寞漸覺鬢凋殘淚眼描將易愁腸寫出難恐君渾忘却時展畫圖看孫氏樂昌孫氏進士孟昌期之內子善為詩一旦併焚其集以為才思非婦人之事自是專以婦道內治孫有代夫贈人白蠟燭詩曰景勝銀釭香比蘭一條白玉逼人寒他時紫禁春風夜醉草天書仔細看又有聞琴詩曰玉指朱絃軋復清湘妃愁怨最難聽初疑颯颯涼風動又似蕭蕭暮雨零近若流泉來碧嶂遠如玄鶴下青冥夜深彈罷堪惆悵霧濕叢蘭月滿庭又謝人送酒詩曰詩將清酒寄愁人澄徹甘香氣味真好是綠牕風月夜一盃搖蕩滿懷春
