body:
  text: 張隆張隆宋永初三年吳郡張隆家忽有一鬼云汝與我食當相佑助後為作食因以大刀斫其所食處便聞數十人哭哭亦甚悲云死何由得棺又聞云主人家有破船奴甚愛惜當取為棺見取船至有釜鋸聲日既暝聞呼喚舉尸置船中隆皆不見惟聞處分便見船漸升空入雲霄中及滅後復聞如有數十人大笑云汝那能殺我也但向以惡我憎汝故隱沒汝船耳隆便回意奉事此鬼問吉凶及將來之計語隆曰汝可以大甕著壁角中我當為覓物也十日一倒有錢及金銀銅鐵魚腥之屬吉礐石吉未翰從弟名礐石先作檀道濟參軍嘗病因見人著朱衣前來揖云特來相迎礐石厚為施設求免鬼曰感君延接當為少停乃不復見礐石漸差後丁艱還壽陽復見鬼曰迎使尋至君便可束粧礐石曰君前已留懷今復得見愍否鬼曰前召欲相使役故停耳今泰山屈君為主簿又使隨至不可辭也便見車馬傳教油戟羅列于前指示家人人莫見也礐石介書呼親友告別語笑之中便奄然而盡富陽人宋元嘉初富陽人姓王于窮瀆中作蟹籪旦往視見一材頭長二尺許在籪裂開蟹出都盡乃修治籪出材岸上明往看之見材復在籪中敗如前王又治籪再往視所見如初王疑此材妖異乃取納蟹籠中繫擔頭歸云至家當破燃之未之家三里聞中倅倅動轉顧見向材頭變成一物人面猴身一手一足語王曰我性嗜蟹此寔入水破若蟹籪相負已多望君見恕開籠出我我是山神當相佑助使全籪大得蟹王曰汝犯暴人前後非一罪自應死此物轉頓請乞放又頻問君姓名為何王回顧不應答去家轉近物曰既不放我又不告我姓名當復何計但應就死耳王至家熾火焚之後寂無復異土俗謂之山魈云知人姓名則能中傷人所以勤問正欲害人自免給使近世有人得一小給使頻求還家未遂後日久此吏在南窗下眠此人見門中有一婦人年五六十肥大行步艱難吏眠失覆婦人至牀邊取被以覆之回復出門去吏轉側衣落婦人復如初此人心怪明問吏以何事求歸吏云母病次問狀貌及年皆如所見唯云形瘦不同又問母何患答云病腫而即與吏假使出便得家信云母喪追什所見之肥乃是其腫狀也甄法崇宋甄法崇永初中為江陵令在任嚴明其時南平繆士為江安令卒于官後一年崇在廳忽見一人從門而入云繆士謹通法崇知其亡因問卿貌何故瘦答云我生時所行善不補惡罹繫苦復勤劇理墨又云卿縣民某甲負我米千餘石無券書悍不還今兒累窮獘乞為嚴勑法崇曰卿可作詞士云向不繼紙且又不復書矣法崇令省事取筆疏其語士口授其言歷歷詞成謝而去法崇以事問繆家云有此登時攝問負米者畏怖依實輸還謝晦謝晦在荊州壁角間有一赤鬼長可三尺來至其前手擎銅盤滿中是血晦得乃紙盤須臾而沒謝靈運謝靈運以元嘉五年忽見謝晦手提其頭來坐別牀血流淋落不可忍視又所服貂裘血淹滿篋及為臨川郡飯中欻有大蟲遂被誅梁清宋文帝世天水梁清家在京師新亭臘月將祀使婢于爨室造食忽覺空中有物操杖打婢婢走告清清遂往見甌器自運盛飲斟羹羅列案上聞哺啜之聲清曰何不形見乃見一人著平上幘烏皮袴褶云我京兆人亡沒飄寄聞卿好士故來相從清便席地共坐設肴酒鬼云卿有祀事云云清圖某郡先以訪鬼鬼云所規必諧某月某日除出果然鬼云郡甚優閒吾願周旋清答甚善後停舟石頭待之五日鬼不來于是引路達彭城方見至同在郡數年還都亦相隨而返徐道饒以元嘉十年忽見一鬼自言是其先人于時冬日天氣清朗先積稻屋下云汝明日可曝穀天方大雨未有晴時饒從其教鬼亦助輦後果霖雨時有見者形如獼猴饒就道士請符懸著窗戶鬼便大笑欲以此斷我我自能從狗竇中入雖則此語而不復進經數日嘆云徐叔寶來吾不宜見之后日果至於是遂絕東萊陳氏東萊有一家姓陳家百餘口朝炊釜不沸舉甑看之忽有一白頭公從釜中出便詣師師云此大怪應滅門便歸大作械械成使置門壁下堅閉門在內有馬騎麾蓋來叩門者慎勿應乃歸合手伐得百餘械置門屋下果有人至呼不應主帥大怒令緣門入從人闚門內見大小械百餘出門還說如此帥大惶惋語左右云教速來不速來遂無復一人當去何以解罪也從此北行可八十里有一百三口取以當之后十日中此家死亡都盡此家亦姓陳謝道欣會稽郡常有大鬼長數丈腰大數十圍高冠玄服郡將吉凶先于雷門示憂喜之兆謝氏一族憂喜必告謝弘道未遭母艱數月鬼晨夕來臨及后將轉吏部尚書拊掌三節舞自大門至中庭尋而遷問至謝道欣遭重艱至離塘行墓地往向夜見離塘有雙炬須臾火忽入水中仍舒長數十丈色白如練稍稍漸還赤散成數百炬追逐車從而行悉見火中有鬼甚長大頭如五石籮其狀如大醉者左右小鬼共扶之是年孫恩作亂會稽大小莫不翼戴時以為欣之所見亂之徵也禹會諸侯會稽防風之鬼也沈寂之吳興沈寂之以元嘉中忽有鬼于空中語笑或歌或哭至夜偏盛寂之有靈車鬼共牽走車為壞寂之有長刀乃以置瓮中有大鏡亦攝以納器中王胡宋王胡者長安人也叔死數載元嘉二十三年忽形見還家責胡以修謹有缺家事不理罰胡五杖傍人及鄰里並聞其語及杖聲又見杖瘢而不見其形唯胡獨得親接叔謂胡曰吾不應死神道須吾筭諸鬼錄今大從吏兵恐驚損鄰里故不將進耳胡亦大見眾鬼紛鬧于村外俄而辭去曰吾來年七月七日當復暫還欲將汝行遊歷幽途使知罪福之報也不須費設若意不已止可茶食耳至期果還語胡家人云吾今將胡遊觀觀畢當還不足憂也胡即頓臥牀上泯然如盡叔於是將胡遍觀群山備觀鬼怪末至嵩高山諸鬼道胡並有饌設其品味不異世中唯姜甚脆美胡懷之將還左右人笑云止可此食不得將遠也胡又見一處屋宇華曠帳筵精美有二少僧居焉胡造之二僧為設雜果檳榔等胡遊歷久之備見罪福苦樂之報及辭歸叔謂曰汝既已知善之當修返家尋白足阿練此人戒行精高可師事也長安道人足白故時人謂為白足阿練也甚為魏虜所敬虜王事為師胡既奉此訓遂與嵩山上年少僧者遊學眾中忽見二僧胡大驚與敘乖闊問何時來此二僧云貧道本住此寺往日不意與君相識胡復說嵩高之遇眾僧云君謬耳豈有此耶至明日二僧不辭而去胡乃具告諸沙門敘說往日嵩山所見眾咸驚怪即追求二僧不知所在陶繼之元嘉末為秣陵令嘗枉殺樂伎夜夢伎來云昔枉見殺訴天得理今故取君遂跳入陶口仍落腹中須臾復出乃相謂曰今直取陶秣陵亦無所用更議上丹陽耳言訖並沒陶未幾而卒王丹陽果亡朱泰朱泰家在江陵宋元徽中病亡未殯忽形見還坐尸側慰勉其母眾皆見之指揮送終之具務從儉約謂母曰家比貧泰又亡歿永違侍養殯殮何可廣費戴承伯宋戴承伯元徽中買荊州治下枇杷寺其額乃悞東空地為宅日暮忽聞恚罵之聲起視有人形狀可怪承伯問之答曰我姓龔本居此宅君為何強奪承伯曰戴瑾賣地不應見咎鬼曰利身妨物何預瑾乎不速去當令君知言訖而沒承伯性剛不為之動旬日暴疾卒章授丹陽郡史章授使到吳郡經毗陵有一人年三十餘黃色單衣從授寄載笥行數日略不食所過鄉甲輒周旋里中即聞有呼魄者良久還船授疑之伺行后發其笥有文書數卷皆是吳郡諸人名又有針數百枚去或將一管后還得升餘酒數片脯謂授曰君知我是鬼也附載相煩求得少酒相與別所以多持針者當病者以針針其神焉今所至皆此郡人丹陽別有使往今年多病君勿至病者家授從乞藥答言我但能行病殺人不主藥治病也元嘉末有長安僧什曇爽來游江南具說如此也施續門生吳興施續有門生常秉無鬼論忽有一單衣白袷客與共語遂及鬼神移日客辭屈乃曰君辭巧理不足僕即是鬼何以云無問鬼何以來答曰受使來取君期盡明日食時門生請乞酸苦鬼問有人似君者否云施續帳下都督與僕相似便與俱往與都督對坐鬼手中出一鐵鑿可尺餘安著都督頭便舉椎打之都督云頭覺微痛向來轉劇食頃便亡張道虛吳郡張道虛張順知名士也居在閶門遭母喪中買新宅日暮聞人扣門云君是佳人何為危人自安也答云僕自買宅得君棺器為市甓作冢相移有何負鬼曰移身著吳將軍冢吾是小人日夜鬭不可堪忍不信君可隨我視之於是二張恍惚便至閶門外二張聽之但聞冢中淘淘打拍鬼便語云當令君知少時兄弟俱亡
