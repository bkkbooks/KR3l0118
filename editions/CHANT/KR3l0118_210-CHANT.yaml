body:
  text: 烈裔烈裔秦有烈裔者騫霄國人秦皇帝時本國進之口含丹墨噀壁以成龍獸以指歷地地字原闕據拾遺記補如繩界之轉手方圓皆如規度方寸內有五岳四瀆列國備焉善畫龍鳳軒軒然唯恐飛去出王子年拾遺記敬君齊敬君善畫齊王起九重臺召敬君畫君久不得歸思其妻遂畫真以對之齊王因睹其美賜金百萬遂納其妻出劉向說苑毛延壽前漢元帝後宮既多不得常見乃令畫工圖其形按圖召幸之諸宮人皆賂畫工多者十萬少者不減五萬唯王嬙不肯遂不得召後匈奴求美人為閼氏上按圖召昭君行及去召見貌美壓後宮而壓後宮而四字原缺據明鈔本補占對舉止各盡各盡二字原闕據明鈔本補閑雅帝悔之而業已定帝重信於外國不復更人乃窮按其事畫工皆棄市籍其家資皆巨萬畫工杜陵毛延壽為人形醜好老少必得其真安陵陳敞新豐新豐原作雜畫據西京雜記改劉白龔寬並工劉白龔寬並工六字原闕據明鈔本補牛馬眾勢人形醜好不逮逮原作在據西涼雜記改延壽下杜陽望亦善畫尤善布色同日棄市京師畫工於是差希出西京雜記趙岐後漢趙歧字邠卿京兆杜陵人多才藝善畫自為壽藏於郢城中畫季札子產晏嬰叔向四人居賓位自居主位各為讚誦獻帝建安六年官至太常卿出范曄後漢書劉褒後漢劉褒桓帝時人曾畫雲臺閣明鈔本台閣作漢圖人見之覺熱又畫北風圖人見之覺涼官至蜀郡太守出張華博物志張衡後漢張衡字平子南陽西鄂人高才過人性聰明天象善書累拜侍中出為河間王相年六十二昔建州滿城縣山有獸名駭神豕身人首狀貌醜惡百鬼惡之好出水邊石上平子往寫之獸入水中不出或云此獸畏寫之故不出遂去紙筆獸果出平子拱手不動潛以足指畫之今號巴獸潭出郭氏異物志徐邈魏徐邈字景山性嗜酒善畫魏明帝遊洛水見白獺愛之不可得邈曰獺嗜鯔魚乃不避死遂畫板作鯔魚懸岸群獺競來一時執得帝嘉歎曰卿畫何其神也答曰臣未嘗執筆所作者自可庶幾出齊諧記曹不興謝赫云江左畫人吳曹不興運五千尺絹畫一像心敏手疾須臾立成頭面手足胸臆肩背無遺失尺度此其難也唯不興能之陳朝謝赫善畫嘗閱祕閣歎伏曹不興所畫龍首以為若見真龍出尚書故實衛協晉衛協抱朴子云衛協張墨並為畫聖孫鴻之上林苑圖協蹤最妙又七佛圖人不敢點眼睛愷之論畫云七佛與烈女皆協之跡壯而有情勢毛詩北風圖亦協手巧密於情思此畫短卷長裝八分張彥遠題云元和宗人惟素將來余大父答以名馬精絹二百匹惟素後卻又將貨與韓愈韓之子昶借與相國段文昌卻以模本歸於昶會昌元年見段家本後於襄州從事見韓家本謝赫云古畫皆略至此始精六法頗為兼善雖不備該形似而有氣韻陵跨群雄曠代絕筆在第一品曹不興下張墨荀勗上出名畫記王獻之晉王獻之字子敬少有盛名風流高邁草隸繼父之美妙於畫桓溫嘗請畫扇誤落筆就成烏駮牸牛極妙絕又書駁牛賦於扇上此扇義熙中猶在出名畫記顧愷之晉顧愷之字長康小字虎頭晉陵人多才氣尤工丹青傅寫形勢莫不妙絕謝安謂長康曰卿畫自生人已來未有又云卿畫蒼蒼古來未有曾以一廚畫暫寄桓玄皆其妙跡所珍祕者封題之其後玄聞取之誑云不開愷之不疑被竊直云妙畫通神變化飛去猶人之登仙也愷之有三絕才絕畫絕癡絕又嘗悅一憐女乃畫女於壁當心釘之女患心痛告於長康康遂拔釘乃愈又嘗欲寫殷仲堪真仲堪素有目疾固辭長康曰明府無病若明點瞳子飛白拂上便如輕雲蔽日畫人物數年不點目睛人問其故答曰四體妍蚩本無關於妙處傳神寫貌正在阿堵之中又畫裴楷真頰上乃加三毛云楷俊郎有鑒識具此觀之者定覺殊勝嵇康贈以四言詩畫為圖常云手揮五絃易目送歸鴻難又畫謝幼輿於一巖中人問其故云一丘一壑此明鈔本此字上有謂之二字子宜置巖壑中長康又嘗於瓦棺寺北殿內畫維摩居士畫畢光輝月餘京師寺記云興寧中瓦棺寺初置僧眾設剎會請朝賢士庶宣疏募緣時士大夫莫有過十萬者長康獨注百萬長康素貧眾以為大言後寺僧請勾疏長康曰宜備一壁閉戶不出不出原作往來據明鈔本改一月餘所畫維摩一軀工畢將欲點眸子乃謂僧眾曰第一日觀者請施十萬第二日觀者請施五萬第三日觀者可任其施及開戶光照一寺施者填咽俄而及百萬劉義慶世說云桓大司馬每請長康與羊欣講論畫書竟夕忘疲出名畫記又清夜遊西園圖顧長康畫有梁朝諸王跋尾處云圖上若干人並食天廚貞觀中褚河南諸賢題處具在本張惟素家收得至相國張公弘靖元和中宣惟素并鍾元常寫道德經同進入內後中貴人崔譚峻自禁中將出復流傳人間惟素子周封前涇州從事在京一日有人將此圖求售周封驚異之遽以絹數疋易得經年忽聞款門甚急問之見數人同稱仇中尉願以三百素絹易公清夜圖周封憚其迫脅遽以圖授之明日果齎絹至後方知詐偽乃是一豪士求江淮大監院時王淮判鹽鐵酷好書畫謂此人曰為余訪得此圖然遂公所請因為計取耳及王家事起復流一粉鋪家郭侍郎承嘏閽者以錢三百市得郭公卒又流傳至令狐家宣宗嘗問相國有何名畫相國其以圖對後進入內出尚書故實顧光寶顧光寶能畫建康有陸溉患瘧經年醫療皆無效光寶常詣溉溉引見與臥前謂光曰我患此疾久不得療矣君知否光寶不知溉患謂溉曰卿患此深是不知若聞安至伏室遂命筆以墨圖一獅子令於外戶牓之謂溉曰此出手便靈異可虔誠啟心至禱明日當有驗溉命張戶外遣家人焚香拜之已而是夕中夜戶外有窸窣之聲良久乃不聞明日所畫獅子口中臆前有血淋漓及於戶外皆點焉溉病乃愈時人異之出八朝畫錄明鈔本作出八朝窮怪錄王廙晉王廙字世將瑯琊臨川明鈔本許刻本川作沂人善屬詞攻書畫過江後為晉朝書畫第一音律眾妙畢綜元帝時為左衛將軍封武康侯時鎮軍謝尚於武昌樂寺造東塔戴若思造西塔並請廙畫出名畫記王濛晉王濛字仲祖晉陽人放誕不羈書比廙歷代名畫記五廙作庾翼丹青甚妙頗希高遠嘗往驢肆家畫轜車自云我嗜酒好肉善畫但人有飲食美酒精絹我何不可也特善清談為時所重出名畫記戴逵晉戴逵字安道譙郡銍縣人幼年已聰明好學善琴攻畫為童兒時以白瓦屑雞卵汁和溲作鄭玄碑時稱絕妙庾道季看之語逵云神猶太俗卿未盡耳逵曰唯務允當免卿此語出名畫記又戴安道幼歲在瓦棺寺內畫王長史見之曰此童非徒能畫亦終當致名但恨吾老不見其盛耳出世說雜書宗炳宋宗炳字少文善書畫好山水西涉荊巫南登衡嶽因結宇衡山以疾還江陵歎曰老疾俱至名山恐難遍遊當澄懷觀道臥以遊之凡所遊歷皆圖於壁坐臥向之出名畫記黃花寺壁後魏孝文帝登位初有魏城人元兆能以九天法禁絕妖怪先鄴中有軍士女年十四患妖病累年治者數十人並無據一日其家以女來謁元兆所止謁兆兆曰此疾非狐狸之魅是妖畫也吾何以知今天下有至神之妖有至靈之怪有在陸之精有在水之魅吾皆知之矣汝但述疾狀是佛寺中壁畫四天神部落中魅也此言如何其女之父曰某前於雲門黃花寺中東壁畫東方神下乞恩常攜此女到其下又女常懼此畫之神因夜驚魘夢惡鬼來持女而笑由此得疾兆大笑曰故無差因忽與空中人語左右亦聞空中有應對之音良久兆向庭嗔責之云何不速曳亟持來左右聞空中云春方大神傳語元大行惡神吾自當罪戮安見大行兆怒向空中語曰汝以我誠達春方必請致之我為暫責請速鎖致之言訖又向空中語曰召二雙牙八赤眉往要不去聞明鈔本聞作問東方左右咸聞有風雨之聲乃至兆大笑曰汝無形相畫之妍致耳有何恃而魅生人也兆謂其女曰汝自辨其狀形兆令見形左右見三神皆丈餘各有雙牙長三尺露於唇口外衣青赤衣又見八神俱衣赤眼眉並殷色共扼其神直逼軒下蓬首目赤大鼻方口牙齒俱出手甲如鳥兩足皆有長毛衣若豹鞹其家人謂兆曰此正女常見者兆令前曰爾本虛空而畫之所作耳奈何有此妖形其神應曰形本是畫畫以象真真之所示即乃有神況所畫之上精靈有憑可通此臣所以有感感之幻化臣實有罪兆大怒命侍童取罐瓶受水淋之盡而惡神之色不衰兆更怒命煎湯以淋須臾神化如一空囊然後令擲去空野其女於座即愈而父載歸鄴復於黃花寺尋所畫之處如水之洗因而駭歎稱異僧雲敬見而問曰汝此來見畫歎稱必有異耶可言之其人曰我女患疾為神所擾今元先生稱是此寺畫作妖乃指畫處所洗之神僧大驚曰汝亦異人也此寺前月中一日晝晦忽有惡風玄雲聲如雷震繞寺良久聞畫處如擒捉之聲有一人云勢力不加元大行不如速去言訖風埃乃散寺中朗然晚見此處一神如洗究汝所說正符其事兆即寇謙之師也出林登博物志
