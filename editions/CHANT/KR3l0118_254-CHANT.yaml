body:
  text: 趙神德趙神德唐初梁寶好嘲戲曾因公行至貝州憩客館中閑問貝州佐史云此州有趙神德甚能嘲即令召之寶顏甚黑廳上憑案以待須臾神德入兩眼俱赤至階前梁寶即云趙神德天上既無雲閃電何以無准則答曰向者入門來案後唯見一挺墨寶又云官裏料朱砂半眼供一國又答云磨公小拇指塗得太社北寶更無以對媿謝遺之出啟顏錄賈嘉隱唐賈嘉隱年七歲以神童召見長孫無忌徐世勣於朝堂立語徐戲之曰吾所倚者何樹曰松樹徐曰此槐也何得言松嘉隱曰以公配木何得非松邪長孫復問之吾所倚何樹曰槐樹長孫曰汝不復矯邪嘉隱曰何煩矯對但取其鬼對木耳年十一二貞觀年被舉雖有俊辯儀容醜陋嘗在朝堂取進止朝堂官退朝並出俱來就看餘人未語英國公李勣先即諸宰貴云此小兒恰似獠面何得聰明諸人未報賈嘉隱即應聲答之曰胡頭尚為宰相獠面何廢聰明舉朝人皆大笑出國史纂異明鈔本作出嘉話錄歐陽詢唐宋國公蕭瑀不解射九月九日賜射瑀箭俱不著垛一無所獲歐陽詢詠之曰急風吹緩箭弱手馭彊弓欲高翻復下應西還更東十迴俱著地兩手並擎空借問誰為此乃應是宋公出啟顏錄高士廉唐高士廉掌選其人齒高有選人自云解嘲謔士廉時著木履令嘲之應聲云刺鼻何曾嚏踏面不知嗔高生兩箇齒自謂得勝人士廉笑而引之出朝野僉載裴略唐初裴略宿衛考滿兵部試判為錯一字落第此人即向僕射溫彥博處披訴彥博當時共杜如晦坐不理其訴此人即云少小以來自許明辯至於通傳言語堪作通事舍人並解作文章兼能嘲戲彥博始迴意共語時廳前有竹彥博即令嘲竹此人應聲嘲曰竹風吹青肅肅凌冬葉不凋經春子不熟虛心未能待國士皮上何須生節目彥博大喜即云既解通傳言語可傳語與廳前屏牆此人走至屏牆大聲語曰方今聖上聰明闢四門以待士君是何物久在此妨賢路即推倒彥博云此意著博此人云非但著膊亦乃著肚當為杜如晦在坐有此言彥博如晦俱大歡笑即令送吏部與官出啟顏錄劉行敏唐有人姓崔飲酒歸犯夜被武侯執縛五更初猶未解長安令劉行敏鼓聲動向朝至街首逢之始與解縛因詠之曰崔生犯夜行武侯正嚴更幞頭拳下落高髻掌中擎擎字原空闕據明鈔本補杖迹胸前出繩文腕後生愁人不惜夜隨意曉參橫武陵公楊文瓘任戶部侍郎以能飲令宴蕃客渾王遂錯與延陀兒宴行敏詠曰武陵敬愛客終宴不知疲遣共渾王飲錯宴延陀兒始被鴻臚識終蒙御史知精神既如此長歎傷何為李叔慎賀蘭僧伽面甚黑杜善賢為長安令亦黑行敏詠之曰叔慎騎烏馬僧伽把漆弓喚取長安令共獵北山熊出啟顏錄竇昉唐許子儒舊任奉禮郎永徽中造國子學子儒經祀當設有階級後不得階竇昉詠之曰不能專習禮虛心彊覓階一年辭爵弁半歲履麻鞋瓦惡頻蒙虢音國牆虛屢被杈音初皆反映樹便側睡過匱即放乖歲暮良功畢言是越朋儕今日綸言降方知愚計喎音口懷反出啟顏錄狄仁傑唐狄仁傑倜儻不羇嘗授司農員外郎每判事多為正充卿同異仁傑不平之乃判曰員外郎有同側室正員卿位擅嫡妻此難曲事女君終是不蒙顏色正員頗亦慚悚時王及善豆盧欽望拜左右相仁傑以才望時議歸之頗冀此命每戲王豆盧略無屈色王豆盧俱善長行既拜謂時宰曰某無材行濫有此授狄謂曰公二人並能長行何謂無材行或曰左相事云適已白右相狄謂曰不審喚為右相合呼為有相王豆盧問故狄曰公不聞聰明兒不如有相子公二人可謂有相子也二公強笑意亦悒悒出御史臺記楊茂直唐楊茂直任拾遺有補闕姓王精九經不練時事每自言明三教時有僧名道儒妖訛則天捕逐甚急所在題云訪僧道儒茂直與薛兼金戲謂曰敕捕僧道儒足下何以安閒云何關吾事茂直曰足下明三教僧則佛教道則老教何不關吾事乃驚懼興寢不安遂不敢歸寓於曹局數宿祈左右偵偵原作慎據明抄本改其事意復共誑之憂懼不已遇人但云實不明三教事茂直等方寬慰云別訪人非三教也乃敢出出御史臺記左右臺御史唐孝和朝左右臺御史有遷南省仍內供奉者三墨敕授者五臺譏之為五墨三仍左臺呼右臺為高麗僧言隨隨原作隋據明鈔本改漢僧赴齋不咒願歎唄但飲食受嚫而已譏其掌外臺在京輦無所彈劾而俸祿同也自右臺授左臺號為出蕃自左臺授右臺號為沒蕃每相遇必相嘲謔不已也出御史臺記杜文範唐杜文範襄陽人也自長安尉應舉擢第拜監察御史選殿中授刑部員外以承務郎特授西臺舍人先時與高上智俱任殿中為侍御史張由古宋之順所排蹙與上智遷員外既五旬由古之順方入省文範眾中謂之曰張宋二侍御俱是俊才由古問之答曰若非俊才那得五十日騎土牛趁及殿中舉眾歡笑出御史臺記御史裏行武后初稱周恐下心未安乃令人自舉供奉官正員外多置裏行有御史臺令史將入臺值裏行御史數人聚立門內令史不下驢衝過諸御史大怒將杖之令史云今日之過實在此驢乞先數之然後受罰許之謂驢曰汝技藝可知精神機鈍何物驢畜敢於御史裏行於是御史羞慚而止出國朝雜記張元一周則天朝蕃人上封事多加官賞有為右臺御史者因則天嘗問郎中張元一曰在外有何可笑事元一曰朱前疑著綠狄仁傑著朱閻知微騎馬馬吉甫騎驢將名作姓李千里將姓作名吳栖梧左臺胡御史右臺御史胡胡御史胡元禮也御史胡蕃人為御史者尋改他官周革命舉人貝州趙廓眇小起家監察御史時人謂之臺穢李昭德詈之為中霜穀束元一目為梟坐鷹架時同州魯孔丘為拾遺有武夫氣時人謂之外軍主帥元一目為鶖入鳳池蘇味道才學識度物望攸歸王方慶體質鄙陋言詞魯鈍智不逾俗才不出凡俱為鳳閣侍郎或問元一曰蘇王孰賢答曰蘇九月得霜鷹王十月被凍蠅或問其故答曰得霜鷹俊捷被凍蠅頑怯時人伏能體物也契丹賊孫萬榮之寇幽河內王武懿宗為元帥引兵至趙州聞賊駱務整從北數千騎來王乃棄兵甲南走荊明鈔本荊作邢州軍資器械遺於道路聞賊已退方更向前軍迴至都置酒高會元一於御前嘲懿宗曰長弓短度箭蜀馬臨階騙去賊七百里隈牆獨自戰甲杖㧾拋卻騎豬正南掾明鈔本掾作猭上曰懿宗有馬何因騎豬對曰騎豬夾夾原作來據明鈔本改豕走也上大笑懿宗曰元一宿構不是卒詞上曰爾付韻與之懿宗曰請以菶韻元一應聲曰裏頭極草草掠鬢不菶菶未見桃花面皮漫作杏子眼孔則天大悅王極有慚色懿宗形貌短醜故曰長弓短度箭周靜樂縣主河內王懿宗妹懿妹短醜武氏最長時號大哥縣主與則天並馬行命元一詠曰馬帶桃花錦裙銜綠草羅定知幃帽底儀容似大哥則天大笑縣主極慚納言婁師德長大而黑一足蹇元一目為行轍方相亦號為衛靈公言防靈柩方相也天官侍郎吉頊長大好昂頭行視高而望遠目為望柳駱駝殿中侍御史元本竦髆傴身黑而且瘦目為嶺南考典駕部郎中朱前疑粗黑肥短身體垢膩目為光祿掌膳東方虬身長衫短骨面粗眉目為外軍校尉唐波若矮短目為鬱屈蜀馬目李昭德卒子銳反歲胡孫修文學士馬吉甫眇一目為端箭師郎中長儒子視望陽目為呷醋漢汜水令蘇徵舉止輕薄目為失孔老鼠出朝野僉載吉頊周張元一腹粗而腳短項縮而眼跌吉頊目為逆流蝦蟆出朝野簽載朱隨侯周韶州曲江令朱隨侯女夫李逖遊客爾朱九並姿相少媚廣州人號為三樵七肖反人歌之曰奉敕追三樵隨侯傍道走迴頭語李郎喚取爾朱九張鷟目隨侯臛亂土梟出朝野僉載李詳周李詳河內人氣俠剛勁初為梓州監示尉主書考日刺史問平已否詳獨曰不平刺史曰不平君把筆書考詳曰請考使君即下筆曰祛斷大事好勾小稽自隱不清疑人總濁考中下刺史默然而罷出朝野僉載
