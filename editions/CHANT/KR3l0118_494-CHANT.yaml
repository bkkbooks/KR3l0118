body:
  text: 房光庭房光庭房光庭為尚書郎故人薛昭流放而投光庭光庭匿之既敗御史陸遺逸逼之急光庭懼乃見時宰時宰曰公郎官何為匿此人曰光庭與薛昭有舊以途窮而歸光庭且所犯非大故得不納之耶若擒以送宮居廟堂者复何以待光庭時宰義之乃出為慈州刺史無他累光庭嘗送親故之葬出鼎門際晚且饑會鬻糕餅者與同行數人食之素不持錢無以酬值鬻者逼之光庭命就我取直鬻者不從光庭曰與你官銜我右台御史也可隨取值時人賞其放逸崔思兢則天朝或告其再從兄宣謀反付御史張行岌按之告者先誘藏宣家妾而云妾將發其謀宣乃殺之投尸于洛水行岌按略無狀則天怒令重按行岌奏如初則天曰崔宣反狀分明汝寬縱之我令俊臣勘汝母悔行岌曰臣推事不若俊臣陛下委臣須實狀若順旨妄族人豈法官所守臣必以為陛下試臣爾則天厲色曰崔宣若實曾殺妾反狀自然明矣不獲妾如何自雪行岌懼逼宣家令訪妾思兢乃于中橋南北多置錢帛募匿妾者數日略無所聞而其家每竊議事則告者輒知之思兢揣家中有同謀者乃佯謂宣妻曰須絹三百匹顧刺客殺告者而侵晨伏于台前宣家有館客姓舒婺州人言行無缺為宣家服役宣委之同于子弟須臾見其人至台賂閽人以通于告者告者遂稱云崔家顧人刺我請以聞台中惊憂思兢素重館客不知疑密隨之到天津橋料其無由至台乃罵之曰無賴險獠崔家破家必引汝同謀何路自雪汝幸能出崔家妾我遺汝五百縑歸鄉足成百年之業不然則亦殺汝必矣其人悔謝乃引思兢于告者之家搜獲其妾宣乃得免崔湜唐崔湜弱冠進士登科不十年掌貢舉遷兵部父揖亦嘗為禮部至是父子累日同省為侍郎后三登宰輔年始三十六崔之初執政也方二十七容止端雅文詞清麗嘗暮出端門下天津橋馬上自吟春游上林苑花滿洛陽城張說時為工部侍郎望之杳然而歎曰此句可效此位可得其年不可及也呂太一呂太一為戶部員外郎戶部與吏部鄰司時吏部移牒令戶部于牆宇自豎棘以備銓院之交通太一答曰眷彼吏部銓總之司當須簡要清通何必豎篱種棘省中賞其清俊許誡言許誡言為瑯邪太守有囚縊死獄中乃執去年修獄典鞭之修獄典曰小人主修獄耳如牆垣不固狴牢破坏賊自中出猶以修治日月久可矜免況囚自縊而終修獄典何罪誡言猶怒曰汝胥吏舉動自合笞又何訴杜丰齊州歷城縣令杜丰開元十五年東封泰山丰供頓乃造棺器三十枚置行宮諸官以為不可丰曰車駕今過六宮偕行忽暴死者求棺如何可得若事不預備其悔可追乎及置頓使入行宮見棺木陳于幕下光彩赫然惊而出謂刺史曰聖主封岳祈福祚延長此棺器者誰之所造且將何施何不祥之甚將奏聞刺史令求丰丰逃于妻臥床下詐稱賜死其家哭之賴妻兄張摶為御史解之乃得已丰子鐘時為兗州參軍都督令掌廄馬芻豆鐘曰御馬至多臨日煮粟恐不可給不如先辦乃以鑊煮粟豆二千余石納于窖中乘其熱封之及供頓取之皆臭敗矣乃走猶懼不免命從者市半夏半升和羊肉煮而食之取死藥竟不能為患而愈肥時人云非此父不生此子修武縣民開元二十九年二月修武縣人嫁女婿家迎婦車隨之女之父懼村人之障車也借俊馬令乘之女之弟乘驢從在車后百步外行忽有二人出于草中一人牽馬一人自后驅之走其弟追之不及遂白其父父與親眷尋之一夕不能得去女家一舍村中有小學時夜學生徒多宿凌晨啟門門外有婦人裸形斷舌陰中血皆淋漓生問之女啟齒流血不能言生告其師師出戶觀之集諸生謂曰吾聞夫子曰木石之怪夔魍魎水之怪龍罔象土之怪墳羊吾此居近太行怪物所生也將非山精野魅乎盍擊之于是投以磚石女既斷舌不能言諸生擊之竟死及明乃非魅也俄而女家尋求至而見之乃執儒及弟子詣縣縣丞盧峰訊之實殺焉乃白于郡笞儒生及弟子死者三人而劫竟不得李元皛李元皛為沂州刺史怒司功卻承明命剝之屏外承明狡猾者也既出屏適會博士劉琮璡后至將入衙承明以琮璡儒者則前執而剝之紿曰太守怒汝衙遲使我領人取汝令便剝將來琮璡以為然遂解衣承明目吏卒擒琮璡以入承明乃逃元皛見剝至不知是琮璡也遂杖之數十焉琮璡起謝曰蒙恩賜杖請示罪名元皛曰為承明所賣竟無言遂入戶王琚玄宗在藩邸時每游戲于城南韋杜之間嘗因逐狡免意樂忘返與其徒十數人饑倦甚因休息村中大樹之下適有書生延帝過其家其家甚貧止村妻一驢而已帝坐未久書生殺驢煮秫備膳饌酒肉滂沛帝顧而甚奇之及與語磊落不凡問其姓乃王琚也自是帝每游韋杜間必過琚家琚所語議合帝意帝日益親善及韋氏專制帝憂甚獨密言于琚琚曰亂則殺之又何親也帝遂納琚之謀戡定內難累拜琚為中書侍郎實預配饗焉李適之李適之入仕不歷丞簿便為別駕不歷兩畿官便為京兆尹不歷御史及中丞便為大夫不歷兩省給舍便為宰相不歷刺史便為節度使白履忠白履忠博涉文史隱居梁城王志愔楊瑒皆荐之尋請還鄉授朝散大夫鄉人謂履忠曰吾子家貧竟不沾一斗米一匹帛雖得五品止是空名何益于實也履忠欣然曰往歲契丹入寇家家盡署排門夫履忠特以讀少書籍縣司放免至今惶愧雖不得祿賜且是五品家終身高臥免有徭役不易得之也夜明帘姚崇為相嘗對于便殿舉左足不甚輕利上曰卿有足疾耶崇曰臣有心腹疾非足疾也因前奏張說罪狀數百言上怒曰卿歸中書宜宣與御史中丞共按其事而說未之知會吏報午后三刻說乘馬先歸崇急呼御史中丞李林甫以前詔付之林甫謂崇曰說多智是必困之宜以劇地崇曰丞相得罪未宜太逼林甫又曰公必不忍即說當無害林甫止將詔付于小御史中路以馬墜告說未遭崇奏前旬月家有教授書生通于說侍兒最寵者會擒得奸狀以聞于說說怒甚將窮獄于京兆書生厲聲言曰睹色不能禁亦人之常情緩急有用人乎公何靳于一婢女耶說奇其言而釋之兼以侍兒與歸書生一去數月余無所聞知忽一曰直訪于說憂色滿面言曰某感公之恩思有以報者久矣今聞公為姚相國所构外獄將具公不知之危將至矣某愿得公平生所寶者用計于九公主可能立釋之說因自歷指己所寶者書生皆云未足解公之難又凝思久之忽曰近者有雞林郡以夜明帘為寄者書生曰吾事濟矣因請說手札數行懇以情言遂急趨出逮夜始及九公主第書生具以說事言兼用夜明帘為贄且謂主曰上獨不念在東宮時思必始終恩加于張丞相乎而今反用讒耶明早公主上謁具為奏之上感動因急命高力士就御史台宣前所按事并宜罷之書生亦不复再見矣班景倩開元中朝廷選用群官必推精當文物既盛英賢出入皆薄具外任雖雄藩大府由中朝冗員而授時以為左遷班景倩自揚州采訪使入為太理少卿路由大梁倪若水為郡守西郊盛設祖席宴罷景倩登舟若水望其行塵謂掾吏曰班公是行何異登仙乎為之騶殿良所甘心默然良久方整回駕既而為詩投相府以道其誠其詞為當時所稱賞薛令之神龍二年閩長溪人薛令之登第開元中為東宮侍讀時宮僚閒淡以詩自悼書于壁曰朝日上團團照見先生盤盤中何所有苜蓿上闌干飯澀匙難綰羹稀箸多寬只可謀朝夕何由度歲寒上因幸東宮見焉索筆續之曰啄木嘴距長鳳凰毛羽短若嫌松桂寒任逐桑榆暖令之因此引疾東歸肅宗即位詔征之已卒
