body:
  text: 謝自然謝自然謝自然者其先兗州人父寰居果州南充舉孝廉鄉里器重建中初刺史李端以試秘書省校書表為從事母胥氏亦邑中右族自然性頴異不食葷血年七歲母令隨尼越惠經年以疾歸又令隨尼日朗十月求還常所言多道家事詞氣高異其家在大方山下頂有古像老君自然因拜禮不願卻下母從之乃徙居山頂自此常誦道德經黃庭內篇年十四其年九月因食新稻米飯云盡是蛆蟲自此絕粒數取皂莢煎湯服之即吐痢困劇腹中諸蟲悉出體輕目明其蟲大小赤白狀類頗多自此猶食柏葉日進一枝七年之後柏亦不食九年之外仍不飲水貞元三年三月於開元觀詣絕粒道士程太虛受五千文紫靈寶籙六年四月刺史韓佾至郡疑其妄延入州北堂東閣閉之累月方率長幼開鑰出之膚體宛然聲氣朗暢佾即使女自明師事焉先是父寰旅旅原作旋據明鈔本改遊多年及歸見自然修道不食以為妖妄曰我家世儒風五常之外非先王之法何得有此妖惑因鎖閉堂中四十餘日益加爽秀寰方驚駭焉七年九月韓佾轝於大方山置壇請程太虛具三洞籙十一月徙自然居於州郭貞元九年刺史李堅至自然告云居城郭非便願依泉石堅即築室于金泉山移自然居之山有石嵌竇水灌其口中可澡飾形神揮斥氛澤自然初駐山有一人年可四十自稱頭陀衣服形貌不類緇流云速訪真人合門皆拒之云此無真人頭陀但笑耳舉家拜之獨不受自然拜施錢二百竟亦不受乃施手巾一條受之云後會日當以此相示須臾出門不知何在久之當午有一大蛇圍三尺長丈餘有兩小白角以頭枕房門吐氣滿室斯須雲霧四合及霧散蛇亦不見自然所居室唯容一床四邊纔通人行白蛇去後常有十餘小蛇或大如臂或大於股旦夕在床左右或黑或白或吐氣或有聲各各盤結不相毒螫又有兩虎出入必從人至則隱伏不見家犬吠虎凡八年自遷居郭中犬留方山山原作出據明鈔本改上昇之後犬不知所在自然之室父母亦不敢同坐其床或輒詣其中必有變異自是呼為仙女之室常晝夜獨居深山窮谷無所畏怖亦云誤踏蛇背其冷如冰虎在前後異常腥臭兼言常有天使八人侍側二童子青衣戴冠八使衣黃又二天神衛其門屏如今壁畫諸神手執鎗鉅每行止則諸使及神驅斥侍衛又云某山神姓陳名壽魏晉時人並說真人位高仙人位卑言己將授東極真人之任貞元十年三月三日移入金泉道場其日雲物明媚異於常景自然云此日天真群仙皆會金泉林中長有鹿未嘗避人士女雖眾亦馴擾明日上仙送白鞍一具縷以寶鈿上仙曰以此遺之其地可安居也五月八日金母元君命盧使降之從午止亥六月二十日聞使從午至戌七月一日崔張二使從寅至午多說神仙官府之事言上界好弈棊多音樂語笑率論至道玄妙之理又云此山千百蛇蟲悉驅向西矣盡以龍鎮其山道場中常有二虎五麒麟兩青鸞或前或後或飛或鳴麟如馬形五色有角紫麟騣尾白者常在前舉尾苕帚帚字原闕據明鈔本補七月十一日上仙杜使降石壇上以符一道丸如藥丸使自然服之十五日可焚香五爐於壇上五爐於室中至時真人每來十五日五更有青衣七人內一人稱中華云食時上真至良久盧使至云金母來須臾金母降於庭自然拜禮母曰別汝兩劫矣自將几案陳設珍奇溢目命自然坐初盧使侍立久亦令坐盧云暫詣紫極宮看中元道場官吏士庶咸在逡巡盧使來云此一時全勝以前齋問其故云此度不燒乳頭香乳頭香天真惡之唯可燒和香耳七日崔張二使至問自然能就長林居否答云不能二使色似不悅二十二日午前金母復降云為不肯居長林被貶一階長林仙宮也戌時金母去崔使方云上界最尊金母賜藥一器色黃白味甘自然餌不盡卻將去又將衣一副朱碧綠色相間外素內有文其衣縹緲執之不著手且卻將去已後即取汝來又將桃一枝大於臂上有三十桃碧色大如椀云此猶是小者是日金母乘鸞侍者悉乘龍及鶴五色雲霧浮泛其下金母云便向州中過群仙後去望之皆在雲中其日州中馬坊廚戟門皆報云長虹入州翌日李堅問於自然方驗之紫極宮亦報虹入遠近共見八月九日十日十一日群仙日來傳金母勑速令披髮四十日金母當自來所降使或言姓崔名某某字原闕據黃本補將一板闊二尺長五尺其上有九色每群仙欲至墻壁間悉熒煌似鏡群仙亦各自有几案隨從自然每披髮則黃雲繚繞其身又有七人黃衣戴冠侍於左右自八月十九日已後日誦黃庭經十徧誦時有二童子侍立丹一遍即抄錄至十遍童子一人便將向上界去九月一日群仙又至將桃一枝大如斗半赤半黃半紅云云原作雲據明鈔本改鄉里甚足此果割一臠食余則侍者卻收九月五日金母又至持三道符令吞之不令著水服之覺身心殊勝金母云更一來則不來矣又指旁側一仙云此即汝同類也十五日平明一仙使至不言姓名將三道符傳金母勑盡令服之又將桃六臠令食食三臠又將去其使至暮方還十月十一日入靜室之際有仙人來召即乘麒麟昇天將天衣來迎自然所著衣留在繩床上卻回著舊衣置天衣於鶴背將去云去時乘麟回時乘鶴也十九日盧仙使來自辰至未方去每天使降時鸞鶴千萬眾仙畢集位高者乘鸞次乘麒麟次乘龍鸞鶴每翅各大丈餘近有大鳥下長安鸞之大小幾欲相類但毛彩異耳言下長安者名曰天雀亦曰神雀每降則國家當有大福二十五日滿身毛髮孔中出血沾漬衣裳皆作通帔山水橫紋就溪洗濁轉更分明向日看似金色手觸之如金聲二十六日二十七日東嶽夫人併來勸令沐浴兼用香湯不得令有乳頭香又云天上自有神非鬼神之神上界無削髮之人若得道後悉皆戴冠功德則一凡齋食切忌嘗之尤宜潔淨器皿亦爾上天諸神每齋即降而視之深惡不精潔不唯無福亦當獲罪李堅常與夫人于几上誦經先讀外篇次讀內篇內即魏夫人傳中本也大都精思講讀者得福麤行者招罪立驗自然絕粒凡一十三年晝夜寐兩膝上忽有印形小於人間官印四壖若有古篆六字粲如白玉今年正月其印移在兩膝內並膝則兩印相合分毫無差又有神力日行二千里或至千里人莫知之冥夜深室纖微無不洞鑒又不衣綿纊寒不近火暑不搖扇人問吉凶善惡無不知者性嚴重深密事不出口雖父母亦不得知以李堅崇尚至道稍稍言及云天上亦欲遣世間奉道人和之俾其尊明道教又言凡禮尊像四拜為重三拜為輕又居金泉道場每靜坐則群鹿必至又云凡人能清靜一室焚香諷黃庭道德經或一徧或七徧全勝布施修齋凡誦經在精心不在徧數多事之人中路而退所損尤多不如元不會者慎之慎之人命至重多殺人則損年夭壽來往之報永無休止矣又每行常聞天樂皆先唱步虛詞多止三首第一篇第五篇第八篇步虛訖即奏樂先撫雲璈雲璈形圓似鏡有絃凡傳道法必須至信之人魏夫人傳中切約不許傳教但令秘密亦恐乖於折中夫藥力只可益壽若昇天駕景全在修道服藥修道事頗不同服柏便可絕粒若山谷難求側柏只尋常柏葉但不近丘墓便可服之石上者尤好曝乾者難將息旋採旋食尚有津潤易清益人大都柏葉茯苓枸𣏌胡麻俱能常年久視可試驗修道要山林靜居不宜俯近村柵若城郭不可以其葷腥靈仙不降與道背矣煉藥飲水宜用泉水尤惡井水仍須遠家及血屬慮有恩情忽起即非修持之行凡食米體重食麥體輕辟穀入山須依眾方除三蟲伏尸凡服氣先調氣次閉氣出入不由口鼻令滿身自由則生死不能侵矣是年九月霖雨甚自然自金泉往南山省程君凌晨到山衣履不濕詰之云旦離金泉耳程君甚異之十一月九日詣州與李堅別云中旬的去矣亦不更入靜室二十日辰時於金泉道場白日昇天士女數千人咸共瞻仰祖母周氏母胥氏妹自柔弟子李生聞其訣別之語曰勤修至道須臾五色雲遮亘一川天樂異香散漫彌久所著衣冠簪帔一十事脫留小繩床上結繫如舊刺史李堅表聞詔褒美之李堅述金泉道場碑立本末為傳云天上有白玉堂老君居之殿壁上高列真仙之名如人間壁記時有朱書注其下云降世為帝王或為宰輔者又自然當昇天時有堂內東壁上書記五十二字云寄語主人及諸眷屬但當全身莫生悲苦自可勤修功德併諸善心修立福田清齋念道百劫之後冀有善緣早會清原之鄉即與相見其書迹存焉出集仙錄盧眉娘唐永真年南海貢奇女盧眉娘年十四歲眉娘生眉如綫且長故有是名本北祖帝師之裔自大定定字明鈔本作足中流落嶺表後漢盧景裕景祚景宣景融兄弟四人皆為皇王之師因號帝師眉娘幼而惠悟工巧無比能于一尺絹上繡法華經七卷字之大小不逾粟粒而點畫分明細如毛髮其品題章句無不具矣更善作飛仙蓋以絲一鉤分為三段染成五色結為金蓋五重其中有十洲三島天人玉女臺殿麟鳳之像而執幢捧節童子亦不啻千數其蓋闊一丈秤無三兩煎靈香膏傳之則堅硬不斷唐順宗皇帝嘉其工謂之神姑因令止于宮中每日止飲酒二三合至元和中憲宗嘉其聰惠而又奇巧遂賜金鳳環以束其腕眉娘不願在禁中遂度為道士放歸南海仍賜號曰逍遙及後神遷香氣滿堂弟子將葬舉棺覺輕即徹其蓋帷見之舊履而已後人見往往乘紫雲遊於海上羅浮處士李象先作羅逍遙傳而象先之名無聞故不為時人傳焉出杜陽雜編
