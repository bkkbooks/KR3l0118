body:
  text: 姚岩傑姚岩傑梁公元崇之裔孫也童丱聰悟絕倫弱冠博通墳典慕班固司馬遷之為人時稱大儒常以詩酒放游江左尤肆淩忽先達旁若無人唐乾符中顏摽典鄱陽郡鞠場公宇初搆請岩傑紀其事文成粲然千餘言摽欲刪去二字岩傑不從摽怒時已刊石命碎其碑岩傑以篇紀之曰為報顏公識我麼我心唯秪與天那眼前俗物關情大醉後青山入意多馮子每嫌彈鋏恨甯生休唱飯牛歌聖朝若為蒼生計合有公車到薜蘿盧肇牧歙州岩傑在婺源先以著述寄肇肇知其使酒以手書褒美贈以布帛辭云兵火之後郡中凋敝無以奉迎大賢岩傑複以長箋激之肇不得已迓至郡齋禮岩公卿而姚傲睨自如肇以篇詠誇于岩傑曰明月照巴天岩傑笑曰明月照一天奈何獨言巴天耶肇慚甚無何會于江亭時蒯希逸在席盧請目前取事為酒令尾有樂器之名肇令曰遠望漁舟不闊尺八岩傑遂飲酒一罨凭欄嘔噦須臾即席還令曰凭欄一吐已覺空喉其侮慢倨傲如此朝士使朔方跳索百戲俱呈使臣觀之如不見意其不足為歡笑別非胡騰使臣仰視拓拔又斜盻胡騰遂歛袵恭位視有若慚之貌逡巡舞罷趨而前謝曰已蒙相公排置宴筵百戲娛樂更不令煩賢郎歌舞頗再三辭謝蓋見拓拔中有與胡騰鼻相類乃呼作賢郎以此輕薄之薛保遜名家子恃才與地凡所評品士子以之升降時號為浮薄相國夏侯孜尤惡之其堂弟因名保厚以異之由是不睦內子盧氏與其良人保遜操尚略同季父薛監來省盧氏出參俟其去後命水滌門閾薛監知而甚怒經宰相䟽之保遜因論授澧州司馬凡七年不代夏侯公出鎮魏謨相登庸方有徵拜而殞於郡愚曾睹恭文數幅其一云餞交親於灞上止逆旅氏見數物象人語之口輒動皆云江淮嶺表州縣官也嗚呼天子生民為此輩笞撻又觀優云緋胡推宰莽轉而出眾人皆笑唯保遜不會其輕物率皆此類也盧虔灌罷夔州以其近親徑至澧州慰省還至郵亭回望而哭曰豈意薛保遜一旦接軍事李判官打楊柳枝乎薛昭緯唐薛昭緯即保遜之子也恃才傲物有父風每入朝省弄笏而行旁若無人又好唱浣沙溪詞知舉後有一門生辭歸鄉里臨歧獻規曰侍郎重德某既受恩爾後不弄笏唱浣沙溪詞某幸甚也時人謂之至言有一吏嘗學其行步揖遜薛知之乃召謂曰試於庭前學得似即恕汝罪於是下簾擁姬妾而觀小吏安詳傲然舉動酷似笑而捨之路侍中在蜀嘗夏日納涼于毬場廳中使院小吏羅九皋裹巾步履有似裴條侍中遙見促召逼視方知其非因笞之又薛昭緯使於梁國諭以傳禪梁祖令客將約回乃謂謁者曰大君有命無容却回速轡前邁既至夷門梁祖不獲已而出迎接見其標韻詞辨方始改觀自是宴接莫不款曲一日梁祖話及鷹鷂薛盛言鷙鳥之俊梁祖欣然謂其亦曾放弄歸館後以鷂子為贈薛致書感謝仍對來人戒僮僕曰令公所賜直須愛惜可以紙裹安韝袋中聞者笑之劇燕蒲坂人也工為雅正詩時王重榮鎮河中祗向國門至拜三公十四字原空闕重榮甚禮重之為人多縱陵轢諸從事竟為正平之禍韋薛輕高氏江陵高季昌唐末為荊南留後時宰相韋說鄭玨舅甥姻婭也朱梁太祖時皆得制方面高氏以貴公子任行軍司馬筵字原空闕酒饌款待數公日常宴聚求取無恒皆優待之後莊宗過河奄有中原天下震懼高王單騎入覲韋鄭二公繼登台席中朝士族子弟多不達時變復存舊態薛澤除補闕韋荊除春秋博士皆賜緋咸有德色匆匆辦裝即俟歸朝視行軍蔑如也李載仁韋說之甥除秘書郎劉詵鄭玨之妹夫也除毛詩博士賜緋爾後韋屢督李入京高氏欲津置之載仁遷延自以先德遺戒不欲依舅氏但不能顯言竟不離高氏門館劉詵無他才望性嗜酒口受新命殊無行意日于高氏情敬不衰然則美醞肥羜之所引也無何以疾終高氏贍給孤遺頗亦周至未間洛下有變明宗入統南方強侯人要姑息韋鄭二相皆罷去韋薛尚跧荊楚明年保最嗣襲辟李為掌記他日錄其長息為子壻第三子皆奏官一門朱紫韡如也劉詵三子迭加任遇三孫女適高氏子弟向三十年享其祿食亦足稱也韋荊寂寞而卒薛澤攝宰而終豈自掇乎亦命也夫胡翽有胡翽者佐幕大藩有文學稱善草軍書動皆中意時大駕西幸中原宿兵岐秦二藩最為巨屏其飛書走檄交騁諸夏莫不伏其筆舌也時大帥年幼生殺之柄斷在貳軍張筠其宣辭假荊州任在張同張同為察巡翽常少其帥蔑視同輩不為禮帥因藉其才不甚加責但令諭之而已其輕薄自如也常因公宴劌被酒呼張筠曰張十六張十六者筠第行也數以語言詆筠因帥故但銜之他日往荊州詣張同同僕不識問從者曰胡大夫翽至廳已脫衫矣同聞翽來欲厚之因命家人精意具饌同遽出迎見忽報曰大夫已去矣同復步至廳但見雙椅間遺不潔而去卒不留一辭同亦笑而銜之張無能加害時帥請翽聘于大樑翽門下客陳評事者從行筠密賂陳令伺其不法入梁果恣虛誕或以所見密聞梁王皆為陳疏記之洎歸帥知其狂率亦優容之陳於是受教搆成其惡具以乖僻草藁袖而白帥帥方被酒聞之大怒遂盡室擁出坑于平戎谷口更無噍類帥醒知之大驚痛惜者久之沉思移時曰殺汝者副使非我為之後草軍書不稱旨則泣而思之此過亦非在筠蓋翽自掇爾王仁裕嘗過平戎谷有詩弔之曰立馬荒郊滿目愁伊人何罪死林丘風號古木悲長在雨濕寒莎淚暗流莫道文章為眾嫉只應輕薄是身讎不緣魂寄孤山下此地堪名鸚鵡洲輕薄士流唐朝有輕薄士流出刺一郡郡人集其歌樂百戲以迓之至有吞刀吐刀吹竹按絲走圓跳索歌喉舞腰殊似不見州人曰我使君清峻無以悅之相顧憂戚忽一日盛夏登樓遽令命樂郡人喜曰使君非不好樂也及至樓下遂令色色引上其絃匏戛擊之類迭進皆叱去不用有吹笙者末後至喜曰我比只要此一色問此一物何名曰名笙可吹之樂工甚有德色方欲調弄數聲遽止之曰不要動指只一直吹之樂工亦稟之遂令臨檻長吹自午及申乃呼左右可賜與酒令退曰吾誰要曲調只藉爾喚風耳復一日入山召樂人比至怒目叱之曰只要長腳女人樂部忙然退出不知其所以遂遣六七婦人約束長腳鼓笛而入乃顧諸婦升大樹各持籠子令摘樹果其輩薄徒事如此者甚多張翱唐乾寧中宿州刺史陳璠以軍旅出身擅行威斷進士張翱恃才傲物席上調璠寵妓張小泰怒揖起付吏責其無禮狀云有張翱兮寓止淮陰來綺席兮放恣胸襟璠益怒云據此分析合吃幾下又云只此兩句合吃三下五下切求一笑宜費乎千金萬金竟鞭背而卒出劉山甫閒談詞多不載盧程盧程擢進士第為莊皇帝河東判官建國後命相無他才業唯以氏族傲物任圜常以公事入謁程烏紗隱几謂圜曰公是蟲豸輒來唐突圜慚愕驟告莊宗大怒俾殺之為盧質救解獲免自是出中書時人切齒焉江陵在唐世號衣冠藪澤人言琵琶多于飯甑措大多于鯽魚有邑宰盧生每于枝江縣差船入府舟子常苦之一旦王仙芝兵火盧生為船人挑其筋繫于船舷放流而死大凡無藝子弟率以門閥輕薄廣明之亂遭罹甚多咸自致也崔祕天成二年潘環以軍功授棣牧素無賓客或有人薦崔祕者博陵之士子也舉止閒雅詞翰亦工潘一見甚喜上館以待之經宿不復往潘訪之不獲既而辟一書生乃往後薦主見而詰之崔曰潘公雖勤厚鼻柱之左有瘡膿血常流每被熏灼腥穢難可堪目之為白死漢也薦主大咍崔之不顧名實而為輕薄也蓋潘常中流矢于面骨銜其鏃故負重傷醫療至經年其鏃自出其瘡成漏終身不痊王先主遭輕薄韋昭度招討陳敬瑄時據黃本補蜀帥顧彥暉為副王先主為都指揮使三府各署幕寮皆是朝達子弟視王先主蔑如也先主持從髡髮行黥面札腕如一部鬼神其輩與先主兢肅顧公詳緩一時失笑而散先主歸營左右以此為言亦自大笑他日克郪城輕薄幙寮皆害之蔣貽恭蔣貽恭者好嘲詠頻以此痛遭檟楚竟不能改蜀中士子好著襪頭袴蔣謂之曰仁賢既裹將仕郎頭何為作散子將腳也皆類此蔣生雖嗜嘲詠然談笑儒雅凡被譏刺皆輕薄之徒以此搢紳中惡之官至令佐而卒
