body:
  text: 安祿山安祿山玄宗命皇太子與安祿山相見安祿不拜因奏曰臣胡人不閒國法不知太子是何官玄宗曰是儲君朕萬歲後代朕君汝者安祿曰臣愚比者只知有陛下不知有太子左右令拜安祿乃拜玄宗嘉其志誠尤憐之出譚賓錄成敬奇成敬奇有俊才文章立而可就為大理正與姚崇有姻親崇嘗寢疾敬奇造宅省焉對崇涕泣懷中寘生雀數枚一一持出請崇手執而後放之祝云願令公速愈崇勉強從之敬奇既去崇惡其諛媚謂其子弟曰此淚從何而來自茲不復接遇出大唐新語陳少遊唐陳少遊檢校職方員外郎充迴紇使檢校官自少遊始也而少遊為理長于權變時推幹濟然厚斂財貨交結權右尋除管桂觀察使時中官董秀用事少遊乃宿于里候下直際獨謁之從容曰七郎家中人數幾何每日所費幾何秀曰久忝近職累重又屬時物騰貴一月須千餘貫少遊曰據此所費俸錢不能足其數此外常須求于人方可取濟倘有輸誠供應者但留心庇護之固易為力耳少遊雖不才請以一身獨備七郎之費用每歲願送錢五萬貫今見有大半請即收受餘到官續送免費心勞慮不亦可乎秀既踰于所望忻悅頗甚因與之相厚少遊言訖泣曰南方毒瘴深僻但恐不得生還再覩顏色透遽曰中丞美才不當遠官從容旬曰冀竭蹇分時少遊已納賄于元載子仲武矣秀載內外引薦數日拜宣歙觀察使改浙東觀察使遷淮南節度使十餘年間三總大藩徵求貨易且無虛日斂積財寶累巨萬億視文雅清流之士蔑如也初結元載每歲饋十萬貫後以載漸見忌少遊亦稍疏之及載子伯和貶官揚州少遊外與之深交而陰使人伺其過密以上聞代宗以為忠待之益厚關播嘗為少遊賓客盧𣏌早年與之同在僕固懷恩幙府故驟加其官德宗幸奉天後遂奪包佶財惣八百萬貫復使參謀溫述送款于李希烈曰濠舒廬等州已令罷壘韜戈捲甲佇候指揮後鑾輿歸京包佶入朝具奏財賦事狀少遊上表以所取財皆是供軍費用今請據數卻納乃重徵管內百姓以進後劉洽牧汴州得希烈起居注某月日陳少遊上表歸順少遊聞之慚愧而卒出譚賓錄裴延齡唐裴延齡累轉司農少卿尋以本官權判度支自揣不通食貨之物乃設鉤距召度支老吏與謀以求恩顧乃奏言天下出入錢物新陳相因而常不減六七千萬貫唯在一庫差殊散失莫可知之請于左藏庫中分置明鈔本置作貯別建欠負耗賸等庫及季庫月給納諸色錢物德宗從之但貴欲張名目以惑上聽其實錢物更無增加唯虛費簿書人吏又奏請令京兆府兩稅青苗錢市草百萬團送苑中宰臣議以為若市草百萬團則一方百姓自冬歷夏搬運不了又妨奪農務其事得止京西有汙池卑濕處蘆葦叢生焉不過數畝延齡忽奏云廄馬冬月合在槽櫪秣飼夏中即須有牧放處臣近尋訪得長安咸陽兩縣界有陂地百頃請以為內廄牧馬之地且去京城十數里德宗信之言于宰臣宰臣堅執云恐必無此及差官閱視悉皆虛妄延齡既慚且怒又因對德宗曰朕所居浴堂殿院一栿以年多故致損壞而未能換延齡曰宗廟事重殿栿事輕陛下自有本分錢物德宗驚曰本分錢何名也曰此是經義愚儒常才不足與言陛下正合問臣臣能知之准禮經云天下賦稅分為三分一分充乾豆一分充賓客一分充君之庖廚乾豆供宗廟也今陛下奉宗廟雖至嚴至豐至厚亦不能用一分財賦也只如鴻臚禮賓諸國番客至于迴紇馬價用一分錢物尚有贏羡甚多況陛下御善宮廚皆極簡儉所用外以賜百官充俸料餐錢等猶未能盡據此而言庖廚之用其數尚少皆陛下本分也用修十殿亦不合疑何況一栿上曰經義如此人未曾言頷之而已後因計料造神龍寺須用長七十尺松木延齡奏曰臣近于同州檢得一谷有數千株皆長七八十尺德宗曰人云開元天寶中近處求覔五六丈木尚未易得皆須于嵐勝州採造如今何為近處便有此木延齡對曰賢者珍寶異物皆處處有之但遇聖君即出今此木生自關輔蓋為聖君豈開元天寶合得有也延齡既銳情于苛刻剝下附上為功奏對之際皆恣騁詭怪虛妄他人莫敢言者延齡言之不疑亦人之所未嘗聞上頗欲知外事故特優遇之出譚賓錄薛盈珍姚南仲為鄭滑節度使時監軍薛盈珍估勢干奪軍政南仲不從數為盈珍搆讒于上上頗疑之後盈珍遣小使程務盈馳表奏南仲不法讒搆頗甚南仲裨將曹文洽時奏事赴京師竊知盈珍表中語文洽私懷怒遂晨夜兼道追務盈至長樂驛及之與同舍宿中夜殺務盈沉盈珍表于廁中乃自殺日旴驛吏開門見流血滿地旁得文洽二緘一緘告盈珍罪一緘表理南仲冤且陳謝殺務盈德宗聞其事頗駭動駭動原作駮異據明鈔本改南仲慮釁深遂入朝初至上曰盈珍擾卿甚也南仲曰盈珍不擾臣自隳陛下法耳如盈珍輩所在雖羊杜復生撫百姓御三軍必不成愷悌父母之政師律善陣之制矣德宗默然久之出譚賓錄畫鵰裴延齡恃恩輕躁同列懼之唯顧少連不避延齡嘗畫一鵰群鳥噪之以獻德宗知眾怒益信之出譚賓錄馮道明雍陶蜀人也以進士登第後稍薄于親黨其舅雲安劉敬之罷舉歸山岥素事篇章讓陶不寄書曰山近衡陽雖少鴈水連巴蜀豈無魚陶得詩愧赧方有孤首之思後為簡州牧自比謝宣城柳吳興也賓至則折挫之閽者亦怠投贄者稀得見忽有馮道明下第請謁云與員外故舊閽者以道明言啟之及引進陶呵曰與君昧平生何方方原作妨據明鈔本改相識道明曰誦員外詩仰員外德詩集中日得見何乃隔平生也遂吟曰立當青草人先見行近白蓮魚未知又曰江聲秋入寺雨氣夜侵樓又曰閉門客到常疑病滿院花開不似貧陶聞吟欣然待道明如曩昔之交君子以雍君矜持而好媚馮子匪藝而求知其兩違之出雲溪友議杜宣猷大夫自閩閩原作陶據玉泉子改中除宣城中官之力也諸道每歲進閹人所謂私白者閩為首焉且多任用以故大閹以下桑梓多係于閩時以為中官藪澤宣猷既至每寒食節輒散遣將吏荷挈食物祭于諸閹塚墓所謂灑掃者也故時號為敕使看墓出玉泉子李德裕李德裕鎮揚州監軍使楊欽義追入必為樞近而德裕致禮皆不越尋常欽義心銜之一日中堂設宴更無他賓而陳設寶器圖畫數床皆殊絕一席祗奉亦竭情禮宴罷皆以贈之欽義大喜過望旬日西行至汴州有詔卻令監淮南欽義即至具以前時所贈歸之德裕笑曰此無所直奈何拒焉悉卻與之欽義心感數倍後竟作樞密使唐武宗一朝之柄皆欽義所致也出幽閒鼓吹韓全誨唐昭宗以宦官怙權驕恣難制常有誅剪之意宰相崔胤嫉忌尤甚上敕胤凡有密奏當進囊封勿于便殿面奏以是宦官不能知韓全誨等乃訪京城美女數十以進密求宮中陰事天子不之悟胤謀漸洩中官以重賂甘言請藩臣為城社視崔胤眥眥原作皆據北夢瑣言改裂時時原作肘據明鈔本改因伏臘宴聚則相向流涕辭旨諂諛會汴人寇同華知崔胤之謀於是韓全誨引禁軍陳兵伏逼帝幸鳳翔他日崔胤與梁祖協謀以誅閹官未久禍亦及之致族絕滅識者歸罪于崔胤先是其季父安潛常謂所親曰滅吾族者必緇兒也緇兒即胤小字河東晉王李克用聞胤所為謂賓佐曰助助字原闕據北夢瑣言補賊為虐者其崔胤乎破國亡家必在此人也出北夢瑣言蘇循唐末尚書蘇循諂媚苟且梁太祖鄙之他日至并州謁晉王時張承業方以匡復為意而循忽獻晉王畫敕筆一對承業愈鄙薄之出唐書明鈔本作出北夢瑣言蘇楷昭宗先謚聖穆景文孝皇帝廟號昭宗起居郎蘇楷等駁議請改為恭靈莊閔皇帝廟號襄宗蘇楷者禮部尚書蘇循之子乾寧二年應進士楷人才寢陋兼無德行昭宗惡其濫進率先黜落由是怨望專幸邦國之災其父循奸邪附會無譽于時故希旨苟進梁祖識其險詖滋不悅大為敬翔李振所鄙梁祖建號詔曰蘇楷高貽休蕭聞禮皆人才寢陋不可塵污班行並停見任放歸田里蘇循可令致仕河朔士人目蘇楷為衣冠梟獍出北夢瑣言樂朋龜舊例士子不與內官交遊十軍軍容田令孜擅回天之力唐僖皇播遷行至洋源百官未集缺人掌誥樂朋龜侍郎亦及行在因謁中尉仍請中外由是薦之充翰林學士張濬相自處士除起居郎亦出令孜之門皆申中外之敬洎車駕到蜀朝士畢集一日中尉為宰相開筵學士洎張起居同預焉張公恥于對眾設拜乃先謁中尉使施謝酒之敬中尉訝之俄而賓至即席坐定中慰白諸官曰某與起居清濁異流曾蒙中外既慮玷辱何憚改更今日暗地謝酒即不可張公慚懼交集自此甚為群彥所薄樂公舉進士初陳啟事謁李昭待郎自媒云別于九經書史及老莊八八原作行據明鈔本改都賦外著八百卷書請垂比試誠有學問也然于制誥不甚簡當時人或未之可也出北夢瑣言孔謙後唐明宗即位之初誅租庸使孔謙歸德德原作得據明鈔本改軍節度使元行欽鄧州節度溫韜太子少保段疑汴州麴務辛廷蔚李繼宣等孔謙魏州孔目吏莊宗圖霸以供饋軍食謙有力焉既為租庸使曲事嬖倖奪宰相權專以取歛為意剝削萬端以犯眾怒伏誅元行欽為莊宗愛將出入宮禁曾無間隔害明宗之子從景以是伏誅段凝事梁以奸佞進身至節將末年綰軍權束手歸朝溫韜凶惡發掘西京陵寢莊宗中興不證其罪厚賂伶官閹人與段凝皆賜國姓或擁旄鉞明宗採眾議而誅之辛廷蔚開封尹王瓚之牙將也朱友貞時廷蔚依瓚勢曲法亂政汴人惡之李繼宣汴將孟審澄之子亡命歸莊宗劉皇后畜為子時宮掖之間穢聲流聞此四凶帝在藩邸時惡其為人故皆誅之莊宗皇帝為唐雪恥號為中興而溫韜毀發諸帝陵寢宜加大辟而賜國姓付節旄由是知中興之說謬矣出北夢瑣言
