body:
  text: 吳道玄吳道玄唐吳道玄字道子陽翟人也少孤貧天授之性年未弱冠窮丹青之妙浪跡東洛玄宗知其名召入供奉大略宗師張僧繇千變萬狀縱橫過之兩都寺觀圖畫牆壁四十明鈔本十作百餘間變像即同人相詭狀無一同者其見在為人所睹之妙者上都興唐寺御注金剛經院兼自題經文慈恩寺塔前面文殊普賢西面降魔盤龍等又小殿前門菩薩景公寺地獄帝釋龍神永壽寺中三門兩神皆妙絕當時朱景玄云有舊家人尹老八十餘嘗云見吳生畫中門內神圓光最在後一筆成當時坊市老幼日數百人競候觀之縛闌施錢帛與之齊及下筆之時望者如堵風落電轉規成月圓諠呼之聲驚動坊邑或謂之神也又景公寺老僧玄縱云吳生畫此地獄變成之後都人咸觀皆懼罪修善兩市屠沾魚肉不售又開元中駕幸東洛吳生與裴旻張旭相遇各陳所能裴劍舞一曲張書一壁吳畫一壁都邑人士一日之中獲睹三絕又畫玄元廟五聖千官宮殿冠冕勢傾雲龍心若造化故杜員外甫詩云妙絕動宮牆也又玄宗天寶中忽思蜀中嘉陵江山水遂假吳生驛遞令往寫貌及迴日帝問其狀奏云臣無粉本並記在心遣於大同殿圖之嘉陵江三百里山水一日而畢時有李將軍山水擅名亦畫大同殿壁數月方畢玄宗云李思訓數月之功吳道玄一日之跡皆極其妙也又畫殿內五龍鱗甲飛動每欲大雨即生煙霧吳生常持金剛經自此識本身當天寶中有楊庭光與之齊名潛畫吳生真於講席眾人之中引吳觀之亦見便驚語庭光云老夫衰醜何用圖之因斯歎伏其畫人物佛像鬼神禽獸山水臺殿草木皆神妙也國朝第一張懷瓘云吳生畫張僧繇後身斯言當矣出唐畫斷又開元中將軍裴旻居母喪詣道子請於東都天宮寺畫神鬼數壁以資冥助道子答曰廢畫已久若將軍有意為吾纏結舞劍一曲庶因猛勵獲通幽冥旻於是脫去縗服若常時裝飾走馬如飛左旋右抽擲劍入雲高數十十原作千據明鈔本改丈若電光下射旻引手執鞘承之劍透室而入觀者數千百人無不驚慄道子於是援毫圖壁颯然風起為天下之壯觀道子平生所畫得意無出於此出獨異志又道子訪僧請茶僧不加禮遂請筆硯於壁上畫驢一頭而去一夜僧房家具並踏破被惱亂不可堪僧知是道子懇邀到院祈求乃塗卻畫處出盧氏雜說又西明慈恩多名畫慈思塔前壁有濕耳獅子趺心花為時所重聖善敬愛亦有古畫聖善木塔院多鄭廣文畫並書敬愛山亭院有雉尾若真砂子上有進士房魯題名處後有人題詩曰姚家新婿是房郎未解芳顏意欲狂見說正調穿羽箭莫教射破寺家牆寺西北角有病龍院並吳畫出盧氏雜談馮紹正唐開元關輔大旱京師闕雨尤甚亟命大臣遍禱於山澤間而無感應上於龍池新刱一殿因召少府監馮紹正令於四壁各圖一龍紹正乃先於西壁畫素龍奇狀蜿蜒如欲振躍繪事未半若風雲隨筆而生上及從官於壁下觀之鱗甲皆濕設色未終有白氣若簷廡間出入于池中波濤洶湧雷電隨起侍御數百人皆見白龍自波際乘雲氣而上俄頃陰雨四布風雨暴作不終日而甘澤遍於畿內出明皇雜錄張藻唐張藻衣冠文學時之名流松石山水擅當代名唯松樹特出古今能用筆常以手握雙管亦一時齊下一為生枝一為枯枝氣傲煙霧勢踰風雨其槎櫱鱗皴之質隨意縱橫生枝則潤合春澤枯枝則乾裂秋風其山水之狀則高低秀絕咫尺深重石突欲落泉噴如吼其近也逼人而寒其遠也極天之淨圖障在人間最多今寶應寺西院山水松石具有題記精巧之跡也松石山水並居神品出畫斷又後士人家有張藻松石障士人云兵部李員外約好畫成癖知而購之其家弱妻已練為衣裏矣唯得兩幅雙柏一石在焉嗟惋久之出名畫記陳閎唐陳閎會稽人以能寫真人物子女等本道薦之玄宗開元中召入供奉每令寫御客妙絕當時玄宗射豬鹿兔按鷹等明鈔本等作箏并按舞圖真容皆受詔寫貌又太清宮肅宗真容匪唯龍頭鳳姿日角月宇之狀而筆力遒潤風彩英逸合符應瑞天假其能也國朝閻令公之後一人而已今咸宜觀天尊殿內畫上仙圖及當時供奉道士等真皆其蹤也又曾為故吏部侍郎徐畫本行經幡二口有女能織成妙絕無並唯寫真人神人物子女等妙品上上出畫斷韋無忝唐韋無忝京兆人也玄宗朝以畫馬異獸擅其名時稱韋畫四足無不妙也曾見貌外國所獻獅子酷似其真後獅子放歸本國唯畫者在圖時因觀覽百獸見之皆懼又玄宗時獵一箭中兩野豬詔於玄武北門寫貌傳在人間英妙之極也夫以百獸之性有雄毅逸群之駿有馴擾之良爪距既殊毛鬣各異前輩或狀其怒則張口善則垂頭若展一筆以辦其性情奮一毛而知其名字古所未能也韋公能之異獸圖破分人家往往有之京都寺觀無畫處其畫獸等妙品上上出畫斷盧稜伽唐盧稜伽吳道玄弟子也畫跡似吳但才力有限頗能細畫咫尺間山水寥廓物像精備經變佛事是其所長吳生嘗於京師畫總持寺三門大獲眾貨稜伽乃竊畫莊嚴寺三門銳思開張頗臻其妙一日吳生忽見之驚歎曰此子筆力常時不及我今乃類我是子也精爽盡於此矣居一月稜伽果卒出名畫記畢宏唐畢宏大曆二年為給事中畫松石於左省廳壁好事者皆詩之改京兆少尹為右庶子樹石擅名於代樹木改步變古自宏始也出名畫記淨域寺唐大穆皇后宅寺僧云三階院門外是神堯皇帝射孔雀處禪院門內外游目目原作自據酉陽雜俎改記云王昭隱畫門西裡面和修吉龍王有靈門內之西火目藥叉及北方天王甚奇猛門東裡面賢門野叉部落鬼首蟠蛇汗煙可懼東廓樹石嶮怪高僧亦怪高僧亦怪四字明鈔本缺據黃本補西廊廟黃本廟作萬壽二字菩薩院門裡南壁皇甫軫畫鬼神及雕鶚鶚黃本作形勢若脫黃本止此壁軫與吳道玄同時吳以其藝逼己募人殺之出酉陽雜俎自王昭隱句起原缺九十八字據明鈔本黃本補資聖寺資聖寺中門窗間吳道子畫高僧韋述讚李嚴書中三門外兩面上層不知何人畫人物頗類閻今寺西廊北隅揚坦畫近塔天女明睇將瞬團瞬團原作舞圖據酉陽雜俎改塔院北堂有鐵觀音高三丈餘觀音院兩廊四十二賢聖韓幹畫元載讚東廊北散馬不意見者如將嘶蹀聖僧中龍樹商船和循絕妙團塔上菩薩李真畫四面花鳥邊鸞畫當藥上菩薩頂上茂葵尤佳塔中藏千部法華經詞人作諸畫連句柏梁體吳生畫勇矛戟攢出奇騁變勢萬端蒼蒼鬼怪層壁寬睹之忽忽毛髮寒稜伽效之力所癉李真周昉優劣難活禽生奔推邊鸞花方嫩彩猶未幹韓幹變態如急湍惜哉壁畫勢未殫後人新畫何漫汗出酉陽雜俎東郡明鈔本作都北邙山有玄元觀觀南有老君廟臺殿高敞下瞰伊洛神仙泥塑之像皆開元中楊惠之所製奇巧精嚴見者增敬壁有吳道玄畫五聖真容及老子化胡經事丹青妙絕古今無比杜工部詩云配極玄都閟憑高禁篽長守祧嚴具禮掌節鎮非常碧瓦初寒外金莖一氣旁山河扶繡戶日月近雕梁仙李蟠根大猗蘭弈葉光世家遺舊史道德付今王畫手看前輩吳生遠擅場森羅迴地軸妙絕動宮牆五聖聯龍袞千官列鴈行冕旒俱秀發旌旆盡飛揚翠柏深留景紅梨迥得霜風箏吹玉柱露井凍銀床身退卑周室經傳拱漢皇谷神如不死養拙更何鄉出劇談錄金橋圖玄宗封泰山迴車駕次上黨潞之父老負擔壺漿遠近迎謁上皆親加存問受其獻饋錫賚有差父老有先與上相識者上悉賜以酒食與之話舊故所過村部必令詢訪孤老喪疾之家加弔恤之父老欣欣然莫不瞻戴扣乞駐留焉及卓駕過金橋橋在潞州御路縈轉上見數千里間旗纛鮮潔羽衛齊整謂左右曰張說言我勒兵三十萬旌旂經千里間陝右上黨至於太原見后土碑真才子也左右皆稱萬歲上遂召吳道玄韋無忝陳閎令同製金橋圖聖容及上所乘照夜白馬陳閎主之橋梁山水車輿人物草樹鷹鳥器丈帷幕吳道玄主之狗馬驢騾牛羊橐駝貓猴豬貀四足之屬韋無忝主之圖成時謂三絕焉出開元傳信記崔圓壁安祿山之陷兩京王維鄭虔張通皆處於賊庭洎剋復俱囚於楊國忠舊宅崔相國圓因召於私第令畫名畫數壁當時皆以圓勳貴莫二望其救解故運思精深頗極能事故皆獲寬典至於貶降必獲善地出明皇雜錄
