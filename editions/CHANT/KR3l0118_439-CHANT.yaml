body:
  text: 羊月氏稍割月氏有羊大尾稍割以供賓亦稍自補復有大秦國北有羊子生於土中秦人候其欲萌為垣以遶之其臍連地不可以刀截擊鼓驚之而絕因跳鳴食草以一二百口為群西域大羊僧玄奘至西域大雪山高嶺上有一村養羊大如驢罽賓青羊罽賓國出野青羊尾如翠色土人食之齊訟者齊莊公時有里徵者訟三年而獄不決公乃使二人具一羊詛於社二子將羊而刺之灑其血羊起觸二子殪於盟所梁文漢齊人梁文好道其家有神祠建室三四間座上施皂帳常在其中積十數年後因祀事帳中忽有人語自呼高山君大能飲食治病有驗文奉事甚肅積數年得進其帳中神醉文乃乞得奉見顏色謂文曰授手來文納手得持其頤髯鬚甚長文漸繞手卒然引之而聞作殺羊聲座中驚起助文引之乃袁公路家羊也失之七八年不知所在殺之乃絕顧霈顧霈者吳之豪士也曾送客於昇平亭時有沙門流俗者在座中言人欲殺一羊羊絕繩因走來投此道人穿頭向袈娑下主人命將去殺之既行炙先割以啖道人道人食下覺炙走行皮中痛毒不可忍呼醫來鍼之以數鍼貫焉炙猶動搖乃破肉視之故是一臠肉耳道人於此得疾作羊鳴吐沫還寺少時而卒潘果唐京師人姓潘名果年未弱冠以武德時任都水小吏歸家與少年數人出田游戲過於塚間見一羊為牧人所遺獨立食草果因與少年捉之將以歸家其羊中路鳴喚果懼主聞乃拔卻羊舌於夜殺食之後經一年果舌漸縮盡陳牒解吏富平縣令鄭餘慶疑其虛詐令開口驗之乃見全無舌根本纔如豆許不盡官人問之因由果取紙書以答之元狀官之時彈指教令為羊追福寫法華經果發心信教齋戒不絕為羊修福後經一年舌漸得生平復如故又請官陳牒縣官用為里正餘慶至貞觀十八年為監察御史自向說爾李審言萬壽年中長安百姓李審言忽得病如狂須與羊同食家人無以止求醫不效後忽西走近將百里路旁遇群羊遽走入其內逐之者方至審言已化為一大羊於眾中不能辨認及家人齊至泣而擇之其一大羊乃自語曰將我歸慎勿殺我我為羊快樂人何以比遂將歸飼養以終天年楊氏長安楊氏宅恒有青衣婦人不知其所由來每上堂直詣諸女曰天使吾與若女友悉驚畏而避之不可則言詞不遜所為甚鄙或裸體而行左右掩目因出外間與男子調戲猛而交穢擒捕終不可得一日悉取諸女囊中襟衣暴置庭前女不勝其忿極口罵之遂大肆醜言發其內事纖毫必盡如此十餘日呼神巫以符禁逐之巫去輒來悉莫能止乃徙家避之會楊氏所親自遠而至具為說之此人素有膽使獨止其宅夜張燈自臥婦人果來偽自留之寢宿私令匿其所曳履求之不得狼狽而去取履視之則羊蹄也以計尋之至宅東寺中見長生青羊而雙蹄無甲行甚艱蹶贖而殺之其怪遂絕陳正觀潁川陳正觀斫割羊頭極妙天寶中有人詣正觀正觀為致飲饌方割羊頭初下刀子刺其熟胸正觀暫乃洗手頭作羊鳴數聲正觀便爾心悸數日而死安甲邠州有民姓安者世為屠業家有牝羊并羔一日欲刲其母縛上架之次其羔忽向安生面前雙跪前膝兩目涕零安生亦驚異之良久遂致刀於地去喚一童稚共事刲宰而迴遽失刀乃為羔子銜之致墻根下而臥其上安生俱疑為鄰人所竊又懼詣市過時且無他刀極揮霍忽轉身趯起羔兒見刀在羔之腹下安生遂頓悟解下母羊并羔並送寺內乞長生自身尋捨妻孥投寺內竺大師為僧名守思燕相朔人有獻大豕於燕相令膳夫烹之豕既死見夢於燕相曰造化勞我以豕形食我以人穢仗君之靈得化今始得為魯之津伯也杜願晉杜願字永平梓潼涪人也家甚富有一男名天保願愛念年十歲泰元三年暴病死後數月豬生五子一子最肥後官長新到願將以作禮就捉殺之有比丘忽至願前謂曰此㹠是君兒也如何百餘日中而相忘乎言竟忽然不見願尋視見在火中騰空而去雲氣充布彌日乃歇都末莎車王殺于闐王于闐大人都末出見野豕欲搏之乃人語曰無殺我為汝殺莎車都末異之即與兄弟共殺莎車王劉胡後魏植貨里有太常民劉胡兄弟四人以屠為業永安年中胡殺豬豬忽唱乞命聲及四鄰鄰人謂胡兄弟相鬥來觀之乃豬也胡即捨宅為歸覺寺合家入道焉耿伏生隋冀州臨黃縣東有耿伏生者其家薄有資產隋大業十一年伏生母張氏避父將絹兩疋與女數歲後母亡變作母豬生在其家復產二㹠伏生並已食盡遂更不產伏生即召屠兒出賣未取之間有一客僧從生乞食即於生家少憩僧從一童子入豬圈中游戲豬與之言我是伏生母為往日避生父眼取絹兩疋與女我坐此罪變作母豬生得兩兒被生食盡還債既畢更無所負欲召屠兒賣我請為報之童子具陳向師師時怒曰汝甚顛狂豬那解作此語遂即寢眠又經一日豬見童子又云屠兒即來何因不報童子重白師師又不許少頃屠兒即來取豬豬踰圈走出而向僧前床下屠兒逐至僧房僧曰豬投我來今為贖取遂出錢三百文贖豬後乃竊語伏生曰家中曾失絹否生報僧云父存之日曾失絹兩疋又問娣姒幾人生云惟有一娣嫁與縣北公乘家僧即具陳童子所說伏生聞之悲泣不能自已更別加心供養豬母凡經數日豬忽自死託夢其女云還債既畢得生善處兼勸其女更修功德李校尉唐龍朔元年懷州有人至潞州市豬至懷州賣有一特豬潞州三百錢買將至懷州賣與屠家得六百錢至冬十一月潞州有人姓李任校尉至懷州上翻因向市欲買肉食見此特豬已縛四足在店前將欲殺之見此校尉語云汝是我女兒我是汝外婆本為汝家貧汝母數索不可供足我大兒不許我憐汝母子私避兒與五斗米我今作豬償其盜債汝何不救我校尉問此屠兒贖豬屠兒初不之信餘人不解此豬語惟校尉得解屠兒語云審若是汝外婆我解放之汝對我更請共話屠兒為解放已校尉更請豬語云某今上番一月未得將婆還舍未知何處安置婆豬即語校尉云我今已隔並受此惡形縱汝下番亦不須將我還汝母見在汝復為校尉家鄉眷屬見我此形決定不喜恐損辱汝家門某寺有長生豬羊汝安置我此寺校尉復語豬言婆若有驗自預向寺豬聞此語遂即自向寺寺僧初不肯受校尉具為寺僧說此靈驗合寺僧聞並懷慚愍為造舍居處安置校尉復留小氈令臥寺僧道俗競施飲食後寺僧並解豬語下番辭向本州報母此事母後自來看豬母子相見一時泣淚豬至麟德元年猶聞平安湯應吳時廬陵縣亭重屋中每有鬼物宿者輒死自後使人莫敢入亭止宿丹陽人湯應者大有膽武使至廬陵遂入亭宿焉吏啟不可應不聽悉屏從者還外惟持一大刀獨處亭中至三更竟忽聞有扣閣者應遙問是誰答云部郡相問應使進致詞而去頃復有扣閣者云府君相問應復使進焉了無疑也旋又有扣閣者云部郡府君相詣應方疑是鬼物因持刀迎之見二人皆盛服齊進坐定稱府君者便與應談而部郡者忽起應乃回顧因以刀砍之府君者即下座走焉追至亭後墻下及之砍幾刀焉應乃還臥達曙方將人尋之見有血跡皆得之稱府君者是一老狶部郡者是一老狸自此其妖遂絕安陽書生安陽城南有一亭不可宿宿輒殺人書生乃過宿之亭民曰此不可宿前後宿此未有活者書生曰無苦也吾自住此遂往廨舍乃端坐誦書良久乃休夜半後有一人著皂衣來往戶外呼亭主亭主應曰諾亭中有人耶答曰向有書生在此讀書適休未似寢乃喑嗟而去既而又有冠赤幘者來呼亭主問答如前既去寂然書生知無來者即起詣問處效呼亭主亭主亦應諾復云亭中有人耶亭主答如前乃問向者黑衣來誰曰北舍母豬也又曰冠赤幘來者誰曰西鄰老雄雞也汝復誰也我是老蝎也於是書生密便誦書至明不敢寐天曉亭民來視驚曰君何獨得活書生曰促索劍來吾與鄉取魅乃握劍至昨夜應處果得老蝎大如鼙毒長數尺西家得老雄雞北舍得老母豬凡殺三物亭中遂安靜也吳郡士人晉有一士人姓王家在吳郡還至曲阿日暮引船上當大埭見塘上有一女子年十七八便呼之留宿至曉解金鈴繫其臂使人送至家都無女人因過豬欄中見母豬臂有金鈴也晉州屠兒唐顯慶三年徐玉為晉州刺史有屠兒在市東巷殺一豬命斷湯燖皮毛並落死經半日會殺餘豬未及開解至曉以刀破腹長劃腹下一刀刀猶未入腹其豬忽起走出門直入市西至一賈者店內床下而臥市人競往看之屠兒執刀走逐看者問其所由屠兒答云我一生以來殺豬未嘗聞見此事猶欲將去看者數百人皆嗔責屠兒競出錢贖豬諸人共為造塔安置豬身毛皮始得生咽下及腹下瘡處差已作大肉塊麤如臂許出入來去不汙其室性潔不同餘豬至四十五年方卒元佶唐長安中豫州人元佶居汝陽縣養一牝豬經十餘年一朝失之乃向汝陽變為婦人年二十二三許甚有資質造一大家門云新婦不知所適聞此須人養蠶故來求作主人悅之遂延與女同居其婦人甚能梳粧結束得錢輒沽酒并買脂粉而已後與少年飲過因入林醉臥復是牝豬形耳兩頰猶有脂澤在焉崔日用開元中崔日用為汝州刺史宅舊凶世無居者日用既至修理洒埽處之不疑其夕日用堂中明燭獨坐半夜後有烏衣數十人自門入至坐階下或有跛者眇者日用問君輩悉為何鬼來此恐人其跛者自陳云某等罪業悉為豬身為所放散在諸寺號長生豬然素不樂此生受諸穢惡求死不得恒欲於人申說人見悉皆恐懼今屬相公為郡相投轉此身耳日用謂之曰審若是殊不為難俱拜謝而去翌日寮佐來見日用莫不驚其無恙也衙畢使奴取諸寺長生豬既至或跛或眇不殊前見也歎異久之令司法為作名乃殺而賣其肉為造經像收骨葬之他日又來謝恩皆作少年狀云不遇相公猶十年處於穢惡無以上報今有寶劍一雙各值千金可以除辟不祥消彌凶厲也置劍床前再拜而去日用問我當何官答云兩日內為太原尹更問得宰相否默而不對李汾李汾秀才者越州上虞人也性好幽寂常居四明山山下有張老莊其家富多養豕天寶末中秋之夕汾步月於庭撫琴自適忽聞戶外有嘆美之聲問之曰誰人夜久至此山院請聞命矣俄有女子笑曰冀觀長卿之妙耳汾啟戶視之乃人間之極色也惟覺其口有黑色汾問曰子得非神仙乎女曰非也妾乃山下張家女也夕來以父母暫過東村竊至於此私面君子幸無責也汾欣然曰娘子既能降顧聊可從容女乃升階展敘言笑談謔汾莫能及夜闌就寢備盡繾綣俄而晨雞報曙女起告辭汾意惜別乃潛取女青氈履一隻藏衣笥中時汾欹枕假寐女乃撫汾悲泣求索其履曰願無留此今夕再至脫君留之妾身必死謝於君子汾不允女號泣而去汾覺視床前鮮血點點出戶汾異之乃開笥視青氈履則一豬蹄殼耳汾惶駭尋血至山前張氏溷中見一牝豕後足刓一殼豕視汾瞑目咆哮如有怒色汾以事白張叟叟即殺之汾乃棄山院別遊他邑徐州軍人後唐長興中徐州軍營將烹一牝豕翌日將宰之是夕豕見夢於主曰爾勿殺我我之胎非豕也爾能誌之俾爾豐渥比明忘而宰之腹內果懷一小白象纔可五寸形質已具雙牙燦然主方悟無及矣營中洶洶咸知之聞於都校以紙緘之聞於節度使李敬周時人咸不測之亦竟無恙
