body:
  text: 山玉笥山漢武帝好仙于玉笥山頂上置降真壇大還丹灶道士晝夜祈禱天感其誠乃降白玉笥置壇上武帝遣使取之至其壇側飄風大震卷玉笥而去因此則為玉笥山焉大翮山上郡人王次仲少有異志變倉頡舊文為今隸書秦始皇時官務煩多以次仲所易文簡便于事因而召之凡三徵不致次仲懷道履真窮數術之妙始皇怒其不恭令檻車送之次仲行次忽化為大鳥出車外翻飛而去落二翮于斯山故其峰巒有大翮小翮之名矣魏土地記曰沮陽城東北六十里有大翮小翮山山上神名大翮廟東有溫湯水口溫湯療治萬病泉所發之麓俗謂之土亭山北水熱甚諸湯療病者要須別消息用之山精吳天門張蓋冬月與村人共獵見大樹下有蓬庵似寢息處而無煙火有頃見一人身長七尺毛而不衣負數頭死猿蓋與語不應因將歸閉空屋中十余日复送故處又孫皓時臨海得毛人山海經云山精如人面有毛此山精也故抱朴子曰山之精形如小兒而獨足足向后喜來犯人其名蚑知而呼之即當自卻耳一名曰超空亦可兼呼之又有山精或如鼓赤色一足其名曰渾又或如人長九尺衣裘戴笠名曰金累又或如龍有五赤色角名曰飛龍見之皆可呼其名不敢為害玄中記山精如人一足長三四尺食山蟹夜出晝藏石雞山晉永嘉之亂宜陽有女子姓彭名娥父母昆弟為長沙賊所虜時娥負器出汲于溪還見塢壁已破殆不胜哀與賊相格賊縛娥驅去溪邊將殺之際有大山石壁娥仰呼皇天山靈有神不我為何罪因奔走向山山立開廣數丈平路如砥群賊亦逐娥入山山遂崩合泯然如初賊皆壓死山里頭出山外娥遂隱不复出娥所舍汲器化為石形似雞土人因號曰石雞山溪為娥潭新丰山唐高宗朝新丰出山高二百尺有神池深四十尺水中有黃龍現吐寶珠浮出大如拳山中有鼓鳴改新丰縣為慶山縣慶山昭應慶山長安中亦不知從何飛來夜過聞有聲如雷疾若奔黃土石亂下直墜新丰西南一村百餘家因山為墳今于其上起持國寺瓮峰華岳云台觀中方之上有山崛起如半瓮之狀名曰瓮肚峰玄宗嘗賞望嘉其高回欲于峰腹大鑿開元二字填以白石令百餘里外望見之諫官上言乃止夸父山辰州東有三山鼎足直上各數千丈古老傳曰鄧夸父與日競走至此煮飯此三山者夸父支鼎之石也插灶荊州有空舲峽絕崖壁立數百丈飛鳥不栖有一火燼插在崖間望見可長數尺傳云洪水時行舟者泊爨于此余燼插之至今猶曰插灶河山石斛融州河水有泉半岩將注其下相次九磴每磴下一白石浴斛承之如似鐫造嘗有人攜一婢取下浴斛中浣巾須臾風雨忽至其婢震死所浣巾斛碎于山下自別安一斛新于向者終南乳洞有人游終南山一乳洞洞深數里乳旋滴瀝成飛仙狀洞中已有數十眉目衣服形制精巧一處滴至腰已上其人因手承漱之經年再往見所承滴象已成矣乳不复滴當手承處衣缺二寸不就古鐵鎖齊郡接歷山上有古鐵鎖大如臂繞其峰再浹相傳本海中山山神好移故海神鎖之挽鎖斷飛于此崖山太原郡東有崖山天旱土人常燒此山以求雨俗傳崖山神娶河伯女故河伯見火必降雨救之今山上多生水草聖鐘山黎州聖鐘山古老傳此山有鐘聞其聲而形不見南詔犯境鐘則預鳴唐天寶大和咸通乾符之載群蠻來寇皆有征也昔有名僧講大乘經論鐘亦震焉乾寧中刺史張惠安請門僧京師右街淨眾寺惠維講妙法蓮花經一遍此鐘頻鳴如人扣擊知向所傳者不謬矣嵩梁山澧州嵩梁山今名石門永安六年自然洞開玄朗如門高三百丈角上生竹倒垂下拂謂之天帚石鼓山歙州石鼓山有石如鼓形又有石人石驢俗傳石鼓鳴則驢鳴人哭而縣官不利后鑿破其鼓遂不复鳴射的山孔曄會稽記云射的山遠望的的有如射侯故曰射的南有石室可方丈謂之射室傳云羽人所游憩土人常以此占谷貴賤諺云射的白米斛一百射的玄米斛一千孔靈符會稽記云射的石水數十丈其清見底其西有山上參煙云半岭石室曰仙人射堂水東高岩臨潭有石的形甚員明視之如鏡又會稽錄云仙人常射如此使白鶴取箭北有石帆壁立怪山會稽山陰郭中有怪山世傳本琅琊東武山時天夜雨晦冥旦而見在此焉百姓怪之因名曰怪山鳴鐃山蕭子開建安記云一名大戈山越王無諸乘象輅大將軍乘鳴鐃載旗畋獵登于此山古老傳天欲雨其山即有音樂聲也贛台虔州贛台縣東南三百六十三里南康記云山上有台方廣數丈有自然霞如屋形風雨之后景氣明淨頗聞山上有鼓吹聲即山都木客為其舞唱上霄峰補闕熊皎云廬山有上霄峰者去平地七千仞上有石跡云是夏禹治水之時泊船之所鑿石為竅以系纜焉磨崖為碑皆科斗文字隱隱可見則知大禹之功與天地不朽矣麥積山麥積山者北跨清渭南漸兩當五百里岡巒麥積處其半崛起一石塊高百萬尋望之團團如民間積麥之狀故有此名其青云之半峭壁之間鐫石成佛萬龕千室雖自人力疑其鬼功隋文帝分葬神尼舍利函于東閣之下石室之中有庾信銘記刊于岩中古記云六國共修自平地積薪至于岩巔從上鐫鑿其龕室佛像功畢旋旋折薪而下然后梯空架險而上其上有散花樓七佛閣金蹄銀角犢兒由西閣懸梯而上其間千房萬屋緣空躡虛登之者不敢回顧將及絕頂有萬菩薩堂鑿石而成廣若今之大殿其雕梁畫栱繡棟云楣并就石而成萬軀菩薩列于一堂自此室之上更有一龕謂之天堂空中倚一獨梯攀緣而上至此則萬中無一人敢登者于此下顧其群山皆如堷樓王仁裕時獨能登之仍題詩于天堂西壁上曰躡盡懸空萬仞梯等閒身共白云齊檐前下視群山小堂上平分落日低絕頂路危人少到古岩松健鶴頻栖天邊為要留名姓拂石殷勤手自題時前唐末辛未年登此留題于今三十九載矣斗山觀漢乾祐中翰林學士王仁裕云興元有斗山觀自平川內聳起一山四面懸絕其上方于斗底故號之薜蘿松檜景象尤奇上有唐公昉飲李八百仙酒全家拔宅之跡其宅基三畝許陷為坑此蓋連地而上升也仁裕辛巳歲於斯為節度判官嘗以片板題詩于觀曰霞衣欲舉醉陶陶不覺全家住絳霄拔宅只知雞犬在上天誰信路歧遙三清遼廓拋塵夢八景云煙事早朝為有故林蒼柏健露華涼葉鎖金飆舊說云斗山一洞西去二千里通于青城大面山又與嚴真觀井相通仁裕癸未年入蜀因謁嚴真觀見斗山詩碑在焉詰其道流云不知所來說者無不惊奇之大竹路興元之南有大竹路通于巴州其路則深溪峭岩捫蘿摸石一上三日而達于山頂行人止宿則以緪蔓系腰縈樹而寢不然則墮于深澗若沈黃泉也复登措大岭蓋有稍似平處路人徐步而進若儒之布武也其絕頂謂之孤云兩角彼中諺云孤云兩角去天一握淮陰侯廟在焉昔漢祖不用韓信信遁歸西楚蕭相國追之及于茲山故立廟貌王仁裕嘗佐褒梁師王思同南伐巴人往返登陟亦留題于淮陰祠詩曰一握寒天古木深路人猶說漢淮陰孤云不掩興亡策兩角曾懸去住心不是冕旒輕布素豈勞丞相遠追尋當時若放還西楚尺寸中華未可侵崎嶇險峻之狀未可殫言溪毒間有溪毒疾發時如重傷寒識之者取水筆管內于鼻中以指彈之三五下即出墨血良久疾愈不然即致卒矣
