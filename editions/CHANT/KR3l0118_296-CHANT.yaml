body:
  text: 太室神太室神後魏太武時嵩陽太室中有寶神像長數尺孝文太和中有人避瘧於此廟見太武來造神因言今日朝天帝帝許移都洛陽當得四百年神言昨已得天符矣太武出神謂左右曰虜性苛貪天符但言四十而因之四百明年孝文選都洛陽唯得四十年矣黃苗宋元嘉中南康平固人黃苗為州吏受假違期方上行經宮亭湖入廟下願希免罰坐又欲還家若所願並遂當上猪酒苗至州皆得如志乃還資裝既薄遂不過廟行至都界與同侶並船泊宿中夜船忽從水自下其疾如風介夜四更苗至官亭始醒悟見船上有三人並烏衣持繩收縛苗夜上廟階下見神年可四十黃面披錦袍梁下懸一珠大如彈丸光輝照屋一人戶外白平固黃苗上願猪酒遯回家教錄今到命謫三年取三十人遣吏送苗窮山林中鏁腰繫樹日以生肉食之苗忽忽憂思但覺寒熱身瘡舉體生斑毛經一旬毛蔽身爪牙生性欲搏噬吏解鏁放之隨其行止三年凡得二十九人次應取新淦一女而此女士族初不出外後值與娣妹從後門出詣親家女最在後因取之為此女難得涉五年人數乃充吏送至廟神教放遣乃以鹽飯飲之體毛稍落鬚髮悉出爪牙墮生新者經十五日還如人形意慮復常送出大路縣令呼苗具䟽事覆前後所取人遍問其家並符合焉髀為戟所傷創瘢尚在苗還家八年得時疾死龔雙襄陽漢水西村有廟名土地主府君極有靈驗齊永元末龔雙任馮翊郡守不信鬼神過見此廟因領人燒之忽旋風絞火有二物挺出變成雙青鳥入龔雙兩目兩目應時疼痛舉體壯熱至明便卒蕭總字彥先南齊太祖族兄瓌之子總少為太祖以文學見重時太祖已為宋丞相謂總曰汝聰明智敏為官不必資待我功成必薦汝為太子詹事又曰我以嫌疑之故未即遂心總曰若讖言之何啻此官太祖曰此言狂悖慎鈐其口吾專疚於心未忘汝也總率性本異不與下於己者交自建業歸江陵宋後廢帝元徽後四方多亂因游明月峽愛其風景遂盤桓累歲常於峽下枕石漱流時春向晚忽聞林下有人呼蕭卿者數聲驚顧去坐石四十餘步有一女把花招總總悤異之又常知此有神女從之視其容貌當可笄年所衣之服非世所有所佩之香非世所聞謂總曰蕭郎遇此未曾見邀今幸良晨有同宿契總恍然行十餘里乃見溪上有宮闕臺殿甚嚴宮門左右有侍女二十人皆十四五並神仙之質其寢臥服玩之物俱非世有心亦喜幸一夕綢繆以至天曉忽聞山鳥晨叫巖泉韻清出戶臨軒將窺舊路見煙雲正重殘月在西神女執總手謂曰人間之人神中之女此夕歡會萬年一時也總曰神中之女豈人間常所望也女曰妾實此山之神上帝三百年一易不似人間之官來歲方終一易之後遂生他處今與郎契合亦有因由不可陳也言訖乃別神女手執一玉指環謂曰此妾常服玩未曾離手今永別寧不相遺願郎穿指慎勿忘心總曰幸見顧錄感恨徒深執此懷中終身是寶天漸明總乃拜辭掩涕而別攜手出戶已見路分明總下山數步迴顧宿處宛是巫山神女之祠也他日持玉環至建鄴因話於張景山景山驚曰吾常遊巫峽見神女指上有此玉環世人相傳云是晉簡文帝李后曾夢遊巫峽見神女神女乞后玉環覺後乃告帝帝遣使賜神女吾親見在神女指上今卿得之是與世人異矣總齊太祖建元末方徵召未行帝崩世祖即位累為中書舍人初總為治書御史江陵舟中遇而忽思神女事悄然不樂乃賦詩曰昔年巖下客宛似成今古徒思明月人願濕巫山雨蕭嶽齊明帝建武中有書生蕭嶽自毘陵至延陵季子廟前泊舟望月忽有一女子年十六七從三四侍女貌皆絕世以橘擲嶽懷中嶽心異之乃問其姓名云葛氏嶽因請舟中命酒與歌宴及曉請去嶽甚悵然嶽登舟望之見廟前有五六女相迎笑一時入廟嶽異之及明乃整衣冠至延陵廟中見東壁上書第三座之女細觀之而笑果昨夜宿之女也及左右侍女亦所從也畫壁題云東海姑之神爾朱兆後魏孝莊帝既誅爾朱榮榮子兆自汾州率騎攻洛師自河梁西涉掩襲京邑先是河邊有一人夢神謂曰爾朱家欲渡河用爾作波津令當為縮水脈及兆至見一人自言知水深淺處以草表插導忽失所在兆眾遂涉焉尋而陷京弒莊帝蔣帝神梁旱甚詔於蔣帝神求雨十旬不降帝怒載荻焚廟並其神影爾日開朗將欲起火當神上忽有雲如繖蓋須臾驟雨臺中宮殿皆自震動帝懼馳詔追停少時還靜自此帝誠信遂深自踐祚比未曾到廟於是備法駕將朝臣修謁時魏將楊大眼來寇鍾離蔣帝神報敕必許扶助既而無雨水暴漲六七尺遂大克魏軍神之力也凱旋之後廟中人馬腳皆有泥濕當時並目覩焉臨汝侯猷宗室臨汝侯猷為吳興太守性倜儻與楚廟神交飲至一斛每酬祀盡歡極醉而神影亦有酒容所禱必應後為益州刺史時江陵人齊狗兒反眾十餘萬攻州城猷兵糧已盡人有二心乃遙禱請救是日州界田父逢一騎絡鐵從東方來問去城幾里曰百四十里日已晡騎語父曰後人來可令疾馬欲及日破賊俄有數百騎如風一騎仍請飲田父問為誰曰吳興楚王來救臨汝侯當此時廟中請祈無驗十餘日乃見侍衛土偶皆泥濕如汗者是日猷大破狗兒焉及猷卒謚曰靈與神交故也陰子春梁陰子春為東莞太守時青州刺史王神念毀臨海神廟座棟上有一虵役夫不擒入於海水爾夜子春夢見一人詣其府云有人見苦破壞所居今既無託欲憩此境子春心密記之經日方知神念毀廟因辦牲醪立宇祠之數日夢一朱衣人謝曰得君厚惠當以一州相報經月餘魏君欲襲朐山子春預知設伏摧破武帝以為南青州刺史蘇嶺廟襄陽蘇嶺山廟門有二石鹿夾之故謂之鹿門山習氏記云習郁常為侍中從光武幸黎丘郁與光武俱夢見蘇嶺山神因使立祠郭重產記云雙石鹿自立如鬭採伐人常過其下或有時不見鹿因是知有靈瑞梁天監初有蚌湖村人於此澤間獵見二鹿極大有異於恒鹿乃走馬逐之鹿即透澗直向蘇嶺人逐鹿至神所遂失所在唯見廟前二石鹿獵者疑是向者鹿所化遂迴其夜夢見一人著單巾幘黃布袴褶語云使君遣我牧馬汝何驅迫賴得無他若見損傷豈得全濟盧元明北齊盧元明聘于梁其妻乘車送至河濱忽聞水有香氣異常顧見水神湧出波中牛乃驚奔曳車入河其妻溺死兄子十住尚幼與同載投入獲免董慎隋大業元年兗州佐史董慎性公直明法理自都督已下用法有不直必犯顏而諫之雖加譴責亦不知懼必俟刑正而後退常因授衣歸家出州門逢一黃衣使者曰太山君呼君為錄事因出懷中牒示慎牒曰董慎名稱茂實案牘精練將平疑獄須俟良能權差知右曹錄事印甚分明後署曰倨慎謂事者曰府君呼我豈有不行然不識府君名謂何使者曰錄事勿言到任即知矣自持大布囊內慎其中負之出兗州郭因致囊於路左汲水調泥封慎兩目慎都不知經過遠近忽聞大唱曰范慎追董慎到使者曰諾趨入府君曰所追錄事今復何在使者曰冥司幽祕恐或漏洩向請左曹匿影布囊盛之府君大笑曰已死范慎追董慎取左曹囊盛右曹錄事可謂能防慎也便令寫出抉去目泥賜青縑衫魚須笏豹皮靴文甚斑駁邀登副階命左右取榻令坐曰籍君公正故有是請今有閩州司馬令狐寔等六人置無間獄承天曹符以寔是太元夫人三等親准令遞減三等昨罪人程翥一百二十人引例喧訟不可止遏已具名申天曹天曹以為罰疑唯輕亦令量減二等予恐後人引例多矣君謂宜如何慎曰夫水照妍媸而人不怨者以至清無情況於天地刑法豈宜恩貸奸慝然慎一胥吏耳素無文字雖知不可終語無條貫當州府秀才張審通辭彩雋拔足得備君管記府君令帖召之俄頃至審通曰此易耳當為判以狀申府君曰君善為我辭即補左曹錄事仍賜衣服如董慎各給一玄狐每出即乘之審通判曰天本無私法宜畫一苟從恩貸是資奸行令狐寔前命減刑已同私請程翥後申簿訴且異罪疑儻開遞減之科實失公家之論請依前付無間錄獄仍錄狀申天曹即有黃衫人持狀而往少頃復持天符曰所申文狀多起異端奉主之宜但合遵守周禮八議一曰議親又元化匱中釋沖符亦曰無不親是則典章昭然有何不可豈可使太元功德不能庇三等之親仍敢衍違須有懲罰府君可罰不衣紫六十甲子餘依前處分府君大怒審通曰君為判辭使我受譴即命左右取方寸肉塞其一耳遂無所聞審通訴曰乞更為判申不允即甘當再罰府君曰君為我去罪即更與君一耳審通又判曰天大地大本乃無親若使有親何由得一苟欲因情變法實將生偽喪真太古以前人猶至朴中古之降方聞各親豈可使太古育物之心生仲尼觀蜡之歎無不親是非公也何必引之請寬逆耳之辜敢薦沃心之藥庶其閱實用得平均令狐寔等乞請依正法仍錄狀申天曹黃衣人又持往須臾又有天符來曰再省所申甚為允當府君可加六天副正使令狐寔程翥等並正法置處府君即謂審通曰非君不可正此獄因命左右割下耳中肉令一小兒擘之為耳安於審通額上曰塞君一耳與君三耳何如又謂慎曰甚賴君薦賢以成我美然不可久留君當加一周年相報耳君兼本壽得二十一年矣即送歸家使者復以泥封二人布囊各送至宅欻如寫出而顧問妻子妻子云君亡精魂已十餘日矣慎自此果二十一年而卒審通數日額覺癢遂踴出一耳通前三耳而踴出者尤聰時人笑曰天有九頭鳥地有三耳秀才亦呼為雞冠秀才者慎初思府君稱鄰後方知倨乃鄰字也李靖衛公李靖始困於貧賤因過華山廟訴於神且請告以官位所至辭色抗厲觀者異之佇立良久乃出廟門百許步聞後大聲曰李僕射好去顧之不見人後竟至端揆
