body:
  text: 苗民苗民西荒中有人焉面目手足皆人形而腋下有翼不能飛名曰苗民書曰竄三苗于三危四裔為人饕餮淫佚無理舜竄之于此奇肱奇肱國其民善為机巧以殺百禽能為飛車從風遠行湯時西風久下奇肱人車至于豫州界中湯破其車不以示民后十年東風复至乃使乘車遣歸其國去玉門西萬里西北荒小人西北荒中有小人長一寸其君朱衣玄冠乘輅車馬引為威儀居處人遇其乘車抵而食之其味辛終年不為物所咋并識萬物名字又殺腹中三虫三虫死便可食仙藥也于闐后魏宋云使西域行至于闐國國王頭著金冠以雞幘頭垂二尺生絹廣五寸以為飾威儀有鼓角金鉦弓箭一具戟二枚槊五張左右帶刀不過百人其俗婦人褲衫束帶乘馬馳走與丈夫無異死者以火焚燒收骨葬之上起浮圖居喪者剪發長四寸即就平常唯王死不燒置之棺中遠葬于野烏萇烏萇國四熟之稻苗高沒駱駝米大如小兒指又烏萇國民有死罪不立殺刑唯徙空山任其飲啄事涉疑似以藥服之清濁則驗隨事輕重則當時即決漢槃陀國漢槃陀國正在山頂自蔥岭已西水皆西流世人云是天地之中其土人民決水以種聞中國待雨而種笑曰天何由可期也蘇都識匿國蘇都識匿國有野叉城城舊有野叉其窟見在人近窟住者五百餘家窟口作舍設關鑰一年再祭人有逼窟口煙氣出先触者死因以尸擲窟中其窟不知深淺馬留馬伏波有余兵十余家不返居壽洽縣自相婚姻有二百戶以其流寓號馬留飲食與華同山川移銅柱入海以此民為識耳武寧蠻峽中俗夷風不改武寧蠻好著芒心接離名曰亭綏以稻記年月葬時以笄向天謂之刺北斗相傳磐瓠初死置于樹上以笄刺之其后化為象臨邑縣有雁翅以御者懸渡國烏耗西有懸渡國山溪不通引繩而渡朽索相引二千里土人佃于石間壘石為室接手而飲所謂猿飲也飛頭獠鄴鄯之東龍城之西南地廣千里皆為鹽田行人所經牛馬皆布氈臥焉岭南溪洞中往往有飛頭者故有飛頭獠子之號頭飛一日前頸有痕匝項如紅縷妻子遂看守之其人及夜狀如病頭忽離身而去乃于岸泥尋蟹蚓之類食之將曉飛還如夢覺其腹實矣梵僧菩薩胜又言闍婆國中有飛頭者其人無目瞳子聚落時有一人据于民志怪南方落民其頭能飛其欲所祠名曰虫落因號落民昔朱桓有一婢其頭夜飛王子年拾遺言漢武時因墀國有南方有解形之民能先使頭飛南海左手飛東海右手飛西海至暮頭還肩上兩手遇疾風飄于海外又南方有落頭民其頭能飛以耳為翼將曉還复著體吳時往往得此人也蹄羌蹄羌之國其人自膝已下有毛如馬蹄常自鞭其脛日行百里扶樓周成王七年南垂有扶樓之國其人能机巧變化易形改服大則興云起霧小則入于纖毫之里綴金玉毛羽為衣裳能吐云噴火鼓腹則如雷霆之聲或化為巨象獅子龍蛇犬馬之狀或變虎或口中吐人于掌中備百獸之樂旋轉屈曲于指間見人形或長數分或复數寸神怪欻忽炫于時樂府皆傳此伎代代不絕故俗謂婆侯伎則扶樓之音訛替也交趾交趾之地頗為膏腴從民居之始知播植厥土惟黑壤厥氣慘雄故今稱其田為雄田其民為雄民有君長亦曰雄王有輔佐焉亦曰雄侯分其地以為雄將南越南越民不恥寇盜其時尉陀治番禺乃興兵攻之有神人適下輔佐之家為造弩一張一放殺越軍萬人三放三萬人陀知其故卻壘息卒還戎武寧縣下乃遣其子始為質請通好焉尺郭南有人焉周行天下其長七丈腹圍如其長朱衣縞帶以赤蛇繞其項不飲不食朝吞惡鬼三千暮吞三百此人以鬼為食以霧為漿名曰尺郭一名食邪一名黃父頓遜頓遜國梁武朝時貢方物其國在海島上地方千里屬扶南北三千里其俗人死后鳥葬將死親賓歌舞送于郭外有鳥如鵝而色紅飛來萬萬家人避之鳥啄肉盡乃去即燒骨而沉海中也墮婆登國墮婆登國在林邑東南接訶陵西接述黎種稻每月一熟有文字書于貝多葉死者口實以金缸貫于四支然后加以婆律膏及檀沉龍腦積薪燔之哀牢夷其先有婦人名沙壺居牢山捕魚水中若有所感妊孕十月而生十子今西南夷其裔也訶陵國訶陵在真腊國之南南海洲中東婆利西墮婆北大海豎木為城造大屋重閣以棕皮覆之以象牙為床以柳花為酒飲之亦醉以手撮食有毒與常人居止宿處即令身上生瘡與之交會即死若旋液沾著草木即枯俗以椰樹為酒味甘飲之亦醉真腊國真腊國在歡州南五百里其俗有客設檳榔龍腦香蛤屑等以為賞宴其酒比之淫穢私房與妻共飲對尊者避之又行房不欲令人見此俗與中國同國人不著衣服見衣服者共笑之俗無鹽鐵以竹弩射虫鳥留仇國煬帝令朱寬征留仇國還獲男女口千余人并雜物產與中國多不同緝木皮為布甚細白幅闊三尺二三寸亦有細斑布幅闊一尺許又得金荊榴數十斤木色如真金密致而文采盤蹙有如美錦甚香极精可以為枕及案面雖沉檀不能及彼土無鐵朱寬還至南海郡留仇中男夫壯者多加以鐵鉗鎖恐其道逃叛還至江都將見為解脫之皆手把鉗叩頭惜脫甚于中土貴金人形短小似昆侖木客郭仲產湘州記云平樂縣西七十里有榮山上多有木客形似小兒歌哭衣裳不異于人而伏狀隱現不測宿至精巧時市易作器與人無別就人換物亦不計其值今昭州平樂縣繳濮國永昌郡西南一千五百里有繳濮國其人有尾欲坐輒先穿地作穴以安其尾若邂逅誤折其尾即死也木飲州朱崖一州其地無泉民不作井皆仰樹汁為用阿薩部多獵虫鹿剖其肉重疊之以石壓瀝汁稅波斯拂林等國米及草子釀于肉汁之中經數日即變成酒飲之可醉孝憶國界周三千余里在平川中以木為柵周十余里柵內百姓二千余家周圍木柵五百餘所氣候常暖冬不凋落宜羊馬無駝牛俗性質直好客侶軀貌長大褰鼻黃發綠睛赤髭被發面如血色戰具唯槊一色宜五谷出金鐵衣麻布舉俗事妖不識佛法有妖祠三百餘所馬步兵一萬不尚商販自稱孝憶人丈夫婦人俱佩帶每一日造食一月食之常吃宿食仍通國無井及河澗所有種植待雨而生以纊舖地承雨水用之穿井即苦海水又咸土俗伺海潮落之后平地收魚以為食婆彌爛國婆彌爛國去京師二萬五千五百五十里此國西有山巉岩峻險上多猿猿形絕長大常暴田種每年有二三十萬國中起春已后屯集甲兵與猿戰雖歲殺數萬不能盡其巢穴撥拔力國撥拔力國在西南海中略不識五谷食肉而已常針牛畜脈取血和乳生飲無衣唯腰下用羊皮掩之其婦人洁白端正國人自掠賣與外國商人其价數倍土地唯有象牙及阿未香波斯商人欲入此國團集數千人繼紲布沒老幼共刺血立誓乃市其物自古不屬外國戰用象牙排野牛角槊衣甲弓矢之器步兵二十萬大食頻討襲之昆吾昆吾陸鹽周十余里無水自生朱鹽月滿則如積雪味甘月虧則如簿霜味苦月盡鹽亦盡又其國累塹為丘象浮圖有三層尸乾居上尸濕居下以近葬為至孝集大氈屋中懸衣服彩繒哭化之繡面獠子越人習水必鏤身以避蛟龍之患今南中有繡面獠子蓋雕題之遺俗也五溪蠻父母死于村外閣其尸三年而葬打鼓路歌親屬飲宴舞戲一月余日盡產為棺余臨江高山半助鑿龕以葬之山上懸索下柩彌高者以為至孝即終身不复祠祭初遭喪三年不食鹽墮雨兒魏時河間王子充家雨中有小兒八九枚墮于庭長五六寸許自云家在海東南因有風雨所飄至此與之言甚有所知皆如史傳所述
