body:
  text: 雜器用國子監生元和中國子監學生周乙者嘗夜習業忽見一小兒鬅鬙頭長二尺余滿頸碎光如星熒熒可惡戲弄筆硯紛紜不止學生素有膽叱之稍卻复傍書案因伺其所為漸逼近乙因擒之踞坐哀求辭頗苦切天將曉覺如物折聲視之乃弊木构也其上粘粟百餘粒姚司馬姚司馬寄居邠州宅枕一溪有二小女常戲釣溪中未嘗有獲忽撓竿各得一物若鱣者而毛若鱉者而腮其家異之養于盆池經夕二女悉患精神恍惚夜常明炷對作戲染藍涅皂未嘗暫息然莫見其所取也時楊元卿在邠州與姚有舊姚因從事邠州又歷半年女病彌甚其家嘗張燈戲錢忽見二小手出燈影下大言曰乞一錢家或唾之又曰我是汝家女婿何敢無禮一稱烏郎一稱黃郎后常與人家狎昵楊元卿知之因為求上都僧瞻瞻善鬼神部持念治病魅者多著效瞻至姚家標釭界繩印手敕劍召之后設血食盆酒于界外中夜有物如牛鼻于酒上瞻乃匿劍蹝步大言极力刺之其物匣刃而步血流如注瞻率左右明炬索之跡其血至后宇角中見若烏革囊大可合簣喘若橐蓋烏郎也遂毀薪焚殺之臭聞十余里一女即愈自是風雨夜門庭聞啾啾次女猶病瞻因立于前舉代折羅叱之女恐怖叩額瞻偶見其衣帶上有一皂袋子因令侍奴婢解視之乃小龠也遂搜其服玩龠勘得一簣簣中悉是喪家搭帳衣衣色唯黃與皂耳瞻假將滿不能已其魅因歸京逾年姚罷職入京先詣瞻為加功治之涉旬其女臂上腫起如漚大如瓜瞻禁針刺出血數合竟差崔玨元和中博陵崔玨者自汝鄭來僑居長安延福里常一日讀書牖下忽見一童長不盡尺露發衣黃自北垣下趨至榻前且謂玨曰幸寄君硯席可乎玨不應又曰我尚壯愿備指使何見拒之深耶玨又不顧已而上榻躍然拱立良久于袖中出一小幅文書致玨前乃詩也細字如粟歷然可辨詩曰昔荷蒙恬惠尋遭仲叔投夫君不指使何處覓銀鉤覽訖笑而謂曰既愿相從無乃后悔耶其僮又出一詩投于幾上詩曰學問從君有詩書自我傳須知王逸少名价動千年又曰吾無逸少之藝雖得汝安所用俄而又投一篇曰能令音信通千里解致龍蛇運八行惆悵江生不相賞應緣自負好文章玨戲曰恨汝非五色者其僮笑而下榻遂趨北垣入一穴中玨即命仆發其下得一管文筆玨因取書鋒銳如新用之月余亦無他怪張秀才東都陶化里有空宅大和中張秀才借得肄業常忽忽不安自念為男子當抱慷慨之志不宜恇怯以自軟因移入中堂以處之夜深欹枕乃見道士與僧徒各十五人從堂中出形容長短皆相似排作六行威儀容止一一可敬秀才以為靈仙所集不敢惕息因佯寢以窺之良久別有二物展轉于地每一物各有二十一眼內四眼剡剡如火色相馳逐而目光眩轉砉有聲逡巡間僧道三十人或馳或走或東或西或南或北道士一人獨立一處則被一僧擊而去之其二物周流于僧道之中未嘗暫息如此爭相擊搏或分或聚一人忽叫云卓絕矣言竟僧道皆默然而息乃見二物相謂曰向者群僧與道流妙法絕高然皆賴我二物成其教行耳不然安得稱卓絕哉秀才乃知必妖怪也因以枕而擲之僧道三十人與二物一時惊走曰不速去吾輩且為措大所使也遂皆不見明日搜尋之于壁角中得一敗囊中有長行子三十個并骰子一雙耳河東街吏開成中河東郡有吏常中夜巡警街路一夕天晴月朗乃至景福寺前見一人俯而坐交臂擁膝身盡黑居然不動吏懼因叱之其人俯而不顧叱且久即朴其首忽舉視其面貌及異長數尺色白而瘦狀甚可懼吏初惊仆于地久之稍能起因視之已亡見矣吏由是懼益甚即馳歸具語于人其后因重构景福寺門發地得一漆桶凡深數尺上有白泥合其首果街吏所見韋協律兄太常協律韋生有兄甚凶自云平生無懼憚耳聞有凶宅必往獨宿之其弟話于同官同官有試之者且聞延康東北角有馬鎮西宅常多怪物因領送其宅具與酒肉夜則皆去獨留之于大池之西孤亭中宿韋生以飲酒且熱袒衣而寢夜半方寤乃見一小兒長可尺余身短腳長其色頗黑自池中而出冉冉前來循階而上以至生前生不為之動乃言曰臥者惡物直又顧我耶乃繞床而行須臾生回枕仰臥乃覺其物上床生亦不動逡巡覺有兩個小腳緣于生腳上冷如水鐵上徹于心行步甚遲生不動候其漸行上及于肚生乃遽以手摸之則一古鐵鼎子已欠一腳矣遂以衣帶系之于床腳明旦眾看之具白其事乃以杵碎其鼎染染有血色自是人皆信韋生之凶而能絕宅之妖也石從武開成中桂林裨將石從武少善射家染惡疾長幼罕有全者每深夜見一人自外來體有光耀若此物至則疾者呼吟加甚醫莫能效從武他夕操弓映戶以俟其來俄而精物复至從武射之一發而中焰光星散命燭視之乃家中舊使樟木燈擎已倒矣乃劈而燔之棄灰河中于是患者皆愈姜修姜修者并州酒家也性不拘檢嗜酒少有醒時常喜與人對飲并州人皆懼其淫于酒或揖命多避之故修罕有交友忽有一客皂衣烏帽身才三尺腰闊數圍造修求酒修飲之甚喜乃與促席酌客笑而言曰我平生好酒然每恨腹內酒不常滿若腹滿則既安且樂若其不滿我則甚無謂矣君能容我久托跡乎我嘗慕君高義幸吾人有以待之修曰子能與我同好真吾徒也當無間耳遂相與席地飲酒客飲近三石不醉修甚訝之又且意其異人起拜之以問其鄉閭姓氏焉复問何道能多飲邪客曰吾姓成名德器其先多止郊野偶造化之垂恩使我效用于時耳我今既老复自得道能飲酒若滿腹可五石也滿則稍安修聞此語复命酒飲之俄至五石客方酣醉狂歌狂舞自歎曰樂哉樂哉遂仆于地修認极醉令家僮扶于室內至室客忽躍起惊走而出家人遂因逐之見客誤抵一石然有聲尋不見至曉睹之乃一多年酒瓮已破矣王屋薪者王屋山有老僧常獨居一茅庵朝夕持念唯采藥苗及松實食之每食后恒必自尋溪澗以澡浴數年在山中人稍知之忽一日有道士衣敝衣堅求老僧一宵宿止老僧性僻复惡其塵雜甚不允道士再三言曰佛與道不相疏混沌已來方知有佛師今佛弟子我今道弟子何不見容一宵陪清論耳老僧曰我佛弟子也故不知有道之可比佛也道士曰夫道者居億劫之前而能生天生人生萬物使有天地有人有萬物則我之道也億劫之前人皆知而尊之而師今不知即非人也老僧曰我佛恒河沙劫皆獨稱世尊大庇眾生恩普天地又豈聞道能爭衡我且述釋迦佛世尊是國王之子其始也舍王位入雪山乘曩劫之功證當今之果天上天下唯我獨尊故使外道邪魔悉皆降伏至于今日就不聞之爾之老君是誰之子何處修行教跡之間未聞有益豈得與我佛同日而言道士曰老君降生于天為此劫之道祖始出于周浮紫氣乘白鹿人孰不聞至于三島之事十州之景三十六洞之神仙二十四化之靈異五尺童子皆能知之豈獨師以庸庸之見而敢蔑耶若以爾佛舍父逾城受穿膝之苦而與外道角胜又安足道哉以此言之佛只是群魔之中一強梁者耳我天地人與萬物本不賴爾佛而生今無佛必不損天地人之萬物也千萬勿自言世尊自言世尊世必不尊之無自稱尊耳老僧作色曰須要此等人設無此等即頓空卻阿毗地獄矣道士大怒伸臂而前擬擊老僧僧但合掌閉目須臾有一負薪者過見而怪之知老僧與道士爭佛道优劣負薪者攘袂而呵曰二子俱父母所生而不養處帝王之土而不臣不耕而食不蚕而衣不但偷生于人間复更以他佛道爭优劣耶無居我山撓亂我山居之人遂遽焚其茅庵仗伐薪之斧皆欲殺之老僧惊走入地化為一鐵錚道士亦尋化一龜背骨乃知其皆精怪耳
