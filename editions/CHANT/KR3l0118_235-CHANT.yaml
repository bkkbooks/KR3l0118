body:
  text: 宗世林宗世林漢末南陽宗世林與魏武同時而薄其為人不與交及武帝拜司空總朝政從容問宗曰可以交未答曰松柏之志猶存即忤旨見疏位不配德而文帝兄弟每造其門必拜床下其禮重如此出世說禰衡禰衡字正平少與孔文舉作爾汝之交時衡未二十而文舉已五十餘矣出本傳荀巨伯荀巨伯遠看友人疾值胡賊攻郡友人語伯曰吾且死矣子可去伯曰遠來視子令有難而捨之去豈伯行耶賊既至謂伯曰大軍至此一郡俱空汝何人獨止耶伯曰有友人疾不忍委之寧以己身代友人之命賊聞其言異之乃相謂曰我輩無義之人而入有義之國乃偃而退一郡獲全出殷芸小說管寧魏管寧與華歆友善嘗共園中鋤菜見地有黃金一片管揮鋤不顧與瓦石無異華捉而擲之又嘗同席讀書有乘軒冕者過門管讀書如故華廢書出看管割席分坐曰子非吾友也出世說明鈔本作出殷芸小說竹林七賢陳留阮籍譙國嵇康河內山濤三人年相比預此契者沛國劉伶陳留阮咸河內向秀琅琊王戎七人常集于竹林之下肆意酣暢世謂之竹林七賢出世說嵇康嵇康素與呂安友每一相思千里命駕安來值康不在兄喜出迎安不前題門上作鳳字而去喜不悟康至云鳳凡鳥也出語林山濤山濤與嵇阮一面契若金蘭山妻韓氏覺濤與二人異於常交問之濤曰當年可以為友者唯此二人妻曰負羈之妻亦親觀趙狐意欲窺之可乎濤曰可他日二人來勸濤止之宿具酒食妻穿牆視之達旦忘返濤入曰二人何如曰君才致不如正當以識度耳濤曰伊輩亦以我識度為勝出世說王安期晉太傅東海王越鎮許昌以王安期為記室參軍雅相知重敕世子毘曰夫學之所益者淺體之所安者深閒習禮度不如式瞻儀形諷味遺言不如親承旨音王參軍人倫之表汝其師之出世說王敦庾亮見王敦問曰聞君有四友何者為是答曰君家中郎我家太尉阿平胡毋彥國我平故當最劣庾曰似未劣又問何者居其右王曰自有人庾曰何者是王曰噫左右躡庾公知足明鈔本無知足二字知疑當作之乃止出世說孫伯翳齊太原孫伯翳家貧嘗映雪讀書放情物外棲志丘壑與王令君亮范將軍雲為莫逆之交王范既相二朝欲以吏職相處伯翳曰人生百年有如風燭宜怡神養性琴酒寄情安能棲棲役曳若此嵇康所不堪予亦未能也出談藪湘東王繹梁湘東王繹博覽群書才辨冠世不好聲色愛重名賢與河東裴子野蘭陵蕭子雲為布衣之交出談藪唐霍王元軌高祖第十四子也謙慎自守不妄接士在徐州與處士劉玄平為布衣交或問玄平王之所長玄平曰無問者怪而詰之玄平曰夫人有短所以見其長至于霍王無所不備吾何以稱之哉出譚賓錄王方翼涼州長史趙持滿與長孫無忌親許敬宗既陷無忌懼持滿為己患乃誣其同反追至京拷訊嘆曰身可殺辭不可辱吏為代占而結奏遂死獄中尸于城西親戚莫敢收視者王方翼歎曰欒布之哭彭越大義也周文之掩朽骸至仁也絕友之義蔽主之仁何以事君遂具禮葬焉高宗義之而不問出大唐新語吳少微東海人也少負文華與富嘉謨友善少微進士及友善少微進士及七字原闕據唐詩紀事六補第累授晉陽太原尉拜御史時嘉謨疾卒為文哭之其詞嘉謨疾卒為文哭之其詞十字原闕據唐詩紀事六補曰維三月癸丑河南富嘉謨卒于時寢疾于洛陽北里聞時寢疾於洛陽北里聞九字原闕據唐詩紀事六補之投枕枕字原闕據唐詩紀事六補而起淚沾乎衽淚沾乎衽原作疾行乎衫據唐詩紀事六改席匍匐于寢門之外病不能起仰天而呼曰天乎天乎予曷所朋曷有律曷可得而見抑斯文也以存乎哀太常少卿徐公鄜州刺使尹公中書徐元二舍人兵部張郎中說未嘗值我不歎于朝夫情悼之賦詩以寵亡也其詞曰吾友適不死於戲社稷臣直祿非造利常懷大庇人乃無承明藉遘此敦牂春藥礪其可畏皇穹故匪仁疇昔與夫子孰云異天倫同病一相失茫茫不重陳子之文章在其殆尼父新鼓興幹河岳真詞毒鬼神可悲不可朽東輤沒荒榛聖主賢為寶吁茲大國貧詞人莫不歎美既而病亟長歎曰生死人之大分吾何恨焉然官職十分未作其一乃至是耶慷慨而終出御史臺記張說張說之謫岳州也常鬱鬱不樂時宰以說機辨才略互相排擯蘇頲方當大用而張說與瑰善張因為五君詠致書封其詩以遺頲戒其使曰候忌日近暮送之使者既至因忌日齎書至頲門下會積陰累旬近暮吊客至多說先公寮舊頲因覽詩嗚咽流涕悲不自勝翌日乃上封大陳說忠貞謇諤有勤乎王室亦人望所屬不宜淪滯于遐方上乃降璽書勞問俄而遷荊州長史由是陸象先韋嗣立張廷珪賈曾皆以譴逐歲久因加甄收頲常以說父之執友事之甚謹而說重其才器深加敬慕焉出明皇雜錄柳芳柳芳與韋述友善俱為史學述卒後所著書未畢者芳多續成之出國史補杜佑劉禹錫言司徒杜公佑視穆贊也如故人子弟佑見贊為臺丞數彈劾因事戒之曰僕有一言為大郎久計他日少樹敵為佳穆深納之由是少霽威自臺丞起至霽威上原本作因之曰有一言為入郎久蔽為珪穆納之友威今據宋錢易南部新書十補改也出嘉話錄李舟隴西李舟與齊映友善映為將相舟為布衣舟致書于映以交不以貴也時映左遷于夔書曰三十三官足下近年以來宰臣當國多與故人禮絕僕以禮處足下則足下長者僕心未忍欲以故人處足下則慮悠悠之人以僕為諂幾欲修書逡巡至今忽承足下出守夔國為蒼生之望不明鈔本不作則為不幸為足下之謀則名遂身退斯又為難僕知明鈔本知作昧時者謹以為賀但鄱陽雲安道阻且長音塵寂蔑永望增歎僕所病沉痼方率子弟力農與世疏矣足下亦焉能不疏僕耶足下素僕所知其于得喪固恬如也然朝臣如足下者寡矣明主豈當不察之耶唯強飯自愛珍重珍重出摭言白居易白少傅居易與元相國稹友善以詩道著名號元白其集內有哭元相詩云相看掩淚俱無語別有傷心事豈知想得咸陽原上樹已抽三丈白楊枝出北夢瑣言許棠許棠久困名場咸通末馬戴佐大同軍幕棠往謁之一見如舊識留連數月但詩酒而已未嘗問所欲忽一旦大會賓友命使者以棠家書授之棠驚愕莫如其來啟緘乃是戴潛遣一价卹其家矣出摭言陸龜蒙吳郡陸龜蒙字魯望父賓虞進士甲科浙東從事家于蘇臺龜蒙幼精六籍長而攻文與顏蕘皮日休羅隱吳融為益友性高潔家貧思養親之祿與張摶為盧江吳興二郡倅丞相李蔚盧攜景重之羅隱寄龜蒙詩云龍樓李丞相龍樓李丞相五字原空闕據黃本補昔歲仰高文黃閣今無主青山竟不焚蓋嘗有徵聘之意唐末以左拾遺授之詔下之日疾終于家與皮日休為詩友出北夢瑣言顏蕘顏給事蕘謫官歿于湖外未間自草墓志性躁急不能容物其志詞云寓于東吳與吳郡陸龜蒙為詩文之交一紀無渝龜蒙卒為其就木至穴情禮不缺其後即故諫議大夫高公丞之故丞相陸公扆二君于蕘至死不變其餘面交皆如攜手過市見利即解攜而去莫我知也後有吏部尚書薛公貽矩兵部侍郎于公兢中書舍人鄭公撰明鈔本撰作僎三君子者予今日以前不變不知後日見予骨肉孤幼復如何哉出北夢瑣言
