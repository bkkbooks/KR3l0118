body:
  text: 芝竹芝梁簡文延香閣大同十年竹林吐芝長八寸頭蓋似雞頭實黑色其柄似藕柄內通干空皮質皆純白根下微紅雞頭實處似竹節脫之又得脫也自節處別生一重如結网羅四面周可五六寸圓繞周匝以罩柄上相遠不相著也其似結网眾自輕巧可愛其與柄皆得相脫驗仙書與威喜芝相類樓闕芝隋大業中東都永康門內會昌門東生芝草百二十莖散在地周十步許紫莖白頭或白莖黑頭或有枝或無枝亦有三枝如古出字者地內根并如線大道相連著乾陽殿東東上閣門槐樹上生芝九莖共本相扶而生中莖最長兩邊八莖相次而短有如樹闕甚洁白武賁郎將段文操留守圖畫表奏天尊芝唐天寶初臨川郡人李嘉所居柱上生芝草形類天尊太守張景佚截獻之紫芝唐大歷八年盧州廬江縣紫芝生高一丈五尺芝類至多參成芝斷而可續夜光芝一株九實實墜地如七寸鏡夜視如牛目茅君種于句曲山隱晨芝隱晨狀如斗以星為節以莖為网鳳腦芝仙經言穿地六尺以環寶一枚種之灌以黃水五合以土堅筑之三年生苗如匏實如桃五色名鳳腦芝食其實唾地為鳳乘升太极白符芝大雪而白華五德芝如車馬石桂芝生山石穴中似桂樹而實石也高如大絞尺光明而味辛有枝條搗服之一斤得千歲也滴芝少室石戶中更有深谷不可得過以石投谷中半日猶聞其聲也去戶外十余丈有石柱柱上有偃蓋石南度徑可一丈許望之蜜芝從石上隨石偃蓋中良久輒有一滴有似雨屋后之余漏時時一落耳然蜜芝墮不息而偃蓋亦終滴也戶上刻石為科斗字曰得服石蜜芝一斗者壽萬歲諸道士共思惟其處不可得往唯當以碗器置勁竹木端以承取之然竟未有能為之者按此戶上刻題如此前世必已有之者也木芝木芝者松柏脂淪地千歲化為茯苓萬歲其上生小木狀似蓮花名曰木威喜芝夜視有光持之甚滑燒之不焦帶之辟兵以帶雞而雜以雞十二頭籠之去其處十二步射十二箭他雞皆傷帶威喜芝者終不傷也螢火芝良常山有螢火芝其實是草大如豆紫花夜視有光食一枚中心一孔明食至七心七竅洞澈可以夜書肉芝昔有人泊渚登岸忽見蘆葦間有十余昆侖偃臥手足皆動惊報舟人舟人有嘗行海中者識之菌也往視之首皆連地割取食之菌但無七竅抱朴子云肉芝如人形產于地亦此類也何足怪哉小人芝或山中見小人乘車馬長七八寸者肉芝也取服芝即仙矣地下肉芝蘭陵蕭逸人亡其名嘗舉進士下第遂焚其書隱居潭水上從道士學神仙因絕粒吸氣每旦屈伸支體冀延其壽積十年余發盡白色枯而背僂齒有墮者一旦引鏡自視勃然發怒且曰吾棄聲利隱身田野間絕粒吸氣冀得長生今亦衰瘠如是豈我之心哉即還居鄴下學商人逐什一之利凡數年資用大饒為富家后因治園屋發地得物狀類人手肥而且潤色微紅逸人得之惊曰豈非禍之芽且吾聞太歲所在不可興土事脫有犯者當有修肉出其下固不祥也今果有奈何然吾聞得肉食之或可以免于是烹而食味甚美食且盡自是逸人聽視明力愈壯貌愈少發之禿者盡黰然而長矣齒之墮者亦駢然而生矣逸人默自奇異不敢告于人后有道士至鄴下逢逸人惊曰先生嘗得餌仙藥乎何神氣清晤如是道士因診其脈久之又曰先生嘗食靈芝矣夫靈芝狀類人手肥而且潤色微紅者是也逸人悟其事以告道士賀曰先生之壽可與龜鶴齊矣然不宜居塵俗間當退休山林棄人事神仙可致逸人喜而從其語遂去竟不知所在異菌唐開成元年春段成式修行里思第書齋前有枯紫荊數株蠹折因伐之余尺許至三年秋枯根上生一菌大如斗下布五足頂黃白兩暈綠垂裙如鵝高尺余至冬色變黑而死焚之氣如茅香成式嘗置香爐于蘗台上念經問僧以為善徵后覽諸志怪南齊吳郡褚思庄素奉釋氏眠于梁下短柱是柟木去地四尺余有節大明中忽有一物如芝生于節上黃色鮮明漸漸長數日遂成千佛狀面目指爪及光相衣服莫不宛具如金鐷隱起摩之殊軟嘗以春末落落時佛形如故但色褐耳至落時其家貯之箱中積五年思庄不复住其下亦無他顯盛闔門壽老思庄父終九十七兄年七十健如壯年石菌宋州莆田縣破崗山唐武宗二年巨石上生菌大如合簣莖及蓋黃白色其下淺紅盡為過僧所食云美倍諸菌竹肉江淮有竹肉如彈丸味如白雞代北又有大樹雞如杯棬呼為胡獼頭盧山有石耳性熱毒菌江夏漢陽縣出毒菌號茹閭非茅搜也每歲供進縣司常令人于田野間候之苟有此菌即立表示人不敢從下風而過避其氣也采之日以竹竿芟倒遽舍竿于地毒氣入竹一時爆裂直候毒歇仍以櫸柳皮蒙手以取用氈包之亦櫸柳皮重裹縣宰封印在而進其繼致役夫倍給其直為其道路多為毒薰以致頭痛也張康隨侍其父宰漢陽備言之人有為野菌所毒而笑者煎魚椹汁服之即愈僧光遠說也苔苔錢亦謂之澤葵又名董錢草亦呼為宣癬南人呼為垢草地錢葉圓莖細有蔓多生溪澗邊一曰積雪草亦曰連錢草蔓金苔晉梨國獻蔓金苔色如金若螢火之聚大如雞卵投之水中蔓延波瀾之上光出照日皆如火生水上也乃于宮中穿池廣百步時時觀此苔以樂宮人宮人有幸者則以金苔賜之以置漆碗中照耀滿室名曰夜明苔著衣襟則如火光矣帝慮外人得之炫惑百姓詔使除苔塞池及皇家喪亂猶有此物皆入胡中如苣苔慈恩寺唐三藏院后檐楷開成末有苔狀如古苣布于磚上色如藍綠輕軟可愛談論僧義林大和初改葬基法師初開冢香氣襲人側臥磚台上形如生磚上苔厚二寸余作金色氣如爇檀石發張乘言南中水底有草如石發每月三四日始生至八九已后可采及月盡悉爛似隨月盛衰也瓦松廣雅在屋曰昔耶在牆曰垣衣廣志謂之蘭香生于久屋之瓦魏明帝好之命長安西載其瓦于洛陽以覆屋前后詞人詩中多用昔耶梁簡文帝詠薇曰緣階覆碧綺依檐映昔耶或言构木上多松栽土木氣泄則瓦生松大歷中修含元殿有一人投狀請瓦且言瓦工唯我所能祖父時嘗瓦此殿矣眾工不能服因曰若有能瓦畢不生瓦松乎眾方服焉又有李阿黑者亦能治屋布瓦如齒間不通綖亦無瓦松本草瓦衣謂之屋游瓦松賦崔融瓦松賦序云崇文館瓦松者產于屋溜之下謂之木也訪山客而未詳謂之草也驗農皇而罕記賦云煌煌特秀狀金芝之產溜歷歷虛懸若星榆之種天葩條郁毓根祗連拳間紫苔而裛露凌碧瓦而含煙又曰慚魏宮之烏悲恧漢殿之紅蓮崔公學博無不該悉豈不知瓦松已有著說乎
