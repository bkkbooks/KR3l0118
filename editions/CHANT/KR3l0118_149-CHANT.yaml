body:
  text: 麴思明麴思明趙冬曦任吏部尚書吏部參選事例每年銓曹人吏舊例各合得一員外及論薦親族眾人皆悉論請有令史麴思明一人二年之內未嘗有言冬曦謂曰銓曹往例各合得一官或薦他人亦得思明又不言但唯而退冬曦益怪之一日又召而謂曰以某今日之勢三千餘人選客某下筆即能自貧而富捨賤而貴饑之飽之皆自吾筆人人皆有所請而子獨不言何也思明曰夫人生死有命富貴關天官職是當來之分未遇何以悵然三千之人一官一名皆是分定只假尚書之筆思明自知命未亨通不敢以閑事撓於尚書冬曦曰如子之言當賢人也兼能自知休咎耶思明曰賢不敢當思明來年始合於尚書下授一官所以未能有請也冬曦曰來年自授何官思明曰此乃忘之矣冬曦曰如何思明曰今請於階下書來年於尚書下授官月日及請授俸料多少亦請尚書同封記請壞廳上壁內書記卻泥封之若來年授官日一字參差請死於階下乃再拜而去冬曦雖不言心常怪之妄誕常擬與注別異一官忽一日上幸溫泉見白鹿昇天遂改會昌縣為昭應敕下吏部令注其官冬曦遂與思明注其縣焉及事畢乃召而問之曰昨上幸溫泉白鹿昇天改其縣為昭應其縣與長安萬年不殊今為注其官子且妄語豈能先知此乎思明拜謝曰請尚書壞壁驗之遂乃拆壁開封看題云來年某月日上幸溫泉改其縣為昭應蒙注授其官及所請俸料一無差謬冬曦甚驚異之自後凡有事皆發使問之莫不神驗冬曦罷吏部差人問思明當更得何官思明報云向西得一大郡且卻後旬日上召冬曦問江西風土冬曦奏對稱旨乃曰冬曦真豫章父母遂除江南觀察使到郡之後有事發使問之無不剋應卻後二年疾病危篤差人問之思明報云可部署家事冬曦知其不免其疾危困而卒出會昌解頤馬遊秦吏部令史馬遊秦開元中以年滿當選時侍郎裴光庭以本銓舊吏問其所欲遊秦不對固問之曰某官已知矣不敢復有所聞光庭曰當在我安得之遊秦不答亦無懼色光庭怒曰既知可以言乎遊秦曰此可誌之未可言之乃命疏其目藏於楹棟之間期注唱後而發之後老君見於驪山鑾輿親幸其地因改會昌縣為昭應縣光庭以舊無昭應之名謂遊秦莫得而知也遂補其縣錄事及唱官之日發棟間所誌之書則如其言爾出前定錄蕭華雖陷賊賊原作城據明鈔本改中李泌嘗薦之後泌歸山肅宗終相之唯舉薛勝掌綸誥終不行或問於泌泌云勝官卑難於發端乃置其拔河賦於案冀肅宗覽之遂更薦肅宗至果讀之不稱旨曰天子者君父而以天子玉齒對金錢熒煌乎他日復薦終不得信命也出感定錄一行沙門一行開元中嘗奏玄宗云陛下行幸萬里聖祚無疆故天寶中幸東都庶盈萬數及上幸蜀至萬里橋方悟焉出傳載術士玄宗時有術士云判人食物一一先知公卿競延接唯李大夫栖筠不信召至謂曰審看某明日餐何物術者良久曰食兩盤糕糜二十碗橘皮湯李笑乃遣廚司具饌明日會諸朝客平明有教教明鈔本陳校本作敕召對上謂曰今日京兆尹進新糯米原本米下有糕字據明鈔本刪得糕糜卿且唯唯字明鈔本陳校本作住喫良久以金盤盛來李拜而餐對御強食上喜曰卿喫甚美更賜一盤又盡既罷歸腹疾大作諸物絕口唯喫橘皮湯至夜半方愈忽記術士之言謂左右曰我喫多少橘皮湯曰二十碗矣嗟嘆久之遽邀術士厚與錢帛出逸史杜鵬舉杜相鴻漸之父名鵬舉父子而似兄弟之名蓋有由也鵬舉父原本無父字據明鈔本補嘗夢有所之見一大碑云是宰相碑已作者金填其字未者刊名於柱上有杜家兒否曰有任自看之視之記得姓下有鳥偏旁曳腳而忘其字乃名子為鵬舉而謂之曰汝不為相即世世名字當鳥旁而曳腳也鵬舉生鴻漸而名字亦前定矣況其官與壽乎出集話錄李栖筠李大夫栖筠未達將赴選時揚州田山人煙霞之士也頗有前知往見之問所得官答曰宣州溧陽尉李公曰某朝列之內亦有親故所望之官實不至此良久曰勝則不可某亦未審將一書與楚州白鶴觀張尊師師當知矣李公至尋得觀院蒿蓁塞逕若無人居扣門良久方有應者乃引入見張生甚古叟曰田子無端妄相告郎君語郎君豈不要知官否彼云何曰宣州溧陽尉曰否魏州館陶主簿然已後任貴聲華暄赫無介意於此也及到京授溧陽尉李公驚異以為張道士之言不中數日敕破銓注改館陶主簿乃知田張相為發明後兩人皆不知所之田生弟作江州司馬名士顒出逸史杜思溫貞元初有太學生杜思溫善鼓琴多遊於公侯門館每登臨宴往往得與嘗從賓客夜宿城苟家觜中夜山月如晝而遊客皆醉思溫獨攜琴臨水閑泛忽有一叟支頤來聽思溫謂是座客殊不回顧及曲罷乃知非向者同遊之人遽置琴而起老人曰少年勿怖余是秦時河南太守梁陟也遭難身沒於此中平生好鼓琴向來聞君撫琴絃軫清越故來聽耳知音難遇無辭更為我彈之思溫奏為沉湘老人曰此弄初成吾嘗尋之其間音指稍異此思溫因求其異隨而正之聲韻涵古又多怨切時人莫之聞也叟因謂思溫曰君非太學諸生乎曰然叟曰君何不求於名譽而常為王門之伶人乎思溫竦然曰受教且問窮達之事叟曰余之少子主管人間祿籍當為君問之此後二日當再會於此至期而思溫往見叟亦至焉乃告曰惜哉君終不成名亦無正官然有假祿在巴蜀一十九年俸入不絕然慎勿為武職當有大禍非禳所免誌之誌之言訖遂不見思溫明年又下第遂罷舉西遊抵成都以所藝謁韋令公公甚重之累署要籍隨軍十七八年所請雜俸月不下二萬又娶大將軍女車馬第宅甚盛而妻父嘗欲思溫在轅門思溫記老人之言輒辭不就後二日密請韋令公遂補討擊使牒出方告不敢復辭而常懼禍至求為遠使竟不果及劉闢反叛時思溫在鹿頭城城陷為官軍所殺家族不知所在也出前定錄柳及河南人貞元中進士登科殊之子也家於澧陽嘗客遊至南海元帥以其父有名於搢紳士林間俾假掾於廣未幾娶會長岑氏之女生一男名甑甑及以親老家遠不克迎候乃攜妻子歸寧於澧陽未再歲後以家給不足單車重遊南中至則假邑於蒙於武仙再娶沈氏會公事之郡獨沈氏與母孫氏在縣廨時當秋夜分之後天晴月皎忽於牖中見一小兒手招沈氏曰無懼無懼某幾郎子也告說事狀歷然可聽沈氏以告其母母乃問是何人有何所請答曰某甑甑也以去年七月身死故來辭別凡人夭逝未滿七歲者以生時未有罪狀不受業報縱使未即托生多為天曾權祿驅使某使當職役但送文書來往地府耳天曹記人善惡每月一送地府其間有暇亦得閒行沈氏因告曰汝父之郡會計亦當即至俄爾及歸沈氏具告及固不信曰荒徼之地當有妖怪假托人事殆非山精木魅之所為乎其夕即又於牖間以手招及及初疑尚正辭詰之乃聞說本末知非他鬼乃歔欷涕泗因詢其夭橫之由答曰去年七月中戲弄得痢疾醫藥不救以致於此亦命也今為天曹收役亦未有托生之期及曰汝既屬冥司即人生先定之事可知也試為吾檢窮達性命一來相告答云諾後夕乃至曰冥官有一大城貴賤等級咸有本位若棋布焉世人將死或半年或數月內即先於城中呼其名時甑甑已聞呼父名也輒紿而對既而私謂沈氏曰阿爺之名已被呼矣非久在人間他日有人求娶沈氏者慎勿許之若有姓周職在軍門者即可許之必當偕老衣食盈羨其餘所述近事無不徵驗後一夕又來曰某以拘役有限不得到人間從此永訣矣言詞悽愴歔欷而去後四月及果卒沈氏尋亦萍泊南海或有求納者輒不就後有長沙小將姓周者部本郡錢帛貨殖於廣州求娶沈氏一言而許之至今在焉平昌孟弘微與及相識具錄其事出前定錄韋泛韋泛者不知其所來大曆初罷潤州金壇縣尉客遊吳興維舟於興國佛寺之水岸時正月望夜士女繁會泛方寓目忽然暴卒縣吏捕驗其事未已再宿而甦云見一吏持牒來云府司追遂與之同行約數十里忽至一城兵衛甚嚴入見多是親舊往還泛驚問吏曰此何許也吏曰此非人間也泛方悟死矣俄見數騎呵道而來中有一人衣服鮮華容貌甚偉泛前視之乃故人也驚曰君何為來此曰為吏所追其人曰某職主召魂未省追子因思之曰嘻誤矣所追者非追君也乃兗州金鄉縣尉韋泛也遽叱吏送之歸泛既喜得返且恃其故人因求其祿壽其人不得已密謂一吏引於別院立泛於門吏入持一丹筆來書其左手曰前楊復後楊後楊年年強七月之節歸玄鄉泛既出前所追吏亦送之既醒具述其事沙門法寶好異事盡得其實因傳之後六年以調授太原楊曲縣主簿秩滿至京師適遇所親與鹽鐵使有舊遂薦為楊子縣巡官在職五年建中元年六月二十八日將赴選以暴疾終於廣陵旅舍其日乃立秋日也出前定錄
