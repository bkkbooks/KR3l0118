body:
  text: 任氏任氏女妖也有韋使君者名崟第九信安王禕之外孫少落拓好飲酒其從父妹婿曰鄭六不記其名早習武藝亦好酒色貧無家托身于妻族與崟相得游處不間唐天寶九年夏六月崟與鄭子偕行于長安陌中將會飲于新昌里至宣平之南鄭子辭有故請間去繼至飲所崟乘白馬而東鄭子乘驢而南入升平之北門偶值三婦人行于道中中有白衣者容色殊麗鄭子見之惊悅策其驢忽先之忽后之將挑而未敢白衣時時盼睞意有所受鄭子戲之曰美艷若此而徒行何也白衣笑曰有乘不解相假不徒行何為鄭子曰劣乘不足以代佳人之步今輒以相奉某得步從足矣相視大笑同行者更相眩誘稍已狎暱鄭子隨之東至樂游園已昏黑矣見一宅土垣車門室宇甚嚴白衣將入顧曰愿少踟躕而入女奴從者一人留于門屏間問其姓第鄭子既告亦問之對曰姓任氏第二十少頃延入鄭縶驢于門置帽于鞍始見婦人年三十余與之承迎即任氏姊也列燭置膳舉酒數觴任氏更妝而出酣飲极歡夜久而寢其妍姿美質歌笑態度舉措皆艷殆非人世所有將曉任氏曰可去矣某兄弟名系教坊職屬南衙晨興將出不可淹留乃約后期而去既行及里門門扃未發門旁有胡人鬻餅之舍方張燈熾爐鄭子憩其帘下坐以候鼓因與主人言鄭子指宿所以問之曰自此東轉有門者誰氏之宅主人曰此隤墉棄地無第宅也鄭子曰適過之曷以云無與之固爭主人適悟乃曰吁我知之矣此中有一狐多誘男子偶宿嘗三見矣今子亦遇乎鄭子赧而隱曰無質明复視其所見土垣車門如故窺其中皆蓁荒及廢圃耳既歸見崟崟責以失期鄭子不泄以他事對然想其艷冶愿复一見之心嘗存之不忘經十許日鄭子游入西市衣肆瞥然見之曩女奴從鄭子遽呼之任氏側身周旋于稠人中以避焉鄭子連呼前迫方背立以扇障其后曰公知之何相近焉鄭子曰雖知之何患對曰事可愧恥難施面目鄭子曰勤想如是忍相棄乎對曰安敢棄也懼公之見惡耳鄭子發誓詞旨益切任氏乃回眸去扇光彩艷麗如初謂鄭子曰人間如某之比者非一公自不識耳無獨怪也鄭子請之與敘歡對曰凡某之流為人惡忌者非他為其傷人耳某則不然若公未見惡愿終己以奉巾櫛鄭子許與謀栖止任氏曰從此而東陋不門巷幽靜可稅以居前時自宣平之南乘白馬而東者非君妻之昆弟乎其家多什器可以假用是時崟伯叔從役于四方三院什器皆貯藏之鄭子如言訪其舍而詣崟假什器問其所用鄭子曰新獲一麗人已稅得其舍假其以備用崟笑曰觀子之貌必獲詭陋何麗之絕也崟乃悉假帷帳榻席之具使家僮之惠黠者隨以覘之俄而奔走返命氣吁汗洽崟迎問之有乎曰有又問容若何曰奇怪也天下未嘗見之矣崟姻族廣茂且夙從逸游多識美麗乃問曰孰若某美僮曰非其倫也崟遍比其佳者四五人皆曰非其倫是時吳王之女有第六者則崟之內妹穠艷如神仙中表素推第一崟問曰孰與吳王家第六女美又曰非其倫也崟撫手大駭曰天下豈有斯人乎遽命汲水澡頸巾首膏唇而往既至鄭子適出崟入門見小童擁篲方掃有一女奴在其門他無所見征于小僮小僮笑曰無之崟周視室內見紅裳出于戶下迫而察焉見任氏戢身匿于扇間崟引出就明而觀之殆過于所傳矣崟愛之發狂乃擁而凌之不服崟以力制之方急則曰服矣請少回旋既從則捍御如初如是者數四崟乃悉力急持之任氏力竭汗若濡雨自度不免乃縱體不复拒抗而神色慘變崟問曰何色之不悅任氏長歎息曰鄭六之可哀也崟曰何謂對曰鄭生有六尺之驅而不能庇一婦人豈丈夫哉且公少豪侈多獲佳麗遇某之比者眾矣而鄭生窮賤耳所稱愜者唯某而已忍以有余之心而奪人之不足乎哀其窮餒不能自立衣公之衣食公之食故為公所系耳若糠糗可給不當至是崟豪俊有義烈聞其言遽置之斂衽而謝曰不敢俄而鄭子至與崟相視咍樂自是凡任氏之薪粒牲餼綿崟給焉任氏時有經過出入或車馬輿步不常所止崟日與之游甚歡每相狎暱無所不致唯不及亂而已是以崟愛之重之無所怪惜一食一飲未嘗忘焉任氏知其愛己因言以謝曰愧公之見愛甚矣顧以陋質不足以答厚意且不能負鄭生故不得遂公歡某秦人也生長秦城家本伶倫中表姻族多為人寵媵以是長安狹斜悉與之通或有殊麗悅而不得者為公致之可矣愿持此以報德崟曰幸甚廛中有鬻衣之婦曰張十五娘者肌體凝洁崟常悅之因問任氏識之乎對曰是某表娣妹致之易耳旬余果致之數月厭罷任氏曰市人易致不足以展效或有幽絕之難謀者試言之愿得盡智力焉崟曰昨者寒食與二三子游于千福寺見刁將軍緬張樂于殿堂有善吹笙者年二八雙鬟垂耳嬌姿艷絕當識之乎任氏曰此寵奴也其母即妾之內姊也求之可也崟拜于席下任氏許之乃出入刁家月余崟促問其計任氏愿得雙縑以為賂崟依給焉后二日任氏與崟方食而緬使蒼頭控青驪以迓任氏任氏聞召笑謂崟曰諧矣初任氏加寵奴以病針餌莫減其母與緬憂之方甚將征諸巫任氏密賂巫者指其所居使言從就為吉及視疾巫曰不利在家宜出居東南某所以取生氣緬與其母詳其地則任氏之第在焉緬遂請居任氏謬辭以逼狹勤請而后許乃輦服玩并其母偕送于任氏至則疾愈未數日任氏密引崟以通之經月乃孕其母懼遽歸以就緬由是遂絕他日任氏謂鄭子曰公能致錢五六千乎將為謀利鄭子曰可遂假求于人獲錢六千任氏曰鬻馬于市者馬之股有疵可買以居之鄭子如市果見一人牽馬求售者青在左股鄭子買以歸其妻昆弟皆嗤之曰是棄物也買將何為無何任氏曰馬可鬻矣當獲三萬鄭子乃賣之有酬二萬鄭子不與一市盡曰彼何苦而貴買此何愛而不鬻鄭子乘之以歸買者隨至其門累增其估至二萬五千也不與曰非三萬不鬻其妻昆弟聚而詬之鄭子不獲已遂賣卒不登三萬既而密伺買者征其由乃昭應縣之御馬疵股者死三歲矣斯吏不時除籍官征其估計錢六萬設其以半買之所獲尚多矣若有馬以備數則三年芻粟之估皆吏得之且所償蓋寡是以買耳任氏又以衣服故弊乞衣于崟崟將買全綵與之任氏不欲曰愿得成制者崟召市人張大為買之使見任氏問所欲張大見之惊謂崟曰此必天人貴戚為郎所竊且非人間所宜有者愿速歸之無及于禍其容色之動人也如此竟買衣之成者而不自紉縫也不曉其意后歲余鄭子武調授槐里府果毅尉在金城縣時鄭子方有妻室雖晝游于外而夜寢于內多恨不得專其夕將之官邀與任氏俱去任氏不欲往曰旬月同行不足以為歡請計給糧餼端居以遲歸鄭子懇請任氏愈不可鄭子乃求崟資助崟與更勸勉且詰其故任氏良久曰有巫者言某是歲不利西行故不欲耳鄭子甚惑也不思其他與崟大笑曰明智若此而為妖惑何哉固請之任氏曰倘巫者言可征徒為公死何益二子曰豈有斯理乎懇請如初任氏不得已遂行崟以馬借之出祖于臨皋揮袂別去信宿至馬嵬任氏乘馬居其前鄭子乘驢居其后女奴別乘又在其后是時西門圉人教獵狗于洛川已旬日矣適值于道蒼犬騰出于草間鄭子見任氏欻然墜于地复本形而南馳蒼犬逐之鄭子隨走叫呼不能止里余為犬所獲鄭子銜涕出囊中錢贖以瘞之削木為記回睹其馬嚙草于路隅衣服悉委于鞍上履襪猶懸于鐙間若蟬蛻然唯首飾墜地余無所見女奴亦逝矣旬余鄭子還城崟見之喜迎問曰任子無恙乎鄭子泫然對曰歿矣崟聞之亦慟相持于室盡哀徐問疾故答曰為犬所害崟曰犬雖猛安能害人答曰非人崟駭曰非人何者鄭子方述本末崟惊訝歎息不能已明日命駕與鄭子俱適馬嵬發瘞視之長慟而歸追思前事唯衣不自制與人頗異焉其后鄭子為總監使家甚富有櫪馬十余匹年六十五卒大歷中沈既濟居鐘陵嘗與崟游屢言其事故最詳悉后崟為殿中侍御史兼隴州刺史遂歿而不返嗟乎異物之情也有人道焉遇暴不失節徇人以至死雖今婦人有不如者矣惜鄭生非精人徒悅其色而不征其情性向使淵識之士必能揉變化之理察神人之際著文章之美傳要妙之情不止于賞玩風態而已惜哉建中二年既濟自左拾遺與金吾將軍裴冀京兆少尹孫成戶部郎中崔需右拾遺陸淳皆謫居東南自秦徂吳水陸同道時前拾遺朱放因旅游而隨焉浮穎涉淮方舟沿流晝宴夜話各征其異說眾君子聞任氏之事共深歎駭因請既濟傳之以志異云沈既濟撰李萇唐天寶中李萇為絳州司士攝司戶事舊傳此闕素凶廳事若有小孔子出者司戶必死天下共傳司戶孔子萇自攝職便處此廳十余日兒年十余歲如廁有白裙婦人持其頭將上牆人救獲免忽不复見萇大怒罵空中以瓦擲中萇手表弟崔氏為本州參軍是日至萇所言此野狐耳曲沃饒鷹犬當大致之俄又擲糞于崔杯中后數日犬至萇大獵獲狡狐數頭懸于檐上夜中聞檐上呼李司士云此是狐婆作祟何以枉殺我娘兒欲就司士一飲明日可具觴相待萇云己正有酒明早來及明酒具而狐至不見形影具聞其言萇因與交杯至狐其酒翕然而盡狐累飲三斗許萇唯飲二升忽言云今日醉矣恐失禮儀司士可罷狐婆不足憂矣明當送法禳之翌日萇將入衙忽聞檐上云領取法尋有一團紙落萇便開視中得一帖令施燈于席席后乃書符符法甚備萇依行之其怪遂絕
