body:
  text: 柳歸舜柳歸舜吳興柳歸舜隋開皇二十年自江南抵巴陵大風吹至君山下因維舟登岸尋小徑不覺行四五里興酣踰越磎澗不由徑路忽道傍有一大石表裏洞徹圓而砥平周匝六七畝其外盡生翠竹圓大如盎高百餘尺葉曳白雲森羅映天清風徐吹戛為絲竹音石中央又生一樹高百尺條幹偃陰為五色翠葉如盤花徑尺餘色深碧蘂深紅異香成煙著物霏霏有鸚鵡數千丹嘴翠衣尾長二三尺翱翔其間相呼姓字音旨清越有名武遊郎者有名阿蘇兒者有名武仙郎者有名自在先生者有名踏蓮露者有名鳳花臺者有名戴蟬兒者有名多花子者或有唱歌者曰吾此曲是漢武鉤弋夫人常所唱詞曰戴蟬兒分明傳與君王語建章殿裏未得歸朱箔金缸雙鳳舞名阿蘇兒者曰我憶阿嬌深宮下淚唱曰昔請明鈔本無請字司馬相如為作長門賦徒使費百金君王終不顧又有誦誦原作詞據明鈔本改司馬相如大人賦者曰吾初學賦時為趙昭儀抽七寶釵橫鞭余痛不徹今日誦得還是終身一藝名武遊郎者言余昔見漢武帝乘鬱金楫泛積翠池自吹紫玉笛音韻朗暢帝意歡適李夫人歌以隨歌曰顧鄙賤奉恩私願吾君萬歲期又名武仙郎者問歸舜曰君何姓氏行第歸舜曰姓柳第十二曰柳十二自何處來歸舜曰吾將至巴陵遭風泊舟興酣至此耳武仙郎曰柳十二官偶因遭風得臻異境此所謂因病致妍耳然下官禽鳥不能致力生人為足下轉達桂家三十娘子因遙呼曰阿春此間有客即有紫雲數片自西南飛來去地丈餘雲氣漸散遂見珠樓翠幕重檻飛楹周匝石際一青衣自戶出年始十三四身衣珠翠顏甚姝美謂歸舜曰三十娘子使阿春傳語郎君貧居僻遠勞此檢校不知朝來食否請垂略坐以具蔬饌即有捧水精床出者歸舜再讓而坐阿春因教鳳花臺鳥何不看客三十娘子以黃郎不在不敢接對郎君汝若等閒似前度受捶有一鸚鵡即飛至曰吾乃鳳花臺也近有一篇君能聽乎歸舜曰平生所好實契所願鳳花臺乃曰吾昨過蓬萊玉樓因有一章詩曰露接朝陽生海波翻水晶玉樓瞰寥廓天地相照明此時下棲止投跡依舊楹顧余復何忝日侍群仙行歸舜曰麗則麗矣足下師乃誰人鳳花臺曰僕在王丹左右一千餘歲杜蘭香教我真籙東方朔授我秘訣漢武帝求太中大夫遂在石渠署見揚雄王褒等賦頌始曉箴論王莽之亂方得還吳後為朱然所得轉遺陸遜復見機雲制作方學綴篇什機雲被戮便至於此殊不知近日誰為宗匠歸舜曰薛道衡江總也因誦數篇示之鳳花臺曰近代非不靡麗殊少骨氣俄而阿春捧赤玉盤珍羞萬品目所不識甘香裂鼻飲食訖忽有二道士自空飛下顧見歸舜曰大難得與鸚鵡相對君非柳十二乎君船以風便索君甚急何不促回因投一尺綺曰以此掩眼即去矣歸舜從之忽如身飛卻墜巴陵達舟所舟人欲發問之失歸舜已三日矣後卻至此泊舟尋訪不復再見也出續玄怪錄元藏幾處士元藏幾自言自言原作言自據明鈔本改後魏清河孝王之孫也隋煬帝時官任奉信郎大業九年為過海使判官無何風浪壞船黑霧四合同濟者皆不免而藏幾獨為破木所載殆經半月忽達於洲島間洲人問其從來則瞀然具以事告洲人曰此滄洲去中國已數萬里乃出菖蒲花桃花酒飲之而神氣清爽其洲方千里花木常如二月地土宜五穀人多不死出鳳凰孔雀靈牛神馬之屬更產分蒂瓜長二尺其色如椹二杜陽雜編下二作一顆二蒂有碧棗丹栗皆大如梨其洲人多衣縫掖衣戴遠遊冠與之話中國事則歷歷如在目前所居或金闕銀臺玉樓紫閣奏簫韶之樂飲香露之醑洲上有久視之山山下出澄水泉其泉闊一百步亦謂之流渠雖投之金石終不沉沒故洲人以瓦鐵為船舫更有金池方十數里水石泥沙皆如金色其中有四足魚今刑部盧員外尋云金義嶺有池如盆其中有魚皆四足又有金蓮花洲人研之如泥以間彩繪光輝煥爛與真無異但不能拒火而已更有金莖花如蝶每微風至則搖蕩如飛婦人競採之以為首飾且有語曰不戴金莖花不得在仙家更以強木造船其上多飾珠玉以為遊戲強木不沉木也方一尺重八百斤巨石縋之終不沒藏幾淹留既久忽念中國洲人遂製凌風舸以送焉激水如箭不旬即達于東萊問其國乃皇唐也詢其年號即貞元也訪其鄉里榛蕪也追其子孫疎屬也有隋大業元年至貞元年末已二百年矣有二鳥大類黃鸝每翔翥空中藏幾呼之即至或令銜珠或令受人語乃謂之轉言鳥出滄州也藏幾工詩好酒混俗無拘檢十數年間遍遊江表人莫之知而趙歸真常與藏幾弟子九華道士葉通微相遇求得其實歸真以藏幾之異備奏上上令謁者齎手詔急徵及至中路忽然亡去謁者惶恐即上疏具言其故上覽疏咨嗟曰朕不如明皇帝以降異人後有人見藏幾泛小舟於海上至今江表道流大傳其事焉出杜陽編文廣通文廣通者辰溪縣滕村人也縣屬辰州泝州一百里北岸次有滕村廣通居焉本漢辰陵縣武陵記云廣通以宋元嘉二十六年見有野猪食其稼因舉弩射中之流血而走尋血跡越十餘里入一穴中行三百許步豁然明曉忽見數百家居止莫測其由來視所射猪已歸村人圈中俄有一叟出門云汝非射吾猪者乎文曰猪來犯僕非僕犯猪翁曰牽牛蹊人之田信有罪矣而奪之牛者罪又重矣文因稽首謝過翁云過而知改是無過矣此猪前緣應有其報君無謝焉翁呼文通至廳上見十數書生皆冠章甫之冠服縫掖之衣有博士獨一榻面南談老子又見西齋有十人相對彈一絃琴而五聲自韻有童子酌酒呼令設客文飲半酣四體怡然因爾辭退觀其墟陌人事不異外間覺其清虛獨遠自是勝地徘徊欲住翁乃遣小兒送之令堅關門勿復令外人來也文與小兒行問其始末答曰彼諸賢避夏桀難來此因學道得仙獨榻座談老子者昔河上公也僕漢時山陽王輔嗣至此請問老子滯義僕自掃門已來於茲十紀始蒙召進得預門人猶未深受要訣只令守門至洞口分別慇懃自言相見未期文通自所入處見所用弩皆已朽斷初謂少頃已十二年矣文通家已成喪訖聞其歸乃舉村驚疑明日與村人尋其穴口唯見巨石塞之燒鑿不可為攻焉出神仙感遇傳楊伯醜馮翊武鄉人好讀易隱於華山隋開皇初文帝搜訪逸隱聞其有道徵至京師見公卿不為禮人無貴賤皆汝之人不能測帝賜衣著至朝堂捨之而去常被發徉狂遊行市里形體垢穢未嘗櫛沐亦開肆賣卜卦無不中有人失馬詣伯醜卜之伯醜方為太子所召在途遇之立為作卦曰可於西市東壁南第三店為我買魚作鱠如其言詣所指店中果有人牽所失馬而至遂擒之何妥嘗與論易聞妥之言笑曰何用鄭玄王弼之言乎於是別別原作測據明鈔本改理辨答思理玄妙大異先儒之旨論者謂其有玄機因問其所學曰太華之下金天洞中我曾受羲皇所教之易與大道玄同理窮眾妙豈可與世儒常談而測神仙之旨乎數年復歸華山上後世世有人見之出仙傳拾遺劉法師唐貞觀中華陰雲臺觀有劉法師者鍊氣絕粒迨二十年每三元設齋則見一人衣縫掖回黧瘦來居末坐齋畢而去如此者十餘年而衣服顏色不改法師異而問之對曰余姓張名公弼住蓮花峰東隅法師意此處無人之境請同往公弼怡然許之曰此中甚樂師能便住亦當無悶法師遂隨公弼行三二十里扳蘿攀葛纔有鳥徑其崖谷嶮絕雖猿不能過也而公弼履之若夷途法師從行亦無難遂至一石壁削成高直千余仞下臨無底之谷一逕闊數寸法師與公弼側足而立公弼乃以指扣石壁中有人問曰為誰對曰某遂劃然開一門門中有天地日月公弼將入法師隨公弼亦入其人乃怒謂公弼曰何故引外人來其人因闔門則又成石壁矣公弼曰此非他人乃雲臺劉法師也與余久故故請此來何見拒之深也又開門納公弼及法師公弼曰法師此來甚饑君可豐食遣之其人遂問法師便住否法師請以後期其人遂取一盂水以肘後青囊中刀圭粉和之以飲法師其味甚甘香飲畢而飢渴之想頓除矣公弼曰余昨云山中甚樂君盍為戲令法師觀之其人乃以水噀東谷中俄有蒼龍白象各一對舞舞甚妙威鳳綵鸞各一對歌歌甚清頃之公弼送法師廻師卻顧唯見青崖丹壑向之歌舞一無所覩矣及去觀將近公弼乃辭法師至觀處置事畢卻尋公弼則步步險阻杳不可階法師痛恨前者不住號天叫地遂成腰疾公弼更不復至矣出續玄怪錄
