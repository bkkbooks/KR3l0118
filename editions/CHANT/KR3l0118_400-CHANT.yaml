body:
  text: 金金西方日官之外有山焉其長十余里廣二三里高百餘丈皆大黃之金其色殊美不雜土石不生草木上有金人高五丈余皆純金名曰金犀入山下一丈有銀又入一丈有錫又入一丈有鉛又入一丈有丹陽銅丹陽銅似金可鍛以作錯涂之器也淮南子術曰餌丹陽之為金也翁仲儒漢時翁仲儒家貧力作居渭川一旦天雨金十斛于其家于是與王侯爭富今秦中有雨金翁世世富霍光漢宣帝嘗以皂蓋車一乘賜大將軍霍光悉以金鉸飾之每夜車轄上有金鳳凰飛去莫如所至曉乃還守車人亦見之南郡黃君仲于北山羅鳥得一小鳳子入手便化成紫金毛羽翅宛然具足可長尺余守車人列云車轄上鳳凰常夜飛去曉則俱還今曉不還恐為人所得光甚異之具以列上后數日君仲詣闕上金鳳凰子帝聞而疑之以置承露盤倏然飛去帝使人尋之直入光家至車轄上乃知信然帝取其車每游行輒乘之故嵇康游仙詩云翩翩鳳轄逢此网羅是也陳爵漢永平十一年廬江皖侯國有湖皖氏小兒曰陳爵陳挺年皆十歲以上相與釣于湖涯挺先釣爵往問挺曰釣寧得乎挺曰得爵歸取竿綸去挺三十步所見湖涯有酒樽色正黃沒水爵以為銅也涉取之滑重不能舉挺望見共取之竟不能得人入深淵中流顧見如錢等正黃數百千枚即共掇摭各得滿手走歸示其家爵父國故吏字君賢惊曰安得此爵言其狀君賢曰此黃金也即馳與爵俱往到金處水中尚多賢自涉水掇取爵挺鄰伍并聞俱競采之合得十余斤賢言于相相言太守遣吏收取遣門下掾裕躬奉獻且言得金狀苻堅前秦苻堅建元五年長安樵人于城南見金鼎走白堅堅遣載取到城化為銅鼎雩都縣人南康雩都縣跨江南出去縣三里名夢口有穴狀如石室舊傳嘗有神雞色如好金出此穴中奮翼回翔長鳴響徹見之輒形入穴中因號此石為雞石昔有人耕此山側望見雞出游戲有一長人操彈彈之雞遙見便飛入穴彈丸正著穴上石徑六尺許下垂蔽穴猶有間隙不复容人又有人乘船從下流還縣未至此崖數里有一人通身黃衣擔兩籠黃瓜求寄載之黃衣人乞食船主與之盤酒食訖至崖下船主乞瓜此人不與仍唾盤內徑上崖直入石中船主初甚忿之見其入石始知神異取向食器視之見盤上唾悉是黃金何文張奮者家巨富后暴衰遂賣宅與黎陽程家程入居死病相繼轉賣與鄴人何文文日暮乃持刀上北堂中梁上坐至二更竟忽見一人長丈余高冠黃衣升堂呼問細腰舍中何以有生人氣也答曰無之須臾有一高冠青衣者次之又有高冠白衣者問答并如前及將曙文乃下堂中如向法呼之問曰黃衣者誰也曰金也在堂西壁下青衣者誰也曰錢也在堂前井邊五步白衣者誰也曰銀也在牆東北角柱下汝誰也曰我杵也在灶下及曉文按次掘之得金銀各五百斤錢千余萬仍取杵焚之宅遂清安侯遹隋開皇初廣都孝廉侯遹入城至劍門外忽見四廣石皆大如斗遹愛之收藏于書籠負之以驢因歇鞍取看皆化為金遹至城貨之得錢百萬市美妾十余人大開第宅又近甸置良田別墅后乘春景出游盡載妓妾隨從下車陳設酒肴忽有一老翁負大笈至坐于席末遹怒而詬之命蒼頭扶出叟不動亦不嗔恚但引滿啖炙而笑云吾此來求君償債耳君昔將我金去不記憶乎盡取遹妓妾十余人投之書笈亦不覺笈中之窄負之而趨走若飛鳥遹令蒼頭馳逐之斯須已失所在自后遹家日貧卻复昔日生計十余年卻歸蜀到劍門又見前者老翁攜所將之妾游行儐從极多見遹皆大笑問之不言逼之又失所在訪劍門前后并無此人竟不能測也成弼隋末有道者居于太白山煉丹砂合大還成因得道居山數十年有成弼者給侍之道者與居十余歲而不告以道弼后以家艱辭去道者曰子從我久今复有憂吾無以遺子遺子丹十粒一粒丹化十斤赤銅則黃金矣足以辦葬事弼乃還如言化黃金以足用辦葬訖弼有異志复入山見之更求還丹道者不與弼乃持白刃劫之既不得丹則斷道者兩手又不得則刖其足道者顏色不變弼滋怒則斬其頭及解衣肘后有赤囊開之則丹也弼喜持丹下山忽聞呼弼聲回顧乃道者也弼大惊而謂弼曰吾不期汝至此無德受丹神必誅汝終如吾矣因不見弼多得丹多變黃金金色稍赤优于常金可以服餌家既殷富則為人所告云弼有奸捕得弼自列能成黃金非有他故也唐太宗問之召令造黃金金成帝悅授以五品敕令造金要盡天下之銅乃已弼造金凡數萬斤而丹盡其金所謂大唐金也百煉益精甚貴之弼既藝窮而請去太宗令列其方弼實不知方訴之帝謂其詐怒脅之以兵弼猶自列遂為武士斷其手又不言則刖其足弼窘急且述其本末亦不信遂斬之而大唐金遂流用矣后有婆羅門號為別寶帝入庫遍閱婆羅門指金及大毯曰唯此二寶耳問毯有何奇異而謂之寶婆羅門令舒毯于地以水濡之水皆流去毯竟不濕至今外國傳成弼金以為寶貨也玄金太宗時汾州言青龍白虎吐物在空中有光如火墜地隱入二尺掘之得玄金廣尺余高七尺鄒駱駝長安人先貧嘗以小車推蒸餅賣之每胜業坊角有伏磚車触之即翻塵土涴其餅駝苦之乃將鑊斫去十余磚下有瓷瓮容五斛許開看有金數斗于是巨富其子昉與蕭佺交厚時人語曰蕭佺附馬子鄒昉駱駝兒非關道德合只為錢相知裴談裴談為懷州刺史有樵者入太行山見山穴開有黃金焉可數間屋樵者喜入穴取金得五鋌皆長尺余因以石窒穴且志之又數日往則迷其處樵者頗諳山谷即于洛城懷州造開石物錘鑿數車州有崔司戶知而助之將往開而談妻有疾請道家奏章請命奏章道士忽傳天帝詔曰帝詔語裴談吾太行山天藏開比有樵夫見之吾已遺金五鋌命其閉塞而愚人貪得重求不獲乃興惡將開吾藏已造錘鑿數車若開不休或中吾伏藏此若開錘鑿此州人且死盡深無所益此州崔司戶與其同心但詣崔驗之自當有見急止之汝妻疾自當瘳矣談大異之即召崔子問故果符所言乃沒其開石具而禁止之妻尋有間牛氏僮牛肅曾祖大父皆葬河內出家童二戶守之開元二十八年家僮以男小安質于裴氏齒牙為疾晝臥廄中若有告之者曰小安汝何不起但取仙人杖根煮湯含之可以愈疾何忍焉小安惊顧不見人而又寢未久告之如初安曰此豈神告我乎乃行求仙人杖得大叢掘其根根轉壯大入地三尺忽得大磚有銘焉揭磚已下有銅缽浢于其中盡黃金鋌丹砂雜其中安不知書既藏金則以磚銘示村人楊之侃留銘示人而不告之銘曰磚下黃金五百兩至開元二十八年五月十八日有下賊胡人年二十二姓史者得之澤州城北二十五里白浮圖之南亦二十五里有金五百兩亦此人得之諸人既見銘道路喧聞于裴氏子問小安且諱執鞭之終不言于是拷訊萬端不對拘而閉諸室會有畫工來訪小安市丹砂焉裴氏子誘問之畫工具言其得金所以又曰吾昨于人處用錢一百市砂一斤砂既精好故來更市張氏益信得金召小安以畫工示之安曰掘得銘后下得數金丹砂今無遺矣金寶不得則又加棰笞治之卒不言夜中亡去會裴氏蒼頭自太原赴河內遇小安于澤州小安邀至市酒飲酣招去意者小安便取澤之金乎及蒼頭至裴言之方悟宇文進夏縣令宇文泰猶子進嘗于田間得一昆侖子洗拭之乃黃金也因寶持之數載后財貨充溢家族蕃昌后一夕失之而產業耗敗矣蘇遏天寶中長安永樂里有一凶宅居者皆破后無复人住暫至亦不過宿而卒遂至廢破其舍宇唯堂廳存因生草樹甚多有扶風蘇遏悾悾遽苦貧窮知之乃以賤价于本主質之才立契書未有一錢歸主至夕乃自攜一榻當堂舖設而寢一更以後未寢出于堂彷徨而行忽見東牆下有一赤物如人形無手足表里通徹光明而叫曰咄遏視之不動良久又按聲呼曰爛木咄西牆下有物應曰諾問曰甚沒人曰不知又曰大硬鏘爛木對曰可畏良久乃失赤物所在遏下階中庭呼爛木曰金精合屬我緣沒敢叫喚對曰不知遏又問承前殺害人者在何處爛木曰更無別物只是金精人福自薄不合居之遂喪逝亦不曾殺傷耳至明更無事遏乃自假鍬鍤之具先于西牆下掘入地三尺見一朽柱當心木如血色其堅如石后又于東牆下掘兩日近一丈方見一方石闊一丈四寸長一丈八寸上以篆書曰夏天子紫金三十斤賜有德者遏乃自思我何以為德又自為計曰我得此寶然修德亦可禳之沈吟未決至夜又歎息不定其爛木忽語曰何不改名為有德即可矣遏曰善遂稱有德爛木曰君子儻能送某于昆明池中自是不复撓吾人矣有德許之明辰更掘丈余得一鐵瓮開之得紫金三十斤有德乃還宅价修葺送爛木于昆明池遂閉戶讀書三年為范陽請入幕七年內獲冀州刺史其宅更無事韋思玄寶應中有京兆韋思玄僑居洛陽性尚奇嘗慕神仙之術后游嵩山有道士教曰夫餌金液者可以延壽吾子當先學煉金如是則可以肩赤松駕廣成矣思玄于是求煉金之術積十年遇術士數百終不能得其妙后一日有居士辛銳者貌甚清瘦偢然有寒色衣弊裘叩思玄門謂思玄曰吾病士窮無所歸聞先生好古尚奇集天下異人方士我故來謁耳愿先生納之思玄即止居士于舍其后居士身疾臞盡潰血且甚韋氏一家盡惡之思玄嘗詔術士數人會食而居士不得預既具膳居士突至客前溺于筵席上盡濕客怒皆起韋氏家童亦競來罵之居士遂告去行至庭忽亡所見思玄與諸客甚異之因是其溺乃紫金也奇光璨然真曠代之寶思玄且惊且歎有解者曰居士紫金精也征其名氏信矣且辛者蓋西方庚辛金也而銳字兌從金兌亦西方之正位推其義則吾之解若合符然李員進士李員河東人也居長安延壽里元和初夏一夕員獨處其室方偃于榻寐未熟忽聞室之西隅有微聲纖而遠鏘然若韻金石樂如是久不絕俄而有歌者其音极清越泠泠然又久不已員竊志其歌詞曰色分蘭葉青聲比磬中鳴七月初七日吾當示汝形歌竟其音闋員且惊且異朝日命家童窮其跡不能得焉是夕員方獨處又聞其聲凄越且久亦歌如前詞竟員心知為怪也默然異之如是凡數夕亦聞焉后至秋始六日夜有甚雨隤其堂之北垣明日垣北又聞其聲員惊而視之于北垣下得一缶僅尺余制用金成形狀奇古與金之缶甚異苔翳其光隱然有文視不可見蓋千百年之器也叩之則其韻极長即令滌去塵蘚方可讀之字皆小篆書乃崔子玉座右銘也員得而異之然竟不知何代所制也虞鄉道士虞鄉有山觀甚幽寂有滌陽道士居焉大和中道士嘗一夕獨登壇望見庭忽有異光自井泉中發俄有一物狀若兔其色若精金隨光而出環繞醮壇久之复入于井自是每夕輒見道士異其事不敢告于人后因淘井得一金兔甚小奇光爛然即置于巾箱中時御史李戎職于蒲津與道士友善道士因以遺之其后戎自奉先縣令為忻州刺史其金兔忽亡去后月余而戎卒趙懷正汴州百姓趙懷正住光德坊大和三年妻賀常以女工致鏹一日有人攜石枕求售賀一環獲焉趙夜枕之覺枕中如風雨聲因令妻及子各枕一夕則無所覺趙枕輒复舊或喧悸不得眠其子請碎視之趙言脫碎之無所見是棄一百之利也待我死后爾必破之經歲余趙病死妻令毀視之中有金銀各一鋌如模鑄者所函挺處其模似預曾勘入無絲發隙不知從何而入也梃各長三寸余闊如巨指遂貨之辦其殮及償債不余一錢賀今住洛惠節坊段成式家人雇其紉針親見其說金蛇開成初宮中有黃色蛇夜則自寶庫中出游于階陛間光明照耀不可擒獲宮人擲珊瑚玦以擊之遂并玦亡去掌庫者具以事告上命遍搜庫內得黃金蛇而玦貫其首上熟視之昔隋煬帝為晉王時以黃金蛇贈陳夫人吾今不知此蛇得自何處左右因視額下有阿麼字上蹶然曰果不失朕所疑阿麼即煬帝小字也上之博學敏悟率多此類遂命取玻璃連環系蛇于玉彘之前足其后竟不复有所見以彘食蛇也
