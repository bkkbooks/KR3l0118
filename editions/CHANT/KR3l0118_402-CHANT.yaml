body:
  text: 隋侯隋侯隋侯行見大蛇被傷而治之后銜珠以報其珠徑寸純白夜有光明如月之照一名隋侯珠一名明月珠燕昭王燕昭王坐握日台時有黑鳥白頸集王之所銜洞光之珠圓徑一尺此珠色黑如漆而懸照于云日百神不能隱其精靈此珠出陰泉之底泉在寒山之北圓水之中言波瀾常圓轉而流有黑蚌飛翔而來去于五山黃帝務成子游寒山得黑蚌在高坐之上故知驗矣昭王時其國來獻王取寶璋水洗其泥沙而歎曰懸日月已來見黑蚌生珠已八九千回此蚌千歲一生珠漸輕細昭王常懷握此珠當盛暑之月體自輕涼號曰銷暑招涼珠焉漢高后漢高后時下書求三寸珠仙人朱仲在會稽市販珠乃獻之賜金百斤魯元公主私以金七百斤從仲求珠复獻四寸者後漢章帝後漢章帝元和元年明珠出館陶大如李有明耀三年明月珠出豫章海濱大如雞子圓四寸八分梁武帝梁大同中驟雨殿前有雜色寶珠梁武有喜色虞寄上瑞雨頌火珠貞觀初林邑獻火珠狀如水精云于羅剎國得其人朱發黑身獸牙鷹爪鯨魚目南海有珠即鯨目瞳夜可以鑒謂之夜光凡珠有龍珠龍所吐也蛇珠蛇所吐也南海俗云蛇珠千枚不及一玫瑰言蛇珠賤也玫瑰亦珠名越人俗云種千畝木奴不如一龍珠越俗以珠為上寶生女謂之珠娘生男名珠兒吳越間俗說明珠一斛貴如玉者合浦有珠市珠池廉州邊海中有洲島島上有大池謂之珠池每年刺史修貢自監珠戶入池采以充貢賦耆舊傳云太守貪則珠遠去皆采老蚌剖而取珠池在海上疑其底與海通又池水极深莫測也珠如豌豆大常珠也如彈丸者亦時有得徑寸照室之珠但有其說不可遇也又取小蚌肉貫之以篾曝乾謂之珠母容桂率將脯燒之以荐酒也肉中有細珠如粱粟乃知珠池之蚌隨其大小悉胎中有珠矣少城珠蜀石筍街夏中大雨往往得雜色小珠俗謂地當海眼莫知其故蜀僧惠嶷曰前史說蜀少城飾以金璧珠翠桓溫惡其太侈焚之合在此地合拾得小珠時有孔者得非是乎青泥珠則天時西國獻毗婁博義天王下額骨及辟支佛舌并清泥珠一枚則天懸額及舌以示百姓頷大如胡床舌青色大如牛舌珠類拇指微青后不知貴以施西明寺僧布金剛額中后有講席胡人來聽講見珠縱視目不暫舍如是積十余日但于珠下諦視而意不在講僧知其故因問故欲買珠耶胡云必若見賣當致重价僧初索千貫漸至萬貫胡悉不酬遂定至十萬貫賣之胡得珠納腿肉中還西國僧尋聞奏則天敕求此胡數日得之使者問珠所在胡云以吞入腹使者欲刳其腹胡不得已于腿中取出則天召問貴价市此焉所用之胡云西國有青泥泊多珠珍寶但苦泥深不可得若以此珠投泊中泥悉成水其寶可得則天因寶持之至玄宗時猶在徑寸珠近世有波斯胡人至扶風逆旅見方石在主人門外盤桓數日主人問其故胡云我欲石搗帛因以錢二千求買主人得錢甚悅以石與之胡載石出對眾剖得徑寸珠一枚以刀破臂腋藏其內便還本國隨船泛海行十余日船忽欲沒舟人知是海神求寶乃遍索之無寶與神因欲溺胡胡懼剖腋取珠舟人咒云若求此珠當有所領海神便出一手其大多毛捧珠而去寶珠咸陽岳寺后有周武帝冠其上綴冠珠大如瑞梅歷代不以為寶天后時有士人過寺見珠戲而取之天大熱至寺門易衣以底裹珠放金剛腳下因忘收之翼日便往揚州收債途次陳留宿于旅邸夜聞胡斗寶攝衣從而視之因說冠上綴珠諸胡大駭曰久知中國有此寶方欲往求之士人言已遺之胡等歎恨告云若能至此當有金帛相答今往揚州所債幾何士人云五百千諸胡乃率五百千與之令還取珠士人至金剛腳下珠猶尚存持還見胡胡等喜手卞飲樂十余日方始求市因問士人所求幾何士人极口求一千緡胡大笑云何辱此珠與眾定其价作五萬緡群胡合錢市之及邀士人同往海上觀珠之价士人與之偕行東海上大胡以銀鐺煎醍醐又以金瓶盛珠於醍醐中重煎甫七日有二老人及徒党數百人繼持寶物來至胡所求贖故執不與后數日复持諸寶山積云欲贖珠胡又不與至三十余日諸人散去有二龍女洁白端麗投入珠瓶中珠女合成膏士人問所贖悉何人也胡云此珠是大寶合有二龍女衛護群龍惜女故以諸寶來贖我欲求度世寧顧世間之富耶因以膏涂足步行水上舍舟而去諸胡各言共買此珠何為獨專其利卿既往矣我將安歸胡令以所煎醍醐涂船當得便風還家皆如其言大胡竟不知所之水珠大安國寺睿宗為相王時舊邸也即尊位乃建道場焉王嘗施一寶珠令鎮常住庫云值億萬寺僧納之柜中殊不為貴也開元十年寺僧造功德開柜閱寶物將貨之見函封曰此珠值億萬僧共開之狀如片石赤色夜則微光光高數寸寺僧議曰此凡物耳何得值億萬也試賣之于是市中令一僧監賣且試其酬直居數日貴人或有問者及觀之則曰此凡石耳瓦礫不殊何妄索直皆嗤笑而去僧亦恥之十日后或有問者知其夜光或酬价數千价益重矣月余有西域胡人閱市求寶見珠大喜偕頂戴于首胡人貴者也使譯問曰珠价值幾何僧曰一億萬胡人撫弄遲回而去明日又至譯謂僧曰珠价誠值億萬然胡客久今有四千萬求市可乎僧喜與之謁寺主寺主許諾明日納錢四千萬貫市之而去仍謂僧曰有虧珠价誠多不貽責也僧問胡從何而來而此珠复何能也胡人曰吾大食國人也王貞觀初通好來貢此珠后吾國常念之募有得之者當授相位求之七八十歲今幸得之此水珠也每軍行休時掘地二尺埋珠于其中水泉立出可給數千人故軍行常不乏水自亡珠后行軍每苦渴乏僧不信胡人命掘土藏珠有頃泉涌其色清冷流泛而出僧取飲之方悟靈異胡人乃持珠去不知所之李勉司徒李勉開元初作尉浚儀秩滿沿汴將游廣陵行及睢陽忽有波斯胡老疾杖策詣勉曰異鄉子抱恙甚殆思歸江都知公長者愿托仁蔭皆異不勞而獲護焉勉哀之因命登艫仍給饘粥胡人极懷慚愧因曰我本王貴種也商販于此已逾二十年家有三子計必有求吾來者不日舟止泗上其人疾亟因屏人告勉曰吾國內頃亡傳國寶珠募能獲者世家公相吾衒其鑒而貪其位因是去鄉而來尋近已得之將歸即富貴矣其珠价當百萬吾懼懷寶越鄉因剖肉而藏焉不幸遇疾今將死矣感公恩義敬以相奉即抽刀決股珠出而絕勉遂資其衣衾瘞于淮上掩坎之際因密以珠含之而去既抵維揚寓目旗亭忽與群胡左右依隨因得言語相接傍有胡雛質貌肖逝者勉即詢訪果與逝者所述契會勉即究問事跡乃亡胡之子告瘞其所胡雛號泣發墓取而去李灌李灌者不知何許人性孤靜常次洪州建昌縣倚舟于岸岸有小蓬室下有一病波斯灌憫其將盡以湯粥給之數日而卒臨絕指所臥黑氈曰中有一珠可徑寸將酬其惠及死氈有微光溢耀灌取視得珠買棺葬之密以珠內胡口中植木志墓其后十年复過舊邑時楊憑為觀察使有外國符牒以胡人死于建昌逆旅其粥食之家皆被梏訊經年灌因問其罪囚具言本末灌告縣寮偕往郭墦伐樹樹已合拱矣發棺視死胡貌如生乃于口中探得一珠還之其夕棹舟而去不知所往又尚書故實載兵部員外郎李約葬一商胡得珠以含之與此二事略同上清珠肅宗為兒時常為玄宗所器每坐于前熟視其貌謂武惠妃曰此兒甚有異相他日亦吾家一有福天子因命取上清玉珠以絳紗裹之系于頸是開元中罽賓國所貢光明洁白可照一室視之則仙人玉女云鶴絳節之形搖動于其中及即位寶庫中往往有神光耀日掌庫者具以事告帝曰豈非上清珠耶遂令出之絳紗猶在因流泣遍示近臣曰此我為兒時明皇所賜也遂令貯之以翠玉函置之于臥內四方忽有水旱兵革之災則虔懇祝之無不應驗也守船者蘇州華亭縣有陸四官廟元和初有鹽船數十只于廟前守船者夜中雨過忽見廟前光明如火乃窺之見一物長數丈大如屋梁口弄一團火或吞之船者不知何物乃以竹篙遙擲之此物惊入草光遺在地前視之乃一珠徑寸光耀射目此人得之恐光明為人所見以衣裹之光透出因思寶物怕穢乃脫褻衣裹之光遂不出后無人知者至揚州胡店賣之獲數千緡問胡曰此何珠也胡人不告而去嚴生馮翊嚴生者家于漢南嘗游峴山得一物其狀若彈丸色黑而大有光視之洁徹若輕冰焉生持以示于人或曰珠也生因以彈珠名之常置于箱中其后生游長安乃于春明門逢一胡人叩焉而言衣橐中有奇寶愿有得一見生即以彈珠示之胡人捧之而喜曰此天下之奇貨也愿以三十萬為价曰此寶安所用而君厚其价如是哉胡人曰我西國人此乃吾國之至寶國人謂之清水珠若置于濁水泠然洞徹矣自亡此寶且三歲吾國之井泉盡濁國人俱病故此越海逾山來中夏以求之今果得于子矣胡人即命注濁水于缶以珠投之俄而其水澹然清瑩纖毫可辨生于是以珠與胡獲其价而去張文珗張文珗牧弘農日捕獲伐墓盜十余輩中有一人請間言事公因屏吏獨問對曰某愿以他事贖死盧氏縣南山堯女冢近亦曾聞人開發獲一大珠并玉碗人亦不能計其直余寶器极多世莫之識也公因遣吏按驗即冢果有開處旋獲其盜考訊與前言無異及牽引其徒稱皆在商州冶務中時商牧名卿也州移牒公致書皆怒而不遣竊知者云珠玉之器皆入京師貴人家矣后自京東出過盧氏复問邑中具如所說衛慶衛慶者汝墳編戶也其居在溫泉家世游墮至慶乃服田嘗戴月耕于村南古項城之下倦憩荒陌忽見白光焰焰起于隴畝中若流星慶掩而得之遂藏諸懷曉歸視之乃大珠也其徑寸五分瑩無纖翳乃裹以縑囊緘以漆匣曾示博物者曰此合浦之寶也得蓄之縱未貴而當富矣慶愈寶之常置于臥內自是家產日滋飯牛四百蹄墾田二千畝其余絲案他物稱是十年間郁為富家翁至乾符末慶忽疾雖醫巫并進莫有征者逾月病且亟忽聞枕前鏗然有聲慶心動使開匣珠有璺若縷色如墨矣數日而卒珠亦亡去自是家日削子复不肖貨鬻以供蒲酒之費未釋服室已如懸磬矣鬻餅胡有舉人在京城鄰居有鬻餅胡無妻數年胡忽然病生存問之遺以湯藥既而不愈臨死告曰某在本國時大富因亂遂逃至此本與一鄉人約來相取故久于此不能別適遇君哀念無以奉答其左臂中有珠寶惜多年今死無用矣特此奉贈死后乞為殯瘞郎君得此亦無用處今人亦無別者但知市肆之間有西國胡客至者即以問之當大得价生許之既死破其左臂果得一珠大如彈丸不甚光澤生為營葬訖將出市無人問者已經三歲忽聞新有胡客到城因以珠市之胡見大惊曰郎君何得此寶珠此非近所有請問得處生因說之胡乃泣曰此是某鄉人也本約同問此物來時海上遇風流轉數國故僣五六年到此方欲追尋不意已死遂求買之生見珠不甚珍但索五十萬耳胡依价酬之生詰其所用之處胡云漢人得法取珠于海上以油一石煎二斗其則削以身入海不濡龍神所畏可以取寶一六度也
