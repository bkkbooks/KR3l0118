body:
  text: 裴度裴度唐中書令晉公裴度微時羇寓洛中常乘蹇驢入皇城方上天津橋時淮西不庭已數年矣有二老人倚橋柱而立語云蔡州用兵日久徵發甚困於人未知何時平定忽睹度驚愕而退有僕者攜書囊後行相去稍遠聞老人云適憂蔡州未平須待此人為將既歸僕者具述其事度曰見我龍鍾相戲耳其秋果領鄉薦明年及第洎秉鈞衡朝廷議授吳元濟節鉞既而延英候對憲宗問宰臣度奏曰賊臣跋扈四十餘年聖朝姑務含弘蓋慮凋傷一境不聞歸心效順乃欲坐據一方若以旄鉞授之翻恐恣其凶逆以陛下聰明神武藩鎮皆願勤王臣請一詔進兵可以平蕩妖孽於是命度為淮西節度使興師致討時許滑三帥先於郾城縣屯軍度統精甲五萬會之受律鼓行而進直造蔡州城下纔兩月擒賊以獻淮西遂平後入朝居廊廟大拜正司徒為侍中中書令儒生武德振輝古今洎留守洛師每話天津橋老人之事出征淮西請韓愈自中書舍人為掌書記及賊平朝覲樂和李僕射方為華州刺史戎服橐鞬迎于道左愈有詩云荊山行盡華山來日照潼關四扇開刺史莫嫌迎候遠相公親破蔡州回出劇談錄段文昌唐丞相鄒平公段文昌負才傲俗落拓荊楚間常半酣靸屐于江陵大街往來雨霽泥甚街側有大宅門枕流渠公乘醉於渠上脫屐濯足旁若無人自言我作江陵節度使必買此宅聞者皆笑其後果鎮荊南遂買此宅又嘗佐太尉南康王韋皋為成都館驛巡官忽失意皋逐之使攝靈池尉羸童劣馬奔迫就縣縣去靈池六七里日已昏黑路絕行人忽有兩炬前引更呼曰太尉來既及郭門兩炬皆滅先時為皋奉使入長安素與劉禹錫深交禹錫時為禮部員外方與日者從容文昌入謁日者匿于箔下既去日者謂禹錫曰員外若圖省轉事勢殊遠須待十年後此客入相方轉本曹正郎耳是時禹錫失意連授外官後十餘年文昌入相方除禹錫禮部郎中出錄異記李逢吉唐丞相涼公李逢吉始從事振武日振武有金城佛寺寺有僧年七十餘嘗一日獨處負壁而坐忽見一一原作婦據明鈔本改人介甲持矛由寺門而入俄聞報李判官來僧具以告自是逢吉與僧善每造其室即見其人先逢吉而至率以為常矣故逢吉出入將相二十餘年竟善終于家出補錄記傳牛僧孺唐河南府伊闕縣前大溪每僚佐有入臺者即水中先有小灘漲出石礫金沙澄澈可愛丞相牛僧孺為縣尉一旦忽報灘出翌日邑宰與同僚列筵於亭上觀之因召耆宿備詢其事有老吏云此必分司御史非西臺之命若是西臺灘上當有鸂𪆟雙立前後邑人以此為驗僧孺潛揣縣僚無出于己因舉杯曰既有灘何惜一雙鸂鶒宴未終俄有鸂𪆟飛下不旬日拜西臺監察出劇談錄王智興唐王智興始微時嘗為徐州門子有道士寓居門側智興每旦起持帚因屏穢于道必埽其道士之門道士深感之後智興母終辭焉道士謂智興曰吾善審墓地若議葬當為子卜之智興他日引道士出視地道士以智興所執竹策表一處道士曰必窆此君當壽而兩世位至方伯及智興再往埋穴其竹策有枝葉叢生心甚異之遂葬焉智興又曾自郡齎事赴上都宿郾城逆旅遇店婦將產見二人入智興所寢之舍驚曰徐州王待中在此又曰所生子後五歲當以金瘡死智興志之及期復過店問婦所生子云近因斧傷已卒矣出唐年補錄紀傳牛師唐長慶中鄂州里巷間人每語輒以牛字助之又有一僧自號牛師乍愚乍智人有忤之必云我兄即到豈奈我何未幾奇章公牛僧孺以舊相節度武昌軍其語乃絕而牛師尚存方知將相之任豈偶然耶先是元和初韓尚書皋鎮夏口就加節度使自後復為觀察使長慶三年崔相國植由刑部尚書除觀察使明年冬僧孺實來宰臣建節鎮夏口自僧孺始也出因話錄杜中立唐杜皋字中立少年時贍於財產他無所採取其與游徒利於酒炙其實蔑視之也一日同送迎於城外客有善相者歷觀諸賓侶獨指中立曰此子異日當為將矣一坐大笑中立後尚真源公主竟為滄州節度使初李瑑之出鎮旗竿道折乃钁殺其執旗者中立在道亦然杖之二十瑑竟無患而中立卒焉豈殺之可以應其禍出玉泉子李蠙唐司空李蠙始名虯赴舉之秋偶自題名於屋壁經宵忽睹名上為人添一畫乃成虱字矣蠙曰虱者蠙也遂改名蠙明年果登第出南楚新聞馬植唐丞相馬植罷安南都護與時宰不通又除黔南殊不得意維舟峽中古寺寺前長堤堤畔林木夜月甚明見人白衣緩步堤上吟曰截竹為筒作笛吹鳳凰池上鳳凰飛勞君更向黔南去即是陶鈞萬類時歷歷可聽吟者數四遣人邀問即已失之矣後自黔南入為大理卿遷刑部侍郎判鹽鐵遂作相出本事詩高駢唐燕公高駢微時為朱叔明司馬總兵巡按見雙雕謂眾曰我若貴矢當疊雙乃伺其上下果一矢貫二雕眾大驚異因號為落雕公出感定錄孔溫裕唐河南尹孔溫裕任補闕日諫討党項事貶郴州司馬久之得堂兄尚書溫業書報云憲府欲爾作侍御史日望敕下忽又得書云宰相以右史處之皆無音耗一日有鵲喜於庭直若語狀孩稚拜且祝云願早得官鵲既飛去墜下方寸紙有補闕二字極異之無幾卻除此官出因話錄孫偓長安城有孫家宅居之數世堂室甚古其堂前一柱忽生槐枝孫氏初猶障蔽之不欲人見期年之後漸漸滋茂以至柱身通體而變壞其屋上衝祕藏不及衣冠士庶之來觀者車馬填咽不久偓處巖廊儲居節制人以為應三槐之朕亦甚異也近有孫煒乃偓之嗣備言其事出玉堂閒話李全忠唐乾符末范陽人李全忠少通春秋好鬼谷子之學曾為棣州司馬忽有蘆一枝生於所居之室盈尺三節焉心以為異告於別駕張建章建章博古之士也乃曰昔蒲洪以池中蒲生九節為瑞乃姓蒲後子孫昌盛蘆茅也合生陂澤間而生於室非其常矣君後必有分茅之貴三節者傳節鉞三人公其誌之全忠後事李可舉為戎校諸將逐可舉而立全忠累加至檢校太尉臨戎甚有威政全忠死子匡威為三軍所逐弟匡儔挈家赴闕至滄州景城為盧彥盛所害先是匡威少年好勇不拘小節以飲博為事曾一日與諸游俠輩釣于桑乾赤欄橋之側自以酒酹曰吾若有幽州節制分則獲大魚果釣得魚長三尺人甚異焉出北夢瑣言侯弘實本蒲阪人也幼而家貧長為軍外子弟年方十三四常寐於簷下天將大雨有虹自河飲水俄貫於弘實之口其母見不敢驚焉良久虹自天沒於弘實之口不復出焉及覺母問有夢否對曰適夢入河飲水飽足而歸母聞之默喜知其必貴矣後數月忽有蜀僧詣門求食臨去謂侯母曰女弟子當有後福合得兒子力侯母呼弘實出請僧相之僧視之曰此蜺龍也但離去鄉井近江海客宦方有顯榮又曰此子性識慘毒必有生靈之患儻敬信三寶即得善終言訖而去弘實後果自行伍出身至於將領同光三年從興聖太子收蜀蜀平之後無何與陝府節度使康延孝等作叛及延孝誅滅弘實得赦尋為眉州刺史節度夔州復自寧江遷於黔府一州二鎮皆近大江官業崇高敬奉三寶信心無怠然於臨戎理務持法御下傷於嚴酷是知蜀僧所云不謬矣出鑑戒錄戴思遠梁朝將戴思遠任浮陽日有部曲毛璋為性輕悍常與數十卒追捕盜賊還宿於逆旅毛枕劍而寢夜分其劍忽大吼躍出鞘外從卒聞者愕然驚異毛亦神之乃持劍咒曰某若異日有此山河爾當更鳴躍否則已毛復寢未熟劍吼躍如初毛深自負之其後戴離鎮毛請留戴從之未幾毛以州歸命於唐莊宗莊宗以毛為其州刺史後竟帥滄海出玉堂閒話張籛密牧張籛少年時常有一飛鳥狀若尺鷃銜一青銅錢墮於張懷袖間張異之常繫錢於衣冠間其後累財巨萬至死物力不衰即飛鳥墮錢將富之祥也出玉堂閒話齊州民齊州有一富家翁郡人呼曰劉十郎以鬻醋油為業自云壯年時窮賤至極與妻傭舂以自給忽一宵舂未竟其杵忽然有聲視之已中折矣夫婦相顧愁歎久之方寐凌旦既寤一新杵在臼旁不知自何而至夫婦前視且驚且喜自是因穿地頗得隱伏之貨以碓杵為神鬼所賜賜原作傷據明鈔本改乃寶而藏之遂棄舂業漸習商估數年之內其息百倍家累千金夫婦神其杵即被以文繡置於匱匣中四時致祭焉自後夫婦富且老及其死也物力漸衰今則兒孫貧乏矣出玉堂閒話朱慶源婺源尉朱慶源罷任方選家在豫章之豐城庭中地甚爽塏忽生蓮一枝其家駭懼多方以禳之蓮生不已乃築堤汲水以迴之遂成大池芡荷甚茂其年慶源選授南豐令後三歲入為大理評事出稽神錄
