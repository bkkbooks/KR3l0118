body:
  text: 李鷸李鷸唐敦煌李鷸開元中為邵州刺史挈家之任泛洞庭時晴景登岸因鼻衄血沙上為江鼉所舐俄然复生一鷸其形體衣服言語與其身無異鷸之本身為鼉法所制縶于水中其妻子家人迎奉鼉妖就任州人亦不能覺悟為郡幾數年因天下大旱西江可涉道士葉靜能自羅浮山赴玄宗急詔過洞庭忽沙中見一人面縛問曰君何為者鷸以狀對靜能書一符帖巨石上石即飛起空中鼉妖方擁案晨衙為巨石所擊乃复本形時張說為岳州刺史具奏并以舟楫送鷸赴郡家人妻子乃信今舟行者相戒不瀝血于波中以此故也謝二唐開元時東京士人以遷歷不給南游江淮求丐知己困而無獲徘徊揚州久之同亭有謝二者矜其失意恒欲恤之謂士人曰無爾悲為若欲北歸當有三百千相奉及別以書付之曰我宅在魏王池東至池叩大柳樹家人若出宜付其書便取錢也士人如言徑叩大樹久之小婢出問其故云謝二令送書忽見朱門白壁婢往卻出引入見姥充壯當堂坐謂士人曰兒子書勞君送令付錢三百千今不違其意及人出已見三百千在岸悉是官家排斗錢而色小坏士人疑其精怪不知何處得之疑用恐非物理因以告官具言始末河南尹奏其事皆云魏王池中有一黿窟恐是耳有敕使擊射之得昆侖數十人悉持刀槍沉入其窟得黿大小數十頭末得一黿大如連床官皆殺之得錢帛數千事其后五年士人選得江南一尉之任至揚州市中東店前忽見謝二怒曰于君不薄何乃相負以至于斯老母家人皆遭非命君之故也言訖辭去士人大懼十余日不之官徒侶所促乃發行百餘里遇風一家盡沒時人云以為謝二所損也荊州漁人唐天寶中荊州漁人得釣青魚長一丈鱗上有五色圓花異常端麗漁人不識以其與常魚異不持詣市自烹食無味頗怪焉后五日忽有車騎數十人至漁者所漁者惊懼出拜聞車中怒云我之王子往朝東海何故殺之我令將軍訪王子汝又殺之當令汝身崩潰分裂受苦痛如王子及將軍也言訖呵漁人漁人倒因大惶汗久之方悟家人扶還便得癩病十余日形體口鼻手足潰爛身肉分散數月方死也劉成宣城郡當涂民有劉成者李暉者俱不識農事嘗用巨舫載魚蟹鬻于吳越間唐天寶十三年春三月皆自新安江載往丹陽郡行至下查浦去宣城四十里會天暮泊舟二人俱登陸時李暉往浦岸村舍中獨劉成在江上四顧云島闃無人跡忽聞舫中有連呼阿彌陀佛者聲甚厲成惊而視之見一大魚自舫中振須搖首人聲而呼阿彌陀佛焉成且懼且悚毛發盡勁即匿身蘆中以伺之俄而舫中萬魚俱跳躍呼佛聲動地成大恐遽登舫盡投群魚于江中有頃而李暉至成具以告暉暉怒曰豎子安得為妖妄乎唾而罵言且久成無以自白即用衣資酬其直既而余百錢易荻草十余束致于岸明日遷于舫中忽覺重不可舉解而視之得緡十五千簽題云歸汝魚直成益奇之是日于瓜洲會群僧食併以緡施焉時有萬庄者自涇陽令退居瓜洲備得其事傳于紀述薛二娘唐楚州白田有巫曰薛二娘者自言事金天大王能驅除邪厲邑人崇之村民有沈某者其女患魅發狂或毀坏形體蹈火赴水而腹漸大若人之妊者父母患之迎薛巫以辨之既至設壇于室臥患者于壇內旁置大火坑燒鐵釜赫然巫遂盛服奏樂鼓舞請神須臾神下觀者再拜巫奠酒祝曰速召魅來言畢巫入火坑中坐顏色自若良久振衣而起以所燒釜覆頭鼓舞曲終去之遂据胡床叱患人令自縛患者反手如縛敕令自陳初泣而不言巫大怒操刀斬之刲然刀過而體如故患者乃曰伏矣自陳云淮中老獺因女浣紗悅之不意遭逢聖師乞自此屏跡但痛腹中子未育若生而不殺以還某是望外也言畢嗚咽人皆憫之遂秉筆作別詩曰潮來逐潮上潮落在空灘有來終有去情易复情難腸斷腹中子明月秋江寒其患者素不識書至是落筆詞翰俱麗須臾患者昏睡翌日乃釋然方說初浣沙時有美少年相誘因而來往亦不自知也后旬月產獺子三頭欲殺之或曰彼魅也而信我人也而妄不如釋之其人送于湖中有巨獺迎躍而沒之趙平原唐元和初天水趙平原漢南有別墅嘗與書生彭城劉簡辭武威段齊真詣無名湖捕魚為膾須臾獲魚數十頭內有一白魚長三尺余鱗甲如素錦耀人目精鰭鬣五色鮮明可愛劉與段曰此魚狀貌異常不可殺之平原曰子輩迂闊不能食吾能食之矣言未畢忽見湖中有群小兒俱著半臂白褲馳走水上叫嘯來往略無畏憚二客益懼复以白魚為請平原不許之叱庖人曰速斫膾來逡巡膾至平原及二客食方半風雷暴作霆震一聲湖面小兒腳下生白煙大風隨起二客覺氣候有變顧望三里內有一蘭若遂投而去平原微哂方复下箸于時飛沙折木雨火相雜而下霆電掣曳天崩地拆二客惶駭相顧失色謂平原已為齏粉矣俄頃雨霽二客奔詣膾所見平原坐于地冥然已無知矣二客扶翼呼問之良久張目曰大差事大差事辛勤食膾盡被一青衫人向吾喉中拔出擲于湖中吾腹今甚空乏矣其操刀之仆遂亡失所在經數月方歸平原詰其由云初見青衫人于電火中嗔罵遂被領將令負衣袱行僅十余日至一處人物稠廣市肆駢雜青衣人云此是益州又行五六日复至一繁會處青衫人云此是潭州其夕領入曠野中言曰汝隨我行已久得無困苦耶今與汝別因懷中取干脯一挺與某云饑即食之可達家也又曰為我申意趙平原無夭害生命暴殄天物神道所惡再犯之必無赦矣平原自此終身不釣魚高昱元和中有高昱處士以釣魚為業嘗艤舟于昭潭夜僅三更不寐忽見潭上有三大芙蕖紅芳頗異有三美女各踞其上俱衣白光洁如雪容華艷媚瑩若神仙共語曰今夕闊水波澄高天月皎怡情賞景堪話幽玄其一曰旁有小舟莫聽我語否又一曰縱有非濯纓之士不足憚也相謂曰昭潭無底橘州浮信不虛耳又曰各請言其所好何道其次曰吾性習釋其次曰吾習道其次曰吾習儒各談本教道義理极精微一曰吾昨宵得不祥之夢二子曰何夢也曰吾夢子孫倉皇窟宅流徙遭人斥逐舉族奔波是不祥也二子曰游魂偶然不足信也三子曰各算來晨得何物食久之曰從其所好僧道儒耳吁吾適來所論便成先兆然未必不為禍也言訖逡巡而沒昱聽其語歷歷記之及旦果有一僧來渡至中流而溺昱大駭曰昨宵之言不謬耳旋踵一道士艤舟將濟昱遽止之道士曰君妖也僧偶然耳吾赴知者所召雖死無悔不可失信叱舟人而渡及中流又溺焉續有一儒生挈書囊徑渡昱懇曰如前去僧道已沒矣儒正色而言死生命也今日吾族祥齋不可虧其吊禮將鼓棹昱挽書生衣袂曰臂可斷不可渡書生方叫呼于岸側忽有物如練自潭中飛出繞書生而入昱與渡人遽前捉其衣襟漦涎前流滑手不可制昱長吁曰命也頃刻而沒三子而俄有二客乘葉舟而至一叟一少昱遂謁叟問其姓字叟曰余祁陽山唐勾鱉今適長沙訪張法明威儀昱久聞其高道有神術禮謁甚謹俄聞岸側有數人哭聲乃三溺死者親屬也叟詰之昱具述其事叟怒曰焉敢如此害人遂開篋取丹筆篆字命同舟弟子曰為吾持此符入潭勒其水怪火急他適弟子遂捧符而入如履平地循山腳行數百丈觀大穴明瑩如人間之屋室見三白豬寐于石榻有小豬數十方戲于旁及持符至三豬忽惊起化白衣美女小豬亦俱為童女捧符而泣曰不祥之夢果中矣曰為某啟先師住此多時寧無愛戀容三日涉歸東海各以明珠為獻弟子曰吾無所用不受而返具以白叟叟大怒曰汝更為我語此畜生明晨速離此不然當使六丁就穴斬之弟子又去三美女號慟曰敬依處分弟子歸明晨有黑氣自潭面而出須臾烈風迅雷激浪如山有三大魚長數丈小魚無數周繞沿流而去搜曰吾此行甚有所利不因子何以去昭潭之害遂與昱乘舟東西耳僧法志台山僧法志游至淮陰見一漁者堅禮而命焉法志隨至草庵中漁者設食甚謹法志頗怪因問曰弟子以漁為業自是造罪之人何見僧如此敬禮答曰我昔于會稽山遇云遠上人為眾講法暫曾隨喜得悟聖教邇來見僧即歡喜無量僧異之勸令改業漁者曰我雖聞善道而滯于罟网亦猶和尚為僧未能以戒律為事其罪一也又何疑焉僧慚而退回顧見漁者化為大黿入淮亦失草庵所在
