body:
  text: 鄭會鄭會滎陽鄭會家在渭南少以力聞唐天寶末祿山作逆所在賊盜蜂起人多群聚州縣會恃其力尚在庄居親族依之者甚眾會恒乘一馬四遠覘賊如是累月后忽五日不還家人憂愁然以賊劫之故無敢尋者其家樹上忽有靈語呼阿奶即會妻乳母也家人惶懼藏避又語云阿奶不識會耶前者我往探賊便與賊遇眾寡不敵遂為所殺我以命未合死頻訴于冥官今蒙見允已判重生我尸在此庄北五里道旁溝中可持火來及衣服往取家人如言于溝中得其尸失頭所在又聞語云頭北行百餘步桑樹根下者也到舍可以穀樹皮作線攣之我不复來矣努力勿令參差言訖作鬼嘯而去家人至舍依其攣湊畢體漸溫數日乃能視恒以米飲灌之百日如常王穆太原王穆唐至德初為魯旻部將于南陽戰敗軍馬奔走穆形貌雄壯馬又奇大賊騎追之甚眾及以劍自后砟穆頸殪而隕地筋骨俱斷唯喉尚連初冥然不自覺死至食頃乃悟而頭在臍上方始心惋旋覺食漏遂以手力扶頭還附頸須臾复落悶絕如初久之方蘇正頸之后以發分系兩畔乃能起坐心亦茫然不知自免而所乘馬初不離穆穆之起亦來止其前穆扶得立左膊發解頭墜懷中夜后方蘇系發正首之后穆心念馬臥方可得上馬忽橫伏穆前因得上馬馬亦隨之起載穆東南行穆兩手附兩頰馬行四十里穆麾下散卒十余人群行亦便路求穆見之扶寄村舍其地去賊界四十余里眾心惱懼遂載還昊軍軍城尋為賊所圍穆于城中養病二百餘日方愈繞頸有肉如指頭竟小偏旻以穆名家子兼身殉王事差攝南陽令尋奏葉令歲余遷臨汝令秩滿攝棗陽令卒于官邵進唐大歷元年周智光為華州刺史劫剝行侶旋欲謀反遣吏邵進潛往京伺朝廷御伐之意進歸告曰朝廷無疑公之心光怒以其葉朝廷而紿于已遽命斬之既而甚悔速遣送其首付妻兒妻即以針紉頸俄頃复活以藥傅之然猶懼智光使人告光曰進本蒲人今欲歸葬光亦賙賻之既至蒲浹旬其瘡平愈乃改姓他游后三十年崔顒為宋州牧晨衙有一人投刺曰敕吏顒召見訊其由進曰明公昔為周智光從事因敘其本末顒乃省悟與縑帛揖之而去李太尉軍士長安里巷說朱泚亂時李太尉軍中有一卒為亂兵所刃身頸異處凡七日忽不知其然而自起但覺臚骨稱硬咽喉強于昔時而受刃處痒甚行步無所苦扶持而歸本家妻兒異之訊其事具說其所體與頸分之時全不悟其害亦無心記憶家鄉忽為人驅入城門被引隨兵死數千計至其東面有大局署見綠衣長吏憑幾點籍姓名而過次呼其人便云不合來乃呵責极切左右逐出令還見冥司一人髡桑木如臂大其狀若浮漚釘牽其人頭身斷處如令勘合則以桑木釘自腦釘入喉俄而便覺再見日月不甚痛楚妻兒因是披頂發而觀則見隆高處一寸已上都非尋常皮里桑木黃文存焉人或謂之粉黛元和中溫會有宗人守清為邠鎮之權將忽話此事守清便呼之前出乃云是其麾下甲馬士耿皓今已七十余膂力猶可支數夫會因是親睹其異五原將校五原遣將校往揚子請衣賜校有所知能承顧問院官與之款曲顧見項上有一肉環圍繞瘢痕可懼院官與之熟因詰其所來具對昔歲巡邊其眾五六百深犯榆塞遭虜騎掩襲眾數千悉是騎兵此五百短兵全軍陷歿積尸為京觀其身首已異矣至日入但魂魄覺有呵喝狀若官府一點巡者至某官怒曰此人不合死因何殺卻胥者扣頭求哀官曰不卻活君須還命胥曰活得遂許之良久而喝回又更約束須速活勿誤死者胥厲聲唱諾某頭安在項上身在三尺厚葉上臥頭邊有半碗稀粥一張折柄匙插在碗中某能探手取匙抄致口中漸能食即又迷悶睡著眼開又見半碗粥匙亦在中如此六七日能行策杖卻投本處荏苒今日其瘢痕是也范令卿隋文帝開皇二年汴州浚義縣功曹范欽子令卿在家與族人文志校書競工拙令卿以手反擊文志鼻血出不止因即殞文志父乃執令卿以繩懸縊于屋梁移時氣絕文志父母恐令卿卻活复用布重絞之死經三日令卿卻蘇文志長逝湯氏子湯氏子者其父為樂平尉令李氏隴西望族素輕易恒以吳人狎侮尉甚不平輕為令所猥辱如是者已數四尉不能堪某與其兄詣令紛爭令格罵叱左右曳下將加捶楚某懷中有劍直前刺令中胸不深后數日死令家人亦擊某系獄州斷刑令辜內死當決殺將入市無悴容有善相者云少年有五品相必當不死若死吾不相人矣施刑之人加之以繩決畢氣絕牽曳就獄至夕乃蘇獄卒白官官云此手殺人義無活理令卒以繩縊絕其夕三更复蘇卒又縊之及明复蘇獄官以白刺史舉州歎異而限法不可呼其父令自斃之及于州門對眾縊絕刺史哀其終始命家收之及將歸第复活因葬空棺養之暗室久之無恙乾元中為全椒令卒士人甲晉元帝世有甲者衣冠族姓暴病亡見人將上天詣司命司命更推校算歷未盡不應枉召主者發遣令還甲尤腳痛不能行無緣得歸主者數人共愁相謂曰甲若卒以腳痛不能歸我等坐枉人之罪遂相率具白司命司命思之良久曰適新召胡人康乙者在西門外此人當遂死其腳甚健易之彼此無損主者承教出將易之胡形體甚丑腳殊可惡甲終不肯主者曰君若不易便長決留此耳不獲已遂聽之主者令二并閉目倏忽二人腳已各易矣仍即遣之豁然复生具為家人說發視果是胡腳叢毛連結且胡臭甲本士愛玩手足而忽得此了不欲見雖獲更活每惆悵殆欲如死旁人見識此胡者死猶未殯家近在茄子浦甲親往視胡尸果見其腳著胡體正當殯斂對之泣胡兒并有至性每節朔兒并悲思馳往抱甲腳號啕忽行路相逢便攀援啼哭為此每出入時恒令人守門以防胡子終身憎穢未曾娛視雖三伏盛署必复重衣無暫露也李簡唐開元末蔡州上蔡縣南里村百姓李簡癇病卒瘞后十余日有汝陽縣百姓張弘義素不與李簡相識所居相去十余舍亦因病經宿卻活不复認父母妻子且言我是李簡家住上蔡縣南李村父名亮遂徑往南李村入亮家亮惊問其故言方病時夢二人著黃繼帖見追行數十里至大城署曰王城引入一處如人間六司院留居數日所勘責事委不能對忽有一人自外來稱錯追李簡可即放還有一吏曰李身坏別令托生一時憶念父母親族不欲別處受生因請卻复本身少頃見領一人至通曰追到雜職汝陽張弘義吏又曰張弘義身幸未坏速令李簡托其身以盡余年遂被兩吏扶卻出城但行甚速漸無所知忽若夢覺見人環泣及屋宇都不复認亮問其親族名氏及平生細事無不知也先解竹作因息入房索刀具破蔑盛器語音舉止信李簡也竟不返汝陽時段成式三從叔父攝蔡州司戶親驗其事昔扁鵲易魯公扈趙齊嬰之心及寢互返其室二室相咨以是稽之非寓言矣竹季貞陳蔡間有民竹季貞卒十余年矣后里人趙子和亦卒數日忽寤即起馳出門其妻子惊前訊之子和曰我竹季貞也安識汝今將歸吾家既而語音非子和矣妻子遂隨之至季貞家見子和來以為狂疾罵而逐之子和曰我竹季貞卒十一年今乃歸何拒我耶其家聆其語果季貞也驗其事又季貞也妻子俱駭異詰之季貞曰我自去人世迨今且一紀居冥途中思還省妻孥不一日忘然冥間每三十年即一逝者再生使言罪福昨者吾所請案据得以名聞冥官愿為再生者既而冥官謂我曰汝宅舍坏久矣如何案据白曰季貞同里趙子和者卒數日愿假其尸與季貞之魂冥官許之即遣使送我于趙氏之舍我故得歸因話平昔事歷然可聽妻子方信而納之自是季貞不食酒肉衣短粗衣行乞陳蔡汝鄭間緡帛隨以修佛施貧餓者一還家至今尚存陸彥余杭人陸彥夏月死十余日見王云命未盡放歸左右曰宅舍亡坏不堪時滄州人李談新來其人合死王曰取談宅舍與之彥遂入談柩中而蘇遂作吳語不識妻子具說其事遂向余杭訪得其家妻子不認具陳由來乃信之
