body:
  text: 王遠知王遠知道士王遠知本瑯琊人也父曇選除揚州刺史遠知母駕部郎中丁超女也常夢彩雲靈鳳集其身上因而有娠又聞腹中聲沙門寶誥謂曇選曰生子當為神仙宗伯遠知少聰敏博綜群書初入茅山師事陶弘景傳其道法及隋煬帝為晉王鎮揚州起玉清玄壇邀遠知主之使王子相柳顧言相次召之遠知遂來謁見斯須而鬚髮變白晉王懼而遣之少選又復其舊唐高祖之龍潛遠知嘗密陳符命武德中秦王世民與幕屬房玄齡微服以謁遠知遠知迎謂曰此中有聖人得非秦王乎太宗因以實告遠知曰方作太平天子願自愛也太宗登極將加重位固請歸山貞觀九年潤州茅山置太平觀並度二七人降璽書慰勉之後謂弟子潘師正曰見仙格以吾小時誤損一童子吻不得白日昇天今見召為少室山伯將行在即翌日沐浴加冠衣焚香而卒年一百二十六歲諡曰昇玄先生云出談賓錄益州老父唐則天末年益州有一老父攜一藥壺於城中賣藥得錢即轉濟貧乏自常不食時即飲淨水如此經歲餘百姓賴之有疾得藥者無不愈時或自遊江岸凝眸永日又或登高引領不語竟日每遇有識者必告之曰夫人一身便如一國也人之心即帝王也傍列臟腑即內輔也外張九竅則外臣也故心有病則內外不可救之又何異君亂于上臣下不可正之哉但凡欲身之無病必須先正其心不使亂求不使狂思不使嗜慾不使迷惑則心先無病心先無病則內輔之臟腑雖有病不難療也外之九竅亦無由受病矣況藥亦有君臣有佐有使苟或攻其病君先臣次然後用佐用使自然合其宜如以佐之藥用之以使使之藥用之以佐小不當其用必自亂也又何能攻人之病哉此又象國家治人也老夫用藥常以此為念每遇人一身君不君臣不臣使九竅之邪邪原作斜據說郛三三改悉納其病以至於良醫自逃名藥不效猶不知治身之病後時矣悲夫士君子記之忽一日獨詣錦川解衣淨浴探壺中惟選一丸藥自吞之謂眾人曰老夫罪已滿矣今卻歸島上俄化一白鶴飛去衣與藥壺並沒於水永尋不見出瀟湘錄崔生進士崔偉嘗遊青城山乘驢歇鞍收放無僕使驢走趁不及約行二十餘里至一洞口已昏黑驢復走入崔生畏懼兼困遂寢及曉覺洞中微明遂入去又十里出洞門望見草樹巖壑悉非人間所有金城絳闕披甲者數百見生呵問答曰塵俗賤士願謁仙翁守吏趨報良久召見一人居玉殿披羽衣身可長丈餘鬢髮皓素侍女滿側皆有所執延生上殿與語甚喜留宿酒饌備極珍豐明日謂生曰此非人世乃仙府也驢走益遠予之奉邀某惟一女願事君子此亦冥數前定不可免也生拜謝顧左右令將青合來取藥兩丸與生服訖覺腑臟清瑩逡巡摩搔皮若蟬蛻視鏡如嬰孩之貌至夕有霓旌羽蓋仙樂步虛與妻相見真人空際皆以崔郎為戲每朔望仙伯乘鶴上朝蘂宮云某階品尚以卑末得在天真之列必與崔生別翩翻於雲漢之內歲餘嬉遊佚樂無所比因問曰某血屬要與一訣非有戀著也請略暫回仙翁曰不得淹留譴罪極大與符一道云恐遭禍患此可隱形然慎不得遊宮禁中臨別更與符一道云甚急即開卻令取所乘驢付之到京都試往人家皆不見便入苑囿大內會劍南進太真妃生日錦繡乃竊其尤者以翫上曰晝日賊無計至此乃召羅公遠作法訖持朱書照之寢殿戶外後果得具本末上不信令笞死忽記先翁臨行之符遽發公遠與捉者皆僵仆良久能起即啟玄宗曰此已居上界殺之必不得假使得之臣輩便受禍亦非國家之福玄宗乃釋之親召與語曰汝莫妄居遂令百人具兵仗同衛士同送且覘其故卻至洞口復見金城絳闕仙伯嚴侍衛出門呼曰崔郎不記吾言幾至顛躓崔生拜訖將前送者亦欲隨至仙翁以杖畫成澗深闊各數丈令召崔生妻至擲一領巾過作五色綵橋遣生登隨步即滅既度崔生回首曰即如此可以歸矣須臾雲霧四起咫尺不見唯聞鸞鶴笙歌之聲半日方散遙望惟空山而已不復有物也出逸史馮俊唐貞元初廣陵人馮俊以傭工資生多力而愚直故易售常遇一道士於市買藥置一囊重百餘斤募能獨負者當倍酬其直俊乃請行至六合約酬一千文至彼取資俊乃歸告其妻而後從之道士云從我行不必直至六合今欲從水路往彼得舟且隨我舟行亦不減汝直俊從之遂入小舟與俊并道士共載出江口數里道士曰無風上水不可至吾施小術令二人皆伏舟中道士獨在船上引帆持楫二人在舟中聞風浪聲度其船如在空中懼不敢動數食頃遂令開船召出至一處平湖渺然前對山嶺重疊舟人久之方悟乃是南湖廬山下星子灣也道士上岸令俊負藥船人即付船價舟人敬懼不受道士曰知汝是潯陽人要當時至以此便相假豈為辭耶舟人遂拜受之而去實江州人也遂引俊負藥於亂石間行五六里將至山下有一大石方數丈道士以小石扣之數十下大石分為二有一童出於石間喜曰尊師歸也道士遂引俊入石穴初甚峻下十餘丈旁行漸寬平入數十步其中洞明有大石堂道士數十弈棊戲笑見道士皆曰何晚也敕俊捨藥命左右速遣來人歸前道士命左右曰擔人甚飢與之飯食遂於瓷甌盛胡麻飯與之食又與一碗漿甘滑如乳不知何物也道士遂送俊出謂曰勞汝遠來少有遺汝授與錢一千文令繫腰下至家解觀之自當有異耳又問家有幾口云妻兒五口授以丹藥可百餘粒曰日食一粒可百日不食俊辭曰此歸路遠何由可知道士曰與汝圖之遂引行亂石間見一石臥如虎狀令俊騎上以物蒙石頭俊執其末如執轡焉誡令閉目候足著地即開俊如言騎石道士以鞭鞭石遂覺此石舉在空中而飛時已向晚如炊久覺足躡地開目已在廣陵郭門矣人家方始舉燭比至舍妻兒猶驚其速遂解腰下皆金錢也自此不復為人傭工廣置田園為富民焉里人皆疑為盜也後他處有盜發里人意俊同之遂縶以詣府時節使杜公亞重藥術好奇說聞俊言遂命取其金丹丹至亞手如墜地焉而失之兼言郭外所乘之石猶在遂捨之亞由是精意於道頗好燒煉竟無所成俊後壽終子孫至富焉出原仙記明鈔本作出原化記呂生虞鄉永樂等縣連接其中道者往往而遇有呂生者居二邑間為童兒時不欲聞食氣因上山自斸黃精煮服之十年之後並餌生者俗饌并不進日覺輕健耐風寒行若飄風見文字及人語更不忘母令讀書遂欲應明經日念數卷實非用功也自不忘耳後母逼令飱飯不肯與諸妹旦夕勸解悉不從因於酒中置猪脂自捧以飲之曰我老矣況酒道家不禁呂曰某自小不知味實進不得乃逼於口鼻噓吸之際一物自口中落長二寸餘眾共視之乃黃金人子也呂生乃僵臥不起惟言困憊其妹以香湯洗之結於呂衣帶中移時方起先是呂生年雖近六十鬚髮漆黑及是皓首母始悔之卻取金人結處如舊已不見之矣呂生恨惋垂泣再拜母出門去云往茅山更無其蹤出逸史張李二公唐開元中有張李二公同志相與於泰山學道久之李以皇枝思仕宦辭而歸張曰人各有志為官其君志也何怍焉天寶末李仕至大理丞屬安祿山之亂攜其家累自武關出而歸襄陽寓居尋奉使至揚州途覯張子衣服澤弊佯若自失李氏有哀恤之意求與同宿張曰我主人頗有生計邀李同去既至門庭宏壯儐從璀璨狀若貴人李甚愕之曰焉得如此張戒無言且為所笑既而極備珍膳食畢命諸雜伎女樂五人悉持本樂中有持箏者酷似李之妻李視之尤切飲中而凝睇者數四張問其故李指箏者是似吾室能不眷張笑曰天下有相似人及將散張呼持箏婦以林檎繫裙帶上然後使回去謂李曰君欲幾多錢而遂其願李云得三百千當辦己事張有故席帽謂李曰可持此詣藥舖問王老家張三令持此取三百千貫錢彼當與君也遂各散去明日李至其門亭館荒穢扃鑰久閉至復無有人行蹤乃詢傍舍求張三鄰人曰此劉道玄宅也十餘年無居者李嘆訝良久遂持帽詣王家求錢王老令送帽問家人審是張老帽否其女其女二字原在審字上據陸其清鈔本廣異記改云前所綴綠綫猶在李問張是何人王云是五十年前來茯苓主顧今有二千餘貫錢在藥行中李領錢而回重求終不見矣尋還襄陽試索其妻裙帶上果得林檎問其故云昨夕夢見五六人追云是張仙喚搊箏臨別以林檎繫裙帶上方知張已得仙矣出廣異記
