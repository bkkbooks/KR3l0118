body:
  text: 孔子孔子孔子謂子夏曰得麟之月天當有血書魯端門孔聖沒周室亡子夏往觀逢一郎云門有血飛為赤鳥化而為書云出說題辭蕭士義後漢黃門郎蕭士義和帝永元二年被戮數日前家中常所養狗來向其婦前而語曰汝極無相祿汝家尋當破敗當奈此何其婦默然亦不駭狗少時自去及士義還內婦仍學說狗語未畢收捕便至出續異記王導晉丞相王導夢人欲以百萬錢買長豫導甚惡之潛為祈禱者備矣後作屋忽掘得一窖錢料之百億大不歡一皆藏閉俄而長豫亡長豫名悅導之次子也出世說新書謝安東晉謝安於後府接賓婦劉氏見狗銜安頭來久之乃失所在是月安薨出異苑庾亮晉庾亮初鎮武昌出石頭百姓看者於岸上歌曰庾公上武昌翩翩如飛鳥庾公還揚州白馬牽流旐又曰庾公初上時翩翩如飛鴉庾公還揚州白馬牽旐車後連徵不入尋薨還都葬之出世說新書王仲文王仲文為河南主簿居緱氏縣夜歸道經大澤中顧車後有一白狗甚可愛便欲呼取忽變為人形長五六尺狀似方相或前或卻如欲上車仲文大怖走至舍捉火來視便失所在月餘日仲文將奴共在路忽復見與奴並頓伏俱死出幽明錄諸葛侃晉孝武大和中於內寢婦高平張氏窗外聞有如雞雛聲甚畏驚而視之見有龜蛇之象似今畫玄武之形侃位登九棘而竟被誅出廣古今五行記劉波劉波字道則晉孝武太元年移居京口晝寢聞屏風外悒吒聲開屏風見一狗蹲地而語語畢自去波隗孫也後為前將軍敗見殺出異苑鄭微晉時信安鄭微少見一老公以囊與微云此是命慎勿令零落若有破碎便為兇兆言訖失所在後密開看是一梃炭意甚祕之雖家人不知也後遭盧龍寇亂恒保錄之至宋永初三年微年八十三疾篤語弟云吾齒盡矣可試啟此囊見炭悉碎折於是遂卒出廣古今五行記周超宋初義興周超為謝晦司馬在江陵妻許氏在家遙見屋裏有光人頭在地血流甚多大驚怪即便失去後超被法出劉義慶幽明錄謝南康宋永初三年謝南康家婢行逢一黑狗語婢曰汝看我背後人婢舉頭見一人長三尺有兩頭婢驚怖返走人狗亦隨婢後至家庭中舉家避走婢問狗汝來何為狗云欲乞食耳於是婢與設食並食食訖兩頭人出婢因謂狗曰人已去狗曰正巳復來良久沒不知所在後家人死喪出續搜神記傅亮宋永初中北地傅亮為護軍兄子珍住府西夜忽見北窗外樹有物面廣三尺眼橫豎狀若方相珍遑遽以被自蒙久乃自滅後亮被誅出廣古今五行記王徽之宋文帝元嘉四年為交州刺史在道有客命索酒炙炙至取自割之終不入投地怒顧視向炙已變為徽之頭又睹其首在空中至州便殞出異苑劉興道零陵太守廣陵劉興道罷郡住齋中安床在西壁下忽見東壁邊有一眼斯須之間便有四漸漸見多遂至滿室久乃消散不知所在又見床前有頭髮從土中稍稍繁多見一頭而出乃是方相頭奄忽自滅劉憂怖沈疾不起出續異記郭仲產宋郭仲產為南郡王從事宅有枇杷樹元嘉末起齋屋以竹為栭竹遂漸生枝葉條長數尺扶疏蓊翠鬱然如林仲產以為吉祥俄而同義宣之謀被誅焉出渚宮故事沈慶之宋太尉沈慶之求致仕上不許慶之曰張良名賢漢高猶許其退臣有何用為聖朝所須乃啟顙流涕帝有詔授開府便詣廷尉待罪慶之目不識字手不知書而聰悟過人嘗對上為詩令僕射顏師伯執筆慶之口占曰微生值多幸得逢時運昌衰朽筋骨盡徒步還南岡辭榮此聖代何媿張子房並歎其辭意之美慶之嘗歲旦夢人餉絹兩疋曰此絹足度覺而歎曰兩疋八十尺足度無盈餘老子今年不免矣其年果為原按宋書廢帝紀元景和原疑景之誤和所誅出談藪
