body:
  text: 申光遜申光遜近代曹州觀察判官申光遜言本家桂林有官人孫仲敖寓居于桂交廣人也申往謁之延於臥內冠簪相見曰非慵於巾櫛也蓋患腦痛爾即命醇酒升餘以辛辣物洎胡椒乾薑等屑僅半杯以溫酒調又於枕函中取一黑漆筩如今之笙項安於鼻竅吸之至盡方就枕枕原作碗據明鈔本改有汗出表其疾立愈蓋鼻飲蠻獠之類也出玉堂閒話孫光憲火燒瘡無出醋泥甚驗孫光憲嘗家人作煎餅一婢抱玄子擁爐不覺落火炭之上遽以醋泥傅之至曉不痛亦無瘢痕是知俗說不厭多聞出北夢瑣言漁人妻瓜村有漁人妻得勞疾轉相染著死者數人或云取病者生釘棺中棄之其病可絕頃之其女病即生釘棺中流之於江至金山有漁人見而異之引之至岸開視之見女子猶活因取置漁舍每多得鰻黧魚以食之久之病愈遂為漁人之妻今尚無恙出稽神錄陳寨陳寨者泉州晉江巫也善禁祝之術為人治疾多愈者有漳州逆旅蘇猛其子病狂人莫能療乃往請陳陳至蘇氏子見之戟手大罵寨曰此疾入心矣乃立壇於堂中戒人無得竊視至夜乃取蘇氏子劈為兩片懸堂之東壁其心懸北簷下寨方在堂中作法所懸之心遂為犬食寨求之不得驚懼乃持刀宛轉於地出門而去主人弗知謂其作法耳食頃乃持心而入內於病者之腹被髮連叱其腹遂合蘇氏子既悟但連呼遞鋪遞鋪家人莫之測乃其日去家數里有驛吏手持官文書死於道傍初南中驛路二十里置一遞鋪驛吏持符牒以次傳授欲近前鋪輒連呼以警之乃寨取驛吏之心而活蘇氏蘇遂愈如故出稽神錄陶俊江南吉州刺史張曜卿有傔力者陶俊性謹直嘗從軍征江西為飛石所中因有腰足之疾恒扶杖而行張命守舟于廣陵之江口因至白沙市避雨於酒肆同立者甚眾有二書生過於前獨顧俊相與言曰此人好心宜為療其疾即呼俊與藥二丸曰服此即愈乃去俊歸舟吞之良久覺腹中痛楚甚頃之痛止疾亦多差操篙理纜尤覺輕健白沙去城八十里一日往復不以為勞後訪二書生竟不復見出稽神錄張易江南刑部郎中張易少居菑川病熱困惙且甚恍惚見一神人長可數寸立於枕前持藥三丸曰吞此可愈易受而亟吞之二丸嗛之一丸落席有聲因自起求之不得家人驚問何為具述所見病因即愈爾日出入里巷了無所苦出稽神錄廣陵木工廣陵有木工因病手足皆拳拳原作舉據明鈔本改縮不能復執斤斧扶踊行乞至后土廟前遇一道士長而黑色神采甚異呼問其疾因與藥數丸曰鉺此當愈旦日平明復會於此木工辭曰某不能行家去此遠明日雖晚尚未能至也道士曰爾無憂但早至此遂別去木工既歸鉺其藥頃之手足痛甚中夜乃止因即得寐五更而寤覺手足甚輕因下床趨走如故即馳詣后土廟前久之乃見道士倚杖而立再拜陳謝道士曰吾授爾方可救人疾苦無為木匠耳遂再拜受之因問其名居曰吾在紫極宮有事可訪吾也遂去木匠得方用以治疾無不愈者至紫極宮訪之竟不復見後有婦人久疾亦遇一道士與藥而差言其容貌亦木工所見也廣陵尋亂木工竟不知所之出稽神錄飛蠱江嶺之間有飛蠱其來也有聲不見形如鳥鳴啾啾唧唧然中人即為痢便血醫藥多不差旬日間必不救出朝野僉載菌毒嶺南風俗多為毒藥令老奴食冶葛死埋之土堆上生菌子其正當腹上食之立死手足額上生者當日死旁自外者數日死漸遠者或一月兩月全遠者或二年三年無得活者惟有陳懷卿家藥能解之或有以菌藥塗馬鞭頭馬控上拂著手即毒拭著口即死出朝野僉載田承肇王蜀將田承肇常領騎軍戍于鳳翔因引騎潛出解鞍憩於林木之下面前忽見方圓數尺靜地中有小樹子一莖高數尺並無柯葉挺然而立尤甚光滑肇就之翫弄以手上下摩娑頃刻間手指如中毒藥苦不禁於是鞭馬歸營至臂膊已麤於桶時有村嫗善禁居在深山中急使人召得已將不救嫗曰此是胎生七寸蛇戲處噴毒在樹木間捫者樹枝立合致卒肇曰是也急使人就彼斸之果獲二蛇長六七寸斃之嫗遂禁勒自膊間趁漸漸下至于腕又併趁入食指盡食指一節趁之不出蹙成一毬子許肉丸遂以利刀斷此一節所患方除其斷下一節巨如一氣毬也出玉堂閒話蛇毒趙延禧云遭惡蛇虺所螫處帖之艾炷當上灸之立差不然即死凡蛇齧即當齧即當齧三字原闕據明鈔本補處灸灸原作久據明鈔本改之引去毒氣即止原闕出處今見玉堂閑話冶葛鴆冶葛食之立死有冶葛處即有白藤花能解冶葛毒鴆鳥食水之處即有犀牛犀牛不濯角其水物食之必死為鴆食蛇之故出朝野僉載雜說藥醫書言虎中藥箭食清泥野豬中藥箭豗薺苨而食雉被鷹傷以地黃葉帖之又礜石可以害鼠張鷟曾試之鼠中毒如醉亦不識人猶知取泥汁飲之須臾平復鳥獸蟲物猶知解毒何況人乎被蠶齧者以甲蟲末傅之被馬咬者燒鞭鞘灰塗之蓋取其相服也蜘蛛嚙者雄黃末傅之筋斷須續者取旋覆根絞取汁以筋相對以汁塗而封之即相續如故蜀兒奴逃走多刻筋以此續之百不失一出朝野僉載絳州僧永徽中絳州有一僧病噎都不下食如此數年臨命終告其弟子云吾氣絕之後便可開吾胸喉視有何物欲知其根本言終而卒弟子依其言開視胸中得一物形似魚而有兩頭遍體悉是肉鱗弟子致缽中跳躍不止戲以諸味致缽中雖不見食須臾悉化成水又以諸毒藥內之皆隨銷化時夏中藍熟寺眾於水次作靛有一僧往因以少靛致缽中此蟲恇懼遶缽馳走須臾化成水世傳以靛水療噎疾出廣五行記崔爽永徽中有崔爽者每食生魚三斗乃足於後飢作鱠未成爽忍飢不禁遂吐一物狀如蝦蟆自此之後不復能食鱠矣出朝野僉載劉錄事和州劉錄事者大曆中罷官居和州旁縣食兼數人尤能食鱠嘗言鱠味未嘗果腹邑客乃網魚百餘斤會於野庭觀其下箸劉初食鱠數楪忽似小哽因咯咯原作殼據明鈔本改出一骨珠子大如豆乃寘於茶甌中以楪覆之食未半怪覆甌楪傾側舉視之向骨珠子已長數寸如人狀座客競觀之隨視而長頃刻長及人遂捽劉因相毆流血良久各散走一循廳之西一轉廳之左俱及後門相觸翕成一人乃劉也神已癡矣半日方能語訪其所以皆不省之劉自是惡鱠出酉陽雜俎句容佐史句容縣佐史能啖鱠至數十斤恒吃不飽縣令聞其善啖乃出百斤史快食至盡因覺氣悶久之吐出一物狀如麻鞋底縣令命洗出安鱠所鱠悉成水累問醫人術士莫能名之令小吏持往揚州賣之冀有識者誡之若有買者但高舉其價看至幾錢其人至揚州四五日有胡求買初起一千累增其價到三百貫文胡輒還之初無酬酢人謂胡曰是句容縣令家物君必買之當相隨去胡因隨至句容縣令問此是何物胡云此是銷魚之精亦能銷人腹中塊病人有患者以一片如指端繩繫之置病所其塊即銷我本國太子少患此病父求愈病者賞之千金君若見賣當獲大利令竟賣半與之出廣異記崔融唐國子司業知制誥崔融病百餘日腹中蟲蝕極痛不能忍有一物如守宮從下部出須臾而卒出朝野僉載刁俊朝安康伶人刁俊朝其妻巴嫗項癭者初微若雞卵漸巨如三四升缶盎積五年大如數斛之鼎重不能行其中有琴瑟笙磬塤篪之響細而聽之若合音律泠泠可樂積數年癭外生小穴如針芒者不知幾億每天欲雨則穴中吹白煙霏霏如絲縷漸高布散結為屯雲雨則立降其家少長懼之咸請遠送巖穴俊朝戀戀不能已因謂妻曰吾迫以眾議將不能庇於伉儷送君於無人之境如何妻曰吾此疾誠可憎惡送之亦死拆之亦死君當為我決拆之看有何物俊朝即磨淬利刃揮挑將及妻前癭中軒然有聲遂四分披裂有一大猱跳躍蹋而去即以帛絮裹之雖癭疾頓愈而冥然大漸矣明日有黃冠扣門曰吾乃昨曰癭中走出之猱也吾本獼猴之精解致風雨無何與漢江鬼愁潭老蛟還往常與覘船舸將至俾他覆之以求舟中餱糧以養孫息昨者太一誅蛟搜索黨與故借君夫人蝤蠐之領以匿性命雖分不相干然為累亦甚矣今於鳳凰山神處求得少許靈膏請君塗之幸當立愈俊朝如其言塗之隨手瘡合俊朝因留黃冠烹雞設食食訖貰酒欲飲黃冠因囀喉高歌又為絲匏瓊玉之音罔不鏗鏘可愛既而辭去莫知所詣時大定中也出續玄怪錄李生天寶中有隴西李生自白衣調選桂州參軍既至任以熱病旬餘覺左乳痛不可忍及視之隆若癰腫之狀即召醫驗其脈醫者曰臟腑無他若臆中有物以喙攻其乳乳痛而癰不可為也又旬餘病甚一日癰潰有一雉自左乳中突而飛出不知所止是夕李生卒出宣室志魏淑大曆中元察為邛州刺史而州城將有魏淑者膚體洪壯年方四十親老妻少而忽中異疾無所酸苦但飲食日損身體日銷耳醫生術士拱手無措寒暑未周即如嬰孩焉不復能行坐語言其母與妻更相提抱遇淑之生曰家人召僧致齋其妻乃以釵股挾之以哺須臾能盡一小甌自是日加所食身亦漸長不半歲乃復其初察則授與故職趨驅氣力且無少異後十餘年捍蠻戰死于陳出集異記皇甫及皇甫及者其父為太原少尹甚鍾愛之及生如常兒至咸通壬辰歲年十四矣忽感異疾非有切肌徹骨之苦但暴長耳逾時而身越七尺帶兼數圍長啜大嚼復三倍於昔矣明年秋無疾而逝出三水小牘王布永貞年東市百姓王布知書藏錢千萬商旅多賓之有女年十四五艷麗聰悟鼻兩孔各垂息肉如皁莢子其根細如麻綖長寸許触之痛入心髓其父破錢數百萬治之不差忽一日有梵僧乞食因問布知君女有異疾可一見吾能止之布被問大喜即見其女僧乃取藥色正白吹其鼻中少頃摘去之出少黃水都無所苦布賞之百金梵僧曰吾修道之人不受厚施唯乞此塞肉遂珍重而去勢疾如飛布亦意其賢聖也計僧去五六坊坊原作切據明鈔本改復有一少年美如冠玉騎白馬遂扣其門曰適有胡僧到無布遽延入具述胡僧事其人吁嗟不悅曰馬小蹶足竟後此僧布驚異詰其故曰上帝失樂神二人近知藏於君女鼻中我天人也奉命來取不意此僧先取之當獲譴矣布方作禮舉手而失出酉陽雜俎侯又玄荊州處士侯又玄嘗出郊廁于荒塚上及下跌傷其肘瘡甚行數百步逢一老人問何所若也又玄具言且見其肘老人言偶有良藥可封之十日不開必愈又玄如其言及解視一臂遂落又玄兄弟五六人互病病必出血月餘又玄見兄兩臂忽病瘡六七處小者如榆錢大者如錢皆成人面明鈔本此條與下條相連並出酉陽雜俎卷十五又江表嘗有商人左臂有瘡悉如人面亦無他苦商人戲滴酒口中其面亦赤以物食之凡物必食食多覺膊內肉漲起疑胃在其中也或不食之則一臂瘠焉有善醫者教其歷試諸藥金石草木悉試之至貝母其瘡乃聚眉閉口商人喜曰此藥必治也因以小葦筒毀其口灌之數日成痂遂愈出酉陽雜俎李言吉金州防禦使崔堯封有親外甥李言吉者左目上臉忽痒而生一小瘡漸長大如鴨卵其根如弦恒壓其目不能開堯封每患之他日飲之酒令大醉遂剖去之言吉不知覺也贅既破中有黃雀鳴噪而去出聞奇錄蒯亮處士蒯亮言其所知額角患瘤醫為割之得一黑石碁子巨斧擊之終不傷缺復有足脛生瘤者因至親家為猘犬所齰正齧其瘤其中得針百餘枚皆可用疾亦愈出稽神錄
