body:
  text: 史姁史姁漢陳留考城史姁字威明年少時嘗病臨死謂母曰我死當复生埋我以竹杖柱于瘞上若杖折掘出我及死埋之柱如其言七日往視杖果折即掘出之已活走至井上浴平复如故后與鄰船至下邳賣鋤不時售云欲歸人不信之曰何有千里暫得歸耶答曰一宿便還即不相信作書取報以為驗實一宿便還果得報考城令江夏唐賈和姊病在鄉里欲急知消息請往省之路遙三千再宿還報范明友奴漢末人發范明友冢家奴死而再活明友是霍光女婿說光家事廢立之際多與漢書相應此奴常游走民間無止住處竟不如所在陳焦孫休永安四年吳民陳焦死埋之六日更生穿土而出崔涵后魏菩提寺西域人所立也在慕義沙門達多發墓取磚得一人以送時太后與孝明帝在華林堂以為妖異謂黃門郎徐紇曰上古以來頗有此事不紇曰昔魏時發冢得霍光女婿范明友家奴說漢朝廢立于史書相符此不足為異也后令紇問其姓名死來幾年何所飲食答曰臣姓崔名涵字子洪博陵安平人父名暢母姓魏家在城西阜財里死時年十五乃二十七在地下十二年常似醉臥無所食時复游行或遇飲食如夢中不甚辨了后即遣門下錄事張雋詣阜財里訪涵父母果有崔暢其妻魏雋問暢曰卿有兒死不暢曰有息子涵年十五而亡雋曰為人所發今日蘇活主上在華林園遣我來問暢聞惊怖曰實無此兒向者謬言雋具以實聞后遣送涵向家暢聞涵至門前起火手持刀魏氏把桃杖拒之曰汝不須來吾非汝父汝非我子急速去可得無殃涵遂舍去游于京師常宿寺門下汝南王賜黃衣一通性畏日不仰視天又畏水火及兵刃之屬常走于路疲則止不徐行也時人猶謂是鬼洛陽大市北有奉終里里內之人多賣送死之具及諸棺槨涵謂曰柏棺勿以桑木為榱人問其故涵曰吾在地下見發鬼兵有一鬼稱之柏棺應免兵吏曰爾雖柏棺桑木為榱遂不免兵京師聞此柏木涌貴人疑賣棺者貨涵故發此言柳萇梁承聖二年二月十日司徒府主簿柳萇卒子褒葬于九江三年因大雨冢坏移葬換棺見父棺中目開心有暖氣良久乃謂褒曰我生已一歲無因令汝知九江神知我橫死遣地神以乳飼我故不死今雨坏我冢亦江神之所為也扶出更生三十年卒劉凱唐貞觀二年陳留縣尉劉全素家于宋州父凱曾任衛縣令卒于官葬于郊三十余年全素丁母憂護喪歸衛將合葬既至啟發其尸儼然如生稍稍而活其子踊躍舉扶將夕能言曰別久佳否全素泣而敘事乃曰勿言吾盡知之速命東流水為湯既至沐浴易衣飲以糜粥神氣屬乃曰吾在幽途蒙署為北酆主者三十年考治幽滯以功業得再生恐汝有疑故粗言之仍戒全素不得泄于人全素遂呼為季父后半年之蜀不還不知所終石函中人上都務本坊貞元中有一人家因打牆掘地遇一石函發之見物如絲滿函飛出于外視之次忽有一人起于函中披發長丈余振衣而起出門失所在其家亦無他前記中多言此事蓋道太陰煉形日將滿人必露之杜錫家婢漢杜錫家葬而婢誤不得出后十余年開冢祔葬而婢尚生問之曰其始如瞑目自謂當一再宿耳初婢埋時年十五六及開冢后資質如故更生十五六年嫁之有子漢宮人漢末關中大亂有發前漢時宮人冢者人猶活既出平复如舊魏郭后愛念之錄置宮中常在左右問漢時宮內事說之了了皆有次敘郭崩哭泣過禮遂死李俄漢末武陵婦人李俄年六十歲病卒埋于城外已半月俄鄰舍有蔡仲聞俄富乃發冢求金以斧剖棺俄忽棺中呼曰蔡仲護我頭仲惊走為縣吏所收當棄市俄兒聞母活來迎出之太守召俄問狀俄對曰誤為司命所召到時得遣出門外見內兄劉文伯惊相對泣俄曰我誤為所召今复得歸既不知道又不能獨行為我求一伴我在此已十余日已為家人所葬那得自歸也文伯即遣門卒與戶曹相聞答曰今武陵西界有男子李黑亦得還便可為伴兼敕黑過俄鄰舍令蔡仲發出于是文伯作書與兒俄遂與黑同歸太守聞之即赦蔡仲仍遣馬吏于西界推問李黑如俄所述文伯所寄書與子子識其紙是父亡時所送箱中之書矣河間女子晉武帝時河間有男女相悅許相配適而男從軍積年不歸女家更以適人女不愿行父母逼之而去尋病死其夫戍還問女所在其家具說之乃至冢欲哭之敘哀而不胜情遂發冢開棺女即蘇活因負還家將養平复后夫聞乃詣官爭之郡縣不能決以讞廷尉奏以精誠之至感于天地故死而更生是非常事不得以常理斷請還開棺者徐玄方女晉時東平馮孝將廣州太守兒名馬子年二十歲余獨臥廄中夜夢見女子年十八九言我是太守北海徐玄方女不幸早亡亡來出入四年為鬼所枉殺案生錄當年八十余聽我更生要當有依憑乃得活又應為君妻能從所委見救活不馬子答曰可爾與馬子克期當出至期日床前有頭發正與地平令人掃去愈分明始悟所夢者遂屏左右便漸額面出次頭形體頓出馬子便令坐對榻上陳說語言奇妙非常遂與馬子寢息每戒云我尚虛借問何時得出答曰出當待本生生日尚未至遂往廄中言語聲音人皆聞之女計生至具教馬子出己養之方法語畢拜去馬子從其言至日以丹雄雞一隻黍飯一盤清酒一升醊其喪前去廄十余步祭訖掘棺出開視女身體完全如故徐徐抱出著氈帳中唯心下微暖口有氣令婢四守養護之常以青羊乳汁瀝其兩眼始開口能咽粥積漸能語二百日持杖起行一期之后顏色肌膚氣力悉复常乃遣報徐氏上下盡來選吉日下禮聘為夫婦生二男長男字元慶永嘉初為秘書郎小男敬度作太傅掾女適濟南劉子彥征士延世之孫蔡支妻臨淄蔡支者為縣吏曾奉書謁太守忽迷路至岱宗山下見如城郭遂入致書見一官儀衛甚嚴具如太守乃盛設酒肴畢付一書謂曰掾為我致此書與外孫也吏答曰明府外孫為誰答曰吾太山神也外孫天帝也吏方惊乃知所至非人間耳掾出門乘馬所之有頃忽達天帝座太微宮殿左右侍臣具如天子支致書訖帝命坐賜酒食仍勞問之曰掾家屬幾人對父母妻皆已物故尚未再娶帝曰君妻卒經幾年矣吏曰三年帝曰君欲見之否支曰恩唯天帝帝即命戶曹尚書敕司命輟蔡支婦籍于生錄中遂命與支相隨而去乃蘇歸家因發妻冢視其形骸果有生驗須臾起坐語遂如舊陳朗婢義熙四年琅邪人陳朗婢死已葬府史夏假歸行冢前聞土中有人聲怪視之婢曰我今更活為我報家其日已暮旦方開土取之強健如常于寶家奴于寶字令升父瑩為丹陽丞有寵婢母甚妒之及瑩亡葬之遂生推婢于墓于寶兄弟尚幼不之審也后十余年母喪開墓而婢伏棺如生載還經日乃蘇言其父恩情如舊地中亦不覺為惡既而嫁之生子韋諷女奴唐韋諷家于汝穎常虛默不務交朋誦習時暇緝園林親稼植小童薙草鋤地見人發鋤漸深漸多而不亂若新梳理之狀諷異之即掘深尺余見婦人頭其肌膚容色儼然如生更加鍬鍤連身背全唯衣服隨手如粉其形氣漸盛頃能起便前再拜言是郎君祖之女奴也名麗容初有過娘子多妒郎不在便生埋于園中托以他事亡去更無外人知某初死被二黑衣人引去至一處太闕廣殿賁勇甚嚴拜其王略問事故黑衣人具述端倪某亦不敢訴娘子須臾引至一曹司見文案積屋吏人或二或五檢尋甚鬧某初一吏執案而問檢案言某命未合死以娘子因妒非理強殺其斷減娘子十一年祿以與某又經一判官按問其事亦明判官尋別有故被罰去職某案便被寢絕九十余年矣彼此散行昨忽有天官來搜求幽系冥司積滯者皆決遣某方得處分如某之流亦甚多數蓋以下賤之人冥官不急故也天官一如今之道士絳服朱冠羽騎隨從方決幽滯令某重生亦不失十一年祿諷問曰魂既有所詣形何不坏答曰凡事未了之人皆地界主者以藥傅之遂不至坏諷惊異之乃為沐浴易衣貌如二十許來其后潛道幽冥中事無所不至諷亦洞曉之常曰修身累德無報以福神仙之道宜勤求之數年后失諷及婢所在親族與其家得遺文記再生之事時武德二年八月也鄴中婦人竇建德常發鄴中一墓無他物開棺見婦人顏色如生姿容絕麗可年二十余衣物形制非近世者候之似有氣息乃收還軍養之三日而生能言云我魏文帝宮人隨甄皇后在鄴死葬于此命當更生而我無家屬可以申訴遂至幽隔不知今乃何時也說甄后見害了了分明建德甚寵愛之其后建德為太宗所滅帝將納之乃具以事白且辭曰妾幽閉黃壤已三百年非竇公何以得見今日死乃妾之分也遂飲恨而卒帝甚傷之李仲通婢開元中李仲通者任鄢陵縣令婢死埋于鄢陵經三年遷蜀郫縣宰家人掃地見發出土中頻掃不去因以手拔之鄢陵婢隨手而出昏昏如醉家人問婢何以至此乃曰適如睡覺仲通以為鬼乃以桃湯灌洗書符御之婢殊不懼喜笑如故乃閉于別室以餅哺之餐啖如常經月余出之驅使如舊便配與奴妻生一男二女更十七年而卒崔生妻元和間有崔生者前婚蕭氏育一兒卒后婚鄭氏蕭卒十二年托夢于子曰吾已得卻生于陽間為吾告汝母能發吾丘乎子雖夢不能言后三日又夢如此子終不能言鄭氏有賢德蕭乃下語于老家人云為吾報鄭夫人速出吾更兩日即不及矣老人家叫曰娘子卻活也夫人卜之曰無生象即罷來日家人又曰娘子卻活也鄭夫人再占卜人曰有生象即開墳果活動矣舁歸鄭夫人以粥飲之氣通能言其說幽途知撫育賢德之恩又說初有一龜環繞某遺骸而去數日又來環饒將去复來嚙某足指則知前卜無生象者龜止環饒而已后云有生象者是龜咬足指也蕭氏與鄭氏為姊妹共居情若骨肉得十年而終東萊人女東萊人有女死已葬女至冥司以枉見捕得還乃敕兩吏送之鬼送墓中雖活而無從出鬼亦患之乃問女曰家中父母之外誰最念汝女曰獨季父耳一鬼曰吾能使來劫墓季父見汝活則遂生也女曰季父仁惻未嘗有過豈能發吾冢耶鬼曰吾易其心也留鬼守之一鬼去俄而季父與諸劫賊發意開棺女忽從棺中起季父惊問之具以前白季父季父大加慚恨諸賊欲遂殺之而季父號泣哀求得免負之而歸
