body:
  text: 麒麟客麒麟客麒麟客者南陽張茂實客傭僕也茂實家於華山下唐大中初偶遊洛中假僕于南市得一人焉其名曰王敻年可四十餘傭作之直月五百勤幹無私出於深誠苟有可為不待指使茂實器之易其名曰大曆將倍其直固辭其家益憐之居五年計酬直盡一旦辭茂實曰敻本居山家業不薄適與厄會須傭作以禳之固非無資而賣力者今厄盡矣請從此辭茂實不測其言不敢留聽之去日暮入白茂實曰感君恩宥深欲奉報敻家去此甚近其中景趣亦甚可觀能相逐一遊乎茂實喜曰何幸然不欲令家人知潛一遊可乎敻曰甚易於是截竹杖長數尺其上書符授茂實曰君杖此入室稱腹痛左右人悉令取藥去後潛置竹於衾中抽身出來可也茂實從之敻喜曰君真可遊吾居者也相與南行一里余有黃頭執青麒麟一赤文虎二候於道左茂實驚欲廻避敻曰無苦但前行既到前敻乘麒麟茂實與黃頭各乘一虎茂實懼不敢近曰敻相隨請不須畏且此物人間之極俊者但試乘之遂憑而上穩不可言於是從之上仙掌峰越壑凌山舉意而過殊不覺峻險如到三更計數百里矣下一山物眾鮮媚松石可愛樓臺宮觀非世間所有將及門引者揖曰阿郎何明鈔本無何字來紫衣吏數百人羅拜道側既入青衣數十人容色皆殊衣服鮮華不可名狀各執樂器引拜遂于中堂宴食畢且命茂實坐敻入更衣返坐衣裳冠冕儀貌堂堂然實真仙之風度也其窗戶階闥屏幃茵褥之盛固非人世所有歌鸞舞鳳及諸聲樂皆所未聞情意高逸不復思人寰之事歡極主人曰此乃仙居非世人所到以君宿緣合一到此故有逃厄之遇仙俗路殊塵靜難雜君宜歸修其心三五劫後當復相見敻比者塵緣將盡上界有名得遇太清真人召入小有洞中示以九天之樂復令下指生死海波且曰樂雖難求苦亦易遣如為山者掬土增高不掬則止穿則陷夫夫原作天據明鈔本改昇高者不上難而下易乎自是修習經六七劫乃證此身廻視委骸積如山岳四四原作曰據明鈔本改大海水半是吾宿世父母妻子別泣之淚然念念修之倏已一世形骸雖遠此不忘修致其功即亦非遠亦時有心遠氣清一言而悟者勉之遺金百鎰為營身之助復乘麒麟令黃頭執之敻步送到家家人方環泣茂實投金於井中敻抽去竹杖令茂實潛臥衾中敻曰我當至蓬萊謁大仙伯明旦蓮花峰上有綵雲車去我之乘也遂揖而去茂實忽呻吟眾驚而問之茂實紿之曰初腹痛時忽若有人見召遂奄然耳不知其多少時也家人曰取藥既廻呼之不應已七日矣唯心頭尚暖故未斂也明日望之蓮花峰上果有彩雲遂棄官遊名山後歸出井中金與眷屬再出遊山後不知所在也出續玄怪錄王法進王法進者劍州臨津人也幼而好道家近古觀雖無道士居之其嬉戲未嘗輕侮於像設也十餘歲有女冠自劍州歷外邑過其家父母以其慕道託女冠以保護之與授正一延生小籙名曰法進而專勤香火齋戒護持亦茹柏絕粒時有感降時三川饑儉斛㪷翔貴死者十五六多採野葛山芋以充饑忽三青童降於其庭謂法進曰上帝以汝夙稟仙骨歸心精誠不忘於道敕我迎汝受事於上京也不覺騰空逕達大帝之所命以玉盃霞漿賜之徐謂曰人處三才之大體天地之和得人形生中土甚不易也天運四時之氣地稟五行之秀生五穀百果以養於人而人不知天地養育之恩輕棄五穀厭捨絲麻使耕農之夫紡績之婦身勤而不得飽力竭而不禦寒徒施其勞曾無愛惜者斯固神明所責天地不佑矣近者地司岳瀆所奏以世人厭擲五穀不貴衣食之本我已敕太華之府收五穀之神所種不成下民饑餓因示罰責以懲其心然旋奉太上慈旨以大道好生務先救物雖天地神明責之愚民不知其過所自固無懺請首原之路汝當為上宮侍童入侍天府今且令汝下歸於世告喻下民使其悔罪寶愛農桑此亦汝之陰功也命侍女以靈寶清齋告謝天地儀一軸付之使傳行於世曰令世人相率於幽山高靜之所致齋悔謝一年再為之則宿罪可除穀父蠶母之神為致豐衍矣龍虎之年復當召汝即今清齋天公告謝之法是也法進以天寶十二年壬辰遂復昇天出仙傳拾遺維楊十友維楊十友者皆家產粗豐守分知足不干祿位不貪貨財慕玄知道者也相約為友若兄弟焉時海內大安民人胥悅遽以酒食為娛自樂其志始於一家周於十室率以為常忽有一老叟衣服滓弊氣貌羸弱似貧窶不足之士也亦著麻衣預十人末預十人末原作領十人來據明鈔本改以造其會眾既適情亦皆憫之不加斥逐醉飽自去莫知所之一旦言於眾曰余力困之士也幸眾人許陪坐末不以為責今十人置宴皆得預之席既周畢亦願力為一會以答厚恩約以他日願得同往至期十友如其言相率以待凌晨貧叟果至相引徐步詣東塘郊外不覺為遠草莽中茆屋兩三間傾側欲摧引入其下有丐者數輩在焉皆是蓬髮鶉衣形狀穢陋叟至丐者相顧而起墻立以俟其命叟令掃除舍下陳列蘧蒢布以菅席相邀環坐日既旰矣咸有饑色久之各以醯鹽竹筯置於客前逡巡數輩共舉一巨板如案長四五尺設於席中以油帊幕之十友相顧謂必濟饑甚以為喜既撒油帊氣烔烔然尚未可辨久而視之乃是蒸一童兒可十數歲已糜爛矣耳目手足半已墮落叟揖讓勸勉使眾就食眾深嫌之多託以飫飽亦有忿恚逃去都無肯食者叟縱意飡啖似有盈味食之不盡即命諸丐擎去令盡食之因謂諸人曰此所食者千歲人參也頗甚難求不可一遇吾得此物感諸公延遇之恩聊欲相報且食之者白日昇天身為上仙眾既不食其命也夫眾驚異悔謝未及叟促問諸丐令食訖即來俄而丐者化為青童玉女幡蓋導從與叟一時昇天十友刳心追求更莫能見出神仙感遇傳金可記新羅人也賓貢進士性沉靜好道不尚華侈或服氣鍊形自以為樂博學強記屬文清麗美姿容舉動言談迥有中華之風俄擢第於終南山子午谷葺居懷隱逸之趣手植奇花異果極多常焚香靜坐若有思念又誦道德及諸仙經不輟後三年思歸本國航海而去復來衣道服卻入終南務行陰德人有所求初無阻拒精勤為事人不可偕也唐大中十一年十二月忽上表言臣奉玉皇詔為英文臺侍郎明年二月二十五日當上昇時宣宗極以為異遣中使徵入內固辭不就又求玉皇詔辭以為別仙所掌不留人間遂賜宮女四人香藥金綵又遣中使二人專伏侍者可記獨居靜室宮女中使多不接近每夜聞室內常有客談笑聲中使窺竊之但見仙官仙女各坐龍鳳之上儼然相對復有侍衛非少而宮女中使不敢輒驚二月二十五日春景妍媚花卉爛熳果有五雲唳鶴翔鸞白鵠笙簫金石羽蓋瓊輪幡幢滿空仙伏極眾昇天而去朝列士庶觀者填隘山谷莫不瞻禮歎異出續仙傳楊真伯弘農楊真伯幼有文性耽翫書史以至忘寢食父母不能禁止時或奪其脂燭匿其詩書真伯頗以為患遂逃過洪饒間於精舍空院肄習半年餘中秋夜習讀次可二更已來忽有人扣學窗牖間真伯淫於典籍不知也俄然有人啟扉而入乃一雙鬟青衣言曰女郎久棲幽隱服氣茹芝多往來洞庭雲水間知君子近至此又骨氣清淨志操堅白願盡款曲真伯殊不應青衣自反三更後聞戶外珩璜環珮之聲異香芳馥俄而青衣報女郎且至年可二八冠碧雲鳳翼冠衣紫雲霞日月衣精光射人逡巡就坐真伯殊不顧問一言久之於真伯案取硯青衣薦牋女郎書札數行㥏然而去真伯因起乃視其所留詩曰君子竟執逆無由達誠素明月海上山秋風獨歸去其後亦不知女郎是何人也豈非洞庭諸仙乎觀其詩思豈人間之言歟出博異志
