body:
  text: 陸法和陸法和陸法和隱於江陵百里洲衣食居處與沙門同自號居士不至城郭容色常定人莫測也侯景始降於梁法和謂南郡朱元英曰貧道應共檀越擊侯景為國立効元英問擊之何也法和曰正自如此及景渡江法和時在清溪山元英往問之曰侯景今圖城其事云何法和曰宜待熟時不撩自落檀越但待侯景熟何勞問也因問克不乃曰亦克亦不克景遣將任約眾號五萬伐湘東王於江陵兵將逼法和乃出詣湘東云自有兵馬馬原作書據明鈔本改乞征任約召諸蠻弟子八百人在江津二日便發王遣胡僧𫀅許刻本𫀅作祐領千餘人與之同行法和登艦大笑曰無量兵馬江陵多神祠人俗常所祈禱自法和軍出無復一驗人以為諸神皆從行故也至赤洲湖與任約相對法和乘輕舟不介胄沿流而下去約軍一里乃遠謂將士曰觀彼龍睡不動吾軍之龍甚自踴躍即攻之縱火舫於前而逆風不便法和執白羽扇以麾風風勢即反約眾皆見梁兵步於水上於是大潰皆投水約逃竄不知所之法和曰明日午時當得及期未得人問之法和曰吾前於此洲水乾時建一剎語檀越等此雖為剎實是賊摽今何不白摽下求賊也如其言果見任約在水中抱剎柱頭纔出鼻遂擒之約言求就師目前死法和曰檀越有相必不死且於王有緣決無他慮王於後微得檀越力果釋用為郡守及及原作又據明鈔本改西軍軍字原無據明鈔本補圍江陵約以兵赴救力戰焉法和既平任約乃還謂湘東王曰侯景自然平矣一無可慮蜀賊將至法和乃請守巫峽待之乃總諸軍而往先運石以填江三日水遂分流橫之以鐵鏁蕭紀果遣蜀將渡峽口勢蹙進退不可王琳與法和經略一戰而殲之山中多毒蟲猛獸法和授其禁戒不復噬螫所近江湖必於岸側結草云此處放生漁者皆無得時將兵猶禁諸軍漁捕有竊為者中夜猛獸必來欲噬之有弟子戲截蛇頭來詣法和法和曰汝何意殺蛇因指以示之弟子乃見蛇頭齚袴襠而不落又有人以牛試刀一下而頭斷來詣法和法和曰有一斷頭牛就卿徵命殊急若不為作功德一月內報至其人不信數日果死其言多驗元帝以法和為郢州刺史法和不稱臣其啟文印名上自稱居士後乃自稱司徒帝謂僕射王褒曰我來未嘗有意用陸為三公而自稱何也褒曰彼即以道術自命容是先知帝曰法和功業稍重遂就拜為司徒後大聚兵艦欲襲襄陽而入武關帝使止之法和乃盡致其兵謂使者曰法和求道之人尚不希釋梵天王豈窺人主之位但與主有香火因緣救援耳今既被疑是業定不可改也於是設供養具大䭔薄餅及西魏舉兵法和赴江陵帝使人逆之曰此自能破賊但鎮郢州不須動也法和乃還州堊其城門著麤白布衫布袴邪中大繩束腰坐葦席終日乃脫之及聞梁滅復取前凶服著之受弔梁人西入魏果見䭔餅焉出渚宮舊事王梵志衛州黎陽人也黎陽城東十五里有王德祖當隋文帝時家有林檎樹生癭大如斗經三年朽爛德祖見之乃剖其皮遂見一孩兒抱胎而德祖收養之至七歲能語曰誰人育我復何姓名德祖具以實語之因名曰林木梵天明鈔本因名曰林木梵天句作因曰雙木曰梵名曰梵天後改曰梵志曰王家育我可姓王也梵志乃作詩示人甚有羲旨出史遺明鈔本作出逸史王守一唐貞觀初洛城有一布衣自稱終南山人姓王名守一常負一大壺賣藥人有求買之不得者病必死或急趁無疾人授與之者其人旬日後必染沈痼也柳信者世居洛陽家累千金唯有一子既冠後忽於眉頭上生一肉塊歷使療之不能除去及聞此布衣遂躬自禱請既至其家乃出其子以示之布衣先焚香命酒脯猶若祭祝後方於壺中探一丸藥嚼傅肉塊復請具樽俎須臾間肉塊破有小蛇一條突出在地約長五寸五色爛然漸漸長及一丈已來其布衣乃盡飲其酒叱蛇一聲其蛇騰起雲霧昏暗布衣忻然乘蛇而去不知所在出大唐奇事李子牟李子牟者唐蔡王第七子也風儀爽秀才調高雅性閑音律尤善吹笛天下莫比其能江陵舊俗孟春望夕尚列影燈其時士女緣江軿闐縱觀子牟客遊荊門適逢其會因謂朋從曰吾吹笛一曲能令萬眾寂爾無譁於是同遊贊成其事子牟即登樓臨軒廻明鈔本廻作獨奏清聲一發百戲皆停行人駐愁明鈔本愁作足坐者起聽曲罷良久眾聲復喧而子牟恃能意氣自若忽有白叟自樓下小舟行吟而至狀貌古峭辭韻清越子牟洎坐客爭前致敬叟謂子牟曰向者吹笛豈非王孫乎天格絕高惜者樂器常常耳子牟則曰僕之此笛乃先帝所賜也神鬼異物則僕不知音樂之中此為至寶平生視僅過萬數方僕所有皆莫能知明鈔本能知作之比而叟以為常常豈有說乎叟曰吾少而習焉老猶未倦如君所有非吾敢知王孫以為不然當為一試子牟以授之而叟引氣發聲聲成而笛裂四座駭愕莫測其人子牟因叩顙求哀希逢珍異叟對曰吾之所貯君莫能吹即令小僮自舟齎至子牟就視乃白玉耳叟付子牟令其發調氣力殆盡纖響無聞子牟彌不自寧虔恭備極叟乃授之微弄座客心骨泠然叟曰吾愍子志尚試為一奏清音激越遐韻泛溢五音六律所不能偕曲未終風濤噴騰雲雨昏晦少頃開霽則不知叟之所在矣出集異記呂翁開元十九年道者呂翁經邯鄲道上邸舍中設榻施席擔明鈔本擔作解囊而坐俄有邑中少年盧生衣短裘乘青駒將適于田亦止邸中與翁接席言笑殊暢久之盧生顧其衣裝弊褻乃歎曰大丈夫生世不諧而困如是乎翁曰觀子膚極腧體胖無恙談諧方適而歎其困者何也生曰吾此苟生耳何適之為翁曰此而不適而何為適生曰當建功樹名出將入相列鼎而食選聲而聽使族益茂而家用肥然後可以言其適吾志于學而游于藝自惟當年朱紫可拾今已過壯室猶勤田畝非困而何言訖目昏思寐是時主人蒸黃粱為饌翁乃探囊中枕以授之曰子枕此當令子榮適如志其枕瓷而竅其兩端生俛首就之寐中見其竅大而明朗可處舉身而入遂至其家娶清河崔氏女女容甚麗而產甚殷由是衣裘服御日已華侈明年舉進士登甲科解褐授校書郎應制舉授渭南縣尉遷監察御史起居舍人為制誥三年即真出典同州尋轉陝州生好土功自陝西開河八十里以濟不通邦人賴之立碑頌德遷汴洲嶺南道採訪使入京為京兆尹是時神武皇帝方事夷秋吐蕃新諾羅龍莽布攻陷爪沙節度使王君㚟新被敘投河隍戰恐明鈔本新被敘投河隍戰恐八字作與之戰于河隍敗績帝思將帥之任遂除生御史中丞河西隴右節度使大破戎虜七千級開地九百里築三大城以防要害北邊賴之以石紀功焉歸朝策勳恩禮極崇轉御史大夫吏部侍郎物望清重群情翕習大為當時宰相所忌以飛語中之貶端州刺史三年徵還除戶部尚書未幾拜中書侍郎同中書門下平章事與蕭令嵩裴侍中光庭同掌大政十年嘉謀密命一日三接獻替啟沃號為賢相同列者害之遂誣與邊將交結所圖不軌下獄府吏引徒至其門追之甚急生惶駭不測泣其妻子曰吾家本山東良田數頃足以禦寒餒何苦求祿而今及此思復衣短裘乘青駒行邯鄲道中不可得也引刀欲自裁其妻救之得免共罪者皆死生獨有中人保護得減死論出授驩牧數歲帝知其冤復起為中書令封趙國公恩旨殊渥備極一時生有五子僔倜儉位倚僔為考功員外儉為侍御史位為太常丞季子倚最賢年二十四為右補闕其姻媾皆天下族望有孫十餘人凡兩竄嶺表再登台鉉出入中外廻翔臺閣三十餘年間崇盛赫奕一時無比末節頗奢蕩好逸樂後庭聲色皆第一前後賜良田甲第佳人名馬不可勝數後年漸老屢乞骸骨不許及病中人候望接踵於路名醫上藥畢至焉將終上疏曰臣本山東書生以田圃為娛偶逢聖運得到官序過蒙榮獎特受鴻私出擁旄鉞入昇鼎輔周旋中外綿歷歲年有忝恩造無裨聖化負乘致寇履薄戰競日極一日不知老之將至今年逾八十位歷三公鍾漏並歇筋骸俱弊彌留沈困殆將溘盡顧無誠効上答休明空負深恩永辭聖代無任感戀之至謹奉表稱謝以聞詔曰卿以俊德作余元輔出雄藩垣入贊緝熙昇平二紀寔卿是賴比因疾累日謂痊除豈遽沈頓良深憫默今遣驃騎大將軍高力士就第候省其勉加針灸為余自愛讌冀無妄期丁有喜其夕卒盧生欠伸而寤見方偃於邸中顧呂翁在傍主人蒸黃粱尚未熟觸類如故蹶然而興曰豈其夢寐耶翁笑謂曰人世之事亦猶是矣生然之明鈔本然之作默然良久謝曰夫寵辱之數得喪之理生死之情盡知之矣此先生所以窒吾欲也敢不受教再拜而去出異聞集管子文李林甫為相初年有一布衣詣謁之閽吏謂曰朝廷新命相國大寮尚未敢及門何布衣容易謁之耶布衣執刺待於路傍高聲自稱曰業八體書生管子文欲見相國伸一言林甫召之於賓館至夜靜月下揖之生曰僕實老於書藝亦自少遊圖籍之圃嘗竊見古昔興亡明主賢臣之事故願謁公以伸一言林甫曰僕偶備位於輔弼實非才器已恐不勝大任福過禍隨也君幸辱玉趾敢授教於君君其無惜藥石之言以惠鄙人生曰古人不容易而談者蓋知談之易聽之難也必能少覽容易之言而不容易而聽則涓塵皆可以裨海岳也況聖哲云一言可以興邦一言可以喪邦公若聞一言即欲奉而行之臨一事即恣心狥意如此則雖日納獻言之士亦無益也林甫乃容恭意謹而言曰君但一言教僕僕當書紳而永為箴誡生曰君聞美言必喜聞惡言必怒僕以美言譽君則無裨君之事以惡言諷君既犯君之顏色既犯君之顏色君復怒我即不得盡伸惡言矣美言狥而損惡言直而益君當悉察之容我之言勿復加怒林甫不覺膝席而聽生曰君為相相天子也相天子安宗社保國也宗社安萬國寧則天子無事天子無事則君之無事設或天下有一人失所即罪在天子罪在天子焉用君相夫為相之道不必獨任天下事當舉文治天下之民舉武定天下之亂則仁人撫疲瘵用義士和鬭戰自修節儉以諷上以化下自守忠貞以事主以律人固不暇躬勤庶政也庶政得人即治苟不得人雖才如伊呂亦不治噫相國慎之林甫聽之駭然遽起拜謝之生又曰公知斯運之通塞耶林甫曰君當盡教我我當終身不忘生曰夫治生亂亂生治今古不能易也我國家自革隋亂而治至於今日亂將生矣君其記之林甫又拜謝至曙欲聞於上縻從一爵祿令左右潛守之堅求退曰我本秪欲達一言於公今得竭愚悃而又辱見納又何用阻野人之歸也林甫堅留之不得遂去林甫令人暗逐之生至南山中一石洞其人尋亦入石洞遽不見生唯有故舊大筆一其人攜以白林甫林甫以其筆置於書閣焚香拜祝其夕筆忽化為一五色禽飛去不知所之出大唐奇事袁嘉祚唐寧王傅袁嘉祚為人正直不阿能行大節犯顏悟主雖死不避後為鹽州刺史以清白尤異昇聞時岑羲蕭至忠為相授嘉祚開州刺史嘉祚恨之頻言其屈二相大怒詬詬原作詭據明鈔本改嘉祚曰愚夫叱令去嘉祚方惆悵飲馬于義井有一人背井坐以水濯手故濺水數驚嘉祚馬嘉祚忿之罵曰臭卒伍何事驚馬其人顧嘉祚曰眼看使於蠮蠛國未知死所何怒我焉嘉祚思其言不能解異之明復至朝果為二相所召迎謂曰知公跡素高要公銜朝命充使今以公為衛尉少卿往蠮蠛國報聘可乎嘉辭以不才二相日行文下嘉祚大恐行至義井復遇昨驚馬人謂嘉祚曰昨昨原作視據明鈔本改宰相欲令使遠國信乎嘉祚下馬拜之異人曰公無憂也且止不行其二相頭已懸槍刃矣焉能怒公言畢不知所之間一日二相皆誅果如異人言矣其蠮蠛國在大秦國西數千里自古未嘗通二相死嘉祚竟不去鄭相如鄭虔工詩嗜酒性甚閑放玄宗愛其曠達欲致之郎署又以其不事事故特置廣文館命虔為博士名籍甚著門庭車馬無非才俊有鄭相如者滄州人應進士舉入京聞虔重名以宗姓因謁虔因之敘叔姪見其老倒未甚敬之後數日謁虔獨與坐問其藝業相如笑謂虔曰叔未知相如應以凡人遇然人未易知既見問敢不盡其詞相如若在孔門當處四科猶居游夏之右若叔在孔門不得列為四科今生不遇時而應此常調但銷聲晦跡而已虔聞之甚驚請窮其說相如曰孔子稱其或繼周者雖百世可知之也今相如亦知之然國家至開元三十年當改年號後十五年當有難天下至此兵革興焉賊臣篡位當此時叔應授偽官列在朝省仍為其累願守臣節可以免焉此後蒼生塗炭未已相如今年進士及第五選得授衢州信安尉至三考死於衢州官祿如此不可強致也其年果進士及第辭虔歸鄉及期而選見虔京師為吏部一注信安尉相如有喜色於是辭虔赴任初一考問衢州考吏曰鄭相如何曰甚善問其政曰如古人二考又考之曰無恙三考又問之考吏曰相如校考後暴疾不起虔甚驚歎方思其言又天寶十五年祿山反遣兵入京城收諸官吏赴洛陽虔時為著作郎抑授水部郎中及克復貶衢州司戶至任而終竟一如相如之言也原闕出處明鈔本作出廣異記
