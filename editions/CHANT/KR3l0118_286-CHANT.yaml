body:
  text: 張和張和唐貞元初蜀郡豪家富擬卓鄭蜀之名姝無不畢致每按圖求之媒盈其門常恨無可意者或言坊正張和大俠也幽房閨稚無不知之盍以誠投乎豪家子乃以金帛夜詣其居告之張和欣然許之異日與豪家子皆出西郭一舍入廢蘭若有大像巍然與豪家子昇像之座和引手捫佛乳揭之乳壞成穴如椀即挺身入穴引豪家子臂不覺同在穴中通行數十步忽覩高門崇墉狀如州縣和扣門五六有丸髻婉童迎拜曰主人望翁來久矣有頃主人出紫衣貝帶侍者十餘見和甚謹和指豪家子曰此少君子也汝可善侍予有切事須返不坐而去言訖已失和所在豪家子心異之不敢問主人延於中堂珠璣緹繡羅列滿目具陸海珍膳命酌進妓交鬟撩鬢縹然神仙其舞杯閃毬之令悉新而多思有金器容數升雲擎鯨口鈿以珠粒豪家子不識問之主人笑曰此次皿也本擬伯雅豪家子竟不解至三更主人忽顧妓曰無廢歡笑予暫有所適揖客而起騎從如州牧列炬而出豪家子因私於墻隅妓中年差暮者遽就謂曰嗟乎君何以至是我輩已為所掠醉其幻術歸路永絕君若要歸但取我教受以七尺白練戒曰可執此候主人歸詐祈事設拜主人必答拜因以練蒙其頸將曙主人還豪家子如其教主人投地乞命曰死嫗負心終敗吾事今不復居此乃馳騎他去所教妓即與豪家子居二年忽思歸妓亦不留大設酒樂餞之飲闌妓自持鍤開東墻一穴亦如佛乳推豪家子於墻外乃長安東墻下遂乞食方達蜀其家失已多年意其異物道其初始信胡媚兒唐貞元中楊州坊市間忽有一妓術丐乞者不知所從來自稱姓胡名媚兒所為頗甚怪異旬日之後觀者稍稍雲集其所丐求日獲千萬一旦懷中出一琉璃瓶子可受半升表裏烘明如不隔物遂置於席上初謂觀者曰有人施與滿此瓶子則足矣瓶口剛如葦管大有人與之百錢投之琤然有聲則見瓶間大如粟粒眾皆異之復有人與之千錢投之如前又有與萬錢者亦如之俄有好事人與之十萬二十萬皆如之或有以馬驢入之瓶中見人馬皆如蠅大動行如故須臾有度支兩稅綱自揚子院部輕貨數十車至駐觀之以其一時入或終不能致將他物往且謂官物不足疑者乃謂媚兒曰爾能令諸車皆入此中乎媚兒曰許之則可綱曰且試之媚兒乃微側瓶口大喝諸車輅輅相繼悉入瓶瓶中歷歷如行蟻然有頃漸不見媚兒即跳身入瓶中綱乃大驚遽取撲破求之一無所有從此失媚兒所在後月餘日有人於清河北逢媚兒部領車乘趨東平而去是時李師道為東平帥也中部民唐元和初有天水趙雲客遊鄜畤過中部縣縣僚有燕吏擒一人至其罪不甚重官僚欲縱之雲醉固勸加刑於是杖之累月雲出塞行及蘆子關道逢一人要之言款日暮延雲下道過其居去路數里於是命酒偶酌既而問曰君省相識耶雲曰未嘗此行實昧平生復曰前某月日於中部值君某遭罹橫罪與君素無讎隙奈何為君所勸因被重刑雲遽起謝之其人曰吾望子久矣豈虞於此獲雪小恥乃令左右拽入一室室中有大坑深三丈餘坑中唯貯酒糟十斛剝去其衣推雲於中飢食其糟渴飲其汁於是昏昏幾一月乃縛出之使人蹙鴳鼻額援捩支體其手指肩髀皆改舊形提出風中倏然凝定至於聲韻亦改遂以賤隸蓄之為烏延驛中雜役累歲會其弟為御史出按靈州獄雲以前事密疏示之其弟言於觀察使李銘由是發卒討尋盡得奸宄乃復滅其黨臨刑亦無隱匿云前後如此變改人者數世矣板橋三娘子唐汴州西有板橋店店娃三娘子者不知何從來寡居年三十餘無男女亦無親屬有舍數間以鬻餐為業然而家甚富貴多有驢畜往來公私車乘有不逮者輒賤其估以濟之人皆謂之有道故遠近行旅多歸之元和中許州客趙季和將詣東都過是宿焉客有先至者六七人皆據便榻季和後至最得深處一榻榻鄰比主人房壁既而三娘子供給諸客甚厚夜深致酒與諸客會飲極歡季和素不飲酒亦預言笑至二更許諸客醉倦各就寢三娘子歸室閉關息燭人皆熟睡獨季和轉展不寐隔壁聞三娘子窸窣若動物之聲偶於隙中窺之即見三娘子向覆器下取燭挑明之後於巾廂中取一副耒耜並一木牛一木偶人各大六七寸置於竈前含水噀之二物便行走小人則牽牛駕耒耜遂耕牀前一席地來去數出又於廂中取出一裹蕎麥子受於小人種之須臾生花發麥熟令小人收割持踐可得七八升又安置小磨子磑成麵訖却收木人子於廂中即取麵作燒餅數枚有頃雞鳴諸客欲發三娘子先起點燈置新作燒餅於食牀上與客點心季和心動遽辭開門而去即潛於戶外窺之乃見諸客圍牀食燒餅未盡忽一時踣地作驢鳴須臾皆變驢矣三娘子盡驅入店後而盡沒其貨財季和亦不告於人私有慕其術者後月餘日季和自東都回將至板橋店預作蕎麥燒餅大小如前既至復寓宿焉三娘子歡悅如初其夕更無他客主人供待愈厚夜深殷勤問所欲季和曰明晨發請隨事點心三娘子曰此事無疑但請穩睡半夜後季和窺見之一依前所為天明三娘子具盤食果實燒餅數枚於盤中訖更取他物季和乘間走下以先有者易其一枚彼不知覺也季和將發就食謂三娘子曰適會某自有燒餅請撤去主人者留待他賓即取己者食之方飲次三娘子送茶出來季和曰請主人嘗客一片燒餅乃揀所易者與噉之纔入口三娘子據地作驢聲即立變為驢甚壯健季和即乘之發兼盡收木人木牛子等然不得其術試之不成季和乘策所變驢周遊他處未嘗阻失日行百里後四年乘入關至華岳廟東五六里路傍忽見一老人拍手大笑曰板橋三娘子何得作此形骸因捉驢謂季和曰彼雖有過然遭君亦甚矣可憐許請從此放之老人乃從驢口鼻邊以兩手擘開三娘子自皮中跳出宛復舊身向老人拜訖走去更不知所之關司法鄆州司法關某有傭婦人姓鈕關給其衣食以充驅使年長謂之鈕婆並有一孫名萬兒年五六歲同來關氏妻亦有小男名封六大小相類關妻男常與鈕婆孫同戲每封六新製衣必易其故者與萬兒一旦鈕婆忽怒曰皆是小兒何貴何賤而彼衣皆新而我兒得其舊甚不平也關妻問曰此吾子爾孫僕隸耳吾念其與吾子年齒類故以衣之奈何不知分理自此故衣亦不復得矣鈕婆笑曰二子何異也關妻又曰僕隸那與好人同鈕婆曰審不同某請試之遂引封六及其孫悉內於裙下著地按之關妻驚起奪之兩子悉為鈕婆之孫形狀衣服皆一不可辨乃曰此即同矣關妻大懼即與司法同祈請懇至曰不意神人在此自此一家敬事不敢以舊禮相待矣良久又以二子致裙下按之即各復本矣關氏乃移別室居鈕婆厚待之不復使役積年關氏頗厭怠私欲害之令妻以酒醉之司法伏戶下以钁擊之正中其腦有聲而倒視之乃栗木長數尺夫妻大喜命斧砍而焚之適盡鈕婆自室中出曰何郎君戲之酷也言笑如前殊不介意鄆州之人知之關不得已將白於觀察使入見次忽有一關司法已見使言說形狀無異關遂歸及到家堂前已有一關司法先歸矣妻子莫能辨之又哀祈鈕婆涕泣拜請良久漸相近却成一人自此其家不復有加害之意至數十年尚在關氏之家亦無患耳長樂里人唐寶曆中長樂里門有百姓刺臂數十人環矚之忽有一人白襴傾首微笑而去未十步百姓子刺血如衄痛苦次骨食頃出血斗餘眾人疑向觀者所為令其父從而求之其人不承其父拜數十乃捻轍土若祝可傅此如其言血止陳武振唐振州民陳武振者家累萬金為海中大豪犀象玳瑁倉庫數百先是西域賈漂舶溺至者因而有焉海中人善呪術俗謂得牟法凡賈舶經海路與海中五郡絕遠不幸風漂失路入振州境內振民即登山披髮以呪咀起風揚波舶不能去必漂於所呪之地而止武振由是而富招討使韋公幹以兄事武振武振沒入公幹之室亦竭矣海中婦人海中婦人善厭媚北人或妻之雖蓬頭傴僂能令男子酷愛死且不悔苟棄去北還浮海蕩不能進乃自返畫工唐進士趙顏於畫工處得一軟障圖一婦人甚麗顏謂畫工曰世無其人也如何令生某願納為妻畫工曰余神畫也此亦有名曰真真呼其名百日晝夜不歇即必應之應則以百家彩灰酒灌之必活顏如其言遂呼之百日晝夜不止乃應曰喏急以百家綵灰酒灌遂活下步言笑飲食如常曰謝君召妾妾願事箕帚終歲生一兒兒年兩歲友人曰此妖也必與君為患余有神劍可斬之其夕乃遺顏劍劍纔及顏室真真乃泣曰妾南嶽地仙也無何為人畫妾之形君又呼妾名既不奪君願君今疑妾妾不可住言旋攜其子却上軟障嘔出先所飲百家綵灰酒覩其障唯添一孩子皆是畫焉
