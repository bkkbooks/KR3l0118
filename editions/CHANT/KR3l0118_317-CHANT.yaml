body:
  text: 吳祥吳祥漢諸暨縣吏吳祥者憚役委頓將投竄深山行至一溪日欲暮見年少女子綵衣甚美云我一身獨居又無鄉里唯有一孤嫗相去十餘步耳祥聞甚悅便即隨去行一里餘即至女家家甚貧陋為祥設食至一更竟聞一嫗喚云張姑子女應曰諾祥問是誰答云向所道孤嫗也二人共寢至曉雞鳴祥去二情相戀女以紫巾贈祥祥以布手巾報行至昨夜所遇處過溪其夜水暴溢深不可涉乃迴向女家都不見昨處但有一冢耳周翁仲汝南周翁仲初為太尉掾婦產男及為北海相吏周光能見鬼署為主簿使還致敬於本郡縣因告之曰事訖臘日可與小兒俱侍祠主簿事訖還翁仲問之對曰但見屠人弊衣蠡髻而踞神坐持刀割肉有衣冠青墨綬數人彷徨堂東西廂不進不知何故翁仲因持劍上堂謂嫗曰汝何故養此子嫗大怒曰君常言兒體貌聲氣喜學似我老翁欲死作為狂語翁仲具告之祠祭如此不具服子母立截嫗泣涕言昔以年長無男不自安實以女易屠者之男畀錢一萬此子年已十八遣歸其家迎其女已嫁賣餅者妻後適西平李之思文思官至南陽太守田疇北平人也劉虞為公孫瓚所害疇追慕無已往虞墓設雞酒之禮哭之音動林野翔烏為之悽鳴走獸為之悲吟疇臥於草間忽有人通云劉幽州來欲與田子泰言生平之事疇神悟遠識知是劉虞之魂既進而拜疇泣不自止因相與進雞進酒疇醉虞曰公孫瓚購求子甚急宜竄伏避害疇對曰君臣之道生則盡其義今見君之靈願得同歸九泉骨且不朽安可逃乎虞曰子萬古之高士也深慎爾儀奄然不見而疇醉亦醒文頴漢南陽文頴字叔長建安中為甘陵府丞過界止宿夜三鼓時夢見一人跪前曰昔我先人葬我於此水來湍墓棺木溺漬水處半然無以自溫聞君在此故來相依欲屈明日暫住須臾幸為相遷高燥處鬼披衣示頴而皆沾濕頴心愴然即寤訪諸左右曰夢為虛耳何是怪頴乃還眠向晨復夢見謂頴曰我以窮苦告君奈何不相愍悼乎頴夢中問曰子為誰對曰吾本趙人今屬汪芒氏之神頴曰子棺今何所在對曰近在君帳北十數步水側枯楊樹下即是吾也天將明不復得見君必念之頴答曰諾忽然便寤天明可發頴曰雖云夢不足怪此何太過左右曰亦何惜須臾不驗之耶頴即起率十數人將導順水上果得一枯楊曰是矣掘其下未幾果得棺棺甚朽壞沒半水中頴謂左右曰向聞於人謂之虛矣世俗所傳不可無驗為移其棺葬之而去王樊燉煌實錄云王樊卒有盜開其冢見樊與人樗蒱以酒賜盜者盜者惶怖飲之見有人牽銅馬出冢者夜有神人至城門自云我王樊之使今有發冢者以酒墨其脣訖旦至可以驗而擒之盜既入城城門者乃縛詰之如神所言秦巨伯琅邪秦巨伯年六十嘗夜行飲酒道經蓬山廟忽見其兩孫迎之扶持百餘步便捽伯頸著地罵老奴汝某日捶我我今當殺汝伯思惟某時信捶此孫伯乃佯死乃置伯去伯歸家欲治兩孫孫驚惋叩頭言為子孫寧可有此恐是鬼魅乞更試之伯意悟數日乃詐醉行此廟間復見兩孫來扶持伯伯乃急持動作不得達家乃是兩人也伯著火灸之腹背俱焦坼出著庭中夜皆亡去伯恨不得之後月又佯酒醉夜行懷刀以去家不知也極夜不還其孫又恐為此鬼所困仍俱往迎之伯乃刺殺之宗岱宗岱為青州刺史禁淫祀著無鬼論甚精無能屈者鄰州咸化之後有一書生葛巾修刺詣岱與之談甚久岱理未屈辭或未暢書生輒為申之次及無鬼論便苦難岱岱理欲屈書生乃振衣而起曰君絕我輩血食二十餘年君有青牛髯奴未得相困耳今奴已叛牛已死令日得相制矣言絕遂失書生明日而岱亡鄭奇後漢時汝南汝陽西門亭有鬼魅賓客宿止多死亡或亡髮失精郡侍奉掾宜祿鄭奇休去亭六七里有美婦人乞寄載奇初難之然後上車入亭趨至樓下吏卒白樓不可上奇曰我不惡也時亦昏冥遂上樓與婦人接宿未明發去亭卒上樓掃除見死婦大驚走白亭長擊鼓會諸廬吏共集診之乃享西北八里吳氏婦新亡夜臨殯火滅及火至失之其家即持去奇發行數里腹痛到南頓利陽亭加劇物故樓遂無敢復上鍾繇鍾繇忽不復朝會意性有異於常寮友問其故云常有婦人來美麗非凡間者曰必是鬼物可殺之後來止戶外曰何以有相殺意元常曰無此慇懃呼入意亦有不忍乃微傷之便出去以新綿拭血竟路明日使人尋跡至一大冢棺中一婦人形體如生白練衫丹繡裲襠傷一髀以裲襠中綿拭血自此便絕夏侯玄夏侯玄被司馬景王所誅宗人為設祭見玄來靈座脫頭於邊悉歛果魚酒肉之屬以內頸中畢還自安其頭既而言曰吾得請於帝矣子元無嗣也尋有永嘉之役軍還世宗殂而無子稽康稽康燈下彈琴忽有一人長丈餘著黑單衣革帶康熟視之乃吹火滅之曰恥與魑魅爭光嘗行去路數十里有亭名月華投此亭由來殺人中散心神蕭散了無懼意至一更操琴先作諸弄雅聲逸奏空中稱善中散撫琴而呼之君是何人答云身是故人幽沒於此聞君彈琴音曲清和昔所好故來聽耳身不幸非理就終形體殘毀不宜接見君子然愛君之琴要當相見君勿怪惡之君可更作數曲中散復為撫琴擊節曰夜已久何不來也形骸之間後何足計乃手挈其頭曰聞君奏琴不覺心開神悟怳若暫生遂與共論音聲之趣辭甚清辯謂中散曰君試以琴見與乃彈廣陵散便從受之果悉得中散先所受引殊不及與中散誓不得教人天明語中散相與雖一遇於今夕可以遠同千載於此長絕不勝悵然倪彥思吳時嘉興倪彥思居縣西埏里有鬼魅在其家與人語飲食如人唯不見形彥思奴婢有竊罵大家者云今當以語彥思治之無敢詈之者彥思有小妻魅從求之彥思乃迎道士逐之酒殽既設鬼乃取廁中草糞布著其上道士便盛擊鼓召請著神魁乃取虎伏於神座上吹作角聲音有頃道士忽覺背上冷驚起解衣乃伏虎也於是道士罷去彥思夜於被中竊於嫗語共患此魅魅即屋樑上謂彥思曰汝與婦道吾吾今當截汝屋樑即隆隆有聲彥思懼梁斷取火照視魅即滅火截梁聲愈急彥思懼屋壞大小悉遣出更取火視梁如故魅大笑問彥思復道吾不郡中典農聞之曰此神正當是狸物耳此魅即往謂典農曰汝取官若干百斛穀藏著某處為吏污穢而敢論吾今當白於官將人取汝所盜穀典農大怖而謝之自後無敢道三年後去不知所在沈季吳興沈季吳天紀二年為豫章太守白日於廳上見一人著黃巾練衣自稱汝南平興許子將求改葬悠然不見季求其喪不知所在遂招魂葬之糜竺糜竺用陶朱公計術日益億萬之利貲擬王侯有寶庫千間竺性能振生死家馬廄屋側有古冢中有伏尸竺夜尋其泣聲忽見一婦人袒背而來云昔漢末為赤眉所發扣棺見剝今袒肉在地垂二百餘年就將軍求更深埋并乞弊衣自掩竺即令為石椁瓦棺設祭既畢以青布衫裙置於冢上經一年行於路曲忽見前婦人葬所青氣如龍虵之形或有人問竺曰將非龍怪耶竺乃疑此異乃問其家童曰時見一青蘆杖自然出入於門疑其神也不敢言竺為性多忌信厭術之士有言中忤即加刑戮故家童不言竺貲貸如丘山不可算記內以方諸為具及大珠如卵散滿於庭故謂之寶庭而外人不得窺數日忽見有青衣童子數人來云糜竺家當有火厄萬不遺一賴君能惻愍枯骨天道不辜君德故來禳却此火當使君財物不盡自今以後亦宜自衛竺乃掘溝渠周繞其庫內旬日火從庫內起燒其珠玉十分得一皆是陽燧得旱爍自能燒物也火盛之時見數十青衣童子來撲火有青氣如雲覆火上即滅童子又云多聚鸛鳥之類以禳災鸛能聚水巢上也家人乃收集鵁鶄數千頭養於池渠之中厭火也竺歎曰人生財運有限不得盈溢竺懼為身之患時三國交兵軍用萬倍乃輸其珍寶車服以助先主黃金一億斤錦綺繡氈罽積如丘山騣馬千匹及蜀破後無所有飲恨而終王弼王弼注易輒笑鄭玄為儒云老奴無意于時夜分忽聞外閤有著屐聲須臾便進自云鄭玄責之曰君年少何以輕穿鑿文句而妄譏詆老子也極有忿色言竟便退弼惡之後遇癘而卒陳仙吳時陳仙以商賈為事驅驢行忽過一空宅廣廈朱門都不見人仙牽驢入宿至夜聞有語聲小人無畏敢見行災便有一人逕到仙前叱之曰汝敢輒入官舍時籠月曖昧見其面上黶深目無瞳子唇褰齒露手執黃絲仙既奔走後村具說事狀父老云舊有惡鬼明日看所見屋宅處並高墳深𡑞胡熙吳左中郎廣陵相胡熙字元光女名中許嫁當出而欻有身女亦不自覺熙父信嚴而有法乃遣熙妻丁氏殺之欻有鬼語腹中音聲嘖嘖曰何故殺我母我某月某日當出左右驚怪以白信信自往聽乃捨之及產兒遺地則不見形止聞兒聲在於左右及長大音語亦如人熙妻別為施帳時自言當見形使姥見熙妻視之在丹帷裹前後釘金釵好手臂善彈琴時問姥及母嗜欲為得酒脯棗之屬以還母坐作衣兒來抱膝緣背數戲中不耐之意竊怒曰人家豈與鬼子相隨即於旁怒曰就母戲耳乃罵作鬼子今當從母指中入於母腹使母知之中指即直而痛漸漸上入臂髀若有貫刺之者須臾欲死熙妻乃設饌祝請之有頃而止魯肅孫權病巫啟云有鬼著絹巾似是故將相呵叱初不顧徑進入宮其夜權見魯肅來衣巾悉如其言
