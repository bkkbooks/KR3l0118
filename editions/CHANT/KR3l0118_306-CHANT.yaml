body:
  text: 陳袁生陳袁生貞元初陳郡袁生者嘗任參軍於唐安罷秩遊巴川舍於逆旅氏忽有一夫白衣來謁既坐謂生曰某高氏子也家於此郡新明縣往者常職軍伍間今則免矣故旅遊至此生與語其聰辯敏博迥出於人袁生奇之又曰某善算者能析君平生事生即訊之遂述既往事一一如筆寫生大驚是夕夜既深密謂袁生曰我非人也幸一陳於君子可乎袁生聞之懼即起曰君非人果鬼乎是將禍我耶高生曰吾非鬼亦非禍君所以來者將有託於君耳我赤水神有祠在新明之南去歲淫雨數月居舍盡圮郡人無有治者使我為風日所侵鑠且日如樵牧者欺侮里中人視我若一坏土耳今我訴於子子以為可則言不則去無恨也袁生曰神既有願又何不可哉神曰子來歲當調補新明令儻為我重建祠宇以時奠祀則真幸之甚也願無忘袁生諾之既而又曰君初至邑時當一見詣然而人神理隔慮君僕吏有黷於我君當屏去其吏獨入廟中冀盡一言耳袁生曰謹奉教是歲冬袁生果補新明令及至任訊之果有赤水神廟在縣南數里旬餘遂詣之未至百餘步下馬屏車吏獨入廟中見其簷宇摧毀蓬荒如積佇望久之有一白衣丈夫自廟後來高生也色甚喜既拜謂袁生曰君不忘前約今日乃詣我幸何甚哉於是偕行廟中見階垣下有一老僧具桎梏數人立其旁袁生問曰此何為者神曰此僧乃縣東蘭若道成師也有殃故吾繫之一歲矣每旦夕則鞭捶之從此旬餘當解之袁生又曰此僧既存安得繫於此乎神曰以生魄繫之則其人自沈疾亦安能知吾之為哉神告袁生曰君幸諾我建廟可疾圖之袁生曰不敢忘既歸將計其工然貧甚無以為資因自念曰神人所言繫道成師之魄當沈疾又云從此去旬餘當解之吾今假於他語俾建其廟宇又安有疑乎於是徑往縣東蘭若問之果有成師者臥疾一歲矣道成曰某病且死旦夕則一身盡痛袁生曰師疾如是且近於死矣然我能愈之師能以緡貨建赤水神廟乎道成曰疾果愈又安能以緡貨為事哉袁生即紿曰吾善視鬼近謁赤水神廟見師魂具桎梏縶於垣下因召赤水神問其事曰此僧有宿殃故縶於此吾憐師之苦因告其神何為縶生人可疾解之吾當命此僧以修建廟宇慎無違也神喜而諾我曰從此去旬餘當捨其罪吾故告師疾將愈宜修赤水神廟也無以疾愈遂怠其心為此則禍且及矣道成偽語曰敬受教後旬餘果愈因召門弟子告曰吾少年棄家學浮屠氏法迨今年五十不幸沈疾向者袁君謂我曰師之病赤水神所為也疾鍤可修補其廟夫置神廟者所以祐兆人祈福應今既有害於我安得不除之乎即與其徒持鍤詣廟盡去神像及祠宇無一遺者又明日道成謁袁生袁生喜曰師病果愈乎吾之語豈妄耶道成曰然幸君救我何敢忘君之恩乎袁生曰可疾計修赤水神廟也不然具懼為禍道成曰夫神所以賴於人者以其福可延戾可弭旱亢則雩之以澤潦淫則禜之以霽故天子詔天下郡國雖一邑一里必建其祠蓋用為民之福也若赤水神者無以福人而為害於人焉可不去之已盡毀其廟矣袁生且驚且懼遂謝之道成氣益豐而袁生懼甚後月餘吏有罪袁生朴之無何吏死其家訴於郡坐徙端溪行至三峽忽遇一白衣立於路左視之乃赤水神也曰向託君修我祠宇奈何致道成毀我之舍棄我之像使一旦無所歸君之罪也今君棄逐窮荒亦我報仇耳袁生既謝曰毀君者道成也何為罪我神曰道成師福盛甚吾不能動今君祿與命衰故我得以報言已不見生惡之後數日竟以疾卒冉遂冉遂者齊人也父邑宰遂婚長山趙玉女遂既喪父又幼性不惠略不知書無以進達因耕於長山其妻趙氏美姿質性復輕蕩一日獨遊於林藪間見一人衣錦衣乘白馬侍從百餘人皆攜劍戟過之趙氏曰我若得此夫死亦無恨錦衣人回顧笑之左右問趙氏曰暫為夫可否趙氏應聲曰君若暫為我夫我亦懷君恩也錦衣遽下馬入林內既別謂趙氏曰當生一子為明神善保愛之趙氏果有孕及期生一兒髮赤面青遍身赤毛僅長五寸眼有光耀遂甚怪之曰此必妖也可殺之趙氏曰此兒託體於君又何妖或是異人何殺之耶必殺反為害若何遂懼而止趙氏藏之密室及七歲其兒忽長一丈俄又自空有一大鳥飛下兒走出躍上鳥背飛去其母朝夕哭之經數月兒自外來擐金甲佩劍彎弓引兵士可千餘人至門直入拜母曰我是遊察使者子幸託身於母受生育之恩未能一報我今日後時一來拜覲待我微答母恩即不來矣趙氏曰兒自為何神也兒曰母慎勿言我已補東方擒惡將軍東方之地不遵明祗擅為惡者我皆得以誅之趙氏取酒炙以飼之乃謂兒我無多酒炙不可以及將士兒笑曰母但以一杯酒灑空中即兵士皆飲酒也母從之見空中酒下起雨兵士盡仰面而飲之兒乃遽止曰少飲臨別謂母曰若有急但焚香遙告我當立至言訖上馬如風雨而去後一年趙氏父亡趙氏往葬之其父家每月有鬼兵可千餘圍其宅有神扣門言曰我要為祠宇爾家翁見來投我爾當速去不然皆殺之趙氏忽思兒留言乃焚香以告其夕兒引兵士千餘至令一使詰之神人茫然收兵為隊自縛於兒前兒呵責盡殺其眾謂母曰此非神也是強鬼耳生為史朝義將戰亡之後無所歸自收戰亡兵引之來此欲擅立祠宇耳母曰適聞言家翁已在我左右爾試問之其兒令擒神人問之曰爾所謀事我盡知之不須言也但何以無故追趙玉耶今在何處其人泣告曰望將軍哀念生為一將不能自立功而死於陣前死後欲求一神又不能良圖今日有犯斧鉞若或將軍不以此罪告上天容在麾下必效死節又問曰趙玉何在神曰寄在鄭大夫塚內兒乃立命於塚內取趙玉至趙玉尋蘇趙氏切勸兒恕神之罪兒乃釋縛命於部內為小將乃辭其母泣而言曰我在神道不當頻出迹於人間不復來矣母善自愛又為風雨而去邇後絕然不至矣魏耽貞元中吉州刺史魏耽罷任居洛有女子年甫十六顏色甚美麗夏中俱納涼於庭急仰視天裂有長人於裂處下直至耽前衣紫佩金黑而髯曰我姓朱天遣與君為女壻耽不敢阻請俟排比再三乃許約期後月乃騰空而去耽與其妻雖甚憂迫亦具酒食而俟之有圉人突入拜耽耽曰何不秣馬而突入太無禮也圉人曰竊見使君有憂色故請言其事耽曰爾何要知之圉人固請耽因告之圉人曰使君不足憂小事耳言訖而出佩金者及期而至圉人復突入佩金者見之趨下再拜圉人作色而叱之曰天恕爾罰汝在人間奈何又復擾人如是對曰死罪復拜圉人輒升堂而坐召佩金者坐命酒圉人於大沙鑼取飲數器器可三斗餘飲訖又取一鐵杵折而嚼之乃以沙鑼飲佩金者佩金者甚有懼色乃飲之唯言死罪更無他詞圉人曰送天獄禁百日乃騰空而去圉人曰吾乃使君北斗本命星也魏使君晝夜焚修今乃報之適無禮者即賊星也今已禁之請去他慮言訖而去盧佩貞元末渭南縣丞盧佩性篤孝其母先病腰腳至是病甚不能下牀榻者累年曉夜不堪痛楚佩即棄官奉母歸長安寓於長樂里之別第將欲竭產而求國醫王彥伯治之彥伯聲勢重造次不可一見佩日往祈請焉半年餘乃許一到佩期某日平旦是日亭午不來佩候望於門心搖目斷日既漸晚佩益悵然忽見一白衣婦人姿容絕麗乘一駿馬從一女僮自曲之西疾馳東過有頃復自東來至佩處駐馬謂佩曰觀君顏色憂沮似有所候待來請問之佩志於王彥伯初不覺婦人之來既被顧問再三乃具以情告焉婦人曰彥伯國醫無容至此妾有薄技不減王彥伯所能請一見太夫人必取平差佩驚喜拜於馬首曰誠得如此請以身為僕隸相酬佩即先入白母母方呻吟酸楚之次聞佩言忽覺小廖遂引婦人至母前婦人纔舉手候之其母已能自動矣於是一家歡躍競持所有金帛以遺婦人婦人曰此猶未也當要進一服藥非止盡除痼疾抑亦永享眉壽母曰老婦將死之骨為天師再生未知何階上答全德婦人曰但不棄細微許奉九郎巾櫛常得在太夫人左右則可安敢論功乎母曰佩猶願以身為天師奴今反得為丈夫有何不可婦人再拜稱謝遂於女僮手取所持小粧奩中取藥一刀圭以和進母母入口積年諸苦釋然頓平即具六禮納為妻婦入朝夕供養妻道嚴謹然每十日即請一歸本家佩欲以車輿送迎即終因辭拒唯乘舊馬從女僮倏忽往來略無蹤跡初且欲順適其意不能究尋後既多時頗以為異一旦伺其將出佩即潛往窺之見乘馬出延興門馬行空中佩驚問行者皆不見佩又隨至城東墓田中巫者陳設酒殽瀝酒祭地即見婦人下馬就接而飲之其女僮隨後收拾紙錢載於馬上即變為銅錢又見婦人以策畫地巫者隨指其處曰此可以為穴事畢即乘馬而回佩心甚惡之歸具告母母曰吾固知是妖異為之奈何自是婦人絕不復歸佩家佩亦幸焉後數十日佩因出南街中忽逢婦人行李佩呼曰夫人何久不歸婦人不顧促轡而去明日使女僮傳語佩曰妾誠非匹敵但以君有孝行相感故為君治太夫人疾得平和君自請相約為夫婦今既見疑信當決矣佩問女僮娘子今安在女僮曰娘子前日已改嫁靖恭李諮議矣佩曰雖欲相棄何其速歟女僮曰娘子是地祗管京兆府三百里內人家喪葬所在長須在京城中作生人妻無自居也女僮又曰娘子終不失所但嗟九郎福祐太薄向使娘子長為妻九郎一家皆為地仙矣盧佩第九也
