body:
  text: 蘇味道蘇味道唐蘇味道初拜相有門人問曰天下方事之殷相公何以燮和味道無言但以手摸床棱而已時謂模棱宰相也出盧氏雜記李師旦唐李師旦新豐人也任會稽尉國忌日廢務飲酒唱歌杖人為吏所訟御史蘇味道按之俱不承引味道厲而謂曰公為官奈何不守法而違犯若是將罪之師旦請更問乃歎曰飲酒法所不禁況飲藥酒耶挽歌乃是哀思撻人吏事緣急速侍御何譴為味道曰此反白為黑漢不能繩之出御史臺記霍獻可唐霍獻可貴鄉人也父毓岐州司法獻可有文學好詼諧累遷至侍御史左司員外則天法峻多不自保競希旨以為忠獻可頭觸玉階請殺狄仁傑裴行本裴即獻可堂舅也既損額以綠帛裹於巾下常令露出冀則天以為忠時人比之李子慎子慎則天朝誣告其舅加游擊將軍母見其著緋衫以面覆床明朝本以面覆床作以被覆面涕淚不勝曰此是汝舅血染者耶出御史臺記袁守一唐袁守一性行淺促時人號為料鬥鳧翁雞任萬年尉雍州長史竇懷貞每欲鞭之乃於中書令宗楚客門餉生菜除監察懷貞未之知也貞高揖曰駕欲出公作如此檢校袁守一即彈之月餘貞除左臺御史大夫守一請假不敢出乞解貞呼而慰之守一兢惕不已楚客知之為除右臺御史於朝堂抗衡於貞曰與公羅師羅師者市郭兒語無交涉也無何客以反誅守一以其黨配流端州出朝野僉載崔泰之唐黃門侍郎崔泰之哭特進李嶠詩曰臺閣神仙地衣冠君子鄉昨朝猶對坐今日忽云亡魂隨司命鬼魄逐見閻王此時罷歡笑無復向朝堂出朝野僉載陸餘慶唐尚書右丞陸餘慶轉洛州長史其子嘲之曰陸餘慶筆頭無力嘴頭硬一朝明鈔本朝作衙受辭訟十日判不竟送案褥下餘慶得而讀之曰必是那狗逐鞭之出朝野僉載孫彥高周定州刺史孫彥高被突厥圍城數十重不敢詣廳文符須徵發者於小窗接入鎖州宅門及賊登壘乃入匱中藏令奴曰牢掌鑰匙賊來索慎勿與昔有愚人入京選皮袋被賊盜去其人曰賊偷我袋將終不得我物用或問其故答曰鑰匙今在我衣帶上彼將何物開之此孫彥高之流也出朝野僉載出使御史唐御史出使久絕滋味至驛或竊脯腊置於食偽叱侍者撤之侍者去而後徐食此往往而有殊失舉措也嘗有御史所留不多不覺侍者見之對曰干肉驛家頗有請吏留御史深自愧焉亦有膳者爛煮肉以汁作羹御史偽不知而食之或羹中遇肉乃責庖人或值新庖人未閒應答但謝日羅漏言以羅濾之漏也神龍中韓琬與路元殼鄭元父充判官至萊州親睹此事相顧而笑仆射魏元忠時任中丞謂琬之曰元忠任監察至驛干肉雞子并食之未虧於憲司之重蓋盜之深失國士體魏公之言當矣但不食不竊豈不美歟出御史台記韓琬唐韓琬與張昌宗王本立同游太學博士姓張即昌宗之從叔精五經懵於時事畜一雞呼為勃公子愛之不已每講經經字原空缺據明鈔本補輒集於學徒中中原作巾據明鈔本改或攫破書比逐之必被嗔責曰此有五德汝何輕之昌宗嘗為此雞被杖本立與琬頗不平之曰腐儒不解事為公殺此雞張生素取學徒回殘食料本立以業長乃見問合否本立曰明文案即得張生喜每日受之皆立文案他曰張生請假本立舉牒數雞罪殺而食之及張生歸學不見雞惊曰吾勃公子何在左右報本立殺之大怒云索案來索案來見數雞之罪曰縱如此亦不合死本立曰雞不比人不可加笞杖正合殺張以手再三拍案曰勃公子有案時更知何道當時長安以有案動曰為實故知耽玩經史者宜詳時事不然何古人號為愚儒朴儒腐儒豎儒耶亦可貽誡子弟出御史台記趙仁獎唐趙仁獎河南人也得販於殖業坊王戎墓北善歌黃麞與宦官有舊因所托附景龍中乃負薪詣闕遂得召見云負薪助國家調鼎即日臺拜焉睿宗朝左授上蔡丞使於京訪尋臺中舊列妄事歡洽御史倪若水謂楊茂直曰此庸漢妄為傝茸乃奏之中書令姚崇曰此是黃麞漢耶授當州悉當尉馳驛發遣仁獎在臺既無餘能唯以黃麞自衒宋務先題之曰趙獎出王戎幕下入朱博臺中捨彼負薪登茲列柏行人不避驄馬坐客唯聽黃麞時崔宣一使於都仁獎附書於家題云西京趙御史書附到洛州殖業坊王戎墓北第一鋪付妻一娘宣一以書示朝士初其左授上蔡潘好禮自上蔡令拜御史仁獎贈詩曰令乖驄馬去丞脫繡衣來當時訝之或以為假手仁獎初拜監察謝朝貴但云有幸把公馬足時朝士相隨遇一胡負兩束柴曰此胡合拜殿中或問其由答曰趙仁獎負一束而拜監察此負兩束固合授殿中出御史臺記姜師度唐姜師度好奇詭為滄州刺史兼按察造槍車運糧開河築堰州縣鼎沸於魯城界內種稻置屯穗蟹食盡又差夫打蟹苦之歌曰魯地一種稻一概被水沫年年索蟹夫百姓不可活又為陝州刺史以永豐倉米運將別徵三錢計以為費一夕忽云得計立注樓從倉建槽直至於河長數千丈而令放米其不快處具大把推之米皆損耗多為粉末兼風激揚凡一函失米百石而動即千萬數遣典庾者償之家產皆竭復遣輸戶自量至有償數十斛者甚害人方停之出朝野僉載成敬奇唐成敬奇有俊才天策中詣闕自陳請日試文章三十道則天乃命王勃明鈔本勃作劇試之授校書郎累拜監察大理正與紫微令姚崇連親崇嘗有疾敬奇造宅省焉對崇涕淚懷中寘生雀數從乃一一持出請崇手執之而後釋祝云願令公速愈也崇勉從之既出崇鄙其諛媚謂子弟曰此淚從何而來自茲不復禮也出御史臺記石惠泰唐岐王府參軍石惠泰與監察御史李全交詩曰御史非長任參軍不久居待君遷轉後此職還到余因競放牒往來全交為之判十餘紙以報之乃假手於拾遺張九齡出朝野僉載馮光震唐率府兵曹參軍馮光震入集賢院校文選嘗注蹲鴟云蹲鴟者今之芋子即是著毛蘿蔔也蕭令聞之拊掌大笑出譚賓錄李謹度唐御史中丞李謹度宋璟引致之遭母喪不肯舉發哀訃到皆匿之官寮苦其無用令本貫瀛州申謹度母死尚書省牒御史臺然後哭其庸猥皆此類也出朝野僉載三穢唐王怡為中丞憲臺之穢姜晦為常選侍郎吏部之穢崔泰之為黃門侍郎門下之穢號為京師三穢出朝野僉載陽滔唐陽滔為中書舍人時促命制敕令史持庫鑰他適無舊本撿尋乃斲窗取得之時人號為斲窗舍人出朝野僉載常定宗唐國子祭酒辛弘智詩云君為河邊草逢春心剩生妾如臺上鏡照得始分明同房學士常定宗為改始字為轉字遂爭此詩皆云我作乃下牒見博士羅道宗判云昔五字定表以理切稱奇今一言競詩取詞多為主詩歸弘智轉還定宗以狀牒知任為公公下原有之字據明鈔本刪驗出朝野僉載張玄靖唐張玄靖陝人也自左衛倉曹拜監察性非敦厚因附會慕容寶節而遷時有兩張監察號玄靖為小張初入臺呼同列長年為兄及選殿中則不復兄矣寶節既誅頗不自安復呼舊列為兄監察杜文範因使還會鄭仁恭方出使問臺中事意恭答曰寶節敗後小張復呼我曹為兄矣時人以為談笑出御史臺記
