body:
  text: 謬誤益州長吏唐益州每歲進甘子皆以紙裹之他時長吏嫌其不敬代之以細布既而恒恐有甘子為布所損每歲多懷憂懼俄有御史甘子布至長吏以為推布裹甘子事因大懼曰果為所推及子布到驛長吏但敘以布裹甘子為敬子布初不知之久而方悟聞者莫不大笑子布好學有文才知名當代出大唐新語蕭穎士唐天寶初蕭穎士因游靈昌遠至胙縣南二十里有胡店店上有人多姓胡穎士發縣日晚縣寮飲餞移時薄暮方行至縣南三五里便即昏黑有一婦人年二十四五著紅衫綠裙騎驢驢上有衣服向穎士言兒家直南二十里今歸遇夜獨行怕懼願隨郎君鞍馬同行穎士問女何姓曰姓胡穎士常見世間說有野狐或作男子或作女人於黃昏之際媚人穎士疑此女即是野狐遂唾叱之曰死野狐敢媚蕭穎士遂鞭馬南馳奔至主人店歇息解衣良久聽見婦人從門牽驢入來其店叟曰何為衝夜曰衝夜猶可適被一害風措大呼兒作野狐合被唾殺其婦人乃店叟之女也穎士漸恧而已出辨疑志郗昂唐郗昂與韋陟交善因話國朝宰相誰最無德昂誤對曰韋安石也已而驚走而去逢吉溫於街中溫問何故蒼惶如此答曰適與韋尚書話國朝宰相最無德者本欲言吉頊誤言韋安石既言又鞭馬而走抵房相之第琯執手慰問之復以房融為對昂有時稱忽一日犯三人舉朝嗟嘆唯韋陟遂與之絕出國史補張長史唐監濟令李回妻張氏其父為廬州長史告老歸以回之薄其女也故往臨濟辱之誤至全節縣而問門人曰明府在乎門者曰在張遂入至廳前大罵辱全節令趙子餘不知其故私自門窺之見一老父詬罵不已而縣下常有狐為為原作鳥據明鈔本改魅以張為狐焉乃密召吏人執而鞭之張亦未寤罵仍恣肆擊之困極方問何人輒此詬罵乃自言吾李回妻父也回賤吾女來怒回耳全節令方知其誤寘之館給醫藥焉張之僮夜亡至臨濟告回回大怒遣人吏數百將襲全節而擊令令懼閉門守之回遂至郡訴之太守召令責之恕其誤也使出錢二十萬遺張長史以和之回乃迎至縣張喜回之報復卒不言其薄女遂歸出紀聞蕭俛唐貞元中蕭俛新及第時國醫王彥伯住太平里與給事鄭雲逵比舍住忽患寒熱早詣彥伯求診候誤入雲逵第會門人他適雲達立於中門俛前趨曰某前及第有期集之役忽患具說其狀逵命僕人延坐為診其臂曰據脈候是心家熱風雲逵姓鄭若覓國醫王彥伯東鄰是也俛赧然而去出乾𦠆子崔清唐崔清除濠州刺史替李遜清辭戶部侍郎李巽留坐與語清指謂所替李遜曰清都不知李遜渾不解官再三言之巽曰李巽即可在只是獨不稱公意清稍悟之慚顧而去出嘉話錄何儒亮唐進士何儒亮自外州至京訪其從叔誤造郎中趙需宅自云同房姪房姪原作考房據明鈔本改會冬至需欲家宴揮霍明鈔本揮霍作聞報霍疑儒云既是同房明鈔本房作宗便令入宴姑姊妹妻子盡在焉儒亮饌畢徐出及細察之乃何氏之子也需大笑儒亮歲餘不敢出京城時人因以為何需郎中出國史補于頔唐司空于頔以樂曲有想夫憐其名不雅將改之客有笑曰南朝相府曾有瑞蓮故歌為相府蓮自是後人語訛乃不改出國史補又舊說董仲舒墓門人至皆下馬謂之下馬陵語訛為蝦蟆陵今荊襄之人呼堤為提留絳之人呼釜為付按國史補作晉絳之人呼稜為笙關中人呼稻為討呼釜為付故此處有脫訛皆訛謬所習也出國史補苑咒唐尚書裴胄鎮江陵常與苑論有舊論及第後更不相見但書札通問而已論弟弟原作第據明鈔本許本改抽方應舉過江陵行謁地主之禮客因見抽名曰秀才之名雖字不同且難於尚書前為禮如何會抽懷中有論舊名紙便謂客將曰某自別有名客將見日晚倉遑遽將名入胄喜曰苑大來矣屈入抽至中至中作半據明鈔本改庭胄見貌異及坐揖曰足下第幾抽對曰第四胄曰與苑大遠近抽曰家兄又問曰足下正名何對曰名論又曰賢兄改名乎抽曰家兄也名論公庭將吏於是皆笑及引坐乃陳本名名抽既逡巡於便院俄而遠近悉知出乾𦠆子李文彬唐舉人李文彬受知於舍人紇干泉紇干原作紀于據明鈔本改下同按泉當作皋見本書卷一七八諸州解條校記時有京兆府同籙賀蘭洎卒文彬因謁紫微紫微問曰今日有何新事文彬曰適過府門聞紇干洎卒泉曰莫錯否文彬曰不錯泉曰君大似共鬼語也拂衣而入文彬乃悟蓋俱重姓又同名而誤對也出奇聞錄蘇拯唐光化中蘇拯與鄉人陳滌同處拯與考功郎中蘇璞初敘宗黨璞故奉常滌之子也拯既執贄尋以啟事溫卷因令陳滌緘封滌遂誤書己名璞得之大怒拯聞之倉皇復至書謝過吳子華聞之曰此書應悞也出北夢瑣言明鈔本作出摭言竇少卿有竇少卿者家于故都素明鈔本素作索于渭北諸州至村店中有從者抱疾寄于主人而前去歷鄜延靈夏經年未歸其從者尋卒於店中此人臨卒店主問曰何姓名此僕只言得竇少卿三字便奄然無語店主遂坎路側以埋之卓一牌向道曰竇少卿墓與竇相識者過之大驚訝問店主店主曰牌上有名固不謬矣於是更有識竇者經過甚痛惜有至親者報其家及令骨肉省其牌果不謬其家於是舉哀成服造齋相次迎其旅櫬殯葬遠近親戚咸來弔慰葬後月餘有人附到竇家書歸程已近郡報上下平善其家大驚不信謂人詐修此書又有人報云道路間覩其形貌甚是安健其家愈惑之遂使人潛逆之竊窺于路左疑其鬼物至其家妻男皆謂其魂魄歸來竇細語其由方知埋者是從人乃店主卓牌之錯誤也出王氏見聞張利涉唐張利涉性多忘解褐懷州參軍每聚會被召必於笏上記之時河內令耿仁惠邀之怪其不至親就門致請涉看笏曰公何見顧笏上無名又一時晝寢驚索馬入州扣刺使鄧惲門拜謝曰聞公欲賜責死罪鄧惲曰無此事涉曰司功某甲言之惲大怒乃呼州官箠明鈔本箠作集以甲間搆將杖之甲苦訴初無此語涉前請曰望公捨之涉恐是夢中見說耳時人由是咸知其性理惛惑矣出朝野僉載閻玄一唐三原縣令閻玄一為人多忘曾至州於主人舍坐州佐史前過以為縣典也呼欲杖之典曰某是州佐也一慚謝而止須臾縣典至一疑其州佐也執手引坐典曰某是縣佐也又愧而上曾有人傳其兄書者止於階下俄而里胥自錄人到一索杖杖原作扶據明鈔本改遂鞭送書人數下其人不知所以訊之一曰吾大錯顧直典向宅取杯酒𢝶瘡良久典持酒至一既忘其取酒復忘其被杖者因便賜直典飲之出朝野僉載郭務靜唐滄州南皮縣丞郭務靜初上典王慶通判案靜曰爾何姓慶曰姓王須臾慶又來又問何姓慶又曰姓王靜怪愕良久仰看慶曰南皮佐史惣姓王出朝野僉載張守信唐張守信為餘杭太守善富陽尉張瑤假借之瑤不知其故則使錄事參軍張遇達意於瑤將妻之以女瑤喜吉期有日矣然私相聞也郡縣未知之守信為女具衣裝女之保母問曰欲以女適何人守信以告保母曰女壻姓張不知主君之女何姓吾竊惑焉守信乃悟亟止之出紀聞李睍唐殿中侍御史李逢年自左遷後稍進漢州雒縣令逢年有吏才蜀之採訪使常委以推按焉逢年妻中丞鄭昉之女也情志不合去之及在蜀城謂益府戶曹李睍曰逢年家無內主濩落難堪兒女長成理須婚娶弟既相狎幸為逢年求一妻焉此都官寮女之與妹縱再醮者亦可論之幸留意焉睍曰諾復又訪之於睍睍率略人也乃造逢年曰兵曹李札甚名家也札妹甚美聞於蜀城曾適元氏其氏其原作民莫據明鈔本改夫尋卒資裝亦厚從婢且二十人兄能娶之乎逢年許之令睍報李札札自造逢年謝明日請至宅其夜逢年喜寢未曙而興嚴飾畢顧步階除而獨言曰李札之妹門地若斯雖曾適人年幼且美家又富貴何幸如之言再三忽驚難曰李睍過矣又誤於人今所論親為復何姓怪哉因策馬到府庭李睍進曰兄今日過札妹乎逢年不應睍曰事變矣逄年曰君思札妹乎為復何姓睍驚而退遇李札札曰侍御今日見過乎已為地矣睍曰吾大誤耳但知求好壻都不思其姓氏札大驚惋恨之出紀聞張藏用唐青州臨朐丞張藏用性既魯鈍又弱於神嘗召一木匠十召不至藏用大怒使擒之匠既到適會鄰縣令使人送書遺藏用藏用方怒解木匠又走讀書畢便令剝送書者笞之至十送書人謝杖請曰某為明府送書縱書人之意忤明府使者何罪藏用乃知其誤謝曰適怒匠人不意誤笞君耳命里正取飲一器以飲送書人而別更視事忽見里正指酒問曰此中何物里正曰酒藏用曰何妨飲之里正拜而飲之藏用遂入戶送書者竟不得酒扶杖而歸出紀聞
