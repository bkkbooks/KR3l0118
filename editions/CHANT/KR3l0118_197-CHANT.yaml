body:
  text: 東方朔東文朔漢武帝時嘗有獨足鶴人皆不知以為怪異東方朔奏曰此山海經所謂畢方鳥也驗之果是因敕廷臣皆習山海經山海經伯翳所著劉向編次作序伯翳亦曰伯益書曰益典朕虞蓋隨禹治水取山海之異遂成書出尚書故實劉向貳負之臣曰危與貳負殺㝣窳帝乃梏之疏屬之山桎其右足反縛兩手與髮繫之山上在關提西北郭璞注云漢宣帝使人發上郡磐石石室中得一人徒裸被髮反縛械一足以問群臣莫知劉向按此言之宣帝大驚由是人爭學山海經矣出山海經胡綜胡綜博物多識吳孫權時有掘地得銅匣長二尺七寸以琉璃為蓋雕縷其上得一白玉如意所執處皆刻龍虎及蟬形時莫能識其所由者權以綜多悉往事使人問之綜云昔秦始皇東遊以金陵有天子氣乃改縣名并掘鑿江湖平諸山阜處處輒埋寶物以當王土之氣事見於秦記此蓋是乎眾人咸歎其洽聞而悵然自失出綜別傳張華魏時殿前鐘忽大鳴震駭省署華曰此蜀銅山崩故鐘鳴應之也蜀尋上事果云銅山崩時日皆如華言出小說又晉陸士衡嘗餉張華於時賓客盈座華開器便曰此龍肉也眾雖素伏華博聞然意未知信華曰試以苦酒灌之必有異試之有五色光起士衡乃窮其所由鮓主曰家園中積茅下得一白魚質狀殊常以作鮓過美故以餉陸出世說又中朝時有人畜銅澡盤晨夕恒鳴如人扣以白張華華曰此盤與洛鐘宮商相諧宮中朝暮撞故聲相應可鑢令輕則韻乖鳴自止也依言即不復鳴出小說又武庫內有雄雉時人咸謂為怪華云此蛇之所化也即使搜除庫中果見蛇蛻之皮出小說又吳郡臨平岸崩出一石鼓打之無聲以問華華曰可取蜀中桐材刻作魚形扣之則鳴矣即從華言聲聞數十里出小說又惠帝時有得一鳥毛長數丈華見而歎曰此所謂海鳧毛此毛出則天下土崩果如其言出異苑又洛中有一洞穴深不可測有一婦人欲殺夫謂夫曰未曾見此穴夫自過視之至穴婦推夫墜穴至底婦擲飯物如欲祭之此人當時顛墜恍惚良久乃蘇得飯食之氣力稍彊周惶覓路乃得一穴匍匐從就崎嶇反側行數十里穴小寬亦有微明遂得寬平廣遠之地步行百餘里覺所踐如塵而聞粇米香啗之芬美過於充饑即裹以為糧緣穴行而食此物既盡復遇如泥者味似向塵又齎以去所歷幽遠里數難測就明曠而食所齎盡便入一都郛郭修整宮館壯麗臺榭房宇悉以金魄為飾雖無日月明踰三光人皆長三丈被羽衣奏奇樂非世所聞也便告請求哀長人語令前去從命進道凡遇如此者九處最後所至苦告饑餒長人入指中庭一大柏樹近百圍下有一羊令跪捋羊鬚初得一珠長人取之次捋又取後捋令啗食即得療饑請問九處之名求停不去答曰君命不得停還問張華當悉此人便復隨穴而行遂得出交郡往還六七年間即歸洛問華以所得二物視之華云如塵者是黃河龍涎泥是崑山下泥九處地仙名九館羊為癡龍其初一珠食之與天地等壽次者延年後者充饑而已出幽明錄又豫章有然石以水灌之便熱用以烹煮可使食成熱盡下可以冷水灌之更熱如此無窮世人貴其異不能識其名雷煥元康中入洛乃齎以示華華云此所謂然石出異物志又嵩高山北有大穴空莫測其深百姓歲時每遊其上晉初嘗有一人誤墜穴中同輩冀其儻不死試投食於穴墜者得之為糧乃緣穴而行可十許日忽曠然見明又有草屋一區中有二人對坐圍碁局下有一杯白飲墜者告以饑渴碁者曰可飲此墜者飲之氣力十倍碁者曰汝欲停此不墜者曰不願停碁者曰汝從西行數十步有一井其中多怪異慎勿畏但投身入中當得出若饑即可取井中物食之墜者如其言井多蛟龍然見墜者輒避其路墜者緣井而行井中有物若青泥墜者食之了不復饑可半年許乃出蜀中因歸洛下問張華華曰此仙館所飲者玉漿所食者龍穴石髓也出小說束皙晉武帝問尚書郎摯仲冶三月三日曲水其義何旨答曰漢章帝時平原徐肇以三月初生三女至三日而俱亡一村以為怪乃相推之水濱盥洗因流以濫觴曲水之義蓋起此也帝曰若如所談便非嘉事也尚書郎束皙進曰仲冶小生不足以知此臣請說其始昔周公城洛邑因流水以泛酒故逸詩云羽觴隨東明鈔本東作洝太平御覽三十引東作水安流又秦昭王三日上巳置酒河曲見金人自淵而出奉水心劍曰今君制有西夏乃秦霸諸侯乃因此處立為曲水二漢相沿皆為盛業帝曰善賜金五十斤而左遷仲冶為陽城令出續齊諧記沈約梁武帝多策事因有貢徑寸栗者帝與沈約策栗事帝得十餘事約得九事及約出人問今日何不勝約曰此人忌前不讓必恐羞死時又策錦被事出盧氏雜說又天監五年丹陽山南得瓦物高五尺圍四尺上銳下平蓋如盒焉中得劍一瓷具數十時人莫識沈約云此東夷罨盂也葬則用之代棺此制度卑小則隨當時矣東夷死則坐葬之武帝服其博識語在江右明鈔本右作左雜事出史系虞世南唐太宗令虞世南寫列女傳屏風已裝未及求本乃暗書之一字無失出國史異纂又太宗常出行有司請載副書以從帝曰不須虞世南此行秘書也傅奕唐貞觀中有婆羅門僧言得佛齒所擊前無堅物於是士女奔湊其外如市傅奕方臥病聞之謂其子曰非佛齒吾聞金剛石至堅物莫能敵唯羚羊角破之汝可往試焉僧緘滕甚嚴固求良久乃見出角叩之應手而碎觀者乃止今理珠玉者用之出國史異纂郝處俊唐太宗問光祿卿韋某須無脂肥羊肉充藥韋不知所從得乃就侍中郝處俊宅問之俊曰上好生必不為此事乃進狀自奏其無脂肥羊肉須五十口肥羊一一對前殺之其羊怖懼破脂併入肉中取最後一羊則極肥而無脂也上不忍為乃止賞處俊之博識也出朝野僉載孟詵唐孟詵平昌人也父曜明經擢第拜學官詵少敏悟博聞多奇舉世無與比進士擢第解褐長樂縣尉累遷鳳閣舍人時鳳閣侍郎劉禕之臥疾詵候問之因留飯以金椀貯酪詵視之驚曰此藥金非石中所出者禕之曰主上見賜當非假金詵曰藥金仙方所資不為假也禕之曰何以知之詵曰藥金燒之其上有五色氣遽燒之果然禕之以聞則天以其近臣不當旁稽異術左授台州司馬累遷同州刺史每歷官多煩政人吏殆不堪薄其妻室常曰妻室可烹之以啖客人多議之出御史臺記唐文宗唐文宗皇帝聽政暇博覽群書一日延英顧問宰臣毛詩云呦呦鹿鳴食野之苹苹是何草時宰相李玨楊嗣復陳夷行相顧未對玨曰臣按爾雅苹是藾蕭上曰朕看毛詩疏苹葉圓而花白叢生野中假非藾蕭又一日問宰臣古詩云輕衫襯跳脫跳脫是何物宰臣未對上曰即今之腕釧也真誥言安姑有斲粟金跳脫是臂飾出盧氏雜說賈躭唐賈躭好地理學四方之使乃是明抄本乃是作自乃蕃虜來者而與之坐問其土地山川之所終始凡三十年所聞既備因撰海內華夷圖以問其郡人皆得其實事無虛詞出盧氏雜說段成式唐段成式詞學博聞精通三教復強記每披閱文字雖千萬言一覽略無遺漏嘗於私第鑿一池工人於土下獲鐵一片怪其異質遂持來獻成式命尺周而量之笑而不言乃靜一室懸鐵其室中之北壁已而泥戶但開一牖方纔數寸亦緘鐍之時與近親闢牖窺之則有金書兩字以報十二時也其博識如此出南楚新聞又成式多禽荒其父文昌嘗患之復以年長不加面斥其過而請從事言之幕客遂同詣學院具述丞相之旨亦唯唯遜謝而已翊日復獵于郊原鷹犬倍多既而諸從事各送兔一雙其書中徵引典故無一事重疊者從事輩愕然多其曉其故實於是齊詣文昌各以書示之文昌方知其子藝文該瞻山簡云吾年四十不為家所知頗亦類似出玉堂閒話江陵書生江陵南門之外雍門之內東垣下有小瓦堂室一所高尺許具體而微詢其州人曰此息壤也鞠其由曰數百年前此州忽為洪濤所漫未沒者三二版州帥惶懼不知所為忽有人白之曰洲之郊墅間有一書生博讀甚廣才智出人請召詢之及召問之此是息壤之地在于南門僕嘗讀息壤記云禹湮洪水茲有海眼泛之無恒禹乃鐫石造龍之宮室寘于穴中以塞其水脈後聞版築此城毀其舊制是以有此懷襄之患請掘而求之果於東垣之下掘數尺得石宮室皆已毀損荊帥於是重葺以厚壤培之其洪水乃絕今於其上又起屋宇誌其處所旋以息壤記驗之不謬出玉堂閒話
