body:
  text: 鮑子都鮑子都魏鮑子都暮行於野見一書生卒心痛子都下馬為摩其心有頃書生卒子都視其囊中有素書一卷金十餅乃賣一餅具葬書生其餘枕之頭下置素書於腹旁後數年子都於道上有乘驄馬者逐之既及以子都為盜固問兒屍所在子都具言於是相隨往開墓取兒屍歸見金九餅在頭下素書在腹傍舉家感子都之德義由是聲名大振出獨異志楊素陳太子舍人徐德言之妻後主叔寶之妹封樂昌公主才色冠絕德言為太子舍人方屬時亂恐不相保謂其妻曰以君之才容國亡必入權豪之家斯永絕矣儻情緣未斷猶冀相見宜有以信之乃破一鏡各執其半約曰他日必以正月望賣於都市我當在即以是日訪之及陳亡其妻果入越公楊素之家寵嬖殊厚德言流離辛苦僅能至京遂以正月望訪於都市有蒼頭賣半鏡者大高其價人皆笑之德言直引至其居予食具言其故出半鏡以合之乃題詩曰鏡與人俱去鏡歸歸原作各據明鈔本陳校許本改人不歸無復嫦娥影空留明月輝陳氏得詩涕泣不食素知之愴然改容即召德言還其妻仍厚遺之聞者無不感嘆仍與德言陳氏偕飲令陳氏為詩曰令日何遷次新官對舊官笑啼俱不敢方驗作人難遂與德言歸江南竟以終老出本事詩郭元振年十六入太學薛稷趙彥昭為友時有家信至寄錢四十萬以為舉糧忽有縗服者扣門云五代未葬各在一方今欲同時遷窆乏於資財聞公家信至頗能相濟否公即命以車一時載去略無留者亦不問姓氏深為薛趙所誚元振怡然曰濟彼大事亦何誚焉其年糧絕竟不成舉出摭言狄仁傑太原人為府法曹參軍時同僚鄭崇資母老且病當充使絕域仁傑謂曰太夫人有危亟之病而公遠使豈可貽親萬里之泣乎乃請代崇資出談賓錄敬昭道敬昭道為大理評事延和中沂有反者詿誤四百餘人將隸司農事明鈔本事作寺未即路繫在州獄昭道據赦文而免之時宰切責大理奈何赦反人家口大理卿及正等失色引昭道執政怒而責之昭道曰赦文云見禁囚徒反者繫在州獄此即見禁也反覆詰難至於五六執政無以奪之詿誤者悉免昭道遷監察御史又先是夔州征人舒萬福等十人行次巴陵渡灘溺死昭道因使巴渝至萬年驛夢此十人祈哀至於再三乃召驛吏問之吏對如所夢昭道即募善游者出其屍具洒肴以酹之觀者莫不歔欷乃移牒近縣備槥櫝歸之故鄉征人聞者無不感仰出大唐新語吳保安字永固河北人任遂州方義尉其鄉人郭仲翔即元振從姪也仲翔有才學元振將成其名宦會南蠻作亂以李蒙為姚州都督帥師討焉蒙臨行辭元振元振乃見仲翔謂蒙曰弟之孤子未有名宦子姑將行如破賊立功某在政事當接引之俾其縻薄俸也蒙諾之仲翔頗有幹用乃以為判官委之軍事至蜀保安寓書於仲翔曰幸共鄉里籍甚風猷雖曠不展拜而心常慕仰吾子國相猶子慕府碩才果以良能而受委寄李將軍秉文兼武受命專征親綰大兵將平小寇以將軍英勇兼足下才能師之克殄功在旦夕保安幼而嗜學長而專經才乏兼人官從一尉僻在劍外地邇蠻陬鄉國數千關河阻隔況此官已滿後任難期以保安之不才厄選曹之格限更思微祿豈有望焉將歸老丘園轉死溝壑側聞吾子急人之憂不遺鄉曲之情忽垂特達之眷使保安得執鞭弭以奉周旋錄及細微薄霑功效承茲凱入得預末班是吾子丘山之恩即保安銘鏤之日非敢望也願為圖之唯照其款誠而寬其造次專策駑蹇以望招攜仲翔得書深感之即言於李將軍召為管記未至而蠻賊轉逼李將軍至姚州與戰破之乘勝深入蠻覆而敗之李身死軍沒仲翔為虜蠻夷利漢財物其沒落者皆通音耗令其家贖之人三十匹保安既至姚州適值軍沒遲留未返而仲翔於蠻中間關致書於保安曰永固無恙保安之字字原作子據明鈔本改頃辱書未報值大軍已發深入賊庭果逢撓敗李公戰沒吾為囚俘假息偷生天涯地角顧身世已矣念鄉國窅然才謝鍾儀居然受縶身非箕子且且原作山據明鈔本改見為奴海畔牧羊有類於蘇武宮中射鴈寧期於李陵吾自陷蠻夷備嘗艱苦肌膚毀剔血淚滿地生人至艱吾身盡受以中華世族為絕域窮囚日居月諸暑退寒襲思老親於舊國望松檟於先塋忽忽發狂腷臆流慟不知涕之無從行路見吾猶為傷愍吾與永固雖未披款而鄉思先達風味相親想覩光儀不離夢寐昨蒙枉問承間便言李公素知足下才名則請為管記大軍去遠足下來遲乃足下自後於戎行非僕遺於鄉曲也足下門傳餘慶天祚積善果事期不入而身名並全向若早事麾下同參幕府則絕域之人與僕何異吾今在厄力屈計窮而蠻俗沒留許親族往贖以吾國相之姪不同眾人仍苦相邀求絹千匹此信通聞仍索百縑願足下早附白書報吾伯父宜以時到得贖吾還使亡魂復歸死骨更肉唯望足下耳今日之事請不辭勞若吾伯父已去廟堂難可諮啟即願足下親脫石父解夷吾之驂往贖華元類宋人之事濟物之道古人猶難以足下道義素高名節特著故有斯請而不生疑若足下不見哀矜猥同流俗則僕生為俘囚之豎死則蠻夷之鬼耳更何望哉已矣吳君無落吾事保安得書甚傷之時元振已卒保安乃為報許贖仲翔仍傾其家得絹二百疋往因住巂州十年不歸經營財物前後得絹七百疋數猶未至保安素貧窶妻子猶在遂州貪贖仲翔遂與家絕每於人有得雖尺布升粟皆漸而積之後妻子飢寒不能自立其妻乃率弱子駕一驢自往瀘南求保安所在於途中糧盡猶去姚州數百其妻計無所出因哭於路左哀感行人時姚州都督楊安居乘驛赴郡見保安妻哭異而訪之妻曰妾夫遂州方義尉吳保安以友人沒蕃丐而往贖因住姚州棄妾母子十年不通音問妾今貧苦往尋保安糧乏路長是以悲泣安居大奇之謂曰吾前至驛當候夫人濟其所乏既至驛安居賜保安妻錢數千給乘令進安居馳至郡先求保安見之執其手升堂謂保安曰吾常讀古人書見古人行事不謂今日親覩於公何分義情深妻子意淺捐棄家室求贖友朋而至是乎吾見公妻來思公道義乃心勤佇願見顏色吾今初到無物助公且於庫中假官絹四百匹濟公此用待友人到後吾方徐為填還保安喜取其絹令蠻中通信者持持原作特據明鈔本改往向二百日而仲翔至姚州形狀憔悴殆非人也方與保安相識語相泣也安居曾事郭尚書則為仲翔洗沐賜衣裝引與同坐宴樂之安居重保安行事甚寵之於是令仲翔攝治下尉仲翔久於蠻中且知其款曲則使人於蠻洞市女口十人皆有姿色既至因辭安居歸北且以蠻口贈之安居不受曰吾非市井之人豈待報耶欽吳生分義故因人成事耳公有老親在此且充甘膳之資仲翔謝曰鄙身得還公之恩也微命得全公之賜也翔雖瞑目敢忘大造但此蠻口故為公求來公今見辭翔以死請安居難違乃見其小女曰公既頻繁有言不敢違公雅意此女最小常所鍾愛今為此女受公一小口耳因辭其九人而保安亦為安居厚遇大獲資糧而去仲翔到家辭親凡十五年矣却至京以功授蔚州錄事參軍則迎親到官兩歲又以優授代州戶曹參軍秩滿內憂葬畢因行服墓次乃曰吾賴吳公見贖故能拜職養親今親歿服除可以行吾志矣乃行求保安而保安自方義尉選授眉州彭山丞仲翔遂至蜀訪之保安秩滿不能歸與其妻皆卒於彼權窆寺內仲翔聞之哭甚哀因製縗麻環絰加杖自蜀郡徒跣哭不絕聲至彭山設祭酹畢乃出其骨每節皆墨記之墨記骨節書其次第恐葬歛時有失之也盛於練囊又出其妻骨亦墨記貯於竹籠而徒跣親負之徒行數千里至魏郡保安有一子仲翔愛之如弟於是盡以家財二十萬厚葬保安仍刻石頌美仲翔親廬其側行服三年既而為嵐州長史又加朝散大夫攜保安子之官為娶妻恩養甚至仲翔德保安不已天寶十二年詣闕讓朱紱及官於保安之子以報時人甚高之初仲翔之沒也賜蠻首為奴其主愛之飲食與其主等經歲仲翔思北因逃歸追而得之轉賣於南洞洞主嚴惡得仲翔苦役之鞭笞甚至仲翔棄而走又被逐得更賣南洞中其洞號菩薩蠻仲翔居中經歲因厄復走蠻又追而得之復賣他洞洞主得仲翔怒曰奴好走難禁止邪乃取兩板各長數尺令仲翔立於板以釘自自原作其據明鈔本改足背釘之釘達於木每役使常帶二木行夜則納地檻中親自鏁閉仲翔二足經數年瘡方愈木鏁地檻如此七年仲翔初不堪其憂保安之使人往贖也初得仲翔之首主展轉為取之故仲翔得歸焉出紀聞
