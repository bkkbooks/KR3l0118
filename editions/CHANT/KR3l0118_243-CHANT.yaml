body:
  text: 治生裴明禮唐裴明禮河東人善於理生收人間所棄物積而鬻之以此家產巨萬又於金光門外市不毛地多瓦礫非善價者乃於地際豎標懸以筐中者輒酬以錢十百僅一二中未洽浹地中瓦礫盡矣乃舍諸牧羊者糞即積預聚雜果核具黎牛以耕之歲餘滋茂連車而鬻所收復致巨萬乃繕甲第周院置蜂房以營蜜廣栽蜀葵雜花果蜂採花逸而蜜豐矣營生之妙觸類多奇不可勝數貞觀中自古臺主簿拜殿中侍御史轉兵吏員外中書舍人累遷太常卿出御史臺記何明遠唐定州何明遠大富主官中三驛每於驛邊起店停商專以襲胡為業資財巨萬家有綾機五百張遠年老或不從戎即家貧破及如故即復盛出朝野僉載羅會長安富民羅會以剔糞自業里中謂謂原作識據明鈔本改之雞肆言若歸之積糞而有所得也會世副其業家財巨萬嘗有士人陸景陽會邀過所止館舍甚麗入內明鈔本入內作內人梳洗衫衣極鮮屏風氈褥烹宰無所不有景陽問曰主人即如此快活何為不罷惡事會曰吾中間停廢一二年奴婢死亡牛馬散失復業已來家途稍遂非情願也分合如此出朝野僉載竇乂扶風竇乂年十三諸姑累朝國戚其伯檢校工部尚書交閑廄使宮苑使於嘉會坊有廟院乂親識識原作與據明鈔本改張敬立任安州長史得替歸城安州土出絲履敬立齎十數輛散甥姪競取之唯乂獨不取俄而所餘之一輛又稍大諸甥姪之剩者乂再拜而受之敬立問其故乂不對殊不知殖貨有端木之遠志遂於市鬻之得錢半千千原作斤據明鈔本改密貯之潛於鍛爐作二枝小鍤利其刃五月初長安盛飛榆莢乂掃聚得斛餘遂往詣伯所借廟院習業伯父從之乂夜則潛寄褒義寺法安上人院止晝則往廟中以二鍤開隙地廣五寸深五寸密密原作慕據明鈔本改布四千餘千余原作十五據明鈔本改條皆長二十餘步汲水漬之布榆莢於其中尋遇夏雨習皆滋長比及秋森然已及尺餘千萬餘株矣及明年榆栽已長三尺餘乂遂持斧伐其併者相去各三寸又選其條枝稠直者悉留之所間下者二尺作圍束之得百餘束遇秋陰霖每束鬻值十餘錢又明年汲水於舊榆溝中至秋榆已有大者如雞卵更選其稠直者以斧去之又得二百餘束此時鬻利數倍矣後五年遂取大者作屋椽僅千餘莖鬻之得三四萬餘錢其端大之材在廟院者不啻千餘皆堪作車乘之用此時生涯已有百餘自此幣帛布裘百結日歉食而已遂買蜀青麻布百錢箇疋四尺而裁之顧人作小袋子又買內鄉新麻鞋數百緉不離廟中長安諸坊小兒及金吾家小兒等日給餅三枚錢十五文付與袋子一口至冬拾槐子實其內納焉月餘槐子已積兩車矣又命小兒拾破麻鞋每三輛以新麻鞋一輛換之遠近知之送破麻鞋者雲集數日獲千餘量然後鬻榆材中車輪者此時又得百餘千雇日傭人於宗賢西門水澗從水洗其破麻鞋曝干貯廟院中又坊門外買諸堆棄碎瓦子令功人於流水澗洗其泥滓車載積於廟中然後置石嘴碓五具剉碓三具西市買油靛數石雇庖人執爨廣召日傭人令剉其破麻鞋粉其碎瓦以疏布篩之合槐子油靛令役人日夜加工爛擣候相乳尺明鈔本尺作入悉看堪為挺人臼中熟出命工人併手團握例長三尺已下圓徑三寸垛明鈔本垛作築之得萬餘條號為法燭建中初六月京城大雨尺燼重桂巷無車輪乂取此法燭鬻之每條百文將燃炊爨與薪功倍又獲無窮之利先是西市秤行之南有十餘畝坳下潛汙之地目曰小海池為旗亭之內眾穢所聚又遂求買之其主不測乂酬錢三萬既獲之於其中立標懸幡子遶池設六七鋪制造煎餅乃糰子召小兒擲瓦礫擊其幡標中者以煎餅米團子啗不逾月兩街小兒競往計萬萬所擲瓦已滿池矣遂經度造店二十間當其要害日收利數千甚獲其要店今存焉號為竇家店又嘗有胡人米亮因飢寒乂見輒與錢帛凡七年不之問異日又見亮哀其飢寒又與錢五千文亮因感激而謂人曰亮終有所報大郎乂方閒居無何亮且至謂乂曰崇賢里有小宅出賣直二百直二百三字原空闕據黃本補千文大郎速買之之原空闕據許本黃本補又西布明鈔本許本黃本布作市櫃坊鏁錢盈餘即依直出錢市盈餘即依直出錢市八字原空闕據黃本補之書契曰亮語語原作與據明鈔本改乂曰亮攻於覽玉嘗見宅內有異石人罕見宅內有異石人罕八字原空闕據黃本補知之是搗衣砧真於闐玉大郎且立致富矣乂未之信亮立致富矣未之信亮九字原空闕據黃本補曰延壽坊召玉工觀之玉工大驚曰此奇貨也攻之當奇貨也攻之當六字原空闕據黃本補得腰帶銙二十副每副百錢三千貫文遂令琢之果得遂令琢之果得六字原空闕據黃本補數百千價又得合子執帶頭尾諸色雜類鬻之又計獲鬻之又計獲五字原空闕據黃本補錢數十萬貫其宅並元契乂遂與米亮使居之以酬焉又李使居之以酬焉又李八字原空闕據黃本補晟大尉宅前有一小宅相傳凶甚直二百十千又買之築千又買之築五字原空闕據黃本補園打墻拆其瓦木各垛一處就耕之術太尉宅中傍其地宅中傍其地五字原空闕據黃本補有小樓常不噉焉晟欲併之為為原作焉據黃本改擊毬之所他日乃使人向日乃使人向五字原空闕據黃本補乂欲買之乂確然不納云某自有所要候晟沐浴日遂沐浴日遂四字原空闕據黃本補具宅契書請見晟語晟曰某本置此宅欲與親戚居之恐戚居之恐四字原空闕據黃本補俯逼太尉甲第貧賤之人固難安矣某所見此地寬閑其寬閑其三字原空闕據黃本補中可以為戲馬今獻元契伏惟府賜照納晟大悅私謂乂悅私謂乂四字原空闕據黃本補不要某微力乎乂曰無敢望猶恐後有緩急再再字原空闕據黃本補明鈔本作當來投告令公晟益知重乂遂搬移瓦木平治其地如砥獻晟為戲為字原空闕戲原作獻據明鈔本補改馬荷乂之所惠乂乃於兩市選大商產巨萬者得五六人遂問之君豈不有子弟嬰諸道及在京職事否賈客大喜大喜二字原空闕據明鈔本補語乂曰大郎忽與某等致得子弟庇身之地地原作弟據明鈔本改某等共率草粟之直二萬貫文乂因懷諸賈客子弟名謁晟皆認為親故晟忻然覽之各置諸道膏腴之地重職乂又獲錢數萬崇賢里有中郎將曹遂興當夜生一大樹遂興每患其經年枝葉年枝二字原空闕葉原作菜據黃本補改有礙庭宇伐之又恐損堂室乂因訪遂興指其樹曰樹曰二字原空闕據黃本補中郎何不去之遂興答曰誠有礙耳因慮根深本固恐損根深本固恐損六字原空闕據黃本補所居室宇乂遂請買之仍與中郎除之不令有損當令樹有損當令樹五字原空闕據黃本補自失中郎大喜乃出錢五千文以納中郎與斧釿明鈔本釿作鉞匠人議伐匠人議伐四字原空闕據黃本補其樹自梢及根令各長二尺餘斷之厚與其直因選就眾其直因選就眾六字原空闕據黃本補材及陸博局數百鬻於本行乂計利百餘倍其精幹率是倍其精幹率是六字原空闕據黃本補類也後乂年老無子分其見在財等與諸熟識親友至其熟識親友至其六字原空闕據黃本補餘千產業街西諸大市各千餘貫與常住法安上人經營法安上人經營六字原空闕據黃本補不揀日時供擬其錢亦不計利乂卒時年八旬餘京城和八旬餘京城和六字原空闕據黃本補會里有邸弟姪宗親居焉諸孫尚在出乾𦠆子滕蔣二王唐滕王嬰蔣王惲皆不能廉慎大帝賜諸王名五王明鈔本五作臣臣下空缺三字按新唐書七九滕王元嬰傳作賜諸王綵五百此有脫訛不及二王敕曰騰叔蔣兄自解經紀不勞賜物與之明鈔本與下空缺三字無之字按新唐書七九滕王元嬰傳作給麻二車此有脫字以為錢貫二王大慚朝官莫不自勵皆以取受為贓污有終身為累莫敢犯者出朝野僉載竇知範唐瀛州饒陽縣令竇知範貪有一里正死範令門內一人為里正造像各出錢一貫範自納之謂曰里正有罪過先須急救範先造得一像且以與之結錢二百千平像百千原作千百平像二字原空闕據說郛二改補五寸半其貪皆類此範惟有一男放鷹馬驚桑枝打傷頭傷頭二字原空闕據黃本補破百姓快之皆曰千金之子易一兔之命出朝野僉載夏侯彪之唐益州新昌縣令夏侯彪之初下車問里正曰雞卵一錢幾顆曰三顆彪之乃遣取十千錢令買三萬顆謂里正曰未便要且寄雞母抱之遂成三萬頭雞經數月長成令縣吏與我賣一雞三十錢半年之間成三十萬又問竹笋一錢幾莖曰五莖又取十千錢付之買得五萬莖謂里正曰吾未須笋且林中養之至秋竹成一莖十錢積成五十萬其貪鄙不道皆此類出朝野僉載王志愔唐汴州刺史王志愔飲食精細對賓下脫粟飯商客有一騾日行三百里曾三十千不賣市人報價云十四千愔曰四千金少更增一千又令買單絲羅匹至三千愔問用幾兩絲對曰五兩愔令豎子取五兩絲來每兩別與十錢手功之直出朝野僉載段崇簡唐深州刺史段崇簡性貪暴到任追里正令括客云不得稱無上戶上戶下原有上戶二字據明鈔本刪每家家字原闕據明鈔本補取兩人下戶取一人以刑脅之人懼皆妄通通訖簡云不用喚客來但須見主人主人到處分每客索絹一疋約一月之內得絹三十車罷任發至鹿城縣有一車裝絹未滿載欠六百疋即喚里正令滿之里正計無所出遂於縣令丞尉家一倍舉送至都拜邠州刺史出朝野僉載唐安南部護崔玄信命女壻裴惟岳攝受明鈔本受作愛州刺史貪暴取金銀財物向萬貫有首領取婦裴即要障車綾索一千疋得八百疋仍不肯放捉新婦歸戲之三日乃放還首領更不復納裴即領物至揚州安南及問至擒之物並納官裴亦鏁項至安南以謝百姓及海口會赦免出朝野僉載嚴昇期唐洛州司倉嚴昇期攝侍御史於江南巡察性嗜牛肉所至州縣烹宰極多事無大小入金則弭凡到處金銀為之湧貴故江南人呼為金牛御史出朝野僉載明鈔本作出御史台記張昌儀唐張昌儀為洛陽令恃易之權勢屬官無不允者鼓聲動有一人姓薛齎金五十兩遮而奉之儀領金受其狀至朝堂付天官侍郎張錫數日失狀以問儀儀曰我亦不記得但姓薛者即與錫檢案內姓薛姓者六十餘人並令與官其蠹政也若此出朝野僉載李邕唐江夏季邕之為海州也日本國使至海州凡五百人載國信有十船珍貨數百萬邕見之舍於館厚給所須禁其出入夜中盡取所載而沉其船既明諷所館人白云昨夜海潮大至日本國船盡漂失不知所在於是以其事奏之敕下邕令造船十艘善水者五百人送日本使至其國邕既具舟及水工使者未發水工辭邕邕曰日本路遙海中風浪安能卻返前路任汝便宜從事送人喜行數日知其無備夜盡殺之遂歸邕又好客養亡命數百人所在攻劫事露則殺之後竟不得死且坐其酷濫也出紀聞裴佶唐裴佶常話少時姑夫為朝官有雅望佶至宅會其退朝深歎曰崔照何人眾口稱美必行賄也如此安得不亂言未訖門者報曰壽州崔使君候謁姑夫怒呵門者將鞭之良久束帶強見須臾命茶甚急又命酒饌又命為飯佶姑曰前何踞而後恭及入門有德色揖明鈔本揖作揮佶曰憩學中佶未下階出懷中一紙乃贈官絁千匹出國史補元載唐元載破家藉財物得胡椒九百石出尚書故實張延賞唐張延賞將判度支知一大獄頗有冤屈每甚扼腕及判使召獄吏嚴誡之且曰此獄已久旬日須了明旦視事案上有一小帖子曰錢三萬貫乞不問此獄公大怒更促促原作懼據明鈔本改之明日復見一帖子來曰錢五萬貫公益怒令兩日須畢明旦案上復見帖子曰錢十萬貫公遂止不問子弟承間偵之公曰錢至十萬貫通神矣無不可回之事吾恐及禍不得不受也出幽閒鼓吹盧昂唐盧昂主福建鹽鐵贓罪大發有瑟瑟枕大如半㪷以金牀乘之御史中丞孟簡按鞠累月乃得以進召市人估之或云寶無價或云美石非真瑟瑟地出國史補崔咸唐中書舍人崔咸嘗受大僚之知及懸車之年與表表上崔時為司封郎中以感知之分極言贊美便令制議行值無厚善者一章而允請三數月後門館日闃沉寂家人輩竊罵後甚悔語子弟曰有大段事慎勿與少年郎議之出幽閒鼓吹崔遠唐崔遠將退位親厚皆勉之長女賢知書獨勸相國遂決退一二歲中居閒躁悶顧謂兒姪曰不得諸道金銅茶籠子近來惣四掩也遂復起出幽閒鼓吹江淮賈人江淮賈人有積米以待湧價價字原闕據明鈔本補畫圖為人持米一斗貨錢一千又以懸於市楊子留後余粲杖殺之出國史補龍昌裔戊子歲旱廬陵人龍昌裔有米數千斛糶既而米價稍賤昌裔乃為文禱神岡廟祈更一月不雨祠訖還至路憩亭中俄有黑雲一片自廟後出頃之雷雨大至昌裔震死於亭外官司檢視之脫巾巾原作申據明鈔本改於髻中得一紙書則禱廟之文也昌裔有孫將應童子舉鄉人以其事訴之不獲送出稽神錄安重霸蜀簡州刺史安重霸瀆貨無厭州民有油客者姓鄧能棋其家亦贍重霸召對敵只令立侍每落一子俾其退立於西北牖下俟我算路乃始進之終日不下十數子而已鄧生倦立且飢殆不可堪次日又召或有諷鄧生曰此侯好賂本不為棋何不獻賂而自求退鄧生然之獻中金三錠獲免出北夢瑣言張虔劍張虔劍多貪鎮滄州日因亢旱民飢乃發廩賑之事上聞甚嘉賞他日秋成倍斗徵歛常言自覺言行相違然每見財不能自止時人笑之出北夢瑣言
