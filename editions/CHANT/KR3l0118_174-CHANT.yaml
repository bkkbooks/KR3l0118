body:
  text: 俊辨陽玠隋京兆杜公瞻衛尉臺卿猶子也嘗邀陽玠過宅酒酣因而嘲謔公瞻謂兄既姓陽陽貨實辱孔子玠曰弟既姓杜杜伯嘗射宣王殿內將軍隴西牛子充寮友推其機辯嘗謂玠曰君陽有玠恐不任廚玠曰君牛既充正可烹宰又見玠食芥菹曰君身名玠何得復啖芥菹對曰君既姓牛何得不斷牛肉有太倉令張策者在雲龍門與玠議理屈謂玠曰卿本無德量忽共叔寶同名玠抗聲曰爾既非英雄敢與伯符連諱太子洗馬蘭陵蕭詡爽俊有才辯嘗謂玠曰流共工於幽州易北恐非樂土玠曰族驩兜於崇山江南豈是勝地錄尚書晉昌王唐邕聞諸省官曰卿等宜道本州寶物定州人以綾綺為寶滄州人以魚鹽為寶及至玠邕曰卿幽州人以何物為寶答曰刺史嚴明文武奉法此幽州之寶也邕有媿色出談藪薛道衡隋吏部侍郎薛道衡嘗遊鍾山開善寺謂小僧曰金剛何為努目菩薩何為低眉小僧答曰金剛努目所以降伏四魔菩薩低眉所以慈悲六道道衡憮然不能對出談藪薛收唐薛收在秦府檄書露布多出於收占辭敏速皆同宿構馬上即成曾無點竄出譚賓錄張後裔張後裔在并州太宗就受春秋左氏傳後因召入賜讌言及平昔從容謂曰今日弟子何如如原作知據明鈔本改後裔對曰昔孔子領徒三千徒者無子男之位臣翼贊一人即為萬乘主計臣此功愈於先聖太宗大悅即賜馬五匹後為禮部尚書陪葬獻陵出譚賓錄崔仁師崔仁師為度支郎中嘗陛奏度支錢物數千言手不執本太宗怪之令杜正偷齎本仁師對唱一無差殊刑部以反逆緣坐兄弟沒官為輕改輕改原作改輕據宋孔平仲續世說一改從死仁師議以為父子天屬昆季同氣誅其父子足累其心此而不顧何愛兄弟既欲改法請審商量竟從仁師議出譚賓錄盧莊道范陽人也天下稱為名家聰慧敏悟冠於今古父彥與高士廉有舊莊道少孤年十二造士廉廉以故人子引令坐會上有上書者莊道竊窺覽謂士廉曰此文莊道所作士廉怪謂曰後生勿妄言為輕薄之行請誦之果通復請倒誦又通士廉稱歎久之乃跪謝曰此文實非莊道所作向傍窺而記耳士廉取他文及案牘命讀之一覽而倒誦并呈示所撰文章士廉具以聞太宗召見策試擢第年十六授河池尉滿二歲制舉擢甲科召見太宗曰此是朕聰明小兒邪特授長安尉太宗將省囚徒莊道年纔二十縣令以幼年懼不舉將以他尉代之莊道不從時繫囚四百餘人俱預書狀莊道但閒暇不之省也令丞等憂懼屢以為言莊道從容自若翌日太宗召囚莊道乃徐書狀以進引諸囚入莊道對御評其罪狀輕重留繫月日應對如神太宗驚嘆即日拜監察御史出御史臺記許敬宗高宗東封竇德玄騎而從上問德玄曰濮陽古謂之帝丘何也德玄不能對許敬宗策馬前對所問上意稱善敬宗退而告人曰大臣不可無學吾向見德玄不能對心實羞之德玄聞之曰人各有能有不能善守其拙不彊所不知也李勣曰敬宗多聞信美矣德玄之言亦善也出譚賓錄胡楚賓胡楚賓屬文敏速每飲酒半酣而後操筆高宗每令作文必以金杯盛酒令飲便以杯賜之出譚賓錄裴琰之裴琰之作同州司戶年纔弱冠但以行樂為事略不為案牘刺史譙國公李崇義怪之而問戶佐佐曰司戶達官兒郎恐不閑書判既數日崇義謂琰之曰同州事物固明鈔本固作困繫司戶尤甚公何不別求京官無為滯此司也琰之唯諾復數日曹事委積諸竊議以為琰之不知書但遨遊耳他日崇義召之厲色形言將奏免之琰之出謂其佐曰文案幾何對曰遽者二百餘琰之曰有何多如此逼人命每案後連紙十張仍命五六人以供研墨點筆左右勉唯而已琰之不之聽語主案者略言事意倚柱而斷之詞理縱橫文華燦爛手不停綴落紙如飛傾州官僚觀者如堵牆驚嘆之聲不已也案達於崇義崇義初曰司戶解判邪戶佐曰司戶太高手筆仍未之奇也比四五十案詞彩彌精崇義悚怍召琰之降階謝曰公之詞翰若此何忍藏鋒成鄙夫之過是日名動一州數日聞於京邑尋擢授雄明鈔本雄作雍州司戶出御史臺記蘇頲蘇頲聰悟過人日誦數千言雖記覽如神而父瓌訓勵嚴至常令衣青布襦伏於牀下出其脛受榎楚及壯而文學該博冠於一時性踈俊嗜酒及玄宗既平內難將欲草制書甚難其人顧謂瓌曰誰可為詔試為思之瓌曰臣不知其他臣男頲甚敏捷可備指使然嗜酒幸免沾醉足以了其事玄宗遽命召來至時宿酲未解粗備拜舞嘗醉嘔殿下命中人扶臥於御前玄宗親為舉衾以覆之既醒授簡筆立成才藻縱橫詞理典贍玄宗大喜撫其背曰知子莫若父有如此邪由是器重已注意於大用矣韋嗣立拜中書令瓌署官告頲為之辭薛稷書時人為之三絕頲纔能言有京兆尹過瓌命頲詠尹字乃曰丑雖有足甲不全身見君無口知伊少人瓌與東明觀道士周彥雲素相往來周時欲為師建立碑碣謂瓌曰成某志不過煩相君諸子五郎文六郎書七郎致石瓌大笑口不言而心服其公瓌子頲第五詵第六冰第七詵善八分書出明皇雜錄王勮絳州人開元中任中書舍人先是五王出閣同日受冊有司忘載冊文百官在列方知闕禮勮召小吏五人各執管口授分寫一時俱畢出摭言李白開元中李翰林白應詔草白蓮花開序及宮詞十首時方大醉中貴人以冷水沃之稍醒白於御前索筆一揮文不加點出摭言柳芳李幼奇者開元中以藝干柳芳嘗對芳念百韻時芳已暗記便題之於壁不差一字謂幼奇曰此吾之詩也幼奇大驚異之有不平色久之徐曰聊相戲耳此君所念也因請幼奇更誦所著文章皆一遍能寫出尚書故實王藻王藻王素貞元初應舉齊名第十四每偕往還通家稱十四郎明鈔本每偕往還通家稱十四郎作每詣往還家通王廿四郎或問曰藻素也出傳載韓愈李河南素替杜公兼時韓吏部愈為河南令除職方員外歸朝問前後之政如何對曰將兼來比素出傳載李程李相國程執政時嚴謨嚴休皆在南省有萬年令闕人多屬之李云二年明鈔本作嚴不知謨出傳載李吉甫憲宗久親政事忽問京兆尹幾員李相吉甫對曰京兆尹三員一員大尹二員少尹以為善對出國史補王生或問羅浮王生曰為政難易曰簡則易又問儒釋同否曰直則同出國史補辛丘度元和十五年辛丘度丘丘字原闕據傳載補紓杜元頴同時為遺補令史分直故事但舉其姓曰辛辛字原闕據傳載補丘杜當入出傳載溫庭筠會昌毀寺時分遣御史檢天下所廢寺及收錄金銀佛像有蘇監察者不記名巡檢兩街諸寺見銀佛一尺已下者多袖之而歸人謂之蘇扛佛或問溫庭筠將何對好遽曰無以過密陀僧也出尚書故實柳公權武宗朝在內庭上嘗怒一宮嬪久之既而復召謂公權曰朕怪此人然若得學士一篇當釋然矣目御前蜀牋數十幅授之公權略不佇思而成一絕曰不分前時忤主恩已甘寂寞守長門今朝却得君王顧重入椒房拭淚痕上大悅錫錦綵二百匹令宮人上前拜謝之出摭言權德輿權丞相德輿言無不聞又善廋詞嘗逢李二十六於馬上廋詞問答聞者莫知其所說焉或曰廋詞何也曰隱語耳語不曰人焉廋哉人焉廋哉此之謂也出嘉話錄東方朔漢武帝嘗以隱語召東方朔時上林獻棗帝以杖擊未央前殿檻曰叱叱先生束束朔至曰上林獻棗四十九枚乎朔見上以杖擊檻兩木兩木林也束束棗也叱叱四十九也出東方朔傳又東方朔常與郭舍人於帝前射覆郭曰臣願問朔一事朔得臣願榜百朔窮臣當賜帛曰客來東方歌謳且行不從門入踰我垣牆遊戲中庭上入殿堂擊之拍拍死者攘攘格鬥而死主人被創是何物也朔曰長喙細身晝匿夜行嗜肉惡煙常所拍捫臣朔愚戇名之曰蟁舍人辭窮當復脫褌出東方朔傳李彪後魏孝文皇帝嘗殿會群臣酒酣歡極帝因舉巵屬群臣及親王等酒曰三三橫兩兩縱誰能辨之賜金鍾御史中尉李彪曰沽酒老嫗甕注瓨屠兒割肉與稱同尚書左丞甄琛曰吳人浮水自云工技兒擲袖在虛空彭城王勰曰臣思解此是習字高祖即以金鍾賜彪朝庭服彪聰明有如甄琛和之亦速出伽藍記班蒙唐太保令狐相綯出鎮淮海日支使班蒙與從事俱遊大明寺之西廊忽觀前壁所題云一人堂堂二曜同光泉深尺一點去冰旁二人相連不欠一邊三梁四柱烈火然除却雙勾兩日全諸賓幕顧之駐足良久莫之能辨獨班蒙曰一人豈非大字乎二曜者日月非明字乎尺一者十一寸非寺字乎點去冰水字二人相連天字不欠一邊下字三梁四柱而烈火然無字兩日除雙勾比字得非大明寺水天下無比乎眾皆洗然曰黃絹之奇智亦何異哉稱歎彌日詢之老僧曰頃年有客獨遊題之而去不言姓氏出桂苑叢記陳元方漢末陳太丘寔與友人期行過期不至太丘捨去去後乃至其子元方年七歲在門外戲客問元方尊君在否答曰待君不至已去友人便怒曰非人與人期行相委而去元方曰君與家君期日中時過申明鈔本申作中不來則是無信對子罵父則是無禮友人慚下車引之元方遂入門不顧出商芸小說孫策吳孫策年十四在壽陽詣袁術始至俄而劉豫州備到便求去袁曰劉豫州何關君答曰不爾英雄忌人即出下東階而劉備從西階上但轉顧視孫之行步殆不復前出語林鍾毓鍾毓鍾會少有令譽年十三魏文帝聞之語其父繇曰令卿二子來於是敕見毓面有汗帝問曰卿面何以汗毓對曰戰戰惶惶汗出如漿復問會卿何以不汗出會對曰戰戰慄慄汗不得出又值其父晝寢因共偷服散酒其父時覺且假寐以觀之毓拜而後飲會飲而不拜既問之毓曰酒以成禮不敢不拜又問會何以不拜會曰偷本非禮所以不拜出小說明鈔本作出世說孫齊由孫齊由齊莊二人小時詣庾公公問齊由何字曰齊由公曰欲何齊邪曰齊許由又問齊莊何字答曰齊莊公曰欲齊何邪曰齊莊周公曰何不慕仲尼而慕莊周答曰聖人生知故難慕庾公大喜小兒答對出世說新語陸琇後魏東平王陸俟代人也聰悟有才略子馥有父風高崇見而賞之謂朝臣曰吾常歎其父智過其軀此踰於父矣為相州刺史遷太僕馥子琇年九歲馥謂曰汝祖東平王有十二子我為嫡長承襲家業吾今年老屬汝幼童詎堪為陸氏宗首乎琇對曰苟非鬥力何患童稚馥奇之立為嫡出談藪王絢宋王景僧朗之子美風貌善玄言與謝莊張暢何偃俱有盛名於是景文本名彧與明帝名同故稱字長子絢年五六歲警悟外祖何尚之賞異焉嘗教讀論語至郁郁乎文哉因戲之曰可改邪邪乎文哉絢應聲答曰尊者之名安可為戲便可道草翁之風則舅論語曰草上之風則偃偃尚之子也絢卒於祕書丞出談藪蕭遙欣南齊曲江公蕭遙欣少有神采幹局為童子時有一小兒左右彈飛鳥未嘗不應弦而下遙欣謂之曰凡戲多端何急彈此鳥自雲中翔何關人事小兒感之終身不復捉彈爾時年十一士庶多競此戲遙欣一說旬月播之遠近聞者不復為之出談藪房氏子唐韋陟有疾房尚書琯使子弟問之延入臥內行步悉籍茵毯房氏子襪而登階侍婢皆笑之舉朝以為韋氏貴盛房氏清儉俱為美談出國史補張琇張童子者名琇審素之子也開元二十二年琇殺殿中侍御史楊萬頃於闕下復父仇也初審素受賕事發詔萬頃按之萬頃按審素過入故坐誅家屬徙邊琇會赦得還時未冠乃追復前怨與其弟瑝手刃萬頃於都城聞者駭之帝嘉其孝將釋之有司以專殺抗論琇坐死時人哀之葬於邙山為疑冢焉蓋懼楊宗之所發也故虞部員外郎顧云誄之曰冒法復讎信難逃於刑典忘身狥孝誠有契於禮經且從古以來誰人不死得其死矣夫可恨歟出顧雲文集渾瑊渾太師瑊年十一隨父釋之防冬朔方節度張齊丘戲問將乳母來否其年立跳蕩功後二年拔石堡城收龍駒島皆有奇效出國史補
