body:
  text: 郭翰郭翰太原郭翰少簡貴有清標姿度美秀善談論工草隸早孤獨處當盛暑乘月臥庭中時有清風稍聞香氣漸濃翰甚怪之仰視空中見有人冉冉而下直至翰前乃一少女也明艷絕代光彩溢目衣玄綃之衣曳霜羅之帔戴翠翹鳳凰之冠躡瓊文九章之履侍女二人皆有殊色感蕩心神翰整衣巾下床拜謁曰不意尊靈逈降願垂德音女微笑曰吾天上織女也久無主對而佳期阻曠幽態盈懷上帝賜命遊人間仰慕清風願託神契翰曰非敢望也益深所感女為勑侍婢淨掃室中張霜霧丹縠之幃施水晶玉華之簟轉會風之扇宛若清秋乃攜手昇堂解衣共臥其襯體輕紅綃衣似小香囊氣盈一室有同心龍腦之枕覆雙縷鴛文之衾柔肌膩體深情密態妍艷無匹欲曉辭去面粉如故為試拭之乃本質也翰送出戶凌雲而去自後夜夜皆來情好轉切翰戲之曰牽郎何在那敢獨行對曰陰陽變化關渠何事且河漢隔絕無可復知縱復知之不足為慮因撫翰心前曰世人不明瞻矚耳翰又曰卿已託靈辰象辰象之門可得聞乎對曰人間觀之只見是星其中自有宮室居處群仙皆遊觀焉萬物之精各有象在天成形在地下人之變必形於上也吾今觀之皆了了自識因為翰指列宿分位盡詳紀度時人不悟者翰遂洞知之後將至七夕忽不復來經數夕方至翰問曰相見樂乎笑而對曰天上那比人間正以感運當爾非有他故也君無相忌問曰卿來何遲答曰人中五日彼一夕也又為翰致天廚悉非世物徐視其衣並無縫翰問之謂翰曰天衣本非針綫為也每去輒以衣服自隨經一年忽於一夕顏色悽惻涕流交下執翰手曰帝命有程便可永訣遂嗚咽不自勝翰驚惋曰尚餘幾日在對曰只今夕耳遂悲泣徹曉不眠及旦撫抱為別以七寶椀一留贈言明年某日當有書相問翰答以玉環一雙便履空而去廻顧招手良久方滅翰思之成疾未嘗暫忘明年至期果使前者侍女將書函致翰遂開封以青縑為紙鉛丹為字言詞清麗情念重疊書末有詩二首詩曰河漢雖云闊三秋尚有期情人終已矣良會更何時又曰朱閣臨清漢瓊宮御紫房佳期情在此只是斷人腸翰以香牋答書意甚慊切並有酬贈詩二首詩曰人世將天上由來不可期誰知一廻顧交作兩相思又日贈枕猶香澤啼衣尚淚痕玉顏霄漢裏空有往來魂自此而絕是年太史奏織女星無光翰思不已凡人間麗色不復措意復以繼嗣大義須婚強娶程氏女所不稱意復以無嗣遂成反目翰後官至侍御史而卒出靈怪集楊敬真虢州閿鄉縣長壽鄉天仙村田家女也年十八嫁同村王清其夫家貧力田楊氏婦道甚謹夫族目之勤力新婦性沉靜不好戲笑有暇必灑掃靜室閉門閑居雖鄰婦狎之終不相往來生三男一女年二十四歲元和十二年五月十二日夜告其夫曰妾神識頗不安惡聞人言當於靜室寧之君宜與兒女暫居異室夫許之楊氏遂沐浴著新衣焚香閉戶而坐及明訝其起遲開門視之衣服委地床上若蟬蛻然身已去矣但覺異香滿室其夫驚以告其父母共嘆之數人來曰昨夜方半有天樂從西而來似若雲中下於君家奏樂久之稍稍上去合村皆聽之君家聞否而異香酷烈遍數十里村吏以告縣令李邯遣吏民遠近尋逐皆無蹤跡因令不動其衣閉其戶以棘環之冀其或來也至十八日夜五更村人復聞雲中仙樂異香從東來復下王家宅作樂久之而去王氏亦無聞者及明來視其門棘封如故房中髣髴若有人聲遽遽原作處據明鈔本改走告縣令李邯親率僧道官吏共開其門則婦宛在床矣但覺面目光芒有非常之色邯問曰向何所去今何所來對曰昨十五日夜初有仙騎來曰夫人當上仙雲鶴即到宜靜室以伺之至三更有仙樂綵仗霓旌絳節鸞鶴紛紜五雲來降入於房中報者前曰前曰原作曰前據明鈔本改夫人准籍合仙仙師使使者來迎將會於西岳於是彩童二人捧玉箱箱中有奇服非綺非羅制若道人之衣珍華香潔不可名狀遂衣之畢樂作三闕青衣引白鶴曰宜乘此初尚懼其危試乘之穩不可言飛起而五雲捧出綵仗前引至於華山雲臺峰峰上有磐石已有四女先在被焉一人云姓馬宋州人一人姓徐幽州人一人姓郭荊州人一人姓夏青州人皆其夜成仙同會於此旁一小仙曰並捨虛幻得證真仙今當定名宜有真字於是馬曰信真徐曰湛真郭曰修真夏曰守真其時五雲參差徧覆崖谷妙樂羅列間作於前五人相慶曰同生濁界並是凡身一旦翛然遂與塵隔今夕何夕歡會於斯宜各賦詩以道其意信真詩曰几劫澄煩慮思今身僅成誓將雲外隱不向世間存湛真詩曰綽約離塵世從容上太清雲衣無綻日鶴駕沒遙程修真詩曰華嶽無三尺東瀛僅一杯入雲騎綵鳳歌舞上蓬萊守真詩曰共作雲山侶俱辭世界塵靜思前日事拋卻幾年身敬真亦詩曰人世徒紛擾其生似夢華誰言今夕里俛首視雲霞既而雕盤珍果名不可知妙樂鏘鍠響動崖谷俄而執節者曰宜往蓬萊謁大仙伯五真曰大仙伯為誰曰茅君也妓樂鸞鶴復前引東去倏然間已到蓬萊其宮皆金銀花木樓殿皆非人間之制作大仙伯居金闕玉堂中侍衛甚嚴見五真喜曰來何晚耶飲以玉盃賜以金簡鳳文之衣玉華之冠配居蓬萊華院四人者出敬真獨前曰王父年高無人侍養請回侍其殘年王父去世然後從命誠不忍得樂而忘王父也惟仙伯哀之仙伯曰汝村一千年方出一仙人汝當其會無自墜其道因敕四真送至其家故得還也邯問昔何修習曰村婦何以知但性本虛靜閒即凝神而坐不復俗慮得入胸中耳此性也非非字原闕據明鈔本許本黃本補學也又問要去可否曰本無道術何以能去雲鶴來迎即去不來亦無術可召於是遂謝絕其夫服黃冠邯以狀聞州州聞廉使時崔從按察陝輔延之舍於陝州紫極宮請王父於別室人不得升其階惟廉使從事及夫人得之瞻拜者才及階而已亦不得升廉使以聞唐憲宗召見舍於內殿或道而無以對罷之今在陝州終歲不食食時啗果實試飲酒二三盃絕無所食但容色轉芳嫩耳出續玄怪錄封陟寶曆中有封陟孝廉者居於少室貌態潔朗性頗貞端志在典墳僻於林藪探義而星歸腐草閱經而月墜幽窗兀兀孜孜俾夜作晝無非搜索隱奧未嘗暫縱揭時日也書堂之畔景象可窺泉石清寒桂蘭雅淡戲猱每竊其庭果唳鶴頻棲於澗松虛籟時吟纖埃晝閴烟鎖簹篁之翠節露滋躑躅之紅葩薜蔓衣垣苔茸毯砌時夜將午忽飄異香酷烈漸布於庭際俄有輜軿自空而降畫輪軋軋直湊簷楹見一仙姝侍從華麗玉珮敲磬羅裙曳雲體欺皓雪之容光臉奪芙蕖之艷冶正容斂袵而揖陟曰某籍本上仙謫居下界或遊人間五岳或止海面三峰月到瑤階愁莫聽其鳳管虫吟粉壁恨不寐於鴦衾燕浪語而徘徊鸞虛歌而縹緲寶瑟休泛虬觥懶斟紅杏艷枝激含嚬於綺殿碧桃芳萼引凝睇於瓊樓既厭曉粧漸融春思伏見郎君坤儀濬潔襟量端明學聚流螢文含隱豹所以慕其真樸愛以孤標特謁光容願持箕箒又不知郎君雅旨如何陟攝衣朗燭正色而坐言曰某家本貞廉性唯孤介貪古人之糟粕究前聖之指歸編柳苦辛燃粕幽暗布被糲食燒蒿茹藜但自固窮終不斯濫必不敢當神仙降顧斷意如此幸早廻車姝曰某乍造門墻未申懇迫輒有詩一章奉留後七日更來詩曰謫居蓬島別瑤池春媚烟花有所思為愛君心能潔白願操箕箒奉屏幃陟覽之若不聞雲軿既去窗戶遺芳然陟心中不可轉也後七日夜姝又至騎從如前時麗容潔服艷媚巧言入白陟曰某以業緣遽縈魔障剡起蓬山瀛島繡帳錦宮恨起紅茵愁生翠被難窺舞蝶於芳草每妬流鶯於綺叢靡不雙飛俱能對跱自矜孤寢轉懵空閨秋卻銀缸但凝眸於片月春尋瓊圃空抒思於殘花所以激切前時布露丹懇幸垂採納無阻精誠又不知郎君意竟如何陟又正色而言曰某身居山藪志已顓蒙不識鉛華豈知女色幸垂速去無相見尤姝曰願不貯其深疑幸望容其陋質輒更有詩一章後七日復來詩曰弄玉有夫皆得道劉剛兼室盡登仙君能仔細窺朝露須逐雲車拜洞天陟覽又不廻意後七日夜姝又至態柔容冶靚衣明眸又言曰逝波難駐西日易頹花木不停薤露非久輕漚泛水只得逡巡微燭當風莫過瞬息虛爭意氣能得幾時恃頑韶顏須臾槁木所以君誇容鬢尚未凋零固止綺羅貪窮典籍及其衰老何以任持我有還丹頗能駐命許其依托必寫襟懷能遣君壽例三松瞳方兩目仙山靈府任意追遊莫種槿花使朝晨而騁艷休敲石火尚昏黑而流光陟乃怒目而言曰我居書齋不欺暗室下惠為證叔子為師是何妖精苦相凌逼心如鐵石無更多言儻若遲廻必當窘辱侍衛諫曰小娘子廻車此木偶人不足與語況窮薄當為下鬼豈神仙配偶耶姝長吁曰我所以懇懇者為是青牛道士之苗裔況此時一失又須曠居六百年不是細事於戲此子大是忍人又留詩曰蕭郎不顧鳳樓人雲澀廻車淚臉新愁想蓬瀛歸去路難窺舊苑碧桃春輜軿出戶珠翠響空泠泠簫笙杳杳雲露然陟意不易後三年陟染疾而終為太山所追束以大鎖使者驅之欲至幽府忽遇神仙騎從清道甚嚴使者躬身於路左曰上元夫人遊太山耳俄有仙騎召使者與囚俱來陟至彼仰窺乃昔日求偶仙姝也但左右彈指悲嗟仙姝遂索追狀曰不能於此人無情遂索大筆判曰封陟往雖執迷操惟堅潔實由樸戇難責風情宜更延一紀左右令陟跪謝使者遂解去鐵鏁也仙官已釋則幽府無敢追攝使者卻引歸良久蘇息後追悔昔日之事慟哭自咎而已出傳奇
