body:
  text: 草花旌節花黎州漢源縣有旌節花去地三二尺行行皆如旌節也野悉密花野悉密出佛林國亦出波斯國苗長七八尺葉似梅四時敷榮其花五出白色不結子花開時遍野皆香與岭南詹糖相類西域人常采其花壓以為油涂其香滑都胜花紫色兩重心數葉卷上如蘆朵蕊黃葉細簇蝶花花朵簇一蕊如蓮房色淺紅出在溫州茙葵本湖中葵也一名胡葵似葵大者紅可緝為布燒作灰藏大火久不滅有重台者金燈花金燈一曰九形花葉不相見俗惡人家種之故一名無義草金錢花梁時荊州掾屬雙六賭金錢錢盡以金錢花相足魚弘謂得花胜得錢毗尸沙花毗尸沙一名曰中金錢花本出外國梁大同二年來中土敘牡丹牡丹花世謂近有蓋以隋末文士集中無牡丹歌詩則楊子華有晝牡丹處极分明子華北齊人則知牡丹花亦已久矣又謝康樂集亦言竹間水際多牡丹而隋朝種植法七十余卷中不說牡丹者則隋朝花藥中所無也白牡丹唐開元末裴士淹為郎官奉使幽冀回至汾州眾香寺得白牡丹一棵值于長興私地天寶中為都下奇賞當時名士有裴給事宅看牡丹詩詩尋訪未獲太常博士張乘嘗見裴祭酒說又房琯有言牡丹之會琯不與焉紅紫牡丹唐至德中馬仆射總鎮太原得紅紫二色牡丹移于城中元和初猶少今與茙葵較多少耳正倒暈牡丹長安興唐寺有牡丹一棵唐元和中著花二千一百朵其色有正暈倒暈淺紅深紫黃白檀等獨無深紅又無花葉中無抹心者重台花有花面徑七八寸者合歡牡丹長安興善寺素師院牡丹色絕嘉元和末一枝花合歡染牡丹花唐朝韓文公愈有疏從子侄自江淮來年甚少韓令學院中伴子弟子弟悉為凌辱韓知遂送街西僧院中令讀書經旬寺主綱复訴其狂率韓遽令歸且責曰市肆賤類營衣食尚有一事長處汝所為如此竟作何物侄拜謝徐曰某有一藝恨叔不知因指階前牡丹曰叔要此花青紫黃赤唯命也韓大奇之遂給所須試之乃豎箔曲盡遮牡丹叢不令人窺掘棵四面深及其根寬容人坐唯繼紫礦輕粉朱紅旦暮治其根凡七日遂掩坑白其叔曰根校遲一月時冬初也牡丹本紫及花發色黃紅歷緣每朵有一聯詩字色紫分明乃是韓公出關時詩頭一韻曰云橫秦岭家何在雪擁藍關馬不前十四字韓大惊異遂乃辭歸江淮竟不愿仕斸牡丹長安貴游尚牡丹三十余年矣每春暮車馬若狂以不就玩為恥金吾舖圍外寺觀種以求利一本有數萬者元和末韓令侄至長安私第有之遽令斸去曰吾豈效兒女子也月桂花月桂葉如桂花淺黃色四瓣青蕊花盛發如柿蒂出蔣山牡桂花牡桂葉大如苦竹葉中有一脈如筆跡花蒂葉三瓣瓣端分為兩歧其表色淺黃近歧淺紅色花六瓣色白心凸起如荔枝其枝紫出婺州山中桂花三月開黃而不白大庾詩皆稱桂花耐日及張曲江詩桂華秋皎洁妄矣海石榴花新羅多海紅并海石榴唐贊皇李德裕言花中帶海者悉從海東來章川花差類海石榴五朵簇生葉狹長重沓承南海朱槿南海四時皆有朱槿花常開然一本之內所發不過一二十花且開不能如圖畫者叢發爛熳岭表朱槿岭表朱槿花莖葉皆如桑樹葉光而厚樹身高者止于四五尺而枝葉婆娑自二月開花至于中冬方歇其花深紅色五出如大蜀葵有蕊一條長于花葉上綴金屑日光所爍疑有焰生一叢之上日開數百朵雖繁而有艷且近而無香暮落朝開插枝即活故名之槿俚女亦采而鬻一錢售數十朵若微此花紅梅無以資其色紅槿花岭南紅槿自正月迄十二月常開秋冬差少耳那提槿花紫色兩重葉外重葉卷心心中抽莖高寸余葉端分五瓣如蒂瓣中紫蕊莖上黃蕊佛桑花閩中多佛桑樹枝葉如桑唯條上勾花房如桐花含長一寸余似重台狀花亦有淺黃者南中桐花有深色者貞桐花貞桐枝端抽赤黃條條复旁對分三層花大如落蘇花黃色一莖上有五六十朵梔子花諸花少六出者唯梔子花六出陶真白言梔子剪花六出刻房七道其花香甚相傳即西域薝卜也山茶花山茶葉如茶樹高者丈余花大盈寸色如緋十二月開三色石楠花衡山石楠花有紫碧白三色花大如牡丹亦有無花者比閭花白州比閭華其華若羽伐其木為薪終日火不敗木蓮花葉似辛夷花類蓮色出鳴玉溪卬州亦有那伽花狀如三春無葉華色白心黃六瓣出在舶上木蘭花長安敦化坊百姓家唐大和中有木蘭一樹花色深紅后桂州觀察使李勃看宅人以五千買之宅在水北經年花紫色異木花唐衛公李德裕嘗獲異木一株春花紫予思木中一歲發花唯木蘭碧玫瑰洛中鬻花木者言嵩山深處有碧色玫瑰而今亡矣刺桐花狀如圖畫者不類其木為材三四月時布葉繁密后有赤花間生葉間三五房不得如畫者紅芳滿樹懷風花樂游苑自生玫瑰樹下多苜蓿一名懷風時人或謂之光風風在其間常肅然日照其花有光采故名曰苜蓿懷風茂陵人謂之連枝草躑躅花南中花多紅赤亦彼之方色也唯躑躅為胜岭北時有不如南之繁多也山谷間悉生二月發時照耀如火月余不歇凌霄花凌霄花中露水損人目分枝荷漢明帝時池中有分枝荷一莖四葉狀如駢蓋實如玄珠可以飾珮夜舒荷靈帝時有夜舒荷一莖四蓮其葉夜舒晝卷睡蓮花睡蓮南海有睡蓮夜則花低入水碧蓮花宣平中太傅相國盧公應舉時寄居壽州安丰縣別墅嘗游芍陂見里人負薪者持碧蓮花一朵公惊問之答曰陂中得之盧公后從事浙西因使淮服話于太尉衛公李德裕德裕令搜訪芍陂則無有矣又遍尋于江渚間亦終不能得乃知向者一朵蓋神異耳染青蓮花唐韓文公愈之侄有種花之異聞其說于小說杜給事孺休典湖州有染戶家池生青蓮花刺史命收蓮子歸京種于池沼或變為紅蓮因異之乃致書問染工染工曰我家有三世治靛瓮嘗以蓮子浸于瓮底俟經歲年然后種之若以所種青蓮花子為種即其紅矣蓋還本質又何足怪乃以所浸蓮子寄之道士申匡圖又見人以雞矢和土培芍藥花叢其淡紅者悉成深紅染之所益信矣偽蜀王先主將晏駕其年峨眉山娑羅花悉開白花又荊文獻王未薨前數年溝港城隍悉開白蓮一則染以氣類一則表示凶兆又何疑哉三朵瑞蓮偽蜀主當僭位諸勳貴功臣競起甲第獨偽中令趙廷隱起南宅北宅千梁萬拱其諸奢麗莫之與儔后枕江瀆池中有二島嶼遂甃石循池四岸皆種垂楊或間雜木芙蓉池中種藕每至秋夏花開魚躍柳蔭之下有士子執卷者垂綸者執如意者執塵尾者談詩論道者一旦岸之隈有蓮一莖上分兩歧開二朵其時謂之太平無事之秋士女拖香肆艷看者甚眾趙廷隱畫圖以進蜀主歎賞其時歌者詠者不少無何禁苑中有蓮一莖歧分三朵蜀王開筵宴召群臣賞之是時詞臣已下皆貢詩當時有好事者圖以繪事至今傳之藕蘇州進藕其最上者名傷荷藕或云荷名或云葉甘為虫所傷或云故傷其葉以長其根近多重台荷實中又生花亦甚異也蓮實石蓮入水沉唯煎鹼鹵能浮之雁食之糞落山中百年不坏相傳橡子落水為蓮芰芰一名水菜一名蘚苔漢武昆明池中有浮根菱根出水上葉淪波下亦曰青水芰玄都有芰碧色狀如雞飛名翻雞芰仙人鳧伯子常采之菱今人但言菱芰諸解草木書亦不分別唯伍安貧武陵記言四角曰芰兩角曰菱今蘇州折腰菱多兩角荊州有僧遺段成式一斗郢城菱三角而無芒可以挼莎
