body:
  text: 僧令因僧令因僧令因者于子午谷過山往金州見一竹輿先行有女仆服慷從之數日終不見人令因乃急引帘窺之一婦人首而蛇身甚偉令因甚惊婦人曰不幸業重身忽變化上人何乃窺之問其仆曰欲送秦岭之上令因遂與誦功德送及秦岭亦不見婦人之首而入林中矣衛中丞姊御史中丞衛公有姊為性剛戾毒惡婢仆鞭笞多死忽得熱疾六七日自云不复見人常獨閉室而欲至者必嗔喝呵怒經十余日忽聞屋中窸窣有聲潛來窺之升堂便覺腥臊毒氣開牖已見變為一大蛇長丈余作赤斑色衣服爪發散在床褥其蛇怒目逐人一家惊駭眾共送之于野蓋性暴虐所致也蒲州人蒲州人穿地作井坎深丈余遇一方石而不及泉欲去石更鑿忽墮深坑蟄蛇如覆舟小者與凡蛇等其人初甚惊懼久之稍熟饑無所食其蛇吸氣因亦效之遂不复饑積累月聞雷聲初一聲蛇乃起首須臾悉動頃之散去大者前去相次出复入人知不害己乃前抱其項蛇遂徑去緣上白道如行十里前有烽火乃致人于地而去人往借問烽者云是平州也相魏貧民相魏有貧民斸園荒地見一大蛇㶔而殺之尋見一大穴穴中十余小蛇又复殺而埋之既畢歸家明日有人持狀訴論云被殺一家大小埋在園中官捕獲此人訊問了然不伏于園中驗之得一坑者共十余人但言昨打殺者十余條蛇埋之于此并不殺人不知此禍何來若為就決實為大枉官疑之勘本告者尋覓無人又令重就園檢驗昨所埋之處但見十余死蛇不复見人乃得免焉番禺書生有書生游番禺歷諸郡經山中見有氣高丈余如煙鄉人曰此岡子蛇吞象也遂告鄉里振鼓叫噪而蛇退入一岩谷中經宵鄉里人各持瓦瓮往見一象尚立而肌骨皆化為水遂針破取其水里人云此過海置舟中辟去蛟龍又有官人于南中見一大蛇長數丈徑可一尺五寸腹內有物如椓橛之類沿一樹食其葉腹中之物漸消無所有而里人云此蛇吞鹿此木葉能消之遂令從者采其葉收之歸后或食不消腹脹乃取其葉作湯飲之經宵及午不報及撤被視之唯殘枯骸余化為水矣郫縣民郫縣有民于南郭渠邊得一小蛇長尺余刳剔五髒盤而串之置于火焙之數日民家孩子數歲忽遍身腫赤皮膚炮破因自語曰汝家無狀殺我刳剔腹中胃置于火上且令汝兒知此痛苦民家聞之惊異取蛇拔去剷竹以水洒之焚香祈謝送于舊所良久蜿蜒而去兒亦平愈焉游邵汝州魯山縣所治即元魏時西廣州也今子城東南有妖神祠其前庭廣袤數百步古老云當時大球場也正門左右雙槐各二十圍枝干扶疏亦云當時植焉至中和初歲釁起東夏郡邑騷然刺史游邵許將也令屬縣伐木為柵以自固雖桑柘梓檟靡有孑遺將伐雙槐其夕有巨蟒蟠于上聲若震霆目若飛星鎮將李璠主其事璠武人也聞之以為妖且率徒親斬之下斧而流血雨迸腥氣薄人亦心動而止雙槐至今尚存成汭荊州節度使成汭領蔡州軍戍江陵為節度使張瑰謀害之遂棄本都奔于秭歸一夜為巨蛇繞身幾至于殞乃曰苟有所負死生唯命逡巡蛇亦亡去邇后招緝戶口訓練士卒移鎮渚宮尋受節旄撫綏凋殘勵精為理初年居民唯一十七家末年至萬戶勤王奉國通商務農有足稱焉朝廷號北韓南郭孫光憲孫光憲曾行次敘谷宿于神山見岭上板屋中以木根為巨虺前列香燈因詰店叟彼何神也叟曰光化中楊守亮鎮褒日有一蛇橫此岭路高七八尺莫知其首尾四面小蛇翼之無數每一拖身即林木摧折殆旬半方過盡阻絕行旅因聚草焚燎路隅慮其遺毒然后方行明年楊伏誅朱漢賓梁貞明中朱漢賓鎮安祿之初忽一日曙色才辨有大蛇見于城之西南首枕大城尾拖于壕南岸土地廟中其魁可大如五斗器雙目如電呀巨吻以瞰于城其身不翅百尺粗可數圍跨于羊馬之堞兼壕池之上其余尚蟠于廟垣之內有宿城軍校卒然遇之大呼一聲失魂而逝一州惱懼莫知其由來年淮寇非時而至圍城攻討數日不破而返豈神祇之先告歟牛存節梁牛存節鎮鄆州于子城西南角大興一第因板筑穿地得蛇一穴大小無數存節命殺之載于野外十數車載之方盡時有人云此蛇藪也是歲存節疽背而薨水清池太原屬邑有水清池本府祈禱雨澤及投龍之所也后唐庄宗未過河南時就郡捕獵就池卓帳為憩宿之所忽見巨蛇數頭自洞穴中出皆入池中良久有一蛇紅白色遙見可圍四尺以來其長稱是獵卒齊彀弩連發射之而斃四山火光池中魚鱉咸死浮在水上獵夫輩共刲剝食之其肉甚美庄宗尋知之于時諂事者以為克梁之兆有五台僧曰吾王宜速過河決戰將來梁祚其能久乎此亦斷白蛇之類也王思同后唐少帝朝清泰王起于岐陽朝廷詔西京留守王思同統禁旅征之王師西出之后尋聞劘壘雍京僚屬日登西樓望其捷書忽一日官僚憑檻西向見羊馬城上有二大蛇東西以首相向為從者輩遙擲彈丸以警之于時一人擲中東蛇之腦蜿蜒然墮于牆下挺然不動使人視之已卒矣其西蛇徐徐入于穴巢之間識者竊議之曰潞王乙巳生統帥王公亦乙巳生俱為蛇相今東蛇中腦而卒豈非王師不利乎未逾旬日群帥叛歸潞王思同腹心都將王彥暉已下并投岐城納款同單馬而遁竟沒于王事焉蛇亡之兆得不明乎徐坦清泰末有徐坦應進士舉下第南游渚宮因之峽州尋訪故舊旅次富堆山下有古店是夜憩琴書訖忽見一樵夫形貌枯瘠似有哀慘之容坦遂詰其由樵夫濡瞍而答曰某比是此山居人姓李名孤竹有妻先遘沈痾歷年不愈昨因入山采木經再宿未返其妻身形忽變恐人惊悸謂鄰母曰我之身已變矣請為報夫知之及歸語曰我已弗堪也唯尸在焉請君托鄰人舁我置在山口為幸如其言遷至于彼逡巡忽聞如大風雨聲眾人皆懼之又言曰至時速回慎勿返顧遂敘訣別之恨俄見群山中有大蛇無數競湊其妻妻遂下床伸而复曲化為一蟒與群蛇相接而去仍于大石上捽其首迸碎在地至今有蛇種李氏在焉張氏王蜀時杜判官妻張氏士流之子與杜齊體數十年誕育一子壽過六旬而殂歿洎殯于家累旬后方窆于外啟攢之際覺其秘器搖動謂其還魂剖而視之見化作大蛇蟠蜿屈曲骨肉奔散俄頃徐徐入林莽而去又興元靜明寺尼曰王三姑亦于棺中化為大蛇其杜妻即晚年不敬其夫老病視聽步履皆不任持張氏顧之若犬彘凍餒而卒人以為化蛇其應也顧遂郎中顧遂嘗密話其先人嘗宰公安罷秩后僑寄于縣側荊江之壖四面多林木蘆荻月夜未寢徐步出門見一條物巨如椽橫于地謂是門關舉足踢之其物應足而起自胸背至于腰下纏繳數十匝仆于地懵無所知其家訝其深夜不歸使人看之見腰間皎晶而明來往碣于地上逼而視之見大蛇纏其身解之不可于是取利刃斷其蛇一段段置于地彎彎然不展繳勒悶絕因而失喑旬日而卒瞿塘峽有人游于瞿塘峽時冬月草木乾枯有野火燎其峰巒連山跨谷紅焰照天忽聞岩崖之間若大石崩墜輷磕然有聲遂駐足伺之見一物圓如大囷碣至平地莫知其何物也細而看之乃是一蛇也遂剖而驗之乃蛇吞一鹿在于腹內野火燒然墮于山下所謂巴蛇吞象信而有之靳老恒州井陘縣丰隆山西北長谷中有毒蛇据之能傷人里民莫敢至其所采藥人靳四翁入北山忽聞風雨聲乃上一孤石望之見一條白蛇從東而來可長三丈急上一樹蟠在西南枝上垂頭而歇須臾有一物如盤許大似蝦蟆色如煙熏褐土色四足而跳至蛇蟠樹下仰視蛇垂頭而死自是蛇妖不作前灃州有鶤鵊雛為蛇所吞有物如蝦蟆吐白氣直沖墜而致死得非靳老所見之物乎凡毒物必有能制者殆天意也景煥景煥為壁州白石縣令行陟巴岭峻險萬仞約七八程達玉女廟或有巨虺橫亙其前徑可七八尺鱗甲不啻開扇許大頭尾垂在山下唯聞折木震響山谷童仆輩盡股栗惊駭莫能前進于是旦駐山穴因登高望之竟目方見其尾欲謂之龍龍之行動必有風雨隨之其日晴明方見是蛇也因知吞舟之魚翳天之鳥虫禽之絕大者信有之焉舒州人舒州有人入灊山見大蛇擊殺之視之有足甚以為異因負之出將以示人遇縣吏數人于路因告之曰我殺此蛇而有四足吏皆不見曰爾何在曰在爾前何故不見即棄蛇于地乃見之于是負此蛇者皆不見人以為怪乃棄之案此蛇生不自隱其形死乃能隱人之形此理有不可窮者賈潭偽吳兵部尚書賈潭言其所知為岭南節度使獲一桔其大如升將表上之監軍中使以為非常物不可輕進因取針微刺其蒂下乃蠕而動命破之中有小赤蛇長數寸姚景偽吳壽州節度使姚景為兒時事濠州節度使劉金給使廄中金嘗卒行至廄見景方寢有二小赤蛇戲于景面出入兩鼻中良久景寤蛇乃不見金由是驟加寵擢妻之以女卒至大官王稔偽吳壽州節度使王稔罷歸揚都為統軍坐廳事與客語忽有小赤蛇自屋墜地向稔而蟠稔令以器覆之良久發視唯一蝙蝠飛去其年稔加平章事安陸人安陸人姓毛善食毒蛇以酒吞之嘗游齊安遂至豫章恒弄蛇于市以乞丐為事積十余年有賣薪者自鄱陽來宿黃倍山下夢老父云為我寄一蛇與江西弄蛇毛生也乃至豫章觀步門賣薪將盡有蛇蒼白色盤于船中触之不動薪者方省向夢即攜之至市訪毛生因以與之毛始欲振撥應手嚙其乳毛失聲顛仆遂卒食久即腐坏蛇亦不知所在焉
