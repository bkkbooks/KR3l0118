body:
  text: 皇甫恂皇甫恂字君和開元中授華州參軍暴亡其魂神若在長衢路中夾道多槐樹見數吏擁篲恂問之答曰五道將軍常於此息馬恂方悟死耳嗟歎而行忽有黃衣吏數人執符言天曹追遂驅迫至一處門闕甚崇似上東門又有一門似尚書省門門衛極眾方引入一吏曰公有官須別通且伺務隙耳恂拱立候之須臾見街中人驚矍辟易俄見東來數百騎戈矛前驅恂匿身牆門以窺漸近見一老姥擁大蓋策四馬從騎甚眾恂細視之乃其親叔母薛氏也恂遂趨出拜伏自言姓名姥駐馬問恂是何人都不省記恂即稱小名姥乃喜曰汝安得來此恂以實對姥曰子姪中惟爾福最隆來當誤爾且吾近充職務苦驅馳汝就府相見也言畢遂過逡巡判官務隙命入見一衣冠昂然與之承迎恂哀祈之謂恂曰足下陽中有功德否恂對曰有之俛而笑曰此非妄語之所顧左右曰喚閹割家來恂甚惶懼忽聞疾報聲王有使者來判官遽趨出拜受命恂窺之見一閹人傳命畢方去判官拜送門外却入謂恂向來大使有命言足下未合來所司誤耳足下自見大使便可歸也數吏引去西行三四里至一府郡旌旗擁門恂被命入仰視乃見叔母據大殿命上令坐恂俯伏而坐羽衛森然旁有一僧趺寶座二童子侍側恂亦理揖叔母方敘平生委曲親族誨恂以仁義之道陳報應之事乃曰兒豈不聞地獄乎此則其所也須一觀之叔母顧白僧願導引此兒僧遂整衣而命恂從我恂隨後行比一二里遙望黑風自上屬下煙漲不見其際中有黑城飛焰赫然漸近其城其黑氣即自去和尚丈餘而開至城門即自啟其始入也見左右罪人初剝皮吮血砍刺糜碎其叫呼怨痛宛轉其間莫究其數楚毒之聲動地恂震怖不安求還又北望一門熾然炎火和尚指曰此無間門也言訖欲歸忽聞火中一人呼恂恂視之見一僧坐鐵牀頭上有鐵釘釘其腦流血至地細視之是恂門徒僧胡辨也驚問之僧曰生平與人及公飲酒食肉今日之事自悔何階君今隨和尚必當多福幸垂救曰何以奉救僧曰寫金光明經一部及於都市為造石幢某方得作畜牲耳恂悲而諾之遂迴至殿具言悉見叔母曰努力為善自不至是又曰兒要知官爵否恂曰願知之俄有黃衣抱案來敕于廡下發視之見京官至多又一節言太府卿貶綿州刺史其後掩之吏曰不合知矣遂令二人送恂歸再拜而出出門後問二吏姓氏一姓焦一姓王相與西行十餘里有一羊三足截路吼噉罵恂曰我待爾久矣何為割我一腳恂實不省且問之羊曰君某年日向某縣縣尉廳上誇能割羊腳其時無羊少府打屠伯屠伯活割我一腳將去我自此而斃吾由爾而夭恂方省之乃卑詞以謝託以屠者自明焦王二吏亦同解紛羊當路立恂不得去乃謝曰與爾造功德可乎羊曰速為我寫金剛經許之羊遂喜而去二吏又曰幸得奉送亦須得同幸惠各乞一卷並許之更行里餘二吏曰某只合送至此郎君自尋此逕更一二里有一賣漿店店旁斜路百步已下則到家矣遂別去恂獨行苦困渴果至一店店有水甕不見人恂竊取漿飲忽有一老翁大叫怒持刀以趁罵云盜飲我漿恂大懼却走翁甚疾來恂反顧忽陷坑中怳然遂活而殮棺中死已五六日既而妻覺有變發視之緜緜有氣久而能言令急寫三卷金剛經其夜忽聞敲門聲時有風欻欻然空中朗言曰焦某王某蒙君功德今得生天矣舉家聞之更月餘胡辨師自京來恂異之而不復與飲其僧甚恨恂於靜處略為說冥中見師如此師輒不為之信既而去至信州忽患頂瘡宿昔潰爛困篤僧曰恂言其神乎數日而卒恂因為石中造石幢幢工始畢其日市中豕生六子一白色自詣幢環遶數日疲困而卒今幢見存焉恂後果為太府卿貶緜州刺史而卒衛庭訓河南人累舉不第天寶初乃以琴酒為事凡飲皆敬酬之恒遊東市遇友人飲於酒肆一日偶值一舉人相得甚歡乃邀與之飲庭訓復酬此人昏然而醉庭訓曰君未飲何醉也曰吾非人乃華原梓桐神也昨日從酒肆過已醉君之酒故今日訪君適醉者亦感君之志今當歸廟他日有所不及宜相訪也言訖而去後旬日乃訪之至廟神已令二使迎庭訓入廟庭訓欲拜神曰某年少請為弟神遂拜庭訓為兄為設酒食歌舞既夕而歸來日復詣告之以貧神顧謂左右看華原縣下有富人命衰者可收生魂來鬼徧索之其縣令妻韋氏衰乃收其魂掩其心韋氏忽心痛殆絕神謂庭訓曰可往得二百千與療庭訓乃歸主人自署云解醫心痛令召之庭訓入神教求二百千令許之庭訓投藥即愈如故兒女忻忭令亦喜奉錢為宴飲自爾無日不醉主人諭之曰君當隱貧窘何苦使用不節乎庭訓曰但有梓桐神在何苦貧也主人以告令令召問之具以實告令怒逐庭訓而焚梓桐神廟庭訓夜宿村店忽見梓桐神來曰非兄之過乃弟合衰弟今往濯錦江立廟極盛於此可詣彼也言訖不見庭訓又往濯錦江果見新廟神見夢於鄉人可請衛秀才為廟祝明日鄉人請留之歲暮神謂庭訓曰吾將至天曹為兄問祿壽去數日歸謂庭訓曰兄來歲合成名官至涇陽主簿秩不滿有人迎充判官於是神置酒餞之至京明年果成名釋褐授涇陽縣主簿在任二載分務閒暇獨立廳事有一黃衫吏持書而入拜曰天曹奉命為判官遂卒於是夕韋秀莊開元中滑州刺史韋秀莊暇日來城樓望黃河樓中忽見一人長三尺許紫衣朱冠通名參謁秀莊知非人類問是何神答曰即城隍之主又問何來答云黃河之神欲毀我城以端河路我固不許剋後五日大戰於河湄恐力不禁故來求救于使君爾若得二千人持弓弩物色相助必當克捷君之城也惟君圖之秀莊許諾神乃不見至其日秀莊帥勁卒二千人登城河中忽爾晦冥須臾有白氣直上十餘丈樓上有青氣出相縈繞秀莊命弓弩亂射白氣氣形漸小至滅唯青氣獨存逶迤如雲峰之狀還入樓中初時黃河俯近城之下此後漸退至今五六里也華嶽神女近代有士人應舉之京途次關西宿於逆旅舍小房中俄有貴人奴僕數人云公主來宿以幕圍店及他店四五所人初惶遽未得移徙須臾公主車聲大至悉下店中人便拒戶寢不敢出公主於戶前澡浴令索房內婢云不宜有人既而見某群婢大罵公主令呼出熟視之曰此書生頗開人意不宜挫辱第令入房浴畢召之言甚會意使侍婢洗濯舒以麗服乃施絳帳鋪錦茵及他寢玩之具極世奢侈為禮之好明日相與還京公主宅在懷遠里內外奴婢數百人榮華盛貴當時莫比家人呼某為駙馬出入器服車馬不殊王公某有父母在其故宅公主令婢詣宅起居送錢億貫他物稱是某家因資鬱為榮貴如是七歲生二子一女公主忽言欲為之娶婦某甚愕怪有此語主云我本非人不合久為君婦君亦當業有婚媾知非恩愛之替也其後亦更別婚而往來不絕婚家以其一往輒數日不還使人候之見某恒入廢宅恐為鬼神所魅他日飲之致醉乃命術士書符施衣服中及其形體皆遍某後復適公主家令家人出止之不令入某初不了其故倚門惆悵公主尋出門下大相責讓云君素貧士我相抬舉今為貴人此亦與君不薄何故使婦家書符相間以我不能為殺君也某視其身方知有符求謝甚至公主云吾亦諒君此情然符命已行勢不得住悉呼兒女令與父訣某涕泣哽咽公主命左右促裝即日出城某問其居兼求名氏公主云我華嶽第三女也言畢訣去出門不見王僩王僩者少應通事舍人舉開元末入京至闕西息槐樹下聞傳詔聲忽見數騎狀如中使謂僩曰為所宣傳真通事舍人矣因以後騎載僩僩亦不知何人倉卒隨去久之至華嶽神廟中使置僩別院誡云慎無私視便爾入內僩獨坐聞棒杖楚痛之聲因前行竊窺見其婦為所由繫頸於樹以棒拷擊僩悲愁佇立中使出見慘怛而問其故僩涕泗具言其事使云本欲留君妻既死理不可住若更遲延待歸之後即不能救君宜速還開棺此即放妻活乃命左右取驛馬送王舍人俄見一狐來僩不得已騎狐而騁其疾如風兩日至舍騎狐乃其魂也僩本身自魂出之後失音不言魂既至家家人悲泣僩命開棺其妻已活謂僩曰何以至耶舉家歡悅後旬日本身方至外傳云王郎歸失音已十餘日魂云王郎至矣出門迎往遂與其魂相合焉
