body:
  text: 龐嚴龐嚴唐京兆尹龐嚴為衢州刺史到郡數月忽夢二僧入寢門嚴不信釋氏夢中呵之僧曰使君莫怒余有先知故來相告耳嚴喜聞之乃問曰余為相乎曰無有節制乎曰無然則當為何官曰類廉察而無兵權有土地而不出畿內過此已往吾非所知也曰然壽幾何曰惜哉所乏者壽向使有壽則何求不可曰何日當去此曰來年五月二十二日及明年春有除替先以狀請於廉使愿得使下相待時廉使愿得九字原本無據明鈔本補元稹素與嚴善必就謂得請行有日矣其月晦日因宴元公復書云請俟交割嚴發書曰吾固知未可以去具言其夢於座中竟以五月二十二日發其後為京兆尹而卒出前定錄張正矩祕書監劉禹錫其子咸允久在舉場無成禹錫憤惋宦途又愛咸允甚切比歸闕以情訴於朝賢太和四年故吏部崔群與禹錫深於素分見禹錫蹭蹬如此尤欲推輓咸允其秋群門生張正謨充京兆府試官群特為禹錫召正謨面以咸允託之覬首選焉及牓出咸允名甚居下群怒之戒門人曰張正謨來更不要通正謨兄正矩前河中參軍應書判拔萃其時群總科目人考官糊名考訖群讀正矩判心竊推許又謂是故工部尚書正甫之弟斷意便與奏及敕下正矩與科目人謝主司獨正矩啟敘前致詞曰某殺身無地以報相公深恩一門之內兄弟二人俱受科名拔擢粉骨臠肉無以上答方泣下語未終群忽悟是正謨之兄弟勃然曰公是張正謨之兄爾賢弟大無良把群販名豈有如此事與賊何異公之登科命也非某本意更謝何為出續定命錄劉遵古故刑部尚書沛國劉遵古大和四年節度東蜀軍先是蜀人有富蓄群書劉既至嘗假其數百篇然未盡詳閱明年夏涪江大汎突入壁壘潰里中廬舍歷數日水勢始平而劉之圖書器玩盡為暴水濡污劉始命列於庭以曝之後數日劉於群書中得周易正義一軸筆勢奇妙字體稍古蓋非近代之書也其卷末有題云上元二年三月十一日因讀周易著此正義從茲易號十二三歲至一人八千口當有大水漂溺因得舒轉曬曝衡陽道士李德初劉閱其題歎且久窮其所自乃蜀人所蓄之書也於是召賓掾以視之所謂易號十二三歲至一人八千口者一人八千口蓋大和字也自上元歷寶應廣德永泰大曆建中興元貞元永貞元和長慶寶曆至大和凡更号十有三矣與其記果相契然不知李德初何人耳抑非假其名以示於後乎出宣室志舒元輿李太尉在中書舒元輿自侍御史辭歸東都遷奉奉字原本闕據明鈔本補太尉言近有僧自東來云有一地葬之必至極位何妨取此元輿辭以家貧不辦別覔遂歸啟護他日僧又經過復謂太尉曰前時地已有人用之矣詢之乃元輿也元輿自刑部侍郎平章事出感定錄李德裕李德裕自潤州年五十四除揚州五十八再入相皆及吉甫之年縉紳榮之出感定錄德裕為太子少傅分司東都時嘗聞一僧善知人禍福因召之僧曰公災未已當南行萬里德裕甚不樂明日復召之僧且曰慮言之未審請結壇三日又曰公南行之期定矣德裕曰師言以何為驗僧即指其地此下有石函即命發之果得焉然啟無所覩德裕重之且問南行還乎曰公食羊萬口有五百未滿必當還矣德裕歎曰師實至人我於元和中為北部從事嘗夢行至晉山盡目皆羊有牧者數十謂我曰此侍御食羊也嘗誌此夢不泄於人今知冥數固不誣矣後旬餘靈武帥送本書卷九八引宣室志李德裕條無送字米暨饋羊五百大驚召僧告其事且欲還之僧曰羊至此是已為相國有矣還之無益南行其不返乎俄相次貶降至崖州掾竟終於貶所時年六十三出補錄記傳李言有進士李嶽連舉不第夜夢人謂曰頭上有山何以得上第及覺不可名獄遂更名言果中第出感定錄王沐王沐者涯之再從弟也家於江南老且窮以涯執相權遂跨蹇驢而至京師索米僦舍住三十日始得一見涯於門屏所望不過一簿一尉耳而涯見沐潦倒無雁序情大和九年秋沐方說涯之嬖奴以導所欲涯始一召擬許以微官處焉自是旦夕造涯之門以俟其命及涯就誅仇士良收捕家人時沐方在涯私第謂其王氏之黨遂不免於腰領出杜陽雜編舒元謙元輿之族聰敏慧悟富有春秋元輿禮遇頗至十年元輿處之猶子薦取明經第官歷校書郎及持持原作時據杜陽雜編中改相印許為曹郎命之無何忽以非過怒謙至朔旦伏謁頓不能見由是日加譴責為僮僕輕易謙既不自安遂置書於門下辭往江表而元輿亦不問翌日辦裝出長安咨嗟蹇分惆悵自失即駐馬迴望涕泗漣如及昭應聞元輿之禍方始釋然是時於宰相宅收捕家口不問親疏並皆誅戮之當時論者以王舒禍福之異定分焉出杜陽雜編杜悰外生杜悰與李德裕同在中書他日德裕謂悰曰公家有異人何不遣一相訪悰曰無德裕曰試思之曰但有外生自遠來求官爾德裕曰此是也及歸遣謁德裕德裕問之對曰太尉位極人臣何須問也凡人細微尚有定分況功勳爵祿乎且明日午時有白獸自南踰屋而來有小童丱角衣紫年七歲執竹竿長五尺九節驅獸獸復南往小童非宅內人也試伺之翌日及午果有白貓自南踰屋而來有丱角小童衣紫逐之貓復南去乃召問之曰年七歲數其所執竹長五尺而九節童乃宅外元從之子也略無毫髮差謬事無大小皆前定矣出聞其錄石雄石雄初與康詵同為徐州帥王智興首校王公忌二人驍勇奏守本官雄則許州司馬也尋授石州刺史有李弘約者以石使君許下之日曾負弘約資貨累自窘索後詣石州求其本物既入石州境弘約遲疑恐石怒遇里有神祠祈享皆謂其靈弘約乃虔啟於神神祝父子俱稱神下索紙筆命弘約書之又不識文字求得村童口占之曰石使君此去當有重臣抽擢而立武功合為河陽鳳翔節度復有一官失望所以此事須秘密不得異耳聞之弘約以巫祝之言先白石君石君相見甚悅尋以潞州劉從諫背叛朝廷議欲討伐李德裕為宰相而亟用雄雄奮武力奪得天井關後共劉振又破黑山諸蕃部落走南單于迎公主歸國皆雄之效也然是鷹犬之功非良宰不能驅馳者及李公以太子少保分洛石僕射詣中書論官曰雄立天井關及黑山之功以兩地之勞更希一鎮養老相府曰僕射潞州之功國家已酬河陽節度使西塞之績又拜鳳翔在兩鎮之重豈不為酬賞也石乃復為左右統軍不愜其望悉如巫者之方德裕謫潮州有客復陳石雄神祇之驗明其盛衰有數稍抑其一鬱矣出雲溪友議又會昌四年劉稹敗當從諫時有一人稱石雄七千人至從諫戮之至是石雄果七千人入潞州出感定錄賈島賈島字浪仙元和中元白尚輕淺島獨變格入僻以矯艷雖行坐寢食吟詠不輟嘗跨驢張蓋橫截天街時秋風正厲黃葉可掃島忽吟曰落葉滿長安求聯句不可得因搪突大京兆劉栖楚被繫一夕而釋之又嘗遇武宗皇帝於定水精舍島尤肆侮慢上訝之他日有中旨令與一官謫去特授長江縣尉稍遷普州司倉而終出摭言崔潔太府卿崔公名潔在長安與進士陳彤同往街西尋親故陳君有他見知崔公不信將出陳君曰當與足下於裴令公亭飧鱠崔公不信之笑不應過天門街偶逢賣魚甚鮮崔公都忘陳君之言曰此去亦是閑人事何如吃鱠遂令從者取錢買魚得十斤曰何處去得左右曰裴令公亭子甚近乃先遣人計會及昇亭下馬方悟陳君之說崔公大驚曰何處得人斫鱠陳君曰但假刀砧之類當有第一部樂人來俄頃紫衣三四人至亭子遊看一人見魚曰極是珍鮮二君莫欲作鱠否某善此藝與郎君設手詰之乃梨園第一部樂徒也餘者悉去此人遂解衣操刀極能敏妙鱠將辦陳君曰此鱠與崔兄飧紫衣不得鱠也既畢忽有使人呼曰駕幸龍首池喚第一部音聲切者攜衫帶望門而走亦不暇言別崔公甚歎異之兩人既飧陳君又曰少頃有東南三千里外九品官來此得半碗清羹喫語未訖延陵縣尉李耿至將赴任與崔公中外親舊探知在裴令公亭子故來告辭方喫食羹次崔公曰有膾否左右報已盡只有清羹少許公大笑曰令取來與少府啜乃喫清羹半碗而去延陵尉乃九品官也食物之微冥路已定況大者乎出逸史
