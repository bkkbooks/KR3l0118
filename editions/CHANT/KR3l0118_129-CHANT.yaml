body:
  text: 王濟婢王濟婢晉王濟侍者常於闈中就婢取濟衣物婢遂欲姦之其人云不敢婢言若不從我我當大叫此人卒不肯婢遂呼云某甲欲姦我濟即令殺之此人具陳說濟不信故牽將去顧謂濟曰枉不可受要當訟府君於天濟乃病忽見此人語之曰前具告實既不見理便應去濟數日而死出還冤記王範妾晉富陽縣令王範妾桃英殊有姿色遂與閣下丁豐史華期二人姦通範當出行不還帳內督孫元弼聞丁豐戶中有環珮聲覘視見桃英與同被而臥無弼扣戶叱之桃英即起攬裙理髮躡履還內元弼又見華期帶佩桃英麝香二人懼元弼告之乃共謗元弼與桃英有私範不辯察遂殺元弼有陳超者當時在座勸成元弼罪後範代還超亦出都看範行至赤亭山下值雷雨日暮忽然有人扶超腋逕曳將去入荒澤中雷光照見一鬼面甚青黑眼無瞳子曰吾孫元弼也訴怨皇天早見申理連時候汝乃今相遇超叩頭流血鬼曰王範既為事主當先殺之賈景伯孫文度在泰山玄堂下共定死生名錄桃英魂魄亦取在女青亭至天明失鬼所在超至楊都詣範未敢謝之便見鬼從外來逕入範帳至夜範始眠忽然大魘連呼不醒家人牽青牛臨範上並加桃人左索向明小蘇十數日而死妾亦暴亡超乃逃走長干寺易姓名為何規後五年二月三日臨水酒酣超云今當不復畏此鬼也低頭便見鬼影已在水中以手博超鼻血大出可一升許數日而死出冥報志明鈔本作出還冤記宋宮人宋少帝子業常使婦人裸形相逐有一女子不從命斬之其夜夢有一女子罵曰汝悖逆明年不及熟矣帝怒於宮中求得似夢見者斬之其夕復夢所戮者曰汝枉殺我我已訴上帝集群巫與六宮捕鬼帝尋被弒出廣古今五行記金荊後魏末嵩陽杜昌妻柳氏甚妒有婢金荊昌沐令理髮柳氏截其雙指無何柳被狐刺螫指雙落又有一婢名玉蓮能唱歌昌愛而歎其善柳氏乃截其舌後柳氏舌瘡爛事急就稠禪師懺悔禪師已先知謂柳氏曰夫人為妒前截婢指已失指又截婢舌今又合斷舌悔過至心乃可以免柳氏頂禮求哀經七日禪師大張口咒之有二蛇從口出一尺以上急咒之遂落地舌亦平復自是不復妒矣出朝野僉載杜嶷妾梁襄陽杜嶷新納一妾年貌兼美寵愛特甚妾得其父書倚簾讀之嶷外還而妾自以新來羞以此事聞嶷因嚼吞之嶷謂是情人所寄遂命剖腹取書妾氣未斷而書已出嶷看訖歎曰吾不自意忽忽如此傷天下和氣其能久乎其夜見妾訴冤嶷旬日而死出廣古今五行記後周女子後周宣帝在東宮時武帝訓督甚嚴恒使宦者成慎監察之若有纖毫罪失而不奏慎當死於是慎常陳太子不法之事武帝杖之百餘及即位顧見髀上杖瘢問及慎所在慎于時已出為郡遂敕追之至便賜死慎奮厲曰此是汝父為成慎何罪悖逆之餘濫以見及鬼若有知終不相放於時宮掖禁忌相逢以目不得轉共言笑分置監官記錄愆罪左皇后下有女子欠伸淚出因被劾謂有所思奏使敕拷訊之初擊其頭帝便頭痛更擊之亦然遂大發怒曰此冤家耳乃使拉折其腰帝復腰痛其夜出南宮病漸重明旦還腰痛不得乘馬御車而歸所殺女子之處有黑暈如人形時謂是血隨刷之旋復如故如此再三有司掘除舊地以新土填之一宿之間如故因此七八日舉身瘡爛而崩及初下屍諸跼腳床牢不可脫唯此女子所引明鈔本引作臥之床獨是直腳遂以供用蓋亦鬼神之意焉帝崩去成慎死僅二十許日焉出還冤記張公瑾妾唐魏郡馬嘉運以貞觀六年正月居家日晚出大門忽見兩人各捉馬一匹先在門外樹下立嘉運問是何人答云東海公迎馬生耳嘉運素有學識知名州里每臺使及四方貴客多請見之及是弗復怪也謂使者曰吾無馬使者進馬嘉運即於樹下上馬而去其身倒臥於樹下也俄至一官曹將入大門有男女數十人門外如訟者有一婦人先與嘉運相識是同郡張公瑾妾姓元氏手執一紙文書迎謂嘉運曰馬生尚相識否昔張總管交某數相見總管無狀非理殺我我訴天曹於今三年為王天主救護公瑾故常見抑今乃得申官已追之不久將至疑我獨見枉害馬生那亦來耶嘉運先知元氏被殺及見方自知死使者引入門門者曰公眠未可謁宜可就霍司刑乃益州行臺郎中霍璋也見嘉運延坐曰此府記室官闕東海公聞君才學欲屈為此官耳嘉運曰貧守妻子不願為官得免幸甚璋曰若不能作自陳無學君當有相識可舉令作俄有人來云公眠已起引嘉運入見一人在廳事坐肥短黑色呼嘉運前謂曰聞君才學欲屈為記室耳能為之乎嘉運拜射曰幸甚但鄙夫田野頗以經業教授後生不足以當記室之任耳公曰識霍璋否答曰識之因使召璋問以嘉運才術璋曰平生知其經學不見作文章公曰誰有文章者嘉運曰有陳子良者解文章公曰放馬生歸即命追子良嘉運辭去璋與之別嘉運問曰向見張公瑾妾所言天主者為誰璋曰公瑾鄉人王五戒者死為天主常救公瑾故得至今今已不免矣言畢而別遣使者送嘉運至一小澀道指令由此路歸其年七月綿州人姓陳子良暴死經宿而蘇自言見東海公用為記室辭不識文字別有是人陳子良卒公瑾亦亡至貞觀中車駕在九成宮聞之使中書侍郎岑文本就問其事文本錄以奏云爾嘉運後為國子博士卒官出冥報記范略婢唐貞觀中濮陽范略妻任氏略先幸一婢任以刀截其耳鼻略不能制有頃任有娠誕一女無耳鼻女年漸大其婢仍在女問婢具說所由女悲泣以恨其母母深有媿色悔之無及出朝野僉載胡亮妾唐廣州化蒙縣丞胡亮從都督周仁軌討僚得一首領妾幸之將至縣亮向府不在妻賀氏乃燒釘烙其雙目妾遂自縊死後賀氏有娠產一蛇兩目無睛以問禪師師曰夫人曾燒釘烙一女婦眼以夫人性毒故為蛇報此是被烙女婦也夫人好養此蛇可以免難不然禍及身矣賀氏養蛇一二年漸大不見物唯在衣被中亮不知也發被見蛇大驚以刀砍殺之賀氏兩目俱枯不復見物悔無及焉出朝野僉載梁仁裕婢唐梁仁裕為驍衛將軍先幸一婢妻李氏甚妒而虐縛婢擊其腦婢號呼曰在下卑賤制不自由娘子鎖項苦毒何甚婢死後月餘李氏病常見婢來喚李氏頭上生四處癉疽腦潰晝夜鳴叫苦痛不勝數月而卒出朝野僉載張景先婢唐荊州枝江縣主簿夏榮判冥司縣丞張景先寵一婢其妻楊氏妒之景出使不在妻殺婢投之於廁景至紿之曰婢逃矣景以妻酷虐不問也婢訟之於榮榮追對之問景曰公夫人病困說形狀景疑其有私也怒之榮曰公夫人枉殺婢投於廁今見推勘公試問之景悟問其婦婦病甚具首其事榮令廁內取其骸骨香湯浴之厚加殯葬婢不肯放月餘日而卒出朝野僉載李訓妾唐左僕射韋安石女適太府主薄李訓訓未婚以前有一妾成親之後遂嫁之已易兩主女患傳屍瘦病恐妾厭禱之安石令河南令秦守一捉來榜掠楚苦竟以自誣前後決三百以上投井死不出三日其女遂亡時人咸以為冤魂之所致也安石坐貶蒲州太極元年八月卒出朝野僉載花嚴唐王弘冀州衡水人少無賴告密羅織善人曾遊河北趙定定原作具據明鈔本改見老人每年作邑齋遂告殺二百人授游擊將軍俄除侍御史時有告勝州都督王安仁者密差弘往推索大枷夾頸安仁不承伏遂於枷上斫安仁死便即脫之其男從軍亦擒而斬之至汾州與司馬毛公對食須臾喝下斬取首百姓震悚後坐誣枉流雷州將少姬花嚴素所寵也弘於舟中偽作敕追花嚴諫曰事勢如此何忍更為不軌乎弘怒曰此老嫗欲敗吾事縛其手足投之於江船人救得之弘又鞭二百而死埋於江上俄而偽敕發御史胡元禮推之錮身領迴至花嚴死處忽云花嚴來喚對事左右皆不見唯弘稱叩頭死罪如授枷棒之聲夜半而卒出朝野僉載晉陽人妾唐牛肅舅之尉晉陽也縣有人殺其妾將死言曰吾無罪為汝所殺必報後數年殺妾者夜半起至母寢門呼其母問故其人曰適夢為虎所嚙傷至甚遂死覺而心悸甚驚惡故啟之母曰人言夢死者反生夢想顛倒故也汝何憂然汝夜來未飯牛亟飯之其人曰唯闇中見物似牛之脫也前執之乃虎矣遂為所噬其人號叫竟死虎既殺其人乃入院至其房而處其床若寢者其家伺其寢則閉鎖其門而白於府季休光為留守則使取之取者登焉破其屋攢矛以刺之乃死舅方為留守判官得其頭漆之為枕至今時人以虎為所殺之妾也出紀聞
