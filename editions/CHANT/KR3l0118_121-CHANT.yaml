body:
  text: 杜通達杜通達唐齊州高苑人杜通達貞觀年中縣承命令送一僧向北縣承命句明鈔本作常夜有一僧求宿通達見僧經箱謂意其中是絲絹乃與妻共計擊僧殺之僧未死聞誦咒三兩句遂有一蠅飛入其鼻久悶不出通達眼鼻遽喎眉鬢即落迷惑失道精神沮喪未幾之間便遇惡疾不經一年而死臨終之際蠅遂飛出還入妻鼻其妻得病歲餘復卒出法苑珠林邢文宗唐河間邢文宗家接幽燕稟性麤險貞觀年中忽遇惡風疾旬日之間眉鬢落盡於後就寺歸懺自云近者向幽州路逢一客將絹十餘匹迥澤無人因即劫殺此人云將向房州欲買經紙終不得免少間屬一老僧復欲南去遇文宗懼事發覺揮刀擬僧僧叩頭曰乞存性命誓願終身不言文宗殺之棄之草間經二十餘日行還過僧死處時當暑月疑皆爛壞試往視之儼若生日文宗因以馬下策築僧之口口出一蠅飛鳴清徹直入宗鼻久悶不出因得大病歲餘而死長孫無忌唐趙公長孫無忌奏別敕長流以為永例後趙公犯事敕長流嶺南至死不復迴此亦為法之弊出朝野僉載婁師德婁師德以殿中充河源軍使唐永和中破吐蕃於白羊澗八縱七捷優制褒美授左驍騎明鈔本騎作衛郎將高宗手詔曰卿有文武才幹故授卿武職勿辭也累遷納言臨終數日寢興不安無故驚曰撫我背者誰侍者曰無所見乃獨言以有所爭者曰我當壽八十今追我何也復自言為官誤殺二人減十年詞氣若有屈伏俄而氣絕以婁公之明恕尚不免濫為政得不慎之歟出大唐新語王瑱唐冀州刺史王瑱性酷烈時有敕使至州瑱與使語武彊縣尉藺獎曰日過移就陰處瑱怒令典獄撲之項骨折而死至明日獄典當州門限垂腳坐門扇無故自發打雙腳脛俱折瑱病見獎來起自以酒食求之不許瑱惡之迴面向梁獎在屋樑旬日而死出朝野僉載江融唐左使江融耿介正直揚州徐敬業反被羅織酷吏周興等枉奏殺之斬於東都都亭驛前融將被誅請奏事引見興曰囚何得奏事融怒叱之曰吾無罪枉戮死不捨汝遂斬之尸乃激揚而起蹭蹬十餘步行刑者踏倒還起坐如此者三乃絕雖斷其頭似怒不息無何周興死出朝野僉載李昭德唐鳳閣侍郎李昭德威權在己宣出一敕云自今已後公坐徒私坐流經恩百日不首依法科罪昭德先受孫萬榮賄財奏與三品後萬榮據營州反貨求事敗頻經恩赦以百日不首准贓斷絞出朝野僉載弓嗣業唐洛州司馬弓嗣業洛陽令張嗣明造大枷長六尺闊四尺厚五寸倚前人莫之犯後嗣明及嗣業資遣逆賊徐真北投突厥事敗業等自著此枷百姓快之也出朝野僉載周興唐秋官侍郎周興與來俊臣對推事俊臣別奉奉原本作奏據明鈔本改進止鞫興興不之知也及同食謂興曰囚多不肯承若為作法興曰甚易也取大甕以炭四面炙之令囚人處之其中何事不吐即索大甕以火圍之起謂興曰有內狀勘老兄請兄入此甕興惶恐叩頭咸即款伏斷死放流嶺南所破人家流者甚多為仇家所殺傳曰多行無禮必自及信哉出朝野僉載魚思咺唐魚思咺有沈思極巧上欲造匭召工匠無人作得者咺應制為之甚合規矩遂用之無何有人投匭言咺云徐敬業在揚州反咺為敬業作刀輪以衝陣殺傷官軍甚眾推問具承誅之為法自斃乃至於此出朝野僉載索元禮唐索元禮為鐵籠頭以訊囚後坐贓賄不承使人曰取公鐵籠頭禮即承伏出朝野僉載張楚金唐張楚金為秋官侍郎奏反逆人持持明鈔本作特下同敕免死家口即絞斬及配沒入官為奴婢等並入律後楚金被羅織反持敕免死男子十五以上斬妻子配沒識者曰為法自斃所謂交報也出朝野僉載崔日知唐京兆尹崔日知處分長安萬年及諸縣左降流移人不許暫停有違晷刻所由決杖無何日知貶歙縣丞被縣家催求與妻子別不得出朝野僉載蘇頲唐尚書蘇頲少時有人相之云當至尚書位終二品後至尚書三品病亟呼巫覡視之巫云公命盡不可復起頲因復論相者之言巫云公初實然由作桂府時殺二人今此二人地下訴公所司減二年壽以此不至二品頲夙蒞桂州有二吏訴縣令頲為令殺吏乃嗟歎久之而死出廣異記李之唐王悅為唐昌令殺錄事李之而不辜之既死長子作靈語曰王悅不道枉殺予予必報其聲甚厲經數日悅晝坐廳事忽拳毆其腰聞者殷然驚顧無人既暮擊處微腫焉且痛其日李之男又言曰吾已擊王悅正中要害處即當殺之悅疾甚則至蜀郡謁醫不愈未死之前日李之命其家造數人饌仍言曰吾與客三人至蜀郡錄王悅食畢當行明日而悅死悅腫潰處正當右腎即李之所為也出紀聞唐王皇后唐惠妃武氏有專房之寵將謀奪嫡王皇后性妒稍不能平玄宗乃廢后為庶人膚受日聞及太子之廢也玄宗訪於張九齡對曰太子天下本也動之則搖人心太子原本太子作九齡據明鈔本改自居東宮未聞大惡臣聞父子之道天性也子有過父恕而掩之無宜廢絕且其惡狀未著恐外人窺之傷陛下慈父之道玄宗不悅隱忍久之李林甫等秉政陰中計於武妃將立其子以自固武妃亦結之乃先黜九齡而廢太子太子同生鄂王瑤光王琚同日拼命海內痛之號為三庶太子既冤武氏及左右屢見為祟宮中終夜相恐或聞鬼聲叫笑召覡巫視之皆曰三庶為厲先是收鄂王光王行刑者射而瘞之乃命改葬祝而酹之武妃死其厲乃息玄宗乃立肅宗為太子林甫之計不行惕然懼矣三庶人以二十五年四月二十二日死武妃至十二月而甍識者知有神通焉出大唐新語楊慎矜唐監察禦史王掄為朔方節度判官乘驛在途暴卒而顏色不變猶有暖氣懼不敢殯凡十五日復生云至冥司與冥吏語冥吏悅之立於房內吏出掄試開其案牘乃楊慎矜於帝所訟李林甫王鉷也已斷王鉷族滅矣於是不敢開置於舊處而謁王王庭前東西廊下皆垂簾坐掄簾下慎矜兄弟入見王稱冤王曰已族王鉷即當到矣須臾鎖鉷至兼其子弟數人皆械繫面縛七竅流血王令送訊所於是與慎矜同出乃引掄既蘇月餘有邢縡之事王鉷死之出紀聞師夜光唐師夜光者薊門人少聰敏好學雅尚浮屠氏遂為僧居于本郡僅十年盡通內典之奧又有沙門惠達者家甚富有金錢巨萬貪夜光之學因與為友是時玄宗皇帝好神仙釋氏窮索名僧方士而夜光迫於貧不得西去心常怏怏惠達知之因以錢七十萬資其行且謂夜光曰師之學藝材用愚竊以為無出於右者聖上拔天下英俊吾子必將首出群輩沐浴恩渥自此託跡緇徒為明天子臣可翹足而待也然當是時必有擁篲子門幸無忘忘原作忌據明鈔本改半面之舊夜光謝曰幸師厚貺我得遂西上儻為君之五品則以報師之惠矣夜光至長安因賂九仙公主左右得召見召見二字原作以據唐書師夜光傳改溫泉泉字下明鈔本空九字當有脫文命內臣選碩學僧十輩與方士議論夜光在選演暢玄奧發揮疑義群僧無敢比者上奇其辯詔賜銀印朱綬拜四門博士日侍左右賜甲第洎金錢繒綵以千數時號幸臣惠達遂自薊門入長安訪之夜光聞惠達至以為收債於己甚不懌惠達悟其旨因告去既以北歸月餘夜光慮其再來即密書與薊門帥張廷珪近者惠達師至輦下誣毀公繕完兵革將為逆謀人亦頗有知者以公之忠天下莫不聞之積毀銷金不可不戒廷珪驚怒即召惠達鞭殺之後數日夜光忽見惠達來庭中罵夜光曰我以七十萬錢資汝西上奈何遽相誣謗使我冤死何負我之深也言訖遂躍而上捽拽夜光久之乃亡所見師氏家僮咸見之其後數日夜光卒出宣室志崔尉子唐天寶中有清河崔氏家居于滎陽母盧氏幹於治生家頗富有子策名京都受吉州大和縣尉其母戀故產不之官為子娶太原王氏女與財數十萬奴婢數人赴任乃謀賃舟而去僕人曰今有吉州人姓孫云空舟欲返傭價極廉儻與商量亦恐穩便遂擇發日崔與王氏及婢僕列拜堂下泣別而登舟不數程晚臨野岸舟人素窺其囊橐伺崔尉不意遽推落于深潭佯為拯溺之勢退而言曰恨力救不及矣其家大慟孫以刃示之皆惶懼無復喘息是夜抑納王氏王方娠遂以財物居於江夏後王氏生男舟人養為己子極愛焉其母亦竊誨以文字母亦不告其由崔之親老在鄭州訝久不得消息積望數年天下離亂人多飄流崔母分與子永隔矣爾後二十年孫氏因崔財致產極厚養子年十八九學藝已成遂遣入京赴舉此子西上途過鄭州去州約五十里遇夜迷路常有一火前引而不見人隨火而行二十餘里至莊門扣開以寄宿主人容之舍於廳中乃崔莊也其家人竊窺報其母曰門前宿客面貌相似郎君家人又伺其言語行步輒無少異又白其母母欲自審之遂召入升堂與之語話一如其子問乃孫氏矣其母又垂泣其子不知所以母曰郎君遠來明日且住一食此子不敢違長者之意遂諾之明日母見此子告去遂發聲慟哭謂此子曰郎君勿驚此哭者昔年唯有一子頃因赴官遂絕消息已二十年矣今見郎君狀貌酷似吾子不覺悲慟耳郎君西去迴日必須相過老身心孤見郎君如己兒也亦有奉贈努力早迴此子至春應舉不捷卻歸至鄭州還過母莊母見欣然遂留停歇數日臨行贈貲糧兼與衣一副曰此是吾亡子衣服去日為念今既永隔以郎君貌似吾子便以奉贈號哭而別他時過此亦須相訪此子卻歸亦不為父母言之後忽著老母所遺衣衫下襟有火燒孔其母驚問何處得此衣乃述本末母因屏人泣與子言其事此衣是吾與汝父所制初熨之時誤遺火所爇汝父臨發之日阿婆留此以為念比為汝幼小恐申理不了豈期今日神理昭然其子聞言慟哭詣府論冤推問果伏誅孫氏而妻以不早自陳斷合從坐其子哀請而免出原化記
