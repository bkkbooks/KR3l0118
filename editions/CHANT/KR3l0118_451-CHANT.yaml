body:
  text: 馮玠馮玠唐馮玠者患狐魅疾其父后得術士療玠疾魅忽啼泣謂玠曰本圖共終今為術者所迫不复得在流淚經日方贈玠衣一襲云善保愛之聊為久念耳玠初得懼家人見悉卷書中疾愈入京應舉未得開視及第后方還開之乃是紙焉賀蘭進明唐賀蘭進明為狐所婚每到時節狐新婦恒至京宅通名起居兼持賀遺及問訊家人或有見者狀貌甚美至五月五日自進明已下至其仆隸皆有續命家人以為不祥多焚其物狐悲泣云此并真物奈何焚之其后所得遂以充用后家人有就求漆背金花鏡者入人家偷鏡挂項緣牆行為主人家擊殺自爾怪絕焉崔昌唐崔昌在東京庄讀書有小兒顏色殊異來止庭中久之漸升階坐昌床頭昌不之顧乃以手卷昌書昌徐問汝何人斯來何所欲小兒云本好讀書慕君學問爾昌不之卻常問文義甚有理經數月日暮忽扶一老人乘醉至昌所小兒暫出老人醉吐人之爪發等昌甚惡之昌素有所持利劍因斬斷頭成一老狐頃之小兒至大怒云君何故無狀殺我家長我豈不能殺君但以舊恩故爾大罵出門自爾乃絕長孫甲唐坊州中部縣令長孫甲者其家篤信佛道異日齋次舉家見文殊菩薩乘五色云從日邊下須臾至齋所檐際凝然不動合家禮敬懇至久之乃下其家前后供養數十日唯其子心疑之入京求道士為設禁遂擊殺狐令家奉馬一匹錢五十千后數十日复有菩薩乘云來到家人敬禮如故其子复延道士禁咒如前盡十余日菩薩問道士法術如何答曰已盡菩薩云當決一頓因問道士汝讀道經知有狐剛子否答云知之菩薩云狐剛子者即我是也我得仙來已三萬歲汝為道士當修清淨何事殺生且我子孫為汝所殺寧宜活汝耶因杖道士一百畢謂令曰子孫無狀至相勞扰慚愧何言當令君永無災橫以此相報顧謂道士可即還他馬及錢也言訖飛去王老唐睢陽郡宋王冢旁有老狐每至衙日邑中之狗悉往朝之狐坐冢上狗列其下東都王老有雙犬能咋魅前后殺魅甚多宋人相率以財雇犬咋狐王老牽犬往犬乃逕詣諸犬之下伏而不動大失宋人之望今世人有不了其事者相戲云取睢陽野狐犬劉眾愛唐劉全白說云其乳母子眾愛少時好夜中將网斷道取野豬及狐狸等全白庄在岐下后一夕眾于庄西數里下网己伏网中以伺其至暗中聞物行聲覘見一物伏地窺网因而起立變成緋裙婦人行而違网至愛前車側忽捉一鼠食愛連呵之婦人忙遽入网乃棒之致斃而人形不改愛反疑懼恐或是人因和网沒漚麻池中夜還與父母議及明舉家欲潛逃去愛竊云寧有婦人食生鼠此必狐耳复往麻池視之見婦人已活因以大斧自腰后斫之便成老狐愛大喜將還村中有老僧見狐未死勸令養之云狐口中媚珠若能得之當為天下所愛以繩縛狐四足又以大籠罩其上養數日狐能食僧用小瓶口窄者埋地中令口與地齊以兩胾豬肉炙于瓶中狐愛炙而不能得但以口屬瓶候炙冷复下肉臠狐涎沫久之炙與瓶滿狐乃吐珠而死珠狀如棋子通圓而洁愛母帶之大為其夫所貴王黯王黯者結婚崔氏唐天寶中妻父士同為淝州刺史黯隨至江夏為狐所媚不欲渡江發狂大叫恒欲赴水妻屬惶懼縛黯著床櫪上舟行半江忽爾欣笑至岸大喜曰本謂諸女郎輩不隨過江今在州城上复何慮也士同蒞官便求術士左右言州人能射狐者士同延至入令堂中悉施床席置黯于屋西北陬家人數十持更迭守己于堂外別施一床持弓矢以候狐至三夕忽云諸人得飽睡已否適已中狐明當取之眾以為狂而未之信及明見窗中有血眾隨血去入大坑中草下見一牝狐帶箭垂死黯妻燒狐為灰服之至盡自爾得平复后為原武縣丞在廳事忽見老狐奴婢詣黯再拜云是大家阿奶往者娘子枉為崔家殺害翁婆追念未嘗離口今欲將小女更與王郎續親故令申意兼取吉日成納黯甚懼許以厚利萬計料理遽出羅錦十余匹于通衢焚之老奴乃謂其婦云天下美丈夫亦复何數安用王家老翁為女婿言訖不見袁嘉祚唐寧王傅袁嘉祚年五十應制授垣縣縣丞闕素凶為者盡死嘉祚到官而丞宅數任無人居屋宇摧殘荊棘充塞嘉祚剪其荊棘理其牆垣坐廳事中邑老吏人皆懼勸出不可既而魅夜中為怪嘉祚不動伺其所入明日掘之得狐狐老矣兼子孫數十頭嘉祚盡烹之次至老狐狐乃言曰吾神能通天預知休咎愿置我我能益于人今此宅已安舍我何害嘉祚前與之言備告其官秩又曰愿為耳目長在左右乃免狐后祚如狐言秩滿果遷數年至御史狐乃去李林甫唐李林甫方居相位嘗退朝坐于堂之前軒見一玄狐其質甚大若牛馬而毛色黯黑有光自堂中出馳至庭顧望左右林甫命弧矢將射之未及已亡見矣自是凡數日每晝坐輒有一玄狐出焉其歲林甫籍沒孫甑生唐道士孫甑生本以養鷹為業后因放鷹入一窟見狐數十枚讀書有一老狐當中坐迭以傳授甑生直入奪得其書而還明日有十余人持金帛詣門求贖甑生不與人云君得此亦不能解用之若寫一本見還當以口訣相授甑生竟傳其法為世術士狐初與甑生約不得示人若違者必當非命天寶末玄宗固就求之甑生不與竟而伏法王璿唐宋州刺史王璿少時儀貌甚美為牝狐所媚家人或有見者丰姿端麗雖童幼遇之者必斂容致敬自稱新婦祗對皆有理由是人樂見之每至端午及佳節悉有贈儀相送云新婦上某郎某娘續命眾人笑之然所得甚眾后璿職高狐乃不至蓋某祿重不能為怪李東平尉李初得官自東京之任夜投故城店中有故人賣胡餅為業其妻姓鄭有美色李目而悅之因宿其舍留連數日乃以十五千轉索胡婦既到東平寵遇甚至性婉約多媚黠風流女工之事罔不心了于音聲特究其妙在東平三歲有子一人其后李充租綱入京與鄭同還至故城大會鄉里飲宴累十余日李催發數四鄭固稱疾不起李亦怜而從之又十余日不獲已事理須去行至郭門忽言腹痛下馬便走勢疾如風李與其仆數人极騁追不能及便入故城轉入易水村足力少息李不能舍复逐之垂及因入小穴极聲呼之寂無所應戀結凄愴言發淚下會日暮村人為草塞穴口還店止宿及明又往呼之無所見乃以火熏久之村人為掘深數丈見牝狐死穴中衣服脫卸如蛻腳上著錦襪李歎息良久方埋之歸店取獵犬噬其子子略不惊怕便將入都寄親人家養之輸納畢复還東京婚于蕭氏蕭氏常呼李為野狐婿李初無以答一日晚李與蕭攜手與歸本房狎戲复言其事忽聞堂前有人聲李問阿誰夜來答曰君豈不識鄭四娘耶李素所鐘念聞其言遽欣然躍起問鬼乎人乎答云身即鬼也欲近之而不能四娘因謂李人神道殊賢夫人何至數相謾罵且所生之子遠寄人家其人皆言狐生不給衣食豈不念乎宜早為撫育九泉無恨也若夫人云云相侮又小兒不收必將為君之患言畢不見蕭遂不复敢說其事唐天寶末子年十余甚無恙李揆唐丞相李揆乾元初為中書舍人嘗一日退朝歸見一白狐在庭中搗練石上命侍童逐之已亡見矣時有客于揆門者因話其事客曰此祥符也某敢賀至明日果選禮部侍郎宋溥宋溥者唐大歷中為長城尉自言幼時與其党暝扱野狐數夜不獲后因月夕复為其事見一鬼戴笠騎狐唱獨盤子至扱所狐欲入扱鬼乃以手搭狐頰因而复回如是數四其后夕溥复下扱伺之鬼又乘狐兩小鬼引前往來報所溥等無所獲而止有談眾者亦云幼時下報忽見一老人扶杖至己所止樹下仰問樹上是何人物眾時尚小甚惶懼其兄因怒罵云老野狐何敢如此下樹逐之狐遂變走僧晏通晉州長寧縣有沙門晏通修頭陀法將夜則必就叢林亂冢寓宿焉雖風雨露雪其操不易雖魑魅魍魎其心不搖月夜栖于道邊積骸之左忽有妖狐踉蹌而至初不虞晏通在樹影也乃取髑髏安于其首遂搖動之倘振落者即不再顧因別選焉不四五遂得其一岌然而綴乃褰擷木葉草花障蔽形體隨其顧盼即成衣服須臾化作婦人綽約而去乃于道右以伺行人俄有促馬南來者妖狐遙聞則慟哭于路過者駐騎問之遂對曰我歌人也隨夫入奏今曉夫為盜殺掠去其財伶俜孤遠思愿北歸無由致脫能收采當誓微軀以執婢役過者易定軍人也即下馬熟視悅其都冶詞意叮嚀便以後乘挈行焉晏通遽出謂曰此妖狐也君何容易因舉錫杖叩狐腦髑髏應手即墜遂复形而竄焉
