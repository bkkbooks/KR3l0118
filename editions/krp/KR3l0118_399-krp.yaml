body:
  text: 太平廣記卷三百九十九宋李昉等編水帝神女劉子光益水釀川石脂水元街泉銅車神牛泉燕原池丹水陸鴻漸零水龍門漏澤兩出重水湘水暴水仙池渝洲灘清潭驅山鐸井烏山龜綠珠井臨沅井火井鹽井御井王迪賈躭八角井李徳裕永興坊百姓獨孤叔牙柴都濠州井雞井軍井金華令水帝神女山海經洞庭之中帝之二女居之郭璞注云天帝之二女處江為神列仙傳所謂江妃二女也離騷所謂湘夫人帝子降兮北渚是也河圖玉板云堯之二女為舜之妃死葬於此塜在縣北一百六十里青草山闕劉子光漢劉子光西征遇山而渴無水子光在山南見一石人問之曰何處有水石人不言乃㧞劍斬石人須臾窮山水出出獨異記益水益陽縣在長沙郡界益水在其陽縣治東望時見長沙城隍人馬形色悉可審辨或停覽矚移晷乃漸散滅縣去長沙尚三百里跨越重山裏絶表顯將是山嶽炳靈㝠像所傳者乎昔光武中元元年封泰山禪梁父是日山靈炳象搆成宫室昔漢武帝遣方士徐宣浮海採藥於波中見漢家樓觀參差宛然備矚公侯第宅皆滿目班超在渾耶國平旦雲霞鮮朗見天際宫闕館宇嚴列侍臣左右悉漢家也如斯之𩔖難可審論出録異記釀川沈釀川者漢鄭宏靈帝時為鄉嗇夫從宦入京未至夜宿於此逢故人四顧荒郊村落絶遠沽酒無處情抱不申乃投錢於水中而共飲盡夕酣暢皆得大醉因便名為沈釀川明旦分首而去宏仕至尚書出博物志石脂水髙奴縣石脂水水膩浮水上如漆採以膏車及燃燈極明出酉陽雜俎元街泉元街縣有泉泉眼中水交旋如盤龍或試撓破之隨手成龍狀驢馬飲之皆驚走出酉陽雜爼銅車荆之清水宛口旁義熙十二年有兒羣浴此水忽見岸側有錢出於流沙因競取之手滿置地隨復流去乃以襟結之然後各有所得流錢中有銅車銅牛牽車之勢甚迅速諸童奔逐掣得車一脚徑可五寸許猪鼻轂有六幅通體青色轂内黄銳時沈敞守南陽求得車脚錢行時貫草輒便停破竟不知所終出酉陽雜俎神牛泉魏土地記曰沮陽城東八十里有牧牛山下有九十九泉即滄河之上源也山在縣東北三十里山上有道武皇帝廟耆舊云山下亦有百泉競發有一神牛駮身自山而降下導九十九泉飲泉竭故山得其名今山下導九十九泉積以成川西南流出水經燕原池燕原山天池與桑乾泉通後魏孝文帝以金珠穿魚七頭於此池放之後於桑乾原得穿魚猶為不信又以金縷拖羊箭射着此大魚久之又於桑乾河得所射箭山在嵐州靜樂縣東北百四十里俗名天池曰祁連汭出洽聞記丹水懷州北有丹水其源出長平山傳云秦殺趙卒其水變赤因以為名上在太原知其故詔改為懷水出國史異纂陸鴻漸元和九年春張又新始成名與同恩生期於薦福寺又新與李徳裕先至憩西廊僧𤣥鑒室會纔有楚僧至置嚢而息嚢有數編書又新偶抽一通覽焉文細密皆雜記卷末又題云煮水處太宗朝李季卿刺湖州至維揚遇陸處士鴻漸李素熟陸名有傾葢之歡因赴郡抵揚子驛中將食李曰陸君善茶葢天下聞揚子江南零水又殊絶今者二妙千載一遇何曠之乎命軍士信謹者挈缾操舟深詣南零取水陸潔器以俟俄水至陸以杓揚水曰江則江矣非南零者似臨岸者使曰某掉舟深入見者累百人敢紿乎陸不言既而傾諸盆至半陸遽止又以杓揚之曰自此南零者矣使蹶然大駭馳下曰某自南零齎至岸舟盪半懼其尠挹岸水以增之處士之鑒神鑒也其敢𨼆欺乎李大驚賞從者數十輩皆大駭愕李因問陸既如此所經歴之處水之優劣可判矣陸曰楚水第一晉水最下李因命口占而次第之出水經零水贊皇公李徳裕博達士居廊廟日有親知奉使于京口李曰還日金山下揚子江中零水與取一壺來其人舉棹日醉而忘之泛舟止石城下方憶乃汲一缾於江中歸京獻之李公飲後歎訝非常曰江表水味有異於頃歲矣此水頗似建業石城下水其人謝過不𨼆也出中朝故事龍門龍門人皆言善游於懸水接木上下如神然寒食拜埽必於河濱終為水溺死也出國史補漏澤漏澤據酈元注水經云姚墟東有漏澤方十五里綠水泓澄凡三大澤曲際有阜俗謂之媯亭側有三石穴廣員三尺而有通否水自盈漏漏則數夕之中傾竭陂澤中矣左右居人識其將漏預以水為曲㧞物障穴口魚鼈異鱗不可勝載矣今按此澤漏凡穴區别所謂車箱漏鼓漏土漏雞漏豬漏春夏積水秋冬漏竭居人知之不過三日之中俱盡在今兗州泗水縣治東七十里出國史𥙷又兗州東南接沂州界有陂周圍百里而近恒値夏雨側近山谷間流注所聚也深可袤丈屬春雨即魚鼈生焉或至秋晴其水一夕悉陷其下而無餘故彼之鄉里或目之為漏陂亦謂之陷澤其水將漏即有聲聞四遠數十里分若風雨之聚也先迴旋若渦勢然後淪入於穴村人聞之日必具車乘及驢駝競拾其魚鼈輦載而歸卒一二歲陷莫知其趨向及穴之深淺焉出玉堂閒話重水凡物有水水由土地故江東宜綾紗宜紙鏡水故也蜀人織錦初成必濯於江水然後文彩煥發鄭人滎水釀酒近邑水重斤兩與遠郊數倍出國史補湘水湘水至清深五六丈下見底碎石若樗蒲子白沙如霜雪赤岸若朝霞出羅含湘川記暴水青城山因滯雨崖崩暴水大至在丈人觀後髙百餘丈殿當其下將憂摧壞俄有墜石如岸堰水向東竟免漂陷觀中常汲溪水以供日食甚以為勞自此暴水出處常有流泉直注厨内其味甘香冬夏不絶出録異志仙池渝州仙池在州西南江津縣界岷江南岸其池周迴二里水深八尺流入岷江古老傳者有仙人姓然名獨角以其頭有角故表其名自揚州來居此池邊起樓聚香草置樓下獨角忽登樓命僕夫燒其樓獨角飛空而去因名仙池見有石巖一所向岷江而見在出渝州圖經渝州灘渝州城灘在州西南三十里江津縣東北沿流八十里岷江水中波浪沸騰乍停乍發多覆舟之患古老傳昔有仙居和來為巴州刺史過此灘舟翻溺水而死和女與兄圖行女有兩兒方稚齒乃分金珠作二錦嚢纓致兒頸然後乘船至父没處呌聲投水凡六日與兄夢云二十一日與父俱出兄令人守之至期果然俱浮江水而出今碑在城灘側出渝州圖經清潭新康縣西百里有清潭在章浦溪源極深常有白龍藏此中天旱令人取猪羊糞擲潭中即有大雨暴水至今有驗出録異記驅山鐸宜春界鍾山有硤數十里其水即宜春江也迴環澄激深不可測曾有漁人垂釣得一金鏁引之數百尺而獲一鍾又如鐸形漁人舉之有聲如霹靂天晝晦山川振動鍾山一面崩摧五百餘丈漁人皆沈舟落水其山摧處如削至今存焉或有識者云此即秦始皇驅山之鐸也出玉堂閒話井烏山龜烏山下無水魏末有人掘井五丈得一石函函中得一龜大如馬蹄積炭五堆於函旁復掘三丈遇磐石下有水流猶湖然遂鑿石穿水北流甚駃俄有一船觸石而至匠人窺船上得一杉木板刻字曰吳赤烏二年八月十日子義之船出酉陽雜俎綠珠井綠珠井在白州雙角山下昔梁氏之女有容貌石季倫為交趾採訪使以圓珠三斛買之梁氏之居舊井存焉耆老傳云汲飲此水者誕女必多美麗里閭有識者以美色無益於時遂以巨石塡之邇後雖時有産女端嚴則七竅四肢多不完全異哉州界有一流水出自雙角山合容州畔為綠珠江亦猶歸州有昭君村村葢取美人生當名矣出嶺表録異臨沅井葛稚川云余祖鴻臚少時嘗為臨沅令云此縣有名家世夀考或出百歲或八九十後徙去子孫轉多夭折他人居其故宅後累世壽考由此乃覺是宅所為而不知其何故疑其井水硃赤乃試掘井左右得古人埋丹砂數十斛去井數尺此丹砂汁因泉漸入井是以飲其水而得夀况乃餌鍊丹砂而服之乎出抱朴子火井火井一所縱廣五尺深二三丈在蜀都者時以竹板木投之以取火諸葛丞相往觀視後火轉盛熱以盆著井上煮鹽得鹽後人以家燭火投井中即滅息至今不復然也出博物志鹽井陵州鹽井後漢仙者沛國張道陵之所開鑿周迴四丈深四十尺置竈煮鹽一分入官二分入百姓家因利所以聚人因人所以成邑萬歲通天二年右補闕郭文簡奏賣水一日一夜得四十五萬貫百姓貪其利人用失業井上又有玉女廟古老傳云比十二玉女嘗與張道陵指地開井遂奉以為神又俗稱井底有靈不得以火投及穢汚曾有汲水誤以火墜即吼沸湧烟氣衝上濺泥漂石甚為可畏或云泉脈通東海時有敗船木浮出出陵州圖經御井善和訪舊御井故老云非可飲之井地卑水柔宜用濯開元中以駱駝數十䭾入大内以給六宫出國史補王迪唐貞元十四年春三月壽州隨軍王迪家井忽然沸溢十日又汲見井底有聲如嬰兒之聲至四月兄弟二人盲又一人死家事狼狽之應驗出祥異集驗賈耽賈耽在滑臺城北命鑿八角井以鎭黄河於是使人於鑿所偵之有一老父來觀問曰誰人鑿此井也吏曰相公也父曰大好手但近東近西近南近北也耽問之曰吾是井大夫也出玉泉子八角井景公寺前街中舊有巨井俗呼為八角井唐元和初有公主夏中過見百姓方汲令從婢以銀稜碗就井承水誤墜井經月餘碗出於渭河出酉陽雜俎李德裕李德裕在中書常飲常州惠山井泉自毗陵至京致逓鋪有僧人詣謁德裕好奇凡有遊其門雖布素皆引接僧曰徳裕相公在位昆蟲遂性萬彚得所水遞事亦日月之薄蝕微僧竊有感也敢以上謁欲沮此可乎徳裕頷頤之曰大凡為人未有無嗜慾者至於燒汞亦是所短況三惑博塞弋弈之事弟子悉無所染而和尚有不許弟子飲水無乃虐乎為上人停之即三惑馳騁怠慢必生焉僧人曰貧道所謁相公者為足下通常州水脈京都一眼井與惠山寺泉脈相通徳裕大笑眞荒唐也僧曰相公但取此井水曰井在何坊曲曰在昊天觀常住庫後是也但以惠山一甖昊天一甖雜以八瓶一𩔖都十瓶暗記出處遣僧辨析僧因啜常取惠山寺與昊天餘八乃同味徳裕大奇之當時停其水遞人不告勞浮議弭焉出芝田録永興坊百姓唐開成末永興坊百姓王乙掘井過常井一丈餘無水忽聽向下有人語及雞聲甚喧閙近侣隔壁井匠懼不敢擾街司申金吾韋處仁將軍韋以事涉怪異不復奏遽令塞之據周秦故事謁者閣上得驪山本李斯領徒七十二萬人作陵鑿之以章程三十七嵗因地中井泉奏曰已深已極鑿之不入燒之不燃叩之空空如下天狀抑知厚地之下或别有天地也出酉陽雜俎獨孤叔牙獨孤叔牙常令家人汲水重不可轉數人助出之乃人也戴席㡌攀欄大笑却墜井中汲者攪得席帽挂於庭樹每雨所溜處輒生黄菌出酉陽雜俎柴都東方有柴都焉在齊國之山山有泉水如井狀深不測至春夏時雹從井中出出則敗五穀人常以柴塞之不塞則雹為患故號柴都出郭氏𤣥中記濠州井戊子歲大旱濠州酒肆前有大井堙塞積乆至是酒家召井工陶浚之有工人父子應募者其子先入倚鍤而卒其父遽下亦卒觀者如堵無敢復入引繩出尸竟不復鑿出稽神録雞井江夏有林主簿虐而好賭甚愛一女好食雞里胥日供雙雞一日將殺雞雞走其女自逐之雞入舍北枯井中女亦入井遂不見林自往亦入井不出俄井中黑氣騰上如炊其家但臨井而哭無敢入者有屠者請入視之但見大釡湯沸火熾有人拒其足曰事不干汝不得入而出久之氣稍稍而息井中唯雞骨一具人骨二具此數聞故老言之不知其何年也出稽神録軍井建州有魏使君宅兵後焚毁以為軍營有大井澱塞壬子嵗軍士浚之入者二人皆卒尸亦不獲有一人請復入曰以繩縋我我急引繩即亟出之既入久之忽引繩甚急即出之已如癡矣良久乃能言云既入井但見城郭并邑人物甚衆其主曰李將軍機務鞅掌府署甚盛懼而遽出竟不獲二尸建州留後宋斥業使塡此井出稽神錄金華令王祝從子某為金華令築私第于邑中夏暴雨大至水忽奔往東南隅如灌漏巵頃刻而盡其地成井深不可測以絲籰縋石以測之數十丈乃及底黏一新捻頭而上與人間常食者無少異也出稽神錄太平廣記卷三百九十九
