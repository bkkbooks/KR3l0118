body:
  text: 太平廣記卷四十四神仙四十四田先生穆將符房建蕭洞𤣥田先生田先生者九華洞中大仙也元和中𨼆於饒州鄱亭村作小學以教村童十數人人不知其神仙矣饒州牧齊推嫁女與進士李生數月而孕李生赴舉長安其孕婦將産於州之後堂夢鬼神責其腥穢斥逐之推常不信鬼神不敢言未暇移居既産為鬼所惡害耳鼻流血而卒殯於官道側以俟罷郡遷之北歸明年李生下第歸饒日晚於野中見其妻訴以鬼神所害之事乃曰可詣鄱亭村學中吿田先生求其神力或可再生耳李如其言詣村學見先生膝行而前首體投地哀吿其事願大仙哀而救之先生初亦堅拒李叩吿不已涕泗滂沲自早及夜終不就坐學徒既散先生曰誠懇如此吾亦何所𨼆耶但不早相吿屋舍已壞矣誠為作一處置即從舍出百餘步桑林中夜已昏暝忽光明如晝化為大府崇門儀衛森列先生寳冠紫帔據案而坐擬於王者乃傳聲呼地界俄有十餘隊各擁百餘騎奔走而至皆長丈餘謁者呼名通入曰廬山江濱彭蠡等神到先生曰刺史女因産為暴鬼所殺事聞之何不申理對曰獄訟無主未果發謫今賊是鄱陽王吳芮刺史宅是其所居怒其生産腥穢遂肆兇暴尋又擒吳芮牒天曹而誅戮之勘云李氏妻算命尚有三十二年合生二男三女先生曰屋舍已壞如何有一老吏曰昔東晉鄴下有一人誤死屋宅已壞又合還生與此事同其時葛仙君斷令具魂為身與本無異但壽盡之日無形爾先生許之即只追李妻魂魄合為一體以神膠塗之大王發遣却生即便生矣見有七八女人與李妻相似吏引而至推而合之有藥如稀餳以塗其身頃刻官吏皆散李生及妻田先生在桑林間李生夫妻懇謝之先生曰但云自得再生勿多言也遂失先生所在李與妻還家其後年壽所生男女皆如所言出仙傳拾遺穆將符穆將符者唐給事中仁裕之姪也幼而好學不慕聲利不窺世禄而深入𤣥關縱逸自放不知師匠何人已得吐納内修之道好飲酒髙閒傲睨人莫能測之長安東市酒肆姚生與其友善時往來其家則飲酒話道彌日累夕姚忽暴卒舉家惶駭使人奔訪將符際夜方至姚已奄然無復喘息將符方醉其家人哀號吿之笑曰可救也無遽憂怖遂解衣與姚同衾而卧戒其家令作人參湯稀粥以候之勿得悲泣驚呼待喚即應滅燭而寢悄然中夜方命燭視之姚已起坐矣少以人參湯注之良久乃以粥助之乃能言曰適為黄衣使者三四人以馬載去西行甚速道途蒙昧如微月之中逡巡有赤色光如日出之狀照其行路黄衣者促轡尤急即聞傳呼云太乙有敇使天兵遣回乃顧見騎乘旌旗森然成列所乘馬及黄衣者奔迸不知所之别有朱衣一人引而歸之自是姚生平復如初將符遁去不知所適羅浮軒轅先生有道之士也大中年徵入關至京即使人訪之將符已遯去先生曰穆處士𨼆仙者也名位列於九清之上矣勿以其嗜酒昏醉為短真和光混俗爾淮浙間頗顯其異跡接於聞見若左元放葛孝先之流也出神仙拾遺傳房建清河公房建居于含山郡性尚奇好𤣥元之教常從道士授六甲符及九章真籙積二十年後南遊衡山遇一道士風骨明秀與建語述上清仙都及蓬萊方丈靈異之事一一皆若涉厯建奇之後旬餘建自衡山適南海道士謂建曰吾嘗客於南海迨今十年矣時有寺官李侯者䕶其軍李侯以玉簪遺我我以簪賜君君宜寳之建得其簪喜且甚因而别去是嵗秋建至南海嘗一日獨遊開元觀觀之北軒有磚塗為真人狀者二焉其位於東者左𤣥真人及視左𤣥之狀果衡山所遇道士也奇而歎者且久及覩左𤣥之冠已亡簪矣時有觀居道士數輩在焉建具以事言次出玉簪示之道士驚曰往嵗有寺官李侯䕶兵於南海嘗以二玉簪餙左右真人迨今且十年其左𤣥之簪亡之十年今君所獲果是焉建奇之因以玉簪歸道士出宣室志蕭洞𤣥王屋靈都觀道士蕭洞𤣥志心學鍊神丹積數年卒無所就無何遇神人授以大還祕訣曰法盡此耳然更須得一同心者相為表裏然後可成盍求諸乎洞𤣥遂周遊天下厯五嶽四瀆名山異境都城聚落人跡所輳罔不畢至經十餘年不得其人至貞元中洞𤣥自浙東抵揚州至庱亭埭維舟於逆旅主人于時舳艫萬艘隘於河次堰開争路上下衆船相軋者移時舟人盡力擠之見一人船頓蹙其右臂且折觀者為之寒慄其人顔色不變亦無呻吟之聲徐歸船中飲食自若洞𤣥深嗟異之私喜曰此豈非天佑我乎問其姓名則曰終無為因與交結話道欣然遂不相捨即俱之王屋洞𤣥出還丹祕訣示之無為相與揣摩更終二三年修行備至洞𤣥謁無為曰將行道之夕我當作法䕶持君當謹守丹竈但至五更無言則㩦手上昇矣無為曰我雖無他術至於忍斷不言君所知也遂十日設壇場焚金鑪餙丹竈洞𤣥遶壇行道步虚無為於藥竈前端拱而坐心誓死不言一更後忽見兩道士自天而降謂無為曰上帝使問爾要成道否無為不應須臾又見羣仙自稱王喬安期等謂曰適來上帝使左右問爾所謂何得不對無為亦不言有頃見一女人年可二八容華端麗音韻幽閒綺羅繽紛薰灼動地盤旋良久調戲無為無為亦不顧俄然有虎狼猛獸十餘種𩔖哮呌騰擲張口向無為無為亦不動有頃見其祖考父母先亡眷屬等並在其前謂曰汝見我何得無言無為涕淚交下而終不言俄見一夜义身長三丈目如電赩口赤如血朱髮植竿鋸牙鈎爪直衝無為無為不動既而有黄衫人領二手力至謂無為曰大王追不願行但言其故即免無為不言黄衫人即叱二手力可拽去無為不得已而隨之須臾至一府署云是平等王南面凭几威儀甚嚴厲聲謂無為曰爾未合至此若能一言自辨即放爾迴無為不對平等王又令引向獄中看諸受罪者慘毒痛楚萬狀千名既廻仍謂之曰爾若不言便入此中矣無為心雖恐懼終亦不言平等王曰即令别受生不得放歸本處無為自此心迷寂無所知俄然復覺其身託生於長安貴人王氏家初在母胎猶記宿誓不言既生相貌具足唯不解啼三日滿月其家大㑹親賓廣張聲樂乳母抱兒出衆中遞相憐撫父母相謂曰我兒他日必是貴人因名曰貴郎聰慧日甚秖不解啼纔及三嵗便行弱不好弄至五六嵗雖不能言所為雅有髙致十嵗操筆即成文章動静嬉遊必盈紙墨既及弱冠儀形甚都舉止雍雍可為人表然自以瘖瘂不肯入仕其家富比王室金玉滿堂婢妾歌童極於奢侈年二十六父母為之娶妻妻亦豪家又絶代姿容工巧伎樂無不妙絶貴郎官名慎微一生自矜快樂娶妻一年生一男端敏惠黠畧無倫比慎微愛念復過常情一旦妻及慎微俱在春庭遊戲庭中有盤石可為十人之坐妻抱其子在上忽謂慎微曰觀君於我恩愛甚深今日若不為我發言便當撲殺君兒慎微争其子不勝妻舉手向石撲之腦髓迸出慎微痛惜撫膺不覺失聲驚駭恍然而寤則在丹竈之前而向之盤石乃丹竈也時洞𤣥壇上法事方畢天欲曉矣俄聞無為歎息之聲忽失丹竈所在二人相與慟哭即更鍊心修行後亦不知所終出河東記太平廣記卷四十四
