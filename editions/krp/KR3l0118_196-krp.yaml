body:
  text: 太平廣記卷一百九十六豪俠四田膨郎宣慈寺門子李龜夀潘將軍賈人妻荆十三娘許寂丁秀才田膨郎唐文宗皇帝嘗寳白玉枕德宗朝于闐國所貢追琢竒巧盖希代之寳置寢殿帳中一旦忽失所在然禁衛清密非恩渥嬪御莫有至者珍玩羅列他無所失上驚駭移時下詔於都城索賊密謂樞近及左右廣中尉曰此非外㓂所入盜當在禁掖茍求之不獲且虞他變一枕誠不足惜卿等衛我皇宫必使罪人斯得不然天子環衛自茲無用矣内宫惶慄謝罪請以浹旬求捕大懸金帛購之略無尋究之跡聖㫖嚴切收繫者漸多坊曲閭里靡不捜捕有龍武二蕃將王敬宏嘗蓄小僕年甫十八九神彩俊利使之無徃不屆敬宏曽與流輩於威逺軍㑹宴有侍兒善皷胡琴四座酒酣因請度曲辭以樂噐非妙須常御者彈之鐘漏已傳取之不及因起觧帶小僕曰若要琵琶頃刻可至敬宏曰禁皷纔動軍門已鎻尋常汝豈不見何見之謬也既而就飲數廵小僕以繡嚢將琵琶而至座客歡笑南軍去左廣徃復三十餘里入夜且無行伍既而倐忽徃來敬宏驚異如失時又捜捕嚴急意以盗竊疑之宴罷及明遽歸其第引而問之曰使汝累年不知蹻㨗如此我聞世有俠士汝莫是否小僕謝曰非有此事但能行耳因言父母皆在蜀川頃年偶至京國今欲却歸鄉里有一事欲報恩偷枕者早知姓名三數日當令服罪敬宏曰如此事即非等閒遂令全活者不少未知賊在何許可報司存掩獲否小僕曰偷枕者田膨郎也市㕓軍伍行止不恒勇力過人且善超越茍非便折其足雖千兵萬騎亦將奔走自兹再宿候之於望仙門伺便擒之必矣將軍隨某觀之此事仍須秘密是時渉旬無雨向曉塵埃頗甚車馬騰踐跬歩間人不相覩膨即與少年數軰連臂將入軍門小僕執毬杖擊之歘然已折左足仰而窺曰我偷枕來不怕他人惟懼於爾既此相值豈復多言於是舁至左右軍一欵而伏上喜於得賊又知獲在禁旅引膨郎臨軒詰問具陳常在營内徃來上曰此乃任俠之流非常之竊盗内外囚繫數百人於是悉令原之小僕初得膨即已告敬宏歸蜀尋之不可得但賞敬宏而已出劇談録宣慈寺門子宣慈寺門子不記姓氏酌其人義俠徒也唐乾符二年韋昭範登宏詞科昭範乃度支使楊嚴懿親及宴席帟幕噐皿之𩔖假於計司嚴復遣以使庫供借其年三月宴於曲江亭子供帳之盛罕有倫擬時進士同日有宴都人觀者甚衆飲興方酣俄覩一少年跨驢而至驕悖之狀旁若無人於是俯逼筵席張目引頸及肩復以巨箠棖築佐酒謔浪之詞所不能聼諸子駭愕之際忽有於衆中批其頰者隨手而墮於是連加毆擊又奪所執箠箠之百餘衆皆致怒瓦礫亂下殆將斃矣當此之際紫雲樓門軋然而開有紫衣從人數輩馳告曰莫打傳呼之聲相續又一中貴驅殿甚盛馳馬來救復操箠迎擊中者無不靣仆於地敕使亦為所箠既而奔馬而反左右從而俱入門門亦隨閉而已坐内甚忻愧然不測其來又慮事連宫禁禍不旋踵乃以緡錢束素召行毆者訊之曰爾何人與諸即君阿誰有素而能相為如此對曰某是宣慈寺門子亦與諸郎君無素第不平其下人無禮耳衆皆嘉歎以錢帛遺之復相謂曰此人必須亡去不然當為擒矣後旬朔坐中賔客多有假途宣慈寺門者門子皆能識之靡不加敬竟不聞有追問之者出摭言李龜夀唐晉公王鐸禧宗朝再入相不協比於權要唯以公諒宰大政四方有所請礙於德行者必固争不允由是諸鎮忌焉而志尚典籍雖門施行馬庭列鳬鍾而尋繹未嘗倦於永寕里第别構書齋每退朝獨處其中欣如也居一日將入齋唯所愛卑脚犬花鵲從既啓扉而花鵲連吠銜公衣却行叱去復至既入閣花鵲仰視吠轉急公亦疑之乃於匣中㧞千金劍按於膝上向空祝曰若有異𩔖隂物可出相見吾乃丈夫豈懾於䑕輩而相逼耶言訖歘有一物自梁間墜地乃人也朱鬕衣短後衣色貌黝痩頓首再拜唯曰死罪公止之且詢其來及姓名對曰李龜夀盧龍塞人也或有厚賂龜夀令不利於公龜夀感公之德復為花鵲所驚形不能匿公若捨龜夀罪願以餘生事公公謂曰待汝以不死遂命元從都押衙傅存初録之明日詰旦有婦人至門服裝單急曵履而抱持襁嬰請於閽曰幸為我呼李龜夀龜夀出乃妻也且曰訝君稍遲昨夜半自薊來相尋及鐸薨龜夀盡室亡去出三水小牘潘將軍京國豪士潘將軍住光德坊忘其名衆為潘鶻硉也本家襄漢間常乘舟射利因泊江壖有僧乞食留止累日盡心檀施僧歸去謂潘曰觀爾形質噐度與衆賈不同至於妻孥皆享厚福因以玉念珠一串留贈之寳之不但通財他後亦有官禄既而遷貿數年遂鏹均陶鄭其後職居左廣列第於京師常寳念珠貯之以繡嚢玉合置道塲内每月朔則出而拜之一旦開合啟嚢已亡珠矣然而緘封若舊他物亦無所失於是奪魄䘮精以為其家將破之兆有主藏者常識京兆府停觧所由王超年且八十因密話其事超曰異哉此非攘竊之盗也某試為尋之未知果得否超他日曽過勝業坊北街時春雨初霽有三鬟女子可年十七八衣裝繿縷穿木屐於道側槐𣗳下值軍中少年蹴踘接而送之直高數丈於是觀者漸衆超獨異焉而止於勝業坊北門短曲有母同居盖以紉針為業超時因以他事熟之遂為舅甥居室甚貧與母同卧土榻煙㸑不動者徃徃經於累日或設殽羞時有水陸珍異吳中初進洞庭橘恩賜宰臣外京輦未有此物密以一枚贈超云有人於内中將出而禀性剛决超意甚疑之如此徃來周嵗矣超一旦携酒食與之從容徐謂曰舅有深誠欲告外甥未知何如因曰每嵗重恩恨無所答若力可施必能赴蹈湯火超曰潘將軍失却玉念珠不知知否㣲笑曰從何知之超揣其意不甚藏密又曰外甥若見尋覓厚偹繒綵酬贈女子曰勿言於人某偶遇朋儕為戲終却送還因循未暇舅來日詰旦於慈恩寺塔院相候某知有人寄珠在此超如期而徃頃刻至矣時寺門始開塔户猶鏁謂超曰少頃仰觀塔上當有所見語訖而走疾若飛鳥忽於相輪上舉手示超歘然携念珠而下曰便可將還勿以財帛為意超送詣潘具述其㫖因以金玉繒帛密為贈之明日訪之已空室矣馮緘給事嘗聞京師多任侠之徒及為尹密詢左右述超具述其語將軍所説與超符同出劇談録賈人妻唐餘干縣尉王立調選傭居大寕里文書有誤為主司駁放資財蕩盡僕馬䘮失窮悴頗甚每丏食於佛祠徒行晚歸偶與羙婦人同路或前或後依隨因誠意與言氣甚相得立因邀至其居情欵甚洽翌日謂立曰公之生涯何其困哉妾居崇仁里資用稍偹儻能從居乎立既悦其人又幸其給即曰僕之厄塞阽於溝瀆如此勤勤所不敢望焉子又何以營生對曰妾素賈人之妻也夫亡十年旗亭之内尚有舊業朝肆暮家日贏錢三百則可支矣公授官之期尚未出遊之資且無脱不見鄙但同處以須冬集可矣立遂就焉閲其家豐儉得所至於扃鏁之具悉以付立每出則必先營辦立之一日饌焉及歸則又携米肉錢帛以付立日未嘗闕立憫其勤勞因令傭買僕𨽻婦託以他事拒之立不之强也周嵗産一子唯日中再歸為乳耳凡與立居二載忽一日夜歸意態遑遑謂立曰妾有冤仇痛纒肌骨為日深矣伺便復仇今乃得志便須離京公其努力此居䖏五百緡自置契書在屏風中室内資儲一以相奉嬰兒不能將去亦公之子也公其念之言訖収淚而别立不可留止則視其所携皮嚢乃人首耳立甚驚愕其人笑曰無多疑慮事不相累遂挈嚢踰垣而去身如飛鳥立開門出送則已不及矣方徘徊於庭遽聞却至立迎門接俟則曰更乳嬰兒以豁離恨就撫子俄而復去揮手而已立廻燈褰帳小兒身首已離矣立惶駭達旦不寐則以財帛買僕乘遊抵近邑以伺其事乆之竟無所聞其年立得官即貨鬻所居歸任爾後終莫知其音問也出集異記荆十三娘唐進士趙中行家於温州以豪侠為事至蘇州旅舍支山禪院僧房有一女商荆十三娘為亡夫設大祥齋因慕趙遂同載歸揚州趙以氣義耗荆之財殊不介意其友人李正郎弟三十九有愛妓妓之父母奪與諸葛殷李悵悵不已時諸葛殷與吕用之幻惑太尉高駢恣行威福李懼禍飲泣而已偶話於荆娘荆娘亦憤惋謂李三十九即曰此小事我能為郎籌之旦請過江於潤州北固山六月六日正午時待我李亦依之至期荆氏以嚢盛妓兼致妓之父母首歸於李復與趙同入浙中不知所止出北夢瑣言許寂蜀許寂少年棲四明山學易於晉徴君一旦有夫婦偕詣山居携一壺酒寂詰之云今日離剡縣寂曰道路甚遥安得一日及此頗亦異之然夫甚少而婦容色過之狀貌毅然而寡黙其夕以壺觴命許同酌此丈夫出一拍版徧以銅釘釘之乃抗聲高歌悉是説劍之意俄自臂間抽出两物展而喝之即两口劍躍起在寂頭上􅌉旋交擊寂甚驚駭尋而収匣之飲畢就寝迨曉乃空榻也至日中復有一頭陀僧來尋此夫婦寂具道之僧曰我亦其人也道士能學之乎時寂按道服也寂辭曰少尚𤣥學不願為此其僧傲然而笑乃取寂净水拭脚徘徊間不見爾後再於華隂遇之始知其俠也杜光庭自京入蜀宿於梓潼㕔有一僧繼至縣宰周某與之有舊乃云今日自興元來杜異之明發僧遂前去宰謂杜曰此僧乃鹿盧蹻亦俠之𩔖也詩僧齊已於溈山松下親遇一僧於頭指甲下抽岀兩口劔跳躍凌空而去出北夢瑣言丁秀才朗州道士羅少微頃在茅山紫陽觀寄泊有丁秀才者亦同寓於觀中舉動風味無異常人然不汲汲於仕進盤桓數年觀主亦善遇之冬之夜霰雪方甚二三道士圍爐有肥羜美醖之羡丁曰致之何難時以為戲俄見開户奮袂而去至夜分蒙雪而迴提一銀榼酒熟羊一足云浙帥厨中物由是驚訝歡笑擲劔而舞騰躍而去莫知所往惟銀榼存焉觀主以狀聞於縣官詩僧貫休俠客詩云黄昏風雨黒如磐别我不知何處去得非江淮間曽聆此事而搆思也出北夢瑣言太平廣記卷一百九十六
