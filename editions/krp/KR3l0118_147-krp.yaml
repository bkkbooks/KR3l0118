body:
  text: 太平廣記卷一百四十七定數二田預王晙高智周王儦裵伷先張文瓘𡊮嘉祚齊澣張守珪裵有敞王超張齊丘馮七言事桓臣範張嘉貞僧金師田預唐奉御田預自云少時見奚三兒患氣疾寢食不安田乃請與診候岀一飲子方劑愈三兒大悦云公既與某盡心治病某亦當與公盡心以定貴賤可住宿既至曉命紙錄一生官祿至第四政云作橋陵丞時未有此官田詰之對云但至時自有此官岀又云當二十四年任奉御及大帝崩田果任橋陵丞後爲奉御二十四年而改岀定命錄王晙王晙任渭南已數載自云乆厭此縣但得蒲州司馬可矣時奚三兒從北來見一鬼云送牒向渭南報明府改官問何官云改蒲州司馬便與相隨來渭南見晙云公即改官爲蒲州司馬當時鬼在㕔堦下曲躬立三兒言訖走岀果三數日改蒲州司馬改後二十餘日敕不到問三兒三兒後見前鬼問故鬼云緣王在任賸請官錢所以折除今折欲盡至某時當得上後驗如其言岀定命錄高智周高智周義興人也少與安陸郝處俊廣陵來濟富陽孫處約同寓於石仲覽仲覽宣城人而家於廣陵破産以待此四人其相遇甚厚嘗夜臥因各言其志處俊先曰願秉衡軸一日足矣智周來濟願亦當然處約於被中遽起曰丈夫樞軸或不可冀願且爲通事舍人殿庭周旋吐納足矣仲覽素重四人嘗引相工視之皆言貴極人臣顧視仲覽曰公因四人而達後各從官州郡來濟已領吏部處約以瀛州書佐因選引時隨銓而注濟見約遽命筆曰如志如志乃注通事舍人注畢下階敘平生之言亦一時之羙也智周嘗出家為沙門鄉里惜其才學勉以進士充賦擢第授越王府參軍累遷費縣令與佐官均分俸錢遷秘書郎累遷中書侍郎知政事拜銀青光祿大夫智周聰慧舉朝無比日誦數萬言能背碑覆局淡泊於冠冕每辭職輒遷贈越州都督諡曰定出御史臺記王儦唐太子通事舍人王儦曰人遭遇皆繫之命緣業先定吉凶乃來豈必誡愼昔天后誅戮皇宗宗子繫大理當死宗子歎曰既不免刑焉用汚刀鋸夜中以衣領自縊死曉而蘇遂言笑飲食不異在家數日被戮神色不變初蘇言曰始死㝠官怒之曰爾合戮死何為自來速還受刑宗子問故官示以㝠簿及前世殺人今償對乃畢報宗子既知故受害無難色出紀聞裵伷先工部尚書裵伷先年十七為太僕寺丞伯父相國炎遇害伷先廢為民遷嶺外伷先素剛痛伯父無罪乃於朝廷封事請見面陳得失天后大怒召見盛氣以待之謂伷先曰汝伯父反干國之憲自貽伊戚爾欲何言伷先對曰臣今請為陛下計安敢訴寃且陛下先帝皇后李家新婦先帝棄世陛下臨朝為婦道者理當委任大臣保其宗社東宫年長復子明辟以塞天人之望今先帝登遐未幾遽自封崇私室立諸武為王誅斥李宗自稱皇帝海内憤惋蒼生失望臣伯父至忠於李氏反誣其罪戮及子孫陛下為計若斯臣深痛惜臣望陛下復立李家社稷迎太子東宫陛下高枕諸武獲全如不納臣言天下一動大勢去矣産禄之誡可不懼哉臣今為陛下用臣言未晚天后怒曰何物小子敢發此言命牽出伷先猶反顧曰陛下採臣言實未晚如是者三天后令集朝臣於朝堂杖伷先至百長隸攘州伷先解衣受杖笞至十而伷先死數至九十八而蘇更二笞而畢伷先瘡甚臥驢輿中至流所卒不死在南中數歲娶流人盧氏生男愿盧氏卒伷先攜愿潛歸鄉歲餘事發又杖一百徙北庭貨殖五年致資財數千萬伷先賢相之姪往來河西所在交二千石北庭都䕶府城下有夷落萬帳則降胡也其可汗禮伷先以女妻之可汗唯一女念之甚贈伷先黃金馬牛羊甚衆伷先因而致門下食客常數千人自北庭至東京累道致客以取東京息耗朝廷動静數日伷先必知之時補闕李秦授寓直中書封事曰陛下自登極誅斥李氏及諸大臣其家人親族流放在外者以臣所料且數萬人如一旦同心招集為逆出陛下不意臣恐社稷必危䜟曰代武者劉夫劉者流也陛下不殺此輩臣恐為禍深焉天后納之夜中召入謂曰卿名秦授天以卿授朕也何啓予心即拜考功員外郎仍知制誥敕賜朱紱女妓十人金帛稱是與謀發敇使十人於十道安慰流者其實賜墨敇與牧守有流放者殺之敕既下伷先知之會賓客計議皆勸伷先入胡伷先從之日晚舍於城外因裝時有鐵騎果毅二人勇而有力以罪流伷先善待之及行使將馬裝槖馳八十頭盡金帛賓客家僮從之者三百餘人甲兵備曳犀超乘者半有千里足馬二伷先與妻乘之装畢遽發料天曉人覺之已入虜境矣既而迷失道遲明唯進一舍乃馳既明候者言伷先走都䕶令八百騎追之妻父可汗又令五百騎追焉誡追者曰舍伷先與妻同行者盡殺之貨財為賞追者及伷先於塞伷先勒兵與戰麾下皆殊死日昏二將戰死殺追騎八百人而伷先敗縛伷先及妻於槖馳將至都䕶所既至械繫穽中具以状聞待報而使者至召流人數百皆害之伷先以未報故免天后度流人已死又使使者安撫流人曰吾前使十道使安慰流人何使者不曉吾意擅加殺害深為酷暴其輒殺流人使並所在鏁項將至害流人處斬之以快亡魂諸流人未死或他事繫者兼家口放還由是伷先得免乃歸鄉里及唐室再造宥裵炎贈以益州大都督求其後伷先乃出焉授詹事丞歲中四遷遂至秦州都督再節制桂廣一任幽州帥四為執金吾一兼御史大夫太原京兆尹大府卿凡任三品官向四十政所在有聲績號曰唐臣後為工部尚書東京留守薨壽八十六出紀聞張文瓘張文瓘少時曽有人相云當為相然不得堂飯食喫及在此位每昇堂欲食即腹脹痛霍亂每日唯喫一椀漿水粥後數年因犯堂食一頓其夜便卒出定命錄袁嘉祚袁嘉祚為滑州别駕在任得清状出接蕭岑二相自言二相叱之曰知公好蹤跡何乃躁求袁慚退因於路旁樹下休息有二黃衣人見而笑之袁問何笑二人曰非笑公笑彼二相耳三數月間並家破公當斷其罪耳袁驚而問之忽而不見數日敕除袁刑部郎中經旬月二相被收果為袁公所斷出定命錄齊澣東京玩敲師與侍郎齊澣遊往齊自吏部侍郎而貶端州高安縣尉僧云從今十年當却迴亦有權要後如期入為陳留採訪使師嘗云侍郎前身曽經打殺兩人今被謫罪所以十年左降出定命錄張守珪張守珪曽有人錄其官祿十八政皆如其言及任括州刺史疾甚猶謂人曰某當為涼州都督必應未死既而腦發瘍瘡甚乃曰某兄弟皆有此瘡而死必是死後贈涼府都督遂與官吏設酒而别并作遺書病五六日卒後果贈涼府都督出定命錄裵有敞唐杭州刺史裵有敞疾甚令錢唐縣主簿夏榮看之榮曰使君百無一慮夫人早須崇福禳之耳崔夫人曰禳須何物榮曰使君娶二姬以壓之出三年則危過矣夫人怒曰此獠狂語兒在身無病榮退曰夫人不信榮不敢言使君合有三婦若不更娶於夫人不祥夫人曰乍可死此事不相當也其年夫人暴亡敞更取二姬榮言信矣出朝野僉載王超王超者嘗為汜水縣令嚴損之曰公從此為京官訖即為河北二太守後果入為著作郎出為眞定太守又改為京城守超又謂汜水令嚴迥云公冝修福嚴不信果被人訴解官除名配流而身亡也出定命錄張齊丘張齊丘妻懷姙過期數月不産謂是病方欲合藥療之呉郡尼寶珠見之曰愼勿服藥後必生一衛佐既而果生男齊丘貴後恩勅令與一子奉御官齊丘奏云兩姪早孤願與姪帝嘉之令别與兩姪六品已下官齊丘之子仍與東宫衛佐年始十歲出定命錄馮七言事陳留郡有馮七者能飲酒每飲五㪷言事無不中者無何語郡佐云城中有白氣郡守當死太守裵郭復聞而召問馮七云其氣未全急應至半年已來裵公即經營求改改後韋恒為太守未到而卒人問得應否曰未尋又張利貞主郡卒於城中杜華嘗見陳留僧法晃云開封縣令沈庠合改畿令十五月作御史中丞華信之又遇馮七問焉馮七云沈君不踰十日皆不之信經數日沈公以病告杜華省之沈云但苦頭痛忍不堪數日而卒出定命錄桓臣範汝州刺史桓臣範自說前任刺史入考行至常州有暨生者善占事三日飲之以酒醉至四日乃將拌米并火炷來暨生以口銜火炷忽以伸言其時有東京緱氏荘奴婢初到桓問以莊上有事暨生云此莊姓盧不姓桓見一奴又云此奴即走仍偷兩貫錢見一婢復云此婢即打頭破血流桓問今去改得何官暨生曰東北一千里外作刺史須愼馬厄及行至揚府其奴果偷兩千而去至徐州界其婢與夫相打頭破血流至東京改瀛州刺史方始信之常愼馬厄及至郡因拜跪左脚忽痛遂行不得有一人云解針針訖其腫轉劇連膝焮痛遂請告經一百日停官其針人乃姓馬被上佐械繫責之言馬厄者即此人也歸至東都於伊闕住其緱氏莊賣與盧從愿方知諸事無不應者桓公自此信命不復營求岀定命錄張嘉貞張嘉貞未遇方貧困時曽於城東路見一老人賣卜嘉貞訪焉老人乃黏紙兩卷具錄官祿從始至末仍封令勿開每官滿即開看之果皆相當後至宰相某州刺史及定州刺史病重將死乃云吾猶有一卷官祿未開豈能即死今既困矣試令開視乃一卷内並書空字張果卒也出定命錄僧金師睢陽有新羅僧號金師謂錄事參軍房琬云太守裵寛當改琬問何時曰明日日午勅書必至當與公相見於郡西南角琬專候之午前有驛使而封牒到不是琬以為謬也至午又一驛使送牒來云裵公改為安陸别駕房遽命駕迎僧身又自去果於郡西南角相遇裵召問之僧云官雖改其服不改然公甥姪各當分散及後敕至除别駕紫紱猶存甥姪之徒各分散矣出定命錄太平廣記卷一百四十七
