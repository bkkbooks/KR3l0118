body:
  text: 太平廣記卷一神仙一老子木公廣成子黄安孟岐老子老子者名重耳字伯陽楚國苦縣曲仁里人也其母感大流星而有娠雖受氣天然見於李家猶以李為姓或云老子先天地生或云天之精魄盖神靈之屬或云母懐之七十二年乃生生時剖母左腋而出生而白首故謂之老子或云其母無夫老子是母家之姓或云老子之母適至李樹下而生老子生而能言指李樹曰以此為我姓或云上三皇時為𤣥中法師下三皇時為金闕帝君伏羲時為鬱華子神農時為九靈老子祝融時為廣夀子黄帝時為廣成子顓頊時為赤精子帝嚳時為禄圖子堯時為務成子舜時為尹夀子夏禹時為真行子殷湯時為錫則子文王時為文邑先生一云守藏史或云在越為范蠡在齊為鴟夷子在吳為陶朱公皆見於羣書不出神仙正經未可據也葛稚川云洪以為老子若是天之精神當無世不出俯尊就卑委逸就勞背清澄而入臭濁棄天官而受人爵也夫有天地則有道術道術之士何時暫乏是以伏羲以來至于三代顯名道術世世有之何必常是一老子也皆由晚學之徒好竒尚異茍欲推崇老子故有此説其實論之老子盖得道之尤精者非異𩔖也按史記云老子之子名宗事魏為將軍有功封於段至宗之子注注之子宫宫之𤣥孫瑕仕於漢瑕子解為膠西王太傅家於齊則老子本神靈耳淺見道士欲以老子為神異使後代學者從之而不知此更使不信長生之可學也何者若謂老子是得道者則人必勉力競慕若謂是神靈異𩔖則非可學也或云老子欲西度關關令尹喜知其非常人也從之問道老子驚怪故吐舌聃然遂有老聃之號亦不然也今按九變及元生十二化經老子未入關時固已名聃矣老子數易名字非但一聃而已所以爾者按九宫及三五經及元辰經云人生各有厄㑹到其時若易名字以隨元氣之變則可以延年度厄今世有道者亦多如此老子在周乃三百餘年二百年之中必有厄㑹非一是以名稍多耳欲正定老子本末故當以史書實録為主并考仙經祕文以相叅審其他若俗説多虗妄洪按西昇中胎及復命苞及珠韜玉機金篇内經皆云老子黄白色美眉廣顙長耳大目疎齒方口厚唇額有三五達理日角月懸鼻純骨䨇柱耳有三漏門足蹈二五手把十文以周文王時為守藏史至武王時為柱下史時俗見其乆夀故號之為老子夫人受命自有通神逺見者稟氣與常人不同應為道主故能為天神所濟衆仙所從是以所出度世之法九丹八石金醴金液次存𤣥素守一思神歴藏行氣錬形消災辟惡治鬼飬性絶穀變化厭勝教戒役使鬼魅之法凡九百三十卷符書七十卷皆老子本起中篇所記者也自有目録其不在此數者皆後之道士私所増益非真文也老子恬淡無欲専以長生為務者故在周雖乆而名位不遷者盖欲和光同塵内實自然道成乃去盖仙人也孔子常往問禮先使子貢觀焉子貢至老子告之曰子之師名丘相從三年而後可教焉孔子既見老子老子告之曰良賈深藏若虛君子盛徳若愚去子之驕氣與多欲淫志是皆無益於子也孔子讀書老子見而問之曰何書曰易也聖人亦讀之老子曰聖人讀之可也汝曷為讀之其要何説孔子曰要在仁義老子曰蚊虻噆膚通夕不得眠今仁義慘然而汨人心亂莫大焉夫鵠不日浴而白烏不日染而黒天之自髙矣地之自厚矣日月自明矣星辰固自列矣草木固有區矣夫子修道而趨則以至矣又何用仁義若擊皷以求亡羊乎夫子乃亂人之性也老子問孔子曰亦得道乎孔子曰求二十七年而不得也老子曰使道可獻人則人莫不獻之其君使道而可進人則人莫不進之其親矣使道可告人則人莫不告之兄弟矣使道可傳人則人莫不傳之其子矣然而不可者無他也中無主而道不可居也孔子曰丘治詩書禮樂易春秋誦先王之道明周召之迹以干七十餘君而不見用甚矣人之難説也老子曰夫六藝先王之陳迹也豈其所陳哉今子所修者皆因陳迹也迹者履之出而迹豈異哉孔子歸三日不談子貢怪而問之孔子曰吾見人之用意如飛鳥者吾飾意以為弓弩射之未嘗不及而加之也人之用意如麋鹿者吾飾意以為走狗而逐之未嘗不銜而頓之也人之用意如淵魚者吾飾意以為鈎緡而投之未嘗不釣而制之也至於龍乗雲氣遊太清吾不能逐也今見老子其猶龍乎使吾口張而不能翕舌出而不能縮神錯而不知其所居也陽子見於老子老子告之曰虎豹之文猿猱之㨗所以致射也陽子曰敢問明王之治老子曰明王之治功盖天下而以不自已化被萬物而使民不恃其有徳而不稱其名位乎不測而遊乎無有者也老子將去而西出關以昇崑崙關令尹喜占風氣逆知當有神人來過乃掃道四十里見老子而知是也老子在中國都未有所授知喜命應得道乃停關中老子有客徐甲少賃於老子約日雇百錢計欠甲七百二十萬錢甲見老子出關遊行速索償不可得乃倩人作辭詣關令以言老子而為作辭者亦不知甲巳随老子二百餘年矣唯計甲所應得直之多許以女嫁甲甲見女美尤喜遂通辭於尹喜得辭大驚乃見老子老子問甲曰汝乆應死吾昔賃汝為官卑家貧無有使役故以太𤣥清生符與汝所以至今日汝何以言吾吾語汝到安息國固當以黄金計直還汝汝何以不能忍乃使甲張口向地其太𤣥真符立出於地丹書文字如新甲成一聚枯骨矣喜知老子神人能復使甲生乃為甲叩頭請命乞為老子出錢還之老子復以太𤣥符投之甲立更生喜即以錢二百萬與甲遣之而去并執弟子之禮具以長生之事授喜喜又請教誡老子語之五千言喜退而書之名曰道徳經焉尹喜行其道亦得仙漢竇太后信老子之言孝文帝及外戚諸竇皆不得不讀讀之皆大得其益故文景之世天下謐然而竇氏三世保其榮寵太子太傅疏廣父子深逹其意知功成身退之義同日棄官而歸散金布惠保其清貴及諸隱士其遵老子之術者皆外損榮華内飬生夀無有顛沛於險世其洪源長流所潤洋洋如此豈非乾坤所定萬世之師表哉故莊周之徒莫不以老子為宗也出神仙傳木公木公亦云東王父亦云東王公盖青陽之元氣百物之先也冠三維之冠服九色雲霞之服亦號玉皇君居於雲房之間以紫雲為盖青雲為城仙童侍立玉女散香真僚仙官巨億萬計各有所職皆稟其命而朝奉翼衞故男女得道者名籍所𨽻焉昔漢初小兒于道歌曰著青裙入天門揖金母拜木公時人皆不識唯張子房知之乃再拜之曰此乃東王公之玉童也盖言世人登仙皆揖金母而拜木公焉或云居東極大蘆中有山焉以青玉為室深廣數里僚薦真仙時往謁九靈金丹一嵗再遊其宫共校定男女真仙階品功行以昇降之總其行籍而上奏元始中開玉晨以稟命於老君也天地刼歴隂陽代謝世運興廢陽九百六舉善黜惡靡不由之或與一玉女更投壺焉每投一投十二百梟設有入不出者天為􅦍呼監切嘘􅦍嘘者言開口而笑也梟而脱悞不接者天為之嗤儒者記而詳焉所謂王者乃尊為貴上之稱非其氏族也世人以王父王母為姓斯亦誤矣出仙傳拾遺廣成子廣成子者古之仙人也居崆峒之山石室之中黄帝聞而造焉曰敢問至道之要廣成子曰爾治天下禽不待候而飛草木不待黄而落何足以語至道黄帝退而閒居三月後往見之膝行而前再拜請問治身之道廣成子答曰至道之精杳杳𠖇𠖇無視無聽抱神以静形將自正必靜必清無勞爾形無揺爾精乃可長生慎内閉外多知為敗我守其一以處其和故千二百嵗而形未嘗衰得我道者上為皇失吾道者下為土將去汝入無窮之門游無極之野與日月叅光與天地為常人其盡死而我獨存矣出神仙傳黄安黄安代郡人也為代郡卒云卑猥不獲處人間執鞭推荆讀書畫地以記數一夕地成池時人謂安舌耕年可八十餘彊視若童子常服硃砂舉體皆赤冬不著衣坐一龜廣長三尺時人問此龜有㡬年矣曰昔伏羲始造網罟得此龜以授吾其龜背已平矣此蟲畏日月之光二千年則一出頭我坐此蟲已五出頭矣行則負龜而趨世人謂安萬嵗矣出洞𠖇記孟岐孟岐清河之逸人年可七百嵗語及周初事了然如目前岐時侍周公升壇上岐以手摩成王足周公以玉笏與之岐常寳執每以衣裾拂拭笏厚七分今鋭欲折恒餌桂葉聞漢武帝好仙披草萊而來武帝厚待之後不知所之出洞𠖇記太平廣記卷一
