body:
  text: 太平廣記巻四百四十三宋李昉等編畜獸十麈呉唐李嬰麞劉憣鹿蒼鹿科藤銅環鹿馬紫石陸紹第唐𤣥宗彭世鹿娘張盍蹋車甲嵩山老僧王祐雜説嵐州楊邁麈呉唐呉唐者廬陵人也少好射獵矢不虚發嘗方春將其子出獵乃值一麈將麑戲焉麈覺有人氣引麑潜去麑未知所畏因前就唐唐射之而死麈驚還悲鳴唐乃置麑净地自藏草中麈來俯䑛頓伏唐又射之應弦而倒既而又逢一麈張弩之間箭忽自發激中其子唐即投弓抱子撫膺而哭忽聞空中呼曰呉唐麈之愛子與汝何異驚視左右虎從旁出遥前搏折其臂還家一宿而卒出宣室志李嬰有李嬰者與弟縚皆善用弩曾射得一麈解其四脚懸置𣗳間剖以為炙立於火上方欲共食忽見山下有一神人長三丈許鼓歩而來手持大囊既至悉斂肉及皮骨并列火上者於囊中逕還山去嬰與弟縚驚駭莫知所措後竟無他出蟠雜説麞劉憣青州有劉憣者元嘉初射得一麞剖腹以草塞之蹶然而起俄而前走憣怪而㧞其塞草須叟還卧如此三焉憣宻錄此種以求其𩔖理創多騐出述異記鹿蒼鹿鹿千年為蒼鹿又五百年為白鹿又五百年化為𤣥鹿漢成帝時中山人得𤣥鹿烹而視其骨皆黒色仙方云𤣥鹿為脯食之壽至二千歳餘干縣有白鹿土人傳千嵗矣晉成帝遣人捕得有銅牌鐫字在角後云寳鼎二年臨江所獻蒼鹿出述異記科藤合浦康頭山有鹿額上戴科藤一枚四條直上各丈許出交州記雷郡有鹿腥無味不可食俗云海魚所化郡人嘗見魚首而身為鹿者斯信矣與鷹鳩雀雉之化奚異哉出投荒雜錄銅環胡向為虢州時獵人殺一鹿重一百八十斤蹄下貫銅環環上有篆字博物者不能識闕鹿馬洮陽縣東有華山去縣九十里廻跨峙堞峰嶺參差昔有人因獵見二鹿其一者霜毛純素照耀山谷一者五彩成文煥爛曜日獵人驚其竒異而不射前行數里見一人訶責云使君何來不見二馬耶答云唯見雙鹿曰吾為虞帝所使至衡山與安邱道士相聞君所見鹿是吾馬也出録異記紫石晉安有東山樵人陳氏恒見山中有火光燭天伺之久乃見一大鹿光自口出設罝捕而獲之剖其腹得一紫石圓瑩如珠因寳藏之家自是富至其孫奢縱好酒醉而玩其珠以為石何神因擊碎之家自是貧矣出稽神録陸紹第唐虞部郎中陸紹第為盧氏縣尉掌時獵遇鹿五六頭臨澗見人不驚毛斑如畫陸怪獵人不射問之獵者言此是仙鹿也射之不能傷且復不利陸不信強之獵者不得已一發矢鹿帶箭而去及返射者墜崖折左足出酉陽雜俎唐𤣥宗開元二十三年秋𤣥宗皇帝狩于近郊駕至咸陽原有大鹿興于前贔然其軀頗異于常者上命弓射之一發而中及駕還乃勅厨吏炙其䏶已進而尚食具熟俎獻時張果老先生侍上命果坐于前以其肉賜之果謝而食旣食且奏曰陛下以此鹿為何如上曰吾只知其鹿也亦未知何如哉果曰此鹿年且千歲矣陛下幸問臣上笑曰此一獸耳何遂言其千歲耶果曰昔漢元狩五年秋臣侍武帝畋于上林其從臣有生獲此鹿而獻者帝以示臣奏曰此仙鹿也壽將千歲今旣生獲不如活之㑹武帝尚神仙由是納臣之奏上曰先生紿矣且漢元狩五年及今八百歲其鹿長壽豈歴八百歲而不為畋所獲乎况苑囿内麋鹿亦多今所獲何妨為他鹿乎果曰曩時武帝旣獲此鹿將捨去之且命東方朔以練銅為牌刻成文字以識其年系于左角下願得騐之庶表臣之不誣也上即命置鹿首于前詔内臣高力士騐之凡食頃曾無所見上笑曰先生果謬矣左角之下銅牌安在果曰臣請自索之即顧左右命銕鉗鉗出一小牌實銅製者可二寸許葢以年月悠久為毛革蒙蔽始不見耳持以進上命磨瑩視之其文字刓弊不可識矣上於是信果之不謬又問果曰漢元狩五年甲子何次史編何事吾將徴諸記傳先生第為我言之果曰是歲歲次癸亥武帝始開昆明池用習水戰因蒐狩以順禮焉迨今甲戍歲八百五十二年上即命按漢史其昆明池果元狩五年所開其甲子亦無差上顧謂力士曰異乎哉張果能言漢武時事眞所謂至人矣吾固不可得而知也出宣室志彭世鄱陽樂安彭世晉咸康中以獵射為業每入山與子俱行後忽蹷然而倒化成一鹿跳躍而去其子終身不復弋獵至孫却習其事曽射一鹿兩角間有道家七星符并其祖名字及鄉居年月焉覩之悔懊自此永㫁射獵出異苑記鹿娘常州江隂縣東北石筏山者梁時有伐材人入此山見有麀鹿産仍聞小兒啼聲徃視見産一女子因收取養之及長乃令出家為道士時人謂之鹿娘梁武帝為置觀名為聖觀出洽聞記張盍蹋昔張盍蹋寗成二人並出家于蜀雲䑓山石室中忽有一人着黄練單衣葛巾到其前曰勞乎道士因以鏡照之見是一鹿遂責問之曰汝草中老鹿何敢詐為人形言訖化成老鹿而走去出抱朴子車甲陶潜捜神記曰有一士人姓車是淮南人天雨舍中獨坐忽有二年少女來就之着紫纈襦立其牀前共語笑車疑之天雨如此女人從外來而衣服何不沾濕必是異物其壁上先掛一銅鏡徑數寸回顧鏡中有二鹿在牀前因將刀斫之而悉成鹿一走去獲一枚以為脯食之出五行記嵩山老僧嵩山内有一老僧結茅居薜蘿間修持不出忽見一小兒獨叅禮懇求為弟子僧但誦經不顧其小兒自旦至暮不退僧乃問之曰此深山内人跡甚稀小兒因何至又因何求為弟子小兒曰本居山前父母皆䘮幼失所依必是前生不修善果所致今是以發願捨離塵俗來求我師寔欲修來世福業也僧曰能如是耶其奈僧家寂寞不同于俗人志願雖嘉能從道心惟一乎小兒曰若心與言違皇天后土自不容耳不唯我師不容也僧察其敏悟知有善縁遂與落髪小兒為弟子後精進勤劬罕有倫等或演法于僧僧不能對或問道于僧僧不能折老僧深重之以為聖賢也後數年時在素秋萬木凋落凉風悲起磎谷凄清忽慨然四望朗吟曰我本長生深山内更何入他不二門争如訪取舊時伴休更朝夕勞神魂吟訖復長嘯良久有一羣鹿過小兒躍然脫僧衣化一鹿跳躍隨羣而去出瀟湘録王祜岐州西二十里王祜者豪富之家也第宅華麗擬于貴顯常開舘舍以待徃來至于珍饌芳醪雖有千人詣之曽不缺乏忽一日有一道士謁祜自稱華山道士學眞㩦一張琴負一壺藥來求寄泊祜性且好道既問之忻然出迎延于深院敬待倍常道士問祜曰君如是富足敵侯伯之樂也福則福矣其如不賢祜笑而起拜道士曰君設食于門下以俟賢俊耶以待餓者而飼之耶若以待餓方今天下安樂餘糧栖畆人無乏絶又何飼之若以俟賢俊則不聞君延一賢揖一俊足以知君自不賢耳無訝我言我恐君有憑痴之名喧譁于人口故以此直言以悟君亦縁感君倍常敬仰我也祜遂慨然動容再拜之道士又曰我聞人之好樂必有其師事縱横者寔存遊說之志讀孫吳者那無爭戰之心哉某手携一張琴負一壺藥者豈獨欲勞頓也抑有㫖耳携琴者我知琴有古風欲人知我好古又欲化人還淳朴省澆浮也負藥壺者我知人之多病欲人知我有痊平人病之意也我琴非止自化也化人也我藥非止痊自病也痊人病也噫君之富濟于人與夫家累千金剥割人者則殊如以古之豪貴之家待士則怍矣必以賢愚有别慎保身名無反招謗耳祜復再拜道士乃命酒自酌纔曙遽辭而去祜令人潛偵之見道士化一大鹿西走不知所之出瀟湘録雜說江陵松滋枝江村射鹿者率以淘河烏脛骨為管以鹿心上脂膜作簧吹作鹿聲有大號小號呦呦之異或作麀鹿聲則麚鹿畢集葢為牝聲所誘人得彀矢而注之南中多鹿每一牡管牝百頭至春羸痩葢遊牝多也及夏則唯食菖蒲一味却肥當角解之時其茸甚痛獵人逢之其鹿不敢逸走伏而不動獵者以繩繫其茸截而取之先以其血來噉然後斃鹿何其苦也歟夫狨麝孔雀以有用賈害良可愍之出北夢𤨏言兔嵐州永淳年嵐勝州暴千萬為羣食苖並盡不知何物變化及暴已即並失却莫知何所異哉出朝野僉載楊邁司農卿楊邁少好畋獵自云在長安時放鷹於野遥見草中一跳躍鷹亦自見即奮徃搏之既至無有收鷹上鞲行數十歩回顧其處復見走又搏之亦不獲如是者三即命芟草以求之得骨一具蓋之鬼也出稽神録太平廣記巻四百四十三
