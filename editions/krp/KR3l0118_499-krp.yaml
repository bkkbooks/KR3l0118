body:
  text: 太平廣記卷四百九十九宋李昉等編雜録崔鉉王鐸李蠙韋保衡衲衣道人路羣盧宏正畢諴李師望髙駢韋宙王氏子劉蛻皮日休郭使君李德權崔鉉崔鉉元略之子京兆參軍盧甚之死鉉之致也時議寃之鉉子沆乾符中亦為丞相黃巢亂赤其族物議以為甚之報焉初崔瑄雖諌官婚姻假回私事也甚雖府藏乃公事也相與爭驛㕔甚既下獄與宰相書則以己比孟子而方瑄錢鳳瑄既朋黨宏大莫不為盡力甚者出於單微加以鉉亦瑄之門生方為宰相遂加誣㒺奏焉瑄自左補闕出為陽翟宰甚行及長樂坡賜自盡中使適囘遇瑄囊出其喉曰補闕此盧甚結喉也瑄殊不懌京城不守崔氏之子亦血其族嗚呼謂天道髙何其明哉出聞竒録王鐸故相晋國公王鐸為丞郎時李駢判度支每年江淮運米至京水陸脚錢斗計七百京國米價每斗四十議欲令江淮不運米但每斗納錢七百鐸曰非計也若于京國糴米必耗京國之食若運米實關中自江淮至京兼濟無限貧民也時糴米之制業已行意無敢沮其議者都下官糴米果大貴未經旬而度支請罷次民無至者故也于是職者乃服鐸之察事矣鐸卒以此大用出聞竒録李蠙李蠙與王鐸進士同年後俱得路甞恐鐸之先相而已在其後也迨路巖出鎮益失其勢鐸柔弱易制中官愛焉洎韋保衡將欲大拜不能先於恩地將命鐸矣蠙隂知之挈一壺家酒詣鐸曰公將登庸矣吾恐不可以攀附也願先事少接左右可乎即命酒以飲鐸妻李氏疑其堇焉使𤣥奴傳言於鐸曰一身可矣願為妻兒謀蠙驚曰以吾斯酒為鴆乎即命一大爵自引滿飲之而去出玉泉子韋保衡韋保衡欲除裴修為省郎時李璋為右丞韋先遣盧望來申意探其可否李曰相公但除不合先問某盧以時相事權設為禮所沮則傷威重因勸韋勿除出盧氏説雜衲衣道人唐有士人退朝詣友生見衲衣道人在座不懌而去他日謂友生曰公好毳褐夫何也吾不知其言適且覺其臭友生答曰毳褐之外也豈甚銅乳銅乳之臭並肩而立接跡而趨公處其間曾不嫌耻乃譏予與山野有道之士遊乎南朝高人以蛙鳴及蒿菜勝鼓吹吾視毳褐愈于今之朱紫遠矣出國語路羣盧宏正中書舍人路羣與給事中盧宏正性相異而相善路清痩古淡未甞言市朝盧魁梧富貴未甞言山水路日謀高卧有制草則就宅視之盧未甞請告有客族則就省謁之雖所好不同而相親至一日都下大雪路在假盧將晏入道過新昌第路方于南垣茅亭肆目山雪鹿巾鶴氅搆火命觴以賞嘉致聞盧至大喜曰適我願兮亟命迎入盧金紫華煥意氣軒昂路道服而坐情趣孤潔路曰盧六盧六曾莫顧我何也盧曰月限向滿家食相仍日詣相庭以圗外任路色慘曰駕肩權門何至于是且有定分徒勞爾形家釀稍醇能一醉否盧曰省有急事俟吾决之路又呼侍兒曰盧六欲去持早來藥糜分二器我與盧六同食盧振聲曰不可路曰何也盧曰今旦飯冷且欲遐征家饌已食炮炙矣時人聞之以為路之高雅盧之俊邁各盡其性出唐缺史畢諴畢諴家本寒㣲咸通初其舅尚為太湖縣伍伯諴深耻之常使人諷令解役為除官反復數四竟不從命乃特除選人楊載為太湖令諴延之相第囑之為舅除其猥籍津送入京楊令到任具達諴意伍伯曰某賤人也豈有外甥為宰相耶楊堅勉之乃曰某每歳秋夏恒相享六十千事例錢茍無敗缺終身優足不審相公欲除何官耶楊乃具以聞諴諴亦然其説竟不奪其志也王蜀偽相庾傳素與其從弟凝績曾宰蜀州唐興縣郎吏有楊㑹者㣲有才用庾氏昆弟念之洎迭秉蜀政欲為楊㑹除馬長以酧之㑹曰某之吏役逺近皆知忝冐為官寧掩人口豈可將數千家供侍而博一虚名馬長乎後雖假職名止除檢挍官竟不捨縣役矣出北夢𤨏言李師望李師望乃宗屬也自負才能欲以方面為己任因旅遊卭蜀備知南蠻勇怯遂上書請割西川數州于臨卭建定邉軍節度詔旨允之乃以師望自鳳翔少尹擢領此任于時西川大將嫉其分裂巡屬除通南詔於是蠻軍為近之時鄉豪所道侵軼蜀川戎挍竇滂不能止遏師望亦因此受黜焉出紀聞高駢乾符中太尉高駢鎮蜀日因巡邊至資中郡舍於刺史衙對郡山頂上有開元佛寺是夜黄昏僧徒禮讚螺唄間作駢聞命軍候徃悉擒械之來晨笞背逐去召將吏謂之曰僧徒禮念亦無罪過但以此寺十年後當有秃丁數千作亂我故以是厭之其後土人皆髠髪執兵號大髠小髠據此寺為寨凌脅州將果叶所言時稱駢好妖術斯亦或然之驗歟出北夢𤨏言韋宙相國韋宙善治生江陵府東有别業良田美産最號膏腴積稻如坻皆為滯穂咸通初授嶺南節度使懿宗以番禺珠翠之地垂貪泉之戒宙從容奏曰江陵莊積糓尚有七千堆固無所貪矣帝曰此所謂足榖翁也出北夢𤨏言王氏子京輦自黄巢退後修葺殘毁之處時定州王氏有一兒俗號王酒胡居于上都巨富納錢三十萬貫助修朱雀門僖宗詔令重修安國寺畢親降車輦以設大齋乃扣新鐘十撞捨錢一萬貫命諸大臣各取意而擊上曰有能捨一千貫文者即打一槌齋罷王酒胡半醉入來逕上鐘樓連打一百下便于西市運錢十萬入寺出中朝故事劉蜕劉蜕桐廬人早以文學應進士舉其父嘗戒之曰任汝舉進取窮之與達不望于汝吾沒後慎勿祭祀乃乗扁舟以漁釣自娛竟不知其所適蛻後登華貫出典商於霜露之思于是乎止臨終亦戒其子如先考之命蜀禮部尚書纂即其息也常為同列言之君子曰名教之家重䘮祭劉氏先德是何人斯以蛻之通人抑有其說時未諭也出北夢𤨏言皮日休咸通中進士皮日休上書兩通其一請以孟子為學科其畧云臣聞聖人之道不過乎經經之降者不過乎史史之降者不過乎子子不異道者孟子也捨是而諸子必斥乎經史聖人之賊也文多不載請廢莊列之書以孟子為主有能通其義者科選請同明經其二請以韓愈配饗太學其畧曰臣聞聖人之道不過求用用于生前則一時可知也用于死後則萬世可知也又云孟子荀卿翼輔孔道以至于文中子文中子之道曠矣能嗣其美者其唯韓愈乎日休字襲美襄陽竟陵人幼攻文隐於鹿門山號醉吟先生初至塲中禮部侍郎鄭愚以其貎不揚戲之曰子之才學甚富其如一日何對曰侍郎不可以一日而廢二日謂不以人廢言也舉子咸推伏之官至國子博士寓蘇州與陸龜蒙為文友著文數十卷皮子三卷人多𫝊之為錢鏐判官出北夢𤨏言郭使君江陵有郭七郎者其家資産甚殷乃楚城富民之首江淮河朔間悉有賈客仗其貨買易徃來者乾符初年有一賈者在京都久無音信郭氏子自徃訪之既相遇盡獲所有僅五六萬緡生躭悅烟花迷于飲博三數年後用過大半是時唐李朝政多邪生乃輸數百萬于鬻爵者門以白丁易得横州刺史遂决還鄉時渚宫新罹王仙芝寇盗里閭人物與昔日殊生歸舊居都無舍宇訪其骨肉數日方知弟妹遇兵亂已亡獨母與一二奴婢處于数間茅舍之下囊槖蕩空旦夕以紉針為業生之行李間猶有一二千緡縁兹復得蘇息乃傭舟與母赴秩過長沙入湘江次永州北江墂有佛寺名兜率是夕宿于斯結䌫于大槦𣗳下夜半忽大風雨波翻岸崩樹臥枕舟舟不勝而沉生與一稍工拽舟登岸僅以獲免其餘婢僕生計悉漂于怒浪遲明投于僧室母氏以驚得疾數日而殞生慞惶馳徃零陵告州牧州牧為之殯塟且復贈遺之既丁憂遂寓居永郡孤且貧又無親識日夕厄于凍餒生少小素渉于江湖頗熟風水間事遂與徃來舟船執稍以求衣食永州市人呼為捉稍郭使君自是狀貌異昔共篙工之黨無别矣出南楚新聞李徳權京華有李光者不知何許人也以諛佞事田令孜令孜嬖焉為左軍使一旦奏授朔方節度使敕下翼日無疾而死光有子曰德權年二十餘令孜遂署劇職㑹僖皇幸蜀乃從令孜扈駕止成都時令孜與陳敬瑄盗專國柄人皆畏威李徳權者處于左右遐邇仰奉奸豪輩求名利多賂德權以為關節數年之間聚賄千萬官至金紫光禄大夫檢挍右僕射後敬瑄敗為官所捕乃脱身遁于復州衣衫百結丐食道途有李安者常為復州後槽健兒與父相熟忽覩德權念其藍縷邀至私舍安無子遂認以為姪未半載安且死德權遂更名彦思請繼李安効力葢慕彼衣食耳尋獲為牧守圉人有識者皆目之曰看馬李僕射出南楚新聞太平廣記卷四百九十九
