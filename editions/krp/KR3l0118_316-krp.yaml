body:
  text: 太平廣記卷三百一十六宋李昉等編鬼一韓重公孫達鮮于冀盧充談生陳蕃劉照張漢直范丹費季周式陳阿登韓重吳王夫差小女曰玉年十八童子韓重年十九玉恱之私交信問許爲之妻重學於齊魯之間屬其父母使求婚王怒不與玉結氣死葬閶門外三年重歸問其父母父母曰王大怒玉結氣死已葬矣重哭泣哀慟具牲幣往弔玉從墓側形見謂重曰昔爾行之後令二親從王相求謂必克從大願不圖别後遭命奈何玉左顧宛頸而歌曰南山有烏北山張羅志欲從君讒言孔多悲結生疾没命黄壚命之不造寃如之何羽族之長名爲鳳凰一日失雄三年感傷雖有衆鳥不爲匹雙故見鄙姿逢君輝光身逺心近何嘗暫忘歌畢歔欷涕流不能自勝要重還冢重曰死生異道懼有尤愆不敢承命玉曰死生異路吾亦知之然一别永無後期子將畏我爲鬼而禍子乎欲誠所奉寧不相信重感其言送之還冢玉與之飲讌三日三夜盡夫婦之禮臨出取徑寸明珠以送重曰既毁其名又絶其願復何言哉時節自愛若至吾家致敬大王重既出遂詣王自說其事王大怒曰吾女既死而重造訛言以玷穢亡靈此不過發家取物託以鬼神趣收重重脫走至玉墓所訴玉玉曰無憂今歸白王玉粧梳忽見王驚愕悲喜問曰爾何緣生玉跪而言曰昔諸生韓重来求玉大王不許今名毁義絶自致身亡重從逺還聞玉已死故齎牲幣詣冢弔唁感其篤終輒與相見因以珠遺之不爲發冢願勿推治夫人聞之出而抱之正如烟然出錄異傳公孫達任城公孫達甘露中陳郡卒官將歛兒及郡吏數十人臨喪達五歲兒忽作靈語音聲如父呵衆人哭止因呼諸子以次教誡兒等悲哀不能自勝乃慰勉之曰四時之運猶有始終人脩短殊誰不致此語千餘言皆合文章兒又問曰人亡皆無所知惟大人聰明殊特有神靈耶答曰鬼神之事非爾所知也因索紙筆作書辭義滿紙投地遂絶出列異傳鮮于冀後漢建武二年西河鮮于冀為清河太守作公廨未就而亡後守趙髙計功用二百萬五官黄秉功曹劉適言四百萬錢冀乃鬼見白日導從入府與髙及秉等對共計挍定為適秉所割匿冀乃書表自理其畧言髙貴不尚節畝壟之人而箕踞遺𩔖研密失機婢妾其性媚世求顯偷竊狠鄙有辱天官易譏負乗誠髙之謂臣不勝鬼言謹因千里驛聞付高上之便西北去三十里車馬皆滅不復見秉等皆伏地物故髙以狀聞詔下還冀西河田宅妻子焉兼為差代以弭幽中之訟出水經盧充盧充范陽人家西三十里有崔少府墓充年二十先冬至一日出宅西獵射麞中之麞倒復起充逐之不覺忽見道北一里許髙門瓦屋四周有如府舍不復見麞門中一鈴下唱客前有一人投一襆新衣曰府君以遺郎充著訖進見少府語充曰尊府君不以僕門鄙陋近得書為君索小女為婚故相迎耳便以書示充父亡時充雖小然已識父手跡即歔欷無復辭免便敇内盧郎已来便可使女粧嚴既就東廊至黄昏内白女郎粧嚴畢崔語充君可至東廊既至女已下車立席頭却共拜時為三日給食三日畢崔謂充曰君可歸女生男當以相還無相疑生女當留養敇内嚴車送客充便辭出崔送至中門執手涕零出門見一犢車駕青衣又見本所著衣及弓箭故在門外尋遣傳教將一人捉襆衣與充相問曰姻緣始爾此别悵恨何已今故致衣一襲被褥百副充上車去如電逝須㬰至家母見問其故充悉以狀對别後四年三月充臨水戲忽見旁有犢車乍沈乍浮既而上岸同坐皆見而充往開其車後戸見崔氏女與三歲男共載女抱兒以還充又與金椀并贈詩曰煌煌靈芝質光麗何猗猗華艷當時顯嘉異表神竒含英未及秀中夏罹霜萎榮耀長幽滅世路永無施不悟隂陽運哲人忽来儀今時一别後何得重㑹時充取兒椀及詩忽然不見充後乗車入市賣椀冀有識者有一婢識此還白大家曰市中見一人乗車賣崔氏女郎棺中椀大家即崔氏親姨母也遣兒視之果如婢言乃上車敘姓名語充曰昔我姨嫁少府女夫出而亡家親痛之贈一金椀著棺中可說得椀本末充以事對此兒亦為悲咽齎還白母母即令詣充家迎兒還諸親悉集兒有崔氏之状又復似充貌兒椀俱驗姨母曰我外甥也即字温休温休者是幽婚也遂成令器歴郡守子孫冠葢相承至今其後生植字子幹有名天下出捜神記談生談生者年四十無婦常感激讀詩經夜半有女子可年十五六姿顔服飾天下無雙来就生為夫婦且言我與人不同勿以火照我也三年之後方可照爲夫婦生一兒已二歲不能忍夜伺其寢後盜照視之其腰已上生肉如人腰下但有枯骨婦覺遂言曰君負我我垂生矣何不能忍一歳而竟相照也生辭謝涕泣不可復止云與君雖大義永離然顧念我兒若貧不能自偕活者暫隨我去方遺君物生隨之去入華堂室宇器物不凡以一珠袍與之曰可以自給裂取生衣裾留之而去後生持袍詣市睢陽王家買之得錢千萬王識之曰是我女袍此必發墓乃取拷之生具以實對王猶不信乃視女冢冢完如故發視之果棺蓋下得衣裾呼其兒正𩔖王女王乃信之即召談生復賜遺衣以為主壻表其兒以爲侍中出列異傳陳蕃陳蕃微時常行宿主人黄申家申婦夜産蕃不知夜三更有扣門者久許聞裏有人應云門裏有人不可前相告云從後門往俄聞往者還門内者問之見何兒名何當㡬歲還者云是男名阿奴當十五歳又問曰後當若為死答曰爲人作屋落地死蕃聞而不信後十五年爲豫章太守遣吏往問昔兒阿奴所在家云助東家作屋墮棟亡沒出幽明録劉照劉照建安中爲河間太守婦亡埋棺於府園中遭黄巾賊照委郡走後太守至夜夢見一婦人往就之後又遺一雙鎖太守不能名婦曰此萎㽔鎖也以金縷相連屈伸在人實珍物吾方當去故以相别慎無告人後二十日照遣兒迎喪守乃悟云云兒見鎖感慟不能自勝出録異傳張漢直陳國張漢直至南陽從京兆尹延叔堅學左氏傳行後數月鬼物持其妹爲之揚言曰我病死喪在陌上常苦飢寒操一二量不借掛屋後柱上傅子方送我五百錢在北牖下皆忘取之又買李幼牛一頭本券在書箧中往索悉如其言婦尚不知有此妹新歸寧非其所及家人哀傷益以爲審父母兄弟椎結迎喪去精舍數里遇漢直與諸生相隨漢直顧見家人怪其如此家見漢直良以爲鬼也惝怳有間漢直乃前爲父說其本末如此得知妖物之爲出風俗通范丹陳留外黄范丹字史雲少爲尉從佐使檄謁督郵丹有志節自恚爲厮役小吏及於陳留大澤中殺所乗馬捐棄官幘詐逢刼者有神下其家曰我史雲也爲刼人所殺疾取我衣於陳留大澤中家取得一幘丹遂之南郡轉入三輔從英賢游學十三年乃歸家人不復識焉陳留人髙其志行及殁號曰貞節先生出搜神記費季呉人費季客賈數年時道多刼妻常憂之季與同輩旅宿廬山下各相問去家㡬時季曰吾去家已數年臨来與妻别就求金釵以行欲觀其志當與吾否耳得釵仍以著户楣上臨發忘道此釵故當在户上也爾夕妻夢季曰吾行遇盜死已二年若不信吾言吾取汝釵遂不以行留在户楣上可往取之妻覺探釵得之家遂發喪後一年餘季行来歸還出捜神記周式漢下邳周式嘗至東海道逢一吏持一卷書求寄載行十餘里謂式曰吾暫有所過留書寄君船中慎勿發之去後式盜發視書皆諸死人録下條有式名須臾吏還式猶視書吏怒曰故以相吿何忽視之式叩頭流血良久曰感卿逺相載此書不可除卿今日已去還家三年勿出門可得度也勿道見吾書式還不出已二年餘家皆怪之鄰人卒亡父怒使往弔之式不得止適出門便見此吏吏曰吾令汝三年勿出而今出門知復奈何吾求不見連相爲得鞭杖今已見汝無可奈何後三日日中當相取也式還涕泣具道如此父故不信母晝夜與相守涕泣至三日日中時見来取便死出法苑珠林陳阿登漢會稽句章人至東野還暮不及門見路旁小屋然火因投宿至有一少女不欲與丈夫共宿呼鄰家女自伴夜共彈箜篌歌曰連綿葛上藤一緩復一絙汝欲知我姓姓陳名阿登明至東郭外有賣食母在肆中此人寄坐因說昨所見母驚曰此是我女近亡葬於郭外爾出靈怪集太平廣記卷三百一十六
