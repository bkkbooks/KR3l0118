body:
  text: 太平廣記卷二百四十諂佞二趙元楷閻知微鄭愔薛稷李嶠李義府侯思止盧藏用趙履温張岌吉頊宗楚客崔融崔湜用番將張説程伯獻楊國忠太眞妃李林甫趙元楷趙元楷為交河道行軍大總管時侯君集為元帥君集馬病顙瘡元楷以指霑其膿而嗅之以諛君集為御史所劾左遷刺史出談賔錄閻知微唐春官尚書閻知微和黙啜司賔丞田歸道為之副焉至牙帳下知微舞蹈宛轉抱黙啜靴鼻而嗅之田歸道獨長揖不拜黙啜大怒倒懸之經一宿明日將殺之元珍諫大國和親使殺之不祥乃得釋後與知微爭於殿庭言黙啜必不和知微堅執以爲和黙啜果反陷趙定天后乃誅知微九族拜歸道夏官侍郎出朝野僉載鄭愔唐吏部侍郎鄭愔初託附來俊臣俊臣誅即附張易之易之被戮即附韋庶人後附譙王竟被誅出朝野僉載薛稷唐太子少保薛稷雍州長史李晉中書令崔湜蕭至忠岑羲等皆外飾忠鯁内藏諂媚脅肩屛氣而䑛痔折肢阿附太平公主並騰遷雲路咸自以爲得志泰山之安也七月三日家破身戮何異鸋鴂栖於葦苕大風忽起巢折卵壞後之君子可不鑒哉出朝野僉載李嶠唐李嶠少負才華代傳儒學累官成均祭酒吏部尚書三知政事封鄭國公長壽三年則天徵天下銅五十餘萬斤鐵一百三十餘萬斤錢二百七千貫於定鼎門内鑄八稜銅柱高九十尺徑一丈二尺題曰大周萬國述德天樞張革命之功貶皇家之德天樞下置鐵山銅龍負戴獅子麒麟圍繞上有雲蓋蓋上施盤龍以托火珠珠高一丈圍三丈金彩熒煌光侔日月武三思爲其文朝士獻詩者不可勝紀唯嶠詩冠絶當峕詩曰轍跡光西山弇勲庸紀北燕何如萬國會諷德九門前灼灼臨黄道迢迢入紫烟仙盤正下露高柱欲承天山𩔖叢雲起珠疑大火懸聲流塵作刼業固海成田聖澤傾堯酒薰風入舜絃忻逢下生日還偶上皇年後憲司發嶠附會韋庶人左授滁州别駕後至開元初詔毁天樞發卒鎔爍彌月不盡洛陽尉李休烈乃賦詩以詠曰天門街東倒天樞火急先須卸火珠旣合一條絲線挽何勞兩縣索人夫先有謠云一條絲線挽天樞言其不久也故休詩及之庶士莫不諷誦天樞之北韋庶人繼造一臺先此毁拆出大唐新語李義府唐李義府狀貌溫恭與人語必嬉怡微笑而褊忌陰賊旣處權要欲人附已微忤意者輒加傾陷故峕人言義府笑中有刀楊行頴表言義府罪狀制令劉祥道對推其事李勣監焉按有實長流嶲州或作劉祥道破銅山之大賊李義府露布稱混奴婢而亂放各識家而競入出談賓錄侯思止唐侯思止貧窮不能理生業乃依事恒州叅軍髙元禮而無頼詭譎無以踰也峕恒州刺史裴貞杖一判司則天將不利王室羅織之徒已興矣判司謂思止曰今諸王多被誅戮何不告之思止因請状遂告舒王及裴貞謀反詔按問並族誅授思止游擊將軍元禮懼而思媚之引與同坐呼為侯大曰國家用人不次若言侯大不識字可奏云獬豸亦不識字而能觸邪則天果曰欲與汝御史人云汝不能識字思止以獬豸對則天大悦即授焉元禮復教曰聖上知侯大無宅倘以没官宅見借可拜謝而不受聖上必問所由可奏云諸反逆人宅惡其名不願坐其内果如言則天復大喜恩賞甚優出談賓録盧藏用盧藏用徴拜左拾遺遷吏部侍郎中書舍人歴黄門侍郎兼昭文舘學士轉尚書右丞與陳伯玉趙貞固友善隱居之日頗以貞白自衒往來于少室終南二山峕人稱為假隱自登朝奢靡淫縱車服鮮麗趦趄詭佞專事權貴峕議乃表其醜行以阿附太平公主流隴州出談賓録趙履温唐趙履温為司農卿諂事安樂公主氣勢囘山海呼吸變霜雪客謂張文成曰趙司農何如人曰猖獗小人心佞而險行僻而驕折支勢族䑛痔權門諂于事上傲于接下猛若虣虎貪如餓狼性愛食人終為人所食為公主奪百姓田園造定昆池言定天子昆明池也用庫錢百萬億斜褰紫衫為公主背挽金犢車險詖皆此𩔖誅逆韋之際上御承天門履温詐喜舞蹈稱萬歲上令斬之刀劒亂下與男同戮人割一臠骨肉俱盡出朝野僉載張岌唐天后峕張岌諂事薛師掌擎黄幞隨薛師後于馬旁伏地承薛師馬鐙侍御史郭覇嘗來俊臣糞穢宋之問捧張易之溺器並偷媚取容寔名教之罪人也出朝野僉載吉頊天后峕太常博士吉頊父哲易州刺史以賍坐死頊于天津橋南要内史魏王承嗣拜伏稱死罪承嗣問之曰有二妹堪事大王承嗣諾之即以犢車載入三日不語承嗣問其故對曰父犯國法憂之無復聊頼承嗣既奏免其父極刑進頊籠馬監俄遷中丞吏部侍郎不以才升二妹請求耳闕宗楚客唐天后内史宗楚客性諂佞峕薛師有嫪毐之寵遂為作傳二卷論薛師之聖從天而降不知何代人也釋迦重出觀音再生期年之間位至内史出朝野僉載崔融唐天后梁王武三思為張易之作傳云是王子晉後身于緱氏山立祠詞人才子佞者為詩以詠之舍人崔融為最後易之赤族佞者並流嶺南出朝野僉載崔湜唐崔挹子湜桓敬懼武三思讒間引湜為耳目湜乃反以桓敬等計潛告三思尋為中書令湜又説三思盡殺五王絶其歸望先是湜為兵部侍郎挹為禮部侍郎父子同為南省副貳有唐以来未之有也上官昭容屢出外湜諂附之𤣥宗誅蕭至忠後所司奏宮人元氏欵稱與湜曽密謀進鴆乃賜湜死年四十初湜與張説有隙説為中書令議者以為説搆陷之湜羙容儀早有才名弟液滌及從兄涖並有文翰列居清要每私宴之際自比王謝之家謂人曰吾之門地及出身歴官未嘗不為第一丈夫當先據要路以制人豈能默默受制于人故進取不已而不以令終又湜諂事張易之與韋庻人及韋誅復附太平有馮子都董偃之寵妻羙并二女並進儲闈得為中書侍郎平章事有牓之曰託庸才于主第進豔婦于青宮出朝野僉載用番將唐𤣥宗初即位用郭元振薛訥又八年而用張嘉貞張説五年而杜暹進又三年蕭嵩進又十二年而李適之進咸以大將直登三事李林甫既懲適之之患遂易舊制請以番人為將欲固其權嘗奏于上曰以陛下雄才兼國家富强而諸番未滅者由文吏為將怯懦不勝武事陛下必欲滅四夷威海内莫若武臣武臣莫若番將番將生而氣雄少養馬上長求陣敵此天性然也若陛下感而將之使其必死則夷狄不足圖也上大悦首用安祿山安禄山有功用哥舒翰有勇用安思順能軍用高仙芝善戰禄山卒為戎首林甫之罪也出談賓録張説唐燕國公張説倖佞人也前為并州刺史諂事特進王毛仲餉致金寶不可勝數後毛仲廵邊㑹説于天雄軍大宴酒酣恩敕忽降授兵部尚書同中書門下三品説拜謝訖便把毛仲手起舞嗅其靴鼻出朝野僉載程伯獻唐將軍高力士特承𤣥宗恩寵遭父䘮左金吾大將軍程伯獻少府監馮紹正二人直就其䘮前被髮而哭甚于巳親朝野聞之不勝其笑出談賓錄楊國忠𤣥宗謂侍臣曰我欲行一事自古帝王未有也蓋欲傳位于肅宗及制出國忠大懼言語失次歸語楊氏姊妺曰娘子我輩何用更作活計皇太子若監國我與姊妺等即死矣相聚而哭虢國入謀于貴妃妃銜土以請其事遂止哥舒翰在潼關或勸請誅國忠以悦衆心舒翰不聽禄山發范陽每日于帳前歎曰楊國忠頭来何太遲也國忠妻裴柔蜀之大娼也國忠又為劒南節度勸𤣥宗入蜀授其所親官布蜀漢出談賓録太眞妃太眞妃嘗因妬忌有語侵上上怒甚令高力士以輜車載送還其家妃悔恨號泣抽刀剪髪授力士曰珠玉珍異皆上所賜不足充獻唯髪父母所生可達妾意望為申妾萬一慕戀之誠上得髪揮涕泫然遽命力士召之歸出貴妃傳李林甫𤣥宗在東都宮中有怪明日召宰相欲西幸裴稷山張曲江諫曰百姓塲圃未畢請候冬間是峕李林甫初拜相竊知上意及罷退佯為蹇歩上問何故脚疾對曰臣非病足願獨奏事乃言二京陛下東西宮也將欲駕幸何用擇峕設有妨于刈穫獨免過路賦税臣請宣示有司即日西幸上大悦自此駕幸長安不復東矣旬日耀卿九齡俱罷而牛仙客進出國史𥙷又李林甫居相位一十九年誅鋤海内人望自儲君以下無不累息初開元後姚宋等一二老臣多獻可替否以爭天下大體天下既理上心亦泰張九齡上所㧞頗以後進少之九齡尤謇諤數犯上上怒而逐之上雄才豁達任人不疑晚得林甫養成君欲未嘗有逆耳之言上愛之遂深居高枕以富貴自樂大臣以下罕得對見事無大小責成林甫林甫雖不文而明練吏事愼守綱紀衣冠非常調無進用之門而隂賊忍殺未嘗以愛憎見于容色上左右者雖饔人厮養無不賂之故動靜輒知李適之初入相疎而不密林甫賣之乃曰華山之下有金鑛焉採之可以富國上未知之耳適之善其言他日從容以奏上悦顧問林甫林甫曰臣知之乆矣華山陛下本命也王氣所在不可發之故臣不敢言上遂薄適之因曰自今奏事先與林甫議之無輕脱自是適之束手矣非其所引進皆以罪誅威震海内諫官但持禄養資無敢論事獨補闕杜中猶再上疏翌日被黜為下邽令林甫召諸諫官謂曰今明主在上羣臣將順之不暇何用多言君不見立仗馬乎終日無聲而食三品料及其一鳴即黜去雖欲再鳴其可得乎由是諫諍之路絶矣晩年多寃讐懼其報復出廣車僕金吾靜街前驅百歩之外居則以磚甃屋以板幙牆家人警衛如禦大敵其自防也如此故事宰臣騎從三五人而已士庻不避于路至是騎從百餘人為左右翼公卿以下趨避自林甫始也出談賓録太平廣記卷二百四十
