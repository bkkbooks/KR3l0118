body:
  text: 太平廣記巻五十五神仙五十五寒山子軒轅彌明蔡少霞鄭居中伊用昌寒山子寒山子者不知其名氏大歴中隱居天台翠屏山其山深䆳當暑有雪亦名寒岩因自號寒山子好為詩每得一篇一句輒題於樹間石上有好事者隨而録之凡三百餘首多述山林幽隱之興或譏諷時態能警勵流俗桐柏徵君徐靈府序而集之分為三卷行於人間十餘年忽不復見咸通十二年毘陵道士李褐性褊急好凌侮人忽有貧士詣褐乞食褐不之與加以叱責貧者唯唯而去數日有白馬從白衣者共七人詣褐褐禮接之因問褐曰頗相記乎褐視其狀貌乃前之貧士也逡巡欲謝之慙未發言忽語褐曰子修道未知其門而好凌人侮俗何道可冀乎子頗知有寒山子邪答曰知曰即吾是矣吾始謂汝可教今不可也修生之道除嗜去欲嗇神抱和所以無累也内抑其心外檢其身所以無過也先人後已知柔守謙所以安身也善推於人不善歸諸身所以積徳也功不在大立之無怠過不在大去而不貳所以積功也然後内行充而外丹至可以冀道於髣髴耳子之三毒未翦以冠簪為飾可謂虎豹之鞟而犬豕之質也出門乘馬而去竟不復見出仙傳拾遺軒轅彌明軒轅彌明者不知何許人在衡湘間來往九十餘年喜捕逐鬼物能囚拘蛟螭虎豹人莫知其壽進士劉師服常於湘南遇之元和七年壬辰十二月四日將自衡山遊太白還京師與師服相値師服招其止宿有校書郎侯喜新有詩名擁爐夜坐與劉說詩彌明在其側貌極醜白鬂黑面長頸而高結喉中又作楚語喜視之若無人彌明忽掀衣張眉指爐中古鼎謂喜曰子云能詩與我賦此乎師服以衡湘舊識見其老貌頗敬之不知其有文也聞此說大喜即援筆而題其首兩句曰巧匠琢山骨刳中事煎烹次傳與喜喜踊躍而綴其下曰外苞乾蘚文中有暗浪驚題訖吟之彌明啞然笑曰子詩如是而已乎即袖手竦肩倚北牆坐謂劉曰吾不解世俗書子為吾書之因高吟曰龍頭縮菌蠢豕腹脹彭亨初不似經意詩旨有似譏喜二子相顧慙駭然欲以多窮之即賦兩句以授喜曰大若烈士胆圓如戴馬纓喜又成兩句曰在冷足自安遭焚意彌貞彌明又令師服書曰秋瓜未落蒂凍芋強抽萌師服又吟曰磨礲去圭角浮潤著光精訖又授喜喜思益苦務欲壓彌明每營度欲出口吻吟聲益悲操筆欲書將下復止亦竟不能奇曰旁有䨇耳穿上為孤髻撑吟竟彌明曰時於蚯蚓竅微作蒼蠅聲其不用意如初所言益奇不可附說語皆侵二子夜將䦨二子起謝曰尊師非常人也某等伏矣願為弟子不敢更詩彌明奮曰不然此章不可以不成也謂劉曰把筆把筆吾與汝就之即又連唱曰何當出灰灺無計離缾罌謬居鼎鼐間長使水火爭形模婦女笑度量兒童輕徒爾堅貞性不過升合盛寧依煖熱敝不與寒涼并忽罹翻溢愆實負任使誠陋質荷斟酌狹中愧提擎豈能煮仙藥但未汚羊羮區區徒自傚𤨏𤨏安足呈難比俎豆用不為手所撜願君勿嘲誚此物方施行師服書訖即使讀之畢謂二子曰此皆不足與語此寧為文耶吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也豈獨文乎哉吾閉口矣二子大懼皆起立牀下拜曰不敢他有問也願一言而已先生稱吾不解人間書敢問解何書請聞此而已累問不應二子不自得即退就坐彌明倚牆睡鼻息如雷鳴二子但恐失色不敢喘息斯須曙鼓鼕鼕二子亦困遂坐睡及覺驚顧已失彌明所在問童奴曰天且明道士起出門若將便旋然乆不返覔之已不見矣二子驚惋自責因携詩詣昌黎韓愈問此何人也愈曰余聞有隱君子彌明豈其人耶遂為石鼎聯句序行於代焉出仙傳拾遺蔡少霞蔡少霞者陳留人也性情恬和幼而奉道早歲明經得第選蘄州參軍秩滿漂寓江浙間久之再授兗州泗水丞遂於縣東二十里買山築室為終焉之計居處深僻俯瞰龜䝉水石雲霞境象殊勝少霞世累早絶尤諧夙尚偶一日沿溪獨行忽得美蔭因憇焉神思昏然不覺成寐因為褐衣鹿幘之人夢中召去隨之逺遊乃至城郭一所碧天虛曠瑞日曈曨人俗潔淨卉木鮮茂少霞舉目移足惶惑不寧即被導之令前經歴門堂深䆳莫測遥見玉人當軒獨立少霞遽修敬謁玉人謂曰愍子䖍心今宜領事少霞靡知所謂復為鹿幘人引至東廊止於石碑之側謂少霞曰召君書此賀遇良因少霞素不工書即極辭譲鹿幘人曰但按文而録胡乃拒違俄有二童自北而來一棒牙箱内有兩幅紫絹文書一齎筆硯即付少霞凝神搦管頃刻而畢因覽讀之已記於心矣題云蒼龍溪新宮銘紫陽真人山𤣥卿撰良常西麓源澤東洩新宮宏宏崇軒䡾䡾雕珉盤礎鏤檀棟臬碧瓦鱗差瑶階肪截閤凝瑞霞樓横祥霓騶虞巡徼昌明捧闑珠樹規連玉泉矩洩靈颷遐集聖日俯晣太上游詣無極便闕百神守䕶諸真班列仙翁鵠立道師水潔飲玉成漿饌瓊為屑桂旗不動蘭幄互設妙樂競奏流鈴間發天籟虛徐風簫泠澈鳯歌諧律鶴舞㑹節三變𤣥雲九成絳雪易遷徒語童初詎說方更周視遂為鹿幘人促之匆遽而返醒然遂寤急命紙筆登即紀録自是兗豫好奇之人多詣少霞謁訪其事有鄭還古者為立傳焉且少霞乃孝廉一叟耳固知其不妄矣出集異記鄭居中鄭舎人居中高雅之士好道術常遇張山人者多同遊處人但呼為小張山人亦不知其所能也居襄漢間除中書舎人不就開成二年春往東洛嵩岳携家僮三四人與僧登歴無所不到數月淹止日晚至一處林泉秀潔愛甚忘返㑹院僧不在張燭爇火將宿遣僕者求之兼取筆似欲為詩者操筆之次燈滅火盡一僮在側聞鄭公仆地之聲喉中氣麤有光如雞子遶逕而出遽吹薪照之已不救矣紙上有四字云香火願畢畢字僅不成後居山者及獵人時見之衣服如遊涉之狀當應是張生潛出言其終竟之日鄭公捨家以避耳若此豈非達命者歟出逸史伊用昌熊皦補闕說頃年有伊用昌者不知何許人也其妻甚少有殊色音律女工之事皆曲盡其妙夫雖饑寒丐食終無愧意或有豪富子弟以言笑戲調常有不可犯之色其夫能飲多狂逸時人皆呼為伊風子多遊江左廬陵宜春等諸郡出語輕忽多為衆所毆擊愛作望江南詞夫妻唱和或宿於古寺廢廟間遇物即有所詠其詞皆有旨熊只記得詠鼔詞云江南鼓梭肚兩頭欒釘着不知侵骨髓打來只是没心肝空腹被人漫餘多不記江南有芒草貧民採之織屨縁地土卑濕此草耐水而貧民多着之伊風子至茶陵縣門大題云茶陵一道好長街兩畔栽栁不栽槐夜後不聞更漏鼓只聽鎚芒織草鞋時縣官及胥吏大為不可遭衆人亂敺逐出界江南人呼輕薄之詞為覆窠其妻告曰常言小處不要覆窠而君須要覆窠之譬如騎惡馬落馬足穿鐙非理傷墮一等君不用苦之如是夫妻俱有輕薄之態天祐癸酉年夫妻至撫州南城縣所有村民斃一犢夫妻丐得牛肉一二十觔於鄉校内烹炙一夕俱食盡至明夫妻為肉所脹俱死於鄉校内縣鎮吏民以蘆蓆裹尸於縣南路左百餘步而瘞之其鎮將姓丁是江西廉使劉公親隨一年後得替歸府劉公已薨忽一旦於北市棚下見伊風子夫妻唱望江南詞乞錢既相見甚喜便叙舊事執丁手上酒樓三人共飲數㪷丁大醉而睡伊風子遂索筆題酒樓壁云此生生在此生先何事從𤣥不復𤣥已在淮南雞犬後而今便到玉皇前題畢夫妻連臂高唱而出城遂渡江至遊帷觀題真君殿後其衘云定億萬兆恒沙軍國主南方赤龍神王伊用昌詞云日日祥雲瑞氣連應儂家作大神仙筆頭灑起風雷力劍下驅馳造化權更與戎夷添禮樂永教邉塞絶烽烟列仙功業只如此直上三清第一天題罷連臂入西山時人皆見躡虛而行自此更不復出其丁將於酒樓上醉醒懷内得紫金一十兩其金並送在淮海南城縣後人開其墓只見蘆蓆兩領裹爛牛肉十餘觔臭不可近餘更無别物熊言六七歲時猶記識伊風子或着道服稱伊尊師熊嘗於頂上患一癰􅂒疼痛不可忍伊尊師含三口水噀其癰便潰並不為患至今尚有㾗在熊言親覩其事非謬說也出玉堂閒話太平廣記卷五十五
