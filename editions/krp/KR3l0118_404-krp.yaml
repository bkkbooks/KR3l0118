body:
  text: 太平廣記卷四百四宋李昉等編寶五肅宗朝八寶靈光豆萬佛山玳瑁盆辟塵巾重明枕三寳村火玉馬腦櫃岑氏肅宗朝八寶開元中有李氏者嫁於賀若氏賀若氏卒乃捨俗為尼號曰眞如家於鞏縣孝義橋其行髙潔逺近宗推之天寳元年七月七日眞如於精舍戸外盥濯之間忽有五色雲氣自東而來雲中引手不見其形徐以囊授真如曰寳之慎勿言也眞如謹守不敢失墜天寳末祿山作亂中原鼎沸衣冠南走真如展轉流寓於楚州安宜縣肅宗元年建子月十八日夜眞如所居忽見二人衣皁衣引眞如東南而行可五六十歩値一城樓觀嚴飾兵衛整肅皁衣者指之曰化城也城有大殿一人衣紫衣戴寳冠號為天帝復有二十餘人衣冠亦如之呼為諸天諸天坐命眞如進既而諸天相謂曰下界喪亂時久殺戮過多腥穢之氣達於諸天不知何以救之一天曰莫若以神寳壓之又一天曰當用第三寶又一天曰今厲氣方盛穢毒凝固第三寶不足以勝之須以第二寶則兵可息亂世可清也天帝曰然因出寶授眞如曰汝往令刺史崔侁進達於天子復謂眞如曰前所授汝小囊有寶五段人臣可得見之今者八寳唯王者所宜見之汝愼勿易也乃具以寶名及所用之法授真如已而復令皁衣者送之翼日眞如詣縣攝令王滔之以狀聞州州得滔之狀㑹刺史將行以縣狀示從事盧恒曰安宜縣有妖尼之事怪之甚也亟往訊之恒至縣召真如欲以王法加之眞如曰上帝有命誰敢廢墜且寶非人力所致又何疑焉乃以囊中五寶示恒其一曰𤣥黄天符形如笏長可八寸餘濶三寸上圓下方近圓有孔黄玉也色比蒸栗潭若凝脂辟人間兵疫邪癘其二曰玉雞毛文悉備白玉也王者以孝理天下則見其三曰穀璧白玉也徑五六寸其文粟粒自生無異雕鐫之狀王者得之則五穀豐稔其四曰王母玉環二枚亦白玉也徑六寸好倍於肉王者得之能令外國歸嚮其玉色光彩溢發特異於常盧恒曰玉信玉矣安知寶乎眞如乃悉出寳盤向空照之其光皆射日仰望不知光之所極也恒與縣吏同視咸異之翼日侁至恒白於侁曰寶葢天授非人事也侁覆驗無異歎駭久之即具事白報節度使崔圓圓異之徵眞如詣府欲厯觀之眞如曰不可圓固强之眞如不得已又出八寶一曰如意寳珠其形正圓大如雞卵光色瑩澈置之堂中明如滿月其二曰紅靺鞨大如巨栗赤爛若朱櫻視之可應手而碎觸之則堅重不可破也其三曰琅玕珠其形如環四分缺一徑可五六寸其四曰玉印大如半手其文如鹿陷之印中著物則形見其五曰皇后採桑鈎二枚長五六寸其細如筯屈其末似金又似銀又𩔖熟銅其六曰雷公石二枚斧形長可四寸濶寸許無孔膩如青玉八寶置之日中則白氣連天措諸隂室則燭耀如月其所壓勝之法眞如皆祕不可得而知也圓為錄表奏之眞如曰天命崔侁事為若何圓懼而止侁乃遣盧恒隨眞如上獻時史朝義方圍宋州又南陷申州淮河道絶遂取江路而上抵商山入關以建巳月十三日達京時肅宗寢疾方甚視寶促召代宗謂曰汝是楚王為皇太子今上天賜寶獲於楚州天許汝也宜保愛之代宗再拜受賜得寶之故即日改為寶應元年上既登位乃昇楚州為上州縣為望縣改縣名安宜為寳應焉刺史及進寶官皆有超擢號眞如為寳和大師寵錫有加自後兵革漸偃年穀豐登封域之内幾至小康寶應之符驗也眞如所居之地得寶河壖髙厰境物潤茂遺址後為六合縣尉崔珵所居西堂之間相傳云西域胡人過其傍者至今莫不望其處而瞻禮焉出杜陽編靈光豆代宗大厯中日林國獻靈光豆龍角釵因其國在海東北四萬里國西恠石方數百里光明澄澈可鑒人五藏六腑亦謂之仙人鏡國人有疾輒照之使知起於某臟某腑即自採神草餌之無不愈焉靈光豆大小𩔖中華之菉豆其色殷紅而光芒可長數尺本國亦謂之詰多珠和石上菖蒲葉煮之即大如鵝卵其中純紫稱之可重一觔帝㗖一丸歎其香美無比而數日不復言饑渇龍角釵𩔖玉紺色上刻蛟龍之形精巧奇麗非人所製帝賜獨孤妃子與帝同汎舟於龍池有紫雲自釵上而生俄頃滿於舟中帝由是命置之於掌内以水噴之化為二龍騰空飛去矣出杜陽編萬佛山上崇釋氏教乃舂百品香和銀粉以塗佛室遇新羅國獻五色氍毹及萬佛山可髙一丈上置於佛室以氍毹藉其地氍毹之巧麗亦冠絶於一時每方寸之内即有歌舞之樂列國山川之狀或微風入室其上復有蜂蝶動搖鷰雀飛舞俯而視之莫辨其眞假萬佛山雕沉檀珠玉以成之其佛形大者或逾寸小者八九分其佛之首有如黍米者有如菽者其眉目口耳螺髻毫相悉具而辮縷金玉水精為幡葢流蘇菴蘿薝蔔等樹搆百寶為樓閣臺殿其狀雖微勢若飛動前有行道僧不啻千數下有紫金鐘閣三寸以蒲牢銜之每擊鐘行道僧禮拜至地其中𨼆𨼆謂之梵聲葢關綟在乎鐘也其山雖以萬佛為名其數則不可勝計上置九光扇於巖巘間四月八日召兩街僧徒入内道塲禮萬佛山是時觀者歎非人工及見有光出於殿中咸謂之佛光即九光扇也由是上命三藏僧不空念天竺密語千口而退出杜陽雜編玳瑁盆寶厯元年南昌國獻玳瑁盆浮光裘夜明犀云其國有酒山紫海而山有泉其味如酒飲之甚醉則經日不醒紫海大色如爛椹可以染衣其魚龍龜鼈砂石草木無不紫焉玳瑁盆可容十斛外以金玉飾之及盛夏上置於殿内貯水令滿遣嬪御持金銀杓酌水相沃以為嬉戲浮光裘即紫海色染其地也以五彩絲蹙成龍鳳各一千三百仍綴以九色眞珠上衣之以獵於北苑為朝日所照而光彩動搖觀者皆眩其目上亦不為之貴一日馳馬從禽忽際暴雨而裘無纎毫霑濡方歎為異物夜明犀其狀𩔖通天犀夜則光明可照百步覆繪十重終不能掩其耀煥上遂命解為腰帶每遊獵夜則不施其蠟炬有如晝日出杜陽編辟塵巾髙瑀在蔡州有軍將甲知迴易折欠數百萬迴之外縣去州二百餘里髙方令錮身勘甲甲憂迫計無所出其𩔖因為設酒食間解之客坐十餘中有稱處士皇甫𤣥眞者衣白若鵝羽貌甚都雅衆皆有寛勉之辭皇甫但微笑曰此亦小事衆散乃獨留謂甲曰余嘗遊東獲二寶物當為君解此難甲謝之請具車馬悉辭行甚疾其晩至州舍於店中遂晨謁高髙一見不覺敬之因謂髙曰𤣥眞此來特從尚書乞甲性命髙遂曰甲欠官錢非瑀私財如何皇甫請避左右言某於新羅獲巾子可辟塵欲獻此贖甲即於懷探出授高髙纔執已覺體中清涼驚曰此非人臣所有且無價矣甲之性命恐足醻也皇甫請試之翼日因宴於郭外時久旱埃塵且甚高顧視馬尾鬛及左右騶卒數人並無纎塵監車使覺問髙何事尚書獨不霑塵坌豈遭逢異人獲至寶乎高不敢𨼆監軍故求見處士髙乃與俱往監車戲曰道者獨知有尚書乎更有何寶願得一觀皇甫具述救甲之意且言藥出海東今餘一針力差不及巾可令一身無塵監軍拜請曰獲此足矣皇甫即於巾上抽與之針色如金監軍乃劄巾試之驟於塵中唯身及馬騣凶鬯匕尾無塵髙與監軍旦具禮往謁將請其道霎一夕忽失所在出酉陽雜俎重明枕有海外國貢重明枕長一尺二寸髙六寸潔白𩔖於水精中有樓臺之形四面有十道士持香執簡循環無已謂之行道眞人其鏤木丹青眞人之首簪帔無不悉具仍通瑩焉出廣徳神異錄三寶村扶風縣之西南有三寶村故老相傳云建村之時有胡僧謂村人曰此地有寶氣而今人莫得之其啓發將自有時耳村人曰是何寶也曰此交趾之寶數有三焉故因以三寶名其村葢識其事開成元年春村中民夜夢一丈夫者黑簪幘被廣袂之衣腰佩長劍儀狀峻古謂民曰吾嘗仕東漢當光武時與飛將馬公同征交趾嘗得南人之寶其後馬公遭謗以為多掠南貨盡載以歸光武怒將命索其家吾懼且及禍故埋於此地言未訖而寤民即以所夢具告於隣伍中是歲仲夏夕雲月陰晦有牧竪望見西京原下烱然有光若曳練焉久而不滅牧竪驚告其父即馳往視之其光愈甚至明夕亦然於是里人數輩夜尋其光俯而觀之其光自土而出若熖薪火里人乃相與植準以表之其明日攜插具窮表之下深約丈餘得一金龜長二寸許製度奇妙代所未識又得寶劍一長二尺有四寸又得古鏡一徑一尺餘皆塵跡蒙然里人得之遂持以詣縣時縣令沛國劉隨得之發硎其劍澹然若水波之色雖利如切玉無以加焉其長二尺四寸者葢古以八寸為尺乃古三尺其鏡皆文跡繁㑹有異獸環繞鏡鼻而年代緜邈形理無缺乃命磨瑩其清若上水之潔真天下之奇寶也縣令劉君曰此為古之珍玩宜歸王府可與天球和璧焜燿於上庠遂緘膠其事聞岐陽帥願表獻天子時陳君亦節度岐隴得而愛之因有其寶由是無人知者出宣室志火玉會昌元年扶餘國貢三寳曰火玉曰澄明酒及風松石火玉色赤長半寸上尖下圓光照數十步積之可以燃鼎置之室内冬則不復思挾纊宫人常用澄明酒亦異方所貢也色紫如膏飲之令人骨香風松石方一丈瑩澈如玉其中有樹形若古松偃葢颯颯焉而凉飈生於其間至盛夏上令置於殿内稍秋氣颼颼即令徹去出宣室志馬腦櫃武宗好神仙術遂起望仙臺以崇朝禮更修隆真室舂百寶屑以塗地瑤楹金栱銀檻玉砌晶熒炫燿看之不足内設玳瑁之帳火齊之床焚龍光之香薦無憂之酒此皆他國所獻也帝每齋戒沐浴召道士趙歸眞以下用探希夷之理由是室内生靈芝二株皆如紅玉更遇渤海貢馬腦櫃方三尺深色如茜所作工巧無以為比帝用貯神仙之書置之帳側紫瑰盆量容半斛内外通瑩其色純紫厚可一寸舉之則若鴻毛帝嘉其光潔遂處於仙室以和藥餌後王才人擲玉環悞缺其半菽上猶歎息久之出杜陽編岑氏臨川人岑氏嘗遊山谿水中見二白石大如蓮實自相馳逐捕而獲之歸置巾箱中其夕夢二白衣美女自言姊妹來侍左右既寤葢知二石之異也恒結於衣帶中後至豫章有波斯胡人邀而問之君有寳乎曰然即出二石示之胡人求以三萬為市岑雖寶之而無用得錢喜即以與之以錢為生資遂致殷贍而恨不能問其石與其所用云耳出稽神錄太平廣記卷四百四
