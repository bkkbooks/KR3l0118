body:
  text: 太平廣記卷一百九十將帥二馬燧嚴振温造髙駢南蠻張濬劉鄩張勍王建雜譎智魏太祖村婦馬燧李懐光使徐庭光以精卒六千守長春宫馬燧乃挺身至城下呼庭光庭光則拜於城下燧度庭光心已屈乃謂曰我來自朝廷可西面受命庭光復西拜燧曰公等皆祿山已來首建大勲四十餘年功伐最髙奈何棄祖父之勲力為族滅之計耶從吾言非止免罪富貴可圖也賊徒皆不對燧曰爾以吾言不誠皆相去數歩爾當射我乃披襟示之庭光感泣俯伏軍士亦泣乃率其下出降燧乃以數騎徑入城處之不疑莫不畏伏衆大呼曰復得為王人矣渾瑊私謂參佐曰瑊謂馬公用兵與僕不相遠但怪累敗田悅今覩其行師料敵不遠遠矣燧勇力智彊常先計後戰將戰親自號令士卒無不感動戰皆决死未嘗奔北兵勝冠於一時然力能擒田悅而不能納蕃師偽疑而保其必盟平涼之㑹為結贊所紿關中搖動此所謂才有餘而心不正出譚賓録嚴振德宗鑾駕之幸梁洋中書舍人齊映為之御下洋州青源川見旌旗蔽野上心方駭謂泚兵有諳疾路者透秦嶺而要焉俄見梁帥嚴振具櫜鞬拜御馬前具言君臣亂離嗚咽流涕上大喜口敕昇奨令振上馬前去與朕作主人映身本短小聲氣抑揚乃曰嚴振合與至尊導馬御膳自有所司頃之上次洋州行在召映責以儒生不達時變煙塵時須姑息戎帥映伏奏曰山南士庶只知有嚴振不知有陛下今者天威親臨令巴蜀士民知天子之尊亦足以盡振為臣子之節上深嘉歎振聞特拜謝映時議許映出乾􅍧子温造憲宗之代戎羯亂華四方徴師以盡邊患詔下南梁起甲士五千人令赴關下將起帥人作叛逐其帥又懼朝廷討伐因團集拒命者歳餘憲宗深以為患擇帥者久之京兆尹温造請行憲宗問其兵儲所費温曰不請寸兵尺刄而行至其界梁人覘其所來止一儒生皆相賀曰朝廷必不問其罪復何患乎温但宣詔敕安存至則一無所問然梁帥負過出入者皆不捨器仗温亦不誡之他日毬塲中設樂三軍下士並任執𢃄弓劒赴之遂令於長廊之下就食坐筵之前臨堦南北兩行長索二條令軍人各於面前索上掛其弓劒而食逡廵行酒至皷噪一聲兩頭齊抨其索則弓劒去地三丈餘矣軍人大亂無以施其勇然後闔戸而斬之五千餘人更無噍𩔖其間有百姓隨親情及替人有赴設來者甚多並玉石一槩矣南梁人自爾累世不敢復叛余二十年前職於斯故老尚歴歴而記之矣出王氏見聞髙駢咸通中南蠻圍西川朝廷命太尉髙駢自天平軍威鎭成都戎車未届乃先以帛書軍號其上仍書一符於郵亭逓之以壯軍聲蠻酋懲交阯之敗望風而遁先是府無羅郭南宼纔至遽成煨燼士民無久安之計駢乃規畫地圖版築焉慮畚鍤將施亭堠有警乃命門僧景僊奉使入南詔宣言躬自廵邊自下手築城日舉烽直至大渡河凡九十三日樓櫓矗然旌斾竟不行而驃信讋慄不假兵以詐勝斯之謂也出北夢瑣言南蠻唐南蠻侵軼西川苦無亭障自咸通已後劍南苦之牛叢尚書作鎮為蠻宼憑凌無以抗拒髙駢自東平移鎮成都蠻猶傅蜀城駢先選驍銳救急人人背神符一道蠻覘知之望風而遁爾後僖宗幸蜀深疑作梗乃許降公主蠻王以連婣大國喜幸逾常因命宰相趙隆眉楊竒鯤叚義宗來朝行在且迎公主高太尉自淮海飛章云南蠻心膂唯此數人請止而鴆之迄僖宗還京南方無虞用髙公之䇿也楊竒鯤輩皆有詞藻途中詩云風裏浪花吹又白雨中嵐影洗還青江鷗聚處窓前見林狖啼時枕上聽詞甚清美出北夢瑣言張濬張相濬富於權略素不知兵昭宗朝親統扈駕六師往討太原遂至失律䧟其副帥侍郎孫揆尋謀班師路由平陽平陽即蒲之屬郡也牧守姓張即蒲帥王珂之大校珂變詐難測復慮軍旅經過落其詭計濬乃先數程而行洎於平陽之傳舍六軍相次由隂地關而進濬深忌晉牧復不敢除之張於一舍郊迎既駐郵亭濬令張使君升㕔茶酒設食畢復命茶酒不令暫起仍留晩食食訖已晡時又不令起即更茶數甌至張燈乃許辭去自旦及暮不交一言口中咀少物遙觀一如交談之狀珂性多疑動有警察時偵事者尋已密報之云敕史與相國密話竟夕珂果疑召張問之曰相國與爾自旦至暮所話何對云及不交言王殊不信謂其不誠戮之六師乃假途歸京了無纎慮後判邦計諸路各致紈綺之𩔖並不受之乃命專人面付之曰爾述吾意以此物改充軍行所費之物鍋幕布槽啖馬藥土産所共之物咸請備之於是諸藩鎭欣然奉之以至軍行十萬所要無闕皆心匠之所規畫梁祖忌之潜令刺客殺之於長水荘上出玉堂閒話劉鄩後唐晉王之入魏博也梁將劉鄩先屯洹水寂若無人因令覘之云城上有旗幟來往晉王曰劉鄩多計未可輕進更令審探乃縳蒭為人縛旗於上以驢負之循堞而行故旗幟嬰城不息問城中羸者曰軍已去二日矣果趨黄澤欲宼太原以霖潦不克進計謀如是出北夢瑣言張勍偽蜀先主王建始攻圍成都三年未下其紀綱之僕有無頼輕生勇悍者百輩人莫敵也建嘗以美言㗖之曰西川號為錦花城一旦收尅玉帛子女恣我兒輩快活也他日陳敬瑄田令孜以城降翌日赴府預戒驕暴諸子曰我與爾累年戰闘出死入生來日便是我一家也入城之後但管富貴即不得恣横不適來差張勍作斬斫馬步使責辯於渠女輩不得輒犯若把到我面前足可矜恕或被當下斬却非我能救諸子聞戒各務戢斂然張勍胸上打人堆疊通衢莫有敢犯識者以建能戒能惜不䧟人於刑仁恕之比也出北夢瑣言王建卭黎之間有淺蠻焉世襲王號曰劉王楊王郝王歲支西川衣賜三千分俾其偵雲南動静雲南亦資其覘成都盈虛持兩端而求利也每元戎下車即率界上酋長詣府庭號曰參元戎上聞自謂威惠所致其未參間潛禀於都押衙且俟可否或元戎慰撫大將間稍至乖方即教甚紛紜時帥臣多是文儒不欲生事以是都押頼之亦要姑息蠻蜑憑凌若無亭障抑此之由也王建始鎭蜀絕其舊賜斬都押衙山行章以令之卭峽之南不立一堠不戍一卒十年不敢犯境末年命大將許存征蠻為三王洩漏軍機於是召三王而斬之時號因斷也昔日之患三王非不知也時不利也故曰有非常之功許公之謂也先是唐咸通中有天竺三藏僧經過成都曉五天湖語通大小乘經律論以北天竺與雲南接境欲假途而還為蜀察事者識之縶於成都府具得所記朝廷次第文字葢曽入内道塲也是知外國來廷者安知非奸細乎出北夢瑣言雜譎智魏太祖魏武少時常與袁紹好為遊俠觀人新婚因潜入主人園中夜呌呼云有偷兒至廬中人皆出觀帝乃抽刃劫新婦與紹還出失道墜枳棘中紹不能動帝復大呌偷兒今在此紹惶廹自擲出俱免魏武又嘗云人欲危已已輒心動因語所親小人曰汝懐刃密來我心必動便戮汝汝但勿言當後相報侍者信焉遂斬之謀逆者挫氣矣又𡊮紹年少時曾夜遣人以劒擲魏武少下不著帝揆其後來必髙因帖卧牀上劒果髙魏武又云我眠中不可妄近近輒斫人亦不自覺左右宜愼之後乃佯凍所幸小人竊以被覆之因便斫殺自爾莫敢近之出小説村婦昭宗為梁主刼遷之後峻奉諸州各蓄甲兵甚衆恣其劫掠以自給成州有僻逺村墅巨有積貨主將遣二十餘騎夜掠之既倉卒至罔敢支吾其丈夫並囚縳之罄搜其貨囊而貯之然後烹豕犬遣其婦女羞饌恣其飲噉其家嘗收莨菪子其婦女多取之熬搗一如竦末置於食味中然後飲以濁醪於時藥作竟於腰下㧞劔掘地曰馬入地下去也或欲入火投淵顚而後仆於是婦女解去良人執縳徐取騎士劒一一斷其頸而瘞之其馬使人逐官路箠而遣之罔有知者後地土改易方洩其事出玉堂閒話太平廣記卷一百九十
