body:
  text: 太平廣記卷一百三十五徵應一帝堯周武王越王臨洮長人漢高祖陸賈漢元后後漢章帝呉大帝魏明帝晉司馬氏白燕晉武帝晉惠帝晉元帝蜀李雄宋高祖宋孝武帝宋明帝齊太祖北齊神武後周太祖陳高祖隋文帝隋煬帝唐高祖唐太宗唐齊王元吉唐中宗唐相王潞州别駕金蝸牛帝堯秦始皇時宛渠國之民乘螺舟而至云臣國去軒轅之丘十萬里臣國先聖見冀州有黑風應出聖人果慶都生堯出王子年拾遺記周武王紂之昏亂欲殺諸侯使飛亷惡來誅戮賢良取其寶器埋于瓊臺之下使飛亷等於所近之國侯服之内使烽燧相續紂登臺以望火之所在乃興師徃伐其國殺其君囚其民収其女樂肆其淫虐神人憤怨時有朱鳥銜火如星之照耀以亂烽燧之光紂乃回惑使諸國滅其烽燧及武王伐紂樵夫牧豎探高鳥之巢得赤玉璽文曰木德將滅水祚方盛文皆大紀殷之世厯已盡而姬之聖德方隆是以三分天下而二分歸周乃元元之𩔖嗟殷亡之晚恨周來之遲出拾遺錄越王越王入呉國有丹鳥夾王飛故勾踐之霸也起望鳥臺言丹鳥之瑞也出王子年拾遺記臨洮長人秦始皇時長人十二見於臨洮皆夷服於是鑄銅為十二枚以寫之蓋漢十二帝之瑞也出小説漢高祖滎陽南原上有厄井父老云漢高祖曾避項羽於此井為雙鳩所救故俗語云漢祖避時難隱身厄此間雙鳩集其上誰知下有人漢朝毎正旦輒放雙鳩起於此出小説陸賈樊將軍噲問於陸賈曰自古人君皆云受命於天云有瑞應豈有是乎陸賈應之曰有夫目瞤得酒食燈火花得錢財午鵲噪而行人至蜘蛛集而百事喜小既有徵大亦宜然故曰目瞤則呪之燈火花則拜之午鵲噪則餧之蜘蛛集則放之況天下之大寶人君重位非天命何以得之哉瑞寶信也天以寶為信應人之德故曰瑞應天命無信不可以力取也出小説漢元后元后在家嘗有白燕銜石大如指墮后績筐中后取之石自剖為二其中有文曰母天地后乃合之遂復還合乃寶録焉及為皇后常置之璽笥中謂為天璽也出西京雜記後漢章帝後漢章帝永寧五年條支國來獻異鳥名鳷鵲其高七尺解人言語國太平則羣翔鳴焉出王子年拾遺記吳大帝呉孫權獵於武昌樊山下見一老母問權何獲曰只獲一豹曰何不豎其尾忽然不見權稱尊號立廟于山下出武昌記魏明帝魏明帝時泰山下出連理文石高十二丈狀如栢樹其文色彪發如人雕鏤自上及下皆合而中開廣五尺父老云當秦末二石相去百餘步蕪没無有蹊徑及明帝之始稍覺相近如雙闕形土王隂𩔖魏為土德斯為靈徵又沛國有戊巳之地土德之嘉祥也乃修戊巳壇黃星炳夜又起畢昴臺祭之言魏之分野歲時皆修祀焉出王子年拾遺記晉司馬氏水星之精墜于張掖郡栁谷中化為黑石廣一丈餘高三尺後漢之末漸有文彩未甚分明魏青龍年忽如雷震聞聲百餘里其石自立白色有牛馬仙人及玉環玉玦文字之像後司馬氏受命以符金德焉出録異記白燕魏禪晉之歲北闕下有一白燕以為神物以金籠盛置於宫中旬日不知所在論者以晉金德之瑞昔師曠時有白燕來巢以為瑞應師曠事晉古今之議相符矣出王子年拾遺記晉武帝晉武帝為撫軍時府内後堂忽生草三株莖黃葉綠若總金抽翠花條冉弱似金䔲有羌人桃馥字世芬在廏中養馬解隂陽之術云此草應金德之瑞帝以草賜張華華作金䔲賦云翫九莖於漢庭美三株於兹館貴表祥乎金德比名𩔖而相亂出王子年拾遺記晉惠帝高堂隆嘗刻鄴宫柱云後若干年當有天子居此及晉惠帝幸鄴年厯當矣出異苑晉元帝晉中宗為丞相時有雞雛者而雀飛集其背驅而復來如此再三占者云雞者酉酉者金夫雀變而來赴之即王踐祚之象也又云元帝時三雀共登一雄雞背三入安東㕔占者以為當進三爵為天子出洞林記蜀李雄蜀長老言宕渠故賽國今有賽城盧城秦始皇時有人長二十五丈見宕渠秦史胡毋敬曰是後五百年外必有異人為大人者及李雄之王其祖出自宕渠有識者皆以為應焉出華陽國志宋高祖晉安帝時冀州桑門釋法珍告其弟子普嚴曰嵩山神告我江東有劉將軍漢家苗裔當受天命吾以璧三十二枚并鎭金一餅與之劉氏卜代之數也嚴告同學法義以安帝義熙十三年於嵩廟石壇下得寶璧三十二枚三十二者世宋有天下相承八帝享祚六十年出廣古今五行記宋孝武帝宋元嘉七年五月武陵洪水善德山崩兩石高丈餘如人雕刻精竒形備古制式占者云武陵出天子其時八月孝武始誕後宫十五年封武陵王三十年即帝位出洽聞記宋明帝宋明帝自序云予初封湘東王居侍中衞尉府孝武皇帝為予置蕭惠開宅邸經營方始鑿池獲赤玉一枚色如練朱半圓半方重五斤光潤如瑩世祖崩少帝繼位予自姑熟入朝居西邸少帝狂暴惡聞直言醉為非法予驟諫之大怒乃使仗士防守左右文武悉驚怖奔走西邸遂空於是百姓悉入邸適意取物纎毫畢盡至夜少帝醉醒意頗解釋明日左右文武方還予於是不喜居于西邸厯陽太守建平王景素起私宅于建陽門外始成予别覓一宅換之少帝許焉予自西邸移新宅新宅在清溪西舊邸今湘宫寺河洛䜟曰靈曜豫見東南隅予二邸皆處宫城之東南且在呉地蓋天應也出宋明帝自序齊太祖齊太祖在淮隂理城塹掘得古錫九枚下有書荀伯玉諸人皆不能識時紀僧真獨言曰何須辨此久逺之物錫而有九九錫之徵也帝喜而賞之出談藪北齊神武北齊神武少曾與劉貴賈智為奔走之友貴曾得一白鷹獵於沃野見一赤兔毎搏輒逸遂至迥澤有一第屋兔將奔入犬噬之鷹兔俱死神武怒以鳴鏑射犬犬斃屋中有二大人出持神武衣甚急其母目盲曳杖呵二子何故觸大家因出甕中酒烹羊以飯客自云有知遍捫諸人言並當貴至神武曰皆由此人飲竟而出還更訪問之則本無人居乃知向者非人境也由是諸人益加敬異出三國典畧後周太祖後周太祖時有李順興者世傳漢築長安城之日已為北面軍主或隱或見愚聖莫測魏自永熙之後權雄分據齊神武興軍數十萬次沙苑太祖地狹兵少懼不當敵計盡力窮須臾興來太祖請其䇿謀更無餘語直云黃狗逐黑狗急走出筋斗一過出筋斗黃狗夾尾走語訖便去於時東軍旗幟服色尚黃西兵用黑太祖悟其言遂力戰大破神武于沙苑出廣古今五行記陳高祖陳高祖武帝受禪之日其夜有㑹稽人史溥夢朱衣人戴武冠自天而下手持金板上有文字溥視之其文曰陳氏五主三十四年遂凌空而上出談藪隋文帝長安朝堂即舊楊興村村門大樹今見在初周代有異僧號為棖公言詞恍惚後多有驗時村人於此樹下集言議棖公忽來逐之曰此天子坐處汝等何故居此及隋文帝即位便有遷都意出西京記隋煬帝隋末望氣者云乾門有天子氣連太原甚盛故煬帝置離宫數遊汾陽以厭之後唐高祖起義兵汾陽遂有天下出感定録唐高祖唐高祖武德三年老君見于羊角山秦王令吉善行入奏善行告老君云入京甚難無物為驗老君曰汝到京日有獻石似龜者可為驗既至朝門果有邵州獻石似龜下有六字曰天下安千萬日出録異記唐太宗太宗誕之三日也有書生詣高祖曰公是貴人有貴子因目太宗曰龍鳳之姿天日之表也公貴因此兒二十必能安民矣出感定録唐齊王元吉唐齊王元吉于晉陽宫獲青石若龜形文有丹書四字曰李淵萬吉元吉遣使獻之文字暎澈宛若龜形見者咸異焉高祖曰不足信也乃令水漬磨以驗之數日浸而經宿磨之其字愈明於是内外畢賀高祖曰上天明命貺以萬吉孤陋寡薄寧堪預此宜以少牢祀石龜而酹送之出廣德神異記唐中宗唐中宗為天后所廢於房陵仰天而歎心祝之因抛一石于空中曰我後帝此石不落其石遂為樹枝罥挂至今猶存又有人渡水拾得古鏡進之帝照面其鏡中影人語曰即作天子未浹旬復居帝位出獨異志唐相王唐安州都督杜鵬舉父子皆知名中宗在位韋后方盛而鵬舉暴卒在㝠司鞫訊未畢至王殿前忽聞官曰王今當立相王為皇帝王起至堦下見人身皆長二丈共扶輦者百人相王被衮冕在輦中鬼王見之迎拜相王下輦答拜如是禮成而出鵬舉既蘇言之時相王作相矣後歲餘韋皇后將危李氏相王子臨淄王興兵滅之而尊相王為皇帝乃召鵬舉遷其官出紀聞潞州别駕唐𤣥宗為潞州别駕將入朝有軍州韓凝禮自謂知五兆因以食筯試之既而布卦一箸無故自起凡三偃三起觀者以為大吉既而誅韋氏定天保因此行也凝禮起官至五品出國史異纂金蝸牛唐𤣥宗在藩邸有蝸牛成天子字在寢室之壁上心懼之以泥塗去數日復如舊如是者三及即位鑄金銀蝸牛數百枚於功德前供養之又有琢玉為之後人時有得之者出録異記太平廣記巻一百三十五
