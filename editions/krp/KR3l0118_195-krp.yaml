body:
  text: 太平廣記卷一百九十五豪俠三紅線胡証馮燕西京店老人蘭陵老人盧生義俠紅線唐潞州節度使薛嵩家青衣紅線者善彈阮咸又通經史嵩乃俾掌其牋表號曰内記室時軍中大宴紅線謂嵩曰羯皷之聲頗甚悲切其擊者必有事也嵩素曉音律曰如汝所言乃召而問之云某妻昨夜身亡不敢求假嵩遽放歸是時至德之後两河未寕以淦陽爲鎮命嵩固守控壓山東殺傷之餘軍府草創朝廷命嵩遣女嫁魏博節度使田承嗣男又遣嵩男娶滑亳節度使令狐章女三鎮交爲姻婭使使日浹徃來而田承嗣常患肺氣遇熱増劇每曰我若移鎮山東納其凉冷可以延數年之命乃募軍中武勇十倍者得三千人號外宅男而厚其䘏飬常令三百人夜直州宅卜選良日將併潞州嵩聞之日夜憂悶咄咄自語計無所出時夜漏將傳轅門已閉杖䇿庭際唯紅線從焉紅線曰主自一月不遑寢食意有所屬豈非隣境乎嵩曰事繫安危非爾能料紅線曰某誠賤品亦能觧主憂者嵩聞此語異乃曰我知汝是異人我暗昧也遂具告其事曰我承祖父遺業受國家重恩一旦失其疆土即數百年勲伐盡矣紅線曰此易與耳不足勞主憂焉暫放某一到魏城觀其形勢覘其有無今一更首途二更可以復命請先定一走馬使具寒暄書其他即待某却廻也嵩曰然事或不濟反速其禍又如之何紅線曰某之此行無不濟也乃入闈房飾其行具乃梳烏蠻髻貫金雀釵衣紫繡短袍繫青絲輕履胷前佩龍文匕首額上書太乙神名再拜而行倐忽不見嵩乃返身閉户背燭危坐常時飲酒不過數合是夕舉觴十餘不醉忽聞曉角吟風一葉墜露而紅線廻矣嵩喜而慰勞曰事諧否紅線曰不敢辱命又問曰無傷殺否曰不至是但取牀頭金合爲信耳紅線曰某子夜前二刻即逹魏城凡歴數門遂及寢所聞外宅兒止於房廊睡聲雷動見中軍士卒徒歩於庭𫝊呌風生乃發其左扉抵其寢帳田親家翁止於帳内皷跌酣眠頭枕文犀髻包黄縠枕前露七星劔劍前仰開一金合合内書生身甲子與北斗神名復以名香羙珠𣪚覆其上然則揚威玉帳詎知心豁於前生熟寢蘭堂不覺命懸於手下寜勞擒縱只益傷嗟時則蠟炬烟㣲爐香燼委侍人四布兵噐交羅或頭觸屏風鼾而嚲者或手持巾拂寢而伸者某乃㧞其簮珥縻其襦裳如病如醒皆不能寤遂持金合以歸出魏城西門見銅臺髙掲漳水東流晨雞動野斜月在林忿徃喜還頓忘於行役感知酧德聊副於依歸所以當夜漏三時徃返七百里入危邦一道經過五六城冀減主憂敢言其苦嵩乃發使入魏遺田承嗣書曰昨夜有客從魏中來云自元帥牀頭獲一金合不敢留駐謹却封納專使星馳夜半方到見捜捕金合一軍憂疑使者以馬箠撾門非時請見承嗣遽出使者乃以金合授之捧承之時驚怛絶倒遂留使者止於宅中狎以宴私多其賜賚明日專遣使齎帛三萬匹名馬二百匹雜珍異等以獻於嵩曰某之首領繫在恩私便冝知過自新不復更貽伊戚專膺指使敢議親姻彼當捧轂後車來在麾鞭前馬所置紀綱外宅兒者本防他盗亦非異圖今並脱其甲裳放歸田畆矣由是一兩箇月内河北河南信使交至忽一日紅線辭去嵩曰汝生我家今欲安徃又方頼於汝豈可議行紅線曰某前本男子遊學江湖間讀神農藥書而救世人災患時里有孕婦忽患蠱癥某以芫花酒下之婦人與腹中二子俱斃是某一舉殺其三人隂律見誅降為女子使身居賤𨽻氣禀凡俚幸生於公家今十九年矣身厭羅綺口窮甘鮮寵侍有加榮亦甚矣况國家建極慶且無疆此即違天理當盡弭昨徃魏邦以是報恩今两地保其城池萬人全其性命使亂臣知懼列士謀安在某一婦人功亦不小固可贖其前罪還其本形便當遁跡塵中棲心物外澄清一氣生死長存嵩曰不然以千金為居山之所紅線曰事關來世安可預謀嵩知不可留乃廣為餞别悉集賔友夜宴中堂嵩以歌送紅線酒請座客冷朝陽為詞詞曰採菱歌怨木蘭舟送客魂消百尺樓還似洛妃乗霧去碧天無際水空流歌竟嵩不勝其悲紅線拜且泣因偽醉離席遂亡所在出甘澤謡胡証唐尚書胡証質狀魁偉膂力絶人與晉公裴度同年常狎遊為两軍力人十許輩凌轢勢甚危窘度潛遣一介求救於証証衣皂貂金帶突門而入諸力士睨之失色証飲後到酒一舉三鍾不啻數升杯盤無餘瀝逡巡主人上燈証起取鐡燈䑓摘去枝葉而合其跗横置膝上謂衆人曰鄙夫請非次改令凡二鍾引滿一遍三䑓酒須盡仍不得有滴瀝犯令者一鐡躋自謂燈䑓証復一舉三鍾次及一角觝者三䑓三遍酒未能盡淋漓殆至並座証舉躋將擊之衆惡皆起設拜叩頭乞命呼為神人証曰䑕輩敢爾乞命赦汝破命叱之令去出摭言馮燕唐馮燕者魏豪人父祖無聞名燕少時意氣任俠專爲擊毬鬪雞戱魏市有爭財毆者燕聞之搏殺不平遂沈匿田間官捕急遂亡滑益與滑軍中少年雞毬相得時相國賈耽鎮滑知燕材留屬軍中他日出行里中見户旁婦人翳䄂而望者色甚冶使人熟其意遂室之其夫滑將張嬰從其𩔖飲燕因得間復偃寢中拒寢户嬰還妻開户納嬰以裾蔽燕燕卑踳歩就蔽轉匿户扇後而巾墮枕下與佩刀近嬰醉目瞑燕指巾令其妻取妻即以刀授燕燕熟視斷其頸遂持巾去明旦嬰起見妻殺死愕然欲出自白嬰隣以為真嬰殺留縳之趣告妻黨皆來曰常嫉毆吾女廼誣以過失今復賊殺之矣安得他事即他殺而得獨存耶共持嬰百餘笞遂不能言官収繫殺人罪莫有辯者彊伏其辜司法官與小吏持朴者數十人將嬰就市看者團圍千餘人有一人排看者來呼曰且無令不辜死者吾竊其妻而又殺之當繫我吏執自言人乃燕也與燕俱見耽盡以狀對耽乃狀聞請歸其印以贖燕死上誼之下詔凡滑城死罪者皆免出沈亞之馮燕傳京西店老人唐韋行規自言少時遊京西暮至店中更欲前進店有老人方工作謂曰客勿夜行此中多盗韋曰某留心弧矢無所患也因行數十里天黒有人起草中尾之韋叱不應連發矢中之復不退矢盡韋懼奔焉有項風雷總至韋下馬負一大樹見空中有電光相逐如鞫杖勢漸逼樹杪覺物紛紛墮其前韋視之乃木札也須臾積札埋至膝韋驚懼投弓矢仰空中乞命拜數十電光漸髙而滅風雷亦息韋顧大樹枝幹盡矣鞍䭾已失遂返前店見老人方篐桶韋意其異人也拜而且謝老人笑曰客勿恃弓矢湏知劔術引韋入後院指鞍䭾言却領取聊相試耳又出桶板一片昨夜之箭悉中其上韋請役力承事不許㣲露擊劔事韋亦得一二焉出酉陽雜爼蘭陵老人唐黎幹為京兆尹時曲江塗龍祈雨觀者數千黎至獨有老人植杖不避幹怒杖之如擊鞔革掉臂而去黎疑其非常人命坊老卒尋之至蘭陵里之南入小門大言曰我困辱甚可具湯也坊卒遽返白黎黎大懼因衣壊服與坊卒至其處時已昏黒坊卒直入通黎之官閥黎唯而趨入拜伏曰向迷丈人物色罪當十死老人驚曰誰引尹來此即牽上階黎知可以理奪徐曰某為京尹尹威稍損則失官政丈人埋形雜迹非證慧眼不能知也若以此罪人是釣人以名則非義士之心也老人笑曰老夫過乃具酒設席於地招坊卒令坐夜深語及飬生言約理辯黎轉敬懼因曰老夫有一技請為尹設遂入良乆紫衣朱鬕擁劍長短七口舞於中庭迭躍揮霍􅔊光電激或横若掣帛旋若規火有短劍二尺餘時時及黎之袵黎叩頭股慄食頃擲劍植地如北斗狀顧黎曰向試尹膽氣黎拜曰今日已後性命丈人所賜乞役左右老人曰尹骨相無道氣非可遽授别日更相顧也揖黎而入黎歸氣色如病臨鏡方覺鬚刜落寸餘翌日復徃室已空矣出酉陽雜爼盧生唐元和中江淮有唐山人者渉獵史傳好道常居名山自言善縮錫頗有師之者後於楚州逆旅遇一盧生意氣相合盧亦語及爐火稱唐族乃外氏遂呼唐為舅唐不能相捨因邀同之南嶽盧亦言親故在陽羡將訪之今且貪舅山林之程也中途止一蘭若夜半語笑方酣盧曰知舅善縮錫可以梗槩語之唐笑曰某數十年重趼從師秖得此術豈可輕道耶盧復祈之不已唐辭以師授有時日可逹岳中相傳盧因作色舅今夕須傳勿等閒也唐責之某與公風馬牛耳不意盱眙相遇實慕君子何至騶卒不若也盧攘臂瞑目盻之良乆曰某刺客也如不得舅將死於此因懐中探烏韋嚢出匕首刃勢如偃月執火前熨斗削之如扎唐恐懼具述盧乃笑語唐曰幾悞殺舅此術十得五六方謝曰某師仙也令某等十人索天下妄傳黄白術者殺之至添金縮錫傳者亦死某乆得乘蹻之道者因拱揖唐忽失所在唐自後遇道流輙陳此事戒之出酉陽雜爼義俠頃有仕人為畿尉常任賊曹有一賊繫械獄未具此官獨坐㕔上忽告曰某非賊頗非常軰公若脱我之罪奉報有日此公視狀貌不羣詞采挺㧞意已許之佯為不諾夜後密呼獄吏放之仍令獄吏逃竄既明獄中失囚獄吏又走府司譴罸而已後官滿數年客遊亦甚覊旅至一縣忽聞縣令與所放囚姓名同徃謁之令通姓字此宰驚懼遂出迎拜即所放者也因留㕔中與對榻而寢歡洽旬餘其宰不入宅忽一日歸宅此客遂如厠厠與令宅惟隔一墻客於厠室聞宰妻問曰公有何客經於十日不入宰曰某得此人大恩性命昔在他手乃至今日未知何報妻曰公豈不聞大恩不報何不看時機爲令不語乆之乃曰君言是矣此客聞已歸告奴僕乘馬便走衣服悉棄於㕔中至夜已行五六十里出縣界止宿村店僕從但怪奔走不知何故比人歇定乃言此賊負心之狀言訖吁嗟奴僕悉涕泣之次忽牀下一人持匕首出立此客大懼乃曰我義士也宰使我來取君頭適聞説方知此宰負心不然枉殺賢士吾義不捨此人也公且勿睡少頃與君取此宰頭以雪公冤此人怕懼愧謝此客持劔出門如飛二更已至呼曰賊首至命火之乃令頭也劍客辭訣不知所之出原化記太平廣記卷一百九十五
