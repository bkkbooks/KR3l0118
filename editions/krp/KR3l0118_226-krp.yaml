body:
  text: 太平廣記卷二百二十六伎巧二水飾圖經觀文殿劉交張崇十二辰車銅樽殷文亮楊務亷王琚薛眘惑馬待封水飾圖經煬帝别敕學士杜寳修水飾圖經十五卷新成以三月上已日㑹羣臣於曲水以觀水飾有神龜負八卦出河授伏犧黄龍負圖出河𤣥龜銜符出洛水鱸魚銜籙圖出翠嬀之水並授黄帝黄帝齋於𤣥扈鳳鳥降於洛上丹甲靈龜銜書出洛授蒼頡堯與舜坐舟於河鳳凰負圖赤龍載圖出河並授堯龍馬銜甲文出河授舜堯與舜遊河値五老人堯見四子於汾水之陽舜漁於雷澤陶於河濵黄龍負黄符璽圖出河授舜舜與百工相和而歌魚躍於水白而長人面魚身捧河圖授禹舞而入河禹治水應龍以尾畫地導決水之所出鑿龍門疏河禹過江黄龍負舟𤣥夷蒼水使者授禹山海經遇兩神女於泉上帝天乙觀洛黄魚雙躍化爲黑玉赤文姜嫄於河濵履巨人之跡棄后稷於寒冰之上鳥以翼薦而覆之王坐靈沼於牣魚躍太子發度河赤文白魚躍入王舟武王渡孟津操黄鉞以麾陽侯之波成王舉舜禮榮光幕河穆天子奏鈞天樂於𤣥池獵於澡津獲𤣥貉白狐觴西王母於瑶池之上過九江黿龜爲梁塗脩國獻昭王青鳯丹鵠飲於浴溪王子晉吹笙于伊水鳯凰降秦始皇入海見海神漢高祖隱芒碭山澤上有紫雲武帝泛樓船於汾河遊昆明池去大魚之鉤遊洛水神上明珠及龍髓漢桓帝遊河値青牛自河而出曹瞞浴譙水撃水蛟魏文帝興師臨河不濟杜預造河橋成晉武帝臨㑹舉酒勸預五馬浮渡江一馬化爲龍仙人酌醴泉之水金人乘金船蒼文𤣥龜銜書出洛青龍負書出河並進於周公呂望釣磻溪得玉璜文釣卞溪獲大鯉魚腹中得兵鈐齊桓公問愚公名楚王渡江得萍實秦昭王宴於河曲金人捧水心劒造之呉大帝臨釣臺望葛𤣥劉備乘馬渡檀溪澹臺子羽過江兩龍夾舟淄丘訢與水神戰周處斬蛟屈原遇漁父卞隨投潁水許由洗耳趙簡子値津吏女孔子値河浴女子秋胡妻赴水孔愉放龜莊惠觀魚鄭𢎞樵徑還風趙炳張葢過江陽谷女子浴日屈原沉汨羅水巨靈開山長鯨吞舟若此等總七十二勢皆刻木爲之或乘舟或乘山或乘平洲或乘磐石或乘宫殿木人長二尺許衣以綺羅裝以金碧及作雜禽獸魚鳥皆能運動如生隨曲水而行又閒以妓航與水飾相次亦作十二航航長一丈闊六尺木人奏音聲擊磬撞鐘彈箏鼓瑟皆得成曲及爲百戲跳劒舞輪昇竿擲繩皆如生無異其妓航水飾亦雕裝竒妙周旋曲池同以水機使之竒幻之異出於意表又作小舸子長八尺七艘木人長二尺許乘此船以行酒每一船一人擎酒盃立於船頭一人捧酒鉢次立一人撑船在船後二人盪漿在中央遶曲水池廻曲之處各坐侍宴賔客其行酒船隨岸而行行疾於水飾水飾行遶池一匝酒船得三遍乃得同止酒船每到坐客之處即停住擎酒木人於船頭伸手遇酒客取酒飲訖還盃木人受盃㢠廻身向酒鉢之人取杓斟酒滿盃船依式自行每到坐客處例皆如前法此並約岸水中安機如斯之妙皆出自黄衮之思寳時奉敕撰水飾圖經及檢挍良工圖畫既成奏進敕遣寳共黄衮相知於苑内造此水飾故得委悉見之衮之巧性今古罕儔出大業拾遺觀文殿隋煬帝令造觀文殿前兩廂爲書堂各十二間堂前通爲閤道承殿每一間十二寳厨前設方五香重牀亦裝以金玉春夏鋪九曲象簟秋設鳯綾花褥冬則加綿裝須彌氊帝幸書堂或觀書其十二間内南北通爲閃電牕零籠相望雕刻之工窮竒極之妙金鋪玉題綺井華榱輝映溢目每三間開一方户户埀錦幔上有二飛仙當户地口施機轝駕將至則有宫人擎香爐在轝前行去户一丈脚踐機發仙人乃下閤捧幔而昇閤扇即開書厨亦啓若自然皆一機之力轝駕出埀閉復常諸房入户式樣如一其所撰之書屬辭比事條貫有序文略理暢互相明發及抄寫眞正文字之間無㸃竄之誤裝翦華淨可謂冠絕今古曠世之名寳自漢已來訖乎梁文人才子諸所撰著無能及者其新書之名多是帝自製每進一書必加賞賜出大業拾遺劉交豳州人劉交戴長竿高七十尺自擎上下有女十二甚端正於竿置定跨盤獨立見者不忍女無懼色後竟還撲殺出朝野僉載張崇唐巧人張崇者能作灰畫腰帶鉸具每一胯大如錢灰畫燒之見火即隱起作龍魚鳥獸之形莫不悉備出朝野僉載十二辰車則天如意中海州進一匠造十二辰車㢠廻轅正南則午門開馬頭人出四方㢠廻轉不爽毫釐又作木火通鐵盞盛火輾轉不飜出朝野僉載銅樽韓王元嘉有一銅罇背上貯酒而一足倚滿則正立不滿則傾又爲銅鳩氊上摩之熱則鳴如眞鳩之聲出朝野僉載殷文亮洛州殷文亮曾爲縣令性巧好酒刻木爲人衣以繒綵酌酒行觴皆有次第又作妓女唱歌吹笙皆能應節飲不盡即木小兒不肯把飲未竟則木妓女歌管連催此亦莫測其神妙也出朝野僉載楊務亷將作大匠楊務亷甚有巧思常於沁州市内刻木作僧手執一椀自能行乞椀中錢滿關鍵忽發自然作聲云布施市人競觀欲其作聲施省日盈數千矣出朝野僉載王琚郴州刺史王琚刻木爲獺沉於水中取魚引首而出葢獺口中安餌爲轉關以石縋之則沉魚取其餌關即發口合則銜魚石發則浮出出朝野僉載薛眘惑薛眘惑者善投壺龍躍隼飛矯無遺箭置壺於背後却反矢以投之百發百中出朝野僉載馬待封開元初修法駕東海馬待封能窮伎巧於是指南車記里鼓相風鳥等待封皆改修其巧踰於古待封又爲皇后造粧具中立鏡臺臺下兩層皆有門户后將櫛沐啓鏡奩後臺下開門有木婦人手執巾櫛至后取已木人即還至於面脂粧粉眉黛髻花應所用物皆木人執繼至取畢即還門户復閉如是供給皆木人后既粧罷諸門皆闔乃持去其粧臺金銀彩畫木婦人衣服裝飾窮極精妙焉待封既造鹵簿又爲帝后造粧臺如是數年敇但給其用竟不拜官待封恥之又奏請造欹器酒山撲滿等物許之皆以白銀造作其酒山撲滿中機關運動或四面開定以納風氣風氣轉動有隂陽向背則使其外泉流吐納以挹盃斚酒使出入皆若自然巧踰造化矣既成奏之即屬宫中有事竟不召見待封恨其數竒於是變姓名隱於西河山中至開元末待封從晉州來自稱道者呉賜也常絕粒與崔邑令李勁造酒山撲滿欹器等酒山立於盤中其盤徑四尺五寸下有大龜承盤機運皆在龜腹内盤中立山山高三尺峰巒殊妙盤以木爲之布漆其外龜及山皆漆布脫空彩畫其外山中虚受酒三斗繞山皆列酒池池外復有山圍之池中盡生荷花及葉皆鍜鐵爲之花開葉舒以代盤楪設脯醢珍果佐酒之物於花葉中山南半腹有龍藏半身於山開口吐酒龍下大荷葉中有盃承之盃受四合龍吐酒八分而止當飲者即取之飲酒若遲山頂有重閣閣門即開有催酒人具衣冠執板而出於是歸盞於葉龍復注之酒使乃還閣門即閉如復遲者使出如初直至終宴終無差失山四面東西皆有龍吐酒雖覆酒於池池内有穴潛引池中酒納於山中比席䦨終飲池中酒亦無遺矣欹器二在酒山左右龍注酒其中虚則欹中則平滿則覆則魯廟所謂侑坐之器也君子以誡盈滿孔子觀之以誡焉杜預造欹器不成前史所載若呉賜也造之如常器耳出紀聞太平廣記卷二百二十六
