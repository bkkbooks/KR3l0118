body:
  text: 太平廣記卷四百九十八宋李昉等編雜録李宗閔馮宿李回周復楊希古劉禹錫催陣使李羣玉温庭筠苖躭裴勛鄧厰李宗閔李德裕在維揚李宗閔在湖州拜賔客分司德裕大懼遣專使厚致信好宗閔不受取路江西而過非久德裕入相過洛宗閔憂懼多方求厚善者致書一見欲以解分復書曰怨則不怨見則無端初德裕與宗閔早相善在中外交致勢力及位高稍稍相傾及宗閔在位德裕為兵部尚書自得岐路必當大用宗閔多方沮之及邠公杜悰入朝即宗閔之黨也時為京兆尹一日詣宗閔值宗閔深念杜曰何念之深也荅曰君揣我何念杜曰得非大戎乎曰是也然何以相救曰某則有䇿顧相公必不能用耳曰請言之杜曰大戎有詞學而不由科第若與知舉則必喜矣宗閔黙然良久曰更思其次曰更有一官亦可平其慊宗閔曰何官曰御史大夫曰此即得也邠公再三與約乃馳詣曰適宗相有意㫖令其傳逹遂言亞相之拜德裕驚喜䨇淚遽落曰此大門官也小子豈敢當此薦㧞寄謝重叠杜還報宗門復與楊虞卿議之竟為所隳終致後禍出幽閒鼓吹馮宿馮宿文宗朝揚歴中外甚有美譽垂入相者數矣又能曲事北司權貴咸得其懽心焉一日晚際中尉封一合送與之開之有結巾二頂暨甲煎面藥之屬時班行結中貴者將大拜則必先遺此以為信馮大喜遂以先呈相國楊嗣復盖常佐其幕也馮又性好華楚鮮潔自夕逹曙重衣數襲選駿足數疋鞍韉照地無與比馮以既有的信即不宜序班欲窮極稱惬之事遂修容易服而入至幕次吏報有按則偽為不知比就果有按謁者捧麻必相也將宣則謁者向殿執敕罄折朗呼所除拜大僚之姓名既而大呼曰蕭倣馮乃驚仆于地扶而歸第得疾而卒葢其夕擬狀將付學士院之時文宗謂近臣曰馮宿之為人似非沉静蕭倣方判鹽鐡朕察之頗得大臣之體遂以易之出玉堂閒話李回太和初李回任京兆府叅軍主試不送魏謩謩深銜之㑹昌中回為刑部侍郎謩為御史中丞常與次對官三數人候對于閣門謩曰某頃嵗府解蒙明公不送何事今日同集於此回應聲曰經音頸如今也不送謩為之色變益懐憤恚後回謫刺建州謩大拜回有啓狀謩悉不納既而回怒一衙官决杖勒停建州衙官能庇徭役求𨽻籍者所費不下數十萬其人不恚于杖止恨停廢耳因亡命至京師投時相訴寃諸相皆不問㑹亭午憇于槐隂顔色憔悴旁人察其有故私詰之其人具述本志於是誨之曰建陽相公素與中書相公有隙子盍詣之言訖見魏導騎自中書而下其人常懐文狀即如所誨望塵而拜導騎自中對曰建州百姓訴寃魏聞之倒持塵尾敲鞍子令止及覧狀所論事二十餘件第一件取同姓子女入宅於是為魏極力鍛成大獄時李已量移鄧州刺史行次九江遇御史鞫獄却回建陽竟坐貶撫州司馬終於貶所出摭言周復元稹在鄂州周復為從事稹甞賦詩命院中屬和復乃簪笏見稹曰某偶以大人徃還謬獲一第其實詩賦皆不能稹嘉之曰質實如是賢於能詩者矣出幽閒鼔吹楊希古楊希古靖泰諸楊也朋黨連結率相期以死權勢燻灼力不可㧞與同里崔氏相埒而敦厚過之希古性迂僻初應進士舉以文投丞郎丞郎獎之希古乃起而對曰斯文也非希古之作也丞郎訝而詰之曰此舍弟源嶓為希古作也丞郎大異之曰今子弟之求名者大半假手也茍袖一軸投知於先達靡不私自衒耀以為莫我若也如子之用意足以整頓波靡矣性酷嗜佛法常置僧于第陳列佛像雜以幡葢所謂道塲者每凌旦輒入其内以身俛地俾僧據其上誦金剛經三遍性又潔淨内逼如厠必散衣無所有然後高屐以徃出玉泉子劉禹錫劉禹錫屯田員外左遷朗州司馬凡十年始徴還方春作贈㸔花諸君子詩曰紫陌紅塵拂面來無人不道㸔花回𤣥都觀裏桃千𣗳盡是劉郎去後栽其詩當日傳於都下有嫉其名者白於執政又誣其有怨憤他日見時宰與坐慰甚厚既辭即曰近者新詩未免其累奈何不數日岀為連州刺史禹錫自叙云貞元二十一年春予為屯田員外時此觀未有花是嵗出牧連州至荆南又貶朗州司馬居十年詔至亰師人人皆言有道士手植仙桃滿觀盛如紅霞遂有前篇以志一時之事耳屬又出牧於連州至十四年始為主客郎中重逰𤣥都蕩然無復一存唯兎葵燕麥動揺於春風耳因再題二十八字以俟後遊時太和二年三月也詩曰百畆庭中半是苔桃花静盡菜花開種桃道士今何在前度劉郎今獨來出本事詩催陣使㑹昌中王師討昭義乆未成功賊之遊兵徃徃散出山下剽掠邢洺懐孟又發輕卒數千偽為羣羊散漫山谷以㗖官軍官軍自逺見之乃分頭掩捕因不成列且無偹焉於是短兵接鬪蹂踐相乗凡數十里王師大敗是月東都及濆上諸州聞之大震咸加備戒嚴都統王宰石雄等皆堅壁自守武宗坐朝不怡召宰臣李徳裕等謂之曰王宰石雄不與朕殺賊頻遣中使促之尚聞逗撓依違豈可使賊黨坐至東都耶卿今日可為朕晚歸别與制置軍前事宜奏來時宰相陳夷行鄭肅拱黙聽命徳裕歸中書即召御史中丞李回具言上意曰中丞必一行責戎師早見成功慎無違也回刻時受命於是具名以聞曰今欲以御史中丞李回為催陣使帝曰可即日李自銀臺戒路有邸吏五十導從至於河中緩轡以進俟王宰等至河中界迎候乃行二師至翼城東道左執兵如外府列挍迎候儀回立馬受起居寒温之禮二帥復前進數歩罄折致詞回掉鞭亦不甚顧之禮成二帥旁行俛首俟命回於馬上厲聲曰今日當直令史安在羣吏躍馬聽命回曰責破賊限狀來二帥鞠躬流汗而請以六十日破賊過約請行軍中令於是二帥大懼率親軍而鼓之士卒齊進凡五十八日攻㧞潞城梟劉稹首以獻功成回復令後六十日由御史中丞拜中書侍郎平章事出芝田録李羣玉李羣玉既解天禄之任而歸涔陽經二妃廟題詩二首曰小孤洲北浦雲邉二女眀粧尚儼然野廟向江春寂寂古碑無字草芊芊東風近墓吹芳芷落日深山哭杜鵑猶似含顰望廵狩九疑如黛隔湘川又曰黃陵廟前莎草春黄陵女兒茜裙新輕舟小楫唱歌去水逺山長愁殺人後又題曰黄陵廟前春已空子規滴血啼松風不知精爽落何處疑是雲行秋色中李自以第二篇春容便到秋色踟蹰欲改之乃有二女郎見曰兒是娥皇女英也二年後當與郎君為雲雨之遊李乃志其所陳俄而影滅遂禮其神像而去重渉湖嶺至于潯陽太守段成式素與李為詩酒之友具述此事段因獻之曰不知足下是虞舜之辟陽侯也羣玉題詩後二年乃逝于洪州段乃為詩哭之曰酒裡詩中三十年縱橫唐突世喧喧明時不作禰衡死傲盡公卿歸九泉又曰增話黄陵事今為白日催老無兒女累誰哭到泉臺出雲溪友議温庭筠温庭筠有詞賦盛名初將從鄉里舉客㳺江淮間揚子留後姚朂厚遺之庭筠少年其所得錢帛多為狹邪所費朂大怒笞且逐之以故庭筠卒不中第其妹趙顓之妻也每以庭筠下第輒切齒于朂一日㕔有客温氏偶問客姓氏左右以朂對温氏遂出㕔前執朂袖大哭朂殊驚異且持袖牢固不可脱不知所為移時温氏方曰我弟少年宴遊人之常情奈何笞之迄今無有成遂得不由汝致之復大哭久之方得解朂歸憤訝竟因此得疾而卒出玉泉子苗躭苖躭進士登第閒居洛中有年矣不堪其窮或意為將來通塞可以響卜躭即命子姪掃灑㕔事設几焚香束帶秉笏端坐以俟一言所居窮僻久之無所聞日晏有貨枯魚者至焉躭復專其志而諦聽之其家童連呼之遂挈魚以入其實無一錢良久方出貨者遲其出固怒之矣又見或㣲割其魚貨者視之因罵曰乞索兒卒餓死耳何滯我之如是邪初躭甞自外遊歸途遇疾甚不堪登升忽見有以輦棺而回者以其價賤即僦而寢息其間至洛東門閽者不知其中有人詰其所由來躭謂其訝已徐答曰衣冠道路得病貧不能致他物相與無怪也閽者曰吾守此三十年矣未甞見有解語神柩後躭終江州刺史出玉泉子裴勛裴勛容貌么麽而性尤率易與父垣㑹飲垣令去聲飛盞每屬其人輒自言狀垣付勛曰矬人饒舌破車饒楔裴勛十分勛飲訖而復其盞曰蝙蝠不自見笑他梁上燕十一郎十分垣第十一也垣怒笞之慈恩寺連接曲江及京輦諸境每嵗新得第者畢列姓名于此勛常與親識㳺見其父及諸家牓率多物故謂人曰此皆鬼録也出玉泉子鄧厰鄧厰封教之門生初比隨計以孤寒不中第牛蔚兄弟僧孺之子有氣力且富于財謂厰曰吾有女弟未出門子能婚乎當為君展力寧一第耶時厰已壻李氏矣其父常為福建從事官至評事有女二人皆善書厰之所行卷多二女筆跡厰顧已寒賤必能致騰踔私利其言許之及既登第就牛氏親不日厰挈牛氏而歸將及家厰紿牛氏曰吾久不到家請先徃俟卿可乎牛氏許之洎到家不敢洩其事明日牛氏奴驅其輜槖直入即出牛氏居常所􅥬好幙帳雜物列于庭廡間李氏驚曰此何為者奴曰夫人將到令某陳之李氏曰吾即妻也又何夫人焉即撫膺大哭頓地牛氏至知其賣已也請見李氏曰吾父為宰相兄弟皆在郎省縱嫌不能富貴豈無一嫁處耶其不幸豈唯夫人乎今願一與夫人同之夫人縱憾于鄧郎寧忍不為二女計耶時李氏將列于官二女共牽輓其袖而止後厰以祕書少監分司慳嗇尤甚黃巢入洛避亂于河陽節度使羅元杲請為副使後巢寇又来與元杲竄焉其金帛悉藏于地中並為羣盗所得出玉泉子太平廣記卷四百九十八
