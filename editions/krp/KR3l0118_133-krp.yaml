body:
  text: 太平廣記卷一百三十三報應三十二朱化李詹王公直黃敏陳君稜王洞微孫季貞崔道紀何澤岳州人徐可範建業婦人廣陵男子何馬子章邵韓立善僧修準宇文氏李貞僧秀榮毋乾昭李紹朱化洛陽人朱化者以販羊為業唐貞元初西行抵邠寧迴易其羊有一人見化謂曰君市羊求利當求豐贍君見羊之小者以為不可易也殊不知小者不久而大也自小而易及貨而大其利不亦博乎易之大者其羊必少易之小者其羊必多羊多則利厚也羊少則利寡也化然之乃告其人曰爾知有小羊我當盡易之其人數日乃引一羊主至化遂易得小羊百十口大小羊相雜為羣迴歸洛陽行至關下一夕所易之小羊盡化為鬼而走化大駭莫測其由明年復徃邠寧見前言小羊之人化甚怒將執之詣官府其人曰我何罪也化曰爾以小羊迴易我驅至關下盡化為鬼得非汝用妖術乎其人曰爾販賣羣羊以求厚利殺害性命不知紀極罪已彌天矣自終不悟而反怒我我即鬼也當與羣羊執爾而戮之言訖而滅化大驚懼㝷死於邠寧焉出竒事記李詹唐李詹大中七年崔瑤下擢進士第平生廣求滋味每食鱉輒緘其足暴于烈日鱉既渴即飲以酒而烹之鱉方醉已熟矣復取驢縶于庭中圍之以火驢渴即飲灰水蕩其腸胃然後取酒調以諸辛味復飲之驢未絶而為火所逼爍外已熟矣詹一日方巾首失力仆地而卒頃之詹膳夫亦卒一夕膳夫復蘇曰某見詹為地下責其過害物命詹對以某所為某即以詹命不可違答之詹又曰某素不知皆狄愼思所傳故得以迴無何愼思復卒愼思亦登進士第時為小諌出玉泉子王公直唐咸通庚寅歲洛師大飢穀價騰貴民有殍於溝塍者至蠶月而桑多為蟲食葉一斤直一鍰新安縣慈澗店北村民王公直者有桑數十株特茂盛蔭翳公直與妻謀曰歉儉若此家無見糧徒竭力于此蠶尚未知其得失以我計者莫若棄蠶乗貴貨葉可獲錢十萬蓄一月之糧則接麥矣豈不勝為餒死乎妻曰善乃㩦鍤坎地卷蠶數箔瘞焉明日淩晨荷桑詣都市鬻之得三千文市彘肩及餅餌以歸至徽安門門吏見囊中殷血連洒于地遂止詰之公直曰適賣葉得錢市彘肉及餅餌貯囊無他也請吏捜索之既發囊唯有人左臂若新支解焉羣吏乃反接送于居守居守命付河南府尹正琅邪王公凝令綱紀鞫之其欵云某瘞蠶賣桑葉市肉以歸實不殺人特請檢驗尹判差所由監領就村檢埋蠶之處所由領公直至村先集鄰保責手狀皆稱實知王公直埋蠶别無惡跡乃與村衆及公直同發蠶坑中唯有箔角一死人而缺其左臂取得臂附之宛然符合遂復領公直詣府白尹尹曰王公直雖無殺人之事且有坑蠶之咎法或可恕情在難容蠶者天地靈蟲綿帛之本故加𠞰絶與殺人不殊當寘嚴刑以絶凶醜遂命于市杖殺之使驗死者則復為腐蠶矣出三水小牘黃敏江西都校黃敏者因禦寇墜馬折其左股其下遂速以石碎生龜傅之月餘乃愈而龜頭尚活龜腹間與髀肉相連而生敏遂惡之他日割去欲下刀痛楚與已肉無異不能而止龜目所視亦同已所見也出聞竒錄陳君稜曹宋二州西界有大鶴陂陂左村人陳君稜少小捕魚為業後得患恒被衆魚所食痛苦不能自持若以魚網蓋之痛即止後為村人盜網去數日間不勝痛而死德州刺史鄧某曾任考城令知此事出聞奇録王洞微唐汾州景雲觀道士王洞微者家于孝義縣初為小胥性喜殺常釣弋漁獵自弱冠至壯年凡殺狼狐雉兔洎魚鱉飛鳥計以萬數後為里尹患病熱月餘忽覺室内有禽獸魚鱉萬數環其榻而噬之瘡痏被身殆無完膚中夕之後其父母兄弟俱聞洞微卧内有羣鳥啁啾厯然可辨凡數年疾益甚或有謂洞微父曰汝子病且亟宜遷居景雲觀于是卜日徙居月餘會羣道士修齋授籙是夕洞微瘳後十年竟以疾卒出宣室志孫季貞唐孫季貞陳州人少好捕網飛走尤愛啗鷄卵毎毎欲食輒焚而熟之卒且三年矣鄰有張生者亦以病卒三日也忽便起坐既行乃徑徃孫氏家稱季貞云其言實季貞其形故張生也張氏之族即詣官以訴云孫先是吾不當死以生平多害物命故為寃債所訴以食雞卵過甚被驅入于空城中比入則戸闔矣第見滿城火灰既為燒爍不知所為東顧方見城戸雙啓即奔從之至則復闔矣西顧從之復然南顧北顧從之亦然其苦楚備嘗之矣一旦王謂季貞曰爾壽未盡然死且三年矣何以復還主者曰鄰有張某死纔三日可借此以託其神魂王然之今我實季貞也官不能斷郡牧劉尚書廙親呼問之曰宜以平生一事人無知者以為驗季貞曰某未死前嘗藏佛經兩卷于屋瓦人實無知者命探之存焉斷歸孫氏出玉泉子崔道紀唐前進士崔道紀及第後遊江淮間遇酒醉甚卧于客館中其僕使井中汲水有一魚隨桶而上僕者得之以告道紀道紀喜曰魚羮甚能醒酒可速烹之既食良久有黃衣使者自天而下立于庭中連呼道紀使人執捉宣敕曰崔道紀下土小民敢殺龍子官合至宰相壽命至七十並宜除言訖昇天而去是夜道紀暴卒時年三十五出録異記何澤唐何澤者容州人也嘗攝廣州四㑹縣令性豪橫唯以飲啖為事尤嗜鵝鴨鄉胥里正恒令供納常豢養鵝鴨千百頭日加烹殺澤只有一子愛憐特甚嘗一日烹雙雞爨湯以待沸其子似有鬼物撮置鑊中一家驚駭就出之則與雙雞俱潰爛矣出報應錄岳州人唐咸通中岳州府有村人涸湖池取魚獲龜尤倍多悉刳其肉載龜板至江陵鬻之厚得金帛後歸家忽遍身患瘡楚痛號呌鄰里不忍聞須得大盆貯水舉體投水中漸變作龜形逾年肉爛腐墜而死出報應記徐可範唐内侍徐可範性好畋獵殺害甚衆嘗取活鱉鑿其甲以熱油注之謂之鱉䭔又性嗜􅀈驢以驢縻絆于一室内盆盛五味汁于前四面迫以烈火待其渴飲五味汁盡取其腸胃為饌前後烹宰不紀其數後扈從僖宗幸蜀得疾毎睡見羣獸鳥雀啄食其肉痛苦萬狀又須于牀下布火及以油醋灌其身仍以罟網蓋覆方暫得睡以日繼夜常須如此命將盡惟一束黑骨而已出報應記建業婦人近歲建業有婦人背生一癅大如數斗囊中有物如繭栗甚衆行即有聲恒乞于市自言村婦也常與娣姒輩分養蠶已獨頻年損耗因竊其姒一囊繭焚之頃之背患此瘡漸成此癅以衣覆之即氣閉悶常露之乃可而重如負囊矣出捜神記廣陵男子廣陵有男子行乞于市毎見馬矢即取食自云嘗為人飼馬慵不能夜起其主恒自檢視見槽中無草督責之乃取烏梅并以飼馬馬齒楚不能食竟以是致死已後因患病見馬矢輒流涎欲食食之與烏梅味正同了無穢氣出稽神錄何馬子遂州人何馬子好食蜂兒坐罪令衆于市忽有大蜂數箇螫其面痛楚呌呼守者驅而復來抵暮方絶如此經旬乃死出儆戒錄章邵章邵者恒為商賈巨有財帛而終不捨貪猥誅求路岐因逢鹿避人而去鹿子為邵之所獲邵便打殺棄之林中其鹿母遙見悲號其聲不已其日邵欲夜行意有所謀也邵只有子一人年方弱冠先父一程行及困于大樹下憩歇以伺其父未間且寢于樹陰中邵乃不曉是子但見衣襆在旁一人熟寐而已遂就抽腰刀刺其喉取衣襆而前行及天漸曉見其衣襆乃知殺者是已子也嗟乎章邵兇率如此報應亦宜然出野人間話韓立善蜀金鴈橋有韓立善者作釣鉤積有年矣因食魚鯁喉成瘡頷脱而死出儆戒録僧修準蜀郡大慈寺律師修準雖云奉律性甚褊躁庭前植竹多蟻子縁欄檻準怒伐去竹盡取蟻子棄灰火中準後忽患癬瘡遍頭面醫者云蟻漏瘡不可醫後竟卒出儆戒録宇文氏宇文氏偽蜀之富家也孀居國之東門嘗聞寢室上有人行命僕隸升屋視之獲得野狸三頭并狸母宇文氏殺狸母而存其子焉未朞歲宇文氏適䕶戎王承丕丕殺判官郭延鈞一家宇文氏并前夫一男二女下獄定罪赦男女斬宇文氏吁得非殺狸母之所報也出儆戒録李貞蜀錦浦坊民李貞家養狗名黑兒貞因醉持斧擊殺之李貞臨老與鄰舍惡少白昌祚争競昌祚乘醉以斧擊貞死焉時昌祚年十九歲與殺狗年正同昌祚小字黑兒寃報顯然不差絲髪出儆戒録僧秀榮蜀郡金華寺法師秀榮院内多松栢生毛蟲色黃長三二寸莫知紀極秀榮使人掃除埋瘞或棄于柴積内僧仁秀取柴煮料于烈日中曬乾蟲死者無數經月餘秀榮暴卒金華寺有僧入㝠見秀榮荷鐵枷坐空地烈日中有萬萬蟲咂噬僧還魂備説與仁秀仁秀大駭遂患背瘡數日而卒出儆戒録毋乾昭蜀人毋乾昭有莊在射洪縣因徃莊収刈有鹿遭射逐之驚忙走投乾昭昭閉于空房中説與鄰僧法惠法惠笑曰天送食物豈宜輕捨乃殺之沽酒炙鹿共僧飲啖僧食一塊忽大呌云刀割我心嘔血至夕而死出儆戒録李紹蜀民李紹好食犬前後殺犬數百千頭嘗得一黑犬紹憐之蓄養頗厚紹因醉夜歸犬迎門號吠紹怒取斧擊犬有兒子自内走出斧正中其首立死一家惶駭且捕犬犬走不知所之紹後得病作狗嘷而死出儆戒録太平廣記卷一百三十三
