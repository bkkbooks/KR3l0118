body:
  text: 太平廣記卷三百四十九宋李昉等編鬼三十四房陟王超段何韋鮑生妓梁璟崔御史曹唐房陟房陟任清河縣尉妻滎陽鄭氏有容色時村中有一老嫗將詣謁禪師未至而中路荒野間見一白衣婦人于蓁棘中行哭極哀繞一邱阜數十步間若見經營之狀者嫗怪而往問及漸逼婦人即逺嫗適廻而婦人復故處如是數四嫗度非人天昏黒遂捨之及至禪師處説所見兼述婦人形狀衣服禪師異之因書記屋壁後月餘日房陟妻暴亡果葬于前所哭繞邱阜間而容貌衣服一如老嫗前見者出通幽記王超太和五年復州醫人王超善用針病無不差死經宿而蘇言如夢至一處城壁臺閣如王者居見一人卧召前脈視左膊有腫大如杯令超治之即為針出膿升餘顧黄衣吏曰可領視畢也超隨入一門門署曰畢院庭中有人眼數千聚成山視内迭瞬明滅黄衣曰此即畢也俄有二人形甚奇偉分處左右鼔巨箑吹激聚眼扇而起或飛或走為人者頃刻而盡超訪其故黄衣曰有生之𩔖先死為畢言次忽活出酉陽雜俎段何進士段何賃居客户里大和八年夏卧疾逾月小愈晝日因力櫛沐憑几而坐忽有一丈夫自所居壁縫中出裳而不衣嘯傲立于何前熟顧何日疾病若此胡不娶一妻俾侍疾忽爾病卒則如之何何知其鬼物矣曰某舉子貧寒無意婚娶其人曰請與君作媒氏今有人家女子容徳可觀中外清顯姻屬甚廣自有資從不煩君財聘何曰未成名終無此意其人又曰不以禮亦可矣今便與君迎來其人遂出門須臾復來曰至矣俄有四人負金璧輿從二青衣一雲髻一半髻皆絶色二蒼頭持裝奩衣箧直置輿於階前媒者又引入閤中垂幃掩户復至何前曰迎他良家子來都不為禮無乃不可乎何惡之兼以困憊就枕不顧媒又曰縱無意收採第試一觀如是説諭再三何終不應食頃媒者復引出門輿中者乃以紅箋題詩一篇置何案上而去其詩云樂廣清羸經幾年姹娘相託不論錢輕盈妙質歸何處惆悵碧樓紅玉田其書跡柔媚亦無姓名紙末唯書一我字何自此疾病日退出河東記韋鮑生妓酒徒鮑生家富畜妓開成初行歴陽道中止定山寺遇外弟韋生下第東歸同憇水閣鮑置酒酒酣韋謂鮑曰樂妓數輩焉在得不有携者乎鮑生曰幸各無恙然滯維揚日連斃數駟後乗旣闕不果悉從唯與夢蘭小倩俱今亦可以佐歡矣頃之二䨇鬟抱胡琴方響而至遂坐韋生鮑生之右摐絲擊金響亮溪谷酒闌鮑謂韋曰出城得良馬乎對曰予春初塞遊自鄜坊歴烏延抵平夏止靈武而廽部落駔駿獲數疋龍形鳯頸鹿脛鳧膺眼大足輕脊平肋密者皆有之鮑撫掌大悦乃停杯命燭閲馬於軒檻前數匹與向來誇誕十未盡其八九韋戲鮑曰能以人換任選殊尤鮑欲馬之意頗切宻遣四絃更衣盛粧頃之乃至命捧酒勸韋生歌一曲以送之云白露濕庭砌皓月臨前軒此時頗留恨含思獨無言又歌送鮑生酒云風颭荷珠難暫圓多生信有短因縁西樓今夜三更月還照離人泣斷絃韋乃召御者牽紫叱撥以酬之鮑意未滿往復之説紊然無章有紫衣冠者二人導從甚衆自水閣之西升階而來鮑韋以寺當星使交馳之路疑大寮夜至乃恐悚入室闔户以窺之而盃盤狼籍不暇收拾時紫衣即席相顧笑曰此即向來聞妾換馬之筵因命酒對飲一人鬚髯甚長質貌甚偉持盃望月沉吟久之曰足下盛賦云斜漢左界北陸南躔白露曖空素月流天可得光前絶後矣對月殊不見賞氣霽地表雲歛天末洞庭始波木葉㣲脱長鬚云數年來在長安蒙樂遊王引至南宫入都堂與劉公幹鮑明逺看試秀才子竊入司文之室於燭下窺能者制作見屬對頗切而賦有蜂腰鶴膝之病詩有重頭重尾之犯若如足下洞庭木葉之對為紕繆矣小子拙賦云紫臺稍逺燕山無極涼風忽起白日西匿則稍逺忽起之聲俱遭黜退矣不亦異哉謂長鬚曰吾聞古之諸侯貢士于天子尊賢勸善者也故一適謂之好徳再適謂之尊賢三適謂之有功乃加九錫不貢士一黜爵再黜地三黜爵地夫古之求士也如此猶恐搜山之不髙索林之不深尚有遺漏者乃毎嵗季春開府庫出幣帛周天下而禮聘之當是時儒墨之徒豈盡出矣智謀之士豈盡舉矣山林川澤豈無遺矣日月照臨豈得盡其所矣天子求之既如此諸侯貢之又如此聘禮復如此尚有栖栖于巖谷鬱鬱不得志者吾聞今之求聘之禮缺是貢舉之道隳矣賢不肖同途焉才不才汨汨焉隱巖穴者自童髦窮經至於白首焉懐方䇿者自壯嵗力學訖于没齒雖毎嵗鄉里薦之于州府州府貢之于有司有司考之詩賦蜂腰鶴膝謂不中度彈聲韻之清濁謂不律雖有周孔之賢聖班馬之文章不由此製作靡得而達矣然皇王帝霸之道興亡理亂之體其可聞乎今足下何乃贊揚今之小巧而隳張古之大體况予乃愬皓月長歌之手豈能歡于雕文刻句者哉今珠露既清桂月如晝吟咏時發盃觴間行能援筆聨句賦今之體調一章以樂長夜否曰何以為題長鬚云便以妾換馬為題仍以捨彼傾城求其駿足為韻命左右折庭前芭蕉一片啓書囊抽毫以操之各占一韻長鬚者唱云彼佳人兮如瓊之瑛此良馬兮負駿之名將有求于逐日故何惜于傾城香暖深閨永厭桃花之色風清廣陌曽憐噴玉之聲希逸曰原夫人以矜其容馬乃稱其徳既各從其所好諒何求而不克長跪而别姿容休耀其金鈿右牽而來光彩頓生于玉勒文通曰步及庭砌効當軒墀望新恩俱非吾偶也戀舊主疑借人乗之香散緑駿意已忘于鬂髮汗流紅頷愛無異於凝脂希逸曰是知事有興廢用有取捨彼以絶代之容為鮮矣此以軼羣之足為貴者買笑之恩既盡有𩔖卜之據鞍之力尚存猶希進也文通賦四韻訖芭蕉盡韋生發箧取紅箋跪獻於廡下二公大驚曰幽顯路殊何見逼之若是然吾子非後有爵禄不可與鄙夫相遇謂生曰異日主文柄較量俊秀輕重無以小巧為意也言訖二公行十餘步間忽不知其所在矣出纂異記梁璟有梁璟者開成中自長沙將舉孝廉途次商山舍于舘亭中時八月十五夕天雨新霽風月髙朗璟偃而不寐至夜半忽見三丈夫衣冠甚古皆被珠緑徐步而來至庭中且吟且賞從者數人璟心知其鬼也然素有膽氣因降階揖之三人亦無懼色自稱蕭中郎王步兵諸葛長史即命席坐于庭中曰不意良夜遇君於此因呼其童曰玉山取酒酒至環席遞酌已而王步兵曰值此好風月況佳賔在席不可無詩也因舉題聨句以咏秋月步兵即首為之曰秋月圓如鏡蕭中郎曰秋風利似刀璟曰秋雲輕比絮次至諸葛長史嘿然久之二人促曰幸以拙速為事長史沈吟又食頃乃曰秋草細同毛二人皆大笑曰拙則拙矣何乃遲乎長史曰此中郎過耳為僻韻而滯捷才既而中郎又曰良㑹不可無酒佐命玉山召蕙娘來玉山去頃之有一美人鮮衣自門步來笑而拜坐客諸葛長史戲謂女郎曰自赴中郎召耳與吾何事美人曰安知不為衆人來步兵曰欲自明無如歌以送長史酒蕙娘起曰願歌鳯樓之曲即歌之清吟怨慕璟聽之忘倦久而歌闋中郎又歌曲既終曰山光漸明願更綴一篇以盡歡也即曰山樹髙髙影步兵曰山花寂寂香因指長史曰向者僻韻信中郎過今願續此以觀捷才耳長史應曰山天遙厯厯一坐大笑遲不如速而且拙捷才如是耶長史色不能平次至璟曰山水急湯湯中郎泛言賞之乃問璟曰君非舉進士者乎璟曰將舉孝廉科中郎笑曰孝廉安知為詩哉璟因怒叱之長史亦奮袂而起坐客驚㪚遂失所在而盃盤亦亡見矣璟自是被疾恍惚往往夢中郎步兵來心甚惡之後至長安遇術士李生辟鬼符佩之遂絶也出宣室志崔御史廣陵有官舍地步數百制置宏麗里中𫝊其中為鬼所宅故居之者一夕則暴死鏁閉累年矣有御史崔某職於廣陵至開門曰妖不自作我新居之豈能為災耶即白廉使而居焉是夕微雨崔君命僕者盡居他室而獨寢于堂中惕然而寤衣盡沾濕即起見己之卧榻在庭中却寢未食頃其榻又遷于庭如是者三崔曰我謂天下無鬼今則果有矣即具簪笏命酒沃而祝曰吾聞居此者多暴死且人神殊道當自安其居豈害生人耶雖苟以形見以聲聞者是其負寃鬱而將有訴者或將求一飯以祭者則見于人而人自驚悸而死固非神靈害之也吾甚愚且無畏憚若真有所訴直為我言可以副汝託雖湯火不避沃而祝者三俄聞空中有言曰君人也我鬼也誠不當以鬼干人直將以深誠奉告崔曰但言之鬼曰我女子也女弟兄三人俱未筓而没父母葬我于郡城之北久矣其後府公于此峻城池搆城屋工人伐我封内樹且盡又徙我於此堂之東北隅羈魂不寜無所棲託不期今夕幸遇明君子故我得以語其寃儻君以仁心為我棺而葬于野真恩之大者矣已而涕泣嗚咽又曰我在此十年矣前後所居者皆欲訴其事自是居人驚悸而死某兒女子非有害于人也崔曰吾前言固如是矣雖然如何不見我耶鬼曰某鬼也豈敢以幽晦之質而見君乎既諾我之請雖處㝠昧中亦當感君子恩豈可徒然而已言訖遂告去明日召工人于堂東北隅發之果得枯骸葬於禪智寺隙地里人皆祭之謂之三女墳自是其宅遂安出宣室志曹唐進士曹唐以能詩名聞當世久舉不第常寓居江陵佛寺中亭沼境甚幽勝毎自臨翫賦詩得兩句曰水底有天春漠漠人間無路月茫茫吟之未久自以為常製皆不及此作一日還坐亭沼上方用怡咏忽見二婦人衣素衣貌甚閑冶徐步而吟則唐前所作之二句也唐自以製未翌日人固未有知者何遽而得之因廹而訊之不應而去未十餘步間不見矣唐方甚疑怪唐素與寺僧法舟善因言於舟舟驚曰兩日前有一少年見訪懐一碧牋示我此詩適方欲言之乃出示唐頗惘然數日後唐卒於佛舍中出靈怪集太平廣記卷三百四十九
