body:
  text: 太平廣記卷四百八宋李昉等編草木三草柰祗草三賴草席箕草䕶門草仙人絛合離草老鴉笟籬草鬼皁荚青草槐銅匙草水耐冬三白草無心草盆甑草女草媚草醉草舞草相思草無情草忘憂草睡草千步香草麝草治蠱草蛇銜草鹿活草解毒草毒草蕉毒草牧麻草龍芻紅草宫人草焦茅銷明草黄渠草聞遐草始皇蒲夢草漢武牧馬草水網藻地日草書帶草金䔲草望舒草神草柰祗草柰祗出拂林國苖長三四尺根大如鴨卵葉似蒜葉中心抽條甚長莖端有花六出紅白色花心黄赤不結子其草冬生夏死與薺麥相類取其花壓以為油塗身除風氣拂林國王及國内貴人用之出酉陽雜俎三賴草曹州及揚州淮口出夏梨三賴草如金色出於髙厓魅藥中最切用出酉陽雜俎席箕草席箕一名塞蘆生北胡地古詩云千里席箕草出述異記䕶門草常山北有草名䕶門寘諸門上夜有人過輒叱之出酉陽雜俎仙人絛衡嶽出仙人絛無根多生石上狀如帶三股色緑亦不常有出酉陽雜俎合離草合離根如羊魁有游子十二環之相須而生而實不連以氣相屬一名獨揺一名離母若土人所食者呼為赤箭矣出酉陽雜俎老鴉笊籬草老鴉笊籬葉如牛蒡而狭子熟時色黒狀如笊籬出酉陽雜俎鬼皁荚鬼皁荚生江南地澤如皁荚髙一二尺沐之長髮葉亦去衣垢出酉陽雜俎青草槐龍陽縣禆牛山南有青草槐叢生髙尺餘花若金燈仲夏發花出酉陽雜俎銅匙草銅匙草生水中葉如剪刀出酉陽雜俎水耐冬水耐冬此草終冬在水不死段成式城南别墅池中有之出酉陽雜俎三白草三白草初生不白入夏葉端方白農人候之蒔田三葉白草畢秀矣其葉似署預出酉陽雜俎無心草蚍蜉酒草一曰鼠耳像形也亦曰無心草出酉陽雜俎盆甑草盆甑草即牽牛子也秋節後斷之狀如盆甑其中有子似龜蔓署預出酉陽雜俎女草葳㽔草一名麗草亦呼為女草江湖中呼為娃草美女曰娃故以為名出酉陽雜俎媚草鶴子草蔓生也其花麴塵色淺紫蔕葉如柳而短當夏開花又呼為緑花緑葉南人云是媚草採之曝乾以代面靨形如飛鶴翅尾觜足無所不具此草蔓至春生雙蟲只食其葉越女收於粧奩中養之如蠶摘其草飼之蟲老不食而蛻為蝶赤黄色婦女收而帶之謂之媚蝶出嶺南録異醉草尸子赤縣洲為崑崙之墟其東則滷水島山左右玉紅之草生焉食其一實醉卧三百嵗出文樞鏡要舞草舞草出雅州獨莖三葉葉如決眀一葉在葉端兩葉居葉半相對人或近之則欹抵掌謳曲則揺動如舞矣出酉陽雜俎相思草秦趙間有相思草狀若石竹而節節相續一名㫁腸草又名愁婦草亦名孀草又呼為寡婦莎蓋相思之流也出述異記無情草左行草使人無情范陽長貢出酉陽雜俎忘憂草萱草一名紫萱又名忘憂草呉中書生謂之療愁嵇康養生論云萱草忘憂出述異記睡草桂林有睡草見之則令人睡一名醉草亦呼嬾婦箴出南海地記出述異記千步香草南海出百步香楓聞於千步也今海隅有千步香是其種也葉似杜若而紅碧間雜貢籍云日南郡貢千步香出述異記麝草龜甲香即桂香善者紫术香一名金杜香一名麝草香出蒼梧桂林二郡界今呉中有麝草似紅而甚芳香出述異記治蟲草新州郡境有藥士人呼為吉財解諸毒及蠱神用無比昔有人嘗至雷州途中遇毒面貌頗異自謂即斃以吉財數寸飲之一吐而愈俗云昔有人遇毒其奴吉財得是藥因以奴名名之實草根也類芍藥遇毒者夜中潛取二三寸或剉或磨少加甘草詰旦煎飲之得吐即愈俗傳將服是藥不欲顯言故云潛取而不詳其故或云昔有里媪病蠱其子為小胥邑宰命以吉財飲之暮乃具藥及旦其母謂曰吾夢人告我若飲是且死亟去之即仆於地其子又吿縣尹縣尹固令飲之果愈豈中蠱者亦有神若二豎哉出投荒録虵銜草異苑云昔有田父耕地值見傷虵在焉有一虵銜草著瘡上經日傷虵走田父取其草餘葉以治瘡皆驗本不知草名因以虵銜為名抱朴子云虵銜能續已斷之指如故是也出感應經鹿活草天名精一曰鹿活草青州劉炳宋元嘉中射一鹿剖五臟以此草塞之蹶然而起炳宻録此草種之多愈傷折俗呼為劉炳草出酉陽雜俎解毒草建寧郡烏句山南五百里生牧靡草可以解毒百卉方盛烏多誤食烏喙中毒必急飛牧靡山喙牧靡以解出酉陽雜俎毒草博落迴有大毒生江淮山谷中莖葉如麻莖中空吹作聲如勃邏故名之出酉陽雜俎蕉毒草蕉毒草如芋巨狀如雀頭置乾地則潤置濕地則乾炊飯時種於竈上比飯熟即著花結子人食之立死出感應經牧麻草有牧麻草大毒有此草值風吹其氣所至則數里内稻皆即死李淳風云其汁本清得水則稠見日則濕入廕即乾在夏欲凉在冬欲溫出感應經龍芻東海島龍駒川穆天子養八駿處島中有草名龍芻馬食之日行千里古語一株龍芻化為龍駒出述異記紅草山戎之北有草莖長一丈葉如車輪色如朝霞齊桓時山戎獻其種乃植於庭以表霸者之瑞出酉陽雜俎宫人草楚中往往有宫人草狀如金䔲而甚芬氲花似紅翠俗說楚靈王時宫人數千皆多怨曠有因死於宫中者𦵏之墓上悉生此草出述異記焦茅焦茅髙五丈火燃之成灰以水灌之復成茅是謂靈茅銷眀草銷眀草夜視如列星晝則光自銷滅也黄渠草黄渠照日如火實甚堅内食者焚身不熱聞遐草聞遐草服者輕身葉如桂莖如蘭其國獻根植之多不生實草葉多萎黄詔並除焉焦茅銷明黄渠聞遐四種並出王子年拾遺記始皇蒲齊南城東有蒲臺秦始皇所頓處時始皇在臺下縈蒲以繫馬至今蒲生猶榮俗謂秦始皇蒲出殷芸小說夢草漢武時異國獻夢草似蒲晝縮入地夜若抽萌懐其草自知夢之善惡帝思李夫人懐之輒夢出酉陽雜俎漢武牧馬草漢武於湖中牧馬處至今野草皆有嚼嚙之狀湖中呼為馬澤澤中有漢武彈碁方石上有勒銘焉出述異記水網藻漢武昆明池中有水網藻枝横倒水上長八九尺有似網目鳬鴨入此草中皆不得出因名之出酉陽雜俎地日草南方有地日草三足烏欲下食此草羲和之馭以手掩烏目食此則悶不復動東方朔言為小兒時井陷墜至地下數十年無所寄託有人引之令往此草中隔紅泉不得渡其人以一隻履因乗汎紅泉得草處食之出酉陽雜俎書帶草鄭司農常居不其城南山中教授黄巾亂乃避遣生徒崔琰王經諸賢於此揮涕而散所居山下草如薤葉長尺餘許堅韌異常時人名作康成書帶出三齊記金䔲草晉武帝為撫軍時府内後堂砌下忽生異草三株莖黄葉緑若惣金柚翠花餘苒弱狀如金䔲時人未得知是何祥瑞也故𨼆蔽不聽外人窺眎有羌人姓姚名馥字世芬充廏養馬妙解陰陽之術云此草以應金徳之瑞馥年九十嵗姚襄即其祖也馥好讀書嗜酒每醉厯月不醒於醉時好言王者興亡之事善戲笑滑稽無窮常歎云九河之水不足以為蒸薪七澤麋鹿不足以充庖俎每言凡人稟天地精靈不知飲酒者動肉含氣耳何必土木之偶而無心識乎好啜濁嚼糟恒言渴於醇酒羣輩常弄狎之呼為渇羌及晉武踐位忽見馥立於階下帝奇其倜儻擢為朝歌邑宰馥辭曰氐𦍑異域逺隔風化得逰中華已為殊幸請辭朝歌之縣長充馬圉之役時賜美酒以樂餘年帝曰朝歌郡紂之故都地有酒池故使老羌不復呼渇馥於階下髙聲而應曰馬圉老𦍑漸染皇教溥天夷貊皆為王臣今者歡酒池之樂受朝歌之地更為殷紂之比乎帝撫玉几大恱即遷為酒泉太守其地有清泉其味如酒馥乗酒而拜之遂為善政民為立生祠後以府第賜張華猶有此草故茂先金䔲賦云擢九莖於漢庭美二株於兹館貴表祥乎金徳名比類而相亂至恵帝咸熈元年三株草化為樹條葉似楊樹髙五尺以應楊璮之事時有楊雋弟瑶弟濟號曰三楊醉羌之驗也出拾遺記望舒草晉太始十年立河橋之嵗有扶支國獻望舒草其色紅葉如荷近望則如卷荷逺望則如舒荷團團如蓋亦云月出則葉舒月没則葉卷植於宫内穿池廣百步名曰望舒池愍帝之末胡人移其種於胡中至今絶矣其池尋亦平也出拾遺記神草魏明時苑中有合歡草狀如蓍一株百莖晝則衆條扶疎夜乃合作一莖謂之神岀酉陽雜爼太平廣記卷四百八
