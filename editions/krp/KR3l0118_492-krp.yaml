body:
  text: 太平廣記卷四百九十二宋李昉等編雜傳記九靈應傳涇州之東二十里有故薛舉城城之隅有善女湫廣袤數里蒹葭叢翠古木蕭疎其水湛然而碧莫有測其淺深者水族靈怪往往見焉鄉人立祠於旁曰九娘子神歳之水旱祓禳皆得祈請焉又州之西二百餘里朝那鎮之北有湫神因地而名曰朝那神其肸蠁靈應則居善女之右矣乾符五年節度使周寶在鎮日自仲夏之初數數有雲氣狀如奇峰者如美女者如鼠如虎者由二湫而興至於激迅風震雷電發屋拔樹數刻而止傷人害稼其數甚多寶責躬勵己謂為政之未敷致隂靈之所譴也至六月五日府中視事之暇昏然思寐因解巾就枕寢猶未熟見一武士冠鍪被鎧持鉞而立於階下曰有女客在門欲申㕘謁故先聴命寶曰爾為誰乎曰某即君之閽者効役有年矣寶將詰其由已見二青衣歴階而升長跪於前曰九娘子自郊墅特來告謁故先使下執事致命於明公寶曰九娘子非吾通家親戚安敢造次相面乎言猶未終而見祥雲細雨異香襲人俄有一婦人年可十七八衣裙素淡容質窈窕憑空而下立庭廡之間容儀綽約有絶世之貌侍者十餘輩皆服飾鮮潔有如妃主之儀顧歩徊翔漸及卧所寶將少避之以候其意侍者趨進而言曰貴主以君之高義可申誠信之託故將寃抑之懷訴諸明公明公忍不救其急難乎寶遂命升階相見賓主之禮頗甚肅恭登榻而坐祥烟四合紫氣充庭歛態低鬟若有憂戚之貌寶命酌醴設饌厚禮以待之俄而歛袂離席逡巡而言曰妾以寓止郊園綿厯多祀醉酒飽徳蒙惠誠深雖以孤枕寒牀甘心没齒㷀嫠有託負荷逾多但以顯晦殊途行止乖互今乃迫於情禮豈暇緘藏倘鑒幽情當敢披露寶曰願聞其說所冀識其宗系茍可展分安敢以幽顯為辭君子殺身以成仁徇其毅烈蹈赴湯火旁雪不平乃寶之志也對曰妾家世㑹稽之鄮縣卜築於東海之潭桑榆墳隴百有餘代其後遭世不造瞰室貽災五百人皆遭庾氏焚炙之禍纂紹幾絶不忍戴天潛遁幽巖沈寃莫雪至梁天監中武帝好奇召人通龍宫入枯桑島以燒燕奇味結好於洞庭君寶藏主第七女以求異寶尋聞家仇庾毗羅自鄮縣白水郎棄官解印欲承命請行隂懷不道因使得入龍宫假以求貨覆吾宗嗣賴杰公敏鑒知渠挾私請行欲肆無辜之害慮其反貽伊戚辱君之命言於武帝武帝遂止乃令合浦郡落黎縣甌越羅子春代行妾之先宗羞共戴天慮其後患乃率其族韜光滅跡易姓變名避仇於新平真寧縣安村披榛鑿穴築室於兹先人弊廬殆成胡越今三世卜居先為靈應君尋受封應聖侯後以隂靈普濟功徳及民又封普濟王威徳臨人為世所重妾即王之第九女也笄年配於象郡石龍之少子良人以世襲猛烈血氣方剛憲法不拘嚴父不禁殘虐視事禮教蔑聞未及朞年果貽天譴覆宗絶嗣削跡除名唯妾一身僅以獲免父母抑遣再行妾終違命王侯致聘接軫交轅誠願既堅遂欲自劓父母怒其剛烈遂遣屏居於兹土之别邑音問不通於今三紀雖慈顔未復温清久違離羣索居甚為得志近年為朝那小龍以季弟未婚潛行禮聘甘言厚幣峻阻復來滅性毁形殆將不可朝那遂通好於家君欲成其事遂使其季弟權徙居於王畿之西將貨於我王以成姻好家君知妾之不可奪乃令朝那縱兵相逼妾亦率其家僮五十餘人付以兵仗逆戰郊原衆寡不敵三戰三北師徒倦弊犄角無怙將欲收拾餘燼背城借一而慮晉陽水急臺城火炎一旦攻下為頑童所辱縱没於泉下無面石氏之子故詩云汎彼栢舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只此衞世子孀婦自誓之詞又云誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從此召伯聴訟衰亂之俗興貞信之教微强暴之男不能侵凌貞女也今則公之教可以精通幽顯貽範古今貞信之教故不為姬奭之下者幸以君之餘力少假兵鋒挫彼兇狂存其鰥寡成賤妾終天之誓彰明公赴難之心輒具志誠幸無見阻寶心雖許之訝其辨博欲拒以他事以觀其詞乃曰邊徼事繁烟塵在望朝廷以西陲陷敵蕪没者三十餘州將議舉戈復其土壤曉夕恭命不敢自安匪夕伊朝前茅即舉空多憤悱未暇承命對曰昔者楚昭王以方城為城漢水為池盡有荆蠻之地藉父兄之資强國外連三良内助而吳兵一舉鳥迸雲奔不暇嬰城迫於走兔寶玉遷徙宗社凌夷萬乘之靈不能庇先王之朽骨至申胥乞師於嬴氏血淚汚於秦庭七日長號晝夜靡息秦伯憫其禍敗竟為出師復楚退吳僅存亡國况芉氏為春秋之强國申胥乃衰楚之大夫而以矢盡兵窮委身折節肝腦塗地感動於强秦矧妾一女子父母斥其孤貞狂童凌其寡弱綴旒之急安得不少動仁人之心乎寶曰九娘子靈宗異𣲖呼吸風雲蠢爾黎元固在掌握又焉得示弱於世俗之人而自困如是者哉對曰妾家族望海内咸知只如彭蠡洞庭皆外祖也陵水羅水皆中表也内外昆季百有餘人散居吳越之間各分地土咸京八水半是宗親若以遣一介之使飛咫尺之書告彭蠡洞庭召陵水羅水率維揚之輕銳徵八水之鷹揚然後檄馮夷說巨靈鼓子胥之波濤混陽侯之鬼怪鞭驅列缺指揮豐隆扇疾風飜暴浪百道俱進六師鼓行一戰而成功則朝那一鱗立為虀粉涇城千里坐變汚瀦言下可觀安敢謬矣頃者涇陽君與洞庭外祖世為姻戚後以琴瑟不調棄擲少婦遭錢塘之一怒傷生害稼懷山襄陵涇水窮鱗尋斃外祖之牙齒今涇上車輪馬跡猶在史傳具存固非謬也妾又以夫族得罪於天未蒙上帝昭雪所以銷聲避影而自困如是君若不悉誠欵終以多事為詞則向者之言不敢避上帝之責也寶遂許諾卒爵撤饌再拜而去寶及晡方寤耳聞目覽恍然如在翼日遂遣兵士一千五百人戍於湫廟之側是月七日雞初鳴寶將晨興疎牖尚暗忽於帳前有一人經行於帷幌之間有若侍巾櫛者呼之命燭竟無酧對遂厲而叱之乃言曰幽明有隔幸不以燈燭見迫也寶潛知異乃屏氣息音徐謂之曰得非九娘子乎對曰某即九娘子之執事者也昨日蒙君假以師徒救其危患但以幽顯事别不能驅策茍能存其始約幸再思之俄而紗窗漸白注目視之悄無所見寶良久思之方達其義遂呼吏命按兵籍選亡没者名得馬軍五百人歩卒一千五百人數内選押衙孟逺充行營都虞候牒送善女湫神是月十一日抽迴戍廟之卒見於廳事之前轉旋之際有一甲士仆地口動目瞬問無所應亦不似暴卒者遂置於廊廡之間天明方悟遂使人詰之對曰某初見一人衣青袍自東而來相見甚有禮謂某曰貴主蒙相公莫大之恩拯其焚溺然亦未盡誠欵假爾明敏再通幽情幸無辭勉也某詭以他詞拒之遂以袂相牽懵然顛仆但覺與青衣者繼踵偕行俄至其廟促呼連歩至於帷薄之前見貴主謂某云昨蒙相公憫念孤危俾爾戍於敝邑往返途路得無勞止余近蒙相公再借兵師深愜誠願觀其士馬精强衣甲銛利然都虞候孟逺才輕位下甚無機略今月九日有遊軍三千餘來掠我近郊遂令孟逺領新到將士邀擊於平原之上設伏不密反為彼軍所敗甚思一權謀之將俾爾速歸達我情素言訖拜辭而出昏然似醉餘無所知矣寶驗其說與夢相符意欲質前事遂差制勝關使鄭承符以代孟逺是月三日晚衙於後毬塲瀝酒焚香牒請九娘子神收管至十六日制勝關申云今月十三日夜三更已來關使暴卒寶驚歎息使人馳視之至則果卒唯心背不冷暑月停尸亦不敗壞其家甚異之忽一夜隂風慘冽吹沙走石發屋拔樹禾苗盡偃及曉而止雲霧四布連夕不解至暮有迅雷一聲劃如天裂承符忽呻吟數息其家剖棺視之良久復蘇是夕親鄰咸聚悲喜相仍信宿如故家人詰其由乃曰余初見一人衣紫綬乘驪駒從者十餘人至門下馬命吾相見揖讓周旋手捧一牒授吾云貴主得吹塵之夢知君負命世之才欲尊南陽故事思殄邦仇使下臣持兹禮幣聊展敬於君子而冀再康國歩幸不以三顧為勞也余不暇他辭唯稱不敢酬酢之際已見聘幣羅於階下鞍馬器甲錦綵服翫櫜鞬之屬咸布列於庭吾辭不獲免遂再拜受之即相促登車所乘馬異常駿偉裝飾鮮潔僕御整肅倏忽行百餘里有甲馬三百騎已來迎候驅殿有大將軍之行李余亦頗以為得志指顧間望見一大城其雉堞穹崇溝洫深濬余惚恍不知所自俄於郊外備帳樂設享讌罷入城觀者如堵傳呼小吏交錯其間所經之門不記重數及至一處如有公署左右使余下馬易衣趨見貴主貴主使人傳命請以賓主之禮見余自謂既受公文器甲臨戎之具即是臣也遂堅辭具戎服入見貴主使人復命請去櫜鞬賓主之間降殺可也余遂捨器仗而趨入見貴主坐於㕔上余拜謁一如君臣之禮拜訖連呼登階余乃再拜升自西階見紅妝翠眉蟠龍髻鳯而侍立者數十餘輩彈絃握管穠花異服而執役者又數十輩腰金拖紫曳組攢簪而趨隅者又非止一人也輕裘大帶白玉横腰而森羅於階下者其數甚多次命女客五六人各有侍者十數輩差肩接跡累累而進余亦低視長揖不敢施拜坐定有大挍數人皆令預坐舉進樂酒至貴主歛袂舉觴將欲興詞敘向來徵聘之意俄聞烽燧四起叫噪喧呼云朝那賊歩騎數萬人今日平明攻破堡塞尋已入界數道齊進烟火不絶請發兵救應侍坐者相顧失色諸女不及敘别狼狽而散及諸挍降階拜謝佇立聴命貴主臨軒謂余曰吾受相公非常之恵憫其孤惸繼發師徒拯其患難然以車甲不利權略是思今不棄弊陋所以命將軍者正為此危急也幸不以幽僻為辭少匡不逮遂别賜戰馬二疋黄金甲一副旌旗旄鉞珍寶器用充庭溢目不可勝計彩女二人給以兵符錫賚甚豐余拜捧而出傳呼諸將指揮部伍内外響應是夜出城相次探報皆云賊勢漸雄余素諳其山川地里形勢孤虚遂引軍夜出去城百餘里分布要害明懸賞罰號令三軍設三伏以待之遲明排布已畢賊汰其前功頗甚輕進猶謂孟逺之統衆也余自引輕騎登髙視之見烟塵四合行陣整肅余先使輕兵搦戰示弱以誘之接以短兵且戰且行金革之聲天裂地坼余引兵詐北彼亦盡銳前趨鼓噪一聲伏兵盡起千里轉戰四面夾攻彼軍敗績死者如麻再戰再奔朝那狡童漏刃而去從亡之卒不過十餘人余選健馬三十騎追之果生寘於麾下由是血肉染草木脂膏潤原野腥穢蕩空戈甲山積賊帥以輕車馳送於貴主貴主登平朔樓受之舉國士民咸來㑹集引於樓前以禮責問唯稱死罪竟絶他詞遂令押赴都市腰斬臨刑有一使乘傳來自王所持急詔令促赦之曰朝那之罪吾之罪也汝可赦之以輕吾過貴主以父母再通音問喜不自勝謂諸將曰朝那妄動即父之命也今使赦之亦父之命也昔吾違命乃貞節也今若又違是不祥也遂命解縛使單騎送歸未及朝那包羞而卒於路余以克敵之功大被寵錫尋備禮拜平難大將軍食朔方一萬三千户别賜第宅輿馬寶器衣服婢僕園林邸第旌􅓚鎧甲次及諸將賞賚有差明日大宴預坐者不過五六人前者六七女皆來侍坐風姿豔態愈更動人竟夕酣飲甚歡酒至貴主捧觴而言曰妾之不幸少處空閨天賦孤貞不從嚴父之命屏居於此三紀矣蓬首灰心未得其死鄰童迫脅幾至顛危若非相公之殊恩將軍之雄武則息國不言之婦又為朝那之囚耳永言期恵終天不忘遂以七寶鍾酌酒使人持送鄭將軍余因避席再拜而飲余自是頗動歸心詞理懇切遂許給假一月宴罷出明日辭謝訖擁其麾下三十餘人返於來路所經之處聞雞犬頗甚酸辛俄頃到家見家人聚泣靈帳儼然麾下一人令余促入棺縫之中余欲前而為左右所聳俄聞震雷一聲醒然而悟承符自此不事家産唯以後事付妻孥果經一月無疾而終其初欲暴卒時告其所親曰余本機鈐入用効節戎行雖奇功蔑聞而薄效粗立洎遭釁累譴謫於兹平生志氣鬱而未申丈夫終當扇長風摧巨浪舉太山以壓卵决東海以沃螢奮其鷹犬之心為人雪不平之事吾朝夕當有所受與子分襟固不久矣其月十三日有人自薛舉城晨發十餘里天初平曉忽見前有車塵競起旌旗煥赤甲馬數百人中擁一人氣概洋洋然逼而視之鄭承符也此人驚訝移時因佇於路左見瞥如風雲抵善女湫俄頃悄無所見太平廣記卷四百九十二
