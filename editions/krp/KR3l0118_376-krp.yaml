body:
  text: 太平廣記卷三百七十六宋李昉等編再生二鄭㑹王穆卲進李太尉軍士五原將挍范令卿湯氏子士人甲李簡竹季貞陸彦鄭㑹滎陽鄭㑹家在渭南少以力聞唐天寶末祿山作逆所在賊盜蜂起人多羣聚州縣㑹恃其力尚在莊居親族依之者甚衆㑹恒乘一馬四逺覘賊如是累月後忽五日不還家人憂愁然以賊刼之故無敢尋者其家樹上忽有靈語呼阿妳即㑹妻乳母也家人惶懼藏避又語云阿妳不識㑹耶前者我往探賊便與賊遇衆寡不敵遂為所殺我以命未合死頻訴於𡨕官今䝉見允已判重生我屍在此莊北五里道旁溝中可持火來及衣服往取家人如言於溝中得其屍失頭所在又聞語云頭北行百餘步桑樹根下者也到舍可以穀樹皮作線攣之我不復來矣努力勿令參差言訖作鬼嘯而去家人至舍依其攣湊畢通身人色及腰目數日乃能視恒以米飲灌之百日如常出廣異記王穆太原王穆唐至徳初為魯旻部將於南陽戰敗軍馬奔走穆形貌雄壯馬又竒大賊騎追之甚衆及以劒自後砟穆頸殪而隕地觔骨俱斷唯喉尚連初㝠然不自覺死至食頃乃悟而頭在臍上方始心惋旋覺食漏遂以手力扶頭還附頸須臾復落悶絶如初久之方蘇正頸之後以髪分繫兩畔乃能起坐心亦茫然不知自免而所乘馬初不離穆穆之起亦來止其前穆扶得立左膞髮解頭墜懷中衣後方蘇繫髮正首之後穆心念馬卧方可得上馬忽横伏穆前因得上馬馬亦隨之起載穆東南行穆兩手附兩頰馬行四十里穆麾下散卒十餘人羣行亦便路求穆見之扶寄村舍其地去賊界四十餘里衆心惱懼遂載還旻軍軍城尋為賊所圍穆於城中養病二百餘日方愈繞頸有肉如指頭竟小偏旻以穆名家子兼身以王事差攝南陽令尋奏葉令歳餘遷臨汝令秩滿攝棗陽令卒於官出廣異記邵進唐大歴元年周智光為華州刺史刼剝行侣旋欲謀反遣吏邵進潛往京伺朝廷禦伐之意進歸告曰朝廷無疑公之心光怒以其叶朝廷而紿於已遽命斬之既而甚悔速遣送其首付妻兒妻即以針紉頸俄頃復活以藥傅之然猶懼智光使人告光曰進本蒲人今欲歸葬光亦賙賻之既至蒲浹旬其瘡平愈乃改姓他遊後三十年崔顒為宋州牧晨衙有一人投刺曰敕吏顒召見訊其由進曰明公昔為周光智從事因敘其本末顒乃省悟與縑帛揖之而去出獨異志李太尉軍士長安里巷說朱泚亂時李太尉軍中有一卒為亂兵所刄身頸異處凡七日忽不知其然而自起但覺臚骨稱哽咽喉彊於昔時而受刃處癢甚行步無所苦扶持而歸本家妻兒異之訊其事具說其所體與頸分之時全不悟其害亦無心記憶家鄉忽為人驅入城門被引隨兵死數千計至其東面有大局署見綠衣長吏凭几㸃籍姓名而過次呼其人便云不合來乃呵責極切左右逐出令還見𡨕司一人髠桑木如臂大其狀若浮漚釘牽其人頭身斷處如令勘合則以桑木釘自腦釘入喉俄而便覺再見日月不甚痛楚妻兒因是披頂髪而觀則見隆髙處一寸已上都非尋常皮裏桑木黄文存焉人或謂之粉黛元和中温㑹有宗人守清為邠鎭之權將忽話此事守清便呼之前出乃云是其麾下甲馬士耿皓今已七十餘膂力猶可支數夫㑹因是親覩其異出定命錄五原將挍五原遣將挍往楊子請衣賜挍有所知能承顧問院官與之欵曲顧見項上有一肉環圍遶瘢痕可懼院官與之熟因詰其所來具對昔歳巡邊其衆五六百深犯榆塞遭虜騎掩襲衆數千悉是騎兵此五百短兵全軍陷殁積屍為京觀其身首已異矣至日入但魂魄覺有呵喝狀若宫府一㸃巡者至某官怒曰此人不合死因何殺却胥者扣頭求哀官曰不却活君須還命胥曰活得遂許之良久而喝迴又更約束須速活却誤死者胥厲聲唱喏某頭安在項上身在三尺厚葉上卧頭邊有半椀稀粥一張折柄匙揷在椀中某能探手取匙抄致口中漸能食即又迷悶睡著眼開又見半椀粥匙亦在中如此六七日能行䇿杖却投本處荏苒今日其瘢痕是也出芝田錄范令卿縊死復再生隋文帝開皇二年汴州浚儀縣功曹范欽子令卿在家與族人文志挍書競工拙令卿以手反擊文志鼻血出不止因即殞文志父乃執令卿以繩懸縊於屋梁移時氣絶文志父母恐令卿却活復用布重絞之死經三日令卿却蘇文志長逝出五行記湯氏子湯氏子者其父為樂平尉令李氏隴西望族素輕易恒以吳人狎侮尉甚不平輕為令所猥辱如是者已數四尉不能堪某與其兄詣令紛争令格罵叱左右曵下將加捶楚某懷中有劒直前刺令中胸不深後數日死令家人亦擊某繫獄州斷刑令辜内死當決殺將入市無悴容有善相者云少年有五品相必當不死若死吾不相人矣施刑之人加之以繩決畢氣絶牽曵就獄至夕乃蘇獄卒白官官云此手殺人義無活理令卒以繩縊絶其夕三更復蘇卒又縊之及明復蘇獄官以白刺史舉州歎異而限法不可呼其父令自斃之又於州門對衆縊絶刺史哀其終始命家收之及將歸第復活因葬空棺養之暗室久之無恙乾元中為全椒令卒出廣異記士人甲易形再生晉元帝世有甲者衣冠族姓暴病亡見人將上天詣司命司命更推挍算歴未盡不應枉召主者發遣令還甲尤脚痛不能行無緣得歸主者數人共愁相謂曰甲若卒以脚痛不能歸我等坐枉人之罪遂相率具白司命司命思之良久曰適新召胡人康乙者在西門外此人當遂死其脚甚健易之彼此無損主者承敕出將易之胡形體甚醜脚殊可惡甲終不肯主者曰君若不易便長決留此耳不獲已遂聽之主者令二並閉目倐忽二人却已各易矣仍即遣之豁然復生具為家人說發視果是胡脚叢毛連結且胡臭甲本士愛翫手足而忽得此了不欲見雖獲更活毎惆悵殆欲如死旁人見識此胡者死猶未殯家近在茄子浦甲親往視胡尸果見其脚著胡體正當殯斂對之泣胡兒並有至性毎節朔兒並悲思馳往抱甲脚號咷忽行路相遇便攀援啼哭為此毎出入時恒令人守門以防胡子終身憎穢未嘗悞視雖三伏盛暑必復重衣無暫露也出幽明錄李簡唐開元末蔡州上蔡縣南里村百姓李簡癇病卒瘞後十餘日有汝陽縣百姓張𢎞義素不與李簡相識所居相去十餘舍亦因病經宿却活不復認父母妻子且言我是李簡家住上蔡縣南李村父名亮遂徑往南李村入亮家亮驚問其故言方病時夢二人著黄齎帖見追行數十里至大城署曰王城引入一處如人間六司院留居數日所勘責事委不能對忽有一人自外來稱錯追李簡可即放還有一吏曰李身壞别令託生一時憶念父母親族不欲别處受生因請却復本身少頃見領一人至通曰追到雜職汝陽張𢎞義吏又曰張𢎞義身幸未壞速令李簡託其身以盡餘年遂被兩吏扶却出城但行甚速漸無所知忽若夢覺見人環泣及屋宇都不復認亮問其親族名氏及平生細事無不知也先解竹作因息入房索刀具破篾盛器語音舉止信李簡也竟不返汝陽時叚成式三從叔父攝蔡州司户親驗其事昔扁鵲易魯公扈趙齊嬰之心及寤互返其室二室相諮以是稽之非寓言矣出酉陽雜俎竹季貞陳蔡間有民竹季貞卒十餘年矣後里人趙子和亦卒數日忽寤即起馳出門其妻子驚前訊之子和曰我竹季貞也安識汝今將歸吾家既而語音非子和矣妻子遂隨之至季貞家見子和來以為狂疾罵而逐之子和曰我竹季貞卒十一年今乃歸何拒我耶其家聆其語果季貞也驗其事又季貞也妻子俱駭異請之季貞曰我自去人世迨今且一紀居𡨕途中思還省妻孥不一日忘然㝠間毎三十年即一逝者再生使言罪福昨者吾啟請案據得以名聞㝠官願為再生者既而㝠官謂我曰汝宅舍壞久矣如何案據白曰季貞同里趙子和者卒數日願假其屍與季貞之魂㝠官許之即遣使送我於趙氏之舍我故得歸因話平昔事歴然可聽妻子方信而納之自是季貞不食酒肉衣短麤衣行乞陳蔡汝鄭間緡帛随以修佛像施貧餓者不一還家至今尚存出宣室志陸彦餘杭人陸彦夏月死十餘日見王云命未盡放歸左右曰宅舍亡壞不堪時滄洲人李談新來其人合死王曰取談宅舍與之彦遂入談柩中而蘇遂作吳語不識妻子具說其事遂向餘杭訪得其家妻子不認具陳由來乃信之出朝野僉載太平廣記卷三百七十六
