body:
  text: 太平廣記卷四百六宋李昉等編草木一木夫子墓木五柞白銀樹合離樹玉樹豫樟荔枝木酒樹娑羅綿樹刺桐黄漆樹木蘭樹椰子樹菩提樹婆羅樹獨梪樹波斯皁荚樹木龍樹貝多樹沒樹槃碧穡波𣗳齊暾樹通脫木山桂五鬛松三鬛松魚甲柏合掌柏黄楊木青楊木俱那衛山茶夏州槐赤白檉楷木御名楮文理木宗廟文木文木簡古文柱三字薪天尊薪太平木天王槐色陵木馬文木木夫子墓木魯曲阜孔子墓上時多楷木出述異記又曰曲阜城顔回墓上有石柟二株可三四十圍土人云顔回手植之木出述異記五柞青梧附說漢五柞宫有五柞樹皆連抱上枝覆䕃數十里宫西有青梧觀觀前有三梧桐樹樹下有石麒麟二枚判其脇為文字是秦始皇驪山墓上物也頭髙一丈三尺東邊左脚折折處有赤如血父老謂有神皆含血屬筋焉出西京雜記白銀樹平原郡髙苑城西晉寧州刺史辟閭允墓前有白銀樹二十株合離樹終南山多合離樹葉似江離而紅緑相雜莖皆紫色氣如羅勒其樹直上百尺無枝上結叢條狀如車蓋一青一丹斑駁如錦繡長安謂之丹青樹亦云華葢樹亦生於熊耳山中出西京雜記玉樹雲陽縣累多漢離宫故地有樹似槐而葉細土人謂之玉樹楊子雲甘泉賦云玉樹菁葱後左思以為假稱珍蓋未詳也出國史纂異豫樟豫樟之為木也生七年而後可知也漢武寳鼎二年立豫樟宫於昆眀池中作豫樟木殿出述異記荔枝木南海郡多荔枝樹荔枝為名者以其結實時枝條弱而蔕牢不可摘取以刀斧劙取其枝故以為名凡什具以木製者率皆荔枝出扶南記酒樹頓遜國有酒樹如安石榴華汁停盃中數日成酒美而醉人博物志酒樹出典遜國名榐酒出扶南志娑羅綿樹黎州通璧縣有銷樟院在縣西一百步内有天王堂前古柏樹下有大池池南有娑羅綿樹三四人連手合抱方匝先生花而後生葉其花盛夏方開謝時不背而墮宛轉至地其花蘂有綿謂之娑羅棉善政鬱茂違時枯凋古老相傳云是肉齒和尚住持之靈跡也縣界有和尚山和尚廟皆肉齒也出黎州通璧縣圖經刺桐蒼桐不知所謂葢南人以桐為蒼桐因以名郡刺桐南海至福州皆有之叢生繁茂不知福建梧州子城外有三四株憔悴不榮未嘗見花反用名郡亦未喻也出嶺南異物志黄漆樹日濟國西南海中有三島各相去數十里其島出黄漆似中夏漆樹彼土六月破樹腹承取汁以漆器物若黄金其光奪目出洽聞記木蘭樹七里洲中有魯班刻木蘭為舟舟至今在洲中詩家所云木蘭舟出於此也木蘭舟在潯陽江中多木蘭樹昔呉王闔閭植木蘭於此用構宫殿也出述異記椰子樹椰子樹葉類海㯶實名椰子大如甌盂外有粗皮如大腹子次有硬殻圓而且堅厚二三分有圓好者即截開頭砂石摩之去其皴皮其爛斑錦文以白金裝之以為水罐子珍奇可愛殻中有液數合如乳亦可飲之而動氣菩提樹自此木下凡二十三種木並見酉陽雜俎菩提樹出摩伽陁國在摩訶菩提樹寺葢釋迦如来成道時樹一名思惟樹莖榦黄白枝葉青翠經冬不凋至佛入滅日變色凋落過已還生此日國王人民大小作佛事收葉而歸以為瑞也樹髙四百尺下有銀塔周迴遶之彼國人四時常焚香散花遶樹下作禮唐貞觀中頻遣使往於寺設供并施袈裟至髙宗顯慶五年於寺立碑以紀聖徳此樹有梵名二一曰賓撥梨婆刀義二曰阿濕曷咃婆刀義西域記謂之卑鉢羅以佛於其下成道即以道為稱故號菩提婆刀義漢飜為道樹昔中天無憂王翦伐之令事大婆羅門積薪焚焉熾燄之中忽生兩樹無憂王因懴悔號灰菩提樹遂周以石垣至賞設迦王復掘之至泉其根不絶坑火焚之以甘樜汁其焦爛後摩掲陁國滿胄王無憂之曽孫也乃以千牛乳澆之信宿樹生如舊更増石垣髙二丈四尺𤣥奘至西域見樹出石垣上二丈餘婆羅𣗳巴陵有寺僧房牀下忽生一木隨伐隨長外國僧見曰此婆羅也元嘉初出一花如蓮唐天寳初安西進婆羅枝狀言臣所管四鎮有拔汗那最為宻近木有婆羅樹特為奇絶不庇凡草不止惡禽聳榦無慚於松栝成陰不愧於桃李近差官㧞汗那使令採得前件樹枝二百莖如得託根長樂擢穎建章布葉垂陰隣月中之丹桂連枝接影對天上之白榆獨梪樹獨梪樹頓邱南有應足山山上有一樹髙十丈餘皮青滑似流碧枝榦上聳子若五綵囊葉如亡子鏡世名之仙人獨梪樹波斯皁荚樹波斯皁荚出波斯國呼爲忽野詹黙拂林呼為阿梨去伐樹長三四丈圍五六尺葉似枸緑而短小經寒不凋不花而實其荚長二尺中有隔隔内各有一子大如指赤色至堅硬中黒如墨甜如飴可噉亦宜藥用木龍樹徐之髙冡城南有木龍寺寺有三層轉塔髙丈餘塔側生一大樹縈繞至塔頂枝榦交横上平容十餘人坐枝杪四向下垂如百子帳莫有識此木者僧呼為龍木梁武曽遣人圖寫焉貝多樹貝多出摩伽陀國長六七尺經冬不凋此樹有三種一者多羅婆刀義多二者多梨婆刀義貝多三者部婆刀義多羅多梨並書其葉部闍一色取其皮書之貝多是梵語漢翻為葉貝多婆刀義者漢言樹葉也西域經書用此三種皮葉若能保䕶亦得五六百年嵩山記稱貝多葉似枇杷並􅍝交趾近出貝多枝林中第一没樹沒樹出波斯國拂林呼為阿縒長一丈許皮青白色葉如槐而長花似橘而大子黒色大如山茱萸其味酸甜可食槃碧穡波樹槃碧穡波樹出波斯國亦出拂林國拂林呼為羣漢樹長三丈圍四五尺葉似細榕經寒不凋花似橘白色子緑大如酸棗其味甜膩可食西域人壓為油以塗身可出風痒齊暾樹齊暾樹出波斯國亦出拂林呼為齊􅂒陽兮反樹長二三丈皮青白花似柚極芳香子似楊桃六月熟西域人壓為油以煮餅果如中國之巨勝也通脫木通脫木如蜱麻生山側花上粉主治惡瘡如空中有瓤輕白可愛女工取以飾物山桂山桂葉如麻細花紫色黄葉簇生與慎火草出丹陽山中五鬛松松凡言兩粒五粒粒當言鬛段成式修行里私第大堂前有五鬛松兩株大才如椀結實味與新羅者不别五鬛松皮不鱗唐中使仇士良水磑亭子有兩鬛皮不鱗者又有七鬛者不知自何而得俗謂孔雀三鬛松也松命根下遇石則偃葢不必千年也三鬛松唐衞公李徳裕言三鬛松與孔雀松别又云欲松不長以石抵其直下根便不必千年方偃魚甲柏洛中有魚甲柏合掌柏唐太常博士崔石云汝西有練溪多異柏及暮秋葉斂俗呼合掌柏黄楊木黄楊木性難長世重黄楊以無火或曰以水試之沈則無火取此木以隂晦夜無一星則伐之為枕不裂青楊木青楊木出峡中為牀卧之無蚤俱那衛俱那衞葉如竹三莖一層莖端分條如貞桐花小類木檞出桂州山茶山茶似海石榴出桂州蜀地亦有夏州槐夏州唯一郵有槐樹數株鹽州或要葉行牒求之赤白檉赤白檉出涼州大者無炭人以灰汁煮銅可以為銀楷木蜀中有木類柞衆木榮時如枯枿隆冬方萌芽布陰蜀人呼為楷木御名楮殻田乆廢必生葉有瓣大曰楷小曰構文理木凡八種並見酉陽雜俎宗廟文木宗廟地中生赤木人君禮各得其宜也文木簡齊建元初延陵季子廟舊有湧井井北忽有金石聲掘深二丈得沸泉泉中得木簡長尺廣一寸二分𨼆起字曰廬山道士張陵再拜謁木堅而白字色黄古文柱齊建元二年夏廬陵長溪水衝擊山麓崩長六七尺下得柱千餘根皆十圍長者一丈短者八九尺頭題古文字不可識江淹以問王儉儉云江東不閑𨽻書秦漢時柱也三字薪齊永眀九年秣陵安時寺有古樹伐以為薪木理自然有法天徳三字天尊薪唐都官員外陳修古言西川一縣不記名吏因換獄卒木為薪有天尊形像存焉太平木異木唐大厯中成都百姓郭逺因樵獲瑞木一莖理成字曰天下太平詔藏於祕閣天王槐長安持國寺寺門前有槐樹數株金監買一株令所使巧工解之及入内迴工言木無他異金大嗟惋令膠之曰此不堪矣但使爾知予工也及别理解之每片一天王塔㦸成就焉色陵木臺山有色陵木理如綾窠百姓取為枕呼為色陵枕馬文木鳯翔知客郭璩其父曽主作坊將解一木其間疑有鐵石鋸不可入遂以新鋸兼焚香祝之其鋸乃行及破木文有二馬形一黑一赤相齧其口鼻鬃尾蹄脚筋骨與生無異出聞奇録太平廣記卷四百六
