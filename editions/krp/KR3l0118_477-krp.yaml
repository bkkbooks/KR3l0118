body:
  text: 太平廣記卷四百七十七宋李昉等編昆蟲五張景虵醫山蜘蛛蟲變蝎化虱建草法通登封士人虱徴壁鏡大蝎紅蝙蝠青蚨滕王圖異蜂寄居異蟲蠅壁魚天牛蟲白蜂窠毒蜂竹蜂水蛆水蟲抱搶避役􅝒蝺竈馬謝豹碎車蟲度古雷蜞復育蛺蝶螘蟻樓張景平陽人張景者以善射為本郡裨將景有女始十六七甚敏惠其父母愛之居以側室一夕女獨處其中寤未熟忽見軋其户者俄見一人来被素衣貌充而肥自欹身於女之榻懼為盜黙不敢顧白衣人又前廹以笑女益懼且慮為怪焉因叱曰君豈非盗乎不然是他𩔖也白衣者笑曰東選吾心謂吾為盜且亦誤矣謂吾為他類不其甚乎且吾本齊人曺氏子也謂我美風儀子獨不知乎子雖拒我然猶寓子之舍耳言已遂偃於榻且寤焉女惡之不敢竊視迨将曉方去明夕又来女懼益甚又明日具事白於父父曰必是怪也即命一金錐貫鏤於其末且利鋩以授女教曰魅至以此表焉是夕又来女强以言洽之魅果善語夜將半女宻以錐倳其項其魅躍然大呼曳縷而去明日女告父命僮逐其跡出舍數十歩至古木下得一穴而繩貫其中乃窮之深不數尺果有一蠐螬約尺餘蹲其中焉錐表其項蓋所謂齊人曹氏子也景即殺之自此遂絶出宣室志虵醫王彦威鎮汴之二年夏旱時表王𫝊李玘過汴因宴王以旱為慮李醉曰欲雨甚易耳可求虵醫四頭十石甕二每瓮實以水浮二虵醫覆以木盖宻泥之分置於閙處瓮前設席燒香選小兒十嵗已下十餘令執小青竹晝夜更擊其瓮不得少輟王如其言試之一日兩度雨大注數百里舊說龍與虵師為親家出酉陽雜爼山蜘蛛相𫝊裴旻山行有山蜘蛛垂絲如匹布将及旻旻引弓射却之大如車輪因斷其絲數尺收之部下有金瘡者剪方寸貼之血立止出酉陽雜爼蟲變河南少尹韋絢少時嘗於夔州江岸見一異蟲初疑一棘刺從者驚曰此蟲有靈不可犯之或致風雨韋試令踏地驚之蟲飛伏地如滅細視地上若石􅍺焉良久漸起如舊每刺上有一爪忽入草疾走如箭竟不知何物出酉陽雜爼蝎化蝎負蟲巨者多化為蝎蝎子多負於背段成式嘗見一蝎負十餘子子色猶白纔如稻粒又嘗見張希復言陳州古倉有蝎形如錢螫人必死江南舊無出酉陽雜爼虱建草舊說虱蟲飲赤龍所浴水則愈虱惡水銀人有病虱者雖香衣沐浴不能已惟水銀可去之道士崔白言荆州秀才張告嘗捫得兩頭虱又有草生山足濕處葉如百合對葉獨莖莖微赤髙一二尺名虱建草能去蟣虱出酉陽雜爼法通荆州有帛師號法通本安西人少於東天竺出家言蝗蟲腹下有梵字或自天下来者及叨利天梵天来西域驗其字作本天壇法禳之今蝗蟲首有王字固自可曉或言魚子變近之矣舊言蟲食榖者部吏所致侵漁百姓則蟲食榖蟲身黒頭赤武官也頭黒身赤儒吏也出酉陽雜爼登封士人唐嘗有士人客遊十餘年歸荘荘在登封縣夜久士人睡未著忽有星火發於牆堵下初為螢稍稍芒起大如彈丸飛燭四隅漸底輪轉来往去士人面纔尺餘細視光中有一女子貫釵紅衫碧裙揺首擺尾具體可愛士人因張手掩獲燭之乃鼠糞也大如雞栖子破視有蟲首赤身青殺之出酉陽雜爼虱徴相𫝊人将死虱離身或云取病者虱於牀前可以卜病将差虱行向病者背則死出酉陽雜爼壁鏡一日汪楓亭㑹衆說單方段成式記治壁鏡用白礬重訪許君用桑柴灰汁三度沸取汁白礬為膏塗瘡口即差兼治虵毒自商鄧襄州多壁鏡毒人必死身匾五足者是坐客或云已年不宜殺虵出酉陽雜爼大蝎安邑縣北門縣人云有一蝎如琵琶大每出来不毒人人猶是恐其靈積年矣出傳載紅蝙蝠劉君云南中紅蕉花時有紅蝙蝠集花中南人呼為紅蝙蝠出酉陽雜爼青蚨青蚨似蟬而狀稍大其味辛可食每生子必依草葉大如蠶子人將子歸其母亦飛来不以逺近其母必知處然後各致小錢子巾埋東行隂牆下三日開之即以母血塗之如前每市物先用子即子歸母用母者即母歸子如此輪還不知休息若買金銀珍寳即錢不還青蚨者一名魚伯出窮神秘苑滕王圖一日紫極宫㑹秀才劉魯封云嘗見滕王蜂蝶圖有名江夏斑大海眼小海眼村裏来菜花子出酉陽雜爼異蜂異蜂有蜂状如蠟蜂稍大飛勁疾好圓裁𣗳葉卷入木竅及壁罅中作窠段成式嘗發壁尋之每葉卷中實以不潔或云將化為蜜出酉陽雜爼寄居寄居之蟲如螺而有脚形似蜘蛛本無殻入空螺殻中載以行觸之縮定如螺閉户也火炙之乃出走始知其寄居也出酉陽雜爼異蟲温㑹在江州與賔客看打魚漁子一人忽上岸狂走温問之但反手指背不能語漁者色黒細視之有物如黄葉大尺餘眼遍其上囓不可取温令燒之方落每對一眼底有觜如釘漁子出血數升而死莫有識者出酉陽雜爼蠅長安秋多蠅段成式嘗日讀百家五卷頗為所擾觸睫𨼆字敺不能已偶拂殺一焉細視之翼甚似蜩冠甚似蜂性察於腐嗜於酒肉按理首翼其類有蒼者聲雄壯負金者聲清聴其聲在翼也青者能敗物巨者首如火或曰大麻蠅芋根所化出酉陽雜爼壁魚壁魚補闕張周封言嘗見壁上白𤓰子化為白魚因知列子言朽𤓰為魚之義出酉陽雜爼天牛蟲天牛蟲黒甲蟲也長安夏中此蟲或出於籬壁間必雨段成式七度驗之皆應出酉陽雜爼白蜂窠白蜂窠段成式修行里私第果園數畝壬戍年有蜂如麻子蜂膠土為巢於庭前􅉉大如雞卵色正白可愛家弟惡而壊之其冬果舋鍾手足南史言宋明帝惡言白問金樓子言子婚日疾風雪下帷幕變白以為不祥抑知俗忌白乆矣出酉陽雜爼毒蜂毒蜂嶺南有毒菌夜明經雨而腐化為巨蜂黒色喙若鋸長三分餘夜入人耳鼻中斷人心繫出酉陽雜爼竹蜂蜀中有竹蜜蜂好於野竹上結窠窠大如雞卵有蔕長尺許窠與蜜並紺色可愛甘倍於常蜜出酉陽雜爼水蛆水蛆南中水溪澗中多此蟲長寸餘色黒夏深變為䖟螫人甚毒出酉陽雜爼水蟲象浦其川渚有水蟲攅木食船數十日船壊蟲甚細微出酉陽雜爼抱搶水蟲形似蛣蜣大腹下有刺如棘針螫人有毒出酉陽雜爼避役南中有蟲名避役應一日十二辰其蟲状如虵醫脚長色青赤肉鬛暑月時見於籬壁間俗見者多稱意事其首倐忽更變為十二辰状段成式再從兄尋常覩之出酉陽雜爼􅝒蝺􅝒蝺形如蟬其子如蝦著草葉得其子則母飛来就之煎食辛而美出酉陽雜爼竈馬竈馬状如促織稍大脚長好穴於竈側俗言竈有馬足食之兆出酉陽雜爼謝豹虢州有蟲名謝豹常在深土中司馬裴沈子嘗掘穴獲之小𩔖蝦蟇而圓如毬見人以前兩脚交覆首如羞状能穴地如鼢鼠頃刻深數尺或出地聴謝豹鳥聲則腦裂而死俗因名之出酉陽雜爼碎車蟲碎車赤即反蟲狀如唧聊蒼色好棲髙𣗳上其聲如人吟嘯終南有之出酉陽雜爼度古度古似書帶色類蚓長二尺許首如鏟背上有黒黄襴稍觸則斷常趂蚓蚓不復動乃上蚓掩之良乆蚓化唯腹泥如涎有毒雞食輒死俗呼土蠱出酉陽雜爼雷蜞雷蜞大如蚓以物觸之及蹙縮圓轉若鞠良久引首鞠形漸小復如蚓焉或云齧人毒甚出酉陽雜爼腹育蟬未脱時名腹育相𫝊言蛣蜣所化秀才韋翾荘在杜曲嘗冬中掘𣗳根見腹育附於朽處怪之村人言蟬固朽木所化也翾因剖一視之腹中猶實爛木出酉陽雜爼蛺蝶蛺蝶尺蠖繭所化也秀才顧非熊少時嘗見鬱棲中壊緑裙幅旋化為蝶工部員外郎張周封言百合花合之泥其隙經宿化為大蝴蝶出酉陽雜爼螘螘秦中多巨黒蟻好鬬俗呼為馬蟻次有色竊赤者細蟻中有黒遲鈍力舉等身鐡有竊黄者最有兼弱之智叚成式兒戲時常以棘刺摽蠅直其来路此蟻觸之而返或去穴一尺或數寸入穴中者如索而出疑有聲而相召也其行每六七有大首者間之整若隊伍至徙蠅時大首者或翼或殿如備異蟻狀也出酉陽雜爼蟻樓程執恭在易定野中蟻樓髙二尺餘出酉陽雜爼太平廣記卷四百七十七
