body:
  text: 太平廣記卷二百十一畫二宗測袁蒨梁元帝陶𢎞景張僧繇髙孝珩楊子華劉殺鬼鄭法士閻立德閻立本薛稷尉遲乙僧王維李思訓韓幹宗測南齊宗測字敬微炳之孫也代居江陵不應招辟驃騎將軍豫章王嶷請爲參軍測答曰何得謬傷海鳬横斤山木性善書畫𫝊其祖業志欲遊名山乃寫祖炳所畫尚子平圖於壁隱廬山居炳舊宅畫阮籍遇孫登於行障上坐卧對之又永業寺佛影臺皆稱臻絕出南齊記袁蒨齊袁蒨陳郡人時南康郡守劉繪妹爲鄱陽王妃伉儷甚篤王爲齊明帝所誅妃追傷過切心神恍惚遂成癎病醫所不療袁蒨善圖寫畫人面與眞無别乃令畫王形像并圖王平生所寵姬共照鏡狀如偶寢密令媪妳示妃妃見乃唾之因罵曰斫老奴晩於是悲情遂歇病亦痊除出謝赫畫品梁元帝梁元帝常畫聖僧武帝親爲作讚任荆州刺史時畫蕃客入朝圖帝極稱善具梁書又畫職貢圖并序外國貢獻之事序具本集又遊春苑白麻紙畫鹿圖師利像鸛鶴陂池芙蓉醮鼎圖並有題印𫝊於代出名畫記陶𢎞景梁陶𢎞景字通明明衆藝善書畫武帝嘗欲徴用隱居畫二牛一以金䪊頭牽之一則逶迤就水草梁武知其意遂不以官爵逼之出名畫記張僧繇梁張僧繇呉人也天監中爲武陵王國將軍呉興太守武帝修飾佛寺多命僧繇畫之時諸王在外武帝思之遣僧繇𫝊寫儀形對之如面也江陵天皇寺明帝置内有栢堂僧繇畫盧舍那像及仲尼十哲帝怪問釋門内如何畫孔聖僧繇曰後當頼此耳及後周滅佛法焚天下寺㙮獨此殿有宣尼像乃不毁拆又金陵安樂寺畫四龍不㸃眼睛毎云㸃之即飛去人以為妄誕因請㸃之須㬰雷電破壁二龍乘雲騰上天未㸃睛者見在初呉曹不興圖青溪龍僧繇見而鄙之乃廣其像於龍泉亭其畫留在祕閣時未之重至太清中雷震龍泉亭遂失其壁方知神妙云又畫天竺二胡僧因侯景亂散拆為二一僧為唐右常侍陸堅所寳堅疾篤夢胡僧告云我有同侶離拆多年今在洛陽李家若求合之當以法力助君陸以錢帛求於其處果購得之疾亦尋愈劉長卿為記述之其張畫所有靈感不可具載出名畫記又潤州興國寺苦鳩鴿栖梁上穢汙尊容僧繇乃東壁上畫一鷹西壁上畫一鷂皆側首向簷外看自是鳩鴿等不復敢来出朝野僉載髙孝珩北齊髙孝珩世宗第二子封廣寧郡王尚書大司徒同州牧博渉多才藝嘗於廰壁畫蒼鷹觀者疑其真鳩雀不敢近又畫朝士圖當時妙絕為周師所虜授開府封縣侯孝珩亦善音律周武宴齊君君臣自彈琵琶命孝珩吹笛出名畫記楊子華北齊楊子華世祖時任直閣將軍員外散騎侍郎常畫馬於壁夜聽聞啼齧長鳴如索水草聲圖龍於素舒之輒雲氣縈集世祖重之使居禁中天下號為畫聖非有詔不得與外人畫時有王子沖善棊通神號為二絕出名畫記劉殺鬼北齊劉殺鬼與楊子華同時世祖俱重之畫鬬雀於壁間帝見之以為生拂之方覺常在禁中錫賚巨萬任梁州刺史名見北齊書出名畫記鄭法士隋田楊與鄭法士同於京師光明寺畫小塔鄭圖東壁北壁田圖西壁南壁楊畫外邉四面是稱三絕楊以簟蔽畫處鄭竊觀之謂楊曰卿畫終不可學何勞障蔽鄭託以婚姻有對門之好又求楊畫夲楊引鄭至朝堂指以宫闕衣冠人馬車乘曰此是吾之畫夲也由是鄭深伏光明寺改為大雲寺在長安懐逺里也出名畫記閻立德唐貞觀三年東蠻謝元深入朝冠烏熊皮冠以金絡額毛帔以裳為行縢著履中書侍郎顔師古奏言昔周武王治致太平逺國歸欵周史乃集其事為王曾篇今聖德所及萬國來朝卉服鳥章俱集京邸實可圖寫貽于後以彰懐逺之德從之乃命立德等圖畫之又趙郡李嗣真論畫其上品之第三序右相博陵子閻立夲洎其兄工部尚書大安公立德之畫曰大安博陵難兄難弟自江右陸謝云亡北朝子華長逝象人之妙實為中興至如萬國来庭奉塗山之玉帛百蠻朝貢接應門之序位折旋矩規端簪奉笏之儀魁詭譎怪鼻飲頭飛之俗莫不盡該豪末備得精神出談賔録閻立夲唐太宗朝官位至重與兄立德齊名嘗奉詔寫太宗真容後有佳手𫝊寫於𤣥都觀東殿前間以鎮九五岡之氣猶可以仰神武之英威也立德創職貢圖異方人物詭怪之狀立夲畫國王粉夲在人間昔南北兩朝名手不足過也時南山有猛獸害人太宗使驍勇者捕之不得虢王元鳯忠義奮發自往取之一箭而斃太宗壯之使立夲圖狀鞍馬僕從皆寫其真無不驚服其能有秦府十八學士淩煙閣功臣等圖亦輝映前古唯職貢鹵簿等圖與立德同製之俗𫝊慈恩畫功臣雜手成色不見其蹤其人物鞍馬冠冕車服皆神也李嗣真云師鄭法士實亦過之後有王知慎師範甚有筆力閻畫神品出唐畫斷太宗嘗與侍臣泛春苑池中有異鳥隨波容與太宗撃賞數四詔座者為詠召閻立夲寫之閣外𫝊呼云畫師閻立夲時為主爵郎中奔走流汗俯臨池側手揮丹青不堪愧赧既而戒其子曰吾少好讀書幸免墻面緣情染翰頗及儕流唯以丹青見知躬厮養之務辱莫大焉汝宜深戒勿習此也至高宗朝閻立夲為右丞相姜恪以邉將立功為左相又以年飢放國子學生歸又限令史通一經時人為之語曰左相宣威沙漠右相馳譽丹青三館學生放散五臺令史經明出大唐新語立夲家代善畫至荆州視張僧繇舊跡曰定虛得名耳明日又往曰猶是近代佳手明日又往曰名下定無虛士坐臥觀之留宿其下十日不能去出大唐新語又梁張僧繇作醉僧圖道士每以此嘲僧羣僧耻之於是聚錢數十萬貨閻立夲作醉道士圖今並𫝊于代岀國史纂異薛稷天后朝位至少保文章學術名冠當時學書師褚河南時閻立本擅畫名稷每畫蹤閻令祕書省有畫鶴時號一絕曾旅遊新安郡遇李白因留連書永安寺額兼畫西方像一壁筆力瀟灑風姿逸發曹張之亞也二妙之跡李翰林題讚見在又聞蜀郡多有畫諸佛菩薩青牛之像並居神品出唐畫斷尉遲乙僧唐尉遲乙僧土火羅國胡人也貞觀初其國王以丹青巧妙薦之闕下云其國尚有兄甲僧未有見其畫蹤乙僧今慈恩寺塔前面中間功德义凹垤花西面中間千手千眼菩薩精妙之極光宅寺七寳臺後面畫䧏魔像千怪萬狀實竒蹤也然其畫功德人物花草皆是外國之象無中華禮樂威儀之德出唐畫斷王維唐王右丞維家於藍田玉山遊止輞川兄弟以科名文學冠絕當代故時稱朝廷左相筆天下右丞詩者也其畫山水松石蹤似呉生而風標特出今京都千福寺西塔院有掩障一畫楓戍一圖輞川山谷鬱盤雲水飛動意出塵外怪生筆端常自題詩云夙世謬詞客前身應畫師其自負也如此慈恩寺東院與畢庻子鄭廣文各畫一小壁時號三絕故庾右丞宅有壁圖山水兼題記亦當時之妙也山水松石妙臻上品出唐畫斷又維嘗至招國坊庾敬休宅見屋壁有畫奏樂圖維熟視而笑或問其故維曰此霓裳羽衣曲第三叠第一拍好事者集樂工驗之無一差者出國史補李思訓唐開元中諸衛將軍李思訓子昭道為中舍俱得山水之妙時人云大李將軍小李將軍是也思訓格品高竒山川妙絕鳥獸草木皆其能中舍之圖山水鳥獸甚多䌓巧智思筆力不及也天寳中𤣥宗召思訓畫大同殿壁兼掩障異日因奏對詔云卿所畫掩障夜聞水聲通神之佳手國朝山水第一思訓神品昭道妙上品出唐畫斷韓幹唐韓幹京兆人也唐𤣥宗天寳中召入供奉上令師陳閎畫馬怪其不同詔因詰之奏云臣自有師陛下内廄馬皆臣之師也上甚異之其後果能狀飛龍之質盡噴玉之竒九方之識既精伯樂之相乃備且古之畫馬有周穆王八駿圖國朝閻立夲畫馬似模展鄭多見筋骨皆擅一時之名未有希代之妙開元後四海清平外域名馬重譯累至然而砂磧且遥蹄甲多薄𤣥宗遂擇其良者與中國之駿同頒馬政自此内廄有飛黄照夜浮雲五方之乘竒毛異狀筋骨既同蹄甲皆厚駕御歴險若轝輦之安馳驟應心中韶頀之節是以陳閎貌之於前韓幹繼之於後寫渥洼之狀不在水中移騕褭之形出於天上韓故居神品陳兼寫真居妙品上寳應寺三門神西院北方天王佛殿前面菩薩西院佛像寳聖寺北院二十四聖等皆其蹤也畫馬髙㑹菩薩西院鬼神等神品出唐畫斷又幹閒居之際忽有一人朱衣𤣥冠而至幹問曰何得及此對曰我鬼使也聞君善圖良馬願賜一匹幹立畫焚之數日因出有人揖而謝曰蒙君惠駿足免為山川䟦渉之勞亦有以酬効明日有人送素縑百疋不知其来幹収而用之出獨異志建中初曾有人牽馬訪醫稱馬患脚以二千求治其馬毛色骨相馬醫未嘗見笑曰君馬酷似韓幹所畫者真馬中固無也因請馬主遶市門一匝馬醫随之忽值韓幹幹亦驚曰真是吾設色者乃知隨意所匠必冥㑹所肖也遂摩挲馬若蹶因損前足幹心異之至舍視其所畫馬夲脚有一㸃黑缺方知畫通靈矣馬醫所獲錢用歴數年乃成泥錢出酉陽雜俎太平廣記卷二百十一
