body:
  text: 太平廣記卷一百三報應二司馬喬卿孫夀李觀豆盧夫人尼修行陳文達高紙白仁哲竇徳𤣥宋義倫李岡王陁王令望陳惠妻何澋張𤣥素李丘一司馬喬卿唐大理司直河内司馬喬卿天性純謹有志行永徽中為揚州司戸曹丁母憂居喪毁瘠骨立刺血寫金剛般若經二卷未幾於廬側生芝草二莖九日長尺有八寸綠莖朱葢日瀝汁一升食之味甘如蜜取而復生喬卿同寮數人並目覩其事出法苑珠林孫夀唐顯慶中平州人孫夀於海濵遊獵遇野火草木蕩盡唯有一叢茂草獨不焚疑草中有伏獸遂燭之以火竟不爇夀甚恠之入草中窺視乃獲一函金剛般若經其傍又有一死僧顔色不變火不延燎葢由此也始知經像非凡所測孫夀親自說之出法苑珠林李觀唐隴西李觀顯慶中寓止滎陽丁父憂乃刺血冩金剛般若心經隨願往生經各一卷自後院中恒有異香非常馥烈鄰側亦常聞之無不稱歎中山郎徐合過鄭州見彼親友具陳其事出法苑珠林豆盧夫人唐陳國竇公夫人豆盧氏芮公寛之姊也夫人信罪福常誦金剛般若經未盡卷一紙許忽頭痛至夜逾甚夫人自念儻死遂不得終經欲起誦之令婢然燭而火悉已滅婢空還夫人深益歎恨忽見厨中有燭炬漸升堂陛直入臥内去地三尺許而無人執光明若晝夫人驚喜取經誦之有頃家人鑚鐩得火燭光即滅自此日誦五遍以為常法後芮公將死夫人徃視公謂夫人曰吾姊以誦經之福當夀百嵗生好處也夫人年至八十無疾而終出法苑珠林尼修行唐龍朔元年洛州景福寺比丘尼修行房中有侍僮伍五娘死後修行為五娘立靈座經月餘日其姊及弟於夜中忽聞靈座上呻吟其弟初甚恐懼後乃問之答曰我生時於寺中食肉坐此大苦痛我體上有瘡恐汚牀席汝可多將灰置牀上也弟依其言置灰後看牀上大有膿血又語弟曰姊患不能縫衣汝太藍縷宜將布來我為汝作衫及襪弟置布於靈牀上經宿即成又語其姊曰兒小時染患遂殺一螃蠏取汁塗瘡得差今入刀林地獄肉中見有折刀七枚願姊慈愍為作功徳救助之姊煎迫卒難濟辦但隨身衣服無益死者今并未壊請以用之姊未報間乃曰兒自取去良乆又曰衣服以來見在牀上其姊試往觀之乃所歛之服也遂送浄土寺寶獻師處憑寫金剛般若經每寫一卷了即報云已出一刀凡寫七卷了乃云七刀並得出訖今蒙福業助即往託生與姊及弟哭别而去吴興沈𤣥法說净土寺僧智整所說亦同出冥報記陳文達唐陳文達梓州郪縣人常持金剛經願與亡父母念八萬四千卷多有祥瑞為人轉經患難皆免銅山縣人陳約曽為冥司所追見地下築臺問之云此是般若臺待陳文達其為冥司所敬如此出法苑珠林高紙高紙隋僕射熲之孫也唐龍朔二年出長安順義門忽逢二人乘馬曰王喚紙不肯從去亦不知其鬼使䇿馬避之又被驅擁紙有兄是化度寺僧欲往寺内至寺門鬼遮不令入紙乃毆鬼一拳鬼怒即拽落馬曰此漢大兇麄身遂在地因便昏絶寺僧即令舁入兄院明旦乃蘇云初隨二使見王王曰汝未合來汝曽毁謗佛法且令生受其罪令左右拔其舌以犂耕之都無所傷王問本吏曰彼有何福徳如此曰曽念金剛經王稱善即令放還因與客語言次忽悶倒如吞物狀咽下有白脉一道流入腹中如此三度人問之曰少年盜食寺家果子冥司罰令吞鐵丸後仕為翊衛專以念經為事出報應記白仁哲唐白仁哲龍朔中為虢州朱陽尉差運米遼東過海遇風四望昏黑仁哲憂懼急念金剛經得三百遍忽如夢寐見一梵僧謂曰汝念真經故來救汝須臾風定八十餘人俱濟出報應記竇徳𤣥竇徳𤣥麟徳中為卿奉使揚州渡淮船已離岸數十步見岸上有一人形容憔悴擎一小襆坐於地徳𤣥曰日將暮更無船渡即令載之中流覺其有飢色又與飯乃濟及徳𤣥上馬去其人即隨行已數里徳𤣥怪之乃問曰今欲何去答曰某非人乃鬼使也今往揚州追竇大使曰大使何名云名徳𤣥徳𤣥驚懼下馬拜曰某即其人也涕泗請計鬼曰甚媿公容載復又賜食且放公急念金剛經一千遍當來相報至月餘經數足其鬼果來云經已足保無他慮然亦終須相隨見王徳𤣥於是就枕而絶一宿乃蘇云初隨使者入一宫城使者曰公且住我當先白王使者乃入於屏障後聞王遙語曰你與他作計漏洩吾事遂受杖三十使者却出袒以示公曰喫杖了也徳𤣥再三媿謝遂引入見一著紫衣人下堦相揖云公大有功徳尚未合來請公還出墮坑中於是得活其使者續至云飢未食及乞錢財並與之問其將來官爵曰熟記取從此改殿中監次大司憲次太子中允次司元太常伯次左相年至六十四言訖辭去曰更不復得來矣後皆如其言出報應記宋義倫唐宋義倫麟徳中為虢王府典籖暴卒三日方蘇云被追見王王曰君曽殺狗兔鴿今被論君筭合盡然適見君師主云君持金剛經不惟滅罪更合延年我今放君君能不喫酒肉持念尊經否義倫拜謝曰能又見殿内牀上有一僧年可五六十披衲義倫即拜禮僧曰吾是汝師故相救可依王語義倫曰諾王令隨使者往看地獄初入一處見大鑊行列其下燃火鑊中煮人痛苦之聲莫不酸惻更入一處鐵牀甚濶人臥其上燒炙焦黒形容不辨西顧有三人枯黑佇立頗似婦人向義倫叩頭云不得食喫已數百年倫答曰我亦自無何可與汝更入一獄向使者云時熱恐家人見斂遂去西南行數十步後呼云無文書恐門司不放出遂得朱書三行字並不識門司果問看了放出乃蘇出報應記李岡唐兵部尚書李岡得疾暴卒唯心上煖三日復蘇云見一人引見大將軍蒙令坐索案看云錯追公有頃獄卒擎一盤來中置鐵丸數枚復舁一鐺放庭中鐺下自然火出鐺中銅汁湧沸煮鐵丸赤如火獄卒進盤將軍以讓岡岡懼云飽將軍吞之既入口舉身洞然又飲銅汁身遂火起俛仰之際吞並盡良乆復如故岡乃前問之答云地下更無他饌唯有此物即吸食之若或不飡須臾即為猛火所焚苦甚於此唯與寫佛經十部轉金剛經千卷公亦不來吾又離此岡既復生一依所約深加敬異出報應記王陁唐王陁為鷹揚府果毅因病遂斷葷肉發心誦金剛經日五遍後染瘴疾見羣鬼來陁即急念經鬼聞便退遙曰王令追汝且止誦經陁即為歇鬼悉向前陁乃昏迷欲絶須臾又見一鬼來云念經人王令權放六月既寤遂一心持誦晝夜不息六月雖過鬼亦不來夜聞空中有聲呼曰汝以持經功徳當夀九十矣竟如其言出報應記王令望唐王令望少持金剛經還卭州臨溪路極險阻忽遇猛獸振怖非常急念真經猛獸熟視曵尾而去流涎滿地曽任安州判司過揚子江夜風暴起租船數百艘相接盡没唯令望船獨全後終亳州譙令出報應記陳惠妻唐陳惠妻王氏初未嫁表兄褚敬欲婚王氏父母不許敬詛曰若不嫁我我作鬼必相致後歸於惠惠為陵州仁夀尉敬隂恚之卒後王夢敬旋覺有娠經十七月不産王氏憂懼乃發心持金剛經晝夜不歇敬永絶交鬼胎亦銷從此日持七遍出報應記何澋唐何澋天授初任懐州武徳令常持金剛經至河陽水漲橋倒日已夕人争上船岸逺未達欲没澋懼且急念經須臾近岸遇懸蘆攀縁得出餘溺死八十餘人出報應記張𤣥素唐張𤣥素洛陽人少持金剛經天授初任黄梅宰家有厄難應念而消年七十遘疾忽有花葢垂空遂澡浴與家人訣别奄然而卒出報應記李丘一唐李丘一好鷹狗畋獵萬嵗通天元年任揚州高郵丞忽一日暴死見兩人來追一人自云姓段時同被追者百餘人男皆著枷女即反縛丘一被鏁前驅行可十餘里見大槐𣗳數十下有馬槽丘云五道大神每巡察人間罪福於此歇馬丘一方知身死至王門段指一胥云此人姓焦名䇿是公本頭遂被領見王曰汝安忍無親好殺他命以為已樂須臾即見所殺禽獸皆為人語云乞早處分焦䇿進云丘一未合死王曰曽作何功徳云唯曽造金剛經一卷王即合掌云冥間號金剛經最上功徳君能書冩其福不小即令焦䇿領向經藏合驗至一寶殿衆經充滿丘一試抽一卷果是所造之經既㢠廻見王知造有實乃召所殺生類令懇陳謝許造功徳丘一依王命願冩金剛經一百卷衆歡喜盡散王曰放去焦䇿領出城門云盡力如此豈不相報丘一許錢三百千不受云與造經二十部至一坑䇿推之遂活身在棺中惟聞哭聲已三日矣驚呼人至破棺乃起旬日冩經二十卷了焦䇿來謝致辭而去尋百卷亦畢揚州刺史奏其事敕加丘一五品仍充嘉州招討使出報應記太平廣記卷一百三
