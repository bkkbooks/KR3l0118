body:
  text: 太平廣記卷三百五十宋李昉等編鬼三十五許生郝惟諒浮梁張令歐陽敏奉天縣民許生㑹昌元年春孝廉許生下第東歸次夀安將宿于甘泉店甘棠館西一里已來逢白衣叟躍青驄自西而來徒從極盛醺顔怡怡朗吟云春草萋萋春水緑野棠開盡飄香玉繡嶺宫前鶴髮人猶唱開元太平曲生䇿馬前進問其姓名叟微笑不答又吟一篇云厭世逃名者誰能答姓名曽聞三樂否春取路傍情生知其鬼物矣遂不復問但繼後而行凡二三里日已暮矣至噴玉泉牌堠之西叟笑謂生曰吾聞三四君子今日追舊遊于此泉吾昨已被召自此南去吾子不可連騎也生固請從叟不對而去生縱轡以隨之去甘棠一里餘見車馬導從填隘路岐生麾葢而進既至泉亭乃下馬伏于叢棘之下屏氣以窺之見四丈夫有少年神貌揚揚者有短小器宇落落者有長大少髭髯者有清瘦言語及瞻視疾速者皆金紫坐於泉之北磯叟既至曰玉川來何遲叟曰適傍石墨澗尋賞憇馬甘棠館亭于西楹偶見詩人題一章駐而吟諷不覺良久座首者曰是何篇什得先生賞歎之若是叟曰此詩有似為席中一二公有其題而晦其姓名憐其終章皆有意思乃曰浮雲淒慘日㣲明沈痛將軍負罪名白晝叫閽無近戚縞衣飲氣只門生佳人暗泣填宫涙廐馬連嘶換主聲六合茫茫悲漢土此身無處哭田横座中聞之皆以襟袖擁靣如欲慟哭神貌揚揚者云我知作詩人矣得非伊水之上受我推食脱衣之士乎久之白衣叟命飛盃行酒數廵而座中欷歔未已白衣叟曰再經舊遊無以自適宜賦篇詠以代管絃命左右取筆硯乃出題云噴玉泉感舊遊書懐各七言長句白衣叟倡云樹色川光向晩晴舊曽遊處事分明鼠穿月榭荆榛合草掩花園畦壠平迹陷黄沙仍未寤罪標青簡竟何名傷心谷口東流水猶噴當時寒玉聲少年神貌揚揚者詩云鳥啼鶯語思何窮一世榮華一夢中李固有寃藏蠧簡鄧攸無子續清風文章髙韻𫝊流水絲管遺音託草蟲春月不知人事改閑垂光影照宫短小器宇落落者詩云桃蹊李徑盡荒涼訪舊尋新益自傷雖有衣衾藏李固終無表疏雪王章羈魂尚覺霜風冷朽骨徒驚月桂香天爵竟為人爵悞誰能髙呌問蒼蒼清瘦及瞻視疾速者詩云落花寂寂草綿綿雲影山光盡宛然壊室基摧新石鼠瀦宫水引故山泉青雲自致慙天爵白首同歸感昔賢惆悵林間中夜月孤光曽照讀書筵長大少鬚髯者詩云新荆棘路舊衡門又駐髙車㑹一樽寒骨未沾新雨露春風不長敗蘭蓀丹誠豈分埋幽壤白日終希照覆盆珍重昔年金谷友共來泉際話孤魂詩成各自吟諷長號數四響動巖谷逡廵怪鳥鴟梟相率啾唧大狐老狸次第鳴呌頃之騾脚自東而來金鐸之聲振于坐中各命僕馬頗甚草草慘無言語掩泣攀鞍若烟霧狀自庭而㪚生于是出叢棘尋舊路匹馬齕草于澗側蹇童美寢于路隅未明達甘泉店店媪詰冒夜生具以對媪媪曰昨夜三更走馬挈壺就我買酒得非此耶開櫃視皆紙錢也出纂異錄郝惟諒荆州民郝惟諒性麤率勇於私鬭㑹昌二年寒食日與其徒遊于郊外蹴踘角力醉卧冡間宵分始寤將歸道左見一人家室絶卑陋雖張燈而頗昏暗遂詣乞漿有一婦人容色慘悴服裝雅素方向燈紉縫延郝良久謂郝曰知君有膽氣故敢情託妾本秦人姓張氏嫁與府衙健兒李自歡自歡大和中戍邊不返妾遘疫而殁别無親戚為鄰里殯于此處已逾一紀遷葬無因凡死者肌骨未復于土魂神不為陰司所籍離㪚恍惚如夢如醉君能使妾遺骸得歸泉壤精爽有託斯願畢矣郝曰某生業素薄力且不辦如何婦人云某雖為鬼不廢女工自安此常造雨衣與胡氏傭作凡數年矣所聚十三萬葬備有餘也郝許諾而歸遲明訪之胡氏物色皆符乃具以告即與偕往殯所毁瘞視之散錢培櫬數如其言胡氏與郝哀而異之復率錢于同輩合二十萬盛其凶儀瘞于鹿頂原其夕見夢于胡郝出酉陽雜俎浮梁張令浮梁張令家業蔓延江淮間累金積粟不可勝計秩滿如京師常先一程致頓海陸珍美畢具至華陰僕夫施幄幙陳樽壘庖人炙羊方熟有黄衫者據􅌉而坐僕夫連叱神色不撓店嫗曰今五坊弋羅之輩横行闗内此其流也不可與競僕夫方欲求其帥以責之而張令至具以黄衫者告張令曰勿叱召黄衫者問曰來自何方黄衫但唯唯耳促煖酒酒至令以大金鍾飲之雖不謝似有愧色飲訖顧炙羊著目不移令自割以勸之一足盡未有飽色令又以奩中餤十四五啖之凡飲二斗餘酒酣謂令曰四十年前曽于東店得一醉飽以至今日令甚訝乃勤懇問姓氏對曰某非人也葢直送闗中死籍之吏耳令驚問其由曰太山召人魂將死之籍付諸嶽俾某部送耳令曰可得一觀乎曰便窺亦無患於是解革囊出一軸其首云太山主者牒金天府其第二行云貪財好殺見利忘義人前浮梁縣令張某即張君也令見名乞告使者曰修短有限誰敢惜死但某方强仕不為死備家業浩大未有所付何術得延其期某囊橐中計所直不下數十萬盡可以獻於執事使者曰一飯之恩誠宜報答百萬之貺某何用焉今有仙官劉綱謫在蓮花峰足下宜匍匐徑往哀訴奏章捨此則無計矣某昨聞金天王與南嶽博戲不勝輸二十萬甚被逼逐足下可詣嶽廟厚數以許之必能施力于仙官縱力不及亦得路於蓮花峰下不爾荆榛蒙宻川谷阻絶無能往者令于是齎牲牢馳詣嶽廟以千萬許之然後直詣蓮花峰得幽徑凡數十里至峯下轉東南有一茅堂見道士隱几而坐問令曰腐骨穢肉魂亡神耗者安得來此令曰鐘鳴漏盡露晞頃刻竊聞仙官能復精魂于朽骨致肌肉于枯骸既有好生之心豈惜奏章之力道士曰吾頃為隋朝權臣一奏遂謫居此峰爾何徳於子欲陷吾為寒山之叟乎令哀祈愈切仙官神色甚怒俄有使者齎一函而至則金天王之書扎也仙官覽書笑曰闗節既到難為不應召使者反報曰莫又為上帝譴責否乃啓玉函書一通焚香再拜以遣之凡食頃天府乃降其上署徹字仙官復焚香再拜以啟之云張某棄背祖宗竊假名位不顧禮法茍竊官榮而又鄙僻多藏詭詐無實百里之任已是叨居千乗之富今因苟得令按罪已實待戮餘魂何為奏章求延厥命但以扶危拯溺者大道所尚紓刑宥過者𤣥門是宗狥爾一甿俄全𢎞化希其悛惡庶乃自新貪生者量延五年奏章者不能書罪仙官覽畢謂令曰大凡世人之夀皆可致百嵗而以喜怒哀樂汨沒心源愛惡嗜欲伐生之根而又揚己之能掩彼之長顛倒方寸頃刻萬變神倦思怠難全天和如彼淡泉汨於五味欲致不壊其可得乎勉導歸途無墮吾教令拜辭舉首已失所在復尋舊路稍覺平易行十餘里黄衫吏迎前而賀令曰將欲奉報願知姓字吏曰吾姓鍾生為宣城縣脚力亡于華陰遂為幽㝠所錄遞符之役勞苦如舊令曰何以免執事之困曰但酧金天王願曰請置子為閽人則吾飽神盤子矣天符已違半日難更淹留便與執事别入廟南柘林三五步而沒是夕張令駐車華陰决東歸計酧金天王願所費數逾二萬乃語其僕曰二萬可以贍吾十舍之資糧矣安可受祉于上帝而私謁於土偶人乎明旦遂東至偃師止于縣館見黄衫舊吏齎牒排闥而進叱張令曰何虛妄之若是今禍至矣由爾償三峰之願不果俾吾答一飯之恩無始終悒悒之懐如痛毒螫言訖失所在頃刻張令有疾留書遺妻子未訖而終出纂異記歐陽敏陜州東三十里本無旅舍行客或薄暮至此即有人逺迎安泊及曉前進往往有死者揚州客歐陽敏侵夜至其鬼即為一老叟迎歸舍夜半後叟詣客問鄉地便以酒炙延待客從容言及陰隲之事叟甚有驚怍之色客因怪之乃問曰鬼神能侵害人乎人能害鬼乎叟曰鬼神之事人不知何能害之鬼神必不肯無故侵害人也或侵害人者恐是妖鬼也猶人間之賊盜耳若妖鬼之害人偶聞于明神必不容亦不異賊盜之抵憲法也叟復深有憂色客怪之甚遂謂叟曰我若知妖鬼之所處必訴於尊神令盡剪除叟不覺起拜叩頭而言曰我强鬼也慮至曉君子不容今幸望哀恕仍獻一卷書與客曰此書預知帝王厯數保惜保惜客受之至曙不辭而出回顧乃一壊墳耳其書是篆字後客託人譯之𫝊于世出瀟湘錄奉天縣民㑹昌五年奉天縣國盛村民姓劉者病狂發時亂走不避井壍其家為迎禁呪人侯公敏治之公敏纔至劉忽起曰我暫出不假爾治因杖薪擔至田中袒而運擔狀若繋物良久而返笑曰我病已矣適打一鬼頭落埋於田中兄弟及呪者猶以為狂遂同往驗焉劉掘出一髑髏戴赤髮十餘莖其病竟愈出酉陽雜俎太平廣記卷三百五十
