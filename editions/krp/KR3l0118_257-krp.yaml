body:
  text: 太平廣記卷二百五十七嘲誚五崔澹皮日休薛能周顗任轂王徽山東人張登朱澤徐彦若馮涓張濬伶人封舜卿姚涓李台瑕織錦人李主簿陳癩子患目鼻人傴人田媼崔澹唐崔澹試以至仁伐至不仁賦時黄巢方熾因為無名子嘲曰主司何事厭吾皇解把黄巢比武王出摭言皮日休唐皮日休嘗謁歸仁紹數往而不得見皮既心有所慊而動形於言因作詠龜詩硬骨殘形知幾秋屍骸終是不風流頑皮死後鑚須遍都為平生不出頭時仁紹亦有諸子佾係與日休同在場中隨即聞之因伺其復至乃刺字於皮姓之下題詩授之曰八片尖裁浪作毬火中爆了水中揉一包閒氣如長在惹踢招拳卒未休時人以為日休雖輕俳而仁紹亦浮簿矣出皮日休文集薛能唐趙璘儀質瑣陋成名後為壻薛能為儐相乃為詩嘲謔其略曰巡關每傍樗蒱局望月還登乞巧樓第一莫教嬌太過縁人衣帶上人頭又曰不知元在鞍鞽裏將謂空䭾席㡌歸又曰火爐牀上平身立便與夫人作鏡臺出抒情詩周顗唐處士周顗洪儒奥學偶不中第旅浙西與從事歡飲而昧於令章筵中皆戲之有賔從贈詩曰龍津掉尾十年勞聲價當時闘月高唯有紅粧廻舞手似持雙刅向猿猱周答曰十載文場敢憚勞宋都廻鶂為風高今朝甘被花枝笑任道樽前愛縳猱出抒情詩任轂唐任轂有經學居懐谷望徵命而蒲輪不至自入京中訪問知已有朝士戲贈詩曰雲林應訝鶴書遲自入京來探事宜從此見山須合眼𬒳山相賺已多時後至𥙷袞出幽閒鼔吹王徽唐廣明歲薛能失律於許昌都將周岌代之明年宰相王徽過許謂岌曰昔聞貴藩有部將周撞子得非司空耶何致此號岌愧赧良久答曰岌出身走卒實藴壯心毎有征行不避鋒刃左衝右捽屢立微功所以軍中有此名號王笑復謂岌曰當時撲落渦河裏可是撞不著耶岌頃總許卒征徐方為賊所敗溺於渦水或拯之僅免故有是言出三水小牘山東人山東人來京主人毎為煮菜皆不為羮常憶榆葉自煮之主人即戲云聞山東人煮車轂汁下食為有榆氣答曰聞京師人煮驢軸下食虚實主人問云此有何意云為有苜蓿氣主人大慙出啓顔録張登唐南陽張登制舉登科形貌枯瘦氣高傲物裴樞與為師友樞為司勲員外舉公羣至投文樞才詆訶瑕謫登自知江陵鹽鐡院㑹計到城直入司勲㕔冷笑曰裴三十六大有可笑事樞因問登可笑之由登曰笑公驢牙郎搏馬價此成笑耳出乾􅍧子朱澤唐王軒少為詩頗有才思遊西小江泊舟苧蘿川題西施石曰嶺上千峯秀江邊細草春今逢浣紗石不見浣沙人俄見一女子振璚璫扶石笋低徊而謝曰妾自吳宮還越國素衣千載無人識當時心比金石堅今日為君堅不得既歡㑹復有恨别之辭後蕭山郭凝素聞王軒之遇每過浣沙溪日夕長吟屢題歌詩於石寂爾無人乃鬱怏而返進士朱澤嘲之聞者莫不嗤笑凝素内恥無復斯遊詩云三春桃李本無言苦𬒳殘陽鳥雀喧借問東鄰效西子何如郭素擬王軒出雲溪友議徐彦若唐乾寧中荆南成汭曾為僧盗據渚宮尋即貢命末年毎事騁辯初以澧朗在巡屬為土豪雷滿所據奏請割𨽻宰相徐彦若在中書不為處置由是銜之及彦若出鎭番禺路由渚宮汭雖加接延而常怏怏饌後更席而坐詭辯鋒起徐曰令公位尊方面自比桓文雷滿偏州一夥草賊爾令公不能加兵而怨朝廷乎成赧焉而屈徐文雅高瞻聴之亹亹成雖甚敬憚猶以嶺外黄茅瘴患者髪落而戲曰黄茅瘴望相公保重徐曰南海黄茅瘴不死成和尚葢譏成公曾為僧也終席慙恥之出北夢瑣言馮涓馮涓舊唐名士雄才奧學登進士第履厯已高唐帝幸梁洋涓扈蹕焉至漢中詔除眉州刺史赴任至蜀阻丘王氏强縻於幕中性耿㮣不屈恃才傲物甚不洽於偽蜀主知王氏有異圖輒不相許或贈繒帛必鎖櫃中題云賊物蜀主雖知憐其文藝毎强容之時或不可數揖出院欲撾殺之略無懼色後朱梁遣使致書于蜀命諸從事韋莊輩具草呈之皆不愜意左右曰何妨命前察判為之蜀主又有慙色梁使將復命不獲已遂請復職便亟修廻復涓一筆而成大稱㫖於是却復前歡因召諸㕔同宴飲次涓歛袵曰偶記一話欲對大王説可乎主許之曰涓少年多遊謁諸侯每行即必廣齎書䇿驢亦䭾之馬亦䭾之初戒途驢咆哮跳躑與馬爭路而先莫之能制行半日後抵一坡力疲足憊遍體汗流廻顧馬曰馬兄馬兄吾不得去也可為弟搭取書馬兄諾之遂併在馬上馬却廻顧謂驢曰驢弟我為你有多少伎倆畢竟還搭在老兄身上蜀主大笑同幕皆遭凌虐及偽蜀開國終不肯居宰輔出王氏見聞録張濬伶人唐宰相張濬常與朝士於萬壽寺閱牡丹而飲俄有雨降抵暮不息羣公飲酣未䦨左右伶人皆御前供奉第一部者恃寵肆狂無所畏憚其間一輩曰張隐忽躍出揚聲引詞曰位乖燮理致傷殘四面牆匡不忍看正是花時堪下淚相公何必更追歡告訖遂去闔席愕然相眄失色一時俱㪚張但慙恨而已出南楚新聞封舜卿朱梁封舜卿文詞特異才地兼優恃其聰俊率多輕薄梁祖使聘于蜀時岐梁眦睚關路不通遂泝漢江而上路出全州故人全宗朝為帥封至州宗朝致筵于公署封素輕其山川多所傲睨全之人莫敢不奉之及執斚索伶曰麥秀兩岐伶人愕然相顧未嘗聞之且以他曲相同者代之封擺頭曰不可又曰麥秀兩岐復無以措手主人恥之痛杖其樂將停盞移時逡巡盞在手又曰麥秀兩岐既不獲之呼伶人前曰汝雖是山民亦合聞天朝音律全人大以為恥次至漢中伶人已知全州事憂之及飲㑹又曰麥秀兩岐亦如全之筵三呼不能應有樂將王新殿前曰略乞侍郎唱一遍封唱之未遍已入樂工之指下矣由是大喜吹此曲訖席不易之其樂工白帥曰此是大梁新翻西蜀亦未嘗有之請冩譜一本急逓入蜀具言經過二州事洎封至蜀至設弄三軍後長吹麥秀兩岐於殿前施芟麥之具引數十輩貧兒􅀈縷衣裳携男抱女挈筐籠而拾麥仍合聲唱其詞凄楚及其貧苦之意不喜人聞封顧之面如土色卒無一詞慙恨而返乃復命厯梁漢安康等道不敢更言兩岐字蜀人嗤之出王氏見聞録姚涓唐裴廷裕字庸餘乾寧中在内庭文書敏捷號為下水船梁太祖受禪姚涓為學士嘗從容上問及廷裕行止涓對曰頃嵗左遷今聞旅寄衡永上曰頗聞其人才思甚捷涓對曰向在翰林號為下水船太祖應聲謂涓曰卿便是上水船也涓微笑深有慙色議者以涓為急灘頭上水船也出摭言李台瑕偽蜀韓昭仕王氏為禮部尚書文思殿大學士粗有文章至於琴棊書算射法悉皆渉獵以此承恩於後主朝士李台瑕曰韓八座之藝如拆襪線無一條長時人韙之出北夢瑣言織錦人唐盧氏子不中第徒歩及都城門東其日風寒甚且投逆旅俄有一人續至附火良久忽吟詩曰學織繚綾功未多亂投機杼錯抛梭莫教宮錦行家見把此文章笑殺他又云如今不重文章事莫把文章誇向人盧愕然憶是白居易詩因問姓名曰姓李世織綾錦離亂前屬東都官錦坊織宮錦巧兒以薄藝投本行皆云如今花様與前不同不謂伎倆兒以文綵求售者不重於世且東歸去出盧氏雜説李主簿唐方干姿態山野且又兎缺然性好凌侮人有龍丘李主簿者不知何許人也偶於知聞處見干而與之傳杯龍措目有翳干改令以譏之曰干改令謂人象令云措大吃酒㸃鹽軍將吃酒㸃醬只見門外著籬未見眼中安障龍邱答曰措大吃酒㸃鹽下人吃酒㸃鮓干嗜鮮只見半臂著襴未見口唇開跨一座大笑出摭言陳癩子唐營丘有豪民姓陳藏鏹鉅萬染大風疾衆目之為陳癩子自奉之道則不薄矣然切諱癩字家人妻孥或誤言者則必遭怒或至笞箠賔客或言所苦減退則酒食延待優豐甚至言增添則白眼相顧耳有遊客心利所霑而不能禁其口遂謁之初謂曰足下之疾近日尤減陳亦欣然命酒饌延接乃賫五緡客將起又問之曰某疾果退否客曰此亦添減病曰何謂也客曰添者面上添肉渤漚子減者減却鼻孔長揖而去數日不懌又毎年五月值生辰頗有破費召僧道啓齋筵伶倫百戲畢備齋罷伶倫贈錢數萬時有顐者何岸高不敏見既去復入謂曰蒙君厚惠感荷奚言然某偶憶短李相公詩落句一聨深叶主人盛徳也陳曰試誦之時陳君處于中堂坐碧紗幃中左右侍立執輕䈉白箒者數輩伶倫曰詩云三十年來陳癩子如今始得碧紗幪遭大詬而去出玉堂閒話患目鼻人一人患眼側睛及翳一人患􅙄鼻俱以千字文作詩相詠􅙄鼻人先詠側眼人云眼能日月盈為有陳根委患眼人續下句不别似蘭斯都由鴈門紫出啓顔録傴人有人患腰曲傴僂常低頭而行傍人詠之曰拄杖欲似乃播笏便似及逆風盪雨行面乾頂額濕著衣牀上坐肚緩脊皮急城門爾許高故自匍匐入出啓顔録田媼唐京城中有婦人姓田年老口無齒與男娶同坊人張氏女張因節日盛饌召田母飲啖及相送出主人母云慚愧無所啖嚼遣親家母空口來空口去如此者數矣田終不悟歸語夫曰張家母延我大有飲食臨别即云慚愧親家母空口來空口去不知何也夫曰此是弄君無齒張家母面上有瘡瘢眼下皮急極霑眡若更有此語可報云只是眼下急田私記之居數日張復召田臨起復云慚愧空口來空口去田母乃熟視主人母眼良久忘却眼下急直云是眼皮霑眡合家大笑出啓顔録太平廣記卷二百五十七
