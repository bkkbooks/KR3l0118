body:
  text: 太平廣記卷二神仙二周穆王燕昭王彭祖魏伯陽周穆王周穆王名滿房后所生昭王子也昭王南廵不還穆王乃立時年五十矣立五十四年一百四嵗王少好神仙之道常欲使車轍馬跡遍於天下以倣黄帝焉乃乗八駿之馬奔戎使造父為御得白狐𤣥貉以祭於河宗導車渉弱水魚鼈黿鼉以為梁遂登於春山又觴西王母於瑶池之上王母謠曰白雲在天道里悠逺山川間之將子無死尚能復來王答曰余歸東土和洽諸夏萬民平均吾顧見汝比及三年將復而野又至於雷首太行遂入於宗周時尹喜既通流沙草棲於終南之隂王追其舊跡招隱士尹輙杜冲居於草棲之所因號樓觀從詣焉祭公自鄭圃來謁諫王以徐偃之亂王乃返國宗社復安王造崑崙時飲蜂山石髓食玉樹之實又登羣玉山西王母所居皆得飛靈冲天之道而示跡託形者盖所以示民有終耳况其飲琬琰之膏進甜雪之味素蓮黑棗碧藕白橘皆神仙之物得不延期長生乎又云西王母降穆王之宫相與昇雲而去出仙傳拾遺燕昭王燕昭王者王噲之子也及即位好神仙之道仙人甘需臣事之為王述昆臺登真之事去嗜欲撤聲色無思無為可以致道王行之既乆谷將子乗虗而集告於王曰西王母將降觀爾之所修示爾以靈𤣥之要後一年王母果至與王遊燧林之下説炎皇鑽火之術燃緑桂膏以照夜忽有飛蛾銜火集王之宫得圓丘硃砂結而為佩王登握日之臺得神鳥所銜洞光之珠以消煩暑自是王母三降於燕宫而昭王狥於攻取不能遵甘需澄静之㫖王母亦不復至甘需白王母所設之饌非人世所有玉酒金醴後期萬祀王既嘗之自當得道矣但在虚凝純白保其遐齡耳甘需亦昇天而去三十三年王無疾而殂形骨柔耎香氣盈庭子恵王立矣出仙傳拾遺彭祖彭祖者姓籛諱鏗帝顓頊之𤣥孫也殷末已七百六十七嵗而不衰老少好恬静不䘏世務不營名譽不飾車服唯以飬生治身為事王聞之以為大夫常稱疾閒居不與政事善於補導之術服水桂雲母粉麋角散常有少容然性沈重終不自言有道亦不作詭惑變化鬼怪之事窈然無為少周遊時還獨行人莫知其所詣伺候竟不見也有車馬而常不乗或數百日或數十日不持資糧還家則衣食與人無異常閉氣内息從旦至中乃危坐拭目摩搦身體䑛唇咽唾服氣數十乃起行言笑其體中或瘦倦不安便導引閉氣以攻所患心存其體面九竅五臟四肢至於毛髪皆令具至覺其氣雲行體中故於鼻口中達十指末尋即體和王自往問訊不告致遺珍玩前後數萬金而皆受之以恤貧賤無所留又采女者亦少得道知飬性之方年二百七十嵗視之如五六十嵗奉事之於掖庭為立華屋紫閣飾以金玉乃令采女乗輜軿往問道於彭祖既至再拜請問延年益夀之法彭祖曰欲舉形登天上補仙官當用金丹紫炁召太一所以白日昇天也此道至大非君王之所能為其次當愛飬精神服藥草可以長生但不能役使鬼神乗虚飛行身不知交接之道縱服藥無益也能飬隂陽之意可推之而得但不思言耳何足怪問也吾遺腹而生三嵗而失母遇犬戎之亂流離西域百有餘年加以少枯喪四十九妻失五十四子數遭憂患和氣折傷冷熱肌膚不澤榮衞焦枯恐不度世所聞淺薄不足宣傳大宛山有青精先生者傳言千嵗色如童子歩行日過五百里能終嵗不食亦能一日九食真可問也采女曰敢問青精先生是何仙人者也彭祖曰得道者耳非仙人也仙人者或竦身入雲無翅而飛或駕龍乗雲上造天階或化為鳥獸遊浮青雲或潛行江海翺翔名山或食元氣或茹芝草或出入人間而人不識或𨼆其身而莫之見面生異骨體有竒毛率好深僻不交俗流然此等雖有不死之夀去人情逺榮樂有若雀化為蛤雉化為蜃失其本真更守異氣余之愚心未願此已入道當食甘㫖服輕麗通隂陽處官秩耳骨節堅强顔色和澤老而不衰延年乆視長在世間寒温風濕不能傷鬼神衆精莫敢犯五兵百蟲不可近嗔喜毁譽不為累乃可貴耳人之受氣雖不知方術但飬之得宜常至百二十嵗不及此傷者也小復曉道可得二百四十嵗加之可至四百八十嵗盡其理者可以不死但不成仙人耳飬夀之道但莫傷之而已夫冬温夏凉不失四時之和所以適身也美色淑資幽閒娛樂不致思慾之惑所以通神也車服威儀知足無求所以一志也八音五色以悦視聽所以導心也凡此皆以養夀而不能斟酌之者反以速患古之至人恐下才之子不識事宜流遯不還故絶其源故有上士别牀中士異被服藥百裹不如獨卧五音使人耳聾五味使人口爽茍能節宣其宜適抑揚其通塞者不以減年得其益也凡此之類譬猶水火用之過當反為害也不知其經脈損傷血氣不足内理空踈髄腦不實體已先病故為外物所犯因氣寒酒色以發之耳若本充實豈有病也夫逺思彊記傷人憂喜悲哀傷人喜樂過差忿怒不解傷人汲汲所願傷人隂陽不順傷人有所傷者數種而獨戒於房中豈不惑哉男女相成猶天地相生也所以神氣導飬使人不失其和天地得交接之道故無終竟之限人失交接之道故有傷殘之期能避衆傷之事得隂陽之術則不死之道也天地晝分而夜合一嵗三百六十交而精氣和合故能生産萬物而不窮人能則之可以長存次有服氣得其道則邪氣不得入治身之本要其餘吐納導引之術及念體中萬神有舍影守形之事一千七百餘條及四時首向責已謝過卧起早晏之法皆非真道可以教初學者以正其身人受精飬體服氣煉形則萬神自守其真不然者則榮衞枯悴萬神自逝悲思所留者也人為道不負其本而逐其末告以至言而不能信見約要之書謂之輕淺而不盡服誦觀夫太清北神中經之屬以此自疲至死無益不亦悲哉又人苦多事少能棄世獨往山居穴處者以道教之終不能行是非仁人之意也但知房中閉氣節其思慮適飲食則得道也吾先師初著九節都解指韜形𨼆遯尤為開明四極九室諸經萬三千首為以示始渉門庭者采女具受諸要以教王王試之有驗殷王傳彭祖之術屢欲祕之乃下令國中有傳彭祖之道者誅之又欲害祖以絶之祖知之乃去不知所之其後七十餘年聞人於流沙之國西見之王不常行彭祖之術得夀三百歳氣力丁壯如五十時得鄭女妖婬王失道而殂俗間言傳彭祖之道殺人者由於王禁之故也後有黄山君者修彭祖之術數百年猶有少容彭祖既去乃追論其言以為彭祖經出神仙傳魏伯陽魏伯陽者吳人也本髙門之子而性好道術後與弟子三人入山作神丹丹成知弟子心懐未盡乃試之曰丹雖成然先宜與犬試之若犬飛然後人可服耳若犬死即不可服乃與犬食犬即死伯陽謂諸弟子曰作丹唯恐不成今既成而犬食之死恐是未合神明之意服之恐復如犬為之奈何弟子曰先生當服之否伯陽曰吾背違世路委家入山不得道亦恥復還死之與生吾當服之乃服丹入口即死弟子顧視相謂曰作丹以求長生服之即死當奈此何獨一弟子曰吾師非常人也服此而死得無意耶因乃取丹服之亦死餘二弟子相謂曰所以得丹者欲求長生耳今服之即死焉用此為不服此藥自可更得數十嵗在世間也遂不服乃共出山欲為伯陽及死弟子求棺木二子去後伯陽即起將所服丹内死弟子及白大口中皆起弟子姓虞遂皆仙去道逢入山伐木人乃作手書與鄉里人寄謝二弟子乃始懊恨伯陽作參同契五行相𩔖凡三卷其説似周易其實假借爻象以論作丹之意而世之儒者不知神丹之事多作隂陽注之殊失其㫖矣出神仙傳太平廣記卷二
