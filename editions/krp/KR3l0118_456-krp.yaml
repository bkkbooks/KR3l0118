body:
  text: 太平廣記卷四百五十六宋李昉等編蛇一率然蛇邱崑崙西北山緑蛇報寃蛇毒蛇種麥來蛇蚺蛇蚺蛇膽雞冠蛇爆身蛇黄領蛇藍蛇巴蛇蠻江蛇兩頭蛇顔回蜀五丁昭靈夫人張寛竇武楚王英女張承母馮緄魏舒杜預呉猛顔含司馬軌之章茍太元士人慕容熈邛都老姥天門山忻州刺史餘干縣令王真妻朱覲率然西方山中有蛇頭尾差大有色五彩人物觸之者中頭則尾至中尾則頭至中腰則頭尾並至名曰率然㑹稽常山最多此蛇孫子兵法曰將之三軍勢如率然也出神異經蛇邱東海有蛇邱地險多漸洳衆蛇居之無人民蛇或人頭而蛇身出方中記崑崙西北山崑崙西北有山周廻三萬里巨蛇繞之得三周蛇為長九萬里蛇常居此山飲食滄海出𤣥中記緑蛇顧渚山頳石洞有緑蛇長可三尺餘大𩔖小指好棲樹杪視之若鞶帶纒於柯葉間無螫毒見人則空中飛出顧渚山記報寃蛇嶺南有報寃蛇人觸之即三五里隨身即至若打殺一蛇則百蛇相集將蜈蚣自防乃免出朝野僉載毒蛇山南五溪黔中皆有毒蛇烏而反鼻蟠於草中其牙倒勾去人數歩直來疾如激箭螫人立死中手即斷手中足則斷足不然則全身腫爛百無一活謂蝮蛇也有黄喉蛇好在舎上無毒不害人唯善食毒蛇食飽垂頭直下滴沫地噴起變為沙虱中人為疾額上有大王字衆蛇之長常食蝮蛇出朝野僉載種黍來蛇種黍來蛇燒羖羊角及頭髪則蛇不敢來出朝野僉載蚺蛇蚺蛇大者五六丈圍五六尺以次者亦不下三四丈圍亦稱是身斑文如錦纈里人云春夏多於山林中等麂鹿過則銜之自尾而吞唯頭角礙於口外即深入林樹間閣其首伺鹿壊頭角墜地鹿身方嚥入腹如此後蛇極羸弱及其鹿消壯俊悦澤勇徤於未食鹿者或云一年則食一鹿出嶺表録異又一説蚺蛇常吞麂鹿消盡乃繞樹出骨養瘡時肪腴甚美或以婦人衣投之則蟠而不起其膽上旬近頭中旬近尾出酉陽雜俎蚺蛇膽泉建州進蚺蛇膽五月五日取時膽兩柱相去五六尺擊蛇頭尾以杖於腹下來去扣之膽即聚以刀刲取藥封放之不死復更取看胸下有痕即放出朝野僉載鷄冠蛇鷄冠蛇頭如雄鷄有冠身長尺餘圍可數寸中人必死㑹稽山下有之出録異記爆身蛇爆身蛇長一二尺形如灰色聞人行聲林中飛出狀若枯枝横來擊人中者皆死出録異記黄領蛇黄領蛇長一二尺色如黄金居石縫中欲雨之時作牛吼聲中人亦死四明山有之出録異記藍蛇藍蛇首有大毒尾能解毒出梧州陳家洞南人以首合毒藥謂之藍藥藥人立死取尾脂反解毒藥出酉陽雜俎巴蛇巴蛇食象三嵗而出其骨食之無心腹之疾出博物志蠻江蛇南安蠻江蛇至五六月有巨蛇泛流登岸首如張㡌萬萬蛇隨之入越王城出酉陽雜俎兩頭蛇韶州多兩頭蛇為蟻封以避水蟻封者蟻子聚土為䑓也蒼梧亦多兩頭蛇長不過一二尺或云蚯蚓所化出嶺南異物志顔回顔回子路共坐於夫子之門有鬼魅求見孔子其目若合其形甚偉子路失魄口禁不得言顔淵乃納履杖劔前捲握其腰於是形化成蛇即斬之孔子出觀歎曰勇者不懼智者不惑智者必有勇勇者不必有智出小説蜀五丁周顯王三十二年蜀使使朝秦秦惠王數以美女進蜀王感之故朝惠王知蜀王好色許嫁五女於蜀蜀遣五丁迎之還到梓潼見一蛇入穴中一人攬其尾拽之不禁至五人相助大呼㧞蛇山崩同時壓殺五丁及秦五女而山分為五嶺直上有平石蜀王痛復乃登之因命曰五女塚山於平石上為望婦候作思妻䑓今其山或名五丁塚出華陽國志昭靈夫人小黄縣者宋地黄鄉也沛公起兵野戰䘮皇妣于黄鄉天下平定乃使使者以梓宫招魂幽野於是有丹蛇在水自灑濯入于梓宫其浴處有遺髪故謚曰昭靈夫人出陳留風俗傳張寛漢武帝時張寛為揚州刺史先是有老翁二人爭地山詣州訟疆界連年不决寛視事復來寛窺二翁形狀非人令卒持㦸將入問汝何等精翁走寛呵格之化為二蛇出搜神記竇武後漢竇武母産武而并産一蛇送之野中後母卒及𦵏未窆有大蛇捧草而出徑至䘮所以頭擊柩涕血皆流俯仰詰屈若哀泣之容有頃而去時人知為竇氏之祥出搜神記楚王英女魯少千者得仙人符楚王英少女為魅所病請少千少千未至數十里止宿夜有乗龞盖車從數千騎來自稱伯敬侯少千遂請内酒數榼肴饌數案臨别言楚王女病是吾所為君若相為一還我謝君二十萬少千受錢即為還從他道詣楚為治之於女舎前有排户者但聞云少千欺汝翁遂有風聲西北去視處有血滿盆女遂絶氣夜半乃蘇王使人尋風於城西北得一死蛇長數丈小蛇千百伏死其旁後詔下郡縣以其日月大司農失錢二十萬大官失案數具少千載錢上書具陳説天子異之出列異傳張承母張承之母孫氏懐承之時乗輕舟遊於江浦之際忽有白蛇長三丈騰入舟中母呪曰君為吉祥勿毒噬我乃篋而將還置諸房内一宿視之不復見蛇嗟而惜之鄰人相謂曰昨見張家有一白鶴聳翮凌雲以告承母使筮之卜人曰此吉祥也蛇鶴延年之物從室入雲自卑升高之象昔呉王闔閭葬其妹殉以美女名劔寳物窮江南之富未及十七年雕雲覆于溪谷美女遊于街上白鶴翔于林中白虎嘯于山側皆是昔之精靈今出世當使子孫位超臣極擅名江表若生子可以為名及生承名曰鶴承生昭位至丞相為輔吳將軍年踰九十蛇鶴之祥也出王子年拾遺記馮緄車騎將軍巴郡馮緄為議郎發綬笥有二赤蛇可長三尺分南北走大用憂怖卜云此吉祥也君後當為邉將以東為名後五年果為大將軍㝷拜遼東太守出風俗通魏舒晉咸寜中魏舒為司徒府中有蛇二其長十丈屋㕔事平脊之上止之數年而人不知但怪府中數失小兒及鷄犬之屬後一蛇夜出經柱側傷於刃病不能登於是覺之發徒數百共攻擊移時始得殺之視所居骨骼盈宇之間於是毁府舎更立之出捜神記杜預杜預為荆州刺史鎮襄陽時有讌集大醉閉齋獨眠不聽人前後嘗醉卧有齋中嘔吐其聲甚苦莫不悚慄有一小吏私開户看之正見牀上一大蛇垂頭牀邉吐都不見人出宻道如此出劉氏小説吳猛永嘉末豫章有大蛇長十餘丈斷道經過者蛇輙吸取之吞噬已百數道士吳猛與弟子殺蛇猛曰此是蜀精蛇死而蜀賊當平既而果杜弢滅也出豫章記顔含晉顔含嫂病須蚺蛇膽不能得含憂歎累日有一童子持青囊授含含視乃蛇膽也童子化為青鳥飛去出晉中興書司馬軌之司馬軌之字道援善射雉太元中將媒下翳此媒雊野雉亦應試令㝷覓所應者頭翅已成雉半身故是蛇晉中朝武庫内忽有雉時人或謂為怪張司空云此蛇所化耳即使搜庫中果得蛇蜕出異苑又太元中汝南人入山見一竹中蛇形已成上枝葉如故吳都相慮人嘗伐餘遺竹一宿見竿為雉頭頸盡就身猶未變化亦竹為蛇之化出異苑章茍吳興章茍於田中耕以飯置菰裡每晚取食飯亦已盡如此非一後伺之見一大蛇偷食茍逐以鈠叉之蛇走茍逐之至一穴但聞啼聲云斫傷我矣或言付雷公令霹靂殺須臾雷雨霹靂覆茍上茍乃跳梁大罵曰天使我貧窮展力耕墾蛇來偷食罪當在蛇反更霹靂我耶乃是無知雷公雷公若來吾當以鈠斫汝腹須臾雲雨漸散轉霹靂於蛇穴中蛇死者數十出捜神記太元士人晉太元中士人有嫁女於近村者至時夫家遣人來迎女家好發遣又令女弟送之既至重門叠閣擬於王侯廊柱下有燈火一婢子嚴粧直守後房帷帳甚美至夜女抱乳母涕泣而口不得言乳母宻於帳中以手潛摸之得一蛇如數圍柱纒其女從足至頭乳母驚走出柱下守燈婢子悉是小蛇燈火是蛇眼出續捜神記慕容熙西晉末慕容熙光始三年熙出遊還城南有栁樹如人呼曰大王止熙惡之伐其樹下有蛇長一丈至六年熙為馮政所滅出廣古今五行記卭都老姥益州卭都縣有老姥家貧孤獨每食輙有小蛇頭上有角在柈之間姥憐而飼之後漸漸長大丈餘縣令有馬忽𬒳蛇吸之令因大怒收姥姥曰在牀下遂令人發掘愈深而無所見縣令乃殺姥其蛇因夢於令曰何故殺我母當報仇耳自此每常聞風雨之聲三十日是夕百姓咸驚相謂曰汝頭何得戴魚相逢皆如此言是夜方四十里與城一時俱䧟為湖土人謂之卭河亦卭池其母之故宅基獨不没至今猶存魚人採捕必止宿艾言此水清其底猶見城郭樓檻宛然矣出窮神祕苑天門山天門山山多峻秀巖谷逶邐有大巖壁直上數千仞草木交連雲霧擁蔽其下有逕途微細行人徃忽然上飛而出林表若昇仙遂絶世如此者漸不可勝紀徃來南北號為仙谷時有樂於道者不逺千里而來洗浴巖畔以求昇仙至林下無不飛去㑹一夕有智能者謂他人曰此必妖怪非是仙道因以石自繫而牽一犬入其谷犬復飛去然知是妖邪之氣以噏之乃遣近山鄉里募年少者數百人執兵器持大棒而先縱火燒其草及伐竹木至山畔觀之遙見一物長數十丈髙下隠隠垂頭下望及更漸逼乃一大蟒蛇於是命少年鼓躍擊射然後斫刺而口張尺餘尚欲害人力不加衆乆乃卒其所吞人骨與他獸之骸積在左右如阜焉又有人出行墜深泉澗者無出路饑餓分死左右見龜蛇甚多朝暮引頸向東方人因伏地學之遂不復饑體加輕便能登巖岸數年後試竦身舉臂遂超出澗上即得還家顔色悅懌頗更黠慧勝故還食榖啖滋味百餘日中復其本質出博物志忻州刺史唐忻州刺史是天荒闕前後歴任多死髙宗時有金吾郎將來試此官既至夜獨宿㕔中二更後見簷外有物黒色狀如大船兩目相去數丈刺史問為何神答云我是大蛇也刺史令其改貎相與語蛇遂化作人形來至㕔中乃問何故殺人蛇云初無殺心其客自懼而死爾又問汝無殺心何故數見形軀曰我有屈滯當須府主謀之問有何屈曰昔我㓜時曽入古冡邇來形體漸大求出不得狐兎狸狢等或時入冡方得食之今長在土中求死不得故求於使君爾問若然者當掘出之如何蛇云我逶迤已十餘里若欲發掘城邑俱䧟今城東有王村村西有楸樹使君可設齋戒人掘樹深二丈中有鐡函開函視之我當得出言畢辭去及明如言徃掘得函歸㕔開之有青龍從函中飛上天逕徃殺蛇首尾中分蛇既獲死其怪絶矣出廣異記餘干縣令鄱陽餘干縣令到官數日輙死後無就職者宅遂荒先天中有士人家貧來為之既至吏人請令居别𪠘中令因使治故宅剪薙榛草完葺墻宇令獨處其堂夜列燭伺之二更後有一物如三斗白囊跳轉而來牀前直躍升几上令無懼色徐以手振觸之真是韋囊而盛水也乃謂曰為吾徙燈直西南隅言訖而燈已在西南隅又謂曰汝可為吾按摩囊轉側身上而甚便暢又戲之曰能使我牀居空中否須臾已在空中所言無不如意將曙乃躍去令尋之至舎池旁遂㓕明日於滅處視之見一穴纔如蟻孔掘之長丈許而孔轉大圍三尺餘深不可測令乃敕令多具鼎鑊樵薪悉汲池水為湯灌之可百餘斛穴中雷鳴地為震動又灌百斛乃帖然無聲因併力掘之數丈得一大蛇長百餘尺旁小者巨萬計皆併命穴中令取大者脯之頒賜縣中後遂平吉出廣異記王真妻華隂縣令王真妻趙氏者燕中富人之女也美容貌少適王真洎随之任近半年忽有一少年每伺真出即輙至趙氏寢室既頻徃來因戲誘趙氏私之忽一日王真自外入乃見此少年與趙氏同席飲酌歡笑甚大驚訝趙氏不覺自仆氣絶其少年化一大蛇奔突而去真乃令侍婢扶掖起之俄而趙氏亦化一蛇奔突俱去王真遂逐之見随前出者俱入華山乆之不見出瀟湘録朱覲朱覲者陳蔡遊俠之士也旅遊于汝南栖逆旅時主人鄧全賓家有女姿容端麗常為鬼魅所幻惑凡所醫療莫能愈之覲時過友人飲夜艾方歸乃憇歇於庭至二更見一人着白衣衣甚鮮潔而入全賓女房中逡廵聞房内語笑甚歡不成寢執弓矢於黒處以伺其出候至雞鳴見女送一少年而出覲射之既中而走覲復射之而失其跡曉乃聞之全賓遂與覲尋血跡出宅可五里已來其跡入一大枯𣗳孔中令人伐之果見一蛇雪色長丈餘身帶二箭而死女子自此如故全賔遂以女妻覲出集異記太平廣記卷四百五十六
