body:
  text: 太平廣記卷六十三女仙八玉女邊洞𤣥崔書生驪山姥黄觀福玉女唐開元中華山雲臺觀有婢玉女年四十五大疾徧身潰爛臭穢觀中人懼其汚染即共送于山澗幽僻之處玉女痛楚呻吟忽有道士過前遙擲青草三四株其草如菜謂之曰勉食此不乆當愈玉女即茹之自是疾漸痊不旬日復舊初忘飲食惟恣游覽但意中飄颻不喜人間及觀之前後左右亦不願過此觀中人謂其消散乆矣亦無復有訪之者玉女周旋山中酌泉水食木實而已後於巖下忽逢前道士謂曰汝疾既瘥不用更在人間雲臺觀西二里有石池汝可日至辰時投以小石當有水芝一本自出汝可掇之而食乆乆當自有益玉女即依其教自後筋骸輕健翺翔自若雖屢為觀中人逢見亦不知為玉女耳如此數十年髮長六七尺體生綠毛面如白花往往山中之人過之則叩頭遥禮而已大歴中有書生班行達者性氣麄疏誹毁釋道為學於觀西序而玉女日日往來石池因以為常行達伺候窺覘又熟見投石採芝時節有准於一日稍先至池上及其玉女投小石水芝果出行達乃搴取玉女逺在山巖或棲樹杪既在採去則呼嘆而還明日行達復如此積旬之外玉女稍稍與行達爭先歩武相接歘然遽捉其髮而玉女騰去不得因以勇力挈其膚體仍加逼迫玉女號呼求救誓死不從而氣力困憊終為行達所辱扃之一室翌日行達就觀乃見皤然一媼尫瘵異常起止殊艱視聽甚昧行達驚異遽召觀中人細話其事即共伺問玉女玉女備述始終觀中人固有聞知其故者計其年蓋百有餘矣衆哀之因共放去不經月而殁出集異記邊洞𤣥唐開元末冀州棗强縣女道士邊洞𤣥學道服餌四十年年八十四嵗忽有老人持一器湯餅來詣洞𤣥曰吾是三山仙人以汝得道故來相取此湯餅是玉英之粉神仙所貴頃來得道者多服之爾但服無疑後七日必當羽化洞𤣥食畢老人曰吾今先行汝後來也言訖不見後日洞𤣥忽覺身輕齒髮盡換謂弟子曰上清見召不乆當往顧念汝等能不恨恨善修吾道無為樂人間事為土棺散魂耳滿七日弟子等晨往問訊動止已見紫雲昏凝徧滿庭户又聞空中有數人語乃不敢入悉止門外須臾門開洞𤣥乃乘紫雲竦身空中立去地百餘尺與諸弟子及法侣等辭訣時刺史源復與官吏百姓等數萬人皆遥瞻禮有頃日出紫氣化為五色雲洞𤣥冉冉而上乆之方滅出廣異記崔書生唐開元天寳中有崔書生於東州邏谷口居好植名花暮春之中英蕊芬鬱逺聞百歩書生每初晨必盥漱看之忽有一女自西乘馬而來青衣老少數人隨後女有殊色所乘駿馬極佳崔生未及細視則已過矣明日又過崔生乃於花下先致酒茗樽杓鋪陳茵蓆乃迎馬首拜曰某性好花木此園無非手植今正值香茂頗堪流眄女郎頻日而過計僕馭當疲敢具單醪以俟憩息女不顧而過其後青衣曰但具酒饌何憂不至女顧叱曰何故輕與人言崔生明日又先及鞭馬隨之到别墅之前又下馬拜請良乆一老青衣謂女曰馬大疲暫歇無爽因自控馬至當寢下老青衣謂崔生曰君既求婚予為媒妁可乎崔生大悦載拜跪請青衣曰事亦必定後十五六日大是吉辰君於此時但具婚禮所要并於此備酒餚今小娘子阿姊在邏谷中有小疾故日往看省向某去後便當咨啓期到皆至此矣於是俱行崔生在後即依言營備吉日所要至期女及姊皆到其姊亦儀質極麗送留女歸於崔生崔生母在故居殊不知崔生納室崔生以不告而娶但啓以婢媵母見新婦之姿甚美經月餘忽有人送食於女甘香殊異後崔生覺母慈顏衰悴因伏問几下母曰有汝一子冀得求全今汝所納新婦妖媚無雙吾於土塑圖畫之中未曾見此必是狐魅之輩傷害於汝故致吾憂崔生入室見女淚涕交下曰本侍箕箒望以終天不知尊夫人待以狐魅輩明晨即别崔生亦揮涕不能言明日女車騎復至女乘一馬崔生亦乘一馬從送之入邏谷三十里山間有一川川中有異花珍果不可言紀館宇屋室侈於王者青衣百許迎拜曰無行崔郎何必將來於是捧入留崔生於門外未幾一青衣女傳姊言曰崔郎遣行太夫人疑阻事宜便絶不合相見然小妹曾奉周旋亦當奉屈俄而召崔生入責誚再三詞辨清婉崔生但拜伏受譴而已後遂坐於中寢對食食訖命酒召文樂洽奏鏗鏘萬變樂闋其姊謂女曰須令崔郎却㢠廻汝有何物贈送女遂袖中取白玉盒子遺崔生生亦留别於是各嗚咽而出門至邏谷口囘望千巖萬壑無有逕路因慟哭歸家常持玉盒子鬱鬱不樂忽有胡僧扣門求食曰君有至寳乞相示也崔生曰某貧士何有是請僧曰君豈不有異人奉贈乎貧道望氣知之崔生試出玉盒子示僧僧起請以百萬市之遂往崔生問僧曰女郎誰耶曰君所納妻西王母第三女玉巵娘子也姊亦負美名於仙都况復人間所惜君納之不得乆逺若住得一年君舉家不死矣出𤣥怪錄驪山姥驪山姥不知何代人也李筌好神仙之道常歴名山博採方術至嵩山虎口巖石室中得黄帝陰符本絹素書緘之甚宻題云大魏真君二年七月七日道士寇謙之藏之名山用傳同好以糜爛筌抄讀數千徧竟不曉其義理因入秦至驪山下逢一老母鬢髻當頂餘髮半垂弊衣扶杖神狀甚異路旁見遺火燒樹因自言曰火生於木禍發必尅筌聞之驚前問曰此黄帝陰符秘文母何得而言之母曰吾受此符已三元六周甲子矣三元一周計一百八十年六周共計一千八十年少年從何而知筌稽首再拜具告得符之所因請問𤣥義使筌正立向明視之曰受此符者當須名列仙籍骨相應仙而後可以語至道之幽妙啓𤣥闗之鎻鑰耳不然者反受其咎也少年顴骨貫於生門命輪齊於月角血脈未減心影不偏性賢而好法神勇而樂智真吾弟子也然四十五嵗當有大厄因出丹書符一通貫於杖端令筌跪而吞之曰天地相保於是命坐為説陰符之義曰陰符者上清所秘𤣥臺所尊理國則太平理身則得道非獨機權制勝之用乃至道之要樞豈人間之常典耶昔雖有暴横黄帝舉賢用能誅彊伐叛以佐神農之理三年百戰而功用未成齋心告天罪已請命九靈金母命蒙狐之使授以玉符然後能通天達誠感動天帝命𤣥女教其兵機賜帝九天六甲兵信之符此書乃行於世凡三百餘言一百言演道一百言演法一百言演術上有神仙抱一之道中有富國安民之法下有彊兵戰勝之術皆出自天機合乎神智觀其精妙則黄庭八景不足以為𤣥察其至要則經傳子史不足以為文較其巧智則孫吳韓白不足以為竒一名黄帝天機之書非竒人不可妄傳九竅四肢不具慳貪愚痴驕奢淫佚者必不可使聞之凡傳同好當齋而傳之有本者為師受書者為弟子不得以富貴為重貧賤為輕違之者奪紀二十每年七月七日寫一本藏名山石巖中得加算本命日誦七徧益心機加年夀出三尸下九蟲秘而重之當傳同好耳此書至人學之得其道賢人學之得其法凡人學之得其殃職分不同也經言君子得之固躬小人得之輕命盖泄天機也泄天機者沉三刼得不戒哉言訖謂筌曰日已晡矣吾有麥飯相與為食袖中出一瓠令筌於谷中取水既滿瓠忽重百餘斤力不能制而沉泉中却至樹下失姥所在惟於石上留麥飯數升悵望至夕不復見姥筌食麥飯自此不食因絶粒求道注陰符述二十四機著太白陰經述中台志閫外春秋以行於世仕為荆南節度副使仙州刺史出集仙録黄觀福黄觀福者雅州百丈縣民之女也幼不茹葷血好清靜家貧無香以栢葉栢子焚之每凝然静坐無所營為經日不倦或食栢葉飲水自給不嗜五榖父母憐之率任其意既笄欲嫁之忽謂父母曰門前水中極有異物女常時多與父母説竒事先兆往往信驗聞之因以為然隨往看之水果來洶涌乃自投水中良乆不出漉之得一古木天尊像金彩已駁狀貌與女無異水即澄静便以木像置路上號泣而歸其母時來視之憶念不已忽有綵雲仙樂引衞甚多與女子三人下其庭中謂父母曰女本上清仙人也有小過謫在人間年限既畢復歸天上無至憂念也同來三人一是玉皇侍女一是天帝侍辰女一是上清侍書此去不復來矣今來此地疾疫死者甚多以金遺父母使移家益州以避凶嵗即留金數餅昇天而去父母如其言移家蜀郡其嵗疫毒黎雅尤甚十喪三四即唐麟德年也今俗呼為黄冠佛盖以不識天尊道像仍是相傳語訛以黄觀福為黄冠佛也出集仙録太平廣記卷六十三
