body:
  text: 太平廣記卷六十八女仙十三郭翰楊敬真封陟郭翰太原郭翰少簡貴有清標姿度美秀善談論工草𨽻早孤獨處當盛暑乗月卧庭中時有清風稍聞香氣漸濃翰甚怪之仰視空中見有人冉冉而下直至翰前乃一少女也明艶絶代光彩溢目衣𤣥綃之衣曵霜羅之帔戴翠翹鳯凰之冠躡瓊文九章之履侍女二人皆有殊色感蕩心神翰整衣巾下牀拜謁曰不意尊靈􅒯降願垂徳音女㣲笑曰吾天上織女也久無主對而佳期阻曠幽態盈懐上帝賜命逰人間仰慕清風願託神契翰曰非敢望也益深所感女為敕侍婢净掃室中張霜霧丹縠之幃施水晶玉華之簟轉㑹風之扇宛若清秋乃㩦手升堂觧衣共卧其襯體輕紅綃衣似小香囊氣盈一室有同心龍腦之枕覆雙縷鴛文之衾柔肌膩體深情宻態妍艶無匹欲曉辭去面粉如故為試拭之乃本質也翰送出户凌雲而去自後夜夜皆來情好轉切翰戱之曰牛郎何在那敢獨行對曰隂陽變化闗渠何事且河漢隔絶無可復知縦復知之不足為慮因撫翰心前曰世人不明瞻瞩耳翰又曰卿已託靈辰象辰象之門可得聞乎對曰人間觀之只見是星其中自有宫室居處羣仙皆逰觀焉萬物之精各有象在天成形在地下人之變必形扵上也吾今觀之皆了了自識因為翰指列宿分位盡詳紀度時人不悟者翰遂洞知之後將至七夕忽不復來經數夕方至翰問曰相見樂乎笑而對曰天上那比人間正以感運當爾非有他故也君無相忌問曰卿來何遲答曰人中五日彼一夕也又為翰致天厨悉非世物徐視其衣並無縫翰問之謂翰曰天衣本非針線為也每去輒以衣服自随經一年忽扵一夕顔色悽惻涕流交下執翰手曰帝命有程便可永訣遂嗚咽不自勝翰驚惋曰尚餘㡬日在對曰只今夕耳遂悲泣徹曉不眠及旦撫抱為别以七寳椀一留贈言明年某日當有書相問翰答以玉環一雙便履空而去廻顧招手良久方滅翰思之成疾未嘗暫忘明年至期果使前者使女將書函致翰遂開封以青縑為紙鉛丹為字言詞清麗情意重叠書末有詩二首詩曰河漢雖云濶三秋尚有期情人終已矣良㑹更何時又曰朱閣臨清漢瓊宫御紫房佳期情在此只是斷人膓翰以香牋答書意甚慊切并有酬贈詩二首詩曰人世將天上由來不可期誰知一廻顧交作兩相思又曰贈枕猶香澤啼衣尚淚㾗玉顔霄漢裏空有往來魂自此而絶是年太史奏織女星無光翰思不已凡人間麗色不復措意復以繼嗣大義湏婚强娶程氏女所不稱意復以無嗣遂成反目翰後官至侍御史而卒出靈怪集楊敬真楊敬真虢州閿鄉縣長夀鄉天仙村田家女也年十八嫁同村王清其夫家貧力田楊氏婦道甚謹夫族目之勤力新婦性沉静不好戱笑有暇必灑掃静室閉門閒居雖鄰婦狎之終不相往來生三男一女年二十四嵗元和十二年五月十二日夜告其夫曰妾神識頗不安惡聞人言當扵静室寜之君宜與兒女暫居異室夫許之楊氏遂沐浴著新衣焚香閉户而坐及明訝其起遲開門視之衣服委於牀上若蟬蛻然身已去矣但覺異香滿室其夫驚以告其父母共嘆之數人來曰昨夜方半有天樂從西而來似若雲中下扵君家奏樂久之稍稍上去合村皆聽之君家聞否而異香酷烈遍數十里村吏以告縣令李邯遣吏民逺近尋逐皆無踪跡因令不動其衣閉其户以棘環之兾其或來也至十八日夜五更村人復聞雲中仙樂異香従東來復下王氏宅作樂久之而去王氏亦無聞者及明來視其門棘封如故房中髣髴若有人聲遽走告縣令李邯親率僧道官吏共開其門則婦宛在牀矣但覺面目光芒有非常之色邯問曰向何所去今何所來對曰昨十五日初有仙騎來曰夫人當上仙雲鶴即到宜静室以伺之至三更有仙樂綵仗霓旌絳節鸞鶴紛紜五雲來降入扵房中報者曰前夫人准籍合仙仙師使使者來迎將㑹扵西岳扵是彩童二人捧玉箱箱中有竒服非綺非羅製若道人之衣珍華香潔不可名狀遂衣之畢樂作三闋青衣引白鶴曰宜乗此初尚懼其危試乗之稳不可言飛起而五雲捧出綵仗前引至扵華山雲䑓峰峰上有盤石已有四女先在彼焉一人云姓馬宋州人一人姓徐幽州人一人姓郭荆州人一人姓夏青州人皆其夜成仙同㑹扵此旁一小仙曰並捨虛幻得證真仙今當定名宜有真字扵是馬曰信真徐曰湛真郭曰修真夏曰守真其時五雲參差徧覆崖谷妙樂羅列間作扵前五人相慶曰同生濁界並是凡身一旦翛然遂與塵隔今夕何夕歡㑹扵斯宜各賦詩以道其意信真詩曰㡬刼澄煩慮思今身僅成誓將雲外隐不向世間存湛真詩曰綽約離塵世従容上太清雲衣無綻日鶴駕沒遥程修真詩曰華嶽無三尺東瀛僅一杯入雲騎綵鳯歌舞上蓬萊守真詩曰共作雲山侣俱辭世界塵静思前日事抛却㡬年身敬真亦詩曰人世従紛擾其生似夢華誰言今夕裏俛首視雲霞既而雕盤珍果名不可知妙樂鏘鍠響動崖谷俄而執莭者曰宜往蓬萊謁大仙伯五真曰大仙伯為誰曰茅君也妓樂鸞鶴復前引東去倐然間已到蓬萊其宫皆金銀花木樓殿皆非人間之製作大仙伯居金闕玉堂中侍衛甚嚴見五真喜曰來何晚耶飲以玉盃賜以金簡鳳文之衣玉華之冠配居蓬萊華院四人者出敬真獨前曰王父年髙無人侍飬請回侍其殘年王父去世然後従命誠不忍得樂而忘王父也惟仙伯哀之仙伯曰汝村一千年方出一仙人汝當其㑹無自墜其道因敕四真送至其家故得還也邯問昔何修習曰村婦何以知但性本虛静閒即凝神而坐不復俗慮得入胸中耳此性也非學也又問要去可否曰本無道術何以能去雲鶴來迎即去不來亦無術可召扵是遂謝絶其夫服黄冠邯以狀聞州州聞亷使時崔従按察陕輔延之舍扵陕州紫極宫請王父扵别室人不得升其階惟亷使従事及夫人得之瞻拜者才及階而已亦不得升亷使以聞唐憲宗召見舍扵内殿試道而無以對罷之今在陕州終嵗不食食時㗖果實或飲酒二三盃絶無所食但容色轉芳嫩耳出續𤣥怪録封陟寳厯中有封陟孝亷者居扵少室貎態潔朗性頗貞端志在典墳僻于林藪探義而星歸腐草閲經而月墜幽忩兀兀孜孜俾夜作晝無非捜索隐奥未嘗暫縱愒時日也書堂之畔景像可窺泉石清寒桂蘭雅淡戱猱每竊其庭果唳鶴頻棲扵澗松虛籟時吟纎埃晝閴烟鎖簹篁之翠節露滋躑躅之紅葩薜蔓衣垣苔茸毯砌時夜將午忽飄異香酷烈漸布扵庭際俄有輜軿自空而降畫輪軋軋直凑簷楹見一仙姝侍従華麗玉珮敲磬羅裙曵雲體欺皓雪之容光臉奪芙蕖之艶冶正容歛袵而揖陟曰某籍本上仙謫居下界或逰人間五岳或止海面三峰月到瑶階愁莫聼其鳯管虫吟粉壁恨不寐扵鴛衾燕浪語而徘徊鸞虛歌而縹緲寳瑟休泛虬觥懶斟紅杏艶枝激含嚬扵綺殿碧桃芳蕚引凝睇扵瓊樓既厭曉粧漸融春思伏見郎君坤儀濬潔襟量端明學聚流螢文含隐豹所以慕其真朴愛以孤標特謁光容願持箕箒又不知郎君雅㫖如何陟攝衣朗燭正色而坐言曰某家本貞亷性惟孤介貪古人之糟粕究前聖之指歸編栁苦辛燃糠幽暗布𬒳糲食燒蒿茹藜但自固窮終不斯濫必不敢當神仙降顧斷意如此幸早廻車姝曰某乍造門墻未申懇廹輒有詩一章奉留後七日更來詩曰謫居蓬島别瑶池春媚烟花有所思為愛君心能潔白碩􅍾箕箒奉屏幃陟覽之若不聞雲軿既去忩户遺芳然陟心中不可轉也後七日夜姝又至騎従如前時麗容潔服艶媚巧言入白陟曰某以業縁遽縈魔障剡起蓬山瀛島繡帳錦宫恨起紅茵愁生翠𬒳難窺舞蝶扵芳草每妬流鶯扵綺叢靡不雙飛俱能對跱自矜孤寢轉懵空閨秋却銀缸但凝眸扵片月春尋瓊圃空抒思扵殘花所以急切前時布露丹懇幸垂采納無阻精誠又不知郎君意竟如何陟又正色而言曰某身居山藪志已顓蒙不識鉛華豈知女色幸垂速去無相見尤姝曰碩不貯其深疑幸望容其陋質輒更有詩一章後七日復來詩曰弄玉有夫皆得道劉綱兼室盡登仙君能仔細窺朝露湏逐雲車拜洞天陟覧又不廻意後七日夜姝又至態柔容冶靚衣眀眸又言曰逝波難駐西日易頺花木不停薤露非久輕漚泛水只得逡廵㣲燭當風莫過瞬息虛争意氣能得㡬時恃此韶顔須臾槁木所以君誇容鬂尚未凋零固止綺羅貪窮典籍及其衰老何以任持我有還丹頗能駐命許其依托必寫襟懐能遣君夀例三松瞳方兩目仙山靈府任意追逰莫種槿花使朝晨而騁艶休敲石火尚昏黒而流光陟乃怒目而言曰我居書齋不欺暗室下恵為証叔子為師是何妖精苦相凌逼心如鐵石無更多言倘若遅迴必當窘辱侍衛諌曰小娘子迴車此木偶人不足與語况窮薄當為下鬼豈神仙配偶耶姝長吁曰我所以懇懇者為是青牛道士之苖裔况此時一失又須曠居六百年不是細事扵戱此子大是忍人又留詩曰蕭郎不顧鳯樓人雲澁迴車淚臉新愁想蓬瀛歸去路難窺舊院碧桃春輜軿出户珠翠響空泠泠簫笙杳杳雲路然陟意不易後三年陟染疾而終為太山所追束以大鎖使者驅之欲至幽府忽遇神仙騎従清道甚嚴使者躬身扵路左曰上元夫人逰太山耳俄有仙騎召使者與囚俱至陟至彼仰窺乃昔日求偶仙姝也但左右彈指悲嗟仙姝遂索追狀曰不能扵此人無情遂索大筆判曰封陟往雖執迷􅍾惟堅潔實由朴戅難責風情宜更延一紀左右令陟跪謝使者遂解去鐡鏁曰仙官已釋則幽府無敢追攝使者却引歸良久蘇息後追悔昔日之事慟哭自咎而已出傳竒太平廣記卷六十八
