body:
  text: 太平廣記卷三百三十六宋李昉等編鬼二十一常夷張守一鄭望宇文覿李瑩裴晠李氏常夷唐建康常夷字叔通博覽經史雅有文藝性耿正清直以世業自尚家近清溪常晝日獨坐有黄衫小兒齎書直至閣前曰朱秀才相聞夷未嘗識也甚怪之始發其書云呉郡秀才朱均白常髙士書中悉非生人語大抵家近在西岡幸為善鄰思奉顔色末有一詩具陳云平生遊城郭殂沒委荒榛自我辭人世不知秋與春牛羊久來牧松柏幾成薪分絶車馬好甘随狐羣何處清風至君子幸為鄰烈烈盛名徳依依佇良賓千年何旦暮一室動人神喬木如在望通衢良易遵髙門倘無隔向與折龍津其紙墨皆故弊常夷以感契殊深嘆異久之乃為答書慇懃切至仍直尅期請與相見既去令随視之至舍西一里許入古墳中至期夷為具酒果須臾聞扣門見前小兒云朱秀才來謁夷束帶出迎秀才著角巾葛單衣曵履可年五十許風度閑和雅有清致與相勞苦秀才曰僕梁朝時本州舉秀才髙第屬四方多難遂無宦情屏居求志陳永定末終此地久處泉壤常欽風味幽明路絶遂廢將迎幸因良㑹大君子不見嫌棄得申欝積何樂如之夷答曰僕以暗劣不意㝠靈所在咫尺久闕承稟幸蒙殊顧欣感實多因就坐噉果飲酒問其梁陳間事歴歴分明自云朱異從子説異事武帝恩幸無匹帝有織成金縷屏風珊瑚鈿玉柄塵尾林邑所獻七寳澡瓶沉香鏤枕皆帝所秘惜常於承雲殿講竟悉將以賜異昭明太子薨時有白霧四塞葬時𤣥鵠四雙翔遶陵上徘徊悲鳴葬畢乃去元帝一目失明深忌諱之為湘東鎮荆州王嘗使博士講論語至於見瞽者必變色語不為𨼆帝大怒乃酖殺之又嘗破北虜手斬一禆將于謹破江陵帝見害時行刀者乃其子也沈約母拜建昌太夫人時帝使散騎侍郎就家讀䇿受印綬自僕射何敬容已下數百人就門拜賀宋梁已來命婦未有其榮庾肩吾少事陶先生頗多藝術嘗盛夏㑹客向空大嘘氣盡成雪又禁諸器物悉住空中簡文帝詔襄陽造鳯林寺少刹柱木未至津吏於江中獲一樟木正與諸柱相符帝性至孝居丁貴嬪柩涕泣不絶卧痛潰爛面盡生瘡侯景䧟臺城城中水米隔絶武帝既敕進粥宫中無米於黄門布囊中齎得四升食盡遂絶所求不給而崩景所得梁人為長枷悉納其頭命軍士以三投矢亂射殺之雖衣冠貴人亦無異也陳武帝既殺王僧辯天下大雨百餘日又説陳武㣲時家甚貧為人庸保以自給常盜取長城豪富包氏池中魚擒得以擔竿繫甚困即祚後滅包氏此皆史所脱遺事𩔖甚多不可悉載後數相來往談宴賦詩才甚清舉甚成宻交夷家有吉凶皆預報之後夷病甚秀才謂曰司命追君為長史吾亦預巡察此職甚重尤難其選㝠中貴盛無比生人㑹當有死縱復疆延數年何如居此地君當勿辭也夷遂欣然不加藥療數日而卒出廣異記張守一乾元有張守一為大理少卿性仁恕以平反折獄死囚出免者甚多後當早朝有白頭老人傴僂䇿杖詣馬前拜謝守一問故請避從者曰非生人明公所出死囚之父也幽明卑賤無以報徳明公倘有助身之求或能致耳請受敎守一曰賢子無罪非我屈法伸恩不敢當此忝列九卿頗得自給幸無勞苦再三慰遣之鬼曰當爾且去倘有求不致者幸相念遂不見俄爾有詔賜城中縱觀守一於㑹中窺見士人家女姿色艶絶相悦之而防閑甚急計無從出試呼前鬼頗能為我致否言訖即至曰此易事耳然不得多時纔可七日曰足矣得非變化相感耶鬼曰明公何疑之深僕以他物代取其身遂營寂静之處設帷帳有頃奄然而至良久寤驚曰此何處唯守一及鬼在傍紿云此是天上天使因與欵昵情愛甚切至七日謂女曰天上人間當隔異歡㑹尚淺便爾乖離如何因流涕取别鬼復掩其目送還守一後私覘女家云家女卒中惡不識人七日而醒後經十年又逢此鬼曰天曹相召便當永訣今奉藥一丸此能㸃化雜骨為骨􅙡刀把之良者願公寳之有急當用因歔欷而去藥如雞卵許大至武太后時守一以持法寛平為酷吏所搆流徙嶺表資用窘竭乃以藥㸃骨信然之取給藥盡遂卒出廣異記鄭望乾元中有鄭望者自都入京夜投野狐泉店宿未至五六里而昏黑忽於道側見人家試問門者云是王將軍與其亡父有舊望甚喜乃通名參承將軍出與望相見叙悲泣人事備之因爾留宿為設饌飲中夜酒酣令呼蘧蒢三娘唱歌送酒少間三娘至容色甚麗尤工唱阿鵲鹽及曉别去將軍夫人𫝊語令買錦袴及頭䯻花紅朱粉等後數月東歸過送所求物將軍相見歡甚留宿如初望問何以不見蘧蒢三娘將軍云已隨其夫還京以明日辭去岀門不復見宅但餘丘隴望憮然却迴至野狐泉問居人曰是王將軍塜塜邊伶人至店其妻暴疾亡以葦蓆裹屍葬將軍墳側故呼曰蘧蒢三娘云旬日前伶官亦移其尸歸葬長安訖岀𤣥怪録宇文覿韓徹者以乾元中任隴州吳山令素與進士宇文覿辛稷等相善並隨徹至吳山讀書兼許秋賦之給吳山縣令號凶闕前任多死令㕔有大槐樹覿稷等意是精魅所憑私與典正欲徹不在砍伐去之期有一日矣更白徹徹謂二子曰命在於天貴不在樹子等無然其謀遂止後數日覿稷行樹得一孔旁甚潤澤中有青氣上昇為雲伺徹還寢乃命縣人掘之深數尺得一塜塜中有棺木而已爛壊有少齒髮及脛骨胯骨猶在遙望西北陬有一物衆謂是怪異乃以五千顧二人取之初縋然畫燭一束二人背刀縁索徃視其食瓶瓶中有水水上有林檎縋夾等物瀉出地上悉如烟銷徹至命佐史收骨髮以新棺歛葬諸野佐史偷錢用小書函折骨埋之既至舍倉卒欲死家人白徹徹令巫視之巫於徹前靈語云己是晉將軍契苾鍔身以戰死受葬於此縣立冡近馬坊恒苦糞穢欲求遷改前後累有所白多遇令死人遂令㝠苦無可上逹今明府恩及幽壤俸錢市櫬甚恵厚胥吏酷惡乃以書函見貯骨髮骨長函短斷我胯脛不勝楚痛故復讐之耳徹辭謝數日自陳為主不明令吏人等有此偽欺當令市櫬以衣被相送而可小赦其罪誠幸也又靈語云尋當釋之然創造此謀是宇文七及辛四幽魂珮戴豈敢忘之辛侯不久自當擢禄足光其身但宇文生命薄無位雖獲一第終不及禄且多厄難我當救其三死若忽為官雖我亦不能救言畢乃去佐史見釋方獲禮葬覿家在岐山久之鍔忽空中語云七郎夫人在莊疾亟適已徃彼營救今亦小痊尋有莊人來報可無懼也若還妻可之後慎無食馬肉須臾使王具如所白覿入門其妻亦愈㑹莊客馬駒死以熟腸及肉餽覿覿忘其言而食之遇乾霍亂悶而絶氣者數矣忽聞鍔言云令君勿食馬何故違約馬是前世寃家我若不在君無活理我在亦無苦也遂令左右執筆疏方藥至服之乃愈後覿還吳山㑹岐州土賊欲僭偽號署置百官覿有名被署中書舍人賊尋被官兵所殺覿等七十餘人繫州獄十人鍔復至覿妻所語云七郎犯事我在地中大為求請然要三千貫錢妻辭貧家實不能辦鍔曰地府所用是人間紙錢妻云紙錢當力辦之焚畢復至獄中謂覿曰我適於夫人三千貫為君屬請事亦解矣有劉使君至者即當得放飽食無憂也尋而詔用劉晏為隴州刺史辭日奏曰㸃汚名賢曾未相見所由但以為逆所引悉皆繫獄臣至州日請一切釋免上可其奏晏至州上畢悉召獄囚宣敕放之覿既以為賊所署恥而還家半歳餘呂崇賁為河東節度求書記之士在朝多言覿者崇賁奏覿左衞兵曹河東書記敕賜衣一襲崇賁送絹百疋敕至覿甚喜受敕衣緑裳西向拜蹈奴忽倒地鍔靈語嘆息久之謂覿勿令作官何故受之此度不能相救矣覿云今却還之如何答云己受官畢何謂復還千萬珍重不復來矣後四日覿遇疾卒初女巫見鍔衣冠甚偉鬂髮洞赤狀若今之庫莫奚云出廣異記李瑩壽昌令趙郡李瑩同堂妹第十三未嫁至徳初隨諸兄南渡卒葬於吳之海鹽其親兄岷莊在濟源有妹寡居去莊十餘里禄山之亂不獲南出上元中忽見妹還問其由來云為賊所掠言對有理家人不之詰娣以亂故恐不相全倉卒將嫁近莊張氏積四五年有子一人性甚明恵靡所不了恒於岷家獨鏁一房來去安堵岷家田地多為人所影占皆公訟收復之永泰中國歩既清岷及諸弟自江東入京參選事畢還莊欲至數百里妹在莊忽謂婢云諸兄弟等數日當至我須暫住張家又過娣别娣問其故曰頻夢云爾婢送至中路遣婢還行十餘歩回顧不復見婢頗怪之後二日張氏報云已死姨及外甥等悲泣適已而諸兄弟遂至因發張氏妹䘮岷言渠上元中死殯在海鹽何得至此恐其鬼魅因徃張家臨視舉被不復見屍驗其衣鏡皆入棺時物子亦尋死出廣異記裴晠河東裴晠幼好彈箏時有彈箏師善為新曲晠妹欲就學難其親受於是晠就學轉授其妹遂有能名久之晠客江湘卒於南楚母妹在家晠忽輕身獨還家驚喜問其故云囊齎并奴等在後日暮方至歡慶之後因求箏彈復令其妹理曲有所誤錯悉皆正之累正十餘曲因不復見須臾䘮輿乃至云出廣異記李氏上都來庭里婦人李氏者晝坐家堂忽見其夫亡娣身衣白服戴布幞巾逕來逐已李氏遶牀避走追逐不止乃岀門絶騁﨑嶇之中莫敢支吾救援之者有北門萬騎卒以馬鞭擊之隨手而消止有幞頭布奄然至地其下得一髑髏骨焉出廣異記太平廣記卷三百三十六
