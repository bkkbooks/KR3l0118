body:
  text: 太平廣記卷一百七十一精察一李子萇袁安嚴遵李崇魏先生李義琛蔣恒王璥李傑裴子雲郭正一張楚金董行成張鷟張松夀蘇無名趙㳙袁滋李子萇漢李子萇為政欲知囚情以梧檟為人𧰼囚人形鑿地為陷以蘆為郭卧木囚其中囚罪正是木囚不動囚寃侵奪木囚動出不知囚之精神著木人邪將天神之氣動木囚也出論衡袁安漢袁安為楚相會楚王坐事平相牽引拘繫者千餘人毒楚横暴囚皆自誣厯三年而獄不決坐掠幽而死者百餘人天用炎旱赤地千里安授拜即控轡而行既到決獄事人人具錄辭状本非首謀為王所引應時理遣一日之中延千人之命其時甘雨滂霈嵗大豐稔出汝南先賢傳嚴遵嚴遵為揚州刺史行部聞道旁女子哭而聲不哀問之亡夫遭燒死遵敕吏輿屍到令人守之曰當有物往更日有蠅聚頭所遵令披視銕錐貫頂考問以淫殺夫出益都耆舊傳李崇北齊頓丘李崇陳留公誕之子髙祖時為兗州刺史兗州比多刼盜崇乃村置一樓樓懸一鼓盜發之處搥鼓亂擊四面諸村始聞者撾鼓一通次聞者復撾以為節俄頃之間聲布百里伏其險要無不擒獲諸州置鼓自此始也世宗時除揚州刺史崇明察審奸邪憚之號曰卧虎出談藪魏先生魏先生生於周家於宋儒書之外詳究樂章隋初出遊闗右値太常考樂議者未平聞先生來競往謁問先生乃取平陳樂器與樂官林䕫蔡子元等詳其律度然後金石絲竹咸得其所内致清商署焉太樂官斂帛二百段以酧之先生不復入仕遂歸梁宋以琴酒為娛及隋末兵興楊𤣥感戰敗謀主李宻亡命鴈門變姓名以教授先生同其鄉曲由是遂相來往常論鍾律李宻頗能先生因戲之曰觀吾子氣沮而目亂心搖而語偷氣沮者新破敗目亂者無所主心搖者神未定語偷者思有謀於人今方捕蒲山黨得非長者乎李公驚起捉先生手曰既能知我豈不能救我歟先生曰吾子無帝王規模非將帥才略乃亂世之雄傑耳李公曰為吾辯析行藏亦當由此而退先生曰夫為帝王者籠羅天地儀範古今外則日用而不知中則嵗功而自立堯詢四岳舉鯀而殛羽山此乃出於無私漢任三傑納良而圍垓下亦出於無私也故鳳有爪吻而不施麟有蹄突而永廢者能付其道而求自集於時者此帝王規模也凡為將帥者幕建太一旗驅無戰之師伐有名之罪乃彫戈既授玉弩斯張誠負羇之有言那季良之猶在所以務其宴犒致逸待勞修其屯田觀時而動遂使風生虎嘯不可抗其威雲起龍􅋮不可攘其勢仲尼曰我戰則克孟軻云夫誰與敵此將帥之才也至有衷其才智動以機鈴公於國則為帥臣私於己則曰亂盜私於己者必掠取財色屠其城池朱亥為前席之賔樊噲為升堂之客朝聞夕死公孫終敗於邑中寧我負人曹操豈兼於天下是忘輦千金之貺陳一飯之恩有感謝之人無懐歸之衆且魯史之誡曰度徳連山之文曰待時尚欲謀於人不能惠於己天人厭亂厯數有歸時雨降而祅祲除太陽昇而層氷釋引繩縛虎難希飛免之門赴水持瓶豈是安生之地吾嘗望氣汾晉有聖人生能往事之富貴可取李公拂衣而言曰隋氏以弑殺取天下吾家以勲徳居人表振臂一呼衆必嚮應提兵時伐何往不下道行可以取四海不行亦足王一方委質於時誠所未忍汝眞䜿儒不足以計事遂絶魏生因寓懐賦詩為鄉吏發覺李公脱身西走所在收兵北依黎陽而南據洛口連營百萬與王充争衡首尾三年終見敗覆追思魏生之言即日遂歸於唐乃授司農之官後復桃林之叛魏生得道之士不志其名葢文貞之宗親也出甘澤謠李義琛太宗朝文成公主自吐蕃貢金數百至岐州遇盜前後發使案問無獲賊者太宗召諸御史目之特命李義琛前曰卿神清俊拔暫勞卿推逐必當獲賊琛受命施以宻計數日盡獲賊矣太宗喜特加七階賜金二十兩出御史臺記蔣恆貞觀中衛州板橋店主張迪妻歸寧有衛州三衛楊眞等三人投宿五更早發夜有人取三衛刀殺張迪其刀却内鞘中眞等不之知至明店人追眞等視刀有血痕囚禁拷訊眞等苦毒遂自誣上疑之差御史蔣恆覆推至總追店人十五已上集為人不足且㪚惟留一老婆年八十已上晚放出令獄典宻覘之曰婆出當有一人與婆語者即記取姓名勿令漏洩果有一人共語即記之明日復爾其人又問婆使人作何推勘如是者三日並是此人恆總追集男女三百餘人就中喚與老婆語者一人出餘並放散問之具伏云與迪妻姦殺有實奏之敕賜帛二百段除侍御史出朝野僉載王璥貞觀中左丞李行廉弟行詮前妻子忠烝其後母遂私將潛藏云敕追入内行廉不知乃進状奉敕推詰峻急其後母詐以領巾勒項卧街中長安縣詰之云有人詐宣敕喚去一紫袍人見留數宿不知姓名勒項送置街中忠惶恐私就卜問被不良人疑之執送縣縣尉王璥引就房内推問不承璥先令一人伏案褥下聽之令一人報云長使喚璥鎻房門而去子母相謂曰必不得承幷私宻之語璥至開門案下人亦起母子大驚並具承伏法出朝野僉載李傑李傑為河南尹有寡婦告其子不孝其子不能自理但云得罪於母死所甘分傑察其狀非不孝子謂寡婦曰汝寡居唯有一子今告之罪至死得無悔乎寡婦曰子無賴不順母寧復惜乎傑曰審如此可買棺木來取兒尸因使人覘其後寡婦既出謂一道士曰事了矣俄持棺至傑尚兾有悔再三喻之寡婦執意如初道士立於門外宻令擒之一訊承伏與寡婦私通常為兒所制故欲除之傑放其子杖殺道士及寡婦便同棺盛之出國史異纂裴子雲衛州新鄉縣令裴子雲好竒䇿部人王敬戍邊留牸牛六頭於舅李進處養五年産犢三十頭例十貫已上敬還索牛兩頭已死只還四頭老牛餘並非汝牛生總不肯還敬忿之投縣陳牒子雲令送敬付獄禁呌追盜牛賊李進進惶怖至縣叱之曰賊引汝同盜牛三十頭藏於汝家喚賊共對乃以布衫籠敬頭立南墻之下進急乃吐欵云三十頭牛總是外甥牸牛所生實非盜得雲遣去布衫進見是敬曰此是外甥也雲曰若是即還他牛進黙然雲曰五年養牛辛苦與數頭餘並還敬一縣服其精察出朝野僉載郭正一中書舍人郭正一破平壌得一髙麗婢名玉素極姝豔令専知財物庫正一夜須漿水粥非玉素煮之不可玉素乃毒之而進正一急曰此婢藥我索土漿甘草服之良久乃解覔婢不得幷失金銀器物十餘事錄奏敕令長平萬年捉不良脊爛求賊鼎沸三日不獲不良主帥魏昶有䇿略取舍人家奴選年少端正者三人布衫籠頭至街縳衛士四人問十日内以來何人覓舍人家衛士云有投化髙麗留書遣付舍人捉馬奴書見在檢云金城坊中有一空宅更無語不良往金城坊空宅並搜之至一宅封鎖甚宻打鎖破開之婢及髙麗並在其中拷問乃是投化髙麗共捉馬奴藏之奉敕斬於東市出朝野僉載張楚金垂拱年則天監國羅織事起湖州佐史江琛取刺史裴光判書割字合成文理詐為徐敬業反書以告差使推光欵書是光書疑語非光語前後三使推不能決敕令差能推事人勘當取實僉曰張楚金可乃使之楚金憂悶仰卧西忩日到向看之字似補作平看則不覺向日則見之令喚州官集索一甕水令琛投書於水中字一一解㪚琛叩頭伏罪敕令決一百然後斬之賞楚金絹百匹出朝野僉載董行成懐州河内縣董行成能䇿賊有一人從河陽長店盜行人驢一頭幷皮袋天欲曉至懐州行成至街中見之叱曰箇賊住即下驢來遂承伏人問何以知之行成曰此驢行急而汗非長行也見人則引韁逺過怯也以此知之捉送縣有頃驢主尋蹤至皆如其言出朝野僉載張鷟張鷟為河陽縣尉日有搆架人吕元偽作倉督馮忱書盜糶倉粟忱不認書元乃堅執不能定鷟取吕元告牒括兩頭唯留一字問是汝書即注是字不是即注非字元乃注曰非去括即是元牒且決五下又括詐馮忱書上一字以問之注曰是去括乃詐書也元連項赤叩頭伏罪又有一客驢韁㫁幷鞍失三日訪不獲告縣鷟推勘急夜放驢出而藏其鞍可直五千錢鷟曰此可知也令將却籠頭放之驢向舊餧處鷟令搜其家其鞍於草積下得之人伏其能出朝野僉載張松夀張松夀為長安令時昆明池側有刼殺奉敕十日内須獲賊如違所由科罪夀至行刼處尋蹤緒見一老婆於樹下賣食即以從騎䭾來入縣供以酒食經三日還以馬送舊坐處令一腹心人看有人共婆語即捉來須臾一人來問明府若為推逐即被布衫籠頭送縣一問具承幷贓並獲時人以為神明出朝野僉載蘇無名天后時嘗賜太平公主細器寳物兩食合所直黄金千鎰公主納之藏中嵗餘取之盡為盜所將矣公主言之天后大怒召洛州長史謂曰三日不得盜罪長史懼謂兩縣主盜官曰兩日不得賊死尉謂吏卒游徼曰一日必擒之擒不得先死吏卒游徼懼計無所出衢中遇湖州别駕蘇無名相與請之至縣游徼白尉得盜物者來矣無名遽進至階尉迎問故無名曰吾湖州别駕也入計在兹尉呼吏卒何誣辱别駕無名笑曰君無怒吏卒抑有由也無名厯官所在擒姦擿伏有名每偷至無名前無得過者此輩應先聞故將來庶解圍耳尉喜請其方無名曰與君至府君可先入白之尉白其故長史大悦降階執其手曰今日遇公却賜吾命請道其由無名曰請與君求見對玉階乃言之於是天后召之謂曰卿得賊乎無名曰若委臣取賊無拘日月且寛府縣令不追求仍以兩縣擒盜吏卒盡以付臣臣為陛下取之亦不出數十日耳天后許之無名戒吏卒緩則相聞月餘値寒食無名盡召吏卒約曰十人五人為侣於東門北門伺之見有胡人與黨十餘皆衣縗絰相隨出赴北邙者可踵之而報吏卒伺之果得馳白無名往視之問伺者諸胡何若伺者曰胡至一新塚設奠哭而不哀一撤奠即巡行塚旁相視而笑無名喜曰得之矣因使吏卒盡執諸胡而發其塚塚開割棺視之棺中盡寶物也奏之天后問無名卿何才智過人而得此盜對曰臣非有他計但識盜耳當臣到都之日即此胡出葬之時臣一見即知是偷但不知其葬物處今寒節拜掃計必出城尋其所之足知其墓賊既設奠而哭不哀明所葬非人也奠而哭畢巡塚相視而笑喜墓無損傷也向若陛下迫促府縣捕賊計急必取之而逃今者更不追求自然意緩故未將出天后曰善賜金帛加秩二等出紀聞趙涓永泰初禁中失火焚屋室數十間與東宫稍迫近代宗深驚疑之趙涓為巡使令即訊涓周立案驗乃上直中官遺火所致也推鞫明審頗盡事情代宗甚嘉賞焉徳宗在東宫常感涓之究理詳細及典衢州年老韓滉奏請免其官徳宗見其名謂宰相曰豈非永泰初御史趙涓乎對曰然即日拜尚書左丞出談賔錄袁滋李汧公勉鎭鳳翔有屬邑編甿因耨田得馬蹄金一甕漢書武帝詔云東岳見金文有白麟神馬之瑞宜以黄金鑄麟趾褭蹄金以叶瑞徴盖鑄金𧰼馬蹄之状其後民間多效之里民送於縣署公牒將置府庭宰邑者喜獲兹寶欲自以為殊績慮公藏主守不嚴因使寘於私室信宿於官吏重開視之則皆為塊矣甕金出土之際鄉社悉來觀驗遽為變更靡不驚駭以狀聞於府主議者僉云姦計換之遂遣理曹掾與軍吏數人就鞫其案於是獲金里社咸共證宰邑者為衆所擠擁沮莫能自由既而詰辱滋甚遂以易金伏罪詞欵具存未窮隐用之所令拘縶僕𨽻脅以刑辟或云藏於糞壌或云投於水中紛紜枉撓結成具司備獄以案上聞汧公覽之亦怒俄而因有宴停杯語及斯事列坐賔客咸共談謔或云倣齊人之攫或云有楊震之癖談笑移時以為胠篋穿窬無足訝也時袁相國滋亦在幕中俛首略無詞對李公目之數四曰宰邑者非判官懿親乎袁相曰與之無素李公曰聞彼之罪何不樂甚乎袁相曰甚疑此事未了便請為公詳之汧公曰換金之狀極明若言未了當别有所見非判官莫探情偽袁相曰諾因俾移獄於府中案問乃令閲甕間得二百五十餘塊詰其初獲者即本質存焉遂於列肆索金鎔寫與塊形相等既成始秤其半已及三百斤矣詢其負檐人力乃二農夫以竹舁至縣境計其金大數非二人以竹檐可舉明其即路之時金已化為土矣於是羣疑大豁宰邑者遂獲清雪汧公歎伏無已毎言才智不如其後履厯清途至徳宗朝為宰相愚常聞金寶藏於土中偶見者或變其質東都敦化坊有麟徳廢觀殿悉皆頹毁咸通中畢諴相國别令營造建基址間得巨甕皆貯白銀輦材者與工匠三四十人當晝懼為官中所取遂輦材木盖之以伺昏黑及夜各以衣服包裹而歸明旦開之如堅土削成為銀梃所説與此正同太平廣記卷一百七十一
