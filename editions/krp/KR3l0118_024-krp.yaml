body:
  text: 太平廣記卷二十四神仙二十四許宣平劉清真張殖蕭静之朱孺子許宣平許宣平新安歙人也唐睿宗景雲中隱於城陽山南塢結菴以居不知其服餌但見不食顔色若四十許人行如奔馬時或負薪以賣擔常掛一花瓠及曲竹杖每醉騰騰拄之以歸獨吟曰負薪朝出賣沽酒日西歸路人莫問歸何處穿入白雲行翠微爾來三十餘年或拯人懸危或救人疾苦城市人多訪之不見但覽庵壁題詩云隱居三十載石室南山巔静夜翫明月閒朝飲碧泉樵人歌壠上谷鳥戲巖前樂矣不知老都忘甲子年好事者多詠其詩有時行長安於驛路洛陽同華間傳舎是處題之天寳中李白自翰林出東遊經傳舎覽詩吟之嗟嘆曰此仙詩也乃詰之於人得宣平之實白於是遊及新安渉溪登山累訪之不得乃題其菴壁曰我吟傳舎詩來訪真人居煙嶺迷髙跡雲林隔太虛窺庭但蕭索倚柱空躊躇應化遼天鶴歸當千歳餘是冬野火燎其庵莫知宣平蹤跡百餘年後咸通七年郡人許明奴家有嫗常逐伴入山採樵獨於南山中見一人坐石上方食桃甚大問嫗曰汝許明奴家人也我明奴之祖宣平嫗言常聞已得仙矣曰汝歸為我語明奴言我在此山中與汝一桃食之不可將出山虎狼甚多山神惜此桃嫗乃食桃甚美頃之而盡宣平遣嫗隨樵人歸家言之明奴之族甚異之傳聞於郡人其後嫗却食日漸童顔輕徤愈常中和年已後兵荒相繼居人不安明奴徙家避難嫗入山不歸今人採樵或有見其嫗身衣藤葉行疾如飛逐之昇林木而去出續仙傳劉清眞唐天寳中有劉清真者與其徒二十人於夀州作茶人致一䭾為貨至陳留遇賊或有人導之令去魏郡清真等復往又遇一老僧導往五臺清真等畏其勞苦五臺寺尚逺因邀清真等還蘭若宿清真等私議疑老僧是文殊師利菩薩乃隨僧還行數里方至蘭若殿宇嚴浄悉懐敬肅僧為説法大啓方便清真等並發心出家隨其住持積二十餘年僧忽謂清真等曰有大魔起汝軰必罹其患宜先為之防不爾則當敗人法事因令清真等長跪僧乃含水遍噴口誦密法清真等悉變成石心甚了悟而不移動須臾之間代州吏卒數十人詣臺有所收捕至清真所居但見荒草及石乃各罷去日晚老僧又來以水噀清真等成人清真等悟其神靈知遇菩薩悉競精進後一月餘僧云今復將魔起必大索汝其如之何吾欲逺送汝汝俱往否清真等受教僧悉令閉目戒云第一無竊視敗若大事但覺至地即當開目若至山中見大樹宜共庇之樹有藥出亦宜哺之遂各與藥一丸云食此便不復饑但當思惟聖道為出世津梁也言訖作禮禮畢閉目冉冉上昇身在虛空可半日許足遂至地開目見大山林或遇樵者問其地號乃廬山也行十餘里見大藤樹周迴可五六圍翠隂蔽日清真等喜云大師所言竒樹必是此也各薙草而坐數日後樹出白菌鮮麗光澤恒飄飄而動衆相謂曰此即大師所云靈藥採共分食之中有一人紿而先食盡徒侣莫不愠怒詬責云違我大師之教然業已如是不能毆擊乆之忽失所在仰視在樹杪安坐清真等復云君以吞藥故能昇髙其人竟不下經七日通身生綠毛忽有鶴翺翔其上因謂十九人云我誠負汝然今已得道將捨汝謁帝於九天之上宜各自勉以成至真耳清真等邀其下樹執别仙者不顧遂乘雲上昇久久方滅清真等失藥因各散還人間中山張倫親聞清真等説云然耳出廣異記張殖張殖彭州導江人也遇道士姜𤣥辨以六丁驅役之術授之大歴中西川節度使崔寧嘗有密切之事差人走馬入奏發已三日忽於案上文籍之中見所奏表浄本猶在其函中所封乃表草耳計人馬之力不可復追憂惶不已莫知其計知殖術召而語之殖曰此易耳不足憂也乃炷香一爐以所寫浄表置香烟上忽然飛去食頃得所封表草墜於殖前及使回問之並不覺進表之時封題印署如故崔公深異之禮敬殊常問其所受道之由云某師姜𤣥辨至徳中於九龍觀捨力焚香數歳因拾得殘缺經四五紙是太上役使六丁法呪術備足乃𨕖深山幽谷無人跡處依法作壇持呪晝夜精勤本經云一十四日𤣥辨為九日而應忽有黑風暴雨驚駭於人視之雨下而壇塲不濕又有雷電霹靂亦不為驚懼良久見竒形異狀鬼神繞之亦不為畏須臾有鐵甲兵士數千金甲兵士數千噉噪而下亦不驚怖久之神兵行列如有所候即有天女著繡履繡衣大冠佩劒立問𤣥辨曰既有呼召有何所求𤣥辨以術數為請六丁兵仗一時隱去自此每日有一丁侍之凡所徴求無不立應以術授殖謂曰術之與道相須而行道非術無以自致術非道無以延長若得術而不得道亦如欲適萬里而足不行也術者雖萬端隱見未除死籙固當棲心妙域注念丹華立功以助其外鍊魄以存其内内外齊一然後可適道可以長存也峩眉山中神仙萬餘人自皇人統領置宫府分曹屬以度於人吾與汝觀道之纎芥未造其𤣥微龍蛇之交與汝入洞府朝真師庶可以講長生之㫖也師𤣥辨隱去二十餘歳此年龍蛇之交當隨師登峩眉入洞天不久往矣是年大厯十二年丁巳殖與𤣥辨隱去不復見出仙傳拾遺蕭静之蘭陵蕭静之舉進士不第性頗好道委書䇿絶粒鍊氣結廬漳水之上十餘年而顔貌枯悴齒髪凋落一旦引鏡而怒因遷居鄴下逐市人求什一之利數年而資用豐足乃置地葺居掘得一物𩔖人手肥而且潤其色微紅歎曰豈非太歳之神將為祟耶即烹而食之美既食盡逾月而齒髪再生力壯貌少而莫知其由也偶遊鄴都值一道士顧静之駭而言曰子神氣若是必嘗餌仙藥也求胗其脉焉乃曰子所食者肉芝也生於地𩔖人手肥潤而紅得食者夀同龜鶴矣然當深隱山林更期至道不可自混於臭濁之間静之如其言捨家雲水竟不知所之出神仙感遇傳朱孺子朱孺子永嘉安國人也幼而事道士王𤣥真居大箬巖深慕仙道常登山嶺採黄精服餌一日就溪濯𬞞忽見岸側有二小花犬相趂孺子異之乃尋逐入枸杞叢下歸語𤣥真訝之遂與孺子俱往伺之復見二犬戲躍逼之又入枸杞下𤣥真與孺子共尋掘乃得二枸杞根形狀如花犬堅若石洗挈歸以煮之而孺子益薪看火三日晝夜不離竈側試嘗汁味取喫不已及見根爛告𤣥真來共取始食之俄頃而孺子忽飛昇在前峰上𤣥真驚異久之孺子謝别𤣥真昇雲而去今俗呼其峰為童子峰𤣥真後餌其根盡不知年夀亦隱於巖之西陶山有採捕者時或見之出續神仙傳太平廣記卷二十四
