body:
  text: 太平廣記卷三百三十三宋李昉等編鬼十八黎陽客李㢠秀琅邪人崔咸季攸武徳縣田叟裴徽李陶長洲陸氏女刁緬王無有王昇髙生黎陽客開元中有士人家貧投丐河朔所抵無應者轉至黎陽日已暮而前程尚遥忽見路傍一門宅宇甚壯夜將投宿乃前扣門良久奴方出客曰日暮前路不可及輙寄外舍可乎奴曰請白郎君乃入須臾聞曵履聲及出乃衣冠美丈夫姿度閑逺昻然秀異命延客與相拜謁曰行李得無苦辛有弊廬不足辱長者客竊怪其異且欲審察之乃俱就館頗能清論説齊周已來了了皆如目見客問名曰我潁川荀季和先人因官遂居此焉命設酒殽皆精潔而不甚有味有頃命具榻舍中邀客入仍敇一婢侍宿客候婢欵狎乃問曰郎君今為何官曰見為河公主簿慎勿説也俄聞外有呌呼受痛之聲乃竊於忩中窺之見主人據胡牀列燈燭前有一人被髪裸形左右呼羣鳥喙其目流血至地主人色甚怒曰更敢暴我乎客謂曰何人也曰何須强知他事固問之曰黎陽令也好射獵數逐獸犯吾垣墻以此受治也客竊記之明旦顧視乃大塚也前問人云是荀使君墓至黎陽令果辭以目疾客曰能療之令喜乃召入具為説之令曰信有之乃暗令鄉正具薪數萬束積於垣側一日令率羣吏縱火焚之遂易其墓目即愈厚以謝客而不告也後客還至其處見一人頭面燋爛身衣敗絮蹲於榛棘中直前詣客不識也曰君頗憶前寄宿否客乃驚曰何至此耶曰前為令所苦然亦知非君本意吾自運窮耳客甚愧悔之為設薄酹焚其故衣以贈之鬼忻受遂去出廣異記李㢠秀尚書李㢠秀素與清禪寺僧靈貞厚善㢠秀卒數年靈貞忽見兩吏齎符追之遂逼促就路奄然而卒前至一處若官曹中須臾延謁一人朱衣銀章靈貞自疑命當未死朱衣曰弟子誤相追闍棃當還命敕前吏送去欲取舊路吏曰此乃不可徃當别取北路耳乃別北行路甚荒塞靈頗不懌可行數十里又至一府城府甚麗門吏前呵云可方便見將軍即引入見一人紫衣據㕔事年貌與李公相𩔖謂曰貞公那得逺來靈貞乃知正是因延升階叙及平舊臨别握手曰欲與闍棃論及家事所不忍言遂忽見淚下靈貞固請之乃曰弟子血祀將絶無復奈何可報季友等四時享奠勤致豐潔兼為寫法華經一部是所望也即揮涕訣靈貞遂蘇具以所見告諸子及季友素有至性乃為設齋及寫經唯齋損獨怒曰妖僧妄誕欲誣玷先靈耳其後竟與權梁山等謀反伏誅兄弟流竄竟無種嗣矣岀廣異記琅邪人琅邪有人行過任城暮宿郭外主人相見甚歡為設雜菓客探取懐中犀靶小刀子將以割梨主人色變遂奄然而逝所見乃冢中物也客甚懼然亦以此刀自䕶且視冢傍有一穴日照其中頗明見棺櫬已腐敗菓盤乃樹葉貯焉客匍匐得岀問左右人無識此冢者出廣異記崔咸博陵崔咸少習静家于相州居常葺理園林獨在齋中夜雷雨後忽有一女子年十六七踰垣而入擁之入室問其所從來而終無言咸疑其遁者乃深蔵之將旦而斃咸驚懼未敢發乃出於里内占其失女家須臾有奴婢六七人䘮服行語若有尋求者相與語曰死尚逸况生乎咸從而問之對曰郎君何用問固問之乃曰吾舍小娘子亡來三日昨夜方歛被雷震尸起岀忽不知所向咸問其形容衣服皆是宵遁者乃具昨夜之狀引至家驗之果是其尸衣裳足履皆泥汚其家大異之歸將葬其尸重不可致咸乃奠酒祝語之乃去時天寶元年六月岀通幽記季攸天寶初㑹稽主簿季攸有女二人及㩦外甥孤女之官有求之者則嫁己女己女盡而不及甥甥恨之因含怨而死殯之東郊經數月所給主簿市胥吏姓楊大族子也家甚富貌且美其家忽有失胥推尋不得意其為魅所惑也則於墟墓訪之時大雪而女殯室有衣裾岀胥家人引之則聞屋内胥呌聲而殯宫中甚完不知從何入遽告主簿主簿使發其棺女在棺中與胥同寢女貌如生其家乃岀胥復修殯屋胥既岀如愚數日方愈女則不直於主簿曰吾恨舅不嫁惟憐己女不知有吾故氣結死今神道使吾嫁與市吏故輒引與之同衾既此邑已知理須見嫁後月一日可合婚姻惟舅不以胥吏見期而違神道請即知聞受其所聘仍待以女壻禮至月一日當其飲食吾迎楊郎望伏所請焉主簿驚歎乃召胥一問為楊胥於是納錢數萬其父母皆㑹焉攸乃為外甥女造作衣裳帷帳至月一日又造饌大㑹楊氏鬼又言曰䝉恩許嫁不勝其喜今日故此親迎楊郎言畢胥暴卒乃設冥婚禮厚加棺歛合葬於東郊岀紀聞武徳縣田叟武徳縣酒封村田叟日晚將徃河内府南視女家禮事出村有二人隨之與叟言謂叟曰吾徃河南府北喜翁相隨及至路而二人不肯去叟視之非凡乃下驢謂之曰吾與汝非舊相識在途相逢吾觀汝指顧非吉人也汝姑行吾從此南出汝若隨吾吾有返而已不能偕矣二人曰慕老父徳故此陪隨如不願俱請從此逝翁何怒也方酬答適㑹田叟隣舍子自東來問叟何為叟具以告隣舍子告二人老父不願與君俱可東去從老父南行君何須相絆也二人曰諾因東去叟遂南隣舍子亦西還到家未幾聞老父家驚呌隣舍子問之叟男曰父徃女家計今適到而所乗驢乃却來何謂也隣舍子乃告以田叟逢二人狀因與叟男尋之至與二人言處叟死溝中而衣服甚完無損傷乃知二人取叟之鬼也出記聞裴徽河東裴徽河南令迴之兄子也天寶中曾獨歩行莊側途中見一婦人容色殊麗瞻靚艷佚久之徽問何以獨行答云適婢等有少交易遲遲不來故岀伺之徽有才思以艶詞相調婦人初不易色亦獻酬數四前至其家邀徽相過室宇宏麗入門後聞老婢怒云女子何故令他人來名敎中寧有此事女辭門有賢客家人問者甚衆有頃老婢岀門徽辭謝舉動深有士風須臾張燈施幕邀徽入坐侍數人各美色香氣芬馥進止甚閑尋令小娘子岀云裴郎何須相避婦人岀不復入徽竊見室中甚囂設綺帳錦茵如欲嫁者獨心喜欲留㑹腹脹起凑厠所持古劒可以避惡厠畢取裹劒紙忽見劒光粲然執之欲迴不復見室宇人物顧視在孤墓上叢棘中因大號呌家人識徽持燭尋之去莊百餘歩瞪視不能言久之方悟爾出廣異記李陶天寳中隴西李陶寓居新鄭常寢其室睡中有人搖之陶驚起見一婢袍袴容色甚美陶問那忽得至此婢云鄭女郎欲相詣頃之異香芬馥有美女從西北陬壁中岀至牀所再拜陶知是鬼初不交語婦人慙怍却退婢慢罵數四云田舍郎待人故如是耶令我女郎愧恥無量陶悦其美色亦心訝之因紿云女郎何在吾本未見可更呼之婢云來又云女郎重君舊縁且將復至忽復如初可以慇懃也及至陶下牀致敬延止偶坐須臾相近女郎貌既絶代陶深悦之留連十餘日陶母躬自窺覘累使左右呼陶陶恐阻已志亦終不出婦云大家召君何以不徃得無坐罪於我陶乃詣母母流涕謂陶曰汝承人昭穆乃有鬼婦乎陶云改之自爾留連半歳不去其後陶參選之上都留婦在房陶後遇疾篤鬼婦在房謂其婢云李郎今疾亟為之奈何當相與徃省問至潼關為鬼關司所遏不得過者數日㑹陶堂兄亦赴選入鬼關得隨過其夕至陶所相見忻悦陶問何得至此云見卿疾甚故此相視素所持藥因和以飲陶陶疾尋愈其年選得臨津尉與婦同衆至舍數日當之官鬼辭不行問其故云相與縁盡不得復去言别悽愴自此遂絶出廣異記長洲陸氏女長洲縣丞陸某家素貧三月三日家人悉遊虎丘寺女年十五六以無衣不得徃獨與一婢守舍父母既行慨歎投井而死父母以是為憾悲泣數日乃權殯長洲縣後一歳許有陸某者曾省其姑姑家與女殯同路經殯宫過有小婢隨後云女郎欲暫相見某不得已隨至其家家門卑小女郎靚粧容色婉麗問云君得非長洲百姓耶我是陸丞女非人鬼耳欲請君𫝊語與贊府今臨頓李十八求婚吾是室女義難自嫁可與白大人若許為婚當𫝊語至此其人尚留殯宫中少時當州坊正從殯宫邊過見有衣帶岀外視之見婦人以白丞丞自徃使開壁取某置之㕔上數日能言問焉得至彼某以女言對丞歎息尋令人問臨頓李十八果有之而無恙自若初不為信後數日乃病病數日卒舉家歎恨竟將女與李子為㝠婚出廣異記刁緬宣城太守刁緬本以武進初為玉門軍使有厠神形見外厩形如大猪遍體皆有眼岀入溷中遊行院内緬時不在官吏兵卒見者千餘人如是數日緬歸祭以祈福厠神乃滅緬旬日遷伊州刺史又改左衞率右驍衞將軍右羽林將軍遂貴矣出紀聞王無有楚邱主簿王無有新娶妻美而妬無有疾將如厠而難獨行欲與侍婢俱妻不可無有至厠於垣穴中見人背坐色黑且壯無有以為役夫不之怪也頃之此人迴顧深目巨鼻虎口烏爪謂無有曰盍與子鞋無有驚未及應怪自穴引手直取其鞋口咀之鞋中血見如食肉狀遂盡之無有恐先告其妻且尤之曰僕有疾如厠雖一婢相送君適固拒果遇妖怪奈何婦猶不信乃同觀之無有坐厠怪又見奪餘一鞋咀之妻恐扶無有還他日無有至後院怪又見語無有曰吾歸汝鞋因投其傍鞋並無傷無有請巫解奏鬼復謂巫王主簿禄盡餘百日壽不速歸死於此無有遂歸鄉如期而卒出紀聞王昇吳郡陸望寄居河内表弟王昇與望居相近晨謁望行至莊南故村人楊侃宅籬間忽見兩手據厠大耳深目虎鼻猪牙面色紫而斒斕直視於昇懼而走見望言之望曰吾聞見厠神無不立死汝其勉之昇意大惡及還即死岀紀聞髙生天寶中有渤海髙生者亡其名病熱而瘠其臆痛不可忍召醫視之醫曰有鬼在臆中藥可以及於是煑藥而飲之忽覺臆中動搖有頃吐涎斗餘其中凝固不可解以刀剖之有一人涎中起初甚么麽俄長數尺髙生欲苦之其人趨出降階遽不見自是疾間出宣室志太平廣記卷三百三十三
