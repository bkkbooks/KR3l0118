body:
  text: 太平廣記卷二百四樂二大酺梨園樂太眞妃天寶樂章韋臯于頔文宗沈阿翹懿宗王令言寜王獻王仁裕歌秦青韓娥戚夫人李龜年李衮韓㑹米嘉榮笛昭華管唐𤣥宗漢中王瑀李謩許雲封吕鄉筠觱篥李蔚樂二大酺唐𤣥宗在東洛大酺於五鳳樓下命三百里内縣令刺史率其聲樂來赴闕者或謂令較其勝負而賞罰焉時河内郡守令樂工數百人於車上皆衣以錦繡伏廂之牛蒙以虎皮及為犀象形状觀者駭目時元魯山遣樂工數十人聨袂歌于蒍于蒍魯山之文也𤣥宗聞而異之徵其詞乃歎曰賢人之言也其後上謂宰臣曰河内之人其在塗炭乎促命徵還而授以散秩毎賜宴設酺㑹則上御勤政樓金吾及四軍兵士未明陳仗盛列旗幟皆被黄金甲衣短後繡袍太常陳樂衛尉張幕後諸蕃酋長就食府縣教坊大陳山車旱船尋撞走索丸劍角抵戲馬闘雞又令宮女數百飾以珠翠衣以錦繡自帷中出擊雷鼓為破陣樂太平樂上元樂又引大象犀牛入場或拜舞動中音律毎正月望夜又御勤政樓觀作樂貴臣戚里官設㸔樓夜䦨即遣宮女於樓前歌舞以娛之出明皇雜錄梨園樂天寶中𤣥宗命宫女數百人為梨園弟子皆居宜春北院上素曉音律時有馬仙期李龜年賀懐智皆洞知律度安禄山自范陽入覲亦獻白玉簫管數百事皆陳於梨園自是音響殆不𩔖人間出譚賓録太眞妃太眞妃多曲藝最善擊磬拊搏之音玲玲然多新聲雖太常梨園之能人莫能加也𤣥宗令採藍田綠玉琢為磬尚方造簨簴流蘇之屬皆以金鈿珠翠珍怪之物雜飾之又鑄金為二獅子拏攫騰奮之状各重二百餘斤以為趺其他綵繪縟麗製作精妙一時無比也及上幸蜀回京師樂噐多亡失獨玉磬偶在上顧之悽然不忍置於前促令載送太常寺至今藏於太樂署正聲庫者是也出開天𫝊信記天寶樂章天寶中樂章多以邉地為名若涼州甘州伊州之𩔖是焉其曲遍繫聲名入破後其地盡為西蕃所没破乃其兆矣出傳載録韋臯韋臯鎭西川進奉聖樂曲兼與舞人曲譜同進到京於留邸按閲教坊數人潛窺因得先進出盧氏雜説于頔于司空頔因韋太尉奉聖樂亦撰順聖樂以進毎宴必使奏之其曲將半行綴皆伏而一人舞於中央幕客韋緩笑曰何用窮兵獨舞雖詼諧亦各有為也頔又令女妓為佾舞雄健壮妙號孫武順聖樂出國史補文宗文宗善吹小管時法師文溆為入内大德一日得罪流之弟子入内收拾院中籍入家具輩猶作法師講聲上採其聲為曲子號文溆子出盧氏雜説沈阿翹文宗時有宮人沈阿翹為上舞河滿子聲詞風態率皆宛暢曲罷上賜金臂環即問其從來阿翹曰妾夲吳元濟之妓元濟敗因以聲得為宮娥遂自進白玉方響云夲吳元濟所有也光明潔泠可照十數歩言其槌即犀也凡物有聲乃響其中焉架則云檀香也而文彩若雲霞之状芬馥著人則彌月不散製度精妙故非中國所有上因令阿翹奏凉州曲音韻清越聼者無不愴然上謂之曰天上樂仍𨕖内人與阿翹為弟子出杜陽雜編懿宗懿宗一日召樂工上方奏樂為道調弄上遂拍之故樂工依其節奏曲子名道調子十宅諸王多解音聲倡優雜戲皆有之以備上幸其院迎駕作樂禁中呼為音聲郎君出盧氏雜説王令言隋煬帝幸江都時樂工王令言子自内歸令言問其子今日所進曲子何曰安公子令言命其子奏之曰汝不須隨駕去此曲子無宮聲上必不廻果如其言出盧氏雜説寜王獻西涼州俗好音樂製新曲曰涼州開元中列上獻之上召諸王於便殿同觀焉曲江諸王拜賀蹈舞稱善獨寜王不拜上顧問之寜王進曰此曲雖佳臣有所聞焉夫音也始之於宮散之於商成之於角徵羽莫不根蔕而襲於宮商也斯曲也宮離而少徵商亂而加暴臣聞宮君也商臣也宮不勝則君勢卑商有餘則臣事僣卑則逼下僣則犯上發於忽㣲形於音聲播之於詠歌見之於人事臣恐異日有播越之禍悖逼之患莫不兆於斯曲也上聞之黙然及安史亂作華夏鼎沸所以見寜王審音之妙也出開天傳信記王仁裕後唐清泰之初王仁裕從事梁苑時范公延光師之春正月郊野尚寒引諸幕寮餞朝客于折栁亭樂則於羽而響鐵獨有宮聲洎將慘執竟不諧和王獨訝之私謂戎判李大夫式管記唐員外獻曰今日必有譸張之事蓋樂音不和今諸音舉羽而獨扣金有宮聲且羽為水宮為土水土相剋得無憂乎于時筵散朝客西歸范公引賓客紲鷹犬獵于王婆店北為奔馬所墜不救于荒陂自辰巳至午後絶而復蘇樂音先知良可騐矣出玉堂閒話歌秦青韓娥薛談學謳於秦青未窮青之技自謂盡之遂辭去歸秦青弗止餞於郊衢撫節悲歌聲振林木響遏行雲談謝求返終身不敢言歸秦青顧謂其友曰昔韓娥東之齊匱糧過雍門鬻歌假食既去而餘音繞梁三日不絶左右以其人弗去過逆旅旅人辱之韓娥因曼聲哀哭一里老幼悲愁涕泣相對三日不食遽追而謝之娥復曼聲長歌一里老幼歡喜抃舞弗能自禁乃厚賂而遣之故雍門之人至今善歌善哭效娥之遺聲也出愽物志戚夫人漢戚夫人善為翹袖拆腰之舞歌出塞入塞望歸之曲侍婢數百人皆為之後宮齊唱常入雲霄出西京雜記李龜年唐開元中樂工李龜年彭年鶴年兄弟三人皆有才學盛名彭年善舞鶴年龜年能歌尤妙製渭川特承顧遇於東都大起第宅僣侈之制踰於公侯宅在東都通遠里中堂制度甲於都下今裵晉公移於定鼎門南别墅號緑野堂其後龜年流落江南毎遇良辰勝賞為人歌數闋座中聞之莫不掩泣罷酒則杜甫嘗贈詩所謂岐王宅裏尋常見崔九堂前幾度聞正値江南好風景落花時節又逢君崔九堂殿中監崔滌中書令湜之弟也出明皇雜録又開元中禁中初重木芍藥即今牡丹也開元天寶花木記云禁中呼木芍藥為牡丹得四夲紅紫淺紅通白者上因移植於興慶池東沈香亭前㑹花方繁開上乘照夜白太眞妃以歩輦從詔特𨕖梨園弟子中尤者得樂十六部李龜年以歌擅一時之名手捧檀板押衆樂前將歌之上曰賞名花對妃子焉用舊樂詞為遂命龜年持金花牋宣賜李白立進清平調辭三章白欣然承旨猶苦宿酲未解因援筆賦之辭曰雲想衣裳花想容春風曉拂露華濃若非羣玉山頭見㑹向瑶臺月下逢一枝紅艶露凝香雲雨巫山枉斷腸借問漢宮誰得似可憐飛燕倚新粧名花傾國兩相歡長得君王帶笑㸔解釋春風無限恨沉香亭北倚欄杆龜年遽以辭進上命棃園弟子約略調撫絲竹遂促龜年以歌太眞妃持玻瓈七寶盞酌西涼州蒲桃酒笑領歌意甚厚上因調玉笛以倚曲毎曲遍將換則遲其聲以媚之太眞飲罷斂繡巾重拜上龜年常語於五王獨憶以歌得自勝者無出於此抑亦一時之極致耳上自是顧李翰林尤異於他學士㑹髙力士終以脱鞾為深耻異日太眞妃重吟前詞力士戲曰此為妃子怨李白深入骨髓何反拳拳如是太眞因驚曰何翰林學士能辱人如斯力士曰以飛鷰指妃子是賤之甚矣太真頗深然之上嘗三欲命李白官卒為宮中所捍而止出松牕録李衮李衮善歌於江外名動京師崔昭入朝密載而至乃邀賓客請第一部樂及京邑之名倡以為盛㑹昭言有表弟請登末座令衮敝衣而出滿座嗤笑之少頃命酒昭曰請表弟歌座中又笑及喉囀一聲樂人皆大驚曰是李八郎也羅拜之出國史補韓㑹韓㑹善歌絶妙名輩號為四䕫㑹為䕫頭出國史補米嘉榮歌曲之妙其來久矣元和中國樂有米嘉榮何戡近有陳不嫌不嫌子意奴一二十年來絶不聞善唱盛以拍彈行於世拍彈起於李可久懿宗朝恩澤曲子别趙十哭趙十之名劉尚書禹錫與米嘉榮詩云三朝供奉米嘉榮能變新聲作舊聲于今後軰輕前輩好染髭鬚事後生又自貶所歸京聞何戡歌曰二十年來别帝京重聞天樂不勝情舊人唯有何戡在更請殷勤唱渭城出盧氏雜説笛昭華管秦咸陽宮有玉笛長二尺三寸二十六孔吹之則見車馬山林隱隱相次息亦不見名曰昭華之管出西京雜記唐𤣥宗𤣥宗嘗坐朝時以手指上下按其腹朝退髙力士進曰陛下向來數以手指按其腹豈非聖體小不安耶元宗曰非也吾昨夜夢遊月宮諸仙娛余以上清之樂流亮清越殆非人所聞也酣醉久之合奏清樂以送吾歸其曲淒楚動人杳杳在耳吾向以玉笛尋盡得矣坐朝之際慮或遺忘故懐玉笛時以上下尋之非不安也力士再拜賀曰非常之事也願陛下為臣一奏之上試奏其音寥寥然不可名也力士又奏拜且請其名上笑曰此曲名紫雲廻載於樂章今太常刻石在焉出開天傳信記漢中王瑀漢中王瑀為太卿早起朝聞永興里人吹笛問是太常樂人否曰然已後因閲樂而喚之問曰何得某日卧吹笛耶出傳記李謩李舟好事嘗得村舍烟竹截為笛堅如鐵石以遺李謩謩吹笛天下第一月夜泛江與同舟人吹寥亮逸發俄有客於岸呼舟請載既至請笛而吹甚為精妙山石可裂謩平生未嘗見及入破呼吸盤擗應指粉碎客散不知所之舟人著記疑其蛟龍也謩嘗秋夜吹笛於𤓰洲檝載甚隘初發調羣動皆息及數奏㣲風颯然立至有頃舟人賈客有怨歎悲泣之聲出國史補又謩開元中吹笛為第一部近代無比有故自教坊請假至越州公私更醼以觀其妙時州客舉進士者十人皆有資業乃醵二千文同㑹鏡湖欲邀李生湖上吹之想其風韻尤敬人神以費多人少遂相約各召一客㑹中有一人以日晚方記得不遑他請其鄰居有獨孤生者年老久處田野人事不知茅屋數間嘗呼為獨孤丈至是遂以應命到㑹所澄波萬頃景物皆竒李生拂笛漸移舟於湖心時輕雲蒙籠㣲風拂浪波瀾陡起李生捧笛其聲始發之後昬曀齊開水木森然髣髴如有鬼神之來坐客皆更贊詠之以為鈞天之樂不如也獨孤生乃無一言㑹者皆怒李生為輕己意甚忿之良久又静思作一曲更加妙絶無不賞駭獨孤生又無言鄰居召至者甚慚悔白於衆曰獨孤村落幽處城郭稀至音樂之𩔖率所不通㑹客同誚責之獨孤生不答但㣲笑而已李生曰公如是是輕薄為復是好手獨孤生乃徐曰公安知僕不㑹也坐客皆為李生改容謝之獨孤曰公試吹涼州至曲終獨孤生曰公亦甚能妙然聲調雜夷樂得無有龜兹之侶乎李生大駭起拜曰丈人神絶某亦不自知夲師實龜兹人也又曰第十二叠誤入水調足下知之乎李生曰某頑蒙實不覺獨孤生乃取吹之李生更有一笛拂拭以進獨孤視之曰此都不堪取執者粗通耳乃換之曰此至入破必裂得無恡惜否李生曰不敢遂吹聲發入雲四座震慄李生蹙踖不敢動至第十三叠掲示謬誤之處敬伏將拜及入破笛遂敗裂不復終曲李生再拜衆皆帖息乃散明旦李生并㑹客皆往候之至則唯茅舍尚存獨孤生不見矣越人知者皆訪之竟不知其所去出逸史許雲封許雲封樂工之笛者貞元初韋應物自蘭臺郎出為和州牧非所宜願頗不得志輕舟東下夜泊靈璧驛時雲天初瑩秋露凝冷舟中吟瓢將以屬詞忽聞雲封笛聲嗟歎良久韋公洞曉音律謂其笛聲酷似天寶中棃園法曲李謩所吹者遂召雲封問之乃是李謩外孫也雲封曰某任城舊土多年不歸天寶改元初生一月時東封廻駕次至任城外祖聞某初生相見甚喜乃抱詣李白學士乞撰令名李公方坐旗亭高聲命酒當壚賀蘭氏年且九十餘邀李置飲於樓上外祖送酒李公握管醉書某胸前曰𣗳下彼何人不語眞吾好語若及日中烟霏謝成寶外祖辭曰夲於李氏乞名今不解所書之語李公曰此即名在其間也𣗳下人是木子木子李字也不語是莫言莫言謩也好是女子女子外孫也語及日中是言午言午是許也烟霏謝成寶是雲出封中乃是雲封也即李謩外孫許雲封也後遂名之某纔始十年身便孤立因乘義馬西入長安外祖憫以遠來令齒諸舅學業謂某性知音律教以横笛毎一曲成必撫背賞歎値棃園法部置小部音聲凡三十餘人皆十五以下天寶十四載六月日時驪山駐蹕是貴妃誕辰上命小部音聲樂長生殿仍奏新曲未有名㑹南海進荔枝因以曲名荔枝香左右歡呼聲動山谷其年安禄山叛車駕還京自後俱逢離亂漂流南海近四十載今者近訪諸親將抵龍丘韋公曰我有乳母之子其名千金嘗於天寶中受笛李供奉藝成身死毎所悲嗟舊吹之笛即李君所賜也遂囊出舊笛雲封跪捧悲切撫而觀之曰信是佳笛但非外祖所吹者乃為韋公曰竹生雲夢之南鑒在柯亭之下以今年七月望前生明年七月望前伐過期不伐則其音窒未期而伐則其音浮浮者外澤中乾乾者受氣不全氣不全則其竹夭凡發揚一聲出入九息古之至音者一叠十二節一節十二敲今之名樂也至如落梅流韻感金谷之遊人折栁傳情悲玉關之戍客誠為清響但異至音無以降神而祈福也其已夭之竹遇至音必破所以知非外祖所吹者韋公曰欲旌汝鑒笛破無傷雲封乃捧笛吹六州遍一叠未盡騞然中裂韋公驚歎久之遂禮雲封於曲部出甘澤謡吕鄉筠洞庭賈客吕鄉筠常以貨殖販江西雜貨逐什一之利利外有羡即施貧親戚次及貧人更無餘貯善吹笛毎遇好山水無不維舟探討吹笛而去嘗於中春月夜泊於君山側命罇酒獨飲飲一杯而吹笛數曲忽見波上有漁舟而來者漸近乃一老父鬢眉皤然去就異常鄉筠置笛起立迎上舟老父維漁舟於鄉筠舟而上各問所宜老父曰聞君笛聲嘹亮曲調非常我是以來鄉筠飲之數盃老父曰老人少業笛子可教乎鄉筠素所躭味起拜願為末學老父遂於懐䄂間出笛三管其一大如合拱其次大如常人之蓄者其一絶小如細筆管鄉筠復拜請老父一吹老父曰其大者不可發次者亦然其小者為子吹一曲不知得終否鄉筠曰願聞其不可發者老父曰其第一者在諸天對諸上帝或元君或上元夫人合上天之樂而吹之若於人間吹之人消地拆日月無光五星失次山岳崩圯不暇言其餘也第二者對諸洞府仙人蓬萊姑射昆邱王母及諸眞君等合仙樂而吹之若人間吹之飛沙走石翔鳥墜地走獸腦裂五星内錯稚幼振死人民纏路不暇言餘也其小者是老身與朋儕可樂者庶𩔖雜而聼之吹的不安未知可終曲否言畢抽笛吹三聲湖上風動波濤沆瀁魚鼈跳噴鄉筠及童僕恐聳讋慄五聲六聲君山上鳥獸呌噪月色昏昧舟檝大恐老父遂止引滿數盃乃吟曰湘中老人讀黄老手援紫藟坐翠草春至不知湘水深日暮忘却巴陵道又飲數盃謂鄉筠曰明年社與君期於此遂棹漁舟而去隱隱漸沒於波間至明年秋鄉筠十旬於君山伺之終不復見也出愽異志觱篥李蔚咸通中丞相李蔚拜端揆日自大梁移鎭淮海政績日聞未朞周榮加水土移風易俗甚洽羣情洎彭門亂常之後藩鎭瘡痍未平公按轡恭已而治之補綴穨毁整葺壊綱功無虗日以其郡寡勝遊之地且風亭月觀既以荒涼花圃釣臺未惬深旨一旦命於戲馬亭西連玉鉤斜道開剏池沼搆葺亭臺揮斤既畢號曰賞心栽培花木蓄養遠方竒禽異畜畢萃其所芳春九旬居人士女得以遊觀一旦聞浙右小挍薛陽陶監押度支運米入城公喜其姓名有同曩日朱崖李相左右者遂令試詢之果是舊人矣公甚喜如獲古物乃命衙庭小將代押運糧留止别館一日公召陽陶遊詢其所聞及往日蘆管之事薛因獻朱崖李相陸暢元白所撰歌一軸公益喜之次出蘆管於茲亭奏之其管絶㣲毎於一觱篥中常容三管也聲如天際自然而來情思寛閑公大加賞之亦贈其詩不記終篇云虗心纎質雁銜餘鳳吹龍吟定不如於是錫賚甚豐出其二子皆授牢盆倅職初公搆池亭畢未有嘉名因目曰賞心諸從事以公近諱蓋賞字有尚字也公曰宣父言徵不言在言在不言徵且非内官宮妾何避其疑哉遂不改作其亭自秦畢亂逆乃為芻豢之地嗟乎公孫𢎞之東閣劉屈釐後為馬廐亦何異哉出桂苑叢譚太平廣記卷二百四
