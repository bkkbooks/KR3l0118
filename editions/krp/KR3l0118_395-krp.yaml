  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_395-1a, image: WYG1045/WYG1045-0778a.png}
body:
  text: 太平廣記卷三百九十五宋李昉等編雷三百丈泓楊詢美從子髙郵人王忠政史無畏張應天公壇申文緯法門寺陳絢彭城佛寺歐陽氏廬山賣油者李誠茅山牛番禺村女江西村嫗甘露寺南康縣百丈泓唐河東郡東南百餘里有積水謂之百丈泓清澈纎毫必鑒在驛路之左槐栁環擁烟影如束途出於此者乃為憩駕之所大和五年夏有徐生自洛陽抵河東至此水困殆既甚而暫息且吟且望將午忽聞水中有細聲若蠅蚋之噪俄而纎光發其音稍響輷若擊轂其光如索而曳焉生始異之聲久益繁遂有雷自波間起震光為電接雲氣至旅次遽話其事答曰此百丈泓也嵗旱未嘗不指期而雨今旱且甚巫師命巫屬禱焉巫者曰某日當有甚雨果是日矣出宣室志楊詢美從子唐御史楊詢美居廣陵郡從子數人皆幼始從師學嘗一夕風雨雷電震耀諸子俱出户望且笑且詈曰我聞雷有鬼不知鬼安在願得而殺之可乎既而雷聲愈震林木傾靡忽一聲轟然若在於廡諸子驚甚即馳入户負壁而立不敢輒動復聞雷聲若天呵地吼廬舎揺動諸子益懼近食頃雷電方息天月清霽庭有大古槐擊拔其根而劈之諸子覺兩髀痛不可忍具告詢美家僮執燭視之諸髀咸有赤文横布十數状𩔖杖痕似雷鬼之所為也出宣室志髙郵人唐進士鄭翬家在髙郵親表盧氏荘近水鄰人數家共殺一白虵未久忽大震雷雨發數家陷溺無遺盧宅當中唯一家無恙出因話録王忠政唐泗州門監王忠政云開城中曾死十二日却活始見一人碧衣赤幘引臂登雲曰天召汝行汝𨽻於左落隊其左右落隊各有五萬甲馬簇於雲頭俯向下重樓深室嚢櫃之内纎細悉見更異者見米粒長數尺凡兩隊一隊於小項缾子貯人間水一隊所貯如馬牙硝謂之乾雨皆在前風車為殿毎雷震多為促龍龍有過者謫作虵魚數滿千則能淪山行雨時先下一黄旗次下四方旗乃隨龍所在或霆或雷或雨或雹若吾傷一物則刑以鐵杖忠政役十一日始服湯三甌不復飢困以母老哀求得歸出唐年小録史無畏唐史無畏曹州人也與張從真為友無畏止耕壠畆衣食窘困從真家富乃為曰弟勤苦田園日夕區區奉假千緡貨易他日但歸吾本無畏忻然齎緡父子江淮射利不數嵗已富從真繼邅焚爇及罹刼盗生計一空遂詣無畏曰今日之困不思弟千緡之報可相濟三二百乎聞從真言輒為拒扞報曰若言有負但執券来從真怨恨填臆乃歸庭中焚香泣淚詛之言詞慷慨聞者戰慓午後東西有片黑雲驟起須臾霔雨雷電兼至霹靂一震無畏遽變為牛朱書腹下云負心人史無畏經旬而卒刺史圖其事而奉奏焉出㑹昌解頥録張應唐張應自榮陽𬒳命至河内郡涉九鼎渡所乗小駟驚逸及北岸視後足有物縈繞状如大螾絳色乃抽佩刀斷於地輒復相續堅縮如白角櫛紅影若縷横絡之遂寘諸嚢中事畢而還復渡河至平隂天景歊蒸憩于園井就之盥濯因與園叟話之取角櫛置盆水上忽然黑氣勃興濃雲四合狂電震霆雨雹交下食頃方霽盆涸而櫛已亡出三水小牘天公壇巴蜀間於高山頂或潔地建天公壇祈水旱蓋開元中上帝所降儀法以示人也其壇或羊牛所犯及預齋者飲酒食肉多為震死新繁人王蕘因往别業村民烹豚待之有一人自天公齋㢠廻乃即席食肉王謂曰爾不懼雷霆耶曰我與雷為兄弟何懼之有王異之乃詰其所謂曰我受雷公籙與雷同職因取其籙驗之果如其説仍有數卷或畫壮夫以拳扠地為井號拳扠井或畫一士負薪枿號一谷柴或以七手撮三簸之號七山簸江陵東村李道士舎亦有此籙或云三洞法籙外有一百二法為天師子嗣師所禁唯許救物茍邪用必上帝考責隂誅也出北夢瑣言申文緯尉氏尉申文緯嘗話頃以事至洛城南玉泉寺時盛夏寺左有池大旱村人祈禱未嘗不應池之陽有龍廟時文緯俯池而觀有物如敗花葉大如蓋因以瓦礫擲之僧曰切不可恐致風雷之怒申亦不以介意逡巡白霧自水面起才及山趾寺在山上石路七盤大雨霆電震擊北至平地已數尺溪壑暴漲驢乗洎僕夫随流漂蕩莫能植足晝日如暮霆震不已申之口吻皆黒怖懼非常俄至一村尋亦開霽果中傷寒病將曉有微汗比明無恙豈龍之怒幾為所斃也出玉堂閒話法門寺長安西法門寺乃中國伽藍之勝境也如来中指節在焉照臨之内奉佛之人罔不歸敬殿宇之盛寰海無倫僖昭播遷後為賊盗燬之中原盪栟人力既殫不能復搆最須者材之與石忽一夕風雷驟起暴澍連宵平曉諸僧闚望見寺前良材巨石阜堆山積亘十餘里首尾不斷有如人力置之於是鳩集民匠復搆精藍至於貌備人謂鬼神送来愈更欽其聖力育王化塔之事豈虚也哉出玉堂閒話陳絢偽蜀王氏彭王𫝊陳絢常為卭州臨溪令縣署編竹為藩而塗之署久泥忽陊落唯露其竹侍婢秉炬而照一物蟠於竹節中文彩爛然小虵也俄而雷聲𨼆𨼆絢疑其乖龍懼罹震厄乃易衣炷香抗聲祈於雷曰茍取龍幸無急遽雖狂電若晝自初夜迨四更𨼆𨼆不發既發一聲俄然開霽向物已失人無震驚有若雷神祐乎祈禱出北夢瑣言彭城佛寺國某楊汀自言天祐初在彭城避暑於佛寺雨雹方甚忽聞大聲震地走視門外乃下一大雹於街中其髙廣與寺樓等入地可丈餘頃之雨止則炎風赫日經月雹乃消盡出稽神錄歐陽氏廣陵孔目吏歐陽氏某者居決定寺前其妻少遇亂失其父母至是有老父詣門使白其妻我汝父也妻見其貧陋不悦拒絶之父又言其名字及中外親族甚悉妻竟不聴又曰吾自逺来今無所歸矣若爾權寄門下信宿可乎妻又不從其夫勸之又不可父乃去曰吾將訟爾矣左右以為公訟耳亦不介意明日午暴風雨從南方来有震霆入歐陽氏之居牽其妻至中庭擊殺之大水平地數尺鄰里皆震蕩不自持後數日歐陽之人至后土廟神座前得一書即老父訟女文也出稽神録廬山賣油者廬山賣油者養其母甚孝謹為暴雷震死其母自以無罪日號泣於九天使者之祠願知其故一夕夢朱衣人告曰汝子恒以魚膏雜油中以圖厚利且廟中齋醮恒用此油腥氣薰蒸靈仙不降震死宜矣母知其事遂止出稽神錄李誠江南軍使蘇建雄有别墅在毘陵恒使傔人李誠来徃檢視乙夘嵗六月誠自墅中迴至句容縣西時盛暑赫日持傘自覆忽值大風飛石拔木卷其傘蓋而去唯持傘柄行數十步雲雨大至方憂濡濕忽有飄席至其所因取覆之俄而雷震地道傍數家之中卷一家屋室向東北而去頃之遂霽其居蕩然無復遺者老幼十餘皆聚桑林中一無所傷舎前有足跡長三尺誠又西行數里遇一人求買所覆席即與之又里餘復遇一人求買所持傘柄誠乃異之曰此物無用爾何為者而買之其人但求乞甚切終不言其故隨行數百步與之乃去出稽神錄茅山牛庚寅嵗茅山有村中兒牧牛取所著汗衫暴於草上而假寐及寤失之唯一鄰兒在傍以為竊去因相喧競鄰兒父見之怒曰生兒為盗將安用之即投水中鄰兒匍匐出水呼天稱寃者數四復欲投之俄而雷雨暴至震死其牛汗衫自牛口中嘔出兒乃得免出稽神錄番禺村女庚申嵗番禺村中有老姥與其女餉田忽雲雨晦㝠及霽乃失其女姥號哭求訪鄰里相與尋之不能得後月餘復雲雨晝晦及霽而庭中陳列筵席有鹿脯乾魚果實酒醢甚豐潔其女盛服而至姥驚喜持之女自言為雷師所娶将至一石室中親族甚衆婚姻之禮一同人間今使歸返而他日不可再歸矣姥問雷郎可得見耶曰不可留數宿一夕復風雨晦㝠遂不復見出稽神錄江西村嫗江西村中霆震一老婦為電火所燒一臂盡傷既而空中有呼曰誤矣即墜一缾缾有藥如膏曰以此傅之即差如其言隨傅而愈家人共議此神藥也將收蔵之數人共舉其瓶不能動頃之復有雷雨收之而去又有村人震死既而空中呼曰誤矣可取蚯蚓搗爛覆臍中當差如言傅之遂蘓出稽神錄甘露寺道士范可保夏月獨逰浙西甘露寺出殿後門將登北軒忽有人衣故褐衣自其傍入肩帔相拂范素好潔衣服新心不悦俄而牽一黄狗又駕肩而出范怒形於色褐衣回顧張目其光如電范始畏懼頃之山下人至曰向山下霹靂取龍不知之乎范故不聞也出稽神錄南康縣辛酉五月四日有使過南康縣令胡侃置酒於縣南蓮花館水軒忽有暴風吹沙從南来因手掩目開盤中器物蔌蔌有聲若有物過良久開目見食器㣲仄其銀酒盃與盃之舟皆挾長如東西形壁傍大桐𣗳亦拔出牆外時一里外皆此風雨常遥聞館中迅雷而館中初不聞也胡亦無恙出稽神錄太平廣記卷三百九十五
