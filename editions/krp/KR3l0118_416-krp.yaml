body:
  text: 太平廣記卷四百十六草木十一木怪下竇寛吳偃董觀京洛士人江叟花卉怪龍虵草鮮卑女蕨虵芥蟲崔𤣥微木怪下竇寛唐扶風竇寛者家於梁山大和八年秋自大理評事解縣榷鹽使判官罷職退歸因治園屋命家僕伐一𣗳既伐而有血滂溜汪然注地食頃而盡寛異之且知為怪由是閉門絶人事至明年冬十一月鄭注李訓反寛與注連遂誅死於左禁軍中出宣室志吳偃有厲泉縣民吳偃家于田野間有一女十歲餘一夕忽遁去莫知所往後數餘日偃夢其父謂偃曰汝女今在東北隅葢木神為祟偃驚而寤至明日即于東北隅窮其跡果聞有呼唫之聲偃視之見其女在一穴内口甚小然其中稍寛厰傍有古槐木盤根極大于是挈之而歸然兀若沈醉者㑹有李道士至偃請符術呵禁其女忽瞬而語曰地東北有槐木木有神引某自𣗳腹空入地下穴内故某病于是伐其𣗳後數日女病始愈出宣室志董觀有董觀者嘗為僧居于太原佛寺大和七年夏與其表弟王生南遊荆楚後將入長安道至商於一夕舍山館中王生既寐觀獨未寢忽見一物出燭下既而掩其燭狀類人手而無指細視燭影外若有物觀急呼王生生起其手遂去觀謂王曰慎無寢魅當再来因持挺而坐伺之良久王生曰魅安在兄妄矣既就寢頃之有一物長五尺餘蔽燭而立無手及面目觀益恐又呼王生生怒不起觀因以挺椹其首其軀若草所穿挺亦隨入其中而力取不可得俄乃退去觀慮又来迨曉不敢寢明日訪館吏吏曰此西數里有古杉常為魅疑即所見也即與觀及王生徑尋果見古杉有挺貫其柯葉間吏曰人言此為妖且久未嘗見其真今則信矣急取斧盡伐去之出宣室志京洛士人京洛間有士人子弟失其姓名素善雕鏤因行他邑山路見一大槐𣗳䕃蔽數畝其根旁瘤癭如數斗甕者四焉思欲取之人力且少又無斧鋸之屬約回日採取之恐為人先採乃于衣簣中取紙數張割為錢繫之于𣗳瘤上意者欲為神𣗳不敢採伐也既捨去數月而還大率人夫并刀斧欲伐之至此𣗳側乃見畫圖影旁挂紙錢實繁復有以香醮奠之處士人笑曰村人無知信此可惑也乃命斧伐之次忽見紫衣神在旁容色屹然叱僕曰無伐此木士人進曰吾昔行次見槐瘤欲取之以無斧鋸恐人採之故權以紙錢占䕶耳本無神也君何止遏神曰始者君權以紙錢繫𣗳之後咸曰神𣗳能致禍福相與祗祀㝠司遂以某職受享酹今有神也何言無之若必欲伐之禍其至矣士人不聽神曰君取此何用士人曰要雕刻為器耳神曰若爾可以善價贖之乎士人曰可神曰所須幾何士人曰可遺百千神曰今奉百絹于前五里有壞墳絹在其中如不得者即復此相見士人遂至壞墳中果得絹一無欠焉出原化記江叟開成中有江叟者多讀道書廣尋方術善吹笛往来多在永樂縣靈仙閣時沈飲酒適閿鄉至盤豆館東官道大槐𣗳下醉寢及夜艾稍醒聞一巨物行聲舉歩甚重叟暗窺之見一人崔嵬髙數丈至槐側坐而以毛手捫叟曰我意是𣗳畔鋤兒乃瓮邊畢卓爾遂敲大𣗳數聲曰可報荆館中二郎来省大兄大槐乃語云勞弟相訪似聞槐𣗳上有人下来與語須㬰飲酌之聲交作荆山槐曰大兄何年抛却兩京道上槐王耳大槐曰我三甲子當棄此位荆山槐曰大兄不知老之將至猶顧此位直須至火入空心膏流斷節而方知退大是無厭之士何不如今因其震霆自拔于道必得為材用之木搆大厦之梁棟尚存得重重碎錦片片真花豈他日作朽蠧之薪同入㸑為煨燼耳大槐曰雀鼠尚貪生吾焉能辦此事邪槐曰老兄不足與語吿别而去及明叟方起數日至閿鄉荆山中見庭槐森聳枝榦扶疎近欲十圍如附神物遂伺其夜以酒脯奠之云某昨夜聞槐神與盤豆官道大槐王論語維時某卧其側並歴歴記其説今請𣗳神與我言語槐曰感子厚意當有何求殊不知爾夜爛醉于道夫乃子邪叟曰某一生好道但不逢其師𣗳神有靈乞為指教使學道有處當必奉酬槐神曰子但入荆山尋鮑仙師脱得見之或水陸之間必獲一處度世葢感子之請慎勿泄吾言也君不憶華表告老狐禍及余矣叟感謝之明日遂入荆山縁巖尋水果訪鮑仙師即匍匐而禮之師曰子何以知吾而求師也須實言之叟不敢隱具陳荆山館之𣗳神言也仙師曰小鬼焉敢専輙指人未能大叚誅之且飛符殘其一枝叟拜乞免仙師曰今不誅後當繼有来者遂謂叟曰子有何能一一陳之叟曰好道癖於吹笛仙師因令取笛而吹之仙師歎曰子之藝至矣但所吹者枯竹笛耳吾今贈子玉笛乃荆山之尤者但如常笛吹之三年當召洞中龍矣龍既出必啣明月之珠而贈子子得之當用醍醐煎之三日凡小龍已腦疼矣葢相感使其然也小龍必持化水丹而贖其珠也子得當吞之便為水仙亦不減萬歳無煩吾之藥也葢子有琹髙之相耳仙師遂出玉笛與之叟曰玉笛與竹笛何異師曰竹者青也與龍色相類能肖之吟龍不為怪也玉者白也與龍相尅忽聽其吟龍怪也所以来觀之感召之有能變耳義出于𤣥叟受教乃去後三年方得其音律後因之岳陽刺史李虞館之時大旱叟因出笛夜於聖善寺經樓上吹果洞庭之渚龍飛出而降雲繞其樓者不一遂有老龍果啣珠贈叟叟得之依其言而熬之二晝果有龍化為人持一小藥合有化水丹匍匐請贖其珠叟乃持合而與之珠餌其藥遂變童顔入水不濡凡天下洞穴無不歴覽後居于衡陽容髮如舊耳出傳竒花卉怪龍虵草後漢靈帝中平年夏陳留郡濟陽濟隂寃句離狐城臯陽武城郭路邊生草悉備龍虵鳥獸之形續漢志曰其狀五色毛羽頭目足翅皆具或作人形操持弓弩牛馬萬物之狀是歲黒山賊張牛角等十餘輩並起抄掠后兄何進秉權漢遂微弱又董卓起兵焚燒宫闕之應出五行記鮮卑女晉有士人買得鮮卑女名懷順自説其姑女為赤莧所魅始見一丈夫容質妍淨著赤衣自云家在側北女於是恒謌謡自得每至將夕輙結束去屋後其家伺候唯見有一株赤莧女手指環挂其莧莖芟之而女號泣經宿遂死焉出異苑蕨虵太尉郗鑒鎮丹陽也曾出獵時二月中蕨始生有一甲士折食一莖即覺心中潭潭欲吐因歸家乃成心腹疼痛經半年許忽大吐吐一赤虵長尺餘尚動揺乃挂於簷前虵漸焦經宿視之乃是一莖蕨耳猶昔之所食也病遂差出續搜神記芥蟲五嶺春夏率皆霪水霑日既少渉秋入冬方止凡物皆易蠧敗萠膠氈罽無逾年者嘗買芥菜置壁下忘食數日皆生四足有首尾能行走大如螳螂但腰身細長耳出嶺南異物志崔𤣥微唐天寳中處士崔𤣥微洛東有宅耽道餌术及茯苓三十載因藥盡領僮僕輩入嵩山採芝一年方回宅中無人蒿莱滿院時春季夜間風清月朗不睡獨處一院家人無故輙不到三更後有一青衣云君在院中也今欲與一兩女伴過至上東門表姨處暫借此歇可乎𤣥微許之須㬰乃有十餘人青衣引入有緑裳者前曰某姓楊指一人曰李氏又一人曰陶氏又指一緋小女曰姓石名阿措各有侍女輩𤣥微相見畢乃坐于月下問行出之由對曰欲到封十八姨數日云欲来相看不得今夕衆往看之坐未定門外報封家姨来也坐皆驚喜出迎楊氏云主人甚賢只此從容不惡諸亦未勝于此也𤣥微又出見封氏言詞冷冷有林下風氣遂揖入坐色皆殊絶滿座芳香馥馥襲人諸人命酒各歌以送之𤣥微誌其二焉有紅裳人與白衣送酒歌曰皎潔玉顔勝白雪况乃當年對芳月沈唫不敢怨春風自歎容華暗消歇又白衣人送酒歌曰絳衣披拂露盈盈淡染胭脂一朶輕自恨紅顔留不住莫怨春風道薄情至十八姨持盞性頗輕佻翻酒汙阿措衣阿措作色曰諸人即奉求人不奉畏耳拂衣而起十八姨曰小女弄酒皆起至門外别十八姨南去諸人西入苑中而别𤣥微亦不知異明夜又来云欲往十八姨處阿措怒曰何用更去封嫗舎有事只求處士不知可乎阿措又言曰諸侣皆住苑中每歳多被惡風所撓居止不安常求十八姨相庇昨阿措不能依廻應難取力處士倘不阻見庇亦有微報耳𤣥微曰某有何力得及諸女阿措曰但處士每歲歲日與作一朱幡上圖日月五星之文于苑東立之則免難矣今歲已過但請至此月二十一日平旦微有東風即立之庶夫免患也𤣥微許之乃齊聲謝曰不敢忘徳拜而去𤣥微于月中隨而送之踰苑墻乃入苑中各失所在依其言至此日立幡是日東風振地自洛南折𣗳飛沙而苑中繁花不動𤣥微乃悟諸女曰姓楊李陶及衣服顔色之異皆衆花之精也緋衣名阿措即安石榴也封十八姨乃風神也後數夜楊氏軰復至媿謝各裹桃李花數斗勸崔生服之可延年却老願長如此住衞䕶某等亦可致長生至元和初𤣥微猶在可稱年三十許人又尊賢坊田𢎞正宅中門外有紫牡丹成𣗳發花千餘朶花盛時每月夜有小人五六長尺餘遊于花上如此七八年人將掩之輙失所在出酉陽雜俎及博異記太平廣記卷四百十六
