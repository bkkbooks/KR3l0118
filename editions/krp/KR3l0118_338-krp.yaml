body:
  text: 太平廣記卷三百三十八宋李昉等編鬼二十三盧仲海王垂武丘寺李公佐竇裕商順李載髙勵蕭遇朱自勸盧仲海大厯四年處士盧仲海與從叔纉客於吳夜就主人飲歡甚大醉郡屬皆散而纘大吐甚因更深無救者獨仲海侍之仲海性孝友悉箧中之物藥以䕶之半夜纘亡仲海悲惶伺其心尚煖計無所出忽思禮有招魂望反諸幽之㫖又先是有力士説招魂之驗乃大呼纘名連聲不息數萬計忽蘇而能言曰呼賴爾救我即問其狀答曰我向被數吏引言郎中令邀迎問其名乃稱尹逡巡至宅門閥甚峻車馬極盛引入尹迎勞曰飲道如何常思曩日破酒縱思忽承戾止浣濯難申故奉迎耳乃遥入詣竹亭坐客人皆朱紫相揖而坐左右進酒杯盤昞曜妓樂雲集吾意且洽都忘行李之事中宴之際忽聞爾喚聲衆樂齊奏心神已眩爵行無數吾始忘之俄頃又聞爾喚聲且悲我心惻然如是數四且心不便請辭主人苦留吾告以家中有急主人暫放我來當或繼請授吾職事吾向以虚諾及到此方知是死若不呼我却忘身在此吾始去也宛然如夢今但畏再命為之奈何仲海曰情之至𨼆復無可行前事既驗當復執用耳因焚香誦咒以備之言語之際忽然又没仲海又呼之聲且哀厲激切直至欲明方蘇曰還賴爾呼我我向復飲至於酣暢坐寮徑醉主人方敇文牒管我職聞爾喚聲哀厲依前惻怛主人訝我不怡又暫乞犯責再三主人笑曰大竒遂放我來今去留未訣雞鳴興隂物向息又聞鬼神不越疆吾與爾逃之可乎仲海曰上計也即具舟倍道併行而愈王垂太原王垂與范陽盧收友善唐大厯初嘗乗舟於淮浙徃來至石門驛旁見一婦人於樹下容色殊麗衣服甚華負一錦囊王盧相謂曰婦人獨息婦囊可圖耳乃彌棹伺之婦人果問曰船何適可容寄載否妾夫病在嘉興今欲省之足痛不能去二人曰虛舟且便可寄爾婦人擕囊而上居船之首又徐挑之婦人正容曰暫附何得不正耶二人色怍垂善鼓琴以琴悦之婦人美艶粲然二人振蕩乃曰娘子固善琴耶婦人曰少所習王生拱琴以授乃撫軫泛弄冷然王生曰未嘗聞之有以見文君之誠心矣婦人笑曰委相之深沉也遂稍親合其談諧恵辨不可言相視感悦是夕與垂偶㑹船前收稍被隔礙而深嘆慕夜深收竊探囊中物視之滿囊髑髏耳收大駭知是鬼矣而無因逹於垂聽其私狎甚繾綣既而天明婦人有故暫下收告垂垂大懾曰計將安岀收曰宜伏簣下如其言須臾婦人來問王生安在收紿之曰適上岸矣婦人甚劇委收而追垂望之稍逺乃棄於岸併棹倍行數十里外不見來夜蔵船處閙半夜後婦人至直入船拽垂頭婦人四面有眼腥穢甚嚙咬垂垂困二人大呼衆船皆助遂失婦人明日得紙梳於席上垂數月而卒出通幽記武丘寺蘇州武丘寺山嶔崟石林玲瓏樓雉叠起緑雲窈窕入者忘歸大厯初寺僧夜見二白衣上樓竟不下尋之無所見明日峻髙上見題三首信鬼語也其詞曰幽明雖異路平昔忝工文欲知潛寐處山北兩孤墳其二示幽獨居髙松多悲風蕭蕭清且哀南山接幽隴幽隴空崔嵬白日徒煦煦不照長夜臺雖知生者樂魂魄安能迴况復念所親慟哭心肝摧慟哭更何言哀哉復哀哉其三答處幽子神仙不可學形化空遊魂白日非我朝青松圍我門雖復隔生死猶知念子孫何以遣悲惋萬物歸其根寄語世上人莫厭臨芳罇莊上有墓林古塜累累其文尚存焉出通幽記李公佐李公佐大厯中在廬州有書吏王庾請假歸夜行郭外忽值引騶呵避書吏映大樹窺之且怪此無尊官也導騎後一人紫衣儀衞如大使後有車一乗方渡水御者前白車軻索斷紫衣曰檢簿遂見數吏檢之曰合取廬州某里張道妻脊筋修之乃書吏之姨也頃刻吏迴持兩條白物各長數尺乃渡水而去至姨家尚無恙經宿患背痛半日而卒出酉陽雜爼竇裕大歴中有進士竇裕者家寄淮海下第將之成都至洋州無疾卒常與淮隂令吳興沈生善别有年矣聲塵兩絶莫知其適沈生自淮海調補金堂令至洋州舍於舘亭中是夕風月晴朗夜將半生獨若有所亡而不得其寢俄見一白衣丈夫自門歩來且吟且嗟似有恨而不舒者久之吟曰家依楚水岸身寄洋州舘望月獨相思塵襟淚痕滿生見之甚覺𩔖竇裕特起與語未及遂無見矣乃嘆曰吾與竇君别久矣豈為鬼耶明日駕而去行未數里有殯其路前有識者曰進士竇裕殯宫生驚即馳至舘問舘吏曰有進士竇裕自京遊蜀至此暴亡太守命殯於舘南二里外道左殯宫是也即致奠拜泣而去出宣室志商順丹陽商順娶吳郡張昶女昶為京兆少尹卒葬滻水東去其别業十里順選集在長安久之張氏使奴入城迎商郎順日暮與俱往奴盜飲極醉與順相失不覺其城門已閉無如之何乃獨前行天漸昏黑雨雪交下郎來驢甚蹇迷路不知所之但信驢所詣計行十數里而不得見村墅轉入深草苦寒甚戰少頃至一澗澗南望見燈火順甚喜行至乃柴籬茅屋數間扣門數百下方應順問曰逺客迷路苦寒暫欲寄宿應曰夜暗雨雪如此知君是何人且所居狹陋不堪止宿固拒之商郎乃問張尹庄去此幾許曰近西南四五里順以路近可到乃出澗西南行十餘里不至庄雨雪轉甚順自審必死既不可行欲何之乃繫驢於桑下倚樹而坐須臾見一物狀若燭籠光照數丈直詣順前尺餘而止順初甚懼尋而問曰得非張公神靈導引余乎乃前拜曰若是丈人當示歸路視光中有小道順乃乗驢隨之稍近火移恒在前尺餘行六七里望見持火來迎籠火遂滅及火至乃張氏守塋奴也順問何以知己來奴云適聞郎君大呼某言商郎從東來急往迎如此再三是以知之遂宿奴廬中明旦方去出廣異記李載大厯七年轉運使吏部劉晏在部為尚書大理評事李載攝監察御史知福建留後載於建州浦城置使院浦城至建州七百里猶為清凉載心懼瘴癘不樂職事經半載卒後一日復生如故家人進食載如平常食之謂家人曰已死今暫還者了使事耳乃追其下未了者使知一切交割付之後修狀與尚書别兼作遺書處分家事妻崔氏先亡左右唯一小女因謂小妻我死地下見舅我言有汝其人甚怒將欲有所不相利益為之奈何今日欲至不宜久留也言訖分財與之使行官送還北小妻便爾下船行時尚關未即就路載亦知之召行官至杖五下使驟去事畢食訖遂卒出廣異記髙勵髙勵者崔士光之丈人也夏日在其庄前桑下看人家打麥見一人從東走馬來至勵再拜云請治馬足勵云我非馬醫焉得療馬其人笑云但為膠黏即得勵初不解其言其人乃告曰我非人是鬼耳此馬是木馬君但洋膠黏之便濟行程勵乃取膠煮爛出至馬所已見變是木馬病在前足因為黏之送膠還舍及出見人已在馬邊馬甚駿還謝勵訖便上馬而去出廣異記蕭遇信州刺史蕭遇少孤不知母墓數十年將改葬舊塋在都既至唘乃悞開盧㑹昌墓既而知其非號痛而歸聞河陽方士道華者善召鬼乃厚幣以迎既至具以情訴華曰試可耳乃置壇潔誠立召盧㑹昌至一丈夫也衣冠甚偉呵之曰蕭郎中太夫人塋被爾墓侵雜使其迷悞急急尋求不爾當旦夕加罪㑹昌再拜曰某賤役者所管地累土三尺方十里力可及周外則不知矣但管内無蕭郎中太夫人墓當為索之以旦日為期及朝華與遇俱往行里餘遙見㑹昌奔來曰吾縁尋索頗擾鬼神今使按責甚急二人可疾去言訖而滅二人去之數日顧視見青黑氣覆地竟日乃散既而㑹昌來曰吾為君尋求大受隂司譴罰今計窮矣請辭去罷歸河陽遇號哭自是端居一室夜忽如夢中聞户外有聲呼遇小名曰吾是爾母遇驚走岀户拜迎見其母母從暗中岀遇與相見如平生謂遇曰汝至孝動天誠逹星神祗靈降鍳今我與汝相見悲愴盈懐遇號慟久之又嘆曰吾家孝子有聞於天雖在泉壤甚為衆流所仰然孝子之感天逹神非惟毁形滅性所尚由哀耳因與遇論幽㝠報應之㫖性命變通之道乃曰禍福由人但可累徳上天下臨實如影響其有樹善不感者皆是心不固耳言敘久之遇悲慰感激曰不意更聞過奬之言庶萬分不恨矣乃述迷悞塋域之根乃曰吾來亦為此年歳䆮逺汝小何由而知吾墓上已有李五娘墓亦已平坦何可辨也汝明日但見烏鵲羣集其下是也又曰若䕶我西行當以二魂輿入關問其故答曰為叔母在此亦須歸鄉遇曰叔母為誰耶母曰叔母則是汝外婆吾亦自呼作叔母憐吾孤獨嘗從咸陽來此伴吾後因神祗隔絶不得去故要二魂輿耳言訖而去倐忽不見遇哀號待曉即於烏鵲所集平地掘之信是李五娘墓更於下得母墓方得合葬出通幽記朱自勸吳縣朱自勸以寳應年亡大厯三年其女寺尼某令婢往市買胡餅充齋饌物於河西見自勸與數騎賔從二十人狀如為官見婢歔欷問汝和尚好在將安之婢云命市胡餅作齋勸云吾此正復有餅迴命從者以三十餅兼𫝊問訊婢至寺白尼尼悲泣不食餅為衆人所食後十餘日婢往市路又見自勸慰問如初復謂婢曰汝和尚不了死生常理何可悲涕故寄餅亦復不食今可將三十餅徃宜令食也婢還終不食後十日婢於市復見自勸問訊畢謂婢曰方冬嚴寒聞汝和尚未挾纊今附絹二疋與和尚作寒具婢承命持還以絹授尼尼以一疋製袴一留貯之後十餘日婢復遇自勸謂曰有客數十人可持二絹令和尚於房中作饌為午食明日子時吾當來彼婢還尼賣絹市諸珍膳翌日待之至午婢忽㝠昧久之靈語因言客至婢起祗供食食方畢又言曰和尚好住吾與諸客飲食致飽今往已婢送自勸岀門久之方悟自爾不見出廣異記太平廣記巻三百三十八
