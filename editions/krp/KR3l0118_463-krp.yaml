body:
  text: 太平廣記卷四百六十三宋李昉等編禽鳥四飛涎鳥精衛仁鳥鸐韓朋帶箭細鳥王母使者鴛鴦五色鳥新喻男子張氏漱金鳥鶖營道令紙鳶化鳥鶉戴文謀瑞鳥報春鳥冠鳧秦吉了韋氏子鳥賊鳥省劉景陽食蝗鳥盧融張氏王緒武功大鳥鸛鷒吐綬鳥杜鵑蚊母鳥桐花鳥真臘國大鳥百舌鸛甘蟲戴勝北海大鳥鵶仙居山異鳥鸎飛涎鳥南海去㑹稽三千里有狗國國中有飛涎鳥似䑕兩翼如鳥而脚赤每至曉諸棲禽未散之前各各占一樹口中有涎如膠遶樹飛涎沾灑衆枝葉有他禽之至而如網也然乃食之如竟午不獲即空中逐而涎惹之無不中焉人若捕得脯治渴其涎每布後半日即乾自落落即布之出外荒記精衛有鳥如烏文首白喙赤足名曰精衛昔赤帝之女名女娙往遊於東海溺死而不返其神化為精衛故精衛常取西山之木石以填東海出博物志仁鳥晉文公焚林以求介推有白鵶繞煙而噪或集介子之側火不能焚晉人嘉之起一髙䑓名曰思烟臺種仁夀之木木似栢而枝長軟其花堪食故吕氏春秋云木之羙者有夀木之華即此是或云此鵶有識於焚介之山數百里不復識羅網呼之曰仁鳥俗亦謂仁鳥白臆為慈鳥則此𩔖也出王子年拾遺記鸐幽州之墟羽山之北有善鳴禽人面鳥喙八翼一足毛色如雉行不踐地名曰鸐其聲似鐘磬笙竽也世語曰青鸐鳴時太平乃盛明之世翔鳴藪澤音中律吕飛而不行禹平水土棲於川岳所集之地必有聖人出焉自上古鑄諸鼎器皆圖像其形銘讃至今不絶出拾遺録韓朋韓朋鳥者乃鳧鷖之𩔖此鳥為雙飛泛溪浦水禽中鸂鶒鴛鴦鵁鶄嶺北皆有之唯韓朋鳥未之見也案干寳搜神記云大夫韓朋一云憑其妻美宋康王奪之朋怨王囚之朋遂自殺妻乃陰腐其衣王與之登臺自投臺下左右提衣衣不勝手遺書於帶曰願以尸還韓氏而合𦵏王怒令埋之以塜相望經宿忽見有梓木生二塜之上根交於下枝連其上又有鳥如鴛鴦恒棲其樹朝暮悲鳴南人謂此禽即韓朋夫婦之精魂故以韓氏名之出嶺表錄異帶箭帶箭鳥鳴如野鵲翅羽黄緑間錯尾生兩枝長二尺餘直而不梟唯尾稍有毛宛如箭羽因目之為帶箭鳥同上細鳥漢元封五年勒畢國貢細鳥以方尺玉籠盛數百頭大如蠅其狀如鸚鵡聞聲數里如黄鵠之音國人常以此鳥候時亦名曰候蟲上得之放於宫内旬日之間不知所止惜甚求不復得明年此鳥復來集於帷幄之上或入衣袖因更名曰蟬鳥宫人婕妤等皆恱之但有此鳥集於衣上者輒蒙愛幸武帝末稍稍自死人尤愛其皮服其皮者多為男子媚也出洞㝠記王母使者齊郡函山有鳥足青嘴赤素翼絳顙名王母使者昔漢武帝登此山得玉函長五寸帝下山玉函忽化為白鳥飛去世傳山上有王母藥函常令鳥守之出酉陽雜爼鴛鴦漢時鄢縣南門兩扇忽一聲稱鴛一聲稱鴦晨夕開閉聲聞京師漢末惡之令毁其門兩扇化為鴛鴦相隨飛去後遂改鄢為晏城縣出朝野僉載五色鳥楊震卒未𦵏有大鳥五色髙丈餘從天飛下到震棺前舉頭悲鳴淚出沾地至𦵏日冲天上昇出謝丞後漢書新喻男子豫章新喻縣男子見田中有六七女皆衣毛衣不知是鳥匍匐往得某一女所解毛衣取藏之即往就諸鳥諸鳥各飛去一鳥獨不得去男子取以為婦生三女其母後使女問父知衣在積稻下得之衣而飛去後復以衣迎三兒亦得飛去出捜神記張氏京兆有張氏獨處一室有鳩自外入止于牀張氏祝曰鳩為禍也飛上承塵為福也即入我懐以手探之而得一金鉤是後子孫漸盛資財萬倍蜀賈客至長安聞之乃厚賂婢婢竊鉤以與客張氏既失鉤漸漸衰耗而蜀客亦罹窮厄於是齎鉤以反張氏復昌出搜神記漱金鳥魏時昆明國貢漱金鳥國人云其地去然州九千里出此鳥形如雀色黄毛羽柔密常翾翔海上羅者得之以為至祥聞大魏之徳被於荒逺乃越山航海來獻大國帝得此鳥蓄於靈禽之圃飴以真珠飲以龜腦鳥常吐金屑如粟鑄之可以為器昔漢武時有獻大雀此之𩔖也此鳥畏霜雪乃起小室以處之名曰辟寒臺皆用水晶為户牖使内外通光而常隔於風雨塵霧宫人爭以鳥所吐之金飾釵珮謂之辟寒金故宫人相嘲言曰不服辟寒金那得君王心不服辟寒鈿那得君王憐於是媚惑爭以寳為身飾及行卧皆懐挾以要寵也魏代䘮滅珍寳池臺鞠為茂草漱金之鳥亦自髙翔出拾遺錄鶖晉永嘉二年有鶖集於始安縣木矢貫之鐵鏃其長六寸有半以箭計之其射者當身長丈五六尺出拾遺記營道令晉太元中營道令何潛之去職於縣界山中得一鳥大如白鷺青色赤目膝上髀下自然有銅環形大小刻畫轉輾如攬子絶妙人功於是京邑皆傳觀之營道經今屬道州出酉陽雜爼紙鳶化鳥梁武泰清三年侯景圍臺城逺不通問簡文作紙鳶飛空告急於外侯景謀臣王偉謂景曰此紙鳶所至即以事達外令左右善射者射之及墮皆化為鳥飛入雲中不知所往出獨異志鶉安定原土築時奠祭設觚爵忽有一鶉飛於觚上因名鶉觚城後魏文帝天統中立為鶉觚縣出窮神秘苑戴文謀有戴文謀者𨼆居陽城山中曽於客堂食際忽聞有呼曰我天帝使者欲下憑君可乎文謀聞甚驚又曰君疑我也文謀乃跪曰居貧恐不足降下耳既而灑掃設位朝夕進食甚謹後謀於室内竊言之其婦曰此恐是狐魅依憑耳文謀曰我亦疑之及祠饗之時神乃言曰吾相從方欲相利不意有疑心異議文謀辭謝之際忽堂上如數十人呼聲出視之見一大鳥五色白鳩數十隨之東北入雲而去出窮神秘苑瑞鳥煬帝征遼回次於柳城郡之望海鎮歩出觀望有大鳥二素羽丹嘴狀同鶴鷺出自霄漢翻翔雙下髙一丈四五尺長八九尺徘徊馴擾翔舞御營敕著作佐郎虞綽製瑞鳥銘以進上命鐫於其所仍敕殿内丞閻毗圖寫其狀秘書郎虞世南上瑞鳥頌敕令寫於圖首出大業拾遺報春鳥顧渚山中有鳥如鴝鵒而小蒼黄色每至正月二月作聲云春起也至三月四月作聲云春去也採茶人呼為報春鳥出顧渚山記冠鳧石首魚至秋化為冠鳧冠鳧頭中有石也出海陸碎事秦吉了秦吉了容管廉白州産此鳥大約似鸚鵡嘴脚皆紅兩眼後夾腦有黄肉冠善效人言語音雄大分明於鸚鵡以熟雞子和飯如棗飼之或云容州有純赤純白色者俱未之見也出嶺表録異韋氏子汧陽郡有張女郎廟上元中有韋氏子客於汧陽途至其廟遂解鞍以憇忽見廟宇中有二屐子在地上生視之乃結草成者文理甚細色白而製度極妙韋生乃收貯於槖中既而别去及至郡郡守舍韋生於館亭中是夕生以所得屐致於前而寐明日已忘其所莫窮其處僅食頃乃於館亭瓦屋上得焉僕者驚愕告於韋生生即命昇屋而取之既得又致於前明日又失其所復於瓦屋上得之如是者三韋生竊謂僕曰此其怪乎可潛伺之是夕其僕乃竊於隙中伺之夜將半其屐忽化為白鳥飛於屋上韋生命取焚之乃飛去出宣室志鳥賊李靖弟客師官至右武衛將軍四時從禽無暫止息京師之西南際澧水鳥獸皆識之每出鳥鵲競逐噪之人謂之鳥賊出談賔録鳥省馮兗給事親仁坊有宅南有山亭院多養鵝鴨及雜禽之𩔖極多常遣一家人掌之時人謂之鳥省出盧氏雜記劉景陽天后時左衛兵曹劉景陽使嶺南得吉了鳥雄雌各一隻解人語至都進之留其雌者雄煩怨不食則天問曰何乃無聊也鳥為言曰其配為使者所得今頗思之乃呼景陽曰卿何故藏一鳥不進景陽叩頭謝罪乃進之則天不罪也出朝野僉載食蝗鳥開元中貝州蝗蟲食禾有大白鳥數千小白鳥數萬盡食其蟲出酉陽雜爼盧融開元初范陽盧融病中獨卧忽見大鳥自逺飛來俄止庭樹髙四五尺狀𩔖鴞目大如柸嘴長尺餘下地上階頃之入房登牀舉兩翅翅有子持小槍欲以撃融融伏懼流汗忽復有人從後門入謂鳥云此是善人慎勿傷也鳥遂飛去人亦隨出融疾自爾永差出廣異記張氏濮州刺史李全璋妻張牛肅之姨也開元二十五年卒于伊闕莊張寢疾有鳥止於庭樹白首赤足黄腹丹翅其鳴但云懊恨也母兮如是晝夜不絶聲十餘日張殂鳥遂不見出紀聞王緒天寳末台州錄事叅軍王緒病將死有大鳥飛入緒房行至牀所引嘴向緒聲云取取緒遂卒出廣異記武功大鳥大歴八年大鳥見武功羣噪之行營將張自芬射獲之肉翅狐首四足足有爪廣四尺狀𩔖蝙蝠出酉陽雜爼鸛鷒鸛鷒一名墮羿形似鵲人射之則銜矢反射人出酉陽雜爼吐綬鳥魚復縣南山有鳥大如鴝鵒羽色多黒雜以黄白頭頗似雉有時吐物長數寸丹采彪炳形色類綬因名為吐綬鳥又食必蓄嗉臆前大如斗慮觸其嗉行每逺草木故一名避株鳥出酉陽雜爼杜鵑杜鵑始陽相推而鳴先鳴者吐血死嘗有人山行見一羣寂然聊學其聲即死初鳴先聽者主離别厠上聽其聲不祥厭之之法當為犬聲應之出酉陽雜爼蚊母鳥蚊母鳥形如鷁嘴大而長池塘捕魚而食每呌一聲則有蚊蚋飛出其口俗云採其翎為扇可辟蚊子亦呼為吐蚊鳥出嶺表録異桐花鳥劒南彭蜀間有鳥大如指五色畢具有冠似鳳食桐花每桐結花即來桐花落即去不知何之俗謂之桐花鳥極馴善止於婦人釵上客終席不飛人愛之無所害也出朝野僉載真臘國大鳥真臘國有葛浪山髙萬丈半腹有洞先有浪鳥狀似老鴟大如駱駞人過即攫而食之騰空而去百姓苦之真臘王取大牛肉中安小劒子兩頭尖利令人載行鳥攫而吞之乃死無復種矣出朝野僉載百舌百舌春囀夏至唯食蚯蚓正月後凍開蚓出而來十月後蚓藏而往葢物之相感也出朝野僉載鸛江淮謂羣鸛旋飛為鸛井鸛亦好旋飛必有風雨人探巢取鸛子六十里旱能羣飛薄霄激雨雨為之散出酉陽雜爼又南方有鸛食虵每遇巨石知其下有虵即於石前如道士禹歩其石阞然而轉因得而噉里人學其法者伺其養雛縁樹以篾絙縛其巢鸛必作法而解之乃鋪沙樹底俾足跡所印而倣學之出北夢𤨏言甘蟲大中末舒州奏衆鳥成巢濶七尺髙一丈而燕雀鷹鸇水禽山鳥無不馴狎如一更有鳥人面緑毛嘴爪皆紺其聲曰甘蟲因謂之甘蟲時人畫圖鬻於坊市出杜陽編戴勝王蜀刑部侍郎李仁表寓居許州將入貢於春官時薛能尚書為鎮先繕所業詩五十篇以為贄濡翰成軸於小亭凭几閲之未三五首有戴勝自簷飛入立于案几之上馴狎良久伸頸嚲翼而舞向人若將語久之又轉又舞如是者三超然飛去心異之不以告人翌日投詩薛大加禮待居數日以其女妻之出録異記北海大鳥北海有大鳥其髙千里頭文曰天胸文曰候左翼文曰鷖右翼文曰勒頭向東正海中央捕魚或時舉翼飛而其羽相切如雷風也出神異録鵶温璋為京兆尹勇於殺戮京邑憚之一日聞挽鈴而不見有人如此者三乃一鵶也尹曰是必有人探其鶵而來訴耳命吏隨鵶所在而捕之其鵶盤旋引吏至城外樹間果有人探其雛尚憇樹下吏執送之府尹以事異於常乃斃捕雛者出北夢𤨏言仙居山異鳥王蜀永平二年得北邙山章宏道所留瑞文於什邡之仙居山遂出緡錢委漢州馬歩使趙宏約締搆觀宇洎創天尊殿材石宏博功用甚多是日將架巨梁工巧丁役三百餘人縛拽鼓噪震動逺近忽有異鳥三隻一紅赤色二皆潔白尾如曵練各長二尺餘棲於梁上隨絙索上下在衆人中略無驚怖工人撫搦戲翫之如所馴養者梁既上畢鳥亦飛去出録異記鸎頃年有人取得黄鸎鶵養於竹籠中其雌雄接翼曉夜哀鳴於籠外則更來哺之人或在前畧無所畏忽一日不放出籠其雄雌繚繞飛鳴無從而入一投火中一觸籠而死剖腹視之其腸寸斷出玉堂閒話太平廣記卷四百六十三
