body:
  text: 太平廣記卷四百九宋李昉等編草木四草花旌節花野悉宻花都勝花簇蝶花茙葵金燈花金錢花毗尸沙花木花叙牡丹白牡丹紅紫牡丹正倒暈牡丹合歡牡丹染牡丹花斸牡丹月桂花牡桂花桂花海石榴花南海朱槿嶺表朱槿紅槿花郍提槿花佛桑花貞桐花梔子花山茶花三色石楠花比閭花木蓮花郍伽花木蘭花異木花碧玫瑰刺桐花懐風花躑躅花凌霄花分枝荷夜舒荷睡蓮花碧蓮花染青蓮花三朶瑞蓮藕蓮實芰菱草花旌節花黎州漢源縣有旌節花去地三二尺行行皆如旌節也出黎州漢源縣圖經野悉宻花野悉宻出佛林國亦出波斯國苗長七八尺葉似梅四時敷榮其花五出白色不結子花開時遍野皆香與嶺南詹糖相類西域人常採其花壓以為油塗甚香滑都勝花都勝花紫色兩重心數葉卷上如蘆朶蘂黄葉細簇蝶花簇蝶花花朶簇一蘂如蓮房色淺紅出在温州茙葵茙葵本湖中葵也一名胡葵似葵大者紅可緝為布燒作灰藏大火乆不滅有重臺者金燈花金燈一名九形花葉不相見俗惡人家種之故一名無義草金錢花金錢花梁時荆州掾屬雙六賭金錢錢盡以金錢花相足魚𢎞謂得花勝得錢毗尸沙花毗尸沙一名曰中金錢花本出外國梁大同二年来中土已上七花並出酉陽雜俎木花叙牡丹牡丹花世謂近有蓋以隋末文士集中無牡丹謌詩則楊子華有畫牡丹處極分眀子華北齊人則知牡丹花亦已乆矣出尚書故實又謝康樂集亦言竹間水際多牡丹而隋朝種植法七十餘卷中不說牡丹者則隋朝花藥中所無也出酉陽雜俎白牡丹唐開元末裴士淹為郎官奉使幽冀迴至汾州衆香寺得白牡丹一棵植於長興私第天寳中為都下奇賞當時名士有裴給事宅看牡丹詩詩尋訪未獲太常博士張乗嘗見裴祭酒說又房琯有言牡丹之㑹琯不與焉出酉陽雜俎紅紫牡丹唐至徳中馬僕射總鎮太原紅紫二色牡丹得移於城中元和初猶少今與茙葵多少耳出酉陽雜俎正倒暈牡丹長安興唐寺有牡丹一棵唐元和中著花一千二百朶其色有正暈倒暈淺紅深紫黄白檀等獨無深紅又有花葉中無抹心者重臺者有花面徑七八寸者出酉陽雜俎合歡牡丹長安興善寺素師院牡丹色絶嘉元和末一枝花合歡出酉陽雜俎染牡丹花唐朝韓文公愈有疎従子姪自江淮来年甚少韓令學院中伴子弟子弟悉為凌辱韓知遂送街西僧院中令讀書經旬寺主綱復訴其狂率韓遽令歸且責曰市肆賤類營衣食尚有一事長處汝所為如此竟作何物姪拜謝徐曰某有一藝恨叔不知因指階前牡丹曰叔要此花青紫黄赤唯命也韓大奇之遂給所須試之乃竪箔曲盡遮牡丹叢不令人窺掘棵四面深及其根寛容人坐唯齎紫鑛輕粉朱紅旦暮治其根凡七日遂掩坑白其叔曰根較遲一月時冬初也牡丹本紫及花發色黄紅厯緣每朶有一聫詩字色紫分眀乃是韓公出闗時詩頭一韻曰雲横秦嶺家何在雪擁藍闗馬不前十四字韓大驚異遂乃辭歸江淮竟不願仕出酉陽雜俎斸牡丹長安貴逰尚牡丹三十餘年矣每春暮車馬若狂以不就翫為恥金吾鋪圍外寺觀種以求利一本有數萬者元和末韓令姪至長安私第有之遽命斸去曰吾豈效兒女子也出國史補月桂花月桂葉如桂花淺黄色四瓣青蘂花盛發如柿蒂出蔣山出酉陽雜俎牡桂花牡桂葉大如苦竹葉中有一脉如筆跡花蒂葉三瓣瓣端分為兩岐其表色淺黄近岐淺紅色花六瓣色白心凸起如荔枝其枝紫出婺州山中出酉陽雜俎桂花桂花三月開黄而不白大庾詩皆稱桂花耐日及張曲江詩桂華秋皎潔妄矣出酉陽雜俎海石榴花新羅多海紅并海石榴唐賛皇李徳裕言花中帶海者悉従海東来章川花差類海石榴五朶簇生葉狭長重沓承南海朱槿南海四時皆有朱槿花常開然一本之内所發不過一二十花所開不能如圖畫者叢發爛漫嶺表朱槿嶺表朱槿花莖葉皆如桑樹葉光而厚南人謂之佛桑樹身髙者出酉陽雜俎止於四五尺而枝葉婆娑自二月開花至於中冬方歇其花深紅色五出如大蜀葵有蕋一條長於花葉上綴金屑日光所爍疑有焰生一叢之上日開數百朶雖繁而有艶且近而無香暮落朝開插枝即活故名之槿俚女亦採而鬻一錢售數十朶若微此花紅梅無以資其色出嶺表異録紅槿花嶺南紅槿自正月迄十二月常開秋冬差少耳出嶺南異物志郍提槿花郍提槿花紫色兩重葉外重葉卷心心中抽莖髙寸餘葉端分五瓣如帶瓣中紫蕋莖上黄蕋佛桑花閩中多佛桑樹枝葉如桑唯條上勾花房如桐花含長一寸餘似重臺狀花亦有淺黄者南中桐花有深色者貞桐花貞桐枝端抽赤黄條條復旁對分三層花大如落蘇花黄色一莖上有五六十朶梔子花諸花少六出者唯梔子花六出陶貞白言梔子剪花六出刻房七道其花香甚相傳即西域薝蔔也山茶花山茶葉如茶樹髙者丈餘花大盈寸色如緋十二月開三色石柟花衡山石柟花有紫碧白三色花大如牡丹亦有無花者比閭花白州比閭華其華若羽伐其木為薪終日火不敗木蓮花木蓮花葉似辛夷花類蓮色出鳴玉溪卬州亦有郍伽花郍伽花狀如三春無葉花色白心黄六瓣出在舶上木蘭花長安敦化坊百姓家唐大和中有木蘭一樹花色深紅後桂州觀察使李勃看宅人以五千買之宅在水北經年花紫色異木花唐衞公李徳裕嘗獲異木一株春花紫予思木中一嵗發花唯木蘭碧玫瑰洛中鬻花木者言嵩山深處有碧色玫瑰而今亡矣自郍提槿花下並出酉陽雜俎刺桐花刺桐花狀比圖畫者不類其木為材三四月時布葉繁宻後有赤花間生葉間三五房不得如畫者紅芳滿樹謫緣陳去疾家於閩因語方風物去疾閩之泉州刺桐葉緑而花紅房照物家未殷然與番禺者不同乃知此地所畫者實閩中之本非南海之所産也出投荒雜録懐風花樂逰苑自生玫瑰樹下多苜蓿一名懐風時人或謂之光風風在其間常肅然日照其花有光采故名曰苜蓿懐風茂陵人謂之連枝草出西京雜記躑躅花南中花多紅赤亦彼之方色也唯躑躅為勝嶺北時有不如南之繁多也山谷間悉生二月發時照耀如火月餘不歇出嶺西異物志凌霄花凌霄花中露水損人目出酉陽雜俎分枝荷漢明帝時池中有分枝荷一莖四葉狀如駢蓋實如𤣥珠可以飾珮出酉陽雜俎夜舒荷靈帝時有夜舒荷一莖四蓮其葉夜舒晝卷出酉陽雜俎睡蓮花睡蓮南海有睡蓮夜則花低入水碧蓮花唐室中太傅相國盧公應舉時寄居夀州安豐縣別墅嘗逰芍陂見里人負薪者持碧蓮花一朶公驚問之答曰陂中得之盧公後従事浙西因使淮服話於太尉衛公李徳裕徳裕令搜訪芍陂則無有矣又遍尋於江渚間亦終不能得乃知向者一朶蓋神異耳出尚書故實染青蓮花唐韓文公愈之姪有種花之異聞其說於杜給事孺休與湖州有染户家池生青蓮花刺史命收蓮子歸京種於池沼或變為紅蓮因異之乃致書問染工染工曰我家有公世治靛甕嘗以蓮子浸於甕底俟經嵗年然後種之若以所種青蓮花子為種即其紅矣蓋還本質又何足怪乃以所浸蓮子寄之道士申匡圖又見人以雞矢和土培芍藥花叢其淡紅者悉成深紅染之所益信矣偽蜀王先主將晏駕其年蛾眉山娑羅花悉開白花又荆文獻王未薨前數年溝港城隍悉開白蓮一則染以氣類一則表於凶兆又何疑哉三朶瑞蓮偽蜀主當僭位諸勲貴功臣競起甲第獨偽中令趙廷𨼆起南宅北宅千梁萬拱其諸奢麗莫之與儔後枕江瀆池中有二島嶼遂甃石循池四岸皆種垂楊或間雜木芙蓉池中種藕每至秋夏花開魚躍柳隂之下有士子執卷者垂綸者執如意者執塵尾者譚詩論道者一旦岸之隈有蓮一莖上分兩岐開二朶其時謂之太平無事之秋士女拖香肆豔看者甚衆趙廷𨼆畫圖以進蜀主歎賞其時歌者詠者不少無何禁苑中有蓮一莖岐分三朶蜀主開筵醼召羣臣賞之是時詞臣已下皆貢詩當時有好事者圖以繪事至今傳之藕蘇州進藕其最上者名傷荷藕或云荷名或云葉甘為蟲所傷或云故傷其葉以長其根近多種臺荷實中又生花亦甚異也出國史補蓮實石蓮入水沈唯煎鹹滷能浮之鴈食之糞落山中百年不壊相傳橡子落水為蓮出酉陽雜俎芰芰一名水菜一名蘚苔漢武昆眀池中有浮根菱根出水上葉淪波下亦曰清水芰𤣥都有芰碧色狀如雞飛名翻雞芰仙人鳬伯子常採之出酉陽雜俎菱芰今人但言芰菱諸解草木書亦不分別唯五安貨五陵記言四角曰芰兩角曰菱今蘇州折腰菱多兩角荆州有僧遺段成式一斗郢城菱三角而無芒可以挼莎出酉陽雜俎太平廣記卷四百九
