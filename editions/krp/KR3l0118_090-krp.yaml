body:
  text: 太平廣記卷九十異僧四杯渡釋寳誌杯渡杯渡者不知姓名常乗木杯渡水因而為號初在冀州不修細行神力卓越世莫測其由嘗於北方寄宿一家家有一金像渡竊而將去家主覺而追之見渡徐行走馬逐之不及至於孟津河浮木杯於水憑之渡河不假風棹輕疾如飛俄而渡岸達於京師見時可年四十許帶索襤縷殆不蔽身言語出沒喜怒不均或剖氷扣凍而洗浴或著履上山或徒行入市唯荷一蘆圌子更無餘物嘗往延賢寺法意道人處意以别房待之後欲往瓜歩江於江側就航人告渡不肯載之復累足杯中顧眄言詠杯自然流直渡北岸向廣陵遇村舎李家八闗齋先不相識乃直入齋堂而坐置圌於中庭衆以其形陋無恭敬之心李見蘆圌當道欲移置墻邊數人舉不能動渡食竟提之而去笑曰四天王李家於時有一䜿子窺其圌中有四小兒並長數寸面目端正衣裳鮮潔於是追覓不知所在後三日乃見在西界蒙龍樹下坐李禮拜請還家日日供養渡不甚持齋飲酒噉肉至於辛膾與俗不殊百姓奉上或受不受沛國劉興伯為兖州刺史遣使要之負圌而來興伯使人舉視十餘人不勝伯自看唯見一敗衲及一木杯後李家復得二十餘日清旦忽云欲得一袈裟中時令辦李即經營至中未成渡云蹔出至暝不返合境聞有異香疑之為怪處處覓渡乃見在北巖下敷敗袈裟於地卧之而死頭前脚後皆生蓮華極鮮香一夕而萎邑共殯塟之後日有人從北來云見渡負蘆圌行向彭城乃共開棺唯見敗衣既至彭城遇有白衣黄欣深信佛法見渡禮拜請還家至貧但有麥飯而已渡食之怡然自得半年忽語欣云可覓蘆圌三十六枚吾須用之答云此間止可有十枚貧無以買恐不盡辦渡曰汝但檢覓宅中應有欣即窮檢果得三十六枚列之庭中雖有其數亦多破敗命欣次第熟視皆已新完渡宻封之因語欣令開乃見錢帛皆滿可堪百許萬識者謂杯渡分身他土所得䞋施廻以施欣欣受之皆為功徳經一年許渡辭出欣為辦糧食明晨見糧食皆存不知渡所在經一月許復至京師時潮溝有朱文殊者少奉佛法渡多來其家文殊謂渡云弟子脱捨身沒後願見救濟脱在好處願為法侣渡不答文殊喜佛法黙黙已為許矣後東逰入吳郡路見釣魚師因就乞魚魚師施一餧者渡手㺯反覆還投水逰活而去又見網師更從乞魚網師瞋罵不與渡乃拾取兩石子擲水中俄而有兩水牛鬬其網中網碎敗不復見牛渡亦已隱行至松江乃仰蓋於水中乗而渡岸經渉㑹稽剡縣登天台山數月而反京師少時逰止無定請召或往不往時南州有陳家頗有衣食渡往其家甚見迎奉聞都下復有一杯渡陳父子五人咸不信故下鄉看之果於其家杯渡形相一種陳設一合蜜薑及刀子陸香等伺渡渡即食蜜薑都盡餘物宛在膝前其父子五人恐是其家杯渡即留二弟停都守視餘三人還家見杯渡如舊膝前亦有香刀子等但不噉蜜薑為異爾乃語陳云刀子鈍可為磨之二弟還都云杯渡已移靈鷲寺其家忽求黄紙兩幅作書不成字合同其背陳問上人作何券書渡不答竟莫測其然時吴部民朱靈期使髙麗還值風舶飄經九日至一洲邊洲上有山山甚髙大入山採薪見有人於路靈期乃將數人隨路告乞行十餘里聞磬聲香烟於是共稱佛禮拜須㬰見一寺甚光麗多是七寳莊嚴又見十餘石人乃共禮拜還反行少許聞唱道聲還往更看猶是石人靈期等相謂此是聖僧吾等罪人不能得見因共竭誠懴悔更往乃見真人為期等設食食味是菜而香美不同衆食竟共叩頭禮拜乞速還至鄉有一僧云此間去都乃二十餘萬里但令至心不憂不速也因問期云識杯渡道人不答言甚識因指北壁有一壺掛錫杖及鉢云此是杯渡住處今因君以鉢與之并作書著函中别有一青竹杖謂期言但擲此杖置舫前水中閉目靜坐不假勞力必令速至於是辭别令一沙彌送至門上語曰此道去行七里至船不須從先路去也如言西轉行七里許至船即具如所示唯聞舫從山頂樹木上過都不見水經三日至石頭淮而住亦不復見竹杖所在舫入淮至朱雀乃見杯渡騎大航欄以捶捶之曰馬何不行觀者甚多靈期等在舫遥禮之渡乃自下舫取書并鉢開書視之字無人識者渡大笑曰使我還耶取鉢擲雲中還接之曰我不見此鉢四千年矣渡多在延賢寺法意處時世以此鉢異物競往觀之一説云靈期舫漂至一窮山遇見一僧來云是渡弟子昔持師鉢而死冶城寺今因君以鉢還師但令一人擎鉢舫前自安穩至也期如所教果獲全濟至南州杯渡期當騎蘭之日爾日早出至晚不還陳氏明但見門扇上有青書六字云福徑門靈人降字勁可識其家杯渡遂絶迹矣都下杯渡往來山邑多行神呪時庾常婢偷物而叛四追不擒乃問渡云已死在城江邊空塜中往看果如所言孔寗子時以黄門侍郎在家患痢遣信請渡呪竟云難差見有四鬼皆被傷截寗子泣曰昔孫恩作亂家為軍人所破二親及叔皆被痛酷寗子果死又有齊諧妻胡母氏病衆治不愈被請僧設齋坐有僧勸迎杯渡渡既至一呪病者即愈齊諧伏事為師因為作傳記其從來神異不可備記元嘉三年九月辭諧入東留一萬錢物寄諧請為營齋於是别去行至赤山湖患痢而死諧即為營齋并接屍還塟建康覆舟山至四年有五興邵信者甚奉法遇傷寒病無人敢看乃悲泣念觀音忽見一僧來云是杯渡弟子語云莫憂家師尋來相看答云渡久已死何容得來道人云來復何難便衣帶頭出一合許散與服之病即差又有杜僧哀者住在南岡下昔經伏事杯渡兒病甚篤乃思念恨不得渡與念神呪明日忽見渡來言語如常即為呪病者便愈至五年三月渡復來齊諧家吕道惠聞而怛之杜天期水丘熙等並見皆大驚即起禮拜渡語衆人言年當大凶可勤修福業法意道人甚有徳可往就之修立故寺以禳災禍也須㬰門上有一僧喚渡便辭去云貧道當向交廣之間不復來也齊諧等拜送慇懃於是絶迹頃世亦言時有見者出髙僧傳釋寳誌釋寳誌本姓朱金城人少出家止江東道林寺修習禪業至宋大始初忽如僻異居止無定飲食無時髪長數寸常跣行街巷執一錫杖杖頭挂剪刀及鏡或挂一兩匹帛齊建元中稍見異迹數日不食亦無飢容與人言始苦難曉後皆效驗時或賦詩言如䜟記江東士庶皆共事之齊武帝謂其惑衆收駐建康既旦人見其入市還檢獄中誌猶在焉誌語獄吏門外有兩轝食來金鉢盛飯汝可取之既而齊文惠太子竟陵王子良並送食餉誌果如其言建康令吕文顯以事聞武帝即迎入宫居之後堂一時屏除内宴誌亦隨衆出既而景陽山上猶有一誌與七僧俱帝怒遣推檢其所闗吏啟云誌久出有省方以墨塗其身時僧正法獻欲以一衣遺誌遣使於龍光罽賔二寺求之並云昨宿且去又至其常所造屬侯伯家尋之伯云誌昨在此行道旦眠未覺使還以告獻方知其分身三處宿焉誌常盛束祖行沙門寳亮欲以衲衣遺之未及發言誌忽來引衲而去後假齊武帝神力使見髙帝於地下常受錐刀之苦帝自是永廢錐刀武帝又常於華林園召誌誌忽著三重布帽以見俄而武帝崩文惠太子及豫章王相繼而薨永明中常住東宫後堂一日平明從門出入忽云門上血汚衣褰衣走過及鬰林見害車載出此帝頸血流於門限齊衛尉胡諧疾請誌誌註疏云明日竟不往是日諧亡載屍還宅誌曰明日屍出也齊太尉司馬殷齊之隨陳顯達鎮江州辭誌誌畫紙作樹樹上有鳥語云急時可登此後顯達逆節留齊之鎮州及敗齊之叛入廬山追騎將及齊之見林中有一樹樹上有鳥如誌所畫悟而登之鳥竟不飛追者見鳥謂無人而反卒以見免齊屯騎桑偃將欲謀反往誌遥見而走大呼云圍臺城欲反逆斫頭破腹後有旬事發偃叛往朱方為人所得果斫頭破腹梁鄱陽忠烈王嘗屈誌至第忽令覓荆子甚急既得安於門上莫測所以少時王出為荆州刺史其預鑒之明此𩔖非一誌多往來興皇淨名兩寺及梁武即位下詔曰誌公迹均塵垢神逰㝠漠水火不能焦濡蛇虎不能侵懼語其佛理則聲聞無上談其隱淪則道行髙著豈得以俗士凡情空相拘制何其鄙陋一至於此自今行來隨意出入勿得復禁誌自是多出入禁中長於臺城對梁武帝喫鱠昭明諸王子皆侍側食訖武帝曰朕不知味二十餘年矣師何謂爾誌公乃吐出小魚依依鱗尾武帝深異之如今秣陵尚有鱠殘魚也天監五年冬旱雩祭備至而未降雨忽上啟云誌病不差就官乞活若不啟白官應得鞭杖願於華光殿講勝鬘經請雨梁武即使沙門法雲講勝鬘竟夜便大雨誌又云須一盆水加刀其上俄而天雨大降髙下皆足梁武嘗問誌云弟子煩惑未除何以治之答云十二䜟者以為十二因縁治惑藥也又問十二文㫖答云在書字時節刻漏中識者以為書之在十二時中又問弟子何時得靜心修習答云安藥禁識者以為禁者止也至安藥時乃耳後法雲於華林講法華經至假使風墨誌忽問之有無答云世諦故有第一義則無也誌往復三四畨便笑云若體是假有此亦不可觧難可觧其辭㫖𨼆沒𩔖皆如此有陳征虜者舉家事誌甚篤誌常為其見真形光相如菩薩像焉誌知名顯竒四十餘載士女供事者不可勝數然好用小便濯髪俗僧闇有譏笑者誌亦知衆僧多不斷酒肉譏之者飲酒食猪肚誌勃然謂曰汝笑我以溺洗頭汝何為食盛糞袋譏者懼而慙服晉安王蕭綱初生日梁武遣使問誌誌合掌云皇子誕育幸甚然冤家亦生於後推尋歴數與侯景同年月日而生也㑹稽臨海寺有大得常聞揚州都下有誌公語言顛狂放縱自在僧云必是狐狸之魅也願向都下覓獵犬以逐之於是輕船入海趨浦口欲西上忽大風所飄意謂東南六七日始到一島中望見金裝浮圖干雲秀出遂尋徑而往至一寺院宇精麗花卉芳菲有五六僧皆可年三十美容色並著員緋袈裟倚杖於門樹下言語僧云欲向都下為風飄蕩不知上人此處何州國今四望環海恐本鄉不可復見答曰必欲向揚州即時便到今附書到鍾山寺西行南頭第二房覓黄頭付之僧因閉目坐船風聲定開眼如言奄至西岸入數十里至都徑往鍾山寺訪問都無有黄頭者僧具説委曲報云西行南頭第二房乃風病道人誌公雖言配在此寺在都下聚藥處百日不一度來房空無人也問答之間不覺誌公已在寺厨上乗醉索食人以齋過日晚未與間便奮身惡罵寺僧試遣沙彌繞厨側漫呌黄頭誌公忽云阿誰喚我即逐沙彌來到僧處謂曰汝許將獵犬捉我何為空來僧知是非常人頂禮懴悔授書與之誌公看書云方丈道人喚我不久亦當自還誌公遂屈指云某月日去便不復共此僧語衆但記某月日至天監十三年冬於臺城後堂謂人曰菩薩將去未及旬日無疾而終屍體香軟形貌熙悦臨亡燃一燭以付後閤舍人吳慶慶即啟聞梁武歎曰大師不復留以燭者將以後事屬我乎因厚加殯送塟於鍾山獨龍之阜仍於墓所立開善寺勅陸倕製銘於塜内王筠勒碑文於寺門傳其遺像處處存焉初誌顯迹之始年可無五六十許而終亦不老人誠莫測其年有餘㨗道者居於京師九日臺北自言是誌外舅弟小誌四年計誌亡時應年九十七矣又後魏有沙門寳公者不知何處人也形貌寢陋心識通達過去未來預覩三世發言似䜟不可得觧事過之後始驗其實胡太后問以世事寳公把粟與雞喚朱朱時人莫觧建義元年後為爾朱榮所害始驗其言時有洛陽人趙法和請占早晚當有爵寳公曰大竹箭不須羽東廂屋急手作時人不曉其意經月餘法和父亡大竹箭者苴杖東廂屋者倚廬初造十二辰歌終其言也此寳公與江南者未委是一人也兩人也出髙僧傳及洛陽伽藍記太平廣記卷九十
