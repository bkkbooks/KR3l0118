body:
  text: 太平廣記卷三百四十七宋李昉等編鬼三十二吳任生鄔濤曾季衡趙合韋安之李佐文胡濦吳任生吳郡任生者善視鬼廬於洞庭山貌常若童兒吳楚之俗莫能䆒其甲子寶厯中有前崑山尉楊氏子僑居吳郡常一日里中三數輩相與泛舟俱遊虎丘寺時任生在舟中且語及鬼神事楊生曰人鬼殊途故鬼卒不可見矣任生笑曰鬼甚多人不能識耳我獨識之乃顧一婦人衣青衣擁嬰兒歩於岸生指語曰此鬼也其擁者乃嬰兒之生魂耳楊曰然則何以辨其鬼耶生曰君第觀我與語即厲聲呼曰爾鬼也竊生人之子乎其婦人聞而驚懾遂疾迴去步未十數遽亡見矣楊生且歎且異及晩還去郭數里岸傍一家陳筵席有女巫鼓舞於其左乃醮神也楊生與任生俱問之巫曰今日里中人有嬰兒暴卒今則寤矣故設筵以謝遂命出嬰兒以視則真婦人所擁者諸客驚歎之謝任生曰先生真道術者吾不得而知也出宣室志鄔濤鄔濤者汝南人精習墳典好道術旅泊婺州義烏縣館月餘忽有一女子侍二婢夜至一婢進曰此王氏小娘子也今夕顧降於君濤視之乃絶色也謂是豪貴之女不敢答王氏笑曰秀才不以酒色干懐妾何以奉託濤乃起拜曰凡陋之士非敢是望王氏令侍婢施服翫於濤寢室炳以銀燭又備酒食飲數巡王氏起謂濤曰妾少孤無託今願事君子枕席將為可乎濤遜辭而許恩意欵洽而王氏曉去夕至如此數月濤所知道士楊景霄至館訪之見濤色有異曰公為鬼魅所惑宜斷之不然死矣濤聞之驚以其事具告景霄曰此乃鬼也乃與符二道一施衣帶一置門上曰此鬼來當有怨恨慎勿與語濤依法施之女子是夕至見符門上大罵而去曰來日速除之不然生禍濤明日訪景霄具言之景霄曰今夜再來可以吾呪水洒之此必絶矣濤持水歸至夜女子復至悲恚之甚濤乃以景霄呪水洒之於是遂絶出集異記曾季衡大和四年春監州防禦使曾孝安有孫曰季衡居使宅西偏院室屋壯麗而季衡獨處之有僕夫告曰昔王使君女暴終於此乃國色也晝日其魂或見於此郎君慎之季衡少年好色願覩其靈異終不以人鬼為間頻注名香頗疎凡俗步遊閑處恍然凝思一日晡時有雙鬟前揖曰王家小娘子遣某來傳達厚意欲面拜郎君言訖瞥然而沒俄頃有異香襲衣季衡乃束帶伺之見向雙鬟引一女而至乃神仙中人也季衡揖之問其姓氏曰某姓王字麗真父今為重鎮昔侍從大人牧此城據此室無何物故感君思深杳㝠情激幽壤所以不間存沒頗思神㑹其來乆矣但非吉日良時今方契願幸垂留意季衡留之欵㑹移時乃去握季衡手曰翌日此時再㑹慎勿泄於人遂與侍婢俱不見自此每及晡一至近六十餘日季衡不疑因與大父麾下將校說及艷麗誤言之將校驚懼異其事曰郎君將及此時願一扣壁某當與二三輩潛窺焉季衡亦終不能扣壁是日女郎一見季衡容色慘怛語聲嘶咽握季衡手曰何為負約而洩於人自此不可更接歡笑矣季衡慚悔無詞以應女曰殆非君之過亦㝠數盡耳乃留詩曰五原分袂真吳越燕拆鶯離芳草竭年少烟花處處春北邙空恨清秋月季衡不能詩恥無以酬乃强為一篇曰莎草青青鴈欲歸玉腮珠淚洒臨歧雲鬟飄去香風盡愁見鶯啼紅𣗳枝女遂於襦帶解蹙金結花合子又抽翠玉雙鳯翹一隻贈季衡曰望異日覩物思人無以幽㝠為隔季衡搜書篋中得小金縷花如意酬之季衡曰此物雖非珍異但貴其名如意願長在玉手操持耳又曰此别何時更㑹女曰非一甲子無相見期言訖嗚咽而沒季衡自此寢寐求思形體羸瘵故舊丈人王回推其方術療以藥石數月方愈乃詢五原紉針婦人曰王使君之愛女不疾而終於此院今已歸葬北邙山或隂晦而魂遊於此人多見之則女詩云北邙空恨清秋月也出傳竒趙合進士趙合貌溫氣直行義甚高大和初遊五原路經沙磧覩物悲歎遂飲酒與僕使並醉因寢於沙磧中宵半醒月色皎然聞沙中有女子悲吟曰雲鬟消盡轉蓬稀埋骨窮荒無所依牧馬不嘶沙月白孤魂空逐鴈南飛合遂起而訪焉果有一女子年猶未笄色絶代語合曰某姓李氏居於奉天有姊嫁洛源鎮帥因徃省焉道遭党羌所虜至此撾殺劫其首餙而去後為路人所悲掩於沙内經今三載知君頗有義心儻能為歸骨於奉天城南小李村即某家枌榆耳當有奉報合許之請示其掩骼處女子感泣告之合遂收其骨包於橐中伺旦俄有紫衣丈夫躍騎而至揖合曰知子仁而義信而亷女子啓祈尚有感激我李文恱尚書也元和十三年曾守五原為犬戎三十萬圍逼城池之四隅兵各厚十數里連弩洒雨飛梯排雲穿壁决濠晝夜攻擊城中負户而汲者矢如蝟毛當其時禦捍之兵纔三千激厲其居人婦女老幼負土而立者不知寒餒犬戎於城北造獨脚樓髙數十丈城中巨細咸得窺之某遂設竒計定中其樓立碎𦍑酋愕然以為神功又語城中人曰慎勿拆屋燒吾且為汝取薪積於城下許人釣上又天隂稍晦即聞城之四隅多有人物行動聲言云夜攻城耳城中懾慄不敢暫安某曰不然潛以鐡索下燭而照之乃空驅牛羊行脅其城兵士稍安又西北隅被攻摧十餘丈將入遇昏晦羣胡大喜縱酒狂歌云候明晨而入某以馬弩五百張而擬之遂下皮牆障之一夕併工暗築不使有聲滌之以水時寒來日氷堅城之瑩如銀不可攻擊又羌酋建大將之旗乃贊普所賜立之於五花營内某夜穿壁而奪之如飛衆羌號泣誓請還前擄掠之人而贖其旗釣其長幼婦女百餘人得其盡歸然後擲旗而還之時邠涇救兵二萬人臨其境股慄不進如此相持三十七日羌酋乃遥拜曰此城内有神將吾今不敢欺遂卷甲而去不信宿達宥州一晝而攻破其城老少三萬人盡遭擄去以此利害則余之功及斯城不細但當時時相使余不得仗節出此城空加一貂蟬耳余聞鍾陵韋夫人舊築一隄將防水潦後三十年尚有百姓及亷問周公感其功而奏立德政碑峩然若余當時守壁不堅城中之人盡為羌胡之賤隸豈存今日子孫乎知子有心請白其百姓諷其州尊與立德政碑足矣言訖長揖而退合既受教就五原以語百姓及刺史俱以為妖不聽惆悵而返至沙中又逢昔日神人謝合曰君為言五原無知之俗刺史不明此城當有火災方與祈求幽府吾言於五原之事不諧此意亦息其禍不三旬而及矣言訖而沒果如期災生五原城饉死萬人老幼相食合挈女骸骨至奉天訪得小李村而葬之明日道側合遇昔日之女子來謝而言曰感君之義吾大父乃貞元中得道之士有演參同契續混元經子能窮之龍虎之丹不日而成矣合受之女子已沒合遂捨舉究其𤣥微居於少室燒之一年皆使瓦礫為金寶二年能起斃者三年餌之能度世今時有人遇之於嵩嶺耳出傳竒韋安之韋安之者河陽人時至陽翟擬徃少室尋師至登封逢一人問欲何徃曰吾姓張名道家金鄉欲徃少室山讀書安之亦通姓字所徃一志乃約為兄弟安之年長為兄同入少室師李潛經一年張道博學精通為學流之首一日語安之曰兄事業未全從今去五載方成名官亦不過縣佐安之驚異曰弟何以知之道曰余非人乃㝠司主典也泰嶽主者欲重用為以才識尚寡給一年假於人間學今年限已滿功業稍成將辭君去慎勿洩於人言訖辭其師安之送道下山涕泣而别道曰君成名之後有急當呼道必可救矣安之五年乃赴舉其年擢第授杭州於潛縣尉被州遣部將抵河隂至淇澤浦為淮盗來刼安之遂䖍啓於道俄而雷雨暴至羣盗皆溺安之為龍興縣丞卒出靈異錄李佐文南陽臨湍縣北界祕書郎袁測襄陽掾王汧皆止别業大和六年客有李佐文者旅食二莊佐文琴棊之流頗為袁王之所愛佐文一日向暮將止袁莊僕夫抱衾前去不一二里隂風驟起寒埃昏晦俄而夜黑劣乘獨行迷誤甚逺約三更晦稍息數里之外遥見火燭佐文向明而至至則野中迥室卑狹頗甚中有田叟織芒屩佐文遜辭請託久之方延入户叟云此多豺狼客馬不宜逺縶佐文因移簷下廹火而憇叟曰客本何詣而來此佐文告之叟哂曰此去袁莊乖迂極矣然必俟曉方可南歸而叟之坐後緯蕭障下時聞稚兒啼號甚痛每發聲叟即曰兒可止事已如此悲哭奈何俄則復啼叟輒以前語解之佐文不諭從而詰之叟則低回他說佐文因曰孩幼苦寒何不攜之近火如此數四叟則攜致就爐乃八九歲村女子耳見客初無羞駭但以物畫灰若抱沈恨忽而怨咽驚號叟則又以前語解之佐文問之終不得其情須臾平曉叟即遙指東南喬木曰彼袁莊也去此十里而近佐文上馬四顧乃窮荒大野曾無人迹獨田叟一室耳行三數里逢村婦攜酒一壺紙錢副焉見佐文曰此是巨澤道無人客凌晨何自來也佐文具白其事婦乃撫膺長號曰孰謂人鬼之殊途耶佐文細詢之其婦曰若客云去夜所寄宿之室則我亡夫之殯閭耳我傭居袁莊七年矣前春夫暴疾而卒翌日始齓之女又亡貧窮無力父子同瘞焉守志嫠居官不免稅孤窮無託遂意再行今夕將適他門故來夫女之瘞告訣耳佐文則與同徃比至昨暮之室乃殯宫也歴歴蹤由分明可復婦乃號慟涙如綆縻因棄生業剪髮於臨湍佛寺役力誓死焉其婦姓王開成四年客有見者出集異記胡濦安定胡濦家於河東郡以文學知名大和七年春登進士第時賈餗為禮部侍郎後二年文宗皇帝擢餗相國事是歲冬十月京兆亂餗與宰臣濦以下俱遯去有詔捕甚急時中貴人仇士良䕶左禁軍命部將執兵以窮其跡部將謂士良曰胡濦受賈餗恩今當匿在濦所願得驍健士五百環其居以取之士良可其請於是部將擁兵至濦門召濦出厲聲曰賈餗在君家君宜立出不然與餗同罪濦度其勢不可以理屈抗辭拒之部將怒執濦詣士良戮於轅門之外時濦弟湘在河東郡是日湘及家人見一人無首衣綠衣衣有血濡之迹自門而入步至庭湘大怒命家人逐之遽不見後三日而濦之凶問至出宣室志太平廣記卷三百四十七
