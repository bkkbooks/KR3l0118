body:
  text: 太平廣記卷一百六十二感應二崔恕何瑚陳遺王虛之河南婦人岑文本鄭鮮張楚金羅道悰陵空觀皇甫氏田仁會徐州軍士唐宣宗李彦佐胡生劉行者王法朗郗法遵王暉李夢旗孟熙崔恕譙郡有功曹𡼏天統中濟南來府君出除譙郡功曹清河崔恕弱冠有令德於人時春夏積旱送别者千餘人至此𡼏上衆渴甚來公有思水之色恕獨見一青烏於𡼏中乍飛乍止怪而就焉鳥起見一石方五六寸以鞭撥之清泉湧注盛以銀瓶瓶滿水立竭惟來公與恕供飲而已議者以為德感所致焉時人異之故以為目出酉陽雜俎何瑚梁何瑚字重寶為北征諮議博問彊學幼有令名性淳深事親恭謹母病求醫不乘車馬忽感聖僧體質殊異手執香爐來求齋食而至無早晚故疑其非常如此十餘日母病有瘳僧便辭去留素書般若經一卷因執手曰貧道是二十七賢聖不近相人感檀越至心故來看病者已差貧道宜還言訖前行忽不見而爐煙香氣一旬方歇精誠所感朝野歎嗟因捨别宅為目愛寺也出辯正論陳遺吳人陳遺少為郡吏母好食燋飯遺在役恒帶囊每煮食漉其燋以獻母孫恩作亂遺隨例奔逃母憶遺晝夜哭泣遂失明遺脱難還家入門見母再拜號泣母目忽然開朗出孝子傳王虚之王虚之廬陵西昌人年十三喪父母二十年鹽酢不入口後得重病忽有一人來詣謂之曰君病尋差俄而不見又所住屋室夜有異光庭中橘樹隆冬三實病果尋愈咸以至孝所感出孝子傳河南婦人隋大業中河南婦人養姑不孝姑兩目盲婦以蚯蚓為羮以食之姑怪其味竊藏其一臠留示兒兒見之號泣將錄婦送縣俄而雷雨暴作失婦所在尋見婦自空墮地身及服玩如故而首變為白狗言語如恒自云不孝於姑為天神所罰夫乃斥去之後乞食於道不知所在出冥報記岑文本唐中書令岑文本江陵人少信佛常念誦法華經普門品會乘船於巨江中船壞人盡死文本沒在水中聞有人言但念佛必不死也如是三言之既而隨波涌出已著北岸遂免死後於江陵設齋僧徒集其家有一客僧獨後去謂文本曰天下方亂君幸不預其災終逢太平致富貴也言訖趨出外不見既而文本就齋於自食椀中得舍利二枚後果如其言出法苑珠林鄭鮮唐鄭鮮字道子善相法自知命短念無以可延夢見沙門問之須延命耶可大齋日放生念善持齋奉戒可以延齡得福鮮因奉法遂獲長年出宣驗記張楚金唐則天朝刑部尚書張楚金為酷吏周興搆陷將刑乃仰歎曰皇天后土豈不察忠孝乎奈何以無辜獲罪因泣下數行市人皆為歔欷須臾陰雲四塞若有所感旋降敇釋罪宣示訖天地開朗慶雲紛糾時議言其忠正所致也出御史臺記羅道悰唐司竹園羅道悰上書忤旨配流時有同流者道病卒泣曰所恨委骨異壤道悰曰吾若生還當取同歸遂瘞之而去及還為大水漂蕩失其所在道悰哭吿之請示其靈俄而水際沸涌又咒曰如真在此下更請一沸又然遂得之誌銘可驗負之還鄉出廣德神異錄陵空觀唐景龍四年洛州陵空觀失火萬物並盡惟有一真人巋然獨存乃泥塑為之乃改為聖真觀出朝野僉載皇甫氏唐僕射裴遵慶母皇甫氏少時常持經經函中有小珊瑚樹異時忽有小龍骨一具立於樹側時人以為裴氏休祥上元中遵慶遂居宰輔云爾出廣異記田仁會唐田仁㑹為郢州刺史自暴得雨人歌曰父母育我田使君精誠為人上天聞田中致雨山出雲但願常在不患貧出廣德神異錄徐州軍士唐王智興在徐州法令甚嚴有防秋官健交代歸其妹壻於家中設饌以賀自於厨中磨刀將就坐割羊脚磨訖持之疾行妻兄自堂走入厨倉卒相值鋒正中妻兄心即死所由擒以吿智興訊問但稱過誤本無惡意智興不之信命斬之刀輒自刑者手中躍出徑沒於地三換皆然智興異之乃不殺出因話錄唐宣宗唐大中初京師嘗淫雨涉月將害粢盛分命禱吿百無一應宣宗一日在内殿顧左右曰昔湯以六事自責以身代犧牲雖甚旱卒不為災我今萬姓主逺慙湯德而災若是兆人謂我何乃執鑪降階踐泥焚香仰視若自責者久之御服沾濕感動左右旋踵而急雨止翌日而凝隂開比秋而大有年出貞陵十七史李彦佐李彦佐在滄景唐太和九年有詔詔浮陽兵北渡黄河時冬十二月至濟南郡使擊氷進舟氷觸舟舟覆詔失彦佐驚懼不寢食六日鬂髮白至貌侵膚削從事亦謬其儀形也乃令津吏不得詔盡死吏懼且請公一祝禱于河吏憑公誠明以死索之彦佐乃令具爵酒及祝𫝊語詰河其㫖明天子在上川瀆山嶽祝史咸秩予境之望祀未嘗匱爾河伯洎鱗介之長當衞天子詔何反溺之乎或不獲予將齋吿于天天將謫爾吏酹氷辭已忽有聲如震河氷中斷可三十丈吏知彦佐精誠已達乃沉鈎索而出封角如舊惟篆印微濕耳彦佐所至令嚴務簡推誠於物著聲於官如河水色渾駛流大木與纎芥頃刻千里矣安有舟覆六日一酹而堅氷陷一鈎而沉詔獲得非誠之至乎出闕史胡生列子終於鄭今墓在郊藪謂賢者之跡而或禁其樵採焉里有胡生者家貧少為洗鏡鍍釘之業遇甘果名茶美醖輒祭于禦寇之壟似求聰慧而思學道厯稔忽夢一人刀劃其腹開以一卷之書置于心腑及覺而吟咏之意皆綺美之詞所得不由於師友也既成卷軸尚不棄於猥賤之業真隱者之風逺近號為胡釘鉸太守名流皆仰矚之而門多長者或有遺賂必見拒也或持茗酒而來則忻然接奉其文略説數篇喜圃田韓少府見訪云忽聞梅福來相訪笑著荷衣出草堂兒童不慣見車馬爭入蘆花深處藏又觀鄭州崔郎中諸妓繡樣云日暮堂前花蕊嬌爭拈小筆上牀描繡成安向春園裏引得黄鸚下柳條江際小兒垂釣云蓬頭稚子學垂綸側坐蒼苔草映身路人借問遥招手恐畏魚驚不譍人出雲溪友議劉行者唐廬陵闤闠中有一劉行者以釘鉸為業性至孝母親患眼二十餘年行者懇苦救療一日忽有衲僧㩦淨水銅瓶子覓行者磨洗出百金為酬行者不受吿云家有母親患眼多年和尚莫能有藥療否僧云待磨洗瓶子了與醫磨洗畢便出門而行者隨問之僧云但歸去已與醫了言訖失僧所在行者奔還家見母親忽自牀墜地雙目豁開闔家驚喜方知向者僧是羅漢遂畫其形影供養至今存焉出報應錄王法朗唐䕫州道士王法朗舌大而長呼文字不甚典切常以為恨因發願讀道德經夢老君與剪其舌覺而言詞輕利精誦五千言頗有徵驗出錄異記郗法遵唐道士郗法遵居廬山簡寂觀道行精確獨力檢校已厯數年全無徒弟忽夢𤣥中法師謂之曰汝無人力甚見勤勞今有二童子所恨年小耳既覺話於衆出山過民王家有孩子年纔一晬見法遵抱其足不肯捨遵去晝夜啼號不息遵復至則欣然後數年父母即捨為童子又一小兒姓劉眼有五色光父母疑其怪異因炙眼尾其光遂絶已四五歳亦捨在觀中相次入道果符𤣥中夢授之語矣出錄異記王暉西蜀將王暉嘗任集州刺史集州城中無水泉民皆汲於野外值岐兵急攻州城且絶其水路城内焦渴旬日之間頗有死者王公乃中夜有所祈請哀吿神祗及寐夢一老父吿曰州獄之下當有美泉言訖而去王亦驚寤遲明且命畚鍤於所指之處掘數丈乃有泉流居人飲之蒙活甚衆岐兵比知城中無水意將坐俟其斃王公命汲泉水數十甖於城上揚而示之其寇乃去是日神泉亦竭豈王公精誠之所感耶疎勒拜井之事固不虚耳王後致仕家於雍州嘗言之故記耳出玉堂閒話李夢旗偽蜀拔山軍卒李夢旗經敵擒歸岐陽老母悲泣因瞽雙目夢旗在岐陽䖍祈切至願見慈母三載方還夢旗刺股血㸃母眼即時如故乃知孝道感通其昭然耳出儆誡錄孟熙蜀孟熙販果實養父母承顔順㫖温凊定省出吿反面不憚苦辛父常云我雖貧養得一曾參及父亡絶漿哀號幾至滅性布苫于地寢處其上三年不食鹽酪逺近嘆服因見鼠掘地得黄金數千兩自此巨富焉出儆誠錄太平廣記卷一百六十二
