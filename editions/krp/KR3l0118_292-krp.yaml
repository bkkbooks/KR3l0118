body:
  text: 太平廣記卷二百九十二神二欒侯陽起歐明李高黃原賈逵李憲張璞洛子淵陳虞黃翻陽雍錢祐徐郎丁氏婦阿紫欒侯漢中有鬼神欒侯常在承塵上喜食鮓菜能知吉凶甘露中大蝗起所經處禾稼輙盡太守遣使告欒侯祀以鮓菜侯謂吏曰蝗蟲小事輙當除之言訖翕然飛出吏髣髴其狀𩔖鳩聲如水鳥吏還具白太守即果有衆鳥億萬來食蝗蟲須臾皆盡出列異傳陽起河南陽起字聖卿少時疾瘧於社中得書一卷譴劾百鬼法爲日南太守母至厠上見鬼頭長數尺以告聖卿聖卿曰此肅霜之神劾之來出變形如奴送書至京朝發暮返作使當千人之力有與忿恚者聖卿遣神夜往趣其牀頭持兩手張目正赤吐舌拄地其人怖㡬死出幽明錄歐明廬陵邑子歐明者從賈客道經彭澤湖每過輒以船中所有多少投湖中見大道之上有數吏皆著黒衣乘車馬云是清洪君使要明過明知是神然不敢不往吏車載明須臾見有府舍門下吏卒吏曰清洪君感君有禮故要君以重送君皆勿取獨求如願耳去果以繒帛贈之明不受但求如願神大怪明知之意甚惜之不得已呼如願使隨明去如願者清洪婢常使取物明將如願歸所須輒得之數年成富人意漸驕盈不復愛如願正月歲朝雞初一鳴呼如願如願不即起明大怒欲捶之如願乃走於糞上有昨日故歲掃除聚薪足以偃人如願乃於此逃得去明謂逃在積薪糞中乃以杖捶糞使出又無出者乃知不能得因曰汝但使我富不復捶汝今世人歲朝鷄鳴時輒往捶糞云使人富出博異錄李高王莽時漢中太守五更往祭神廟遺其書刀遣小吏李高還取之見刀在廟牀上有一人著大冠絳袍謂高曰勿道我吾當祐汝後仕至郡守年六十餘忽道見廟神言畢而此刀刺高心下須臾而死莽聞甚惡之出廣古今五行記黄原漢時泰山黃原平旦開門忽有一青犬在門外伏守備如家養原紲犬隨鄰里獵日垂夕見一鹿便放犬犬行甚遲原絶力逐終不及行數里至一穴八百餘步忽有平衢槐柳列植垣墻廻匝原隨犬入門列房可有數十間皆女子姿容妍媚衣裳鮮麗或撫琴瑟或執博棊至北閣有三間屋二人侍値若有所伺見原相視而笑云此青犬所引致妙音壻也一人留一人入閣須臾有四婢出稱太眞夫人白黃郎有一女年已弱笄㝠數應爲君婦既暮引原入内有南向堂堂前有池池中有臺臺四角有徑尺穴穴中有光照暎帷席妙音容色婉妙侍婢亦美交禮既畢晏寢如舊經數日原欲暫還報家妙音曰人神道異本非久勢至明日解佩分袂臨階涕泗後㑹無期深加愛敬若能相思至三月旦可修齋戒四婢送出門半日至家情念恍惚每至其期常見空中有軿車髣髴若飛出法苑珠林賈逵賈逵在豫郡亡家迎䘮去去後恆見形於項城吏民以其戀慕彼境因以立廟廟前有栢樹有人竊來斫伐始投斧刃仍著於樹中所著處尋而更生項城左右人莫不振怖出賈逵碑李憲龍舒陵亭有一大樹高數十丈黃鳥十數巢其上時久旱長老共相謂曰彼樹常有黃氣或有神靈可以祈雨因以酒脯往亭中有寡婦李憲者夜起室中忽見一繡衣婦人曰我樹神也以汝性潔佐汝爲生朝來父老皆欲祈雨吾已求之於帝至明日日中果大雨遂爲立祠憲曰諸卿在此吾居近水當致少鯉魚言訖有鯉數十頭飛集堂下坐者莫不驚悚如此歲餘神曰將有大兵今辭汝去畱一玉環曰持此可以避難後袁術劉表相攻龍舒之民皆流去唯憲里不被兵出搜神記張璞張璞字公直不知何許人也爲吳郡太守徴還道由廬山子女觀於祠室婢使指像人以戲曰以此配汝其夜璞妻夢廬君致聘曰鄙男不肖感垂採擇用致㣲意妻覺怪之婢言其情於是妻懼催璞速發中流舟不爲行闔船震恐乃皆投物於水船猶不行或曰投女則船爲進皆曰神意已可知也以一女而滅一門奈何璞曰吾不忍見之乃上飛廬卧使妻沈女於水妻因以璞亡兄孤女代之置席水中女坐其上船乃得去既璞見女之在也怒曰吾何靣目於當世也乃復投巳女及得渡遙見二女在下有吏立於岸側曰吾廬君主簿也廬君謝君知鬼神非匹又敬君之義故悉還二女問女言但見好屋吏卒不覺在水中也出搜神記洛子淵後魏孝昌時有虎賁洛子淵者自云洛陽人孝昌中戍於彭城其同營人樊元寶得假還京師子淵附書一封云宅在靈臺南近洛水鄉但至彼家人自出相看元寶如其言至靈臺南見無人家徙倚欲去忽見一老翁問云從何而來徬徨於此元寶具向道之老翁云是吾兒也取書引元寶入遂見館閣崇寛屋宇佳麗既坐命婢取酒須臾見婢抱一死小兒而過元寶甚怪之俄而酒至酒色甚紅香羙異常兼設珍羞海陸備有飲訖告退老翁送元寶出云後㑹難期以爲悽恨别甚殷勤老翁還入元寶不復見其門巷但見高崖對水淥波東傾一童子可年十四五新溺死鼻中血出方知所飲酒是其血也及還彭城子淵已失矣元寶與子淵同戌三年不知是洛水之神出洛陽伽藍記陳虞陳虞字君度婦廬江杜氏常事鬼子母羅女樂以娛神後一夕復㑹絃管無聲歌音悽愾杜氏常夢鬼子母遑遽涕泗云凶人將來婢先與外人通以梯布垣登之入神被服將剝奪畢加取影像焚剉而去也出異苑黃翻漢靈帝光和元年遼西太守黄翻上書海邊有流屍露冠絳衣體貌完全翻感夢云我伯夷之弟孤竹君子也海水壞吾棺槨求見掩藏民嗤視之皆無病而死出博物志陽雍魏陽雍河南洛陽人兄弟六人以傭賣爲業公少修孝敬達於遐邇父母沒𦵏禮畢長慕追思不勝心目乃賣田宅北徙絶水漿處大道峻坂下爲居晨夜輦水將給行旅兼補履屩不受其直如是累年不懈天神化爲書生問曰何故不種菜以給答曰無種乃與之數升公大喜種之其本化爲白璧餘爲錢書生復曰何不求婦答曰年老無肯者書生曰求名家女必得之有徐氏右北平著姓女有名行多求不許乃試求之徐氏笑之以爲狂僻然聞其好善戲答媒曰得白璧一雙錢百萬者與婚公即具送徐氏大愕遂以妻之生十男皆令徳俊異位至卿相今右北平諸陽其後也出孝徳傳錢祐會稽餘姚人錢祐夜出屋後爲虎所取十八日乃自還説虎初取時至一官府見一人憑几坐形貎壯偉侍從四十人謂曰吾欲使汝知數術之法留十五日晝夜語諸要術祐受法畢使人送出得還家大知卜占無幽不驗經年廼死出異苑徐郎京口有徐郎者家甚􅀈縷常於江邊拾流柴忽見江中連船葢川而來逕廻入浦對徐而泊遣使往云天女今當爲徐郎妻徐入屋角隱藏不出母兄妹勸勵彊出未至舫先令於别室爲徐郎浴水芬香非世常有贈以繒絳之衣徐唯恐懼累膝牀端夜無醻接之禮女然後發遣以所贈衣物乞之而退家大小怨惜煎罵遂懊歎卒出幽明錄丁氏婦淮南全椒縣有丁新婦者本丹陽丁氏女年十六適全椒謝家其姑嚴酷使役有程不如限者仍便笞捶不可堪九月七日自經死遂有靈響聞於民間發言於巫祝曰念人家婦女作息不倦使避九月七日勿用作見形著縹衣戴青葢從一婢至牛渚津求渡有兩男子共乘船捕魚仍呼求載兩男子笑共調弄之言聽我爲婦言當相渡也丁嫗曰謂汝是佳人而無所知汝是人當使汝入泥死是鬼使汝入水便却入草中須臾有一老翁乘船載葦嫗從索渡翁曰船上無裝豈可露渡恐不中載耳嫗言無苦翁因出葦半許安處不著船中徑渡之至南岸臨去語翁曰吾是鬼神非人也自能得過然宜使民間粗相聞知翁之厚意出葦相渡深有慙感當有以相謝者翁速還去必有所見亦當有所得也翁曰媿燥濕不至何敢蒙謝翁還西岸見兩少男子覆水中進前數里有魚千數跳躍水邊風吹置岸上翁遂棄葦載魚以歸於是丁嫗遂還丹陽江南人皆呼爲丁姑九月七日不用作事咸以爲息日也今所在祠之出搜神記阿紫世有紫姑神古來相𫝊是人妾爲大婦所嫉每以穢事相次役正月十五日感激而死故世人以其日作其形夜於厠間或猪欄邊迎之祝曰子胥不在是其壻名也曹姑亦歸去即其大婦也小姑可出戲捉者覺重便是神來奠設酒果亦覺貌輝輝有色即跳躞不住占衆事卜行年蠶桑又善射鉤好則大儛惡便仰眠平昌孟氏恒不信躬試往捉便自躍穿屋永失所在出異苑太平廣記卷二百九十二
