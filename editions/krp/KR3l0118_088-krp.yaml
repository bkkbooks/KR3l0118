body:
  text: 太平廣記卷八十八異僧二佛圖澄佛圖澄佛圖澄者西域人也本姓帛氏少出家清真㓜學誦經数百萬言以晉懐帝永嘉四年來適洛陽志𢎞大法善念神咒能役使鬼物以麻油雜灰塗掌千里外事皆徹見掌中如對面焉亦能令潔齋者見又聽鈴音以言事無不效驗欲於洛陽立寺值劉曜冦斥洛臺帝京擾亂澄立寺之志遂不果乃潛身草野以觀世變時石勒屯兵葛陂専以殺戮為威沙門遇害者甚衆澄憫念蒼生欲以道化勒於是杖䇿到軍門勒大將郭黑略素奉法澄即投止略家略從受五戒崇弟子之禮略後從勒征伐輙預尅勝負勒疑而問曰孤不覺卿有出衆智謀而每知行軍吉凶何也略曰將軍天挺神武幽靈所助有一沙門術智非常云將軍當略有區夏已應為師臣前後所白皆其言也勒喜曰天賜也召澄問曰佛道有何靈驗澄知勒不逹深理正可以道術為教因言曰至道雖逺可以近事為證即取器盛水燒香呪之須㬰生青蓮華光色曜目勒由此信伏澄因諌曰夫王者徳化洽於宇内則四靈表瑞政弊道消則彗孛見於上恒象著見休咎隨行斯乃古今之常理天人之明戒勒甚悦之凡應被誅殘蒙其益者十有八九於是中州之胡皆願奉佛時有痼疾世莫能知者澄為醫療應時瘳損隂施黙益者不可勝記勒自葛陂還河北過枋頭人夜欲斫營澄語黒略曰須㬰賊至可令公知果如其言有備故不敗勒欲試澄夜冠胄衣甲執刄而坐遣人告澄云夜來不知大將軍所在使人始至未及有言澄逆問曰平居無冦何故夜嚴勒益敬之勒後因忿欲害諸道士并欲苦澄澄乃避至黒略舍語弟子曰若將軍使至問吾所在者報云不知所之使人尋至覓澄不得使還報勒勒驚曰吾有惡意向聖人聖人捨我去矣通夜不寢思欲見澄澄知勒意悔明旦造勒勒曰昨夜何行澄曰公有怒心故權避公今意改是以敢來勒大笑曰道人謬耳襄國城塹水源在城西北五里其水源暴竭勒問澄何以致水澄曰今當勅龍取水勒字世龍謂澄嘲已答曰正以龍不能致水故相問耳澄曰此誠言非戲也水泉之源必有神龍居之往以勅語告之水必可得乃與弟子法首等數人至故泉源上其源故處久已乾燥坼如車轍從者心疑致水難得澄坐繩牀燒安息香呪願數百言如此三日水泫然㣲流有一小龍長五六寸許隨水來出諸道士競往視之澄曰龍有毒勿臨其上有頃水大至隍塹皆滿澄閒坐歎曰後二日當有一小人驚動此下既而襄國人薛合有二子既小且驕輕侮鮮卑奴奴忿抽刄刺殺其弟執兄於室以刀擬心若人入屋便欲加手謂薛合曰送我還國我活汝兒不然共死於此内外驚愕莫敢往觀勒乃自往視之謂薛合曰送奴以全卿子誠為善事此法一開方為後害卿且寛情國有常憲命人取奴奴遂殺兒而死鮮卑段末波攻勒其衆甚盛勒懼問澄澄曰昨日寺鈴鳴云明旦食時當擒段末波與勒登城望波軍不見前後失色曰豈可獲是公安我辭耳更遣䕫安問澄澄曰已獲波矣時城北伏兵出遇波執之澄勸勒宥波遣還本國勒從之卒獲其用時劉載已死載從弟曜簒襲偽立稱元光初光初八年曜遣從弟中山王岳將兵攻勒勒遣石虎率歩騎拒之大戰洛西岳敗保石梁塢虎堅柵守之澄與弟子自官寺至中寺始入寺門歎曰劉岳可憫弟子法祚問其故澄曰昨亥時岳已被執果如所言光初十一年曜自率兵攻洛陽勒欲自往拒曜内外僚佐無不畢諌勒以訪澄澄曰相輪鈴音云秀支替戾岡僕谷劬秃當此羯語也秀支替戾岡出也僕谷劉曜胡位劬秃當捉也此言軍出捉得曜也時徐光聞澄此言苦勸勒乃留長子石𢎞共澄以鎮襄國自率中軍歩騎直指洛城兩陣纔交曜軍大潰曜馬沒水中石堪生擒之送勒澄時以物塗掌觀之見有大衆中縛一人朱絲約其肘因以告𢎞當爾之時正生擒曜也時平之後勒乃僭稱趙天王行皇帝事改元建平是嵗晉成皇帝咸和五年也勒登位已後事澄益篤時石葱叛其年澄戒勒曰今年葱中有蟲食必害人可令百姓無食葱也勒頒告境内慎無食葱到八月石葱果走勒益加尊重有事必諮而後行號大和尚石虎有子名斌後勒以為子勒愛之甚重忽暴病而亡已渉二日勒曰朕聞虢太子死扁鵲能生大和尚國之神人可急往告必能致福澄乃取楊枝咒之須㬰能起有頃平復由是勒諸稚子多在佛寺中養之每至四月八日勒躬自詣寺觀佛像而發願至建平四月四日天靜無風而塔上一鈴獨鳴澄謂衆曰鈴音云國有大䘮不出今年矣是嵗七月勒死太子𢎞襲位少時虎廢𢎞自立遷都於鄴改元建武傾心事澄又重於勒乃下書曰和尚國之大寳榮爵不加髙禄不受榮禄匪頒何以旌徳從此已往宜衣以綾錦乗以雕輦朝㑹之日和尚升殿常侍已下悉助舉舁太子諸公扶輦而上主者唱大和尚衆座皆起以彰其尊又勅偽司空李農旦夕親問太子諸公五日一朝表朕敬焉澄時止鄴城内中寺遣弟子法常北至襄國弟子法佐從襄國還相遇在梁塞城下共宿對車夜談言及和尚比旦各去法佐至始入覲澄澄逆笑曰昨夜爾與法常交車共説汝師耶先民有言不曰敬乎幽而不改不曰慎乎獨而不怠幽獨者敬慎之本而不識乎佐愕然愧懴於是國人每共相語曰莫起惡心和尚知汝及澄之所在無敢向其方而涕唾便利者時太子石邃有二子在襄國澄語邃曰小阿彌比當得疾可往迎之邃即馳信往視果已得疾太醫殷騰及外國道士自言能治澄告弟子法常曰正使聖人復出不愈此疾况此等乎後三日果死石邃荒酒將圖為逆謂内𥪡曰和尚神通儻發吾謀明日來者當先除之澄月望將入覲虎謂弟子僧㑹曰昨夜天神呼我曰明日若入還勿過人我儻有所過汝當止我澄常入必過邃知澄入要候甚苦澄將上南臺僧會引衣澄曰事不得止坐未安便起邃固留不住所謀遂止還寺歎曰太子作亂其形將成欲言難言欲忍難忍乃因事從容箴虎虎終不解俄而事發方悟澄言後郭黒略將兵征長安北山羌墮羌伏中時澄在堂上坐弟子法常在側澄忽慘然改容曰郭公䧟狄令衆生呪願澄又自呪願須㬰更曰若東南出者活餘向則困復更呪願有頃曰脱矣後月餘日黒略還説墮羌圍中東南走馬乏正遇帳下人推馬與之曰公乗此小人乗公馬濟與不濟任命也略得其馬故獲免推驗日時正是澄呪願時也偽大司馬燕公石斌虎以為幽州牧鎮有羣兇湊聚因以肆暴澄戒虎曰天神昨夜言疾牧馬還至秋齊當癱爛虎不解此語即勅諸處牧馬送還其秋有人譛斌於虎虎召斌鞭之三百殺其所生齊氏虎彎弓捻矢自視行斌罰罰輕虎乃手殺五百人澄諌曰心不可縱死不可生禮不親殺以傷恩也何有天子親行罰乎虎乃止後晉軍出淮泗隴北瓦城皆被侵逼三方告急人情危擾虎乃瞋曰吾之奉佛而更致外冦佛無神矣澄明旦早入虎以事問澄因讓虎曰王過世經為大商主至罽賔寺嘗供大㑹中有六十羅漢吾此身亦預斯㑹時得道人謂吾曰此主人命盡當更化身後晉王地今王為王豈非福耶疆場軍冦國之常耳何為怨謗三寳夜興毒念乎虎乃信悟跪而謝焉虎常問澄佛法不殺朕為天下之主非刑殺無以肅清海内既違戒殺生雖復事佛誰獲福耶澄曰帝王事佛當在體恭心順顯揚三寳不為暴虐不害無辜至於兇暴無賴非化所遷有罪不得不殺有惡不得不刑但當殺可殺當刑可刑耳若暴虐恣意殺害非罪雖復輕刑事法無解殃禍願陛下省欲興慈廣及一切則佛教永隆福祚方逺虎雖不能盡從而為益不少虎尚書張離張良家富事佛各起大塔澄謂曰事佛在於清靜無欲慈矜為心檀越雖儀奉大法而貪恡未巳逰獵無度積聚不窮方受玩世之罪何福報之可希耶離等後並被戮滅時又久旱自正月至六月虎遣太子詣臨漳西釡口祈雨久而不降虎令澄自行即有白龍二頭降於祠所其日大雨方數千里其年大收戎貊之徒先不識法聞澄神驗皆遥向禮拜並不言而化焉澄常遣弟子向西城中市香既行澄告餘弟子掌中見買香弟子在某處被刼垂死因燒香呪願遥救䕶之弟子後還云某月某日某處為賊所刼垂當見殺忽聞香氣賊無故自驚曰救兵已至棄之而走虎於臨漳修治舊塔少承露盤澄曰臨淄城内有古阿育王塔地中有承露盤及佛像其上林木茂盛可掘取之即畫圖與使依言掘取果得盤像虎每欲伐燕澄諌曰燕國運未終卒難可尅屢行敗績方信澄戒澄道化既行以人多奉佛皆營造塔廟相競出家真偽混淆多生愆過虎下書問中書曰佛號世尊國家所奉里閭小人無爵秩者為應得奉佛與不又沙門皆應髙潔貞正行能精進然後可為道士今沙門甚衆或有姦宄避役多非其人卿可同議偽中書著作郎王度奏曰夫王者郊視天地祭奉百神載在祀典禮有常饗佛出西域外國之神功不施民非天子諸華所應祠奉往者漢明感夢初傳其道唯聽西域人得立寺都邑以奉其神漢人皆不得出家魏承漢後制亦循前軌今大趙受命率由舊章華戎制異人神流别外不同内饗祭殊禮荒下服禮不宜雜錯國家可斷趙人悉不聽詣寺燒香禮拜以尊典禮其百辟卿士下逮衆𨽻例皆禁之其有犯者與淫祀同罪趙人為沙門者還從四民之服偽中書令王波同度所奏虎下書曰度議云佛是外國之神非天子諸華所可宜奉朕生自邊壤忝當期運君臨諸下至於饗禮應兼從本俗佛是戎神正所應奉夫制由上行永世作則茍事克無虧何拘前代其夷趙百蠻有捨其淫禮樂事佛者悉聽為道於是慢戒之徒因之以厲黄河中舊不生黿忽得一以獻虎澄見而歎曰桓温其入河不久温字元子後果如言也時魏縣有一流民莫識氏族恒著麻襦布裳在魏縣市中乞丐時人謂之麻襦言語卓越狀如狂病乞得米榖不食輙散置大路云飼天馬趙興太守藉㧞收送詣虎先是澄謂虎曰國東二百里某月某日當送一非常人勿殺之也如期果至虎與共語了無異言唯道陛下當終一柱殿下虎不觧此語令送以詣澄麻襦謂澄曰昔在光和中㑹奄至今日酉戎受𤣥命絶歴終有期金離銷於壤邊荒不能尊驅除靈期迹莫巳巳之懿裔苖葉繁其來方積期如何期永以歎之澄曰天廻運極否將不支九木水為難無可以術寧𤣥哲雖存世莫能基必頹久逰閻浮利擾擾多此患行登凌雲宇㑹於虚逰間澄與麻襦講語終日人莫能觧有竊聽者唯得此數言推計似如論數百年事虎遣馬驛送還本縣既出城外辭能歩行云我當有所過未便得發至合口橋可留見待使如言馳去未至合口而麻襦已在橋上考其行歩有若飛也澄有弟子道進學通内外為虎所重嘗言及隐士虎謂進曰有楊軻者朕之民也徴之十餘年不恭王命故往省視傲然而卧雖不得君臨萬邦乘輿所向天沸地涌雖不能令木石屈膝何匹夫而長慠耶昔太公之齊先誅華士太公賢哲豈其謬乎進對曰昔舜優蒲衣禹造伯成魏飾干木漢美周黨管寧不應曹氏皇甫不屈晉世二聖四君共嘉其節將欲激厲貪競以峻清風願陛下遵舜禹之徳勿效太公用刑君舉必書豈可令趙史遂無隱遁之傳乎虎悦其言即遣軻還其所止遣十家供給之進還具以白澄澄睆然笑曰汝言善也但軻命有所縣矣後秦州兵亂軻弟子以牛負軻西奔戍軍追擒并為所害虎嘗晝寢夢見羣羊負魚從東北來寤己訪澄澄曰不祥也鮮卑其有中原乎慕容氏後果都之澄嘗與虎共處中堂澄忽驚曰幽州當火災仍取酒灑之久而笑曰救己得矣虎遣驗幽州云爾日火從四門起西南有黒雲來驟雨滅之雨亦頗有酒氣至虎建武十四年七月石宣石韜將圖相殺宣時到寺與澄同坐浮圖一鈴獨鳴澄謂宣曰觧鈴音乎鈴云胡子洛度宣變色曰是何言與澄謬曰老胡為道不能山居無言重茵美服豈非洛度乎石韜後至澄熟視良久韜懼而問澄澄曰怪公血臭故相視耳至八月澄使弟子十人齋於别室澄時蹔入東閣虎與后杜氏問訊澄曰脇下有賊不出十日自佛圖以西北殿以東當有流血慎勿東行也杜后曰和尚耄耶何處有賊澄即易語云六情所受皆悉是賊老自應耄但使少者不惽遂便寓言不復章的後二日宣果遣人害韜於佛寺中欲因虎臨䘮仍行大逆虎以澄先戒故獲免及宣事發被收澄諫虎曰既是陛下之子何為重禍耶陛下若忍怒加慈者尚可六十餘嵗如必誅之宣當為彗星下掃鄴宫也虎不從以鐵鏁穿宣領牽上薪積而焚之收其官屬三百餘人皆車裂支觧投之漳河澄乃勅弟子罷别空齋也後月餘日有一妖馬髦尾皆有燒狀入中陽門出顯陽門東首東宫皆不得入走向東北俄爾不見澄聞而歎曰災其及矣至十一月虎大饗羣臣於太武前殿澄吟曰殿乎殿乎棘子成林將壊人衣虎令發殿石下視之有棘生焉澄還寺視佛像曰悵恨不得莊嚴獨語曰得三年乎自答不得不得又曰得二年一年百日一月乎自答不得乃無復言還房謂弟子法祚曰戊申嵗禍亂漸萌己酉石氏當滅吾及其未亂先從化矣即遣人與虎辭曰物理必遷身命非保貧道燄幻之軀化期已及既荷恩殊重故逆以仰聞虎愴然曰不聞和尚有疾乃忽爾告終即自出至寺而慰諭焉澄謂虎曰出入生死道之常也脩短分定非所能言夫道重行全徳貴無怠茍操業無虧雖亡若在違而獲延非其所願今意未盡者以國家心存佛理奉法無吝興起寺廟崇顯壯麗稱斯徳也宜享休祉而布政猛烈用刑酷濫顯戾聖典幽背法戒不自懲革終無佛祐若降心易慮惠此下民則國祚延長道俗慶賴畢命就盡沒無遺恨虎悲動嗚咽知其必逝即為鑿壙營墳至十二月八日卒於鄴宫寺是嵗晉穆帝永和四年也士庶悲哀號赴傾國春秋一百一十七年矣仍窆於臨漳西紫陌即虎所創塜也俄而梁犢作亂明年虎死冉閔簒戮石種都盡閔小字棘奴澄先所謂棘子成林者也澄左乳旁先有一孔圍四五寸通徹腹内有時光從中出或以絮塞孔夜欲讀書輙㧞絮則一室洞明又齋日輙至水邊引腸洗之還復内中澄身長八尺風姿甚美妙觧深經旁通世論講説之日正標宗致使始末文言昭然可了加復慈洽蒼生拯救危苦二石兇强虐害非道若不以與澄同日孰可言哉但百姓蒙益日用而不知耳佛天須菩提等數十名僧出自天竺康居不逺數萬之路足渉流沙詣澄受訓樊沔釋道安中山竺法雅並跨越闗河聽澄講説皆妙達精理研測幽㣲澄自説生處去鄴九萬餘里棄家入道一百九年酒不踰齒過中不食非戒不履無欲無求受業追隨常有數百前後門徒㡬且一萬所歴州郡興立佛寺八百九十三所𢎞法之盛莫與先矣初虎殮澄以生時錫杖及鉢内棺中後冉閔簒位開棺唯得鉢杖不得見屍或言澄死之日有人見澄於流沙虎疑其不死因發墓開棺視之唯見一石虎曰石者朕也師𦵏我而去矣未㡬虎死後慕容雋都鄴處石虎宫中每夢見虎嚙其臂意謂石虎為祟乃募覓虎屍於東明館掘得之屍殭不毁雋蹋之罵曰死奴敢怖生天子汝作宫殿成而為汝兒所圖况復他耶鞭撻毁辱投之漳河屍倚橋柱不移秦將王猛乃收而塟之麻襦所言一柱殿也後苻堅征鄴雋子暐為堅大將郭神虎所執寔先夢虎之驗也田融起記云澄未亡數年自營塜壙澄記知塜必開又屍不在中何容預作恐融之謬矣澄或言佛圖澄或言佛屠澄皆取梵音之不同耳出髙僧傳太平廣記卷八十八
