body:
  text: 太平廣記卷二百八書三唐太宗購蘭亭序漢王元昌歐陽詢歐陽通虞世南禇遂良薛稷髙正臣王紹宗鄭廣文李陽冰張旭僧懐素唐太宗唐太宗貞觀十四年自眞草書屏風以示羣臣筆力遒勁爲一時之絕嘗謂朝臣曰書學小道初非急務時或留心猶勝棄日凡諸藝業未有學而不得者也病在心力懈怠不能專精耳又云吾臨古人之書殊不學其形勢惟在骨力及得骨力而形勢自生耳嘗召三品已上賜宴於𤣥武門帝操筆作飛白書衆臣乘酒就太宗手中相競散騎常侍劉洎登御牀引手然後得之其不得者咸稱洎登牀罪當死請付法太宗笑曰昔聞婕妤辭輦今見常侍登牀出尚書故實購蘭亭序王羲之蘭亭序僧智永弟子辨才嘗於寢房伏梁上鑿為闇檻以貯蘭亭保惜貴重於師在日貞觀中太宗以聽政之暇鋭志翫書臨羲之真草書帖搆募備盡唯未得蘭亭尋討此書知在辨才之所乃勅追師入内道塲供養恩賚優洽數日後因言次乃問及蘭亭方便善誘無所不至辨才確稱往日侍奉先師實常獲見自師沒後荐經喪亂墜失不知所在既而不獲遂放歸越中後更推究不離辨才之處又勅追辨才入内重問蘭亭如此者三度竟靳固不出上謂侍臣曰右軍之書朕所徧寳就中逸少之蹟莫如蘭亭求見此書勞於寤寐此僧耆年又無所用若得一智略之士設謀計取之必獲尚書左僕射房𤣥齡曰臣聞監察御史蕭翼者梁元帝之曾孫今貫魏州莘縣負才藝多權謀可充此使必當見獲太宗遂召見翼奏曰若作公使義無得理臣請私行詣彼須得二王雜帖三數通太宗依給翼遂改冠㣲服至洛潭隨商人船下至越州又衣黄衫極寛長潦倒得山東書生之體日暮入寺廵廊以觀壁畫過辨才院止於門前辨才遥見翼乃問曰何處檀越翼就前禮拜云弟子是北人將少許蠶種来賣歴寺縱觀幸遇禪師寒温既畢語議使合因延入房内即共圍碁撫琴投壺握槊談説文史意甚相得乃曰白頭如新傾葢如舊今後無形跡也便留夜宿設缸面藥酒果等江東云缸面猶河北稱甕頭謂初熟酒也酣樂之後請賔賦詩辨才探得来字韻其詩曰初醖一缸開新知萬里来披雲同落寞歩月共徘徊夜乆孤琴思風長旅雁哀非君有祕術誰照不燃灰蕭翼探得招字韻詩曰邂逅欵良宵殷勤荷勝招彌天俄若舊初地豈成遥酒蟻傾還泛心猿躁似調誰憐失羣翼長苦業風飄妍蚩略同彼此諷咏恨相知之晩通宵盡歡明日乃去辨才云檀越閒即更来翼乃載酒赴之其後作詩如此者數四詩酒為務其俗混然經旬朔翼示師梁元帝自書職貢圖師嗟賞不已因談論翰墨翼曰弟子先𫝊二王楷書法弟子自幼来躭翫今亦數帖自隨辨才欣然曰明日来可把此看翼依期而往出其書以示辨才辨才熟詳之曰是即是矣然未佳善也貧道有一真跡頗是殊常翼曰何帖才曰蘭亭翼笑曰數經亂離真跡豈在必是嚮搨偽作耳辨才曰禪師在日保惜臨亡之時親付於吾付受有緒那得參差可明日来看及翼到師自於屋梁上檻内岀之翼見訖故駮瑕指纇曰果是嚮搨書也紛競不定自示翼之後更不復安於伏梁上并蕭翼二王諸帖並借留置于几案之間辨才時年八十餘每日於窓下臨學數遍其老而篤好也如此自是翼往還既數童弟等無復猜疑後辨才出赴邑汜橋南嚴遷家齋翼遂私来房前謂童子曰翼遺却帛子在牀上童子即為開門翼遂于案上取得蘭亭及御府二王書帖便赴永安驛告驛長陵愬曰我是御史奉勅来此今有墨勅可報汝都督知都督齊善行聞之馳来拜謁蕭翼因宣示勅㫖具告所由善行走使人召辨才辨才仍在嚴遷家未還寺遽見追呼不知所以又遣云侍御須見及師来見御史乃是房中蕭生也蕭翼報云奉勅遣来取蘭亭蘭亭今已得矣故喚師来别辨才聞語而便絕倒良乆始蘇翼便馳驛南發至都奏御太宗大悦以𤣥齡舉得其人賞錦綵千段擢拜翼為員外郎加五品賜銀缾一金縷缾一馬腦椀一並實以珠内廄良馬兩匹兼寳裝鞍轡宅莊各一區太宗初怒老僧之祕恡俄以其年耄不忍加刑數月後仍賜物三千段榖三千石便勅越州支給辨才不敢將入己用廼造三層寳墖墖甚精䴡至今猶存老僧因驚悸患重不能彊飯唯歠粥歳餘乃卒帝命供奉搨書人趙模韓道政馮承素諸葛真等四人各搨數夲以賜皇太子諸王近臣貞觀二十三年聖躬不豫幸玉華宫含風殿臨崩謂髙宗曰吾欲從汝求一物汝誠孝也豈能違吾心耶汝意何如髙宗哽咽流涕引耳而聽受制命太宗曰吾所欲得蘭亭可與我將去後隨仙駕入𤣥宫矣今趙模等所搨在者一夲尚直錢數萬也出法書要録又一説王羲之嘗書蘭亭㑹序隋末廣州好事僧得之僧有三寳寳而持之一曰右軍蘭亭書二曰神龜以銅為之龜腹受一升以水貯之龜則動四足行所在能去三曰如意以鐡為文光明洞徹色如水晶太宗特工書聞右軍蘭亭真跡求之得其他夲若第一夲知在廣州僧而難以力取故令人詐僧果得其書僧曰第一寳亡矣其餘何愛乃以如意擊石折而棄之又投龜一足傷自是不能行矣出紀聞漢王元昌唐漢王元昌神堯之子善行書諸王仲季並有能名韓王曹王亦其亞也曹則妙於飛白韓則工於草行魏王魯王亦韓王之倫也出書斷歐陽詢唐歐陽詢字信本博覽今古官至銀青光祿大夫率更令書則八體盡能筆力勁險髙䴡愛其書遣使請焉神堯歎曰不意詢之書名逺播夷狄貞觀十五年卒年八十五詢飛白隸行草入妙大篆章草入能出書斷又率更嘗出行見古碑索靖所書駐馬觀之良乆而去數歩復下馬佇立疲則布毯坐觀因宿其傍三日而後去今開元通寳錢武德四年鑄其文乃歐陽率更書也出國史異纂歐陽通唐歐陽通詢子善書痩怯於父常自矜能書必以𧰼牙犀角為筆管狸毛為心覆以秋兎毫松烟為墨末以麝香紙必須堅薄白滑者乃書之葢自重其書薛純陀亦效歐草傷於肥鈍亦通之亞也出朝野僉載虞世南虞世南字伯施㑹稽人也仕隋為祕書郎煬帝知其才嫉其鯁直一為七品十餘年仕唐至祕書監文皇曰世南一人遂兼五絶一曰博學二曰徳行三曰書翰四曰詞藻五曰忠直有一於此足謂名臣而世南兼之行草之際尤所偏工本師於釋智永及其暮齒加以遒逸卒年八十九伯施隸草行入妙出書斷褚遂良褚遂良河南人父亮太常卿遂良官至僕射善書少則伏膺虞監長則師祖右軍真書甚得其媚趣顯慶中卒年六十四遂良隸行入妙亦嘗師受史陵然史亦有古直傷於疎瘦也出書斷又遂良問虞監曰某書何如永師曰吾聞彼一字直五萬官豈得若此者曰何如歐陽詢虞曰聞詢不擇紙筆皆能如意官豈得若此褚曰既然某何更留意於此虞曰若使手和筆調遇合作者亦深可貴尚褚喜而退出國史異纂薛稷薛稷河南人官至太子少保書學褚尤尚綺䴡媚好膚肉得師之半矣可謂河南公之髙足甚為時所珍尚稷隸行入能出書斷又稷外祖魏徵家富圖籍多有虞褚舊跡鋭精模倣筆態遒䴡當時無及之者又善書博采古跡埒於祕書出譚賓錄髙正臣髙正臣廣平人官至衞尉卿習右軍之法睿宗愛其書張懐素之先與髙有舊朝士就髙乞書或慿書之髙常為人書十五紙張乃戲換其五紙又令示髙再看不悟客曰有人換公書髙笑曰必是張公也乃詳觀之得其三紙客曰猶有在髙又觀之竟不能辨髙嘗許人書一屏障逾時未獲其人乃出使淮南臨别大悵惋髙曰正臣故人在申州正與僕書一𩔖公可便往求之遂立申此意陸柬之嘗為髙書告身高常嫌之不將入帙後為䑕所傷乃持示張公曰此鼠甚解正臣意風調不合一至於此正臣隸行草入能出書斷王紹宗王紹宗字承烈官至祕書少監祖述子敬欽羡柬之其中小真書體象尤異其行書及章草次於真常與人書云鄙夫書翰無工者特由水墨之積習恒精心率意虛神静思以取之每與呉中陸大夫論及此道明朝必不覺已進陸後於密訪知之嗟賞不少將余比虞七以虞亦可臨寫故也但心凖目想而已聞虞眠布被中恒手畫腹皮與余正同也承烈隸行草入能出書斷鄭廣文鄭䖍任廣文博士學書而病無紙知慈恩寺有柿葉數間屋遂借僧房居止日取紅葉學書歳乆殆遍後自寫所製詩并畫同為一卷封進𤣥宗御筆書其尾曰鄭䖍三絕出尚書故實李陽冰李陽冰善小篆自言斯翁之後直至小生曹喜蔡邕不足言開元中張懐瓘撰書斷陽冰張旭並不載綘州有篆字與古不同頗為怪異李陽冰見之寢卧其下數日不能去驗其書是唐初不載書者名姓碑有碧落二字時人謂之碧落碑出國史補張旭張旭草書得筆法後𫝊崔邈顔眞卿旭言始吾聞公主與擔夫爭路而得筆法之意後見公孫氏舞劔器而得其神飲醉輒草書揮筆大呼以頭揾水墨中而書之天下呼爲張顚醒後自視以爲神異不可復得後輩言筆札者歐虞褚薛或有異論至長史無間言出國史補又旭釋褐爲蘇州常熟尉上後旬日有老父過狀判去不數日復至乃怒而責曰敢以閒事屢擾公門老父曰某實非論事但覩少公筆跡竒妙貴爲篋笥之珍耳長史異之因詰其何得愛書答曰先父受書兼有著述長史取視之信天下工書者也自是備得筆法之妙冠於一時出幽閒鼔吹僧懐素長沙僧懐素好草書自言得草聖三昧棄筆堆積埋於山下號曰筆塜出國史補太平廣記卷二百八
