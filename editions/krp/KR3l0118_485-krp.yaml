body:
  text: 太平廣記卷四百八十五宋李昉等編雜傳記二東城老父傳栁氏傳東城老父傳陳鴻譔老父姓賈名昌長安宣陽里人開元元年癸丑生元和庚寅歲九十八年矣視聽不衰言甚安徐心力不耗語太平事厯厯可聼父忠長九尺力能倒曳牛以材官為中宫幕士景龍四年持幕竿随𤣥宗入大明宫誅韋氏奉睿宗朝羣后遂為景雲功臣以長刀備親衛詔徙家東雲龍門昌生七歲趫捷過人能摶柱乗梁善應對解鳥語音𤣥宗在藩邸時樂民間清明節闘雞戲及即位泊雞坊於兩宫間索長安雄雞金毫銕距髙冠昂尾千數養於雞坊𨕖六軍小兒五百人使馴擾教飼上之好之民風尤甚諸王世家外戚家貴主家侯家傾帑破産市雞以償雞直都中男女以弄雞為事貧者弄假雞帝出逰見昌弄木雞於雲龍門道旁召入為雞坊小兒衣食右龍武軍三尺童子入雞羣如狎羣小壮者弱者勇者怯者水榖之時疾病之候悉能知之舉二雞雞畏而馴使令如人䕶雞坊中謁者王承恩言於𤣥宗召試殿庭皆中𤣥宗意即日為五百小兒長加之以忠厚謹宻天子甚愛幸之金帛之賜日至其家開元十三年籠雞三百從封東岳父忠死太山下得子禮奉尸歸塟雍州縣官為塟器喪車乗𫝊洛陽道十四年三月衣闘雞服㑹𤣥宗於温泉當時天下號為神雞童時人為之語曰生兒不用識文字闘雞走馬勝讀書賈家小兒年十三富貴榮華代不如能令金距期勝負白羅繡衫随軟轝父死長安千里外差夫持道輓喪車昭成皇后之在相王府誕聖於八月五日中興之後制為千秋節賜天下民牛酒樂三日命之曰酺以為常也大合樂於宫中歲或酺於洛元㑹與清明節率皆在驪山每至是日萬樂具舉六宫畢從昌冠雕翠金華冠錦袖繡襦袴執鐸拂道羣雞叙立於廣塲顧眄如神指揮風生樹毛振翼礪吻磨距抑怒待勝進退有期随鞭指低昂不失昌度勝負既决强者前弱者後随昌鴈行歸于雞坊角觝萬夫跳劍尋撞蹴毬踏繩舞于竿顛者索氣沮色逡巡不敢入豈教猱擾龍之徒歟二十三年𤣥宗為娶梨園弟子潘大同女男服珮玉女服繡襦皆出御府昌男至德至信天寳中妻潘氏以歌舞重幸于楊貴妃夫婦席寵四十年恩澤不渝豈不敏於伎謹於心乎上生於乙酉雞辰使入朝服闘雞兆亂於太平矣上心不悟十四載胡羯䧟洛潼闗不守大駕幸成都奔衛乗轝夜出便門馬踣道穽傷足不能進杖入南山每進雞之日則向西南大哭禄山往年朝於京師識昌於横門外及亂二京以千金購昌長安洛陽市昌變姓名依於佛舍除地擊鐘施力於佛洎太上皇歸興慶宫肅宗受命于别殿昌還舊里居室為兵掠家無遺物布衣顦顇不復得入禁門矣明日復出長安南門道見妻兒於招國里菜色黯焉兒荷薪妻員故絮昌聚哭訣於道遂長逝息長安佛寺學大師佛㫖大厯元年依資聖寺大德僧運平住東市海池立陁羅尼石幢書能紀姓名讀釋氏經亦能了其深義至道以善心化市井人建僧房佛舍植美草甘木晝把土擁根汲水灌竹夜正觀於禪室建中三年僧運平人夀盡服禮畢奉舍利塔於長安東門外鎮國寺東偏手植松柏百株搆小舍居於塔下朝夕焚香灑掃事師如生順宗在東宫捨錢三十萬為昌立大師影堂及齋舍又立外屋居㳺民取傭給昌因日食粥一杯漿水一升卧草席䋈衣過是悉歸于佛妻潘氏後亦不知所往貞元中長子至信衣并州甲随大司徒燧入覲省昌於長夀里昌如己不生絶之使去次子至德歸販繒洛陽市來往長安間歲以金帛奉昌皆絶之遂俱去不復來元和中頴川陳洪祖携友人出春明門見竹柏森然而香烟聞於道下馬覲昌於塔下聼其言忘日之暮宿鴻祖於齋舍話身之出處皆有條貫遂及王制鴻祖問開元之理亂昌曰老人少時以闘雞求媚於上上倡優畜之家於外宫安足以知朝廷之事然有以為吾子言者老人見黄門侍郎杜暹出為磧西節度攝御史大夫始假風憲以威逺見哥舒翰之鎮凉州也下石堡戌青海城出白龍逾葱嶺界鐵闗總管河左道七命始攝御史大夫見張説之領幽州也每歲入闗輒長轅輓輻車輦河間薊州傭調繒布駕轊連軏坌入闗門輸於王府江淮綺縠巴蜀錦繡後宫玩好而已河州燉煌道歲屯田實邉食餘粟轉輸靈州漕下黄河入太原倉備闗中凶年闗中粟米蔵於百姓天子幸五嶽從官千乘萬騎不食於民老人歲時伏臘得歸休行都市間見有賣白衫白疊布行隣比鄽間有人禳病法用皂布一匹持重價不克致竟以幞頭羅代之近者老人扶杖出門閲街衢中東西南北視之見白衫者不滿百豈天下之人皆執兵乎開元十二年詔三省侍郎有缺先求曽任刺史者郎官缺先求曽任縣令者及老人見四十三省郎吏有理刑才名大者出刺郡小者鎮縣自老人居大道旁往往有郡太守休馬於此者惨然不樂朝廷沙汰使治郡開元取士孝弟理人而已不聞進士宏詞抜萃之為其得人也大畧如此因泣下復言曰上皇北臣穹盧東臣雞林南臣滇池西臣昆夷三歲一來㑹朝覲之禮容臨照之恩澤衣之錦絮飼之酒食使展事而去都中無留外國賔今北胡與京師雜處娶妻生子長安中少年有胡心矣吾子視首飾鞾服之制不與向同得非物妖乎鴻祖黙不敢應而去栁氏傳許堯佐譔天寳中昌黎韓翊有詩名性格頗落托覊滯貧甚有李生者與翊友善家累千金負氣愛才其幸姬曰栁氏豔絶一時喜談謔善謳詠李生居之别第與翊為宴歌之地而館翊于其側翊素知名其所候問皆當世之彦栁氏自門窺之謂其侍者曰韓夫子豈長貧賤者乎遂屬意焉李生素重翊無所恡惜後知其意乃具膳請翊飲酒酣李生曰栁夫人容色非常韓秀才文章特異欲以栁薦枕於韓君可乎翊驚慄避席曰䝉君之恩解衣輟食久之豈宜奪所愛乎李堅請之栁氏知其意誠乃再拜引衣接席李坐翊於客位引滿極歡李生又以資三十萬佐翊之費翊仰栁氏之色栁氏慕翊之才兩情皆獲喜可知也明年禮部侍郎楊度擢翊上第屏居閒歲栁氏謂翊曰榮名及親昔人所尚豈宜以濯浣之賤稽採蘭之美乎且用器資物足以待君之來也翊於是省家於清池歲餘乏食鬻粧具以自給天寳末盜覆二京士女奔駭栁氏以艶獨異且懼不免乃剪髮毁形寄跡法靈寺是時侯希逸自平盧節度淄青素藉翊名請為書記洎宣皇帝以神武返正翊乃遣使間行求栁氏以練囊盛麩金題之曰章䑓栁章䑓栁昔日青青今在否縱使長條似舊垂亦應攀折他人手栁氏捧金嗚咽左右悽憫答之曰楊栁枝芳菲節所恨年年贈離别一葉随風忽報秋縱使君來豈堪折無何有蕃將沙吒利者初立功竊知栁氏之色劫以歸第寵之専房及希逸除左僕射入覲翊得從行至京師已失栁氏所止歎想不已偶於龍首岡見蒼頭以駮牛駕輜軿從兩女奴翊偶随之自車中問曰得非韓員外乎某乃栁氏也使女奴竊言失身沙吒利阻同車者請詰且幸相待於道政里門及期而往以輕素結玉合實以香膏自車中授之曰當遂永訣願寘誠念乃囘車以手揮之輕袖揺揺香車轔轔目斷意迷失於驚塵翊大不勝情㑹淄青諸將合樂酒樓使人請翊翊强應之然意色皆喪音韻悽咽有虞候許俊者以材力自負撫劍言曰必有故願一効用翊不得已具以告之俊曰請足下數字當力致之乃衣縵胡佩雙鞬從一騎徑造沙吒利之第候其出行里餘乃被衽執轡犯闗排闥急趨而呼曰將軍中惡使召夫人僕侍辟易無敢仰視遂升堂出翊扎示栁氏挾之跨鞍馬逸塵斷鞅倐忽乃至引裾而前曰幸不辱命四座驚歎栁氏與翊執手涕泣相與罷酒是時沙吒利恩寵殊等翊俊懼禍乃詣希逸希逸大驚曰吾平生所為事俊乃能爾乎遂獻狀曰檢校尚書金部員外郎兼御史韓翊久列参佐累彰勲效頃從鄉賦有妾栁氏阻絶凶冦依止名尼今文明撫運遐邇率化將軍沙吒利兇恣撓法憑恃微功驅有志之妾于無為之政臣部將兼御史中丞許俊族本幽薊雄心勇决却奪栁氏歸於韓翊義切中抱雖昭感激之誠事不先聞固乏訓齊之令尋有詔栁氏宜還韓翊沙吒利賜錢二百萬栁氏歸翊翊後累遷至中書舍人然即栁氏志防閑而不克者許俊慕感激而不達者也向使栁氏以色𨕖則當熊辭輦之誠可繼許俊以才舉則曹柯澠池之功可建夫事由跡彰功待事立惜欎堙不偶義勇徒激皆不入於正斯豈變之正乎葢所遇然也太平廣記卷四百八十五
