body:
  text: 太平廣記卷四百二十五宋李昉等編龍八張温郭彦郎王宗郎犀浦龍井魚安天龍曹寛夢青衣蛟漢武白蛟潯陽橋王述王植陸社兒長沙女蘇頲鬭蛟洪氏女洪貞老蛟武休潭伐蛟張温王蜀時梓州有張温者好捕魚曽作客館鎮將夏中㩦賔觀魚偶遊近龍潭之下熱甚志不快自入水舉網獲一魚長尺許鬐鱗如金撥剌不已俯㟁人皆異之逡廵晦暝風雨驟作温惶駭奔走數里依然烈景或曰所獲金魚即潭龍也是知龍為魚服自貽其患茍無風雨之變亦難逃鼎俎矣龍潭取魚亦宜戒慎出北夢瑣言郭彦郎世言乖龍苦於行雨而多竄匿為雷神捕之或在古木及楹柱之内若曠野之間無處逃匿即入牛角或牧童之身往往為此物所累而震死也蜀邸有青將郭彦郎者行舟峽江至羅雲溉方食而卧心神恍忽如夢見一黄衣人曰莫錯而於口中探得一物而去覺來但覺咽喉中痛於時篙工輩但見船上雷電晦暝震聲甚厲斯則乖龍入口也南山宣律師乖龍入中指節又非虚説所以孔聖之言迅雷風烈必變可不敬之乎出北夢瑣言王宗郎蜀庚午嵗金州刺史王宗郎奏洵陽縣洵水畔有青烟廟數日廟上烟雲昏晦晝夜奏樂忽一旦水中騰躍時有羣龍出於水上行入漢江大者數丈小者丈餘如五方之色有如牛馬驢羊之形大小五十累累接迹行入漢江却過廟所往復數里或隐或見三日乃止出錄異記犀浦龍癸酉年犀浦界田中有小龍青黒色割為兩片旬日臭敗尋亦失去摩呵池大㕔西面亦有龍井甚靈人不可犯出錄異記井魚成都書䑓坊武侯宅南乗烟觀内古井中有魚長六七寸往往遊於井上水必騰湧相傳井中有龍出錄異記安天龍後唐同光中滄洲民有子母苦於科徭流移近界堼店路逢白蛇其子以繩繫蛇項約而行無何擺其頭落須臾一片白雲起雷電暴作撮將此子上天空中為雷火燒殺墜地而背有大書人莫之識忽有一人云何不以青物蒙之即識其字遂以青裙被之有識字讀之曰此人殺害安天龍為天神所誅葆光子曰龍神物也况有安天之號必能變化無方豈有一豎子繩系而殞之遽致天神之罰斯又何哉出北夢瑣言曹寛石晉時常山帥安重榮將謀干紀其管界與邢䑓連接鬭殺一龍鄉豪有曹寛者見之取其雙角前有一物如簾文如亂錦人莫知之曹寛經年為㓂所殺壬寅年討鎮州誅安重榮也葆光子讀北史見陸法和在梁時將兵拒侯景將任約於江上曰彼龍睡不動吾軍之龍甚自躍踴遂擊之大敗而擒任約是則軍陣之上龍必先鬭常山龍死得非王師大捷重榮授首乎黄巢敗於陳州李克用脱梁王之難皆大雨震雷之助出北夢瑣言夢青衣孟蜀主母后之宫有衛聖神龍堂亦嘗修飾嚴潔盖即世俗之家神也一旦别欲廣其殿宇因晝寢夢一青衣謂后曰今神龍意欲出宫外居止宜于寺觀中安排可也后欲從之而子未許后又夢見青衣重請因𨕖昭覺寺廊廡間特建一廟土木既就繪事云畢遂宣教坊樂自宫中引出奏送神曲歸新廟中奏迎神曲其日𤣥雲四合大風振起及神歸位雨即滂沲或曰衛聖神龍出離宫殿是不祥也逾年國亡滅而去土地歸廟中矣出野人閑話蛟漢武白蛟漢武帝恒以季秋之月泛靈溢之舟於琳池之上窮夜達晝于季䑓之下以香金為鈎縮絲綸以丹鯉為餌不踰旬日釣一白蛟長三四丈若龍而無鱗甲帝曰非龍也於是付大官為鮓而肉紫青脆美無倫詔賜臣下以為神感所獲後竟不得出王子年拾遺記潯陽橋潯陽城東門通大橋常有蛟為百姓害董奉疏符沉水中少日見一蛟死浮出出潯陽記王述吳大帝赤烏三年七月有王述者採藥於天台山時熱息於石橋下臨溪飲忽見溪中有一小青衣長尺餘執一鞭乗赤鯉魚徑入雲中漸漸不見述良乆登峻岩四望見海上風雲起頃刻雷電交鳴俄然將至述懼伏于虗樹中見牽一物如布而色如漆不知所適及天霽又見所乗之赤鯉小童還入溪中乃黒蛟耳出三吳記王植王植新贑人也乗舟過襄江時日晚逺眺謂友朱夀曰此中昔楚昭王獲萍實之處仲尼言童謡之應也夀曰他人以童謡為偶然而聖人必知之言訖見二人自㟁下青衣持蘆杖謂植曰卿來何自植曰自新贑而至於此爾二人曰觀君皆儒士也習何典教植夀曰各習詩禮二人且笑曰尼父云子不語神怪又云敬鬼神而逺之何也夀曰夫子聖人也不言神怪者恐惑典教又言敬鬼神而逺之者以戒彛倫其意在奉宗之孝二人曰善又曰卿信乎曰然二人曰我寔非鬼神又非人𩔖今日偶與卿談乃天使也又謂植曰明日此㟁有李環戴政俱商徒以利剥萬民所貪未已上帝惡欲懲其罪於三日内卿無此泊慎之言訖没於江夀植但驚異之未眀何怪也及眀植謂夀曰有此之不祥可移於逺矣乃牽舟于上流五百餘歩纜訖見十餘大舟自上流而至果泊於植本處植曰可便詳問其故要知姓字於是夀杖䇿而問之二商姓字果如其所言夀心驚曰事定矣乃謂植曰夫隂晦之間惡人之不善今夕方信之矣植曰夫言幽明者以幽有神而神之明奈何不信乎時晉㳟帝元熙元年七月也八日至十日果有大風雷雨而二商一時沉溺植初聞二人之言私告於人及是共觀者有數百人内有耿譚者年七十素諳土事謂植曰此中有二蛟如青蛇長丈餘往往見於波中時化遊於洲渚然亦不甚傷物卿所見二人青衣者恐是此蛟有靈奉上帝之命也出九江記陸社兒陸社兒者江夏民常種稻於江際夜歸路逢一女子甚有容質謂社兒曰我昨自縣前來今欲歸浦里願投君宿然辭色甚有憂容社兒不得已同歸閉室共寢未㡬便聞暴風震雷明照社兒但覺此女驚惶制之不止須臾雷震只在簾前社兒寢室有物突開乗電光見一大毛手拏此女去社兒仆地絶而復蘇及明鄉里異而問之社兒告以女子投宿之事少頃鄉人有渡江來者云此去九里有大蛟龍無首長百餘丈血流注地盤泊數畝有千萬禽鳥臨而噪之也出九江記長沙女長沙有人忘姓名家江邉有女下渚澣衣覺身中有異後不以為患遂姙身生三物皆如鰕魚女以己所生甚憐之著澡盤水中養經三月此物遂大乃是蛟子各有字大者為當洪次者名破阻小者曰撲㟁天暴雨三蛟一時俱去遂失所在後天欲雨此物輙來女亦知其當來便出望之蛟子舉頭望母良乆復去經年此女亡後三蛟一時俱至墓所哭泣經日乃去聞其哭聲狀如狗嘷出續捜神記蘇頲唐蘇頲始為烏程都尉暇日曽與同寮汎舟沿溪醉詠因至道磯寺寺前有霅溪最深處此水深不可測中有蛟螭代為人患頲乗醉歩行還自駱駞橋遇橋壊墮水直至潭底水中有令人扶尚書出遂冉冉至水上頲遂得濟出廣異記鬭蛟唐天寶末歙州牛與蛟鬭初水中蛟殺人及畜等甚衆其牛因飲為蛟所繞直入潭底水中便爾相觸數日牛出潭水赤時人謂為蛟死出廣異記洪氏女歙州祁門縣蛟潭俗傳武陵鄉有洪氏女許嫁與鄱陽黎氏將娶吉日未定蛟化為男子貌如其壻具禮而娶去後月餘黎氏始到知為蛟所娶遂就蛟穴求之於路逢其蛟化為人容貌殊麗其壻心疑為蛟視見蛟竊笑遂殺之果復蛟形又前到蛟穴見其妻并一犬在妻之旁乃取妻及犬以歸始登船而風雨暴至木石飛騰其妻及犬皆化為蛟而去其壻為惡風飄到餘姚後數年歸焉其後道人許旌陽又斬蛟于此仍以板窒其穴今天清日朗尚有彷彿見之出歙州圖經洪貞雞籠山在婺源縣南九十五里髙一百六十丈廻環一十五里九十步形如雞籠焉唐開元中有蛟龍變為道人歙人洪貞以弟子之禮師之道流將卜居尋諸名山到黄山貞問此山何如道流曰确而寒次到飛布山又問之道流曰髙而無輔到此山又問之道流曰此山宜葬葬者可致侯王不然即出妖怪而已貞問其所以而不之告道流于室中寢貞入但見蛟龍由是候睡覺而辭歸道流遂入鄱陽而去貞歸遷其父於此山後二年鄱陽洪水大發漂蕩數千家貞本好道常焚香持念頗有方術居於祁南之廻玉鄉鄉人遂稱其變現神通將圖非望潛署百官州中豪傑皆應之後州發兵就捕獲數十人而貞竟不知所在出述異紀老蛟蘇州虎邱寺山世言吳王闔閭陵有石穴出于岩下若嵌鑿狀中有水深不可測或言秦王鑿取劍之所唐永泰中有少年經過見一美女在水中浴問少年同戲否因前牽拽少年遂解衣而入因溺死數日尸方浮出而身盡乾枯其下必是老蛟潛窟媚人以吮血故也其同行者述其狀云出通幽記武休潭王蜀先主時修斜谷閣道鳯州衙將白某忘其名掌其事焉至武休潭見一婦人浮水而来意其溺者命僕夫鈎至㟁濵忽化為大蛇没於潭中白公以為不祥因而致疾愚為誦岑參招北客賦云瞿塘之東下有千歳老蛟化為婦人炫服靚粧游於水濵白公聞之方悟蛟也厥疾尋瘳又内官宋愈昭自言於栁州江㟁為二三女人所招里民呌而止之亦蛟也岑賦所言斯足為證出北夢瑣言伐蛟月令季秋伐蛟取鼉以明蛟可伐而龍不可觸也蛟之為物不識其形狀非有鱗鬛四足乎或曰虬蜧蛟蝹狀如蛇也南僧説蛟之形如馬蟥即水蛭也涎沫腥粘掉尾纏人而噬其血蜀人號為馬絆蛇頭如猫鼠有一㸃白漢州古城潭内馬絆蛇徃徃害人鄉里募勇者伐之身塗藥游泳於潭底蛟乃躍于沙汭蟠蜿力困里人讙噪以助竟斃之出北夢瑣言太平廣記卷四百二十五
