body:
  text: 太平廣記卷一百六十八氣義三熊執易李約鄭還古江陵士子鄭畋章孝子發塚盜鄭雍楊晟王殷熊執易熊執易赴舉行次潼闗秋霖月餘滯於逆旅俄聞鄰店有一士吁嗟數次執易潛問之曰前堯山令樊澤舉制科至此馬斃囊空莫能自進執易造焉遽輟所乗馬倒囊濟之執易其年罷舉澤明年登科出摭言李約李約為兵部員外汧公之子也識度清曠逈出塵表與主客張員外諗同官幷韋徴君况墻東遯世不婚娶不治生業李獨厚於張每與張匡牀静言達旦不寢人莫得知贈張詩曰我有心中事不與韋二説秋夜洛陽城明月照張八約嘗江行與一商胡舟檝相次商胡病固邀相見以二女託之皆絶色也又遺一珠約悉唯唯及商胡死財寳約數萬悉籍其數送官而以二女求配始殮商胡時約自以夜光唅之人莫知也後死胡有親屬來理資財約請官司發掘檢之夜光果在其宻行皆此𩔖也出尚書故事鄭還古鄭還古東都閑居與栁當將軍者甚熟栁宅在履信東街有樓臺水木之盛家甚富妓樂極多鄭往來宴飲與諸妓笑語既熟因調謔之妓以告柳憐鄭文學又貧亦不之怪鄭將入京求官栁開筵餞之酒酣與妓一章曰冶豔出神仙歌聲勝管絃眼看白苧曲欲上碧雲天未擬生裴秀如何乞鄭𤣥莫教金谷水横過墜樓前栁見詩甚喜曰某不惜此妓然吾子方求官事力空困將去固不易支持専待見榮命便發遣入京充賀禮及鄭入京不半年除國子博士栁見除目乃津置入京妓行及嘉祥驛鄭已亡歿旅櫬尋到府界栁聞之悲歎不已遂放妓他適出盧氏雜説江陵士子江陵寓居士子忘其姓名有美姬甚貧求尺題於交廣間遊索去萬計支持五年糧食且戒其姬曰我若五年不歸任爾改適士子去後五年未歸姬遂為前刺史所納在髙麗坡底及明年其夫歸已失姬之所在尋訪知處遂為詩求媒標寄之詩云隂雲漠漠下陽臺惹著襄王更不迴五度看花空有淚一心如結不曽開纎蘿自合依芳樹覆水寧思返舊杯惆悵髙麗坡底宅春光無復下山來刺史見詩遂給一百千及資裝便遣還士子出盧氏雜説鄭畋鄭文公畋字台文父亞曽任桂管觀察使畋生於桂州小字桂兒時西門思恭為監軍有詔徴赴闕亞餞於北郊自以衰年因以畋託之曰他日願以桂兒為念九泉之下不敢忘之言訖泫然流涕思恭誌之及為神䇿軍中尉亞已卒思恭使人召畋館之於第年未及冠甚愛之如甥姪因選師友敎導之畋後官至將相黄巢之入長安西門司恭逃難於終南山畋以家財厚募有勇者訪而獲之以歸岐下温凊侍膳有如父焉思恭終于畋所畋葬於鳯翔西岡松栢皆手植之未幾畋亦卒葬近西門之墳百官造二壠以弔之無不墮淚咸伏其義也出北夢瑣言章孝子章孝子名全益東蜀涪城人少孤為兄全啟養育母疾全啟割股肉以饋其疾果瘳也他日全啟出遊殂於逆旅全益感天倫之恩制斬縗之服又以全啟割肉㗖母遂以火煉指以申至痛仍以銀字寫法華經一部日夕諷誦乃通大義後至成都府樓巷舍於其間傍有丹竈不蓄童僕塊然一室鬻丹得錢數及兩金即刻一𧰼今華亭禪院即居士髙樓之所人謂有黄白之術嘗言於道友曰㸃水銀一兩止一兩銀價若丸作三百粒每粒百錢乃三十千矣其利博哉但所鬻之丹亦神矣居士到蜀之後制土偶於丹竈之側以代執熱之用䕶惜不毁殆四十年大順中物故年至九十八寺僧寫眞於壁節度判官前眉州刺史馮涓撰讚以美之出北夢瑣言發塚盜光啟大順之際褒中有盜發塚墓者經時搜索不獲長吏督之甚嚴忽一日擒獲寘於所司淹延經嵗不得其情拷掠楚毒無所不至欵占既具連及數人皆以為得之不謬矣及臨刑傍有一人攘袂大呼曰王法豈容枉殺平人者乎發塚者我也我日在稠人之中不為獲擒而斯人何罪欲殺之速請釋放旋出丘中所獲之贓驗之略無差異具獄者亦出其贓驗之無差及藩帥躬自誘而問之曰雖自知非罪而受箠楚不禁遂令骨肉偽造此贓希其一死藩帥大駭具以聞於朝廷坐其獄吏枉陷者獲免自言者補衙職而賞之出玉堂閒話鄭雍鄭雍學士未第時求婚於白州崔相公逺纔允許而博陵有事女則隨例塡宫至朱梁開平之前崔氏在内託疾敕令出宫還其本家鄭則復託媒氏致意選日親迎士族婚禮隨其豐儉亦無所闕尋有莊盆之感又杖經朞周莫不合禮士林以此多之美稱籍甚場中翹足望之一舉之甲科封尚書牓下脱白授秘校兼内翰與丘門同敕入不數載而卒出玉堂閒話楊晟楊晟始事鳯翔節度使李昌符累立軍功因而疑之潛欲加害昌符愛妾周氏憫其無辜宻告之由是亡去而獲免後為駕前五十四軍都指揮使除威勝軍節度使建節於彭州撫綏士民延敬賔客洎僧道輩各得其所厚於禮敬人甚懐之李昌符之敗因令求周氏既至以義母事之周氏自以少年復有美色懇有好合之請晟告誓天地終不以非禮偶之每日未視事前必申問安之禮雖厄在重圍未嘗廢也新理之郡兵力不完遽為王蜀先主攻圍保守孤壘救兵不至凡千日為西川所破而害焉有馬歩使安師建者楊氏之腹心也城尅執之蜀先主知其忠烈兾為其用欲寛之師建曰某受楊司徒提拔不敢惜死先主嗟賞而行戮為其設祭而葬之出北夢􅖰言王殷王殷梁開封尹瓚之猶子也乾化中為徐州連率衆叛拒命殺害使臣㸃閲市井而授甲焉有親隨苗温與數輩度其必不濟竊謀作亂事泄被擒刳心而死其妻配𨽻别部軍挍殊不甘挾短刃割乳而殞聞者無不嗟尚出玉堂閒話太平廣記卷一百六十八
