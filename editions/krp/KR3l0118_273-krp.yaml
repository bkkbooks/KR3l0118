body:
  text: 太平廣記卷二百七十三婦人四周皓李秀蘭杜牧劉禹錫李逢吉洛中舉人蔡京武昌妓韋保衡曹生羅虬徐月英周皓太僕卿周皓貴族子多力負氣天寳中皓少年常結客爲花栁之遊竟畜亡命訪城中名姬如蠅襲羶無不獲者時靖恭有姬名夜來稚齒巧笑歌舞絕倫貴公子破産迎之皓時與數軰富者更擅之會一日其母白皓曰某日夜來生日豈可寂寞乎皓與徃還竟求珍貨合錢數十萬會飲其家樂工賀懐智紀孩孩皆一時絶手扄方合忽覺擊門聲甚急皓戒内勿開良乆折闗而入有少年紫衣騎從數十詬其母即將軍高力士之子也母與夜來泣拜諸客將散皓時血氣方剛且恃其力顧從者不相敵因前讓其怙勢攘臂格之紫衣者踣於拳下且絕其頷骨大傷流血皓遂突出時都亭驛所由魏貞有心義好養私客皓以情投之貞乃藏於妻女間時有司追捉急切貞恐蹤露乃夜辦裝具腰白金數鋌謂皓曰汴州周簡老義士也復與郎君當家今可依之且宜謙恭不怠周簡老葢大俠也見魏貞書喜甚皓因拜之爲叔遂言其狀簡老令居一船中戒無妄出供與極厚居歲餘忽聽船上哭泣聲皓潛窺之見一少婦縞衣甚美與簡老相慰其夕簡老忽至皓處問君婚未某有表妹嫁與甲甲卒無子今無所歸可事君子皓拜謝之即夕其表妹歸皓有女二人男一人猶在舟中簡老忽語皓事已息君貌寢必無人識者可遊江淮乃贈百餘千號哭而别於是遂免出酉陽雜爼李秀蘭李秀蘭以女子有才名初五六歲時其父抱於庭作詩詠薔薇其末句云經時未架却心緒亂縱横父恚曰此女子將來富有文章然必爲失行婦人矣竟如其言出玉堂閒話又秀蘭嘗與諸賢會烏程縣開元寺知河間劉長卿有隂疾謂之曰山氣日夕佳長卿對曰衆鳥欣有託舉坐大笑論者兩美之秀蘭有詩曰遠水浮仙棹寒星伴使車葢五言之佳境也上方班姬即不足下比韓英則有餘亦女中之詩豪也嘗賦得三峽流泉歌曰妾家本住巫山雲巫山流水常自聞玉琴彈出轉寥夐直似當時夢中聽三峽迢迢幾千里一時流入深閨裏巨石奔湍指下生飛波走浪絃中起初疑噴湧含雷風又似嗚咽流不通廻湍瀬曲勢將盡時復滴瀝平沙中憶昔阮公爲此曲能使仲容聽不足一彈既罷又一彈願與流泉鎭相續出中興間氣集杜牧唐中書舍人杜牧少有逸才下筆成詠弱冠擢進士第復捷制科牧少雋性疎野放蕩雖爲檢制而不能自禁會丞相牛僧孺出鎭揚州辟節度掌書記牧供職之外唯以宴遊爲事揚州勝地也每重城向夕倡樓之上常有絳紗燈萬數輝羅燿列空中九里三十歩街中珠翠塡咽邈若仙境牧常出沒馳逐其間無虚夕復有卒三十人易服隨後潛䕶之僧孺之密教也而牧自謂得計人不知之所至成歡無不會意如是且數年及徵拜侍御史僧孺於中堂餞因戒之曰以侍御史氣槩逺馭固當自極夷塗然常慮風情不節或至尊體乖和牧因謬曰某幸常自檢守不至貽尊憂耳僧孺笑而不答即命侍兒取一小書簏對牧發之乃街卒之密報也凡數十百悉曰某夕杜書記過某家無恙某夕宴某家亦如之牧對之大慙因泣拜致謝而終身感焉故僧孺之薨牧爲之誌而極言其美報所知也牧既爲御史乆之分務洛陽時李司徒愿罷鎭閒居聲妓豪華爲當時第一洛中名士咸謁見之李乃大開宴席當時朝客高流無不臻赴以牧持憲不敢邀至牧遣座客逹意願預期會李不得已馳書方對酒獨斟亦已酣暢聞命遽來時會中已飲酒女妓百餘人皆絕藝殊色牧獨坐南行瞪目注視引滿三巵問李云聞有紫雲者孰是李指示之牧復凝睇良乆曰名不虚得宜以見惠李俯而笑諸妓皆亦廻首破顔牧又自飲三爵朗吟而起曰華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時廻意氣閒逸旁若無人牧又自以年漸遲暮常追賦感舊詩曰落魄江湖載酒行楚腰纎細掌中情十年一覺揚州夢嬴得青樓薄倖名又曰觥船一棹百分空十載青春不負公今日鬂絲禪榻畔茶烟輕颺落花風太和末牧復自侍御史出佐沈傳師江西宣州幕雖所至輒遊而終無屬意咸以非其所好也及聞湖州名郡風物妍好且多竒色因甘心遊之湖州刺史某乙牧素所厚者頗喻其意及牧至每爲之曲宴周遊凡優姬倡女力所能致者悉爲出之牧注目凝視曰美矣未盡善也乙復候其意牧曰願得張水嬉使州人畢觀候四面雲合某當閒行寓目冀於此際或有閲焉乙大喜如其言至日兩岸觀者如堵迨暮竟無所得將罷舟艤岸於叢人中有里姥引鵶頭女年十餘歲牧熟視曰此眞國色向誠虚設耳因使語其母將接致舟中姥女皆懼牧曰且不即納當爲後期姥曰他年失信復當何如牧曰吾不十年必守此郡十年不來乃從爾所適可也母許諾因以重幣結之爲盟而别故牧歸朝頗以湖州爲念然以官秩尚卑殊未敢發尋拜黄州池州又移睦州皆非意也牧素與周墀善會墀爲相乃併以三牋干墀乞守湖州意以弟頭目疾冀於江外療之大中三年始授湖州刺史比至郡則已十四年矣所約者已從人三載而生三子牧既即政函使召之其母懼其見奪携幼以同徃牧詰其母曰曩既許我矣何爲反之母曰向約十年十年不來而後嫁嫁已三年矣牧因取其載詞視之俛首移晷曰其詞也直彊之不祥乃厚爲禮而遣之因賦詩以自傷曰自是尋春去校遲不須惆悵怨芳時狂風落盡深紅色緑葉成隂子滿枝出唐闕史劉禹錫劉禹錫赴任姑蘇道過揚州州帥杜鴻漸飲之酒大醉而歸驛稍醒見二女子在旁驚非巳有也乃曰郎中席上與司空詩特令二樂妓侍寢且醉中之作都不記憶明旦修啓致謝杜亦優容之夫禹錫以郎吏州牧而輕忤三司豈不過哉詩曰高髻雲鬟宫樣粧春風一曲杜韋娘司空見慣尋常事斷盡蘇州刺史腸出雲谿友議李逢吉李丞相逢吉性彊愎而沉猜多忌好危人略無怍色既爲居守劉禹錫有妓甚麗爲衆所知李恃風望恣行威福分務朝官取容不暇一旦隂以計奪之約曰某日皇城中堂前致宴應朝賢寵嬖並請早赴境會稍可觀矚者如期雲集敕閽吏先放劉家妓從門入傾都驚異無敢言者劉計無所出惶惑吞聲又翌日與相善數人謁之但相見如常從容乆之並不言境㑹之所以然者座中黙然相目而已既罷一揖而退劉歎咤而歸無可奈何遂憤懣而作四章以擬四愁云爾玉釵重合兩無縁魚在深潭鶴在天得意紫鸞休舞鏡寄言青鳥罷銜牋金盆已覆難收水玉軫長抛不續絃若向蘼蕪山下過遥將紅淚灑窮泉鸞飛遠樹栖何處鳳得新巢已去心紅璧尚留香漠漠碧雲初散信沈沈情知㸃汚投泥玉猶自經營買笑金從此山頭似人石丈夫形狀淚痕深人曾何處更尋看雖是生離死一般買笑樹邉花已老畫眉牕下月猶殘雲藏巫峽音容斷路隔星橋過徃難莫怪詩成無淚滴盡傾東海也須乾三山不見海沈沈豈有仙蹤更可尋青鳥去時雲路斷姮娥歸處月宫深紗窻遙想春相憶書幌誰憐夜獨吟料得夜來天上鏡只因偏照兩人心見本事詩洛中舉人舉子某乙洛中居人也偶與樂妓茂英者相識英年甚小及乙到江外偶於飲席遇之因贈詩曰憶昔當初過栁樓茂英年小尚嬌羞隔牕未省聞高語對鏡曾窺學上頭一别中原俱老大重來南國見風流彈絃酌酒話前事零落碧雲生暮愁舉子因謁節使遂客遊留連數月帥遇之甚厚宴飲既頻與酒糺諧戲頗洽一日告辭帥厚以金帛贐行復開筵送别因暗留絶句與糺曰少揷花枝少下籌須防女伴妬風流坐中若打占相令除却尚書莫㸃頭因設舞曲遺詩帥取覽之當時即令人所在送付舉子出盧氏雜説蔡京邕南節度使蔡京過永州永州刺史鄭史與京同年連以酒樂相邀座有瓊枝者鄭之所愛而席之最妍蔡彊奪之行鄭莫之競也邕南之所爲多如此類爲德義者見鄙終其不悛也及邕南制禦失律伏法出雲谿友議武昌妓韋蟾亷問鄂州及罷任賔僚盛陳祖席蟾遂書文選句云悲莫悲兮生别離登山臨水送將歸以牋毫授賔從請續其句座中悵望皆思不屬逡廵女妓泫然起曰某不才不敢染翰欲口占兩句韋大驚異令隨口寫之武昌無限新栽桞不見楊花撲面飛座客無不嘉歎韋令唱作楊柳枝詞極歡而散贈數十箋納之翌日共載而發出杼情詩韋保衡韋保衡嘗訪同人方坐李鉅新及第亦繼至保衡以其後先匿於帷下既入曰有客乎同人曰韋保衡秀才可以出否鉅新及第甚自得意徐曰出也何妨保衡竟不之出洎保衡尚公主為相李蠙鎮岐下鉅方自山北舊從事辟焉初保衡既登第獨孤雲除東川辟在幕下樂籍間有佐飲者副使李甲屬意也時以逼於他適私期廻將納焉保衡既至不知之祈於獨孤且請降其籍李至意殊不平每在宴席輒以語侵保衡保衡不能容即携其妓人以去李益怒之屢言於雲雲不得已命飛牒追之而廻無何堂牒追保衡赴輦下乃尚同昌公主也李固懼之矣不日保衡復入翰林李聞之登時而卒出玉泉子曹生盧常侍鉟牧瀘江日相座囑一曹生令署郡職不免奉之曹悦營妓名丹霞盧沮而不許會餞朝客於短亭曹獻詩曰拜玉亭間送客忙此時孤恨感離鄉尋思徃歲絕纓事肯向朱門泣夜長盧演爲長句和而勉之曰桑扈交飛百舌忙祖亭聞樂倍思鄉樽前有恨慙卑宦席上無寥愛艶粧莫爲狂花迷眼界須求眞理定心王遊蜂採掇何時已秪恐多言議短長出盧懐杼情集羅虬羅虬詞藻富贍與宗人隠鄴齊名咸通乾符中時號三羅廣明庚子亂後去從鄜州李孝恭籍中有紅兒者善爲音聲常爲副戎屬意會副戎聘鄰道虬請紅兒歌而贈之繒綵孝恭以副車所盼不令受之虬怒拂衣而起詰旦手刃紅兒既而思之乃作絶句百編號比紅兒詩大行於時岀摭言徐月英江淮間有徐月英者名娼也其送人詩云惆悵人間萬事違兩人同去一人歸生憎平望亭中水忍照鴛鴦相背飛又云枕前淚與階前雨隔箇牕兒滴到明亦有詩集金陵徐氏諸公子寵一營妓卒乃焚之月英送塟謂公子曰此娘平生風流沒亦𢃄焰時號美戲也出北夢瑣言太平廣記卷二百七十三
