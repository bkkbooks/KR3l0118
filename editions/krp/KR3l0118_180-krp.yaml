body:
  text: 太平廣記卷一百八十貢舉三常衮宋濟牛錫庶崔元翰湛賁尹極李程蔡南史牛僧孺楊虞卿苗纉費冠卿李固言殷堯藩施肩吾張正甫馮陶張環楊三喜常衮唐徳宗初即位宰相常衮為福建觀察使治其地衮以辭進鄉縣小民有能讀書作文辭者親與之為主客之禮觀遊宴饗必召與之時未㡬皆化翕然於時歐陽詹獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始也詹死於國子四門助教隴西李翺為𫝊韓愈作哀辭出韓愈歐陽詹哀詞序文宋濟唐徳宗㣲行一日夏中至西明寺時宋濟在僧院過夏上忽入濟院方在忩下特鼻葛巾抄書上曰茶請一椀濟曰鼎水中煎此有茶味請自潑之上又問曰作何事業兼問姓行濟曰姓宋第五應進士舉又曰所業何曰作詩又曰聞今上好作詩何如宋濟云聖意不測語未竟忽従輦遞到曰官家官家濟惶懼待罪上曰宋五大坦率後禮部放牓上命内臣看有濟名使迴奏無名上曰宋五又坦率也出盧氏小說或有客譏宋濟曰白袍子何紛紛濟曰為朱袍紫袍紛紛耳出國史補牛錫庶牛錫庶性静退寡合累舉不第貞元元年因問日者曰君明年合狀頭及第錫庶但望偶中一第耳殊不信也時已八月未命主司偶至少保蕭昕宅前值昕杖䇿將獨逰南園錫庶遇之遽投刺并䞇所業昕獨居方思賓友甚喜延與之語及省文卷再三稱賞因問曰外間議者以何人當知舉錫庶對曰尚書至公為心必更出領一嵗昕曰必不見命若爾君即狀頭也錫庶起拜謝復坐未安忽聞馳馬𫝊呼曰尚書知舉昕遽起錫庶復再拜曰尚書適已賜許皇天后土實聞斯言昕曰前言期矣明年果狀頭及第出逸史崔元翰崔元翰為楊炎所引欲拜補闕懇曰願舉進士由此獨步塲中然不曉程試先求題目為地崔敖知之旭日都堂始開敖盛氣白主司曰若出白雲起封中題敖請退主司為其所中卒愕然換之是嵗二崔俱㨗出國史補湛賁彭伉湛賁俱𡊮州宜春人伉妻又湛姨也伉舉進士擢第湛猶為縣吏妻族為置賀宴皆官人名士伉居席之右一座盡傾湛至命飯於後閣甚無難色其妻忿然責之曰男子不能自勵窘辱如此復何為容湛感其言孜孜學業未數載一舉登第伉常侮之其時伉方跨驢縦逰於郊郛忽有家僮馳報湛郎及第伉失聲而墜故𡊮人謔曰湛賁及第彭伉落驢出摭言尹極貞元七年杜黄裳知舉聞尹極時名籍籍乃㣲服訪之問塲中名士極唯唯黄裳乃具告曰某即今年主司也受命久矣唯得一人某他不能盡知敢以為請極聳然謝曰既辱下問敢有所𨼆即言子弟有崔元略孤進有沐藻令狐楚數人黄裳大喜其年極狀頭及第試珠還合浦賦藻賦成忽假寐夢人吿曰何不叙珠來去之意既寤乃改數句及謝恩黄裳謂藻曰叙珠來去如有神助出閩川名士𫝊李程李程貞元中試日五色賦先榜落矣初出試楊於陵省宿歸第遇程於省門詢之所試程探靴靿中得賦藁示之其破題曰徳動天鑒祥開日華於陵覽之謂程曰公今須作狀元翌日雜文無名於陵深不平乃於故冊子末繕寫而斥其名氏攜之以詣主文從容紿之曰侍即今者新賦試奈何用舊題主文辭以非也於陵曰不止題目向有人賦此韻脚亦同主文大驚於陵乃出程賦示之主文歎賞不已於陵曰當今塲中若有此賦侍即何以待之主文曰無則已有即非狀元不可也於陵曰茍如此侍郎已遺賢矣此乃李程所作亟命取程所納而對不差一字主文因面致謝謀之於陵於是擢為狀元前牓不復收矣或云出牓重收程後出鎮大梁聞浩虚舟應宏詞復賦此題頗慮浩愈於已専馳一介取原本既至將啓緘尚有憂色及覩浩破題曰麗日焜煌中含瑞光程喜曰李程在裹出摭言蔡南史貞元十二年駙馬王士平與義陽公主反目蔡南史獨孤申叔播為樂曲號義陽子有團雪㪚雪之歌徳宗聞之怒欲廢科舉後但流斥南史乃止出國史補牛僧孺牛僧孺始舉進士致琴書於灞滻間先以所業謁韓愈皇甫湜時首造愈值愈他適留卷而已無何愈訪湜時僧孺亦及門二賢覽刺忻然同契延接詢及所止對曰某方以薄技小醜呈於宗匠進退惟命一囊猶寘於國門之外二公披卷卷首有說樂一章未閱其詞遽曰斯髙文且以拍板為何等對曰謂之樂句二公相顧大喜曰斯髙文必矣僧孺因謀所居二公沈然良久乃曰可於客户稅一廟院僧孺如所教造門致謝二公又誨之曰某日可逰青龍寺薄暮而歸二公聮鑣至彼因大署其門曰韓愈皇甫湜同訪㡬官不遇翌日輦轂名士咸觀焉竒章之名由是赫然矣僧孺既及第過堂宰相謂曰掃㕔奉候僧孺獨出曰不敢衆聳異之出摭言楊虞卿楊虞卿及第後舉宏詞為挍書來淮南就李鄘婚姻遇前進士陳商啓䕶窮窘虞卿未相識聞之倒囊以濟出摭言苗纘苗粲子纘應舉而粲以中風語澀而心緒至切臨試又疾亟纘乃為狀請許入試否粲猶能把筆淡墨為書曰入入其父子之情切如此其年纘及第出嘉話錄費冠卿費冠卿元和二年及第以祿不及親永懐㒺極之念遂𨼆於池陽九華山長慶中殿中侍御史李行修舉冠卿孝節徴拜右拾遺制曰前進士費冠卿嘗與計偕以文中第祿不及於榮養恨毎積於永懐遂乃屏身丘園絶跡仕進守其至性十有五年峻節無雙清颷自逺夫旌孝行舉逸人所以厚風俗而敦名教也宜陳髙奬以儆薄夫擢參近侍之榮載佇移忠之效可右拾遺冠卿竟不應徵命出摭言李固言李固言生於鳯翔莊墅性質厚未熟造謁始應進士舉舎於親表栁氏京第諸栁昆仲率多謔戯以固言不閑人事俾信趨揖之儀候其磬折宻於頭巾上帖文字云此處有居僦賃固言不覺及出朝士見而笑之許孟容為右常侍于時朝中薄此官號曰貂脚頗不能為後進延譽固言始以所業求見謀於諸栁諸栁與導行卷去處先令投許常侍固言果詣之孟容謝曰某官緒閑冷不足發君子聲彩雖然亦藏之於心又暏頭巾上文字知其樸質無何來年許知禮闈乃以固言為狀頭出摭言殷堯藩元和九年韋貫之牓殷堯藩雜文落矣陽漢公乃貫之前牓門生盛言堯藩之屈貫之為之重收出摭言施肩吾施肩吾元和十年及第以洪州之西山乃十二真君羽化之地靈跡具存慕其真風髙蹈於此嘗賦閒居遣興七言詩一百韻大行於世出摭言張正甫張正甫為河南尹裴度銜命伐淮西置宴府西亭裴言一舉人詞藝好解頭張正色曰相公此行何為也争記得河南解頭裴有慙色出摭言馮陶馮宿之三子陶韜圖兄弟連年進士及第連年登宏詞科一時之盛代無比焉當太和初馮氏進士及第者海内十人而公家兄弟叔姪八人出𫝊載故實張環張環兄弟七人並舉進士出談實錄楊三喜楊敬之拜國子司業次子戴進士及第長子三史登科時號楊三喜出摭言太平廣記卷一百八十
