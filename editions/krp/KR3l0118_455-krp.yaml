body:
  text: 太平廣記卷四百五十五宋李昉等編狐九張直方張謹昝規狐龍滄渚民民婦張直方唐咸通庚寅嵗盧龍軍節度使檢挍尚書左僕射張直方抗表請修入覲之禮優詔允焉先是張氏世蒞燕土燕民世服其恩禮燕臺之嘉賔撫易水之壯士地沃兵庶朝廷每姑息之洎直方之嗣事也出綺紈之中據方嶽之上未嘗以民間休慼為意而酣酒于室滛獸于原巨賞狎于皮冠厚寵集於緑幘暮年而三軍大怨直方稍不自安左右有為其計者乃盡室西上至京懿宗授之左武衛大將軍而直方飛蒼走黄莫親徼道之職徃徃設罝罘於通道則犬彘無遺臧獲有不如意者立殺之或曰輦轂之下不可専戮其母曰尚有尊于我子者耶其僭軼可知也於是諫官列狀上請收付廷尉天子不忍寘于法乃降為燕王府司馬俾分務洛師焉直方至東都既不自新而慢遊愈極洛陽四旁翥者攫者見皆識之必羣噪長嘷而去有王知古者東諸侯之貢士也雖薄渉儒術而數不中春官選乃退逰于山川之上以擊鞠揮觴為事遨遊於南鄰北里間至是有紹介於直方者直方延之覩其利喙贍辭不覺前席自是日相狎壬辰嵗冬十一月知古嘗晨興僦舍無烟愁雲塞望悄然弗怡乃徒歩造直方第至則直方急趨將出畋也謂知古曰能相從乎而知古以祁寒有難色直方顧丱僮曰取短皁𫀆來請知古衣之知古乃上加麻衣焉遂聫轡而去出長夏門則微霰初零由關塞而宻雪如注乃渡伊水而東南踐萬安山之隂麓而鞲弋之獲甚夥傾羽觴燒兎肩殊不覺有嚴冬意及霰開雪霽日將夕焉忽有封狐突起於知古馬首乗酒馳之數里不能及又與獵徒相失須臾雀噪烟瞑莫知所如隠隠聞洛城暮鐘但彷徨於樵徑古陌之上俄而山川暗然若一鼓將半長望間有炬火甚明乃依積雪光而赴之復若十餘里至則喬林交柯而朱門中開皓壁横亘真北闕之甲第也知古及門下馬將徙倚以待旦無何小駟頓轡閽者覺之隔闔而問阿誰知古應曰成周貢士太原王知古也今旦有友人將歸于崆峒舊隠者僕餞之伊水濱不勝離觴既摻𬒮馬逸復不能止失道至此耳遲明將去幸無見讓閽曰此乃南海副使崔中丞之莊也主父近承天書赴闕郎君復隨計吏西征此唯閨闈中人耳豈可淹乆乎某不敢去留請聞于内知古雖怵惕不寜自度中宵矣去將安適乃拱立以俟少頃有秉蜜炬自内至者振管闢扉引保母出知古前拜仍述厥由母曰夫人傳語主與小子皆不在家於禮無延客之道然僻居與山藪接畛豺狼所嘷若固相拒是見溺而不援也請舎外㕔翌日可去知古辭謝從保母而入過重門側㕔所欒櫨宏敞帷幕鮮華張銀燈設綺席命知古坐焉酒三行復陳方丈之饌豹胎魴腴窮水陸之羙者保母亦時來相勉食畢保母復問知古世嗣官族及内外姻黨知古具言之乃曰秀才軒裳令胄金玉竒標既富春秋又潔操履斯實淑媛之賢夫也小君以鍾愛稚女將及笄年常託媒妁為求佳對乆矣今夕何夕獲遘良人潘楊之睦可遵鳯凰之兆斯在未知雅抱何如耳知古歛容曰僕文愧金聲才非玉潤豈室家為望唯泥塗是憂不謂寵及迷津慶逢子夜聆清音於魯館逼佳氣於秦䑓二客遊神方兹莫計三星委照唯恐不揚儻獲託彼彊宗睠以嘉偶則平生所志畢在斯乎保母喜謔浪而入白復出致小君之命曰兒自移天崔門實秉懿範奉蘋蘩之敬知琴瑟之和唯以稚女是懐思配君子既辱髙義乃叶夙心上京飛書路且不遙百兩陳禮事亦非僭忻慰孔多傾矚而已知古罄折而答曰某蟲沙微𩔖分及湮淪而鐘鼎髙門忽䝉採拾有如白水以奉清塵鶴企鳬趨唯待休㫖知古復拜保母戲曰他日錦雉之衣欲觧青鸞之匣全開貎如月暈室若雲迷此際頗相念否知古謝曰以凡近仙自地登漢不有所舉孰能自媒謹當銘彼襟靈志之紳帶期於没齒佩以周旋復拜時則月沈當庭實為良夜保母請知古脱服以休既解麻衣而皁𫀆見保母誚曰豈有縫掖之士而服短後之衣耶知古謝曰此乃假之於與所遊熟者固非已有又問所從答曰乃盧龍張直方僕射所借耳保母忽驚呌仆地色如死灰既起不顧而走入宅遙聞大叱曰夫人差事宿客乃張直方之徒也復聞夫人音叱曰火急逐出無啓㓂讐於是婢子小豎軰羣從秉炬猛曵白棓而登階知古㑌儴趠於庭中四顧遜謝詈言狎至僅得出門纔出已横關闔扉猶聞諠譁未已知古愕立道左自歎久之將隠穨垣乃得馬於其下遂馳去遙望大火若燎原者乃縱轡赴之至則輸租車方飯牛附火耳詢其所則伊水東草店之南也復枕轡假寐食頃而震方洞然心思稍安乃揚鞭於大道比及都門已有直方騎數軰來跡矣遙至其第既見直方而知古憤懣不能言直方慰之坐定知古乃述宵中怪事直方起而撫髀曰山魑木魅亦知人間有張直方耶且止知古復益徒數十人皆射皮飲羽者享以巵酒豚肩與知古復南出既至萬安之北知古前導殘雪中馬跡宛然直詣栢林下至則碑板廢於荒坎樵蘓殘於宻林中列大塚十餘皆狐兎之窟宅其下成蹊於是直方命四周張羅彀弓以待内則束藴荷鍤且掘且燻少頃羣狐突出燋頭爛額者罥掛者應弦飲羽者凡獲狐大小百餘頭以歸出三水小牘張謹道士張謹者好符法學雖苦而無成嘗客遊至華隂市見賣𤓰者買而食之旁有老父謹覺其饑色取以遺之累食百餘謹知其異奉之愈敬將去謂謹曰吾土地之神也感子之意有以相報因出一編書曰此禁狐魅之術也宜勤行之謹受之父亦不見爾日宿近縣村中聞其家有女子啼呼狀若狂者以問主人對曰家有女近得狂疾每日昃輙靚粧盛服云召胡郎來非不療理無如之何也謹即為書符施簷户間是日晚間簷上哭泣且罵曰何物道士預他人家事宜急去之謹怒呵之良久大言曰吾且為奴矣遂寂然謹復書數符病即都差主人遺絹數十匹以謝之謹嘗獨行既有重齎須得傔力停數日忽有二奴詣謹自稱曰德兒歸寶嘗事崔氏崔出官因見捨棄今無歸矣願侍左右謹納之二奴皆謹愿黠利尤可慿信謹東行凡書囊符法行李衣服皆付歸寶負之將及關歸寶忽大罵曰以我為奴如役汝父因絶走謹駭怒逐之其行如風倐忽不見既而德兒亦不見所齎之物皆失之矣時秦隴用兵關禁嚴急客行無驗皆見刑戮既不敢東度復還主人具以告之主人怒曰寜有是事是無厭復將撓我耳因止於田夫之家絶不供給遂為耕夫邀與同作晝耕夜息疲苦備至因憇大樹下仰見二兒曰吾德兒歸寶也汝之為奴苦否又曰此符法我之書也失之已久今喜再獲吾豈無情於汝乎因擲行李還之曰速歸鄉人待爾書符也即大笑而去謹得行李復詣主人方異之更遺絹數疋乃得去自爾遂絶書符矣出稽神録昝規唐長安昝規因喪母又邅火焚其家産遂貧乏委地兒女六人盡孩㓜規無計撫養其妻謂規曰今日貧窮如此相聚受饑寒存活終無路也我欲自賣身與人求財以濟君及我兒女如何規曰我偶喪財産今日窮厄失計教爾如此我實不忍妻再言曰若不如此必盡飢凍死規方允之數日有一老父及門規延入言及兒女飢凍妻欲自賣之意老父傷念良久乃謂規曰我累世家實住藍田下適聞人說君家妻意今又見君言我今欲買君妻奉錢十萬規與妻皆許之老父翌日送錢十萬便挈規妻去仍謂規曰或兒女思母之時但攜至山下訪我當令相見經三載後兒女皆死又貧乏規乃乞食於長安忽一日思老父言因徃藍田下訪之俄見一野寺門宇華麗狀若貴人宅守門者詰之老父命規入設食兼出其妻與規相見其妻聞兒女皆死大號泣遂氣絶其老父驚走入且大怒擬謀害規規亦怯懼走出廻顧已失宅所在見其妻死於古塜前其塜旁有穴規乃自山下共發塜見一老狐走出乃知其妻為老狐所買耳出竒事記狐龍驪山下有一白狐驚撓山下人不能去除唐乾符中忽一日突温泉自浴湏臾之間雲蒸霧湧狂風大起化一白龍昇天而去後或隂暗徃徃有人見白龍飛騰山畔如此三年忽有一老父毎臨夜即哭于山前數日人乃伺而問其故老父曰我狐龍死故哭爾人問之何以名狐龍老父又何哭也老父曰狐龍者自狐而成龍三年而死我狐龍之子也人又問曰狐何能化為龍老父曰此狐也禀西方之正氣而生故白色不與衆遊不與近處狐託於驪山下十餘年後偶合於雌龍上天知之遂命為龍亦猶人間自凡而成聖耳言訖而滅出竒事記滄渚民江南無野狐江北無鷓鴣舊説也晉天福甲辰嵗公安縣滄渚村民辛家犬逐一婦人登木而墜為犬囓死乃老狐也尾長七八尺則正首之妖江南不謂無也但稀有耳蜀中彭漢卭蜀絶無唯山郡徃徃而有里人號為野犬更有黄腰尾長頭黒腰間焦黄或於村落鳴則有不祥事出北夢瑣言民婦世説云狐能魅人恐不虚矣鄉民有居近山林民婦嘗獨出於林中則有一狐忻然搖尾數歩循擾於婦側或前或後莫能遣之如是者為常或聞丈夫至則逺之弦弧不能及矣忽一日婦與姑同入山掇蔬狐亦潛逐之婦姑於叢間稍相逺狐即出草中搖尾而前忻忻然如家犬婦乃誘之而前以裙𥚑裹之呼其姑共擊之舁而還家鄰里競來觀之則瞑其䨇目如有羞赧之狀因斃之此雖有魅人之異而未能變任氏之說豈虚也哉出玉堂閒話太平廣記卷四百五十五
