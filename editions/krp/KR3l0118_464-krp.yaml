body:
  text: 太平廣記卷四百六十四宋李昉等編水族一魚東海大魚鼉魚南海大魚鯨魚鯉魚海人魚南海大蠏海鰌鰐魚吳餘鱠魚石頭魚黄臘魚烏賊魚横公魚骨雷彭蚏鯪魚鯢魚比目魚鹿子魚子歸魚鯸鮧魚鯽魚䱰魚黄魟魚蟕蠵海鷰鮫魚東海大魚東方之大者東海魚焉行海者一日逢魚頭七日逢魚尾魚産則百里水為血出𤣥中記鼉魚博物志云南海有鼉魚斬其首乾之㭬去其齒而更復生者三乃已南州志亦云然又聞廣州人説鰐魚能陸追牛馬水中覆舟殺人值網則不敢觸有如此畏慎其一孕生卵數百於陸地及其成形則有蛇有龜有鼈有魚有鼉有為蛟者凡十數𩔖及其被人捕取宰殺之其靈能為雷電風雨此殆神物龍𩔖出感應經南海大魚嶺南節度使何履光者朱崖人也所居傍大海云親見大異者有三其一曰海中有二山相去六七百里晴朝遠望青翠如近開元末海中大雷雨雨泥狀如吹沫天地晦黑者七日人從山邊來者云有大魚乘流入二山進退不得乆之其鰓挂一崖上七日而山折魚因爾得去雷魚聲也雨泥是口中吹沫也天地黑者是吐氣也其二曰海中有洲從廣數千里洲上有物狀如蟾蜍數枚大者周廻四五百里小者或百餘里每至望夜口吐白氣上屬於月與月争光其三曰海中有山周回數千里每夏初則有大蛇如百仞山長不知幾百里開元末蛇飲其海而水減者十餘日意如渇甚以身繞一山數十匝然後低頭飲水乆之遂拆蛇及山被吞俱盡亦不知吞者是何物也出廣異記鯨魚開元末雷州有雷公與鯨鬬身出水上雷公數十在空中上下或縱火或詬擊七日方罷海邉居人往㸔不知二者何勝但見海水正赤出廣異記鯉魚開元中台州臨海大蛇與鯉魚鬬其蛇大如屋長繞孤島數匝引頭向水其魚如小山鬐目皆赤往來五六里作勢交擊魚用鱗鬐上觸蛇蛇以口下咋魚如是鬬者三日蛇竟為魚觸死出廣異記海人魚海人魚東海有之大者長五六尺狀如人眉目口鼻手爪頭皆為美麗女子無不具足皮肉白如玉無鱗有細毛五色輕軟長一二寸髮如馬尾長五六尺隂形與丈夫女子無異臨海􅀈寡多取得養之於池沼交合之際與人無異亦不傷人出洽聞記南海大蟹近世有波斯常云乘舶泛海往天竺國者已六七度其最後舶漂入大海不知幾千里至一海島島中見胡人衣草葉懼而問之胡云昔與同行侣數十人漂没唯已隨流得至於此因爾採木實草根食之得以不死其衆哀焉遂舶載之胡乃説島上大山悉是車渠瑪瑙玻璃等諸寳不可勝數舟人莫不棄已賤貨取之既滿船胡令速發山神若至必當懐惜於是隨風挂帆行可四十餘里遥見峰上有赤物如蛇形乆之漸大胡曰此山神惜寳來逐我也為之奈何舟人莫不戰懼俄見兩山從海中出髙數百丈胡喜曰此兩山者大蟹螯也其蟹常好與山神鬬神多不勝甚懼之今其螯出無憂矣大蛇尋至蟹許盤鬬良乆蟹夾蛇頭死於水上如連山船人因是得濟也出廣異記海鰌海鰌魚即海上最偉者也小者亦千餘尺吞舟之説固非謬矣每歲廣州常發銅船過南安貨易北人有偶求此行往復一年便成斑白云路經調黎地名海心有山阻東海濤險而急亦黄河之三門也深濶處又見十餘山或出或没初甚訝之篙工曰非山島鰌魚背也果見雙目閃爍鬐鬛若簸米箕危沮之際日中忽雨霂霡舟子曰此鰌魚噴氣水散於空風勢吹來若雨耳及近魚即鼓船而噪倐爾而没去魚畏鼓物𩔖相伏耳交趾廻乃捨舟取雷州縁岸而歸不憚苦辛葢避海鰌之難也乃静思曰設使老鰌瞋目張喙我舟若一葉之墜眢井耳寧得不為人皓首乎出嶺表録異鰐魚鰐魚其身土黄色有四足修尾形狀如鼉而舉止趫疾口森鋸齒往往害人南中鹿多最懼此物鹿走崖岸之上羣鰐喤呌其下鹿必怖懼落崖多為鰐魚所得亦物之相攝伏也故太尉相國李徳裕貶官潮州經鰐魚灘損壊舟船平生寳玩古書圖畫一時沈失遂召舶上崑崙取之見鰐魚極多不敢輒近乃是鰐魚之窟宅也出嶺表録異吳餘鱠魚吳王孫權曽江行食鱠有餘因棄之中流化而為魚今有餘猶名吳餘鱠者長數寸大如筯嘗𩔖鱠形也出博物志石頭魚石頭魚狀如鰌魚隨其大小腦中有二石子如蕎麥瑩白如玉有好竒者多市魚之小者貯於竹器任其壊爛即淘之取其魚腦石子以植酒籌頗脱俗出嶺表録異黄臘魚黄臘魚即江湖之横魚頭嘴長鱗皆金色臠為炙雖美而毒或煎􅏼乾夜即有光如籠燭北人有寓南海者市此魚食之棄其頭於糞筐中夜後忽有光明近視之益恐懼以燭照之但魚頭耳去燭復明以為不祥各啓食奩窺其餘臠亦如螢光逹明遍詢土人乃此魚之常也憂疑頓釋同上烏賊魚烏賊舊説名河伯從事小者遇大魚輒放墨方數尺以混身江東人或取其墨書契以脱人財物書跡如淡墨逾年字消唯空紙耳海人言昔秦王東遊棄算袋於海化為此魚形如算袋兩帶極長一説烏賊有矴遇風則前一鬚下矴出酉陽雜爼横公魚北方荒中有石湖方千里岸深五丈餘恒氷唯夏至左右五六十日觧耳其横公魚長七八尺形如鯉而赤晝在水中夜化為人刺之不入煮之不死以烏梅二枚煮之則死食之可止邪病出神異録骨雷扶南國出鰐魚大者二三丈四足似守宫狀常生吞人扶南王令人捕此魚置於壍中以罪人投之若合死鰐魚乃食之無罪者嗅而不食鰐魚别號忽雷熊能制之握其嘴至岸裂擘食之一名骨雷秋化為虎三爪出南海思雷二州臨海英潘村多有之出洽聞記彭蚏蟹屬名彭蚏以螯取土作丸從潮來至潮去或三百丸因名三百丸大彭蚏出感應經鯪魚鯪魚吐舌蟻附之因吞之又開鱗甲使蟻入其中乃奮近則䑛取之出異物志鯢魚金義嶺之西南有盤龍山山有乳洞斜貫一溪號為靈水溪溪内有魚皆修尾四足丹其腹游泳自若漁人不敢捕之爾雅云鯢似鮎四足聲如小兒金商州溪内亦有此魚謂之魶魚出嶺表録異比目魚比目魚南人謂之鞋底魚江淮謂之拖沙魚爾雅云東方有比目魚焉不比不行其名謂之鰈狀如牛脾細鱗紫色一靣一目兩片相合乃行出嶺表録異鹿子魚鹿子魚頳色其尾鬛皆有鹿斑赤黄色羅州圖經云州南海中有洲每春夏此魚跳出洲化而為鹿曽有人拾得一魚頭已化鹿尾猶是魚南人云魚化為鹿肉腥不堪食出嶺表録異子歸母楊孚交州異物志云鮫之為魚其子既育驚必歸母還其腹小則如之大則不復潘州記云䱜魚長二丈大數圍初生子子小隨母覓食暮驚則還入母腹吳録云䱜魚子朝出索食暮入母腹南越志云暮從臍入旦從口出也出感應經鯸鮧魚鯸鮧魚文斑如虎俗云煮之不熟食者必死相傳以為常矣饒州有吳生者家甚豐足妻家亦富夫婦和睦曽無戲間一旦吳生醉歸投身牀上妻為整衣解履扶舁其足醉者運動誤中妻之心胷其妻蹷然而死醉者不知也遽為妻族所凌執去毆擊致斃獄訟經年州郡不能理以事上聞吳生親族懼敕命到而必有明時為舉族之辱因餉獄生鯸鮧如此數四竟不能害益加充悦俄而㑹赦獲免還家之後𦙍嗣繁盛年洎八十竟以夀終且烹之不熟尚能殺人生陷數四不能為害此其命與出録異記鯽魚東南海中有祖州鯽魚出焉長八尺食之宜暑而避風此魚狀即與江湖小鯽魚相𩔖耳潯陽有青林湖鯽魚大者二尺餘小者滿尺食之肥美亦可止寒熱也出録異記䱰魚䱰魚濟南郡東北有䱰坑傳云魏景明中有人穿井得魚大如鏡其夜河水溢入此坑坑中居人皆為䱰魚焉黄魟魚黄魟音烘魚色黄無鱗頭尖身似大檞葉口在頷下眼後有耳竅通於腦尾長一尺末三刺甚毒並出酉陽雜爼蟕蠵蟕蠵者俗謂之兹夷乃山龜之巨者人立其背可負而行産潮循山中鄉人採之取殻以貨要全其殻須以木楔出肉龜吼如牛聲響山谷廣州有巧匠取其甲黄明無日脚者甲上有散黑暈為日脚矣煮而拍之陷黑玳瑁花以為梳箆盃器之屬狀甚明媚出嶺表録異海鷰齊鹽官縣石浦有海魚乘潮来去長三十餘丈黑色無鱗其聲如牛土人呼為海鷰出廣古今五行記鮫魚鮫魚出合浦長三丈背上有甲珠文堅彊可以飾刀口又可以鑢物出交州記太平廣記卷四百六十四
