body:
  text: 太平廣記卷四百三十一宋李昉等編虎六李大可藺庭雍王太荆州人劉老虎婦趙倜周義中朝子李大可宗正卿李大可嘗至滄州州之饒安縣有人野行為虎所逐既及伸其左足示之有大竹刺貫其臂虎俯伏帖耳若請去之者其人為㧞之虎甚悦宛轉揺尾隨其人至家乃去是夜投一鹿于庭如此嵗餘投野豕麞鹿月月不絶或野外逢之則隨行其人家漸豐因潔其衣服虎後見改服不識遂齧殺之家人收葬訖虎復來其家母罵之曰吾子為汝去刺不知報徳反見殺傷今更來吾舍豈不媿乎虎羞慚而出然數日常旁其家既不見其人知其誤殺乃號呼甚悲因入至庭前奮躍折脊而死見者咸異之藺庭雍吉陽治在涪州南泝黔江三十里有寺像設靈應古碑猶在物業甚多人莫敢犯涪州禆將藺庭雍妹因過寺中盜取常住物遂即迷路數日之内身變為虎其前足之上銀纒金釧宛然猶存毎見鄉人隔樹與語云我盜寺中之物變身如此求見其母託人為言之母畏之不敢往虎來郭外經年而去出録異記王太海陵人王太者與其徒十五六人野行忽逢一虎當路其徒云十五六人決不盡死當各出一衣以試之至太衣吼而隈者數四海陵多虎行者悉持大棒太選一棒脱衣獨立謂十五人卿宜速去料其已逺乃持棒直前擊虎中耳故悶倒尋復起去太背走惶懼不得故道但草中行可十餘里有一神廟宿于梁上其夕月明夜後聞草中虎行尋而虎至廟庭跳躍變成男子衣冠甚麗堂中有人問云今夕何爾纍悴神曰卒遇一人不意勁勇中其健棒困極迨死言訖入座上木形中忽舉頭見太問是何客太懼墮地具陳始末神云汝業為我所食然後十餘日方可死我取爾早故中爾棒今已相遇理當佑之後數日宜持猪來以己血塗之指庭中大樹可繫此下速上樹當免太後如言神從堂中而出為虎勁躍太髙不可得乃俯食猪食畢入堂為人形太下樹再拜乃還爾後更無患出廣異記荆州人荆州有人山行忽遇倀鬼以虎皮冒已因化為虎受倀鬼指揮凡三四年搏食人畜及諸野獸不可勝數身雖虎而心不願無如之何後倀引虎經一寺門過因遽走入寺庫伏庫僧牀下道人驚恐以白有徳者時有禪師能伏諸横獸因至虎所頓錫問弟子何所求耶為欲食人為厭獸身虎弭耳流涕禪師手巾繫頸牽還本房恒以衆生食及他味哺之半年毛落變人形具説始事二年不敢離寺後暫出門忽復遇倀以皮冒己遽走入寺皮及其腰下遂復成虎篤志誦經嵗餘方變自爾不敢出寺門竟至死出廣異記劉老信州劉老者以白衣住持於山溪之間人有鵝二百餘隻請劉放生恒自㸔養數月後毎日為虎所取已耗三十餘頭村人患之羅落陷穽遍於放生所自爾虎不復來後數日忽有老叟巨首長鬛來詣劉問鵞何以少減答曰為虎所取又問何不取虎答云已設陷穽此不復來叟曰此為倀鬼所教若先制倀即當得虎劉問何法取之叟云此鬼好酸可以烏白等梅及楊梅布之要路倀若食之便不見物虎乃可獲言訖不見是夕如言布路至四鼔後聞虎落穽自爾絶焉出廣異記虎婦利州賣飯人其子之婦山園採菜為虎所取經十二載而後還自説入深山石窟中本謂遇食久之相與寝處窟中共有四虎妻婦人者最老老虎恒持麋鹿等肉還以哺妻或時含水吐其口中婦人欲出輙為所怒驅以入窟積六七年後數嵗漸失餘虎老者獨在其虎自有婦人未常外宿後一日忽夜不還婦人心怪之欲出而不敢如是又一日乃徐出行數十歩不復見虎乃極力行五六里聞山中伐木聲徑往就之伐木人謂是鬼魅以礫石投擲婦人大言其故乃相率詰問婦人云已是某家新婦諸人亦有是隣里者先知婦人為虎所取衆人方信之鄰人因脱衫衣之將還㑹其夫已死翁姥憫而收養之婦人亦憨戅乏精神恒為往來之所狎劉全白親見婦人説其事云出廣異記趙倜荆州有一商賈説趙名倜多南泛江湖忽經嵗餘未歸有一人先至其家報趙倜妻云趙倜物貨俱没于湖中倜僅免一死甚貧乏在路即當至矣其妻驚哭不已後三日有一人一如趙倜儀貎來及門外大哭其妻遽引入家内詢問其故安存經百餘日欲再商販謂趙倜妻曰我慣為商在外在家不樂我心無聊勿以我不顧戀爾當容我却出投交友俄而倜輩物貨自逺而至及入門其妻反乃驚疑走出以投鄰家其趙倜良久問其故知其事遂令人喚其人其人至既見趙倜奔突南走趙倜與同伴十餘人共趁之直入南山其人回顧謂倜曰我通靈虎也勿逐我我不傷爾軰遂躍身化為一赤色虎呌吼而去出瀟湘録周義周義者鄭人也性倜儻好急人之患難忽有一人年可弱冠已來衣故錦衣策杖而詣周義謂義曰我是孟州使君之子也偶出獵於郊坰既獲兎後其鷹犬與所從我十餘少年與所乗馬皆無故而死我亦有一流矢不知自何至傷我右足我是以不敢返歸恐少年家父母不捨我今聞君急人之患難故特來投君幸且容我我他日必厚報君之恵也義遂藏之于家經百餘日義既不聞孟州有此事乃夜與少年對酌問之曰君子始投我言是使君之子因出獵有死傷不敢返歸今何不𫝊聞此事我疑君子君子必以實告我我心無貳少年沉吟移時方起拜而言曰我始設此異詞者盖欲憫念納我今若必問我我實不敢更設詐也君當不移急人之心我即以實告君義曰我終無貳但言之少年曰我孟州境内虎也傷人多矣刺史發兵捜求我欲殺我聞君廣義因變形質以投君君憐恤我待之如賔但我已誓報君之恵不忘今夜既言誠實事也我不可住遂呌吼數聲化為一虎走去後月餘夜有一少年踰垣入義家抛下一金枕髙聲告周義我是昔受恩人也今將此枕答君之恵言訖復化為一虎去出瀟湘録中朝子有一中朝子弟性頗落拓少孤依於外家外家居在亳州永城界有荘舅氏一女甚有才色此子求娶焉舅曰汝且勵志求名名成吾不違汝此子遂發憤篤學求名京邑白於舅曰請三年以女見待如違此期任别適人舅許之此子入京四年未歸乃别求女壻行有日矣而生亦已成名歸去舅荘六七十里夜宿時暑熱此子從舟中起登㟁而望去舟半里餘有一空屋遂領一奴持刀棒居宿焉此乃一廢佛屋土榻尚存此子遂寝焉奴人於地持刀棒衛之忽覺榻下有物動聲謂是蟲鼠亦無所疑夜至三更月漸明忽一虎背負一物擲於門外草内將欲入屋此人遂持刀棒呌呼便驚走呼舟人持火來照草間所墮乃一女妝梳至美但所著故衣耳亦無所損傷熟視之乃其舅妹即許嫁之者為虎驚語猶未得遂扶入屋又照其榻後有虎子數頭皆殺之扶女却歸舟中明日至舅荘遥聞哭聲此子遂維舟荘外百餘歩入荘先慰問㐫故舅曰吾以汝來過期許嫁此女於人吉期本在昨夜一更後因如厠為虎所搏求尸不得生乃白其事舅聞悲喜驚嘆遂以女嫁此生也出原化記太平廣記卷四百三十一
