body:
  text: 太平廣記卷二百三十三酒千日酒擒奸酒若下酒崑崙觴碧筩酒九醖酒消腸酒青田酒黏雨酒酒名南方酒李景讓夏侯孜孫㑹宗陸扆酒量山濤周顗裴𢎞泰王源中嗜酒徐邈劉伶酒臭酒千日酒昔有人名𤣥石從中山酒家酤酒酒家與千日酒忘語其節至家醉臥不醒數日家人不知以為死也具棺殮葬之酒家至千日乃憶𤣥石前來沽酒醉當醒矣遂往索𤣥石家而問之云石亡已三年今服闋矣於是與家人至𤣥石墓掘冢開視𤣥始醒起于棺中出博物志擒奸酒河東人劉白墮者善于釀酒六月中時暑赫劉以甖貯酒曝于日中經一旬酒味不動飲之香美醉而不易醒京師朝貴出郡者逺相餉餽踰于千里以其可至逺號曰鶴觴亦名騎驢酒永熙中青州刺史毛鴻賓帶酒之任路中夜逢刼盜盜飲之皆醉遂被擒獲因此復名擒奸酒游俠語曰不畏張弓拔刀唯畏白墮春醪出伽藍記若下酒輿地志村人取若下水以釀酒醇美俗稱若下酒張協七啓云荆州烏程豫北竹葉即此是也出十道記崑崙觴魏賈􅟚家累千金博學善著作有蒼頭善别水常令乘小舟于黄河中以瓠匏接河源水一日不過七八升經宿器中色如絳以釀酒名崑崙觴酒之芳味世間所絶曾以三十斛上魏莊帝出酉陽雜俎碧筩酒歴城北有使君林魏正始中鄭公慤三伏之際每率賓僚避暑于此取大蓮葉置硯格上盛酒三升以簪刺葉令與柄通屈徑上輪囷如象鼻傳吸之名為碧筩歴下效之言酒味雜蓮氣香冷勝於冰出酉陽雜俎九醞酒張華既貴有少時知識來候之華與共飲九醞酒為酣暢其夜醉眠華常飲此酒醉眠後輒敕左右轉側至覺是夕忘敕之左右依常時為張公轉側其友人無人為之至明友人猶不起華咄云此必死矣使視之酒果穿腸流牀下滂沱出世説消腸酒張華為醇酒煮三薇以漬麴糵糵出西羌麴出北胡胡中有指星麥四月火星出穫麥而食之糵用水漬三夕而麥生萌牙以平旦時鷄初鳴而用之俗人呼為鷄鳴麥以釀酒清羙鬯乆含令人齒動若大醉不搖蕩使人肝腸爛當時謂之消腸酒或云醇酒可為長宵之樂二説聲同而事異焉出王子年拾遺青田酒烏孫國有青田核莫知其樹與實而核大如五六升瓠空之盛水俄而成酒劉章曾得二枚集賓設之可供二十人一核方盡一核所盛復中飲矣唯不可乆置乆則味苦難飲因名其核曰青田壺酒曰青田酒出古今注黏雨酒石虎于大武殿前起樓高四十丈結珠為簾垂五色玉珮上有銅龍腹空盛數百斛酒使胡人于樓上噀酒風至望之如雲霧名曰黏雨臺使以灑塵出拾遺録酒名酒名郢之富水烏程之若下滎陽之土窟春富平之石凍春劍南之燒春河東之乾和蒲桃嶺南之靈溪博羅宜城之九醖潯陽之湓水京城之西市腔蝦蟆陵之郎官清河漢之三勒漿其法出波斯三勒者謂菴摩勒毘黎勒訶黎勒出國史𥙷南方酒新州多羙酒南方酒不用麴蘖杵米為粉以衆草葉胡蔓草汁溲南人呼野葛為胡蔓草大如卵置蓬蒿中䕃蔽經月而成用此合糯為酒故劇飲之後既醒猶頭熱涔涔有毒草故也南方飲既燒即實酒滿甕泥其上以火燒方熟不然不中飲既燒即掲瓶趨虛泥固猶存沽者無能知羙惡就泥上鑽小穴可容筯以細筩揷穴中沽者就吮筩上以嘗酒味俗謂之滴淋無頼小民空手入市徧就酒家滴淋皆言不中取醉而返南人有女數歲即大釀酒既漉候冬陂池水竭時寘酒甖宻固其上瘞于陂中至春漲水滿不復發矣候女將嫁因決陂水取供賀客南人謂之女酒味絶羙居常不可致也出投荒雜錄李景譲大中年丞郎宴席蔣伸在座忽斟一杯言曰席上有孝于家忠于國及名重于時者飲此爵衆皆肅然無敢舉者獨李公景讓起引此爵蔣曰此宜其然出盧氏雜説夏侯孜崔郢為京尹日三司使在永逹亭子宴丞郎崔乘酒突飲衆人皆延之時譙公夏侯孜為戸部使問曰尹曾任給舍否崔曰無譙公曰若不曾歴給舍京兆尹不合衝丞郎宴命酒糺來命下籌且吃罰爵取三大器物引滿飲之良乆方起出盧氏雜説孫㑹宗唐孫㑹宗僕射即渥相大王父也宅中集内外親表開宴有一甥姪為朝官後至及中門見緋衣官人衣襟前皆是酒涴咄咄而出不相識頃即席説于主人訝無此官沉思之乃是行酒時階上酹酒草草傾潑也自此每酹酒止側身恭跪一酹而已自孫氏始今人三酹非也出北夢瑣言陸扆陸相扆出典夷陵時有士子修謁相國與之從容因命酒酌勸此子辭曰天性不飲酒相曰誠如所言已校五分矣葢平生悔吝有十分不為酒困自然減半也出北夢瑣言酒量山濤山濤字巨源飲酒量至八斗武帝欲試之使人私黙以記之至量而醉出晉書周顗周顗字伯仁飲酒至量一石及過江雖日醉每恨無對偶有舊對北來顗遇之為忻然乃置酒二石共飲各大醉及醒顗使人視之客已腐脇而死矣出晉書裴𢎞泰唐裴均之鎮襄州裴𢎞泰為鄭滑舘驛巡官充䀻于漢南遇大宴為賓司所漏及設㑹均令走屈鄭滑裴巡官𢎞泰奔至均不悦責曰君何來之後大渉不敬酌後至酒已投糺籌𢎞泰謝曰都不見客司報宴非敢慢也叔父捨罪請在座銀器盡斟酒滿之器隨飲以賜𢎞泰可乎合座壯之均亦許焉𢎞泰次第揭座上小爵以至觥船凡飲皆竭隨飲訖即寘于懐須臾盈滿筵中有銀海受一斗以上其内酒亦滿𢎞泰以手捧而飲飲訖目吏人將海覆地以足踏之捲抱而出即索馬歸驛均以𢎞泰納飲器稍多色不懌午後宴散均又思𢎞泰之飲必為酒過度所傷憂之迨暮令人視飲後所為使者見𢎞泰戴紗㡌于漢隂驛㕔箕踞而坐召匠秤得器物計二百餘兩均不覺大笑明日再飲回車日贈遺甚厚出乾􅍧子王源中王源中文宗時為翰林承㫖暇日與諸昆季蹴踘于太平里第毬子擊起誤中源中之額薄有所損俄有急召比至上訝之源中具以上聞上曰卿大雍睦命賜酒二盤每盤貯十金椀每椀各容一升許宣令并椀賜之源中飲之無餘略無醉容出摭言嗜酒徐邈魏徐邈字景山為尚書郎時禁酒邈私飲沈醉從事趙達問曹事邈曰中聖人達白太祖太祖甚怒鮮于輔曰醉人謂清酒為聖人濁酒為賢人邈性修慎偶醉言耳乃得免罪出異苑劉伶劉伶常乘鹿車攜一壺酒使人荷鍤隨之曰死便埋我其遺形如此渴甚求酒于妻妻藏酒棄器諫曰非養生之道宜斷之伶曰善當祝鬼神自誓便可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飲一石五斗解酲婦人之言必不可聽於是酌酒御肉塊然復醉出晉書酒臭義寜初一縣丞衣纓之胄年少時甚有丰采渉獵書史兼有文性其後沉湎于酒老而彌篤日飲數升略無醒時得病將終酒臭聞于數里遠近驚愕不知所由如此一旬此人遂卒故釋典戒酒令人昏癡今臨亡酒臭彰其入惡道耳出五行記太平廣記卷二百三十三
