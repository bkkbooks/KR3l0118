body:
  text: 太平廣記卷二百四十九詼諧五令狐德棻崔行功邉仁表辛郁尹君裴𤣥本長孫𤣥同王福畤許敬宗高崔嵬元晉趙謙光沈佺期崔日用裴談李鎭惡盧廙松壽封抱一尹神童令狐德棻唐趙元楷與令狐德棻從駕至陜元楷召德棻河邉觀砥柱德棻不去遂獨行及還德棻曰砥柱共公作何語答曰砥柱附參承公德棻應聲曰石不能言物或慿焉時羣公以為佳對出啓顏録崔行功唐崔行功與敬播相逐播帶櫚木霸刀子行功問播云此是何木播對曰是栟櫚木行功曰唯問刀子不問佩人出啓顏録邉仁表唐四門助教𢎞綽與弟子邉仁表論議𢎞綽義理將屈乃高聲大怒表遂報曰先生聞義即怒豈曰𢎞𢎞又報云我姓既曰𢎞是事皆𢎞邉又應聲曰先生雖曰𢎞義終不綽座下大笑𢎞竟被屈而歸出啓顔録辛郁唐辛郁管城人也舊名太公弱冠遭太宗於行所問何人曰辛太公太宗曰何如舊太公郁曰舊太公八十始遇文王臣今適年十八已遇陛下過之遠矣太宗悦命直中書出御史臺記尹君唐楊纂華隂人也累遷雍州長史吏部尚書纂之在雍州司法參軍尹君嘗任坊州司戸省符科杜若尹君判申曰坊州本無杜若天下共知省符忽有此科應由讀謝朓詩悞華省曹即如此判事不畏二十八宿向下笑人由是知名及雍州司法時有胡盜金城坊者纂判京城諸胡盡禁問尹君不同之曰賊出萬端詐偽非一亦有胡著漢㡌漢着胡靴亦須漢裏兼求不可胡中直覓請西市胡禁餘請不問纂怒不同判遽命筆復沈吟少𨕖乃判曰纂輸一籌餘依太宗聞而笑曰朕用楊纂聞義伏輸一籌朕伏得幾籌出御史臺記裴𤣥本唐裴𤣥本好諧謔為戸部郎中時左僕射房𤣥齡疾甚省即將問疾𤣥本戲曰僕射病可須問之既甚矣何須問也有洩其言者既而隨例看𤣥齡𤣥齡笑曰裴郎中來𤣥齡不死也出大唐新語長孫𤣥同唐長孫𤣥同幼有機辯坐中毎劇談無不歡笑永徽中在京㑹宴衆因語論及民間事一人云醴泉縣去京不遠百姓遂行蠱毒此邑須遠配流豈得令在側近一人乃云若令配流處還有百姓此人復行蠱毒豈不還更損人其人云若如此欲令何處安置𤣥同即云若令𤣥同安置必令得所諸人大喜同即問之答云但行蠱毒人並送與莫離支作食手衆皆歡笑貞觀中嘗在諸公主席衆莫能當高密公主乃云我段家兒郎亦有人物走令喚取段恪來令對𤣥同段恪雖微有辭其容儀短小召至始入門𤣥同即云為日已暗公主等並大驚怪云日始是齋時何為道暗𤣥同乃指段恪若不日暗何得短人行坐中大笑段恪面大赤更無以答𤣥同初上府中設食其倉曹是吳人言音多帶其聲喚粉粥為糞粥時餚饌畢陳蒸炙俱下倉曹曰何不先將糞粥來舉坐咸笑之𤣥同曰倉曹乃是公侯之子孫必復其始諸君何為笑也坐中復大笑𤣥同任荆王友所司差攝祭官祠社於壇所清齋𤣥同在幕内坐有犬來遺糞穢於墻上𤣥同乃取支牀塼自擊之傍人怪其率問曰何為自徹支牀塼打狗𤣥同曰可不聞茍利社稷專之亦可出啓顔録王福畤唐王福畤名行温恭累授齊澤二州世以才學稱子勔勮勃俱以文筆著天下福畤與韓琬父有舊福畤及婚崔氏生子勸嘗致書韓父曰勔勮勃文章並清俊近小者復似不惡韓復書曰王武子有馬癖明公有譽兒癖王氏之癖無乃多乎要當見文章方可定耳福畤乃致諸子文章韓與名人閲之曰生子若是信亦可誇出御史臺記許敬宗唐吏部侍郎楊思𤣥恃外戚之貴待𨕖流多不以禮而排斥之為𨕖人夏侯彪之所訟御史中丞郎餘慶彈奏免中書令許敬宗曰固知楊吏部之敗也或問之宗曰一彪一狼共着一羊不敗何待敬宗性輕傲見人多忘之或謂其不聰曰卿自難記若遇何劉沈謝暗中摸索著亦可識出國朝雜記高崔嵬唐散樂高崔嵬善弄癡太宗命給使捺頭向水下良久出而笑之帝問曰見屈原云我逢楚懐王無道乃沈汨羅水汝逢聖明主何為來帝大笑賜物百段出朝野僉載元晉唐曹懐舜金鄉人父繼叔死王事贈雲麾將軍懐舜襁褓授遊擊將軍歴内外文武官則天云懐舜久歴文資而屈於武職自左鷹揚衛郎將拜右玉鈐衛將軍有宋州司馬曹𤣥本父名乞伯時汲縣丞元晉好談多警䇿或問元晉𤣥本懐舜從叔元晉應聲答曰雖則同堂俱非本族人怪而問之晉曰𤣥本乞伯子懐舜繼叔兒以此知矣出御史臺記趙謙光唐諸郎中不自即員外郎拜者謂之土山頭果毅言便拜崇品有似長征兵士便授邉遠果毅趙謙光自彭州司馬入為大理正遷戸部郎中戸部員外賀遂渉詠曰員外由來美郎中望不優寜知粉署裏翻作土山頭趙謙光答詩曰錦帳隨情設金爐任意薰唯愁員外置不應列星文人以為竒句出譚賓録沈佺期唐沈佺期以罪謫遇恩復官秩而未還朱衣因内宴羣臣皆歌廻波樂詞起舞由是多求遷擢佺期詞曰廻波爾時佺期流向嶺外生歸身名已蒙齒録袍笏未復牙緋中宗即以緋魚袋賜之出本事詩崔日用崔日用為御史中丞賜紫是時佩魚須有特恩亦因宴㑹命羣臣撰詞日用曰臺中䑕子直須諳信足跳梁上壁龕倚翻燈脂汚張五還來嚙帶報韓三莫浪語直王相大家必若賜金龜賣却猫兒相賞中宗亦以金魚賜之出夲事詩裴談唐中宗朝御史大夫裴談崇釋氏妻悍妬談畏之如嚴君時韋庶人頗襲武后之風中宗漸畏之内宴命唱廻波詞有優人詞曰廻波爾時栲栳怕婦也是大好外邉秖有裴談内裏無過李老韋后意色自得以束帛賜之出本事詩李鎭惡唐李鎭惡即趙公嶠之父𨕖授梓州郪縣令與友人書云州帶子號縣帶郪名由來不屬老夫併是婦兒官職出傳載盧廙唐殿中内供奉盧廙持法細密雖親故貴勢無所廻避舉止閑雅必翔而後集嘗於景龍觀監官行香右臺諸御史亦預焉臺中先號右臺為高麗僧時有一胡僧徙倚於前庭右臺侍御史黄守禮指之曰何胡僧而至此廙徐謂之曰亦有高麗僧何獨怪胡僧為一時歡笑廙與李畬俱非善射者嘗三元禮射廙畬雖引滿射俱不及垜而墜廙言其工拙畬戲曰畬與盧箭俱三十歩左右不曉畬曰畬箭去垜三十歩盧箭去身三十歩歡笑久之出御史臺記松壽唐韋慶本女𨕖為妃詣朝堂欲謝而慶本兩耳先卷朝士多呼為卷耳時長安公松壽見慶本而賀之因曰僕固知足下女得妃慶本曰何以知之松壽乃自摸其耳而卷之曰卷耳后妃之德出啟顔録封抱一唐封抱一任益州九隴尉與同列戲白打賭錢座下數百錢輸已略盡便欲斂手傍人謂之曰何不更覓錢廻取之抱一乃舉手摸錢曰賜也何敢望回山東人謂盡為賜故言賜也出啓顏録尹神童唐尹神童毎説伯樂令其子執馬經畵樣以求馬經年無有似者歸以告父更令求之出見大蝦蟇謂父曰得一馬略與相同而不能具伯樂曰何也對曰其隆顱跌目脊郁縮但蹄不如累趍耳伯樂曰此馬好跳躑不堪也子笑乃止出朝野僉載太平廣記卷二百四十九
