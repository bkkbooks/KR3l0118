body:
  text: 太平廣記卷一百五十七定數十二李景讓李敏求李君馬舉鄭延濟李生李景讓唐宣宗將命相必採中外人情合為相者三兩人姓名撚之致案上以碗覆之宰相闕必添香䖍祝探丸以命草麻上切於命故李孝公景讓竟探名不著有以見其命也出盧氏雜記李敏求李敏求應進士舉凡十有餘上不得第海内無家終鮮兄弟姻屬栖栖丐食殆無生意太和初長安旅舍中因暮夜愁惋而坐忽覺形魂相離其身飄飄如雲氣而遊漸涉邱墟荒野之外山川草木無異人間但不知是何處良久望見一城壁即趨就之復見人物甚衆呵呼往來車馬繁閙俄有白衣人走來拜敏求敏求曰爾非我舊傭保耶其人曰小人即二郎十年前所使張岸也是時隨從二郎涇州岸不幸身先犬馬耳又問曰爾何所事岸對曰自到此來便事柳十八郎甚蒙驅使柳十八郎今見在太山府君判官非常貴盛每日判決繁多造次不可得見二郎豈不共柳十八郎是往來今事須見他岸請先入啓白須臾張岸復出引敏求入大衙門正北有大㕔屋丹楹粉壁壯麗窮極又過西廡下一横門門外多是著黄衫慘綠衫人又見著緋紫端簡而偵立者披白衫露髻而倚牆者有被枷鎖牽制於人而俟命者有抱持文案窺覷門中而將入者如叢約數百人敏求將入門張岸揮手於其衆曰官客來其人一時俛首開路俄然謁者揖敏求入見著紫衣官人具公服立於階下敏求趨拜訖仰視之即故柳澥秀才也澥熟顧敏求大驚未合與足下相見乃揖登席綢繆叙話不異平生澥曰幽顯殊途今日故人此來大是非意事莫有所由妄相追攝否僕幸居此處當為故人理之敏求曰所以至此者非有人呼也澥沉吟良久曰此固有定分然宜速反敏求曰受生苦窮薄故人當要路不能相發揮乎澥曰假使公在世間作官職豈可將他公事從其私欲乎茍有此圖謫罰無容逃逭矣然要知祿命非可施力因命左右一黄衫吏曰引二郎至曹司畧示三數年行止之事敏求即隨吏却出過大㕔東别入一院院有四合大屋約六七間忩户盡啓滿屋唯是大書架置黄白紙書簿各題籖牓行列不知紀極其吏止於一架抽出一卷文似手葉却數十紙即反卷十餘行命敏求讀之其文曰李敏求至太和二年罷舉其年五月得錢二百四十貫側注朱字其錢以伊宰賣庄錢充又至三年得官食祿張平子讀至此吏復掩之敏求懇請見其餘吏固不許即被引出又過一門門扇斜開敏求傾首窺之見四合大屋屋内盡有牀榻上各有銅印數百顆雜以赤斑蛇大小數百餘更無他物敏求問吏用此何為吏笑而不答遂却至柳判官處柳謂敏求曰非故人莫能致此更欲奉留恐誤足下歸計握手叙别又謂敏求曰此間甚難得揚州氊帽子他日請致一枚即顧謂張岸可將一兩箇了事手力兼所乘鞍馬送二郎歸不得妄引經過恐動他生人敏求出至府署外即乘所借馬馬疾如風二人引頭張岸控轡須臾到一處天地漆黑張岸曰二郎珍重似被推落大坑中即如夢覺於時向曙身乃在昨宵愁坐之所敏求從此遂不復有舉心後數月窮飢益不堪敏求數年前曽被伊慎諸子求為妹婿時方以修進為己任不然納之至是有人復語敏求敏求即欣然欲之不旬遂成姻娶伊氏有五女其四皆已適人敏求妻其小者其兄宰方貨城南一莊得錢一千貫悉將分給五妹為資裝敏求既成婚即時領二百千其姊四人曰某娘最小李郎又貧盍各率十千以助焉由是敏求獲錢二百四十貫無差矣敏求先有别色身名久不得調其年乃用此錢叅𨕖三年春授鄧州向城尉任官數月間步縣城外壞垣蓁莽之中見一古碑文字磨滅不可識敏求偶令滌去苔蘚細辨其題云晉張衡碑因悟食禄張平子何其昭昭歟出河東記又一説李敏求暴卒見二黄衣人追去至大府署求窺之見馬植在内披一短褐於地鋪坐吃飯四隅盡是文書架馬公早登科名與敏求情善遽入曰公安得在此馬公驚甚且不欲與之相見迴面向壁敏求曰必無事乃坐從容敏求曰此主何事曰人所得錢物逐歲支足敏求曰今既得見乃是天意切要知一年所得如何馬公乃為檢一大葉子簿黄紙籤標書曰盧𢎞宣年支二千貫開數幅至敏求以朱書曰年支三百貫以伊宰賣宅錢充敏求曰某乙之錢簿已多矣幸逢君子竊欲僥求馬公曰三二十千即可多即不得以筆注之曰更三十千以某甲等四人錢充復見老姥年六十餘乃敏求姨氏之乳母家在江淮見敏求喜曰某亦得迴知郎君與判官故舊必為李妳看年支敏求嬰兒時為李乳養不得已却入具言於馬公令左右曰速檢來大帖文書曰阿李年攴七百敏求趨出見老妳告知嗟怨垂淚使者促李公去行數十里却至壕城見一坑深黑使者自後推之遂覺妻子家人圍繞啼泣云卒已兩日少頃方言乃索紙筆細紀敏求即伊慎之婿也妻兄伊宰為軍使賣伊公宅得錢二百千至歲盡望可益三十千亦無望焉偶於街中遇親丈人赴𨕖自江南至相見大喜邀食與鄉里三人皆以敏求情厚者同贈錢三十千一如簿中之數盧𢎞宣在城有人知者為盧公話之盧公計其俸禄并知留後使所得錢畢二千貫無餘李妳已流落不在姨母之家乞食於路七百之數故當箕斂方可致焉出逸史李君江陵副使李君嘗自洛赴進士舉至華陰見白衣人在店李君與語圍爐飲啜甚洽同行至昭應曰某隱居在西嶽甚荷郎君相厚之意有故明旦先徑往城中不得奉陪也莫要知向後事否君再拜懇請乃命紙筆於月下凡書三封次第緘題之甚急則開之乃去五六舉下第欲歸無糧食將往求容足之地不得曰此為窮矣仙兄書可以開也遂沐浴淸旦焚香啓之曰某年月日以困迫無資用開一封可靑龍寺門前坐見訖遂往到已晚矣望至昏時不敢歸心自笑曰此處坐可得錢乎少頃寺主僧領行者至將閉門見李君曰何人曰某驢弱居遠前去不得將寄宿於此僧曰門外風寒不可且向院中遂邀入牽驢隨之具饌烹茶夜艾熟視李君低頭不語者良久乃曰郎君何姓曰姓李僧驚曰松滋李長官識否李君起嚬蹙曰某先人也僧垂泣曰某久故舊適覺郎君酷似長官然奉求已多日矣今乃遇李君涕流被面因曰郎君甚貧長官比將錢物到求官至此狼狽有錢二千貫寄在某處自是以來如有重負今得郎君分付老僧此生無事矣明日留一文書便可挈去李君悲喜及旦遂載鏹而去鬻宅安居遽為富室又三數年不第塵土困悴欲罷去思曰乃一生之事仙兄第二緘可以發也又沐浴淸旦啓之曰某年月日以將罷舉可開第二封可西市鞦轡行頭坐見訖復往至即登樓飲酒聞其下有人言交他郎君平明即到此無錢即道元是不要錢及第李君驚而問之客曰侍郎郎君有切故要錢一千貫致及第昨有共某期不至者今欲去耳李君問曰此事虛實客曰郎君見在樓上房内李君曰某是舉人亦有錢郎君可一謁否曰實如此何故不可乃却上果見之話言飲酒曰侍郎郎君也云主司是親叔父乃面定約束明年果及第後官至殿中江陵副使患心痛少頃數絶危迫頗甚謂妻曰仙師第三封可以開矣妻遂灌洗開視之云某年月日江陵副使忽患心痛可處置家事更兩日卒出逸史馬舉淮南節度使馬舉討龎勛為諸道行營都虞候遇大陣有將在皂旗下望之不入賊使二騎斬之騎迴云大郎君也舉曰但斬其慢將豈顧吾子再遣斬之傳首陣上不移時而敗賊後大軍小衂舉落馬墜橋下而死夜深復甦見百餘人至云馬僕射在此一人云僕射左脇一骨折又一人云速換之又曰無以換之又令取柳木換遂換之須臾便曉所損乃痊並無所苦及鎮揚州檢挍左僕射出聞竒錄鄭延濟宰相堂飯常人多不敢食鄭延昌在相位一日本㕔欲食次其弟延濟來遂與之同食延濟手秉餺飥飡及數口椀自手中墜地遂中風痺一夕而卒出中朝故事李生契貞先生李義範住北邙山𤣥元觀咸通末已數年矣每入洛城徽安門内必改服歇轡焉有李生者不知何許人年貌可五十餘與先生叙宗從之禮揖詣其所居有學童十數輩生有一女一男其居甚貧窶日不暇給自此先生往來多止其學中異常欵狎忽一夕詣邙山與先生為别擁爐夜話問其將何適也生曰某此别辭世矣非遠適也某受命於㝠曹主給一城内戸口逐日所用之水今月限既畢不可久住後三日死矣五日妻男葬某於此山之下所闕者顧送終之人比少一千錢託道兄貸之故此相囑兼告别矣因曰人世用水不過日用三五升過此必有減福折筭切宜慎之問其身後生計生曰妻聘執喪役夫姓王某男後當為僧然其僧在江南二年外方至名行成未至間且寄食觀中也先生便令入道可乎生曰伊是僧材不可為道非人力所能遣此並陰隲品定言訖及曉告去自是累阻寒雪不入洛城且五日矣初霽李生之妻與數輩詣先生云李生謝世今早葬於山下欠一千錢云嘗託先生助之故來取耳仍將男寄先生院後江南僧行成果至宿於先生室因以李生之男委之行成欣然攜去云既承有約當敎以事業度之為僧二歲餘行成復至已為僧矣誦法華經甚精熟焉初先生以道經授之經年不能記一紙人之定分信有之焉出錄異記太平廣記卷一百五十七
