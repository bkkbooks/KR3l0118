body:
  text: 太平廣記卷四百六十七宋李昉等編水族四魚鯀桓冲李湯齊澣子英春洛水豎子􅸗鬼羅州赤鼈韓珣封令禎凝真觀蜀江民張胡子柏君葉朗之栁宗元王瑶栁沂崔棁染人海上人法聚寺僧李延福鯀堯使鯀治洪水不勝其任遂誅之鯀於羽山化為黄熊入於羽泉今㑹稽人祭禹廟不用能水居曰能陸居曰熊也出述異記桓冲晉桓冲為江州刺史遣人周行廬山冀覩靈異既陟崇巘有一湖匝生桑𣗳湖中有敗艑赤鱗魚使者渇極欲往飲水赤鱗魚張鬐向之使者不敢飲出法苑珠林李湯唐貞元丁丑歲隴西李公佐泛瀟湘蒼梧偶遇征南從事𢎞農楊衡泊舟古岸淹留佛寺江空月浮徴異話竒楊告公佐云永泰中李湯任楚州刺史時有漁人夜釣於龜山之下其釣因物所制不復出漁者健水疾沉於下五十丈見大鐡鏁盤繞山足尋不知極遂告湯湯命漁人及能水者數十獲其鏁力莫能制加以牛五十餘頭鏁乃振動稍稍就岸時無風濤驚浪翻湧觀者大駭鏁之末見一獸狀有如猿白首長鬐雪牙金爪闖然上岸高五丈許蹲踞之狀若猿猴但兩目不能開兀若昏昧目鼻水流如泉涎沫腥穢人不可近乆乃引頸伸欠雙目忽開光彩若電顧視人焉欲發狂怒觀者奔走獸亦徐徐引鏁拽牛入水去竟不復出時楚多知名士與湯相顧愕慄不知其由爾乃漁者時知鏁所其獸竟不復見公佐至元和八年冬自常州餞送給事中孟蕳至朱方廉使薛公苹館待禮備時扶風馬植范陽盧簡能河東裴蘧皆同館之環爐㑹語終夕焉公佐復説前事如楊所言至九年春公佐訪古東吳從太守元公錫泛洞庭登包山宿道者周焦君廬入靈洞探仙書石穴間得古岳瀆經第八卷文字古竒編次蠧毁不能觧公佐與焦君共詳讀之禹理水三至桐栢山驚風走雷石號木鳴五百擁川天老肅兵不能興禹怒召集百靈捜命䕫龍桐栢千君長稽首請命禹因囚鴻䝉氏章商氏兠廬氏犁婁氏乃獲淮渦水神名無支祁善應對言語辨江淮之淺深原隰之遠近形若猿猴縮鼻高額青軀白首金目雪牙頸伸百尺力踰九象搏擊騰踔疾奔輕利倐忽聞視不可乆禹授之章律不能制授之烏木由不能制授之庚辰能制鴟脾桓木魅水靈山祅石怪奔號聚遶以數千載庚辰以戰逐去頸鏁大索鼻穿金鈴徙淮隂之龜山之足下俾淮水永安流注海也庚辰之後皆圖此形者免淮濤風雨之難即李湯之見與楊衡之説與岳瀆經符矣出戎幕閑談齊澣唐開元中河南採訪使汴州刺史齊澣以徐城險急奏開十八里河逹於清水其河隨州縣分掘亳州真源縣丞崔延禕糺其縣徒開數千歩中得龍堂初開謂是虚穴然狀如新築浄潔周廣北壁下有五色蟄龍長一丈餘鯉魚五六枚各長尺有靈龜兩頭長一尺二寸眸長九分禕以白開河御史鄔元昌狀上齊澣澣命移龍入淮放龜入汴禕移龍及魚二百餘里至淮岸有魚數百萬首跳躍赴龍水為之沸龍入淮噴水雲霧杳㝠遂不復見初將移之也御史員錫拔其一鬚元昌遣人送龜至宋遇水泊蹔放龜水中水濶數尺深不過五寸遂失大龜所在涸水求之亦不獲空致小龜焉出廣異記子英春子英春者舒鄉人善入水捕得赤鯉愛其色持歸養之池中數以米榖食之一年長丈餘遂生角有翅子英怖拜謝之魚言我來迎汝上我背與汝俱昇歲來歸見妻子魚復迎之故吳中門户作神魚子英祠也出神鬼傳洛水豎子有人洛水中見豎子洗馬頃之見一物如白練帶極光晶繳豎子之項三兩匝即落水死凡是水中及灣泊之間皆有之人澡浴洗馬死者皆謂黿所引非也此名白特宜慎防之蛟之𩔖也出朝野僉載􅸗鬼鱨魚狀如鱧其文赤班長者尺餘豫章界有之多居汚泥池中或至數百能為􅸗子故反鬼幻惑祅怪亦能魅人其汚池側近所有田地人不敢犯或告而奠之厚其租直田即倍豐但匿己姓名佃之三年而後捨去必免其害其或為人患者能捩人靣目反人手足祈謝之而後免亦能夜間行於陸地所經之處有泥踪跡所到之處聞嗾嗾之聲北部二十五部大將軍有破泉􅸗書符於塼石上投其池中或書板刺釘於池畔而必因風雨雷霆以往他所善此術者方可行之出録異記羅州赤鼈嶺南羅州辯州界内水中多赤鼈其大如匙而赫赤色無問禽獸水牛入水即被曳深潭吸血死或云蛟龍使曳之不知所以然也出朝野僉載韓珣唐杭州富陽縣韓珣莊鑿井纔深五六尺土中得魚數千頭土有㣲潤出廣古今五行記封令禎唐封令禎任常州刺史於江南泝流將木至洛造廟匠人截木於中得一鯽魚長數寸如刻安之出廣古今五行記凝真觀唐懐州凝真觀東廊柱已五十餘年道士往往聞柱中有蝦蟆聲不知的處後因柱朽壊易之厨人砍以為薪柱中得一蝦蟆其柱先無孔也出廣古今五行記蜀江民唐蜀民有於江之上獲巨鼈者大於常長尺餘其裙朱色煮之經宿遊戲自若又加火一日水涸而鼈不死舉家驚懼以為龍也投於江中浮泛而去不復見矣出録異記張胡子唐吳郡漁人張胡子嘗於太湖中釣得一巨魚腹上有丹書字曰九登龍門山三飲太湖水畢竟不成龍命負張胡子出靈怪集栢君唐金州洵陽縣水南鄉百姓栢君懐於漢江勒漠潭採得魚長數尺身上有字云三度過海兩度上漢行至勒漠命屬栢君出録異記葉朗之唐建中元年南康縣人葉朗之使奴當歸守田田下流有鳥陂陂中忽有物喚其聲似鵝而大奴因入水探視得一大物身滑宛轉内頭陂下奴乃操刀下水截得其後圍六尺餘長二丈許牽置岸上剥皮剖之比舎數十人咸共食炙肉脆肥美衆味莫逮背上有白筋大如脛似鱏魚鼻食之特美餘以為脯此物初死之夕朗之夢一人長大黒色曰我章川使者向醉孤遊誤墮陂中為君奴所害既廢王命身罹戮辱又析肌刳臟焚㷈充膳寃結之痛古今莫二與君素無隙恨若能殺奴謝責償過罪止凶身不爾法科恐貴門罹禍朗之驚覺不忍殺奴奴明年為竹尖刺入腹而死其年夏末朗之舉家得病死者八人出廣古今五行記柳宗元唐柳州刺史河東栁宗元常自省郎出為永州司馬途至荆門舎驛亭中是夕夢一婦人衣黄衣再拜而泣曰某家楚水者也今不幸死在朝夕非君不能活之倘獲其生不獨感戴而已兼能假君祿益君夀為將為相且無難矣幸明君子一圖焉公謝而許之既寤嘿自異之及再寐又夢婦人且祈且謝乆而方去明晨有吏来稱荆帥命將宴宗元宗元既命駕以天色尚早因假寐焉既而又夢婦人嚬然其容憂惶不暇顧謂宗元曰某今之命若縷之懸於風中危將斷而飄矣而君不能念其事之急耶幸疾為計不爾亦與敗縷皆斷矣願君子許之言已又祈拜既告去心亦未悟焉即俛而念曰吾一夕三夢婦人告我辭甚懇豈吾之吏有不平於人者耶抑將宴者以魚為我膳耶得而活之亦吾事也即命駕詣郡宴既而以夢話荆帥且召吏訊之吏曰前一日漁人網獲一巨黄鱗魚將為膳今已斷其首宗元驚曰果昨夕之夢遂命挈而投江中然而其魚已死矣是夕又夢婦人来亡其首宗元益異之出宣室志王瑶唐㑹昌中有王瑶者任恒州都押衙嘗為奕邑宰瑶將赴任所夜夢一人身懐甲胄形貎堂堂自云馮夷之宗將之海岸忽罹網罟為漳川漁父之所得將寘之刀几充膳於宰君命在詰朝故来相告倘垂救宥必厚報之瑶既覺言於左右曰此必縣吏相迎捕魚為饌急遣人至縣庖人果欲割鮮鯉鱠具以瑶命告之遂投於水中魚即鼓鬛揚鬐軒軒而去是夜瑶又夢前人泣以相感云免其五鼎之烹獲返三江之浪有以知長官之仁比宗元之惠遠矣因長跪而去出耳目記栁沂唐河東栁沂者僑居洛陽因乗春釣伊水得巨魚挈而歸致於盆水中先是沂有嬰兒始六七歲是夕沂夢魚以喙嚙嬰兒臆沂悸然而寤果見嬰兒啼曰向夢一大魚嚙其臆痛不可忍故啼焉與沂夢同沂異之乃視嬰兒之臆果有瘡而血沂益懼明旦以魚投伊水中且命僧轉經畫像僅旬餘嬰兒瘡愈沂自後不復釣也出宣室志崔棁晉太常卿崔棁遊學時往至姑家夜與諸表昆季宿於學院来晨姑家方會客夜夢十九人皆衣青緑羅拜具告求生詞㫖哀切崔曰某方閒居非有公府之事也何以相告咸曰公但許諾某輩獲全矣崔曰茍有階縁固不惜奉救也咸喜躍再拜而退既寤盥櫛束帶至堂省姑見缶中有水而泛鼈焉數之大小凡十九計其衣色亦略同也遂告於姑具述所夢再拜請之姑亦不阻即命僕夫寘於器中躬詣水次放之出玉堂閑話染人廣陵有染人居九曲池南夢一白衣少年求寄居焉答曰吾家隘陋不足以容君也乃入厨中爾夕舉家夢之既曰厨中得一白鼈廣尺餘兩目如金其人送詣紫極宫道士李棲一所置之水中則色如金而目如丹出水則白如故棲一不能測復送池中遂不復見出稽神録海上人近有海上人於魚扈中得一物似人一手而掌中有面七竅皆具能動而不能語傳玩乆之或曰此神物也不當殺之其人乃放置水中此物浮水而去可數十歩忽大笑數聲躍没於水出稽神録法聚寺僧法聚寺内有僧先在房至夜忽謂門人曰外有數萬人頭戴㡌向貧道乞救命急開門出看見十餘人擔蠡子因贖放生出蜀記李延福偽蜀豐資院使李延福晝寢公㕔夢裹烏㡌三十人伏於堦下但云乞命驚覺僕使報門外有村人獻鼈三十頭因悟所夢遂放之出儆戒録太平廣記卷四百六十七
