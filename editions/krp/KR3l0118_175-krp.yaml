body:
  text: 太平廣記卷一百七十五幼敏賈逵李百藥王勃元嘉毛俊男蘇頲劉晏林傑髙定李德裕白居易崔鉉李琪劉神童路德延韋莊賈逵漢賈逵五嵗神明過人其姊韓瑤之婦嫁瑤無嗣而歸亦以貞明見稱聞鄰里諸生讀書日抱逵隔籬而聽逵靜聽無言姊以為喜年十嵗乃闇誦六經姊謂逵曰吾家窮困不曾有學者入門汝安知天下有三墳五典而誦無遺句邪逵曰憶姊昔抱逵往籬下聽鄰家讀書今萬不失一乃剥庭中桑皮以為牒或題於扉屏且誦且記朞年經文通遍門徒來學不逺萬里或襁負子孫舍於門側皆口授經文贈獻者積粟盈倉或云賈逵非力耕所得誦經口倦世謂舌耕出王子年拾遺記李百藥唐李百藥七嵗能屬文齊中書舍人陸乂常遇其父德林宴集有説徐陵文者云刈琅邪之稻坐客並稱無其事百藥進曰傳稱鄅人籍稻注云鄅國在琅邪開陽縣人皆驚喜云此兒即神童百藥幼多疾祖母以百藥為名名臣之子才行相繼四海名流莫不宗仰藻思沉鬱尤長五言雖樵童牧豎亦皆吟諷及懸車告老怡然自得穿地築山文酒譚賓以盡平生之志年八十五先是和太宗帝京篇手詔曰卿何身之老而才之壯何齒之宿而意之新乎子安期永徽末遷中書舍人三代皆掌制誥安期孫羲仲又為中書出譚賓錄王勃王勃字子安六嵗能屬文清才濬發構思無滯年十三省其父至江西㑹府帥宴於滕王閣時帥府有壻善為文章帥欲誇之賓友乃宿構滕王閣序俟賓合而出之為若即席而就者既㑹帥果授牋諸客諸客辭次至勃勃輒受帥既拂其意怒其不讓乃使人俟其下筆初報曰南昌故郡洪都新府帥曰此亦老生常談耳次曰星分翼軫地接衡廬帥沈吟移晷又曰落霞與孤鶩齊飛秋水共長天一色帥曰斯不朽矣出摭言元嘉元嘉少聰俊左手畫圓右手畫方口誦經史目數羣羊兼成四十字詩一時而就足書五言絶六事齊舉代號神仙童子出朝野僉載毛俊男并州人毛俊誕一男四嵗則天召入内試字千字文皆能暗書賜衣裳放還人皆以為精魅所託其後不知所終出朝野僉載蘇頲蘇瓌初未知頲常處頲於馬廐中與傭保雜作一日有客詣瓌候聽事頲擁篲趨庭遺墮文書客取視之乃詠崑崙奴詩也其詞云指頭十頲墨耳朶兩張匙客心異之久而瓌出與客淹留客笑語之餘因詠其詩并言形貌問瓌何人非足下宗族庶孽邪瓌備言其事客驚賀之請瓌加禮收舉必蘇氏之令子也瓌自是稍親之適有人獻瓌懸於廊廡之下瓌乃召頲詠之頲立呈詩曰子死蘭彈持來掛竹竿試將明鏡照何異月中看瓌大驚竒驟加顧禮由是學問日新文章蓋代出間天𫝊信記劉晏𤣥宗御勤政樓大張樂羅列百技時教坊有王大娘者善戴百尺竿竿上施木山狀瀛州方丈令小兒持絳節出入於其間歌舞不輟時劉晏以神童為秘書正字年方十嵗形狀獰劣而聰悟過人𤣥宗召於樓中簾下貴妃置於膝上為施粉黛與之巾櫛𤣥宗問晏曰卿為正字正得幾字晏曰天下字皆正唯朋字未正得貴妃復令詠王大娘戴竿晏應聲曰樓前百戲競爭新唯有長竿妙入神誰得綺羅翻有力猶自嫌輕更著人𤣥宗與貴妃及諸嬪御歡笑移時聲聞於外因命牙笏及黄文袍以賜之出明皇雜錄林傑林傑字智周幼而聰明秀異言發成文音調清舉年六嵗請舉童子時父肅為閩府大將性樂善尤好聚書又妙於手譚當時名公多與之交及有是子益大其門廉使崔侍郎千亟與遷職鄉人榮之傑五嵗父因攜之門脚至王仙君霸壇戲問童子能是乎傑遂口占云羽客已歸雲路去丹爐草木盡彫殘不知千載歸何日空使時人埽舊壇父初不謂藐嵗之作遽臻於此羣親益所驚異逓相傳諷鄉里喧然自此日課所為未幾盈軸明年遂獻唐中丞扶唐既伸幅窺吟聳耳皆歎命子弟延入學院時㑹七夕堂前乞巧因試其乞巧詩傑援毫曰七夕今朝看碧霄牽牛織女渡河橋家家乞巧望秋月穿盡紅絲幾萬條唐驚曰眞神童也以是鄉人羣來求看塡塞門巷傑又精於琴碁及草隸書俱自天然不假師受唐因與賓從碁或全局輸者令罩之勿觸取童子來繼終其事傑必指蹤出竒往往返勝曲盡𤣥妙時謂神助後復業詞賦頗振聲聞有仙客入壺中賦云仙客以變化隨形逍遙放情處於外則一壺斯在入其中則萬象俱成飛閣重樓不是人間之壯竒花異木無非物外之名至九嵗謁盧大夫貞黎常侍殖無不嘉奬尋就賓見日在讌筵李侍御逺趙支使容深所知仰不捨斯須和趙支使詠荔枝詩尤佳云金盤摘下排朱果紅殻開時飲玉漿鄭副使立作竒童傳劉制使重為序以貽之至年十七方結束琴書將決西邁無何七月中一旦天氣澄爽書堂前忽有異香氛氲竒音響亮家人出户觀見雙鶴嘹唳盤空而下雪翎朱頂徘徊庭際傑欣然捨筆躍下庭前抱得一隻其父驚訝恐非嘉兆令促放逡巡遡空而去親鄰聞兹咸來賀肅曰家藏書櫛比乃𩔖筵鱣之表祥也及夕傑偶得疾數日而終則知傑乃神仙謫下人世魂靈已蛻於鶴耳不然者何亡之速也出閩川名士𫝊髙定髙定真公郢之子為易合八出以畫八卦上圓下方八則為重轉則為演七轉而六十四卦六甲八節備焉著外傳二十二篇定小字董二時人多以小字稱初年七歲讀尚書至湯誓問父曰奈何以臣伐君答曰應天順人又問曰用命賞于祖不用命戮于社豈是順人父不能對出國史補李德裕李德裕神俊憲宗賞之坐于膝上父吉甫每以敏辯誇於同列武相元衡召之謂曰吾子在家所嗜何書意欲探其志也德裕不應翌日元衡具告吉甫因戲曰公誠陟大癡耳吉甫歸責之德裕曰武公身為帝弼不問理國調陰陽而問所讀書書者成均禮部之職也其言不當所以不應吉甫復告元衡大慙由是振名出北夢瑣言白居易白居易季庚之子始生未能言默識之無二字乳媪試之能百指而不誤間日復試之亦然既能言讀書勤敏與他兒異五六嵗識聲韻十五志詩賦二十七舉進士貞元十六年中書舍人髙郢掌貢闈居易求試一舉擢第明年拔萃甲科由是習性相近逺求𤣥珠斬白蛇等賦為時楷式新進士競相傳於京師矣㑹憲宗新即位始用為翰林學士出元禎長慶集序崔鉉魏公崔相鉉元略之子也為童兒時隨父訪于韓公滉滉見而憐之父曰此子爾來詩道頗長滉乃指架上鷹命詠焉遂命牋筆略無佇思於是進曰天邊心性架頭身欲擬飛騰未有因萬里碧霄終一去不知誰是解縧人滉益竒之歎曰此兒可謂前程萬里也大厯三年侍郎崔郾下及第果久居廊廟三擁節旄大中咸通之中時推清名重德宣宗皇帝常朝罷謂侍臣曰崔鉉眞貴人裴休眞措大初李石鎭江陵辟為戎卒一旦拂袖而去既入京登上第俄昇翰苑李未離荆渚崔既秉鈞衡李乃馳牋賀之曰某早拜光塵叨承眷與深蒙異分屢接清言幸曾顧於厚恩俯見循於末契去載分麾南楚拜節西秦思賢方詠於嘉魚棲止實慙於威鳯賓筵初啓曾陪樽俎之歡將幕未移已存陶鎔之下光生鄰部喜溢轅門豈惟九土獲安斯亦一方多幸乃掌記李隲之詞也于今播於衆口出南楚新聞李琪李琪名族也父敬唐廣明中佐王鐸滑州幕琪生而敏異十嵗通六籍遂博覽文史如寤宿習十三詞賦詩頌大為時賢親賞府帥王鐸聞而異之然每見所作亦有疑志鐸嘗留其父敬及幕府帥飲密遣人以漢祖三傑賦題試之俟畢持去賦尾云得士則昌非賢罔共龍頭之友斯貴鼎足之臣可重宜哉項氏之所以亡一范増而不能用鐸駭曰此兒大器也將欲發其文價乃以賦示坐客一席稱奬他日總角謁鐸鐸顧曰適蜀中詔到用夏州拓跋思㳟為京北收復都統可作一詩否即秉筆立製云飛騎經巴棧鴻恩及夏臺將從天上去人自日邊來此處金門逺何時玉輦迴早平闗右賊莫待詔書催鐸益竒之因執琪手曰此眞鳯毛也時年十四明年丁母憂因流寓青齊間然糠照薪俾夜作晝覽書數千卷間為詩賦唐僖宗再幸梁洋竊賦云哀痛不下詔登封誰上書至昭宗朝聯中科第又忽忽不樂恨未得轉四體為訓誥之語及梁祖受禪琪始自前殿中侍御史擢翰林學士出李琪集序劉神童劉神童者昭宗朝以鄉薦擢第時年六嵗矣帝召於便殿復試之神童朗諷經書初無㣲誤帝大稱因掇御盤果實賜之左右侍臣俱有羨色故都官鄭谷贈之詩曰習讀在前生僧譚足可明還家雖解苦登第未知榮時果曾沾賜春闗不任情燈前猶惡卧寱語誦書聲出鄭谷詩集路德延路德延儋州巖相之猶子也數嵗能為詩居學舍中嘗賦芭蕉詩曰一種靈苗異天然體性虛葉如斜界紙心似倒抽書詩成翌日𫝊於都㑹儋州坐事誅故德延久不能振光化初方就舉擢第大有詩價又為感舊詩曰初騎竹馬詠芭蕉嘗忝名卿誦滿朝五字便容過絳帳一枝尋許折丹霄豈知流落萍蓬逺不覺推遷嵗月遥國境永寧身未立至今顔巷守簞瓢天祐中授左拾遺會河中節度使朱友謙領鎭辟掌書記友謙初頗禮待之然德延性浮薄驕慢動多忤物友謙稍解體德延乃作孩兒詩五十韻以刺友謙友謙聞而大怒有以掇禍乃因醉沈之黄河詩實佳作也爾後雖繼有和者皆去德延逺矣詩曰情態任天然桃紅兩頰鮮乍行人共看初語客多憐臂膊肥如瓠肌膚軟勝綿長頭纔覆額分角漸垂肩散誕無塵慮逍遙占地仙排衙朱榻上喝道畫堂前合調歌楊栁齊聲踏採蓮走堤衝細雨奔巷趂輕烟嫩竹乗為馬新蒲掉作鞭鸚雛金鏇繋猧子綵絲牽擁鶴歸晴島驅鵝入暖泉楊花爭㺯雪榆葉共收錢錫鏡當胸掛銀珠對耳懸頭依蒼鶻裹袖學拓枝揎酒殢丹砂暖茶催小玉煎頻邀壽花插時乞繡針穿寶匣拿紅豆粧奩拾翠鈿短袍披案褥劣帽戴靴氊展畫趨三聖開屛笑七賢貯懷青杏小垂額緑荷圓驚滴沾羅淚嬌流汚錦涎倦書饒婭姹憎藥巧遷延㺯帳鸞綃映藏衾鳯結纒指敲迎使鼓筯撥賽神絃簾拂魚鉤動箏推鴈柱偏碁圖添路畫笛管欠聲鐫惱客初酣睡驚僧半入禪尋蛛窮屋瓦探雀遍樓椽抛果忙開口藏鉤亂出拳夜分圍榾柮朝聚打鞦韆折竹裝泥鷰添絲放紙鳶互誇輪水磑相效放風旋旗小裁紅絹書幽截碧牋逺鋪張鴿綱低控射蠅弦吉語時時道謠歌處處𫝊匿忩肩乍曲遮路臂相連鬭草當春逕爭毬出晚田栁旁慵獨坐花底困横眠等鵲潛籬畔聽蛩伏砌邊傍枝拈舞蝶偎樹捉鳴蟬平島跨蹻上層崖逞捷緣嫩苔車跡小深雪履痕全競指雲生岫齊呼月上天蟻窠尋逕斸蜂穴遶階塡樵唱迴深嶺笙歌下遠川壘材為屋木和土作盤筵險砌髙臺石危挑峻塔磚忽昇鄰舍樹偷上後池船項橐稱師日甘羅作相年明時方在德勸爾減狂顚闕韋莊韋莊幼時常在華州下邽縣僑居多與鄰巷諸兒㑹戲及廣明亂後再經舊里追思往事但有遺蹤因賦詩以記之又途次逢李氏諸昆季亦嘗賦感舊詩下邽詩曰昔為童稚不知愁竹馬閒乗遶縣遊曾為看花偷出郭也因逃學暫登樓招他邑客來還醉纔得先生去始休今日故人無處問夕陽衰草盡荒坵又逢李氏弟兄詩曰御溝西面朱門宅記取當時好弟兄曉傍栁隂騎竹馬夜偎燈影㺯先生巡街趂蝶衣裳破上屋探雛手脚輕今日相逢俱老大憂家憂國盡公卿闕太平廣記卷一百七十五
