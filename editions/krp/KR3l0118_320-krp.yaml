body:
  text: 太平廣記卷三百二十宋李昉等編鬼五蔡謨姚元起閭𠞰孫稚索遜馮述任懐仁王明王彪之王凝之姚牛桓恭阮瑜之劉澄劉道錫趙吉司馬隆蔡謨蔡謨徴爲光禄大夫在家忽聞東南啼哭聲有若新死便見一少年女死人並離啼哭不解所爲恐是人家忿争耳忽聞呼魂聲便見生女從空中去上天意甚惡之少時患疾遂薨出靈異志又一說謨在㕔事上坐忽聞鄰左復魂聲乃出庭前望正見新死之家有一老嫗上著黄羅半袖下著縹裙飄然升天聞一喚聲輒迴顧三喚三顧徘徊良久聲既絶亦不復見問喪家云亡者衣服如此出幽明錄姚元起河内姚元起居近山林舉家恒入野耕種惟有七歳女守屋而漸覺瘦父母問女女云常有一人長丈餘而有四面面皆有七孔自號髙天大將軍来輒見吞徑出下部如此數過云慎勿道我道我當長留腹中闔門駭惋遂移避出靈鬼志閭勦呉興武康閭勦凌晨聞外拍手自出看見二烏幘吏逕將至渚云官使乗船送豆至乃令勦枻二吏絙挽至嘉興郡暫住逆旅及平望亭潛逃得歸十餘日外復有呼聲又見二吏云汝何敢委叛將至船猶多菽又令捉枻船二吏絙挽始前至嘉樂故家謂勦曰我須過一處留汝在後慎勿復走若有飲食自當相喚須臾一吏呼勦上見髙門瓦屋歡讌盈堂仍令勦行酒并賜炙啖天將曉二吏云我先去汝且停頃之但見髙墳森木勦心迷亂其家尋覓經日方得尋發大瘡而死出靈鬼志孫稚晉孫稚字法暉齊般陽縣人也父祚晉太中大夫稚幼奉佛法年十八以咸康元年八月亡祚後移居武昌至三年四月八日沙門于法階行尊像經家門夫妻大小出觀見稚亦在人衆之中隨侍像行見父母見跪問訊隨共還家祚先病稚云無他禍祟不自將䕶所致耳五月當差言畢辭去其年七月十五日復歸跪拜問訊悉如生時說其外祖父爲泰山府君見稚說母字曰汝是某甲兒耶未應便来那得至此稚答伯父將来欲以代讁有教推問欲鞭罰之稚救解得原稚兄容字思淵時在其側稚謂曰雖離故形在優樂處但讀書無他作願兄勿憂也兄但勤精進福自隨人矣我二年學成當生國王家同輩有五百人今在福堂學成皆當上生第六天上我本亦應上生但以解救先人因緣纏縛故獨生王家耳到五年七月七日復歸說邾城當有冦難事例甚多悉皆如言家人祕之故無傳者又云先人多有罪譴宜爲作福我今受身人中不須復營但救先人也願父兄勤爲功徳作福食時務使鮮潔一一如法者受上福次者次福若不能然徒費設耳當使平等心無彼我其福乃多祚時有婢稚未還時忽疾殆死通身皆痛稚云此婢欲叛我前與鞭不復得去耳推問婢云前實欲叛與人爲期日垂至而便住云耳出法苑珠林索遜昇平中徐州刺史索遜乗船往晉陵㑹闇發迴河行數里有人寄索載云我家在韓冢脚痛不能行寄君船去四更舟至韓冢此人便去遜二人牽船過一渡施力殊不便罵此人曰我數里載汝来逕去不與人牽船欲與痛手此人便還與牽不覺用力而得渡此人便徑入諸冢間遜疑非人使竊尋看此人經冢間便不復見須臾復出至一冢呼曰載公有出者應此人說我向載人船来不爲共牽奴便欲打我今當往報之欲暫借甘羅来載公曰壊我甘羅不可得此人曰無所苦我試之耳遜聞此即還船須臾岸上有物来赤如百斛篅長二丈許逕來向船遜便大呼奴載我船不與我牽不得痛手方便載公甘羅今欲撃我今日要當打壊奴甘羅忽然失却於是遂進出續搜神記馮述上黨馮述晉元熈中爲相府將假歸虎牢忽逢四人各持繩及杖来赴述述策馬避焉不肯進四人各捉馬一足倐然便到河上問述欲渡否述曰水深不測既無舟檝何由得過君正欲見殺耳四人云不相殺當持君赴官遂復捉馬脚涉河而北述但聞波浪聲而不覺水垂至岸四人相謂曰此人不浄那得將去時述有弟服深恐鬼離之便當溺水死乃鞭馬作勢逕登岸述辭謝曰既䝉恩徳何敢復煩勞出續搜神記任懐仁晉昇平元年任懐仁年十三爲臺書佐鄉里有王祖復爲令史恒寵之懐仁已十五六矣頗有異意祖銜恨至嘉興殺懐仁以棺殯埋於徐祚家田頭祚後宿息田上忽見有冢至朝中暮三時食輒分以祭之呼云田頭鬼来就我食至暝眠時亦云来伴我宿如此積時後夜忽見形云我家明當除服作祭祭甚豐厚君明隨去祚云我是生人不當相見鬼云我自隱君形祚便隨鬼去計行食頃便到其家家大有客鬼將祚上靈座大食啖合家號泣不能自勝謂其兒還見王祖来便曰此是殺我人猶畏之便走出祚即形露家中大驚具問祚因敘本末遂隨祚迎喪既去鬼便斷絶出稽神錄王明東莱王明寓居在江西死經一年忽形見還家經日命招親好敘平生云天曹許以暫歸言及將離語便流涕問訊鄉里備有情焉敕兒曰吾去人間便已一周思覩桑梓命兒同觀鄉閭行經鄧艾廟令燒之兒大驚曰艾生時爲征東將軍沒而有靈百姓祠以祈福奈何焚之怒曰艾今在尚方摩鎧十指垂掘豈其有神因云王大將軍亦作牛驅馳殆斃桓温爲卒同在地獄此等並困劇理盡安能爲人損益汝欲求多福者正當恭慎盡忠孝順無恚怒便善流無極又令可錄指爪甲死後可以贖罪又使髙作户限鬼来入人室内記人罪過越限撥脚則忘事矣出幽明錄王彪之晉王彪之年少未官嘗獨坐齋中前有竹忽聞有歎聲彪之惕然怪似其母因往看之見母衣服如昔彪之跪拜歔欷母曰汝方有竒厄自今以去當日見白狗若能東行出千里三年然後得免災忽不復見彪之悲悵達旦既明獨見一白狗恒隨行止便經營行装將往㑹稽及出千里外所見便蕭然都盡過三年乃歸復還先齋住忽聞前聲往見母如先謂從吾故来慶汝汝自今以後年踰八十位班台司皆如母言出幽明錄王凝之晉左軍琅琊王凝之夫人謝氏頓亡二男痛惜過甚銜淚六年後忽見二兒俱還並著械慰其母曰可自割兒並有罪讁宜爲作福於是得止哀而勤爲求請出幽明錄姚牛須縣民姚牛年十餘父爲鄉人所殺牛嘗毁衣服市刀㦸圖欲報讎後在縣門前相遇手刃之於衆中吏擒得官長深矜孝節爲推遷其事㑹赦得免又爲州郡論救遂得無他令後出獵逐鹿入草中有古深井數處馬將趨之忽見一翁舉杖撃馬馬驚避不得及鹿令奴引弓將射之翁曰此中有井恐君墮耳令曰汝爲何人翁長跽曰民姚牛父也感君活牛故来謝因滅不見出幽明録桓恭桓恭爲桓安民參軍在丹徒所住廨牀前一小陷穴詳視是古墓棺已朽壊桓食常先以鮭飰投穴中如此經年後眠始覺見一人在牀前云吾終沒以来七百餘年後嗣絶滅烝嘗莫繼君食恒見播及感徳無已依君籍當應爲寧州刺史後果如言出幽明錄阮瑜之晉太元十年阮瑜之居在始興佛圖前少孤貧不立哭泣無時忽見一鬼書搏著前云父死歸𤣥冥何爲久哭泣即後三年中君家可得立僕當寄君家不使有損失勿畏我爲凶要爲君作吉後鬼恒在家家須用者鬼與之二三年家小康爲鬼作食共談笑語議阮問姓答云姓李名留之是君姊夫耳阮問君那得来鬼云僕受罪已畢今暫生鬼道權寄君家後四五年當去曰復何處去答云當生世間至期果别而去出幽明錄劉澄晉義熈五年彭城劉澄常見鬼及爲左衞司馬與將軍巢營廨宇相接澄夜相就坐語見一小兒赭衣手把赤幟團團似芙蓉花數日巢大遭火出幽明錄劉道錫劉道錫與從弟康祖少不信有鬼從兄興伯少来見鬼但辭論不能相屈嘗於京口長廣橋宅東云有殺鬼在東籬上道錫笑便問其處牽興伯俱去捉大刀欲斫之興伯在後喚云鬼撃汝道錫未及鬼處便聞如有大杖聲道錫因倒地經宿乃醒一月餘方差興伯復云㕔事東頭桑𣗳上有鬼形尚孺長必害人康祖不信問在𣗳髙下指處分明經十餘日是月晦夕道錫逃闇中以㦸刺鬼所住便還人無知者明日興伯早来忽驚曰此鬼昨夜那得人刺之殆死都不能復動死亦當不久康祖大笑出幽明錄趙吉鄴縣故尉趙吉常住田陌間昔日有一蹇人死埋在陌邊後二十餘年有一逺方人過趙吉門外逺方人行十餘步忽作蹇趙怪問其故逺人笑曰前有一蹇鬼故傚以戲耳出幽明錄司馬隆東魏徐忘名還作本郡卒墓在東安靈山墓先爲人所發棺柩已毁謝𤣥在彭城將佐齊郡司馬隆弟進及東安王箱等共取壊棺分以作車少時三人悉見患更相注連凶禍不已箱母靈語子孫云箱昔與司馬隆兄弟取徐府君墓中棺爲車隆等死亡喪破皆由此也出幽明錄太平廣記卷三百二十
