body:
  text: 太平廣記卷三百七十宋李昉等編精怪三雜器用國子監生姚司馬崔㲄張秀才河東街吏韋協律兄石從武姜修王屋薪者國子監生元和中國子監學生周乙者嘗夜習業忽見一小兒鬅鬙頭長二尺餘滿頸碎光如星熒熒可惡戲弄筆硯紛紜不止學生素有膽叱之稍却復傍書案因伺其所為漸逼近乙因擒之踞坐求哀辭頗苦切天將曉覺如物折聲視之乃弊木杓也其上黏粟百餘粒出酉陽雜俎姚司馬姚司馬寄居邠州宅枕一溪有二小女嘗戲釣溪中未嘗有獲忽撓竿各得一物若鱣者而毛若鱉者而鰓其家異之養於盆池經夕二女悉患精神恍惚夜常明炷對作戲染藍涅皁未嘗暫息然莫見其所取也時楊元卿在邠州與姚有舊姚因從事邠州又歴半年女病彌甚其家嘗張燈戲錢忽見二小手出燈影下大言曰乞一錢家或唾之又曰我是汝家女壻何敢無禮一稱烏郎一稱黄郎後常與家人狎昵楊元卿知之因為求上都僧瞻瞻善鬼神部持念治病魅者多著效瞻至姚家標釭界繩印手勅劔召之後設血食盆酒于界外中夜有物如牛鼻于酒上瞻乃匿劒躧步大言極力刺之其物匣刃而步血流如注瞻率左右明炬索之迹其血至後宇角中見若烏革囊大可合簣喘若鞴囊蓋烏郎也遂燬薪焚殺之臭聞十餘里一女即愈自是風雨夜門庭聞啾啾次女猶病瞻因立於前舉代折羅叱之女恐怖叩首瞻偶見其衣帶上有一皁袋子因令侍奴婢解視之乃小籥也遂搜其服玩籥勘得一簣簣中悉是喪家搭帳衣衣色唯黄與皁耳瞻假將滿不得已其魅因歸京逾年姚罷職入都先詣聸為加功治之涉旬其女臂上腫起如漚大如𤓰瞻禁針刺出血數合竟差出酉陽雜俎崔㲄元和中博陵崔㲄者自汝鄭來僑居長安延福里常一日讀書牖下忽見一僮長不盡尺露髮衣黄自北垣下趨至榻前且謂㲄曰幸寄君硯席可乎㲄不應又曰我尚壯願備指使何見拒之深耶㲄又不顧已而上榻躍然拱立良久於袖中出一小幅文書致㲄前乃詩也細字如粟歴然可辨詩曰昔荷蒙恬恵尋遭仲叔投夫君不指使何處覓銀鈎覽訖笑而謂曰既願相從無乃後悔耶其僮又出一詩投於几上詩曰學問從君有詩書自我𫝊須知王逸少名價動千年又曰吾無逸少之藝雖得汝安所用俄而又投一篇曰能令音信通千里解致龍虵運八行惆悵江生不相賞應緣自負好文章㲄戲曰恨汝非五色者其僮笑而下榻遂趨北垣入一穴中㲄即命僕發其下得一管文筆㲄因取書鋒銳如新用之月餘亦無他怪出宣室志張秀才東都陶化里有空宅太和中張秀才借得肄業常忽忽不安自念為男子當抱慷慨之志不宜恇怯以自軟因移入中堂以處之夜深欹枕乃見道士與僧徒各十五人從堂中出形容長短皆相似排作六行威儀容止一一可敬秀才以為靈仙所集不敢惕息因佯寢以窺之良久别有二物展轉於地每一物各有二十一眼内四眼􅗄􅗄如火色相馳逐而目光眩轉砉剨有聲逡巡間僧道三十人或馳或走或東或西或南或北道士一人獨立一處則被一僧擊而去之其二物周流於僧道之中未嘗暫息如此爭相擊摶或分或聚一人忽呌云卓絶矣言竟僧道皆黙然而息乃見二物相謂曰向者羣僧與道流妙法絶高然皆賴我二物成其敎行耳不然安得稱卓絶哉秀才乃知必妖怪也因以枕而擊之僧道三十人與二物一時驚走曰不速去吾輩且為措大所使也遂皆不見明日捜尋之於壁角中得一敗囊中有長行子三十箇并骰子一雙耳出宣室志河東街吏開城中河東郡有吏常中夜巡警街路一夕天晴月朗乃至景福寺前見一人俛而坐交臂擁膝身盡黑居然不動吏懼因叱之其人俛而不顧叱且久即朴其首忽舉視其面貌極異長數尺色白而痩狀甚可懼吏初驚仆於地久之稍能起因視之已亡見矣吏由是懼益甚即馳歸具語於人其後因重搆景福寺門發地得一漆桶凡深數尺上有白泥合其首果街吏所見出宣室志韋協律兄太常協律韋生有兄甚兇自云平生無懼憚耳聞有凶宅必往獨宿之其弟話於同官同官有試之者且聞延康東北角有馬鎭西宅常多怪物因領送其宅具與酒肉夜則皆去獨留之於大池之西孤亭中宿韋生以飲酒且熱袒衣而寢夜半方寤乃見一小兒長可尺餘身短脚長其色頗黑自池中而出冉冉前來循階而上以至生前生不為之動乃言曰卧者惡物直又顧我耶乃遶牀而行須臾生迴枕仰卧乃覺其物上牀生亦不動逡巡覺有兩箇小脚緣于生脚上冷如水鐵上徹于心行步甚遲生不動候其漸行上及於肚生乃遽以手摸之則一古鐵鼎子已欠一脚矣遂以衣帶繫之於牀脚明旦衆看之具白其事乃以杵碎其鼎染染有血色自是人皆信韋生之兇而能絶宅之妖也出𤣥怪錄石從武開成中桂林裨將石從武少善射家染惡疾長幼罕有全者毎深夜見一人自外來體有光耀若此物至則疾者呼吟加甚醫莫能效從武他夕操弓暎户以俟其來俄而精物復至從武射之一發而中焰光星㪚命燭視之乃家中舊使樟木燈擎已倒矣乃劈而燔之棄灰河中於是患者皆愈出桂林風土記姜修姜修者并州酒家也性不拘檢嗜酒少有醒時常喜與人對飲并州人皆懼其淫於酒或揖命多避之故修罕有交友忽有一客皁衣烏㡌身才三尺腰濶數圍造修求酒修飲之甚喜乃與促席酌客笑而言曰我平生好酒然毎恨腹内酒不常滿若腹滿則既安且樂若其不滿我則甚無謂矣君能容我久託跡乎我嘗慕君髙義幸吾人有以待之修曰子能與我同好眞吾徒也當無間耳遂相與席地飲酒客飲近三石不醉修甚訝之又且意其異人起拜之以問其鄉閭姓氏焉復問何道能多飲耶客曰吾姓成名徳器其先多止郊野偶造化之垂恩使我效用於時耳我今既老復自得道能飲酒若滿腹可五石也滿則稍安修聞此語復命酒飲之俄至五石客方酣醉狂歌狂舞自歎曰樂哉樂哉遂仆于地修認極醉令家僮扶於室内至室客忽躍起驚走而出家人遂因逐之見客悞扺一石剨然有聲尋不見至曉覩之乃一多年酒甕已破矣出瀟湘錄王屋薪者王屋山有老僧常獨居一茅菴朝夕持念唯採藥苖及松實食之毎食後恒必自尋溪澗以澡浴數年在山中人稍知之忽一日有道士衣敝衣堅求老僧一宵宿止老僧性僻復惡其塵雜甚不允道士再三言曰佛與道不相疎混沌已來方知有佛師今佛弟子我今道弟子何不見容一宵陪清論耳老僧曰我佛弟子也故不知有道之可比佛也道士曰夫道者居億刼之前而能生天地生人生萬物使有天地有人有萬物則我之道也億刼之前人皆知而尊之而師今不知即非人也老僧曰我佛恒河沙刼皆獨稱世尊大庇衆生恩普天地又豈聞道能争衡我且述釋迦佛世尊是國王之子其始也捨王位入雪山乘囊刼之功證當今之果天上天下惟我獨尊故使外道邪魔悉皆降伏至於今日孰不聞之爾之老君是誰之子何處修行敎跡之間未聞有益豈得與我佛同日而言道士曰老君降生於天為此劫之道祖始出於周浮紫氣乘白鹿人孰不聞至於三島之事十洲之景三十六洞之神仙二十四化之靈異五尺童子皆能知之豈獨師以庸庸之見而敢蔑耶若以爾佛捨父踰城受穿膝之苦而與外道角勝又安足道哉以此言之佛只是羣魔之中一強梁者耳我天地人與萬物本不賴爾佛而生今無佛必不損天地人與萬物也千萬勿自言世尊自言世尊世必不尊之無自稱尊耳老僧作色曰須要此等人設無此等即頓空却阿鼻地獄矣道士大怒伸臂而前擬擊老僧僧但合掌閉目須臾有一負薪者過見而怪之知老僧與道士争佛道優劣負薪者迺攘袂而呵曰二子俱父母所生而不養處帝王之土而不臣不耕而食不𧖟而衣不但偷生於人間復更以他佛道争優劣耶無居我山撓亂我山居之人遂遽焚其茅庵仗伐薪之斧皆欲殺之老僧驚走入地化為一鐵錚道士亦尋化一龜背骨乃知其皆精怪耳出瀟湘錄太平廣記卷三百七十
