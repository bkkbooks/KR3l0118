body:
  text: 太平廣記卷二百六十八酷暴二吉頊成王千里張亶王旭京師三豹張孝嵩王宏義謝祐河内王懿宗酷吏楊務亷李全交吉頊周明堂尉吉頊夜與監察御史王助同宿王助以親故爲說綦連耀男大覺小覺云應兩角麒麟也耀字光翟言光宅天下也頊明日録狀付來俊臣敇差河内王懿宗推誅王助等四十一人皆破家後俊臣犯事司刑斷死進狀三日不出朝野怪之上入苑吉頊攏馬上問在外有何異事頊奏曰臣幸預控鶴爲陛下耳目在外唯怪來俊臣狀不出上曰俊臣于國有功朕思之耳頊奏曰于安遠告虺貞反其事並驗今貞爲成州司馬俊臣聚結不逞誣遘賢良贓賄如山寃魂滿路國之賊也何足惜哉上令狀出誅俊臣于西市敇追于安遠還除尚食奉御頊有力焉除頊中丞賜緋頊理綦連耀事以爲巳功授天官侍郎平章事與河内王競出爲溫州司馬卒出朝野僉載成王千里唐成王千里使嶺南取大虵長八九尺以繩縳口横于門限之下州縣參謁者呼令入門但知直視無復瞻仰踏蛇而驚惶懼僵仆被蛇繞數匝良乆解之以爲戲笑又取龜及鼈令人脱衣縱龜等囓其體終不肯放死而後已其人酸痛號呼不可復言王與姬妾共看以爲玩樂然後以竹刺龜鼈口遂囓竹而放人艾炙鼈背炙痛乃放口人被驚者皆失魂至死不平復矣闕張亶唐朔方總管張亶好殺時有突厥投化亶乃作檄文罵黙啜言詞甚不遜書其腹背鑿其肌膚湼之以墨炙之以火不勝楚痛日夜作蟲鳥鳴然後送與黙啜字者宜訖臠而殺之匈奴怨望不敢降出朝野僉載王旭唐殿中侍御史王旭括宅中及别宅女婦風聲目色有不承者以繩勒其隂令壯士彈竹擊之酸痛不可忍倒懸一女婦以石縋其髪遣證與長安尉房恒奸經三日不承女婦曰侍御如此苦毒兒死必訢于㝠司若配入宫必申于主上終不相放旭慙懼乃捨之出朝野僉載京師三豹唐監察御史李嵩李全交殿中王旭京師號爲三豹嵩爲赤黧豹交爲白額豹旭爲黑豹皆狠虐不軌鴆毒無儀體性狂踈精神慘刻毎訊囚必鋪棘臥削竹籖指方梁壓髁碎瓦搘膝遣作仙人獻果玉女登梯犢子懸車驢兒㧞橛鳳皇晒翅獼猴鑽火上麥索下闌單人不聊生囚皆乞死肆情鍜鍊證是爲非任意指麾傅空爲實周公孔子請伏殺人伯夷叔齊求其刼罪訊劾乾塹水必有期推鞫濕泥塵非不乆來俊臣乞爲弟子索元禮求作門生被追者皆相謂曰牽羊付虎未有出期縛䑕與猫終無脫日妻子永别朋友長辭京人相要作呪曰若違心負敎橫遭三豹其毒害也如此出朝野僉載張孝嵩京兆人高麗家貧于御史臺替勛官逓送文牒其時令史作僞帖付高麗追人擬嚇錢事敗令史逃亡追討不獲御史張孝嵩捉高麗拷膝骨落地兩脚俱攣抑遣代令史承僞准法斷死訖大理卿狀上故事准名例律篤疾不合加刑孝嵩勃然作色曰脚攣何廢造僞命乃舁上市斬之出朝野僉載王宏義王宏義衡水人也告變授游擊將軍天授中拜御史與俊臣羅告衣冠俊臣敗義亦流於嶺南妄稱敕追時胡元禮以御史使嶺南次于襄鄧會而按之宏義詞窮乃謂曰與公氣類元禮曰足下昔任御史禮任洛陽尉禮今任御史公乃流囚復何氣類乃榜殺之宏義毎暑月繫囚必于小房中積蒿而施氊褥遭之者斯須氣將絕矣茍自誣或他引則易于别房俊臣常行移牒州縣慴懼自矜曰我之文牒有如狠毒冶葛也宏義嘗于鄉里求旁舍𤓰𤓰主吝之義乃狀言𤓰園中有白兎縣吏會人捕逐斯須苖盡矣内史李昭德曰昔聞蒼鷹獄吏今見白兎御史出御史臺記謝祐周黔府都督謝祐兇險忍毒則天朝徙曹王于黔中祐嚇云則天賜自盡祐親奉進止更無别敇王怖而縊死後祐于平閣上臥婢妾十餘人同宿夜不覺刺客截祐首去後曹王破家簿録事得祐首漆之題謝祐字以爲穢器方知王子令刺客殺之出朝野僉載河内王懿宗周黙啜賊之陷恒定州和親使楊齊莊敕授三品入匈奴遂沒賊將至趙州襄公段瓆同沒喚莊共出走莊懼不敢發瓆遂先歸則天賞之復舊任齊莊尋至敕付河内王懿宗鞫問莊曰昔有人相莊位至三品有刀箭厄莊走出被赶斫射不死走得脱來願王哀之懿宗性酷毒奏莊初懐猶豫請殺之敕依引至天津橋南于衛士鋪鼓格上縛磔手足令段瓆先射三發皆中又段瑾射之中又令諸司百官射箭如蝟毛仍氣弽弽然微動即以刀當心直下破至隂剖取心擲地仍趌趌跳數十回懿宗之忍毒也如此出朝野僉載酷吏來俊臣侯思止王宏義郭霸等數十人爲推官俊臣父操與鄉人蔡本善本與操摴蒱􅑿本錢數十萬本無以酧遂將其妻馮折及至操家已有娠而産俊臣于禾州犯盜遂因密告則天以為忠累拜侍御史按制獄無不會意拜左臺中丞道路以目與侯思止等以告事為羅織則天于麗景門側别置推院令俊臣等按之但入新開門百不全一宏義戲為例竟門俊臣與其黨朱南山等造羅織經一卷每鞫囚無輕重先以醋灌鼻禁地牢中以火圍繞絕其糧多抽衣絮以啗之將有赦必先盡殺其囚又作大枷凡十一曰定百脈二曰喘不得三曰突地吼四曰著即承五曰失魂膽六曰實同反七曰反是實八曰死猪愁九曰求得死十曰求破家遭其枷者悶轉於地莫不自誣則天尤賞之朝士每入朝多與妻子訣别及禁狄仁傑仁傑置書于綿衣中請獄吏付家人家人得之訟于則天則天令驗之果寃問仁傑何以自誣對曰若不承反即已死于枷棒矣俊臣後坐贓御史劾之除殿中丞又拜中丞復坐贓出爲同州參軍奪同列參軍妻旋爲合宫尉又拜洛陽令復圖西番酋長阿史那斛瑟羅婢稱其謀反其黨𠢐面詣闕訟之得免將告諸武太平公主乃反爲其所發棄市人競臠其肉中宗詔酷吏並配流遠惡處子孫不得仕進周興累爲司刑少卿上疏請除李家屬籍後徙嶺表爲仇人所殺傅遊藝除左補闕上書言武氏合革命拜給事中又爲鸞臺平章事天授元年改姓武氏夢登湛露殿陳于所親及事發伏誅遊藝一年内青緑緋紫皆遍轉號爲四時仕宦請則天置六道使死後竟從其言於是萬國俊丘神勣皆酷虐思止告舒王元名反授逰擊將軍初元禮教思止上必問侯大不識字但云獬豸豈識字只能觸邪果問而對則天大悅授左臺侍御史又教上若問要宅得賜沒官者但云臣惡其名不願居止上又悦嘗按魏元忠曰急承白司馬不然吃孟青孟青者姓孟名青即殺瑯琊王冲者也白司馬坂名思止庸奴常以此語嚇元忠元忠不撓思止以其拒制命倒曵之元忠曰我如乘惡驢而墜爲鐙所掛思止又怒欲奏斬之元忠曰汝爲御史須識禮數若要元忠頭便將去何必以鋸截將思止驚悚與之坐思止言音不正霍獻可笑之思止怒奏之則天知亦大笑時俊臣逼娶太原王慶説女思止亦奏娶趙郡李自挹女昭德撫掌謂諸宰相曰徃年來俊臣賊刼王慶説女已大辱國今此奴又謂索李自挹女無乃又辱乎竟爲昭德榜殺萬國俊按嶺南流人三百餘人擁于水次一時殺之來子珣除右臺監察時朝士有不著靴𢃄而朝者必彈之曰臣聞束𢃄立于朝舉朝大噱後賜武氏家臣多按制獄常衣錦半臂郭霸應革命舉爲監察又爲侍御史見則天曰徃年征徐敬業臣願抽其筋食其肉飲其血絕其髓上大悦人呼爲郭四其御史大夫魏元忠患病霸請嘗其糞元忠不許竟嘗之曰其味苦病即愈元忠以其佞大惡之嘗推芳州刺史索思微微不勝其捶拷而死後屢見思微遂設齋轉經俄見思微止于庭曰汝陷我今來取汝霸恐懼遂自刳腹而卒時洛橋初成人便之則天問人曰外有何好事舍人張元一素滑稽曰喜洛橋成幸郭霸死出神異經楊務亷唐楊務亷孝和時造長寧安樂宅倉庫成特授將作大匠坐贓數千萬免官又上章奏開陜州三門鑿山燒石巖側施棧道牽船河流湍急所顧夫並未與價直茍牽繩一斷棧梁一絕則樸殺數十人取顧夫錢糴米充數即註夫逃走下本貫禁父母妻子其牽船夫皆令繫二鈲于胷皆落棧著石百無一存道路悲號聲動山谷皆稱楊務亷爲人妖天生此妖以破殘百姓出朝野僉載李全交唐監察御史李全交等以羅織酷虐爲業臺中號爲人頭羅刹殿中王旭號爲鬼面夜叉訊囚引枷柄向前名爲驢駒㧞橛縛枷頭著樹名曰犢子懸車兩手捧枷累磚于上號爲仙人獻果立髙木之上枷柄向後抅之名玉女登梯拷郴州典廖福司門令史張性並求神狐魅皆遣喚鶴作鳳證蛇成龍也出朝野僉載太平廣記卷二百六十八
