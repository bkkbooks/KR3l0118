body:
  text: 太平廣記卷二百文章李蔚盧渥韓定辭姚巖傑狄歸昌杜荀鶴武臣有文曹景宗髙昻賀若弼李密髙崇文王智興髙駢羅紹威趙延夀文章李蔚唐丞相李蔚鎮淮南日有布素之交孫處士不遠千里徑來修謁蔚浹月留連一日告發李敦舊分遊河祖送過於橋下波瀾迅激舟子迴䟦舉篙濺水近坐飲妓濕衣尤甚李大怒令擒舟子荷於所司處士拱而前曰因兹寵餞是某之過敢請筆硯略抒荒蕪李從之乃以栁枝詞曰半額㣲黄金縷衣玊搔頭裊鳯雙飛從教水濺羅裙濕還道朝來行雨歸李覽之釋然歡笑賔從皆賛之命伶人唱其詞樂飲至暮舟子赦罪更有李嶸獻詩云雞𣗳烟含瑞氣凝鳯池波待玉山澄國人久倚東闗望擬築沙堤到廣陵後果入相出抒情詩盧渥唐左丞相盧渥軒冕之盛近代無比伯仲四人咸居顯列乾符初母憂服闋渥自前中書舍人拜陜府觀察使又旬日其弟紹自前長安令除給事中又旬日弟沆自前集賢挍理除左拾遺又旬日弟沼自畿尉遷監察御史詔書疊至士族榮之及赴任陜郊洛城自居守分司朝臣已下互設祖筵遮於行路洛城為之一空都人觀者架肩擊轂盛於清明灑掃之日自臨都驛以至於行凡五十里連翩不絶有白鬚傳卒鳴指歎曰老人為驛吏垂五十年閲事多矣而未曾見祖送之盛有如此者時士流竊語以此日在家者為耻渥有題嘉祥驛詩曰交親榮餞洛城空善戲戎装上將同星使自天丹詔下雕鞍照地數程中馬嘶静谷聲偏響斾暎晴山色更紅到後定知人易化滿街棠𣗳有遺風詩版後為易定帥王存尚書碎之出唐闕史韓定辭唐韓定辭為鎭州王鎔書記聘燕帥劉仁恭舍於賓館命試幕客馬或延接馬有詩贈韓曰燧林芳草綿綿思盡日相擕陟麗譙别後巏嵍山上望羡君時復見王喬或詩雖清秀然意在徵其學問韓亦於座上酬之曰崇霞臺上神仙客學辨癡龍藝最多盛德好將銀管述麗詞堪與雪兒歌座内諸賓靡不欽訝稱妙句然亦疑其銀筆之僻也他日或復持燕帥之命答聘常山亦命定辭接於公館時有妓轉轉者韓之所眷也毎當酒席或頻目之韓曰昔聞晉文公分季隗於趙衰孫伯符輟小喬於公瑾蓋以色可奉名人但慮倡姬不如賢者之顧願垂一詠俾得奉之或援筆文不停綴作轉轉之賦其文甚美咸欽其敏妙遂傳於遠近或從容問韓以雪兒銀管之事韓曰昔梁元帝為湘東王時好學著書常記録忠臣義士及文章之美者筆有三品或以金銀雕飾或用斑竹為管忠孝全者用金管書之德行清粹者用銀管書之文章贍麗者以斑管書之故湘東之譽振於江表雪兒者李密之愛姬能歌舞毎見賓僚文章有竒麗入意者即付雪兒叶音律以歌之又問癡龍出自何處定辭曰洛下有洞穴曾有人誤墮於穴中因行數里漸見明曠見有宫殿人物凡九處又見有大羊羊髯有珠人取而食之不知何所後出以問張華曰此地仙九館也大羊者名曰癡龍耳定辭復問或巏嵍之山當在何處或曰此隋君之故事何謙光而下問由是兩相悦服結交而去出北夢瑣言姚巖傑姚巖傑梁公元崇之裔孫也童丱聰悟絶倫弱冠博通墳典慕班固司馬遷為文時稱大儒常以詩酒放逸江左尤肆淩忽前逹旁若無人唐乾符中顏標典鄱陽郡鞠塲公宇初構請巖傑紀其事文成燦然千餘言標欲刋去一兩字巖傑大怒標不能容時已勒石遂命覆碑於地磨去其文巖傑以一篇紀之曰為報顏公識我麽我心唯秖與天和眼前俗物關情少醉後青山入夢多田子莫嫌彈鋏恨寗生休唱飯牛歌聖朝若為蒼生計也合公車到薜蘿盧肇牧歙州巖傑在婺源先以著述寄肇肇知其使酒以手書褒美贈以束帛辭云兵火之後郡中凋弊無以迎逢大賢巖傑復以長牋激之肇不得已迓至郡齋待如公御禮既而日肆傲睨輕視於肇肇常以篇詠誇於巖傑曰明月照巴天巖傑大笑曰明月照一天奈何獨言巴天耶肇漸不得意無何㑹於江亭時蒯希逸在席盧請目前取一事為酒令尾有樂噐之名肇令曰遠望漁舟不濶尺八巖傑遽飲酒一噐凭欄嘔噦須臾即席還令曰凭欄一吐已覺空喉其侮慢倨傲如此出摭言狄歸昌唐僖宗幸蜀有詞人於馬嵬驛題詩云馬嵬煙栁正依依重見鑾輿幸蜀歸泉下阿蠻應有語這廻休更泥楊妃不出名氏人仰竒才此即侍郎狄歸昌詩也出抒情詩杜荀鶴唐杜荀鶴嘗吟一聨詩云舊衣灰絮絮新酒竹篘篘或話於韋莊莊曰我道印將金鏁鏁簾用玉鈎鈎莊後西蜀為相出北夢𤨏言武臣有文曹景宗梁曹景宗累立軍功天監初徵為右衛將軍後破魏軍振旅帝於華光殿宴飲聨句左僕射沈約賦韻景宗不得韻意色不平啓求賦詩帝曰卿伎能甚多人才英㧞何必止在一詩景宗已醉求作不已詔令賦競病兩字景宗便操筆而成曰去時兒女悲歸來笳鼔競借問行路人何如霍去病帝欣賞不已於是進爵為公出曺景宗傳髙昻北齊髙昻字敖曹膽力過人姿彩殊異其父次同為求嚴師教之昻不遵師訓專事馳騁毎言男兒當横行天下自取富貴誰能端坐讀書作老博士也其父以其昻藏敖曹故名字之東魏末齊神武起義昻傾意附之因成霸業除侍中司徒兼西南道大都督而敖曹酷好為詩雅有情致時人稱焉常從軍與相州刺史孫騰作行路難曰卷甲長驅不可息六日六夜三度食初時言作虎牢停更被處置河橋北廻首絶望便蕭條悲來雪涕還自抑又有征行詩曰瓏種千口羊泉連百壺酒朝朝圍山臘夜夜迎新婦頃之其弟季式為齊州刺史敖曹發驛以勸酒乃贈詩曰憐君憶君停欲死天上人間無可比走馬海邉射遊鹿偏坐石上彈鳴雉昔時方伯願三公今日司徒羡刺史餘篇甚多此不復載出談藪賀若弼隋賀若弼字輔伯少有大志驍勇便弓馬解屬文渉書記有重名及隋文受禪隂有平江南之志訪可任者髙熲薦弼有文武才幹拜總管委以平陳之事若弼欣然以為己任與壽州總管源雄並為重鎭若弼遺詩曰交河驃騎幕合浦伏波營勿使麒麟上無我二人名獻平陳十䇿稱上㫖開皇九年大舉伐陳以若弼為行軍總管俘陳叔寶出賀若弼傳李密隋李密蒲山公寛之子也初授親衛大都督非其所好稱疾而歸大業中佐楊𤣥感起兵及𤣥感敗密間行入關亡抵平原賊帥郝孝德不禮之邅饑饉至削𣗳皮而食乃詣睢陽舍於村中變名姓稱劉知遠聚徒教授經數月不得志乃為五言詩曰金風颺秋節玉露凋晩林此夕窮途士鬱陶傷寸心眺聼良多感慷慨獨霑襟霑襟何所為悵然懐古意秦俗猶未平漢道將何冀樊噲市井屠蕭何刀筆吏一朝時運合萬古傳名諡寄言世上雄虚生真可愧詩成泣下數行羲寜元年密潛據洛口㑹羣盗百萬築壇稱魏公建元二年密自鞏洛鼓行伐隋兵敗歸唐授光禄卿出河洛記髙崇文唐相髙崇文夲薊門之驍將也以討劉闢功授西川節度使一旦大雪諸從事吟賞有詩崇文遽至飲席笑曰諸君自為樂殊不見顧鄙夫鄙夫武人亦有一詠雪詩乃口占曰崇文崇武不崇文提戈出塞舊從軍有似胡兒射飛鴈白毛空裏落紛紛詩多中的皆謂北齊敖曹之比太尉駢即其孫也出北夢瑣言王智興唐侍中王智興初為徐州節度使武略英特有命世之譽幕府既開所辟皆是名士一旦從事於使院㑹飲與賓朋賦詩頃之逹於王王乃召䕶軍俱至從事因屏去翰墨但以盃盤迎接良久問之曰適聞判官與諸賢作詩何得見某而罷遽令却取筆硯以彩牋數幅陳席上衆賓相與遲疑俟行觴舉樂復曰夲來欲觀製作非以飲酒為意時小吏亦以牋翰置於王公之前從事禮為揖讓王曰某韜鈴發跡未嘗留心章句今日陪奉英髦不免亦陳愚懇於是引紙援毫頃刻而就云三十年來老健兒剛被郎官遣作詩江南花栁從君詠塞北烟塵我自知四座覽之驚歎無已時文人張祐亦預此筵監軍謂之曰觀兹盛事豈得無言祐即席為詩以獻云十年受命鎭方隅孝節忠規兩有餘誰信將壇嘉政外李陵章句右軍書智興覽之笑曰褒飾之詞可謂過當矣左右或言曰書生之徒務為諂佞智興叱之曰有人道我惡汝軰又肯否張秀才海内名士豈云易得天下人聞且以為王智興樂善矣駐留數旬臨岐贈絹千匹出劇談録髙駢唐髙駢㓜好為詩雅有竒藻屬情賦詠横絶常流時秉筆者多不及之故李氏之季言勲臣有文者駢其首焉集遇亂多亡今其存者盛傳於時其自賦言懐詩曰恨乏平戎䇿慚登拜將壇手持金鉞重身掛鐡衣寒主聖匡扶易恩深報効難三邉猶未静何敢便休官二女廟詩云帝舜南廵去不還二妃幽怨水雲間當時珠涙垂多少直到而今竹尚斑又詠雪云六出花飄入户時坐㸔修竹變瓊枝逡廵好上髙樓望蓋盡人間惡路岐又聼歌詩公子邀歡月滿樓佳人掲調唱伊州便從席上秋風起直到蕭關水盡頭又寄僧笻竹杖詩云堅輕笻竹杖一杖有九節寄與沃州僧閑歩秋山月出謝蟠雜説羅紹威梁鄴王羅紹威世為武人有膽決喜尚文學雅好儒生於㕔所之側别立學舍招延四方遊士置於其間待以恩禮毎旦視事之暇則與諸儒講論經義聚書萬餘卷於學舍之側建置書樓縱儒士隨意觀覽已亦孜孜諷誦當時藩牧之中最獲文章之譽毎命幕客作四方書檄小不稱旨壊裂抵棄自襞牋起草下筆成文雖無藻麗之風幕客多所不及又僻於七言詩毎歌酒讌㑹池亭遊覽靡不賦詠題之屋壁時江南有羅隱者為兩浙錢鏐幕客有文學紹威特遣使幣交聘申南阮之敬隱悉以所著文章詩賦酬寄紹威紹威大傾慕之乃目已所為詩曰偷江東今鄴中人士有諷誦者自為大㕔記亦㣲有可觀出羅昭威傳趙延壽偽遼丞相趙延壽德鈞之子也仕唐為樞密使清泰末自太原陷虜耶律德光用為偽丞相綜國事晉少主失政延壽道戎王為亂凡數年之間盗有中夏實延壽贊成之力也延壽將家子㓜習武畧即戎之暇時復以篇什為意亦甚有雅致嘗在邊庭賦詩曰黄沙風捲半空抛雲動隂山雪滿郊探水人廻移帳就射鵰箭落着弓抄鳥逢霜果饑還啄馬渡氷河渇自跑占得髙原肥草地夜深生火折林梢南人聞者往往傳之出趙延壽傳太平廣記卷二百
