body:
  text: 太平廣記卷二百四十二謬誤益州長吏蕭頴士郗昻張長史蕭俛崔清何儒亮于頔苑䛆李文彬蘇拯竇少卿遺忘張利渉閻𤣥一郭務靜張守信李睍張藏用謬誤益州長吏唐益州每歲進柑子皆以紙裹之他時長吏嫌其不敬代之以細布既而恒恐有柑子為布所損每歲多懐憂懼俄有御史甘子布至長吏以為推布裹甘子事因大懼曰果為所推及子布到驛長吏但叙以布裹柑子為敬子布初不知之乆而方悟聞者莫不大笑子布好學有才知名當代出大唐新語蕭穎士唐天寳初蕭頴士因遊靈昌遠至胙縣南二十里有胡店店上有人多姓胡頴士發縣日晚縣寮飲餞移時薄暮方行至縣南三五里便即昏黑有一婦人年二十四五着紅衫綠裙騎驢驢上有衣服向穎士言兒家直南二十里今歸遇夜獨行怕懼願隨郎君鞍馬同行頴士問女何姓曰姓胡頴士常見世間説有野狐或作男子或作女人於黄昏之際媚人頴士疑此女即是野狐遂唾叱之曰死野狐敢媚蕭穎士遂鞭馬南馳奔至主人店歇息解衣良乆所見婦人從門牽驢入來其店叟曰何為衝夜曰衝夜猶可適被一害風措大呼兒作野狐合被唾殺其婦人乃店叟之女也頴士慚恧而已出辨凝志郗昻唐郗昻與韋陟交善因話國朝宰相誰最無德昻誤對曰韋安石也已而驚走而去逢吉温於街中温問何故倉惶如此答曰適與韋尚書話國朝宰相最無徳者本欲言吉頊誤言韋安石既言又鞭馬而走抵房相之第琯執手慰問之復以房融為對昻有時稱忽一日犯三人舉朝嗟嘆唯韋陟遂與之絶出國史𥙷張長史唐臨濟令李囘妻張氏其父為廬州長史吿老歸以囘之薄其女也故往臨濟辱之誤至全節縣而問門人曰明府在乎門者曰在張遂入至㕔前大罵辱全節令趙子餘不知其故私自門窺之見一老父詬罵不已而縣下常有狐烏魅以張為狐焉乃密召吏人執而鞭之張亦未寤罵仍恣肆擊之困極方問何人輒此詬罵乃自言吾李囘妻父也囘賤吾女來怒囘耳全節令方知其誤寘之館給醫藥焉張之僮夜亡至臨濟告囘囘大怒遣人吏數百將襲全節而擊令令懼閉門守之囘遂至郡訴之太守召令責之恕其誤也使出錢二十萬遺張長史以和之囘乃迎至縣張喜囘之報復卒不言其薄女遂歸出紀聞蕭俛唐貞元中蕭俛新及第時國醫王彦伯住太平里與給事鄭雲逵比舎住忽患寒熱早詣彦伯求診候誤入雲逵第㑹門人他適雲逵立於中門俛前趨曰某前及第有期集之役忽患病具説其狀逵命僕人延坐為診其臂曰據脈候是心家熱風雲逵姓鄭若覓國醫王彦伯東隣是也俛赧然而去出乾􅍧子崔清唐崔清除濠州刺史替李遜清辭戸部侍郎李巽畱坐與語清指謂所替李遜曰清都不知李遜渾不解官再三言之巽曰李巽即可在只是獨不稱公意清稍悟之慚顧而去出嘉話録何儒亮唐進士何儒亮自外州至京訪其從叔誤造郎中趙需宅自云同考房㑹冬至需欲家宴揮霍云既是同房便令入宴姑姊妺妻子盡在焉儒亮饌畢徐出及細察之乃何氏之子也需大笑儒亮歲餘不敢出京城時人因以為何需郎中出國史補于頔唐司空于頔以樂曲有想夫憐其名不雅將改之客有笑曰南朝相府曽有瑞蓮故歌為相府蓮自是後人語訛乃不改出國史補又舊説董仲舒墓門人至皆下馬謂之下馬陵語訛為蝦蟇陵今荆襄之人呼堤為提留絳之人呼釜為付皆訛謬所習也出國史補苑䛆唐尚書裴胄鎭江陵常與苑論有舊論及第後更不相見但書札通問而已論弟䛆方應舉過江陵行謁地主之禮客將見䛆名曰秀才之名雖字不同且難於尚書前為禮如何㑹䛆懐中有論舊名紙便謂客將曰某自别有名客將見日晩倉遑遽將名入胄喜曰苑大来矣屈入䛆半庭胄見貎異及坐揖曰足下第幾䛆對曰第四胄曰與苑大遠近䛆曰家兄又問曰足下正名何對曰名論又曰賢兄改名乎䛆曰家兄也名論公庭將吏於是皆笑及引坐乃陳本名名䛆既逡巡於便院俄而遠近悉知出乾􅍧子李文彬唐舉人李文彬受知於舍人紀于臮時有京兆府司籙賀蘭洎卒文彬因謁紫微紫微問曰今日有何新事文彬曰適過府門聞紀于洎卒臮曰莫錯否文彬曰不錯臮曰君大似共鬼語也拂衣而入文彬乃悟葢俱重姓又同名而誤對也出竒聞録蘇拯唐光化中蘇拯與鄉人陳滌同處拯與考功郎中蘇璞初叙宗黨璞故奉常滌之子也拯既執贄尋以啓事温卷因令陳滌緘封滌遂誤書已名璞得之大怒拯聞之倉皇復致書謝過吳子華聞之曰此書應悞也出北夢瑣言竇少卿有竇少卿者家于故都素㳺渭北諸州至村店中有從者抱疾寄于主人而前去歴鄜延靈夏經年未歸其從者尋卒於店中此人臨卒店主問曰何姓名此僕只言得竇少卿三字便奄然無語店主遂坎路側以埋之卓一牌向道曰竇少卿墓與竇相識者過之大驚訝問店主店主曰牌上有名固不謬矣於是更有識竇者經過甚痛惜有至親者報其家及令骨肉省其牌果不謬其家於是舉哀成服造齋相次迎其旅櫬殯𦵏遠近親戚咸来弔慰𦵏後月餘有人附到竇家書歸程已近郡報上下平善其家大驚不信謂人詐修此書又有人報云道路間覩其形貌甚是安健其家愈惑之遂使人潛逆之竊窺于路左疑其鬼物至其家妻男皆謂其魂魄歸来竇細話其由方知埋者是從人乃店主卓牌之錯誤也出王氏見聞遺忘張利渉唐張利渉性多忘解褐懐州參軍每聚㑹被召必於笏上記之時河内令耿仁惠邀之怪其不至親就門致請渉看笏曰公何見顧笏上無名又一時晝寝驚索馬入州扣刺史鄧惲門拜謝曰聞公欲賜責死罪鄧惲曰無此事渉曰司功某甲言之惲大怒乃呼州官箠以甲間搆將杖之甲苦訴初無此語渉前請曰望公捨之渉恐是夢中見説耳時人由是咸知其性理惛惑矣出朝野僉載閻𤣥一唐三原縣令閻𤣥一為人多忘曾至州於主人舎坐州佐史前過以為縣典也呼欲杖之典曰某是州佐也一慚謝而止須臾縣典至一疑其州佐也執手引坐典曰某是縣佐也又愧而止曾有人傳其兄書者止於階下俄而里胥白錄人到一索杖遂鞭送書人數下其人不知所以訊之一曰吾大錯顧直典向宅取杯酒愞瘡良乆典持酒至一既忘其取酒復忘其被杖者因便賜直典飲之出朝野僉載郭務靜唐滄州南皮縣丞郭務靜初上典王慶通判案靜曰爾何姓慶曰姓王須臾慶又来又問何姓慶又曰姓王静怪愕良乆仰看慶曰南皮佐史摠姓王出朝野僉載張守信唐張守信為餘杭太守善富陽尉張瑤假借之瑤不知其故則使錄事參軍張遇逹意於瑤將妻之以女瑤喜吉期有日矣然私相聞也郡縣未知之守信為女具衣装女之保母問曰欲以女適何人守信以告保母曰女壻姓張不知主君之女何姓吾竊惑焉守信乃悟亟止之出紀聞李睍唐殿中侍御史李逄年自左遷後稍進漢州雒縣令逄年有吏才蜀之採訪使常委以推按焉逄年妻中丞鄭昉之女也情志不合去之及在蜀城謂益府戸曹李睍曰逄年家無内主濩落難堪兒女長成理須婚娶弟既相狎幸為逄年求一妻焉此都官寮女之與妺縱再醮者亦可論之幸留意焉睍曰諾復又訪之於睍睍率略人也乃造逄年曰兵曹李札甚名家也札妺甚羙聞於蜀城曾適元民莫夫尋卒資装亦厚從婢且二十人兄能娶之乎逄年許之令睍報李札札自造逄年謝明日請至宅其夜逄年喜寝未曙而興嚴飾畢顧歩階除而獨言曰李札之妺門地若斯雖曾適人年幼且羙家又富貴何幸如之言再三忽驚難曰李睍過矣又誤於人今所論親為復何姓怪哉因䇿馬到府庭李睍進曰兄今日過札妺乎逄年不應睍曰事變矣逄年曰君思札妺乎為復何姓睍驚而退遇李札札曰侍御今日見過乎已為地矣睍曰吾大誤耳但知求好壻都不思其姓氏札大驚惋恨之出紀聞張藏用唐青州臨朐丞張藏用性既魯鈍又弱於神嘗召一木匠十召不至藏用大怒使擒之匠既到適㑹隣縣令使人送書遺藏用藏用方怒解木匠又走讀書畢便令剝送書者笞之至十送書人謝杖請曰某為明府送書縱書人之意忤明府使者何罪藏用乃知其誤謝曰適怒匠人不意誤笞君耳命里正取飲一器以飲送書人而别更視事忽見里正指酒問曰此中何物里正曰酒藏用曰何妨飲之里正拜而飲之藏用遂入戸送書者竟不得酒扶杖而歸出紀聞太平廣記卷二百四十二
