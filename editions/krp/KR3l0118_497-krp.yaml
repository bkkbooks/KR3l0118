body:
  text: 太平廣記卷四百九十七宋李昉等編雜録高逞呂元膺王鍔江西驛官王仲舒周愿張薦蓮花漏唐衢脂粉錢韋執誼李光顔李益吳武陵韋乾度趙宗儒席蘷劉禹錫滕邁高逞高逞為中書舍人九年家無制草或問曰前輩皆有制集焚之何也答曰王言不可存于私家出國史𥙷呂元膺呂元膺為東都留守常與處士對碁碁次有文簿堆擁元膺方秉筆閲覽碁侶謂呂必不顧局矣因私易一子以自勝呂輒已窺之而碁侶不悟翼日呂請碁處士他適内外人莫測碁者亦不安乃以束帛贐之如是十年許呂寢疾將亟兒姓前列呂曰遊處交友爾宜精擇吾為東都留守有一碁者云云吾以他事俾去易一着碁子亦未足介意但心跡可畏亟言之即慮其憂懾終不言又恐汝輩滅裂于知聞言畢惆然長逝出芝田録王鍔泓師云長安永寧坊東南是金盞地安邑里西是玉盞地後永寧為王鍔宅安邑為北平王馬燧宅後王馬皆進入官王宅累賜韓𢎞正史憲誠李載義等所謂金盞破而成焉馬燧為奉誠園所為玉盞破而不完也又一說李吉甫安邑宅及牛僧孺新昌宅泓師號李宅為玉杯一破無復可全金椀或復庻可再製牛宅本將作大匠康𧦬宅𧦬自辨岡阜形勢以其宅當出宰相後每年命相有按𧦬必引頸望之宅竟為僧孺所得李後為梁新所有出盧氏雜記江西驛官江西有驛官以幹事自任白刺史驛已理請一閲之乃徃初一室為酒庫諸醢畢熟其外畫神問曰何也曰杜康刺史曰功有餘也又一室曰茶庫諸茗畢貯復有神問何也曰陸鴻漸刺史益喜又一室曰𦵔庫諸茹畢備復有神問何神也曰蔡伯喈刺史大笑曰君誤矣出國史𥙷王仲舒王仲舒為郎官與馬逢友善每責逢曰貧不可堪何不求碑誌相救逢曰適見誰家走馬呼毉吾可待也出國史𥙷周愿元和中郎吏數人省中縱酒話平生各有愛尚及憎怕者或言愛圖畫及博奕或怕妄與佞工部員外周愿獨云愛宣州觀察使怕大蟲出傳載張薦張薦自筮仕至祕書監常帶使職三入蕃殁于赤嶺出傳載蓮花漏越僧僧澈得蓮花漏于廬山𫝊之江西觀察使韋丹初惠遠以山中不知更漏乃取銅葉製器狀如蓮花置盆水上底孔漏水半之則沉每晝夜十二沉為行道之節雖冬夏短長雲隂月黑無所差也出國史𥙷唐衢進士唐衢有文學老而無成善哭每發一聲音調哀切遇人事有可傷者衢輒哭之聞者涕泣甞遊太原遇享軍酒酣乃哭滿座不樂主人為之罷宴出國史𥙷脂粉錢湖南觀察使有夫人脂粉錢者自顔杲卿妻始之也桞州刺史亦有此錢是一軍將為刺史妻致不亦謬乎出嘉話録韋執誼元和初韋執誼貶崖州司戸恭軍刺史李甲憐其覊旅乃舉牒云前件官久在相庭頗諳公事幸期佐理勿憚縻賢事須請攝軍事衙推出嶺南異物志李光顔李光顔有大功于時位望通顯有女未適人幕客謂其必選嘉壻因從容乃盛譽一鄭秀才詞學門閥人韻風流兾光顔以子妻之他日又言之光顔乃謝幕客曰光顔一健兒也遭逢多難偶立㣲功豈可妄求名族以掇流言者乎某自己選嘉壻諸賢未知乃召一典客小吏指之曰此為某女之匹也即擢升近職仍分財而資之從事聞之咸以為惬當矣按光顔居鼎盛文朝慮弓藏之禍事當逺害理在避嫌豈敢結强宗固隳本志者歟與夫必娶國髙求婚王謝者不其逺哉出北夢𤨏言李益長慶初趙宗儒為太常卿贊郊廟之禮罷相三十餘年年七十六衆論其精健有常侍李益笑曰趙乃僕為東府試官所送進士也出摭言吳武陵長慶中李渤除桂管觀察使表名儒吳武陵為副使故事副車上任具槖鞬通謝又數日于毬塲致宴酒酣吳乃聞婦女于看棚聚觀意甚恥之吳既負氣欲復其辱乃止臺盤坐褰衣躶露以溺渤既𬒳酒見之大怒命衛士送衙司梟首時有衙挍水蘭知其不可遂以禮而救止多遣人衛之渤醉極扶歸寢至夜艾而覺聞家人聚哭甚悲驚而問焉乃曰昨聞設亭諠譟又聞命衙司斬副使不知其事憂及于禍是以悲耳渤大驚亟命逓使問之水蘭具啟昨雖奉嚴㫖未敢承命今副使猶寢在衙院無苦渤遲明早至衙院卑詞引過賔主上下俱自刻責益相敬時未有監軍於是乃奏水蘭牧于宜州以酧之武陵雖有文華而强悍激許為人所畏又甞為容州部内史賍罪狼籍刺史令廣州幕吏鞫之吏少年亦自負科第殊不假貸持之甚急武陵不勝其憤因題詩路左佛堂曰雀兒來逐颶風高下視鷹鸇意氣豪自謂能生千里翼黄昏依舊入蓬蒿出本事詩韋乾度韋乾度為殿中侍御史分司東都牛僧孺以制科刺首除伊闕尉臺𠫭乾度不知僧孺授官之本問何色出身僧孺對曰進士又曰安得入畿僧孺對曰某制䇿連捷忝為刺頭僧孺心甚有所訝歸以告韓愈愈曰公誠小生韋殿中固當不知愈及第十有餘年猖狂之名已滿天下韋殿中尚不知之子何怪焉出乾􅍧子趙宗儒趙宗儒檢挍左僕射為太常卿太常有師子樂備五方之色非朝㑹聘享不作至是中人掌教坊之樂者移牒取之關白宗儒憂恐不已相座責以懦怯不任事改換散秩為太子少師出盧氏雜説席䕫韓愈初貶之制舍人席䕫為之詞曰早登科第亦有聲名席既物故友人多言曰席無令子弟豈不病隂毒傷寒而宗儒不敢違以狀白宰相宰相以為事任有司其事不舍與不潔韓曰席不吃不潔太遲人曰何也曰出語不當豈不忿責詞云亦有聲名耳出嘉話録劉禹錫牛僧儒赴舉之秋每為同袍見忽甞投贄于𥙷缺劉禹錫對客展卷飛筆塗竄其文且曰必先輩期至矣雖拜謝嚨囑終為怏怏歴三十餘歳劉轉汝州僧孺鎮漢南枉道駐旌信宿酒酣直筆以詩喻之劉承詩意才悟徃年改牛文卷因戒子咸佐承雍等曰吾立成人之志豈料為非况漢南尚書高識逺量罕有其比昔主父偃家為孫𢎞所夷嵇叔夜身死鍾㑹之口是以魏武戒其子云吾大忿怒小過失愼勿學焉汝輩修進守中為上也僧孺詩曰粉署為即四十春向來名軰更無人休論世上昇沉事且閲罇前見在身珠玉㑹應成咳唾山川猶覺露精神莫嫌恃酒輕言語㑹把文章謁後塵禹錫詩云昔年曾忝漢朝臣晚嵗空餘老病身初見相如成賦日後為丞相掃門人追思徃事咨嗟乆幸喜清光笑語頻猶有當時舊冠劍待公三日拂埃塵牛吟和詩前意稍解曰三日之事何敢當焉宰相三朝主黜陟以升降百司於是移宴竟夕方整前驅出雲溪友議滕邁滕倪苦心為詩逺之吉州謁宗人邁邁以吾家鮮士此弟則千里之駒也每吟其詩曰白髪不能容相國也同閒客滿頭生又題鷺鷥障子云暎水有深意見人無懼心邁且曰魏文酷陳思之學潘岳褒正叔之文貴集一家之芳安以宗從踈逺也倪既秋試捧笈告遊及留詩一首為别滕君得之悵然曰此生必不與此子再相見也乃祖于大臯之閣别異常情倪至秋深逝于商於之舘舍聞者莫不傷悼焉倪詩曰秋初江上别旌旗故國無家淚欲垂千里未知投足處前程便是聽猿時誤攻文字身空老却返樵漁計已遲羽翼凋零飛不得丹霄無路接瑶池出雲溪友議太平廣記卷四百九十七
