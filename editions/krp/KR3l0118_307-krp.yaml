body:
  text: 太平廣記卷三百七宋李昉等編神十七沈聿党國清太原小吏村人陳翁樂坤永清縣廟崔澤韓愈李逢吉樊宗訓裴度張仲殷凌華沈聿貞元中庶子沈元致仕永崇里其子聿尉三原素有别業在邑之西聿因官遂修葺焉於莊之北平原十餘里垣古埏以建牛坊秩滿因歸農焉一日晝寢堂之東軒忽驚寤見二黄衣吏謂聿曰府司召郎聿自謂官罷無事詣府拒之未行二吏堅呼聿不覺隨出經歴親愛洎家人揮霍告語曾無應者二吏呵驅甚迫遂北行可二十里至一城署人民稀少道路蕪薈正衙之東街南北三巨門對啓吏導入北門止聿屏外入云追沈聿到良久㕔上讀狀付司責問聿惶懼而逃莫知所詣遂突入南門門内有㕔重施簾幙聿危急徑入簾下則見紫衣貴人寢書案後聿欣有所投又懼二吏之至因聲氣撼動紫衣遂寤熟視聿曰子爲何者聿即稱官及姓名紫衣曰吾與子親且故子其知乎聿驚惑未對又曰子非張氏之彌甥乎吾而祖舅也子在人間亦知張謂侍郎乎聿曰幼稚時則聞之家有文集尚能記念紫衣喜曰試爲我言聿念櫻桃解結垂簷子楊栁能低入户枝紫衣大悦二吏走至前庭曰秋局召沈聿因遙拜呼紫衣曰生曹禮謁甚恭紫衣謂曰沈聿吾之外孫也爾可致吾意於秋局希緩其期二吏承命而出俄返曰敬依教紫衣曰爾死矣宜速歸聿謝辭而出吏伺聿於門笑謂聿曰生曹之徳其可忘哉因引聿而南聿大以酒食錢帛許之忽若覺日已夕矣亦不以告人即令夢致奠二吏於野外聿亦無恙又五日聿晚於莊門復見二吏曰寃訴不已須得郎爲證聿即詢其事犯二吏曰郎建牛坊平夷十古塜大被論理候郎對辯聿謂曰此主役之家人銀鑰擅意也二吏相顧曰置郎召奴或可矣因忽不見其夜銀鑰氣蹷而卒數日忽復遇二吏謂聿曰銀鑰稱郎指教屈辭甚切郎宜自往聿又勤求特希一爲告於生曹二吏許諾有頃復至曰生曹遣郎今夕潛遯慎不得洩藏伏三日事則濟矣言訖不見聿乃宻擇捷馬乘夜獨遊聿曾於同州法輪寺寓居習業因往詣之及出遇所友之僧出因投其房留宿累日懼貽嚴君之憂則徑歸京不敢以實啓莊夫至云前後火發北原之牛坊已爲煨燼矣聿終免焉出集異記党國清晉陽東南二十里有臺駘廟在汾水旁元和中王鍔鎮河東時有里民党國清者善建屋一夕夢黒衣人至門謂國清曰臺駘神召汝隨之而去出都門行二十里至臺駘神廟廟門外有吏卒數十被甲執兵羅列左右國清恐悸不敢進使者曰子無懼已而入謁見有兵士百餘人𫝊導甚嚴既再拜臺駘神召國清升階曰吾廟宇隳漏風日飄損每天雨即吾之衣裾几席沾濕召爾爲吾塞其罅隙無使有風雨之苦國清曰謹受命於是摶塗登廟舍盡補其漏既畢神召黒衣者送國清還出廟門西北而去未行十里忽聞𫝊呼之聲使者與國清俱匿於道左俄見百餘騎自北而南執兵設辟者數十有一人具冠冕紫衣金佩御白馬儀狀魁偉殿後者最衆使者曰磨笄山神也以明日㑹食於李氏之門今夕故先謁吾君於廟耳國清與使者俱入城門忽覺目眥微慘以手搔之悸然而寤明日往臺駘廟中見几上有屋壞泄雨之跡視其屋果有補葺之處及歸行未六七里聞道西村堡中有簫鼓聲因往謁焉見設筵有巫者呼舞乃醮神也國清訊之曰此李氏之居也李存古嘗爲衙將往年范司徒罪其慢法以有軍功故宥其死擯於鴈門郡鴈門有磨笄山神存古常禱其廟願得生還近者以赦獲歸存古謂磨笄山神所佑於是醮之果與國清夢同也出河東記太原小吏王鍔鎮太原嘗一日亭午之際有小吏見一神人長丈餘介金仗劒自衙門緩步而來既而佇立久之若有所伺小吏見之懼甚白於衙將靳坦張和偕視之如小吏言俄有暴風起因忽不見後月餘而鍔薨時元和中也出宣室志村人陳翁雲朔之間嘗大旱時暑亦甚里人病熱者以千數有甿陳翁者因獨行田間忽逢一人儀狀甚異擐金甲左右佩弧矢執長劒御良馬朱纓金佩光采華煥鞭馬疾馳適遇陳翁因駐馬而語曰汝非里中人乎翁曰某農人家於此已有年矣神人曰我天使上帝以汝里中人俱病熱豈獨驕陽之所爲乎且有厲鬼在君邑中故邑人多病上命我逐之已而不見陳翁即以其事白於里人自是雲朔之間病熱皆愈出宣室記樂坤樂坤舊名沖累舉不第元和十二年乃罷舉東歸至華陰夜禱嶽廟以卜進退之計中夜忽夢一青綬人檢簿書來報云來年有樂坤名已到冥簿不見樂沖也沖遂改爲坤來年如其説春闈後經嶽祈謝又祝官位主簿夢中稱官歴四資郡守而已乃終於郢州出雲溪友議永清縣廟房州永清縣去郡東百二十里山邑殘毁城郭蕭條穆宗時有縣令至任逾年其弟寧省乍覩牢落不勝其憂暇日周覽四隅無非榛棘見荒廟巋然土偶羅列無門榜牌記莫知誰氏訪之邑吏但云永清大王而已令弟徙倚久之昏然成寐與神相接神曰我名跡不顯久矣欝然欲自述其由恐爲妖怪今吾子致問得伸積年之憤我毗陵人也大父𨼆侯吳書有傳誅南山之虎斬長橋之蛟與民除害陰功昭著余素有壯志以功佐時余名廓爲上帝所命於金商均房四郡之間捕鷙獸余數年之内勦戮猛虎不可勝數生聚頓安虎之首帥在西城郡其形偉博便㨗異常身如白錦額有圓光如鏡害人最多余亦誅之居人懷恩爲余立廟自襄漢之北藍關之南凡三十餘處皆余憇息之所也歲祀緜逺俗傳多誤以余爲白虎神幸君子訪問願爲顯示以正其非他日令弟言於襄陽從事乃書版寘於廟中塵侵雨漬文字將滅大中壬申歲襄州觀察判官王澄刻石於廟出集異記崔澤王鍔鎮太原有清河崔澤者長慶中刺坊州常避暑於庭時風月清朗忽見一丈夫身甚長峩冠廣袖自堂之前軒而降立於階所厲聲而呼凡三呼而止崔氏一家皆見澤懼而且惡命家僮逼之已亡見矣是夕澤被疾至明日發使獻書願解官歸老相府不許後月餘卒於郡出宣室志韓愈吏部侍郎韓愈長慶四年夏以疾不治務至秋九月免疾益甚冬十一月於靖安里晝卧見一神人長丈餘被甲仗劒佩弧矢儀狀甚峻至寢室立於榻前久而謂愈曰帝命與卿計事愈遽起整冠而坐曰臣不幸有疾不敢踞見王神人曰威粹國絶域逺夷世與韓氏為仇今欲討之而力不足卿以為何如對曰臣願從大王討之神人頷而去於是書其詞置於座側數日不能解至十二月而卒出宣室志李逢吉故相李逢吉嘗爲司空范希韓從事於單于府時金城寺有老僧無爲者年七十餘嘗一日獨處禪齋負壁而坐瞬目數息忽有一介甲持殳者由寺而至食頃聞報李從事來自是逢吉將遊金城寺無爲輒見向者神人先至率以爲常衙將簡郢與無爲弟子法真善常爲郢語之出宣室志樊宗訓硤石縣西有聖女神祠縣令韋謀與前縣令樊宗訓遊焉宗訓性疎復不以神鬼爲意以鞭劃其墻壁抉剔其衣袪言笑慢䙝歸數日邑中有狂僧忽突入縣門大呼曰縣令當持法奈何放縱惡人遣凌轢恣横謀遣人逐出亦不察其意也旬餘謀小女病召巫者視之曰聖女𫝊語長官土地神靈盡望長官庇䕶豈有教人侵奪前者遣阿師白於長官又不見喻韋君曰惡人是誰即與捕捉曰前縣令樊宗訓又已發無可奈何以後幸長官留意勿令如此小娘子疾苦即應愈韋君謝之令人焚香洒掃邑中皆加敬畏其女數日即愈出述異記裴度裴度少時有術士云命屬北斗亷貞星神宜每存敬祭以果酒度從之奉事甚謹及爲相機務繁冗乃致遺忘心恒不足然未嘗言之於人諸子亦不知京師有道者來謁留之與語曰公昔年尊奉天神何故中道而止崇䕶不已亦有感於相公度笑而已後爲太原節度家人病迎女巫視之彈胡琴顚倒良久蹶然而起曰請裴相公亷貞將軍遣傳語太無情都不相知耶將軍甚怒相公何不謝之度甚驚巫曰當擇良日潔齋於淨院焚香具酒果亷貞將軍亦欲見形於相公其日度沐浴具公服立於階下東向奠酒再拜見一人金甲持戈長三丈餘北向而立裴公汗洽俯伏不敢動少頃即不見問左右皆云無之度尊奉不敢怠忽也出逸史張仲殷户部郎中張滂之子曰仲殷於南山内讀書遂結時流子弟三四人仲殷性亦聰利但不攻文學好習弓馬時與同侶挾彈遊步林藪去所止數里見一老人持弓逐一鹿遶林一矢中之洞胷而倒仲殷驚賞老人曰君能此乎仲殷曰固所好也老人曰獲此一鹿吾無所用奉贈君以充一飯之費仲殷等敬謝之老人曰明日能來看射否明日至亦見老人逐鹿復射之與前無異復又與仲殷仲殷益異之如是三度仲殷乃拜乞射法老人曰觀子似可教也明日復期於此不用令他人知也仲殷乃明日復至其所老人還至遂與仲殷西行四五里入一谷口路漸低下如入洞中草樹有異人間仲殷彌敬之約行三十餘里至一大莊如卿相之别業焉止仲殷於中門外㕔中老人整服而入有修謁之狀出曰姨知君來此明日往相見仲殷敬諾而宿於㕔至明日敕奴僕與仲殷備湯沐更易新衣老人具饌於中堂延仲殷入拜母仲殷拜堂下母不爲起亦無辭譲老人又延升堂就坐視其狀貌不多𩔖人或似過老變易又如猿玃之狀其所食品物甚多仲殷食次亦不見其母動匕箸倏忽而畢久視之歛坐如故既而食物皆盡老人復引仲殷出於㕔前樹下施牀而坐老人即命弓矢仰卧指一樹枝曰十箭取此一尺遂發矢十隻射落碎枝十段接成一尺謂仲殷曰此定如何仲殷拜於牀下曰敬服又命墻頭上立十針焉去三十步舉其第一已乃按次射之發無不中者也遂教仲殷屈伸距跗之勢但約臂腕骨臂腕骨相拄而弓已滿故無彊弱皆費力也數日仲殷已得其妙老人撫之謂仲殷曰止於此矣勉馳此名左右各教取五千人以救亂世也遂却引歸至故處而仲殷藝日新果有善射之名受其教者雖童子婦人即可與談武矣後父卒除服偶遊於東平軍乃教得數千人而卒其老人葢山神也善射者必趫度通臂故母𩔖於猿焉出原化記淩華杭州富陽獄吏曰淩華骨狀不凡常遇施翁相曰能捨吏當爲上將軍華爲吏酷暴每有縲絏者必扼喉撞心以取賄賂元和初病一夕而死將死見黃衫吏齎印而前宣云牒奉處分以華昔日曾宰劇縣甚著能績後有缺行敗其成功謫官圜扉伺其修省既迷所履太乖乃心玉枕嶷然委於庸賤念兹貴骨須有所歸今鎮海軍討逆諸臣合爲上將骨未圓實難壯威稜宜易之以得人免塊然而妄處付司追淩華鑿玉枕骨送上仍令所司量事優恤於是黃衫吏引入有綠冠裳者隔簾語曰今日之來徳之不修也見小利而失禄竊爲君子惜焉命左右取鉗槌俄頃有緇衣豹袖執斤斧者三人綠裳賜華酒五盃昏然而醉唯聞琢其腦聲絶而華醉醒復止華于西階以聽命移時有宣言曰亡貴之人理宜裨補量延半紀仍賚十千宣訖綠裳延華升階語曰吾漢朝隱屠釣之人也葢求全身微規小利既歿之後責受此官位卑軄猥殊不快志足下莫歎失其貴骨此事稍大非獨一人命酒與華對酌别飲數盃㝠然無所知既醒宛然在廢牀之上捫其腦而骨已亡其儕流􅉠助凡十千焉後十五年而卒出集異記太平廣記卷三百七
