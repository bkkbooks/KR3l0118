body:
  text: 太平廣記巻四百四十四宋李昉等編畜獸十一猿上白猿周羣猳國歐陽紇陳巖魏元忠韋虛已子王長史白猿越王問范蠡手戰之術范蠡答曰臣聞越有處女國人稱之願王請問手戰之道也於是王乃請女女將北見王道逢老人自稱袁公問女曰聞子善為劍得一觀之乎處女曰妾不敢有所隱也唯公所試公即挽林内之竹似枯槁末折墮地女接取其末袁公操其本而刺處女處女應節入之三女因舉杖撃之袁公飛上樹化為白猿出吳越春秋周羣周羣妙閑䜟說遊岷山採藥見一白猿從絶峰下對羣而立羣抽所佩之刀以投白猿猿化為一老翁手中有玉板長八寸以授羣羣問曰公是何年生答曰今已衰邁忘其生之年月憶從軒轅之時始學厯數風后容成皆黄帝之史就余授厯術至顓頊更考定日月星辰之運多差異及春秋時有子韋子野禆竈之徒權略雖騐未得其門爾來世代不復可紀因以相襲至大漢之時有洛下閎得其大㫖羣復其言更精勤算術及考校年歴之運驗于圖緯知蜀應滅及明年歸命皆稱周羣詳陰陽之𩔖也蜀人謂之後聖出王子年拾遺猳國蜀中西南高山之上有物與猴相𩔖長七尺能作人行善走逐人名曰猳國一名馬化或曰玃伺道行婦女年少者輒盜取將去人不得知若有行人經過其旁皆以長䋲相引猶故不免此物能别男女氣臭故取女男不知也若取得人女則為家室其無子者終身不得還十年之後形皆𩔖之意亦惑不復思歸若有子者輒抱送還其家産子皆如人形有不養者其母輒死故懼怕之無敢不養及長與人不異皆以楊為姓故今蜀中西南多姓楊率皆是猳國馬化之子孫也出捜神記歐陽紇梁大同末遣平南將軍藺欽南征至桂林破李師古陳徹别將歐陽紇略地至長樂悉平諸洞深入險阻紇妻纎白甚羙其部人曰將軍何為挈麗人經此地有神善竊少女而羙者尤所難免宜謹護之紇甚疑懼夜勒兵環其廬匿婦宻室中謹閉甚固而以女奴十餘伺守之爾夕陰雨晦黒至五更寂然無聞守者怠而假寐忽若有物驚寤者即已失妻矣門扄如故莫知所出出門山險咫尺迷悶不可尋逐迨明絶無其跡紇大憤痛誓不徒還因辭疾駐其軍日往四遐即深陵險以索之旣逾月忽于百里之外叢篠上得其妻繡履一隻雖雨浸濡猶可辨識紇尤悽悼求之益堅選壯士三十人持兵負糧巖栖野食又旬餘逺所舍約二百里南望一山葱秀逈出至其下有深溪環之乃編木以渡絶巖翠竹之間時見紅綵聞笑語音捫蘿引絙而陟其上則嘉樹列植間以名花其下綠蕪豐軟如􅂒清逈岑寂杳然殊境有東向石門婦人數十被服鮮澤嬉遊歌笑出入其中見人皆慢視遲立至則問曰何因來此紇具以對相視嘆曰賢妻至此月餘矣今病在牀宜遣視之入其門以木為扉中寛闢若堂者三四壁設牀悉施錦薦其妻卧石榻上重茵累席珍食盈前紇就視之回眸一睇即疾揮手令去諸婦人曰我等與公之妻比來久者十年此神物所居力能殺人雖百夫操兵不能制也幸其未返宜速避之但求羙酒兩斛食犬十頭麻數十斤當相與謀殺之其來必以正午後慎勿太早以十日為期因促之去紇亦遽退遂求醇醪與麻犬如期而往婦人曰彼好酒往往致醉醉必騁力俾吾等以綵練縛手足于牀一踴皆㫁嘗紉三幅則力盡不解今麻隱帛中束之度不能矣遍體皆如銕唯臍下數寸常䕶蔽之此必不能禦兵刃指其旁一巖曰此其食廩當隱于是静而伺之酒置花下犬散林中待吾計成招之即出如其言屏氣以俟日晡有物如匹練自他山下透至若飛徑入洞中少選有羙髯丈夫長六尺餘白衣曵杖擁諸婦人而出見犬驚視騰身執之披裂吮咀食之致飽婦人競以玉盃進酒諧笑甚歡旣飲數斗則扶之而去又聞嬉笑之音良久婦人出招之乃持兵而入見大白猿縳四足于牀頭顧人蹙縮求脫不得目光如電競兵之如中銕石刺其臍下即飲刃血射如注乃大嘆咤曰此天殺我豈爾之能然爾婦已孕勿殺其子將逢聖帝必大其宗言絶乃死捜其藏寳器豐積珍羞盈品羅列几案凡人世所珍靡不充備名香數斛寳劍一雙婦人三十輩貌皆絶色久者至十年云色衰必被提去莫知所置又捕採唯止其身更無黨𩔖旦盥洗著㡌加白袷被表羅衣不知寒暑遍身白毛長數寸所居常讀木簡字若符篆了不可識已則置石磴下晴晝或舞雙劍環身電飛光圓若月其飲食無常喜㗖果栗尤嗜犬咀而飲其血日始逾午即歘然而逝半晝往返數千里及晚必歸此其常也所須無不立得夜就諸牀嬲戲一夕皆周未嘗寐言語淹詳華音㑹利然其狀即猳玃𩔖也今歲木落之初忽愴然曰吾為山神所訴將得死罪亦求䕶之於衆靈庻幾可免前此月生魄石磴生火焚其簡書悵然自失曰吾已千歲而無子今有子死期至矣因顧諸女汍瀾者久且曰此山峻絶未嘗有人至上高而望絶不見樵者下多虎狼怪獸今能至者非天假之何耶紇取寳玉珍麗及諸婦人以皆歸猶有知其家者紇妻周歲生一子厥狀肖焉後紇為陳武帝所誅素與江惣善愛其子聰悟絶人常留養之故免于難及長果文學善書知名于時出續江氏傳陳巖潁川陳巖字叶夢舞陽人僑居東吳景龍末舉孝亷如京師行至渭南見一婦人貌甚姝衣白衣立于路隅以袂蒙口而哭若負寃抑之狀生乃訊之婦人哭而對曰妾楚人也侯其氏家于弋陽縣先人以高尚聞于湘楚間由是隱跡山林未嘗肻謁侯伯妾雖一女子亦有箕潁之志方將棲踪蓬瀛崑閬以遂其好適遇有沛國劉君者尉弋陽常與妾先人為忘形之友先人慕劉君之高義遂以妾歸劉氏自為劉氏婦且十年矣未嘗有纎毫過失前歲春劉君調𥙷眞源尉未一歲以病免盡室歸于渭上郊居劉君無行又娶一盧氏者濮上人性極悍戾每以唇齒相及妾不勝其憤故遁而至此且妾本慕神仙常欲高蹈雲霞安巖壑之隱甘橡栗之味亦足以終老豈徒擾于塵世適足為累今者分不歸劉氏矣已而嚬容怨咽若不自解巖性端慤聞其言甚信之因問曰女即何所歸乎婦人曰妾一窮人安所歸雖然君之見問其有意耶果如是又安敢逆君之命巖喜即以後乘駕而偕焉至京師居永崇里其始甚謹後乃不恭往往詬怒若發狂之状巖惡之而且悔明日巖出婦人即閤扉鍵其門以巖衣嚢置庭中毁裂殆盡至夕巖歸婦人拒而不納巖怒即破户而入見巳之衣資悉已毁裂巖因詬而責之婦人忽發怒毁巖之衣襟佩帶殆無完縷又爪其面囓其肌一身盡傷血沾于地已而嘷呌者移時巖患之不可制於是里中民俱來觀簇其門時有郝居士者在里中善視鬼有符籙呵禁之術聞婦人哭音顧謂里中民曰此婦人非人乃山獸也寓形以惑于世耳民且告于巖巖即請焉居士乃至巖所居婦人見居士懼甚居士出墨符一道向空擲之婦人大呌一聲忽躍而去立于瓦屋上巖竊怪之居士又出丹符擲之婦人遂委身于地化為猿而死巖既悟其妖異心頗怪悸後一日遂至渭南訊其居人果有劉君廬在郊外巖即謁而問焉劉曰吾常尉于弋陽弋陽多猿狖遂求得其一近兹且十年矣適遇有故人自濮上來以一黑犬見惠其猿為犬所囓因而遁去竟不窮其事因録以傳之巖後以明經入仕終于秦州上邽尉客有遊于太原者偶于銅鍋店精舍解鞍憇焉于精舍佛書中得劉君所傳之事而文甚鄙後亡其本客為余道之如是出宣室志魏元忠唐魏元忠本名眞宰素強正有幹識其未逹時家貧獨有一婢厨中方㸑出汲水還乃見老猿為其看火婢驚白之元忠徐曰猿愍我無人力為我執㸑甚善乎又常呼蒼頭未應狗代呼之又曰此孝順狗也乃能代我勞又獨坐有羣鼠拱手立其前又曰鼠饑就我求食乃令食之夜中鵂鶹鳴其屋端家人將彈之又止之曰鵂鶹晝不見物故夜飛此天地所育不可使南走越北走胡將何所之其後遂絶無怪矣元忠歴大官至侍中中書令僕射則天崩中宗在諒闇詔元忠攝冡宰百官總已以聽三日年八十餘方薨始元忠微時常謁張景藏景藏待之甚薄就質通塞亦不答也乃大怒曰僕千里裹粮而來非徒然也必謂明公有以見敎而乃金口木舌以相遇殊不盡勤勤之意耶然富貴正由蒼蒼何預公事因拂衣長揖而去景藏遽牽止之曰君相正在怒中後當貴極人臣卒如其言出廣異記韋虛已子戸部尚書韋虛已其子常晝日獨坐閤中忽聞簷際有聲顧視乃牛頭人眞地獄圖中所見者據其所下窺之韋伏不敢動須臾登階直詣牀前面臨其上如此者三乃下去韋子不勝其懼復將出内即以枕擲之不中乃開其門趨前逐之韋子呌呼但遶一空井而走迫之轉急遂投于井中其物因據井而坐韋仰觀之乃變為一猿良久家人至猿即不見視井旁有足跡奔蹂之狀怪之窺井中乃見韋子在焉懸縋出之恍惚不能言三日方能說月餘乃卒出廣異記王長史東都崇譲里有李氏宅里傳云其宅非吉之地固不可居李生既卒其家盡徙居陸渾别墅由是鍵其門且數年矣開元中有王長史者亡其名長史常為清顯官以使酒忤權貴遂擯為長史于吳越間後退居洛中因質李氏宅以家焉長史素勁聞其宅有不祥之名且曰我命在天不在宅即入而居嘗獨處堂之西宇下後一夕聞其哀嘯之音極清楚若風籟焉長史起而望之見一人衣黑衣立于几上長史嚴聲叱之其人即便舉一足撃長史肩長史懼而退其人亦去長史因病瘡且甚後旬餘方少愈夜中又聞哀嘯之音家童尋之時見黑衣人在庭樹上長史有弟善射于是命弓射之一發遂中其人嘷呌跳上西廡屋瓦而去明日尋其跡皆無所見歲秋長史召工人重修馬廐因發重舍内得一死猿有矢貫脇驗其矢果長史弟之矢也方悟黑衣者乃猿爾出宣室志太平廣記卷四百四十四
