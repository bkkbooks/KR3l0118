body:
  text: 太平廣記卷一百二十四報應二十三王簡易樊光李彦光侯溫沈申法曹吏劉存袁州錄事劉璠吳景高安村小兒陳勲鍾遵韋處士張進郝溥裴垣蘇鐸趙安王簡易唐洪州司馬王簡易者常暴得疾腹中生物如塊大隨氣上下攻撃臟腑伏枕餘月一夕其塊逆上築心沈然長往數刻方寤謂所親曰初夢見一鬼使自稱丁郢手執符牒云奉城隍神命來追王簡易某即隨使者行可十餘里方到城隍廟門前人相謂曰王君在世頗聞修善未合身亡何得遽至此耶尋得見城隍神告之曰某未合殂落且乞放歸城隍神命左右將簿書來檢畢謂簡易曰猶合得五年活且放去至五年腹内物又上築心逡巡復醒云適到㝠司被小奴所訟辭氣不可解其妻問小奴何人也簡易曰某舊使僮僕年在妙齡偶因約束遂致斃今腹中塊物乃小奴爲祟也適見前任吉州牧鍾初荷大鐵枷著黃布衫手足械繋㝠司勘非理殺人事欵問甚急妻遂詰云小奴庸下何敢如是簡易曰世間即有貴賤㝠司一般也妻又問陰間何罪最重簡易曰莫若殺人言訖而卒出報應錄樊光交趾郡廂虞候樊光者在廨宇視事亭午間風雷忽作光及男并所養一黃犬並震死其妻於霆撃之際歘見一道士撮置其身於别所遂得免人問其故妻云嘗有二百姓相論訟同繫牢獄無理者納賂於光光即出之有理者大被拷掠抑令欵伏所送飲食光悉奪與男并犬食之其囚饑餓將死聞於獄内被髮訴天不數日光等有此報出報應錄李彦光李彦光爲秦内外都指揮使主帥中書令李崇委任之權專其生殺虐酷黷貨遭枉害者甚衆部將樊某者有騾一頭甚駿彦光使人逹意求之樊恡之不與因而蓄憾以他事搆而囚之僞通辭欵承主帥醉而呈之帥不復詳察光即矯命斬之樊臨刑曰死若無知則已死若有知當刻日而報及死未浹旬而彦光染疾樊則形見晝夜不去或來自屋上或出自牆壁間持杖而前親行鞭箠左右長幼皆散走於是便聞決罪之聲不可勝忍唯稱死罪如是月餘方卒自爾持權者頗以爲戒出玉堂閒話侯溫梁朝與河北相持之時有偏將侯溫者軍中號爲驍勇賀瓌爲綂率專制忌温以事害之其後瓌寢疾彌留之際左右只聞公呼侯九者數日頗有祈請之詞深自尅責有侍者見一丈夫自壁間出曵瓌於地侍者驚呼左右俱至瓌已死矣昔漢竇嬰灌夫爲武安侯田蚡所搆而死及蚡疾巫者視鬼見竇灌夾而笞之蚡竟卒事相𩔖耳出玉堂閒話沈申湖南帥馬希聲在位多縱率有賈客沈申者常來往番禺間廣主優待之令如北中求寶帶申於洛汴間市得玉帶一乃竒貨也回由湘潭希聲竊知之召申詣衙賜以酒食抵夜送還店預戒軍巡以犯夜戮之湘人俱聞莫不嗟憫爾後常見此客爲祟或在屋脊或據欄檻不常厥處未乆希聲暴卒其弟希範嗣立以玉帶還廣人出北夢瑣言法曹吏廬陵有法曹吏嘗劾一僧曲致其死具獄上州爾日其妻女在家方紉縫於西窓下忽有二靑衣卒手執文書自㕑中出厲聲謂其妻曰語爾夫無枉殺僧遂出門去妻女皆驚怪流汗久之乃走出視其門扃閉如故吏歸具言之吏甚恐明日將竊取其案已不及矣竟殺其僧死之日即遇諸塗百計禳謝旬月竟死出稽神錄劉存劉存爲舒州刺史辟儒生霍某爲團練判官甚見信任後爲左右所譛因搆其罪下獄白使府請殺之吳帥知其寃使執送揚都存遂縊之於獄既而存遷鄂州節度使霍友人在舒州夢霍素服自司命祠中出撫掌大笑曰吾已獲雪矣俄而存帥師征湖南霍表兄馬鄴爲黃州刺史有夜扣齊安城門者曰舒州霍判官將往軍前馬病白使君借馬守陴者以告鄴歎曰劉公枉殺霍生今此人往矣得無禍乎因畫馬數匹焚之水際數日存敗績死之出稽神錄袁州錄事袁州録事參軍王某嘗劾一盗獄具而遇赦王以盜罪重不可恕乃先殺之而後宣赦罷歸至新喻邑客馮氏具酒請王明日當往晚止僧院乃見盜者曰我罪誠合死然已赦矣君何敢匿王命而殺我我今得請於所司矣君明日往馮家耶不往亦可言訖乃歿院僧但見其與人言而不見也明日方飲暴卒出稽神錄劉璠軍將劉璠性彊直勇敢坐法徙海陵郡守禇仁規嫌之誣其謀叛詔殺於海市璠將死謂監刑者曰爲我白諸兒多置紙筆於棺中吾必訟之後數年仁規入朝泊舟濟灘江口夜半聞岸上連呼禇仁規爾知當死否舟人盡驚起視岸上無人仁規謂左右曰爾識此聲否劉璠也立命酒食祭而謝之仁規至都以殘虐下獄獄吏夜夢一人長大黯面從二十餘人至獄執仁規而去既寤爲仁規所親說之其人撫膺歎曰吾君必死此人即劉璠也其日中使至遂縊於獄矣出稽神錄吳景浙西軍校吳景者丁酉歲設齋於石頭城僧院其夕既陳設忽聞婦女哭聲甚哀初遠漸近俄在齋筵中矣景乃告院僧曰景頃歲從軍尅豫章獲一婦人殊有姿色未幾其夫求贖將軍令嚴肅不可相容景即殺之後甚以爲恨今之設齋正爲是也即與僧俱往乃見婦人在焉僧爲之祈告婦人曰我從吳景索命不知其他遽前逐之景走上佛殿大呼曰還爾命於是顚仆而卒出稽神錄高安村小兒高安村人有小兒行田中爲人所殺不獲其賊至明年死日家人爲設齋爾日有里中兒方見其一小兒謂之曰我某家死兒也今日家人設齋吾與爾同往食乎里中兒即隨之至其家共坐靈牀食至輙飡家人不見也乆之其舅後至望靈牀而哭兒即逕指之曰此人殺我者也吾惡見之遂去兒既去而家人見里中兒坐靈牀上皆大驚問其故兒具言之且言其舅殺之因執以送官遂伏罪出稽神錄陳勲建陽縣錄事陳勲性剛狷不容物爲縣吏十人共誣其罪竟坐棄市至明年死日家爲設齋妻哭畢獨歎於靈前曰君平生以剛直稱今枉死逾年精魄何寂然耶是夕即夢勲曰吾都不知死向聞卿言方大悟爾若爾吾當報讐然公署非可卒入者卿明日爲我入縣訴枉吾當隨之明日妻如言而往出門即見勲仗劒從之至縣遇一讐吏於橋上勲以劒撃其首吏即顚仆而死既入門勲徑之曹署以次撃之中者皆死十殺其八二吏奔至臨川乃得免勲家在葢竹鄉人恒見之因爲立祠號陳府君廟至今傳其靈出稽神録鍾遵江南大理評事鍾遵南平王傳之孫也厯任貪濁水部員外郎孫岳素知其事密縱於權要竟坐下獄㑹赦除名遵既以事在赦前又其祖嘗賜鐵券恕子孫二死因復詣闕自理事下所司大理奏贓狀明白遂棄市臨刑或與之酒遵不飲曰吾當訟於地下不可令醉也遵死月餘岳方與客坐有小靑虵出於棟間岳視之驚起曰鍾評事鍾評事變色而入遂病翌日死出稽神錄韋處士韋承臯者僞蜀時將校也有待詔僧名行真居蜀州長平山嘗於本州龍興寺搆木塔凡十三級費錢銀萬計尋爲天火所焚第三次營搆方能就人謂其有黃白之術也及承臯典眉州召行真至郡郡有盧敬芝司馬者以殖貨爲業承臯嘗謂之曰某頃軍中與行真同火幕遇一韋處士授以作金術適來鄙夫老矣故召行真同修舊藥藥成當得分惠謂吾子罷商賈之業可乎盧敬諾藥垂成韋牧坐罪貶茂州參軍臨行盧送至蟇頥津韋牧沈藥鼎於江中謂盧生曰吾罪矣先是授術韋處士者吾害之而滅口今日之事藥成而禍及其有神理乎蜀國更變以拒魏王之師誅死出北夢瑣言張進僞蜀給事中王允光性嚴刻吏民有犯無貸者及判刑院本院杖直官張進因與宅内小奴子誦火井縣令蔣貽恭詠王給事絶句云厥父元非道郡奴允光何事太侏儒可中與箇皮裩著擎得天王左脚無奴子記得兩句時念誦之允光問誰人教汝對云杖直官張進允光大怒尋奏進受罪人錢物遂寘極法後允光病寒熱但見張進執火炬燒四體髙聲唱索命允光連叱不去痛楚備極數日而終出儆誡錄郝溥僞蜀華陽縣吏郝溥日追欠稅戸街判司勾禮遣婢子阿宜赴縣且嘱溥云不用留禁殘稅請延期輸納郝溥不允決阿宜五下仍納稅了放出明年縣司分擘百姓張瓊家物業郝溥取錢二萬張瓊具狀論訴街司追勘勾禮見溥大笑曰你今日來也莫望活千萬一死令司吏汝勲搆成罪遂殺之不數日汝勲見郝溥來索命翌日暴卒勾禮晨興忽見郝溥升堂羅拽毆撃因患背瘡而死出儆誡録裴垣僞蜀寧江節度使王宗黯生日部下屬縣皆率醵財貨以爲賀禮巫山令裴垣以編户羇貧獨無慶獻宗黯大怒召裴至誣以他事生沈灔澦堆水中三日尸不流宗黯遣人命挽而下經宿逆水復上卓立波面正視衙門宗黯頗不自安神識煩撓竟得疾暴卒出北夢瑣言蘇鐸僞蜀王宗信鎮鳳州有角觗人蘇鐸者委之巡警嘗與宗信左右孫延膺不協宗信因暇日登樓望見蘇鐸錦袍束帶似逺行人之狀宗信訝之鐸本岐人也延膺因譛曰蘇鐸雖受公蓄養其如包藏禍心久欲逃去宗信大怒立命擒至先斷舌臠肉然後斬之及延膺作逆其被法之狀一如鐸焉出儆誡錄趙安蜀郭景章豪民也因醉以酒注子打貧民趙安注子觜入腦而死安有男景章厚與金帛隨隱其事人莫知之後景章腦上忽生瘡可深三四分見骨濃血不絶或時覩趙安瘡透喉遂死出儆誡録太平廣記卷一百二十四
