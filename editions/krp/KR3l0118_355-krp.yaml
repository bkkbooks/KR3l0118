body:
  text: 太平廣記卷三百五十五宋李昉等編鬼四十楊副使僧楚珉陳守規廣陵賈人浦城人劉道士清源郡將王誗妻林昌業潘襲胡澄王攀鄭守澄劉隲楊副使壬午嵗廣陵𤓰州市中有人市果實甚急或問所用云吾長官明日上事有問長官為誰云楊副使也又問官署何在云金山之東遂去不可復問時浙西有副使被召之揚都明日船至金山無故而沒出稽神錄僧楚珉廣陵法雲寺僧楚珉常與中山賈人章某者親熟章死楚珉為設齋誦經數月忽遇章於市中楚未食章即延入食店為置胡餅既食楚問君已死那得在此章曰然吾以小罪而未得解免今配為揚州掠剰鬼復問何謂掠剰曰凡吏人賈販利息皆有常數過數得之即為餘剰吾得掠而有之今人間如吾輩甚多因指路人男女曰某人某人皆是也頃之有一僧過于前又曰此僧亦是也因召至與語良久僧亦不見楚也頃之相與南行遇一婦人賣花章曰此婦人亦鬼所賣花亦鬼用之人間無所見也章則出數錢買之以贈楚曰凡見此花而笑者皆鬼也即告辭而去其花紅芳可愛而甚重楚亦昏然而歸路人見花頗有笑者至寺北門自念吾與鬼同遊復持鬼花亦不可即擲花溝中濺水有聲既歸同院人覺其色甚異以為中惡兢持湯藥以救之良久乃復具言其故因相與覆視其花乃一死人手也楚亦無恙出稽神錄陳守規軍將陳守規者常坐法流信州寓止公館館素凶守規始至即鬼物晝見奇形怪狀變化倐忽守規素剛猛親持弓矢刀杖與之鬬久之乃空中語曰吾鬼神不欲與人雜居君既堅正願以兄事可乎守規許之自是常與交言有吉凶輒先報或求飲食與之輒得錢物既久頗為厭倦因求方士手書章疏奏之上帝翌日鬼乃大罵曰吾與君為兄弟奈何上章訴我大丈夫結交當如是耶守規曰安得有此事即於空中擲下章疏紙筆宛然又曰君圖我居處謂我無所止也吾今往蜀川亦不下於此矣由是遂絶出稽神錄廣陵賈人廣陵有賈人以栢木造牀凡什器百餘事製作甚精其費已二十萬載之建康賣以求利晚至𤓰步微有風𧺫因泊山下頃之有巨舟其中空惟篙工三人乗之亦泊於其側賈人疑之相與議此必羣盜也將伺夜而劫我前浦既逺風乂益急逃避無所夜即相與登岸深林中以避之俄而風雨雷電䝉覆舟所岸上則星月了然食頃雨止雲散見巨舟稍稍前去乃敢歸舟中所載柏木什器都不復見餘物皆在巨舟猶在東岸有人呼曰爾無恨當還爾價賈人所載既失復歸廣陵至家已有人送錢三十萬置之而去問其日即泊𤓰步之明日也出稽神錄浦城人浦城人少死于路家有金一斤其妻匿之不聞於其姑逾年忽夜扣門號哭而歸其母驚駭相與哀慟曰汝真死耶曰兒實已死有不平事是以暫歸因坐母膝言語如平生但手足冷如氷耳因起握刀責其妻曰我此有金爾何不供老母而自藏耶即欲殺之其母曰汝已死矣儻殺是人必謂吾所殺也於是哭辭母而去復自提刀送其妻還父家迨曉及門數十歩忽然不見出稽神錄劉道士廬山道士劉某將遊南嶽路出宜春宿一村家其家至貧復喪其子未有以歛既夕忽有一男子行哭而來但撫膺而呼曰可惜可惜劉出視之見面白如雪作兩髽結徑入其家負其尸去莫知所之出稽神錄清源都將清源都將楊某為本郡防遏營副將有大第在西郭某晨趨府未歸有人方食忽有一鵞負紙錢自門而入徑詣西廊房中家人云此鵞自神祠中來耶乃令奴逐之奴入房但見一䨇䯻白髯老翁家人莫不驚走某歸聞之怒持杖撃之鬼出沒四隅往還倐忽杖莫能中某益怒曰食訖當復來撃杖之鬼乃折腰而前曰諾楊有二女長女入厨切肉且食肉落砧輒失去女執刀向空曰斫乃露一大黒毛手曰請斫女走氣殆絶因而成病次女於大罋中取鹽有一猴自罋突出上女子背女走至堂前復失之亦成疾乃召巫女壇召之鬼亦立壇作法愈甚於巫巫不能制亦懼而去頃之二女及妻皆卒後有善作魔法者名曰明教請為持經一宿鬼乃唾罵某而去爾因遂絶某其年亦卒出稽神錄王誗妻王誗者南安縣大盈村人也妻林氏忽病有鬼憑之言我陳九娘也以香花祀我當有益於主人誗許之乃呼林為阿姐為人言禍福多中半餘嵗乃見形自腰已下可見人未常來者亦不見也但以言語相接鄉人有召者不擇逺近與林偕往人有祭祀但具酒食陳氏自召神名祝詞明恵聽者忘倦林拱坐而已二年間獲利甚博一旦忽悲泣謂林曰我累生為人女年未及笄而天聞於地府乃前生𨼆沒阿姐錢二十萬故主者令我為神以償此錢訖即生為男子而獲夀今酬已足請置酒為别乃盡見其形容質端媚言辭婉轉殷勤致謝鳴咽云珍重珍重遂不見出稽神錄林昌業林昌業漳浦人也博覽典籍精究術數性髙雅人不可干嘗為泉州軍事衙推年七十餘退居本郡龍溪縣羊額山之陽鄉里宗敬之有良田數頃嘗欲舂榖為米載詣州貨之功力未集忽有䨇髻男子年可三十鬚髯甚長來詣林林問何人但微笑唯唯不對林知其鬼物令家人食之致飽而去翌日忽聞倉下礱榖聲視之乃昨日男子取榖礱之而林問無故辛苦耶鬼亦笑不言復置豐饌飯蔬而已凡月餘礱榖不輟鬼復自斗量得米五十餘石拜辭而去卒無一言不復來矣出稽神錄潘襲潘襲為建安令遣一手力齎牒下鄉有所追攝手力新受事未嘗行此路至夕道左有草舍扣門求宿其家唯一婦人譍門云主人不在又將移居無暇延客也手力以道逺多虎苦苦求之婦人即召入門側席地而寢婦人結束箱箧什器之𩔖達旦不寐手力向曉辭去行數里乃覺失所齎牒復返求之宿處乃是一墳方見其家人改塟及開棺席下得一書即所失之牒也出稽神錄胡澄池陽人胡澄傭耕以自給妻卒官給棺以葬其平生服飾悉附棺中後數年澄偶至市見列肆賣首飾者熟視之乃妻送塟物也問其人云一婦人寄於此約某日來取澄如期復往果見其妻取直而去澄因躡其後至郊外及之妻曰我昔塟時官給秘器雖免暴骨然至今為所司督責其直計無所出賣此以償之爾言訖不見澄遂為僧出稽神錄王攀髙郵縣醫工王攀鄉里推其長者恒往來廣陵城東毎數月輒一直縣自念明日當赴縣今夕即欲出東水門夜泛小舟及明可至既而與親友飲於酒家不覺大醉誤出叅佐門投一村舍宿向曉稍醒東壁有燈而不甚明仰視屋室知非常宿處因獨嘆曰吾明日須至縣今在何所也久之乃聞其内躡履聲有婦人隔壁問曰客將何之因起辭謝曰欲之髙郵醉中誤至於是婦曰此非髙郵道也將使人奉送之城東無憂也乃有一村竪至隨之而行毎厯艱險竪輒以手捧其足而過既隨至城東嘗所宿店告辭而去攀解其襦以贈之竪不受固與之乃持去既而入店易衣乃見其襦故在腰下即復詣宿處尋之但古塜耳並無人家出稽神錄鄭守澄廣陵裨將鄭守澄新買婢旬日有夜扣門者曰君家買婢其名籍在此不可留也開門視之無所見方怪之數日廣陵大疫此婢亦病遂卒既而守澄亦病卒而弔客數人轉相染着皆卒甲寅嵗春也出稽神錄劉隲洪州髙安人劉隲少遇亂有姊曰糞掃為軍將孫金所擄有妹曰烏頭生十七年而卒卒後三嵗孫金為常州團練副使糞掃從其女君㑹宴於大將陳氏乃見烏頭在焉問其所從來云頃為人所擄至岳州與劉翁媪為女嫁得北來軍士任某即陳所將卒也從陳至此爾通信至其家隲時為縣手力後數年因事至都遂往毘陵省之晚止逆旅翌日先謁孫金即詣任營中先遣小僕覘之方見洒掃庭内曰我兄弟將至矣僕良久扣門問為誰曰髙安劉之家使乃曰非二兄名隲多髯者乎昨日晚當至何為遲也即自出營門迎之容貌如故相見悲泣了無少異頃之孫金遣其諸甥持酒食至任之居讌叙良久烏頭曰今日乃得二兄來證我為人向者恒為諸甥輩呼我為鬼也任亦言其舉止輕㨗女工敏速恒夜作至旦若有人為同作者飲食必待冷而後食隲因宻問汝昔已死那得至是對曰兄無為如此問我將不得相見矣隲乃不敢言久之任卒再適軍士羅氏𨽻江州陳承昭為髙安制置使召隲問其事令發墓視之墓在米嶺無人省視數十年矣伐木開路而至見墓上有穴大如碗其深不測衆懼不敢發相與退坐大樹下筆疏其事以白承昭是嵗烏頭病隲往省之乃曰頃為鄉人十餘輩持刀杖劫我幾中我靣我大責罵力拒之乃退坐大樹下作文書而去至今舉身猶痛隲乃知恒出入墓中也因是亦懼而疏之羅後移𨽻晉王城戍顯徳五年周有淮南之地羅陷沒不知所在時年六十二嵗矣出稽神錄太平廣記卷三百五十五
