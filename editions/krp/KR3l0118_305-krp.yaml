body:
  text: 太平廣記卷三百五宋李昉等編神十五王法智李佐時韋皋竇參李伯禽蕭復弟李納崔汾辛祕王法智桐廬女子王法智者幼事郎子神大厯中忽聞神作大人語聲法智之父問此言非聖賢乎曰然我姓滕名傳𦙍本京兆萬年人宅在崇賢坊本與法智有因緣與酧對深得物理前後州縣甚重之桐廬縣令鄭鋒好竒之士常呼法智至舍令屈滕十二郎久之方至其辨對言語深有士風鋒聽之不倦每見詞人談經誦詩歡言終日常有客僧詣法智乞丐者神與交言贈詩云卓立不求名出家長懷片志在青霞今日英雄氣衝葢誰能久坐寶蓮花又曾爲詩贈人云平生才不足立身信有餘自歎無大故君子莫相疎六年二月二十五日夜戴孚與左衞兵曹徐晃龍泉令崔向丹陽縣丞李從訓邑人韓謂蘇修集於鋒宅㑹法智至令召滕傳𦙍久之方至與晃等酧獻數百言因謂諸賢請人各誦一章誦畢衆求其詩率然便誦二首云浦口潮來初淼漫蓮舟搖颺採花難春心不愜空歸去㑹待潮平更折看云衆人莫厮笑又誦云忽然湖上片雲飛不覺舟中雨濕衣折得蓮花渾忘却空將荷葉葢頭歸自云此作亦頗蹀躞又囑法智弟與鋒獻酧數百言乃去出廣異記李佐時山陰縣尉李佐時者以大厯二年遇勞病數十日中愈自㑹稽至龍丘㑹宗人述爲令佐時止令㕔數日夕復與客李舉明燈而坐忽見衣緋紫等二十人悉秉戎器趨謁庭下佐時問何人答曰鬼兵也大王用君爲判官特奉命迎候以充驅使佐時曰已在哀制如是非禮且王何以得知有我答云是武義縣令竇堪舉君佐時云堪不相知何故見舉答云恩命已行難以辭絶須臾堪至禮謁藴藉如平人坐謂佐時曰王求一子聓兼令取甲族所以奉舉亦由緣業使然佐時固辭不果須臾王女亦至芬香芳馥車騎雲合佐時下階迎拜見女容姿服御心頗悦之堪謂佐時曰人誰不死如君葢稀無宜數辭以致王怒佐時知終不免久之王女與堪去留將從二百餘人祗承判官翌日述幷弟造同詣佐時佐時且説始末云的以不活爲求一頓食述爲致盛饌佐時食雉臛忽云不見碗呵左右何以收羮仆于食案便卒其妻鄭氏在㑹稽䘮船至之夕婢忽作佐時靈語云王女已别嫁但遣我送妻還言甚悽愴也出廣異記韋皋韋皋初薄遊劒外西川節度使兵部尚書平章事張延賞以女妻之既而惡焉厭薄之情日露公鬱欎不得志時入幕府與賔朋從游且攄其忿延賞愈惡之謂皋曰幕僚無非時竒延賞尚敬憚之韋郎無事不必數到其輕之如此他日其妻尤憫之曰男兒固有四方志今厭賤如此不知歡然度日竒哉妾辭家事君子荒隅一間茆屋亦君之居炊菽羮藜簞食瓢飲亦君之食何必忍愧彊安爲有血氣者所笑於是入告張行意延賞遺帛五十疋夫人薄之不敢言時有女巫在焉見皋入西院問夫人曰向之綠衣入西院者爲誰曰韋郎曰此人極貴位過宰相逺矣其禄將發不久亦鎮此宜殊待之問其所以曰貴人之所行必有陰吏相國之侍一二十人耳如韋郎者乃百餘人夫人聞之大喜遽言于延賞延賞怒曰贈薄請益可矣奈何假托巫妖以相調乎韋行月餘日到岐岐帥以西川之貴聓延置幕中奏大理評事尋以鞫獄平允加監察以隴州刺史卒出知州事俄而朱泚亂駕幸奉天隴州有泚舊卒五百人兵馬使牛雲光主之雲光謀作亂不克率其衆奔朱泚道遇泚使以僞詔除皋御史中丞因與之俱還皋受其命謂雲光曰受命必無疑矣可悉納器械以明不相詐雲光從之翌日大饗伏甲盡殺之立壇盟諸將泚復許皋鳯翔節度皋斬其使行在聞之人心皆奮乃除隴州刺史奉義軍節度使及駕還宫乃授兵部尚書西川節度使延賞聞之將自抉其目以懲不知人出續𤣥怪錄竇參竇參常爲蒲圻縣令縣有神祠前後令宰皆祀之竇至即欲除毁有日矣夢神謂已曰欲毁吾所居吾害公未得者葢以公當爲相然幸且相存自知與君往來可以預知休咎既驚覺乃自入祠祭酹以兄事之後凡有遷命皆先報之頗與神交焉其神欲相見必具盛饌於空室之内圍以簾幕竇入之後左右聞二人笑語聲竇爲栁州别駕官舍有空院竇因閉之俄聞有呼聲三四尋之則無人竇心動乃具服仰問之曰得非㡬兄乎曰是也君宜促理宋事三兩日内有北使到君不免矣竇依言處置訖坐待使不數日王人遽至果有後命出戎幕閒談李伯禽貞元五年李白子伯禽充嘉興監徐浦下揚糴鹽官場界有蔡侍郎廟伯禽因謁廟顧見廟中神女數人中有羙麗者因戲言曰娶婦得如此足矣遂瀝酒祝語之後數日正晝視事忽聞門外有車騎聲伯禽驚起良久具服迎於門乃折旋而入人吏驚愕莫知其由乃命酒殽久之祗叙而去後乃語蔡侍郎來明日又來傍人並不之見伯禽迎於門庭言叙云幸䝉見錄得事高門再拜而坐竟夕飲食而去伯禽乃告其家曰吾已許蔡侍郎論親治家事别親黨數日而卒出通幽記蕭復弟蕭復親弟少慕道不仕服食芝桂能琴尤善南風因遊衡湘維舟江岸見一老人負書攜琴蕭生揖坐曰父善琴得南風耶曰素善此因請撫之尤妙絶遂盡傳其法飲酒數盃問其所居笑而不答及北歸至沅江口上岸理南風有女子雙鬟挈一小竹籠曰娘子在近好琴欲走報也蕭復問來此曰採果耳去頃却迴曰娘子召君蕭久在船頗思閒行遂許之俄有蒼頭棹畫舸至蕭登之行一里餘有門館甚華召生升堂見二美人於上前拜美人曰無怪相迎知君善南風某亦素愛久不習理忘其半願得𫝊受生遂爲奏美人亦命取琴蕭彈畢二美人及左右皆掩泣問生授於何人乃言老父具言其狀美人流涕曰舜也此亦上帝遣君子受之𫝊與某某即舜二妃舜九天爲司徒已千年别受此曲年多忘之遂留生啜茶數碗生辭去曰珍重厚惠然亦不欲言之於人遂出門復乘畫舸至彈琴之所明日尋之都不見矣出逸史李納貞元初平盧帥李納病篤遣押衙王祐禱於岱嶽齋戒而往及嶽之西南遙見山上有四五人衣碧汗衫半臂其餘三四人雜色服飾乃從者也碧衣持彈弓彈古樹上山鳥一發而中鳥墮樹從者爭掩捉王祐見前到山下人盡下車卻葢向山齊拜比祐欲到路人皆止祐下車此三郎子七郎子也遂拜碧衣人從者揮路人令上車路人躊躇碧衣人自手揮又令人上持彈弓於殿西南以彈弓斵地俯視如有所伺見王祐乃召之前曰何爲來祐具以對碧衣曰吾本使已來矣何必更爲此行要見使者乎遂命一人曰引王祐見本使遂開西院門引入見李納荷挍滅耳踞席坐於庭王祐驚泣前伏抱納左脚噬其膚引者曰王祐可退却引出碧衣尤在殿堦謂祐曰要見新使邪又命一人從東來形狀短闊神彩可愛碧衣曰此君新使也祐拜訖無言祐似欠啑而遲者久之忽無所見惟蒼苔松栢悄然嚴靜乃薦奠而迴見納納呼入卧内問王祐祐但以薦奠畢擲樗蒱投具得吉兆告納納曰祐何不實言何故噬吾足於是舉足乃祐所噬足跡也祐頓首具以實告納曰適見新使爲誰祐曰見則識不知其名也納乃召三人出至師古曰此是也納遂授以後事言畢而卒王祐初見納荷挍問曰僕射何故如此納曰平生爲臣之辜也葢不得已如何今日復奚言也出集異記崔汾澧泉尉崔汾仲兄居長安崇賢里夏夜乘涼於庭際月色方午風過覺有異香俄聞南垣土動䔩䔩崔生意其虵鼠也忽見一道士大言曰大好月色崔驚懼避之道士緩歩庭中年可四十風儀清古良久妓女十餘排大門而入輕綃翠翹艶色絶世有從者具香茵列坐月下崔生疑其妖魅以枕擊門驚之道士小顧怒曰我以此差靜復貪月色初無延佇之意敢此粗率乃厲聲曰此處有地界耶歘有二人長纔三尺巨首儋耳唯伏其前道士頤指崔生所止曰此人合有親屬入陰籍可領來二人趨出俄見其父母及兄悉至衛者數人捽拽批抶之道士叱曰我在此敢縱子無禮乎父母叩頭曰幽明隔絶誨責不及道人叱遣之復顧二鬼曰捉此癡人來二鬼跳及門以赤物如彈丸遙投崔生口中乃細赤綆也遂釣出於庭又叱辱崔驚失音不得自理崔僕妾悉號泣其妓羅拜曰彼凡人固訝仙官無狀而至似非大過怒解乃拂衣由大門而去崔生病如中惡五六日方差因迎祭酒醮謝亦無他崔生初隔隙見亡凡以帛抹唇如損狀僕使共訝之一婢泣曰㡬郎就木之時靣衣忘開口其時匆匆就剪誤傷下吻然旁人無見者不知幽㝠中二十餘年尤負此苦出酉陽雜爼辛秘辛秘五經擢第後常州赴婚行至陜因息於樹隂旁有乞兒箕坐痂靣蟣衣訪辛行止辛不對即去乞兒亦隨之辛馬劣不能相逺乞兒彊言不已前及一衣綠者辛揖而與之俱行里餘綠衣者忽前馬驟去辛怪之獨言此人何忽如是乞兒曰彼時至豈自由乎辛覺語異始問之曰君言時至何也乞兒曰少頃當自知之將及店見數十人擁店門問之乃綠衣者卒矣辛驚異遽卑下之因解衣衣之脱乘乘之乞兒初無謝意語言往往有精義至汴謂辛曰某止是矣公所適何事也辛以娶約語之乞兒笑曰公士人業不可止此行然非君妻公婚期甚逺隔一日乃扛一器酒與辛别指相國寺刹曰及午而焚可遲此而别如期刹無故火發壞其相輪臨去以綾帊複贈辛帶有一結語辛異時有疑當發視也積二十餘年辛爲渭南尉始婚裴氏洎裴生日㑹親賔客忽憶乞兒之言解帊複結得幅紙大如手板署曰辛祕妻河東裴氏某月日生乃其日也辛計别乞兒之日妻尚未生出酉陽雜爼太平廣記卷三百五
