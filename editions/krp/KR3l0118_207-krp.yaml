body:
  text: 太平廣記卷二百七書二王羲之王獻之王修荀輿謝安王廙戴安道康昕韋昶蕭思話王僧䖍王融蕭子雲蕭特智永智果王羲之晉王羲之字逸少曠子也七歲善書二十見前代筆說於其父枕中竊而讀之父曰爾何來竊吾所秘羲之笑而不答母曰爾看用筆法父見其小恐不能秘之語羲之曰待爾成人吾授也羲之拜請今而用之使待成人恐蔽兒之幼令也父喜遂與之不盈朞月書便大進衛夫人見語太常王䇿曰此兒必見用筆訣近見其書便有老成之智涕流曰此子必蔽吾名晉帝時祭北郊文更祝板工人削之筆入木三分三十三書蘭亭序三十七書黄庭經書訖空中有語卿書感我而况人乎吾是天台文人自言眞勝鍾繇羲之書多不一體出羊欣筆陣圖逸少善草隸八分飛白章行備精諸體自成一家法千變萬化得之神功逸少隸行草章草飛白五體俱入神八分入妙妻郗氏工書有七子獻之最知名𤣥之凝之徽之操之並工草出書斷又羲之書以章草答庾亮示翼翼見乃歎伏因與羲之書云吾昔有伯英章草八紙過江顚沛遂乃亡失常歎妙跡永絕忽見足下答家兄書煥若神明頓還舊觀羲之罷㑹稽住蕺山下旦見一老姥把十許六角竹扇出市王聊問此欲貨耶一枚幾錢答云二十許右軍取筆書扇扇五字姥大悵惋云老舉家朝飡俱仰於此云何書壊王答曰無所損但道是王右軍書字請一百既入市人競市之後數日復以數扇來詣請更書王笑而不答又云羲之曾自書表與穆帝專精任意帝乃令索紙色𩔖長短濶狹與王表相似使張翼寫效一毫不異乃題後答之羲之初不覺後更相看廼歎曰小人亂真乃爾羲之性好鵝山隂曇􅙓村有一道士養好者十餘王清旦乘小船故徃看之意大願樂乃告求市易道士不與百方譬説不能得之道士言性好道乆欲寫河上公老子縑素早辦而無人能書府君若能自書屈道德各両章便合羣以奉羲之停半日為寫畢籠鵝而歸大以為樂又嘗詣一門生家設佳饌供給意甚感之欲以書相報見有一新榧几至滑淨王便書之草正相半門生送王歸郡比還家其父已刮削都盡兒還去看驚懊累日出圖書㑹粹又晉穆帝永和九年暮春三月三日嘗遊山隂與太原孫統承公孫綽興公廣漢王彬之道生陳郡謝安石髙平郄曇重熙太原藴叔仁釋支遁道林并逸少子凝徽操之等四十一人修祓禊之禮揮毫製序興樂而書用蠶繭紙䑕鬚筆遒媚勁健絕代更無凡二十八行三百二十四字字有重者皆别體就中之字最多出法書要録王獻之王獻之字子敬尤善草隸幼學於父習於張芝爾後改變制度别創其法率爾師心㝠合天矩初謝安請為長史太元中新起太極殿安欲使子敬題榜以為萬代寳而難言之乃説韋仲將題凌雲臺之事子敬知其旨乃正色曰仲將魏之大臣寧有此事使其有此知魏德之不長安遂不之逼子敬年五六歳時學書右軍從後潛掣其筆不脱乃歎曰此兒當有大名遂書樂毅論與之學竟能極小真書可謂窮㣲入聖筋骨𦂳密不減於父如大則尤直而寡態豈可同年唯行草之間逸氣過也及論諸體多劣右軍總而言之季孟差耳子敬隸行草章草飛白五體俱入神八分入能出書斷又羲之為㑹稽子敬出戲見北館新白土壁白淨可愛子敬令取掃帚沾泥汁中以書壁為方丈一字晻曖斐亹極有勢好日日觀者成市羲之後見歎其美問誰所作答曰七郎羲之於是作書與所親云子敬飛白大有直是圖於此壁子敬好書觸遇造𤣥有一好事年少故作精白紙裓着往詣子敬便取裓書之草正諸體悉備兩袖及褾略周自歎比来之合年少覺王左右有凌奪之色如是掣裓而走左右果逐及於門外鬭爭分裂少年纔得一袖而已子敬為呉興羊欣父不疑為烏程令欣時年十五六書已有意為子敬所知往縣入欣齋著新白絹裙晝眠子敬乃書其裾幅及帶欣覺歡樂遂寳之後以上朝廷出圖書㑹粹又獻之嘗與簡文帝書十許紙題最後云下官此書甚合作願聊存之此書為桓𤣥所寳𤣥愛重二王不能釋手乃撰縑素及紙書正行之尤美者各為一帙嘗置左右及南奔雖甚狼狽猶以自隨將敗並沒于江出法書要録王修王修字敬仁仲祖之子官至著作郎少有秀令之譽年十六著賢令論劉真長見之嗟歎不已善隸行書嘗就右軍求書乃寫東方朔畫讚與之王僧䖍云敬仁書殆窮其妙王子敬每看咄咄逼人昇平元年卒年二十四歳始王導愛好鍾氏書喪亂狼狽猶衣帶中藏尚書宣示過江後以賜逸少逸少乞敬仁敬仁卒其母見此書平生所好以入棺敬仁隸行入妙殷仲堪書亦敬仁之亞也出書斷荀輿荀輿能書嘗寫狸骨方右軍臨之至今謂之狸骨帖出尚書故實謝安謝安字安石學正於右軍右軍云卿是解書者然之書解為難安石尤善行書亦猶衛洗馬風流名士海内所瞻王僧䖍云謝安入能書品録也安石隸行草并入妙兄尚字仁祖萬石並工書出書斷王廙晉平南將軍後侍中王廙右軍之叔父工隸飛白祖述張衛法復索靖書七月二十六日一紙每寳玩之遭永嘉喪亂乃四叠綴衣中以渡江今蒲州桑泉令豆盧器得之叠跡猶在出圖史異纂戴安道康昕晉戴安道隱居不仕總角時以雞子汁溲白瓦屑作鄭𤣥碑自書刻之文既竒䴡書亦絕妙又有康昕亦善草隸王子敬嘗題方山亭壁數行昕密改之子敬後過不疑又為謝居士題畫像以示子敬歎能以為川河絕矣昕字君明外國人官臨沂令闕韋昶晉韋昶字文休仲將兄康字元將涼州刺史之𤣥孫官至潁川太守散騎常侍善古文大篆及草狀貌極古亦猶人則抱素木則封冰竒而且勁太元中孝武帝改治宫室及廟諸門並欲使王獻之隸草書題牓獻之固辭及使劉瓌以八分書之後又以文休以大篆改八分焉或問王右軍父子書名以為云何答曰二王自可謂能未知是書也又妙作筆王子敬得其筆歎為絕世義熈末卒年七十餘文休古文大篆草書並入妙出書斷蕭思話宋蕭思話蘭陵人父源冠軍瑯琊太守思話官至征西將軍左僕射工書學於羊欣得具體法雖無竒峰壁立之秀連岡書望勢不斷絕亦可謂有功矣王僧䖍云蕭全法羊風流媚好殆欲不減筆力恨弱袁昻云羊真孔草蕭行范篆各一時之妙也出書斷王僧䖍瑯琊王僧䖍博通經史兼善草隸太祖謂䖍曰我書何如卿曰臣正書第一章書第三陛下草書第二正書第三臣無第二陛下無第一上大笑曰卿善為詞也然天下有道丘不與易也䖍歴左僕射尚書令諡簡穆公僧䖍長子慈年七歳外祖江夏王劉義㳟迎之入中齋施實寳物恣其所取慈唯取素琴一張孝子圖而已年十歳共時軰蔡約入寺禮佛正見沙門等䜟悔約戲之曰衆僧今日何乾乾慈應聲答曰卿如此不知禮何以興蔡氏之宗約興宗之子也謝超宗見慈學書謂之曰卿書何如䖍公答云慈書與大人如雞之比鳯超宗鳯之子慈歴侍中贈太常卿約歴太子詹事出談藪又齊髙帝嘗與王僧䖍賭書畢帝曰誰為第一僧䖍對曰臣書人臣中第一陛下書帝中第一帝笑曰卿可謂善自謀矣出南史王融宋末王融圖古今雜體有六十四書少年倣効家藏紙貴而風魚蟲鳥是七國時書元長皆作隸字故貽後来所誥湘東王遣沮陽令韋仲定為九十一種次功曹謝善勛增其九法合成百體其中以八卦為書為一以太為両法徑丈一字方寸千言出法書要録蕭子雲梁蕭子雲字景喬武帝謂曰蔡邕飛而不白羲之白而不飛飛白之間在卿斟酌耳嘗大書蕭字後人匣而寳之𫝊至張氏賔護東都舊第有蕭齋前後序皆名公之詞也出尚書故實武帝造寺令蕭子雲飛白大書蕭字至今存焉李約竭産自江南買歸東洛建一小亭以翫號曰蕭齋出國史補蕭特海鹽令蘭陵蕭特善草隸髙祖賞之曰子敬之書不如逸少蕭特之跡遂過其父出談藪僧智永陳永欣寺僧智永永師逺祖逸少歴紀專精攝齋升堂真草唯命智永章草及草書入妙行入能兄智楷亦工書丁覘亦善隸書時人云丁真永草出書斷又智永嘗於樓上學書業成方下出國史纂異梁周興嗣編次千字文而有王右軍者人皆不曉其始乃梁武敎諸王書令殷鐡石於大王書中榻一千字不重者每字片紙雜碎無序武帝召興嗣謂曰卿有才思為我韻之興嗣一夕編綴進上鬢髪皆白而賞錫甚厚右軍孫智永禪師自臨八百夲散與人外江南諸寺各留一夲永公住呉興永欣寺積學書後有禿筆頭十甕每甕皆數千人来覓書并請題額者如市所居戸限為穿穴乃用鐡葉褁之謂為鐡門限後取筆頭瘞之號為退筆塜自製銘誌出尚書故實常居永欣寺閣上臨書所退筆頭置之於大竹簏簏受一石餘而五簏皆滿出法書要録僧智果隋永欣寺僧智果㑹稽人也煬帝甚善之工書銘石其為痩健造次難𩔖嘗謂永師云和尚得右軍肉智果得骨夫筋骨藏於膚肉山水不厭髙深而此公稍乏清幽傷於淺露若呉人之戰輕進易退勇力而非武虛張誇耀無乃小人儒乎智果隸行草入能出書斷太平廣記卷二百七
