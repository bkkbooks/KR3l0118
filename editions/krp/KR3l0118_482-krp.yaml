  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_482-1a, image: WYG1046/WYG1046-0522a.png}
body:
  text: 太平廣記卷四百八十二宋李昉等編蠻夷三苗民竒肱西北荒小人于闐烏萇漢盤陁國蘇都識匿國馬留武寧蠻懸渡國飛頭獠蹄羌扶婁交趾南越尺郭頓遜墮婆登國哀牢夷訶陵國真獵國留仇國木客繳濮國木飲州阿薩部孝憶國婆彌爛國撥抜力國昆吾繡面獠子五溪蠻墮雨兒苗民西荒中有人焉面目手足皆人形而腋下有翼不能飛名曰苗民書曰竄三苗于三危四裔為人饕餮淫佚無理舜竄之于此出神異經竒肱竒肱國其民善為機巧以殺百禽能為飛車従風逺行湯旹西風久下竒肱人車至于豫州界中湯破其車不以示民後十年東風復至乃使乗車遣歸其國去玉門西萬里出博物志西北荒小人西北荒小人中有長一寸其君朱衣𤣥冠乗輅車馬引為威儀居處人遇其乗車抵而食之其味辛終年不為物所咋并識萬物名字又殺腹中三虫三虫死便可食仙藥也出博物志于闐後魏宋雲使西域行至于闐國國王頭著金冠以雞幘頭垂二尺生絹廣五寸以為飾威儀有鼓角金鉦弓箭一門㦸二枚槊五張左右帶刀不過百人其俗婦人袴衫束帶乗馬馳走與丈夫無異死者以火焚燒収骨塟之上起浮圖居喪者剪髪長四寸即就平常唯王死不燒置之棺中逺塟于野出洛陽伽藍記烏萇烏萇國四熟之稻苗髙没駱駝米大如小兒指出洽聞記又烏萇國民有死罪不立殺刑唯徙空山任其飲啄事涉疑似以藥服之清濁則驗随事輕重則當時即决出洛陽伽藍記漢槃陁國漢槃陁國正在須山自葱嶺已西水皆西流世人云是天地之中其土人民决水以種聞中國待雨而種笑曰天何由可期也出洛陽伽藍記蘇都識匿國蘇都識匿國有野叉城城舊有野叉其窟見在人近窟住者五百餘家窟口作舍設闗鑰一年再祭人有逼窟口烟氣出先觸者死因以尸擲窟中其窟不知深淺出酉陽雜俎馬留馬伏波有餘兵十餘家不返居夀洽縣自相婚姻有二百户以其流寓號馬留飲食與華同山川移銅柱入海以此民為識耳出酉陽雜俎武寧蠻峽中夷風不改武寧蠻好著芒心按離名曰亭綏以稻記年月塟時以笄向天謂之刺北斗相傳磐瓠初死置于樹上以笄刺之其後化為象臨邑縣有鴈翅以禦者出酉陽雜俎懸渡國烏耗西有懸渡國山溪不通引繩而渡朽索相引二千里土人佃于石間壘石為室接手而飲所謂猿飲也出酉陽雜俎飛頭獠鄴鄯之東龍城之西南地廣千里皆為鹽田行人所經牛馬皆布氊卧焉嶺南溪洞往往有飛頭者故有飛頭獠子之號頭飛一日前頸有㾗匝項如紅縷妻子遂看守之其人及夜狀如病頭忽離身而去乃于岸泥尋蠏蚓之𩔖食之将曉飛還如夢覺其腹實矣梵僧菩薩勝又言闍婆國中有飛頭者其人無目瞳子聚落時有一人據于民志怪南方落民其頭能飛其俗所祠名曰虫落因號落民昔朱桓有一婢其頭夜飛王子年拾遺言漢武峕因墀國有南方有解形之民能先使頭飛南海左手飛東海右手飛西海至暮頭還肩上兩手遇疾風飄于海外出酉陽雜俎又南方有落頭民其頭能飛以耳為翼将曉還復著體吳峕往往得此人也出博物志蹄羌蹄羌之國其人自膝已下有毛如水蹄常自鞭其脛日行百里出博物志扶婁周成王七年南陲有扶婁之國其人能機巧變化易形改服大則興雲起霧小則入于纎毫之裏綴金玉毛羽為衣裳能吐雲噴火鼓腹則如雷霆之聲或化為巨象獅子龍蛇犬馬之状或變虎或口中吐人于掌中備百戯之樂旋轉屈曲于指間見人形或長數分或復數寸神怪欻忽衒于峕樂府皆𫝊此伎代代不絶故俗謂婆侯伎則扶婁之音訛替也出王子年拾遺交趾交趾之地頗為膏腴徙民居之始知播植厥土惟黒壤厥氣惟雄故今稱其田為雄田其民為雄民有君長亦曰雄王有輔佐焉亦曰雄侯分其地以為雄将出南越志南越南越民不恥寇盜其峕尉陀治番禺乃興兵攻之有神人適下輔佐之家為造弩一張一放殺越軍萬人三放三萬人陀知其故却壘息卒還戎武寧縣下乃遣其子始為質請通好焉出南越志尺郭南有人焉周行天下其長七丈腹圍如其長朱衣縞帶以赤蛇繞其頂不飲不食朝吞惡鬼三千暮吞三百此人以鬼為食以霧為漿名曰尺郭一名食邪一名黄父出神異經頓遜頓遜國梁武朝峕貢方物其國在海島上地方千里屬扶南北三千里其俗人死後鳥葬将死親賔歌舞送于郭外有鳥如鵝而色紅飛來萬萬家人避之鳥啄肉盡乃去即燒骨而沉海中也出窮神秘苑堕婆登國堕婆登國在林邑東南接訶陵西接述黎種稲每月一熟有文字書于貝多葉死者口實以金缸貫于四支然後加以婆律膏及檀沉龍腦積薪燔之出神異經哀牢夷哀牢夷其先有婦人名沙壺居牢山捕魚水中若有所感妊孕十月而生十子今西南夷其裔也出獨異志訶陵國訶陵在真臘國之南南海洲中東婆利西堕婆北大海𥪡木為城造大屋重閣以椶皮覆之以象牙為牀以栁花為酒飲之亦醉以手撮食有毒與常人居止宿處即令身上生瘡與之交㑹即死若旋夜沾著草木即枯俗以栁樹為酒味甘飲之亦醉出神異録真臘國真臘國在驩州南五百里其俗有客設㯽榔龍腦香蛤屑等以為賞宴其酒比之淫穢私房與妻共飲對尊者避之又行房不欲令人見此俗與中國同國人不著衣服見衣服者共笑之俗無鹽鐵以竹弩射蟲鳥出朝野僉載留仇國煬帝令朱寛征留仇即後流虬國還獲男女口千餘人并雜物産與中國多不同緝木皮為布甚細白幅濶三尺二三寸亦有細斑布幅濶一尺許又得金荆榴數十斤木色如真金宻緻而文彩盤蹙有如美錦甚香極精可以為枕及案面雖沉檀不能及彼土無銕朱寛還至南海郡留仇中男夫壯者多加以鐵鉗鏁恐其道逃叛還至江都將見為解脱之皆手把鉗叩頭惜脱甚于中土貴金人形短小似崑崙出朝野僉載木客郭仲產湘州記云平樂縣西七十里有榮山上多有木客形似小兒歌哭衣裳不異于人而伏狀𨼆現不測宿至精巧峕市易作器與人無别就人換物亦不計其值今昭州平樂縣出洽聞記繳濮國永昌郡西南一千五百里有繳濮國其人有尾欲坐輒先穿地作穴以安其尾若邂逅誤折其尾即死也出廣州記木飲州木飲州朱崖一州其地無泉民不作井皆仰樹汁為用出酉陽雜俎阿薩部阿薩部多獵蟲鹿剖其肉重疊之以石壓瀝汁税波斯拂林等國米及草子釀于肉汁之中經數日即變成酒飲之可醉出酉陽雜俎孝憶國孝憶國界周三千餘里在平川中以木為柵周十餘里柵内百姓二千餘家周國木柵五百餘所氣候常煖冬不凋落宜羊馬無駞牛俗性質直好客侣軀貌長大褰鼻黄髪緑睛赤髭被髪面如血色戰具唯矟一色宜五糓出金鐵衣麻布舉俗事妖不識佛法有妖祠三百餘所馬步兵一萬不尚商販自稱孝憶人丈夫婦人俱佩帶毎一日造食一月食之常吃宿食仍通國無井及河澗所有種植待雨而生以纊鋪地承雨水用之穿井即苦海水又醎土俗伺海潮落之後平地収魚以為食出酉陽雜俎婆彌爛國婆彌爛國去京師二萬五千五百五十里此國西有山巉岧峻嶮上多猿猿形絶長大常暴田種每年有二三十萬國中起春已後屯集甲兵與猿戰雖歲殺數萬不能盡其巢穴出酉陽雜俎撥抜力國撥抜力國在西南海中畧不識五榖食肉而已常針牛畜脉取血和乳生飲無衣唯腰下用羊皮掩之其婦人潔白端正國人自掠賣與外國商人其價數倍土地唯有象牙及阿未看波斯商人欲入此國團集萬千人齎緤布没老幼共刺血立誓乃市其物自古不屬外國戰用象牙排野牛角矟衣甲弓矢之器步兵二十萬大食頻討襲之出酉陽雜俎昆吾昆吾陸鹽周十餘里無水自生朱鹽月滿則如積雪味甘月虧則如薄霜味苦月盡鹽亦盡又其國累土為邱𧰼浮圖有三僧尸乾居上尸濕居下以近塟為至孝集大毡屋中懸衣服綵繒哭化之出酉陽雜俎繡面獠子越人習水必鏤身以避蛟龍之患今南中有繡面獠子葢雕題之遺俗也出酉陽雜俎五溪蠻五溪蠻父母死于村外閣其尸三年而葬打鼓路歌親屬飲宴舞戲一月餘日盡産為棺飲臨江髙山半助鑿龕以塟之山上懸索下柩彌髙者以為至孝即終身不復祠祭初遭喪三年不食鹽出朝野僉載堕雨兒魏峕河間王子充家雨中有小兒八九枚堕于庭長五六寸許自云家在海東南因有風雨所飄至此與之言甚有所知皆如史𫝊所述出述異記太平廣記卷四百八十二
