body:
  text: 太平廣記卷十三神仙十三茅君孔安國尹軌介象蘇仙公成仙公郭璞尹思茅君茅君者幽州人學道於齊二十年道成歸家父母見之大怒曰汝不孝不親供養尋求妖妄流走四方欲笞之茅君長跪謝曰某受命上天當應得道事不兩遂違逺供養雖日多無益今乃能使家門平安父母壽考其道已成不可鞭辱恐非小故父怒不已操杖向之適欲舉杖杖即摧成數十段皆飛如弓激矢中壁壁穿中柱柱陷父乃止茅君曰向所言正慮如此邂逅中傷人耳父曰汝言得道能起死人否茅君曰死人罪重惡積不可得生横傷短折即可起耳父使為之有驗茅君弟在宦至二千石當之官鄉里送者數百人茅君亦在座乃曰余雖不作二千石亦當有神靈之職某月某日當之官賓客皆曰願奉送茅君曰顧肯送誠君甚厚意但當空来不須有所損費吾當有以供待之至期賓客並至大作宴㑹皆青縑帳幄下鋪重白氊竒饌異果芬芳羅列妓女音樂金石俱奏聲震天地聞於數里隨從千餘人莫不醉飽及迎官来文官則朱衣素帶數百人武官則甲兵旌旗器仗耀日結營數里茅君與父母親族辭别乃登羽蓋車而去麾幡蓊鬱驂虬駕虎飛禽翔獸躍覆其上流雲彩霞霏霏繞其左右去家十餘里忽然不見逺近為之立廟奉事之茅君在帳中與人言語其出入或發人馬或化為白鶴人有病者往請福常煮雞子十枚以内帳中須臾一一擲出還之歸破之若其中黄者病人當愈若有土者即不愈常以此為候出神仙傳孔安國孔安國者魯人也常行氣服鉛丹年三百嵗色如童子𨼆潛山弟子隨之數百人每斷榖入室一年半復出益少其不入室則飲食如常與世人無異安國為人沉重尤寳惜道要不肯輕傳其奉事者五六年審其為人志性乃傳之有陳伯者安樂人也求事安國安國以為弟子留三年知其執信乃謂之曰吾亦少更勤苦尋求道術無所不至遂不能得神丹八石登天之法惟受地仙之方適可以不死而昔事海濵漁父漁父者故越相范蠡也乃易姓名𨼆以避凶世哀我有志授我秘方服餌之法以得度世則大伍司誠子期姜伯塗山皆千嵗之後更少壮吾受道以来服藥三百餘年以其一方授崔仲卿卿年八十四服来已三十三年矣視其肌體氣力甚徤鬚髪不白口齒完堅子往與相見事之陳伯遂徃事之受其方亦度世不老又有張合妻年五十服之反如二十許人一縣怪之八十六生一男又敎數人皆四百嵗後入山去亦有不度世者由於房中之術故也出神仙傳尹軌尹軌者字公度太原人也博學五經尤明天文星氣河洛䜟緯無不精微晚乃學道常服黄精華日三合計年數百嵗其言天下盛衰安危吉凶未嘗不效腰佩漆竹筒十數枚中皆有藥言可辟兵疫常與人一丸令佩之會世大亂鄉里多罹其難惟此家免厄又大疫時或得粒許大塗門則一家不病弟子黄理居陸渾山中患虎暴公度使其㫁木為柱去家五里四方各埋一柱公度即印封之虎即絶迹到五里輙還有怪鳥止屋上者以白公度公度為書一符著鳥所鳴處至夕鳥伏死符下或有人遭䘮當𦵏而貧汲汲無以辦公度過省之孝子遂說其孤苦公度為之愴然令求一片鈆公度入荆山架小屋於爐火中銷鈆以所帶藥如米大投鈆中攪之乃成好銀與之告曰吾念汝貧困不能營𦵏故以拯救慎勿多言也有人負官錢百萬身見收縛公度於富人借數千錢與之令致錫得百兩復銷之以藥方寸匕投之成金還官後到太和山中仙去也出神仙傳介𧰼介象者字元則㑹稽人也學通五經博覽一家之言能屬文後學道入東山善度世禁氣之術能於茅上燃火煮雞而不燋令一里内人家炊不熟雞犬三日不鳴不吠令一市人皆坐不能起𨼆形變化為草木鳥獸聞有五丹經周旋天下尋求之不得其師乃入山精思冀遇神仙憊極臥石上有一虎往䑛象額象寤見虎乃謂之曰天使汝来侍衛我汝且停若山神使汝試我即疾去虎乃去象入山谷上有石子紫色光緑甚好大如雞子不可稱數乃取兩枚谷深不能前乃還於山中見一美女年十五六許顔色非常被服五綵盖神仙也象乞長生之方女曰子可送手中物著故處乃可汝未應取此物吾故止待汝象送石還見女子在前處語象曰汝血食之氣未盡斷榖三年更来吾止此象歸斷榖三年復往見此女故在前處乃以還丹經一首投象告之曰得此便得仙勿復他為也乃辭歸象常住弟子駱廷雅舍帷下屏牀中有數生論左傳義不平象傍聞之不能忍乃忿然為决書生知非常人宻表薦於吳主象知之欲去曰恐官事拘束我耳廷雅固留吳主徴至武昌甚尊敬之稱為介君詔令立宅供帳皆是綺繡遺黄金千鎰從象學𨼆形之術試還後宫出入閨闥莫有見者如此幻法種種變化不可勝數後告言病帝遣左右姬侍以美梨一奩賜象象食之須臾便死帝埋𦵏之以日中時死晡時已至建業所賜梨付苑吏種之吏後以表聞呉主即發棺視之惟一符耳帝思之與立廟時時躬往祭之常有白鶴来集座上遲迴復去後弟子見在盖竹山中顔色轉少出神仙傳蘇仙公蘇仙公者桂陽人也漢文帝時得道先生早䘮所怙鄉中以仁孝聞宅在郡城東北出入往来不避燥濕至於食物不憚精麤先生家貧常自牧牛與里中小兒更日為牛郎先生牧之牛則徘佪側近不驅自歸餘小兒牧牛牛則四散跨岡越嶮諸兒問曰爾何術也先生曰非汝輩所知常乗一鹿先生常與母共食母曰食無鮓他日可往市買也先生於是以筯揷飯中㩦錢而去斯須即以鮓至母食去畢母曰何處買来對曰便縣市也母曰便縣去此百二十里道途徑嶮往来遽至汝欺我也欲杖之先生跪曰買鮓之時見舅在市與我語云明日来此請待舅至以驗虚實母遂寛之明曉舅果到云昨見先生便縣市買鮓母即驚駭方知其神異先生曾持一竹杖時人謂曰蘇生竹杖固是龍也數嵗之後先生灑掃門庭修餙墻宇友人曰有何邀迎答曰仙侣當降俄頃之間乃見天西北隅紫雲氤氲有數十白鶴飛翔其中翩翩然降於蘇氏之門皆化為少年儀形端美如十八九嵗人怡然輕舉先生歛容逢迎乃跪白母曰某受命當仙被召有期儀衛已至當違色養即便拜辭母子歔欷母曰汝去之後使我如何存活先生曰明年天下疾疫庭中井水簷邊橘𣗳可以代養井水一升橘葉一枚可療一人兼封一櫃留之有所闕乏可以扣櫃言之所須當至慎勿開也言畢即出門踟蹰顧望聳身入雲紫雲捧足羣鶴翺翔遂昇雲漢而去来年果有疾疫逺近悉求母療之皆以水及橘葉無不愈者有所闕乏即扣櫃所須即至三年之後母心疑因即開之見雙白鶴飛去自後扣之無復有應母年百餘嵗一旦無疾而終鄉人共葬之如世人之禮𦵏後忽見州東北牛脾山紫雲葢上有號哭之聲咸知蘇君之神也郡守鄉人皆就山弔慰但聞哭聲不見其形郡守鄉人苦請相見空中答曰出俗日久形貌殊凡若當露見誠恐驚怪固請不已即出半面示一手皆有細毛異常人也因請郡守鄉人曰逺勞見慰途徑險阻可從直路而還不須迴顧言畢即見橋亘嶺傍直至郡城行次有一官吏輙迴顧遂失橋所墮落江濵乃見一赤龍於脚下宛轉而去先生哭處有桂竹兩枝無風自掃其地恒淨三年之後無復哭聲因見白馬常在嶺上遂改牛脾山為白馬嶺自後有白鶴来止郡城東北樓上人或挟彈彈之鶴以爪攫樓板似漆書云城郭是人民非三百甲子一来歸吾是蘇君彈何為至今修道之人每至甲子日焚香禮於仙公之故第也出神仙傳又一說云蘇耽者桂陽人也少以至孝著稱母食欲得魚羮耽出湘州市買去家一千四百里俄頃便返耽叔父為州吏於市見耽因書還家家人大驚耽後白母耽受命應仙方違逺供養以兩盤留家中若須食扣小盤欲得錢帛扣大盤是所須皆立至鄉里共怪其如此白官遣吏檢盤無物而耽母用之如神先是耽初去時云今年大疫死者略半家中井水飲之無恙果如所言闔門元吉母年百餘嵗終聞山上有人哭聲服除乃止百姓為之立祠出洞仙傳成仙公成仙公者諱武丁桂昜臨武烏里人也後漢時年十三身長七尺為縣小吏有異姿少言大度不附人人謂之癡少有經學不授於師但有自然之性時先被使京還過長沙郡投郵舍不及遂宿於野𣗳下忽聞𣗳上人語云向長沙市藥平旦視之乃二白鶴仙公異之遂徃市見二人罩白傘相從而行先生遂呼之設食食訖便去曽不顧謝先生乃隨之行數里二人顧見先生語曰子有何求而隨不止先生曰僕少出陋賤聞君有濟生之術是以侍從耳二人相向而笑遂出玉函㸔素書果有武丁姓名於是與藥二丸令服之二人語先生曰君當得地仙遂令還家明照萬物獸聲鳥鳴悉能解之先生到家後縣使送餉府君府君周昕有知人之鑒見先生呼曰汝何姓名也對曰姓成名武丁縣司小吏府君異之乃留在左右久之署為文學主簿嘗與衆共坐聞羣雀鳴而笑之衆問其故答曰市東車翻覆米羣雀相呼往食遣視之信然也時郡中寮吏豪族皆怪不應引寒小之人以亂職位府君曰此非卿輩所知也經旬日乃與先生居閣直至年初元㑹之日三百餘人令先生行酒酒巡徧訖先生忽以盃酒向東南噀之衆客愕然怪之府君曰必有所以因問其故先生曰臨武縣火以此救之衆客皆笑明日司儀上事稱武丁不敬即遣使往臨武縣驗之縣人張濟上書稱元日慶集飲酒晡時火忽延燒㕔事從西北起時天氣清澄南風極烈見陣雲自西北直聳而上徑止縣大雨火即滅雨中皆有酒氣衆疑異之乃知先生盖非凡人也後府君令先生出郡城西立宅居止只有母一小弟及兩小兒比及二年先生告病四宿而殞府君自臨殯之經兩日猶未成服先生友人從臨武來於武昌岡上逢先生乘白騾西行友人問曰日將暮何所之也答曰暫往迷溪斯須却返我去向來忘大刀在户側履在雞棲上可過語家人收之友人至其家聞哭聲大驚曰吾向來於武昌岡逢先生共語云暫至迷溪斯須當返令過語家人收刀并履何得爾乎其家人云刀履並入棺中那應在外即以此事往啓府君府君遂令發棺視之不復見尸惟一青竹杖長七尺許方知先生託形仙去時人謂先生乘騾於武昌乃改為騾岡在郡西十里也出神仙傳郭璞郭璞字景純河東人也周識博聞有出世之道鑒天文地理龜書龍圖爻象䜟緯安墓卜宅莫不窮微善測人鬼之情状李𢎞範林明道論景純善於遥寄綴文之士皆同宗之晉中興王導受其成旨以建國社稷璞盡規矩制度仰範太微星辰俯則河洛黄圖夫帝王之作必有天人之助者矣王敦鎮南州欲謀大逆乃召璞為佐時明帝年十五一夕集朝士問太史王敦果得天下邪史臣曰王敦致天子非能得天下明帝遂單騎微行直入姑孰城敦正與璞食璞久之不白敦敦驚曰吾今同議定大計卿何不即言璞曰向見日月星辰之精靈五嶽四海之神祗皆為導從翌衛下官震悸失守不即得白將軍敦使聞謂是小奚戲馬檢定非也遣三十騎追不及敦曰吾昨夜夢在石頭城外江中扶犂而耕占之璞曰大江扶犂耕亦自不成反反亦無所成敦怒謂璞曰卿命盡㡬何璞曰下官命盡今日敦誅璞江水暴上市璞尸出城南坑見璞家載棺器及送終之具已在坑側兩松𣗳間上有鵲巢璞逆報家書所言也謂伍伯曰吾年十三時於柵塘脫袍與汝吾命應在汝手中可用吾刀伍伯感昔念惠銜涕行法殯後三日南州市人見璞貨其平生服飾與相識共語非但一人敦不信開棺無尸璞得兵解之道今為水仙伯注山海經夏小正爾雅方言著遊仙詩江賦卜繇客傲洞林云晉書有傳出神仙傳尹思尹思者字小龍安定人也晉元康五年正月十五夜坐屋中遣兒視月中有異物否兒曰今年當大水中有一人𬒳蓑帶劒思目視之曰將有亂卒至兒曰何以知之曰月中人乃帶甲仗矛當大亂三十年復當小清耳後果如其言出神仙傳太平廣記卷十三
