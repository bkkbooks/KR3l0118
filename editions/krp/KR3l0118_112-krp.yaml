body:
  text: 太平廣記卷一百十二報應十一史世光董吉宋吏國張元釋智興董雄孟知儉崔善冲唐晏張御史李昕牛騰李元平長沙人乾符僧史世光晉史世光襄陽人咸和八年死於武昌七日沙門支法山轉小品疲而微卧聞靈座上如有人聲史家有婢字張信見世光在靈座著衣具如平日語信曰我本應墮獄中支和尚為我轉經曇䕶曇堅迎我上第七梵天快樂處矣䕶堅並是山之沙彌已亡者也後支法山復往為轉大品又來在座世光生時以二幡供養時在寺中乃呼張信持幡送我信曰諾便絶死將信持幡俱西北飛上一青山如琉璃色到山頂望見天門世光乃自持幡遣信令還與一青香如巴豆曰以上支和尚信未還便遥見世光直入天門信復道而還倐忽乃活亦不復見手中香也幡亦在故寺中世光與信去時其家有六歳兒見之指語祖母曰阿爺飛上天婆為見否世光後復與天人十餘俱還其家徘徊而去每來必見簪帢去必露髻信問之答曰天上有冠不著天冠與羣天人鼓琴行歌徑上母堂信問何用屢來曰我來欲使汝輩知罪福也亦兼娛樂阿母琴音清妙不𩔖凡聲家人悉聞之然其聲如隔壁障不得親察也唯信聞之獨分明焉有頃去信自送見世光入一黑門尋即出來謂信曰舅在此日見搒撻楚痛難勝省視還也舅坐犯殺罪故受此報可告舅母㑹僧轉經當稍免脱舅即車將軍岀㝠祥記董吉董吉於潛人也奉法三世至吉尤精進恆齋戒誦首楞嚴經村中有病輒請吉誦經所救多愈同縣何晃亦奉法卒得山毒之病因晃兄惶遽馳往請吉董何二舍相去六七十里復隔大溪五月中大雨晃兄初渡時水尚未至吉與期設中食後比往而山水暴漲不復可涉吉不能泅遲迴歎息良久吉既信直必欲赴期乃測然發心自誓曰吾救人苦急不計軀命冀如來大士當照乃誠便脱衣以囊經戴置頭上徑入水中量其深淺乃應至吉頸及渡才至膝耳既得上岸失囊經甚悲恨尋至晃家三禮懴悔流涕自責俛仰之間便見經囊在髙座上吉悲喜取看浥浥如有濕氣開囊視經尚燥如故於是村人一時奉法吉家西北有山髙險中多妖魅犯害居民吉以經戒之力欲降伏之於山際四五畝地手伐林木搆造小屋安設髙座轉首楞嚴經百餘日寂然無妖民害稍止後有數人至與吉言語良久吉思惟非於潛人窮山幽絶何因而來疑是鬼神乃謂之曰諸君得無是此中鬼耶答曰是也聞君徳行清肅故來相觀并請一事想必見聽吾世有此山遊居所託君既來止慮相犯冒恆懐不安今欲更作界分當殺樹為斷吉曰僕貪此寂静讀誦經典不相干犯方喜為此願見祐助鬼答曰亦復憑君不侵尅也言畢而去經宿所芟地四際之外樹皆枯死如焚焉出㝠祥記宋吏國宋有一國與羅刹相近羅刹數入境食人無度王與羅刹約言自今已後國中人家各専一日當分送往勿復枉殺有奉佛家惟有一子始年十歳次當充行捨别之際父母哀號便至心念佛以佛威神力故大鬼不得近明日見子尚在歡喜同歸於兹遂絶國人賴焉出幽明録張元後周張元字孝始河北萬城人也年十六其祖喪明三載元懼憂泣晝夜經行以祈福祐復讀藥師經云盲者得視之言遂請七僧燃七層燈七晝夜轉讀藥師經每日行道祝曰元為孫不孝使祖喪明今以燈光並施法界乞祖目見明元求代闇如此辛勤至七日其夜夢有一翁以金箆療其祖目謂元曰勿憂悲也三日後祖目必瘥元於夢中喜誦驚覺乃徧告家人三日祖目果瘥出法苑珠林釋智興唐京師大莊嚴寺釋智興洛州人也勵行堅明依首律師誦經持律不輟昏曉至大業五年仲冬次當維郍鳴鐘同寺僧名三果者有兄從煬帝南幸江都中路身亡初無凶告通夢於妻曰吾行達彭城不幸病死生無善行今墮地獄備經五苦賴今月初十日禪定寺僧智興鳴鐘發響聲振地獄同受苦者一時脱解今生樂處思報其恩汝可具絹十疋奉之并陳意殷勤及寤説之人無信者尋復夢如初後十餘日凶問與夢符同乃以絹奉興合寺大德至咸問興曰何緣鳴鐘乃感斯應興曰余無他術見佛法藏傳云罽膩吒王受苦由鳴鐘得停及增一阿合經鳴鐘作福敬遵此事勵力行之嚴冬登樓風切皮肉露手鳴椎掌中破裂不以為苦鳴鐘之始先發善願諸賢聖同入道場同受法食願諸惡趣聞此鐘聲俱時離苦速得解脱如斯願行察志常奉修故致兹通感焉出異苑董雄唐董雄河南人貞觀中為大理丞幼奉佛法蔬食多年因非累與同列李敬𤣥王欣俱維縶雄専念普門品日三十遍鏁忽夜解落雄驚告忻𤣥忻𤣥視其鏁堅全在地而鈎連不開相離數尺即告守者御史張守一宿直命吏燭之而甚怪重鏁封記而去雄但誦經不輟至五更又解落有聲雄復告忻𤣥等至明守一視之封題如故而鏁自相離忻𤣥素不信佛法其妻讀經常謂曰何為胡神所媚而讀此書耶及見雄此事乃深悟不信之咎方知佛大聖也時忻亦誦八菩薩名滿三萬遍晝鏁解落視之如雄無異不久俱免出法苑珠林孟知儉唐孟知儉并州人少時病忽亡見衙府如平生時不知其死逢故人為吏謂曰因何得來具報之乃知是㝠途吏為檢尋曰君平生無修福處何以得還儉曰一生誦多心經及髙王經雖不記數亦三四萬遍重檢獲之遂還吏問欲知官乎曰甚要遂以簿示之云孟知儉合運出身為曹州參軍轉鄧州司倉即掩却不許看遂至荒榛入一黑坑遂活不知運是何事尋有敕募運糧因放選授曹州參軍乃悟曰此州名亦屬前定耶滿授鄧州司倉去任又選唱晉州判司未過而卒出朝野僉載崔善冲崔善冲先初任梓州桐山丞嶲州刺史李知古奏充判官諸蠻叛殺知古善冲等二十餘人奔走擬投昆明夜不知道冲専念尊經俄見炬火在前衆便隨之至曉火滅乃達昆明出報應記唐晏唐晏梓州人持經日七遍唐開元初避事普州安岳縣與人有隙讒於使君劉肱肱令人捉晏夜夢一胡僧云急去驚起便走至遂州方義縣肱使奄至奔走無路遂一心念經捕者交横並無見者由是獲免出報應記張御史張某唐天寶中為御史判官奉使淮南推覆將渡淮有黄衫人自後奔走來渡謂有急事特駐舟洎至乃云附載渡淮耳御船者欲毆擊之兼責讓何以欲濟而輒停留判官某云無擊反責所由云載一百姓渡淮亦何苦也親以餘食哺之其人甚愧恧既濟與某分路須㬰至前驛已在門所某意是囑請心甚嫌之謂曰吾適渡汝何為復至可即遽去云已實非人欲與判官議事非左右所聞因屏左右云奉命取君合淮中溺死適承一饌固不忘已蒙厚恩只可一日停留耳某求還至舍有所遺囑鬼云一日之外不敢違也我雖為使然在地下職𩔖人間里尹方胥爾某欲前請救鬼云人鬼異路無宜相逼恐不免耳某遥拜鬼云能一日之内轉千卷續命經當得延夀言訖出去至門又回請云識續命經否某初未了知鬼云即人間金剛經也某云今日已晩何由轉得千卷經鬼云但是人轉則可某乃大呼傳舍中及他百姓等數十人同轉至明日晩終千遍訖鬼又至云判官已免㑹須暫謁地府衆人皆見黄衫吏與某相隨出門既見王具言千遍續命經足得延夀命取檢云與所誦實同因合掌云若爾尤當更得十載夀便放重生至門前所追吏云坐追判官遲迴今已遇捶乃袒示之願乞少錢某云我貧士且在逆旅多恐不辦鬼云唯二百千某云若是紙錢當奉五百貫鬼云感君厚意但我徳素薄何由受汝許錢二百千正可某云今我亦鬼耳夜還逆旅未易辦得鬼云判官但心念令妻子還我自當得之某遂心念甚至鬼云已領訖須㬰復至云夫人欲與阿妳不肯又令某心念阿妳須㬰曰得矣某因㝠然如落深坑因此遂活求假還家具説其事妻云是夢夢君已死求二百千紙錢欲便市造阿妳故云夢中事何足信其夕阿妳又夢因得十年後卒也出廣異記李昕唐李昕者善持千手千眼咒有人患瘧鬼昕乃咒之其鬼見形謂人曰我本欲大困辱君為懼李十四郎不敢復往十四郎即昕也昕家在東郡客遊河南其妹染疾死數日蘇説云初被數人領入墳墓間復有數十人欲相凌辱其中一人忽云此李十四郎妹也汝輩欲何之今李十四郎已還不久至舍彼善人也如聞吾等取其妹必以神咒相困辱不如早送還之乃相與送女至舍女活後昕亦到舍也出廣異記牛騰唐牛騰字思逺唐朝散大夫郟城令棄官從好精心釋教從其志者終身常慕陶潛五栁先生之號故自稱布衣公子即侍中中書令河東侯炎之甥也侯姓裴氏未弱冠明經擢第再選右衞騎曹參軍公子沉静寡言少挺異操河東侯器其賢朝廷政事皆訪之公子清儉自守徳業過人故王勃等四人皆出其門下年壯而河東侯遇害公子謫為牂牁建安丞將行時中丞崔察用事貶官皆辭之素有嫌者或留之誅殛甚衆時天后方任酷吏而崔察先與河東侯不協陷之公子將見崔察懼不知所為忽衢中遇一人形甚瓌偉黄衣盛服乃問公子欲過中丞得無懼死乎公子驚曰然又曰公有犀角刀子乎曰有異人曰公有刀子甚善授公以神咒見中丞時但俯伏掐訣言帶犀角刀子掐手訣乃可以誦咒其訣左手中指第三節横文以大指爪掐之而宻誦咒七遍當有所見可以無患矣咒曰吉中吉迦戌律提中有律陁阿婆迦呵公子俛而誦之既得仰視異人亡矣大異之即見察同過三十餘人公子名當二十前十九人各呼名過素有郤察則留處絞斬者且半焉次至公子如其言誦咒察久不言仰視之見一神人長丈餘儀質非常出自西階直至察前右拉其肩左捩其首面正當背而諸人但見崔察低頭不言手注定字而已公子遂得脱比至屏迴顧見神人釋察而亡矣公子至牂牁素秉誠信篤敬佛道雖已婚宦如戒僧焉口不妄談目不妄視言無偽行無頗以是夷獠漸漬其化遂大布釋教於牂牁中常攝郡長吏置道場數處居三年而莊州獠反轉入牂牁郡人皆殺長吏以應之建安大豪起兵相應乃刼公子坐於樹下將加戮焉忽有夷人持刀斬守者頭乃詈曰縣丞至恵汝何忍害若人因置公子於籠中令力者負而走於是兼以拏免事解後郡以狀聞詔書還公事許其還歸後宰數邑皆計日受俸其清無以加亦天性也後棄官精内教甚有感焉出紀聞李元平唐李元平故睦州刺史伯誠之子大厯五年客於東陽寺中讀書歳餘薄暮見一女子紅裙繡襦容色美麗娥冶自若領數青衣來入僧院元平悦之而窺見青衣問其所適及姓氏青衣怒曰誰家兒郎遽此相逼俱為士𩔖不合形迹也元平拜求請見不許須臾女自出院四顧忽見元平有如舊識元平非意所望延入問其行李女曰亦欲見君以論宿昔之事請君無疑嫌也既相悦經七日女曰我非人頃者大人曾任江州刺史君前身為門吏長直君雖貧賤而容色可悦我是一小女子獨處幽房時不自思量與君戲調盖因緣之故有此私情纔過十旬君隨物故余雖不哭殆不勝情便潛以朱筆塗君左股將以為誌常持千眼千手咒每焚香發願各生富貴之家相慕願為夫婦請君驗之元平乃自視實如其言及曉將别謂元平曰託生時至不可久留後身之父見任刺史我年十六君即為縣令此時正當與君為夫婦未間幸存思戀慎勿婚也然天命已定君雖别娶故不可得悲泣而去他年果為夫婦出異物誌長沙人唐長沙人姓吳征蠻卒夫也平生以捕獵漁釣為業常得白龜羮而食之乃遍身患瘡悉皆潰爛痛苦號叫斯須不可忍眉鬢手足指皆墮落未即死遂乞於安南市中有僧見而哀之謂曰爾可回心念大悲真言吾當口授若能精進必獲善報卒依其言受之一心念誦後瘡痍漸復手足指皆生以至平愈遂削髮為僧號智益於伏波將軍舊宅基建立精舍住持泉州開元寺通慧大徳楚彤親識智益常語之出報應録乾符僧唐乾符中有僧忘其名號恆以課誦為事未嘗蹔廢因下峽泊舟白帝城夜深羣動息持念之際忽覺有腥穢之氣見水面有一人漸逼船來僧問之曰某非人也姓許名道坤唐初為䕫牧以貪殘暴虐歿受業報為灔澦堆龍王三千年於今二百四十年矣適聞師持課大有利益故來遜謝耳僧問曰峽路險惡多覆溺之患盍敕諸龍而禁戢之可乎曰此𩔖實繁皆業感所作非常力而能制也僧甚異之將復問忽失所在出報應録太平廣記卷一百十二
