body:
  text: 太平廣記卷三百三十五宋李昉等編鬼二十浚儀王氏章仇兼瓊李林甫陳希烈楊國忠李叔霽新繁縣令姚蕭品梁守威浚儀王氏浚儀王氏士人也葬其母女婿裴郎飲酒醉入冡卧棺後家人不知遂掩壙後經數日不見裴郎家誣為王氏所殺遂相訟王氏實無此舉家思慮葬日恐在壙中遂開壙得之氣息奄奄以粥灌之數日平復説云初葬之夕酒向醒無由得出舉目竊視見人無數文栢為堂宅宇甚麗王氏先亡長㓜皆集衆鬼見裴郎甚驚其間一鬼曰何不殺之妻母云小女㓜稚仰此奈何欲殺苦爭得免既見長筵美饌歌樂歡洽俄聞云喚裴郎某懼不敢起又聞羣婢連臂踏歌詞曰栢堂新成樂未央迴來廻去繞裴郎有一婢名穠華以紙燭燒其鼻凖成瘡痛不可忍遂起遍拜諸鬼等頻令裴郎歌舞飢請食妻母云鬼食不堪令取瓶中食與之如此數夜奴婢皆是明器不復有本形像出廣異記章仇兼瓊唐天寶中章仇兼瓊為劍南節度數載入朝蜀川有夜义者狀如狂人而言事多中兼瓊將行呼而問之夜义云大使若住蜀有無涯之壽若必入朝不見其吉兼瓊初甚惶懼久之曰安有是耶遂行至漢州入驛墮馬身死獨心上微煖彭州刺史李先令洛陽尉馬某送藥酒罨藥兼起居洛陽去漢州五十里奉命便行至漢州入驛到兼瓊所忽然顛倒而卒後兼瓊乃蘇云地下所由以馬尉見免馬一死便至其家家人驚異云適爾奉命還何遽也不言視天太息其妻再問儐從何在又不把笏何也馬殊不言遽揮使去因流涕言已代章仇大使死適於地下苦論地下所由並為他無如之何自念到官日淺逺客孤弱故還取别舉言悲號又謂其妻曰無苦我代其死彼亦當有深恤無憂不得還鄉但便爾倉卒死生永隔以此為恨耳言訖不見子等初猶恍然疑之尋見牀舁屍還兼瓊翌日還成都賻馬氏錢五百萬又檄州彭賻五百萬兼還四年秩禄云岀廣異記李林甫唐李林甫為相既久將以掇禍且天下人多怨頗招鬼災乃致方術士以禳去之後得一術士曰相國豪貴久矣積怨者亦多矣為禍之基非一朝一夕之故雖然庶可免者朝夕之禍也林甫曰若之何術士曰可於長安市求一善射者以備之林甫乃於西市召募之得焉自云嘗厠軍伍間以善射稱近為他病無所知林甫即資其衣食月計以給後一夕林甫㑹宴於庭燕趙翼侍度曲未終忽然中絶善射者異而聽之無聞矣乃黙籌曰夜未䦨忽如是非有他耶抑術士之言耶乃執弓矢踰垣以入伺之忽見垣之南有一物墮而下又一人踰來善射者一發中之乃驚去因至林甫長樂之地見歌者舞者噤而不能囀其喉屹而不得翻其袖寂寂然若木偶狀者因視垣南墮下之物即一囊而結者解其中有數百籖皆林甫及家僮名氏也於是以名呼一一而應遂宴飲如初其明日術士來且賀以賴此人不然幾為所禍乃負寃而死者也明公久専機要積戾萬狀自兹十稔乃非吾之所知其後林甫籍沒果期十年也出宣室志陳希烈陳希烈為相家有鬼焉或詠詩或歌呼聲甚微細激切而歴歴可聽家人問之曰汝何人而在此鬼曰吾此中戲遊遊畢當去或索衣服或求飲食得之即去不得即罵如此數朝後忽談經史鬼甚博覧家人呼希烈姪壻司直季履濟令與鬼談謂履濟曰吾因行故於此戲聞君特諭今日豁然有事當去君好住因去出紀聞楊國忠唐天寶中楊國忠權勢薰灼朝廷無比忽有一婦人詣宅請見閽人拒之婦人大呌曰我有大事要見楊公爾何阻我若見阻當令火發盡焚楊公之宅閽人懼告國忠國忠見之婦人謂國忠曰公為相國何不知否泰之道耶公位極人臣又聨國戚名動區宇亦已久矣奢縱不節徳義不修而壅塞賢路謟媚君上又亦久矣畧不能傚前朝房杜之蹤迹不以社稷為意賢與愚不能别但納賄於門者爵而禄之大才大徳之士伏於林泉曾不一顧以恩付兵柄以愛使牧民噫欲社稷安而保家族必不可也國忠大怒問婦人曰自何來何造次觸犯宰相不懼死罪耶婦人曰公自不知死罪翻以我為死罪國忠怒命左右欲斬之婦人忽不見國忠驚未已又復立於前國忠乃問曰是何妖耶婦人曰我實惜髙祖太宗之社稷被一匹夫傾覆公不解為宰相雖處輔佐之位而無輔佐之功公一死小事耳可痛者國朝自此弱幾不保其宗廟胡怒之耶我來白於公胡多事也今我却退胡有功也公胡死也民胡哭也言訖笑而岀令人逐之不見後至禄山起兵方悟胡字出記聞李叔霽唐天寶末禄山作亂趙郡李叔霽與其妻自武闗南奔襄陽妻與二子死於路叔霽遊荆楚久之禄山既據東京妻之姑寡居不能自免尚住城中辛苦甚至役使婢女各岀城採樵遙見犢走甚急有紫衣人騎馬在後車中婦人頻呼各女既近問識我否婢驚喜曰李郎何徃娘子乃爾獨行妻乃悲泣云行至襄陽叔霽及兩兒並死於賊我縁飢餒擕小兒女嫁此車後人遂與各女見姑哭畢問姊娣何在姑言近在外曰此行忽速不可復待留停半日許時民飢姑乃設食粗糲無味妻子於車中取粳米飯及他美饌呼其夫與姑餐餐畢便發臨别之際謂曰此間辛苦亦合少物相留為囊齎已前行今車中唯有一疋半絹且留充衣服深以少為恨也乾元中肅宗尅復二京其姑與子同下楊州月餘叔霽亦至相見悲泣再嘆其妻於客中因産歿故兼小兒女相次夭逝言訖又悲泣姑初慙怍為其姪女為賊所掠及見叔霽情至因説其事云所著裙即此留絹也叔霽咨嗟而已吳郡朱敖嘗於陳留賊中識一軍將自言索得叔霽婦云出廣異記新繁縣令新繁縣令妻亡召女工作凶服中有婦人婉麗殊絶縣令悦而留之甚見寵愛後數月一旦慘悴言辭頓咽令怪而問之曰本夫將至身方逺適所以悲耳令曰我在此誰如我何苐自飲食無苦也後數日求去止之不可留銀酒杯一枚為别謂令曰幸甚相思以此為念令贈羅十疋去後恒思之持銀杯不捨手每至公衙即放案上縣尉已罷職還鄉里其妻神柩尚在新繁故逺來移轉投刺謁令念待甚厚尉見銀杯數竊視之令問其故對云此是亡妻棺中物不知何得至此令嘆良久因具言始末兼論婦人形狀音㫖及留杯贈羅之事尉憤怒終日後方開棺見婦人抱羅而卧尉怒甚積薪焚之岀廣異記姚蕭品姚蕭品者杭州錢塘人其家㑹客因在酒座死經食頃乃活云初見一人來喚意是縣家所用出門看之便被捉去至北郭門有數吏在船中捉者令品牽船品云忝是緒餘未嘗引挽遂被捶擊辭不獲己力為牽之至驛亭橋已八九里所鬼不復防禦因爾疾走得脱也出廣異記梁守威唐肅宗時安史之黨方亂邢州正在賊境刺史頗有安時之志長安梁守威者以文武才辨自負自長安潛行因徃邢州欲説州牧至州西南界方夜息於路旁古墓間忽有一少年手擕一劍亦至呵問守威曰是何人守威曰我遊説之士欲入邢州説州牧令立功報君少年曰我亦遊説之士也守威喜而揖共坐草中論以世亂少年曰君見邢牧何辭以説守威曰方今天子承祧上皇又存佐國大臣足得戮力同心以盡滅醜𩔖故不假多辭邢牧其應聲而奉我敎也可謂乗勢因時也少年曰君知其一不知其二今太子𫝊位上皇猶在君以為天下有主耶有歸耶然太子至靈武六軍大臣推戴欲以為天下主其如自立不孝也徒欲使天下怒又焉得為天下主也設若太子但奉行上皇而徴兵四海力剪羣盜收復京城唯撫而輯之爵賞軍功亦行後而聞之則不期而大定也今日之大事已失卒不可平天下我未聞自負不孝之名而欲誅不忠之輩答曰欲安天下寧羣盜必待仁主得位君無説邢牧我若可説早已説之守威知少年有才略因長嘆曰我何之昔劉琨聞天下亂而喜我今遇天下亂而憂少年乃命行詣一大林及逹曙至林下見百餘人皆擐甲執兵乃少年之從者少年索酒饌同歡話而别謂守威曰我授君之一言君當聽之但回長安必可取爵禄也太子新授位自賤而貴者多矣關内亂之極也人皆思治願安君但以治平之術關内諸侯因依而進何慮不自立功耶守威拜謝而回纔行十歩已來顧之不見乃却詣林下訪之唯見壊墓甚多出瀟湘録太平廣記卷三百三十五
