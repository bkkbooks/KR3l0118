body:
  text: 太平廣記卷六十五女仙十姚氏三子趙旭虞鄉女子蕭氏乳母姚氏三子唐御史姚生罷官居于蒲之左邑有子一人外甥二人各一姓年皆及壯而頑駑不肖姚之子稍長於二生姚惜其不學日以誨責而怠遊不悛遂於條山之陽結茅以居之冀絶外事得專藝學林壑重深囂塵不到將遣之日姚誡之曰每季一試汝之所能學有不進必檟楚及汝汝其勉焉及到山中二子曾不開卷但樸斵塗塈為務居數月其長謂二人曰試期至矣汝曹都不省書吾為汝懼二子曽不介意其長攻書甚勤忽一夕子夜臨燭凭几披書之次覺所衣之裘後裾為物所牽襟領漸下亦不之異徐引而襲焉俄而復爾如是數四遂㢠廻視之見一小豚藉裘而伏色甚潔白光潤如玉因以壓書界方擊之豚聲駭而走遽呼二子秉燭索于堂中牖户甚宻周視無隙而莫知豚所往明日有蒼頭騎扣門搢笏而入謂三人曰夫人問訊昨夜小兒無知誤入君衣裾殊以為慙然君擊之過傷今則平矣君勿為慮三人俱遜詞謝之相視莫測其故少頃向來騎僮復至兼抱持所傷之兒并乳褓數人衣襦皆綺紈精麗非尋常所見復傳夫人語云小兒無恙故以相示逼而觀之自眉至鼻端如丹縷焉則界方稜所擊之迹也三子愈恐使者及乳褓皆甘言慰安之又云少頃夫人自來言訖而去三子悉欲潛去避之惶惑未决有蒼頭及紫衣宫監數十奔波而至前施屏幃茵蓆炳煥香氣殊異旋見一油壁車青牛丹轂其疾如風寳馬數百前後導從及門下車則夫人也三子趨出拜夫人㣲笑曰不意小兒至此君昨所傷亦不至甚恐為君憂故來相慰耳夫人年可三十餘風姿閒整俯仰如神亦不知何人也問三子曰有家室未三子皆以未對曰吾有三女殊姿淑德可以配三君子三子拜謝夫人因留不去為三子各創一院指顧之間畫堂延閣造次而具翌日有輜軿至焉賓從粲麗逾於戚里車服炫晃流光照地香滿山谷三女自車而下皆年十七八夫人引三女昇堂又延三子就座酒餚珍備果實豐衍非常世所有多未之識三子殊不自意夫人指三女曰各以配君三子避席拜謝復有送女數十若神仙焉是夕合巹夫人謂三子曰人之所重者生也所欲者貴也但百日不泄於人令君長生度世位極人臣三子復拜謝但以愚昧扞格為憂夫人曰君勿憂斯易耳乃敕地上主者令召孔宣父須臾孔子具冠劍而至夫人臨階宣父拜謁甚恭夫人端立㣲勞問之謂曰吾三壻欲學君其引之宣父乃命三子指六籍篇目以示之莫不了然解悟大義悉通咸若素習既而宣父謝去夫人又命周尙父示以𤣥女符玉璜秘訣三子又得之無遺復坐與言則皆文武全才學究天人之際矣三子相視自覺風度夷曠神明開爽悉將相之具矣其後姚使家僮饋糧至則大駭而走姚問其故具對以屋宇幃帳之盛人物艷麗之多姚驚謂所親曰是必山鬼所魅也促召三子三子將行夫人戒之曰慎勿泄露縱加楚撻亦勿言之三子至姚亦訝其神氣秀發占對閒雅姚曰三子驟爾皆有鬼物慿焉苦問其故不言遂鞭之數十不勝其痛具道本末姚乃幽之别所姚素館一碩儒因召而與語儒者驚曰大異大異君何用責三子乎向使三子不泄其事則必為公相貴極人臣今泄之其命也夫姚問其故而云吾見織女婺女須女星皆無光是三女星降下人間將福三子今泄天機三子免禍幸矣其夜儒者引姚視三星星無光姚乃釋三子遣之歸山至則三女邈然如不相識夫人讓之曰子不用吾言既泄天機當於此訣因以湯飯三子既飲則昏頑如舊一無所知儒謂姚曰三女星猶在人間亦不逺此地分宻謂所親言其處或云河東張嘉貞家其後將相三代矣出神仙感遇傳趙旭天水趙旭少孤介好學有姿貌善清言習黄老之道家于廣陵嘗獨葺幽居唯二奴侍側嘗夢一女子衣青衣挑笑牖間及覺而異之因祝曰是何靈異願覿仙姿幸賜神契夜半忽聞窻外切切笑聲旭知其神復祝之乃言曰吾上界仙女也聞君累德清素幸因寤寐願託清風旭驚喜整衣而起曰襄王巫山之夢洞簫秦女之契乃今知之靈鑒忽臨忻歡交集乃㢠廻燈拂席以延之忽有清香滿室有一女年可十四五容範曠代衣六銖霧綃之衣躡五色連文之履開簾而入旭載拜女笑曰吾天上青童乆居清禁幽懷阻曠位居末品時有世念帝罰我人間隨所感配以君氣質虚爽體洞𤣥默幸託清音願諧神韻旭曰蜉蝣之資假息刻漏不意高真俯垂濟度豈敢妄興俗懷女乃笑曰君宿世有道骨法應仙然已名在金格相當與吹洞簫於紅樓之上撫雲璈于碧落之中乃延坐話玉皇内景之事夜鼓乃令施寢具旭貧無可施女笑曰無煩仙郎乃命備寢内須臾霧暗食頃方收其室中施設珍竒非所知也遂擕手于内其瓌姿發越希世罕傳夜深忽聞外一女呼青夫人旭駭以問之答曰同宫女子相尋爾勿應乃扣柱歌曰月露飄颻星漢斜獨行窈窕浮雲車仙郎獨邀青童君結情羅帳連心花歌甚長旭唯記兩韻謂青童君曰可延入否答曰此女多言慮洩吾事於上界耳旭曰設琴瑟者由人調之何患乎乃起迎之見一神女在空中去地丈餘許侍女六七人建九明蟠龍之葢戴金精舞鳳之冠長裙曵風璀璨心目旭載拜邀之乃下曰吾嫦娥女也聞君與青君集㑹故捕逃耳便入室青君笑曰卿何已知吾處也答曰佳期不相告誰過耶相與笑樂旭喜悦不知所裁既同歡洽將曉侍女進曰雞鳴矣巡人案之女曰命車答曰備矣約以後期答曰慎勿言之世人吾不相棄也及出户有五雲車二乘浮於空中遂各登車訣别靈風颯然凌虛而上極目乃滅旭不自意如此喜悦交甚但灑掃焚名香絶人事以待之隔數夕復來來時皆先有清風肅然異香從之其所從仙女益多歡娛日給為旭致行厨珍膳皆不可識甘美殊常每一食經旬不饑但覺體氣冲爽旭因求長生乆視之道宻受隱訣其大抵如抱朴子内篇修行旭亦精誠感通又為旭致天樂有仙妓飛奏􅉉楹而不下謂旭曰君未列仙品不合正御故不下也其樂唯笙簫琴瑟畧同人間其餘並不能識聲韻清鏘奏訖而雲霧霏然已不見矣又為旭致珍寳竒麗之物乃曰此物不合令世人見吾以卿宿世當仙得肆所欲然仙道宻妙與世殊途君若洩之吾不得來也旭言誓重叠後嵗餘旭奴盜琉璃珠鬻於市適值胡人捧而禮之酧價百萬奴驚不伏胡人逼之而相擊官勘之奴悉陳狀旭都未知其夜女至愴然無容曰奴洩吾事當逝矣旭方知失奴而悲不自勝女曰甚知君心然事亦不合長與君往來運數然耳自此訣别努力修持當速相見也其大要以心死可以身生保精可以致神遂留仙樞龍席隱訣五篇内多隱語亦指驗於旭旭洞曉之將旦而去旭悲哽執手女曰悲自何來旭曰在心所牽耳女曰身為心牽鬼道至矣言訖竦身而上忽不見室中簾幃器具悉無矣旭恍然自失其後寤寐彷彿猶尙往來旭大歴初猶在淮泗或有人於益州見之短小美容範多在市肆商貨故時人莫能辨也仙樞五篇篇後有旭紀事詞甚詳悉出通幽記虞鄉女子唐貞元初虞鄉里人女年十餘嵗臨井治魚魚跳墮井逐之亦墮其内有老父接抱入旁空百十歩見堂宇甚妍潔明敞老姥居中坐左右極多父曰汝可拜呼阿姑留連數日珍食甘果都不欲歸姥曰翁母憶汝不可留也老父捧至井上贈金錢二枚父母見驚往接之女乃瞑目拳手疾呼索二盤及至嫌腥令以灰洗乃瀉錢各於一盤遂復舊自此不食唯飲湯茶數日嫌居處臭穢請就觀中修行嵗餘有過客避暑於院門因而熟寐忽夢金甲朱戈者叱曰仙官在此安敢衝突驚覺流汗而走後不知所之出逸史蕭氏乳母蕭氏乳母自言初生遭荒亂父母度其必不全遂將往南山盛於被中棄於石上衆迹罕及俄有遇難者數人見而憐之相率將歸土龕下以泉水浸松葉㸃其口數日益康强嵗餘能言不復食餘物但食松柏耳口鼻拂拂有毛出至五六嵗覺身輕騰空可及丈餘有少異兒或三或五引與遊戲不知所從肘腋間亦漸出綠毛近尺餘身稍能飛與異兒羣遊海上至王母宫聴天樂食靈果然每月一到所養翁母家或以名花雜藥獻之後十年賊平本父母來山中將求其餘骨葬之見其所養者具言始末涕泣累夕伺之期得一見頃之遂至坐􅉉上不肯下父望之悲泣所養者謂曰此是汝真父母何不一下來看也掉頭不答飛空而去父母囘及家憶之不已乃買果栗揭糧復往以俟其來數日又至遣所養姥招之遂自空際而下父母走前抱之號泣良乆喻以歸還曰某在此甚樂不願歸也父母以所持果飼之逡巡異兒等十數至息於􅉉樹呼曰同遊去天宫正作樂乃出將奮身復墮於地諸兒齊聲曰食俗物矣苦哉遂散父母挈之以歸嫁為人妻生子二人又屬饑儉乃為乳母出逸史太平廣記卷六十五
