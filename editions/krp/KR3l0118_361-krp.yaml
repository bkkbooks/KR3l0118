body:
  text: 太平廣記卷三百六十一宋李昉等編妖怪三崔季舒安陽王氏齊後主王恵照獨孤陁楊素滕景貞元邃劉志言素娥張易之李承嘉泰州人梁載言范季輔洛陽婦人裴休貞牛成張翰南鄭縣尉李泮元自虛崔季舒北齊崔季舒位至侍中特進忽爾其家池中蓮皆化為人面著鮮卑帽又其妻曽晝寢見一神人身長丈餘徧體黒毛前來逼已巫曰此是五道將軍入宅者不祥也又庭中忽流血有一白物大如斛自天而下當其子首未至尺餘乃滅季舒又見其家内㕔中有一大手長丈餘從地而出滿室光耀問左右皆云不見尋以非罪見誅出北史安陽王氏北齊武成時安陽縣有王家者住古城南其先累世巨富有巫師占君家財物欲出好自防守若去家即大貧其家毎夜使人分守夜有一隊人盡着黄衣乗馬從北門出一隊白衣人乗馬從西門出一隊青衣人乗馬從東園門出悉借問趙虞家此去近逺當時悉忘去後醒覺撫心懊悔不可復追所出黄白青者皆金銀錢貨良久復見一人跛脚負薪而來亦問趙虞家人忿極命奴擊之就視乃家折脚鐺也自此之後漸貧死亡都盡出廣古今五行記齊後主北齊後主武平五年如晉陽在路兵人於幕下忽唱呌訊之曰見無數人皆騎小馬如狐争揮刀矟故呌之出廣古今五行記王恵照武平末廣平都省主事王恵照息休為郡學生刻木作一小兒盛衣帶裏毎食必食之告云奴噉方自食自此後迷為魍魎著之時餉不飼則病發垂死漸不饗菜𬞞要索酒肉休兄竊取以火焚之休病轉困其家事急顧工匠刻木妙冩形狀為置靈床之處下語云燒毁我如此重刻何益嵗餘休成狂病卒出廣古今五行記獨孤陁隋獨孤陁字黎邪文帝時為延州刺史性好左道其外甥髙氏先事猫鬼已殺其舅􅀈沙羅因轉入其家帝微聞之而未信其姊為皇后與楊素妻鄭氏俱有疾召醫視之皆曰此猫鬼疾帝以陁后之異母弟陁妻乃楊素之異母妹也由是疑陁所為陰令其兄穆以情喻之上又遣左右諷陁言無有上不恱左遷陁陁遂出怨言上令左僕射髙頴納言蘇威大理楊逺皇甫孝緒雜按之而陁婢徐阿尼供言本從陁母家來常事猫鬼每以子日夜祀之言子者鼠也猫鬼每殺人被殺者家財遂潛移於畜猫鬼家帝乃以事問公卿竒章公牛𢎞曰妖由人興殺其人可以絶矣上令犢車載陁夫妻將死詣闕哀求於是免死除名以其妻楊氏為尼先是有人訴其母為猫鬼殺者上以為妖怒禁而遣之及是乃詔赦訴行猫鬼家焉陁亦未幾而卒出北史楊素大業五年尚書令楊素於東都造宅潛於宫省遣人就衞尉少卿蕭吉請擇良日入新宅吉知其不終乃以書一卷付之此書専是述死喪之事素聞而惡之乃焚於前庭素宅内造沉香堂甚精麗初成閉之三日然後擇日始開視之四壁如新血所灑流於地腥氣觸人素甚惡之竟遇鴆而死九年素長子禮部尚書楊𤣥感庭中無故有血灑地𤣥感懼遂舉兵反伏誅出廣古今五行記滕景貞滕景貞在廣州七層寺永徽中罷職歸家婢炊釡中忽有聲如雷米上芃芃隆起滕就視聲轉壯甑上生花數十長似蓮花色赤如金俄頃萎滅旬日景貞卒出酉陽雜俎元䆳永湻初同州司功元邃其母白日在堂坐忽見屏外有小人騎小馬入來人長二三尺馬亦相稱衣甲具裝光彩輝日於庭内廵牆馳走良久方滅此後每常欲自殺合家守之經年稍怠母夜卧以衣置被中自代便即走出侍者覺之分覓已投於井比及出之殆亦絶矣出廣古今五行記劉志言長安劉志言任華州下邽縣尉此廨素㓙遂於里内借宅然宅内不免有怪婢晨起理髮梳墮地婢俯取梳見床下有布袋中似有數嵗小兒婢引手取之袋内跳出婢驚懼走出舉家就視了無所見志言秩滿而卒出五行記素娥素娥者武三思之妓人也三思初得喬氏青衣窈娘能歌舞三思曉知音律以窈娘歌舞天下至藝也未幾沉於洛水遂族喬氏之家左右有舉素娥曰相州鳯陽門宋媪女善彈五弦世之殊色三思乃以帛三百叚往聘焉素娥既至三思大恱遂盛宴以出素娥公卿大夫畢集唯納言狄仁傑稱疾不來三思怒於座中有言宴罷有告仁傑者明日謁謝三思曰某昨日宿疾暴作不果應召然不覩麗人亦分也他後或有良宴敢不先期到門素娥聞之謂三思曰梁公彊毅之士非欵狎之人何必固抑其性若再宴可無請召狄梁公也三思曰儻阻我宴必族其家後數日復宴客未來梁公果先至三思特延梁公坐於内寢徐徐飲酒待諸賔客請先出素娥略觀其藝遂停杯設榻召之有頃蒼頭出曰素娥藏匿不知所在三思自入召之皆不見忽於堂奥隙中聞蘭麝芬馥乃附耳而聽即素娥語音也細於屬絲纔能認辨曰請公不召梁公今固召之不復生也三思問其由曰某非他怪乃花月之妖上帝遣來亦以多言蕩公之心將興李氏今梁公乃時之正人某固不敢見某嘗為僕妾敢無情願公勉事梁公勿萌他志不然武氏無遺種矣言迄更問亦不應也三思出見仁傑稱素娥暴疾未可出敬事之禮有加仁傑莫知其由明日三思密奏其事則天歎曰天之所授不可廢也出甘澤謠張易之張易之將敗也母韋氏號阿藏在宅坐家人報云有車馬騎從甚多至門而下疑其内官也藏出迎之無所見又野狐數擎飯甕牆頭而過未旬日而禍及垂拱之後諸州多進雌鷄化為雄雞者則天之應也出朝野僉載李承嘉唐神龍中户部尚書李承嘉不識字不解書為御史大夫兼洛州長史名判司為狗罵御史為驢威振朝廷西京造一堂新成坊人見野狐無數直入宅須臾堂舍四裂瓦木一聚判事筆管手中直裂别取筆復裂如初數日出為藤州員外司馬卒出朝野僉載泰州人太定年中泰州赤水店有鄭家莊有一兒年二十餘日晏於驛路上見一青衣女子獨行姿容殊麗問之云欲到鄭縣待二婢未來躊蹰伺候此兒屈就莊宿安置㕔中供給酒食將衣被同寢至曉門久不開呼之不應於牕中窺之惟有腦骨頭顱在餘並食訖家人破户入於梁上暗處見一大鳥衝門飛出或云是羅刹魅也出朝野僉載梁載言唐懐州刺史梁載言晝坐㕔事忽有物如蝙蝠從南飛來直入口中翕然似吞一物腹中遂絞痛數日而卒出朝野僉載范季輔鄜城尉范季輔未娶有美人崔氏宅在永平里常依之開元二十八年二月崔氏晨起下堂有物死在階下身如狗項有九頭皆如人面面狀不一有怒者喜者妍者醜者老者少者蠻者夷者皆大如拳尾甚長五色崔氏恐以告季輔問諸巫巫言焚之五道災則消矣乃於四達路積薪焚之後數日崔氏母殂又數日崔氏死又數日季輔亡出記聞洛陽婦人𤣥宗時洛陽婦人患魔魅前後術者治之不愈婦人子詣葉法善道士求為法遣善云此是天魔彼自天上負罪為帝所譴暫在人間然其譴已滿尋當自去無煩遣之也其人意是相解之詞固求祐助善云誠不惜往乃携人深入陽翟山中絶嶺有池水善於池邊行禁久之水中見一頭髻如三間屋冉冉而出至兩目晱如電光須臾雲霧四合因失所在出廣異記裴休貞金吾將軍裴休貞微時居敎業里有客過之休貞飲客其弟皆預日晚客去休貞獨卧㕔事昬後休貞醒繞牀有聲曰哥哥去娘子如此不絶休貞視呼者狀甚可畏繞之不止休貞懼跳門呼奴奴以燈來其弟亦至於是怪依燈影中狀若崑崙齒大而白長五尺休貞弟休元素多力擊之以拳應手有聲如擊鐡石怪形即滅其嵗休貞母殂出記聞牛成京城東南五十里曰孝義坊坊之西原常有怪開元二十九年牛肅之弟成因往孝義晨至西原遇村人任杲與言忽見其東五百歩有黒氣如轜車凡十餘其首者髙二三丈餘各丈餘自北徂南將至原窮又自南還北累累相從日出後行轉急或出或没日漸髙皆失杲曰此處常然蓋不足怪數月前有飛騎者番滿南歸忽見空中有物飛騎刀刺之角䭾湧出為人身長丈餘而逐飛騎飛騎走且射之中怪遂少留又來踵飛騎又射之乃止既明尋所射處地皆有血不見怪因遇疾還家數日而卒出紀聞張翰右監門衞録事參軍張翰有親故妻天寳初生子方收所生男更有一無首孩子在傍跳躍攬之則不見手去則復在左右按白澤圖曰其名曰常依圖呼名至三呼奄然已滅出紀聞南鄭縣尉南鄭縣尉孫旻為山南採訪支使嘗推覆在途舍於山館忽有美婦人面出於柱中顧旻而笑旻拜而祈之良乆方滅懼不敢言也後數年選授桑泉尉在京遇疾友人問疾旻乃言之而卒出記聞李泮咸陽縣尉李泮有甥勇而頑常對客自言不懼鬼神言甚誇誕忽所居南牆有面出焉赤色大尺餘趺鼻眑目鋒牙利口殊可増惡甥大怒拳毆之應手而滅俄又見於西壁其色白又見東壁其色青狀皆如前拳擊亦滅後黒面見於北牆貌益恐人其大則倍甥滋怒擊數拳不去㧞刀刺之乃中面乃去牆來掩甥手推之不能去黒面遂合於甥面色如漆甥仆地死及殯殮其色終不改出記聞元自虛開元中元自虚為汀州刺史至郡部衆官皆見有一人年垂八十自稱蕭老一家數口在使君宅中累世幸不占㕔堂言訖而没自後凡有吉凶蕭老必預報無不應者自虛剛正常不信之而家人每夜見怪異或見有人坐於簷上脚垂於地或見人兩兩三三空中而行或抱嬰兒問人乞食或有美人濃粧美服在月下言笑多擲磚瓦家人乃白自虚曰常聞厨後空舍是神堂前人皆以香火事之今不然故妖怪如此自虚怒殊不信忽一日蕭老謁自虚云今當逺訪親舊以數口為託言訖而去自虛以問老吏吏云常聞使宅堂後枯樹中有山魈自虛令積柴與樹齊縱火焚之聞樹中寃枉之聲不可聽月餘蕭老歸縞素哀哭曰無何逺出委妻子於賊手今四海之内孑然一身當令公知之耳乃於衣帶解一小合大如彈丸擲之於地云速去速去自虚俯拾開之見有一小虎大纔如蠅自虚欲捉之遂跳於地已長數寸跳擲不已俄成大虎走入中門其家大小百餘人盡為所斃虎亦不見自虚者亦一身而已出㑹昌解頤録太平廣記卷三百六十一
