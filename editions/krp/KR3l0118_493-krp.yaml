body:
  text: 太平廣記卷四百九十三宋李昉等編雜録一夏侯亶王肅李廷實李義琛劉龍裴𤣥智度支郎虞世南尉遲敬徳虞世基來恒歐陽詢許敬宗元萬頃郭務靜唐臨蘇瓌李嶠子婁師徳李晦宋之問陸元方陳希閔李詳夏侯亶梁夏侯亶為九列家貧而好置樂妓無衣裝飾客至即令隔簾奏曲時人以簾為夏侯妓衣出獨異志王肅後魏尚書令王肅字恭懿琅邪人肅齊雍州刺史奐之子贍學多通才辭美茂為齊秘書丞太和十八年北歸後魏時髙祖新營洛邑凡所造制肅博識舊事大有禆益髙祖甚重之常呼曰王生肅在江南之日聘謝氏女為妻及至京師復尚公主其後謝氏入道為尼亦來奔肅見肅尚主謝作五言詩以贈之其詩曰本為薄上蠶今作機上絲得絡逐勝去頗憶纏緜時公主代肅答謝云針是貫線物目中恒任絲得帛縫新去何能納故時肅甚悵恨遂造正覺寺以憩之出伽藍記李廷實後魏太傅李廷實者莊帝舅也永安中除青州刺史將行奉辭帝謂實曰懷塼之俗世號難治舅宜好用心副朝廷所委實答曰臣年迫桑榆氣同朝露人間稍逺日近松邱臣已久乞閒退陛下渭陽興念寵及老臣使夜行非人裁錦萬里謹奉明敕不敢失墮時黄門侍郎楊寛在帝側不曉懷塼之義私問舍人温子升子升曰吾聞至尊兄彭城王作青州刺史聞其賓客從至青州者云齊土之民風俗淺薄虚論髙談専在榮利太守初欲入境百姓皆懷塼叩頭以美其意及其代下還家以塼擊之言其向背速于反掌是以京師謠語曰獄中無擊囚舍内無青州假令家道惡腸中不懷愁懷塼之義起在于此也頴川茍濟風流名士髙鑒妙識獨出當世清河崔淑仁稱齊士大夫曰齊人者外矯庶幾内懷鄙恡輕同毛羽利等錐刀好馳虚譽阿附成名威勢所在促共歸之茍無所資隨即舎去言囂薄之甚也出伽藍記李義琛李義琛隴西人居于魏自咸陽主簿拜監察少孤貧唐初草創無復生業與再從弟義琰三從弟上徳同居事從姑定省如親焉武徳中俱進士共有一驢赴京次潼關大雨投逆旅主人鄙其貧辭以客多喑訥進退無所舍徙倚門旁有咸陽商客見而引之同舎多喑鳴商客曰此三人遊學者今無所止奈何覩其狼狽乃引與同寐處數日方晴道開義琛等議鬻驢以一醉商客竊知固止之仍資以道糧琛既擢第歴任咸陽召商客與之抗禮商客不復識但悚懼遜退琛語其由乃悟因引升堂後任監察出雲溪友議劉龍劉龍後名義節武徳初進計于高祖曰今義師數萬並在京師樵薪貴而布帛賤若採街衢及苑中樹木作樵以易帛歳取數十萬匹又藏内繒絹每匹皆有餘軸之饒使截剰物以供雜費動盈萬段矣高祖並從之出談賓録裴𤣥智武徳中有沙門信義習禪以三階為業于化度寺置無書藏貞觀之後捨施錢帛金玉積聚不可勝計常使此僧監當分為三分一分供養天下伽藍増修之備一分以施天下饑餒卑田之苦一分以充供養無碍士女禮懴闐咽捨施爭次不得更有連車載錢絹捨而棄去不知姓名貞觀中有裴𤣥智者戒行精勤入寺灑掃積十數年寺内徒衆以其行無玷缺使守此藏後密盜黄金前後所取略不知數寺衆莫之覺也因僧使去遂便不還驚疑所以觀其寢處題詩云放羊狼頷下置骨狗前頭自非阿羅漢安能免得偷更不知所之出辨疑志度支郎貞觀中尚藥奏求杜若敕下度支有省郎以謝朓詩云芳洲採杜若乃委坊州貢之本州曹官判云坊州不出杜若應由讀謝朓詩誤郎官作如此判事豈不畏二十八宿笑人耶太宗聞之大笑改授雍州司法出國史虞世南太宗將致櫻桃于酅公稱奉則尊言賜則卑問于虞世南世南對曰昔梁武帝遺齊巴陵王稱餉從之出國史尉遲敬徳尉遲敬徳善奪槊齊王元吉亦善用槊高祖于顯徳殿前試之謂敬徳曰聞卿善奪槊令元吉執槊去刃敬徳曰雖加刃亦不能害于是加刃頃刻之際敬徳三奪之元吉大慙出獨異志虞世基虞世南兄世基與許敬宗父善心同為宇文化及所害封徳彞時為内史舎人備見其事因謂人曰世基被戮世南匍匐以請代善心之死敬宗蹈舞以求生出談賓録來恒來恒侍中濟之弟弟兄相繼秉政時人榮之恒父䕶兒隋之猛將也時虞世南子無才術為將作大匠許敬宗聞之歎曰事之倒置乃至于斯來䕶兒兒為宰相虞世南男作木匠出唐新話歐陽詢文徳皇后喪百官縗絰率更令歐陽詢狀貌醜異衆或指之中書舎人許敬宗見而大笑為御史所劾左授洪州司馬出談賓録許敬宗太宗征遼作飛梯臨其城有應募為梯首者城中矢石如雨因競為先登英公李世勣指之謂中書舍人許敬宗此人豈不大健敬宗曰非健要是未解思量帝聞特罪之出國史纂異元萬頃元萬頃為遼東道管記作檄文譏議髙麗不知守鴨緑之險莫离支報云謹聞命矣遂移兵守之萬頃坐是流于嶺南出談賓録郭務靜滄州南皮丞郭務靜性糊塗與主簿劉思莊宿于逆旅謂莊曰從駕大難靜嘗從駕失家口三日于侍官幕下討得之莊曰公夫人在其中否靜曰若不在中更論何事又謂莊曰今大有賊昨夜二更後靜從外來有一賊忽從靜房内走出莊曰亡何物靜曰無之莊曰不亡物安知其賊靜曰但見其狼狽而走不免致疑耳出朝野僉載唐臨唐臨性寛仁多恕常欲弔喪令家僮歸取白衫僮乃誤持餘衣懼未敢進臨察之謂曰今日氣逆不宜哀泣向取白衫且止又令煮藥不精潛覺其故乃謂曰今日隂晦不宜服藥可棄之終不揚其過也出傳載蘇瓌李嶠子中宗常召宰相蘇瓌李嶠子進見二子皆僮年上迎撫于前賜與甚厚因語二兒曰爾宜憶所通書可為吾奏者言之蘇頲應之曰木從繩則正后從諫則聖嶠子亡其名亦進曰斮朝渉之脛剖賢人之心上曰蘇瓌有子李嶠無兒出松窗録婁師徳天后朝宰相婁師徳温恭謹慎未嘗與人有毫髪之隙弟授代州刺史戒曰吾甚憂汝與人相競弟曰人唾面亦自拭之而去師徳曰只此不了凡人唾汝面其人怒也拭之是逆其心何不待其自乾而其保身逺害皆𩔖于此也出獨異志又則天禁屠殺頗切吏人弊于蔬菜師徳為御史大夫因使至于陜㕑人進肉師徳曰敕禁屠殺何為有此㕑人曰豺咬殺羊師徳曰大解事豺乃食之又進鱠復問何為有此㕑人復曰豺咬殺魚師徳因大叱之智短漢何不道是獺㕑人即云是獺師徳亦為薦之出御史臺記李晦李晦為雍州長史私第有樓下臨酒肆其人常候晦言曰微賤之人雖則禮所不及然家有長幼不欲外人窺之家逼明公之樓出入非便請從此辭晦即日毁其樓出談賓録宋之問宋之問天后朝求為北門學士不許作明河篇以見其意詩云明河可望不可親願得乘槎一問津更將織女支機石還訪成都賣卜人則天見其詩謂崔融曰吾非不知之問有才調但以其有口過葢以之問患齒疾口常臭故也之問終身慙憤出本事詩陸元方陸元方為鸞臺鳯閣侍郎居相國則天將有遷除必先訪之元方密以進不露其恩人莫之知者先所奏進狀章緘於函中子弟未嘗見臨終命焚之曰吾隂徳于人多矣其後福必不衰也吾本當壽但以領選曹銓擇流品吾傷心神耳言畢而終出御史臺記陳希閔司刑司丞陳希閔以非才任官庶事凝滯司刑府史目之為高手筆言秉筆近額半日不下故名高手筆又號按孔子言竄削至多紙面穿穴故名按孔出朝野僉載李詳李詳字審已趙郡人祖機衡父頴代𫝊儒素詳有才華膽氣放蕩不羈解褐鹽亭尉詳在鹽亭因考為録事參軍所擠詳謂刺史曰録事恃糺曹之權當要害之地為其妄褒貶耳若使詳秉筆亦有其詞刺史曰公試論録事考狀遂授筆詳即書録事考曰怯斷大按好勾小稽自𨼆不清言他總濁階前兩競鬭困方休獄裏囚徒非赦不出天下以為談笑之最焉出御史臺記太平廣記卷四百九十三
