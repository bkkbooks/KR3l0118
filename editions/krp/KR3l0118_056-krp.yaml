body:
  text: 太平廣記卷五十六女仙一西王母上元夫人雲華夫人𤣥天二女西王母西王母者九靈太妙龜山金母也一號太虚九光龜臺金母元君乃西華之至妙洞陰之極尊在昔道氣凝寂湛體無為將欲啟迪𤣥功化生萬物先以東華至真之氣化而生木公木公生於碧海之上蒼靈之墟以主陽和之氣理於東方亦號曰東王公焉又以西華至妙之氣化而生金母金母生於神州伊川厥姓緱氏生而飛翔以主元毓神𤣥奥於𦕈莾之中分大道醇精之氣結氣成形與東王公共理二氣而養育天地陶鈞萬物矣柔順之本為極陰之元位配西方母養羣品天上天下三界十方女子之登仙者得道者咸所隸焉所居宮闕在龜山春山西那之都崑崙之圃閬風之苑金城千重玉樓十二瓊華之闕光碧之堂九層𤣥䑓紫翠丹房左帶瑶池右環翠水其山之下弱水九重洪濤萬丈非颷車羽輪不可到也所謂玉闕暨天緑臺承霄青琳之宇朱紫之房連琳綵帳明月四朗戴華勝佩虎章左侍仙女右侍羽童寳葢㳫映羽摻蔭庭軒砌之下植以白環之樹丹剛之林空青萬條瑶幹千尋無風而神籟自韻琅琅然皆九奏八㑹之音也神州在崑崙之東南故爾雅云西王母日下是矣又云王母蓬髪戴華勝虎齒善嘯者此乃王母之使金方白虎之神非王母之眞形也元始天王授以萬天元統龜山九光之籙使制召萬靈綂括眞聖監盟證信總諸天之羽儀天尊上聖朝宴之㑹考校之所王母皆臨訣焉上清寳經三洞玉書凡有授度咸所關預也黄帝討蚩尤之暴威所未禁而蚩尤幻化多方徵風召雨吹烟噴霧師衆大迷帝歸息太山之阿昏然憂寢王母遣使者被𤣥狐之裘以符授帝曰太一在前天一在後得之者勝戰則克矣符廣三寸長一尺青瑩如玉丹血為文佩符既畢王母乃命一婦人人首鳥身謂帝曰我九天𤣥女也授帝以三宮五意陰陽之畧太乙遁甲六壬步斗之術陰符之機靈寳五符五勝之文遂克蚩尢於中冀翦神農之後誅榆罔於阪泉天下大定都于上谷之涿鹿又數年王母遣使白虎之神乘白鹿集于帝庭授以地圗其後虞舜攝位王母遣使授舜白玉環舜即位又授益地圖遂廣黄帝之九州為十有二州王母又遣使獻舜白玉琯吹之以和八風尚書帝驗期曰王母之國在西荒之野昔茅盈字叔申王褒字子登張道陵字輔漢洎九聖七眞凡得道受書者皆朝王母於崑陵之闕焉時叔申道陵侍太上道君乘九葢之車控飛虬之軒越積石之峯濟弱流之津浮白水凌黑波顧盼倐忽詣王母於闕下子登清齋三月王母授以瓊華寳曜七辰素經茅君從西城王君詣白玉龜臺朝謁王母求長生之道曰盈以不肖之軀慕龍鳯之年欲以朝菌之脆求積朔之期王母愍其勤志吿之曰吾昔師元始天王及皇天扶桑帝君授我以玉佩金璫二景纒煉之道上行太極下造十方溉月咀日入天門名曰𤣥真之經今以授爾宜勤修焉因勅西城王君一一解釋以授焉又周穆王時命八駿與七萃之士使造父為御西登崑崙而賓於王母穆王持白珪重錦以為王母壽事具周穆王傳至漢武帝元封元年七月七日夜降於漢宮語在漢武帝傳内此不復載焉出集仙録上元夫人上元夫人道君弟子也亦𤣥古以來得道總統真籍亞於龜臺金母所降之處多使侍女相聞已為賓侣焉漢孝武皇帝好神仙之道禱醮名山以求靈應元封元年辛未七月七日夜二唱之後西王母降於漢宮帝迎拜稽首侍立久之王母呼帝令坐食以天厨筵宴麤悉命駕將去帝下席叩頭請留慇勤王母復坐乃命侍女郭密香邀夫人同宴於漢宮語在漢武帝傳中其後漢宣帝地節四年乙夘咸陽茅盈字叔申受黄金九錫之命為東岳上卿司命真君太元真人是時五帝君授册既畢各昇天而去茅君之師乃總真王君西靈王母與夫人降於句曲之山金壇之陵華陽天宮以宴茅君焉時茅君中君名固字季偉小君名𠂻字思和王母王君授以靈訣亦受錫命紫素之册固為定籙君𠂻為保命君亦侍貞㑹王君吿二君曰夫人乃三天真皇之母上元之高尊統領十方玉女之籍汝可自陳二君下席再拜求乞長生之要夫人憫其勤志命侍女宋辟非出紫錦之囊開綠金之笈以三元流珠經丹景道精經隱地八術經太極緣景經凡四部以授二君王母復勅侍女李方明出丹瓊之函披雲珠之笈出玉佩金瑞經太霄隱書經洞飛二景内書傳司命君各授書畢王母與夫人告去千乘萬騎昇還太空矣出漢武内傳雲華夫人雲華夫人王母第二十三女太真王夫人之妹也名瑶姬受徊風混合萬景鍊神飛化之道嘗東海遊還過江上有巫山焉峰巖挺㧞林壑幽麗巨石如壇留連久之時大禹理水駐山下大風卒至崖振谷隕不可制因與夫人相値拜而求助即敕侍女授禹策召鬼神之書因命其神狂章虞余黄魔大翳庚辰童律等助禹斵石疏波決塞導阨以循其流禹拜而謝焉禹嘗詣之崇巘之巔顧盼之際化而為石或倐然飛騰散為輕雲油然而止聚為夕雨或化遊龍或為翔鶴千態萬狀不可親也禹疑其狡獪怪誕非真仙也問諸童律律曰天地之本者道也運道之用者聖也聖之品次眞人仙人也其有稟氣成真不修而得道者木公金母是也葢二氣之祖宗陰陽之原本仙真之主宰造化之元光雲華夫人金母之女也昔師三元道君受上清寳經受書於紫清闕下為雲華上宮夫人主領教童真之士理在玉英之臺隱見變化葢其常也亦由凝氣成貞與道合體非寓胎稟化之形是西華少陰之氣也且氣之彌綸天地經營動植大包造化細入毫髪在人為人在物為物豈止於雲雨龍鶴飛鴻騰鳯哉禹然之後往詣焉忽見雲樓玉臺瑶宮瓊闕森然既靈官侍衛不可名識獅子抱關天馬啟塗毒龍電獸八威備軒夫人宴坐于瑶臺之上禹稽首問道召禹使坐而言曰夫聖匠肇興剖大混之一樸發為億萬之體發大藴之一苞散為無窮之物故步三光而立乎晷景封九域而制乎邦國刻漏以分晝夜寒暑以成歲紀兌離以正方位山川以分陰陽城郭以聚民器械以衞衆輿服以表貴賤禾黍以備凶歉凡此之制上稟乎星辰而取法乎神真以養有形之物也是故日月有幽明生殺有寒暑雷震有出入之期風雨有動靜之常清氣浮乎上而濁衆散於下廢興之數治亂之運賢愚之質善惡之性剛柔之氣夀夭之命貴賤之位尊卑之叙吉凶之感窮達之期此皆稟之於道懸之於天而聖人為紀也性發乎天而命成乎人立之者天行之者道道存則有道去則無道非物不可存也非修不可致也𤣥老有言致虚極守靜篤萬物將自復復謂歸於道而常存也道之用也變化萬端而不足其一是故天參𤣥𤣥地參混黄人參道徳去此之外非道也哉長久之要者天保其𤣥地守其物人養其氣所以全也則我命在我非天地殺之鬼神害之失道而自逝也至乎哉勤乎哉子之功及於物矣勤逮於民矣善格乎天矣而未聞至道之要也吾昔於紫清之闕受書寳而勤之我師三元道君曰上真内經天真所寳封之金臺佩入太㣲則雲輪上往神武抱關振衣瑶房遨宴希林左招仙公右棲白山而下眄太空汎乎天津則乘雲騁龍遊此名山則真人詣房萬人奉衞山精伺迎動有八景玉輪靜則宴處金堂亦謂之太上玉佩金璫之妙文也汝將欲越巨海而無颷輪渡飛砂而無雲軒陟阨塗而無所轝涉泥波而無所乘陸則困於逺絶水則懼於漂淪將欲以導百谷而濬萬川也危乎悠哉太上愍汝之至亦將授以靈寳真文陸䇿虎豹水制蛟龍斷馘千邪檢馭羣凶以成汝之功也其在乎陽明之天也吾所授寳書亦可以出入水火嘯叱幽㝠收束虎豹呼召六丁隱淪八地顛倒五星久視存身與天相傾也因命侍女陵容華出丹玉之笈開上清寳文以授禹拜受而去又得庚辰虞余之助遂能導波決川以成其功奠五岳别九州而天錫𤣥珪以為紫庭真人其後楚大夫宋玉以其事言於襄王王不能訪道要以求長生築臺於高唐之館作陽臺之宮以祀之宋玉作神仙賦以寓情荒淫穢蕪高真上仙豈可誣而降之也有祠在山下世謂之大仙隔岸有神女之石即所化也復有石天尊神女壇側有竹垂之若篲有槁葉飛物着壇上者竹則因風掃之終瑩潔不為所汚楚人世祀焉出集仙録𤣥天二女燕昭王即位二年廣延國來獻善舞者二人一名旋娟一名提謨並玉質凝膚體輕氣馥綽約而窈窕絶古無倫或行無影跡或積年不饑昭王處以單綃華幄飲以瓀珉之膏飴以丹泉之粟王登崇霞臺乃召二人來側時香風歘起徘徊翔舞殆不自支王以纓縷拂之二人皆舞容冶妖麗靡於翔鸞而歌聲輕颺乃使女伶代唱其曲清響流韻雖飄梁動塵未足加焉其舞一名縈塵言其體輕與塵相亂次曰集羽言其婉轉若羽毛之從風也末曰旋懷言其支體緬曼若入懷袖也乃設麟文之席散荃蕪之香香出波弋國浸地則土石皆香着朽木腐草莫不蔚茂以薰枯骨則肌肉皆生以屑鋪地厚四五寸使二人舞其上彌日無跡體輕故也時有白鸞孤翔衘千莖穟穟於空中自生花實落地即生根葉一歲百獲一莖滿車故曰盈車嘉穟麟文者錯雜衆寳以為席也皆為雲霞麟鳳之狀昭王復以衣袖麾之舞者皆止昭王知為神異處於崇霞之臺設枕席以寢讌遣人以衞之王好神仙之術故𤣥天之女託形作二人昭王之末莫知所在或遊於江漢或在伊洛之濱遍行天下乍近乍逺也出王子年拾遺記太平廣記卷五十六
