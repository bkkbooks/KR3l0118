body:
  text: 太平廣記卷二百九十三神三度朔君蔣子文葛祚虞道施顧邵陳氏女王表石人神聖姑陳敏費長房胡毋班張誠之度朔君袁紹在冀州有神出河東號度朔君百姓爲立廟廟有主簿大福陳留蔡庸爲清河太守過謁廟有子名道亡已三十年度朔君爲庸設酒曰貴子昔來欲相見須臾子來度朔君自云父祖昔作兖州有人士母病往禱主簿云君逢天士留待聞西北有鼓聲而君至須臾一客來著皂單衣頭上五色毛長數寸去復一人著白布單衣高冠冠似魚頭謂君曰吾昔臨廬山食白李憶之未久已三千歲日月易得使人悵然君謂士曰先來南海君也士是書生君明通五經善禮記與士論禮士不如也士乞救母病君曰卿所居東有故橋人壊之此橋所行卿母犯之能復橋便差曹公討袁譚使人從廟換千匹絹君不與曹公遣張郃毁廟未至百里君遣兵數萬方道而來郃未達二里雲霧繞郃軍不知廟處君語主簿曹公氣盛宜避之後蘇幷鄰家有神下識君聲云昔移入胡濶絶三年乃遣人與曹公相聞欲脩故廟地衰不中居欲寄住公曰甚善治城北樓以居之數日曹公獵得物大如麑大足色白如雪毛軟滑可愛公以摩靣莫能名也夜聞樓上哭云小兒出行不還太祖拊掌曰此子言眞衰也晨將數百犬繞樓下犬得氣衰突内外見有物大如驢自投樓下犬殺之廟神乃絶出搜神記蔣子文蔣子文廣陵人也嗜酒好色挑撻無度常自謂青骨死當爲神漢末爲秣陵尉逐賊至鍾山下賊擊傷額因解綬縳之有頃遂死及吳先主之初其故吏見文於道乘白馬執白羽侍從如平生見者驚走文追之謂曰我當爲此土地神以福爾下民爾可宣告百姓爲我立祠不爾將有大咎是歲夏大疫百姓輒相恐動頗有竊祀之者矣文又下巫祝吾將大啓祐孫氏宜爲吾立祠不爾將使蟲入人耳爲災俄而有小蟲如鹿䖟入耳皆死醫不能治百姓愈恐孫主未之信也又下巫祝若不祀我將又以大火爲災是歲火災大發一日數十處火及公宫孫主患之議者以爲鬼有所歸乃不爲厲宜有以撫之於是使使者封子文爲中都侯次弟子緒爲長水校尉皆加印綬爲廟堂轉號鍾山爲蔣山今建康東北蔣山是也自是災厲止息百姓遂大事之陳郡謝玉爲琅邪内史在京城其年虎暴殺人甚衆有一人以小船載年少婦以大刀揷著船浹暮來至邏將出語云此間頃來甚多草穢君載細小作此輕行大爲不易可止邏宿也相問訊既畢邏將適還去其婦上岸便爲虎取去其夫拔刀大喚欲逐之先奉事蔣侯乃喚求助如此當行十里忽覺如有一黒衣人爲之導其人隨之當復二十里見大樹既至一穴虎子聞行聲謂其母至皆走出其人即其所殺之便挾刀隱樹住良久虎方至便下婦著地倒牽入穴其人以刀當腰斫斷之虎既死其婦故活向曉能語問之云虎初取便負著背上臨至而後下之四體無他止爲草木傷耳扶歸還船明夜夢一人語之云蔣侯使助汝知否至家殺猪祀焉㑹稽鄮縣東野有女子姓吳字望子年十六姿容可愛其鄉里有鼔舞解神者要之便往緣塘行半路忽見一貴人端正非常貴人乘船手力十餘整頓令人問望子欲何之具以事對貴人云我今正往彼便可入船共去望子辭不敢忽然不見望子既拜神坐見向船中貴人儼然端坐即蔣侯像也問望子來何遲因擲兩橘與之數數形見遂隆情好心有所欲輒空中下之嘗思噉鱠一雙鮮鯉隨心而至望子芳香流聞數里頗有神驗一邑共事奉經三年望子忽生外意神便絶往來咸寧中太常卿韓伯子某㑹稽内史王藴子某光禄大夫劉耽子某同遊蔣山廟廟有數婦人像甚端正某等醉各指像以戲相配匹即以其夕三人同夢蔣侯遣傳教相聞曰家子女並醜陋而猥垂榮顧輒尅某日悉相奉迎某等以其夢指適異常試往相問而果各得此夢符協如一於是大懼備三牲詣廟謝罪乞哀又俱夢蔣侯親來降巳曰君等既已顧之實貪會對尅期垂及豈容方更中悔經少時並亡劉赤父者夢蔣侯召爲主簿期日促乃往廟陳請母老子弱情事過切乞蒙放恕㑹稽魏過多材藝善事神請舉過自代因叩頭流血廟祝曰特願相屈魏過何人而有斯舉赤父固請終不許尋而赤父死焉孫恩作逆時吳興紛亂一男子怱急突入蔣侯祠始入門木像彎弓射之即卒行人及守廟者無不皆見也中書郎王長豫有美名父丞相導至所珍愛遇病轉篤導憂念特至正在北牀上坐不食已積日忽見一人行狀甚壮著鎧持刀王問君是何人答曰僕是蔣侯也公兒不佳欲爲請命故來耳勿復憂王欣喜動容即求食食遂至數斗内外咸未達所以食畢忽復慘然謂王曰中書命盡非可救者言終不見也出搜神記幽明錄志怪等書葛祚葛祚吳時衡陽太守郡境有大槎横水能爲妖怪百姓爲立廟行旅禱祀槎乃沈沒不者槎浮則船爲之破壞祚將去官乃大具斤斧將去民累明日當至其夜聞江中哅哅有人聲往視槎移去沿流下數里駐灣中自此行者無復沈覆之患衡陽人爲祚立碑曰正徳祈禳神木爲移也出幽明怪錄虞道施虞道施乘車出行忽有一人著烏衣逕來上車云令寄載十許里耳道施試視此人頭上有光口皆赤而悉是毛異於始時既不敢遣行十里中如言而去臨别語道施曰我是驅除大將軍感汝相容贈銀鐸一雙而滅出異苑顧邵顧邵爲豫章崇學校禁淫祀風化大行厯毁諸廟至廬山廟一郡悉諫不從夜忽聞有排大門聲怪之忽有一人開閣逕前狀若方相自説是廬君邵獨對之要進上牀鬼即人坐邵善左傳鬼遂與邵談春秋彌夜不能相屈邵歎其精辯謂曰傳載晉景公所夢大厲者古今同有是物也鬼笑曰今大則有之厲則不然燈火盡邵不命取乃隨燒左傳以續之鬼頻請退邵輒留之鬼本欲凌邵邵神氣湛然不可得乘鬼反和遜求復廟言㫖懇至邵笑而不答鬼發怒而退顧謂邵曰今夕不能讐君三年之内君必衰矣當因此時相報邵曰何事悤悤且復留談論鬼乃隱而不見視門閣悉閉如故如期邵果篤疾恒夢見此鬼來擊之並勸邵復廟邵曰邪豈勝正終不聽後遂卒出志怪陳氏女烏傷陳氏有女著屐上大楓樹顚了無危懼顧曰我應爲神今便長去唯左蒼右黃當暫歸耳家人悉出見之拳手辭訣於是飄聳輕越極睇乃沒人不了蒼黃之意每春輒以蒼狗秋黃犬設祀樹下也出異苑王表臨海羅陽縣有神自稱王表語言飲食與人無異然不見其形又一婢名紡績是月遣中書郎李崇齎輔國將軍羅陽王印綬迎表表隨崇俱出所厯山川輒遣婢與其神相聞表至權於蒼龍門外爲立第舍表説水旱小事往往有騐出吳志石人神石人神在豐城縣南其石狀似人形先在羅山下水中流潦不沒後有人於水邊浣衣掛著左臂天忽大雨雷電霹靂石人臂折走入山畔時人異之共立爲祠每有靈驗號曰石人神出豫章古今記聖姑吳興郡界首有洞庭山山中聖姑祠廟在焉吳志曰姑姓李氏有道術能履水行其夫怒而殺之自死至今向七百歲而顔貌如生儼然側卧逺近祈禱者心至則能到廟心若不至風廻其船無得達者今每月一日沐浴爲除爪甲每日妝飾之其形質柔弱只如寢者葢得道歟出紀聞陳敏陳敏孫皓之世爲江夏太守自建業述職聞宫亭廟神靈枉帆過之乞在任安穩當上銀杖一枝限既滿作杖揷竹爲幹以銀度之尋徵爲散騎常侍還到江口後宫亭送杖訖即進路日晚降神巫宣教曰陳敏許我銀杖今以度銀杖見與使投水中當送以還之欺蔑之罪不可容也乃置杖浮水上從流而北其疾如飛逕到敏船前徘徊不去敏懼取之遣小吏到廟遜謝小吏既發驚風卒至湧浪滔天敏舟傾唯小吏四人獨在出神鬼傳費長房費長房能使鬼神後東海君見葛陂君淫其夫人於是長房敕繫三年而東海大旱長房至東海見其請雨乃敕葛陂君出之即大雨也出列異傳胡母班胡母班曾至太山之側忽於樹間逢一絳衣騶呼班云太山府君召母班驚愕逡巡未答復有一騶出呼之遂隨行數十步騶請母班暫瞑少頃便見宫室威儀甚嚴母班乃入閣拜謁主爲設食語母班曰欲見君無他欲附書與女壻耳母班問女郎何在曰女爲河伯婦母班曰輒當奉書不知何緣得達答曰今適河中流便扣舟呼青衣當自有取書者母班乃辭出昔騶復令閉目有頃忽如故道遂西行如神言而呼青衣須臾果有一女僕出取書而没少頃復出云河伯欲暫見君婢亦請瞑目遂拜謁河伯河伯乃大設酒食詞㫖慇懃臨别謂母班曰感君遠爲致書無物相奉於是命左右取吾青絲履來以貽母班母班出瞑然忽得還舟遂於長安經年而還至太山側不敢潛過遂扣樹自稱姓名從長安還欲啓消息須臾昔騶出引母班如向法而進因致書焉府君請曰當别遣報母班語訖如厠忽見其父著械徒作此輩數百人母班進拜流涕問大人何因及此父云吾死不幸見譴三年今已二年矣困苦不可處知汝今爲明府所識可爲吾陳之乞免此役便欲得社公耳母班乃依教叩頭陳乞府君曰死生異路不可相近身無所惜母班苦請方許之於是辭出還家歲餘兒子死亡略盡母班惶懼復詣太山扣樹求見昔騶遂迎之而見母班乃自説昔辭曠拙及還家兒死亡至盡今恐禍故未巳輒來啓白幸蒙哀救府君拊掌大笑曰昔語君生死異路不可相近故也即敕外召母班父須臾至庭中問之昔求還里社當爲門户作福而孫息死亡至盡何也答云久别鄉里自忻得還又遇酒食充足實念諸孫召而食之耳於是代之父涕泣而出母班遂還後有兒皆無恙出搜神記張誠之吳縣張誠之夜見一婦人立於宅東南角舉手招誠誠就之婦人曰此地是君家蠶室我即是地之神明年正月半宜作白粥泛膏於上以祭我當令君蠶桑百倍言絶失之誠如言爲作膏粥自此年年大得蠶世人正月半作膏粥由此故也出續齊諧記太平廣記卷二百九十三
