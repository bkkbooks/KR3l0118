body:
  text: 太平廣記卷八神仙八劉安隂長生張道陵劉安漢淮南王劉安者漢髙帝之孫也其父厲王長得罪徙蜀道死文帝哀之而裂其地盡以封長子故安得封淮南王時諸王子貴侈莫不以聲色游獵犬馬為事唯安獨折節下士篤好儒學兼占候方術飬士數千人皆天下俊士作内書二十二篇又中篇八章言神仙黄白之事名為鴻寳萬畢三卷論變化之道凡十萬言武帝以安辯博有才屬為諸父甚重尊之特詔及報書常使司馬相如等共定草乃遣使召安入朝嘗詔使為離騷經旦受詔食時便成奏之安每宴見談説得失及獻諸賦頌晨入夜出乃天下道書及方術之士不逺千里卑辭重幣請致之於是乃有八公詣門皆鬚眉皓白門吏先宻以白王王使閽人自以意難問之曰我王上欲求延年長生不老之道中欲得博物精義入妙之大儒下欲得勇敢武力扛鼎暴虎横行之壯士今先生年已耆矣似無駐衰之術又無賁育之氣豈能究於三墳五典八索九丘鈎深致逺窮理盡性乎三者既乏餘不敢通八公笑曰吾聞王尊禮賢士吐握不倦茍有一介之善莫不畢至古人貴九九之學飬鳴吠之技誠欲市馬骨以致騏驥師郭生以招羣英吾年雖鄙陋不合所求故逺致其身且欲一見王雖使無益亦豈有損何以年老而逆見嫌耶王必若見年少則謂之有道皓首則謂之庸叟恐非發石採玉探淵索珠之謂也薄吾老今則少矣言未竟八公皆變為童子年可十四五角髻青絲色如桃花門吏大驚走以白王王聞之足不履跣而迎登思仙之臺張錦帳象牀燒百和之香進金玉之几執弟子之禮北面叩首而言曰安以凡才少好道徳羇鏁世務沉淪流俗不能遣累負笈山林然夙夜饑渇思願神明沐浴滓濁精誠淺薄懐情不暢邈若雲漢不期厚幸道君降屈是安禄命當蒙拔擢喜懼屏營不知所措唯願道君哀而教之則螟蛉假翼於鴻鵠可沖天矣八童子乃復為老人告王曰余雖復淺識具備仙學聞王好道故來相從未審王意有何所欲吾一人能坐致風雨立起雲霧畫地為江河撮土為山嶽一人能崩高山塞深泉收束虎豹召致蛟龍使役鬼神一人能分形易貌坐存立亡隐蔽六軍白日為暝一人能乗雲歩虚越海凌波出入無間呼吸千里一人能入火不灼入水不濡刃射不中冬凍不寒夏曝不汗一人能千變萬化恣意所為禽獸草木萬物立成移山駐景行宫易室一人能防災度厄辟却衆害延年益夀長生乆視一人能煎泥成金凝鉛為銀水錬八石飛騰流珠乗雲駕龍浮於太清之上在王所欲安乃日夕朝拜供進酒脯各試其向所言千變萬化種種異術無有不效遂授玉丹經三十六卷藥成未及服而太子遷好劒自以人莫及也于時郎中雷被召與之戲而被誤中遷遷大怒被怖恐為遷所殺乃求擊匈奴以贖罪安聞不聽被大懼乃上書於天子云漢法諸侯壅閼不與擊匈奴其罪入死安合當誅武帝素重王不咎但削安二縣耳安怒被被恐死與伍被素為交親伍被曽以奸私得罪於安安怒之未發二人恐為安所誅乃共誣告稱安謀反天子使宗正持節治之八公謂安曰可以去矣此乃是天之發遣王王若無此事日復一日未能去世也八公使安登山大祭埋金地中即白日昇天八公與安所踏山上石皆陷成跡至今人馬跡猶存八公告安曰夫有藉之人被人誣告者其誣人當即死滅伍被等今當伏誅矣於是宗正以失安所在推問云王仙去矣天子悵然乃諷使廷尉張湯奏伍被云為畫計乃誅二被九族一如八公之言也漢史袐之不言安得神仙之道恐後世人主當廢萬幾而競求于安道乃言安得罪後自殺非得仙也按左吳記云安臨去欲誅二被八公諌曰不可仙去不欲害行蟲况於人乎安乃止又問八公曰可得將素所交親俱至彼使遣還否公曰何不得爾但不得過五人安即以左吳王眷傅生等五人至𤣥洲便遣還吳記具説云安未得上天遇諸仙伯安少習尊貴稀為卑下之禮坐起不恭語聲髙亮或誤稱寡人於是仙伯主者奏安云不敬應斥遣去八公為之謝過乃見赦謫守都厠三年後為散仙人不得處職但得不死而已武帝聞左吳等随王仙去更還乃詔之親問其由吳具以對帝大懊恨乃嘆曰使朕得為淮南王者視天下如脱屣耳遂便招募賢士亦冀遇八公不能得而為公孫卿欒大等所欺意猶不已庶獲其真者以安仙去分明方知天下實有神仙也時人傳八公安臨去時餘藥器置在中庭雞犬舐啄之盡得昇天故雞鳴天上犬吠雲中也出神仙傳隂長生隂長生者新野人也漢皇后之親屬少生富貴之門而不好榮貴唯専務道術聞馬鳴生得度世之道乃尋求之遂得相見便執奴僕之役親運履之勞鳴生不教以度世之法但日夕别與之髙談論當世之事治農田之業如此十餘年長生不懈同時共事鳴生者十二人皆悉歸去唯長生執禮彌肅鳴生告之曰子真能得道矣乃將入青城山中煮黄土為金以示之立壇西面乃以太清神丹經授之鳴生别去長生乃歸合之丹成服半劑不盡即昇天乃大作黄金十數萬斤以布恵天下貧乏不問識與不識者周行天下與妻子相随一門皆夀而不老在民間三百餘年後於平都山東白日昇天而去著書九篇云上古仙者多矣不可盡論但漢興以來得仙者四十五人連余為六矣二十人尸解餘並白日昇天抱朴子曰洪聞諺書有之曰子不夜行則安知道上有夜行人今不得仙者亦安知天下山林間不有學道得仙者隂君已服神藥未盡昇天然方以𩔖聚同聲相應便自與仙人相集㝷索聞見故知此近世諸仙人數耳而俗民謂為不然以巳所不聞則謂無有不亦悲哉夫草澤間士以𨼆逸得志以經籍自娱不耀文采不揚聲名不修求進不營聞逹人猶不能識之况仙人亦何急急令聞逹朝闕之徒知其所云為哉隂君自叙云漢延光元年新野山北予受仙君神丹要訣道成去世付之名山如有得者列為真人行乎去来何為俗聞不死之要道在神丹行氣導引俛仰屈伸服食草木可得延年不能度世以至乎仙子欲聞道此是要言積學所致無為合神上士為之勉力加勤下愚大笑以為不然能知神丹乆視長安於是隂君裂黄素冩丹經一通封以文石之函置嵩髙山一通黄櫨之簡漆書之封以青玉之函置太華山一通黄金之簡刻而書之封以白銀之函置蜀綏山一封縑書合為十篇付弟子使世世當有所傳付又著詩三篇以示將来其一曰惟余之先佐命唐虞爰逮漢世紫艾重紆我獨好道而為匹夫髙尚素志不事王侯貪生得生亦又何求超跡蒼霄乗龍駕浮清風承翼與我為儔入火不灼蹈波不濡逍遥太極何慮何憂遨戲仙都顧愍羣愚年命之逝如彼川流奄忽未㡬泥土為儔奔馳索死不肯暫休其二章曰余之聖師體道之真升降變化喬松為隣唯余同學十有二人寒苦求道歴二十年中多怠堕志行不堅痛乎諸子命也自天天不妄授道必歸賢身没幽壤何時可還嗟爾將來勤加精研勿為流俗富貴所牽神道一成升彼九天夀同三光何但億千其三章曰惟余束髪少好道徳棄家随師東西南北委放五濁避世自匿三十餘年名山之側寒不遑衣饑不暇食思不敢歸勞不敢息奉事聖師承歡悦色面垢足胝乃見誠實遂受要訣恩深不測妻子延年咸享無極黄白已成貨財千億使役鬼神玉女侍側今得度世神丹之力隂君處民間百七十年色如女子白日昇天而去出神仙傳張道陵張道陵者沛國人也本太學書生博通五經晚乃自歎曰此無益於年命遂學長生之道得黄帝九鼎丹法欲合之用藥皆糜費錢帛陵家素貧欲治生營田牧畜非已所長乃不就聞蜀人多純厚易以教化且多名山乃與弟子入蜀住鵠鳴山著作道書二十四篇乃精思鍊志忽有天人下千乗萬騎金車羽盖驂龍駕虎不可勝數或自稱柱下史或稱東海小童乃授陵以新出正一明威之道陵受之能治病於是百姓翕然奉事之以為師弟子戸至數萬即立祭酒分領其戸有如官長并立條制使諸弟子随事輪出米絹器物紙筆樵薪什物等領人修復道路不修復者皆使疾病縣有應治橋道於是百姓斬草除溷無所不為皆出其意而愚者不知是陵所造將為此文從天上下也陵又欲以亷恥治人不喜施刑罰乃立條制使有疾病者皆疏記生身以來所犯之辠乃手書投水中與神明共盟約不得復犯法當以身死為約於是百姓計念邂逅疾病輒當首過一則得愈二使羞慙不敢重犯且畏天地而改從此之後所違犯者皆改為善矣陵乃多得財物以市其藥合丹丹成服半劑不願即昇天也乃能分形作數十人其所居門前水池陵常乗舟戲其中而諸道士賔客往来盈庭盖座上常有一陵與賔客對談共食飲而真陵故在池中也其治病事皆採取𤣥素但改易其大較轉其首尾而大途猶同歸也行氣服食故用仙法亦無以易故陵語諸人曰爾軰多俗態未除不能棄世正可得吾行氣導引房中之事或可得服食草木數百嵗之方耳其有九鼎大要唯付王長而後合有一人從東方来當得之此人必以正月七日日中到具説長短形狀至時果有趙昇者從東方来生平原相見其形貌一如陵所説陵乃七度試昇皆過乃授昇丹經七試者第一試昇到門不為通使入罵辱四十餘日露宿不去乃納之第二試使昇於草中守黍驅獸暮遣美女非常託言逺行過寄宿與昇接牀明日又稱脚痛不去遂留數日亦復調戲昇終不失正第三試昇行道忽見遺金三十餘餅昇乃走過不取第四令昇入山採薪三虎交前咬昇衣服唯不傷身昇不恐顔色不變謂虎曰我道士耳少年不為非故不逺千里来事神師求長生之道汝何以爾也豈非山鬼使汝来試我乎須臾虎乃起去第五試昇於市買十餘匹絹付直訖而絹主誣之云未得昇乃脱已衣買絹而償之殊無恡色第六試昇守田穀有一人往叩頭乞食衣裳破弊面目塵垢身體瘡膿臭穢可憎昇愴然為之動容觧衣衣之以私糧設食又以私米遺之第七試陵將諸弟子登雲臺絶巖之上下有一桃𣗳如人臂傍生石壁下臨不測之淵桃大有實陵謂諸弟子曰有人能得此桃實當告以道要于時伏而窺之者三百餘人股戰流汗無敢乆臨視之者莫不却退而還謝不能得昇一人乃曰神之所䕶何險之有聖師在此終不使吾死於谷中耳師有教者必是此桃有可得之理故耳乃從上自擲投𣗳上足不磋跌取桃實滿懐而石壁險峻無所攀縁不能得返於是乃以桃一一擲上正得二百二顆陵得而分賜諸弟子各一陵自食留一以待昇陵乃以手引昇衆視之見陵臂加長三二丈引昇昇忽然来還乃以向所留桃與之昇食桃畢陵乃臨谷上戲笑而言曰趙昇心自正能投𣗳上足不蹉跌吾今欲自試投下當應得大桃也衆人皆諫唯昇與王長嘿然陵遂投空不落桃上失陵所在四方皆仰上則連天下則無底往無道路莫不驚歎悲涕唯昇長二人良乆乃相謂曰師則父也自投於不測之崖吾何以自安乃俱投身而下正堕陵前見陵坐局脚牀斗帳中見昇長二人笑曰吾知汝来乃授二人道畢三日乃還歸治舊舎諸弟子驚悲不息後陵與昇長三人皆白日昇天而去衆弟子仰視之乆而乃没於雲霄也初陵入蜀山合丹半劑雖未冲舉已成地仙故欲化作七試以度趙昇乃如其志也出神仙傳太平廣記卷八
