body:
  text: 太平廣記卷九十二異僧六𤣥奘萬迴一行無畏明達師惠照𤣥奘沙門𤣥奘俗姓陳偃師縣人也幼聰慧有操行唐武徳初往西域取經行至罽賔國道險虎豹不可過奘不知為計乃鏁房門而坐至夕開門見一老僧頭面瘡痍身體膿血牀上獨坐莫知來由奘乃禮拜勤求僧口授多心經一卷令奘誦之遂得山川平易道路開闢虎豹藏形魔鬼潛跡遂至佛國取經六百餘部而歸其多心經至今誦之初奘將往西域於靈巖寺見有松一樹奘立於庭以手摩其枝曰吾西去求佛敎汝可西長若吾歸即却東迴使吾弟子知之及去其枝年年西指約長數丈一年忽東迴門人弟子曰敎主歸矣乃西迎之奘果還至今衆謂此松為摩頂松出獨異志及唐新語萬迴萬迴師閿鄉人也俗姓張氏初母祈於觀音像而因娠迴迴生而愚八九嵗乃能語父母亦以豚犬畜之年長父令耕田迴耕田直去不顧口但連稱平等因耕一壟耕數十里遇溝坑乃止其父怒而擊之迴曰彼此總耕何須異相乃止擊而罷耕迴兄戍役于安西音問隔絶父母謂其死矣日夕涕泣而憂思焉迴顧父母感念之甚忽跪而言曰涕泣豈非憂兄耶父母且疑且信曰然迴曰詳思我兄所要者衣裘糗糧巾履之屬請悉備焉某將往之忽一日朝齎所備而往夕返其家告父母曰兄平善矣視之乃兄迹也一家異之𢎞農抵安西葢萬餘里以其萬里迴故號曰萬迴也先是𤣥奘法師向佛國取經見佛龕題柱曰菩薩萬迴謫向閿鄉地敎化奘師馳驛至閿鄉縣問此有萬迴師無令呼之萬迴至奘師禮之施三衣瓶鉢而去後則天追入内語事多驗時張易之大起第宅萬迴常指曰將作人莫之悟及易之伏誅以其宅為將作監常謂韋庶人及安樂公主曰三郎斫汝頭韋庶人以中宗第三恐帝生變遂鴆之不悟為𤣥宗所誅也又睿宗在藩邸時或遊行人間萬迴於聚落街衢中髙聲曰天子來或曰聖人來其處信宿間睿宗必經過徘徊也惠莊太子即睿宗第二子也初則天曾以示萬迴萬迴曰此兒是西域大樹精養之宜兄弟後生申王儀形瓌偉善於飲啖景龍中時時出入士庶貴賤競來禮拜萬迴披錦袍或笑罵或擊鼓然後隨事為驗太平公主為造宅於已宅之右景雲中卒于此宅臨終大呼遣求本鄉河水弟子徒侶覓無萬迴曰堂前是河水衆于堦下掘井忽河水湧出飲竟而終此坊井水至今甘美出談賔録及兩京記一行僧一行姓張氏鉅鹿人本名遂唐𤣥宗既召見謂曰卿何能對曰唯善記覽𤣥宗因詔掖庭取宮人籍以示之周覽既畢覆其本記念精熟如素所習讀數幅之後𤣥宗不覺降御榻為之作禮呼為聖人先是一行既從釋氏師事普寂于嵩山師嘗設食于寺大㑹羣僧及沙門居數百里者皆如期而至且聚千餘人時有盧鴻者道髙學富隱于嵩山因請鴻為文讚歎其㑹至日鴻持其文至寺其師授之致于几案上鐘梵既作鴻請普寂曰某為文數千言況其字僻而言怪盍于羣僧中選其聰悟者鴻當親為傳授乃令召一行既至伸紙微笑止于一覽復致于几上鴻輕其疎脫而竊怪之俄而羣僧㑹于堂一行攘袂而進抗音興裁一無遺忘鴻驚愕乆之謂寂曰非君所能敎導也當縱其遊學一行因窮大衍自此訪求師資不逺數千里嘗至天台國清寺見一院古松數十歩門有流水一行立于門屏間聞院中僧于庭布算其聲􅉡􅉡既而謂其徒曰今日當有弟子求吾算法已合到門豈無人導達耶即除一算又謂曰門前水合却西流弟子當至一行承言而入稽首請法盡授其術焉而門水舊東流忽改為西流矣邢和璞嘗謂尹愔曰一行其聖人乎漢之洛下閎造大衍厯云後八百歲當差一日則有聖人定之今年期畢矣而一行造大衍厯正在差謬則洛下閎之言信矣一行又嘗詣道士尹崇借揚雄太𤣥經數日復詣崇還其書崇曰此書意旨深逺吾尋之積年尚不能曉吾子試更研求何遽見還也一行曰究其義矣因出所撰大衍𤣥圖及義訣一卷以示崇崇大嗟伏謂人曰此後生顔子也初一行幼時家貧鄰有王姥前後濟之約數十萬一行常思報之至開元中一行承𤣥宗敬遇言無不可未幾㑹王姥兒犯殺人獄未具姥詣一行求救一行曰姥要金帛當十倍酬也君上執法難以情求如何王姥㦸手大罵曰何用識此僧一行從而謝之終不顧一行心計渾天寺中工役數百乃命空其室内徙一大甕于中央密選常住奴二人授以布嚢謂曰某坊某角有廢園汝向中潛伺從午至昏當有物入來其數七者可盡掩之失一則杖汝如言而往至酉後果有羣豕至悉獲而歸一行大喜令寘甕中覆以木葢封以六一泥朱題梵字數十其徒莫測詰朝中使叩門急召至便殿𤣥宗迎問曰太史奏昨夜北斗不見是何祥也師有以禳之乎一行曰後魏時失熒惑至今帝車不見古所無者天將大警于陛下也夫匹婦匹夫不得其所則殞霜赤旱盛徳所感乃能退舍感之切者其在葬枯出繫乎釋門以瞋心壞一切喜慈心降一切魔如臣曲見莫若大赦天下𤣥宗從之又其夕太史奏北斗一星見凡七日而復至開元末裴寛為河南尹深信釋氏師事普寂禪師日夕造焉居一日寛詣寂寂云方有少事未暇欵語且請遲回休憇也寛乃屏息止于空室見寂潔滌正堂焚香端坐坐未乆忽聞扣門連云天師一行和尚至矣一行入詣寂作禮禮訖附耳密語其貌絶恭寂但領云無不可者語訖禮禮訖又語如是者三寂唯云是是無不可者一行語訖降階入南室自闔其户寂乃徐命弟子云遣鍾一行和尚滅度矣左右疾走視之一如其言滅度後寛乃服衰絰葬之自徒步出城送之出開天傳信記及明皇雜録酉陽雜俎無畏唐無畏三藏初自天竺至所司引謁於𤣥宗𤣥宗見而敬信焉因謂三藏曰師不逺而來故倦矣欲于何方休息耶三藏進曰臣在天竺常時聞大唐西明寺宣律師持律第一願往依止焉𤣥宗可之宣律禁戒堅苦焚修精潔三藏飲酒食肉言行麤易往往乘醉喧競穢汚絪席宣律頗不能甘之忽中夜宣律捫虱將投于地三藏半醉連聲呼曰律師律師撲死佛子耶宣律方知其異人也整衣作禮而師事焉宣律精苦之甚常夜後行道臨堦墜墮忽覺有人捧承其足宣顧視之乃一少年也宣遽問弟子何人中夜在此少年曰某非常人即毗沙門天王子那吒太子也以䕶法之故擁䕶和尚時已乆矣宣律曰貧道修行無事煩太子太子威神自在西域有可以作佛事者願太子致之太子曰某有佛牙寶事雖乆然頭目猶捨敢不奉獻宣律得之即今崇聖寺佛牙是也出開天傳信記明達師明達師者不知其所自於閿鄉縣住萬迴故寺往來過客皆謁明達以問休咎明達不答但見其旨趣而已曾有人謁明達問曰欲至京謁親親安否明達授以竹杖至京而親亡又有謁達者達取寺家馬令乘之使南北馳驟而去其人至京授採訪判官乘驛無所不至又有謁達者達以所持杖畫地為堆阜以杖撞築地為坑其人不曉至京背發腫割之血流殆死李林甫為黄門侍郎扈從西還謁達加秤於其肩至京而作相李雍門為湖城令達忽請其小馬雍門不與間一日乘馬將出馬忽庭中人立雍門墜馬死如此頗衆達又常當寺門北望言曰此川中兵馬何多又長歎曰此中觸處總是軍隊及後哥舒翰擁兵潼闗拒禄山闗下閿鄉盡為戰場矣出紀聞録惠照唐元和中武陵郡開元寺有僧惠照貌衰體羸好言人之休咎而皆中性介獨不與羣狎常閉闗自處左右無侍童每乞食於里人里人有年八十餘者云照師居此六十載其容狀無少異於昔時但不知其甲子後有陳廣者由孝㢘科為武陵官廣好浮圖氏一日因謁寺盡訪羣僧至惠照室見廣且悲且喜曰陳君何來之晚耶廣愕然自以為平生不識照則謂曰未嘗與師遊何見訝來之晚乎照曰此非立可盡言當與子一夕静語耳廣異之後一日仍詣照宿因請其事照乃曰我劉氏子彭城人宋孝文帝之𤣥孫也曾祖鄱陽王休業祖士𢎞並詳于史氏先人以文學自負為齊竟陵王子良所知子良招召賢俊文學之士而先人預焉後仕齊梁之間為㑹稽令吾生於梁普通七年夏五月年三十方仕於陳至宣帝時為卑官不為人知與呉興沈彦文為詩酒之交後長沙王叔堅與始興王叔陵皆廣聚賔客大為聲勢各恃權寵有不平心吾與彦文俱在長沙之門下及叔陵被誅吾與彦文懼長沙之不免則禍且相及因偕遁去隱於山林用橡栗食衣一短褐雖寒暑不更一日有老僧至吾所居曰子骨甚竒當無疾耳彦文亦拜請其藥僧曰子無劉君之壽奈何雖餌吾藥亦無補耳遂告去將别又謂我曰塵俗以名利相勝竟何有哉唯釋氏可以捨此矣吾敬佩其語自是不知人事凡十五年又與彦文俱至建業時陳氏已亡宫闕盡廢臺城牢落荆榛蔽路景陽結綺空基尚存衣冠文物閴無可觀故老相遇捧袂而泣曰後主驕淫為隋氏所滅良可悲乎吾且泣不能已又問後主及陳氏諸王皆入長安即與彦文挈一囊乞食于路以至闗中吾長沙之故客也恩遇甚厚聞其遷于𤓰州則又徑往就謁長沙少長綺紈而又早貴雖流放之際尚不事生業時方與沈妃酣飲吾與彦文再拜于前長沙悲慟乆之灑泣而起乃謂吾曰一日家國淪亡骨肉播遷豈非天耶吾自是留𤓰州數年而長沙殂又數年彦文亦亡吾因髠髪為僧遁迹㑹稽山佛寺凡二十年時已百嵗矣雖容狀枯瘠而筋力不衰尚日行百里因與一僧同至長安時唐帝有天下建號武徳凡六年矣吾自此或居京洛或遊江左至於三蜀五嶺無不往焉迨今二百九十年矣雖烈寒盛暑未嘗有微恙貞元末于此寺嘗夢一丈夫衣冠甚偉視之乃長沙王也吾迎延坐話舊傷感如平生而謂吾曰後十年我之六世孫廣當官於此郡師其念之吾因問曰王今何為曰㝠官甚尊既而泣曰師存而我已六世矣悲夫吾既覺因紀君之名於經笥中至去歲凡十年乃以君之名氏訪於郡人尚訝君之未至昨因乞食里中遇邑吏訪之果得焉及君之來又依然長沙之貌然自夢及今十一年矣故訝君之晚也已而悲惋泣下數行因出經笥示之廣乃再拜願執履錫為門弟子照曰君且去翌日當再來廣受教而還明日至居而照已遁去莫知其適時元和十一年至太和初廣為巴州掾於蜀道忽逢照驚喜再拜曰願棄官從吾師為物外之遊照許之其夕偕舍于逆旅氏天未曉廣起而照已去矣自是竟不知所往然照自梁普通七年生按梁史普通七年歲在丙午至唐元和十年乙未凡二百九十年則與照言果符矣愚常以梁陳二史校其所說頗有同者由是益信其不誣矣出宣室志太平廣記卷九十二
