body:
  text: 太平廣記卷二百六十九酷暴三胡元禮誣劉如璿惡黨宋昱韋儇蕭頴士李希烈盧把襄様節度史牟李紳胡淛韋公幹趙思綰安道進胡元禮唐胡元禮定城人也進士擢第累授洛陽尉則天朝右臺員外監察尋即眞加朝請大夫丁憂免起復尋檢校秋官即中累遷司刑少卿滑州刺史廣州都督性殘忍深刻不可以情祈時李日知任司刑丞毎按獄務從寛元禮屢折之日知終不易嘗出一死囚元禮欲判殺之與日知徃復至于再三元禮怒命府吏謂曰元禮不離刑曹此囚無活法日知命報曰日知不離刑曹此囚無死法竟以兩狀申日知果直時人忌元禮之苛刻嘗于宣仁門外爲寃家羅辱于泥中幸金吾救助敕榜仇者百臺中罰元禮五千以其辱臺也出御史臺記誣劉如璿惡黨劉如璿事親以孝聞解褐唐昌尉累遷乾封尉爲侍御史轉吏部員外則天朝自夏官郎中左授都城令轉南鄭令遷司僕司農少卿秋官侍郎時來俊臣黨人與司刑府史姓樊者不協誣以反誅之其子訟寃于朝堂無敢理者乃援刀自刳其腹朝士莫不目而悚惕璿不覺唧唧而淚下俊臣奏云黨惡下詔獄璿訴曰年老因遇風而淚下俊臣劾之曰目下涓涓之淚乍可因風口稱唧唧之聲如何取雪處以絞刑則天特流于瀼州子景憲訟寃得徵還復秋官侍郎辭疾授兗州都督好著述文集四十卷行於代俊臣但苛虐無文其劾乃鄭愔之詞也出御史臺記宋昱韋儇李林甫是姜皎外甥楊國忠是張易之外甥楊國忠爲劒南召募使遠赴瀘南糧少路險韋先回者其劒南行人毎歲令宋昱韋儇爲御史迫促郡縣徵之人知必死郡縣無以應命乃設詭計詐令僧設齋或于要路轉變其衆中有單貧者即縛之置密室中授以絮衣連枷作隊急逓赴役出譚賔録蕭頴士蕭頴士性異常嚴酷昔有一僕事之十餘載頴士毎一箠楚百餘不堪其苦人或激之擇木其僕曰我非不能他從遲留者乃愛其才耳出摭言李希烈建中中李希烈攻汴州城未陷驅百姓婦女及輜重以實壕塹謂之濕梢出傳載盧杞殿中侍御史鄭詹與張鎰厚善毎伺盧杞晝寢輙詣鎰把知之他日把假寐佯熟伺詹果來知與鎰偶語把遽至鎰閣中詹趨避杞遂言密事鎰曰殿中鄭侍御在此杞佯愕曰向者所言非他人所宜聞也後深劾詹之罪以排嚴郢三司使方按二人獄猶未具而把已奏殺詹黜郢中外側目出談賔録襄樣節度襄陽人善爲漆器天下取法謂之襄樣及于司空爲帥多暴鄭元鎭河中亦暴逺近呼爲襄樣節度出國史補史牟史牟𣙜鹽於解縣初變𣙜法以中朝廷有外甥十餘歲從牟檢畦拾鹽一顆以歸牟知立杖殺之其姊哭而出救已不及矣出國史補李紳李紳以舊宰相鎭一方恣威權凡戮有罪猶待秋分永寧吳尉弟湘無辜盛夏被殺崔元藻銜德裕斥巳即翻其辭因言御史覆獄還皆對天子别白是非權軋天子使不得對詔獄不付有司但用紳奏而寘湘死是時德裕已失權李宗閔故黨令狐綯崔鉉白敏中皆當路因是逞憾以利誘動元藻等使三司結紳杖鉞作藩虐殺良平凖神龍詔書酷吏殁者官爵皆奪子孫不得進宦紳雖亡請從春秋戮死者之詔削紳三官子孫不得仕貶德裕等擢汝納左拾遺元藻武功令始紳以文藝節操見用然所至務爲威烈或陷暴刻故卒坐湘寃云闕胡淛潘之南七十里至辦州爲陵水郡辦之守曰胡淛故淮西吳少誠之卒䲭張荒陬多法河朔叛將所爲且好蹴鞠南方馬痺小不善馳騁淛每召將吏鞠且患馬之不習便更命夷民十餘輩肩輿淛輦揮杖肩者且走且擊旋環如風稍怠淛即以䇿叩其背亟紀力反鞭亟走用爲笑樂嘻淛一叛卒耳彼雖夷獠天子之民也天意豈使可封者受毒痛於可誅者乎淛之不道彈人刳孕斯近之矣豈命吏者以遠人爲蒭狗耶何其用斯人也毒虐一方之民哉後一歲淛以罪聞詔流於九眞自辦五十里至羅州爲招義郡郡旁海海有煮海塲三然郡民盜煮亦不能禁郡多蜜潔白如雪出投荒雜録韋公幹崖州東南四十里至瓊山郡太守統兵五百人兼儋崖振萬安五郡招討使凡五郡租賦一供於招討使四郡之隸於瓊瓊隸廣海中五州歲賦亷使不得有一緡悉以給瓊軍用軍食仍仰給於北海諸郡每廣州易帥仍賜錢五十萬以犒飫瓊守雖海渚歲得金錢南邉經略使不能及郡守韋公幹者貪而且酷掠良家子為臧獲如驅犬豕有女奴四百人執業者大半有織花縑文紗者有伸角爲器者有鎔鍜金銀者有攻珍木爲什具者其家如市日考月課唯恐不程公幹前爲愛州刺史境有馬援銅柱公幹摧鎔貨與賈胡土人不知伏波所鑄且謂神物哭曰使君果壞是吾屬爲海神所殺矣公幹不聽百姓奔訴於都䕶韓約約遺書責辱之乃止既牧瓊多烏文呿􅀈皆竒木也公幹驅木工㳂海採伐至有不中程以斤自刃者前一歲公幹以韓約壻受代命二大舟一實烏文器雜以銀一實呿陁器雜以金浮海東去且令徤卒䕶行將抵廣木既堅宻金且重未數百里二舟俱覆不知幾萬萬也書曰貨悖而入亦悖而出公幹不道殘人以得貨竭夷獠之膏血以自厚徒穢其名曾不得少有其利隂禍隂匿茍脱人誅將鬼得誅也出投荒雜録趙思綰賊臣趙思綰自倡亂至敗凡食人肝六十六無非面剖而膾之至食欲盡猶宛轉呌呼而戮者人亦一二萬嗟乎倘非名帥仗皇威而勦之則孰能剪滅黔黎之猰㺄出玉堂閒話安道進有安道進者即故雲州帥重霸季弟河東人也性凶險莊宗潜龍時爲小挍常佩劍列於翊衛忽一日拔而玩之謂人曰此劍也可以刜鐘切玉孰敢當吾鋒鋩旁有一人曰此又是何利器妄此誇譚假使吾引頸承之安能快斷乎道進曰眞能引頸乎此人以爲戲言乃引頸而前遂一揮而斷旁人皆驚散道進㩦劍日夜南馳投于梁主梁主壯之俾隸淮之鎭戍有掌庾吏進謂曰古人謂洞其七札爲能吾之銛鏃可徹其十札矣爾輩安知之吏輕之曰使我開襟俟之能徹吾腹乎安曰試敢開襟否吏即開其襟道進一發而殪之利鏃逕過植于墻上安蓄一犬一婢遂挈而南奔晝則從于蘆荻中夜則望星斗而竄又時看眼中神光光多處爲利方光少處爲不利既能服氣遂絶粒經時抵江湖間左挈婢右㩦犬而輒浮渡殊無所損淮帥得之擢爲裨將賜與甚豐時兄重霸事蜀亦爲列校聞弟在吳乃告王蜀主王嘉其意發一介以請之迨至蜀亦爲主將後領兵戍于天水營長道縣重霸爲招討馬步使駐于秦亭縣民有愛子託之于安命之曰㕔子道進適徃戸外㕔子偶經行於寢之前安疑之大怒遂腰斬而投于井其家號訴於霸傳送招討使王公至于南梁王公不忍加害表救活之反憾其元昆又欲害其家族兄家閑小戸防之蜀破道進東歸明宗補爲諸州馬歩軍都指揮使後有過鞭背卒出玉堂閒話太平廣記卷二百六十九
