body:
  text: 太平廣記卷一百七十知人二姚元崇盧齊卿薛季昶元懐景張九齡王丘楊穆弟兄李丹鄭絪苖夫人杜鴻漸杜佑梁肅吕温顧和劉禹錫韓愈顧况于邵李徳裕韋岫知人僧蔡荆亞子姚元崇姚元崇與張説同為宰輔頗懐疑阻屢以事相侵張銜之頗切姚既病誡諸子曰張丞相與吾不叶釁隙甚深然其人少懐奢侈尤好服玩吾身殁之後以吾嘗同寮當來弔汝其盛陳吾平生服玩寶帶重器羅列於帳前若不顧汝速計家事舉族無𩔖矣目此吾屬無所虞便當錄其玩用致於張公仍以神道碑為請既獲其文登時便寫進仍先礱石以待之便令鐫刻張丞相見事遲於我數日之後必當悔若却徴碑文以刋削為辭當引使視其鐫刻仍告以聞上訖姚既歿張果至目其玩服三四姚氏諸孤悉如教誡不數日文成叙述該詳時為極筆其畧曰八柱承天髙明之位列四時成嵗亭毒之功存後數日果使使取文本以為詞未周宻欲重加刪改姚氏諸子乃引使者示其碑仍告以奏御使者復命悔恨拊膺曰死姚崇猶能算生張説吾今日方知才之不及也逺矣出明皇雜錄盧齊卿盧齊卿開元初為幽州刺史時張守珪為果毅齊卿特相禮接謂曰十年内知節度果如其言出談賔錄薛季昶左相陳希烈初進士及第曽與人製碑文其人則天時破家因搜家資見其文以為與反者通所由便以枷杖送陳於府見河南尹薛季昶陳神色無懼自辯其事百餘言薛尹觀而竒之便引上㕔謂之曰公當位極台鉉老夫當以子孫見託耳後陳位果至丞相出定命錄元懐景燕公説之少也元懐景知其必貴嫁女與之後張至宰相其男女數人婚姻榮盛男尚公主女為三品夫人出定命錄張九齡開元二十一年安祿山自范陽入奏張九齡謂同列曰亂幽州者是胡也其後從張守珪失利九齡判曰穣苴出軍必誅莊賈孫武行令猶戮宫嬪守珪軍令若行祿山不宜免死請斬之𤣥宗惜其勇令白衣效命九齡執諮請誅之𤣥宗曰豈以王夷甫識石勒也後至蜀追恨不從九齡言命使酹于墓出感定錄王丘開元八年侍郎王丘拔山隂縣尉孫逖進士王泠然不數年皆掌綸誥侍郎崔琳收殘選人裴敦復於特卿盧愷等十數人皆入臺省衆以為知人出談賔錄楊穆兄弟貞元中楊氏穆氏弟兄人物氣槩不相上下或云楊氏弟兄賔客皆同穆氏弟兄賔客皆殊以此優劣穆氏弟兄四人贊質員賞時人謂贊俗而有格為酪質美而多仁為酥員為醍醐賞為乳腐出國史補李丹郎中李丹典濠州蕭復處士寄家楚州白田聞丹之義來謁之且無傭保棹小舟唯領一丱嵗女僮時方寒衣復單弊女僮尤甚坐於客次女僮門外求火燎手且持其靴去客吏忽云郎中屈處士復即芒屩而入丹揖之坐略話平素復忽悟足禮之闕矍然乃起謝曰某為飢凍所迫髙堂慈母處分令入闗投親知無奴僕有一小女僮便令將隨參謁朝至此僮騃恐懼公衙失所在客吏已通取靴不得去就疎脱唯惶悚而已丹曰靴與履皆一時之禮古者解襪登席即徒跣以為禮靴胡服也始自趙武靈王又有何典據此不足介君子懐但請述所求意遂留從容復頤㫖趨乃云足下相才他日必領重事於是遣使於白田饋遺復母甚厚又餞復以匹馬束帛復後竟為相出乾􅍧子鄭絪劉瞻之先寒士也十許嵗在鄭絪左右主筆硯十八九絪為御史巡荆部商山歇馬亭俯瞰山水時雨霽巗巒竒秀泉石甚佳絪坐久起行五六里曰此勝槩不能吟詠便晚何妨却返於亭欲題詩顧見一絶染翰尚濕絪大訝其佳絶時南北無行人左右曰但向來劉景在後行二三里公戲之曰莫是爾否景拜曰實見侍御吟賞起予輒有寓題引咎又拜公咨嗟久之而去比廻京闕戒子弟涵瀚已下曰劉景他日有竒才文學必超異自此可令與汝共處於學院寢饌一切無異爾輩吾亦不復指使至三數年所成文章皆辭理優壯凡再舉成名公召辟法寺學省清級乃生瞻及第作相出芝田錄苗夫人張延賞累代台鉉每宴賔客選子壻莫有入意者其妻苗氏太宰苗晉卿之女也夫人有鑑甚别英鋭特選韋臯秀才曰此人之貴無以比儔既以女妻之不二三嵗以韋郎性度髙廓不拘小節張公稍悔之至不齒禮一門婢僕漸見輕怠唯苗氏待之常厚其於衆多視之悒怏而不能制遏也張氏垂泣而言曰韋郎七尺之軀學兼文武豈有沉滯兒家為尊卑見誚良時勝境何忍虚擲乎韋乃辭去東遊妻罄粧奩贈送延賞喜其往也贐以七䭾物每之一驛則附遞一䭾而還行經七驛所送之物盡歸之矣其所有者清河氏所贈粧奩及布嚢書䇿而已延賞莫之測也後權隴右軍事會徳宗行幸奉天西面之功獨居其上聖駕旋復之日自金吾持節西川以代延賞乃改易姓名以韋作韓以臯作翺莫敢言之也至天廻驛去府城三十里上皇旋駕因以為名有人特報延賞曰替相公者金吾韋臯將軍非韓翺也苗夫人曰若是韋臯必韋郎也延賞笑曰天下同姓名者何限彼韋生應已委棄溝壑豈能乗吾位乎婦女之言不足云爾初有巫昝嫗者每述禍祟其言多中常云相公當直之神漸減韋郎擁從之神日增皆以妖妄之言不復再召苗夫人又曰韋郎比雖貧賤氣凌霄漢每為相公所誚未嘗一言屈媚因而見尤成事立功必此人也來早入州方知不誤延賞憂惕莫敢瞻視曰吾不識人西門而出凡是舊時婢僕曽無禮者悉遭韋公棒殺投於蜀江獨苗氏夫人無愧於韋郎賢哉乎賢哉乎韋公侍奉外姑過於布素之時海内貴門不敢忽於貧賤之壻所以郭圓詩曰宣父從周又適秦昔賢多少出風塵當時甚訝張延賞不識韋臯是貴人出雲溪友議杜鴻漸丞相杜鴻漸世號知人見馬燧李抱貞盧新州杞陸相贄張丞相𢎞靖李相蕃皆云並為將相既而盡然許郭之徒又何以加也出嘉話錄杜佑大司徒杜公見張相𢎞靖曰必為宰相貴人多知人也如此出嘉話錄梁肅唐貞元中李元賔韓愈李絳崔羣同年進士先是四君子之定交久矣共遊梁補闕肅之門居二嵗肅未之面而四賢造肅多矣靡不偕行肅異之一旦延接觀等俱以文學為所稱復奨以交遊之道然肅素有人倫之鑒觀等既去復止絳羣曰公等文行相契他日皆振大名然二君子位極人臣勉旃勉旃後二賢果如所言出摭言吕温初李紳赴薦常以古風求知吕温温謂員外郎齊照及弟恭曰吾觀李二十秀才之文斯人必為卿相果如其言詩曰春種一粒粟秋成萬顆子四海無閒田農夫猶餓死鋤禾日當午汗滴禾下土誰知盤中飱粒粒皆辛苦出雲溪友議顧和張𤣥之顧敷是顧和中外孫皆少而聰慧和並知之而常謂顧勝親重偏至張頗不厭於時張年九嵗顧年七嵗和俱與至寺中見佛般泥洹像弟子有泣者不泣者和以問二孫𤣥之謂彼親故泣彼不親故不泣敷曰不然由忘情故不泣不能忘情故泣出世説新語劉禹錫劉禹錫曰季龍挾彈彈人其父怒之其母曰健犢雖走車破轅良馬須逸鞅泛駕然後能負重致逺人言童稚不竒不慧必非異器定矣出嘉話錄韓愈李賀以歌詩謁吏部韓愈時為國子博士分司時送客出歸極困門人呈卷解帶旋讀之首篇鴈門太守行云黑雲壓城城欲摧甲光向日金鱗開却插帶急命邀之出雲溪友議顧况尚書白居易應舉初至京以詩謁著作顧况况覩姓名熟視白公曰米價方貴居亦弗易乃披卷首篇曰離離原上草一嵗一枯榮野火燒不盡春風吹又生却嗟賞曰道得箇語居即易矣因為之延譽聲名大振出幽閒鼓吹于邵于邵性孝悌内行修潔老而彌篤初樊澤嘗舉賢良方正一見於京師曰將相之材也不五年澤為節度使崔元翰近五十始舉進士邵異其文擢首甲科且曰不十年司誥命竟如其言獨孤綬舉博學宏詞吏部考為第一在中書昇甲科人稱允當出談賔錄李德裕中令白敏中方居郎署未有知者唯朱崖相李徳裕特以國器重之於是縉紳間多所延譽然而資用不充無以祇奉僚友一旦相國遺錢十萬俾為酒肴之備約省閣名士數人剋日同過其第時秋暮沉隂涉旬霖瀝賀跋任員外府罷求官未遂將欲出薄遊與白公同年登第羸駒就門告别閽者以俟朝客乃以他去對之賀跋駐車留書備述羇遊之意白覽書曰丈夫處窮達當有時命茍不才者以僥倖取容未足為發身之道豈得家畜飲饌止邀當路豪貴曩時登第貧交今日閉門不接縱使便居榮顯又安得不愧於懐遽令僕者命賀跋廻車遂以杯盤同費俄而所約朝客聨騎而至閽者具陳與賀跋從容無不惋愕而去翌日於私第謁見相國詢朝士來者為誰白公對以賔客未至適有同年出京訪别憫其龍鍾委困不忍棄之留飲數盃遂闕祇接既負吹噓之意甘從譴斥之罪相國稱歎逾時云此事眞古人之道由兹貴達可以激勸澆薄不旬日賀跋自使下評事先授美官白公以庫部郎中入為翰林學士未踰三載便秉鈞衡其後五鎭藩方再居廊廟蹈義懐仁始終一致流芳傳素士林美之大中初邊鄙不寧吐蕃尤恣屈强宣宗皇帝決於致討延英先問宰臣公首奏興師遂為統帥率沿邊藩鎭兵士數萬鼓行而前時犬戎列陣于川以生騎馬數千匹伏藏山谷既而得於謀者遂設竒兵待之有蕃中酋帥衣緋茸裘繫寳装帶所乗白馬駿異無比鋒鏑未交揚鞭出于陣面者數四頻召漢軍鬭將白公誡兵士無得而應之俄而駐軍指揮背我師百餘步而立有潞州小將驍勇善射馳馬彎弧而出連發兩箭皆中項躍馬而前抽短劍踣於鞍上以手扶挾如鬭毆之狀蕃軍但呼噪助之於鞍脱緋裘解金帶奪馬而還師旅無不奮勇既而大戰沙漠虜陣瓦解乗勝追奔幾及黑山之下所獲駝馬輜重不可勝計束手而降四三萬人先是河湟郡界在匈奴者自此悉為唐土宣宗初覽㨗書云我知敏中必殄凶醜白公凱旋與同列宰相進詩云一詔皇城四海頒醜戎無數束身還戍樓吹笛人休戰牧野嘶風馬自閑河水九盤收數曲隴山千里鏁諸闗西邊北塞今無事為報東南夷與蠻馬相植詩云舜徳堯仁化犬戎許提河隴欵皇風指揮文武皆神算恢拓乾坤是聖功四帥有征無汗馬七闗雖戍已弢弓天留此事還英主不在他年在大中魏相扶詩云蕭闗新復舊山川古戍秦原景𧰼鮮戎虜乞降歸惠化皇威漸被懾腥羶穹廬逺戍烟塵滅神武光揚竹帛傳左袵盡知謌帝澤從兹不更備三邊崔相鉉詩云邊陲萬里注恩波宇宙羣方洽凱歌有地名王争解辮逺方戎壘盡投戈烟塵永息三秋戍瑞氣遙清九折河共偶聖明千載運更觀俗阜與時和出劇談錄韋岫唐丞相盧㩦大中初舉進士風貌不揚語亦不正呼㩦為慧葢舌短也韋氏昆弟皆輕侮之獨尚書岫加敬謂昆弟曰盧雖人物甚陋觀其文章有首尾斯人也以此卜之他日必為大用乎爾後盧果䇿名竟登廊廟奨拔岫至福建觀察使向時輕薄諸弟率不展分所謂以貌失人者其韋諸季乎出北夢瑣言知人僧唐令公韋昭度少貧窶常依左街僧錄浄光大師隨僧齋粥浄光有人倫之鑒恆器重之出摭言蔡荆唐蔡荆尚書為天徳軍使衙前有小將顧彦朗彦暉知使院宅市買荆有知人之鑒或一日俾其子叔向以下備酒饌於山亭召二顧賜宴荆俄亦即席約令勿起二顧惶惑莫諭其意荆勉之曰公弟兄俱有封侯之相善自保愛他年願以子孫相依因増其職級洎黄寇犯闕顧彦朗領本軍同立收復功除東川加使相蔡叔向兄弟往依之請叔向為節度副使仍以丈人行拜之軍府大事皆諮謀焉大顧薨其弟彦暉嗣之亦使相出北夢瑣言亞子後唐莊宗年十一從晉王討王行瑜初令入覲獻㨗昭宗一見駭異之曰此子有竒表乃撫其背曰兒將來之國棟勿忘忠孝於吾家乃賜鸂鶒酒巵翡翠盤十三讀春秋畧知大義騎射絶倫其心豁如採錄善言聽納容物殆劉聰之比也又云昭宗曰此子可亞其父時人號曰亞子出北夢𤨏言太平廣記卷一百七十
