body:
  text: 太平廣記卷三百八十八宋李昉等編悟前生二顧非熊齊君房劉立張克勤孫緬家奴文澹王鄂僧道傑𡊮滋崔四八馬思道顧非熊顧況有子數嵗而卒況悲傷不已為詩哭之云老人哭愛子日暮千行血心逐斷猿驚迹隨飛鳥滅老人年七十不作多時别其子雖卒魂神常在其家每聞父哭聲聽之感慟因自誓忽若作人當再為顧家子一日如被人執至一處若縣吏者斷令託生顧家復都無所知忽覺心醒開目認其屋宇兄弟親愛滿側唯語不得當其生也已後又不記至年七嵗其兄戲批之忽曰我是爾兄何故批我一家驚異方叙前生事厯厯不誤弟妹小名悉遍呼之即顧非熊也出酉陽雜俎齊君房齊君房者家於呉自㓜苦貧雖勤於學而寡記性及壯有篇詠則不甚清新常為凍餒所驅役役於呉楚間以四五六七言干謁多不遇侯伯禮接雖時所獲未嘗積一金貯布袋脱滿一繩則必病罄而復愈元和初遊錢塘時屬凶年箕歛投人十不遇一乃求朝飱於天竺至孤山寺西餒甚不能前去因臨流零涕悲吟數聲俄爾有胡僧自西而來亦臨流而坐顧君房笑曰法師諳秀才旅遊滋味否君房曰旅遊滋味即足矣法師之呼一何謬哉僧曰子不憶講法華經於洛中同徳寺乎君房曰某生四十五矣盤桓呉楚間未嘗渉京江又何有洛中之説乎僧曰子應為飢火所惱不暇憶前事也乃探鉢囊出一棗大如拳曰此吾國所産食之知過去未來事豈止於前生爾君房餒甚遂請食之食訖甚渇掬泉水飲之忽欠身枕石而寝頃刻乃寤因思講法華經於同徳寺如昨日焉因泣涕禮僧曰震和尚安在曰專精未至再為蜀僧今則斷攀縁矣神上人安在曰前願未滿又聞為法師矣悟法師焉在曰豈不憶香山寺石像前戲發大願若不證無上菩提必願為赳赳貴臣昨聞已得大將軍當時雲水五人唯吾得解脱獨爾為凍餒之士耳君房泣曰某四十餘年日一飱三十餘年擁一褐浮俗之事決斷根源何期福不圎修困於今日僧曰過由師子座上廣説異端使學空之人心生疑惑戒珠曽缺禪味曽羶聲渾響清終不可致質傴影曲報應宜然君房曰為之奈何僧曰今日之事吾無計矣他生之事庶有警於吾子焉乃探鉢囊中出一鏡背面皆瑩徹謂君房曰要知貴賤之分修短之限佛法興替吾道盛衰宜一覽焉君房覽鏡久之謝曰報應之事榮枯之理謹知之矣僧收鏡入囊遂挈之而去行十餘歩旋失所在是夕君房至靈隱寺乃剪髮具戒法名鏡空太和元年李玫習業在龍門天竺寺鏡空自香山敬善寺訪之遂聞斯説因語玫曰我生五十有七矣僧臘方十二持鉢乞食尚九年在捨世之日佛法其衰乎詰之黙然無答乃請筆硯題數行於經藏北垣而去曰興一沙衰恒沙兎而罝犬而拏牛虎相交亡角牙寳檀終不滅其華出纂異記劉立劉立者為長葛尉其妻楊氏忽一日泣謂立曰我以弱質託附君子深䝉愛重將謂琴瑟之和終以偕老何期一旦捨君長逝哽咽涕泗不能自勝立曰君素無疾恙何得如此妻言後數日沉困精思恍惚自度必不濟矣且以小女美美為託又謂立曰他日美美成長望君留之三二年其夕楊氏卒及立罷官寓居長葛已十年矣時鄭師崔公即立之表丈也立往詣之崔待之亦厚念其貧令賔幕致書於諸縣將以濟之有縣令某者邀立往郭外看花及期而縣令有故不克同往令立先去舍趙長官荘行三二里見一杏園花盛發中有婦女十數人立駐馬觀之有一女年可十五六亦近垣中窺立又行百許歩乃至趙長官宅入門見人物匆遽若有驚急主人移時方出曰適女子與親族看花忽中暴疾所以不果奉迎坐未定有一青衣與趙耳語趙起入内如是數四又聞趙公嗟歎之聲乃問立曰君某年某月為長葛尉乎曰然婚楊氏乎曰然有女名美美有僕名秋笋乎曰然僕今控馬者是矣趙公歎息驚異旋有人喚秋笋入宅中見一女可十五六涕泣謂曰美美安否對曰無恙也僕拜而出莫知其由立亦訝之徐問趙曰某未省與君相識何故知其行止也趙乃以實告曰女適看花忽若暴卒既蘇自言前身乃公之妻也今雖隔生而情愛未斷適窺見公不覺悶絶立歔欷久之須臾縣令亦至衆客具集趙具白其事衆咸異之立曰某今年尚未髙亦有名官願與小娘子尋隔生之好衆共成之於是成壻而美美長於母三嵗矣出㑹昌解頤張克勤張克勤者應明經舉置一妾頗愛之而無子其家世祝華嶽神禱請頗有驗克勤母乃禱神求子果生一男名最憐甚慧黠後五年克勤登第娶妻經年妻亦無子母亦禱祈之婦産一子而最憐日羸弱更禱神求祐是夕母見一人紫綬金章謂母曰郎君分少子前子乃我所致耳今婦復生子前子必不全矣非我之力所能救也但謝其祭享而去後最憐果卒乃以朱塗右膊黛記眉上埋之明年克勤為利州葭萌令罷任居利州至録事參軍韋副家見一女至前再拜克勤視之頗𩔖最憐歸告其母母取視之女便欣然謂家人曰彼我家也及至驗其塗記宛然具在其家使人取女猶眷眷不忍去焉孫緬家奴曲沃縣尉孫緬家奴年六嵗未嘗解語後緬母臨階坐奴忽瞪視母怪問之奴便笑云娘子總角之時曽著黄裙白緋繻養一野狸今猶憶否母亦省之奴云爾時野狸即奴身是也得走後伏瓦溝中聞娘子哭泣聲至暮乃下入東園園有古塚狸於此中藏活積二年後為獵人擊殪因隨例見閻羅王王曰汝更無罪當得人身遂生海州為乞人作子一生之中常苦飢寒年至二十而死又見王王云與汝作貴人家奴奴名雖不佳然殊無憂懼遂得至此今奴已三生娘子故在猶無恙有福不其異乎出廣異記文澹前進士文澹甚有徳行人皆推之不三四嵗能知前生事父母先有一子纔五嵗學人誦詩書頗亦聰利無何失足墜井而死父母憐念悲涕不勝後乃生澹澹一旦語父母曰兒先有銀葫蘆子并漆毬香囊等曽收在杏樹孔中不知在否遂與母尋得之父母知澹乃前子也憐惜過於諸兒志學之年詞藻俊逸後應舉翰林范學士禹偁坐下及第澹之兄谷也出野人閒話王鄂唐王鄂者尚書鄑之弟也西京亂離鄑挈家入蜀㳂嘉陵江下至利州百堂寺前鄂年七嵗忽云我曽有經一卷藏在此寺石龕内因令家人相隨訪獲之木梳亦存寺僧曰此我童子也較其所夭之年與王氏子所生之嵗果驗也其前生父母尚存及長仕蜀官至令録僧道傑相州滏陽縣人信都元方少有操尚尤好釋典年二十九至顯慶五年春正月死死後月餘其兄法觀寺僧道傑思悼不已乃將一巫者至家遣求元方與語道傑又頗解法術乃作一符攝得元方令巫者問其由委巫者不識字遣解書人執筆巫者為元方口授作書一紙與同學馮行基具述平生之意并詩二首及其家中亦留書啟文理順序言詞悽愴其書疏大抵勸修功徳及遣念佛寫經以為殺生之業罪之大者無過於此又云元方不入地獄亦不墮鬼中全䝉㝠官處分今於石州李仁師家為男但為隴州吳山縣石名逺於華嶽祈子及改與石家為男又再受生日逼匆迫不得更住從二月受胎至十二月誕育願兄等慈流就彼相看也言訖涕泣而去河東薛大造寓居滏陽前任吳山縣令自云具識名逺智力寺僧慧永法真等説之出㝠報拾遺𡊮滋復州青溪山秀絶無比𡊮相公滋未達時居復郢間晴日偶過峻峰行數里漸幽竒險怪人跡罕到有儒生以賣藥為業家焉𡊮公與語言甚相狎因留宿乃問曰此處合有靈隱者曾從容不答曰有道者五六人每三兩日一至不知居處某雖與之熟亦不肯言𡊮曰某來修謁得否曰彼甚惡人然頗好酒足下求美醖一榼就此宿候或得見也𡊮公去得酒持至以伺之數夕果到五人鹿皮冠或紗帽藜杖草履遙相與通寒暄大笑乃臨澗濯足戲弄儒生置酌列席少頃盡入茅舍覩酒甚喜曰何處得此既飲數盃儒生曰某非能自致有客攜來願謁仙兄乃導𡊮公出厯拜俯僂五人相顧視色且悔飲此酒兼怒儒生曰不合引外人相擾儒生曰兹人誠志可賞況是道流稍許從容亦何傷也意遂漸解復覩𡊮公恭甚乃時與語笑目𡊮生曰坐𡊮再拜就席少頃半酣頗歡注視𡊮公相謂曰此人大似西峰坐禪和尚良久云直是屈指數日此僧亡來四十七年矣問𡊮公之嵗正四十七相顧撫掌曰覔官職去福禄至矣已後極富貴遂呼主人别𡊮公拜道流皆與握手過澗上山頂捫蘿跳躍有若飛鳥逡廵不見出逸史崔四八崔慎由初以未有兒息頗以為念有僧常遊崔氏之門者崔因告之且問其計僧曰請夫人盛飾而遊長安大寺有老僧院即詣之彼若不顧更之他所若顧我即宜厚給之俾感動其心則其後身為公子矣如其言初適三處不顧後至一院僧年近六十矣接待甚勤至崔亦厚施之自是供施不絶僧乃曰身老矣自度無以報公願以後身為公之子不數年僧卒而四八生焉或云手文有綱僧二字出玉堂閒話馬思道洪州醫博士馬思道病篤忽自歎曰我平生不省為惡何故乃為女子今在條子坊朱氏婦所託生矣其子試尋之其家婦果娠乃作襁褓以候之及思道卒而朱氏生實女子也出稽神録太平廣記卷三百八十八
