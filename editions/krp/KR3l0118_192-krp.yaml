body:
  text: 太平廣記卷一百九十二驍勇二來瑱哥舒翰馬璘白孝徳李正己李嗣業馬勛汪節彭先覺王俳優鍾傅墨君和周歸祐王宰來瑱唐來瑱天寳中至贊善大夫未為人所知安祿山叛逆詔朝臣各舉智謀果決才堪統衆者左拾遺張鎬薦瑱有縱横才略表入即日召見稱㫖拜潁川太守充招討使累奏戰功肅宗即位以瑱武略尤加任委北收河洛屬羣賊蜂起頻來攻戰皆為瑱所敗賊等懼之號為來嚼鐵出譚賔錄哥舒翰唐哥舒翰捍吐蕃賊衆三道從山相續而下哥舒翰持半段折槍當前擊之無不摧靡翰入陣善使鎗追賊及之以鎗搭其肩而喝賊驚顧翰從而刺其喉皆髙三五丈而墜家僮左車年十五每隨入陣輙下馬斬其首出譚賔錄馬璘唐廣徳元年吐蕃自長安還至鳳翔節度孫守直閉門拒之圍守數日會鎭西節度馬璘領精騎千餘自河西救楊志烈廻引兵入城遲明單騎持滿直衝賊衆左右願從者百餘騎璘奮撃大呼賊徒披靡無敢當者翌日又逼賊請戰皆曰此將不惜死不可當且避之出譚賔錄白孝徳唐白孝徳為李光弼偏將史思明攻河陽使驍將李龍仙率騎五千臨城挑戰龍仙捷勇自恃舉足加馬鬛上嫚罵光弼光弼登城望之顧諸將曰孰可取者僕固懐恩請行光弼曰非大將所為歴選其次左右曰孝徳可光弼召孝徳前問曰可乎曰可光弼問所加幾何人而可曰獨往則可加人多不可光弼曰壯哉終問所欲對曰願備五十騎於軍門候入而繼進及請大衆鼓噪以假氣他無用也光弼撫其背以遣之孝徳挾二矛䇿馬截流而渡半濟懐恩賀曰尅矣光弼曰未及何知其尅懐恩曰觀其攬䟦便僻可萬全龍仙始見其獨來甚易之足不降鬛稍近欲動孝徳搖手止之若使其不動龍仙不之測又止龍仙孝徳曰侍中使予致詞非他也龍仙去三十歩與之言䙝罵如初孝徳伺便因瞑目曰賊識我乎龍仙曰何也曰國之大將白孝徳龍仙曰是猪狗乎發聲虓然執矛前突城上皷噪五十騎亦繼進龍仙矢不及發環走堤上孝徳逐之斬首提之歸出譚賔錄李正己唐李正己本名抱玉侯希逸為平盧軍帥希逸母即正己姑也後與希逸同至青州驍健有勇力寳應中軍衆討史朝義至鄭州回紇方彊恣諸節度皆下之正己時為軍候獨欲以氣吞之因與角逐衆軍聚觀約曰後者批之既逐而先正已擒其領而批其顙回紇屎液俱下衆軍呼突繇是不敢暴會軍人逐希逸希逸奔走衆立正已為帥朝廷因授平盧節度使出譚賔錄李嗣業唐李嗣業領安西北庭行營常為先鋒將持棒衝擊衆賊披靡與九節度圍賊因中流矢數日瘡欲愈卧於帳中忽聞金皷聲亂問之知戰因闞瘡中血如注奄然而卒出譚賔錄馬勛唐徳宗欲幸梁洋嚴振遣兵五千至盩厔以俟南幸其將張用誠隂謀叛背輸欵於李懐光朝廷憂之會梁州將馬勛至上臨軒與之謀勛曰臣請計日至山南取節度符召之即不受召臣當斬其首以復命上喜曰幾日當至勛尅日時而奏上勉勞而遣之勛既得振符乃與壯士五十人偕行出駱谷用誠以為未知其叛以數百騎迓勛勛與俱之傳舍用誠左右森然勛曰天寒且休軍士左右皆退勛乃令人多焚其草以誘之軍士爭附火勛乃令人從容出懐中符示之曰大夫召君用誠惶駭起走壯士自背束其手而擒之不虞用誠之子居後引刀斫勛勛左右遽承其背刀不甚下微傷勛首遂格殺其子而仆用誠於地令壯士跨其腹以刄擬其喉曰聲則死之勛馳就其軍營士已被甲執兵勛大言曰汝等父母妻孥皆在梁州棄之從人反逆將欲滅汝族耶大夫使我取張用誠不問汝輩乃何為乎衆讋伏於是縳用誠遣送洋州振杖殺之㧞其二使總其衆勛以藥自封其首來復命愆約半日出譚賔錄汪節太微村在績溪縣西北五里村有汪節者其母避瘧於村西福田寺金剛下因假寐感而生節節有神力入長安行到東渭橋橋邊有石獅子其重千斤節指而告人曰吾能提此而擲之衆不信之節遂提獅子投之丈餘衆人大駭後數十人不能動之遂以賂請節節又提而致之故地尋而薦入禁軍補神䇿軍將嘗對御俯身負一石碾置二丈方木於碾上木上又置一牀牀上坐龜兹樂人一部奏曲終而下無壓重之色徳宗甚寵惜累有賞賜雖㧞山拽牛之力不能過也出歙州圖經彭先覺唐彭先覺叔祖博通膂力絕倫嘗於長安與壯士魏𢎞哲宋令文馮師本角力博通堅卧命三人奪其枕三人力極牀脚盡折而枕不動觀者踰主人垣墻屋宇盡壊名動京師嘗與家君同飲㑹瞑獨持兩牀降階就月于庭酒爼之𩔖略無傾瀉矣出御史臺記王俳優唐乾符中綿竹王俳優者有巨力每遇府中饗軍宴客先呈百戲王生腰背一船船中載十二人舞河傳一曲略無困乏出北夢瑣言鍾𫝊安陸郡有處士姓馬忘其名自云江夏人少遊湖湘又客於鍾陵十數年嘗說江西鍾傅本豫章人少倜儻以勇毅聞於郷里不事農業恒好射獵熊鹿野獸遇之者無不獲焉一日有親屬酒食相會傅素能飲是日大醉唯一小僕侍行比暮方歸去家二三里谿谷深邃有虎黒文青質額毛圓白耽耽然自中林而出百歩之外顧望前來僕夫見而股慄謂傅曰速登大樹以逃生命傅時酒力方盛膽氣彌麄即以僕人所持白挺山立而拒之虎即直摶傅傅亦左右跳躍揮杖撃之虎又俯伏傅亦蹲踞須臾復相拏攫如此者數四虎之前足搭傅之肩傅即以兩手抱虎之項良久虎之勢無以用其爪牙傅之勇無以展其心計兩相擎據而僕夫但號呼於其側其家人怪日晏未歸仗劔而迎之及見相捍即揮刄前斫虎腰既折傅乃免焉數歳後江南擾亂羣盗四集傅以闘虎之名為衆所服推為酋長竟登戎帥之任節制鍾陵鎭撫一方澄清六郡唐僖昭之代名振江西官至中書令出耳目記墨君和眞定墨君和幼名三旺世代寒賤以屠宰為業母懐姙之時曾夢胡僧攜一孺子面色光黑授之曰與爾為子他日必大得力既生之眉目稜岸肌膚若鐵年十五六趙王鎔初即位曾見之悦而問曰此中何得崑崙兒也問其姓與形質相應即呼為墨崑崙因以皂衣賜之是時常山縣邑屢為并州中軍所侵掠趙之將卒疲於戰敵告急於燕王李匡威率師五萬來救之幷人攻陷數城燕王聞之躬領五萬騎徑與晉師戰於元氏晉師敗績趙王感燕王之徳椎牛釃酒大犒於稁城輦金二十萬以謝之燕王歸國比及境上為其弟匡儔所拒趙人以其有徳於我遂營東圃以居之燕主自以失國又見趙主之方幼乃圖之遂從下矣上伏甲俟趙王旦至即使擒之趙王請曰某承先代基構主此山河每被鄰宼侵漁困於守備頼大王武略累挫戎鋒獲保宗祧實資恩力顧惟幼懦夙有卑誠望不忽忽可伸交譲願與大王同歸衙署即軍府必不拒違燕王以為然遂與趙王並轡而進俄有大風并黑雲起於城上俄而大雨雷電震撃至東角門内有勇夫袒臂旁來拳毆燕之介士即挾負趙主踰垣而走遂得歸公府王問其姓名君和恐其難記但言曰硯中之物王心志之左右軍士既見主免難遂逐燕王燕王退走於東圃趙人圍而殺之明日趙王素服哭於庭兼令具以禮歛仍使告於燕主匡儔忿其兄之見殺即舉全師伐趙之東鄙將釋其憤氣而致十疑之書趙王遣記室張澤以事實答之其略曰營中將士或可追呼天上雷霆何人計會詞多不載趙主既免燕主之難召墨生以千金賞之兼賜上第一區良田萬畝仍恕其十死奏授光祿大夫終趙王之世四十年間享其富貴當時閭里有生子或顔貌黑醜者多云無陋安知他日不及墨崑崙耶出劉氏耳目記周歸祐燕之舊將周歸祐薊門更變之際以劒柱心刄自背出而不死奔於梁為騎將之先鋒焉十五年夾河百戰通中之瘡往往遇之後唐莊宗入洛為仇者於獵場席地俾坐滿挽而射貫腋而出創愈無恙仕至郡牧節度留後竟死於牖下出北夢瑣言王宰丁丑歳蜀師戍於固鎭有巨帥曰費鐵觜者本於綠林部下將卒其人也多使人行劫而納其貨一日遣都將領人攻河池縣有王宰者失其名少壯而勇只與僕𨽻十數輩止于公署羣盗夜至宰啓扉而俟之格闘數刻宰中鏃甚困賊將踰其閾小僕持短槍靠扉而立連中三四魁首皆應刄而仆腸胃在地焉羣盗於是舁屍而遁他日鐵觜又刼村莊纔合夜羣盗至村或排闥而入者或四面壊壁而入民家燈火尚熒煌丈夫悉遁去唯一婦人以杓揮釜湯潑之一二十輩無措手為害者皆狼狽而奔散婦人但秉杓據釡略無所損濩旬月後鐵觜部内數人有面如瘡癩者費終身耻之出玉堂閒話太平廣記卷一百九十二
