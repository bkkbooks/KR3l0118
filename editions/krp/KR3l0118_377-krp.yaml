body:
  text: 太平廣記卷三百七十七宋李昉等編再生三趙泰𡊮廓曹宗之孫迴璞李彊友韋廣濟郄惠連趙泰晉趙泰字文和清河貝邱人也祖父京兆太守泰郡察孝廉公府辟不就精思聖典有譽鄉里當晚乃仕終中散大夫泰年三十五時嘗卒心痛須臾而死下屍于地心煖不冷屈申隨意既死十日忽然喉中有聲如雨俄而蘇活說初死之時夢有一人來近心下復有二人乘黄馬從者二人夾扶泰脛徑將東行不知可幾里至一大城崔崒髙峻城邑青黒色遂將泰向城門入經兩重門有瓦室可數千間男女大小亦數千人行列而吏著皁衣有五六人條疏姓字云當以科呈府君泰名在三十須臾將泰與數千人男女一時俱進府君西向坐閱視名簿訖復遣泰南入里門有人著絳衣坐大屋下以次呼名問生時作何孽罪行何福善諦汝等以實言也此恒遣六部使者在人間疏記善惡具有條狀不可得虚泰答父兄仕官皆二千石我少在家修學而已無他事也亦不犯惡乃遣泰為水官監作吏將二千餘人運沙禆岸晝夜勤苦後轉泰水官都督知諸獄事給泰兵馬令案行地獄所至諸獄楚毒各殊或針貫其舌流血竟體或被頭露髮躶形徒跣相牽而行有持大仗從後催促鐵床銅柱燒之洞然驅道此人抱卧其上赴即燋爛尋復還生或炎鑪巨鑊焚煮罪人身首碎墜隨沸飜轉有鬼持叉倚于其側有三四百人立于一面次當入鑊相抱悲泣或劒樹髙廣不知限極根莖枝葉皆劒為之人衆相訾自登自攀若有欣競而身體割截尺寸離斷泰見祖父母及二弟在此獄中涕泣泰出獄門見有二人齎文書來說獄吏言有三人其家為於塔寺中懸幡燒香救解其罪可出福舍俄見三人自獄而出已有自然衣服完整在身南詣一門名開光大舍有三重門朱彩照發見此三人即入舍中泰亦隨入前有大殿珍寶周飾精光耀目金玉為牀見一神人姿容偉異殊好非常坐此座上邊有沙門立倚甚衆見府君來恭敬作禮泰問此是何人府君致敬吏曰號名世尊度人之師有頃令惡道中人皆出聽經時有萬九千人皆出地獄入百里城在此到者奉法衆生也行雖虧殆尚當得度故開經法七日之中隨本所作善惡多少差次免脫泰未出之頃已見十人昇虚而去之此舍復見一城方二百餘里名為受變形城地獄考治已畢者當於此城更受變報泰入其城見有土瓦屋數千區各有房舍正中有瓦屋髙壯欄檻采飾有數百局吏對挍文書云殺生者當作蜉蝣朝生暮死刼盜者當作猪羊受人屠割婬逸者作鶴䳱鷹麋兩舌作鴟梟鵂鶹捍債者為騾驢牛馬泰案行畢還水官處主者語泰卿是誰者子以何罪過而來在此泰答祖父兄弟皆二千石我舉孝廉公府辟不行修志念善不染衆惡主者曰卿無罪故相使為水官都督不爾與地獄中人無以異也泰問主者曰人有何行死得樂報主者言唯奉法弟子精進持戒得樂報無有謫罰也泰復問曰人未事法時所行罪過事法之後得以除否答曰皆除也語畢主者開藤篋檢年紀尚有餘算三十年在乃遣泰還臨别主者曰己見地獄罪報如是當告世人皆令作善善惡隨人其猶影響可不慎乎時親表内外候視泰者五六十人同聞泰説泰自書記以示時人時晉太始五年七月十三日也乃為祖父母二弟延請僧衆大設福㑹皆命子孫改意奉法課觀精進士人聞泰死而復生多見罪福互來訪問時有太中大夫武城孫豐闗内侯常山郝伯平等十人同集泰㑹欵曲尋問莫不瞿然皆即奉法出㝠祥記𡊮廓宋𡊮廓字思度陳郡人也元徽中為吳郡丞病經少日奄然如死但餘息未盡棺衾之具並備待畢而殮三日而能轉動視瞬自說云有使者稱敎喚廓隨去既至有大城池樓堞髙整階闈崇麗既命廓進主人南面與廓温涼畢命坐設酒炙菓粽葅者等味不異世中酒數行主人謂廓曰主簿不幸有闕以君才穎故欲相屈當能顧懷不廓意知是幽途乃固辭凡薄非所克堪加少窮孤兄弟零落乞蒙恩放主人曰君當以幽顯異方故辭耳此間榮祿服御乃勝君世中甚貪共事想必降意副所期也廓復固請曰男女藐然並在齠齓僕一旦供任養視無託父子之戀理有可矜廓因流涕稽顙主人曰君辭譲乃爾何容相逼願言不獲深為歎恨就案上取一卷文書勾㸃之既而廓謝恩辭歸主人曰君不欲定省先亡乎乃遣人將廓行經歴寺署甚衆末得一垣門蓋囹圄也將廓入中敘趣一隅有諸屋宇駢闐相接次有一屋弊陋見其所生母羊氏在焉容服不佳甚異平生見廓驚喜户邊有一人身面傷疾呼廓廓驚問誰羊氏曰此王夫人汝不識耶王夫人曰吾在世時不信報應雖無餘罪正坐鞭撻婢僕過苦受此罰亡來痛楚殆無暫休今特小時寛隙耳前喚汝姊來望以自代竟無所益徒為憂聚言畢涕泗王夫人即廓嫡母也廓姊時亦在側有頃使人復將廓去經渉巷陌閭里整頓似是民居末有一宅竹籬茅屋見父憑案而坐廓入門父揚手遣廓曰汝既䝉罷可速歸去不須遲也廓跪辭而歸至家即活出法苑珠林曹宗之高平曹宗之元嘉二十五年在彭城夜寢不寤旦亡晡時氣息還通自說所見一人單衣幘執手板稱北海王使者殿下相喚宗之隨去殿前中庭有輕雲去地數十丈流䕃徘徊帷幌之間有紫煙飄颻風吹近人其香非常使者曰君停階下今入白之須臾𫝊令謝曹君君事能可稱久懷欽遲今欲相屈為府佐君今年幾嘗經鹵簿官未宗之答才幹素弱仰慙聖恩今年三十一未嘗經鹵簿官又報曰君年算雖少然先有福業應受顯要當經鹵簿官乃辭身可且歸家後當更議也尋見向使者送出門恍惚而醒宗之後任廣州年四十七明年職解遂還州病亡出述異記孫迴璞唐殿中侍醫孫迴璞濟隂人也貞觀十三年從車駕幸九成宫三善谷與魏徵鄰家嘗夜二更聞外有一人呼孫侍醫者璞謂是魏徵之命既出見兩人謂璞曰官喚璞曰我不能步行即取馬乘之隨二人行乃覺天地如晝日光明璞怪而不敢言出谷歴朝堂東又東北行六七里至苜蓿谷遙見有兩人持韓鳳方行語所引璞二人曰汝等錯追所得者是汝宜放彼人即放璞璞循路而還了了不異平生行處既至家繫馬見婢當户眠喚之不應越度入户見其身與婦並眠欲就之而不得但著南壁立大聲喚婦終不應屋内極光明壁角中有蜘蛛網中二蠅一大一小并見梁上所著藥物無不分明惟不得就牀自知是死甚憂悶恨不得共妻别倚立南壁久之微睡忽驚覺身已卧牀上而屋中闇黑無所見喚婦令起然火而璞方大汗流起視蜘蛛網歴然不殊見馬亦大汗鳯方是夜暴死後至十七年璞奉敕驛馳往齊州療齊王佑疾還至洛州東孝義驛忽見一人來問曰君是孫迴璞曰是君何問為答我是鬼耳魏太師追君為記室因出書示璞璞視之則魏徵署也璞驚曰鄭公不死何為遣君送書鬼曰已死矣今為太陽都錄太監令我召君迴璞引坐共食鬼甚喜謝璞請曰我奉敕使未還鄭公不宜追我還京奏事畢然後聽命可乎鬼許之於是晝則同行夜便同宿遂至閿鄉鬼辭曰吾今先行度闗待君次日度闗出西門見鬼已在門外復同行到滋水鬼又與璞别曰待君奏事訖相見也君可勿食葷辛璞許諾既奏事畢訪徵已薨校其薨日則孝義驛之前日也璞自以必死與家人訣别而請僧行道造像寫經可六七夜夢前鬼來召引璞上髙山山巔有大宫殿既入見衆君子迎謂曰此人修福不得留之可放去即隨璞墮山於是驚悟遂至今無恙矣出𡨕祥記李彊友李彊友者御史如璧之子彊友天寶末為剡縣丞上官數日有素所識屠者詣門再拜問其故答曰因得病暴死至地下被所由領過太山見大郎作主簿因往陳訴未合死至䝉放得還故來拜謝大郎者彊友也彊友聞惆悵久之曰死得太山主簿亦復何憂因問職事何如屠者云太山有兩主簿於人間如判官也儐從甚盛鬼神之事多經其所後數日彊友親人死得活復去被收至太山太山有兩主簿一姓李即彊友也一姓王其人死在王下苦自論列年尚未盡忽聞府君召王主簿去頃便迴云官家設齋須漆器萬口謂人曰君家有此物可借一用速宜取之事了即當放此人來詣彊友云彼著漆器實無手力彊友為囑王候久之未決又聞府君喚李主簿走去却迴謂親吏曰官家嗔王主簿不了事轉令與覓漆器此事已急無可致辭宜速取也其人不得已將手力來取揀閱之聲家人悉聞事畢彊友領過府君因爾得放既愈又為彊友說之彊友於官嚴毅典吏甚懼衙後多在門外忽𫝊賛府出莫不罄折有竊視見彊友著㡌從百餘人不可復識皆怪訝之如是十餘日而彊友卒出廣異記韋廣濟韋廣濟上元中暴死自言初使持帖云閻羅王追已為判官已至門下而未見王須臾衢州刺史韋黄裳復至廣濟拜候黄裳與廣濟為從兄弟問汝何由而來答云奉王帖追為判官裳笑曰我已為之汝當得去命坐久之命所司辦食頃之食至盤中悉是人鼻手指等謂濟曰此鬼道中食弟既欲還不宜復喫因令向前人送廣濟還及蘇說其事而黄裳猶無恙後數日而暴卒其年吕延為浙東節度有術士謂曰地下所由云王追公為判官速作功徳或當得免延之惶懼大造經像數十日術者曰公已得免矣今王取韋衢州其牒已行延之使人至信安遽報消息後十日黄裳竟亡也出廣異記郄惠連大歴中山陽人郄恵連始居泗上以其父嘗為河朔官遂從居清河父殁恵連以哀瘠聞廉使命吏臨弔贈粟帛既免喪表授漳南尉歳餘一夕獨處於堂忽見一人繡衣佩刀趨至前謂恵連曰上帝有命拜公為司命主者以冊立閻波羅王即以錦紋箱貯書進於惠連曰此上帝命也軸用瓊鈿標以紋錦又象笏紫綬金龜玉帶以賜恵連且喜且懼心甚惶惑不暇顧問遂受之立於前軒有相者趨入賛曰驅殿吏卒且至已而有數百人繡衣紅額左右佩兵器趨入羅為數行再拜一人前曰某幸得為使之吏敢以謝詞竟又拜拜訖分立於前相者又曰五岳衞兵主將復有百餘人趨入羅為五行衣如五方色皆再拜相者又曰禮器樂懸吏鼓吹吏車輿乘馬吏符印簿書吏帑藏厨膳吏近數百人皆趨而至有頃相者曰諸岳衞兵及禮器樂懸車輿乘馬等請使躬自閱之恵連曰諸岳衞兵安在對曰自有所自有所耳恵連即命駕於是控一白馬至具以金玉其導引控御從輩皆向者繡衣也數騎夾道前騎引恵連東北而去𫝊呼甚嚴可行數里兵士萬餘或騎或步盡介金執戈列於路槍槊旗斾文繡交煥俄見朱門外有數十人皆衣綠執笏曲躬而拜者曰此屬吏也其門内悉張帷帟几榻若王者居恵連既升階據几而坐俄綠衣者十輩各齎簿書請恵連判署已而相者引恵連於東廡下一院其前庭有車輿乘馬甚多又有樂器鼓簫及符印管鑰盡致於榻上以黄紋帊蔽之其榻繞四墉又有王冊用紫金塡字似篆籀書盤屈若龍鳯之勢主吏白曰此閻波羅王之冊也有一人具簮冕來謁恵連與抗禮既坐謂恵連曰上帝以鄴郡内黄縣南蘭若海悟禪師有徳立心畫一冊為閻波羅王禮甚鉅以執事有至行故拜執事為司命主者綂冊立使某幸列賔掾故得侍左右恵連問曰閻波羅王居何府掾曰地府之尊者也摽冠岳瀆總幽𡨕之務非有竒特之行者不在是選恵連思曰吾行冊禮於幽𡨕豈非身已死乎又念及妻子怏怏有不平之色府掾已察其㫖謂恵連曰執事有憂色得非以妻子為念乎恵連曰然府椽曰冊命之禮用明日執事可暫歸治其家然執事官至崇幸不以幽顯為恨言訖遂起恵連即命駕出行而昬然若醉者即據案假寐及寤已在縣時天纔曉驚歎且久自度上帝命固不可免即具白妻子為理命又白於縣令令曹某不信恵連遂湯沐具紳冕卧於榻是夕縣吏數輩皆聞空中有聲若風雨自北來直入恵連之室食頃恵連卒又聞其聲北向而去歎駭因遣使往鄴郡内黄縣南問果有蘭若院禪師海悟者近卒矣出宣室志太平廣記卷三百七十七
