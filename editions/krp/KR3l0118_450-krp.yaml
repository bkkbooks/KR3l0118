body:
  text: 太平廣記巻四百五十宋李昉等編狐四王苞唐參軍田氏子徐安靳守貞嚴諌韋參軍楊氏女薛逈辛替否代州民祁縣民張例王苞唐吳郡王苞者少事道士葉静能中罷為太學生數歲在學有婦人寓宿苞與結歡情好甚篤静能在京苞往省之静能謂曰汝身何得有野狐氣固答云無能曰有也苞因言得婦始末能曰正是此老野狐臨别書一符與苞令含誡之曰至舍可吐其口當自來此為汝遣之無憂也苞還至舍如静能言婦人得符變為老狐銜符而走至静能所拜謝静能云放汝一生命不宜更至于王家自此遂絶出廣異記唐參軍唐洛陽思恭里有唐參軍者立性修整簡于接對有趙門福及康三者投刺謁唐未出見之問其來意門福曰止求㸃心飯耳唐使門人辭云不在二人徑入至堂所門福曰唐都官何以云不在惜一餐耳唐辭以門者不報引出外㕔令家人供食私誡奴令寘劍盤中至則刺之奴至唐引劒刺門福不中次擊康三中之猶躍入庭前池中門福罵云彼我雖是狐我已千年千年之狐姓趙姓張五百年狐姓白姓康奈何無道殺我康三必當修報于汝終不令康氏子徒死也唐氏深謝之令召康三門福至池所呼康三輒應曰唯然求之不可得但餘鼻存門福既去唐氏以桃湯沃洒門戸及懸符禁自爾不至謂其施行有驗久之園中櫻桃熟唐氏夫妻暇日檢行忽見門福在櫻桃樹上採櫻桃食之唐氏驚曰趙門福汝復敢來耶門福笑曰君以桃物見欺今聊復採食君亦食之否乃頻擲數四以授唐唐氏愈恐乃廣召僧結壇持呪門福遂逾日不至其僧持誦甚切冀其有效以為己功後一日晚霽之後僧坐楹前忽見五色雲自西來逕至唐氏堂前中有一佛容色端嚴謂僧曰汝為唐氏却野狐耶僧稽首唐氏長幼䖍禮甚至喜見眞佛拜請降止久之方下坐其壇上奉事甚勤佛謂僧曰汝是修道請通達亦何須久蔬食而為法能食肉乎但問心能堅持否肉雖食之可復無累乃令唐氏市肉佛自設食次以授僧及家人悉食食畢忽見壇上是趙門福舉家歎恨為其所誤門福笑曰無勞厭我我不來矣自爾不至也出廣異記田氏子唐牛肅有從舅常過澠池因至西北三十里謁田氏子去田氏莊十餘里經岋險多櫟林傳云中有魅狐往來經之者皆結侣乃敢過舅既至田氏子命老䜿往澠池市酒饌天未明䜿行日暮不至田氏子怪之及至䜿一足又跛問何故䜿曰適至櫟林為一魅狐所絆因蹷而仆故傷焉問何以見魅豎曰適下坡時狐變為婦人遽來追我我驚且走狐又疾行遂為所及因倒且損吾恐魅之為怪強起擊之婦人口但哀祈反謂我為狐屢云叩頭野狐叩頭野狐吾以其不是知因與痛手故免其禍田氏子曰汝無擊人妄謂狐耶豎曰吾雖苦擊之終不改婦人狀耳田氏子曰汝必誤損他人且入戸日入見婦人體傷蓬首過門而求飲謂田氏子曰吾適櫟林逢一老狐變為人吾不知是狐前趨為伴同過櫟林不知老狐却傷我如此賴老狐去餘命得全妾北村人也渇故求飲田氏子恐其見蒼頭也與之飲而遣之出紀聞徐安徐安者下邳人也好以漁獵為事安妻王氏貌甚羙人頗知之開元五年秋安遊海州王氏獨居下邳忽一日有一少年狀甚偉顧王氏曰可惜芳艶虛過一生王氏聞而悅之遂與之結好而來去無憚安既還妻見之恩義殊隔安頗訝之其妻至日將夕即飾粧静處至二更乃失所在迨曉方回亦不見其出入之處他日安潛伺之其妻乃騎故籠從忩而出至曉復返安是夕閉婦于他室乃詐為女子粧飾袖短劍騎故籠以待之至二更忽從忩而出徑入一山嶺乃至㑹所帷幄華煥酒饌羅列座有三少年安未及下三少年曰王氏來何早乎安乃奮劍擊之三少年死于座安復騎籠即不復飛矣俟曉而返視夜來所殺少年皆老狐也安到舍其妻是夕不復粧飾矣出集異記靳守貞霍邑古呂州也城池甚固縣令宅東北有城面各百歩其高三丈厚七八尺名曰囚周厲王城則左傳所稱萬人不忍流王于彘城即霍邑也王崩因葬城之北城旣久逺則有魅狐居之或官吏家或百姓子女姿色者夜中狐㫁其髪有如刀截所遇無知往往而有唐時邑人靳守貞者素善符呪為縣送徒至趙城還歸至金狗鼻傍汾河山名去縣五里見汾河西岸水濱有女紅裳浣衣水次守貞目之女子忽爾乘空過河遂緣嶺躡虚至守貞所手攀其笠足踏其𢃄將取其髪焉守貞送徒手猶持斧因擊女子墜從而斫之女子死則為雌狐守貞以狐至縣具列其由縣令不之信守貞歸遂每夜有老父及媪繞其居哭從索其女守貞不懼月餘老父及媪罵而去曰無狀殺我女吾猶有三女終當困汝於是遂絶而截髪亦亡出紀聞嚴諫唐洛陽尉嚴諫從叔亡諫往吊之後十餘日叔家悉皆去服諫召家人問答云亡者不許因述其言語處置狀有如平生諫疑是野狐恒欲料理後至叔舍靈便逆怒約束子弟勿更令少府姪來無益人家亊只解相疑耳亦謂諌曰五郎公事似忙不宜數來也諫後忽將蒼鷹雙鶻皂鵰獵犬等數十事與他手力百餘人悉持器械圍繞其宅數重遂入靈堂忽見一赤肉野狐仰行屋上射擊不能中尋而開門躍出不復見因爾怪絶出廣異記韋參軍唐潤州參軍弟有隱徳雖兄弟不能知也韋常謂其不慧輕之後忽謂諸兄曰財帛當以道不可力求諸兄甚奇其言問汝何長進如此對曰今昆明池中大有珍寳可共取之諸兄乃與偕行至池所以手酌水水悉枯涸見金寳甚多謂兄曰可取之兄等愈入愈深竟不能得乃云此可見而不可得致者有定分也諸兄歎羙之問曰素不出何以得妙法笑而不言久之曰明年當得一官無慮貧乏乃選拜潤州書佐遂東之任途經開封縣開封縣令者其母患狐媚前後術士不能療有道士者善見鬼謂令曰今比見諸隊仗有異人入境若得此人太夫人疾苦必愈令遣候之後數日白云至此縣逆旅宜自謁見令往見韋具申禮請笑曰此道士為君言耶然以太夫人故屈身于人亦可憫矣幸與君遇其疾必愈明日自縣橋至宅可少止人令百姓見之我當至彼為發遣且宜還家洒掃焚香相待令皆如言明日至舍見太夫人問以疾苦以栁枝洒水于身上須臾有老白野狐自牀而下徐行至縣橋然後不見令有贈遺韋皆不受至官一年謂其妻曰後月我當死死後君嫁此州判司當生三子皆如其言出廣異記楊氏女唐有楊氏者二女并嫁胡家小胡郎為主母所惜大胡郎謂其婢曰小胡郎乃野狐爾丈母乃不惜我反惜野狐婢還白母問何以知之答云宜取鵲頭懸戸上小胡郎若來令妻呼伊祈熟肉再三言之必當走也楊氏如言小胡即果走故今人相傳云伊祈熟肉辟狐魅甚有驗也出廣異記薛逈唐河東薛逈與其徒十人于東都狎娼婦留連數夕各賞錢十千後一夕午夜娼偶求去逈留待曙婦人躁擾求去數四抱錢出門逈敕門者無出客門者不為啓鎖婦人持錢尋審至水竇變成野狐從竇中出去其錢亦留出廣異記辛替否唐辛替否母死之後其靈座中恒有靈語不異平素家人敬事如生替否表弟是術士在京聞其事因而來觀潛于替否宅後作法入門見一無毛牝野狐殺之遂絶出廣野記代州民唐代州民有一女其兄逺戍不在母與女獨居忽見菩薩乘雲而至謂母曰汝家甚善吾欲居之可速修理尋當來也村人競往處置適畢菩薩馭五色雲來下其室村人供養甚衆仍敇衆等不令有言恐四方信心往來不止村人以是相戒不說其事菩薩與女私通有娠經年其兄還菩薩云不欲見男子令母逐之兒不得至因傾財求道士久之有道士為作法竊視菩薩是一老狐乃持刀入斫殺之出廣異志祁縣民唐祁縣有村民因輦地征蒭粟至太原府及歸途中日暮有一白衣婦人立路旁謂村民曰妾今日都城而來困且甚願寄載車中可乎村民許之乃升車行未三四里因脂轄忽見一狐尾在車之隙中垂于車轅下村民即以鎌㫁之其婦人化為無尾白狐鳴嘷而去出宣室志張例唐始豐令張例疾患魅時有發動家人不能制也恒舒右臂上作呪云狐娘健子其子密持鐡杵候例疾發即自後撞之墜一老牝狐焚于四通之衢自爾便愈也太平廣記巻四百五十
