body:
  text: 太平廣記卷三百四十八宋李昉等編鬼三十三辛神邕唐燕士郭鄩李全質沈恭禮牛生韋齊休辛神邕平盧從事御史辛神邕太和五年冬以前白水尉調集於京師時有傭者劉萬金與家僮自勤同室而居自勤病數月將死一日萬金他出自勤偃於榻忽有一人紫衣危冠廣袂貌枯形瘠巨凖修髯自門而入至榻前謂自勤曰汝强起疾當間矣於是扶自勤負壁而坐先是室之東垣下有食案列數器紫衣人探袖中出一掬物狀若稻實而色青即以十餘粒置食器中謂自勤曰吾非人間人今奉命召萬金萬金當食而死爾勿泄吾語不然則禍及矣言訖遂去是日萬金歸臉赤而喘且曰我以腹虛熱上殆不可治即就其器而食食且盡自勤疾愈萬金果卒出宣室志唐燕士晉昌唐燕士好讀書隱于九華山常日晚天雨霽燕士步月上山夜旣深有羣狼擁其道不得歸懼旣甚遂匿於深林中俄有白衣丈夫戴紗巾貌孤俊年近五十循澗而來吟步自若佇立且乆乃吟曰澗水潺潺聲不絶溪壠茫茫野花發自去自來人不歸長時唯對空山月燕士常好為七言詩頗稱于時人聞此驚歎將與之言未及而没明日燕士歸以貌問里人有識者曰是吳氏子舉進士善為詩卒數年矣出宣室志郭鄩郭鄩罷櫟陽縣尉久不得調窮居京華困甚肸蠁間常有二物如猿玃衣青碧出入寢興無不相逐凡欲舉意求索必與鄩俱往所造詣如礙枳棘親友見之俱若讐隙或厭之以符術或避之於山林數年竟莫能絶一夕忽來告别云某等承君厄運不相别者久今則候曉而行無復至矣鄩旣喜其去遂問所詣云世路如某者甚多但人不見耳今之所詣乃勝業坊富人王氏將往㪚之鄩曰彼之聚歛豐盈何以遽散云先得計于安品子矣曉鼓忽鳴遂失所在鄩旣興盥櫛便覺愁憤開豁試詣親友無不改觀相接未旬見宰相面白遂除通事舍人鄩有表弟張生者為金吾衛佐交游皆豪俠少年好竒聞之未信之也知勝業王氏𨽻左軍自是常往伺之王氏性儉約所費未常過分家有妓樂端麗者至多外之袨服冶容造次莫廽其意一日與賔朋過鳴珂曲有婦人靚粧立于門首王生駐馬遲留喜動顔色因召同列者置酒為歡張生預焉訪之即安品子之弟也品子善歌是日歌數曲王生悉以金綵贈之衆皆訝其廣費自此輿輦資貨日輸其門未經數年遂至貧匱耳出劇談録李全質隴西李全質少在沂州嘗一日欲大蹴踘昧爽之交假寐于沂州城横門東庭前忽有一衣紫衣首戴圓笠直造其前曰奉追全質曰何人相追紫衣人曰非某之追别有人來奉追也須臾一緑衣人來曰奉追其言忽遽勢不可遏全質曰公莫有所須否綠衣人曰奉命令追敢言其所須紫衣人謂綠衣人曰不用追以手麾出横門紫衣人乘間謂全質曰適蒙問所須豈不能終諾乎全質曰所須何物答曰犀佩帶一條耳全質曰唯言畢失所在主者報蹴踘遂令畫犀帶日晚具酒脯并紙錢佩帶于横門外焚之是夜全質纔寐即見戴圓笠紫衣人來拜謝曰蒙賜佩帶慙愧之至無以奉答然公平生水厄但危困處某則必至焉洎太和嵗初大水全質已為天平軍裨將兼監察有切務自中都抵梁郡城西走百歇橋二十里水深而氷薄素不諳委程命峻速片時不可駐行從等靣如死灰信轡委命而行纔三數十步有一人後來大呼之曰勿過彼而來此吾知其徑安而且捷全質荷之反轡而從焉纔不三里止泥濘而曽無寸尺之阻得達本土以財物酬其人人固讓不取固與之答曰若仗我而來則或不讓今因我而行亦何所苦終不肯受全質意其鮮焉乃緩之須臾復來已失所在却思其人衣紫衣戴圓笠豈非横門之人歟開成初銜命入闗廻宿夀安縣夜未央而情廹時復昏晦不得已而出逆旅三數里而大雨囘亦不可須臾馬旁見一人全質詰之誰歟對曰郵牒者更於馬前行寸歩不可覩其人毎以其前路導之或曰樹或曰樁或曰險或曰培塿或曰溝全質皆得免咎久而至三泉驛憇焉纔下馬訪郵牒者欲酬之已不見矣問從者形狀衣服固紫衣而首戴笠復非横門之人歟㑹昌壬戌嵗濟陰大水谷神子與全質同舟訝全質何懼水之甚詢其由全質乃語此又云本性無懼水紫衣屢有應故兢慄之轉切也出𫝊異記沈恭禮閿鄉縣主簿沈恭禮太和中攝湖城尉離閿鄉日小疾暮至湖城堂前卧忽有人繞牀數匝意謂從行㕔吏雷忠順恭禮問之對曰非雷忠順李忠義也問曰何得來此對曰某本江淮人因飢寒傭於人前月至此縣卒于逆旅然飢寒甚今投君祈一食兼丏一小帽可乎恭禮許之曰遣我何處送與汝對曰來暮遣驛中㕔子張朝來取語畢立于堂之西楹恭禮起坐忠義進曰君初止此更有事輒敢裨補恭禮曰可遂言此㕔人居多不安少間有一女子年可十七八强來參謁名曰蜜陀僧君慎不可與之言或託是縣尹家人或假四鄰為附輒不可交言言則中此物矣忠義語畢却立西楹未定堂東果有一女子峩鬟垂鬂肌膚悦澤微笑轉盻謂恭禮曰秋室寂寥蛩啼夜月更深風動梧葉墮階如何罪責羈囚如此耶恭禮不動又曰珍簟牀空明月滿室不飲美酒虚稱少年恭禮又不顧又吟曰黄帝上天時鼎湖元在兹七十二玉女化作黄金芝恭禮又不顧逡廵而去忠義又進曰此物已去少間東廊下有敬寡婦王家阿嫂雖不敢同蜜陀僧然亦不得與語少頃果有一女郎自東廡下衣白衣簪白簪手整披袍囘命曰王家阿嫂何不出來俄然有曳紅裙紫袖銀帔而來步庭月數匝却立于東廡下忠義又進曰此兩物已去可髙枕矣少間縱有他媚來亦不足畏也忠義辭去恭禮止之為我更駐候怪物盡即去忠義應唯而四更已有一物長二丈餘手持三數髑髏若躍丸者漸近㕔簷忠義謂恭禮曰可以枕擊之應聲而撃㩧然而中手墮下髑髏俯身掇之忠義跳下以棒亂毆出門而去恭禮連呼忠義不復見而東方已明與從者具語之遂令具食及市帽子召㕔子張朝詰之曰某本巫人也近者假食為㕔吏具知有新客死客鬼李忠義恭禮便付帽子及盤飡等去其夜夢李忠義辭謝曰蜜陀僧大須防備猶二三年奉擾耳言畢而去恭禮兩月在湖城夜夜蜜佗僧來終不敢對後即歸閿鄉即隔夜而至然終亦不能為患半年後或三夜五夜一來一年餘方漸稀有僧令斷肉及葷辛此後更不復來矣出傳異志牛生牛生自河東赴舉行至華州去三十里宿一村店其日雪甚冷主人造湯餅昏時有一人窮寒衣服藍縷亦來投店牛生見而念之要與同食此人曰某窮寒不辦得錢今朝已空腹行百餘里矣遂食四五碗便卧于牀前地上其聲如牛至五更此人至牛生牀前曰請公略至門外有事要言之連催出門曰某非人㝠使耳深愧昨夜一餐今有少相報公為置三幅紙及筆硯來牛生與之此人令牛生逺立自坐樹下袖中出一卷書牒之㸔數張即書兩行如此三度訖求紙封之書云第一封第二封第三封謂牛生曰公若遇災難危篤不可免者即焚香以次開之視若或可免即不須開言訖行數步不見矣牛生緘置書囊中不甚信也及至京止客户坊飢貧甚絶食忽憶此書故開第一封題云可於菩提寺門前坐自客户坊至菩提寺可三十餘里飢困且雨雪乗驢而往自辰至鼓聲欲絶方至寺門坐未定有一僧自寺内出叱牛生曰雨雪如此君為何人而坐此若凍死豈不見累耶牛生曰某是舉人至此值夜略借寺門前一宿明日自去耳僧曰不知是秀才可止貧道院也既入僧乃為設火具食㑹語久之曰賢宗晉陽長官與秀才逺近牛生曰是叔父也僧乃取晉陽手書令識之皆不謬僧喜曰晉陽常寄錢三千貫文在此絶不復來取某年老一朝溘至便無所付今盡以相與牛生先取將錢千貫買宅置車馬納僕妾遂為富人又以求名失路復開第二封書題云西市食店張家樓上坐牛生如言詣張氏獨止於一室下簾而坐有數人少年上樓來中有一人白衫坐定忽曰某本只有五百千令請添至七百千此外即力不及也一人又曰進士及第何惜千緡牛生知其貨及第矣及出揖之白衫少年即主司之子生曰某以千貫奉郎君别有二百千奉諸公酒食之費不煩他議也少年許之果登上第厯任臺省後為河中節度副使經一年疾困遂開第三封題云可處置家事乃沐浴修遺書纔訖而遂終焉出㑹昌解頥録韋齊休韋齊休擢進士第累官至員外郎為王璠浙西團練副使大和八年卒于潤州之官舍三更後將小斂忽於西壁下大聲曰𫝊語娘子且止哭當有處分其妻大驚仆地不蘇齊休于衾下厲聲曰娘子今為鬼妻聞鬼語忽驚悸耶妻即起曰非為畏悸但不合與君遽隔幽明孤惶無所依怙不意神識有知忽通言語不覺惛絶誠俟明教豈敢有違齊休曰死生之期涉于真宰夫婦之道重在人倫某與娘子情義至深他生亦未相捨今某屍骸且在足寛襟抱家事大小且須商量不可空為兒女悲泣使某幽㝠間更憂妻孥也夜來諸事並自勞心總無失脱可助僕喜妻曰何也齊休曰昨日湖州庾七寄買口錢倉遑之際不免専心部署今則一文不欠亦足為慰良久語絶即各營䘮事纔曙復聞呼適到張清家近造得三間草堂前屋舍自足不煩勞他人更借下處矣其夕張清似夢中忽見齊休曰我昨日已死先令買塋三畝地可速支闗布置一一分明張清悉依其命及將歸自擇發日呼喚一如常時婢僕將有私竊無不發摘隨亊捶撻及至京便之塋所張清凖擬皆畢十數日向三更忽呼其下曰速起報堂前蕭三郎來相看可隨事具食欵待如法妨他忙也二人語歴歴可聽蕭三郎者即職方郎中蕭徹是日卒於興化里其夕遂來俄聞蕭呼嘆曰死生之理僕不敢恨但可異者僕數日前因至少陵别墅偶題一首詩今思之乃是生作鬼詩因吟曰新搆茅齋野澗東松楸交影足悲風人間嵗月如流水何事頻行此路中齊休亦悲咤曰足下此詩葢是自䜟僕生前忝有科名粗亦為人所知死未數日便有一無名小鬼贈一篇殊為著鈍雖然細思之已是落他蕪境乃詠曰澗水濺濺流不絶芳草綿綿野花發自去自來人不知黄昏惟有青山月蕭亦歎羨之曰韋四公死已多時猶不甘此事僕乃適來人也遽為遊岱之魂何以堪處即聞相别而去又數日亭午間呼曰裴二十一郎來慰可具食我自迎去其日裴氏昆季果來至啟夏門外瘁然神聳又素聞其事遂不敢行弔而囘裴即長安縣令名觀齊休之妻兄也其部曲子弟動即罪責不堪其懼及今未已不知竟如之何出河東記志太平廣記卷三百四十八
