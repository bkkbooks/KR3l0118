body:
  text: 太平廣記卷三百四十四宋李昉等編鬼二十九王裔老張宏讓冦鄘呼延冀安鳯成叔弁襄陽選人祖價王裔老華州下邽縣東南三十餘里曰延年里里西南有故蘭若而無僧居唐元和八年翰林學士白居易丁母憂退居下邽縣七月其從祖兄曰皥自華州來訪居易途出扵蘭若前及門見婦女十許人衣黄綾衣少長雜坐㑹語扵佛屋下聲聞於門皡熱行方渴將就憇且求飲望其從者蕭士清未至因下馬繫繮於門柱舉首忽不見自意其退藏扵忩闥之間從之不見又意其退藏扵屋壁之後從之又不見周視其四旁則堵墻環然無隙缺覆視其聚談之所塵埃羃然無足跡由是意其非人悸然大異之上馬疾驅來告居易且聞其所言云云甚多不能殫記大扺多云王裔老如此觀其詞意若相與數其過者厥所去居易舍八九里因同徃訪焉其地果有王裔者即其里人也方徙居於蘭若之東北百餘步葺牆屋築塲藝𣗳僅畢明日而入既入不浹旬而裔死不越月而妻死不踰時而裔之二子二婦及一孫亦死止餘一子曰明進大恐懼不知所為意新居不祥乃撒屋㧞𣗳夜徙去遂免出白居易集張宏讓元和十二年壽州小將張宏讓娶兵馬使王暹女淮西用兵方急令狐通為刺史宏讓妻重疾累月每思食宏讓與具後不食如此自夏及秋乍進乍退宏讓心終不怠冬十月其妻忽思湯餅宏讓與具之工未竟遇軍中給冬衣宏讓遂請同志王士徴妻為饌宏讓乃去士徴妻饌熟就牀欲進忽見宏讓妻自額鼻中分半一手一股在牀流血殷席士徴妻驚呼告營中軍人妻諸鄰來共觀之競問莫知其由俄而吏報通使人檢視其日又非昏暝二婦素無嫌怨遂為吏所錄宏讓奔歸及䘮所忽聞空中婦悲泣云某被大家喚將看兒去煩君多時某不得已君終不見棄大家索君懇求耳先是宏讓營居後小圃中有一李𣗳婦云君今速為某造四分食置李𣗳下君則向𣗳下哀祈某必得再履人世也宏讓依其言陳饌懇祈拜之忽聞空中云還汝新婦便聞王氏云接我以力宏讓如其言接之俄覺赫然半屍簿下宏讓抱之遽聞王氏云速合牀上半屍比宏讓拳曲持半屍到牀王氏聲聲云勘其剖處無所參差宏讓盡力與合之令等其舊王氏云覆之以衾無我問三日宏讓如其教三日後聞呻吟乃云思少饘粥宏讓以飲灌其喉盡一盃又云具無相問七日則冺如舊但自項及脊徹尻有㾗如刀傷前額及鼻貫胸腹亦然一年平復如故生數子此故友龎子肅親見其事出乾􅍧子寇鄘元和十二年上都永平里西南隅有一小宅懸牓云但有人敢居即傳元契奉贈及奉其初價大厯年安太清始用二百千買得後賣與王姁傳受凡十七主皆䘮長布施與羅漢寺寺家賃之悉無人敢入有日者寇鄘出入於公卿門詣寺求買因送四十千與寺家寺家極喜乃傳契付之有堂屋三間甚庳東西廂共五間地約三畝榆楮數百株門有崇屏高八尺基厚一尺皆炭灰泥焉鄘又與崇賢里法明寺僧普照為門徒其夜掃堂獨止一宿無事月明至四更微雨鄘忽身體拘急毛髮如磔心恐不安聞一人哭聲如出九泉乃卑聽之又若在中天其乍東乍西無所定欲至曙聲遂絶鄘乃告照曰宅既如此安可居焉命照公與作道塲至三更又聞哭聲滿七日鄘乃作齋設僧方欲衆僧行食次照忽起於庭如有所見遽厲聲逐之喝云這賊殺如許人遶庭一轉復坐曰見矣見矣遂命鄘求七家粉水解穢俄至門崇屏洒水一盃以柳枝撲焉屏之下四尺開土忽穨圮中有一女人衣青羅裙紅袴錦履緋衫子其衣皆是紙灰風拂盡飛於庭即枯骨籍焉乃命織一竹籠子又命鄘作三兩事女衣盛之送葬渭水之沙洲仍命勿回頭亦與設酒饌自後小大更無恐懼初郭汾陽有堂妹出家永平里宣化寺汾陽王夫人之頂謁其姑從人頗多後買此宅徃來安置或聞有青衣不謹遂誅青衣夫人令髙築崇屏此宅因有是焉亦云青衣不謹洩漏遊處由是生葬此地焉出乾􅍧子呼延冀咸和中呼延冀者授忠州司户攜其妻之官至泗水遇盜盡奪其財物乃至躶形冀遂與其妻於路傍訪人烟俄逢一翁問其故冀告之老翁曰南行之數里即我家可與家屬暫宿也冀乃與老翁同至其家入林中得一大宅老翁安存於一室内設食遺衣至夜深親就冀談話復具酒殽曰我家唯有老母君若未能攜妻去欲且留之伺到官再來迎亦可我見君貧必不易相攜也冀思之良久遂謝而言曰丈人既憫我如是我即以心素托丈人我妻本出宫人也能歌仍薄有文藝然好酒多放蕩留之後幸丈人拘束之老翁曰無憂但自赴官明日冀乃留妻而去臨别妻執冀手而言曰我本與爾逺渉川陸赴一簿官今不期又留我於此君若不來迎我我必奔出必有納我之人也泣涙而别冀到官方謀逺迎其妻忽一日有逹一書者受之是其妻書也其書云妾今自裁此書以達心緒唯君少覽焉妾本歌妓之女也幼入宫禁以清歌妙舞為稱固無婦德婦容及宫中有命掖庭選人妾得放歸焉是時也君方年少酒狂詩逸在妾之鄰妾既不拘君亦放蕩君不以妾不可奉蘋蘩遽以禮娶妾妾既與君匹偶諸鄰皆謂之才子佳人每念花間同步月下相對紅樓戲謔錦闈言誓即不期今日之事也悲夫一何義絶君以妾身棄之如屣留於荒郊不念孤獨自君之官涙流莫遏思量薄情妾又奚守貞㓗哉老父家有一少年子深慕妾妾已歸之矣君其知之冀覽書擲書不勝憤怒遂抛官至泗水本欲見老翁及其妻皆殺之訪尋不得但見一大塜林木森然冀毁其塜見其妻已死在塜中乃取尸祭别葬之而去出瀟湘記安鳯安鳯壽春人少與鄉里徐侃友善俱有才學本約同遊宦長安侃性純孝别其母時見母泣涕不止乃不忍離鳯至長安十年不達恥不歸後忽逢侃攜手叙濶别話鄉里之事悲喜俱不自勝同寓旅舍數日忽侃謂鳯曰我雖離鄉一載我母必念我我當歸君離鄉亦乆能同歸乎鳯曰我本不勤耕鑿而志切於名宦今日逺離鄉國索米於長安無一公卿知十年之漂蕩大丈夫之氣概焉能以面目回見故鄉之人也因泣謂侃曰君自當寧親我誓不達不歸矣侃留詩曰君寄長安乆恥不還故鄉我别長安去切在慰髙堂不意與離恨泉下亦難忘鳯亦以詩贈别曰一自離鄉國十年在咸秦泣盡卞和血不逢一故人今日舊友别羞此漂泊身離情吟詩處麻衣掩淚頻淚别各分袂且及來年春鳯猶客長安因夜夢侃遂寄一書達壽春首敘長安再相見話幽抱之事侃母得鳯書泣謂附書之人曰侃死已三年矣却至長安告鳯鳯垂泣歎曰我今日始悟侃别詩中泉下亦難忘之句出瀟湘雜錄成叔弁元和一十三年江陵編户成叔弁有女曰興娘年十七忽有媒氏詣門云有田家郎君願結姻媛見在門叔弁召其妻共窺之人質頗不愜即辭曰興娘年小未辦資裝門外聞之即趨入曰待田郎叅丈人丈母叔弁不顧遽與妻避之田奴曰田四郎上界香郎索爾女不得耶即笑一聲便有二人自空而下曰相呼何事田曰成家見有一女某今商量確然不可二郎以為何如二人曰彼固不知安有不可幸容言議况小郎娘子魂識已隨足下慕足下深矣黎民何知不用苦怪言訖而興娘大呌於房中曰嫁與田四郎去叔弁既覺非人即下階辭曰貧家養女不喜觀矚四郎意㫖敢不從命但且坐與媒氏商量無太匆匆也四人相顧大笑曰定矣叔弁即令市果酒備茶餅就堂垂簾而坐媒氏曰成家意不美滿四郎亦太匆匆今三郎君總是詞人請聨句一篇然後定衆皆大笑樂曰老嫗但作媒何必議他聨句事媒氏固請田郎良乆乃吟曰一㸃紅裳出翠微秋天雲静月離離田請叔弁繼之叔弁素不知書固辭徃復再四食頃忽聞堂上有人語曰何不云天曹使者徒回首何不從他九族卑言訖媒與三人絶倒大笑曰向道魔語今欲何如四人一時趨出不復更來其女若醉人狂言四人去後亦遂醒矣出河東記襄陽選人于頔鎮襄陽時選人劉某入京逢一舉人年二十許言語明朗同行數里意甚相得因藉草劉有酒傾數盃日暮舉人指岐逕曰某弊止從此數里能左顧乎劉辭以程期舉人因賦詩曰流水涓涓長芹芽織鳥雙飛客還家荒村無人作寒食殯宫空對棠梨花至明劉歸襄陽州因徃尋訪舉人惟有殯宫存焉出酉陽雜俎祖價進士祖價詠之孫也落第後嘗遊商山中行李危困夕至一孤驛去驛半里以來有一空佛寺無僧居價與僕夫投之而宿秋月甚明價獨玩月來去而行忽有一人自寺殿後出揖價共坐語笑說經史時時自吟價烹茶待之此人獨吟不已又云夫人為詩述懐諷物若不精不切即不能動人今夕偶相遇後㑹難期輒賦三兩篇以述懐也遂朗吟云家住驛北路百里無四鄰徃來不相問寂寂山家春又吟南岡夜蕭蕭青松與白楊家人應有夢逺客已無腸又吟白草寒路裏亂山明月中是夕苦吟罷寒燭與君同詩訖再三吟之夜乆遂揖而退至明日問鄰人云此前後數里並無人居但有書生客死者葬在佛殿後南岡上價度其詩乃知是鬼為文弔之而去出㑹昌解頤錄太平廣記卷三百四十四
