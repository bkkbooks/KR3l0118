body:
  text: 太平廣記卷二十六神仙二十六葉法善邢和璞葉法善葉法善字道元本出南陽葉邑今居處州松陽縣四代修道皆以隂功密行及劾召之術救物濟人母劉因晝寐夢流星入口吞之乃孕十五月而生年七歳溺於江中三年不還父母問其故曰青童引我飲以雲漿故少留耳亦言青童引朝太上太上頷而留之弱冠身長九尺額有二午性淳和潔白不茹葷辛常獨處幽室或遊林澤或訪雲泉自仙府歸還已有役使之術矣遂入居卯酉山其門近山巨石當路每環廻為徑以避之師投符起石須臾飛去路乃平坦衆共驚異常遊括蒼白馬山石室内遇三神人皆錦衣寳冠謂師曰我奉太上命以密㫖告子子本太極紫微左仙卿以校錄不勤謫於人世速宜立功濟人佐國功滿當復舊任以正一三五之法今授於子又勤行助化宜勉之焉言訖而去自是誅蕩精恠掃馘凶袄所在經行以救人為志叔祖靖能頗有神術髙宗時入直翰林為國子祭酒武后監國南遷而終初髙宗徴師至京拜上卿不就請度為道士出入禁内及欲告成中岳扈從者多疾凡噀呪病皆愈二京受道籙者文武中外男女子弟千餘人所得金帛並修宫觀䘏孤貧無愛惜久之辭歸松陽經過之地救人無數蜀川張尉之妻死而再生復為夫婦師識之曰尸媚之疾也不速除之張死矣師投符而化為黑氣焉相國姚崇已終之女鍾念彌深投符起之錢塘江常有巨蜃時為人害淪溺舟檝行旅苦之投符江中使神人斬之除害殄凶𤣥功遐被各具本傳於四海六合名山洞天咸所周歴師年十五中毒殆死見青童曰天台苖君飛印相救於是獲蘇又師青城山趙元陽受遁甲與嵩陽韋善俊傳八史東入蒙山神人授書詣嵩山神仙授劒常行渉大水忽沉波中謂已溺死七日復出衣履不濡云暫與河伯遊蓬萊則天徴至神都請於諸名岳投奠龍璧中宗復位武三思尚秉國權師以頻察袄祥保䕶中宗相王及𤣥宗為三思所忌竄於南海廣州人庶夙仰其名北向候之師乘白鹿自海上而至止於龍興新觀逺近禮敬捨施豐多盡修觀宇焉歳餘入洪州西山養神修道景龍四年辛亥三月九日括蒼三神人又降傳太上之命汝當輔我睿宗及開元聖帝未可隱跡山巖以曠委任言訖而去時二帝未立而廟號年號皆以先知其年八月果有詔徴入京迨後平韋后立相王睿宗𤣥宗承祚繼統師於上京佐佑聖主凡吉凶動静必預奏聞㑹吐蕃遣使進寳函對曰請陛下自開無令他人知機密朝廷黙然唯法善曰此是凶函請陛下勿開宜令蕃使自開𤣥宗從之及令蕃使自開函中弩發中番使死果如法善言俄授銀青光祿大夫鴻臚卿越國公景龍觀主祖重精於術數明於考召有功於江湖間諡有道先生自有傳父慧明贈歙州刺史師請以松陽宅為觀賜號淳和御製碑書額以榮鄉里明年正月二十七日忽有雲鶴數百行列北來翔集故山徘徊三日瑞雲五色覆其所居是歳庚申六月三日甲申告化於上都景龍觀弟子既齊物尹愔覩真仙下降之事祕而不言二十一日詔贈金紫光祿大夫越州都督春秋百有七歳所居院異香芬郁仙樂繽紛有青烟直上燭天竟日方滅師請歸葬故鄉勅度其姪潤州司馬仲容為道士與中使監䕶葬于松陽詔衢婺括三州助葬供終所須發引日敕官縞衣祖送於國門之外開元初正月望夜𤣥宗移仗于上陽宫以觀燈尚方匠毛順心結搆綵樓三十餘間金翠珠玉間厠其内樓髙百五十尺微風所觸鏘然成韻以燈為龍鳯螭豹騰躑之狀似非人力𤣥宗見大悦促召師觀于樓下人莫知之師曰燈火之盛固無比矣然西凉府今夕之燈不亞於此𤣥宗曰師頃嘗遊乎曰適自彼來便蒙急召𤣥宗異其言曰今欲一往得乎曰此易耳於是令𤣥宗閉目約曰必不得妄視若誤有所視必有非常驚駭如其言閉目距躍已在霄漢俄而足已及地曰可以觀矣既覩燈火連亘數十里車馬駢闐士女紛委𤣥宗稱其盛者久之乃請回復閉目騰空而上頃之已在樓下而歌舞之曲未終𤣥宗於凉州以鏤鐡如意質酒翌日命中使託以他事使於凉州因求如意以還驗之非謬又嘗因八月望夜師與𤣥宗遊月宫聆月中天樂問其曲名曰紫雲曲𤣥宗素曉音律黙記其聲歸傳其音名之曰霓裳羽衣自月宫還過潞州城上俯視城郭悄然而月光如晝師因請𤣥宗以玉笛奏曲時玉笛在寢殿中師命人取頃之而至奏曲既投金錢於城中而還旬日潞州奏八月望夜有天樂臨城兼獲金錢以進𤣥宗累與近臣試師道術不可殫盡而所驗顯然皆非幻妄故特加禮敬其餘追岳神致風雨烹龍肉祛妖偽靈效之事具在本傳此不備錄又燕國公張説嘗詣觀謁師命酒説曰既無他客師曰此有麴處士者久隱山林性謹而訥頗耽於酒鍾石可也説請召之斯須而至其形不及三尺而腰帶數圍使坐于下拜揖之禮頗亦魯朴酒至杯盂皆盡而神色不動燕公將去師忽奮劒叱麴生曰曾無髙談廣論唯沉湎於酒亦何用哉因斬之乃巨榼而已嘗謂門人曰百六十年後當有術過我者來居卯酉山矣初師居四明之下在天台之東數年忽於五月一日有老叟詣門號泣求救門人謂其有疾也師引而問之曰某東海龍也天帝所敇主八海之寳一千年一更其任無過者超證仙品某已九百七十年矣微績垂成有婆羅門逞其幻法住於海峰晝夜禁呪積三十年矣其法將成海水如雲卷在天半五月五日海將竭矣統天鎮海之寳上帝制靈之物必為幻僧所取五日午時乞賜丹符垂救至期師敕丹符飛往救之海水復舊其僧愧恨赴海而死明日龍輦寳貨珍竒以來報師拒曰林野之中棲神之所不以珠璣寳貨為用一無所受因謂龍曰此厓石之上去水且逺但致一清泉即為惠也是夕聞風雨之聲及明繞山麓四面成一道石渠泉水流注經冬不竭至今謂之天師渠又一説云顯慶中法善奉命修黄籙齋于天台山道由廣陵明晨將濟𤓰州是日江干渡人艤舟而候時方春暮浦漵晴暖忽有黄白二叟相謂曰乘間可以圍碁為適乎即嚮空召㝠兒俄有丱童擘波而出衣無沾濕一叟曰挈碁局與席偕來須臾丱童如命設席沙上對坐約曰賭勝者食明日北來道士因大笑而下子良久白衣叟曰卿北矣幸無以味美見侵也曠望逡廵徐歩凌波逺逺而沒舟人知其將害法善也惶惑不寧及旦則有内官馳馬前至督備舟檝舟人則以昨日之所見具列焉内官驚駭不悦法善尋續而來内官復以舟人之辭以啓法善法善微哂曰有是乎幸無掛意時法善符術神驗賢愚共知然内官洎舟人從行之軰憂軫靡遑法善知之而促解纜發岸咫尺而暴風狂浪天日昬晦舟中之人相顧失色法善徐謂侍者曰取我黑符投之鷁首既投而波流静謐有頃既濟法善顧舟人曰爾可廣召宗侣㳂流十里之間或蘆洲菼渚有巨鱗在焉爾可取之當大獲其資矣舟人承敎不數里果有白魚長百尺許周三十餘圍殭暴沙上就而視腦有穴嵌然流膏舟人因臠割載歸左近村閭食魚累月出集異記及仙傳拾遺邢和璞邢先生名和璞善方術常擕竹算數計算長六寸人有請者到則布算為卦縱横布列動用算數百布之滿牀布數已乃告家之休咎言其人年命長短及官祿如神先生貌清羸服氣時餌少藥人亦不詳所生唐開元二十年至都朝貴候之其門如市能增人算夀又能活其死者先生嘗至白馬坂下遇友人友人已死信宿其母哭而求之和璞乃出亡人寘于床引其衾解衣同寢令閉戸眠熟良久起具湯而友人猶死和璞長嘆曰大人與我約而妄何也復令閉戸又寢俄而起曰活矣母入視之其子已蘇矣母問之其子曰被籙在牢禁繫栲訊正苦忽聞外曰王喚苦人官不肯曰訊未畢不使去少頃又驚走至者曰邢仙人自來喚苦人官吏出迎再拜恐懼遂令從仙人歸故生又有納少妾妾善歌舞而暴死者請和璞活之和璞墨書一符使置妾卧處俄而言曰墨符無益又朱書一符復命置於牀俄而又曰此山神取之可令追之又書一大符焚之俄而妾活言曰為一山神領從者數百人拘去閉宫門作樂酣飲忽有排戸者曰五道大使呼歌者神不應頃又曰羅大王使召歌者方駭仍曰且留少時須臾數百騎馳入宫中大呼曰天帝詔何敢輙取歌人令曳神下杖一百仍放歌人還于是遂生和璞此事至多後不知所適出紀聞太平廣記卷二十六
