body:
  text: 太平廣記卷二百五十六嘲誚四盧邁柳宗元陸暢平曾僧靈徹蘇芸李寰王璠韋蟾封抱一崔涯李宣古杜牧陸巖夢李逺李徳裕薛昭緯崔慎由鄭薰唐五經青龍寺客羅隐盧邁唐宰相盧邁不食鹽醋同列問曰足下不食鹽醋何堪邁笑而答曰足下終日食鹽醋又何堪矣出國史𥙷柳宗元唐柳宗元與劉禹錫同年及第題名於慈恩塔談元茂秉筆時不欲名字彰著曰押縫版子上者率多不達或即不久物故柳起草暗斟酌之張復已下馬徴鄧文佐名盡著版子矣題名皆以姓望而辛南容人莫知之元茂閣筆曰請辛先軰言其族望辛君適在他處柳曰東海人元茂曰爭得知柳曰東海之大無所不容俄而辛至人問其望曰渤海衆大笑慈恩題名起自張莒本於寺中閒遊而題其同年人因為故事出嘉話録陸暢唐陸暢雲陽公主降都尉劉氏朝士舉為儐相内人以陸吳音才思敏㨗凡所調戲應對如流復以詩嘲之陸亦酬和六宮大喜凡十餘篇嬪娥皆諷誦之例外别賜宫錦十叚楞伽瓶唾盂以賞之内人詩云十二層樓倚碧空鳯鸞相對立梧桐雙成走報監門衞莫使吳歈入漢宫或謂内學宋若蘭若昭姊妹所作陸酬曰粉面仙郎選聖朝偶逢秦女學吹簫須教翡翠聞王母不奈烏鳶噪鵲橋出雲溪友議平曾唐平曾恃才傲物多犯諱忌僕射薛平出鎮浙西投謁禮遇稍薄乃留詩以諷曰梯山航海幾﨑嶇來謁金陵薛大夫髭髪竪時趨劒㦸衣冠儼處拜氷壺誠知兩軸非珠玉深媿三縑䘏旅途今日楚江風正好不須廻首望句吳薛聞之遣吏追還縻留數日又獻縶白馬詩曰白馬披鬃練一團今朝被絆欲行難雪中放出空尋跡月下牽來只見鞍向北長鳴天外逺臨風斜鞚耳邊寒自知毛骨還應異更請孫陽仔細看薛覩詩曰若不留絆行軒那得觀其毛骨遂殊禮待之後遊蜀謁少師李固言時幕客皆名士曾每與諸客評論言笑彌日侍於李側輕忽無所畏遂獻雪山賦云雪山雖兹潔白之狀疊障攅風夏日清寒而無草木華茂為人採掇以李罕作文章發于専經也李覽賦命推出不踰旬貢鯸鮧魚賦言此魚觸物而怒翻身上波為鴟鳶所獲柰魴鱮何李覽賦笑曰昔趙元叔之狂簡袁彦伯之機捷無以過焉然愛其文彩投贄者無出於曾雖有忤不至深罪又作潼關賦刺中朝此關倚太華瞰黄河雖來往攸同而歎有異也出雲溪友議僧靈徹唐江西帥韋丹與東林僧靈徹忘形之契篇什唱和月四五焉序曰徹公近以匡廬七詠見寄及吟咏之皆麗絶於文圃也即蓮花峯石鏡虎跑泉聰明水白鹿洞鐡船橋康王廟為七詠此七詠者俾予益發歸歟之興且芳時勝侣上遊於三二道人必當攀躋千仞之峰觀九江之波是時也飄然而去不希京口之顧黙然而遊不假東門之送天地為一朝萬物任陶鑄夫青山羽翼松逕幽邃則何必措足於丹霄馳心於太古矣偶為思歸絶句詩一首以寄上人法友幸先達其深趣耳詩云王事紛紛無暇日浮生冉冉只如雲已為平子歸休計五老巖前必共君徹酬曰年老身閒無外事麻衣草座亦容身相逢盡道休官去林下何曾見一人出雲溪友議蘇芸嶺表多假吏而里巷目為使君而貧窶徒行者甚衆元和中進士蘇芸南地淹遊嘗有詩云郭裏多榕樹街中足使君闕李寰唐李寰鎮晉州表兄武㳟性誕妄又稱好道及蓄古物遇寰生日無餉遺乃箱擎一故皁襖與寰云此是李令公收復京師時所服願尚書功業一似西平寰謝之後聞知恭生日箱擎一破弊幞頭餉㳟曰知兄深慕高真求得一洪崖先生初得仙時幞頭願兄得道如洪崖賔僚無不大笑出因話録王璠唐王璠自河南尹拜右丞除書纔到少尹侯繼有宴以書邀之王判書後云新命雖聞舊銜尚在遽為招命堪入笑林中京以為語柄故事少尹與大尹遊宴禮隔雖除官亦須候正敕也出因話録韋蟾韋蟾左丞至長樂驛見李瑒給事題名走筆書其側曰渭水秦山照眼明希仁何事寡詩情只因學得虞姫壻書字纔能記姓名出摭言封抱一唐封抱一任櫟陽尉有客過之既短又患眼及鼻塞抱一用千字文語作嘲之詩曰面作天地𤣥鼻有雁門紫既無左達承何勞罔談彼出啓顔録崔涯唐崔涯吳楚狂士也與張祜齊名每題詩於倡肆無不誦之於衢路譽之則車馬繼來毁之則盃盤失措嘗嘲一妓曰雖得蘇方木猶貪玳瑁皮懐胎十箇月生下崑崙兒又布𫀆披襖火燒氊紙𥙷箜篌麻接弦更着一雙皮屐子紇梯紇榻出門前又嘲李端端云黄昏不語不知行鼻似煙忩耳似鐺獨把象牙梳插鬢崑崙山上月初生端端得詩憂心如病使院飲廻遙見二子躡屐而行乃道傍再拜兢惕曰端端祗候三郎六郎伏望哀之乃重贈一絶句以飾之云覓得黄騮鞁繡鞍善和坊裏取端端揚州近日渾成差一朶能行白牡丹於是豪富之士復臻其門或戲之曰李家娘子纔出墨池便登雪嶺何為一日黑白不均紅樓以為倡樂無不畏其嘲謔也祜涯久在維揚天下晏清篇詞縱逸貴達欽憚呼吸風生出雲溪友議李宣古唐澧州宴酒糺崔雲娘形貌瘦瘠每戲調舉罰衆賔兼恃歌聲自以為郢人之妙李宣古當筵一詠遂至箝口詩曰何事最堪悲雲娘只首竒瘦拳抛令急長嘴出歌遲只見肩侵髩唯憂骨透皮不須當户立頭上有鍾馗出雲溪友議杜牧唐杜牧罷宣州幕經陜有酒糺肥碩而詞讋牧贈詩云盤古當時有逺孫尚令今日逞家門一車白土將泥項十幅紅旗𥙷破裩瓦官寺裏逢行跡華嶽山前見掌痕不須啼哭愁難嫁待與將書問岳神出雲溪友議陸巖夢唐陸巖夢桂州筵上贈胡女子詩云自道風流不可攀那堪蹙額更頹顔眼睛深却湘江水鼻孔髙於華岳山舞態固難居掌上歌聲應不遶梁間孟陽死後欲千載猶有佳人覓往還出雲溪友議李逺唐進士曹唐遊仙詩才情縹緲岳陽守李逺毎吟其詩而思其人一日曹往謁之李倒屣而迎曹儀質充偉李戲之曰昔者未見標儀將謂可乘鸞鶴此際接見方知壯水牛亦恐不勝其載時人聞而笑之世謂渾詩逺賦不如不作非言其無才藻鄙其無教化也出北夢瑣言李徳裕唐衞公李徳裕武宗朝為相勢傾朝野及罪譴為人作詩曰蒿棘深春衞國門九年於此盗乾坤兩行密疏傾天下一夜隂謀達至尊肉視具僚亡七箸氣吞同列削寒溫當時誰是承恩者背有餘波達鬼村又云勢欲凌雲威觸天權傾諸夏力排山三年驥尾有人附一日龍髯無路攀畫閣不開梁燕去朱門罷掃乳鵶還千巖萬壑應惆悵流水斜傾出武關出盧氏雜記薛昭緯唐薛保遜大中朝尤肆輕佻因之侵侮諸叔故自起居舍人貶澧州司馬子昭緯頗有父風嘗任祠部員外時李系任禮部員外王蕘任主客員外正旦立仗班退昭緯朗吟曰左金烏而右玉兎天子旌旗蕘遽請其下句應聲答曰上李系而下王蕘小人行綴聞者靡不大哂天復中自臺丞累貶登州司馬中書舍人顔蕘當制略曰凌轢諸父代嗣其凶出摭言崔慎由唐自大中洎咸通白敏中入相次畢諴曹確羅劭權使相繼升巖廊宰相崔愼由曰可以歸矣近日中書盡是蕃人葢以畢白曹羅為蕃姓也始蔣伸登庸西川李景讓覽報狀歎曰不能事斯人也遽託疾離鎭有詩云成都十萬户抛若一鴻毛亦同愼由之誚也大夫趙崇卒侍郎吳雄歎曰本以畢白待之何乃乖於所望盖歉其不大拜而亦譏當時也出北夢瑣言鄭薫唐顔標咸通中鄭薰下狀元及第先是徐㓂作亂薰志在激勸勲烈謂標魯公之後故擢之首科既而問及廟院標曰標寒素京國無廟院薰始大悟塞黙久之時有無名子嘲曰主司頭腦太冬烘錯認顔標作魯公出摭言唐五經唐咸通中荆州書生號唐五經學識精博實曰鴻儒㫖趣甚高人所師仰聚徒五百以束修自給優游卒嵗有西河濟南之風幕寮多與之遊常謂人曰不肖子弟有三變第一變為蝗蟲謂鬻莊而食也第二變為蠧魚謂鬻書而食也第三變為大蟲謂賣奴婢而食也三食之輩何代無之出北夢瑣言青龍寺客唐乾符末有客寓止廣陵開元寺因文㑹話云頃在京寄青龍寺日有客嘗訪知事僧屬其怱遽不暇留連翌日至又遇要地朝客後時復來亦阻他事頗有怒色題其門而去曰龕龍去東海時日隐西斜敬文今不在碎石入流沙僧皆不解有沙彌頗解衆問其由曰龕龍去有合字存焉時日隐有寺字焉敬文不在有茍字焉碎石入沙有卒字焉此不遜之言辱我曹矣僧大悟追訪杳無跡矣客究沙彌乃懿皇朝云皓供奉也出桂苑叢譚羅隐唐裴筠婚蕭遘女問名未幾便擢進士第羅隐以一絶刺之略曰細看月輪還有意信知青桂近姮娥出摭言太平廣記卷二百五十六
