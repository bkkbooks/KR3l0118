body:
  text: 太平廣記卷一百八十九將帥一關侯簡文李密劉文靜李金才李靖郭齊宗唐休璟李盡忠封常清李光弼關侯蜀將關侯善撫士卒而輕士大夫張飛敬禮士大夫而輕卒伍二將俱不得其中亦不得其死出獨異志簡文晉簡文道光武云漢世祖雄豪之中最有俊令之體賢達之風髙祖則倜儻疎達魏武則猜忌狹吝出簡文談疏李密唐髙祖報李密書曰天生蒸人必有司牧當今為牧非子而誰老夫年餘知命願不及此欣戴大弟攀鱗附翼唯冀早膺圖籙以寧兆庶宗盟之長屬籍見容復封於唐斯榮足矣殪商辛於牧野所不忍言執子嬰於咸陽非敢聞命密得書甚悦示其部下曰唐公見推天下不足可定後密兵敗王伯當保河陽密以輕騎歸之謂伯當曰兵敗矣久苦諸君我今自刎請以謝衆伯當抱密號呌密復曰諸公幸不相棄當共歸關中密身雖媿無功諸君必保富貴伯當賛其計從入關者尚二萬人髙祖遣使迎勞相望於道密大喜謂其徒曰吾雖舉事不成而恩結百姓山東連城數百知吾至盡當歸唐比於竇融勲亦不細豈不以一台司見處乎及至京禮數益薄執政者又來求財意甚不平尋拜光祿卿封邢國公未幾聞其所部將帥皆不附世充髙祖復使密領本兵往黎陽招其將士故時者以經略王充王伯當為左武衛亦令副密行至桃林髙祖復徵之密懼謀叛伯當止密不從密據桃林縣城驅掠畜産直趨南山乘險而東遣人使告張善相令應接時史萬寳留鎮熊州遣盛彦師率歩騎數十追躡至陸渾縣南七十里彦師伏兵山谷密軍半度横出撃之遂斬密年三十七時徐勣在黎陽為密堅守髙祖遣使將密首以招之勣發喪行服備君臣之禮表請收塟大具威儀三軍皆縞素塟於黎陽山南五里故人哭之多有嘔血者出談賔錄劉文靜劉文靜者為晉陽令坐與李密連姻隋煬帝繋於郡獄太宗以文靜可與謀議入禁所視之文靜大喜曰天下大亂非湯武髙光之才不能定也太宗曰卿安知無人禁所非兒女之情相憂而已故來與君圖舉大計文靜曰乘虛入關號令天下不盈半歳帝業可成太宗笑曰君言正合人意後使於突厥文靜謂曰願與可汗兵馬同入京師人衆土地入唐公財帛金寳入突厥即遣騎二千隨文靜而至髙祖每引重臣同座共食文靜奏曰宸極位尊帝座嚴重乃使太陽俯同萬物臣下震恐無以措身出談賔錄李金才太宗嘗進白髙祖曰代𫝊李氏姓膺圖籙李金才位望崇貴一朝族滅大人受命討捕其可得乎誠能平賊即又功當不賞以此求免其可得乎高祖曰我一夜思量汝言大有理今日破家滅身亦由汝化家為國亦由汝出譚賔錄李靖貞觀十四年侯君集薛萬鈞等破高昌降其王麴智盛執之獻捷於觀徳殿以其地為西州置交河桞中等縣其界東西八百里南北五百里漢戊巳校尉之地初突厥屯兵浮圖城於高昌為影響至是懼而來降其地為延州突厥頡利可汗使執失思力入朝謝罪請為藩臣太宗遣唐儉等持節出塞安撫之李靖張公謹於定襄謀曰詔使到彼虜必自寛選精騎齎二十日糧乘間掩襲遇其斥候皆以俘隨奄到縱擊遂滅其國獲義城公主虜男女十萬頡利乘千里馬奔於西偏靈州行軍張寳相擒之以獻出譚賔錄郭齊宗高宗問兵書所云天陣地陣人陣各何謂也員半千越次對曰臣覩載籍此事多矣或謂天陣星宿孤虛也地陣山川向背也人陣偏伍彌縫也郭齊宗對曰以臣愚見則不然夫師出以義有若時雨此天陣也兵在足食足兵且耕且戰得地之利此地陣也卒乘輕利將帥和睦此人陣也若用兵使三者去一其何以戰高宗嗟賞之擢拜左衞胄曹郎出盧氏雜説唐休璟西突厥諸蕃不和舉兵相攻安西道絕表奏相繼天后命唐休璟與宰相商度事勢俄頃間草奏使施行後十餘日安西諸州表奏兵馬應接程期一如休璟所畫天后謂休璟曰恨用卿晩因任之為相出譚賔録李盡忠唐天后中契丹李盡忠萬榮之破營府也以地牢囚漢俘數百人聞麻仁節等諸軍欲至乃令守囚霫等紿之曰家口饑寒不能存活求待國家兵到吾等即降其囚日别與一頓粥引出安慰曰吾此無飲食養汝又不忍殺汝總放歸若何衆皆拜伏乞命乃紿放去至幽州具說饑凍逗留兵士聞之爭欲先入至黄麞峪賊又令老者投官軍送遺老牛瘦馬於道側麻仁節等三軍棄歩卒將馬先爭入被賊設伏横截軍將被索䌈之生擒節等死者塡山谷罕有一遺出朝野僉載封常清封常清細瘦目纇脚短而跛髙僊芝為夫䝉靈詧都知兵馬使常清為僊芝傔㑹達覽部落皆叛自黑山北向西趨碎葉使僊芝以騎二千邀截之常清於幕中潜作捷書僊芝所欲言無不周悉僊芝異之軍廻僊芝見判官劉眺獨孤峻等遂問曰前有捷書何人所作副大使何得有此人僊芝曰即傔人封常清也見在門外馬邊眺等揖僊芝命常清進坐與語如舊相識後僊芝為安西節度使奏常清為節度判官僊芝每出征討常令常清知留後事常清有才學果決僊芝乳母子鄭徳詮已為郎將威望動三軍徳詮見常清出其門素易之走馬突常清而去常清至使院命左右密引至㕔經數重門皆隨後閉之常清案後起謂之曰常清起自細微預中丞傔中丞再不納郎將豈不知乎今中丞過聽以常清為留後使郎將何得無禮對中使相凌因叱之命勒廻即杖六十面仆地曳出僊芝妻及乳母於門外號哭救之不得後僊芝見常清遂無一言常清亦不之謝後充安西節度使天寳十四載朝於華清宫𤣥宗問以兇逆之事計將安出常清乃大言以慰𤣥宗之意曰臣請挑馬箠渡河計日取逆胡首懸於闕下𤣥宗憂而壯其言至東都旬朔召募六萬頻戰不利遂與髙僊芝退守潼關僊芝副榮王琬領五萬人進擊十二月十日至陜州十一日常清敗於東京十三日祿山入東京常清奔至陜州以賊鋒不可當乃燒太原倉引兵退趨潼關繕修守具賊尋至關不能入僊芝之力乃削常清官爵令白衣於僊芝軍效力監軍邊令誠每事干之僊芝多不從令誠入奏事具言奔敗之狀𤣥宗怒遣令誠斬之常清臨刑上表既刑陳其屍於籧篨之上令誠謂僊芝曰大夫亦有恩命僊芝遽下至常清所刑處僊芝曰我退罪也死不敢辭然以為我減截兵糧及賜物則誣我也謂令誠曰上是天下是地兵士皆在豈不知乎兵士齊呼曰枉其聲殷地僊芝目常清屍曰封二子從微至著我引㧞子代我為節度今日又與子同死於此豈命也乎遂斬之出譚賔録李光弼李光弼討史思明師於野水渡既夕還軍留其卒一千人謂雍顥曰賊將高暉李日越喻文景皆萬人敵也思明必使一人劫我我且去之子領卒待賊於此至勿與戰降則俱來其日思明召日越曰李君引兵至野水此成擒也汝以鐡騎宵濟為我取之命曰必獲李君不然無歸日越引騎五百晨壓顥軍顥阻濠休卒吟嘯相視日越怪之問曰太尉在乎曰夜去矣兵幾何曰千人將謂誰曰雍顥也日越沉吟久謂其下曰我受命必得李君今獲顥不塞此望必見害不如降之遂請降顥與之俱至光弼又嘗伏軍守河陽與史思明相持經年思明有戰馬千匹每日洗馬於河南以示其多光弼乃於諸營檢獲牝馬五百匹待思明馬至水際盡驅出之有駒縶於城中羣牝嘶鳴無復間斷思明戰馬悉浮渡河光弼盡驅入營光弼又嘗在河陽聞史思明已過河遠廻趨東京至謂留守韋陟曰賊乘我軍之敗難與爭鋒洛城無糧又不可守公計若何陟曰加兵陜州退守潼關光弼曰此葢兵家常勢非用竒之策也不若移軍河陽北阻澤潞據三城以抗之勝即擒之敗即自守表裡相應使賊不敢西侵此則猿臂之勢也思明至偃師光弼悉令將士赴河陽獨以麾下五百餘騎為殿軍當石橋路秉燭徐行賊不敢逼乙夜達城遲明思明悉衆來攻諸將决死而戰殺賊萬餘衆生擒八十人器械糧儲萬計擒其大將徐璜王李秦思明大懼退築城以相拒光弼將戰謂左右曰凡戰危事勝負繫之光弼位為三公不可死於賊手事之不捷誓投於河適城上見河稍逺恐或急事難至遂置劒於鞾中有必死之志及是戰勝於城西西望拜舞三軍感動移鎮臨淮舁疾而行徑赴泗州光弼之未至河南也田神功平劉展後逗留於楊府尚衡殷仲卿相攻於兖鄆來瑱旅拒而還襄陽朝廷患之及光弼至徐州史朝義退走田神功遽歸河南尚衡殷仲卿來瑱皆懼其威名相繼赴關吐蕃將犯上都手詔追光弼率衆赴長安光弼與程元振不叶觀天下之變遷延不至初光弼用師嚴整天下服其威名凡所號令諸將不敢仰視及其後田神功等諸軍皆不受其制因此不得志愧耻成疾薨於徐州年五十七其母衰老荘宅使魚朝恩弔問出譚賔録太平廣記卷一百八十九
