body:
  text: 太平廣記卷二百六十五輕薄一劉祥劉孝綽汲師許敬宗盈川令崔湜杜審言杜甫陳通方李賀崔駢李羣玉馮涓温庭筠西川人河中幕客陳磻叟崔照符温定薛能髙逢休劉祥東莞劉祥恃才傲物嘗謂一驢曰汝努力如汝輩已為令僕矣復作連珠譏諷朝廷尋被誅出談藪劉孝綽梁劉孝綽輕薄到洽洽本灌園者洽謂孝綽曰某宅東家有好地擬買被本主不肯何計得之孝綽曰卿何不多輦其糞置其墉下以苦之洽死恨孝綽竟被傷害出家話録汲師汲師滑州人也自溧水尉拜監察御史時大夫李乾祐為萬年令師按縣獄乾祐差池而出晚師怒不顧而出銜之乾祐尋廵察韋務静與師鄉里充乾祐判官㑹制書拜乾祐中丞乾祐顧謂務静曰邑子可出矣足下可入矣遂左授新樂令性躁率時直長李冲寂即髙宗從弟也微有犯師將彈而謂之呼冲寂為弟冲寂謂之曰冲寂主上從弟公姓汲於皇家何親而見呼為弟師慙而止嘗監享太廟責署官將彈之署官徹曉伺其失汲履赤舄如厠共訐之乃止出御史臺記許敬宗已見二百四十九卷本𫝊唐許敬宗性輕見人多忘之或謂其不聰曰卿自難識若是曹劉沈謝暗中摸索著亦可識出國史纂異盈川令唐衢州盈川縣令楊炯詞學優長恃才簡倨不容於時每見朝官目為麒麟楦許怨反人問其故楊曰今餔樂假㺯麒麟者刻畫頭角修飭皮毛覆之驢上巡塲而走及脫皮褐還是驢馬無徳而衣朱紫者與驢覆麟皮何别矣出朝野僉載崔湜崔湜之為中書令張嘉貞為舍人湜輕之常呼為張底後曽量數事意皆出人右湜驚美久之謂同列曰知否張底乃我輩一般人此終是其坐處湜死後十餘年河東竟為中書令出國史纂異杜審言杜審言初舉進士恃才謇傲甚為時輩所妬蘇味道為天官侍郎審言參選試判後謂人曰蘇味道必死人問其故審言曰見吾判即當羞死矣又問人曰吾之文章合得屈宋作衙官書跡合得王羲之北面其矜誕如此貶吉州司户司馬周季重員外司户郭若訥共構審言罪狀繫獄將因事殺之既而季重等酣宴審言子并年十三懐刀以擊季重重中創而死并亦為左右所殺出譚賔録杜甫杜工部甫在蜀醉後登嚴武之牀厲聲問武曰公是嚴挺之兒否武色變甫復曰僕乃杜審言孫子武少解矣出摭言陳通方陳通方閩縣人真元十年顧少連下進士及第時屬公道大開採掇孤俊通方年二十五第四人及第以其年少名髙輕薄自負與王播同年王時年五十六通方薄其成事後時因期集戲拊其背曰王老王老奉贈一第言其日暮途逺及第同贈官也王曰擬應三篇通方又曰王老一之謂甚其可再乎王心每貯之通方尋值家艱還歸王果累捷髙科官漸達矣通方後履人事入闗王已丞郎判鹽鐵通方窮悴寡坐不知王素銜其言投之求救同年李虛中時為副使通方亦有詩扣之求為汲引云應念路傍憔悴翼昔年喬木幸同遷王不得已署之江西院官赴職未及其所又改為浙東院僅至半程又改與南陵院如是往復數四困躓日甚退省其咎謂甥姪曰吾偶戲謔不知王生遽為深憾人之於言豈合容易哉尋值王真拜禮分懸絶追謝無地悵望病終出閩川多士𫝊李賀元和中進士李賀善為歌篇韓愈深所知重於縉紳間每為延譽由此聲華藉甚時元稹年少以明經擢第一攻篇什常交結於賀一日執贄造門賀覽刺不容遽入僕者謂曰明經及第何事來㸔李賀稹無復致情慙憤而退其後自左拾遗制䇿登科日當要路及為禮部郎中因議賀祖諱晉不合應舉賀亦以輕薄為時輩所排遂致轗軻韓愈惜其才為著諱辯録明之然竟不成名出劇談録崔駢李徳裕退朝歸第多與親表裴璟無間破體笑語李多詢以内外新事李問更有何說裴曰别無新事但昨日坡下郎官集送某郎官出牧江湖飲餞郵亭人客甚衆有倉部白員外末至崔駢郎中作録事下四籌白自以卑秩人乗凌兢更不敢固辭上次酌四大器白連引三器訖餘一持之而請第四器名崔郎中云亦别無事但何必要到處出脫時白踉蹌仆於下座竟不飲而去坐上有笑者有縮頸者但不知此官人今日起得否李聞之大怒曰何由可耐不斯言必有之乎曰固然又問弟知白員外所止否璟曰是人在某坊某曲李曰為某𫝊語白員外請至宅白捧命又憂恐比至李曰久欲從容中外事併然旬朔不要出人事既而白授翰林學士崔駢汾州刺史續改洺州刺史流落外任不復更遊郎署終鴻臚卿出芝田録李羣玉李羣玉字文山性輕率多侮戲人常假江陵幕客書求丏於澧州刺史艾乙李謂艾曰小生病且甚矣幸使君痛救之李以戲其姓之僻也羣玉以其輕脫而濟之不厚矣出北夢瑣言馮涓大中四年進士馮涓登第榜中文譽最髙是嵗新羅國起髙樓厚齎金帛奏請撰記時人滎之初除京兆府參軍恩地即杜相審權也杜有江西之拜制書未行先召涓宻語延辟之命欲以牋奏任之戒令勿泄涓拜謝辭出速鞭而歸遇友人鄭賨見其喜形於色駐馬懇謁涓遽以恩地之辟告之賨尋捧刺詣京兆門謁賀具言得於馮先輩也京兆嗟憤而鄙其淺薄洎制下開幕馮不預焉心緒憂疑莫知所以連車發日自灞橋乗肩輿門生咸在長樂候别京兆長揖馮曰勉旃由是囂浮之譽徧於縉紳竟不通顯問又渉交通中貴愈招清議官至祠部郎中眉州刺史仕蜀至御史大夫出北夢瑣言温庭筠開明中温庭筠才名藉甚然而罕拘細行以文為貨識者鄙之無何執政間復有誣奏庭筠攪擾塲屋出隨州方城縣尉時中書舍人裴坦當制忸怩含毫久之時有老吏在側因訊之升黜對曰舍人合為責詞何者入䇿進士與望州長馬齊資坦釋然故有澤畔長沙之比庭筠之任文士争為詞送唯計唐夫得其尤曰何事明時泣玉頻長安不見杏園春鳯凰詔下雖霑命鸚鵡才髙却累身且飲醁􅌬消積恨莫辭黄綬拂行塵方城若比長沙逺遊隔千山與萬津出摭言西川人蜀東西川之人常互相輕薄西川人言梓州者乃我東門之草市也豈得與我為耦哉節度栁仲郢聞之謂幕客曰吾立朝三十年清華備歴今日始得與西川作市令聞者皆笑之故世言東西兩川人多輕簿出北夢瑣言河中幕客相國劉瞻父景連州人少為漢南鄭司徒掌牋奏因題商山驛側泉石鄭大竒之勉以進修俾前驛換麻衣執贄見之後致解薦擢進士第歴臺省瞻相孤貧有藝雖登第不預急流任大理評事日饘粥不給嘗於安國寺相識僧處求餐留所業文數軸置在僧几致仕軍容劉𤣥翼逰寺見瞻文卷甚竒之憐其貧窶厚有濟䘏又知其連州人朝無彊援謂僧曰某雖閒棄必能為此人致宰相爾後授河中少尹幕寮有貴族浮薄者蔑視之一旦有命徵入府尹祖之前之輕薄幕客呼瞻為尹公曰歸朝作何官職瞻對曰得路即作宰相同舍郎大笑之在席亦有異其言者瞻自是以水部員外知制誥旋入翰林以至大拜也出北夢瑣言陳磻叟陳磻叟父岵富有詞學尤溺於内典長慶中常注維摩經進上有中㫖令與好官執政謂岵因内道塲僧進京頗抑挫之止授少列而已磻叟形質短小長喙疎齒尤富文學自負王佐之才大言騁辯雖接對公相旁若無人復自料非名教之器弱冠度為道士𨽻名於昊天觀咸通初降聖之辰三教論議黄衣屢北帝小不懌宣下令後輩新入内道塲有能折衝浮圖者許以自薦磻叟攝衣奉詔時釋門為主論目誤引湼槃經疏義磻叟應聲叱之曰皇帝山呼大慶阿師口稱獻夀而經引湼槃犯大不敬始其僧謂磻叟不通佛書既而錯愕殆至顛墮自是連挫數輩聖顔大恱左右呼萬嵗其日簾前賜紫衣一襲磻叟繇是恣其輕侮髙流宿德多患之潛聞帝聽云磻叟衣冠子弟不願在冠帔思理一邑以自効耳於是中㫖授池州至徳縣令磻叟莅事未終考秩抛官詣闕上事通義劉瞻引為羽翼非時詔對數刻磻叟所陳凡數十節備究時病復曰臣請破邊瑊一家可以贍軍一二年上問邊瑊何人對曰宰相路巖親吏既而大為巖恚怒翌日敕以磻叟誣㒺上聼詆訐大臣除名為民流愛州磻叟雖至顛蹶輙不以其道自屈素有重膇之疾歴聘藩后率以肩輿造墀廡所至無不仰止及巖貶磻叟得量移為鄧州司馬時屬廣明庚子之後劉巨容起徐將得襄陽不能知磻叟待以巡屬一州佐耳磻叟㳂漢南下中途與巨容幕吏書云已出無禮之鄉漸入逍遙之境巨容得之大怒遣健歩十餘輩移牒潭鄂追捕磻叟時天下喪亂無人為之隄防既而為卒伍所凌全家泝漢至賈壍後門殺之三十餘口無遺𩔖矣出摭言崔昭符皮日休南海鄭愚門生春闗内嘗宴於曲江醉寢於别榻衣囊書笥羅列傍側率皆新飾同年崔昭符鐐之子固蔑視之矣亦醉更衣見日休謂其素所熟狎者即伺問且欲戲之日休僮僕遽前欲呼之昭符知其日休也曰勿呼之渠方宗㑹矣以其囊笥皆皮也時人𫝊之以為口實日休嘗遊江漢間時劉允章鎮江夏幕中有穆判官者允章親也或譖日休薄焉允章素使酒一日方宴忽怒曰君何以薄穆判官乎君知身之所來否鸚鵡洲在此即黄祖沈襧衡之所也一席為之懼日休垂涕而已出玉泉子又一說東都留守劉允章文學之宗氣頗髙介後進循常之士罕有敢及門者咸通中自禮部侍郎授鄂州觀察使明年皮日休登第將歸覲於蘇臺路由江夏因投刺焉劉待之甚厚至於饔餼有加等留連累日仍致宴於黄鶴樓以命之監軍使與參佐悉集後日休方赴召已酒酣矣既登樓劉以其末至復乗酒應命心薄之及酒數行而日休吐論紛擾頓亡禮敬劉作色謂曰吳兒勿恃蕞爾之才且可主席日休答曰大夫豈南岳諸劉乎何倨貴如是劉大怒㦸手遙指而詬曰皮日休知鸚鵡洲是襧衡死處無日休不敢答但嵬峩如醉掌客者扶出翌日微服而遁於浙左出三水小牘温定乾符四年新進士曲江春讌甲於常年有温定者久困塲籍坦率自恣尤憤時之浮薄因設竒以侮之至其日蒙衣肩輿金翠之飾夐出於衆侍婢皆稱是徘徊於栁陰之下俄頃諸公自露棚移樂登鷁首既而謂是豪貴其中姝麗必矣因遣促舟而進莫不注視於此或肆調謔不已羣興方酣定乃於簾間垂足定膝脛極偉而長毳衆忽覩之皆掩袂亟命廻舟避之或曰此必温定也出摭言薛能薛能以文章自負而累出戎鎮常鬱鬱歎息因有詩謝淮南寄天柱茶其落句云粗官乞與真抛却賴有詩情合得嘗意以節將為粗官也鎮許昌日幕吏咸集因令其子􅐤鞬參諸幕客幕客驚怪能曰俾渠消災時人以為輕薄出北夢瑣言髙逢休顧雲大順中制同羊昭業等十人修史雲在江淮遇諫議髙逢休時僕射劉崇龜清名雅譽充塞縉紳其弟崇望復在中書雲以逢休與崇龜舊交將造門希致先容逢休許之久矣雲臨岐請書逢休授之一函甚草創雲微有惑因取所授潛閱啓之凡一幅並不言雲但曰羊昭業擬將一尺三寸汗脚踏他燒殘龍尾道懿皇帝雖薄徳不任被前件人羅織執大政者亦大悠悠雲吁歎而已出摭言太平廣記卷二百六十五
