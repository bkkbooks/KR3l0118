body:
  text: 太平廣記卷一百七十四俊辯二陽玠薛道衡薛收張後裔崔仁師盧莊道許敬宗胡楚賓裴琰之蘓頲王勮李白栁芳王藻韓愈李程李吉甫王生辛丘度温庭筠栁公權權德輿東方朔李彪班蒙幼敏陳元方孫䇿鍾毓孫齊由陸琇王絢蕭遙欣房氏子張琇渾瑊俊辯陽玠隋京兆杜公瞻衛尉臺卿猶子也嘗邀陽玠過宅酒酣因而嘲謔公瞻謂兄既姓陽陽貨實辱孔子玠曰弟既姓杜杜伯嘗射宣王殿内將軍隴西牛子充寮友推其機辯嘗謂玠曰君陽有玠恐不任厨玠曰君牛既充正可烹宰又見玠食芥葅曰君身名玠何得復啖芥葅對曰君既姓牛何得不斷牛肉有太倉令張䇿者在雲龍門與玠議理屈謂玠曰卿本無德量忽共叔寶同名玠抗聲曰爾既非英雄敢與伯符連諱太子洗馬蘭陵蕭詡爽俊有才辯嘗謂玠曰流共工於幽州易北恐非樂土玠曰放驩兜於崇山江南豈是勝地錄尚書晉昌王唐邕問諸省官曰卿等宜道本州寶物定州人以綾綺為寶滄州人以魚鹽為寶及至玠邕曰卿幽州人以何物為寶答曰刺史嚴明文武奉法此幽州之寶也邕有媿色出談藪薛道衡隋吏部侍郎薛道衡嘗遊鍾山開善寺謂小僧曰金剛何為努目菩薩何為低眉小僧答曰金剛努目所以降伏四魔菩薩低眉所以慈悲六道道衡憮然不能對出談藪薛收唐薛收在秦府檄書露布多出於收占辭敏速皆同宿搆馬上即成曾無㸃竄出譚賓錄張後裔張後裔在并州太宗就受春秋左氏傳後因召入賜讌言及平昔從容謂曰今日弟子何如後裔對曰昔孔子領徒三千逹者無子男之位臣翼贊一人即為萬乗主計臣此功愈於先聖太宗大悦即賜馬五匹後為禮部尚書陪𦵏昭陵出譚賓錄崔仁師崔仁師為度支郎中嘗陛奏度支錢物數千言手不執本太宗怪之令杜正倫賫本仁師對唱一無差殊刑部以反逆緣坐兄弟没官為輕改從死仁師議以為父子天屬昆季同氣誅其父子足累其心此而不顧何愛兄弟既欲改法請審商量竟從仁師議出譚賓錄盧莊道盧莊道范陽人也天下稱為名家聰慧敏悟冠於今古父彥與髙士廉有舊莊道少孤年十二造士廉廉以故人子引令坐㑹有上書者莊道竊窺覽謂士廉曰此文莊道所作士廉怪謂曰後生勿妄言為輕薄之行請誦之果通復請倒誦又通士廉稱歎乆之乃跪謝曰此文實非莊道所作向傍窺而記耳士廉取他文及案牘命讀之一覽而倒誦并呈示所撰文章士廉具以聞太宗召見䇿試擢第年十六授河池尉滿二嵗制舉擢甲科召見太宗曰此是朕聰明小兒邪特授長安尉太宗將省囚徒莊道年纔二十縣令以幼年懼不舉將以他尉代之莊道不從時繫囚四百餘人俱預書狀莊道但閒暇不之省也令丞等憂懼屢以為言莊道從容自若翌日太宗召囚莊道乃徐書狀以進引諸囚入莊道對御評其罪狀輕重留繫月日應對如神太宗驚嘆即日拜監察御史出御史臺記許敬宗髙宗東封竇德𤣥騎而從上問德𤣥曰濮陽古謂之帝丘何也德𤣥不能對許敬宗䇿馬前對所問上意稱善敬宗退而告人曰大臣不可無學吾向見德𤣥不能對心實羞之德𤣥聞之曰人各有能有不能善守其拙不彊所不知也李勣曰敬宗多聞信美矣德𤣥之言亦善也出譚賓錄胡楚賓胡楚賓屬文敏速每飲酒半酣而後操筆髙宗每令作文必以金杯盛酒令飲便以杯賜之出譚賓錄裴琰之裴琰之作同州司戸年纔弱冠但以行樂為事略不為案牘刺史譙國公李崇義怪之而問戸佐佐曰司戸達官兒郎恐不閑書判既數日崇義謂琰之曰同州事物固繁司戸尤甚公何不别求京官無為滯此司也琰之唯諾復數日曹事委積諸竊議以為琰之不知書但遨遊耳他日崇義召之厲色形言將奏免之琰之出謂其佐曰文案幾何對曰遽者二百餘琰之曰有何多如此逼人命每案後連紙十張仍命五六人以供研墨㸃筆左右勉唯而已琰之不之聽語主案者略言事意倚柱而斷之詞理縱横文華粲爛手不停綴落紙如飛傾州官僚觀者如堵牆驚嘆之聲不已也案達於崇義崇義初曰司戸解判邪戸佐曰司戸太髙手筆仍未之竒也比四五十案詞彩彌精崇義悚怍召琰之降階謝曰公之詞翰若此何忍藏鋒成鄙夫之過是日名動一州數日聞於京邑㝷擢授雄州司戸出御史臺記蘇頲蘇頲聰悟過人日誦數千言雖記覽如神而父瓌訓勵嚴至常令衣青布𥜗伏於牀下出其脛受榎楚及壯而文學該博冠於一時性疎俊嗜酒及𤣥宗既平内難將欲草制書甚難其人顧謂瓌曰誰可為詔試為思之瓌曰臣不知其他臣男頲甚敏捷可備指使然嗜酒幸免沾醉足以了其事𤣥宗遽命召來至時宿酲未解粗備拜舞嘗醉嘔殿下命中人扶卧於御前𤣥宗親為舉衾以覆之既醒授簡筆立成才藻縱横詞理典贍𤣥宗大喜撫其背曰知子莫若父有如此邪由是器重已注意於大用矣韋嗣立拜中書令瓌署官告頲為之辭薛稷書時人謂之三絶頲纔能言有京兆尹過瓌命頲詠尹字乃曰丑雖有足甲不全身見君無口知伊少人瓌與東明觀道士周彥雲素相往來周時欲為師建立碑碣謂瓌曰成某志不過煩相君諸子五郎文六郎書七郎致石瓌大笑口不言而心服其公瓌子頲第五詵第六氷第七詵善八分出明皇雜錄王勮王勮絳州人開元中任中書舍人先是五王出閣同日受册有司忘載册文百官在列方知闕禮勮召小吏五人各執管口授分冩一時俱畢出摭言李白開元中李翰林白應詔草白蓮花開序及宫詞十首時方大醉中貴人以冷水沃之稍醒白於御前索筆一揮文不加㸃出摭言桞芳李幼竒者開元中以藝干桞芳嘗對芳念百韻詩芳已暗記便題之於壁不差一字謂幼竒曰此吾之詩也幼竒大驚異之有不平色久之徐曰聊相戲耳此君所念也因請幼竒更誦所著文章皆一遍能冩出尚書故實王藻王藻王素貞元初應舉齊名第十四每偕往還通家稱十四郎或問曰藻素也出傳載韓愈李河南素替杜公兼時韓吏部愈為河南令除職方員外歸朝問前後之政如何對曰將兼來比素出𫝊載李程李相國程執政時嚴謩嚴休皆在南省有萬年令闕人多屬之李云二年不知謩出𫝊載李吉甫憲宗久親政事忽問京兆尹幾員李相吉甫對曰京兆尹三員一員大尹二員少尹以為善對出國史補王生或問羅浮王生曰為政難易曰簡則易又問儒釋同否曰直則同出國史補辛丘度元和十五年辛丘度紓杜元頴同時為遺補令史分直故事但舉其姓曰丘杜當入出傳載温庭筠㑹昌毁寺時分遣御史檢天下所廢寺及收錄金銀佛像有蘇監察者不記名巡檢兩街諸寺見銀佛一尺已下者多袖之而歸人謂之蘇扛佛或問温庭筠將何對好遽曰無以過蜜陀僧也出尚書故實桞公權桞公權武宗朝在内庭上嘗怒一宫嬪久之既而復召謂公權曰朕怪此人然若得學士一篇當釋然矣目御前蜀牋數十幅授之公權略不佇思而成一絶曰不分前時忤主恩已甘寂寞守長門今朝却得君王顧重入椒房拭淚痕上大悦賜錦綵二百匹令宫人上前拜謝之出摭言權德輿權丞相德輿言無不聞又善廋詞嘗逢李二十六於馬上廋詞問答聞者莫知其所説焉或曰廋詞何也曰𨼆語耳語不曰人焉廋哉人焉廋哉此之謂也出嘉話錄東方朔漢武帝嘗以𨼆語召東方朔時上林獻棗帝以杖擊未央前殿檻曰叱叱先生束束朔至曰上林獻棗四十九枚乎朔見上以杖擊檻兩木兩木林也束束棗也叱叱四十九也出東方朔傳又東方朔常與郭舍人於帝前射覆郭曰臣願問朔一事朔得臣願榜百朔窮臣當賜帛曰客來東方歌謳且行不從門入踰我垣牆遊戲中庭上入殿堂擊之拍拍死者攘攘格鬭而死主人被創是何物也朔曰長喙細身晝匿夜行嗜肉惡烟常所拍捫臣朔愚戇名之曰蟁舍人辭窮當復脱褌出東方朔傳李彪後魏孝文皇帝嘗殿㑹羣臣酒酣歡極帝因舉巵屬羣臣及親王等酒曰三三横兩兩縱誰能辨之賜金鍾御史中尉李彪曰沽酒老嫗甕注𤬪屠兒割肉與稱同尚書左丞甄琛曰吳人浮水自云工技兒擲袖在虛空彭城王勰曰臣思解此是習字髙祖即以金鍾賜彪朝廷服彪聰明有知甄琛和之亦速出伽藍記班蒙唐太保令狐相綯出鎭淮南日支使班蒙與從事俱遊大明寺之西廊忽觀前壁所題云一人堂堂二曜同光泉深尺一㸃去氷傍二人相連不欠一邉三梁四柱列火然除却雙勾兩日全諸賓幕顧之駐足良久莫之能辨獨班蒙曰一人豈非大字乎二曜者日月非明字乎尺一者十一寸非寺字乎㸃去氷水字二人相連天字不欠一邉下字三梁四柱而列火然無字兩日除雙勾比字得非大明寺水天下無比乎衆皆欣然曰黄絹之竒智亦何異哉稱歎彌日詢之老僧曰頃年有客獨遊題之而去不言姓氏出桂苑叢談㓜敏陳元方漢末陳太丘實與友人期行過期不至太丘捨去去後乃至其子元方年七嵗在門外戲客問元方尊君在否答曰待君不至已去友人便怒曰非人與人期行相委而去元方曰君與家君期日中時過申不來則是無信對子罵父則是無禮友人慙下車引之元方遂入門不顧出商芸小説孫䇿吳孫䇿年十四在壽陽詣袁術始至俄而劉豫州備到便求去袁曰劉豫州何闗君答曰不爾英雄忌人即出下東堦而劉備從西堦上但轉顧視孫之行歩殆不復前出語林鍾毓鍾毓鍾㑹少有令譽年十三魏文帝聞之語其父繇曰令卿二子來於是敕見毓面有汗帝問曰卿面何以汗毓對曰戰戰惶惶汗出如漿復問㑹卿何以不汗出㑹對曰戰戰慄慄汗不得出又値其父晝寢因共偷服散酒其父時覺且假寐以觀之毓拜而後飲會飲而不拜既問之毓曰酒以成禮不敢不拜又問㑹何以不拜㑹曰偷本非禮所以不拜出小説孫齊由孫齊由齊莊二人小時詣庾公公問齊由何字曰齊由公曰欲何齊邪曰齊許由又問齊莊何字答曰齊莊公曰欲齊何邪曰齊莊周公曰何不慕仲尼而慕莊周答曰聖人生知故難慕庾公大喜小兒答對出世説新語陸琇後魏東平王陸俟代人也聰悟有才略子馥有父風髙崇見而賞之謂朝臣曰吾常歎其父智過其軀此踰於父矣為相州刺史遷太僕馥子琇年九嵗馥謂曰汝祖東平王有十二子我為嫡長承襲家業吾今年老屬汝幼童詎堪為陸氏宗首乎琇對曰茍非鬭力何患童稚馥竒之立為嫡出談藪王絢宋王景文僧朗之子美風貎善𤣥言與謝莊張暢何偃俱有盛名於是景文本名彧與明帝名同故稱字長子絢年五六嵗警悟外祖何尚之賞異焉嘗教讀論語至郁郁乎文哉因戲之曰可改耶耶乎文哉絢應聲答曰尊者之名安可為戲便可道草翁風必舅論語曰草上之風必偃偃尚之子也絢卒於秘書丞出談藪蕭遙欣南齊曲江公蕭遙欣少有神采幹局為童子時有一小兒左右彈飛鳥未嘗不應弦而下遙欣謂之曰凡戲多端何急彈此鳥自雲中翔何闗人事小兒感之終身不復捉彈爾時年十一士庶多競此戲遙欣一説旬月播之逺近聞者不復為之出談藪房氏子唐韋陟有疾房尚書琯使子弟問之延入卧内行步悉藉茵毯房氏子韈而登階侍婢皆笑之舉朝以為韋氏貴盛房氏清儉俱為美談出國史𥙷張琇張童子者名琇審素之子也開元二十二年琇殺殿中侍御史楊萬頃於闕下復父仇也初審素受賕事發詔萬頃按之萬頃按審素過入故坐誅家屬徙邉琇㑹赦得還時未冠乃追復前怨與其弟瑝手刃萬頃於都城聞者駭之帝嘉其孝將釋之有司以專殺抗論琇坐死時人哀之𦵏於邙山為疑冡焉蓋懼楊宗之所發也故虞部員外郎顧雲誄之曰冒法復讐信難逃於刑典忘身狥孝誠有契於禮經且從古以來誰人不死得其死矣夫何恨歟出顧雲文集渾瑊渾太師瑊年十一隨父釋之防冬朔方節度張齊丘戲問將乳母來否其年立跳盪功後二年拔石堡城收龍駒島皆有竒效出國史補太平廣記卷一百七十四
