body:
  text: 太平廣記卷四百十一宋李昉等編草木六果下櫻桃檽棗柿㡳檷𣗳實柿盤融峯梨六觔梨紫花梨胡榛子酸棗蒲萄王母蒲萄侯騷子蔓胡桃仙𣗳實橄欖子東荒栗猴栗𤓰五色𤓰瓜惡香菜蔓菁越蒜三蔬菠薐芥葅芥末水韭茄子𣗳崑崙紫𤓰茄子故事儋崖瓠果下櫻桃唐時新進士尤重櫻桃宴乾符四年劉鄴第三子覃及第時鄴以故相鎮淮南勅邸吏曰以銀一定資醵置而覃所費往往數倍邸吏以聞鄴命取足而已㑹時及薦新狀頭已下方議醵率覃潛遣人厚以金帛預購數十𣗳矣于是獨置是宴大㑹公卿時京國櫻桃初出雖貴達未適口而覃山積鋪席復和以糖酪用享人蠻獻一小盤亦不啻數升以至叅御輩靡不霑足出摭言檽棗晉趙瑩家庭有檽棗𣗳婆娑異常四逺俱見有望氣者訪其隣里問人云此家合有登宰輔者里叟曰無之然主人小字相兒得非此乎術士曰王氣方盛不在其身當在其子孫其後瑩由太原判官大拜出將入相出北夢𤨏言柿俗謂柿𣗳有七徳一夀二多隂三無鳥窠四無蟲五霜葉可翫六嘉實七落葉肥大出酉陽雜俎㡳穪𣗳實阿驛波斯呼為阿驛拂林呼為㡳穪𣗳長丈四五枝葉繁茂葉有五出似蜱麻無花而實實赤色𩔖蜱子味似乾柿而一年一熟柿盤木中根固柿為最俗謂之柿盤出酉陽雜俎融峯梨仙梨融峯上有青壇方五丈有焼香行道處古形銅器數種有梨𣗳髙三十丈子如斗至揺落時但見其汁核無得味者出洽聞記六觔梨洛陽報國寺梨重六觔出酉陽雜俎紫花梨清泰中薄遊京輦曽與盧泳廵官鄭扆博士僧季雅及三五知友夜㑹于越波隄僧院是時清秋欲杪明月方髙句聨五字之竒酒飲八仙之美柿新紅脯茗醶緑芽一詠一觴或醒或醉座上因相與徵引古今遂及果實之事有叙及紫花梨者衆云真定有之雅公獨顰蹙而言曰此微僧先祖之遺恨衆驚而問之雅曰昔武宗皇帝御天下之五載萬國事殷聖情不懌忽患心熱之疾名醫進藥厥疾㒺瘳遂博詔良能遐徵和緩時有言青城山邢道士者妙于方藥帝即召見之道士以肘後緑囊中青丹兩粒及取梨數枚絞汁而進之帝疾尋愈旬日之内所賜萬金仍加廣濟先生之號帝從容問其丹為何物先生曰赤城山頂有青芝兩株太白南溪有紫花梨一𣗳臣之昔歲曽遊二山獨獲兩寳合練成丹五十年来服食殆盡惟餘兩粒幸逢陛下服之更欲此丹須求二物也經數月邢生辭帝歸山後疾復作再詔邢先生于青城則不知何適也帝遂詔示天下有紫花梨即時奏上時恒州節度太尉公王達尚夀春公主即㑹昌之女弟聞真定李令種梨數株其一紫花梨即遣寺人就加封檢剪其旁𣗳匝以朱欄寳惜纎枝有同月桂當花發之時防蜂蝶之窺耗每以輕綃紗縠逺加籠罩焉守𣗳者不勝艱苦洎及秋實公主必手𨕖而進之比達帝廷十得其六七帝多食此梨雖不及邢氏者亦粗解其煩躁耳是時有李遵来侍御任恒州記室作進梨表云紫花開處擅美春林縹蒂懸時迥光秋景離離玉潤落落珠圓甘不得嘗脆難勝口表達闕下公卿見者多大笑之曰常山公何用進殘梨于天府也葢以其表有脆難勝口之字明年武宗崩公主亦相次逝此梨自後以為貢賦之常物縣官歲久亦漸怠于寳守焉至天祐末年趙王為明徳之所簒弑其後縣邑公署多歴兵戎紫花之梨亦已枯朽今之真定無復繼種者焉當武宗時縣宰李公名尚即雅之祖也嘗以守𣗳不謹曽風折一枝降為冀州典午由是追感而顰蹙也出耳目記胡榛子阿月生西國蕃人言與胡榛子同𣗳一年榛子二年阿月出酉陽雜俎酸棗耆舊説周秦時河南雨酸棗遂生野酸棗今酸棗縣是也酸棗之甚小者為野酸棗出述異記蒲萄俗言蒲萄蔓好引于西南庾信謂魏使尉瑾曰我在鄴遂大得蒲萄竒有滋味陳招曰作何形狀徐君房曰有𩔖軟棗信曰君殊不體物何得不言似生荔枝魏肇師曰魏武有言末夏渉秋尚有餘暑酒醉宿酲掩露而食甘而不飴酸而不酢道之固以流沫稱竒况親食之者瑾曰此物出自大宛張騫所致有黄白黒三種成熟之時子實逼側星編珠聚西域多釀以為酒每来歲貢在漢西京似亦不少杜陵田五十畝中有蒲萄百𣗳今在京邑非直止禁林也信曰乃園種戸植接䕃連架昭曰其味何如橘柚信曰津液勝竒芬芳減之瑾曰金衣素裏見苞作貢向齒自消良應不及出酉陽雜俎王母蒲萄貝丘之南有蒲萄谷谷中蒲萄可就其所食之或有取歸者即失味世言王母蒲萄也天寳中沙門曇霄因遊諸岳至此谷得蒲萄食之又見枯蔓堪為杖大如指五尺餘持還本寺植之遂活長髙數仞䕃地幅員十丈仰觀若帷葢焉其旁實磊落紫瑩如墜時人號為草龍珠帳焉出酉陽雜俎侯騷子侯騷蔓生如雞卵既甘且冷輕身消酒廣志言因王太僕所獻出酉陽雜俎蔓胡桃蔓胡桃出南詔大如扁螺兩隔味似胡桃或言蠻中藤子也出酉陽雜俎仙𣗳實祁連山上有仙𣗳實行旅得之止饑渴一名四味木其實如棗以竹刀剖則甘鐵刀剖則苦木刀剖則酸蘆刀剖則辛出酉陽雜俎橄欖子獨根𣗳東向枝曰木威南向枝曰橄欖出酉陽雜俎東荒栗東方荒中有木名曰栗有殻徑三尺三寸殻刺長丈餘實徑三尺殻亦黄其味甜食之令人短氣而渴出酉陽雜俎猴栗唐衞公李徳裕一夕甘子園㑹客盤中有猴栗無味陳堅處士云䖍州南有漸栗形如素核出酉陽雜俎𤓰漢明帝隂貴人夢食𤓰甚美帝使求諸方國時有燉煌獻異𤓰種常山獻巨桃核𤓰名穹窿長三尺而形屈其味臭如粘父老云昔道士從蓬莱山得此𤓰云是空洞靈𤓰四刼一實東王公西王母遺種于地世代遐絶其實頗存又説此𤓰霜下始花隆冬可熟亦云仙人所食常使植於霜林園此園皆植寒果積冰之節百果方盛俗為相陵𤓰故霜園之聲訛也后曰王母之桃王公之𤓰可得而食五萬歲矣安可食乎后崩内侍者見鏡奩中有𤓰桃之核視之涕零疑其非𩔖出王子年拾遺五色𤓰吴桓王時㑹稽生五色𤓰今吴中有五色𤓰歲充貢賦出述異記𤓰惡香𤓰惡香中尤忌麝唐鄭注太和初赴職河中姬妾百餘盡綺香氣數里逆于人鼻是歲自京至河中所過路𤓰盡死一蔕不獲出酉陽雜俎菜蔓菁諸葛所止令兵士獨種蔓菁者取其纔出甲可生啖一也葉舒可煑食二也久居則隨以滋長三也棄不令惜四也回則易尋而採之五也冬有根可斸食六也比諸蔬屬其利不亦博哉劉禹錫曰信矣三蜀之人也今呼蔓菁為諸葛菜江陵亦然出嘉話録越蒜異苑曰晉安平有越王餘蒜菜長尺許白者似骨黒者如角古云越王曽于舟中作籌筭有餘者棄之水而生焉闕三蔬晉咸寜四年立芳圃于金墉城東多種異菜名曰雲薇𩔖有三種紫色者最繁滋其根爛漫春敷夏密秋榮冬馥其實若珠五色隨時而盛一名雲芝其紫色者為上蔬而味辛其黄色者為中蔬而味甘其青色者為下蔬而味鹹常以此蔬充御其葉可以藉飲食以供宗廟祭祀亦止人饑渴宫人採帶其莖葉香氣歴月不歇出拾遺記菠薐菜之菠薐者本西國中有僧自彼將其子来如苜蓿蒲萄因張騫而至也菠薐本是頗陵國將来語訛耳多不知也出嘉話録芥𦵔廣州人以巨菜為鹹𦵔埋地中有三十年者貴尚親賔以相餉遺出嶺南異物志芥末掌中芥末多國出也取子置掌中吹之一吹一長長三尺乃植于地出酉陽雜爼水韮水韮生于水湄狀如韮而葉細長可食出酉陽雜俎茄子𣗳南中草菜經冬不衰故蔬圃之中栽種茄子宿根有三二年者漸長枝榦乃為大𣗳每夏秋熟則梯𣗳摘之三年後漸𣗳老子稀即伐去别栽嫩者出嶺表録異崑崙紫𤓰隋煬帝大業末改茄子為崑崙紫𤓰出述異記茄子故事茄子茄子連根名革遐反今呼伽未知所自昔叚成式因就廊下食茄子數蒂偶問工部員外張周封茄子故事張云一名落蘇事具食料本草成式記得隱侯行園詩云寒𤓰方卧壟秋𤓰正滿陂紫茄紛爛漫緑芋鬱參差又一名崑崙𤓰嶺南茄子宿根成𣗳髙五六尺姚向曽為南𨕖使親見之故本草記廣州有慎火𣗳𣗳大三四圍慎火即景天也俗呼為䕶火草茄子熟者食之厚膓胃動氣發疾根能理龜瘃欲其子繁候其花時取葉布于過路以灰規之人踐之子必繁也俗謂嫁茄子曽火炙之甚美有新羅種者色稍白形如雞卵西明寺僧造𤣥院中有其種水經云石頭西對蔡浦長百里上有大荻荻浦下有茄浦出酉陽雜俎儋崖瓠儋崖種瓠成實率皆石餘芥髙者亦五六尺子大如雞卵出酉陽雜俎太平廣記卷四百十一
