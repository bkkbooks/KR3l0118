  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0118_WYG_454-1a, image: WYG1046/WYG1046-0352a.png}
body:
  text: 太平廣記卷四百五十四宋李昉等編狐八張簡棲薛䕫計真劉元鼎張立本姚坤尹瑗韋氏子張簡棲南陽張簡棲唐貞元末於徐泗間以放鷹為事是日初晴鷹撃拏不中騰冲入雲路簡棲望其蹤與徒從分頭逐覓俄至夜可一更不覺至一古墟之中忽有火燭之光迫而前乃一塜穴中光明耳前覘之見狐憑几尋讀册子其旁有群䑕益湯茶送果栗皆人拱手簡棲怒呵之狐驚走收拾册子入深黒穴中藏簡棲以鷹竿挑得一册子乃歸至四更宅外聞人呌索册子聲出覓即無所見至明皆失所在自此夜夜來索不已簡棲深以為異因携册子入郭欲以示人徃去郭可三四里忽逢一知已相揖問所徃簡棲乃取冊子話狐狀前人亦驚笑接得冊子便鞭馬疾去廻顧簡棲曰謝以冊子相還簡棲逐之轉急其人變為狐馬變為麞不可及廻車入郭訪此宅知已元在不出方知狐來奪之其冊子裝束一如人者紙墨亦同皆狐書不可識簡棲猶録得頭邉三數行以示人今列于後缺文薛䕫貞元末驍衛將軍薛䕫寓居永寜龍興觀之北多妖狐夜則縱横逢人不忌䕫舉家驚恐莫知所如或謂曰妖狐最憚獵犬西隣李太尉第中鷹犬頗多何不假其駿異者向夕以待之䕫深以為然即詣西鄰子弟具述其事李氏喜聞覊三犬以付焉是夕月明䕫縱犬與家人軰宻覘之見三犬皆𬒳羈靮三狐跨之奔走庭中東南西北靡不如意及曉三犬因殆寢而不食纔暝復為乗跨廣庭蹴踘大稍留滯鞭䇿備至䕫無奈何竟徙焉出集異記計真唐元和中有計真家僑青齊間嘗西遊長安至陜真與陜從事善是日將告去從事留飲酒至暮方與别及行未十里遂兀然墮馬而二僕驅其衣囊前去矣及真醉寤已曛黒馬亦先去因顧道佐小逕有馬溺即徃㝷之不覺數里忽見朱門甚髙槐栁森然真既亡僕馬悵然遂叩其門已扄鍵有小童出視真即問曰此誰氏居曰李外郎别墅真請入謁僮遽以告主頃之令人請客入息于賔館即引入門其左有賔位甚清敞所設屏障皆古山水及名畫圖經籍茵榻之𩔖率潔而不華真坐乆之小僮出曰主君且至俄有一丈夫年約五十朱􅌧銀章儀狀甚偉與生相見揖讓而坐生因具述從事故人留飲酒道中沈醉不覺曛黒僕馬俱失願寓此一夕可乎李曰但慮此卑隘不可安貴客寜有間耶真媿謝之李又曰某嘗從事於蜀㝷以疾罷去今則歸休於是矣因與議語甚敏博真頗慕之又命家僮訪真僕馬俄而皆至即舎之既而設饌共食食竟飲酒數盃而寐眀日真晨起告去李曰願更得一日侍歡笑生感其意即留明日乃别及至京師居月餘有欵其門者自稱進士獨孤沼真延坐與話甚聰辯且謂曰某家于陜昨西來過李外郎談君之美不暇且欲與君為姻好故令某奉謁話此意君以為何如真喜而諾之沼曰某今還陜君東歸當更訪外郎且謝其意也遂别去後旬月生還詣外郎别墅李見真至大喜生即話獨孤沼之言因謝之李遂留生十日就禮妻色甚姝且聰敏柔婉生留旬月乃挈妻孥歸青齊自是李君音耗不絶生奉道每晨起閲黄庭内景經李氏常止之曰君好道寜如秦皇漢武乎求仙之力又孰若秦皇漢武乎彼二人貴為天子富有四海竭天下之財以學神仙尚崩於沙丘葬於茂陵况君一布衣而乃惑於求仙耶真叱之乃終卷意其知道者亦不疑為他𩔖也後嵗餘真挈家調選至陜郊李君留其女而遣生來京師眀年秋授兗州參軍李氏隨之官數年罷秩歸齊魯又十餘年李有七子二女才質姿貌皆居衆人先而李容色端麗無殊少年時生益鍾念之無何𬒳疾且甚生奔走醫巫無所不至終不愈一旦屏人握生手嗚咽流涕自言曰妾自知死至然忍羞以心曲告君幸君寛罪宥戾使得盡言已㱆欷不自勝生亦為之泣固慰之乃曰一言誠自知受責於君顧九稚子猶在以為君累尚敢一發口且妾非人間人天命當與君偶得以狐狸賤質奉箕帚二十年未嘗纎芥獲罪懼以他𩔖貽君憂一女子血誠自謂竭盡今日永去不敢以妖幻餘氣託君念稚弱滿眼皆世間人為嗣續及某氣盡願少念弱子必無以枯骨為讐得全支體埋之土中乃百生之賜也言終又悲慟淚百行下生驚悼傷感咽不能語相對泣良久以被䝉首背壁臥食頃無聲生遂發𬒳見一狐死被中生特感悼之為之歛𦵏之制皆如人禮訖生徑至陜訪李氏居墟墓荆棘閴無所見惆悵還家居嵗餘七子二女相繼而卒視其骸皆人也而終無惡心出宣室志劉元鼎舊説野狐名紫狐夜擊尾火出將為怪必戴髑髏拜北斗髑髏不墜則化為人矣劉元鼎為蔡州蔡州新破食場狐暴劉遣吏生捕日於毬場縱犬逐之為樂經年所殺百數後獲一疥狐縱五六犬皆不敢逐狐亦不走劉大異之令訪大將家獵狗及監軍亦自跨巨犬至皆弭環守之狐良乆緩跡直上設㕔穿臺盤出㕔後及城墻俄失所在劉自是不復命捕道術中有天狐别行法言天狐九尾金色役於日月宫有符有醮日可以洞逹隂陽出酉陽雜俎張立本唐丞相牛僧孺在中書草場官張立本有一女為妖物所魅其妖來時女即濃粧盛服於閨中如與人語笑其去即狂呼號泣不已乆每自稱髙侍郎一日忽吟一首云危冠廣袖楚宫粧獨歩閒庭逐夜凉自把玉簮敲砌竹清歌一曲月如霜立本乃随口抄之立本與僧法舟為友至其宅遂示其詩云某女少不曽讀書不知因何而能舟乃與立本兩粒丹令其女服之不旬日而疾自愈其女說云宅後有竹叢與高鍇侍郎墓近其中有野狐窟穴因𬒳其魅服丹之後不聞其疾再發矣出會昌觧頥録姚坤大和中有處士姚坤不求榮達常以釣魚自適居于東洛萬安山南以琹尊自怡其側有獵人常以網收狐兎為業坤性仁恒收贖而放之如此活者數百坤舊有莊質於嵩嶺菩提寺坤持其價而贖之其知莊僧恵沼行兇率常于閴處鑿井深數丈投以黄精數百斤求人試服觀其變化乃飲坤大醉投於井中以磑石咽其井坤及醒無計躍出但饑茹黄精而已如此數日夜忽有人於井口召坤姓名謂坤曰我狐也感君活我子孫不少故來教君我狐之通天者初穴于塜因上竅乃窺天漢星辰有所慕焉恨身不能奮飛遂凝盻注神忽然不覺飛出躡虚駕雲登天漢見仙官而禮之君但能澄神泯慮注盻𤣥虚如此精確不三旬而自飛出雖竅之至㣲無所礙矣坤曰汝何據耶狐曰君不聞西昇經云神能飛形亦能移山君其努力言訖而去坤信其說依而行之約一月忽能跳出於磑孔中遂見僧大駭視其井依然僧禮坤詰其事坤告曰但於中餌黄精一月身輕如神自能飛出竅所不礙僧然之遣弟子以索墜下約弟子一月後來窺弟子如其言月餘來窺僧已斃于井耳坤歸旬日有女子自稱夭桃詣坤云是富家女誤為年少誘出失蹤不可復返願持箕帚坤見之妖麗冶容至于篇什等體俱能精至坤亦念之後坤應制挈夭桃入京至盤豆館夭桃不樂取筆題竹簡為詩一首曰鉛華乆御向人間欲捨鉛華更慘顔縱有青邱今夜月無因重照舊雲鬟吟諷乆之坤亦瞿然忽有曹牧遣人執良犬將獻裴度入館犬見夭桃怒目掣鎻蹲歩上階夭桃亦化為狐跳上犬背抉其目大驚騰號出舘望荆山而竄坤大駭逐之行數里犬已斃狐即不知所之坤惆悵悲惜盡日不能前進及夜有老人挈美醖詣坤云是舊相識既飲坤終莫能達相識之由老人飲罷長揖而去云報君亦足矣吾孫亦無恙遂不見坤方悟狐也後寂無聞矣出傳記尹瑗尹瑗者嘗舉進士不中第為晉陽普原尉既罷秩退居郊野以文墨自適忽一日有白衣丈夫來謁自稱呉興朱氏子早嵗嗜學竊聞明公以文業自負願質疑於執事無見拒瑗即延入與語且徴其說云家僑嵐川早嵗與御史王君皆至北門今者寓跡于王氏别業累年自此每四日輙一來甚敏辯縱横詞意典雅瑗深愛之瑗因謂曰吾子機辯𤣥奥可以從郡國之遊為公侯高客何乃自取沈滯隠跡叢莽生曰余非不願謁公侯且懼旦夕有不虞之禍瑗曰何為發不祥之言乎朱曰某自今嵗來夢卜有窮盡之兆瑗即以詞慰諭之生頗有愧生後至重陽日有人以濃醖一瓶遺瑗朱生亦至因以酒飲之初辭以疾不敢飲已而又曰佳節相遇豈敢不盡主人之歡耶即引滿而飲食頃大醉告去未行數十歩忽仆於地化為一老狐酩酊不能動矣瑗即殺之因訪王御史别墅有老農謂瑗曰王御史并之禆將徃嵗戌於嵐川為狐媚病而卒已累年矣墓於村北數十歩即命家僮㝷御史墓果有穴瑗後為御史竊話其事時唐太和初也出宣室志韋氏子杜陵韋氏子家于韓城有别墅在邑北十餘里開成十年秋自邑中遊焉日暮見一婦人素衣挈一瓢自北而來謂韋曰妾居邑北里中有年矣家甚貧今為里胥所辱將訟于官幸吾子紙筆書其事妾得以執詣邑冀雪其恥韋諾之婦人即揖韋坐田野衣中出一酒巵曰瓢中有酒願與吾子盡醉於是注酒一飲韋韋方舉巵㑹有獵騎從西來引數犬婦人望見即東走數十歩化為一狐韋大恐視手中巵乃一髑髏酒若牛溺之狀韋因病熱月餘方瘳出宣室志太平廣記卷四百五十四
