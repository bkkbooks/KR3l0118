body:
  text: 太平廣記卷四十九神仙四十九潘尊師李賀張及甫鄭冊陳惠虛温京兆潘尊師嵩山道士潘尊師名法正葢髙道者也唐開元中謂弟子司馬鍊師曰陶𢎞景為嵩山伯於今百年矣頃自上帝求替帝令舉所知以代𢎞景舉余文籍已定吾行不得久住人間矣不數日乃屍解而去其後登封縣嵩陽觀西有龍湫居人張辿者以隂器於湫上洗濯俄為人所攝行可數里至一甲第門前悉是羣龍入門十餘步有大㕔事見法正當㕔而坐手持朱筆理書問辿曰汝是觀側人亦識我否曰識是潘尊師法正問辿何以汚羣龍室辿載拜謝罪又問汝識司馬道士否辿曰識之法正云今放汝還遂持几上白羽扇謂辿曰為我寄司馬道士何不來而戀世間樂耶使人送辿出水上辿見其屍臥在岸上心惡之奄然如夢遂活司馬道士見羽扇悲涕曰此吾師平素所執亡時以置棺中今君持來明吾師見在不虛也乃深入山數年而卒出廣異記李賀隴西李賀字長吉唐鄭王之孫稚而能文尤善樂府詞句意新語麗當時工於詞者莫敢與賀齒由是名聞天下以父名晉肅子故不得舉進士卒於太常官年二十四其先夫人鄭氏念其子深及賀卒夫人哀不自解一夕夢賀來如平生時白夫人曰某幸得為夫人子而夫人念某且深故從小奉親命能詩書為文章所以然者非止求一位而自餙也且欲大門族上報夫人恩豈期一日死不得奉晨夕之養得非天哉然某雖死非死也乃上帝命夫人訊其事賀曰上帝神仙之居也近者遷都于月圃搆新宫命曰白瑤以某榮於詞故召某與文士數輩共為新宫記帝又作凝虛殿使某輩纂樂章今為神仙中人甚樂願夫人無以為念既而吿去夫人寤甚異其夢自是哀少解出宣室志張及甫唐元和中青州屬縣有張及甫陳幼霞同居為學一夜俱夢至一處見道士數人令及甫等書碑題云蒼龍溪主歐陽某撰太皇真訣字作篆文稍異於常及甫等記得四句云云昔乘魚車今履瑞雲躅空仰途綺錯輪囷後題云五雲書閣吏陳幼霞張及甫至曉二人共言悉同出逸史鄭冊温州刺史鄭冊好黄老之術常密為之因疾自見女仙三百餘人云迎公乃命設饌焚香禮拜又邀兄冉同於空中禮拜少頃命燭五炬引兄冉與左右人皆無所見明日天明又陽官來催曰員外禄運見終今請速登駕又命酒果祭之云員外受職六月朔視事至午時當奉迎先是公與天台道士金柔為方外之友至其日食時造省公公説前事即與柔共入浄堂中禮拜又云受牒身一道公空中引手接之又自開封以右手㸃筆空押之自書六字謂使者曰以有前約的不逾時便言時至揖金柔向按不令閉郤四門又催家人阿鹿下飯先令作蒸餅猶熱唯六七碟脯及酒而已遣兄冉出外家人排床七隻云六押衙來迎矣公命坐如再三辭讓之狀公跪拜再三便低頭不起家人走報兄冉及室人少時而逝形體柔軟顔色不改按真誥云其有隂徳及好道信仙者此例品格蓋多覩鄭公潛化之跡虛無之位其昭昭乎出原化記陳惠虛陳惠虛者江東人也為僧居天台國清寺曾與同侣遊山戲過石橋水峻苔滑懸流萬仞下不見底衆皆股慄不行惠虛獨超然而過徑上石壁至夕不廻羣侣皆舍去惠虛至石壁外微有小徑稍稍平闊遂及宫闕花卉萬叢不可目識臺閣連雲十里許見其門題額曰㑹真府左門額曰金庭宫右額曰桐栢三門相向鼎峙皆有金樓玉窻髙百丈入其右内之西又一髙樓黄門題曰右弼宫周顧數千間屈曲相通瑤階玉陛流渠激水處處華麗殆欲忘歸而了無人跡又入一院見青童五六人相顧笑語而去再三問之應曰汝問張老須臾廻顧見一叟挾杖持花而來訝曰汝凡俗人何忽至此惠虚曰常聞過石橋即有羅漢寺人世時聞鐘聲故來尋訪千僧幸㑹得至此境不知羅漢何在張老曰此真仙之福庭天帝之下府號曰金庭不死之鄉養真之靈境週廻百六十里神仙右弼桐栢上真王君主之列仙三千人仙王力士天童玉女各萬人為小都㑹之所太上一年三降此宫校定天下學道之人功行品第神仙所都非羅漢之所也王君者周靈王之子瑤丘先生之弟子位為上真矣惠虛曰神仙可學之否張老曰積功累徳肉身昇天在於立志堅久耳汝得見此福庭亦是有可學之望也又問曰學仙以何門而入張老曰内以保神鍊氣外以服餌丹華變化為仙神丹之力也汝不可久住上真適遊東海騎衛若還恐有咨責因引之使出門行十餘步已在國清矣惠虚自此慕道好丹石雖衣敝履穿不以為陋聞有鑪火方術之士不逺而詣之丹石所費固亦多矣晩居終南山捧日寺年漸衰老其心愈切寢疾月餘羸憊且甚一旦暴雨後有老叟負藥囊入寺大呼曰賣大還丹繞廊數廻衆僧皆笑之乃指病僧惠虚之門謂老叟曰此叟頗好還丹售之可也老叟欣然詣之惠虛曰還丹知是靈藥一劑幾錢叟曰隨力可致耳惠虚曰老病沉困床枕餘月昨僧次到自行不得托隣僧代齋得䞋錢少許可致藥否叟取其錢而留藥數丸教其所服之法惠虛便吞之老叟乃去衆僧相率來問言已買得還丹吞服之矣頃間久疾都愈遙止衆僧曰勿前覺有臭吾疾愈矣但要新衣一兩事耳跳身起床勢若飛躍衆驚歎之有新衣與之者取而着焉忽飛殿上從容久之揮手相别冉冉昇天而去時大中十二年戊寅嵗是年歸桐栢觀與道流話得道之由云今在桐栢宫中賣藥老叟將是張老耳言訖𨼆去出仙傳拾遺温京兆温璋唐咸通壬辰尹正天府性黷貨敢殺人亦畏其嚴殘不犯由是治有能名舊制京兆尹之出静通衢閉里門有突其前道者立杖殺之是秋温公出自天街將南抵五門呵喝風生有黄冠老而且傴敝衣曵杖將横絶其間騶人呵不能止温公命捽來笞背二十振袖而去若無苦者温異之呼老街吏令潛而覘之有何言復命黄冠扣之既而跡之迨暮過蘭陵里南入小巷中有衡門止處也吏隨入關有黄冠數人出謁甚謹且曰真君何遲也答曰為凶人所辱可具湯水黄冠前引雙鬟青童從而入吏亦隨之過數門堂宇華麗修竹夾道擬王公之甲第未及庭真君顧曰何得有俗物氣黄冠争出索之吏無所𨼆乃為所録見真君吏叩頭拜伏具述温意真君盛怒曰酷吏不知禍將覆族死且將至猶敢肆毒於人罪在無赦叱街吏令去吏拜謝了趨出遂走詣府請見温時則深夜矣温聞吏至驚起於便室召之吏悉陳所見温大嗟惋明日將暮召吏引之街皷既絶温微服與吏同詣黄冠所居至明吏欵扉應門者問誰曰京兆温尚書來謁真君既闢重閨吏先入拜仍白曰京兆尹温璋温趨入拜真君踞坐堂上戴遠遊冠衣九霞之衣色貌甚峻温伏而叙曰某任㹅浩穰權唯震肅若稍畏懦則損威聲昨日不謂凌迫大仙自貽罪戾故來首服幸賜矜哀真君責曰君忍殺立名專利不厭禍將行及猶逞兇威温拜首求哀者數四而真君終蓄怒不許少頃有黄冠自東序來拱立於真君側乃跪啓曰尹雖得罪亦天子亞卿况真君洞其職所統宜少降禮言訖真君令黄冠揖温昇堂别設小榻令坐命酒數行而真君怒色不解黄冠復啟曰尹之忤犯宏宥誠難然則真君變服塵遊俗士焉識白龍魚服見困豫且審思之真君悄然良久曰恕爾家族此間亦非淹久之所温遂起於庭中拜謝而去與街吏疾行至府動曉鐘矣雖語親近亦秘不令言明年同昌主薨懿皇傷念不已忿藥石之不徵也醫韓宗紹等四家詔府窮竟將誅之而温鬻獄緩刑納宗紹等金帶及餘貨凡數千萬事覺飲酖而死出三水小牘太平廣記卷四十九
