body:
  text: 太平廣記卷二百五十八嗤鄙一魏人鑚火齊俊士元魏臣并州士族高敖曹梁權貴柳騫之阮嵩郝象賢朱前疑張由古侯思止王及善逯仁傑袁琰臺中語沈子榮武懿宗張衡李良弼來子珣閻知微崔湜權龍襄魏人鑚火魏人夜暴疾命門人鑚火是夕隂暝督廹頗急門人忿然曰君責人亦大無理今闇如漆何以不把火照我當得覓鑚火具然後易得耳孔文舉聞之曰責人當以其方也出笑林齊俊士漢書王莽賛云紫色蛙聲餘分閏位謂以偽亂真顔之推常言吾近共人讀書與言及王莽形狀有一俊士自許知史學名價甚高乃云王莽非直鴟目虎吻亦紫色蛙聲出顔氏家訓元魏臣元魏之世在洛京時有一才學重臣新得史記音而頗紕誤及見顓頊字為許緑反錯作許縁其人遂謂朝士言從來謬音專旭當專翾耳此人先有高名翕然行信朞年之後更有碩儒苦相究討方知誤焉出顔氏家訓并州士族北齊并州有士族好為可笑詩賦輕蔑邢魏諸公衆共嘲弄虚相稱讃必擊牛釃酒延之其妻明鑑人也泣而諫之此人嘆曰才華不為妻子所容何况行路至死不覺出顔氏家訓高敖曹髙敖曹常為雜詩三首云塜子地握槊星宿天圍棊開壜甕張口卷席牀剝皮又相送重相送相送至橋頭培堆兩眼淚難按滿胸愁又桃生毛彈子瓠長棒槌兒牆欹壁亞肚河凍水生皮出啓顔録梁權貴梁有一權貴讀誤本蜀都賦注解蹲鴟芋也而為羊字後有人餉羊肉答書云損惠蹲鴟舉朝驚駭不解事義久後尋繹方知如此出顔氏家訓柳騫之隋内史舍人河東柳騫之奏事好錯嘗有周家公主表請出家騫之奏云周家公主上表求作道人上大笑及出虞僕射慶則問之曰奏事若為錯騫之復錯答曰周家公主欲得還俗騫之歴位光禄卿闕阮嵩唐貞觀中桂陽令阮嵩妻閻氏極妬嵩在㕔㑹客飲召女奴歌閻𬒳髮跣足袒臂㧞刀至席諸客驚㪚嵩伏牀下女奴狼狽而奔刺史崔邈為嵩作考詞云婦强夫弱内剛外柔一妻不能禁止百姓如何整肅妻既禮教不修夫又精神何在考下省符解見任出朝野僉載郝象賢唐郝象賢侍中處俊之孫頓丘令南容之子也弱冠諸友生為之字曰寵之每於父前稱字父紿之曰汝朋友極賢吾為汝設饌可命之也翊日象賢因邀致十數人南容引生與之飲謂曰諺云三公後出死狗小兒誠愚勞諸君製字損南容之身尚可豈可波及侍中也因泣涕衆慙而退寵之者反語為癡種也出朝野僉載朱前疑周朱前疑淺鈍無識容貌極醜上書云臣夢見陛下八百嵗即授拾遺俄遷郎中出使廻又上書云聞嵩山唱萬嵗聲即賜緋魚袋未入五品於緑衫上帶之朝野莫不怪笑後契丹反有敇京官出馬一匹供軍者即酬五品前疑買馬納訖表索緋上怒批其狀即放歸丘園憤恚而卒出朝野僉載張由古唐張由古有吏才而無學術累厯臺省嘗於衆中歎班固有大才而文章不入文選或謂之曰兩都賦燕山銘典引等並入文選何為言無由古曰此並班孟堅文章何關班固事聞者掩口而笑又謂同官曰昨買得王僧𥜗集葢僧孺也大有道理杜文範知其誤應聲曰文範亦買得張佛袍集倍勝僧襦由古不知覺累遷司計員外以罪放於庭州時中書令許敬宗綜理詔獄帖召之由古喜至則為所責懼而手戰笏墜于地口不能言初為殿中正班以尚書郎有錯立者謂引駕曰員外郎小兒難共語可鼻衝上打朝士鄙之出大唐新語侯思止唐侯思止出自皁𨽻言音不正以告變授侍書御史按制獄苛酷日甚嘗按中丞魏元忠曰急丞白司馬不然即吃孟青白司馬者洛陽有坂號曰白司馬坂孟青者將軍姓孟名青曾杖殺琅琊王冲者也思止閭巷庸人常以此言逼諸囚元忠辭氣不屈思止怒而倒曵之元忠徐起曰我薄命如乘惡驢而墜脚為鐙所掛遂𬒳賊曵耳思止大怒又曳之曰汝拒捍制使奏斬之元忠曰侯思止汝今為國家御史須識禮儀輕重如此須魏元忠頭何不以鋸截去無為抑我反奈何佩服朱紱親銜天命不能行正道之事乃言白司馬孟青是何言也若非魏元忠無人仰教思止驚起悚然曰思止死罪實不解幸蒙中丞見教乃引上階禮坐而問之元忠徐就坐自若又思止言音不正時斷屠殺思止曰今斷屠殺雞古梨反魚猪計驢蔞俱居不得吃苦擊反空吃米麫減之去聲如儒齊何得飽侍御史霍獻可笑之思止訴于則天則天怒謂獻可曰我知思止不識字我已用之卿笑何也獻可具言雞猪之事則天亦大笑思止嘗命作籠餅對膳者曰與我作籠餅可縮葱作比市籠餅葱多而肉少故令縮葱加肉也時人號為縮䓤侍御史時來俊臣棄故妻奏逼娶太原王慶詵女思止亦奏請娶趙郡李自挹女敕政事商量鳯閣侍郎李昭徳撫掌謂諸相曰大可笑大可笑諸相問之昭徳曰往年來俊臣賊劫王詵女已大辱國今日此奴又請娶李自挹女無乃復辱國耶事遂寢竟為李昭徳榜殺之出御史臺記王及善唐王及善才行庸猥風神鈍濁為内史時人號為鳩集鳯池俄遷文昌右相無他政但不許令史雙驢入臺終日迫逐無時蹔捨時人號驅驢宰相出朝野僉載逯仁傑周朝有逯仁傑河陽人自地官令史出尚書改天下帳式頗甚繁細法令滋章毎村立社官仍置平直老三員掌簿案設鎖鑰十羊九牧人皆㪚逃而宰相淺識以為萬代皆可行授仁傑地官郎中數年百姓苦之其法遂寢出朝野僉載袁琰周考功令史袁琰國忌衆人聚㑹充録事勾當遂判曰曹司繁閙無時蹔閒不因國忌之辰無以展其歡笑合坐嗤之出朝野僉載臺中語周夏官侍郎侯知一年老敕放致仕上表不伏於朝堂踴躍馳走以示輕便張悰丁憂自請起復吏部主事高筠母喪親戚為舉哀筠曰我不能作孝員外郎張栖貞𬒳訟詐遭母憂不肯起對時臺中為之語曰侯知一不伏致仕張琮自請起復高筠不肯作孝張栖貞情願遭憂皆非名教中人並是王化外物獸心人面不其然乎出朝野僉載沈子榮周天官選人沈子榮誦判二百道試日不下筆人問之榮曰無非命也今日誦判無一相當有一道蹟同人名又别至來年選判水磑又不下筆人問之曰我誦水磑乃是藍田今問之富平如何下筆聞者莫不撫掌焉出朝野僉載武懿宗周則天内宴甚樂河内王懿宗忽然起奏曰臣急告君子急告父則天大驚引前問之對曰臣封物承前府家自徵近敕州縣徵送大有損折則天大怒仰觀屋椽良久曰朕諸親飲正樂汝是親王為三二百户封幾驚殺我不堪作王令曳下懿宗免冠拜伏諸王救之曰懿宗愚鈍無意耳上乃釋之出朝野僉載張衡周張衡令史出身位至四品加一階合入三品已團甲因退朝路旁見蒸餅新熟遂市其一馬上食之𬒳御史彈奏則天降敕流外出身不許入三品遂落甲出朝野僉載李良弼周右拾遺李良弼自矜唇頰好談𤣥理請使北蕃説骨篤禄匈奴以木盤盛糞飼之臨以白刃弼懼食一盤並盡乃放還人譏之曰李拾遺能拾突厥之遺出為真源令秩滿還瀛洲遇契丹賊孫萬榮使何阿小取滄瀛糞具入良弼謂鹿城令李懐璧曰孫者胡孫即是獮猴難可當也萬字者有草即是草中藏勸懐璧降何阿小授懐璧三品將軍阿小敗懐璧及良弼父子四人並為河内王武懿宗斬之出朝野僉載來子珣唐來子珣則天委之按制獄多希㫖賜姓武氏字家臣丁父憂起復累加游擊將軍右羽林軍中郎將常衣錦半臂言笑自若朝士誚之諭徳張元一好譏謔曰豈有武家兒為你來家老翁制服耶出御史臺記閻知微周春官尚書閻知微庸瑣駑怯使入蕃受黙啜封為漢可汗賊入恒定遣知微先往趙州招慰將軍陳令英等守城西面知微謂令英曰陳將軍何不早降下可汗兵到然後降者剪土無遺令英不答知微城下連手踏歌稱萬嵗樂令英曰尚書國家八座受委非輕翻為賊踏歌無慙也知微仍唱曰萬歲樂萬嵗樂不自由萬嵗樂時人鄙之出朝野僉載崔湜唐崔湜為吏部侍郎貪縱兄憑弟力父挾子威咸受囑求贓汚狼籍父挹為司業受選人錢湜不之知也長名放之其人訴曰公親將賂去何為不與官湜曰所親為誰吾捉取鞭殺曰鞭即遭憂湜大怒慙主上以湜父年老瓜初熟賜一顆湜以瓜遺妾不及其父朝野誚之時崔岑鄭愔並為吏部京中謡之曰岑羲獠子後崔湜令公孫三人相比接莫賀咄最渾出朝野僉載權龍襄唐左衞將軍權龍襄性𥚹急常自矜能詩通天年中為滄州刺史初到乃為詩呈州官曰遥看滄海城楊柳鬱青青中央一羣漢聚坐打杯觥諸公謝曰公有逸才襄曰不敢趂韻而已又秋日述懐曰簷前飛七百雪白後園彊飽食房裏側家糞集野蜋參軍不曉請釋襄曰鷂子簷前飛直七百文洗衫挂後園乾白如雪飽食房中側臥家糞壤轉集得野澤蜣蜋談者嗤之皇太子宴夏日賦詩嚴霜白浩浩明月赤團團太子援筆為讃曰龍襄才子秦州人士明月晝耀嚴霜夏起如此詩章趂韻而已襄以張易之事出為容山府折衝神龍中追入乃上詩曰無事向容山今日向東都陛下敇進來今作右金吾又為喜雨詩曰暗去也沒雨明來也沒雲日頭赫赤出地上緑氳氤為瀛洲刺史日新過嵗京中數人附書曰改年多感敬想同之正新喚官人集云有詔改年號為多感元年將書呈判司已下衆人大笑龍襄復側聴怪敇書來遲高陽博野兩縣競地陳牒龍襄乃判曰兩縣競地非州不裁既是兩縣於理無妨付司權龍襄示典曰比來長官判事皆不著姓龍襄曰餘人不解若不著姓知我是誰家浪驢也龍襄不知忌日謂府史曰何名私忌對曰父母亡日請假獨坐房中不出襄至日於房中静坐有青狗突入龍襄大怒曰冲破我忌更陳牒改作明朝好作忌日談者笑之出朝野僉載太平廣記卷二百五十八
