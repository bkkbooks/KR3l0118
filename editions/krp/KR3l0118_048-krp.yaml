body:
  text: 太平廣記巻四十八神仙四十八李吉甫李紳白樂天軒轅先生李元韋卿材李吉甫李太師吉甫在淮南州境廣疫李公不飲酒不聴樂㑹有制使至不得已而張筵憂慘見色醼合謂諸客曰弊境疾厲亡殁相踵諸賢傑有何術可以見救下坐有一秀才起應曰某近離楚州有王鍊師自云從太白山來濟㧞江淮疾病休糧服氣神骨甚清得力者已衆李公大喜延於上坐復問之便令作書并手札遣人馬徃迎旬日至館於州宅稱弟子以祈之王生曰相公但令於市内多聚龜殻大鑊巨甌病者悉集無慮不瘥李公遽遣備之既得王生往令濃煎重者恣飲之輕者稍減既汗皆愈李公喜既與之金帛不受不食寡言唯從事故山南節帥相國王公起王生見必坐笑以語若舊相識李公因令王公邀至宅宿問其所欲一言便行深夜從容曰判官有仙骨學道必白日上昇如何王公無言良久曰此是塵俗態縈縛耳若住人世官職無不得者王公請以兄事之又曰本師為在白鹿與判官亦當家能與某同往一候謁否意復持疑曰仙公何名曰師不敢言索筆書鶴字王生從此不知所詣王公果富貴出逸史李紳故淮海節度使李紳少時與二友同止華隂西山舍一夕林叟有賽神者來邀適有頭痃之疾不往二友赴焉夜分雷雨甚紳入止深室忽聞堂前有人祈懇之聲徐起窺簾乃見一老叟眉鬚皓然坐東床上青童一人執香爐拱立於後紳訝之心知其異人也具衫履出拜老父曰年小識我乎曰小子未嘗拜覩老父曰我是唐若山也亦聞吾名乎曰嘗於仙籍見之老父曰吾處北海久矣今夕南海羣仙㑹羅浮山將往焉及此遇華山龍闘散雨滿空吾服藥者不欲令霑服故憇此耳子非李紳乎對曰某姓李不名紳老父曰子合名紳在籍矣能隨我一遊羅浮乎紳曰平生之願也老父喜有頃風雨霽青童吿可行叟乃袖出一簡若笏形縱拽之長丈餘横拽之闊數尺緣卷底㘭宛若舟形父登居其前令紳居其中青童坐其後叟戒紳曰速閉目慎勿偷視紳則閉目但覺風濤洶湧似泛江海逡巡舟止叟曰開視可也已在一山前樓殿参差藹若天外簫管之聲寥亮雲中端雅士十餘人喜迎叟指紳曰何人也叟曰李紳耳羣士曰異哉公埀果能來人世凡濁苦海非淺自非名繫仙籙何路得來叟令紳遍拜之羣士曰子能我從乎紳曰紳未立家不獲辭恐若黄初平貽憂於兄弟未言間羣士已知子念歸不當入此居也子雖仙籙有名而俗塵尚重此生猶沉幻界耳美名崇官外皆得之守正修静來生既冠遂居此矣勉之勉之紳復遍拜叟歸辭訖遂合目有一物若驢狀近身乘之又覺走於風濤之上頃之悶甚思見其異纔開目已墮地而失所乘者仰視星漢近五更矣似在華山北徐行數里逢旅舍乃羅浮店也去所止二十餘里緩步而歸明日二友與僕夫方奔訪覔之相逢大喜問所往詐云夜獨居偶為妖狐所惑隨造其居將曙悟而歸耳自是改名紳字公垂果登甲科翰苑厯任郡守兼將相之重出續𤣥恠録白樂天唐㑹昌元年李師稷中丞為浙東觀察使有商客遭風飄蕩不知所止月餘至一大山瑞雲奇花白鶴異樹盡非人間所覩山側有人迎問曰安得至此具言之令維舟上岸云須謁天師遂引至一處若大寺觀通一道入道士鬚眉悉白侍衞數十坐大殿上與語曰汝中國人兹地有緣方得一到此蓬萊山也既至莫要看否遣左右引於宫内遊觀玉臺翠樹光彩奪目院宇數十皆有名號至一院扃鏁甚嚴因窺之衆花滿庭堂有裀褥焚香階下客問之答曰此是白樂天院樂天在中國未來耳乃潛記之遂别之歸旬日至越具白廉使李公盡録以報白公先是白公平生唯修上乗業及覽李公所報乃自為詩二首以記其事及答李浙東云近有人從海上回海山深處見樓臺中有仙籠開一室皆言此待樂天來又曰吾學空門不學仙恐君此語是虛傳海山不是吾歸處歸即應歸兠率天然白公脱屣煙埃投棄軒冕與夫昧昧者固不同也安知非謫仙哉出逸史軒轅先生羅浮先生軒轅集年過數百顔色不衰立於床前則髮垂至地坐於闇室則目光可長數尺每採藥於深巖峻谷則有毒龍猛虎䕶衛或民家具齋飯邀之雖一日百處無不分體而至若與人飲即袖出一壺纔容三二升縱賔客滿座而傾之彌日不竭或人命飲則百斗不醉夜則垂髮於盆中其酒瀝瀝而出麯藥之香輒無減耗與獵人同羣有非朋逰者俄而見十數儀貌無所間别或飛朱於空中則可届千里病者以布巾拭之無不應手而愈唐宣宗召入内廷遇之甚厚因問曰長生之道可致乎集曰輟聲色去滋味哀樂如一徳施無偏自然與天地合徳日月齊明致堯舜禹湯之道而長生久視之術何足難哉又問先生道孰愈於張果曰臣不知其他但少於果耳及退上遣嬪御取金盆覆白鵲以嘗之而集方休於所舍忽謂其中貴人曰皇帝安能更令老夫射覆乎中貴皆不諭其言于時宣宗召令速至而纔及玉堦謂曰盆下白鵲宜早放之宣宗笑曰先生早已知矣坐於御榻前宣宗命宫中人傳湯茶有笑集貌古布素者而縝髮朱唇年始二八須臾變成老嫗雞皮鮐背鬂髪如絲於宣宗前涕泗交下宣宗知宫人之過遂令謝先生而貌復故宣宗因話京師無荳寇荔枝花俄頃二花皆連葉各近百數鮮明芳潔如纔折下更嘗賜柑子曰臣山下者有味逾於此宣宗曰朕無得矣集遂取御前碧玉甌以寳盤覆之俄而徹盤即柑子至矣芬馥滿殿其狀甚大宣宗食之歎其甘美無匹更問曰朕得幾年作天子即把筆書曰四十年但十字跳脚宣宗笑曰朕安敢望四十年乎及晏駕乃十四年也初辭歸山自長安至江陵於布囊中探金錢以施貧者約數十萬中使從之莫知其故忽然亡其所在使臣惶恐不自安後數日南海奏先生歸羅浮山矣出杜陽雜編李元李元諫議嘗𨼆於嵩山茅舍冬寒當戸熾火有老人戴大帽子直入炙脚良久問李公曰頗能同去否知君有志因自言某秦時閹人避禍得道乃去帽鬚髯偉甚曰此皆山中所長也李公思之良久乃答曰家事未了更數日得否老人揭然而起曰公意如此遂出門徑去李公牽衣媿謝不可蹔止明日尋訪悉無其跡出逸史韋卿材盧元公奉道暇日與賓友話言必及神仙之事云某有表弟韋卿材太和中選授江淮縣宰赴任出京日親朋相送離灞滻時已曛暮矣行一二十里外覺道路漸異非常日經過之處既望其中有燈燭熒煌之狀林木葱蒨似非人間頃之有謁於馬前者如州縣候吏問韋曰自何至此此非俗世俄頃復有一人至謂前謁者曰既至矣則須速報上公韋問曰上公何品秩也吏亦不對却走而去逡巡遽聲連呼曰上公屈韋下馬趨走入門則峻宇雕墻重廊複閣侍衛嚴肅擬於王侯見一人年可四十嵗平上幘衣素服遙謂韋曰上堦韋拜而上命坐慰勞久之亦無肴酒湯菓之設徐謂韋曰某因世亂百家相糺竄避於此衆推為長强謂之上公爾來數百年亦無號令約束但任之自然而已公得至此塵俗之幸也不可久留當宜速去命取絹十疋贈之韋出門上馬却尋舊路廻望亦無所見矣半夜朧月信足而行至明則已在官路逆旅暫歇詢之於人且無能知者取絹視之光白可鑑韋遂裹却入京詣親友具述其事因以絹分遺親愛韋云約其處乃在驪山藍田之間蓋地仙也出尚書故實太平廣記卷四十八
