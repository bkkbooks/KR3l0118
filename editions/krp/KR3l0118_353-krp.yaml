body:
  text: 太平廣記卷三百五十三宋李昉等編鬼三十八皇甫枚陳璠豫章中官邵元休何四郎青州客周元樞朱延夀秦進忠望江李令張飛廟祝僧彦翛建康樂人黄廷讓張瑗婺源軍人妻陳徳遇廣陵吏人皇甫枚光啓中僖宗在梁州秋九月皇甫枚將赴調行在與所親裴宜城者偕行十月自相州西抵髙平縣縣西南四十里登山越玉溪其日行旅稍稀煙雲晝晦日昃風勁惑於多岐上一長坂下視有茅屋數間槿籬疎散其中有喧語聲乃延望之少頃有村婦出自西廂之北著黄故衣蓬頭敗屨連呼之不顧但俛首而復入乃循坂東南下得及其居至則荆扉横葛縈帶其上茨棘羅生於其庭略無人蹤如渉一二年者矣枚與裴生愕立久之復登坂長望見官道有人行乃策蹇驢赴之至則郵吏將往端氏縣者也乃與俱焉是夜宿端氏出三水小牘陳璠陳璠者沛中之走卒也與故徐帥時浦少結軍中兄弟之好及浦為支辟所任璠亦累遷右職黄巢之亂支辟簡勁卒五千人命浦總之而西璠為次將浦自許昌趨洛下璠以千人反平陰浦乃矯稱支命追兵廻於是引師與璠合屠平陰掠圃田而下及沛支慮其變郊勞及解甲盛設厚賂之乃令所親諷支曰軍前不安民望見追且請公解印以厭衆心支力不能致乃率其孥出居大彭館浦自稱留後璠謂浦曰支尚書恵及沛人若不殺之將貽後悔浦不可璠固請與浦往復十餘翻浦怒曰自㸔自㸔璠乃詐為浦命謂之曰請支行李歸闕下支以為誠也翌日遂發璠伏甲於七里亭至則無少長皆殺之沛人莫不流涕其後浦受朝命乃表璠為宿州太守璠性慘酷喜殺復厚歛淫刑百姓嗟怨五年中貲賄山積浦惡之乃命都將張友代璠璠怒不受命友至處别第以俟璠出璠夜率麾下五百人圍友遲明友自領驍果百餘人突之璠潰與十餘人騎走出數十里從騎皆亡璠棄馬㣲服乞食於野野人有識之者執以送友縶之馳自浦浦命斬之於郡璠本麤悍而朴不知書臨刑忽索筆賦詩曰積玉堆金官又崇禍來倐忽變成空五年榮貴今何在不異南柯一夢中時以為鬼代作也出三水小牘豫章中官天復甲子歳豫章居人近市者夜恒聞街中若數十人語聲向市而去就視則無人如是累夜人家惴恐夜不能寐頃之紹盡誅閹宫豫章所殺凡五十餘驅之向市驟語喧噪如先所聞出稽神錄邵元休漢左司員外郎邵元休當天復年中尚未冠居兖州廨宅宅内惟乳母婢僕堂之西序最南是書齋時夜向分舉家滅燭熟寐書齋内燈亦滅邵枕書假寐聞堂之西窸窣若婦人屨聲經于堂階先至東序皆女僕之寢室也毎至一房門即住少時遂聞至南廊有閤子門不扃鍵乃推門而入即聞轟然若撲破磁器聲遂西入書齋窓外微月見一物形狀極偉不辨其面目長六七尺如以青黒帛幪首而入立于門扉之下邵不懼厲聲叱之仍問數聲都不酬答遂却出其勢如風邵欲捫枕擊之則已去矣又聞行往堂西其聲遂絶遲明驗其南房内則茶牀之上一白磁器已墜地破矣後問人云常有兵馬留後居是宅女卒權於堂西作殯宫仍訪左右有近鄰識其女者云體貌頗長葢其魄也出玉堂閒話何四郎梁時西京中州市有何四郎者以鬻粧粉自業嘗於一日五更初街鼓未鳴時聞百歩之外有人極呌何四郎者凡數聲而罷自是率以為常約半月後忽晨興開肆畢有一人若官僚之僕者直前揖之云官令召汝何意府尹之宅有取未就路僕又促之何方束帶僕又不容俄以衣牽之北行達于東西之衢何乃欲廻歸僕執之尤急何乃愈疑將非人耶嘗聞所著鞋履以之規地自圍亦可禦其邪魅某雖亟為之即被擲之于屋知其無能為也且訝且行情甚恍惚遂正北抵徽安門又西北約五七里則昏㝠矣忽有朱門峻宇若王者之府署至更深延入烈炬熒煌供帳華麗唯婦人軰欵接殷勤云是故將相之第幼女方擇良匹實慕英賢可就吉席何既覩妖冶情亦惑之婉淑之姿亦良代是比曉則卧于丘塜之間寂無人迹遂望徽安門而返草莽翳宻墮於荒井之中又經一夕飢渴難狀以衣襟承露而飲之有樵者見而問之遂報其家縋而出之數日方愈出玉堂間話青州客朱梁時青州有賈客泛海遇風飄至一處逺望有山川城郭海師曰自頃遭風者未嘗至此吾聞鬼國在是得非此邪頃之舟至岸因登岸向城而去其廬舍田畝不殊中國見人皆揖之而人皆不見已至城有守門者揖之亦不應入城屋室人物甚殷遂至王宫正值大宴羣臣侍宴者數十其衣冠器用絲竹陳設之𩔖多𩔖中國客因升殿俯逼王坐以窺之俄而王有疾左右扶還亟召巫者視之巫曰有陽地人至此陽氣逼人故王病其人偶來爾無心為祟以飲食車馬謝遣之可矣即具酒食設座於别室巫及其羣臣皆來祀祝客據按而食俄有僕夫馭馬而至客亦乗馬而歸至岸登舟國人竟不見已復遇便風得歸時賀徳儉為青州節度與魏博節度楊師厚有親因遣此客使魏具為師厚言之魏人范宣古親聞其事為余言出稽神錄周元樞周元樞者睢陽人為平盧掌書記寄居臨淄官舍一夕將寢忽有車馬輜重甚衆扣門使報曰李司空候謁元樞念親知軰皆無此人因自思必鄉曲之舊吾不及知矣即出見之延坐請問其所從來曰吾亦新家至此未有所止求居此宅矣元樞驚曰何至是對曰此吾之舊宅也元樞曰吾從官至此相𫝊云書記之公署也君何時居此曰隋開皇中嘗居之元樞曰若爾君定是鬼也曰然地府許我立廟於此故請君移去爾元樞不可曰人不當與鬼相接豈吾將死故君得凌我耶雖然理不當以此宅授君吾雖死必與君訟因召妻子曰我死必多置紙茟於棺中將與李君對訟即具酒與之飲相酧數百盃詞色愈厲客將去復留之良久一蒼頭來云夫人傳語司空周書記木石人也安可與之論難自取困哉客於是辭謝而去送之出門倐忽不見元樞竟無恙出稽神錄朱延夀夀州刺史朱延夀末年浴於室中窺見窓外有二人皆青面朱髮青衣手執文書一人曰我受命來取一人曰我亦受命來取一人又曰我受命在前延夀因呼侍者二人即滅侍者至問外有何人皆云無人俄而被殺出稽神雜錄秦進忠天祐丙子嵗浙西軍士周交作亂殺大將秦進忠張𦙍凡十餘人進忠少時嘗怒一小奴刃貫心殺而并埋之末年恒見此奴捧心而立始於百步之外稍稍而近其日將出乃在馬前左右皆見之而入府又遇亂兵傷胷而卒張𦙍前月餘毎聞呼其姓名聲甚清越亦稍稍而近其日若在對面入府皆斃矣出稽神錄望江李令望江李令者罷秩居舒州有二子甚聰慧令嘗飲酒暮歸去家數百步見二子來迎即共禽而敺之令驚大怒大呼而逺方人絶竟無知者且行且敺將至家二子皆却走而去及入門二子復迎于堂下問之皆云未嘗出門後月餘令復飲酒於所親家因具白其事請留宿不敢歸而其子恐其及暮歸復為所敺即俱往迎之及中途見其父怒曰何故暮出即使從者撃之困而獲免明日令歸益駭其事不數月父子皆卒郡人云舒有山鬼善為此厲葢黎邱之徒也出稽神錄張飛廟祝梓州去城十餘里有張飛廟廟中有土偶為衛士一夕感廟祝之妻經年遂生一女其髮如朱眉目手足皆如土偶之狀至於長大人皆畏之凡蒞職梓州者謁廟則呼出驗之或遺之錢帛至今猶存出野人閒話僧彦翛草書僧文英大師彦翛始在洛都明宗世子秦王從榮復厚遇之後有故南居江陵西湖曽口寺一日恍惚忽見秦王擁二十騎詣寺訪彦翛彦翛問大王何以此來恰未對倐而不見彦翛方訪於人不旬日秦王遇害出北夢瑣言建康樂人建康有樂人日晚如市見二僕夫云陸判官召隨之而去至大宅陳設甚嚴賔客十餘人皆善酒惟飲酒而不設食酒亦不及樂人向曙而散樂人困甚因卧門外牀上既寤乃在草間旁有大塚問其里人云相傳陸判官之塜不知何時人也出稽神錄黄廷讓建康吏黄廷讓嘗飲酒於親家迨夜而散不甚醉恍然而身浮飄飄而行不能自制行可十數里至一大宅寂然無人堂前有一小房房中有牀廷讓困甚因寢牀上及寤乃在蔣山前草間踰重城複塹矣因恍惚得疾嵗餘乃愈出稽神錄張瑗江南内臣張瑗日暮過建康新橋忽見一美人袒衣猖獗而走瑗甚訝諦視之婦人忽爾廻頭化為旋風撲瑗瑗馬倒傷面月餘乃復初馬既起乃提一足跛行而歸自是毎過此橋馬輒提一足而行竟無他怪出稽神錄婺源軍人妻丁酉嵗婺源建威軍人妻死更娶其後妻虐遇前妻之子過甚夫不能制一日忽見亡妻自門而入大怒後妻曰人誰無死孰無母子之情乃虐我兒女如是耶吾比訴與地下所司今與我假十日使我誨汝汝遂不改必能殺君夫妻皆恐懼再拜即為具酒食徧召親黨鄰里問訊叙話如常他人但聞其聲唯夫見之及夜為設榻别室夫欲從之宿不可滿十日將去復責勵其後妻言甚切至舉家親族共送至墓去墓百餘歩曰諸人可止矣復殷勤辭訣而去將及栢林中諸人皆見之衣服容色如平生及墓乃沒建威軍使汪延昌言如是出稽神錄陳徳遇辛亥嵗江南偽右藏庫官陳居讓字徳遇直宿庫中其妻在家五更初忽夢二吏手把文書自門而入問此陳徳遇家耶曰然徳遇何在曰在庫中吏將去妻追呼之曰家夫字徳遇耳有主衣庫官陳徳遇者家近在東曲二吏相視而嘻曰幾誤矣遂去邇日徳遇晨起如厠自云有疾還卧良久遂卒二人並居治城之西出稽神錄廣陵吏人廣陵吏姓趙當暑獨寢一室中夜忽見大黄衣人自門而入從小黄衣七人謂己曰處處尋不得乃在此耶叱起之曰可以行矣一黄衣前曰天年未盡未可遽行宜有以記之可也大人即探懐出一印印其左臂而去及明視之印文著肉字若古篆識其下右若仙字左若記字其上不可識趙後不知所終出稽神錄太平廣記卷三百五十三
