body:
  text: 太平廣記卷二百五十二詼諧八李曜王鐸薛昭緯孔緯宇文翰千字文語乞社山東佐史羅隐盧延讓俳優人王舍城顧夐不調子司馬都吳堯卿李任爲賦李曜唐尚書李曜罷歙州與吳圓交代有佐酒錄事名媚川聰明敏慧李頗留意而已納營籍妓韶光託於替人令存䘏之臨發洪飲不勝離情有詩曰經年理郡少歡娛為習干戈閒飲徒今日臨行盡交割分明收取媚川珠吳答曰曵履優容日日歡須言達徳倍汍瀾韶光今已輸先手領得蠙珠掌内看出抒情詩王鐸唐中書令王鐸位望崇顯率由文雅然非定亂才出鎮清宫為都綂以禦黄巢攜姬妾赴鎮而妻妬忌忽報夫人離京在道鐸謂從事曰黄巢漸似南來夫人又自北至旦夕情味何以安處幕僚戲曰不如降黄巢王亦大笑洎荆州失守復把潼關黄巢傳語云令公儒生非是我敵請自退避無汚鋒刃於是棄關隨僖皇播遷干蜀再授都綂收復京都大勲不成竟罹非命出北夢瑣言薛昭緯唐薛昭緯未登第前就肆買鞋肆主曰秀才脚第幾對曰昭緯作脚來未曾與立行第出北夢瑣言孔緯唐宰相孔緯嘗拜官教坊伶人繼至求利市有石野猪獨行先到有所賜乃謂曰宅中甚闕不得厚致若見諸野猪幸勿言也復有一伶至乃召俯階索其笛指笛竅問曰何者是浣溪沙孔子伶大笑之出北夢瑣言宇文翰唐道士程子宵登華山上方偶有顛仆郎中宇文翰致書戲之曰不知上得不得且怪懸之又懸出北夢瑣言千字文語乞社敬白社官三老等切聞政本於農當須務兹稼穡若不雲騰致雨何以稅熟貢新聖上臣伏戎羌愛育黎首用能閏餘成歲律吕調陽某人等並景行維賢徳建名立遂乃肆筵設席祭祀蒸嘗鼓瑟吹笙絃歌酒讌上和下睦悅豫且康禮别尊卑樂殊貴賤酒則川流不息肉則似蘭斯馨非直菜重芥薑兼亦果珍李柰莫不矯首頓足俱共接盃舉觴豈徒戚謝歡招信乃福緣善慶但某乙某索居閑處孤陋寡聞雖復屬耳垣墻未曾攝職從政不能堅持雅操專欲逐物意移憶肉則執熱愿凉思酒如骸垢想浴老人則飽飫烹宰某乙則饑厭糟糠欽風則空谷𫝊聲仰惠則虚堂習聽脫蒙仁慈隐惻庶有濟弱扶傾希垂顧答審詳望咸渠荷滴厯某乙即稽顙再拜終冀勒碑刻銘但知悚懼恐惶實若臨深履薄出啓顔録山東佐史唐山東一老佐史前後縣令無不遭侮家致巨富令初至者皆以文案試之即知强弱有令初至因差丁造名簿將身㸃過有姓向名明府者姓宋名郎君者姓成名老䑕者姓張名破袋者此佐史故超越次第使其名一處以觀明府强弱先喚張破袋成老䑕宋郎君向明府其縣令但㸃頭而已意無所問佐史出而喜曰㡌底可知竟還即賣之出啓顔録羅隐唐羅隐與周繇分深謂隐曰閤下有女障子詩極好乃為絶唱隐不喻何為也曰若教解語應傾國任是無情也動人是隐題花詩隐撫掌大笑出抒情詩盧延讓唐盧延讓業詩二十五舉方登第卷中有狐衝官道過狗觸店門開之句租庸調張濬親見此事每稱賞之又有餓猫臨䑕穴嚵犬䑛魚砧句為中書令成汭所賞又有栗爆燒氊破猫跳觸鼎翻為蜀王建所賞盧謂人曰平生投謁公卿不意得力於猫䑕狗子也人聞而笑之出北夢瑣言俳優人唐咸通中俳優人李可及滑稽諧戲獨出輩流雖不能託諷諭然巧智敏㨗亦不可多得嘗因延慶節緇黄講論畢次及倡優為戲可及襃衣博帶攝齊以昇座自稱三教論衡偶坐者問曰既言博通三教釋迦如來是何人對曰婦人問者驚曰何也曰金剛經云敷座而座或非婦人何煩夫坐然後兒坐也上為之啓齒又問曰太上老君何人曰亦婦人也問者益所不諭乃曰道徳經云吾有大患為吾有身及吾無身吾有何患儻非為婦人何患於有娠乎上大悦又問曰文宣王何人也曰婦人也問者曰何以知之曰論語云沽之哉沽之哉我待價者也向非婦人待嫁奚為上意極歡寵錫頗厚出唐闕史又天復元年鳯翔李茂貞請入朝奏事昭宗御安福樓茂貞涕泣陳匡救之言時崔相𦙍密奏曰此姦人也未足為信陛下宜寛懐待之翌日宴於壽春殿茂貞肩輿披褐入金鑾門易服赴宴咸以為前代䟦扈未之有也時中官韓全誨深結茂貞崔相懼之自此亦結朱全忠竟致汴州迎駕刼遷入洛之殆以王子帶召戎崔𦙍比之先是茂貞入關放火燒京闕居人殆盡是宴也教坊優人安轡新號茂貞為火龍子茂貞慙惕俛首仍竊怒曰他日㑹殺此豎子安聞之因請告往岐下謁茂貞茂貞見之大詬曰此賊胡顔敢來邪當求乞耳安曰只思上謁非敢有干也茂貞曰貧儉若斯胡不求乞安曰京城近日但賣麩炭便足一生何在求乞茂貞大笑而厚賜之出北夢瑣言又光化中朱朴自毛詩博士拜相而朴恃其口辯謂可安致太平由藩王引導聞於昭宗遂有此命對􅤬之日靣陳言數條每言臣必為陛下致之洎操大柄殊無所成自是恩澤日衰中外騰沸内宴日俳優穆刁綾作念經行者至前朗諷曰若見朱相即是非相翌日出宫時人語曰故為相自古有之君子不恥其言之不出恥躬之不逮况經䘮亂天下阻兵雖負荷竒才不能為計而朱朴一儒生恃區區之辯欲其整亂秪取辱焉宜其涓縷未申而黜放已至故大為識者之所嗤也出北夢瑣言又太祖入覲昭宣昭宗開宴坐定伶倫百戲在焉俳恒直頌聖先祝帝徳然後説元勲梁王之功業曰我元勲梁王五百年閒生之賢九優太史胡䟎應曰灼然如此四海之内共知固教朝廷如東向侍宴臣僚無不失色獨梁太祖但笑而已昭宗不懌如無柰何䟎又自好博奕嘗獨跨一驢日致故人家棊多早去晩歸年歲之間不曽暫輟每到其家主人必戒家童曰與都知於後院餵飼驢子䟎甚感之夜則跨歸一日非時宣召䟎倉忙索驢及牽前至則覺喘氣通體汗流乃正與主人拽磑耳䟎方知自來與其家拽磨明早復展歩而至主人亦曰與都知擡舉驢子曰驢子今日偶來不得主人曰何也䟎曰只從昨回宅便患頭旋惡心起止未得且乞假將息主人亦大笑葢以䟎之黠也如是而不知其所乘經年與人旋磑享利亦數為同人對銜揶揄之出玉堂閒話王舍城偽蜀王先主未開國前西域僧至蜀蜀人瞻敬如見釋迦舍於大慈三學院蜀主復謁坐於㕔傾都士女就院不令止之婦女列次禮拜俳優王舍城飃言曰女弟子勤苦禮拜願後身靣孔一切似和尚蜀主大笑出北夢瑣言顧夐僞蜀王先主起自利閬號親騎軍皆拳勇之士四百人分闕執紫旗凡戰陣若前軍將敗麾紫旗以副之莫不闕靡霆駭星㪚未嘗挫衂此團將卒多達或至節將闕至㪚員亦享官禄以之定霸皆資福人于時闕南黑雲都皆紫旗之𩔖也此從各有名號時顧闕亦嘗典郡多雜談謔曾造武舉助曰大順闕侍郎李吒吒下進士及第三闕憨子姜癩子張打胸長小闕許闕李嗑蛆李破肋李吉了樊忽雷日遊神王號馳郝牛屎闕貢陳波斯羅蠻子試亡命山澤賦到處不生草詩斯亦麥鐵杖韓擒虎之流也出北夢瑣言不調子有不調子恒以滑稽為事輩流間有慧㸃過人性識機警者皆𬒳誘而翫之嘗與一秀士同舟泛江湖中將欲登路同船客有驢瘦劣尾仍偏不調子堅勸秀士市之秀士鄙其痩劣勉之曰此驢有異相不同常等不得已髙價市之既捨檝登途果尫弱不堪乘跨而苦尤之不調曰勿悔此不同他等其夕忽值雪不調曰得之矣請貰酒三五盃然後奉為話其故事秀士又僶俛貰而飲之及舉爵言之曰君不聞杜荀鶴詩云就船買得鱸偏美踏雪沽來酒倍香乎請君買驢沽酒者葢為杜詩有之非無証據秀士被賣而翫之殊不知覺至是方悟焉出玉堂閒話司馬都前進士司馬都居于青邱嘗以錢二萬託戎帥王師範下軍將市絲經年絲與金並為所没都因月旦趨府謁王公偶見此人問之其人貌狀魁偉鬍顋兇頑發怒欲自投于井都徐曰何至如此足下吒一抱之髭鬚色斯舉矣望千尋之玉甃井有人焉王公知之斃軍將于枯木出玉堂閒話吳堯卿唐吳堯卿家于廣陵初為傭保於逆旅善書計因之出入府庭遂聞於搢紳間始為鹽鐡小吏性敏辯於事之利病皆心記能調悅人耳目故丞相李蔚以其能自首任之與高駢因署堯卿知泗州院之兼利國監尋奏為敕史制命未行㑹軍變復歸廣陵頃之知浙西院數月而罷又知揚州院兼㩁糶使僞朝授堯卿御史大夫堯卿託附權勢不問貴賤茍有岐路縱厮養輩必歛袵且以金玉餌之微以失勢雖素約為之死交則相對終日不復與言趨利背義如此權貴無不以賄賂交結之故不離淮泗僭竊朱紫塵汚官省三數年間盗用鹽鐡錢六十萬緡時王棨知兩使句務下堯卿獄將窮其事為諸葛殷所保持獲全及城陷軍人識是堯卿者咸請啗之畢師鐸不許夜令堯卿以他服而遁至楚州遇變為仇人所殺棄屍衢中其妻以紙絮葦棺歛之未及就壙好事者題其上云信物一角附至阿鼻地獄請去斜封送上閻羅王時人以為笑端出妖亂志李任為賦天成年盧文進鎮鄧因出城賔從偕至舍人韋吉亦被召年老無力控馭既醉馬逸東西馳桑林之中被横枝罥挂巾冠露禿而奔突僕夫執從則已墜矣舊患肺風鼻上瘾疹而黑臥于道周幕客無不笑者從事令左司郎中李任祠部員外任瑤各占一韻而賦之賦略云當其㕔子潛窺衙官共看諠呼於麥壠之裏偃仆於桑林之畔藍攙鼻孔真同生鐵之椎靦甸骷髏宛是熟銅之鑵餘不記之聞之者無不解頤出玉堂閒話太平廣記卷二百五十二
