body:
  text: 太平廣記卷三百二十三宋李昉等編鬼八張隆吉礐石富陽人給使甄法崇謝晦謝靈運梁清徐道饒東莱陳氏謝道欣沈寂之王胡陶繼之朱泰戴承伯章授施續門生張道虚張隆宋永初三年吳郡張隆家忽有一鬼云汝與我食當相佑助後爲作食因以大刀斫其所食處便聞數十人哭哭亦甚悲云死何由得棺又聞云主人家有破船奴甚愛惜當取爲棺見取船至有斧鋸聲日既暝聞呼喚舉尸置船中隆皆不見惟聞處分便見船漸升空入雲霄中及滅後復聞如有數十人大笑云汝那能殺我也但向以惡我憎汝故隱没汝船耳隆便回意奉事此鬼問吉凶及將来之計語隆曰汝可以大甕著壁角中我當爲覓物也十日一倒有錢及金銀銅鐵魚腥之屬出幽明錄吉礐石吉未翰從弟名礐石先作檀道濟參軍嘗病因見人著朱衣前来揖云特来相迎礐石厚爲施設求免鬼曰感君延接當爲少停乃不復見礐石漸差後丁艱還夀陽復見鬼曰迎使尋至君便可束装礐石曰君前已留懐今復得見愍否鬼曰前召欲相使役故停耳今泰山屈君爲主簿又使隨至不可辭也便見車馬傳教油㦸羅列於前指示家人人莫見也礐石介書呼親友告别語笑之中便奄然而盡出幽明錄富陽人宋元嘉初富陽人姓王於窮瀆中作蟹籪旦往視見一材頭長二尺許在籪裂開蟹出都盡乃修治籪出材岸上明往看之見材復在籪中敗如前王又治籪再往視所見如初王疑此材妖異乃取納蟹籠中繋擔頭歸云至家當破然之未之家三里聞中倅倅動轉顧見向材頭變成一物人面猴身一手一足語王曰我性嗜蟹比實入水破若蟹籪相負已多望君見恕開籠出我我是山神當相佑助使全籪大得蟹王曰汝犯暴人前後非一罪自應死此物轉頓請乞放又頻問君姓名爲何王回顧不應答去家轉近物曰既不放我又不告我姓名當復何計但應就死耳王至家熾火焚之後寂無復異土俗謂之山魈云知人姓名則能中傷人所以勤問正欲害人自免出述異記給使近世有人得一小給使頻求還家未遂後日久此使在南窻下眠此人見門中有一婦人年五六十肥大行步艱難使眠失覆婦人至牀邊取被以覆之回復出門去使轉側衣落婦人復如初此人心怪明問使以何事求歸使云母病次問狀貌及年皆如所見惟云形瘦不同又問母何患答云病腫而即與使假使出便得家信云母喪追計所見之肥乃是其腫狀也出幽明錄甄法崇宋甄法崇永初中爲江陵令在任嚴明其時南平繆士爲江安令卒於官後一年崇在㕔忽見一人從門而入云繆士謹通法崇知其亡因問卿貌何故瘦答云我生時所行善不補惡罹繋苦復勤劇理墨又云卿縣民某甲負我米千餘石無券書悍不還今兒累窮弊乞為嚴敕法崇曰卿可作詞士云向不賫紙且又不復書矣法崇令省事取筆疏其語士口授其言歴歴辭成謝而去法崇以事問繆家云有此登時攝問負米者畏怖依實輸還出渚宫舊事謝晦謝晦在荆州壁角間有一赤鬼長可三尺来至其前手擎銅盤滿中是血晦得乃紙盤須臾而没出異苑謝靈運謝靈運以元嘉五年忽見謝晦手提其頭来坐别牀血流淋落不可忍視又所服貂裘血淹滿箧及爲臨川郡飯中倐有大蟲遂被誅岀異苑梁清宋文帝世天水梁清家在京師新亭臘日將祀使婢於爨室造食忽覺空中有物操杖打婢婢走告清清遂往見甌器自運盛飯斟羮羅列案上聞哺啜之聲清曰何不見形乃見一人著平上幘烏皮袴褶云我京兆人亡没飄寄聞卿好士故来相從清便席地共坐設肴酒鬼云卿有祀事云云清圖某郡先以訪鬼鬼云所規必諧某月某日除出果然鬼云郡甚優閒吾願周旋清答甚善後停舟石頭待之五日鬼不来於是引路達彭城方見至同在郡數年還都亦相隨而返出述異記徐道饒徐道饒以元嘉十年忽見一鬼自言是其先人於時冬日天氣清朗先積稻屋下云汝明日可曝榖天將大雨未有晴時饒從其教鬼亦助輦後果霖雨時有見者形如獼猴饒就道士請符懸著窓戸鬼便大笑欲以此斷我我自能從狗竇中入雖聞此語而不復進經數日歎云徐叔寶来吾不宜見之後日果至於是遂絶出異苑東莱陳氏東莱有一家姓陳家百餘口朝炊釡不沸舉甑看之忽有一白頭公從釡中出便詣師師云此大怪應滅門便歸大作械械成使置門壁下堅閉門在内有馬騎麾葢來叩門者慎勿應乃歸合手伐得百餘械置門屋下果有人至呼不應主帥大怒令縁門入從人窺門内見大小械百餘出門還說如此帥大惶惋語左右云教速来不速来遂無復一人當去何以解罪也從此北行可八十里有一百三口取以當之後十日中此家死亡都盡此家亦姓陳出搜神記謝道欣㑹稽郡常有大鬼長數丈腰大數十圍髙冠𤣥服郡將吉凶先於雷門示憂喜之兆謝氏一族憂喜必告謝𢎞道未遭母艱數月鬼晨夕来臨及後將轉吏部尚書拊掌三節舞自大門至中庭尋而遷問至謝道欣遭重艱至離塘行墓地往向夜見離塘有雙炬須臾火忽入水中仍舒長數十丈色白如練稍稍漸還赤散成數百炬追逐車從而行悉見火中有鬼甚長大頭如五石籮其狀如大醉者左右小鬼共扶之是年孫恩作亂㑹稽大小莫不翼戴時以爲欣之所見亂之徴也禹㑹諸侯㑹稽防風之鬼也出志怪錄沈寂之吳興沈寂之以元嘉中忽有鬼於空中語笑或歌或哭至夜偏盛寂之有靈車鬼共牽走車爲壊寂之有長刀乃以置甕中有大鏡亦攝以納器中出異苑王胡宋王胡者長安人也叔死數載元嘉二十三年忽形見還家責胡以修謹有缺家事不理罰胡五杖傍人及鄰里並聞其語及杖聲又見杖瘢而不見其形惟胡獨得親接叔謂胡曰吾不應死神道須吾算諸鬼録今大從吏兵恐驚損鄰里故不將進耳胡亦大見衆鬼紛閙於村外俄而辭去曰吾來年七月七日當復暫還欲將汝行逰歴幽途使知罪福之報也不須費設若意不已止可茶食耳至期果還語胡家人云吾今將胡逰觀觀畢當還不足憂也胡即頓臥牀上泯然如盡叔於是將胡遍觀羣山備觀鬼怪末至嵩髙山諸鬼迎胡並有饌設其品味不異世中惟薑甚脆美胡懐之將還左右人笑云止可此食不得將逺也胡又見一處屋宇華曠帳筵精美有二少僧居焉胡造之二僧爲設雜果梹榔等胡遊歴久之備見罪福苦樂之報及辭歸叔謂云汝既已知善之當修返家尋白足阿練此人戒行精髙可師事也長安道人足白故時人謂爲白足阿鍊也甚爲魏虜所敬虜王事爲師胡既奉此訓遂與嵩山上年少僧者遊學衆中忽見二僧胡大驚與敘乖闊問何時来此二僧云貧道本住此寺往日不意與君相識胡復說嵩髙之遇衆僧云君謬耳豈有此耶至明日二僧不辭而去胡乃具告諸沙門敘說往日嵩山所見衆咸驚怪即追求二僧不知所在出異苑陶繼之陶繼之元嘉末爲秣陵令嘗枉殺樂伎夜夢伎来云昔枉見殺訴天得理今故取君遂跳入陶口仍落腹中須臾復出乃相謂曰今直取陶秣陵亦無所用更議王丹陽耳言訖遂没陶未㡬而卒王丹陽果亡出述異記朱泰朱泰家在江陵宋元徽中病亡未殯忽形見還坐尸側慰勉其母衆皆見之指揮送終之具務從儉約謂母曰家比貧泰又亡歿永違侍養殯殮何可廣費出述異記戴承伯宋戴承伯元徽中買荆州治下枇杷寺其額乃悞東空地爲宅日暮忽聞恚罵之聲起視有人形狀可怪承伯問之答曰我姓龔本居此宅君爲何强奪承伯曰戴瑾賣地不應見咎鬼曰利身妨物何預瑾乎不速去當令君知言訖而沒承伯性剛不爲之動旬日暴疾卒出渚宫舊事章授丹陽郡吏章授使到吳郡經毘陵有一人年三十餘黄色單衣從授寄載笥行數日略不食所過鄉里輒周旋里中即聞有呼魂者良久還船授疑之伺行後發其笥有文書數卷皆是吳郡諸人名又有針數百枚去或將一管後還得升餘酒數片脯謂授曰君知我是鬼也附載相煩求得少酒相與别所以多持針者當病者以針針其神焉今所至皆此郡人丹陽别有使往今年多病君勿至病者家授從乞藥答言我但能行病殺人不主藥治病也元嘉末有長安僧釋曇爽来游江南具說如此也出法苑珠林施續門生吳興施續有門生常秉無鬼論忽有一單衣白袷客與共語遂及鬼神移日客辭屈乃曰君辭巧理不足僕即是鬼何以云無問鬼何以来答曰受使来取君期盡明日食時門生請乞酸苦鬼問有人似君者否云施續帳下都督與僕相似便與俱往與都督對坐鬼手中出一鐵鑿可尺餘按著都督頭便舉椎打之都督云頭覺微痛向来轉劇食頃便亡出搜神記張道虚吳郡張道虚張順知名士也居在閶門遭母喪中買新宅日暮聞人扣門云君是佳人何爲危人自安也答云僕自買宅得君棺器爲市甓作冢相移有何負鬼曰移身著吳將軍冢吾是小人日夜鬭不可堪忍不信君可隨我視之於是二張恍惚便至閶門外二張聴之但聞冢中淘淘打拍鬼便語云當令君知少時兄弟俱亡出神鬼錄太平廣記卷三百二十三
