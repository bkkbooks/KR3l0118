body:
  text: 太平廣記巻四百四十七宋李昉等編狐一説狐瑞應周文王漢廣川王陳羡管輅習鑿齒陳斐孫巖夏侯藻胡道洽北齊後主宋大賢長孫無忌狐神張簡僧服禮上官翼大安和尚説狐狐五十歲能變化為婦人百歲為羙女為神巫或為丈夫與女人交接能知千里外事善蠱魅使人迷惑失智千歲即與天通為天狐出𤣥中記瑞應九尾狐者神獸也其狀赤色四足九尾出青丘之國音如嬰兒食者令人不逢妖邪之氣及蠱毒之𩔖出瑞應編周文王周文王拘羑里散宜生詣塗山得青狐以獻紂免西伯之難出瑞應編漢廣川王漢廣川王好發冡發欒書冡其棺柩明器悉毁爛無餘唯有白狐一頭見人驚走左右逐之不得㦸傷其足是夕王夢一丈夫鬚眉盡白來謂王曰何故傷吾左足以杖叩王左足王覺腫痛因生瘡至死不差陳羡後漢建安中沛國郡陳羡為西海都尉其部曲士靈孝無故逃去羡欲殺之居無何孝復逃走羡久不見囚其婦其婦實對羡曰是必魅將去當求之因將歩騎數十領獵犬周旋於城外求索果見孝於空冡中聞人犬聲怪避羡使人扶以歸其形頗象狐矣略不復與人相應但啼呼索阿紫阿紫雌狐字也後十餘日乃稍稍了寤云狐始來時于屋曲角雞棲間作好婦形自稱阿紫招我如此非一忽然便隨去即為妻暮輒與共還其家遇狗不覺云樂無比也道士云此山魅狐者先古之淫婦也名曰阿紫化為狐故其怪多自稱阿紫也出捜神記管輅魏管輅常夜見一小物狀如獸手持火向口吹之將爇舍宇輅命門生舉刀奮擊㫁腰視之狐也自此里中無火災出小說習鑿齒晉習鑿齒為桓温主簿從温出獵時大雪于臨江城西見草雪上氣出覺有物射之應弦死往取之乃老雄狐脚上帶綘繒香嚢出渚宫遺事陳斐酒泉郡每太守到官無幾輒死後有渤海陳斐見授此郡憂愁不樂將行卜吉凶日者曰遠諸侯放伯裘能解此則無憂斐不解此語卜者曰君去自當解之斐既到官侍醫有張侯直醫有王侯卒有史侯董侯斐心悟曰此謂諸侯乃逺之即卧思放伯裘之義不知何謂夜半後有物來斐被上便以被冐取之物跳踉訇訇作聲外人聞持火入欲殺之鬼乃言曰我寔無惡意但府君能赦我當深報君耳斐曰汝為何物而忽干犯太守魅曰我本千年狐也今字伯裘有年矣若府君有急難呼我字當自解斐乃喜曰眞放伯裘之義也即便放之忽然有光赤如電從戸出明日夜有擊戸者斐曰誰曰伯裘也曰來何為曰白事北界有賊也斐驗之果然每事先以語斐無毫髪之差而咸曰聖府君月餘主簿李音私通斐侍婢既而懼為伯裘所白遂與諸侯謀殺斐伺傍無人便使諸侯持杖入欲格殺之斐惶怖即呼伯裘來救我即有物如曵一疋綘剨然作聲音侯伏地失魂乃縛取考訊之皆服云斐未到官音已􅘨失禮與諸侯謀殺斐㑹諸侯見斥事不成斐即殺音等伯裘乃謝斐曰未及白音姦情乃為府君所召雖効微力猶用慙惶後月餘與斐辭曰今後當上天不得復與府君相往來也遂去不見出捜神記孫巖後魏有挽歌者孫巖取妻三年妻不脫衣而卧巖私怪之伺其睡陰解其衣有尾長三尺似狐尾巖懼而出之甫臨去將刀截巖髪而走鄰人逐之變為一狐追之不得其後京邑被截髪者一百三十人初變為婦人衣服凈粧行于道路人見而悅之近者被截髪當時婦人著綵衣者人指為狐魅出洛陽伽藍記夏侯藻夏侯藻母病困將詣淳于智卜有一狐當門向之嘷呌藻愕懼遂馳詣智智曰祸甚急君速歸在嘷處拊心啼哭令家人驚怪大小畢出一人不懼啼哭勿休然其祸僅可救也藻如之母亦扶病而出家人既集堂屋五間拉然而崩出捜神記胡道洽胡道洽自云廣陵人好音樂醫術之事體有臊氣恒以名香自防唯忌猛犬自審死日戒弟子曰氣絶便殯勿令狗見我尸也死於山陽斂畢覺棺空即開看不見尸體時人咸謂狐也出異苑北齊後主北齊後主武平中朔州府門無故有小兒脚跡及擁土為城雉之狀察之乃狐媚是歳安南正起兵於北朔出談藪宋大賢隋南陽西郊有一亭人不可止止則有禍邑人宋大賢以正道自處嘗宿亭樓夜坐鼓琴忽有鬼來登梯與大賢語矃目磋齒形貎可惡大賢鼓琴如故鬼乃去於市中取死人頭來還語大賢曰寧可少睡耶因以死人頭投大賢前大賢曰甚佳吾暮卧無枕正欲得此鬼復去良久乃還曰寧可共手搏耶大賢曰善語未竟在前大賢便逆捉其腰鬼但急言死大賢遂殺之明日視之乃是老狐也自此亭舍更無妖怪出法苑珠林長孫無忌唐太宗以羙人賜趙國公長孫無忌有殊寵忽遇狐媚其狐自稱王八身長八尺餘恒在羙人所羙人見無忌輒持長刀斫刺太宗聞其事詔諸術士前後數四不能却後術者言相州崔參軍能愈此疾始崔在州恒謂其僚云詔書見召不日當至數日敕至崔便上道王八悲泣謂羙人曰崔參軍不久將至為之奈何其發後止宿之處輒具以白及崔將達京師狐便遁去既至敕詣無忌家時太宗亦幸其第崔設案几坐書一符太宗與無忌俱在其後頃之宅内井竈門厠十二辰等數十輩或長或短狀貎竒怪悉至庭中崔訶曰諸君等為貴官家神職任不小何故令媚狐入宅神等前白云是天狐力不能制非受賂也崔令捉狐去少頃復來各著刀箭云適已苦戰被傷終不可得言畢散去崔又書飛一符天地忽爾昏暝帝及無忌懼而入室俄聞虛空有兵馬聲須臾見五人各長數丈來詣崔所行列致敬崔乃下階小屈膝尋呼帝及無忌出拜庭中諸神立視而已崔云相公家有媚狐敢煩執事取之諸神敬諾遂各散去帝問何神崔云五嶽神也又聞兵馬聲乃纒一狐墜砌下無忌不勝憤恚遂以長劍所之狐初不驚崔云此已通神擊之無益自取困耳乃判云肆行姦私神道所殛量決五下狐便乞命崔取東引桃枝決之血流滿地無忌不以為快但恨杖少崔云五下是人間五百殊非小刑為天曹役使此輩殺之不可使敕自爾不得復至相公家狐乃飛去羙人疾遂愈出廣異記狐神唐初已來百姓多事狐神房中祭祀以乞恩食飲與人同之事者非一主當時有諺云無狐魅不成村出朝野僉載張簡唐國子監助敎張簡河南緱氏人也曾為鄉學講文選有野狐假簡形講一紙書而去須臾簡至弟子怪問之簡異曰前來者必野狐也講罷歸舍見妹坐絡絲謂簡曰適煮菜冷兄來何遲簡坐久待不至乃責其妹妹曰元不見兄來此必是野狐也更見即殺之明日又來見妹坐絡絲謂簡曰鬼魅適向舍後簡遂持棒見眞妹從厠上出來遂擊之妹號呌曰是兒簡不信因擊殺之問絡絲者化為野狐而走出朝野僉載僧服禮唐永徽中太原有人自稱彌勒佛禮謁之者見其形底于天久之漸小纔五六尺身如紅蓮花在葉中謂人曰汝等知佛有三身乎其大者為正身禮敬傾邑僧服禮者博于内學歎曰正法之後始入像法像法之外尚有末法末法之法至于無法像法處乎其間者尚數千年矣釋迦敎盡然後大劫始壞劫壞之後彌勒方去兠率下閻浮提今釋迦之敎未虧不知彌勒何遽下降因是䖍誠作禮如對彌勒之狀忽見足下是老狐幡花旄葢悉是冡墓之間紙錢爾禮撫掌曰彌勒如此耶具言如狀遂下走追之不及出廣異記上官翼唐麟德時上官翼為絳州司馬有子年二十許嘗曉日獨立門外有女子年可十三四姿容絶代行過門前此子悅之便爾戲調即求歡狎因問其所止將欲過之女云我門戸雖有郎州佐之子兩俱形迹不願人知但能有心得方便自來相就此子邀之期朝夕女初固辭此子將欲便留之然漸見許昏後徙倚俟之如期果至自是每夜常來經數日而舊使老婢于牖中窺之乃知是魅以告翼百方禁㫁終不能制魅來轉數晝夜不去兒每將食魅必奪去盃椀此魅已飽兒不得食翼常手自作啖剖以貽兒至手魅已取去翼頗有智數因此宻搗毒藥時秋晚油麻新熟翼令熬兩叠以一置毒藥先取好者作啖偏與妻子末乃與兒一啖魅便接去次以和藥者作啖與兒魅亦將去連與數啖忽變作老狐宛轉而朴擒獲之登令燒毁訖合家歡慶此日昏後聞遠處有數人哭聲斯須漸近遂入堂後並皆稱寃號擗甚哀中有一叟哭聲每云若痛老狐何乃為喉嚨枉殺腔幢數十日聞朝夕來家往往見有衣縗絰者翼深憂之後來漸稀經久方絶亦無害也出廣異記大安和尚唐則天在位有女人自稱聖菩薩人心所在女必知之太后召入宫前後所言皆驗宫中敬事之數月謂為眞菩薩其後大安和尚入宮太后問見女菩薩未安曰菩薩安在願一見之敇令與之相見和尚風神邈然久之大安曰汝善觀心試觀我心安在答曰師心在塔頭相輪邉鈴中尋復問之曰在兠率天彌勒宫中聽法第三問之在非非想天皆如其言太后忻悦大安因且置心于四果阿羅漢地則不能知大安呵曰我心始置阿羅漢之地汝已不知若置于菩薩諸佛之地何由可料女詞屈變作牝狐下階而走不知所適出廣異記太平廣記卷四百四十七
