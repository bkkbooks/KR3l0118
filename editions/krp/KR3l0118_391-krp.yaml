body:
  text: 太平廣記卷三百九十一宋李昉等編銘記一李斯夏侯嬰張恩髙流之髙顯洛謝靈運王果豐都冢樊欽賁姜師度鄔載鄭欽悅李斯周末有發冢得方玉石上刻文八十字當時莫識遂藏書府至秦時李斯識八字云上天作命皇辟迭王至漢時叔孫通識二字出述異記夏侯嬰漢夏侯嬰以功封滕公及死將𦵏未及墓引車馬踣地不前使人掘之得一石室室中有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室遂改卜焉出獨異記張恩後魏天賜中河東人張恩盗發湯冢得志云我死後二千年困於恩恩得古鐘磬皆投於河此又别見聖賢城冢記出史系髙流之後魏髙流之為徐州刺史決滹沱河水繞城破一古墓得銘曰吾死後三百年背底生流泉頼逢髙流之遷吾上髙原流之為造棺椁衣物取其柩而改𦵏焉出朝野僉載髙顯洛洛陽大綂寺南有三公令史髙顯洛宅洛毎於夜見赤光行於堂前如此者非一向光所掘地丈餘得黄金百斤銘云蘇秦家金得者為吾造功徳洛遂造招福寺世又謂此地蘇秦舊時宅當時元義秉政聞其得金就洛索之以二十斤與之案蘇秦時未有佛法功徳者不必起寺或是碑銘之𩔖頌聲績也出洛陽伽藍記謝靈運宋浦陽江有琵琶圻圻有古冢墮水甓有𨼆起字云筮吉龜凶八百年落江中謝靈運取甓詣京咸𫝊視焉乃驗龜繇古冢已八百年矣出水經王果唐左衞將軍王果𬒳責出為雅州刺史於江中泊船仰見巖腹中有一棺臨空半出乃縁崖而觀之得銘曰欲墮不墮逢王果五百年中重收我果喟然歎曰吾今葬此人𬒳責雅州固其命也乃收窆而去豐都冢東都豐都市在長夀寺之東北初築市垣掘得古冢土藏無磚甓棺木陳朽觸之便散屍上著平上幘朱衣得銘云筮道居胡龜言近市五百年間於斯見矣當時達者㕘驗是魏黄初二年所葬也出朝野僉載兩京記樊欽賁冦天師謙之後魏時得道者也常刻石為記蔵於嵩山上元初有洛川郜城縣民因採藥於山得之以獻縣令樊文言於州州以上聞髙宗皇帝詔蔵於内府其銘記文甚多奥不可解略曰木子當天下又曰止戈龍又曰李代代不可移宗又曰中鼎顯真容又曰基千萬嵗所謂木子當天下者蓋言唐氏受命也止戈龍者言天后臨朝也止戈為武武天后氏也李代代不移宗者謂中宗中興再新天地中鼎顯真容者實真宗之廟諱真為睿聖之徽諡得不信乎基千萬嵗者基𤣥宗名也千萬嵗蓋歴數久長也後中宗御歴樊文男欽賁以石記本上獻上命編於國史出宣室志姜師度衞先生大經解梁人以文學聞不狎俗常閉門絶人事生而敏悟周知天文歴象窮㝠索𤣥後以夀終墓於解梁之野開元中天水姜師度奉詔鑿無鹹河以溉鹽田剗室廬潰邱墓甚多解梁人皆病之既至衞先生墓前發其地得一石刻字為銘蓋先生之詞也曰姜師度更移向南三五步工人得之以状言之於師度師度異其事歎咏久之顧謂僚吏曰衛先生真竒士也即命工人遷其河逺先生之墓數十步出宣室志鄔載開元中江南大水溺而死者數千郡以状聞𤣥宗詔侍御史鄔君載徃廵視之載至江南忽見道旁有古墓水潰其穴公念之命遷其骸於髙原上既發墓得一石鑿而成文蓋誌其墓也誌後有銘二十言乃卜地者之詞詞曰爾後一千年此地化為泉賴逢鄔侍御移我向髙原載覽而異之因挍其年果千嵗矣出宣室志鄭欽悦天寳中有商洛𨼆者任昇之嘗貽右𥙷闕鄭欽悦書曰昇之白頃退居商洛入闕披陳山林獨往交親兩絶意有所問别日垂訪昇之五代祖仕梁為太常初任南陽王帳下於鍾山懸岸圯壙之中得石銘不言姓氏小文云龜言土蓍言水甸服黄鍾啓靈趾瘞在三上庚墮遇七中巳六千三百浃辰交二九重三四百圯文雖剥落仍且分明大雨之後纔墮而獲即梁武大同四年數日遇盂蘭大㑹從駕同泰寺録示史官姚訾并諸學官詳議數月無能知者篋笥之内遺文尚在足下學乃天生而知計捨運籌而㑹前賢所不及近古所未聞願採其㫖要㑹其歸趣著之遺簡以成先祖之志深所望焉樂安任昇之白數日欽悦即復書曰使至忽辱簡翰用浣襟懐不遺舊情俯見推訪又示以大同古銘前賢未達僕非逺識安敢輕言良增懐愧也屬在途路無所披求據鞍運思頗有所得發壙者未知誰氏之子卜宅者實為絶代之賢蔵往知来有若指掌契終論始不差錙銖隗炤之預識龔使無以過也不説葬者之嵗月先識圯時之日辰以圯之日却求初兆事可知矣姚史官亦為當世逹識復與諸儒詳之沉吟月餘竟不知其指趣豈止於是哉原卜者之意𨼆其事㣲其言當待僕為龔使耳不然何忽見顧訪也謹稽諸歴術測以㣲詞試一探言庶㑹㣲㫖當梁武帝大同四年嵗次戊午言甸服者五百也黄鍾者十一也五百一十一年而圯從大同四年上求五百一十一年得漢光武帝建武四年戊子嵗也三上庚三月上旬之庚也其年三月辛巳朔十日得庚寅是三月初𦵏於鍾山也七中已乃七月戊午朔十二日得己巳是初圯􅤚之日是日己巳可知矣浃辰十二也從建武四年三月至大同四年七月總六千三百一十二月毎月一交故云六千三百浹辰交也二九為十八重三為六末言四百則六為千十八為萬可知從建武四年三月十日庚寅初𦵏至大同四年七月十二日己巳初圯計一十八萬六千四百日故云二九重三四百圯也其所言者但說年月日數耳據年則五百一十一㑹於甸服黄鍾言月則六千三百一十二㑹於六千三百浹辰交論日則一十八萬六千四百㑹於二二九重三四百圯從三上庚至於七中巳據厯計之無所差也所言年歲月日但差一數則不相照㑹矣原卜者之意當待僕言之吾子之問契使然也從吏已久藝業荒蕪古人之意復難逺測足下更詢能者時報焉使還不代鄭欽悦白記貞元中李吉甫任尚書屯田員外郎兼太常博士時宗人巽為户部郎中於南宫暇日語及近代儒術之士謂吉甫曰故右𥙷闕集賢殿直學士鄭欽悦於術數研精思通𤣥奥蓋僧一行所不逮以其天閼當世名不甚聞子知之乎吉甫對曰兄何以覈諸巽曰天寳中商洛隱者任昇之自言五代祖仕梁為太常大同四年於鍾山下獲古銘其文𨼆祕博求時儒莫曉其㫖因緘其銘誡諸子曰我代代子孫以此銘訪於通人倘有知者吾無所恨至昇之頗耽道博雅聞欽悦之名即告以先祖之意欽悦曰子當録以示我我試思之昇之書遺其銘㑹欽悦適奉朝使方授駕於長樂驛得銘而繹之行及滋水凡三十里則釋然悟矣故其書曰據鞍運思頗有所得不亦異乎辛未嵗吉甫轉駕部員外郎欽悦子克鈞自京兆府司録授司門員外郎吉甫數以巽之説質焉雖且符其言然克鈞自云亡其草毎想其㣲言至賾而不獲見吉甫甚惜之壬申嵗吉甫貶明州長史海島之中有𨼆者姓張氏名𤣥陽以明易經為州將所重召置閣下因講周易卜筮之事即以欽悦之書示吉甫吉甫喜得其書抃逾獲寳即編次之仍為著論曰夫一邱之土無情也遇雨而圮偶然也窮象數者已懸定於十八萬六千四百日之前矧於理亂之運窮達之命聖賢不逢君臣偶合則姜牙得璜而尚父仲尼無鳳而旅人傅説夢達於巖埜子房神授於圯上亦必定之符也然而孔不暇暖其席墨不俟黔其突何經營如彼孟去齊而接淅賈造湘而投弔又眷戀如此豈大聖大賢猶惑於性命之理歟將凂身存教示人道之不可廢歟余不可得而知之欽悦尋自右𥙷闕歴殿中侍御史為時宰李林甫所惡斥擯於外不顯其身故余敘其所聞係於二篇之後以著蓍筮之神明聰哲之懸解竒偶之有數貽諸好事為後學之竒翫焉時貞元九年十一月二十八日趙郡李吉甫記出異聞記太平廣記卷三百九十一
