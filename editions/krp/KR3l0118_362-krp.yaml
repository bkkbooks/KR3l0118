body:
  text: 太平廣記卷三百六十二宋李昉等編妖怪四長孫繹韋虛心裵鏡微李虞武徳縣婦人懐州民武徳縣民張司馬李適之李林甫楊慎矜姜皎晁良貞李氏張周封王豐房集張寅燕鳳祥王生梁仲朋長孫繹長孫繹之親曰鄭使君使君惟一子甚愛之子年十五鄭方典郡常使蒼頭十餘人給其役夜中蒼頭皆食子獨坐忽聞户東有物行來履地聲甚重每移步殷然俄到户前遂至牀下乃一鐵小兒也長三尺至麤壯朱目大口謂使君子曰嘻阿母呼令吮乳來子驚呌跳入户蒼頭既見遽報使君使君命十餘人持棒擊之如擊石徐而下階望門南出至以刀斧鍜終不可傷命舉火爇之火焚其身則開口大呌聲如霹靂聞者震倒於是以火驅之既出衙門舉足驀一車轍遂滅其家亦無休咎出記聞韋虚心户部尚書韋虚心有三子皆不成而死子每將亡則有大面出於牀下嗔目開口貌如神鬼子懼而走大面則化為大鴟以翅遮擁令自投於井家人覺遽出之已愚猶能言其所見數日而死如是三子皆然竟不知何鬼怪出紀聞裵鏡微河東裵鏡微曽言一武人與其居相近武人夜還莊操弓矢方馳騎後聞有物近焉顧而見之狀大有𩔖方相口但稱渴將及武人武人引弓射中之怪乃止頃又來近又射之怪復住斯須又至武人遽至家門已閉武人踰垣而入入後自户窺之怪猶在武人不敢取馬明早啟門馬鞍棄在門馬則無矣求之數里墓林中見馬被㗖已盡唯骨在焉出紀聞李虞全節李虞好犬馬少而不逞父嘗為縣令虞隨之官為諸慢遊毎夜逃出自竇從人飲酒後至竇中有人背其身以尻窒穴虞排之不動以劍刺之劍没至鐔猶如故乃知非人也懼而歸又嵗暮野外從禽禽入墓林訪之林中有死人而仰其身洪脹甚可憎惡巨鼻大目挺動其眼眼仍光起直視虞虞驚怖殆死自是不敢畋獵焉出紀聞武徳縣婦人開元二十八年武徳有婦娠將生男其姑憂之為其儲食其家窶有麺數豆有禾一區及産夕其夫不在姑與鄰母同膳之男既生姑與鄰母具食食至曉婦若饑渴求食不絶聲姑饋之盡數人之餐猶言餒姑又膳升麵進之婦食食無遺而益稱不足姑怒更為具之姑出後房内餅盎在焉婦下牀親執器取餅食之餅又盡姑還見之怒且恐謂鄰母曰此婦何為母曰吾自㓜及長未之見也姑方詢怒新婦曰姑無食食兒乃因提其子食之姑奪之不得驚而走俄郤入户婦已食其子盡口血猶丹因謂姑曰新婦當卧且死亦無遺若側猶可收矣言終仰眠而死出紀聞懐州民開元二十八年春二月懐州武徳武陟修武三縣人無故食土云味美異於他土先是武徳期城村婦人相與採拾聚而言曰今米貴人饑若為生活有老父紫衣白馬從十人來過之謂婦人曰何憂無食此渠水傍土甚佳可食汝試甞之婦人取食味頗異遂失老父乃取其土至家拌其麵為餅餅甚香由是逺近競取之渠東西五里南北十餘步土並盡牛肅時在懐親遇之出紀聞武徳縣民武徳縣逆旅家有人鏁閉其室寄物一車如是數十日不還主人怪之開視囊皆人面衣也懼而閉之其夕門自開所寄囊物並失所在出紀聞張司馬定州張司馬開元二十八年夏中夜與其妻露坐聞空中有物飛來其聲􅛺􅛺然過至堂屋為瓦所礙宛轉屋際遂落簷前因走司馬命逐之逐者以足蹴之乃為狗音擒得火照則老狗也赤而鮮毛身甚長足甚短可一二寸司馬命焚之深憂其為怪月餘改深州長史出紀聞李適之李適之既貴且豪常列鼎於前以具膳羞一旦庭中鼎躍出相鬭家僮告適之乃往其所酹酒自誓而鬬亦不解鼎耳及足皆落明日適之罷知政事拜太子少保時人知其禍未止也俄為李林甫所䧟貶宜春太守適之男霅為衛尉少卿亦貶巴陵郡别駕適之至州不旬月而終時人以林甫迫殺之霅乃迎喪至都李林甫怒猶未已令人誣告於河南府杖殺之適之好飲退朝後即速賔朋親戚談話賦詩曽不備於林甫初適之在相位日曽賦詩曰朱門長不備親友恣相過今日過五十不飲復如何及罷相作詩曰避賢初罷相樂聖且銜盃借問門前客今朝幾箇來及死非其罪時人寃歎之出明皇雜錄李林甫李林甫宅亦屢有怪妖其南北隅溝中有火光大起或有小兒持火出入林甫惡之奏於其地立嘉猶觀林甫將疾晨起將朝命取書囊即常時所要事目也忽覺書囊頗重於常侍者開視之即有二鼠出焉投於地即變為狗蒼色壯大雄目張牙仰視林甫命弓射之殷然有聲狗形即滅林甫惡之稱疾不朝其日遂病不踰月而卒出明皇雜錄又平康坊南街廢蠻院即李林甫舊第也林甫於正寢之後别創一堂制度彎曲有郤月之形名曰偃月堂土木華麗剞劂精巧當時莫儔也林甫每欲破滅人家即入此堂精思極慮喜恱而出其家不存矣及將敗林甫於堂上見一物如人遍體被毛毛如猪立鋸牙鈎爪長三尺餘以手㦸林甫目如電光而怒視之林甫連叱不動遽命弧矢毛人笑而跳入前堂堂中青衣遇而暴卒經於廐廐中善馬亦卒不累月而林甫敗出開天𫝊信記楊慎矜楊慎矜兄弟富貴常不自安每詰朝禮佛像黙祈㝠衛一日像前土榻上聚塵三堆如塜狀慎矜惡之且慮兒戲命掃去一夕如初尋而禍作出酉陽雜爼姜皎姜皎常遊禪定寺京兆辦局甚盛及飲酒座上一妓絶色獻酒整鬟未常見手衆怪之有客被酒戲曰非支指手乃彊牽視妓隨牽而倒乃枯骸也姜竟及禍焉出酉陽雜爼晁良貞晁良貞能判知名姓剛鷙不懼鬼每年恒掘太嵗地堅掘後忽得一肉大於食魁良貞鞭之數百送通衢其夜使人陰影聽之三更後車騎衆來至肉所問太嵗兄何故受此屈辱不讐報之太嵗云彼正榮盛如之奈何明失所在出廣異記李氏上元末復有李氏家不信太嵗掘之得一塊肉相𫝊云得太嵗者鞭之數百當免禍害李氏鞭九十餘肉忽騰上因失所在李氏家有七十二口死亡略盡惟小蒯公尚存李氏兄弟恐其家滅盡夜中令奴悉作鬼裝束劫小蒯便藏之唯此子得存其後襲封蒯公出廣異記又寜州有人亦掘得太嵗大如方狀𩔖赤菌有數千眼其家不識移至大路遍問識者有胡僧驚曰此太嵗也宜速埋之其人遽送舊處經一年人死略盡出廣異記張周封工部員外張周封言舊莊在城東狗架觜西嘗築牆於太嵗上一夕盡崩且意其基虚工不至率莊客指揮復築之髙未數尺炊者驚呌曰怪作矣遽視之飯數斗悉躍出地著牆匀若𧖟子無一粒重者矗墻之半如界焉因謁巫酹地謝之亦無他出酉陽雜俎王豐萊州即墨縣有百姓王豐兄弟三人豐不信方位所忌嘗於太嵗上掘坑見一肉塊大如斗蠕蠕而動遂填其坑肉隨填而出豐懼棄之經宿肉長塞於庭兄弟奴婢數日内悉暴卒惟一女子存焉出酉陽雜俎房集唐肅宗朝尚書郎房集頗恃權勢暇日私第獨坐㕔中忽有小兒十四五髠髪齊眉而持一布囊不知所從來立於其前房初謂是親故家遣小兒相省問之不應又問囊中何物小兒笑曰眼睛也遂傾囊中可數升眼睛在地四散或緣牆上屋一家驚怪便失小兒所在眼睛又不復見後集坐事誅出原化記張寅范陽張寅嘗行洛陽故城南日已昬暮欲投宿故人家經狹路中馬忽驚頭踳跼不肯行寅疑前有異因視路傍墳大柱石端有一物若似紗籠形大如橋柱上慈臺漸漸長大如數斛及地飛如流星其聲如雷所林中宿鳥驚散可百餘歩墮一人家寅竊記之乃去後月餘重經其家長㓜無遗矣乃詢之鄰人云其婦養姑無禮姑死遂有此禍出廣異記燕鳳祥平陽燕鳯祥頗渉六藝聚徒講授夜與其妻在家中忽聞外間喑嗚之聲以為盗屣履視之正見一物白色長丈許在庭中遽掩入户漸聞登階呼鳯祥曰夜未久何為閉户黙不敢應明燈自守須臾門隙中有一面如猴即突入呼其佀數百頭悉從隙中入皆長二尺餘著豹皮犢鼻褌皷脣睚目貌甚醜惡或緣屋壁或在梁棟間跳躑在後勢欲相逼鳳祥左右惟有一枕及婦琵琶即以擲之中者便去至明方盡遂得免恍惚常見室中有衣冠大人列在四壁云我平陽堯平使者請巫祝祠禱之終不能去乃避於精舍中見佛榻下有大面瞪目視之又將逃於他所出門復見羣鬼悉戲巷中直赴鳯祥不得去既無所出而病轉篤乃多請僧設齋結壇持呪亦迎六丁道士為作符禁呪鬼乃稍去數日鳯祥夢有一人朱衣墨幘住空中云還汝魂魄因而以物擲鳯祥有如婦人髪者有如綘衣者數十枚鳯祥悉受明日遂愈焉出廣異記王生永泰初有王生者住揚州孝感寺北夏月被酒卧手垂於牀其妻恐風射舉之忽有巨手出於牀前牽王臂墜牀身漸入地其妻與奴婢共曳之不禁地如裂狀初餘衣帶頃亦不見其家併力掘之深二丈許得枯骨一具已如數百年者竟不知何怪出酉陽雜俎梁仲朋葉縣人梁仲朋家在汝州西郭之街南渠西有小莊常朝往夕歸大厯初八月十五日天地無氛埃去十五六里有豪族大墓林皆植白楊是時秋景落木仲朋跨馬及此二更聞林間槭槭之聲忽有一物自林飛出仲朋初謂是驚棲鳥俄便入仲朋懐鞍橋上坐月照若五㪷栲栳大毛黒色頭便似人眼射如珠便呼仲朋為弟謂仲朋曰弟懼頗有羶羯之氣言語一如人直至汝州郭門外見人家未寐有燈火光其怪欻飛東南上去不知所在如此仲朋至家多日不敢向家中說忽一夜更深月上又好天色仲朋遂召弟妹於庭命酌或嘯或吟因語前夕之事其怪忽從屋脊上飛下來謂仲朋曰弟說老兄何事也於是小大走散獨留仲朋云為兄作主人索酒不已仲朋細視之頸下有癭子如生𤓰大飛翅是雙耳又是翅鼻烏毛斗輵大如鵝卵飲數斗酒醉於盃筵上如睡着仲朋潛起礪濶刃當其項而刺之血流迸洒便起云大哥大哥弟莫悔郤映屋脊不復見庭中血滿三年内仲朋一家三十口蕩盡出乾􅍧子太平廣記卷三百六十二
