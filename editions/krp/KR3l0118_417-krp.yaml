body:
  text: 太平廣記卷四百十七草木十二花卉怪下光化寺客僧智𧦬鄧珪劉皁田布梁生蘇昌逺藥怪上黨人田登孃趙生菌怪郭元振宣平坊官人豫章人花卉怪下光化寺客兖州徂徕山寺曰光化客有習儒業者堅志棲焉夏日凉天因閲壁畫于廊序忽逢白衣美女年十五六􅐾貌絶異客詢其来笑而應曰家在山前客心知山前無是女子亦未疑妖但心以殊尤貪其觀視且挑且悦因誘致于室交歡結義情欵甚密白衣曰幸不以村野見鄙誓當永奉恩顧然今晚須去復来則可以不别矣客因留連百端徧盡而終不可素寳白玉指環因以遺之曰幸視此可以速還因送行白衣曰恐家人迎接願且回去客即上寺門樓隱身目送白衣行計百歩許奄然不見客乃識其滅處徑尋究寺前舒平數里纎木細草毫髮無隱履歴詳熟曽無踪跡暮將回草中見百合苖一枝白花絶偉客因斸之根本如拱瑰異不𩔖常者及歸乃啟其重付百疊既盡白玉指環宛在其内乃驚歎每恨恍惚成病一旬而斃出集異記僧智𧦬上元中蜀郡有僧智𧦬在寳相寺持經夜久忽有飛蟲五六大如蠅金色迭飛赴燈熖或蹲于燈花上鼓翅與火一色久乃滅于熖中如此數夕童子擊墮其一乃董陸花也亦無形狀自是不復見出酉陽雜俎鄧珪晉陽西有童子寺在郊牧之外貞元中有鄧珪者寓居于寺是歲秋與朋友數軰㑹宿既闔扉後忽見一手自牖間入其手色黄而痩甚衆視之俱慄然獨珪無所懼反開其牖聞有唫嘯之聲珪不之怪訊之曰汝為誰對曰吾隱居山谷有年矣今夕縱風月之遊聞先生在此故来奉謁誠不當列先生之席願得坐牖下聽先生與客談足矣珪許之既坐與諸客談笑極歡久之告去將行謂珪曰明夕當再来願先生勿見擯既去珪與諸客議曰此必鬼也不窮其跡且將為患矣于是緝絲為緡數百尋候其再来系之明夕果来又以手出于牖間珪即以緡系其臂牢不可解聞牖外問何罪而見縛其議安在得無悔邪遂引緡而去至明日珪與諸客俱窮其跡至寺北百餘歩有蒲桃一株甚蕃茂而緡系其枝有葉𩔖人手果牖間所見者遂命掘其根而焚之出宣室志劉皁靈石縣南嘗夜中妖怪由是里中人無敢夜經其地者大初年董叔經為西河守時有彭城劉皁假孝義尉皁頃嘗以書忤董叔怒甚遂棄職入汾水關夜至靈石南逢一人立于路旁其狀絶異皁馬驚而墜久之乃起其路旁立者即解皁衣袍而自衣之皁以為刼不敢拒既而西走近十餘里至逆旅因言其事逆旅人曰邑南夜中有妖怪固非賊爾明日有自縣南来者謂皁曰縣南野中有蓬蔓狀𩔖人披一青袍不亦異乎皁往視之果已之袍也里中人始悟為妖者乃蓬蔓耳由是盡焚其妖遂絶出宣室志田布唐田布田悦之子也元和中嘗過蔡北路側有草如蒿莖大如指其端聚葉若鷦鷯巢在葦折視之葉中有小鼠數十纔若皁莢子目猶未開啾啾有聲出酉陽雜俎梁生唐興平之西有梁生别墅其後園有梨𣗳十餘株大和四年冬十一月初雪霽其梨忽有花發芳而且茂梁生甚竒之以為吉兆有韋氏謂梁生曰夫木以春而榮冬而瘁固其常矣今反是焉可謂之吉兆乎生聞之不悦後月餘梁生父卒出宣室志蘇昌逺中和中有士人蘇昌逺居蘇州屬邑有小莊去官道十里吴中水鄉率多荷芰忽一日見一女郎素衣紅臉容質艷麗閲其色恍若神仙中人自是與之相狎以莊為幽㑹之所蘇生惑之既甚嘗以玉環贈之結系殷勤或一日見檻前白蓮花開敷殊異俯而玩之見花房中有物細視乃所贈玉環也因折之其妖遂絶出北夢瑣言藥怪上黨人隋文帝時上黨有人宅後每夜有人呼聲求之不見去宅一里但見一人參枝掘之入地五尺如人體狀掘去之後呼聲遂絶時晉王廣隂有奪宗之計謟事權要上君也黨與也言朋黨比而譖太子竟見廢隋室因此而亂闕田登孃陜州西北白徑嶺上邏村村之田氏嘗穿井得一根大如臂節中粗皮若茯苓香氣似木其家奉釋有𧰼設數十遂寘于像前田氏女名登孃十六七有容質其父常令供香火焉經歲餘女嘗日見一少年出入佛堂中白衣躡屐女遂私之精神舉止有異于常矣其物根每歲至春萌芽其女有妊乃具白于母母疑其怪嘗有衲僧過門其家因留之供養僧將入佛宇輙為物拒之一日女隨母他出僧入佛堂門纔啟有一鴿拂僧飛去其夕女不復見其怪視其根亦成朽蠧女娠纔七月産物三節其形如像前根也田氏併火焚之其怪亦絶舊説枸杞茯苓人參术形有異服之獲上夀或不葷血不色慾遇之必能降真為地仙矣田氏非冀故見怪而去之宜乎出酉陽雜俎趙生天寳中有趙生者其先以文學顯生兄弟數人俱以進士明經入仕獨生性魯鈍雖讀書然不能分句詳義由是年壯尚不得為郡貢常與兄弟友生㑹宴盈座朱緑相接獨生白衣甚為不樂及酒酣或誚之生益慙且怒後一日棄其家遁去隱晉陽山葺茅為舍生有書百餘編笈而至山中晝習夜息雖寒熱切饑食粟襲紵不憚勞苦而生蒙懵力愈勤而功愈少生愈恚怒終不易其志後旬餘有翁衣褐来造之因謂生曰吾子居深山中讀古人書豈有志于禄仕乎雖然學愈久而卒不能分句詳義何蔽滯之甚邪生謝曰僕不敏自度老且無用故入深山讀書自悦雖不能達其精微然必欲死于志業不辱先人又何及于仕禄也翁曰吾子之志甚堅老夫雖無術能有補于郎君但幸一謁我耳因徵其所止翁曰吾段氏子家于山西大木之下言訖忽亡所見生怪之以為妖遂徑往山西尋其跡果有椴𣗳蕃茂生曰豈非段氏子乎因持插發其下得人參長尺餘甚肖所遇翁之貌生曰吾聞人參能為怪者可愈疾遂瀹而食之自是醒然明悟目所覽書盡能窮奥後歲餘以明經及第歴官數任而卒出宣室志菌怪郭元振郭元振嘗山居中夜有人面如盤瞚目出于燈下元振了無懼色徐染翰題其頰曰久戍人偏老長征馬不肥元振之警句也題畢唫之其物遂滅久之元振隨樵閒歩見巨木上有白耳大如數斗所題句在焉出酉陽雜俎宣平坊官人京宣平坊有官人夜歸入曲有賣油者張帽馱桶不避道導者搏之頭隨而落遂遽入一大宅門官人異之隨入至一大槐𣗳下遂滅因告其家其家即掘之深數尺並𣗳枯根下有大蝦蟇如疊挾二筆錔𣗳溜津滿其中也又有巨白菌如殿門浮漚釘其葢已落蝦蟇乃驢也筆錔乃油桶也菌則其人矣里人有買其油者月餘怪其油好而賤及怪發食者悉病嘔出酉陽雜俎豫章人豫章人好食蕈有黄姑蕈者尤為美味有民家治舍烹此蕈以食工人工人有登屋施瓦者下視無人唯釜煮物以盆覆之俄有小兒裸身繞釜而走倐忽沒于釜中頃之主人説蕈工獨不食亦不言既暮食蕈者皆卒出稽神録太平廣記卷四百十七
