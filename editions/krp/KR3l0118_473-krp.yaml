body:
  text: 太平廣記卷四百七十三宋李昉等編昆蟲一蜮射化蟬揖怒蛙怪哉小蟲蔣蟲園客烏衣人朱誕給使葛輝夫蝘蜓肉芝千嵗蝙蝠蠅觸帳蒼梧蟲蚱蜢施子然龎企蟾蜍蠅赦髪妖桓謙青蜓朱誕白蚓王雙蜮射𤣥中記蜮以氣射人去人三十歩即射中其影中人死十六七紀年云晉獻公二年春周惠王居於鄭鄭人入王府取玉馬玉化為蜮以射人也出感應經化蟬齊王后怨王怒死尸化為蟬遂登庭𣗳嘒唳而鳴後王悔恨聞蟬鳴即悲歎出崔豹古今註揖怒蛙越王勾踐既為吳辱常盡禮接士思以平吳一日出遊見蛙怒勾踐揖之左右曰王揖怒蛙何也答曰蛙如是怒何敢不揖於是勇士聞之皆歸越而平吳出越絶書怪哉漢武帝幸甘泉馳道中有蟲赤色頭牙齒耳鼻盡具觀者莫識帝乃使東方朔視之還對曰此蟲名怪哉昔時拘繫無辜衆庶愁怨咸仰首歎曰怪哉怪哉盖感動上天憤所生也故名怪哉此地必秦之獄處即按地圖信如其言上又曰何以去蟲朔曰凡憂者得酒而解以酒灌之當消於是使人取蟲置酒中須臾糜散出小説小蟲漢光武建武六年山陽有小蟲皆𩔖人形甚衆明日皆懸於𣗳枝死出廣古今五行記蔣蟲蔣子文者廣陽人也嗜酒好色佻逹無度每自言我死當為神也漢末為秣陵尉逐賊至山下被賊擊傷額因解印綬縛之有頃而卒及吳先主之初其故吏見子文於路間乗白馬執白羽扇侍從如平生見者驚走子文追之謂曰我當為此地神爾下民可宣告百姓為我立祠不爾將有大咎是嵗夏大疾疫百姓輒恐動頗有祀之者未幾乃下巫祝曰吾將大咎福孫氏官宜為我立祠不爾將使蟲入人耳為災也俄而果有蟲䖟入人耳即死醫所不治百姓愈恐孫主尚未之信既而又下巫祝曰若不祀我將以大火為災是嵗火災大發百數火漸延及公宫孫主患之時議者以神有所歸乃不為厲宜告饗之於是使使者封子文為中都侯其子緒為長水挍尉皆加印綬為立祠宇以表其靈今建康東北蔣山是也自是疾厲皆息百姓遂大事之幽明録亦載焉出搜神記園客園客者濟隂人也姿貌好而良邑人多願以女妻之終不娶常種五色香草積數十年服其實一旦有五色蛾出其旁客收而薦之至蠶時有女夜半至自稱客妻道蠶之状客與俱蠶得百二十頭繭皆如瓮繰一頭六十日乃盡訖則俱去莫知所如濟隂人設祠祀焉出列仙傳烏衣人吳富陽縣有董昭之者曾乗船過錢塘江江中見一蟻著一短蘆遑遽畏死因以繩繫蘆著舡船至岸蟻得出其夜夢一烏衣人謝云僕是蟻中之王也感君見濟之恩君後有急難當相告語歴十餘年時所在劫盗昭之被横録為劫主繫餘姚昭之忽思蟻王之夢結念之際同被禁者問之昭之具以實告其人曰但取三兩蟻著掌中語之昭之如其言夜果夢烏衣云可急投餘杭山中天下既亂赦令不及也既寤蟻齧械已盡因得出獄過江投餘杭山旋遇赦遂得無他出齊諧記朱誕給使淮南内史朱誕字永長吳孫皓世為建安太守誕給使妻有鬼病其夫疑之為姦後出行宻穿壁窺之正見妻在機中織遥瞻桑𣗳上向之言笑給使仰視𣗳上有年少人可十四五衣青衿袖青幧頭給使以為信人也張弩射之化為鳴蟬其大如箕翔然飛去妻亦應聲驚曰噫人射汝給使怪其故後久時給使見二小兒在陌上共語曰何以不復見汝其一即𣗳上小兒也答曰前不遇為人所射病瘡積時彼兒曰今何如曰頼朱府君梁上膏以傅之得愈給使白誕曰人盗君膏藥頗知之否誕曰吾膏久置梁上人安得盗之給使曰不然府君視之誕殊不信為試視之封題如故誕曰小人故妄作膏自如故給使曰試開之則膏去半焉所掊刮見有趾跡誕自驚乃詳問之給使具道其本末出捜神記葛輝夫晉烏傷葛輝夫義熙中在婦家宿三更有兩人把火至階前疑是凶人往打之欲下杖悉變成蝴蝶繽紛飛散有衝輝夫腋下便倒地少時死出搜神記蝘蜓博物志蝘蜓以器養之食以朱砂體盡赤稱滿七斤治擣萬杵以㸃女子肢體終不滅淮南萬畢術云取守宫新合隂陽以牝牡各藏之瓮中隂乾百日以㸃女臂則生文章與男子合輒滅去也出感應經肉芝肉芝者謂萬嵗蟾蜍頭上有角頷下有丹書八字再重以五月五日中時取之隂乾百日以其足畫地即為流水帶在左手於身辟五兵若敵人射巳者弓弩矢皆反還自向也出抱朴子千嵗蝙蝠千嵗蝙蝠色如白雪集則倒懸腦重故也此物得而隂乾末服之令人夀四萬嵗出抱朴子蠅觸帳晉明帝常欲肆𤯝祕而不言乃屏曲室去左右下帷草詔有大蒼蠅觸帳而入萃於筆端須臾亡出帝異焉令人看蠅所集處輒傳有赦喧然已遍矣出異苑蒼梧蟲博物志云蒼梧人卒便有飛蟲大如麥有甲或一石餘或三五斗而来食之如風雨之至斯須而盡人以為患不可除唯畏梓木自後因以梓木為棺更不復来出博物志蚱蜢徐邈晉孝武帝時為中書侍郎在省直左右人恒覺邈獨在帳内以與人共語有舊門生一夕伺之無所見天時微有光始開窓户瞥觀一物從屏風裏飛出直入前鐡鑊中仍逐視之無餘物唯見鑊中聚菖蒲根下有大青蚱蜢雖疑此為魅而古来未聞但摘除其兩翼至夜遂入邈夢云為君門生所困往来道絶相去雖近有若山河邈得夢甚悽慘門生知其意乃微發其端邈初時疑不即道語之曰我始来直省便見一青衣女子從前度猶作兩髻姿色甚美聊試挑謔即来就已且愛之仍溺情亦不知其從何而至此兼告夢門生因具以状白亦不復追殺蚱蜢出續異記施子然晉義熙中零陵施子然雖出自單門而神情辨悟家大作田至穫時作蝸牛廬於田側守視恒宿在中其夜獨自未眠之頃見一丈夫来長短是中形人著黄練單衣袷直造席捧手與子然語子然問其姓名即答云僕姓盧名鉤家在粽溪邉臨水復經半旬中其作人掘田塍西溝邉蟻垤忽見大坎滿中螻蛄将近斗許而有數頭極壮一個彌大子然自是始悟曰近日客盧鉤反音則螻蛄也家在粽溪即西坎也悉灌以沸湯於是遂絶出續異記龎企晉廬陵太守龎企自云其祖坐繫獄忽見螻蛄行其左右因謂曰爾有神能活我死否因投食與之螻蛄食飯盡而去有頃復來形體稍大意異之復投食與之數日間其大如豚及將刑之夜螻蛄夜掘壁為大穴破械得從之出亡後遇赦免故企世祀螻蛄焉出搜神記蟾蜍晉孝武太元八年義興人周客有一女年十八九端麗潔白尤辯惠性嗜膾噉之恒苦不足有許纂者小好學聘之為妻到壻家食膾如故家為之貧於是門内博議恐此婦非人命歸家乗車至橋南見罟家取魚作鮓著按上可有十許斛便於車中下一千錢以與魚主令擣韲乃下車熟食五斗生食五斗當噉五斛許便極悶卧須臾据地大吐水忽有一蟾蜍從吐而出遂絶不復噉病亦愈時天下大兵出廣古今五行記蠅赦前秦苻堅欲放赦與王猛苻融宻議甘露堂悉屏左右堅親為赦文有一大蒼蠅集於筆端聽而復出俄而長安街巷人相告曰官今大赦有司以聞堅驚曰禁中無耳屬之理事何從泄也敕窮之咸曰有小人衣青大呼於市且官今大赦須臾不見歎曰其向蒼蠅也出廣古今五行記髪妖晉安帝義熙年琅邪費縣王家恒失物謂是人偷每以扄鑰為意而零落不已見宅後籬一孔穿可容人臂滑澤試作繩罥施於穴口夜中聞有擺撲聲往掩得大髪長三尺許而變為蟮從此無慮出廣古今五行記桓謙桓謙字敬祖太原中忽有人皆長寸餘悉被鎧持槊乗具装馬從塪中出精光耀日遊走宅上數百為羣部陣指麾更相撞刺馬既輕快人亦便能緣几登竈尋飲食之所或有切肉輙来叢聚力所能勝者以槊刺取逕入穴中寂不復出出還入穴蔣山道士朱應子令作沸湯澆所入處因掘之有斛許大蟻死在穴中謙後誅滅出異苑青蜓司馬彪荘子注言童子埋青蜓之頭不食而舞曰此将為珠人笑之博物志云埋青蜓頭於西向户下則化成青色之珠出感應經朱誕宋初淮南郡有物取人頭髻太守朱誕曰吾知之矣多買黐以塗壁夕有一蝙蝠大如雞集其上不得去殺之乃絶觀之鈎簾下已有數百人頭髻出幽明録白蚓劉徳願兄子太宰從事中郎道存景和元年忽有白蚓數十登其齋前砌上通身白色人所未嘗見也蚓並張口吐火赤色其年八月與徳願並誅出述異記王雙孟州王雙宋文帝元嘉初忽不欲見明常取水沃地以菰蔣覆上眠息飲食悉入其中云恒有女著青裙白􅔮来就其寢每聴聞薦下歴歴有聲發之見一青色白纓蚯蚓長二尺許云此女常以一奩香見遺氣甚精芬奩乃螺殻香則菖蒲根於時咸以雙暫同阜螽矣出異苑太平廣記卷四百七十三
