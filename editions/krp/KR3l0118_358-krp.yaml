body:
  text: 太平廣記卷三百五十八宋李昉等編神魂一龎阿馬勢婦無名夫婦王宙鄭齊嬰柳少游蘇萊鄭生韋𨼆齊推女鄭氏女裴珙舒州軍吏龎阿鉅鹿有龎阿者美容儀同郡石氏有女曾内覩阿心悅之未㡬阿見此女來詣阿妻妻極妬聞之使婢縳之送還石家中路遂化為煙氣而滅婢乃直詣石家說此事石氏之父大驚曰我女都不出門豈可毁謗如此阿父自是常加意伺察之居一夜方值女在齋中乃自拘執以詣石氏石氏父見之􅌓眙曰我適從内來見女與母共作何得在此即令婢僕於内喚女出向所縛者奄然滅焉父疑有異故遣其母詰之女曰昔年龎阿來㕔中曾竊視之自爾彷彿即夢詣阿及入户即為妻所縳石曰天下遂有如此竒事夫精情所感靈神為之㝠著滅者葢其魂神也既而女誓心不嫁經年阿妻忽得邪病醫藥無徵阿乃授幣石氏女為妻出幽眀記馬勢婦吳國富陽人馬勢婦姓蔣村人應病死者蔣輒恍惚熟眠經日見人人死然後省覺則具說家中不信之語人云某中病我欲殺之怒強魂難殺未即死我入其家内架上有白米飯㡬種鮭我蹔過竈下戲婢無故犯我我打脊甚使婢當時悶絶久之乃蘇其兄病有烏衣人令殺之向其請乞終不下手醒語兄云當活出搜神記無名夫婦有匹夫匹婦忘其姓氏居一旦婦先起其夫尋亦出外其妻謂夫尚寢既還内見其夫猶在被中既而家童自外來云即令我取鏡婦以奴詐指床上以示奴奴云適從郎處來也乃馳告其夫夫大愕徑入示之遂與婦共觀被中人髙枕安眠真是其形了無一異慮是其魂神不敢驚動乃徐徐撫床遂冉冉入蓆而滅夫婦惋怖不已經少時夫忽得疾性理乖誤終身不愈出搜神記王宙天授三年清河張鎰因官家於衡州性簡静寡知友無子有女二人其長早亡幼女倩娘端妍絶倫鎰外甥太原王宙幼聰悟羙容範鎰常器重毎曰他時當以倩娘妻之後各長成宙與倩娘常私感想於寤寐家人莫知其狀後有賔寮之選者求之鎰許焉女聞而鬱抑宙亦深恚恨託以當調請赴京止之不可遂厚遣之宙陰恨悲慟決别上船日暮至山郭數里夜方半宙不寐忽聞岸上有一人行聲甚速須臾至船問之乃倩娘徒行跣足而至宙驚喜發狂執手問其從來泣曰君厚意如此寢寐相感今將奪我此志又知君情深不易思將殺身奉報是以亡命來奔宙非意所望欣躍特甚遂匿倩娘於船連夜遁去倍道兼行數月至蜀凡五年生兩子與鎰絶信其妻常思父母涕泣言曰吾曩日不能相負棄大義而来奔君向今五年恩慈間阻覆載之下胡顔獨存也宙哀之曰將歸無苦遂俱歸衡州既至宙獨身先至鎰家首謝其事鎰曰倩娘病在閨中數年何其詭說也宙曰見在舟中鎰大驚促使人騐之果見倩娘在船中顔色怡暢訊使者曰大人安否家人異之疾走報鎰室中女聞喜而𧺫餙粧更衣笑而不語出與相迎翕然而合為一體其衣裳皆重其家以事不正秘之惟親戚間有潜知之者後四十年間夫妻皆喪二男並孝㢘擢第至丞尉事出陳𤣥祐離魂記云𤣥祐少常聞此說而多異同或謂其虚大厯末遇莱蕪縣令張仲􅒑因僃述其本末鎰則仲􅒑堂叔而說極僃悉故記之出離魂記鄭齊嬰鄭齊嬰開元中為吏部侍郎河南黜陟使將歸途次華州忽見五人衣五方色衣詣㕔再拜齊嬰問其由答曰是大使五藏神齊嬰問曰神當居身中何故相見答云神以守氣氣竭當散嬰曰審如是吾其死乎曰然嬰倉卒求延晷刻欲為表章及身後事神言還至後衙則可嬰為設酒饌皆拜而受既修表沭浴服新衣卧西壁下至時而卒出廣異記栁少遊栁少遊善卜筮著名於京師天寳中有客持一縑詣少遊引入問故答曰願知年命少遊為作卦成而悲歎曰君卦不吉合盡今日暮其人傷歎乆之因求漿家人持水至見兩少遊不知誰者是客少遊指神為客令持與客客乃辭去童送出門數步遂滅俄聞空中有哭聲甚哀還問少遊郎君識此人否具言前事少遊方知客是精神遽使㸔縑乃一紙縑爾歎曰神捨我去吾其死矣日暮果卒出廣異記蘇莱天寳末長安有馬二娘者善於考召兖州刺史蘇詵與馬氏相善初詵欲為子萊求婚盧氏謂馬氏曰我唯有一子為其婚娶實要婉淑盧氏三女未知誰佳幸為致之一令其母自閱視也馬氏乃於佛堂中結壇考召湏臾三女魂悉至萊母親自㸔馬云大者非不佳不如次者必當為刺史婦蘇乃娶次女天寳末萊至永寜令死於禄山之難其家懲馬氏失言後二京収復有詔贈萊懐州刺史焉出廣異記鄭生鄭生者天寳末應舉之京至鄭西郊日暮投宿主人主人問其姓鄭以實對内忽使婢出云娘子合是從姑湏臾見一老母自堂而下鄭拜見坐語乆之問其婚姻乃曰姑有一外孫女在此姓栁氏其父見任淮隂縣令與兒門地相埒今欲將配君子以為何如鄭不敢辭其夕成禮極人世之樂遂居之數月姑謂鄭生可將婦歸栁家鄭如其言挈其妻至淮隂先報栁氏栁舉家驚愕栁妻意疑令有外婦生女怨望形言俄頃女家人往視之乃與女家無異既入門下車冉冉行庭中内女聞之笑出視相值於庭中兩女忽合遂為一體令即窮其事乃是妻之母先亡而嫁外孫女之魂焉生復尋舊跡都無所見出靈怪録韋𨼆大厯中將作少匠韓晋卿女適尚衣奉御韋𨼆𨼆奉使新羅行及一程愴然有思因就寢乃覺其妻在帳外驚問之答曰愍君涉海志願奔而隨之人無知者𨼆即詐左右曰欲納一妓將侍枕蓆人無怪者及歸已二年妻亦隨至𨼆乃啟舅姑首其罪而室中宛存焉及相近翕然合體其從𨼆者乃魂也出獨異志齊推女元和中饒州刺史齊推女適隴西李某李舉進士妻方娠留至州宅至臨月遷至後東閣中其夕女夢丈夫衣冠甚偉瞋目按劍叱之曰此屋豈是汝腥穢之所乎亟移去不然且及禍眀日告推推素剛烈曰吾沗土地主是何妖孽能侵耶數日女誕育忽見所夢者即其牀帳亂毆之有頃耳目鼻皆流血而卒父母傷痛女寃横追悔不及遣遽告其夫俟至而歸塟於李族遂於郡之西北十數里官道權瘞之李生在京師下第將歸聞喪而往比至饒州妻卒已半年矣李亦粗知其死不得其終悼恨既深思為冥雪至近郭日晚忽於曠野見一女形狀服飾似非村婦李即心動駐馬諦視之乃映草𣗳而沒李下馬就之至則真其妻也相見悲泣妻曰且無涕泣幸可復生俟君之來亦已乆矣大人剛正不信鬼神身是婦人不能自訴今日相見事機較遲李曰為之奈何女曰從此直西五里鄱亭村有一老人姓田方教授村兒此九華洞中仙官也人莫之知君能至心往求或冀諧遂李乃徑訪田先生見之乃膝行而前再拜稱曰下界凡賤敢謁大仙時老人方與村兒授經見李驚避曰衰朽窮骨旦暮溘然郎君安有此說李再拜扣頭不已老人益難之自日宴至於夜分終不敢就坐拱立於前老人俛首良乆曰足下誠懇如是吾亦何所𨼆焉李生即頓首流涕具云妻枉狀老人曰吾知之乆矣但不蚤申訴今屋宅已敗理之不及吾向拒公葢未有計耳然試為足下作一處置乃起從北出可行百步餘止於桑林長嘯倐忽見一大府署殿宇環合儀衛森然擬於王者田先生衣紫被據案而坐左右解官等列侍俄傳教嘑地界須臾十數部各擁百餘騎前後奔馳而至其帥皆長丈餘眉目魁岸羅列於門屏之外整衣冠意緒倉惶相問今有何事須臾謁者通地界廬山神江瀆神彭蠡神等皆趣入田先生問曰比者此州刺史女因産為暴鬼所殺事甚寃濫爾等知否皆俯伏應曰然又問何故不為申理又皆對曰獄訟須有其主此不見人訴無以發摘有問知賊姓名否有一人對曰是西漢長沙王吳芮今刺史宅是芮昔時所居至今猶恃雄豪侵占土地往往肆其暴虐人無奈何田先生曰即追來俄頃縳吳芮至先生詰之不伏乃命追阿齊良乆見李妻與吳芮庭辯食頃吳芮理屈乃曰當是産後虚弱見其驚怖自絶非故殺田先生曰殺人以梃與刄有以異乎遂令執送天曹囘謂速檢李氏夀命㡬何頃之吏云本算更合夀三十二年生四男三女先生謂羣官曰李氏夀算長若不再生議無猒伏公等所見何如有一老吏前啟曰東晋鄴下有一人横死正與此事相當前使葛真君斷以具魂作本身郤歸生路飲食言語嗜欲追遊一切無異但至夀終不見形質耳田先生曰何謂具魂吏曰生人三魂七魄死則散離本無所依今收合為一體以續絃膠塗之大王當街發遣放囘則與本身同矣田先生曰善即顧謂李妻曰作此處置可乎李妻曰幸甚俄見一吏别領七八女人來與李妻一𩔖即推而合之有一人持一器藥狀似稀餳即於李妻身塗之李氏妻如空中墜地初甚迷悶天明盡失夜來所見唯田先生及李氏夫妻三人共在桑林中田先生謂齊女李生曰相為極力且喜事成便可領歸見其親族但言再生慎無他說吾亦從此逝矣李遂同歸至州一家驚疑不為之信乆之乃知實生人也自爾生子數人其親表之中頗有知者云他無所異但舉止輕便異於常人耳出𤣥怪録鄭氏女通州有王居士者有道術會昌中刺史鄭君有幼女甚念之而自幼多疾若神魂不足者鄭君因請居士居士曰此女非疾乃生魂未歸其身鄭君訊其事居士曰某縣令某者即此女前身也當死數嵗矣以平生為善以幽冥祐之得過期今年九十餘矣令歿之日此女當愈鄭君急發人馳訪之其令果九十餘矣後月其女忽若醉寤疾愈鄭君又使往驗令果以女疾愈之日無疾䘚出宣室志裴珙孝㢘裴珙家洛陽仲夏自鄭西歸及端午以覲親焉日晚方至石橋忽有少年騎從鷹犬甚衆顧珙笑曰眀旦節日今當早歸何遲遲也乃以後乗借之珙甚喜謂二童曰爾可緩驅投宿於白馬寺西表兄竇温之墅眀日徐歸可也因上馬疾驅俄頃至上東門歸其馬珍重而别珙居水南促步而進及家暝矣入門方見其親與珙之姊妹張燈會食珙乃前拜曽莫瞻顧因俯階髙語曰珙自外至即又不聞珙即大嘑弟妹之輩亦無應者珙心神忿惑又極呼皆亦不知但見其親歎曰珙那今日不至也遂涕下而坐者皆泣珙私怪曰吾豈為異物邪因出至通衢徘徊乆之有貴人導從甚盛遙見珙即以鞭指之曰彼乃生者之魂也俄有佩櫜鞬者出於道左曰地界啟事裴珙孝㢘命未合終遇昆眀池神七郎子案鷹廻借馬送歸以為戲耳今當領赴本身貴人㣲哂曰小兒無理將人命為戲眀日與尊父書令笞之既至而櫜鞬者招珙復出上東門度門隙中至竇莊方見其形僵仆二童環泣呦呦焉櫜鞬者令其閉目自後推之省然而蘇其二童皆云向者行至石橋察郎君疾作語言大異懼其將甚投於此既至則已絶矣珙驚歎乆之少頃無恙出集異記舒州軍吏王琪為舒州刺史有軍吏方某者其家忽有鬼降自言姓杜年二十廣陵富家子居通泗橋之西前生欠君錢十萬今地府使我為神神償君此債爾因為人占候禍福其言多中方以家貧告琪求為一鎮將因問鬼吾所求可得否鬼曰諾吾將問之良乆乃至曰必得之其鎮名一字正方他不能識矣既而得雙港鎮將以為其言無驗未及之任忽謂方曰適得軍牒軍中令一人來為雙港鎮將吾今以爾為皖口鎮將竟如其言凡嵗餘鬼忽言曰吾還君債足告别而去遂寂然方後至廣陵訪得杜氏問其弟子云吾弟二子頃忽病如癡人嵗餘愈矣出稽神録太平廣記卷三百五十八
