body:
  text: 太平廣記卷三百一十五宋李昉等編神二十五梨山廟吳延瑫淫祠餘光祠䱉父廟鮑君張助著餌石人洛西古墓豫章樹狄仁傑檄飛布山廟畫琵琶壁山神梨山廟建州梨山廟土人云故相李回之廟回貶為建州刺史後卒於臨川卒之夕建安人咸夢回乗白馬入梨山及凶問至因立祠焉世𫝊靈應王延政在建安與福州構隙使其將吳某帥兵向晉安吳新鑄一劍甚利將行攜劒禱於梨山廟且曰某願以此劔手殺千人其夕夢人謂已曰人不當發惡願吾祐汝使汝不死於人之手既戰敗績左右皆潰散追兵將及某自度不免即以此劍自刎而死出稽神録吳延瑫廣陵豆倉官吳延瑫者其弟既冠將為求婦鄰有媒嫗素受吳氏之命一日有人詣門云張司空家使召隨之而去在政勝寺之東南宅甚雄壯嫗云初不聞有張公在是其人云公沒於臨安之戰故少人知者及至其家陳設炳煥如王公家見一老姥云是縣君之坐頃之其女亦出姥謂嫗曰聞君為吳家求婚吾欲以此女事之嫗曰吳氏小吏貧家豈當與貴人為婚邪女因自言曰兒以母老無兄弟家業既大事託善人聞吳氏子孝謹可事豈求高門邪嫗曰諾將問之歸以告延瑫異之未敢言數日忽有車輿數乗詣鄰嫗之室乃張氏女與二老婢俱至使召延瑫之妻即席具酒食甚豐皆張氏所備也其女自議婚事瑫妻内思之此女雖極端麗然可年三十餘其小郎年節少未必歡也其女即言曰夫妻皆繫前定義如有合豈老少耶瑫妻聳然不敢復言女即出紅白羅二疋曰以此為禮其他贈遺甚多至暮邀鄰嫗俱歸其家留數宿謂嫗曰吾家至富人不知耳他日皆吳郎所有也室中三大㕑其高至屋因開示之一厨實以金二厨實以銀又指地曰此中皆錢也即命掘之深尺餘即見錢充積又至外㕔庭中繫朱鬛白馬傍有一豕曰此皆禮物也㕔之西復有廣厦百工製作畢備曰此亦造禮物也至夜就寢聞豕有如驚呼諸婢曰此豕不宜在外是必為虵所囓也嫗曰虵豈食猪者耶女曰此中常有之即相與秉燭視之果見大赤虵自地出縈繞其豕復入地去救之得免明日方與嫗别忽召二青衣夾侍左右謂嫗曰吾有故近出少選當還即與青衣凌虚而去嫗大驚其母曰吾女暫之天上會計但坐無苦也食頃乃見自外而入微有酒氣曰諸仙留飲吾以媒嫗在此固辭得還嫗婦益駭異而不敢言又月餘復召嫗去縣君疾亟及往其母已卒因嫗至葬葬于揚子縣北徐氏村中盡室往會徐氏有女可十餘嵗張女撫之曰此女有相當為淮北一武將之妻善視之既葬復厚贈嫗舉家南去莫知所之婚後亦竟不成嫗歸訪其故居但里舍數間問其里中云住此已久相傳云張司空之居竟不得其是後十年廣陵亂吳氏之弟歸于建業亦竟無恙出稽神録淫祠餘光祠漢靈帝初平三年起裸遊館盛夏避暑長夜飲宴醉迷於天曉内官以巨燭投於殿下帝乃驚悟及董卓破京師焚其館宇至魏咸熙中其投燭之所㝠夜有光如星時人以為神光于此立室名曰餘光祠以祈福至明帝末稍除焉出拾遺記䱉父廟會稽石亭埭有大楓樹其中朽空每雨水輒滿有估客攜生䱉至此輒放一頭於朽樹中村民見之以魚䱉非樹中之物咸神之乃依樹起室宰牲祭祀未嘗虚日目為䱉父廟有禱請及穢慢則禍福立至後估客復至大笑乃求䱉臛食之其神遂絶出劉敬叔異苑鮑君昔汝南有人於田中設繩罝以捕麞而得者其主未覺有行人見之因竊取麞去猶念取之不俟其主有鮑魚乃以一頭置罝中而去本主來於罝中得鮑魚怪之以為神不敢持歸於是村里因共置屋立廟號為鮑君後轉多奉之者丹楹藻棁鐘鼓不絶病或有偶愈者則謂有神行道經過莫不致祀焉積七八年鮑魚主後行過廟下問其故人具為説乃曰此是我鮑魚耳何神之有於是乃息出抱朴子張助南頓人張助者耕於田中種禾見一李核意欲持歸乃掘取之以濕土封其根置空桑中遂忘取之助後作逺職不在其後里中人見桑中忽生李謂之神有病目痛者䕃息此桑下因祝之言李君能令我目愈者謝一豚其目偶愈便殺豚祭之傳者過差便言此樹能令盲者得視逺近翕然互來請福其下常車馬填溢酒肉滂沲如此數年張助罷職來還見之乃曰此是我昔所置李核耳何有神乎乃斫去出風俗通著餌石人又汝陽有彭氏墓近大道墓口有一石人田家老母到市買數片餌以歸天熱過䕃彭氏墓口樹下以所買餌蹔著石人頭上及去忘取之後來者見石人頭上有餌求而問之或人調云此石人有神能治病病愈者以餌來謝之如此轉以相語云頭痛者摩石人頭腹痛者摩石人腹亦還以自摩無不愈者遂千里來就石人治病初具雞豚後用牛羊為立帷幄管絃不絶如此數年前忘餌母聞之乃為人説無復徃者出抱朴子洛西古墓洛西有古墓穿壞多時水滿墓中多石灰汁主治瘡夏日行人有病瘡煩熱見此墓中水清好因自洗浴瘡偶便愈於是諸病者聞之悉往自洗轉有飲之以治腹内者近墓居人便於墓所立廟舍而賣此水而往買者又當祭廟中酒肉不絶而來者轉多此水行盡於是賣者常夜竊運他水以益之其逺道人不能往者皆因行使或持器遺信賣水者大富或言其無神官家禁止遂填塞之乃絶出抱朴子豫章樹唐洪州有豫章樹從秦至今千年以上逺近崇敬或索女婦或索猪羊有胡超師云𨼆於白鶴山中時遊洪府見猪羊婦女遮列訴稱此神枉見殺害超乃積薪將焚之猶驚懼其樹上有鸛雀窠數十欲燒前三日鸛翔空中徘徊不下及四邊居宅櫛比皆是竹木恐火延燒于時大風起吹焰直上旁無損害遂奏其地置觀焉出捜神记狄仁傑檄唐垂拱四年安撫大使狄仁傑檄告西楚霸王項君將挍等其略曰鴻名不可以謬假神器不可以力爭應天者膺樂推之名背時者非見㡬之主自祖龍御宇横噬諸侯任趙高以當軸棄䝉恬而齒劒沙丘作禍於前望夷覆滅於後七廟隳圮萬姓屠原鳥思静於飛塵魚豈安於沸水赫矣皇漢受命𤣥穹膺赤帝之貞符當四靈之欽運俯張地紐彰鳳紀之祥仰緝天綱鬱龍興之兆而君潛遊澤國嘯聚水鄉矜扛鼎之雄逞拔山之力莫測大符之所會不知厯數之有歸遂奮闗中之翼竟垂垓下之翅葢實由於人事焉有屬於天亡雖驅百萬之兵終棄八千之子以為殷監豈不惜哉固當匿魄東峰收魂北極豈合虚承廟食廣費牲牢仁傑受命方隅循革攸寄今遣焚燎祠宇削平臺室使蕙帷銷燼羽帳隨烟君宜速遷勿為人患檄到如律令出吳興掌故集飛布山廟原闕畫琵琶原闕四十四字泊船書生因上山閒步入林數十步上有一坡見僧房院開中有牀牀塌門外小廊數間傍有筆硯書生工畫遂把筆於房門素壁上畫一琵琶大小與真不異畫畢風靜船發僧歸見畫處不知何人乃告村人曰恐是五臺山聖琵琶當亦戯言而遂為村人傳説禮施求福甚效書生便到楊家入吳經年乃聞人説江西路僧室有聖琵琶靈應非一書生心疑之因還江西時令船人泊船此處上訪之僧亦不在所畫琵琶依舊前幡花香罏書生取水洗之盡僧亦未歸書生夜宿于船中至明日又上僧夜已歸覺失琵琶以告鄰人大集相與悲歎書生故問具言前驗今應有人背着琵琶所以潛𨼆書生大笑為説畫之因由及拭却之由僧及村人信之靈聖亦絶耳出原化記壁山神合州有壁山神鄉人祭必以太牢不爾致禍州里懼之毎嵗烹宰不知紀極蜀僧善曉早為州縣官苦於調選乃剃削為沙門堅持戒律雲水㕘禮行經此廟乃曰天地郊社薦享有儀斯鬼何得僭於天地牛者稼穡之資爾淫其祀無乃過乎乃命斧擊碎土偶數軀殘一偶而僧亦力困稍蘇其氣方次擊之廟祝祈僧曰此一神從來蔬食由是存之軍州驚愕申聞本道而僧端然無恙斯以正理責之神亦不敢加禍也出北夢瑣言太平廣記卷三百一十五
