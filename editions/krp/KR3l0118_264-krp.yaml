body:
  text: 太平廣記卷二百六十四無賴二南荒人娶婦趙髙韋少卿葛清三王子樂從訓張從晦李仁矩李罕之韓伸李令孟𢎞微僧鸞路徳延蕭希甫南荒人娶婦南荒之人娶婦或有喜他室之女者率少年持刀挺往趨虚路以偵之候其過即擒縳擁歸為妻間一二月復與妻偕首罪於妻之父兄常俗謂縳婦女壻非有父母喪不復歸其家出投荒雜録趙髙李夷簡元和末在蜀蜀市人趙髙好鬭嘗入獄滿背鏤毗沙門天王吏欲杖背見之輒止恃此為坊市害左右言於李李大怒擒就㕔前索新造筋棒題徑三寸叱杖家打天王盡則已數三十餘不死經旬日但袒而歴門乞修理破功徳錢出酉陽雜俎韋少卿蜀小將韋少卿韋表微堂兄也少不喜書嗜好劄青其叔父嘗令解衣視之胸上劄一樹樹杪鳥集數十其下懸鏡其鼻繫有人止於側牽之叔不觧問焉少卿笑曰叔曽讀張燕公詩否挽鏡寒鴉集也出酉陽雜俎葛清荆州街子葛清自頸已下遍劄白居易詩段成式嘗與荆客陳至呼觀之令其自解背上亦能闇記反手指其劄處至不是花中偏愛菊則有一人持盃臨菊叢黄夾纈窠寒有葉則指一樹樹上掛纈纈窠勝絶細凡劄三十餘首體無完膚陳至呼為白舍人行詩圖也出酉陽雜俎三王子楊虞卿為京兆尹時市里有三王子力能揭巨石遍身圖劄體無完膚前後合抵死數四皆匿軍以免㑹有過楊令所由數人捕獲閉闗杖殺之判云刺劄四肢口稱王子何須訊問便合當辜出酉陽雜俎樂從訓王鐸落都統除滑州節度尋罷鎮以河北安静於楊全玫有舊遊地浮陽與其幕客從行皆朝中士子及過魏樂彦禎禮之甚至鐸之行李甚侈從客侍姬有輦下昇平之故態彦禎有子曰從訓素無賴愛其車馬姬妾以問其父之幕客李山甫以咸通中數舉不第尤私憤於中朝貴達因勸從訓圖之伺鐸至甘陵以輕騎數百盡掠其橐裝姬僕而還賔客皆遇害及奏朝廷云得貝州報某日殺却一人姓王名令公其兇誕也如此彦禎父子尋為亂軍所殺出北夢瑣言張從晦梁祖圖伯之初夀州刺史江彦温以郡歸我乃遣親吏張從晦勞其勤而從晦無賴酣酒有飲徒何藏燿者與之偕甚眤狎從晦致命於郡彦温大張樂晦不至乃與藏燿食於主將家彦温果疑恐曰汴王謀我矣不然何使者之如是也乃殺其主將連誅數十人而以狀白其事既而又疑懼曰汴其腹心亡我族矣自縊而死梁祖大怒按其事腰斬從晦留何藏燿裂其禁械斬於夀春市出北夢瑣言李仁矩後唐明宗皇帝時董璋授東川將有䟦扈之心於時遣客省使李仁矩出使梓潼仁矩比節使下小挍驟居内職性好狎邪元戎張筵以疾辭不至乃與營妓曲宴璋聞甚怒索馬詣館遽欲害之仁矩鞹足端簡迎門璋怒稍解他日作叛兩川舉兵並由仁矩獻謀於安重誨之所致也出北夢瑣言李罕之李罕之河陽人也少為桑門無賴所至不容曽乞食於滑州酸棗縣自旦及晡無與之者擲鉢於地毁僧衣投河陽諸葛爽為卒罕之即僧號便以為名素多力或與人相毆毆其左頰右頰血流爽尋署為小挍每遣討賊無不擒之蒲絳之北有摩雲山設堡於上號摩雲寨前後不能攻取時罕之下焉由此號李摩雲累歴郡侯河南尹節將官至侍中卒於汴州亦荆南成汭之流也自唐仕梁出北夢瑣言韓伸有韓伸者渠州人也善飲博長於灼龜遊謁王侯之門常懐一龜殻隔宿先灼一龜來日之兆吉即博不吉即已又或云某方位去吉即往之諸方縱人牽之不去即取人錢貨如徵赤債或經年㤀其家而不歸多於花栁之間落魄其妻怒甚時復自來耻頓驅趂而同歸如是往往有之又嘗遊謁於東川經年不歸忽一日聚其博徒挈飲妓而致幽㑹夜坐洽樂之際其妻又自家領女僕一兩人潛至匿鄰舍家俟其夜㑹筵合遂持棒伺於暗處伸不知遂塌聲唱池水清聲不絶腦後一棒打落幞頭撲滅燈燭伸即竄於飯床之下有同坐客暗中遭鞭撻一頓不勝其苦最後遣二青衣把髻子牽行一歩一棒决之罵曰這老漢何落魄不歸也無何牽至燭下照之乃是同坐客其良人尚蓬頭潛於飯床之下蜀人大以為歡笑時輩呼韓為池水清出王氏見聞李令渚宫有李令者自宰延安本狡猾之徒也强為篇章而干謁時有歸評事任江陵鹺院常懐䘏士之心李令既識歸君累求救貸而悉皆允諾又曰某尋親湖外輙假舍而安家族歸君亦慜諾之李且乗舟而去不二旬其妻遣僕使告丐糇糧歸亦拯其乏絶李忽寄書於鹺院情况凝密是異尋常書中有贈家室等詩一首意欲組織歸君歸君悔恨而不能自明與武陵渠江之務以糊其口焉舉士沈擢每述於同院衆賔用兹戒慎也李令寄其妻詩曰有人教我向衡陽一度思歸一㫁腸為報艶妻兼少女與吾覓取朗州塲出雲谿友議孟𢎞微唐孟𢎞微郎中誕妄不拘宣宗朝因次對曰陛下何以不知有臣不以文字召用上怒曰卿何人斯朕耳冷不知有卿翌日上謂宰臣曰此人躁妄欲求翰林學士大容易哉於是宰臣歸中書貶其官示小懲也又嘗忿悁擠其弟落井外議喧然乃致書告親友曰懸身井半風言沸騰尺水丈波古今常事與鄭諷鄰居諷為南海從事因墻頽侵入墻界五六丈知宅者有狀請退其所侵判其狀曰海隅從事少有生還地勢尖斜打牆夾入平生操履率皆如此不遭擯棄幸矣哉出北夢瑣言僧鸞僧鸞有逸才而無拘檢早嵗稱鄉銜謁薛能於嘉州能以其顚率難為舉子乃佴出家自於百尺六像前披剃不肯師於常僧也後入京為文章供奉賜紫栁玭甚愛其才租庸張濬亦曽加敬盛言其可大用由是反初號鮮于鳯修刺謁栁栁鄙之不接又謁張張亦拒之於是失望而為李鋌江西判官後為西班小將軍竟於黄州遇害出北夢瑣言路徳延河中判官路徳延相國巖之姪嶽之子時謂才俊擢進士第西平王朱友謙幕寮放恣凌慠王公容之友謙背梁乞於晉陽并使初至禮遇方謹路公筵上言語及之友謙憂憤因投徳延於黄河以紓禍也先是紀綱之僕近判官入謁幕次遂有請易舍之說蓋義兄弟同處不欲聞郎君穢談也路子得非其人耶出北夢瑣言蕭希甫蕭希甫進士及第有文才口辨多機數梁時不得意棄母妻渡河易姓名為皇甫校書莊宗即位於魏州徵希甫知制誥莊宗平汴洛希甫奉詔宣慰青齊方知其母死妻嫁乃持服於魏州時議者戲引李陵書云老母終堂生妻去室後為諫議大夫性褊忿躁於進取疏宰相豆盧革韋說至於貶斥又以毁訾宰相責授嵐州司馬焉出北夢瑣言太平廣記卷二百六十四
