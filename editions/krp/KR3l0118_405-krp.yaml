body:
  text: 太平廣記卷四百五宋李昉等編寳六錢淯陽童子文徳皇后岑文本王清建安村人徐仲寳邢氏林氏曹真奇物徐景中牟鐵錐毒槊集翠裘謝靈運鬚開元漁者楊妃襪紫米嘉陵江巨木江淮市人桃核玉龍膏段成式李徳裕夏侯孜嚴遵仙槎錢淯陽童子晉義熈十二載淯陽縣羣童子浴於淯水忽見側有錢出如流沙因競取之手滿放隨流去又以衣盛裹各有所得又見流錢中有一銅車小牛牽之勢甚奔迅兒等奔逐掣得一輪徑可五寸豬鼻轂有六輻通然青色缸内黄脫狀如恒運於時沈敞守南陽求得此物然莫測之出洽聞記文徳皇后錢有文如甲跡者因文徳皇后也武徳中廢五銖錢行開元通寳錢此四字及書皆歐陽詢所為也初進様曰后搯一甲迹因是有之出談賓録岑文本唐貞觀中岑文本下朝多於山亭避暑日午時寐初覺忽有扣山亭院門者藥豎報云上清童子元寳故此叅奉文本性素慕道束帶命入乃年二十已下道士儀質爽邁衣服纎異冠淺青圎角冠衣淺青圓角帔履青圓頭履衣服輕細如霧非齊紈魯縞之比文本與語乃曰僕上清童子自漢朝而果成本生於呉已得不凝滯之道遂為呉王進入見漢帝漢帝有事擁遏敎化不得者無不相問僕嘗與方圓行下皆得通暢由是自著文武二帝迄至哀帝皆相眷王莽作亂方出外方所至皆沐人憐愛自漢成帝時遂厭人間乃尸解而去或秦或楚不常厥居聞公好道故此相謁耳文本詰以漢魏齊梁間君王社稷之事了了如目覩因言史傳間屈者虚者亦甚多文本曰吾人冠帔何制度之異對曰夫道在於方圎之中僕外服圓而心方正相時之儀也又問曰衣服皆輕細何土所出對曰此是上清五銖服又問曰比聞六銖者天人衣何五銖之異對曰尤細者則五銖也談論不覺日晚乃别去纔出門而忽不見文本知是異人乃每下朝即令伺之到則話論移時後令人潛送詣其所止出山亭門東行數步於院牆下瞥然而沒文本命工力掘之三尺至一古墓墓中無餘物惟得古錢一枚文本方悟上清童子是青銅名元寳錢之文也外圓心方錢之狀也青衣銅衣也五銖服亦錢之文也漢時生於呉是漢朝鑄五銖錢於呉王也文本雖知之而錢帛日盛至中書令十年忽失古錢所在文本遂薨出博異志王清元和初洛陽村百姓王清傭力得錢五錠因買田畔一枯栗樹將為薪以求利經宿為隣人盜斫創及腹忽有黑虵舉首如臂語人曰我王清本也汝勿斫其人驚懼失斤而走及明王清率子孫薪之復掘其根下得大甕二散錢實之王清因是獲利如歸十餘年巨富遂甃錢成龍形號王清本出酉陽雜俎建安村人建安有村人乗小舟往来建谿中賣薪為業嘗泊舟登岸將伐薪忽見山上有數錢流下稍上尋之累獲數十可及山半有大樹下有大甕髙五六尺錢滿其中而甕小欹故錢流出於是推而正之以石搘之以衣襟貯五百餘而歸盡率家人復往將盡取既至得舊路見大樹而亡其甕村人徘徊數日不能去夜夢人告之曰此錢有主向為甕欹以五百顧爾正之餘不可妄想也出稽神録徐仲寳徐仲寳者長沙人所居道南有大枯樹合數大抱有僕夫灑掃其下沙中獲錢百餘以告仲寳仲寳自往亦獲數百自爾每須錢即往掃其下必有所得如是積年凡得數十萬仲寳後至揚都選授舒城令暇日與家人共坐地中忽有白氣甚勁烈斜飛向外而去中若有物其妻以手攫之得一玉蛱蝶製作精妙人莫能測後為樂平令家人復往於厨側鼠穴中得錢甚多仲寳即率人掘之深數尺有一白雀飛出止於庭樹其下獲錢至百萬錢盡白雀乃去不知所之出稽神録邢氏建業有庫子姓邢家貧聚錢滿二千輒病或失去其妻竊聚錢埋於地中一夕忽聞有聲如蟲飛自地出穿窓户而去有觸牆壁墜地者明日視之皆錢其妻乃告埋瘞之處發視皆亡矣邢後得一自然石龜其狀如真置庭中石榴樹下或見之曰此寳物也因收置筐箧中自爾稍充足後頗富矣出稽神録林氏汀州有林氏其先嘗為郡守罷任家居一日天忽雨錢充積其家林氏乃整衣冠仰天而祝曰非常之事必將為禍於此速止林氏之福也應聲則止所收已鉅萬至今為富人云出稽神録曺真夀春人曺真出行野外忽見坡下有數千錢自逺而来飛聲如鈴真逐之入一小穴以手掬之可得數十而已又舒州桐城縣雙戍港有回風捲錢經市而過市人隨攫其錢以衣襟貯之風入古墓荆棘中人不能入而止所得錢歸家視之與常錢無異而皆言亡八九矣出稽神録奇物徐景晉時有徐景於宣陽門外得一錦麝襥至家開視有蟲如蟬五色後兩足各綴一五銖錢出酉陽雜爼中牟鐡錐中牟縣魏任城王臺下池中有漢時鐵錐長六尺入地三尺頭西南指不可動出酉陽雜爼毒槊南蠻有毒槊無刃狀如朽鐵中人無血而死言從天雨下入地丈餘祭地方掘入蠻中呼為鐸刃出酉陽雜爼集翠裘則天時南海郡獻集翠裘珍麗異常張昌宗侍側則天因以賜之遂命披裘供奉雙陸宰相狄仁傑時入奏事則天令昇坐因命仁傑與昌宗雙陸狄拜恩就局則天曰卿二人賭何物狄對曰争三籌賭昌宗所衣毛裘則天謂曰卿以何物為對狄因指所衣紫絁袍曰臣以此敵則天笑曰卿未知此裘價逾千金卿之所指為不等矣狄起曰臣此袍乃大臣朝見奏對之衣昌宗所衣乃嬖倖寵遇之服對臣此袍臣猶怏怏則天業已處分遂依其說而昌宗心赧神沮氣勢索寞累局連北狄對御就脫其裘拜恩而出至光範門遂付家奴衣之促馬而去出集異記謝靈運鬚晉謝靈運鬚美臨刑施於南海祗洹寺為維摩詰鬚寺人寳惜初不虧損中宗樂安公主五月鬭百草欲廣其物色令馳取之又恐他人所得因翦棄其餘今遂絶出國史累纂開元漁者開元末登州漁者負擔行海邊遥見近水煙霧朦朧人衆填雜若市里者遂前見多賣藥物僧道尤衆良乆間悉無所覩唯拾得青黛數十斗許大亦不敢他用而施之浮圖人矣出逸史楊妃韈𤣥宗至馬嵬驛令髙力士縊貴妃於佛堂棃樹之前馬嵬媪得襪一隻過客求而翫之百錢一觀獲錢無數出國史補紫米元和八年大軫國貢碧麥紫米上異之翼日出示術士白元佐李元戢碧麥粒大於中華之麥表裏皆碧香氣如粳米食之令人體輕乆則可以御風紫米有類巨勝炊一升得飯一斗食之令人髭髪縝黒顔色不老出杜陽編嘉陵江巨木閬州城臨嘉陵江江之滸有烏陽巨木長百餘尺圍將半焉漂泊揺撼於江波者乆矣而莫知奚自閬之耆舊相𫝊云堯時汎洪水而至亦靡據焉襄漢節度使渤海髙元裕大和九年自中書舎人牧閬中下車未㡬亦嘗見之固以為異矣忽一日津吏啟事曰江中巨木由来東首去夜無端飜然西顧髙益奇之即與賓寮逕往觀焉因廣召舟子洎軍吏羣民輩則以大索羈而出之初無艱阻隨拖登岸大半之後屹而不前雖千夫百牛莫能引之人力既竭復如前時自是日曝風吹僵然沙上或則寺僧欲以為窣堵波之獨柱或則州吏請支分剞劂以備衆材髙以奇偉異常皆莫之許每擬還之於江但慮勞人逡巡未果開成三年上元日髙准式行香於開元觀寮吏畢至髙欲因衆力得共牽復其木焉及至則又廣備縻索多聚勇力將作氣引拽之際而巨木因依假藉若自轉移輕然已復於江矣拒江尚餘尺許歘然驚迸百支巨索皆如斬截其木則沿洄汨沒徑去絶江上及中流寂然遂𨼆髙遣善泅者數輩遽往觀之江水清澈毫髮可見善逰者熟視而迴皆曰水中别有東西二木巨細與斯木無異適自岸而至者則南北叢焉髙顧坐客靡不駭愕自是則不復得而見矣有頃髙除諫議大夫制到詳其授官之日即髙役功之辰也向使斯旬朔未獲移徙髙之新命既至則那復留意乎轉遷俾之仍舊出集異記江淮市人桃核水部員外郎杜涉嘗見江淮市人桃核扇量来止容一升言於九嶷山溪中得出集異記玉龍膏安南有玉龍膏南人用之能化銀液說者曰此膏不可持北来茍有犯者則禍且及矣大和中韓約都䕶安南得其膏及還遂持以歸人有謂曰南人傳此膏不可持以北而公持去得無有悔於後耶約不聴卒以歸焉後約為執金吾是嵗京師亂約以附㑹鄭注竟赤其族豈玉龍膏之所歸禍乎由是南去者不敢持以北也出宣室志段成式段成式羣従有言少時嘗毁鳥巢得一黑石大如雀卵圓滑可愛後偶置醋器中忽覺石動徐之見有四足如綖舉之足亦隨縮出酉陽雜爼李徳裕李徳裕在文宗武宗朝方秉相權威勢與恩澤無比每好搜掇殊異朝野歸附者多求寳玩獻之常因暇日休澣邀同列宰輔及朝士晏語時畏景爀曦咸有鬱蒸之苦軒葢候門已及亭午縉紳名士交扇不暇時共思憩息於清涼之所既延入小齋不覺寬厰四壁施設皆有古書名畫而炎鑠之患未已及列坐開罇煩暑都盡良乆覺清飈凜冽如涉髙秋備設酒肴及昏而罷出户則火雲烈日熇然焦灼有好事者求親信察問之云此日以金盆貯水浸白龍皮置於坐末龍皮有新羅僧得海中海旁居者能得自魚扈有老人見而識之僧知李好竒因以金帛贖之又煖金帶辟塵簪皆希世之寳及李南遷悉於思溪沈溺使崑崙沒取之云在鰐魚穴中竟不可得矣出劇談録東都平泉莊去洛城三十里卉木臺榭若造僊府有虚檻前引泉水瀠迴疏鑿像巴峡洞庭十二峰九𣲖迄於海門江山景物之狀竹間行徑有平石以手摩之皆𨼆𨼆雲霞龍鳯草樹之形有巨魚脇骨一條長二丈五尺其上刻云㑹昌二年海州送到莊東南隅即徵士韋楚老拾遺别墅楚老風韻髙邈雅好山水李居廊廟日以白衣累擢諫署後歸平泉造門訪之楚老避於山谷間逺其勢也初徳裕之營平泉也逺方之人多以土産異物奉之故數年之間無所不有時文人有題平泉詩者隴右諸侯供語鳥日南太守送花錢威勢之使人也出劇談録夏侯孜夏侯孜為宣宗山陵使開真陵用功尤至鑿皇堂深及袤丈於堅石中得折金釵半股其長如掌餘尚銜石中工乃抉取以獻孜孜以寢園方近其事稍異因𨼆而不奏出唐闕史嚴遵仙槎嚴遵仙槎唐置之於麟徳殿長五十餘尺聲如銅鐡堅而不蠧李徳裕截細枝尺餘刻為道像往往飛去復来廣明已来失之槎亦飛去出洞天集太平廣記卷四百五
