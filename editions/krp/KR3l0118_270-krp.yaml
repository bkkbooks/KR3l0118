body:
  text: 太平廣記卷二百七十婦人一洗氏衞敬瑜妻周迪妻鄒待徵妻奉天竇氏二女鄭神佐女盧夫人符鳳妻呂榮封景文髙彥昭女李誕女義成妻魏知古妻侯四娘鄭路女鄒僕妻竇烈女歌者婦洗氏洗氏髙涼人世爲南越首領部落十餘萬幼賢明在父母家能撫循部衆壓服諸越髙涼太守馮寶聞其志行聘爲妻每與夫寶參決詞訟政令有序侯景反都督蕭勃徵兵入援遣刺史李遷仕召寶寶欲往氏疑其反止之後果反寶卒嶺表大亂氏懷集之百越晏然子僕尚幼以氏功封信都侯詔冊氏為中郎將石龍太夫人賚繡幰油絡駟馬安車鼔吹麾幢旌節如刺史之儀僕卒百越號夫人爲聖母王仲宣反夫人帥師敗之親披甲乗馬巡撫諸州嶺南悉定封譙國夫人幕府署長史官屬給印章便宜行事皇后賜以首飾及宴服一襲時畨州總管趙訥貪虐黎獠多亡叛夫人上封事論之敕夫人招慰夫人親載詔書自稱使者歴十餘州宣述德意所過皆降文帝賜夫人臨振縣湯沐邑卒諡誠敬闕衞敬瑜妻衞敬瑜妻年十六而夫亡父母舅姑欲嫁之乃截耳爲誓不許戸有巢燕常雙飛後忽孤飛女感其偏栖乃以縷繫脚爲誌後嵗此燕果復來猶帶前縷妻爲詩曰昔年無偶去今春又獨歸故人恩義重不忍更雙飛闕周迪妻周迪妻某氏迪善賈往來廣陵會畢師鐸亂人相略賣以食迪飢將絶妻曰今欲歸不兩全君親在不可并死願見賣以濟君行迪不忍妻固與詣肆售得數千錢以奉迪至城門守者誰何疑其紿與迪至肆問狀見妻首已在于枅矣迪裹餘體歸塟之闕鄒待徵妻鄒待徵妻薄者武康尉自牧之女也從待徵官江隂袁晁亂待徵解印竄匿薄爲賊所掠將汙之不從語家媪使報待徵曰我義不辱即死于水賊去得其尸義聲動江南聞人李華作哀節婦賦曰昔歲隋盗並起横行海浙江隂萬戸化爲凝血無石不焚無玉不折峩峩薄媛烱然名節自牧之子鄒徵之妻玉德蘭姿女之英兮鄒也避禍伏于榛莾婉如之賔執爲囚虜匍匐泥沙極望無睹出授官之告託垂白之姥姥感夫人爰逹鄒君兵解求尸在于江濵哀風起爲連波痛氣結爲孤雲鳬雁爲之哀鳴日月爲之蒙昬端標移景而恒直勁芳貫霜而猶存知子莫如父誠哉長者之言闕奉天竇氏二女奉天縣竇氏二女伯娘仲娘雖長於村野而幼有志操住與邠州接界永泰中草賊數千人持兵刃入其村落行剽刼聞二女有容色姊年十九妹年十六藏於巖窟間賊徒擬爲逼辱乃先曵伯娘出行數十歩又曵仲娘出賊相顧自慰行臨深谷伯娘曰我豈受賊汙辱乃投之於谷賊方驚駭仲娘又投於谷谷深數百尺姊尋卒仲娘脚折面破血流被體氣絕良乆而蘇賊義之而去京兆尹第五琦感其貞烈奏之詔旌表門閭長免丁役二女塟事官給京兆尹曹陸海首賦以美之闕鄭神佐女大中五年兗州瑕丘縣人鄭神佐女年二十四先許適馳雄牙官李元慶神佐亦爲官健戍慶州時党項叛神佐戰死其母先亡無子女以父戰殁邉城無由得還乃剪髪壞形自徃慶州護父䘮還至瑕丘縣進賢鄉馬青村與母合塟便廬於墳所手植松檜誓不適人節度使蕭俶以狀奏之曰伏以閭里之中罕知禮教女子之性尤昧義方鄭氏女痛結窮泉哀深陟岵投身沙磧歸父遺骸遠自邉陲得還閭里感蓼莪以積恨守丘墓以誓心克彰孝理之仁足勵貞方之節詔旌表門閭而贊曰政教隆平男忠女貞禮以自防義不苟生彤管有煒蘭閨振聲闗雎合雅始號文明闕盧夫人盧夫人房𤣥齡妻也𤣥齡微時病且死嘱曰吾病革君年少不可寡居善事後人盧泣入帷中剔一目示𤣥齡明無他意𤣥齡良愈禮之終身按妬婦記亦有夫人何賢於微時而妬於榮顯邪子於是而有感闕符鳳妻玉英唐時符鳳妻也尤姝美鳳以罪徙儋州至南海爲獠賊所殺脅玉英私之對曰一婦人不足以事衆男子請推一長者賊然之乃請更衣有頃盛服立於舟上罵曰受賊辱不如死遂自沉於海闕呂榮許升妻呂氏字榮升少爲博徒不理操行榮嘗躬勤家業以奉養其姑數勸升修學毎有不善輒流涕進規榮父積忿疾升乃呼榮欲改嫁之榮嘆曰命之所遭義無離貳終不肯歸升感激自勵乃尋師遠學遂以成名尋被本州辟命行至壽春爲盗所殺刺史尹耀捕盗得之榮迎喪於路聞而詣州請甘心讐人耀聽之榮乃手斷其頭以祭升靈後郡遭宼賊賊欲犯之榮踰垣走賊㧞刀追之賊曰從我則生不從我則死榮曰義不以身受辱宼虜遂殺之是日疾風暴雨雷電晦㝠賊惶懼叩頭謝罪乃殯塟之闕封景文殷保晦妻封敖孫也名絢字景文能文章草隸保晦歴挍書郎黄巢入長安共匿蘭陵里明日保晦逃賊悦封色欲取之固拒賊誘悦萬詞不答賊怒勃然曰從則生不然正膏我劍封罵曰我公卿子守正而死猶生也終不從逆賊手遂遇害保晦歸左右曰夫人死矣保晦號而絶闕高彦昭女高愍女名妹妹父彦昭事正巳及納拒命質其妻子使守濮陽建中二年挈城歸河南都統劉元佐屠其家時女七歲母李憐其幼請免死爲婢許之女不肯曰母兄皆不免何頼而生母兄將被刑徧拜四方女問故答曰神可祈也女曰我家以忠義誅神尚何知而拜之問父所在西嚮哭再拜就死德宗駭歎詔太常謚曰愍諸儒爭爲之誄彦昭從元佐救寧陵復汴州授頴州刺史朝廷録其忠居州二十年不徙卒贈陜州都督闕李誕女東越閩中有庸嶺高數十里其下北隰中有大蛇長七八丈圍一丈土俗常懼東治都尉及屬城長吏多有死者祭以牛羊故不得福或與人夢或喻巫祝欲得噉童女年十二三者都尉令長患之共求人家生婢子兼有罪家女養之至八月朝祭送蛇穴口蛇輒夜出吞嚙之累年如此前後已用九女一歲將祀之募索未得將樂縣李誕家有六女無男其小女名寄應募欲行父母不聽寄曰父母無相留今惟生六女無有一男雖有如無女無緹縈濟父母之功既不能供養徒費衣食生無所益不如早死賣寄之身可得少錢以供父母豈不善耶父母慈憐不聽去終不可禁止寄乃行請好劍及咋蛇犬至八月朝便詣廟中坐懷劍將犬先作數石米餈蜜麨以置穴口蛇夜便出大如囷目如二尺鏡聞餈香氣先噉食之寄便放犬犬就嚙咋寄從後斫蛇因踊出至庭而死寄入視穴得其九女髑髏悉舉出咤言曰汝曹怯弱爲蛇所食甚可哀愍於是寄女緩歩而歸越王聞之聘寄爲后拜其父爲將樂令母及姊皆有賜賞自是東治無復妖邪之法其歌謡至今存焉出法苑珠林義成妻漢源縣人義成妻壯年無子夫死將𦵏及先殯時含毒藥酒至未入墓時撫棺吞之而死乃爲合𦵏焉時以狀聞有詔賜帛事見常􅟛國志出黎州國經魏知古妻唐工部尚書魏知古性雅正善屬文年七十卒於位妻蘇氏不哭比至香水洗浴唅襲訖舉聲一慟而絶與尚書同日合䘮時竒其節以爲前代未之有闕侯四娘至德元年史思明未平衛州有婦人侯四娘等三人刺血謁於軍前願入義營討賊出獨異志鄭路女鄭路昆仲有爲江外官者維舟江渚羣偷奄至即以所有金帛羅列岸上而恣賊運取賊一不犯曰但得侍御小娘子足矣其女則羙色賊潜知之矣骨肉相顧不知所以答女欣然請行其賊即具小舟載之而去謂賊曰君雖爲偷得無所居與親屬焉然吾家衣冠族也既爲汝妻豈以無禮見逼若達所止一會親族以託好仇足矣賊曰諾又指所偕來二婢曰公既以偷爲名此婢不當有爲公計不若歸吾家賊以貌羙其言且順顧已無不可者即自鼓其棹載二婢而去女於是赴江而死出玉泉子鄒僕妻梁末龍德壬午歲襄州都軍務鄒景温移職于徐亦綰都軍之務有勁僕失其姓名自恃拳勇獨與妻筞驢以路至宋州東芒碭澤素多賊盜行旅或孤則鮮有獲免者其日與妻偕憩于陂之半雙栁樹下大咤曰聞此素多豪客豈無一人與吾曹决勝負乎言粗畢有五六盜自叢薄間躍出一夫自後雙手交抱搏而仆之其徒遽扼其喉抽短刃以斷之斯僕隨身兵刃略無所施葢掩其不備也唯妻在側殊無惶駭但矯而大呼曰快哉今日方雪吾之恥也吾比良家之子遭其俘掠以致於此孰謂無神明也賊謂誠至而不殺與行李并二驢驅以南邁近五六十里至亳之北界逹孤莊南而息焉莊之門有器甲葢近戍巡警之卒也其婦遂徑入村人之中堂盜亦謂其謀食不疑也乃泣拜其總首且告其夫適遭屠戮之狀總首聞之潜召其徒俱時執縛唯一盜得逸械送亳城咸棄於市其婦則返襄陽還削爲尼誓終焉之志出玉堂閑話竇烈女烈女姓竇氏小字桂娘父良建中初爲汴州戸曹掾桂娘美顔色讀書甚有文李希烈破汴州使甲士至良門取桂娘去將出門顧其父曰愼無戚戚必能滅賊使大人取富貴于天子桂娘既以才色在希烈側復能巧曲取信凡希烈之宻雖妻子不知者悉皆得聞希烈歸蔡州桂娘嘗謂希烈曰忠而勇一軍莫如陳仙竒其妻竇氏仙竒竉且信之願得相徃來以姊妹叙齒因徐説之以堅仙竒之心希烈然之因以姊事仙竒妻嘗間謂曰賊凶殘不道遲晚必敗姊應早圖遺種之地仙竒妻然之興元元年四月希烈暴死其子不發喪欲盡誅老將校俾少者代之計未决有獻含桃者桂娘白希烈子請分遺仙竒妻且以示無事於外因爲蠟帛書曰前日已死殯在後堂欲誅大臣須自爲計次朱染帛丸如含桃仙竒發丸見之言於薛育曰兩日稱疾但怪樂曲雜發盡夜不絶此乃有謀未定示暇於外事不疑矣明日仙竒薛育各以所部兵譟於衙門請見希烈烈子迫出拜願去僞號一如李納仙竒曰爾悖逆天子有命因斬希烈妻及子函七首以獻陳尸於市後兩月吳少誠殺仙竒知桂娘謀因亦殺之出樊川集歌者婦南中有大帥世襲爵位然頗恣横有善歌者與其夫自北而至頗有容色帥聞而召之每入輒與其夫偕至更唱迭和曲有餘態帥欲私之婦拒而不許帥宻遣人害其夫而置婦于别室多其珠翠以悦其意逾年徃詣之婦亦欣然接待情甚婉孌及就榻婦忽出白刃於袖中擒帥而欲刺之帥掣肘而逸婦逐之適有二奴居前闔其扉由是獲免旋遣人執之自斷其頸矣出玉堂閒話太平廣記卷二百七十
