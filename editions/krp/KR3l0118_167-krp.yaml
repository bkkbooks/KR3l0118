body:
  text: 太平廣記卷一百六十七氣義二裴冕李宜得穆寧趙驊曹文洽陽城王義裴度廖有方裴冕裴冕為王鉷判官鉷得罪伏法李林甫操竊權柄咸懼之鉷賔佐數人不敢窺鉷門冕獨收鉷屍親自䕶喪瘞於近郊出談賔錄李宜得李宜得本賤人背主逃當𤣥宗起義與王毛仲等立功宜得官至武衞將軍舊主遇諸塗趨而避之不敢仰視宜得令左右命之主甚惶懼至宅請居上座宜得自捧酒食舊主流汗辭之留連數日遂奏云臣蒙國恩榮祿過分臣舊主卑𤨏曽無寸祿臣請割半俸解官以榮之願陛下遂臣愚欵上嘉其志擢主為郎將宜得復其秩朝廷以此多之出朝野僉載穆寧穆寧不知何許人顔眞卿奏為河北道支使寧以長子屬母弟曰唯爾所適茍不乏嗣吾無累矣因往平原謂眞卿曰先人有嗣矣古所謂死有輕於鴻毛者寧是也願畢佐公以定危難其後寧計或不行眞卿棄平原夜渡河出談賔錄趙驊趙驊因脇於賊中見一婦人問之即江西㢘察韋環之族女也夫為畿官以不往賊軍遇害韋氏沒入為婢驊哀其寃抑以錢贖之俾其妻致之别院而驊竟不見焉明年收復東都驊以家財贍給而求其親屬歸之議者咸重焉出談賔錄曹文洽曹文洽鄭滑之禆將也時姚南仲為節度使被監軍薛盈珍怙勢干奪軍政南仲不從數為盈珍讒於上上頗疑之後盈珍遣小使程務盈馳表南仲誣讒頗甚文洽時奏事赴京師竊知盈珍表中語文洽憤怒遂晨夜兼道追務盈至長樂驛及之與同舍宿中夜殺務盈沉盈珍表於厠中乃自殺日旰驛吏開門見血傷滿地傍得文洽二緘一狀告盈珍一表理南仲寃且陳謝殺務盈徳宗聞其事頗疑南仲慮釁深遂入朝初至上曰盈珍擾卿甚邪南仲曰盈珍不擾臣自隳陛下法耳如盈珍輩所在雖羊杜復生撫百姓御三軍必不能成愷悌父母之政師律善陣之制矣徳宗黙然久之出談賔錄陽城陽城貞元中與三弟隱居陜州夏陽山中相誓不婚啜菽飲水莞簟布衾熈熈怡怡難名其室後遇嵗荒屛跡不與同里往來懼於求也或採桑榆之皮屑以為粥講論詩書未嘗暫輟有蒼頭曰都兒與主協心蓋管寧之比也里人敬以哀饋食稍豐則閉户不納㪚於餓禽後里人竊令於中户致糠覈十數盃乃就地食焉他日山東諸侯聞其髙義發使寄五百縑城固拒却使者受命不令返城乃標於屋隅未嘗啟緘無何有節士鄭俶者迫於塋舉投人不應因途經其門往謁之俶戚容瘵貌城留食旬時問俶所之及其瘠瘁之端俶具以情告城曰感足下之操城有諸侯近貺物無所用輒助足下人子終身之道俶固讓城曰子茍非妄又何讓焉俶對曰君子既施不次之恩某願終志後為奴僕償之遂去俶東治塋事罷杖歸城以副前約城曰子奚如是茍無他繫同志為學可也何必云役已以相依俶泣涕曰若然者㣲軀何幸俶於記覽苦不長月餘城令諷毛詩雖不輟尋讀及與之討論如水投石也俶大慙城曰子之學與吾弟相昵不能舍有以致是邪今所止阜北有髙顯茅齋子可自翫習也俶甚喜遽遷之復經月餘城訪之與論國風俶雖加功竟不能往復一辭城方出未三二十步俶縊於梁下供餼童窺之驚以告城城慟哭若裂支體乃命都兒將酒奠之又作文親致祭自咎不敏我雖不殺俶俶因我而死自脱衣令僕夫負之都兒行檟楚十五仍服緦麻厚瘞之由是為縉紳之所推重後居諫議大夫時極諫裴延齡不合為國相其言至懇唐史書之及出守江華郡日炊米兩斛魚羮一大鬵自天使及草衣村野之夫肆其食之幷置瓦甌樿杓有𩔖中衢罇也出乾􅍧子王義王義即裴度之𨽻人也度為御史中丞武元衡遇害之日度為人所刺義扞刃而死度由是獲免乃自為文以祭厚給其妻子是嵗進士撰王義傳者十二三焉出國史補裴度元和中有新授湖州錄事叅軍未赴任遇盗􅔯剽殆盡告敇厯任文簿悉無孑遺遂於近邑求丐故衣迤邐假貸却返逆旅旅舍俯逼裴晉公第時晋公在假因㣲服出遊側近邸遂至湖糾之店相揖而坐與語周旋問及行止糾曰某之苦事人不忍聞言發涕零晉公憫之細詰其事對曰某主京數載授官江湖遇寇盪盡唯殘㣲命此亦細事爾其如某將娶而未親迎遭郡牧强以致之獻於上相裴公位亞國號矣裴曰子室之姓氏何也答曰姓某字黄娥裴時衣紫袴衫謂之曰某即晉公親校也試為子偵遂問姓名而往糾復悔之此或中令之親近入而白之當致其禍也寢不安席遲明詣裴之宅側偵之則裴已入内至晚有赬衣吏詣店頗怱遽稱令公召糾聞之惶懼倉卒與吏俱往至第斯須延入小㕔拜伏流汗不敢仰視即延之坐竊視之則昨日紫衣押牙也因首過再三中令曰昨見所話誠心惻然今聊以慰其憔悴矣即命箱中官誥授之已再除湖州糾喜躍未已公又曰黄娥可于飛之任也特令送就其逆旅行裝千貫與偕赴所任出玉堂閒話廖有方廖有方元和乙未嵗下第游蜀至寳雞西適公館忽聞呻吟之聲潛聽而㣲惙也乃於閒室之内見一貧病兒郎問其疾苦行止彊而對曰辛勤數舉未偶知音眄睞叩頭久而復語唯以殘骸相託餘不能言擬求救療是人俄忽而逝遂賤鬻所乗鞍馬於村豪備棺瘞之恨不知其姓字茍為金門同人臨岐悽斷復為銘曰嗟君歿世委空囊幾度勞心翰墨場半面為君申一慟不知何處是家鄉後廖君自西蜀廻取東川路至靈龕驛驛將迎歸私第及見其妻素衣再拜嗚咽情不可任徘徊設辭有同親懿淹留半月僕馬皆飫啜熊虎之珍極賔主之分有方不測何緣悚惕尤甚臨别其妻又悲啼贈賮繒錦一䭾其價值數百千驛將曰郎君今春所葬胡綰秀才即某妻室之季兄也始知亡者姓字復叙平生之事所遺物終不納焉少婦及夫堅意拜上有方辭曰僕為男子粗察古今偶然葬一同流不可當兹厚惠遂促轡而前驛將奔騎而送復逾一驛尚未分離廖君不顧其物驛將執袂各恨東西物乃棄於林野鄉老以義事申州州將以表奏朝廷文武宰寮願識有方共為導引明年李逢吉知舉有方及第改名游卿聲動華夷皇唐之義士也其主驛戴克勤堂牒本道節度甄昇至於極職克勤名義與廖君同逺矣出雲溪友議太平廣記卷一百六十七
