body:
  text: 太平廣記卷三百二十九宋李昉等編鬼十四夏文榮張希聖鄭從簡房穎叔劉諷相州刺史王湛狄仁傑李暠張守珪楊瑒夏文榮周長安年初前遂州長江縣丞夏文榮時人以爲判㝠事張鷟時御史出爲處州司倉替歸往問焉榮以杖畫地作柳字曰君當爲此州至後果除柳州司户後改德州平昌令榮尅時日晷漏無差又蘇州嘉興令楊廷玉則天之表姪也貪猥無厭著詞曰迴波爾時廷玉打獠取錢未足阿姑婆見作天子傍人不得抵觸差攝御史康訔推奏斷死時母在都見夏文榮榮索一千張白紙一千張黄紙爲廷玉禱後十日來母如其言榮曰且免死矣後十日内有進止果六日有敕楊廷玉奉養老母殘年又天官令史柳無忌造榮榮書衞漢郴字曰衞多不成漢郴二州交加不定後果唱衞州録事闗重即唱漢州録事時鸞臺鳳閣令史進狀訴天官注擬不平則天責侍郎崔元暐暐奏臣注官極平則天曰若爾吏部令史官共鸞臺鳳閣交換遂以無忌爲郴州平陽主簿鸞臺令史爲漢州録事焉出朝野僉載張希望周司禮卿張希望移舊居改造見鬼人馮毅見之曰當新廐下有一伏尸極怒公可避之望笑曰吾少長已來未曽信此事公勿言後月餘毅入見鬼持弓矢隨希望後適及階鬼引弓射中肩膊希望覺背痛以手撫之其日卒出志怪鄭從簡周左司員外郎鄭從簡所居㕔事常不寧令巫者視之曰有伏尸姓宗妻姓寇在㕔基之下使問之曰君坐我門上我出入常值君君自不嘉非我之爲也掘地三尺果得舊骸有銘如其言移出改葬於是遂絶出朝野僉載房穎叔周地官郎中房穎叔除天官侍郎明日欲上其夜有厨子王老夜半起忽聞外有人喚云王老不須起房侍郎不上後三日李侍郎上王老却卧至曉房果病兩日而卒所司奏仗下即除李迴秀爲侍郎其日謝即上王老以其言問諸人皆云不知方悟是神明所吿也出朝野僉載劉諷文明年竟陵掾劉諷夜投夷陵空館月明不寢忽有一女郎西軒至儀質温麗緩歌閒步徐徐至中軒回命青衣曰紫綏取西堂花茵來兼屈劉家六姨姨十四舅母南鄰翹翹小娘子并將溢奴來傳語道此間好風月足得遊樂彈琴詠詩大是好事雖有竟陵判司此人已睡明月下不足迴避也未幾而三女郎至一孩兒色皆絶國紫綏鋪花茵於庭中揖讓班坐坐中設犀角酒樽象牙杓緑罽花觶白琉璃盞醪醴馨香逺聞空際女郎談謔歌詠音詞清婉一女郎爲録一女郎爲明府舉觴酹酒曰惟願三姨婆壽等祁山六姨姨與三姨婆等劉姨夫得太山府糺成判官翹翹小娘子嫁得朱餘國太子溢奴便作朱餘國宰相某三四女伴揔嫁得地府司文舍人不然嫁得平等王郎君六郎子七郎子則平生望足矣一時皆笑曰須與蔡家娘子賞口翹翹時爲録事獨下一籌罰蔡家娘子曰劉姨夫才貌温茂何故不與他五道主使空稱糺成判官怕六姨姨不歡請喫一盞蔡家娘子即持盃曰誠知彼罰直縁姨夫大年老昏暗恐看五道黄紙文書不得誤大神伯公事飲亦何傷於是衆女郎皆笑倒又一女郎起傳口令仍抽一翠簪急說傳翠簪過令不通即罰令曰鸞老頭腦好好頭腦鸞老傳說數巡因令翠綏下坐使說令翠綏素吃訥令至但稱鸞老鸞老女郎皆大笑曰昔賀若弼弄長孫鸞侍郎以其年老口喫又無髮故造此令三更後皆彈琴擊筑更唱迭和歌曰明月秋風良宵會同星河易飜歡娛不終緑樽翠杓爲君斟酌今夕不飲何時歡樂又歌曰楊柳楊柳裊裊隨風急西樓美人春夢長繡簾斜捲千條入又歌曰玉口金缸願陪君王邯鄲宫中金石絲簧衞女秦娥左右成行紈縞繽紛翠眉紅糚王歡顧眄爲王歌舞願得君歡常無災苦歌竟已是四更即有一黄衫人頭有角儀貌甚偉走入拜曰婆提王命娘子速來女郎等皆起而受命即傳語曰不知王見召適相與望月至此敢不奔赴因命青衣收拾盤筵諷因大聲嚏咳視庭中無復一物明旦拾得翠釵數隻將以示人不知是何物也出𤣥怪録相州刺史唐王道堅爲相州刺史州人造板籍畢則失之後於州室梁間散得之籍皆中截爲短卷遂不用矣棄之又有李使君在州明早將祀社夜潔齋卧於㕔事夢其父母盡來迎已覺而惡之具吿其妻因疾數日卒朱希玉爲刺史宅西院恒閉之希玉退衙忽一人紫服戴髙鬟乗馬直入二蒼頭亦乗導之至閣乃下直吏以爲親姻家通信也從而視之其人正服徐行直入中院院門爲之開入已復閉乃索蒼頭及馬皆無之走白希玉希玉命開中院但見四週除掃甚潔帳幄圍匝施設粲然華筵廣座餚饌窮極水陸數十人食具器物盡金銀也希玉見之大驚乃酌酒酹之以祈福遂出閉其門明日更開則如舊矣室宇封閉草蔓荒凉二年而希玉卒出紀聞王湛王湛判㝠事初叔元式任荆州富陽令取部内人吳實錢一百貫後誣以他事決殺之以滅口式帶别優并有上下考五選不得官以問湛白爲叔檢之經宿曰叔前任富陽令日合有負心事其案見在㝠司判云殺人之罪身後科罰取錢一百貫當折四年禄叔曰誠有此事吾之罪也出朝野僉載狄仁傑則天時狄仁傑爲寧州刺史其宅素凶先時刺史死者十餘輩傑初至吏白官舍久凶先後無敢居者且榛荒棘毁已不可居請舍他所傑曰刺史不舍本宅何别舍乎命去封鎖葺治居之不疑數夕詭怪竒異不可勝紀傑怒謂曰吾是刺史此即吾宅汝曲吾直何爲不識分理反乃以邪忤正汝若是神速聽明教若是鬼魅何敢相干吾無懼汝之心徒爲千變萬化耳必理要相見何不以禮出耶斯須有一人具衣冠而前曰某是某朝官𦵏堂階西樹下體魄爲樹根所穿楚痛不堪忍頃前數公多欲自陳其人輒死幽途不達以至於今使君誠能改葬何敢遷延於此言訖不見明日傑令發之果如其言乃爲改葬出述異記李暠唐兵部尚書李暠時之正人也開元初有婦人詣暠容貌風流言語學識爲時第一暠不敢受會太常卿姜皎至暠以婦人與之皎大會公卿婦人自云善相見張說曰宰臣之相遂相諸公卿言無不中謂皎曰君雖有相然不得壽終酒闌皎狎之於别室媚言遍至將及其私公卿迭往窺覩時暠在座最後往視婦人於是呦然有聲皎驚墮地取火照之見牀下有白骨當時議者以暠貞正故鬼神懼焉出廣異記張守珪幽州節度張守珪少時爲河西主將守玉門闗其軍挍皆勁勇善鬭每探候深入頗以刼掠爲事西城胡僧者自西京造袈裟二十餘䭾還大竺國其徒二十餘人探騎意是羅錦等物乃刼掠之殺其衆盡至胡僧刀棒亂下而不能傷探者異焉既而索䭾唯得袈裟意甚悔恨因於僧前追悔擗踴悲涕久之僧乃曰此輩前身皆負守將命唯趂僧鬼是枉死耳然汝守將禄位重後當爲節度大夫等官此輩亦如君何可白守將爲修福耳然後數年守將合有小厄亦有所以免之騎還白守珪珪留僧供養累年去後守珪與其徒二十五人至伊蘭山探賊胡騎數千猝至守珪力不能抗下馬脫鞍示以閒暇騎來漸逼守珪謂左右爲之奈何若不獲已事理湏戰忽見山下紅旗數百騎突前出戰守珪隨之穿其一角尋俱得出虜不敢逐紅旗下將謂守珪曰吾是漢之李廣知君有難故此相救後富貴毋相忘也言訖不見守珪竟至幽州節度御史大夫出廣異記楊瑒開元中洛陽令楊瑒常因出行見槐隂下有卜者令過端坐自若伍百訶使起避不動瑒令散手拘至㕔事將捶之躬自責問術者舉首曰君是兩日縣令何以責人瑒問其事曰兩日後君當命終瑒甚愕問何以知之術者具吿所見舉家驚懼謂術者曰子能知之必能禳之若之何而免也瑒再拜求解術者曰當以君之聞見以衞執事免之與否未可知也乃引瑒入東院亭中令瑒被髮跣足牆面而立已則據案而書符中夕之後喜謂瑒曰今夕且幸免其即來明日可以三十張紙作錢及多造餅餤與壺酒出定罪門外桑林之間俟人過者則飲之皁裘右袒即召君之使也若留而飲餤君其無憂不然寔難以濟君亦宜易衣服處小室以伺之善爲辭謝問以所欲予之策盡於是矣瑒如其言洎日西景酒餤將罄而皁裘不至瑒深以爲憂須臾遂至使人邀屈皁裘欣然累有所進瑒乃拜謁人云君昨何之數至所居遂不復見疑於東院安處善神監護故不敢犯今地府相招未已奈何瑒再拜求救者千數兼燒紙錢資其行用鬼云感施大惠明日當與府中諸吏同來謀之宜盛饌相待言訖不見明日瑒設供帳極諸海陸候之日晚使者與其徒數十人同至宴樂殊常浩暢相語曰楊長官事焉得不盡心耶久之謂瑒君對坊楊鍚亦有才幹今揩玉作金以取彼君至五更鼓聲動宜於録門相候若聞哭聲君則免矣瑒如其言往見鬼便在樹頭欲往鍚舍爲狗所咋未能得前俄從缺牆中入遲迴聞哭聲瑒遂獲免出廣異記太平廣記卷三百二十九
