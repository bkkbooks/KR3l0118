body:
  text: 太平廣記巻四百三十八宋李昉等編畜獸五犬下李道豫朱休之李叔堅王瑚李德温敬林庾氏沈霸田琰王仲文崔惠童李義胡志忠韓生杜修己袁繼謙犬下李道豫安國李道豫宋元嘉中其家犬卧於當路豫蹶之犬曰汝即死何以踏我豫未幾而卒出述異記朱休之有朱休之者元嘉中與兄弟對坐之際其家犬忽蹲視二人而笑因揺頭而言曰言我不能歌聽我歌梅花今年故復可那汝明年何其家靳犬不殺至梅花時兄弟相鬬弟奮㦸傷兄收繫經年至夜舉家疫死出集異記李叔堅漢汝南李叔堅少時從事其家犬忽人立而行家人咸請殺之叔堅曰犬馬諭君子見人行而效之何傷也後叔堅解冠榻上犬戴之以走家人大驚叔堅亦無所怪犬尋又於竈前畜火家人益驚愕叔堅曰兒婢皆在田中犬助畜火幸可不煩鄰里亦何惡也居旬日犬自死竟無纎芥之灾而叔堅終享大位出風俗通王瑚山陽王瑚字孟璉為東海蘭陵人夜半時有黑幘白單衣吏詣縣扣閣迎之忽然不見如是數年後伺之見一老狗黑頭白軀猶故至閣使人以白孟璉殺之乃絶出搜神記李德司空東萊李德停喪在殯忽然見形坐祭床上顔色服餙真德也見兒婦孫子次戒家事亦有條貫鞭朴奴婢皆得其過飲食既飽辭訣而去家人大小哀割斷絶如是四五年其後飲酒多醉而形露但見老狗便共打殺因推問之則里中沽酒家狗也出搜神記温敬林晉秘書監太原温敬林亡一年婦柏氏忽見林還共寢處不肯見子弟兄子來見林林小開忩出面見之後酒醉形露是鄰家老黄狗乃打死之出幽明録庾氏太叔王氏後娶庾氏女年少美色王年六十常宿外婦深無忻後忽一夕見王還燕婉兼常晝坐因共食奴從外來見之大驚以白王王遽入偽者亦出二人交㑹中庭俱著白帢衣服形貎如一眞王便先舉杖打偽者偽者亦報打之二人各敕子弟令舉手王兒乃突前痛打遂成黄狗王時為㑹稽府佐門士云恒見一老黄狗自東而來其婦大恥發病死出續搜神記沈霸吳興沈霸太元中夢女子來就寢同伴宻察惟見牝狗每待霸眠輙來依床疑為魅因殺而食之霸復夢青衣人責之曰我本以女與君共事若不合懷自可見語何忽乃加恥歟可以骨見還明日收骨葬岡上從是乃平復出異苑田琰北平田琰母喪恒處廬向一暮夜忽入婦室宻怪之曰君在毀滅之地幸可不甘琰不聽而合後琰暫入不與婦語婦怪無言并以前事責之琰知魅臨暮竟未眠衰服掛廬須臾見一白狗攫廬銜衰服因變為人著而入琰隨後逐之見犬將升婦床便打殺之婦羞愧病死出搜神記王仲文宋王仲文為河南郡主簿居緱氏縣北得休因晚行澤中見車後有白狗仲文甚愛之欲取之忽變形如人狀似方相目赤如火差牙吐舌甚可憎惡仲文與仲文奴並擊之不勝而走未到家伏地俱死出捜神記崔惠童唐開元中髙都主壻崔惠童其家奴萬敵者性至暴忍於殺害主家牝犬名黄女失之數日適主召萬敵將有所使黄女忽於主前進退咋萬敵他人呵叱不能禁良久方退呼之則隱主家怪焉萬敵首云前數日實烹此狗不知何以至是初不信萬敵云見埋其首所在取以為信由是知其寃魂出廣異記李義唐李義者淮隂人也少亡其父養母甚孝雖泣筍卧氷未之過也及母卒義號泣至於殯絶者數四經月餘乃葬之及回至家見其母如生存家内起把義手泣而言曰我如今復生爾葬我之後潛自來爾不見我義喜躍不勝遂侍養如故仍謂義曰慎勿發所葬之柩若發之我即復死義從之後三年義夜夢其母號泣踵門而言曰我與爾為母寧無劬勞襁褓之恩况爾少失父我寡居育爾豈可我死之後三年殊不祭饗我累來及門即以一老犬守門不令我入我是爾母爾是我子上天豈不知爾若便不祭享必上訴於天言訖號泣而去義亦起逐之不及至曙憂疑愴然無以决其意所養老母乃言我子今日何顔色不樂於我必以我久不去世致爾色養有倦也義乃泣言實以我夜夢一不祥事於母難言幸勿見罪遂再猶豫數日復夢其母及門號呌撫膺而言曰李義爾是我子否何得如此不孝之極自葬我後畧不及我塜墓但侍養一犬然我終上訴於天爾當坐是獲譴我以母子情重故再告爾言訖又去義亦逐之不及至曙潜詣所塟之塜祝奠曰義是母之生是母之育方成人在世豈無母之恩也豈無子之情也至於母存日冬温夏凊昏定晨省色難之養未嘗敢怠也不幸違慈顔已有終天之痛茍存殘喘本欲奉祭祀也及塟母之日母又還家再生今侍養不缺且兩端不測之事剸裁無計遲迴終日何路明之近累夢母悲言相責即梦中之母是耶在家之母是耶從夢中母言又恐傷在家之母從在家之母言又慮夢中之事實哀哉此為子之難非不孝也上天察之言訖大哭再奠而回其在家母已知之矣迎義而謂之曰我與爾為母死而復生再與爾且同生路奈何忽然迷忘却於空塜前破其妖夢是知我復死也乃仆地而絶義終不測之哀號數日復謀塟之既開其塜是其亡母在是棺中驚走而歸其新亡之母乃化一極老黑犬躍出不知所之出大唐奇事胡志忠處州小將胡志忠奉使之越夜夢一物犬首人質告忠曰某不食歲餘聞公有㑹稽之役必當止吾館矣能减所食見沾乎忠夢中不諾明早遂行夜止山館館吏曰此㕔常有妖物或能為祟不得寢食請止東序忠曰吾正直可以御鬼怪勇力可以排奸邪何妖物之有促令進膳方下筯次有異物其狀甚偉當盤而立侍者懾退不敢傍顧志忠徹炙乃起而擊之異物連有傷痛之聲聲如犬語甚分明曰請止請止若不止未知誰死忠運臂愈疾異物又疾呼曰斑兒何在續有一物自屏外來閃然而進忠又擊之然冠隳𢃄解力若不勝僕夫無計能救乃以篲撲羅曵入於東閣顛仆之聲如壞墻然未久志忠冠𢃄儼然而出復就盤命膳卒無一言唯顧其閣時時咨嗟而已明旦將行封署其門囑館吏曰俟吾回駕而後啟之爾若潛開禍必及爾言訖遂行旬餘乃還止於館索筆硯泣題其户曰恃勇禍必嬰恃强勢必傾胡為萬金子而與惡物爭休將逝魄趨府庭止於此館歸冥冥題訖以筆擲地而失所在執筆者甚怖覺㣲風觸面而散吏具狀申刺史乃遣吏啓其户而志忠與斑黑二犬俱仆於西北隅矣出集異記韓生唐貞元中有大理評事韓生者僑居西河郡南有一馬甚豪駿嘗一日清晨忽委首於櫪汗而且喘若渉逺而殆者圉人怪之具白於韓生韓生怒曰若盜馬夜出使吾馬力殆誰之罪乃令朴焉圉人無以辭遂受朴至明日其馬又汗而喘圉人竊異之莫可測是夕圉人卧於廐舍闔扉乃於隙中窺之忽見韓生所畜黑犬至廄中且嘷且躍俄化為一丈夫衣冠盡黑既挾鞍致馬上駕而去行至門門垣甚髙其黑衣人以鞭擊馬躍而過黑衣者乘馬而去過來既下馬觧鞍其黑衣人又嘷躍還化為犬圉人驚異不敢洩於人後一夕黑犬又駕馬而去逮曉方歸圉人因尋馬蹤以天雨新霽歴歴可辨直至南十餘里一古墓前馬跡方絶圉人乃結茒齋於墓側來夕先止於齋中以伺之夜將分黑衣人果駕馬而來下馬繫於野𣗳其人入墓與數輩笑言極歡圉人在茅齋中俯而聽之不敢動近食頃黑衣人告去數輩送出墓穴於野有一褐衣者顧謂黑衣人曰韓氏名籍今安在黑衣人曰吾已收在擣練石下吾子無以為憂褐衣者曰愼母泄泄則吾屬不全矣黑衣人曰謹受教褐衣者曰韓氏稚兒有字乎曰未也吾伺有字即編於名籍不敢忘褐衣者曰明夕再來當得以笑語而黑衣人去及曉圉者歸遂以其事宻告於韓生生即命肉誘其犬犬既至因以繩系乃次所聞遂窮擣練石下果得一軸書具載韓氏兄弟妻子家僮名氏紀莫不具蓋所謂韓氏名籍也有子生一月矣獨此子不書所謂稚兒未字也韓生大異命致犬於庭鞭而殺之熟其肉以食家僮已而率鄰居士子千餘輩執􅋃矢兵仗至郡南古墓前發其墓墓中有數犬毛狀皆異盡殺之以歸出宣室志杜修己杜修己者越人也著醫術其妻即趙州富人薛贇之女也性淫逸修己家養一白犬甚愛之每與珍饌食後修己出其犬突入室内欲嚙修己妻薛氏仍似有奸私之心薛因怪而問之曰爾欲私我耶若然則勿嚙我犬即揺尾登其床薛氏懼而私焉其犬略不異於人爾後每修己出必奸淫無度忽一日方在室内同寢修己自外入見之曰欲殺犬犬走出修己怒出其妻薛氏歸薛贇後半年其犬忽突入薛贇家口銜薛氏髻而背負走出家人趂奔之不及不知所之犬負薛氏直入恒山内潛之每至夜即下山竊所食之物晝即守薛氏經一年薛氏有孕生一男雖形貎如人而遍身有白毛薛氏只於山中撫飬之又一年其犬忽死薛乃抱此子迤邐出入冀州乞食有知此事遂詣薛贇以告薛贇乃令家人取至家後其所生子年七歲形貎醜陋性復凶惡每私走出去作盗賊或旬餘或數月即復還薛贇患之欲殺焉薛氏乃泣戒其子曰爾是一白犬之子也幼時我不忍殺爾今日在薛家豈合更不謹若更私走出外為賊薛家人必殺爾恐爾以累我當改之其子大號哭而言曰我稟犬之氣而生也無人心好殺為賊自然耳何以我為過薛贇能容我即容之不能容我當與我一言何殺我也果不容我我其遁矣不復來薛氏堅留之不得乃謂曰去即可又何不時來一省我也我是爾之母爭忍永不相見其子又號哭而言曰後三年我復一來矣遂自㩦劎拜母而去及三年其子果領羣盜千餘人自稱白將軍既入拜母後令羣盗盡殺薛贇之家唯留其母仍焚其宅㩦母而去出瀟湘録袁繼謙少將袁繼謙郎中常說頃居青社假一第而處之素多凶怪昏曀即不敢出户庭合門警懼莫遂安寢忽一夕聞吼聲若有呼於甕中者聲至濁舉家怖懼謂其必怪之尤者遂如窗隙中窺之見一物蒼黑色來往庭中是夕月晦觀之既久似黄狗身而首不能舉遂以鐡􅀈擊其胸忽轟然一聲家犬驚呌而去蓋其日莊上輸油至犬以首入油器中不能出故也舉家大笑而安寢出玉堂閒話太平廣記巻四百三十八
