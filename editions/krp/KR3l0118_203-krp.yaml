body:
  text: 太平廣記卷二百三樂一舜白玉琯師延師曠師涓楚懐王咸陽宫銅人隋文帝唐太宗衛道弼曹紹䕫裵知古李嗣眞宋沇王仁裕李師誨琴璵璠樂劉道强趙后馬融楊秀李勉張𢎞靖董庭蘭蔡邕于頔韓臯王中散瑟盧邁阮咸樂一舜白玉琯舜之時西王母來獻白玉琯漢章帝時零陵文學奚景於冷道舜祠下得笙白玉琯知古以玉為琯後乃易之以竹為琯耳夫以玉作音故神人和鳳凰儀也出風俗通師延師延者殷之樂工也自庖皇以來其世遵此職至師延精述隂陽曉明象緯終莫測其為人世載遼絶而或出或隱在軒轅之世為司樂之官及乎殷時總修三皇五帝之樂撫一絃之琴則地祗皆升吹玉律則天神俱降當軒轅之時已年數百嵗聼衆國樂聲以審世代興亡之兆至夏末抱樂噐以奔殷而紂淫於聲色乃拘師延於隂宫之内欲極刑戮隂宫囚人之所師延既被囚縶奏清商流徵調角之音司獄者以聞於紂紂猶嫌曰此乃淳古遠樂非余可聼悦也猶不釋師延乃更奏迷魂淫魄之曲以歡修夜之娛乃得免炮烙之害聞周武王興師乃越濮流而逝或云其後死於水府故晉衛之人鐫石鑄金圖畫以象其形立祠不絶矣出王子年拾遺記師曠師曠者或云出於晉靈之世以主樂官妙辯音律撰兵書萬篇時人莫知其原裔出没難詳也晉平公時以隂陽之學顯於當世乃薰目為瞽以絶塞衆慮專心於星筭音律考鍾吕以定四時無毫釐之異春秋不記師曠出於何帝之時曠知命欲終乃述寶符百卷至戰國分爭其書滅絶矣晉平公使師曠奏清徵師曠曰清徵不如清角也公曰清角可得聞乎師曠曰君德薄不足聼之聼之將恐敗公曰寡人老矣所好者音願遂聼之師曠不得已而鼔一奏之有雲從西北方起再奏之大風至大雨隨之掣帷幕破爼豆墮廊瓦坐者散走平公恐懼伏於廊室晉國大旱赤地三年平公之身遂病出王子年拾遺記師涓師涓者出於衛靈公之世能寫列代之樂善造新曲以代古聲故有四時之樂春有離鴻去㕍應蘋之歌夏有明晨焦泉之華流金之調秋有商颷白雲落葉吹蓬之曲冬有凝河流隂沉雲之操此四時之聲奏於靈公公情湎心惑忘於政事蘧伯玉諫曰此雖以發揚氣律終為沉湎靡曼之音無合於風雅非下臣宜薦於君也靈公乃去新聲而親政務故衛人美其化焉師涓悔其違於雅頌失為臣之道乃退而隱迹伯玉焚其樂器於九逹之衢恐後世傳造焉其歌曲湮滅世代遼遠唯紀其篇目之大意也出王子年拾遺記楚懐王洞庭之山浮於水上其下金堂數百間帝女居之四時聞金石絲竹之音徹於山頂楚懐王之時與羣才賦詩於水湄故云瀟湘洞庭之樂聼者令人難老雖咸池簫韶不能比焉毎四仲之節王嘗繞山以遊宴各舉四仲之氣以為樂章惟仲春律中夾鐘乃作輕流水之詩宴於山南時中㽔賔乃作皓露秋霜之曲其後懐王好進姦雄羣賢逃越屈平以忠見斥隱於沅澧之間王廹逐不已乃赴清泠之淵楚人思慕之謂之水仙出王子年拾遺記咸陽宫銅人秦咸陽宫中有鑄銅十二枚坐髙皆三五尺列在一筵上琴筑竽笙各有所執皆組綬華采儼若生人筵下有銅管上口髙數尺其一管空内有繩大如指使一人吹空管一人紐繩則琴瑟竽筑皆作與眞樂不異出西京雜記隋文帝隋文帝開皇十四年於翟泉獲玉磬十四懸之於庭有二素衣神人來擊之其聲妙絶出洽聞記唐太宗唐太宗留心雅正勵精文教乃命太常卿祖孝孫正宮商起居郎呂才習音韻協律即張文收考律呂平其散濫為之折衷作降神樂為九功舞天下靡然向風矣初孝孫以梁陳舊樂雜用吳楚之音周齊舊樂多渉胡戎之伎於是斟酌南北考以古音而作大唐雅樂以十二律各順其月旋相為宫按禮記云大樂與天地同和詩序云太平之音安以樂其政和故制十二和之樂合三十曲八十四調祭圜丘以黄鐘為宮方澤以大呂為宮宗廟以太簇為宮五郊迎享則隨月用律為宮初隋但用黄鐘一宫唯扣七鐘餘五虗懸而不扣及孝孫造旋宫之法扣鐘皆遍無復虗懸矣時張文收善音律以蕭吉樂譜未甚詳悉取歴代沿革截竹為十二律吹之備盡旋宮之義太宗又召文收於太常令與孝孫參定雅樂太樂古鐘十二俗號啞鐘莫能通者文收吹律調之聲乃暢徹知音樂者咸服其妙授協律郎及孝孫卒文收始復採三禮更加釐革而樂教大備矣出譚賓録又潤州曾得玉磬十二以獻張率更扣其一曰晉某嵗所造也是嵗閏月造磬者法月數當有十三箇闕其一宜如黄鐘東九尺掘必得焉求之如言而得出國史纂異又貞觀中景雲見河水清張率更制為景雲河清歌名曰燕樂今元㑹第一奏是也出國史纂異又太宗之平劉武周河東士庻歌舞於道軍人相與作秦王破陣樂之曲後編樂府云闕又破陣樂被甲持㦸以象戰事慶善樂長袖曵屣以象文德鄭公見奏破陣樂則俯而不視慶善樂則翫之不厭出國史纂異衛道弼曹紹䕫樂工衛道弼天下莫能以聲欺者曹紹䕫與道弼偕為太樂合享北郊御史怒紹䕫欲以樂不和為罪雜叩鐘磬聲使䕫聞召之無誤者由是反歎伏洛陽有僧房中磬子夜輒自鳴僧以為怪懼而成疾求術士百方禁之終不能已䕫與僧善來問疾僧具以告俄擊齋鐘復作聲紹䕫笑曰明日可設盛饌當為除之僧雖不信紹䕫言冀其或效乃具饌以待之䕫食訖出懐中錯鑪磬數處而去其聲遂絶僧苦問其所以䕫云此聲與鐘律合擊彼此應僧大喜其疾亦愈出國史纂異裵知古裵知古奏樂謂元行冲曰金石諧和當有吉慶之事其在唐室子孫耳其月中宗即位出譚賓録又知古直太常路逢乘馬者聞其聲竊言曰此人即當墮馬好事者隨而觀之行未半坊馬驚殆死又嘗觀人迎婦聞婦珮玉聲曰此婦不利姑是日姑有疾竟亡善於攝生開元十二年年百嵗而卒出國史纂異李嗣眞唐朝承周隋離亂樂懸散失獨無徵音國姓所闕知者不敢言逹其事天后末御史大夫李嗣眞密求之不得一旦秋爽聞砧聲者在今弩營是當時英公宅又數年無由得之其後徐敬業反天后瀦其宫嗣真乃求得䘮車一鐔入振之於東南隅果有應者遂掘之得石一叚裁為四具補樂懸之闕後享宗廟郊天掛簨簴者乃嗣眞所得也出獨異志宋沇宋沇為太樂令知音近代無比太常久亡徵調沇考鍾律得之出國史補沇為太常丞嘗一日早於光宅佛寺待漏聞塔上風鐸聲傾聼久之朝廻復止寺舍問寺主僧曰上人塔鈴皆知所自乎曰不能知沇曰其間有一是古製某請一登塔循金索試歴扣以辨之可乎僧初難後許乃扣而辨焉在寺之人即言往往無風自揺洋洋有聞非此耶沇曰是耳必因祠祭考夲懸鐘而應之固求摘取而觀之曰此姑洗之編鐘耳請旦獨掇於僧庭歸太常令樂工與僧同臨之約其時彼知夲懸此果應遂購而獲焉又曾送客出通化門逢度支運乘駐馬俄頃忽草草揖客别乃隨乘行認一鈴言亦編鐘也他人但覺鎔鑄獨工不與衆者埓莫知其餘及配懸音形皆合其度異乎此亦識徵在金奏者與出羯鼓録王仁裕晉都洛下丙申年春翰林學士王仁裕夜直聞禁中蒲牢毎發聲如叩項腦之間其鐘忽撞作索索之聲有如破裂如是者旬餘毎與同職黙議罔知其何兆焉其年中春晉帝果幸於梁汴石渠金馬移在雪宫迄今十三年矣索索之兆信而有徵出玉堂閒話李師誨李師誨者畫畨馬李漸之孫也為劉從諫潞州從事知從諫不軌遂隱居黎城山潞州平朝廷嘉之就除縣宰曾於衲僧處得落星石一片僧云於蜀路早行見星墜於前遂掘之得一片石如斷磬其石端有雕刻狻猊之首亦如磬有孔穿絛處尚光滑豈天上奏樂噐毁而墜歟此石流轉到安邑李甫宅中出尚書故實琴璵璠樂秦咸陽宮有琴長六尺安十三絃二十六徽皆七寶飾之銘曰璵璠之樂出西京雜記劉道强齊人劉道强善彈琴能作單鳬寡鶴之弄聼者皆悲不能自攝出西京雜記趙后趙后有寶琴曰鳳凰皆以金玉隱起為龍鳳螭鸞古賢烈女之象亦善為歸風送遠之操焉出西京雜記馬融馬融歴二郡兩縣政務無為事從其約在武都七年南郡四年未嘗按論刑殺一人性好音樂善鼓琴吹笛毎氣出蜻蜊相和出商芸小説楊秀隋文帝子蜀王秀嘗造千面琴散在人間出尚書故實李勉唐汧公李勉好雅琴嘗取桐梓之精者雜綴為之百衲琴用蝸殻為徽其間三面尤絶異通謂之嚮泉韻磬絃一上可十年不斷出尚書故實又勉又取漆筩為之多至數百張求者與之有絶代者一名嚮泉一名韻磬自寶於家闕又京中又以樊氏路氏琴為第一路氏有房太尉石枕損處惜而不治蜀中雷氏斵琴常自品第上者以玉徽次者以寶徽又次者以金螺蚌徽闕張𢎞靖張相𢎞靖夜㑹名家觀鄭宥調二琴至切各置一榻動宫則宫應動角則角應稍不切乃不應宥師董庭蘭尤善況聲祝聲岀國史補董庭蘭嚮泉韻磬夲落樊澤司徒家後在珠崖宅又在張彦遠宅今不知流落何處彈琴近代稱賀若夷甘黨前有董庭蘭陳懐古懐能况祝二家聲謂大小胡笳也蕭古亦善琴云胡笳第四頭犯無射商遂用其音為蕭氏九弄出盧氏雜説蔡邕蔡邕在陳留其鄰人有以酒食召邕比徃而酒㑹已酣焉客有彈琴者邕至門潛聼之曰嘻以樂召我而有殺心何也遂返將命者告主人主人遽自追而問其故邕具以告琴者曰我向鼓絃見螗螂方向鳴蟬蟬將去螗螂為之一前一却吾心唯恐螗螂之失蟬也此豈為殺心而聲者乎邕歎曰此足以當之矣出漢書于頔于司空頔常令客彈琴其嫂知音聴於簾下歎曰三分之中一分箏聲二分琵琶聲無本色韻出國史補韓臯韓臯生知音律嘗觀彈琴至止息歎曰妙哉稽生之為是也其當晉魏之際其音主商商為秋聲秋也者天將揺落肅殺其嵗之晏乎又晉承金運之聲也此所以知魏之季而晉將代之也慢其商絃以宫同音是臣奪君之義也此所以知司馬氏之將簒也司馬懿受魏明帝顧托後反有簒奪之心自誅曹爽逆節彌露王陵都督揚州謀立楚王彪毌丘儉文欽諸葛誕前後相繼為揚州都督咸有匡復魏室之謀皆為懿父子所殺叔夜以揚州故廣陵之地彼四人者皆魏室文武大臣咸散敗於廣陵故名其曲為廣陵散言魏氏㪚亡自廣陵始也止息者晉雖暴興終止息於此也其哀憤戚慘痛廹切之音盡在於是永嘉之亂是其應乎叔夜撰此將貽後代之知音者且避晉禍所以託之鬼神也臯之於音可謂至矣出盧氏雜記王中散唐乾符之際黄巢盗據兩京長安士大夫避地北遊者多矣時有前翰林待詔王敬傲長安人能碁善琴風骨清峻初自蒲坂歴於并并帥鄭從讜以相國鎭汾晉傲謁之不見禮後又之鄴時羅紹威新立方撫士卒務在戰爭敬傲在鄴中數嵗時李山甫文筆雄健名著一方適於道觀中與敬傲相遇又有李處士亦善撫琴山甫謂二客曰幽蘭緑水可得聞乎敬傲即應命而奏之聲清韻古感心動神曲終敬傲澘然返𬒮云憶在咸通王庭秋夜供奉至尊之際不意流離於此也李處士亦為白鶴之操山甫援毫抒思以詩贈曰幽蘭綠水耿清音歎息先生枉用心世上幾時曾好古人前何必苦霑襟餘句未成山甫亦自黯然悲其未遇也王生因别彈一曲坐客彌加悚敬非尋常之品調山甫遂命酒停絃各引滿數杯俄而玉山俱倒洎酒醒山甫方從容問曰向來所操者何曲他處未之有也王生曰某家習正音奕世傳受自由德順以來待詔金門之下凡四世矣其常所操弄人衆共知唯嵇中散所受伶倫之曲人皆謂絶於洛陽東市而不知有傳者余得自先人名之曰廣陵散也山甫早疑其音韻殆似神工又見王生之説即知古之廣陵散或傳於世矣遂成四韻載於詩集今山甫集中只標李處士蓋寫錄之誤耳由是李公常目待詔為王中散也王生後又遊常山是時節帥王鎔年在㓜齡初秉戎鉞方延多士以廣令名時有李敻郎中莫又𤣥祕書蕭珦員外張道古並英儒才學之士咸自四集於文華館故待詔之琴碁亦見禮於賓榻嵗時供給莫不豐厚王或命揮絃動軫必大加錫遺焉在常山十數年甚承禮遇敬傲毎戴危冠着髙屐優遊嘯詠而已冬月亦葛巾單衣體無綿纊日醺酣於市人咸怪異之聞昭宗返正辭歸帝里後不知所終敬傲又能衣䄂中剪紙為蜂蝶舉袂令飛滿於四座或入人之襟袖以手攬之即復於故所也當時咸疑有神仙之術張道古與相善毎欽其道藝㑹著王逸人傳為此也道古名睍博學善古文讀書萬卷而不好為詩曾在張楚夢座上時久旱忽大雨衆賓皆喜而詠之道古最後方成絶句曰亢暘今已久喜雨自雲傾一㸃不斜去極多時下成坐客重其文學之名而哂其詩之拙也出耳目記瑟盧邁盧中丞邁有寳瑟四各直數十萬有寒玉石罄響泉和至之號出傳記阮咸元行冲賓客為太常少卿時有人於古墓中得銅物似琵琶而身正圓莫有識者元視之曰此阮咸所造樂也乃令匠人改以木為聲清雅今呼為阮咸者是也出國史纂異又晉書稱阮咸善彈琵琶後有發咸墓者得琵琶以瓦為之時人不識以為於咸墓中所得因名阮咸近有能者不少以琴合調夕夕同之出盧氏雜説大平廣記卷二百三
