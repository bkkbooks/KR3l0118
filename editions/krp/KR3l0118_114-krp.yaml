body:
  text: 太平廣記卷一百十四報應十三費崇先魏世子何曇遠陳秀遠葛濟之董青建齊竟陵王張逸釋僧䕶僧澄空釋慧偘釋道積釋法誠費崇先宋費崇先吳興人少信佛法精勤泰始三年受菩薩戒寄齋於謝慧遠家二十四日晝夜不懈每聽經常以鵲尾香爐置膝前初齋三夕見一人容服不凡逕來舉爐去崇先視膝前爐猶在方悟神異自惟衣裳新濯了無不淨惟坐側有唾壺既撤去壺即復見此人還爐於前未至席猶見二爐既至即合為一然則此神人所提者葢爐影耳崇先又嘗聞人說福遠寺有欽尼者精勤得道欣然願見未及得往屬意甚至常齋於他家中夜忽見一尼容儀端儼著赭布袈裟正立齋席之前食頃而滅崇先及見此尼狀貌被服即前夜所覩者也出法苑珠林魏世子宋魏世子梁郡人奉佛精進兒女尊修惟婦迷執不信女年十四病死七日而蘇云可安施高座并無量壽經世子即為具設經座女雖持齋戒未常看經今即昇座誦聲清利下啟父言兒死便往無量國見父兄及已三人池中已有芙蓉大花後當化生其中惟母獨無不勝此苦故歸啟報語竞復絶母於是敬信法教出㝠祥記何曇遠何曇遠廬江人父萬壽御史中丞曇遠奉法持菩薩戒年十八丁父艱哀毁成疾殆將滅性號踊之外歸心淨土庶祈感應時請僧數人曇遠向僧舍懴悔宿業終無感徴僧舍每加奬勵不令懈怠爾後因夜轉經竟衆僧已眠曇遠忽自歌誦僧舍驚而問之曇遠曰見佛身黄金色光熖丈餘幡花翼從充滿虚空佛自西至呼令速去曇遠素羸弱少力此夕壯厲悅懌便於合中取香著手中并以園花散空母曰汝今若去不念吾耶曇遠無所言而頓卧信宿家中聞此靈異亦皆欣肅不甚悲懼曇遠至五更忽然而終宅中芬馨數日出㝠祥記陳秀遠宋陳秀遠潁川人嘗為湘州西曹客居臨湘縣少信奉三寶年過耳順篤業不衰元徽二年七月中宴卧未寢歎念萬品死生流轉無定惟已將從何來一心祈念冀通感夢時夕結陰室無燈燭有頃見枕邊如螢火者明照流飛俄而一室盡明連空如晝秀遠遽興合掌喘息見庭中四五丈上有一橋閣危欄彩檻立於空中秀遠了不覺升之坐於橋側見橋上士女往還衣裝不異世人末有一嫗年可三十青襖白裳行至秀遠而立有頃又一婦人純衣白布徧環髻持香花前語秀遠曰汝前身即我也以此花供養佛故得轉身作汝復指青白嫗曰此即復是我前身也言殫而去後指者亦漸隱秀遠忽不覺還下之時光亦尋滅出㝠祥記葛濟之葛濟之句容人稚川之後妻同郡紀氏體貌閑雅有婦德濟之世事神仙紀亦慕而心樂佛法常存誠不替忽一旦方織俄覺雲日開朗空中清明因投梭仰望四表見西方有如來真形及寶葢幢幡映天心獨喜曰經說無量夀者即應此耶便頭面作禮乃引濟之亦登時見半身及諸幡葢俄而隱沒於是雲日鮮華五色燭耀鄉里備覩移時方歇焉出㝠祥記董青建齊董青建者不知何許人父字賢明建元初為越騎校尉初建母宋氏孕建時夢有人語云爾必生男體上當有青誌可名為青建及生如言即名焉有容止美言笑性理寛和家人未嘗覩其愠色見者咸異之至年十四而州辟主簿建元初皇儲鎮樊漢為水曹參軍二年七月十六日寢疾自云不振濟至十八日臨盡起坐謂母曰罪盡福至縁累永絶願母自愛不須憂念因失聲大哭聲盡而絶將殯葬喪齋前其夜靈語云生死道乖勿安齋前自當有造像道人來迎喪者明日果有道人來名曇順即依靈語向曇順說之曇順曰貧道住在南林寺造丈八像垂成賢子乃有此感應寺西有少空地可得安葬也遂葬寺邊三日其母將親表十許人墓東見建如生云願母割哀還去建今還在寺住母即止哭而還舉家菜食長齋至閏月十一日賢明夢見建云願父暫出東齋賢明便香湯自浴齋戒出東齋至十四夜於明中聞建喚聲驚起見建在齋前如生時父問汝住在何處建云從亡來住在練神宫中滿百日當得生忉利天建不忍見父母兄弟哭泣傷慟三七日禮諸佛菩薩請四天王故得暫還願父母從今已後勿復啼哭祭祠阿母已發願求見建不久當命終即共建同生一處父壽可得七十三命終後當三年受罪報勤苦行道可得免脫問曰汝從夜中來那得有光明建曰今與菩薩諸天同下此其身光耳又問曰汝天上識誰建曰見王車騎張吳興外祖宋西河建曰非但此一門中生從四十七年以來至七死七生已得四道果先發七願願生人間故厯生死從今永畢得離七苦建臨盡時見七處生死所以大哭者與七家分别也問云汝皆生誰家建曰生江吏川羊廣州張吳興王車騎蕭吳興梁給事董越騎等家惟此間生十七年餘處止三五年耳自今已後毒厲歳多宜勤修功德建見世人死多墮三塗生天者少勤精進可得免度發願生天亦得相見行脫差異無相值期又問云汝母憂憶汝垂死可令見汝否建曰不須相見益懷煎苦耳但依向言說之諸天已去不容久住慘有悲色忽然不見去後竹林左右猶有香氣家人亦並聞餘香焉建云所生七家江槩羊希張永王𤣥宋謨蕭惠明梁季文也賢明遂以出家名法藏出法苑珠林齊竟陵王齊竟陵王崇信内典得熱病夜中垂死夢見金像手灌神湯因遂平復出辯正論張逸張逸為事至死預造金像朝夕祈命臨刑刀折而項不傷官問故答曰惟以禮像為業其像項有二刀㾗如血因得免死出感應傳釋僧䕶高齊時有釋僧䕶守道直心不求慧業願造丈八石像咸怪其言後於寺北谷中見一卧石可長丈八乃顧匠營造向經一周面腹粗了而背著地以六具抝舉之始初不動經夜至旦忽然自翻即就營造移置佛堂晉州陷日像汗流地周兵入齊燒諸佛寺此像獨不變色又欲倒之大牛六十頭挽不動忽有異僧以瓦木土墼壘而圍之尋失僧所在像後降夢信心者曰吾患指痛其人寤而視焉乃木傷其二指也遂即補之開皇十年盜像幡葢者夢丈八人入室責之賊大怖悔而謝焉其像見在出法苑珠林僧澄空隋開皇中僧澄空年甫二十誓願於晉陽汾西鑄鐵像高七十尺焉鳩集金炭經求用度周二十年物力乃辦於是造報遐邇大集賢愚然後選日而寫像焉及煙焰滅息啟鑪之後其像無成澄空即深自咎責稽首懴悔復堅前約再謀鑄造精勤艱苦又三十年事費復備則又復寫像焉及啟鑄其像又復無成澄空於是呼天求哀叩頭請罪大加貶挫深自勤勵又二十年功力復集然後選日復寫像焉及期澄空乃身登鑪巔百尺懸絶揚聲謂觀者曰吾少發誓願鑄寫大佛今虚費積年如或踵前吾亦無面見大衆也吾今俟其啟鑪欲於金液而捨命焉一以謝愆於諸佛一以表誠於衆善儻大像圓滿後五十年吾當為建重閣耳時觀者萬衆號泣諫止而澄空殊不聽覽俄而金液注射赫耀踴躍澄空於是揮手辭謝投身如飛鳥而入焉及開鑪鐵像莊嚴端妙毫髪皆備自是并州之人因起閣以覆之而佛身洪大功用極廣自非殊力無由而致唐開元初李暠為太原軍節度使出游因仰像歎曰如此好相而為風日所侵痛哉即施錢百萬緡周歳之内而重閣成就至今北都謂之平等閣者是也計僧死像成日至暠正五十年矣以佛法推之則暠也得非澄空之後身歟出集異記釋慧偘隋蔣州大歸善寺釋慧偘曲阿人也靈通幽顯世莫識之而翹敬尊像事同真佛每見立像不敢輒坐勸人造像惟作坐者後往嶺南修禪法大有悟解住栖霞時嘗往揚都謁偲法師偲異禮接之將還山偲請現神力偘即從窻中出臂解齊熙寺佛殿上額因語偲云世人無遠識見多驚異故吾所不為耳大業元年終於大歸善寺初偘終日以三衣還衆僧吾今死去徒衆好住便還房内大衆驚起追之乃見房中白骨一具跏坐牀上就而撼之鏘然不散出法苑珠林釋道積唐蒲州普濟寺釋道積河東安邑縣人也博通經敎洞明𤣥㫖河東英俊莫與同風先是沙門寶澄於普濟寺創營大像百丈功願未終而卒耆艾請積繼之積受衆勤請廣行縁化槐檀十遷而大像成就道俗慶賴感徹人天初積受請之夕夢二獅子於大像側連吐明珠相續不絶既寤歎曰獸王自在則表法流無滯寶珠自涌又喻檀施不窮宜運潛符徴效斯在即命工匠圖所夢於彌勒大像前今猶存焉其寺在蒲坂之陽高爽華敞東臨州里南望河山像設三層岩廊四合上方下院赫奕相臨園磑田蔬周環俯就佛事隆盛咸積之功焉出法苑珠林釋法誠終南山悟真寺釋法誠雍州萬年縣人事沙門僧和為師和亦鄉族之所推奉嘗有人欲害和夜詣門見房内猛火騰焰升帳遂即追悔誠奉佩訓朂常誦法華翹心奉行朝夕無懈夢感普賢勸書大敎既悟即入淨行道重襯工匠令書八部般若香臺寶軸莊嚴成就又於寺南横嶺造華嚴堂鑿山堙壍列棟連甍前對重巒右臨斜谷吐納雲霧下瞰煙虹實竒觀也𢎞文館學士張孝靜者善於書翰誠乃請孝靜寫藏經齋潔勤拳大致感應靈禽異獸馴擾精廬貞觀十四年忽謂侍者曰諸行無常法縁有竭九品往生斯言驗矣吾今去世汝無憂惱言畢口光燭於楹奄然而化出高僧傳太平廣記卷一百十四
