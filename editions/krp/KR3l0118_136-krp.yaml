body:
  text: 太平廣記卷一百三十六徵應二唐𤣥宗叱金像天寳符蜀當歸萬里橋唐肅宗唐武宗唐宣宗迎光王唐懿宗唐僖宗李邰後唐太祖後唐明宗潞王晉高祖偽蜀主舅唐𤣥宗唐𤣥宗之在東宫為太平公主所忌朝夕伺察纎微必聞于上而宫闈左右亦潛持兩端以附太平之勢時元獻皇后方姙𤣥宗懼太平欲令服藥除之而無可以語者張説以侍讀得進見太子宫𤣥宗從容謀及説説亦密贊其事他日説又入侍因懐去胎藥三煮劑以獻𤣥宗得藥喜盡去左右獨搆火於殿中煮未熟怠而假寐肹蠁之際有神人長丈餘馬具飾身被金甲操戈繞藥鼎三匝煮盡覆無餘焉𤣥宗起視異之復增搆火又投一劑煮於鼎因就榻瞬息以伺之而神見復煮如初凡三煮皆覆之乃止則明日説又至告之説降階肅拜賀曰天所命也不可去之厥後元獻皇后思食酸𤣥宗亦以告説説毎因進講輒袖木𤓰以獻故開元中説恩澤莫與為比肅宗之於説子均垍若親戚昆弟云出栁氏史叱金像初唐有神像用金而製傳云周隋間有術士鎔範而成之天后朝因命置于宫中扄其殿宇甚嚴𤣥宗嘗幸其殿啓而觀焉時肅宗在中宫代宗尚稚俱侍上上問内臣力士曰此神像何所異亦有説乎力士曰此前代所制可以占王者在位之幾何年耳其法當厲聲而叱之茍年甚永則其像搖震亦久不然一撼即止上即嚴叱之其像若有懼搖震移時仆于地上喜笑曰誠如説我為天子幾何時力士因再拜賀上即命太子叱之其像微震又命皇孫叱之亦動揺久之上曰吾孫似我其後𤣥宗在位五十載肅宗在位凡六年代宗在位十九年盡契其占也出宣室志天寶符唐開元末于𢎞農古函谷關得寶符白石赤文正成乗字識者解之云乗者四十八所以示聖人御厯之數也及帝幸蜀之來歲正四十八年得寶之時天下歌之曰得寶耶𢎞農耶𢎞農耶得寶耶得寶之年遂改元為天寶出開天傳信記蜀當歸僧一行將卒遺物一封令弟子進於帝帝發視之乃蜀當歸也帝初不喻及幸蜀回乃知微㫖深歎異之出開天傳信記萬里橋𤣥宗幸東都偶然秋霽與一行師共登天宫寺閣臨眺久之上遐顧淒然發歎數四謂一行曰吾甲子得終無患乎一行進曰陛下行幸萬里聖祚無疆西狩初至成都前望大橋上舉鞭問左右是橋何名節度崔圓躍馬前進曰萬里橋上因追歎曰一行之言今果符之吾無憂矣出松窻録唐肅宗肅宗在東都為李林甫所搆勢幾危者數矣無何鬚髮斑白常早朝上見之愀然曰汝疾歸院吾當幸汝及上至顧見宫中庭宇不灑掃樂器屏幃塵埃積其間左右使令無有女妓上為動容顧謂力士曰太子居如此將軍盍使我聞乎上在禁中不知力士呼為將軍力士奏曰臣嘗欲上言太子不許云無以動上念上即詔力士下京兆尹亟選人家子女頎長潔白者五人將以賜太子力士趨去復還奏曰臣他日嘗宣㫖京兆閲致子女人間囂囂而朝廷好言事者得以為口實臣以為掖庭中故衣冠以事没入其家者宜可備選上大悦使力士詔掖庭令按籍閲視得三人乃以賜太子而章敬呉皇后在選中頃之后侍寢厭不寤吟呼若有痛氣不屬者肅宗呼之不解竊自計曰上賜我卒無狀不寤上安知非吾䕶視不謹耶遽秉燭視之良久乃寤肅宗問之后手掩其左脇曰妾向夢中有神人長丈餘介金甲而操劒顧謂妾曰帝命吾與汝為子自左脇劒決而入痛殆不可忍及今尚未之已也肅宗檢之于燭下則若有綖而赤者存焉遽以狀聞遂生代宗代宗之載生三日也上幸東宫賜之金盆命以浴呉皇后年弱皇孫龍體未舒負嫗惶惑乃以宫中諸王子同日誕而體貌豐碩者以進上視之不樂曰此兒非吾兒也負嫗叩頭具服上睨曰非爾所知取吾兒來於是以太子進見上大喜置諸掌内向日視之笑曰此兒福祿逺過其父上還宫盡畱内樂謂力士曰此一殿有三天子樂乎哉可與太子飲乎出栁氏史唐武宗唐㑹昌末年武宗忽改御名為火下火及宣宗以光王龍飛于古文光字實從光焉噫先兆之明若是耶出眞陵十七事唐宣宗唐宣宗在藩時常從駕回而誤墜馬人不之覺比二更方能興時天大雪四顧悄無人聲上寒甚㑹巡警者至大驚上曰我光王也不悟至此方困且渴若為我求水警者即于旁近得水以進遂委而去上良久起舉甌將飲顧甌中水盡為芳醪矣上喜獨自負舉一甌已而體微煖有力步歸藩邸後遂即皇帝位出眞陵十七事迎光王太子賓客盧眞有猶子曾為沙門㑹昌中沙汰歸俗廕𥙷為光王府參軍一日夢前師至其家而問訊焉盧則告卑官屑屑然非其願也常思落髮再披緇褐師曰汝誠有是志像教興復非晚也語未竟俄四面見日月旌斾千乘萬騎喧言迎光王即皇帝位未幾武帝崩光王果即皇帝位至是竟符其事焉出宣室志唐懿宗唐懿宗器度沈厚形貌瑰偉在藩邸時疾疹方甚而郭淑妃見黄龍出入於卧内上疾稍退妃具以狀告上曰無泄是言貴不相忘更嘗大雪盈尺而上寢室輒無分寸諸王見者無不異之大中末京城小兒疊布蘸水向日張之謂捩暈及上自鄆王即位捩暈之言應矣宣宗製泰邊陲曲撰其詞云海岳晏咸通上垂拱而號咸通上仁孝之道出于天性鄭太后厭代而蔬素悲毁同士人之禮公卿奉慰者無不動容出杜陽編唐僖宗唐丞相隴西公李蔚建大斾于廣陵日時咸通十二年也泗州狀言有女僧二人至普光寺將祈禮者睢盱顧視如病風狂云後二年國有變亂此寺大聖和尚當履寶位循廊喧呌聚人甚衆不跡其來釋徒大恐且欲拘縻之際則齊登峻塔投身而下其一不救其一墜傷狂痛昏迷詰問不獲丞相立命焚其狀仍牒州杖殺之至十四年果懿皇晏駕八月僖宗即位乃是普王出唐史李邰唐李邰為賀州刺史與妓人葉茂蓮江行因撰骰子選謂之葉子咸通以來天下尚之殊不知應本朝年祚正體書葉字卄世木子自武德至天祐恰二十世出感定録後唐太祖後唐太祖在姙十三月而生載誕之夕母后甚危令族人市藥于鴈門遇神人教以率部人被介持旄擊鉦皷躍馬大噪環所居三周而止果如所教而生是時虹光燭室白氣充庭井水暴溢及能言喜道軍旅年十二三善騎射曾於新城北酒酹于毗沙門天王塑像請與交談天王被甲持矛隱隱出于壁間所居帳内時有火聚或有龍形人皆異之嘗隨火征龎勛臨陣出没如神號為龍虎子出北夢瑣言後唐明宗後唐明宗皇帝微時隨蕃將李存信巡邊宿於鴈門逆旅逆旅媪方姙帝至不時具食腹中兒語謂母曰天子至速宜具食聲聞于外媪異之遽起親奉庖爨敬事尤謹帝以媪前倨後恭詰之曰公貴不可言也問其故具道娠子腹語事帝曰老嫗遜言懼吾辱耳後果如言出北夢瑣言潞王清泰之在岐陽也有馬步判官何某年逾八十忽暴卒云有使者拘録引出㝠間見隂君曰汝無他過今放汝還與吾言於潞王曰來年三月當帝天下可速返達吾之㫖言訖引出使者送歸及蘇遂以其事宻白王之左右咸以妖妄而莫之信由是不得聞于王月餘又暴卒入㝠復見隂君隂君怒而責之曰何故受吾教而竟不能達耶徐曰放汝去可速導吾言仍請王畫吾形及地藏菩薩像何惶恐而退見其庭院廊廡之下簿書雜亂吏胥交橫何問之使者曰此是朝代將變陞降去畱將來之官爵也及再活託以詞訟見王及見之且曰某有密事上白王因屏左右問之備述所見王未之信何曰某年踰八十死在旦夕豈敢虚妄也王黙遣之來春果下詔攻岐陽唯何叟獨喜知其必驗至期何叟之言毫髮無差矣清泰即位擢何叟為天興縣令固知㝠數前定人力豈能遏之乎出王氏見聞晉高祖清泰中晉高祖潛龍于并部也常一日從容謂賓佐云近因書寢忽夢若頃年在洛京時與天子連鑣于路過舊第天子請某入其第某遜讓者數四不得已即促轡而入至㕔事下馬升自阼階西向而坐天子已馳車去矣其夢如此羣僚莫敢有所答是年冬果有鼎革之事出玉堂閒話偽蜀主舅偽蜀主之舅累世富盛於興義門造宅宅内有二十餘院皆雕牆峻宇高臺深池竒花異卉叢桂小山山川珍物無所不有秦州董城村院有紅牡丹一株所植年代深逺使人取之掘土方丈盛以木櫃自秦州至成都三千餘里厯九折七盤望雲九井大小漫天隘狹懸險之路方致焉乃植於新第因請少主臨幸少主歎其基構華麗侔於宫室遂戲命筆於柱上大書一孟字時俗謂孟為不堪故也明年蜀破孟氏入成都據其第忽覩楹間有絳紗籠迫而視之乃一孟字孟曰吉祥也吾無易此居孟之有蜀蓋先兆也出王氏見閒太平廣記卷一百三十六
