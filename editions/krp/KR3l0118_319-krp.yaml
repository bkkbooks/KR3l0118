body:
  text: 太平廣記卷三百一十九宋李昉等編鬼四張子長桓道愍周臨賀胡茂迴阮瞻臨湘令顧氏江州錄事陳素胡章蘇韶夏侯愷劉也王戎王仲文張子長晉時武都太守李仲文在郡喪女年十八權假葬郡城北有張世之代爲郡世之男字子長年二十侍從在廨中夢一女年可十七八顔色不常自言前府君女不幸早亡㑹今當更生心相愛樂故来相見就如此五六夕忽然晝見衣服薫香殊絶遂爲夫妻寢息衣皆有汙如處女焉後仲文遣婢視女墓因過世之婦相問入廨中見此女一隻履在子長牀下取之啼泣呼言發冢持履歸以示仲文仲文驚愕遣問世之君兒何由得亡女履耶世之呼問兒具陳本末李張並謂可怪發棺視之女體已生肉顔姿如故惟右脚有履子長夢女曰我比得生今爲所發自爾之後遂死肉爛不得生矣萬恨之心當復何言泣涕而别出法苑珠林桓道愍晉桓道愍譙人也隆安四年喪婦内顧甚篤纏痛無已其年夜始寢視屏風復見一人手擎起秉燭照屏風外乃其婦也形貌粧飾具如生道愍了不畏懼遂引共臥言語往還陳敘存亡道愍曰卿亡来初無音影今夕那得忽還答曰欲還何極人神道殊各有司屬自由自任耳新婦生時差無餘罪止恒疑君憐愛婢使以此妬忌之心受報地獄始獲免脫今當受生爲人故来與君别也道愍曰當生何處可得尋之不答曰但知當生不測何處一爲世人無容復知宿命何由相尋求耶至曉辭去涕泗而别道愍送至步廊下而歸已而方大怖懼恍惚積時出法苑珠林周臨賀晉義興人姓周永和年中出郭乗馬從兩人行未至村日暮道邊有一新小草屋見一女子出門望年可十六七姿容端正衣服鮮潔見周過謂曰日已暮前村尚逺臨賀詎得至周便求寄宿此女爲然火作食向一更聞外有小兒喚阿香聲女應曰諾尋云官喚汝推雷車女乃辭行云今有事當去夜遂大雷雨向曉女還周既上馬看昨所宿處止見一新冢冢口有馬尿及餘草周甚驚惋至後五年果作臨賀太守出法苑珠林胡茂迴晉淮南胡茂迴能見鬼雖不喜見而不可止後行至揚州還歴陽城東有神祠正值民將巫祝祀之至須臾有羣鬼相叱曰上官来各奔走出祠去茂迴顧見二沙門来入祠中諸鬼兩兩三三相抱持在祠邊草中望見沙門皆有怖懼須臾沙門去後諸鬼皆還祠中茂迴於是精誠奉佛出法苑珠林阮瞻阮瞻素秉無鬼論有一鬼通姓名作客詣之寒温談諸名理客甚有才情末及鬼神事反覆甚苦客遂屈之仍作色曰鬼神古今聖賢所共傳君何獨言無即變爲異形須臾便滅阮嘿然意色大惡年餘病死出幽明錄臨湘令隆安初陳郡殷氏爲臨湘令縣中一鬼長三丈餘跂上屋猶垂脚至地殷入便来命之每揺屏風動窓户病轉甚其弟觀亦見恒拔刀在側與言争鬼語云勿罵我當打汝口破鬼忽隱形打口流血後遂口偏成殘廢人出幽明錄顧氏呉中人姓顧往田舍晝行去舎十餘里但聞西北隱隱因舉首見四五百人皆赤衣長二丈倐忽而至三重圍之顧氣奄奄不通輾轉不得旦至晡圍不解口不得語心呼北斗又食頃鬼相謂曰彼正心在神可捨去豁如霧除顧歸舎疲極臥其夕户前一處火甚盛而不燃鬼紛紜相就或往或来呼顧談或入去其被或上頭而輕於鴻毛開晨失出幽明錄江州錄事晉桓豹奴爲江州時有甘錄事者家在臨川郡治下兒年十三遇病死埋著家東羣冢之間旬日忽聞東路有打鼓倡樂聲可百許人徑到甘家問錄事在否故来相詣賢子亦在此止聞人聲亦不見其形也乃出數甖酒與之俄頃失去兩甖皆空始聞有鼓聲臨川太守謂是人戲必来詣已既而寂爾不到聞甘說之大驚出幽明錄陳素晉昇平元年剡縣陳素家富娶婦十年無兒夫欲娶妾婦禱祠神明忽然有身鄰家小人婦亦同有因貨鄰婦云我生若男天願也若是女汝是男者當交易之便共將許鄰人生男此婦後三日生女便交取之素忻喜養至十三當祠祀家有老婢素見鬼云見府君家先人来至門首便住但見一羣小人来座所食噉此祭父甚疑怪便迎見鬼人至祠時轉令看言語皆同素便入問婦婦懼且說言此事還男本家喚女歸出幽明錄胡章剡縣胡章與上虞管雙喜好干戈雙死後章夢見之躍刃戲其前覺甚不樂明日以符帖壁章欲近行已汎舟理檝忽見雙来攀留之云夫人相知情貫千載昨夜就卿戲值眠吾即去今何故以符相厭大丈夫不體天下之理我畏符乎出稽神錄蘇韶蘇韶字孝先安平人也仕至中牟令卒韶伯父承爲南中郎軍司而亡諸子迎喪還到襄城第九子節夜夢見鹵簿行列甚肅見韶使呼節曰卿犯鹵簿罪應髠刑節俛受剃驚覺摸頭即得斷髮明暮與人共寢夢見韶曰卿髠頭未竟即復剃如前夕其日暮自備甚謹明燈火設符刻復夢見韶髠之如前夕者五節素美髮五夜而盡間六七日不復夢見後節在車上晝日韶自外入乗馬著黒介幘黄練單衣白襪幽履憑節車轅節謂其兄弟曰中牟在此兄弟皆愕視無所見問韶君何由来韶曰吾欲改葬即求去曰吾當更来出門不見數日又来兄弟遂與韶坐節曰若必改葬别自敕兒韶曰吾將爲書節授筆韶不肯曰死者書與生者異爲節作其字像胡書也乃笑即喚節爲書曰古昔魏武侯浮於西河而下中流顧謂呉起曰美哉河山之固此魏國之寶也吾性愛好京洛每往来出入瞻視邙上樂哉萬世之墓也北背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心矣不圖奄忽所懐未果前志卜日便速改葬在軍司墓次買數畝地便足矣節與韶語徒見其口動亮氣髙聲終不爲旁人所聞延韶入室設坐祀之不肯坐又無所饗謂韶曰中牟平生好酒魚可少飲韶手執盃飲盡曰佳酒也節視盃空既去盃酒乃如故前後三十飲来兄弟狎翫節問所疑韶因言天上及地下事亦不能悉知也顔淵卜商今見在爲修文郎修文郎凡有八人鬼之聖者今項梁成賢者呉季子節問死何如生韶曰無異但死者虚生者實此其異也節曰死者何不歸屍體韶曰譬如斷卿一臂以投地就剝削之於卿有患不死之去屍骸如此也節曰厚葬以墳壟死者樂此不韶曰無在也節曰若無在何故改葬韶曰今我誠無所在但欲述生時意耳弟曰兒尚小嫂少門户坎軻君顧念不韶曰我無復情耳節曰有夀命不韶曰各有節曰節等夀命君知之不曰知語卿也節曰今年大疫病何韶曰劉孔才爲太山公欲反擅取人以爲徒衆北帝知孔才如此今已誅滅矣節曰前夢君剪髮君之鹵簿導誰也韶曰濟南王也卿當死吾念䕶卿故以刑論卿節曰能益生人不韶曰死者時自發意念生則吾所益卿也若此自無情而生人祭祀以求福無益也節曰前夢見君豈實相見不韶曰夫生者夢見亡者亡者見之也節曰生時仇怨復能害之不韶曰鬼重殺不得自從節下車韶大笑節短云似趙麟舒趙麟舒短小是韶婦兄弟也韶欲去節留之閉門下鎖鑰韶爲之少住韶去節見門故閉韶已去矣韶與節别曰吾今見爲修文郎守職不得来也節執手手軟弱捉覺之乃别自是遂絶出王隱晉書夏侯愷夏侯愷字萬仁病亡愷家宗人兒狗奴素見鬼見愷數歸欲取馬及其弟阮公將去阮逃狗奴家解喻及冬得止愷長子統向其家說昨夢人見縛與力大争爾乃得解語訖閤門忽有光明如晝見愷著平上幘單衣入坐如生平坐西壁大牀悲笑如生時聲訖便切齒作聲言人易我門户誣統藏人袒衫見縛賴我遣人救之得解將數十人大者在外小行隨愷阮牽牀離壁愷見語阮何取牀又說家無主不成居阮答何不娶妻愷曰卿與共居爾許年而作此語也諸鬼中當有一人達阮問誰愷曰兒輩意不足恱也呼見孫兒云少者氣弱勿令近我又說大女有相勿輒嫁之愷問阮欲見亡女可呼之阮曰女亡已久不願見也愷曰數欲見父而禁限未得見又說我本未應死尚有九年官記室缺總召十人不職書不中皆得出我書中遂逼留補缺出王隱晉書劉他劉他在夏口居忽有一鬼来住劉家初因闇髣髴見形如人著白布袴自爾後數日一来不復隱形便不去喜偷食不以爲患然且難之初不敢呵罵吉翼子者强梁不信鬼至劉家謂主人卿家鬼何在喚来今爲卿罵之即聞屋梁作聲時大有客共仰視便紛紜擲一物下正著翼子面視之乃主人家婦女䙝衣惡猶著焉衆共大笑爲樂吉大慙洗面而去有人語劉此鬼偷食乃食盡必有形之物可以毒藥中之劉即於他家煮野葛取二升汁密齎還向夜令作糜著於几上以盆覆之後聞鬼外来發盆取糜既吃擲破甌出去須臾聞在屋頭吐瞋怒非常便棒打窻户劉先已防備與鬭亦不敢入户至四更中然後遂絶出續搜神記王戎安豐侯王戎嘗赴人家殯歛主人治棺未竟者悉在㕔事上安豐車中臥忽見空中有一異物如鳥熟視轉大漸近見一乗赤馬車一人在中著幘赤衣手持一斧至地下車徑入王車中迴几容之謂王曰君神明清照物無隱情亦有身故来相從然當贈君一言凡人家殯歛葬送茍非至親不可急往良不獲已可乗青牛令髯奴御之及乗白馬則可禳之謂戎君當致位三公語良久主人内棺當殯衆客悉入此鬼亦入既入户鬼便持斧行棺牆上有一親趣棺欲與亡人訣鬼便以斧正打其額即倒地左右扶出鬼於棺上視戎而笑衆悉見鬼亦持斧而出出續搜神記王仲文王仲文爲河南郡主簿居緱氏縣北得休應歸道經水澤見後有一白狗仲文甚愛之欲便取忽變如人長六尺狀似方相目赤如火磋齒嚼舌甚有憎惡欲撃之或却或欲上車仲文大怖便使奴打不能奈何因下車佐奴共又打亦不禁並力盡不能復打於是捨走告人家合十餘人持刀捉火自来視之便不知所在月餘日仲文忽復見之與奴並走未到人家伏地俱死出續搜神記太平廣記卷三百一十九
