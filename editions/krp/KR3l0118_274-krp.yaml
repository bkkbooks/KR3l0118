body:
  text: 太平廣記卷二百七十四情感買粉兒崔護武延嗣開元製衣女韋臯歐陽詹薛宜僚戎昱買粉兒有人家甚富止有一男寵恣過常遊市見一女子美麗賣胡粉愛之無由自逹乃託買粉日徃市得粉便去初無所言積漸乆女深疑之明日復來問曰君買此粉將欲何施答曰意相愛樂不敢自逹然恒欲相見故假此以觀姿耳女悵然有感遂相許以私尅以明夕其夜安寢堂屋以俟女來薄暮果到男不勝其悦把臂曰宿願始伸於此歡踴遂死女惶懼不知所以因遯去明還粉店至食時父母怪男不起徃視已死矣當就殯斂發篋笥中見百餘裹胡粉大小堆積其母曰殺我兒者必此粉也入市遍買胡粉次此女比之手跡如先遂執問女曰何殺我兒女聞嗚咽具以實陳父母不信遂以訴官女曰妾豈復恡死乞一臨尸盡哀縣令許焉徑徃撫之慟哭曰不幸致此若死魂而靈復何恨哉男豁然更生具説情狀遂爲夫婦子孫繁茂出幽明録崔護博陵崔護姿質甚美而孤潔寡合舉進士第清明日獨遊都城南得居人莊一畝之宫花木叢萃寂若無人扣門乆之有女子自門隙窺之問曰誰耶護以姓字對曰尋春獨行酒渴求飲女入以盃水至開門設牀命坐獨倚小桃斜柯佇立而意屬殊厚妖姿媚態綽有餘妍崔以言挑之不對彼此目注者乆之崔辭去送至門如不勝情而入崔亦睠盼而歸爾後絶不復至及來歲清明日忽思之情不可抑徑徃尋之門院如故而已扄鎖之崔因題詩於左扉曰去年今日此門中人面桃花相暎紅人面不知何處去桃花依舊笑春風後數日偶至都城南復徃尋之聞其中有哭聲扣門問之有老父出曰君非崔護耶曰是也又哭曰君殺吾女崔驚怛莫知所答父曰吾女笄年知書未適人自去年已來常恍惚若有所失比日與之出及歸見在左扉有字讀之入門而病遂絶食數日而死吾老矣惟此一女所以不嫁者將求君子以託吾身今不幸而殞得非君殺之耶又持崔大哭崔亦感慟請入哭之尚儼然在牀崔舉其首枕其股哭而祝曰某在斯須臾開目半日復活老父大喜遂以女歸之出本事詩武延嗣唐武后載初中左司郎中喬知之有婢名窈娘藝色爲當時第一知之寵待爲之不婚武延嗣聞之求一見勢不可抑既見即留無復還理知之痛憤成疾因爲詩寫以縑素厚賂閽守以逹窈娘窈娘得詩悲咽結三章於裙𢃄赴井而死延嗣見詩遣酷吏誣陷知之破其家知之詩曰石家金谷重新聲明珠十斛買娉婷昔日可憐君自許此時歌舞得人情君家樓閣不曾難好將歌舞借人看富貴雄豪非分理驕奢勢力横相干别君去君終不忍徒勞掩袂傷鉛粉百年離别在高樓一代紅顔爲君盡出本事詩開元製衣女開元中頒邉軍纊衣製於宫中有兵士於短袍中得詩曰沙塲征戍客寒苦若爲眠戰袍經手作知落阿誰邉蓄意多添線含情更着綿今生已過也結取後身縁兵士以詩白於帥帥進之𤣥宗命以詩遍示六宫曰有作者勿隠吾不罪汝有一宫人自言萬死𤣥宗深憫之遂以嫁得詩人仍謂之曰我與汝結今身縁邉人皆感泣出本事詩韋臯唐西川節度使韋臯少遊江夏止於姜使君之館姜氏孺子曰荆寳已習二經雖兄呼於韋而恭事之禮如父也荆寳有小青衣曰玉簫年纔十歲常令祇侍韋兄玉簫亦懃於應奉後二載姜使入關求官家累不能行韋乃易居止頭陀寺荆寶亦時遣玉簫往彼應奉玉簫年稍長大因而有情時廉使陳常侍得韋季父書云姪臯久客貴州切望發遣歸覲廉使啟緘遺以舟楫服用仍恐淹留請不相見泊舟江瀨俾篙工促行韋昏瞑拭淚乃裁書以别荆寶寶頃刻與玉簫俱來既悲且喜寶命青衣往從侍之韋以違覲日久不敢俱行乃固辭之遂與言約少則五載多則七年取玉簫因留玉指環一枚并詩一首遺之既五年不至玉簫乃靜禱於鸚鵡洲又逾二年至八年春玉簫歎曰韋家郎君一别七年是不來矣遂絶食而殞姜氏憫其節操以玉環著於中指而同殯焉後韋鎮蜀到府三日詢鞫獄囚滌其寃濫輕重之繫近三百餘人其中一輩五器所拘偷視㕔事私語云僕射是當時韋兄也乃厲聲曰僕射僕射憶姜家荆寶否韋曰深憶之姜曰即某是也公曰犯何罪而重繫答曰某辭違之後尋以明經及第再選青城縣令家人誤爇廨舍庫牌印等韋曰家人之犯固非已尤即與雪寃仍歸墨綬乃奏眉州牧敕下未令赴任遣人監守朱紱其榮且留賔幕時屬大軍之後草創事繁凡經數月方問玉簫何在姜曰僕射維舟之夕與伊留約七載是期既逾時不至乃絶食而終因吟留贈玉環詩云黄雀銜來已數春别時留解贈佳人長江不見魚書至爲遣相思夢入秦韋聞之益増悽歎廣修經像以報夙心且想念之懐無由再會時有祖山人者有少翁之術能令逝者相親但令府公齋戒七日清夜玉簫乃至謝曰承僕射寫經造像之力旬日便當托生却後十三年再爲侍妾以謝鴻恩臨去微笑曰丈夫薄情令人死生隔矣後韋以隴右之功終德宗之代理蜀不替是故年深累遷中書令天下響附瀘僰歸心因作生日節鎭所賀皆貢珍竒獨東川盧八座送一歌姬未當破𤓰之年亦以玉簫爲號觀之乃眞姜氏之玉簫也而中指有肉環隠出不異留别之玉環也韋歎曰吾乃知存殁之分一徃一來玉簫之言斯可驗矣出雲谿友議歐陽詹歐陽詹字行周泉州晉江人弱冠能屬文天縱浩汗貞元年登進士第畢關試薄遊太原於樂籍中因有所悦情甚相得及歸乃與之盟曰至都當相迎耳即灑泣而别仍贈之詩曰驅馬漸覺遠廻頭長路塵高城已不見况復城中人去意既未甘居情諒多辛五原東北晉千里西南秦一屨不出門一車無停輪流萍與繫瓠早晚期相親尋除國子四門助教住京籍中者思之不已經年得疾且甚乃危粧引髻刃而匣之顧謂女弟曰吾其死矣茍歐陽生使至可以是爲信又遺之詩曰自從别後減容光半是思郎半恨郎欲識舊時雲髻樣爲奴開取縷金箱絶筆而逝及詹使至女弟如言徑持歸京具白其事詹啓函閲之又見其詩一慟而卒故孟簡賦詩序曰閩越之英惟歐陽生詩哭之以能文擢第爰始一命食太學之禄助成均之教有庸績矣我唐貞元年己卯歲曾獻書相府論大事風韻清雅詞旨切直會東方軍興府縣未暇慰薦乆之倦遊太原還來帝京卒官靈臺悲夫生於單貧以狥名故心專勤儉不識聲色及兹筮仕未知洞房纎腰之爲蠱惑初抵太原居大將軍宴席上有妓北方之尤者屢目於生生感悦之留賞累月以爲燕婉之樂盡在是矣既而南轅妓請同行生曰十目所視不可不畏辭焉請待至都而來迎許之乃去生竟以蹇連不克如約過期命甲遣乘密徃迎妓妓因積望成疾不可爲也先死之夕剪其雲髻謂侍兒曰所歡應訪我當以髻爲貺甲至得之以乘空歸授髻於生生爲之慟怨渉旬而生亦殁則韓退之作何蕃書所謂歐陽詹生者也河南穆元道訪予常歎息其事嗚呼鍾愛於男女素其效死夫亦不蔽也大凡以斷割不爲麗色所汨豈若是乎古樂府詩有華山畿玉臺新詠有廬江小吏更相死或𩔖於此暇日偶作詩以繼之云有客非北逐驅馬次太原太原有佳人神艶照行雲座上轉横波流光注夫君夫君意蕩漾即日相交歡定情非一詞結念誓青山生死不變易中誠無間言此爲太學徒彼屬北府官中夜欲相從嚴城限軍門白日欲同居君畏仁人聞忽如隴頭水坐作東西分驚離腸千結滴淚眼雙昏本逹京師廻駕期相追攀宿約始乖阻彼憂己纒綿高髻若黄鸝危鬢如玉蟬纎手自整理剪刀斷其根柔情託侍兒爲我遺所歡所歡使者來侍兒因復前收淚取遺寄深誠祈爲傳封來贈君子願言慰窮泉使者廻復命遲遲蓄悲酸詹生喜言旋倒屨走迎門長跪聽未畢驚傷涕漣漣不飲亦不食哀心百千端襟情一夕空清爽旦日殘哀哉浩然氣潰散歸化元短生雖别離長夜無阻難雙魂終㑹合兩劒遂蜿蜒丈夫早通脱巧笑安能干防身本苦節一去何由還後生莫沈迷沈迷䘮其眞出閩川名士傳薛宜僚薛宜僚會昌中爲左庶子充新羅册贈使由青州泛海船頻阻惡風雨至登舟却漂廻泊青州郵傳一年節使烏漢真尤加待遇籍中飲妓叚東美者薛頗屬情連帥置於驛中是春薛發日祖筵嗚咽流涕東美亦然乃於席上留詩曰阿母桃花方似錦王孫草色正如烟不須更向滄溟望惆悵歡情恰一年薛到外國未行册禮旌節曉夕有聲旋染疾謂判官苖甲曰東美何故頻見夢中乎數日而卒苖攝大使行禮薛旋櫬廻及青州東美乃請告至驛素服執奠哀號撫柩一慟而卒情縁相感頗爲竒事出杼情集戎昱韓晉公滉鎭浙西戎昱爲部内刺史郡有酒妓善歌色亦閑妙昱情屬甚厚浙西樂將聞其能白滉召置籍中昱不敢留俄於湖上爲歌詞以贈之且曰至彼令歌必首唱是詞既至韓爲開筵自持盃令歌送之遂唱戎詞曲既終韓問曰戎使君於汝寄情耶妓悚然起立曰然淚下隨言韓令更衣待命席上爲之憂危韓召樂將責曰戎使君名士留情郡妓何故不知而召置之成余之過乃十笞之命妓與百縑即時歸之其詞曰好去春風湖上亭柳條藤蔓繫人情黄鶯乆住渾相戀欲别頻啼四五聲出本事詩太平廣記卷二百七十四
