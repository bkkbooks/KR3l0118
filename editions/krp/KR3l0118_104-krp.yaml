body:
  text: 太平廣記卷一百四報應三于昶裴宣禮吴思𤣥銀山老人崔文簡姚待吕文展長安縣繫囚李虚盧氏陳利賔王宏田氏于昶唐于昶天后朝任并州録事叅軍每至一更後即喘息流汗二更後愈妻栁氏將召醫工昶密曰自無他苦但晝决曹務夜判冥司事力不任耳每知有災咎即隂為之備都不形言凡六年後丁母艱持金剛經更不復為冥吏曰極言此功徳力令子孫諷轉後為慶州司馬年八十四將終忽聞異香非代所有謂左右曰有聖人迎我往西方言訖而没出報應記裴宣禮唐裴宣禮天后朝為地官侍郎常持金剛經坐事被繫宣禮憂迫唯至心念經枷鏁一旦自脫推官親訪之遂得雪免御史任植同禁亦念經獲免出報應記吴思𤣥唐吴思𤣥天后朝為太學博士信釋氏持金剛經日兩遍多有靈應後稍怠日夜一遍思𤣥在京病有巫褚細兒言事如神星下祈禱思𤣥往就見細兒驚曰公有何術鬼見皆走思𤣥私負知是經力倍加精勵日念五遍兄疾醫無效思𤣥至心念經三日而愈思𤣥曽於渭橋見一老人年八十餘著麄縗服問之曰為所生母也思𤣥怪之答曰母年四十三時有異僧教云汝欲長夀否但念金剛經母即發心日念兩遍終一百七姨及鄰母誦之並過百嵗今遵母業已九十矣出報應記銀山老人饒州銀山採戸逾萬並是草屋延和中火發萬室皆盡唯一家居中火獨不及時本州楊體幾自問老人老人對曰家事佛持金剛經出報應記崔文簡唐崔文簡先天中任坊州司馬屬吐蕃奄至州城同被驅掠鏁械甚嚴至心念經三日鏁忽自開虜疑有奸箠撻具以實對問云汝有何術答云念金剛經復令鏁之念未終又解衆皆嘆異遂送出境出報應記姚待唐姚待梓州人常持金剛經并為母造一百部忽有鹿馴戲見人不驚犬亦不吠逡巡自去有人宰羊呼待同食食了即死使者引去見一城門上有額遂令入見王王呼何得食肉待云雖則食肉比元持經王稱善曰既能持經何不斷肉遂得生為母冩經有屠兒李廻奴請一卷焚香供養迴奴死後有人見於冥間枷鏁自脫亦生善道出報應記吕文展唐吕文展開元三年任閬中縣丞雅好佛經尤專心持誦金剛經至三萬餘遍靈應竒異年既衰暮三牙并落念經懇請牙生如舊在閬中時屬亢旱刺史劉浚令祈雨僅得一遍遂獲沛然又苦霖潦别駕使祈晴應時便霽前後證驗非一不能徧舉出報應記長安縣繫囚唐長安縣死囚入獄後四十餘日誦金剛經不輟口臨決脫枷枷頭放光長數十丈照耀一縣縣令奏聞𤣥宗遂釋其罪出廣異記李虛唐開元十五年有敕天下村坊佛堂小者並拆除功徳移入側近佛寺堂大者皆令閉封天下不信之徒並望風毁拆雖大屋大像亦殘毁之敕到豫州新息令李虛嗜酒倔強行事違戾方醉而州符至仍限三日報虛見大怒便約胥正界内毁拆者死於是一界並全虚為人好殺愎戾行必違道當時非惜佛宇也但以忿恨故全之全之亦不以介意嵗餘虚病數日死時正暑月隔宿即歛明日將殯母與子繞棺哭之夜乆哭止聞棺中若指爪戞棺聲初疑鼠未之悟也斯須増甚妻子驚走母獨不去命開棺左右曰暑月恐壊母怒促開之而虚生矣身頗瘡爛於是浴而將養之月餘平復虚曰初為兩卒拘至王前王不在見階前典吏乃新息吏也亡經年矣見虚拜問曰長官何得來虚曰適被録而至吏曰長官平生唯以殺害為心不知罪福今當受報將若之何虚聞懼請救之吏曰去嵗拆佛堂長官界内獨全此功德彌大長官雖死亦不合此間追攝少間王問更勿多言但以此對虚方憶之頃王坐主者引虚見王王曰索李明府善惡簿來即有人持一通案至大合抱有二青衣童子亦隨文案王命啓牘唱罪階吏讀曰專好割羊脚吏曰合杖一百仍割其身肉百斤王曰可令割其肉虚曰去嵗有敕拆佛堂毁佛像虚界内獨存之此功徳可折罪否王驚曰審有此否吏曰無新息吏進曰有福簿在天堂可檢之王曰促檢殿前垣南有樓數間吏登樓檢之未至有二僧來至殿前王問師何所有一答曰常誦金剛經一曰常讀金剛經王起合掌曰請法師登階王座之後有二高座右金左銀王請誦者坐金座讀者坐銀座坐訖開經王合掌聽之誦讀將畢忽有五色雲至金座前紫雲至銀座前二僧乗雲飛去空中遂滅王謂階下人曰見二僧乎皆生天矣於是吏檢善簿至唯一紙因讀曰去嵗敕拆佛堂新息一縣獨全合折一生中罪延年三十仍生善道言畢罪簿軸中火出焚燒之盡王曰放李明府歸仍敕兩吏送出城南門見夾道並高樓大屋男女雜坐樂飲笙歌虚好絲竹見而恱之兩吏謂曰急過此無顧顧當有損虚見飲處意不能忍行佇立觀之店中人呼曰來吏曰此非善處既不相取信可任去虚未悟至飲處人皆起就坐奏絲竹酒至虚酧酢畢將飲之乃一杯糞汁也臭穢特甚虚不肯飲即有牛頭獄卒出於牀下以叉刺之洞胸虚遽連飲數杯乃出吏引虚南入荒田小徑中遙見一燈炯然燈旁有大坑昏黒不見底二吏推墮之遂蘇李虚素性兇頑不知罪福而被酒違戾以全佛堂明非已之本心也然猶身得生天火焚罪簿獲福若此非為善之報乎與夫日夜精勤孜孜為善既持僧律常行佛言而不離生死未之有也出紀聞盧氏唐開元中有盧氏者寄住􅉸州晝日閒坐㕔事見二黄衫人入門盧問為誰答曰是里正奉帖追公盧甚愕然問何故相追因求帖觀見封上作衛縣字遂開文字錯謬不復似人書怪而詰焉吏言奉命相追不知何故俄見馬已備在堦下不得已上馬去顧見其屍坐在牀上心甚惡之倉卒之際不知是死又見馬出不由門皆行墻上乃驚愕下泣方知必死恨不得與母妹等别行可數十里至一城城甚壯麗問此何城吏言乃王國即追君所司入城後吏欲將盧見王經一院過問此何院吏曰是御史大夫院因問院大夫何姓名云姓李名某盧驚喜白吏曰此我表兄令吏通刺須臾便出相見甚喜具言平昔延入坐語大夫謂曰弟之念誦功徳甚多良由金剛經是聖教之骨髓乃深不可思議功徳者也盧初入院中見數十人皆是衣冠其後大半繫在網中或無衣或露頂盧問此悉何人云是陽地衣冠網中悉縁罪重弟若能為一說法見之者悉得昇天遂命取高座令盧昇坐誦金剛般若波羅蜜經網中人已有出頭者至半之後皆出地上或褒衣大袖或乗車御雲誦既終往生都盡及入謁見王呼為法師致敬甚厚王云君大不可思議筭又不盡歎念誦之功尋令向吏送之廻既至舍見家人披頭哭泣尸臥地上心甚惻然俄有一婢從庭前入堂吏令隨上堦及前魂神忽已入體因此遂活出廣異記陳利賔陳利賔者㑹稽人弱冠明經擢第善屬文詩尤為時重釋褐長城尉少誦金剛經每至厄難多獲其助開元中賔自㑹稽江行之東陽㑹天乆雨江水瀰漫賔與其徒二十餘船同發乘風掛㠶須臾天色昩暗風勢益壯至界石竇上水決閼衆流而下波濤衝擊勢不得泊其前輩二十餘舟皆至竇口而敗舟人懼利賔忙遽誦金剛經至潨流所忽有一物狀如赤龍横出扶舟因得上議者為誦經之功出廣異記王宏王宏者少以漁獵為事唐天寶中嘗放鷹逐兎走入穴宏隨探之得金剛般若經一卷自此遂不獵云出廣異記田氏易州叅軍田氏性好畋獵恒養鷹犬為事唐天寶初易州放鷹於叢林棘上見一卷書取視之乃金剛經也自爾發心持誦數年已誦二千餘遍然畋獵亦不輟後遇疾暴卒數日被追至地府見諸鳥獸周迴數畝從已徵命頃之隨到見王問罪何多也田無以對王令所由領往推問其徒十人至吏局吏令啓口以一丸藥擲口中便成烈火遍身須臾灰滅俄復成人如是六七輩至田氏累三丸而不見火狀吏乃怪之復引見王具以實白王問在生作何福業田氏云初以畋獵為事王重問云在生之時於易州棘上得金剛經持誦已二千餘遍王云正此滅一切罪命左右檢田氏福簿還白如言王自令田氏誦經纔三紙迴視庭中禽獸並不復見誦畢王稱美之云誦二千遍延十五年夀遂得放還出廣異記太平廣記卷一百四
