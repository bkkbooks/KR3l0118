body:
  text: 太平廣記卷三百六十六宋李昉等編妖怪八杜元頴朱道士鄭生趙士宗曹朗秄兒李約張縝馬舉韋琛張謀孫李黄宋洵張氏子僧十朋宜春人朱從本周本王宗信薛老峰歐陽璨杜元頴杜元頴鎮蜀平資州方丈大石走行盤礴數畝新都縣大道觀老君旁泥人鬚生數寸拔之俄頃又出都下諸處有栗樹樹葉結實食之味如李鹿頭寺泉水湧出及猫䑕相乳之妖蠻欲圍城城西門水有人見一龍與水牛鬬俄頃皆滅又説李樹上皆得木𤓰而空中不實出戎幕閒談朱道士朱道士者大和八年嘗遊廬山憩於澗石忽見蟠虵如堆繒錦俄變為巨龜訪之山叟云是𤣥武朱道士又曾遊青城山丈人觀至龍橋見巖下有枯骨背石平坐接手膝上鉤鏁附苔絡蔓色白如雪云祖父已常見出酉陽雜俎鄭生俗𫝊人之死凡數日當有禽自柩中而出者曰殺大和中有鄭生者常於隰川與郡官略於野有網得一巨鳥色蒼高五尺餘主將命解而視之忽無所見生驚即訪里中民訊之民有對者曰里中有人死且數日卜人言今日殺當去其家伺而視之有巨鳥色蒼自柩中出君之所獲果是乎天寶中京兆尹崔光逺因遊略常遇一妖鳥事與此同也出宣室志趙士宗會昌元年戎州水漲浮木塞江刺史趙士宗召水軍接木段公署卑小地窄不復用因併修開元寺後月餘日有夷人逢一人如猴著故青衣亦不辨何製云闗將軍遣來採木被此州接去不知為計要須明年却來收夷人說於州人至二年七月天欲曙忽暴水至州城臨江枕山毎大水猶去州五十餘丈其時水高百丈漂二十餘人州基地有陷十丈處大石如三間屋者積堆於州基水黒而腥至晚方退知州官虞藏玘及吏纔及船投岸旬月後州水方乾除大石外更無一物唯開元寺𤣥宗真容去舊處十餘步卓立沙上其他鐵石一無有者出酉陽雜俎曹朗進士曹朗文宗時任松江華亭令秩將滿於吳郡置一宅又買小青衣名曰花紅云其價八萬貌甚美其家皆憐之至秋受代令朗將其家人入吳郡宅後逼冬至朗緣新堂修理未畢堂内西間貯炭二百斤東間窻下有一榻新設茵席其上有修車細蘆廢十領東行南厦西廊之北一房充庫一房即花紅及乳母一間充廚至除前一日朗姊妹及親皆辦奠祝之用鐺中乃煎三升許油旁堆炭火十餘斤妹作餅家人並在左右獨花紅不至朗親意其惰寢遂召之至又無所執作朗怒笞之便云頭痛忽有大塼飛下幾中朗親俄又一大塼擊油鐺於是驚散厨中食器亂在階下日已晚俱入西舍遂移入堂並將小兒及扃堂門子母相依而坐汗流如水不諭其怪朗取炭數斤燃火俄又空中轟榻之聲火又空中上下忽見東窻下牀上有一女子可年十四五作兩髻衣短黄襦袴跪於牀以効人碾茶朗走起擒之遶屋不及逡巡匿蘆䕠積中朗又踏之啾然有聲遂失所在坐以至旦鷄鳴方敢開門乳母花紅熟寢于西室朗召玉芝觀顧道士作法數日有人長吁曰吾是梁苑客枚皋前因節日求食於此君家不知云何見捕朗具茶酒引之與求皋近文曰吾元和初逰上元瓦棺閣第二層西隅壁上題詩一首朗苦請皋曰方心事無悰幸相悉他日到金陵可自錄之足下之祟非吾所為其人不逺但問他人當自知朗遂白顧道士捨之里中有女巫朱二娘又召令占巫悉召家人出唯花紅頭痛未起巫強呼之出責曰何故如此娘子不知汝何不言遂拽其臂近肘有青脈寸餘隆起曰賢聖宅於此夫人何故驚之化紅拜唯稱不由已朗懼減價賣之歴二家皆如此遂放之無所容身常於諸寺紉針以食後有包山道士申屠千齡過說花紅本是洞庭山人户共買人家一女令守洞庭山廟後為洞庭觀拓北境二百餘步其廟遂除人户賣與曹時用廟中山魅無所依遂與其𩔖巢於其臂東吳人盡知其事出乾􅍧子秄兒彭城劉刺夫會昌中進士上第大中年授鄠縣尉卒妻王氏歸其家居洛陽敦化里第禮堂之後院咸通丁亥歳夜聚諸子姪藏鉤食煎餅厨在西廂小童秄兒持器下食時月晦雲慘指掌莫分秄兒者忽失聲仆地而絶秉炬視之則體冷靣黑口鼻流血矣擢髮灸指少頃而蘇復令數夫束縕火循廊之北於倉後得所持器倉西則大廁廁上得一煎餅溷中復有一餅焉出三水小牘李約咸通丁亥歳隴西李夷遇為邠州從事有僕曰李約乃夷遇登第時所使也愿捷善行故常令郵書入京其年秋七月李約自京還邠早行數坊皷始絶倦憩古槐下時月暎林杪餘光尚明有一父皤然傴而曵杖亦來同止既坐而呻吟不絶良久謂約曰老夫欲至咸陽而蹣跚不能良行若有義心能負我乎約怒不應父請之不已約乃謂曰可登背父欣然而登約知其鬼怪也陰以所得哥舒棒自後束之而趨時及開逺門東方明矣父數請下約謂曰何相侮而見登何相憚而欲舍束之愈急父言語無次求哀請命約不答忽覺背輕有物墜地視之乃敗柩板也父已化去擲於里垣下後亦無咎出三水小牘張縝處士張縝多能善琴其妻早亡於江陵納妾甚麗未旬日主庖小青衣於竈下得一銅人長可一寸色如火須臾漸大長丈餘形狀極異走入縝室取其妾食之毛髮皆盡食訖漸小復如舊形入竈下而失出聞竒錄馬舉馬舉常為山南步奏官間道入蜀時兵後僻路絶無人烟夜至一館聞東廊下有人語聲因往告之有應者云中堂有牀自往宿去舉至中堂唯有土榻求火答云無火求席隔屋擲出一席可重十餘斤舉亦壯士殊不介意中夜有一物如猴升榻而來舉以鐵椎急擊之呌呼而走及明告别其人怒去更云夜來見伊獨處令兒子往伴打得幾死舉推其門不可開自隙窺之積壤而已舉後為太原大將官至淮南節度使岀稽神錄韋琛昭義從事韋琛幼年時尚在學院冬節夜捧書以歸及寢堂絶無人獨廚中有搆火烹油之聲因窺之則鐺長數尺而久復低如是者三四琛大恐奔出于門方見其家悉於外寢營享奠之事矣琛神色慘慄且告之故家人咸叱之以為稚子妄語也俄頃廚中有主庖青衣就鐺作食仍暎小兒於懷抱間兒踴身索哺因誤墜鐺中沸油湧溢青衣大呌火已及屋長幼奔救或沃以水焰則轉熾蓋膏水相激也乃雜擲甖盎茵毯之𩔖久之方滅火滅兒已燋矣闔室驚怖為之罷節青衣亦以此發悸而死出唐闕史張謀孫廣州副使張謀孫雖出於闒茸有口辯善心計累為王府參佐咸通初從交廣辟遂為元寮性貪侈聚斂不倦南海多竒貨若犀象珠貝之𩔖不可勝計及府罷北歸止于汝墳於郡西三十里鬱陽驛南汝水之上搆别業窮極華敞堂鑿一池欲北引官渠水漲之或曰此處今年太歳所在也謀孫誡役夫曰掘得太歳則止明日及泉獲一土囊破之中有物升餘色白如粟粒忽跳躍四散而𨼆謀孫遂中暴病信宿而死出集異記李黄渠州刺史李黄夏日憩於小㕔見䑕穴中有一人長數寸執篲掃穴前而入有二人亦長三二寸舁一鑊添水爨薪須臾鑊前有一夜乂執鐵扠叉一人披紫袍執象笏長三二寸形色狀貌乃李也黄雖懼而不敢驚之乃咄黄脫衣入鑊中須臾而出黄衣服而入穴中又見一婦人出火中乃黄之孀婦寓岳州久矣主鑊者扠黄娣入鑊中須臾又出娣服衣亦入穴中主鑊者亦入又二人舁鑊入而擁篲者又掃去其灰燼數日如此黄大憂遣訪其娣亦無恙數年方卒黄十餘年方卒出聞竒錄宋洵進士宋洵下第南歸兄波為金州石泉令洵以縣邑喧雜於縣東數里葺一山居未畢役者聞山石中有婦人語云宋三郎來矣及洵居之因月夜於書堂側屣步又自聞石中云宋三郎來矣駐步聽之石門忽開見婦人數輩再拜笑曰請三郎入來洵欲走為數輩所擒入其室石門遂閉僕夫急告波穿石求之終不能得出聞竒錄張氏子唐文德中京官張忘其名寓蘇臺子弟少年時往友人陸評事院往來為一美人所悅來往多時心疑之尋病瘠遇開元觀道士吳守元云有不祥之氣授以一符果一盟器婢子背書紅英字在空舍柱穴中因焚之其妖乃絶聞於劉山甫出北夢瑣言僧十朋劉建封寇豫章僧十朋與其徒奔分寧宿澄心僧院初夜見窻外有光視之見團火高廣數尺中有金車子與火俱行嘔軋有聲十朋始懼其主人云見之數年矣毎夜必出於僧堂西北隅地中繞堂數周復沒於此以其不為禍福故無掘視之者出稽神錄宜春人天祐初有人游宜春止空宅中兵革之後井邑蕪沒堂西至梁上有小窻窻外隙荒數十畝日暮窻外有一物正方自下而上頃之全蔽其窻其人引弓射之應絃而落時已夕不能即視明旦尋之西百餘步有方杉板帶一矢即昨所射也出稽神錄朱從本李遇為宣州節度使軍政委大將朱從本本家廐中畜猴圉人夜起秣馬見一物如驢黑而毛手足皆如人據地而食此猴見人乃去猴已食其半明年遇族誅宣城故老云郡中常有此怪毎軍城有變此物輒出出則滿城皆臭田頵將敗出於街中巡夜者見之不敢逼旬月禍及出稽神錄周本信州刺史周本入覲揚都舍於邸第遇私諱日獨宿外齋張燈而寐未熟聞室中有聲劃然視之見火爐冉冉而上直博于屋良久乃下飛灰勃然明日滿室浮埃覆物亦無他怪出稽神錄王宗信唐末蜀人攻岐還至於白石鎭裨將王宗信止普安禪院僧房時嚴冬房中有大禪爐熾炭甚盛信擁妓女十餘人各據僧牀寢息信忽見一姬飛入爐中宛轉於熾炭之上宗信忙遽救之及離火衣服並不燋灼又一姬飛入如前又救之頃之諸妓或出或入各迷悶失音有親吏隔驛牆告都招討使王宗儔宗儔至則徐入一一提臂而出視之衣裾纎毫不燬但驚悸不寐訊之云被胡僧提入火中所見皆同宗信大怒悉索諸僧立于前令妓識之有周和尚者身長貌胡皆曰是此也宗信遂鞭之數百云有幻術此僧乃一村夫新落髮一無所解又縳手足欲取熾炭爇之宗儔知其屈遂解之使逸訖不知何妖怪出王氏見聞薛老峰福州城中有鳥石山山有峰大鑿三字曰薛老峰癸卯歲一夕風雨聞山上如數千人喧噪之聲及旦則薛老峰倒立峰字反向上城中石碑皆自轉側其年閩亡出稽神錄歐陽璨三傳歐陽璨住徐州南五十里有故到城薄晚方迴不一二里已昬暝矣是夕陰晦約行三十里則夏雨大澍雷電震發路之半有山林夾道密林邃谷而多􅋧獸生怖懼不已既達山路雨勢彌盛俄見巨物出于面前裁十餘步長丈餘色正白亦不辨首足之狀但導前而行生恐悸尤極口常諷大悲神呪欲朗諷之口已噤矣遂心存念之三數遍則能言矣誦之不輟俄失其妖去家漸近雨亦稍止自爾昬暝則不敢出户庭之間矣出玉堂閒話太平廣記卷三百六十六
