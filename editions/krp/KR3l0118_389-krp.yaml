body:
  text: 太平廣記卷三百八十九宋李昉等編塚墓一聰明花樹相思木廣川王袁安丁姬渾子王粲孫鍾吴剛陸東美潘章胡邕戴熙王伯陽羊祜閭邱南陽古層塚隋王楚王塚舒綽李徳林郝處俊徐勣韋安石源乾曜楊知春唐堯臣陳思膺聰明花樹李正字宏卿學道見東王父教之十七年後正身死家人埋之於武陵而塚上生花樹髙七尺有人遇見此花皆聰明文章盛出武陵上十仙𫝊相思木昔戰國時魏國苦秦之難有民從征伐秦不返其妻思之而卒既葬塚上生木枝葉皆向夫所在而傾因謂之相思木出述異記廣川王廣川王去疾好聚無賴少年逰獵罼弋無度國内塚蔵一皆發掘爰猛説大父為廣川王中尉毎諫王不聴病免歸家說王所發掘塚墓不可勝數其竒異者百數為劉向説十許事記之如左魏襄王塚以文石為槨髙八尺許廣狹容三十人以手捫槨滑易如新中有石牀石屏風宛然周正不見棺柩明器蹤跡但見牀上玉唾盂一枚銅劒二枚金雜具皆如新王自取服之㐮王冢以鐡灌其上穿鑿三日乃開黄氣如霧觸人鼻目皆辛苦不可入以兵守之七日迺歇初至户無扇鑰石牀方四尺上有石几左右各三石人立侍皆武冠帶劒復入一户石扇有闗鎖扣開見棺柩黒光照人刀斫不能入燒鋸截之漆雜兕革為棺厚數寸累積十餘重乃力少不能開迺止復入一户亦石扇開鑰得石牀方六尺石屏風銅帳鐷一具或在牀上或在地下似幬帳縻朽而銅鐷墮落牀上石枕一枚牀上塵埃朏朏甚髙似是衣服牀左右婦人各二十悉皆立侍或有執巾櫛鏡鑷之𧰼或有執盤奉食之形無餘異物但有鐵鏡數百枚魏王子且渠冢甚淺狹無柩但有石牀廣六尺長一丈石屏風牀下悉是雲母牀上兩尸一男一女皆二十許俱東首裸卧無衣衾肌膚顔色如生人鬢髮齒牙爪不異生人王懼不敢侵還擁閉如舊袁盎冢以瓦為棺槨器物都無惟有銅鏡一枚晉靈公冢甚瑰壮四角皆以石為鷹犬捧燭石人男女四十餘皆立侍棺器無復形兆尸猶不壊九竅中皆有金玉其餘器物皆朽爛不可别唯玉蟾蜍一枚大如拳腹空容五合水光潤如新王取以盛水書滴幽公冢甚髙壮羨門既開皆是石堊撥除丈餘乃得雲母深尺所迺得百餘尸縱横相枕皆不朽唯一男子餘悉女子或坐或卧亦有立者衣服形色不異生人欒書冢棺柩明器朽爛無餘有白狐兒見人驚走左右逐㦸之莫能得傷其左腳夕王夢一丈夫鬚眉盡白来謂王曰何故傷吾腳仍以杖叩王左腳王覺脚腫痛生瘡至此不差出西京雜記袁安袁安父亡母使安以雞酒詣卜貢問葬地道逢三書生問安何之具以告書生曰吾知好葬地安以雞酒禮之畢告安地處云當葬此地世為貴公便與别數步顧視皆不見安疑是神人因𦵏其地遂登司徒子孫昌盛四世五公出幽明録丁姬王莽秉政貶丁姬號開其槨户火出炎四五丈吏卒以水沃滅乃得入燒燔冢中器物公卿遣子弟及諸生四夷十餘萬人操持作具助將作掘平恭王母傅太后墳及丁姬冢二旬皆平又周棘其處以為世戒云時有羣鷰數千銜土投丁姬冢中今其墳塚巍然尚秀隅阿相承列郭數周面開重門出水經渾子昆明池中有冢俗號渾子相𫝊昔居民有子名渾子者嘗違父語若東則北若水則火父病且死欲𦵏於髙陵之處矯謂曰我死必𦵏於水中及死渾子泣曰我今日不可更違父命遂葬於此盛宏之荆州記云固城臨洱水水之北岸有五女墩西漢時有人葬洱北墓將為所壊其人有五女共創此墩以防墓又云一女嫁隂縣佷子家貲萬金自少及長不從父言臨死意欲𦵏山上恐子不從乃言必𦵏我渚下磧上佷子曰我由来不取父教今當從此一語遂盡散家財作石冢以土繞之遂成一洲長數百步元康中始為水所壊今餘石如半榻許數百枚聚在水中出酉陽雜爼王粲魏武北征蹋頓升嶺眺矚見一岡不生百草王粲曰必是古冢此人在世服生礐石死而石氣蒸出外故卉木焦滅即令鑿㸔果大墓有礐石滿塋一説粲在荆州從劉表登鄣山而見此異曹武之平烏桓粲猶在江南此言為當出異苑孫鍾孫鍾家於富春幼失父事母至孝邅嵗荒以種𤓰自業忽有三少年詣鍾乞𤓰鍾厚待之三人謂曰此山下善可葬之當出天子君下山百許歩顧見我去即可𦵏處也鍾去三四十歩便反顧見三人成白鶴飛去鍾記之後死𦵏其地地在縣城東冢上常有光怪雲五色氣上屬天及堅母孕堅夢腸出繞吴閶門以告隣母曰安知非吉祥出祥瑞記吴綱魏黄初末吴人發吴苪冢取木於縣立孫堅廟見苪尸容貌衣服並如故平吴後預發冢人於夀春見南蠻挍尉吴綱曰君形貌何𩔖長沙王吴苪乎但君㣲短耳綱瞿然曰是先祖也自苪卒至冢開四百年至見綱又四十餘年矣出水經陸東美吴黄龍年中吴都海鹽有陸東美妻朱氏亦有容止夫妻相重寸歩不相離時人號為比肩人夫婦云皆比翼恐不能佳也後妻卒東美不食求死家中哀之乃合葬未一嵗冢上生梓樹同根二身相抱而合成一樹毎有雙鴻常宿於上孫權聞之嗟歎封其里曰比肩墓又曰雙梓後子宏與妻張氏雖無異亦相愛慕吴人又呼為小比肩出述異記潘章潘章少有美容儀時人競慕之楚國王仲先聞其美名故来求為友章許之因願同學一見相愛情若夫婦便同衾共枕交好無已後同死而家人哀之因合𦵏於羅浮山冢上忽生一樹柯條枝葉無不相抱時人異之號為共枕樹胡邕吴國胡邕為人好色娶妻張氏憐之不捨後卒邕亦亡家人便殯於後園中三年取𦵏見冢上化作二人常見抱如卧時人競笑之出笑林戴熙武昌戴熙家道貧陋墓在樊山南占者云有王氣桓溫仗鉞西下停武昌鑿之得一物大如水牛青色無頭腳時亦動揺斫刺不陷乃縱著江中得水便有聲如雷嚮發長川熙後嗣淪胥殆盡出異苑王伯陽王伯陽家在京口宅東有一冢𫝊云是魯肅墓伯陽婦郗鑒兄女也喪王平墓以葬後數日伯陽晝坐㕔上見一貴人乗肩輿侍人數百人馬絡繹遥来謂曰身是魯子敬君何故毁吾冢因目左右牽下牀以刀鐶擊之數百而去絶而復蘇𬒳擊處皆發疽潰數日而死出搜神記一説伯陽亡其子營墓得二漆棺移置南岡夜夢肅怒云當殺汝父尋復夢見伯陽云魯肅與吾争墓若不如不復得還後於靈座褥上見數升血疑魯肅之故也墓今在長廣橋東一里出搜神記羊祜晉有相羊祜墓者云後應出受命君祜惡其言遂掘斷以壞其相相者云墓勢雖壞猶應出折臂三公俄而祜墮馬折臂果至三公幽明録晉羊祜公騎乗有一兒五六嵗端明可喜掘墓之後兒即亡羊時為㐮陽都督因乗馬落地遂折臂當時士林咸歎其忠誠此出世説新語閭邱南陽范陽粉水口有一墓石虎石柱號文將軍冢晉安帝隆安中閭邱南陽將𦵏婦於墓側是夕從者數十人皆夢云何故危人以自安覺説之人皆夢同雖心惡之恥為夢迴及𦵏但鳴皷角為聲勢聞墓上亦有皷角及鎧甲聲轉近及至墓死於墓門者三人即殪之後閭邱為楊佺期所誅族人皆以為文將軍之祟出荆州記古層塚古層冢在武陵縣北一十五里二百步周迴五十步髙三丈亡其姓名古老相𫝊云昔有開者見銅人數十枚張目視俄聞冢中擊皷大呌竟不敢進後㸔冢土還合如初出朗州圗經隋王齊隋王嘗率佐使上樊姬墓酣宴其夕夢樊姬怒曰獨不念封崇之義奈何溷我當令爾知詰旦王𬒳病使巫覡引過設祀積日方愈出渚宫舊事楚王冢南齊襄陽盗發楚王冢獲玉屐玉屏風青絲編簡盗以火自照王僧䖍見十餘簡曰是科斗書考工記周官闕文舒綽舒綽東陽人稽古博文尤以隂陽留意善相冢吏部侍郎楊恭仁欲改葬觀王求善圖墓者五六人並稱海内名手停於宅共論蓺互相是非恭仁莫知孰是乃遣㣲解者馳往京師於欲𦵏之原取所擬之地四處各作歴記其方面髙下形勢各取一斗土並歴封之恭仁𨼆歴出土令諸生相之取殊不同言其形勢與歴又相乖背綽乃定一土堪𦵏操筆作歴言其四方形勢與恭仁歴無尺寸之差諸生雅相推服各賜絹十疋遣之綽曰此所擬處深五尺之外有五穀若得一穀即是福地公侯世世不絶恭仁即將綽向京令人掘深七尺得一穴如五石甕大有粟七八㪷此地經為粟田蟻運粟下入此穴當時朝野之士以綽為聖𦵏竟賜細馬一匹物二百段綽之妙能今古無比出朝野僉載李徳林隋内史令李徳林深州饒陽人也使其子卜𦵏於饒陽城東遷厝其父母遂問之其地奚若曰卜兆云𦵏後當出八公其地東村西郭南道北隄林曰村名何答曰五公林曰唯有三公在此其命也知復云何遂𦵏之子伯藥孫安期並襲安平公至曾孫與徐敬業反公遂絶出朝野僉載郝處俊唐郝處俊為侍中死𦵏訖有一書生過其墓歎曰𦵏壓龍角其棺必斵後其孫象賢坐不道斵俊棺焚其屍俊髮根入腦骨皮託毛著髑髏亦是竒毛異骨貴人相也出朝野僉載徐勣唐英公徐勣初卜𦵏繇曰朱雀和鳴子孫盛榮張景藏聞之私謂人曰所占者過也此所謂朱雀悲哀棺中見灰後孫敬業揚州反弟敬貞答欵曰敬業初生時於𦵏下掘得一龜云大貴之象英公令祕而不言果有大變之象則天怒斵英公棺焚其屍灰之應也出朝野僉載韋安石神龍中相地者僧泓師與韋安石善嘗語安石曰貧道近於鳳棲原見一地可二十餘畝有龍起伏形勢𦵏於此地者必累世為台座安石曰老夫有别業在城南待閒時陪師徃詣地所問其價幾何同逰林泉又是髙興安石妻聞謂曰公為天子大臣泓師通隂陽術數奈何一旦潛逰郊外又買墓地恐禍生不測矣安石懼乃止泓歎曰國夫人識達先見非貧道之所及公若要買地不必躬親夫人曰欲得了義兼地不要買安石曰舍弟縚有中殤男未𦵏便與買此地泓曰如賢弟得此地即不得將相位止列卿已而縚竟買其地𦵏中殤男縚後為太常卿禮儀使卒官出戎幕閒談源乾曜泓師自東洛迴言於張説缺門道左有地甚善公試請假三兩日有百僚至者貧道於簾間視其相甚貴者付此地説如其言請假兩日朝士畢集泓云或己貴大福不再或不稱此地反以為禍及監察御史源乾曜至泓謂説曰此人貴與公等試召之方便授以此説召乾曜與語源云乾曜大塋在缺門先人尚未啓祔今請告歸洛赴先逺之期故来拜辭説具述泓言必同行尤佳源辭以家貧不辦此言不敢煩師同行後泓復經缺門見其地已為源氏墓矣㢠廻謂説曰天賛源氏者合窪處本髙今則窪矣合高處本窪今則髙矣其安墳及山門角缺之所皆作者問其價乃賖買耳問其卜𦵏者村夫耳問其術乃慿下俚斗書耳其制度一一自然如此源氏子大貴矣乾曜自京尹拜相為侍近二十年出戎幕閒談楊知春開元中忽相𫝊有殭人在地一千年因墓崩殭人復生不食五穀飲水吸風而已時人呼為地仙者或有呼為妄者或多知地下金玉積聚焉好行吴楚齊魯間有二賊乗殭人言乃結兇徒十輩於濠夀開發墓至盛唐縣界發一塚時呼為白茅冢發一丈其冢有四房閣東房皆兵器弓矢鎗人之𩔖悉脩南房皆繒綵中奩隔皆錦綺上有牌云周夷王所賜錦三百端下一隔皆金玉器物西房皆漆器其新如昨北房有玉棺中有玉女儼然如生緑髪稠直皓齒編貝穠纎修短合度若素畫焉衣紫帔繡韈珠履新香可愛以手循之體如暖焉玉棺之前有一銀罇酒兇徒競飲之甘芳如人間上罇之味各取其錦綵寳物玉女左手無名指有玉鐶賊争脱之一賊楊知春者曰何必取此諸寳已不少久不可脱競以刀斷其指指中出血如赤豆汁知春曰大不仁有物不能贖卒斷其指痛哉衆賊出冢以知春為詐共欲殺之一時舉刀皆不相識九人自相斫俱死知春獲存遂却送所掠物於冢中粗以土瘞之而去知春詣官自陳其状官以軍人二十餘輩修復復尋討銘誌終不能得出博異志唐堯臣張師覽善卜冢弟子王景超𫝊其業開元中唐堯臣卒於鄭州師覽使景超為定𦵏地𦵏後唐氏六畜等皆能言罵云何物虫狗𦵏我著如此地家人惶懼遽移其墓怪遂絶出廣異記陳思膺陳思膺本名聿修福州龍平人也少居鄉里以博學為志開元中有客求宿聿修竒其客厚待之明日將去乃曰吾識地理思有以報遥見此州上里地形貴不可言𦵏之必福昆嗣聿修欣然同詣其處視之客曰若𦵏此可世世為郡守又指一處曰若用此可一世為都督聿修謝之居數載喪親遂以所指都督地𦵏之他日拜墓忽見其地生金笋甚衆遂採而歸再至金笋又生及服闋所獲多矣因㩦入京以計行賂以所業繼之頗致聞達後有宗人名思膺者以前任誥牒與因易名干執政久之遂除桂州都督今壁記具列其名亦有子孫仕本郡者出桂林風土記太平廣記卷三百八十九
