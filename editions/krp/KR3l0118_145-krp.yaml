body:
  text: 太平廣記卷一百四十五徵應十一李鈞高駢鉅鹿守陜帥嚴遵美成汭劉知俊田頵桑維翰鍾傳頓金湖南馬氏王愼辭安守範李鈞唐李鈞之莅臨汝也郡當王仙芝大兵之後民間多警李鈞以兵力單寡抗疏聞奏詔以昭義軍三千五百人鎭焉乾符戊戍歲也兵至營于郡西郭明年春鈞節制上黨雜報到於是鎭兵部將排隊於州前通衢率其屬入衙展君臣之禮忽有暴風揚塵起自軍門而南蟠折行伍拔大斾十餘以登州人愕眙而顧沒于天際明日州北二十里大牛谷野人得斾以獻帛無完幅枝幹皆摺拉矣鈞至上黨統衆岀雁門兵既不戢暴殘居民遂爲猛虎軍所殺矣岀三水小牘高駢唐光啓三年中書令高駢鎭淮海有蝗行而不飛自郭西浮濠緣城入子城聚於道院驅除不止松竹之屬一宿如剪幡㡠畫像皆嚙去其頭數日之後又相啖食九月中暴雨方霽溝瀆間忽有小魚其大如指蓋雨魚也占有兵喪至十月有大星夜墮於延和閣前聲若奔雷迸光碎響洞照一庭自十一月至明年二月昏霧不解或曰下謀上之兆是時粒食騰貴殆逾十倍寒僵雨仆日輦數千口棄之郭外及霽而逺坊靜巷爲之一空是時浙西軍變周寳奔毗陵駢聞之大喜遽遣使致書於周曰伏承走馬已及奔牛奔牛堰名在常州西今附虀一瓶葛粉十斤以充道途所要蓋諷其虀粉也三月使院致看花宴駢有與諸從事詩其末句云人間無限傷心事不得樽前折一枝蓋亡滅之䜟也及爲秦彦幽辱計口給食自五月至八月外圍益急遂及於難岀妖亂志鉅鹿守唐文德戊申歲鉅鹿郡南和縣街北有紙坊長垣悉曝紙忽有旋風自西來卷壁紙畧盡直上穿雲望之如飛雪焉此兵家大忌也夏五月郡守死岀三水小牘陜帥唐乾寧末分陜有虵鼠鬬於南門之内觀者如堵虵死而䑕亡去未旬而陜帥遇禍則知内虵死而鄭厲入羣鼠奔而蒲山亡妖由人興可爲戒懼岀三水小牘嚴遵美唐左軍容使嚴遵美閹官中仁人也嘗言北司爲供奉官袴衫給事無秉簡之儀又云樞密使廨署三間屋書櫃而已亦無視事之㕔堂狀後帖黃指揮公事乃楊復恭奪宰相權也遵美嘗發狂手足舞蹈之傍有一猫一犬猫謂犬曰軍容改常也犬曰何用管俄而舞定且異猫犬之言遇昭宗播遷鳯翔乃求致仕漢中尋徙於劎南青城山下卜别墅以居之年過八十而終其忠正謙約與西門季𤣥爲季孟于時誅宦官唯西川不奉詔由是脱禍家有北司治亂記八卷備載閹官忠佞好惡蓋巷伯之流也未必俱爲邪僻良由南班輕忌大過以致怨怒蓋邦國不幸也先是路巖自成都移鎭渚宫所乗馬忽作人語且曰蘆荻花此花開後路無家不乆及禍然畜𩔖之語豈有物憑之乎石言於晉殆斯比也岀北夢瑣言成汭荆州成汭唐天復中准詔統軍救援江夏師次公安縣寺有二金剛神土人號曰二聖頗有靈驗艤舟而謁之且以勝負爲禱汭兆皆不吉汭惑之孔目官楊師厚曰公業已行安可疑阻於是不得已而進竟有覆軍之敗身死家亡非偶然也出北夢瑣言劉知俊梁彭城王劉知俊鎭同州日因築營牆掘得一物重八十餘斤狀若油囊召賓幕將校問之或曰地囊或曰飛廉或曰金神七殺獨留源曰此是寃氣所結也古來囹圄之地或有焉昔王充據洛陽修河南府獄亦獲此物而逺祖記之乃寃死囚人精爽入地聚爲此物經百千年凝結不散源聞酒能忘憂請奠以醇醪或可消釋耳然此物之岀亦非吉徵也知俊命具酒饌祝酹復瘞之尋有扳城背主奔秦之事乃驗之矣岀鑒戒錄田頵宣州節度田頵將作亂一日向暮有鳥赤色如雉而大尾有火光如散星之狀自外飛入止㦸門而不見翌日府中大火曹局皆盡唯甲兵存焉頵資以起事明年遂敗岀稽神錄桑維翰魏公桑維翰尹開封一日嘗中夜於正寢獨坐忽大驚悸如有所見向空厲聲云汝焉敢此來如是者數四旬日憤懣不已雖齊體亦不敢有所發問未幾夢已整衣冠嚴車騎將有所詣就乗之次忽所乗馬亡去追尋莫知所在既寤甚惡之不數日及難岀玉堂閒話鍾傳南平王鍾傳在江西有衙門吏孔知讓新治第晝有一星隕於庭中知讓甚惡之求典外戎以空其地歲餘御史中丞薛昭緯貶官至豫章傳取此地第以居之遂卒於此岀稽神錄頓金袁州刺史頓金罷郡還都有人以紫襆包一物詣門遺之開視則白襴衫也遽追其人則亡矣其年金卒岀稽神錄湖南馬氏湖南武穆王巡邊迴舟至洞庭宜春江口暴風忽至波如連山乃見波中恢詭譎怪蛟螭岀沒雲霧昏䝉有如武夫執戈㦸者有文吏具襴簡者有如捧盤盂者或緋或綠倐閃睢盱莫知何物左右大駭衣服器皿悉投之舟人欲以姬妾爲請王不聽移時風定僅獲存焉後數年武穆王薨於位岀北夢瑣言王愼辭江南通事舍人王愼辭有别墅在廣陵城西愼辭常與親友遊其上一日忽自愛其岡阜之勢歎曰我死必葬於此是夜村中聞犬吠或起視之見愼辭獨騎徘徊於此逼之遂不見自是夜夜恒至月餘愼辭卒竟葬其地岀稽神錄安守範僞蜀彭州刺史安思謙男守範嘗與賓客遊天台禪院作聯句詩守範云偶到天台院因逢物外僧定戎軍推官楊鼎夫云忘機同一祖岀語離三乗前懷逺軍巡官周述云樹老中庭寂窓虚外境澄前眉州判官李仁肇云片時松栢下聯續百千燈因紀于僧壁而去翌日有貧子乞食見之朗言曰人道有初無尾此則有尾無初却後五年首頷俱碎洎不如尾句者撫掌大笑院僧驅逐之貧子走且告曰此後主人不逺千里即欲到來衆以爲狂莫測其由後數年守範伏法鼎夫暴亡此首頷俱碎之義周與李累授官資此不如尾句之義也院主僧尋亦卒相承住持者來自興元則主不逺千里也貧子之説一無謬焉岀野人閒話太平廣記卷一百四十五
