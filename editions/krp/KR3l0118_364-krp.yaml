body:
  text: 太平廣記卷三百六十四宋李昉等編妖怪六江淮士人李鵠僧智圓南孝亷謝翺僧法長河北村正僧𢎞濟金友章于凝江淮士人江淮有士人莊居其子年二十餘嘗病厭其父一日飲茗甌中忽泡起如甌髙出甌外瑩淨若琉璃有人長一寸立於漚上高出甌中細視之衣服狀貌乃其子也食頃爆破一無所見茶椀如舊但有微璺耳數日其子遂著神譯神言斷人休咎不差出酉陽雜俎李鵠前秀才李鵠覲於潁川夜至一驛纔卧見物如猪者突上㕔階鵠驚走透後門投驛廐潛身草積中屏息伺之怪亦隨至聲遶草積數匝瞪目視鵠所潛處忽變為巨星騰起數道燭天鵠左右取炬索鵠於草積中鵠已卒矣半日方蘇因說所見未旬無疾而卒出酉陽雜俎僧智圓鄭餘慶在梁州有龍興寺僧智圓善總持敕勒之術制邪理病多著效日有數十人候門智圓老稍倦鄭頗敬之因求住城東隙地起草屋而居有沙彌行者各一人居數年暇日智圓向陽科脚忽有布衣婦人甚端麗至階作禮泣曰妾不幸夫亡子幼老母危病知師神呪助力乞加救䕶智圓曰貧道本厭城隍喧湫兼煩於招謝弟子母病可就此為加持也婦人復再三泣請且言母病亟不可舉扶智圓亦哀而許之乃言從此向北二十餘里至一村村側近有魯家莊但訪韋十娘所居也智圓詰朝如言行二十餘里歴訪不得乃還明日婦人復至僧責曰貧道昨日逺赴約何差繆如此婦人言只去師所止處二三里耳師慈悲必為再往僧怒曰老僧衰暮今誓不出婦人乃大聲言慈悲何在耶今事須去因上階牽僧臂僧驚迫亦疑其非人恍惚以小刀刺之婦人遂倒乃沙彌誤中刀流血死矣僧遽與行者瘞於飯甕下沙彌本村人家去蘭若十餘里其日家人悉在田有人皂衣揭襆乞漿於田中且說其事沙彌父母舉家號哭詣僧僧猶紿焉其父母鍬索而獲即訴於官鄭公大駭併求盜吏細按意其必寃也僧具陳狀復白貧道宿債有死而已按者亦以死論僧求假七日命持念為将來資糧餘慶哀而許之僧沐浴設壇急印契縳􅀈考其魅凡三夕婦人見於壇上言我類不少所求食處輒為師破除沙彌且在能為誓不持念必相還也智圓懇為設誓婦人喜曰沙彌在城南某村古邱中僧言於官吏如其言尋之沙彌果在神已癡矣發沙彌棺中乃一苕帚也僧自是絶其術出酉陽雜俎南孝廉唐南孝廉失其名莫知何許人能作鱠縠薄縷細輕可吹起操刀響捷若合節奏因會客衒伎先起架以陳之忽暴風雷震一聲鱠悉化為胡蝶飛去南驚懼遂折刀誓不復作出酉陽雜俎謝翺陳郡謝翺者嘗舉進士好為七字詩其先寓居長安昇道里所居庭中多牡丹一日晚霽出其居南行百步眺終南峰佇立久之見一騎自西馳來繡繢髣髴近乃雙鬟高髻靚粧色甚姝麗至翺所因駐謂翺郎非見待耶翺曰步此徒望山耳雙鬟笑降拜曰願郎歸所居翺不測即廻望其居見青衣三四人皆立其門外翺益駭異入門青衣俱前拜既入見堂中設茵毯張帷帟錦繡輝映異香遍室翺愕然且懼不敢問一人前曰郎何懼固不為損耳頃之有金車至門見一美人年十六七風貌閑麗代所未識降車入門與翺相見坐於西軒謂翺曰聞此地有名花故來與君一醉耳翺懼稍解美人即命設饌同食其器用物莫不珍豐出玉杯命酒遞酌翺因問曰女郎何為者得不為他怪乎美人笑不答固請之乃曰君但知非人則已安用問耶夜闌謂翺曰某家甚逺今将歸不可久留此矣聞君善為七言詩願有所贈翺悵然因命筆賦詩曰陽臺後會杳無期碧樹烟深玉漏遲半夜香風滿庭月花前竟發楚王悲美人覽之泣下數行曰某亦嘗學為詩欲答來贈幸不見誚翺喜而請美人求絳牋翺視笥中唯碧牋一幅因與之美人題曰相思無路莫相思風裏花開只片時惆悵金閨却歸處曉鸎啼斷綠楊枝其筆札甚工翺嗟賞良久美人遂顧左右撒帳帟命燭登車翺送至門揮淚而別未數十歩車與人馬俱亡見矣翺異其事因貯美人詩笥中明年春下第東歸至新豐夕舍逆旅因步月悵望感前事又為詩曰一紙華牋麗碧雲餘香猶在墨猶新空添滿目淒涼事不見三山縹緲人斜月照衣今夜夢落花啼鳥去年春紅閨更有堪愁處窻上蟲絲鏡上塵既而朗吟之忽聞數百歩外有車音西來甚急俄見金閨從數騎視其從者乃前時雙鬟也驚問之雙鬟遽前告即駐車使謂翺曰通衢中恨不得一見翺請其舎逆旅固不可又問所適答曰将之𢎞農翺因曰某今亦歸洛陽願偕東可乎曰吾行甚迫不可即褰車簾謂翺曰感君意勤厚故一面耳言竟嗚咽不自勝翺亦為之悲泣因誦以所製之詩美人曰不意君之不忘如是也幸何厚焉又曰願更酬此一篇翺即以紙筆與之俄頃而成曰惆悵佳期一夢中五陵春色盡成空欲知離别偏堪恨只為音塵兩不通愁態上眉凝淺綠淚痕侵臉落輕紅雙輪暫與王孫駐明月西馳又向東翺謝之良久別去纔百餘步又無所見翺雖知為怪眷然不能忘及至陜西遂下道至𢎞農留數日冀一再遇竟絶影響乃還洛陽出二詩話於友人不數月以怨結遂卒出宣室志僧法長河南龍門寺僧法長者鄭州原武人寶厯中嘗自龍門歸原武家有田數頃稔而未刈一夕因乘馬行田間馬忽屹不前雖鞭抶輒不動唯瞪目東望若有所見時月明隨其望數百步外有一物如古木色兀然而來長懼即迴馬走道左數十步伺之其物來漸近乃白氣高六七尺腥穢甚於鮑肆有聲綿綿如呻吟西望而去長䇿馬隨其後常逺數十步行一里餘至里民王氏家遂突入焉長駐馬伺之頃之忽聞其家呼曰車宇下牛將死可偕來視之又頃聞呼後舍驢蹶仆地不可救又頃聞驚哭有出者長佯過訊之曰主人有子十餘歳忽卒語未竟又聞哭音或驚呌聨聨不已夜分後聲漸少迨明而絶長駭異即具告其鄰偕來王氏居偵之其中俏然無聞因開户而其家十餘人皆死雞犬無存焉出宣室志河北村正處士鄭賔于言嘗客河北有村正妻新死未斂日暮其兒女忽覺有樂聲漸近至庭宇屍已動矣及入房如在梁棟間屍遂起舞樂聲復出屍倒旋出門隨樂聲而去其家驚懼時月黑亦不敢尋逐一更村正方歸知之乃折一桑枝如臂被酒大罵尋之入墓林約五六里復覺樂聲在一栢林上及近樹樹下有火熒熒然屍方舞矣村正舉杖擊之屍倒樂聲亦止遂負而還出酉陽雜俎僧𢎞濟醫僧行儒說福州有僧𢎞濟齋戒精苦嘗於沙岸得一顱骨遂貯衣籃中歸寺數日忽眠中有物齧其耳以手撥之落聲如數升物疑其顱骨所為也及明果墜在牀下遂破為六片零置瓦溝中夜半有火如鷄卵次第入瓦下燭之𢎞濟責曰爾不能求生人天慿朽骨何也於是怪絶出酉陽雜俎金友章金友章者河内人𨼆於蒲州中條山凡五載山有女子日常挈缾而汲溪水容貌殊麗友章於齋中遙見心甚悅之一日女子復汲友章躡屣企户而調之曰誰家麗人頻此汲耶女子笑曰澗下流泉本無常主須則取之豈有定限先不相知一何造次然兒止居近里少小孤遺今且託身於姨舎艱危受盡無以自適友章曰娘子既未適人友章方謀婚媾既偶夙心無宜遐棄未委如何耳女曰君子既不以貌陋見鄙妾焉敢拒違然候夜而赴佳命言訖女子汲水而去是夕果至友章迎之入室夫婦之道久而益敬友章毎夜讀書常至宵分妻常坐伴之如此半年矣一夕友章如常執卷而妻不坐但佇立侍坐友章詰之以他事告友章乃令妻就寢妻曰君今夜歸房愼勿執燭妾之幸矣既而友章秉燭就榻即於被下見其妻乃一枯骨耳友章惋歎良久復以被覆之須臾乃復本形因大悸怖而謂友章曰妾非人也乃山南枯骨之精居此山北有恒明王者鬼之首也常毎月一朝妾自事金郎半年都不至彼向為鬼使所錄榜妾鐵杖百妾受此楚毒不勝其苦向以化身未得豈意金郎視之也事以彰矣君宜速出更不留戀蓋此山中凡物總有精魅附之恐損金郎言訖涕泣嗚咽因爾不見友章亦悽恨而去出集異記于凝岐人于凝者性嗜酒常往來邠涇間故人宰宜祿因訪飲酒涉旬乃返既而宿酲未愈令童僕先路以備休憩時孟夏麥野韶潤緩轡而行遙見道左嘉木美蔭因就焉至則繫馬藉草坐未定忽見馬首南顧鼻息恐駭若有覩焉凝則隨向觀之百步外有枯骨如雪箕踞於荒塜之上五體百骸無有不具眼鼻皆通明背肋玲瓏枝節可數凝即跨馬稍前枯骨乃開口吹嘘槁葉輕塵紛然自出上有烏鳶紛飛嘲噪甚衆凝良久稍逼枯骨乃竦然挺立骨節絶偉凝心悸馬亦驚走遂馳赴旅舍而先路童僕出迎相顧駭曰郎君神思一何慘悴凝即說之適有涇倅十餘各執長短兵援蕃覘以東皆曰豈有是哉洎逆旅少年輩集聚極衆凝即為之導前仍與衆約曰儻或尚在當共碎之雖然恐不得見矣俄至其處而端坐如故或則呌噪曾不動搖或則彎弓發矢又無中者或欲環之前進則亦相顧莫能先焉久之枯骸歘然自起徐徐南去日勢已晚衆各恐讋稍稍遂散凝亦鞭馬而迴逺望尚見烏鵲翔集逐去不散自後凝屢經其地及詢左右居人乃無復見者出集異記太平廣記卷三百六十四
