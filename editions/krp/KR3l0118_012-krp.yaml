body:
  text: 太平廣記卷十二神仙十二壺公薊子訓董奉李常在壺公壺公者不知其姓名也今世所有召軍符召鬼神治病玉府符凡二十餘卷皆出自公故總名壺公符時汝南有費長房者為市掾忽見公從逺方来入市賣藥人莫識之賣藥口不二價治病皆愈語買人曰服此藥必吐某物某日當愈事無不效其錢日收數萬便施與市中貧乏饑凍者惟留三五十常懸一空壺於屋上日入之後公跳入壺中人莫能見惟長房樓上見之知非常人也長房乃日日自掃公座前地及供饌物公受而不辭如此積久長房尤不懈亦不敢有所求公知長房篤信謂房曰至暮無人時更来長房如其言即徃公語房曰見我跳入壺中時卿便可效我跳自當得入長房依言果不覺已入入後不復是壺惟見仙宮世界樓觀重門閣道公左右侍者數十人公語房曰我仙人也昔處天曹以公事不勤見責因謫人間耳卿可敎故得見我長房下座頓首曰肉人無知積罪却厚幸謬見哀憫猶入剖棺布氣生枯起朽但恐臭穢頑弊不任驅使若見哀憐百生之厚幸也公曰審爾大佳勿語人也公後詣長房於樓上曰我有少酒相就飲之酒在樓下長房使人取之不能舉盎至數十人莫能得上乃白公公乃下以一指提上與房共飲之酒器如拳許大飲之至暮不竭告長房曰我某日當去卿能去乎房曰欲去之心不可復言欲使親眷不覺知去當有何計公曰易耳乃取一青竹杖與房戒之曰卿以竹歸家便可稱病以此竹杖置卿所臥處黙然便来房如公言去後家人見房已死屍在牀乃向竹杖耳乃哭泣葬之房詣公恍惚不知何所公乃留房於羣虎中虎磨牙張口欲噬房房不懼明日又内於石室中頭上有一方石廣數丈以茅綯懸之又諸蛇来嚙繩繩即欲斷而長房自若公至撫之曰子可敎矣又令長房啗屎兼蛆長寸許異常臭惡房難之公乃歎謝遣之曰子不得仙道也賜子為地上主者可得夀數百嵗為傳封符一卷付之曰帶此可主諸鬼神常稱使者可以治病消災房憂不得到家公以一竹杖與之曰但騎此得到家耳房騎竹杖辭去忽如睡覺已到家家人謂是鬼具述前事乃發棺視之惟一竹杖方信之房所騎竹杖棄葛陂中視之乃青龍耳初去至歸謂一日推問家人已一年矣房乃行符收鬼治病無不愈者每與人同坐共語常呵責嗔怒問其故曰嗔鬼耳時汝南有鬼怪嵗輙數来郡中来時從騎如太守入府打鼓周行内外爾乃還去甚以為患房因詣府㕔事正值此鬼来到府門前府君馳入獨留房鬼知之不敢前房大呌呼曰便捉前鬼来乃下車伏庭前叩頭乞曰改過房呵之曰汝死老鬼不念温良無故導從唐突官府自知合死否急復真形鬼須臾成大鼈如車輪頭長丈餘房又令復人形房以一札符付之令送與葛陂君鬼叩頭流涕持札去使人追視之乃見符札立陂邊鬼以頭繞𣗳而死房後到東海東海大旱三年謂請雨者曰東海神君前来淫葛陂夫人吾係之辭状不測脫然忘之遂致久旱吾今當赦之令其行雨即便有大雨房有神術能縮地脉千里存在目前宛然放之復舒如舊也出神仙傳薊子訓薊子訓者齊人也少嘗任州郡舉孝廉除郎中又從軍除駙馬都尉人莫知其有道在鄉里時惟行信讓與人從事如此三百餘年顔色不老人怪之好事者追隨之不見其所常服藥物也性好清澹常閒居讀易小小作文皆有意義見比屋抱嬰兒訓求抱之失手墮地兒即死鄰家素尊敬子訓不敢有悲哀之色乃埋瘞之後二十餘日子訓往問之曰復思兒否鄰曰小兒相命應不合成人死已積日不能復思也子訓因出外抱兒還其家其家謂是死不敢受子訓曰但取之無苦故是汝本兒也兒識其母見而欣笑欲母取之抱猶疑不信子訓既去夫婦共往視所埋兒棺中惟有一泥兒長六七寸此兒遂得長成諸老人鬚髪畢白者子訓但與之對坐共語宿昔之間明旦皆黒矣京師貴人聞之莫不虚心謁見無縁致之有年少與子訓鄰居為太學生諸貴人作計共呼太學生謂之曰子勤苦讀書欲規富貴但召得子訓来使汝可不勞而得矣生許諾便歸事子訓灑掃供侍左右數百日子訓知意謂生曰卿非學道焉能如此生尚諱之子訓曰汝何不以實對妄為虚飾吾已具知卿意諸貴人欲見我我豈以一行之勞而使卿不獲榮位乎汝可還京吾某日當往生甚喜辭至京與貴人具說某日子訓當到至期未發生父母来詣子訓子訓曰汝恐吾忘使汝兒失信不仕邪吾今食後即發半日乃行二千里既至生急往拜迎子訓問曰誰欲見我生曰欲見先生者甚多不敢枉屈但知先生所至當自来也子訓曰吾千里不倦豈惜寸步乎欲見者語之令各絶賓客吾明日當各詣宅生如言告諸貴人各自絶客灑掃至時子訓果来凡二十三家各有一子訓諸朝士各謂子訓先到其家明日至朝各問子訓何時到宅二十三人所見皆同時所服飾顔貌無異惟所言話隨主人意答乃不同也京師大驚異其神變如此諸貴人並欲詣子訓子訓謂生曰諸貴人謂我重瞳八采故欲見我今見我矣我亦無所能論道我去矣適出門諸貴人冠蓋塞路而来生具言適去矣東陌上乗騾者是也各走馬逐之不及如此半日相去常一里許終不能及遂各罷還子訓至陳公家言曰吾明日中時當去陳公問逺近行乎曰不復更還也陳公以葛布單衣一送之至時子訓乃死屍僵手足交胸上不可得伸状如屈鐵屍作五香之芳氣逹於巷陌其氣甚異乃殯之棺中未得出棺中噏然作雷霆之音光照宅宇坐人頓伏良久視其棺蓋乃分裂飛於空中棺中無人但遺一隻履而已須臾聞陌上有人馬簫鼔之聲徑東而去乃不復見子訓去後陌上數十里芳香百餘日不歇也出神仙傳董奉董奉者字君異侯官人也吳先主時有少年為奉本縣長見奉年四十餘不知其道罷官去後五十餘年復為他職行經侯官諸故吏人皆老而奉顔貌一如往日問言君得道邪吾昔見君如此吾今已皓首而君轉少何也奉曰偶然耳又杜燮為交州刺史得毒病死死已三日奉時在彼乃往與藥三丸内在口中以水灌之使人捧舉其頭揺而消之須臾手足似動顔色漸還半日乃能起坐後四日乃能語云死時奄忽如夢見有十數烏衣人来收爕上車去入大赤門徑以付獄中獄各一户戸纔容一人以爕内一戸中乃以土從外封塞之不復見外光忽聞戸外人言云太乙遣使来召杜爕又聞除其戸土良久引出見有車馬赤蓋三人共坐車上一人持節呼爕上車將還至門而覺爕遂活因起謝曰甚蒙大恩何以報効乃為奉起樓於庭中奉不食他物惟啖脯棗飲少酒爕一日三度設之奉每来飲食或如飛鳥騰空来坐食了飛去人每不覺如是一年餘辭爕去爕涕泣留之不住爕問欲何所之莫要大船否奉曰不用船惟要一棺器耳爕即為具之至明日日中時奉死爕以其棺殯埋之七日後有人從容昌来奉見囑云為謝爕好自愛理爕聞之乃啓殯發棺視之惟存一帛一面畫作人形一面丹書作符後還豫章廬山下居有一人中有癘疾垂死載以詣奉叩頭求哀之奉使病人坐一房中以五重布巾蓋之使勿動病者云初聞一物来舐身痛不可忍無處不匝量此舌廣一尺許氣息如牛不知何物也良久物去奉乃往池中以水浴之遣去告云不久當愈勿當風十數日病者身赤無皮甚痛得水浴痛即止二十日皮生即愈身如凝脂後忽大旱縣令丁士彦議曰聞董君有道當能致雨乃自齎酒脯見奉陳大旱之意奉曰雨易得耳因視屋曰貧道屋皆見天恐雨至何堪令解其意曰先生但致雨當為立架好屋明日士彦自將人吏百餘輩運竹木起屋立成方聚土作泥擬數里取水奉曰不須爾暮當大雨乃止至暮即大雨髙下皆平方民大恱奉居山不種田日為人治病亦不取錢重病愈者使栽杏五株輕者一株如此數年計得十萬餘株鬱然成林乃使山中百禽羣獸游戱其下卒不生草常如芸治也後杏子大熟於林中作一草倉示時人曰欲買杏者不須報奉但將榖一器置倉中即自往取一器杏去常有人置榖来少而取杏去多者林中羣虎出吼逐之大怖急挈杏走路傍傾覆至家量杏一如穀多少或有人偷杏者虎逐之到家嚙至死家人知其偷杏乃送還奉叩頭謝過乃却使活奉每年貨杏得榖旋以賑救貧乏供給行旅不逮者嵗二萬餘斛縣令有女為精邪所魅醫療不效乃投奉治之若得女愈當以侍巾櫛奉然之即召得一白鼉長數丈陸行詣病者門奉使侍者斬之女病即愈奉遂納女為妻久無兒息奉每出行妻不能獨住乃乞一女養之年十餘嵗奉一日竦身入雲中去妻與女猶存其宅賣杏取給有欺之者虎還逐之奉在人間三百餘年乃去顔狀如三十時人也出神仙傳李常在李常在者蜀郡人也少治道術百姓累世奉事計其年已四五百嵗而不老常如五十許人治病困者三月微者一日愈在家有二男一女皆已嫁娶乃去去時從其弟子曾家孔家各請一小兒年皆十七八家亦不知常在欲何去即遣送之常在以青竹杖度二兒遣歸置其家所臥之處徑還勿與家人語二子承敎以杖歸家家人了不見兒去後乃各見死在床上二家哀泣殯埋之百餘日弟子從郫縣逢常在將此二兒俱行二兒與弟子泣語良久各附書到二家發棺視之惟青竹杖耳乃知非死後三十餘年居地肺山更娶婦常在先婦兒乃往尋求之未至十日常在謂後妻曰吾兒欲来見尋吾當去可將金餅與之及至求父所在婦以金與之兒曰父捨我去數十年日夜思戀聞父在此故自逺来覲省不求財也乃止三十日父不還兒乃欺其母曰父不還我去矣至外藏於草間常在還語婦曰此兒詐言如是當還汝語之汝長不復須我我在法不復與汝相見乃去少頃兒果来母語之如此兒自知不復見其父乃泣涕而去後七十餘年常在忽去弟子見在虎夀山下居復娶妻有父子世世見之如故故號之曰常在出神仙傳太平廣記卷十二
