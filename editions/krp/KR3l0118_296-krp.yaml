body:
  text: 太平廣記卷二百九十六神六太室神黃苗龔雙蕭總蕭嶽爾朱兆蔣帝神臨汝侯猷陰子春蘇嶺廟盧元明董慎李靖太室神後魏太武時嵩陽太室中有寶神像長數寸乍見孝文太和中有人避瘧於此廟見太武來造神因言今日朝天帝帝許移都洛陽當得四百年神言昨已得天符矣太武出神謂左右曰虜性苛貪天符但言四十而因之四百明年孝文遷都洛陽唯得四十年矣出廣古今五行記黃苗宋元嘉中南康平固人黃苗爲州吏受假違期方上行經宫亭湖入廟下願希免罰坐又欲還家若所願並遂當上猪酒苖至州皆得如志乃還資裝既薄遂不過廟行至都界與同侶並船泊宿中夜船忽從水自下其疾如風駕夜四更苗至宮亭始醒悟見船上有三人並烏衣持繩收縳苗夜上廟階下見神年可四十黄白披錦袍梁下懸一珠大如彈丸光輝照屋一人户外白平固黃苗上願猪酒遯回家教録今到命謫三年取三十人遣吏送苗窮山林中鏁腰繫樹日以生肉食之苖忽忽憂思但覺寒熱身瘡舉體生斑毛經一旬毛蔽身爪牙生性欲搏噬吏解鏁放之隨其行止三年凡得二十九人次應取新淦一女而此女士族初不出外後値與娣妹從後門出詣親家女最在後因取之爲此女難得渉五年人數乃充吏送至廟神教放遣乃以鹽飯飲之體毛稍落鬚髮悉出爪牙墮生新者經十五日還如人形意慮復常送出大路縣令呼苗具疏事覆前後所取人遍問其家並符合焉髀爲㦸所傷創瘢尚在苗還家八年得時疾死出述異記龔雙襄陽漢水西村有廟名土地主府君極有靈驗齊永元末龔雙任馮翊郡守不信鬼神過見此廟因領人燒之忽旋風絞火有二物挺出變成雙青鳥入龔雙兩目兩目應時疼痛舉體壯熱至明便卒出漢沔記蕭總蕭總字彦先南齊太祖族兄瓌之子總少爲太祖以文學見重時太祖已爲宋丞相謂總曰汝聰明智敏爲官不必資待我功成必薦汝爲太子詹事又曰我以嫌疑之故未卽遂心總曰若䜟言之何啻此官太祖曰此言狂悖慎鈐其口吾專疚於心未忘汝也總率性本異不與下於己者交自建業歸江陵宋後廢帝元徽後四方多亂因游明月峽愛其風景遂盤桓累歲常於峽下枕石潄流時春向晚忽聞林下有人呼蕭卿者數聲驚顧去坐石四十餘步有一女把花招總總心異之又常知此有神女從之視其容貌當可笄年所衣之服非世所有所佩之香非世所聞謂總曰蕭郎過此未曾見邀今幸良晨有同宿契總恍然行十餘里乃見溪上有宫闕臺殿甚嚴宫門左右有侍女二十人皆十四五並神仙之質其寢卧服玩之物俱非世有心亦喜幸一夕綢繆以至天曉忽聞山鳥晨呌巖泉韻清出户臨軒將窺舊路見煙雲正重殘月在西神女執總手謂曰人間之人神中之女此夕歡會萬年一也總曰神中之女豈人間常所望也女曰妾實此山之神上帝三百年一易不似人間之官來歲方終一易之後遂生他處今與郎契合亦有因由不可陳也言訖乃别神女手執一玉指環謂曰此妾常服玩未曾離手今永别寧不相遺願郎穿指慎勿忘心總曰幸見顧録感恨徒深執此懷中終身是寶天漸明總乃拜辭掩涕而别攜手出户已見路分明總下山數步迴顧宿處宛是巫山神女之祠也他日持玉環至建鄴因話於張景山景山驚曰吾常遊巫峽見神女指上有此玉環世人相傳云是晉簡文帝李后曾夢遊巫峽見神女神女乞后玉環覺後乃告帝帝遣使賜神女吾親見在神女指上今卿得之是世問異人矣總齊太祖建元末方徵召未行帝崩世祖即位累爲中書舍人初總爲治書御史江陵舟中過而忽思神女事悄然不樂乃賦詩曰昔年巖下客宛似成今古徒思明月人願濕巫山雨出八朝窮怪録蕭嶽齊明帝建武中有書生蕭嶽自毘陵至延陵季子廟前泊舟望月忽有一女子年十六七從三四侍女貌皆絶世以橘擲嶽懷中嶽心異之乃問其姓名云葛氏嶽因請舟中命酒與歌宴及曉請去嶽甚悵然嶽登舟望之見廟前有五六女相迎笑一時入廟嶽異之及明乃整衣冠至延陵廟中見東壁上書第三座之女細觀之而笑果昨夜宿之女也及左右侍女亦所從也畫壁題云東海姑之神出八朝窮怪錄爾朱兆後魏孝莊帝既誅爾朱榮榮子兆自汾州率騎攻洛師自河梁西涉掩襲京邑先是河邊有一人夢神謂曰爾朱家欲渡河用爾作波津令當爲縮水脉及兆至見一人自言知水深淺處以草表挿導忽失所在兆衆遂涉焉尋而陷京弑莊帝出北史蔣帝神梁旱甚詔於蔣帝神求雨十旬不降帝怒載荻焚廟幷其神影爾日開朗將欲起火當神上忽有雲如繖葢須臾驟雨臺中宫殿皆自震動帝懼馳詔追停少時還靜自此帝誠信遂深自踐阼比未曾到廟於是備法駕將朝臣修謁時魏將楊大眼來宼鍾離蔣帝神報敕必許扶助既而無雨水暴漲六七尺遂大克魏軍神之力也凱旋之後廟中人馬脚皆有泥濕當時並目覩焉出南史臨汝侯猷宗室臨汝侯猷爲吳興太守性倜儻與楚廟神交飲至一斛每酧祀盡歡極醉而神影亦有酒容所禱必應後爲益州刺史時江陵人齊狗兒反衆十餘萬攻州城猷兵糧已盡人有二心乃遙禱請救是日州界田父逢一騎絡鐵從東方來問去城㡬里曰百四十里日已晡騎語父曰後人來可令疾馬欲及日破賊俄有數百騎如風一騎仍請飲田父問爲誰曰吳興楚王來救臨汝侯當此時廟中請祈無驗十餘日乃見侍衛土偶皆泥濕如汗者是日猷大破狗兒焉及猷卒諡曰靈與神交故也出南史陰子春梁陰子春爲東莞太守時青州刺史王神念毁臨海神廟坐棟上有一虵役夫不擒入於海水爾夜子春夢見一人詣其府云有人見苦破壞所居今既無託欲憇此境子春心密記之經日方知神念毁廟因辦牲醪立宇祠之數日夢一朱衣人謝曰得君厚惠當以一州相報經月餘魏君欲襲朐山子春預知設伏摧破武帝以爲南青州刺史出南史蘇嶺廟襄陽蘇嶺山廟門有二石鹿夾之故謂之鹿門山習氏記云習郁常爲侍中從光武幸黎丘郁與光武俱夢見蘇嶺山神因使立祠郭重産記云雙石鹿自立如鬬採伐人常過其下或有時不見鹿因是知有靈瑞梁天監初有蜯湖村人於此澤間獵見二鹿極大有異於恒鹿乃走馬逐之鹿即透澗直向蘇嶺人逐鹿至神所遂失所在唯見廟前二石鹿獵者疑是向者鹿所化遂迴其夜夢見一人著單巾幘黃布袴褶語云使君遣我牧馬汝何驅廹頼得無他若見損傷豈得全濟出襄陽記盧元明北齊盧元明聘於梁其妻乘車送至河濵忽聞水有香氣異常顧見水神湧出波中牛乃驚奔曳車入河其妻溺死兄子十住尚幼與同載投下獲免出北史董慎隋大業元年兖州佐史董慎性公直明法理自都督以下用法有不直必犯顔而諫之雖加譴責亦不知懼必俟刑正而後退常因授衣歸家出州門逢一黃衣使者曰太山君呼君爲錄事因出懷中牒示慎牒曰董慎名稱荗實案牘精練將平疑獄須俟良能權差知右曹錄事印甚分明後署曰倨慎謂事者曰府君呼我豈有不行然不識府君名謂何使者曰錄事勿言到任即知矣自持大布囊内慎其中負之出兖州郭因致囊於路左汲水調泥封慎兩目慎都不知經過逺近忽聞大唱曰范慎追董慎到使者曰諾趨入府君曰所追錄事今復何在使者曰㝠司幽祕恐或漏洩向請左曹匿影布囊盛之府君大笑曰已死范慎追董慎取左曹囊盛右曹錄事可謂能防慎也便令寫出抉去目泥賜青縑衫魚須笏豹皮靴文甚斑駮邀登副階命左右取榻令坐曰藉君公正故有是請今有閩州司馬令狐實等六人寘無間獄承天曹符以實是太元夫人三等親准令逓減三等昨罪人程翥一百二十人引例喧訟不可止遏已具名申天曹天曹以爲罰疑唯輕亦令量減二等餘恐後人引例多矣君謂宜如何慎曰夫水照妍蚩而人不怨者以至清無情况於天地刑法豈宜恩貸奸慝然愼一胥吏耳素無文字雖知不可終語無條貫當州府秀才張審通辭彩雋拔足得備君管記府君令帖召之俄頃至審通曰此易耳君當判以狀申府君曰君善爲我辭即補左曹錄事仍賜衣服如董慎各給一𤣥狐每出即乘之審通判曰天本無私法宜畫一茍從恩貸是資奸行令狐實前命減刑已同私請程翥後申簿訴且異罪疑儻開逓減之科實失公家之論請依前付無間錄獄仍錄狀申天曹即有黃衫人持狀而往少頃復持天符曰所申文狀多起異端奉主之宜但合遵守周禮八議一曰議親又元化匱中釋冲符亦曰無不親是則典章昭然有何不可豈可使太元功徳不能庇三等之親仍敢愆違須有懲罰府君可罰不衣紫六十甲子餘依前處分府君大怒審通曰君爲判辭使我受譴即命左右取方寸肉塞其一耳遂無所聞審通訴曰乞更爲判申不允即甘當再罰府君曰君爲我去罪即更與君一耳審通又判曰天大地大本乃無親若使有親何由得一茍欲因情變法實將生僞䘮眞太古以前人猶至朴中古之降方聞各親豈可使太古育物之心生仲尼觀蜡之歎無不親是非公也何必引之請寛逆耳之辜敢薦沃心之藥庶其閲實用得平均令狐實等也請依正法仍錄狀申天曹黃衣人又持往須臾又有天符來曰再省所申甚爲允當府君可加六天副正使令狐實程翥等並正法置處府君即謂審通曰非君不可正此獄因命左右割下耳中肉令一小兒擘之爲耳安於審通額上曰塞君一耳與君三耳何如又謂慎曰甚頼君薦賢以成我羙然不可久留君當壽一周年相報耳君兼本壽得二十一年矣即送歸家使者復以泥封二人布囊各送至宅欻如寫出而顧問妻子妻子云君亡精魂已十餘日矣慎自此果二十一年而卒審通數日額覺痒遂踴出一耳通前三耳而踴出者尤聰時人笑曰天有九頭鳥地有三耳秀才亦呼爲鷄冠秀才者慎初思府君稱鄰後方知倨乃鄰字也出𤣥怪錄李靖衛公李靖始困於貧賤因過華山廟訴於神且請告以官位所至辭色抗厲觀者異之佇立良久乃出廟門百許步聞後大聲曰李僕射好去顧之不見人後竟至端揆出國史補太平廣記卷二百九十六
