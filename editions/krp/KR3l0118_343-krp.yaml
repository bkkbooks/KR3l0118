body:
  text: 太平廣記卷三百四十三宋李昉等編鬼二十八陸喬廬江馮媪竇玉李和子李僖伯陸喬元和初有進士陸喬者好為歌詩人頗稱之家於丹陽所居有臺沼號為勝境喬家富而好客一夕風月晴瑩有扣門者出視之見一丈夫衣冠甚偉儀狀秀逸喬延入與坐談議朗暢出於意表喬重之以為人無及者因請其名氏曰我沈約也聞君善詩故來候耳喬驚起曰某一賤士不意君之見臨也願得少留以侍談笑既而命酒約曰吾平生不飲酒非阻君也又謂喬曰吾友人范僕射雲子知之乎喬對曰某常讀梁史熟范公之名乆矣約曰吾將邀之喬曰幸甚約乃命侍者邀范僕射頃之雲至喬即拜延坐雲謂約曰休文安得而至是耶約曰吾慕主人能詩且好賓客歩月至此遂相談謔乆之約呼左右曰徃召青箱來俄有一兒至年可十歳餘風貎明秀約指謂喬曰此吾愛子也少聰敏好讀書吾甚憐之因以青箱名焉欲使傳吾學也不幸先吾逝今令謁君即命其子拜喬又曰此子亦好為詩近從吾與僕射同過臺城因命為感舊援筆立成甚有可觀即諷之曰六代舊江川興亡幾百年繁華今寂寞朝市昔諠闐夜月琉璃水春風卵色天傷時與懐古垂淚國門前喬嘆賞乆之因問約曰某常覽昭明所集之選見其編録詩句皆不拘音律謂之齊梁體自唐朝沈佺期宋之問方好為律詩青箱之詩乃效今體何哉約曰今日為之而為今體亦何訝乎雲又謂約曰昔我與君及元暉彦昇俱遊於竟陵之門日夕笑語盧博此時之懽不可追矣及蕭公禪代吾與君俱為佐命之臣雖位甚崇恩愈厚而心常憂惕無曩日之歡矣諸葛長民有言貧賤常思富貴富貴又踐危機此言不虚哉約亦吁嗟乆之又歎曰自梁及今四百年矣江山風月不異當時但人物潛換耳能不悲乎既而謂雲曰吾輩為蔡公郢州記室常夢一人告我曰吾君後當至端揆然終不及台司及吾為僕射尚書令論者頗以此見許而終不得乃知人事無非命也時夜已分雲謂約曰可歸矣因相與去謂喬曰此地當有兵起不過二歲喬送至門行未數步俱亡所見喬話於親友後歲餘李錡叛又一年而喬卒出宣室志廬江馮媪馮媪者廬江里中嗇夫之婦窮寡無子為鄉民賤棄元和四年淮楚大歉媪逐食於舒途經牧犢墅瞑值風雨止於桑下忽見路隅一室燈燭熒熒媪因詣求宿見一女子年二十餘容服美麗㩦三歳兒倚門悲泣前又見老叟與媪據牀而坐神氣慘戚言語呫囁有若徴索財物追逐之狀見馮媪至叟媪黙然捨去女乆乃止泣入户備餼食理牀榻邀媪食息焉媪問其故女復泣曰此兒父我之夫也明日别娶媪曰向者二老人何人也於汝何求而發怒女曰我舅姑也今嗣子别娶徴我筐筥刀尺祭祀舊物以授新人我不忍與是有斯責媪曰汝前夫何在女曰我淮隂令梁倩女適董氏七年有二男一女男皆隨父女即此也今前邑中董江即其人也江官為鄼丞家累巨産發言不勝嗚咽媪不之異又乆困寒餓得美食甘寢不復言女泣至曉媪辭去行二十里至桐城縣縣東有甲第張簾帷具羔雁人物紛然云今夕有官家禮事媪問其郎即董江也媪曰董有妻何更娶焉邑人曰董妻及女亡矣媪曰昨宵我遇雨寄宿董妻梁氏舍何得言亡邑人詢其處即董妻墓也詢其二老容貌即董江之先父母也董江本舒州人里中之人皆得詳之有告董江者董以妖妄罪之令部者迫逐媪去媪言於邑人邑人皆為感歎是夕董竟就婚焉元和六年夏五月江淮從事李公佐使至京回次漢南與渤海髙鉞天水趙儧河南宇文鼎㑹於傳舍宵話徴異各盡見聞鉞具道其事公佐為之傳出異聞録竇玉進士王勝葢夷元和中求薦於同州時賔舘填溢假郡功曹王翥第以俟試既而他室皆有客唯正堂以小繩繫門自牗而窺其内獨牀上有褐衾牀北有破籠此外更無有問其鄰曰處士竇三郎玉居也二客以西廂為窄思與同居甚嘉其無姬僕也及暮竇處士者一驢一僕乗醉而來夷勝前謁且曰勝求解於郡以賓舘喧故寓於此所得西廊亦甚窄君子既無姬僕又是方外之人願略同此室以俟郡試玉固辭接對之色甚傲夜深將寢忽聞異香驚起尋之則見堂中垂簾帷喧然語笑於是夷勝突入其堂中屏帷四合竒香撲人雕盤珍膳不可名狀有一女年可十八九妖麗無比與竇對食侍婢十餘人亦皆端妙銀鑪煮茗方熟坐者起入西廂帷中侍婢悉入曰是何兒郎突衝人家竇面色如土端坐不語夷勝無以致辭啜茗而出既下階聞閉户之聲曰風狂兒郎因何共止古人所以卜鄰者豈虚言哉竇辭以非己所居難拒異客必慮輕侮豈無他宅因復歡笑及明徃覘之盡復其故竇獨偃於褐衾中拭目方起夷勝詰之不對夷勝曰君晝為布衣夜㑹公族茍非妖幻何以致麗人不言其實即當告郡竇曰此固秘事言亦無妨比者玉薄遊太原晚發冷泉將宿於孝義縣陰晦失道夜投人莊問其主其僕曰汾州崔司馬莊也令人告焉出曰延入崔司馬年可五十餘衣緋儀貌可愛問竇之先及伯叔昆弟詰其中外自言其族乃玉親重其為表丈也玉自幼亦嘗聞此丈人但不知其官慰問慇懃情禮優重因令報其妻曰竇秀才乃是右衛將軍七兄之子是吾之重表姪夫人亦是丈母可見之從宦異方親戚離阻不因行李豈得相逢請即見有頃一青衣曰屈三郎入其中堂陳設之盛若王侯之居盤饌珍華味窮海陸既食丈人曰君今此遊將何所求曰求舉資耳曰家在何郡曰海内無家丈人曰君生涯如此身落然蓬遊無扺徒勞徃復丈人有侍女年近長成今便合奉事衣食之給不求於人可乎玉起拜謝夫人喜曰今夕甚佳又有牢饌親戚中配屬何必廣召賓客吉禮既具便取今夕謝訖復坐又進食食畢憇玉於西㕔具浴浴訖授衣巾引相者三人來皆聰朗之士一姓王稱郡法曹一姓裴稱户曹一姓韋稱郡督郵相揖而坐俄而禮輿香車皆具華燭前引自西㕔至中門展親御之禮因又遶莊一周自南門入及中堂堂中帷帳已滿成禮訖初三更其妻告玉曰此非人間乃神道也所言汾州陰道汾州非人間也相者數子無非㝠官妾與君宿縁合為夫婦故得相遇人神路殊不可乆住君宜即去玉曰人神既殊安得配屬以為夫婦便合相從何為一夕而别也妻曰妾身奉君固無遠近但君生人不合乆居於此君速命駕常令君箧中有絹百疋用盡復滿所到必求靜室獨居少用存想隨念即至十年之外可以同行未間晝别宵㑹爾玉乃入辭崔曰明晦雖殊人神無二小女得奉巾櫛葢是宿緣勿謂異𩔖遂猜薄之亦不可言於人公法訊問言亦無妨言訖得絹百疋而别自是每夜獨宿思之則來供帳饌具悉其㩦也若此者五年矣夷勝開其篋果有絹百疋因各贈三十疋求其秘之言訖遁去不知所在焉出𤣥怪錄李和子元和初上都東市惡少李和子父名努眼和子性忍常偷狗及猫食之為坊市之患常臂鷂立於衢見二人紫衣呼曰爾非李努眼子名和子乎和子即揖之又曰有故可隙處言也因行數步止於人外言㝠司追公可即去和子初不受曰人也何紿言又曰我即鬼因探懐中出一牒印文猶濕見其姓名分明為猫犬四百六十頭論訴事和子驚懼乃棄鷂拜祈之曰我分死耳必為我暫留當具少酒鬼固辭不獲已初將入畢羅肆鬼掩鼻不肯前乃延於旗亭李氏揖讓獨言人以為狂也遂索酒九碗自飲三碗六碗虛設於西座且求其為方便以免二鬼相顧我等受一醉之恩須為作計因起曰姑遲我數刻當返未移時至曰君辦錢四十萬為君假三年命也和子許諾以翌日及午為期因酬酒直且反其酒嘗之味如水矣冷復氷齒和子遽歸如期備酬焚之見二鬼挈其錢而去及三日和子卒鬼言三年人間三日也出酉陽雜俎李僖伯隴西李僖伯元和九年任温縣常為予說元和初調選時上都興道里假居早徃崇仁里訪同選人忽於興道東門北下曲馬前見一短女人服孝衣約長三尺已來言語聲音若大婦人咄咄似有所尤即云千忍萬忍終須决一塲我終不放伊彈指數下云大竒大竒僖伯鼓動後出心私異之亦不敢問日旰及廣衢車馬已閙此婦女為行路所怪不知其由如此兩日稍稍人多只在崇仁北街居無何僖伯自省門東出及景風門見廣衢中人閙已萬萬如東西隅之戲塲大圍之其間無數小兒環坐短女人在前布羃其首言詞轉無次第羣小兒大共嗤笑有人欲近之則來拿攫小兒又退如是日中看者轉衆短女人方坐有一小兒突前牽其羃首布遂落見三尺小青竹掛一髑髏髐然金吾以其事上聞出乾􅍧子太平廣記卷三百四十三
