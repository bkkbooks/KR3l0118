body:
  text: 太平廣記卷三百四十宋李昉等編鬼二十五韓弇盧頊李章武韓弇河中節度使侍中渾瑊與西蕃㑹盟蕃戎背信掌書記韓弇遇害弇素與櫟陽尉李績友因晝寢忽夢弇被髪披衣面目盡血績初不識乃稱姓名相勞勉如平生謂績曰今從秃髪大使填漳河憔悴困辱不可言間来奉詣耳别後有一詩奉呈悲吟曰我有敵國讐無人可為雪每至秦隴頭遊魂自嗚咽臨别謂績曰吾久饑渇君至明日午時於宅西南為置酒饌錢物亦平生之分盡矣績許之及悲愴待旦至午時如言祭之忽有黑風自西来旋轉筵上飄卷紙錢及酒食皆飛去舉邑人觀之時貞元四年出河東記盧頊貞元六年十月范陽盧頊家於錢塘妻𢎞農楊氏其姑王氏早歳岀家隸邑之安養寺頊宅於寺之北里有家婢曰小金年可十五六頊家貧假食於郡内郭西堰堰去其宅數十歩每令小金於堰主事常有一婦人不知何來年可四十餘著瑟瑟裙蓬髮曵漆履直詣小金坐自言姓朱第十二久之而去如是數日時天寒小金爇火以燎須臾婦人至顧見牀下炭怒謂小金曰有炭而焚烟薰我何也舉足踏火火即滅以手批小金小金絶倒於地小金有弟年可四五歳在旁大駭馳報於家家人至已失婦人而小金瞑然如睡其身殭强如束命巫人祀之釋然如是具陳其事居數日婦人至抱一物如狸狀而尖嘴捲尾尾𩔖犬身斑似虎謂小金曰何不食我猫兒小金曰素無為之奈何復批之小金又倒火亦撲滅童子奔歸以報家人至小金復瞑然又祝之隨而愈自此不令之堰後數日令小金引船於寺迎外姑船至寺門外寺殿後有一塔小金忽見塔下有車馬朱紫甚盛竚立而觀之即覺身不自制須臾車馬岀左右辟易小金遂倒見一紫衣人䇿馬問小金是何人旁有一人對答二人舉扶階上不令損紫衣者駐馬促後騎曰可速行冷淨地筵饌小金問旁人曰行何適人曰過大雲寺寺主家耳須臾車馬過盡其院中人來方見小金倒於堦上復驚異載歸祀酹之而醒是夕冬至除夜盧家方備粢盛之具其婦人鬼倐閃於牖户之間以其閙不得入盧生以二虎目繫小金左右臂夜久家人怠寢婦人忽曵小金驚呌婦人怒曰作餅子何不啖我家人驚起小金乃醒而左臂失一虎目忽忩外即言還你遂擲忩有聲燭之果得後數日視之帛裹乾茄子不復虎目矣冬至方旦有女巫來坐話其事未畢而婦人來小金即瞑然其女巫甚懼方食遂筴一枚餫飩置户限上祝之於時小金笑曰笑朱十二喫餫飩以兩手拒地合面於餫飩上吸之盧生以古鏡照之小金遂泣言朱十二母在鹽官縣若得一頓餫飩及顧船錢則不復來盧生如言遂訣别而去方欲焚錢財之時已見婦人背上負錢焚畢而去小金遂釋然居間者小金母先患風疾不能言忽於厨中應諾便入房切切然語岀大門良久摳衣濶歩而入若人騎馬狀直至堂而拜曰花容起居其家大驚花容即楊氏家舊婢死來十餘年語聲行動酷似之乃問花容何得來答曰楊郎遣來𫝊語娘子别久好在楊郎盧生舅也要小金母子故遣取來盧生具𫝊懇辭以留受語而岀門久之復命曰楊郎見𫝊語切令不用也急作紙人代之依言剪人題其名字焚之又言楊郎在安養寺塔上與楊二郎雙陸又問楊二郎是何人答曰神人耳又有木下三郎亦在其中又問小金前見車馬何人曰此是精魅耳本是東鄰吳家阿嫂朱氏平生苦毒罰作蛇身今在天竺寺楮樹中有穴久而能變化通靈故化作婦人又問既是蛇身如何得衣裳著答曰向某家塜中偷來又問前抱來者是何物言野狸遂辭去即酌一杯令飲飲訖更請一杯與門前鑊八問鑊八是何人云是楊二郎下行官又問楊二郎岀入如此人遇之皆禍否答曰如他楊二郎等神物岀入如風如雨在虚中下視人如螻蟻然命衰者則自禍耳他亦無意焉言訖而去至門方醒醒後問之皆不知也後小金夜夢一老人騎大獅子獅子如文殊所乗毛彩奮迅不可視旁有二崑崙奴操轡老人謂小金曰吾聞爾被鬼物纒繞故萬里來救汝是衰厄之年故鬼㸃爾作客去以取錢應㸃而已渠亦自得錢汝若不值我來至四月當被作土户汝則不免死矣汝於某日拾得綉佛子否小金曰然汝看此様綉取七軀佛子七口幡子言訖又曰作八口吾誤言耳八口一伴四口又截頭髮少許贖香以供養之其厄則除矣小金曰受教矣今苦腰背痛不可忍慈悲為除之老人曰易耳即令崑崙奴向前令展手便於手掌磨指則如墨漆染指上便背上㸃二灸處小金方醒具説其事即造佛及幡視背上信有二㸃處遂灸之背痛立愈盧頊秉志剛直不信其事又罵之曰焉有聖賢來救一婢此必是鬼耳其夜又夢老人曰吾哀爾疾危是以來救汝愚郎主却喚我作鬼魅也吾亦不計此事汝至四月必作土户然至三月末當須岀杭州界以避之矣夫鬼神所部州縣各異亦猶人有逃户小金曰於餘杭可乎老人曰餘杭亦杭州耳何益也又曰嘉興可乎曰可老人曰汝於嘉興投誰家答曰某家有親欲投之老人曰某家是孝汝今避鬼還投鬼家何益也凡孝有靈筵神道交通他則知汝所在汝投吉人家則可矣又臨發時脱汝所愛惜衣一事剪去身留領縫襟帶餘處盡去之縛一草人衣之著宅之隂闇處汝則易衣而潛去也小金曰諾聖賢前度灸背當時獲愈今尚苦腰痛老人曰吾前不除爾腰者令爾知有我耳汝今欲除之耶復於崑崙手掌中研黑㸃腰間一處而去悟而驗之信有㸃跡便灸之又差其後婦人亦不來矣至三月盡如言潛之嘉興自後無事出通幽録李章武李章武字飛其先中山人生而敏博遇事便了工文學皆得極至雖𢎞道自髙惡為潔飾而容貌閑美即之温然與清河崔信友善信亦雅士多聚古物以章武精敏每訪辨論皆洞逹𤣥㣲研究原本時人比晉之張華貞元三年崔信任華州别駕章武自長安詣之數日出行於市北街見一婦人甚美因紿信云須州外與親故知聞遂賃舍於美人之家主人姓王此則其子婦也乃悦而私焉居月餘日所計用直三萬餘子婦所供費倍之既而兩心克諧情好彌切無何章武繋事告歸長安殷勤叙别章武留交頸鴛鴦綺一端仍贈詩曰鴛鴦綺知結幾千絲别後尋交頸應傷未别時子婦答白玉指環一又贈詩曰捻指環相思見環重相憶願君永持玩循環無終極章有僕楊果者子婦齎錢一千以奬其敬事之勤既别積八九年章武家長安亦無從與之相聞至貞元十一年因友人張元宗寓居下邽縣章武又自京師與元宗㑹忽思曩好乃廽車渉渭而訪之日瞑逹華州將舍於王氏之室至其門則閴無行跡但外有賔榻而已章武以為下里或廢業即農暫居郊野或親賔邀聚未始歸復但休止其門將别適他舍見東鄰之婦就而訪之乃云王氏之長老皆捨業而岀遊其子婦歿已再周矣又詳與之談即云某姓楊第六為東鄰妻復訪郎何姓章武具語之又云曩曾有傔姓楊名果乎曰有之因泣告曰某為里中婦五年與王氏相善嘗云我夫室猶如𫝊舍閲人多矣其於徃來見調者皆殫財窮産甘辭厚誓未嘗動心頃歳有李十八郎曾舍於我家我初見之不覺自失後遂私侍枕席實䝉歡愛今與之别累年矣思慕之心或竟日不食終夜無寢我家人故不可託復被彼夫東西不時㑹遇脱有至者願以物色名氏求之如不參差相託祗奉并語深意但有僕夫楊果即是不二三年子婦寢疾臨死復見託曰我本寒㣲曾辱君子厚顧心常感念久以成疾自料不治曩所奉託萬一至此願申九泉啣恨詩曰分従幽顯隔豈謂有佳期寧辭重重别所嘆去何之因相持泣良久子婦又贈詩曰昔辭懐後㑹今别便終天新悲與舊恨千古閉窮泉章武答曰後期杳無約前恨已相尋别路無行信何因得寄心欵曲叙别訖遂却赴西北隅行數歩猶回顧拭淚云李郎無捨念此泉下人復哽咽佇立視天欲明急趨至角即不復見但空室窅然寒燈半滅而已章武乃促裝却自下邽歸長安武定堡下邽郡官與張元宗擕酒宴飲既酣章武懐念因即事賦詩曰水不西歸月暫圓令人惆悵古城邊蕭條明早分岐路知更相逢何歳年吟畢與郡官别獨行數里又自諷誦忽聞空中有嘆賞音調悽惻更審聽之乃王氏子婦也自云㝠中各有地分今於此别無日交㑹知郎思眷故冒隂司之責逺來奉送千萬自愛章武愈惑之及至長安與道友隴西李助話亦感其誠而賦曰石沉遼海濶劍别楚天長㑹合知無日離心滿夕陽章武既事東平丞相府因閒召玉工視所得靺鞨寶工亦知不敢雕刻後奉使大梁又召玉工麄能辨乃因其形雕作檞葉𧰼奉使上京每以此物貯懐中至市東街偶見一胡僧忽近馬叩頭曰君有寶玉在懐乞一見爾乃引於静處開視僧捧玩移時云此天上至物非人間有也章武後往來華州訪遺楊六娘至今不絶出李景亮為作𫝊太平廣記卷三百四十
