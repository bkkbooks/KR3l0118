body:
  text: 太平廣記卷八十一異人一韓稚幸靈趙逸梁四公韓稚漢惠帝時天下太平干戈偃息逺國殊鄉重譯來貢時有道士韓稚者終之裔也越海而來云是東海神君之使聞聖徳洽于區宇故恱服而來庭時東極扶桑之外有泥離國亦來朝於漢其人長四尺兩角如蠒牙出於脣自腰已下有垂毛自蔽居於深穴其壽不可測也帝云方士韓稚解絶國言問人壽㡬何經見㡬代之事答云五運相因遞生遞死如飛塵細雨存歿不可論算問女媧已前可聞乎對曰蛇身已上八風均四時序不以威恱攬乎精運又問燧人以前答曰自鑽火變腥以來父老而慈子夀而孝犧軒以往屑屑焉以相誅滅浮靡囂薄淫於禮亂於樂世俗澆偽淳風墜矣稚具以聞帝曰悠哉杳昧非通神逹理者難可語乎斯道矣稚亦以斯而退莫知所之出王子年拾遺記幸靈晉幸靈者豫章建昌人也立性少言與人羣居𬒳人侵辱而無慍色邑里皆號為癡父兄亦以為癡常使守稻有牛食稻靈見而不驅待牛去乃整理其殘亂者父見而怒之靈曰夫萬物生天地之間各得其意牛方食禾奈何驅之父愈怒曰即如汝言復用理壞者何為靈曰此稻又得終其性矣時順陽樊長賓為建昌令發百姓作官船令人作楫一雙靈作訖而未輸俄而被人竊竊者心痛欲死靈曰爾無竊吾楫子乎竊者不應須臾痛甚靈曰爾不以情告我者死竊者急乃首應靈於是以水飲之病乃愈船成以數十人引一艘不動靈助之船乃行從此人皆畏之或稱其神有龔仲儒女病積年氣息纔屬靈以水噀之應時大愈又吕猗母黄氏痿痺一十餘年靈去黄氏數尺而坐瞑目寂然有頃謂猗曰扶夫人起猗曰得疾累年不可卒起靈曰試扶起於是兩人扶以立又令去扶人即能自行乃留水一器令飲之髙悝家内有鬼怪言語器物自行大以巫祝厭之而不能絶靈至門見符甚多曰以邪救邪豈得已乎竝使焚之其鬼怪遂絶從爾已後百姓奔赴如雲靈救愈者多不敢報謝立性至柔見人即先拜輒自稱名凡草木之夭傷於山林者必起埋之器物傾覆於途路者必舉正之出豫章記趙逸後魏崇義里有杜子休宅地形顯敞門臨御路時有隱士趙逸者云是晉武時人晉朝舊事多所記録正光初來至京師見子休宅歎息曰此是晉朝太康寺也時人未之信問其由答曰龍驤將軍王濬平吳後立此寺本有三層浮圖用塼為之指子休園曰此是故處子休掘而驗之果得塼數萬并有石銘云晉太康六年嵗次乙己九月甲戌朔八日辛已儀同三司襄陽侯王濬敬造時園中果菜豐蔚林木扶疎乃服逸言號為聖人子休遂捨宅為靈應寺所得之塼造三層浮屠好事者問晉朝京師何如今日逸曰晉朝民少於今日王侯第宅與今日相似又云自永嘉已來二百餘年建國稱王者十有六君吾皆遊其都鄙目見其事國滅之後觀其史書皆非實録莫不推過於人引善自向苻生雖好勇嗜酒亦仁而不殺觀其治典未為凶暴及詳其史天下之惡皆歸焉苻堅自是賢主賊君取位妄書生惡凡諸史官皆此𩔖也人皆貴逺賤近以為信然當今之人亦生愚死智惑已甚矣問其故逸曰生時中庸之人耳及其死也碑文墓誌莫不窮天地之大徳生民之能事為君共堯舜連衡為臣與伊尹等跡牧民之官浮虎慕其清塵執法之吏埋輪謝其梗直所謂生為盜跖死為夷齊妄言傷正華詞損實當時作文之士慙逸此言步兵校尉李登問曰太尉府前塼浮圖形製甚古未知何年所造逸云晉義熙十二年劉裕伐姚泓軍人所作汝南王聞而異之因問何所服餌以致延年逸云吾不閑養生自然長壽郭璞常為吾筮云壽年五百嵗今始餘半帝給步挽車一乗逰扵市里所經之處多說舊跡三年已後遁去莫知所在出洛陽伽藍記梁四公梁天監中有􅞺闖上音攜下琛去䨲杰上萬下桀䴰䵎上蜀下湍仉䀾上掌下覩四公謁武帝帝見之甚恱因命沈隱侯約作覆將與百寮共射之時太史適獲一鼠約匣而緘之以獻帝筮之遇蹇艮下坎上之噬嗑震下離上帝占成羣臣受命獻卦者八人有命待成俱出帝占決寘諸青蒲申命闖公揲蓍對曰聖人布卦其𧰼吉矣依𧰼辯物何取異之請從帝命卦時八月庚子日巳時闖公奏請沈約舉帝卦上一蓍以授臣既撰占成置于青蒲而退讀帝占曰先蹇後噬嗑是其時内艮外坎是其象坎為盜其鼠也居蹇之時動而見嗑其拘繫矣噬嗑六爻四无咎一利艱貞非盜之事上九荷校滅耳凶是因盜獲戾必死鼠也羣臣蹈舞呼萬嵗帝自矜其中頗有喜色次讀八臣占詞或辯於色或推於氣或取於象或演於爻或依鳥獸龜龍隂陽飛伏其文雖𤣥逺然皆無中者末啓闖公占曰時日王相必生鼠矣且隂陽晦而入文明從靜止而之震動失其性必就擒矣金盛之月制之必金子為鼠辰與艮合體坎為盜又為𨼆伏𨼆伏為盜是必生鼠也金數於四其鼠必四離為文明南方之卦日中則昃况隂𩔖乎離之繇曰死如棄如實其事也日斂必死既見生鼠百寮失色而尤闖公曰占辭有四今者唯一何也公曰請剖之帝性不好殺自恨不中及至日昃鼠且死矣因令剖之果姙三子是日帝移四公於五明殿西閣示更親近其實囚之唯朔望伏臘得於義賢堂見諸學士然有軍國疑議莫不參預焉大同中盤盤國丹丹國扶昌國髙昌國遣使獻方物帝令有司設充庭法駕雅樂九闋百寮具朝服如元正之儀帝問四公異國來庭爵命髙下欲以上公秩加之䵎公曰成王太平周公輔政越裳氏重譯來貢不聞爵命及之春秋邾楚之君爵不加子設使其君躬聘依禮經位止子男若加以上公恐非稽古帝固謂䵎公更詳定之俄屬暴風如旋輪曳帝裙帶帝又問其事公曰明日亦未果請他日議之帝不懌學士羣誹之向夕帝女墜閣而死禮竟不行後詰之對曰旋風襲衣愛子暴殞更何疑焉高昌國遣使貢鹽二顆顆大如斗狀白似玉乾蒲桃刺蜜凍酒白麥麪王公士庶皆不之識帝以其自萬里絶域而來獻數年方達文字言語與梁國畧同經三日朝廷無祇對者帝命杰公迓之謂其使曰鹽一顆是南燒羊山月望收之者一是北燒羊山非月望收之者蒲桃七是洿林三是無半凍酒非八風谷所凍者又以高寧酒和之刺蜜是鹽城所生非南平城者白麥麪是宕昌者非昌壘真物使者具陳實情麪為經年色敗至宕昌貿易填之其年風災蒲桃刺蜜不熟故駁雜鹽及凍酒奉王急命故非時爾因又問紫鹽䃜珀云自中路遭北涼所奪不敢言之帝問杰公羣物之異對曰南燒羊山鹽文理麤北燒羊山鹽文理密月望收之者明徹如氷以氊橐煮之可驗蒲桃洿林者皮薄味美無半者皮厚味苦酒是八風谷凍成者終年不壊今臭其氣酸洿林酒滑而色淺故云然南平城羊刺無葉其蜜色明白而味甘鹽城羊刺葉大其蜜色青而味薄昌壘白麥麪烹之將熟潔白如新今麪如泥且爛由是知蜜麥之偽耳交河之間平磧中掘深數尺有末鹽如紅如紫色鮮味甘食之止痛更深一丈下有䃜珀黑逾純漆或大如車輪末而服之攻婦人小腸癥瘕諸疾彼國珍異必當致貢是以知之杰公嘗與諸儒語及方域云東至扶桑扶桑之𧖟長七尺圍七寸色如金四時不死五月八日嘔黄絲布於條枝而不為蠒脆如綖燒扶桑木灰汁煮之其絲堅韌四絲為係足勝一鈞𧖟卵大如鷰雀卵産於扶桑下齎卵至句麗國𧖟變小如中國𧖟耳其王宫内有水精城可方一里天未曉而明如晝城忽不見其月便蝕西至西海海中有島方二百里島上有大林林皆寳樹中有萬餘家其人皆巧能造寳器所謂拂林國也島西北有坑盤㘭深千餘尺以肉投之鳥銜寳出大者重五斤彼云是色界天王之寳藏四海西北無慮萬里有女國以蛇為夫男則為蛇不噬人而宂處女為臣妾官長而居宫室俗無書契而信呪咀直者無他曲者立死神道設教人莫敢犯南至火洲之南炎崑山之上其土人食蝑蠏蚺蛇以辟熱毒洲中有火木其皮可以為布炎丘有火鼠其毛可以為褐皆焚之不灼汙以火浣北至黑谷之北有山極峻造天四時氷雪意燭龍所居晝無日北向更明夜直上觀北極西有酒泉其水味如酒飲之醉人北有漆海毛羽染之皆黑西有乳海其水白滑如乳三海間方七百里水土肥沃大鴨生駿馬大鳥生人男死女活鳥自銜其女飛行哺之銜不勝則負之女能跬歩則為酋豪所養女皆殊麗美而少夀為人姬媵未三十而死有兎大如馬毛潔白長尺餘有貂大如狼毛純黑亦長尺餘服之禦寒朝廷聞其言拊掌笑謔以為誑妄曰鄒衍九州王嘉拾遺之談耳司徒左長史王筠難之曰書傳所載女國之東𧖟崖之西狗國之南羌夷之别種一女為君無夫蛇之理與公說不同何也公曰以今所知女國有六何者北海之東方夷之北有女國天女下降為其君國中有男女如他恒俗西南夷板楯之西有女國其女悍而男恭女為人君以貴男為夫置男為妾媵多者百人少者匹夫昆明東南絶徼之外有女國以猿為夫生男𩔖父而入山谷晝伏夜遊生女則巢居穴處南海東南有女國舉國惟以鬼為夫夫致飲食禽獸以養之勃律山之西有女國方百里山出台虺之水女子浴之而有孕其女舉國無夫并蛇六矣昔狗國之南有女國當漢章帝時其國王死妻代知國近百年時稱女國後子孫還為君若犬夫猿夫鬼夫水之國博知者已知之矣故畧而不論俄而扶桑國使使貢方物有黄絲三百斤即扶桑𧖟所吐扶桑灰汁所煮之絲也帝有金爐重五十斤係六絲以懸鑪絲有餘力又貢觀日玉大如鏡方圓尺餘明徹如琉璃暎日以觀見日中宫殿皎然分明帝令杰公與使者論其風俗土地物産城邑山川并訪往昔存亡又識使者祖父伯叔兄弟使者流涕拜首具言情實間嵗南海商人齎火浣布三端帝以雜布積之命杰公以他事召至於市所杰公遙識曰此火浣布也二是緝木皮所作一是續鼠毛所作以詰商人具如杰公所説因問木鼠之異公曰木堅毛柔是何别也以陽燧火山隂柘木爇之木皮改常試之果驗明年冬扶南大舶從西天竺國來賣碧玻璃鏡面廣一尺五寸重四十斤内外皎潔置五色物於其上向明視之不見其質問其價約錢百萬貫文帝令有司算之傾府庫償之不足其商人言此色界天王有福樂事天澍大雨衆寳如山納之山藏取之難得以大獸肉投之藏中肉爛黏寳一鳥衘出即此寳焉舉國不識無敢酬其價者以示杰公公曰上界之寳信矣昔波羅尼斯國王有大福得獲二寳鏡鏡光所照大者三十里小者十里至𤣥孫福盡天火燒宫大鏡光明能禦災火不至焚爇小鏡光微為火所害雖光彩昧暗尚能辟諸毒物方圓百歩蓋此鏡也時王賣得金二千餘斤遂入商人之手後王福薄失其大寳收奪此鏡却入王宫此王十世孫失道國人將謀害之此鏡又出當是大臣所得其應入於商賈其價千金傾竭府庫不足也因命杰公與之論鏡由是信伏更問此是瑞寳王令貨賣即應大秦波羅奈國失羅國諸大國王大臣所取汝輩胡客何由得之必是盜竊至此耳胡客逡巡未對俄而其國遣使追訪至梁云其鏡為盜所竊果如其言後有魏使頻至亦言黑貂白兎鴨馬女國往往入京梁朝卿士始信杰公周遊六合出入百代言不虚說皆為美談故其多聞强識博物辯惑雖仲尼之詳大骨子産之說臺駘亦不是過矣後魏天平之歳當大同之際彼此俗阜時康賢才鼎盛其朝廷專對稱人物士流及應對禮賓則䀾公獨預之為問答皆得先鳴所以出使外郊宴會賓客使彼落其術内動挫詞鋒機不虚發舉無遺䇿腎公之力也魏興和二年遣崔敏陽休之來聘敏字長謙清河東武城人博學贍文當朝第一與太原王延業齊名加以天文律厯醫方藥品卜論既至帝𨕖碩學沙門十人於御對百寮與之談論多屈於敏帝賜敏書五百餘卷他物倍之四公進曰崔敏學問疎淺不足上軫沖襟命臣䀾敵之必死帝從之初江東論學有十二沙門論以條疏徴覈有中觀論以乘寄蕭然言名理者宗仰其術北朝有如實論質定宗禮有廻諍論借機破義敏揔南北二業皆精又桑門所專唯在釋氏若儒之與道蔽於未聞敏兼三教而擅之頗有徳色䀾公嘗於五天竺國以梵語精理問論中分别論大無畏論因明論皆窮理盡妙腎公貎寢形陋而聲氣清暢敏既頻勝羣僧而乃傲形於物其日帝於淨居殿命䀾公與敏談論至若三光四氣五行十二支十干八宿風雲氣候金丹玉液藥性針道六性五藴隂陽厯數韜畧機權飛伏孤虚鬼神情狀始自經史終於老釋凡十餘日辯揚六藝百氏與敏互為主客立談絶倒觀者莫不盈量忘歸然敏詞氣似沮於䀾不自得因而成病輿疾北歸未達中路而卒出梁四公記太平廣記卷八十一
