body:
  text: 太平廣記卷四百十五草木十木怪張叔髙陸敬叔聶友董竒趙翼魏佛陁臨淮將崔導賈秘薛𢎞機盧䖍僧智通江夏從事木怪張叔髙桂陽太守江夏張遼字叔髙留其使家居買田田中有大𣗳十餘圍扶疎葢數畝地不生榖遣客伐之有赤汁六七斗出客驚怖歸具白叔髙髙怒曰𣗳老赤汁有何等血因自行復斫之血大流灑叔髙使先斫其枝有一空處見白頭公可長四五尺忽出往叔髙叔髙乃逆格之如此凡數四顧左右皆怖伏地而叔髙恬如也徐熟視非人非獸遂伐其木是歲司空辟髙為侍御史兖州刺史以居二千石之尊過鄉里薦祝祖考竟無他怪出風俗通陸敬叔吴先主時陸敬叔為建安郡太守使人伐大樟𣗳不數斧有血出𣗳斷有物人面狗身從𣗳中出敬叔曰此名彭侯乃烹食之白澤圖曰木之精名彭侯狀如黒狗無尾可烹食之出捜神記聶友吳聶友字文悌豫章新塗人少時貧賤常好射獵見一白鹿射之中尋踪血盡不知所在饑困卧梓𣗳下仰見所射鹿箭著𣗳枝怪之於是還家賫糧命子弟持斧伐之𣗳有血遂截為二板牽置陂中常沉時復浮出出家必有言友欲迎賔客常乗此版或于中流欲沒客大懼友呵之復浮仕官如願位至丹陽太守其板忽隨至石頭友驚曰此陂中版来必有意因解職還家二板挾兩邊一日即至自爾後板出或為凶禍今新塗北二十里餘曰封谿有聶友截梓𣗳版濤牂柯處牂柯有樟𣗳今猶存乃聶友回日所栽枝葉皆向下生出捜神記董竒京兆董竒庭前有大𣗳隂暎甚佳後霖雨竒獨在家鄉有小吏言大承雲府君来乃見承雲著通天冠長八尺自稱為方伯某第三子有雋才方當與君周旋明日覺𣗳下有異每晡後無人輙有一少年就竒語戲或命取飲食如是半年竒氣強壯一門無疾竒後適下墅其僕客三人送䕶言𣗳材可用欲貨之郎常不聽今試共斬斫之竒遂許之神亦自爾絶矣出幽明録趙翼永嘉松陽趙翼以義熙中與大兒鮮共伐山桃𣗳有血流驚而止後忽失第三息所在經十日自歸聞空中有語聲或歌哭翼語之曰汝既是神何不與我相見答曰我正氣耳舍北有大楓𣗳南有孤峯名曰石樓四絶壁立人獸莫履小有失意便取此兒著𣗳杪及石樓上舉家叩頭請之然後得下出異苑魏佛陁梁末蔡州市席家空宅相承云凶不可居有囘防都督軍人魏佛陁將火入宅前堂止息曛黄之際堂舍有一物人面狗身無尾在舍跳躑佛陁輓弓射之一發即不復見明日發屋看箭飲羽得一朽木可長尺許下有凝血自後遂絶出五行記臨淮將上元中臨淮諸將等乗夜宴集燔炙猪羊芬馥備至有一巨手從牕中入言乞一臠衆皆不與頻乞數四終亦不與乃潛結繩作彄施于孔所紿云與肉手復入因而繫其臂牽輓甚至而不能脱欲明乃朴然而斷視之是一楊枝持以求𣗳近至河上以碎斷往往有血出廣異記崔導唐荆南有富人崔導者家貧乏偶種橘約千餘株每歲大獲其利忽一日有一株化為一丈夫長丈餘求見崔導導初怪之不敢出丈夫苦求之導遂出見之丈夫曰我前生欠君錢百萬未償而死我家人復自欺君乃上訴于天是以令我合門為橘計傭于君僅能滿耳今上帝有命哀我族屬復我本形兼我自省前事止如再宿耳君幸為我置一敝廬我自耕鑿以卒此生君仍盡剪去橘𣗳端居守常則能自保不能者天降禍矣何者昔百萬之資今已足矣導大驚乃皆如其言即為葺廬且盡伐去橘𣗳後五年而導卒家復貧其人亦不知所在出瀟湘録賈秘順宗時書生賈秘自睢陽之長安行至古洛城邊見緑野中有數人環飲自歌自舞秘因詣之數人忻然齊起揖秘同席秘既見七人皆儒服俱有禮乃問之曰觀數君子士流也乃敢聚飲于野四望無人有一人言曰我輩七人皆負濟世之才而未用於時者亦猶君之韜蘊而方謀仕進也我軰適偶㑹論之間君忽辱臨幸且共芳樽惜美景以古之興亡為警覺以人間用捨為擬議又何必渉綺閣入龍舟而方盡一醉也秘甚怪之不覺肅然致敬及懽笑久而七人皆逓相目若有所疑乃問秘曰今既接髙論奚不一示君之芳猷使我軰服君而不疑也秘乃起而言曰余睢陽人也少好讀書頗識古者王霸之道今聞皇上纂嗣大寳開直言之路欲一叩象闕少伸愚誠亦不敢取富貴但一豁鄙懷耳適見七君子髙㑹故来詣之幸無遐棄可也其一人顧諸輩笑曰他人自道必可無傷吾屬斷之行當敗缺其一人曰已雖勿言人其捨我一人曰此君名秘固當為我匿瑕矣乃笑謂秘曰吾輩是七𣗳精也其一曰松二曰栁三曰槐四曰桑五曰棗六曰栗七曰樗今各言其志君幸聽而秘之其松精乃起而言曰我本處空山非常材也負堅貞之節雖霜凌雪犯不能易其操設若哲匠搆大厦揮斤斧長短之木各得其用榱桷雖衆而欠梁棟我即必備棟梁之用也我得其利則永無傾危之患矣其次一人起言曰我之風流之名聞于古今但恨煬帝不回無人見知張緒效我空耀載籍所喜者絮飛則才子咏詩葉嫩則佳人學畫柔勝剛强且自保其性也其次者曰我受陽和之恩為不材之木大川無梁人不我取大厦無棟人不我用若非遭郢匠之斵則必不合于長短大小也噫倚我者有三公之名矣其次者言曰我平生好吞無辭吐飼不異惟食𧖟即繭繭而絲絲為紈綺紈綺入貴族之用設或貴族之流見紈綺之美麗以念我我又豈須大為梁棟小為榱桷者也其次者曰我自辯士蘇秦入燕之日已推我有兼濟之名也不唯漢武帝號為束束投我者足表赤心我又奚慮不為人所知也其次曰我雖處蓬蓽性實恬然亦可以濟大國之用也倘人主立宗廟䖍祀饗而法古以用我我實可以使民之戰慄也其次曰我與衆何殊也天亦覆我地亦載我春即榮秋即落近世人以我為不材我實常懷憤惋我不處澗底怎見我有凌雲之勢我不在宇下焉知我是搆厦之材驥不騁即駑馬也玉不剖即頑石也固不必松即可搆厦凌雲我即不可搆厦凌雲此所謂信一人之言大喪其真矣我所以慕隱淪之輩且韜藏其迹我若逢陶侃之一見即又用之有餘也言訖復自歌自舞秘聞其言大怖坐不安席遽起辭之七人乃共勸酒一盃謂秘曰天地間人與萬物皆不可測慎勿輕之秘飲訖謝之而去出瀟湘記薛𢎞機東都渭橋銅駞坊有隱士薛𢎞機營蝸舎渭河之隈閉戸自處又無妻僕每秋時隣𣗳飛葉入庭亦掃而聚焉盛以紙囊逐其彊而歸之常於座隅題其詞曰夫人之計将茍前非且不可執我見不從於衆亦不可人生實難唯在虚中行道耳居一日殘陽西頹霜風入户披褐獨坐仰張邴之餘芳忽有一客造門儀狀瓌古隆準龎眉方口廣顙嶷然四皓之比衣皁霞裘長揖薛𢎞機曰足下性尚幽遁道著嘉肥僕所居不遥嚮慕足下操履特相詣𢎞機一見相得切磋今古遂問姓氏其人曰藏經姓栁即便歌唫清夜將艾云漢興叔孫為禮何得以死喪婚姻而行二載制度吾所惑焉歌曰寒水停圓沼秋池滿敗荷杜門窮典籍所得事今多𢎞機好易因問藏經則曰易道深微未敢學也且劉氏六説只明詩書禮樂及春秋而亡于易其實五説是道之難𢎞機甚喜此論言訖辭去窣颯有聲𢎞機望之隱隱然丈餘而沒後問諸鄰悉無此色𢎞機苦思藏經丈不知所尋月餘又詣𢎞機𢎞機每欲相近藏經輙退𢎞機逼之微聞朽薪之氣藏經隱至明年五月又来乃謂𢎞機曰知音難逢日月易失心親道曠室邇人遐吾有一絶相贈請君記焉詩曰誰謂三才貴余觀萬化同心虚嫌蠧食年老怯狂風吟訖情意搔然不復從容出門而西遂失其踪是夜惡風發屋拔𣗳明日魏王池畔有大枯栁為烈風所拉折其内不知誰人藏經百餘卷盡爛壞𢎞機往収之多為雨漬斷皆失次第内唯無周易𢎞機嘆曰藏經之謂乎建中年事出乾􅍧子盧䖍東洛有故宅其堂奥軒級甚宏特然居者多暴死是以空而鍵之且久故右散騎常侍萬陽盧䖍貞元中為御史分察東臺常欲貿其宅而止焉或曰此宅有怪不可居䖍曰吾自能弭之後一夕䖍與從吏同寢其堂命僕使盡止於門外從吏勇悍善射於是執弓矢坐前軒下夜將深聞有叩門者從吏即問之應聲曰栁將軍遣奉書於盧侍御䖍不應已而投一幅書軒下字似濡筆而書者㸃畫纎然䖍命從吏視其字云吾家於此有年矣堂奥軒級皆吾之居也門神戸靈皆吾之隸也而君突入吾舎豈其理耶假令君有舎吾入之可乎既不懼吾寜不愧於心耶君速去勿招敗亡之辱讀既畢其書飄然四散若飛燼之狀俄又聞有言者栁將軍願見盧御史已而有大厲至身長數十尋立庭手執一瓢其從吏即引滿而發中所執其厲遂退委其瓢久之又来俯軒而立俛其首且窺焉貌甚異從吏又射之中其胸厲驚若有懼遂東向而去至明䖍命窮其跡至宅東隙地見栁髙百餘尺有一矢貫其上所謂栁將軍也䖍伐其薪自此其宅居者無恙後歲餘因重搆堂室於屋瓦下得一瓢長約丈餘有矢貫其柄即將軍所執之瓢也出宣室志僧智通臨湍寺僧智通常持法華經入禪宴坐必求寒林浄境殆非人跡所至處經年忽夜有人環其院呼智通至曉聲方息歴三夜聲侵户智通不耐因應曰呼我何事可入来言也有物長六尺餘皁衣青面張目巨吻見僧初亦合手智通熟視良久謂曰爾寒乎就此向火物乃就坐智通但念經至五更物為火所醉因閉目開口據爐而鼾智通觀之乃以香匙舉灰火寘其口中物大呼起至門若蹶聲其寺背山智通及明視蹶處得木皮一片登山尋之數里見大青桐𣗳梢已老矣其下凹根若新缺僧以木皮附之合無綖隙其半有薪者創成一蹬深六七寸餘葢魅之口灰火滿其中久猶熒熒智通焚之其怪遂絶出酉陽雜俎江夏從事大和中有從事江夏者其官舎嘗有怪異每夕見一巨人身盡黒甚光見之即悸而病死後有許元長者善視鬼從事命元長以符術考召後一夕元長坐于堂西軒下巨人忽至元長出一符飛之中其臂剨然有聲遂墮于地巨人即去元長視其墮臂乃一枯木枝至明日有家僮謂元長曰堂之東北隅有枯𣗳焉先生符今在其上即往視之其𣗳有枝梢折者果巨人所斷臂也即伐而焚之宅遂無怪出宣室志太平廣記卷四百十五
