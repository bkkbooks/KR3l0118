body:
  text: 太平廣記卷四百八十六宋李昉等編雜傳記三長恨傳無䨇傳長恨傳陳鴻譔唐開元中泰階平四海無事𤣥宗在位歲久勌於旰食宵衣政無大小始委於丞相稍深居逰宴以聲色自娱先是元獻皇后武淑妃皆有寵相次即世宫中雖良家子千萬數無悦目者上心忽忽不樂時毎歲十月駕幸華清宫内外命婦焜燿景従浴日餘波賜以湯沐春風靈液淡蕩其間上心油然恍若有遇顧左右前後粉色如土謁髙力士潛搜外宫得𢎞農楊𤣥琰女於夀邸既笄矣鬂髪膩埋纎穠中度舉止閒冶如漢武帝李夫人别疏湯泉詔賜澡瑩既出水體弱力微若不任羅綺光彩煥發轉動照人上甚悦進見之日奏霓裳羽衣以導之定情之夕授金釵鈿合以固之又命戴步揺垂金璫明年冊為貴妃半后服用由是冶其容敏其詞婉孌萬態以中上意上益嬖焉時省風九州泥金五嶽驪山雪夜上陽春朝與上行同輦止同室宴専席寝専房雖有三夫人九嬪二十七世婦八十一御妻暨後官才人樂府妓女使天子無顧盼意自是六宫無復進幸者非徒殊艶尤態獨能致是葢才知明慧善巧便佞先意希㫖有不可形容者焉叔父昆弟皆列在清貴爵為通侯姊妹封國夫人富埒王室車服邸第與大長公主侔而恩澤勢力則又過之出入禁門不問京師長吏為之側目故當時謡詠有云生女勿悲酸生男勿歡喜又曰男不封侯女作妃君看女却為門楣其為人心羡慕如此天寳末兄國忠盜丞相位愚弄國柄及安禄山引兵向闕以討楊氏為辭潼闗不守翠華南幸出咸陽道次馬嵬六軍徘徊持㦸不進従官郎吏伏上馬前請誅錯以謝天下國忠奉氂纓盤水死於道周左右之意未快上問之當時敢言者請以貴妃塞天下之怒上知不免而不忍見其死反袂掩面使牽而去之倉皇展轉竟就絶於尺組之下既而𤣥宗狩成都肅宗禪靈武明年大兇歸元大駕還都尊𤣥宗為太上皇就養南宫自南宫遷於西内時移事去樂盡悲來毎至春之日冬之夜池蓮夏開宫槐秋落梨園弟子玉管發音聞霓裳羽衣一聲則天顔不怡左右欷歔三載一意其念不衰求之夢魂杳沓而不能得適有道士自蜀來知上心念楊妃如是自言有李少君之術𤣥宗大喜命致其神方士乃竭其術以索之不至又能逰神馭氣出天界没地府以求之又不見又旁求四虚上下東極絶天涯跨蓬壺見最髙仙山上多樓閣西廂下有洞户東向闚其門署曰玉妃太真院方士抽簮扣扉有雙鬟童出應門方士造次未及言而雙鬟復入俄有碧衣侍女至詰其所従來方士因稱唐天子使者且致其命碧衣云玉妃方寝請少待之於時雲海沉沉洞天日晚瓊户重闔悄然無聲方士屏息歛足拱手門外久之而碧衣延入且曰玉妃出俄見一人冠金蓮披紫綃珮紅玉曳鳳舄左右侍者七八人揖方士問皇帝安否次問天寳十四載已還事言訖憫然指碧衣女取金釵鈿合各折其半授使者曰為謝太上皇謹獻是物尋舊好也方士受辭與信將行色有不足玉妃因徵其意復前跪致詞乞當時一事不聞於他人者騐於太上皇不然恐鈿合金釵罹新垣平之詐也玉妃茫然退立若有所思徐而言曰昔天寳十年侍輦避暑驪山宫秋七月牽牛織女相見之夕秦人風俗夜張錦繡陳飲食𣗳花燔香於庭號為乞巧宫掖間尤尚之時夜始半休侍衛於東西廂獨侍上上憑肩而立因仰天感牛女事宻相誓心願世世為夫婦言畢執手各嗚咽此獨君王知之耳因自悲曰由此一念又不得居此復於下界且結後縁或在天或在人决再相見好合如舊因言太上皇亦不久人間幸唯自安無自苦也使者還奏太上皇上心嗟悼久之餘具國史至憲宗元和元年盩厔縣尉白居易為歌以言其事并前秀才陳鴻作𫝊冠於歌之前目為長恨歌𫝊居易歌曰漢皇重色思傾國御宇多年求不得楊家有女初長成養在深閨人不識天生麗質難自棄一朝𨕖在君王側囘眸一笑百媚生六宫粉黛無顔色春寒賜浴華清池温泉水滑洗凝脂侍兒扶起嬌無力始是新承恩澤時雲鬂花顔金步揺芙蓉帳暖度春宵春宵苦短日髙起従此君王不早朝承歡侍宴無閒暇春従春逰夜専夜漢宫佳麗三千人三千寵愛在一身金屋粧成嬌侍夜玉樓宴罷醉和春姊妹弟兄皆列土可憐光彩生門户遂令天下父母心不重生男重生女驪宫髙處入青雲仙樂風飄處處聞緩歌慢舞凝絲竹盡日君皇看不足漁陽鞞鼓動地來驚破霓裳羽衣曲九重城闕煙塵生千乗萬騎西南行翠華揺揺行復止西出都門百餘里六軍不發無柰何宛轉蛾眉馬前死花鈿委地無人収翠翹金雀玉搔頭君王掩面救不得囘看血涙相和流黄埃散漫風蕭索雲棧縈㢠廻登劍閣蛾眉山下少行人旌旗無光日色薄蜀江水碧蜀山青聖主朝朝暮暮情行宫見月傷心色夜雨聞鈴腸斷聲天旋日轉囘龍馭到此躊躇不能去馬嵬坡下泥土中不見玉顔空死處君臣相顧盡沾衣東望都門信馬歸歸來池苑皆依舊太液芙蓉未央栁芙蓉如面栁如眉對此如何不淚垂春風桃李花開夜秋雨梧桐葉落時西宫南苑多秋草落葉滿堦紅不掃梨園弟子白髪新椒房阿監青娥老夕殿螢飛思悄然孤燈挑盡未成眠遅遅鐘漏初長夜耿耿星河欲曙天鴛鴦瓦冷霜華重翡翠衾寒誰與共悠悠生死别經年魂魄不曽來入夢臨卭道士鴻都客能以精誠致魂魄為感君王展轉思遂令方士殷勤覔排空馭氣奔如霓㫒天入地求之遍上窮碧落下黄泉兩處茫茫皆不見忽聞海上有仙山山在虚無縹緲間樓殿玲瓏五雲起其中綽約多仙子中有一人名太真雪膚花貌参差是金闕西廂叩玉扄轉教小玉報雙成聞道漢家天子使九華帳裏夢魂驚攬衣推枕起徘徊珠箔銀屏迤邐開雲鬂半偏新睡覺花冠不整下堂來風吹仙袂飄飄舉猶似霓裳羽衣舞玉容寂寞淚闌干梨花一枝春帶雨含情凝睇謝君王一别音容兩渺茫昭陽殿裡恩愛絶蓬萊宫中日月長囘頭下望人寰處不見長安見塵霧空將舊物表深情鈿合金釵寄將去釵留一股合一扇釵劈黄金合分鈿但令心似金鈿堅天上人間會相見臨别殷勤重寄詞詞中有誓兩心知七月七日長生殿夜半無人私語時在天願為比翼鳥在地願為連理枝天長地久有時盡此恨綿綿無絶期無雙傳薛調譔唐王仙客者建中中朝臣劉震之甥也初仙客父亡與母同歸外氏震有女曰無雙小仙客數歲皆幼穉戲弄相狎震之妻常戲呼仙客為王郎子如是者凡數歲而震奉孀姊及撫仙客尤至一旦王氏姊疾且重召震約曰我一子念之可知也恨不見其婚室無雙端麗聰慧我深念之異日無令歸他族我以仙客為託爾誠許我瞑目無所恨也震曰姊宜安静自頤養無以他事自撓其姊竟不痊仙客䕶喪歸塟襄鄧服闋思念身世孤孑如此宜求婚娶以廣後嗣無雙長成矣我舅氏豈以位尊官顯而廢舊約耶於是飾裝抵京師時震為尚書租庸使門館赫奕冠葢填塞仙客既覲置於學舍弟子為伍舅甥之分依然如故但寂然不聞選取之議又於窓隙聞窺見無雙姿質明艷若神仙中人仙客發狂唯恐姻親之事不諧也遂鬻囊槖得錢數百萬舅氏舅母左右給使達於厮養皆厚遺之又因復設酒饌中門之内皆得入之矣諸表同處悉敬事之遇舅母生日市新竒以獻雕鏤犀玉以為首飾舅母大喜又旬日仙客遣老嫗以求親之事聞於舅母舅母曰是我所願也即當議其事又數夕有青衣告仙客曰娘子適以親情事言於阿郎阿郎云向前亦未許之模様云云恐是参差也仙客聞之心氣俱喪達且不寐恐舅氏之見棄也然奉事不敢懈怠一日震趨朝至日初出忽然走馬入宅汗流氣促唯言鏁却大門鏁却大門一家惶駭不測其由良久乃言涇原兵士反姚令言領兵入含元殿天子出苑北門百官奔赴行在我以妻女為念略歸部署疾召仙客與我勾當家事我嫁與爾無雙仙客聞命驚喜拜謝乃裝金銀羅錦二十䭾謂仙客曰汝易衣服押領此物出開逺門覔一深隙店安下我與汝舅母及無雙出啟夏門遶城續至仙客依所教至日落城外店中待久不至城門自午後扄鎖南望目斷遂乗驄秉燭遶城至啟夏門門亦鎖守門者不一持白棓或立或坐仙客下馬徐問曰城中有何事如此又問今日有何人出此門者曰朱太尉已作天子午後有一人重戴領婦人四五輩欲出此門街中人皆識云是租庸使劉尚書門司不敢放出近夜追騎至一時驅向北去矣仙客失聲慟哭却歸店三更向盡城門忽開見火炬如晝兵士皆持兵挺刃𫝊呼斬斫使出城搜城外朝官仙客捨輜騎驚走歸襄陽村居三年後知剋復京師重整海内無事乃入京訪舅氏消息至新昌南街立馬彷徨之際忽有一人馬前拜熟視之乃舊使蒼頭塞鴻也鴻本王家生其舅常使得力遂留之握手垂涕仙客謂鴻曰阿舅舅母安否鴻云並在興化宅仙客喜極云我便過街去鴻曰某已得從良客户有一小宅子販繒為業今日已來郎君且就客户一宿來早同去未晚遂引至所居飲饌甚備至昏黒乃聞報曰尚書受偽命官與夫人皆處極刑無雙已入掖庭矣仙客哀寃號絶感動鄰里謂鴻曰四海至廣舉目無親戚未知託身之所又問曰舊家人誰在鴻曰唯無雙所使婢採蘋今在金吾將軍王遂中宅仙客曰無雙固無見期得見採蘋死亦足矣由是乃刺謁以從姪禮見遂中具道本末願納厚價以贖採蘋遂中深見相知感其事而許之仙客税屋與鴻蘋居塞鴻每言郎君年漸長合求官職悒悒不樂何以遣時仙客感其言以情懇告遂中遂中薦見仙客於京兆尹李齊運齊運以仙客前銜為富平縣尹知長樂驛累月忽報有中使押領内家三十人往園陵以備灑掃宿長樂驛氊車子十乗下訖仙客謂塞鴻曰我聞宫嬪𨕖在掖庭多是衣冠子女我恐無雙在焉汝為我一窺可乎鴻曰宫嬪數千豈便及無雙仙客曰汝但去人事亦未可定因令塞鴻假為驛吏烹茗於簾外仍給錢三千約曰堅守茗具無暫捨去忽有所覩即疾報來塞鴻唯唯而去宫人悉在簾下不可得見之但夜語喧譁而已至夜深羣動皆息塞鴻滌器搆火不敢輒寐忽聞簾下語曰塞鴻塞鴻汝争得知我在此耶郎健否言訖嗚咽塞鴻曰郎君見知此驛今日疑娘子在此令塞鴻問候又曰我不久語明日我去後汝於東北舍閤子中紫褥下取書送郎君言訖便去忽聞簾下極閙云内家中惡中使索湯藥甚急乃無雙也塞鴻疾告仙客仙客驚曰我何得一見塞鴻曰今方修渭橋郎君可假作理橋官車子過橋時近車子立無雙若認得必開簾子當得瞥見耳仙客如其言至第三車子果開簾子窺見真無雙也仙客悲感怨慕不勝其情塞鴻於閤子中褥下得書送仙客花牋五幅皆無雙真迹詞理哀切叙述周盡仙客覧之茹恨涕下自此永訣矣其書後云常見敕使説富平縣古押衙人間有心人今能求之否仙客遂申府請解驛務歸本官遂尋訪古押衙則居于村墅仙客造謁見古生生所願必力致之繒綵寳玉之贈不可勝紀一年未開口秩滿閒居於縣古生忽來謂仙客曰洪一武夫年且老何所用郎君於某竭分察郎君之意將有求於老夫老夫乃一片有心人也感郎君之深恩願粉身以答効仙客泣拜以實告古生古生仰天以手拍腦數四曰此事大不易然與郎君試求不可朝夕便望仙客拜曰但生前得見豈敢以遅晚為限耶半歲無消息一日扣門乃古生送書書云茅山使者囘且來此仙客奔馬去見古生生乃無一言又啟使者復云殺却也且吃茶夜深謂仙客曰宅中有女家人識無雙否仙客以采蘋對仙客立取而至古生端相且笑且喜曰借留三五日郎君且歸後累日忽𫝊説曰有髙品過處置園陵宫人仙客心甚異之令塞鴻探所殺者乃無雙也仙客號哭乃歎曰本望古生今死矣為之奈何流涕歔欷不能自已是夕更深聞叩門甚急及開門乃古生也領一篼子入謂仙客曰此無雙也今死矣心頭微暖後日當活微灌湯藥切須静宻言訖仙客抱入閤子中獨守之至明遍體有暖氣見仙客哭一聲遂絶救療至夜方愈古生又曰暫借塞鴻於舍後掘一坑坑稍深抽刀斷塞鴻頭於坑中仙客驚怕古生曰郎君莫怕今日報郎君恩足矣比聞茅山道士有藥術其藥服之者立死三日却活某使人専求得一丸昨令採蘋假作中使以無雙逆黨賜此藥令自盡至陵下託以親故百縑贖其尸凡道路郵𫝊皆厚賂矣必免漏泄茅山使者及舁篼人在野外處置訖老夫為郎君亦自刎君不得更居此門外有檐子一十人馬五匹絹二百匹五更挈無雙便發變姓名浪迹以避禍言訖舉刀仙客救之頭已落矣遂并尸葢覆訖未明發歴西蜀下峽寓居於渚宫悄不聞京兆之耗乃挈家歸襄鄧别業與無雙偕老矣男女成羣噫人生之恝濶會合多矣罕有若斯之比常謂古今所無無雙邅亂世籍没而仙客之志死而不奪卒遇古生之竒法取之寃死者十餘人艱難走竄後得歸故鄉為夫婦五十年何其異哉太平廣記卷四百八十六
