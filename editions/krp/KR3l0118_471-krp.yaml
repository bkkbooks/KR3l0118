body:
  text: 太平廣記卷四百七十一宋李昉等編水族八水族為人鄧元佐姚氏宋氏史氏女漁人人化水族黄氏女宋士宗母宣騫母江州人獨角薛偉水族為人鄧元佐鄧元佐者潁川人也遊學於呉好尋山水凡有勝境無不歴覽因謁長城宰延挹託舊暢飲而别將抵姑蘇誤入一徑甚險阻紆曲凡十數里莫逢人舍但見蓬蒿而巳時日色已暝元佐引領前望忽見燈火意有人家乃尋而投之既至見一蝸舍惟一女子可年二十許元佐乃投之曰余今晚至長城訪友乘醉而歸誤入此道今已侵夜更向前道慮為惡獸所損幸娘子見容一宵豈敢忘徳女曰大人不在當奈何况又家貧無好茵席祇侍君子不棄即聞命矣元佐餒因舍焉女乃嚴一土塌上布軟草坐定女子設食元佐餒而食之極美女子乃就元佐而寢元佐至明忽覺其身卧在田中旁有一螺大如升子元佐思夜來所餐之物意甚不安乃嘔吐視之盡青泥也元佐嘆咤良久不損其螺元佐自此棲心於道門永絶遊歴耳出集異記姚氏東州静海軍姚氏率其徒捕海魚以充歳貢時已將晚而得魚殊少方憂之忽網中獲一人黒色舉身長毛拱手而立問之不應海師曰此所謂海人見必有災請殺之以塞其咎姚曰此神物也殺之不祥乃釋而祝之曰爾能為我致羣魚以免闕職之罪信為神矣毛人却行行上數十歩而没明日魚乃大獲倍於常歳矣出稽神錄宋氏江西軍吏宋氏嘗市木至星子見水濵人物喧集乃漁人得一大黿黿見宋屢顧宋即以錢一千贖之放於江中後數年泊船龍沙忽有一僕夫至云元長史奉召宋恍然不知何長史也既往歘至一府官出迎與坐曰君尚相識耶宋思之實未嘗識又曰君亦記星子江中放黿耶曰然身即黿也頃嘗有罪帝命謫為水族見囚於漁人微君之惠己骨朽矣今已得為九江長相召者有以奉報君兒某者命當溺死名籍在是後数日鳴山神將朝廬山使者行必以疾風雨君兒當以此時死今有一人名姓正同亦當溺死但先期嵗月間耳吾取以代之君兒宜速登岸避匿不然不免宋陳謝而出不覺已在舟次矣數日果有風濤之害死甚衆宋氏之子竟免出稽神録史氏女溧水五壇村人史氏女因蒔田倦偃息𣗳下見一物鱗角爪距可畏来據其上已而有娠生一鯉魚養於盆中數日益長乃取投金瀬中頃之村人刈草誤斷其尾魚即奮躍而去風雨隨之入太湖而止家亦漸富其後女卒每寒食其魚輒從羣魚一至墓前至今每閏年一至爾又漁人李黒獺者恒張網於江忽獲一嬰兒可長三尺網為亂涎所縈浃旬不解有道士見之曰可取鐵汁灌之如其言遂觧視嬰兒口鼻眉髪如畫而無目口猶有酒氣衆懼復投於江出稽神録漁人近有漁人泊舟馬當山下月明風恬見一大黿出水直上山頂引首四望頃之江水中湧出一彩舟有十餘人㑹飲酒妓樂陳設甚盛獻醻久之上流有巨艦来下櫓聲振於坐中彩舟乃沒前之黿亦下未及水忽死於岸側意者水神使此黿為候望而不知巨艦之来故殛之出稽神録人化水族黄氏母後漢靈帝時江夏黄氏之母浴而化為黿入於深淵其後時時出見初浴簮一銀釵及見猶在其首出神鬼録宋士宗母魏清河宋士宗母以黄初中夏天於浴室裏浴遣家中子女闔户家人於壁穿中窺見沐盆水中有一大黿遂開户大小悉入了不與人相承嘗先著銀釵猶在頭上相與守之啼泣無可奈何出外去甚駛逐之不可及便入水後數日忽還巡行舍宅如平生了無所言而去時人謂士宗應行䘮士宗以母形雖變而生理尚存竟不治䘮與江夏黄母相似出續捜神記宣騫母吳孫皓寳鼎元年丹陽宣騫之母年八十因浴化為黿騫兄弟閉戸衛之掘堂内作大坎實水其黿即入坎遊戲經累日忽延頸外望伺戸小開便輒自躍赴於逺潭遂不復見出廣古今五行記江州人晉末江州人年百餘嵗頂上生角後因入舍前江中變為鯉魚角尚存首自後時時暫還容狀如平生與子孫飲數日輒去晉末已来絶不復見出廣古今五行記獨角獨角者巴郡人也年可數百嵗俗失其名頂上生一角故謂之獨角或忽去積載或累旬不語及有所説則㫖趣精微咸莫能測焉所居獨以徳化亦頗有訓導一旦與家辭因入舍前江中變為鯉魚角尚在首後時時暫還容状如平生與子孫飲讌數日輙去出述異記薛偉薛偉者唐乾元元年任蜀州青城縣主簿與丞鄒滂尉雷濟裴寮同時其秋偉病七日忽奄然若徃者連呼不應而心頭㣲暖家人不忍即斂環而伺之經二十日忽長吁起坐謂其人曰吾不知人間㡬日矣曰二十日矣與我覷羣官方食鱠否言吾已蘇矣甚有竒事請諸公罷筯來聴也僕人走視羣官實欲食鱠遂以告皆停餐而来偉曰諸公敇司户僕張弼求魚乎曰然又問弼曰漁人趙幹藏巨鯉以小者應命汝於葦間得藏者携之而来方入縣也司户吏坐門東糺曺吏坐門西方弈棊入及階鄒雷方博裴啗桃實弼言幹之藏巨魚也裴五令鞭之既付食工王士良者喜而殺乎逓相問誠然衆曰子何以知之曰向殺之鯉我也衆駭曰願聞其說曰吾初疾困為熱所逼殆不可堪忽悶忘其疾惡熱求凉䇿杖而去不知其夢也既出郭其心欣欣然若籠禽檻獸之得逸莫我如也漸入山山行益悶遂下遊於江畔見江潭深淨秋色可愛輕漣不動鏡涵逺虚忽有思浴意遂脱衣於岸跳身便入自幼狎水成人已来絶不復戲遇此縱適實契宿心且曰人浮不如魚快也安得攝魚而健遊乎旁有一魚曰顧足下不願耳正授亦易何况求攝當為足下圖之决然而去未頃有魚頭人長數尺騎鯢来導從數十魚宣河伯詔曰城居水遊浮沉異道茍非其好則昩通波薛主簿意尚浮深跡思閒曠樂浩汗之域放懐清江厭巘崿之情投簮幻世暫從鱗化非遽成身可權充東潭赤鯉鳴呼恃長波而傾舟得罪於晦昩纎鉤而貪餌見傷於明無或失身以羞其黨爾其勉之聽而自顧即已魚服矣於是放身而遊意往斯到波上潭底莫不從容三江五湖騰躍將遍然配留東潭每暮必復俄而饑甚求食不得循舟而行忽見趙幹垂鈎其餌芳香心亦知戒不覺近口曰我人也暫時為魚不能求食乃吞其鈎乎捨之而去有頃饑益甚思曰我是官人戲而魚服縱吞其鈎趙幹豈殺我固當送我歸縣耳遂吞之趙幹收綸以出幹手之將及也偉連呼之幹不聽而以繩貫我腮乃繫於葦間既而張弼来曰裴少府買魚須大者幹曰未得大魚有小者十餘斤弼曰奉命取大魚安用小者乃自於葦間尋得偉而提之又謂弼曰我是汝縣主簿化形為魚遊江何得不拜我弼不聽提之而行罵亦不已幹終不顧入縣門見縣吏坐者弈棊皆大聲呼之略無應者唯笑曰可畏魚直三四斤餘既而入階鄒雷方博裴啗桃實皆喜魚大促命付㕑弼言幹之藏巨魚以小者應命裴怒鞭之我呌諸公曰我是汝同官而今見殺竟不相捨促殺之仁乎哉大呌而泣三君不顧而付鱠手王士良者方礪刃喜而投我於几上我又呌曰王士良汝是我之常使鱠手也因何殺我何不執我白於官人士良若不聞者按吾頸於砧上而斬之彼頭適落此亦醒悟遂奉召爾諸公莫不大驚心生愛忍然趙幹之獲張弼之提縣司之弈吏三君之臨階王士良之將殺皆見其口動實無聞焉於是三君並投鱠終身不食偉自此平愈後累遷華陽丞乃卒出續𤣥怪録太平廣記卷四百七十一
