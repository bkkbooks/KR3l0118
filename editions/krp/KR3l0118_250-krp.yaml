body:
  text: 太平廣記卷二百五十詼諧六狄仁傑蘇味道侍御史李安期鄧元挺元福慶尚書郎御史裏行姚崇黄幡綽楊國忠劉朝霞姚貞操裴諝張文成竇曉杜延業路勵行蕭諴德宗劉𤣥佐顧況裴佶趙宗儒熝牛頭韓臯裴度姚峴狄仁傑唐秋官侍郎狄仁傑嘲秋官侍郎盧獻曰足下配馬乃作驢獻曰中劈明公乃成二犬傑曰狄字犬旁火也獻曰犬邉有火乃是煮熟狗出朝野僉載蘇味道唐宰相蘇味道與張昌齡俱有名暇日相遇互相誇誚昌齡曰某詩所以不及相公者為無銀花合故也蘇有觀燈詩曰火樹銀花合星橋鐵鏁開暗塵隨馬去明月逐人來味道云子詩雖無銀花合還有金銅釘昌齡贈張昌宗詩曰昔日浮邱伯今同丁令威遂與撫掌而笑出本事詩侍御史唐京臺監察院西行中間號横劈房凡遷此房者必先盛饌臺中而後居焉先無窻後人置之神龍中侍中楊再思兼大夫諸相畢送視事中書令魏元忠嘗任監察臺中故事素諳謔指房曰此是横擘房諸相問故元忠具述其由御史曰此房近日遷耶曰無别𨕖元忠曰當為開窻出氣故不遷耳左右歡笑殆不禁且御史糺察郡司綱紀庶務實為衆官所忌詈御史為冷峭而突厥號御史為吐屯則天朝蕃使來朝者而吐屯獨立不入班諭德張元一以齊諧見稱問蕃使曰此獨立者為誰譯者曰吐屯此御史元忠曰人言我朝御史獨冷峭此蕃御史亦甚冷峭舉朝喧笑出御史臺記李安期唐吏部侍郎李安期隋内史德林之孫安平公百藥之子性機警嘗有𨕖人被放訴云羞見來路安期問從何關來曰從蒲津關來安期曰取潼關路去𨕖者曰恥見妻子安期曰賢室本自相諳亦應不笑又一𨕖人引銓安期看判曰第書稍弱對曰昨墜馬損足安期曰損足何廢好書為讀判曰向㸔第判非但傷足兼以内損其人慙而去又𨕖士姓杜名若注芳洲官其人慙而不伏安期曰君不聞芳洲有杜若其人曰可以贈名公曰此期非彼期若曰此若非彼若安期笑為之改注又一吳士前任有酒狀安期曰君狀不善吳士曰知暗槍已入安期曰為君㧞暗槍答曰可憐美女安期曰有精神𨕖還君好官對曰怪來晩安期笑而與官出朝野僉載鄧𤣥挺唐鄧𤣥挺入寺行香與諸僧詣園觀植蔬見水車以木桶相連汲於井中乃曰法師等自蹋此車當大辛苦答曰遣家人挽之鄧應聲曰法師若不自蹋用如許木桶何為僧愕然思量始知𤣥挺以木桶為幪秃又嘗與謝佑同射先自矜敏手及至對射數十發皆不中垜佑乃云直由箭惡從來不曾如此𤣥挺應聲報云自須責射因何尤箭衆人歡笑以為辯捷權𤣥福任蕭機遣郎中員外極晩始許出有郎中㕔前逼階棗樹下生一小棗穿砌塼而出皆訝焉既就㸔𤣥挺時任員外郎云此樹不畏蕭機遂即塼輒棗出兵部侍郎韋愼形容極短時人弄為侏儒𤣥挺初得員外已後郎中員外俱來㸔韋愼云愼以庸鄙濫任郎官公以高才更作緑袍員外鄧即報云緑袍員外猶可及侏儒郎中衆皆大笑出啓顔録元福慶唐元福慶河南人拜右臺監察與韋虚名任正名頗事軒昂殿中監察評之詠曰韋子凝而密任生直且狂可憐元福慶也學坐癡牀正名聞之乃自改為俊且强出御史臺記尚書郎尚書郎自兩漢已後妙𨕖其人唐武德貞觀已來尤重其職吏兵部為前行最為要劇自後行改入皆為美𨕖考功員外專掌試貢舉人員外郎之最望者司門都門屯田虞水膳部主客皆在後行閒簡無事時人語曰司門水部入省不數角觝之戲有假作吏部令史與水部令史相逢忽然俱倒良久起云冷熱相激遂成此疾先天中王上客為侍御史自以才望清雅妙當入省常望前行忽除膳部員外郎㣲有悵惋吏部郎中張敬忠戲詠之曰有意嫌兵部專心取考功誰知脚踜蹬幾落省牆東膳部在省中最東北隅故有此句出兩京新記御史裏行唐開元中置裏行無員數或有御史裏行侍御史裏行殿中裏行監察裏行以未為正官臺中詠之曰柱下雖為史臺中未是官何時聞必也早晚見任端任端即侍御史任正名也出御史臺記姚崇唐姚崇為紫微令例給舍直次不讓宰相崇以年位俱高不依舊請令史持直簿詣之崇批其簿曰告直令史遣去又來必欲取人有同司命老人年事終不擬當諸司舍見之歡笑不復逼也後遂停宰相直宿出大唐新語黄幡綽唐𤣥宗好擊毬内廐所飼者意猶未甚適㑹與黄幡綽戲語相解因曰吾欲良馬久之而誰能通於馬經者幡綽奏曰臣能知之且曰今三丞相悉善馬經上曰吾與三丞相語政事外悉究其旁學不聞有通馬經者爾焉得知之幡綽曰臣自日日沙堤上見丞相所乘皆良馬也是以必知通馬經上因大笑而語他𤣥宗嘗登苑北樓望渭水見一醉人臨水卧問左右是何人左右不知將遣使問之幡綽曰臣知之此是年滿令史上曰你何以知對曰更一轉入流上大笑又與諸王㑹食寜王對御座歕一口飯直及龍顏上曰寜哥何以錯喉幡綽曰此非錯喉是歕啑出松窻雜録及因話録楊國忠唐楊國忠嘗㑹諸親時知吏部銓且欲大噱以娛之呼𨕖人名引入於中庭不問資叙短小者通道參軍胡者云湖州文學簾下大笑出嘉話録劉朝霞唐天寶初𤣥宗遊華清宫劉朝霞獻駕幸温泉賦詞調倜儻雜以俳諧文多不載略其賦首云若夫天寶二年十月後兮臘月前辦有司之供具命駕幸於温泉天門軋開招神仙之福塞鑾輿劃出驅甲仗而駢闐青一隊兮黄一隊熊蹋胸兮豹拏背珠一團兮繡一團玉縷珂兮金鈒鞍其後述聖德云直獲得盤古髓掐得女媧氏孃遮莫你古來千帝豈如我今代三郎其自叙云别有窮竒蹭蹬失路猖狂骨撞雖短伎倆能長夢裏幾廻富貴覺來依舊恓惶只是千年一遇扣頭莫五角而六張上覽而竒之將加殊賞命朝霞改去五角六張字奏云臣草此賦若有神助自謂文不加㸃筆不停綴不願改之上聞顧左右曰眞窮薄人也遂授以宮衛佐而止焉出開天傳信記姚貞操唐姚貞操云自余以評事入臺侯承訓繼入此後相繼不絶故知㧞茅連茹也韓琬以為不然自則天好法刑曹望居九寺之首以此評事多入臺訖今為雅例豈評事之望起於貞操耶須議戲云畿尉有六道入御史為佛道入評事為仙道入京尉為人道入畿丞為苦海道入縣令為畜生道入判司為餓鬼道故評事之望起於時君好法也非貞操所能升降之出御史臺記裴諝唐裴寛子諝復為河南尹諝素好詼諧嘗有投牒悞書紙背諝判云這畔似那畔那畔似這畔我也不辭與你判笑殺門前着靴漢又婦人同投狀争猫兒狀云若是兒猫兒即是兒猫兒若不是兒猫兒即不是兒猫兒諝大笑判其狀曰猫兒不識主傍家搦老䑕兩家不須争將來與裴諝遂納其猫兒争者亦止焉出開天傳信記張文成唐司門員外郎張文成工為俳諧詩賦行於代時大將軍黑齒常之將出征或人勉之曰公官卑何不從行文成曰寜可且將朱脣飲酒誰能逐你黑齒常之出御史臺記竇曉唐竇曉形容短小眼大露睛樂彦偉身長露齒彦偉先弄之云足下甚有功德旁人怪問彦偉曰既已短肉又復精進豈不大有功德竇即應聲答曰公自有大功德因何道曉人問其故竇云樂工小來長齋又問長齋之意竇云身長如許口齒齊崖豈不是長齋衆皆大笑出啟顔録杜延業唐華原令崔思誨口吃毎共表弟杜延業逓相戲弄杜常語崔云延業能遣兄作雞鳴但有所問兄即須報旁人云他口應須自由何處遣人驅使若不肯作何能遣之杜即云能得既而旁人即共杜私賭杜將一把榖來崔前云此是何物崔云穀穀旁人大笑因輸延業出啓顔録路勵行唐路勵行初任大理丞親識並相賀坐定一人云兄今既在要職親皆為樂諺云一人在朝百人緩帶豈非好事答云非直唯遣緩帶並須將却幞頭衆皆大笑出啓顔録蕭諴唐蕭諴初拜員外於朝列安閑自若侍御史王旭曰蕭子從容省闥韓琬應聲答曰蕭任司録早已免杖豈止今日方省撻耶聞者歡笑出御史臺記德宗唐馬燧之孫始生德宗命之曰繼祖退而笑曰此有二義意謂以索繼也出國史𥙷劉𤣥佐唐劉𤣥佐滑州匡城人嘗出師經本縣欲申桑梓禮於令堅辭不敢當𤣥佐歎恨久之先是陳金帛將遺邑僚以其愚懦而止𤣥佐貴為相其母月織絹一匹以示不忘本毎觀𤣥佐視事見邑令走階下退必語𤣥佐吾向見長官白事卑敬不覺恐悚思乃父為吏本縣時常畏長官汗慄今爾當㕔據案待之其何安焉因喻以朝廷恩寄之重須務捐軀故𤣥佐始終不闕臣節時鄉里姻舊以地近多投之𤣥佐不欲以私擢居將校之列又難置於賤卒盡置為將判官此職例假緋衫銀魚袋外示榮之實處散冗其𩔖漸衆久之有人啓訴於劉者一聨云覆盆子落地變作赤烘羊羔兒作聲盡是没益公覽之而笑各改着他職出因話録顧況唐白居易初名未振以歌詩謁顧況況謔曰居易長安百物貴居大不易及讀至賦得原上草送友曰野火燒不盡春風吹又生歎曰有句如此居大不難老夫前言戲之耳出摭言裴佶唐北省班諫議在給事中上中書舍人在給事中下裴佶為諫議形質短小諸舍人戲之曰如此短何得向上裴佶曰若怪即曵向下着衆人皆大笑後除舍人出因話録趙宗儒唐憲宗問趙宗儒曰人言卿在荆州毬場草生何也對曰死罪有之雖然草生不妨毬子上為啓齒出國史補爊牛頭有士人平生好喫爊牛頭一日忽夢其物故拘至地府酆都獄有牛首阿旁其人了無畏憚仍以手撫阿旁云只這頭子大堪爊阿旁笑而放廻出傳載韓臯唐僕射韓臯鎭夏口常病小瘡令醫傅膏藥不濡公問之醫云寒膏硬公笑曰韓臯實是硬裴度唐裴晉公度在相位日有人寄槐癭一枚欲削為枕時郎中庾威世稱博物召請别之庾捧翫良久白曰此槐癭是雌樹生者恐不堪用裴曰郎中甲子多少庾曰某與令公同是甲辰生公笑曰郎中便是雌甲辰出盧氏雜説姚峴唐姚峴有文學而好滑稽遇機即發僕射姚南仲廉察陜郊峴初釋艱服候見以宗從之舊延於中堂弔罷未語及他事陜當兩京之路賓客謁無時門外忽投刺云李過庭南仲曰過庭之名甚新未知誰家子弟左右皆稱不知又問峴知之乎峴初猶俛首嚬眉頃之自不可忍斂手言曰恐是李趨兒南仲久方悟而大笑出因話録太平廣記卷二百五十
