body:
  text: 太平廣記卷四十一神仙四十一薛尊師王老黑叟劉無名薛尊師薛尊師者家世榮顯則天末兄弟數人皆至二千石身為陽翟令而數年間兄弟淪䘮都盡遂精心歸道棄官入山妻兒悉棄召同志者唯有邑小胥唐臣願從之杖策負囊往嵩山口忽遇一人自山而出自云求道之人姓陳云知近有仙境薛遂求問其路陳曰吾有小事詣都約三日而廻廻當奉導君且於此相待薛與唐子止於路口陳至期而至陳曰但止於此吾當入山求之知所詣即來相報期以五日既而過期十日不至薛曰陳生豈相紿乎吾當自往遂縁磴入谷三四十里忽於路側見一死人虎食其半乃陳山人也唐子謂尊師曰本入山為求長生今反為虎狼之飡陳山人尚如此我獨何人不如歸人世以終天年耳尊師曰吾聞嵩岳本靈仙之地豈為此害蓋陳山人所以激吾志也汝歸吾當終至必也不幸而死終無恨焉言訖直往唐亦決意從之夜即宿於石巖之下晝則緣磴而行數日忽見一巖下長松數百株中有道士六人如修藥之狀薛遂頂禮求諸道士曰吾雖至此自服藥耳亦無術可以授君俄覩一禪室中有一老僧又禮拜求問僧亦無言忽於僧床下見藤蔓縁壁出户僧指蔓視薛遂尋蔓出户其蔓傍巖壁不絶經兩日猶未盡忽至流泉石室中有道士數人圍棋飲酒其陳山人亦在笑謂薛曰何忽而至子之志可教也遂指授道要亦見俗人於此伐薪採藥不絶問其所云終南山紫閣峰下去長安城七十里尊師道成後入京居於昊天觀𤣥風益振時唐𤣥宗皇帝奉道數召入内禮謁開元末時已百餘歳忽吿門人曰天帝召我為八威觀主無病而坐亡顔色不變遂於本院中造塔不塞塔户每至夜輒召弟子唐君吿以修行之術後以俗人禮謁煩雜遂勅塞其塔户唐君後亦為國師焉出原化記王老有王老者常於西京賣藥累世見之李司倉者家在勝業里知是術士心恒敬異待之有加故王老往來依止李氏且十餘載李後求隨入山王亦相招遂僕御數人騎馬俱去可行百餘里峰巒髙峭攀藤縁樹直上數里非人跡所至王云與子偕行猶恐不達神仙之境非僕御所至悉宜遣之李如其言與王至峰頂田疇平坦藥畦石泉佳景差次須臾又至林口道士數人來問王老知邀嘉賔故復相候李隨至其居茅屋竹亭瀟灑可望中有學生數十人見李各來問其親戚或不言或惆悵者云先生不在今宜少留具厨飯蔬素不異人間也為李設食經數日有五色雲霞覆地有三白鶴隨雲而下於是書生各出如迎候狀有頃云先生至見一老人鬚髪鶴素從雲際來王老攜李迎拜道左先生問王老何以將他人來此諸生拜謁訖各就房李亦入一室時頗炎熱李出尋泉將欲洗浴行百餘步至一石泉見白鶴數十從岩嶺下來至石上羅列成行俄而奏樂音響清亮非人間所有李卑伏聽其妙音樂畢飛去李還説其事先生問得無犯仙官否答云不敢先生謂李公曰君有官禄未合住此待仕宦畢方可來耳因命王老送李出曰山中要牛兩頭君可送至藤下李買牛送訖遂無復見路耳出廣異記黑叟唐寳應中越州觀察使皇甫政妻陸氏有姿容而無子息州有寺名寳林中有魔母神堂越中士女求男女者必報驗焉政暇日率妻孥入寺至魔母堂捻香祝曰祈一男請以俸錢百萬貫締構堂宇陸氏又曰儻遂所願亦以脂粉錢百萬别繪神仙既而寺中遊薄暮方還兩月餘妻孕果生男政大喜構堂三間窮極華麗陸氏於寺門外築錢百萬募畫工自汴滑徐泗揚潤潭洪及天下畫者日有至焉但以其償過多皆不敢措手忽一人不説姓名稱劒南來且言善畫泊寺中月餘一日視其堂壁數㸃頭主事僧曰何不速成其事耶其人笑曰請備燈油將夜緝其事僧從其言至平明燦爛光明儼然一壁畫人已不見矣政大設齋富商來集政又擇日率軍吏州民大陳伎樂至午時有一人形容醜黑身長八尺荷笠莎衣荷鋤而至閽者拒之政令召入直上魔母堂舉手鋤以斸其面壁乃頺百萬之衆鼎沸驚閙左右武士欲擒殺之叟無怖色政問之曰爾顛癎耶叟曰無爾善畫耶叟曰無曰縁何事而斸此也叟曰恨畫工之罔上也夫人與上官捨二百萬圖寫神仙今比生人尚不逮矣政怒而叱之叟撫掌笑曰如其不信田舍老妻足為驗耳政問曰爾妻何在叟曰住處過湖南三二里政令十人隨叟召之叟自葦菴間引一女子年十五六薄傅粉黛服不甚奢艷態媚人光華動衆頃刻之閒到寳林寺百萬之衆引頸駭觀皆言所畫神母果不及耳引至堦前陸氏為之失色政曰爾一賤夫乃蓄此婦當進于天子叟曰待歸與田舍親訣别也政遣卒五十侍女十人同詣其家至江欲渡叟獨在小遊艇中衛卒侍女叟妻同一大船將過江不覺叟妻於急流之處忽然飛入遊艇中人皆惶怖疾棹趨之夫妻已出攜手而行又追之二人俱化為白鶴冲天而去出㑹昌解頤及河東記劉無名劉無名成都人也本蜀先主之後居於蜀焉生而聰悟八九嵗道士過其家見而嘆曰此兒若學道當長生神仙矣自是好道探𤣥不樂名利弱冠閲道經學咽氣朝拜存真内修之術常以庚申日守三尸存神黙呪服黄精白术志希延生或見古方言草木之藥但愈疾微效見火輒為灰燼自不能固豈有延年之力哉乃涉厯山川訪師求道數年入霧中山嘗遇人教其服餌雄黄三十餘年一旦有二人赤巾朱服徑詣其室劉問其何人也何以及此對曰我泰山直符追攝子耳不知子以何術頂有黄光至三日矣㝠期迫促而無計近子將恐隂符譴責以稽延獲罪故見形相問耳劉曰余無他術但㝠心至道不視聲利静處幽山志希度世而已二使曰子之黄光照灼於頂迢髙數丈得非雄黄之功然吾聞一隂一陽之謂道一金一石之謂丹子但服其石未餌其金但得其陽未知其隂將何以超生死之難期昇騰之道乎其次廣施隂功救人濟物柔和雅静無欲無為至孝至忠内修密行功滿三千然後黑籍落名青華定籙制御神鬼驅駕雲龍而上補仙官永除地簡九祖超鍊七𤣥生天如此則不為㝠官所追捕耳今子雖三尸已去而積功未著大限既盡將及死期豈可茍免也劉聞其語心魂䘮越憂迫震懼不知所為二使徐謂之曰岷峨青城神仙之府可以求詣真師訪尋道要我聞鈆汞朱髓可致冲天此非髙真上仙莫得修煉之㫖我為子求姓名同年壽盡者以代於子子勉而勤修無至中怠也劉致謝二使二使乃𨼆劉如其言入峨眉岷山登陟峭險探求洞穴厯年不遇復入青城山北崖之下得一洞行數里忽覺平博殆非人世遇神仙居其間云青城真人劉祈叩不已具述所值鬼使追攝之由願示道要以拯拔沉淪賜度生死之苦真人指一巖室使棲止其中復令齋心七日乃示其陽罏隂鼎柔金錬化氷玉之方伏汞鍊鈆朱髓之訣謂之曰胡剛子隂長生皆得此道亦名金液九丹之經丹分三品以鈆為君以汞為臣八石為使黄芽為苗君臣相得運火功全七日為輕汞二七日變紫峯三七日五彩具内赤外黄狀如窻塵復運火二年日周六百再經四時重履長至初則十月離其胞胎已成初品即能乾汞成銀丸而服之可以袪疾三年之外服者延年益算髪白反黑三年之後服之刀圭遊散名山周遊四海初品地仙服之半劑變化萬端坐在立亡駕馭飛龍白日昇天大都此藥經十六節已為中品便能使人長生藥成之日五金八石黄芽諸物與君臣二藥不相雜亂矣千日功畢名上品還丹謹而藏之勿示非人世有其人視彼形氣功行合道依法傳之劉授丹訣還於霧中山築室修錬三年乃成開成二年猶駐於蜀自述無名傳以示後人入青城去不知所終出仙傳拾遺太平廣記卷四十一
