body:
  text: 太平廣記卷三百三十一宋李昉等編鬼十六薛矜朱七娘李光逺李霸洛陽鬼兵道德里書生安宜坊書生裴盛楊溥薛直劉洪薛矜薛矜者開元中爲長安尉主知宫市迭日於東西二市一日於東市市前見一坐車車中婦人手如白雪矜慕之使左右持銀鏤小合立於車側婦人使侍婢問價云此是長安薛少府物處分令車中若問便宜餉之婦人甚喜謝矜微挑之遂欣然便謂矜曰我在金光門外君宜相訪也矜使左右隨至宅翌日往來過見婦人門外騎甚衆踟蹰未通客各引去矜令白已在門使左右送刺乃邀至外㕔令矜坐云待糚束矜覺火冷心竊疑怪須臾引入堂中其幔是青布遥見一燈火色微暗將近又逺疑非人也然業已求見見畢當去心中恒誦千手觀音呪至内見坐帳中以羅巾蒙首矜苦牽曳久之方落見婦人面長尺餘正青色有聲如狗矜遂絶倒從者至其室宇但見殯宫矜在其内絶無間隙遽推壁倒見矜已死惟心上暖移就店將息經月餘方蘇矣出廣異記朱七娘東都思恭坊朱七娘者倡嫗也有王將軍素與交通開元中王遇疾卒已半歲朱不知也其年七月王忽來朱處久之日暮曰能隨至温柔坊宅否朱欲許焉其女彈唱有名不欲母往乃曰將軍止此故佳將還有所憚耶不獲已至以後騎載去入院歡洽如故明旦王氏使婢收靈牀被見一婦人在被中遽走還白王氏諸子驚而來視問其故知亡父所引哀慟久之遂送還家焉出廣異記李光逺李光逺開元中爲館陶令時大旱光逺大爲旱書書就暴卒卒後縣申州州司馬覆破其旱百姓胥怨有慟哭者皆曰長官不死寧有是耶其夜光逺忽乗白馬來詣旱坊謂百姓曰我雖死旱不慮不成司馬何人敢沮斯議遂與百姓詣司馬宅通云李明府欲見司馬大懼使人致謝光逺責曰公非人旱是百姓事何以生死爲准宜速成之不然當爲厲矣言訖與百姓辭訣方去其年旱成百姓賴焉出廣異記李霸岐陽令李霸者嚴酷剛鷙所遇無恩自丞尉已下典吏皆被其毒然性清婞音脛很也自喜妻子不免飢寒一考後暴亡既歛庭絶弔客其妻每撫棺慟哭呼曰李霸在生云何令妻子受此寂寞數日後棺中忽語曰夫人無苦當自辦歸其日晚衙令家人於㕔事設案几霸見形令傳呼召諸吏等吏人素所畏懼聞命奔走見霸莫不戰懼股慄又使召丞及簿尉皆至霸訶怒云君等無情何至於此爲我不能殺君等耶言訖悉顛仆無氣家人皆來拜庭中祈禱霸云但通物數無憂不活卒以五束絹爲准絹至便生各謝訖去後謂兩衙典吾素厚於汝何故亦同衆人唯殺汝一身亦復何益當令兩家馬死爲驗須臾數百疋一時皆倒欲死遂人遺兩疋細馬馬復如故因謂諸吏曰我雖素清今已死謝諸君可能不惠涓滴乎又卒以五疋絹畢指令某官出車某出騎某吏等修違者必死一更後方散後日處分悉便家人便引道每至祭所留下歆饗饗畢又上馬去凡十餘里已及郊外遂不見至夜停車騎妻子欲哭棺中語云吾在此汝等困弊無用哭也霸家在都去岐陽千餘里每至宿處皆不令哭行數百里忽謂子曰今夜可無寐有人欲盜好馬宜預爲防也家人逺渉困弊不依約束爾夕竟失馬及明啓白霸云吾令防盜何故貪寐雖然馬終不失也近店東有路向南可遵此行十餘里有藂林馬繫在林下往取如言得之及至都親族聞其異競來弔慰朝夕謁請霸棺中皆酬對莫不踖踧觀聽聚喧家人不堪其煩霸忽謂子云客等往來不過欲見我耳汝可設㕔事我欲一見諸親其子如言衆人於庭伺候久之曰我來矣命捲幃忽見霸頭大如甕眼赤睛突瞪視諸客等客莫不顛仆稍稍引去霸謂子曰人神道殊屋中非我久居之所速殯野外言訖不見其語遂絶出廣異記洛陽鬼兵貞元二十三年夏六月帝在東京百姓相驚以鬼兵皆奔走不知所在或自衝擊破傷其鬼兵初過於洛水之南坊市喧喧漸至水北聞其過時空中如數千萬騎甲兵人馬嘈嘈有聲俄而過盡每夜過至於再至於三帝惡之使巫祝禳厭每夜於洛水濵設飲食嘗讀北齊書亦有此事天寳中晉陽云有鬼兵百姓競擊銅鐵以畏之皆不久喪也出紀聞道德里書生唐東都道德里有一書生日晚行至中橋遇貴人部從車馬甚盛見書生呼與語令從後有貴主年二十餘丰姿絶世與書生語不輟因而南去長夏門遂至龍門入一甲第華堂蘭室召書生賜珍饌因與寢夜過半書生覺見所卧處乃石窟前有一死婦人身正洪漲月光照之穢不可聞書生乃履危攀石僅能出焉曉至香山寺爲僧說之僧送還家數日而死出紀聞安宜坊書生開元末東京安宜坊有書生夜中閉門理書門隙中忽見一人出頭呵問何輩答云我是鬼蹔欲相就因邀書生出門書生隨至門外畫地作十字因而前行出坊至寺門鋪書生云寺觀見必不可度鬼言但隨我行無苦也俄至定鼎門内鬼負書生從門隙中出前至五橋道傍一冢天窗中有火光鬼復負書生上天窗側俯見一婦人對病小兒啼哭其夫在傍假寐鬼遂透下以手掩燈婦人懼呵其夫云兒今垂死何忍貪卧適有惡物掩火可強起明燈夫起添燭鬼迴避婦人忽取布袋盛兒兒猶能動於布袋中鬼遂負出至天窗上兼負書生下地送入定鼎門至書生宅謝曰吾奉地下處分取小兒事須生人作伴所以有此煩君當可恕之言訖乃去其人初隨鬼行所止之處輒書十字翌日引其兄弟覆之十字皆驗因至失兒家問之亦同也出廣異記裴盛董士元云義興尉裴盛晝寢忽爲鬼引形神隨去云奉一兒至兒家父母夾兒卧前有佛事鬼云以其佛生人既至鬼手一揮父母皆寐鬼令盛抱兒出牀扼兒喉有聲父母驚起鬼乃引盛出盛苦邀其至舍推入形中乃悟出廣異記楊溥豫章諸縣盡出良材求利者採之將至廣陵利則數倍天寳五載有楊溥者與數人入林求木冬夕雪飛山深寄宿無處有大木横卧其中空焉可容數人乃入中同宿而導者未眠時向山林再拜呪曰土田公今夜寄眠願見護助如是三請而後寢夜深雪甚近南樹下忽有人呼曰張禮樹頭有人應曰諾今夜北村嫁女大有酒食相與去來樹頭人曰有客在此須守至明若去黒狗子無知恐傷不宥樹下又曰雪寒若是且求飲食理須同去樹上又曰雪寒雖甚已受其請理不可行須防黒狗子呼者乃去及明装畢撤所卧氊有黒虺在下其大若瓶長三尺而蟄不動方驚駭焉出紀聞薛直勝州都督薛直丞相納之子也好殺伐不知鬼神直在州行縣還歸去州二驛逢友人自京來謁直延入驛㕔命食友人未食先祭直曰出此食謂何友人曰佛經云有曠野鬼食人血肉佛往化之令其不殺故制此戒又俗所傳每食先施得壽長命直曰公大妄誕何處有佛何者是鬼俗人相誑愚者雷同智者不惑公蓋俗人耳言未久空中有聲云薛直汝大狂愚寧知無佛寧知無鬼來禍於君命終必不見妻子當死於此何言妄耶直聞之大驚趨下再拜謝曰鄙人蒙固不知有神神其誨之空中又言曰汝命盡午時當急返得與妻孥相見不爾殯越於此矣直大恐與友人馳赴郡行一驛直入㕔休偃從者皆休忽見直去從者百餘人皆左右從人驛吏入戸已死矣於是驛報其家直已先至家呼妻與别曰吾已死北驛身在今是鬼恐不得面訣故此暫来執妻子之手但言努力復乗馬出門奄然而殁出記聞劉洪沛國劉洪性剛直父爲折衝都尉薛楚玉之在范陽召爲行軍洪隨之薊因得給事楚玉楚玉悅之楚玉補屯官洪請行檀州有屯曰太和任者輒死屯遂荒廢洪乃請爲之楚玉以凶難之洪曰妖由人興妖不自作洪且不懼公何惜焉楚玉遂以爲太和屯官洪將人吏到屯屯有故墟落洪依之架屋匠人方運斧而度木自折舉擊匠人立死洪怒叱吏卒扶匠人起而笞之詢曰汝是何鬼吾方治屯汝則干之罪死不赦笞數發匠人言說願見寛恕吾非前後殺屯官者也殺屯官者自是輔國將軍所居去此不逺吾乃守佛殿基鬼耳此故墟者舊佛殿也以其浄所故守之吾因爲人有罪配守此基基與地平吾方得去今者來故訴於公公爲平之吾乃去爲人矣洪曰汝言輔國不逺可即擒來鬼曰諾須臾匠人言曰劉洪吾輔國將軍也汝爲人強直兼有才幹吾甚重之將任汝以職今當辟汝即大富貴矣勉之因索紙作詩二章其匠人兵卒也素不知詩及其下筆書跡特妙可方王右軍薛楚玉取而珍之其詩曰烏鳥在虛飛𤣥駒遂野依名今編户籍翠過葉生稀其二章曰箇樹枝條朽三花五面啼移家朝度日誰覺夕陽低詩成而去匠人乃屯屬役數日疾甚舁至范陽其父謁名醫薛亦㑹疾洪言語如常而二人密冷氣侵未幾乃卒方洪初得鬼詩思不可解及卒皆黒遂以載棺名今編户籍蓋洪名生希者言洪死像也其二章箇樹枝條朽故條枝朽也三花五面啼者洪家有八口洪又二人亡所謂三花也五人哭之所謂五面啼洪死後二十日故吏野外見洪紫衣從二百騎神色甚壯告吏曰吾已爲輔國將軍所用大富貴矣今將從騎向都迎母母先在都初洪舅有女養於劉氏年與洪齒嘗與洪言曰吾聞死者有知吾二人先死必擾亂存者使知之是日女在洪母前行忽有引其衣者令不得前女怪之須臾得前又引其巾取其梳如相狎者洪母驚曰汝存日嘗有言須來在軍久絶書問今見死乎何與平生言協也母言未畢洪即形見庭中衣紫金章僕從多至母問曰汝何縁來洪已富貴身亦非人福樂難言故迎母供養於是車輿皆進母則昇輿洪乃侍從遂去去後而母殂其見故吏時亦母殂之日也出紀聞太平廣記卷三百三十一
