body:
  text: 太平廣記卷三百三神十三韓光祚宣一州司户崔圓鄭仁鈞季廣琛劉可大奴蒼璧南纘王常韓光祚桃林令韓光祚攜家之官途經華山廟下車謁之入廟門而愛妾暴死令巫請之巫言三郎好汝妾既請且免至縣當取光祚至縣乃召金工爲妾鑄金爲觀世音菩薩像然不之告五日妾暴卒半日方活云適華山府君備車騎見迎出門有一僧金色遮其前車騎不敢過神曰且留更三日迎之光祚知其故又以錢一千圖菩薩像如期又死有頃乃蘇曰適又見迎乃有二僧在未及登車神曰未可取更三日取之光祚又以干錢召金工令更造像工以錢出縣遇人執猪將烹之工愍焉盡以其錢贖之像未之造也而妾又死俄即蘇曰已免矣適又見迎車騎轉盛二僧守其門不得入有豪猪大如馬衝其騎所向顚仆車騎郤走神傳言曰更勿取之於是散去光祚怪何得有猪拒之金工乃言其故由是葢信内教出紀聞宣州司户吳俗畏鬼每州縣必有城隍廟開元末宣州司户卒引見城隍神神所居重深殿宇崇峻侍衞甲仗嚴肅司户既入府君問其生平行事司户自陳無罪枉見錄府君曰然當令君去君頗相識否司户曰鄙人賤陋實未識府君曰吾即晉宣城内史桓彛也爲是神管郡耳司户既蘇言之出紀聞崔圓天寶末崔圓在益州暮春上巳與賔客將校數十百人具舟檝遊於江都人縱觀如堵是日風色恬和波流靜謐初宴作樂賔從肅如忽聞下流十數里絲竹競奏笑語喧然風水薄近如咫尺須臾漸近樓船百艘塞江而至皆以錦繡爲帆金玉飾舟旄纛葢傘旌旗戈㦸繽紛照耀中有朱紫十數人綺羅妓女凡百許飲酒奏樂方酣他舟則列從官武士五六千人持兵戒嚴泝沿中流良久而過圓即令訪問隨行數里近舟舟中方言曰天子將幸巴劒蜀中諸望神祗遷移避駕幸無深怪圓駭愕因罷會時朝廷無事自此先爲其備明歲南狩圓應卒無闕矣出集異記鄭仁鈞鄭仁鈞欽説之子也博學多聞有父風洛陽上東門外有别墅與弟某及姑子表弟某同居弟有妹嫁楊國忠之子時表弟因時疾䘮明睂睫覆目毿毿然又自髪際當鼻準中分至於頷下其左冷如冰而色白其右熱如火而色赤姑與弟皆哀憐之不知其何疾也時洛中有鄭生者號爲卜祝之士先是御史大夫崔琳奉使河朔路經洛陽知鄭生有術乃召與俱行及使回入洛陽鄭生在後至上東門道素知仁鈞莊居在路傍乃詣之未入里門而鄭生遽稱死罪或言合死詞色懾懼仁鈞問之鄭生無他言唯云合死仁鈞固詰之鄭生曰某纔過此不幸飢渴知吾宗在此遂爲不速之客豈知殊不合來此是合死於今日也仁鈞曰吾與姑及弟在更無異人何畏憚如此鄭生股慄愈懼仁鈞初以無目表弟不之比數忽念疾狀冷熱之異安知鄭生不屬意於此乎乃具語表弟之狀鄭生曰彼天曹判官某㝠中胥吏今日偶至此非故有所犯然謁之亦死不謁亦死禮須謁也遂書刺曰地府法曹吏鄭某再拜謁時仁鈞弟與表弟堂上擲錢爲戲仁鈞即於門屛呼引鄭生讀其刺通之鄭生趨入再拜謝罪而出表弟再顧長睫颯然如有怒者仁鈞爲謝曰彼不知弟在此故來願貰其罪可乎良久朗言曰爲兄恕之復詰之再三終不復言姑聞之召於屛内誘之以母子之情感激使言終不肯述其由後數年忽謂母曰促理行裝此地當有兵至兩京皆亂離且拏我入城投楊氏姊匄三二百千旬日便謀東歸江淮避亂也此時楊氏百口皆當誅滅唯姊與甥可以免矣母居常已異之乃入京館於楊氏其母具以表弟之言告於女其姊素知弟有鄭生之言及見其狀貌益異之密白其夫以啓其父國忠怒曰姻親須錢何不以直告乃妖言相恐耶終無一錢與之其女告母曰盡箱篋所有庶可得辦何以彊吾舅時母子止楊氏已四五日矣表弟促之曰無過旬日也其女得二三十萬與母去臨别表弟謂其姊曰别與我一短後之袍其姊以紫綾加絮爲短褐與之而别明年禄山叛駕至馬嵬軍士盡滅楊氏無少長皆死其姊聞亂竄於旅舍後潛匿草中得脱及兵去之後出於路隅見楊氏一家枕籍而死於亂屍中得乳兒青衣已失一臂猶能言姊問我兒在否曰在主人榻上先以比者紫褐覆之其姊還往視之則其兒尚寐於是乃抱之東走姊初走之次忽顧見一老嫗繼踵而來曰楊新婦緩行我欲汝偕隱姊問爲誰曰昔日門下賣履嫗也兵散後能出及得兒者皆此老嫗導引保䕶全於草莽是無目表弟使物保持也不然者何以滅族之家獨漏此二人哉出戎幕閒談季廣琛河西有女郎神季廣琛少時曾遊河西憩於旅舍晝寢夢見雲車從者數十人從空而下稱是女郎姊妹二人來詣廣琛初甚忻悦及覺開目竊見髣髴猶在琛疑是妖於腰下取劒刅之神乃罵曰久好相就能忍惡心遂去廣琛説向主人主人曰此是女郎神也琛乃自往市酒脯作祭將謝前日之過神終不悦也於是琛乃題詩於其壁上墨不成字後夕又夢女郎神來尤怒曰終身遣君不得封邑也出廣異記劉可大劉可大以天寶中舉進士入京出東都途遇少年狀如貴公子服色華侈持彈弓而行賔從甚偉初與可大相狎數日同行至華陰云有莊在縣東相邀往隨至莊所室宇宏壯下客於㕔入室良久可大竊於中門窺覷見一貴人在内㕔理事庭中囚徒甚衆多受拷掠其聲酸楚可大疑非人境惶懼欲去初少年將入謂可大慎無私視恐有相累及出曰適已咨白何爾負約然以此不能復諱家君是華山神相與故人終令有益可無懼也須臾下食顧從者引取人間食與劉秀才食至相對各飽兼致酒叙歡無所不至可大求檢已簿當何進達今年身事復何如回視黄衫吏爲檢有頃吏云劉君明年當進士及第歴官七政可大苦求當年吏云當年只得一政縣尉相爲惜此可大固求之少年再爲改吏去屢回怏怏惜其減禄可大恐鬼神不信固再求之後竟以此失職明年辭去至京及第數年拜滎陽縣尉而終出廣異記奴蒼璧相國李林甫家一奴號蒼璧性敏慧林甫憐之忽一日暴死經宿復蘇林甫問之奴曰死時固不覺其死但忽於門前見儀仗擁一貴人經過有似君上方潛窺之遽有數人走來擒之隨去至一峭㧞竒秀之山俄及大樓下須臾有三四人黄衣小兒至急喚蒼璧入經七重門宇至一大殿下黃衣小兒曰且立於此候君命見殿上捲一珍珠簾一貴人臨階坐似剸割事殿前東西立仗侍衛約千餘人有一朱衣人攜一文簿奏言是新奉命亂國革位者安禄山及相次三朝亂主兼同時悖亂貴人先定案殿上人問朱衣曰大唐君隆基君人之數雖將足矣壽命之數何如耶朱衣曰大唐之君奢侈不節儉本合折數但緣不好殺有仁心故壽命之數在焉又問曰安禄山之後數人僭僞爲主殺害黎元當須速止之無令殺人過多以傷上帝心慮罪及我府事行之當時速止之朱衣奏曰唐君紹位臨御以來天下之人安堵樂業亦已久矣據期運推遷之數天下之人自合罹亂惶惶至矣廣害黎元必不至傷上帝心也殿上人曰宜便先追取李林甫楊國忠也朱衣受命而退俄又有一朱衣捧一文簿至奏言是大唐第六朝天子復位及佐命大臣文簿殿上人曰可惜大唐天子効力甚苦方得天下治到今日復亂也雖嗣主復位乃至於末終不治也謂朱衣曰但速行之朱衣又退及將日夕有一小兒下急喚蒼璧令對見蒼璧方子細見殿上一人坐碧玉牀衣道服戴白玉冠謂蒼璧曰當却回寄語林甫速來我紫府應知人間之苦蒼璧尋得放回林甫知世不久將亂矣遂潛恣酒色焉出瀟湘録南纘唐廣漢守南纘常爲人言至德中有調𨕖得同州督郵者姓崔忘其名字輕騎赴任出春明門見一青袍人乘馬出亦不知其姓字因相揖偕行徐問何官青袍云新受同州督郵崔云某新授此官君豈不誤乎青袍笑而不答又相與行悉云赴任去同州數十里至斜路中有官吏拜迎青袍謂崔生曰君爲陽道録事我爲陰道録事路從此别豈不相送耶崔生異之即與連轡入斜路遂至一城郭街衢局署亦甚壯麗青袍至㕔與崔生同坐伍伯通胥徒僧道等訖次通詞訟獄因崔生大驚謂青袍曰不知吾妻何得至此青袍即避案後令崔生自與妻言妻云被追至此已是數日君宜哀請録事耳崔生即祈求青袍青袍因令吏促放崔生妻迴崔妻問犯何罪至此青袍曰寄家同州應同州亡人皆在此㕔勘過葢君管陽道某管陰道崔生淹流半日請回青衣命胥吏拜送曰雖陰陽有殊然俱是同州也可不拜送督郵哉青袍亦餞送再三勤欵揮袂又令斜路口而去崔生至同州問妻云病七八日㝠然無所知神識生人纔得一日崔生計之恰放回日也妻都不記陰道見崔生言之妻始悟如夢亦不審記憶也出𤣥怪錄王常王常者洛陽人負氣而義見人不平必手刅之見人饑寒至於解衣推食略無難色唐至德二年常入終南山遇風雨宿於山中夜將半雨霽月朗風恬慨然四望而歎曰我欲平天下禍亂無一人之柄以佐我無尺土之封以資我我欲救天下饑寒而衣食自亦不充天地神祗福善顧不足信言訖有神人自空中而下謂常曰爾何爲此言常按劒良久曰我言者平生志也神人曰我有術黄金可成水銀可化雖不足平禍亂亦可濟人之饑寒爾能受此術乎常曰我聞此乃是神仙之術空有名未之覩也徒聞秦始漢武好此道而終無成祗爲千載譏誚耳神人曰昔秦皇漢武帝王也處救人之位自有救人之術而不行反求神仙之術則非也爾無救人之位而欲救天下之人固可行此術常曰黄金成水銀化真有之乎神人曰爾勿疑夫黃金生於山石其始乃山石之精液千年爲水銀水銀受太陰之氣固流蕩而不凝定微偶純陽之氣合則化黄金於倐忽也今若以水銀欲化黃金不必須在山即化不在山即不化但偶純陽之氣合即化矣君當受勿疑常乃再拜神人於袖中取一卷書授常常跪受之神人戒曰異日當却付一人勿輕授勿終袐勿授之以貴人彼自有救人之術勿授之以不義彼不以饑寒爲念濟人之外無奢逸如不然天奪爾算常又再拜曰願知何神也神人曰我山神也昔有道人藏此書於山今遇爾義烈之人是以付爾言訖而滅常得此書讀之成其術爾後多遊厯天下以黃金賑濟乏絶出瀟湘録太平廣記卷三百三
