body:
  text: 太平廣記卷四百六十一宋李昉等編禽鳥二孔雀交趾羅州王軒燕漢燕胡燕千嵗燕晉瑞元道康范質鷓鴣飛數飛南向吳楚鷓鴣鵲鴿附知太嵗張顥條支國黎景逸張昌期崔圓妻乾陵鴿信鷄陳倉寳雞楚雞衛女長鳴鷄沉鳴鷄孫休吳清廣州刺史祝鷄公朱綜代郡亭高嶷天后衛鎬合肥富人孔雀交趾交趾郡人多養孔雀或遺人以充口腹或殺之以為脯腊人又養其雛為媒旁施網罟捕野孔雀伺其飛下則牽網横掩之採其金翠毛裝為扇拂或全株生截其尾以為方物云生取則金翠之色不減耳出嶺表録異羅州羅州山中多孔雀羣飛者數十為偶雌者尾短無金翠雄者生三年有小尾五年成大尾始春而生三四月後復凋與花蕚相榮衰然自喜其尾而甚妬凡欲山棲必先擇有置尾之地然後止焉南人生捕者候甚雨往擒之尾霑而重不能髙翔人雖至且愛其尾恐人所傷不復騫翔也雖馴養頗久見羙婦人好衣裳與童子絲服者必逐而啄之芳時媚景聞管絃笙歌必舒張翅尾盻睇而舞若有意焉山谷夷民烹而食之味如鵝解百毒人食其肉飲藥不能愈病其血與其首觧大毒南人得其卵使雞伏之即成其脚稍屈其鳴若曰都䕶土人取其尾者持刀於叢篁可𨼆之處自蔽伺過急斷其尾若不即斷廻首一顧金翠無復光彩出紀聞王軒盧肇住在京南海見從事王軒有孔雀一日奴告曰蛇盤孔雀且毒死矣軒令救之其走卒笑而不救軒怒卒曰蛇與孔雀偶出紀聞燕漢燕蓐泥為窠聲多稍小者漢燕陶勝力注本草云紫胸輕小者是越燕胸斑黒聲大者是胡燕其作巢喜長越燕不入藥用越與漢亦小差耳出世説胡燕凡狐白貂鼠之𩔖燕見之則毛脱或燕蟄於水底舊説燕不入室取桐為男女各一投井中燕必來胸斑黒聲大名胡燕其窠有容匹素者出酉陽雜爼千嵗燕齊魯之間謂燕為乙作巢避戊巳𤣥中記云千嵗之燕户北向述異要云五百嵗燕生胡髯出酉陽雜爼晉瑞魏禪晉嵗北闕下有白光如鳥雀之狀時有飛翔去來有司即聞奏帝使羅者張之得一白燕以為神物以金為籠致於宫内旬日不知所在論者云金徳之瑞昔師曠時有白燕來巢檢瑞應圖果如所論師曠晉人也古今之議相符焉出拾遺録元道康後魏元道康字景怡居林慮山雲棲幽谷靜掩衡茅不下人間踰二十載服餌芝术以娛其志髙歡為丞相前後三辟不就道康以時方亂不欲應之至髙洋又徴亦不起道康書齋常有雙燕為巢嵗嵗未嘗不至道康以連徴不去有懼見抑不覺嗟咨是夕秋月朗然清風颯至道康向月微思忽聞燕呼康字云景怡卿本澹然為樂今何愁思之深耶道康驚異乃知是燕又曰景怡景怡樂以終身康曰爾為禽而語何巢我屋燕曰我為上帝所罪暫為禽耳以卿盛徳故來相依道康曰我忘利不售人間所以閉闗服道寜昌其徳為卿所謂燕曰海内棲𨼆盡名譽耳獨卿知道卓然囂外所以神祗敬屬萬靈歸徳燕曰我來日晝時往前溪相報道康乃䇿杖南溪以伺其至及晝見二燕自北嶺飛來而投澗下一化為青衣童子一化為青衣女子前來謂道康曰今我便歸以卿相命故來此化然無以留别卿有𨼆志幽陰見嘉卿之夀更四十嵗以此相報言訖復為雙燕飛去不知所往時道康巳年四十後果終八十云出紀聞范質漢户部侍郎范質言嘗有燕巢於舍下育數雛已哺食矣其雌者為猫所搏食之雄者啁啾久之方去即時又與一燕為匹而至哺雛如故不數日諸雛相次墮地宛轉而殭兒童剖腹視之則有蒺藜子在嗉中葢為繼偶者所害出玉堂閒話鷓鴣飛數鷓鴣飛數逐月如正月一飛而止于窠中不復起矣十二月十二起最難採南人設網取之出酉陽雜爼飛南向鷓鴣似雌雉飛但南不向北楊孚交州異物志云鳥像雌雉名鷓鴣其志懐南不思北徂出雜録吳楚鷓鴣鷓鴣吳楚之野悉有嶺南偏多此鳥肉白而脆逺勝雞雉能解冶葛并菌毒臆前有白圓㸃背上間紫赤毛其大如野雞多對啼南越志云鷓鴣惟東西㢠廻翔然開翅之始必先南翥其鳴自呼社薄州又本草云自呼鉤輈格磔李羣玉山行聞鷓鴣詩云方穿詰曲﨑嶇路又聴鉤輈格磔聲出嶺南録異鵲知太嵗鵲知太嵗之所在博物志云鵲巢背太嵗此非才智任自然爾淮南子曰鵲識嵗多風喬木巢傍枝出説文又鵲構窠取在樹杪枝不取墮地者又纒枝受卵端午日午時焚其巢炙病者疾立愈出酉陽雜爼張顥常山張顥為梁相天新雨後有鳥如山鵲稍下墮地民拾取即化為一圓石顥椎破之得一金印文曰忠孝侯印顥以上聞藏之秘府顥後官至太尉後議郎汝南樊行夷校書東觀上表言堯舜之時嘗有此官云出酉陽雜爼條支國章帝永寜元年條支國有來進異瑞有鳥名鳷鵲形髙七尺解人言其國太平鳷鵲羣翔昔漢武時四夷賔服有致此鵲馴善有吉樂事則鼓翼翔鳴按莊周云雕陵之鵲葢其類也出拾遺記黎景逸唐貞觀末南康黎景逸居於空青山常有鵲巢其側每飯食餧之後鄰近失布者誣景逸盜之繋南康獄月餘劾不承欲釋之其鵲止于獄樓向景逸歡喜似傳語之狀其日𫝊有赦官司詰其來云路逢𤣥衣素衿人所説三日而赦果至景逸還山乃知𤣥衣素衿者鵲之所𫝊出朝野僉載張昌期汝州刺史張昌期易之弟也恃寵驕貴酷暴羣僚梁縣有人白云有白鵲見昌期令司户楊楚玉捕之部人有鷂子七十籠矣以蠟塗爪至林見白鵲有羣鵲隨之見鷂迸散唯白者存焉鷂竦身取之一無損傷而籠送之昌期笑曰此鵲贖君命也玉叩頭曰此天活玉不然投河赴海不敢見公拜謝而去出朝野僉載崔圓妻鵲窠中必有棟崔圓相公妻在家時與姊妹於後園見一鵲構窠共銜一木大如筆管長尺餘安窠中衆悉不見俗言見鵲上梁必貴出酉陽雜爼乾陵大厯八年乾陵上仙觀之尊殿有雙鵲銜柴及泥補葺隙壊十五處宰臣表賀之出酉陽雜爼鴿信大理丞鄭復禮言波斯舶上多養鴿鴿能飛行數千里輙放一隻至家以為平安信出酉陽雜爼鷄陳倉寳雞秦穆公時陳倉人掘地得物若羊非羊若猪非猪牽以獻穆公道逄二童子曰此為媪述常在地中食死人腦若欲殺之以柏插其首媪曰此二童子名為鷄寳得雄者王得雌者伯陳倉人捨之逐二童子二童化為雉飛入於林陳倉人告穆公發徒大獵果得其雌又化為石置之汧渭之間至文公立祠名陳寳雄者飛南集今南陽雉飛縣即其地也出列異傳楚雞楚人有擔山雞者路人問曰何鳥也擔者欺之曰鳯凰也路人曰我聞有鳯凰久矣今真見之汝賣之乎曰然乃酬千金弗與請加倍乃與之方將獻楚王經宿而鳥死路人不遑惜其金惟恨不得以獻耳國人傳之咸以為真鳯而貴宜欲獻之遂聞於楚王王感其欲獻已也召而厚賜之過買鳯之直十倍矣出笑林衛女雉朝飛操者衛女傅母所作也衛侯女嫁於齊太子中道聞太子死問傅母曰何如傅母曰且徃當䘮䘮畢不肯歸終之以死傅母悔之取女所自操琴於塜上鼓之忽有二雉俱出墓中傅母撫雌雉曰女果為雉耶言未卒俱飛而起忽然不見傅母悲痛援琴作操故曰雉朝飛出揚雄琴清英長鳴鷄漢成帝時交趾越雋獻長鳴鷄伺晨鷄即下漏驗之晷刻無差長鳴一食頃不絶長距善鬬出西京雜記沉鳴鷄建安三年胥圖獻沉鳴石鷄色如丹大如燕常在地中應時而鳴聲能逺徹其國聞其鳴乃殺牲以祀之當聲處掘地得此鷄若天下平翔飛頡頏以為嘉瑞亦謂寳鷄其國無鷄人聽地中以候晷刻道師云昔仙人相君採石入穴數里得丹石鷄舂碎為藥服者令人有聲氣後天而死昔漢武寳鼎元年四方貢珍怪有琥珀燕置之静室自然鳴翔此之類也洛書云胥圖之寳土徳之徴大魏嘉瑞焉出王子年拾遺記孫休孫休好射雉至其時則晨往夕還羣臣莫不上諫曰此小物何足甚躭答曰雖為小物耿介過人朕之所以好也出語林吳清徐州民吳清以太元五年被差為征民殺鷄求福煮鷄頭在盤中忽然而鳴其聲甚長後破賊帥邵寳寳臨陣戰死其時僵尸狼籍莫之能識清見一人著白袍疑是主帥遂取以聞推挍之乃是寳首清以功拜清河太守越自什伍遽升榮位鷄之祅更為吉祥出甄異記廣州刺史廣州刺史䘮還其大兒安吉元嘉三年病死第二兒四年復病死或敎以一雄鷄置棺中此鷄每至天欲曉輒在棺裏鳴三聲甚悲徹不異栖中鳴一月日後不復聞聲出齊諧記祝鷄公祝鷄公者洛陽人也居尸鄉北山下養鷄百餘年鷄皆有名字千餘頭暮棲樹下晝放散之欲取呼名即種别而至賣鷄及子得千餘萬輙置錢去之吳作池養魚後登吳山雞雀數百常出其旁出列仙傳朱綜臨淮朱綜遭母難恒外處住内有病因往視婦曰䘮禮之重不煩數還綜曰自荼毒已來何時至内婦云君來多矣綜知是魅敕婦婢候來便即閉户執之及來登往赴視此物不得去遽變老白雄鷄推問是家鷄殺之遂絶劉義慶幽明録代郡亭代郡界中一亭作怪不可止有諸生壯勇者暮行欲止亭宿亭吏止之諸生曰我自能消此乃住宿食夜諸生前坐出一手吹五孔笛諸生笑謂鬼曰汝止有一手那得遍笛我為汝吹來鬼云卿為我少指耶乃復引手即有數十指出諸生知其可撃因㧞劒砍之得老雄鷄出幽明録高嶷唐渤海高嶷巨富忽患目餘日帖然而卒心上仍暖經日而蘇云有一白衣人眇目把牒㝠司訟殺其妻子嶷對元不識此老人㝠官云君命未盡且放歸遂悟白衣人乃是家中老瞎麻鷄也令射殺魅遂絶出紀異天后唐文明已後天下諸州進雌雞變為雄者甚多或半已化半未化乃則天正位之兆出紀異衛鎬衛鎬為縣官下鄉至里人王幸在家方假寐夢一烏衣婦人引十數小兒著黄衣咸言乞命叩頭再三斯須又至鎬甚惡其事遂催食欲前適鎬所親者報曰王幸在家窮無物設饌有一鷄見抱兒已得十餘日將欲殺之鎬方悟烏衣婦人果烏鷄也遂命解放是夜復夢感謝欣然而去並出朝野僉載合肥富人合肥有富人劉某好食鷄每殺鷄必先刖雙足置木櫃中血瀝盡力乃烹以為去腥氣某後病生瘡於鬢既愈復生小鷄足於瘡瘢中每巾櫛必傷其足傷即流血被面痛楚竟日如是積嵗無日不傷竟以是卒出稽神録太平廣記卷四百六十一
