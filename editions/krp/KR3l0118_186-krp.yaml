body:
  text: 太平廣記卷一百八十六銓選二斜封官盧従愿韋抗張仁愿杜暹魏知古盧齊卿王丘崔琳裴光庭薛據李林甫張說張奭楊國忠陸贄鄭餘慶裴遵慶李絳李建崔安潛斜封官唐景龍年中斜封得官者二百人従屠販而踐髙位景雲踐祚尚書宋璟御史大夫畢構奏停斜封人官璟構出後見鬼人彭卿受斜封人賄賂奏云見孝和怒曰我與人官何因奪却於是斜封皆復舊職偽周革命之際十道使人天下選殘明經進士及下村教童蒙博士皆被捜揚不曾試練並與美職塵黷士人之品誘恱愚夫之心庸才者得官以為榮有才得官以為辱昔趙王倫之簒也天下孝廡秀才茂異並不簡試雷同與官市道屠沽亡命不軌皆封侯略盡太府之銅不供鑄印至有白版侯者朝㑹之服貂者大半故謡云貂不足狗尾續小人多幸君子恥之無道之朝一何連𩔖也惜㢤出朝野僉載慮従愿景雲元年盧従愿為侍郎精心條理大稱平允其有冒名為選虚增功狀之𩔖皆能擿發其事典選六年頗有聲稱時人曰前有裴馬後有盧李裴即行儉馬謂戴李謂朝𨼆出唐㑹要韋抗景雲二年御史中丞韋抗加京畿桉察使舉奉天縣尉梁昇卿新豐尉王倕金城縣尉王水華原縣尉王燾為判官其後皆著名位出唐㑹要張仁愿景雲二年朔方總管張仁愿奏用監察御史張敬忠何奕長安縣尉寇泚鄠縣尉王易従始平縣主簿劉體微分判軍事義烏縣尉晁良貞為隨軍後皆至大官出唐㑹要杜暹景雲二年盧従愿為吏部侍郎杜暹自婺州叅軍調集補鄭縣尉後暹為户部尚書従愿自益州長史入朝暹立在盧上謂之曰選人定何如盧曰亦由僕之藻鑑遂使明公展千里足也出唐㑹要魏知古先天元年侍中魏知古嘗表薦洹水縣令吕太一蒲州司功叅軍齊澣右内率府騎曹栁澤及為吏部尚書又擢宻縣尉宋遙左補闕𡊮暉封希顔伊闕縣尉陳希烈其後咸居清要出唐㑹要盧齊卿開元元年盧齊卿為幽州刺史時張守珪為果毅特禮接之謂曰十年内當節度果如其言也出唐㑹要王丘開元八年七月王丘為吏部侍郎擢山隂尉孫逖桃林尉張鏡㣲湖城丞張晉明進士王泠然李昻等不數年登禮闈掌綸誥焉出唐㑹要崔琳十一年十二月吏部侍郎崔琳銓日收選殘人盧怡裴敦復于號卿等十數人無何皆入臺省衆以為知人出唐㑹要裴光庭開元十八年蘇晉為侍郎而侍中裴光庭每過官應批退者但對衆披簿以朱筆㸃頭而已晉遂牓𨕖院門下㸃頭者更引注擬光庭以為侮已不恱時有門下主事閻鱗之為光庭腹心専主吏部過官每鱗之裁定光庭隨口下筆時人語曰鱗之口光庭手出唐㑹要薛據開元中薛據自恃才名於吏部參𨕖請授萬年錄事諸流外官共見宰執訴云錄事是某等清要官今被進士欲奪則某等色人無措手足矣遂罷出摭言李林甫自開元二十年吏部置南院始懸長名以定畱放時李林甫知選寕王私謁林甫曰就中乞一人林甫責之於是榜云據其書判自合得畱緣屬寕王且放冬集出國史𥙷張說中書舎人張均知考父左相張說知京官考特注曰父教子忠古之善訓祁奚舉子義不務私至如潤色王言章施帝載道參墳典例絶常功恭聞前烈尤難其任豈以嫌疑敢撓綱紀考上下出𤣥宗實錄張奭苗晉卿典選御史中丞張倚男奭參選晉卿以倚子思恱附之考等第凡六十四人奭在其首蘇考蘊者為薊令乃以選事告祿山祿山奏之𤣥宗乃集登科人於花蕚樓前重試升第者十無一二奭手持試紙竟日不下一字時人謂之拽白上大怒貶倚敕曰庭闈之間不能訓子選調之際乃以托人天下為戯談晉卿貶安康出盧氏雜說楊國忠天寳十載十一月楊國忠為右相兼吏部尚書奏請兩京選人銓日便定畱放無少長各於宅中引注虢國姊妹垂簾觀之或有老病醜陋者皆指名以笑雖士大夫亦遭斥恥故事兵吏部注官訖於門下過侍中給事中省不過者謂退量國忠注官呼左相陳希烈於坐隅給事中行列於前曰既對注擬即是過門下了希烈等腹誹而已侍郎韋見素張倚皆衣紫與本曹郎官藩屏外排比案牘趨走語事乃謂簾中楊氏曰兩箇紫袍主事何如楊乃大噱選人鄭某附㑹其旨與二十餘人率錢於勤政樓設齋簾為國忠立碑於尚書省南所注吏部三銓選人専務鞅掌不能躬親皆委典及令史孔目官為之國忠但押一字猶不可遍出唐續㑹要陸贄貞元八年春中書侍郎平章事陸贄始復令吏部每年集選人舊事吏部每年集人其後遂三數年一置選選人併至文書多不可尋勘眞偽紛雜吏因得大為奸巧選人一蹉跌或十年不得官而官之闕者或累嵗無人贄命吏部分内外官員為三分計闕集人嵗以為常其弊十去七八天下稱之出唐㑹要鄭餘慶宣平鄭相之銓衡也選人相賀得入其銓劉禹錫曰予從弟某在鄭銓注湖州一尉唱唯而出鄭呼之却迴曰如公所試塲中無五六人一唱便受之此而不奬何以銓衡公要何官去家穏便曰家住常州乃注武進縣尉選人翕然畏而愛之及後作相過官又稱第一其有後於魯也又云陳諷張復元各注畿縣請換縣允之既而張却請不換鄭牓子引張纔入門已定不可改時人服之出嘉話錄裴遵慶裴遵慶罷相知選朝廷優其年徳令就第注官自宣平坊牓引士子以及東市兩街時人以為盛事出國史補李絳長慶初吏部尚書李絳議置郎官十人分判南曹吏人不便旬日出為東都畱守自是選曹成狀常速畢出國史補李建李建為吏部郎中常曰方今秀茂皆在進士使僕得志當令登第之嵗集于吏部使尉緊縣既罷復集稍尉望縣既罷乃尉畿縣而升於朝大凡中人三十成名四十乃至清列遲速為宜既登第遂食祿既食祿必登朝誰不欲也無淹翔以守常限無紛競以來奔㨗下曹得其循舉上位得其更厯就而言之其利甚博議者多之出國史補崔安潛崔安潛東洛掌選時選人中不能顯其名姓竊顧雲啓事投獻者崔公不之知大賞嘆召之與語便注一超資縣令後有人白崔公方悔出盧氏雜說太平廣記卷一百八十六
