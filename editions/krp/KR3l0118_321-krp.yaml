body:
  text: 太平廣記卷三百二十一宋李昉等編鬼六郭翻王瑗之牽騰新鬼劉青松庾亮司馬義李元明張闓庾紹之韋氏胡馥之賈雍宋定伯呂光郭翻晉郭翻字長翔武昌人敬言之弟子也徴聘不起亡數日其少子忽如中惡狀不復識人作靈語音聲如其父多知隂世所問皆答而昔時庾亮欲取爲上佐不就家問曰君生有令徳沒爲神明今豈有官職也答曰我本無仕進之志以庾公欲見取不願故得脫今復爲羈縶不得從初願故爾戚戚也問庾今何官答云爲天所用作撫軍大將軍見居東海之東統領神兵取吾為司馬本欲取謝仁祖爲之選官以為資望未足且蔣大侯先取爲都尉是以不能因問陶太尉何官答云陶辛苦不可言方在罪謫之候過此大得敘用也又問王丞相今何職答曰王公爲尚書郎大屈事更萬機位雖不及生時而貴勢無異也諸人曰亡後還思後人否長翔曰亡已久則不復念生人如吾始死私心未歇猶自有念也靈語兒求紙筆欲作書與親舊捉筆以命兒書之皆横行似胡書已成一紙曰此是鬼書人莫能識使人持紙口授作書書畢諸人言蘇孝先多作此語已而復作詩一首曰性軀還昔志精魂久逍遥秉心不得令不免時所要薄言塵外事何遂謂言妖郭大没无識在昔有蘇韶出幽異録王瑗之廣漢王瑗之爲信安令在縣忽有一鬼自稱姓蔡名伯喈俄復談詩文揆知古今靡所不諳問是昔日蔡邕否答云非也與之同姓字耳問前伯喈今何在云在天上作仙人甚是受福其快樂非復疇昔也出齊諧記牽騰牽騰以咸和三年爲沛郡太守出行不節夢烏衣人告云何數出不輟唯當斷馬足騰後出行馬足自斷騰近行郭外忽然而闇有一人長丈餘𤣥冠白衣遥叱將車人使避之俄而長人至以馬鞭撃御者即倒既明從人視車空覓騰所在行六七十步見在榛莽中隱几而坐云了不自知騰五十日被誅出幽明錄新鬼有新死鬼形疲瘦頓忽見生時友人死及二十年肥健相問訊曰卿那爾曰吾飢餓殆不自任卿知諸方便故當以法見教友鬼云此甚易耳但爲人作怪人必大怖當與卿食新鬼往入大虚東頭有一家奉佛精進屋西廂有磨鬼就捱此磨如人推法此家主語子弟曰佛憐吾家貧令鬼推磨乃輦麥與之至夕磨數斛疲頓乃去遂罵友鬼卿那誑我又曰但復去自當得也復從虚西頭入一家家奉道門傍有碓此鬼便上碓如人舂狀此人言昨日鬼助某甲今復来助吾可輦榖與之又給婢簸篩至夕力疲甚不與鬼食鬼暮歸大怒曰吾自與卿爲婚婣非他比如何見欺二日助人不得一甌飲食友鬼曰卿自不偶耳此二家奉佛事道情自難動今去可覓百姓家作怪則無不得鬼復去得一家門首有竹竿從門入見有一羣女子窻前共食至庭中有一白狗便抱令空中行其家見之大驚言自来未有此怪占云有客鬼索食可殺狗并甘果酒飯於庭中祀之可得無他其家如師言鬼果大得食自此後恒作怪友鬼之教也出幽明錄劉青松廣陵劉青松晨起見一人著公服賫版云召爲魯郡太守言訖便去去後亦不復見至来日復至曰君便應到職青松知必死入告妻子處分家事沐浴至晡見車馬吏侍左右青松奄忽而絶家人咸見其升車南出百餘步漸髙而沒出幽明錄庾亮庾亮鎮荆州亮登厠忽見厠中一物如方相兩眼盡赤身有光耀漸漸從土中出庾乃攘臂以拳撃之應手有聲縮入地因而寢疾遂亡出甄異録司馬義金吾司馬義妾碧玉善絃歌義以太元中病篤謂碧玉曰吾死汝不得别嫁當殺汝曰謹奉命葬後其鄰家欲娶之碧玉當去見義乗馬入門引弓射之正中其喉喉便痛亟姿態失常奄忽便絕十餘日乃甦不能語四肢如被撾損周歳始能言猶不分明碧玉色甚不美本以聲見取既被患遂不得嫁出甄異錄李元明後唐李元明嘗在牀上臥時夜半忽聞人呼云元明元明久乃出應有二人便牽將去入屋下捨去不知所在至逾時竟鮮所見徐捫所坐牀是棺木四壁皆是冢恐怖不安欲去難如升天不復能出家人左右索不知所往因率領僕從乃共大呼其名元明於冢中聞遥應之乃鑿門出之出甄異録張闓新城張闓以建武二年從野還宅見一人臥道側問之云足病不能復去家在南楚無所告訴闓憫之有後車載物棄以載之既達家此人了無感色且語闓曰向實不病聊相試耳闓大怒曰君是何人而敢弄我也答曰我是鬼耳承北臺使来相收錄見君長者不忍相取故佯爲病臥道側向乃捐物見載誠銜此意然被命而来不自由奈何闓驚請留鬼以豚酒祀之鬼相爲酹享於是流涕固請求救鬼曰有與君同名字者否闓曰有僑人黄闓鬼曰君可詣之我當自往闓到門主人出見鬼以赤摽摽其首因回手以小鈹刺其心主人覺鬼便出謂闓曰君有貴相某爲惜之故虧法以相濟然神道幽密不可宣泄闓後去主人暴心痛夜半便死闓年六十位至光禄大夫出甄異錄庾紹之晉新野庾紹之小字道覆湘東太守與南陽宗協中表昆弟情好綢繆紹之元興未病亡義熈中忽見形詣協形貌衣服具如平生而兩脚著械既至脫械置地而坐協問何由得来顧答云暫䝉假歸與卿親好故相過也協問鬼神之事言輒漫畧不甚諧對唯云宜勤精進不可殺生若不能都斷可勿宰牛食肉之時勿啗物心協云五臟與肉乃有異耶答曰心者藏神之宅也其罪尤重具問親戚因談世事末復求酒協時釀茱萸酒因爲設之酒至杯不飲云有茱萸氣協曰爲惡耶答云下官皆畏之非獨我也紹之爲人語聲髙壯比言論時不異恒日有頃協兒邃之来紹之聞屐聲極有懼色謂協曰生氣見陵不復得住與卿三年别耳因貫械而起出户便滅協後爲正員郎果三年而卒出冥祥記韋氏安定人姓韋北伐姚泓之時歸國至都住親知家時兵戈擾亂齊有客来問之韋云今雖免慮而體氣惙然未有氣力思作一羮尤莫能得至凄苦夜中眠熟忽有叩牀而来告者云官與君錢便驚出户見一千錢在外又見一烏紗冠幘人執版背户而立呼主人共視比来已不復見而取錢用之出幽明錄胡馥之上郡胡馥之娶婦李氏十餘年無子而婦卒哭之慟曰汝竟無遺體怨酷何深婦忽起坐曰感君痛悼我不即朽可人定後見就依平生時當爲君生一男語畢還臥馥之如言不取燈燭暗而就之復曰亡人亦無生理可側作屋見置須伺滿十月然後殯爾後覺婦身微煖如未亡既十月後生一男男名靈産出幽明錄賈雍豫章太守賈雍有神術出界討賊爲賊所殺失頭上馬回營胸中語曰戰不利爲賊所傷諸君視有頭佳乎無頭佳乎吏涕泣曰有頭佳雍曰不然無頭亦佳言畢遂死出述異記宋定伯南陽宋定伯年少時夜行逢鬼問之鬼言我是鬼鬼問汝復誰定伯誑之言我亦鬼鬼問欲至何所答曰欲至宛市鬼言我亦欲至宛市遂行數里鬼言步行太遲可共逓相擔何如定伯曰大善鬼便先擔定伯數里鬼言卿太重不是鬼也定伯言我新鬼故身重耳定伯因復擔鬼鬼略無重如是再三定伯復言我新鬼不知有何所惡忌鬼答言唯不喜人唾於是共行道遇水定伯令鬼渡聽之了然無水音定伯自渡漕漼作聲鬼復言何以有聲定伯曰新死不習渡水故爾勿怪吾也行欲至宛市定伯便擔鬼著肩上急執之鬼大呼聲咋咋然索下不復聴之徑至宛市中下著地化爲一羊便賣之恐其變化唾之得錢千五百乃去當時有言定伯賣鬼得錢千五出列異傳吕光吕光承康元年有鬼呌於都街曰兄弟相滅百姓弊徼吏尋視之則無所見其年光死子紹代立五日紹庶兄簒殺紹自立出述異記太平廣記卷三百二十一
