body:
  text: 太平廣記巻五十三神仙五十三麒麟客王法進維揚十友金可記楊真伯麒麟客麒麟客者南陽張茂實客傭僕也茂實家於華山下唐大中初偶遊洛中假僕於南市得一人焉其名曰王夐年可四十餘傭作之直月五百勤幹無私出於深誠茍有可為不待指使茂實器之易其名曰大歴將倍其直固辭其家益憐之居五年計酬直盡一旦辭茂實曰夐本居山家業不薄適與厄㑹須傭作以禳之固非無資而賣力者今厄盡矣請從此辭茂實不測其言不敢留聽之去日暮入白茂實曰感君恩宥深欲奉報夐家去此甚近其中景趣亦甚可觀能相逐一遊乎茂實喜曰何幸然不欲令家人知潛一遊可乎夐曰甚易於是截竹杖長數尺其上書符授茂實曰君杖此入室稱腹痛左右人悉令取藥去後潛置竹於衾中抽身出來可也茂實從之夐喜曰君眞可遊吾居者也相與南行一里餘有黄頭執青麒麟一赤文虎二候於道左茂實驚欲迴避夐曰無苦但前行既到前夐乘麒麟茂實與黄頭各乘一虎茂實懼不敢近曰夐相隨請不須畏且此物人間之極俊者但試乘之遂慿而上穩不可言於是從之上仙掌峰越壑凌山舉意而過殊不覺峻險如到三更計數百里矣下一山物衆鮮媚松石可愛樓臺宮觀非世間所有將及門引者揖曰阿郎何來紫衣吏數百人羅拜道側既入青衣數十人容色皆殊衣服鮮華不可名狀各執樂器引拜遂於中堂宴食畢且命茂實坐夐入更衣返坐衣裳冠冕儀貌堂堂然實真仙之風度也其忩户階闥屏幃茵褥之盛固非人世所有歌鸞舞鳯及諸聲樂皆所未聞情意高逸不復思人寰之事歡極主人曰此乃仙居非世人所到以君宿縁合一到此故有逃厄之遇仙俗路殊塵靜難雜君宜歸修其心三五刼後當復相見夐比者塵緣將盡上界有名得遇太清眞人召入小有洞中示以九天之樂復令下指生死海波且曰樂雖難求苦亦易遣如為山者掬土增高不掬則止穿則陷夫昇高者不上難而下易乎自是修習經六七刼乃證此身迴視委骸積如山岳曰大海水半是吾宿世父母妻子别泣之淚然念念修之倐已一世形骸雖逺此不忘修致其功即亦非逺亦時有心逺氣清一言而悟者勉之遺金百鎰為營身之助復乘麒麟令黄頭執之夐步送到家家人方環泣茂實投金於井中夐抽去竹杖令茂實潛卧衾中夐曰我當至蓬萊謁大仙伯明旦蓮花峰上有綵雲車去我之乘也遂揖而去茂實忽呻吟衆驚而問之茂實紿之曰初腹痛時忽若有人見召遂奄然耳不知其多少時也家人曰取藥既迴呼之不應已七日矣唯心頭尚暖故未歛也明日望之蓮花峰上果有綵雲遂棄官遊名山後歸出井中金與眷屬再出遊山後不知所在也出續𤣥怪録王法進王法進者劔州臨津人也幼而好道家近古觀雖無道士居之其嬉戲未嘗輕侮於像設也十餘歲有女冠自劔州歴外邑過其家父母以其慕道託女冠以保䕶之與授正一延生小籙名曰法進而專勤香火齋戒䕶持亦茹柏絶粒時有感降時三川饑儉斛㪷翔貴死者十五六多採野葛山芋以充饑忽三青童降於其庭謂法進曰上帝以汝夙禀仙骨歸心精誠不忘於道勅我迎汝受事於上京也不覺騰空逕達大帝之所命以玉盃霞漿賜之徐謂曰人處三才之大體天地之和得人形生中土甚不易也天運四時之氣地禀五形之秀生五榖百果以養於人而人不知天地養育之恩輕棄五榖厭捨絲麻使耕農之夫紡績之婦身勤而不得飽力竭而不禦寒徒施其勞曾無愛惜者斯固神明所責天地不佑矣近者地司岳瀆所奏以世人厭擲五榖不貴衣食之本我已勅太華之府収五榖之神所種不成下民饑餓因示罰責以懲其心然旋奉太上慈旨以大道好生務先救物雖天地神明責之愚民不知其過所自固無懴請首原之路汝當為上宮侍童入侍天府今且令汝下歸於世告喻下民使其悔罪寳愛農桑此亦汝之陰功也命侍女以靈寳清齋告謝天地儀一軸付之使傳行於世曰令世人相率於幽山高靜之所致齋悔謝一年再為之則宿罪可除榖父𧖟母之神為致豐衍矣龍虎之年復當召汝即今清齋天公告謝之法是也法進以天寳十二年壬辰遂復昇天出仙傳拾遺維揚十友維揚十友者皆家産麤豐守分知足不干祿位不貪貨財慕𤣥知道者也相約為友若兄弟焉時海内大安民人胥悅遽以酒食為娯自樂其志始於一家周於十室率以為常忽有一老叟衣服滓弊氣貌羸弱似貧窶不足之士也亦著麻衣領十人來以造其㑹衆既適情亦皆憫之不加斥逐醉飽自去莫知所之一旦言於衆曰余力困之士也幸衆人許陪坐末不以為責今十人置宴皆得預之席既周畢亦願力為一㑹以答厚恩約以他日願得同往至期十友如其言相率以待凌晨貧叟果至相引徐步詣東塘郊外不覺為逺草莽中苑屋兩三間傾側欲摧引入其下有丐者數輩在焉皆是蓬髪鶉衣形狀穢陋叟至丐者相顧而起牆立以俟其命叟令掃除舎下陳列籧篨布以菅席相邀環坐日既旰矣咸有饑色久之各以醯鹽竹筯置於客前逡巡數輩共舉一巨板如案長四五尺設於席中以油帊幕之十友相顧謂必濟饑甚以為喜既撒油帊氣燑燑然尚未可辨久而視之乃是蒸一童兒可十數歳已糜爛矣耳目手足半已墮落叟揖譲勸勉使衆就食衆深嫌之多託以飫飽亦有忿恚逃去都無肯食者叟縱意飡啖似有盈味食之不盡即命諸丐擎去令盡食之因謂諸人曰此所食者千歳人參也頗甚難求不可一遇吾得此物感諸公延遇之恩聊欲相報且食之者白日昇天身為上仙衆既不食其命也夫衆驚異悔謝未及叟促問諸丐令食訖即來俄而丐者化為青童玉女幡葢導從與叟一時昇天十友刳心追求更莫能見出神仙感遇傳金可記金可記新羅人也賓貢進士性沉靜好道不尚華侈或服氣錬形自以為樂博學強記屬文清麗美姿容舉動言談迥有中華之風俄擢第隐於終南山子午谷葺居懷隱逸之趣手植奇花異果極多常焚香靜坐若有思念又誦道德及諸仙經不輟後三年思歸本國航海而去復來衣道服却入終南務行陰德人有所求初無阻拒精勤為事人不可偕也唐大中十一年十二月忽上表言臣奉玉皇詔為英文臺侍郎明年二月二十五日當上昇時宣宗極以為異遣中使徵入内固辭不就又求玉皇詔辭以為别仙所掌不留人間遂賜宮女四人香藥金綵又遣中使二人專伏侍者可記獨居靜室宮女中使多不接近每夜聞室内常有客談笑聲中使竊窺之但見仙官仙女各坐龍鳯之上儼然相對復有侍衞非少而宮女中使不敢輒驚二月二十五日春景妍媚花卉爛漫果有五雲唳鶴翔鸞白鵠笙簫金石羽蓋瓊輪幡幢滿空仙仗極衆昇天而去朝列士庶觀者塡隘山谷莫不瞻禮歎異出續仙傳楊眞伯𢎞農楊眞伯幼有文性耽翫書史以至忘寢食父母不能禁止時或奪其脂燭匿其詩書真伯頗以為患遂逃過洪饒間於精舎空院肄習半年餘中秋夜習讀次可二更已來忽有人扣學窓牖間真伯淫於典籍不知也俄然有人啟扉而入乃一䨇鬟青衣言曰女郎久棲幽隱服氣茹芝多往來洞庭雲水間知君子近至此又骨氣清淨志操堅白願盡欵曲真伯殊不應青衣自返三更後聞户外珩璜環珮之聲異香芳馥俄而青衣報女郎且至年可二八冠碧雲鳯翼冠衣紫雲霞日月衣精光射人逡巡就坐眞伯殊不顧問一言久之於真伯案取硯青衣薦牋女郎書札數行㥏然而去眞伯因起乃視其所留詩曰君子竟執逆無由達誠素明月海上山秋風獨歸去其後亦不知女郎是何人也豈非洞庭諸仙乎觀其詩思豈人間之言歟出博異志太平廣記巻五十三
