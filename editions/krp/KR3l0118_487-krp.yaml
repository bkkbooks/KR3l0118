body:
  text: 太平廣記卷四百八十七宋李昉等編雜傳記四霍小玉傳蔣防譔大厯中隴西李生名益年二十以進士擢第其明年拔萃俟試於天官夏六月至長安舎於新昌里生門族清華少有才思麗詞嘉句時謂無雙先達丈人翕然推伏每自矜風調思得佳偶博求名妓久而未諧長安有媒鮑十一娘者故薛駙馬家青衣也折券從良十餘年矣性便僻巧言語豪家戚里無不經過追風挾策推為渠帥常受生誠託厚賂意頗德之經數月李方閒居舎之南亭申未門忽聞扣門甚急云是鮑十一娘至攝衣從之迎問曰鮑卿今日何故忽然而來鮑笑曰蘇姑子作好夢也未有一仙人謫在下界不邀財貨但慕風流如此色目共十郎相當矣生聞之驚躍神飛體輕引鮑手且拜且謝曰一生作奴死亦不憚因問其名居鮑具說曰故霍王小女字小玉王甚愛之母曰凈持凈持即王之寵婢也王之初薨諸弟兄以其出自賤庶不甚收録因分與資財遣居於外易姓為鄭氏人亦不知其王女姿質穠豔一生未見高情逸態事事過人音樂詩書無不通解昨遣某求一好兒郎格調相稱者某具說十郎他亦知有李十郎名字非常歡愜住在勝業坊古寺曲甫上車門宅是也已與他作期約明日午時但至曲頭覓桂子即得矣鮑既去生便備行計遂令家僮秋鴻於從兄京兆㕘軍尚公處假青驪駒黄金勒其夕生澣衣沐浴修飾容儀喜躍交并通夕不寐遲明巾幘引鏡自照惟懼不諧也徘徊之間至於亭午遂命駕疾驅直抵勝業至約之所果見青衣立候迎問曰莫是李十郎否即下馬令牽入屋底急急鎖門見鮑果從内出來遙笑曰何等兒郎造次入此生調誚未畢引入中門庭間有四櫻桃樹西北懸一鸚鵡籠見生入來即語曰有人入來急下簾者生本性雅淡心猶疑懼忽見鳥語愕然不敢進逡巡鮑引凈持下階相迎延入對坐年可四十餘綽約多姿談笑甚媚因謂生曰素聞十郎才調風流今又見容儀雅秀名下固無虚士某有一女子雖拙教訓顔色不至醜陋得配君子頗為相宜頻見鮑十一娘説意㫖今亦便令永奉箕帚生謝曰鄙拙庸愚不意顧盼倘垂採録生死為榮遂命酒饌即令小玉自堂東閤子中而出生即拜迎但覺一室之中若瓊林玉樹互相照曜轉盼精彩射人既而遂坐母側母謂曰汝嘗愛念開簾風動竹疑是故人來即此十郎詩也爾終日吟想何如一見玉乃低鬟微笑細語曰見面不如聞名才子豈能無貌生遽起連拜曰小娘子愛才鄙夫重色兩好相暎才貌相兼母女相顧而笑遂舉酒數巡生起請玉唱歌初不肯母固强之發聲清亮曲度精奇酒闌及暝鮑引生就西院憩息閒庭邃宇簾幕甚華鮑令侍兒桂子浣沙與生脫靴解帶須臾玉至言敘温和辭氣宛媚解羅衣之際態有餘妍低幃暱枕極其歡愛生自以為巫山洛浦不過也中宵之夜玉忽流涕謂生曰妾本倡家自知非匹今以色愛托其仁賢但慮一旦色衰恩移情替使女蘿無托秋扇見捐極歡之際不覺悲至生聞之不勝感歎乃引臂替枕徐謂玉曰平生志願今日獲從粉骨碎身誓不相捨夫人何發此言請以素縑著之盟約玉因收淚命侍兒櫻桃褰幄執燭授生筆研玉管絃之暇雅好詩書筐箱筆研皆王家之舊物遂取繡囊出越姬烏絲欄素縑三尺以授生生素多才思援筆成章引諭山河指誠日月句句懇切聞之動人誓畢命藏於寶篋之内自爾婉孌相得若翡翠之在雲路也如此二歳日夜相從其後年春生以書判拔萃登科授鄭縣主簿至四月將之官便拜慶於東洛長安親戚多就筵餞時春物尚餘夏景初麗酒䦨賓散離惡縈懷玉謂生曰以君才地名聲人多景慕願結婚媾固亦衆矣况堂有嚴親室無冢婦君之此去必就佳姻盟約之言徒虚語耳然妾有短願欲輒指陳永委君心復能聴否生驚怪曰有何罪過忽發此辭試說所言必當敬奉玉曰妾年始十八君纔二十有二迨君壯室之秋猶有八歳一生歡愛願畢此期然後妙選高門以諧秦晉亦未為晚妾便捨棄人事剪髪披緇夙昔之願於此足矣生且媿且感不覺涕流因謂玉曰皎日之誓死生以之與卿偕老猶恐未愜素志豈敢輒有二三固請不疑但端居相待至八月必當却到華州㝷使奉迎相見非逺更數日生遂訣别東去到任旬日求假往東都覲親未至家日太夫人已與商量表妹盧氏言約已定太夫人素嚴毅生逡巡不敢辭讓遂就禮謝便有近期盧亦甲族也嫁女於他門聘財必以百萬為約不滿此數義在不行生家素貧事須求貸便托假故逺投親知涉歴江淮自秋及夏生自以孤負盟約大愆回期寂不知聞欲斷其望遙託親故不遣漏言玉自生逾期數訪音信虚詞詭說日日不同博求師巫徧詢卜筮懷憂抱恨周歳有餘羸卧空閨遂成沈疾雖生之書題竟絶而玉之想望不移賂遺親知使通消息㝷求既切資用屢空往往私令侍婢潛賣篋中服玩之物多託於西市寄附舖侯景先家貨賣曾令侍婢浣沙將紫玉釵一隻詣景先家貨之路逢内作老玉工見浣沙所執前來認之曰此釵吾所作也昔歳霍王小女將欲上鬟令我作此酧我萬錢我嘗不忘汝是何人從何而得浣沙曰我小娘子即霍王女也家事破散失身於人夫壻昨向東都更無消息悒怏成疾今欲二年令我賣此賂遺於人使求音信玉工悽然下泣曰貴人男女失機落節一至於此我殘年向盡見此盛衰不勝傷感遂引至延先公主宅具言前事公主亦為之悲歎良久給錢十二萬焉時生所定盧氏女在長安生既畢於聘財還歸鄭縣其年臘月又請假入城就親潛卜靜居不令人知有明經崔久明者生之中表弟也性甚長厚昔歳常與生同歡於鄭氏之室盃盤笑語曾不相間每得生信必誠告於玉玉常以薪蒭衣服資給於崔崔頗感之生既至崔具以誠告玉玉恨歎曰天下豈有是事乎徧請親朋多方召致生自以愆期負約又知玉疾候沈綿慙恥忍割終不肯往晨出暮歸欲以迴避玉日夜涕泣都忘寢食期一相見竟無因由寃憤益深委頓牀枕自是長安中稍有知者風流之士共感玉之多情豪俠之倫皆怒生之薄行時已三月人多春遊生與同輩五六人詣崇敬寺翫牡丹花歩於西廊遞吟詩句有京兆韋夏卿者生之密友時亦同行謂生曰風光甚麗草木榮華傷哉鄭卿銜寃空室足下終能棄置實是忍人丈夫之心不宜如此足下宜為思之歎讓之際忽有一豪士衣輕黄紵衫挾弓彈丰神雋美衣服輕華唯有一剪頭胡雛從後潛行而聴之俄而前揖生曰公非李十郎者乎某族本山東姻連外戚雖乏文藻心嘗樂賢仰公聲華常思覯止今日幸㑹得覩清揚某之敝居去此不逺亦有聲樂足以娛情妖姬八九人駿馬十數匹唯公所欲但願一過生之儕輩共聆斯語更相歎美因與豪士策馬同行疾轉數坊遂至勝業生以近鄭之所止意不欲過便託事故欲㢠廻馬首豪士曰敝居咫尺忍相棄乎乃輓挾其馬牽引而行遷延之間已及鄭曲生神情恍惚鞭馬欲回豪士遽命奴僕數人抱持而進疾走推入車門便令鎖却報云李十郎至也一家驚喜聲聞於外先此一夕玉夢黄衫丈夫抱生來至席使玉脫鞋驚寤而告母因自解曰鞋者諧也夫婦再合脫者解也既合而解亦當永訣由此徵之必遂相見相見之後當死矣凌晨請母妝梳母以其久病心意惑亂不甚信之僶勉之間强為妝梳妝梳纔畢而生果至玉沈綿日久轉側須人忽聞生來欻然自起更衣而出恍若有神遂與生相見含怒凝視不復有言羸質嬌姿如不勝致時復掩袂返顧李生感物傷人坐皆欷歔頃之有酒餚數十盤自外而來一座驚視遽問其故悉是豪士之所致也因遂陳設相就而坐玉乃側身轉面斜視生良久遂舉杯酒酧地曰我為女子薄命如斯君是丈夫負心若此韶顔稚齒飲恨而終慈母在堂不能供養綺羅絃管從此永休徵痛黄泉皆君所致李君李君今當永訣我死之後必為厲鬼使君妻妾終日不安乃引左手握生臂擲盃於地長慟號哭數聲而絶母乃舉尸寘於生懷令喚之遂不復蘇矣生為之縞素旦夕哭泣甚哀將葬之夕生忽見玉繐帷之中容貌妍麗宛若平生著石榴裙紫􅜵襠紅緑帔子斜身倚帷手引繡帶顧謂生曰媿君相送尚有餘情幽㝠之中能不感歎言畢遂不復見明日葬於長安御宿原生至墓所盡哀而返後月餘就禮於盧氏傷情感物鬱鬱不樂夏五月與盧氏偕行歸於鄭縣至縣旬日生方與盧氏寢忽帳外叱叱作聲生驚視之則見一男子年可二十餘姿狀温美藏身暎幔連招盧氏生惶遽走起遶幔數匝倐然不見生自此心懷疑惡猜忌萬端夫妻之間無聊生矣或有親情曲相勸喻生意稍解後旬日生復自外歸盧氏方鼓琴於牀忽見自門抛一斑犀鈿花合子方圓一寸餘中有輕絹作同心結墜於盧氏懷中生開而視之見相思子二叩頭蟲一發殺觜一驢駒媚少許生當時憤怒呌吼聲如豺虎引琴撞擊其妻詰令實告盧氏亦終不自明爾後往往暴加捶楚備諸毒虐竟訟於公庭而遣之盧氏既出生或侍婢媵妾之屬蹔同枕席便加妬忌或有因而殺之者生嘗遊廣陵得名姬曰營十一娘者容態潤媚生甚恱之每相對坐嘗謂營曰我嘗於某處得某姬犯某事我以某法殺之日日陳說欲令懼已以肅清閨門出則以浴斛覆營於牀週迴封署歸必詳視然後乃開又畜一短劒甚利顧謂侍婢曰此信州葛溪鐵唯斷作罪過頭大凡生所見婦人輒加猜忌至於三娶率皆如初焉太平廣記卷四百八十七
