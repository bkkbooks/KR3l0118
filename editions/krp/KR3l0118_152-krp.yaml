body:
  text: 太平廣記卷一百五十二定數七鄭德璘趙璟盧邁趙璟包誼薛少殷袁孝叔鄭德璘貞元中湘潭尉鄭德璘家居長沙有親表居江夏每歲一往省焉中間涉洞庭厯湘潭多遇老叟棹舟而鬻菱芡雖白髪而有少容德璘與語多及𤣥解詰曰舟無糗糧何以為食叟曰菱芡耳德璘好酒長挈松醪春過江夏遇叟無不飲之叟飲亦不甚媿荷德璘抵江夏將返長沙駐舟於黄鶴樓下傍有鹺賈韋生者乘巨舟亦抵於湘潭其夜與鄰舟告别飲酒韋生有女居於舟之柁㯭鄰女亦來訪别二女同處笑語夜將半聞江中有秀才吟詩曰物觸輕舟心自知風恬浪静月光微夜深江上解愁思拾得紅蕖香惹衣鄰舟女善筆札因覩韋氏粧奩中有紅箋一幅取而題所聞之句亦吟哦良久然莫曉誰人所製也及旦東西而去德璘舟與韋氏舟同離鄂渚信宿及暮又同宿至洞庭之畔與韋生舟楫頗以相近韋氏美而艷瓊英膩雲蓮蘂瑩波露濯蕣姿月鮮珠彩於水窻中垂鈎德璘因窺見之甚悦遂以紅綃一尺上題詩曰纎手垂鈎對水窻紅蕖秋色艷長江既能解珮投交甫更有明珠乞一雙彊以紅綃惹其鈎女因收得吟翫久之然雖諷讀即不能曉其義女不工刀札又恥無所報遂以鈎絲而投夜來鄰舟女所題紅牋者德璘謂女所製疑思頗悦喜暢可知然莫曉詩之意義亦無計遂其欵曲由是女以所得紅綃繫臂自愛惜之明月清風韋舟遽張帆而去風勢將緊波濤恐人德璘小舟不敢同越然意殊恨恨將暮有漁人語德璘曰向者賈客巨舟已全家殁於洞庭耳德璘大駭神思恍惚悲惋久之不能排抑將夜為弔江姝詩二首曰湖面狂風且莫吹浪花初綻月光微沉潛暗想横波淚得共鮫人相對垂又曰洞庭風軟荻花秋新没青蛾細浪愁淚滴白蘋君不見月明江上有輕鷗詩成酹而投之精貫神祇至誠感應遂感水神持詣水府府君覽之召溺者數輩曰誰是鄭生所愛而韋氏亦不能曉其來由有主者搜臂見紅綃而語府君曰德璘異日是吾邑之明宰况曩有義相及不可不曲活爾命因召主者攜韋氏送鄭生韋氏視府君乃一老叟也逐主者疾趨而無所礙道將盡覩一大池碧水汪然遂為主者推墮其中或沉或浮亦甚困苦時已三更德璘未寢但吟紅牋之詩悲而益苦忽覺有物觸舟然舟人已寢德璘遂秉炬照之見衣服綵綉似是人物驚而拯之乃韋氏也繫臂紅綃尚在德璘喜驟良久女蘇息及曉方能言乃説府君感君而活我命德璘曰府君何人也終不省悟遂納為室感其異也將歸長沙後三年德璘常調𨕖欲謀醴陵令韋氏曰不過作巴陵耳德璘曰子何以知韋氏曰向者水府君言是吾邑之明宰洞庭乃屬巴陵此可驗矣德璘志之𨕖果得巴陵令及至巴陵縣使人迎韋氏舟楫至洞庭側值逆風不進德璘使傭篙工者五人而迎之内一老叟挽舟若不為意韋氏怒而唾之叟囘顧曰我昔水府活汝性命不以為德今反生怒韋氏乃悟恐悸召叟登舟拜而進酒果叩頭曰吾之父母當在水府可省覲否曰可須㬰舟楫似没於波然無所苦俄到往時之水府大小倚舟號慟訪其父母父母居止儼然第舍與人世無異韋氏詢其所須父母曰所溺之物皆能至此但無火化所食唯菱芡耳持白金器數事而遺女曰吾此無用處可以贈爾不得乆停促其相别韋氏遂哀慟别其父母叟以筆大書韋氏巾曰昔日江頭菱芡人蒙君數飲松醪春活君家室以為報珍重長沙鄭德璘書訖叟遂為僕侍數百輩自舟迎歸府舍俄頃舟却出於湖畔一舟之人咸有所覩德璘詳詩意方悟水府老叟乃昔日鬻菱芡者歲餘有秀才崔希周投詩卷於德璘内有江上夜拾得芙蓉詩即韋氏所投德璘紅牋詩也德璘疑詩乃詰希周對曰數年前泊輕舟於鄂渚江上月明時當未寢有微物觸舟芳馨襲鼻取而視之乃一束芙蓉也因而製詩既成諷詠良久敢以實對德璘歎曰命也然後更不敢越洞庭德璘官至刺史出德璘傳趙璟盧邁趙璟盧邁二相國皆吉州人旅衆呼為趙七盧三趙相自微而著盖為是姚曠女婿姚與獨孤問俗善因託之得湖南判官累奏官至監察蕭相復代問俗為潭州有人又薦於蕭蕭留為判官至侍御史蕭入主留務有美聲聞於德宗遂兼中丞為湖南亷史及李泌入相不知之俄而以李元素知璟湖南留務事而詔璟歸闕璟居京慕静深巷杜門不出元素訪之甚頻元素乃泌相之從弟璟因訪别元素於青龍寺謂之曰趙璟亦自合有官職誓不敢怨人誠非偶然耳盖得於日者仍宻問元素年命曰據此年命亦合富貴人也元素因自負亦不言泌相兄也頃之德宗忽記得璟賜對拜給事中泌相不測其由會有和戎使事出親相關播為大使張薦張彧為判官泌因判奏璟為副使未至蕃右丞有缺宰相上名德宗曰趙璟堪為此官追赴拜右丞不數月還尚書左丞平章事作相五年薨於位出嘉話錄趙璟趙相璟之為入蕃副使謂二張判官曰前幾里合有河河之邊有柳樹樹下合有一官人著惨服立既而悉然官人置頓官也二張問之趙曰某年三十前已夢此行所以不怨他時相趙相將薨之時長安諸城門金吾家見一小兒豹犢鼻攜五色繩子覔趙相其人見者知異不經數日趙薨出嘉話錄包誼唐包誼者江東人也有文詞初與計偕至京師赴試期不及宗人祭酒佶憐之館於私第誼多遊佛寺無何搪突中書舍人劉太真太真覩其色目即舉人也命一价詢之誼勃然曰進士包誼素不相識何勞致問太真甚銜之以至專訪其人於佶佶聞誼所為大怒因詰責遣徙他舍誼亦無怍色明年太真主文志在致其永棄故過雜文俟終塲明遣之既而自悔曰此子既忤我從而報之是我為淺丈夫也但能永廢其人何必在此於是放入䇿太真將放牓先呈宰相牓中有姓朱人及第時宰以泚近為大逆未欲以姓及第亟遣易之太真錯愕趨出不記他人唯記誼謝恩方悟已所惡也因明言乃知得喪非人力也盖假手而已出摭言薛少殷河東薛少殷舉進士忽一日暴卒於長安崇義里有一使持牒云大使追引入府門既入見官府即鮮于叔明也少殷欲有所訴叔明曰寒食將至何為鏤雞子食也東面有一僧手持寶塔扇雙開少殷已在其中叔明曰日某方欲上事和尚何為救此人乃迫而出令引少殷見判官及出門之西院閽者入白逡巡聞命素服乃入所見乃亡兄也敘泣良久曰吾以汝未成名欲薦汝於此分主公事故假追來非他也少殷時新婚懇不願住兄曰吾同院有王判官職居西曹汝既來此可以一謁而去乃命少殷於西院見之接待甚厚俄聞備饌海陸畢備未食王判官忽起顧見向者持塔僧僧曰不可食食之則無由歸矣少殷曰飢甚柰何僧曰唯蜜煎姜可食乃取食之而王判官竟不至僧曰可去矣少殷復出詰兄泣且請去兄知不可留乃入白官府許之少殷曰既得歸人間願知當為何官兄曰此甚難言亦何用知之懇請乃召一吏取籍尋閲不令見之曰汝後年方成名初任當極西得之次厯畿赤簿尉又一官極南此外吾不得知臨别兄曰吾舊使祇承人李俊令隨汝去有危急即可念之既去毎遇危際皆見其僧前引少殷曰弟子素不相識和尚何乃見䕶如此僧曰吾為汝持金剛經故相䕶爾既醒具述其事後年春果及第未幾授祕書省正字充和蕃判官及迴改同官主簿秩滿遇趙昌為安南節度少殷與之有舊求為從事欲厭極南之官昌許之曰乘遞之鎮未暇有表至江陵當以表請及表至少殷尋以丁母憂服除選授萬年縣尉時靑淄卒吏與駙馬家僮鬬死京兆府不時奏德宗赫怒時少殷主戒唐一日乃貶高州雷澤縣尉十餘年備厯艱苦而李俊常有所䕶及順宗嗣位有詔收錄貶官少殷移至珪陽與貶官李定同行過水勒馬與一從人言即李俊也云某月日已定拜别而去少殷曰吾兄言官止於此李俊復去將不久矣李定驚慘其事因問具以告之數日而卒出前定錄袁孝叔袁孝叔者陳郡人也少孤事母以孝聞母嘗得疾恍惚逾日不痊孝叔忽夢一老父謂曰子母疾可治孝叔問其名居不告曰明旦迎吾於石壇之上當有藥授子及覺乃周覽四境所居之十里有廢觀古石壇而見老父在焉孝叔喜拜迎至於家即於囊中取九靈丹一丸以新汲水服之即日而瘳孝叔德之欲有所答皆不受或累月一來然不詳其所止孝叔意其能厯筭爵祿常欲發問而未敢言後一旦來而謂孝叔曰吾將有他適當與子别於懷中出一編書以遺之曰君之壽與位盡具於此事以前定非智力所及也今之躁求者適足徒勞耳君藏吾此書慎勿預視但受一命即開一幅不爾當有所損孝叔跪受而别後孝叔寢疾殆將不救其家或問後事孝叔曰吾為神人授書一編未曽開卷何遽以後事問乎旬餘其疾果愈後孝叔以門蔭調授宻州諸城縣尉五轉蒲州臨晉縣令每之任輒視神人之書時日無差謬後秩滿歸閿鄉别墅因晨起欲就巾櫛忽有物墜於鏡中𩔖虵而有四足孝叔驚仆於地因不語數日而卒後逾月其妻因閲其笥得父老所留之書猶餘半軸因歎曰神人之言亦有誣矣書尚未盡而人已亡乃開視之其後唯有空紙數幅畫一虵盤鏡中出前定錄太平廣記卷一百五十二
