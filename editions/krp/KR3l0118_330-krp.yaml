body:
  text: 太平廣記卷三百三十宋李昉等編鬼十五張果女華妃郭知運王光本幽州衙將韋氏女崔尚河湄人中官王鑑李令問僧韜光僧儀光尼員智楊元英張果女開元中易州司馬張果女年十五病死不忍逺棄權瘞於東院閣下後轉鄭州長史以路逺須復送喪遂留俄有劉乙代之其子常止閣中日暮仍行門外見一女子容色豐麗自外而來劉疑有相奔者即前詣之欣然款浹同留共宿情態纏緜舉止閒婉劉愛惜甚至後暮輒來達曙方去經數月忽謂劉曰我前張司馬女不幸夭沒近殯此閣命當重活與好合後三日君可見發徐候氣息君慎無横見驚傷也指其所瘞處而去劉至期甚喜獨與左右一奴夜發深四五尺得一漆棺徐開視之女顔色鮮發肢體温軟衣服糚梳無汙壞者舉置牀上細細有鼻氣少頃口中有氣灌以薄糜少少能咽至明復活漸能言語坐起數日始恐父母之知也因辭以習書不便出閣常使賫飲食詣閣中乙疑子有異因其在外送客竊視其房見女存焉問其所由悉具白棺木尚在牀下乙與妻歔欷曰此既㝠期至感何不早相聞遂匿於堂中兒不見女甚驚父乃謂曰此既申契殊會千載所無白我何傷乎而過爲𨼆蔽因遣使詣鄭州具以報果因請結婚父母哀感驚喜則剋日赴婚遂成嘉偶後産數子出廣異記華妃開元初華妃有寵生慶王琮薨葬長安至二十八年有盜欲發妃冢遂於塋外百餘步僞築大墳若將葬者乃於其内潛通地道直達冢中剖棺妃面如生四肢皆可屈伸盜等恣行凌辱仍截腕取金釧兼去其舌恐通夢也側立其尸而於隂中置燭悉取藏内珍寳不可勝數皆徙置僞冢乃於城中以輀車載空棺會日暮便宿墓中取諸物置魂車及送葬車中方掩而歸其未葬之前慶王夢妃被髮裸形悲泣而來曰盜發吾冢又加截辱孤魂幽枉如何可言然吾必俟其敗於春明門也因備說其狀而去王素至孝忽驚起涕泣明旦入奏帝乃召京兆尹萬年令以物色備盜甚急及盜載物歸也欲入春明門門吏訶止之乃搜車中皆諸寳物盡收羣盜拷掠即服逮捕數十人皆貴戚子弟無行檢者王乃請其魁帥五人得親報仇帝許之皆探取五臟烹而祭之其餘盡榜殺於京兆門外改葬貴妃王心喪三年出廣異記郭知運開元中凉州節度郭知運出廵去州百里於驛中暴卒其魂遂出令驛長鎖房勿開因而却回府徒從不知也至舍四十餘日處置公私事畢遂使人往驛迎已喪既至自看其殮殮訖因與家人辭訣投身入棺遂不復見出廣異記王光本王光本開元時爲洛州别駕春月刺史使光本行縣去數日其妻李氏暴卒及還追以不親醫藥意是枉死居恒慟哭哀感傍鄰後十餘日屬諸子盡哭光本亦復慟哭百餘聲忽見李氏自幃而出靚糚炫服有踰平素光本輟哭問其死事李氏云妾尚未得去猶在此堂聞君哀哭慟之甚某在泉途倍益凄感語云生人過悲使幽壤不安信斯言也自兹以往不欲主君如是以累幽㝠耳因付囑家人度女爲尼放婢爲平人事事有理留一食許謂光本曰人鬼道殊不宜久住此益深恨言訖入堂中遂滅男女及他人但聞李氏言唯光本見耳出廣異記幽州衙將開元中有幽州衙將姓張者妻孔氏生五子而卒後娶妻李氏悍妬狠戾虐遇五子日鞭捶之五子不堪其苦哭於其母墓前母忽於冢中出撫其子悲慟久之因以白布巾題詩贈張曰不忿成故人掩涕每盈巾生死今有隔相見永無因匣裏殘糚粉留將與後人黄泉無用處恨作冢中塵有意懷男女無情亦任君欲知腸斷處明月照孤墳五子得詩以呈其父其父慟哭訴於連帥帥上聞勅李氏决一百流嶺南張停所職出本事詩韋氏女洛陽韋氏有女殊色少孤與兄居鄰有崔氏子窺見悅之厚賂其婢遂令通意并有贈遺女亦素知崔有風調乃許之期於竹間紅亭之中忽有曳履聲疑崔將至遂前赴之乃見一人身長七尺張口哆唇目如電光直來擒女女奔走驚呌家人持火視之但見白骨委積血流滿地兄乃詰婢得實殺其婢而剪其竹也出驚聽録崔尚開元時有崔尚者著無鬼論詞甚有理既成將進之忽有道士詣門求見其論讀竟謂尚曰詞理甚工然天地之間若云無鬼此謬矣尚謂何以言之道士曰我則鬼也豈可謂無君若進本當爲諸鬼神所殺不如焚之因爾不見竟失其本出𤣥怪録河湄人開元六年有人泊舟於河湄者見岸邊枯骨因投食而與之俄聞空中媿謝之聲及詩曰我本邯鄲士祇役死河湄不得家人哭勞君行路悲出靈怪録中官有中官行宿於官坡館脫絳裳覆錦衣燈下寢忽見一童子捧一樽酒衝扉而入續有三人至焉皆古衣冠相謂云崔常侍來何遲俄復有一人續至悽悽然有離别之意蓋崔常侍也及至舉酒賦詩聯句末即崔常侍之詞也中官將起四人相顧哀嘯而去如風雨之聲及視其戸扃閉如舊但見酒樽及詩在中官異之旦館吏云里人有會者失其酒樽中官出示之乃里人所失者聯句歌曰牀頭錦衾斑復斑架上朱衣殷復殷空庭朗月閒復閒夜長路逺山復山出靈怪録王鑑兗州王鑑性剛鷙無所憚畏常陵侮鬼神開元中乗醉往莊去郭三十里鑑不渉此路已五六年矣行十里已來會日暮長林下見一婦人問鑑所往請寄一襆而忽不見乃開襆視之皆紙錢枯骨之類鑑笑曰愚鬼弄爾公策馬前去忽遇十餘人聚向火時天寒日已昏鑑下馬詣之話適所見皆無應者鑑視之向火之人半無頭有頭者皆有面衣鑑驚懼上馬馳去夜艾方至莊莊門已閉頻打無人出遂大呌罵俄有一奴開門鑑問曰奴婢輩今並在何處令取燈而火色青暗鑑怒欲撻奴奴云十日來一莊七人疾病相次死盡鑑問汝且如何答曰亦已死矣向者聞郎君呼呌起尸來耳因忽顛仆即無氣矣鑑大懼走投别村而宿周歲發疾而卒出靈異集李令問李令問開元中爲祕書監左遷集州長史令問好玩服飲饌以奢聞於天下其炙驢罌鵝之屬慘毒取味天下言服饌者莫不祖述李監以爲美談令問至集州染疾久之漸篤刺史以其名士兼是同宗恒令夜開城門縱令問家人出入刺史之子嘗夜與奴私出遊至城門遙見甲仗數百人隨一火車當街而行驚曰不聞有兵何得此輩意欲馳吿父且復伺其所之尋而已至城濠火車從水上過曽不漬滅方知是鬼走投其門門已閉不得歸遂奔令問門中處之既入火車亦至令問中門外其子雖恐懼仍竊窺之忽聞堂中十餘人誦經甲仗等遲迴良久有一朱衣鬼徑三蹋闗聲如霆震經聲未絶火車移上堂階遙見堂中燈火清靜尚有十餘人侍疾朱衣鬼又抉窗櫺其聲如前令問左右者皆走散鬼自門持令問出遂擲於火車中羣鬼擁之而去其子還舍述其事刺史明日令人問疾令問家中餘口無敢起者使者呌呼方出云昨夜被驚至今戰懼未已令問尸爲鬼所擲在堂西北陳重牀之下家人乃集而哭焉出靈怪録僧韜光青龍寺僧和衆韜光相與友善韜光富平人將歸謂和衆曰吾三數月不離家師若行必訪我和衆許之逾兩月餘和衆往中都道出富平因尋韜光和衆日暮至離居尚逺而韜光來迎之曰勞師相尋故來迎候與行里餘將到家謂和衆曰北去即是吾家師但入須我我有少務要至村東少選當還言已東去和衆怪之竊言曰彼來迎候何預知也欲到家捨吾何無情也至其家扣門韜光父哭而出曰韜光師不幸亡來十日殯在村東北常言師欲來恨不奉見和衆弔唁畢父引入於韜光常所居房舍之和衆謂韜光父曰吾適至村而韜光師自迎吾來相與談話里餘欲到指示吾家而東去云要至村東少間當返吾都不知是鬼適見父方知之韜光父母驚謂和衆曰彼既許來來當執之吾欲見也於是夜久韜光復來入房謂和衆曰貧居客來無以供給和衆請同坐因執之呌呼其父與家人並至秉燭照之形言皆韜光也納之瓮中以盆覆之瓮中忽哀訢曰吾非韜光師乃守墓人也知師與韜光師善故假爲之如不相煩可恕造次放吾還也其家不開之瓮中密祈請轉苦日出後却覆如驚颺飛去而和衆亦還後不復見焉出紀聞僧儀光青龍寺禪師儀光行業至髙開元十五年有朝士妻喪請之至家修福師住其家數日居於廡前大申供養俗每人死謁巫即言其殺出日必有妨害死家多出避之其夜朝士家皆出北門潛去不告師師但於堂明燈誦經忽見有二人侍之夜將半忽聞堂中人起取衣開門聲有一婦人出堂便往厨中營食汲水吹火師以爲家人不之怪也及將曙婦人進食捧盤來前獨帶面衣徒跣再拜言曰勞師降臨今家人揔出恐齋粥失時弟子故起爲師造之師知是亡人乃受其獻方祝祝未畢聞開堂北戸聲婦人惶遽曰兒子來矣因奔赴堂内則聞哭哭畢家人謁師問安否見盤中粥問師曰弟子等夜來寔避殃禍不令師知家中無人此粥誰所造師笑不答堂内青衣驚曰亡者夜來尸忽横卧手有麵汙足又染泥何謂也師乃指所造粥以示之其家驚異焉出紀聞尼員智廣敬寺尼員智嘗與同侶於終南山中結舍夏夜月明下有哭而來者其聲雄大甚悲既至乃一人長八尺餘立於廬前聲不輟遂至夜半聲甚嗚咽涕淚横流尼等執心正念不懼而哭者竟不言而去出紀聞楊元英楊元英則天時爲太常卿開元中亡已二十載其子因至冶成坊削家識其父壙中劒心異之問削師何得此劒云有貴人形狀衣服將令修理期明日午時來取子意是父授復疑父冢爲人所開至日與弟同往削師家室中伺之至時取劒乃其父也騎白馬衣服如生時從者五六人兄弟出拜道左悲涕久之元英取劒下馬引諸子於僻處分處家事末問汝母在家否云合葬已十五年元英言我初不知再三歎息謂子曰我有公事不獲久住明日汝等可再至此當取少資助汝辛苦子如期至元英亦至得三百千誡之云數日須用盡言訖訣去子等隨行涕泣元英又謂子曰汝等不了此事人鬼路殊寧有百年父子耶言訖訣去子隨騁出上東門遙望入邙山中數十歩忽𨼆不見數日市具都盡三日後市人皆得紙錢出廣異記太平廣記卷三百三十
