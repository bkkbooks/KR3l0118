body:
  text: 太平廣記卷六十九女仙十四玉蘂院女仙馬士良張雲容韋蒙妻慈恩塔院女仙玉蘂院女仙長安安業唐昌觀舊有玉蘂花其花每發若瓊林瑶樹唐元和中春物方盛車馬尋玩者相繼忽一日有女子年可十七八衣綠繡衣垂雙髻無簮珥之飾容色婉娩逈出扵衆従以二女冠三小僕皆丱髻黄衫端麗無比既而下馬以白角扇障面直造花所異香芬馥聞扵數十歩外觀者疑出自宫掖莫敢逼而視之佇立良久令女僕取花數枝而出將乗馬顧謂黄衫者曰曩有玉峯之期自此行矣時觀者如堵咸覺烟飛鶴唳景物煇煥舉轡百餘歩有輕風擁塵随之而去須臾塵滅望之已在半空方悟神仙之逰餘香不散者經月餘時嚴休復元稹劉禹錫白居易俱作玉蘂院真人降詩嚴休復詩曰終日齋心禱玉宸魂銷眼冷未逢真不如一樹瓊瑶蕋笑對藏花洞裏人又曰香車潜下玉龜山塵世何由覩蕣顔惟有無情枝上雪好風吹綴緑雲鬟元稹詩云弄玉潜過玉樹時不教青鳥出花枝的應未有諸人覺只是嚴郎自得知劉禹錫詩云玉女來看玉樹花異香先引七香車攀枝㺯雪時迴首驚怪人間日易斜又曰雪蘂瓊葩滿院春羽衣輕歩不生塵君王簾下徒相問長伴吹簫别有人白居易詩云嬴女偷乗鳯下時洞中暫歇㺯瓊枝不縁啼鳥春饒舌青瑣仙郎可得知出劇談録馬士良唐元和初萬年縣有馬士良者犯事時進士王爽為京尹執法嚴酷欲殺之士良乃亡命入南山至炭谷湫岸潜扵大栁樹下纔曉見五色雲下一仙女扵水濵有金槌玉板連扣數下青蓮擁出每葉施開仙女取擘三四枚食之乃乗雲去士良見金槌玉板尚在躍下扣之少頃復出士良盡食之十數枚頓覺身輕即能飛舉遂捫蘿尋向者五色雲所俄見大殿崇宫食蓮女子與羣仙處扵中覩之大驚趋下以其竹杖連擊墜扵洪崖澗邉澗水清潔因􅉵熟睡及覺見雙鬟小女磨刀謂曰君盗靈藥奉命来取君命士良大懼俯伏求救解之荅曰此應難免唯有神液可以救君君當以我為妻遂去逡廵持一小碧甌内有飯白色士良盡食復寢湏臾起雙鬟曰藥已成矣以示之七顆光瑩如空青色士良喜歎看其腹有似紅線處乃刀㾗也女以藥摩之隨手不見戒曰但自修學慎勿語人倘漏洩腹瘡必裂遂同住扵湫側又曰我谷神之女也守䕶上仙靈藥故得救君耳至㑹昌初往往人見扵炭谷湫捕魚不獲投一帖子必隨斤兩數而得出逸史張雲容薛昭者唐元和末為平陸尉以氣義自負常慕郭代公李北海之為人因夜直宿囚有為母復仇殺人者與金而逸之故縣聞扵亷使亷使奏之坐謫為民扵海東敕下之日不問家産但荷鋃鐺而去有客田山叟者或云數百嵗矣素與昭洽乃賫酒攔道而飲餞之謂昭曰君義士也脱人之禍而自當之真荆聶之儔也吾請従子昭不許固請乃許之至三鄉夜山叟脱衣貰酒大醉屏左右謂昭曰可遁矣與之携手出東郊贈藥一粒曰非唯去疾兼能絶榖又約曰此去但遇道北有林藪繁翳處可且暫匿不獨逃難當獲美姝昭辭行過蘭昌宫古木修竹四合其所昭踰垣而入追者但東西奔走莫能知踪矣昭潜扵古殿之西間及夜風清月皎見階前有三美女笑語而至揖讓升扵花茵以犀杯酌酒而進之居首女子酹之曰吉利吉利好人相逢惡人相避其次曰良宵宴㑹雖有好人豈易逢耶昭居忩隙閒聞之又誌田生之言遂跳出曰適聞夫人云好人豈易逢耶昭雖不才碩偹好人之數三女愕然良久曰君是何人而匿扵此昭具以實對乃設座扵茵之南昭詢其姓字長曰雲容張氏次曰鳯䑓蕭氏次曰蘭翹劉氏飲將酣蘭翹命骰子謂二女曰今夕佳賔相㑹須有匹偶請擲骰子遇采强者得薦枕蓆乃遍擲雲容采勝翹遂命薛郎近雲容姊坐又持雙盃而獻曰真所謂合巹矣昭拜謝之遂問夫人何許人何以至此容曰某乃開元中楊貴妃之侍兒也妃甚愛惜常令獨舞霓裳扵繡嶺宫妃贈我詩曰羅䄂動香香不已紅蕖裊裊秋烟裏輕雲嶺上乍揺風嫩栁池邉初拂水詩成眀皇吟詠久之亦有繼和但不記耳遂賜雙金扼臂因此寵幸愈扵羣輩此時多遇帝與申天師談道予獨與貴妃得竊聽亦數侍天師茶藥頗獲天師憫之因閒處叩頭乞藥師云吾不惜但汝無分不久處世如何我曰朝聞道夕死可矣天師乃與絳雪丹一粒曰汝但服之雖死不壊但能大其棺廣其穴含以真玉踈而有風使魂不蕩空魄不沉寂有物拘制陶出隂陽後百年得遇生人交精之氣或再生便為地仙耳我沒蘭昌之時具以白貴妃貴妃恤之命中貴人陳𤣥造受其事送終之器皆得如約今已百年矣仙師之兆莫非今宵良㑹乎此乃宿分非偶然耳昭因詰申天師之貎乃田山叟之魁梧也昭大驚曰山叟即天師明矣不然何以委曲使予符曩日之事哉又問蘭鳯二子容曰亦當時宫人有容者為九仙媛所忌毒而死之藏吾穴側與之交逰非一朝一夕耳鳯䑓請擊席而歌送昭容酒歌曰臉花不綻㡬含幽今夕陽春獨換秋我守孤燈無白日寒雲嶺上更添愁蘭翹和曰幽谷啼鸎整羽翰犀沉玉冷自長歎月華不忍扃泉户露滴松枝一夜寒雲容和曰韶光不見分成塵曽餌金丹忽有神不意薛生㩦舊律獨開幽谷一枝春昭亦和曰誤入宫垣漏網人月華静洗玉階塵自疑飛到蓬萊頂瓊艶三枝半夜春詩畢旋聞雞鳴三人曰可歸室矣昭持其衣超然而去初覺門户至㣲及經閾亦無所妨蘭鳯亦告辭而他往矣但燈燭熒熒侍婢凝立帳幄綺繡如貴戚家焉遂同寢處昭甚慰喜如此數夕但不知昏旦容曰吾體已蘇矣但衣服破故更得新衣則可起矣今有金扼臂君可持往近縣易衣服昭懼不敢去曰恐為州邑所執容曰無憚但將我白綃去有急即䝉首人無能見矣昭然之遂出三鄉貨之市其衣服夜至穴則容已迎門而笑引入曰但啓櫬當自起矣昭如其言果見容體已生及回顧帷帳但一大穴多𡨕器服玩金玉唯取寳器而出遂與容同歸金陵幽棲至今見在容鬂不衰豈非俱餌天師之靈藥耶申師名元之出傳記韋䝉妻韋䝉妻許氏居東京翊善里自云許氏世有神仙皆上為髙真受天帝重任性潔净熟詩禮二經事舅姑以孝聞䝉為尚書郎早夭許舅姑亦亡唯一女年十二嵗甚聪慧已能記易及詩忽無疾而卒許甚憐之不忍逺𦵏殯扵堂側居數月聞女扵殯宫中語許與侍婢搃䈂發棺視之已生矣言初卒之狀云忽見二青衣童子可年十二三持一紅幡來庭中呼某名曰韋小真天上召汝于是引之昇天可半日到天上見宫闕崇麗天人皆錦繡毛羽五色之衣金冠玉笏亦多玉童玉女皆珠玉五色之衣花木如琉璃寳玉之形風動有聲如樂曲鏗鏘和雅既到宫中見韓君司命曰汝九世祖有功扵國有恵及人近已擢為地下主者即遷地仙之品汝母心扵至道合陟仙階即令延汝于丹陵之闕汝祖考三世皆已生天矣遂使二童送歸母便可齋沐太乙使者即當至矣許常持妙真經往往感致異香及殊常光色衆共異之已十餘年矣及小真歸後三日果有仙樂之聲下其庭中許與小真摠笄一時昇天有龍虎兵騎三十餘人導従而去乃長慶元年辛丑嵗也出仙傳拾遺慈恩塔院女仙唐太和二年長安城南韋曲慈恩寺塔院月夕忽見一美婦人従三四青衣來遶佛塔言笑甚有風味回顧侍婢曰白院主借筆硯來乃扵北廊柱上題詩曰黄子陂頭好月明忘却華筵到曉行烟收山低翠黛横折得荷花贈逺生題訖院主執燭將視之悉變為白鶴冲天而去書迹至今尚存出河東記太平廣記卷六十九
