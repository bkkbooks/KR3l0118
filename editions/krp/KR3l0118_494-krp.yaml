body:
  text: 太平廣記卷四百九十四宋李昉等編雜録二房光庭崔思兢崔湜吕太一許誡言杜豐修武縣民李元皛王琚李適之白履忠夜明簾班景倩薛令之房光庭房光庭為尚書郎故人薛昭流放而投光庭光庭匿之既敗御史陸遺逸逼之急光庭懼乃見時宰時宰曰公郎官何為匿此人曰光庭與薛昭有舊以途窮而歸光庭且所犯非大故得不納之耶若擒以送官居廟堂者復何以待光庭時宰義之乃出為慈州刺史無他累光庭嘗送親故之葬出鼎門際晚且饑㑹鬻餻餅者與同行數人食之素不持錢無以酬值鬻者逼之光庭命就我取直鬻者不從光庭曰與你官銜我右臺御史也可隨取值時人賞其放逸出紀聞崔思兢崔思兢則天朝或告其再從兄宣謀反付御史張行岌按之告者先誘藏宣家妾而云妾將發其謀宣乃殺之投尸于洛水行岌按略無狀則天怒令重按行岌奏如初則天曰崔宣反狀分明汝寛縱之我令俊臣勘汝毋悔行岌曰臣推事不若俊臣陛下委臣須實狀若順㫖妄族人豈法官所守臣必以為陛下試臣爾則天厲色曰崔宣若實曾殺妾反狀自然明矣不獲妾如何自雪行岌懼逼宣家令訪妾思兢乃于中橋南北多置錢帛募匿妾者數日略無所聞而其家每竊議事則告者輒知之思兢揣家中有同謀者乃佯謂宣妻曰須絹三百匹顧刺客殺告者而侵晨伏于臺前宣家有館客姓舒婺州人言行無缺為宣家服役宣委之同于子弟須㬰見其人至臺賂閽人以通于告者告者遂稱云崔家顧人刺我請以聞臺中驚憂思兢素重館客不知疑密隨之到天津橋料其無由至臺乃罵之曰無賴險獠崔家破家必引汝同謀何路自雪汝幸能出崔家妾我遺汝五百縑歸鄉足成百年之業不然則亦殺汝必矣其人悔謝乃引思兢于告者之家捜獲其妾宣乃得免出大唐新話崔湜唐崔湜弱冠進士登科不十年掌貢舉遷兵部父楫亦嘗為禮部至是父子累日同省為侍郎後三登宰輔年始三十六崔之初執政也方二十七容止端雅文詞清麗嘗暮出端門下天津橋馬上自吟春遊上林苑花滿洛陽城張說峕為工部侍郎望之杳然而歎曰此句可效此位可得其年不可及也出翰林盛事吕太一吕太一為户部員外郎户部與吏部鄰司峕吏部移牒令户部于牆宇自竪棘以備銓院之交通太一答曰眷彼吏部銓惣之司當須簡要清同何必竪籬種棘省中賞其清俊出御史臺記許誡言許誡言為瑯邪太守有囚縊死獄中乃執去年修獄典鞭之修獄典曰小人主修獄耳如牆垣不固狴牢破壞賊自中出猶以修治日月久可矜免况囚自縊而終修獄典何罪誡言猶怒曰汝胥吏舉動自合笞又何訴出紀聞杜豐齊州厯城縣令杜豐開元十五年東封泰山豐供頓乃造棺器三十枚寘行宫諸官以為不可豐曰車駕今過六宫偕行忽暴死者求棺如何可得若事不預備其悔可追乎及置頓使入行宫見棺木陳于幕下光彩赫然驚而出謂刺史曰聖主封嶽祈福祚延長此棺器者誰之所造且將何施何不祥之甚將奏聞刺史令求豐豐逃于妻卧牀下詐稱賜死其家哭之賴妻兄張摶為御史解之乃得已豐子鍾峕為兖州參軍都督令掌廄馬芻豆鍾曰御馬至多臨日煮粟恐不可給不如先辦乃以鑊煮粟豆二千餘石納于窖中乘其熱封之及供頓取之皆臭敗矣乃走猶懼不免命從者市半夏半升和羊肉煮而食之取死藥竟不能為患而愈肥峕人云非此父不生此子出紀聞修武縣民開元二十九年二月修武縣人嫁女壻家迎婦車隨之女之父懼村人之障車也借俊馬令乘之女之弟乘驢從在車後百步外行忽有二人出于草中一人牽馬一人自後驅之走其弟追之不及遂白其父父與親眷尋之一夕不能得去女家一舎村中有小學時夜學生徒多宿凌晨啓門門外有婦人裸形斷舌隂中血皆淋漓生問之女啓齒流血不能言生告其師師出户觀之集諸生謂曰吾聞夫子曰木石之怪䕫魍魎水之怪龍罔象土之怪墳羊吾此居近太行怪物所生也將非山精野魅乎盍擊之于是投以塼石女既斷舌不能言諸生擊之竟死及明乃非魅也俄而女家尋求至而見之乃執儒及弟子詣縣縣丞盧峰訊之實殺焉乃白于郡笞儒生及弟子死者三人而刼竟不得出紀聞李元皛李元皛為沂州刺史怒司功郄承明命剝之屏外承明狡猾者也既出屏適㑹博士劉琮璡後至將入衙承明以琮璡儒者則前執而剝之紿曰太守怒汝衙遲使我領人取汝令便剝將來琮璡以為然遂解衣承明目吏卒擒琮璡以入承明乃逃元皛見剝至不知是琮璡也遂杖之數十焉琮璡起謝曰蒙恩賜杖請示罪名元皛知為承明所賣竟無言遂入户出紀聞王琚𤣥宗在藩邸時每遊戲于城南韋杜之間嘗因逐狡兔意樂忘返與其徒十數人饑倦甚因休息村中大樹之下適有書生延帝過其家其家甚貧止村妻一驢而已帝坐未久書生殺驢煑秫備膳饌酒肉滂沛帝顧而甚竒之及器宇磊落不凡問其姓乃王琚也自是帝每遊韋杜間必過琚家琚所語議合帝意帝日益親善及韋氏専制帝憂甚獨密言于琚琚曰亂則殺之又何親也帝遂納琚之謀戡定内難累拜琚為中書侍郎實預配饗焉出開天傳信記李適之李適之入仕不厯丞簿便為别駕不厯兩畿官便為京兆尹不厯御史及中丞便為大夫不厯兩省給舎便為宰相不厯刺史便為節度使出獨異志白履忠白履忠博涉文史𨼆居梁城王志愔楊瑒皆薦之尋請還鄉授朝散大夫鄉人謂履忠曰吾子家貧竟不霑一斗米一匹帛雖得五品止是空名何益于實也履忠欣然曰往歳契丹入冦家家盡署排門夫履忠特以讀少書籍縣司放免至今惶愧雖不得禄賜且是五品家終身髙卧免有徭役不易得之也出談賓録夜明簾姚崇為相嘗對于便殿舉左足不甚輕利上曰卿有足疾耶崇曰臣有心腹疾非足疾也因前奏張說罪狀數百言上怒曰卿歸中書宜宣與御史中丞共按其事而說未之知㑹吏報午後三刻說乘馬先歸崇急呼御史中丞李林甫以前詔付之林甫謂崇曰說多智是必困之宜以劇地崇曰丞相得罪未宜太逼林甫又曰公必不忍即說當無害林甫止將詔付于御史䑓中路以馬墜告說未遭崇奏前旬月家有教授書生通于說侍兒最寵者㑹擒得奸狀以聞于說說怒甚將窮獄于京兆書生厲聲言曰覩色不能禁亦人之常情緩急有用人乎公何靳于一婢女耶說竒其言而釋之兼以侍兒與歸書生一去數月餘無所聞知忽一日直訪于說憂色滿面言曰某感公之恩思有以報者久矣今聞公為姚相國所搆外獄將具公不知之危將至矣某願得公平生所寶者用計于九公主可能立釋之說因自厯指己所寶者書生皆云未足解公之難又凝思久之忽曰近者有雞林郡以夜明簾為寄者書生曰吾事濟矣因請說手札數行懇以情言遂急趨出建夜始及九公主第書生具以說事言兼用夜明簾為贄且謂主曰上獨不念在東宫時思必始春恩加于張丞相矣而今反用讒耶明早公主上謁具為奏之上感動因急命髙力士就御史臺宣前所按事並宜罷之書生亦不復再見矣出松窗録班景倩開元中朝廷選用羣官必推精當文物既盛英賢出入皆薄具外任雖雄藩大府由中朝宂員而授時以為左遷班景倩自揚州採訪使入為大理少卿路由大梁倪若水為郡守西郊盛設祖席宴罷景倩登舟若水望其行塵謂掾吏曰班公是行何異登仙乎為之騶殿良所甘心默然良久方整回駕既而為詩投相府以道其誠其詞為當時所稱賞出明皇雜録薛令之神龍二年間長溪人薛令之登第開元中為東宫侍讀時宫僚閒淡以詩自悼書于壁曰朝日上團團照見先生盤盤中何所有苜蓿上䦨干飰澁匙難綰羮稀箸易寛只可謀朝夕何由度歳寒上因幸東宫見焉索筆續之曰啄木嘴距長鳯凰毛羽短若嫌松桂寒任逐桑榆暖令之因此引疾東歸肅宗即位詔徵之已卒出閩川名仕傳太平廣記卷四百九十四
