body:
  text: 太平廣記卷三百六十三宋李昉等編妖怪五韋滂栁氏王愬李哲盧瑗廬江民揚州墖髙郵寺劉積中韋滂唐大厯中士人韋滂膂力過人夜行一無所懼善騎射毎以弓矢隨行非止取鳥獸烹炙至於虵蝎蚯蚓蜣蜋螻蛄之𩔖見則食之嘗於京師暮行鼓聲向絶主人尚逺將求宿不知何詣忽見市中一衣冠家移家出宅子弟欲鏁門滂求寄宿主人曰此宅鄰家有喪俗云妨殺入宅當損人物今將家口於側近親故家避之明日即歸不可不以奉白也韋曰但許寄宿復何害也殺鬼吾自當之主人遂引韋入宅開堂厨示以牀榻飲食皆備滂令僕使歇馬槽上置燭燈於堂中又使入厨具食食訖令僕夫宿於别屋滂列牀於堂開其雙扇息燭張弓坐以伺之至三更欲盡忽見一光如大盤自空飛下㕔北門扉下照曜如火滂見尤喜於闇中引滿射之一箭正中爆然有聲火乃掣掣如動連射三箭光色漸㣲已不能動携弓直往㧞箭光物墮地滂呼奴取火照之乃一團肉四向有眼眼數開動即光滂笑曰殺鬼之言果不虛也乃令奴烹之而肉味馨香極甚煮令過熟乃切割為虀噉之尤覺芳美乃沾奴僕留半呈主人至明主人歸見韋生喜其無恙韋乃説得殺鬼獻所留之肉主人驚歎而已出原化記栁氏唐大厯中有士人莊在渭南遇疾卒於京妻栁氏因莊居有一子年十一二夏夜其子忽恐悸不眠三更後見一老人白衣兩牙出吻外熟視之良久漸近前有婢眠熟因扼其喉咬然有聲衣隨手碎攫食之須臾骨露乃舉起飲其五臟見老人口大如箕子方呌一無所見婢已骨矣數月後亦無他士人祥齋日暮栁氏露坐納涼有胡蜂遶其首面栁氏以扇擊墮地乃胡桃也栁氏取置掌中遂長初如拳如椀驚顧之際已如盤矣嚗然分為兩扇空中轉輪聲如分蜂忽合於栁氏首栁氏碎首齒著於樹其物飛去竟不知何怪也出酉陽雜俎王愬建中三年前楊府功曹王愬自冬調選至四月寂無音書其妻扶風竇氏憂甚有二女皆國也忽聞門有賣卜女巫包九娘者過其卷人皆推占事中遂召卜焉九娘設香水訖俄聞空間有一人下九娘曰三郎來與夫人看功曹有何事更無音書早晚合歸言訖而去經數刻忽空中宛轉而下至九娘喉中曰娘子酬答何物阿郎歸甚平安今日在西市絹行舉錢共四人長行緣選塲用䇿子被人告所以不得見官作行李次宻書之五月二十三日初明愬奄至宅竇氏甚喜坐訖便問君何故用䇿子令選事不成又於某月日西市舉錢共四人長行愬自以不附書愕然驚異妻遂話女巫之事即令召巫來曰勿憂來年必得好官今日西北上有人牽二水牛患脚可勿争價買取旬日間應得數倍利至時果有人牽跛牛過即以四千買買經六七日甚肥壮足亦無損同曲磨家二牛暴死卒不可市遂以十五千求買初愬宅在慶雲寺西巫忽曰可速賣此宅如言貨之得錢十五萬又令於河東月僦一宅貯一年已來儲然後買竹作麤籠子可盛五六斗者積之不知其數明年春連帥陳少遊議築廣陵城取愬舊居給以半價又運土築籠毎籠三十文計資七八萬始於河東買宅神巫不從包九娘而自至曰某姓孫名思兒寄住巴陵欠包九娘錢今已償足與之别歸故來辭耳吁嗟久之不見其形竇氏感其所謀謂曰汝何不且住不然吾飬汝為兒可乎思兒曰娘子既許某更何愁可為作一小紙屋安於堂簷毎食時與少食即足矣竇氏依之月餘遇秋風飄雨中夜長歎竇氏乃曰今與汝為母子何所中外不然向吾牀頭櫃上安居可乎思兒又喜是夕移入便問拜兩姊不見形但聞其言愬長女好戲因謂曰姊與爾索一新婦於是紙畫一女及布綵繢思兒曰請如小姊装索其女亦戲曰依爾意其夜言笑如有所對即云新婦參二姑姑愬堂妹事韓家住南堰新有分㝃二女作繡鞋欲遺之方命青衣裝思兒笑二女問笑何事答曰孫兒一足腫難著繡鞋竇氏始惡之思兒已知更數日乃告辭云且歸巴陵䝉二姊與娶新婦便欲將去愬與令造一船子長二尺已來令姊監將香火送至楊子江為幸足矣竇氏從其請二女又與一幅絹畫其夫妻相對思兒着緑秉板具小船上拜别自其去也二女皆若神不足者二年長女嫁外兄親禮夜卒於帳門以燭照之其形若黄葉爾小女適張初初嫁亦如其姊愬終山陽郡司馬出乾􅍧子李哲唐貞元四年春常州錄事參軍李哲家於丹陽縣東郭去五里有莊多茅舍晝日無何有火自焚救之而滅視地麻屨跡廣尺餘意為盗索之無狀旬時屢災而易撲方悟其妖異後乃有投擲空間家人怖悸輒失衣物有乳母阿萬者性通鬼神常見一丈夫出入隨之或為胡形鬚髯偉然羔裘貂帽間以朱紫倐閃出來哲晚習春秋於閤阿萬見胡人竊書一卷而去馳報哲哲閲書欠一卷方祝祈之須臾書復帙中亦無損汚李氏患之意其庭竹聳荗鬼魅可栖潛議伐去之以植桃忽於庭中得一書聞君議伐竹種桃盡為竹籌州下粟方賤一船竹可貿一船粟幸速圖之其筆札不工紙方數寸哲兄子士温士儒並剛勇常罵之輒失冠屨後稍祈之而歸所失復投書曰惟聖罔念作狂唯狂克念作聖君始罵我而見祈今並還之書後言墨荻君狀居旬鄰人盗哲犬殺而食之事發又得一書曰里仁為美擇不處仁焉得智數旬之後其家失物至多家人意其鬼為盗又一書言劉長卿詩曰直氏偷金枉君謂我為盗今既得盗如之何士温士儒竟扞禦之見夏夜士温醉卧背燭牀頭見一丈夫自門直入不虞有人因至燭前士温忽躍身擒之果獲燭亦滅於暗中扞禦盡力久之喀喀有聲燭至漸堅是一瓦瓦背畫作眉目以紙為頭巾衣一小兒衣又以婦人披帛纒頭數匝方結之李氏遂釘於柱碎之數日外有婦人喪服哭於圃言殺我夫明日哭於庭乃投書曰諺所謂一雞死一雞鳴吾屬百户當相報耳如是往來如初嘗取人衣著庭書樹扶疎莫知所由也求而遂觧之又以大器物投小器中出入不礙旬時士儒又張燈見一婦人外來戲燈下復為士儒擒焉扞力良久摋而硬燭之亦瓦而衣也遂末之而明日復有其𩔖哀哭常畏二姪呼為二郎二郎至即不多來李氏潛欲徙其居而得一書曰聞君欲徙居吾已先至其所矣李氏有二老犬一名韓兒一名猛子自有此妖不復食常搖尾戲於空暗處遂斃之自後家中有竊議事魅莫能知之一書自無韓大猛二吾屬無依又家人自郭返至其里見二丈夫於道側迎問家人曰聞爾家有怪異若之何遂以事答及行顧已不見李氏於潤州迎山人韋士昌士昌以符置諸瓦櫺間以壓之鬼至書曰符至聖也而置之屋上不亦輕乎士昌無能為乃去聞淮楚有衛生者久於呪術乃邀之衛生至其鬼頗憚之其來稍疎衛生乃設道塲以考召置箱於壇中宿昔箱中得一狀狀件所失物云若干物已貨記得錢若干買果子及梳子等食訖其餘若干並送還驗其物悉在箱中又言失鐺子某實不取請問諸水濵狀言狐􅀈等狀自此更不復來異日於河中果得鐺子等乃驗水濵之説也出通幽記盧瑗貞元九年前毫州刺史盧瑗家于東都康裕坊瑗父正病卒後兩日正晝忽有大鳥色蒼飛于庭巡翔空間度其影可濶丈四五家人咸見頃之飛入西南隅井中久而飛出人往視之其井水已竭中獲二卵大如斗將出破之血流數斗至明忽聞堂西奥有一女人哭往看見一女子年可十八九烏巾帽首哭轉哀厲問其所從來徐徐出就東間乃言曰吾誕子井中何敢取殺言畢却往西間拽其尸如糜散之訖奮臂而去出門而滅其家大震懼取所留卵却送于野使人馳問桑道茂道茂令禳謝之後亦無徵祥而莫測其異也出通幽記廬江民貞元中有廬江都民因採樵至山㑹日暮忽見一胡人長丈餘自山崦中出衣黒衣執弓矢民大恐遽走匿古木中窺之胡人佇望良久忽東向發一矢民隨望之見百步外有一物狀𩔖人舉體黄毛數寸䝉烏巾而立矢中其腹輒不動胡人笑曰果非吾所及遂去又一胡亦長丈餘魁偉愈於前者亦執弧矢東望而射中其物之胸亦不動胡人又曰非將軍不可又去俄有胡人數十衣黒臂弓腰矢若前驅者又見一巨人長數丈被紫衣狀貌極異緩步而來民見之不覺懔然巨胡東望謂其前驅者曰射其喉羣胡欲爭射之巨胡誡曰非雄舒莫可他胡皆退有一胡前引滿一發遂中其喉其物亦不懼徐以手㧞去三矢持一巨礫向西而來胡人皆有懼色前白巨胡事廹矣不如降之巨胡即命呼曰將軍願降其物乃投礫於地自去其巾狀如婦人無髮至羣胡前盡收奪所執弓矢皆折之遂令巨胡跪於地以手連掌其頰胡人哀祈稱死罪者數四方釋之諸胡髙拱而立不敢輒動其物徐以巾䝉首東望而去胡人相賀曰賴今日甲子耳不然吾輩其死乎既而俱拜於巨胡前巨胡頷之良久遂導而入山崦時欲昏黒民雨汗而歸竟不知其何物也出宣室志揚州墖諮議朱景𤣥見鮑容記陳少遊在揚州時東市墖影忽倒老人言海影翻則如此出酉陽雜俎髙郵寺髙郵縣有一寺不記名講堂西壁枕道毎日晚人馬車舉影悉透壁上衣紅紫者影中鹵莾可辨壁厚數尺難以理究辰午之時則無相𫝊如此二十餘年或一年半年不見出酉陽雜俎劉積中劉積中常於西京近縣莊居妻病亟未眠忽有婦人白首長纔三尺自燈影中出謂劉曰夫人病唯我能理何不祈我劉素剛咄之姥徐㦸手曰勿悔勿悔遂滅妻因暴心痛殆將卒劉不得已祝之言已復出劉揖之坐乃索茶一甌向日如呪狀顧令灌夫人茶纔入口痛愈後時時輒出家人亦不之懼經年復謂劉曰我有女子及笄煩主人求一佳壻劉笑曰人鬼路殊難遂所託姥曰非求人也但為刻桐木稍工者可矣劉許諾因為具之經宿木人失矣又謂劉曰兼煩主人作鋪公鋪母若可某夕我自具車輿奉迎劉心計無奈之何亦許之至一日過酉有僕馬車乗至門姥亦至曰主人可往劉與妻各登其車馬天黒至一處朱門崇墉籠燭列迎賔客供帳之盛如王公家引劉至一㕔朱紫數十有相識者有已歿者各相視無言妻至一堂蠟炬如臂錦翠争煥亦有婦人數十存殁相識各半但相視而已及五更劉與妻恍惚却還至家如醉醒十不記其一二數日姥復來拜謝曰我小女成長今復託主人劉不耐以枕抵之曰老魅敢如此擾之姥隨枕而滅妻遂疾發劉與男女酹地禱之不復出矣妻竟以心痛卒劉妹復病心痛劉欲徙居一切物膠着其處輕若屨屐亦不可舉迎道流上章梵僧持呪悉不禁劉常暇日讀藥方其婢小碧自外來垂手緩步大言劉四頗憶平昔無既而嘶咽曰省躬近從泰山回路逢飛天野义携賢妹心肝我已奪得因舉袖袖中蠕蠕有物左顧似有所命曰可為安置又覺袖中風生衝簾幌婢入堂中乃對劉坐問存歿敘平生事劉與杜省躬同年及第友善其婢舉止笑語無不肖也頃曰我有事不可久留執劉手嗚咽劉亦悲不自勝婢忽倒及覺一無所記其妹亦自此無恙出酉陽雜俎太平廣記卷三百六十三
