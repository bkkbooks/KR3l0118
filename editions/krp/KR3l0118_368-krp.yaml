body:
  text: 太平廣記卷三百六十八宋李昉等編精怪一雜器用偶像附陽城縣吏桓𤣥徐氏婢江淮婦人劉𤣥㳺先朝居延部落主僧太瓊清江郡叟韋訓盧贊善栁崇南中行者麴秀才虢國夫人陽城縣吏魏景初中陽城縣吏家有怪無故聞拍手相呼伺無所見其母夜作勌就枕寢息有頃復聞竈下有呼曰文約何以不見頭下應曰我見枕不能徃汝可就我至明乃飯臿也即聚燒之怪遂絶出捜神記桓𤣥東晉桓𤣥時朱雀門下忽有兩小兒通身如墨相和作芒龍歌路邊小兒從而和之數十人歌云芒籠首繩縳腹車無軸倚孤木聲甚哀楚聽者忘歸日既夕二小兒還入建康縣至閣下遂成一雙漆皷槌皷吏劉云槌積久比恒失之而復得不意作人也明年春而桓𤣥敗言車無軸倚孤木桓字也荆州送𤣥首用敗籠因包裹之又以芒繩束縳其尸沈諸江中悉如童謠所言爾出續齊諧記徐氏婢東海徐氏婢蘭香晉義熙中忽患病而拂拭異常共伺察之見掃帚從壁角來趨婢牀乃取而焚之出異苑江淮婦人江淮有婦人為性多慾存想不捨日夜常醉旦起見屋後二少童甚鮮潔如宫小吏者婦因欲抱持忽成掃帚取而焚之出幽明錄劉𤣥宋中山劉𤣥居越城日暮忽見一著烏袴褶來取火面首無七孔面莽黨然乃請師筮之師曰此是家先代時物久則為魅殺人及其未有眼目可早除之劉因執縳刀斷數下乃變為一枕此乃是祖父時枕也出集異記游先朝廣平游先朝喪其妻見一人著赤袴褶知是魅乃以刀砍之良久乃是已常著履也出集異記居延部落主周静帝初居延部落主勃都骨低凌暴奢逸樂居處甚盛忽有人數十至門一人先投刺曰省名部落主成多受因趨入骨低問曰何故省名部落多受曰集等數人各殊名字皆不别造有姓馬者姓皮者姓鹿者姓熊者姓麞者姓衞者姓班者然皆名受唯某師名多受耳骨低曰君等悉似伶官有何所解多受曰曉弄椀珠性不愛俗言皆經義骨低大喜曰目所未覩有一優即前曰某等肚肌臈臈怡怡皮漫遶身三匝主人食若不充開口終當不捨骨低悅更命加食一人曰某請弄大小相成終始相生於是長人吞短人肥人吞痩人相吞殘兩人長者又曰請作終始相生耳於是吐下一人吐者又吐一人遞相吐出人數復足骨低甚驚因重賜賚遣之明日又至戲弄如初連翩半月骨低頗煩不能設食諸伶皆怒曰主人當以某等為幻術請借郎君娘子試之於是持骨低兒女弟妹甥姪妻妾等吞之於腹中腹中皆啼呼請命骨低惶怖降階頓首哀乞親屬完者皆笑曰此無傷不足憂即吐出之親屬完全如初骨低深怒欲用釁殺之因令密訪之見至一古宅基而滅骨低令掘之深數尺於瓦礫下得一大木檻中有皮袋數千檻旁有穀麥觸即為灰檻中得竹簡書文字磨滅不可識唯𨼆𨼆似有三數字若是陵字骨低知是諸袋為怪欲舉出焚之諸袋因號呼檻中曰某等無命尋合化滅緣李都尉畱水銀在此故得且存集等即都尉李少卿般糧袋屋崩平壓綿歴歲月今已有命見為居延山神收作伶人伏乞存情於神不相殘毁自此不敢復擾高居矣骨低利其水銀盡焚諸袋無不為寃楚聲血流漂洒焚訖骨低房廊户牖悉為寃痛之音如焚袋時月餘日不止其年骨低舉家病死周歲無復孑遺水銀後亦失所在出𤣥怪綠僧太瓊唐上都僧太瓊者能講仁王經開元初講於奉先縣京遙村遂止村寺經兩夏於一日持鉢將上堂闔門之次有物墜簷前時天纔辨色僧就視之乃一初生兒其襁裼甚新僧驚異遂袖之將乞村人行五六里覺袖中輕探之乃一弊帚也出酉陽雜俎清江郡叟唐開元中清江郡叟常牧牛於郡南田間忽聞有異聲自地中發叟與牧童數輩俱驚走辟易自是叟病熱且甚僅旬餘病少愈夢一丈夫衣青襦顧謂叟曰遷我於開元觀叟驚而寤然不知其旨後數日又適野復聞之即以其事白於郡守封君怒曰豈非昬而妄乎叱遣之是夕叟又夢衣青襦者告曰吾委跡于地下久矣汝速出我不然得疾叟大懼及曉與其子偕往郡南即鑿其地約丈餘得一鍾色青乃向所夢丈夫色衣也遂再白於郡守郡守置於開元觀是日辰時不擊忽自鳴聲極震響清江之人具異而驚歎郡守因其事上聞𤣥宗詔宰臣林甫寫其鍾樣告示天下出宣室志韋訓唐京兆韋訓暇日於其家學中讀金剛經忽見門外緋裙婦人長三丈踰牆而入逕投其家先生為捽髪曵下地又以手捉訓訓以手抱金剛經遍身倉卒得免先生被曵至一家人隨而呼之乃得其鬼走入大糞堆中先生遍身已藍澱色舌出長尺餘家人扶至學中久之方蘇率村人掘糞堆中深數尺乃得一緋裙白衫破帛新婦子焚於五達衢其怪遂絶焉出廣異記盧贊善盧贊善家有一瓷新婦子經數載其妻戲謂曰與君為妾盧因爾惘惘恒見一婦人卧於帳中積久意是瓷人為祟送往寺中供養有童人曉於殿中掃地見一婦人問其由來云是盧贊善妾為大婦所妬送來在此其後見盧家人至因言見妾事贊善窮覈本末所見服色是瓷人遂命撃碎心頭有血大如雞子出廣異記栁崇越州兵曹栁崇忽痬生於頭呻吟不可忍於是召術士夜觀之云有一婦女綠裙問之不應在君窻下急除之崇訪窻下止見一瓷妓女極端正綠瓷為飾遂於鐵臼擣碎而焚之瘡遂愈出朝野僉載南中行者南中有僧院院内有九子母像裝塑甚竒嘗有一行者年少給事諸僧不數年其人漸甚羸瘠神思恍惚諸僧頗怪之有一僧見此行者至夜入九子母堂寢宿徐見一美婦人至晚引同寢已近一年矣僧知塑像為怪即壞之自是不復更見行者亦愈即落髮為沙門出玉堂閒話麴秀才道士葉法善精於符籙之術上累拜為鴻臚卿優禮特厚法善居𤣥真觀常有朝客十餘人詣之解帶淹畱滿坐思酒忽有人扣門云麴秀才法善令人謂之曰方有朝寮無暇晤語幸吾子異日見臨也語未畢有一措大傲睨直入年二十許肥白可觀笑揖諸公居於末席抗聲譚論援引今古一坐不測衆聳觀之良久蹔起如風旋轉法善謂諸公曰此子突入詞辦如此豈非妖魅為眩惑乎試與諸公取劒備之麴生復至扼腕抵掌論難鋒起勢不可當法善密以小劒擊之隨手喪元墜於堦下化為缾蓋一坐驚懾惶遽視其處所乃盈缾醲醖也咸大笑飲之其味甚佳坐客醉而撫其缾曰麴生麴生風味不可忘也出開天𫝊信記虢國夫人長安有一貧僧衣甚􅀈縷賣一小猿會人言可以馳使虢國夫人聞之遽命僧至宅僧既至夫人見之問其由僧曰本住西蜀居山二十餘年偶羣猿過遺下此小猿憐憫收養纔半載以來此小猿識人意又會人言語隨指顧無不應人使用實不異一弟子耳僧今昨至城郭資用頗乏無計保借得此小猿故鬻之於市夫人曰今與僧束帛可留此猿我當養之僧乃感謝留猿而去其小猿旦夕在夫人左右夫人甚愛憐之後半載楊貴妃遺夫人芝草夫人喚小猿令看翫小猿對夫人面前倒地化為一小兒容貌端妍年可十四五夫人甚怪呵而問之小兒曰我本姓𡊮賣我僧昔在蜀山中我偶隨父入山採藥居林下三年我父常以藥苗啗我忽一日自不覺變身為猿我父懼而棄我所以被此僧收養而至於夫人宅我雖前日口不能言我心中之事略不遺忘也自受恩育甚欲述懷抱於夫人恨不能言毎至深夜唯自泣下今不期却變人身即不測尊意如何夫人竒之遂命衣以錦衣侍從隨後常祕密其事又三年小兒容貌甚美貴妃曾屢顧之復恐人見奪因不令出别安於小室小兒唯嗜藥物夫人以侍婢常供飼藥食忽一日小兒與此侍婢俱化為猿夫人怪異令人射殺之其小兒乃木人耳出大唐竒𫝊太平廣記卷三百六十八
