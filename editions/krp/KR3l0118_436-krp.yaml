body:
  text: 太平廣記巻四百三十六宋李昉等編畜獸三馬盧從事韋有柔吳宗嗣孫漢威于逺張全王武韋玭駱駝明駞知水脉風脚駞兩脚駞白駱駞騾驢白騾推磨騾僧朗厭逹國村人供僧張髙東市人賀世伯王甲湯安仁王薰馬盧從事嶺南從事盧傳素寓居江陵元和中常有人遺一黒駒初甚蹇劣傳素豢養歴三五年稍益肥駿𫝊素未從事時家貧薄矻矻乗之甚勞苦然未常有銜橜之失𫝊素頗愛之一旦𫝊素因省其槽櫪偶戲之曰馬子得健否黒駒忽人語曰丈人萬福𫝊素驚怖却走黒駒又曰阿馬雖畜生身有故須曉言非是變怪乞丈人少留𫝊素曰爾畜生也忽人語必有寃抑之事可盡言也黒駒復曰阿馬是丈人親表甥常州無錫縣賀蘭坊𤣥小家通兒者也丈人不省貞元十二年使通兒往海陵賣一别墅得錢一百貫時通兒年少無行被朋友相引狹邪處破用此錢略盡此時丈人在逺無奈通兒何其年通兒病死㝠問了了為丈人徴債甚急平等王謂通兒曰爾須見世償他錢若復作人身待長大則不及矣當須暫作畜生身十數年間方可償也通兒遂被驅出畜生道不覺在江陵羣馬中即阿馬今身是也阿馬在丈人槽櫪于兹五六年其心省然常與丈人償債所以竭盡駑蹇不敢居有過之地亦知丈人憐愛至厚阿馬非無戀主之心然記傭五年馬畜生之夀已盡後五日當發黒汗而死請丈人速將阿馬貨賣明日午時丈人自乗阿馬出東棚門至市西北角赤板門邉當有一胡車將問丈人賣此馬者丈人但索十萬其人必酬七十千便可速就之言事訖又曰兼有一篇留别丈人乃驤首朗吟曰既食丈人粟又飽丈人芻今日相償了永離三惡途遂奮迅數遍嘶鳴齕草如初𫝊素更與之言終不復語其所言表甥姓字盜用錢數年月一無所差𫝊素深感其事明日試乗至市角果有胡將軍懇求市𫝊素微驗之因賤其估六十緡軍將曰郎君此馬直七十千已上請以七十千市之亦不以試水草也𫝊素載其緡歸四日復過其家見胡軍將曰嘻七十緡夜來飽發黒汗斃矣出河東記韋有柔建安縣令韋有柔家奴執轡年二十餘病死有柔門客善持呪者忽夢其奴云我不幸而死尚欠郎君四十五千地下所由令更作畜生以償債我求作馬兼為異色今已定也其明年馬生一白駒而黒目皆奴之作也後數嵗馬可直百餘千有柔深嘆其言不驗頃之裴寛為採訪使以有柔為判官裴寛見白馬求市之問其價直有柔但求三十千寛因受之有柔曰此奴尚欠十五千當應更來數日後寛謂有柔曰馬是好馬前者付錢深恨太賤乃復以十五千還有柔其事遂驗出廣異記吳宗嗣軍使吳宗嗣者嘗有父吏某從之貸錢二十萬月計利息一年後不復肯還求索不可得宗嗣怒召而數之曰我前世負汝錢我今還矣汝負我當作驢馬還我因焚劵而遣之逾年宗嗣獨坐㕔事忽見吏白衣而至曰某來還債宗嗣曰已焚劵何為復來吏不答徑自入廄中俄而廄人報馬生白駒使詣吏舍問之云翌日已死矣駒長賣之正得吏所欠錢出稽神録孫漢威江南神武軍使孫漢威廄中有馬遇夜輙尾上放光状若散火驚羣馬皆嘶鳴漢威以為妖仗劒斬之數月除盧州刺史出稽神録于逺鄴中富人于逺者性奢逸而復好良馬居第華麗服玩鮮潔擬於公侯之家也常養良馬數十匹忽一日有人市中鬻一良馬竒毛異骨人争觀之逺聞之酬以百金及馬至廄中有一老姥扣門請一觀逺問之曰馬者駿逸也豪狹少年好之宜哉老母奚觀老母曰我失一良馬十年遊天下訪之不得毎遇良馬必永日觀之未嘗見一如我所失之馬也何阻一觀不以為恵逺因延入從容出其馬以示之老母一見其馬因怒變色回觀逺而言曰我馬也逺曰老母之馬奚人賣昔日何得之何失之老母曰為我昔日偶北邙山神為物傷目化身以求我我以名藥療之目愈遂以此馬賜我我得此馬唯不乗之上天乗之遊四海之外八荒之内秖如百里也我常乗東過扶桑有一人遮其途而問我此馬焉及夜至西竺國忽失此馬我自失此馬已來十年不息遍天下皆不知我訪此馬也去年今日流沙見一小兒言有一異馬如飛倐然東去矣我既知自東方疑此馬在中華必有常人收得此馬我今當還君百金馬須還我逺性癖好良馬又聞此馬之異深恡惜之乃拜老母乞且暫留以翫賞數日老母怒曰君若留此馬必有禍發逺因亦怒老母之極言遂令家僮十餘人共守此馬遣出老母其家果火盡焚其宅財寳逺仍見姥入宅自躍上此馬而滅出瀟湘録張全益州刺史張全養一駿馬甚保惜之唯自乗跨左右皆不敢輕跨毎令二人曉夕以専飼飲忽一日其馬化為一婦人美麗竒絶立於廄中左右遽白張公張公乃親至察視其婦人前拜而言曰妾本是燕中婦人因癖好駿馬毎覩之必嘆美其駿逸後數年忽自醉倒俄化成駿馬一匹遂奔躍出隨意南走近將千里被一人收之以至於君廄中幸君保惜今偶自追恨為一畜淚下入地被地神上奏於帝遂有命再還舊業思往事如夢覺張公大驚異之安存於家經十餘載其婦人忽爾求還鄉張公未允之間婦人仰天號呌自撲身忽却化為駿馬衝突而出不知所之出瀟湘記王武京洛富人王武者性茍且能媚於豪貴忽知有人貨駿馬遂急令人多與金帛於衆中争得之其馬白色如一團美玉其鬃尾赤如朱皆言千里足也又疑是龍駒馳驟之駛非常馬得及王武將以獻大將軍薛公乃廣設以金鞍玉勒間之珠翠方伺其便逹意也其馬忽於廐中大嘶一聲後化為一泥塑之馬立焉武大驚訝遂焚毁之出大唐竒事韋玭京兆韋玭小逍遥公之裔世居孟州氾水縣荘性不喜書好馳騁田弋馬有蹄齧不可羈勒者則市之咸通末因來氾水飲於市酣歌之際忽有鬻白馬者曰此極駔駿玭乘之於衢曰善可著鞭矣遂市之日晏乗歸御之鐵鞭一僕以他馬從既登東原絶馳十餘里僕不能及復遺鐵鞭馬逸不能止迅越榛莽溝畎而玭酒困力疲度必難禁矣馬方驟逼大桑下玭遂躍上髙枝中以為無害矣馬突過數十歩復來桑下暝目長鳴仰視玭而長鳴躩地少頃齧桑木本柹落如掌卧即或齕草於十歩五歩内旋復來齧不已桑本將半焉玭懼其桑之顛也遥望其左數歩外有井伺馬之休於茂草乃跳下疾走投井中纔至底馬亦隨入玭與馬俱殞焉出三水小牘駱駞明駞明駞千里脚多誤作鳴字駞卧腹不貼地屈足漏明則行千里出酉陽雜俎知水脉燉煌西渡流沙往外國濟沙千餘里無水時有伏流處人不能知駱駞知水脉過其處輙不行以足踏地人於其所踏處掘之輙得水出博物志風脚駞于闐國有小鹿角細而長與駞交生子曰風脚駞日行七百里其疾如吹出洽聞記兩脚駞悒恒國治鳥滸河南本漢大月氏地劉璠梁典云出兩脚駱駞闕白駱駞哥舒翰常鎮於青海路既遥逺遣使常乗白駱駞以奏事日馳五百里出明皇雜録騾白騾唐𤣥宗將登泰山益州進白騾至潔朗豐潤權竒偉異上遂親乗之柔習安便不知登降之勞也告成禮畢復乗而下纔及山址上休息未久有司言白騾無疾而殪上嘆異久之諡之曰白騾將軍命有司具槥櫝壘石為墓墓在封禪壇北數里至今存焉出開天傳信記推磨騾臨洛市中百姓有推磨盲騾無故死因賣之屠者剖腹中得二石大如合拳紫色赤斑瑩潤可愛出酉陽雜俎驢僧朗晉僧朗住金榆山及卒所乗驢上山失之時有人見者乃金驢矣樵者往往聽其鳴響土人言金驢一鳴天下太平出酉陽雜俎厭逹國西域厭逹國有寺户以數頭驢運糧上山無人驅逐自能往返寅發午至不差晷刻出酉陽雜俎村人供僧世有村人供於僧者祈其密言僧紿之曰驢其人遂日夕念之經數嵗照水見青毛驢附於背凡有疾病魅鬼其人至其所立愈後知其詐呪效亦歇出酉陽雜俎張髙長安張髙者轉貨於市資累巨萬有一驢盲之久矣唐元和十二年秋八月髙死十三日妻命其子和乗往近郊營飯僧次且出里門驢不復行擊之即卧乗而鞭之驢忽顧和曰汝何擊我和曰我家用錢二萬以致汝汝不行安得不擊也和甚驚驢又曰錢二萬不説父騎我二十餘年吾今告汝人道獸道之倚伏若車輪然未始有定吾前生負汝父力故為驢酬之無何汝飼吾豐昨夜汝父就吾筭侵汝錢一緡半矣汝父常騎我我固不辭吾不負汝汝不當騎我汝彊騎我我亦騎汝汝我交騎何刼能止以吾之肌膚不啻直二萬錢也只負汝一緡半出門貨之人酬爾然而無的取者以他人不負吾錢也麩行王胡子負吾二緡吾不負其力取其緡半還汝半緡充口食以終驢限耳和牽歸以告其母母泣曰郎騎汝年深固甚勞苦緡半錢何足惜將捨債豐秣而長生乎驢擺頭又曰賣而取錢乎乃㸃頭遽舍貨之之酬不過緡半且無敢取者牽入西市麩行逢一人長而胡者乃與緡半易問之其姓曰王自是連雨數日乃晴和覘之驢已死矣王竟不得騎又不負之驗也和東鄰有金吾郎將張逹其妻李之出也余嘗造焉云見驢言之夕遂聞其事且以戒貪昧者故備書之出續𤣥怪録東市人開成初東市百姓䘮父騎驢市凶具行百歩驢忽語曰我姓白名元通負君家力已足勿復騎我南市賣麩家欠我錢五千四百文我又負君錢數亦如之今可賣我其人驚異即牽往旋訪主賣之驢甚壮報價只及五千及詣麩行乃得五千四百文因賣之兩宿而死出酉陽雜俎賀世伯北齊時曲安賀世伯年六十餘家有小驢未經調習使兒乗之二兒更亦被撲世伯嗤之曰儜劣小子試無堪我雖年老不須鞴鞍猶能控制遂即躑上驢驚迅跳走世伯荒忙跳下僅得免撲其夜在堂内與所親宴聚世伯欲睡忽然驚起以手掩額家人怪問云吾夢調此驢以杖擊之誤打吾額今痛熱如湯腫大如梨往㸔其驢在他村外其人因病而死出廣古今五行記王甲隋大業中洛人有姓王者常持五戒時言未然之事閭里敬信之一旦忽謂人曰今當有人牽驢一頭送來涕泣説言早䘮父其母寡養一男一女女嫁而母亡二十年矣寒食日持酒食祭墓此人乗驢而往墓在伊水東欲渡伊水驢不肯行鞭其頭面傷流血既至墓所放驢而祭俄失其驢其日妹在兄家忽見其母入來頭面流血形容毁悴號泣告女我生時避汝兄送米五斗與汝坐得此罪報受驢身償汝兄五年矣今日欲渡伊水水深畏之汝兄鞭撻我頭面盡破仍期還家更苦打我我走來告汝吾今償債垂畢何太非理相苦也言訖出門尋之不見唯見驢頭面流血如母傷状女抱以號泣兄回怪而問之女以狀告於是兄妹抱持慟哭驢亦涕泣皆流不食水草兄妹跪請若是母者願為食草驢即為食既而復止兄妹莫如之何遂備芻粟送王五戒處後死兄妹收塟焉出法苑珠林湯安仁唐京兆湯安仁家富素事慈門寺僧以熙寧元年忽有客寄其家停止客盜他驢於家殺之以驢皮遺安仁至貞觀三年安仁遂見一人於路謂安仁曰追汝使明日至汝當死也安仁懼逕至慈門寺坐佛殿中經宿不出明日果有三騎并歩卒數十人皆兵仗入寺遥見安仁呼湯安仁應而念誦愈進鬼相謂曰昨日不即取今修福如此何由可得因相與去留一人守之守之者謂安仁曰君往日殺驢驢今訴君使我等來攝君耳終須共詣不去何益安仁遥答曰往日他盜自殺驢但以皮與我耳非我殺何為見追諸君還為我語驢我本不殺汝然今又為汝追福於汝有利當捨我也此人許諾曰驢若不許我明日更來如其許者不來矣言畢而出明日遂不來安仁於是為驢追福舉家持戒菜食云爾盧文礪説之安仁今見在出法苑珠林王薰天寶初有王薰者居長安延夀里中常一夕有三數輩挈食㑹薰所居既飲食燭前忽有巨臂出燭影下薰與諸友且懼相與觀之其臂色黑而有毛甚多未幾影外有語曰君有㑹不能一見呼耶願得少肉置掌中薰莫測其由即與之其臂遂引去少頃又伸其臂曰幸君與我肉今食且盡願君更賜之薰又置肉於掌中已而又去於是相與謀曰此必怪也伺其再來當斷其臂頃之果來㧞劒斬之臂既墮其身亦逺俯而視之乃一驢足血流滿地明日因以血蹤尋之直入里中民家即以事問民民曰家養一驢且二十年矣夜失一足有似刃而斷者焉方駭之薰具言其事即殺而食之出宣室志太平廣記巻四百三十六
