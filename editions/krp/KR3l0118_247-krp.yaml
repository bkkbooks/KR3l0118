body:
  text: 太平廣記卷二百四十七詼諧三穆子客僧重公孫紹魏市人魏彦淵陸乂王元景李庶邢子才盧詢祖北海王晞李騊駼盧思道石動筩徐之才蕭彪穆子客魏使穆子客聘梁主客范胥謂之曰卿名子客思歸之𫝊一何太速客曰吾名子客所以將命四方禮成告返那得言速出談藪僧重公魏使主客即李恕聘梁沙門重公接恕曰向來全無𦵔酢膎乎恕父名諧以為犯諱曰短髮麄踈重公曰貧道知髮非沙門種𩔖以君交聘二國不辨膎諧重公嘗謁高祖問曰天子聞在外有四聲何者為是重公應聲答曰天保寺刹中出逢劉孝綽説以為能綽曰何如道天子萬福出談藪孫紹後魏孫紹歴職内外垂老始拜太府少卿謝日靈太后曰公年似太老紹重拜曰臣年雖老臣卿太少后大笑曰是將正卿出啓顏録魏市人後魏孝文帝時諸王及貴臣多服石藥皆稱石發乃有熱者非富貴者亦云服石發熱時人多嫌其詐作富貴體有一人於市門前臥宛轉稱熱因衆人競㸔同伴怪之報曰我石發同伴人曰君何時服石今得石發曰我昨在市得米米中有石食之乃今發衆人大笑自後少有人稱患石發者出啓顏録魏彦淵北齊崔昂嘗宴筵招朝彦酒酣後人多散走即令著作郎鉅鹿魏彦淵追之彦淵左手執中叅軍周子淵淵以文學如名右手執御史鄭守信來諮昂曰彦淵役周入鄭執訊獲醜濟州長史李翥嘗為主人朝士咸集幽州長史陸仁惠不來翥甚衘之彦淵曰一目之羅豈能獲鳥翥眇一目陸號角鴟又崔儦謂彦淵曰我拙於書不能儦字使好彦淵曰正可長牽人脚斜飄鹿尾即好彦淵司農卿季昌之子出談藪陸乂北齊散騎常侍河南陸乂黄門郎卬之子卬字雲駒而乂患風多所遺忘嘗與人馬曰雲駒有神符者常帶符與神渡漳水致失乂笑曰劉君渡水失神符其人答曰陸乂名馬作雲駒出談藪王元景北齊王元景為尚書性雖懦緩而毎事機捷有奴名典琴嘗旦起令索食謂之解齋奴曰公不作齋何故嘗云解齋元景徐謂奴曰我不作齋不得為解齋汝作字典琴何處有琴可典出啓顔録李庶世呼病痩為崔家疾北齊李庶無鬚時人呼為天閹崔諶調之曰教弟種鬚法以錐錐遍刺作孔揷以馬尾庶曰持此還施貴族藝眉有驗然後樹鬚崔氏世有惡疾故庶以此嘲之俗呼滹沱河為崔氏出酉陽雜俎邢子才北齊中書侍郎河東裴襲字敬憲患耳新搆山池與賓客宴集謂河間邢子才曰山池新就願為一名子才曰海中有蓬萊山仙人之所居宜名蓬萊蓬萊裴襲也故以戲之敬憲初不悟於後始覺忻然謂子才曰長忌及戸高則無害公但大語襲亦何嫌出談藪盧詢祖齊主客郎頓邱李恕身短而袍長盧詢祖腰麄而帶急恕曰盧郎腰麤帶難匝答曰丈人身短袍易長恕又謂詢祖曰盧即聰明必不壽答曰見丈人蒼蒼在鬂差以自安出北史北齊王晞齊北海王晞字叔朗為大丞相府司馬嘗共相府祭酒盧思道褉飲晉湖晞賦詩曰日暮應歸去魚鳥見留連時有中使召晞馳馬而去明旦思道問晞昨被召以朱顔得無以魚鳥致責晞曰昨晩陶然頗以酒漿被責卿等亦是留連之一物何獨魚鳥而已晞好文酒樂山水府寮呼為方外司馬焉及孝昭立待遇彌隆而晞毎自踈退謂人曰非不愛熱官但思之爛熟耳出談藪李騊駼陳使聘齊見朝廷有赤鬛者顧謂散騎常侍趙郡李騊駼曰赤也何如騊駼曰束帶立於朝可使與賓客言騊駼時接客出談藪盧思道北齊盧思道聘陳陳主令朝貴設酒食與思道宴㑹聨句作詩有一人先唱方便譏刺北人云榆生欲飽漢草長正肥驢為北人食榆兼吳地無驢故有此句思道援笔即續之曰共甑分炊飯同鐺各煑魚為南人無情義同炊異饌也故思道有此句吳人甚愧之又衛尉卿京兆杜臺卿共中兵叅軍清河崔儦握槊十子成都止賭一雉盧思道曰翳成都不過一雉儦又謂思道曰昨夜大雷吾睡不覺思道曰如此震雷不能動蟄太子詹事范陽盧叔虎有子十人大者字畜生最有才思思道謂人曰從叔有十子皆不及畜生叔虎主客郎中澤之孫也散騎常侍隴西辛德源謂思道曰昨作羌嫗詩惟得五字云皂陂垂肩井苦無其對思道尋聲曰何不道黄物揷腦門思道嘗謂通直郎渤海封孝騫曰卿既姓封是封豕之後騫曰卿既姓盧是盧令之裔出談藪石動筩北齊高祖嘗宴近臣為樂高祖曰我與汝等作謎可共射之卒律葛答諸人皆射不得或云是髐子箭高祖曰非也石動筩云臣已射得高祖曰是何物動筩對曰是煎餠高祖笑曰動筩射着是也高祖又曰汝等諸人為我作一謎我為汝射之諸人未作動筩為謎復云卒律葛荅高祖射不得問曰此是何物荅曰是煎餅高祖曰我始作之何因更作動筩曰承大家熱鐺子頭更作一箇高祖大笑高祖嘗令人讀文𨕖有郭璞遊仙詩嗟嘆稱善諸學士皆云此詩極工誠如聖旨動筩即起云此詩有何能若令臣作即勝伊一倍高祖不悦良久語云汝是何人自言作詩勝郭璞一倍豈不合死動筩即云大家即令臣作若不勝一倍甘心合死即令作之動筩曰郭璞遊仙詩云青溪千餘仞中有一道士臣作云青溪二千仞中有兩道士豈不勝伊一倍高祖始大笑又嘗於國學中㸔博士論云孔子弟子達者七十二人動筩因問曰達者七十二人幾人已著冠幾人未著冠博士曰經傳無文動筩曰先生讀書豈合不解孔子弟子已著冠有三十人未著冠有四十二人博士曰據何文以辨之曰論語云冠者五六人五六三十人也童子六七人六七四十二人也豈非七十二人坐中皆大悦博士無以復之出啓顏録徐之才齊西陽王高平徐之才博識有口辨父雄祖成伯並善術世傳其業納言祖孝徵戲之呼為師公之才曰既為汝師復為汝公在三之義頓居其兩孝徵僕射瑩之子之才嘗以劇談調僕射魏收收熟視之曰面似小家方相之才答曰若爾便是卿之塟具出談藪蕭彪闕明帝與文士庾信王褒等遊處有蕭彪者寶寅之子素好臧否多所月旦嘗侍坐於帝帝歴問衆賓何如皆對曰君子也次問君何如人荅曰那得是非君子之問闕荅曰那得是君子時䕶在同州他日帝闕右詐闕吾欲闕疾病可乎使者曰闕追荅曰緣君子事彪乃惶懼頓首乞留帝曰闕得闕彪乃遺書寄家號慟而去帝度其行闕之云吾闕别報冡宰彪還信等咸在彪甚悲喜闕㣲笑闕視彪巧覺謂帝曰北那得是君子於是闕笑出三國典畧太平廣記卷二百四十七
