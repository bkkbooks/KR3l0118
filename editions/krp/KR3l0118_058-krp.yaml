body:
  text: 太平廣記卷五十八女仙三魏夫人魏夫人魏夫人者任城人也晉司徒劇陽文康公舒之女名華存字賢安幼而好道靜黙恭謹讀莊老三傳五經百氏無不該覽志慕神仙味真耽𤣥欲求冲舉常服胡麻散茯苓丸吐納氣液攝生夷靜親戚往來一無闗見常欲别居閒處父母不許年二十四强適太保掾南陽劉文字幼彦生二子長曰璞次曰瑕幼彦後為修武令夫人心期幽靈精誠彌篤二子麤立乃離隔宇室齋于别寢將逾三月忽有太極真人安度明東華大神方諸青童扶桑碧阿陽谷神王景林真人小有仙女清虛真人王裒來降裒謂夫人曰聞子宻緯真氣注心三清勤苦至矣扶桑大帝君敕我授子神真之道青童君曰清虛天王即汝之師也度明曰子苦心求道道今來矣景林真人曰虛皇鑒爾勤感太極已注子之仙名於玉札矣子其朂哉青童君又曰子不更聞上道内晨景玉經者仙道無縁得成後日當會陽滌山中爾謹宻之王君乃命侍女華散條李明兌等便披雲蘊開玉笈出太上寳文八素隱書大洞真經靈書八道紫度炎光石精金馬神真虎文高仙羽𤣥等經凡三十一卷即手授夫人焉王君因告曰我昔於此學道遇南極夫人西城王君授我寳經三十一卷行之以成真人位為小有洞天仙王今所授者即南極元君西城王君之本文也此山洞臺乃清虛之别宫耳於是王君起立北向執書而祝曰太上三元九星高真虚微入道上清玉晨褒為太帝所敕使教于魏華存是月丹良吉日戊申謹按寳書神金虎文大洞真經八素玉篇合三十一卷是褒昔精思於陽明西山受真人太師紫元夫人書也華存當謹按明法以成至真誦修虚道長為飛仙有泄我書族及一門身為下鬼塞諸河源九天有命敢告華存祝畢王君又曰我受秘訣於紫元君言聽教於師云此篇當傳諸真人不但我得而已子今獲之太帝命焉此書自我當七人得之以白玉為簡青玉為字至華存則為四矣於是景林又授夫人黄庭内景經令晝夜存念讀之萬遍後乃能洞觀鬼神安適六府調和三魂五臓生華色反嬰孩乃不死之道也於是四真吟唱各命玉女彈琴擊鐘吹簫合節而發歌歌畢王君乃解摘經中所修之節度及寳經之指歸行事之口訣諸要備訖徐乃别去是時太極真人命北寒玉女宋聫涓彈九氣之璈青童命東華玉女烟景珠擊西盈之鐘暘谷神王命神林玉女賈屈廷吹鳳唳之簫清虚真人命飛𤣥玉女鮮于虚拊九合玉節太極真人發排空之歌青童吟太霞之曲神王諷晨啓之章清虚詠駕飈之詞既散後諸真元君日夕來降雖幼彦隔壁寂然莫知其後幼彦物故值天下荒亂夫人撫養内外旁救窮乏亦為真仙黙示其兆知中原將亂携二子渡江璞為庾亮司馬又為溫太真司馬後至安成太守遐為陶太尉侃從事中即將夫人自洛邑達江南盜寇之中凡所過處神明保佑常果元吉二子位既成立夫人因得㝠心齋靜累感真靈修真之益與日俱進凡住世八十三年以晉成帝咸和九年嵗在甲午王君復與青童東華君來降授夫人成藥二劑一曰遷神白騎神散一曰石精金光化形靈丸使頓服之稱疾不行凡七日太乙𤣥仙遣飈車來迎夫人乃託劍化形而去徑入陽洛山中明日青童君太極四真人清虛王君令夫人清齋五百日讀大洞真經併分别真經要秘道陵天師又授明威章奏存祝吏兵符籙之訣衆真各標至訓三日而去道陵所以徧教委曲者以夫人在世當為女官祭酒領職理民故也夫人誦經萬遍積十六年顏如少女於是龜山九虛太真金母金闕聖君南極元君共迎夫人白日昇天北詣上清宫玉闕之下太微帝君中央黄老君三素高元君太上玉晨太道君太素三元君扶桑太帝君金闕後聖君各令使者致命授夫人玉札金文位為紫虛元君領上真司命南岳夫人比秩仙公使治天台大霍山洞臺中主下訓奉道教授當為仙者男曰真人女曰元君夫人受錫事畢王母及金闕聖君南極元君各去使夫人於王屋小有天中更齋戒二月畢九微元君龜山王母三元夫人衆諸真仙並降於小有清虚上四奏各命侍女陳鈞成之曲九靈合節八音靈際王母擊節而歌三元夫人彈雲璈而答歌餘真各歌須臾司命神仙諸𨽻屬及南岳迎官並至虎旂龍輦激耀百里中王母諸真乃共與夫人東南而行俱詣天台霍山臺又便道過句曲金壇茅叔申宴㑹二日二夕共適于霍山夫人安駕玉宇然後各别初王君告夫人曰學者當去疾除病因授甘草榖仙方夫人服之夫人能𨽻書小有王君並傳事甚詳悉又述黄庭内景注叙青精䭈飯方後屢降茅山子璞後至侍中夫人令璞傳法于司徒瑯琊王舍人楊羲䕶軍長史許穆穆子玉斧並皆昇仙陶貞白真誥所呼南真即夫人也以晉興寧三年乙丒降楊家謂楊君曰修道之士不欲見血肉見雖避之不如不見又云向過東海中波聲如雷又云裴清靈真人錦囊中有寳神經昔從紫㣲夫人所受吾亦有是西宮定本即是𤣥圃北壇西瑤之上臺天真珍文盡蔵其中也因授書云若夫仰擲雲輪總轡太空手携宵烟足陟王庭身昇帝闕披寳噏青論九𤣥之逸度沉萬椿之長生真言𤣥朗高譚玉清今則㢠廻靈塵埃訓我弟子周目五濁勞神臭腥子所營者道研詠者妙道妙既得吾子加之慮斯蕩散念且慎之仍云河東桐栢山之西頭適崩二百餘丈吾昨與茅叔申詣清虚宫授真仙之籍得失之事頓落四十七人復上者三人耳固當洗心虚邁勤注理盡心殫意竭如履冰火乆乆如此仙道亦不隱矣但在莊敬丹到而絶淫色之念也若抱淫慾之心行上真之道者清宫所落皆此輩也豈止落名生籍方將被考於三官也勉之慎之宗道者貴無邪棲真者安恬愉至寂非引順之主淡然非教授之匠故當困煩以領無耳為道者精則可矣有精而不勤能而不專無益也要在恡心消豁穢念疾開可以數看東山勤望三秀差復益耳言者性命之全敗信者得失之闗籥張良三期可謂篤道而明心矣又曰得道去世或顯或隱託體遺跡者道之隱也昔有再酣瓊液而叩棺一服刀圭而尸爛鹿皮公吞玉華而流䖝出户賈季子咽金液而臭聞百里黄帝火九鼎於荆山尚有喬嶺之墓李玉服雲散以潛昇猶頭足異處墨狄飲虹丹以没水寗生服石腦而赴火務光翦薤以入清冷之泉栢成納氣而腸胃三腐如此之比不可勝紀微乎得道趣捨之迹固無常矣保命君曰所謂尸解者假形而示死非真死也南真曰人死必視其形如生人者尸解也足不青皮不皺者亦尸解也目光不落無異生人者尸解也髮盡落而失形骨者尸解也白日尸解自是仙矣若非尸解之例死經太陰暫過三官者肉脱脉散血沉灰爛而五臓自生骨如玉七魄營侍三魂守宅者或三十年二十年十年三年當血肉再生復質成形必勝於昔日未死之容者此名鍊形太陰易貌三官之仙也天帝云太陰鍊身形勝服九轉丹形容端且嚴面色似靈雲上登太極闕受書為真人是也若暫遊太陰者太一守尸三魂營骨七魄侍肉胎靈錄氣皆數滿再生而飛天其用他藥尸解非是靈丸者即不得返故鄉三官執之也其死而更生者未殮而失其尸有形皮存而無者有衣結不解衣存而形去者有髮脱而形飛者有頭斷已死乃從一旁出者皆尸解也白日解者為上夜半解者為下向晚向暮去者為地下主者此得道之差降也夫人之修道或災逼禍生形壞氣亡者似由多言而守一多端而期茍免也是以層巢頽枝而墜落百勝失於一敗惜乎通仙之才安可為二竪子而致斃耶智以無涯傷性心以欲惡蕩真豈若守根靜中棲研三神彌貫萬物而洞𤣥鏡寂混然與泥丸為一而内外均福也真人歸心於一任於永信心歸則正神和信順利真之兆自然之感無假兩際也若外見察觀之氣内有慍結之哂有如此者我見其敗未見其立地下主者乃下道之文官地下鬼師乃下道之武官文解一百四年一進武解倍之世人勤心於嗜慾兼味於清正華目以隨世畏死而希仙者皆多武解尸之最下也夫人與衆真吟詩曰𤣥感妙象外和聲自相招靈雲鬱紫晨蘭風扇緑軺上真宴瓊臺邈為地仙標所期貴逺邁故能秀穎翹翫彼八素翰道成初不遼人事胡可預使爾形氣消夫人既遊江南遂於撫州并山立靜室又於臨汝水西置壇宇嵗乆蕪梗踪跡殆平有女道士黄靈徽年邁八十貎若嬰孺號為花姑特加修餙累有靈應夫人亦寓夢以示之後亦昇天𤣥宗敕道士蔡偉編入後仙傳大歴三年戊申魯國公顏真卿重加修葺立碑以紀其事焉出集仙録及本傳太平廣記卷五十八
