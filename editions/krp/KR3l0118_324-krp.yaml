body:
  text: 太平廣記卷三百二十四宋李昉等編鬼九秦樹竺惠熾郭銓賀思令山都區敬之劉雋檀道濟石秀之夏侯祖觀張承吉梁清崔茂伯巢氏胡庇之索頥秦樹沛郡人秦樹者家在曲阿小辛村嘗自京歸未至二十里許天暗失道遥望火光往投之見一女子秉燭出云女弱獨居不得宿客樹曰欲進路碍夜不可前去乞寄外住女然之樹既進坐竟以此女獨處一室慮其夫至不敢安眠女曰何以過嫌保無慮不相誤也爲樹設食食物悉是陳久樹曰既未出適我亦未婚欲結大義能相顧否女笑曰自顧鄙薄豈足伉儷遂與寢止向晨樹欲去乃俱起執别女泣曰與君一覩後面莫期以指環一雙贈之結置衣帶相送出門樹低頭急去數十步顧其宿處乃是冢墓居數日亡其指環結帶如故出甄異錄竺惠熾沙門竺惠熾住江陵四層佛寺以永初二年卒葬後弟子七日㑹舉寺悉出惟僧明道先患病獨停忽見惠熾謂明道曰我生不能斷肉今落餓狗地獄令知有報出異苑郭銓郭銓字仲衡義熈初以黨附桓𤣥被殺及元嘉八年忽乗輿導從顯形謂女壻劉凝之曰僕有謫事可四十僧㑹得免脫也又女夢云吾有謫罰令汝夫作福何以至今設㑹不能見矜耶女問當何處設齋答曰可歸吾舍倐然復沒辦㑹畢有人稱銓信與凝之言感君厚惠事始獲宥出㝠祥記賀思令㑹稽賀思令善彈琴嘗夜在月中坐臨風撫奏忽有一人形器甚偉著械有慘色至其中庭稱善便與共語自云是嵇中散謂賀云卿下手極快但於古法未合因授以廣陵散賀因得之於今不絶出幽明錄山都山都形如崑崙人通身生毛見人輒閉眼張口如笑好居深樹中翻石覓蟹啗之述異記曰南康有神名曰山都形如人長二尺餘黒色赤目髮黄披身於深山樹中作窠窠形如卵而堅長三尺許内甚澤五色鮮明二枚沓之中央相連土人云上者雄舎下者雌室旁悉開口如規體質虚輕頗似木筒中央以鳥毛爲褥此神能變化𨼆形猝覩其狀蓋木客山魈之𩔖也贑縣西北十五里有古塘名余公塘上有大梓樹可二十圍老樹空中有山都窠宋元嘉元年縣治民有道訓道靈兄弟二人伐倒此樹取窠還家山都見形罵二人曰我居荒野何預汝事山木可用豈可勝數樹有我窠故伐倒之今當焚汝宇以報汝之無道至二更中内外屋上一時起火合宅蕩盡矣木客鄧徳明南康記曰木客頭面語聲亦不全異人但手脚爪如鉤利髙岩絶嶺然後居之能斫榜索著樹上聚之昔有人欲就其買榜先置物樹下隨置多少取之若合其意便將榜與人不取亦不横犯也但終不與人面對與交作市井死皆加殯殮之曽有人往看其葬以酒及魚生肉遺賔自作飲食終不令人得見其形也葬棺法毎在髙岸樹杪或藏石窠之中南康三營伐船兵說往親覩葬所舞唱之節雖異於人聴如風林汎響聲𩔖歌吹之和義熈中徐道覆南出遣人伐榜以装舟艦木客乃獻其榜而不得見出南廣記區敬之南康縣營民區敬之宋元嘉元年與息共乗舫自縣泝流深入小溪幽荒險絶人迹所未嘗至夕登岸停止舎中敬之中惡猝死其子然火守尸忽聞逺哭聲呼阿舅孝子驚疑俛仰間哭者已至如人長大被髮至足髮多蔽面不見七竅因呼孝子姓名慰唁之孝子恐懼因析薪以然火此物言故来相慰當何所畏將須然火此物坐亡人頭邊哭孝子於火光中竊窺之見此物以面掩亡人面亡人面須臾裂剝露骨孝子懼欲撃之無兵仗須臾其父尸見白骨連續而皮肉俱盡竟不測此物是何鬼神出述異記劉雋元嘉初散騎常侍劉雋家在丹陽後嘗遇驟雨見門前有三小兒皆可六七歳相率狡獪而並不沾濡俄見共争一匏壺子雋引彈彈之正中壺霍然不見雋得壺因掛閣邊明日有一婦人入門執壺而泣雋問之對曰此是吾兒物不知何由在此雋具語所以婦持壺埋兒墓前間一日又見向小兒持来門側舉之笑語雋曰阿儂已復得壺矣言終而隱出幽明錄檀道濟檀道濟居清溪第二兒夜忽見人来縛已欲呼不得至曉乃解猶見繩痕在此宅先是吳將步闡所居諺云揚州青是鬼營清溪青揚是也自步及檀皆被誅出異苑石秀之丹陽石秀之宋元嘉中堂上忽有一人著平巾幘烏布袴褶擎一版及門授之曰聞巧侔班垂刻杭尤妙太山府君故使相召秀之自陳止能造車制杭不及髙平劉儒忽持版而沒劉儒時爲朝請除歴陽郡丞數旬而殁出廣古今五行記夏侯祖觀元嘉中夏侯祖觀爲兖州刺史鎮瑕邱卒於官沈僧榮代之經年夏侯来謁僧榮語如平生每論幽冥事僧榮牀上有一織成寶飾絡帶夏侯曰豈能見與必以爲施可命焚之僧榮令對燒之烟焰未滅已見夏侯帶在腰上僧榮明年在鎮夜設女樂忽有一女人在戸外沈問之答本是杜青州彈筝妓採芝杜以致夏侯兖州爲寵妾惟願座上一妓爲伴戲指下坐琵琶妓妓啼云官何忽以賜鬼鬼曰汝無多言必不相放入與同房别飲酌未終心痛而死死氣方絶魂神已復人形在採芝側出廣古今五行記張承吉魏郡張承吉息元慶年十二元嘉中見一鬼長三尺一足而鳥爪背有鱗甲来招元慶恍惚如狂游走非所父母撻之俄聞空中云是我所教幸勿與罰張有二卷羊中敬書忽失所在鬼於梁上擲還一卷少裂壊乃爲補治王家嫁女就張借物鬼求紙筆代答張素工巧嘗造一彈弓鬼借之明日送還而皆折壊出異苑梁清宋安定梁清字道修居揚州右尚方間桓徐州故宅元嘉十四年二月數有異光又聞擗籮聲令婢子松羅往看見二人問云姓華名芙蓉為六甲至尊所使從太微紫室仙人来過舊居仍留不去或鳥首人身舉面是毛松羅驚以箭射之應弦而滅並有絳汙染箭又覩一物彷彿如人行樹杪令人刺中其髀墮地淹没經日又從屋上跛行就婢乞食團飯授之頓進二升數日衆鬼羣至醜惡不可稱論拉攞牀障塵石飛揚累晨不息婢採菊路逢一鬼著衣幘乗馬衞從數十謂採菊曰我是天上仙人勿名作鬼問何以恒擲穢汙答曰糞汙者錢財之像也投擲者速遷之徴也頃之清果爲揚武將軍北魯郡太守清厭毒既久乃呼外國道人波羅疊誦呪見諸鬼怖懼踰垣穴壁而走皆作鳥聲如此都絶在郡少時夜中松羅復見威儀器械從衆數十人戴幘送書麤紙七十許字筆跡婉媚逺擬羲獻又歌云坐儂孔雀樓遥聞鳳凰鼔下我鄒山頭彷彿見梁魯鬼有敘弔不異世人鬼傳教曽乞松羅一函書題云故孔修之死罪白箋以弔其叔喪敘致哀情甚有銓次復云近往西方見一沙門自名大摩殺問君消息寄五丸香以相與清先本使燉煌曽見此僧清家有婢産於是而絶出異苑崔茂伯崔茂伯女結婚裴祖兒婚家相去五百餘里數歳不通八月中崔女暴亡裴未知也日將暮女詣裴門拊掌求前提金罌受二升許到牀前而立裴令坐問所由女曰我是清河崔府君女少聞大人以我配君不幸喪亡大義不遂雖同牢未顯然斷金已著所以故来報君耳便别以金罌贈裴女去後裴以事啓父父欲遣信參之裴曰少結崔氏姻而今感應如此必當自往也父許焉裴至女果喪因相弔唁裴具述情事出罌示茂伯先以此罌送女入瘞既見罌遂與裴俱造女墓未至十餘里裴復見女在墓言語旁人悉聞聲不見其形裴懐内結發病死因以合葬出幽明録巢氏元嘉中太山巢氏先爲湘縣令居晉陵家婢採薪忽有一人追之如相問訊遂共通情隨婢還家仍住不復去巢恐爲禍夜輒出婢聞與婢謳歌言語大小悉聞不使人見見者唯婢而已恒得錢物酒食日以充足毎與飲吹笛而歌歌云閒夜寂已清長笛亮且鳴若欲知我者姓郭字長生出幽明錄胡庇之宋豫章胡庇之嘗爲武昌郡丞元嘉二十六年入廨便有鬼在焉中宵朧月戸牖小開有人倚立戸外狀似小兒戸閉便聞人行如著木屐聲看則無所見如此甚數二十八年二月舉家悉得時病空中投擲瓦石或是乾土夏中病者皆差而投擲之勢更猛乃請道人齋戒轉經竟從倍来如雨惟不著道人及經卷而已秋冬漸有音聲瓦石擲人肉皆青黯而亦甚痛有一老妳好罵詈鬼在邊大嚇庇之迎祭酒上章施符驅逐漸復歇絶至二十九年鬼復来劇於前明年丞廨火頻四發狼狽澆沃並息鬼毎有聲如犬家人每呼吃嚂後忽語音似吳三更叩戸庇之問誰也答曰程邵陵把火出看了無所見數日三更中復戸外叩掌便復罵之答云君勿罵我我是善神非前後来者陶御史見遣報君庇之云我不識陶御史鬼云陶敬𤣥君昔與之周旋庇之云吾與之在京日服事衡陽又不常作御史云陶今處福地作天上御史前後相侵是沈公所爲此廨本是沈宅来看宅聊復投擲狡獪忿戾禳却太過乃至罵詈命婢使無禮向之復令祭酒上章告罪狀事徹天曹沈今爲天然君是佛三歸弟子那不從佛家請福乃使祭酒上章自今惟願專意奉法不須與惡鬼相當庇之因請諸僧誦經齋戒訖經一宿後復聞戸外御史相聞白胡丞今沈相訟甚苦如其所言君頗無理若能歸誠正覺習經持戒則羣邪屏絶依依曩情故相白也出法苑珠林索頥宋襄城索頥其父爲人不信妖邪有一宅凶居者輒死父便買居之多年安吉子孫昌盛爲二千石當徙家之官臨去請㑹内外親戚酒食既行父乃言曰天下竟有吉凶否此向来言凶自吾居之多年安吉又得遷官鬼爲何在自今以後便爲吉宅居無嫌也語訖如厠須臾見壁中有一物如卷席大髙五尺許頥父便還取刀斫之中斷便化爲兩人復横斫之又成四人便奪取刀反斫索殺之持刀至座上斫殺其子弟凡姓索必死唯異姓無他頥尚幼乳母抱出後門藏他家止其一身獲免頥字景真位至湘東太守出法苑珠林太平廣記卷三百二十四
