body:
  text: 太平廣記卷一百二十三報應二十二胡激秦匡謀韋判官楊收宋柔王表乾寧宰相胡激唐胡激者前嶺南節度使誕之子也宰相賈餗知舉登進士第太和中甘露之變北軍方捕餗有禁軍牙校利激家富白仇士良曰恐餗在激所因遣士卒理其家既不獲餗擒激以詣士良士良命戮於轅門外盡沒其財時激弟湘在河東郡忽一日家僮見一人無頭著綠衣上皆流血甚異之及凶問至詢其由則激死之日也後士良死亦破其家葢其報也出唐年𥙷録秦匡謀唐太傅汾國公杜悰節度江陵咸通十四年黔南廉使秦匡謀以蠻冦大舉兵力不敵來奔既謁見公公怒其不趨庭退而使吏讓之曰汝鳳翔一民也悰兩爲鳳翔節度使汝今靡認桑梓也匡謀報曰某雖家世岐下然少離中土太傅擁節之日已忝分符實不曾趨走台階比日况在荆南若論桑梓恐非儀也悰怒遣縶之發函與韋相保云秦匡謀擅棄城池不能死王事請誅之韋以悰國之元臣兼素有舊恩遂奏請依悰處置敕既降悰乃親臨都市監戮匡謀將就法謂其子曰今日之死實寃枉無狀奈申訴非及但多燒紙墨當於泉下理之耳行刑觀者駕肩接踵揮刃之際悰大驚驟得疾遂輿而返俄有旋風暴作飛卷塵埃直入府署乃散是夕獄吏發狂自呼姓名叱責曰吾已惠若錢帛非少奚復隱吾受用諸物舉體自撲而殞其年六月十三日殺秦匡謀七月十三日悰乃薨將歸塟洛陽爲束身楸函而即路欲歛之夕主吏覺函短憂懼甚又難於改易遂厚賂陰陽者紿杜氏諸子曰太傅薨時甚凶就木之際若臨近必有大禍諸子信然於是盡率家人待於别室及舉尸就歛楸函果短遂陷胸折項骨而入焉無有知者及扺東洛長子無逸相次而逝歲月既乆其事稍聞於世議者以悰恃權貴枉刑戮獲茲報焉出南楚新聞韋判官唐博陵崔應任扶溝令亭午獨坐有老人請見應應問之老人對曰某通於靈祇也今者㝠司韋判官來拜謁幸望厚禮以待之請備香案屏去侍從當爲延入應依命老人即出迎之及庭隱隱然不見其形自通名衘稱思穆敘拜時候應亦答拜揖讓再三乃言曰某㝠司要職也側聞長官宏才令器冠於當時輒將心事且願相託故俟亭午務隙拜謁幸無驚異應曰某聞神明不昧今乃不虚孱劣幽薄觸事蒙鄙何幸明靈俯降但揣微賤力不副心茍可施於區區敢不從命幸示指南願効勤勞㝠使曰某謝去人世數載得居㝠職自棄擲妻孥家事零替愛子文卿少遭憫凶鄙野無文職居鄭滑院近經十載交替院務之日不明簿書欠折數萬貫疋實非已用欲冒嚴明俯爲存庇應憮然曰噫某扶溝令也焉知鄭滑院使者曰不然以閣下材器禄位豈一院哉自今已後厯官清顯雄居方鎭位極人臣然數月後當與鄭滑院交職儻不負今日之言某於㝠司當竭微分仰䕶榮貴非止一身抑亦慶及後嗣應曰某雖鄙陋敢不惟命是聽㝠使感泣於是敘别而去應聞淮南杜相悰方求政理偶具書啓兼錄爲縣課績馳使揚州意者以思穆之言且欲驗試其事時相國都督維揚兼判鹽鐵奏應知鄭滑院事及交割帳籍錢帛欠折數萬貫疋收錄家貲塡償外尚欠三四萬無所出初應在扶溝受思穆寄託事實丁寧比及鄭滑遂違前約且曰欠折數廣何由辨明文卿雖云贓非已用積年不申論雖扺嚴刑以懲慢易窮達既定鬼何能移若棄法徇神是諂而求福乃拘縶文卿而白於使文卿自度必死乃預懐毒於衣帶之間比及囚縶數欲服之輒失其藥搜求不獲及文卿以死論是日思穆見於文卿前而告曰嗚呼無信之人陷汝家族吾爲汝上告於帝帝許我奪崔應之禄然吾之族亦滅矣文卿匍匐拜哭忽失其父乃得所懐之藥仰而死焉於是應與巡官李擅滑糺朱程戎曹賈均就刑所將刑之文卿既已死應方悔悟乃禮𦵏文卿身衣縞素而躬送之應後加殿中時有人自邯鄲將美人曰金閨來獻於應應納而嬖之崔君始惑於聲色爲政之心怠矣後二年加侍御史知揚子院與妻盧氏及金閨偕行尋除浙西院應自至職金閨寵愛日盛中門之外置别館焉華麗逾於正寢視事之罷經日不履内前後厯任寶貨悉置金閨之所無何復有人獻吳姝艶於金閨應納之寵嬖愈甚每歌舞得意乃奪金閨寶貨而賜新姝因是金閨忿逆與親弟陳行宗置毒藥於酒中夜以獻應飲之俄頃而卒潛遷應於大㕔詰旦家人乃覺莫知事實盧氏慈善不能窮究金閨乃持寶貨盡室而去諸姬分散崔氏門館日微後隴西李君知浙西院聞金閨艶麗求而納之李君與金閨白晝開筵應乃見形於庭叱金閨曰汝已鴆我又納於李君後不得意復欲禍李君耶金閨懼而辭歸後李君方欲捕金閨案理舊事雪崔生之寃金閨忽爾逃去不知所在出隂德傳楊收唐丞相楊收貶死嶺外于時鄭愚尚書鎭南海忽一日賔司報云楊相公在客次欲見尚書愚驚駭以收近有後命安得來此乃延接之楊曰某為軍容使楊𤣥价所譛不幸遭害今已得請于上帝賜陰兵以復仇欲託尚書宴犒兼借錢十萬緡鄭諾之唯錢辭以軍府事多許其半楊相曰非銅錢也燒時幸勿著地愚曰若此則固得遵副從容長揖而滅愚令於北郊具酒饌素錢以祭之楊猶子有典壽陽者見收乗白馬臂朱弓彤矢有朱衣天吏控馬謂之曰今上帝許我讎殺楊𤣥价我射中之必死也俄而楊中尉暴得疾而死蜀毛文錫其先爲潮州牧曾事鄭愚熟詳其事出北夢𤨏言宋柔唐僖宗之狩于岷蜀也黃巾尚遊魂於三輔中和辛丑嵗詔丞相晉國公王鐸爲諸道行營都綂執操旗皷乗三峽而下作鎭南燕爲東諸侯節度又詔軍容使西門季𤣥爲都監秋七月鐸至滑都監次于臨汝郡當兵道郵傳皆焚乃舍于龍興北禪院其西廊小院即都監下都押衙何羣處之羣滑人也世爲本軍劇職羣少兇險親姻頗薄之乃西走上京以干中貴人而西門納焉至是擢爲元從都押衙戎事一以委焉羣志氣驕佚肉視其從嘗一日汝州監軍使董𢎞贄令孔目官宋柔奉啓于都監致命將出值羣方據胡牀于門下怒其不先禮謁也叱數卒捽以入撃以馬撾而遣之𢎞贄聞之大恐笞宋柔數十仍斥去不復任使馳書使謝羣羣亦無怍復數旬日將夕宋柔徒行經寺門又值羣自外將入瞥見發怒連叱騶皁録之入院候曛黑殺而支解納諸溷中既張燈宛見宋柔𬒳髪徒跣浴血而立於燈後羣矍起奮劔撃刺歘然而滅厥後夜夜見之暮秋月都監遷于滎陽郡舎于開元寺子城東南隅之地至是羣神情惝怳漸不自安乃與其禆將竇思禮等謀叛將大掠郡中而奔于江左都監部曲三百許人皆畏羣而唯諾會太守杜眞府符請都監夜宴啓至羣謂思禮等曰機不旋踵時不再來必發今宵無貽後悔思禮等遂潛勒部分至晡時都監赴宴羣令親信十數人從戒曰至三更汝焚六司院門寺中必舉火相應其夕一皷羣假寢帳中乃夢宋柔向羣大叱曰吾讎雪矣遂驚覺召思禮語之對曰此乃思也是何能爲二皷將半乃令其徒擐甲使一卒登佛殿西大梓樹瞷子城内無何郡都虞候遊巡至僧綱啓門入至殿隅仰視木杪心動命爇炬於下乃見介者蹲于枝間方詰所從羣連聲謂曰走卒痁作遂逃于上無他也都虞候色變馳出戒嚴羣呼思禮等謂曰事亟矣不速行將爲豎子所殄乃擁其徒斬東門關而出奔若走兩舍而羣心蕩無所從適其下稍稍亡去倦憇水側遙聞嚴皷聲乃僕射陂東北隅壖也思禮覺乃前請啓密語羣將耳附之思禮拔佩刀疾斫羣首墜於地餘衆大囂而散思禮携羣首遲明歸命于都監貰其罪使招其散卒焉出三水小牘王表河東裴光遠唐龍紀己酉歲調授滑州衛南縣尉性貪婪冒於貨賄嚴刑峻法吏民畏而惡之尤好撃鞠雖九夏蒸欝亦不暫休息畜一白馬駿健能馳騁竟以暑月不勝其役而致斃于廣場之内有里長王表者家雖富贍早喪其妻唯一子可七八歲白晳端麗常隨父來縣曹光逺見而憐之呼令入宅遺以服翫自是率以爲常光遠令所親謂表曰我無子若能以此兒相餉當善待汝縱有大過亦不汝瑕疵也表答曰某誠賤微受制於上骨肉之間則無以奉命況此兒襁褓喪母豈可復離其父乎設使以此獲罪於明公亦甘心矣光逺聞而銜之後數日乃遣表使於曹南使盜待諸境上殺之而取其子大順辛亥嵗春光遠遘疾逾月委頓或時若鬼物所中獨言曰王表來也當還爾兒又爲表言曰某雖小吏愼密未嘗有過反招殘賊規奪赤子已訴于天今來請命又爲已語今還爾兒與爾重作功德厚賂爾陰錢免我乎皆曰不可少頃曰白馬來也則代馬語曰為人乗騎自有年限至於負載馳驟亦有常程筋力之勞所不敢憚豈有盛夏之月撃鞠不止斃此微命實由於君已訴上天今來奉取又爲已語祈之如王表終不聽數日光遠遂卒出三水小牘乾寧宰相唐乾寧二年邠州王行瑜會李茂貞韓建入覲決謀廢立帝既覩三帥齊至必有異謀乃御樓見之謂曰卿等不召而來欲有何意茂貞等汗流浹背不能對但云南北司紊亂朝政因疏韋昭度討西川失謀李磎麻下爲劉崇魯所哭陛下不合違衆用之乃令宦官詔害昭度已下三帥乃還鎮内外寃之初王行瑜䟦扈朝廷欲加尚書令昭度力止之曰太宗以此官總政而登大位後郭子儀以六朝立功雖有其名終身退讓今行瑜安可輕授焉因請加尚父至是爲行瑜所憾而𬒳害焉後追贈太師李磎字景望拜相麻出劉崇魯抱之而哭改授太子少傳乃上十表及納諫五篇以求自雪後竟登庸且訐崇魯之惡時同列崔昭緯與韋昭度及磎素不相協王行瑜專制朝廷以判官崔鋋入闕奏事與昭緯關通因託鋋致意由是行瑜率三鎮脅君磎亦遇禍其子渷有髙才亦同日害之磎著書百卷號李書樓後追贈司徒太原李克用破王行瑜後崔昭緯貶而賜死昭皇切齒下詔捕崔鋋亦寃報之驗也出北夣瑣言太平廣記巻一百二十三
