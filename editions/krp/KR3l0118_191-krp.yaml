body:
  text: 太平廣記卷一百九十一驍勇一甾丘訢朱遵趙雲吕䝉任城王桓石䖍楊大眼麥鐵杖彭樂髙開道杜伏威尉遲敬徳柴紹弟秦叔寳薛仁貴公孫武達程知節薛萬徹李楷固王君㚟宋令文彭博通李宏辛承嗣甾丘訢周世東海之上有勇士甾丘訢以勇聞於天下過神泉令飲馬其僕曰飲馬於此者馬必死丘訢曰以丘訢之言飲之其馬果死丘訢乃去衣㧞劒而入三日三夜殺二蛟一龍而出雷神隨而擊之十日十夜𦕈其左目要離聞而往見之丘訢出送有喪者要離往見丘訢於墓所曰雷神擊子十日十夜𦕈子左目夫天怨不旋日人怨不旋踵子至今弗報何也叱之而去墓上振憤者不可勝數要離歸謂人曰甾丘訢天下勇士也今日我辱之於衆人之中必來殺我暮無閉門寢無閉戸丘訢至夜半果來㧞劔柱頸曰子有死罪三辱我於衆人之中死罪一也暮無閉門死罪二也寢不閉戸死罪三也要離曰子待我一言而後殺也子來不謁一不肖也㧞劒不刺二不肖也刄先詞後三不肖也子能殺我者是毒藥之死耳丘訢收劒而去曰嘻天下所不若者唯此子也出獨異志朱遵漢朱遵仕郡功曹公孫述僣號遵擁郡人不伏述攻之乃以兵拒述埋車絆馬而戰死光武追贈輔漢將軍吳漢表為置祠一曰遵失首退至此地絆馬訖以手摸頭始知失首於是土人感而義之乃為置祠號為健兒廟後改勇士祠出新津縣圖經趙雲蜀趙雲字子龍身長八尺姿容雄偉居劉備前鋒為曹公所圍乃大開門偃旗皷曹公引去疑有伏兵雲於後射之公軍大駭死者甚多備明日自來視昨日戰處曰子龍一身都是膽也出趙雲别傳吕䝉吳吕䝉隨姊夫鄧當擊賊時年十六呵叱而前當不能禁歸言於母曰貧賤難可居設有功富貴可致又曰不探虎穴安得虎子果成大名出獨異志魏任城王魏任城王彰武帝子也少而剛毅學隂陽緯候之術誦六韜洪範之書數千言武帝謀伐吳問彰取其利師之決王善左右射好擊劒百步中於懸髮時樂浪國獻彪虎文如錦斑以鐵為檻驍勇之徒莫敢輕視彰曳虎尾以繞臂虎弭耳無聲莫不伏其神勇時南越獻白象子在帝前手頓其鼻象伏不動文帝鑄萬鈞鐘置崇華殿前欲徙之力士百人引之不動彰乃負之而趨四方聞其神勇皆寢兵自固帝曰以王權武吞併吳蜀如鴟銜腐䑕耳彰薨如漢東平王塟禮及喪出空中聞數百人泣聲送喪者皆言昔亂軍傷殺者皆無槨王之仁惠收其朽骨死者歡於九土精靈知其懐感故人美王之徳國史撰任城舊事二卷至東晉初藏於秘閣出拾遺錄桓石䖍晉桓石䖍有材幹趫捷絕倫隨父豁在荆州於獵圍中見猛獸被數箭而伏諸督將素知其勇戱令㧞箭石䖍因急往㧞一箭猛虎踞躍石䖍亦跳髙於猛獸復㧞一箭而歸時人有患疾者謂曰桓石䖍來以怖之病者多愈出獨異志楊大眼後魏楊大眼武都氐難當之孫少有膽氣跳走如飛髙祖南伐李冲典選征官大眼求焉冲不許大眼曰尚書不見知為尚書出一技便以繩長三丈繋髻而走繩直如矢馬馳不及見者莫不驚歎冲曰千載已來未有逸材若此者遂用為軍主稍遷輔國將軍王肅初歸國也謂大眼曰在南聞君之名以為眼如車輪今見乃不異人眼大眼曰若旗皷相望瞋眸奮發足使君亡魂喪膽何必大如車輪當代推其驍果以為張關不過也出談藪麥鐵杖麥鐵杖韶州翁源人也有勇力日行五百里初仕陳朝常執繖隨駕夜後多潜往丹陽郡行盗及明却趂仗下執役往廻三百餘里人無覺者後丹陽頻奏盜賊蹤由後主疑之而惜其材力捨而不問陳亡入隋委質於楊素素將平江南諸郡使鐵杖夜泅水過楊子江為廵邏者所捕差人防守送於姑蘓到庱亭遇夜伺守者寐熟竊其兵刃盡殺守者走㢠廻乃口銜二首級攜劒復浮渡大江深為楊素奬用後官至本郡太守今南海多麥氏皆其後也出嶺表錄異彭樂北齊將彭樂勇猛無雙時神武率樂等十餘萬人於沙苑與宇文護戰時樂飲酒乘醉深入被刺肝肚俱出内之不盡截去之復入戰護兵遂敗相枕籍死者三萬餘人出獨異志髙開道隋末髙開道被箭鏃入骨命一醫工㧞之不得開道問之云畏王痛開道斬之更命一醫云我能㧞之以一小斧子當刺下瘡際用小棒打入骨一寸以鉗㧞之開道飲㗖自若賜醫工絹三百匹後為其將張金樹所殺出獨異志杜伏威隋大業末杜伏威與陳稜戰於齊州裨將射中伏威額怒曰不殺射者終不㧞此箭由是奮入獲所射者乃令㧞箭然後斬首稜乃大敗出獨異志尉遲敬徳王充兄子琬使於竇建徳軍中乘煬帝所御駿馬鎧甲甚鮮太宗曰彼所乘眞良馬也尉遲敬徳請往取之乃與三騎直入賊軍擒琬引其馬以歸賊衆無敢當者敬徳常侍宴慶善宫時有班在其上者敬徳怒曰汝有何功合坐我上任城王道宗次其下解喻之敬徳勃焉拳毆道宗目幾至眇出譚賔錄柴紹弟唐柴紹之弟某有材力輕趫迅捷踊身而上挺然若飛十餘歩乃止太宗令取趙公長孫無忌鞍韀仍先報無忌令其守備其夜見一物如鳥飛入宅内割雙鐙而去追之不及又遣取丹陽公主鏤金函枕飛入内房以手撚土公主面上舉頭即以他枕易之而去至曉乃覺嘗著吉莫靴走上磚城且至女墻手無攀引又以足蹈佛殿柱至簷頭捻椽覆上越百尺樓閣了無障礙太宗竒之曰此人不可處京邑出為外官時人號為壁龍太宗嘗賜長孫無忌七寳𢃄直千金時有大盜叚師子從屋上椽孔間而下露㧞刀謂曰公動即死遂於枕函中取帶去以刀拄地踊身椽孔間出出朝野僉載秦叔寳唐太宗每臨陣望賊中驍將驍士炫燿人馬出入來去者頗病之輒命秦叔寳取之叔寳應命躍馬負槍而進必刺之於萬衆之中人馬俱倒及後叔寳居多疾病謂人曰吾少長戎馬前後所經二百餘陣屢中重瘡計吾出血亦數斛矣何能不病乎出譚賔錄薛仁貴唐太宗征遼東駐蹕于陣薛仁貴著白衣握㦸槖鞬張弓大呼所向披靡太宗謂曰朕不喜得遼東喜得卿也後率兵擊突厥於雲州突厥先問唐將為何曰薛仁貴也突厥曰吾聞薛仁貴流會州死矣安得復生仁貴脱兠鍪見之突厥相視失色下馬羅拜稍遁去出譚賔錄公孫武達唐左武衛大將軍公孫武達有膂力嘗遇賊盡劫其衣物逼武達索靴武達受足與之賊俯就引靴武達毆之死於手下以其兵仗禦餘宼獲免出譚賔錄程知節唐裵行儼與王充戰先馳赴敵為流矢所中墜於地程知節救之殺數人充軍披靡知節乃抱行儼重騎而還為充騎所逐刺槊洞過知節廻身捩折其槊斬獲者與行儼皆免出譚賔錄薛萬徹唐契苾阿力征遼東以騎八百遇賊合戰被槊中腰為賊所窘尚輦奉御薛萬徹單馬入殺賊騎救阿力於羣賊之中與之俱出阿力氣盡束瘡而戰賊乃退出譚賔錄李楷固唐天后時將軍李楷固契丹人也善用䌈索李盡忠之敗也麻仁節張𤣥遇等並被䌈將麞鹿狐兎走馬遮截放索䌈之百無一漏鞍馬上弄弓矢矛矟狀如飛仙天后惜其材不殺用以為將稍貪財好色出為潭州喬口鎭將憤恚而卒也出朝野僉載王君㚟唐王君㚟攝御史中丞判凉州都督事𤣥宗於廣達樓引君㚟及妻夏氏宴設賜金帛夏氏亦勇決每君㚟臨陣夏氏亦有戰功凉州有回紇契苾思結陣四部落為酋長君㚟微時往來凉府為回紇所輕及君㚟為河西節度使回紇等怏怏耻在麾下君㚟奏回紇等部落難制潜有謀叛遂留四部都督後四部落黨與謀叛君㚟以復怨㑹吐蕃間道往突厥君㚟率精騎往肅州掩之還至甘州南鞏筆驛四部落伏兵突起君㚟與賊力戰自朝至晡左右盡死遂殺君㚟出譚賔錄宋令文唐宋令文者有神力禪定寺有牛觸人莫之敢近築圏以闌之令文怪其故遂袒裼而入牛竦角向前令文接兩角㧞之應手而倒頸骨皆折而死又以五指撮碓觜壁上書得四十字詩為太學生以一手挾講堂柱起以同房生衣於柱下壓之許重設酒乃為之出令文有三子長之問有文譽次之愻善書次之悌有勇力之悌後左降朱鳶會賊破驩州以之悌為總管擊之募壯士得八人之悌身長八尺被重甲直前大呌曰獠賊動即死賊七百人一時俱剉大破之出朝野僉載彭博通唐彭博通者河間人也身長八尺曾於講堂堦上臨堦而立取鞋一輛以臂夾令有力者後㧞之鞋底中斷博通脚終不移牛駕車正走博通倒曳車尾却行數十歩横㧞車轍深二尺皆縱横破裂曾游𤓰歩江有急風張帆博通捉尾纜挽之不進出朝野僉載李宏唐定襄公李宏虢王之子身長八尺曽獵遇虎搏之踣而卧虎坐其上奴走馬旁過虎跳攫奴後鞍宏起引弓射之而斃宏及奴一無所傷出朝野僉載辛承嗣唐忠武將軍辛承嗣輕捷曾解鞍絆馬脱衣而卧令一人百歩走馬持鎗而來承嗣鞴馬解絆著衣擐甲上馬盤鎗逆拒刺馬擒人而還承嗣後與將軍元帥奬馳騁一手捉鞍撟雙足直上捺蜻蜓走馬二十里與中郎裴紹業于青海被吐番所圍謂紹業曰將軍相隨共出紹業懼不敢承嗣曰為將軍試之單馬持鎗所向皆靡却迎紹業出承嗣馬被箭乃跳下奪賊壯馬乘之一無所傷裴旻與幽州都督孫佺北征被奚賊所圍旻馬上立走輪刀雷發箭若星流應刀而斷賊不敢取蓬飛而去出朝野僉載太平廣記卷一百九十一
