body:
  text: 太平廣記卷四百宋李昉等編金上金翁仲孺霍光陳爵符堅雩都縣人何文侯遹成弼𤣥金鄒駱駝裴談牛氏僮宇文進蘇遏韋思𤣥李員虞卿道士趙懷正金蛇金上金西方日官之外有山焉其長十餘里廣二三里髙百餘丈皆大黄之金其色殊美不雜土石不生草木上有金人髙五丈餘皆純金名曰金犀入山下一丈有銀又入一丈有錫又入一丈有鉛又入一丈有丹陽銅丹陽銅似金可鍜以作錯塗之器也淮南子術曰餌丹陽之為金也出神異經翁仲孺漢時翁仲孺家貧力作居渭川一旦天雨金十斛於其家於是與王侯爭富今秦中有兩翁世世富出神異經霍光漢宣帝嘗以皂葢車一乘賜大將軍霍光悉以金鉸飾之每夜車轄上有金鳳皇飛去莫知所至曉乃還守車人亦見之南郡黄君仲於北山羅鳥得一小鳳子入手便化成紫金毛羽翅宛然具足可長尺餘守車人列云車轄上鳳皇嘗夜飛去曉則俱還今曉不還恐為人所得光甚異之具以列上後數日君仲詣闕上金鳳皇子帝聞而疑之以置承露盤倐然飛去帝使人尋之直入光家至車轄上乃知信然帝取其車每遊行輒乘之故嵇康遊仙詩云翩翩鳳轄逢此網羅是也出續齊諧記陳爵漢永平十一年廬江皖侯國有胡皖氏小兒曰陳爵陳挺年皆十歲已上相與釣於湖涯挺先釣爵往問挺曰釣寧得乎挺曰得爵歸取竿綸去挺三十步所見湖涯有酒罇色正黄没水爵以為銅也涉取之滑重不能舉挺望見共取之竟不能得又入深淵中流顧見如錢等正黄數百千枚即共掇摭各得滿手走歸示其家爵父國故吏字君賢驚曰安得此爵言其狀君賢曰此黄金也即馳與爵俱往到金處水中尚多賢自涉水掇取爵挺鄰伍並聞俱競採之合得十餘斤賢言於相相言太守遣吏收取遣門下掾裕躬奉獻且言得金状出論衡苻堅前秦苻堅建元五年長安樵人於城南見金鼎走白堅堅遣載取到城化為銅鼎出異苑雩都縣人南康雩都縣跨江南出去縣三里名夢口有穴狀如石室舊傳嘗有神雞色如好金出此穴中奮翼迴翔長鳴響徹見之輒形入穴中因號此石為雞石昔有人耕此山側望見雞出遊戲有一長人操彈彈之雞遙見便飛入穴彈丸正著穴上石徑六尺許下垂蔽穴猶有間隙不復容人又有人乘船從下流還縣未至此崖數里有一人通身黄衣擔兩籠黄𤓰求寄載之黄衣人乞食船主與之盤酒食訖至崖下船主乞𤓰此人不與仍唾盤内徑上崖直入石中船主初甚忿之見其入石始知神異取向食器視之見盤上唾悉是黄金出述異記何文張奮者家巨富後暴衰遂賣宅與黎陽程家程入居死病相繼轉賣與鄴人何文文日暮乃持刀上北堂中梁上坐至二更竟忽見一人長丈餘髙冠黄衣升堂呼問細腰舍中何以有生人氣也答曰無之須臾有一髙冠青衣者次之又有髙冠白衣者問答並如前及將曙文乃下堂中如向法呼之問曰黄衣者誰也曰金也在堂西壁下青衣者誰也曰錢也在堂前井邊五步白衣者誰也曰銀也在牆東北角柱下汝誰也曰我杵也在竈下及曉文按次掘之得金銀各五百斤錢千餘萬仍取杵焚之宅遂清安出列異傳侯遹隋開皇初廣都孝廉侯遹入城至劍門外忽見四廣石皆大如斗遹愛之收藏於書籠負之以驢因歇鞍取看皆化為金遹至城貨之得錢百萬市美妾十餘人大開第宅又近甸置良田别墅後乘春景出遊盡載妓妾隨從下車陳設酒殽忽有一老翁負大笈至坐於席末遹怒而詬之命蒼頭扶出叟不動亦不嗔恚但引滿啖炙而笑云吾比來求君償債耳君昔將我金去不記憶乎盡取遹妓妾十餘人投之書笈亦不覺笈中之窄負之而趨走若飛鳥遹令蒼頭馳逐之斯須已失所在自後遹家日貧却復昔日生計十餘年却歸蜀到劍門又見前者老翁攜所將之妾遊行儐從極多見遹皆大笑問之不言逼之又失所在訪劍門前後並無此人竟不能測也出𤣥怪錄成弼隋末有道者居於太白山煉丹砂合大還成因得道居山數十年有成弼者給侍之道者與居十餘歲而不告以道弼後以家艱辭去道者曰子從我久今復有憂吾無以遺子遺子丹十粒一粒丹化十斤赤銅則黄金矣足以辦葬事弼乃還如言化黄金以足用辦𦵏訖弼有異志復入山見之更求還丹道者不與弼乃持白刃刼之既不得丹則斷道者兩手又不得則刖其足道者顔色不變弼滋怒則斬其頭及解衣肘後有赤嚢開之則丹也弼喜持丹下山忽聞呼弼聲囘顧乃道者也弼大驚而謂弼曰吾不期與至此無得受丹神必誅汝終如吾矣因不見弼多得丹多變黄金金色稍赤優於常金可以服餌家既殷富則為人所告云弼有姦捕得弼自列能成黄金非有他故也唐太宗問之召令造黄金金成帝悅授以五品官敕令造金要盡天下之銅乃以弼造金凡數萬斤而丹盡其金所謂大唐金也百煉益精甚貴之弼既蓻窮而請去太宗令列其方弼實不知方訴之帝謂其詐怒脅之以兵弼猶自列遂為武士斷其手又不言則刖其足弼窘急且述其本末亦不信遂斬之而大唐金遂流用矣後有婆羅門號為别寶帝入庫遍閲婆羅門指金及大毯曰唯此二寶耳問毯有何奇異而謂之寶婆羅門令舒毯於地以水濡之水皆流去毯竟不濕至今外國傳成弼金以為寶貨也出廣異記𤣥金太宗時汾州言青龍白虎吐物在空中有光如火墜地𨼆入二尺掘之得𤣥金廣尺餘髙七尺出酉陽雜俎鄒駱駞鄒駱駞長安人先貧嘗以小車推蒸餅賣之每勝業坊角有伏磚車觸之即翻塵土涴其餅駞苦之乃將钁斸去十餘磚下有瓷甕容五斛許開看有金數斗於是巨富其子昉與蕭佺附馬時人語曰蕭佺附馬子鄒昉駱駞兒非關道徳合只為錢相知出朝野僉載裴談裴談為懷州刺史有樵者入太行山見山穴開有黄金焉可數間屋樵者喜入穴取金得五鋌皆長尺餘因以石窒穴且志之又數日往則迷其處樵者頗諳山谷即於洛城懷州造開石物鎚鑿數車州有崔司户知而助之將往開而談妻有疾請道家奏章請命奏章道士忽傳天帝詔曰帝詔語裴談吾太行山天藏開比有樵夫見之吾已遺金五鋌命其閉塞而愚人貪得重求不獲乃興惡將開吾藏已造鎚鑿數車若開不休或中吾伏藏此若開鎚鑿此州人且死盡深無所益此州崔司户與其同心但詣崔驗之自當有見急止之汝妻疾自當瘳矣談大異之即召崔子問故果符所言乃没其開石具而禁止之妻尋有間出紀聞牛氏僮牛肅曾祖大父皆𦵏河内出家童二戸守之開元二十八年家僮以男小安質於裴氏齒牙為疾晝卧廐中若有告之者曰小安汝何不起但取仙人杖根煮湯含之可以愈疾何忍焉小安驚顧不見人而又寝未久告之如初安曰此豈神告我乎乃行求仙人杖得大叢掘其根根轉壯大入地三尺忽得大磚有銘焉揭磚以下有銅鉢㪷於其中盡黄金鋌丹砂藏其中安不知書既藏金則以磚銘示村人楊之侃留銘示人而不告之銘曰磚下黄金五百兩至開元二十八年五月十八日有下賊胡人年二十二姓史者得之澤州城北二十五里白浮圗之南亦二十五里有金五百兩亦此人得之諸人既見銘道路諠聞於裴氏子問小安且諱執鞭之終不言於是拷訊萬端不對拘而閉諸室會有畫工來訪小安市丹砂焉裴氏子誘問之畫工具言其得金所以又曰吾昨於人處用錢一百市砂一斤砂既精好故來更市張氏益信得金召小安以畫工示之安曰掘得銘後下得數金丹砂今無遺矣金寶不得則又加箠笞治之卒不言夜中亡去會裴氏蒼頭自太原赴河内遇小安於澤州小安邀至市酒飲酣招去意者小安便取澤之金乎及蒼頭至裴言之方悟出紀錄宇文進夏縣令宇文泰猶子進嘗於田間得一崑崙子洗拭之乃黄金也因寶持之數載後財貨充溢家族蕃昌後一夕失之而産業耗敗矣出紀聞蘇遏天寶中長安永樂里有一凶宅居者皆破後無復人住暫至亦不過宿而卒遂至廢破其舍宇唯堂㕔存因生草樹甚多有扶風蘇遏悾悾遽苦貧窮知之乃以賤價於本主質之纔立契書未有一錢歸主至夕乃自攜一榻當堂鋪設而寢一更已後未寢出於堂徬徨而行忽見東牆下有一赤物如人形無手足表裏通徹光明而呌曰咄遏視之不動良久又按聲呼曰爛木咄西牆下有物應曰諾問曰甚没人曰不知又曰大硬鏘爛木對曰可畏良久乃失赤物所在遏下階中庭呼爛木曰金精合屬我緣没敢呌喚對曰不知遏又問承前殺害人者在何處爛木曰更無别物只是金精人福自薄不合居之遂喪逝亦不曾殺傷耳至明更無事遏乃自假鍬鍤之徒先於西牆下掘入地三尺見一朽柱當心木如血色其堅如石後又於東牆下掘兩日近一丈方見一方石濶一丈四寸長一丈八寸上以書曰夏天子紫金三十斤賜有徳者遏乃自思我何以為徳又自為計曰我得此寶然脩徳亦可禳之沈吟未決至夜又歎息不定其爛木忽語曰何不改名為有徳即可矣遏曰善遂稱有徳爛木曰君子倘能送某於昆明池中自是不復撓於人矣有徳許之明晨更掘丈餘得一鐵甕開之得紫金三十斤有徳乃還宅價脩葺送爛木於昆明池遂閉戸讀書三年為范陽請入幕七年内獲冀州刺史其宅更無事出博異志韋思𤣥寶應中有京兆韋思𤣥僑居洛陽性尚奇嘗慕神仙之術後遊嵩山有道士教曰夫餌金液者可以延壽吾子當先學煉金如是則可以肩赤松駕廣成矣思𤣥於是求煉金之術積十年遇術士數百終不能得其妙後一日有居士辛銳者貌甚清瘦偢然有寒色衣弊裘叩思𤣥門謂思𤣥曰吾病亡窮無所歸聞先生好古尚奇集天下異人方士我故來謁耳願先生納之思𤣥即止居士於舍其後居士身疾􅌜盡潰血且甚韋氏一家盡惡之思𤣥嘗召術士數人會食而居士不得預既具膳居士突至客前溺於筵席上盡濕客怒皆起韋氏家僮亦競來罵之居士遂告去行至庭忽亡所見思𤣥與諸客甚異之因視其溺乃紫金也奇光璨然眞曠代之寶思𤣥且驚且歎有解者曰居士紫金精也徵其名氏信矣且辛者葢西方庚辛金也而鋭字兌從金兌亦西方之正位推其義則吾之解若合符然出宣室志李員進士李員河東人也居長安延夀里元和初夏一夕員獨處其室方偃於榻寐未熟忽聞室之西隅有微聲纎而遠鏘然若韻金石樂如是久不絶俄而有歌者其音極清越泠泠然又久不已員竊誌其歌詞曰色分藍葉青聲比磬中鳴七月初七日吾當示汝形歌竟其音闋員且驚且異朝日命家僮窮其跡不能得焉是夕員方獨處又聞其聲悽越且久亦歌如前詞竟員心知為怪也黙然異之如是凡數夕亦聞焉後至秋始六日夜有甚雨隤其堂之北垣明日垣北又聞其聲員驚而視之於北垣下得一缶僅尺餘制用金成形狀奇古與今之缶甚異苔翳其光𨼆然有文視不可見葢千百年之器也叩之則其韻極長即命洗去塵蘚方可讀之字皆小書乃崔子玉座右銘也員得而異之然竟不知何代所製也出宣室志虞鄉道士虞鄉有山觀甚幽寂有滌陽道士居焉大和中道士嘗一夕獨登壇望見庭忽有異光自井中發俄有一物其狀若兎其色若精金隨光而出環繞醮壇久之復入於井自是每夕輒見道士異其事不敢告於人後因淘井得一金兎甚小奇光爛然即置於巾箱中時御史李戎職於蒲津與道士友善道士因以遺之其後戎自奉先縣令為忻州刺史其金兎忽亡去後月餘而戎卒闕趙懷正汴州百姓趙懷正住光徳坊大和三年妻賀常以女工致一日有人攜石枕求售賀一環獲焉趙夜枕之覺枕中如風雨聲因令妻及子各枕一夕則無所覺趙枕輒復舊或喧悸不得眠其子請碎視之趙言脫碎之無所見是棄一百之利也待我死後爾必破之經歲餘趙病死妻令毁視之中有金銀各一鋌如模鑄者所函鋌處其模似預曾勘入無絲髪隙不知從何而入也鋌各長三寸餘濶如巨指遂貨之辦其殮及償債不餘一錢賀今住洛惠節坊段成式家人雇其紉針親見其説出酉陽雜俎金蛇開成初宫中有黄色蛇夜則自寶庫中出遊於階陛間光明照燿不可擒獲宫人擲珊瑚玦以繫之遂并玦亡去掌庫者具以事告上命遍搜庫内得黄金蛇而玦貫其首上熟視之昔隋煬帝為晉王時以黄金蛇贈陳夫人后今不知此蛇得自何處左右因視額下有阿𡡉字上蹶然曰果不失朕所疑阿𡡉即煬帝小字也上之博學敏悟率多此𩔖遂命取玻璃連環係蛇於玉彘之前足其後竟不復有所見以彘食蛇也出杜陽編太平廣記卷四百
