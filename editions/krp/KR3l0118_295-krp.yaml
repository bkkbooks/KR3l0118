body:
  text: 太平廣記卷二百九十五神五王僧䖍陳悝宫亭廟安世高曲阿神謝奐李滔樹伯道侯褚盧循陳臣張舒蕭惠明柳積趙文昭河伯邵敬伯吳興人劉子卿王僧䖍宋王僧䖍秉政使從事宗寶統作長沙城忽見一傳教官語曰君何敢壞吾宫室司命官相誅尋時宗寶乃墜馬其夜僧䖍夢見一貴人來通賔從鮮盛語僧䖍曰吾是長沙王吳君此所居之處公何意苦我若爲我速料理當位至三公僧䖍於是立廟自後祈禱無不應出湘中記陳悝隆安中丹徒民陳悝於江邊作魚簄潮去於簄中得一女長六尺有容色無衣裳水去不能動卧沙中與語不應有一人就姦之悝夜夢云我江神也昨失路落君簄中小人辱我今當白尊神殺之悝不敢歸得潮來自逐水而去姦者尋亦病死矣出洽聞記宫亭廟南康宫亭廟殊有神驗晉孝武世有一沙門至廟神像見之淚出交流因標姓字則是昔友也自説我罪深能見濟脱不沙門即爲齋戒誦經語曰我欲見卿眞形神云禀形甚醜不可出也沙門苦請遂化爲蛇身長數丈垂頭梁上一心聽經目中血出至七日七夜蛇死廟亦歇絶出幽明録安世高安侯世高者安息國王子與大長者共出家學道舍衛城值主不稱大長者子輒恚世高恒呵戒之周旋二十八年云當至廣州值亂有一人逢高唾手拔刀曰眞得汝矣高大笑曰我宿命負對故遠來相償遂殺之有一少年云此遠國異人而能作吾國言受害無難色將是神人乎衆皆駭笑世高神識還生安息國復爲王作子名高安侯年二十復辭王學道十數年語同學云當詣會稽畢對過廬山訪知識遂過廣州見年少尚在徑投其家與説昔事大欣喜便隨至會稽過稽山廟呼神共語廟神蟒形身長數丈淚出世高向之語蟒便去世高亦還船有一少年上船長跪前受呪願因遂不見謂廣州客曰向少年即廟神得離惡形矣云廟神即是宿長者子後廟祝聞有臭氣見大蟒死廟從此神歇前至會稽入市門值有相打者誤中世高頭即卒廣州客遂事佛精進出幽明錄曲阿神曲阿當大埭下有廟晉孝武世有一逸劫官司十人追之劫逕至廟跪請求救許上一豬因不覺忽在牀下追者至覓不見羣吏悉見入門又無出處因請曰若得劫者當上大牛少時劫形見吏即縛將去劫因云神靈已見過度云何有牛猪之異而乖前福言未絶口覺神像面色有異既出門有大虎張口而來逕奪取劫銜以去出神鬼𫝊謝奐青谿小姑廟云是蔣侯第三妹廟中有大榖扶疎鳥常産育其上太元中謝慶彈殺數頭即覺體中慄然至夜夢一女子衣裳楚楚怒云此鳥是我所養何故見侵經日謝卒慶名奐靈運父也出異苑李滔吳郡桐廬有徐君廟吳時所立左右有爲劫盜非法者便如拘縳終致討執東陽長山吏李滔以義熙中遭事在都婦自出料理過廟請乞恩拔銀釵爲願未至富陽有魚跳落婦前剖腹還得所願釵夫事尋散出異苑樹伯道餘杭縣有仇王廟由來多神異隆安初縣人樹伯道爲吏得假將歸於汝南灣覓載見一朱舸中有貴人因求寄須臾如睡猶聞有聲若劇甚雨俄而至家以問船工亦云仇王也伯道拜謝而還出異苑侯禇郯縣西鄉有楊郎廟縣有一人先事之後就祭酒侯禇求入大道遇譙郡樓無隴詣禇共至祠舍燒神坐器服無隴乞將一扇經歲無隴聞有乘馬人呼樓無隴數四聲云汝故不還楊明府扇耶言畢迴騎如去隴遂得瘻病而死出異苑盧循義熙四年盧循在廣州陰規逆謀潛遣人到南康廟祈請既奠牲奏鼓使者獨見一人武冠朱衣中筵而坐曰盧征虜若起事至此當以水相送六年春循遂率衆直造長沙遣徐道覆踰嶺至南康裝艦十二艟樓十餘丈舟裝始辦大雨一日一夜水起四丈道覆凌波而下與循會巴陵至都而循戰敗不意神速其誅洪潦之降使之自送也出述異記陳臣臨川陳臣家大富永初元年臣在齋中坐其宅内有一町筋竹白日忽見一人長丈許靣如方相從竹中出逕語陳臣我在家多年汝不知今去當令汝知之去一月許日家大失火奴婢頓死一年中便大貧出搜神記張舒長山張舒以元嘉九年二月二十四日奄見一人著朱衣平上幘手捉青柄馬鞭云汝可教便隨我去見素絲繩繫長梯來下舒上梯仍造大城綺堂洞室地如黄金有一人長大不巾幘獨坐絳紗帳中語舒曰主者誤取汝賜汝祕術卜占勿貪錢賄舒亦不覺受之出異苑蕭惠明宋蕭惠明爲吳興太守郡界有卞山山下有項羽廟相承云羽多居郡㕔事前後太守不敢上㕔惠明謂綱紀曰孔季㳟曾爲此郡未聞有災遂命盛設筵榻未㡬惠明忽見一人長丈餘張弓挾矢向之既而不見因發背旬日殞出異苑栁積栁積字徳封勤苦爲學夜燃木葉以代燈中夕聞窗外有呼者積出見之有五六人各負一囊傾於屋下如榆莢語曰與君爲書糧勿憂業不成明旦視之皆漢古錢計得百二十千乃終其業宋明帝時官至太子舍人出獨異志趙文昭宋文帝元嘉三年八月吳郡趙文昭字子業爲東宫侍講宅在清溪橋北與吏部尚書王叔卿隔牆南北嘗秋夜對月臨溪唱烏棲之詞音㫖閒怨忽有一女子衣青羅之衣絶美云王尚書小娘子欲來訪君文昭問其何以答曰小娘子聞君謌詠有怨曠之心著清凉之恨故來願薦枕席言訖而至姿容絶世文昭迷悞恍惚盡忘他志乃揖而歸從容密室命酒陳筵逓相謌送然後就寢至曉請去女解金纓留别文昭答琉璃盞後數夜文昭思之不已偶遊清溪神廟忽見所與琉璃盞在神女之後及顧其神與畫侍女並是同宿者出八朝窮怪録河伯餘杭縣南有上湖湖中央作塘有一人乘馬看戲將三四人至岑村飲酒小醉暮還時炎熱因下馬入水中枕石眠馬斷走歸從人悉追馬至暮不返眠覺日已向晡不見人馬見一婦來年可十六七云女郎再拜日既向暮此間大可畏君作何計問女郎姓何那得忽相聞復有一年少年十三四甚了了乘新車車後二十人至呼上車云大人暫欲相見因迴車而去道中絡繹把火見城郭邑居既入城進㕔事有信幡題云河伯俄見一人年三十許顔色如畫侍衛繁多相對欣然敕行酒炙云僕有小女頗聰明欲以給君箕箒此人知神不敢拒逆便敕備辦令就郎中㛰承白已辦遂絲布單衣紗及袷絹裙紗衫褌履屐皆精好又給十小吏青衣數十人婦年可十八九姿容婉媚便成三日經大會客拜閣四日云禮既有限當發遣去婦以金甌麝香囊與壻别涕泣而分又與錢十萬藥方三卷云可以施功布徳復云十年當相迎此人歸家遂不肯别㛰辭親出家作道人所得三卷方一卷脉經一卷湯方一卷丸方周行救療皆致神驗後母老兄䘮因還㛰宦出幽明録邵敬伯平原縣西十里舊有社林南燕太上時有邵敬伯者家於長白山有人寄敬伯一函書言我吳江使也令吾通問於齊伯吾今須過長白幸君爲通之仍教敬伯但至社林中取樹葉投之於水當有人出敬伯從之果見人引入伯懼水其人令敬伯閉目似入水中豁然宫殿宏麗見一翁年可八九十坐水精牀發函開書曰裕興超滅侍衛者皆圓眼具甲胄敬伯辭出以刀子贈敬伯曰好去但持此刀當無水厄矣敬伯出還至社林中而衣裘初無沾濕果其年宋武帝滅燕敬伯三年居兩河間夜中忽大水舉村俱没唯敬伯坐一塌牀至曉著岸敬伯下看之牀乃是一大黿也敬伯死刀子亦失世𫝊社林下有河伯家出酉陽雜爼吳興人晉隆安中吳興有人年可二十自號聖公姓謝死已百年忽詣陳氏宅言是己舊宅可見還不爾燒汝一夕大火發盡因有鳥毛揷地繞宅周匝數重百姓乃起廟出酉陽雜俎劉子卿宋劉子卿徐州人也居廬山虎溪少好學篤志無倦常慕幽閒以爲養性恒愛花種樹其江南花木溪庭無不植者文帝元嘉三年春臨翫之際忽見雙蝶五彩分明來游花上其大如鷰一日中或三四往復子卿亦訝其大九旬有三日月朗風清歌吟之際忽聞扣扄有女子語笑之音子卿異之謂左右曰我居此溪五歲人尚無能知何有女子而詣我乎此必有異乃出户見二女各十六七衣服霞煥容止甚都謂子卿曰君常怪花間之物感君之愛故來相詣未度君子心若何子卿延之坐謂二女曰居止僻陋無酒叙情有慙於此一女曰此來之意豈求酒耶况山月已斜夜將垂曉君子豈有意乎子卿曰鄙夫唯有茅齋願申繾綣二女東向坐者笑謂西坐者曰今宵譲姊餘夜可知因起送子卿之室入謂子卿曰郎閉户雙棲同衾並枕來夜之歡願同今夕及曉女乃請去子卿曰幸遂繾綣復更來乎一夕之歡反生深恨女撫子卿背曰且女妹之期後即次我請出户女曰心存意在特望不憂出户不知蹤跡是夕二女又至宴如前姊謂妹曰我且去矣昨夜之歡今留與汝汝勿貪多誤少惑劉郎言訖大笑乘風而去於是同寢卿問女曰我知卿二人非人間之有願知之女曰但得佳妻何勞執問乃撫子卿曰郎但申情愛莫問閒事臨曉將去謂卿曰我姊實非人間之人亦非山精物魅若説於郎郎必異𫝊故不欲取笑於人代今者因郎契合亦是因縁慎跡藏心無使人曉即姊妹每旬更至以慰郎心乃去常十日一至如是數年會寢後子卿遇亂歸鄉二女遂絶廬山有康王廟去所居二十里餘子卿一日訪之見廟中泥塑二女神幷壁畫二侍者容貌依稀有如前遇疑此是之出八朝窮怪録太平廣記卷二百九十五
