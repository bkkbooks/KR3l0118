body:
  text: 太平廣記卷二十三神仙二十三王逺知益州老父崔生馮俊呂生張李二公王逺知道士王逺知本瑯琊人也父曇選除揚州刺史逺知母駕部郎中丁超女也常夢彩雲靈鳯集其身上因而有娠又聞腹中聲沙門寳誌謂曇選曰生子當為神仙宗伯逺知少聰敏博綜羣書初入茅山師事陶𢎞景傅其道法及隋煬帝為晉王鎮揚州起玉清𤣥壇邀逺知主之使王子相柳顧言相次召之逺知遂來謁見斯須而鬚髪變白晉王懼而遣之少選又復其舊唐髙祖之龍潛逺知嘗密陳符命武徳中秦王世民與幕屬房𤣥齡微服以謁逺知逺知迎謂曰此中有聖人得非秦王乎太宗因以實告逺知曰方作太平天子願自愛也太宗登極將加重位固請歸山貞觀九年潤州茅山置太平觀并度二七人降璽書慰勉之後謂弟子潘師正曰見仙格以吾小時誤損一童子吻不得白日昇天今見召為少室山伯將行在即翌日沐浴加冠衣焚香而卒年一百二十六歳謚曰昇𤣥先生云出談賔錄益州老父唐則天末年益州有一老父擕一藥壺於城中賣藥得錢即轉濟貧乏自常不食時即飲浄水如此經歳餘百姓賴之有疾得藥者無不愈時或自遊江岸凝眸永日又或登髙引領不語竟日每遇有識者必告之曰夫人一身便如一國也人之心即帝王也傍列臟腑即内輔也外張九竅即外臣也故心有病則内外不可救之又何異君亂于上臣下不可正之哉但凡欲身之無病必須先正其心不使亂求不使狂思不使嗜慾不使迷惑則心先無病心先無病則内輔之臟腑雖有病不難療也外之九竅亦無由受病矣况藥亦有君臣有佐有使茍或攻其病君先臣次然後用佐用使自然合其宜如以佐之藥用之以使使之藥用之以佐小不當其用必自亂也又何能攻人之病哉此又象國家治人也老夫用藥常以此為念每遇人一身君不君臣不臣使九竅之斜悉納其病以至於良醫自逃名藥不效猶不知治身之病後時矣悲夫士君子記之忽一日獨詣錦川解衣浄浴探壺中惟選一丸藥自吞之謂衆人曰老夫罪已滿矣今却歸島上俄化一白鶴飛去衣與藥壺並沒於水永尋不見出瀟湘錄崔生進士崔偉嘗遊青城山乘驢歇鞍收放無僕使驢走趂不及約行二十餘里至一洞口已昬黑驢復走入崔生畏懼兼困遂寢及曉覺洞中微明遂入去又十里出洞門望見草樹巖壑悉非人間所有金城綘闕被甲者數百見生呵問答曰塵俗賤士願謁仙翁守吏趨報良久召見一人居玉殿披羽衣身可長丈餘鬂髪皓素侍女滿側皆有所執延生上殿與語甚喜留宿酒饌備極珍豐明日謂生曰此非人世乃仙府也驢走益逺予之奉邀某惟一女願事君子此亦㝠數前定不可免也生拜謝顧左右令將青合來取藥兩丸與生服訖覺腑臟清瑩逡廵摩搔皮若蟬蜕視鏡如嬰孩之貌至夕有霓旌羽蓋仙樂步虛與妻相見真人空際皆以崔郎為戲每朔望仙伯乘鶴上朝蘂宫云某階品尚以卑末得在天真之列必與崔生别翩翻於雲漢之内歳餘嬉遊佚樂無所比因問曰某血屬要與一訣非有戀著也請畧暫囘仙翁曰不得淹留譴罪極大與符一道云恐遭禍患此可隱形然慎不得遊宫禁中臨别更與符一道云甚急即開却令取所乘驢付之到京都試往人家皆不見便入苑囿大内㑹劒南進太真妃生日錦繡乃竊其尤者以翫上曰晝日賊無計至此乃召羅公逺作法訖持朱書照之寢殿戸外後果得具本末上不信令笞死忽記仙翁臨行之符遽發公逺與捉者皆僵仆良久能起即啓𤣥宗曰此已居上界殺之必不得假使得之臣軰便受禍亦非國家之福𤣥宗乃釋之親召與語曰汝莫妄居遂令百人具兵仗同衛士同送且覘其故却至洞口復見金城綘闕仙伯嚴侍衛出門呼曰崔郎不記吾言幾至顛躓崔生拜訖將前送者亦欲隨至仙翁以杖畫成澗深濶各數丈令召崔生妻至擲一領巾過作五色綵橋遣生登隨步即滅既度崔生回首曰即如此可以歸矣須臾雲霧四起咫尺不見唯聞鸞鶴笙歌之聲半日方散遥望惟空山而已不復有物也出逸史馮俊唐貞元初廣陵人馮俊以傭工資生多力而愚直故易售常遇一道士於市買藥置一囊重百餘斤募能獨負者當倍酬其直俊乃請行至六合約酬一千文至彼取資俊乃歸告其妻而後從之道士云從我行不必直至六合今欲從水路往彼得舟且隨我舟行亦不減汝直俊從之遂入小舟舟人與俊并道士共載出江口數里道士曰無風上水不可至吾施小術令二人皆伏舟中道士獨在船上引帆持檝二人在舟中聞風浪聲度其船如在空中懼不敢動數食頃遂令開船召出至一處平湖𣺌然前對山嶺重疊舟人久之方悟乃是南湖廬山下星子灣也道士上岸令俊負藥船人即付船價舟人敬懼不受道士曰知汝是潯陽人要當時至以此便相假豈為辭耶舟人遂拜受之而去實江州人也遂引俊負藥於亂石間行五六里將至山下有一大石方數丈道士以小石扣之數十下大石分為二有一童出於石間喜曰尊師歸也道士遂引俊入石穴初甚峻下十丈餘旁行漸寛平入數十歩其中洞明有大石堂道士數十奕棊戲笑見道士皆曰何晚也敕俊捨藥命左右速遣來人歸前道士命左右曰擔人甚饑與之飯食遂於瓷甌盛胡麻飯與之食又與一碗漿甘滑如乳不知何物也道士遂送俊出謂曰勞汝逺來少有遺汝授與錢一千文令繫腰下至家解觀之自當有異耳又問家有幾口云妻兒五口授以丹藥可百餘粒曰日食一粒可百日不食俊辭曰此歸路逺何由可知道士曰與汝圖之遂引行亂石間見一石卧如虎狀令俊騎上以物蒙石頭俊執其末如執轡焉誡令閉目候足著地即開俊如言騎石道士以鞭鞭石遂覺此石舉在空中而飛時已向晚如炊久覺足躡地開目已在廣陵郭門矣人家方始舉燭比至舎妻兒猶驚其速遂解腰下皆金錢也自此不復為人傭工廣置田園為富民焉里人皆疑為盗也後他處有盗發里人意俊同之遂縶以詣府時節使杜公亞重藥術好竒説聞俊言遂命取其金丹丹至亞手如墜地焉而失之兼言郭外所乘之石猶在遂捨之亞由是精意於道頗好燒煉竟無所成俊後夀終子孫至富焉出原仙記呂生虞鄉永樂等縣連接其中道者往往而遇有呂生者居二邑間為童兒時不欲聞食氣因上山自斸黄精煮服之十年之後并餌生者俗饌並不進日覺輕徤耐風寒行若飄風見文字及人語更不忘母令讀書遂欲應明經日念數卷實非用功也自不忘耳後母逼令飱飯不肯與諸妹旦夕勸解悉不從因於酒中置猪脂自捧以飲之曰我老矣况酒道家不禁呂曰某自小不知味實進不得乃逼於口鼻噓吸之際一物自口中落長二寸餘衆共視之乃黄金人子也呂生乃僵卧不起惟言困憊其妹以香湯洗之結於呂衣帶中移時方起先是呂生年雖近六十鬚髪漆黑及是皓首母始悔之却取金人結處如舊已不見之矣呂生恨惋垂泣再拜母出門去云往茅山更無其蹤出逸史張李二公唐開元中有張李二公同志相與於泰山學道久之李以皇枝思仕宦辭而歸張曰人各有志為官其君志也何怍焉天寳末李仕至大理丞屬安祿山之亂擕其家累自武關出而歸襄陽寓居尋奉使至揚州途覯張子衣服滓弊佯若自失李氏有哀恤之意求與同宿張曰我主人頗有生計邀李同去既至門庭宏壯儐從璀璨狀若貴人李甚愕之曰焉得如此張戒無言且為所笑既而極備珍膳食畢命諸雜伎女樂五人悉持本樂中有持筝者酷似李之妻李視之尤切飲中而凝睇者數四張問其故李指筝者是似吾室能不眷眷張曰天下有相似人及將散張呼持筝婦以林檎繫裙帶上然後使回去謂李曰君欲幾多錢而遂其願李云得三百千當辦已事張有故席帽謂李曰可持此詣藥鋪問王老家張三令持此取三百千貫錢彼當與君也遂各散去明日李至其門亭館荒穢扃鑰久閉至復無有人行蹤乃詢傍舎求張三隣人曰此劉道𤣥宅也十餘年無居者李嘆訝良久遂持帽詣王家求錢王老令送帽問家人其女審是張老帽否云前所綴綠線猶在李問張是何人王云是五十年前來茯苓主顧今有三千餘貫錢在藥行中李領錢而回重求終不見矣尋還襄陽試索其妻裙帶上果得林檎問其故云昨夕夢見五六人追云是張仙喚搊筝臨别以林檎繫裙帶上方知張已得仙矣出廣異記太平廣記卷二十三
