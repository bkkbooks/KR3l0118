body:
  text: 太平廣記卷三十三神仙三十三韋弇申元之馬自然張巨君韋弇韋弇字景照開元中舉進士下第遊蜀時將春暮勝景尚多與其友尋花訪異日為遊宴忽一旦有請者曰郡南十里許有鄭氏林亭花卉方茂有出塵之勝願偕遊焉弇喜遂與俱果南十里得鄭氏亭焉端室巍巍横然四峙山門花闢曲徑烟矗眙而望之不暇他視真塵外景也俄而延弇升巨亭之上廻廊環構飾以珠玉殆非人世所有即引見仙子十數左右侍衞華裾靚粧亦非常世所覩中有一人與弇語弇遍拜且詰之美人曰聞吾子西遊蜀都厯訪佳景春煦將盡花卉芳妍願聊奉一醉無以延欵為疑也既坐即張樂飲酒其陳設餚膳竒味珍果既非世之所嘗金石絲竹雅音清唱又非世之所聞弇乘間問曰某自上國厯二京至于帝宅尊嚴侯家繁盛莫不見之今之所覩固不可偕矣然女郎何為若此之貴耶美人曰余非人間人此蓋玉清仙府也適欲奉召假以鄭氏之亭耳余有新曲名曰紫雲今天子奉尚神仙之道余以此樂授于吾子而貢於聖唐之君以此相託可乎弇曰某一儒生耳在長安中區區於九陌以干一名望天子門不可見又非知音者若將貢新曲固不可為也美人曰君既不能余當寓夢而授於天子然子已至此亦道分使然願以三寳為贈子其售之可畢世之富也飲畢命侍者出一杯謂之碧瑤盃光瑩洞徹又出一枕謂之紅㽔枕似玉而粟其文微紅而光彩瑩朗又出一紫玉函似布光彩甚於玉俱授於弇拜而謝之即别去行未及一里廻顧失向亭臺但荒榛而已遂挈寳入長安明年復下第東遊廣陵胡商詣弇以訪其寳出而示之胡人拜而言曰此玉清真人之寳千萬年人無見者信天下之竒貨矣以數十萬金易而求之弇以大富因築室江都竟不求聞達亦不知所終焉後數年𤣥宗夢神仙十餘人持樂器集於庭奏曲以授請為中原正始之音曲名紫雲既晨興即以玉笛吹而習之傳於樂府此乃符弇之所遇欲使弇上奏之曲也出神仙感遇傳申元之申元之不知何許人也遊厯名山博採方術有修真度世之志開元中徵至止開元觀恩渥愈厚時又有邢和璞羅公逺葉法善吳筠尹愔何思達史崇尹崇祕希言佐佑𤣥風翼戴聖主清淨無為之教昭灼萬㝢雖漢武元魏之崇道未足比方也帝遊溫泉幸東洛元之常扈從焉時善譚𤣥虚之㫖或留連論道動移晷刻惟貴妃與趙雲容宫嬪三五人同侍宸御得聆其事命趙雲容侍茶藥元之愍其恭恪乘間乞藥少希延生元之曰我無所惜但爾不久處世耳懇拜乞之不已曰朝聞道夕死可矣况侍奉大仙不得度世如素手出于寳窟也惟天師哀之元之念其志切與綘雪丹一粒曰汝服此丹死必不壞可大其棺廣其穴含以真玉疎而有風魂不蕩散魄不潰壞百年後還得復生此太隂鍊形之道即為地仙復百年遷居洞天矣雲容從幸東都病於蘭昌宫貴妃憐之因以此事白於貴妃及卒後宦者徐𤣥造如其所請而瘞之元和末百年矣容果再生元之尚來往人間自號田先生識者云元之魏時人已數百嵗矣出仙傳拾遺馬自然馬湘字自然杭州鹽官人也世為縣小吏而湘獨好經史攻文學治道術遍遊天下後歸江南而嘗醉於湖州墜霅溪經日方出衣不沾濕坐於水上而言曰適為項羽相召飲酒欲大醉方返溪濱觀者如堵酒氣猶衝人狀若風狂路人多隨看之又時復以拳入鼻及出拳鼻如故又指溪水令逆流食頃指栁樹令隨溪水來去指橋令斷復續後遊常州㑹唐宰相馬植謫官量移常州刺史素聞湘名乃邀相見延禮甚異之植問曰幸與道兄同姓欲為兄弟冀師道術可乎湘曰相公何望植曰扶風湘曰相公扶風馬湘則風馬牛但且相知無徵同姓亦言與植風馬牛不相及也植留之郡齋益敬之或飲食次植請見小術乃於席上以甆器盛土種𤓰須臾引蔓生花結實取食衆賓皆稱香美異於常𤓰又於遍身及襪上摸錢所出錢不知多少擲之皆青銅錢撒投井中呼之一一飛出人有收取頃之復失又植言此城中鼠極多湘書一符令人帖於南壁下以筯擊盤長嘯鼠成羣而來走就符下俯伏湘乃呼鼠有一大者近堦前湘曰汝毛蟲微物天與粒食何得穿墻穴屋晝夜擾於相公且以慈憫為心未能盡殺汝宜便相率離此大鼠乃廻羣鼠皆前若叩搕謝罪遂作隊莫知其數出城門去自後城内更絶鼠後南遊越州經洞巖禪院僧三百方齋而湘與婺州永康縣牧馬巖道士王知微及弟子王延叟同行僧見湘單僑箕踞而食畧無揖者但資以飯湘不食促知微延叟急食而去僧齋未畢及出門又促速行到諸暨縣南店中約去禪院七十餘里深夜聞尋道士聲主人遽應此有三人外面極喜請於主人願見道士及入乃二僧但禮拜哀鳴云禪僧不識道者昨失迎奉致貽譴責三百僧到今下床不得某二僧主事不坐所以得來固乞舍之湘唯睡而不對知微延叟但笑之僧愈哀乞湘乃曰此後無以輕慢為意廻去入門坐僧當能下床僧廻果如其言湘翌日又南行時方春見一家好菘菜求之不能得仍聞惡言命延叟取紙筆知微遂言求菜見阻誠無訟理况在道門詎宜施之湘笑曰我非訟者也作小戲耳於是延叟授紙筆湘畫一白鷺以水噀之飛入菜畦中啄菜其主趕起又飛下再三湘又畫一猧子走趕捉白鷺共踐其菜一時碎盡止其主見道士嘻笑曾求菜至此慮復為他術遂來哀乞湘曰非求菜也故相戲耳於是呼鷺及犬皆飛走投入湘懷中視菜如故悉無所損又南逰霍桐山入長溪縣界夜投旅舍宿舍少而行旅已多主人戲言無宿處道士能壁上睡即相容已逼日暮知微延叟切於止宿湘曰爾但於俗旅中睡而湘躍身梁上以一脚掛梁倒睡適主人夜起燭火照見大驚異湘曰梁上猶能壁上何難俄而入壁久之不出主人拜謝移知微延叟入家内淨處安宿及旦主人留連忽失所在知微延叟前行數里尋求已在路傍自霍桐廻永康縣東天寳觀駐泊觀有大枯松湘指之曰此松已三千餘年即化為石自後松果化為石忽大風雷震石倒山側作數截㑹楊發自廣州節度責授婺州發性尚竒異乃徙兩截就郡齋兩截致之龍興寺九松院各髙六七尺徑三尺餘其石松皮鱗皴今猶存焉或人有疾吿者湘無藥但以竹拄杖打痛處腹内及身上百病以竹杖指之口吹杖頭如雷鳴便愈有患腰脚駞曲拄杖而來者亦以竹拄杖打之令放拄杖應手便伸展時有以財帛與湘者推讓不受固與之復散與貧人所逰行處或宫觀巖洞多題詩句所登杭州秦望山詩曰太乙初分何處尋空留厯數變人心九天日月移朝暮萬里山川換古今風動水光吞逺嶠雨添嵐氣沒髙林秦皇謾作驅山計滄海茫茫轉更深復歸故鄉省兄適兄出嫂姪喜叔歸湘吿曰我與兄共此宅歸來要分此地我唯愛東園耳嫂異之曰小叔久離家歸來兄猶未相面何言分地骨肉之情必不忍如此駐留三日嫂姪訝不食但飲酒而已待兄不歸及夜遽卒明日兄歸問其故妻子皆以實對兄感慟乃曰弟學道多年非歸要分宅是歸託化於我以絶思望耳乃棺斂其夕棺輷然有聲一家驚異乃窀穸於園中時大中十年也明年東川奏劍州梓桐縣道士馬自然白日上昇湘於東川謂人曰我鹽官人也勅浙西道杭州覆視之發塜視棺乃一竹枝而已出續仙傳張巨君張巨君者不知何許人也時有許季山得病不愈清齋祭泰山請命晝夜祈訴忽有神人來問曰汝是何人何事苦吿幽㝠天使我來問汝可以實對季山曰僕是東南平輿許季山抱病三年不知罪之所在故到靈山請決死生神人曰我是仙人張巨君吾有易道可以知汝禍祟所從季山因再拜請曰幸神仙迂降願垂吿示巨君為筮卦遇震之恒初九六二六三三爻有變巨君曰汝是無狀之人病安得愈季山曰願為發之巨君曰汝曾將客行為父報讐於道殺客納空井中大石蓋其上此人訴天府以此病謫汝者季山曰實有此罪巨君曰何爾耶季山曰父昔為人所搏耻蒙此以終身時與客報之未至客欲吿怨主所以害之巨君曰㝠理難欺汝自勤修吾還山請命季山漸愈巨君傳季山筮季山遂善於易但不知求巨君度世之方惜哉出洞仙傳太平廣記卷三十三
