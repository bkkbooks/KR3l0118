body:
  text: 太平廣記卷二百九十四神四王祐温嶠戴文諶黃石公袁雙商康賈充王文度徐長陳緒白道猷高雅之羅根生沈縱戴氏女孫盛湛滿竺曇遂武曾晉孝武帝藺啓之王猛封驅之王祐散騎侍郎王祐疾困與母辭訣既而聞有通賔者曰某郡某里某人嘗爲别駕祐亦雅聞其姓字有頃奄然來至曰與卿士𩔖有自然之分又州里情便欵然今年國家有大事出三將軍分布徵發吾等十餘人爲趙公明府參佐至此倉卒見卿有高門大屋故來投與卿相得大不可言祐知其鬼神曰不幸篤疾死在旦夕遭卿以性命相託答曰人生有死此必然之事死者不繫生時貴賤吾今見領兵千人須卿得度簿相付如此地難得不宜辭之祐曰老母年高兄弟無有一旦死亡前無供養遂歔欷不能自勝其人愴然曰卿位爲常伯而家無餘財向聞與尊夫人辭訣言辭哀苦然則卿國士也如何可令死吾當相爲因起去明日更來其明日又來祐曰卿許活吾當卒恩不答曰大老子業已許卿當復相欺耶見其從者數百人皆長二尺許烏衣軍服赤油爲誌祐家擊鼔禱祀諸鬼聞鼓聲皆應節起舞振袖颯颯有聲祐將爲設酒食辭曰不須因復起去謂祐曰病在人體中如火當以水解之因取一盃水發被灌之又曰爲卿留赤筆十餘枝在薦下可與人使著出入辟惡災因道曰王甲李乙吾皆與之遂執祐手與辭時祐得安眠夜中忽覺忽呼左右令開被神以水灌我將大沾濡開被而信有水在上被之下下被之上不浸如露之在荷量之得三升七合於是疾三分愈二數日大除凡其所道當取者皆死亡唯王文英半年後乃亡所道與赤筆人皆經疾病及兵亂皆亦無恙初有妖書云上帝以三將軍趙公明鍾士季各督數萬鬼下取人莫知所在祐病差見此書與所道趙公明合焉出搜神記温嶠古今相傳夜以火照水底悉見鬼神溫嶠平蘇峻之難及於湓口乃試照焉果見官寺赫奕人徒甚盛又見羣小兒兩兩爲偶乘軺車駕以黃羊睢盱可惡溫即夢見神怒曰當令君知之乃得病也出志怪戴文諶沛國戴文諶居陽城山有神降妻焉諶疑是妖魅神已知之便去遂見作一五色鳥白鳩數十枚從有雲覆之遂不見出搜神記黃石公益州之西雲南之東有神祠刻山石爲室下有人奉祀之自稱黃公因言此神張良所受黃石公之靈也清淨不烹殺諸祈禱者持一百錢一雙筆一丸墨石室中前請乞先聞石室中有聲須臾問來人何欲既言便具語吉凶不見其形至今如此出搜神記袁雙丹陽縣有袁雙廟眞第四子也眞爲桓宣武誅便失所在靈在太元中形見於丹陽求立廟未既就功大有虎災被害之家輒夢雙至催功甚急百姓立祠堂於是猛暴用息今道俗常以二月晦鼓舞祈祠爾日常風雨忽至元嘉五年設奠訖村人丘都於廟後見一物人面鼉身葛巾七孔端正而有酒氣未知爲雙之神爲是物憑也出異苑商康烏程卞山本名土山有項籍廟自號卞王因改爲名山足有一石櫃高數尺陳郡殷康嘗往開之風雨晦暝乃止出異苑賈充賈充伐吳時嘗屯項城軍中忽失充所在充帳下都督周勒時晝寢夢見百餘人錄充引入一逕勒驚覺聞失充乃出尋索之忽覩所夢之道遂往求之果見充行至一府舍侍衛甚盛府公南面坐聲色甚厲謂充曰將亂吾家事必爾與荀朂既惑吾子又亂吾孫間使任愷黜爾而不去又使庾純詈汝而不改今吳宼當平汝方表斬張華汝之闇戅皆此𩔖也若不悛愼當旦夕加罪充因叩頭流血公曰汝所以延日月而名器如此者是衛府之勲耳終當使孫嗣死於鐘簴之間大子斃於金酒之中小子困於枯木之下荀朂亦略同然其先徳小濃故在汝後數年之外國嗣亦替言畢命去充忽然還營顔色憔悴性理昬䘮經日乃復其後孫謐死於鐘下賈後服鴆酒而死賈午考竟用大杖皆如所言出晉書王文度晉王文度鎭廣陵忽見二騶持鵠頭板來召之王大驚問騶我作何官騶云尊作平北將軍徐兖二州刺史王曰吾已作此官何故復召耶鬼云此人間耳今所作是天上官也王大懼之尋見迎官𤣥衣人及鵠衣小吏甚多王尋病薨出法苑珠林徐長吳興徐長夙與鮑靚有神明之交欲授以秘術先請徐宜有約誓以不仕於是授籙以常見八大神在側能知來見往才識日異州鄉翕然美談欲用爲州主簿徐心悦之八神一朝不見七人餘一人倨傲不如常徐問其故答云君違不誓不復相爲使身一人留衛籙耳徐乃還籙遂退出世説陳緒新城縣民陳緒家晉永和中旦聞扣門自通云陳都尉便有車馬聲不見形逕進呼主人共語曰我應來此當權住君家相爲致福令緒施設牀帳於齋中或人詣之齋持酒禮求願所言皆驗每進酒食令人跪拜授闈裏不得開視復有一身疑是狐狸之𩔖因跪急把取此物却還牀後大怒曰何敢嫌試都尉此人心痛欲死主人爲扣頭謝良久意解自後衆不敢犯而緒舉家無恙每事益利此外無多損益也出幽明錄白道猷章安縣西有赤城山周三十里一峰特高可三百餘丈晉泰元中有外國人白道猷居於此山山神屢遣狼怪形異聲往恐怖之道猷自若山神乃自詣之云法師威徳嚴重今推此山相與弟子更卜所託道猷曰君是何神居此㡬時今若必去當去何所答云弟子夏王之子居此千餘年寒石山是家舅所住某且往寄憇將來欲還會稽山廟臨去遺信贈三奩香又躬來别執手恨然鳴鞞響角凌空而逝出述異記高雅之晉太元中高衡爲魏郡太守戍石頭其孫雅之在廐中云有神來降自稱白頭公拄杖光耀照屋與雅之輕舉宵行暮至京口晨巳來還後雅之父子爲桓𤣥所滅出幽明錄羅根生豫章有廬松村郡人羅根生來此村側墾荒種𤓰果園中有一神壇𤓰始引蔓忽見壇上有一新板墨書云此是神地可速出去根生祝曰審是神教願更朱書賜報明早往看向板猶存字悉以朱代墨根生謝而去也出述異記沈縱餘姚人沈縱家素貧與父同入山還未至家見一人左右導從四五百許前車輻馬鞭夾道鹵簿如二千石遙見縱父子便喚住就縱手中燃火縱因問是何貴人答曰是鬬山王在餘杭南縱知是神叩頭云願見祐助後入山得一玉枕從此如意出幽明錄戴氏女豫章有戴氏女久疾不瘥見一小石形像偶人女謂曰爾有人形豈神能差我宿疾者吾將重汝其夜夢有人告之吾將祐汝自後疾漸差遂爲立祠山下戴氏爲巫故名戴侯祠出搜神記孫盛衡山白槎廟古老相傳昔有神槎皎然白色禱之靈無不應晉孫盛臨郡不信鬼神乃伐之斧下流血其夜波流神槎向上但聞鼓角之聲不知所止開皇九年廢今尚有白槎村在出湘中記湛滿須江縣江郎山昔有江家在山下居兄弟三人神化於此故有三石峰之異有湛滿者亦居山下其子仕洛永嘉之亂不得歸滿乃使祝宗言於三石之靈能致其子靡愛斯牲旬日中湛子出洛水邊見三少年使閉目伏車欄中間去如疾風俄頃從空中墮怳然不知所之良久乃覺是家園中出十道記竺曇遂晉太元中謝家沙門竺曇遂年二十餘白晳端正流落沙門嘗行經青溪廟前過因入廟中看暮歸夢一婦人來語云君當來作我廟中神不復久曇遂問婦人是誰婦人云我是青溪姑如此一月許便卒臨死謂同學年少曰我無福亦無大罪死乃當作青溪廟神諸君行便可見看之既死後諸年少道人詣其廟既至便靈語相勞問音聲如其生時臨去云久不聞唄聲甚思之其伴慧覲便爲作唄訖猶唱贊語云岐路之訣尚有悽愴况此之乖形神分散窈㝠之嘆情何可言既而歔欷不自勝諸道人等皆爲流涕出續搜神記武曾侯官縣常有閣下神歲終諸吏殺牛祀之沛郡武曾作令斷之經一年曾遷作建威參軍當去神夜來問曾何以不還食聲色極惡甚相譴責諸吏便於道中買牛共謝之此神乃去出幽明錄晉孝武帝晉孝武帝殿北窗下見一人著白帢黃疎單衣自稱華林園水池中神名曰淋涔君帝取所佩刀擲之空過無礙神忿曰當令君知之少時而暴崩出幽明錄藺啓之藺啓之家在南鄉有樗蒱婁廟啓之有女名僧因忽氣而寤云樗蒱君遣婢迎僧坐斗帳中仍陳盛筵以金銀爲爼案五色玉爲杯椀與僧共食一宿而醒也出𫐠異記王猛王猛者北海人少貧賤曾至洛陽貨畚有一人於市貴買其畚而云無直家近在此可隨我取猛隨去行不覺遠忽至深山中此人語猛且住樹下當先啓道君來須臾猛進見一公據胡牀頭鬂悉白侍從十許人有一人引猛云大司馬公可進因拜老公曰王公何緣拜即十倍售畚價遣人送猛出既顧視乃嵩山也出中興書封驅之始興林水源裏有石室室前磐石上行羅十甕中悉是餅銀採伐遇之不得取取之迷悶晉大元初民封驅之家僕密竊三餅歸發看有大蛇螫之而死湘州記曰其夜驅之夢神語曰君奴不謹盜銀三餅即日顯戮以銀相償覺視則奴死銀在矣出水經太平廣記卷二百九十四
