body:
  text: 太平廣記卷四百七十四宋李昉等編昆蟲二胡充盧汾来君綽傳病滕廷俊張思恭蝗冷蛇李揆主簿蟲朱牙之𣗳蚓木師古胡充宋豫章胡充元嘉五年秋夕有大蜈蚣長二尺落充婦與妺前令婢挟擲婢裁出戸忽覩一姥衣服臭敗兩目無精到六年三月闔門時患死亡相繼出異苑盧汾妖異記曰夏陽盧汾字士濟幼而好學晝夜不倦後魏荘帝永安二年七月二十日将赴洛友人宴於齋中夜闌月出之後忽聞㕔前槐𣗳空中有語笑之音并絲竹之韻數友人咸聞訝之俄見女子衣青黒衣出槐中謂汾曰此地非郎君所詣奈何相造也汾曰吾適宴罷友人聞此音樂之韻故来請耳女子笑曰郎君真姓盧乎乃入穴中俄有微風動林汾歎訝之有如昏昩及舉目見宮宇豁開門戸逈然有一女子衣青衣出户謂汾曰娘子命郎君及諸郎相見汾以三友俱入見數十人各年二十餘立於大屋之中其額號曰審雨堂汾與三友歴階而上與紫衣婦人相見謂汾曰適㑹同宫諸女歌宴之次聞諸郎降重不敢拒爾因拜見紫衣者乃命汾等就宴後有衣白者青黄者皆年二十餘自堂東西閣出約七八人悉妖艷絶世相揖之後歡宴未深極有美情忽聞大風至審雨堂梁傾折一時奔散汾與三友俱走乃醒既見庭中古槐風折大枝連根而堕因把火照所折之處一大蟻穴三四螻蛄一二蚯蚓俱死於穴中汾謂三友曰異哉物皆有靈况吾徒適與同宴不知何縁不入於是及曉因伐此𣗳更無他異出窮神秘苑来君綽隋煬帝征遼十二軍盡沒總管来䕶坐法受戮煬帝盡欲誅其家子君綽憂懼連日與秀才羅巡羅逖李萬進結為死友共亡命至海州夜黒迷路路傍有燈火因與共投之扣門數下有一蒼頭迎拜君綽因問此是誰家答曰科斗郎君姓威即當府秀才也遂啟門門又自開敲中門曰蝸兒也有四五箇客蝸兒耶又一蒼頭也遂開門秉燭引客就館客位牀榻茵褥甚備俄有一小童持燭自中出門曰六郎子出来君綽等降階見主人主人辭彩朗然文辯紛錯自通姓名曰威汚蠖叙寒温訖揖客由阼階坐曰汚蠖忝以本州鄉賦得與足下同聲清宵良㑹殊是忻願即命酒洽坐漸至酣暢談謔交至衆所不能對君綽頗不能平欲以理挫之無計因舉觴曰君綽請起一令以坐中姓名雙聲者犯罰如律君綽曰威汚蠖實譏其姓衆皆撫手大笑以為得言及至汚蠖改令曰以坐中人姓為歌聲自二字至三字令曰羅李羅来李衆皆服其辨㨗羅巡又問君聲推之事足得自此云龍何玉名之自貶耶汚蠖曰僕久從賔興多為主司見屈以僕後於羣士何異尺蠖於汚池乎巡又問公華宗氏族何為不載汚蠖曰我木日氏出於齊威王亦猶桓丁之𩔖何足下之不學耶既而蝸兒舉方丈盤至珍羞水陸充溢其間君綽及僕無不飽飫夜闌徹燭連榻而寢遲明敘别恨悵俱不自勝君綽等行數里猶念汚蠖復来見昨所㑹之處了無人居唯汚池邉有大螾長數尺又有􅀈螺丁子皆大常有數倍方知汚蠖及二豎皆此物也遂共惡昨宵所食各吐出青泥及汚水數升出𤣥怪録傳病隋煬帝大業末年洛陽人家中有傳屍病兄弟數人相繼亡歿後有一人死氣猶未絶家人並哭其弟忽見物自死人口中出躍入其口自此即病嵗餘遂卒臨終謂其妻曰吾疾乃所見物為之害吾氣絶之後便可開吾腦喉視有何物欲知其根本言終而死其妻依命開視腦中得一物形如魚而並有兩頭遍體悉有肉鱗弟子致器中跳躍不止試以諸味致中雖不見食悉須臾皆成水諸毒藥因皆隨銷化時夏中藍熟時衆如水次作靛青一人往因以小靛致鉢中此物即遽奔馳須臾間便化為水傳靛以療噎出廣古今五行記滕庭俊文明元年毗陵滕庭俊患熱病積年每發身如火燒數日方定名醫不能治後之洛調選行至滎水西十四五里天向暮未逹前所遂投一道傍荘家主人暫出未至庭俊心無聊頼因歎息曰為客多苦辛日暮無主人即有老父鬂髮踈秃衣服亦弊自堂西出拜曰老夫雖無所解而性好文章適不知郎君来止與和且耶連句次聞郎君吟為客多苦辛日暮無主人雖曹丕云客子長畏人不能過也老夫與和且耶同作渾家門客雖貧亦有斗酒接郎君清話耳庭俊甚異之問曰老父住止何所老父怒曰僕忝渾家掃門之客姓麻名来和弟大君何不呼為麻大庭俊即謝不敏與之偕行遶堂西隅遇見二門門啟華堂複閣甚竒秀舘中有樽酒盤核麻大揖讓庭俊同坐良久中門又有一客出麻大曰和至矣即降階揖讓坐且耶謂麻大曰適與君欲連句君詩題成未麻大乃書題目曰同在渾家平原門舘連句一首使請為四句矣麻大詩曰自與渾家鄰馨香遂滿身無心好清静人用去灰塵僕作四句成矣且耶曰僕是七言韻又不同如何麻大曰但自為一章亦不惡且耶良久吟曰終朝每去依烟火春至還歸養子孫曾向苻王筆端坐爾来求食渾家門庭俊猶不悟見門舘華盛因有淹留歇宿之計詩曰田文稱好客凡養幾多人如欠馮諼在今希厠下賔且耶麻大相顧笑曰何得相譏向使君在渾家門一日當厭飫矣於是餐饍肴饌引滿數十巡主人至覓庭俊不見使人呌喚之庭俊應曰唯而館宇并麻和二人一時不見乃坐厠屋下傍有大蒼蠅秃掃箒而已庭俊先有熱疾自此已後頓愈更不復發矣出𤣥怪録張思恭唐天后中尚食奉御張思恭進牛窟利上蚰蜒大如筯天后以玉合貯之召思恭示曰昨窟利上有此極是毒物近有雞食烏百足蟲忽死開腹中有蚰蜒一抄諸蟲並盡此物不化朕昨日以来意惡不能食思恭頓首請死敕免之與宰夫並流嶺南出朝野僉載蝗唐開元四年河南北螽為災飛則翳日大如指食苖草𣗳葉連根並盡敕差使與州縣相知驅逐採得一石者與一石粟一斗粟亦如之掘坑埋却埋一石則十石生卵大如黍米厚半寸盖地浮休子曰昔文武聖皇帝時繞京城蝗大起帝令取而觀之對仗選一大者祝之曰朕政刑乖僻仁信未孚當食我心無害苗稼遂吞之須臾有烏如鸛百萬為羣拾蝗一日而盡此乃精感所致天若偶然則如勿生天若為厲埋之滋甚當明徳慎罰以答天譴奈何不見福修以禳災而欲逞殺以消禍此宰相姚文崇失燮理之道矣出朝野僉載冷蛇申王有肉疾腹垂至骭每出則以白練束之至暑月鼾息不可過𤣥宗詔南方取冷蛇二條賜之虵長數尺色白不螫人執之冷如掘氷申王腹有數約夏月寘於約中不復覺煩暑出酉陽雜爼李揆唐李揆乾天中為禮部侍郎嘗一日晝坐於堂之前軒忽聞堂中有聲極震若牆圮揆驚入視之見一蝦蟇俯於地髙數寸魁然殊状揆且驚且異莫窮其來即命家童以巨缶盖焉有觧曰夫蝦蟇月中之蟲亦天使也今天使来公堂豈非上帝以榮命付公乎其明啟而視之已亡見矣後數日果拜中書侍郎平章事出宣室志主簿蟲潤州金壇縣大歴中有北人為主簿以竹筒齎蝎十餘枚置於㕔事之𣗳後遂孳育至百餘枚為土氣所蒸而不能螫人南民不識呼為主簿蟲出異記朱牙之東陽太守朱牙之元興中忽有一老公從其妾董牀下出著黄裳衿㡌所出之埳滑澤有泉遂與董交好若有吉凶遂以告牙之兒病瘧公曰此應得虎卵服之持㦸向山東得虎隂尚餘暖氣使兒炙噉瘧即斷公常使董梳頭髮如野猪牙後諸祭酒上章於是絶跡作沸湯試澆此埳掘得數斛大蟻不日村人捉大刀野行逢一丈夫見刀操黄金一餅求以易刀授刀奄失其人所在重察向金乃是牛糞計此即牙家鬼出異苑𣗳蚓上都渾瑊宅㦸門外一小槐𣗳𣗳有穴大如錢每夏月霽後有蚓大如巨臂長二尺餘白頸紅斑領蚓數百條如索縁𣗳枝幹及曉悉入穴或時衆驚往往成曲學士張乗言渾瑊時堂前忽有𣗳從地踴出蚯蚓遍挂其上已有出處忘其書名目出酉陽雜爼木師古遊子木師古貞元初行於金陵界村落日暮投古精舍宿見主人僧主人僧乃送一陋室内安止其本客㕔乃封閉不開師古怒遂詰責主人僧僧曰誠非恡惜於此而卑吾人於彼俱以承前客宿於此者未嘗不大漸於斯自某到已三十餘載殆傷三十人矣閉止周嵗再不敢令人止宿師古不允其詞愈生猜責僧不得已令啟户洒掃乃實年深朽室矣師古存心信而口貌猶怒及入寢亦不免有備預之志遂取箧中便手刀子一口於牀頭席下用壯其膽耳寢至二更忽覺増寒驚覺乃漂沸風冷如有扇焉良乆其扇復来師古乃潛抽刀子於幄中以刀子一揮如中物乃聞墮於牀左亦更無他師古復刀子於故處乃安寝至四更已来前扇又至師古亦依前法揮刀中物又如墮於地握刀更候了無餘事須臾天曙寺僧及側近人同来扣户師古乃朗言問之為誰僧徒皆驚猶詢其来由師古具述其狀徐徐拂衣而起諸人遂於牀右見蝙蝠二枚皆中刀狼籍而死每翅長一尺八寸珠眼圓大爪如銀色按神異秘經法云百嵗蝙蝠於人口上服人精氣以求長生至三百嵗能化形為人飛遊諸天據斯未及三百嵗耳神力猶劣是為師古所制師古因之亦知有服鍊術遂入赤城山不知所終宿在古舍下者亦足防矣出博異志太平廣記卷四百七十四
