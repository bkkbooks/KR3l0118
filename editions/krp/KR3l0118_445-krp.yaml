body:
  text: 太平廣記巻四百四十五宋李昉等編畜獸十二猿中張鋋楊叟孫恪崔商張鋋吳郡張鋋成都人開元中以盧溪尉罷秩調選不得補于有司遂歸蜀行次巴西㑹日暮方促馬前去忽有一人自道左山逕中出拜而請曰吾君聞客暮無所止將欲奉􅌽命某以請願隨某去鋋因問曰爾君為誰豈非太守見召乎曰非也乃巴西侯耳鋋即隨之入山逕行約百歩望見朱門甚高人物甚多甲士環衛雖侯伯家不如也又數十歩乃至其所使者止鋋于門曰願先以白吾君客當伺焉入久之而出乃引鋋曰客且入矣鋋既入見一人立于堂上衣褐革之裘貌極異綺羅珠翠擁侍左右鋋趨而拜旣拜其人揖鋋昇階謂鋋曰吾乃巴西侯也居此數十年矣適知君暮無所止故輒奉邀幸少留以盡歡鋋又拜以謝已而命開筵置酒其所玩用皆華麗珍具又令左右邀六雄將軍白額侯滄浪君又邀五豹將軍鉅鹿侯𤣥邱挍尉且傳教曰今日貴客來願得盡歡宴故命奉請使者唯而去久之乃至前有六人皆黑衣贔然其狀曰六雄將軍巴西侯起而拜六雄將軍亦拜又一人衣錦衣戴白冠貌甚獰曰白額侯也又起而拜白額侯亦拜又一人衣蒼其質魁岸曰滄浪君也巴西侯又拜滄浪亦拜又一人被斑文衣似白額侯而稍小曰五豹將軍也巴西又拜五豹將軍亦拜又一人衣褐衣首有三角曰鉅鹿侯也巴西揖之又一人衣黑狀𩔖滄浪君曰𤣥邱挍尉也巴西侯亦揖之然後延坐巴西南向坐鋋北向六雄白額滄浪處于東五豹鉅鹿𤣥邱處于西旣坐行酒命樂又羙人十數歌者舞者絲竹旣發窮極其妙白額侯酒酣顧謂鋋曰吾今夜尚食君能為我致一飽耶鋋曰未卜君侯所以尚者願敎之白額侯曰君之軀可以飽我腹亦何貴他味乎鋋懼悚然而退巴西侯曰無此理奈何宴席之上有忤貴客耶白額侯笑曰吾之言乃戲耳安有如是哉固不然也久之有告洞𤣥先生在門願謁白事言訖有一人被黑衣頸長而身甚廣其人拜巴西侯揖之與坐且問曰何為而來乎對曰某善卜者也知君將有甚憂故輒奉白巴西侯曰所憂者何也曰席上人將有圖君今不除後必為害願君詳之巴西侯怒曰吾歡宴方洽何處有怪焉命殺之其人曰用吾言皆得安不用吾言則吾死君亦死將若之何雖有後悔其可追乎巴西侯遂殺卜者置于堂下時夜將半衆盡醉而皆卧于榻鋋亦假寐焉天將曉忽悸而寤見已身卧于大石龕中其中設繡帷旁列珠璣犀象有一巨猿狀如人醉卧于地葢所謂巴西侯也又見巨熊卧于前者葢所謂六雄將軍也又一虎頂白亦卧于前所謂白額侯也又一狼所謂滄浪君也又有文豹所謂五豹將軍也又一巨鹿一狐皆臥于前葢所謂鉅鹿侯𤣥邱挍尉也而皆㝠然若醉狀又一龜形甚異死于龕前乃向所殺洞𤣥先生也鋋既見大驚即出山逕馳告里中人里人相集得百數遂執弓挾矢入山中至其處其後猿忽驚而起且曰不聽洞𤣥先生言今日果如是矣遂圍其龕盡殺之其所陳器玩莫非珍麗乃具事以告太守先是人有持眞珠繒帛而過此者俱無何而失且有年矣自後絶其患也出廣異記楊叟乾元初㑹稽民有楊叟者家以資産豐贍聞于郡中一日叟將死卧而呻吟且經數月叟有子曰宗素以孝行稱于里人迨其父病罄其産以求醫術後得陳生者究其原是翁之病心也葢以財産既多其心為利所運故心已離去其身非食生人心不可以補之而天下生人之心焉可致耶如是則非吾之所知也宗素旣聞之以為生心故不可得也獨修浮圖氏法庶可以間其疾即召僧轉經命工圖鑄其像已而自賫食詣郡中佛寺飯僧一日因挈食去誤入一山逕中見山下有石龕龕有胡僧貌甚老而枯瘠衣褐毛縷成袈裟踞于磐石上宗素以為異人即禮而問曰師何人也獨處窮谷以人跡不到之地為家又無侍者不懼山野之獸有害于師乎不然是得釋氏之術者耶僧曰吾本是袁氏祖世居巴山其後子孫或在弋陽散游諸山谷中盡能紹修祖業為林泉逸士極得吟嘯人好為詩者多稱其善吟嘯于是稍聞于天下有孫氏亦族也則多遊豪貴之門亦以善談謔故又以之遊于市肆間每一戲能使人獲其利焉獨吾好浮圖氏脫塵俗栖心巖谷中不動而在此且有年矣常慕歌利王割截身體及菩提投崖以飼餓虎故吾啖橡栗飲流泉恨未有虎狼噬吾吾亦甘受之宗素因告曰師眞至人能捨其身而不顧將以飼山獸可謂仁勇俱極矣雖然弟子父有疾已數月進而不瘳其夙夜憂廹計無所出有醫者云是心之病也非食生人之心固不可得而愈矣今師能棄身于豺虎以救其餒豈若捨命于人以惠其生乎願師詳之僧曰誠如是果吾之志也檀越為父而求吾吾豈有不可之意且吾以身委于野獸曷若惠人之生乎然今日尚未食願致一飯而後死也宗素且喜且謝即以所挈食置于前僧食之立盡而又曰吾既食矣當亦奉教然俟吾禮四方之聖也于是整其衣出龕而禮禮東方已畢忽躍而騰上一高樹宗素以為神通變化殆不可測俄召宗素厲而問曰檀越向者所求何也宗素曰願得生人心以療吾父疾僧曰檀越所願者吾已許焉今欲先說金剛經之奥義且聞乎宗素曰某素尚浮圖氏今日獲遇吾師安敢不聽耶僧曰金剛經云過去心不可得見在心不可得未來心不可得檀越若要取吾心亦不可得矣言已忽跳躍大呼化為一猿而去宗素驚異惶駭而歸出宣室志孫恪廣德中有孫恪秀才者因下第遊于洛中至魏王池畔忽有一大第土木皆新路人指云斯袁氏之第也恪逕徃叩扉無有應聲戸側有小房簾幃頗潔謂伺客之所恪遂褰簾而入良久忽聞啓闗者一女子光容鑒物艶麗驚人珠初滌其月華栁乍含其烟媚蘭芬靈濯玉瑩塵清恪疑主人之處子但潜窺而已女摘庭中之萱草凝思久立遂吟詩曰彼見是忘憂此看同腐草青山與白雲方展我懷抱吟諷慘容後因來褰簾忽覩恪遂驚慙入戸使青衣詰之曰子何人而夕向于此恪乃語以稅居之事曰不幸衝突頗益慙駭幸望陳達于小娘子青衣具以告女曰某之醜拙況不修容郎君久盻簾帷當盡所覩豈敢更廻避耶願郎君少佇内㕔當暫飾裝而出恪慕其容羙喜不自勝詰青衣曰誰氏之子曰故袁長官之女少孤更無姻戚唯與妾輩三五人據此第耳小娘子見求適人但未售也良久乃出見恪羙艶愈于向者所覩命侍婢進茶果曰郎君即無第舍便可遷囊槖于此㕔院中指青衣謂恪曰少有所須但告此輩恪愧荷而已恪未室又覩女子之姸麗如是乃進媒而請之女亦忻然相受遂納為室袁氏贍足巨有金繒而恪久貧忽車馬煥若服玩華麗頗為親友之疑訝多來詰恪恪竟不寔對恪因驕倨不求名第日洽豪貴縱酒狂歌如此三四歲不離洛中忽遇表兄張閒雲處士恪謂曰既久暌間頗思從容願携衾綢一來宵話張生如其所約及夜半將寢張生握恪手宻謂之曰愚兄于道門曽有所授適觀弟詞色妖氣頗濃未審别有何所遇事之巨細必願見陳不然者當受祸耳恪曰未嘗有所遇也張生又曰夫人禀陽精妖受陰氣魂掩魄盡人則長生魄掩魂消人則立死故鬼怪無形而全陰也仙人無影而全陽也陰陽之盛衰魂魄之交戰在體而㣲有失位莫不表白于氣色向觀弟神采陰奪陽位邪干正腑眞精已耗識用漸隳津液傾輸根蒂蕩動骨將化土顔非渥丹必為怪異所鑠何堅隱而不剖其出也恪方驚悟遂陳娶納之因張生大駭曰只此是也其奈之何恪曰弟忖度之有何異焉張曰豈有袁氏海内無𤓰葛之親哉又辨慧多能足為可異矣遂告張曰某一生邅迍久處凍餒因滋婚娶頗似蘇息不能負義何以為計張生怒曰大丈夫未能事人焉能事鬼傳云妖由人興人無釁焉妖不自作且義與身孰親身受其災而顧其鬼怪之恩義三尺童子尚以為不可何況大丈夫乎張又曰吾有寳劍亦干將之儔亞也凡有魍魎見者滅没前後神驗不可備數詰朝奉借倘携宻室必覩其狼狽不下昔日王君携寳鏡而照鸚鵡也不然者則不㫁恩愛耳明日恪遂受劍張生告去執手曰善伺其便恪遂携劍隱于室内而終有難色袁氏俄覺大怒而責恪曰子之窮愁我使暢泰不顧恩義遂興非為如此用心則犬彘不食其餘豈能立節行于人世也恪既被責慚顔惕慮叩頭曰受教于表兄非宿心也願以飲血為盟更不敢有他意汗落伏地袁氏遂搜得其劍寸折之若㫁輕藕耳恪愈懼似欲奔迸袁氏乃笑曰張生一小子不能以道義誨其表弟使行其凶險來當辱之然觀子之心的應不如是然吾匹君已數歲矣子何慮哉恪方稍安後數日因出遇張生曰無何使我撩虎鬚幾不脫虎口耳張生問劍之所在具以實對張生大駭曰非吾所知也深懼而不敢來謁後十餘年袁氏已鞠育二子治家甚嚴不喜參雜後恪之長安謁舊友人王相國縉遂薦于南康張萬頃大夫為經略判官挈家而徃袁氏每遇青松高山凝睇久之若有不快意到瑞州袁氏曰去此半程江壖有峽山寺我家舊有門徒僧惠幽居于此寺别來數十年僧行夏臘極高能别形骸善出塵垢倘經彼設食頗益南行之福恪曰然遂具齋蔬之𩔖及抵寺袁氏欣然易服理粧携二子詣老僧院若熟其逕者恪頗異之遂將碧玉環子以獻僧曰此是院中舊物僧亦不曉及齋罷有野猿數十連臂下于高松而食于生臺上後悲笑捫蘿而躍袁氏惻然俄命筆題僧壁曰剛被恩情役此心無端變化幾湮沉不如逐伴歸山去長笑一聲烟霧深乃擲筆于地撫二子咽泣數聲語恪曰好住好住吾當永訣矣遂裂衣化為老猿追笑者躍樹而去將抵深山而復返視恪乃驚懼若魂飛神䘮良久撫二子一慟乃詢于老僧僧方悟此猿是貧道為沙彌時所養開元中有天使高力士經過此憐其慧黠以束帛而易之間抵洛京獻于天子時有天使來往多說其慧黠過人長馴擾于上陽宫内及安史之亂即不知所之於戲不期今日更覩其怪異耳碧玉環者本訶陵胡人所施當時亦隨猿頸而往今方悟矣恪遂惆悵艤舟六七日擕二子而廻棹不復能之任也出傳竒崔商元和中荆客崔商上峽之黔秋水既落舟行甚遲江濵有溪洞林木勝絶商因杖䇿徐歩窮幽深入不三四里忽有人居石橋竹扉板屋茅舍延流詰曲景象殊逈商因前詣有尼衆十許延客姿貌言笑固非山壑之徒即升其居見廷内舍上多曝果栗及窺其室堆積皆滿須臾則自外齋負衆果累累而去商謂其深山窮谷非能居焉疑為妖異怱遽而返衆尼援引留連詞意甚懇商既登舟訪于舟子皆曰此猿猱耳前後遇者非一頼悟速返不爾幾為所殘商即聚僮僕挾兵杖亟往尋捕則無踪跡矣出集異記太平廣記巻四百四十五
