body:
  text: 太平廣記卷八十七異僧一釋摩騰竺法蘭康僧㑹支遁釋摩騰釋摩騰本中天竺人也美風儀解大小乘經常逰化為狂昔經往天竺附庸小國講金光明經㑹敵國侵境騰惟曰經云能説此法為地神所䕶使所居安樂今鋒鏑方始曽是為益乎乃誓以罄身躬往和勸遂二國交歡由是顯譽逮漢永平中明帝夜夢金人飛空而至乃大集羣臣以占所夢通事傅毅奏曰臣聞西域有神其名曰佛陛下所夢將必是乎帝以為然即遣郎中蔡愔博士弟子秦景等使往天竺尋訪佛法愔等於彼遇見摩騰要還漢地騰誓志𢎞通不憚疲苦冒涉流沙至乎雒邑明帝甚加賞接於城西門外立精舍以處之漢地有沙門之始也但大法初傳人未皈信故藴其深解無所宣述後少時卒於雒陽有記云騰譯四十二章經一卷初緘在蘭臺石室第十四間中騰所住處今雒陽城西雍門外白馬寺是也相傳云外夷國王嘗毁破諸寺唯招提寺未及毁壊夜有一白馬繞塔悲鳴即以啓王王即停壊諸寺因改招提以為白馬故諸寺立名多取則焉出髙僧傳竺法蘭竺法蘭中天竺人也自言誦經論數萬章為天竺學者之師時蔡愔既至彼國蘭與摩騰共契逰化遂相隨而來㑹彼學徒留礙蘭乃間行而至之既達雒陽與騰同歩時便善漢言愔於西域獲經即為翻譯所謂十地斷結佛本僧法海藏佛本行四十二章等五部㑹移都冦亂四部失本不傳江左唯四十二章經今見在可二千餘言漢地見存諸經唯此為始也愔又於西域得畫釋迦倚像是優田王㫋檀像師第四作既至雒陽明帝即令畫工圖寫置清凉臺中及顯節陵上舊像今不復存焉又昔漢武穿昆明池底得黒灰問東方朔朔云可問西域梵人後法蘭既至衆人追問之蘭云世界終盡刼火洞燒此灰是也朔言有徴信者甚衆蘭後卒於雒陽春秋六十餘矣出髙僧傳康僧㑹康僧㑹其先康居國人世居天竺其父因商賈移於交趾㑹年十餘嵗二親並亡以至性奉孝服畢出家厲行甚峻為人𢎞雅有識量篤志好學明解三藏博覽六經天文圖緯多所綜渉辨於樞機頗屬文翰時孫權已制江右而佛教未行先有優婆塞支謙字恭明一名越本月支人來逰漢境初漢桓靈之世有支䜟悔出衆經有支亮字絶明亮學於䜟謙又受業於亮傅覽經籍莫不諳究世間伎藝多所綜習遍學異書通六國語其為人細長黒痩眼多白而睛黄時人為之語曰支郎眼中黄形軀雖細是智囊漢末遇亂避地於吳孫權聞其才慧召見之日拜為博士使輔導東宫與韋曜諸人共盡匡益但生自外域故吳志不載謙以大教雖行而經多梵文未盡翻譯已妙善方言方欲集衆本譯為漢文從吳黄武元年至建興中所出維摩大般若泥洹法句瑞應本起等四十九經曲得聖儀辭㫖文雅又依無量夀中本起製菩薩連句梵唄三契并注了本先死經等皆行於世時吳地初染大法風化未全僧㑹欲使道振江左興立圖寺乃杖錫東逰以吳赤烏十年初達建業營立茅茨設像行道時吳國以初見沙門服形未及其道疑為矯異有司奏曰有異人入境自稱沙門容服非恒事應察檢權曰昔漢明夢神號稱為佛彼之所事豈其遺風耶即召會詰問有何靈驗㑹曰如來遷迹忽逾千載遺骨舍利神曜無方昔阿育王起塔及八萬四千夫塔寺之興以表遺化也權以為誇誕乃謂㑹曰若能得舍利當為造塔茍其虚妄國有常刑㑹請期七日乃謂其屬曰法之興廢在此一舉今不至誠後將何及乃共潔齋靜室以銅瓶加几燒香禮請七日期畢寂然無應求申二七亦復如之權曰此欺誑將欲加罪會更請三七日權又特聽會請法侣曰宣尼有言文王既沒文不在兹乎法雲應降而吾等無感何假王憲當以誓死為期耳三七日暮猶無所見莫不震懼既入五更忽聞瓶中鏗然有聲㑹自往視果獲舍利明旦權自手執瓶瀉於銅盤舍利所衝盤即破碎權大肅然驚起而曰希有之瑞也㑹進而言曰舍利威神豈直光相而已乃却燒之火不能焚金剛之杵不能碎權命令試之㑹更誓曰法雲方被蒼生仰澤願更垂神迹以廣示威靈乃置舍利於鐵砧磓上使力者撃之於是砧磓俱䧟舍利無損權大嗟伏即為建塔以始有佛寺故號建初寺因名其地為陁里由是江左大法遂興至孫皓即位法令苛虐廢棄淫祠及佛寺並欲毁壊皓曰此又何由而興若其義教貞正與聖典相應者當存奉其道如其無實皆悉焚之諸臣僉曰佛之威力不同於神康㑹感瑞大皇創寺今若輕毁恐貽後悔皓遣張昱詣寺詰㑹昱雅有才辨難問縱横㑹應機騁辭文理鋒出自旦之夕昱不能屈既退㑹送於門時寺側有淫祠在昱曰𤣥化既敷此輩何故近而不革㑹曰震霆破山聾者不聞非音之細茍在理通則萬里懸應如其阻塞則肝膽楚越昱還歎㑹材明非臣所測願天鑒察之皓大集朝賢以車馬迎㑹㑹既坐皓問曰佛教所明善惡報應何者是耶㑹對曰夫明主以孝慈訓世則赤鳥翔而老人見仁徳育物則醴泉涌而嘉苖出善既有瑞惡亦如之故為惡於隱鬼得而誅之為惡於顯人得而誅之易稱積善餘慶詩咏求福不回雖儒典之格言即佛教之明訓皓曰若然則周孔已明何用佛教㑹曰周孔所言略示近迹至於釋教則備極幽㣲故行惡則有地獄長苦修善則有天宫永樂舉兹以明勸沮不亦大哉皓當時無以折其言皓雖聞正法而昬暴之性不勝其虐後使宿衛兵入後宫治園於地得一金像髙數尺呈皓皓使著不凈處以穢汁灌之共諸羣臣笑以為樂俄爾之間舉身大腫隂處尤痛呌呼徹天太史占言犯大神所為即祈祝諸廟求福命綵女即迎像置殿上香湯洗數十遍燒香懴悔皓叩頭於地自陳罪狀有頃痛間遣使至寺請㑹説法㑹即隨入皓具問罪福之由㑹為敷析辭甚精要皓先有才解忻然大悦因求看沙門戒㑹以戒文禁祕不可輕宣乃取本業百三十五願分作二百五十事行住坐卧皆願衆生皓見慈願廣普益増善意即就㑹受五戒旬日疾瘳乃於㑹所住更加修飾宣示宗室莫不畢奉㑹在吳朝亟説正法以皓性凶麤不及妙義唯叙報應近事以開其心㑹於建初寺譯出衆經所謂阿難念彌鏡面王察微王梵皇經等又出小品及六度集雜譬喻等經並妙得經體文義允正又傳泥洹唄聲清摩哀亮一代模式又注安般守意法竟道樹等三經并製經序辭趣雅俊義㫖㣲宻並見行於世吳天紀四年四月皓降晉九月㑹遘疾而終是嵗晉武太康元年也至晉成帝咸和中蘇峻作亂焚㑹所建塔司空何充復更脩造平西將軍趙誘世不奉法傲蔑三寳入此寺謂諸道人曰久聞此塔屢放光明虚誕不經所未能信若必目覩所不能耳言竟塔即出五色光照耀堂刹誘肅然毛𥪡由此敬信於寺東更立小塔逺由大聖神感近亦康㑹之力也故圖寫厥像傳之於今爾出髙僧傳支遁支遁字道林本姓關氏陳留人或云河東林慮人幼有神理聰明秀徹晉時初至京師太原王濛甚重之曰造㣲之功不減輔嗣陳羣殷融嘗與衛玠交謂其神情雋徹後進莫有繼之者及見遁歎息以為重見若人家世事佛早悟非常之理隱居餘杭山沉思道行之品委曲惠印之經卓焉獨㧞得自天心年二十五出家每至講肄善標宗㑹而章句或有所遺時為守文者所陋謝安聞而喜之曰乃比古人之相馬也略其𤣥黄而取其駿也時謝安殷浩等並一代名流皆著塵外之狎遁嘗在白馬寺與劉系之等談莊子逍遥遁曰不然夫桀跖以殘害為性若適性為得者彼亦逍遥矣為是退而註逍遥篇羣儒舊學莫不歎伏後還吳住支硎山寺晚欲入剡謝安在吳與遁書曰思君日積計辰傾遲知欲還剡自治甚以悵然人生如寄耳頃風流得意之事殆為都盡終日戚戚觸事惆悵唯遲君來以晤言消之一日當千載耳此多山水山縣閒靜差可養疾事不異剡而醫藥不同必思此縁副其積想也王羲之時在㑹稽素聞遁名未之信謂人曰一狂僧耳何足言後遁既還剡徑逰於郡王故迓遁觀其風力既至王謂遁曰逍遥篇可聞乎遁乃作數千言標揭新理才藻警絶王遂披襟解帶留連不能去仍請住靈嘉寺意存相近俄又投迹剡山於沃州小嶺立寺行道僧衆百餘常隨禀學時或有惰者遁乃著座右銘以朂之時論以遁才堪經贊而潔已㧞俗有違兼濟之道遁乃作釋曚論晩過石城山又立棲光寺宴坐山門逰心禪苑木飡澗飲浪志無生乃註安般四禪諸經及即色逰𤣥論遁淹留建業渉將三載乃還東山上書告辭優詔許之資給發遣事事豐厚一時名流並餞離於征虜亭時蔡子叔前至近遁而坐謝萬石後至值蔡蹔起謝便移就其處蔡還復欲據謝坐地謝不以介意其為時賢所慕如此既而收迹剡山畢命林澤人嘗有遺遁馬者遁受而養之時或有譏之者遁曰愛其神駿聊復畜耳後有餉鶴者遁曰爾冲天之物寧為耳目之翫乎遂放之遁幼時嘗與師共論物𩔖謂雞卵生用未足為殺師不能屈師尋亡忽見形投卵於地殻破雛行頃之俱滅遁乃感悟由是蔬食終身遁先經餘姚塢山中住至於晚年猶還塢中或問其意答云謝安石昔數來見輙移旬日今觸情舉目莫不興想後病甚移還塢中以晉太和元年閠四月四日終於所住春秋五十有三即窆於塢中厥塜存焉或云終剡未詳郗超為之序傳袁宏為之銘贊周雲寳為之作誄焉出髙僧傳太平廣記卷八十七
