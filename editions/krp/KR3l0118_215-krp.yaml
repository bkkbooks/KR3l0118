body:
  text: 太平廣記卷二百十五算術一鄭𤣥真𤣥兎曹元理趙逹貞觀祕記一行邢和璞滿師馬處謙袁𢎞禦鄭𤣥漢鄭𤣥在馬融門下三年不相見髙足弟子傳授而已常算渾天不合問諸弟子弟子莫能解或言𤣥融召令算一轉便決衆咸駭服及𤣥業成辭歸融心忌焉𤣥亦疑有追者乃坐橋下在水上據屐融果轉式逐之告左右曰𤣥在土下水上而據木此必死矣遂罷追𤣥竟以免一説鄭康成師馬融三載無聞融鄙而遣還𤣥過樹隂假寐見一老父以刀開腹心謂曰子可以學矣於是寤而即返遂精洞典籍融歎曰詩書禮樂皆已東矣潛欲殺𤣥𤣥知而竊去融推式以算𤣥𤣥當在土木上躬騎馬襲之𤣥入一橋下俯伏柱上融踟蹰橋側云土木之間此則當矣有水非也從此而歸𤣥用免焉出異苑又鄭康成以永建二年七月戊寅生𤣥八九嵗能下算乘除年十一二隨母還家臘日宴㑹同時十許人皆美服盛飾語言通了𤣥獨漠然狀如不及母私督數之乃曰此非𤣥之所志也出𤣥列傳真𤣥兎漢安定皇甫嵩真𤣥兎曹元理並善算術皆成帝時人真常自算其年夀七十三於綏和元年正月二十五日晡時死書其屋壁以記之二十四日晡時死其妻曰見算時常下一算欲以告之慮脱有㫖故不告今果先一日也真又曰北邙青塜上孤檟之西四丈所鑿之入七尺吾欲𦵏此地及真死依言往掘得古時空槨即以𦵏焉出西京雜記曹元理曹元理嘗從真𤣥兎友人陳廣漢廣漢曰吾有二囷米忘其碩數子為吾計之元理以食箸十餘轉曰東囷七百四十九石二斗七合西囷六百九十七石八斗遂大署囷門後出米西囷六百九十七石七斗九升中有一䑕大堪一升東囷不差圭合元理後嵗復遇廣漢廣漢以米數告之元理以手擊牀曰遂不知䑕之食米不如剥面皮矣廣漢為之取酒鹿脯數臠元理復算曰甘蔗二十五區應收一千五百三十六枚蹲䲭三十七畆應收六百七十三石千牛産二百犢萬雞將五萬雛羊豕鵝鴨皆道其數果蓏殽核悉知其所乃曰此資業之廣何供具之褊廣漢慙曰有倉卒客無倉卒主人元理曰爼上蒸肫一頭厨中荔枝一盤皆可以為設廣漢再拜謝罪入取盡日為歡其術後傳南季南季傳項滔項滔傳子陸皆得其分數而失其𤣥妙焉出西京雜記趙逹吳太平二年長沙大饑殺人不可勝數孫權使趙逹占之云天地川澤相通如人四體鼻衂灸脚而愈今餘干水口已暴起一洲形如鼈食彼郡風氣可祠而掘之權乃遣人祭以太牢斷其背故老傳云饑遂止其水在饒州餘干縣也出洽聞記貞觀祕記唐貞觀中祕記云唐三世後有女主武王代有天下太宗宻召李淳風訪之淳風奏言臣據𤣥象推算已定其人已生在陛下宫内從今不滿四十年當有天下誅殺子孫殆盡太宗曰疑似者殺之何如淳風曰天之所命必無禳避之法王者不死枉及無辜且據占已長成在陛下宫内為眷屬更四十年又當衰老老則仁慈恐傷陛下子孫不多今若殺之為讎更生少壯必加嚴毒為害轉甚遂止出感定録一行沙門一行俗姓張名遂郯公公謹之曾孫年少出家以聰敏學行見重於代𤣥宗詔於光文殿改撰歴經後又移就麗正殿與學士參校一行乃撰開元大衍厯一卷厯議十卷厯成十二卷厯書二十四卷七政長厯三卷凡五部五十卷未及奏上而卒張説奏上之詔令行用初一行造黄道游儀以進御製游儀銘付太史監將向靈臺上用以測候分遣太史官大相元太等馳驛往安南朗兗等州測候日影同以二分二至之日午時量日影皆數年方定安南極髙二十一度六分冬至日影長七尺九寸二分春秋二分長二尺九寸三分夏至日在表南三寸一分蔚州横野軍北極髙四十度冬至日影長一丈五尺八分春秋二分長六尺六寸二分夏至影在表北二尺二寸九分此二所為中土南北之極朗兗太原等州並差互不同一行用勾股法算之云大約南北極相去才八萬餘里修厯人陳𤣥景亦善算歎曰古人云以管窺天以蠡測海以為不可得而致也今以丈尺之術而測天地之大豈可得哉若依此而言則天地豈得為大也其後參挍一行厯經並精宻迄今行用出大唐新語邢和璞邢和璞好黄老之道善心算作潁陽書疏有叩竒旋入空或言有草初未嘗覩叚成式見山人鄭昉説崔司馬者寄居荆州與邢有舊崔病積年且死心常恃於邢崔一日覺卧室北牆有人斸聲命左右視之都無所見卧空室之北家人所居也如此七日斸不已牆忽透明如一粟問左右復不見經一日穴大如盤崔窺之牆外乃野外耳有數人荷鍬钁立於穴側崔問之皆云邢真人處分開此司馬厄重倍費功力有頃導騶五六悉平幘朱衣辟曰真人至見邢輿中白幍垂綬執五明扇侍衛數十去穴數步而止謂崔曰公算盡僕為公再三論得延一紀自此無苦也言畢壁合如舊旬日病愈又曾居終南好道者多卜築依之崔曙年少亦隨焉伐薪汲泉皆是名士邢嘗謂其徒曰三五日有一異客君等可為予各辦一味也數日備諸水陸遂張筵於一亭戒無妄窺衆皆閉戸不敢謦欬邢下山延一客長五尺濶三尺首居其半緋衣寛博横執象笏其睫踈長色若削𤓰鼓髯大笑吻角侵耳與邢劇談多非人間事故也崔曙不耐因走而過庭客熟視顧邢曰此非泰山老師耶應曰是客復曰更一轉則失之千里矣可惜及暮而去邢命崔曙謂曰向客上帝戲臣也言泰山老師頗記無崔垂泣言某實泰山老師後身不復憶少常聽先人言之房琯太尉祈邢算終身之事邢言若由東南止西北禄命卒矣降魄之處非館非寺非途非署病起於魚飱休材龜兹板後房自袁州除漢州罷歸至閬州舍於紫極宫適顧工治木房怪其木理成形問之道士稱數月前有賈客施數斷龜兹板今治為屠蘇也房始憶邢之言有頃刺史具鱠邀房房歎曰邢君神人也乃具白於刺史且以龜兹板為託其夕病鱠而終出酉陽雜爼滿師西京太平坊法夀寺有滿師善九宫大理卿王璿嘗問之師云公某月當改官似是中書門下甚近玉階璿自謂黄門侍郎未可得也給舍又已過矣後果改為金吾將軍常侍玉階滿公又云王鉷一家盡成白骨有所尅皆騐闕馬處謙扶風馬處謙病瞽厥父俾其學易以求衣食嘗於安陸鬻筮自給有一人謁筮謂馬生曰子之筮未臻其妙我有祕法子能從我學之乎馬生乃隨往郡境有陶仙觀受星算之訣凡一十七行因請其爵里乃云胡其姓而恬其名誡之曰子有官禄終至五十二嵗幸勿道我行止於王侯之門馬生得訣言事甚騐趙匡明棄荆入蜀因隨至成都王先主嘗令杜光庭先生宻問享夀幾何對曰主上受元陽之氣四斤八兩果七十二而崩四斤八兩即七十二兩也馬生官至中郎金紫亦五十二而殞出北夢𤨏言袁𢎞禦後唐袁𢎞禦為雲中從事尤精算術同府令算庭下桐樹葉數即自起量樹去地七尺圍之取圍徑之數布算良乆曰苦于葉衆不能覆命撼去二十二葉復使算曰已少向者二十一葉矣審視之兩葉差小止當一葉耳節度使張敬逹有二玉椀𢎞禦量其廣深算之曰此椀明年五月十六日已時當破敬逹聞之曰吾敬藏之能破否即命貯大籠藉以衣絮鏁之庫中至期庫屋梁折正壓其籠二椀俱碎太僕少卿薛文美同府親見出稽神録太平廣記卷二百十五
