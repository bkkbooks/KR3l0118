body:
  text: 太平廣記卷一百十三報應十二張應釋道安周閔王懿謝敷僧法洪劉式之劉齡陳安居馬處伯張應晉張應厯陽人本事俗神鼓舞淫祀咸和八年移居蕪湖妻得病應請禱備至財産畧盡妻法家弟子也謂曰今病日困求鬼無益乞作佛事應許之往精舍中見竺曇鎧謂曰佛如愈病之藥見藥不服雖事無益應許當事佛曇謂期明日當往應歸夜夢見人長丈餘從南來入門曰此家何乃爾不浄見曇鎧隨後曰始欲發意未可責之應眠覺便秉火作髙座及鬼子母座曇鎧明往應説其夢遂受五戒屏除神影大設福供妻病有間尋即全愈咸康二年應至馬溝市鹽還泊蕪湖夜宿夢見三人以鈎釣之應曰我佛弟子牽終不置曰奴判走多時應恐謂曰放我當與君一升酒釣人乃放之謂應曰曇鎧濶絶已久病甚遣請之適值不在應尋氣絶數日而蘇説有數人以鈎釣之將北去下一坂岸盛有鑊湯刀劍楚毒之具應悟是地獄欲呼師名忘曇鎧字但喚和尚救我亦時喚佛有頃一人從西方長丈餘執金杵欲撞釣人皆怖散長人引應去謂曰汝命盡不復久生可暫還家頌唄三偈并取和尚名字三日當復命過即生天矣應即復蘇三日之中持齋頌唄遣人將疏取曇鎧名至日食畢禮佛讚唄與家人辭别澡沐冠帶如睡而亡出法苑珠林釋道安東晉恆山沙門釋道安者經石趙之亂避地於襄陽註般若道行宻迹諸經析疑甄解二十餘卷恐不合理乃誓曰若所説不違理者當見瑞相乃夢見一道人頭白眉長語安曰君所註經殊合道理我不得入泥洹住在西域當相助𢎞道可時設食也後逺公云昔和尚所夢乃是賔頭盧也於是立座享之遂成永則出法苑珠林周閔周閔汝南人晉䕶軍世奉佛法蘇峻之亂邑人皆東西播遷閔家有大品一部以半幅八丈素反復書之又有他經數部大品亦雜在其中既當避難單行不能得盡持去尤惜大品不知在何部中倉卒而去徘徊歎惋不覺大品忽自出外閔驚喜持去周氏遂世寶之至今尚在一説云周嵩婦胡母氏有素書大品其素廣五寸而大品一部盡在焉又并有舍利銀甖寘之並緘於深篋中永嘉之亂胡母氏時避兵南奔經及舍利自出篋外因求懐之以渡江東又嘗遇火不暇取經及屋盡火滅得之於灰燼之下儼然如故㑹稽王道子就嵩曾孫雲求以供養後常暫在新渚寺劉敬叔云曾親見此經字如麻子㸃畫分明新渚寺今天安是也此經盖得道僧慧則所寫也或云嘗在簡靖道尼轉誦出㝠祥記王懿晉王懿字仲徳太原人為車騎將軍世信佛法父黄為中山太守為丁零所害懿與兄侍母南歸登涉飢疲絶糧無計唯歸心三寶忽見一童子牽青牛見懿等各與一飯因忽不見時積雨大水懿前望浩然莫知揭厲俄有一白狼馴繞其前過水復返似欲引導如此者三於是隨狼行水纔至膝得路歸朝後自五兵尚書為徐州刺史嘗欲設齋宿昔洒掃盛列香花經像忽聞法堂有經唄聲清婉流暢懿遽往視見五沙門在佛座前神儀偉異懿心甚欽敬沙門顧盼依然瞻禮未竟皆竦身飛空而去親賔見者倍增信悟出法苑珠林謝敷謝敷字慶緒㑹稽山陰人鎮軍將軍輶之兄子也少有髙操𨼆於東山篤信大法精勤不倦手寫首楞嚴經嘗置都下白馬寺中寺為鄰火所延什物餘經並成煨燼而此經止燒紙頭界畫外而已文字悉存無所毁失敷死時友人疑其得道及聞此經彌加驚異出法苑珠林僧法洪晉世沙門僧法洪在瓦官寺義熙十二年時官禁鎔鑄洪元發心鑄丈六金像私鑄竟猶在模所司知覺收洪楚械洪念觀音每日百遍忽夢所鑄金像往獄手摩頭曰無慮其像胸前方一尺許銅色燋沸當洪禁日國家牛馬不肯入欄時以為怪旬日有赦洪得免像即破模而自現也出辨正論劉式之彭城劉式之常供養一金像無故失去不知所在式之夙夜思愆自責至念㝠通經百日後其像忽然自現本座神光照室全家驚喜倍加傾心出辨正論劉齡宋劉齡不知何許人居晉陵東路城村頗奉佛法於宅中立精舍時設齋元嘉九年三月二十七日父暴亡時巫祝並云家當更有三人喪亡鄰家有事道祭酒魏巨常為章符誑誘村里語齡曰君家喪禍未已由奉不明神也若改事大道必蒙福祐不改意者將滅其門齡遂敬延祭酒罷不奉法巨云宜焚經像災乃當除耳遂爇精舍炎熾移日唯屋而已經像幡座儼然如故像於中夜大放赤光其時諸祭酒有二十許人有懼靈驗宻委去者巨等師徒意猶不止被髮禹步報持刀索云斥佛還故國不得留中夏為民害也齡於其處如有人毆打頓仆於地家人扶起方餘氣息遂痿躄不能行魏巨體内發疽日出血三升不一月苦死自外同伴並患癩疾鄰人東安太守水立和傳於東陽時多見者出法苑珠林陳安居宋陳安居襄陽縣人也伯父少事巫俗鼓舞祭祀神像盈宅父獨敬信釋法恆自齋戒世父無子以安居紹焉安居雖即伯舍而理行精至廢絶淫祀忽得病發狂則為謌神之曲迷悶邪僻如此彌歳而執心愈固常誓曰若我所執之志偶當虧奪者必先自臠截四體乃就其事家人並勸之安居不聽經三年病發死但心下微煖家不敢殮至七日夜守者覺尸足間如有風來飃動衣衾蘇而有聲家人初懼尸蹷皆走避之既而稍能轉動仍求水漿家人喜問從何來安居具説所經初見有人若使者侍從數十人呼去從者欲縛之使者曰此人有福未可縛也行可百餘里至一城府屋宇甚整使者將至府所如局司之處俄有人授紙筆令安居曰可疏二十四通死名安居如言疏名成數通有一人從内出揚聲大呼曰居可人既義稱安有教付刺奸獄吏兩人一云與大械一云此人頗有福只可三尺械議論不決乃共視文書久之遂與三尺械少頃見一貴人翼從數十形貎都雅謂安居曰汝那得來安居具陳所由貴人曰汝伯有罪但宜録治以先殖小福故今得游觀也獄吏不肯釋械曰府君無教不敢専輒貴人曰但付我不使走逸也乃釋之貴人將安居遍至諸地獄備見苦楚畧與經文相符遊歴未竟有傳教來云府君喚安居安居惶懼求救於貴人貴人曰汝自無罪但以實對必無憂也安居至門見有桎梏者數百一時俱進安居在第三至階下一人冠冕立於囚前讀罪簿其第一措行昔者娶妻之始夫婦為誓有子無子終不相棄而其人本是祭酒嘗亦奉道供化徒衆中得一女弟子因而奸之遂棄本妻妻嘗訴寃府君曰汝夫婦違誓大義不終罪一也師資義著在三而奸之是父子相婬無以異也付法局詳刑次讀第二女人辭牒忘其姓名云家在南陽冠軍縣黄水里家安爨器於竈口而此婦眠嬰兒於竈上匍匐走行糞汚爨器中此婦還見即請謝神祗盥洗精潔而其舅每罵此婦言無有天道鬼神致此惡婦得行汙穢司命聞知故録送之府君曰眠竈非過小兒無知又且已請謝神是無罪矣舅罵無道誣謗幽靈可録之來須臾而至次到安居階下人具讀明牒為伯所訴府君曰此人事佛大徳人也其伯殺害無辜訾誑百姓罪宜窮治以其有小福故未加之罪耳今復謗訴無辜敕催録取來已而府君遣安居還若可去善成勝業可夀九十三努力勉之勿復更來將離府局司云君可拔却死名於是安居以次抽名既畢而至向遊貴人所貴人亦至云知汝無他罪得還甚善力修功徳身福微不辦生天受報於此輔佐府君亦優游富貴神道之美吾家在宛姓某名某君還為吾致意尊奉法戒勿犯偏禁可具以所見示語之也乃以三人力士送安居出門數百步傳教送符與安居謂曰君可持此符經闗戍次以示之勿輒偷過偷過有罪讁也若有水礙可以此符投水中即得過矣安居受符而歸行久之阻大江不得渡安居依言投符矇然如眩乃是其家庭中也正聞家中號慟所送三人勒還就身安居聞其身臭穢曰吾不復能歸此人乃强排之仆於尸脚上安居既愈欲驗黄水婦人特往冠軍縣尋問果有此婦相見依然如有舊識云已死得生舅即以其日亡説所聞見與安居悉同安居果夀九十三也出法苑珠林馬處伯宋馬處伯巴西閬中人也少信佛法嘗作宣漢縣令元嘉十二年七月夜夢見天際有三人長二丈餘姿容嚴厲臨雲下觀諸天妓樂盈於空中告曰汝厄在荆楚戊寅之年八月四日若處山澤其禍克消人中齋戒亦可獲免若過此期當悟道也時俯見相識楊暹等八人並着鎖械又見道士胡遼半身出空天際人皆記八人命盡年月唯語遼曰若能修立功徳猶可延長也暹等皆如期而亡遼益懼奉法山居勤勵彌至處伯後為梁州西曹掾州將蕭思話也蕭轉南蠻復命為行參軍處伯思荆楚之言心甚懼求蕭解職將適衡山蕭苦不許十三年即戊寅歳也六月末得病至八月危篤其日黄昏後忽朗然徹視遥見西方有三人行長可二丈前一人衣袷垂鬂項有光後二人姿質金耀儀相端備列於空中去地數仞處伯委悉詳視猶是前所夢者也頃之不見餘芳移時方歇同居大小皆聞香氣因而流汗病即小差處伯所居頗卑陋於時自覺處在殿堂廊壁煥耀皆是珍寶俄即所患平復出㝠祥記太平廣記卷一百十三
