body:
  text: 太平廣記卷一百二十五報應二十四榼頭師唐紹李生盧叔倫女崔無隱榼頭師梁有榼頭師者極精進梁武帝甚敬信之後敕使喚榼頭師帝方與人棊欲殺一段應聲曰殺却使遽出而斬之帝棊罷曰喚師使咨曰向者陛下令人殺却臣已殺訖帝歎曰師臨死之時有何所言使曰師云貧道無罪前劫爲沙彌時以鍫剗地誤斷一曲蟮帝時爲蟮今此報也帝流淚悔恨亦無及焉出朝野僉載唐紹唐紹幼而通悟知生前事厯厯備記而未嘗言於人雖妻子亦不知之也後爲給事中同里對門有一郎中李邈者紹休沐日多召邈與之言笑情好甚篤或時爲具饌中堂偶食郎中亦不知其所謂其妻詰紹曰君有盛名官至清近宜慎所交李邈非𩔖君亟與之狎竊爲君不取紹黙然乆之曰非子所知與李邈情好逾厚開元初驪山講武紹時攝禮部尚書𤣥宗援桴撃皷時未三合兵部尚書郭元振遽令紹奏畢神武赫怒拽元振坐於纛下張說跪奏於馬前稱元振於社稷有保䕶大功合赦殊死遂釋猶恨而斬紹先是一日紹謂妻子曰吾善李邈須死而言今時至矣遂爲略言之吾自幼即具知前生事明日講武吾其不免吾前世爲某氏女既笄適灞陵王氏子爲妻姑待吾甚嚴吾年十七冬至先一日姑令吾躬具主饌比畢吾困怠亦甚姑又令吾縫羅裙遲明服以待客吾臨燈運針慮功之不就夜分不息忽一犬衝扉入房觸燈燈僵油仆裙上吾且懼且恨因叱犬犬走突扉而扉反闔犬周章却伏牀下吾復照燭將理裙汙而狼藉殆遍吾懼姑深責且恨犬之觸燈遂舉牀以剪刀刺犬偶中其頸而剪一股亦折吾復以一股重刺之俄而犬斃詰朝持裙白姑姑方責罵而吾夫適自外至詢其故遂於牀下引斃犬陳於姑前由是少解吾年十九而卒遂生於此身往者斃犬乃今之李邈也吾明日之死葢縁報也行戮者必是李邈乎報應葢理之常爾無駭焉及翌日講武坐誤就戮果李邈執刀初一刀不殊而刀折易刀再舉乃絶焉死生之報固猶影響至於刀折殺亦不異諒明神不欺矣唐書說明皇尋悔恨殺紹以李邈行戮太疾終身不更録用出異雜篇李生唐貞元中有李生者家河朔間少有膂力恃氣好俠不拘細行常與輕薄少年遊年二十餘方折節讀書爲歌詩人頗稱之累爲河朔官後至深州録事參軍生美風儀善談笑曲曉吏事亷謹明幹至於撃鞠飲酒皆號爲能雅爲太守所知時王武俊帥成徳軍恃功負衆不顧法度支郡守畏之側目嘗遣其子士真巡屬郡至深州太守大具牛酒所居備聲樂宴士真太守畏武俊而奉士真之禮甚謹又慮有以酒忤士真者以故僚吏賔客一不敢召士真大喜以為他郡莫能及飲酒至夜士真乃曰幸使君見待之厚欲盡歡於今夕豈無嘉賔願得召之太守曰偏郡無名人懼副大使士真時為武俊節副大使之威不敢以他客奉宴席唯録事參軍李某足以侍談笑士真曰但命之於是召李生入趨拜士真目之色甚怒既而命坐貌益恭士真愈不悅瞪顧攘腕無向時之歡矣太守懼莫知所謂顧視生靦然而汗不能持盃一坐皆愕有頃士真叱左右縛李某繋獄左右即牽李袂疾去械獄中已而士真歡飲如初迨曉宴罷太守且驚且懼乃潛使於獄中訊李生曰君貌甚恭且未嘗言固非忤於王君君寧自知耶李生悲泣乆之乃曰嘗聞釋氏有現世之報吾知之矣某少貧無以自資由是好與俠士遊往往掠奪里人財帛常馳馬腰弓往還太行道日百餘里一日遇一年少鞭駿騾負二巨囊吾利其資顧左右皆巖崖萬仞而日漸曛黑遂力排之墮於崖下即疾驅其騾逆旅氏解其囊得繒綺百餘段自此家稍贍因折弓矢閉門讀書遂仕而至此及今凡二十七年矣昨夕君侯命與王公之宴既入而視王公之貌乃吾曩時所殺少年也一拜之後中心慙惕自知死不朝夕今則延頸待刃又何言哉爲我謝君侯幸知我深敢以身後爲託有頃士真醉悟急召左右往李某取其首左右即於獄中斬其首以進士真熟視而笑既而又與太守大飲于郡齋酒醉大守因歡乃起曰某不才幸得守一郡而副大使下察弊政寛不加罪爲恩厚矣昨日副大使命某召他客屬郡僻小無客不足奉歡宴者竊以李某善飲酒故請召之而李某愚戅不習禮法大忤於明公實某之罪也今明公既已誅之宜矣竊有所未曉敢以上問李某之罪爲何願得明數之且用誡於將來也士真笑曰李生亦無罪但吾一見之遂忿然激吾心已有戮之之意今既殺之吾亦不知其所以然也君無復言及宴罷太守密訊其年則二十有七矣葢李生殺少年之嵗而士真生於王氏也太守歎異久之因以家財厚葬李生出宣室志盧叔倫女長安城南曾有僧至日中求食偶見一女子採桑樹上問曰此側近何處有信心可乞飯者女子曰去此三四里有王家見設齋次見和尚來必喜可速去也僧隨所指往果見一羣僧方就坐甚慰延入齋訖主姥異其及時至也問之僧具以實告主人夫妻皆驚曰且與某同往訪此女子遂俱去尚在桑樹上乃村人盧叔倫女也見翁姥遂趨下棄葉籠奔走歸家二人隨後逐之到所居父母亦先識之女子入室以牀扃户牢不可啟其母驚問之曰某今日家内設齋有僧云小娘子遣來某作此功德不曾語人怪小娘子知故來視㸔更非何事其母推户遣出女堅不肯出又隨而罵之女曰某不欲見此老兵老嫗亦豈有罪過母曰鄰里翁婆省汝因何故不出二人亦怪厚祈請之女忽大呼曰某年月日販胡羊父子三人今何在二人遂趨出不敢迴顧及去母問之答曰某前生曾販羊從夏州來至此翁莊宿父子三人並爲其害劫其資貨某前生乃與之作兒聦黠勝人渠甚愛念十五患病二十方卒前後用醫藥已過所劫數倍渠又爲某每歳亡日作齋夫妻涕泣計其淚過三兩石矣偶因僧問乞飯處某遂指導之耳亦是償債了矣翁姥從此更不復作齋也出逸史崔無隱唐元和中博陵崔無隱言其親友曰城南杜某者嘗於汴州招提院與主客僧坐語忽有一客僧當面鼻額間有故刀瘢橫斷其面乃訊其來由僧良乆嚬慘而言曰某家于梁父母兄嫂存焉兄每以賈販江湖之貨爲業初一年自江南而返大梁獲利可倍二年往而不返三年乃有同往者云兄溺於風波矣父母嫂俱服未闋忽有自漢南賈者至於梁乃訪召某父姓名者某於相國精舍應曰唯賈客曰吾得汝兄信某乃忻駭未言且邀至所居告父母而言曰師之兄以江西貿折遂浪迹於漢南禆將憐之白於元戎今於漢南雖緡鏹且盡而衣食自給以卑貧所係是未獲省拜故憑某以達信耳父母嫂悲忻泣不勝翌日父母遣某之漢南以省兄某行可七八日入南陽界日晚過一大澤中東西路絶目無人烟四面隂雲且合漸暮遇寥落三兩家乃欲寄宿耳其家曰師胡爲至此今爲信宿前有殺人者追逐未獲索之甚急宿固不可也自此而南三五里有一招提所師可宿也言而往陰風漸急颯颯雨來可四五里轉入荒澤莫知爲計信足而步少頃前有燭光初將咫尺而可十里方到風雨轉甚不及扣戸而入造于堂隍寂無生人滿室死者瞻視次雷聲一發某爲一女人屍所逐又出奔走七八里至人家雨定月微明遂入其家中門外有小㕔㕔中有牀榻卧未定忽有一夫長七尺餘提白刃自門而入某恐立於壁角中白刃夫坐榻良乆如有所候俄而白刃夫出㕔東先是有糞積可乗而覘宅中俄又聞宅中有三四女人於牆端切切而言須臾白刃夫携一衣襆入㕔續有女人從之乃計會逃逝者也白刃夫遂云此室莫有人否以刃繞壁畫之某帖壁定立刃畫其面過而白刃夫不之覺遂携襆領奔者而往某自料不可住乃捨此又前走可一二里撲一古井中已有死人矣其體暖某時迴遑可五更主覺失女尋趂至古井以火照乃屍與某存焉執某以聞于縣縣尹明辯某以畫壁及牆上語者具獄於宅中姨姑之𩔖而獲盜者某乃得雪南征垂至漢南界路逢大檜樹一老父坐其下問其從來某具告父曰吾善易試爲子推之師呵蓍父布卦嘘唏而言曰子前生兩妻汝俱辜焉前爲走屍逐汝者長室也爲人殺於井中同處者汝側室也縣尹明汝之無辜乃汝前生之父漢南之兄俱無也言畢某淚下收淚之次失老父所在及至漢南尋訪其兄杳無所見其刃瘢乃白刃夫之所致也噫乃宿寃之動作徴應委曲如是無隱云杜生自有傳此略而記之出博異記太平廣記卷一百二十五
