body:
  text: 太平廣記卷三百九十七宋李昉等編山玉笥山大翮山山精石雞山新豐山慶山甕峰夸父山插竈河山石斛終南乳洞古鐵鏁崖山聖鍾山嵩梁山石鼓山射的山怪山鳴鐃山贑臺上霄峯麥積山斗山觀大竹路溪溪毒山玉笥山漢武帝好仙於玉笥山頂上置降真壇大還丹竈道士晝夜祈禱天感其誠乃降白玉笥置壇上武帝遣使取之至其壇側飄風大震卷玉笥而去因此以為玉笥山焉出玉笥山錄大翮山上郡人王次仲少有異志變倉頡舊文為今隸書秦始皇時官務煩多以次仲所易文簡便於事因而召之凡三徴不致次仲懐道履真窮數術之妙始皇怒其不恭令檻車送之次仲行次忽化為大鳥出車外翻飛而去落二翮於斯山故其峰巒有大翮小翮之名矣魏上地記曰沮陽城東北六十里有大翮小翮山山上神名大翮廟東有温湯小口温湯療治萬病泉所發之麓俗謂之土亭山北水熱甚諸湯療病者要須别消息用之出水經山精吴天門張蓋冬月與村人共獵見大樹下有蓬菴似寝息䖏而無烟火有頃見一人身長七尺毛而不衣負數頭死猿蓋與語不應因將歸閉空屋中十餘日復送故處又孫皓時臨海得毛人山海經云山精如人面有毛此即山精也故抱朴子曰山之精形如小兒而獨足足向後喜来犯人其名蚑知而呼之即當自却再一名曰超空亦可兼呼之又有山精或如鼓赤色一足其名曰渾又或如人長九尺衣裘戴笠名曰金累又或如龍有五赤色角名曰飛龍見之皆可呼其名不敢為害𤣥中記山精如人一足長三四尺食山蟹夜出晝蔵出異苑石雞山晉永嘉之亂宜陽有女子姓彭名娥父母昆弟為長沙賊所擄時娥負器出汲於溪還見塢壁已破殆不勝哀與賊相格賊縛娥驅去溪邊將殺之際有大山石壁娥仰呼皇天山靈有神不我為何罪因奔走向山山立開數丈平路如砥羣賊亦逐娥入山山遂崩合泯然如初賊皆壓死山裏頭出山外娥遂𨼆不復出娥所捨汲器化為石形似雞土人因號曰石雞山溪有娥潭出幽明録新豐山唐髙宗朝新豐出山髙二百丈有神池深四十尺水中有黄龍現吐寳珠浮出大如拳山中有鼓鳴改新豐縣為慶山縣出廣徳神異録慶山昭應慶山長安中亦不知從何飛来夜過聞有聲如雷疾若奔馳土石亂下直墜新豐西南一村百餘家因山為墳今於其上起持國寺出𫝊載甕峰華嶽雲臺觀中方之上有山崛起如半甕之状名曰甕肚峰𤣥宗嘗賞望嘉其髙迥欲於峰腹大鑿開元二字填以白石令百餘里外望見之諫官上言乃止出開天傳信記夸父山辰州東有三山鼎足直上各數千丈古老𫝊曰鄧夸父與日競走至此煮飯此三山者夸父支鼎之石也出朝野僉載插竈荆州有空舲峽絶崖壁立數百丈飛鳥不棲有一火燼插在崖間望見可長數尺𫝊云洪水時行舟者泊爨於此餘燼插之至今猶曰插竈出洽聞記河山石斛融州河山有泉半巖將注其下相次九磴毎磴下一白石浴斛承之如似鐫造嘗有人攜一婢取下浴斛中浣巾須臾風雨忽至其婢震死所浣巾斛碎於山下自别安一斛新於向者出酉陽雜俎終南乳洞有人逰終南山一乳洞洞深數里乳旋的歴成飛仙状洞中已有數十眉目衣服形製精巧一處滴至腰已上其人因手承潄之經年再往見所承滴像已成矣乳不復滴當手承處衣缺二寸不就出酉陽雜俎古鐵鏁齊郡接歴山上有古鐵鏁大如臂繞其峰再浹相傳本海中山山神好移故海神鎖之挽鎖斷飛于此出酉陽雜俎崖山太原郡東有崖山天旱土人常燒此山以求雨俗傳崖山神娶河伯女故河伯見火必降雨救之今山上多生水草出酉陽雜俎聖鍾山黎州聖鍾山古老𫝊此山有鐘聞其聲而形不見南詔犯境鐘則預鳴唐天寳大和咸通乾符之載羣蠻来冦皆有徴也昔有名僧講大乗經論鐘亦震焉乾寕中刺史張恵安請問僧京師右街浄衆寺恵維講妙法蓮花經一遍此鐘頻鳴如人扣撃知向所傳者不謬矣出黎州圖經嵩梁山澧州嵩梁山今名石門永安六年自然洞開𤣥朗如門髙三百丈角上生竹倒垂下拂謂之天箒出十道記石鼓山歙州石鼓山有石如鼓形又有石人石驢俗𫝊石鼓鳴則驢鳴人哭而縣官不利後鑿破其鼓遂不復鳴出歙州圖經射的山孔靈符㑹稽記云射的山逺望的的有如射侯故曰射的南有石室可方丈謂之射室𫝊云羽人所遊憩土人常以此占穀貴賤諺云射的白米斛一百射的𤣥米斛一千孔靈符㑹稽記云射的石水數十丈其清見底其西有山上參烟雲半嶺石室曰仙人射堂水東髙巖臨渾有石的形甚員明視之如鏡又㑹稽録云仙人常射如此使白鶴取箭北有石帆壁立出洽聞記怪山㑹稽山隂郭中有怪山世𫝊本瑯琊東武山時天夜雨晦㝠旦而見在此焉百姓怪之因名曰怪山出廣古今五行記鳴鐃山鳴鐃山蕭子開建安記云一名大戈山越王無諸乗象輅大將軍乗鳴鐃載旗畋獵登於此山古老𫝊天欲雨其山即有音樂聲也出建州圖經贑臺䖍州贑臺縣東南三百六十三里南康記云山上有臺方廣數丈有自然霞如屋形風雨之後景氣明浄頗聞山上有鼓吹聲即山都木客為其舞唱出十道記上霄峰𥙷闕熊皎云廬山有上霄峰者去平地七千仞上有古迹云是夏禹治水之時泊船之所鑿石為竅以繫䌫焉磨崖為碑皆科斗文字𨼆𨼆可見則知大禹之功與天地不朽矣出玉堂閒話麥積山麥積山者北跨清渭南漸兩當五百里岡巒麥積處其半崛起一石塊髙百萬尋望之團團如民間積麥之狀故有此名其青雲之半峭壁之間鐫石成佛萬龕千室雖自人力疑其鬼功隋文帝分𦵏神尼舍利函於東閣之下石室之中有庾信銘記刋於巖中古記云六國共修自平地積薪至於巖巔從上鐫鑿其龕室佛像功畢旋旋折薪而下然後梯空架險而上其上有散花樓七佛用金蹄銀角犢兒由西閤懸梯而上其間千房萬屋縁空躡虚登之者不敢回頋將及絶頂有萬菩薩堂鑿石而成廣古今之大殿其雕梁畫栱繡棟雲楣並就石而成萬軀菩薩列於一堂自此室之上更有一龕謂之天堂空中倚一獨梯攀縁而上至此則萬中無一人敢登者於此下顧其羣山皆如培塿王仁裕時獨能登之仍題詩於天堂西壁上曰躡盡懸空萬仞梯等間身共白雲齊簷前下視羣山小堂上平分落日低絶頂路危人少到古巖松健鶴頻棲天邊為要留名姓拂石殷勤手自題時前唐末辛未年登此留題于今三十九載矣出玉堂閒話斗山觀漢乾祐中翰林學士王仁裕云興元有斗山觀自平川内聳起一山四面懸絶其上方於斗底故號之薜蘿松檜景象尤竒上有唐公昉飲李八百仙酒全家拔宅之跡其宅基三畆許陷為坑此蓋連地而上昇也仁裕辛巳嵗於斯為節度判官嘗以片板題詩於觀曰霞衣欲舉醉陶陶公昉一家飲八百洗瘡一家酒醉而上昇不覺全家住絳霄拔宅只知雞犬在上天誰信路岐遥三清遼廓抛塵夢八景雲烟事早朝為有故林蒼栢健露華涼葉鎖金飈舊説云斗山一洞西去二千里通青城大面山又與嚴真觀井相通仁裕癸未年入蜀因謁嚴真觀見斗山詩碑在焉詰其道流云不知所来説者無不異之出玉堂閒話大竹路興元之南有大竹路通於巴州其路則深谿峭巖捫蘿摸石一上三日而達於山頂行人止宿則以縆蔓繫腰縈樹而寝不然則墮於深澗若沈黄泉也復登措大嶺蓋有稍似平處路人徐步而進若儒之布武也其絶頂謂之孤雲兩角彼中謠云孤雲兩角去天一握淮隂侯廟在焉昔漢祖不用韓信信遯歸西楚蕭相國追之及於兹山故立廟貌王仁裕嘗佐褒梁師王思同南伐巴人往返登陟亦留題於淮隂祠詩曰一握寒天古木深路人猶説漢淮隂孤雲不掩興亡䇿兩角曾懸去住心不是冕旒輕布素豈勞丞相逺追尋當時若放還西楚尺寸中華未可侵﨑嶇險峻之狀未可殫言出玉堂閒話溪溪毒江南間有溪毒疾發時如重傷寒識之者取小筆管内於鼻中以指弹之三五下即出墨血良久疾愈不然即致卒矣出録異記太平廣記卷三百九十七
