body:
  text: 太平廣記卷四百七宋李昉等編草木二異木主一州樹偃桑不晝木蚊子樹聖鼔枝鹿木倒生樹黝木桄榔𣗳恠松楓人楓鬼楓生人靈楓破木有肉江中楓材河伯下材鬭蛟船木交讓木千嵗松汗杖化蝶𣗳涪水材端正𣗳崇賢里槐三枝槐癭槐荆根枕五重桑蜻蜓樹無患木醋心樹登第皁荚辨白檀樹藟蔓藤實杯鍾藤人子藤蜜草蔓胡草蔓野狐絲異木主一州樹東方荒外有豫章焉此樹主一州其髙千丈圍百丈本上三百丈本有枝條敷張如帳上有𤣥狐黑猿樹主一州南北並列面向西南有九力士操斧伐之以占九州吉㐫斫復其州有福創者州伯有病積嵗不復者其州滅亡亡言州死復者木創復也出神異經偃桑東方有樹焉髙八十丈敷張自輔其葉長一丈廣六七尺名曰桑其上自有蠶作繭長三尺繰一繭得絲一觔有椹焉長三尺五寸圍如長桑是偃桑但樹長大耳出神異經不晝木荒外有火山其中生不晝之木晝夜火燃得曝風不猛猛雨不滅出神異經蚊子樹有樹如冬青實生枝間形如枇杷子每熟即坼裂蚊子羣飛唯皮殻而已土人謂之蚊子樹出嶺南異物志聖鼓樹舎沂縣滃水口下東岸有聖鼓即楊山之鼔枝也横在川側衝波所激未嘗移動衆鳥飛鳴莫有萃者船人悞以篙觸必患瘧出酉陽雜俎鹿木武陵郡北有鹿木二株馬伏波所種木多節出酉陽雜俎倒生木倒生木此木依山生根在上有人觸則葉翕人去則葉舒出東海出酉陽雜俎黝木黝木節以蠱獸可以為鞭桄榔樹古南海縣有桄榔樹峯頭生葉有麫大者出麫乃至百斛以牛乳噉之甚美出酉陽雜俎怪松南康有怪松從前刺史每令畫工寫松必數枝衰悴後因一客與妓環飲其下經日松死出酉陽雜俎楓人田種嶺中諸山多楓樹樹老多有瘤癭忽一夜遇暴雷驟雨其樹贅則暗長三數尺南人謂之楓人越巫云取之雕刻神鬼異致靈驗出嶺表録異楓鬼臨川記云撫州麻姑山或有登者望之廬嶽彭蠡皆在其下有黄連厚朴恒山楓樹數千年者有人形眼鼻口臂而無脚入山者見之或有砟之者皆出血人皆以藍冠於其頭眀日看失藍為楓子鬼出十道記楓生人江東江西山中多有楓木人於楓樹下生似人形長三四尺夜雷雨即長與樹齊見人即縮依舊曽有人合笠於明日看笠子挂在樹頭上旱時欲雨以竹束其頭禊之即雨人取以為式盤極神驗楓木棗地是也出朝野僉載靈楓南中有楓子鬼楓木之老者人形亦呼為靈楓焉出述異記破木有肉有人破大木木中有肉可五觔如熟猪肉出稽神録江中楓材循海之間每搆屋即令民踏木於江中短長細大唯所取率松材也彼俗常用不知古之何人斷截埋泥砂中既不朽蠧又多如是事可異者出嶺南異物志河伯下材中宿縣山下有神宇溱水至此沸騰鼔怒槎木汎至此淪没竟無出者世人以為河伯下材出酉陽雜俎鬭蛟船木樟木江東人多取為船船有與蛟龍鬭者出酉陽雜俎交讓木武陵郡記白雉山有木名交讓衆木敷榮後方萌芽亦更嵗迭榮也出酉陽雜俎千嵗松玉策記稱千嵗松樹四邊披越上杪不長望而視之有如偃葢其中有物如青犬或如人皆夀萬嵗出抱朴子汗杖東方朔西那汗國迴得聲木十枚帝以賜大臣人有疾則杖汗將死則折里語生年未半杖不汗出酉陽雜俎化蝶樹長安城禁苑内一大樹冬月雪中忽花葉茂盛及凋落結實其子光眀璨爛如火之眀焉數日皆化為紅蛱蝶飛去至眀年唐髙祖自唐國入長安此必前兆也出瀟湘録涪水材梓潼郪縣唐大厯七年夏六月甲子涪水汎溢流木數千條梁棟榱桷具備補内城屋悉此木喬林為之記出洽聞記端正樹長安西端正樹去馬嵬一舍之程乃唐徳宗皇帝幸奉天覩其蔽芾錫以美名後有文士經過題詩逆旅不顯姓名詩曰昔日偏霑雨露榮徳皇西幸賜嘉名馬嵬此去無多地合向楊妃冡上生風雅有如此焉出杼情詩崇賢里槐唐陳朴者元和中崇賢里北街大門外有槐樹嘗黄昏徙倚窺外見若婦人及老狐異鳥之類飛入樹中遂伐視之樹凡三槎並空中一槎中有獨頭栗一百二十一枚中襁一死兒長尺餘出酉陽雜俎三枝槐唐相國李石河中永樂有宅庭槐一本抽三枝直過堂前屋脊一枝不及相國同堂昆弟三人曰石日而皆登宰執唯福一人厯七鎮使相而已癭槐華州三家店西北道邊有槐甚大葱鬱周迴可蔭數畝槐有癭形如二豬相趂奔走其迴顧口耳頭足一如塑者出奇聞録荆根枕賈人張宏者行至華嶽廟前忽昏懵前進不可繫馬於一金荆樹而酣睡馬驚拽出樹根而走寤逐而及之樹根形如獅子毛爪眼耳足尾無不悉具乃於華陰縣求木工修之為一枕獻於廟守廟者常以匱鏁之行人聞者賂守廟者百錢始獲一見出奇聞録五重桑洛中願㑹寺魏中書侍郎王翊捨宅立也佛堂前生桑樹一株直上五尺枝條横遶柯葉傍布形如羽葢復髙五尺又然凡為五重每一重葉椹各異京師道俗謂之神桑觀者甚衆帝聞而惡之以為惑衆命給事黄門侍郎元紀伐殺之其日雲霧晦冥下斧之處流血至地見者莫不悲泣出洛陽伽藍記蜻蜓樹昔婁約居常山据禪座有一野嫗手持一樹植之於庭言此是蜻蜓樹嵗乆芬芳鬱茂有一烏身赤尾長常止息其上出酉陽雜俎無患木無患木燒之極香辟惡氣一名噤婁一名桓昔有神巫曰璠􅀈能符劾百鬼擒魑魅以無患木擊殺之世人競取此木為器用却鬼因曰無患木出酉陽雜俎醋心樹杜師仁嘗賃居庭有巨杏樹隣居老人每擔水至樹側必歎曰此樹可惜杜詰之老人云某善知木病此樹有疾某請治乃診樹一處曰樹病醋心杜染指於蠧處嘗之味若薄醋老人持小鈎披蠧再三鈎之得一白蟲如蝠乃傅藥於瘡中復戒曰有實自青皮時必標之十去八九則樹活如其言樹益茂盛矣又云嘗見栽植經三卷言木有病醋心者出酉陽雜俎登第皁荚泉州文宣王廟庭宇嚴峻學校之盛冠於藩府庭中有皁荚樹每州人將登第則生一荚以為常矣梁真眀中忽然生一荚有半人莫諭其意乃其年州人陳逖進士及第黄仁穎學究及第仁穎恥之復登進士舉至同光中舊生半荚之所復生全荚其年仁穎及第後數年廟為火焚其年閩自稱尊號不復貢士遂至於今出稽神録辨白檀樹劍門之左峭巖間有大樹生於石縫之中大可數圍枝榦純白皆傳曰白檀樹其下常有巨虺蟠而䕶之民不敢採伐又西巖之半有志公和尚影路人過者皆西向擎拳頂禮若親面其如来王仁裕癸未嵗入蜀至其巖下注目觀之以質向来傳說時值晴朗溪谷洗然遂勒轡移時望之其白檀乃一白栝樹也自厯大小漫天夹路溪谷之間此類甚多安有檀香虵遶之事又西瞻志公影葢巖間有圓柏一株即其笠首也兩面有上下石縫限之為身形斜其縫者即袈裟之文也上有苔蘚斑駮即山水之毳文也方審其非白檀志公不留影於此眀矣乃知人之誤傳者何限哉出玉堂閑話藟蔓藤實杯藤實杯出西域藤大如臂葉似葛花實如梧桐實成堅固皆可酌酒自有文章映徹可愛實大如杯味如荳蔲香美消酒士人提酒来至藤下摘花酌酒乃以其實消醒國人寳之不傳於中國張騫入宛得之事在張騫出闗志出炙轂子鍾藤松楨即鍾藤也葉大者晉安人以為盤出酉陽雜俎人子藤安南有人子藤紅色在蔓端有刺其子如人狀崑崙燒之集象南中亦難得出酉陽雜俎蜜草蔓北天竺國出蜜草蔓生大葉秋冬不死因重霜露遂結成蜜如塞上蓬鹽出酉陽雜俎胡蔓草胡蔓草此草在邕間叢生花偏如梔子稍大不成朶色黄白葉稍異悞食之數日卒死飲白鵝白鴨血則解或以物投之祝曰我買你食之不死出酉陽雜爼野狐絲有草蔓生色白花微紅大如粟秦人呼為野狐絲出酉陽雜爼太平廣記卷四百七
