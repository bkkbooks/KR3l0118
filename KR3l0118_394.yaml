body:
  text: 陳鸞鳳陳鸞鳳唐元和中有陳鸞鳳者海康人也負氣義不畏鬼神鄉黨咸呼為後來周處海康者有雷公廟邑人虔潔祭祀禱祝既淫妖妄亦作邑人每歲聞新雷日記某甲子一旬復值斯日百工不敢動作犯者不信宿必震死其應如響時海康大旱邑人禱而無應鸞鳳大怒曰我之鄉乃雷鄉也為神不福況受人奠酹如斯稼穡既焦陂池已涸牲牢饗盡焉用廟為遂秉炬爇之其風俗不得以黃魚彘肉相和食之亦必震死是日鸞鳳持竹炭刀于野田中以所忌物相和啖之將有所伺果怪云生惡風起迅雷急雨震之鸞鳳乃以刃上揮果中雷左股而斷雷墮地狀類熊豬毛角肉翼青色手執短柄剛石斧流血注然云雨盡滅鸞鳳知雷無神遂馳赴家告其血屬曰吾斷雷之股矣請觀之親愛愕駭共往視之果見雷折股而已又持刀欲斷其頸嚙其肉為群衆共執之曰霆是天上靈物爾為下界庸人輒害雷公必我一鄉受禍衆捉衣袂使鸞鳳奮擊不得逡巡復有云雷裹其傷者和斷股而去沛然云雨自午及酉涸苗皆立矣遂被長幼共斥之不許還舍于是持刀行二十里詣舅兄家及夜又遭霆震天火焚其室復持刀立于庭雷終不能害旋有人告其舅兄向來事又為逐出復往僧室亦為霆震焚熱如前知無容身處乃夜秉炬入于乳穴嵌孔之處后雷不復能震矣三暝然后返舍自后海康每有旱邑人即醵金與鸞鳳請依前調二物食之持刀如前皆有云雨滂沱終不能震如此二十余年俗號鸞鳳為雨師至大和中刺史林緒知其事召至州詰其端倪鸞鳳云少壯之時心如鐵石鬼神雷電視之若無當者願殺一身請蘇萬姓即上玄焉能使雷鬼敢騁其凶臆也遂獻其刀于緒厚酬其直建州山寺唐柳公權侍郎嘗見親故説元和末止建州山寺夜半覺門外喧鬧潛于窗櫺中窺之見數人運斤造雷車宛如圖畫者久之一嚏氣忽斗暗其人雙目遂昏蕭氏子唐長慶中蘭陵蕭氏子以膽勇稱客遊湘楚至長沙郡舍于仰山寺是夕獨處撤燭忽暴雷震蕩簷宇久而不止俄聞西垣下窸窣有聲蕭恃膂力曾不之畏榻前有巨捶持至垣下俯而撲焉一舉而中有聲甚厲若呼吟者因連撲數十聲遂絶風雨亦霽蕭喜曰怪且死矣逮曉西垣下睹一鬼極異身盡青傴而庳有金斧木楔以麻縷結其體焉瞬而喘若甚困狀于是具告寺僧觀之或曰此雷鬼也蓋上帝之使耳子何為侮于上帝禍且及矣里中人具牲酒祀之俄而云氣曛晦自室中發出戶升天鬼亦從去既而雷聲又興僅數食頃方息蕭氣益鋭里中人皆以壯士名焉周洪唐處士周洪云寶歷中邑客十余人逃暑會飲忽驟風雨有物墮如玃兩目睒睒衆驚伏于床下倏忽上階周視俄失所在及雨定稍稍能起相顧但耳悉泥矣邑人云向來雷震牛戰鳥墜而邑客止覺殷殷然蕭浣唐蕭浣初至遂州造二幡剎施于寺齋慶畢作樂忽暴雷震剎俱成數十片至來歲雷震日浣死僧文淨唐金州水陸院僧文淨因夏屋漏滴于腦遂作小瘡經年若一大桃來歲五月后因雷雨霆震穴其贅文淨睡中不覺寤后唯贅痛遣人視之如刀割有物隱處乃蟠龍之狀也徐智通唐徐智通楚州醫士也夏夜乘月于柳堤間步忽有二客笑語于河橋不虞智通之在陰翳也相謂曰明晨何以為樂一曰無如南海赤岩山弄珠耳答曰赤岩主人嗜酒留客必醉仆來日未后有事于西海去恐復為縈滯也不如只于此郡龍興寺前與吾子較技耳曰君將何戲曰寺前古槐僅百株我霆震一聲剖為纖莖長短粗細悉如食箸君何以敵答曰寺前素為郡之戲場每日中聚觀之徒通計不下三萬人我霆震一聲盡散其發每縷仍為七結二人因大笑約諾而去智通異之即告交友六七人遲明先俟之是時晴朗已午間忽有二云大如車輪凝于寺上須臾昏黑咫尺莫辨俄而霆震兩聲人畜頓踣及開霽寺前槐林劈櫛分散布之于地皆如算子大小洪纖無不相肖而寺前負販戲弄觀看人數萬衆發悉解散每縷皆為七結又洛京天津橋有儒生逢二老人言話風骨甚異潛聽之云明日午時于寺中斗疾速一人曰公欲如何一人曰吾一聲令寺內聽講驢馬盡結尾一人曰吾一聲令十丈幡竿盡為算子仍十枚為一積儒生乃與一二密友于寺候之至午果雷雨霹靂一聲客走出視驢馬數百匹盡結尾一聲幡竿在廊下為算子十枚一積雷公廟雷州之西雷公廟百姓每歲配連鼓雷車有以魚彘肉同食者立為霆震皆敬而憚之每大雷雨后多于野中得黳石謂之雷公墨叩之鈖然光瑩如漆又如霹靂處或土木中得楔如斧者謂之霹靂楔小兒佩帶皆辟驚邪孕婦磨服為催生藥必驗南海南海秋夏間或云物慘然則見其暈如虹長六七尺此候則颶風必發故呼為颶母見忽有震雷則颶風不作矣舟人常以為候預為備之陳義唐羅州之南二百里至雷州為海康郡雷之南瀕大海郡蓋因多雷而名焉其聲恆如在簷宇上雷之北高亦多雷聲如在尋常之外其事雷畏敬甚謹每具酒肴奠焉有以彘肉雜魚食者霹靂輒至南中有木名曰掉以煮汁漬梅李俗呼為棹汁雜彘肉食者霹靂亦至犯必響應牙門將陳義傳云義即雷之諸孫昔陳氏因雷雨晝冥庭中得大卵覆之數月卵破有嬰兒出焉目后日有雷扣擊戶庭入其室中就于兒所似若乳哺者歲余兒能食乃不復至遂以為己子義即卵中兒也又云嘗有雷民畜畋犬其耳十二每將獵必笞犬以耳動為獲數未嘗偕動一日諸耳畢動既獵不復逐獸至海旁測中嗥鳴郡人視之得十二大卵以歸置于室中后忽風雨若出自室既霽就視卵破而遺甲存焉后郡人分其卵甲歲時祀奠至今以獲得遺甲為豪族或陰冥云霧之夕郡人呼為雷耕曉視野中果有墾迹有是乃為嘉祥又時有雷火發于野中每雨霽得黑石或圓或方號雷公墨凡訟者投牒必以雷墨雜常墨書之為利人或有疾即掃虛室設酒食鼓吹幡蓋迎雷于數十里外既歸屠牛彘以祭因置其門鄰里不敢輒入有誤犯者為唐突大不敬出豬牛以謝之三日又送如初禮又云嘗有雷民因大雷電空中有物豕首鱗身狀甚異民揮刀以斬其物踣地血流道中而震雷益厲其夕凌空而去自后揮刀民居室頻為天火所災雖逃去輒如故父兄遂擯出乃依山結廬以自處災復隨之因穴崖而居災方止或云其刀尚存雷民圖雷以祀者皆豕首鱗身也葉遷韶唐葉遷韶信州人也幼歲樵牧避雨于大樹下樹為雷霹俄而卻合雷公為樹所夾奮飛不得遷韶取石楔開枝然后得去仍愧謝之約曰來日復至此可也如其言至彼雷公亦來以墨篆一卷與之曰依此行之可以致雷雨祛疾苦立功救人我兄弟五人要聞雷聲但喚雷大雷二即相應然雷五性剛躁無危急之事不可喚之自是行符致雨咸有殊效嘗于吉州市大醉太守擒而責之欲加楚辱遷韶于庭下大呼雷五時郡中方旱日光猛熾霹震一聲人皆顛沛太守下階禮接之請為致雨信宿大霪田原遂足因為遠近所傳遊滑州時方久雨黃河泛濫官吏備水為勞忘其寢食遷韶以鐵札長二尺立一符于河岸上水涌溢堆阜之形而沿河流下不敢出其符外人免墊溺如今傳之或有疾請符不擇筆墨書而援之皆得其效多在江浙間周遊好啖葷腥不修道行后不知所之元稹唐元稹鎮江夏襄州賈墅有別業構堂架梁才畢疾風甚雨時戶各輸油六七甕忽震一聲甕悉列于梁上都無滴汙于外是年稹卒裴用唐大和濮州軍吏裴用者家富于財年六十二病死既葬旬日霆震其墓棺飛出百許步尸柩零落其家即選他處重瘞焉仍用大鐵索系纜其棺未幾震如前復選他處重瘞不旬日震復如前而棺柩灰盡不可得而收矣因設靈儀招魂以葬東陽郡山唐東陽郡濱于浙江有山周數百里江水曲而環焉遷滯舟揖人頗病之常侍敬昕大和中出守其山一夕云物曛晦暴風雷電動蕩室廬江水騰溢莫不惶惑逮曉方霽人往視之已劈而中分相遠數百步引江流直而貫焉其環曲處悉填以石遂無縈繞之患段成式伯唐段成式三從伯父少時于陽羡親舊舍夜值雷雨每電起光中見有人頭數十大于栲栳智空唐晉陵郡建元寺僧智空本郡人道行聞于里中年七十余一夕既闔關忽大風雷若起于禪堂殷然不絶燭滅而塵坌晦黑且甚簷宇搖震矍然自念曰吾棄家為僧逮茲四紀暴雷如是豈神龍有怒我者不然有罪當雷震死耳既而聲益甚復坐而祝曰某少學浮屠氏為沙門逮五十余年豈所行乖于釋氏教耶不然且有黷神龍耶設如是安敢逃其死儻不然則願亟使開霽俾舉寺僧得自解也言竟大聲一舉若發左右茵榻傾糜昏霾顛悖由是驚懾仆地僅食頃聲方息云月晴朗然覺有腥腐氣如在室內因燭視之于垣下得一蛟皮長數丈血滿于地乃是禪堂北有槐高數十尋為雷震死循理而裂中有蛟蟠之迹焉
