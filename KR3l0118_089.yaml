body:
  text: 釋道安釋道安釋道安姓魏氏常山扶柳人也家世為儒早失覆蔭為外兄孔氏所養年七歲讀書再覽能誦鄉鄰嗟異至年十二出家神性聰敏而形貌甚陋不為師之所重數歲之後方啟師求經與辯意經一卷可五千言安齎經入田因休息就覽暮歸以經還師更求餘者師曰昨經未讀今復求耶答曰即以闇誦師雖異之而未言也復與成具光明經一卷不減一萬言齎之如初暮復還師師執覆之不差一字師大驚嗟敬而異之後為受具戒原作戒具據明鈔本改恣其遊學至鄴遇佛圖澄因事澄為師及石氏將亂與弟子惠遠等四百餘人渡河南遊夜行值雷雨乘電光而進前行得人家見門里有一馬樁樁之間懸一馬兜可容一斛安使呼林百升百升謂是神人厚相賞接既而弟子問何以知其姓字安曰兩木為林兜容百升也既達襄陽復宣佛法時襄陽習鑿齒鋒辯天逸籠罩當時其先藉安高名及聞安至止即往修造既坐稱言四海習鑿齒安曰彌天釋道安時人以為名答時苻堅素聞安名每云襄陽有釋道安是神器方欲致之以輔朕躬後遣苻平南攻襄陽安與朱序俱獲於堅堅謂芍僕射權翼曰朕以十萬之師取襄陽唯得一人半翼曰誰耶堅曰安公一人習鑿齒半人也既至住長安五重寺初堅承石氏之亂至是戶民殷富四方略定唯建業一隅未能克伏每與侍臣談語未嘗不欲平一江左堅弟平陽公融及朝臣石越原紹等並切諫終不能廻眾以安為堅所信敬乃共請曰主上將有事東南公何能不為蒼生致一言耶會堅出東苑命安外輦同載仆射權翼諫曰臣聞天子法駕侍中陪乘道安毀形寧可參廁堅勃然作色曰安公道德可尊朕以天下不易輿輦之榮未稱其德即敕仆射扶安登輦俄爾顧謂安曰朕將與公南遊吳越整六師而巡狩陟會稽以觀滄海不亦樂乎安對曰陛下應天御世有八州之富居中土而制四海宜栖神無為與堯舜比隆今欲以百萬之師求厥田下之土且東南一隅地卑氣厲禹遊而止舜狩而殂秦王適而不歸以貧道觀之非愚心所同也平陽公懿戚石越重臣謂并不可猶尚見距貧道輕淺言必不允既荷厚遇故盡丹誠耳堅曰非為地不廣民不足治也將簡天心明大運所在耳順時巡狩亦著前典若如師言則先帝王無省方之文乎安曰若鑾駕必動可先幸洛陽抗威蓄銳傳檄江南如其不伏伐之未晚堅不從遣平陽公融等精銳二十五萬為前鋒堅躬率步騎六十萬至須城晉遣征虜將軍謝石徐州刺史謝玄距之堅前軍大潰於八公山晉軍遂北三十餘里堅單騎而遁如所諫焉安註諸經恐不合理乃誓曰若所說不甚遠遠原作道據明鈔本改理願見瑞相乃夢見道人頭白眉長語安云君所註經殊合道理我不得入泥洹住在西域當相助通可時時設食後十十原作日據高僧傳改誦律至遠公乃知和尚所夢賓頭盧也後至秦建元二十一年正月二十七日忽有異僧形甚庸陋來寺寄宿寺房既窄處之講堂時維那值殿夜見此僧從窗而出入遽以白安安驚起禮訊問其來意答云特相為來安曰自惟罪深詎可度脫答云甚可以度耳安請問來生所生之處彼乃以手虛撥天之西北即見云開備睹兜率妙勝之極安至其年二月八日忽告眾曰吾當去矣是日齋畢無疾而卒葬城內五級寺中是歲晉太元元年也出高僧傳釋道安本姓魏常山扶柳今河北冀縣人家里世代都是讀書人早年父母雙亡自小由外兄孔氏撫養七歲開始讀書能夠過目不忘立即背誦為鄰人贊歎稱奇十二歲剃度出家雖然神性聰敏但因形貌又黑又丑不為師父所看重几年之後才開始要經書學習師父給一卷辯意經約五千餘字道安帶上經書下地干活休息的時候就看經書晚上收工回來把經書退還師父再借別的經書看師父說昨天給你的那本經書還沒讀完怎么又要別的呢道安答道昨天那書已能默誦了師父對此雖然感到驚異但也沒說什么又給他一卷成具光明經不少於一萬字他拿到手後還像讀上一本一樣第二天晚上收工回來又還給師父師父拿著經書讓他背誦結果一字不差師父甚為驚訝敬重他的才華改變了原來對他的態度後來為他受具足戒還特意允許他可以任意出外遊學道安到了鄴都遇見佛圖澄便師事佛圖澄後來石氏政權要發生內亂道安與弟子惠遠等四百餘人渡過黃河南下一天晚上赶路時遇上了雷雨他們借著閃電的光亮行進走著走著面前出現了一戶人家只見大門里面有個栓馬樁兩樁之間挂著個馬兜能盛一斛一百升為一斛東西道安讓別人呼喚林百升林百升說道安是個神人所以厚禮接待了他們後來弟子問他怎么能知道那個人的姓名道安說因為那兩根樁二木為林字那個馬兜可以盛下百升到達襄陽後道安就在那里宣講佛法當時襄陽有個習鑿齒能言善辯名噪一時原先他是因道安而使自己出了名听說道安到了襄陽便去拜訪他敘座之後習鑿齒自己炫耀說四海習鑿齒意思是說自己的名聲搖揚四海之間道安則說彌天釋道安意思是說普天之下無人不知道釋道安的名字這次對話在當時很有名氣尤其是道安的對答成為一時的名對符堅素聞釋道安的名氣常跟人說道襄陽有個釋道安是神才正想把他召致來讓他輔佐我後來他派符平南下攻打襄陽道安與朱序都被抓獲送給了符堅符堅對仆射權翼說朕以十萬大軍攻取襄陽只為得到一個半人權翼問道這一個半人是誰符堅說道安是一個人習鑿齒是半個人道安到了長後住在長安五重寺符堅當初接受了石氏的混亂江山到現在已經人口興旺生活富裕周圍邦國基本被平定唯獨建業一方面未能克服他常與大臣們談論時時刻刻都想平息江東一帶符堅的弟弟平陽公符融與朝廷大臣石越原紹等一起懇切地勸阻他但他一直不能改變自己的主意他們以為道安是符堅最為信服敬重的人便共同請求他道我主要向東南出兵您怎么能不為了蒼生而勸他一句呢正赶上符堅從東苑里出來命道安坐在自己車的一邊仆射權翼勸諫道臣聞天子的車駕只能由侍中陪坐道安剃度毀形哪能坐在您旁邊符堅厲聲斥道道安公的道德令人尊重朕以天下都換不過他讓他與我同車的榮譽也不能與他的道德相稱當即敕令仆射扶著道安上車不一會兒符堅看著道安對他說朕將要與你南遊吳越統領六軍南下巡視登上會稽以觀滄海不也是件很愜意的事嗎道安說陛下順應天命而管領天下今有八州之多的疆土居於中原而統治四方應當息神無元為而休養生息與堯舜二世比賽昌盛現在想以百萬之師要爭奪的不過是那塊不毛之地況且這東南一帶地處偏僻氣候惡劣大軍行動極為不利當年禹帝巡遊到那里就不能前進舜帝巡狩死在那里秦王到了那里也沒有回來以貧道之見不同意出兵吳越平陽公是至親吳越是重臣他們一致說不可以尚且被拒絕貧道如此輕淺我的話肯定不能應允但因既蒙陛下厚遇所以理當竭盡赤誠而已符堅說不是因為地盤不大人口不多不足以治理為的是要擴大天意的影響彰明天運無處不在罷了朕應天時而巡狩四方也符合前人的法則如果像大師所說的那樣那么先前的帝王豈不沒有視察四方的舉動和文字記載了嗎道安說如果鑾駕一定要出巡可以先到洛陽在那里抗御強敵的威脅積蓄自己的力量向江南下一道征討的文書如果他們不順服然後興兵討伐也不算晚符堅沒有听從派遣平陽公符融等精銳部隊二十五萬為前鋒符堅親率步騎六十萬揮師南下到了須城東晉派遣征虜將軍謝石徐州刺史謝玄統兵迎戰符堅的前鋒部隊大敗於八公山晉軍便向北推進了三十餘里符堅單人獨騎落荒而逃正像道安所勸諫他說的那樣道安注釋了許多佛經唯恐自己的注解不合於教義便發誓說如果所說的與佛理相差不大祈願佛祖顯示吉祥之象於是夢見一位道人滿頭白發長長的眉毛告訴道安你所注釋的經書非常符合佛理我不能入泥淖世俗住在西域會幫助你通達的你可時時擺設供食後十誦律至遠公乃知和尚所夢賓的頭顱了到了前秦建元二十一年正月二十七日忽然有個異僧形貌很髒很丑來到寺廟寄宿因為寺房狹窄便把他安置在講經堂上當時維那值班守殿夜里看見此僧從窗口出入立即報告了道安道安慌忙起床按照禮節去詢問他問及他的來意時答道特意為你而來道安說自覺罪孽深重怎么可以度脫答道完全可以超度了道安請問來生生在什么地方他便用手在空中撥了撥西北方向的天頓見那邊云霧散開清清楚楚地看見兜率妙勝之極道安於這年二月八日突然告訴大家說我要離去了這一天齋戒完畢後他沒有任何疾病就去世了安葬在城內五極寺中這一年是晉太元元年鳩摩羅什此云童壽天竺人也善經律論化行於西域及東遊龜茲龜茲王為造金獅子座一處之時苻堅僭號關中有外國前部王及龜茲王弟并來朝堅堅引見二王說堅云西域多產珍奇請兵往定以求內附至堅建元十三年正月太史奏云有星見外國分野當有大德智人入輔中國堅曰朕聞西戎有鳩摩羅什襄陽有沙門道安將非此耶即遣使求之至十七年二月鄯善上前部王等又說堅請兵西伐十八年九月堅遣驍將呂光凌江將軍姜飛將前部王及車師王等率兵七萬西伐龜茲臨發堅餞光於建章謂光曰夫帝王應天而治以子愛蒼生為本豈貪其地而伐之正以懷遠之人故也朕聞西域有鳩摩羅什深解法相善閒陰陽為後學之宗朕甚思之賢哲者國之大寶若克龜茲即馳驛送什光軍未至什謂龜茲王白純曰國運衰矣尚有勁敵從東方來宜恭承之勿抗其鋒純不從而戰光遂破龜茲殺純立純弟震為主光既獲什未測其智量見年齒尚少及以凡人戲之強妻以龜茲王女什拒而不受辭甚苦至光曰道士之操不逾先父何所因辭乃飲以醇酒同閉密室什被逼既至遂虧其節或令騎牛及乘惡馬欲使墮落什常懷忍辱曾無異色光慚愧而已光還中路置軍於山下將士已休什曰不可在此必見狼狽宜徙軍隴上光不納至夜果有大雨洪潦暴起水深數丈死者數千光始密而異之什謂光曰此凶亡之地不宜淹留推遷揆數應速言歸中路必有福土可居光從之至涼州聞苻堅已為姚萇所害光三軍縞素大臨城南於是竊號關外年稱太安太安二年正月姑臧大風什曰不祥之風當有奸叛然不勞自定也俄爾梁謙彭晃相系而反尋亦殄滅至光龍飛二年張掖臨松盧水胡沮渠男成及從弟蒙遜反推建康太守段業為主遣庶子秦州刺史太原公纂率眾五萬討之時論謂業等烏合纂有威聲勢必全克光以訪什什曰觀察此行未見其利既而纂敗績於合黎俄有郭作亂纂委大軍輕還為听敗僅以身免光中書監張資文翰溫雅光甚器之資病光博營救療有外國道人羅叉云能差資疾光喜給賜甚重什知叉誑詐告資曰叉不能為徒煩費耳冥運雖隱可以事試也乃以五色絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須臾灰聚浮出復繩本形既叉治無效少日資亡頃之光又卒子紹襲位數日光庶子纂殺紹自立稱元咸寧咸寧二年豬生子一身三頭龍出東箱井中到殿前蟠臥比旦失之纂以為美瑞號大殿為龍翔殿俄而有黑龍升於當陽九宮門纂改為龍興門什奏曰此日潛龍出遊豕妖來異龍者陰類出入有時而今屢見則為災眚必有下人謀上之變宜克己修德以答天戒纂不納與什博戲殺棋曰斫胡奴頭什曰不能斫胡奴頭胡奴將砟人頭此言有旨而纂終不悟也光弟保有子名超超小字胡奴後果殺纂斬首立其兄隆為主時人方驗什之言也什住涼積年呂光父子既不弘道教故蘊其深解無所宣化苻堅已亡竟不相見及姚萇僭有關中亦挹其高名虛心要請呂以什智計多解恐為姚謀不許東入及萇卒子興襲位復遣敦請興弘始三年三月有樹連理生於廟庭逍遙園蔥變為菃以為美瑞謂智人應入至五月興遣隴西公碩德西伐呂隆隆軍大破至九月隆上表歸降方得迎什入關以其年十二月二十日至於長安興待以國師之禮甚見优寵自大法東被始於漢明涉歷魏晉經論漸多而支竺所出多滯文格義興少崇三寶銳志講集什既至止仍請入西明閣及逍遙園譯出眾經什既率多諳誦無不究盡轉能漢言音譯流便既覽舊經義多紕僻皆由先度失旨不與梵本相應於是興使沙門僧栔僧遷法欽道流道恒道標僧睿僧肇等八百餘人諮受什旨更令出大品什持梵本興執舊經以相讎校其新文異舊者義皆圓通眾心愜伏莫不欣贊什為人神情鑒徹傲岸出群應机領會鮮有其匹且篤性仁厚泛愛為心虛己善誘終日無倦姚興常謂什曰大師聰明超悟天下莫二若一旦後世何可使法種無嗣遂以妓女十人逼令受之自爾已來不住僧坊別立廨舍供給丰盈每至講說常先自說譬譬如臭泥中生蓮華但採蓮花勿取臭泥也什初在龜茲從卑摩羅叉律師受律卑摩後入關中什聞至欣然師敬盡禮卑摩未知被逼之事因問什曰汝於漢地大有重緣受法弟子可有几人什答云漢境經律未備新經及諸論等多是什所傳出三千徒眾皆從什受法但什累業障深故不受師敬耳又杯渡比丘在彭城聞什在長安乃歎曰吾與此子戲別三百餘年杳然未期遲有遇於來生耳什未終少日覺四大不愈乃口出三番神咒令外國弟子誦之以自救未及致力轉覺危殆於是力疾與眾僧告別曰因法相遇殊未盡心方復後世惻愴何言自以暗昧謬充傳譚凡所出經論三百餘卷唯十誦一部未及刪繁存其本旨必無差失願凡所宣譚傳流後世咸共弘通今於眾前發誠實誓若所傳無謬者當使焚身之後舌不焦爛以偽秦弘始十一年八月二十日卒於長安是歲晉義熙五年也即於逍遙園依外國法以火焚尸薪滅形碎唯舌不灰耳出高僧傳鳩摩羅什意譯為童壽天竺人通曉經律論三藏佛典遊化於西域東遊龜茲時龜茲王為他建造金獅子一座安置他當時符堅統治關中有外國前部王與龜茲王弟一起朝見符堅符堅召見他們二王說符堅道西域多有珍奇特產請出兵征伐讓其歸附符堅建元十三年正月太史奏道有一個星座在外國邊界出現要有大德賢能的人物前來輔助中國符堅說朕听說西域有個鳩摩羅什襄陽有個沙門道安莫不就是他么立即派使去求他到了建元十七年二月鄯善國原先那個前部王等人又來遊說符堅請他出兵西伐十八年九月符堅派遣驍將呂光凌江將軍姜飛由前部王與車師王等陪同領兵七萬西征龜茲出發前符堅於建章為呂光餞行他對呂光說帝王順應天命而治天下要以慈愛蒼生為根本豈能為了貪占其土地而攻伐他們正是因為懷念遠方山人的緣故朕听說西域有個人叫鳩摩羅什精通佛家教義善長陰陽之學成為後學者的楷模膚非常思念他賢哲之人是國家的珍寶如果攻克龜茲要立即把鳩摩羅什送回來呂光的軍隊還沒到達龜茲時鳩摩羅什就對龜茲國王白純說國家的氣運已經衰微了又有強敵從東方打來應當恭順地服從他們不要與其交鋒白純不听他的勸告出兵與呂光交戰呂光攻破龜茲殺死白純他的弟弟白震為龜茲國王呂光得到鳩摩羅什後不知道他有多大的才學見他年紀尚輕便以常人對待并且戲弄他強迫他與龜茲王女兒結婚鳩摩羅什極力拒絕向呂光苦苦哀求呂光卻說道士的操行不過像你父親而已為什么要拒絕呂光讓他喝了美酒與妻子關到一間房子里什被逼著與妻子同房之後便損失了自己的操守呂光還讓他騎牛或騎沒有馴服的馬想要他摔下來出丑什忍受這些屈辱毫無怨怒之色呂光只好感到慚愧呂光在返回關中的途中把軍隊安置在山下將士們已經休息了什說不應住在這個地方住在這里會有危險的應該把軍隊轉移到平坦的地方去呂光沒有採納他的意見到了夜間果然下起了大雨山洪暴發水漲數丈淹死了几千人由此呂光才暗暗佩服他是個不尋常的人什對光說這個凶險的地方不易於久留推究起來應該赶緊往回走去關中的路上肯定有好地方可以住下呂光听從了他的話部隊行進到涼州听說符堅已被姚萇殺害呂光三軍都穿上了孝服兵臨城南呂光於是占領涼州自立為涼主年號稱為太安太安二年正月姑臧刮起了狂風什說這是不祥之風會有奸賊叛亂然而不用出兵叛敵就會自動平息的不久梁謙與彭晃接連謀反很快就被扑滅了到了呂涼龍飛二年張掖臨松盧水的胡人渠男成及其從弟沮渠蒙遜反叛推舉建康太守段業為國主呂光派遣庶子秦州刺史太原公呂纂率兵五萬前去討伐當時人們都評論說段業的人馬乃是烏合之眾呂纂又素有聲威此次征討必獲全勝呂光為此事去問鳩摩羅什什說我看這次行動不會勝利後來呂纂敗於合黎不久又有郭作亂呂纂輕率地讓大軍往回行進果被郭打敗只有他一人逃了回來呂光的中書監張資很有文才為人溫文爾雅很受呂光器重張資病了呂光不惜代价多方營救治療有個外國人叫羅叉說能治好張資的病呂光非常高興送給他很多東西鳩摩羅什知道羅叉在撒謊騙人告訴張資說羅叉根本不能治你的病白白浪費而已壽命長短雖然看不出來但可用一件事來試驗你的病能不能治好他以五色絲線搓成繩打成結燒成灰末扔在水里說如果灰末從水里浮出來還原繩病不能治愈不一會兒只見灰末聚攏在一起浮出水面又變成了繩的原形既然羅叉治療無效沒過几天張資就死了不久呂光又死了兒子呂紹承襲其位過了几天呂光的庶子呂纂殺死呂紹自立為王年號稱為咸寧咸寧二年有口豬生的崽一只身子上長著三個腦袋一只龍從東箱井中飛出飛到宮殿前面蟠臥起來第二天早上又不見了呂纂以為這是吉祥之兆命名大殿為龍翔殿沒過多久又有一條黑龍飛到當陽九宮門上呂纂改名為龍興門鳩摩羅什奏道這几天潛藏著的龍飛了出來豬妖也生下來奇異之物龍屬於陰類并不輕易出動如今連續出現說明要有災禍降臨肯定有人犯上作亂應當克制自己廣施仁德借以報答上天的驚戒呂纂沒有採納他的建議他與鳩摩羅什打賭賭注是我要砍掉胡奴的頭鳩摩羅什說不能砍掉胡奴的頭胡奴反要砍掉別人的頭這句話是有所指的而呂纂始終不明白呂光的弟弟呂保有個兒子叫呂超小名叫胡奴胡奴後來果然殺死呂纂砍下了他頭立他的哥哥呂隆為涼王這時人們才驗證了鳩摩羅什打賭時所說的那句話鳩摩羅什在涼地住了多年因為呂光父子從不弘揚佛教他只蘊藏起自己對佛理的深刻見解沒有机會進行宣化符堅雖然深慕其名但他死了一直沒有見到他姚萇在長安稱帝之後也仰慕鳩摩羅什的高名曾經虛心邀請而呂光父子因為羅什足智多能怕他為姚萇出謀旬策不放他東行到了姚萇逝世其子姚興繼位之後又曾派人敦請姚興弘始三年三月皇宮院內的逍遙園長了一棵連理樹蔥變為菃人們都說這是吉祥之兆要有才智之人應召入關五月姚興派遣隴西公碩德西征討伐呂隆呂隆的軍隊被打敗到了九月呂降上表歸降羅什才被迎接入關於十二月二十日來到長安姚興以國師之禮待他羅什備受尊寵自從佛教東傳以來從漢明帝開始歷經魏晉流傳在中國的經書日漸增多但這些經書是用印度梵文寫成的艱澀難懂姚興年輕時就推崇佛教經典有志於收羅通曉經典的進行講解羅什既已來到長安住下便請他在西明閣與逍遙園開始翻譯各種經書這些經書羅什過去大都熟讀過深刻而全面地研究過其中的含義後又熟練地掌握了漢語翻譯起來流暢輕便他發現原來的譯本文義有許多乖訛之處都出自當時譯者在理解上存在的偏差與梵文原著不相符合姚興於是讓沙門學者僧契僧遷法欽道流道恒道標僧睿僧肇等八百餘人都來請教接受羅什的見解共同從事翻譯工作又讓他們重新譯出大品經羅什手持梵文原著姚興拿著舊譯的經書互相對照校訂新的譯文與舊譯不同的地方都比原譯文意義圓滿通達眾人讀了無不稱心佩服大為欣賞鳩摩羅什為人神情開朗秉性坦率對於佛理能夠應机領會卓有見地很少有人比得上他他對人坦誠熱情忠厚仁慈心存博愛情懷他虛懷若谷循循善誘終日不倦姚興常跟羅什說大師聰明超悟天下第一一旦百年之後怎能使法種沒有後代便給他舞女十人強令他接受從那之後羅什不再住在僧舍另外有了住宅日常供給十分丰盈每到講說教義的時候常常以自身作譬喻譬如臭泥中生蓮花但採蓮花之高洁勿取臭泥之污濁羅什當初在龜茲時跟從卑摩羅叉律師學習音律卑摩後來也來到長安羅什听說後非常高興對他極盡師敬之禮卑摩不知道被逼接受舞女的事僅問羅什道你在漢地極有緣分跟你受法的弟子能有多少人羅什答道漢地經律尚未完備新譯的經書與許多論著多是我所出的三千徒弟都跟我學習佛法但我守戒奉佛的功業經常受到深重的障礙所以得不到他們對師父的敬重還有僧人杯度住在彭城听說羅什在長安便歎道要跟這小子開開玩笑縱使三百多年見不著他來生總有遇見他的時候羅什在臨終的前几天感到身體不舒服便口出三番神咒讓外國弟子念誦借此救治自己沒等咒語生效又覺生命危殆於是來了重病他與眾僧告別道因緣佛法與諸位相遇深感情念未盡現在又要離去悲痛傷感之懷難以表達以我之愚昧不明謬充傳譯之任所出經論三百餘卷只有十誦一部未及刪訂薄耵其本來旨意必定沒有差失願我平生所宣講的教義能夠流傳於世與大家共同弘揚研討佛法今於眾位面前我發誠實之誓如果所傳經義無謬誤者當使焚身之後舌不焦爛弘始十一年八月二十日鳩摩羅什逝世於長安這年是東晉義熙五年逝世後就在逍遙園依照西域習俗予以火化柴火熄滅後形體粉碎唯獨舌頭沒有變成灰燼法朗晉沙門康法朗學於中山永嘉中與一比丘西入天竺行過流沙千有餘里見道邊敗壞佛圖無復堂殿蓬蒿沒人法朗等下拜瞻禮見有二僧各居其旁一人讀經一人患痢穢污盈房其讀經者了不營視朗等惻然興念留為煮粥掃除浣濯至六日病者稍困注痢如泉朗等共料理之其夜朗等并謂病者必不起至明晨往視之容色光悅病狀頓除然屋中穢物皆是華馨朗等乃悟是得道之士以試人也病者曰隔房比丘是我和尚久得道惠可往禮覲法朗等先嫌讀經沙門無慈愛心聞已乃作禮悔過讀經者曰諸諸原作請據陳校本改君誠契并至同當入道朗公宿學業淺此世未得願也謂朗伴云惠若植根深當現世得願因而留之法朗後還山中為大法師道俗宗之出冥祥記晉代有個佛教僧侶康法朗修學佛道於中山永嘉年間與一個出家的僧人一起西遊去印度通過大沙漠後又走了一千餘里見道旁有一座破敗的寺廟殿堂已經沒有了雜草有一人高法朗等人走下路來前去拜謁見有兩個僧人分別坐在一旁一人正在讀經書一人患了痢疾滿屋子都是糞便那個讀經書的人都不聞不問法朗等人出於怜憫之心留下來為那個病人煮粥吃并為他打掃洗涮到第六天病人有些困乏痢瀉不止法朗等人一塊兒收拾料理這天夜晚法朗等人都說病人恐怕好不了了第二天早上去看他只見他容光煥發病狀全沒了但是屋里的糞便全變成了香花法朗等人這才省悟此人明明是個得道之士原來那副樣子是用來試驗他們的病人說隔壁房里那個僧人是我師父他已久得道惠你們可去見禮法朗等人原先嫌惡那人讀經的僧人毫無慈愛之心听了這番話後便向他賠禮道歉讀經和尚說諸位信守契約同時來到這里都應當得道但法朗平日學業尚成今生不能如願了對法朗的那個同伴說你的佛心植根很深現世即可如願於是把他留了下來法朗後來返回山中是一位大法師許多佛教徒無論是出家的還是從俗的都尊他為宗師李恒沙門晉李恒字元文譙國人少時有一沙門造恒謂曰君福報對至而復對來隨之君能守貧修道不仕宦者福增對滅君其勉之恒性躁又寒門但問仕宦當何所至了不尋究修道意也沙門與一卷經恒不肯取固問榮途貴賤何如沙門曰當帶金紫極於三郡若能於一郡止者亦為善道恒曰且當富貴何顧後患因留宿恒夜起見沙門身滿一床入呼家人窺視復變為大鳥跱屋梁上天曉而形如舊恒送出門忽不復見知是神人因此事佛而亦不能精至後為西陽江夏廬江太守加龍驤將軍太興中預錢鳳之亂被誅出法苑珠林
