body:
  text: 慕容垂慕容垂唐太宗征遼行至定州路側有一鬼衣黃衣立高冢上神彩特異太宗遣使問之答曰我昔勝君昔君今勝我今榮華各異代何用苦追尋言訖不見問之乃慕容垂墓李績女貞觀元年李績愛女卒葬北邙使家僮廬於墓側一日女子忽詣家僮曰我本不死被大樹之神竊我今值其神出朝西嶽故得便奔出知爾在此是以來我已離父母後有此辱恥不可歸幸爾匿我我能以致富報爾家僮駭愕良久乃許遂別置一室其女或朝出暮至或夜出曉來行步如風一月後忽攜黃金十斤以賜家僮受之出賣數兩乃民家所失主者執家僮以告洛陽令推窮其由家僮具述此事及追取此女已失其餘金盡化為黃石焉解襆人江南有數人行船見岸上兩人與船並行數里岸上人云暫寄歇息船人許之怪其跳躑上船其疾如風須臾兩人云暫至村各有小襆且寄船上慎勿開也殷勤戒之兩人去後船中一人解襆共看每襆有五百帖子似紙非篆隸並不可識共驚還結如故俄頃二人回云開訖何因諱乃捉解襆人云是此人解遂擲解襆上岸如擲嬰兒又於村中取人擁之而去經數日一人欲放解襆者一人不許曰會遣一二年受辛苦乃解至富人家其人家有好馬恆於庭中置槽自看飲飼此時已夜堂門閉欲取富人無由一人云此人愛馬解馬放即應開門出如言富人果出一人擔之應手即死取得富人遂棄解襆人而去此家忙懼唯見此人在即共毆縛之送縣以解襆等事為辭州縣不信遂斷死此人自雪無由久禁乃出漕店人貞觀中長安城西漕店人葬父母凶具甚華一二年後忽見亡弟來容貌憔悴言為兄厚葬父母之故被差為林皋驛馬祗承困苦不堪故來請兄代兄大驚懼更多與紙錢遣努力且作其後數月又見弟來云祗承不濟兄遂不免去其兄應時而卒張琮永徽初張琮為南陽令寢閣中聞階前竹有呻吟之聲就視則無所見如此數夜怪之乃祝曰有神靈者當相語其夜忽有一人從竹中出形甚弊陋前自陳曰朱粲之亂某在兵中為粲所殺尸骸正在明府閣前一目為竹根所損不堪楚痛以明府仁明故輒投告幸見移葬敢忘厚恩令謂曰如是何不早相聞乃許之明日為具棺櫬使掘之果得一尸竹根貫其左目仍加時服改葬城外其後令笞殺一鄉老其家將復仇謀須令夜出乃要殺之俄而城中失火延燒十餘家令將出按行之乃見前鬼遮令馬曰明府深夜何所之將有異謀令問為誰曰前時得罪於明府者令乃復入明日掩捕其家問之皆驗遂窮治之夜更祭其墓刻石銘於前曰身殉國難死不忘忠烈烈貞魂實為鬼雄劉門奴高宗營大明宮宣政殿始成每夜聞數十騎行殿左右殿中宿衛者皆見焉衣馬甚潔如此十餘日高宗乃使術者劉門奴問其故對曰我漢楚王戊之太子也門奴詰問之案漢書楚王與七國謀反漢兵誅之夷宗覆族安有遺嗣乎答曰王起兵時留吾在長安及王誅後天子念我置而不殺養於宮中後以病死葬於此天子憐我殮以玉魚一雙今在正殿東北角史臣遺略是以不見於書門奴曰今皇帝在此汝何敢庭中擾擾乎對曰此是我故宅今既在天子宮中動出頗見拘限甚不樂乞改葬我於高敞美地誠所望也慎無奪我玉魚門奴奏之帝命改葬發其處果得古墳棺已朽腐傍有玉魚一雙製甚精巧乃敕易棺櫬以禮葬之於苑外並以玉魚隨之於此遂絶閻庚張仁亶幼時貧乏恆在東都北市寓居有閻庚者馬牙荀子之子也好善自喜慕仁亶之德恆竊父資以給其衣食亦纍年矣荀子每怒庚云汝商販之流彼才學之士於汝何有而破産以奉仁亶聞其辭謂庚曰坐我纍君今將適詣白鹿山所勞相資不敢忘也庚久為仁亶胥附之友心不忍別謂仁亶曰方願志學今欲皆行仁亶奇有志許焉庚乃私備驢馬糧食同去六日至陳留宿逆旅仁亶舍其內房房外有牀久之一客後至坐于牀所仁亶見其視瞻非凡謂庚自外持壺酒至仁亶以酒先屬客客不敢受固屬之因與合飲酒酣歡甚乃同房而宿中夕相問行李客答曰吾非人乃地曹耳地府令主河北婚姻絆男女腳仁亶開視其衣裝見袋中細繩方信焉因求問己榮位年壽鬼言亶年八十餘位極人臣復問庚鬼云庚命貧無位祿仁亶問何以致之鬼云或絆得佳女配之有相當能得耳今河北去白鹿山百餘里有一村中王老女相極貴頃已絆與人訖當相為解彼絆此以成閻侯也第速行欲至其村當有大雨濡濕以此為信因訣去仁亶與庚行六七日至村遇大雨衣裝濕汙乃至村西求王氏舍焉款門久之方出謝客云家有小不得意所以遲遲無訝也仁亶問其故云己唯一女先許適西村張家今日納財非意單寡此乃相輕之義已決罷婚矣仁亶等相顧微哂留數日主人極歡仁亶乃云閻侯是己外弟盛年志學未結婚姻主人辭以田舍家然有喜色仁亶固求方許焉以馬驢及他繼為贄當日成親畢留閻侯止王氏仁亶獨往主人贈送之其後數年仁亶遷侍御史并州長史御史大夫知政事後庚纍遇提挈竟至一州明崇儼唐正諫大夫明崇儼少時父為縣令縣之門卒有道術儼求教教以見鬼方兼役使之法遺書兩卷儼閲之書人名也儼于野外獨處按而呼之皆應曰唯見數百人於是每須役使則呼其名無不立至者儼嘗行見名流合祔二親者輀車已出郊儼隨而行召其家人謂曰汝主君合葬二親乎曰然曰汝取靈柩得無誤發他人冢乎曰無儼曰吾前見紫車後有夫人年五十餘長大名家婦也而後有一鬼年甚壯寡髮弊衣距躍大喜而隨夫人夫人泣而怒曰合葬何謂也汝試以吾言白汝主君云明正諫有言如此祔親者聞之大驚泣而謂儼曰吾幼失父昨遷葬決老豎取之不知乃誤如此崇儼乃與至發墓所命開近西境按銘記果得之乃棄他人之骨而祔其先人儼在內言事及人間厭勝至多備述人口故不繁述王懷智唐坊州人上柱國王懷智顯慶初卒其母孫氏及弟懷善懷表並存至四年六月雍州高陵有一人失其姓名死經七日背上已爛而蘇云在地下見懷智見任太山録事遣此人執筆口授為書謂之曰汝雖合死今方便放汝歸家宜為我持此書至坊州訪我家白我母曰懷智今為太山録事幸蒙安太但家中曾貸寺家木作門此既功德物早償之懷善將死不合久住速作經像求助不然恐無濟理此人既蘇即繼書特送其舍所謂家事無不暗合至三日懷善暴死合州道俗聞者莫不增修功德鄜州人勳衛侯智純説之沙門英禪師唐法海寺沙門英禪師具言每見鬼寺主沙門惠蘭怪而問焉英曰向秦莊襄王遣人傳語飢虛甚以師大慈又自有所見從者二百許人勿辭勞費也吾也報云後日曉食書來專相候待惠蘭便備酒脯之類至時秦王果來侍從甚衆貴賤羅列坐食甚急謂英曰弟子不食八十年矣英問其故答曰吾生時未有佛法地下見責功德吾但以放生矜恤惸孤應之以福薄受罪未了受此一餐更四十年方便得食因指坐上人云是陳軫多為虛詐又指二人云是白起王翦為殺人多受罪亦未了英曰王何不從人索食而自受飢窘也答曰慈心少且餘人又不相見吾貴人不可妄作禍祟所以然也因指酒脯曰寺主將來耶深耽愧臨去時謂英曰甚愧禪師弟子有物在當相送城東門通化外尖冢是弟子墓時人不知妄云呂不韋冢耳英曰往赤眉賊發掘何得更有物在鬼曰賊將粗物去細者深賊取不得見在英曰貧道出家無用物處必莫將來言訖謝去陳導唐陳導者豫章人也以商賈為業龍朔中乃泛舟之楚夜泊江浦見一舟泝流而來亦宿于此導乃移舟近之見一人厖眉大鼻如吏在舟檢勘文書從者三五人導以同旅相值因問之曰君子何往幸喜同宿此浦厖眉人曰某以公事到楚幸此相遇導乃邀過船中厖眉亦隨之導備酒饌飲經數巡導乃問以姓氏厖眉人曰某姓司徒名辨被差至楚已來充使導又問曰所主何公事也辨曰公不宜見問君子此行慎勿以楚為意願適他土耳導曰何也辨曰吾非人也冥司使者導驚曰何故不得之楚辨曰吾往楚行災君亦其人也感君之惠故相報耳然君須以錢物計會方免斯難導懇苦求之辨曰但俟吾從楚回君可備緡錢一二萬相貺當免君家導許諾告謝而別是歲果荊楚大火延燒數萬家蕩無孑遺導自別辨後以憂慮繫懷及移舟而返既至豫章辨亦至矣導以慳鄙為性託以他事未辦所許錢使者怒乃令從者持書一緘與導導開讀未終而宅內掀然火起凡所財物悉盡是夕無損他室僅燒導家辨亦不見蓋以導慳嗇負前約而致之也王志唐顯慶三年岐州人王志任益州縣令考滿還鄉有女美未嫁道亡停縣州寺中纍月寺中先有學生停一房夜初見此女來粧飾華麗欲伸繾綣學生納之相知經月此女贈生一銅鏡巾櫛各一令欲上道女與生密共辭別家人求此物不得令遺巡房求索于生房得之令遺左右縛此生以為私盜學生訴其事非唯得此物兼留上下二衣令遺人開棺驗之果無此衣既見此徵于是釋之問其鄉里乃岐州人因從父南任父母俱亡遊諸州學問不久當還令給衣馬裝束同歸以為女夫憐愛甚重巴峽人調露年中有人行於巴峽夜泊舟忽聞有人朗詠詩曰秋徑填黃葉寒摧露草根猿聲一叫斷客淚數重痕其音甚厲激昂而悲如是通霄凡吟數十遍初聞以為舟行者未之寢也曉訪之而更無舟船但空山石泉溪谷幽絶詠詩處有人骨一具陸餘慶吳郡人進士擢第纍授長城尉拜員外監察久視中遷鳳閣舍人歷陝州刺史洛州長史大理卿少府監主睿宗韞車不精出授沂州刺史餘慶少時嘗冬日于徐亳間夜行左右以囊橐前行餘慶緩轡躡之寒甚會群鬼環火而坐慶以為人馳而遂下就火訝火焰熾而不暖慶謂之曰火何冷為我脫靴群鬼但俯而笑不應慶顧視之郡鬼悉有面衣慶驚策馬避之竟無患其傍居人謂慶曰此處有鬼為祟遭之者多斃郎君竟無所驚懼必福助也當富貴矣
