body:
  text: 張直方張直方唐咸通庚寅歲盧龍軍節度使檢校尚書左仆射張直方抗表請修入覲之禮優詔允焉先是張氏世蒞燕土燕民世服其恩禮燕台之嘉賓撫易水之壯士地沃兵庶朝廷每姑息之洎直方之嗣事也出綺褲之中据方嶽之上未嘗以民間休戚為意而酣酒于室淫獸于原巨賞狎于皮冠厚寵集于緑幘暮年而三軍大怨直方稍不自安左右有為其計者乃盡室西上至京懿宗授之左武衛大將軍而直方飛蒼走黃莫親徼道之職往往設罝罘于通道則犬彘無遺臧獲有不如意者立殺之或曰輦轂之下不可專戮其母曰尚有尊于我子者耶其僭軼可知也于是諫官列狀上請收付廷尉天子不忍置于法乃降為燕王府司馬俾分務洛師焉直方至東都既不自新而慢游愈極洛陽四旁翥者攫者見皆識之必群噪長嗥而去有王知古者東諸侯之貢士也雖薄涉儒術而數不中春官選乃退游于山川之上以擊鞠揮觴為事遨游于南鄰北里間至是有紹介于直方者直方延之睹其利喙贍辭不覺前席自是日相狎壬辰歲冬十一月知古嘗晨興僦舍無煙愁云塞望悄然弗怡乃徒步造直方第至則直方急趨將出畋也謂知古曰能相從乎而知古以祁寒有難色直方顧丱僮曰取短皂袍來請知古衣之知古乃上加麻衣焉遂聯轡而去出長夏門則微霰初零由闕塞而密雪如注乃渡伊水而東南踐萬安山之陰麓而韝弋之獲甚夥傾羽觴燒兔肩殊不覺有嚴冬意及霰開雪霽日將夕焉忽有封狐突起于知古馬首乘酒馳之數里不能及又與獵徒相失須臾雀噪煙暝莫知所如隱隱聞洛城暮鐘但倣徨于樵徑古陌之上俄而山川暗然若一鼓將半長望間有炬火甚明乃依積雪光而赴之復若十余里到則喬林交柯而朱門中開皓壁橫亙真北闕之甲第也知古及門下馬將徙倚以待旦無何小駟頓轡閽者覺之隔闔而問阿誰知古應曰成周貢士太原王知古也今旦有友人將歸于崆峒舊隱者仆餞之伊水濱不勝離觴既摻袂馬逸復不能止失道至此耳遲明將去幸無見讓閽曰此乃南海副使崔中丞之莊也主父近承天書赴闕郎君復隨計吏西征此唯閨闈中人耳豈可淹久乎某不敢去留請聞于內知古雖怵惕不寧自度中宵矣去將安適乃拱立以俟少頃有秉蜜炬自內至者振管辟扉引保母出知古前拜仍述厥由母曰夫人傳語主與小子皆不在家于禮無延客之道然僻居與山藪接畛豺狼所嗥若固相拒是見溺而不援也請舍外廳翌日可去知古辭謝從保母而入過重門側聽所欒櫨宏敞帷幕鮮華張銀燈設綺席命知古座焉酒三行復陳方丈之饌豹胎魴腴窮水陸之美者保母亦時來相勉食畢保母復問知古世嗣官族及內外姻党知古具言之乃曰秀才軒裳令胄金玉奇標既富春秋又潔操履斯實淑媛之賢夫也小君以鐘愛稚女將及笄年常托媒妁為求佳對久矣今夕何夕獲遘良人潘楊之睦可遵鳳凰之兆斯在未知雅抱何如耳知古斂容曰仆文愧金聲才非玉潤豈室家為望唯泥涂是憂不謂寵及迷津慶逢子夜聆清音于魯館逼佳氣于秦台二客游神方茲莫計三星委照唯恐不揚倘獲托彼強宗眷以嘉偶則平生所志畢在斯乎保母喜謔浪而入白復出致小君之命曰兒自移天崔門實秉懿范奉蘋蘩之敬知琴瑟之和唯以稚女是懷思配君子既辱高義乃葉夙心上京飛書路且不遙百兩陳禮事亦非僭欣慰孔多傾矚而已知古罄折而答曰某蟲沙微類分及湮淪而鐘鼎高門忽蒙采拾有如白水以奉清塵鶴企鳧趨唯待休旨知古復拜保母戲曰他日錦雉之衣欲解青鸞之匣全開貌如月暈室若云迷此際頗相念否知古謝曰以凡近仙自地登漢不有所舉孰能自媒謹當銘彼襟靈志之紳帶期于沒齒佩以周旋復拜時則月沈當庭實為良夜保母請知古脫服以休既解麻衣而皂袍見保母誚曰豈有縫掖之士而服短后之衣耶知古謝曰此乃假之于與所游熟者固非己有又問所從答曰乃盧龍張直方仆射所借耳保母忽驚叫仆地色如死灰既起不顧而走入宅遙聞大叱曰夫人差事宿客乃張直方之徒也復聞夫人音叱曰火急逐出無啓寇仇于是婢子小豎輩群從秉猛炬曳白棓而登階知古恇儴趠于庭中四顧遜謝詈言狎至僅得出門才出已橫關闔扉猶聞喧譁未已知古愕立道左自歎久之將隱頽垣乃得馬于其下遂馳去遙望大火若燎原者乃縱轡赴之至則輸租車方飯牛附火耳詢其所則伊水東草店之南也復枕轡假寐食頃而震方洞然心思稍安乃揚鞭于大道比及都門已有直方騎數輩來跡矣遙至其第既見直方而知古憤悶不能言直方慰之坐定知古乃述宵中怪事直方起而撫髀曰山魑木魅亦知人間有張直方耶且止知古復益其徒數十人皆射皮飲羽者享以卮酒豚肩與知古復南出既至萬安之北知古前導殘雪中馬跡宛然直詣柏林下至則碑板廢于荒坎樵蘇殘于密林中列大冢十余皆狐兔之窟宅其下成蹊于是直方命四周張羅彀弓以待內則束蘊荷鍤且掘且燻少頃群狐突出焦頭爛額者罥挂者應弦飲羽者凡獲狐大小百餘頭以歸張謹道士張謹者好符法學雖苦而無成嘗客游至華陰市見賣瓜者買而食之旁有老父謹覺其饑色取以遺之纍食百餘謹知其異奉之愈敬將去謂謹曰吾土地之神也感子之意有以相報因出一編書曰此禁狐魅之術也宜勤行之謹受之父亦不見爾日宿近縣村中聞其家有女子啼呼狀若狂者以問主人對曰家有女近得狂疾每日昃輒靚妝盛服云召胡郎來非不療理無如之何也謹即為書符施檐戶間是日晚間檐上哭泣且罵曰何物道士預他人家事宜急去之謹怒呵之良久大言曰吾且為奴去遂寂然謹復書數符病即都差主人遺絹數十匹以謝之謹嘗獨行既有重繼須得傔力停數日忽有二奴詣謹自稱曰德兒歸寶嘗事崔氏崔出官因見舍棄今無歸矣願侍左右謹納之二奴皆謹願黠利尤可憑信謹東行凡書囊符法行李衣服皆付歸寶負之將及關歸寶忽大罵曰以我為奴如役汝父因絶走謹駭怒逐之其行如風倏忽不見既而德兒亦不見所繼之物皆失之矣時秦隴用兵關禁嚴急客行無驗皆見刑戮既不敢東度復還主人具以告之主人怒曰寧有是事是無厭復將撓我耳因止于田夫之家絶不供給遂為耕夫邀與同作晝耕夜息疲苦備至因憩大樹下仰見二兒曰吾德兒歸寶也汝之為奴苦否又曰此符法我之書也失之已久今喜再獲吾豈無情于汝乎因擲行李還之曰速歸鄉人待爾書符也即大笑而去景得行李復詣主人方異之更遺絹數匹乃得去自爾遂絶書符矣咱規唐長安咱規因喪母又遭火焚其家産遂貧乏委地兒女六人盡孩幼規無計撫養其妻謂規曰今日貧窮如此相聚受饑寒存活終無路也我欲自賣身與人求財以濟君及我兒女如何規曰我偶喪財産今日窮厄失計教爾如此我實不忍妻再言曰若不如此必盡饑凍死規方允之數日有一老父及門規延入言及兒女饑凍妻欲自賣之意老父傷念良久乃謂規曰我纍世家實住藍田下適聞人說君家妻意今又見君言我今欲買君妻奉錢十萬規與妻皆許之老父翌日送錢十萬便挈規妻去仍謂規曰或兒女思母之時但攜至山下訪我當令相見經三載后兒女皆死又貧乏規乃乞食于長安忽一日思老父言因往藍田下訪之俄見一野寺門宇華麗狀若貴人宅守門者詰之老父命規入設食兼出其妻與規相見其妻聞兒女皆死大號泣遂氣絶其老父驚走入且大怒擬謀害規規亦怯懼走出回顧已失宅所在見其妻死于古冢前其冢旁有穴規乃自山下共發冢見一老狐走出乃知其妻為老狐所買耳狐龍驪山下有一白狐驚撓山下人不能去除唐乾符中忽一日突溫泉自浴須臾之間云蒸霧涌狂風大起化一白龍升天而去后或陰暗往往有人見白龍飛騰山畔如此三年忽有一老父每臨夜即哭于山前數日人乃伺而問其故老父曰我狐龍死故哭爾人間之何以名狐龍老父又何哭也老父曰狐龍者自狐而成龍三年而死我狐龍之子也人又問曰狐何能化為龍老父曰此狐也稟西方之正氣而生胡白色不與衆游不與近處狐托于驪山下千余年后偶合于雌龍上天知之遂命為龍亦猶人間自凡而成聖耳言訖而滅滄渚民江南無野狐江北無鷓鴣舊說也晉天福甲辰歲公安縣滄渚村民辛家犬逐一婦人登木而墜為犬嚙死乃老狐也尾長七八尺則正首之妖江南不謂無也但稀有耳蜀中彭漢邛蜀絶無唯山郡往往而有里人號為野犬更有黃腰尾長頭黑腰間焦黃或于村落鳴則有不祥事民婦世說云狐能魅人恐不虛矣鄉民有居近山林民婦嘗獨出于林中則有一狐欣然搖尾款步循擾于婦側或前或后莫能遣之如是者為常或聞丈夫至則遠之弦弧不能及矣忽一日婦與姑同入山掇蔬狐亦潛逐之婦姑于叢間稍相遠狐即出草中搖尾而前欣欣然如家犬婦乃誘之而前以裙裙裹之呼其姑共擊之舁而還家鄰里竟來觀之則暝其雙目如有羞赧之狀因斃之此雖有魅人之異而未能變任氏之說豈虛也哉
