body:
  text: 猿下楚江漁者楚江邊有一漁者結矛臨流唯一草衣小舟綸竿而已別無所有時以魚換酒輒自狂歌醉舞人雖笑之略無慚色亦不言其姓氏識者皆以為漁之隱者或有問之曰君之漁隱人之漁耶漁人之漁耶漁者曰昔姜子牙之漁嚴子陵之漁書于青史皆以為隱人之漁也殊不知不釣其魚釣其名耳隱人之漁高尚乎若以漁人之漁但有明月風和浪靜得魚供庖宰一身足餘則易酒獨醉又焉知隱人之漁漁人之漁也問者深歎伏之忽一日有一人挈一小猿經于此其漁者見之悲號不止其小猿亦不肯前去似有愴戀之情其人甚怪漁者乃堅拜求此小猿言是余前年中所失者是一山僧付與幸垂憫察以見賜庶余不負山僧之義其人驚念遂特賜之漁者常恩養是小猿經一載忽告漁人輩曰我自于南山中有族屬今日辭爾輩歸之遂跳躍化為一老猿攜其小猿奔走不知所之王仁裕王仁裕嘗從事于漢中家于公署巴山有採捕者獻猿兒焉憐其小而慧黠使人養之名曰野賓呼之則聲聲應對經年則充博壯盛縻縻稍解逢人必齧之頗亦為患仁裕叱之則弭伏而不動餘人縱鞭箠亦不畏其公衙子城繚繞並是榆槐雜樹漢高廟有長松古柏上鳥巢不知其數時中春日野賓解逸躍入叢林飛趕于樹稍之間遂入漢高廟破鳥巢擲其雛卵于地是州衙門有鈴架群鳥遂集架引鈴主使令尋鳥所來見野賓在林間即使人投瓦礫彈射皆莫能中薄暮腹枵方餒而就縶乃遣人送入巴山百餘里溪洞中人方回詢問未畢野賓已在廚內謀餐矣又復縶之忽一日解逸入主帥廚中應動用食器之屬並遭掀撲穢污而後登屋擲瓦拆磚主帥大怒使衆箭射之野賓騎屋脊而毀拆磚瓦箭發如雨野賓目不妨視口不妨呼手拈足擲左加避箭竟不能損其一毫有使院老將馬元章曰市上有一人善弄胡猻乃使召至指示之曰速擒來于是大胡猻躍上衙屋趕之踰垣驀巷擒得至前野賓流汗體浴而伏罪主帥亦不甚詬怒衆皆看而笑之于是頸上係紅綃一縷題詩送之曰放爾丁寧復故林舊來行處好追尋月明巫峽堪憐靜路隔巴山莫厭深棲宿免勞青嶂夢躋攀應愜碧雲心三秋果熟松稍健任抱高枝徹曉吟又使人送入孤雲兩角山且使縶在山家旬日後方解而縱之不復再來矣後罷職入蜀行次嶓冢廟前漢江之壖有群猿自峭巖中連臂而下飲于清流有巨猿捨群而前于道畔古木之間垂身下顧紅綃倣佛而在從者指之曰此野賓也呼之聲聲相應立馬移時不覺惻然及聳轡之際哀叫數聲而去及陟山路轉壑回溪之際尚聞嗚咽之音疑其陽斷矣遂繼之一篇曰嶓冢祠邊漢水濱此猿連臂下嶙峋漸來子細窺行客認得依稀是野賓月宿縱勞羈絏莉松餐非復稻粱身數聲陽斷和雲叫識是前年舊主人翟昭晉太元中丁零生翟昭後宮養一獼猴在妓女房前前後妓女同時懷娠各産子三頭出便跳躍昭方知是猴所為乃殺猴及十子六妓同時號哭昭問之云初見一年少著黃練單衣白紗帢甚可愛語笑如人徐寂之太元末徐寂之常野行見一女子操荷舉手麾寂之寂之悅而延住此後來往如舊寂之便患瘦瘠時或言見華房深宇芳茵廣筵寂之與女觴肴宴樂數年其弟𦖒之聞屋內群語潛往窺之見數女子從後戶出唯餘一者隱在簣邊𦖒之徑入寇怒曰今方歡集何故唐突忽復共言云簣中有人𦖒之即發看有一牝猴遂殺之寇病漸廖張寓言山人張寓言素有道術博學多才常寓居于朝士家其宅大且凶主人移出寓言出飲甚醉且還不知其家已出遂寢于堂廡下夜半後頗醒豎告之寓言懼時夜昏黑乃有引其架上書者寓言自暗窺之乃鬼也集于書架之旁寓言計將擊之因起寓言多力先叱之鬼稱革寓言毆之而踏其喉就地又擊之因絶聲大叫云吾擒得鬼守者遂以火至乃一獼猴也被擊已死方知誤焉先是一沐猴不知何來每夜入人家偷竊及寓言以為鬼而殺之一里無患矣薛放曾祖薛放尚書曾祖為湖南刺史罷郡京中閒居善治家旦暮必策杖檢校其宅常晨起因至廚中見竈內有燈熒熒然薛怒其爨者曰燈不滅又置竈中何也及至竈前視之忽見一獼猴子長六七寸前有一小臺盤子方圓尺餘內食品物皆極小而甚備又前置一盞燈猴對之而食薛大駭異乃拄杖刺之竈雖淺而盡其杖終不能及乃命妻子僮僕觀之皆莫測不知所為其猴忽置燈于盤子上以頭戴盤而出竈人行至堂前階上復設燈置盤而食傍若無人薛氏驚懼乃令子弟出外訪求術士以禳之及出門忽逢一道士乘驢謂薛氏子曰朗君神精極甚倉卒必有事故適過此宅見妖氣甚盛某平生所學道術以濟急難如有事請為郎君除之薛子大喜下馬拜請至宅使君具簪簡出迎妻女等悉拜迎坐于堂中猴見道士亦無懼色道士曰此乃使君積世深冤今之此來為禍不淺使君及妻子悲涕求請良久道士曰有幸相遇當為祛除然此物終當屈辱使君方肯解釋薛曰苟得無他敢辭屈辱道士曰此猴今欲將臺盤及燈上使君頭上食必當去可乎薛不敢辭妻子皆泣曰此是精魅物安可置頭上乞尊師別為一計道士曰不然先將臺盤子于頭上後令于盤中食之可乎妻子又曰不可道士曰不然無計矣薛又哀祈之良久道士曰家有廚匱之類乎令使君入其中令猴于其上食可乎皆曰可乃取木匱中施裀褥薛入匱中閉之猴即戴臺盤提燈而上乃置之而食妻子環繞其旁共憂涕泣忽失道士所在驚駭求覓之次猴及臺盤燈亦皆不見遂開匱視之使君亦不見舉家號哭求覓無復蹤跡遂具喪服以匱招魂而葬焉楊于度蜀中有楊于度者善弄胡猻于闤闠中乞丐于人常飼養胡猻大小十餘頭會人語或令騎犬作參軍行李則呵殿前後其執鞭驅策戴帽穿靴亦可取笑一時如弄醉人則必倒之臥於地上扶之久而不起于度唱曰街使來輒不起御史中丞來亦不起或微言侯侍中來胡猻即便起走眼目張惶佯作懼怕人皆笑之一日內廄胡猻維絶走上殿閣蜀主令人射之以其蹻捷皆不之中竟不能捉獲者三日內豎奏楊于度善弄胡猻試令捉之遂以十餘頭入望殿上拜拱手作一行立內廄胡猻亦在舍上窺覤于度高聲唱言奉敕捉舍上胡猻來手下胡猻一時上舍齊手把捉上廄胡猻立在殿上蜀主大悅因賜楊于度緋衫錢帛收係教坊有內臣因問楊于度胡猻何以教之而會人言語對曰胡猻乃獸實不會人語于度緣飼之靈砂變其獸心然後可教內臣深訝其說則有好事者知之多以靈砂飼胡猻鸚鵡犬鼠等以教之故知禽獸食靈砂尚變人心人食靈砂足變凡質獼猴見僧即必圍繞狀如供養戎瀘彝僚亦啖此物但于野外石上跏趺而坐以物蒙首有如坐禪則必相悅而來馴擾之逡巡衆去唯留一箇伴假僧偶坐僧以斧擊將歸充食他日更要亦如前法擊之然囚就不之覺又被人以其害稼乃致酒糟盆盛措于野徑仍削木棒可長一二尺者工五十條于側邊其猴啖糟醉後拈棒相擊腳手損折由此併獲是知嗜酒者得不鑒斯獸之賈害乎好酒猩猩好酒與屐人欲取者置二物以誘之猩猩始見必大詈云誘我也乃絶走而去之去而復至稍稍相勸頃盡醉其足皆絆或圖而贊之曰爾形唯猿爾面唯人言不忝面智不逾身淮陰佐漢李斯相秦曷若箕山高臥養真能言安南武平縣封溪中有猩猩焉如美人解人語知往事以嗜酒故以屐得之檻百數同牢欲食之衆自推肥者相送流涕而別時餉封溪令以帊蓋之令問何物猩猩乃籠中語曰唯有僕并酒一壺耳令笑而愛之養畜能傳送言語人不如也焦封前浚儀令焦封罷任後喪妻開元初客遊于蜀朝夕與蜀中富人飲博忽一日侵夜獨乘騎歸逢一青衣如舊相識馬前傳語邀封封方酒酣遂笑而從之心亦疑是誤相邀俄至一甲第屋宇崢嶸既堅請入封乃下馬入之須臾有十餘婢僕至並衣以羅紈飾之珠翠皆美麗其容質此女僕齊稱夫人欲披揖封驚疑未巳有花燭兩行前引見大扇擁蔽一女子年約十七八殊常儀貌遂令開扇引封前拜揖于堂而坐前後設瓊漿玉饌奏以女樂乃勸金樽于封夫人索紅箋寫詩一首以贈詩曰妾失鴛鴦伴君方萍梗遊小年歡醉後只恐苦相留封捧詩披閲沉吟良久方飲盡遂復酌金樽仍酬以一絶詩曰心常名宦外終不恥狂遊誤入桃源裏仙家爭肯留夫人覽詩笑而言曰誰教他誤入來要不留亦不得也封亦笑而答曰却恐不留誰怕留千年萬年夫人甚喜動顏色乃徐起佯醉歸帳命封伸伉儷之情至曙復開綺席歌樂嘹亮又與封共醉仍謂之曰妾是都督府孫長史女少適王茂王茂客長安死妾今寡居幸見託于君子無以妾自媒為過當念卓王孫家文君慕相如曾若此也封復聞是語轉深眷戀不出經月餘忽自獨行而語曰我本讀詩書為名宦今日名與宦俱未稱心而沉迷于酒色月餘不出非丈夫也侍婢聞者告于夫人夫人謂封曰妾是簪纓家女君是宦途中人與君匹偶亦不相虧耳至於却欲以名宦榮身足得詣金闕謁明主也妾爭敢固留君身抑君顯達乎何傷歎若是封曰幸夫人念我無使我虛老蜀城夫人遂以金寶送封入關及臨岐泣別仍贈玉環一枚謂封曰可珍重藏之我阿母與我幼時所弄之物也復吟詩一首以送詩曰鵲橋織女會也是不多時今日送君處羞言連理枝封覽詩受玉環愴情尤甚不覺沾灑留詩別曰但保同心結無勞織錦詩蘇秦求富貴自有一回時夫人見詩悲哽良久復勸金爵而別封雖已發志回京洛為名宦亦常悵恨別是佳麗方登閣道見嶮巇深所鬱鬱忽回顧遙見夫人奔逐遂驚異以伺之遽至封前悲泣不已謂封曰我不忍與君離因潛奔趕君不謂今日復覩君之容幸挈我之京輦封疑訝復且喜遂相攜達前旅次至昏黑有十餘猩猩來其妻奔出見之喜躍倍常乃顧謂封曰君亦不顧我東去我今幸女伴相召歸山願自保愛言訖化為一猩猩與同伴相逐而走不知所之猓然劍南人之采猓然者得一猓然其數十猓然可得何哉猓然有傷其類者聚族悲啼雖殺之不去此禽獸之狀而人心也樂羊張仁願史牟則人之狀而禽獸心也狨狨者猿猱之屬其雄毫長一尺尺五者常自愛護之如人披錦繡之服也極嘉者毛如金色今之大官為暖座者是也生於深山中群隊動成千萬雄而小者謂之狨奴獵師採取者多以桑弧檑矢射之其雄而有毫者聞人犬之聲則捨群而竄拋一樹枝接一樹枝去之如飛或于繁柯穠葉之內藏隱之身自知茸好獵者必取之其雌與奴則緩緩旋食而傳其樹殊不揮霍知人不取之則有攜一子至一子者甚多其雄有中箭者則拔其矢嗅之覺有藥氣則折而擲之嚬眉愁沮攀枝蹲于樹巔于時藥作抽掣手足俱散臨墮而却攬其枝攬是者數十度前后嘔噦呻吟之聲與人無別每口中涎出則悶絶手散墮在半樹接得一細枝稍懸身移時力所不濟乃墮于地則人犬齊到斷其命焉獵人求嘉者不獲則便射其雌雌若中箭則解摘其子擲去復來抱其母身去離不獲乃母子俱斃若使仁人觀之則不忍寢其皮食其肉若無憫惻之心者其肝是鐵石其人為禽獸昔鄧芝射猿其子拔其矢以木葉塞瘡芝曰吾違物性必將死焉於是擲弓矢於水中山民無識安知鄧芝之為心乎
