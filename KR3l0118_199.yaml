body:
  text: 杜牧杜牧唐白居易初為杭州刺史令訪牡丹花獨開元寺僧惠澄近於京師得之始植於庭欄門甚密他處未之有也時春景方深惠澄設油幕覆其上牡丹自此東越分而種之也會徐凝從富春來未知白先題詩曰此花南地知難種漸愧僧間用意栽海燕解憐頻睥睨胡蜂未識更徘徊虛生芍藥徒勞妬羞殺玫瑰不敢開唯有數苞紅幞在含芳只待舍人來白尋到寺看花乃命徐同醉而歸時張祜榜舟而至甚若疏誕然張徐二生未之習隱各希首薦焉白曰二君論文若廉白之鬭鼠穴勝負在於一戰也遂試長劍依天外賦餘霞散成綺詩試訖解送以凝為元祜次之張曰祜詩有地勢遙尊嶽河流側讓關多士以陳後主日月光天德山河壯帝居此徒有前名矣又祜題金山寺詩曰樹影中流見鍾聲兩岸聞雖綦母潛云塔影挂青漢鍾聲和白雲此句未為佳也白又以祜宮詞四句之中皆數對何足奇乎然無徐生云今古長如白練飛一條界破青山色祜歎曰榮辱糾紛亦何常也遂行歌而邁凝亦鼓枻而歸自是二生終身偃仰不隨鄉試矣先是李林宗杜牧與白輦下較文文原作之據雲溪友議改具言元白詩體舛雜而為清苦者見嗤因茲有恨白為河南尹李為河南令道上相遇尹乃乘馬令則肩輿似乖趨事之禮李嘗謂白為囁嚅公聞者皆笑樂天之名稍減矣白曰李直木林宗字也吾之猘子也其鋒不可當後杜牧守秋浦與張祜為詩酒之友酷吟祜宮詞亦知錢塘之歲白有非祜之論嘗不平之乃為詩二道以高之曰誰人得似張公子千首詩輕萬戶侯又云如何故國三千里虛唱歌詞滿六宮張詩曰故國三千里深宮二十年一聲何滿子雙淚落君前此為祜得意之語也李杜已下盛言其美者欲以荀異於白而曲成於張也故牧又著論言近有元白者喜為淫言媟語鼓扇浮囂吾恨方在下位未能以法治之斯亦敷佐於祜耳出雲溪友議天嶠遊人麻姑山山谷之秀草木多奇有鄧先明鈔本先作仙客至延康四五代為國道師而錫紫服洎死自京歸葬是山云是尸解也然悉為丘隴松柏相望詞人經過必當興詠幾千首矣忽有一少年偶題一絶不言姓字但云天嶠遊人耳後來觀其所刺無復為文且鄧氏之名因斯稍減矣詩曰鶴老芝田雞在籠上清那與俗塵同既言白日升仙去何事人間有殯宮出雲溪友議談銖真娘者吳國之佳人也比於錢唐蘇小小死葬吳宮之側行客感其華麗競為詩題於墓樹櫛比鱗臻有舉子談銖者吳門之秀士也因書一絶後之來者覩其題處稍息筆矣詩曰武丘山下冢纍纍松柏蕭條盡可悲何事世人偏重色真娘墓上獨題詩出雲溪友議周匡物周匡物字幾本漳州人唐元和十二年王播榜下進士及第時以歌詩著名初周以家貧徒步應舉落魄風塵懷刺不偶路經錢塘江乏僦船之資久不得濟乃於公館題詩云萬里茫茫天塹遙秦皇底事不安橋錢塘江口無錢過又阻西陵兩信潮郡牧出見之乃罪津吏至今天下津渡尚傳此詩諷誦舟子不敢取舉選人錢者自此始也出閩川名士傳王播唐王播少孤貧嘗客揚州惠照寺木蘭院隨僧齋食後厭怠乃齋罷而後擊鍾後二紀播自重位出鎮是邦因訪舊遊向之題名皆以碧紗罩其詩播繼以二絶句曰三十年前此院遊木蘭花發院新修如今再到經行處樹老無花僧白頭上堂未明鈔本未作已了各西東慚愧闍黎飯後鍾三十年來塵撲面如今始得碧紗籠出托言朱慶餘唐朱慶餘遇水部郎中張籍知音索慶餘新舊篇什數通吟改只留二十六章籍置於懷抱而推贊之時人以籍重名無不繕録諷詠遂登科第初慶餘尚為謙退作閨意一篇以獻張曰洞房昨夜停紅燭待曉堂前拜舅姑粧罷低聲問夫壻畫眉深淺入時無籍酬之曰越女新粧出鏡明鈔本鏡作奉心自知明艷更沈吟齊紈未足人間貴一曲菱歌敵萬金由是朱之詩名流入四海內矣出雲溪友議唐宣宗唐宣宗朝前進士陳等三人應博士宏詞所司考定名第及詩賦論上於延英殿詔中書舍人李藩等問曰凡考試之中重用字如何藩對曰賦忌偏枯庸雜論失褒貶是非詩則緣題落韻緣題如白雲起封中詩元封中白雲起是也按雲溪友議七無元字其間重用文字乃是庶幾亦作有常例也又曰孰詩重用字對曰錢起湘靈鼓瑟詩云善撫雲和瑟常聞帝子靈馮夷空自舞楚客不堪聽逸韻諧金石清音發杳冥蒼梧來怨慕白芷動芳馨流水傳湘浦悲風過洞庭曲終人不見江上數峰青中有二不字上曰錢起雖重用字他詩似不及起雖謝眺云洞庭張樂地瀟湘帝子遊雲去蒼梧遠水還江漢流之篇無以比也其宏詞詩重用字者登科起詩便付史選出雲溪友議又宣宗因重陽賜宴群臣有御製詩其略曰欸塞旋征騎和戎委廟賢傾心方倚注叶力共安邊宰臣以下應制皆和上曰宰相魏謨詩最出其兩聯云四方無事去神豫抄秋來八水寒光起千山霽色開上嘉賞久之魏蹈舞拜謝群寮聳視魏有德色極歡而罷出抒情詩溫庭筠唐溫庭筠字飛卿舊名岐與李商隱齊名時號溫李才思艷麗工於小賦每入試押官韻作賦凡八叉手而八韻成多為鄰鋪假手號曰救數人也而士行有缺搢紳薄之李義山謂曰近得一聯句云遠比趙公三十六年宰輔未得偶句溫曰何不云近同郭令二十四考中書宣宗嘗試詩上句有金步搖未能對遣求進士對之庭筠乃以玉條脫續也宣宗賞焉又藥有名白頭翁溫以蒼耳子對他皆此類也宣帝愛唱菩薩蠻詞丞相令狐綯假其修撰密進之戒令勿他泄而遽言於人由是疏之溫亦有言云中書內坐將軍譏相國無學也宣皇好微行遇於逆旅溫不識龍顏傲然而詰之曰公非長史司馬之流耶帝曰非也又白得非大參簿尉之類耶帝曰非也謫為坊城尉其制詞曰死門以德行為先文章為末爾既德行無取文章何以補焉徒負不羈之才罕有適時之用竟流落而死也豳國公杜悰自西川除淮海庭筠詣韋曲林氏林亭留詩云卓氏爐前金線柳隋家堤畔錦帆風貪為兩地行霖雨不見池蓮照水紅豳公聞之遺絹千匹吳興沈徽云溫曾於江淮為親檟楚由是改名庭筠又每歲舉場多為舉人假手侍郎沈詢之舉別施鋪席授庭筠不與諸公鄰比翌日於簾前請庭筠曰向來策名者皆是文賦託於學士某今歲場中並無假託學士勉旃因遣之由是不得意也出北夢瑣言李商隱唐李商隱字義山為彭陽公令狐楚從事彭陽之子綯繼有韋平之拜似疏商隱未嘗展分重陽日商隱詣宅於廳事上留題其略云十年泉下無消息九日樽前有所思郎君官重施行馬東閣無因許再窺相國覩之慚悵而已乃扃閉此廳終身不處也原闕出處今見北夢瑣言卷七劉瑑唐劉瑑字子全幼苦學能屬文才藻優贍大中初為翰林學士是時新復河湟邊上戎事稍繁會院中諸學士或多請告瑑獨當制一日近草詔百函筆不停綴詞理精當夜艾帝復召至御前令草喻天下制瑑濡毫抒思頃刻而告就遲明召對帝大嘉賞因而面賜金紫之服瑑以文學受知不數年卒至大用其告喻制曰自昔皇王之有國也何嘗不文以守成武以集事參諸二柄歸於大寧朕猥荷丕圖思弘景業憂勤戒惕四載于茲每念河湟土疆綿亘遐闊天寶末犬戎乘我多難無力禦姦遂縱腥膻不遠京邑事更十葉時近百年卿士獻能靡不竭其長策朝廷下議皆亦聽其直詞盡以不生邊事為永圖且守舊地為明理荏苒於是收復無由今者天地儲祥祖宗垂祐將士等櫛沐風雨暴露郊野披荊榛而刁斗夜嚴出豺狼而穹廬曉破動皆如意古無與京念此誠勤宜加寵賞詞不多載出鄭處誨所撰劉瑑碑鄭畋馬嵬佛堂楊妃縊所邇後才士經過賦詠以道其幽怨者不可勝紀皆以翠翹香鈿委於塵泥紅淒碧怨令人傷悲雖調苦詞清無逃此意也丞相鄭畋為鳳翔從事日題詩曰肅宗回馬楊妃死雲雨雖亡日月新終是聖朝天子事景陽宮井又何人觀者以為真輔國之句出缺史司空圖唐晉國公裴度討淮西題名於華嶽廟之闕門後司空圖題詩紀之曰嶽前大隊赴淮西從此中原息戰鼙石闕莫教苔蘚上分明認取晉公題出托言高蟾唐高蟾詩思雖清務為奇險意疏理寡實風雅之罪人薛能謂人曰儻見此公欲贈其掌然而落第詩曰天上碧桃和露種日邊紅杏倚雲栽芙蓉生在秋江上不向東風怨未開蓋守寒素之分無躁競之心公卿間許之先是胡曾有詩云翰苑何曾明鈔本曾作時休嫁女文昌早晚罷生兒上林新桂年年發不許平人折一枝羅隱亦多怨刺當路子弟忌之由是蟾獨策名也前輩李賀歌篇逸才奇險雖然嘗疑其無理杜牧有言長吉若使稍加其理即奴僕命騷人可也是知通論不相遠也出北夢瑣言
