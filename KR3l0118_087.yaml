body:
  text: 釋摩騰釋摩騰本中天竺人也美風儀解大小乘徑常遊化為狂明鈔本狂作任昔經往天竺附庸小國講金光明經會敵國侵境騰惟曰經云能說此法為地神所護使所居安樂今鋒鏑方始曾是為益乎乃誓以罄身躬往和勸遂二國交歡由是顯譽逮漢永平中明帝夜夢金人飛空而至乃大集群臣以占所夢通事明鈔本事作人傅毅奏曰臣聞西域有神其名曰佛陛下所夢將必是乎帝以為然即遣郎中蔡愔博士弟子秦景等使往天竺尋訪佛法愔等於彼遇見摩騰要還漢地騰誓志弘通不憚疲苦冒涉流沙至乎雒邑明帝甚加賞接於城西門外立精舍以處之漢地有沙門之始也但大法初傳人未皈信故蘊其深解無所宣述後少時卒於雒陽有記云騰譯四十二章經一卷初緘在蘭臺石室第十四間中騰所住處今雒陽城西雍門外白馬寺是也相傳云外夷國王嘗毀破諸寺唯招提寺未及毀壞夜有一白馬繞塔悲鳴即以啟王王即停壞諸寺因改招提以為白馬故諸寺立名多取則焉出高僧傳竺法蘭中天竺人也自言誦經論數萬章為天竺學者之師時蔡愔既至彼國蘭與摩騰共契遊化遂相隨而來會彼學徒留礙蘭乃間行而至之既達雒陽與騰同止少止少原作步據高僧傳改時便善漢言愔於西域獲經即為翻譯所謂十地斷結佛本生生原作僧據高僧傳改法海藏佛本行四十二章等五部會移都寇亂四部失本不傳江左唯四十二章經今見在可二千餘言漢地見存諸經唯此為始也愔又於西域得畫釋迦倚像是優田王旃檀像師第四作既至雒陽明帝即令畫工圖寫置清涼臺中及顯節陵陵原作林據高僧傳改上舊像今不復存焉又昔漢武穿昆明池底得黑灰問東方朔朔云可問西域梵人後法蘭既至眾人追問之蘭云世界終盡劫火洞燒此灰是也朔言有徵信者甚眾蘭後卒於雒陽春秋六十餘矣出高僧傳康僧會其先康居國人世居天竺其父因商賈移于交趾會年十餘歲二親並亡以至性奉孝服畢出家厲行甚峻為人弘雅有識量篤志好學明解三藏博覽六經天文圖緯多所綜涉辨於樞機頗屬文翰時孫權已制江右而佛教未行先有優婆塞支謙字恭明一名越本月支人來遊漢境初漢桓靈之世有支讖譯譯原作悔據明鈔本改出眾經有支亮字絕明亮學於讖謙又受業於亮博覽經籍莫不諳究世間伎藝多所綜習遍學異書通六國語其為人細長黑瘦眼多白而睛黃時人為之語曰支郎眼中黃形軀雖細是智囊漢未遇亂避地于吳孫權聞其才慧召見之日拜為博士使輔導東宮與韋曜諸人共盡匡益但生自外域故吳志不載謙以大教雖行而經多梵文未盡翻譯己妙善方言方欲集眾本譯為漢文從吳黃武元年至建興中所出維摩大般若泥洹法句瑞應本起等四十九經曲得聖儀辭旨文雅又依無量壽中本起制菩薩連句梵唄三契并注了本先死經等皆行於世時吳地初染大法風化未全僧會欲使道振江左興立圖寺乃杖錫東遊以吳赤烏十年初達建業營立茅茨設像行道時吳國以初見沙門服形末及其道疑為矯異有司奏曰有異人入境自稱沙門容服非恒事應察檢權曰昔漢明夢神號稱為佛彼之所事豈其遺風耶即召會詰問有何靈驗會曰如來遷迹忽逾千載遺骨舍利神曜無方昔阿育王起塔及八萬四千夫塔寺之興以表遺化也權以為誇誕乃謂會曰若能得舍利當為造搭苟其虛妄國有常刑會請期七日乃謂其屬曰法之興廢在此一舉今不至誠後將何及乃共潔齋靜室以銅瓶加几燒香禮請七日期畢寂然無應求申二七亦復如之權曰此欺誑將欲加罪會更請三七日權又特聽會請法侶曰宣尼有言文王既沒文不在茲乎法雲應降而吾等無感何假王憲當以誓死為期耳三七日暮猶無所見莫不震懼既入五更忽聞瓶中鏗然有聲會自往視果獲舍利明旦權自手執瓶瀉於銅盤舍利所衝盤即破碎權大肅然驚起而曰希有之瑞也會進而言曰舍利威神豈直光相而已乃却燒之火不能焚金剛之杵不能碎權命令試之會更誓曰法雲方被蒼生仰澤願更垂神迹以廣示威靈乃置舍利於鐵砧磓上使力者擊之於是砧磓俱陷舍利無損權大嗟伏即為建塔以始有佛寺故號建初寺因名其地為陁里由是江左大法遂興至孫皓即位法令苛虐廢棄淫祠及佛寺並欲毀壞皓曰此又何由而興若其義教貞正與聖典相應者當存奉其道如其無實皆悉焚之諸臣僉曰佛之威力不同於神康會感瑞大皇創寺今若輕毀恐貽後悔皓遣張昱詣寺詰會昱雅有才辯難問縱橫會應機騁辭文理鋒出自旦之夕昱不能屈既退會送於門時寺側有淫祠在昱曰玄化既敷此輩何故近而不革會曰震霆破山聾者不聞非音之細苟在理通則萬里懸應如其阻塞則肝膽楚越昱還歎會材明非臣所測願天鑒察之皓大集朝賢以車馬迎會會既坐皓問曰佛教所明善惡報應何者是耶會對曰夫明主以孝慈訓世則赤鳥翔而老人見仁德育物則醴泉涌而嘉苗出善既有瑞惡亦如之故為惡於隱鬼得而誅之為惡於顯人得而誅之易稱積善餘慶詩詠求福不回雖儒典之格言即佛教之明訓皓曰若然則周孔已明何用佛教會曰周孔所言略示近迹至於釋教則備極幽微故行惡則有地獄長苦修善則有天宮永樂舉茲以明勸沮不亦大哉皓當時無以折其言皓雖聞正法而昏暴之性不勝其虐後使宿衛兵入後宮治園於地得一金像高數尺呈皓皓使著不淨處以穢汁灌之共諸群臣笑以為樂俄爾之間舉身大腫陰處尤痛叫呼徹天太史占言犯大神所為即祈祝諸廟求福命綵女即迎像置殿上香湯洗數十遍燒香懺悔皓叩頭于地自陳罪狀有頃痛間遣使至寺請會說法會即隨入皓具問罪福之由會為敷折辭甚精要皓先有才解忻然大悅因求看沙門戒會以戒文禁祕不可輕宣乃取本業百三十五願分作二百五十事行住坐臥皆願眾生皓見慈願廣普益增善意即就會受五戒旬日疾瘳乃於會所住更加修飾宣示宗室莫不畢奉會在吳朝亟說正法以皓性凶麤不及妙義唯敘報應近事以開其心會於建初寺譯出眾經所謂阿難念彌陀經陀經二字原本無據高僧傳補鏡而王察微王梵皇經等又出小品及六度集雜譬喻等經並妙得經體文義允正又傳泥洹唄聲清摩哀亮一代模式又注安般守意法竟道樹等三經並制經序辭趣雅俊義旨微密並見行於世吳天紀四年四月皓降晉晉原作旨據明鈔本改九月會遘疾而終是歲晉武太康元年也至晉成帝咸和中蘇峻作亂焚會所建塔司空何充復更修造平西將軍趙誘世不奉法傲蔑三寶入此寺謂諸道人曰久聞此塔屢放光明虛誕不經所謂能信若必目覩所不能耳言竟塔即出五色光照耀堂剎誘肅然毛豎由此信敬於寺東更立小塔遠由大聖神感近亦康會之力也故圖寫厥像傳之於今爾出高僧傳支遁支遁字道林本性關氏陳留人或云河東林慮人幼有神理聰明秀徹晉時初至京師太原王濛甚重之曰造微之功不減輔嗣陳郡郡原作群據高僧傳改殷融嘗與衛玠交謂其神情雋徹後進莫有繼之者及見遁歎息以為重見若人家世事佛早悟非常之理隱居餘杭山沉思道行之品委曲惠印之經卓焉獨拔得自天心年二十五出家每至講肄善標宗會而章句或有所遺時為守文者所陋謝安聞而喜之曰乃比古人之相馬也略其玄黃而取其駿也時謝安殷浩等並一代名流皆著塵外之狎遁嘗在白馬寺與劉系之等談莊子逍遙云各適性以為逍遙遙字下八字據高僧傳補遁曰不然夫桀跖以殘害為性若適性為得者彼亦逍遙矣為是退而注逍遙篇群儒舊學莫不歎伏後還吳住支硎山寺晚欲入剡謝安在吳與遁書曰思君日積計辰傾遲知欲還剡自治甚以悵然人生如寄耳頃風流得意之事殆為都盡終日戚戚觸事惆悵唯遲君來以晤言消之一日當千載耳此多山水山縣閑靜差可養疾事不異剡而醫藥不同必思此緣副其積想也王羲之時在會稽素聞遁名未之信謂人曰一狂僧耳何足言後遁既還剡徑遊于郡王故迓遁觀其風力既至王謂遁曰逍遙篇可聞乎遁乃作數千言摽揭新理才藻警絕王遂披襟解帶留連不能去仍請住靈嘉寺意存相近俄又投迹剡山於沃州小嶺立寺行道僧眾百餘常隨稟學時或有隨者遁乃著座右銘以勗之時論以遁才堪經贊而潔己拔俗有違兼濟之道遁乃作釋曚論晚過石城山又立棲光寺宴坐山門遊心禪苑木飡澗飲浪志無生乃註安般四禪諸經及即色遊玄論遁淹留建業涉將三載乃還東山上書告辭優詔許之資給發遣事事豐厚一時名流並餞離於征虜亭時蔡子叔前至近遁而坐謝萬石後至值蔡蹔起謝便移就其處蔡還復欲據謝坐地謝不以介意其為時賢所慕如此既而收迹剡山畢命林澤人嘗有遺遁馬者遁受而養之時或有譏之者遁曰愛其神駿聊復畜耳後有餉鶴者遁曰爾冲天之物寧為耳目之翫乎遂放之遁幼時嘗與師共論物類謂雞卵生用未足為殺師不能屈師尋亡忽見形投卵於地殼破雛行頃之俱滅遁乃感悟由是蔬食終身遁先經餘姚塢山中住至於晚年猶還塢中或問其意答云謝安石昔數來見輒移旬日今觸情舉目莫不興想後病甚移還塢中以晉太和元年閏四月四日終於所住春秋五十有三即窆於塢中厥塚存焉或云終剡未詳郗起為之序傳袁宏為之銘贊周雲寶為之作誄焉出高僧傳
