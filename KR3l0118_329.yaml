body:
  text: 夏文榮夏文榮周長安年初前遂州長江縣丞夏文榮時人以為判冥事張鷟時為御史出為處州司倉替歸往問焉榮以杖畫地作柳字曰君當為此州至後果除柳州司戶後改德州平昌令榮剋時日晷漏無差又蘇州嘉興令楊廷玉則天之表姪也貪猥無厭著詞曰回波爾時廷玉打獠取錢未足阿姑婆見作天子傍人不得抵觸差攝御史康訔推奏斷死時母在都見夏文榮榮索一千張白紙一千張黃紙為廷玉禱後十日來母如其言榮曰且免死矣後十日內有進止果六日有敕楊廷玉奉養老母殘年又天官令史柳無忌造榮榮書衛漢郴字曰衛多不成漢郴二州交加不定後果唱衛州録事關重即唱漢州録事時鸞臺鳳閣令史進狀訴天官注擬不平則天責侍郎崔玄暐暐奏臣注官極平則天曰若爾吏部令史官共鸞臺鳳閣交換遂以無忌為郴州平陽主簿鸞臺令史為漢州録事焉張希望周司禮卿張希望移舊居改造見鬼人馮毅見之曰當新廄下有一伏尸極怒公可避之望笑曰吾少長已來未曾信如事公勿言後月餘毅入見鬼持弓矢隨希望後適及階鬼引弓射中肩膊希望覺背痛以手撫之其日卒鄭從簡周左司員外郎鄭從簡所居廳事常不寧令巫者視之曰有伏尸姓宗妻姓寇在廳基之下使問之曰君坐我門上我出入常值君君自不嘉非我之為也掘地三尺果得舊骸有銘如其言移出改葬於是遂絶房頴叔周地官郎中房頴叔除天官侍郎明日欲上其夜有廚子王老夜半起忽聞外有人喚云王老不須起房侍郎不上後三日李侍郎上王老却臥至曉房果病兩日而卒所司奏狀下即除李迥秀為侍郎其日謝即上王老以其言問諸人皆云不知方悟是神明所告也劉諷文明年竟陵掾劉諷夜投夷陵空館月明不寢忽有一女郎西軒至儀質溫麗緩歌閒步徐徐至中軒回命青衣曰紫綏取西堂花茵來兼屈劉家六姨姨十四舅母南鄰翹翹小娘子并將溢奴來傳語道此間好風月足得遊樂彈琴詠詩大是好事雖有竟陵判司此人已睡明月下不足回避也未幾而三女郎至一孩兒色皆絶國紫綏鋪花茵于庭中揖讓班坐坐中設犀角酒樽象牙杓緑罽花觶白琉璃盞醪醴馨香遠聞空際女郎談謔歌詠音詞清婉一女郎為録一女郎為明府舉觴酹酒曰惟願三姨婆壽等祁山六姨姨與三姨婆等劉姨夫得太山府糾成判官翹翹小娘子嫁得朱餘國太子諡奴便作朱餘國宰相某三四女伴揔嫁地府司文舍人不然嫁得平等王郎君六郎子七郎子則平生望足矣一時皆笑曰須與蔡家娘子賞口翹翹時為録事獨下一籌罰蔡家娘子曰劉姨夫才貌溫茂何故不與他五道主使空稱糾成判官怕六姨姨不歡請喫一盞蔡家娘子即持杯曰誠知被罰直緣姨夫大年老昏暗恐看五道黃紙文書不得誤大神伯公事飲亦何傷於是衆女郎皆笑倒又一女郎起傳口令仍抽一翠簪急說傳翠簪過令不通即罰令曰鸞老頭腦好好頭腦鸞老傳說數巡因令翠綏下坐使說令翠綏素吃訥令至但稱鸞老鸞老女郎皆大笑曰昔賀若弼弄長孫鸞侍郎以其年老口喫又無髮故造此令三更後皆彈琴擊筑更唱迭和歌曰明月秋風良宵會同星河易翻歡娛不終緑樽翠杓為君斟酌今夕不飲何時歡樂又歌曰楊柳楊柳裊裊隨風急西樓美人春夢長繡簾斜卷千條入又歌曰玉口金缸願陪君主邯鄲宮中金石絲簧衛女秦娥左右成行紈縞繽紛翠眉紅粧王歡顧眄為王歌舞願得君歡常無災苦歌竟已是四更即有一黃衫人頭有角儀貌甚偉走入拜曰婆提王命娘子速來女郎等皆起而受命即傳語曰不知王見召適相與望月至此敢不奔赴因命青衣收拾盤筵諷因大聲嚏咳視庭中無復一物明旦拾得翠叉數隻將以示人不知是何物也相州刺史唐王道堅為相州刺史州人造板籍畢則失之後于州室梁間散得之籍皆中截為短卷遂不用矣棄之又有李使君在州明早將祀社夜潔齊臥于廳事夢其父母盡來迎己覺而惡之具告其妻因疾數日卒朱希玉為刺史宅西院恆閉之希玉退衙忽一人紫服戴高鬟乘馬直入二蒼頭亦乘導之至閣乃下直吏以為親姻家通信也從而視之其人正服徐行直入中院院門為之開入已後閉乃索蒼頭及馬皆無之走白希玉希玉命開中院但見四周除掃甚潔帳幄圍匝施設粲然華筵廣座殽饌窮極水陸數十人食具器物盡金銀也希玉見之大驚乃酌酒酹之以祈福遂出閉其門明日更開則如舊矣室宇封閉草蔓荒涼二年而希玉卒王湛王湛判冥事初叔玄式任荊州富陽令取部內人吳實錢一百貫後誣以他事決殺之以滅口式帶別優並有上下考五選不得官以問湛白為叔檢之經宿曰叔前任富陽令日合有負心事其案見在冥司判云殺人之罪身後科罰取錢一百貫當折四年祿叔曰誠有此事吾之罪也狄仁傑則天時狄仁傑為寧州刺史其宅素凶先時刺史死者十餘輩傑初至吏白官舍久凶先後無敢居者且榛荒棘毀已不可居請舍他所傑曰刺史不舍本宅何別舍乎命去封鎖葺治居之不疑數夕詭怪奇異不可勝紀傑怒謂曰吾是刺史此即吾宅汝曲吾直何為不識分理反乃以邪忤正汝若是神速聽明教若是鬼魅何敢相干吾無懼汝之心徒為千變萬化耳必理要相見何不以禮出耶斯須有一人具衣冠而前曰某是某朝官葬堂階西樹下體魄為樹根所穿楚痛不堪忍頃前數公多欲自陳其人輒死幽途不達以至于今使君誠能改葬何敢遷延於此言訖不見明日傑令發之果如其言乃為改葬自此絶也李皓唐兵部尚書李皓時之正人也開元初有婦人詣皓容貌風流言語學識為時第一皓不敢受會太常卿姜皎至皓以婦人與之皎大會公卿婦人自云善相見張說曰宰臣之相遂相諸公卿言無不中謂皎曰君雖有相然不得壽終酒闌皎狎之于別室媚言遍至將及其私公卿迭往窺覩時皓在座最後往視婦人於是呦然有聲皎驚墮地取火照之見牀下有白骨當時議者以皓貞正故鬼神懼焉張守圭幽州節度張守圭少時為河西主將守玉門關其軍校皆勤勇善鬥每探候深入頗以劫掠為事西域胡僧者自西京造袈裟二十餘馱還大竺國其徒二十餘人探騎意是羅綿等物乃劫掠之殺其衆盡至胡僧刀棒亂下而不能傷探者異焉既而索馱唯得袈裟意甚悔恨因於僧前追悔劈踴悲泣久之僧乃曰此輩前身皆負守將令唯趁僧鬼是枉死耳然汝守將祿位重後當為節度大夫等官此輩亦如君何可白守將為修福耳然後數年守將合有小厄亦有所以免之騎還白守圭圭留僧供養纍年去後守圭與其徒二十五人至伊蘭山探賊胡騎數千猝至守圭力不能抗下馬脫鞍示以閒暇騎來漸逼守圭謂左右為之奈何若不獲已事理須戰忽見山下紅旗數百騎突前出戰守圭隨之穿其一角尋俱得出虜不敢逐紅旗下將謂守圭曰吾是漢之李廣知君有難故此相救後富貴毋相忘也言訖不見守圭竟至幽州節度御史大夫楊瑒開元中洛陽令楊瑒常因出行見槐陰下有卜者令過端坐自若伍伯訶使起避不動瑒令散手拘至廳事將捶之躬自責問術者舉首曰君是兩日縣令何以責人瑒問其事曰兩日後君當命終瑒甚愕問何以知之術者縣告所見舉家驚懼謂術者曰子能知之必能禳之若之何而免也瑒再拜求解術者曰當以君之聞見以衛執事免之與否未可知也乃引瑒入東院亭中令瑒被髮跣足墻面而立己則據案而書符中夕之後喜謂瑒曰今夕且幸免其即來明日可以三十張紙作錢及多造餅餤與壺酒出定罪門外桑林之間俟人過者則飲之皂裘右袒即召君之使也若留而飲餤君其無憂不然實難以濟君亦宜易衣服處小室以伺之善為辭謝問以所欲子之策盡于是矣瑒如其言洎日西景酒餤將罄而皂裘不至瑒深以為憂須臾遂至使人邀屈皂裘欣然纍有所進瑒乃拜謁人云君昨何之數至所居遂不復見疑于東院安處善神監護故不敢犯今地府相招未已奈何瑒再拜求救者千數兼燒紙錢資其行用鬼云感施大惠明日當與府中諸吏同來謀之宜盛饌相待言訖不見明日瑒設供帳極諸海陸候之日晚使者與其徒數十人同至宴樂殊常浩暢相語曰楊長官事焉得不盡心耶久之謂瑒君對坊楊錫亦有才幹今揩王作金以取彼君至五更鼓聲動宜於錫門相候若聞哭聲君則免矣瑒如其言往見鬼便在樹頭欲往錫舍為狗所咋未能得前俄從缺墻中入遲回聞哭聲瑒遂獲免
