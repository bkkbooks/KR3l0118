body:
  text: 竇傅竇傅晉竇傅者河內人永和中并州刺史高昌冀州刺史呂護各權部曲相與不和傅為昌所用作官長護遣騎抄擊為所俘執同伴六七人共繫一獄鎖械甚嚴克日當殺之沙門支遁山時在護營中先與傅相識聞其執厄厄原作尼據明鈔本許本改山至獄所候視之隔戶共語傅謂山曰今困厄命在漏刻何方得相救山曰若能至心歸請必有感應傅先亦頗聞觀世音及得山語遂專心屬念晝夜三日至誠自歸觀其鎖械如覺緩解有異於常聊試推蕩摧然離體傅乃復致心曰今蒙哀祐已令桎梏自解而同伴尚多無心獨去觀世音神力普濟當令俱免言畢復牽挽餘人皆以次解落若有割剔之者遂開戶走出於警徼之間莫有覺者便踰城徑去行四五里天明不敢復進共逃隱一林中須臾護覺失囚人馬絡繹四出尋捕焚草踐林無不遍至唯傅所隱一畝許地終無至者遂得免還鄉里敬信異常咸信奉佛法遁山後過江為謝居士敷具説其事焉出真傅拾遺明鈔本作出冥祥記周璫晉周璫會稽剡人也家世奉法璫年十六便蔬食誦經正月長齋竟延僧設八關齋及請其師竺佛密支法階佛密令持小品齋轉讀三日僧赴齋忘持小品至中食畢欲讀經方憶甚惆悵璫家在阪怡村去寺三十里無人遣取至人定燒香畢本家恨不得經密益踧踖有頃聞叩門者言送小品經璫愕然心喜開門見一年少著單衣夾先所不識又非時人疑其神異便長跪受經要使前坐年少不肯進曰斯夜當來聽經比出不復見香氣滿宅既而視之乃是密經也道俗驚喜密經先在廚中緘鑰甚謹還視其鑰儼然如故於是村中十餘家咸皆奉佛璫遂出家字曇嶷諷誦衆經二十萬言出冥祥記竺法義晉興寧中沙門竺法義山居好善住在始寧保山後得病積時攻治備至而了不損日就綿篤遂不復自治唯歸誠觀世音如此數日晝眠夢見一道人來候其病因為治之刳出腸胃湔洗贓腑見有結聚不淨物甚多洗濯畢還納之語義曰汝病已除夢覺衆患豁然尋得復常業故其經云或現沙門梵志之象意者義公夢其是乎義以太原七年亡宋尚書令傅亮撰其事迹亮自云其先君與義遊義每説其事輒凜然增肅焉出述異記法苑珠林十七九五兩引作出冥祥記王珉妻晉琅琊王珉其妻無子嘗祈觀世音云乞兒珉後路行逢一胡僧意甚悅之僧曰我死當為君作子少時道人果亡而珉妻有孕及生能語即解西域十六國梵音大聰明有器度即晉尚書王洪明身也故小名阿練敘前生時事事有驗出辨正論竺長舒晉有竺長舒者本天竺人專心誦觀音經為業後居吳中於邑內遭火屋宇連棟甍簷相繼火至火至二字原本無據明鈔本補皆焚長舒家正住下風分意燒毀一心念觀世音欲至舒家風回火滅合縣驚異之時有惡少年訝其靈應到後夜風急少年以火投屋四投皆滅少年嗟感至明乃叩頭首過舒云我無神力常以誦觀世音為業每有事恆得脫免出辨正論潘道秀吳郡人年二十餘嘗隨軍北征既而軍小失利秀竄逸被掠經數處作奴俘虜異域欲歸無因少信佛法恆至心念觀世音每夢寐輒見像後既南奔迷不知道於窮山中忽睹真形如今行像因作禮怡然不覺安行乃得還路遂歸本土後精進彌篤出冥祥記欒荀晉欒荀不知何許人也少奉法嘗作富平令先從征盧循值小失利船舫遭火垂盡賊亦交逼正在中江風浪駭目荀恐怖分盡尤念觀世音俄見江中有一人挺然孤立腰與水齊荀心知念經有感便投水就之體既浮涌腳似履地俄而天軍遣船迎接敗者於是遂得濟出冥祥記張崇晉張崇者京兆杜陵人也年少奉法太元中苻堅既敗長安百姓千有餘家南走歸晉為鎮戎所拘謂為遊寇崇與同等五人手足杻械置坑中埋築築原作禁據明鈔本改至腰各相去二十步明日將馳馬射之崇慮望窮盡唯潔心念觀世音夜中械忽自破因得脫走路經一寺乃復稱觀世音名至心禮拜以一石置前發誓願云今欲過江東訴辭晉帝理此冤魂救其妻息心願獲果此石當分為二崇拜石即破焉崇至京師發白虎樽具列冤狀帝乃加宥已為人所略賣者皆贖為編戶智生道人目所親見其事者出法苑珠林釋開達晉沙門釋開達隆安二年登隴採甘草為羌所執時年大飢羌胡相噉乃置達柵中將食之先在柵中十有餘人羌日夕烹葅唯達尚存自達被執便潛誦觀世音經不懈於心及明日當見噉其晨始曙忽有大虎遙逼群羌奮怒號吼羌各駭怖迸走虎乃前噬柵木得成小缺可容人過已而徐去達初見虎噬柵謂必見害柵既穿不入心疑其異謂是觀世音力計諸羌未及便即穿柵逃走夜行晝伏遂得免脫出法苑珠林竺法純晉沙門竺法純山陰顯義寺主也元興中起寺買材路經湖道材主是婦人與同船俱行既入湖日暮暴風波浪如山船小水入又與婦人俱行命在瞬息乃一心誦觀世音經時既入夜行旅已絶俄有大船流至純即乘度之而此小船應時淪沒大舟隨波鼓蕩俄得達岸也出法苑珠林釋道泰晉沙門釋道泰常山衡唐精舍僧義熙中嘗夢人云君命當終六七泰年至四十二遇篤疾慮必不濟悉以衣鉢之資厚為福施又歸誠念誦觀世音晝夜四日勤心不替時所坐床前垂帷忽於帷下見人跨戶而入足趺金色光明照屋泰乃搴帷遽視奄然而滅驚欣交萃因大流汗胸體即輕所患平差出法苑珠林郭宣晉義熙十一年太原郭宣蜀郡文處茂先與梁州刺史楊收敬為友收敬有罪下獄宣與處茂同被桎梏念觀世音十日後夜夢一菩薩慰諭之告以大命無憂俄而鎖械自脫及曉還著如是復解二人遂發願若得免罪各出錢十萬上明西寺作功德少日俱免宣依願送錢向寺處茂違誓不送及盧循舉兵茂於香浦為流失所中未死之間曰我有大罪語訖而死出辨正論呂竦晉呂竦字茂高兗州人也寓居始豐縣其南溪流急岸峭回曲如縈又多大石白日行者尤懷危懼竦自説其父嘗行溪中去家十餘里日向暮大風雨晦暝如漆不復知東西自分覆溺唯歸心觀世音且誦且念須臾有火光來岸如人捉炬者照見溪中了了徑得歸家火常在前後去船十餘步竦後與郗嘉賓周旋郗所傳説出法苑珠林徐榮晉有徐榮者琅琊人也嘗至東陽還經定山舟人不慣誤墮洄洑中垂欲沉沒榮無復計唯至心呼觀世音名須臾間如有數十人齊力引船者踴出洄洑中沿江而下日已暮天大昏暗風雨甚駛不知所向而湧浪轉盛榮誦經不輟忽望見山頭有火焰赫奕回舟趨之徑得達岸既至即不復見明旦問浦中人昨夜山上是何火衆愕然曰風雨如此豈有火耶乃知佛力冥祐矣榮後為會稽府督護謝敷嘗聞榮説時與榮同船者沙門支道蘊謹篤士也亦具其事為傅亮言之與榮所説同出法苑珠林劉度平原聊城人也鄉里千餘家並奉大法造立形像供養僧尼值虜主木末時此縣常有逋逃末大怒欲盡滅一城衆皆凶懼分必殄盡度乃潔誠率衆歸命觀世音頃之末見物從空下繞其屋柱驚視乃觀世音經末大歡喜因省刑戮於是此城即得免害出冥祥記南宮子敖始平人也戍新平城為狒狒虜兒長樂公所破合城數千人皆被誅害子敖雖分必死而猶至心念觀世音既而次至子敖群刃交下或高或僻持刀之人忽疲懈四支不隨爾時長樂公親自臨刑驚問之子敖聊爾答云能作馬鞍乃令原釋子敖亦不知所以作此言時後遂得遁逸乃造一觀音小像貯以香函行則頂戴出冥祥記徐義苻秦徐義高陸人為尚書少奉佛法時兵革蜂起賊獲義將加害乃埋其兩足編髮於樹至夜義專念觀世音有頃忽夢人謂之曰今事亟矣何暇眠乎義便驚起見防守者並疲而寢乃試自奮動手髮既解足亦得脫而遁百餘步隱草中便聞追者交馳秉炬無見者逮明賊散義歸投鄴寺遂得免焉出冥祥記畢覽苻秦畢覽東平人少奉法隨慕容垂北征沒虜單馬逃竄虜騎追將及覽至心誦念觀世音既得免脫入山迷惑失道又專心持念中夜見一道人法服持錫示以途徑安然至家出冥祥記釋法智沙門釋法智為白衣時嘗獨行至大澤中忽遇猛火四方俱起走路已絶便至心禮誦觀世音俄而火過一澤之草無有遺莖者唯法智所容身處不燒始乃敬奉大法後為姚興將從征索虜軍退失馬落在圍裏乃隱溝邊叢棘中得蔽頭復念觀世音心甚勤至隔溝人遙喚後軍指令殺之而軍過搜覓輒無見者遂得免後徑出家出冥祥記孫道德宋孫道德益州人也奉道祭酒年過五十未有子息居近精舍景平中沙門謂道德曰必願有兒當至心禮誦觀世音經此可冀也德遂罷不事道丹心投誠歸誦觀世音少日之中而有夢應婦即有孕産男出冥祥記張興宋張興新興人頗信佛法常從沙門僧融曇翼時受八戒元嘉初興嘗為劫賊所引逃避妻繫獄掠笞積日時縣失火出囚路側會融翼同行偶經囚邊妻驚呼闍梨何不賜救融曰貧道力弱不能救如何唯宜勸念觀世音庶獲免耳妻便晝夜祈念經十日許夜夢一沙門以足躡之曰咄咄可起妻即驚起鉗鎖桎梏俱解然閉戶警防無由得出慮有覺者乃卻自械又夢向者沙門曰戶已開矣妻覺而馳出守備俱寢安步而逸暗行數里卒值一人妻懼躄地已而相訊乃其夫也相見悲喜夜投僧翼翼匿之獲免焉出冥祥記曇無竭宋元嘉初有黃龍沙門曇無竭者誦觀世音經淨修苦行與徒屬二十五人往尋佛國備經艱險既達天竺舍衛路逢山象一群竭齎經誦念稱名歸命有獅子從林中出象驚奔走後有野牛一群鳴吼而來將欲加害竭又如初歸命有大鷲飛來牛便驚散遂得免出法苑珠林車母車母者遭宋廬陵王青泥之難為虜所得在賊營中其母先來奉佛即燃七燈於佛前夜精心念觀世音願子得脫如是經年其子忽叛還七日七夜獨行自南走常值天陰不知東西遙見有七段火光望火而走似村欲投終不可至如是七夕不覺到家見其母猶在佛前伏地又見七燈因乃發悟母子共談知是佛力自後懇禱專行慈悲出宣驗記釋曇穎宋長干寺有釋曇穎會稽人少出家謹於戒行誦經十餘萬言止長干寺善巧宣唱天然獨絶穎常患癬疾積治不除房內恆供養一觀世音像晨夕禮拜求差此疾異時忽見一蛇緣壁上屋須臾有一鼠子從屋墜地涎液沐身狀如已死穎候以活即取竹刮除涎液又聞蛇所吞鼠能療瘡疾即取涎以傅癬上所傅既遍鼠亦還活信宿之間瘡疾頓盡方悟蛇之與鼠皆是祈請所致於是君王所重名播遐邇後卒所在年八十一出高僧傳邢懷明宋邢懷明河間人為大將軍參軍嘗隨南郡太守朱循之北伐同見陷沒伺候間隙俱遁南歸夜行晝伏三日猶懼追捕乃遣人前覘虜候數日不還一夕將雨陰暗所遣人將曉忽至乃驚曰向遙見火光甚明故來投之那得至而反暗循等驚愕懷明先奉法自出征恆頂戴觀世音經誦讀不廢夕亦暗誦咸疑是經神力遂得脫免居於京師忽有沙門詣懷明云貧道見此巷中及君家有血氣宜移避語畢去懷明追而目之出門便不見意甚惡之經二旬鄰人張景秀傷父及殺妻懷明以為血氣之徵庶得無事時與劉斌劉敬文同在一巷其年並以劉湛之黨被誅夷出法苑珠林王球宋王球字叔達太原人為涪陵太守以元嘉元年於郡失守繫在刑獄防鎖堅固球先精進用心尤至獄中百餘人並多飢餓球每食皆分施之日自持齋至心念觀世音夜夢升高座見一沙門以一卷經與之題名光明按行品併諸菩薩名球得而披讀忘第一菩薩名第二觀音第三大勢至又見一車輪沙門曰此五道門也既覺鎖皆斷脫球心知神力彌增專志因自釘治其鎖經三日而被原宥出法苑珠林
