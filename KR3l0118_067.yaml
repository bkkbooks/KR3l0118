body:
  text: 崔少玄崔少玄崔少玄者唐汾州刺史崔恭之小女也其母夢神人衣綃衣駕紅龍持紫函受於碧雲之際乃孕十四月而生少玄既生而異香襲人端麗殊絶紺髮覆目耳璫及頤右手有文曰盧自列妻後十八年歸於盧陲陲小字自列歲餘陲從事閩中道過建溪遠望武夷山忽見碧雲自東峰來中有神人翠冠緋裳告陲曰玉華君來乎陲怪其言曰誰為玉華君曰君妻即玉華君也因是反告之妻曰扶桑夫人紫霄元君果來迎我事已明矣難復隱諱遂整衣出見神人對語久之然夫人之音陲莫能辨逡巡揖而退陲拜而問之曰少玄雖胎育之人非陰隲所積昔居無欲天為玉皇左侍書諡曰玉華君主下界三十六洞學道之流每至秋分日即持簿書來訪志道之士嘗貶落所犯為與同宮四人退居靜室嗟嘆其事恍惚如有欲想太上責之謫居人世為君之妻二十三年矣又遇紫霄元君已前至此今不復近附於君矣至閩中日獨居靜室陲既駭異不敢輒踐其間往往有女真或二或四衣長綃衣作古鬟髻周身光明燭耀如晝來詣其室升堂連榻笑語通夕陲至而看之亦皆天人語言不可明辨試問之曰神仙祕密難復漏泄沉纍至重不可不隱陲守其言誡亦常隱諱洎陲罷府恭又解印組得家於洛陽陲以妻之誓不敢陳泄於恭後二年謂陲曰少玄之父壽算止于二月十七日某雖神仙中人生於人世為有撫養之恩若不救之枉其報矣乃請其父曰大人之命將極於二月十七日少玄受劬勞之恩不可不護遂發絳箱取扶桑大帝金書黃庭內景之書致於其父曰大人之壽常數極矣若非此書不可救免今將授父可讀萬遍以延一紀乃令恭沐浴南向而跪少玄當几授以功章寫於青紙封以素函奏之上帝又召南斗注生真君附奏上帝須臾有三朱衣人自空而來跪少玄前進脯羞吸酒三爵手持功章而去恭大異之私訊於陲陲諱之經月餘遵命陲語曰玉清真侶將雪豫於太上今復召為玉皇左侍書玉華君主化元精氣施布仙品將欲反神還於無形復侍玉皇歸彼玉清君莫泄是言遺豫父母之念又以救父之事泄露神仙之術不可久留人世之情畢於此矣陲跪其前嗚呼流涕曰下界蟻虱黷污仙上永淪穢濁不得升舉乞賜指喻以救沉痼久永不忘其恩少玄曰豫留詩一首以遺子豫上界天人之書皆雲龍之篆下界見之或損或益亦無會者豫當執管記之其詞曰得之一元匪受自天太老之真無上之仙光含影藏形於自然真安匪求神之久留淑美其真體性剛柔丹霄碧虛上聖之儔百歲之後空餘墳丘陲載拜受其辭晦其義理跪請講貫以為指明少玄曰君之於道猶未熟習上仙之韻昭明有時至景申年中遇琅琊先生能達其時與君開釋方見天路未間但當保之言畢而卒九日葬舉棺如空發櫬視之留衣而蛻處室十八居閩三歸洛二在人間二十三年後陲與恭皆保其詩遇儒道適達者示之竟不能會至景申年中九疑道士王方古其先琅琊人也遊華嶽回道次於陝郊時陲亦客於其郡因詩酒夜話論及神仙之事時會中皆貴道尚德各徵其異殿中侍御史郭固左拾遺齊推右司馬韋宗卿王建皆與崔恭有舊因審少玄之事於陲陲出涕泣恨其妻所留之詩絶無會者方古請其辭吟詠須臾即得其旨歎曰太無之化金華大仙亦有傳於後學哉時坐客聳聽其辭句句解釋流如貫珠凡數千言方盡其義因命陲執筆盡書先生之辭目曰少玄玄珠心鏡好道之士家多藏之出少玄本傳妙女唐貞元元年五月宣州旌德縣崔氏婢名妙女年可十三四夕汲庭中忽見一僧以錫杖連擊三下驚怖而倒便言心痛須臾迷亂針灸莫能知數日稍間而吐痢不息及瘥不復食食輒嘔吐唯餌蜀葵花及鹽茶既而清瘦爽徹顏色鮮華方說初昏迷之際見一人引乘白霧至一處宮殿甚嚴悉如釋門西方部其中天仙多是妙女之族言本是提頭賴吒天王小女為泄天門間事故謫墮人世已兩生矣賴吒王姓韋名寬弟大號上尊夫人姓李號善倫東王公是其季父名括第八妙女自稱小娘言父與姻族同遊世間尋索今於此方得見前所見僧打腰上欲女吐瀉藏中穢惡俗氣然後得升天天上居處華盛各有姻戚及奴婢與人間不殊所使奴名群角婢名金霄偏條條字原闕據明鈔本補鳳樓其前生有一子名遙見並依然相識昨來之日於金橋上與兒別賦詩唯記兩句曰手攀橋柱立滴淚天河滿時自吟詠悲不自勝如此五六日病臥敘先世事一旦忽言上尊及阿母並諸天仙及僕隸等悉來參謝即託靈而言曰小女愚昧落在人間久蒙存恤相愧無極其家初甚驚惶良久乃相與問答仙者悉憑之敘言又曰暫借小女子之宅與世人言語其上尊語即是丈夫聲氣善倫阿母語即是婦人聲各變其語如此或來或往日月漸久談諧戲謔一如平人每來即香氣滿室有時酒氣有時蓮花香氣後妙女本狀如故忽一日妙女吟唱是時晴朗空中忽有片雲如席徘徊其上俄而雲中有笙聲聲調清鏘舉家仰聽感動精神妙女呼大郎復唱其聲轉厲妙女謳歌神色自若音韻奇妙清暢不可言又曲名桑柳條又言阿母適在雲中如此竟日方散旬時忽言家中二人欲有腫疾吾代其患之數日後妙女果背上脅下各染一腫並大如杯楚痛異常經日其主母見此痛苦令求免之妙女遂冥冥如臥忽語令添香於鐘樓上呼天仙懺念其聲清亮悉與西方相應如此移時醒悟腫消須臾平復後有一婢卒染病甚困妙女曰我為爾白大郎請兵救女即如睡狀須臾卻醒言兵已到急令灑掃添香靜室遂起支分兵馬匹配幾人於某處檢校幾人於病人身上束縛邪鬼其婢即瘥如故言見兵馬形像如壁畫神王頭上著胡帽子悉金鈿也其家小女子見良久乃滅大將軍姓許名光小將曰陳萬每呼之驅使部位甚多來往如風雨聲更旬時忽言織女欲嫁須往看之又睡醒而說婚嫁禮一如人間言女名垂陵子嫁薛氏事多不備紀其家常令妙女繡忽言今要暫去請婢鳳樓代繡如此竟日便作鳳樓姿容精神時異繡作巧妙疾倍常時而不與人言時時俯首笑久之言卻回即復本態無鳳樓狀也言大郎欲與僧伽和尚來看娘子即掃室添香煎茶待之須臾遂至傳語問訊妙女忽笑曰大郎何為與上人相撲此時舉家俱聞床上踏蹴聲甚厲良久乃去有時言向西方飲去回遂吐酒竟日醉臥一夕言將娘子一魂小娘子一魂遊看去使與善倫友言笑是夕娘子等並夢向一處與衆人遊樂妙女至天明便問小娘子夢中事一一皆同如此月餘絶食忽一日悲咽而言大郎阿母喚某歸甚悽愴苦言久在世間戀慕娘子不忍捨去如此數日涕泣又言不合與世人往來汝意須住如之奈何便向空中辭別詞頗鄭重從此漸無言語告娘子曰某相戀不去既在人間還須飲食但與某一紅衫子著及瀉藥如言與之逐漸飲食雖時說未來事皆無應其有繁細不能具録其家紀事狀盡如此不知其婢後復如何出通幽記吳清妻唐元和十二年虢州湖城小里正吳清妻楊氏號監真居天仙鄉車谷村因頭疼乃不食自春及夏每靜坐入定皆數日村鄰等就看三度見得藥共二十一丸以水下玉液漿兩碗碗令煎茶飲四月十五日夜更焚香端坐忽不見十七日縣令自焚香祝請其夜四更牛驢驚見墻上棘中衫子逡巡牛屋上見楊氏裸坐衣服在前肌肉極冷扶至院與村舍焚香聲磬至辰時方醒稱十四日午時見仙鶴語云洗頭十五日沐浴五更有女冠二人並鶴鶴原作龍據明鈔本改駕五色雲來乃乘鶴去到仙方臺見道士云華山有同行伴五人煎茶湯相待汴州姓呂名德真同州姓張名仙真益州姓馬名辨真宋州姓王名信真又到海東山頭樹木多處及吐番界山上五人皆相隨卻至仙方臺見仙骨有尊師云此楊家三代仙骨令禮拜卻請歸云有父在年老遂還有一女冠乘鶴送來云得受仙詩一首又詩四并書栗後云道啓真心覺漸清天教絶粒應精誠雲外仙歌笙管合花間風引步虛聲其二曰心清境靜聞妙香憶昔期心清等十字原闕據黃本補君隱處當一星蓮花山頭飯黃精仙人掌上經其三曰飛鳥莫到人莫攀一隱十年不下山袖中短書誰為達華山道士賣藥還其四曰日落焚香坐醮醮原作醒據明鈔本改壇庭花露濕漸更闌淨水仙童調玉液春霄羽客化金丹其五曰攝念精思引彩霞焚香虛室對煙花道合雲霄遊紫府湛然真境瑞皇家出逸史
