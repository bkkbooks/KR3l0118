body:
  text: 張簡栖張簡犧南陽張簡栖唐貞元末于徐泗間以放鷹為事是日初晴鷹擊拿不中騰沖入云路簡栖望其蹤與徒從分頭逐覓俄至夜可一更不覺至一古墟之中忽有火燭之光迫而前乃一冢穴中光明耳前覘之見狐憑幾尋讀册子其旁有群鼠益湯茶送果栗皆人拱手簡栖怒呵之狐驚走收拾册子入深黑穴中藏簡栖以鷹竿挑得一册子乃歸至四更宅外聞人叫索册子聲出覓即無所見至明皆失所在自此夜夜來索不已簡栖深以為異因攜册子入郭欲以示人往去郭可三四里忽逢一知己相揖問所往簡栖乃取册子話狐狀前人亦驚笑接得册子便鞭馬疾去回顧簡栖曰謝以册子相還簡栖逐之轉急其人變為狐馬變為獐不可及回車入郭訪此宅知己元在不出方知狐來奪之其册子裝束一如人者紙墨亦同皆狐書不可識簡栖猶録得頭邊三數行以示人薛夔貞元末驍衛將軍薛夔寓居永寧龍興觀之北多妖狐夜則縱橫逢人不忌夔舉家驚恐莫知所如或謂曰妖狐最憚獵犬西鄰李太尉第中鷹犬頗多何不假其駿異者向夕以待之夔深以為然即詣西鄰子弟具述其事李氏喜聞羈三犬以付焉是夕月明夔縱犬與家人輩密覘之見三犬皆被羈靮三狐跨之奔走庭中東西南北靡不如意及曉三犬困殆寢而不食才暝復為乘跨廣庭蹴踘犬稍留滯鞭策備至夔無奈何竟徙焉計真唐元和中有計真家僑青齊間嘗西遊長安至陝真與陝從事善是日將告去從事留飲酒至暮方與別及行未十里遂兀然墮馬而二仆驅其衣囊前去矣及真醉寤已曛黑馬亦先去因顧道左小徑有馬溺即往尋之不覺數里忽見朱門甚高槐柳森然真既亡仆馬悵然遂叩其門已扃鍵有小童出視真即問曰此誰氏居曰李外郎別墅真請入謁僮遽以告之頃之令人請客入息于賓館即引入門其左有賓位甚清敞所設屏障皆古山水及名畫圖經籍茵榻之類率潔而不華真坐久之小僮出曰主君且至俄有一丈夫年約五十朱紱銀章儀狀甚偉與生相見揖讓而坐生因具述從事故人留飲酒道中沈醉不覺曛黑仆馬俱失願寓此一夕可乎李曰但慮此卑隘不可安貴客寧有間耶真愧謝之李又曰某嘗從事于蜀尋以疾罷去今則歸休于是矣因與議語甚敏博真頗慕之又命家僮訪真仆馬俄而皆至即舍之既而設饌共食食竟飲酒數杯而寐明日真晨起告去李曰願更得一日侍歡笑生感其意即留明日乃別及至京師居月余有款其門者自稱進士獨孤沼真延坐與語甚聰辨且謂曰某家于陝昨西來過李外郎談君之美不暇且欲與君為姻好故令某奉謁話此意君以為何如喜而諾之沼曰某今還陝君東歸當更訪外郎且謝其意也遂別去后旬月生還詣外郎別墅李見真至大喜生即話獨孤沼之言因謝之李遂留生卜日就禮妻色甚姝且聰敏柔婉生留旬月乃挈妻孥歸青齊自是李君音耗不絶生奉道每晨起閲黃庭內景經李氏常止之曰君好道寧如秦皇漢武乎求仙之力又孰若秦皇漢武乎彼二人貴為天子富有四海竭天下之財以學神仙尚崩于沙丘葬于茂陵況君一布衣而乃惑于求仙耶真叱之乃終卷意其知道者亦不疑為他類也后歲余真挈家調選至陝郊李君留其女而遣生來京師明年秋授兗州參軍李氏隨之官數年罷秩歸齊魯又十余年李有七子二女才質姿貌皆居衆人先而李容色端麗無殊少年時生益鐘念之無何被疾且甚生奔走醫巫無所不至終不愈一旦屏人握生手嗚咽流涕自言曰妾自知死至然忍羞以心曲告君幸君寬罪宥戾使得盡言已歔欷不自勝生亦為之泣固慰之乃曰一言誠自知受責于君顧九稚子猶在以為君纍尚感一發口且妾非人間人天命當與君偶得以狐狸賤質奉箕帚二十年未嘗纖芥獲罪權以他類貽君憂一女子血誠自謂竭盡今日求去不敢以妖幻余氣托君念稚弱滿眼皆世間人為嗣續及某氣盡願少念弱子心無以枯骨為仇得全支體埋之土中乃百生之賜也言終又悲慟淚百行下生驚恍傷感咽不能語相對泣良久以被蒙首背壁臥食頃無聲生遂發被見一狐死被中生特感悼之為之斂葬之制皆如人禮訖生徑至陝訪李氏居墟墓荊棘闃無所見惆悵還家居歲余七子二女相次而卒視其骸皆人也而終無惡心劉元鼎舊説野狐名紫狐夜擊尾火出將為怪必戴髑髏拜北斗髑髏不墜則化為人矣劉元鼎為蔡州蔡州新破食場狐暴劉遣吏主捕日于球場縱犬逐之為樂經年所殺百數后獲一疥狐縱五六犬皆不敢逐狐亦不走劉大異之令訪大將家獵狗及監軍亦自夸巨犬至皆弭環守之狐良久緩迹直上設廳穿台盤出廳后及城牆俄失所在劉自是不復命捕道術中有天狐別行法言天狐九尾金色役于日月宮有符有醮日可以洞達陰陽張立本唐丞相牛僧孺在中書草場官張立本有一女為妖物所魅其妖來時女即濃妝盛服于閨中如與人語笑其去即狂呼號泣不已久每自稱高侍郎一日忽吟一首云危冠廣袖楚宮妝獨步間廳逐夜涼自把玉簪敲砌竹清歌一曲月如霜立本乃隨口抄之立本與僧法舟為友至其宅遂示其詩云某女少不曾讀書不知因何而能舟乃與立本兩粒丹令其女服之不旬日而疾自愈某女説云宅后有竹叢與高鍇侍郎墓近其中有野狐窟穴因被其魅服丹之后不聞其疾再發矣姚坤太和中有處士姚坤不求榮達常以釣漁自適居于東洛萬安山南以琴尊自怡其側有獵人常以网取狐兔為業坤性仁恆收贖而放之如此活者數百坤舊有莊質于嵩嶺菩提寺坤持其價而贖之其知莊僧惠沼行凶率常于闃處鑿井深數丈投以黃精數百斤求人試服觀其變化乃飲坤大醉投于井中以磑石咽其井坤及醒無計躍出但飢茹黃精而已如此數日夜忽有人于井口召坤姓名謂坤曰我狐也感君活我子孫不少故來教君我狐之通天者初穴于冢因上竅乃窺天漢星辰有所慕焉恨身不能奮飛遂凝盼注神忽然不覺飛出躡虛駕云登天漢見仙官而禮之君但能澄神泯慮注盼玄虛如此精確不三旬而自飛出雖竅之至微無所礙矣坤曰汝何據耶狐曰君不聞西升經云神能飛形亦能移山君其努力言訖而去坤信其説依而行之約一月忽能跳出于磑孔中遂見僧大駭視其井依然僧禮坤詰其事坤告曰但于中餌黃精一月身輕如神自能飛出竅所不礙僧然之遣弟子以索墜下約弟子一月後來窺弟子如其言月余來窺僧已斃于井耳坤歸旬日有女子自稱夭桃詣坤云是富家女誤為年少誘出失蹤不可復返願持箕帚坤見其妖麗冶容至于篇什書札俱能精至坤亦念之后坤應制挈夭桃入京至盤豆館夭桃不樂取筆題竹簡為詩一首曰鉛華久御向人間欲舍鉛華更慘顏縱有青丘今夜月無因重照舊云鬟吟諷久之坤亦矍然忽有曹牧遣人執良犬將獻裴度入館犬見夭桃怒目掣鎖蹲步上階夭桃亦化為狐跳上犬背抉其目大驚騰號出館望荊山而竄坤大駭逐之行數里犬已斃狐即不知所之坤惆悵悲惜盡日不能前進及夜有老人挈美醞詣坤云是舊相識既飲坤終莫能達相識之由老人飲罷長揖而去云報君亦足矣吾孫亦無恙遂不見坤方悟狐也后寂無聞矣尹瑗尹瑗者嘗舉進士不中第為太原晉陽尉既罷秩退居郊野以文墨自適忽一日有白衣丈夫來謁自稱吳興朱氏子早歲嗜學竊聞明公以文業自負願質疑于執事無見拒瑗即延入與語且征其説云家僑嵐川早歲與御史王君皆至北門今者寓迹于王氏別業纍年自此每四日輒一來甚敏辨縱橫詞意典雅瑗深愛之瑗因謂曰吾子機辨玄奧可以從郡國之遊為公侯高客何乃自取沈滯隱迹叢莽生曰余非不願謁公侯且懼旦夕有不虞之禍瑗曰何為發不祥之言乎朱曰某自今歲來夢卜有窮盡之兆瑗即以詞慰諭之生頗有愧色后至重陽日有人以濃醞一瓶遺瑗朱生亦至因以酒飲之初詞以疾不敢飲已而又曰佳節相遇豈敢不盡主人之歡耶即引滿而飲食頃大醉告去未行數十步忽仆于地化為一老狐酩酊不能動矣瑗即殺之因訪王御史別墅有老農謂瑗曰王御史并之裨將往歲戍于嵐川為狐媚病而卒已纍年矣墓于村北數十步即命家僮尋御史墓果有穴瑗后為御史竊話其事時唐太和初也韋氏子杜陵韋氏子家于韓城有別墅在邑北十余里開成十年秋自邑中遊焉日暮見一婦人素衣挈一瓢自北而來謂韋曰妾居邑北里中有年矣家甚貧今為里胥所辱將訟于官幸吾子紙筆書其事妾得以執詣邑冀雪其恥韋諾之婦人即揖韋坐田野衣中出一酒卮曰瓢中有酒願與吾子盡醉于是注酒一飲韋韋方舉卮會有獵騎從西來引數犬婦人望見即東走數十步化為一狐韋大恐視手中卮乃一髑髏酒若牛溺之狀韋因病熱月余方瘳
