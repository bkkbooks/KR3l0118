body:
  text: 李大可李大可宗正卿李大可嘗至滄州州之饒安縣有人野行為虎所逐既及伸其左足示之有大竹刺貫其臂虎俯伏貼耳若請去之者其人為拔之虎甚悅宛轉搖尾隨其人至家乃去是夜投一鹿于庭如此歲余投野豕獐鹿月月不絶或野外逢之則隨行其人家漸丰因潔其衣服虎后見改服不識遂齒殺之家人收葬訖虎復來其家母罵之曰吾子為汝去刺不知報德反見殺傷今更來吾舍豈不愧乎虎羞慚而出然數日常旁其家既不見其人知其誤殺乃號呼甚悲因入至庭前奮躍拆脊而死見者咸異之藺庭雍吉陽治在涪州南泝黔江三十里有寺像設靈應古碑猶在物業甚多人莫敢犯涪州裨將藺庭雍妹因過寺中盜取常住物遂即迷路數日之內身變為虎其前足之上銀纏金釧宛然猶存每見鄉人隔樹與語云我盜寺中之物變身如此求見其母托人為言之母畏之不敢往虎來郭外經年而去王太海陵人王太者與其徒十五六人野行忽逢一虎當路其徒云十五六人決不盡死當各出一衣以試之至太衣吼而隈者數四海陵多虎行者悉持大棒太選一棒脫衣獨立謂十四人卿宜速去料其已遠乃持棒直前擊虎中耳故悶倒尋復起去太背走惶懼不得故道但草中行可十余里有一神廟宿于梁上其夕月明夜后聞草中虎行尋而虎至廟庭跳躍變成男子衣冠甚麗堂中有人問云今夕何爾纍悴神曰卒遇一人不意徑勇中其健棒困極逮死言訖入座上木形中忽舉頭見太問是何客太懼墮地具陳始末神云汝業為我所食然后十余日方可死我取爾早故中爾棒今以相遇理當佑之后數日宜持豬來以己血塗之指庭中大樹可系此下速上樹當免太后如言神從堂中而出為虎徑躍太高不可得乃俯食豬食畢入堂為人形太下樹再拜乃還爾后更無患荊州人荊州有人山行忽遇倀鬼以虎皮冒己因化為虎受倀鬼指揮凡三四年搏食人畜及諸野獸不可勝數身雖虎而心不願無如之何后倀引虎經一寺門過因遽走入寺庫伏庫僧床下道人驚恐以白有德者時有禪師能伏諸橫獸因至虎所頓錫問弟子何所求耶為欲食人為厭獸身虎弭耳流涕禪師手巾系頸牽還本房恆以衆生食及他味哺之半年毛落變人形具説始事二年不敢離寺后暫出門忽復遇倀以虎皮冒己遽走入寺皮及其腰下遂復成虎篤志誦經歲余方變自爾不敢出寺門竟至死劉老信州劉老者以白衣住持于山溪之間人有鵝二百餘只詣劉放生恆自看養數月后每日為虎所取以耗三十余頭村人患之羅落陷阱遍于放生所自爾虎不復來后數日忽有老叟巨首長鬣來詣劉問鵝何以少減答曰為虎所取又問何不取虎答云已設陷阱此不復來叟曰此為倀鬼所教若先制倀即當得虎劉問何法取之叟云此鬼好酸可以烏白等梅及楊梅布之要路倀若食之便不見物虎乃可獲言訖不見是夕如言布路之四鼓后聞虎落阱自爾絶焉虎婦利州賣飯人其子之婦山園采菜為虎所取經十二載而后還自説入深山石窟中本謂遇食久之相與寢處窟中都自四虎妻婦人者最老老虎恆持糜鹿等肉還以哺妻或時含水吐其口中婦人欲出輒為所怒驅以入窟積六七年后數歲漸失余虎老者獨在其虎自有婦人未常外宿后一日忽夜不還婦人心怪之欲出而不敢如是又一日乃徐出行數十步不復見虎乃極力行五六里聞山中伐木聲徑往就之伐木人謂是鬼魅以礫石投擲婦人大言其故乃相率詰問婦人云己是某家新婦諸人亦有是鄰里者先知婦人為虎所取衆人方信之鄰人因脫衫衣之將還會其夫已死翁姥憫而收養之婦人亦憨戇乏精神恆為往來之所狎劉全白親見婦人説其事云趙倜荊州有一商賈姓趙名倜多南泛江湖忽經歲余未歸有一人先至其家報趙倜妻云趙倜物貨俱沒于湖中倜僅免一死甚貧乏在路即當至矣其妻驚哭不已后三日有一人一如趙倜儀貌來及門外大哭其妻遽引入家內詢問其故安存經百餘日欲再商販謂趙倜妻曰我慣為商在外在家不樂我心無聊勿以我不顧戀爾當容我卻出投交友俄而倜輦物貨自遠而至及入門其妻反乃驚疑走出以投鄰家其趙倜良久問其故知其事遂令人喚其人其人至既見趙倜奔突南走趙倜與同伴十余人共趁之直入南門其人回顧謂倜曰我通靈虎也勿逐我我必傷爾輩遂躍身化為一赤色虎叫吼而去
