body:
  text: 犬上華隆晉泰興二年吳人華隆好弋獵畜一犬號曰的尾每將自隨隆後至江邊被一大蛇圍繞周身犬遂咋蛇死焉而華隆僵仆無所知矣犬倣徨嗥吠往復路間家人怪其如此因隨犬往隆悶絶委地載歸家二日乃蘇隆未蘇之間犬終不食自此愛惜如同於親戚焉楊生晉太和中廣陵人楊生者畜一犬憐惜甚至常以自隨後生飲醉臥於荒草之中時方冬燎原風勢極盛犬乃周匝嗥吠生都不覺犬乃就水自濡還即臥於草上如此數四周旋跬步草皆沾濕火至免焚爾後生因暗行墮井犬又嗥吠至曉有人經過路人怪其如是因就視之見生在焉遂求出已許以厚報其人欲請此犬為酬生曰此狗曾活我於己死即不依命餘可任君所須也路人遲疑未答犬乃引領視井生知其意乃許焉既而出之繫之而去卻後五日犬夜走還崔仲文安帝義熙年譙縣崔仲文與會稽石和俱為劉撫軍府吏仲文養一犬以獵麋鹿無不得也和甚愛之乃以丁奴易之仲文不與和及仲文入山獵至草中殺仲文欲取其犬犬齧和守其主尸爬地覆之後諸軍出獵見犬守尸人識其主因還啓劉撫軍石和假還至府門犬便往牽衣號吠人復白撫軍曰此人必殺犬主因録之撫軍拷問果得其實遂殺石和張然會稽張然滯役有少婦無子唯與一奴守舍奴遂與婦通然素養一犬名烏龍常以自隨後歸奴欲謀殺然盛作飲食婦語然與君當大別離君可強啖奴已張弓拔矢須然食畢然涕泣不能食以肉及飯擲狗祝曰養汝經年吾當將死汝能救我否狗得食不啖唯注睛視奴然拍膝大喚曰烏龍狗應聲傷奴奴失刀遂倒狗咋其陰然因取刀殺奴以妻付縣殺之楊褒楊褒者廬江人也褒旅遊至親知舍其家貧無備舍唯養一犬欲烹而飼之其犬乃跪前足以目視褒異而止之不令殺乃求之親知奉褒將犬歸舍經月餘常隨出入褒妻乃異志於褒褒莫知之經歲餘後褒妻與外密契欲殺褒褒是夕醉歸妻乃伺其外來殺褒既至方欲入室其犬乃齧折其足乃咬褒妻二人俱傷甚矣鄰里俱至救之褒醒見而搜之果獲其刀鄰里聞之送縣推鞫妻以實告褒妻及懷刀者並處極法鄭韶鄭韶者隋煬帝時左散騎常侍大業中授閩中太守韶養一犬憐愛過子韶有從者數十人內有薛元周者韶未達之日已事之韶遷太守略無恩恤元周忿恨以刃久伺其便無得焉時在閩中隋煬帝有使到韶排馬造迎之其犬乃銜拽衣襟不令出宅館吏馳告云使入郭韶將欲出為犬拽衣不放韶怒令人縛之於柱韶出使宅大門其犬乃掣斷繩而走依前拽韶衣不令去韶撫犬曰汝知吾有不測之事乎犬乃嗥吠跳身於元周隊內咬殺薛元周韶差人搜元周衣下果藏短劍耳柳超柳超者唐中宗朝為諫議大夫因得罪黜於嶺外超以清儉自守凡所經州郡不干撓廉牧以自給而領二奴掌閣掌書并一犬至江州超以鬱憤成疾二奴欲圖其資裝乃共謀曰可奉毒藥於諫議我等取財而為良人豈不好乎掌書曰善掌閣乃啓超曰人言有密詔到不全諫議命諫議家族將為奈何超曰然汝等當修饌伺吾食畢可進毒於吾吾甘死矣掌閣等聞言乃備珍饌掌閣在廚修辦掌書進之於超超食次忽見其犬乃分與食之涕泣撫犬曰我今日死矣汝託於何人耶犬聞之不食走入廚乃咬掌閣喉復至堂前嚙掌書二奴俱為犬所殺超未曉其事後經數日敕詔還京而復雪免乃知其犬之靈矣姚甲吳興姚氏者開元中被流南裔其人素養二犬在南亦將隨行家奴附子及子小奴悉皆勇壯謀害其主然後舉家北歸姚所居偏僻鄰里不接附子忽謂主云郎君家本北人今竄南荒流離萬里忽有不祥奴當扶持喪事北歸頃者以來已覺衰憊恐溘然之後其餘小弱則郎君骸骨不歸故鄉伏願圖之姚氏曉其意云汝欲令我死耶奴曰正爾慮之姚請至明晨及期奴父子具膳勸姚飽食奉觴哽咽心既倉皇初不能食但以物飼二犬值奴入持因撫二犬云吾養汝多年今奴等殺我汝知之乎二犬自爾不食顧主悲號須臾附子至一犬咋其喉斷而斃一犬遽入廚又咋其小奴喉亦斷又咋附子之婦殺之姚氏自爾獲免劉巨麟劉巨麟開元末為廣府都督在州恆養一犬雄徑多力犬至馴附有異於他巨麟常夜迎使犬忽遮護不欲令出巨麟亦悟曰犬不使我行耶徘徊良久人至白使近巨麟叱曰我行部從如雲寧有非意之事使家人關犬而出上馬之際犬亦隨之忽咋一從者喉中頃之死巨麟驚愕搜死者懷中得利匕首初巨麟常鞭箠此僕故修其怨私欲報復而犬逆知之是以免難章華饒州樂平百姓章華元和初常養一犬每樵採入山必隨之比舍有王華者往來犬輒吠逐三年冬王華同上山林採柴犬亦隨之忽有一虎榛中跳出搏王華盤踞於地然猶未傷乃踞而坐章華叫喝且走虎又舍王華來趁章華既獲復坐之時犬潛在深草見華被擒突出跳上虎頭咋虎之鼻虎不意其來驚懼而走二人皆僵仆在地如沉醉者其犬以鼻襲其主口取氣即吐出涎水如此數四其主稍蘇犬乃復以口襲王華之口亦如前狀良久王華能行相引而起犬伏作醉狀一夕而斃矣范翊范翊者河東人也以武藝授裨將養一犬甚異人性翊有親知陳福亦署裨將翊差往淮南充使收市綿綺時福充副焉翊因酒席恃氣而蔑福因成讎恨乃暗搆翊罪潛狀申主帥主帥不曉其由謂其托實乃停翊職翊飲恨而歸福乃大獲補署其犬見翊沉廢乃往福舍伺其睡咋斷其首銜歸示翊翊驚懼將福首級領犬詣主帥請罪主帥詰之翊以前事聞主帥察之卻歸翊本職其犬主帥留在使宅郭釗郭司空釗大和中自梓潼移鎮西涼府時有閽者甚謹朴釗念之多委以事嘗一日釗命市紋繒絲帛百餘段其價倍且以為欺我即囚於獄用致其罪獄既具釗命笞於庭忽有十餘犬爭擁其背吏卒莫能制釗大異之且訊其事閽者曰某好閲佛氏金剛經自孩稚常以食飼群犬不知其他釗嘆曰犬尚能感其惠吾安可以不施恩遂釋放閽者盧言盧言者上黨人也常旅泊他邑路行忽見一犬羸瘦將死矣言憫之乃收養經旬日其犬甚肥澤自爾凡所歷郡邑悉領之後將抵亳忽於市肆遇友人邀飲大醉而歸乃入房就寢俄而鄰店火發犬忙迫乃上床於言首嗥吠乃銜衣拽之言忽驚起乃見火已爇其屋柱透走而出方免斯難趙叟扶風縣西有大和寺在高岡之上其下有龕豁若堂中有貧者趙叟家焉叟無妻兒病足傴僂常策杖行乞里中人哀其老病且窮無所歸率給以食叟既得食常先聚群犬以食之後歲餘叟病寒臥於龕中時大雪叟無衣裸形俯地且戰且呻其群犬俱集於叟前搖尾而嗥已而環其衽席競以足擁叟體由是寒少解後旬餘竟以寒死其龕犬俱哀鳴晝夜不歇數日方去陸機晉陸機少時頗好獵在吳有家客獻快犬曰黃耳機任洛常將自隨此犬黠慧能解人語又常借人三百里外犬識路自還機羈官京師久無家問機戲語犬曰我家絶無書信汝能齎書馳取消息否犬喜搖尾作聲應之機試為書盛以竹筒繫犬頸犬出驛路走向吳飢則入草噬肉每經大水輒依渡者弭毛掉尾向之因得載渡到機家口銜筒作聲示之機家開筒取書看畢犬又向人作聲如有所求其家作答書內筒復繫犬頸犬復馳還洛計人行五旬犬往還才半後犬死還葬機家村南二百步聚土為墳村人呼之為黃耳冢石玄度宋元徽中有石玄度者畜一黃犬生一子而色白犬母愛之異常每銜食飼之及長成玄度每出獵未歸犬母輒門外望之後玄度患氣嗽漸就危篤醫為處方須白狗肺焉市索卒不得乃殺所畜白狗取肺以供湯用既而犬母跳躍嗥叫纍日不息其家人煮狗與客食之投骨於地犬母輒銜置屋中食畢乃移入後園中一桑樹下掘土埋之日夕向樹嗥吠月餘方止而玄度所疾不瘳以至於卒終謂左右曰湯不救我疾實枉殺此狗其弟法度自此不食犬肉焉齊瓊唐禁軍大校齊瓊者始以馳騁大承恩寵以是假御中銜至於劇憲家畜良犬四常畋遊廣囿輒飼以粱肉其一獨填茹咽喉齒牙間以出如隱叢薄然後食食已則復至齊竊異之一日令僕伺其所往則北垣枯竇有母存焉老瘠疥穢吐哺以飼齊亦義者奇歎久之乃命篋牝犬歸以販茵席之餘餅餌飽之犬則搖尾俯首若懷知感爾後擒姦逐狡指顧如飛將扈獵駕前必獲豐賞逾年牝死犬加勤效又更律琯齊亦殂落犬嗥吠終夕呱呱不輟越月將有事於丘隴則留獒以禦姦盜及懸窆之夕犬獨來足踣土成坳首叩棺見血掩土未畢犬亦致斃石從義秦州都押衙石從義家有犬生數子其一獻戎帥琅琊公自小至長與母相隔及節使率大將與諸校會獵於郊原其犬忽子母相遇於田中欣喜之貌不可狀名獵罷各逐主歸自是其子逐日於使廚內竊肉歸飼其母至有銜其頭肚肩脅盈於衙將之家衙中人無有知者田招田招者廣陵人也貞元初招以他事至於宛陵時招有表弟薛襲在彼襲見招至主禮極厚因一日招謂襲曰我思犬肉食之襲乃諸處覓之了不可得招曰汝家內犬何用可殺而食之襲曰此犬養來多時誰忍下手招曰吾與汝殺之言訖招欲取犬忽乃失之莫可求覓後經旬日招告襲將歸廣陵襲以親表之分遂重禮而遣之招出郭至竹室步歇次忽見襲犬在道側招認而呼之其犬乃搖尾隨之招夜至旅店將宿其犬亦隨而宿之伺招睡乃咋其首銜歸焉襲懼遂以茲事白於州縣太守遣人覆驗異而釋之裴度裴令公度性好養犬凡所宿設燕會處悉領之所食物餘者便和碗與犬食時子壻李甲見之數諫裴令曰人與犬類何惡之甚犬正食見李諫乃棄食以目視李而去裴令曰此犬人性必讎於子竊慮之李以為戲言將欲午寢其犬乃蹲而向李李見之乃疑犬讎之犬見未寢又出其戶李見犬去後乃以巾櫛安枕多排衣服以被覆之其狀如人寢李乃藏於異處視之逡巡犬入其戶將謂李已睡乃跳上寢床當喉而嚙嚙訖知謬犬乃下床憤跳號吠而死
