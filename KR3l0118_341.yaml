body:
  text: 李俊李俊嶽州刺史李俊舉進士連不中第貞元二年有故人國子祭酒包佶者通於主司援成之榜前一日當以名聞執政初五更俊將候佶里門未開立馬門側傍有賣糕者其氣爞爞有一吏若外郡之郵檄者小囊氈帽坐於其側頗有欲糕之色俊為買而食之客甚喜啖數片俄而里門開衆竟出客獨附俊馬曰願請間俊下聽之某乃冥之吏送進士名者君非其徒耶俊曰然曰送堂之榜在此可自尋之因出視俊無名垂泣曰苦心筆硯二十餘年偕計者亦十年今復無名豈終無成乎曰君之成名在十年之外祿位甚盛今欲求之亦非難但於本録耗半且多屯剝才獲一郡如何俊曰所求者名名得足矣客曰能行少賂於冥吏即於此取其同姓者易其名可乎俊問幾何可曰陰錢三萬貫某感恩而以誠告其錢非某敢取將遺牘吏來日午時送可也復授筆使俊自注從上有故太子少師李夷簡名俊欲揩之客遽曰不可此人祿重未易動也又其下有李溫名客曰可矣乃揩去溫字注俊字客遽卷而行曰無違約即而俊詣佶佶未冠聞俊來怒出曰吾與主司分深一言狀頭可致公何躁甚頻見問吾其輕語者耶俊再拜對曰俊懇於名者若恩決此一朝今當呈榜之晨冒責奉謁佶唯唯色猶不平俊愈憂之乃變服伺佶出隨之經皇城東此隅逢春官懷其榜將赴中書佶揖問曰前言遂否春官曰誠知獲罪負荊不足以謝然迫於大權難副高命佶自以交分之深意謂無阻聞之怒曰季布所以名重天下者能立然諾今君移妄於某蓋以某官間也平生交契今日絶矣不揖而行春官遂追之曰迫於豪權留之不得竊恃深顧處於形骸見責如此寧得罪於權右耳請同尋榜揩名填之祭酒開榜見李公夷簡欲揩春官急曰此人宰相處分不可去指其下李溫曰可矣遂揩去溫字注俊字及榜出俊名果在已前所指處其日午時隨衆參謝不及赴糕客之約追暮將歸道逢糕客泣示之背曰為君所誤得杖矣牘吏將舉勘某更他祈共止之某背實有重杖者俊驚謝之且曰當如何客曰來日午時送五萬緡亦可無追勘之厄俊曰諾及到時焚之遂不復見然後筮仕之後追勘貶降不絶於道才得嶽州刺史未幾而終李赤貞元中吳郡進士李赤者與趙敏之相同遊閩行及衢之信安去縣三十里宿於館廳宵分忽有一婦人入庭中赤於睡中蹶起下階與之揖讓良久即上廳開篋取紙筆作一書與其親云某為郭氏所選為壻詞旨重疊訖乃封於篋中復下庭婦人抽其巾縊之敏之走出大叫婦人乃收巾而走乃視其書赤如夢中所為明日又偕行南次建中驛白晝又失赤敏之即遽往廁見赤坐於牀大怒敏之曰方當禮謝為爾所驚浹日至閩屬寮有與赤遊舊者設燕飲次又失赤敏之疾索於廁見赤僵仆於地氣已絶矣韋浦韋浦者自壽州士曹赴選至閿鄉逆旅方就食忽有一人前拜曰客歸元昶常力鞭轡之任願備門下廝養卒浦視之衣甚垢而神彩爽邁因謂曰爾何從而至對曰某早蒙馮六郎職在河中歲月頗多給事亦勤甚見親任昨六郎絳州軒轅四郎同至此求卞判官買腰帶某於其下丐茶酒直遂有言語相及六郎謂某有所欺斥留於此某傭賤復鮮資用非有符牒不能越關禁伏知二十二郎將西去償因而獲歸為願足矣或不棄頑下終賜鞭驅小人之分又何幸焉浦許之食畢乃行十數里承順指顧無不先意浦極謂得人俄而憩於茶肆有扁乘數十適至方解轅縱牛齕草路左歸趨過牛群以手批一牛足牛即鳴痛不能前主初不之見遽將求醫歸謂曰吾常為獸醫為爾療此牛即於墻下捻碎土少許傅牛腳上因疾驅數十步牛遂如故衆皆興嘆其主乃賞茶二斤即進於浦曰庸奴幸蒙見諾思以薄伎所獲效獻芹者浦益憐之次於潼關主人有稚兒戲於門下乃見歸以手挃其背稚兒即驚悶絶食頃不寤主人曰是狀為中惡疾呼二娘久方至二娘巫者也至則以琵琶迎神欠嚏良久曰三郎至矣傳語主人此客鬼為崇吾且録之矣言其狀與服色真歸也又曰若以蘭湯浴之此患除矣如言而稚兒立愈浦見歸所為已惡之及巫者有説呼則不至矣明日又行次赤水西路傍忽見元昶破弊紫衫有若負而顧步甚重曰某不敢以為羞恥便不見二十二郎某客鬼也昨日之事不敢復言已見責於華嶽神君巫者所云三郎即金天也某為此界不果間行受笞至重方見二十二郎到京當得本處縣令無足憂也他日亦此佇還車耳浦云爾前所説馮六郎等豈皆人也歸曰馮六郎名夷即河伯軒轅天子之愛子也卞判官名和即昔刖足者也善別寶地府以為荊山玉使判官軒轅家奴客小事不相容忍遽令某失馮六郎意今日迍躓實此之由浦曰馮何得第六曰馮水官也水成數六耳故黃帝四子軒轅四郎即其最小者也浦其年選授霍丘令如其言及赴官至此雖無所覩肸饗如有物焉鄭馴貞元中進士擢第調補門下典儀第三十五莊居在華陰縣南五六里為一縣之勝馴兄弟四人曰駉曰驥曰騊騊與馴有科名時譽縣大夫泊邑客無不傾嚮之馴與渭橋給納判官高叔讓中外相厚時往求丐高為設鱠食其夜暴病霍亂而卒時方暑不及候其家人即為具棺槨衾禭斂之冥器奴馬無不精備題冥器童背一曰鷹兒一曰鶻子馬有青色者題云撒豆驄十數日柩歸華陰別墅時邑客李道古遊虢川半月矣未知馴之死也回至潼關西永豐倉路忽逢馴自北來車僕甚盛李曰別來旬日行李何盛耶色氣欣然謂李曰多荷渭橋老高所致即呼二童鷹兒鶻子參李大郎戲謂曰明時文士乃蓄鷹鶻耶馴又指所乘馬曰兼請看僕撒豆驄李曰僕頗有羡色如何馴曰但勤修令德致之何難乃相與並轡至野狐泉李欲留食馴以馬策過曰去家咫尺何必食為有頃到華陰嶽廟東馴揖李曰自此徑路歸矣李曰且相隨至縣幸不回路馴曰僕離家半月還要早歸固不肯過嶽廟須臾李至縣問吏曰令與諸官何在曰適往縣南慰鄭三十四郎矣李曰慰何事吏曰鄭三十五郎今月初向渭橋亡神柩昨夜歸莊耳李囅然曰我適與鄭偕自潼關來一縣人吏皆曰不虛李愕然猶未之信即策馬疾馳往鄭莊中路逢縣吏崔頻縣丞裴懸主簿盧士瓊縣尉莊儒及其弟莊古邑客韋納郭存中並自鄭莊回立馬敘言李乃大驚良久方能言且憂身之及禍後往來者往往於京城中鬧處相逢行李僕馬不異李之所見而不復有言魏朋建州刺史魏朋辭滿後客居南昌素無詩思後遇病迷惑失心如有人相引接勿索筆抄詩言孤憤臨清江每覩白日晚松影搖長風蟾光落巖甸故鄉千里餘親戚罕相見望望空雲山哀哀淚如霰恨為泉臺客復此異鄉縣願言敦疇昔忽以棄疵賤詩意如其亡妻以贈朋也後十餘日朋卒道政坊宅道政里十字街東貞元中有小宅怪異日見人居者必大遭凶禍時進士房次卿假西院住纍月無患乃衆誇之云僕前程事可以自得矣咸謂此宅凶於次卿無何有李直方聞而答曰是先輩凶於宅人皆大笑後為東平節度李師古買為進奏院是時東平軍每賀冬正常五六十人鷹犬隨之武將軍吏烹炮屠宰悉以為常進士李章武初及第亦負壯氣詰朝訪太史丞徐澤遇早出遂憩馬於其院此日東平軍士悉歸忽見堂上有傴背衣𪑦緋老人目且赤而有淚臨街曝陽西軒有一衣暗黃裙白褡襠老母荷擔二籠皆盛亡人碎骸及驢馬等骨又插六七枚人肋骨於其髻為叉似欲移徙老人呼曰四娘子何為至此老母應曰高八丈萬福遽云且辭八丈移去近來此宅大蹀聒求住不得也章武知音親説此宅本凶或云章武因此玥粉黛耳鄭瓊羅段文昌從弟某者貞元末自信安還洛暮達瓜洲宿於舟中夜久彈琴忽外有嗟嘆聲止息即無如此數四乃緩軫還寢夢一女年二十餘形悴衣敗前拜曰妾姓鄭名瓊羅本居丹徒父母早亡依於孀嫂嫂不幸又沒遂來楊子尋姨夜至逆旅市吏子王惟舉乘醉將逼辱妾知不免因以領巾絞頸自殺市吏子乃潛埋妾於魚行西渠中其夕再見夢於楊子令石義竟不為理復見冤氣於江石尚謂非煙之祥圖而表奏抱恨四十年無人為雪妾父母俱善琴適聽君琴聲奇弄翕響不覺來此尋至洛北河清縣溫谷訪內弟樊元則少有異術居數日忽曰兄安得一女鬼相隨請言遣之乃張燈焚香作法頃之燈後窣窣有聲元則曰是請紙筆也即投紙筆於燈影中少頃滿紙疾落燈前視之書盈於幅書若雜言七字辭甚悽恨元則遽令録之言鬼書不久輒漫滅及曉紙上若煤污無復字也元則復令具酒脯紙錢乘昏焚於道有風旋灰直上數尺及聞悲泣聲詩凡二百六十二字率敘幽冤之意語不甚曉詞故不載其中二十八字曰痛填心兮不能語寸斷腸兮訴何處春生萬物妾不生更恨香魂不相遇
