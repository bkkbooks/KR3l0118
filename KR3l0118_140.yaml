body:
  text: 大星大星唐開元二年五月二十九日夜大流星如甕或如盆大者貫北斗並西北落小者隨之無數天星盡搖至曉乃止止原作上據明鈔本黃本改七月襄王崩謚殤帝十月吐蕃入隴右掠羊馬殺傷無數其年六月大風拔樹發屋長安街中樹連根出者十七八長安城初建隋將作大匠高穎所植槐樹殆三百餘年至是拔出終南山竹開花結子綿亙山谷大小如麥其歲大饑其竹並枯死嶺南亦然人取而食之醴泉雨麵如米顆人可食之後漢襄楷云國中竹柏枯者不出三年主當之人家竹結實枯死者家長當之終南竹花枯死者開元四年而太上皇崩出朝野僉載火災開元五年洪潭二州復有火災晝日人見火精赤燩燩所詣即火起東晉時王弘為吳郡太守亦有此災弘撻部人將為不慎後坐廳事見一物赤如信幡飛向人家舍上俄而火起方知變不復由人遭爇人家遂免笞罰出朝野僉載水災唐開元八年契丹叛關中兵救營府至澠池缺門營於穀水側夜半水漲漂二萬餘人唯行綱夜樗蒲不睡接高獲免村店並沒盡上陽宮中水溢宮人死者十七八其年京興道坊一夜陷為池沒五百家初鄧州三鴉口見二小兒以水相潑須臾有大蛇十圍已上張口向天人或有斫射者俄而雲雨晦冥雨水漂二百家小兒及蛇不知所在出朝野僉載僧一行唐開元十五年一行禪師臨寂滅遺表云他時慎勿以宗子為相蕃臣為將後李林甫擅權於內安祿山弄兵於外東都為賊所陷天寶中樂人及閭巷好唱胡渭州以回紇為破後逆胡兵馬竟被回紇擊破國風興廢潛見於樂音時兩京小兒多將將原作小據明鈔本改錢攤地於穴中更爭勝負名曰投胡後士庶果投身於胡庭兩京童謠曰不怕上蘭單唯愁答辯難無錢求案典生死任都官及剋復諸舊僚朝士繫於三司獄鞠問罪狀家產罄盡骨肉分散申雪無路即其兆也出廣德神異錄汪鳳唐蘇州吳縣甿汪鳳宅在通津往往怪異起焉不十數年鳳之妻子洎僕使輩死喪略盡鳳居不安因貨之同邑盛忠忠居未五六歲其親戚凋隕又復無幾忠大憂懼則損其價而摽貨焉吳人皆知其故久不能售邑胥張勵者家富於財群從彊大為邑中之蠹橫居與忠同里每旦詣曹路經其門則遙見二青氣粗如箭簳而緊銳徹天焉勵謂實玉之藏在下而精氣上騰也不以告人日日視之因詣忠請以百緡而交關焉尋徙入復晨望其氣不衰於是大具畚鍤發其氣之所萌也掘地不六七尺遇盤石焉去其石則有石櫃雕鐫製造工巧極精仍以鐵索周匝束縛皆用鐵汁固縫重以石灰密封之每面各有朱記七窠文若謬篆而又屈曲勾連不可知識勵即加鉗鎚極力開拆石櫃既啟有銅釜可容一斛釜口銅盤覆焉用鉛錫錮護仍以紫印九窠迴旋印之而印文不類前體而全如古篆人無解者勵拆去銅盤而釜口以緋繒三重羃之勵纔揭起忽有大猴跳而出眾各驚駭無敢近者久之超踰而莫如所詣勵因視釜中乃有石銘云禎明元年七月十五日茅山道士鮑知遠囚猴神於此其有發者發後十二年胡兵大擾六合煙塵而發者俄亦族滅禎明即陳後主叔寶年號也勵以天寶二年十月發至十四年冬祿山起戎自是周年勵家滅矣出集異記僧普滿唐大曆中澤潞有僧號普滿隨意所為不拘僧相或歌或笑莫喻其旨以言事往往有驗故時人待之為萬迴建中初於潞州佛舍中題詩數篇而亡所記者云此水連涇水雙珠血滿川青牛將赤虎還號太平年題詩後人莫能知及賊泚稱兵眾方解悟此水者泚字涇水者自涇州兵亂也雙珠者泚與滔也青牛者興元二年乙丑歲乙者木也丑者牛也明年改元貞元歲在丙寅丙者火也寅者虎也至是賊已平故云青牛將赤虎還號太平年出廣德神異錄秦城芭蕉天水之地邇於邊陲土寒不產芭蕉戎師使人於興元求之植二本于亭臺間每至入冬即連土掘取之埋藏于地窟候春暖即再植之庚午辛未之間有童謠曰花開來裹花謝束裹而又節氣變而不寒冬即和煦夏即暑毒甚於南中芭蕉於是花開秦人不識遠近士女來看者填咽衢路尋則蜀人犯我封疆自爾年年一來不失芭蕉開謝之候乙亥歲岐隴援師不至自隴之西竟為蜀人所有暑濕之候一如巴邛者蓋劍外節氣先布於秦城童謠之言不可不察出玉堂閒話睿陵僧睿陵之側有貧僧居之草衣芒屨不接人事嘗燔木取灰貯之亦有施其資鏹者得即藏於灰中無所使用出入必挽一拖車謂人曰此是駟馬車汝知之乎他日必有龍輿鳳輦萃於此地居人罔測其由及漢高祖皇帝因山於此陵寢陶器所用須灰僧貯灰甚多至于畢功資用不闕又於灰積中頗獲資鏹輦輅之應不差毫釐因山既畢僧亦化滅睿陵行禮官寮靡不知者出玉堂閒話興聖觀蜀城舊有興聖觀廢為軍營庭宇堙毀已數十年軍中生子者奕世擐甲矣殊不知此為觀基甲申歲為蜀少主生日僚屬將率俸金營齋忽下令遣將營齋之費亟修興聖觀左徒藏事急如星火不日而觀成丹雘未晞興聖統師而入蜀嗟乎國之興替運數前定其可以苟延哉出王氏見聞錄駱駝杖蜀地無駱駝人不識之蜀將亡王公大人及近貴權幸出入宮省者竟執駱駝杖以為禮自是內外效之其杖長三尺許屈一頭傅以樺皮識者以為不祥明年北軍至駱駝塞劍棧而來般輦珍寶填滿城邑至是方驗出王氏見聞錄
