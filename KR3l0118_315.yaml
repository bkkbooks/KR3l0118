body:
  text: 卷第三百一十五神二十五梨山廟建州梨山廟土人云故相李回之廟回貶為建州刺史後卒于臨川卒之夕建安人咸夢回乘白馬入梨山及凶問至因立祠焉世傳靈應王延政在建安與福州構隙使其將吳某帥兵向晉安吳新鑄一劍甚利將行攜劍禱于梨山廟且曰某願以此劍手殺千人其夕夢人謂己曰人不當發惡願吾祐汝使汝不死於人之手既戰敗績左右皆潰散追兵將及某自度不免即以此劍自刎而死吳延瑫廣陵豆倉官吳延瑫者其弟既冠將為求婦鄰有媒嫗素受吳氏之命一日有人詣門云張司空家使召隨之而去在政勝寺之東南宅甚雄壯嫗云初不聞有張公在是其人云公沒於臨安之戰故少人知者久知其家陳設炳煥如王公家見一老姥云是縣君之坐頃之其女亦出姥謂嫗曰聞君謂吳家求婚吾欲以此女事之嫗曰吳氏小吏貧家豈當與貴人為婚邪女因自言曰兒以母老無兄弟家業既大事託善人聞吳氏子孝謹可事豈求高門邪嫗曰諾將問之歸以告延瑫異之未敢言數日忽有車輿數乘詣鄰嫗之室乃張氏女與二老婢俱至使召延瑫之妻即席具酒食甚豐皆張氏所備也其女自議婚事瑫妻內思之此女雖極端麗然可年三十餘其小郎年節少未必歡也其女即言曰夫妻皆繫前定義知有合豈老少邪瑫妻聳然不敢復言女即出紅白羅二匹曰以此為禮其他贈遺甚多至暮邀鄰嫗俱歸其家留數宿謂嫗曰吾家至富人不知耳他日皆吳郎所有也室中三大廚其高至屋因開示之一廚實以金二廚實以銀又指地曰此中皆錢也即命掘之深尺餘即見錢充積又至外廳庭中繫朱鬣白馬傍有一豕曰此皆禮物也廳之西復有廣廈百工製作畢備曰此亦造禮物也至夜就寢聞豕如有驚呼諸婢曰此豕不宜在外是必為蛇所囓也嫗曰蛇豈食豬者邪女曰此中常有之即相與秉燭視之果見大赤蛇自地出縈繞其豕復入地去救之得免明日方與嫗別忽召二青衣夾侍左右謂嫗曰吾有故近出少選當還即與青衣淩虛而去嫗大驚其母曰吾女暫之天上會計但坐無苦也食頃乃見自外而入微有酒氣曰諸仙留飲吾以媒嫗在此固辭得還婦歸益駭異而不敢言又月餘復召嫗去縣君疾亟及往其母已卒因嫗至葬葬于楊子縣北徐氏村中盡室往會徐氏有女可十餘歲張女撫之曰此女有相當為淮北一武將之妻善視之既葬復後贈嫗舉家南去莫知所之婚事亦竟不成嫗歸訪其故居但里舍數間問其里中云住此已久相傳云張司空之居竟不得其是後十年廣陵亂吳氏之弟歸于建業亦竟無恙餘光祠漢靈帝初平三年起裸遊館盛夏避暑長夜飲宴醉迷於天曉內官以巨燭投於殿下帝乃驚悟及董卓破京師焚其館宇至魏咸熙中其投燭之所冥夜有光如星時人以為神光于此立室名曰餘光祠以祈福至明帝末稍除焉鱔父廟會稽石亭埭有大楓樹其中朽空每雨水輒滿有估客攜生鱔至此輒放一頭於朽樹中村民見之以魚鱔非樹中之物咸神之乃依樹起室宰牲祭祀未嘗虛日目為鱔父廟有禱請及穢慢則禍福立至後估客復至大笑乃求鱔臛食之其神遂絶鮑君昔汝南有人於田中設繩置以捕麞而得者其主未覺有行人見之因竊取麞去猶念取之不俟其主有鮑魚乃以一頭置罝中而去本主來於罝中得鮑魚怪之以為神不敢持歸於是村里因共而置屋立廟號為鮑君後轉多奉之者丹楹藻梲鍾鼓不絶病或有偶愈者則謂有神行道經過莫不至祠焉積七八年鮑魚主後行過廟下問其故人具為説乃曰此是我鮑魚耳何神之有於是乃息張助南頓人張助者耕於田中種禾見一李核意欲持歸乃掘取之以濕土封其根置空桑中遂忘取之助後作遠職不在其後里中人見桑中忽生李謂之神有病目痛者蔭息此桑下因祝之言李君能令我目愈者謝一豚其目偶愈便殺豚祭之傳者過差便言此樹能令盲者得視遠近翕然互來請福其下常車馬填溢酒肉滂沱如此數年張助罷職來還見之乃曰此是我昔所置李核耳何有神乎乃斫去著餌石人又汝陽有彭氏墓近大道墓口有一石人田家老母到市買數片餌以歸天熱過蔭彭氏墓口樹下以所買餌暫著石人頭上及去忘取之後來者見石人頭上有餌求而問之或人調曰此石人有神能治病病愈者以餌來謝之如此轉以相語云頭痛者摩石人頭腹痛者摩石人腹亦還以自摩無不愈者遂千里來就石人治病初具雞豚後用牛羊為立帷帳管絃不絶如此數年前忘餌母聞之乃為人説無復往者洛西古墓洛西有古墓穿壞多時水滿墓中多石灰汁主治瘡夏日行人有病瘡煩熱見此墓中水清好因自洗浴瘡偶便愈於是諸病者聞之悉往自洗轉有飲之以治腹內者近墓居人便於墓所立廟舍而賣此水而往買者又當祭廟中酒肉不絶而來者轉多此水行盡於是賣者常夜竊運他水以益之其遠道人不能往者皆因行使或持器遺信買於是賣水者大富或言其無神官家禁止遂填塞之乃絶豫章樹唐洪州有豫章樹從秦至今千年以上遠近崇敬或索女婦或索豬羊有胡超師隱於白鶴山中時遊洪府見豬羊婦女遮列訴稱此神枉見殺害超乃積薪將焚之猶驚懼其樹上有鸛雀窠數十欲燒前三日鸛翔空中徘徊不下及四邊居宅櫛比皆是竹木恐火延燒于時大風起吹焰直上旁無損害遂奏其地置觀焉狄仁傑檄唐垂拱四年安撫大使狄仁傑檄告西楚霸王項君將校等其略曰鴻名不可以謬假神器不可以力爭應天者膺樂推之名背時者非見幾之主自祖龍御宇橫噬諸侯任趙高以當軸棄蒙恬而齒劍沙丘作禍於前望夷覆滅於後七廟隳圮萬姓屠原鳥思靜於飛塵魚豈安於沸水赫矣皇漢受命玄穹膺赤帝之貞符當四靈之欽運俯張地紐彰鳳紀之祥仰緝天綱鬱龍興之兆而君潛遊澤國嘯聚水鄉矜扛鼎之雄逞拔山之力莫測大符之所會不知曆數之有歸遂奮關中之翼竟垂垓下之翅蓋實由於人事焉有屬於天亡雖驅百萬之兵終棄八千之子以為殷監豈不惜哉因當匿魄東峰收魂北極豈合虛承廟食廣費牲牢仁傑受命方隅循革攸寄今遣焚燎祠宇削平臺室使蕙帷銷盡羽帳隨煙君宜速遷勿為人患檄到如律令飛布山廟正文原闕共六行行二十二字畫琵琶原闕首二行行二十二字泊船書生因上山間步入林數十步上有一坡見僧房院開中有牀牀塌門外小廊數間傍有筆硯書生攻畫遂把筆於房門素壁上畫一琵琶大小與真不異畫畢風靜船發僧歸見畫處不知何人乃告村人曰恐是五臺山聖琵琶當亦戲言而遂為村人傳説禮施求福甚效書生便到楊家入吳經年乃聞人説江西路僧室有聖琵琶靈應非一書生心疑之因還江西時令船人泊船此處上訪之僧亦不在所畫琵琶依舊前幡花香爐書生取水洗之盡僧亦未歸書生夜宿于船中至明日又上僧夜已歸覺失琵琶以告鄰人大集相與悲歎書生故問具言前驗今應有人背著琵琶所以潛隱書生大笑為説畫之因由及拭却之由僧及村人信之靈聖亦絶耳壁山神合州有壁山神鄉人祭必乙太牢不爾致禍州里懼之每歲烹宰不知紀極蜀僧善曉早為州縣官苦於調選乃剃削為沙門堅持戒律雲水參禮行經此廟乃曰天地郊社薦享有儀斯鬼何得潛於天地牛者稼穡之資爾淫其祀無乃過乎乃命斧擊碎土偶數軀殘一偶而僧亦力困稍蘇其氣方次擊之廟祝祈僧曰此一神從來蔬食由是存之軍州驚諤申聞本道而僧端然無恙斯以正理責之神亦不敢加禍也
