body:
  text: 謝小娥傳謝小娥傳小娥姓謝氏豫章人估客女也生八歲喪母嫁歷陽俠士段居貞居貞負氣重義交游豪俊小娥父畜巨産隱名商賈間常與段壻同舟貨往來江湖時小娥年十四始及笄父與夫俱為盜所殺盡掠金帛段之弟兄謝之生侄與僮仆輩數十悉沉于江小娥亦傷胸折足漂流水中為他船所獲經夕而活因流轉乞食至上元縣依妙果寺尼淨悟之室初父之死也小娥夢父謂曰殺我者車中猴門東草又數日復夢其夫謂曰殺我者禾中走一日夫小娥不自解悟常書此語廣求智者辨之歷年不能得至元和八年春余罷江西從事扁舟東下淹泊建業登瓦官寺閣有僧齊物者重賢好學與余善因告余曰有孀婦名小娥者每來寺中示我十二字謎語某不能辨余遂請齊公書于紙乃憑檻書空凝思默慮坐客未倦了悟其文令寺童疾召小娥前至詢訪其由小娥嗚咽良久乃曰我父及夫皆為賊所殺邇后嘗夢父告曰殺我者車中猴門東草又夢夫告曰殺我者禾中走一日夫歲久無人悟之余曰若然者吾審詳矣殺汝父是申蘭殺汝夫是申春且車中猴車字去上下各一畫是申字又申屬猴故曰車中猴草下有門門中有東乃蘭字也又禾中走是穿田過亦是申字也一日夫者夫上更一畫下有日是春字也殺汝父是申蘭殺汝夫是申春足可明矣小娥慟哭再拜書申蘭申春四字于衣中誓將訪殺二賊以復其冤娥因問余姓氏官族垂涕而去爾后小娥便為男子服傭保于江湖間歲余至潯陽郡見竹戶上有紙榜子云召傭者小娥乃應召詣門問其主乃申蘭也蘭引歸娥心憤貌順在蘭左右甚見親愛金帛出入之數無不委娥已二歲余竟不知娥之女人也先是謝氏之金寶錦繡衣物器具悉掠在蘭家小娥每執舊物未嘗不暗泣移時蘭與春宗昆弟也時春一家住大江北獨樹浦與蘭往來密洽蘭與春同去經月多獲財帛而歸每留娥與蘭妻蘭氏同守家室酒肉衣服給娥甚丰或一日春攜文鯉兼酒詣蘭娥私歎曰李君精悟玄鑒皆符夢言此乃天啓其心志將就矣是夕蘭與春會群賊畢至酣飲暨諸凶既去春沉醉臥于內室蘭亦露寢于庭小娥潛鎖春于內抽佩刀先斷蘭首呼號鄰人并至春擒于內蘭死于外獲贓收貨數至千萬初蘭春有党數十暗記其名悉擒就戮時潯陽太守張公善娥節行為具其事上旌表乃得免死時元和十二年夏歲也復父夫之仇畢歸本里見親屬里中豪族爭求聘娥誓心不嫁遂剪發披褐訪道于牛頭山師事大士尼蔣律師娥志堅行苦霜春雨薪不倦筋力十三年四月始受具戒于泗州開元寺竟以小娥為法號不忘本也其年夏月余始歸長安途經泗濱過善義寺謁大德尼令操見新戒者數十淨發鮮帔威儀雍容列侍師之左右中有一尼問師曰此官豈非洪州李判官二十三郎者乎師曰然曰使我獲報家仇得雪冤恥是判官恩德也顧余悲泣余不之識詢訪其由娥對曰某名小娥頃乞食孀婦也判官時為辨申蘭申春二賊名字豈不憶念乎余曰初不相記今即悟也娥因泣具寫記申蘭申春復父夫之仇志願粗畢經營終始艱苦之狀小娥又謂余曰報判官恩當有日矣豈徒然哉嗟乎余能辨二盜之姓名小娥又能竟復父夫之仇冤神道不昧昭然可知小娥厚貌深辭聰敏端特煉指跛足誓求真如爰自入道衣無絮帛齊無鹽酪非律儀禪理口無所言后數日告我歸牛頭山扁舟泛淮云游南國不復再遇君子曰誓志不舍復父夫之仇節也傭保雜處不知女人貞也女子之行唯貞與節能終始全之而已如小娥足以警天下逆道亂常之心足以觀天下貞夫孝婦之節余備詳前事發明隱文暗與冥會符于人心知善不録非春秋之義也故作傳以旌美之楊娼傳楊娼者長安里中之殊色也態度甚都復以冶容自喜王公巨人享客競邀致席上雖不飲者必為之引滿盡歡長安諸兒一造其室殆至亡生破産而不悔由是娼之名冠諸籍中大售于時矣嶺南帥甲貴游子也妻本戚里女遇帥甚悍先約設有異志者當取死白刃下帥幼貴喜淫內苦其妻莫之措意乃陰出重賂削去娼之籍而挈之南海館之他舍公余而同夕隱而歸娼有慧姓事帥尤謹平居以女職自守非其理不妄發復厚帥之左右咸能得其歡心故帥益嬖之會間歲帥得病且不起思一見娼而憚其妻帥素與監軍使厚密遣導意使為方略監軍乃紿其妻曰將軍病甚思得善奉侍煎調者視之瘳當速矣某有善婢久給事貴室動得人意請夫人聽以婢安將軍四體如何妻曰中貴人信人也果然于吾無苦耳可促召婢來監軍即命娼冒為婢以見帥計未行而事泄帥之妻乃擁健婢數十列白挺熾膏鑊于廷而伺之矣須其至當投之沸鬲帥聞而大恐促命止娼之至且曰此自我意幾纍于渠今幸吾之未死也必使脫其虎喙不然且無及矣乃大遺其奇寶命家僮傍輕舠衛娼北歸自是帥之憤益深不逾旬而物故娼之行適及洪矣問至娼乃盡返帥之賂設位而哭曰將軍由妾而死將軍且死妾安用生為妾豈孤將軍者耶即撤奠而死之夫娼以色事人者也非其利則不合矣而楊能報帥以死義也卻帥之賂廉也雖為娼差足多乎非煙傳臨淮武公業咸通中任河南府功曹參軍愛妾曰非煙姓步氏容止纖麗若不勝綺羅善秦聲好文筆尤工擊甌其韻與絲竹合公業甚嬖之其比鄰天水趙氏第也亦衣纓之族不能斥言其子曰象秀端有文才弱冠矣時方居喪禮忽一日于南垣隙中窺見非煙神氣俱喪廢食忘寐乃厚賂公業之閽以情告之閽有難色復為厚利所動乃令其妻伺非煙間處具以象意言焉非煙聞之但含笑凝睇而不答門媼盡以語象象發狂心蕩不知所持乃取薛濤箋題絶句曰一睹傾城貌塵心只自猜不隨蕭史去擬學阿蘭來以所題密緘之祈門媼達非煙煙讀畢吁嗟良久謂媼曰我亦曾窺見趙郎大好才貌此生薄福不得當之蓋鄙武生粗悍非良配耳乃復酬篇寫于金鳳箋曰緑慘雙娥不自持只緣幽恨在新詩郎心應似琴心怨脈脈春情更擬誰封付門媼令遺象象啓緘吟諷數四拊掌喜曰吾事諧矣又以剡溪玉葉紙賦詩以謝曰珍重佳人贈好音彩箋芳翰兩情深薄于蟬翼難供恨密似蠅頭未寫心疑是落花迷碧洞只思輕雨灑幽襟百回消息千回夢裁作長謠寄緑琴詩去旬日門媼不復來象憂恐事泄或非煙追悔春夕于前庭獨坐賦詩曰緑暗紅藏起暝煙獨將幽恨小庭前沉沉良夜與誰語星隔銀河月半天明日晨起吟際而門媼來傳非煙語曰勿訝旬日無信蓋以微有不安因授象以連蟬錦香囊并碧苔箋詩曰無力嚴妝倚繡櫳暗題蟬錦思難窮近來嬴得傷春病柳弱花欹怯曉風象結錦囊于懷細讀小簡又恐煙幽思增疾乃剪烏絲闌為回簡曰春日遲遲人心悄悄自因窺覯長役夢魂雖羽駕塵襟難于會合而丹誠皎日誓以周旋況又聞乘春多感芳履違和耗冰雪之妍姿郁蕙蘭之佳氣憂抑之極恨不翻飛企望寬情無至憔悴莫孤短韻寧爽后期恍惚寸心書豈能盡兼持菲什仰繼華稨詩曰見說傷情為見春想封蟬錦緑蛾顰叩頭為報煙卿道第一風流最損人門媼既得回簡徑繼詣煙閣中武生為府掾屬公務繁夥或數夜一直或竟日不歸是時適值生入府曹煙拆書得以款曲尋繹既而長太息曰丈夫之志女子之心情契魂交視遠如近也于是闔戶垂幌為書曰下妾不幸垂髫而孤中間為媒妁所欺遂匹合于瑣類每至清風朗月移玉柱以增懷秋帳冬釭泛金徽而寄恨豈期公子忽貽好音發華緘而思飛諷麗句而目斷所恨洛川波隔賈午牆高聯云不及于秦台荐夢尚遙于楚岫猶望天從素懇神假微機一拜清光九殞無恨兼題短什用寄幽懷詩曰畫檐春燕須同宿洛浦雙鴛肯獨飛長恨桃源諸女伴等閒花里送郎歸封訖召門嫗令達于象象覽書及詩以煙意稍切喜不自持但靜室焚香虔禱以俟息一日將夕門嫗促步而至笑且拜曰趙郎願見神仙否象驚連問之傳煙語曰今夜功曹直府可謂良時妾家后庭郎君之前垣也若不逾惠好專望來儀方寸萬重悉俟晤語既曛黑象乃躋梯而登煙已令重榻于下既下見煙靚妝盛服立于花下拜訖俱以喜極不能言乃相攜自后門入堂中遂背釭解幌盡繾綣之意焉及曉鐘初動復送象于垣下煙執象泣曰今日相遇乃前生因緣耳勿謂妾無玉潔松貞之志放蕩如斯直以郎之風調不能自顧願深鑒之象曰挹希世之貌見出人之心已誓幽庸永奉歡狎言訖象逾垣而歸明日托門媼贈煙詩曰十洞三清雖路阻有心還得傍瑤台瑞香風引思深夜知是蕊宮仙馭來煙覽詩微笑因復贈象詩曰相思只怕不相識相見還愁卻別君願得化為松下鶴一雙飛去入行云封付門媼仍令語象曰賴妾有小小篇詠不然君作幾許大才面目茲不盈旬常得一期于后庭展微密之思罄宿昔之心以為鬼神不知天人相助或景物寓目歌詠寄情來住頻繁不能悉載如是者周歲無何煙數以細過撻其女奴奴陰銜之乘間盡以告公業公業曰汝慎言我當伺察之后至直日乃僞陳狀請假逮夕如常入直遂潛于里門街鼓既作匍伏而歸循牆至后庭見煙方倚戶微吟象則据垣斜睇公業不勝其忿挺前欲擒象覺跳去業搏之得其半襦乃入室呼煙詰之煙色動聲戰而不以實告公業愈怒縛之大柱鞭楚血流但云生得相親死亦何恨深夜公業怠而假寐煙呼其所愛女仆曰與我一杯水水至飲盡而絶公業起將復笞之已死矣乃解縛舉置閣中連呼之聲言煙暴疾致殞后數日窆于北邙而里巷間皆知其強死矣象因變服易名遠竄江浙間洛陽才士有崔李二生常與武掾游處崔賦詩末句云恰似傳花人飲散空床拋下最繁枝其夕夢煙謝曰妾貌雖不逮桃李而零落過之捧君佳什愧仰無已李生詩末句云艷魄香魂如有在還應羞見墜樓人其夕夢煙戟手而言曰士有百行君得全乎何至矜片言苦相詆斥當屈君于地下面證之數日李生卒時人異焉
