body:
  text: 子路子路孔子厄于陳絃歌于館中夜有一人長九尺余皂衣高冠吒聲動左右子路引出與戰于庭仆之于地乃是大鯷魚也長九尺余孔子歎曰此物也何為來哉吾聞物老則群精依之因衰而至此其來也豈以吾遇厄絕糧從者病乎夫六畜之物及龜蛇魚鱉草木之屬神皆能為妖怪故謂之五酉五行之方皆有其物酉者老也故物老則為怪矣殺之則已夫何患焉長水縣秦時長水縣有童謠曰城門當有血則陷沒為湖有老嫗聞之憂懼旦旦往窺焉門衛欲縛之嫗言其故嫗去后門衛殺犬以血涂門嫗又往見血走去不敢顧忽有大水長欲沒縣主簿何干入白令令見干曰何忽作魚干曰明府亦作魚矣遂淪陷為谷姑蘇男子後漢時姑蘇有男子衣白衣冠幘容貌甚偉身長七尺眉目疏朗從者六七人遍歷人家奸通婦女晝夜不畏于人人欲掩捕即有風雨雖守郡有兵亦不敢制苟犯之者無不被害月余術人趙杲在趙聞吳患泛舟遽來杲適下舟步至姑蘇北堤上遙望此妖見路人左右奔避無所杲曰此吳人所患者也時會稽守送台使遇亦避之于館杲因謁焉守素知杲有術甚喜杲謂郡守曰君不欲見乎因請水燒香長嘯數聲天風欻至聞空中數十人響應杲擲手中符符去如風頃刻見此妖如有人持至者甚惶懼杲謂曰何敢幻惑不畏乃按劍曰誅之便有旋風擁出杲謂守曰可視之矣使未出門已報去此百步有大白蛟長三丈斷首于路旁余六七者皆身首異處亦黿鼉之類也左右觀者萬余人咸稱自此無患矣永康人吳孫權時永康有人入山遇一大龜即逐之龜便言曰游不良時為君所得人甚怪之載出欲上吳王夜泊越里纜舡于大桑樹宵中樹呼龜曰勞乎元緒奚事爾耶龜曰我被拘縶方見烹臞雖盡南山之樵不能潰我樹曰諸葛元遜博識必致相苦令求如我之徒計從安出龜曰子明無多辭禍將及爾樹寂而止既至權命煮之焚柴百車語猶如故諸葛恪曰然以老桑方熟獻之人仍說龜樹共言權登使伐取煮龜立爛今烹龜猶多用桑薪野人故呼龜為元緒也王素吳少帝五鳳元年四月會稽余姚縣百姓王素有室女年十四美貌鄰里少年求娶者頗眾父母惜而不嫁嘗一日有少年姿貌玉洁年二十余自稱江郎愿婚此女父母愛其容質遂許之問其家族云居會稽后數日領三四婦人或老或少者及二少年俱至家因持資財以為聘遂成婚媾已而經年其女有孕至十二月生下一物如絹囊大如升在地不動母甚怪異以刀割之悉白魚子素因問江郎所生皆魚子不知何故素亦未悟江郎曰我所不幸故產此異物其母心獨疑江郎非人因以告素素密令家人候江郎解衣就寢收其所著衣視之皆有鱗甲之狀素見之大駭命以巨石鎮之及曉聞江郎求衣服不得異常詬罵尋聞有物偃踣聲震于外家人急開戶視之見床下有白魚長六七尺未死在地撥剌素砍斷之投江中女后別嫁費長房汝南有妖常作太守服詣府門椎鼓郡患之及費長房來知是魅乃呵之即解衣冠叩頭乞自改變為老鱉大如車輪長房令复就太守服作一札敕葛陂君叩頭流涕持札去視之以札立陂邊以頸繞之而死張福鄱陽人張福舡行還野水邊忽見一女子甚有容色自乘小舟福曰汝何姓作此輕行無笠雨駛可入見就避雨因共相調遂入就福寢以所乘小舟系福舡邊三更許雨晴明月福視婦人乃一大鼉欲執之遽走入水向小舟乃是一槎段長丈余丁初吳郡無錫有上湖大陂陂吏丁初天每大雨輒循堤防春盛雨初出行塘日暮間顧后有小婦人上下青衣戴青傘追后呼初掾待我初時悵然意欲留伺之复疑本不見此今忽有婦人冒陰雨行恐必鬼物初便疾行顧見婦人追之亦速初因急走去之轉遠顧視婦人乃自投陂中汜然作聲衣蓋飛散視是大蒼獺衣傘皆荷葉也此獺化為人形數媚年少者也謝非道士丹陽謝非往石城冶買釜還日暮不及家山中有廟舍于溪水上入中宿大聲語曰吾是天帝使者停此宿猶畏人劫奪其金意苦搔搔不安夜二更中有來至廟門者呼曰何銅銅應諾廟中有人氣是誰銅云有人言是天帝使者少頃便還須臾又有來者呼銅問之如前銅答如故复歎息而去非惊扰不得眠遂起呼銅問之先來者是誰銅答言是水邊穴中白鼉汝是何等物是廟北岩嵌中龜也非皆陰識之天明便告居人言此廟中無神但是龜鼉之輩徒費酒肉祀之急具鍤來共往伐之諸人亦頗疑之于是并會伐掘皆殺之遂坏廟絕祀自后安靜顧保宗顧保宗字世嗣江夏人也每釣魚江中嘗夏夜于草堂臨月未臥忽有一人須發皓然自稱為翁有如漁父直至堂下乃揖保宗便箕踞而坐唯哭而已保宗曰翁何至不語良久謂保宗曰陸行甚困言不得速保宗曰翁適何至今何往答曰來自江州复歸江夏言訖又哭保宗曰翁非異人乎答曰我實非人以君閒退故來相話保宗曰野人漁釣用釋勞生何閒退之有答曰世方兵亂閒退何詞保宗曰今世清平亂當何有答曰君不見桓玄之志也保宗因問若是有兵可言歲月否翁曰今不是隆安五年耶保宗曰是又屈指复哭謂宗曰后年易號复一歲桓玄盜國盜國未幾為卯金所敗保宗曰卯金為誰答曰君當后識耳言罷复謂保宗曰不及二十稔當見大命變革保宗曰翁遠至何所食答曰請君常食保宗因命食飼之翁食訖謂保宗曰今夕奉使須向前江來日平旦幸愿觀之又曰百里之中獨我偏異故驗災祥我等是也宗曰未審此言何以驗之答曰兵甲之兆也言訖乃出保宗送之于戶外乃訣去及曉宗遂臨江觀之聞水風漸急魚皆出浪极目不知其數觀者相傳首尾百餘里其中有大白魚長百餘丈驤首四望移時乃沒是歲隆安五年六月十六曰也保宗大異之后二歲改隆安七年為元興元興二年十一月壬午桓玄果篡位三年二月建武將軍劉裕起義兵滅桓玄复晉安帝位后十七年劉裕受晉禪一如魚之所言武昌民宋高帝永初中張春為武昌太守時有人嫁女未及升車女忽然失怪出外毆擊人仍云己不樂嫁巫云是邪魅將女至江際遂擊鼓以術咒療翌日有一青蛇來到坐所即以大釘釘頭至日中复見大龜從江來伏于巫前巫以朱書龜背作符遣入江至暮有大白鼉從江出乍沉乍浮龜隨后催逼鼉自分死冒來先入幔與女辭訣慟哭云失其同好于是漸差或問魅者歸于一物今安得有三巫云蛇是傳通龜是媒人鼉是其對所獲三物悉殺之寡婦嚴建康大夏營寡婦嚴宋元嘉初有人稱華督與嚴結好街卒夜見一丈夫行造護軍府府在建陽門內街卒呵問答云我華督還府徑沿西牆欲入街卒以其犯夜邀擊之乃變為鼉察其所出入處甚瑩滑通府中池池先有鼉窟歲久因能為魅殺之遂絕尹兒安城民尹兒宋元嘉中父暫出令守舍忽見一人年可二十騎馬張斗傘從者四人衣并黃色從東方來于門呼尹兒求暫寄息因入舍中庭下坐胡床一人捉傘覆之尹兒看其衣悉無縫五色斕斑似鱗甲而非毛也有頃雨將至此人上馬去顧語尹兒曰明當更來乃西行躡虛而升須臾云氣四合白晝為之晦螟明日大水暴至川谷沸涌丘壑淼漫將淹尹舍忽見大魚長三丈余盤屈當水沖尹族乃免漂蕩之患廣陵王女沙門竺僧瑤得神咒尤能治邪廣陵王家女病邪瑤治之入門瞑目罵云老魅不念守道而干犯人女乃大哭云人殺我夫魅在其側曰吾命盡于今因虛欷又曰此神不可與事乃成老鼉走出庭中瑤令仆殺之也楊丑奴河南楊丑奴常詣章安湖拔蒲將暝見一女子衣裳不甚鮮洁而容貌美乘船載菜前就丑奴家湖側逼暮不得返便停舟寄住借食器以食盤中有干魚生菜食畢因戲笑丑奴歌嘲之女答曰家在西湖側日暮陽光頹托蔭遇良主不覺寬中懷俄滅火共寢覺有臊氣又手指甚短乃疑是魅此物知人意遽出戶變為獺徑走入水謝宗會稽王國吏謝宗赴假經吳皋橋同船人至市宗獨在船有一女子姿性婉娩來詣船因相為戲女即留宿歡宴乃求寄載宗許之自爾船人夕夕聞言笑后逾年往來彌數同房密伺不見有人知是妖魅遂共掩被良久得一物大如枕須臾又獲二物并小如拳視之乃是三龜宗悲思數日方悟向說如是云此女子一歲生二男大者名道愍小者名道興宗又云此女子及二兒初被索之時大怖形并縮小謂宗曰可取我枕投之時族叔道明為郎中令籠三龜示之
