body:
  text: 寶誌寶誌梁簡文之生誌公謂武帝此子與冤家同年生其年侯景生於鴈門亂梁誅蕭氏略盡出朝野僉載史溥陳霸先未貴時有直閤吏史溥夢有人朱衣執玉簡自天而降簡上金字書曰陳氏五世三十四年及後主降隋史溥尚在出獨異志耿詢隋大業中耿詢造渾儀成進之帝召太史令袁克少府監何稠等檢驗三辰度數晝夜運運原作不據明鈔本改轉毫釐不差帝甚嘉之賜物一百段欲用為太史令詢聞聞原作問據明鈔本改之笑曰詢故未得此官六十四五所不論耳然得太史令即命終後宇文化及篡逆詢為太史令詢知化及不識謀欲歸唐事覺被害時年六十五觀詢之藝能數術蓋亦張衡郭璞之流出大業拾遺記尉遲敬德隋末有書生居太原苦於家貧以教授為業所居抵官庫因穴而入其內有錢數萬貫遂欲攜挈有金甲人持戈曰汝要錢可索取尉遲公帖來此是尉遲敬德錢也書生訪求不見至鐵冶處有鍛鐵尉遲敬德者方袒露蓬首鍛鍊之次書生伺其歇乃前拜之尉遲公問曰何故曰某貧困足下富貴欲乞錢五百貫得否尉遲公怒曰某打鐵人安有富貴乃侮我耳生曰若能哀憫但賜一帖他日自知尉遲不得已令書生執筆曰錢付某乙五百貫具月日署名於後書生拜謝持去尉遲公與其徒拊掌大笑以為妄也書生既得帖卻至庫中復見金甲人呈之笑曰是也令繫於梁上高處遣書生取錢止於五百貫後敬德佐神堯立殊功請歸鄉里敕賜錢并一庫物未曾開者遂得此錢閱簿欠五百貫將罪主者忽於梁上得帖子敬德視之乃打鐵時書帖累日驚歎使人密求書生得之具陳所見公厚遣之仍以庫物分惠故舊出逸史魏徵唐魏徵為僕射有二典事之長參時徵方寢二人窗下平章一人曰我等官職總由此老翁一人曰總由天上徵聞之遂作一書遣由此老翁者送至侍郎處云與此人一員好官其人不知出門心痛憑由天人者送書明日引注由老人者被放由天者得留徵怪之問焉具以實對乃歎曰官職祿料由天者蓋不虛也出朝野僉載婁師德唐婁師德為揚州江都尉馮元常亦為尉共見張冏藏冏藏曰二君俱貴馮位不如婁馮唯取錢多官益進婁若取一錢官即敗後馮為浚儀尉多肆慘虐巡察以為彊奏授雲陽尉又緣取錢事雪以為清彊監察婁竟不敢取一錢位至台輔家極貧匱馮位至尚書左丞後得罪賜自盡婁至納言卒出朝野僉載王顯唐王顯與文武皇帝有嚴子陵之舊每掣褌為戲將帽為歡帝微時常戲曰王顯抵老不作繭及帝登極而顯謁因奏曰臣今日得作繭耶帝笑曰未可知也召其三子皆授五品顯獨不及謂曰卿無貴相朕非為卿惜也曰朝貴而夕死足矣時僕射房玄齡曰陛下既有龍潛之舊何不試與之帝與之三品取紫袍金帶賜之其夜卒出朝野僉載張寶藏貞觀中張寶藏為金吾長史原本無史字據明鈔本補常因下直歸櫟陽路逢少年畋獵割鮮野食倚樹歎曰張寶藏身年七十未嘗得一食酒肉如此者可悲哉傍有一僧指曰六十日內官登三品何足歎也言訖不見寶藏異之即時還京時太宗苦於氣痢眾醫不效即下詔問殿庭左右有能治此疾者當重賞之時寶藏曾困其疾即具疏以乳煎蓽撥方上服之立瘥宣下宰臣與五品官魏徵難之逾月不進擬上疾復發問左右曰吾前飲乳煎蓽撥有效復命進之一啜又平因思曰嘗令與進方人五品官不見除授何也徵懼曰奉詔之際未知文武二吏上怒曰治得宰相不妨已授三品官我天子也豈不及汝耶乃厲聲曰與三品文官授鴻臚卿時正六十日矣出獨異志授判冥人官唐太宗極康豫太史令李淳風見上流淚無言上問之對曰陛下夕當晏駕太宗曰人生有命亦何憂也留淳風宿太宗至夜半上奄然入定見一人云陛下暫合來還即去也帝問君是何人對曰臣是生人判冥事太宗入見判官問六月四日事即令還向見者又迎送引導出淳風即觀玄象不許哭泣須臾乃寤至曙求昨所見者令所司與一官遂注蜀道一丞上怪問之選司奏奉進止與此官上亦不記旁人悉聞方知官皆由天也出朝野僉載王無礙唐王無礙好博戲善鷹鷂文武聖皇帝微時與無礙蒱戲爭彩有李陽之宿憾焉帝登極礙藏匿不出帝令給使將一鷂子於市賣之索錢二十千礙不之知也酬錢十八貫給使以聞帝曰必王無礙也遂召至惶懼請罪帝笑而賞之令於春明門待諸州庸車三日並與之礙坐三日屬灞橋破唯得麻三車更無所有帝知其命薄更不復賞頻請五品帝曰非不與卿惜卿不勝也固請乃許之其夜遂卒出朝野僉載宇文融劉禹錫曰官不前定何名真宰乎永徽中盧齊卿卒亡及蘇說見其舅李某為冥司判官有吏押案曰宇文融合為宰相舅曰宇文融豈堪為宰相吏曰天曹符已下數日多少即由判官舅乃判一百日既而拜宰相果百日而罷出嘉話錄路潛懷州錄事參軍路敬潛遭綦連輝事於新開推鞫免死配流後訴雪授睦州遂安縣令前邑宰皆卒於官潛欲不赴其妻曰君若合死新開之難早已無身今得縣令豈非命乎遂至州去縣水路數百里上寢堂西間有三殯坑皆埋舊縣令潛命坊夫填之有梟鳴於屏風又鳴於承塵上並不以為事每與妻對食有鼠數十頭或黃或白或青或黑以杖驅之則抱杖而叫自餘妖怪不可具言至一考滿一無損失選授衛令除衛州司馬入為郎中位至中書舍人出朝野僉載甘子布周甘子布博學有才年十七為左衛長史不入五品登封年病以驢轝彊至嶽下天恩加兩階合入五品竟不能起鄉里親戚來賀衣冠不得遂以緋袍覆其上帖然而終出朝野僉載李迥秀李迥秀為兵部尚書有疾朝士問之秀曰僕自知當得侍中有命固不憂也朝士退未出巷而薨有司奏有詔贈侍中出定命錄狄仁傑唐狄仁傑之貶也路經汴州欲留半日醫疾開封縣令霍獻可追逐當日出界狄公甚銜之及回為宰相霍已為郎中狄欲中傷之而未果則天命擇御史中丞凡兩度承旨皆忘後則天又問之狄公卒對無以應命唯記得霍獻可遂奏之恩制除御史中丞後狄公謂霍曰某初恨公今卻薦公乃知命也豈由於人耶出定命錄崔元綜則天朝為宰相令史奚三兒云公從今六十日內當流南海六年三度合死然竟不死從此後發初更作官職後還於舊處坐壽將百歲終以餒死經六十日果得罪流於南海之南經數年血痢百日至困而不死會赦得歸乘船渡海遇浪漂沒同船人並死崔公獨抱一板隨波上下漂泊至一海渚入叢葦中板上一長釘刺脊上深入數寸其釘板壓之在泥水中晝夜忍痛呻吟而已忽遇一船人來此渚中聞其呻吟哀而救之扶引上船與踏血拔釘良久乃活問其姓名云是舊宰相眾人哀之濟以糧食隨路求乞於船上臥見一官人著碧是其宰相時令史喚與語又濟以糧食得至京師六年之後收錄乃還選曾以舊相奏上則天令超資與官及過謝之日引於殿庭對崔公著碧則天見而識之問得何官具以狀對乃詔吏部令與赤尉及引謝之日又敕與御史自御史得郎官思遷至中書侍郎九十九矣子姪並死唯獨一身病臥在床顧令奴婢取飯粥奴婢欺之皆笑而不動崔公既不能責罰奴婢皆不受處分乃感憤不食數日而死矣出定命錄蘇味道蘇味道三度合得三品並辭之則天問其故對曰臣自知不合得三品則天遣行步視之曰卿實道今得道今得明鈔本作得不合三品十三年中書侍郎平章事不登三品其後出為眉州刺史改為益州長史敕賜紫綬至州日衣紫畢其夜暴卒出定命錄盧崇道唐太常卿盧崇道坐女婿中書令崔湜反羽林郎將張仙坐與薛介然口陳欲反之狀俱流嶺南經年無日不悲號兩目皆腫不勝悽戀遂並逃歸崇道至都宅藏隱為男娶崔氏女未成有內給使來取克貴人崇道乃賂給使別取一崔家女去入內事敗給使具承掩崇道并男三人亦被糾捉敕杖各決一百俱至喪命出朝野僉載劉仁軌唐青州刺史劉仁軌知海運失船極多除名為民遂遼東效力遇病臥平襄城下褰幕看兵士攻城有一卒直來前頭背坐叱之不去仍惡罵曰你欲看我亦欲看何預汝事不肯去須臾城頭放箭正中心而死微此兵仁軌幾為流矢所中出朝野僉載任之選唐任之選與張說同時應舉後說為中書令之選竟不及第來謁張公公遣絹一束以充糧用之選將歸至舍不經一兩日疾大作將絹市藥絹盡疾自損非但此度餘處亦然何薄命之甚也出朝野僉載
