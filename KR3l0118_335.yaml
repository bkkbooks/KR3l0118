body:
  text: 浚儀王氏浚儀王氏士人也其母葬女壻裴郎飲酒醉入冢臥棺後家人不知遂掩壙後經數日不見裴郎家誣為王氏所殺遂相訟王氏實無此舉家思慮葬日恐在壙中遂開壙得之氣息奄奄以粥灌之數日平復說云初葬之夕酒向醒無由得出舉目竊視見人無數文柏為堂宅宇甚麗王氏先亡長幼皆集衆鬼見裴郎甚驚其間一鬼曰何不殺之妻母云小女幼稚仰此奈何欲殺苦爭得免既見長筵美饌歌樂歡洽俄聞云喚裴郎某懼不敢起又聞群婢連臂踏歌詞曰柏堂新成樂未央回來回去繞裴郎有一婢名穠華以紙燭燒其鼻準成瘡痛不可忍遂起遍拜諸鬼等頻命裴郎歌舞飢請食妻母云鬼食不堪命取瓶中食與之如此數夜奴婢皆是明器不復有本形象章仇兼瓊唐天寶中章仇兼瓊為劍南節度數載入朝蜀川有張夜叉者狀如狂人而言事多中兼瓊將行呼而問之夜叉云大使若住蜀有無涯之壽若必入朝不見其吉兼瓊初甚惶懼久之曰安有是耶遂行至漢州入驛墮馬身死獨心上微暖彭州刺史李先令洛陽尉馬某送藥酒罨藥兼起居洛陽去漢州五十里奉命便行至漢州入驛到兼瓊所忽然顛倒而卒後兼瓊乃蘇云地下所由以馬尉見馬氏亦死便至其家家人驚異云適爾奉命還何處也不言視天太息其妻再問儐從何在又不把笏何也馬殊不言遽揮使去因流涕言已代章仇大使死適於地下苦論地下所由並為他無如之何自念到官日淺遠客孤弱故還取別舉言悲號又謂其妻曰無苦我代其死彼亦當有深恤無憂不得還鄉但便爾倉卒死生永隔以此為恨耳言訖不見子等初猶恍然疑之尋見牀舁尸還兼瓊翌日還成都賻馬氏錢五百萬又敕彭州賻五百萬兼還四年秩祿云李林甫唐李林甫為相既久自以為陰禍且多天下頗怨望有鬼災乃致方術士以禳去之後得一術士曰相國豪貴久矣積怨者亦多矣為禍之基非一朝一夕之故雖然庶可免者朝夕之禍也林甫曰若之何術士曰可於長安市求一善射者以備之林甫乃於西市召募之得焉自云嘗廁軍伍間以善射稱近為病他無所知林甫即資其衣食月計以給後一夕林甫會宴於庭燕趙翼侍度曲未終忽然中絶善射者異而聽之無聞矣乃默籌曰夜未闌忽如是非有他耶抑術士之言耶乃執弓失踰垣以入伺之忽見垣之南有一物墮而下又一人踰來善射者一發中之乃驚去因至林甫長樂之地見歌者舞者噤而不能囀其喉屹而不得翻其袖寂寂然若木偶狀者因視垣南墮下之物即一囊而結者解其中有數百籤皆林甫及家僮名氏也於是以名呼一一而應遂宴飲如初其明日術士來且賀以賴此人不然幾為所禍乃負冤而死者也明公久專機要積戾萬狀自茲十稔乃非吾之所知其後林甫籍沒果期十年也陳希烈陳希烈為相家有鬼焉或詠詩或歌呼聲甚微細激切而歷歷可聽家人問之曰汝何人而在此鬼曰吾此中戲遊遊畢當去或索衣服或求飲食得之即去不得即罵如此數朝後忽談經史鬼甚博覽家人呼希烈姪壻司直季履濟令與鬼談謂履濟曰吾因行固於此戲聞君特諭今日豁然有事當去君好住因去楊國忠唐天寶中楊國忠權勢薰灼朝廷無比忽有一婦人詣宅請見閽人拒之婦人大叫曰我有大事要見楊公爾何阻我若不見我當令火發盡焚楊公之宅閽人懼告國忠國忠見之婦人謂國忠曰公為相國何不知否泰之道恥公位極人臣又聯國戚名動區宇亦已久矣奢縱不節德義不修而壅塞賢路諂媚君上又亦久矣略不能效前朝房杜之蹤迹不以社稷為意賢與愚不能別但納賄於門者爵而祿之大才大德之士伏於林泉曾不一顧以恩付兵柄以愛使牧民噫欲社稷安而保家族必不可也國忠大怒問婦人曰自何來何造次觸犯宰相不懼死罪耶婦人曰公自不知死罪翻以我為死罪國忠怒命左右欲斬之婦人忽不見國志驚未已又復立於前國忠乃問曰是何妖耶婦人曰我實惜高祖太宗之社稷被一匹夫傾覆公不解為宰相雖處佐輔之位而無佐輔之功公一死小事耳可痛者國朝自此弱幾不保其宗廟胡怒之耶我來白於公胡多事也今我却退胡有功也公胡死也民胡哭也言訖笑而出令人逐之不見後至祿山起兵方悟胡字李叔霽唐天寶末祿山作亂趙郡李叔霽與其妻自武關南奔襄陽妻與二子死於路叔霽遊荊楚久之祿山既據東京妻之姑寡居不能自免尚住城中辛苦甚至役使婢洛女出城採樵遙見犢走甚急有紫衣人騎馬在後車中婦人頻呼洛女既近問識我否婢驚喜曰李郎何往娘子乃爾獨行妻乃悲泣云行至襄陽叔霽及兩兒並死於賊我緣飢餒攜小兒女嫁此車後人遂與洛女見姑哭畢問姊娣何在姑言近在外曰此行忽速不可復待留停半日許時民飢姑乃設食粗糲無味妻子於車中取粳米飯及他美饌呼其夫與姑餐餐畢便發臨別之際謂曰此間辛苦亦合少物相留為囊齎已前行今車中唯有一匹半絹且留充衣服深以少為恨也乾元中肅宗克復二京其姑與子同下揚州月餘叔霽亦至相見悲泣再嘆其妻於客中因産歿故兼小兒女相次夭逝言訖又悲泣姑初慚怍為其姪女為賊所掠及見叔霽情至因說其事云所著裙即此留絹也叔霽咨嗟而已吳郡朱敖嘗於陳留賊中識一軍將自言索得李霽婦云新繁縣令新繁縣令妻亡命女工作凶服中有婦人婉麗殊絶縣命悅而留之甚見寵愛後數月一旦慘悴言辭頓咽令怪而問之曰本夫將至身方遠適所以悲耳令曰我在此誰如我何第自飲食無苦也後數日求去止之不可留銀酒杯一枚為別謂令曰幸甚相思以此為念命贈羅十匹去後恆思之持銀杯不捨手每至公衙即放案上縣尉已罷職還鄉里其妻神柩尚在新繁故遠來移轉投刺謁命令待甚厚尉見銀杯數竊視之令問其故對云此是亡妻棺中物不知何得至此令歎良久因具言始末兼論婦人形狀音旨及留杯贈羅之事尉憤怒終日後方開棺見婦人抱羅而臥尉怒甚積薪焚之姚蕭品姚蕭品者杭州錢塘人其家會客因在酒座死經食頃乃活云初見一人來喚意是縣家所由出門看之便被捉去至北郭門有數吏在船中捉者令品牽船品云忝是緒餘未嘗引挽遂被捶擊辭不獲已力為牽之至驛亭橋已八九里所鬼不復防禦因爾絶走得脫也梁守威唐肅宗時安史之黨方亂邢州正在賊境刺史頗有安時之志長安梁守威者以文武才辨自負自長安潛行因往邢州欲說州牧至州西南界方夜息於路傍古墓間忽有一少年手攜一劍亦至呵問守威曰是何人守威曰我遊說之士欲入邢州說州牧命立功報君少年曰我亦遊說之士也守威喜而揖共坐草中論以世亂少年曰君見邢牧何辭以說守威曰方令天子承祧上皇又存佐國大臣足得戮力同心以盡滅醜類故不假多辭邢牧其應聲而奉我教也可謂乘勢因時也少年曰君知其一不知其二今太子傳位上皇猶在君以為天下有主耶有歸耶然太子至靈武六軍大臣推戴欲以為天下主其如自立不孝也徒欲使天下怒又焉得為天下主也設若太子但奉行上皇而徵兵四海力剪群盜收復京城唯撫而輯之爵賞軍功亦行後而聞之則不期而大定也今日之大事已失卒不可平天下我未聞自負不孝之名而欲誅不忠之輩者也欲安天下寧群盜必待仁主得位君無說邢牧我若可說早已說之守威知少年有才略因長嘆曰我何之昔劉琨聞天下亂而喜我今遇天下亂而憂少年乃命行詣一大林及達曙至林下見百餘人皆擐甲執兵乃少年之從者少年索酒饌同歡話而別謂守威曰我授君之一言君當聽之但回長安必可取爵祿也太子新授位自賤而貴者多矣關內亂之極也人皆思治願安君但以治平之術教關內諸侯因依而進何慮不自立功耶守威拜謝而回才行十步已來顧之不見乃却詣林下訪之惟見壞墓甚多
