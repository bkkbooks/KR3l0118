body:
  text: 盧仲海盧仲海大曆四年處士盧仲海與從叔纘客於吳夜就主人飲歡甚大醉郡屬皆散而纘大吐甚困更深無救者獨仲海侍之仲海性孝友悉篋中之物藥以護之半夜纘亡仲海悲惶伺其心尚暖計無所出忽思禮有招魂望反諸幽之旨又先是有力士説招魂之驗乃大呼纘名連聲不息數萬計忽蘇而能言曰賴爾呼救我即問其狀答曰我向被數吏引言郎中命邀迎問其名乃稱尹逡巡至宅門閥甚峻車馬極盛引入尹迎勞曰飲道如何常思曩日破酒縱思忽承戾止浣濯難申故奉迎耳乃遙入詣竹亭坐客人皆朱紫相揖而坐左右進酒杯盤炳曜妓樂雲集吾意且洽都忘行李之事中宴之際忽聞爾喚聲衆樂齊奏心神已眩爵行無數吾始忘之俄頃又聞爾喚聲且悲我心惻然如是數四且心不便請辭主人苦留吾告以家中有急主人暫放我來當或繼請授吾職事吾向以虛諾及到此方知是死若不呼我都忘身在此吾始去也宛然如夢今但畏再命為之奈何仲海曰情之至隱復無可行前事既驗當復執用耳因焚香誦呪以備之言語之際忽然又沒仲海又呼之聲且哀厲激切直至欲明方蘇曰還賴爾呼我我向復飲至於酣暢坐寮徑醉主人方敕文牒授我職聞爾喚聲哀厲依前惻怛主人訝我不怡又暫乞放歸再三主人笑曰大奇遂放我來今去留未訣雞鳴興陰物向息又聞鬼神不越疆吾與爾逃之可乎仲海曰上計也即具舟倍道併行而愈王垂太原王垂與范陽盧收友善唐大曆初嘗乘舟於淮浙往來至石門驛旁見一婦人於樹下容色殊麗衣服甚華負一錦囊王盧相謂曰婦人獨息婦囊可圖耳乃彌棹伺之婦人果問曰船何適可容寄載否妾夫病在嘉興今欲省之足痛不能去二人曰虛舟且便可寄爾婦人攜囊而上居船之首又徐挑之婦人正容曰暫附何得不正耶二人色怍垂善鼓琴以琴悅之婦人美艷粲然二人振蕩乃曰娘子固善琴耶婦人曰少所習王生拱琴以授乃撫軫泛弄泠然王生曰未嘗聞之有以見文君之誠心矣婦人笑曰委相如之深也遂稍親合其詼諧慧辨不可言相視感悅是夕與垂偶會船前收稍被隔礙而深嘆慕夜深收竊探囊中物視之滿囊髑髏耳收大駭知是鬼矣而無因達於垂聽其私狎甚繾綣既而天明婦人有故暫下收告垂垂大懾曰計將安出收曰宜伏簀下如其言須臾婦人來問王生安在收紿之曰適上岸矣婦人甚劇委收而追垂望之稍遠乃棄於岸併棹倍行數十里外不見來夜藏船處鬧半夜後婦人至直入船拽垂頭婦人四面有眼腥穢甚嚙咬垂垂困二人大呼衆船皆助遂失婦人明日得紙梳於席上垂數月而卒武丘寺蘇州武丘寺山嶔崟石林玲瓏樓雉疊起緑雲窈窕入者忘歸大曆初寺僧夜見二白衣上樓竟不下尋之無所見明日峻高上見題三首信鬼語也其詞曰幽明雖異路平昔添工文欲知潛寐處山北兩孤墳高松多悲風蕭蕭清且哀南山接幽隴幽隴空崔嵬白日徒煦煦不照長夜臺誰知生者樂魂魄安能回況復念所親慟哭心肝摧慟哭更何言哀哉復哀哉神仙不可學形化空遊魂白日非我朝青松圍我門雖復隔生死猶知念子孫何以遣悲惋萬物歸其根寄語世上人莫厭臨芳樽莊上有墓林古冢纍纍其文尚存焉李佐公大曆中在盧州有書吏王庾請假歸夜行郭外忽值引騶呵避書吏映大樹窺之且怪此無尊官也導騎後一人紫衣儀衛如大使後有車一乘方渡水御者前曰車軥索斷紫衣曰檢簿遂見數吏檢之曰合取盧州某里張道妻脊筋修之乃書吏之姨也頃刻吏回持兩條白物各長數尺乃渡水而去至姨家尚無恙經宿患背痛半日而卒竇裕大曆中有進士竇裕者家寄淮海下第將之成都至洋州無疾卒常與淮陰令吳興沈生善別有年矣聲塵兩絶莫知其適沈生自淮海調補金堂令至洋州舍於館亭中是夕風月晴朗夜將半生獨若有所亡而不得其寢俄見一白衣丈夫自門步來且吟且嗟似有恨而不舒者久之吟曰家依楚水岸身寄洋州館望月獨相思塵襟淚痕滿生見之甚覺類竇裕特起與語未及遂無見矣乃嘆曰吾與竇君別久矣定為鬼耶明日駕而去行未數里有殯其路前有識者曰進士竇裕殯宮生驚即馳至館問館吏曰有進士竇裕自京遊蜀至此暴亡太守命殯於館南二里外道左殯宮是也即至奠拜泣而去商順丹陽商順娶吳郡張昶女昶為京兆少尹卒葬滻水東去其別業十里順選集在長安久之張氏使奴入城迎商郎順日暮與俱往奴盜飲極醉與順相失不覺其城門已閉無如之何乃獨前行天漸昏黑雨雪交下且所驢甚蹇迷路不知所之但信驢所詣計行十數里而不得見村墅轉入深草苦寒甚戰少頃至一澗澗南望見燈火順甚喜行至乃紫籬茅屋數間扣門數百下方應順問曰遠客迷路苦寒暫欲寄宿應曰夜暗雨雪如此知君是何人且所居狹陋不堪止宿固拒之商郎乃問張尹莊去此幾許曰近西南四五里順以路近可到乃出澗西南行十餘里不至莊雨雪轉甚順自審必死既不可行欲何之乃繫驢於桑下倚樹而坐須臾見一物狀若燭籠光照數丈直詣順前尺餘而止順初甚懼尋而問曰得非張公神靈引導余乎乃前拜曰若是丈人當示歸路視光中有小道順乃乘驢隨之稍近火移恆在前尺餘行六七里望見持火來迎籠光遂滅及火至乃張氏守塋奴也順問何以知己來奴云適聞郎君大呼某言商郎從東來急往迎如此再三是以知之遂宿奴廬中明旦方去李載大曆七年轉運使吏部劉晏在部為尚書大理評事李載攝監察御史知福建留後載於建州浦城置使院浦城至建州七百里猶為清涼載心懼瘴癘不樂職事經半載卒後一日復生如故家人進食載如平常食之謂家人曰已死今暫還者了使事耳乃追其下未了者使知一切交割付之後修狀與尚書別兼作遺書處分家事妻崔氏先亡左右唯一小妻因謂之曰我死地下見先妻我言有汝其人甚怒將欲有所不相利益為之奈何今日欲至不宜久留也言訖分財與之使行官送還北小妻便爾下船行官少事未即就路載亦知之召行官至杖五下使驟去事畢食訖遂卒高勵高勵者崔士光之丈人夏日在其莊前桑下看人家打麥見一人從東走馬來至勵再拜云請治馬足勵云我非馬醫焉得療馬其人笑云但為膠黏即得勵初不解其言其人乃告曰我非人是鬼耳此馬是木馬君但洋膠黏之便濟行程勵乃取膠煮爛出至馬所以見變是木馬病在前足因為黏之送膠還舍及出見人已在馬邊馬其駿還謝勵訖便上馬而去蕭遇信州刺史蕭遇少孤不知母墓數十年將改葬舊塋在都既至啓乃誤開盧會昌墓既而知其非號慟而歸聞河陽方士道華者善召鬼乃厚幣以迎既至具以情訴華曰試可耳乃置壇潔誠立召盧會昌至一丈夫也衣冠甚偉呵之曰蕭郎中太夫人塋被爾墓侵雜使其迷誤忽急尋求不爾當旦夕加罪會昌再拜曰某賤役者所管地纍土三尺方十里力可及周外則不知矣但管內無蕭郎中太夫人墓當為索之以旦日為期及朝華與遇俱往行里餘遙見會昌奔來曰吾緣尋索頗擾鬼神今使按責甚急二人可疾去言訖而滅二人去之數百步顧視見青黑氣覆地竟日乃散既而會昌來曰吾為君尋求大受陰司譴罰今計窮矣請辭去華歸河陽遇號哭自是端居一室夜忽如夢中聞戶外有聲呼遇小名曰吾是爾母遇驚走出戶拜迎見其母母從暗中出遇與相見如平生謂遇曰汝至孝動天誠達星神祇靈降鑒今我與汝相見悲愴盈懷遇號慟久之又嘆曰吾家孝子有聞於天雖在泉壤其為衆流所仰然孝子之感天達神非惟毀形滅性所尚由哀耳因與遇論幽冥報應之旨性命變通之道乃曰禍福由人但可纍德上天下臨實如影響其有樹善不感者皆是心不同耳言敘久之遇悲慰感激曰不意更聞過獎之言庶萬分不恨矣乃述迷誤塋域之恨乃曰吾來亦為此年歲寖遠汝小何由而知吾墓上已有李五娘墓亦已平坦何可辨也汝明日但見烏鵲群集其下是也又曰若護我西行當以二魂輿入關問其故答曰為叔母在此亦須歸鄉遇曰叔母為誰耶母曰叔母則是汝外婆吾亦自呼作叔母憐吾孤獨嘗從咸陽來此伴吾後因神祇隔絶不得去故要二魂輿耳言訖而去倏忽不見遇哀號待曉即於烏鵲所集平地掘之信是李五娘墓更於下得母墓方得合葬朱自勸吳縣朱自勸以寶應年亡大曆三年其女寺尼某乙令往市買胡餅充齋饌物於河西見自勸與數騎賓從二十人狀如為官見婢歔欷問汝和尚好在將安之婢云命市胡餅作齋勸云吾此正復有餅回命從者以三十餅遺之兼傳問訊婢至寺白尼尼悲涕不食餅為衆人所食後十餘日婢往市路又見自勸慰問如初復謂婢曰汝和尚不了死生常理何可悲涕故寄餅亦復不食今可將三十餅往宜令食也婢還終不食後十日婢於市復見自勸問訊畢謂婢曰方冬嚴寒聞汝和尚未挾纊今附絹二匹與和尚作寒具婢承命持還以絹授尼尼以一匹製袴一留貯之後十餘日婢復遇自勸謂曰有客數十人可持二絹令和尚於房中作饌為午食明日午時吾當來彼婢還尼賣絹市諸珍膳翌日待之至午婢忽冥昧久之靈語因言客至婢起祗供食食方畢又言曰和尚好住吾與諸客飲食致飽今往已婢送自勸出門久之方悟自爾不見
