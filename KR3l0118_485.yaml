body:
  text: 東城老父傳東城老父傳老父姓賈名昌長安宣陽里人開元元年癸丑生元和庚寅歲九十八年矣視聽不衰言甚安徐心力不耗語太平事歷歷可聽父忠長九尺力能倒曳牛以材官為中宮幕士景龍四年持幕竿隨玄宗入大明宮誅韋氏奉睿宗朝群后遂為景云功臣以長刀備親衛詔徙家東云龍門昌生七歲趫捷過人能摶柱乘梁善應對解鳥語音玄宗在藩邸時樂民間清明節斗雞戲及即位治雞坊于兩宮間索長安雄雞金毫鐵距高冠昂尾千數養于雞坊選六軍小兒五百人使馴扰教飼上之好之民風尤甚諸王世家外戚家貴主家侯家傾帑破產市雞以償雞直都中男女以弄雞為事貧者弄假雞帝出游見昌弄木雞于云龍門道旁召入為雞坊小兒衣食右龍武軍三尺童子入雞群如狎群小壯者弱者勇者怯者水谷之時疾病之候悉能知之舉二雞雞畏而馴使令如人護雞坊中謁者王承恩言于亥宗召試殿庭皆中玄宗意即日為五百小兒長加之以忠厚謹密天子甚愛幸之金帛之賜日至其家開元十三年籠雞三百從封東岳父忠死太山下得子禮奉尸歸葬雍州縣官為葬器喪車乘傳洛陽道十四年三月衣斗雞服會玄宗于溫泉當時天下號為神雞童時人為之語曰生兒不用識文字斗雞走馬胜讀書賈家小兒年十三富貴榮華代不如能令金距期胜負白羅繡衫隨軟輿父死長安千里外差夫持道挽喪車昭成皇后之在相王府誕聖于八月五日中興之后制為千秋節賜天下民牛酒樂三日命之曰酺以為常也大合樂于宮中歲或酺于洛元會與清明節率皆在驪山每至是日萬樂俱舉六宮畢從昌冠雕翠金華冠錦袖繡襦褲執鐸拂導群雞敘立于廣場顧眄如神指揮風生樹毛振翼礪吻磨距抑怒待胜進退有期隨鞭指低昂不失昌度胜負既決強者前弱者后隨昌雁行歸于雞坊角觝萬夫跳劍尋撞蹴球踏繩舞于竿顛者索氣沮色逡巡不敢入豈教猱扰龍之徒歟二十三年玄宗為娶梨園弟子潘大同女男服珮玉女服繡襦皆出御府昌男至信至德天寶中妻潘氏以歌舞重幸于楊貴妃夫婦席寵四十年恩澤不渝豈不敏于伎謹于心乎上生于乙酉雞辰使人朝服斗雞兆亂于太平矣上心不悟十四載胡羯陷洛潼關不守大駕幸成都奔衛乘輿夜出便門馬踣道阱傷足不能進杖入南山每進雞之日則向西南大哭祿山往年朝于京師識昌于橫門外及亂二京以千金購昌長安洛陽市昌變姓名依于佛舍除地擊鐘施力于佛洎太上皇歸興慶宮肅宗受命于別殿昌還舊里居室為兵掠家無遺物布衣憔悴不复得入禁門矣明日复出長安南門道見妻兒于招國里菜色黯焉兒荷薪妻負故絮昌聚哭訣于道遂長逝息長安佛寺學大師佛旨大歷元年依資聖寺大德僧運平住東市海池立阤羅尼石幢書能紀姓名讀釋氏經亦能了其深義至道以善心化市井人建僧房佛舍植美草甘木晝把土擁根汲水灌竹夜正觀于禪室建中三年僧運平人壽盡服禮畢奉舍利塔于長安東門外鎮國寺東偏手植松柏百株构小舍居于塔下朝夕焚香洒掃事師如生順宗在東宮舍錢三十萬為昌立大師影堂及齋舍又立外屋居游民取佣給昌因日食粥一杯漿水一升臥草席絮衣過是悉歸于佛妻潘氏后亦不知所往貞元中長子至信依并州甲隨大司徒燧入覲省昌于長壽里昌如己不生絕之使去次子至德歸販繒洛陽市來往長安間歲以金帛奉昌皆絕之遂俱去不复來元和中穎川陳洪祖攜友人出春明門見竹柏森然香煙聞于道下馬覲昌于塔下聽其言忘日之暮宿鴻祖于齋舍話身之出處皆有條貫遂及王制鴻祖問開元之理亂昌曰老人少時以斗雞求媚于上上倡优畜之家于外宮安足以知朝廷之事然有以為吾子言者老人見黃門侍郎杜暹出為磧西節度攝御史大夫始假風憲以威遠見哥舒翰之鎮涼州也下石堡戍青海城出白龍逾蔥岭界鐵關總管河左道七命始攝御史大夫見張說之領幽州也每歲入關輒長轅挽輻車輦河間薊州佣調繒布駕連軏坌入關門輸于王府江淮綺縠巴蜀錦繡后宮玩好而已河州敦煌道歲屯田實邊食余粟轉輸靈州漕下黃河入太原倉備關中凶年關中粟麥藏于百姓天子幸五岳從官千乘萬騎不食于民老人歲時伏腊得歸休行都市間見有賣白衫白疊布行鄰比廛間有人禳病法用皂布一匹持重价不克致竟以帕頭羅代之近者老人扶杖出門閱街衢中東西南北視之見白衫者不滿百豈天下之人皆執兵乎開元十二年詔三省侍郎有缺先求曾任刺史者郎官缺先求曾任縣令者及老人見四十三省郎吏有理刑才名大者出刺郡小者鎮縣自老人居大道旁往往有郡太守休馬于此皆慘然不樂朝廷沙汰使治郡開元取士孝弟理人而已不聞進士宏詞拔萃之為其得人也大略如此因泣下复言曰上皇北臣穹廬東臣雞林南臣滇池西臣昆夷三歲一來會朝覲之禮容臨照之恩澤衣之錦絮飼之酒食使展事而去都中無留外國賓今北胡與京師雜處娶妻生子長安中少年有胡心矣吾子視首飾靴服之制不與向同得非物妖乎鴻祖默不敢應而去柳氏傳天寶中昌黎韓翊有詩名性頗落托羈滯貧甚有李生者與翊友善家累千金負氣愛才其幸姬曰柳氏艷絕一時喜談謔善謳詠李生居之別第與翊為宴歌之地而館翊于其側翊素知名其所候問皆當時之彥柳氏自門窺之謂其侍者曰韓夫子豈長貧賤者乎遂屬意焉李生素重翊無所吝惜后知其意乃具膳請翊飲酒酣李生曰柳夫人容色非常韓秀才文章特異欲以柳荐枕于韓君可乎翊惊栗避席曰君之恩解衣輟食久之豈宜奪所愛乎李堅請之柳氏知其意誠乃再拜引衣接席李坐翊于客位引滿极歡李生又以資三十萬佐翊之費翊仰柳氏之色柳氏慕翊之才兩情皆獲喜可知也明年禮部侍郎楊度擢翊上第屏居間歲柳氏謂翊曰榮名及親昔人所尚豈宜以濯浣之賤稽采蘭之美乎且用器資物足以待君之來也翊于是省家于清池歲余乏食鬻妝具以自給天寶末盜覆二京士女奔駭柳氏以艷獨異且懼不免乃剪發毀形寄跡法靈寺是時侯希逸自平盧節度淄青素藉翊名請為書記洎宣皇帝以神武返正翊乃遣使間行求柳氏以練囊盛麩金題之曰章台柳章台柳昔日青青今在否縱使長條似舊垂亦應攀折他人手柳氏捧金嗚咽左右凄憫答之曰楊柳枝芳菲節所恨年年贈離別一葉隨風忽報秋縱使君來豈堪折無何有蕃將沙吒利者初立功竊知柳氏之色劫以歸第寵之專房及希逸除左仆射入覲翊得從行至京師已失柳氏所止歎想不已偶于龍首岡見蒼頭以駮牛駕輜軿從兩女奴翊偶隨之自車中問曰得非韓員外乎某乃柳氏也使女奴竊言失身沙吒利阻同車者請詰旦幸相待于道政里門及期而往以輕素結玉合實以香膏自車中授之曰當遂永訣愿置誠念乃回車以手揮之輕袖搖搖香車轔轔目斷意迷失于惊塵翊大不胜情會淄青諸將合樂酒樓使人請翊翊強應之然意色皆喪音韻凄咽有虞候許俊者以材力自負撫劍言曰必有故愿一效用翊不得已具以告之俊曰請足下數字當立致之乃衣縵胡佩雙鞬從一騎徑造沙吒利之第候其出行里余乃被衽執轡犯關排闥急趨而呼曰將軍中惡使召夫人仆侍辟易無敢仰視遂升堂出翊札示柳氏挾之跨鞍馬逸塵斷鞅倏忽乃至引裾而前曰幸不辱命四座惊歎柳氏與翊執手涕泣相與罷酒是時沙吒利恩寵殊等翊俊懼禍乃詣希逸希逸大惊曰吾平生所為事俊乃能爾乎遂獻狀曰檢校尚書金部員外郎兼御史韓翊久列參佐累彰勳效頃從鄉賦有妾柳氏阻絕凶寇依止名尼今文明撫運遐邇率化將軍沙吒利凶恣撓法憑恃微功驅有志之妾干無為之政臣部將兼御史中丞許俊族本幽薊雄心勇決卻奪柳氏歸于韓翊義切中抱雖昭感激之誠事不先聞固乏訓齊之令尋有詔柳氏宜還韓翊沙吒利賜錢二百萬柳氏歸翊翊后累遷至中書舍人然即柳氏志防閒而不克者許俊慕感激而不達者也向使柳氏以色選則當熊辭輦之誠可繼許俊以才舉則曹柯澠池之功可建夫事由跡彰功待事立惜郁堙不偶義勇徒激皆不入于正斯豈變之正乎蓋所遇然也
