body:
  text: 顧非熊顧非熊顧況有子數歲而卒況悲傷不已為詩哭之云老人哭愛子日暮千行血心逐斷猿惊跡隨飛鳥滅老人年七十不作多時別其子雖卒魂神常在其家每聞父哭聲聽之感慟因自誓忽若作人當再為顧家子一日如被人執至一處若縣吏者斷令托生顧家复都無所知勿覺心醒開目認其屋宇兄弟親愛滿側唯語不得當其生也已后又不記至七歲其兄戲批之忽曰我是爾兄何故批我一家惊異方敘前生事歷歷不誤弟妹小名悉遍呼之即顧非熊也齊君房齊君房者家于吳自幼苦貧雖勤于學而寡記性及壯有篇詠則不甚清新常為凍餒所驅役役于吳楚間以四五六七言干謁多不遇侯伯禮接雖時所獲未嘗積一金貯布袋脫滿一繩則必病罄而复愈元和初游錢塘時屬凶年箕斂投人十不遇一乃求朝飧於天竺至孤山寺西餒甚不能前去因臨流零涕悲吟數聲俄爾有胡僧自西而來亦臨流而坐顧君房笑曰法師諳秀才旅游滋味否君房曰旅游滋味即足矣法師之呼一何謬哉僧曰子不憶講法華經于洛中同德寺乎君房曰某生四十五矣盤桓吳楚間未嘗涉京江又何有洛中之說乎僧曰子應為饑火所惱不暇憶前事也乃探缽囊出一棗大如拳曰此吾國所產食之知過去未來事豈止於前生爾君房餒甚遂請食之食訖甚渴掬泉水飲之忽欠伸枕石而寢頃刻乃寤因思講法華于同德寺如昨日焉因泣涕禮僧曰震和尚安在曰專精未至再為蜀僧今則斷攀緣矣神上人安在曰前愿未滿又聞為法師矣悟法師焉在曰豈不憶香山寺石像前戲發大愿若不證無上菩提必愿為赳赳貴臣昨聞已得大將軍當時云水五人唯吾得解脫獨爾為凍餒之士耳君房泣曰某四十餘年日一餐三十餘年擁一褐浮俗之事決斷根源何期福不圓修困于今日僧曰過由師子座上廣說異端使學空之人心生疑惑戒珠曾缺禪味曾膻聲渾響清終不可致質傴影曲報應宜然君房曰為之奈何僧曰今日之事吾無計矣他生之事庶有警于吾子焉乃探缽囊中出一鏡背面皆瑩徹謂君房曰要知貴賤之分修短之限佛法興替吾道盛衰宜一覽焉君房覽鏡久之謝曰報應之事榮枯之理謹知之矣僧收鏡入囊遂挈之而去行十余步旋失所在是夕君房至靈隱寺乃剪發具戒法名鏡空大和元年李玫習業在龍門天竺寺鏡空自香山敬善寺訪之遂聞斯說因語玫曰我生五十有七矣僧腊方十二持缽乞食尚九年在舍世之日佛法其衰乎詰之默然無答乃請筆硯題數行於經藏北垣而去曰興一沙衰恒沙兔而罝犬而孥牛虎相交亡角牙寶檀終不滅其華劉立劉立者為長葛尉其妻楊氏忽一日泣謂立曰我以弱質托附君子深蒙愛重將謂琴瑟之和終以偕老何期一旦舍君長逝哽咽涕泗不能自胜立曰君素無疾恙何得如此妻言我數日沉困精思恍惚自度必不濟矣且以小女美美為托又謂立曰他日美美成長望君留之三二年其夕楊氏卒及立罷官寓居長葛已十年矣時鄭師崔公即立之表丈也立往詣之崔待之亦厚念其貧令賓幕致書于諸縣將以濟之有縣令某者邀立往部外看花及期而縣令有故不克同往令立先去舍趙長官庄行三二里見一杏園花盛發中有婦女十數人立駐馬觀之有一女年可十五六亦近垣中窺立又行百許步乃至趙長官宅入門見人物匆遽若有惊急主人移時方出曰適女子與親族看花忽中暴疾所以不果奉迎坐未定有一青衣與趙耳語趙起入內如是數四又聞趙公嗟歎之聲乃問立曰君某年某月為長葛尉乎曰然婚楊氏乎曰然有女名美美有仆名秋筍乎曰然仆今控馬者是矣趙又歎息惊異旋有人喚秋筍入宅中見一女可十五六涕泣謂曰美美安否對曰無恙也仆拜而出莫知其由立亦訝之徐問趙曰某未省與君相識何故知其行止也趙乃以實告曰女適看花忽若暴卒既蘇自言前身乃公之妻也今雖隔生而情愛未斷適窺見公不覺悶絕立歔欷久之須臾縣令亦至眾客具集趙具白其事眾咸異之立曰某今年尚未高亦有名官愿與小娘子尋隔生之好眾共成之于是成婿而美美長于母三歲矣張克勤張克勤者應明經舉置一妾頗愛之而無子其家世祝華岳神禱請頗有驗克勤母乃禱神求子果生一男名最怜甚慧黠后五年克勤登第娶妻經年妻亦無子母亦禱祈之婦產一子而最怜日羸弱更禱神求祐是夕母見一人紫綬金章謂母曰郎君分少子前子乃我所致耳今婦复生子前子必不全矣非我之力所能救也但謝其祭享而去后最怜果卒乃以朱涂右膊黛記眉上埋之明年克勤為利州葭萌令罷任居利州至錄事參軍韋副家見一女至前再克勤視之頗類最怜歸告其母母取視之女便欣然謂家人曰彼我家也及至驗其涂記宛然具在其家人使人取女猶眷眷不忍去焉孫緬家奴曲沃縣尉孫緬家奴年六歲未嘗解語后緬母臨階坐奴忽瞪視母怪問之奴便笑云娘子總角之時曾著黃裙白裶襦養一野狸今猶憶否母亦省之奴云爾時野狸即奴身是也得走后伏瓦溝中聞娘子哭泣聲至暮乃下入東園園有古冢狸於此中藏活積二年后為獵人擊殪因隨例見閻羅王王曰汝更無罪當得人身遂生海州為乞人作子一生之中常苦饑寒年至二十而死又見王王云與汝作貴人家奴奴名雖不佳然殊無憂懼遂送至此今奴已三生娘子故在猶無恙有福不其異乎文澹前進士文澹甚有德行人皆推之生三四歲能知前生事父母先有一子才五歲學人誦詩書頗亦聰利無何失足墜井而卒父母怜念悲涕不胜后乃生澹澹一旦語父母曰兒先有銀胡蘆子并漆球香囊等曾收在杏樹孔中不知在否遂與母尋得之父母知澹乃前子也怜惜過于諸兄志學之年詞藻俊逸后應舉翰林范學士禹偁坐下及第澹之兄谷也王鄂唐王鄂者尚書鄑之弟也西京亂離鄑挈家入蜀沿嘉陵江下至利州百堂寺前鄂年七歲忽云我曾有經一卷藏在此寺石龕內因令家人相隨訪獲之木梳亦存寺僧曰此我童子也較其所夭之年與王氏之子所生之歲果驗也其前生父母尚存及長仕蜀官至令錄僧道杰相州滏陽縣人信都元方少有操尚尤好釋典年二十九至顯慶五年春正月死死后月余其兄法觀寺僧道杰思悼不已乃將一巫者至家遣求元方與語道杰又頗解法術乃作一符攝得元方令巫者問其由委巫者不識字遣解書人執筆巫者為元方口授作書一紙與同學馮行基具述平生之意并詩二首及其家中亦留書啟文理順序言詞凄愴其書疏大抵勸修功德及遣念佛寫經以為殺生之業罪之大者無過于此又云元方不入地獄亦不墮鬼中全蒙冥官處分今于石州李仁師家為男但為隴州吳山縣石名遠于華岳祈子及改與石家為男又再受生日逼匆迫不得更住從二月受胎至十二月誕育愿兄等慈流就彼相看也言訖涕泣而去河東薛大造寓居滏陽前任吳山縣令自云具識名遠智力寺僧慧永法真等說之袁滋复州青溪山秀絕無比袁相公滋未達時居复郢間睛日偶過峻峰行數里漸幽奇險怪人跡罕到有儒生以賣藥為業家焉袁公與語言甚相狎因留宿乃問曰此處合有靈隱者曾從容不答曰有道者五六人每兩三日一至不知居處某雖與之熟亦不肯言袁曰某來修謁得否曰彼甚惡人然頗好酒足下求美醞一榼就此宿候或得見也袁公去得酒持至以伺之數夕果到五人鹿皮冠或紗帽藜杖草履遙相與通寒喧大笑乃臨澗濯足戲弄儒生置酌列席少頃盡入茅舍睹酒甚喜曰何處得此既飲數杯儒生曰某非能自致有客攜來愿謁仙兄乃導袁公出歷拜俯僂五人相顧失色且悔飲此酒兼怒儒生曰不合引外人相扰儒生曰茲人誠志可賞況是道流稍許從容亦何傷也意遂漸解复睹袁公恭甚乃時與語笑目袁生曰坐袁再拜就席少頃半酣頗歡注視袁公相謂曰此人大似西峰坐禪和尚良久云直是屈指數日此僧亡來四十七年矣問袁公之歲正四十七相顧撫掌曰覓官職去福祿至矣已后极富貴遂呼主人別袁公拜道流皆與握手過澗上山頂們羅跳躍有若飛鳥逡巡不見崔四八崔慎由初以未有兒息頗以為念有僧常游崔氏之門者崔因告之且問其計僧曰請夫人盛飾而游長安大寺有老僧院即詣之彼若不顧更之他所若顧我厚宜厚結之俾感動其心則其身后為公子矣如其言初適三處不顧后至一院僧年近六十矣接待甚勤至崔亦厚施之自是供施不絕僧乃曰身老矣自度無所報公愿以後身為公之子不數年僧卒而四八生焉或云手文有綱僧二字馬思道洪州醫博士馬思道病篤忽自歎曰我平生不省為惡何故乃為女子今在條子坊朱氏婦所托生矣其子試尋之其家婦果娠乃作襁褓以候之及思道卒而朱氏生實女子也
