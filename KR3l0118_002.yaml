body:
  text: 周穆王周穆王周穆王名滿房后所生昭王子也昭王南巡不還穆王乃立時年五十矣立五十四年一百四歲王少好神仙之道常欲使車轍馬迹遍於天下以倣黃帝焉乃乘八駿之馬奔戎使造父為御得白狐玄貉以祭于河宗導車涉弱水魚鱉黿鼉以為梁逐登于舂舂原作春據明鈔本改山又觴西王母於瑤池之上王母謠曰白雲在天道里悠遠山川間之將子無死尚能復來王答曰余歸東土和洽諸夏萬民平均吾顧見汝比及三年將復而野又至於雷首太行遂入於宗周時尹喜既通流沙草栖於終南之陰王追其舊迹招隱士尹輒杜沖居於草栖之所因號樓觀從詣焉焉字原缺據明鈔本陳校本補祭父自鄭圃來謁諫王以徐偃之亂王乃返國宗社復安王造崑崙時飲蜂山石髓食玉樹之實又登群玉山西王母所居皆得飛靈沖天之道而示迹託形者蓋所以示民有終耳況其飲琬琰之膏進甜雪之味素蓮黑棗碧藕白橘皆神仙之物得不延期長生乎又云西王母降穆王之宮相與升雲而去出仙傳拾遺燕昭王燕昭王者噲王明許自昌刻本噲王作王噲之子也及即位好神仙之道仙人甘需臣事之為王述昆臺登真之事去嗜欲撤聲色無思無為可以致道王行之既久谷將子乘虛而集告於王曰西王母將降觀爾之所修示爾以靈玄之要後一年王母果至與王遊燧林之下説炎皇鑽火之術然緑桂膏以照夜忽有飛蛾銜火集王之宮得圓丘砂珠砂珠原作朱砂據明鈔本陳校本改結而為佩王登捱明鈔本捱作掘本書卷四零二引拾遺記作握日之臺得神鳥所銜洞光之珠以消煩暑自是王母三降于燕宮而昭王徇於攻取不能遵甘需澄靜之旨王母亦不復至甘需白王母所設之饌非人世所有玉酒金醴後期萬祀王既嘗之自當得道矣但在虛疑純白保其遐齡耳甘需亦升天而去三十三年王無疾而殂形骨柔耎香氣盈庭子惠王立矣出仙傳拾遺彭祖彭祖者姓籛諱鏗帝顓頊之玄孫也殷末已七百六十七歲而不衰老少好恬靜不恤世務不營名譽不飾車服唯以養生治身為事王聞之以為大夫常稱疾間居不與政事善於補導之術服水桂雲母粉麋角散常有少容然性沈重終不自言有道亦不作詭惑變化鬼怪之事窈然無為少周遊時還獨行人莫知其所詣伺候竟不見也有車馬而常不乘或數百日或數十日不持資糧還家則衣食與人無異常閉氣內息從旦至中乃危坐拭目摩搦身體舐唇咽唾服氣數十乃起行言笑其體中或瘦倦不安便導引閉氣以攻所患心存其體面明鈔本面上有頭字九竅五臟四肢至于毛髮皆令具至覺其氣雲行體中故于鼻口中達十指末尋即體和王自往問訊不告致遺珍玩前後數萬金而皆受之以恤貧賤無所留又采女者亦少得道知養性之方年二百七十歲視之如五六十歲奉事之於掖庭為立華屋紫閣飾以金玉乃令采女乘輜軿往問道於彭祖既至再拜請問延年益壽之法彭祖曰欲舉形登天上補仙官當用金丹此九召杜光庭墉城集仙録卷六采女條九召作元君是太一所以白日升天也此道至大非君王之所能為其次當愛養精神服藥草可以長生但不能役使鬼神乘虛飛行身不知交接之道縱服藥無益也能養陰陽之意可推之而得但不思言耳何足怪問也吾遺腹而生三歲而失母遇犬戎之亂流離西域百有餘年加以少枯喪四十九妻失五十四子數遭憂患和氣折傷冷熱明鈔本無熱字陳校本冷熱二字作令肌膚不澤榮衛焦枯恐不度世所聞淺薄不足宣傳大宛山有青精先生者傳言千歲色如童子步行日過五百里能終歲不食亦能一日九食真可問也采女曰敢問青精先生是何仙人者也彭祖曰得道者耳非仙人也仙人者或竦身入雲無翅而飛或駕龍乘雲上造天階或化為鳥獸遊浮青雲或潛行江海翱翔名山或食元氣或茹芝草或出入人間而人不識或隱其身而莫之見面生異骨體有奇毛率好深僻不交俗流然此等雖有不死之壽去人情遠榮樂有若雀化為蛤雉化為蜃失其本真更守異氣余之愚心未願此已入明鈔本陳校本入作人道當食甘旨服輕麗通陰陽處官秩耳骨節堅強顏色和澤老而不衰延年久視長在世間寒溫風濕不能傷鬼神衆精莫敢犯五兵百蟲不可近嗔喜毀譽不為纍乃可貴耳人之受氣雖不知方術但養之得宜常至百二十歲不及此者傷也小復曉道可得二百四十歲加之可至四百八十歲盡其理者可以不死但不成仙人耳養壽之道但莫傷之而已夫冬溫夏涼不失四時之和所以適身也美色淑資幽間娛樂不致思欲之惑所以通神也車服威儀知足無求所以一志也八音五色以悅視聽所以導心也凡此皆以養壽而不能斟酌之者反以速患古之至人恐下才之子不識事宜流遁不還故絶其源故有上士別床中士異被服藥百裹不如獨臥五音使人耳聾五味使人口爽苟能節宣其宜適抑揚其通塞者不以減年得其益也凡此之類譬猶水火用之過當反為害也不知其經脈損傷血氣不足內理空疏髓腦不實體已先病故為外物所犯因氣寒酒色以發之耳若本充實豈有病也夫遠思強記傷人憂喜悲哀傷人喜樂過差御覽卷七二引神仙傳作喜樂過量傷人此有脫字忿怒不解傷人汲汲所願傷人陰陽不順傷人有所傷者數種而獨戒於房中豈不惑哉男女相成猶天地相生也所以神氣導養使人不失其和天地得交接之道故無終竟之限人失交接之道故有傷殘之期能避衆傷之事得陰陽之術則不死之道也天地晝分而夜合一歲三百六十交而精氣和合故能生産萬物而不窮人能則之可以長存次有服氣得其道則邪氣不得入治身之本要其餘吐納導引之術及念體中萬神有舍明鈔本許刻本舍作含影守形之事一千七百餘條及四時首向責己謝過臥起早晏之法皆非真道可以教初學者以正其身人受精養體服氣煉形則萬神自守其真不然者則榮衛枯悴萬神自逝悲思所留者也人為道不負明鈔本陳校本負作務其本而逐其末告以至言而不能信見約要之書謂之輕淺而不盡服誦觀夫太清北神中經之屬以此自疲至死無益不亦悲哉又人苦多事少能棄世獨往山居穴處者以道教之終不能行是非仁人之意也但知房中閉氣節其思慮適飲食則得道也吾先師初著九節都解指韜形隱遁尤為開明四極九室諸經明鈔本遁作首尤作無抱朴子內篇遐覽篇有九都經蹈形記隱守記節解經又仙藥篇引開明經御覽六六七引有四極明科經指教經本文有訛脫顛倒處疑當作九都節解指教韜形隱守無為開明四極九靈諸徑萬三千首為以示始涉門庭者采女具受諸要以教王王試之有驗殷王傳彭祖之術屢欲祕之乃下令國中有傳祖之道者誅之又欲害祖以絶之祖知之乃去不知所之其後七十餘年聞人於流沙之國西見之王不常行彭祖之術得壽三百歲氣力丁壯如五十時得鄭女妖淫王失道而殂俗間言傳彭祖之道殺人者由於王禁之故也後有黃山君者修彭祖之術數百歲猶有少容彭祖既去乃追論其言以為彭祖經出神仙傳魏伯陽魏伯陽者吳人也本高門之子而性好道術後與弟子三人入山作神丹丹成知弟子心懷未盡乃試之曰丹雖成然先宜與犬試之若犬飛然後人可服耳若犬死即不可服乃與犬食犬即死伯陽謂諸弟子曰作丹唯恐不成既今成而犬食之死恐是未合神明之意服之恐復如犬為之奈何弟子曰先生當服之否伯陽曰吾背違世路委家入山不得道亦恥復還死之與生吾當服之乃服丹入口即死弟子顧視相謂曰作丹以求長生服之即死當奈此何獨一弟子曰吾師非常人也服此而死得無意也因乃取丹服之亦死餘二弟子相謂曰所以得丹者欲求長生耳今服之既死焉用此為不服此藥自可更得數十歲在世間也遂不服乃共出山欲為伯陽及死弟子求棺木二子去後伯陽即起將所服丹內死弟子及白犬口中皆起弟子姓虞遂皆仙去道逢入山伐木人乃作手書與鄉里人寄謝二弟子乃始懊恨伯陽作參同契五行相類凡三卷其説是周易其實假借爻象以論作丹之意而世之儒者不知神丹之事多作陰陽注之殊失其旨矣出神仙傳
