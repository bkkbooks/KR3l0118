body:
  text: 高逞高逞高逞為中書舍人九年家無制草或問曰前輩皆有制集焚之何也答曰王言不可存于私家呂元膺呂元膺為東都留守常與處士對棋棋次有文簿堆擁元膺方秉筆閲覽棋侶謂呂必不顧局矣因私易一子以自勝呂輒已窺之而棋侶不悟翼日呂請棋處士他適內外人莫測棋者亦不安乃以束帛贐之如是十年許呂寢疾將亟兒侄列前呂曰游處交友爾宜精擇吾為東都留守有一棋者云云吾以他事俾去易一著棋子亦未足介意但心跡可畏亟言之即慮其憂懾終不言又恐汝輩滅裂于知聞言畢惆然長逝王鍔泓師云長安永寧坊東南是金盞地安邑里西是玉盞地后永寧為王鍔宅安邑為北平王馬燧宅后王馬皆進入官王宅纍賜韓弘及史憲誠李載義等所謂金盞破而成焉馬燧為奉誠園所為玉盞破而不完也又一說李吉甫安邑宅及牛僧孺新昌宅泓師號李宅為玉杯一破無復可全金碗或傷庶可再制牛宅本將作大匠康聾宅聾自辨岡阜形勢以其宅當出宰相后每年命相有按聾必引頸望之宅竟為僧孺所得李后為梁新所有江西驛官江西有驛官以干事自任白刺史驛已理請一閲之乃往初一室為酒庫諸醢畢熟其外畫神問曰何也曰杜康刺史曰功有余也又一室曰茶庫諸茗畢貯復有神問何也曰陸鴻漸刺史益喜又一室曰菹庫諸茹畢備復有神問何神也曰蔡伯喈刺史大笑曰君誤矣王仲舒王仲舒為郎官與馬逢友善每責逢曰貧不可堪何不求碑志相救逢曰適見誰家走馬呼醫吾可待也周願元和中郎吏數人省中縱酒話平生各有愛尚及憎怕者或言愛圖畫及博奕或怕妄與佞工部員外周願獨云愛宣州觀察使怕大蟲張荐張荐自筮仕至祕書監常帶使職三入蕃歿于赤嶺蓮花漏越僧僧徹得蓮花漏于廬山傳之江西觀察使韋丹初惠遠以山中不知更漏乃取銅葉制器狀如蓮花置盆水上底孔漏水半之則沉每晝夜十二沉為行道之節雖冬夏短長云陰月黑無所差也唐衢進士唐衢有文學老而無成善哭每發一聲音調哀切遇人事有可傷者衢輒哭之聞者涕泣嘗游太原遇享軍酒酣乃哭滿坐不樂主人為之罷宴脂粉錢湖南觀察使有夫人脂粉錢者自顏果卿妻始之也柳州刺史亦有此錢是一軍將為刺史妻致不亦謬乎韋執誼元和初韋執誼貶崖州司戶參軍刺史李甲憐其羈旅乃舉牒云前件官久在相庭頗諸公事幸期佐理忽憚縻賢事須請攝軍事衙推李光顏李光顏有大功于時位望通顯有女未適人幕客謂其必選嘉壻因從容乃盛譽一鄭秀才詞學門閥人韻風流冀光顏以子妻之他日又言之光顏乃謝幕客曰光顏一健兒也遭逢多難偶立微功豈可妄求名族以掇流言者乎某自己選得嘉壻諸賢未知乃召一典客小吏指之曰此為某女之匹也即擢升近職仍分財而資之從事聞之成以為愜當矣按光顏居鼎盛文朝慮弓藏之禍事當遠害理在避嫌豈敢結強宗固隳本志者歟與夫必娶國高求婚王謝者不其遠哉李益長慶初趙宗儒為太常卿贊郊廟之禮罷相三十余年年七十六衆論其精健有常侍李益笑曰趙乃仆為東府試官所送進士也吳武陵長慶中李渤除桂管觀察使表名儒吳武陵為副使故事副車上任具橐鞬通謝又數日于球場致宴酒酣吳乃聞婦女于看棚聚觀意甚恥之吳既負氣欲復其辱乃上台盤坐褰衣裸露以溺渤既被酒見之大怒命衛士送衙司梟首時有衙校水蘭知其不可遂以禮而救止多遣人衛之渤醉極扶歸寢至夜艾而覺聞家人聚哭甚悲驚而問焉乃曰昨聞設亭喧噪又聞命衙司斬副使不知其事憂及于禍是以悲耳渤大驚亟命遞使問之水蘭具啓昨雖奉嚴旨未敢承命今副使猶寢在衙院無苦渤遲明早至衙院卑詞引過賓主上下俱自克責益相敬時未有監軍于是乃奏水蘭牧于宜州以酬之武陵雖有文華而強悍激訐為人所畏又嘗為容州部內刺史贓罪狼藉敕史令廣州幕吏鞫之吏少年亦自負科第殊不假貸持之甚急武陵不勝其憤因題詩路左佛堂曰雀兒來逐颶風高下視鷹鸇意氣豪自謂能生千里翼黃昏依舊入蓬蒿韋乾度韋乾度為殿中侍御史分司東都牛僧孺以制科敕首除伊闕尉台參乾度不知僧孺授官之本問何色出身僧孺對曰進士又曰安得入畿僧孺對曰某制策連捷忝為敕頭僧孺心甚有所訝歸以告韓愈愈曰公誠小生韋殿中固當不知愈及第十有余年猖狂之名已滿天下韋殿中尚不知之子何怪焉趙宗儒趙宗儒檢校左仆射為太常卿太常有師子樂備五方之色非朝會聘享不作至是中人掌教坊之樂者移牒取之宗儒不敢違以狀白宰相宰相以為事在有司其事不合關白宗儒憂恐不已相座責以懦怯不任事改換散秩為太子少師席夔韓愈初貶之制舍人席夔為之詞曰早登科第亦有聲名席既物故友人多言曰席無令子弟豈有病陰毒傷寒而與不潔韓曰席不吃不潔太遲人曰何也曰出語不當豈有忿責詞云亦有聲名耳劉禹錫牛僧孺赴舉之秋每為同袍見忽嘗投贄于補缺劉禹錫對客展卷飛筆涂竄其文且曰必先輩期至矣雖拜謝礱礪終為怏怏歷三十余歲劉轉汝州僧孺鎮漢南枉道駐旌信宿酒酣直筆以詩喻之劉承詩意才悟往年改牛文卷因戒子咸佐承雍等曰吾立成人之志豈料為非況漢南尚書高識遠量罕有其比昔主父偃家為孫弘所夷嵇叔夜身死鐘會之口是以魏武戒其子云吾大忿怒小過失慎勿學焉汝輩修進守中為上也僧孺詩曰粉署為郎四十春向來名輩更無人休論世上升沉事且閲樽前見在身珠玉會應成咳唾山川猶覺露精神莫嫌恃酒輕言語會把文章謁后塵禹錫詩云昔年曾忝漢朝臣晚歲空余老病身初見相如成賦日后為丞相掃門人追思往事咨嗟久幸喜清光語笑頻猶有當時舊冠劍待公三日拂埃塵牛吟和詩前意稍解曰三日之事何敢當焉于是移宴竟夕方整前驅滕邁滕倪苦心為詩遠之吉州謁宗人邁邁以吾家鮮士此弟則千里之駒也每吟其詩曰白發不能容相國也同閒客滿頭生又題鷺障子云映水有深意見人無懼心邁且曰魏文酷陳思之學潘嶽褒正叔之文貴集一家之芳安以宗從疏遠也倪既秋試捧笈告游乃留詩一首為別滕君得之悵然曰此生必不與此子再相見也及祖于大皋之閣別異常情倪至秋深逝于商于之館舍聞者莫不傷悼焉倪詩曰秋初江上別旌旗故國有家淚欲垂千里未知投足處前程便是聽猿時誤攻文字身空老卻返樵漁計已遲羽翼凋零飛不得丹霄無路接瑤池
