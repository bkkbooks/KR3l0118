body:
  text: 周昭王周昭王昭王即位三十年王坐祗明之室晝而假寐忽白雲蓊鬱而起有人衣服皆毛羽因名羽人王夢中與語問以上仙之術羽人曰大王精智未開求長生久視不可得也王跪而若請絶欲之教羽人乃以指畫王心應手即裂王乃驚悟而汗濕於襟席因患心疾即却膳徹樂移於旬日忽見所夢者來語王曰先欲易王之心乃出方寸緑囊中有藥名曰續脈丸補血精散以手摩王之臆俄而即愈王即請此藥貯以玉缶緘以金繩以之塗足則飛天地之外如遊咫尺之內有得服之後天而死吳夫差吳王夫差夜夢三黑狗號以南以北炊甑無氣及覺召群臣言夢群臣不能解乃召公孫聖聖被召與妻訣曰以惡夢召我我豈欺心者必為王所殺於是聖至以所夢告之聖曰王無國矣犬號者宗廟無主炊甑無氣不食矣王果怒殺之及越兵至王謂左右曰吾無道殺公孫聖汝可呼之於是三呼三應吳卒為越所滅漢武帝漢武帝夢大魚求去口中鉤明日遊昆明池見一魚銜鉤帝取鉤放之三日池濱得明珠一雙司馬相如字長卿將獻賦而未知所為夢一黃衣翁謂之曰可為大人賦言神仙之事賦成以獻帝大嘉賞陰貴人漢明帝陰貴人夢食瓜甚美時敦煌獻異瓜種名穹隆父老云有道士從蓬萊得此種食之不飢張奐後漢張奐為武威太守其妻夢帝與印綬登樓而歌覺以告奐奐令占之曰夫人方生男復臨此郡命終此樓後生子猛建安中為武威太守殺刺史邯鄲商州兵圍急猛恥見擒乃登樓自焚而死鄭玄鄭玄師馬融三載無聞融還之玄過樹陰下假寐夢一人以刀開其心謂曰子可學矣於是寤而即返遂洞精典籍後東歸融曰詩書禮樂皆東矣范邁林邑謂紫磨金為上金俗謂之楊邁金範邁母夢人鋪楊邁金席與其生兒兒生席色昭晰後因生兒名曰範邁為林邑王許攸許攸夢烏衣吏奉漆案案上有六封文書拜跪曰府君當為北斗君明年七月復有一案四封文書云陳康為主簿覺後適康至曰今來當謁攸聞益懼問康曰我作道師死不過作社公今日得北斗主簿余為忝矣明年七月二人同日而死薛夏天水人也博學絶倫母孕夏之時夢有人遺一篋衣云夫人必生賢明之子為帝王所宗母記其夢之時及生夏年及弱冠才術過人魏文帝與之講論彌日不息辭華旨暢應對如流無有凝滯帝曰昔公孫龍稱為辨捷而迂誕誣妄今子所説非聖人言不談則子遊子貢之儔不能過也若仲尼在魏復為入室焉帝手製書與夏題云入室生位至祕書丞居甚貧帝解御衣以賜之以符先夢名冠當時為一代高士蔣濟魏蔣濟為領軍也其妻夢亡兒涕泣言曰死生異路我生時為卿相子孫今在地下為泰山伍伯憔悴困辱不可復言今太廟西有孫阿者將召為泰山令願母為白領軍囑阿轉我今得樂處言訖母遂驚寤以白濟濟曰夢不足憑耳明日母復夢之言曰我今來迎新君止在廟下未發之間暫得歸來新君明日日中當發臨發多事不得復歸於此願重啓之何惜一試驗也遂説阿形狀言甚備悉天明母又為言之曰昨又夢如此雖知夢不足憑何惜一驗之乎濟乃遣人詣太廟下推問孫阿果得之形狀如其夢濟乃涕泣曰幾負我兒於是乃見孫阿具語其事阿不懼當死而喜為泰山令惟恐濟言之不信也乃謂濟曰若誠如所言某之願也不知賢郎欲得何職濟曰隨地下樂者與之阿許諾言訖遣還濟欲速知其驗從領軍門下至廟下十步安一人以傳阿之消息辰時傳阿心痛日中傳阿亡涕泣曰雖哀兒之不幸見喜亡者之有知後月餘母復夢兒來告曰已得轉為録事矣周宣魏周宣字孔和善占夢或有問宣者吾夢芻狗宣曰君當得美食未幾復有夢芻狗曰當墮車折腳尋而又云夢芻狗宣曰當有火災後皆如所言其人曰吾實不夢聊試君耳三占不同皆驗何也宣曰意形於言便占吉凶且芻狗者祭神之物故君初言夢之當得美食也祭祀即畢則為所轢當墮車傷折車轢之後必載以樵故云失火王戎王戎夢有人以七枚椹子與之著衣襟中既覺得之占曰椹桑子也自後男女大小凡七喪鄒湛鄒湛夢一人拜自稱甄仲舒求葬湛覺思之曰舍西瓦土中人也乃取葬之復夢其人來拜謝陳桃虞翻注易上奏曰臣郡吏陳桃夢臣與道士相遇散髮粗裘付易六爻燒其三以飲臣臣乞盡吞之道士言易在天上三爻足以豈臣受命應當知也呂蒙呂蒙入吳王勸其學乃博覽群籍以易為宗常在孫策坐酣醉忽於眠中誦易一部俄而起驚衆人皆問之蒙云向夢見伏羲文王周公與我言論世祚興亡之事日月廣明之道莫不窮精極妙未該玄言政空誦其文耳衆坐皆知蒙囈誦文也王穆洛陽王穆起兵酒泉西伐索嘏長史郭瑀諫不從夜夢乘青龍上天至屋而止覺歎曰屋字尸至也龍飛屋上尸至吾其死矣後果驗出張天錫張天錫在涼州夢一緑色犬甚長從南來欲咋天錫牀上避之乃墮地後苻堅遣苟萇者緑地錦袍從南來攻入門大破之張駿涼文王張駿夢一人鬢眉皓白自稱子俞曰地上之事付汝地下之事付我王寤問之有侯子瑜先死得其曾孫亮為祈連令矣索充宋桶索充夢一虜脫上衣來詣充索紞占曰虜去上半下男字也夷虜陰類君妻當生男也已後果驗又宋桶夢內中有一人著衣桶一手把兩杖極打之索紞占曰內中有人是肉子也兩杖著之象極打肉食也過三日過三家皆得肉食矣苻堅苻堅將欲南伐夢滿城出菜又地東南傾其占曰菜多難為醬也東南傾江左不得平也後趙宣咸宣咸卒後五年石虎夢見咸涕泗囑其子奮曰非心慮所達也通夢之言而有徵奮今何在左右對曰為趙郡守於是即擢拜廷尉為太常才力不及父因咸夢登列卿也張甲張甲者與司徒蔡謨有親僑住謨家暫數宿行過期不及謨晝眠夢甲云暫行忽暴病患心腹痛病脹滿不得吐下某時死謨曰何以治之甲曰蜘蛛生斷去腳吞之則愈謨覺使人往甲行所驗之果死張茂會稽張茂嘗夢大象以問萬推曰君當為大郡而不能善終大象者大獸也取諸其音獸者守也象以齒焚其身後必為人所殺茂永昌中為吳興太守值王敦問鼎執正不移敦遣沈充滅之晉明帝晉明時獻馬者夢河神請之及至與帝夢同即投河以奉神始太傅褚褒亦好此馬帝云已與河神及褚公卒軍人見公乘此馬矣馮孝將廣平太守馮孝將男馬子夢一女人年十八九歲言我乃前太守徐玄方之女不幸早亡亡來四年為鬼所枉殺按生録乃歲至八十餘今聽我更生還為君妻能見聘否馬子掘開棺視之其女已活遂為夫婦徐精晉咸和初徐精遠行夢與妻寢有身明年歸妻果産後如其言矣商仲堪商仲堪在丹徒夢一人曰君有濟物之心豈能移我在高燥處則恩及枯骨矣明日果有一棺逐水仲堪取而葬之於高岡酹酒其夕夢見其人來拜謝商靈均義熙中夢人來縛其身將去形神乖散復有一人云且置之須作衡陽當取之耳後除衡陽守辭不得免果卒官桓豁荊州刺史桓豁所住齋中見一人長丈餘夢曰我龍山之神來無好意使君既貞固我當自去耳司馬恬京口新城有鄧艾廟毀久晉譙王司馬恬為都督夢一人自稱鄧公求治舍宇恬乃令與修造之賈弼河東賈弼為琅琊參軍夜夢一人𪐼大鼻瞷目請曰愛君之貌換君之頭可乎夢中不獲已遂被換去覺而人見者悉驚走還家家人悉藏自此後能半而笑啼兩手足及口中各題一筆書之詞翰俱美王奉先有貴人亡後永興令王奉先夢與之相對如平生奉先問遠有情色乎答云某日至某家問婢後覺問其婢云此日某夢郎君來宗叔林晉陽守宗叔林得十頭鱉付廚曰每日以二頭作臛其夜夢十丈夫皂布衣袴褶扣頭求哀不悟而食二枚明夜又夢八人求命方悟乃放之後夢八人來謝沙門法稱宋沙門法稱臨終曰有嵩山人告我江東劉將軍應受天命吾以三十二璧一餅為信物宋祖聞之命僧惠義往嵩山七日七夜行道夢有一長鬚翁指示及覺分明憶所在掘而得之劉穆之劉穆之常渡揚子江宿夢合兩船為舫上施華蓋儀飾甚盛以升天既曉有一姥問曰君昨夜有佳夢否穆之乃具説之姥曰君必位居端揆言訖不見後官至僕射丹陽尹以元功也穆之又夢有人稱劉鎮軍相迎旦占之曰吾死矣今豈有劉鎮軍耶後宋武帝遣人迎共定大業武帝時為鎮軍將軍徐羡之徐羡之為王雄少傅主簿夢父作謂曰汝從今己後勿渡朱雀桁當貴羡之後行半桁憶先人夢回馬而以此除主簿後果為宰相沈慶之元嘉中始夢牽鹵部入廁中雖欣清道而甚惡之或為之解曰君必貴然未也鹵部者富貴之容廁中所謂後帝也君富貴不在今主矣後果中焉明之元嘉九年征北參軍明之有一從者夜眠大魘之自往喚之頃間不能應又失其頭髻三日乃寤説云被三人捉足一人髻之忽夢見一道人以丸藥與之如桐子令以水服之及悟手中有藥服之遂瘥劉誕竟陵劉誕在廣陵左右直眠夢人告之曰官須髮為矟旄則覺已失髮矣如此數十人袁湣孫袁愍孫世祖出為海陵守夢日墮身上尋而追還與機密劉沙門劉沙門居彭城病亡妻貧兒幼遭暴風雨牆宇破壞其妻泣擁徲子曰汝爺若在豈至於此其夜夢沙門將數十人料理宅舍明日完矣諸仲務諸仲務一女顯姨嫁為米元宗妻産亡於家俗聞産亡者以墨點面其母不忍仲務密自點之無人見者元宗為始新縣丞夢妻來上牀分明新白粧面上有墨點孫氏有孫氏求官夢雙鳳集其兩拳以問占者宋董曰鳳凰非梧桐不棲非竹實不食卿當大凶非苴杖即削杖後孫氏果遭母喪桓誓桓誓字明期居豫章時梅玄龍為太守先已病矣誓往看之語玄龍云吾昨夜忽夢見君著喪衣來迎我經數日復夢如前云二十八日當拜二十七日桓忽中惡就玄龍索麝香丸玄龍聞令作凶具二十七日桓亡二十八日龍卒張尋巴西張尋夢庭生一竹節相似都為一門以問竺法度云當暴貴但不得久矣果然如其所言徐祖嘉興徐祖幼孤叔隗養之如所生隗病祖營作甚勤是夜夢二人來云汝叔應合死也祖叩頭祈請哀愍二人云念汝如此為活之祖覺叔乃瘥桓邈桓邈為汝南郡人齎四烏鴨作禮大兒夢四烏衣人請命覺忽見鴨將殺遂救之買肉以代還夢四人來謝而去周氏婢陳留周氏婢入山取樵倦寢忽夢一女子坐中謁之曰吾目中有刺願乞拔之及覺忽見一棺中有髑髏眼中草生遂與拔之後於路傍得雙金指環何敬叔何敬叔少奉法作一檀像未有木先夢一沙門納衣杖錫來云縣後何家桐甚良覺如夢求之果得
