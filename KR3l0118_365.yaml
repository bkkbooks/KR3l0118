body:
  text: 王申子王申子貞觀中望苑驛西有民王申手植榆于路旁成林構茅屋夏月常饋漿于行人官客即延憩具茗有兒年十三每令伺客一日白其父路有女子求水因令呼入女年甚少衣碧襦白幅巾自言家在南十余里夫死無兒今服禫矣將適馬嵬訪親情丐衣食語言明晤舉止可愛王申乃留食謂曰今日已暮可宿此達明去也女亦欣然從之其妻內之後堂呼為妹倩裁衣數事自午至戌悉辦針指細密殆非人工申大驚異妻尤愛之乃戲曰妹能為我作新婦乎女笑曰身既無托願執井灶王申即日借衣貫酒禮納為新婦其夕暑熱戒其夫近多盜不可辟門即舉巨椽捍戶而寢及夜半王申妻夢其子被發訴曰被食將盡矣妻驚欲省其子王申曰渠得好新婦喜極囈言耶妻還睡復夢如初申與妻秉燭呼其子及新婦悉不應扣其戶戶牢如鍵乃壞門闔才開有一物圓目鑿齒體如藍色沖人而去其子唯余腦骨及發而已韓佽韓佽在桂州妖賊封盈能為數里霧先是嘗行野外見黃蝶數十因逐之至大樹下而滅掘得石函素書大如臂遂成左道歸之如市乃聲言某日收桂州有紫氣者我必勝至期果有紫氣如匹帛亙于州城上白氣直沖之紫氣遂散忽大霧至午稍霽州宅諸樹滴下銅佛大如麥不知其數是年韓卒許敬張間唐貞元中許敬張間同讀書于偃月山書堂兩間人據其一中隔有丈許西而張東各開戶牖初敬遽相勗勵情地甚狎自春徂冬各秉燭而學一夜二更忽有一物推許生戶而入初意其張生而不之意其物已在案側立及讀書遍乃回視方見一物長可五尺余虎牙狼目毛如猿玃爪如鷹鸇服豹皮褌見許生顧盼乃叉手端目并足而立許生恐甚遂失聲連叫張生相救如是數百聲張生滅燭柱戶佯寢竟不應之其物忽倒行就北壁火爐所乃蹲踞視許生呼張生不已其物又起于床下取生所用伐薪斧卻回而坐附火復如初良久許生乃安心定氣而言曰余姓許名敬辭家慕學與張間同到此不早謁諸山神深為罪耳然浮俗淺識幸勿責之言已其物奮起叉手鞠躬唯唯而出敬恨張生之甚也翌日乃撤書而歸于是張生亦相與俱罷業竟不成太原小兒嚴綬鎮太原市中小兒如水際泅戲忽見物中流流下小兒爭接乃一瓦瓶重帛冪之兒就岸破之有嬰兒長尺余遂迅走群兒逐之頃間足下旋風起嬰兒已蹈空數尺近岸舟子遽以篙擊殺之發朱色目在頂上李師古李師古治山亭掘得一物類鐵斧頭時李章武遊東平師古示之武驚曰此禁物也可飲血三斗驗之而信孟不疑東平未用兵時有舉人孟不疑客昭義夜至一驛方欲濯足有稱淄青張評事者至仆從數十孟欲謁之張被酒初不顧孟因退就西間張連呼驛吏索煎餅孟默窺之且怒其傲良久煎餅至孟見一黑物如豬隨盤至燈影而滅如此五六返張竟不察孟恐懼不睡張尋太鼾至三更孟才寐忽見一人皂衣與張角力久乃相捽入東偏房拳聲如杵頃之張被發雙袒而出還寢床上至五更張乃喚仆使張燭巾櫛就孟曰某昨醉中都不知秀才同廳因命食談笑甚歡時時小聲曰昨夜甚慚長者乞不言也孟但唯唯復曰某有故不可早發秀才可先也探靴中得金一挺授孟曰薄貺乞密前事孟不敢辭即前去行數里方聽捕殺人賊孟詢諸道路皆曰淄青張評事至其驛早發及明但空鞍失張所在騎吏返至驛尋索驛西閣中有席角發之白骨而已無泊一蠅肉也地上滴血無余唯一隻履在旁相傳此驛舊凶竟不知何怪舉人祝元膺嘗言親見孟不疑説每誡夜食必須祭也祝又言孟素不信釋氏頗能詩其句云白日故鄉遠青山佳句中后嘗持念溺于遊覽不復應舉戴察臨川郡南城縣令戴察初買宅于館娃坊暇日與弟間坐廳中忽聞外有婦人聚笑聲或近或遠察頗異之笑聲漸近忽見婦人數十散在廳前倏忽不見如是纍日察不知所為廳際有枯梨樹大合抱意其為祥因伐之根下有石露如拳掘之轉闊勢如鏊形乃烈火其上沃醋復鑿深五六尺不透忽見婦人繞坑拊掌大笑有頃共牽察入坑投于石上一家驚懼婦人復還大笑察亦隨出察才出又失其弟家人慟哭察獨不哭曰他亦甚快活何用哭也察至死不肯言其狀杜悰杜悰未達時遊江湖間值一程稍遙昏暝方達一戍有傳舍居者多不安或怖懼而卒驛將見悰骨氣非凡內思之此或貴人若宿而無恙必將相也遂請悰舍于內供待極厚到夜分聞東序隙舍洶洶如千萬人聲悰取紙大署己之名系于瓦石擲之喧聒之處其聲即絶又聞西序復喧即如前擲之尋亦寂然遂安寢遲明驛吏問安公具述之乃知必貴以束素餞之及大拜即訪吏擢用鄭絪唐陽武侯鄭絪罷相自嶺南節度入為吏部尚書居昭國里弟縕為太常少卿皆在家廚饌將備其釜忽如物于灶中築之離灶尺余連築不已其旁有鐺十余所并烹庖將熱皆兩耳慢搖良久悉能行乃止灶上每三鐺負一釜而行其余列行引從自廚中出在地有足折者有廢不用者亦跳躑而隨之出廚東過水渠諸鐺并行無所礙而折足者不能過其家大小驚異聚而視之不知所為有小兒咒之曰既能為怪折足者何不能前諸鐺乃棄釜于庭中卻過每兩鐺負一折足者以過往入少卿院堂前大小排列定乃聞空中轟然如屋崩其鐺釜悉為黃埃黑煤盡日方定其家莫測其故數日少卿卒相國相次而薨河北軍將湖城逆旅前嘗有河北軍將過行未數里忽有旋風如斗器起于馬前軍將以鞭擊之轉大遂旋馬首鬣起豎如植軍將懼下馬觀之覺鬣長數尺中有細綆如紅線馬時人立嘶鳴軍將怒乃取佩刀拂之因風散滅馬亦死軍將剖馬腹視之腹中已無腸不知何怪宮山僧宮山在沂州之西鄙孤拔聳峭回出衆峰環三十里皆無人居貞元初有二僧至山蔭木而居精勤禮念以晝繼夜四遠村落為構屋室不旬日院宇立焉二僧尤加愨勵誓不出房二十余載元和中冬夜月明二僧各在東西廊朗聲唄唱空中虛靜時聞山下有男子慟哭之聲稍近須臾則及院門二僧不動哭聲亦止逾垣遂入東廊僧遙見其身絶大躍入西廊而唄唱之聲尋輟如聞相擊撲爭力之狀久又聞咀嚼啖噬啜吒甚勵東廊僧惶駭突走久不出山都忘途路或仆或蹶氣力殆盡回望見其人踉蹌將至則又跳迸忽逢一水兼衣徑渡畢而追者適至遙詬曰不阻水當并食之東廊僧且懼且行罔知所詣俄而大雪咫尺昏迷忽得人家牛坊遂隱身于其中夜久雪勢稍晴忽見一黑衣人自外執刀槍徐至欄下東廊僧省息屏氣向明潛窺黑衣蜘蹰徙倚如有所伺有頃忽院牆中般過兩廊衣物之類黑衣取之束縛負擔續有一女子攀牆而出黑衣挈之而去僧懼涉蹤迹則又逃竄恍惚莫知所之不十數里忽墜廢井井中有死者身首已離血體猶暖蓋適遭殺者也僧驚悸不知所為俄而天明視之則昨夜攀牆女子也久之即有捕逐者數輩偕至下窺曰盜在此矣遂以索縋人就井縶縛加以毆擊與死為鄰及引上則以昨夜之事本末陳述而村人有曾至山中識為東廊僧者然且與死女子俱得未能自解乃送之于邑又細列其由謂西廊僧已為異物啖噬矣邑遣吏至山中尋驗西廊僧端居無恙曰初無物但將二更方對持念東廊僧忽然獨去久與誓約不出院門驚異之際追呼已不及矣山下之事我則不知邑吏遂以東廊僧誑妄執為殺人之盜榜掠薰灼楚痛備施僧冤痛誣甘置于死贓狀無據法吏終無以成其獄也逾月而殺女竊資之盜他處發敗具得情實僧乃冤免
