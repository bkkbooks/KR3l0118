body:
  text: 武都女武都女武都有一丈夫化為女子美而艷蓋女精也蜀王納為妃不習水土欲去主留之乃為東平之歌以樂之無幾物故王哀之乃遣五丁之武都擔土為妃作冢蓋地數畝高七丈上有石鏡今成都北角武擔是也東方朔漢武帝東游至函谷關有物當道其身長數丈其狀象牛青眼而曜精四足入土動而不徙百官惊懼東方朔乃請酒灌之灌之數十斛而消帝問其故答曰此名憂患之所生也此必是秦之獄地不然罪人徙作地聚夫酒忘憂故能消之也帝曰博物之士至于此乎雙頭雞漢太初二年大月氏貢雙頭雞四足一尾鳴則俱鳴武帝致于甘泉館更有余雞媲之得種類也而不能鳴非吉祥也帝乃送還西域至西關雞返顧望漢宮而哀鳴言曰三七末雞不鳴犬不吠宮中荊棘亂相移當有九虎爭為帝至王莽篡位將軍九虎之號其后喪亂弘多宮掖中并生蒿棘家無雞犬此雞未至月支乃飛而聲似鶤雞翱翔云里張遺桂陽太守江夏張遺字叔高居傿陵田中有大樹十圍余蓋六畝枝葉扶疏蟠地不生谷草遣客斫之斧數下樹大血出客惊怖歸白叔高叔高怒曰老樹汗出此等何怪因自斫之血大流出叔高更斫之又有一空處白頭發翁長四五尺突出趁叔高叔高以刀迎斫殺之四五老翁并出左右皆惊怖伏地叔高神態恬然如舊諸人徐視之似人非人似獸非獸此所謂木石之怪夔魍魎者乎其伐樹年中叔高辟司空御史兗州刺史翟宣王莽居攝東郡太守翟義知其將篡也謀舉兵兄宣教授諸生滿堂群雁數十中庭有狗從而嚙之皆惊比救之皆斷頭狗走出門求不知處宣大惡之數日莽夷其三族臧仲英扶風臧仲英為侍御史家人作食有塵垢在焉炊熟不知釜處兵弩自行火從篋中起衣盡燒而篋簏如故兒婦女婢使一旦盡亡其鏡數日后從堂下投庭中言還汝鏡女孫年四歲亡之求之不知處二三日乃于圊中糞下唬若此非一許季山上之曰家當有青狗內中御者名蓋喜與共為之誠欲絕之殺此狗遣蓋喜歸鄉里從之遂絕仲英遷太尉長史魯相頓丘人黃初中頓丘界騎馬夜行者見道中有物大如兔兩眼如鏡跳梁遮馬令不得前人遂惊懼墮馬魅便就地犯之人懼惊怖良久得解遂失魅不知所往乃更上馬前行數里逢一人相問訊因說向者之事變如此今相得甚歡人曰我獨行得君為伴快不可言君馬行疾前我在后相隨也遂共行乃問向者物何如乃令君如此怖對曰身如兔眼如鏡形狀可惡人曰試顧我眼又觀視之猶复是也魅就跳上馬人遂墮地怖死家人怪馬獨歸即行推索于道邊得之宿昔乃蘇說事如此狀王基安平太守王基家數有怪使管輅筮之卦成輅曰君之卦當有一賤人生一男墮地便走入灶中死又床上當有一大蛇銜筆大小共視須臾便去又鳥來入室與燕斗燕死鳥去有此三卦王基大惊曰精義之致乃至于此幸為處其吉凶輅曰非有他禍直以官舍久遠魑魅魍魎共為妖耳兒生入灶宋無忌之為也大蛇者老書佐也鳥與燕斗者老鈴下也夫神明之正者非妖能亂也萬物之變非道所止也久遠之浮精必能之定數也今卦中不見其凶故知假托之類非咎妖之征昔高宗之鼎非雉所雊太戊之階非桑所生然而妖并至二年俱興安知三事不為吉祥愿府君安神養道勿恐于神奸也后卒無他遷為安南將軍應璩朱建平善相相應璩曰君年六十二位為常伯先此一年當獨見白狗也璩年六十一為侍中直內省忽見白狗眾人悉不見作急游觀飲宴自娛六十二卒公孫淵魏司馬太傅懿平公孫淵斬淵父子先時淵家有犬著朱幘絳衣襄平城北市生肉有頭目無手足而動搖占者曰有形不成有體無聲其國滅亡諸葛恪諸葛恪為丹陽太守出獵兩山之間有物如小兒伸手欲引人恪令伸之仍引去故地去故地即死既而參佐問其故以為神明恪曰此事在白澤圖內曰兩山之間其精如小兒見人則伸手欲引人名曰俟引去故地則死無謂神明而異之諸君偶未之見耳零陵太守女零陵太守史有女悅書吏乃密使侍婢取吏盥殘水飲之遂有孕十月而生一子及晬太守令抱出門兒匍匐入吏懷吏推之仆地化為水窮問之省前事太守遂以女妻其吏滎陽廖氏滎陽郡有一家姓廖累世為盅以此致富后取新婦不以此語之曾遇家人咸出唯此婦守舍忽見屋中有大缸婦試發之見有大蛇婦乃作湯灌殺之及家人歸婦具白其事舉家惊惋未幾其家疾疫死亡略盡又有沙門曇游戒行清苦時剡縣有一家事盅人啖其食飲無不吐血而死曇游曾詣之主人下食游便咒焉見一雙蜈蚣長尺余于盤中走出游因飽食而歸竟無他陶璜盧王將陶璜掘地于土穴中得一物白色形似蚕長數丈大十圍余蠕蠕而動莫能名剖腹內如豬肪遂以為臞甚香美璜啖一杯于是三軍盡食之臨海異物志云土肉正黑如小兒臂大長五寸中有腸無目有三十足如釵股大者一頭長尺余中肉味又有陽遂虫其背青黑腸下白有五色長短大小皆等不知首尾所在生時體軟死則干脆趙王倫永康初趙王倫篡位京師得一鳥莫能名倫使人持出周旋城邑以問人積日有一小兒見之自言曰鵂鶹即還白倫倫使更求又見之乃將入宮密籠鳥并閉小兒明日視之封閉如故悉不見時倫有目瘤之疾故言鵂鶹倫尋被誅張騁晉大安中江夏功曹張騁乘車周旋牛言曰天下方亂吾甚极為乘我何之騁及從者數人皆惊懼因紿之曰令汝還勿复言乃中道還至家未釋駕牛又言曰歸何也騁益憂懼秘而不言安陸具有善卜者騁從之卜之曰大凶非一家之禍天下將有起兵一郡之內皆破亡乎騁還家牛又人立而行百姓聚觀其秋張昌賊起先略江夏誑曜百姓以漢祚复興有鳳凰之瑞聖人當世從軍者皆絳抹額以彰火德之祥百姓波蕩從亂如歸騁兄弟并為將軍都尉未期而敗于是一郡殘破死傷者半而騁家族矣京房易妖曰牛能言如其言占吉凶懷瑤晉元康中吳郡婁縣懷瑤家聞地中有犬子聲隱隱其聲上有小穿大如蚓懷以杖刺之入數尺覺如有物及掘視之得犬雌雄各一目猶未開形大于常犬也哺之而食左右咸往觀焉長老或云此名犀犬得之者家富昌宜當養活以為目未開還置穿中覆以磨礱宿昔發視左右無孔而失所在瑤家積年無他福禍也裴楷晉裴楷家中炊黍在甑或變為拳或化為血或作蕪菁子未幾而卒衛瓘衛瓘家人炊飯墮地悉化為螺出足而行尋為賈后所誅賈謐賈謐字長淵元康九年六月夜暴雷電謐齋柱陷壓毀床帳飄風吹其服上天數百丈久乃下劉嶠永嘉末有劉嶠居晉陵其兄早亡嫂寡居夜嫂與婢在堂中眠二更中婢忽大哭走往其房云嫂屋中及壁上奇怪不可看劉嶠便持刀然火將婦至見四壁上如人面張目吐舌或虎或龍千變萬形視其面長丈余嫂即亡王敦元帝時王敦在于武昌鈴下儀杖生花如蓮花五六日而萎落干寶曰榮華之盛如狂花之不可久也敦以逆命自死加戮其尸焉王獻王獻失鏡鏡在罌中罌才數寸而鏡尺余以問郭璞曰此乃邪魅所為使燒車轄以擬鏡鏡即出焉劉寵東陽劉寵字道弘居姑熟每夜門庭自有血數斗不知所從來如此三四日后寵為折沖將將軍見遣北征將行而炊飯盡變為虫其家蒸炒亦為虫火愈猛而虫愈壯寵遂北征軍敗于檀丘為徐龕之所殺桓溫府參軍穆帝末年桓溫府參軍夜坐忽見屋梁上有伏兔張目切齒向之兔來轉近以刀砟之見正中兔而實及傷膝流血复以刀重砟又還自傷幸刀不利不至于死郭氏畢修之外祖母郭氏嘗夜獨寢喚婢應而不至郭屢喚猶爾后聞蹋床聲甚重郭厲聲呵婢又應諾諾不至俄見屏風上有一面如方相兩目如升光明一屋手中如簸箕指長數寸又挺動其耳目郭氏道精進一心至念凡物乃去久之婢輩悉來云向欲應如有物鎮壓之者體輕便來
