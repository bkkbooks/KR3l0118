body:
  text: 蔡誕蔡誕蔡誕好道廢家業晝夜誦黃庭太清中經觀天節解之屬謂道盡於此矣其家患之己亦慚悔忽棄家言我仙道成矣因走入深山賣薪以易衣三年不堪苦而還家黑瘦骨立欺家云吾但為地仙位卑為老君牧數十龍有一斑龍五色老君嘗與吾後與仙人博戲輸此龍為此見謫送吾付崑崙下藝鋤芝草三四頃皆生細石中多莽穢甚苦當十年乃得原會偓佺子喬來案行吾首訴之並為吾作力得免也須曼卿蒲坂有須曼卿者曰在山中三年精思有仙人來迎我乘龍升天龍行甚疾頭昂尾低令人在上危怖及到天上先過紫府金牀玉几晃晃昱昱真貴處也仙人以流霞一杯飲我輒不饑渴忽然思家天帝前謁拜失儀見斥來還令更自修責乃可更往昔淮南王劉安升天見上帝而箕坐大言自稱寡人遂見謫守天廁三年吾何人哉河東因號曼卿為斥仙人馬太守興古太守馬氏在官有親故人投之求恤焉馬乃令此人出住外詐云是神人道士治病無不手下立愈又令辨士遊行為之虛聲云能令盲者明躄者即行於是四方雲集赴之如市而錢帛固已山積矣又勑諸來治病者雖不便愈其當告人已愈也如此則必愈也若告人言未愈者則後終不愈也道法正爾不可不承信於是後人問前來者輒告之云已愈無敢言未愈者也旬月之間乃致巨富焉鄴城人北齊後主武平中和士開諷百官奏胡太后臨朝所在皆言有狐魅截人頭髮鄴城北兩三坊無人居住空墻時有某家婢子年十六七獨行荷一大黃襆襆內有錦被忽逢一嫗年可五十餘面作白粧漫糊可畏以皂巾抹頭四顧無人便走逐婢子脫却皂巾頭髮盡作屈髻十餘道綖束之手持一剃刀云我是狐魅汝急捨襆反走此嫗得襆趨走入東坊婢子行啼逢同州人乘馬來借問何為云狐奪我被襆始入東坊人馳馬往執得之蓋是人也數百人看之莫不競笑天下有如此造妖事經略財貨毆擊垂死行路勸放之紇干狐尾並州有人姓紇干好劇承間在外有狐魅遂得一狐尾綴著衣後至妻旁側坐露之其妻私心疑是狐魅遂密持斧欲斫之其人叩頭云我不是魅妻不信走遂至鄰家鄰家又以刀杖逐之其人惶懼告言我戲劇不意專欲殺我此亦妖由人興矣李恆陳留男子李恆家事巫祝邑中之人往往吉凶為驗陳留縣尉陳增妻張氏召李恆恆索於大盆中置水以白紙一張沉於水中使增妻視之增妻正見紙上有一婦人被鬼把頭髻拽又一鬼後把棒驅之增妻惶懼涕泗取錢十千并沿身衣服與恆令作法禳之增至其妻具其事告增增明召恆還以大盆盛水沈一張紙使恆觀之正見紙上有十鬼拽頭把棒驅之題名云此李恆也慚惶走遂却還昨得錢十千及衣服物便潛竄出境衆異而問增曰但以白礬畫紙上沈水中與水同色而白礬乾驗之亦然惠範周有婆羅門僧惠範姦矯狐魅挾邪作蠱趑趄鼠黠左道弄權則天以為聖僧賞賚甚重太平以為梵王接納彌優生其羽翼長其光價孝和臨朝常乘官馬往還宮掖太上登極從以給使出入禁門每入即賜綾羅金銀器物氣岸甚高風神傲誕內府珍寶積在僧家矯說妖祥妄陳禍福神武斬之京師稱快也史崇玄唐道士史崇玄懷河內縣縫靴人也後度為道士矯假人也附太平為太清觀主金仙玉真出俗立為尊師每入內奏請賞賜甚厚無物不賜搜鴻臚卿衣紫羅裙帔握象笏佩魚符出入禁闈公私避路神武斬之京師中士女相賀嶺南淫祀嶺南風俗家有人病先殺雞鵝等以祀之將為修福若不差即刺殺猪狗以祈之不差即次殺太牢以禱之更不差即是命也不復更祈死則打鼓鳴鍾於堂比至葬訖初死但走大叫而哭賀玄景唐景雲中有長髮賀玄景自稱五戒賢者同為妖者十餘人陸渾山中結草舍幻惑愚人子女傾家産事之紿云至心求者必得成佛玄景為金薄袈裟獨坐暗室令愚者竊視云佛放光衆皆懾伏緣於懸崖下燒火遣數人於半崖間披紅碧紗為仙衣隨風習揚令衆觀之誑曰此仙也各令著仙衣以飛就之即得成道剋日設齊飲中置莨菪子與衆餐之女子好髮者截取為剃頭串仙衣臨崖下視眼花恍惚推崖底一時燒殺沒取資財事敗官司來檢灰中得焦拳尸骸數百餘人敕決殺玄景縣官左降瀛州婦人唐景龍中瀛州進一婦人身上隱起浮圖塔廟諸佛形像按察使進之授五品其女婦留內道場逆韋死後不知去處薛懷義周證聖元年薛師名懷義造功德堂一千尺於明堂北其中大像高九百尺鼻如千斛船小指中容數十人並坐夾紵以漆之正月十五起無遮大會於朝堂掘地五丈深以亂綵為宮殿臺閣屈竹為胎張施為楨蓋又為大像金剛並坑中引上詐稱從地湧出又刺牛血畫作大像頭頭高二百尺誑言薛師膝上血作之觀者填城溢郭士女雲會內載錢拋之更相蹈藉老少死者非一至十六日張像於天津橋南設齊二更功德堂火起延及明堂飛焰衝天洛城光如晝日其堂作仍未半已高七十餘尺又延燒金銀庫鐵汁流液平地尺餘人不知錯入者便即焦爛其堂煨燼尺木無遺至曉乃更設會暴風欻起裂血像為數百段浮休子曰梁武帝捨身同泰寺百官傾庫物以贖之其夜欻電霹靂風雨暝晦寺浮圖佛殿一時蕩盡非理之事豈如來本意哉胡僧寶嚴唐景雲中西京霖雨六十餘日有一胡僧名寶嚴自云有術法能止雨設壇場讀經呪其時禁屠宰寶嚴用羊二十口馬兩匹以祭祈請經五十餘日其雨更盛於是斬逐胡僧其雨遂止胡超僧周聖曆年中洪州有胡超僧出家學道隱白鶴山微有法術自云數百歲則天使合長生藥所費巨萬三年乃成自進藥於三陽宮則天服之以為神妙望與彭祖同壽改元為久視元年放超還山賞賜甚厚服藥之後二年而則天崩調猫兒鸚鵡則天時調貓兒鸚鵡同器食命御史彭先覺監遍示百官及天下考使傳看未遍猫兒飢遂咬殺鸚鵡以餐之則天甚愧武者國姓殆不祥之徵也駱賓王唐裴炎為中書令時徐敬業欲反令駱賓王畫計取裴炎同起事賓王足踏壁靜思食頃乃為謠曰一片火兩片火緋衣小兒當殿坐教炎莊上小兒誦之并都下童子皆唱炎乃訪學者令解之召賓王至數啖以寶物錦綺皆不言又賂以音樂妓女駿馬亦不語乃將古忠臣烈士圖共觀之見司馬宣王賓王欻然起曰此英雄丈夫也即說自古大臣執政多移社稷炎大喜賓王曰但不知謠讖何如耳炎以謠言片片火緋衣之事白賓王即下北面而拜曰此真人矣遂與敬業等合謀揚州兵起炎從內應書與敬業等書唯有青鵝字人有告者朝臣莫之能解則天曰此青字者十二月鵝字者我自與也遂誅炎敬業等尋敗馮七姨唐逆韋之妹馮太和之妻號七姨信邪見豹頭枕以辟邪白澤枕以去魅作伏熊枕以為宜男太和死嗣虢王娶之韋之敗也虢王砟七姨頭送朝堂即知辟邪之枕失效矣姜撫先生唐姜撫先生不知何許人也嘗著道士衣冠自云年已數百歲持符兼有長年之藥度世之術時人謂之姜撫先生玄宗皇帝高拱穆清棲神物表常有升仙之言姜撫供奉別承恩澤於諸州採藥及修功德州縣牧宰趨望風塵學道者乞容立於門庭不能得也有荊巖者於太學四十年不第退居嵩少自稱山人頗通南北史知近代人物嘗謁撫撫簡踞不為之動荊巖因進而問曰先生年幾何撫曰公非信士何暇問年幾巖曰先生既不能言甲子先生何朝人也撫曰梁朝人也巖曰梁朝絶近先生亦非長年之人不審先生梁朝出仕為復隱居撫曰吾為西梁州節度巖叱之曰何得誑妄上欺天子下惑世人梁朝在江南何處得西梁州只有四平四安四鎮四征將軍何處得節度使撫慚恨數日而卒
