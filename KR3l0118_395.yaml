body:
  text: 百丈泓百丈泓唐河東郡東南百餘里有積水謂之百丈泓清徹纖毫必鑒在驛路之左槐柳環擁煙影如束途出于此者乃為憩駕之所大和五年夏有徐生自洛陽抵河東至此水困殆既甚因而暫息且吟且望將午忽聞水中有細聲若蠅蚋之噪俄而纖光發其音稍響轟若擊轂其光如索而曳焉生始異之聲久益繁遂有雷自波間起震光為電接云氣至旅次遽話其事答曰此百丈泓也歲旱未嘗不指期而雨今旱且甚吾師命屬官禱焉巫者曰某日當有甚雨果是日矣楊詢美從子唐御史楊詢美居廣陵郡從子數人皆幼始從師學嘗一夕風雨雷電震耀諸子俱出戶望且笑且詈曰我聞雷有鬼不知鬼安在願得而殺之可乎既而雷聲愈震林木傾靡忽一聲轟然若在于廡諸子驚甚即馳入戶負壁而立不敢輒動復聞雷聲若大呵地吼廬舍搖動諸子益懼近食頃雷電方息天月清霽庭有大古槐擊拔其根而劈之諸子覺兩髀痛不可忍具告詢美命家僮執燭視之諸髀咸有赤文橫布十數狀類杖痕似雷鬼之所為也高郵人唐進士鄭翬家在高郵親表盧氏莊近水鄰人數家共殺一白蛇未久忽大震雷雨發數家陷溺無遺盧宅當中唯一家無恙王忠政唐泗州門監王忠政云開城中曾死十二日卻活始見一人碧衣赤幘引臂登云曰天召汝行汝隸于左落隊其左右落隊各有五萬甲馬簇于云頭偏向下重樓深室囊櫃之內纖細悉見更異者見米粒長數尺凡兩隊一隊于小項瓶子貯人間水一隊所貯如馬牙硝謂之乾雨皆在前風車為殿每雷震多為捉龍龍有過者謫作蛇魚數滿千則能淪山行雨時先下一黃旗次下四方旗乃隨龍所在或霆或雷或雨或雹若吾傷一物則刑以鐵杖忠政役十一日始服湯三甌不復饑困以母老哀求得歸史無畏唐史無畏曹州人也與張從真為友無畏止耕畝衣食窘困從真家富乃謂曰弟勤苦田園日夕區區奉假千緡貨易他日但歸吾本無畏欣然繼緡父子江淮射利不數歲已富從真繼遭焚熱及罹劫盜生計一空遂詣無畏曰今日之困不思弟千緡之報可相濟三二百乎聞從真言輒為拒扜報曰若言有負但執券來從真恨怨填臆乃歸庭中焚香泣淚詛之言詞慷慨聞者戰慓午后東西有片黑云驟起須臾霪雨雷電兼至霹靂一震無畏遽變為牛朱書腹下云負心人史無畏經旬而卒刺史圖其事而奉奏焉張應唐張應自滎陽被命至河內郡涉九鼎渡所乘小駟驚逸及北岸視后足有物縈繞狀如大蚓絳色乃抽佩刀斷于地輒復相續堅縮如白色角櫛紅影若縷橫絡之遂置諸囊中事畢而還復渡河至平陰天景歊蒸憩于園井就之盥濯因與園叟話之取角櫛置盆水上忽然黑氣勃興濃云四合狂電震霆雨雹交下食頃方霽盆涸而櫛已亡天公壇巴蜀間于高山頂或潔地建天公壇祈水旱蓋開元中上帝所降儀法以示人也其壇或羊牛所犯及預齊者飲酒食肉多為震死新繁人王蕘因往別業村民烹豚待之有一自天公齊回乃即席食肉王謂曰爾不懼雷霆耶曰我與雷為兄弟何懼之有王異之乃詰其所謂曰我受雷公菉與雷同職因取其菉驗之果如其說仍有數卷或畫壯夫以拳扡地為井號拳扡井或畫一士負薪蘗號一谷柴或以七手撮山箕之號七山箕江陵東村李道士舍亦有此菉或云三洞法箕外有一百二法為天師子嗣師所禁唯許救物苟邪用必上帝考責陰誅也申文緯尉氏尉申文緯嘗話頃以事至洛城南玉泉寺時盛夏寺左有池大旱村人祈禱未嘗不應池之陽有龍廟時文緯俯池而觀有物如敗花葉大如蓋因以瓦礫擲之僧曰切不可恐致風雷之怒申亦不以介意逡巡白霧自水面起才及山趾寺在山上石路七盤大雨霆雷震擊比至平地已數尺溪壑暴漲驢乘洎仆夫隨流漂蕩莫能植足晝日如暮霆震不已申之口吻皆黑怖懼非常俄至一村尋亦開霽果中傷寒病將曉有微汗比明無恙豈龍之怒幾為所斃也法門寺長安西法門寺乃中國伽藍之勝境也如來中指節在焉照臨之內奉佛之人罔不歸敬殿宇之盛寰海無倫僖昭播遷后為賊盜毀之中原蕩櫛人力既殫不能復構最須者材之與石忽一夕風雷驟起暴澍連宵平曉諸僧窺望見寺前良材巨石阜堆山積亙十余里首尾不斷有如人力置之于是鳩集民匠復構精藍至于貌備人謂鬼神送來愈更欽其聖力育王化塔之事豈虛也哉陳絢僞蜀王氏彭王傅陳絢常為邛州臨溪令縣署編竹為藩而涂之署久泥忽陊落唯露其竹侍婢秉炬而照一物蟠于竹節中文彩爛然小蛇也俄而雷聲隱隱絢疑其乖龍懼罹震厄乃易衣炷香抗聲祈于雷曰苟取龍幸無急遽雖狂電若晝自初夜逮四更隱隱不發既發一聲俄然開霽向物已失人無震驚有若雷神佑乎懇禱彭城佛寺國某楊汀自言天祐初在彭城避暑于佛寺雨雹方甚忽聞大聲震地走視門外乃下一大雹于街中其高廣與寺樓等入地可丈余頃之雨止則炎風赫日經月雹乃消盡歐陽氏廣陵孔目吏歐陽某者居決定寺之前其妻少遇亂失其父母至是有老父詣門使白其妻我汝父也妻見其貧陋不悅拒絶之父又言其名字及中外親族甚悉妻竟不聽又曰吾自遠來今無所歸矣若爾權寄門下信宿可乎妻又不從其夫勸之又不可父乃去曰吾將訟爾矣左右以為公訟耳亦不介意明日午暴風雨從南方來有震霆入歐陽氏之居牽其妻至中庭擊殺之大水平地數尺鄰里皆震蕩不自持后數日歐陽之人至后土廟神座前得一書即老父訟女文也廬山賣油者養其母甚孝謹為暴雷震死其母自以無罪日號泣于九天使者之祠願知其故一夕夢朱衣人告曰汝子恆以魚膏雜油中以圖厚利且廟中齊醮恆用此油腥氣薰蒸靈仙不降震死宜矣母知其事遂止李誠江南軍使蘇建雄有別墅在毗陵恆使傔人李誠來往檢視乙卯歲六月誠自墅中回至句容縣西時盛暑赫日持傘自覆忽值大風飛石拔木卷其傘蓋而去唯持傘柄行數十步云雨大至方憂濡濕忽有飄席至其所因取覆之俄而雷震地道傍數家之中卷一家屋室向東北而去頃之遂霽其居蕩然無復遺者老幼十余皆聚桑林中一無所傷舍前有足跡長三尺誠又西行數里遇一人求買所覆席即與之又里余復遇一人求買所持傘柄誠乃異之曰此物無用爾何為者而買之其人但求乞甚切終不言其故隨行數百步與之乃去茅山牛庚寅歲茅山有村中兒牧牛洗所著汗衫暴于草上而假寐及寤失之唯一鄰兒在傍以為竊去因相喧競鄰兒父見之怒曰生兒為盜將安用之即投水中鄰兒匍匐出水呼天稱冤者數四復欲投之俄而雷雨暴至震死其牛汗衫自牛口中嘔出兒乃得免番禺村女庚申歲番禺村中有老姥與其女餉田忽云雨晦冥及霽乃失其女姥號哭求訪鄰里相與尋之不能得后月余復云雨晝晦及霽而庭中陳列筵席有鹿脯乾魚果實酒醢甚丰潔其女盛服而至姥驚喜持之女自言為雷師所娶將至一石室中親族甚衆婚姻之禮一同人間今使歸返回他日不可再歸矣姥問雷朗可得見耶曰不可留數宿一夕復風雨晦冥遂不復見江西村嫗江西村中霆震一老婦為電火所燒一臂盡傷既而空中有呼曰誤矣即墜一瓶瓶有藥如膏曰以此傅之即差如其言隨傅而愈家人共議此神藥也將取藏之數人共舉其瓶不能動頃之復有雷雨收之而去又有村人震死既而空中呼曰誤矣可取蚯蚓爛搗覆臍中當差如言傅之遂蘇甘露寺道士范可保夏月獨游浙西甘露寺出殿后門將登北軒忽有人衣故褐衣自其傍入肩帔相拂范素好潔衣服新心不悅俄而牽一黃狗又駕肩而出范怒形于色褐衣回顧張目其光如電范始畏懼頃之山下人至曰向山下霹靂取龍不知之乎范故不聞也南康縣辛酉五月四日有使過南康縣令胡侃置酒于縣南蓮花館水軒忽有暴風吹沙從南來因手掩目聞盤中器物蔌蔌有聲若有物過良久開目見食器微仄其銀酒杯與杯之舟皆挾長如東西形壁旁大桐樹亦拔出牆外時一里外皆此風雨常遙聞館中迅雷而館中初不聞也胡亦無恙
