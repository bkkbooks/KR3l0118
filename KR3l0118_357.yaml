body:
  text: 東洛張生東洛張生牛僧孺任伊闕縣尉有東洛客張生應進士舉攜文往謁至中路遇暴雨雷雹日已昏黑去店尚遠歇于樹下逡巡雨定微月遂解鞍放馬張生與僮仆宿于路側困倦甚昏睡良久方覺見一物如夜叉長數丈拿食張生之馬張生懼甚伏于草中不敢動讒訖又取其驢驢將盡遽以手拽其從奴提兩足裂之張生惶駭遂狼狽走野叉隨后叫呼詬罵里余漸不聞路抵大冢冢畔有一女立張生連呼救命女人問之具言事女人曰此是古冢內空無物后有一孔郎君且避之不然不免矣張生遂尋冢孔投身而入內至深良久亦不聞聲須臾覺月轉明忽聞冢上有人語推一物便聞血腥氣視之乃死人也身首皆異矣少頃又推一人至于數四皆死者也既訖聞其上分錢物衣服聲乃知是劫賊其帥且唱曰某色物與某乙某衣某錢與某乙都唱十余人姓名又有言不平相怨怒者乃各罷去張生恐懼甚將出復不得乃熟念其賊姓名記得五六人至明鄉村有尋賊者至墓旁睹其血乃圍墓掘之睹賊所殺人皆在其內見生驚曰兼有一賊墮于墓中乃持出縛之張生具言其事皆不信曰此是劫賊殺人送于此偶墮下耳笞擊數十乃送于縣行一二里見其從奴驢馬鞍馱悉至張生驚問曰何也從者曰昨夜困甚于路旁睡著至明不見郎君故此尋求張生乃説所見從者曰皆不覺也遂送至縣牛公先識之知必無此乃為保明張生又記劫賊數人姓名言之于令令遣撲捉盡獲之遂得免究其意乃神物冤魄假手于張生以擒賊耳薛淙前進士薛淙元和中遊衛州界村中古精舍日暮欲宿與數人同訪主人僧主人僧會不在唯聞庫西黑室中呻吟聲迫而視見一老僧病須發不剪如雪狀貌可恐淙乃呼其侶曰異哉病僧僧怒曰何異耶少年豫要聞異乎病僧略為言之淙等曰唯唯乃曰病僧年二十時好遊絶國服藥休糧北至居延去海三五十里是日平明病僧已行十數里日欲出忽見一枯立木長三百餘丈數十圍而其中空心僧因根下窺之直上其明通天可容人病僧又北行數里遙見一女人衣緋裙跣足袒膊被發而走其疾如風漸近女人謂僧曰救命可乎對曰何也云后有人覓但言不見恩至極矣須臾遂入枯木中僧更行三五里忽見一人乘甲馬衣黃金衣備弓劍之器奔跳如電每步可三十余丈或在空或在地步驟如一至僧前曰見某色人否僧曰不見又曰勿藏此非人乃飛天夜叉也其黨數千相繼諸天傷人已八十萬矣今已并擒戮唯此乃尤者也未獲昨夜三奉天帝命自沙吒天逐來至此已八萬四千里矣如某之使八千人散捉此乃獲罪于天師無庇之爾僧乃具言須臾便至枯木所僧返步以觀之天使下馬入木窺之卻上馬騰空繞木而上人馬可半木已來見木上一緋點走出人馬逐之去七八丈許漸入霄漢沒于空碧中久之雨三數十點血意已為中矢矣此可以為異少年以病僧為異無乃陋乎丘濡博士丘濡説汝州傍縣五十年前村人失其女數歲忽自歸言初被物寐中牽去倏止一處及明乃在古塔中見美丈夫謂曰我天人分合得汝為妻自有年限勿生疑懼且誡其不窺外也日兩返下取食有時炙餌猶熱經年女伺其去竊窺之見其騰空如飛火發藍膚磔耳如驢至地乃復人焉女驚怖汗洽其物返覺曰爾固窺我我實夜叉與爾有緣終不害爾女素慧謝曰我既為君妻豈有惡乎君既靈異何不居人間使我時見父母乎其物言我罪業或與人雜處則疫作今形迹已露任爾縱觀不久當歸爾也其塔去人居止甚近女常下視其物在空中不能化形至地方與人雜或有白衣塵中者其物斂手則避或見枕其頭唾其面者行人悉若不見及歸女問之向者君街中有敬之者有戲狎之者何也物笑曰世有吃牛肉者豫得而欺矣遇忠直孝養釋道守戒律法録者吾誤犯之當為天戮又經年忽悲泣語女緣已盡候風雨送爾歸因授一青石大如雞卵言至家可磨此服之能下毒氣后一夕風雷其物遽持女曰可去矣如釋氏言屈伸臂頃已至其家墜在庭中其母因磨石飲之下物如青泥斗余陳越石穎州陳越石初名黃石郊居于王屋山中有妾張氏者元和中越石與張氏俱夜食忽聞燭影后有呼吸之聲甚異已而出一手至越石前其手青黑色指短爪甲纖長有黃毛連臂似乞食之狀越石深知其怪惡而且懼久之聞燭影下有語我病飢故來奉謁願以少肉致掌中幸無見阻越石即以少肉投于地其手即取之而去又曰此肉味甚美食訖又出手越石前越石怒罵曰妖鬼何為輒來宜疾去不然且擊之得無悔耶其手即引去若有所懼俄頃又出其手至張氏前謂張曰女郎能以少肉見惠乎越石謂張氏曰慎無與張氏竟不與久之忽于燭影旁出一面乃一夜叉也赤發蓬然兩目如電四牙若鋒刃之狀甚可懼以手擊張氏遽仆于地冥然不能動越石有膽勇即起而逐之夜叉遂走不敢回視明日窮其迹于垣上有過蹤越石曰此物今夕將再來矣于是至夜持杖立東北垣下以伺之僅食頃夜叉果來既逾牆足未及地越石即以杖連擊數十及夜叉去以燭視其垣下血甚多有皮尺余亦在地蓋擊而墮者自是張氏病愈至夕聞數里外有呼者曰陳黃石何為不歸我皮也連呼不止僅月余每夕嘗聞呼聲越石度不可禁且惡其見呼于是遷居以避之因改名為越石元和十五年登第進士至會昌二年卒于藍田令張融渤海張融字眉嵎晉咸寧中子婦産男初不覺有異至七歲聰慧過人融曾將看射令人拾箭還恆苦遲融孫云自為公取也后射才發便赴遂與箭俱至棚倏已捉矢而歸舉坐怪愕還經再宿孫忽暴病而卒將殯呼諸沙門燒香有一胡道人謂云君速斂此孫是羅剎鬼也當啖害人家既見取箭之事即狼狽闔棺須臾聞棺中有撲擺聲咸輟悲駭愕遽送葬埋后數形見融作八關齋于是便去蘊都師經行寺僧行蘊為其寺都僧嘗及初秋將備盂蘭會灑掃堂殿齊整佛事見一佛前化生姿容妖冶手持蓮花向人似有意師因戲謂所使家人曰世間女人有似此者我以為婦其夕歸院夜未分有款扉者曰蓮花娘子來蘊都師不知悟也即應曰官家法禁極嚴今寺門已閉夫人何從至此既開門蓮花及一從婢妖姿麗質妙絶無倫謂蘊都師曰多種中無量勝因常得親奉大圓正智不謂今日聞師一言忽生俗想今已謫為人當奉執巾鉢朝來之意豈遽忘耶蘊都師曰某信愚昧常獲僧戒素非省相識何嘗見夫人遂相紿也即日師朝來佛前見我謂家人曰倘貌類我將以為婦言猶在耳我感師此言誠願委質因自袖中出化生曰豈相紿乎蘊師悟非人回惶之際蓮花即顧侍婢曰露仙可備帷幄露仙乃陳設寢處皆極華美蘊雖駭異然心亦喜之謂蓮花曰某便誓心矣但以僧法不容久居寺舍如何蓮花大笑曰某天人豈凡識所及且終不以纍師遂綢繆敘語詞氣清婉俄而滅燭童子等猶潛聽伺之未食頃忽聞蘊失聲冤楚頗極遽引燎照之至則拒戶闥禁不可發但聞狺牙嚙垢嚼骨之聲如胡人語音而大罵曰賊禿奴遣爾辭家剃發因何起妄想之心假如我真女人豈嫁與爾作婦耶于是馳告寺衆壞垣以窺之乃二夜叉也鋸牙植發長比巨人哮叫拿獲騰踔而出后僧見佛座壁上有二畫夜叉正類所睹唇吻間猶有血痕焉
