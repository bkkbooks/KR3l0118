body:
  text: 楊居士海南明鈔本海南作南海郡有楊居士亡其名以居士自目往往遊南海枝郡常寄食於人亦不知其所止謂人曰我有奇術汝輩庸人固不得而識矣後常至郡會太守好奇者聞居士來甚喜且厚其禮命飲之每宴遊未嘗不首召居士居士亦以此自負一日使酒忤太守太守不能容後又會宴於郡室閲妓樂而居士不得預時有數客亦不在太守召中因謂居士曰先生嘗自負有奇術某向者仰望之不暇一日遇先生於此誠幸矣雖然今聞太守大宴客郡齊而先生不得預其問即不能設一奇術以動之乎必先生果無奇術耶居士笑曰此末術耳君試觀我我為君召其妓可以佐酒皆曰願為之居士因命具酒使諸客環席而坐又命小童閉西廡空室久之乃啓之有三四美人自廡下來裝飾華煥攜樂而至居士曰某之術何如諸客人大異之殆不可測乃命列坐奏樂且歌客或訊其術居士但笑而不答時昏晦至夜分居士謂諸妓曰可歸矣于是皆起入西廡下空室中客相目駭歎然尚疑其鬼物妖惑明日有郡中吏曰太守昨夕宴郡閣妓樂列坐無何皆仆地瞬息暴風起飄其樂器而去逮至夜分諸妓方寤樂器亦歸于舊所太守質問衆妓皆云黑無所見竟不窮其由諸客皆大驚因盡以事對或告於太守太守歎異即謝而遣之不敢留于郡中時開成初也出宣室志張士平唐壽州刺史張士平中年以來夫婦俱患瞽疾歷求方術不能致遂退居別墅杜門自責唯禱醮星辰以祈神之佑年久家業漸虛精誠不退元和七年壬辰八月十七日有書生詣門請謁家人曰主公夫婦抱疾不接賓客久矣書生曰吾雖書生亦攻醫術聞使君有疾故來此耳家人入白士平士平欣然曰久病不接賓客脫有方藥願垂相救書生曰但一見使君自有良藥士平聞之扶疾相見謂使君曰此疾不假藥餌明日倩丁夫十人鍬鍤之屬為開一井眼當自然立愈如其言而備焉書生即選聖地自晨穿井至夕見水士平眼疾頓輕及得新水洗目即時明淨平復如初十年之疾一旦豁然夫妻感而謝之厚遺金帛書生曰吾非世間人太白星官也以子抱疾數年不忘於道精心禱醮上感星辰五帝星君使我降受此術以祛重疾答子修奉之心金帛之遺非吾所要也因留此法令轉教世人以救疾苦用增陰德其要以子午之年五月戌酉十一月卯辰為吉丑未之年六月戌亥十一月辰巳寅申之年七月亥子正月巳午卯酉之年八月子丑二月午未辰戌之年九月申未三月寅丑巳亥之年十月申酉四月寅卯取其方位年月日時即為福地浚井及泉必有良效矣士平再拜受之言訖升天而去出神仙感遇傳馮漸河東馮漸名家子以明經入仕性與俗背後棄官隱居伊水上有道士李君以道術聞尤善視鬼朝士皆慕其能李君後退歸汝穎適遇漸於伊洛間知漸有奇術甚重之大曆中有博陵崔公者與李君為僚甚善李君寓書於崔曰當今制鬼無過漸耳是時朝士咸知漸有神術數往往道其名別後長安中人率以漸字題其門者蓋用此也出宣室志潘老人嵩山少林寺元和中常因風歇有一老人杖策扣門求宿寺人以關門訖更不可開乃指寺外空室二間請自止宿亦無床席老人即入屋二更後僧人因起忽見寺門外大明怪而視之見老人所宿屋內設茵褥翠幕異常華盛又見陳到殽饌老人飲噉自若左右亦無僕從訝其所以又不敢開門省問俱衆伺之至五更後老人睡起自盥洗訖懷中取一葫蘆子大如拳遂取床席帳幕凡是用度悉納其中無所不受收訖以葫蘆子內懷中空屋如故寺僧駭異開門相與謁問老人辭謝而已僧固留之住問其姓名云姓潘氏從南嶽北遊太原其後時有見者出原化記王先生有王先生者家于烏江上隱其跡由是里人不能辨或以為妖妄一日里中火起延燒廬舍生即往視之厲聲呼曰火且止火且止於是火滅里人始奇之長慶中有弘農楊晦之自長安東遊吳楚行至烏江聞先生高躅就門往謁先生戴玄綃巾衣褐衣隱几而坐風骨清美晦之再拜備禮先生拱揖而已命晦之坐其側其議論玄暢迥出意表晦之愈健慕於是留宿是日乃八月十二日也先生召其女七娘者乃一老嫗也年七十餘髮盡白扶杖而來先生謂晦之曰此我女也惰而不好道今且老矣既而謂七娘曰汝為吾刻紙狀今夕之月置於室東垣上有頃七娘以紙月施於垣上夕有奇光自發洞照一室纖毫盡辨晦之驚歎不測及曉將去先生以杖擊之畢俄有塵起天地盡晦久之塵斂視其庭則懸崖峻險山谷重疊前有積石盡目晦之悸然背汗毛髮豎立先生曰陵谷速遷吾子安所歸乎晦之益恐灑泣言曰誠不知一旦有桑田之變豈仙都瞬息而塵世已千歲乎先生笑曰子無懼也所以為娛耳於是持篲掃其庭又有塵起有頃塵斂門庭如舊晦之喜即馳馬而去出宣室志一說唐長慶初山人楊隱之在郴州常尋訪道者有唐居士土人謂百歲人楊謁之因留楊宿及夜呼其女曰可將一箇弦月子來其女遂帖月於壁上如片紙耳唐即起祝之曰今夕有客可賜光明言訖室朗若張燭出酉陽雜俎周生唐太和中有周生者廬於洞庭山時以道術濟吳楚人多敬之後將抵洛穀之間途次廣陵舍佛寺中會有三四客皆來時方中秋其夕霽月澄瑩且吟且望有說開元時明皇帝遊月宮事因相與歎曰吾輩塵人固不得至其所矣奈何周生笑曰某常學於師亦得焉且能挈月致之懷袂子信乎或患其妄或喜其奇生曰吾不為明則妄矣因命虛一室翳四垣不使有纖隙又命以筯數百呼其僮繩而架之且告客曰我將梯此取月去聞呼可來觀乃閉戶久之數客步庭中且伺焉忽覺天地曛晦仰而視之即又無纖雲俄聞生呼曰某至矣因開其室生曰月在某衣中耳請客觀焉因以舉之其衣中出月寸許忽一室盡明寒逼肌骨生曰子不信我今信乎客再拜謝之願收其光因又閉戶其外尚昏晦食頃方如初出宣室志韓志和韓志和者本倭國人也中國為飛龍衛士善雕木為鸞鶴鳥鵲之形置機捩于腹中發之則飛高三二百尺數百步外方始卻下又作龍床為御榻足一履之則鱗鬣爪角皆動夭矯如生又於唐憲皇前出蠅虎子五六十頭分立隊令舞梁州曲皆中曲度致詞時殷殷有聲曲畢則纍纍而退若有尊卑等級焉帝大悅賜金帛加等志和一出宮門盡施散他人後忽失之出仙傳拾遺張辭咸通初有進士張辭下第後多遊淮海間頗有道術常養氣絶粒好酒耽棊鄙人以爐火藥術為事一旦覩之乃大哂命筆題其壁云爭那金烏何頭上飛不住紅爐漫燒藥玉顏安可駐今年花發枝明年葉落樹不如且飲酒朝暮復朝暮人咸異之性不喜裝飾多歷旗亭好酒故也或人召飲若合意則索紙剪蛺蝶二三十枚以氣吹之成列而飛如此纍刻以指收之俄皆在手見者求之即以他事為阻嘗遊監城多為酒困非類輩欲乘其酒而試之相競較力邑令偶見繫之既醒乃課述德陳情詩二律以獻令令乃立釋之所記一篇云門風常有蕙蘭馨鼎族家傳霸國名容貌靜懸秋月彩文章高振海濤聲訟堂無事調琴軫郡閣何妨醉玉觥今日東漸音尖橋下水一條從此鎮常清自後邑宰多張之才次求其道日夕延接欲傳其術張以明府勳貴家流年少而宰劇邑多聲色狗馬之求未暇志味玄奧因贈詩以開其意云何用梯媒向外求長生只合內中修莫言大道人難得自是行心不到頭他日將欲離去乃書琴堂而別後人多云江南上升初去日乘酒醉因求片楮剪二鶴於廳前以水噀之俄而翔翥乃曰汝可先去吾即後來時邑令亦醉不暇拘留張遂得去其所題云張辭張辭自不會天下經書在腹內身即騰騰處世間心即逍遙出天外至今為江淮好事者所說出桂苑叢談崔言崔言者隸職於左親騎軍一旦得疾而目昏暗咫尺不辨人物眉髮自落鼻梁崩倒肌膚生瘡如疥皆目為惡疾勢不可救因為駱谷子午歸寨使遇一道流自谷中出不言姓名受其方曰皂莢刺採一二升燒之為灰大黃九蒸九曝杵之為末食上濃煎大黃湯以末七調而服之旬日鬚髮再生肌膚充潤所疾頓愈眼明倍於尋常道流傳此方訖卻入山去不知所之出神仙感遇傳
