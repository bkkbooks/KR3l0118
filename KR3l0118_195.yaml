body:
  text: 紅線紅線唐潞州節度使薛嵩家青衣紅線者善彈阮咸又通經史嵩乃俾掌其箋表號曰內記室時軍中大宴紅線謂嵩曰羯鼓之聲頗甚悲切其擊者必有事也嵩素曉音律曰如汝所言乃召而問之云某妻昨夜身亡不敢求假嵩遽放歸是時至德之後兩河未寧以淦陽為鎮命嵩固守控壓山東殺傷之餘軍府草創朝廷命嵩遣女嫁魏博節度使田承嗣男又遣嵩男娶滑亳節度使令狐章女三鎮交為姻婭使使日浹往來而田承嗣常患肺氣遇熱增劇每曰我若移鎮山東納其涼冷可以延數年之命乃募軍中武勇十倍者得三千人號外宅男而厚其恤養常令三百人夜直州宅卜選良日將併潞州嵩聞之日夜憂悶咄咄自語計無所出時夜漏將傳轅門已閉杖策庭際唯紅線從焉紅線曰主自一月不遑寢食意有所屬豈非鄰境乎嵩曰事繫安危非爾能料紅線曰某誠賤品亦能解主憂者嵩聞其語異乃曰我知汝是異人我暗昧也遂具告其事曰我承祖父遺業受國家重恩一旦失其疆土即數百年勳伐盡矣紅線曰此易與耳不足勞主憂焉暫放某一到魏城觀其形勢覘其有無今一更首途二更可以復命請先定一起馬使具寒喧書其他即待某却回也嵩曰然事或不濟反速其禍又如之何紅線曰某之此行無不濟也乃入闈房飭其行具乃梳烏蠻髻貫金雀叉衣紫繡短袍繫青絲輕履胸前佩龍文匕首額上書太一神名再拜而行倏忽不見嵩乃返身閉戶背燭危坐常時飲酒不過數合是夕舉觴十餘不醉忽聞曉角吟風一葉墜露驚而起問即紅線回矣嵩喜而慰勞曰事諧否紅線曰不敢辱命又問曰無傷殺否曰不至是但取牀頭金合為信耳紅線曰某子夜前二刻即達魏城凡歷數門遂及寢所聞外宅兒止於房廊睡聲雷動見中軍士卒徒步於庭傳叫風生乃發其左扉抵其寢帳田親家翁止於帳內鼓跌酣眠頭枕文犀髻包黃彀枕前露一星劍劍前仰開一金合合內書生身甲子與北斗神名復以名香美珠散覆其上然則揚威玉帳坦其心豁於生前熟寢蘭堂不覺命懸於手下寧勞擒縱只益傷嗟時則蠟炬煙微爐香燼委侍人四布兵器交羅或頭觸屏風鼾而嚲者或手持巾拂寢而伸者某乃拔其簪珥縻其襦裳如病如醒皆不能寤遂持金合以歸出魏城西門將行二百里見銅臺高揭漳水東流晨雞動野斜月在林忿往喜還頓忘於行役感知酬德聊副於依歸所以當夜漏三時往返七百里入危邦一道經過五六城冀減主憂敢言其苦嵩乃發使入魏遺田承嗣書曰昨夜有客從魏中來云自元帥牀頭獲一金合不敢留駐謹却封納專使星馳夜半方到見搜捕金合一軍憂疑使者以馬箠撾門非時請見承嗣遽出使者乃以金合授之捧承之時驚怛絶倒遂留使者止於宅中狎以宴私多其賜賚明日專遣使齎帛三萬匹名馬二百匹雜珍異等以獻於嵩曰某之首領繫在恩私便宜知過自新不復更貽伊戚專膺指使敢議親姻彼按甘澤謠彼作役當捧轂後車來在麾鞭前馬所置紀綱外宅兒者本防他盜亦非異圖今並脫其甲裳放歸田畝矣由是一兩箇月內河北河南信使交至忽一日紅線辭去嵩曰汝生我家今欲安往又方賴於汝豈可議行紅線曰某前本男子遊學江湖間讀神農藥書而救世人災患時里有孕婦忽患蠱癥某以芫花酒下之婦人與腹中二子俱斃是某一舉殺其三人陰力見誅降為女子使身居賤隸氣稟凡俚幸生於公家今十九年矣身厭羅綺口窮甘鮮寵待有加榮亦甚矣況國家建極慶且無疆此即違天理當盡弭昨往魏邦以是報思今兩地保其城池萬人全其性命使亂臣知懼烈士謀安在某一婦人功亦不小固可贖其前罪還其本形便當遁跡塵中棲心物外澄清一氣生死長存嵩曰不然以千金為居山之所紅線曰事關來世安可預謀嵩知不可留乃廣為餞別悉集賓友夜宴中堂嵩以歌送紅線酒請座客冷朝陽為詞詞曰採菱歌怨木蘭舟送客魂消百尺樓還似洛妃乘霧去碧天無際水空流歌竟嵩不勝其悲紅線拜且泣因僞醉離席遂亡所在出甘澤謠胡證唐尚書胡證質狀魁偉膂力絶人與晉公裴度同年常狎遊為兩軍力人十許輩凌轢勢甚危窘度潛遣一介求教於證證衣皂貂金帶突門而入諸力士睨之失色證飲後到酒一舉三鍾不啻數升杯盤無餘瀝逡巡主人上燈證起取鐵燈臺摘去枝葉而合跗橫置膝上謂衆人曰鄙夫請非次改令凡三鍾引滿一遍三臺酒須盡仍不得有滴瀝犯令者一鐵躋自謂燈臺證復一舉三鍾次及一角抵者三臺三遍酒未能盡淋漓殆至並座證舉躋將擊之衆惡皆起設拜叩頭乞命呼為神人證曰鼠輩敢爾乞今赦汝破命叱之令出出托言馮燕唐馮燕者魏豪人父祖無聞名燕少以意氣任俠專為擊毬鬥雞戲魏市有爭財毆者燕聞之搏殺不平遂沈匿田間官捕急遂亡滑益與滑軍中少年雞毬相得時相國賈耽鎮滑知燕材留屬軍中他日出行里中見戶旁婦人翳袖而望者色甚冶使人熟其意遂室之其夫滑將張嬰從其類飲燕因得間復偃寢中拒寢戶嬰還妻開戶納嬰以裾蔽燕燕卑蹐步就蔽轉匿戶扇後而巾墮枕下與佩刀近嬰醉目瞑燕指巾令其妻取妻即以刀授燕燕熟視斷其頸遂巾而去明旦嬰起見妻殺死愕然欲出自白嬰鄰以為真嬰殺留縛之趣告妻黨皆來曰常嫉毆吾女乃誣以過失今復賊殺之矣安得他事即他殺而得獨存耶共持嬰石餘笞遂不能言官收繫殺人罪莫有辨者彊伏其辜司法官與小吏持朴者數十人將嬰就市看者團圍千餘人有一人排看者來呼曰且無令不辜死者吾竊其妻而又殺之當繫我吏執自言人乃燕也與燕俱見耽盡以狀對耽乃狀聞請歸其印以贖燕死上誼之下詔凡滑城死罪者皆免出沈亞之馮燕傳京西店老人唐韋行規自言少時遊京西暮止店中更欲前進店有老人方工作謂曰客勿夜行此中多盜韋曰某留心弧矢無所患也因行數十里天黑有人起草中尾之韋叱不應連發矢中之復不退矢盡韋懼奔焉有頃風雷總至韋下馬負一大樹見空中有電光相逐如鞫杖勢漸逼樹杪覺物紛紛墜其前韋視之乃木札也須臾積扎埋至膝韋驚懼投弓矢仰空中乞命拜數十電光漸高而滅風雷亦息韋顧大樹枝幹盡矣鞍馱已失遂返前店見老人方箍桶韋意其異人也拜而且謝老人笑曰客勿恃弓矢須知劍術引韋入後院指鞍馱言却領取聊相試耳又出桶板一片昨夜之箭悉中其上韋請役力承事不許微露擊劍事韋也得一二焉出酉陽雜俎蘭陵老人唐黎幹為京兆尹時曲江塗龍祈雨觀者數千黎至獨有老人植杖不避幹怒杖之如擊鞔革掉臂而去黎疑其非常人命坊老卒尋之至蘭陵里之南入小門大言曰我困辱甚可具湯也坊卒遽返白黎黎大懼因衣壞服與坊卒至其處時已昏黑坊卒直入通黎之官閥黎唯而趨入拜伏曰向迷丈人物色罪當十死老人驚曰誰引尹來此即牽上階黎知可以理奪徐曰某為京尹尹威稍損則失官政丈人埋形雜迹非證惠眼不能知也若以此罪人是釣人以名則非義士之心也老人笑曰老夫過乃具酒設席於地招坊卒令坐夜深語及養生言約理辨黎轉敬懼因曰老夫有一技請為尹設遂入良久紫衣朱擁劍長短七口舞於中庭迭躍揮霍𢱧光電激或橫若製帛旋若規火有短劍二尺餘時時及黎之袵黎叩頭股栗食頃擲劍於地如北斗狀顧黎曰向試尹膽氣黎拜曰今日已後性命丈人所賜乞役左右老人曰尹骨相無道氣非可遽授別日更相顧也揖黎而入黎歸氣色如病臨鏡方覺鬚刜落寸餘翌日復往室已空矣出酉陽雜俎盧生唐元和中江淮有唐山人者涉獵史傳好道常居名山自言善縮錫頗有師之者後於楚州逆旅遇一盧生意氣相合盧亦語及爐火稱唐族乃外氏遂呼唐為舅唐不能相捨因邀同之南嶽盧亦言親故在陽羡將訪之今且貪舅山林之程也中途止一蘭若夜半語笑方酣盧曰知舅善縮錫可以梗概論之唐笑曰某數十年重跡從師祗得此術豈可輕道也盧復祈之不已唐辭以師授有時日可達嶽中相傳盧因作色舅今夕須傳勿等間也唐責之某與公風馬牛耳不意盱眙相遇實慕君子何至騶卒不落也盧攘臂瞋目盻之良久曰某刺客也如不得舅將死於此因懷中探鳥韋囊出匕首刃勢如偃月執火前尉㪷削之如扎唐恐懼具述盧乃笑語唐曰幾誤殺舅此術十得五六方謝曰某師仙也令某等十人索天下妄傳黃白術者殺之至添金縮錫傳者亦死某久得乘蹻之道者因拱揖唐忽失所在唐自後遇道流輒陳此事戒之出酉陽雜俎義俠頃有仕人為畿尉常任賊曹有一賊繫械獄未具此官獨坐廳上忽告曰某非賊頗非常輩公若脫我之罪奉報有日此公視狀貌不群詞采挺拔意已許之佯為不諾夜後密呼獄吏放之仍令獄吏逃竄既明獄中失囚獄吏又走府司譴罰而已後官滿數年客遊亦甚羈旅至一縣忽聞縣令與所放囚姓名同往謁之令通姓字此宰驚懼遂出迎拜即所放者也因留廳中與對榻而寢歡洽旬餘其宰不入宅忽一日歸宅此客遂如廁廁與令宅唯隔一墻客於廁室聞宰妻問曰公有何客經于十日不入宰曰某得此人大恩性命昔在他手乃至今日未知何報妻曰公豈不聞大恩不報何不看時機為令不語久之乃曰君言是矣此客聞已歸告奴僕乘馬便走衣服悉棄於廳中至夜已行五六十里出縣界止宿村店僕從但怪奔走不知何故此人歇定乃言此賊負心之狀言訖吁嗟奴僕悉涕泣之次忽牀下一人持匕首出立此客大懼乃曰我義士也宰使我來取君頭適聞說方知此宰負心不然枉殺賢士吾義不捨此人也公且勿睡少頃與君取此宰頭以雪公冤此人怕懼愧謝此客持劍出門如飛二更已至呼曰賊首至命火觀之乃令頭也劍客辭訣不知所之出原化記
