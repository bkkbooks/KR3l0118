body:
  text: 崔恕崔恕譙郡有功曹澗天統中濟南來府君出除譙郡功曹清河崔恕弱冠有令德於人時春夏積旱送別者千餘人至此澗上衆渴甚來公有思水之色恕獨見一青鳥於澗中乍飛乍止怪而就焉鳥起見一石方五六寸以鞭撥之清泉湧注盛以銀瓶瓶滿水立竭惟來公與恕供飲而已議者以為德感所致焉時人異之故以為目出酉陽雜俎何瑚梁何瑚字重寶為北征咨議博問強學幼有令名性淳深事親恭謹母病求醫不乘車馬忽感聖僧體質殊異手執香爐來求齋食而至無早晚故疑其非常如此十餘日母病有瘳僧便辭去留素書般若經一卷因執手曰貧道是二十七賢聖不近相人辨正論八近作退感檀越至心故來看病者已瘥貧道宜還言訖前行忽不見而爐煙香氣一旬方歇精誠所感朝野歎嗟因捨別宅為目明鈔本目作因愛寺也出辨正論陳遺吳人陳遺少為郡吏母好食燋飯遺在役恆帶囊每煮食漉其燋以獻母孫恩作亂遺隨例奔逃母憶遺晝夜哭泣遂失明遺脫難還家入門見母再拜號泣母目忽然開朗出孝子傳王虛之廬陵西昌人年十三喪父母二十年鹽酢不入口後得重病忽有一人來詣謂之曰君病尋瘥俄而不見又所住屋室夜有異光庭中橘樹隆冬三實病果尋愈咸以至孝所感出孝子傳河南婦人隋大業中河南婦人養姑不孝姑兩目盲婦以蚯蚓為羹以食之姑怪其味竊藏其一臠留示兒兒見之號泣將録婦送縣俄而雷雨暴作失婦所在尋見婦自空墮地身及服玩如故而首變為白狗言語如恆自云不孝於姑為天神所罰夫乃斥去之後乞食於道不知所在出冥報記岑文本唐中書令岑文本江陵人少信佛常念誦法華經普門品曾乘船於巨江中船壞人盡死文本沒在水中聞有人言但念佛必不死也如是三言之既而隨波湧出已著北岸遂免死後於江陵設齋僧徒集其家有一客僧獨後去謂文本曰天下方亂君幸不預其災終逢太平致富貴也言訖趨出外不見既而文本就齋於自食碗中得舍利二枚後果如其言出法苑珠林鄭鮮唐鄭鮮字道子善相法自知命短念無以可延夢見沙門問之須延命耶可大齋日放生念善持齋奉戒可以延齡得福鮮因奉法遂獲長年出宣驗記張楚金唐則天朝刑部尚書張楚金為酷吏周興搆陷將刑乃仰歎曰皇天后土豈不察忠孝乎奈何以無辜獲罪因泣下數行市人皆為歔欷須臾陰雲四塞若有所感旋降敕釋罪宣示訖天地開朗慶雲紛紏時議言其忠正所致也出御史臺記羅道悰唐司竹園羅道悰上書忤旨配流時有同流者道病卒泣曰所恨委骨異壤退悰曰吾若生還當取同歸遂瘞之而去及還為大水漂蕩失其所在道悰哭告之請示其靈俄而水際沸涌又呪曰如真在此下更請一沸又然遂得之志銘可驗負之還鄉出廣德神異録陵空觀唐景龍四年洛州陵空觀失火萬物並盡惟有一真人巋然獨存乃泥塑為之乃改為聖真觀出朝野僉載皇甫氏唐僕射裴遵慶母皇甫氏少時常持經經函中有小珊瑚樹異時忽有小龍骨一具立於樹側時人以為裴氏休祥上元中遵慶遂居宰輔云爾出廣異記田仁會唐田仁會為郢州刺史自暴得雨人歌曰父母育我田使君精誠為人上天聞田中致雨山出雲但願常在不患貧出廣德神異録徐州軍士唐王智興在徐州法令甚嚴有防秋官健交代歸其妹壻於家中設饌以賀自於廚中磨刀將就坐明鈔本就坐二字作生割羊腳磨訖持之疾行妻兄自堂走入廚倉卒相值鋒正中妻兄心即死所由擒以告智興訊問但稱過誤本無惡意智興不之信命斬之刀輒自刑者手中躍出徑沒於地三換皆然智興異之乃不殺出因話録唐宣宗唐大中初京師嘗淫雨涉月將害粢盛分命禱告百無一應宣宗一日在內殿顧左右曰昔湯以六事自責以身代犧牲雖甚旱卒不為災我今萬姓主遠慚湯德而災若是兆人謂我何乃執爐降階踐泥焚香仰視若自責者久之御服沾濕感動左右旋踵而急雨止翌日而凝陰開比秋而大有年出真陵十七史李彥佐李彥佐在滄景唐太和九年有詔詔浮陽兵北渡黃河時冬十二月至濟南郡使擊冰進舟冰觸舟舟覆詔失彥佐驚懼不寢食六日鬢髮白至貌侵膚削從事亦謬其儀形也乃令津吏不得詔盡死吏懼且請一祝禱于河吏憑公誠明以死索之彥佐乃令具爵酒及祝傳語詰河其旨明天子在上川瀆山嶽祝史咸秩豫境之望祀未嘗匱而而原作兩據明鈔本改河伯洎鱗介之長當衛天子詔何反溺之乎或不獲豫將齋告于天天將謫爾吏酹冰辭已忽有聲如震河冰中斷可三十丈吏知彥佐精誠已達乃沉鉤索而出封角如舊惟篆印微濕耳彥佐所至令嚴務簡推誠於物著聲於官如河水色渾駛流大木與纖芥頃刻千里矣安有舟覆六日一酹而堅冰陷一鉤而沉詔獲得非誠之至乎出闕史胡生列子終於鄭今墓在效藪謂賢者之迹而或禁其樵採焉里有胡生者家貧少為洗鏡鍍釘之業遇甘果名茶美醞輒祭于禦寇之壟似求聰慧而思學道歷稔忽夢一人刀劃其腹開以一卷之書置于心腑及覺而吟咏之意皆綺美之詞所得不由於師友也既成卷軸尚不棄於猥賤之業真隱者之風遠近號為胡釘鉸太守名流皆仰矚之而門多長者或有遺賂必見拒也或持茗酒而來則欣然接奉其文略説數篇喜圃田韓少府見訪云忽聞梅福來相訪笑著荷衣出草堂兒童不慣見車馬爭入蘆花深處藏又觀鄭州崔郎中諸妓繡樣云日暮堂前花蕊嬌爭拈小筆上牀描繡成安向春園里引得黃鶯下柳條江際小兒垂釣云蓬頭稚子學垂綸側坐蒼苔草映身路人借問遙招手恐畏魚驚不譍人出雲溪友議劉行者唐廬陵闤闠中有一劉行者以釘鉸為業性至孝母親患眼二十餘年行者懇苦救療一日忽有衲僧攜淨水銅瓶子覔行者磨洗出百金為酬行者不受告云家有母親患眼多年和尚莫能有藥療否僧云待磨洗瓶子了與醫磨洗畢便出門而行者隨問之僧云但歸去已與醫了言訖失僧所在行者奔還家見母親忽自牀墜地雙目豁開闔家驚喜方知向者僧是羅漢遂畫其形影供養至今存焉出報應録王法朗唐夔州道士王法朗舌大而長呼文字不甚典切常以為恨因發願讀道德經夢老君與剪其舌覺而言詞輕利精誦五千言頗有徵驗出録異記郗法遵唐道士郗法遵居廬山簡寂觀道行精確獨力檢校已歷數年全無徒弟忽夢玄中法師謂之曰汝無人力甚見勤勞今有二童子所恨年小耳既覺話於衆出山過民王家有孩子年才一晬見法遵抱其足不肯捨遵去晝夜啼號不息遵復至則欣然後數年父母即捨為童子又一小兒姓劉眼有五色光父母疑其怪異因灸眼屋其光遂絶已四五歲亦捨在觀中相次入道果符玄中夢授之語矣出録異記王暉西蜀將王暉嘗任集州刺史集州城中無水泉民皆汲於野外值岐兵急攻州城且絶其水路城內焦渴旬日之間頗有死者王公乃中夜有所祈請哀告神祗及寐夢一老父告曰州獄之下當有美泉言訖而去王亦驚寤遲明且命畚鍤於所指之處掘數丈乃有泉流居人飲之蒙活甚衆岐兵比知城中無水意將坐俟其斃王公命汲泉水數十罌於城上揚而示之其寇乃去是日神泉亦竭豈王公精誠之所感耶踈勒拜井之事固不虛耳王後致仕家於雍州嘗言之故記耳出玉堂間話李夢旗偽蜀拔山軍卒李夢旗經敵擒歸岐陽老母悲泣因瞽雙目夢旗在岐陽虔祈切至願見慈母三載方還夢旗刺股血點母眼即時如故乃知孝道感通其昭然耳出警誡録孟熙蜀孟熙販果實養父母承顏順旨溫清定省出告反面不憚苦辛父常云我雖貧養得一曾參及父亡絶漿哀號幾至滅性布苫于地寢處其上三年不食鹽酪遠近嘆服因見鼠掘地得黃金數千兩自此巨富焉出警誡録
