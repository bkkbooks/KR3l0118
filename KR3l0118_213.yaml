body:
  text: 保壽寺保壽寺保壽寺本高力士宅天寶九載捨為寺初鑄鐘成力士設齊慶之舉朝畢至一擊百千有規其意連擊二十杵經藏閣規構危巧二塔火珠授十餘斛河陽從事李涿性好奇古與僧善嘗俱至此寺觀庫中舊物忽於破瓮中得物如被幅裂汙坌觸而塵起涿徐視之乃畫也因以州縣圖三及縑三十換之令家人裝治大十餘幅訪於常侍柳公權方知張萱所畫石橋圖也玄宗賜力士因留寺中後為鬻畫人宗牧言於左軍尋有小使領軍卒數十人至宅宣敕取之即日進入帝好古見之大悅命張于雲韶院出酉陽雜俎先天菩薩有先天菩薩幀本起成都妙積寺開元初有尼魏八師者常念大悲咒雙流縣百姓劉乙名意兒年十一自欲事魏尼尼遣之不去嘗於奧室禪嘗白魏云先天菩薩見身此地遂篩灰於庭一夕有巨跡數尺輪理成就因謁畫工隨意設色悉不如意有僧楊法成自言能畫意兒常合掌仰祝然後指授之以近十稔工方後素先天菩薩凡二百四十二首首如塔勢分臂如蔓畫樣十五卷柳七師者崔寧之甥分三卷往上都流行時魏奉古為長史進之後因四月八日賜高力士今成都者是其次本出酉陽雜俎王宰唐王宰者家於西蜀貞之中韋皋以客禮待之畫山水樹石出於象外故杜甫贈歌云十日畫一松五日畫一石能事不受相促迫王宰始肯留真跡又嘗於席夔廳見圖一障臨臨原作陵據明鈔本改江雙松一柏古藤縈繞上盤半空下著水面千枝萬葉交查屈曲分布不雜或枯或茂或垂或直葉疊千重枝分四面精人所難凡目莫辨又於興善寺見畫四時屏風若移造化風候雲物八節四時於一座之內妙之至也山水松石並上上品出畫斷楊炎唐貞元中宰相明鈔本相字下有出貶崖州四字氣標王韓明鈔本王韓作風雲文敵揚馬畫松石山水出於人之表初稱處士謁盧黃門館之甚厚知有丹青之能意欲求之未敢發言楊懇辭去復苦留之知其家纍洛中衣食乏少心所不安乃潛令人將數百千至洛供給取其家書回以示楊公公感之未知所報盧因從容乃言欲一蹤以子孫寶之意尚難之遂月餘圖一障松石雲物移動造化世莫睹之其跡妙上上品出唐畫斷顧況唐顧況字逋翁文詞之暇兼攻小筆嘗求知新亭監人或詰之謂曰余要寫貌海中山耳仍辟畫者王默為副出尚書故實周昉唐周昉字景玄京兆人也節制之後好屬學畫窮丹青之妙遊卿相間貴公子也長兄皓善騎射隨哥舒往征吐蕃收石堡城以功授執金吾時德宗修章敬寺召皓謂曰卿弟昉善畫朕欲請畫章敬寺神卿特言之經數日帝又請之方乃下手初如障蔽都人觀覽寺抵國門賢愚必至或有言其妙者指其瑕者隨日改之經月餘是非語絶無不歎其妙遂下筆成之為當代第一又郭令公女壻趙縱侍郎嘗令韓幹寫真衆皆讚美後又請昉寫真二人皆有能名令公嘗列二畫於座未能定其優劣因趙夫人歸省令公問云此何人對曰趙郎何者最似云兩畫總似後畫者佳又問何以言之前畫空得趙郎狀貌後畫兼移其神思情性笑言之姿令公問後畫者何人乃云周昉是日定二畫之優劣令送錦綵數百匹今上都有觀自在菩薩時人云水月大雲西佛殿前行道僧廣福寺佛殿前面兩神皆殊妙也後任宣州別駕於禪定寺畫北方天王常於夢中見其形像畫子女為古今之冠有渾侍中宴會圖劉宣武按舞圖獨孤妃按曲粉本又仲尼問禮圖降真圖五星圖撲蝶圖兼寫諸真人文宣王十弟子卷軸至多貞元末新羅國有人於江淮盡以善價收市數十卷將去其畫佛像真仙人物子女皆神也唯鞍馬鳥獸竹石草木不窮其狀也出畫斷范長壽唐范長壽善風俗田家景候人物之狀人間多有月令屏風是其製也凡山川水石牛馬畜類屈曲遠近牧放間野皆得其妙各盡其趣梁張僧繇之次也僧彥悰續畫品云博贍繁多未見其能也其畫並妙品上又時號何長壽齊名次之出畫斷程修己唐程修己其先冀州人性好學時周昉任趙州長史遂師事焉二十年凡畫之六十病一一口授以傳其妙寶曆中修己應明經舉以昉所授付之太和中文宗好古重道以晉明帝衛協畫毛詩圖草木鳥獸賢士忠臣之象不得其真遂召修己圖之皆據經定名任土採拾由是冠冕之製生植之姿遠無不審幽無不顯矣又嘗畫竹障於文思殿帝賜歌云良工運精思巧極似有神臨窗乍睹繁陰合再盻真假殊未分當時學士皆奉詔繼和自貞元後以藝進身承恩稱旨一人而已尤精山水竹石花鳥人物古賢功德異獸等並入妙上品出畫斷邊鸞唐邊鸞京兆人攻丹青最長於花鳥折枝之妙古所未有觀其下筆輕利善用色窮羽毛之變態奮春華之芳麗貞元中新羅國獻孔雀解舞德宗召於玄武門寫貌一正一背翠彩生動金鈿遺妍若運清聲宛應繁節後以困窮於澤潞貌五參連根精妙之極也近代折枝花居其首也折枝花卉蜂蝶並雀等妙品上出畫斷張萱唐張萱京兆人嘗畫貴公子鞍馬屏帷宮苑子女等名冠於時善起草點簇位置亭臺竹樹花鳥僕使皆極其態畫長門怨約詞攄思曲盡其旨即金井梧桐秋葉黃也粉本畫貴公子夜遊圖宮中七夕乞巧圖望月圖皆綃上幽間多思意逾於象其畫子女周昉之難倫也貴公子鞍馬等妙品上出畫斷王墨唐王墨不知何許人名洽善潑墨時人謂之王墨多遊江湖善畫山水松柏雜樹性疏野好酒每欲圖障興酣之後先已潑墨或叫或吟腳蹙手抹或拂或幹隨其形象為山為石為水為樹應心隨意倏若造化圖成雲霞淡之風雨掃之不見其墨汙之跡也出畫斷李仲和唐李仲和漸之子漸嘗任欣州刺史善畫番人馬仲和能繼其藝而筆力不及其父相國令孤綯奕代為相家富圖畫即欣州外孫家有小畫人馬障是尤得意者會憲宗取置禁中後卻賜還出名畫記劉商唐劉商官至檢校禮部郎中汴州觀察判官少年有篇詠高情攻山水樹石初師張藻以造真為意自張貶竄後惆悵賦詩云苔石蒼蒼臨澗水溪風裊裊動松枝世間唯有張通會流向衡陽那得知出名畫記厲歸真唐末江南有道士厲歸真者不知何許人也曾遊洪州信果觀見三官殿內功德塑像是玄宗時夾紓製作甚妙多被雀鴿糞穢其上歸真遂於殿壁畫一鷂筆跡奇絶自此雀鴿無復栖止此殿其畫至今尚存歸真尤能畫折竹野鵲後有人傳歸真於羅浮山上升出玉堂閒畫聖畫雲花寺有聖畫殿長安中謂之七聖畫初殿宇既製寺僧召畫工將命施彩飾會貴其直不合寺僧祈酬亦竟去後數日有二少年詣寺來謁曰某善畫者也今聞此寺將命畫工某不敢利其價願輸功可乎寺僧欲先閲其跡少年曰某弟兄凡七人未嘗畫於長安中寧有跡乎寺僧以為妄稍難之少年曰某既不納師之直苟不可師意即命圬其壁未為晚也寺僧利其無直遂許之後一日七人果至各挈綵繪將入其殿且為僧曰從此去七日慎勿啓吾之門亦不勞飲食蓋以畏風日所侵鑠也可以泥錮吾門無使有纖隙不然則不能施其妙矣僧從其語如是凡六日闃無有聞僧相語曰此必他怪也且不可果其約遂相與發其封戶既啓有七鴿翩翩望空飛去其殿中綵繪儼若四隅唯西北墉未盡其飾焉後畫工來見之大驚曰真神妙之筆也於是無敢繼其色者出宣室志廉廣廉廣者魯人也因採藥於泰山遇風雨止於大樹下及夜半雨晴信步而行俄逢一人有若隱士問廣曰君何深夜在此仍林下共坐語移時忽謂廣曰我能畫可奉君法廣唯唯乃曰我與君一筆但密藏焉即隨意而畫當通靈因懷中取一五色筆以授之廣拜謝訖此人忽不見爾後頗有驗但祕其事不敢輕畫後因至中都縣李令者性好畫又知其事命廣至飲酒從容問之廣祕而不言李苦告之廣不得已乃於壁上畫鬼兵百餘狀若赴敵其尉趙知之亦堅命之廣又於趙廨中壁上畫鬼兵百餘狀若擬戰其夕兩處所畫之鬼兵俱出戰李及趙既見此異不敢留遂皆毀所畫鬼兵廣亦懼而逃往下邳下邳令知其事又切請廣畫廣因告曰余偶夜遇一神靈傳得畫法每不敢下筆其如往往為妖幸察之其宰不聽謂廣曰畫鬼兵即戰畫物必不戰也因命畫一龍廣勉而畫之筆才絶雲蒸霧起飄風倏至畫龍忽乘雲而上至滂沱之雨連日不止令憂漂壞邑居復疑廣有妖術乃收廣下獄窮詰之廣稱無妖術以雨猶未止令怒甚廣於獄內號泣追告山神其夜夢神人言曰君當畫一大鳥叱而乘之飛即免矣廣及曙乃密畫一大鳥試叱之果展翅廣乘之飛遠而去直至泰山而下尋復見神謂廣曰君言泄於人間固有難厄也本與君一小筆欲為君致福君反自致禍君當見還廣乃懷中探筆還之神尋不見廣因不復能畫下邳畫龍竟為泥壁出大唐奇事范山人李叔詹常識一范山人停於私第時語休咎必中兼善推步禁咒止半年忽謂李曰某將去有一藝欲以為別所謂水畫也乃請後廳上掘地為池方丈深尺餘泥以麻灰日汲水滿之候水不耗具丹青墨硯先援筆叩齒良久乃縱毫水上就視但見水色渾渾耳經二日搨以細絹四幅食頃舉出觀之古松怪石人物屋木無不備也李驚異苦詰之唯言善能禁彩色不令沈散而已出酉陽雜俎韋叔文唐進士韋叔文善畫馬暇曰偶畫二馬札絹而未設色赴舉過華嶽廟前恍然如夢見廟前人謁己云金天王奉召叔文不覺下馬而入升殿見王王曰知君有二馬甚佳今將求之來春改名而第矣叔文曰己但有所乘者爾王曰有試思之叔文暗思有二畫馬即對曰有馬毛色未就曰可以為惠叔文曰諾出廟急於店中添色以獻之來春改名而第出聞奇録
