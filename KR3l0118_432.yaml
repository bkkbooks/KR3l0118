body:
  text: 松陽人松陽人松陽人入山採薪會暮為二虎所逐遽得上樹樹不甚高二虎迭躍之終不能及忽相語云若得朱都事應必捷留一虎守之一虎乃去俄而又一虎細長善攫時夜月正明備見所以小虎頻攫其人衣其人樵刀猶在腰下伺其復攫因以刀砍之斷其前爪大吼相隨皆去至明人始得還會村人相問因說其事村人云今縣東有朱都事往候之得無是乎數人同往問訊答曰昨夜暫出傷手今見頓臥乃驗其真虎矣遂以白縣令命群吏持刀圍其所而燒之朱都事忽起奮迅成虎突人而出不知所之南陽士人近世有一人寓居南陽山忽患熱疾旬日不瘳時夏夜月明暫於庭前偃息忽聞扣門聲審聽之忽如睡夢家人即無聞者但於恍惚中不覺自起看之隔門有一人云君合成虎今有文牒此人驚異不覺引手受之見送牒者手是虎爪留牒而去開牒視之排印于空紙耳心甚惡之置牒席下復寢明旦少憶與家人言之取牒猶在益以為怪疾似愈忽憶出門散適遂策杖閒步諸子無從者行一里餘山下有澗沿澗徐步忽于水中自見其頭已變為虎又觀手足皆虎矣而甚分明自度歸家必為妻兒所驚但懷憤恥緣路入山經一日餘家人莫知所往四散尋覓比鄰皆謂虎狼所食矣一家號哭而已此人為虎入山兩日覺飢餒忽於水邊蹲踞見水中科斗蟲數升自念常聞虎亦食泥遂掬食之殊覺有味又復徐行乃見一兔遂擒之應時而獲即啖之覺身輕轉強晝即於深榛草中伏夜即出行求食亦數得獐兔等遂轉為害物之心忽尋樹上見一採桑婦人草間望之又私度吾聞虎皆食人試攫之果獲焉食之果覺甘美常近小路伺接行人日暮有一荷柴人過即欲捕之忽聞後有人云莫取莫取驚顧見一老人鬚眉皓白知是神人此人雖變然心猶思家遂哀告老人曰汝曹為天神所使作此身今欲向畢卻得復人身若殺負薪者永不變矣汝明日合食一王評事後當卻為人言訖不見此老人此虎遂又尋草潛行至明日日晚近官路伺候忽聞鈴聲於草間匿又聞空中人曰此誰角馱空中答曰王評事角馱又問王評事何在答曰在郭外縣官相送飯會方散此虎聞之更沿路伺之一更已後時有微月聞人馬行聲空中又曰王評事來也須臾見一人朱衣乘馬半醉可四十餘亦有導從數人相去猶遠遂於馬上擒之曳入深榛食之其從迸散而走食訖心稍醒卻憶歸路去家百里餘來尋山卻歸又至澗邊卻照其身已化為人矣遂歸其家家人驚怪失之已七八月日矣言語顛倒似沉醉人漸稍進粥食月餘平復後五六七年遊陳許長葛縣時縣令席上坐客約三十餘人主人因話人變化之事遂云牛哀之輩多為妄說此人遂陳己事以明變化之不妄主人驚異乃是王評事之子也自說先人為虎所殺今既逢仇遂殺之官知其實聽免罪焉虎恤人鳳翔府李將軍者為虎所取蹲踞其上李頻呼大王乞一生命虎乃弭耳如喜狀須臾負李行十餘里投一窟中二三子見人喜躍虎于窟上俯視久之方去其後入窟恆分所得之肉及李積十餘日子大如犬悉能陸梁乳虎因負出窟至第三子李恐去盡則已死窟中乃因抱之云大王獨不相引虎因垂尾李持之遂得出窟李復云幸已相祐豈不送至某家虎又負李至所取處而訣每三日一至李舍如相看經二十日前後五六度村人怕懼其後又來李遂白云大王相看甚善然村人恐懼願勿來經月餘復一來自爾乃絶焉范端涪陵里正范端者為性幹了充州縣任使久之化為虎村鄰苦之遂以白縣云恆引外虎入村盜食牛畜縣令云此相惡之辭天下豈有如此事遂召問端對如令言久之有虎夜入倉內盜肉遇曉不得出更遞圍之虎傷數人逸去耆老又以為言縣令因嚴詰端所由端乃具伏云常思生肉不能自致夜中實至于東家欄內竊食一豬覺有滋味是故見人肥充者便欲噉啖之但苦無伍耳每夜東西求覓遇二虎見隨所有得者皆共分之亦不知身之將變然察其舉措如醉也縣令以理喻遣之是夜端去凡數日而歸衣服如故家居三四日昏後野虎輒來至村外鳴吼村人恐懼又欲殺之其母告諭令去端泣涕辭母而行數日或見三虎其一者後左足是靴端母乃遍求于山谷復見之母號哭二虎走去有靴者獨留前就之虎俯伏閉目乃為脫靴猶是人足母持之而泣良久方去是後鄉人頻見或呼范里正二虎驚走一虎回視俯仰有似悲愴自是不知所之也石井崖石井崖者初為里正不之好也遂服儒號書生因向郭買衣至一溪溪南石上有一道士衣朱衣有二青衣童子侍側道士曰我明日日中得書生石井崖充食可令其除去刀杖勿有損傷二童子曰去訖石井崖見道士道士不見石井崖井崖聞此言驚駭行至店宿留連數宿忽有軍人來問井崖莫要攜軍器去否井崖素聞道士言乃出刀拔鎗頭懷中藏之軍人將刀去井崖盤桓未行店主屢逐之井崖不得已遂以竹盛卻鎗頭而行至路口見一虎當路徑前攫取井崖井崖遂以鎗刺適中其心遂斃二童子審觀虎死乃謳歌喜躍械虎襄梁間多鷙獸州有採捕將散設檻阱取之以為職業忽一日報官曰昨夜檻發請主帥移廚命賓寮將挍往臨之至則虎在深阱之中官寮宅院民間婦女皆設幄幕而看之其獵人先造一大枷仍具釘鎖四角系緪施于阱中即徐徐以土填之鷙獸將欲出阱即迤邐合其荷板虎頭才出則蹙而釘之四面以索趁之而行看者隨而笑之此物若不設機械困而取之則千夫之力百夫之勇曷以制之勢窮力竭而取之則如牽羊拽犬雖有纖牙利爪焉能害人哉夫欲制強敵者亦當如是乎商山路舊商山路多有摰獸害其行旅適有騾群早行天未平曉群騾或驚駭俄有一虎自藂薄中躍出攫一夫而去其同群者莫敢回顧逮至食時聞遭攫者卻趕來相及衆人謂其已碎于銛牙莫不驚異競問其由徐曰某初銜至路左巖崖之上前有萬仞清溪溪南有洞洞口有小虎子數枚顧望其母欣欣然若有所待其虎置某崖側略不損傷而面其溪洞叫吼以呼諸子某因便潛伸腳于虎背盡力一踏其虎失腳墮于深澗不復可登是以脫身而至此某獸蓋欲生致此人按演諸子是以不傷真可謂脫身于虎口危哉危哉陳褒清源人陳褒隱居別業臨窗夜坐窗外即曠野忽聞有人馬聲視之見一婦人騎虎自窗下過徑入西屋內壁下先有一婢臥婦人即取細竹枝從壁隙中刺之婢忽爾腹痛開戶如廁褒方愕駭未及言婢已出即為虎所搏遽前救之僅免鄉人云村中恆有此怪所謂虎鬼者也食虎建安人山中種粟者皆搆棚于高樹以防虎嘗有一人方升棚見一虎垂頭塌耳過去甚速俄有一獸如虎而稍小躡前虎而去遂聞竹林中哮吼震地久之乃息明日往視其虎遇食略盡但存少骨爾周雄唐大順景福已後蜀路劍利之間白衛嶺石筒溪虎尤甚號稅人場商旅結伴而行軍人帶甲列隊而過亦遭攫搏時遞鋪卒有周雄者膂力心膽有異于常日夜行役不肯規避仍持托杈利劍前後于稅人場連斃數虎行旅賴之西川書記常莊作長語以賞之蜀帥補軍職以壯之凡死于虎溺于水之鬼號為倀須得一人代之雖聞泛言往往而有先是西川監軍使魚全諲特進自京搬家憩于漢源驛其孀嫂方稅駕遂嚴籹倚驛門而看為虎攫去雖驅奪得之已傷鉤爪也僕嘗行次白衛嶺時屬炎蒸夜涼而進一馬二僕與他人三五輩偕行或前或後而民家豚犬交橫道路山林依然居人如昔虎豹之屬又復何之景福乾寧之時三川兵革虎豹晝行任土貢輸梗于前邁西川奏章多取巫峽人蟲作暴得非係國家之盛衰乎
