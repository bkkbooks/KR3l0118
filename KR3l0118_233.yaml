body:
  text: 千日酒千日酒昔有人名玄石從中山酒家酤酒酒家與千日酒忘語其節至家醉臥不醒數日家人不知以為死也具棺殮葬之酒家至千日乃憶玄石前來沽酒醉當醒矣遂往索玄石家而問之云石亡已三年今服闋矣於是與家人至玄石墓掘冢開視玄始醒起于棺中出博物志擒姦酒河東人劉白墮者善于釀酒六月中時暑赫劉以罌貯酒曝于日中經一旬酒味不動飲之香美醉而不易醒京師朝貴出郡者遠相餉餽踰于千里以其可至遠號曰鶴觴亦名騎驢酒永熙中青州刺史毛鴻賓帶酒之任路中夜逢劫盜盜飲之皆醉遂備擒獲因此復名擒姦酒遊俠語曰不畏張弓拔刀唯畏白墮春醪出伽藍記若下酒輿地志村人取若下水以釀酒醇美俗稱若下酒張協士所云荊州烏程豫北竹葉即此是也出十道記崑崙觴魏賈𤨿家纍千金博學善著作有蒼頭善別水常令乘小舟於黃河中以瓠匏接河源水一日不過七八升經宿器中色如絳以釀酒名崑崙觴酒之芳味世間所絶曾以三十斛上魏莊帝出酉陽雜俎碧筒酒歷城北有使君林魏正始中鄭公愨三伏之際每率賓僚避暑于此取大蓮葉置硯格上盛酒三升以簪刺葉令與柄通屈莖莖原作徑據明鈔本改上輪菌如象鼻傳吸之名為碧筒歷下效之言酒味雜蓮氣香冷勝於冰出酉陽雜俎九醞酒張華既貴有少時知識來候之華與共飲九醞酒為酣暢其夜醉眠華常飲此酒醉眠後輒敕左右轉側至覺是夕忘敕之左右依常時為張公轉側其友人無人為之至明友人猶不起華咄云此必死矣使視之酒果穿腸流床下滂沱出世説消腸酒張華為醇酒煮三薇以漬麴蘗蘗出西羌麴出北胡胡中有指星麥四月火星出穫麥而食之蘗用水漬三夕而麥生萌芽以平旦時雞初鳴而用之俗人呼為雞鳴麥以釀酒清美鬯久含令人齒動若大醉不搖蕩使人肝腸爛當時謂之消腸酒或云醇酒可為長宵之樂二説聲同而事異焉出王子年拾遺記青田酒烏孫國有青田核莫知其樹與實而核大如五六升瓠空之盛水俄而成酒劉章曾得二枚集賓設之可供二十人一核方盡一核所盛復中飲矣唯不可久置久則味苦難飲因名其核曰青田壺酒曰青田酒出古今注粘雨酒石虎于大武殿前起樓高四十丈結珠為簾垂五色玉珮上有銅龍腹空盛數百斛酒使胡人于樓上噀酒風至望之如雲霧名曰黏雨臺使以灑塵出拾遺録酒名郢之富水烏程之若下滎陽之土窟春富平之石凍春劍南之燒春河東之乾和蒲桃嶺南之靈溪博羅宜城之九醞潯陽之湓水京城之西市腔蝦蟆陵之郎官清河漢之國史補河漢之作阿婆清又有三勒漿其法出波斯三勒者謂菴摩勒毗黎勒訶黎勒出國史補南方酒新州多美酒南方酒不用麴蘗杵米為粉以衆草葉胡蔓草汁溲南人呼野葛為胡蔓草大如卵置蓬蒿中陰蔽經月而成用此合糯為酒故劇飲之後既醒猶頭熱涔涔有毒草故也南方飲既燒即實酒滿甕泥其上以火燒方熟不然不中飲既燒即揭瓶趨虛泥固猶存沽者無能知美惡就泥上鑽小穴可容箸以細筒插穴中沽者就吮筒上以嘗酒味俗謂之滴淋無賴小民空手入市遍就酒家滴淋皆言不中取醉而返南人有女數歲即大釀酒既漉候冬陂池水竭時置酒罌密固其上瘞于陂中至春漲水滿不復發矣候女將嫁因決陂水取供賀客南人謂之女酒味絶美居常不可致也出投荒雜録李景讓大中年丞郎宴席蔣伸在座忽斟一杯言曰席上有孝於家忠於國及名重於時者飲此爵衆皆肅然無敢舉者獨李公景讓起引此爵蔣曰此宜其然出盧氏雜説夏侯孜崔郢為京尹日三司使在永達亭子宴丞郎崔乘酒突飲衆人皆延之時譙公夏侯孜為戶部使問曰尹曾任給舍否崔曰無譙公曰若不曾歷給舍京兆尹不合衝丞郎宴命酒糾來命下籌且吃罰爵取三大器物引滿飲之良久方起出盧氏雜説孫會宗唐孫會宗僕射即渥相大王父也宅中集內外親表開宴有一甥姪為朝官後至及中門見緋衣官人衣襟前皆是酒涴咄咄而出不相識頃即席説于主人訝無此官沉思之乃是行酒時階上酹酒草草傾潑也自此每酹酒止側身恭跪一酹而已自孫氏始今人三酹非也出北夢瑣言陸扆陸相扆出典夷陵時有士子修謁相國與之從容因命酒酌勸此子辭曰天性不飲酒相曰誠如所言已校五分矣蓋平生悔吝有十分不為酒困自然減半也出北夢瑣言山濤山濤字巨源飲酒量至八斗武帝欲試之使人私默以記之至量而醉出晉書周顗周顗字伯仁飲酒至量一石及過江雖日醉每恨無對偶有歸對北來顗遇之為欣然乃置酒二石共飲各大醉及醒顗使人視客已腐脅而死矣出晉書裴弘泰裴弘泰唐裴均之鎮襄州裴弘泰為鄭滑館驛巡官充聘于漢南遇大宴為賓司所漏及設會均令走屈鄭滑裴巡官弘泰奔至均不悅責曰君何來之後大涉不敬酌後至酒已投糾籌弘泰謝曰都不見客司報宴非敢慢也叔父捨罪請在座銀器盡斟酒滿之器隨飲以賜弘泰可乎合座壯之均亦許焉弘泰次第揭座上小爵以至觥船凡飲皆竭隨飲訖即置于懷須臾盈滿筵中有銀海受一斗以上其內酒亦滿弘泰以手捧而飲飲訖目吏人將海覆地以足踏之捲抱而出即索馬歸驛均以弘泰納飲器稍多色不懌午後宴散均又思弘泰之飲必為酒過度所傷憂之逮暮令人視飲後所為使者見弘泰戴紗帽于漢陰驛廳箕踞而坐召匠稱得器物計二百餘兩均不覺大笑明日再飲回車日贈遺甚厚出乾鐉子王源中文宗時為翰林承旨暇日與諸昆季蹴踘于太平里第毬子擊起誤中源中之額薄有所損俄有急召比至上訝之源中具以上聞上曰卿大雍睦命賜酒二盤每盤貯十金碗每碗各容一升許宣今並碗賜之源中飲之無餘略無醉容出托言徐邈魏徐邈字景山為尚書郎時禁酒邈私飲沉醉從事趙達問曹事邈曰中聖人達白太祖太祖甚怒鮮于輔曰醉人謂清酒為聖人濁酒為賢人邈性修慎偶醉言耳乃得免罪出異苑劉伶劉伶常乘鹿車攜一壺酒使人荷鍤隨之曰死便埋我其遺形如此渴甚求酒于妻妻藏酒棄器諫曰非養生之道宜斷之伶曰善當祝鬼神自誓便可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飲一石五斗解酲婦人之言必不可聽於是酌酒御肉塊然復醉出晉書酒臭義寧初一縣丞衣纓之胄年少時甚有丰采涉獵書史兼有文性其後沉湎于酒老而彌篤日飲數升略無醒時得病將終酒臭聞于數里遠近驚愕不知所由如此一旬此人遂卒故釋典戒酒令人昏癡今臨亡酒臭彰其入惡道而出五行記
