body:
  text: 妖怪東柯院隴城縣有東柯僧院甚有幽致高檻可以眺遠虛窗可以來風游人如市忽一日有妖異起空中擲下瓦礫扇揚灰塵人莫敢正立居僧晚夕不安衣裝道具有時失之復得有道士者聞之曰妖精安敢如是余能去之院僧甚喜促召至道士入門于殿上禹步誦天蓬咒其聲甚厲良久失其冠人見其空中擲過垣牆矣復取之結纓而冠誦咒不已逡巡衣褫帶解褲并失隨身有小袱貯符書法要頃時又失之道士遂狼狽而竄纍日后鄰村有人于藩篱之下掘土獲其袱縣令杜延范正直之人也自往觀之曰安有此事至則箕踞而坐妖于空中拋小書帖紛紛然不知其數多成絶句凌謔杜令記其一二曰雖共蒿蘭伍南朝有宗祖莫打緑袍人空中且歌舞又曰堪憐木邊土非兒不似女瘦馬上高山登臨何自苦延范覺之亦遽還其不記者絶句甚多又有巡官王昭緯恃其血氣方剛往而詬詈至則為大石中腰而回王守貞徐州有寄褐道士王守貞蓄妻子而不居宮觀行極凡鄙常游太滿宮竊攜道流所佩之菉而歸置于臥榻蓐席之下覆以婦人之衣褻黷尤甚怪異數見燈檠自行貓兒語莫如此莫如此不旬日夫妻皆卒彭顒宣州鹽鐵院官彭顒常病數月恍惚不樂每出外廳輒見俳優樂工數十人皆長數寸合奏百戲并作朱紫炫目顒視之或時欣笑或憤悶然無如之何他人不見也顒后病愈亦無復見后十余年乃卒呂師造呂師造為池州刺史頗聚斂常嫁女于揚都資送甚厚使家人送之晚泊竹筱江岸上忽有一道士狀若狂人來去奔走忽躍入舟直穿舟中過隨其所經火即大發復登后船火亦隨之凡所載之物皆為煨燼一老婢發亦盡余人與船了無所損火滅道士亦不復見崔彥章饒州史崔彥章送客于城東方宴忽有小車其色如金高尺余巡席而行若有求覓至彥章前遂止不行彥章因即絶倒輿歸州而卒潤州氣戊子歲潤州有氣如虹五彩奪目有首如驢長數十丈環廳事而行三周而滅占者曰廳中將有哭聲然非州府之咎也頃之其國太后殂發哀于此堂黃極甲午歲江西館驛巡官黃極子婦生子男一首兩身相背四手四足建昌民家生牛每一足更附出一足投之江中翌日浮于水上南昌新義里地陷長數十步廣者數丈狹者七八尺其年節度使徐知詢卒熊勳軍吏熊勳家于建康長樂漫之東常日晚出屋上有二物大如卵赤而有光往來相馳逐家人駭懼有親客壯勇登屋捕之得其一乃辟繒綵包一雞卵殼也銼而焚之臭聞數里其一走去不復來矣家亦無恙王建封江南軍使王建封驕恣奢僭筑大第于淮之南暇日臨街坐窗下見一老嫗攜少女過于前衣服襤縷而姿色絶世建封呼問之云孤貧無依乞食至此建封曰吾納爾女而給養爾終身可乎嫗欣然建封即召入命取新衣二襲以衣之嫗及女始脫故衣皆為凝血聚于地旬月建封被誅廣陵士人廣陵有士人常張燈獨寢一夕中夜而寤忽有雙髻青衣女子資質甚麗熟寐于其足某知其妖物也懼不敢近復寢如故向曉乃失門戶猶故扃閉自是夜夜恆至有術士為書符施髻中其夜佯寢以伺之果見自門而入徑詣髻中解取符燈下視之微笑訖復入置髻中升床而寢甚懼后聞玉笥山有道士符禁神妙乃往訪之既登舟遂不至途次豫章暑夜乘月行舟時甚熱乃盡開船窗而寢中夜忽復見寐于床后某即潛起急捉其手足投之江中紞然有聲因爾遂絶張鏞兗州録事參軍張鏞者少年時嘗居淄州第中忽多鬼怪唯不睹其形質家僮輩捧執食饌皆為鬼所搏復置空器或以器皿擲于空中久之方墮或舍自行于地更相擊觸又飛火塊著人身燒而不痛若有詬詈之者即磚石瓦礫應聲而至常有一儒生不信其事仗劍入宿于舍其劍為瓦石所擊鋒刃缺折又有稱禁咒者將入其門倏見瓦石交下不能復前賓客來者或被搏其巾幘擲致他所至有露頂而逸者如是纍旬方已其家竟亦無他宗夢征晉蔡州巡官宗夢征善醫居東京開運二年秋解玉巷東有病者夜深來召乘馬而至將及四更去解玉巷口民家門前有一物立而動其形頗偉若黑霧亭亭然仆者前行愕立毛豎馬亦鼻鳴耳聳不進宗則強定心神策馬而去比其患者之家則不能診脈尤覺恍惚矣既歸伏枕凡六七日方愈黃仁浚舒州司士參軍黃仁浚自言壬子歲罷隴州汧陽主簿至鳳翔城有文殊寺寺中土偶數十軀忽自然搖動狀如醉人食頃不止觀者如堵官司禁止之至今未知其應孫德遵舒州都虞侯孫德遵其家寢堂中鐵燈擎忽自搖動如人撼之至明日有一婢偶至燈擎所忽然爾仆地遂卒東郡民漢建安中東郡民家有怪事無故瓮器自發訇訇作聲若有人擊盤案在前忽然便失雞生輒失子如是數歲人共惡之乃多作美食覆蓋著一室中陰藏戶間伺之果復來發聞聲便閉戶周旋室中了無所見乃暗以杖撾之至久于室隅聞有呻呼之聲乃開戶視之得一老翁可百餘歲言語狀貌頗類于獸遂周問及于數里外得其家云失來十余年得之哀喜后歲余復失之聞陳留界復有怪如此時猶以為此翁胡頊夏縣尉胡頊詞人也嘗至金城縣界止于人家人為具食頊未食私出及還見一老母長二尺垂白寡發据案而食餅果且盡其家新婦出見而怒之搏其耳曳入戶頊就而窺之納母于檻中窺望兩目如丹頊問其故婦人曰此名為魅乃七代祖姑也壽三百餘年而不死其形轉小不須衣裳不懼寒暑鎖之檻終歲如常忽得出檻偷竊飯食得數斗故號為魅頊異之所在言焉烏程縣人吳孫休時烏程有人因重疾愈而能響言音聞十數里外所聞之處即若座間其鄰家有子居外久不歸省其父假之使為責詞子聞之以為鬼神顛沛而歸亦不知所以然也李宣妻晉安帝義熙中魏興李宣妻樊氏有娠過期不孕而額上有瘡兒穿之而出趙宣母長山趙宣母妊身臂上生瘡兒從瘡中出馬氏婦后蜀李勢末年馬氏婦妊身兒從肋下出母子無恙其年勢為桓溫所滅楊歡妻宋孝武時荊州人楊歡妻于股中生女及孝武崩子業立狂勃被廢見害所生女至齊猶存壽安男子不知姓名肘拍板鼻吹笛口唱歌能半面笑半面啼一烏犬解人語應口所作與人無殊崔廣宗清河崔廣宗者開元中為薊縣令犯法張守圭致之極刑廣宗被梟首而形體不死家人舁歸每饑即畫地作饑字家人遂屑食于頸孔中飽即書止字家人等有過犯書令決之如是三四歲世情不替更生一男于一日書地云后日當死宜備凶具如其言也許州僧許州有一老僧自四十歲已后每寢熟即喉聲如鼓簧若成韻節許州伶人伺其寢即譜其聲按之絲竹皆合古奏僧覺亦不自知二十余年如此田瞫秀才田瞫云大和六年秋涼州西縣百姓妻産一子四手四足一身分兩面頂上發一穗長至足時朝伯峻為縣令元鎬故京兆少尹元鎬任虢縣令日怒一獄子王行約者命曳之去巾既無毛發而有兩角長三四寸鎬曰真牛頭也遂舍之無足婦人晉少主之代有婦人儀狀端嚴衣服鉛粉不下美人而無腿足繇帶以下像截而齊余皆具備其父載之于獨車自鄴南游浚都乞丐于市日聚千人至于深坊曲巷華屋朱門無所不至時人嗟異皆擲而施之后京城獲北戎間諜官司案之乃此婦為奸人之領袖所聽察甚多遂戮之婁逞南齊東陽女子婁逞變服詐為丈夫粗會棋博解文義游公卿門仕至揚州從事而事泄明帝令東還始作婦人服歎曰有如此伎還為老嫗豈不惜哉史臣曰此人妖也陰為陽事不可后崔惠景舉事不成應之孟嫗彭城劉頗常謂子壻進士王勝話三原縣南董店店東壁貞元末有孟嫗年一百餘而卒店人悉曰張大夫店頗自渭北入城止于媼店見有一媼年只可六十已來衣黃綢大裘烏幘跨門而坐焉左衛李胄曹名士廣其嫗問廣何官廣具答之其媼曰此四衛耳大好官廣即問媼曰何以言之媼曰吾年二十六嫁于張察為妻察為人多力善騎射郭汾陽之總朔方此皆部制之郡靈夏邠涇岐蒲是焉吾夫張察為汾陽所任請重衣賜常在汾陽左右察之貌酷相類吾察卒汾陽傷之吾遂僞衣丈夫衣冠投名為察弟請事汾陽汾陽大喜令替缺如此又寡居一十五年自汾陽之薨吾已年七十二軍中纍奏兼御史大夫忽思煢獨遂嫁此店潘老為婦邇來復誕二子曰滔曰渠滔五十有四渠年五十有二是二兒也頗每心記之與子壻王勝話人間之異者黃崇嘏王蜀有僞相周庠者初在邛南幕中留司府事時臨邛縣送失火人黃崇嘏才下獄便貢詩一章曰偶離幽隱住臨邛行止堅貞比澗松何事政清如水鏡絆他野鶴向深籠周覽詩遂召見稱鄉貢進士年三十許祗對詳敏即命釋放后數日獻歌周極奇之召于學院與諸生侄相伴善棋琴妙書畫翌日荐攝府司戶參軍頗有三語之稱胥吏畏伏案牘麗明周既重其英聰又美其風采在任將逾一載遂欲以女妻之崇嘏又袖封狀謝仍貢詩一篇曰一辭拾翠碧江涯貧守蓬茅但賦詩自服藍衫居扳椽永拋鸞鏡畫蛾眉立身卓爾青松操挺志鏗然白璧姿幕府若容為坦腹願天速變作男兒周覽詩驚駭不已遂召見詰問乃黃使君之女幼失覆蔭唯與老奶同居元未從人周益仰貞潔郡內咸皆歎異旋乞罷歸臨邛之舊隱竟莫知存亡焉白項鴉契丹犯闕之初所在群盜蜂起戎人患之陳州有一婦人為賊帥號曰白項鴉年可四十許形質粗短發黃體黑來詣戎王襲男子姓名衣中拜跪皆為男子狀戎王召見賜錦袍銀帶鞍馬署為懷化將軍委之招輯山東諸盜賜與甚厚僞燕王趙延壽召問之婦人自云能左右馳射被雙鞬日可行二百里盤矛擊劍皆所善也其屬數千男子皆役服之人問有夫否云前后有夫數十人少不如意皆手刃之矣聞者無不嗟憤旬日在都下乘馬出入又有一男子亦乘馬從之此人妖也北戎亂中夏婦人稱雄皆陰盛之應婦人后為兗州節度使符彥卿戮之
