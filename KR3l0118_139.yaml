body:
  text: 池陽小人池陽小人王莽建國三年池陽有小人長一尺餘或乘馬或步行操持萬物小人皆自相稱三日乃止莽甚惡之自後兵盜日盛而竟被殺出廣古今五行記背明鳥黃龍元年吳始都武昌時越雟之南獻背明鳥形如鶴狀止不向明巢常對北多肉少毛其聲百變聞鍾磬笙竽之聲則奮翅搖頭時人以為吉瑞是歲遷都建業殊方多貢珍奇吳人語訛呼為背亡鳥國中以為大妖不及百年當有喪亂背叛流亡之事散逸奔逃墟無煙火果如斯言後此鳥不知所在出王子年拾遺記王琬晉武帝太康七年郊壇下有一白狗高三尺光色鮮明恆臥壇側覺見人前則去騎督王琬以駿馬追之狗徐行馬不可及射又逃琬去復還郊丘非狗所守後遂大亂又武帝時幽州有狗鼻行地三百餘步帝不思和嶠之言而立惠帝以致衰亂出郭頌世語明鈔本頌作頒張聘晉惠帝太安中江夏張聘所乘牛言曰天下亂乘我聘懼而還犬又言曰歸何早尋牛人立而行聘曰天下將亂非止一家其年張昌作亂先先明鈔本作將略江夏衆推為江夏衆推為五字原空闕據黃本補帥於是五州殘亂聘方族滅出廣古今五行記張林晉懷帝永嘉中嘉興張林有狗名阿永時天下飢荒狗行欲倒林言阿永汝言得肉明鈔本言作前肉作食故健今餓不復行耶狗忽語云我道天下人飢死狗語不已聞者怖走時天下荒亂帝沒於胡出廣古今五行記東瀛公晉東瀛公騰字元邁以永嘉元年鎮鄴時大雪當其門前方十數步獨液不積騰怪而掘之得玉馬高尺許齒皆缺騰以為馬者國姓稱吉祥焉或謂馬無齒則不食未幾晉大亂出異苑長廣人宋文帝元嘉末長廣人病瘥便能食而不得臥一飯輒覺身長如此數日頭遂出屋段究為刺史度之為三丈復還漸縮如舊經日而亡俄而文帝為元凶所害出廣古今五行記黃丘村宋江陵黃丘村有羊生羔兩頭一頸在上者鳴在下者不鳴俄而劉毅司馬休之相繼作亂人多兵死出渚宮舊事韓僧真後魏肅宗熙平二年并州祁縣人韓僧真女從母右脅而出胡太后令付掖庭養之太后臨朝為元乂劉騰幽於永巷後竟被爾朱榮沈於河魏室因茲大亂出廣古今五行記洛陽金像後魏普泰元年洛陽金像生毛眉鬢髮悉皆具足尚書左丞魏季景謂人曰張天錫有此事其國遂滅此亦不祥之徵至明年而廣陵被廢死焉出洛陽伽藍記梁武帝梁武帝大同元年幸玄武湖湖中魚皆驤首見於水上若顧望焉帝入宮方沒此下人將舉兵睥睨乘輿之象尋有侯景之亂出廣古今五行記惠照師齊末惠照師者不知從何許而來騎一竹枝為馬振策馳驛盤躄回轉或時厲聲云某處追兵甚急何不差遣遂放杖馳走不遑寧息或晨往南殿暮至北城如其所言果有烽檄之急每遙見黑雲飛烏群豕但是黑之物必低身恭敬忽自稱云伏嘍囉語國人見者莫不怪笑京內咸識不知名字者呼為伏喻調馬伏喻調馬四字原闕據明鈔本補齊未動之前惠照走杖馬來到殿西騎省密告諸貴唐雍等急救東方吳兒大欲入曉夕孜孜守闕不去數日吳明徹自廣陵北侵淮楚國家遣兵將救始集兵馬惠照已去城四十里於白壁南待軍指麾號令大將至謂齊安王高敬德曰努力好慎漿水後吳人縱水淹漬齊軍多有傷沒在京百官朝集惠照亦騎杖執策立於武成之後敕付天平寺常令三人守之勿勿原作忽據明鈔本改聽浪語照狂言如舊不可止約後於天平寺宿與一大德僧共密語天地開闢上古無為下至君臣父子道德仁義老經佛法優劣多少凡所顧涉幽隱之事無所不論逮至天曉將去謂曰慎莫漏我此語若泄打殺汝去後此僧語一二老宿名德者云伏喻乃是大聖人非尋常不可輕忽聞其所説諸佛得道者咸經親事序述猶如指掌見語勿道恐諸不知懷驕慢心將來獲罪所以相告午後惠照密將拳石手巾褁來語此僧云戒你莫説乃不能忍以巾打之一下死寺家執以奉聞恕而不問齊將破之時北宮東北角割十步為弘善寺惠照曾到寺宿其夜騫牆住太后宮院盜入宮人房裏被捉照曰不久人人皆入何為獨自約我又以狀奏詔復捨之時宮校貴人內外戚妃媵出家者朔望參謁車馬衣服侍從綺麗惠照尋逐車後眼語挑弄云罷道之日與我作婦官者驅逐且語且前貴人等以照狂悖為後主所容但笑而不責每逢見僧衆則惡罵嗔打手執磚瓦不避頭面云無用之時除剪僧徒值者亦必避之於後失經五六日忽復自來則廁上而眠或把杖坐睡云官府甚多軍馬遍滿晝夜供承不可周悉圖籍不得不造及周兵入晉陽照到太后寺浮圖前合掌落淚云法輪傾即伏地不起武帝平東夏不收圖籍府庫典誥州縣戶口洛京故實並為軍人毀棄至今大比民貫至今大比民貫六字原缺據明鈔本補創始營造照所説造籍悉符驗焉而照竟不知所在出廣古今五行記周靖帝周靖帝大象元年夏滎陽汴水北有龍鬥初見白光直屬天自東方而來有白龍長十許丈西北向舐掌而鳴西北有黑龍亦乘雲而至風雷相擊乍合乍離暴雨大注自午至申白龍升天黑龍墜地復有大鯉魚三從小魚無數乘空而鬥雷雨又甚大風發屋至瞑乃止魚不復見明日有兩黑蛇大者長丈五小者半之並傷腰頸死於竇前黑蛇者周天元帝及靖帝之象大魚三而鬥者尉遲迥王謙司馬消難消難二字原闕據明鈔本補三方起兵亂之異出廣古今五行記蘇氏周靖帝大象中陽武蘇氏家臨河聞園中有犬聲往視之見三獸狀如水牛一黃一赤一黑者鬥久之黑者死黃赤者俱入于河黑者周所尚色也死者滅亡之象後數歲周遂滅隋有天下旗牲尚赤戎服尚黃出廣古今五行記突厥首領隋開皇初突厥阿波未叛之前有首領數十騎逐一兔至山山上有鹿臨崖告人云你等無事觸他南方聖人之國不久當滅俄而國內大亂出廣古今五行記陳後主陳後主時秣陵有泉深不可測産魚鱉甚衆恆有聲如牛邑人懼之不敢犯無何忽見牛頭於岸下里民牽而出之於是爭捕其魚乃盡江東舊以牛頭山為天關今牛頭已獲蓋示國將滅而關毀也後年隋平陳出廣古今五行記渭南人隋時渭南有人寄宿他家夜中聞二豕對語其一曰歲將盡阿耶明殺我供歲何處避之其一答曰可向水北婦家因相隨而去天將曉主人覓豕不得宿客言狀主人如其言得豕其後蜀王秀得罪將殺樂平公主救之得全後數歲而帝崩天下大亂秀竟被誅出廣古今五行記貓鬼隋大業之季貓鬼事起家養老貓為厭魅頗有神靈遞相誣告京都及郡縣被誅戮者數千餘家蜀王秀皆坐之隋室既亡其事亦寢出朝野僉載長星唐儀鳳年中有長星半天出東方三十餘日乃滅自是吐蕃叛胸奴反徐敬業亂白鐵余作逆博豫騷動忠萬強梁契丹翻營府突厥破趙定麻仁節張玄遇王孝傑等皆沒百萬衆三十餘年兵革不息出朝野僉載大烏唐調露之後有烏大如鳩色如烏雀飛若風聲千萬為隊時人謂之鵽雀亦名突厥雀若來突厥必至後則無差出朝野僉載蝦蟆唐高宗嘗患頭風召名醫於四方終不能療宮人有自陳世業醫術請修藥餌者帝許之初穿地置藥爐忽有一蝦蟆躍出色如黃金背有朱書武字宮人不敢匿奏之帝頗驚異遽命放於苑池宮人別穿地得蝦蟆如初帝深以為不祥命殺之其夕宮人暴卒後武后竟革命出瀟湘録幽州人天授中則天好改新字又多忌諱有幽州人尋如意上封云國字中或或亂天象請口中安武以鎮之則天大喜下制即依月餘有上封者云武退在口中與囚字無異不祥之甚則天愕然遽追制改令中為八方字後孝和即位果幽則天於上陽宮出朝野僉載默啜唐長安二年九月一日太陽蝕盡默啜賊到并州至十五日夜月蝕盡賊並退盡俗諺云棗子塞鼻孔懸樓閣卻種又云蟬鳴蛁蟟喚黍種糕糜斷又諺云春雨甲子赤地千里夏雨甲子乘船入市秋雨甲子禾頭生耳鵲巢下近地其年大水出朝野僉載張易之唐長安四年十月陰雨雪一百餘日不見星正月誅逆賊張易之昌宗等則天廢出朝野僉載孫儉唐幽州都督孫儉之入賊也薛訥與之書曰季月不可入賊大凶也儉曰六月宣王北伐訥何所知有敢言兵出不復者斬出軍之日有白虹垂頭於軍門其夜大星落於營內兵將無敢言者軍行後幽州界內鴉烏鴟鳶等並失皆隨軍去經二旬而軍沒烏鳶食其肉焉出朝野僉載太白晝見唐延和初七日按通鑑卷二百十延和秋七月彗星出西方日疑是月太白晝見經天其月太上皇遜帝位此易主之應也至八月九月太白又晝見改元先天至二月七日按唐書玄宗紀先天二年七月甲子誅太平公主蕭至忠岑羲等二月七日疑是二年七月太上皇廢誅中書令蕭至忠侍中岑羲流崔湜尋誅之出朝野僉載
