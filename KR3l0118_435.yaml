body:
  text: 太平廣記卷四百三十五畜獸二馬馬虜中護蘭馬五白馬也亦曰玉面謓真馬十三歲馬也以十三歲已下可以留種馬八尺戎馬八尺田馬七尺駑馬六尺瓜州飼馬以薲草沙州以茨萁涼州以勃突渾蜀以稗草以蘿蔔根飼馬馬肥安北飼馬以沙蓬狼針大食國解人語馬悉怛國怛幹國出好馬馬四歲兩齒至二十歲齒盡平體名有輸鼠外鳧烏頭龍翅虎口豬槽飼馬石灰泥槽汗而繫門三事落駒回毛在頸白馬黑馬鞍下腋下回毛在脅白毛左右後足白白馬四足黑目下橫毛黃馬白喙旋毛在吻後汗溝上通尾本目赤睫亂及反睫白馬黑目目白卻視並不可騎夜眼名附蟬戶肝名縣烽亦曰雞舌緑秩方言以地黃甘草啖五十歲生三駒吐火羅國波訕山陽石壁上有一孔恆有馬尿流出至七月平旦石崖間有石閣道便不見至此日厭噠人取草馬置池邊與集生駒皆汗血日行千里今名無數頗梨隨西域中浴須臾即回圖記云吐火蘿國北有屋數頗梨山即宋雲所云波訕山者也南崖穴中神馬糞流出商胡曹波比親見焉浴馬港疏水流也漢時常有馬數百匹出其中馬形皆小似巴滇馬遂名其孔為馬穴初得此馬乘出沔水上浴之遂名其處曰浴馬溉沔頓宿今名騎亭三國時陸遜攻襄陽又值此穴中有馬十匹遜載還建業漢章帝時蜀郡王阜為益州太守治化尤異神馬四匹出滇池河中唐武德五年三月景谷縣治西水有龍馬身長八九尺龍形有鱗甲橫文五色龍身馬首頂有二角白色口銜一物長可三四尺凌波回顧百餘步而沒西陵北陸行三十里有石穴名馬穴常有白馬出此穴人逐之潛行出漢中漢中人失馬亦出此穴相去數千里今馬穴山在峽州夷陵周穆王八駿周穆王即位三十二年巡行天下馭八龍之馬一名絶地足不踐土二名翻羽行越飛禽三名奔霄夜行萬里四名越影逐日而行五名踰輝毛色炳耀六名超光一形十影七名騰霧乘雲而趨八名挾翼身有肉翅遍而駕焉按轡徐行以巡天下之域穆王神智遠謀使轍迹遍於四海故絶地之物不期而自服漢文帝九逸漢文帝自代還有良馬九匹皆天下之駿一名浮雲二名赤電三名絶群四名逸驃五名紫燕騮六名緑螭驄七名龍子八名驎駒九名絶塵號名九逸有來宣能御馬代王號為王良焉隋文帝獅子驄隋文皇帝時大宛國獻千里馬鬃曳地號獅子驄上置之馬群陸梁人莫能制上令并群驅來謂左右曰誰能馭之郎將裴仁基曰臣能制之遂攘袂向前去十餘步踴身騰上一手撮耳一手摳目馬戰不敢動乃鞴乘之朝發西京暮至東洛後隋末不知所在唐文武聖皇帝敕天下訪之同州刺史宇文士及訪得其馬老于朝邑市麵家挽磑駿尾焦禿皮肉穿穴及見之悲泣帝自出長樂坡馬到新豐向西鳴躍帝得之甚喜齒口並平飼以鐘乳仍生五駒皆千里足也後不知所在唐玄宗龍馬海岱之間出玄黃石或云茹之可以長生玄宗皇帝嘗命臨淄守每歲採而貢焉開元二十七年江夏李雍為臨淄守是歲秋因入山採玄黃石忽遇一翁質甚妙而豐度明秀髭髯極豐衣褐衣自道左出叩李雍馬且告曰君侯躬自採藥豈不為延聖主之壽乎曰然翁曰聖主當獲龍馬則享國萬歲無勞採藥耳雍曰龍馬安在答曰當在齊魯之郊若獲之即是太平之符雖麟鳳龜龍不足以並其瑞雍方命駕以後乘遽亡見矣雍大異之顧謂從事曰得非神人乎即命其吏王乾貞者求龍馬於齊魯之間至開元二十九年夏五月乾貞果得馬於北海郡民馬會恩之家其色騅毛兩脅有鱗甲鬃尾若龍之鬐鬣嘶鳴真虛苖之音日馳三百里乾貞訊其所自會恩曰吾獨有牝馬常浴於淄水遂有胎而産因以龍子呼之乾貞即白於雍雍甚喜以表其事獻之上大悅詔內間廄異其芻豢命畫工圖其狀用頒示中外代宗九花虯代宗命御馬九花虯并紫玉鞭轡以賜郭子儀子儀固讓久之上曰此馬高大稱卿儀質不必讓也子儀身長六尺八寸九花虯即范陽節度使李懷仙所貢也額高九尺毛拳如鱗頭頸鬃鬣真虯龍也每一嘶即群馬聳耳以身被九花故號九花虯上往日東幸觀獵於田不覺日暮忽顧謂侍臣曰行宮去此幾里奏曰四十里上令速鞭恐礙夜而九花虯緩緩然如三五里而已侍從奔驟無有及者德宗神智驄德宗西幸有二馬一號神智驄一號如意騮皆如上意故常謂之功臣耳中有毛引之一尺馬經云耳中有毛者日行千里一日花柳方春上遊幸諸苑侍者進瑞鞭指二驄語近臣曰昔朕西幸有二駿謂之二絶今獲此鞭可謂三絶遂命酒飲之因吟曰鴛鴦赭白齒新齊曉日花開散碧蹄玉勒斗回初噴沫金鞭欲下不成嘶即中書舍人韓翃詩也德宗幸梁洋唯御騅馬號曰望雲騅駕還飼以一品料暇日牽而視之必長鳴四顧若感恩之狀後老死飛龍廄中貴戚盡為圖曹洪魏曹洪武帝從弟家盈産業駿馬成群武帝討董卓夜行失馬洪以其所乘馬曰白鶴與武帝乘此馬走唯覺耳中風聲腳似不踐地至深水洪不能得渡武帝引洪上馬共濟深水行數百里瞬息而至下視馬足毛尚皆濕帝衣猶沾濡時人謂乘風行也為一代神駿諺云憑空虛躍曹家白鶴司馬休之晉司馬休之為荊州宋公遣使圍之休之未覺常所乘馬養於床前忽連鳴不食注目視鞍休之試鞴之即不動鞴訖還坐馬又驚跳如此者數四騎馬即驟出門奔馳數里休之顧望已有使至矣遂去而獲免慕容廆慕容廆初有赭白馬常自乘之既為石虎所圍力弱分將危陷棄衆將逃以此馬奔而鞴之馬見鞍輒蹄齧不得近乃止俄而鄴使至石虎國有難虎旋歸至是時馬年四十九歲矣秦叔寶唐秦叔寶所乘馬號忽雷駮嘗飲以酒每于月明中試能豎越三領黑氈及胡公卒嘶鳴不食而死張納之德州刺史張納之一白馬其色如練父雄為數州刺史常乘雄薨子敬之為考功郎中改壽州刺史又乘此馬敬之薨弟納之從給事中相府司馬改德州刺史入為國子祭酒出為常州刺史至今猶在計八十餘極肥健行驟腳不散宋蔡廣平宋蔡娶同郡遊昌女蔡先代胡人也歸漢三世矣忽生一子深目而高鼻蔡疑其非嗣將不舉須臾赤草馬生一白駒蔡悟曰我家先有白馬種絶已二十五年今又復生吾曾祖貌胡今此子復其先也遂養之故曰白馬活胡兒此其謂也舞馬玄宗嘗命教舞馬四百蹄各為左右分為部目為某寵某家驕時塞外亦有善馬來貢者上俾之教習無不曲盡其妙因命衣以文繡絡以金銀飾其鬃鬣間雜珠玉其曲謂之傾杯樂者數十回奮首鼓尾縱橫應節又施三層板床乘馬而上旋轉如飛或命壯士舉一榻馬舞於榻上樂工數人立左右前後皆衣淡黃衫文玉帶必求少年而姿貌美秀者每千秋節命舞於勤政樓下其後上既幸蜀舞馬亦散在人間祿山常睹其舞而心愛之自是因以數匹賣於范陽其後轉為田承嗣所得不之知也雜之戰馬置之外棧忽一日軍中享士樂作馬舞不能已廝養皆謂其為妖擁篲以擊之馬謂其舞不中節抑揚頓挫猶存故態廝吏遽以馬怪白承嗣命箠之甚酷馬舞甚整而鞭撻愈加竟斃於櫪下時人亦有知其舞馬者懼暴而終不敢言續坤咸通乾符中京師醫者續坤頗得秦醫和之術評脈知吉凶休咎至於得失皆可預言適有燕中奏事大將暴得風疾服醫藥而愈所酬帛甚多仍以邊馬一匹留贈馬之骨相甚奇然步驟多蹶雖制以銜勒加之鞭策而款段之性竟莫能改坤以浪費芻粟託人以賤價賣之求駿者才試還復如此纍月不售鄰伍有王生貨易於中貴之門頗甚貧窶忽詣坤云有青州監軍將發須鞍馬備行李亦知馳騁非駿但欲置於牽控之間坤直以無用之畜付焉亦不約鬻馬之價自此經旬不至謂其脫略亡逸一旦復來所置且踰十萬坤既獲善價因以十千遺之俄見王生易衣裝致僕馬至於妻孥服飾亦皆鮮潔或曰王生賣馬金帛兼資計三四百萬坤甚驚試詢其事王生初不備説坤曰某以無用之物獲價頗多但未知駑劣之材何以至此云初致馬於青社監軍舉足如有羈絆及將還途遇小馬坊中使因遣留試信宿而往不復見焉密詢左右數日前魏博進一馬毛骨大小與此同聖人常乘打毬駿異未有偶將到日方遣調習步驟縈轉如風今則進御數朝所賜之物甚厚其後王生因大索起價遂以四百萬酬之是以物逢時亦有數不遇其主則駑驥莫分乃知耕莘野築傅巖未遇良途奚異于此楊翁佛漢廣陵楊翁佛聽鳥獸之音乘蹇驢之野田間有放眇馬相去鳴聲相聞翁佛謂其御者彼放馬目眇其御曰何以知之曰罵此轅中馬曰蹇此馬亦罵之曰眇其御不信使往視之目果眇焉季南季南乘赤馬行逢人乘白馬白馬先鳴赤馬應之南謂從者曰白馬言汝南見一黃馬左目盲是吾子可令快行相及也須臾果逢黃盲馬白馬先鳴盲馬應之趙固晉趙固所乘馬忽死因問郭璞璞曰可遣數十人持竹竿東行三十里有山陵林樹便攪打之當有一物出急抱將歸於是如璞言果得一物似猴入門見死馬跳梁走往死馬頭噓吸其鼻馬即能起亦不見猴韓晞唐韓晞常知永豐倉有一馬乘來日久遇過客有一蜀馬齧頗甚晞令取來繫于庭樹晞謂客曰此小馬豈能如此但亦痛治耳晞有圉人善騎調惡馬即令召之遣取鞭轡此馬努目斜睨於晞忽然掣韁走上階跑晞落床屈膝于地將齧之時晞所乘馬繫在別柱見此亦掣斷韁來齧此馬遂齧數口方得免衆買此馬殺而食之晞自後彌愛其馬焉江東客馬頃歲江東有一客常乘一馬頗有重性客常於飲處醉甚獨乘馬至半路沉醉從馬上倚著一樹而睡久不動直至五更客奴尋覓方始扶策而馬當時倒地久乃能起病十餘日方愈此人無何以馬賣與宣州館家經二年客後得一職奉使至宣州知馬在焉請乘此馬此馬索視良久知本主也既乘遂躍此人於地踐齧頗甚衆救乃免意恨其賣己也陳璋淮南統軍陳璋加平章事拜命於朝李升時執政謂璋曰吾將詣公賀且求一女壻於公家公其先歸吾將至璋馳一赤馬而去中路馬蹶而墜頃之升至璋扶疾而出升至少選即去璋召馬數之曰吾以今日拜官又議親事爾乃以是而墜我畜生不忍即殺使牽去勿與芻秣餓殺之是夕圉人竊具芻粟馬視之而已達旦不食如是纍日圉人以告璋復召語之曰爾既知罪吾赦爾馬跳躍而去是夕乃飲䬣如故璋後出鎮宣城罷歸而薨旬月馬亦悲鳴而死
