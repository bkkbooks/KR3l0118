body:
  text: 公孫綽公孫綽唐王屋主簿公孫綽到官數月暴疾而殞未及葬縣令獨在廳中見公孫具公服從門而入驚起曰與公幽顯異路何故相干公孫曰某有冤要見長官請雪嘗忝僚佐豈遽無情某命未合盡為奴婢所厭以利盜竊某宅在河陰縣長官有心儻為密選健吏齎牒往捉必不漏網宅堂簷從東第七瓦壟下有某形狀以桐為之釘布其上已變易矣言訖而沒令異甚乃擇彊卒素為綽所厚者持牒并書與河陰宰其奴婢盡捕得遂於堂簷上搜之果獲人形長尺餘釘遶其身木漸為肉擊之啞然有聲綽所貯粟麥以俟閒居之費者悉為所盜矣縣遂申府奴婢數人皆殪枯木出逸史王安國涇之北鄙農人有王安國者力穡衣食自給唐寶曆三年冬夜有二盜踰牆而入皆執利刃安國不敢支梧而室內衣裘挈之無孑遺安國一子名何七年甫六七歲方眠驚起因叫有賊登時為賊射應弦而斃安國閭外有二驢紫色者亦為攘去遲明村人集聚共商量捕逐之路俄而何七之魂登房門而號我死自是命那復多痛所痛者永訣父孃耳遂冤泣久之鄰人會者五六十人皆為雪涕因曰勿謀追逐明年五月當自送死乃召安國附耳告之名氏仍期勿勿下疑脫泄字洎麥秋安國有麥半頃方收拾晨有二牛來蹊踐狼籍安國牽歸遍謂里中曰誰牛傷暴我苗我已繫之牛主當齎償以購不爾吾將詣官焉里中共往皆曰此非左側人之素畜者聚視久之忽有二客至曰我牛也昨暮驚逃不虞至此所損之田請酬倍資而歸我畜焉共里人詰所從因驗契書其一乃以紫驢交致也安國即醒何七所謂及詢名姓皆同遂縛之曰爾即去冬射我子盡我財者二盜相顧不復隱曰天也命也死不可逭也即述其故曰我既行劫殺遂北竄寧慶之郊謂事已積久因買牛將歸岐上昨牛抵村北二十里徘徊不進俟夜黑方將過此既寐夢一小兒五歲許裸形亂舞紛紜相迷經宿方寤及覺二牛之縻紖不斷如被解脫則已竄矣因蹤跡之由徑來至此去冬之寇詎敢逃焉里人送邑皆准於法出集異記尼妙寂姓葉氏江州潯陽人也初嫁任華潯陽之賈也父昇與華往復長沙廣陵間唐貞元十一年春之潭州不復過期數月妙寂忽夢父被髮裸形流血滿身泣曰吾與汝夫湖中遇盜皆已死矣以汝心似有志者天許復讎但幽冥之意不欲顯言故吾隱語報汝誠能思而復之吾亦何恨妙寂曰隱語云何昇曰殺我者車中猴門東草俄而見其夫形狀若父泣曰殺我者禾中走一日夫妙寂撫膺而哭遂為女弟所呼覺泣告其母闔門大駭念其隱語杳不可知訪於鄰叟及鄉閭之有知者皆不能解秋詣上元縣舟楫之所交處四方士大夫多憩焉而又邑有瓦棺寺寺上有閣倚山瞰江萬里在目亦江湖之極境遊人弭棹莫不登眺吾將緇服其間伺可問者必有醒吾惑者於是褐衣上元捨力瓦棺寺日持箕帚灑掃閣下閒則徙倚欄檻以伺識者見高冠博帶吟嘯而來者必拜而問居數年無能辯者十七年歲在辛巳有李公佐者罷嶺南從事而來攬衣登閣神彩雋逸頗異常倫妙寂前拜泣且以前事問之公佐曰吾平生好為人解疑況子之冤懇而神告如此當為子思之默行數步喜招妙寂曰吾得之矣殺汝父者申蘭殺汝夫者申春耳妙寂悲喜嗚咽拜問其說公佐曰夫猴申生也車去兩頭而言猴故申字耳草而門門而東非蘭字耶禾中走者穿田過也此亦申字也一日又加夫蓋春字耳鬼神欲惑人故交錯其言妙寂悲喜若不自勝久而掩涕拜謝曰賊名既彰雪冤有路苟或釋惑誓報深恩婦人無他唯潔誠奉佛祈增福海初泗州普光王寺有梵氏戒壇人之為僧者必由之四方輻輳僧尼繁會觀者如市焉公佐自楚之秦維舟而往觀之有一尼眉目朗秀若舊識者每過必凝視公佐若有意而未言者久之公佐將去其尼遽呼曰侍御貞元中不為南海從事乎公佐曰然然則記小師乎公佐曰不記也妙寂曰昔瓦官寺閣求解車中猴者也公佐悟曰竟獲賊否對曰自悟夢言乃男服易名士寂泛傭於江湖之間數年聞蘄黃之間有申村因往焉流轉周星乃聞其村西北隅有名蘭者默往求傭輒賤其價蘭喜召之我又聞其從父弟有名春者於是勤恭執事晝夜不離見其可為者不顧輕重而為之未嘗待命蘭家器之晝與郡傭苦作夜寢他席無知其非丈夫者逾年益自勤幹蘭逾敬念視士寂即目視其子不若也蘭或農或商或畜貨於武昌關鎖啟閉悉委焉因驗其櫃中半是己物亦見其父及夫常所服者垂涕而記之而蘭春叔出季處未嘗偕出慮其擒一而驚逸也銜之數年永貞年重陽二盜飲既醉士寂奔告於州乘醉而獲一問而辭伏就法得其所喪以歸盡奉母而請從釋教師洪州天宮寺尼洞微即昔時受教者也妙寂一女子也血誠復讎天亦不奪遂以夢寐之言獲悟於君子與其讎者得不同天碎此微驅豈酬明哲梵宇無他唯虔誠法象以報效耳公佐大異之遂為作傳大和庚戌歲隴西李復言遊巴南與進士沈田會於蓬州田因話奇事持以相示一覽而復之錄怪之日逐纂於此焉出續幽怪錄李文敏唐李文敏者選授廣州錄事參軍將至州遇寇殺之沈於江俘其妻崔氏有子五歲隨母而去賊即廣州都虞候也其子漸大令習明經甚聰俊詣京赴舉下第乃如華州及渭南縣東馬驚走不可制及夜入一莊中遂投莊宿有所衣天淨紗汗衫半臂者主嫗見之曰此衣似頃年夫人與李郎送路之衣郎既似李郎復似小娘子取其衣視之乃頃歲製時為燈燼燒破半臂帶猶在其家遂以李文敏遭寇之事說之此子罷舉徑歸問母具以其事對乃白官官乃擒都虞候繫而詰之所占一詞不謬乃誅之而給其物力令歸渭南焉出聞奇錄樊宗諒唐樊宗諒為密州刺史時屬邑有群盜提兵入邑甿殷氏家掠奪金帛殺其父子死者三人刺史捕之甚急月餘不獲有鉅鹿魏南華者寓居齊魯之間家甚貧宗諒命攝司法掾一夕南華夢數人皆被髮列訴於南華曰姓殷氏父子三人俱無罪而死願明公雪其冤南華曰殺汝者為誰對曰某所居東十里有姓姚者乃賊之魁也南華許諾驚寤數日數日明鈔本作即日宗諒謂南華曰盜殺吾甿且一月矣莫窮其跡豈非吏不奉職乎爾為司法官第往驗之南華馳往未至忽見一狐起於路旁深草中馳入里人姚氏所居譟而逐者以百數其狐入一穴中南華命以鍤發之得金帛甚多乃群盜劫殷氏財也即召姚氏子訊其所自目動詞訥即收劾之果盜之魁也自是盡擒其支黨且十輩其狐雖匿於穴中窮之卒無所見也豈非冤魂之所假歟時大和中也出宣室志滎陽氏唐盈州令將之任夜止屬邑古寺方寢見老嫗以桐葉蒙其首傴僂而前令以拄杖拂其葉嫗俯拾而去俄亦復來如是者三久之不復來矣頃有縗裳者自北戶升階褰簾而前曰將有告於公公無懼焉令曰是何妖物曰實鬼也非妖也以形容衰瘵不敢干謁向者竊令張嬭少達幽情而三遭拄杖之辱老嬭固辭恥其復進是以自往哀訴冀不逢怒焉某滎陽氏子嚴君牧此州未逾年鍾家禍乃護喪歸洛夜止此寺繼母賜冶葛花湯并室妹同夕而斃張嬭將哭首碎鐵鎚同瘞於北牆之竹陰某隴西先夫人即日訴於上帝帝敕云為人之妻已殘戮僕妾為人之母又毒殺孤嬰居闇室事難彰明在天鑒理宜誅殛以死酬死用謝諸孤付司命處置訖報是日先君復訴於上帝云某遊魂不靈乖於守慎致令嚚室害及孤孩彰此家風黷於天聽豈止一死能謝罪名某三任縣令再剖符竹實有能績以安黎甿豈圖餘慶不流見此狼狽悠揚丹旐未越屬城長男既已無辜孀婦又俾酬死念某旅櫬難為瘞埋伏乞延其生命使某得歸葬洛陽獲先人之瑩闕某無恨矣明年繼母到洛陽發背疽而卒上帝譴怒已至如此今某即無怨焉所苦者被僧徒築溷於骸骨之上糞穢之弊所不堪忍況妹為廁神姬僕身為廁神役夫積世簪纓一日淩墜天門阻越上訴無階籍公仁德故來奉告令曰吾將奈何答曰公能發某朽骨沐以蘭湯覆以衣衾遷於高原之上脫能賜木皮之棺蘋藻之奠亦望外也令曰諾乃吾反掌之易爾鬼嗚咽再拜令張嬭密召鸞娘子同謝明公張嬭遽至疾呼曰郭君怒晚來軒屏狼藉已三召矣於是縗裳者慞惶而去明旦令召僧徒具以所告遂命土工發溷以求之三四尺乃得骸骨與改瘞焉
