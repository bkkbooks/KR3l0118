body:
  text: 孔緯孔緯魯國公孔緯入相后言于甥侄曰吾頃任兵部侍郎與王晉公鐸充弘文館學士判館事上任后巡廳晉公乃言曰余昔任兵部侍郎與相國杜邠公悰充弘文館直學士判館事暮春留余看牡丹于斯廳內言曰此廳比令無逸居之止要一間今壯麗如此子殊不知非久須為灰燼余聞此言心常銘之又語余曰明公將來亦据此座猶或庶幾由公而下者罹其事矣以吾今日觀之則邠公之言得其大概矣是時昭宗纂承孔緯入相朝庭事體掃地無余故緯感昔言而傷時也李克助李克助為大理卿昭宗在華州鄭縣令崔鑾有民告舉放絁絹價刺史韓建令計以為贓奏下三司定罪御史台刑部奏罪當絞大理寺數月不奏建問李尚書崔令乃親情耶何不奏克助云裨公之政也韓云崔令犯贓奈何言我之過也李云聞公舉放數將及萬矣韓曰我華州節度華民我民也李曰華民乃天子之民非公之民若爾即鄭縣民乃崔令民也建伏其論乃舍崔令之罪謫穎陽尉京都儒士近者京都有數生會宴因說人有勇怯必由膽氣膽氣若盛自無所懼可謂丈夫座中有一儒士自媒曰若言膽氣余實有之衆人笑曰必須試然可信之或曰某親故有宅昔大凶而今已空鎖君能獨宿于此宅一宵不懼者我等酬君一局此人曰唯命明日便往實非凶宅但暫空耳遂為置酒果燈燭送于此宅中衆曰公更要何物曰仆有一劍可以自衛請無憂也衆乃出宅鎖門卻歸此人實怯懦者時已向夜系所乘驢別屋奴客并不得隨遂向閣宿了不敢睡唯滅燈抱劍而坐驚怖不已至三更有月上斜照窗隙見衣架頭有物如鳥鼓翼翻翻而動此人凜然強起把劍一揮應手落壁磕然有聲后寂無音響恐懼既甚亦不敢尋究但把劍坐及五更忽有一物上階推門門不開于狗竇中出頭氣休休然此人大怕把劍前斫不覺自倒劍失手拋落又不敢覓劍恐此物入來床下跧伏更不敢動忽然困睡不覺天明諸奴客已開關至閣子間但見狗竇中血淋漓狼藉衆大驚呼儒士方悟開門尚自戰栗具說昨宵與物戰爭之狀衆大駭異遂于此壁下尋唯見席帽半破在地即夜所斫之鳥也乃故帽破弊為風所吹如鳥動翼耳劍在狗竇側衆又繞堂尋血蹤乃是所乘驢已斫口喙唇齒缺破乃是向曉因解頭入狗門遂遭一劍衆大笑絶倒扶持而歸士人驚悸旬日方愈孟乙徐之蕭縣有田民孟乙者善网狐貉百無一失偶乘暇持槊行曠野會日將夕見道左數百步荒冢巋然草間細徑若有人跡遂入之以槊于黑暗之處攪之若有人捉拽之不得動問爾鬼耶人耶怪耶魅耶何故執吾槊而不置暗中應曰吾人也乃命出之具以誠告云我姓李昨為盜被系兗州軍候獄五木備體捶楚之處瘡痏遍身因伺隙逾獄垣亡命之此死生唯命焉孟哀而將歸置于復壁中后經赦乃出孟氏以善獵知名飛走之屬無得脫者一旦荒冢之中而得叛獄囚以歸聞者皆大笑之振武角抵人光啓年中左神策軍四軍軍使王卞出鎮振武置宴樂戲既畢乃命角抵有一夫甚魁岸自鄰州來此較力軍中十數輩軀貌膂力悉不能敵主帥亦壯之遂選三人相次而敵之魁岸者俱勝帥及座客稱善久之時有一秀才坐于席上忽起告主帥曰某撲得此人主帥頗駭其言所請既堅遂許之秀才降階先入廚少頃而出遂掩綰衣服握左拳而前魁梧者微笑曰此一指必倒矣及漸相逼急展左手示之魁岸者懵然而倒合座大笑秀才徐步而出盥手而登席焉主帥詰之何術也對曰頃年客游曾于道店逢此人才近食桉踉蹌而倒有同伴曰怕醬見之輒倒某聞而志之適詣設廚求得少醬握在手中此人見之果自倒聊助宴設之歡笑耳有邊岫判官目睹其事趙崇趙崇凝重清介門無雜賓慕王濛劉真長之風也標格清峻不為文章號曰無字碑每遇轉官舊例各舉一人自代而崇未嘗舉人云朝中無可代己者世以此少之韓偓天復初入翰林其年冬車駕幸鳳翔偓有卮從之功返正初帝面許用偓為相偓奏云陛下運契中興當須用重德鎮風俗臣座主右仆射趙崇可以副陛下是選乞回臣之命授崇天下幸甚帝甚嘉歎翼日制用崇暨兵部侍郎王贊為相時梁太祖在京素聞崇輕佻贊又有嫌釁乃馳入請見于帝前具言二公長短帝曰趙崇乃韓偓荐時偓在側梁王叱之偓奏臣不敢與大臣爭帝曰韓偓出尋謫官入閩故偓詩曰手風慵展八行書眼病休看九局基窗里日光飛野馬案前筠管長蒲盧謀身拙為安蛇足報國危曾捋虎須滿世可能無默識未知誰擬試齊竽薛昌緒岐王李茂貞霸秦隴也涇州書記薛昌緒為人迂僻稟自天性飛文染翰即不可得之矣與妻相見亦有時必有禮容先命女仆通轉往來數四可之然后秉燭造室至于高談虛論茶果而退或欲詣幃房其禮亦然嘗曰某以繼嗣事重輒欲卜其嘉會必候請而可之及從涇帥統衆于天水與蜀人相拒于青泥嶺岐衆迫于輦運又聞梁人入境遂潛師宵遁頗懼蜀人之掩襲涇帥臨行攀鞍忽記曰傳語書記速請上馬連促之薛在草庵下藏身曰傳語太師但請先行今晨是某不樂日戎帥怒使人提上鞍轎捶其馬而逐之尚以物蒙其面云忌日禮不見客此蓋人妖也秦隴人皆知之姜太師蜀有姜太師者失其名許田人也幼年為黃巾所掠亡失父母從先主征伐屢立功勳后繼領數鎮節鉞官至極品有掌廄夫姜老者事芻秣數十年姜每入廄見其小過必笞之如是積年計其數將及數百后老不任鞭棰因泣告夫人乞放歸鄉里夫人曰汝何許人對曰許田人復有何骨肉對曰當被掠之時一妻一男迄今不知去處又問其兒小字及妻姓氏行第并房眷近親皆言之及姜歸宅夫人具言姜老欲乞假歸鄉因問得所失男女親屬姓名姜大驚疑其父也使人細問之其男身有何記驗曰我兒腳心上有一黑子余不記之姜大哭密遣人送出劍門之外奏先主曰臣父近自關東來遂將金帛車馬迎入宅父子如初姜報撻父之過齊僧數萬終身不撻從者康義誠后唐長興中侍衛使康義誠常軍中差人于私宅充院子亦曾小有笞責忽一日憐其老而詢其姓氏則曰姓康別詰其鄉土親族息胤方知是父遂相持而泣聞者莫不驚異高季昌后唐莊宗過河荊渚高季昌謂其門客梁震曰某事梁祖僅獲自免龍德已來止求安活我今入覲亦要嘗之彼若經營四方必不縻我若移入他鎮可為子孫之福此行決矣既自闕回謂震曰新主百戰方得河南對勳臣夸手抄春秋又豎指云我于指頭上得天下則功在一人臣佐何有且游獵旬日不回中外情何以堪吾高枕無憂乃筑西面羅城拒敵之具不三年莊宗不守英雄之料頃刻不差宜乎貽厥子孫沈尚書妻有沈尚書失其名常為秦帥親吏其妻狼戾而不謹又妒忌沈常如在狴牢之中后因閒退挈其妻孥寄于鳳州自往東川游索意是與怨偶永絶矣華洪鎮東蜀與沈有布衣之舊呼為兄既至郊迎執手敘其契闊待之如親兄遂特創一第仆馬金帛器玩無有缺者送姬仆十余輩斷不令歸北沈亦微訴其事無心還家及經年家信至其妻已離鳳州自至東蜀沈聞之大懼遂白于主人及遣人卻之其妻致書重設盟誓云自此必改從前之性願以偕老不日而至其初至頗亦柔和涉旬之后前行復作諸姬婢仆悉鞭棰星散良人頭面皆拿擘破損華洪聞之召沈謂之曰欲為兄殺之如何沈不可如是旬日后又作沈因入衙精神沮喪洪知之密遣二人提劍牽出帷房刃于階下棄尸于潼江然后報沈沈聞之不勝驚悸遂至失神其尸住急流中不去遂使人以竹竿撥之便隨流來日復在舊湍之上如是者三洪使系石縋之沈亦不逾旬失魂而逝得非怨偶為仇也悲哉沈之宿有仇乎楊蘧王贊中朝名士有弘農楊蘧者曾至嶺外見楊朔荔浦山水心常愛之談不容口蘧嘗出入贊門下稍接從容不覺形于言曰侍郎曾見楊朔荔浦山水乎贊曰未曾打人唇綻齒落安得見耶因大笑此言嶺外之地非貶不去袁繼謙晉將少作監袁繼謙常說頃居青社假一第而處之聞多凶怪昏瞑即不敢出戶庭合門驚懼莫能安寢忽一夕聞吼聲若有呼于瓮中者其聲重濁舉家師懼必謂其怪之尤者遂于窗隙窺之見一物蒼黑色來往庭中是夕月色晦睹之既久似若狗身而首不能舉遂以撾擊其腦忽轟然一聲家犬驚叫而去蓋其日莊上人輸稅至此就于其地而糜釜尚有余者故犬以首入空器中而不能出也因舉家大笑遂安寢帝晉開運末契丹主耶律德光自汴歸國殂于趙之欒城國人破其腹盡出五髒納鹽石許載之以歸時人謂之帝
