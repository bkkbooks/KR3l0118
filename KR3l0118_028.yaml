body:
  text: 郗鑒郗鑒滎陽鄭曙著作郎鄭虔之弟也博學多能好奇任俠嘗因會客言及人間奇事曙曰諸公頗讀晉書乎見太尉郗鑒事跡否晉書雖言其人死今則存坐客驚曰願聞其說曙曰某所善武威段揚為定襄令揚有子曰䂮少好清虛慕道不食酒肉年十六請於父曰願尋名山訪異人求道揚許之賜錢十萬從其志段子天寶五載行過魏郡舍於逆旅逆旅有客焉自駕一驢市藥數十斤皆養生辟穀之物也而其藥有難求未備者日日於市邸謁胡商覔之䂮視此客七十餘矣雪眉霜鬚而貌如桃花亦不食穀䂮知是道者大喜伺其休暇市珍果美膳藥食醇醪薦之客甚驚謂䂮曰吾山叟市藥來此不願世人知子何得覺吾而致此耶䂮曰某雖幼齡性好虛靜見翁所為必是道者故願歡會客悅為飲至夕因同宿數日事畢將去謂䂮曰吾姓孟名期思居在恆山於行唐縣西北九十里子欲知吾名氏如此恝又為祖餞叩頭誠祈願至山中咨受道要叟曰若然者觀子志堅可與居矣然山中居甚苦須忍饑寒故學道之人多生退志又山中有耆宿當須啓白子熟計之䂮又固請叟知其有志乃謂之曰前至八月二十日當赴行唐可於西北行三十里有一孤姥莊莊內孤姥甚是奇人汝當謁之因言行意坐以須我䂮再拜受約至期而往果得此孤莊老姥出問之恝具以告姥姥撫背言曰小子年幼若此而能好道美哉因納其囊裝於匱中坐䂮于堂前閣內姥家甚富給䂮所須甚厚居二十日而孟先生至顧䂮言曰本謂率語耳寧期果來然吾有事到恆州汝且居此數日當返如言卻到又謂䂮曰吾更啓白耆宿當與君俱往數日復來令姥盡收掌䂮資裝而使䂮持隨身衣衾往䂮於是從先生入初行三十里大艱險猶能踐履又三十里即手捫藤葛足履嵌巖魂竦汗出而僅能至其所居也則東向南向盡崇山巨石林木森翠北面差平即諸陵嶺西面懸下層溪千仞而有良田山人頗種植其中有瓦屋六間前後數架在其北諸先生居之東廂有廚竈飛泉簷間落地以代汲井其北戶內西二間為一室閉其門東西間為二室有先生六人居之其室前廡下有數架書三二千卷穀千石藥物至多醇酒常有數石䂮既謁諸先生先生告曰夫居山異於人間亦大辛苦須忍饑餒食藥餌能甘此乃可居子能之乎䂮曰能於是留止凡五日孟先生曰今日盍謁老先生於是啓西室室中有石堂堂北開直下臨眺川谷而老先生據繩床北面而齊心焉䂮敬謁拜老先生先生良久開目謂孟叟曰是爾所言者耶此兒佳矣便與汝充弟子於是辭出又閉戶其庭前臨西澗有松樹十株皆長數仞其下磐石可坐百人則於石中鐫局諸先生休暇常對棊而飲酒焉䂮為侍者覩先生棊皆不工也因教其形勢諸先生曰汝亦曉棊可坐因與諸叟對叟皆不敵於是老先生命開戶出植杖臨崖而立西望移時因顧謂叟可對棊孟期思曰諸人皆不敵此小子老先生笑因坐召䂮與爾對之既而先生棊少劣於䂮又微笑謂䂮曰欲習何藝乎䂮幼年不識求方術而但言願且受周易老先生詔孟叟受之老先生又歸室閉其門䂮習易踰年而日曉占候布卦言事若神䂮在山四年前後見老先生出戶不過五六度但於室內端坐繩床正心禪觀動則三百二百日不出老先生常不多開目貌有童顏體至肥充都不復食每出禪時或飲少藥汁亦不識其藥名後老先生忽云吾與南嶽諸葛仙家為期今到矣須去䂮在山久忽思家因請還家省覲即卻還孟先生怒曰歸即歸矣何卻還之有因白老先生先生讓孟叟曰知此人不終何與來也於是使歸歸後一歲又卻尋諸先生至則室屋如故門戶封閉遂無一人下山問孤莊老姥姥曰諸先生不來尚明鈔本尚作向一年矣䂮因悔恨殆死䂮在山間常問孟叟老先生何姓名叟取晉書郗鑒傳令讀之謂曰欲識老先生即郗太尉也出記聞僧契虛有僧契虛者本姑臧李氏子其父為御史於玄宗時契虛自孩提好浮圖氏法年二十髡髮衣褐居長安佛寺中及祿山破潼關玄宗西幸蜀門契虛遁入太白山採柏葉而食之自是絶粒嘗一日有道士喬君貌清瘦鬚鬢盡白來詣契虛謂契虛曰師神骨甚孤秀後當遨遊仙都中矣契虛曰吾塵俗之人安能詣仙都乎喬君曰仙都甚近師可力去也契虛因請喬君導其徑喬君曰師可備食於商山逆旅中遇捀子音奉即荷竹橐而販也即犒於商山而饋焉或有問師所詣者但言願遊稚川川原作用據黃刻本改當有捀子導師而去矣契虛聞其言喜且甚及祿山敗上自蜀門還長安天下無事契虛即往商山舍逆旅中備甘潔以伺捀子而饋焉僅數月遇捀子百餘俱食畢而去契虛意稍怠且謂喬君見欺將歸長安既治裝是夕一捀子年甚少謂契虛曰吾師安所詣乎契虛曰吾願遊稚川有年矣捀子驚曰稚川仙府也吾師安得而至乎契虛對曰吾始自孩提好神仙常遇至人勸我遊稚川路幾何耳捀子曰稚川甚近師真能偕我而去乎契虛曰誠能遊稚川死不悔於是捀子與契虛俱至藍田上治具其夕即登玉山涉危險逾巖巘且八十里至一洞水出洞中捀子與契虛共挈石填洞口以壅其流三日洞水方絶二人俱入洞中昏晦不可辨見一門在數十里外遂望門而去既出洞外風日恬煦山水清麗真神仙都也又行百餘里登一高山其山攢峰逈拔石徑危峻契虛眩惑不敢登捀子曰仙都且近何為倣徨耶即挈手而去既至山頂其上坦平下視川原邈然不可見矣又行百餘里入一洞中及出見積水無窮水中有石徑橫尺餘縱且百里餘捀子引契虛躡石徑而去至山下前有巨木煙影繁茂高數千尋捀子登木長嘯久之忽有秋風起於林杪俄見巨繩系一行橐自山頂而縋捀子命契虛瞑目坐橐中僅半日捀子曰師可寤而視矣契虛既望已在山頂見有城邑宮闕璣玉交映在雲物之外捀子指語此稚川也於是相與詣其所見仙童百輩羅列前後有一仙人謂捀子曰此僧何為者豈非人間人乎捀子曰此僧常願遊稚川故挈而至此已而至一殿上有具簪冕者貌甚偉憑玉几而坐侍衛環列呵禁極嚴捀子命契虛謁拜且曰此稚川真君也契虛拜真君召契虛上訊曰爾絶三彭之仇乎不能對真君曰真不可留於此因命捀子登翠霞亭其亭亘空居檻雲矗見一人袒而瞬目髮長數十尺凝膩黯黑洞瑩心目捀子謂契虛曰爾可謁而拜契虛既拜且問此人為誰何瞬目乎捀子曰此人楊外郎也外郎隋氏宗室為外郎於南宮屬隋末天下分磔兵甲大擾因避地居山今已得道此非瞬目乃徹視者夫徹視者寓目於人世耳契虛曰請寤其目可乎捀子即面請外郎忽寤而四視其光益著若日月之照契虛悸然背汗毛髮盡徑又見一人臥石壁之下捀子曰此人姓乙支潤其名亦人間之人得道而至此已而捀子引契虛歸其道途皆前時之涉歷契虛因問捀子曰吾向者謁見真君真君問我三彭之仇我不能對曰彭者三尸之姓常居人中伺察其罪每至庚申日籍於上帝故學仙者當先絶其三尸如是則神仙可得不然雖苦其心無補也契虛悟其事自是而歸因廬於太白山絶粒吸氣未嘗以稚川之事語於人貞元中徙居華山下有滎陽鄭紳與吳興沈聿俱自長安東出關行至華山下會天暮大雨二人遂止契虛以絶粒故不致庖爨鄭君異其不食而骨狀豐秀因徵其實契虛乃以稚川之事告於鄭鄭好奇者既聞其事且歎且驚及自關東回重至契虛舍其契虛已遁去竟不知所在鄭君常傳其事謂之稚川記適出宣室志
