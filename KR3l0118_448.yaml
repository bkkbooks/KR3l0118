body:
  text: 李項生李項生唐垂拱初譙國公李崇義男項生染病其妻及女于側侍疾忽有一狐從項生被中走出俄失其所在數日項生亡王義方唐前御史王義方黜萊州司戶參軍去官歸魏州以講授為業時鄉人郭無為頗有術教義方使野狐義方雖能呼得之不伏使卻被群狐競來惱每擲瓦甓以擊義方或正誦讀即襲碎其書聞空中有聲云有何神術而欲使我乎義方竟不能禁止無何而卒何讓之唐神龍中廬江何讓之赴洛遇上巳日將陟老君廟瞰洛中遊春冠蓋廟之東北二百餘步有大丘三四時亦號後漢諸陵故張孟陽七哀詩云恭文遙相望原陵郁膴膴原陵即光武陵一陵上獨有枯柏三四枝其下盤石可容數十人坐見一翁姿貌有異常輩眉鬢皓然著賨幪巾襦褲幘烏紗抱膝南望吟曰野田荊棘春閨閣綺羅新出沒頭上日生死眼前人欲知我家在何處北邙松柏正為鄰俄有一貴戚金翠車輿如花之婢數十連袂笑樂而出徽安門抵榆林店又睇中橋之南北垂楊拂于天津繁花明于上苑紫禁綺陌軋亂香塵讓之方歎栖遲獨行踽踽已訝前吟翁非人翁忽又吟曰洛陽女兒多無奈孤翁老去何讓之遽欲前執翁倏然躍于丘中讓之從焉初入丘曛黑不辨其逐翁已復本形矢遂見一狐跳出尾有火焰如流星讓之卻出玄堂之外門東有一筵已空讓之見一幾案上有朱盞筆硯之類有一帖文書紙盡慘灰色文字則不可曉解略記可辨者其一云正色鴻燾神思化代穹施后承光負玄設嘔淪吐朋垠倪散截迷腸郗曲霨零霾曀雀燬龜冰健馳御屈拿尾研動袾袾晰晰用祕功以嶺以穴柂薪伐藥莽榤萬茁嘔律則祥佛倫惟薩牡虛無有頤咽蕊屑肇素未來晦明興滅其二辭曰五行七曜成此閏余上帝降靈歲旦涒徐蛇蛻其皮吾亦神攄九九六六束身天除何以充喉吐納太虛何以蔽踝霞袂云袽哀爾浮生櫛比荒墟吾復麗氣還形之初在帝左右道濟忽諸題云應天狐超異科策八道后文甚繁難以詳載讓之獲此書帖喜而懷之遂躍出丘穴后數日水北同德寺僧志靜來訪讓之説云前者所獲丘中文書非郎君所用留之不祥其人近捷上界之科可以禍福中國郎君必能卻歸此他亦酬謝不薄其人謂志靜曰吾已備三百縑欲贖購此書如何讓之許諾志靜明日挈三百縑送讓之讓之領訖遂話志靜言其書以為往還所借更一兩日當征之便可歸本讓之復為朋友所説云此僧亦是妖魅奈何欲還之所納絹但諱之可也后志靜來讓之悉諱云殊無此事兼不曾有此文書志靜無言以退經月余讓之先有弟在東吳別已逾年一旦其弟至焉與讓之話家私中外甚有道長夜則兄弟聯床經五六日忽問讓之某聞此地多狐作怪誠有之乎讓之遂話其事而夸云吾一月前曾獲野狐之書文一帖今見存焉其弟固不信寧有是事讓之至遲旦揭篋取此文書帖示弟弟捧而驚歎即擲于讓之前化為一狐矣俄見一美少年若新官之狀跨白馬南馳疾去適有西域胡僧賀云善哉常在天帝左右矣少年歎讓之相紿讓之嗟異未幾遂有敕捕內庫被人盜貢絹三百匹尋蹤及此俄有吏掩至直挈讓之囊檢焉果獲其縑已費數十匹執讓之赴法讓之不能雪卒斃枯木沈東美唐沈東美為員外郎家有青衣死且數歲忽還家曰吾死為神今憶主母故來相見但吾餓請一餐可乎因命之坐仍為具食青衣醉飽而去及暮僮發草積下得一狐大醉須臾狐乃吐其食盡婢之食也乃殺之楊伯成唐開元初為京兆少尹一日有人詣門通云吳南鶴伯成見年三十余身長七尺容貌甚盛引之升座南鶴文辨無雙伯成接對不暇久之請屏左右欲有密語乃云聞君小娘子令淑願事門下伯成甚愕謂南鶴曰女因媒而嫁且邂逅相識君何得便爾南鶴大怒呼伯成為老奴我索汝女何敢有逆慢辭甚衆伯成不知所以南鶴徑脫衣入內直至女所坐紙隔子中久之與女兩隨而出女言今嫁吳家何因嗔責伯成知是狐魅令家人十余輩擊之反被料理多遇泥塗兩耳者伯成以此請假二十余日敕問何以不見楊伯成皆言其家為狐惱詔令學葉道士術者十余輩至其家悉被泥耳及縛無能屈伏伯成以為愧恥及賜告舉家還莊于莊上立吳郎院家人竊罵皆為料理以此無敢言者伯成暇日無事自于田中看人刈麥休息于樹下忽有道士形甚瘦悴來伯成所求漿水伯成因爾設食食畢道士問君何故憂愁伯成懼南鶴附耳説其事道士笑曰身是天仙正奉帝命追捉此等四五輩因求紙筆楊伯成使小奴取之然猶懼其知覺戒令無喧紙筆至道士書作三字狀如古篆令小奴持至南鶴所放前云尊師喚汝奴持書入房見南鶴方與家婢相謔奴以書授之南鶴見書匍匐而行至樹下道士呵曰老野狐敢作人形遂變為狐異常病疥道士云天曹驅使此輩不可殺之然以君故不可徒爾以小杖決之一百流血被地伯成以珍寶贈饋道士不受驅狐前行自后隨之行百餘步至柳林邊冉冉升天久之遂滅伯成喜甚至于舉家稱慶其女睡食頃方起驚云本在城中隔子里何得至此衆人方知為狐所魅精神如睡中葉法善道士葉法善括蒼人有道術能符禁鬼神唐中宗甚重之開元初供奉在內位至金紫光祿大夫鴻臚卿時有名族得江外一宰將乘舟赴任于東門外親朋盛筵以待之宰令妻子與親故車先往胥溪水濱日暮宰至舟旁饌已陳設而妻子不至宰復至宅尋之云去矣宰驚不知所以復出城問行人人曰適食時見一婆羅門僧執幡花前導有數乘車隨之比出城門車內婦人皆下從婆羅門齊聲稱佛因而北去矣宰遂尋車迹至北邙虛墓門有大冢見其車馬皆憩其旁其妻與親表婦二十余人皆從一僧合掌繞冢口稱佛名宰呼之皆有怒色宰前擒之婦人遂罵曰吾正逐聖者今在天堂汝何小人敢此抑遏至于奴仆與言皆不應亦相與繞冢而行宰因執胡僧遂失于是縛其妻及諸婦人皆喧叫至第竟夕號呼不可與言宰遲明問于葉師師曰此天狐也能與天通斥之則已殺之不可然此狐齋時必至請與俱來宰曰諾葉師仍與之符令置所居門既置符妻及諸人皆寤謂宰曰吾昨見佛來領諸聖衆將我等至天堂其中樂不可言佛執花前后吾等方隨后作法事忽見汝至吾故罵不知乃是魅惑也齋時婆羅門果至叩門乞食妻及諸婦人聞僧聲爭走出門喧言佛又來矣宰禁之不可乃執胡僧鞭之見血面縛舁之往葉師所道遇洛陽令僧大叫稱冤洛陽令反咎宰宰具言其故仍請與俱見葉師洛陽令不信宰言強與之去漸至聖真觀僧神色慘沮不言及門即請命及入院葉師命解其縛猶胡僧也師曰速復汝形魅即哀請師曰不可魅乃棄袈裟于地即老狐也師命鞭之百還其袈裟復為婆羅門約令去千里之外胡僧頂禮而去出門遂亡劉甲唐開元中彭城劉甲者為河北一縣將之官途經山店夜宿人見甲婦美白云此有靈祇好偷美婦前后至者多為所取宜慎防之甲與家人相勵不寐圍繞其婦仍以面粉塗婦身首至五更后甲喜曰鬼神所為在夜中耳今天將曙其如我何因乃假寐頃之間失婦所在甲以資帛顧村人悉持棒尋面而行初從窗口中出漸過牆東有一古墳墳上有大桑樹下小孔面入其中因發掘之丈余遇大樹坎如連屋有老狐坐據玉案前兩行有美女十余輩持聲樂皆前后所偷人家女子也旁有小狐數百頭悉殺之李參軍唐兗州李參軍拜職赴任途次新鄭逆旅遇老人讀漢書李因與交言便及姻事老人問先婚何家李辭未婚老人曰君名家子當選婚好今聞陶貞益為彼州都督若逼以女妻君君何以辭之陶李為婚深駭物聽仆雖庸劣竊為足下差之今去此數里有蕭公是吏部璇之族門地亦高見有數女容色殊麗李聞而悅之因求老人紹介于蕭氏其人便許之去久之方還言蕭公甚歡敬以待客李與仆御偕行既至蕭氏門館清肅甲第顯煥高槐修竹蔓延連亙絶世之勝境初二黃門持金倚床延坐少時蕭出著紫蜀衫策鳩杖兩袍褲扶側雪髯神鑒舉動可觀李望敬之再三陳謝蕭云老叟懸車之所久絶人事何期君子迂道見過延李入廳服玩隱映當世罕遇尋荐珍膳海陸交錯多有未名之物食畢觴宴老人乃云李參軍向欲論親已蒙許諾蕭便敘數十句語深有士風作書與縣官請卜人克日須臾卜人至云卜吉正在此宵蕭又作書與縣官借頭花叉絹兼手力等尋而皆至其夕亦有縣官來作儐相歡樂之事與世不殊至入青廬婦人又姝美李生愈悅暨明蕭公乃言李郎赴上有期不可久住便遣女子隨去寶鈕犢車五乘奴婢人馬三十匹其他服玩不可勝數見者謂是王妃公主之流莫不健羡李至任積二年奉使入洛留婦在舍婢等并妖媚盅冶眩惑丈夫往來者多經過焉異日參軍王顒曳狗將獵李氏群婢見狗甚駭多騁而入門顒素疑其妖媚爾日心動徑牽狗入其宅合家拒堂門不敢喘息狗亦掣攣號吠李氏婦門中大詬曰婢等頃為犬咋今尚遑懼王顒何事牽犬入人家同官為僚獨不為李參軍之地乎顒意是狐乃決意排窗放犬咋殺群狐唯妻死身是人而其尾不變顒往白貞益貞益往取驗覆見諸死狐嗟歎久之時天寒乃埋一處經十余日蕭使君遂至入門號哭莫不驚駭數日來詣陶聞訴言詞確實容服高貴陶甚敬待因收王顒下獄土固執是狐取前犬令咋蕭時蕭陶對食犬至蕭引犬頭膝上以手撫之然后與食犬無搏噬之意后數日李生亦還號哭纍日剡然發狂嚙王通身盡腫蕭謂李曰奴輩皆言死者悉是野狐何其苦痛當日即欲開瘞恐李郎被眩惑不見信今宜開視以明姦妄也命開視悉是人形李愈悲泣貞益以顒罪重錮身推勘顒私白云已令持十萬于東都取咋狐犬往來可十余日貞益又以公錢百千益之其犬既至所由謁蕭對事陶于正廳立待蕭入府顏色沮喪舉動惶擾有異于常俄犬自外入蕭作老狐下階走數步為犬咋死貞益使驗死者悉是野狐顒遂見免此難
