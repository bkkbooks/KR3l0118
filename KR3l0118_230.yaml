body:
  text: 蘇威蘇威隋僕射蘇威有鏡殊精好日月蝕既鏡亦昏黑無所見威以左右所污不以為意他日月蝕半缺其鏡亦半昏如之於是始寶藏之後匱中有聲如雷尋之乃鏡聲無何而子夔死後又有聲而威敗其後不知所在出傳記王度隋汾陰侯生天下奇士也王度常以師禮事之臨終贈度以古鏡曰持此則百邪遠人度受而寶之鏡橫徑八寸鼻作麒麟蹲伏之象繞鼻列四方龜龍鳳虎依方陳布四方外又設八卦卦外置十二辰位而具畜焉辰畜之外又置二十四字周繞輪廓文體似隸點畫無缺而非字書所有也侯生云二十四氣之象形承日照之則背上文畫墨入影內纖毫無失舉而扣之清音徐引竟日方絶嗟乎此則非凡鏡之所同也宜其見賞高賢自稱靈物侯生常云昔者吾聞黃帝鑄十五鏡其第一橫徑一尺五寸法滿月之數也以其相差各校一寸此第八鏡也雖歲祀攸遠圖書寂寞而高人所述不可誣矣昔楊氏納環纍代延慶張公喪劍其身亦終今度遭世擾攘居常鬱怏王室如燬生涯何地寶鏡復去哀哉今具其異跡列之於哀哉後數千載之下倘有得者知其所由耳大業七年五月度自御史罷歸河東適遇侯生卒而得此鏡至其年六月度歸長安至長樂坡宿於主人程雄家雄新受寄一婢頗甚端麗名曰鸚鵡度既稅駕將整冠履引鏡自照鸚鵡遙見既便叩首流血云不敢住度因召主人問其故雄云兩月前有一客攜此婢從東來時婢病甚客便寄留云還日當取比不復來不知其婢由也度疑精魅引鏡逼之便云乞命即變形度即掩鏡曰汝先自敘然後變形當捨汝命婢再拜自陳云某是華山府君廟前長松下千歲老狸大行變惑罪合至死遂為府君捕逐逃於河渭之間為下邽陳思恭義女蒙養甚厚嫁鸚鵡與同鄉人柴華鸚鵡與華意不相愜逃而東出韓城縣為行人李無傲所執無傲粗暴丈夫也遂將鸚鵡遊行數歲昨隨至此忽爾見留不意遭逢天鏡隱形無路度又謂曰汝本老狸狸原作狐據明鈔本改變形為人豈不害人也婢曰變形事人非有害也但逃匿幻惑神道所惡自當至死耳度又謂曰欲捨汝可乎鸚鵡曰辱公厚賜豈敢忘德然天鏡一照不可逃形但久為人形差復故體願緘於匣許盡醉而終度又謂曰緘鏡於匣汝不逃乎鸚鵡笑曰公適有美言尚許相捨緘鏡而走豈不終恩但天鏡一臨竄跡無路惟希數刻之命以盡一生之歡耳度登時為匣鏡又為致酒悉召雄家鄰里與宴謔婢頃大醉奮衣起舞而歌曰寶鏡寶鏡哀哉豫命自我離形于今幾姓生雖可樂死必不傷何為眷戀守此一方歌訖再拜化為老狸而死一座驚歎大業八年四月一日太陽虧度時在臺直晝臥廳閣覺日漸昏諸吏告度以日蝕甚整衣時引鏡出自覺鏡亦昏昧無復光色度以寶鏡之作合於陰陽光景之妙不然豈合以太陽失曜而寶鏡亦無光乎歎怪未已俄而光彩出日亦漸明比及日復鏡亦精朗如故自此之後每日月薄蝕鏡亦昏昧其年八月十五日友人薛俠者獲一銅劍長四尺劍連於靶靶盤龍鳳之狀左文如火焰右文如水波光彩灼爍非常物也俠持過度曰此劍俠常試之每月十五日天地清朗置之暗室自然有光傍照數丈俠持之有日月矣明公好奇愛古如飢如渴願與君今夕一試度喜甚其夜果遇天地清霽密閉一室無復脫隙與俠同宿度亦出寶鏡置于座側俄而鏡上吐光明照一室相視如晝劍橫其側無復光彩俠大驚曰請內鏡於匣度從其言然後劍乃吐光不過一二尺耳俠撫劍歎曰天下神物亦有相伏之理也是後每至月望則出鏡於暗室光嘗照數丈若月影入室則無光也豈太陽太陰之耀不可敵也乎其年冬兼著作郎奉詔撰國明鈔本國作周史欲為蘇綽立傳度家有奴曰豹生年七十矣本蘇氏部曲頗涉史傳略解屬文見度傳草因悲不自勝度問其故謂度曰豹生常受蘇公厚遇今見蘇公言驗是以悲耳郎君所有寶鏡是蘇公友人河南苗季子所遺蘇公者蘇公愛之甚蘇公臨亡之歲戚戚不樂常召苗生謂曰自度死日不久不知此鏡當入誰手今欲以蓍筮一卦先生幸觀之也便顧豹生取蓍蘇公自揲布卦卦訖蘇公曰我死十餘年我家當失此鏡不知所在然天地神物動靜有徵今河派之間往往有寶氣與卦兆相合鏡其往彼乎季子曰亦為人所得乎蘇公又詳其卦云先入侯家復歸王氏過此以往莫知所之也豹生言訖涕泣度問蘇氏果云舊有此鏡蘇公薨後亦失所在如豹生之言故度為蘇公傳亦具言其事於末篇論蘇公蓍筮絶倫默而獨用謂此也大業九年正月朔旦有一胡僧行乞而至度家弟績出見之覺其神彩不俗更邀入室而為具食坐語良久胡僧謂績曰檀越家似有絶世寶鏡也可得見耶績曰法師何以得知之僧曰貧道受明録祕術頗識寶氣檀越宅上每日常有碧光連日絳氣屬月此寶鏡氣也貧道見之兩年矣今擇良日故欲一觀績出之僧跪捧欣躍又謂績曰此鏡有數種靈相皆當未見但以金膏塗之珠粉拭之舉以照日必影徹牆壁僧又歎息曰更作法試應照見腑臟所恨卒無藥耳但以金煙薰之玉水洗之復以金膏珠粉如法拭之藏之泥中亦不晦矣遂留金煙玉水等法行之無不獲驗而胡僧遂不復見其年秋度出兼芮城令令廳前有一棗樹圍可數丈不知幾百年矣前後令至皆祠謁此樹否則殃禍立及也度以為妖由人興淫祀宜絶縣吏皆叩頭請度度不得已為之以祀然陰念此樹當有精魅所託人不能除養成其勢乃密懸此鏡於樹之間其夜二鼓許聞其廳前磊落有聲若雷霆者遂起視之則風雨晦暝纏繞此樹雷光晃耀忽上忽下至明有一大蛇紫鱗赤尾緑頭白角額上有王字身被數瘡死於樹度便下收鏡命吏出蛇焚於縣門外仍掘樹樹心有一穴於地漸大有巨蛇蟠泊之跡既而墳之妖怪遂絶其年冬度以御史帶芮城令持節河北道開倉糧賑給陝東時天下大飢百姓疾病蒲陝之間癘疫尤甚有河北人張龍駒為度下小吏其家良賤數十口一時遇疾度憫之齎此入其家使龍駒持鏡夜照諸病者見鏡皆驚起云見龍駒持一月來相照光陰所及如冰著體冷徹腑臟即時熱定至晚並愈以為無害於鏡而所濟於衆令密持此鏡遍巡百姓其夜鏡於匣中泠然自鳴聲甚徹遠良久乃止度心獨怪明早龍駒來謂度曰龍駒昨忽夢一人龍頭蛇身朱冠紫服謂龍駒我即鏡精也名曰紫珍常有德於君家故來相託為我謝王公百姓有罪天與之疾奈何使我反天救物且病至後月當漸愈無為我苦度感其靈怪因此志之至後月病果漸愈如其言也大業十年度弟績自六合丞棄官歸又將遍遊山水以為長往之策度止之曰今天下向亂盜賊充斥欲安之乎且吾與汝同氣未嘗遠別此行也似將高蹈昔尚子平遊五嶽不知所之汝若追踵前賢吾所不堪也便涕泣對績績曰意已決矣必不可留兄今之達人當無所不體孔子曰匹夫不奪其志矣人生百年忽同過隙得情則樂失志則悲安遂其欲聖人之義也度不得已與之決別績曰此別也亦有所求兄所寶鏡非塵俗物也績將抗志雲路棲蹤煙霞欲兄以此為贈度曰吾何惜於汝也即以與之績得鏡遂行不言所適至大業十三年夏六月始歸長安以鏡歸謂度曰此鏡真寶物也辭兄之後先遊嵩山少室降石梁坐玉壇屬日暮遇一嵌巖有一石堂可容三五人績棲息止焉月夜二更後有兩人一貌胡鬚眉皓而瘦稱山公一面闊白鬚眉長黑而矮稱毛生謂績曰何人斯居也績曰尋幽探穴訪奇者二人坐與績談久往往有異義出於言外績疑其精怪引手潛後開匣取鏡鏡光出而二人失聲俯伏矮者化為龜胡者化為猿懸鏡至曉二身俱殞龜身帶緑毛猿身帶白毛即入箕山渡穎水歷太和視玉井井傍有池水湛然緑色問樵夫曰此靈湫耳村閭每八節祭之以祈福佑若一祭有闕即池水出黑雲大雹浸堤壞阜績引鏡照之池水沸湧有雷如震忽爾池水騰出池中不遺涓滴可行二百餘步水落於地有一魚可長丈餘粗細大於臂首紅額白身作青黃間色無鱗有涎龍形蛇角嘴尖狀如鱘魚動而有光在于泥水困而不能遠去績謂鮫也失水而無能為耳刃而為炙甚膏有味以充數朝口腹遂出於宋汴汴主人張琦家有女子患入夜哀痛之聲實不堪忍績問其故病來已經年歲白日即安夜常如此績停一宿及聞女子聲遂開鏡照之痛者曰戴冠郎被殺其病者床下有大雄雞死矣乃是主人七八歲老雞也遊江南將渡廣陵揚子江忽暗雲覆水黑風波湧舟子失容慮有覆沒績攜鏡上舟照江中數步明朗徹底風雲四斂波濤遂息須臾之間達濟天塹躋攝山趨趨原作麴據明鈔本改芳嶺或攀絶頂或入深洞逢其群鳥環人而噪數熊當路而蹲以鏡揮之熊鳥奔駭是時利涉浙江遇潮出海濤聲振吼數百里而聞舟人曰濤既近未可渡南若不回舟吾輩必葬魚腹績出鏡照江波不進屹如雲立四面江水豁開五十餘步水漸清淺黿鼉散走舉帆翩翩直入南浦然後卻視濤波洪湧高數十丈而至所渡之所也遂登天台周覽洞壑夜行佩之山谷去身百步四面光徹纖微皆見林間宿鳥驚而亂飛還履會稽逢異人張始鸞授績周髀九章及明堂六甲之事與陳永同歸更遊豫章見道士許藏祕云是旌陽七代孫有咒登刀履火之術說妖怪之次更言豐城縣倉督李慎家有三女遭魅病人莫能識藏祕療之無效績因故人曰趙丹有才器任豐城縣尉績因過之丹命祗承人指績停處績謂曰欲得倉督李敬慎家居止丹遽命敬為主禮績問其故敬曰三女同居堂內閣子每至日晚即靚妝衒服黃昏後即歸所居閣子滅燈燭聽之竊與人言笑聲及至曉眠非喚不覺日日漸瘦不能下食制之不令妝梳即欲自縊投井無奈之何績謂敬曰引示閣子之處其閣東有窗恐其門閉固而難啓遂晝日先刻斷窗櫺四條卻以物支柱之如舊至日暮敬報績曰妝梳入閣矣至一更聽之言笑自然績拔窗櫺子持鏡入閣照之三女叫云殺我壻也初不見一物縣鏡至明有一鼠狼首尾長一尺三四寸身無毛齒有一老鼠亦無毛齒其肥大可重五斤又有守宮大如人手身披鱗甲煥爛五色頭上有兩角長可半寸尾長五寸已上尾頭一寸色白並於壁孔前死矣從此疾愈其後尋真至廬山婆娑數月或棲息長林或露宿草莽虎豹接尾豺狼連跡舉鏡視之莫不竄伏廬山處士蘇賓奇識之士也洞明易道藏往知來謂績曰天下神物必不久居人間今宇宙喪亂他鄉未必可止吾子此鏡尚在足下衛幸速歸家鄉也績然其言即時北歸便遊河北夜夢鏡謂績曰我蒙卿兄厚禮今當捨人間遠去欲得一別卿請早歸長安也績夢中許之及曉獨居思之恍恍發悸即時西首秦路今既見兄績不負諾矣終恐此靈物亦非兄所有數月績還河東大業十三年七月十五日匣中悲鳴其聲纖遠俄而漸大若龍咆虎吼良久乃定開匣視之即失鏡矣出異聞集
