body:
  text: 韓滉韓滉韓滉在潤州夜與從事登萬歲樓方酣置杯不悅語左右曰汝聽婦人哭乎當近何所或對在某橋某街詰朝命吏捕哭者訊之信宿獄不具吏懼罪守於屍側忽有大青蠅集其首因發髻驗之果婦私於鄰醉其夫而釘殺之吏以為神因問晉公云吾察其哭聲疾而不憚若彊而懼者王充論衡云鄭子產晨出聞婦人之哭拊僕之手而聽有間使吏執而問之即手殺其夫也異日其僕問曰夫子何以知之子產曰死於其所親愛知病而憂臨死而懼已死而哀今哭以死而懼知其姦也出酉陽雜俎顏真卿顏魯公真卿為監察御史充河西隴右軍覆屯交兵使五原有冤獄久不決真卿立辯之天久旱及獄決乃雨郡人呼御史雨出傳載李景略涼州人寓居河東闔門讀書李懷光為朔方節度招在幕府五原有偏將張光者挾私殺妻前後不能斷光富於財貨獄吏不能劾訊得實情以景略驗之光伏辜既而亭午有女厲被髮血身膝行前謝而去左右識光妻者曰光之妻也出譚賓錄李夷簡李相夷簡未登第時為鄭縣丞涇軍之亂有使走驢東去甚急夷簡入白刺史曰聞京城有故此使必非朝命請執問之果朱泚使於朱滔者出國史補孟簡故刑部李尚書遜為浙東觀察使性仁䘏撫育百姓抑挫冠冕有前諸暨縣尉包君者秩滿居于縣界與一土豪百姓來往其家甚富每有新味及果實必送包君忽妻心腹病暴至困困原作因據明鈔本改惙有人視者皆曰此狀中蠱及問所從何來乃因土豪獻果妻偶食之遂得茲病此家養蠱前後殺人已多矣包君曰為之奈何曰養此毒者皆能解之今少府速將夫人詣彼求乞不然即無計矣包君乃當時雇船攜往僅百餘里逾宿方達其土豪已知唯唯字原闕據明鈔本補恐其毒事露憤怒頗甚包君船亦到先登岸具衫笏將祈之其人已潛伏童僕十餘候包君到靸履柱毬杖領徒而去包未及語詬罵叫呼遂令拽之於地以毬杖擊之數十不勝其困又令村婦二十餘人就船拽包君妻出驗其病狀以頭捽地備極恥辱妻素羸疾兼有娠至船而殞包君聊獲餘命及却迴土豪乃疾棹到州見李公訴之云縣尉包某倚恃前資領妻至莊羅織攪擾以索錢物不勝冤憤李公大怒當時令人齋枷鎖追包君纔到妻尚未殮方欲待事畢至州論忽使急到遂被荷枷鏁身領去其日觀察判官獨孤公臥於廳中睡次夢一婦人顏色慘沮若有所訴者捧一石硯以獻獨孤公受之意頗恓惻及覺因言於同院皆異之逡巡包君到李公令獨孤即推鞠尋其辯對包君所居乃石硯村也郎驚異良久引包君入問其本末包涕泣具言之詰其妻形貌年幾乃郎夢中所見感憤之甚不數日土豪皆款伏具獄過過原作遇據明鈔本改李公李公以其不直遂憑土豪之狀包君以倚恃前資擅至百姓莊攪擾決臂明鈔本臂作臀杖十下土豪以前當縣官罰二十功從事賓客無不陳說郎亦力爭之竟不能得包君妻兄在揚州聞之奔波過浙江見李公涕泣論列其妹冤死之狀李公大怒以為客唁決脊杖二十遞于他界自淮南無不稱其冤異郎自此託疾請罷時孟尚書簡任常州刺史常與越近具熟其事明年替李公為浙東觀察使乃先以帖令錄此土豪一門十餘口到纔數日李公尚未發盡斃於州厚以資幣贈包君數州之人聞者莫不慶快矣出逸史李德裕李德裕出鎮浙右日有甘露寺主事僧訴交代得常住什物被前主事僧隱用却常住金若干兩引證前數輩皆有遞相交割傳領文籍分明眾詞皆指以新得替引隱而用之且云初上之時交領分兩既明及交割之日不見其金鞠成具獄伏罪昭然然未窮破用之所或以僧人不拘僧行而費之以無理可伸甘之死地一旦引憲之際公疑其未盡微以意揣之人乃具實以聞曰居寺者樂於知事前後主之者積年已來空放分兩文書其實無金矣群眾以某孤立不雜洽輩流欲乘此擠排之流涕不勝其冤公乃憫而惻之曰此固非難也俯仰之間曰吾得之矣乃立促召兜子數乘命關連僧人對事咸咸原作成據唐語林改遣坐兜子下簾子畢指揮揮字原闕據明鈔本補門下下學原闕據唐語林補不令相見命取黃泥各令模前後交付下次金樣樣字原闕據明鈔本補以憑證據僧既不知形段竟模不成公怒令劾前數輩等皆一一伏罪其所排者遂獲清雪出桂苑叢談裴休裴休尚古好奇掌綸誥日有親表調授邑宰於曲阜者土人墾田得古器曰盎腹容三斗淺項痹足規口矩耳朴素古醜將蠹土壤者既洗滌之後磨礱之隱隱有古篆九字帶盎之腰曲阜令不能辯兗州有書生姓魯能八體書字者召致於邑出盎示之曰此大篆也非今之所行者雖某頗嘗學之是九字曰齊桓公會於葵丘歲鑄邑宰大奇其說及以篆驗則字勢存焉及輦致河東公之門公以為麟經時物得以言古矣寶之猶鍾玦郜鼎也視草之暇輒引親友之分深者觀之以是京華聲為至寶公後以小宗伯掌貢舉生徒有以盎寶為請者裴公一日設食會門弟子出器於庭則離立環觀迭詞以質獨劉舍人蛻以為非當時之物近世矯作也公不悅曰果有有原作不據明鈔本許刻本黃刻本改說乎紫微曰某幼專丘明之書具載小白桓公九合諸侯取威定霸葵丘之會第八盟又按禮經諸侯五月而葬同盟至既葬然後反虞虞然後卒哭卒哭然後定謚則葵丘之役實在生前不得以謚稱此乃近世之矯作也裴公恍然而悟命擊碎然後舉爵盡飲而罷出唐闕史崔碣崔碣任河南尹懲姦剪暴為天下吏師先是有估客王可久者膏腴之室歲鬻茗於江湖間常獲豐利而歸是年又笈賄適楚始返楫於彭門值龐勛作亂穽於寇域逾期不歸有妻美少且無伯仲息裔之屬妻常善價募人訪於賊境之四裔竟無究其跡者或曰已戕於盜帑其貨矣洛城有楊乾夫者善卜稱妻晨持一縑決疑於彼楊生素熟其事且利其財思以計中之乃為端蓍虔祝六位既兆則曰所憂豈非伉儷耶是人絕氣久矣象見墳墓矣遇劫殺與身并矣妻號啕將去即又勉之曰陽鳥已晚幸擇良晨清旭更問當為再祝妻誠信之他日復往布算宛得前卦乃曰神也異也無復望也仍言號慟非所以成禮者第擇日舉哀繪佛飯僧以資冥福妻且悲且媿以為誠言無巨細事一以託之楊生主辦雅竭其志則又謂曰婦人煢獨而衷財賄寇盜方熾身之災也宜割愛以謀安適妻初不納夕則飛礫以懼之晝則聲寇以危之次則役媒以餌之妻多楊之義遂許嫁焉楊生既遂志乃籍所有雄據厚產又逾月皆貨舊業挈妻卜居樂明鈔本樂作洛渠之北明年徐州平天下洗兵詔大憝就擒外脇從其間者宥而不問給篆為信縱歸田里可久髡躶而返瘠瘁疥穢丐食於路至則訪其廬舍已易主矣曲訊妻室不知其所展轉飢寒循路哀叫漸有人知者因指其新居見妻及楊肆目門首欲為揖認則訶杖詬辱僅以身免妻愕眙以異復制於楊可久不堪其冤訴於公府及法司按劾楊生賄賂已行取證於妻遂誣其妄時屬尹正長厚不能辨姦以誣人之罪加之痛繩其背肩扶出疆可久冤楚相縈殆將溘盡命絲未絕洛尹改更則銜血齎冤於新政亦不能辨前所鞠吏得以肆其毒於簧言且曰以獄訟舊政者漢律在焉則又裂𦟘配邑之遐者隸執重役可久雙眥流血兩目枯焉時博陵公伊人燕居備聆始卒天啟良便再領三川獄吏屏息覆盆舉矣攬轡觀風之三日潛命就役所出可久以至乃敕吏掩乾夫一家兼素鞠胥同梏其頸且命可久暗籍家之服翫物所存尚夥而鞠吏賄賂醜跡昭焉既捶其脇復血其背然後擢髮折足同瘞一坎收錄家產手授可久時離畢作冷衣雲復鬱斷獄之日陽輪洞開通逵相慶有出涕者沉冤積憤大亨暢於是曰古之循吏孰能擬諸出唐闕史趙和咸通初有天水趙和者任江陰令以片言折獄著聲猶是累宰劇邑皆以雪冤獲優考至於疑似晦偽之事悉能以情理之時有楚州淮陰農比莊俱以豐歲而貨殖焉其東鄰則拓腴田數百畝資鏹未滿因以莊券質於西鄰貨緡百萬契書顯驗且言來歲齎本利以贖至期果以腴田獲利甚博備財贖契先納八百緡第檢置契書期明日以殘資換券所隔信宿且恃通家因不徵納緡之籍明日齎餘鏹至遂為西鄰不認且以無保證又乏簿籍終為所拒東鄰冤訴於縣縣為追勘無以證明宰邑謂曰誠疑爾冤其如官中所賴者券乏此以證何術理之復訴於州州不能理東鄰不勝其憤遠聆江陰善聽訟者乃越江而南訴於趙宰趙宰謂曰縣政地卑且復逾境何計奉雪東鄰則冤泣曰此地不得理無由自滌也趙曰第止吾舍試為思之經宿召前曰計就矣爾果不妄否則又曰安敢誣趙曰誠如是言當為寘法乃召捕賊之幹者數輩齎牒至淮壖曰曰原作口據明鈔本改有嘯聚而寇江者案劾已具言有同惡相濟者在某處居名姓形狀具以西鄰指之請梏送至此先是鄰州條法唯持刀截江無得藏匿追牒至彼果擒以還然自恃無跡未甚知懼至則旅于庭下趙厲聲謂曰幸耕織自活何為寇江囚則朗叫淚隨曰稼穡之夫未嘗舟楫趙又曰證詞甚具姓氏無差或言偽而堅則血膚取實囚則大恐叩頭見血如不勝其冤者趙又曰所盜幸多金寶錦彩非農家所寘蓄者汝宜籍舍之產以辯之囚意稍解遂詳開所貯者且不虞東鄰之越訟也乃言稻若干斛莊客某甲等納到者𠨭絹若干匹家機所出者錢若干貫東鄰贖契者銀器若干件匠某鍛成者趙宰大喜即再審其事謂曰如果非寇江者何謂諱東鄰所贖八百千遂引訴鄰令其偶證於是慚懼失色祈死廳前趙令梏往本土檢付契書然後寘之於法出唐闕史劉崇龜劉崇龜鎮南海之歲有富商子少年而白皙稍殊於稗販之伍泊船於江岸上有門樓中見一姬年二十餘豔態妖容非常所覩亦不避人得以縱其目逆乘便復言某黃昏當詣宅矣無難色頷之微哂而已既昏暝果啟扉伺之比之未及赴約有盜者徑入行竊見一房無燭即突入之姬即欣然而就之盜乃謂其見擒以庖刀刺之遺刀而逸其家亦未之覺商客之子旋至方入其戶即踐其血汰而仆地初謂其水以手捫之聞鮮血之氣未已又捫著有人臥遂走出徑登船一夜解維比明已行百餘里其家跡其血至江岸遂陳狀之主者訟窮詰岸上居人云某日夜有某客船一夜徑發即差人追及械於圉室拷掠備至具實吐之唯不招殺人其家以庖刀納于府主矣府主乃下令曰某日大設合境庖丁宜集于毬場以候宰殺屠者既集乃傳令曰今日既已可翌日而至乃各留刀於廚而去府主乃命取諸人刀以殺人之刀換下一口來早各令詣衙請刀諸人皆認本刀而去唯一屠最在後不肯持刀去府主乃詰之對曰此非某刀又詰以何人刀即曰此合是某乙者乃問其住止之處即命擒之則已竄矣於是乃以他囚之合處死者以代商人之子侵夜斃之於市竄者之家旦夕潛令人伺之既斃其假囚不一兩夕果歸家即擒之具首殺人之咎遂置於法商人之子夜入人家以姦罪杖背而已彭城公之察獄可謂明矣出玉堂閒話殺妻者聞諸耆舊云昔有人因他適回見其妻為姦盜所殺但不見其首支體具在既悲且懼遂告於妻族妻族聞之遂執壻而入官丞行加誣云爾殺吾愛女獄吏嚴其鞭捶莫得自明洎不任其苦乃自誣殺人甘其一死款案既成皆以為不繆郡主委諸從事從事疑疑原作款據明鈔本改而不斷謂使君曰某濫塵幕席誠宜竭節奉理人命一死不可再生苟或誤舉典刑豈能追悔也必請緩而窮之且為夫之道孰忍殺妻況義在齊眉曷能斷頸縱有隙而害之盍作脫禍之計也或推病殞或託暴亡必存屍而棄首其理甚明使君計其讞義從事乃別開其第權作狴牢慎擇司存移此繫者細而劾之仍給以酒食湯沐以平人待之鍵戶棘垣不使繫於外然後遍勘在城伍作行人令各供通近來應與人家安厝墳墓多少去處文狀既而一面詰之曰汝等與人家舉事還有可疑者乎有一人曰某於一豪家舉事具言殺却一奶子於牆上舁過凶器中甚似無物見在某坊發之果得一女首級遂將首對屍令訴者驗認云非也遂收豪家鞠之豪家伏辜而具款乃是殺一奶子函首而葬之以屍易此良家之婦私室蓄之豪土乃全家棄市吁伍辭察獄得無慎乎出玉堂閒話許宗裔蜀之將帥鮮不好貨有許宗裔者分符仗鉞獨守廉隅嘗典劍州民有致寇者燈下認識暴客待曉告巡其賊不禁拷捶遠首其罪囚而送州宗裔引慮縲囚紛訴且言絲鉤紈乃是家物與被劫主遞有詞說宗裔促命兩繰絲車又各齎紬紈卷時胎心復用何物一云杏核一云瓦子因令相退下紈線見杏核與囚款同仍以絲鉤安車量其輕重大小亦是囚家本物即被劫者有妄認之過巡捕吏伏拷決之辜指顧之間為雪冤枉乃良吏也出北夢瑣言劉方遇鎮州士人劉方遇家財數十萬方遇妻田氏早卒田之妹為尼常出入方遇家方遇使尼髮長為繼室田有令遵者方遇之妻弟也善貨殖方遇以所積財令令遵興殖方遇有子年幼二女皆嫁方遇疾卒子幼不能督家業方遇妻及二女以家財素為令遵興殖乃舉族合謀請以令遵姓劉為方遇繼嗣即令鬻券人安美為親族請嗣券書即定乃遣令遵服斬衰居喪而二女初立令遵時先邀每月供財三萬及後求取無厭而石李二夫教二女詣本府論訴云令遵冒姓奪父家財令遵下獄石李二夫族與本府要要原作安據明鈔本改吏親黨上在府帥判官行軍司馬隨使都押衙各受方遇二女賂錢數千緡而以令遵與姊及書券安美同情共盜俱棄市人知其冤府帥李從敏令妻來朝懼事發令內弟彌縫侍御史趙都嫉惡論奏明宗驚怒下鎮州委副使符蒙按問果得事實自親吏高知柔及判官行軍司馬並通貨僧人婦人皆棄市唯從敏初削官停任中宮祈哀竟罰一季俸議者以受賂曲法殺人而八議之所不及失刑也安重誨誅後王貴妃用事故也出北夢瑣言
