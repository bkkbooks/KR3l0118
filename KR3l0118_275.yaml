body:
  text: 韋桃符韋桃符隋開皇中京兆韋袞有奴曰桃符每征討將行有膽力袞至左衛中郎以桃符久從驅使乃放從良符家有黃牸牛宰而獻之因問袞乞姓袞曰止從我姓為韋氏符叩頭曰不敢與郎君同姓袞曰汝但從之此有深意故至今有黃犢子韋即韋庶人其後也不許異姓者蓋慮年深代遠子孫或與韋氏通婚此其意也李敬李敬者本夏侯孜之傭也孜久厄塞名場敬寒苦備歷或為其類所引曰當今北面官人入則內貴出則使臣到所在打風打雨爾何不從之而孜孜事一箇窮措大有何長進耳縱其不然堂頭官人豐衣足食所往無不剋敬囅然曰我使頭及第還擬作西川留後官衆皆非笑時孜於壁後聞其言凡十餘歲孜自中書出鎮成都臨行有以邸吏託者一無所諾至鎮用敬知進奏而鞅掌極矣向之笑者率多伏敬初孜未遇伶俜風塵所跨蹇驢無故墜井及朝士之門或逆旅舍常多齟齬時人號曰不利市秀才竟登將相武公幹武公幹者常事蒯希逸秀才十餘歲異常勤幹洎希逸擢第幹辭以親在乞歸就養希逸監留不住既嘉其忠孝以詩送之略曰山險不曾離馬後酒醒長見在牀前同人醵絹贈行皆有繼和吳行魯吳行魯尚書彭州人少年事理官西門思恭小心畏慎每夜常為溫溺器以奉之深得中尉之意一日為中尉洗足中尉以足下文理示之曰如此文爭教不作軍容使行魯拜曰此亦無憑西門曰何也魯曰若其然者某亦有之何為常執僕廝之役乃脫履呈之西門嗟嘆謂曰汝但忠孝我當為汝成之爾後假以軍職除彭州刺史盧耽表為西川行軍司馬禦蠻有功歷東川山南二鎮節度使初行魯之在東川也歷圖南為西川副使隨府罷行魯欲延辟之厲素薄行魯聞之大笑曰不能剪頭剃面而趨事健兒乎自使院乘馬不歸私第直出北郭家人遽結束而追之張雲為成都少尹常出輕言為行魯鴆殺之李鵠盧鈞子肅貞簡有父風光化初華州行在及第自大寇犯闕途二十年縉紳靡不褊乏肅始登第俄有李鵠者造之願傭力鵠善營利暇日往往反資於肅此外未嘗以所須為意肅有舊業在南陽常令鵠徵租鵠皆如期而至來往十里而未嘗侵費一金既及第鵠奔走如初及一春事畢鵠即辭去捧硯捧硯者裴至德之家童也其母曰春紅配騶人高璠而生一歲時夏日浴之裸臥於廊廡間有卑腳犬曰青花忽來嚙兒陰食之春紅聞啼聲狼忙而至則血流盈席矣賴至德有良藥封之百日如故明年夏寢之前軒青花伺人隙復來並卵又食訖宛轉於地而死又以前食之藥傅之及愈為宦者焉字之曰捧硯委以內豎之職至光啓丙午年十餘歲矣裴使外出遇盜於鄭郊見害噫捧硯童兒也再殘而無恙裴以一出而不回者其故何哉捧劍咸陽郭氏者殷富之室也僕媵且衆其間有一蒼頭名曰捧劍不事音樂嘗以望水眺雲不遵驅策雖每遭鞭捶終所見違一旦忽題詩一篇其主益怒詩曰青鳥銜蒲菊飛上金井欄美人恐驚去不敢捲簾看儒士聞而競觀以為協律之詞其主稍容焉又題後堂牡丹花曰一種芳菲出後亭却輸桃李得佳名誰能為向天人説從此移根近太清捧劍私啓賓客曰願作夷狄之鬼恥為世俗蒼頭其後將竄復留詩曰珍重郭四郎臨行不得別曉漏動離心輕車冒殘雪欲出主人門零涕暗鳴咽萬里隔關山一心思漢月歸秦沈詢有嬖妾其妻害之私以配內豎歸秦詢不能禁既而妾猶侍內歸秦恥之乃挾刃伺隙殺詢及其夫人于昭儀使衙是夕詢嘗宴府中賓友乃便歌著詞令曰莫打南來鴈從他向北飛打時雙打取莫遣兩分離及歸而夫妻併命焉時咸通四年也段章咸通十年事前進士司空圖初章以自僦為馭者亦無異於他傭是年夏圖歸蒲久以乏力不足賙給章乃謝去廣明庚子歲冬十二月寇犯京圖寓居崇義里九日自里豪楊瓊所轉匿常平倉下將出群盜繼至有擁戈拒門者孰視良久乃就持圖手曰某段章也係虜而來未能自脫然顧懷優養之仁今乃相遇天也某所主曰張將軍喜下士且幸他往必亡他然且決免於暴橫矣圖誓以不辱章惘然泣下導至通衢即別去圖因此得自開遠門宵遁至咸陽橋復遇榜者韓鈞濟之乃抵鄠縣因達於行在上清貞元壬申歲春三月丞相竇參居光福里第月夜間步於中庭有常所寵青衣上清者乃曰今啓事須到堂前方敢言之竇亟上堂上清曰庭樹上有人恐驚郎請謹避之竇曰陸贄久欲傾奪吾權位今有人在庭樹上即吾禍之將至矣且此事將奏與不奏皆受禍必竄死於道路汝於輩流中不可多得吾身死家破汝定為宮婢聖居如顧問善為我辭焉上清泣曰誠如是死生以之竇下階大呼曰樹上人應是陸贄使來能全老夫性命敢不厚報樹上人應聲而下乃衣縗粗者也曰家有大喪貧甚不辦葬禮伏知相公推誠濟物所以卜夜而來幸相公無怪竇曰某罄所有堂封絹千匹而已方擬修私廟次今日輒贈可矣縗粗者拜謝竇答之如禮又曰便辭相公請左右齊所賜絹擲於牆外某先於街中俟之竇依其請命僕人偵其絶蹤且久方敢歸寢翌日執金吾先奏其事竇公得次又奏之德宗厲聲曰卿交通節將蓄養俠刺位崇台鼎更欲何求竇頓首曰臣起自刀筆小才官已至貴皆陛下獎拔實不因人今不幸至此抑乃仇家所為耳陛下忽震雷霆之怒臣便合萬死中使下殿宣曰卿且歸私第待候進止越月貶柳州別駕會宣武節度劉士寧通好於柳州廉使條疏上聞德宗曰交通節將信而有徵流竇于歡州沒入家資一簪不遺身竟未達流所詔賜自盡上清果隸名掖庭且久後數年以善應對能煎茶數得在帝左右德宗謂曰宮內人數不少汝大了事從何得至此上清曰妾本故宰相竇參家女奴竇參妻早亡故妾得陪灑掃乃竇參家破幸得填宮既奉龍顏如在天上德宗曰竇參之罪不止養俠刺兼亦甚有贓污前時納官銀器至多上清流涕而言曰竇參自御史中丞歷度支戶部鹽鐵三使至宰相首尾六年月入數十萬前後非時賞賜當亦不知紀極乃者彬州送所納官銀器皆是恩賜當部録日妾在郴州親見州縣希陸贄恩旨盡刮去所進銀器上刻藩鎮官銜姓名誣為贓物伏乞下驗之於是宣索竇參沒官銀器覆視其刮字處皆如上清之言時貞元十二年德宗又問養俠刺事上清曰本實無此悉是陸贄陷害使人為之德宗至是大悟因怒陸贄曰老獠奴我脫却伊緑衫便與紫著又常呼伊作陸九我任使竇參方稱意次須教我殺却他乃至權入伊手其為軟弱甚於泥團乃下詔雪竇參冤時裴延齡探知陸贄恩衰得恣行媒蘗乘間攻之贄竟受譴不回上清特敕削丹書度為女道士終嫁為金忠義妻世以陸贄門生名位多顯達者世不可傳説故此事絶無人知李錡婢李錡之擒也侍婢一人隨之錡夜自裂衣襟書已冤管榷之功言為張子良所賣教侍婢曰結之於帶吾若從容賜對當為宰相楊益節度使若不從容受極刑矣我死汝必入內上必問汝汝當以是進及錡伏法京城大霧三日不解或聞鬼哭憲宗又於侍婢得帛書頗疑其冤內出黃衣數襲賜錡及子弟敕京兆府收葬之李銛錡之從父弟也為宋州刺史聞錡反狀慟哭驅妻子奴婢無老幼量頸為枷自拘於觀察使朝廷憫之因為薄貶按李錡宗屬亟居重位頗以尊豪自奉聲色之選冠絶於時及浙西之敗配掖庭者曰鄭曰杜鄭得幸於憲宗是生宣宗皇帝實為孝明皇太后次即杜杜名秋亦建康人也有寵於穆宗穆宗即位以為皇子漳王傅姆太和中漳王得罪國除詔賜秋歸老故鄉或曰係帛書者即杜秋也而宮闈事祕世莫得知夫秋女婢也而能以義申錡之冤且逮事纍朝用物殫極及其被棄於家也朝飢不給故名士聞而傷之中書舍人杜牧為詩以諺之曰荊江水清滑生女白如脂其間杜秋者不勞朱粉施老濞即山鑄庭後千蛾眉秋持玉斝醉與唱金縷衣濞既白首叛秋亦紅淚滋吳江落日渡灞上緑楊垂聯裾見天子盻眄獨依依椒壁懸錦幕鏡奩蟠玉螭低鬟認新寵窈裊復融怡月上白壁門桂影涼參差金階露新重間捻紫簫吹莓苔夾城路南苑鴈初飛紅粧羽林仗獨賜辟邪旗歸來煮豹胎厭飫不能飴咸池升日慶銅雀分香悲雷音後車遠事往落花時燕媒得皇子壯髮緑絲絲書堂親傅姆天人相捧持虎精珠絡褓金盤犀鎮帷長楊射熊羆武帳弄啞咿漸拋竹馬戲稍出舞雞奇嶄嶄整冠佩侍宴坐瑤池眉宇儼圖畫神秀射朝暉一尺桐偶人江充知自欺王幽茅土削秋放故鄉歸觚稜拂斗極回首尚遲遲四朝三十載似夢復疑非潼關識舊吏吏鬢已成絲却喚吳江渡舟人那得知歸來四鄰改茂苑草菲菲清血灑不盡仰天知告誰寒衣一尺素夜借鄰人機我昨金陵過聞之為歔欷自古皆一貫變化安能推夏姬滅兩國逃作巫臣妻西子下姑蘇一舸逐鴟夷織室魏豹俘作漢太平基語置代籍中兩朝尊母儀光武紹高祖本係生唐兒珊瑚破高齊作婢春黃糜蕭后去楊州突厥為閼氏女子固不定士林亦難期射鉤後呼父鉤翁王者師無國邀孟子有人毀仲尼秦因逐客令柄歸丞相斯安知魏齊首見斷簀中尸給喪蹶張輩廟廊冠峨巍珥貂七葉貴何妨戎虜支蘇武却生返鄧通終死飢主張既難測翻覆亦其宜地盡有何物天外復何之指何為而捉足何為而馳耳何為而聽目何為而窺己身不自曉此外何思惟因傾一樽酒題作杜秋詩愁來獨長詠聊可以自貽李福女奴李福妻裴氏性妬忌姬侍甚多福未嘗敢屬意鎮滑臺日有以女奴獻之者福意欲私之而未果一日乘間言於妻曰某官已是至節度使矣然所指使者不過老僕夫人待某無乃薄乎裴曰然不能知公意所屬何人福所指即獻之女奴也裴許諾爾後不過執衣侍膳未嘗一得繾綣福又囑妻之左右曰設夫人沐髮必遽來報我既而果有以夫人沐髮來告曰夫人沐髮福即偽言腹痛召其女奴其女奴既往左右以裴方在沐難可遽已即告以福所疾裴以為信焉遽出髮盆中跣問福所苦福既業以疾為言即若不可忍狀裴極憂之由是以藥投兒溺中進之明日監軍使及從事悉來候問福即具以事告之因笑曰一事無成固其分所苦者虛咽一甌溺耳聞者無不大笑却要湖南觀察使李庾之女奴曰却要美容止善辭令朔望通禮謁於親姻家惟却要主之李侍婢數十莫之偕也而巧媚才捷能承順顏色姻黨亦多憐之李四子長曰延禧次曰延範次曰延祚所謂大郎而下五郎也皆年少狂俠咸欲蒸却要而不能也嘗遇清明節時纖月娟娟庭花爛發中堂垂繡幕皆銀釭而却要遇大郎於櫻桃花影中大郎乃持之求偶却要取茵席授之曰可於庭中東南隅佇立相待候堂前眠熟當至大郎既去至廊下又逢二郎調之却要復取茵席授之曰可於廳中東北隅相待二郎既去又遇三郎束之却要復取茵席授之曰可於廳中西南隅相待三郎既去又五郎遇著握手不可解却要亦取茵席授之曰可於廳中西北隅相待四郎皆去延禧於廳角中屏息以待廳門斜閉見其三弟比比而至各趨一隅心雖訝之而不敢發少頃却要密燃炬疾向廳事豁雙扉而照之謂延禧輩曰阿堵貧兒爭敢向這裏覔宿處皆棄所攜掩面而走却要復從而咍之自是諸子懷慚不敢失敬
