body:
  text: 許生許生會昌元年春孝廉許生下第東歸次壽安將宿于甘泉店甘棠館西一里已來逢白衣叟躍青驄自西而來徒從極盛醺顏怡怡朗吟云春草萋萋春水緑野棠開盡飄香玉繡嶺宮前鶴髮人猶唱開元太平曲生策馬前進問其姓名叟微笑不答又吟一篇云厭世逃名者誰能答姓名曾聞三樂否看取路傍情生知其鬼物矣遂不復問但繼後而行凡二三里日已暮矣至噴玉泉牌堠之西叟笑謂生曰吾聞三四君子今日追舊遊于此泉吾昨已被召自此南去吾子不可連騎也生固請從叟不對而去生縱轡以隨之去甘棠一里餘見車馬導從填隘路歧生麾蓋而進既至泉亭乃下馬伏于叢棘之下屏氣以窺之見四丈夫有少年神貌揚揚者有短小器宇落落者有長大少髭髯者有清瘦言語及瞻視疾速者皆金紫坐於泉之北磯叟既至曰玉川來何遲叟曰適傍石墨澗尋賞憩馬甘棠館亭于西楹偶見詩人題一章駐而吟諷不覺良久座首者曰是何篇什得先生賞歎之若是叟曰此詩有似為席中一二公有其題而晦其姓名憐其終章皆有意思乃曰浮雲淒慘日微明沈痛將軍負罪名白晝叫閽無近戚縞衣飲氣只門生佳人暗泣填宮淚廄馬連嘶換主聲六合茫茫悲漢土此身無處哭田橫座中聞之皆以襟袖擁面如欲慟哭神貌揚揚者云我知作詩人矣得非伊水之上受我推食脫衣之士乎久之白衣叟命飛杯凡數巡巡而座中欷歔未已白衣叟曰再經舊遊無以自適宜賦篇詠以代管絃命左右取筆硯乃出題云噴玉泉感舊遊書懷各七言長句白衣叟倡云樹色川光向晚晴舊曾遊處事分明鼠穿月榭荊榛合草掩花園畦壠平迹陷黃沙仍未寤罪標青簡竟何名傷心谷口東流水猶噴當時寒玉聲少年神貌揚揚者詩云鳥啼鶯語思何窮一世榮華一夢中孝固有冤藏蠹簡鄧攸無子續清風文章高韻傳流水絲管遺音託草蟲春月不知人事改間垂光影照汙宮短小器宇落落者詩云桃蹊李徑盡荒涼訪舊尋新益自傷雖有衣衾藏李固終無表疏雪王章羈魂尚覺霜風冷朽骨徒驚月桂香天爵竟為人爵誤誰能高叫問蒼蒼清瘦及瞻視疾速者詩云落花寂寂草綿綿雲影山光盡宛然壞室基摧新石鼠瀦宮水引故山泉青雲自致慚天爵白首同歸感昔賢惆悵林間中夜月孤光曾照讀書筵長大少鬚髯者詩云新荊棘路舊衡門又駐高車會一樽寒骨未沾新雨露春風不長敗蘭蓀丹誠豈分埋幽壤白日終希照覆盆珍重昔年金谷友共來泉際話孤魂詩成各自吟諷長號數四響動巖谷逡巡怪鳥鴟梟相率啾唧大狐老狸次第鳴叫頃之騾腳自東而來金鐸之聲振于坐中各命僕馬頗甚草草慘無言語掩泣攀鞍若煙霧狀自庭而散生于是出叢棘尋舊路匹馬齕草于澗側蹇童美寢于路隅未明達甘泉店店媼詰昌夜生具以對媼媼曰昨夜三更走馬挈壺就我買酒得非此耶開匱視皆紙錢也顏濬會昌中進士顏濬下第遊廣陵遂之建業賃小舟抵白沙同載有青衣年二十許服飾古朴言詞清麗濬揖之問其姓氏對曰幼芳姓趙問其所適其所適曰亦之建業濬甚喜每維舟即買酒果與之宴飲多說陳隋間事濬頗異之即正色斂袵不對抵白沙各遷舟航青衣乃謝濬曰數日承君深顧某陋拙不足奉歡笑然亦有一事可以奉酬中元必遊瓦官閣此時當為君會一神仙中人況君風儀才調亦甚相稱望不踰此約至時某候于彼言訖各登舟而去濬志其言中元日來遊瓦官閣士女闐咽及登閣果有美人從二女僕皆雙環而有媚態美人倚欄獨語悲歎久之濬注視不易美人亦訝之又曰幼芳之言不謬矣使雙鬟傳語曰西廊有惠鑒闍黎院則某舊門徒君可至是幼芳亦在彼濬甚喜躡其蹤而走果見同舟青衣出而微笑濬遂與美人敘寒暄言語畢日僧進茶果至暮謂濬曰今日偶此登覽為惜高閣病茲用功不久毀除故來一別幸接歡笑某家在清溪頗多松月室無他人今夕必相過某前往可與幼芳後來濬然之遂乘軒而去及夜幼芳引濬前行可數里而至有青衣數輩秉獨迎之遂延入內室與幼芳環坐曰孔家娘子相鄰使邀之曰今夕偶有佳賓相訪願同傾觴以解煩憤少頃而至遂延入亦多說陳朝故事濬因起白曰不審夫人復何姓第頗貯疑訝答曰某即陳朝張貴妃彼即孔貴嬪居世之時謬當後主采顧寵幸之禮有過嬪嬙不幸國亡為楊廣所殺然此賦不仁可甚于劉禪孔皓豈無嬪御獨有斯人行此冤暴且一種亡國我後主實即風流詩酒追歡琴樽取樂而已不似楊廣西築長城東征遼海使天下男冤女曠父寡子孤途窮廣陵死于匹夫之手亦上天降鑒為我報讎耳孔貴嬪曰莫出此言在坐有人不欲美人大叫笑曰渾忘却濬曰何人不欲斯言耶幼芳曰某本江令公家嬖者後為貴妃侍兒國亡之後為隋宮御女煬帝江都為侍湯膳者及化及亂兵入某以身蔽帝遂為所害蕭後憐某盡忠于主因使殉葬後改葬於雷塘側不得從焉時至此謁貴妃耳孔貴嬪曰前說盡是間事不如命酒略延曩日之歡耳遂命雙鬟持樂器洽飲久之貴妃題詩一章曰秋草荒臺響夜蛬白楊聲盡減悲風綵箋曾擘欺江揔綺閣塵清玉樹空孔貴嬪曰寶閣排雲稱望仙五雲高艷擁朝天清溪猶有當時月夜照瓊花綻綺筵幼芳曰皓魂初圓恨翠娥繁華濃艷竟如何兩朝唯有長江水依舊行人逝作波濬亦和曰蕭管清吟怨麗華秋江寒月倚窗斜慚非後主題箋客得見臨春閣上花俄聞叩門曰江修容何婕妤袁照儀來謁貴妃曰竊聞今夕佳賓幽會不免輒窺盛筵俱艷其衣裾明其璫珮而入坐及見四篇捧而泣曰今夕不意再逢三閣之會又與新狎客題詩也頃之聞雞鳴孔貴嬪等俱起各辭而去濬與貴妃就寢欲曙而起貴妃贈辟塵犀簪一枚曰異日覩物思人昨宵值客多未盡歡情別日更當一小會然須咨祈幽府嗚咽而別濬翌日懵然若有所失信宿更尋曩日地則近清溪松檜丘墟詢之于人乃陳朝宮人墓濬慘惻而返數月閣因寺廢而毀後至廣陵訪得吳公臺煬帝舊陵果有宮人趙幼芳墓因以酒奠之郝惟諒荊州之民郝惟諒性粗率勇於私鬭會昌二年寒食日與其徒遊于郊外蹴踘角力醉臥冢間宵分始寤將歸道左見一人家室絶卑陋雖張燈而頗昏暗遂詣乞漿有一婦人容色慘悴服裝雅素方向燈紉縫延郝良久謂郝曰知君有膽氣故敢情託妾本秦人姓張氏嫁與府衙健兒李自歡自歡太和中戍邊不返妾遘疫而歿別無親戚為鄰裏殯于此處已逾一紀遷葬無因凡死者肌骨未復于土魂神不為陰司所籍雖散恍惚如夢如醉君能使妾遺骸得歸泉壤精爽有託斯願畢矣郝曰某生業素薄力且不辦如何婦人云某雖為鬼不廢女工自安此常造雨衣與胡氏傭作凡數年矣所聚十三萬葬備有餘也郝許諾而歸遲明訪之胡氏物色皆符乃具以告即與偕往殯所毀瘞視之散錢培櫬數如其言胡氏與郝哀而異之復率錢于同輩合二十萬盛其凶儀瘞于鹿頂原其夕見夢于胡郝浮梁張令家業蔓延江淮間纍金積粟不可勝計秩滿如京師常先一程致頓海陸珍美畢具至華陰僕夫施幄幕陳樽壘庖人炙羊方熟有黃衫者據盤而坐僕夫連叱神色不撓店嫗曰今五坊弋羅之輩橫行關內此其流也不可與競僕夫方欲求其帥以責之而張令至具以黃衫者告張令曰勿叱召黃衫者問曰來自何方黃衫但唯唯耳促暖酒酒至令以大金鍾飲之雖不謝似有愧色飲訖顧炙羊著目不移令自割以勸之一足盡未有飽色令又以奩中餤十四五啖之凡飲二斗餘酒酣謂令曰四十年前曾于東店得一醉飽以至今日令甚訝乃勤懇問姓氏對曰某非人也蓋直送關中死籍之吏耳令驚問其由曰太山召人魂將死之籍付諸嶽俾某部送耳令曰可得一觀呼曰更窺亦無患於是解革囊出一軸其首云太山主者牒金天府其第二行云貪財好殺見利忘義人前浮梁縣令張某即張君也令見名乞告使者曰修短有限誰敢惜死但某方強仕不為死備家業浩大未有所付何術得延其期某囊橐中計所直不下數十萬盡可以獻於執事使者曰一飯之恩誠宜報答百萬之貺某何用焉今有仙官劉綱謫在蓮花峰足下宜匍匐徑往哀訴奏章捨此則無計矣某昨聞金天王與南嶽博戲不勝輸二十萬甚被逼逐足下可詣嶽廟厚數以許之必能施力于仙官縱力不及亦得路於蓮花峰下不爾荊榛蒙密川谷阻絶無能往者令于是齎牲牢馳詣嶽廟以千萬許之然後直詣蓮花蜂得幽徑凡數十里至峰下轉東南有一茅堂見道士隱几而坐問令曰腐骨穢肉魂亡神耗者安得來此令曰鐘鳴漏盡露晞頃刻竊聞仙官能復精魂于朽骨致肌肉于枯骸既有好生之心豈惜奏章之力道士曰吾頃為隋朝權臣一奏道謫居此峰爾何德於豫欲陷吾為寒山之叟乎令衷祈愈切仙官神色甚怒俄有使者齎一函而至則金天王之書札也仙官覽書笑曰關節既到難為不應召使者反報曰莫又為上帝譴責否乃啓玉函書一通焚香再拜以遣之凡食頃天符乃降其上署徹字仙官復焚香再拜以啓之云張某棄背祖宗竊假名位不顧禮法苟竊官榮而又鄙僻多藏詭詐無實百里之任已是叨居千乘之富今因苟得令按罪已實待戮餘魂何為奏章求延厥命但以扶危拯溺者大道所尚紓刑宥過者玄門是宗狥爾一氓我全弘化希其悛惡庶乃自新貪生者量延五年奏章者不能無罪仙官覽畢謂令曰大凡世人之壽皆可至百歲而以喜怒哀樂汩沒心源愛惡嗜欲伐生之根而又揚己之能掩彼之長顛倒方寸頃刻萬變神倦思怠難全天和如彼淡泉汩於五味欲致不壞甚可得乎勉導歸途無墮吾教令拜辭舉手已失所在復尋舊路稍覺平易行十餘里黃衫吏迎前而賀令曰將欲奉報願知姓字吏曰吾姓鍾生為宣城縣腳力亡于華陰遂為幽冥所録遞符之役勞苦如舊令曰何以免執事之困曰但酬金天王願曰請置子為閽人則吾飽神盤子矣天符已違半日難更淹留便與執事別入廟南柘林三五步而沒是夕張令駐車華陰決東歸計酬金天王願所費數逾二萬乃語其僕曰二萬可以贍吾十舍之資糧矣安可受祉于上帝而私謁於土偶人乎明旦遂東至偃師止于縣館見黃衫舊吏齎牒排闥而進叱張令曰何虛妄之若是今禍至矣由爾償三峰之願不果俾吾答一飯之恩無始終悒悒之懷如痛毒螫言訖失所在頃刻張令有疾留書遺妻子未訖而終歐陽敏陝州東三十里本無旅舍行客或薄暮至此即有人遠迎安泊及曉前進往往有死者楊州客歐陽敏侵夜至其鬼即為一老叟迎歸舍夜半後叟詣客問鄉地便以酒炙延待客從容言及陰騭之事叟甚有驚怍之色客問怪之乃問曰鬼神能侵害人乎人能害鬼乎叟曰鬼神之事人不知何能害之鬼神必不肯無故侵害人也或侵害人者恐是妖鬼也猶人間之賊盜耳若妖鬼之害人偶聞于明神必不容亦不異賊盜之抵憲法也叟復深有憂色客怪之甚遂謂叟曰我若知妖鬼之所處必訴於尊神令盡剪除叟不覺起拜叩頭而言曰我強鬼也慮至曉君子不容今幸望哀恕仍獻一卷書與客曰此書預知帝王曆數保惜保惜客受之至曙不辭而去回顧乃一壞墳耳其書是篆字後客託人譯之傳于世奉天縣民會昌五年奉天縣國盛村民姓劉者病狂發時亂走不避井塹其家為迎禁呪人侯公敏治之公敏才至劉忽起曰我暫出不假爾治因杖薪擔至田中袒而運擔狀若擊物良久而返笑曰我病已矣適打一鬼頭落埋於田中兄弟及呪者猶以為狂遂同往驗焉劉掘出一髑髏戴赤髮十餘莖其病竟愈
