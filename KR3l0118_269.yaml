body:
  text: 胡元禮胡元禮唐胡元禮定城人也進士擢第纍授洛陽尉則天朝右臺員外監察尋即真加朝請大夫丁憂免起復尋檢校秋官郎中纍遷司刑少卿滑州刺史廣州都督性殘忍深刻不可以情祈時李日知任司刑丞每按獄務從寬元禮屢折之日知終不易嘗出一死囚元禮異判殺之與日知往復至于再三元禮怒命府吏謂曰元禮不離刑曹此囚無活法日知命報曰日知不離刑曹此囚無死法竟以兩狀申日知果直時人忌元禮之苛刻嘗于宣仁門外為冤家羅辱于泥中幸金吾救助敕榜仇者百臺中罰元禮五千以其辱臺也誣劉如璿惡黨劉如璿事親以孝聞解褐唐昌尉纍遷乾封尉為侍御史轉吏部員外則天朝自夏官郎中左授都城令轉南鄭令遷司僕司農少卿秋官侍郎時來俊臣黨人與司刑府史姓樊者不協誣以反誅之其子訟冤于朝堂無敢理者乃援刀自刳其腹朝士莫不目而悚惕璿不覺唧唧而淚下俊臣奏云黨惡下詔獄璿訴曰年老因遇秋風而淚下俊臣劾之曰目下涓涓之淚乍可因風口稱唧唧之聲如何取雪處以絞刑則天特流于瀼州子景憲訟冤得徵還復秋官侍郎辭疾授兗州都督好著述文集四十卷行於代俊臣但苛虐無文其劾乃鄭愔之詞也宋昱韋儇李林甫是姜皎外甥楊國忠是張易之外甥楊國忠為劍南召募使遠赴瀘南糧少路險常無回者其劍南行人每歲令宋昱韋儇為御史迫促郡縣徵之人知必死郡縣無以應命乃設詭計詐令僧設齊或于要路轉變其衆中有單貧者即縛之置密室中授以絮衣連枷作隊急遞赴役蕭頴士蕭頴士性異常嚴酷昔有一僕事之十餘載頴士每一箠楚百餘不堪其苦人或激之擇木其僕曰我非不能他從遲留者乃愛其才耳李希烈建中中李希烈攻汴州城未陷驅百姓婦女及輜重以實壕塹謂之濕梢盧𣏌殿中侍御史鄭詹與張鎰厚善每伺盧𣏌晝寢輒詣鎰𣏌知之他日𣏌假寐佯熟伺詹果來知與鎰偶語𣏌遽至鎰閣中詹趨避𣏌遂言密事鎰曰殿中鄭侍御在此𣏌佯愕曰向者所言非他人所宜聞也後深劾詹之罪以排嚴郢三司使方按二人獄猶未具而𣏌已奏殺詹黜郢中外側目襄樣節度襄陽人善為漆器天下取法謂之襄樣及于司空為師多暴鄭元鎮河中亦暴遠近呼為襄樣節度史牟史牟榷鹽於解縣初變榷法以中朝廷有外甥十餘歲從牟檢畦拾鹽一顆以歸牟知立杖殺之其姊哭而出救已不及矣李紳李紳以舊宰相鎮一方恣威權凡戳有罪猶待秋分永寧吳尉弟湘無辜盛夏被殺崔元藻銜德裕斥己即翻其辭因言御史覆獄還皆對天子別白是非權軋天下使不得對具獄不付有司但用紳奏而置湘死是時德裕已失權而宗閔故黨令狐綯崔鉉白敏中皆當路因是逞憾以利誘動元藻等使三司結紳杖鉞作藩虐殺良平準神龍詔書酷吏歿者官爵皆奪子孫不得進宦紳雖亡請從春秋戮死之比詔削紳三官子孫不得仕貶德裕等擢汝納左拾遺元藻武功令始紳以文藝節操見用然所至務為威烈或陷暴刻故卒坐湘冤云唐李紳既治淮南決吳湘獄持法峻犯者無宥狡吏奸豪潛形疊跡然出於獨見寮佐莫敢言評事李元將弟仲將僑寓江都李公羈旅時每館於元將而叔呼焉榮達後元將稱弟稱姪皆不悅及為孫方似相容又有崔巡官居鄭圃與紳同年之舊特來謁才及旅次家僕與市人競詰其所以僕曰宣州館驛崔巡官下僕與市人皆抵極法令捕崔至曰昔常識君到此何不相見崔叩頭謝曰適憩旅舍日已遲晚相公尊重非時不敢具陳畢禮伏希哀憐獲歸鄉里遂縻之具罪笞二十送過秣陵貌若死灰莫敢慟哭時人相謂曰李公宗叔翻為孫子故人忽作流囚於是邑客黎人懼罹不測渡江淮者衆矣主吏啓曰戶口逃亡不少紳曰汝不見掬麥乎秀者在下秕隨流者不必報來忽有少年勢似疏簡自云辛氏子謁紳晤對間未甚周至先是白尚書寄元相公詩曰悶勸迂辛酒閒吟短李詩蓋謂辛丘度性迂嗜酒李紳短而能詩辛氏即丘度子也謂李曰小子每憶白二十二丈詩悶勸疇昔酒閒吟二十丈詩李笑曰辛大有此狂兒吾敢不存舊矣凡是官族相抉辛氏子之能忤誕丞相之受侮剛腸暫屈乎又有一曹官到任儀質頗似府公李見而惡之書其狀曰著青把笏也請料錢覩此形骸足可傷嘆左右皆竊笑焉又宿將有過請罰紳云老兵倚恃年老而刑不加若在軍門一百也決竟不免檟楚胡浙潘之南七十里至辦州為陵水郡辦之守曰胡浙故淮西吳少誠之卒鴟張荒陬多法河朔叛將所為且好蹴鞠南方馬痹小不善馳騁浙每召將吏鞠且患馬之不習便更命夷民十餘輩肩輿浙輦揮杖肩者且走且擊旋環如風稍怠浙即以策叩其背亟鞭亟走用為笑樂嘻浙一叛卒耳彼雖夷獠天子之民也天意豈使可封者受毒痛於可誅者乎浙之不道彈人刳孕斯近之矣豈命吏者以遠人為芻狗耶何其用斯人也毒虐一方之民哉後一歲浙以罪聞詔流於九直自辦五十里至羅州為招義郡郡旁海海有煮海場三然郡民盜煮亦不能禁郡多蜜潔白如雪韋公幹崔州東南四十里至瓊山郡太守統兵五百人兼儋崖振萬安五郡招討使凡五郡租賦一供於招討使四郡之隸於瓊瓊隸廣海中五州歲賦廉使不得有一緡悉以給瓊軍用軍食仍仰給於海北諸郡每廣州易帥仍賜錢五十萬以犒秩瓊守雖海渚歲得金錢南邊經略使不能及郡守韋公幹者貪而且酷掠良家子為臧獲如驅犬豕有女奴四百人執業者太半有織花縑文紗者有伸角為器者有鎔鍛金銀者有攻珍木為什具者其家如市日考月課唯恐不程公幹前為愛州刺史境有馬援銅柱公幹推鎔貨與賈胡土人不知伏波所鑄且謂神物哭曰使君果壞是吾屬為海神所殺矣公幹不聽百姓奔訴於都護韓約約遺書責辱之乃止既牧瓊多烏文呿𠰹皆奇木也公幹驅木工沿海探伐至有不中程以斤自刃者前一歲公幹以韓約壻受代命二大舟一實烏文器雜以銀一實呿陀器雜以金浮海東去且令健卒護行將抵廣木既堅密金且重未數百里二舟俱覆不知幾萬萬也書曰貨勃而入亦勃而出公幹不道殘人以得貨竭夷獠之膏血以自厚徒穢其名曾不得少有其利陰禍陰匿苟脫人誅將鬼得誅也趙思綰賊臣趙思綰自倡亂至敗凡食人肝六十六無非面剖而膾之至食欲盡猶宛轉叫呼而戮者人亦一二萬嗟乎倘非名所仗皇威而剿之則孰能剪滅黔黎之猰㺄安道進有安道進者即故雲州帥重霸季弟阿東人也性凶險莊宗潛龍時為小校常佩劍列於翊衛忽一日拔而玩之謂人曰此劍也可以刜鍾切玉孰敢當吾鋒鋩旁有一人曰此又是何利器妄此誇談假使吾引頸承之安能快斷乎道進曰真能引頸乎此人以為戲言乃引頸而前遂一揮而斷旁人皆驚散道進攜劍日夜南馳投于梁主梁主壯之俾隸淮之鎮戍有掌庾吏進謂曰古人謂洞其七札為能吾之銛鏃可徹其十札矣爾輩安知之吏輕之曰使我開襟俟之能徹吾腹乎安曰試敢開襟否吏即開其襟道進一發而殪之利鏇徑過植于墻上安蓄一犬一婢遂掣而南奔晝則從于盧荻中夜則望星斗而竄又時看眼中神光光多處為利方光少處為不利既能伏氣遂絶粒經時抵江湖間左挈婢右攜犬而轍浮渡殊無所損淮帥得之擢為裨將賜與甚豐時兄重霸事蜀亦為列校聞弟在吳乃告王蜀主王嘉其意發一介以請之逮至蜀亦為主將後領兵戍于天水營長道縣重霸為招討馬步使駐于秦亭縣民有愛子託之于安命之曰廳子道進適往戶外廳子偶經行於寢之前安疑之大怒遂腰斬而投于井其家號訴於霸傳送招討使王公至于南梁王公不忍加害表救活之及憾其元昆又欲害其家族兄家間卜戶防之蜀破道進東歸明宗補為諸州馬步軍都指揮使後有過鞭背卒
