body:
  text: 周賢者周賢者唐則天朝相國裴炎第四弟為虢州司戶虢州有周賢者居深山不詳其所自與司戶善謂曰公兄為相甚善然不出三年當身戮家破宗族皆誅可不懼乎司戶具悉其行事知非常人也乃涕泣而請救周生曰事猶未萌有得脫理急至都以吾言告兄求取黃金五十鎰將來吾於弘農山中為作章醮可以移禍殃矣司戶於是取急還都謁兄河東侯炎炎為人睦親於友悌甚至每兄弟自遠來則同臥談笑雖彌歷旬日不歸內寢焉司戶夜中以周賢語告之且求其金炎不信神鬼至於邪俗鎮厭常呵怒之聞弟言大怒曰汝何不知大方而隨俗幻惑此愚輩何解而欲以金與之且世間巫覡好託鬼神取人財物吾見之常切齒今汝何故忽有此言靜而思之深令人恨司戶泣曰周賢者識非俗幻每見發言未嘗不中兄為宰相家計溫足何惜少金不會轉災為祥也炎滋怒不應司戶知兄志不可奪惆悵辭歸弘農時河東侯初立則天為皇后專朝擅權自謂有泰山之安故不信周言而卻怒恨及歲餘天皇崩天后漸親朝政忌害大臣嫌隙屢搆乃思周賢者語即令人至弘農召司戶至都炎餽具黃金令求賢者於弘農諸山中盡不得尋至南陽襄陽江陵山中乃得之告以兄言賢者因與還弘農謂司戶曰往年禍害未成故可壇場致請今災祥已搆不久滅門何求之有且吾前月中至洛見裴令被戮繫其首於右足下事已如此且無免勢君勿更言且吾與司戶相知日久不可令君與兄同禍可求百兩金與君一房章醮請帝可以得免若言裴令終無益也司戶即市金與賢者入弘農山中設壇場奏章請命法事畢仍藏金於山中謂司戶曰君一房免禍矣然急去官移家襄陽司戶即遷家襄陽月餘而染風疾十月而裴令下獄極刑兄弟子姪皆從而司戶風疾在襄州有司奏請誅之天后曰既染風疾死在旦夕不須問此一房特宜免死由是得免初河東侯遇害之夕而犬咬其首曳焉及明守者求得之因以髮繫其首於左足下竟如初言出紀聞王常王常者洛陽人負氣尚義見人不平必手刃之見人飢寒至於解衣推食略無難色至德二年常於終南山遊遇風雨宿於中山夜將半雨晴雲飛月朗風恬常慨然四望而歎曰我欲平天下亂無一人之柄以佐我無尺土之封以資我我欲救天下之飢寒而又衣食亦不自充天地神祗福善故不足信言訖有一神人自空而下謂常曰爾何此言常按劍沉吟良久乃對曰我言者平生之志也是何神聖降臨此間神人曰我有術黃金可成水銀可死雖不足平禍亂亦可少濟人之飢寒爾能授術於我以救世人飢寒乎常曰我聞此術是神仙之術空有其名未之見也況載籍之內備敘秦皇漢武好此道終無成但為千載之譏誚神人曰秦皇漢武帝王也帝王處救人之位自有救人之術而不行反求神仙之術則非爾無救人之位欲救天下之人固可行此術常曰黃金成水銀死真有之乎神人曰勿疑有之哉夫黃金生於山石其始也是山石之精而千年為水銀水銀受太陰之氣固流蕩而不凝定微遇純陽之氣合則化黃金於倏忽也今若以水銀欲化成黃金必須在山即化不在山即不化但遇純陰之石氣合即化也我有書君受之勿疑常乃再拜神人神人於袖中取一卷書授常常跪受訖神人戒之曰讀此書盡了黃白之道異日當卻付一人勿輕授勿終祕勿授之以貴人勿授之以道流僧徒彼皆少有救人之術勿授之以不義之輩彼必不以飢寒為念黃金成濟人之外勿奢逸珍重我術珍重我言如不然天奪爾算常又再拜曰神人今授我聖術固終身無忘也但乞示我是何神聖使我知大惠之處神仙曰我山神也昔有道人藏此書於我山今遇爾義烈之人是以付爾言訖而滅常得此書讀之遂成其術爾後多遊歷天下以黃金賑濟之絶出奇事記葉虛中唐貞元初丹陽令王瓊三年調集皆黜落甚惋憤乃齋宿于茅山道士葉虛中求奏章以問吉凶虛中年九十餘強為奏之其章隨香煙飛上縹眇不見食頃復墮地有朱書批其末云受金百兩折祿三年枉殺二人死後處分後一年瓊果得暴疾終出獨異志鄭君唐貞元末鄭君知鹽鐵信州院常有頑夫不察所從來每於人吏處恐脅茶酒鄭君擒至笞脊方庭煉礦次計銀數萬兩杖訖曳去色返揚揚呼曰且看此物得成否果竟不變鄭君怒枷送鹽鐵使江西李公公即棒殺之旬日又至復於爐處言曰看更得成就否亦如前鄭公令捉倒先折腳笞死沃以豕血埋獄中明旦擺撥復自門來至使等驚異皆迎接曰我本與汝作戲礦但重鍊無慮也乃去鄭君視於瘞所悉已無矣銀並成就從不復見矣出逸史程逸人上黨有程逸人者有符術劉悟為澤潞節度臨沼縣民蕭季平家甚富忽一日無疾暴卒逸人嘗受平厚惠聞其死即馳往視之語其子云爾父未當死蓋為山神所召治之尚可活于是朱書一符向空擲之僅食頃季平果蘇其子問父向安適乎季平曰我今日方起忽見一緑衣人云霍山神召我由是與使者俱行約五十餘里適遇丈夫朱衣仗劍怒目從空而至謂我曰程斬邪召汝汝可即去於是緑衣者馳走若有懼朱衣人牽我復偕來有頃忽覺醒然其家驚異因質問逸人曰所謂程斬邪者誰邪逸人曰吾學於師氏歸氏龍虎斬邪符籙因解所佩籙囊以示之人方信其不誣逸人後遊閩越竟不知所在出宣室志李處士李文公翱自文昌宮出刺合淝郡公性褊直方正未嘗信巫覡之事郡客李處士者自云能通神人之言言事頗中合郡肅敬如事神明公下車旬月乃投刺候謁禮容甚倨公謂曰仲尼大聖也而云未知生焉知死子能賢於宣文邪生曰不然獨不見阮生著無鬼論精辨宏贍人不能屈果至見鬼乎且公骨肉間旦夕當有遘疾沉困者苟晏安鴆毒則已或或原作成據唐闕史改五常粗備漬漬原作請據唐闕史改以七情孰忍視溺而不援哉公愈怒立命械繫之夫人背疽明日內潰果不食昏暝百刻不糝遍召醫藥曾無少瘳愛女十人既笄未嫁環床呱呱而泣自歸咎於文公之桎梏李生也公以卯央義重息裔情牽不得已解縲絏而祈叩之則曰若手翰一文俟夜當祈之宜留墨篆同焚當可脫免仍誡曰慎勿箋易鉛槧他無所須矣公竟受教即自草祝語潔手書之公性褊且疑數紙皆誤不能爽約則又再書炬灺更深疲於毫硯克意一幅繕札稍嚴而官位之中竟箋一字既逾時刻遂並符以焚焚畢呻吟頓減合室相慶黎明李生候謁公深德之生曰禍則見免猶謂遲遲誡公無得漏略何為復注一字公曰無之生曰祝詞在斯因探懷以出示則昨夕所燼之文也公驚愕慚赧避席而拜酬之厚幣竟無所取旬日告別不知所往疾亦漸間出唐闕史駱玄素趙州昭慶民駱玄素者為小吏得罪於縣令遂遁迹而去令怒分捕甚急遂匿身山谷中忽遇老翁衣褐衣質狀凡陋策杖立于長松之下召玄素訊之曰爾安得至此耶玄素對得罪於縣令遁逃至此幸翁見容翁引玄素入深山僅行十餘里至一巖穴見二茅齋東西相向前臨積水珍木奇花羅列左右有侍童一人年甚少總角衣短褐白衣緯帶革舄居於西齋其東齋有藥竈命玄素候火老翁自稱東真君命玄素以東真呼之東真以藥十餘粒令玄素餌之且曰可以治飢矣自是玄素絶粒僅歲餘授符術及吸氣之法盡得其妙一日又謂玄素曰子可歸矣既而送玄素至縣南數十里執手而別自此以符術行里中常有孕婦過期不産玄素以符一道令餌之其夕即産於兒手中得所吞之符其他神效不可具述其後玄素犯法刺史杖殺之凡月餘其尸如生曾無委壞之色蓋餌靈藥所致於是里人收瘞之時寶曆元年夏月也出宣室志趙操趙操者唐相國憬之孽子也性疏狂不慎相國屢加教戒終莫改悔有過懼罪因盜小吏之驢攜私錢二緍竄於旗亭下不日錢盡遂南出啓夏門恣意縱驢從其所往俄屆南山漸入深遠猿鳥一徑非畜乘所歷操即繫驢山木躋攀獨往行可二十里忽遇人居因即款門既入有二白髮叟謂操曰汝既至可以少留操顧其室內妻妾孤幼不異俗世操端無所執但恣遊山水而甚安焉月餘二叟謂操曰勞汝入都為吾市山中所要操則應命二叟曰汝所乘驢貨之可得五千汝用此依吾所約買之而還操因曰操大人方為國相今者入京懼其收維且驢非己畜何容便貨況縶之山門今已一月其存亡不可知也二叟曰第依吾教勿過憂苦操即出山宛見其驢尚在還乘之而馳足力甚壯貨之果得五千因探懷中二叟所示之書惟買水銀耳操即為交易薄晚而歸終暝遂及二叟之舍二叟即以雜藥燒煉俄而化為黃金因以此術示之於操自爾半年二叟徐謂操曰汝可歸寧三年之後當與汝會於茅廬操願留不獲於是辭訣及家相國薨再宿矣操過小祥則又入山歧路木石峰巒樹木皆非向之所經也操亟返服闋因告別昆仲遊於江湖至今無羈於世從學道者甚衆操終無傳焉出集異記崔玄亮唐太和中崔玄亮為湖州牧嘗有僧道間善藥術崔曾求之僧曰此術不難求但利於此者必及陰譴可令君侯一見耳乃遣崔市汞一斤入瓦鍋納一紫丸蓋以方瓦疊灰埋鍋鞴而焰起謂崔曰只成銀無以取信公宜虔心想一物則自成矣食頃僧夾鍋於水盆中笑曰公想何物崔曰想我之形僧取以示之若范金焉眉目巾笏悉具之矣此則神仙之術不可厚誣但罕遇其流有自言者皆妄焉耳出唐年補録
