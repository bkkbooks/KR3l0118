body:
  text: 王生王生杭州有王生者建中初辭親之上國收拾舊業將投于親知求一官耳行至圃田下道尋訪外家舊莊日晚柏林中見二野狐倚樹如人立手執一黃紙文書相對言笑旁若無人生乃叱之不為變動生乃取彈因引滿彈之且中其執書者之目二狐遺書而走王生遽往得其書才一兩紙文字類梵書而莫究識遂緘于書袋中而去其夕宿于前店因話于主人方訝其事忽有一人攜裝來宿眼疾之甚若不可忍而語言分明聞王之言曰大是異事如何得見其書王生方將出書主人見患眼者一尾垂下床因謂生曰此狐也王生遽收書于懷中以手摸刀逐之則化為狐而走一更后復有人扣門王生心動曰此度更來當與刀箭敵汝矣其人隔門曰爾若不還我文書后無悔也自是更無消息王生祕其書緘滕甚密行至都下以求官伺謁之事期方賒緩即乃典貼舊業田園卜居近坊為生生之計月余有一僮自杭州而至可入門手執凶王生迎而問之則生已丁家難已數日聞之慟哭生因視其書則母之手字云吾本家秦不願葬于外地今江東田地物業不可分毫破除但都下之業可一切處置以資喪事備具皆畢然后自來迎接王生乃盡貨田宅不候善價得其資備涂芻之禮無所缺少既而復籃舁東下以迎靈輿及至揚州遙見一船子上有數人皆喜笑歌唱漸近視之則皆王生之家人也意尚謂其家貨之今屬他人矣須臾又有小弟妹搴帘而出皆彩服笑語驚怪之際則其家人船上驚呼又曰郎君來矣是何服飾之異也王生潛令人問之乃見其母驚出生遽毀其衰絰行拜而前母迎而問之其母駭曰安得此理王生乃出母送遺書乃一張空紙耳母又曰吾所以來此者前月得汝書云近得一官令吾盡貨江東之産為入京之計今無可歸矣及母出王生所寄之書又一空紙耳王生遂發使入京盡毀其凶喪之具因鳩集余資自淮卻扶侍且往江東所有十無一二才得數間屋至以庇風雨而已有弟一人別且數歲一旦忽至見其家道敗落因征其由王生具話本末又述妖狐事曰但應以此為禍耳其弟驚嗟因出妖狐之書以示之其弟才執其書退而置于懷中曰今日還我天書言畢乃化作一狐而去李自良唐李自良少在兩河間落拓不事生業好鷹鳥常竭囊貨為韝紲之用馬燧之鎮太原也募以能鷹犬從禽者自良即詣軍門自上陳自良質狀驍健燧一見悅之置于左右每呼鷹逐獸未嘗不愜心快意焉數年之間纍職至牙門大將因從禽縱鷹逐一狐狐挺入古壙中鷹相隨之自良即下馬乘勢跳入壙中深三丈許其間朗明如燭見磚塌上有壞棺復有一道士長尺余執兩紙文書立于棺上自良因掣得文書不復有他物矣遂臂鷹而出道士隨呼曰幸留文書當有厚報自良不應乃視之其字皆古篆人莫之識明旦有一道士儀狀風雅詣自良自良曰仙師何所道士曰某非世人以將軍昨日逼奪天符也此非將軍所宜有若見還必有重報自良固不與道士因屏左右曰將軍裨將耳某能三年內致本軍政無乃極所願乎自良曰誠如此願亦未可信如何道士即超然奮身上騰空中俄有仙人絳節玉童白鶴徘徊空際以迎接之須臾復下謂自良曰可不見乎此豈是妄言者耶自良遂再拜持文書歸之道士喜曰將軍果有福祚后年九月內當如約矣于時貞元二年也至四年秋馬燧入覲太原耆舊有功大將官秩崇高者十余人從焉自良職最卑上問太原北門重鎮誰可代卿者燧昏然不省唯記自良名氏乃奏曰李自良可上曰太原將校當有耆舊功勳者自良后輩素所未聞卿更思量燧倉卒不知所對又曰以臣所見非自良莫可如是者再三上亦未之許燧出見諸將愧汗洽背私誓其心后必荐其年德最高者明日復問竟誰可代卿燧依前昏迷唯記舉自良上曰當俟議定于宰相耳他日宰相入對上問馬燧之將孰賢宰相愕然不能知其余亦皆以自良對之乃拜工部尚書太原節度使也李令緒李令緒即兵部侍郎李紓堂兄其叔選授江夏縣丞令緒因往覲叔及至坐久門人報云某小娘子使家人傳語喚入見一婢甚有姿態云娘子參拜兄嫂且得令緒遠到丞妻亦傳語云娘子能來此看兒侄否又云妹有何飲食可致之婢去后其叔謂令緒曰汝知乎吾與一狐知聞逾年矣須臾使人繼大食器至黃衫奴舁并向來傳語婢同到云娘子續來俄頃間乘四鐶金飾輿仆從二十余人至門丞妻出迎見一婦人年可三十余雙梳云髻光彩可鑒婢等皆以羅綺異香滿宅令緒避入其婦升堂坐訖謂丞妻曰令緒既是子侄何不出來令緒聞之遂出拜謂曰我侄真士人君子之風坐良久謂令緒曰觀君甚長厚心懷中應有急難于衆人令緒亦知其故談話盡日辭去后數來每至皆有珍饌經半年令緒擬歸東洛其姑遂言此度阿姑得令緒心矣阿姑緣有厄擬隨令緒到東洛可否令緒驚云行李貧迫要致車乘計無所出又云但許阿姑家自假車乘只將女子兩人并向來所使婢金花去阿姑事令緒應知不必言也但空一衣籠令逐駝家人每至關津店家即略開籠阿姑暫過歇了開籠自然出行豈不易乎令緒許諾及發開籠見三四黑影入籠中出入不失前約至東都將到宅令緒云何處可安置金花云娘子要于倉中甚便令緒即掃灑倉密為都置唯逐駝奴知之余家人莫有知者每有所要金花即自來取之阿姑時時一見后數月云厄已過矣擬去令緒問云欲往何處阿姑云胡璿除豫州刺史緣二女成長須有匹配今與渠處置令緒明年合格臨欲選家貧無計乃往豫州及入境見榜云我單門孤立亦無親表恐有擅托親故妄索供擬即獲時申報必當科斷往來商旅皆傳胡使君清白干謁者絶矣令緒以此懼進退久之不獲已乃潛入豫州見有人參謁亦無所得令緒便投刺使君即時引入一見極喜如故人云雖未奉見知公有急難久佇光儀來何晚也即授館供給頗厚一州云自使君到未曾有如此每日入宅歡宴但論時事亦不言他經月余令緒告別璿云即與處置路糧充選時之費便集縣令曰璿自到州不曾有親故擾李令緒天下俊秀某平生永慕奉昨一見知是丈夫以此重之諸公合見耳今請赴選各須與致糧食無令輕鮮官吏素畏其威自縣令已下贈絹無數十匹已下者令緒獲絹千匹仍備行裝又留宴別令緒因出戟門見別有一門金花自內出云娘子在山亭院要相見及入阿姑已出喜盈顏色曰豈不能待嫁二女又云令緒買得甘子不與令姑太慳也令緒驚云實買得不敢特送笑云此戲言耳君所買者不堪阿姑自有上者與令緒將去命取之一一皆大如拳既別又喚令緒回云時方艱難所將絹帛行李恐遇盜賊為之奈何乃曰借與金花將去但有事急一念金花即當無事令緒行數日果遇盜五十余人令緒恐懼墜馬忽思金花便見精騎三百餘人自山而來軍容甚盛所持器械光可以鑒殺賊略盡金花命騎士卻掣馳仍處分兵馬好去欲至京路店宿其主人女病云是妖魅令緒問主人曰是何疾答云似有妖魅歷諸醫術無能暫愈令緒云治卻何如主人珍重辭謝乞相救但得校損報效不輕遂念金花須臾便至具陳其事略見女之病乃云易也遂結一壇焚香為咒俄頃有一狐甚疥病縛至壇中金花決之一百流血遍地遂逐之其女便愈及到京金花辭令緒令緒云遠勞相送無可贈別乃致酒饌飲酣謂曰既無形跡亦有一言得無難乎金花曰有事但言令緒云願聞阿姑家事來由也對曰娘子本某太守女其叔父昆弟與令緒不遠嫁為蘇氏妻遇疾終金花是從嫁后數月亦卒故得在娘子左右天帝配娘子為天狼將軍夫人故有神通金花亦承阿郎余蔭胡使君即阿郎親子侄昨所治店家女其狐是阿郎門側役使此輩甚多金花能制之云鋭騎救難者是天兵金花要換不復多少令緒謝之云此何時當再會金花云本以姻緣運合只到今日自此姻緣斷絶便當永辭令緒惆悵良久傳謝阿姑千萬珍重厚與金花贈遺悉不肯受而去胡璿后歷數州刺史而卒裴少尹唐貞元中江陵少尹裴君者亡其名有子十余歲聰敏有文學風貌明秀裴君深念之后被病旬日益甚醫藥無及裴君方求道術士用呵禁之冀瘳其苦有叩門者自稱高氏子以符術為業裴即延入令視其子生曰此子非他疾乃妖狐所為耳然某有術能愈之即謝而祈焉生遂以符術考召近食頃其子忽起曰某病今愈裴君大喜謂高生為真術士具食飲已而厚贈緡帛謝遣之生曰自此當日日來候耳遂去其子他疾雖愈而神魂不足往往狂語或笑哭不可禁高生每至裴君即以此且祈之生曰此子精魂已為妖魅所系今尚未還耳不旬日當間幸無以憂裴信之居數日又有王生者自言有神符能以呵禁除去妖魅疾來謁裴與語謂裴曰聞君愛子被病且未瘳願得一見矣裴即使見其子生大驚曰此郎君病狐也不速治當加甚耳裴君因話高生王笑曰安知高生不為狐乃坐方設席為呵禁高生忽至既入大罵曰奈何此子病愈而乃延一狐于室內耶即為病者耳王見高來又罵曰果然妖狐今果至安用為他術考召哉二人紛然相詬辱不已裴氏家方大駭異忽有一道士至門私謂家僮曰聞裴公有子病狐吾善視鬼汝但告請入謁家僮馳白裴君出話其事道士曰易與耳入見二人二人又詬曰此亦妖狐安得為道士惑人道士亦罵之曰狐當還郊野墟墓中何為撓人乎既而閉戶相斗毆數食頃裴君益恐其家僮惶惑計無所出及暮闃然不聞聲開視三狐皆仆地而喘不能動矣裴君盡鞭殺之其子后旬月乃愈矣
