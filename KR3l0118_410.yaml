body:
  text: 果上柤稼柩樹實東方大荒之中有樹焉名曰柤稼柩柤柤梨也稼者株稼也柩昵也三千歲作花九千歲作實其花蕊紫色其實赤色亦高百丈或千丈也數張自輔東西南北方枝各近五十丈葉長七尺廣五尺色如緑青木皮如梓樹理如甘草味飴實長九尺圍如長無瓤核竹刀剖之如凝蜜得食復見實即滅矣言復見后實熟者壽一萬二千歲如何樹實南方大荒有樹焉名曰如何三百歲作花九百歲作實花色朱其實正黃高五十丈敷張如蓋葉長一丈廣二尺余似菅苧色青厚五分可以絮如厚朴材理如支九子味如飴實有核形如棗子長五尺圍如長金刀割之則酸蘆刀剖之則辛食之者地仙不畏水火不畏白刃仙梨南方有樹焉高百丈敷張自輔葉長一丈廣六尺名梨如今之柤梨但樹大耳其子徑三尺剖之少瓤白如素和羹食之地仙衣服不敗辟谷可以入水火也綺縞樹實東南荒中有邪木焉高三千丈或十余圍或七八尺其枝有喬直上不可那也葉如甘瓜三百歲盡落而生花形如甘瓜花復二百歲落而生萼萼下生子三歲而成熟成熟之后不長不減子形如寒瓜似冬瓜也長七八寸徑四五寸萼復覆生頂言發萼而得成實此不取萬世如故若取子而留萼萼復生子如初年月復成熟復二年則成萼則復生子其子形如甘瓤少鍊甘美食之令人身澤不可過三升令人冥醉半日乃醒木高人取不能得唯木下有多羅之人緣能得之一名無葉世人后生不見葉謂之無葉也一名綺縞人見無葉謂之綺縞波那婆樹實波那婆樹出佛林國呼為阿薩嚲樹長五六丈皮色青緑葉極光淨冬夏不凋無花結實其實從樹莖出大如冬瓜有皮裹之殼上有刺瓤至甘甜可食核大如棗一實有數枚核中仁如粟黃炒之食甚美瞻波異果瞻波國有人牧牛百餘頭有一牛離群忽失所在至暮方歸形色鳴吼異常牛主異之明日遂獨行主因隨之入一穴行五六里豁然明朗花木皆非人間所有牛于一處食草草不可識有果作黃金色牧牛人竊將還為鬼所奪又一日復往取此果至穴鬼復欲奪其人急吞之身遂暴長頭才出身塞于穴數日化為石神仙李防陵楚山有朱神李圃三十六所潘嶽閒居賦云房陵朱神之李又李尤果賦云三十六之朱李蓋仙李縹而神李紅陸士衡果賦云中山之縹李是也武陵桃李武陵源在吳中山中無他木盡生桃李俗呼為桃李原原上有石洞洞中有乳水世傳秦亂吳人于此避難者食桃李實者皆得仙去金李杜陵有金李李之大者謂之夏李尤小者謂之鼠李漢帝杏濟南郡之東南有分流山山上多杏大如梨色黃如桔土人謂之漢帝杏亦曰金杏仙人杏杏圃洲南海中多杏海上人云仙人種杏處漢時嘗有人舟行遇風泊此洲五六日日食杏故免死云洲中有冬杏王充果賦云冬實之杏春熟之甘晉郭太儀果賦云杏或冬而實御李子許昌節使小廳是故魏景福殿董卓亂魏武挾令遷帝自洛都許許州有小李子色黃大如櫻桃謂之御李子即獻帝時所植至今有焉朱李魏文帝安陽殿前天降朱李八枚啖一枚數日不食今李種有安陽李大而甘者即其種也兔頭奈白奈出涼州野豬澤大如兔頭脂衣奈漢時紫奈大如升核紫花青研之有汁可漆或著衣不可浣朱奈唐貞觀年中頓丘縣有一賢者于黃河渚上拾菜得一樹栽子大如指持歸蒔之三年乃結子五顆味狀如奈又似林檎多汁異常酸美送縣縣上州以其奇味乃進之上賜綾一十匹后樹長成漸至三百顆每年進之號曰朱奈至今存德貝博等州取其枝接所在丰足人以為從西域浮來礙渚而住矣文林果唐永徽中魏郡臨黃王國村人王方言嘗于河中灘上拾得一小樹栽埋之及長乃林檎也實大如小黃瓠色白如玉間以珠點亦不多三數而已有如纈實為奇果光明瑩目又非常美紀王慎為曹州刺史有得之獻王王貢于高宗以為朱奈又名五色林檎或謂之聯珠果種于苑中西城老僧見之云是奇果亦名林檎上大重之賜王方言文林郎亦號此果為文林郎果俗云頻婆果河東亦多林檎秦中亦不少河西諸郡亦有林檎皆小于文林果聖奈河州鳳林關有靈岩寺每七月十五日溪穴流出聖奈大如盞以為常木桃桃之大者木桃詩云投我以木桃是也東方村桃東方村有桃樹其子徑三尺二寸和核羹食之令人益壽食核中仁可以治嗽小桃溫潤既嗽人食之即止也仙桃出郴州蘇耽仙壇有人至心求之者桃落壇上或至五六顆形似石塊赤黃色破之如有核三重研飲之愈衆疾尤治邪氣勾桃鄴華林苑勾桃子重三斤或二斤半亦有名梨者比衆果氣味甘美入口消釋人間有名果季龍作蝦蟆車四箱廣一丈深一丈合土載中植之則無不生也一石桃吐谷渾桃大如石瓮偏桃偏桃出波斯國波斯呼為婆淡樹長五六丈圍四五尺葉似桃而闊大三月開花白色花落結實狀如桃子而形偏其肉苦澀不堪啖核中仁甘甜西域諸國并珍之王母桃洛陽華林園內有之十月始熟形如括簍俗語曰王母甘桃食之解勞亦名西王母桃食核桃楊子留后吳堯卿家有傭賃者役之既久一日持一大桃核可容數升以獻堯卿堯卿知其異稍磨之取食食盡頗覺輕健堯卿為吏貪猥殘虐畢師鐸之難投所居后閣井中死師鐸求得類堯卿者殺之后有得其故居者竊知其尸在井中取而得之舉體皆腐壞而藏府有成金者韶子初寧縣里有石榆子一名山棗又時呼為韶子也羅浮甘子羅浮甘子唐開元中始有山僧種于南樓寺其后進獻幸蜀奉天之歲皆不結實天寶甘子唐天寶十年上謂幸臣曰近于宮內種甘子數株今秋結實一百五十顆與江南蜀道所進不異宰臣賀表曰雨露所均混天區而齊被草木有性憑地氣而潛通故得資江外之珍果為禁中之華實相傳云玄宗幸蜀年羅浮甘子不實嶺南有蟻大于秦中馬蟻結巢于甘樹實時幸循其上故甘皮薄而滑往往甘實在巢中冬深取之味數倍于常者北方棗北方荒中有棗林焉其高五十丈敷張枝條數里余疾風不能偃雷電不能摧其子長六七寸圍過其長熟色如朱乾之不縮氣味潤澤殊于常棗食之可以安驅益氣故方書云此棗枝條盛于常棗亦益氣安軀赤松子云北方大棗味有殊既可益氣又安軀西王母棗鄴華林苑中西王母棗冬夏有葉九月生花臘月乃熟三子一尺又有圭角棗亦三子一尺仙人棗晉時太倉南有翟泉西有華林園園有仙人棗長五寸核細如針仲思棗信都獻仲思棗四百枝棗長四五寸紫色皮皺細核實肥有味賢于青州棗北齊時有仙人仲思得此棗種之亦名仙棗時海內唯有數樹波斯棗波斯棗出波斯國波斯呼為窟莽樹長三四丈圍五六尺葉如土藤不凋二月生花狀如蕉花有兩甲漸漸開罅中有十余房子長二尺黃白色有核熟則紫黑狀類干棗味甜如飴可食
