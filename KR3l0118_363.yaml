body:
  text: 韋滂韋滂唐大歷中士人韋滂膂力過人夜行一無所懼善騎射每以弓矢隨行非止取鳥獸烹灸至于蛇蝎蚯蚓蜣螂螻蛄之類見之則食嘗于京師暮行鼓聲向絶主人尚遠將求宿不知何詣忽見市中一衣冠家移家出宅子弟欲鎖門滂求寄宿主人曰此宅鄰家有喪俗云妨殺入宅當損人物今將家口于側近親故家避之明日即歸不可不以奉白也韋曰但許寄宿復何害也殺鬼吾自當之主人遂引韋入宅開堂廚示以床榻飲食皆備滂令仆使歇馬槽上置燭燈于堂中又使入廚具食食訖令仆夫宿于別屋滂列床于堂開其雙扉息燭張弓坐以伺之至三更欲盡忽見一光如大盤自空飛下廳北門扉下照耀如火滂見尤喜于暗中引滿射之一箭正中爆然有聲火乃掣掣如動連射三箭光色漸微已不能動攜弓直往拔箭光物墮地滂呼奴取火照之乃一團肉四向有眼眼數開動即光滂笑曰殺鬼之言果不虛也乃令奴烹之而肉味馨香極甚煮令過熟乃切割為摯摯之尤覺芳美乃沾奴仆留半呈主人至明主人歸見韋生喜其無恙韋乃説得殺鬼獻所留之肉主人驚歎而已柳氏唐大歷中有士人莊在渭南遇疾卒于京妻柳氏因莊居有一子年十一二夏夜其子忽恐悸不眠三更后見一老人白衣兩牙出吻外熟視之良久漸近前有婢眠熟因扼其喉咬然有聲衣隨手碎攫食之須臾骨露乃舉起飲其五藏見老人口大如箕子方叫一無所見婢已骨矣數月后亦無他士人祥齋日暮柳氏露坐納涼有胡蜂繞其首面柳氏以扇擊墮地乃胡桃也柳氏取置堂中遂長初如拳如碗驚顧之際已如盤矣嚗然分為兩扇空中轉輪聲如分蜂忽合于柳氏首柳氏碎首齒著于樹其物飛去竟不知何怪也王訴建中三年前楊府功曹王訴自冬調選至四月寂無音書其妻扶風竇氏憂甚有二女皆國色忽聞門有賣卜女巫包九娘者過其巷人皆推占事中遂召卜焉九娘設香水訖俄聞空間有一人下九娘曰三郎來與夫人看功曾有何事更無音書早晚合歸言訖而去經數刻忽空中宛轉而下至九娘喉中曰娘子酬答何物阿郎歸甚平安今日在西市絹行舉錢共四人長行緣選場用策子被人告所以不得見官作行李次密書之五月二十三日初明訴奄至宅竇氏甚喜坐訖便問君何故用策子令選事不成又于某月日西市舉錢共四人長行訴自以不附書愕然驚異妻遂話女巫之事即令召巫來曰忽憂來年必得好官今日西北上有人牽二水牛患腳可勿爭價買取旬月間應得數倍利至時果有人牽跛牛過即以四千貫買經六七日甚肥壯足亦無損同曲磨家二牛暴死卒不可市遂以十五千求買初訴宅在慶云寺西巫忽曰可速賣此宅如言貨之得錢十五萬又令于河東月僦一宅貯一年已來儲然后買竹作粗籠子可盛五六斗者積之不知其數明年春連帥陳少遊議築廣陵城取訴舊居給以半價又運土築籠每籠三十文計資七八萬始于河東買宅神巫不從包九娘而自至曰某姓孫名思兒寄住巴陵欠包九娘錢今已償足與之別歸故來辭耳吁嗟久之不見其形竇氏感其所謀謂曰汝何不且住不然吾養汝為兒可乎思兒曰娘子既許某更何愁可為作一小紙屋安于堂簷每食時與少食即足矣竇氏依之月余遇秋風飄雨中夜長歎竇氏乃曰今與汝為母子何所中外不然向吾床頭匱上安居可乎思兒又喜是夕移入便問拜兩娣不見形但聞其言訴長女好戲因謂曰娣與爾索一新婦于是紙畫一女布綵繢思兒曰請如小娣裝素其女亦戲曰依爾意其夜言笑如有所對即云新婦參二姑姑訴堂妹事韓家住南堰新有分娩二女作繡鞋欲遺之方命青衣裝思兒笑二女問笑何事答曰孫兒一足腫難著繡鞋竇氏始惡之思兒已知更數日乃告辭云且歸巴陵蒙二娣與娶新婦便欲將去望與令一船子長二尺已來令娣監將香火送至揚子江為幸足矣竇氏從其請二女又與一幅絹畫其夫妻相對思兒著緑秉板具小船上拜別自其去也二女皆若神不足者二年長女嫁外兄親禮夜卒于帳門以燭照之其形若黃葉爾小女適張初初嫁亦如其娣訴終山陽郡司馬李哲唐貞元四年春常州録事參軍李哲家于丹陽縣東郭去五里有莊多茅舍晝日無何有火自焚救之而滅視地麻屨迹廣尺余意為盜索之無狀旬時屢災而易撲方悟其妖異后乃有投擲空間家人怖悸輒失衣物有乳母阿萬者性通鬼神常見一丈夫出入隨之或為胡形須髯偉然羔裘貂帽間以朱紫倏閃出來哲晚習春秋于閣阿萬見胡人竊書一卷而去馳報哲哲閲書欠一卷方祝祈之須臾書復帙中亦無損污李氏患之意其庭竹聳茂鬼魅可栖潛議伐去之以植桃忽于庭中得一書聞君議伐竹種桃盡為竹籌州下粟方賤一船竹可貿一船粟幸速圖之其筆札不工紙方數寸哲兄子士溫士儒并剛勇常罵之輒失冠履后稍祈之而歸所失復投書曰惟聖罔念作狂唯狂克念作聖君始罵我而見祈今并還之書后言墨荻君狀居旬鄰人盜哲犬殺而食之事發又得一書曰里仁為美擇不處仁焉得智數旬之后其家失物至多家人意其鬼為盜又一書言劉長卿詩曰直氏偷金枉君謂我為盜今既得盜如之何士溫士儒竟扜御之是夏夜士溫醉臥背燭床頭見一丈夫自門直入不虞有人因至燭前士溫忽躍身擒之果獲燭亦滅于暗中扜御盡力久之喀喀有聲燭至堅漸是一瓦瓦背畫作眉目以紙為頭巾衣一小兒衣又以婦人披帛纏頭數匝方結之李氏遂釘于柱碎之數日外有婦人喪服哭于圃言殺我夫明日哭于庭乃投書曰諺所謂一雞死一雞鳴吾屬百戶當相報耳如是往來如初嘗取人衣著中庭樹扶疏莫知所由也求而遂解之又以大器物投小器物中出入不礙旬時士儒又張燈見一婦人外來戲燭下復為士儒擒焉扜力良久殺而硬燭之亦瓦而衣也遂末之而明日復有其類哀哭常畏三侄呼為二郎二郎至即不多來李氏潛欲徙其居而得一書曰聞君欲徙居吾已先至其所矣李氏有二老犬一名韓兒一名猛子自有此妖不復食常搖尾戲于空暗處遂斃之自后家有竊議事魅莫能知之一書自無韓大猛二吾屬無依又家人自郭返至其里見二丈夫于道側迎問家人曰聞爾家有怪異若之何遂以事答及行顧已不見李氏于潤州迎山人韋士昌士昌以符置諸瓦櫺間以壓之鬼書至曰符至聖也而置之屋上不亦輕為士昌無能為乃去聞淮楚有衛生者久于咒術乃邀之衛生至其鬼頗憚之其來稍疏衛生乃設道場以考召置箱于壇中宿昔箱中得一狀狀件所失物云若干物已貨訖得錢若干買果子及梳子等食訖其余若干并送還驗其物悉在箱中又言失鐺子其實不取請問諸水濱狀言孤騰腞等狀自此更不復來異日于河中果得鐺子乃驗水濱之説也盧瑗貞元九年前亳州刺史盧瑗家于東都康裕坊瑗父正病卒后兩日正晝忽有大鳥色蒼飛于庭巡翔空間度其影可闊丈四五家人咸見頃之飛入西南隅井中久而飛出人往視之其井水已竭中獲二卵大如斗將出破之血流數斗至明忽聞堂西奧有一女人哭往看見一女子年可十八九烏巾帽首哭轉哀厲問其所從來徐徐出就東間乃言曰吾誕子井中何敢取殺言畢卻往西間拽其尸如糜散之訖奮臂而去出門而滅其家大震懼取所留卵卻送于野使人馳問桑道茂道茂令禳謝之后亦無徵祥而莫測其異也廬江民貞元中有廬江都民因采樵至山會日暮忽見一胡人長丈余自山崦中出衣黑衣執弓矢民大恐遽走匿古木中窺之胡人佇望良久忽東向發一矢民隨望之見百步外有一物狀類人舉體黃毛數寸蒙烏巾而立矢中其腹輒不動胡人笑曰果非吾所及遂去又一胡亦長丈余魁偉愈于前者亦執弧矢東望而射中其物之胸亦不動胡人又曰非將軍不可又去俄有胡人數十衣黑臂弓腰矢若前驅者又見一巨人長數丈被紫衣狀貌極異緩步而來民見之不覺懍然巨胡東望謂其前驅者曰射其喉群胡欲爭射之巨胡誡曰非雄舒莫可他胡皆退有一胡前引滿一發遂中其喉其物亦不懼徐以手拔去三矢持一巨礫西向而來胡人皆有懼色前白巨胡事迫矣不如降之巨胡即命呼曰將軍願降其物乃投礫于地自去其中狀如婦人無發至群胡前盡收奪所執弓矢皆折之遂令巨胡跪于地以手連掌其頰胡人哀祈稱死罪者數四方釋之諸胡高拱而立不敢輒動其物徐以巾蒙首東望而去胡人相賀曰賴今日甲子耳不然吾輩其死乎既而俱拜于巨胡前巨胡頷之良久遂導而入山崦時欲昏黑民雨汗而歸竟不知其何物也揚州塔咨議朱景玄見鮑容説陳少遊在揚州時東市塔影忽倒老人言海影翻則如此高郵寺高郵縣有一寺不記名講堂西壁枕道每日晚人馬車輿影悉透壁上衣紅紫者影中魯莽可辨壁厚數尺難以理究辰午之時則無相傳如此二十余年或一年半年不見劉積中常于西京近縣莊居妻病亟未眠忽有婦人白首長才三尺自燈影中出謂劉曰夫人病唯我能理何不祈我劉素剛咄之姥徐戟手曰勿悔勿悔遂滅妻因暴心痛殆將卒劉不得已祝之言已復出劉揖之坐乃索茶一甌向日如咒狀顧令灌夫人茶才入口痛愈后時時輒出家人亦不之懼經年復謂劉曰我有女子及笄煩主人求一佳壻劉笑曰人鬼路殊難遂所托姥曰非求人也但為刻桐木稍工者可矣劉許諾因為具之經宿木人失矣又謂劉曰兼煩主人作鋪公鋪母若可某夕我自具車輿奉迎劉心計無奈之何亦許之至一日過酉有仆馬車乘至門姥亦至曰主人可往劉與妻各登其車馬天黑至一處朱門崇墉籠燭列迎賓客供帳之盛如王公家引劉至一廳朱紫數十有相識者有已歿者各相視無言妻至一堂蠟炬如臂錦翠爭煥亦有婦人數十存歿相識各半但相識而已及五更劉與妻恍惚卻還至家如醉醒十不記其一二數日姥復來拜謝曰我小女成長今復托主人劉不耐以枕抵之曰老魅敢如此擾之姥隨枕而滅妻隨疾發劉與男女酹地禱之不復出矣妻竟以心痛卒劉妹復病心痛劉欲徙居一切物膠著其處輕若履屐亦不可舉迎道流上章梵僧持咒悉不禁劉常暇日讀藥方其婢小碧自外來垂手緩步大言劉四頗憶平昔無既而嘶咽曰省躬近從泰山回路逢飛天野叉攜賢妹心肝我已奪得因舉袖袖中蠕蠕有物左顧似有所命曰可為安置又覺袖中風生沖簾幌婢入堂中乃對劉坐問存歿敘平生事劉與杜省躬同年及第友善其婢舉止笑語無不肖也頃曰我有事不可久留執劉手嗚咽劉亦悲不自勝婢忽倒及覺一無所記其妹亦自此無恙
