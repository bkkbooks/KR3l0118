body:
  text: 才名上官儀高宗承貞觀之後天下無事上官儀獨持國政嘗凌晨入朝巡洛水隄步月徐轡詠詩曰脈脈廣川流驅馬歷長洲鵲飛山月曙蟬噪野風秋音韻清亮群公望之若神仙出國史異纂東方虯左史東方虯每云二百年後乞與西門豹作對尤工詩沈佺期以工詩著名燕公張說嘗謂之曰沈三兄詩直須還他第一出國史異纂蘇頲蘇頲少聰俊一覽千言景龍二年六月二日初定內難准明鈔本准為唯頲為中書舍人在太極後閣時頲尚年少初當劇任文詔填委動以萬計時或憂其不濟而頲手操口對無毫釐差失主書韓禮譚子陽轉書詔草屢謂頲曰乞公稍遲禮等書不及恐手腕將廢中書令李嶠見之歎曰舍人思若湧泉嶠等所不測也出譚賓錄李邕李邕自刺史入計京師邕素負才名頻被貶斥皆以邕能文養士賈生信陵之流執事忌勝剝落在外人間素有聲稱後進不識京洛阡陌聚看以為古人或將眉目有異衣冠望風尋訪門巷又中使臨問索其新文復為人陰中竟不得進改天寶初為汲郡北海太守性豪侈明鈔本侈為俊不拘細行馳獵縱逸後柳勣下獄吉溫令勣引邕議及休咎厚相賂遺詞狀連引敕初明鈔本初作祁順之羅希奭馳往就郡決殺之邕早擅才名尤長碑記前後所製凡數百首受納饋送亦至鉅萬自古鬻文獲財未有如邕者出譚賓錄李華李華以文學名重於天寶末至德中自前司封員外起為相國李梁公峴從事檢校吏部員外時陳少遊鎮維揚尤仰其名一旦城門吏報華入府少遊大喜簪笏待之少頃復白云已訪蕭功曹矣穎功曹士也出摭言李白李太白初自蜀至京師舍於逆旅賀監知章聞其名首訪之既奇其姿又請所為文白出蜀道難以示之讀未竟稱歎數四號為謫仙人白酷好酒知章因解金龜換酒與傾盡醉期不間日由是稱譽光赫賀又見其烏棲曲歎賞苦吟曰此詩可以泣鬼神矣曲曰姑蘇臺上烏棲時吳王宮裏醉西施吳歌楚舞歡未畢西山猶銜半邊日金壺丁丁漏水多起看秋月墮江波東方漸高奈樂何或言是烏夜啼二篇未知孰是又烏夜啼曰黃雲城邊烏欲棲歸飛啞啞枝上啼機中織錦秦川女碧紗如煙隔窗語停梭向人問故夫欲說遼西淚如雨白才逸氣高與陳拾遺子昂齊名先後合德其論詩云梁梁字原闕據明鈔本補陳已來艷薄斯極沈休文又尚以聲律將復古道非我而誰歟玄宗聞之召入翰林以其才藻絕人器識兼茂便以上位處之故未命以官嘗因宮人行樂謂高力士曰對此良辰美景豈可獨以聲伎為娛儻時得逸才詞人吟詠之可以誇耀於後遂命召白時寧王邀白飲酒已醉既至拜舞頹然上知其薄聲律謂非所長命為宮中行樂五言律詩十首白頓首曰寧王賜臣酒今已醉儻陛下賜臣無畏始可盡臣薄技上曰可既遣二內臣掖扶之命研墨濡筆以授之又命二人張朱絲欄於其前白取筆抒思略不停綴十篇立就更無加點筆跡遒利鳳跱龍拏律度對屬無不精絕其首篇曰柳色黃金嫩梨花白雪香玉樓巢翡翠珠殿宿鴛鴦選妓隨雕輦徵歌出洞房宮中誰第一飛鷰在昭陽玄宗恩禮極厚而白才行不羈放曠坦率乞歸故山玄宗亦以非廊廟器優詔許之嘗有醉吟詩曰天若不愛酒酒星不在天地若不愛酒地應無酒泉天地既愛酒愛酒胡愧焉三盃通大道五斗合自然但得酒中趣勿為醒者傳更憶賀監知章詩曰欲向東南去定將誰舉杯稽山無賀老卻棹酒船回後在潯陽復為永王璘延接累謫夜郎時杜甫贈白詩二十韻多敘其事白後放還遊賞江表山水卒於宣城之采石葬於謝公青山范傳正為宣歙觀察使為之立碑以旌其隧初白自幼好酒於兗州習業平居多飲又於任城縣搆酒樓日日原作三據明鈔本改與同志荒宴其上少有醒時邑人皆以白重名望其重而加敬焉出本事詩房琯蘇州洞庭杭州興德寺房太尉琯云不遊興德洞庭未見佳處壽安縣有噴玉泉石溪皆山水之勝絕者也貞元中琯以賓客辭為縣令乃剷翳薈開徑隧人聞而異焉太和初博陵崔蒙為主簿標准於道周人方造而遊焉又顏太師真卿刻姓名於石或置之高山之上或沈之大洲之底而云安知不有陵谷之變耶出傳記韓愈韓愈好奇與客登華山絕峰度不能返發狂慟哭為書遺書遺二字原作遺書據明鈔本改華陰令令百計取之乃下又李氏子為千牛與其儕類登慈恩寺浮圖窮危極險躍出檻外失身而墜賴腰帶挂釘為風所搖久而未落同登者驚倒檻中不能復起院僧遙望急呼一寺悉出以救之乃連衣為繩久之取下經宿而蘇出國史補李約兵部員外郎李約汧公之子也以近屬宰相子而雅愛玄機蕭蕭沖遠德行既優又有山林之致琴道酒德詞調皆高絕一時一生不近女色性喜接引人物而不好俗談晨起草裹頭對客蹙融便過一日多蓄古器在潤州嘗得古鐵一片擊之精越又養一猨名生公常以之隨逐月夜泛江登金山擊鐵鼓琴猨必嘯和傾壺達夕不俟外賓醉而後已約曾佐李庶人錡浙西幕約初至金陵於府主庶人錡坐屢讚招隱寺標致一日庶人宴於寺中明日謂約曰十郎嘗誇招隱寺昨遊宴細看何殊州中李笑曰某所賞者疎野耳若遠山將翠幕遮古松用彩物裹腥膻涴鹿掊泉音樂亂山鳥聲此則實不如在叔父大廳也庶人大笑約性又嗜茶能自煎謂人曰茶須緩火灸活火煎活火謂炭火焰火也客至不限甌數竟日執持茶器不倦曾奉使行硤石縣東愛渠水清流旬日忘發出因話錄陸鴻漸太子文學陸鴻漸名羽其生不知何許人竟陵龍蓋寺僧姓陸于堤上得一初生兒收育之遂以陸為氏及長聰俊多聞學贍辭逸詼諧談辯若東方曼倩之儔鴻漸性嗜茶始創煎茶法至今鬻茶之家陶為其像置於錫器之間云宜茶足利至太和復州有一老僧云是陸僧弟子常諷歌云不羡黃金壘不羡白玉杯不羡朝入省不羡暮入臺唯羡西江水曾向晉陵城下來鴻漸又撰茶經二卷行於代今為鴻漸形者明鈔本者作貌因目為茶神有交易則茶祭之無以釜湯沃之出傳載獨孤及常州獨孤及末年尤嗜鼓琴得眼病不理意欲專聽出傳載杜兼杜兼嘗聚書萬卷每卷後必自題云倩俸寫來手自校汝曹讀之知聖道墜之鬻之為不孝出傳載李德裕李德裕與同列款曲或有徵所好者德裕言己喜見未聞新書策崔魏公鉉好食新䭃頭以為珍美從事開從字原闕開原作聞據北夢瑣言補改筵先一日前必到使院索索原作案據北夢瑣言改新煮䭃頭也杜豳公悰每早食饙飯乾脯崔侍中安潛好看鬥牛雖各有所美而非近利與夫牙籌金埒錢癖穀堆不其遠乎出北夢瑣言潘彥咸亨中貝州潘彥好雙陸每有所詣局不離身曾泛海遇風船破彥右手挾一板左手抱雙陸局口銜雙陸骰子二日一夜至岸兩手見骨局終不捨骰子亦在口出朝野僉載宋之愻洛陽縣丞宋之愻性好唱歌出為連州參軍刺史陳希古者庸人也令之愻教婢歌每日端笏立於庭中呦呦而唱其婢隔窗從而和之聞者無不大笑出朝野僉載朱前疑兵部郎中朱前疑貌醜其妻有美色天后時洛中殖業坊西門酒家有婢蓬頭垢面傴肩皤腹寢惡之狀舉世所無而前疑大悅之殆忘寢食乃知前世言宿瘤蒙愛信不虛也夫人世嗜慾一何殊性前聞文王嗜昌獨楚王嗜芹葅屈到嗜芰曾皙嗜羊棗宋劉雍嗜瘡痂本傳曰雍詣前吳興太守孟靈休靈休脫襪粘炙瘡痂墜地雍俯而取之飡焉宋明帝嗜蜜漬𧏿蛦每啖數升是知海上逐臭之談陳君愛醜之說何其怪歟天與其癖也出朝野僉載鮮于叔明劍南東川節度鮮于叔明好食臭蟲時人謂之蟠蟲每散令人採拾得三五升即浮之微熱水中以抽其氣盡以酥及五味熬之卷餅而啖云其味實佳出乾子權長孺長慶末前知福建縣明鈔本縣作院權長孺犯事流貶後以故禮部相國德輿之近宗遇恩復資留滯廣陵多日賓府相見皆鄙之將詣闕求官臨行群公飲餞於禪智精舍狂士蔣傳知長孺有嗜人爪癖乃於步健及諸傭保處薄給酬直得數兩削下爪或洗濯未精以紙裹候其酒酣進曰侍御遠行無以餞送今有少佳味敢獻遂進長孺長孺視之忻然有喜色如獲千金之惠涎流於吻連撮噉之神色自得合座驚異出乾𦠆子朱前疑兵部郎中朱前疑貌醜其妻有美色天后時洛中殖業坊西門酒家有婢蓬頭垢面傴肩皤腹寢惡之狀舉世所無而前疑大悅之殆忘寢食乃知前世言宿瘤蒙愛信不虛也夫人世嗜慾一何殊性前聞文王嗜昌獨楚王嗜芹葅屈到嗜芰曾皙嗜羊棗宋劉雍嗜瘡痂本傳曰雍詣前吳興太守孟靈休靈休脫襪粘炙瘡痂墜地雍俯而取之餐焉宋明帝嗜蜜漬𧏿蛦每啖數升是知海上逐臭之談陳君愛醜之說何其怪歟天與其癖也出朝野僉載鮮于叔明劍南東川節度鮮于叔明好食臭蟲時人謂之蟠蟲每散令人採拾得三五升即浮之微熱水中以抽其氣盡以酥及五味熬之卷餅而啖云其味實佳出乾子權長孺長慶末前知福建縣明鈔本縣作院權長孺犯事流貶後以故禮部相國德輿之近宗遇恩復資留滯廣陵多日賓府相見皆鄙之將詣闕求官臨行群公飲餞於禪智精舍狂士蔣傳知長孺有嗜人爪癖乃於步健及諸傭保處薄給酬直得數兩削下爪或洗濯未精以紙裹候其酒酣進曰侍御遠行無以餞送今有少佳味敢獻遂進長孺長孺視之忻然有喜色如獲千金之惠涎流於吻連撮噉之神色自得合座驚異出乾子
