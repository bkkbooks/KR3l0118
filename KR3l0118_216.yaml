body:
  text: 管輅管輅管輅洞曉術數初有婦人亡牛從卜曰可視東丘塚中牛當懸向上既而果得婦人反疑輅告官按驗乃知是術數所推又洛中一人失妻輅令與擔豕人鬥於東陽門豚逸入一舍突壞其牆其婦出焉輅鄉里范玄龍苦頻失火輅云有角巾諸生駕黑牛從東從東原作故車據明鈔本改來必留之宿後果有此生來玄龍因留之生急求去不聽遂宿主人罷入生懼圖己乃持刀門外倚薪假寐忽有一物以口吹火生惊斫之死而視之則狐也自是不復有災又有人捕鹿獲之為人所竊詣輅為卦云東巷第三家候無人時發其屋頭第七椽以瓦著椽下明日食時自送還汝也其夜盜者父患頭痛亦來自占輅令歸之病乃愈又治內吏失物輅使候人靜於寺門令指天畫地舉手四向暮果獲於故處出異苑又平原太守劉邠取山雞毛置器中使輅筮之輅曰高岳巖巖有鳥朱身羽翼玄黃鳴不失晨此山雞毛也出異苑淳于智鮑瑗家多喪及病淳于智為筮之卦成云宜入市門數十步有一人持荊馬鞭便就買取懸東北桑樹上無病三年當得財如其言後穿井得錢及銅器二十萬出獨異志柳林祖有日者柳林祖善卜筮其妻曾病鼠瘻積年不差漸困困原作因據明鈔本改垂命林祖遂占之得頤之復按卦曰應得姓石者治之當獲灸鼠而愈也既而鄉里有一賤家果姓石自言能除此病遂灸病者頭上三處覺佳俄有一鼠色黃秀逕前噞噞然伏而不動呼犬噬殺之視鼠頭上有三灸處病者自差出洞林隗炤晉隗炤善易臨終謂妻子曰後雖大荒勿賣宅後五年詔使龔負吾金以吾所書板告之後如其言妻齎板詣之使者惘然沈吟不悟取蓍筮之卦成曰妙哉隗生吾不負金賢夫自藏金以待太平知吾善易書板寄意金有五百斤盛以青瓷埋在堂屋去壁一丈入地九尺妻掘之果得金也出國史補遣明鈔本作出系蒙郭璞楊州別駕顧球娣生十年便病至年五十餘令郭璞筮之得大過之升其辭曰大過卦者義不嘉塚墓枯楊無英華振動遊魂見龍車身被重累嬰天邪法由斬樹樹原作祀據明鈔本改殺靈蛇非己之咎先入瑕案卦論之可奈何球乃訪跡其家事先世曾伐大樹得大蛇殺之女便病病後有群鳥數千迴翔屋上人皆怪之不知何故有縣農行過舍邊仰視見龍牽車五色晃爛甚大非常有頃遂滅出搜神記蔡鐵宋南郡王義宣在鎮府史蔡鐵者善卜王嘗在內齋見一白鼠緣屋梁上命左右射得之內函中命鐵卜函中何物卦成笑曰得之矣王曰狀之白色之鼠背明戶彎孤射之絕其左股鼠孕五子三雄二雌若不見信剖腹而立知王便剖之皆如鐵言賜萬錢出渚宮舊事吳中察聲者後魏末有吳士至北間目盲而妙察聲丞相嗣渤海王澄使試之聞劉桃枝之聲曰當代貴王侯將相死於其手然譬如鷹犬為人所使耳聞趙道德之聲曰亦貴人也聞太原公洋之聲曰當為人主聞澄之聲不動崔暹私掐之乃繆言亦國王也王曰我家群奴猶當極貴況吾身手後齊諸王大臣賜死多為桃枝之所拉殺焉而澄竟有蘭京之禍洋受禪是為文宣王出三國典略王子貞唐貞觀中定州鼓城縣人魏全家富母忽然失明問卜者王子貞子貞為卜之曰明年有從東來青衣者三月一日來療必愈至時候見一人著青紬襦遂邀為重設飲食其人曰僕不解醫但解作犁耳為主人作之其持斧繞舍求犁轅見桑曲枝臨井上遂斫下其母兩眼煥然見物此曲枝葉蓋井之所致也出朝野僉載張璟藏周郎中裴珪妾趙氏有美色曾就張璟藏卜年命藏曰夫人目長而慢視准相書豬視者淫婦人目有四白五夫守宅夫人終以姦廢宜慎之趙笑而去後果與人姦沒入掖庭出朝野僉載湊州筮者杜景佺信都人也本名元方垂拱中更為景佺剛直嚴正進士擢第後為鸞臺侍郎平章事時內史李昭德以剛直下獄景佺庭稱其公清正直則天怒以為面欺左授湊明鈔本湊作溱下同州刺史初任湊州會善筮者於路言其當重入相得三品而不著紫袍至是夏終服紫衫而終出御史臺記蔡微遠瀛州人安縣令張懷禮滄州弓高令晉行忠就蔡微遠卜轉式訖謂禮曰公大親近位至方伯謂忠曰公得京官今年祿盡宜致仕可也二人皆應舉明鈔本舉作選懷禮授左補闕後至和復二州刺史行忠授城門郎至秋而卒出朝野僉載車三車三者華陰人善卜相進士李蒙宏詞及第入京注官至華陰縣官令車三見誑云李益車云初不見公食祿諸公云應緣不道實姓名所以不中此是李蒙宏詞及第欲注官去看得何官車云公意欲作何官蒙云愛華陰縣車云得此官在但見公無此祿奈奈原作如據明鈔本改何眾皆不信及至京果注華陰縣尉授官相賀於曲江舟上宴會諸公令蒙作序日晚序成史翽先起於蒙手取序看裴士南等十餘人又爭起看序其船偏遂覆沒李蒙士南等並被沒溺而死出定命錄李老開元中有一人姓劉不得名假廕求官數年未捷忽一年銓試畢聞西市有李老善卜造而問之老曰今年官未合成生曰有人竊報我期以必成何不然也老人曰今年必不成來歲不求自得矣生既不信果為保所累被駁生乃信老人之神也至明年試畢自度書判微劣意其未遂又問李老李老曰勿憂也君官必成祿在大梁得之復來見我果為開封縣尉又重見老人老人曰君為官不必清儉恣意求取臨滿請為使入城更為君推之生至州果為刺史委任生思李老之言大取財賄及滿貯積千萬遂謁州將請充綱使州將遣部其州租稅至京又見李老李老曰公即合遷官生曰某今向秩滿後選之今是何時豈得更有官也老曰但三日內得官官亦合在彼郡得之更相見也生疑之遂去明日納州賦於左藏庫適有鳳凰見其處敕云先見者與改官生即先見遂遷授浚儀縣丞生益見敬李老又問為官之方云一如前政生滿歲又獲千萬還鄉居數年又調集復詣李老李老曰今當得一邑不可妄動也固宜慎之生果授壽春宰至官未暮坐贓免又來問李老老曰今當為君言之不必慚諱君先代曾為大商有二千萬資卒於汴州其財散在人處故君於此復得之不為妄取也故得無尤此邑之人不負君財豈可過求也生大伏焉出原化記開元中二道士開元二年梁州道士梁虛舟以九宮推算張鷟云五鬼加年天罡臨命一生之大厄以周易筮之遇觀之渙主驚恐後風行水上事即散又安國觀道士李若虛不告姓名暗使推之云此人今年身在天牢負大辟之罪乃可以免不然病當死無有救法果被御史李全交致其罪敕令處死死原作盡據明鈔本改而刑部尚書李日知左丞張庭珪崔玄昇侍郎程行謀咸請之乃免死配流嶺南二道士之言信有徵矣出朝野僉載蔣直天寶十二載永嘉人蔣直云郡城內有白幕太守李江忽丁憂李欲歸江北蔣又云公至縉雲郡卻詁當有一緋一綠一碧人來相推按然終無事後果採訪使張愿著緋大理司直杜喬著綠判官張璘著碧來推遇赦而止出定命錄
