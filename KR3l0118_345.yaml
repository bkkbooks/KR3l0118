body:
  text: 郭承嘏郭承嘏嘗寶惜法書一卷每攜隨身初應舉就雜文試寫畢夜猶早緘置篋中及納試而誤納所寶書貼却歸鋪于燭籠下取書帖觀覽則程氏宛在篋中計無所出來往于棘闈門外見一老吏詢其試事具以實告吏曰某能換之然某家貧居興道里倘換得願以錢三萬見酬承嘏許之逡巡齎程試入而書帖出授承嘏明日歸親仁里自以錢送詣興道里欸問久之吏家人出以姓氏質之對曰主父死三月力貧未辦周身之具承嘏驚歎久之方知棘圍所見乃鬼也遂以錢贈其家張庾張庾舉進士元和十三年居長安昇道里南街十一月八日夜僕夫他宿獨庚在月下忽聞異香滿院方驚之俄聞履聲漸近庚屣履聽之數青衣年十八九艷美無敵推門而入曰步月逐勝不必樂遊原只此院小臺藤架可矣遂引少女七八人容色皆艷絕服飾華麗宛若豪貴家人庾走避堂中垂簾望之諸女徐行直詣藤下須臾陳設牀榻雕盤玉樽盃杓皆奇物八人環坐青衣執樂者十人執拍板立者二人左右侍立者十人絲管方動坐上一人曰不告主人遂欲張樂得無慢乎既是衣冠邀來同歡可也因命一青衣傳語曰娣妹步月偶入貴院酒食絲竹輒以自樂秀才能暫出為主否夜深計已脫冠紗巾而來可稱疎野庾聞青衣受命畏其來也乃閉門拒之青衣扣門庚不應推不可開遽走復命一女曰吾輩同歡人不敢預既入其門不召亦合來謁閉門塞戶羞見吾徒呼既不來何須更召於是一人執樽一人糺司酒既巡行絲竹合奏殽饌芳珍音曲清亮庚度此坊南街盡是墟墓絕無人住謂從坊中出則坊門已閉若非妖狐乃是鬼物今吾尚未惑可以逐之少頃見迷何能自悟於是潛取搘牀石徐開門突出望席而擊正中臺盤紛然而散庚逐之奪得一盞以衣繫之及明視之乃一白角盞奇不可名院中香氣數日不歇盞鏁於櫃中親朋來者莫不傳視竟不能辨其所自後十餘日轉觀數次忽墮地遂不復見庚明年進士上第劉方玄山人劉方玄自漢南抵巴陵夜宿江岸古館廳西有巴籬隔之又有一廳常扃鏁云多怪物使客不安已十年不開矣中間為廳廊崩摧郡守完葺至新淨而無人敢入方玄都不知之二更後月色滿庭江山清寂唯聞籬西有婦人言語笑咏之聲不甚辨惟一老青衣語稍重而秦音者言曰往年阿郎貶官時常令老身騎偏面騧抱阿荊郎阿荊郎嬌不肯穩坐或偏于左或偏于右墜損老身左膊至今天欲陰則酸疼焉今又發矣明日必天雨如今阿荊郎官高也不知有老身無復聞相應答者俄而有歌者歌音清細若曳縷之不絕復吟詩吟聲切切如含酸和淚之詞不可辨其文久而老青衣又曰昔日阿荊郎愛念青青河畔草今日亦可謂綿綿思遠道也僅四更方不聞明旦果大雨呼館吏訊之吏云此西廳空無人方敘賓客不敢入之由方玄因令開院視之則秋草蒼苔沒階西則連山林無人跡也啟其廳廳則新淨了無所有唯前間東柱上有詩一首墨色甚新其詞曰爺娘送我青楓根不記青風幾迴落當時手刺衣上花今日為灰不堪著視其言則鬼之詩也館吏云此廳成來不曾有人居亦先無此題詩處乃知夜來人也復以此訪於人終不能知之光宅坊民元和中光宅坊民失姓名其家有病者將困迎僧持念妻兒環守之一夕眾髣髴見一人入戶眾遂驚逐乃投於甕間其家以湯沃之得一袋蓋鬼間取氣袋也忽聽空中有聲求其袋甚衷切且言我將別取人以代病者其家因擲還之病者即愈淮西軍將元和末有淮西軍將使於汴州止驛中夜久眠將熟忽覺一物壓己軍將素健驚起與之角力其物遂退因奪得手中革囊鬼闇中衷祈甚苦軍將謂曰汝語我物名我當相還鬼良久曰此蓄氣袋耳軍將乃舉甓擊之語遂絕其囊可盛數升絳色如藕絲攜於日中無影郭翥元和間有郭翥者常為鄂州武昌尉與沛國劉執謙友善二人每相語常恨幽顯不得通約先沒者當來告後執謙卒數月翥居華陰一夕獨處戶外嗟吁久而言曰聞郭君無恙翥聆其音知執謙也曰可一面也曰請去燭當與子談耳翥即徹燭引其袂而入與同榻話舊歷歷然又言冥途罪福甚明不可欺夜既分翥忽覺有穢氣發于左右須臾不可受即以手而捫之其軀甚大不類執謙翥有膂力知為他怪因攬其袂以身加之牢不可動掩鼻而臥既而告去翥佯與語留之將曉求去愈急曰將曙矣不遣我禍且及子翥不答頃之遂不聞語俄天曉見一胡人長七尺餘如卒數日者時當暑穢不可近即命棄去郊外忽有里人數輩望見疾來視之驚曰果吾兄也亡數日矣昨夜忽失所在乃取屍而去裴通遠唐憲宗葬景陵都城人士畢至前集州司馬裴通遠家在崇賢里妻女輩亦以車輿縱觀於通化門及歸日晚馳馬驟至平康北街有白頭嫗步走隨車而來氣力殆盡至天門街夜鼓時動車馬轉速嫗亦忙遽車中有老青衣從四小女其中有哀其奔迫者問其所居對曰崇賢即謂曰與嫗同里可同載至里門耶嫗荷媿及至則申重辭謝將下車遺一小錦囊諸女共開之中有白羅製為逝者面衣四焉諸女驚駭棄於路不旬日四女相次而卒鄭紹商人鄭紹者喪妻後方欲再娶行經華陰止于逆旅因悅華山之秀峭乃自店南行可數里忽見青衣謂紹曰有人令傳意欲暫邀君紹曰何人也青衣曰南宅皇尚書女也適於宅內登臺望見君遂令致意紹曰女未適人耶何以止於此青衣曰女郎方自求佳壻故止此紹詣之俄及一大宅又有侍婢數人出命紹入延之于館舍逡巡有一女子出容質殊麗年可初笄從婢十餘並衣錦繡既相見謂紹曰既遂披覿當去形迹冀稍從容紹唯唯隨之復入一門見珠箔銀屏煥爛相照閨閫之內塊然無侶紹乃問女是何皇尚書家何得孤居如是耶尊親焉在嘉耦為誰雖荷寵招幸祛疑抱女曰妾故皇公之幼女也少喪二親厭居城郭故止此宅方求自適不意良人惠然辱顧既愜所願何樂如之女乃命紹升榻坐定具酒殽出妓樂不覺向夕女引一金罍獻紹曰妾求佳壻已三年矣今既遇君子寧無自得妾雖慚不稱敢以金罍合巹願求奉箕帚可乎紹曰余一商耳多遊南北惟利是求豈敢與簪纓家為眷屬也然遭逢顧遇謹以為榮但恐異日為門下之辱女乃再獻金罍自彈箏以送之紹聞曲音淒楚感動於心乃飲之交獻誓為伉儷女笑而起時夜已久左右侍婢以紅燭籠前導成禮至曙女復于前閣備芳醪美饌與紹歡醉經月餘紹曰我當暫出以緝理南北貨財女郎曰鴛鴦配對未聞經月而便相離也紹不忍後又經月餘紹復言之曰我本商人也泛江湖涉道途蓋是常也雖深承戀戀然若久不出行亦吾心之所不樂者願勿以此為嫌當如期而至女以紹言切乃許之遂於家園張祖席以送紹乃橐囊就路至明年春紹復至此但見紅花翠竹流水青山杳無人迹紹乃號慟經日而返孟氏維揚萬貞者大商也多在於外運易財寶以為商其妻孟氏者先壽春之妓人也美容質能歌舞薄知書稍有詞藻孟氏獨遊於家園四望而乃吟曰可惜春時節依然獨自遊無端兩行淚長秪對花流吟詩罷泣下數行忽有一少年容貌甚秀美踰垣而入笑謂孟氏曰何吟之大苦耶孟氏大驚曰君誰家子何得遽至於此而復輕言之也少年曰我性落魄不自拘檢唯愛高歌大醉適聞吟咏之聲不覺喜動于心所以踰垣而至苟能容我於花下一接良談而我亦或可以彊攀清調也孟氏曰欲吟詩耶少年曰浮生如寄年少幾何繁花正妍黃葉又墜人間之恨何啻千端豈如且偷頃刻之歡也孟氏曰妾有良人萬貞者去家已數載矣所恨當茲麗景遠在他方豈惟惋嘆芳菲固是傷嗟契闊所以自吟拙句蓋道幽懷不虞君之涉吾地也何故少年曰我向聞雅咏今覩麗容固死命猶拚且責言何害孟氏即命牋續賦詩曰誰家少年兒心中暗自欺不道終不可可即恐郎知少年得詩乃報之曰神女得張碩文君遇長卿逢時兩相得聊足慰多情自是孟氏遂私之挈歸己舍凡踰年而夫自外至孟氏憂且泣少年曰勿爾吾固知其不久也言訖騰身而去頃之方沒竟不知其何怪也
