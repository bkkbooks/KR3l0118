body:
  text: 賀知章賀知章西京宣平坊有宅對門有小板門常見一老人乘驢出入其間積五六年視老人顏色衣服如故亦不見家屬詢問里巷皆云是西市賣錢貫王老更無他業察其非凡也常因暇日造之老人迎接甚恭謹唯有童子為所使耳賀則問其業老人隨意回答因與往來漸加禮敬言論漸密遂云善黃白之術賀素信重願接事之後與夫人持一明珠自云在鄉日得此珠保惜多時特上老人求説道法老人即以明珠付童子令市餅來童子以珠易得三十餘胡餅遂延賀賀私念寶珠特明鈔本特作持以輕用意甚不快老人曰夫道者可以心得豈在力爭慳惜未止術無由成當須深山窮谷勤求致之非市朝所授也賀意頗悟謝之而去數日失老人所在賀因求致仕入道還鄉出原化記蕭頴士功曹蕭頴士常密遊於陳留逆旅方食之次忽見老翁鬚鬢皓然眉目尤異至門目蕭久之微有嘆息又似相識蕭疑其意遂起揖問老人曰觀郎君狀貌有似一人不覺愴然耳蕭問似何人老人曰郎君一似齊鄱陽王王即蕭八代祖遂驚問曰王即某八代祖因何識之老人泣曰某姓左昔為都鄱陽書佐遍蒙寵遇遭李明之難遂爾逃亡苟免患耳因入山修道遂得度世適驚郎君乃不知是王孫也遂相與泣蕭敬異之問其年乃三百二十七年矣良久乃別今在灊山時出人間後不知所之出原化記李仙人洛陽高五娘者美於色再嫁李仙人李仙人即天上謫仙也自與高氏結好恆居洛陽以黃白自業高氏能傳其法開元末高李之睦已五六載後一夕五鼓後聞空中呼李一聲披衣出門語畢還謂高氏曰我天仙也頃以微罪譴在人間耳今責盡天上所由來喚既不得住多年繾綣能不愴然我去之後君宜以黃白自給慎勿傳人不得為人廣有點鍊非特損汝亦恐尚不利前人言訖飛去高氏初依其言後賣銀居多為坊司所告時河南少尹李齊知其事釋而不問密使人召之前後為燒十餘床銀器李以轉聞朝要不一年李及高皆卒時人以為天罰焉出廣異記何諷唐建中末書生何諷嘗買得黃紙古書一卷讀之卷中得髮捲規四寸如環無端諷因絶之斷處兩頭滴水升餘燒之作髮氣諷嘗言於道者道者曰吁君固俗骨遇此不能羽化命也據仙經曰蠹魚三食神仙字則化為此物名曰脈望夜以規映當天中星星使立降可求還丹取此水和而服之即時換骨上升因取古書閲之數處蠹漏尋義讀之皆神仙字諷方嘆伏出原化記黃尊師黃尊師居茅山道術精妙有販薪者於巖洞間得古書十數紙自謂仙書因詣黃君懇請師事黃君納其書不語日遣斫柴五十束稍遲並數不足呵罵及箠擊之亦無怨色一日見兩道士於山石上碁看之不覺日暮遂空返黃生大怒罵叱杖二十問其故乃具言之曰深山無人何處得有碁道士果是謾語遂叩頭曰實明日便捉來及去又見碁次乃佯前看因而擒捉二道士並局騰於室中上高樹唯得碁子數枚道士笑謂曰傳語仙師從與受卻法籙因以碁子歸悉言其事黃公大笑乃遣沐浴盡傳法籙受訖辭去不知其終出逸史裴老唐大曆中有王員外好道術雖居朝列布衣山客日與周旋一旦道侶數人在廳事王君方甚談諧拊掌會除溷裴老攜穢具至王君給使因聞諸客言竊笑之王君僕使皆怪少頃裴老受傭事畢王君將登溷遇於戶內整衣似有所白因問何事漸前曰員外大好道王驚曰某實留心於此曰知員外酷好然無所遇適廳中兩客大是凡流但誑員外希酒食耳王君竦異良久其妻呼罵曰身為朝官乃與此穢漢結交遣人逐之王君曰天真道流不擇所處裴老請去王君懇邀從容久方許諾曰明日來得否曰不得外後日來至期王君潔淨別室以候妻呼曰安有與除廁人親狎如此王君曰尚懼不肯顧我少頃至布袍曳杖頗有隱逸之風王君坐語茶酒更進裴老清言間發殊無荷穢之姿狀曰員外非真好道乃是愛藥耳亦有少分某既來莫要爐火之驗否王君叩頭曰小生酷嗜不敢便有祈請裴指鐵盒可二斤餘曰員外剩取火至以盒分兩片置於其中復以火覆之須臾色赤裴老於布袍角解一小囊取藥兩丸如麻粟除少炭撚散盒上卻堆火燒之食頃裴老曰成矣令王君僕使之壯者以火筯持出擲於地逡巡乃上上金盒矣色如雞冠王君降階再拜搕頭陳謝裴老曰此金一兩敵常者三兩然員外不用留轉將布施也別去曰從此亦無復來矣王君拜乞曰末學俗士願瀝丹懇須至仙伯山居中具起居禮裴老曰何用此乃約更三日於蘭陵坊西大菜園相覔王君亦復及期往至則果見小門扣之黃頭奴出問曰莫是王員外否遂將一胡床來令於中門外坐少頃引入有小堂甚清淨裴老道服降階侍女童十人皆有姿色延上勞問風儀質狀並與前時不同若四十餘人矣茶酒果實甚珍異屋室嚴潔服用精華至晚王君去裴老送出門旬日復來其宅已為他人所賃裴老不知所去也出逸史李虞信州李員外虞嘗與秀才楊稜遊華山窮搜巖谷時李公未仕及楊君俱有棲遁之志每遇幽賞即吟詠移時俄至一小洞巉高數尺不三四步甚高路極平易二人欲窮其迹約行四五里擬回又不可且相勉而進更二三里稍明少頃至洞口時已申酉之際川巖草樹不似人間亦有耕者耕者覩二人頗有驚異曰郎君何得到此乃具言之更二里餘有佛堂數人方飲茶次李公等因往求宿內一人曰須報洞主逡巡見有紫衣乘小馬從者四五呵路而至拜起甚雅曰得到此何也一個備述曰此處偏陋請至某居處遂同步而往到一府署多竹堂屋坐甚潔人吏數十因自言曰某姓杜名子華逢亂避世遇仙侶居此已數百年矣因止宿飲饌皆甚精豐內有駝羋其狀如牛晝夜論語因問朝廷之事留連纍日各遺銀器數事遣使者導之而返曰此可隱逸頗能住否二子色難子華笑執手而別且請無漏於人後楊君復往尋其洞穴不可見矣楊君改名儉官至御史謫番禺而卒李公終亦流蕩真仙靈境非所實好不可依名而往之也後君子誡之哉出逸史夏侯隱者不知何許人也大中末遊茅山天台間常攜布囊竹杖而已飲食同常人而獨居一室不雜於衆或露宿壇中草間樹下人窺覘之但見雲氣蓊鬱不見其身每遊三十五十里登山渡水而閉目善睡同行者聞其鼻鼾之聲而步不差跌足無蹶礙至所止即覺時號作睡仙後不知所終出神仙拾遺傳權同休秀才權同休元和中落第旅遊蘇湖間遇疾貧窘走使者本村墅人顧已一年矣疾中思甘豆湯令其市甘草顧者久而不去但具湯火來秀才且意其怠於祗承復見折樹枝盈握仍再三搓之微近火上忽成甘草秀才心大異之且意必道者良久取粗沙數壞挼捋已成豆矣及湯成與常無異疾亦漸差秀才謂曰豫貧迫若此無以寸進因褫垢衣授之可以此辦少酒肉將會村老丐少道路資也顧者微笑曰此固不足辦某當營之乃斫一枯桑樹成數筐扎聚於盤上噀之遂成牛肉復汲數瓶水傾之乃旨酒也村老皆醉飽獲束縑五十秀才慚謝顧者曰某本驕稚不識道者今返請為僕顧者曰豫固異人有少失謫於下賤合役於秀才若限不足復須力於他人請秀才勿變常庶卒某事也秀才雖諾之每呼指色上面戚戚不安顧者乃辭曰秀才若此果妨某事也因談秀才修短窮達之數且言萬物皆可化者唯淤泥中朱漆筯及髮藥力不能化因不知所之出酉陽雜俎
