body:
  text: 崑崙奴崑崙奴唐大曆中有崔生者其父為顯僚與蓋代之勳臣一品者熟生是時為千牛其父使往省一品疾生少年容貌如玉性稟孤介舉止安詳發言清雅一品命妓軸簾召生入室生拜傳父命一品欣然愛慕命坐與語時三妓人艷皆絶代居前以金甌貯含桃而劈之沃以甘酪而進一品遂命衣紅綃妓者擎一甌與生食生少年赧妓輩終不食一品命紅綃妓以匙而進之生不得已而食妓哂之遂告辭而去一品曰郎君間暇必須一相訪無間老夫也命紅綃送出院時生回顧妓立三指又反三掌者然後指胸前小鏡子云記取餘更無言生歸達一品意返學院神迷意奪語減容沮恍然凝思日不暇食但吟詩曰誤到蓬山頂上遊明璫玉女動星眸朱扉半掩深宮月應照璚芝雪艷愁左右莫能究其意時家中有崑崙奴磨勒顧瞻郎君曰心中有何事如此抱恨不已何不報老奴生曰汝輩何知而問我襟懷間事磨勒曰但言當為郎君釋解遠近必能成之生駭其言異遂具告知磨勒曰此小事耳何不早言之而自苦耶生又白其隱語勒曰有何難會立三指者一品宅中有十院歌姬此乃第三院耳返掌三者數十五指以應十五日之數胸前小鏡子十五夜月圓如鏡令郎來耶生大喜不自勝謂磨勒曰何計而能導達我鬱鬱字原空闕據明鈔本補結磨勒笑曰後夜乃十五夜請深青絹兩匹為郎君製束身之衣一品宅有猛犬守歌姬院門非常人不得輒入入必噬殺之其警如神其猛如虎即曹州孟海之犬也世間非老奴不能斃此犬耳今夕當為郎君撾殺之遂宴犒以酒肉至三更攜鍊椎而往食頃而回曰犬已斃訖固無障塞耳是夜三更與生衣青衣遂負而逾十重垣乃入歌妓院內止第三門繡戶不扃金釭微明惟聞妓長嘆而坐若有所俟翠環初墜紅臉才舒玉恨無妍珠愁轉瑩但吟詩曰深洞鶯啼恨阮郎偷來花下解珠璫碧雲飄斷音書絶空倚玉簫愁鳳凰侍衛皆寢鄰近闃然生遂緩搴簾而入良久驗是生姬躍下榻執生手曰知郎君頴悟必能默識所以手語耳又不知郎君有何神術而能至此生具告磨勒之謀負荷而至姬曰磨勒何在曰簾外耳遂召入以金甌酌酒而飲之姬白生曰某家本富居在朔方主人擁旄逼為姬僕不能自死尚且偷生臉雖鉛華心頗鬱結縱玉筯舉饌金爐泛香雲屏而每進綺羅繡被而常眠珠翠皆非所願如在桎梏賢爪牙既有神術何妨為脫狴牢所願既申雖死不悔請為僕隸願待光容又不知郎高意如何生愀然不語磨勒曰娘子既堅確如是此亦小事耳姬甚喜磨勒請先為姬負其囊橐粧奩如此三復焉然後曰恐遲明遂負生與姬而飛出峻垣十餘重一品家之守禦無有警者遂歸學院而匿之及旦一品家方覺又見犬已斃一品大駭曰我家門垣從來邃密扃鎖甚嚴勢似飛騰寂無形跡此必使士而挈之無更聲聞徒為患禍耳姬隱崔生家二歲因花時駕小車而遊曲江為一品家人潛志認遂白一品一品異之召崔生而詰之事懼而不敢隱遂細言端由皆因奴磨勒負荷而去一品曰是姬大罪過但郎君驅使踰年即不能問是非某須為天下人除害命甲士五十人嚴持兵仗圍崔生院使擒磨勒磨勒遂持匕首飛出高垣瞥若翅翎疾同鷹隼攢矢如雨莫能中之頃刻之間不知所向然崔家大驚愕後一品悔懼每夕多以家童持劍戟自衛如此周歲方止後十餘年崔家有人見磨勒賣藥於洛陽市容顏如舊耳出傳奇侯彝唐大曆中有萬年尉侯彝者好尚心義嘗匿國賊御史推鞫理窮終不言賊所在御史曰賊在汝左右膝蓋下彝遂揭階磚自擊其膝蓋翻示御史曰賊安在御史又曰在左膝蓋下又擊之翻示御史乃以鏊貯烈火置其腹上煙熢𤊹左右皆不忍視彝怒呼曰何不加炭御史奇之奏聞代宗即召見曰何為隱賊自貽其苦若此彝對曰賊臣實藏之已然諾於人終死不可得遂貶之為端州高要尉出獨異志僧俠唐建中初士人韋生移家汝州中路逢一僧因與連鑣言論頗洽日將夕僧指路歧曰此數里是貧道蘭若郎君能垂顧乎士人許之因令家口先行僧即處分從者供帳具食行十餘里不至韋生問之即指一處林煙曰此是矣及至又前進日已昏夜韋生疑之素善彈乃密於靴中取張卸彈懷銅丸十餘方責僧曰弟子有程期適偶貪上人清論勉副相邀今已行二十里不至何也僧但言用行是僧前行百餘步韋生知其盜也乃彈之僧正中其腦僧初若不覺凡五發中之僧始捫中處徐曰郎君莫惡作劇韋生知無可奈何亦不復彈良久至一莊墅數十人列火炬出迎僧延韋生坐一廳中笑云郎君勿憂因問左右夫人下處如法無復曰郎君且自慰安之即就此也韋生見妻女別在一處供帳甚盛相顧涕泣即就僧僧前執韋生手曰貧道盜也本無好意不知郎君藝若此非貧道亦不支也今日固無他幸不疑耳適來貧道所中郎君彈悉在乃舉手搦腦後五丸墜焉有頃布筵具蒸犢犢上劄刀子十餘以齏餅環之揖韋生就座復曰貧道有義弟數人欲令謁見言已朱衣巨帶者五六輩列於階下僧呼曰拜郎君汝等向遇郎君即成齏粉矣食畢僧曰貧道久為此業今向遲暮欲改前非不幸有一子技過老僧欲請郎君為老僧斷之乃呼飛飛出參郎君飛飛年才十六七碧衣長袖皮肉如臘明鈔本臘作脂僧曰向後堂侍郎君僧乃授韋一劍及五丸且曰乞郎君盡藝殺之無為老僧纍也引韋入一堂中乃反鎖之堂中四隅明燈而已飛飛當堂執一短鞭韋引彈意必中丸已敲落不覺躍在梁上循壁虛躡捷若猱玃彈丸盡不復中韋乃運劍逐之飛飛倏忽逗閃去韋身不尺韋斷其鞭數節竟不能傷僧久乃開門問韋與老僧除得害乎韋具言之僧悵然顧飛飛曰郎君證成汝為賊也知復如何僧終夕與韋論劍及弧矢之事天將曉僧送韋路口贈絹百匹垂泣而別出唐語林明鈔本作出酉陽雜俎崔慎思博陵崔慎思唐貞元中應進士舉京中無第宅常賃人隙院居止而主人別在一院都無丈夫有少婦年三十餘窺之亦有容色唯有二女奴焉慎思遂遣通意求納為妻婦人曰我非仕人與君不敵不可為他時恨也求以為妾許之而不肯言其姓慎思遂納之二年餘崔所取給婦人無倦色後産一子數月矣時夜崔寢及閉戶垂帷而已半夜忽失其婦崔驚之意其有姦頗發忿怒遂起堂前倣徨而行時月朧明忽見其婦自屋而下以白練纏身其右手持匕首左手攜一人頭言其父昔枉為郡守所殺入城求報已數年矣未得今既剋矣不可久留請從此辭遂更結束其身以灰囊盛人首攜之謂崔曰某幸得為君妾二年而已有一子宅及二婢皆自致並以奉贈養育孩子言訖而別遂踰墻越舍而去慎思驚嘆未已少頃却至曰適去忘哺孩子少乳遂入室良久而出曰餧兒已畢便永去矣慎思久之怪不聞嬰兒啼視之已為其所殺矣殺其子者以絶其念也古之俠莫能過焉出原化記聶隱娘聶隱娘者唐貞元中魏博大將聶鋒之女也年方十歲有尼乞食于鋒舍見隱娘悅之云問押衙乞取此女教鋒大怒叱尼尼曰任押衙鐵匱中盛亦須偷去矣及夜果失隱娘所向鋒大驚駭令人搜尋曾無影響父母每思之相對涕泣而已後五年尼送隱娘歸告鋒曰教已成矣子却領取尼欻亦不見一家悲喜問其所學曰初但讀經念呪餘無他也鋒不信懇詰隱娘曰真說又恐不信如何鋒曰但真說之曰隱娘初被尼挈不知行幾里及明至大石穴之嵌空數十步寂無居人猿狖極多松蘿益邃已有二女亦各十歲皆聰明婉麗不食能於峭壁上飛走若捷猱登木無有蹶失尼與我藥一粒兼令長執寶劍一口長二尺許鋒利吹毛令剸逐二女攀緣漸覺身輕如風一年後刺猿狖百無一失後刺虎豹皆決其首而歸三年後能飛使刺鷹隼無不中劍之刃漸減五寸飛禽遇之不知其來也至四年留二女守穴挈我於都市不知何處也指其人者一一數其過曰為我刺其首來無使知覺定其膽若飛鳥之容易也受以羊角匕首刀廣三寸遂白日刺其人於都市人莫能見以首入囊返主人舍以藥化之為水五年又曰某大僚有罪無故害人若干夜可入其室決其首來又攜匕首入室度其門隙無有障礙伏之梁上至瞑持得其首而歸尼大怒曰何太晚如是某云見前人戲弄一兒可愛未忍便下手尼叱曰已後遇此輩先斷其所愛然後決之某拜謝尼曰吾為汝開腦後藏匕首而無所傷用即抽之曰汝術已成可歸家遂送還云後二十年方可一見鋒聞語甚懼後遇夜即失蹤及明而返鋒已不敢詰之因茲亦不甚憐愛忽值磨鏡少年及門女曰此人可與我為夫白父父不敢不從遂嫁之其夫但能淬鏡餘無他能父乃給衣食甚豐外室而居數年後父卒魏帥稍知其異遂以金帛署為左右吏如此又數年至元和間魏帥與陳許節度使劉昌裔不協使隱娘賊其首引娘辭帥之許劉能神算已知其來召衙將令來日早至城北候一丈夫一女子各跨白黑衛至門遇有鵲前噪夫夫以弓彈之不中妻奪夫彈一丸而斃鵲者揖之云吾欲相見故遠相祗迎也衙將受約束遇之隱娘夫妻曰劉僕射果神人不然者何以洞吾也願見劉公劉勞之隱娘夫妻拜曰合負僕射萬死劉曰不然各親其主人之常事魏今與許何異顧請留此勿相疑也隱娘謝曰僕射左右無人願舍彼而就此服公神明也知魏帥之不及劉劉問其所須曰每日只要錢二百文足矣乃依所請忽不見二衛所之劉使人尋之不知所向後潛收布囊中見二紙衛一黑一白後月餘白劉曰彼未知住必使人繼至今宵請剪髮繫之以紅綃送于魏帥枕前以表不回劉聽之至四更却返曰送其信了後夜必使精精兒來殺某及賊僕射之首此時亦萬計殺之乞不憂耳劉豁達大度亦無畏色是夜明燭半宵之後果有二幡子一紅一白飄飄然如相擊于牀四隅良久見一人自自字原闕據明鈔本補空而踣身首異處隱娘亦出曰精精兒已斃拽出于堂之下以藥化為水毛髮不存矣隱娘曰後夜當使妙手空空兒繼至空空兒之神術人莫能窺其用鬼莫得躡其蹤能從空虛之入冥善無形而滅影隱娘之藝故不能造其境此即繫僕射之福耳但以于闐玉周其頸擁以衾隱娘當化為蠛蠓潛入僕射腸中聽伺其餘無逃避處劉如言至三更瞑目未熟果聞頸上鏗然聲甚厲隱娘自劉口中躍出賀曰僕射無患矣此人如俊鶻一搏不中即翩然遠逝恥其不中才未逾一更已千里矣後視其玉果有匕首劃處痕逾數分自此劉轉厚禮之自元和八年劉自許入覲隱娘不願從焉云自此尋山水訪至人但乞一虛給與其夫劉如約後漸不知所之及劉薨于統軍隱娘亦鞭驢而一至京師柩前慟哭而去開成年昌裔子縱除陵州刺史至蜀棧道遇隱娘貌若當時甚喜相見依前跨白衛如故語縱曰郎君大災不合適此出藥一粒令縱吞之云來年火急拋官歸洛方脫此禍吾藥力只保一年患耳縱亦不甚信遺其繒綵隱娘一無所受但沉醉而去後一年縱不休官果卒于陵州自此無復有人見隱娘矣出傳奇
