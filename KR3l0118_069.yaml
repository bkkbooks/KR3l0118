body:
  text: 玉蘂院女仙玉蘂院女仙長安安業唐昌觀舊有玉蘂花其花每發若瓊林瑤樹唐元和中春物方盛車馬尋玩者相繼忽一日有女子年可十七八衣綠繡衣垂雙髻無簪珥之飾容色婉娩逈出於眾從以二女冠三小僕皆丱髻黃衫端麗無比既而下馬以白角扇障面直造花所異香芬馥聞於數十步外觀者疑出自宮掖莫敢逼而視之佇立良久令女僕取花數枝而出將乘馬顧謂黃衫者曰曩有玉峰之期自此行矣時觀者如堵咸覺煙飛鶴唳景物煇煥舉轡百餘步有輕風擁塵隨之而去須臾塵滅望之已在半空方悟神仙之遊餘香不散者經月餘時嚴休復元稹劉禹錫白居易俱作玉蘂院真人降詩嚴休復詩曰終日齋心禱玉宸魂銷眼冷未逢真不如一樹瓊瑤蘂笑對藏花洞裏人又曰香車潛下玉龜山塵世何由覩蕣顏惟有無情枝上雪好風吹綴綠雲鬟元稹詩云弄玉潛過玉樹時不教青鳥出花枝的應未有諸人覺只是嚴郎自得知劉禹錫詩云玉女來看玉樹花異香先引七香車攀枝弄雪時廻首驚怪人間日易斜又曰雪蘂瓊葩滿院春羽林輕步不生塵君王簾下徒相問長伴吹簫別有人白居易詩云瀛女偷乘鳳下時洞中暫歇弄瓊枝不緣啼鳥春饒舌青瑣仙郎可得知出劇談錄馬士良唐元和初萬年縣有有字明鈔本作所由二字馬士良者犯事時進士王爽為京尹執法嚴酷欲殺之士良乃亡命入南山至炭谷湫岸潛於大柳樹下纔曉見五色雲下一仙女于水濱有金槌玉板連扣數下青蓮湧出每蕋旋蕋旋原作葉施據明鈔本改開仙女取擘三四枚食之乃乘雲去士良見金槌玉板尚在躍下扣之少頃復出士良盡食之十數枚頓覺身輕即能飛舉遂捫蘿尋向者五色雲所俄見大殿崇宮食蓮女子與群仙處于中覩之大驚趨下以其竹杖連擊墜於洪崖澗邊澗水清潔因憊熟睡及覺見雙鬟小女磨刀謂曰君盜靈藥奉命來取君命士良大懼俯伏求救解之答曰此應難免唯有神液可以救君君當以我為妻遂去逡巡持一小碧甌內有飯白色士良盡食復寢須臾起雙鬟曰藥已成矣以示之七顆光瑩如空青色士良喜歎看其腹有似紅綫處乃刀痕也女以藥摩之隨手不見戒曰但自修學慎勿語人儻漏洩腹瘡必裂遂同住於湫側又曰我谷神之女也守護上仙靈藥故得救君耳至會昌初往往人見漁者漁者二字原闕據明鈔本補於炭谷湫捕魚不獲投一帖子必隨斤兩數而得出逸史張雲容薛昭者唐元和末為平陸尉以氣義自負常慕郭代公李北海之為人因夜直宿囚有為母復仇殺人者與金而逸之故縣聞于廉使廉使奏之坐謫為民于海東敕下之日不問家產但荷銀鐺而去有客田山叟者或云數百歲矣素與昭洽乃蕋酒攔道而飲餞之謂昭曰君義士也脫人之禍而自當之真荊聶之儔也吾請從子昭不許固請乃許之至三鄉夜山叟脫衣貰酒大醉屏左右謂昭曰可遁矣與之攜手出東郊贈藥一粒曰非唯去疾兼能絕穀又約曰此去但遇道北有林藪繁翳處可且暫匿不獨逃難當獲美姝昭辭行過蘭昌宮古木修竹四合其所昭踰垣而入追者但東西奔走莫能知蹤矣昭潛于古殿之西間及夜風清月皎見階前有三美女笑語而至揖讓升于花茵以犀杯酌酒而進之居首女子酹之曰吉利吉利好人相逢惡人相避其次曰良宵宴會雖有好人豈易逢耶昭居窗隙間聞之又誌田生之言遂跳出曰適聞夫人云好人豈易逢耶昭雖不才願備好人之數三女愕然良久曰君是何人而匿于此昭具以實對乃設座于茵之南昭詢其姓字長曰雲容張氏次曰鳳臺蕭氏次曰蘭翹劉氏飲將酣蘭翹命骰子謂三女曰今夕佳賓相會須有匹偶請擲骰子遇采強者得薦枕席乃遍擲雲容采勝翹遂命薛郎近雲容姊坐又持雙盃而獻曰真所謂合巹矣昭拜謝之遂問夫人何許人何以至此容曰某乃開元中楊貴妃之侍兒也妃甚愛惜常令獨舞霓裳於繡嶺宮妃贈我詩曰羅袖動香香不已紅蕖裊裊秋煙里輕雲嶺上乍搖風嫩柳池邊初拂水詩成明皇吟詠久之亦有繼和但不記耳遂贈雙金扼臂因此寵幸愈於群輩此時多遇帝與申天師談道予獨與貴妃得竊聽亦數侍天師茶藥頗獲天師憫之因閑處叩頭乞藥師云吾不惜但汝無分不久處世如何我曰朝聞道夕死可矣天師乃與絳雪丹一粒曰汝但服之雖死不壞但能大其棺廣其穴含以真玉疎而有風使魂不蕩空魄不沉寂有物拘制陶出陰陽後百年得遇生人交精之氣或再生便為地仙耳我沒蘭昌之時具以白貴妃貴妃恤之命中貴人陳玄造受其事送終之器皆得如約今已百年矣仙師之兆莫非今宵良會乎此乃宿分非偶然耳昭因詰申天師之貌乃田山叟之魁梧也昭大驚曰山叟即天師明矣不然何以委曲使予符曩日之事哉又問蘭鳳二子容曰亦當時宮人有容者為九仙媛所忌毒而死之藏吾穴側與之交遊非一朝一夕耳鳳臺請擊席而歌送昭容酒歌曰臉花不綻幾含幽今夕陽春獨換秋我守孤燈無白日寒雲隴上更添愁蘭翹和口幽谷啼鶯整羽翰犀沉玉冷自長歎月華不忍扃泉戶露滴松枝一夜寒雲容和曰韶光不見分成塵曾餌金丹忽有神不意薛生攜舊律獨開幽谷一枝春昭亦和曰誤入宮垣漏網人月華靜洗玉階塵自疑飛到蓬萊頂瓊艷三枝半夜春詩畢旋聞雞鳴三人曰可歸室矣昭持其衣超然而去初覺門戶至微及經閾亦無所妨蘭鳳亦告辭而他往矣但燈燭熒熒侍婢凝立帳幄綺繡如貴戚家焉遂同寢處昭甚慰喜如此數夕但不知昏旦容曰吾體已蘇矣但衣服破故更得新衣則可起矣今有金扼臂君可持往近縣易衣服昭懼不敢去曰恐為州邑所執容曰無憚但將我白綃去有急即蒙首人無能見矣昭然之遂出三鄉貨之市其衣服夜至穴則容已迎門而笑引入曰但啟櫬當自起矣昭如其言果見容體已生及回顧帷帳但一大穴多冥器服玩金玉唯取寶器而出遂與容同歸金陵幽棲至今見在容鬢不衰豈非俱餌天師之靈藥耳申師名元也出傳奇韋蒙妻韋蒙妻許氏居東京翊善里自云許氏世有神仙皆上為高真受天帝重任性潔淨熟詩禮二經事舅姑以孝聞蒙為尚書郎早夭許舅姑亦亡唯一女年十二歲甚聰慧已能記易及詩忽無疾而卒許甚憐之不忍遠葬殯于堂側居數月聞女於殯宮中語許與侍婢總笄發棺視之已生矣言初卒之狀云忽見二青衣童子可年十二三持一紅幡來庭中呼某名曰韋小真天上召汝于是引之昇天可半日到天上見宮闕崇麗天人皆錦繡毛羽五色之衣金冠玉笏亦多玉童玉女皆珠玉五色之衣花木如琉璃寶玉之形風動有聲如樂曲鏗鏘和雅既到宮中見韓君司命曰汝九世祖有功於國有惠及人近已擢為地下主者即遷地仙之品汝母心於至道合陟仙階即令延汝于丹陵之闕汝祖考三世皆已生天矣遂使二童送歸母便可齋沐太乙使者即當至矣許常持妙真經往往感致異香及殊常光色眾共異之已十餘年矣及小真歸後三日果有仙樂之聲下其庭中許與小真總笄一時昇天有龍虎兵騎三十餘人導從而去乃長慶元年辛丑歲也出仙傳拾遺慈恩塔院女仙唐太和二年長安城南韋曲慈恩寺塔院月夕忽見一美婦人從三四青衣來遶佛塔言笑甚有風味回顧侍婢曰白院主借筆硯來乃於北廊柱上題詩曰黃子陂頭好月明忘卻華筵到曉行煙收山低翠黛橫折得荷花贈遠生題訖院主執燭將視之悉變為白鶴冲天而去書迹至今尚存出河東記
