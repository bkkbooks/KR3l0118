body:
  text: 王正君王正君漢王莽姑正君許嫁至期當行時夫輒死如此者再乃獻之趙王未取又薨後又與正君父稚君善者過相正君曰貴為天下母是時宣帝世元帝為太子稚君乃因魏郡尉納之太子太子幸之生子宣帝崩太子立正君為皇后上為太子元帝崩太子立是為成帝正君為皇太后竟為天下母出論衡黃霸黃霸為陽夏遊徼與善相者同車俱行見一婦人年十七八相者指之曰此婦人當大富為封侯者夫人公止車審視之相者曰今此婦人不富貴卜書不用也次公問之乃其傍里人巫家子也即娶為妻其後次公果大富貴位至丞相封為列侯出論衡賣䭔媼唐馬周字賓王少孤貧明詩傳落魄不事産業不為州里所重補博州助教日飲酒刺史達奚怒屢加咎責周乃拂衣南遊曹汴之境因酒後忤浚儀令崔賢又遇責辱西至新豐宿旅次主人唯供設諸商販人而不顧周周遂命酒一斗獨酌所飲餘者便脫靴洗足主人竊奇之因至京停於賣䭔媼肆數日祈覓一館客處媼乃引致於中郎將常何之家媼之初賣䭔也李淳風袁天綱嘗遇而異之皆竊云此婦人大貴何以在此馬公尋取為妻後有詔文武五品官已上各上封事周陳便宜二十條事遣何奏之乃請置街鼓乃文武官緋紫碧緑等服色并城門左右出入事皆合旨太宗怪而問何所見何對曰乃臣家客馬周所為也召見與語命直門下省仍令房玄齡試經及策拜儒林郎守監察御史以常何舉得其人賜帛百匹周後轉給事中中書舍人有機辨能敷奏深識事端動無不中岑文本見之曰吾見馬君令人忘倦然鳶肩火色騰上必速但恐不能久耳數年內官至宰相其媼亦為夫人後為吏部尚書病消渴彌年不瘳年四十八而卒追贈右僕射高唐公出定命録蘇氏女蘇某信都富人有女十人為擇良壻張文成往見焉蘇曰此雖有才不能富貴幸得五品即當死矣魏知古時已及第然未有官蘇云此雖形質黑小然必當貴遂以長女嫁之其女髮長七尺黑光如漆諸妹皆不及有相者云此女富不嚙宿食諸妹笑知古曰只是貧漢得米旋煮故無宿飯其後魏為宰相每食一物已上官供出定命録武后武士彠之為利州都督也敕召袁天綱詣京師途經利州士彠使相其妻楊氏天綱曰夫人骨法非常必生貴子遍召其子令相元慶元爽曰可至刺史終亦屯否見韓國夫人曰此女夫貴然不利其夫武后時衣男子之服乳母抱於懷中天綱大驚曰此郎君男子神彩奧徹不易知遂令后試行床下天綱大驚曰日角龍顏龍睛鳳頸伏犧之相貴人之極也更轉側視之又驚曰若是女當為天下主也出談賓録李淳風武后之召入宮李淳風奏云後宮有天子氣太宗召宮人閲之令百人為一隊問淳風淳風云在某隊中太宗又分為二隊淳風云在某隊中請陛下自揀擇太宗不識欲盡殺之淳風諫不可陛下若留雖皇祚暫缺而社稷延長陛下若殺之當變為男子即損減皇族無遺矣太宗遂止出定命録楊貴妃貴妃楊氏之在蜀也有野人張見之云當大富貴何以在此或問至三品夫人否張云不是一品否曰不是然則皇后耶曰亦不是然貴盛與皇后同見楊國忠云公亦富貴位當秉天下權勢數年後皆如其説出定命録薑皎薑皎之未貴也好弋獵獵還入門見僧薑曰何物道人在此僧云乞飯薑公令取肉食與之僧食訖而去其肉並在薑公使人追問僧云公大富貴薑曰如何得富貴僧曰見真人即富貴矣薑曰何時得見真人僧舉目看曰今日即見真人薑手臂一鷂子直二十千與僧相隨騎馬出城偶逢上皇亦獵時為臨淄王見鷂子識之曰此是某之鷂子否薑云是因相隨獵俄而失僧所在後有女巫至薑問云汝且看今日有何人來女巫曰今日天子來薑笑曰天子在宮里坐豈來看我耶俄有叩門者云三郎來薑出見乃上皇自此倍加恭謹錢馬所須無敢惜者後上皇出潞府百官親舊盡送唯不見薑上皇怪之行至渭北於路側獨見薑公供帳盛相待上皇欣然與別便定君臣之分後薑果富貴出定命録常袞常袞之在福建也有僧某者善占色言事若神袞惜其僧老命弟子就其術僧云此事天性非可造次為傳某嘗於君左右見一人可教遍招得小吏黃徹焉袞命就學老僧遂於暗室中致五色綵於架令自取之曰世人皆用眼力不盡但熟看之旬日後依稀認其白者後半歲看五色即洞然而得矣命之曰以若暗中之視五綵回之白晝占人因傳其方訣且言後代當無加也李吉甫云黃徹之占袁許之亞也出傳載劉禹錫賓客劉禹錫為屯田員外郎時事稍異旦夕有騰趠之勢知一僧術數極精寓直日邀之至省方欲問命報韋秀才在門公不得已且見令僧坐簾下韋秀才獻卷已略省之意氣殊曠韋覺之乃去卻與僧語僧不得已吁嘆良久乃曰某欲言員外必不愜如何公曰但言之僧曰員外後遷乃本行正郎也然須待適來韋秀才知印處置公大怒揖出之不旬日貶官韋秀才乃處厚相也後二十餘年在中書為轉屯田郎中出幽間鼓吹鄭朗鄭朗相公初舉遇一僧善色謂曰郎君貴極人臣然無進士及第之分若及第則一生厄塞既而狀元及第賀客盈門唯此僧不至及重試退黜唁者甚衆而此僧獨賀曰富貴在裏既而竟如所卜出托言令狐綯門僧令狐趙公綯在相位馬舉為澤潞小將因奏事到宅會公有一門僧善聲色偶窺之謂公曰適有一軍將參見相公是何人公以舉名語之僧曰竊視此人他日當與相公為方鎮交代公曰此邊方小將縱有軍功不過塞垣一鎮奈何與老夫交代僧曰相公第更召與語貧道為細看公然之既去僧曰今日看更親切並恐是揚汴公於是稍接之矣咸通九年公鎮維揚舉破龐勛有功先是懿宗面許功成與卿揚州既而難於爽信卻除舉淮南行軍司馬公聞之既處分所司排比迎新使群下皆曰此一行軍耳公乃以其事白之果如所言出托言僧處弘僧處弘習禪於武當山王建微時販鹺於均房間仍行小竊號曰賊王八處弘見而勉之曰子他日位極人臣何不從戎別圖功業而夜遊晝伏沾賊之號乎建感之投忠武軍後建在蜀弘擁門徒入蜀為構精舍以安之即弘覺禪院也江西鍾傅微時亦以販鹺為事遇上藍和尚教其作賊而剋洪井自是加敬至於軍府大事此僧皆得參之也出北夢瑣言范氏尼天寶中有范氏尼乃衣冠流也知人休咎魯公顏真卿妻黨之親也魯公尉于醴泉因詣范氏尼問命曰某欲就制科再乞師姨一言范氏曰顏郎事必成自後一兩月必朝拜但半年內慎勿與外國人爭競恐有譴謫公又曰某官階盡得及五品否范笑曰鄰於一品顏郎所望何其卑耶魯公曰官階盡得五品身著緋衣帶銀魚兒子補齋郎某之望滿也范尼指坐上紫絲布食單曰顏郎郎字原闕據明鈔本補衫色如此其功業名節稱是壽過七十已後不要苦問魯公再三窮詰范尼曰顏郎聰明過人問事不必到底逾月大酺魯公是日登制科高等授長安尉不數月遷監察御史因押班中有喧譁無度者命吏録奏次即歌舒翰也翰有新破石堡城之功因泣訴玄宗玄宗坐魯公以輕侮功臣貶蒲州司倉驗其事迹歷歷如見及魯公為太師奉使於蔡州乃歎曰范師姨之言吾命懸於賊必矣出戎幕間談任之良任之良應進士舉不第至關東店憩食遇一道士亦從西來同主人歇之良與語問所從來云今合有身名稱意何不卻入京任子辭以無資糧到京且無居處道士遂資錢物並與一帖令向肅明觀本院中停之良至京詣觀安置偶見一道士讀經謂良曰太上老君二月十五日生因上表請以玄元皇帝生日燃燈上皇覽表依行仍令中書召試使與一官李林甫拒乃與別敕出身出定命録殷九霞張侍郎某為河陽烏重裔從事同幕皆是名輩有道流殷九霞來自青城山有知人之鑒烏公問己年壽官祿九霞曰司徒貴任藩服所望者秉持鈞軸封建茅土唯在保守庸勳苞貯仁義享福隆厚殊不可涯既而遍問賓僚九霞曰其間必有台輔時烏公重一裴副使應聲曰裴中丞是宰相否九霞曰若以目前人事言之當如尊旨以某所觀即不在此時夏侯相孜為館驛巡官且形質低粹烏因戲曰莫是夏侯巡官對曰司徒所言是矣烏公撫掌而笑曰尊師莫錯否九霞曰某山野之人早修直道無意於名宦金玉蓋以所見任真而道耳烏公曰如此則非某所知也然其次貴達者為誰曰張支使雖不居廊廟履歷清途亦至榮顯既出遂造張侍郎所居從容謂曰支使神骨清爽氣韻高邁若以紱冕纍身止於三二十年居於世俗儻能擺脫囂俗相隨學道即二十年內白日上升某之此行非有塵慮實亦尋訪修真之士耳然閲人甚多無如支使者張以其言意浮闊但唯唯然將去復來情甚懇至審知張意不回頗甚嗟惜因留藥數粒並黃紙書一緘而別云藥服之可以無疾書紀宦途所得每一遷轉密自啓之書窮之辰當自相憶其後譙公顯赫令名再居台鉉張果踐朝列出入臺省佩服朱紫廉察數州書載之言靡不祥悉年及三紀時為戶部侍郎紙之所存蓋亦無幾雖名位通顯而齒髮衰退每以道流之事話於親知追想其風莫能及也出劇談録相手板庾道敏宋山陽王休祐屢以言話忤顏有庾道敏者善相手板休祐以手板託言他人者庾曰此板乃貴然使人多忤休祐以褚淵詳密乃換其手板別日褚於帝前稱下官帝甚不悅出酉陽雜俎李參軍唐李參軍者善相笏知休咎必驗皆呼為李相笏鹽鐵院官陸遵以笏視之云評事郎君見到陸遵笑曰是子姪否曰是評事郎君陸君曰足下失聲名矣某且無兒乃更將出簾下看必有明鈔本有作不錯陸君甚薄之以為詐陸君先有歌姬在任處其月有妊分娩果男子也原闕出處明鈔本作出逸史龍復本開成中有龍復本者無目善聽聲揣骨每言休咎無不必中凡有象簡竹笏以手捻之必知官祿年壽宋祁補闕有盛名於世縉紳之士無不傾屬屈指翹足期於貴達時永樂蕭相置亦居諫署同日詣之授以所持竹笏復本執蕭公笏良久置於案上曰宰相笏次至宋補闕曰長官笏宋聞之不樂蕭曰無憑之言安足介意經月餘同列於中書候見宰相時李朱崖方秉鈞軸威鎮朝野未見間佇立間談互有諧謔頃之丞相遽出宋以手板障面笑未已朱崖目之回顧左右曰宋補闕笑某何事聞之者莫不心寒股慓未旬曰出為清河縣令歲餘遂終所任其後蕭公揚歷清途自浙西觀察使入判戶部非久遂居廊廟俱如復本之言也出劇談録
