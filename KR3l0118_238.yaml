body:
  text: 劉龍子劉龍子唐高宗時有劉龍子妖言惑眾作一金龍頭藏袖中以羊腸盛蜜水繞繫之每聚眾出龍頭言聖龍吐水飲之百病皆差遂轉羊腸水于龍口中出與人飲之皆罔云病愈施捨無數遂起逆謀事發逃竄捕訪擒獲斬之于市並其黨十餘人出朝野僉載郭純東海孝子郭純喪母每哭則群烏大集使檢有實旌表門閭後訊乃是孝子每哭即撒餅于地群烏爭來食之其後數如此烏聞哭聲以為度莫不競湊非有靈也出朝野僉載王燧河東孝子王燧家貓犬互乳其子州縣上言遂蒙旌表乃是貓犬同時產子取貓兒置犬窠中取犬子置貓窠內飲貫其乳遂以為常殆不可以異論也自知連理木合歡瓜麥分歧禾同穗觸類而長實繁其徒並是人作不足怪焉出朝野僉載唐同泰唐同泰于洛水得白石紫文云聖母臨水明鈔本水作人永昌帝業進之授五品果毅置永昌縣乃是將石鑿作字以紫石末和藥嵌之後并州文水縣于谷中得一石還如此有武興字改文水為武興縣自是往往作之後知其偽不復採用乃止出國史補按見朝野僉載卷三胡延慶襄州胡延慶得一龜以丹漆書其腹曰天子萬萬年以進之鳳閣侍郎李昭德以刀刮之並盡奏請付法則天曰此非惡心也捨而不問出國史補按見朝野僉載卷三朱前疑則天好禎祥拾遺朱前疑說夢云則天頭白更黑齒落更生即授都官郎中司刑寺繫三百餘人秋分後無計可作乃于內獄外羅牆角邊作聖人跡長五尺至夜半眾人一時大叫內使推問對云昨夜有聖人見身長三丈面作金色云汝等並冤枉不須憂慮天子萬年即有恩赦放汝把火照視見有巨跡即大赦天下改為大足元年出唐國史明鈔本作出朝野僉載寧王寧王嘗獵于鄠縣界搜林忽見草中一櫃扃鑰甚固命發視之乃一少女也詢其所自女言姓莫氏父亦曾仕昨夜遇一火賊賊中二人是僧因劫某至此含嚬上訴冶態橫生王驚悅之遂載以後乘時方生獵一熊置櫃中如舊鎖之值上方求極色王以莫氏衣冠子女即日表上之且具所由上令充才人經三日京兆府奏鄠縣食店有僧二人以萬錢獨賃房一日夜言作法事唯舁一櫃入店中夜深腷膊有聲店主怪日出不啟門撤戶視之有熊衝人走去二僧已死體骨悉露上知之大笑書報寧王大哥善能處置此僧也莫氏能為新聲當時號莫才人囀出酉陽雜俎安祿山玄宗幸愛安祿山呼祿山為子嘗于便殿與楊妃同宴坐祿山每就見不拜玄宗而拜楊妃因顧問曰此胡不拜我而拜妃子意何在也祿山對云臣胡家只知有母不知有父故也笑而捨之祿山豐肥大腹帝嘗問曰此胡腹中何物其大乃爾祿山應聲對曰臣腹中更無他物唯赤心耳以其言誠而益親善之出開天傳信記白鐵余白鐵余者延州嵇胡也左道惑眾先于深山中埋一銅佛像柏樹之下經數年草生其上詒鄉人曰吾昨夜山下過見有佛光於是卜日設齋以出聖佛及期集數百人命于非所藏處斸不得則詭曰諸人不至誠布施佛不可見是日男女掙施捨百餘萬即于埋處斸之得其銅像鄉人以為聖人遠近相傳莫不欲見宣言曰見聖佛者百病即愈余遂左計數百里老小士女皆就之乃以紺紫紅緋黃綾為袋數十重盛佛像人來觀者去其一重一回布施獲千萬乃見其像如此矯偽一二年鄉人歸伏遂作亂自稱光王按資治通鑒考異光王作月光王署置官屬設長吏為患數年命將軍程務挺討斬之出朝野僉載李慶遠中郎李慶遠狡詐輕險初事皇太子頗得出入暫時出外即恃威權宰相以下咸謂之要人宰執方食即來諸人命坐即遣一人門外急喚云殿下見召匆忙吐飯而去諸司皆如此計請謁囑事賣官鬻獄所求必遂焉東宮後稍稍疏之仍潛入仗內食侍官之飯晚出外腹痛大作猶詐云太子賜瓜啗之太多以致斯疾須臾霍亂吐出衛士所食麤米飯及黃臭韭齏狼藉凡是小人得寵多為此狀也出朝野僉載劉玄佐汴州相國寺言佛有汗流節度使劉玄佐遽命駕自持金帛以施日中其妻亦至明日復起齋場由是將吏商賈奔走道路唯恐輸貨不及因令官為簿書以籍所入十日乃閉寺曰佛汗止矣得錢巨萬以瞻軍資出國史補張祜進士崔涯張祜下第後多游江淮常嗜酒侮謔時輩或乘其飲興即自稱豪俠二子好尚既同相與甚洽崔嘗作俠士詩云太行嶺上三尺雪崔涯袖中三尺鐵一朝若遇有心人出門便與妻兒別由是往往傳于人口曰崔張真俠士也是此人多設酒饌待之得以互相推許後張以詩上鹽鐵使授其子漕渠小職得堰名冬瓜或戲之曰賢郎不宜作此職張曰冬瓜合出祜子戲者相與大哂歲餘薄有資力一夕有非常人粧束甚武腰劍手囊囊中貯一物流血殷于外入門謂曰此非張俠士居也曰然揖客甚謹既坐客曰有一仇人之恨十年矣今夜獲之喜不能已因指囊曰此其首也問張曰有酒店否命酒飲之飲訖曰去此三四里有一義士予欲報之若濟此夕則平生恩仇畢矣聞公氣義能假予十萬緡否立欲酬之是予願畢此後赴蹈湯火誓無所憚張深喜其說且不吝嗇即傾囊燭下籌其縑素中品之物量而與焉客曰快哉無所恨也遂留囊首而去期以卻回既去及期期原作其據明鈔本改不至五鼓絕聲杳無蹤跡又慮囊首彰露以為己累客且不來計無所出乃遣家人開囊視之乃豕首也由是豪俠之氣頓衰矣出桂苑叢談大安寺唐懿宗用文理天下海內晏清多變服私游寺觀民間有奸猾者聞大安國寺有江淮進奏官寄吳綾千匹在院於是暗集其群就內選一人肖上之狀者衣上私行之服多以龍腦諸香薰裛引二三小僕潛入寄綾之院其時有丐者一二人至假服者遺之而去逡巡諸色丐求之人接跡而至給之不暇假服者謂院僧曰院中有何物可借之僧未諾間小僕擲眼向僧僧驚駭曰櫃內有人寄綾千匹唯命是聽於是啟櫃罄而給之小僕謂僧曰來日早于朝門相覔可奉引入內所酬不輕假服者遂跨衛而去僧自是經日訪于內門杳無所見方知群丐並是奸人之黨焉出玉堂閒話王使君王凝侍郎案察長沙日有新授柳州刺使王某者不知何許人將赴所任抵于湘川謁凝凝召預宴于賓佐王明鈔本凝召宴於賓佐王作王君請司賓吏上啟凝云某是侍郎諸從明鈔本從作院子姪合受拜凝遽問云既是吾族小名何也答曰名通郎凝乃謂左右曰促召郎君來逡巡其子至凝詰曰家籍中有通郎者乎其子沉思少頃乃曰有之合是兄矣凝始命邀王君則受以從姪之禮因從容問云前任何官答曰昨罷職北海鹽院旋有此授凝聞之不悅既退凝復召其子謂曰適來王君資歷頗雜的非吾之枝葉也遽徵屬籍尋其派乃有通郎已于某年某日物化矣凝覩之怒翌日廳內備饌招之王君望凝欲屈膝忽被二壯士挾而扶之鞠躬不得凝前語曰使君非吾宗也昨日誤受君之拜今謹奉還遂拜之如其數訖二壯士退乃命坐與餐復謂之曰當今清平之代此後不可更亂入人家也在庭吏卒悉笑王君慚赧飲食為之不下斯須踧踖而出出南楚新聞劉崇龜劉崇龜以清儉自居甚招物論嘗召同列餐苦蕒饆饠朝士有知其矯乃潛問小蒼頭曰僕射晨餐何物蒼頭實對食潑生朝中聞而哂之及鎮番方京國親之貧乏者俟其濡救但畫荔枝圖自作賦以遺之後卒于嶺表歸葬經渚宮家人鬻海珍珠翠于市為當時所鄙出北夢瑣言李延召王蜀將王宗儔帥南梁日聚糧屯師日興工役鑿山刊木略不暫停運粟泛舟軍人告倦岷峨之人酷好釋氏軍中皆右執凶器左秉佛書誦習之聲混于刁斗時有健卒李延召繼年役于三泉黑水以來採斫材木力竭形枯不任其事遂設詐陳狀云近者得見諸佛如來乘輿跨象出入巖崖之中飛昇松柏之上如是之報甚頻某雖在戎門早歸釋教以其課誦至誠是有如此感應今乞蠲兵籍截足事佛俾將來希證無上之果宗儔判曰雖居兵籍心在佛門修心於行伍之間達理於幻泡之外歸心而依佛氏截足以事空王壯哉貔貅何太猛利大願難阻真誠可嘉准狀付本軍除落名氏仍差虞侯監截一足訖送真元寺收管灑掃延召延召原作焚修據明鈔本改比欲矯妄免其役及臨斷足時則怖懼益切於是遷延十餘日哀號宛轉避其鋒鋩宗儔聞之大笑而不罪焉出玉堂閒話成都丐者成都有丐者詐稱落泊衣冠弊服襤縷常巡成都市廛見人即展手希一文云失墜文書求官不遂人皆哀之為其言語悲嘶形容顦顇居於早遷橋側後有勢家于所居旁起園亭欲廣其池館遂強買之及闢其圭竇則見兩間大屋皆滿貯散錢計數千萬鄰里莫有知者成都人一概呼求事官人為乞措大出朝野僉載明鈔本作出王氏見聞薛氏子有薛氏二子野居伊闕先世嘗典大郡資用甚豐一日木陰初盛清和届候偶有叩扉者啟關視之則一道士也草履雪髯氣質清古曰半途病渴幸分一盃漿二子延入賓位雅談高論深味道腴又曰某非渴漿者杖藜過此氣色甚佳自此東南百步有五松虬偃在疆內否曰某之良田也道士愈喜因屏人曰此下有黃金百斤寶劍二口其氣隱隱浮張翼間張翼洛之分野某尋之久矣黃金可以分贈親屬甚困者其龍泉自佩當位極人臣某亦請其一効斬魔之術二子大驚異道士曰命家僮役客輩悉具畚鍤候擇日發土則可以目驗矣然若無術以制則逃匿黃壤不復能追今俟良宵剪方為壇用法水噀之不能遁矣且戒僮僕無得泄者問其結壇所須曰徽纆三百尺赤黑索也隨方色綵縑素甚多洎几案爐香裀褥之具且曰某非利財者假以為法又用祭膳十座酒茗隨之器皿須以中金者二子則竭力經營尚有所缺貸于親友又言某善點化之術視金銀如糞土常以濟人之急為務今有囊篋寓太微宮欲以暫寄二子許諾即召人負荷而至巨笈有四重不可勝緘鐍甚嚴祈託以寄旋至吉日因大設法具於五松間命二子拜祝訖亟令返居閉門以俟且戒無得窺隙某當效景純散髮銜劍之術脫為人窺則禍立至俟行法畢當舉火相召可率僮僕備畚鍤來及夜而發之冀得靜觀至寶也二子依所教自夜分危坐專望燭光杳不見舉不得已闢戶覘之默絕影響步至樹下則擲盃覆器飲食狼藉綵縑器皿悉已攜去輪蹄之跡錯於其所疑用微纆束固以遁因發所寄之笈瓦礫實中自此家產甚困失信于人驚愕憂慚默不得訴出唐國史明鈔本作出唐史外補按見唐闕史卷下秦中子秦川富室少年有能規利者藏鏹巨萬一日逮夜有投書于其戶者僕執以進少年啟封則蒲紙加蠟昧墨斜翰為其先考所遺者曰汝之獲利吾之冥助也今將有大禍然吾已請於陰騭矣汝及朔旦宜齋躬潔服出于春明門外逆旅備縑帛隨其年三十有五俟夜分往灞水橋步及石岸見黃衣者即置於前禮祝而退災當可免或無所遇即挈縑以歸急理家事當為竄計禍不旋踵矣少年捧書大恐合室素服而泣專誌朔旦則捨棄他事彈冠振衣止於春明門外矜嚴不寐恭俟夜分乃從一僕乘一馬馳往灞橋唯恐無所覩至則果有一物形質詭怪蓬頭黃衣交臂束膝負柱而坐俛首以寐少年驚喜捧縑于前祈祝設拜不敢卻顧疾驅而回返轅相慶以為幸免矣獨有僕夫疑其不直曾未逾旬復有擲書者僕夫立擒之乃鄰宇之導青襟者啟其緘札蒲蠟昧墨如初詞曰汝災甚大曩之壽帛禍源未塞宜更以縑三十五重置河梁其家則狀始末訴于官司詰問具伏遂寘于法時李常侍叢為萬年令訟牒數年尚在出缺史李全皋護軍李全皋罷淮海監臨日寓止于開元寺以朝廷艱梗未獲西歸一旦有小校引一道人云能通爐火之事全皋乃延而禮之自此與之善一日語及黃白之事道人曰唯某頗能得之可求一鐵鼎容五六升以上者黃金二十餘兩為母日給水銀藥物大候足而換之莫窮歲月終而復始李甚喜其說顧囊有金帶一條可及其數以付道人諸藥既備周火之日後日躬自看驗居數日微倦乃令家人親愛者守之日數既滿齋沐而後開視黃金爛然的不虛也李拜而信之三日之內添換有徵一旦道人不來藥爐一切如舊疑駭之際俄經再宿久待訝其不至不得已啟爐視之不見其金矣事及導引小校代填其金而止道人絕無蹤跡出桂苑叢談有處子明鈔本子作士姓文不記其名居漢中常游兩蜀侯伯之門以燒煉為業但留意于爐火者咸為所欺有富商李十五郎者積貨甚多為文所惑三年之內家財罄空復為識者所誚追而恥之以至自經又有蜀中大將屯兵漢中者亦為所惑華陽坊有成太尉新造一第未居亦其空靜遂求主者賃以燒藥因火發焚其第延及一坊掃地而靜文遂夜遁欲向西取桑林路東趨斜谷以脫其身出門便為猛虎所逐不得西去遂北入王子山谿谷之中其虎隨之不離跬步既窘迫遂攀枝上一樹以帶自縛於喬柯之上其虎遶樹咆哮及曉官司捕逐者及樹下虎乃徐去遂就樹擒之斬於燒藥之所出王氏見聞
