body:
  text: 鵝史悝晉太元中章安郡史悝家有駁雄鵝善鳴悝女常養飼之鵝非女不食荀僉苦求之鵝輒不食乃以還悝又數日晨起失女及鵝鄰家聞鵝向西追至一水唯見女衣及鵝毛在水邊今名此水為鵝溪姚略義熙中羌主姚略壞洛陽溝取磚得一雙雄鵝并金色交頸長鳴聲聞九皋養之此溝鵝溝濟南郡張公城西北有鵝溝南燕世有漁人居水側常聽鵝聲而衆鵝中有鈴聲甚清亮候之見一鵝咽頸極長因羅得之項上有銅鈴綴以銀鎖有隱起元鼎元年字祖録事久視年中越州有祖録事不得名早出見擔鵝向市中者鵝見録事頻顧而鳴祖乃以錢贖之到僧寺令放為長生鵝竟不肯入寺但走逐祖后經坊歷市稠人廣衆之處一步不放祖收養之左丞張錫親見說周氏子汝南周氏子吳郡人也亡其名家于昆山縣元和中以明經上第調選得尉昆山既之官未至邑數十里舍于逆旅中夜夢一丈夫衣白衣儀狀甚秀而血濡衣襟若傷其臆者既拜而泣謂周生曰吾家于林泉者也以不尚塵俗故得安其所有年矣今以偶行田野間不幸值君之家僮有系吾者吾本逸人也既為所系心甚不樂又縱狂犬噬吾臆不勝其憤願君子憫而宥之不然則死在朝夕矣周生曰謹受教不敢忘言訖忽寤心竊異之明日至其家是夕又夢白衣來曰吾前以事訴君幸君憐而諾之然今尚為所系顧君不易仁人之心疾為我解其縛使不為君家囚幸矣周即問曰然則爾之名氏可得聞乎其人曰我鳥也言已遂去又明日周生乃以夢語家僮且以事訊之乃家人因適野遂獲一鵝乃籠歸前夕有犬傷其臆周生即命放之是夕又夢白衣人辭謝而去平固人處州平固人訪其親家因留宿夜分聞寢室中有人語聲徐起聽之乃群鵝語曰明旦主人將殺我善視諸兒言之甚悉既明客辭去主人曰我有鵝甚肥將以食子客具告之主人于是舉家不復食鵝頃之舉鄉不食矣海陵斗鵝乙卯歲海陵郡西村中有二鵝斗于空中久乃墮地其大可五六尺雙足如驢蹄村人殺而食之者皆卒明年兵陷海陵鴨晉周昉少時與商人泝江俱行夕止宮亭廟下同侶相語誰能入廟中宿昉性膽果決因上廟宿竟夕晏然晨起廟中見有白頭老翁昉遂擒之化為雄鴨昉捉還船欲烹之因而飛去后竟無他馮法晉建武中剡縣馮法作賈夕宿荻塘見一女子著服白皙形狀短小求寄載明旦船欲發云暫上取行資既去法失絹一匹女抱二束芻置船中如此十上失十絹法疑非人乃縛兩足女云君絹在前草中化形作大白鷺烹食之肉不甚美錢塘士人錢塘士人姓杜船行時大雪日暮有女子素衣來杜曰何不入船遂相調戲杜闔船載之后成白鷺去杜惡之便病死也黎州白鷺黎州通望縣每歲孟夏有白鷺茲一雙墜地古老傳云衆鳥避瘴臨去留一鷺祭山神又每郡主將有除替一日前須有白鷺茲一對從大渡河飛往州城盤旋栖泊三五日卻回軍州號為先至鳥便迎新送故更無誤焉南人捕雁雁宿于江湖之岸沙渚之中動計千百大者居其中令雁奴圍而警察南人有采捕者俟其天色陰暗或無月時于瓦罐中藏燭持棒者數人屏氣潛行將欲及之則略舉燭便藏之雁奴驚叫大者亦驚頃之復定又欲前舉燭雁奴又驚如是數四大者怒啄雁奴秉燭者徐徐逼之更舉燭則雁奴懼啄不復動矣乃高舉其燭持棒者齊入群中亂擊之所獲甚多昔有淮南人張凝評事話之此人親曾采捕海陵人海陵縣東居人多以捕雁為業恆養一雁去其六翮以為媒一日群雁回塞時雁媒忽人語謂主人曰我償爾錢足放我回去因騰空而去此人遂不復捕雁勾足鵒交時以足相勾促鳴鼓翼如斗狀往往墜地俗取其勾足為魅藥能言鵒舊言可使取火效人言勝鸚鵡取其目精和人乳研滴眼中能見煙霄外物桓豁晉司空桓豁之在荊州也有參軍五月五日剪鵒舌教語無所不名后于大會悉效人語聲無不相類時有參佐齆鼻因內頭瓮中效之有主典盜牛肉乃白參軍以新荷裹置屏風后搜得罰盜得廣陵少年廣陵有少年畜一鵒甚愛之籠檻八十日死以小棺貯之將瘞于野至城門閽吏發視之乃人之一手也執而拘諸吏凡八十日復為死鵒乃獲免雀目夕昏雀皆至夕而不見物人有至夕昏不見物者謂雀盲是也鵂鶹夜察毫末晝瞑目不見丘山殊性也吊烏山蜀吊烏山至雉雀來吊最悲百姓夜燃火伺取之其無嗉不食似特悲者以為義則不殺楊宣楊宣為河內太守行縣有群雀鳴桑樹上宣謂吏曰前有覆車粟越烏台越王入國丹烏夾王而飛故句踐得入國也起望烏台言烏之異也何潛之晉時營道縣令何潛之于縣界得烏大如白鷺膝上髀下自然有銅環貫之烏君山烏君山者建安之名山也在縣西一百里近世有道士徐仲山者少求神仙專一為志貧居苦節年久彌勵與人遇于道修禮無少長皆讓之或果谷新熟輒祭先獻虛空次均宿老鄉人有偷者坐罪當死仲山詣官承其偷罪白偷者不死無辜而誅情所未忍乃免冠解帶抵承嚴法所司疑而赦之仲山又嘗山行遇暴雨苦風雷迷失道徑忽于電光之中見一舍宅有類府州因投以避雨至門見一錦衣人顧仲山乃稱此鄉道士徐仲山拜其錦衣人稱監門使者蕭衡亦拜因敘風雨之故深相延引仲山問曰自有鄉無此府舍監門曰此神仙之所處仆即監門官也俄有一女郎梳綰雙鬟衣絳赭裙青文羅衫左手執金柄塵尾幢旄傳呼曰使者外與何人交通而不報也答云此鄉道士徐仲山須臾又傳呼云仙官召徐仲山入向所見女郎引仲山自廊進至堂南小庭見一丈夫年可五十余膚體須發盡白戴紗搭腦冠白羅銀鏤帔而謂仲山曰知卿精修多年超越凡俗吾有小女頗閒道教以其夙業合與卿為妻今當吉辰耳仲山降階稱謝拜起而復請謁夫人乃止之曰吾喪偶已七年吾有九子三男六女為卿妻者最小女也乃命後堂備吉禮既而陳酒肴與仲山對食訖漸夜聞環珮之聲異香芬郁熒煌燈燭引去別室禮畢三日仲山悅其所居巡行屋室西向廠舍見衣竿上懸皮羽十四枚是翠碧皮余悉烏皮耳烏皮之中有一枚是白烏皮又至西南有一廠舍衣竿之上見皮羽四十九枚皆鵂鶹仲山私怪之卻至室中其妻問其夫曰子適游行有何所見乃沈悴至此仲山未之應其妻曰夫神仙輕舉皆假羽翼不爾何以倏忽而致萬里乎因問曰烏皮羽為誰曰此大人之衣也又問曰翠碧皮羽為誰曰此常使通引婢之衣也又余烏皮羽為誰曰新婦兄弟姊妹之衣也又問鵂鶹皮羽為誰曰司更巡夜者衣即監門蕭衡之倫也語未畢忽然舉宅驚懼問其故妻謂之曰村人將獵縱火燒山須臾皆云竟未與徐郎造得衣今日之別可謂邂逅矣乃悉取皮羽隨方飛去即向所見舍屋一無其處因號其地為烏君山魏伶唐魏伶為西市丞養一赤嘴烏每于人衆中乞錢人取一文而銜以送伶處日收數百時人號為魏丞烏三足烏天后時有獻三足烏左右或言一足僞耳天后笑曰但令史冊書之安用察其真僞唐書云天授元年有進三足烏天后以為周室之瑞睿宗云烏前足僞天后不悅須臾一足墜地李納貞元十四年鄭汴二州群烏飛入田緒李納境內銜木為城高至二三尺方十余里緒納惡而命焚之信宿如舊烏口皆流血呂生妻東平呂生魯國人家于鄭其妻黃氏病將死告于姑曰妾病且死然聞人死當為鬼妾常恨人鬼不相通使存者益哀今姑念妾深妾死必能以夢告于姑矣及其死姑夢見黃氏來泣而言曰妾平生時無狀今為異類生于鄭之東野叢木中黰其翼嗷其鳴者當是也后七日當來謁姑願姑念平生時無以異類見阻言訖遂去后七日果一烏自東來至呂氏家止于庭樹哀鳴久之其姑泣而言曰果吾之夢矣汝無昧平素直來吾之居也其烏即飛入堂中回翔哀唳僅食頃方東向而去梁祖梁祖親征鄆州軍次衛南時筑新壘工畢因登眺其上見飛烏止于峻板之間而噪其聲甚厲副使李璠曰是烏鳴也將不利乎其前軍朱友裕為朱瑄所掩拔軍南去我軍不知因北行遇朱瑄軍至梁祖策馬南走入村落聞為賊所追前有溝坑頗極深廣匆遽之際忽見溝內蜀黍稈積以為道正在馬前遂騰躍而過副使李璠郡將高行思為賊所殺張歸宇為殿騎援戈力戰僅得生還身被十五箭乃知衛南之烏先見之驗也鳴梟夏至陰氣動為殘殺蓋賊害之候故惡鳥鳴于人家則有死亡之征又云鴟梟食母眼精乃能飛郭璞云伏土為梟漢書郊祀志云古昔天子嘗以春祠黃帝用一梟破鏡鴟鴟相傳鶻生三子一為鴟肅宗張皇后專權每進酒常以鴟腦和酒令人久醉健忘又世俗相傳鴟不飲泉及井水唯遇雨濡翮方得水飲鵂鶹目夜明鵂鶹即鴟也為圞可以聚諸鳥鵂鶹晝日目無所見夜則飛撮蚊虻鵂鶹乃鬼車之屬也皆夜飛晝藏或好食人爪甲則知吉凶凶者輒鳴于屋上其將有咎耳故人除指甲埋之戶內蓋忌此也亦名夜游女好與嬰兒作祟故嬰孩之衣不可置星露下畏其祟耳又名鬼車春夏之間稍遇陰晦則飛鳴而過嶺外尤多愛入人家爍人魂氣或云九首曾為犬嚙其一常滴血血滴之家則有凶咎荊楚歲時記云聞之當喚犬耳又曰梟大如鴆惡聲飛入人家不祥其肉美堪為炙故莊子云見彈思梟炙又云古人重梟炙尚肥美也說文梟不孝鳥食母而后能飛漢書曰五月五日作梟羹以賜百官以其惡鳥故以五日食之古者重梟炙及梟羹蓋欲滅其族類也又或云鵂鶹食人遺爪非也蓋鵂鶹夜能拾蚤虱耳爪蚤聲相近故誤云也夜行游女又云夜行游女一曰天帝女一名釣星夜飛晝隱如鬼神衣毛為飛鳥脫毛為婦人無子喜取人子胸前有乳凡人飴小兒不可露小兒衣亦不可露晒毛落衣中當為鳥祟或以血點其衣為志或言産死者所化禳梟常騫為齊景公以周禮之法禳梟梟乃布翼伏于地死張率更有梟晨鳴于張率更庭樹其妻以為不祥連唾之張云急灑掃吾當改官言未畢賀客已在門矣雍州人貞觀初雍州有人夜行聞梟鳴甚急仍往來拂其頭此人惡之以鞭擊之梟死以土覆之而去可行數里逢捕賊者見其衣上有血問其何血遂具告之諸人不信將至埋梟之所先是有賊殺人斷其頭瘞之而去又尋不得及撥土取梟遂得人頭咸以為賦執而訊之大受艱苦韋顓大中歲韋顓舉進士詞學贍而貧窶滋甚歲暮饑寒無以自給有韋光者待以宗党輟所居外舍館之放榜之夕風雪凝沍報光成事者絡繹而至顓略無登第之耗光延之于堂際小閣備設酒饌慰安見女仆料數衣裝仆者排比車馬顓夜分歸所止擁爐愁歎而坐候光成名將修賀禮顓坐逼于壞牖以橫竹挂席蔽之檐際忽有鳴梟頃之集于竹上顓神魂驚駭持策出戶逐之飛起復還久而方去謂候者曰我失意亦無所恨妖禽作怪如此兼恐橫罹禍患俄而禁鼓忽鳴榜放顓已登第光服用車馬悉將遺焉
