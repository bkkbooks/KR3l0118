body:
  text: 清泰主清泰主唐清泰主乃晉高祖之婦兄也明宗始為太原將帥二主軍職未高因擊鞠入趙襄子廟俱見土偶避位而立甚訝之潛亦自負及明宗功高常危懼二主曰趙襄子終能致福邪爾後二主迭享大位僕射陂乙未歲契丹據河朔晉師拒于澶淵天下騷然疲於戰伐翰林學士王仁裕奉使馮翊路由于鄭過僕射陂見州民及軍營婦女填咽於道路皆執錯彩小旗子插於陂中不知其數詢其居人皆曰鄭人比家夢李衛公云請多造旗幡置於陂中我見集得無數兵為中原剪除戎寇所乏者旌旗耳是以家別獻此幡幟初未之信以為妖言果旬月之間擊敗胡虜及使回過其陂使僕者下路訪于草際存者尚多李泳子蜀大理少卿李泳嘗歸郫城別墅過橋見一嬰兒以蕉葉薦之泳憐其形相貌異哺養為子六七年能書善談笑父母鍾愛之過於親子至十二歲經史未見者皆覽之如夙習人皆謂之神智嘗獨居一室中閲書父母偶潛窺之見一人持簿書復有二童子接引呈過其子便大書數行却授之去父母異之來日因待立泳欸曲謂之曰吾夜來竊有所覩汝得非判陰府事乎曰然重問則唯拜不對泳曰陰府人間事意不同吾不欲苦問汝宜善保子又拜却後六年一旦白父母兒只合與少卿夫人為兒一十八年今則事畢來日申時却歸冥司因泣下久之父母亦為之出涕泳問曰吾官至何答曰只在大理少卿果來日申時其子卒故泳有退間之志未久坐事遂罷譙乂俊羅江縣道士譙乂俊壯年忽夢太山府君追之賜以黃敕補為杖直晝歸陽間夜赴冥府如此二十餘年常説人間有命未終為惡者追生魂笞之其人在陽間之病或貧乞是也往見親戚及里人被笞者明旦往視之皆驗然恆願得免忽於冥間遇道士不言姓名謂曰爾何不致名香晝於陽間上告南辰北極必得免乂俊依此虔告忽爾太山府君却追黃敕自是遂免因入道攻易年八十餘劉峭辛酉歲金水主簿劉峭因遊雲頂山覩山廟盛飾一堂有土偶朱衣據鞍峭訝之詰於山主昭訥昭訥曰余三夕連夢見王語近辟一判官宜設堂宇塑朱衣一官而祀之故有此作峭不之信明年秩滿還成都遇都官員外孫逢吉言其事逢吉曰頃為安仲古彌留之際語長幼雲頂山王已具書馬聘禮辟吾作判官言絶儼然端坐長逝袁州父老袁州村中有老父性謹厚為鄉里所推家亦甚富一日有紫衣少年車僕甚盛詣其家求食老父即延入設食甚至遍及從者老父侍食於前因思長吏朝使行縣當有頓地此何人哉意色甚疑少年覺之謂曰君疑我我不能復為君隱仰山神也父悚然再拜曰仰山日厭於祭祀奈何求食乎神曰凡人之祀我皆從我求福我有力不能致者或非其人不當受福者我皆不敢享之以君長者故從君求食爾食訖辭讓而去遂不見朱廷禹江南內臣朱廷禹言其所親泛海遇風舟將覆者數矣海師云此海神有所求可即取舟中所載棄之水中物將盡有一黃衣婦人容色絶世乘舟而來四青衣卒刺船皆朱髮豕牙貌甚可畏婦人竟上船問有好髮髢可以見與其人忙怖不復記但云物已盡矣婦人云在船後挂壁篋中如言而得之船屋上有脯臘婦人取以食四卒視其手烏爪也持髢而去舟乃達廷禹又言其諸親自江西如廣陵攜十一歲兒行至馬當泊登岸晚望及還船失其兒遍尋之得於茂林中已如癡矣翌日乃能言云為人召去有所教我乃吹指長嘯有山禽數十百隻應聲而至毛彩怪異人莫能識自爾東下時時吹嘯衆禽必至至白沙不敢復入博訪醫巫治之久乃愈僧德林浙西僧德林少時遊舒州路左見一夫荷鉏治方丈之地左右數十里不見居人問之對云頃時自舒之桐城至此暴得痁疾不能去因臥草中及稍醒已昏矣四望無人煙唯虎豹吼叫自分必死俄有一人部從如大將至此下馬據胡牀坐良久召二卒曰善守此人明日送至桐城縣下遂上馬去倏忽不見唯二卒在焉某即強起問之答此茅將軍也常夜出獵虎憂汝被傷故使護汝欲更問之困而復臥及覺已日出不復見二卒即起而行意甚輕健若無疾者至桐城頃之疾愈故以所見之處立祠祀之德林上舒州十年及回則村落皆立茅將軍祠矣司馬正彝司馬正彝者始為小吏行溧水道中去前店尚遠而飢渴甚意頗憂之俄而遇一新草店數間獨一婦人迎客為設飲食甚豐潔天彝謝之婦人云至都有好粉胭脂宜以為惠正彝許諾至建業遇其所知往溧水因市粉脂詣遺之具告其處既至不復見店但一神女廟因置所遺而去正彝後為溧水令相傳云往往有遇之者未知其審劉宣戊寅歲吳師征越敗於臨安裨將劉宣傷重臥於死人中至夜有官吏數人持簿書至遍閲死者至宣乃扶起視之曰此漢非是引出十餘步置路左而去明日賊退宣乃得歸宣肥白如瓠初伏於地越人割其尻肉宣不敢動後瘡愈肉不復生臀竟小偏十餘年乃卒黃魯徐三誨為撫州録事參軍其下幹力黃魯者郡之俚人年少頗白皙有父母在鄉中數月一告歸歸旬日復來一旦歸月餘不至三誨遺吏至其家召之家人云久不歸矣於是散尋之又月餘乃見在深山中黃衣屣履挾彈而遊與他少年數人皆衣服相類捕之不獲魯家富乃多募人伏草間以伺之數日果擒之而諸少年皆走既歸問其故曰山中有石氏者其家如王公納我為壻他無所言留數日復失去又於山中求得之如是者三後一日竟去遂不復見尋石氏之居亦不能得此山乃臨川人採石之所蓋石之神也張鋋張鋋者纍任邑宰以廉直稱後為彭澤令使至縣宅堂後有神祠祠前巨木成林烏鳶野禽群巢其上糞穢積於堂中人畏其神故莫敢犯鋋大惡之使巫祈于神曰所為土地之神當潔清縣署以奉居人奈何使腥穢如是邪爾三日中當盡逐衆禽不然吾將焚廟而伐樹矣居二日有數大鶚奮擊而至盡壞群巢又一日大雨糞穢皆淨自此宅居清潔矣郭厚李宗為舒州刺史重造開元寺工徒始集將浚一廢井井土寇犯闕天下亂僧輩利吾行資殺我投此井中今骸骨在是為我白李公幸葬我無見棄也主者以告宗翌日親至井上使發之果得骸骨即為具衣衾棺椁設祭而葬之葬日伍伯復仆地鬼告曰為我謝李公幽魂處此已三十年籍公之惠今九州社令已補我為土地之神配食於此矣寺中至今祀之潯陽縣吏庚寅歲江西節度使徐知諫以錢百萬施廬山使者廟潯陽令遣一吏典其事此吏嘗入城召一畫工俱往畫工負荷丹彩雜物從之始出城吏昏然若醉自解腰帶投地畫工以為醉而隨之須臾復脫衣棄帽比至山中殆至裸身近廟澗水中有一卒青衣白韋蔽膝吏至乃執之畫工救之曰此醉人也卒怒曰交交加加誰能得會竟擒之坐於水中工知其非人也走往廟中告人競往視之卒已不見其吏猶坐水中已死矣乃閲其出給之籍則已乾沒過半進士謝嶽親見之朱元吉烏江縣令朱元吉言其所知泛舟至采石遇風同行者數舟皆沒某既溺不復見水道路如人間其人驅之東行可在東岸山下有大府署門外堆壞船板木如丘陵復有人運諸溺者財物入庫中甚衆入門堂上有官人遍召溺者閲籍審之至某獨曰此人不合來可令送出吏即引去復至舟所舟中財物亦皆還之恍然不自知出水已在西岸沙上矣舉船儼然亦無霑濕沽酒王氏建康江寧縣廨之後有沽酒王氏以平直稱癸卯歲二月既望夜店人將閉外戶忽有朱衣數人僕馬甚盛奄至戶前叱曰開門吾將暫憩於此店人奔走告其主其主曰出迎則已入坐矣主人因設酒食甚備又犒諸從者客甚謝焉頃之有僕夫執捆繩百千丈又一人執橛杙數百枚前白請布圍紫衣可之即出以杙釘地繫繩其上圍坊曲人家使遍良久白事訖紫衣起至戶外從者白此店亦在圍中矣紫衣相謂曰主人相待甚厚免此一店可乎皆曰一家爾何為不可即命移杙出店於圍外顧主人曰以此相報遂去倏忽不見顧視繩杙已亡矣俄而巡使歐陽進邏巡夜至店前問何故深夜開門又不滅燈燭何也主人具告所見進不信執之下獄將以妖言罪之居二日建康大火自朱崔橋西至鳳臺山居人焚之殆盡此店四鄰皆為煨燼而王氏獨免鮑回鮑回者嘗入深山捕獵見一少年裸臥大樹下毛髮委地回欲射之少年曰我山神也避君不及勿殺我富貴可致回以刃刺其口血皆逆流遂殺之無何回卒劉皞漢宗正卿劉皞忽夢一人手執文簿殆似冥吏意其知人命祿乃詰之仍希閲己將來窮達吏曰作齊王判官後為司徒宗正卿皞自以朝籍已高不樂却為王府官職夢覺歷歷記之亦言於親友後銜命使吳越路由鄆州忽於公館染疾恍惚意其曾夢為齊王判官恐是太山神天齊王也乃令親侍就廟陳所夢炷香擲茭以質之一擲果應宗卿以家事未了更將明懇神祈俟過海回得以從命頻擲不允俄卒於郵亭崔練師晉州女道士崔練師忘其名莫知所造何道置輜車一乘傭而自給或立小小陰功人亦不覺一旦車於路輾殺一小兒其父母訴官追攝駕車之夫械之欲以其牛車償死兒之家其人曰此物是崔練師處租來官司召練師并縶之太守欒元福夜夢冥司崔判官謂曰崔練師我之姪女何罪而縶之夢覺召練師以夢中之言告之練師對曰某雖姓崔莫知是何長行俄爾死兒復活周高祖聞而異之召崔練師入京仍擇道士往晉州紫極宮修齋焉
