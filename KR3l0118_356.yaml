body:
  text: 哥舒翰哥舒翰哥舒翰少時有志氣長安交游豪俠宅新書坊有愛妾曰裴六娘者容范曠代宅于崇仁舒翰常悅之居無何舒翰有故游近畿數月方回及至妾已病死舒翰甚悼之既而日暮因宿其舍尚未葬殯于堂奧既無他室舒翰曰平生之愛存沒何間獨宿繐帳中夜半后庭月皓然舒翰悲歎不寐忽見門屏間有一物傾首而窺進退逡巡入庭中乃夜叉也長丈許著豹皮褌鋸牙披發更有三鬼相繼進及拽朱索舞于月下相與言曰床上貴人奈何又曰寢矣便升階入殯所拆發舁櫬于月中破而取其尸糜割肢體環坐共食之血流于庭衣物狼藉舒翰恐怖且痛之自分曰向叫我作貴人我今擊之必無苦遂潛取帳外竿忽于暗中擲出大叫擊鬼鬼大駭走舒翰乘勢逐之西北隅逾垣而去有一鬼最后不得上舒翰擊中流血乃得去家人聞變亂起來救之舒翰具道其事將收余骸及至堂殯所儼然如故而啖處亦無所見舒翰恍忽以為夢中驗其牆有血其上有跡竟不知其然后數年舒翰顯達章仇兼瓊章仇兼瓊鎮蜀日佛寺設大會百戲在庭有十歲童兒舞于竿杪忽有一物狀如鵰鶚掠之而去群衆大駭因罷樂后數日其父母見在高塔之上梯而取之而神形如癡久之方語云見如壁畫飛天夜叉者將入塔中日飼里實飲食之味亦不知其所自旬日方精神如初楊慎矜開元中楊慎矜為御史中丞一日將入朝家童開其外門既啓鎖其門噤不可解慎矜且驚且異洎天將晚其導從吏自外見慎矜門有夜叉長丈余狀極異立于宇下以左右手噤其門火吻電眸盼顧左右從吏見之俱驚栗四去久而衢中輿馬人物稍多其夜叉方南向而去行者見之咸辟易仆地慎矜聞其事懼甚后月余遂為李林甫所誣弟兄皆誅死江南吳生有吳生者江南人嘗游會稽娶一劉氏為卒后數年吳生宰縣于雁門郡與劉氏偕之官劉氏初以柔婉聞凡數年其后忽曠烈自恃不可禁往往有逆意者即發怒毆其婢仆或嚙其肌血且甚而怒不可解吳生始知劉氏悍戾心稍外之嘗一日吳與雁門部將數輩獵于野獲狐兔甚多致庖舍下明日吳生出劉氏即潛入庖舍取狐兔生啖之且盡吳生歸因詰狐兔所在而劉氏俯然不語吳生怒訊其婢婢曰劉氏食之盡矣生始疑劉氏為他怪旬余有縣吏以一鹿獻吳生命致于庭已而吳生始言將遠適既出門即匿身潛伺之見劉氏散發袒肱目眥盡裂狀貌頓異立庭中左手執鹿右手拔其脾而食之吳生大懼仆地不能起久之乃召吏卒十數輩持兵仗而入劉氏見吳生來盡去襦袖挺然立庭乃一夜叉耳目若電光齒如戟刃筋骨盤蹙身盡青色吏卒俱戰栗不敢近而夜叉四顧若有所懼僅食頃忽東向而走其勢甚疾竟不如所在朱峴女武陵郡有浮屠祠其高數百尋下瞰大江每江水泛揚則浮屠勢若搖動故里人不敢登其上者有賈人朱峴家極贍有一女無何失所在其家尋之僅旬余莫窮其適一日天雨霽郡民望見浮屠之顛若有人立者隱然紋纈衣郡民且以為他怪峴聞之即往觀焉望其衣裝甚類其女即命人登其上而取之果見女也峴驚訊其事女曰某向者獨處有夜叉長丈余甚詭異自屋上躍而下入某之室謂某曰無懼我也即攬衣馳去至浮屠上既而兀兀然若甚醉者凡數日方稍寤因懼且甚其夜叉率以將曉則下浮屠行里中取食飲某一日夜叉方去某下視之見其行里中會遇一白衣夜叉見辟易退遠百步不敢竊視及暮歸某因詰之何為懼白衣者乎夜叉曰向者白衣自小不食太牢故我不得近也某問何故夜叉曰牛者所以耕田疇為生人之本人不食其肉則上帝祐之故我不得而近也某默念曰吾人也去父母與異類為伍可不悲乎明日夜叉去而祝曰某願不以太牢為食凡三祝其夜叉忽自郡中來至浮屠下望某而語曰何為有異志而棄我乎使我終不得近子矣從此別去詞畢即東向走而竟不知其所往某喜甚由浮屠中得以歸杜萬杜萬員外其兄為嶺南縣尉將至任妻遇毒瘴數日卒時盛夏無殯斂權以葦席裹束瘞于絶岩之側某到官拘于吏事不復重殮及北歸方至岩所欲收妻骸骨及觀坎穴但葦尚存某歎其至深而為所取悲感久之會上岩有一徑某試尋行百餘步至石窟中其妻裸露容貌猙獰不可復識懷中抱一子子旁亦有一子狀類羅剎極呼方寤婦人口不能言以手畫地書云我頃重生為夜叉所得今此二子即我所生書之悲涕頃之亦能言謂云君急去夜叉倘至必當殺君某問汝能去否曰能去便起抱小兒隨某至船所便發夜叉尋抱大兒至岸望船呼叫以兒相示船行既遠乃擘其兒作數十片方去婦人手中之子狀如羅剎解人語大歷中母子并存韋自東貞元中有韋自東者義烈之士也嘗游太白山栖止段將軍莊段亦素知其壯勇者一日與自東眺望山谷見一徑甚微若舊有行跡自東問主人曰此何詣也段將軍曰昔有二僧居此山頂殿宇宏壯林泉甚佳蓋唐開元中萬回師弟子之所建也似驅役鬼工非人力所能及或問樵者說其僧為怪物所食今絶蹤二三年矣又聞人說有二夜叉于此山亦無人敢窺焉自東怒曰余操心在平侵暴夜叉何纇而敢噬人今夕必挈夜叉首至于門下將軍止曰暴虎憑河死爾無悔自東不顧仗劍備衣而往勢不可遏將軍悄然曰韋生當其咎耳自東捫蘿躡石至精舍悄寂無人睹二僧房大敞其戶履錫俱全衾枕儼然而塵埃凝積其上又見佛堂內細草茸茸似有巨物偃寢之處四壁多挂野彘玄熊之纇或庖炙之余亦有鍋鑊薪自東乃知樵者之言不謬耳度其夜叉未至遂拔柏樹徑大如碗去枝葉為大杖扃其戶以石佛拒之是夜月白如晝夜未分夜叉挈鹿而至怒其扃鐍大叫以首觸戶折其石佛而踣于地自東以柏樹撾其腦再舉而死之拽之入室又闔其扉頃之復有夜叉繼至似怒前歸者不接己亦哮吼觸其扉復踣于戶閾又撾之亦死自東知雌雄已殞應無儕類遂掩關烹鹿而食及明斷二夜叉首挈余鹿而示段段大駭曰真周處之儔矣乃烹鹿飲酒盡歡遠近觀者如堵有道士出于稠人中揖自東曰某有衷懇欲披告于長者可乎自東曰某一生濟人之急何為不可道士曰某栖心道門懇志靈藥非一朝一夕耳三二年前神仙為吾配合龍虎丹一爐据其洞而修之有日矣今靈藥將成而數有妖魔入洞就爐擊觸藥幾廢散思得剛烈之士仗劍衛之靈藥倘成當有分惠未知能一行否自東踊躍曰乃平生所願也遂仗劍從道士而去濟險躡峻當太白之高峰將半有一石洞可百餘步即道士燒丹之室唯弟子一人道士約曰明晨五更初請君仗劍當洞門而立見有怪物但以劍擊之自東曰謹奉教久立燭于洞門外以伺之俄頃果有巨虺長數丈金目雪牙毒氣氤郁將欲入洞自東以劍擊之似中其首俄頃若輕務而化去食頃有一女子顏色絶麗執芰荷之花緩步而至自東又以劍拂之若云氣而滅食頃將欲曙有道士乘云駕鶴導從甚嚴勞自東曰妖魔已盡吾弟子丹將成矣吾當來為證也盤旋候明而入語自東曰喜汝道士丹成今為詩一首汝可繼和詩曰三秋稽賴叩真靈龍虎交時金液成絳雪既凝身可度蓬壺頂上彩云生自東詳詩意曰此道士之師遂釋劍而禮之俄而突入藥鼎爆烈更無遺在道士慟哭自東悔恨自咎而已二人因以泉滌其鼎器而飲之自東后更有少容而適南嶽莫知所止今段將軍莊尚有夜叉骷髏見在道士亦莫知所之馬燧馬燧貧賤時寓游北京謁府主不見而返寄居于園吏吏曰莫欲謁護戎否若謁即須先言當為其歧路耳護戎諱數字而甚切君當在意若犯之無逃其死也然若幸愜之則所益與諸人不同慎忽暗投也某乃護戎先乳母子得以詳悉而輒贊君子焉燧信與疑半明晨入謁護戎果犯其諱庭叱而去畏懼之色見于面園吏曰是必忤護戎耳燧問計求脫園吏曰君子戾我而悽惶如是然敗則死不得瀆我也遂匿燧于糞車中載出郭而逃于時護戎果索燧一報不獲散鐵騎者每門十人燧狼狽竄六十余里日暮度不出境求蔽于逃民敗室之中尚未安聞車馬螔賁缺聲人相議曰能更三二十里否果護戎之使也俄聞車馬勢漸遠稍安焉未復常息又聞有窸窣人行聲燧危栗次忽于戶牖見一女人衣布衣身形絶長手攜一袱曰馬燧在此否燧默然不敢對又曰大驚怕否胡二姊知君在此故來安慰無生憂疑也燧乃應諾而出胡二姊曰大厄然已過尚有余恐矣君固餒我食汝乃解所攜袱有熟肉一甌胡餅一個燧食甚飽卻令于舊處更不可動胡二姊以灰數斗放與燧前地上橫布一道仍授之言曰今夜半有異物相恐劫輒不可動過此厄后勳貴無雙言畢而去夜半有物閃閃照人漸進戶牖間見一物長丈余乃夜叉也赤發蝟奮全身鋒鑠臂曲癭木甲駕獸爪衣豹皮褲攜短兵直入室來獰目電燮吐火噴血跳躅哮吼鐵石消鑠燧之惴栗殆喪魂亡精矣然此物終不敢越胡二姊所布之灰久之物乃撤一門扉藉而熟寢俄又聞車馬來聲有人相謂曰此乃逃人室不妨馬生匿于此乎時數人持兵器下馬入來沖啼夜叉夜叉奮起大吼數聲裂人馬啖食血肉殆盡夜叉食既飽徐步而出四更東方月上燧覺寂靜乃出而去見人馬骨肉狼藉乃獲免后立大勳官爵穹崇詢訪胡二姊之由竟不能得思報不獲乃每春秋祠饗別置胡二姊一座列于廟左
