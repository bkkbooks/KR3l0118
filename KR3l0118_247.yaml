body:
  text: 穆子客穆子客魏使穆子客聘梁主客范胥謂之曰卿名子客思歸之傳一何太速客曰吾名子客所以將命四方禮成告返那得言速出談藪僧重公魏使主客郎李恕聘梁沙門重公接恕曰向來全無葅酢膎乎酢膎乎三字原空闕據黃本補恕父名諧以為犯諱曰短髮粗疏重公曰貧道短髮是沙是沙二字原空闕據明鈔本補門種類以君交聘二國不辨膎諧諧原作詣據許本改重公嘗謁高祖問曰天天字原空闕據黃本補子聞在外有四聲何者為是重公應聲答曰天保寺剎中中字原空闕據黃本補出逢劉孝綽説以為能綽曰何如道天子萬福出談藪孫紹後魏孫紹歷職內外垂老始拜太府少卿謝日靈太后曰公年似太老紹重拜曰臣年雖老臣卿太少后大笑曰是將正卿出啓顏録魏市人後魏孝文帝時諸王及貴臣多服石藥皆稱石發乃有熱者明鈔本乃有熱者作其時乃有非富貴者亦云服石發熱時人多嫌其詐作富貴體有一人於市門前臥宛轉稱熱因衆人競看同伴怪之報曰我石發同伴人曰君何時服石今得石發曰我昨在市得米米中有石食之乃今發衆人大笑自後少有人稱患石發者出啓顏録魏彥淵北齊崔昂嘗宴筵招朝彥酒酣後人多散走即令著作郎巨鹿魏彥淵追之彥淵左手執中參軍周子淵淵以知名右手執御史鄭守守原作寺據明鈔本黃本改信來咨昂曰彥淵後明鈔本後作投黃本後作役周入鄭執訊獲醜濟州長史李翥嘗為主人朝士咸集幽州長史陸仁惠不來翥甚銜之彥淵曰一目之羅豈能獲鳥翥眇一目陸號角鴟又崔儦謂彥淵曰我拙於書不能儦字使好彥淵曰正可長牽人腳斜飄鹿尾即好彥淵司農卿李明抄李作季昌之子出談藪陸乂北齊散騎常侍河南陸乂黃門郎卬之子卬字雲駒而乂患風多所遺志嘗與人言言字原闕據明鈔本補馬曰雲駒有劉某劉某原作神符據明鈔本改者常帶神符神符原作符與神據明鈔本刪改渡漳水致失乂笑曰劉君渡水失神符其人答曰陸乂名馬作雲駒出談藪王元景北齊王元景為尚書性雖懦緩而每事機捷有奴名典琴嘗旦起令索食謂之解齋奴曰公不作齋何故嘗云解齋元景徐謂奴曰我不作齋不得為解齋汝作字典琴何處有琴可典出啓顏録李庶世呼病瘦為崔家疾北齊李庶無鬚時人呼為天閹崔諶調之曰教弟種鬚法以錐錐遍刺作孔插以馬尾庶曰持此還施貴族藝眉有驗然後樹鬚崔氏世有惡疾故庶以此嘲之俗呼滹沱河為崔氏墓田墓田二字原闕據酉陽雜俎續四補出酉陽雜俎邢子才北齊中書侍郎河東裴襲字敬憲患耳新構山池與賓客宴集謂河間邢子才曰山池始就願為一名子才曰海中有蓬萊山仙人之所居宜名蓬萊蓬萊裴聾聾原作襲據明鈔本改下同也故以戲之敬憲初不悟於後始覺欣然謂子才曰長忌及戶高則無害公但大明鈔本大作不語聾亦何嫌出談藪盧詢祖齊主客郎頓丘李恕身短而袍長盧詢祖腰粗而帶急恕曰盧郎腰粗帶難匝答曰丈人身短袍易長恕又謂詢祖曰盧郎聰明必不壽答曰見丈人蒼蒼在鬢差以自安出北史北海王晞齊北海王晞字叔朗為大丞相府司馬嘗共相府祭酒盧思道禊飲晉湖湖原作胡據明鈔本改晞賦詩曰日暮應歸去魚鳥見留連時有中使召晞馳馬而去明旦思道問晞昨被召以朱顏得無以魚鳥致責晞曰昨晚陶然頗以酒漿被責卿等亦是留連之一物何獨魚鳥而已晞好文酒樂山水府寮呼為方外司馬焉及昭孝立待遇彌隆而晞每自疏退謂人曰非不愛熱官但思其明鈔本其作之爛熟耳出談藪李騊駼陳使聘齊見朝廷有赤鬣者顧謂散騎常侍趙郡李騊駼曰赤也何如騊駼曰束帶立於朝可使與賓客言騊駼時接客出談藪盧思道北齊盧思道聘陳陳主令朝貴設酒食與思道宴會聯句作詩有一人先唱方便譏刺北人云榆生欲飽漢草長正肥驢為北人食榆兼吳地無驢故有此句思道援筆即續之曰共甑分炊米米原作水據明鈔本改同鐺各煮魚為南人無情義同炊異饌也故思道有此句吳人甚愧之又衛尉卿京兆杜臺卿共中兵參軍清河崔儦握槊十子成都止賭一雉盧思道曰翳成都不過一雉儦又謂思道曰昨夜大雷吾睡不覺思道曰如此震雷不能動蟄太子詹事范陽盧叔虎有子十人大者字畜生最有才思思道謂人曰從叔有十子皆不及畜生叔虎主客郎中澤之孫也散騎常侍隴西辛德源謂思道曰昨作羌嫗詩惟得五字云皂陂垂肩井苦無其對思道尋聲曰何不道黃物明鈔本物作楊插腦門思道嘗謂通直郎渤海封孝騫曰卿既姓封是封豕之後騫曰卿曰卿二字據明鈔本補既姓盧是盧令之裔出談藪石動筒北齊高祖嘗宴近臣為樂高祖曰我與汝等作謎可共射之卒律葛答諸人皆射不得或云是髐子箭高祖曰非也石動筒曰臣已射得高祖曰是何物動筒對曰是煎餅高祖笑曰動筒射著是也高祖又曰汝等諸人為我作一謎我為汝射之諸人未作動筒為謎復云卒律葛答高祖射不得問曰此是何物答曰是煎餅高祖曰我始作之何因更作動筒曰承大家熱鐺子頭更作一箇高祖大笑高祖嘗令人讀文選而郭璞遊仙詩嗟歎稱善諸學士皆云此詩極工誠如聖旨動筒即起云此詩有何能若令臣作即勝伊一倍高祖不悅良久語云汝是何人自言作詩勝郭璞一倍豈不合死動筒即云大家即令臣作若不勝一倍甘心合死即令作之動筒曰郭璞遊仙詩云青溪千餘刃中有一道士臣作云青溪二千仞中有兩道士豈不勝伊一倍高祖始大笑明鈔本笑下多七百四十八字至高祖大笑動筒止今據補並將闕字用燉煌本啓顏録校補又齊文宣帝曰曰恕臣萬死即得帝曰好曰臣昨落密甕裡臣為陛下卻還復上天真乎對曰臣作夜夢隨陛下行落一廁中出來舐之帝大怒付所司殺卻曰臣請一言而死帝曰陛下得臣頭極無用臣失頭笑而捨之高齋會大德法師開講道俗有疑滯者即論難議援引大義説法門言議幽深皆在雅正動筒最後論議謂法師曰且問法師一個小議佛常騎何物法師答曰或坐干葉蓮花或乘六牙白象動筒云法師今不讀經不知佛所乘騎物師即問云檀越讀經佛騎何物答曰騎牛法師曰何以知經云世尊甚奇特非騎牛座皆大笑又謂法師曰法師既不知佛常騎牛今更問法師一種法義比來每經之上皆云價值百千兩金未知百千兩金總有幾斤遂無以對嘗作內道場時有法師先立無一無二無是無非義高升高坐講還令立舊義當呼儒生學士大德名僧義理百瑞無能得者動筒即講難此僧必令結舌高祖大高坐褰衣闊立問僧看弟子有幾箇腳僧曰兩腳又翹一腳向後一腳獨立問僧更看弟子有幾個腳僧曰兩腳動筒云向有兩腳今有一腳若為能無一無二僧答云若其二是直啓顏録作真下同不應有一腳腳既得有一明二即非直動筒以僧義不窮無難得之理者乃謂僧曰向者劇問法師未是好義法師師云無一無二無是無非今問法師此義不得不答弟子問天無二日上無二王今者天子一人臨御四海法師豈更得云無一易有乾坤天有日月星辰配於天子即是二人法師豈更得云無二今者帝臨廣德無幽不燭昆蟲草木皆得其生法師豈更得無是今四海為家萬方歸順唯有宇文黑獺獨阻皇風法師豈更得云無非於是僧默然以無應高祖撫掌大笑高祖又常集儒生會講酬難非一動筒後來謂衆士曰先生知天何姓博士天子姓高動筒曰天子姓高天必姓高此乃學他蜀臣秦密本非新義正經之上自有天姓先生可引正文不須假託舊事博士云不知何經得有天姓動筒云先生全不讀書孝經亦似天本姓也先生可不見孝經云父子之道天姓也豈不是天姓高祖大笑動筒以上據明鈔本補又嘗於國學中看博士論云孔子弟子達者七十二人動筒因問曰達者七十二人幾人已著冠幾人未著冠博士曰經傳無文動筒曰先生讀書豈合不解孔子弟子已著冠有三十人未著冠有四十二人博士曰據何文以辨之曰論語云冠者五六人五六三十人也童子六七人六七四十二人也豈非七十二人也坐中皆大悅博士無以復之出啓顏録徐之才齊西陽王高平徐之才博識有口辨父雄祖成伯並善明鈔本善下空一字按北齊書徐之才傳疑當是醫字術世傳其業納言祖孝徵戲之呼為師公之才曰既為汝師復為汝公在三之義頓居其兩孝徵僕射瑩之子之才嘗以劇談調僕射魏收收熟視之曰面似小家方相之才答曰若爾便是卿之葬具出談藪蕭彪明帝與文士庾信王褒等遊處有蕭彪者寶寅之子素好臧否多所月旦嘗侍坐於帝帝歷問衆賓何如皆君子也次問君何如人答曰那得是非君子之問答曰那得是君子時護在同州他日帝右詐吾欲疾病可乎使者曰追答曰緣君子事彪乃惶懼頓首乞留帝曰得彪乃遺書寄家號慟而云帝度其行之去吾別報冢宰彪還信等咸在彪甚悲喜微笑視彪巧覺謂帝曰北那得是君子於笑出三國典略
