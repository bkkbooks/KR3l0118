body:
  text: 異木主一州樹東方荒外有豫章焉此樹主一州其高千丈圍百丈本上三百丈始有枝條敷張如帳上有玄狐黑猿樹主一州南北并列面向西南有九力士操斧伐之以占九州吉凶斫复其州有福創者州伯有病積歲不复者其州滅亡偃桑東方有樹焉高八十丈敷張自輔其葉長一丈廣六七尺名曰桑其上自有蚕作茧長三尺繰一茧得絲一斤有椹焉長三尺五寸圍如長不晝木荒外有火山其中生不晝之木晝夜火燃得曝風不猛猛雨不滅蚊子樹有樹如冬青實生枝間形如枇杷子每熟即坼裂蚊子群飛唯皮殼而已土人謂之蚊子樹聖鼓枝含洭縣水口下東岸有聖鼓即楊山之鼓枝也橫在川側沖波所激未嘗移動眾鳥飛鳴莫有萃者般人誤以篙触以患瘧鹿木武陵郡北有鹿木二株馬伏波所種木多節倒生木此木依山生根在上有人触則葉翕人去則葉舒出東海黝木節以盅獸可以為鞭桄榔樹古南海縣有桄榔樹峰頭生葉有面大者出面乃至百斛以牛乳啖之甚美怪松南康有怪松從前刺史每令畫工寫松必數枝衰悴后因一客與妓環飲其下經日松死楓人岭中諸山多楓樹樹老多有瘤癭忽一夜遇暴雷驟雨其樹贅則暗長三數尺南人謂之楓人越巫云取之雕刻神鬼異致靈驗楓鬼臨川記云撫州麻姑山或有登者望之廬岳彭蠡皆在其下有黃連厚朴恒山楓樹數千年者有人形眼鼻口臂而無腳入山者見之或有砟之者皆出血人皆以藍冠于其頭明日看失藍為楓子鬼楓生人江東江西山中多有楓木人于楓樹下生似人形長三四尺夜雷雨即長與樹齊見人即縮依舊曾有人合笠于首明日看笠子挂在樹頭上旱時欲雨以竹束其頭禊之即雨人取以為式盤极神驗楓木棗地是也靈楓南中有楓子鬼楓木之老者人形亦呼為靈楓焉破木有肉有人破大木木中有肉可五斤如熟豬肉江中楓材循海之間每构屋即命民踏木于江中短長細大唯所取率松材也彼俗常用不知古之何人斷截埋泥沙中既不朽蠹又多如是事可異者河伯下材中宿縣山下有神宇溱水至此沸騰鼓怒槎木泛至此淪沒竟無出者世人以為河伯下材斗蛟船木樟木江東人多取為船船有與蛟龍斗者交讓木武陵郡記白雉山有木名交讓眾木敷榮后方萌芽亦更歲迭榮也千歲松玉策記稱千歲松樹四邊披越上杪不長望而視之有如偃蓋其中有物如青犬或如人皆壽萬歲汗杖東方朔西那汗國回得聲木十枚帝以賜大臣人有疾則杖汗將死則折里語生年未半杖不汗化蝶樹長安城禁苑內一大樹冬月雪中忽花葉茂盛及凋落結實其子光明璨爛如火之明焉數日皆化為紅蛺蝶飛去至明年唐高祖自唐國入長安此必前兆也涪水材梓童郪縣唐大歷七年夏六月甲子涪水泛溢流木數千條梁棟欀桷具備補內城屋悉此木喬林為之記端正樹長安西端正樹去馬嵬一舍之程乃唐德宗皇帝幸奉天睹其蔽芾錫以美名后有文士經過題詩逆旅不顯姓名詩曰昔日偏沾雨露榮德皇西幸賜嘉名馬嵬此去無多地合向楊妃冢上生風雅有如此焉崇賢里槐唐陳朴者元和中崇賢里此街大門外有槐樹嘗黃昏徙倚窺外見若婦人及老狐異鳥之類進入樹中遂伐視之樹凡三槎并空中一槎中有獨頭栗一百二十一枚中襁一死兒長尺余三枝槐唐相國李石河中永樂有宅庭槐一本抽三枝直過堂前屋脊一枝不及相國同堂昆弟三人曰石曰而皆登宰執唯福一人歷七鎮使相而已癭槐華州三家店西北道邊有槐甚大蔥郁周回可蔭數畝槐有癭形如二豬相趁奔走其回顧口耳頭足一如塑者荊根枕賈人張弘者行至華岳廟前忽昏懵前進不可系馬于一金荊樹而酣睡馬惊拽出樹根而去寤逐而及之樹根形如獅子毛爪眼耳足尾無不悉具乃于華陰縣求木工修之為一枕獻于廟守廟者常以匱鎖之行人聞者賂守廟者百錢始獲一見五重桑洛中愿會寺魏中書侍郎王翊舍宅立也佛堂前生桑樹一株直上五尺枝條橫繞柯葉旁布形如羽蓋复高五尺又然凡為五重每一重葉椹各異京師道俗謂之神桑觀者甚眾帝聞而惡之以為惑眾命給事黃門侍郎元紀伐殺之其日云霧晦冥下斧之處流血至地見者莫不悲泣蜻蜓樹昔婁約居常山据禪座有一野嫗手持一樹植之于庭言此是蜻蜓樹歲久芬芳郁茂有一烏身赤尾長常止息其上無患木燒之极香避惡氣一名噤婁一名桓昔有神巫曰瑤眊能符劾百鬼擒魑魅以無患木擊殺之世人競取此木為器用卻鬼因曰無患木醋心樹杜師仁嘗賃居庭有巨杏樹鄰居老人每擔水至樹側必歎曰此樹可惜杜詰之老人云某善知木病此樹有疾某請治乃診樹一處曰樹病醋心杜染指于蠹處嘗之味若薄醋老人持小鉤披蠹再三鉤之得一白虫如蝠乃傅藥于瘡中复戒曰有實自青皮時必標之十去八九則樹活如其言樹益茂盛矣又云嘗見栽植經三卷言木有病醋心者登第皂莢泉州文宣王廟庭宇嚴峻學校之盛冠于藩府庭中有皂莢樹每州人將登第則生一莢以為常矣梁真明中忽然生一莢有半人莫諭其意乃其年州人陳逖進士及第黃仁穎學究及第仁穎恥之复應進士舉至同光中舊生半莢之所复生全莢其年仁穎及第后數年廟為火焚其年閩自稱尊號不复貢士遂至于今辨白檀樹劍門之左峭岩間有大樹生于石縫之中大可數圍枝干純白皆傳曰白檀樹其下常有巨虺蟠而護之民不敢采伐又西岩之半有志公和尚影路人過者皆西向擎拳頂禮若親面其如來王仁裕癸未歲入蜀至其岩下注目觀之以質向來傳說時值晴朗溪谷洗然遂勒轡移時望之其白檀乃一白栝樹也自歷大小漫天夾路溪谷之間此類甚多安有檀香蛇繞之事又西瞻志公影蓋岩間有圓柏一株即其笠首也兩面有上下石縫限之為身形斜其縫者即袈裟之文也上有苔蘚斑駁即山水之毳文也方審其非白檀志公不留影于此明矣仍知人之誤傳者何限哉藤實杯藤實杯出西域藤大如臂葉似葛花實如梧桐實成堅固皆可酌酒自有文章映澈可愛實大如杯味如豆蔻香美消酒士人提酒來至藤下摘花酌酒乃以其實消醒國人寶之不傳于中土張騫入宛得之事在張騫出關志鐘藤松楨即鐘藤也葉大者晉安人以為盤人子藤安南有人子藤紅色在蔓端有刺其子如人狀昆侖燒之集象南中亦難得蜜草蔓北天竺國出蜜草蔓生大葉秋冬不死因重霜露遂結成蜜如塞上蓬鹽胡蔓草此草在邕間叢生花偏如梔子稍大不成朵色黃白葉稍異誤食之數日卒死飲白鵝白鴨血則解或以物投之祝曰我買你食之不死野狐絲有草蔓生色白花微紅大如粟秦人呼為野狐絲
