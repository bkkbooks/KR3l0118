body:
  text: 太平廣記卷四百四十畜獸七貓貓目睛旦暮圓及午豎斂如綖其鼻端常冷惟夏至一日暖其毛不容蚤虱黑者闇中逆循其毛即若火星俗言貓洗面過耳則客至楚州謝陽出貓有褐花者靈武有紅叱撥及青驄色者貓一名蒙貴一名烏圓平陵城古譚國也城中有一貓常帶金鎖有錢飛若蛺蝶土人往往見之唐道襲王建稱尊於蜀其嬖臣唐道襲為樞密使夏日在家會大雨其所蓄貓戲水於簷溜下道襲視之稍稍而長俄而前足及簷忽爾雷電大至化為龍而去賣醋人建康有賣醋人某者畜一貓甚俊健愛之甚辛亥歲六月貓死某不忍棄置貓坐側數日腐且臭不得已攜棄秦淮水既入水貓活某自下救之遂溺死而貓登岸走金烏鋪吏獲之縛置鋪中鎖其戶出白官司將以其貓為證既還則已斷其索齧壁而去矣竟不復見歸係進士歸係暑月與一小孩子於廳中寢忽有一貓大叫恐驚孩子使僕以枕擊之貓偶中枕而斃孩子應時作貓聲數日而殞鼠舊說鼠王其溺精一滴成一鼠一說鼠母頭腳似鼠尾蒼口銳大如水中獺性畏狗溺一滴成一鼠時有鼠災多起於鼠母鼠母所至處動成萬萬鼠其肉極美凡鼠食死人目睛則為鼠王俗云鼠齧上服有喜凡齧衣欲得有蓋無蓋凶西域有鼠大如狗中者如兔小者如常大鼠頭悉已白然帶以金枷商估有經過其國不先祈祀者則齧人衣裳也得沙門咒願更獲無他釋道安昔至西方親見如此不盡木火中有鼠重千斤毛長二尺餘細如絲恒居火中洞赤時時出外而毛色白以水逐而沃之即死人紡績其毛織以為布用之若有垢涴以火燒之則淨也北方層冰萬里厚百丈有磎鼠在冰下土中其形如鼠食草木肉重千斤可以作脯食之已熱其毛八尺可以為褥臥之卻寒其皮可以蒙鼓聲聞千里其毛可以來鼠此尾所在鼠聚今江南鼠食草木為災此類也紅飛鼠多出交趾及廣管隴州皆有深毛茸茸然惟肉翼淺黑色多雙伏紅蕉花間採捕者若獲一則其一不去南中婦人買而帶之以為媚藥拱鼠形如常鼠行田野中見人即拱手而立人近欲捕之跳躍而去秦川中有之鼴鼠首尾如鼠色青黑短足有指形大重千餘斤出零陵郡界不知所來民有災及為惡者鼠輒入其田中振落毛衣皆成小鼠食其苗稼而去或捕得鼴鼠者治其皮飾為帶頗能澀芻為其三毛出於一孔與常皮有異人多寶之義鼠形如鼠短尾每行遞相咬尾三五為群驚之則散俗云見之者當有吉兆成都有之唐鼠形如鼠稍長青黑色腹邊有餘物如腸時亦脫落亦名易腸鼠昔仙人唐昉拔宅升天雞犬皆去唯鼠墜下不死而腸出數尺三年易之俗呼為唐鼠城固川中有之白鼠身如皎白耳足紅色眼眶赤赤者乃金玉之精伺其所出掘之當獲金玉云鼠五百歲即白耳足不紅者乃常鼠也王周南魏齊王芳時中山有王周南者為襄邑長忽有鼠從穴出語曰周南爾以某日死周南不應至期更冠幘皂衣而出曰周南爾以日中死亦不應鼠復入穴日適中鼠又冠幘而出曰周南汝不應我何道言絕顛蹶而死即失衣冠所在就視之與常鼠無異終祚吳北寺終祚道人臥齋中鼠從坎出言終祚後數日當死祚呼奴令買犬鼠云亦不畏此其犬入戶必死犬至果爾祚常為商閉戶謂鼠曰汝正欲使我富耳今既遠行勤守吾房勿令有所零失時桓玄在南州禁殺牛甚急終祚數宰竊買牛皮還東貨之得二十萬還時戶猶闔也都無所失其怪亦絕自後稍富清河郡守清河郡太守至前後輒死新太守到如廁有人長三尺冠幘皂服云府君某日死太守不應意甚不樂催使吏為作亡具外頗怪其事日中如廁復見前所見人言府君今日中當死三言亦不應乃言府君當道而不道鼠為死乃頓仆地大如豚郡內遂安淳于智淳于智字叔平濟北人性深沉有恩義少為書生善易高平劉柔夜臥鼠齧其左手中指意甚惡之以問智智為筮之曰鼠本欲殺君而不能當相為使之反死乃以朱書其手腕橫文後為田字可方一寸使夜露手以臥有大鼠伏死於前徐密上虞魏虔祖婢名皮納有色密樂之鼠乃託為其形而就密宿密心疑之以手摩其四體便覺縮小因化為鼠而走蔡喜夫宋前廢帝景平中東陽大水蔡喜夫避住南壟夜有大鼠形如㹠子浮水而來徑伏喜夫奴床角奴愍而不犯每食輒以餘飯與之水勢既退喜夫得返居鼠以前腳捧青紙裹二個珠置奴前啾啾似語從此去來不絕亦能隱形又知人禍福後同縣呂慶祖牽狗野獵暫過遂齧殺之茅崇邱齊世祖永明十年丹陽郡民茅崇邱家夜夜廚中有人語笑復明燈火有宴饌之聲及開門視之即無所見及閉戶即依然聞如此數旬忽有一道士詣崇邱問曰君夜夜有妖患乎崇邱曰然道士乃懷中取一符與之謂崇邱曰但釘於灶上及北壁來日早視之言訖遂失其道士崇邱喜乃以符如其言明日見廚中有五六大鼠各長二尺無毛而色如朱盡死於北壁乃竟絕蕭悉達北齊平原太守蘭陵蕭悉達腰帶為鼠齧楊遵彥以俗事戲之曰當遷官未幾除家令尋失職鼠後齧其鞾遵彥曰當復得官悉達曰某便為吏部尚書何關人事逆旅道士唐萬歲元年長安道中有群寇晝伏夜動行客往往遭殺害至明旦略無蹤由人甚畏懼不敢晨發及暮至旅次後有一道士宿於逆旅聞此事乃謂眾曰此必不是人當是怪耳深夜後遂自於道旁持一古鏡潛伺之俄有一隊少年至兵甲完具齊呵責道士曰道旁何人何不顧生命也道士以鏡照之其少年棄兵甲奔走道士逐之仍誦咒語約五七里其少年盡入一大穴中道士守之至曙卻復逆旅召眾以發掘有大鼠百餘走出乃盡殺之其患乃絕李測開元中為某縣令在廳事有鳥高三尺無毛羽肉色通赤來入其宅測以為不祥命卒擊之卒以柴斧砍鳥刃入木而鳥不傷測甚惡之又於油鑊煎之以物覆上數日開視鳥隨油氣飛去其後又來測命以繩縛之繫於巨石沉之於河月餘復至斷繩猶在頸上測取大木鑿空其中實鳥於內鐵冒兩頭又沉諸河自爾不至天寶中測移官其宅亦凶蒞事數日宅中有小人長數寸四五百頭滿測官舍測以物擊中一頭仆然而殪視之悉人也後夕小人等群聚哭泣有車載棺成服祭弔有行葬於西階之下及明才發測便掘葬處得一鼠通赤無毛於是乃命人力尋孔發掘得鼠數百其怪遂絕測家亦甚無恙天寶彍騎天寶初邯鄲縣境恒有魘鬼所至村落十餘日方去俗以為常彍騎三人夜投村宿媼云不惜留住但恐魘鬼客至必當相苦宜自防之雖不能傷人然亦小至迷悶騎初不畏鬼遂留止宿二更後其二人前榻寐熟一人少頃而忽覺見一物從外入狀如鼠黑而毛床前著綠衫持笏長五六寸向睡熟者曲躬而去其人遂魘魘至二人次至覺者覺者竟往把腳鬼不動然而體冷如冰三人易持之至曙村人悉共詰問鬼初不言騎怒云汝竟不言我以油鑊煎汝遂令村人具油鑊乃言已是千年老鼠若魘三千人當轉為狸然所魘亦未嘗損人若能見釋當去此千里外騎乃釋之其怪遂絕御史大夫當為邯鄲尉崔懿親見其事懿再從弟恒說之畢杭天寶末御史中丞畢杭為魏州刺史陷於祿山賊中尋欲謀歸順而未發數日於庭中忽見小人長五六寸數百枚遊戲自若家人擊殺明日群小人皆白服而哭載死者以喪車凶器一如士人送喪之備仍於庭中作塚葬畢遂入南墻穴中甚驚異之發其塚得一死鼠乃作熱湯沃中久而掘之得死鼠數百枚後十餘日杭以事不克一門遇害崔懷嶷其宅有鼠數百頭於庭中兩足行口中作呱呱聲家人無少長盡出觀其屋轟然而塌壞嶷外孫王汶自向余說近世有人養女年十餘歲一旦失之經歲無蹤跡其家房中屢聞地下有小兒啼聲掘之初得一孔漸深大縱廣丈餘見女在坎中坐手抱孩子旁有禿鼠大如斗女見家人不識主領父母乃知為鼠所魅擊鼠殺之女便悲泣云我夫也何忽為人所殺家人又殺其孩子女乃悲泣不已未及療之遂死李甲寶應中有李氏子亡其名家於洛陽其世以不好殺故家未嘗畜狸所以宥鼠之死也迨其孫亦能世祖父意嘗一日李氏大集其親友會食於堂既坐而門外有數百鼠俱人立以前足相鼓如甚喜狀家僮驚異告於李氏李氏親友乃空其堂而縱觀人去且盡堂忽摧圮其家無一傷者堂既摧群鼠亦去悲乎鼠固徵物也尚能識恩而知報況人乎如是則施恩者宜廣其恩而報恩者亦宜力其報有不顧者當視此以愧王縉唐相國王公縉大歷中與元載同執政事嘗因入朝天尚早坐於燭下其榻前有囊公遂命侍童取之侍童挈以進覺其重不可舉公啟視之忽有一鼠長尺餘質甚豐白囊中躍出公大懼顧謂其子曰我以不才謬居卿相無德而貴常懼有意外之咎今異物接於手足豈非禍之將萌耶後數日果得罪貶為縉雲守郗士美許昌郗尚書士美元和末為鄂州觀察仁以撫下忠以奉上政化之美載於冊書一日晨興出視事束帶已畢左手引靴未及陷足忽有一巨鼠過庭北面拱手而舞八座大怒驚叱之略無懼意因擲靴以擊鼠即奔逸有毒虺墜於靴中珠目錦身尺長筴細螫焰勃勃起於舌端向無鼠妖則以致臃指潰足之患參寥子曰是知梟鳴鼠舞不恒為災大人君子遇之則吉李知微曠達士也嘉遯自高博通書史至於古今成敗無不通曉常以家貧夜遊過文成宮下初月微明見數十小人皆長數寸衣服車乘導從呵喝如有位者聚立於古槐之下知微側立屏氣伺其所為東復有垝垣數雉旁通一穴中有紫衣一人冠帶甚嚴擁侍十餘輩悉稍長諸小人方理事之狀須臾小人皆趨入穴中有一人白長者曰某當為西閣舍人一人曰某當為殿前錄事一人曰某當為司文府史一人曰某當為南宮書佐一人曰某當為馳道都尉一人曰某當為司城主簿一人曰某當為遊仙使者一人曰某當為東垣執戟如是各有所責而不能盡記喜者憤者若有所恃者似有果求者唱呼激切皆請所欲長者立盼視不復有詞有似唯領而已食頃諸小人各率部位呼呵引從入於古槐之下俄有一老父顏狀枯瘦杖策自東而來謂紫衣曰大為諸子所擾也紫衣笑而不言老父亦笑曰其可言耶言訖相引入穴而去明日知微掘古槐而求唯有群鼠百數奔走四散紫衣與老父不知何物也建康人建康人方食魚棄魚頭於地俄而壁下穴中有人乘馬鎧甲分明大不盈尺手執長槊徑刺魚頭馳入穴去如是數四即掘地求之見數大鼠魚頭在旁惟有筋一隻了不見甲馬之狀無何其人卒盧嵩太廟齋郎盧嵩所居釜鳴灶下有鼠如人哭聲因祀灶灶下有五大鼠各如方色盡食所祀之物復入灶中其年嵩補興化尉竟無他怪柴再用龍武統軍柴再用常在廳事憑几獨坐忽有一鼠走至庭下向再用拱手而立如欲拜揖之狀再用怒呼左右左右皆不至即起逐之鼠乃去而廳屋梁折所坐床几盡壓麋碎再用後為廬鄂宣三鎮節度使卒蘇長史蘇長史將卜居京口此宅素凶妻子諫止之蘇曰爾惡此宅吾必獨住始宿之夕有三十餘人皆長尺餘衣道士冠褐來詣蘇曰此吾等所居君必速去不然及禍蘇怒持杖逐之皆走入宅後竹林中而沒即掘之獲白鼠三十餘頭宅不復凶盧樞侍御史盧樞言其親為建州刺史暑夜獨出寢室望月於庭始出戶聞堂西階下若有人語笑聲躡足窺之見七八白衣人長不盈尺男女雜坐飲酒几席食器皆具而微獻酬久之其席一人曰今夕甚樂然白老將至奈何因歎吒須臾坐中皆哭入陰溝中遂不見後罷郡新政家有貓名白老既至白老穴堂西階地中獲白鼠七八皆殺之朱仁朱仁者世居嵩山下耕耘為業後仁忽失一幼子年方五歲求尋十餘年終不知存亡後一日有僧經遊造其門攜一弟子其形容似仁所失之幼子也仁遂延僧於內設供養良久問僧曰師此弟子觀其儀貌稍似余家十年前所失一幼子也僧驚起問仁曰僧住嵩山薜蘿內三十年矣十年前偶此弟子悲號來投我我問其故此弟子方孩幼迷其蹤由不甚明僧因養育之及與落髮今聰悟無敵僧常疑是一聖人也君子乎試自熟驗察之仁乃與家屬共詢問察視其母言我子背上有一黶記逡巡驗得實是親子父母家屬一齊號哭其僧便留與父母而去父母安存養育倍於常子此子每至夜即失所在曉卻至家如此二三年父母以為作盜伺而窺之見子每至夜化為一大鼠走出及曉卻來父母問之此子不語多時對曰我非君子也我是嵩山下鼠王下小鼠既見我形我不復至矣其父母疑惑間其夜化鼠走去李昭嘏李昭嘏舉進士不第登科年已有主司並無薦託之地主司晝寢忽寤見一卷軸在枕前看其題乃昭嘏之卷令送於架上復寢暗視有一大鼠取其卷銜其軸復送枕前如此再三昭嘏來春及第主司問其故乃三世不養貓皆云鼠報張文蔚相國張文蔚莊在東都柏坡莊內有鼠狼穴養四子為蛇所吞鼠狼雌雄情切乃於穴外坋土恰容蛇頭伺蛇出穴果入所坋處出頭度其迴轉不及當腰齧斷而劈蛇腹銜出四子尚有氣置之穴外銜豆葉嚼而傅之皆活何微物而有情有智之如是乎最靈者人胡不思之
