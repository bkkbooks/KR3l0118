body:
  text: 崔蠡崔蠡唐崔蠡知制誥日丁太夫人憂居東都里第時尚清苦儉嗇四方寄遺茶藥而已不納金帛故朝賢家不異寒素雖名姬愛子服無輕細崔公卜兆有期居一日宗門士人有謁請於蠡者閽吏拒之告曰公居喪未嘗見他客乃曰某崔家宗門子弟又知尊夫人有卜遠之日願一見公公聞之延入與語直云知公居縉紳間清且約太夫人喪事所須不能無費某以辱孫姪之行又且資用稍給願以錢三百萬濟公大事蠡見其慷慨深奇之但嘉納其意終却而不受此人調舉久不第亦頗有屈聲蠡未幾服闕拜尚書右丞知禮部貢舉此人就試蠡第之為狀元衆頗驚異謂蠡之主文以公道取士崔之獻藝由善價成名一第則可矣首冠未為得以是人有詰於蠡者答曰崔某固是及第人但狀頭是某私恩所致耳具以前事告之於是中外始服名益重焉出芝田録盧肇李德裕抑退浮薄獎拔孤寒於時朝貴朋黨德裕破之由是結怨而絶於附會門無賓客唯進士盧肇宜春人有奇才德裕嘗左宦宜陽肇投以文卷由此見知後隨計京師每謁見待以優禮舊例禮部放榜先呈宰相會昌三年王起知舉問德裕所欲答曰安用問所欲為如盧肇丁稜姚鵠豈可不與及第邪起於是依其次而放出玉泉子丁稜盧肇丁稜之及第也先是放榜訖則須謁宰相其導啓詞語一出榜元者俯仰疾徐尤宜精審時肇首冠有故不至次乃稜也稜口吃又形體小陋逮引見即俯而致詞意本言稜等登科而稜頳然發汗鞠躬移時乃曰稜等登稜等登竟不能發其後語而罷左右皆笑翌日有人戲之曰聞君善箏可得聞乎稜曰無之友人曰昨日聞稜等登稜等登非箏聲邪出玉泉子顧非熊況之子滑稽好辨凌轢氣焰子弟為衆所怒非熊既為所排在舉場垂三十年屈聲聒人耳會昌中陳商放袎上怪無非熊名召有司追榜放及第時天下寒進皆知勸矣詩人劉得仁賀詩曰愚為童稚時已解念君詩及得高科晚須逢聖主知出托言李德裕李德裕以己非由科第恆嫉進士舉者及居相位貴耍束子德裕嘗為藩府從事日同院李評事以詞科進適與德裕官同時有舉子投文軸誤與德裕舉子既誤復請之曰某文軸當與及第李評事非與公也由是德裕志在排斥出玉泉子張濆張濆會昌五年陳商下狀元及第翰林覆落濆等八人趙胃南貽濆詩曰莫向春風訴酒杯謫仙真箇是仙才猶堪與世為祥瑞曾到蓬山頂上來出托言宣宗宣宗酷好進士及第每對朝臣問及第苟有科名對者必大喜便問所試詩賦題目拜主司姓名或有人物稍好者偶不中第嘆惜移時常於內自題鄉貢進士李道龍出盧氏雜説盧渥唐陝州廉使盧渥在舉場甚有時稱曾於滻水逆旅遇宣宗皇帝微行意其貴人斂身回避帝揖與相見乃自稱進士盧渥帝請詩卷袖之乘騾而去他日對宰臣語及盧渥令主司擢第渥不自安恐僭冒之辱宰相問渥與主上有何階緣渥乃具陳因由時亦不以為忝蓋事業亦得之矣渥後自廉察入朝知舉遇黃寇犯闕不及終場趙崇大夫戲之曰出腹不生養主司也然盧家未嘗知舉盧相攜恥之拔為主文章不果也出北夢瑣言劉蛻荊南解比號天荒大中四年劉蛻以是府解及第時崔鉉作鎮以破天荒錢七十萬資蛻蛻謝書略曰五十年來自是人廢一千里外豈曰天荒出托言苗台符張讀苗台符六歲能屬文聰悟無比十餘歲博覽群籍著皇心三十卷年十六及第張讀亦幼擅詞賦年十八及第同年進士又同佐鄭薰少師宣州幕二人常列題於西明寺東廊或竊注之曰一雙前進士兩個阿孩兒台符十七不祿讀位至禮部侍郎出托言許道敏許道敏隨鄉薦之初獲知於時相是冬主文者將蒞事於貢院謁於相門相大稱其卓苦藝學宜在公選主文受命而去許潛知其旨則磨礪以須屈指試期大挂人口俄有張希復員外結婚於丞相奇章公之門親迎之夕辟道敏為儐道敏乘其喜氣縱酒飛章搖珮高談極歡而罷無何時相敷奏不稱旨移秩他郡人情恐異主文不敢第於甲乙自此晦昧壈坎不復振舉繼丁家故乖二十載至大中六年崔璵知舉方擢於上科時有同年張讀一舉成事年十有九乃道敏敗於垂成之冬儐導張希復之子牛夫人所生也出唐闕史崔殷夢宗人瑤門生也夷門節度使龜從之子同年首冠於壤明鈔本壤作瓌下同壤白瑤曰夫一名男子飾身世以為美他不可以等將也近歲關試內多以假為名求適他處甚無謂也今乞侍郎不可循其舊轍瑤大以為然一日壤等率集同年詣瑤起居既坐瑤笑謂壤等曰昨得大梁相公書且欲崔先輩一到駿馬健僕往復當不至稽滯幸諸先輩留意壤以坐主之命無如之何出玉泉子顏摽鄭侍郎薰主文舉人中有顏摽者薰誤謂是魯公之後時徐方未寧志在激勸忠烈即以摽為狀元及謝恩日從容問及廟院摽曰摽寒進也未嘗有廟院薰始大悟塞默而已尋為無名子所嘲曰主司頭腦太冬烘錯認顏摽作魯公出托言溫庭筠溫庭筠燈燭下未嘗起草但籠袖憑几每賦一韻一吟而已故場中號為溫八吟出托言盧彖崔沆及第年為主罰録事同年盧彖俯近關宴堅請假往洛下拜慶既而淹緩久之及同年宴於曲江亭子彖以雕幰載妓微服嚲鞚縱觀於側遽為團司所發沆判之略曰深攙席帽密映氈車紫陌尋春便隔同年之面青雲得路可知異日之心出托言翁彥樞蘇州人應進士舉有僧與彥樞同鄉里出入故相國裴公垣玉泉子垣作坦下同門下以其年耄優惜之雖中門內亦不禁其出入手持貫珠閉目以誦佛經非寢食未嘗輟也垣主文柄入貢院子勛質日議榜於私室僧多處其間二子不之虞也其擬議名氏逮與奪進退僧悉熟之矣歸寺而彥樞訪焉僧問彥樞將來得失之耗彥樞具對以無有成遂狀僧曰公成名須第幾人彥樞謂僧戲己答曰第八人足矣即復往裴氏之家二子所議如初僧忽張目謂之曰侍郎知舉邪郎君知舉邪夫科第國家重事朝廷委之侍郎意者欲侍郎剗革前弊孤貧貧原作平據明鈔本改得路今之與奪率由郎君侍郎寧偶人邪且郎君所與者不過權豪子弟未嘗以一貧貧原作平據明鈔本改人藝士議之郎君可乎即屈其指自首及末不差一人其豪族私讎曲折畢中二子所諱勛等大懼即問僧所欲且以金帛啖之僧曰貧僧老矣何用金帛為有鄉人翁彥樞者徒要及第耳勛等曰即列在丙科僧曰非第八人不可也勳不得已許之僧曰與貧僧一文書來彥樞其年及第意如其言出玉泉子劉虛白劉虛白與裴垣早同硯席垣主文虛白猶是舉子試雜文日簾前獻一絶句云二十年前此夜中一般燈燭一般風不知歲月能多少猶著麻衣侍至公孟棨年長於魏公放榜日棨出行曲謝沆泣曰先輩吾師也沆泣棨亦泣棨出入場籍三十年長孫藉與張公舊交公兄呼藉公嘗諷其改圖藉曰朝聞道夕死可矣出托言封定卿大中後進士尤盛封定卿丁茂圭舉子與其交者必先登第而二公各二十舉方成名何進退之相懸也先是李都崔雍孫瑝鄭嵎四君子蒙其眄睞者因是進升故曰欲得命通問瑝嵎都雍出北夢瑣言馮藻唐馮藻常侍宿之子涓之叔父世有科名藻文彩不高酷愛名第已十五舉有相識道士謂曰某曾入靜觀之此生無名第但有官職也亦未之信更應十舉已二十五舉矣姻親勸令罷舉且謀官藻曰譬如一生無成更誓五舉無成遂三十舉方就仕宦歷卿監峽牧終於騎省出北夢瑣言趙琮趙琮妻父為鍾陵大將琮以久隨計不第窮悴甚妻族益相薄雖妻父母不能不然也一日軍中高會州郡謂謂原作請據玉泉子改之春設者大將家相率列棚以觀之其妻雖貧不能無往然所服故弊衆以帷隔絶之設方酣廉使忽馳吏呼將將驚且懼既至廉使臨軒手持一書笑曰趙琮得非君子壻乎曰然乃告之適報至已及第矣即授所持書乃榜也將遽以榜奔歸呼曰趙郎及第矣妻之族即撤去帷障相與同席競以簪服而慶遺焉出玉泉子
