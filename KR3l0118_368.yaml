body:
  text: 雜器用陽城縣吏魏景初中陽城縣吏家有怪無故聞拍手相呼伺無所見其母夜作倦就枕寢息有頃復聞灶下有呼曰文約何以不見頭下應曰我見枕不能往汝可就我至明乃飯鍤也即聚燒之怪遂絶桓玄東晉桓玄時朱雀門下忽有兩小兒通身如墨相和作芒籠歌路邊小兒從而和之數十人歌云芒籠茵繩縛腹車無軸倚孤木聲甚哀楚聽者忘歸日既夕二小兒還入建康縣至閣下遂成一雙漆鼓槌鼓吏列云槌積久比恆失之而復得不意作人也明年春而桓玄敗言車無軸倚孤木桓字也荊州送玄首用敗籠茵包裹之又以芒繩束縛其尸沉諸江中悉如童謠所言爾徐氏婢東海徐氏婢蘭晉義熙中忽患病而拂拭異常共伺察之見掃帚從壁角來趨婢床乃取而焚之江淮婦人江淮有婦人為性多欲存想不舍日夜常醉旦起見屋后二少童甚鮮潔如宮小吏者婦因欲抱持忽成掃帚取而焚之劉玄宋中山劉玄居越城日暮忽見一著烏褲褶來取火面首無七孔面莽黨然乃請師筮之師曰此是家先代時物久則為魅殺人及其未有眼目可早除之劉因執縛刀斷數下乃變為一枕此乃是祖父時枕也遊先朝廣平遊先朝喪其妻見一人著赤褲褶知是魅乃以刀斫之良久乃是己常著履也居延部落主周靜帝初居延部落主勃都骨低凌暴奢逸好樂居處甚盛忽有人數十至門一人先投刺曰省名部落主成多受因趨入骨低問曰何故省名部落多受曰某等數人各殊名字皆不別造有姓馬者姓皮者姓鹿者姓熊者姓獐者姓衛者姓班者然皆名受唯某帥名多受耳骨低曰君等悉似伶官有何所解多受曰曉弄碗珠性不愛俗言皆經義骨低大喜曰目所未睹有一優即前曰某等肚飢臘臘怡怡皮漫繞身三匝主人食若不充開口終當不舍骨低悅更命加食一人曰某請弄大小相成終始相生于是長人吞短人肥人吞瘦人相吞殘兩人長者又曰請作終始相生耳于是吐下一人吐者又吐一人遞相吐出人數復足骨低甚驚因重賜繼遣之明日又至戲弄如初連翩半月骨低頗煩不能設食諸伶皆怒曰主人當以某等為幻術請借郎君娘子試之于是持骨低兒女弟妹甥侄妻妾等吞之于腹中腹中皆啼呼請命骨低惶怖降階頓首哀乞親屬伶者皆笑曰此無傷不足憂即吐出之親屬完全如初骨低深怒欲用釁殺之因令密訪之見至一古宅基而滅骨低令掘之深數尺于瓦礫下得一大木檻中有皮袋數千檻旁有谷麥觸即為灰檻中得竹簡書文字磨滅不可識唯隱隱似有三數字若是陵字骨低知是諸袋為怪欲舉出焚之諸袋因號呼檻中曰某等無命尋合化滅緣李都尉留水銀在此故得且存某等即都尉李少卿般糧袋屋崩平壓綿歷歲月今已有命見為居延山神收作伶人伏乞存情于神不相殘毀自此不敢復擾高居矣骨低利其水銀盡焚諸袋無不為冤楚聲血流漂灑焚訖骨低房廊戶牖悉為冤痛之音如焚袋時月余日不止其年骨低舉家病死周歲無復孑遺水銀后亦失所在僧太瓊唐上都僧太瓊者能講仁王經開元初講于奉先縣京遙村遂止村寺經兩夏于一日持鉢將上堂闔門之次有物墜簷前時天才辨色僧就視之乃一初生兒其襁裼甚新僧驚異遂袖之將乞村人行五六里覺袖中輕探之乃一敝帚也清江郡叟唐開元中清江郡叟常牧牛于郡南田間忽聞有異聲自地中發叟與牧童數輩俱驚走辟易自是叟病熱且甚僅旬余病少愈夢一丈夫衣青襦顧謂叟曰遷我于開元觀叟驚而寤然不知其旨后數日又適野復聞之即以其事白于郡守封君怒曰豈非昏而妄乎叱遣之是夕叟又夢衣青襦者告曰吾委迹于地下久矣汝速出我不然得疾叟大懼及曉與其子偕往郡南即鑿其地約丈余得一鐘色青乃向所夢丈夫色衣也遂再白于郡守郡守置于開元觀是日辰時不擊忽自鳴聲極震響清江之人俱異而驚歎郡守因其事上聞玄宗詔宰臣林甫寫其鐘樣告示天下韋訓唐京兆韋訓暇日于其家學中讀金剛經忽見門外緋裙婦人長三丈逾牆而入遙捉其家先生為捽發曳下地又以手捉訓訓以手抱金剛經遮身倉卒得免先生被曳至一家人隨而呼之乃免其鬼走入大糞堆中先生遍身已藍靛色舌出長尺余家人扶至學中久之方蘇率村人掘糞堆中深數尺乃得一緋裙白衫破帛新婦子焚于五達衢其怪遂絶焉盧贊善盧贊善家有一瓷新婦子經數載其妻戲謂曰與君為妾盧因爾惘惘恆見一婦人臥于帳中積久意是瓷人為祟送往寺中供養有童人曉于殿中掃地見一婦人問其由來云是盧贊善妾為大婦所妒送來在此其后見盧家人至因言見妾事贊善窮核本末所見服色是瓷人遂命擊碎心頭有血大如雞子柳崇越州兵曹柳崇忽瘍生于頭呻吟不可忍于是召術士夜觀之云有一婦女緑裙問之不應在君窗下急除之崇訪窗下止見一瓷妓女極端正緑瓷為飾遂于鐵臼搗碎而焚之瘡遂愈南中行者南中有僧院院內有九子母象裝塑甚奇嘗有一行者年少給事諸僧不數年其人漸甚羸瘠神思恍惚諸僧頗怪之有一僧見此行者至夜入九子母堂寢宿徐見一美婦人至晚引同寢已近一年矣僧知塑象為怪即壞之自是不復更見行者亦愈即落發為沙門曲秀才道士葉法善精于符菉之術上纍拜為鴻臚卿優禮特厚法善居玄真觀常有朝客十余人詣之解帶淹留滿坐思酒忽有人扣門云曲秀才法善令人謂之曰方有朝寮無暇晤語幸吾子異日見臨也語未畢有一措大傲睨直入年二十許肥白可觀笑揖諸公居于末席抗聲談論援引今古一坐不測衆聳觀之良久暫起如風旋轉法善謂諸公曰此子突入詞辨如此豈非妖魅為眩惑乎試與諸公取劍備之曲生復至扼腕抵掌論難鋒起勢不可當法善密以小劍擊之隨手喪元墜于階下化為瓶蓋一坐驚懾惶遽視其處所乃盈瓶醲醞也咸大笑飲之其味甚佳坐客醉而撫其瓶曰曲生曲生風味不可忘也虢國夫人長安有一貧僧衣甚襤褸賣一小猿會人言可以馳使虢國夫人聞之遽命僧至宅僧既至夫人見之問其由僧曰本住西蜀居山二十余年偶群猿過遺下此小猿憐憫收養才半載以來此小猿識人意又會人言語隨指顧無不應人使用實不異一弟子耳僧今昨至城郭資用頗乏無計保借得此小猿故鬻之于市夫人曰今與僧束帛可留此猿我當養之僧乃感謝留猿而去其小猿旦夕在夫人左右夫人甚愛憐之后半載楊貴妃遺夫人芝草夫人喚小猿令看玩小猿對夫人面前倒地化為一小兒容貌端妍年可十四五夫人甚怪呵而問之小兒曰我本姓袁賣我僧昔在蜀山中我偶隨父入山采藥居林下三年我父常以藥苗啖我忽一日自不覺變身為猿我父懼而棄我所以被此僧收養而至于夫人宅我雖前日口不能言我心中之事略不遺忘也自受恩育甚欲述懷抱于夫人恨不能言每至深夜唯自泣下今不期卻變人身即不測尊意如何夫人奇之遂命衣以錦衣侍從隨后常祕密其事又三年小兒容貌甚美貴妃曾屢顧之復恐人見奪因不令出別安于小室小兒唯嗜藥物夫人以侍婢常供飼藥食忽一日小兒與此侍婢俱化為猿夫人怪異令人射殺之其小兒乃木人耳
