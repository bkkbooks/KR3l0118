body:
  text: 馬燧馬燧李懷光使徐庭光以精卒六千守長春宮馬燧乃挺身至城下呼庭光庭光則拜於城下燧度庭光心已屈乃謂曰我來自朝廷可西面受命庭光復西拜燧曰公等皆祿山已來首建大勳四十餘年功伐最高奈何棄祖父之勳力為族滅之計耶從吾言非止免罪富貴可圖也賊徒皆不對燧曰爾以吾言不誠今相去數步爾當射我乃披襟示之庭光感泣俯伏軍士亦泣乃率其下出降燧乃以數騎徑入城處之不疑莫不畏伏衆大呼曰復得為王人矣渾瑊私謂參佐曰瑊為馬公用兵與僕不相遠但怪纍敗田悅今覩其行師料敵不及及原作遠據明鈔本改遠矣燧勇力智彊常先計後戰將戰親自號令士卒無不感動戰皆決死未嘗奔北兵勝冠於一時然力能擒田悅而不能納蕃師僞疑明鈔本納作審師作帥疑作款而保其必盟平涼之會為結贊所紿關中搖動此所謂才有餘而心不正明鈔本正作至出談賓録嚴振德宗鑾駕之幸梁洋中書舍人齊映為之御下洋州青源川見旌期蔽野上心方駭謂泚兵有諳疾路者透秦嶺而要焉俄見梁帥嚴振具橐鞬拜御馬前具言君臣亂離嗚咽流涕上大喜口敕升獎令振上馬前去與朕作主人映身本短小聲氣抑揚乃曰嚴振合與至尊導馬御膳自有所司頃之上次洋州行在召映責以儒生不達時變煙塵時須姑息戎帥映伏奏曰山南士庶只知有嚴振不知有陛下今者天威親臨令巴蜀士民知天子之尊亦足以盡振為臣子之節上深嘉歎振聞特拜謝映時議許映出乾𦠆子溫造憲宗之代戎羯亂華四方徵師以靜邊患詔下南梁起甲士五千人令赴關下將起帥人作叛逐其帥又懼朝廷討伐因團集拒命者歲餘憲宗深以為患擇帥者久之京兆尹溫造請行憲宗問其兵儲所費溫曰不請寸兵尺刃而行至其界梁人覘其所來來原作求據明鈔本改止一儒生皆相賀曰朝廷必不問其罪復何患乎溫但宣詔敕安存至則一無所問然梁帥負過出入者皆不捨器仗溫亦不械之他日毬場中設樂明鈔本樂作宴三軍下士明鈔本士作令並任執帶弓箭赴之遂令於長廊之下就食坐筵之前臨階南北兩行懸懸字原闕據明鈔本補長索兩條令軍人各於面前索上掛其弓劍而食逡巡行酒至鼓噪一聲兩頭齊抨其索則弓劍去地三丈餘矣軍人大亂無以施其勇然後闔戶而斬之五千餘人更無噍類其間有百姓隨親情及替人有赴設來者甚多並玉石一概矣南梁人自爾纍世不敢復叛余二十年前職於斯故老尚歷歷而記之矣出王氏見聞高駢咸通中南蠻圍西川朝廷命太尉高駢自天平軍移鎮成都戎車未屆乃先以帛書軍號其上仍書一符於郵亭遞之以壯軍聲蠻酋懲交址之敗望風而遁先是府無羅郭南寇才至遽成煨燼士民無久安之計駢窺之畫地圖版築焉慮畚插將施亭堠有警乃命門僧景仙奉使入南詔宣言躬自巡邊自下手築城日舉烽直至大渡河凡九十三日樓櫓矗然旌旆竟不行而驃信讋慓不假兵以詐勝斯之謂也出北夢瑣言南蠻唐南蠻侵軼西川苦無亭障自咸通已後劍南苦之牛叢尚書作鎮為蠻寇憑凌無以抗拒高駢自東平移鎮成都蠻猶擾擾原作傳據明鈔本改蜀城駢先選驍鋭救急人人背神符一道蠻覘知之望風而遁爾後僖宗幸蜀深疑作梗乃許降公主蠻王以連姻大國喜幸逾常因命宰相趙隆眉楊奇鯤段義宗來朝行在且迎公主高太尉自淮海飛章云南蠻心膂唯此數人請止而鴆之迄僖宗還京南方無虞用高公之策也楊奇鯤輩皆有詞藻途中詩云風裏浪花吹又白雨中風影洗還清江鷗聚處窗前見林狖啼時枕上聽詞甚清美出北夢瑣言張濬張相濬富於權略素不知兵昭宗朝親統扈駕六師往討太原遂至失律陷其副帥侍郎孫揆尋謀班師路由平陽平陽即蒲之屬郡也牧守姓張即蒲帥王珂之大校珂變詐難測復慮軍旅經過落其詭計濬乃先數程而行泊於平陽之傳舍六軍相次由陰地關而進濬深忌晉牧復不敢除之張於一舍郊迎既駐郵亭濬令張使君升廳茶酒設食畢復命茶酒不令暫起仍留晚食食訖已晡時又不令起即更茶數甌至張燈乃許辭去自旦及暮不交一言口中咀少物遙觀一如交談之狀珂性多疑動有警察時偵事者尋已密報之云敕史與相國密話竟夕珂果疑召張問之曰相國與爾自旦至暮所話何對云並不交言王殊不信謂其不誠戮之六師乃假途歸京了無纖慮後判邦計諸道各執紈綺之類並不受之乃命專人面付之曰爾述吾意以此物改充軍行所費之物鍋幕布槽啖馬藥土産所共之物咸請備之於是諸藩鎮欣然奉之以至軍行十萬所要無闕皆心匠之所規畫梁祖忌之潛令刺客殺之於長水莊上出玉堂閒話劉鄩後唐晉王之入魏博也梁將劉鄩先屯洹水寂若無人因令覘之云城上有旗幟來往晉王曰劉鄩多計未可輕進更令審探乃縛芻為人縛旗於上以驢負之循堞而行故旗幟嬰城不息問城中羸者曰軍已去二日矣果趨黃澤欲寇太原以霖潦不克進計謀如是出北夢瑣言張勍僞蜀先主王建始攻圍成都三年未下其紀綱之僕有無賴輕生勇悍者百輩人莫敵也建嘗以美言啖之曰西川號為錦花城一旦收剋玉帛子女恣我兒輩快活也他日陳敬瑄田令孜以城降翌日赴府預戒驕暴諸子曰我與爾纍年戰鬥出死入生來日便是我一家也入城以後但管富貴即不得恣橫我適來差張勍作斬斫馬步使責辦於渠女輩不得輒犯若把到我面前足可矜恕或被當下斬却非我能救諸子聞戒各務戢斂然張勍胸上打人堆疊通衢莫有敢犯識者以建能戒能惜不陷人於刑仁恕之比也出北夢瑣言王建邛黎之間有淺蠻焉世襲王號曰劉王楊王郝王歲支西川衣賜三千分俾其偵雲南動靜雲南亦資其覘成都盈虛持兩端而求利也每元戎下車即率界上酋長詣府庭號曰參元戎上聞自謂威惠所致其未參間潛稟於都押衙且俟可否或元戎慰撫大將間稍至乖方即教甚紛紜時帥臣多是文儒不欲生事以是都押賴之亦要姑息蠻蛋憑凌苦無亭障抑此之由也王建始鎮蜀絶其舊賜斬都押衙山行章以令之邛峽之南不立一堠不戍一卒十年不敢犯境末年命大將許存征蠻為三王泄漏軍機於是召三王而斬之時號因斷也昔日之患三王非不知也時不利也故曰有非常之功許公之謂也先是唐咸通中有天竺三藏僧經過成都曉五天胡胡原作湖據明鈔本改語通大小乘經律論以北天竺與雲南接境欲假途而還為蜀察事者識之縶於成都府具得所記朝廷次第文字蓋曾入內道場也是知外國來廷者安知非奸細乎出北夢瑣言魏太祖魏武少時嘗為袁紹好為游俠觀人新婚因潛入主人園中夜叫呼云有偷兒至廬中人皆出觀帝乃抽刃劫新婦與紹還出失道墜枳棘中紹不能動帝復大叫偷兒今在此紹惶迫自擲出俱免魏武又嘗云人欲危己己輒心動因語所親小人曰汝懷刃密來我心必動便戮汝汝但勿言當後相報侍者信焉遂斬之謀逆者挫氣矣又袁紹年少時曾夜遣人以劍擲魏武少下不著帝揆其後來必高因帖臥床上劍果高魏武又云我眠中不可妄近近輒斫人亦不自覺左右宜慎之後乃佯凍所幸小人竊以被覆之因便斫殺自爾莫敢近之出小說村婦昭宗為梁主劫遷之後岐鳳岐鳳原作峻奉據明鈔本改諸州備蓄甲兵甚衆恣其劫掠以自給成州有僻遠村墅巨有積貨主將遣二十餘騎夜掠之既倉卒至罔敢支吾其丈夫並囚縛之罄搜其貨囊而貯之然後烹豕犬遣其婦女羞饌恣其飲噉其家嘗收莨菪子其婦女多取之熬搗一如辣末置於食味中然後飲以濁醪於時藥作竟於腰下拔劍掘地曰馬入地下去也或欲入火投淵顛而後仆於是婦女解去良人執縛徐取騎士劍一一斷其頸而瘞之其馬使人逐官路箠而遣之罔有知者後地土改易方泄其事出玉堂閒話
