body:
  text: 張無頗張無頗長慶中進士張無頗居南康將赴舉遊丐番禺值府帥改移投詣無所愁疾臥于逆旅僕從皆逃忽遇善易者袁大娘來主人舍瞪視無頗曰子豈久窮悴耶遂脫衣買酒而飲之曰君窘厄如是能取某一計不旬朔自當富贍兼獲延齡無頗曰某困餓如是敢不受教大娘曰某有玉龍膏一合子不惟還魂起死因此永遇名姝但立一表白曰能治業疾若常人求醫但言不可治若遇異人請之必須持此藥而一往自能富貴耳無頗拜謝受藥以暖金合盛之曰寒時但出此合則一室暄熱不假爐炭矣無頗依其言立表數日果有黃衣若宦者扣門甚急曰廣利王知君有膏故使召見無頗志大娘之言遂從使者而往江畔有畫舸登之甚輕疾食頃忽覩城宇極峻守衛甚嚴宦者引無頗入十數重門至殿庭多列美女服飾甚鮮卓然侍立宦者趨而言曰召張無頗至遂聞殿上使軸簾見一丈夫衣王者之衣戴遠遊冠二紫衣侍女扶立而臨砌招無頗曰請不拜王曰知秀才非南越人不相統攝幸勿展禮無頗強拜王罄折而謝曰寡人薄德遠邀大賢蓋緣愛女有疾一心鍾念知君有神膏儻獲痊平實所愧戴遂令阿監二人引入貴主院無頗又經數重戶至一小殿廊宇皆綴明璣翠璫楹楣煥耀若布金鈿異香氳鬱滿其庭戶俄有二女褰簾召無頗入覩真珠繡帳中有一女子才及笄年衣翠羅縷金之襦無頗切其脈良久曰貴主所疾是心之所苦遂出龍膏以酒吞之立愈貴主遂抽翠玉雙鸞篦而遺無頗目成者久之無頗不敢受貴主曰此不足酬君子但表其情耳然王當有獻遺無頗愧謝阿監遂引之見王王出駭雞犀翡翠碗麗玉明瑰而贈無頗無頗拜謝宦者復引送于畫舸歸番禺主人莫能覺才貨其犀已巨萬矣無頗覩貴主華艷動人頗思之月餘忽有青衣扣門而送紅箋有詩二首莫題姓字無頗捧之青衣倏忽不見無頗曰此必仙女所制也詞曰羞解明璫尋漢渚但憑春夢訪天涯紅樓日暮鶯飛去愁殺深宮落砌花又曰燕語春泥墮錦筵情愁無意整花鈿寒閨欹枕不成夢香炷金爐自裊煙頃之前時宦者又至謂曰王令復召貴主有疾如初無頗欣然復往見貴主復切脈次左右云王后至無頗降階聞環之響宮人侍衛羅列見一女子可三十許服飾如后妃無頗拜之后曰再勞賢哲實所懷慚然女子所疾又是何苦無頗曰前所疾耳心有擊觸而復作焉若再餌藥當去根幹耳后曰藥何在無頗進藥合后覩之默然色不樂慰喻貴主而去后遂白王曰愛女非疾私其無頗矣不然者何以宮中暖金合得在斯人處耶王愀然良久曰復為賈充女耶吾亦當繼其事而成之無使久苦也無頗出王命延之別館豐厚宴犒後王召之曰寡人竊慕君子之為人輒欲以愛女奉託如何無頗再拜辭謝心喜不自勝遂命有司擇吉日具禮待之王與后敬仰愈於諸壻遂止月餘歡宴俱極王曰張郎不同諸壻須歸人間昨夜檢於幽府云當是冥數即寡人之女不至苦矣番禺地近恐為時人所怪南康又遠況別封疆不如歸韶陽甚便無頗曰某意亦欲如此遂具舟楫服飾異珍金珠寶玉無頗曰唯侍衛輩即須自置無使陰人此減算耳遂與王別曰三年即一到彼無言於人無頗挈家居於韶陽人罕知者住月餘忽袁大娘扣門見無頗無頗大驚大娘曰張郎今日賽口及小娘子酬媒人可矣二人各具珍寶賞之然後告去無頗詰妻妻曰此袁天綱女程先生妻也暖金合即某宮中寶也後每三歲廣利王必夜至張室後無頗為人疑訝於是去之不知所適王錡天興丞王錡寶曆中嘗遊隴州道憩于大樹下解鞍籍地而寢忽聞道騎傳呼自西來見紫衣乘車從數騎敕左右曰屈王丞來引錡至則帳幄陳設已具與錡坐語良久錡不知所呼每承言即徘徊鹵莽紫衣覺之乃曰某潦倒一任二十年足下要相呼亦可謂為王耳錡曰未諭大王何所自曰恬昔為秦築長城以此微功屢蒙重任洎始皇帝晏駕某為群小所構橫被誅夷上帝仍以長城之役勞功害民配守吳嶽當時吳山有嶽號衆咸謂某為王其後嶽職却歸於華山某罰配年月未滿官曹移便無所主管但守空山人迹所稀寂寞頗甚又緣已被虛名不能下就小職遂至今空竊假王之號偶此相遇思少從容錡曰某名迹幽沉質性孱懦幸蒙一顧之惠不知何以奉教恬曰本緣奉慕顧展風儀何幸遽垂厚意誠有事則又如何錡曰幸甚恬曰久間散思有以效用如今士馬處處有主不可奪他權柄此後三年興元當有八百人無主健兒若早圖謀必可將領所必奉託者可致紙錢萬張某以此藉手方諧矣錡許諾而寤流汗霢霂乃市紙萬張以焚之乃太和四年興元節度使李絳遇害後節度使溫造誅其凶黨八百人馬朝馬朝者天平軍步卒也太和初滄州李同捷叛詔鄆師討之朝在是行至平原南與賊相持纍旬朝之子士俊自鄆餽食適至軍中會戰有期朝年老啓其將曰長男士俊年少有力又善弓矢來日之行乞請自代主將許之乃戰鄆師小北而士俊連中重瘡仆於鬥場夜久得蘇忽有傳呼語言頗類將吏十數人者且無燭士俊窺之不見但聞按據簿書稱點姓名俄次士俊則呼馬朝傍有人曰不是本身速令追召言旋遂過及遠猶聞其檢閲未已士俊惶惑力起徐歸四更方至營門營吏納之因扶持送至朝所朝謂其已死及見驚喜即洗瘡傅藥乃曰汝可飲少酒粥以求寢也即出汲水時營中士馬極衆每三二百人則同一井井乃周圓百步皆為隧道漸以及泉蓋使衆人得以環汲也時朝以罌缶汲水引重之際泥滑顛仆於地地中素有折刀朝心正貫其刃久而士俊懼其未回告於同幕者及到則已絶矣士俊旬日乃愈郤元位河東衙將郤元位者太和初常奉使京輦行至沙苑會日暮見一人長丈餘衣紫佩金容狀豐偉御白馬其馬亦高丈餘導從近十輩形狀非常執弧矢自南來元位甚驚異立馬避之神人忽舉鞭西指若有所見其導從輩俱隨指而望元位亦西望寂然無覩及回視之皆不見矣元位瘁然汗發髀戰心驚不覺墮馬因病熱肩輿以歸旬餘方愈時河東連帥司空李願卒夏陽趙尉馮翊之屬縣夏陽據大河縣東有池館當太華中條煙靄嵐霏昏旦在望又有瀵泉穴其南泉水清徹毫縷無隱太和中有趙生者尉于夏陽嘗一夕雨霽趙生與友數輩聯步望月於瀵泉上忽見一人貌甚黑被緑袍自水中流沿泳久之吟曰夜月明皎皎緑波空悠悠趙生方驚其人忽回望水濱若有所懼遂入水惟露其首有頃亦沒趙生明日又至泉所是岸傍數十步有神祠表共門曰瀵水神趙生因入廟見神坐之左右搏埴為偶人被緑袍者視其貌若前時所見水中人也趙生曰此瀵壤也尚能惑衆非怪而何將用剗其廟有縣吏曰此神廟且能以風雨助生植苟若毀其屋適足為邑人之患於是不果隳盧嗣宗蒲津有舜祠又有娥皇女英祠在舜祠之側土偶之容頗盡巧麗開成中范陽盧嗣宗假職於蒲津一日與其友數輩同遊舜廟至娥皇女英祠嗣宗戲曰吾願為帝子之隸可乎再拜而祝者久之衆皆謂曰何侮易之言黷於神乎嗣宗笑益酣自是往往獨遊娥皇祠酒酣多為褻黷語俄被疾肩舁以歸色悸而戰身汗如瀝其夕遂卒家僮輩見十餘人捽拽嗣宗出門望舜祠而去及視嗣宗尸其背有赤文甚多若為所撲蒲之人咸異其事三史王生有王生者不記其名業三史博覽甚精性好誇炫語甚容易每辨古昔多以臆斷旁有議者必大言折之嘗遊沛因醉入高祖廟顧其神座笑而言曰提三尺劍滅暴秦翦強楚而不能免其母烏老之稱徒歌大風起兮雲飛揚曷能威加四海哉徘徊庭廡間肆目久之乃還所止是夕才寐而卒見十數騎擒至廟庭漢祖按劍大怒曰史籍未覽數紙而敢褻瀆尊神烏老之言出自何典若無所據爾罪難逃王生頓首曰臣常覽大王本紀見司馬遷及班固云母劉媼而注云烏老反釋云老母之稱也見之於史聞之於師載之於籍炳然明如白日非臣下敢出於胸襟爾漢祖益怒曰朕中外泗水亭長碑昭然具載矣曷以外族溫氏而妄稱烏老乎讀錯本書且不見義敢恃酒喧於殿庭付所司劾犯上之罪語未終而西南有清道者揚言太公來方及階顧王生曰斯何人而見辱之甚也漢祖降階對曰此虛妄侮慢之人也罪當斬之王生逞目太公遂厲聲而言曰臣覽史籍見侮慢其君親者尚無所貶而賤臣戲語於神廟豈期肆於市朝哉漢祖又怒曰在典册豈載侮慢君親者當試徵之王生曰臣敢徵大王可乎漢祖曰然王生曰王即位會群臣置酒前殿獻太上皇壽有之乎漢祖曰有之既獻壽乃曰大人常以臣無賴不事産業不如仲力今某之業孰與仲多有之乎漢祖曰有之殿上群臣皆呼萬歲大笑為樂有之乎曰有之王生曰是侮慢其君親矣太公曰此人理不可屈宜速逐之不爾必遭杯羹之讓也漢祖默然良久曰斬此物污我三尺刃令搦髮者摑之一摑惘然而蘇東方明矣以鏡視腮有若指蹤數日方滅張生進士張生善鼓琴好讀孟軻書下第遊浦關入舜城日將暮乃排闥聳轡爭進因而馬蹶頃之馬斃生無所投足遂詣廟吏求止一夕吏止簷廡下曰捨此無所詣矣遂止初夜方寢見絳衣者二人前言曰帝召書生生遽往帝問曰業何道藝之人生對曰臣儒家子常習孔孟書帝曰孔聖人也朕知久矣孟是何人得與孔同科而語生曰孟亦傳聖人意也祖尚仁義設禮樂而施教化帝曰著書乎生曰著書七千二百章蓋與孔門之徒難疑答問及魯論齊論俱善言也帝曰記其文乎曰非獨曉其文抑亦深其義帝乃令生朗念傾耳聽之念萬章問舜往於田號位於旻天何為其號泣也孟子曰怨慕也萬章問曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎答曰長息問於公明高曰舜往於田則吾得聞命矣號泣於旻天怨於父母則吾不知也帝止生之詞憮然嘆曰蓋有不知而作之者亦此之謂矣朕捨天下千八百二十載暴秦竊位毒痛四海焚我典籍泯我帝圖蒙蔽群言逞恣私欲百代之後經史差謬辭意相及鄰於詼諧常聞贊唐堯之美曰垂衣裳而天下理蓋明無事也然則平章百姓協和萬邦至於滔天懷山襄陵下民其咨夫如是則與垂衣之義乖矣亦聞贊朕之美曰無為而治乃載於典則云賓四門齊七政類上帝禋六宗望山川遍群神流共工放歡兜殛鯀竄三苗夫如是與無為之道遠矣今又聞泣于旻天怨慕也非朕之所行夫莫之為而為之者天也莫之致而致之者命也朕泣者怨己之命不合於父母而訴於旻天也何萬章之問孟軻不知其對傳聖人之意豈宜如是乎嗟不能已久之謂生曰學琴乎曰嗜之而不善帝乃顧左右取琴曰不聞鼓五絃歌南風奚足以光其歸路乃撫琴以歌之曰南風薰薰兮草芊芊妙有之音兮歸清絃蕩蕩之教兮由自然熙熙之化兮吾道全薰薰兮思何傳歌訖鼓琴為南風弄音韻清暢爽朗心骨生因發言曰妙哉乃遂驚悟
