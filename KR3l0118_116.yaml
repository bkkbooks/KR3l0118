body:
  text: 謝晦謝晦宋尚書謝晦為荊州刺史謂塔寺不宜在人間當移之郭外乃自率部下至新寺門遣隊士八十持刀斧毀壞浮圖尊像縱橫瓦木傾墜俄而雲霧暗天風塵勃起晦冥即怖走隊人驚散莫知所以晦等夜夢咸見沙門飛騰空中光明顯赫又見二人形悉丈餘容姿甚偉厲聲嗔曰所行反道尋當自知其後隊人滿明鈔本滿作史雙二字身著癩疾經時而死餘人並犯法就終謝晦連年患瘠病後因謀叛合家被誅皆非命而卒出辨正論尼智通宋尼智通京師簡靜尼也年貌殊少信道不篤元嘉九年師死罷道嫁為魏郡梁甫妾生一男年七歲家甚貧窮無以為衣智通為尼時有數卷素無量壽法華等經悉練搗之以衣其兒居一年而得病恍惚驚悸肌體壞爛狀若火瘡有細白蟲日去升餘慘痛煩毒晝夜號叫常聞空中語云壞經為衣得此報也旬餘而死出冥祥記王襲之宋吳興太守琅琊王襲之有學問愛老莊而不信佛唯事宰殺初為晉西省郎中性好賓客於內省前養一雙鵝甚愛玩之夜忽夢鵝口口原本作曰據明鈔本改銜一卷經可十紙許取看皆說罪福之事明旦果見乃是佛經因是不敢宰殺篤信過人出辨正論周宗周宗者廣陵郡人也宋元嘉七年隨到彥之北伐王師失利與同邑六人逃竄間行於彭城北遇一空寺無有僧徒中有形像以水晶為相因共竊取之乃出村貸食其一人羸病等輩皆輕之獨不得分與既而各還家三四年中宗等五人相繼病癩而死不得分者獨獲免出冥祥記沈僧復宋吳興沈僧復大明末本土飢荒逐食至山陽晝入村野乞食夜還寄寓寺舍左右時山陽諸小形銅像甚衆僧復與其鄉里數人積漸竊取遂囊篋數四悉滿復因將還家共鑄為錢事既發覺執送出都入船便云見人以火燒之晝夜叫呼自稱楚毒不可忍未及刑坐而死舉體皆拆裂狀如火燒吳郡朱亨親識僧復具見其事出冥祥記僧道志宋沙門僧道志者北多寶僧也嘗為衆僧令知殿塔自竊幡蓋等寶飾所取甚衆後遂偷像眉間珠相既而開穿垣壁若外盜者故僧衆不能覺也積旬餘而得病便見異人以戈矛刺之時來時去輒驚叫應聲流血初猶日中一兩如此其後病甚刺者稍數瘡痍變遍體呻呼不能聲同寺僧衆頗疑其有罪欲為懺謝始問猶諱而不言將盡二三日乃具自陳列泣涕請救曰吾愚悖不通謂無幽途失意作罪招此殃酷生受楚拷死嬰刀鑊已糜之身唯垂哀恕今無復餘物唯衣被氈履或足充一會并頻請願具為懺悔者偷像相珠有二枚一枚已屬嫗人不可復得一以質錢在陳昭家令贖取道志既死諸僧合集贖得相珠并設齊懺初工人復相珠時展轉回趣終不安合衆僧復為禮拜燒香乃得著焉年餘而同學等於昏夜間聞空中有語詳聽即道志聲也自說云自死已來備嬰痛毒方纍年劫未有出期賴蒙衆僧哀憐救護贖像相珠故苦酷之中時有間息感恩無已故暫來稱謝言此而已聞其語時腥腐臭氣苦痛難過言終久之乃稍歇出冥祥記唐文伯宋唐文伯東海贛榆人也弟好蒱博家資都盡村中有寺經過人或以錢上佛弟屢竊取後病癩卜者云祟由盜佛錢父怒曰佛是何神乃令我兒致此吾當試更虜奪若復能病可也前縣令何欣之婦上織成寶蓋帶四枚乃盜取為腰帶不百日復得惡病發瘡之始起腰帶處出冥祥記崔平業梁人崔平業者善弓馬為武士監軍一生以偷佛熔銅為業賣銅以供酒肉心無慚懼年五十妻子兄弟并死業一身忽病目障饑寒并至餓死出辨正論梁人進辨正論注八進作道士王鎮惡有學問而無善心出言多所非毀亦為時人所嫌輕慢佛法見僧必侮誚後以教學為業時有鹿溪寺僧法滿寄銅鐘一口於其學內未取之間鎮惡盜以鑄錢後與僧法滿對誓經年重病而舌彎縮口不得言既知負誓乃舍資鑄鐘贖罪至死口不得言出王氏戒郭祖深梁人郭祖深上梁武一十八條事請廢郭內小寺及無業僧尼梁武不納後夢見神唾之遂病癩雖悔不差出辨正論衛元宗衛元宗毀法之後身著熱風委頓而死出辨正論姜勝生冀州故觀城人姜勝生唐武德末年忽遇惡疾遂入蒙山醫療積年不損後始還家身體瘡爛手足指落夜眠忽夢見一白石像可長三尺許謂之曰但為我續手令爾即差至旦忽憶於武德初年在黍地裏打雀於故村佛室中取維摩經裂破用繫杖頭嚇雀有人見者云盜裂經大罪勝生反更惡罵遂入堂中打白石像右手落夢中所見宛然舊像遂往佛前頭面作禮盡心悔過顧匠續其像手造經四十卷營一精舍一年之內病得痊鄉人號為聖像出冥報記明鈔本作出冥報拾遺記傅奕唐太史令傅奕本太原人隋末徙至扶風少好博學善天文曆數聰辨能劇談自武德貞觀中嘗為太史令性不信佛法每輕僧尼至以石像為磚瓦之用貞觀十四年秋暴病卒初奕與同伴傅仁均薛頤并為太史令頤先負仁均錢五千未償而仁均死後頤夢見仁均言語如平常頤因問曰先所負錢當付誰人仁均曰可以付泥犁人問是誰答曰太史令傅奕是也既而寤是日夜少府監馮長命又夢己在一處多見先亡人長命問經文說罪福之報未知審定有否答曰皆悉有之又問如傅奕者生平不信死受何報答曰罪福定有然傅奕已配越州為泥犁矣出地獄苦記并州人并州有人解畫曾陷北虜突厥可汗遣畫佛像此人時偷彩色恐被搜獲紙裹塞鼻中鼻中血出數升此人後為僧唐貞觀中於山東住寺漸漸患鼻二三年後鼻中生肉甚大如桃膿血狼藉酸疼不已後請僧靈顗懺悔病亦不愈十年始亡靈顗嘗住慈恩寺說其事出廣古今五行記薛孤訓唐貞觀二十年征龜茲有薛孤訓者為行軍倉曹軍及屠龜茲後乃於精舍剝佛面金旬日之間眉毛盡落還至伊州乃於佛前悔過以所得金皆為造功德未幾眉毛復生出冥祥記巂州縣令唐貞觀中有人任巂州一縣令往高昌於寺得一真珠像至京師諸大寺欲與千貫錢買之不肯遂毀破賣得一千三百貫後月餘患腫寤寐之間見一僧云何因毀壞尊像遂遣人拔其舌長尺餘苦痛呻吟數日而死德安縣令薛逵備知此事出冥祥記明鈔本作出廣古今五行記丁零相州鄴城中有丈六銅立像一軀賊丁零者志性凶悖無有信心乃彎弓射像箭中像面血下交流雖加瑩飾血痕猶在又選五百力士令挽仆地消鑄為銅擬充器用乃口發大聲響烈雷震力士亡魂喪膽人皆仆地迷悶宛轉怖不能起由是賊侶慚惶歸信者衆丁零後時著疾被誅乃死出宣驗記唐武宗長安城北有古冢高十數丈傳云周穆王陵也唐會昌六年正月十五日有人夜行至陵下聞人語於林間意其盜也因匿於草莽中伺焉俄有人自空而來朱衣執版宣曰冢尉何在二吏出曰在位因曰録西海君使者何時當至吏曰計程十八日方來朱衣曰何稽對曰李某武宗名坐毀聖教減一紀算當與西海君同日録其魂忽有賈客鈴聲自東來朱衣與二吏俱不復見後數月帝果晏駕帝英毅有斷勤於庶政至如迎貴主以破羌族復內地而殲狡穴武功震耀肅憲之次也然金人之教不可厚誣則秦時焚書坑儒後華山中有告祖龍之死者事不謬矣出傳神録明鈔本作出傳記補録王義逸唐會昌中有王義逸者護鳳翔軍值武宗斥毀佛剎義逸以家財易諸瓦木取其精者遂大營市邸并治其第為岐下之甲焉居三年一日有小吏入告有不便事且泣曰某適方就室假寐有紫衣人招入一朱戶則類將軍之第也見絲竹綺羅賓客列坐滿堂獨無將軍紫衣人指階下一徑曰此路可見公主人因北趨見荊棘滿地其路才可容人步至低屋排戶而入見將軍臥於床上繫其手足有人持火至方爇其髮因出涕而言曰吾不幸生好賈販僧寺材礎以貪其利今縶於此後三日當死君歸為我告其家速毀邸第以歸佛寺不可輒留既而焰熾不能盡言義逸怒而叱之明日果腦發癰三日而卒出傳記附録明鈔本作出傳記補録贅肉釋氏因果時有報應近歲有一男子既貧且賤於上吻忽生一片贅肉如展兩手許大下覆其口形狀醜異殆不可言其人每飢渴則揭贅肉以就飲啜頗甚苦楚或問其所因則曰少年無賴曾在軍伍常於佛寺安下同火共刲一羊分得少肉旁有一佛像上吻間可置之不數日嬰疾遂生此贅肉焉出玉堂閒話西明寺長安城西明寺鐘寇亂之後緇徒流離闃其寺者數年有貧民利其銅袖鎚鏨往竊鑿之日獲一二斤鬻於闤闠如是經年人皆知之官吏不禁後其家忽失所在市銅者亦訝其不來後官欲徙其鐘於別寺見寺鐘平墮在閣上及仆之見盜鐘者抱鎚鏨儼然坐於其間既已乾枯矣出玉堂閒話明相寺鳳州城南有明相寺佛數尊皆飾以金焉亂罹之後有貧民刮金鬻而自給逮至時寧金彩已盡於是遍身生癬癢不可忍常須以物自刮皮盡至肉肉盡至骨而死焉毀佛之咎昭報如此出冥祥記僧義孚青社人解琴寓於江陵龍興寺行止詭譎府主優容之俾齎錢帛詣西川寫藏經或有人偷竊社戶所造藏經出貨義孚以廉價贖之其羡財遂為所有一旦發覺賣經者斃於枯木下此僧雖免罪未久得疾兩唇反引有似驢口其熱痛不可忍也人皆畏見苦楚備極而死同寺有數輩販鬻經像懼而捨財修功德以孚為鑒戒出冥報記明鈔本作出北夢瑣言開照寺盜僞蜀金堂縣三學山開照寺夜群寇入寺劫掠緇徒罄盡寺元有釋迦藕絲袈裟為千載之異物也賊曹分取與其妻拆而易之夫妻當時手指節節墮落鬚鬢俱墜尋事敗戮於市出警戒録僧紹明僞蜀大慈寺賜紫慈昭大師紹明主持文殊閣常教化錢物稱供養菩薩聖像積有星歲所獲太半入己後染病恆見火燒頂至足周而復始不勝其苦悔過懺謝唱施衣竟不獲免出警戒録潼江軍僞蜀潼江起軍攻取閬州兵火燒劫閭里蕩盡佛寺有大鐘在地有一卒運大石擊鐘令碎而鬻之鐘破裂流迸正中卒脛雙折而死出警戒録
