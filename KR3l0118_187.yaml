body:
  text: 宰相宰相凡拜相禮絕班行府縣載沙填路自私第至於子城東街名曰沙堤有服假或問疾百僚就第有司設幕次排班元日冬至立仗大官皆備珂傘列燭有五六百炬謂之火城宰相火城將至則皆撲滅以避宰相判四方之事有都堂處分有司有堂帖下次押名曰花押黃敕既下小異同曰黃帖宰相呼為堂老初百官早朝必立馬建福望僊門外宰相則於光宅車坊以避風雨元和初始置待漏院出國史補上事凡中書門下並於西省上以便禮儀五品以上宰相送上乃並卿參出國史補蘇瓌景龍三年蘇瓌除尚書右僕射時公卿大臣初拜官者例計獻食名曰燒尾瓌因侍內宴將作大匠宗晉卿謂曰拜僕射竟不燒尾豈不善邪帝默然瓌奏曰臣聞宰相者主陰陽助天理物今粒食踊貴百姓不足臣見宿衛兵至有三日不得食者臣愚不稱職所以不敢燒尾出譚賓錄兩省諫議無事不入每遇入省有廚食四孔炙中書舍人時謂宰相判官宰相親嫌不拜知制誥為屧腳又云不由三字直拜中書舍人者謂之撻額裹頭其制誥之本出自王言皆人主所為故漢光武時第五倫為督鑄錢掾見詔書而嘆曰此聖明主也一見決矣近者凡有詔敕皆責成群下褒貶之言哲王所慎凡百具寮王公卿士始褒則謂其珪璋特達善無可加旋有貶黜則比以斗筲下才罪不容責同為一士士原作字據明鈔本改之行固出君上之言愚智生於倏忽是非變於俄傾蓋天子無戲言言之苟失則取尤天下出盧氏雜說獨孤及獨孤及求知制誥試見元載元知其所欲迎謂曰制誥阿誰堪及心知不我與而與他也乃薦李紓時楊炎在閣下忌及之來故元阻之乃二人力也出嘉話錄參酌院長慶初穆宗以刑法為重每大獄有司斷罪又令給事中中書舍人參酌出入之百司呼為參酌院出國史補陽城陽城居夏縣拜諫議大夫鄭錮居閿鄉拜拾遺李周南居曲江拜校書郎時人以轉遠轉高轉近轉卑出國史補呂溫通事舍人宣詔舊命拾遺團句把麻者蓋謁者不知書多失句度故用拾遺低摘聲句以助之及呂溫為拾遺被喚把麻不肯去遂成故事拾遺不把麻者自呂始也時柳宗元戲呂云幸識一文半字何不與他把也出嘉話錄韋絢開成末韋絢自左補闕為起居舍人時文宗稽古尚文多行貞觀開元之事妙選左右史以魏謨為右史俄兼大諫入閣秉筆直聲遠聞帝倚以為相者期在旦暮對剔進諫細大必行公望美事朝廷拭目以觀文貞公之風彩會文宗晏駕時事變移遂中輟焉時絢已除起居舍人楊嗣復於殿下先奏曰左補闕韋絢新除起居舍人未中謝奏取進止帝領之李珪招而引之絢即置筆札於玉階欄檻之石遽然趨而致詞拜舞焉左史得中謝自開成中至武宗即位隨仗而退無復簪筆之任矣遇簪筆之際因得密邇天顏故時人謂兩省為侍從之班則登選者不為不達矣出嘉話錄李程李程為翰林學士以階前塼日影為入候程性懶每入必踰八塼故號為八塼學土出傳載雜說兩省相呼為閣老尚書丞郎相呼為曹長員外郎御史拾遺相呼為院長上可兼下下不可兼上侍御史相呼為端公出國史補御史御史故事大朝會則監察押班常參則殿中分班入閤則侍御史監奏蓋含元殿最遠用八品宣政其次用七品紫宸最近用六品殿中得立花塼綠衣用紫案褥之類號為七貴監察院長與同院禮隔語曰事長如事端凡上堂絕言笑有不可忍雜端大笑則合座皆笑謂之烘堂烘堂不罰大夫中丞入三院罰直盡放其輕重尺寸由於於原作放據國史補改吏人而大者存之黃卷三院上堂有除改者不得終食唯刑部郎中得終之出國史補同州御史王某云往歲任官同州見御史出案迴止州驛經宿不發忽索雜案又取印曆鎖驛門甚急一州大擾有老吏竊哂乃因庖人以通憲胥許以百縑為贈明日未明御史已啟驛門盡還案牘乘馬而去出國史補崔薳崔薳為監察巡囚至神策軍為吏所陷張蓋而入又諷軍中索酒食意欲結歡竇文瑒怒立奏立奏原作奏立據明鈔本改敕就臺鞭於直廳而流之自是巡囚不至禁軍出國史補嚴武寶應二年大夫嚴武奏在外新除御史食宿私舍非宜自此乃給公乘元和中元禎為監察與中使爭驛廳為其所辱始有敕節度觀察使臺官與中使先到驛者得處上廳為定制出國史補押班凡大朝會監察押班不足則使下侍御史因朝奏者攝之出國史補臺門御史臺門北開蓋取肅殺就陰之義故京臺門北開矣按鄴郡故事云御史臺在宮城西南其門北開史故城御史臺亦北開龍朔中置桂坊為東朝憲府門亦北開然都御史臺門南開當時創造者不經反於故事同諸司蓋以權宜邪御史臺記又北開者或云是隋初移都之時兵部尚書李圓通兼御史大夫欲向省便近故開北門出譚賓錄歷五院臺儀自大夫已下至監察通謂之五院御史國朝歷跋五院者共三人焉李尚隱張延賞溫造也出尚書故實韓皋韓皋為御史中丞常有所陳必於紫宸殿對百寮而請未嘗詣便殿上謂之曰我與卿言於此不盡可來延英當與卿從容或無遺事親友或謂皋曰自乾元已來群臣啟事皆詣延英方得詳盡公何獨於外庭對眾官以陳之無失於慎密乎韓曰御史天下之持平也摧摧原作權據許刻本改剛直枉唯在公共所言之事貴人知之奈何求請便殿避人竊語以私國家之法且延英之置也肅宗皇帝以苗晉卿年老艱步故設之後來臣寮得詣便殿多以私自售希求恩寵欲盡其身奈何以此為望哉出傳載雜說諫院以章疏之故憂患略同臺中則務糺舉省中多事旨趨不一故言遺補相惜御史相憎郎官相輕出國史補使職開元已前於外則命使臣否則止自置八節度十採訪始有坐而為使其後名號益廣於是有為使則重為官則輕故天寶末有佩印至三十者大曆中請俸有至千貫者今在朝太清宮太微宮度支鹽鐵轉運知苑閑廄左右巡分察監察館驛監倉監庫左右街外任則節度觀察諸軍押蕃防禦團練經略鎮遏招討搉鹽水陸運營田給納監牧長春宮有時而置者則大禮禮儀會盟刪定三司黜陟巡撫宣慰推覆選補禮會冊立弔祭供軍糧料和糴此其大略經置而廢者不錄宦宦原作官據國史補改官內外悉謂之使舊為權臣所綰州縣所理今屬中人者有之出國史補尚書省郎官故事吏部郎中二廳先小銓次格式員外郎二廳先南曹次廢置刑部分四覆戶部分兩賦其制尚矣舊說吏部為省眼禮部為南省舍人考功度支為振行比部得廊廊原作廓據明鈔本改下食以飯從者號比盤二十四曹呼左右司為都公省中語曰後行祠屯不博中行都門中行禮部明鈔本部作戶不博前行駕庫出國史補崔日知崔日知歷職中外恨不居八座及為太常卿於都寺廳事後起一樓正與尚書省相望時人謂之崔公望省樓出國史異纂度支故事度支案郎中判入員外判出侍郎總疏押案而已貞元以後始為使額郎官當直發敕為重水部員外郎劉約值宿會河北繫囚配流嶺南夜發敕直宿令史不更事唯下下字原闕據明鈔本補嶺南不下河北旬月後本州聞奏約遂出官出國史補柳闢吏部甲庫有朱泚偽黃案數百道省中常取戲翫已而藏之柳闢知甲庫始白執政於都堂集八座丞郎焚之出國史補省橋尚書省東南隅通衢有小橋相目為拗項橋言侍御史及殿中久次者至此必拗項南望南宮也都堂南門道東有古槐垂陰至廣相傳夜深聞絲竹之音省郎有入相者欲謂之音聲祠部呼為水去聲廳言其清且冷也出因話錄祕書省唐初祕書省唯主寫書貯掌勘校而已自是門可張羅逈無統攝官屬望雖清雅而實非要劇權貴子弟及好利誇侈者率不好此職流俗以監為宰相病坊少監為給事中中書舍人病坊丞及著作郎為尚書郎病坊祕書郎及著作左郎為監察御史病坊言從職不任繁劇者當改入此省然其職在圖史非復喧明鈔本喧作纖卑故好學君子厭於趨競者亦求為此職焉出兩京記魚袋朝儀魚袋之飾唯金銀二等至武后乃改五品以銅中宗反正從舊出國史異纂莎廳京兆府判司特云西法士此兩廳事多東士曹廳時號為念珠廳蓋判案一百八道西士曹廳為莎廳廳前有莎週迴可十五步京兆府時云不立兩縣令不坐兩少尹兩縣引馬到府門傳門而報兩尹入廳大尹亦到廳不得候兩尹坐後出不得候兩尹立後出其京兆府縣之重亦表大尹之尊京兆府掾曹時人云倚團省郎河中府司錄廳亦有綠莎昔好事者相承常溉灌天佑已後為不好事者除之出聞奇錄
