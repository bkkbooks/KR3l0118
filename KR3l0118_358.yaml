body:
  text: 龐阿龐阿巨鹿有龐阿者美容儀同郡石氏有女曾內睹阿心悅之未幾阿見此女來詣阿阿妻極妒聞之使婢縛之遂還石家中路遂化為煙氣而滅婢乃直詣石家説此事石氏之父大驚曰我女都不出門豈可毀謗如此阿婦自是常加意伺察之居一夜方值女在齋中乃自拘執以詣石氏石氏父見之愕貽曰我適從內來見女與母共作何得在此即令婢仆于內喚女出向所縛者奮然滅焉父疑有異故遣其母詰之女曰昔年龐阿來廳中曾竊視之自爾仿佛即夢詣阿乃入戶即為妻所縛石曰天下遂有如此奇事夫精情所感靈神為之冥著滅者蓋其魂神也既而女誓心不嫁經年阿妻忽得邪病醫藥無徵阿乃授幣石氏女為妻馬勢婦吳國富陽人馬勢婦姓蔣村人應病死者蔣輒恍惚熟眠經日見人人死然后省覺則具説家中不信之語人云某中病我欲殺之怒強魂難殺未即死我入其家內架上有白米飯幾種鮭我暫過灶下戲婢無故犯我我打眷甚使婢當時悶絶久之乃蘇其兄病有烏衣人令殺之向其請乞終不下手醒語兄云當活無名夫婦有匹夫匹婦忘其姓名居一旦婦先起其夫尋亦出外某謂夫尚寢既還內見其夫猶在被中既而家童自外來云即令我取鏡婦以奴詐指床上以示奴奴云適從郎處來也乃馳告其夫夫大愕徑入示之遂與婦共觀被中人高枕安眠真是其形了無一異慮是其魂神不敢驚動乃徐徐撫床遂冉冉入席而滅夫婦惋怖不已經少時夫忽得疾性理乖誤終身不愈王宙天授三年清河張鎰因官家于衡州性簡靜寡知友無子有女二人其長早亡幼女倩娘端妍絶倫鎰外甥太原王宙幼聰悟美容范鎰常器重每曰他時當以倩娘妻之后各長成宙與倩娘常私感想于寤寐家人莫知其狀后有賓僚之選者求之鎰許焉女聞而郁抑宙亦深恚恨托以當調請赴京止之不可遂厚遣之宙陰恨悲慟決別上船日暮至山郭數里夜方半宙不寐忽聞岸上有一人行聲甚速須臾至船問之乃倩娘徒行跣足而至宙驚喜若狂執手問其從來泣曰君厚意如此寢食相感今將奪我此志又知君深倩不易思將殺身奉報是以亡命來奔宙非意所望欣躍特甚遂匿倩娘于船連夜遁去倍道兼行數月至蜀凡五年生兩子與鎰絶信其妻常思父母涕泣言曰吾曩日不能相負棄大義而來奔君向今五年恩慈間阻覆載之下胡顏獨存也宙哀之曰將歸無苦遂俱歸衡州既至宙獨身先至鎰家首謝其事鎰曰倩娘病在閨中數年何其詭説也宙曰見在舟中鎰大驚促使人驗之果見倩娘在船中顏色怡暢訊使者曰大人安否家人異之疾走報鎰室中女聞喜而起飾妝更衣笑而不語出與相迎翕然而合為一體其衣裳皆重其家以事不正祕之惟親戚間有潛知之者后四十年間夫妻皆喪二男并孝廉擢第至丞尉事出陳玄祐離魂記云玄祐少常聞此説而多異同或謂其虛大歷末遇萊蕪縣令張仲因備述其本末鎰則仲堂叔而説極備悉故記之鄭齊嬰開元中為吏部侍郎河南黜陟使將歸途次華州忽見五人衣五方色衣詣廳再拜齊嬰問其由答曰是大使五藏神齊嬰問曰神當居身中何故相見答曰是以守氣氣竭當散嬰曰審如是吾其死乎曰然嬰倉卒求延咱刻欲為表章及身后事神言還至后衙則可嬰為設酒饌皆拜而受既修表沐浴服新衣臥西壁下至時而卒柳少遊柳少遊善卜筮著名于京師天寶中有客持一縑詣少遊引入問故答曰願知年命少遊為作卦成而悲歎曰君卦不吉合盡今日暮其人傷歎久之因求漿家人持水至見兩少遊不知誰者是客少遊指神為客令持與客客乃辭去童送出門數步遂滅俄聞空中有哭聲甚哀還問少遊郎君識此人否具言前事少遊方知客是精神遽使看縑乃一紙縑爾歎曰神舍我去吾其死矣日暮果卒蘇萊天寶末長安有馬二娘者善于考召兗州刺史蘇詵與馬氏相善初詵欲為子萊求婚盧氏謂馬氏曰我唯有一子為其婚娶實要婉淑盧氏三女未知誰佳幸為致之一令其母自閲視也馬氏乃于佛堂中結壇考召須臾三女魂悉至萊母親自看馬云大者非不佳不如次者必當為刺史婦蘇乃娶次女天寶末萊至永寧令死于祿山之難其家懲馬氏失言洎二京收復有詔贈萊懷州刺史焉鄭生鄭生者天寶末應舉之京至鄭西郊日暮投宿主人主人問其姓鄭以實對內忽使婢出云娘子合是從姑須臾見一老母自堂而下鄭拜見坐語久之問其婚姻乃曰姑有一外孫女在此姓柳氏其父見任淮陰縣令與兒門地相埒今欲將配君子以為何如鄭不敢辭其夕成禮極人世之樂遂居之數月姑為鄭生可將婦歸柳家鄭如其言攜其妻至淮陰先報柳氏柳舉家驚愕柳妻意疑令有外婦生女怨望形言俄頃女家人往視之乃與家女無異既入門下車冉冉行庭中內女聞之笑出視相值于庭中兩女忽合遂為一體令即窮其事乃是妻之母先亡而嫁外孫女之魂焉生復尋舊迹都無所有韋隱大歷中將作少匠韓晉卿女適尚衣奉御韋隱隱奉使新羅行及一程愴然有思因就寢乃覺其妻在帳外驚問之答曰愍君涉海志願奔而隨之人無知者隱即詐左右曰俗納一妓將侍枕席人無怪者及歸已二年妻亦隨至隱乃啓舅姑首其罪而室中宛存焉及相近翕然合體其從隱者乃魂也齊推女元和中饒州刺史齊推女適隴西李某李舉進士妻方娠留至州宅至臨月遷至后東閣中其夕女夢丈夫衣冠甚偉瞋目按劍叱之曰此屋豈是汝腥穢之所乎亟移去不然且及禍明日告推推素剛烈曰吾忝土地主是何妖孽能侵耶數日女誕育忽見所夢者即其床帳亂毆之有頃耳目鼻皆流血而卒父母傷痛女冤橫追悔不及遣遽告其夫俟至而歸葬于李族遂于郡之西北十數里官道權瘞之李生在京師下第將歸聞喪而往比至饒州妻卒已半年矣李亦粗知其死不得其終悼恨既深思為冥雪至近郭日晚忽于曠野見一女形狀服飾似非村婦李即心動駐馬諦視之乃映草樹而沒李下馬就之至則真其妻也相見悲泣妻曰且無涕泣幸可復生俟君之來亦已久矣大人剛正不信鬼神身是婦女不能自訴今日相見事機校遲李曰為之奈何女曰從此直西五里鄱亭村有一老人姓田方教授村兒此九華洞中仙官也人莫之知君能至心往來或異諧遂李乃徑訪田先生見之乃膝行而前再拜稱曰下界凡賤敢謁大仙時老人方與村童授經見李驚避曰衰朽窮骨旦暮溘然郎君安有此説李再拜扣頭不已老人益難之自日宴至于夜分終不敢就坐拱立于前老人俯首良久曰足下誠懇如是吾亦何所隱焉李生即頓首流涕具云妻枉狀老人曰吾知之久矣但不蚤申訴今屋宅已敗理之不及吾向拒公蓋未有計耳然試為足下作一處置乃起從北出可行百步余止于桑林長嘯倏忽見一大府署殿宇環合儀衛森然擬于王者田先生衣紫帔據案而坐左右解官等列侍俄傳教呼地界須臾十數部各擁百餘騎前后奔馳而至其帥皆長丈余眉目魁岸羅列于門屏之外整衣冠意緒蒼惶相問今有何事須臾謁者通地界廬山神江瀆神彭蠡神等皆趣入田先生問曰比者此州刺史女因産為暴鬼所殺事甚冤濫爾等知否皆府伏應曰然又問何故不為申理又皆對曰獄訟須有其主此不見人訴無以發摘有問知賊姓名否有一人對曰是西漢鄱縣王吳芮今刺史宅是芮昔時所居至今猶恃雄豪侵占土地往往肆其暴虐人無奈何田先生曰即追來俄頃縛吳芮至先生詰之不伏乃命追阿齊良久見李妻與吳芮庭辨食頃吳芮理屈乃曰當是産后虛弱見某驚怖自絶非故殺田先生曰殺人以挺與刃有以異乎遂令執送天曹回謂速檢李氏壽命幾何頃之吏云本算更合壽三十二年生四男三女先生謂群官曰李氏壽算長若不再生議無厭伏公等所見何如有一老吏前啓曰東晉鄴下有一人橫死正與此事相當前使葛真君斷以具魂作本身卻歸生路飲食言語嗜欲追遊一切無異但至壽終不見形質耳田先生曰何謂具魂吏曰生人三魂七魄死則散離本無所依今收合為一體以續弦膠塗之大王當街發遣放回則與本身同矣田先生曰善即顧謂李妻曰作此處置可乎李妻曰幸甚俄見一吏別領七八女人來與李妻一類即推而合之有一人持一器藥狀似稀餳即于李妻身塗之李氏妻如空中墜地初甚迷悶天明盡失夜來所見唯田先生及李氏夫妻三人共在桑林中田先生顧謂李生曰相為極力且喜事成便可領歸見其親族但言再生慎無他説吾亦從此逝矣李遂同歸至州一家驚疑不為之信久之乃知實生人也自爾生子數人其親表之中頗有知者云他無所異但舉止輕便異于常人耳鄭氏女通州有王居士者有道術會昌中刺史鄭君有幼女甚念之而自幼多疾若神魂不足得鄭君因請居士居士曰此女非疾乃生魂未歸其身鄭君訊其事居士曰某縣令某者即此女前身也當死數歲矣以平生為善以幽冥祐之得過期今年九十余矣令歿之曰此女當愈鄭君急發人馳訪之其令果九十余矣后月其女忽若醉寤疾愈鄭君又使往驗令果以女疾愈之日無疾卒裴珙孝廉裴珙家洛陽仲夏自鄭西歸及端午以覲親焉日晚方至石橋忽有少年騎從鷹犬甚衆顧珙笑曰明旦節日今當蚤歸何遲遲也乃以後乘借之珙甚喜謂二童曰爾可緩驅投宿于白馬寺西表兄竇溫之墅明日徐歸可也因上馬疾驅俄頃至上東門歸其馬珍重而別珙居水南促步而進及家暝矣入門方見其親與珙之姊妹張燈會食珙乃前拜曾莫瞻顧因俯階高語曰珙自外至即又不聞珙即大呼弟妹之輩亦無應者珙心神忿感思又極呼皆亦不知但見其親歎曰珙那今日不至也遂涕下而坐者皆泣珙私怪曰吾豈為異物邪因出至通衢徘徊久之有貴人導從甚盛遙見珙即以鞭指之曰彼乃生者之魂也俄有佩橐鞬者出于道左曰地界啓事裴珙孝廉命未合終遇昆明池神七郎子案鷹回借馬送歸以為戲耳今當領赴本身貴人微哂曰小兒無理將人命為戲明日與尊父書令笞之既至而橐鞬者招珙復出上東門度門隙中至竇莊方見其形僵仆二童環泣呦呦焉橐鞬者令其閉目自后推之省然而蘇其二童皆云向者行至石橋察郎君疾作語言大異懼其將甚投于此既至則已絶矣珙驚歎久之少頃無恙舒州軍吏王琪為舒州刺史有軍吏方某者其家忽有鬼降自言姓杜年二十廣陵富家子居通泗橋之西前生欠君錢十萬今地府使我為神神償君此債爾因為人占候禍福其言多中方以家貧告琪求為一鎮將因問鬼吾所求可得否鬼曰諾吾將問之良久乃至曰必得之其鎮名一字正方他不能識矣既而得雙港鎮將以為其言無驗未及之任忽謂方曰適得軍牒軍中令一人來為雙港鎮將吾今以爾為皖口鎮將竟如其言凡歲余鬼忽言曰吾還君債足告別而去遂寂然方后至廣陵訪得杜氏問其弟子云吾弟二子頃忽病如癡人歲余愈矣
