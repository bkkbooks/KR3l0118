body:
  text: 田膨郎田膨郎唐文宗皇帝嘗寶白玉枕德宗朝于闐國所貢追琢奇巧蓋希代之寶置寢殿帳中一旦忽失所在然禁衛清密非恩渥嬪御莫有至者珍玩羅列他無所失上驚駭移時下詔於都城索賊密謂樞近及左右廣中尉曰此非外寇所入盜當在禁掖苟求之不獲且虞他變一枕誠不足惜卿等衛我皇宮必使罪人斯得不然天子環衛自茲無用矣內宮惶栗謝罪請以浹旬求捕大懸金帛購之略無尋究之迹聖旨嚴切收繫者漸多坊曲閭里靡不搜捕有龍武二蕃將王敬弘嘗蓄小僕年甫十八九神彩俊利使之無往不屆敬弘曾與流輩於威遠軍會宴有侍兒善鼓胡琴四座酒酣因請度曲辭以樂器非妙須常御者彈之鍾漏已傳取之不及因起解帶小僕曰若要琵琶頃刻可至敬弘曰禁鼓才動軍門已鎖尋常汝起不見何見之謬也既而就飲數巡小僕以繡囊將琵琶而至座客歡笑南軍去左廣往復三十餘里入夜且無行伍既而倏忽往來敬弘驚異如失時又搜捕嚴急意以盜竊疑之宴罷及明遽歸其第引而問之曰使汝纍年不知蹻捷如此我聞世有俠士汝莫是否小僕謝曰非有此事但能行耳因言父母皆在蜀川頃年偶至京國今欲却歸鄉里有一事欲報恩偷枕者早知姓名三數日當令伏罪敬弘曰如此事即非等間遂令全活者不少未知賊在何許可報司存掩獲明鈔本存作府獲作捕否小僕曰偷枕者田膨郎也市廛軍伍行止不恆勇力過人且善超越苟非便折其足雖千兵萬騎亦將奔走自茲再宿候之於望仙門伺便擒之必矣將軍隨某觀之此事仍須祕密是時涉旬無雨向曉埃塵頗甚車馬騰踐跬步間人不相覩膨郎與少年數輩連臂將入軍門小僕執毬杖擊之欻然已折左足仰而窺曰我偷枕來不怕他人唯懼於爾既此相值豈復多言於是舁至左右軍一款而伏上喜於得賊又知獲在禁旅引膨郎臨軒詰問具陳常在營內往來上曰此乃任俠之流非常之竊盜內外囚繫數百人於是悉令原之小僕初得膨郎已告敬弘歸蜀尋之不可但賞敬弘而已出劇談録宣慈寺門子宣慈寺門子不記姓氏酌其人義俠徒也唐乾符二年韋昭範登宏詞科昭範乃度支使楊嚴懿親及宴席帟幕器皿之類假於計司嚴復遣以使庫供借其年三月宴於曲江亭子供帳之盛罕有倫擬時進士同日有宴都人觀者甚衆飲興方酣俄覩一少年跨驢而至驕悖之狀傍若無人於是俯逼筵席張目明鈔本張目作長耳引頸及肩復以巨箠棖築佐酒謔浪之詞所不能聽諸子駭愕之際忽有於衆中批其頰者隨手而墮於是連加毆擊又奪所執箠箠之百餘衆皆致怒瓦礫亂下殆將斃矣當此之際紫雲樓門軋然而開有紫衣從人數輩馳告曰莫打傳呼之聲相續又一中貴驅殿甚盛馳馬來救復操箠迎擊中者無不面仆於地敕使亦為所箠既而奔馬而反左右從而俱入門門亦隨閉而已坐內甚欣愧然不測其來又慮事連宮禁禍不旋踵乃以緡錢束素召行毆者訊之曰爾何人與諸郎君阿誰有素而能相為如此對曰某是宣慈寺門子亦與諸郎君無素第不平其下人無禮耳衆皆嘉歎悉以錢帛遺之復相謂曰此人必須亡去不然當為擒矣後旬朔坐中賓客多有假途宣慈寺門者門子皆能識之靡不加敬竟不聞有追問之者出托言李龜壽唐晉公白敏中宣宗朝再入相上二句原作唐晉公王鐸禧宗朝再入相據續談助知係廣記纂修時所致原文本作外王父中書令普國公宣宗朝再啓黃閣按指白敏中改時誤為王鐸今依事實文意復之不協比於權道唯以公諒宰大政四方有所請礙於德行者必固爭不允由是征鎮忌焉而志尚典籍雖門施行馬庭列鳧鍾而尋繹未嘗倦於永寧里第別構書齋每退朝獨處其中欣如也居一日將入齋唯所愛卑腳犬花鵲從既啓扉而花鵲連吠銜公衣却行叱去復至既入閣花鵲仰視吠轉急公亦疑之乃於匣中拔千金劍按於膝上向空祝曰若有異類陰物可出相見吾乃丈夫豈懾於鼠輩而相逼耶言訖欻有一物自梁間墜地乃人也朱鬘衣短後衣色貌黝瘦頓首再拜唯曰死罪公止之且詢其來及姓名對曰李龜壽盧龍塞人也或有厚賂龜壽令不利於公龜壽感公之德復為花鵲所驚形不能匿公若捨龜壽罪願以餘生事公公謂曰待汝以不死遂命元從都押衙傅存初録之明日詰旦有婦人至門服裝單急曳履而抱持襁嬰請於閽曰幸為我呼李龜壽龜壽出乃妻也且曰訝君稍遲昨夜半自薊來相尋及公公原作繹據三水小牘逸文改薨龜壽盡室亡去出三水小牘京國豪士潘將軍住光德坊忘其名衆為潘鶻硉也本家襄漢間常乘舟射利因泊江壖有僧乞食留止纍日盡心檀施僧歸去謂潘曰觀爾形質器度與衆賈不同至於妻孥皆享厚福因以玉念珠一串留贈之寶之不但通財他後亦有官祿既而遷貿數年遂鏹均陶鄭其後職居左廣列第於京師常寶念珠貯之以繡囊玉合置道場內每月朔則出而拜之一旦開合啓囊已亡珠矣然而緘封若舊他物亦無所失於是奪魄喪精以為其家將破之兆有主藏者常識京兆府停解所由王超年且八十因密話其事超曰異哉此非攘竊之盜也某試為尋之未知果得否超他日曾過勝業坊北街時春雨初霽有三鬟女子可年十七八衣裝襤縷穿木屐於道側槐樹下值軍中少年蹴踘接而送之直高數丈於是觀者漸衆超獨異焉而止於勝業坊北門短曲有母同居蓋以紉針為業超時因以他事熟之遂為舅甥居室甚貧與母同臥土榻煙爨不動者往往經於纍日或設殽羞時有水陸珍異吳中初進洞庭橘恩賜宰臣外京輦未有此物密以一枚贈超云有人於內中將出而稟性剛決超意甚疑之如此往來周歲矣超一旦攜酒食與之從容徐謂曰舅有深誠欲告外甥未知何如因曰每感重恩恨無所答若力可施必能赴湯蹈火超曰潘軍失却玉念珠不知知否微笑曰從何知之超揣其意不甚藏密又曰外甥忽見尋覓厚備繒綵酬贈女子曰勿言於人某偶與朋儕為戲終却送還因循未暇舅來日詰旦於慈恩寺塔院相候某知有人寄珠在此超如期而往頃刻至矣時寺門始開塔戶猶鎖謂超曰少頃仰觀塔上當有所見語訖而走疾若飛鳥忽於相輪上舉手示超欻然攜念珠而下曰便可將還勿以財帛為意超送詣潘具述其旨因以金玉繒帛密為之贈明日訪之已空室矣馮緘給事嘗聞京師多任俠之徒及為尹密詢左右引引原作述據明鈔本改超具述其語將軍所説與超符同出劇談録賈人妻唐餘干縣廚王立調選傭居大寧里文書有誤為主司駁放資財蕩盡僕馬喪失窮悴頗甚每丐食於佛祠徒行晚歸偶與美婦人同路或前或後依隨因誠意與言氣甚相得立因邀至其居情款甚洽翌日謂立曰公之生涯何其困哉妾居崇仁里資用稍備儻能從居乎立既悅其人又幸其給即曰僕之厄塞阽於溝瀆如此勤勤所不敢望焉子又何以營生對曰妾素賈人之妻也夫亡十年旗亭之內尚有舊業朝肆暮家日贏錢三百則可支矣公授官之期尚未出遊之資且無脫不見鄙但同處以須冬集可矣立遂就焉閲其家豐儉得所至於扃鎖之具悉以付立每出則必先營辦立之一日饌焉及歸則又攜米肉錢帛以付立日未嘗闕立憫其勤勞因令傭買僕隸婦託以他事拒之立不之強也周歲産一子唯日中再歸為乳耳凡與立居二載忽一日夜歸意態遑遑謂立曰妾有冤仇痛纏肌骨為日深矣伺便復仇今乃得志便須離京公其努力此居處五百緡自置契書在屏風中室內資儲一以相奉嬰兒不能將去亦公之子也公其念之言訖收淚而別立不可留止則視其所攜皮囊乃人首耳立甚驚愕其人笑曰無多疑慮事不相縈遂挈囊踰垣而去身如飛鳥立開門出送則已不及矣方徘徊於庭遽聞却至立迎門接俟則曰更乳嬰兒以豁離恨就撫子俄而復去揮手而已立回燈褰帳小兒身首已離矣立惶駭達旦不寐則以財帛買僕買僕原作僕買據明鈔本改乘遊抵近邑以伺其事久之竟無所聞其年立得官即貨鬻所居歸任爾後終莫知其音問也出集異記荊十三娘唐進士趙中行家于溫州以豪俠為事至蘇州旅舍支山禪院僧房有一女商荊十三娘為亡夫設大祥齋因慕趙遂同載歸揚州趙以氣義耗荊之財殊不介意其友人李正郎弟三十九有愛妓妓之父母奪與諸葛殷李悵悵不已時諸葛殷與呂用之幻惑太尉高駢恣行威福李慎禍飲泣而已偶話於荊娘荊娘亦憤惋謂李三十九郎曰此小事我能為郎仇之旦請過江於潤州北固山六月六日正午時待我李亦依之至期荊氏以囊盛妓兼致妓之父母首歸于李復與趙同入浙中不知所止出北夢瑣言許寂蜀許寂少年棲四明山學易于晉徵君一旦有夫婦偕詣山居攜一壺酒寂詰之云今日離剡縣寂曰道路甚遙安得一日及此頗亦異之然夫甚少而婦容色過之狀貌毅然而寡默其夕以壺觴命許同酌此丈夫出一拍板遍以銅釘釘之乃抗聲高歌悉是説劍之意俄自臂間抽出兩物展而喝之即兩口劍躍起在寂頭上盤旋交擊寂甚驚駭尋而收匣之飲畢就寢逮曉乃空榻也至日中復有一頭陀僧來尋此夫婦寂具道之僧曰我亦其人也道士能學之乎時寂按道服也寂辭曰少尚玄學不願為此其僧傲然而笑乃取寂淨水拭腳徘徊間不見爾後再於華陰遇之始知其俠也杜光庭自京入蜀宿於梓潼廳有一僧繼至縣宰周某與之有舊乃云今日自興元來杜異之明發僧遂前去宰謂杜曰此僧仍鹿盧蹻亦俠之類也詩僧齊己於溈山松下親遇一僧於頭指甲下抽出兩口劍跳躍凌空而去出北夢瑣言丁秀才朗州道士羅少微頃在茅山紫陽觀寄泊有丁秀才者亦同寓於觀中舉動風味無異常人然不汲汲於仕進盤桓數年觀主亦善遇之冬之夜霰雪方甚二三道士圍爐有肥羜美醞之羡丁曰致之何難時以為戲俄見開戶奮袂而去至夜分蒙雪而回提一銀榼酒熟羊一足云浙帥廚中物由是驚訝歡笑擲劍而舞騰躍而去莫知所往唯銀榼存焉觀主以狀聞於縣官詩僧貫休俠客詩云黃昏風雨黑如磐別我不知何處去得非江淮間曾聆此事而搆思也出北夢瑣言
