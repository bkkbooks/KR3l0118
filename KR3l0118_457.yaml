body:
  text: 蒙山蒙山魯國費縣蒙山上有寺廢久民欲架堂者輒大蛇數十丈長出來驚人故莫得安焉秦瞻秦瞻居曲河彭星野忽有物如蛇突入其腦中蛇來先聞臭氣便從鼻入盤其頭中覺泓泓冷聞其腦間食聲咂咂數日出去尋復來取手巾急縛口鼻故不得入積年無他唯患頭重廣州人廣州人共在山中伐木忽見石窠中有三卵大如升便取煮之湯始熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來于湯中銜卵去三人無幾皆死袁玄瑛吳興太守袁玄瑛當之官往日者問吉凶曰法至官當有赤蛇為妖不可殺至果有赤蛇在銅虎符石函上蟠玄瑛命殺之其后果為賊徐馥所害也薛重會稽郡吏鄖縣薛重得假還家夜至家戶閉聞婦床上有丈夫眠聲喚婦久從床上出來開戶持刀便逆問婦曰床上醉人是誰婦大驚愕因且苦自申明實無人重家唯有一戶既入便閉婦索了無所見見一蛇隱在床腳酒醉臭重斫蛇寸斷擲于后溝經日而婦死數日重又死后忽然而生説始死有人桎梏之將到一處有官寮問曰何以殺人重曰實不行凶曰爾云不殺者近寸斷擲著后溝此是何物重曰正殺蛇耳府君愕然有悟曰我當用為神而敢淫人婦又訟人敕左右持來吏將一人著平巾幘具詰其淫妄之罪命付獄重為官司便遣將出重倏忽而還顧楷陳時吳興顧楷在田上樹取桑葉見五色大蛇入一小穴其后蛇相次或三尺五尺次第相隨略有數百楷急下樹看所入之處了不見有孔日暮還家楷病口啞不復得語樹提家隋絳州夏縣樹提家新造宅欲移入忽有蛇無數從室中流出門外其稠如箔上蠶蓋地皆遍時有行客云解符鎮取桃枝四枚書符繞宅四面釘之蛇漸退符亦移就之蛇入堂中心有一孔大如盆口蛇入并盡命煎湯一百斛灌之經宿以鍬掘之深數尺得古銅錢二十萬貫因陳破鑄新錢遂巨富蛇乃是古銅之精隋煬帝搜神記蛇千年則斷復續淮南子云神蛇自斷其身而自相續隋煬帝遣人于嶺南邊海窮山求此蛇數四而至洛下所得之者長可三尺而色黃黑其頭錦文全似金色不能毒人解食肉若欲令自斷其身者則先觸之令怒使不任其憤毒則自斷為三四其斷之處如刀截焉見其皮骨文理亦有血焉然久怒定則三四斷稍稍自相就而連續體復如故亦似不相斷隋著作郎鄧隆云此靈蛇一類自斷不必千歲也興福寺長安興福寺有十光佛院其院宇極壯麗云是隋所制貞觀中寺僧以其年紀綿遠慮有摧圮即經費計工且欲新其土木乃將毀撤既啓戶見有蛇萬數連貫在地蛇蟠繞如積搖首呿喙若吞噬之狀寺僧大懼以為天憫重勞故假靈變于是不敢除毀張騎士張騎士者自云幼時隨英公李績渡海遇風十余日不知行幾萬里風靜不波忽見二物黑色頭狀類蛇大如巨船其長望而不極須臾至船所皆以頭繞船橫推其疾如風舟人惶懼不知所抗已分為所啖食唯念佛求速死耳久之到一山破船如積各自念云彼人皆為此物所食須臾風勢甚急顧視船后復有三蛇追逐亦至意如爭食之狀二蛇放船回與三蛇斗于沙上各相蜿蟺于孤島焉舟人因是乘風舉帆遂得免難后數日復至一山遙見煙火謂是人境落帆登岸與二人同行門戶甚大遂前款關有人長數丈通身生白毛出見二人食之一人遽走至船所才上船未及開白毛之士走來牽攬船人人各執弓刀斫射之纍揮數刀然后見釋離岸一里許岸上已有數十頭戟手大呼因又隨風飄帆五六日遙見海島泊舟問人云見清遠縣界屬南海李崇貞高宗光宅中李崇貞任益州長史廳前柑子樹有一子如雞子晚熟微有小孔如針群官咸異之方欲將進久而乃罷因剖之得一赤斑蛇長尺余崇貞后竟以罪死又連州見一柑樹四月中有子如拳大剖之有兩頭蛇馬嶺山開元四年六月郴州馬嶺山側有白蛇長六七尺黑蛇長丈余須臾二蛇斗白者吞黑蛇到粗處口兩嗌皆裂血流滂沛黑蛇頭入嚙白蛇肋上作孔頭出二尺余俄而兩蛇并死后十余日大雨山水暴漲漂破五百餘家失三百餘人至相寺賢者長安至相寺有賢者自十余歲便在西禪院修道院中佛堂座下恆有一蛇賢者初修道時蛇大一圍及后四十余年蛇如堂柱人蛇雖相見而不能相惡開元中賢者夜中至佛堂禮拜堂中無燈而光粲滿堂心甚怪之因于蛇出之處得徑寸珠至市高舉價冀其識者數日有胡人交市定還百萬賢者曰此夜光珠當無價何以如此酬直胡云蚌珠則貴此乃蛇珠多至千貫賢者歎伏遂賣焉李林甫李林甫宅即李靖宅有泓師者以道術聞于睿宗時嘗與過其宅謂人曰后之人有能居此者貴不可言其后久無居人開元初林甫官為奉御遂從而居焉人有告于泓師曰異乎哉吾言果驗是十有九年居相位稱豪貴于天下者此人也雖然吾懼其易制中門則禍且及矣林甫果相玄宗恃權貴為人觖望者久之及末年有人獻良馬甚高而其門稍庳不可乘以過遂易而制既毀其簷忽有蛇千萬數在屋瓦中林甫惡之即罷而不能毀焉未幾林甫竟籍沒其始相至籍沒果十九年矣韋子春臨淮郡有館亭濱泗水上亭有大木周數十栱突然徑拔陰合百步往往有甚風迅雷夕發其中人望見亭有二光對而上下赫然若電風既息其光亦閉開元中有韋子春以勇力聞會子春客于臨淮有人語其事者子春曰吾能伺之于是挈衣橐止于亭中以伺焉后一夕遂有大風雷震于地亭屋搖撼果見二光照耀亭宇子春乃斂衣而下忽覺有物蟠繞其身冷如水凍束不可解回視見二老在其身后子春即奮身揮臂騞然有聲其縛亦解遂歸亭中未幾而風雨霽聞亭中腥若鮑肆明日視之見一巨蛇中斷而斃血遍其地里人相與來觀謂子春且死矣乃見之大驚自是其亭無風雷患宣州江宣州鵲頭鎮天寶七載江水盛漲漫三十里吳俗善泅皆入水接柴木江中流有一材下長十余丈泅者往觀之乃大蛇也其色黃為水所浮中江而下泅者懼而返蛇遂開口銜之泅者正橫蛇口舉其頭去水數尺泅者猶大呼請救觀者莫敢救焉李齊物河南尹李齊物天寶中左遷竟陵太守郡城南樓有白煙刺史不改即死土人以為常占齊物被黜意甚恨恨樓中忽出白煙乃發怒云吾不畏死神如余何使人尋煙出處云白煙悉白蟲恐是大蛇齊物令掘之其孔漸大中有大蛇身如巨甕命以鑊煎油數十斛沸則灼之蛇初雷吼城堞震動經日方死乃使人下塹塞之齊物亦更無他嚴挺之嚴挺之為魏州刺史初到官臨廳事有小蛇從門入至案所以頭枕案挺之初不達遽持牙笏壓其頭下地正立凝想頃之蛇化成一符挺之意是術士所為尋索無獲而止天寶樵人天寶中有樵人入山醉臥為蛇所吞其人微醒怪身動搖開視不得方知為物所吞因以樵刀畫腹得出之眩然迷悶久之方悟其人自爾半身皮脫如麻風狀無畏師天寶中無畏師在洛是時有巨蛇狀甚異高丈余圍五十尺魁魁若盤繞出于山下洛民咸見之于是無畏曰后此蛇決水瀦洛城即説佛書義甚精蛇至夕則駕風露來若傾聽狀無畏乃責之曰爾蛇也營居深山中固安其所何為將欲肆毒于世即速去無患生人其蛇聞之遂俯于地若有慚色須臾而死焉其后祿山據洛陽盡毀宮廟果無畏所謂決洛水瀦城之應張鎬洪州城自馬瑗置立后不復修革相傳云修者必死永泰中都督張鎬修之不疑忽城西北陬遇一大坎坎中見二蛇一白一黑頭類牛形如巨甕長六十余尺蜿蟺在坑中其余小蛇不可勝數遽以白鎬鎬命逐之出乃以竹篾縛其頭牽之蛇初不開目隨牽而出小蛇甚多軍人或有傷其小者十余頭然猶大如飲碗二蛇相隨入徐孺亭下放生池中池水深數丈其龜皆走出上岸為人所獲魚亦鼓鰓出水須臾皆死后七日鎬薨判官鄭從南昌令馬皎二子相繼而卒畢乾泰唐左補闕畢乾泰瀛州任丘人父母年五十自營生藏訖至父年八十五又自造棺稍高大嫌藏小更加磚二萬口開藏欲修之有蛇無數時正月尚寒蟄未能動取蛇投一空井中仍受蛇不盡其蛇金色泰自與奴開之尋病而卒月余父母俱亡此開之不得其所也杜暐殿中侍御史杜暐嘗使嶺外至康州驛騎思止白曰請避毒物于是見大蛇截道南出長數丈玄武后追之道南有大松樹蛇升高枝盤繞垂頭下視玄武玄武自樹下仰其鼻鼻中出兩道碧煙直沖蛇頭蛇遂裂而死墜于樹下又見蜈蚣大如箏牛肅曾以其事問康州司馬狄公狄公曰昔天寶四載廣府因海潮漂一蜈蚣死剖其一爪則得肉百二十斤至廣州市有人籠盛兩頭蛇集人衆中言汝識二首蛇乎汝見二首蛇則其首并出吾今異于是首蛇各一頭欲見之乎市人請見之乃出其蛇蛇長二尺頭在首尾市人伶者常以弄蛇為業每執諸蛇不避毒害見兩頭蛇則以手執之蛇螫其手伶者言痛棄蛇于地加藥焉不愈其嚙處腫遂浸淫俄而遍身伶者死身遂洪大其骨肉皆化為水身如貯水囊有頃水潰遂化盡人與兩頭蛇失所在海州獵人海州人以射獵為事曾于東海山中射鹿忽見一蛇黑色大如連山長近十丈兩目成日自海而上人見蛇驚懼知不免死因伏念佛蛇至人所以口銜人及其弓矢渡海而去遙至一山置人于高岩之上俄而復有一蛇自南來至山所狀類先蛇而大倍之兩蛇相與斗于山下初以身相蜿蟺久之口相噬射士知其求己助乃傅藥矢欲射之大蛇先患一目人乃復射其目數矢纍中久之大蛇遂死倒地上小蛇首尾俱碎乃銜大真珠瑟瑟等數斗送人歸至本所也
