body:
  text: 裴諶裴諶裴諶王敬伯梁芳約為方外之友隋大業中相與入白鹿山學道謂黃白可成不死之藥可致雲飛羽化無非積學辛勤採練手足胼胝十數年間無何梁芳死敬伯謂諶曰吾所以去國忘家耳絶絲竹口厭肥豢目棄奇色去華屋而樂茆齋賤歡娛而貴寂寞者豈非覬乘雲駕鶴遊戲蓬壺縱其不成亦望長生壽畢天地耳今仙海無涯長生未致辛勤于雲山之外不免就死敬伯所樂將下山乘肥衣輕聽歌玩色遊於京洛意足然後求達建功立事以榮耀人寰縱不能憩三山飲瑤池驂龍衣霞歌鸞舞鳳與仙官為侶且腰金拖紫圖形凌煙廁卿大夫之間何如哉子盍歸乎無空死深山諶曰吾乃夢醒者不復低迷敬伯遂歸諶留之不得時唐貞觀初以舊籍調授左武衛騎曹參軍大將軍趙朏妻之以女數年間遷大理廷評衣緋奉使淮南舟行過高郵制使之行呵叱風生舟船不敢動時天微雨忽有一漁舟突過中有老人衣蓑戴笠鼓棹而去其疾如風敬伯以為吾乃制使威振遠近此漁父敢突過試視之乃諶也遂令追之因請維舟延之坐內握手慰之曰兄久居深山拋擲名宦而無成到此極也夫風不可繫影不可捕古人倦夜長尚秉燭遊況少年白晝而擲之乎敬伯自出山數年今廷尉評事矣昨者推獄平允乃天錫命服淮南疑獄今讞于有司上擇詳明吏覆訊之敬伯預其選故有是行雖未可言宦達比之山叟自謂差勝兄甘勞苦竟如曩日奇哉奇哉今何所須當以奉給諶曰吾儕野人心近雲鶴未可以腐鼠嚇也吾沉子浮魚鳥各適何必矜炫也夫人世之所須者吾當給爾子何以贈我吾與山中之友市藥於廣陵亦有息肩之地青園橋東有數里櫻桃園園北車門即吾宅也子公事少隙當尋我於此遂翛然而去敬伯到廣陵十餘日事少間思諶言因出尋之果有車門試問之乃裴宅也人引以入初尚荒涼移步愈佳行數百步方及大門樓閣重復花木鮮秀似非人境煙翠蔥籠景色妍媚不可形狀香風颯來神清氣爽飄飄然有凌雲之意不復以使車為重視其身若腐鼠視其徒若螻蟻既而稍聞劍佩之聲二青衣出曰裴郎來俄有一人衣冠偉然儀貌奇麗敬伯前拜視之乃諶也裴慰之曰塵界仕宦久食腥羶愁欲之火焰于心中負之而行固甚勞困遂揖以入坐于中堂窗戶棟梁飾以異寶屏帳皆畫雲鶴有頃四青衣捧碧玉臺盤而至器物珍異皆非人世所有香醪嘉饌目所未窺既而日將暮命其促席燃九光之燈光華滿坐女樂二十人皆絶代之色列坐其前裴顧小黃頭曰王評事者吾山中之友道情不固棄吾下山別近十年才為廷尉屬今俗心已就須俗妓以樂之顧伶家女無足召者當召士大夫之女已適人者如近無姝麗五千里內皆可擇之小黃頭唯唯而去諸妓調碧玉箏調未諧而黃頭已復命引一妓自西階登拜裴席前裴指曰參評事敬伯答拜細視之乃敬伯妻趙氏而敬伯驚訝不敢言妻亦甚駭目之不已遂令坐玉階下一青衣捧玳瑁箏授之趙素所善也因令與坐妓合曲以送酒敬伯坐間取一殷色朱李投之趙顧敬伯潛係于衣帶妓奏之曲趙皆不能逐裴乃令隨趙所奏時時停之以呈其曲其歌雖非雲韶九奏之樂而清亮宛轉酬獻極歡天將曙裴召前黃頭曰送趙夫人且謂曰此堂乃九天畫堂常人不到吾昔與王為方外之交憐其為俗所迷自投湯火以智自燒以明自賊將沉浮于生死海中求岸不得故命于此一以醒之今日之會誠再難得亦夫人宿命乃得暫遊雲山萬重復往勞苦無辭也趙拜而去斐謂敬伯曰評公使車留此一宿得無驚郡將乎宜且就館未赴闕間時訪我可也塵路遐遠萬愁攻人努力自愛敬伯拜謝而去復五日將還潛詣取別其門不復有宅乃荒涼之地煙草極目惆悵而返及京奏事畢將歸私第諸趙競怒曰女子誠陋不足以奉事君子然已辱厚禮亦宜敬之夫上以承先祖下以繼後事豈苟而已哉奈何以妖術致之萬里而娛人之視聽乎朱李尚在其言足徵何諱乎敬伯盡言之且曰當此之時敬伯亦自不測此蓋裴之道成矣以此相炫也其妻亦記得裴言遂不復責吁神仙之變化誠如此乎將幻者鬻術以致惑乎固非常智之所及且夫雀為蛤雉為蜃人為虎腐草為螢蜣蜋為蟬鯤為鵬萬物之變化書傳之記者不可以智達況耳目之外乎出續玄怪録盧李二生昔有盧李二生隱居太白山讀書兼習吐納道引之術一旦李生告歸曰某不能甘此寒苦且浪迹江湖訣別而去後李生知橘子園人吏隱欺欠折官錢數萬貫羈縻不得東歸貧甚偶過揚州阿使橋逢一人草蹻布衫視之乃盧生生昔號二舅李生與語哀其襤縷盧生大罵曰我貧賤何畏公不作好棄身凡弊之所又有欠負且被囚拘尚有面目以相見乎李生厚謝二舅笑曰居處不遠明日即將奉迎至旦果有一僕者馳駿足來云二舅遣迎郎君既去馬疾如風過城南數十里路側朱門斜開二舅出迎星冠霞帔容貌光澤侍婢數十人與橋下儀狀全別邀李生中堂宴饌名花異木若在雲霄又纍呈藥物皆殊美既夜引李生入北亭命酌曰兼與公求得佐酒者頗善箜篌須臾紅燭引一女子至容色極艷新聲甚嘉李生視箜篌上有朱字一行云天際識歸舟雲間辨江樹罷酒二舅曰莫願作婚姻否此人名家質貌若此李生曰某安敢二舅許為成之又曰公所欠官錢多少曰二萬貫乃與一拄杖曰將此於波斯店取錢可從此學道無自穢身陷鹽鐵也才曉前馬至二舅令李生去送出門門字下有脫文雲笈七籤一一三下有洎歸頗疑訝為神仙矣即以拄杖詣波斯店十七字波斯見拄杖驚曰此盧二舅拄杖何以得之依言付錢遂得無事其年往汴州行軍陸長源以女嫁之既婚頗類盧二舅北亭子所覩者復能箜篌果有朱書字視之天際之詩兩句也李生具説揚州城南盧二舅亭中筵宴之事妻曰少年兄弟戲書此昨夢見使者云仙官追一如公所言也李生歎訝卻尋二舅之居唯見荒草不復覩亭臺也出逸史薛肇不知何許人也與進士崔宇於廬山讀書同志四人二人業未成而去崔宇勤苦尋已擢第唯肇獨以修道為務不知師匠何人數年之間已得神仙之道廬山下有患風勞者積年醫藥不效尸居候時而已肇過其門憩樹陰下因語及疾者肇欲視之既見曰此甚易耳可以愈也留丹一粒小於粒米謂疾者所親曰明晨掐半粒水吞之自當有應未愈三日外更服半粒也其家自以久疾求醫所費巨萬尚未致愈疾者柴立僅存余喘豈此半粟而能救耶明日試服之疾者已起洎午能飲食策杖而行如此三日充盛康壯又服半粒即神氣邁逸肌膚如玉髭髮青鬒狀可二十歲許人月餘肇復來曰子有骨籙值吾此藥不唯愈疾兼可得道矣乃授其所修之要此人遂登五老峰訪洞府而去崔宇既及第尋授東畿尉赴任過三𦂫驛忽逢薛肇下馬敘舊見肇顏貌風塵頗有哀嗟之色宇自以擢第拜官揚揚矜負會話久之日已晡矣薛謂崔曰貧居不遠難於相逢過所居宵話可乎崔許之隨薛而行僕乘皆留店中初入一小徑甚荒梗行一二里間田疇花木皆異凡境良久已及高樓大門殿閣森沉若王者所理崔心驚異之薛先入有數十人擁接升殿然後召崔升階與坐款話久之謂崔曰子有好官未可此住但一宵話舊可爾促令召樂開筵頃刻即於別殿宴樂更無諸客唯崔薛二人女樂四十餘輩拜坐奏樂選女妓十輩同飲有一箜篌妓最為姝穎崔與並坐崔見箜篌上有十字云天際識歸舟雲間辨江樹崔默記之席散薛問崔坐中所悅以箜篌者對薛曰他日與君今且未可及明與崔送別遺金三十斤送至官路慘別而去崔至官月餘求婚得柳氏常疑曾識而不記其處暇日命取箜篌理曲崔見十字書在焉問其故云某時患熱疾夢中見使人追云西城大仙陳溪薛君有客五百里內解音聲處女盡追可四十餘人因隨去與薛及客崔少府同飲一夕覺來疾已愈薛君即神仙也崔少府風貌與君無異各話其事大為驚駭方知薛已得道爾明鈔本此處有與盧李二公事相類故附焉十一字出仙傳拾遺
