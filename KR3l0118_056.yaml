body:
  text: 西王母西王母西王母者九靈太妙龜山金母也一號太虛九光龜臺金母元君乃西華之至妙洞陰之極尊在昔道氣凝寂湛體無為將欲啓迪玄功化生萬物先以東華至真之氣化而生木公木公生於碧海之上芬靈之墟以主陽和之氣理於東方亦號曰東王公焉又以西華至妙之氣化而生金母金母生於神州伊川厥姓侯氏生而飛翔以主元育神玄奧於眇莽之中分大道醇精之氣結氣成形與東王公共理二氣而育養天地陶鈞萬物矣柔順之本為極陰之元位配西方母養群品天上天下三界十方女子之登仙者得道者咸所隸焉所居宮闕在龜山春山西那之都崑崙之圃閬風之苑有城千里玉樓十二瓊華之闕光碧之堂九層玄室紫翠丹房左帶瑤池右環翠水其山之下弱水九重洪濤萬丈非飆車羽輪不可到也所謂玉闕暨天緑臺承霄青琳之宇朱紫之房連琳綵帳明月四朗戴華勝佩虎章左侍仙女右侍羽童寶蓋沓映羽摻廕庭軒砌之下植以白環之樹丹剛之林空青萬條瑤幹千尋無風而神籟自韻琅琅然皆九奏八會之音也神州在崑崙之東南故爾雅云西王母目下是矣又云王母蓬髮戴華勝虎齒善嘯者此乃王母之使金方白虎之神非王母之真形也元始天王授以方天元統龜山九光之籙使制召萬靈統括真聖監盟證信總諸天之羽儀天尊上聖朝晏之會考校之所王母皆臨訣焉上清寶經三洞玉書凡有授度咸所關預也黃帝討蚩尤之暴威所未禁而蚩尤幻變多方徵風召雨吹煙噴霧師衆大迷帝歸息太山之阿昏然憂寢王母遣使者被玄狐之裘以符授帝曰太一在前天一在後得之者勝戰則克矣符廣三寸長一尺青瑩如玉丹血為文佩符既畢王母乃命一婦人人首鳥身謂帝曰我九天玄女也授帝以三宮五意陰陽之略太一遁甲六壬步斗之術陰符之機靈寶五符五勝之文遂克蚩尤於中冀剪神農之後誅榆罔於阪泉天下大定都于上谷之涿鹿又數年王母遣使白虎之神乘白鹿集于帝庭授以地圖其後虞舜攝位王母遣使授舜白玉環舜即位又授益地圖遂廣黃帝之九州為十有二州王母又遣使獻舜白玉琯吹之以和八風尚書帝驗期曰王母之國在西荒也昔茅盈字叔申王褒字子登張道陵字輔漢洎九聖七真凡得道授書者皆朝王母於崑陵之闕焉時叔申道陵侍太上道君乘九蓋之車控飛虬之軌越積石之峰濟弱流之津浮白水凌黑波顧盼倏忽詣王母於闕下子登清齋三月王母授以瓊華寶曜七晨素經茅君從西城王君詣白玉龜臺朝謁王母求長生之道曰盈以不肖之軀慕龍鳳之年欲以朝菌之脆求積朔之期王母愍其勤志告之曰吾昔師元始天王及皇天扶桑帝君授我以玉佩金璫二景纏煉之道上行太極下造十方溉月咀日入天門名曰玄真之經今以授爾宜勤修焉因敕西城王君一一解釋以授焉又周穆王時命八駿與七華之士使造父為御西登崑崙而賓於王母穆王持白圭重錦以為王母壽事具周穆王傳至漢武帝元封元年七月七日夜降於漢宮語在漢武帝傳內此不復載焉出集仙録上元夫人道君弟子也亦玄古以來得道總統真籍亞於龜臺金母新降之處多使侍女相聞己為賓侶焉漢孝武皇帝好神仙之道禱醮名山以求靈應元封元年辛未七月七日夜二唱之後西王母降於漢宮帝迎拜稽首侍立久之王母呼帝令坐食食字原闕據明鈔本許刻本補以天廚筵宴粗悉命駕將去帝下席叩頭請留殷勤王母復坐乃命侍女郭密香邀夫人同宴於漢宮語在漢武帝傳中其後漢宣帝地節四年乙卯咸陽茅盈字叔申受黃金九錫之命為東嶽上卿司命真君太元真人是時五帝君授册既畢各升天而去茅君之師乃總真王君西靈王母與夫人降於句曲之山金壇之陵華陽天宮以宴茅君焉時茅君中君名固字季偉小君名衷字思和王母王君授以靈訣亦受錫命紫素之册固為定録君衷為保命君亦侍貞會王君告二君曰夫人乃三天真皇之母上元之高尊統領十方玉女之籍汝可自陳二君下席再拜求乞長生之要夫人憫其勤志命侍女宋辟非出紫錦之囊開緑金之笈以三元流珠經丹景道精經隱地八術經太極緣景經凡四部以授二君王母復敕侍女李方明出丹瓊之函披雲珠之笈出玉佩金瑞明鈔本瑞作璫經太霄隱書經洞飛二景內書傳司命君各授書畢王母與夫人告去千乘萬騎升還太空矣出漢武內傳雲華夫人王母第二十三女太真王夫人之妹也名瑤姬受徊風混合萬景鍊神飛化之道嘗東海遊還過江上有巫山焉峰巖挺拔林壑幽麗巨石如壇留連久之時大禹理水駐山下大風卒至崖振谷隕不可制因與夫人相值拜而求助即敕侍女授禹策召鬼神之書因命其神狂章虞余黃魔大翳庚辰童律等助禹斫石疏波決塞導厄以循其流禹拜而謝焉禹嘗詣之崇巘之巔顧盼之際化而為石或倏然飛騰散為輕雲油然而止聚為夕雨或化遊龍或為翔鶴千態萬狀不可親也禹疑其狡獪怪誕非真仙也問諸童律律曰天地之本者道也運道之用者聖也聖之品次真人仙人也其有稟氣成真不修而得道者木公金母是也蓋二氣之祖宗陰陽之原本仙真之主宰造化之元光雲華夫人金母之女也昔師三元道君受上清寶經受書於紫清闕下為雲華上宮夫人主領教童真之士理在玉英之臺隱見變化蓋其常也亦由凝氣成真與道合體非寓胎稟化之形是西華少陰之氣也且氣之彌綸天地經營動植大包造化細入毫髮在人為人在物為物豈止於雲雨龍鶴飛鴻騰鳳哉禹然之後往詣焉忽見雲樓玉臺瑤宮瓊闕森然既靈官侍衛不可名識獅子抱關天馬啓塗毒龍電獸八威備軒夫人宴坐于瑤台之上禹稽首問道召禹使坐而言曰夫聖匠肇興剖大混之一朴發為億萬之體發大蘊之一苞散為無窮之物故步三光而立乎晷景封九域而制乎邦國刻漏以分晝夜寒暑以成歲紀兌離以正方位山川以分陰陽城廓以聚民器械以衛衆輿服以表貴賤禾黍以備凶歉凡此之制上稟乎星辰而取法乎神真以養有形之物也是故日月有幽明生殺有寒暑雷震有出入之期風雨有動靜之常清氣浮乎上而濁衆散于下廢興之數治亂之運賢愚之質善惡之性剛柔之氣壽夭之命貴賤之位尊卑之敘吉凶之感窮達之期此皆稟之於道懸之于天而聖人為紀也性發乎天而命成乎人立之者天行之者道道存則有道去則非道無物不可存也非修不可致也玄老有言致虛極守靜篤萬物將自復復謂歸於道而常存也道之用也變化萬端而不足其一是故天參玄玄地參混黃人參道德去此之外非道也哉長久之要者天保其玄地守其物人養其氣所以全也則我命在我非天地殺之鬼神害之失道而自逝也志乎哉勤乎哉子之功及於物矣勤逮於民矣善格乎天矣而未聞至道之要也吾昔於紫清之闕受書寶而勤之我師三元道君曰上真內經天真所寶封之金臺佩入太微則雲輪上往神武抱關振衣瑤房遨宴希林左招仙公右棲白山而下眄太空泛乎天津則乘雲騁龍遊此名山則真人詣房萬人奉衛山精伺迎動有八景玉輪靜則宴處金堂亦謂之太上玉佩金璫之妙文也汝將欲越巨海而無飆輪渡飛沙而無雲軒陟厄塗而無所輿涉泥波而無所乘陸則困於遠絶水則懼於漂淪將欲以導百谷而濬萬川也危乎悠哉太上愍汝之至亦將授以靈寶真文陸策虎豹水制蛟龍斷馘千邪檢馭群凶以成汝之功也其在乎陽明之天也吾所授寶書亦可以出入水火嘯叱幽冥收束虎豹呼召六丁隱淪八地顛倒五星久視存身與天相傾也因命侍女陵容華出丹玉之笈開上清寶文以授禹拜受而去又得庚辰虞余之助遂能導波決川以成其功奠五嶽別九州而天錫玄圭以為紫庭真人其後楚大夫宋玉以其事言於襄王王不能訪道要以求長生築臺於高唐之館作陽臺之宮以祀之宋玉作神仙賦以寓情荒淫穢蕪高真上仙豈可誣而降之也有祠在山下世謂之大仙隔岸有神女之石即所化也復有石天尊神女壇側有竹垂之若篲有稿葉飛物著壇上者竹則因風掃之終瑩潔不為所污楚人世祀焉出集仙録玄天二女燕昭王即位二年廣延國來獻善舞者二人一名旋波一名提謨並玉質凝膚體輕氣馥綽約而窈窕絶古無倫或行無影迹或積年不飢昭王處以單綃華幄飲以瓀珉之膏飴以丹泉之粟王登崇霞臺乃召二人來側時香風欻起徘徊翔舞殆不自支王以纓縷拂之二人皆舞容冶妖麗靡於翔鸞而歌聲輕揚乃使女伶代唱其曲清響流韻雖飄梁動塵未足加焉其舞一名縈塵言其體輕與塵相亂次曰集羽言其婉轉若羽毛之從風也末曰旋懷言其支體緬曼若入懷袖也乃設麟文之席散華蕪之香香出波弋國浸地則土石皆香著朽木腐草莫不蔚茂以薰枯骨則肌肉皆生以屑鋪地厚四五尺使二人舞其上彌日無迹體輕故也時有白鸞孤翔銜千莖穟穟於空中自生花實落地即生根葉一歲百穫一莖滿車故曰盈車嘉穟麟文者錯雜衆寶以為席也皆為雲霞麟鳳之狀昭王復以衣袖麾之舞者皆止昭王知為神異處於崇霞之臺設枕席以寢宴遣人以衛之王好神仙之術故玄天之女託形作二人昭王之末莫知所在或遊於江漢或在伊洛之濱遍行天下乍近乍遠也出王子年拾遺
