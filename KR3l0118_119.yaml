body:
  text: 杜伯杜伯杜伯名曰恆入為周大夫宣王之妾曰女鳩欲通之杜伯不可女鳩訴之宣王曰竊與妾交宣王信之囚杜伯于焦使薛甫與司空錡殺杜伯其友左儒九諫而王不聽杜伯既死為人見王曰恆之罪何哉王召祝而以杜伯語告祝曰始殺杜伯誰與王謀之王曰司空錡也祝曰何以不殺錡以謝之宣王乃殺錡使祝以謝之伯猶為人而至言其無罪司空又為人而至曰臣何罪之有宣王告皇甫曰祝也為我謀而殺人吾殺者又皆為人而見訴奈何皇甫曰殺祝以謝可也宣王乃殺祝以兼謝焉又無益皆為人而至祝亦曰我焉知之奈何以此為罪而殺臣也後三年宣王遊圃田從人滿野日中見杜伯乘白馬素車司空錡為左祝為右朱冠起於道左執朱弓彤矢射王中心折脊伏於弓衣而死出還冤記公孫聖吳王夫差殺其臣公孫聖而不以罪後越伐吳王敗走謂太宰嚭曰吾前殺公孫聖投於胥山之下今道由之吾上畏蒼天下慚於地吾舉足而不能進心不忍往子試唱於前若聖猶在當有應聲嚭乃登餘杭之山呼之曰公孫聖聖即從上應曰在三呼而三應吳王大懼仰天歎曰蒼天乎寡人豈可復歸乎吳王遂死不返出還冤記燕臣莊子儀無罪而簡公殺之子儀曰死者無知則已若其有知不出三年當使君見之明年簡公將祀於祖澤燕之有祖澤猶宋之有桑林國之太祀也男女觀之子儀起於道左荷朱杖擊公公死於車上出還冤記遊敦遊敦字幼齊漢世為羽林中郎將先與司隸校尉胡軫有隙遂誣敦殺之敦死月餘軫病目睛遂遂字下十三字據明鈔本補脫但言伏罪遊幼齊將鬼來於是遂死出還冤記王宏漢王宏字長文為扶風太守與司徒王允俱為李傕等所害宏素與司隸校尉胡伸不相能伸因就獄竟其事宏臨死歎曰胡伸小子勿樂人之禍禍必及汝伸後病頭不得舉眼若睡見宏來以大杖擊之數日死出還冤記宋皇后漢靈帝宋皇后無寵而居正位後宮幸姬衆共譖毀初中常侍王甫枉誅渤海王悝及妃妃即后之姑也甫恐後怒乃與大中大夫程何共誣后執左道咒詛靈帝信之收后璽綬后自致暴室以憂死父及兄弟俱被誅諸常侍大小黃門在省署者皆憐宋氏無罪帝後夢見桓帝曰宋皇后何罪過而聽用邪嬖使絶其命昔渤海王悝既已自貶又受誅斃今宋后及悝皆訴於天上帝震怒罪在難救夢殊明察帝既覺而懼以事問羽林左監許永此為何祥其可禳乎永對以宋后及渤海無辜之狀並請改葬以安冤魂還宋家之徙復渤海之封以消災咎帝弗能用尋亦崩焉出還冤記徐光徐光在吳常行術市里間種梨橘棗栗立得食而市肆賣者皆已耗矣凡言水旱甚驗常過大將軍孫綝門褰衣而趨左右唾踐或問其故答曰流血臭腥不可耐綝聞而殺之斬其首無血及綝廢幼帝更立景帝將拜陵上車車為之傾因顧見徐光在松柏樹上附手指揮嗤笑之綝問侍從無見者綝惡之俄而景帝誅綝出還冤記王陵司馬宣王功業日隆又誅魏大將軍曹爽篡奪之迹稍彰王陵時為揚州刺史以魏帝制於強臣不堪為主楚王彪年長而有才欲迎立之兗州刺史董莘以陵陰謀告宣王宣王自將中軍討陵卒至陵自知勢窮乃單舸出迎宣王遂送陵還京師至項城過賈逵廟側陵呼曰賈梁道吾固盡心於魏之社稷唯爾有神知之陵遂飲藥酒死三族皆誅其年宣帝有病白日見逵來並陵為祟因呼陵字曰彥雲緩我宣王身亦有打處少時遂卒出還冤記夏侯玄魏夏侯玄字太初以當時才望為司馬景王所忌而殺之玄宗族為之設祭見玄來靈座脫頭置其旁悉斂果肉食物以納頭既而還自安頸而言曰吾得訴於上帝矣司馬子元無嗣也既而景王薨遂無子文王封次子攸為齊王繼景王後攸薨攸子冏嗣立又被殺及永嘉之亂有巫見宣王泣云我國傾覆正由曹爽夏侯玄二人訴冤得申故也出還冤記金玄晉明帝殺力士金玄謂持刀者曰我頭多筋斫之必令即斷吾將報汝刀者不能留意遂斫數瘡然後絶後見玄絳冠朱服赤弓彤矢射持刀者呼云金玄緩我少時而死出還冤記經曠河間國兵張粗經曠二人相與諧善晉太元十四年五月五日共升鍾嶺坐于山椒粗酒酣失性拔刀斬曠曠託夢于母自説為粗所殺尸在澗間脫裳覆腹尋覓之時必難可得當令裳飛起此處也明晨追捕一如所言粗知事露將謀叛逸出門見曠手執雙刀來擬其面遂不得去母遂報官粗伏辜出還冤記萬默晉山陰縣令石密先經為禦史枉奏殺句容令萬默密尋白日見默來殺密死出還冤記麴儉前涼張天錫元年西域校尉張頎殺麴儉儉臨死具言取之後頎後見白狗以刀斫之不中頎便倒地不起左右見儉在旁遂暴卒出還冤記太樂伎宋元嘉中李龍等夜行掠劫於時丹陽陶繼之為秣陵縣令令人密尋捕遂擒龍等引人是太樂伎劫發之夜此伎與同伴往就人宿共奏音聲陶不詳審為作款引隨例申上而所宿主人及賓客並相明證陶知枉濫但以文書已行不欲自為通塞並諸劫十人於郡門斬之此伎聲價藝態又殊辨慧將死之日曰我雖賤隸少懷慕善未嘗為非實不作劫陶令已當具知枉見殺害若無鬼則已有鬼必自陳訴因彈琵琶歌數曲而就死衆知其枉莫不隕泣經月餘陶遂夢伎來至案前云昔枉見殺實所不忿訴天得理今故取君便跳入陶口乃落腹中陶即驚寤俄而倒狀若風癲良久蘇醒有時而發發即夭矯頭乃著背四日而亡亡後家便貧瘁二兒早死餘有一孫窮寒路次出還冤記鄧琬宋泰始元年江州刺史鄧琬立刺吏晉安王子勳為帝作亂初南郡太守張悅得罪鎖歸揚都及湓口琬赦之以為冠軍將軍共綱紀軍事袁顗既敗張悅懼誅乃稱暴疾伏甲而召鄧琬既至謂之曰卿首唱此禍今事急矣計將安出琬曰斬晉安王以待王師或可以免悅怒曰卿始此禍而欲賣罪少帝乎命斬於床前并殺其子以琬頭降至五年悅臥疾見琬為厲遂死出還冤記孔基會稽孔基勤學有志操族人孔敞使其二子從基為師而敞子並凶狠趨向不軌基屢言於敞此兒常有忿志敞尋喪亡服制既除基以宿舊乃齎羊酒往看二子二子猶懷宿怨潛遣奴路側殺基奴還未至乃見基來張目攘袂厲聲言曰姦醜小豎人面獸心吾蒙顧存昔敦舊法苑珠林九一舊作戢敦煌卷子本還冤記亦作戢平生有何怨惡候道見害反天忘父人神不容要當斷汝家種從此之後數日見形孔氏無幾大兒向廁忽便絶倒絡繹往看已斃于地次者尋復病疽而死卒致兄弟無後出還冤記曇摩懺沮渠蒙遜時沙門曇摩懺者博達多識為蒙遜之所信重魏氏遣李順拜蒙遜為涼王乃求曇摩懺蒙遜怯而不與曇摩懺意欲入魏屢從蒙遜請行蒙遜怒殺之既而左右當白日中見曇摩懺以劍擊蒙遜因以疾而死出還冤記支法存支法存者本自胡人生長廣州妙善醫術遂成巨富有八九尺毾㲪百種形象光彩曜目又有沉香八尺板床居常芬馥王談為廣州刺史大兒劭之屢求二物法存不與王因狀法存豪縱殺而籍沒家財焉死後形見于府內輒打閣下鼓似若稱冤如此經月王尋得病恆見法存守之少時遂亡劭之比至揚都又死焉出還冤記張超高平金鄉張超先與同縣翟願不和願以宋元嘉中為方輿令忽為人所殺咸疑是超超後除金鄉縣令解職還家入山伐材翟兄子銅烏執弓持矢並齎酒禮就山餽之斟酌已畢銅烏曰明府昔害我叔無緣同戴天日即引弓射之超乃死銅烏其夜見超云我不殺汝叔橫見殘害今已上訴故來相報引刀刺之吐血而死出還冤記袁粲幼子齊高祖欲禪宋尚書令袁粲舉兵不從被害其幼子乳母潛將投粲門生狄靈慶靈慶殺之經年忽見兒騎狗戲如常後復有一狗走入靈慶家遇靈慶便噬殺之其妻子並死于狗出古今記庾宏奴庾宏為竟陵王府佐家在江陵宏令奴無患者載米餉家未達三里遭劫被殺尸流泊查口村時岸傍有文欣者母病醫云須得髑髏屑服之即差欣重賞募索有鄰婦楊氏見無患尸因斷頭與欣欣燒之欲去皮肉經三日夜不焦眼角張轉欣雖異之猶惜不棄因刮耳頰骨與母服之即覺骨停喉中經七日而卒尋而楊氏得疾通身洪腫形如牛馬見無患頭來罵云善惡之報其能免乎楊氏以語兒言終而卒出幽明録魏輝俊北齊陽翟太守張善苛酷貪叨惡聲流布蘭臺遣禦史魏輝俊就郡治之贓賄狼籍罪當合死善于獄中使人通訴反誣輝俊為納民財枉見推縛文宣帝大怒以為法司阿曲必須窮正令尚書令左丞盧斐覆驗之斐遂希旨成輝俊罪狀奏報於州斬決輝俊遺語令史曰我之情理是君所見今日之事可復如之當辦紙百番筆二管墨一錠以隨吾尸若有靈祗必望報盧令史哀悼為之殯斂並備紙筆十五日善得病唯云叩頭旬日而死才兩月盧斐坐譏駮魏使為魏收奏文宣帝鴆殺之出還冤記真子融北齊世嘗為井陘關收租使臟貨甚為人所糾齊主欲以行法意在窮治乃付并州城局參軍崔法瑗與中書舍人蔡暉共拷其獄然子融罪皆在赦前法瑗等觀望上意抑為赦後子融臨刑之際怨訴百端既不得理乃曰若使此等平直是無天道後十五日法瑗無病死經一年許蔡暉患病膚肉爛墮都盡苦楚日加方死出還冤記
