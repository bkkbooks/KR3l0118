body:
  text: 皇甫枚皇甫枚光啓中僖宗在梁州秋九月皇甫枚將赴調行在與所親裴宜城者偕行十月自相州西抵高平縣縣西南四十里登山越玉溪其日行旅稍稀煙云晝晦日昃風徑惑于多歧上一長板下視有茅屋數間槿籬疏散其中有喧語聲乃延望之少頃有村婦出自西廂之北著黃故衣蓬頭敗屨連呼之不顧但俯首而復入乃循板東南下得及其居至則荊扉橫葛縈帶其上茨棘羅生于其庭略無人蹤如涉一二年者矣枚與裴生愕立久之復登板長望見官道有人行乃策蹇驢赴之至則郵吏將往端氏縣者也乃與俱焉是夜宿端氏陳璠陳璠者沛中之走卒也與故徐帥時浦少結軍中兄弟之好及浦為支辟所任璠亦纍遷右職黃巢之亂支辟簡徑卒五千人命浦總之而西璠為次將浦自許昌趨洛下璠以千人反平陰浦乃矯稱支命追兵回于是引師與璠合屠平陰掠圃田而下及沛支慮其變郊勞及解甲盛設厚賂之乃令所親諷支曰軍前不安民望見追且請公解印以厭衆心支力不能制乃率其孥出居大彭館浦自稱留后璠謂浦曰支尚書惠及沛人若不殺之將貽后悔浦不可璠固請與浦往復十余翻浦怒曰自看自看璠乃詐為浦命謂之曰請支行李歸闕下支以為誠也翌日遂發璠伏甲于七里亭至則無少長皆殺之沛人莫不流涕其后浦受朝命乃表璠為宿州太守璠性慘酷喜殺復厚斂淫刑百姓嗟怨五年中資賄山積浦惡之乃命都將張友代璠璠怒不受命友至處別第以俟璠出璠夜率麾下五百人圍友遲明友自領驍果百餘人突之璠潰與十余人騎走出數十里從騎皆亡璠棄馬微服乞食于野野人有識之者執以送友縶之馳白浦浦命斬之于郡璠本粗悍木朴不知書臨刑忽索筆賦詩曰積玉堆金官又崇禍來倏忽變成空五年榮貴今何在不異南柯一夢中時以為鬼代作也豫章中官天復甲子歲豫率居人近市者夜恆聞街中若數十人語聲向市而去就視則無人如是纍夜人家惴恐夜不能寤頃之詔盡誅閹官豫章所殺凡五十余驅之向市驟語喧噪如先所聞邵元休漢左司員外郎邵元休當天復年中尚未冠居兗州廨宅宅內惟乳母婢仆堂之西序最南是書齋時夜向分舉家滅燭熟寐書齋內燈亦滅邵枕書假寐聞堂之西窸窣若婦人履聲經于堂階先至東序皆女仆之寢室也每至一房門即住少時遂聞至南廊有閣子門不啓鍵乃推門而入即聞轟然若撲破磁器聲遂西入書齋窗外微月見一物形狀極偉不辨其面目長六七尺如以青黑帛蒙首而入立于門扉之下邵不懼厲聲叱之仍間數聲都不酬答遂卻出其勢如風邵欲捫枕擊之則已去矣又聞行往堂西其聲遂絶遲明驗其南房內則茶床之上一白磁器已墜地破矣后問人云常有兵馬留后居是宅女卒權于堂西作殯宮仍訪左右有近鄰識其女者云體貌頗長蓋其魄也何四郎梁時西京中州市有何四郎者以鬻妝粉自業嘗于一日五更初街鼓未鳴時聞百步之外有人極叫何四郎者幾數聲而罷自是率以為常約半月后忽晨興開肆畢有一人若官僚之仆者直前揖之云官令召汝何意府尹之宅有取未就路仆又促之何方束帶仆又不容俄以衣牽之北行達于東西之衢何乃欲回歸仆執之尤急何乃愈疑將非人耶嘗聞所著鞋履以之規地自圍亦可御其邪魅某雖亟為之即被擲之于屋知其無能為也且訝且行情甚恍惚遂正北抵徽安門又西北約五七里則昏冥矣忽有朱門峻宇若王者之府署至更深延入烈炬熒煌供帳華麗唯婦人輩款接殷勤云是故將相之第幼女方擇良匹實慕英賢可就吉席何既睹妖冶情亦惑之婉淑之姿亦絶代矣比曉則臥于丘冢之間寂無人迹遂望徽安門而返草莽翳密墮于荒井之中又經一夕飢渴難狀以衣襟承露而飲之有樵者見而問之遂報其家縋而出之數日方愈青州客朱梁時青州有賈客泛海遇風飄至一處遠望有山川城郭海師曰自頃遭風者未嘗至此吾聞鬼國在是得非此耶頃之舟至岸因登岸向城而去其廬舍田畝不殊中國見人皆揖之而人皆不見已至城有守門者揖之亦不應入城屋室人物甚殷遂至王宮正值大宴君臣侍宴者數十其衣冠器用絲竹陳設之類多類中國客因升殿俯逼王坐以窺之俄而王有疾左右扶還亟召巫者視之巫至有陽地人至此陽氣逼人故王病其人偶來爾無心為祟以飲食車馬謝遣之可矣即具酒食設座于別室巫及其君臣皆來祀祝客據按而食俄有仆夫馭馬而至客亦乘馬而歸至岸登舟國人竟不見己復遇便風得歸時賀德儉為青州節度與魏博節度楊師厚有親因遣此客使魏其為師厚言之魏人范宣古親聞其事為余言周元樞周元樞者睢陽人為平盧掌書記寄居臨淄官舍一夕將寢忽有車馬輜重甚衆扣門使報曰李司空候謁元樞念親知輩皆無此人因自思必鄉曲之舊吾不及知矣即出見之延坐請問其所從來曰吾亦新家至此未有所止求居此宅矣元樞驚曰何至是對曰此吾之舊宅也元樞曰吾從官至此相傳云書寄之公署也君何時居此曰隋開皇中嘗居之元樞曰若爾君定是鬼耶曰然地府許我立廟于此故請君移去爾元樞不可曰人不當與鬼相接豈吾將死故君得凌我耶雖然理不當以此宅授君吾雖死必與君訟因召妻子曰我死必多置紙筆于棺中將與李君對訟即具酒與之飲相酬數百杯詞色愈厲客將去復留之良久一蒼頭來云夫人傳語司空周書記木石人也安可與之論難自取困哉客于是辭謝而去送之出門倏忽不見元樞竟無恙朱延壽壽州刺史朱延壽末年浴于室中窺見窗外有二人皆青面朱發青衣手執文書一人曰我受命來取一人曰我亦受命來取一人又曰我受命在前延壽因呼侍者二人即滅侍者至問外有何人皆云無人俄而被殺秦進忠天祐丙子歲浙西軍士周交作亂殺大將秦進忠張胤凡十余人進忠少時嘗怒一小奴刃貫心殺而并埋之末年恆見此奴捧心而立始于百步之外稍稍而近其日將出乃在馬前左右皆見之而入府又遇亂兵傷胃而卒張胤前月余每聞呼其姓名聲甚清越亦稍稍而近其日若在對面入府皆斃矣望江李令望江李令者罷秩居舒州有二子甚聰慧令嘗飲酒暮歸去家數百步見二子來迎即共禽而毆之令驚大怒大呼而遠方人絶竟無知者且行且毆將至家二子皆卻走而去及入門二子復迎于堂下問之皆云未嘗出門后月余令復飲酒于所親家因具白其事請留宿不敢歸而其子恐其及暮歸復為所毆即俱往迎之及中途見其父怒曰何故暮出即使從者擊之困而獲免明日令歸益駭其事不數月父子皆卒郡人云舒有山鬼善為此厲蓋黎丘之徒也張飛廟祝梓州去城十余里有張飛廟廟中有土偶為衛士一夕感廟祝之妻經年遂生一女其發如朱眉目手足皆如土偶之狀至于長大人皆畏之凡蒞職梓州者謁廟則呼出驗之或遺之錢帛至今猶存僧彥翛草書僧文英大師彥翛始在洛都明宗世子秦王從榮復厚遇之后有故南居江陵西湖曾口寺一日恍惚忽見秦王擁二十騎詣寺訪彥翛彥翛問大王何以此來恰來對倏而不見彥翛方訪于人不旬日秦王遇害建康樂人建康有樂人日晚如市見二仆夫云陸判官召隨之而去至大宅陳設甚嚴賓客十余人皆善酒惟飲酒而不設食酒亦不及樂人向曙而散樂人困甚因臥門外床上既寤乃在草間旁有大冢問其里人云相傳陸判官之冢不知何時人也黃延讓建康吏黃延讓嘗飲酒于親家逮夜而散不甚醉恍然而身浮飄飄而行不能自制行可十數里至一大宅寂然無人堂前有一小房房中有床延讓困甚因寢床上及寤乃在蔣山前草間逾重城復塹矣因恍惚得疾歲余乃愈張瑗江南內臣張瑗日暮過建康新橋忽見一美人袒衣猖獗而走瑗甚訝諦視之婦人忽爾回頭化為旋風撲瑗瑗馬倒傷面月余乃復初馬既起乃提一足跛行而歸自是每過此橋馬輒提一足而行竟無他怪婺源軍人妻丁酉歲婺源建威軍人妻死更娶其后妻虐遇前妻之子過甚夫不能制一日忽見亡妻自門而入大怒后妻曰人誰無死孰無母子之情乃虐我兒女如是耶吾比訴與地下所司今與我假十日使我誨汝汝遂不改必能殺君夫妻皆恐懼再拜即為其酒食遍召親黨鄰里問訊敘話如常他人但聞其聲唯夫見之及夜為設榻別室夫欲從之宿不可滿十日將去復責勵其后妻言甚切至舉家親族共送至墓去墓百餘步曰諸人可止矣復殷勤辭訣而去將及柏林中諸人皆見之衣服容色如平生及墓乃沒建威軍使汪延昌言如是陳德遇辛亥歲江南偽右藏庫官陳居讓字德遇直宿庫中其妻在家五更初忽夢二吏手把文書自門而入問此陳德遇家耶曰然德遇何在曰在庫中吏將去妻追呼之曰家夫字德遇耳有主衣庫官陳德遇者家近在東曲二吏相視而嘻曰幾誤矣遂去邇日德遇晨起如廁自云有疾還臥良久遂卒二人并居治城之西廣陵吏人廣陵吏姓趙當暑獨寢一室中夜忽見大黃衣人自門而入從小黃衣七人謂己曰處處尋不得乃在此耶叱起之曰可以行矣一黃衣前曰天年未盡未可遽行宜有以記之可也大人即探懷出一印印其左臂而去及明視之印文著肉字若古篆識其下右若仙字左若記字其上不可識趙后不知所終
