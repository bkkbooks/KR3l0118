body:
  text: 崔紹崔紹崔紹者博陵王玄暐曾孫其大父武嘗從事于桂林其父直元和初亦從事于南海常假郡符于端州直處官清苦不蓄羡財給家之外悉拯親故在郡歲余因得風疾退臥客舍伏枕纍年居素貧無何寢疾復久身謝之日家徒索然繇是眷屬輩不克北歸紹遂孜孜履善不墮素業南越會府有攝官承乏之利濟淪落羈滯衣冠紹迫于凍餒常屈至于此賈繼宗外表兄夏侯氏之子則紹之子壻因緣還往頗熟其家大和六年賈繼宗自瓊州招討使改換康州牧因舉請紹為掾屬康之附郭縣曰端溪端溪假尉隴西李彧則前天理評事景休之猶子紹與彧錫類之情素頗友洽崔李之居復隅落相近彧之家畜一女貓常往來紹家捕鼠南土風俗惡他舍之貓産子其家以為大不祥彧之貓産二子于紹家紹甚惡之因命家童縶三貓于筐篋加之以石復以繩固筐口投之于江是后不纍月紹丁所出滎陽鄭氏之喪解職居且苦貧孤孀數輩饘粥之費晨暮不充遂薄遊羊城之郡丐于親故大和八年五月八日發康州官舍歷抵海隅諸郡至其年九月十六日達雷州紹家常事一字天王已兩世矣雷州舍于客館中其月二十四日忽得熱疾一夕遂重二日遂殛將殛之際忽見二人焉一人衣黃一人衣皂手執文帖云奉王命追公紹初拒之云平生履善不省為惡今有何事被此追呼二使人大怒曰公殺無辜三人冤家上訴奉天符下降令按劾公方當與冤家對命奈何猶敢稱屈違拒王命遂展帖示紹見文字分明但不許細讀耳紹頗畏讋不知所裁頃刻間見一神人來二使者俯伏禮敬神謂紹曰爾識我否紹曰不識神曰我一字天王也常為爾家供養久矣每思以報之今知爾有難故來相救紹拜伏求救天王曰爾但共我行必無憂患王遂行紹次之二使者押紹之后通衙廣陌杳不可知際行五十許里天王問紹爾莫困否紹對曰亦不甚困猶可支持三二十里天王曰欲到矣逡巡遙見一城門牆高數十仞門樓甚大有二神守之其神見天王側立敬懼更行五里又見一城門四神守之其神見天王之禮亦如第一門又行三里許復有一城門其門關閉天王謂紹曰爾且立于此待我先入天王遂乘空而過食頃聞搖鎖之聲城門洞開見十神人天王亦在其間神人色甚憂懼更行一里又見一城門有八街街極廣闊街兩邊有雜樹不識其名目有神人甚多不知數皆羅立于樹下八街之中有一街最大街西而行又有一城門門兩邊各有數十間樓并垂簾街衢人物頗衆車輿合雜朱紫繽紛亦有乘馬者亦有乘驢者一似人間模樣此門無神看守更一門盡是高樓不記間數珠簾翠幕眩惑人目樓上悉是婦人更無丈夫衣服鮮明裝飾新異窮極奢麗非人寰所睹其門有朱旗銀泥畫旗旗數甚多亦有著紫人數百天王立紹于門外便自入去使者遂領紹到一廳使者先領見王判官既至廳前見王判官著緑降階相見情禮甚厚而答紹拜兼通寒暄問第行延升階與坐命煎茶良久顧紹曰公尚未生紹初不曉其言心甚疑懼判官云陰司諱死所以喚死為生催茶茶到判官云勿吃此非人間茶逡巡有著黃人提一瓶茶來云此是陽官茶紹可吃矣紹吃三碗訖判官則領紹見大王手中把一紙文書亦不通入大王正對一字天王坐天王向大王云只為此人來大王曰有冤家上訴手雖不殺口中處分令殺于江中天王令喚崔紹冤家有紫衣十余人齊唱喏走出頃刻間有一人著紫襴衫執牙笏下有一紙狀領一婦人來兼領二子皆人身而貓首婦人著慘裙黃衫子一女子亦然一男子亦然著皂衫三冤家號泣不已稱崔紹非理相害天王向紹言速開口與功德紹忙懼之中都忘人間經佛名目唯記得佛頂尊勝經遂發願各與寫經一卷言訖便不見婦人等大王及一字天王遂令紹升階與坐紹拜謝大王王答拜紹謙讓曰凡夫小生冤家陳訴罪當不赦敢望生回大王尊重如是答拜紹實所不安大王曰公事已畢即還生路存歿殊途固不合受拜大王問紹公是誰家子弟紹具以房族答之大王曰此若然者與公是親家總是人間馬仆射紹即起申敘馬仆射猶子磻夫則紹之妹夫大王問磻夫安在紹曰闊別已久知家寄杭州大王又曰莫怪此來奉天符令勘今則卻還人道便回顧王判官云崔子停止何處判官曰便在某廳中安置天王云甚好紹復咨啓大王大王在生名德至重官位極崇則合卻歸人天為貴人身何得在陰司職大王笑曰此官職至不易得先是杜司徒任此職總濫蒙司徒知愛舉以自代所以得處此位豈容易致哉紹復問曰司徒替何人曰替李若初若初性嚴寡恕所以上帝不遣久處此杜公替之紹又曰無因得一至此更欲咨問大王紹聞冥司有世人生籍紹不才兼本抱疾不敢望人間官職然顧有親故願一知之不知可否曰他人則不可得見緣與公是親情特為致之大王顧謂王判官曰從許一見之切須誡約不得令漏泄漏泄之則終身喑啞又曰不知紹先父在此復以受生大王曰見在此充職紹涕泣曰願一拜覲不知可否王曰亡歿多年不得相見紹起辭大王其一字天王送紹到王判官廳中鋪陳贍給一似人間判官遂引紹到一瓦廊下廊下又有一樓便引紹入門滿壁悉是金榜銀榜備列人間貴人姓名將相二色名列金榜將相以下悉列銀榜更有長鐵榜列州縣府僚屬姓名所見三榜之人悉是在世人若謝世者則隨所落籍王判官謂紹曰見之則可慎勿向世間説榜上人官職已在位者猶可言之未當位者不可漏泄當犯大王向來之誡世人能行好心必受善報其陰司誅責惡心人頗甚紹在王判官廳中停止三日旦暮嚴打警鼓數百面唯不吹角而已紹問判官曰冥司諸事一切盡似人間惟空鼓而無角不知何謂判官曰夫角聲者像龍吟也龍者金精也金精者陽之精也陰府者至陰之司所以至陰之所不欲聞至陽之聲紹又問判官曰聞陰司有地獄不知何在判官曰地獄名目不少去此不遠罪人隨業輕重而入之又問此處城池人物何盛如是判官曰此王城也何得怪盛紹又問王城之人如海豈得俱無罪乎而不入地獄耶判官曰得處王城者是業輕之人不合入地獄候有生關則隨分高下各得受生又康州流人宋州院官田洪評事流到州二年與紹鄰居紹洪復纍世通舊情愛頗洽紹發康州之日評事猶甚康寧去后半月染疾而卒紹未回都不知之及追到冥司已見田生在彼田崔相見彼此涕泣田謂紹曰洪別公後來未經旬日身已謝世矣不知公何事忽然到此紹曰被大王追勘少事事亦尋了即得放回洪曰有少情事切敢奉托洪本無子養外孫鄭氏之子為兒已喚致得年六十方自有一子今被冥司責以奪他人之嗣以異姓承家既自有子又不令外孫歸本族見為此事被勘劾頗甚令公卻回望為洪百計致一書與洪兒子速令鄭氏子歸本宗又與洪傳語康州賈使君洪垂盡之年竄逐遠地主人情厚每事相依及身歿之后又發遣小兒北歸使道體歸葬本土眷屬免滯荒陬雖仁者用心固合如是在洪淺劣何以當之但荷恩于重泉恨無力報言訖二人慟哭而別居三日王判官曰歸可矣不可久處于此一字天王與紹欲回大王出送天王行李頗盛道引騎從填塞街衢天王乘一小山自行大王處分與紹馬騎盡諸城門大王下馬拜別天王天王坐山不下然從紹相別紹跪拜大王亦遠拜訖大王便回紹與天王自歸行至半路見四人皆人身而魚首著慘緑衫把笏衫上微有血污臨一峻坑而立泣拜請紹曰性命危急欲墮此坑非公不能相活紹曰仆何力以救公四人曰公但許諾則得紹曰灼然得四人拜謝又云性命已蒙君放訖更欲啓難發之口有無厭之求公莫怪否紹曰但力及者盡力而應之曰四人共就公乞金光明經則得度脫罪身矣紹復許言畢四人皆不見卻回至雷州客館見本身偃臥于床以被蒙復手足天王曰此則公身也但徐徐入之莫懼如天王言入本身便活及蘇問家人輩死已七日矣唯心及口鼻微暖蘇后一日許猶依稀見天王在眼前又見階前有一木盆盆中以水養四鯉魚紹問此是何魚家人曰本買充廚膳以郎君疾殛不及修理紹曰得非臨坑四人乎遂命投之于陂池中兼發願與寫金光明經一部辛察太和四年十二月九日邊上從事魏式暴辛于長安延福里沈氏私廟中前二日之夕勝業里有司門令史辛察者忽患頭痛而絶心上微暖初見有黃衫人就其床以手相就而出既而返顧本身則已僵矣其妻兒等方抱持號泣噀水灸灼一家蒼惶察心甚惡之而不覺隨黃衣吏去矣至門外黃衫人踟蹰良久謂察曰君未合去但致錢二千緡便當相舍察曰某素貧何由致此黃衫曰紙錢也遂相與卻入庭際大呼其妻數聲皆不應黃衫哂曰如此不可也乃指一家僮教察以手扶其背因令達語求錢于是其家果取紙錢焚之察見紙錢燒訖皆化為銅錢黃衫乃次第抽拽積之又謂察曰一等為惠請兼致腳直送出城察思度良久忽悟其所居之西百餘步有一力車傭載者亦常往來遂與黃衫俱詣其門門即閉關矣察叩之車者出曰夜已久安待來耶察曰有客要相顧載錢至延平門外車曰諾即來裝其錢訖察將不行黃衫又邀曰請相送至城門三人相引部領歷城西街抵長興西南而行時落月輝輝鐘鼓將動黃衫曰天方曙不可往矣當且止延福沈氏廟逡巡至焉其門亦閉黃衫叩之俄有一女人可年五十余紫裙白襦自出應門黃衫謝曰夫人幸勿怪其后日當有公事方來此廟中今有少錢未可遽提去請借一隙處暫貯收之后日公事了即當般取女人許之察與黃衫及車人共般置其錢于廟西北角又于戶外見有葦席數領遂取之復才畢天色方曉黃衫辭謝而去察與車者相隨歸至家見其身猶為家人等抱持灸療如故不覺形神合而蘇良久思如夢非夢乃曰向者更何事妻具言家童中惡作君語索六百張紙作錢以焚之皆如前事察頗驚異遽至車子家車家見察曰君來正解夢耳夜來所夢不似尋常分明自君家別與黃衫人載一車子錢至延福沈氏廟歷歷如在目前察愈驚駭復與車子偕往沈氏廟二人素不至此既而宛然昨宵行止既于廟西北角見一兩片蘆席其下紙緡存焉察與車夫皆識夜來致錢之所即訪女人守門者曰廟中但有魏侍御于此無他人也沈氏有藏獲亦住廟旁聞語其事及形狀衣服乃泣曰我太夫人也其夕五更魏氏一家聞打門聲使候之即無所見如是者三四式意謂之盜明日宣言于縣胥求備之其日式夜邀客為煎餅食訖而卒察欲驗黃衫所驗公事嘗自于其側偵之至是果然矣僧彥先青城室園山僧彥先嘗有隱慝離山往蜀州宿于中路天王院暴卒被人追攝詣一官曹未領見王先見判官詰其所犯彥先抵諱之判官乃取一豬腳與彥先彥先推辭不及黽勉受之乃是一鏡照之見自身在鏡中從前愆過猥褻一切歷然彥先漸懼莫知所措判官安存戒而遣之洎再生遍與人説然不言所犯隱穢之事陳龜范明州人客遊廣陵因事贊善馬潛一夕暴卒至一府署有府官視牒曰吾追陳龜謀何故追龜范耶范對曰范本名龜謀近事馬贊善馬公諱言故改一字耳府公乃曰取明州簿來頃之一吏持薄至視之乃龜謀也因引至曹署吏云有人訟君已引退矣君當得還也龜范因自言平生多難貧苦備至人生固當死今已至此不願還也吏固遣之又曰若是願知將來窮達之事吏因為檢簿曰君他日甚善雖不至富貴然職録無缺又問壽幾何曰此因不可言也又問卒于何處曰不在揚州不在鄂州送還家寤后潛歷典二郡甚見委用潛卒歸于揚州奉使鄂州既還卒于彭澤
