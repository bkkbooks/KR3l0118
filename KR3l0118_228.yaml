body:
  text: 奕棋羊玄保宋文帝善奕棋常與太平羊玄保棋玄保戲賭得宣城太守當敕除以為虛受出談藪王積薪玄宗南狩百司奔赴行在翰林善棋者王積薪從焉蜀道隘狹每行旅止息道中之郵亭人舍多為尊官有力之所先積薪棲無所入因沿溪深遠寓宿於山中孤姥之家但有婦姑皆闔戶止給水火才暝婦姑皆闔戶而休積薪棲于簷下夜闌不寢忽聞堂內姑謂婦曰良宵無以適興與子圍棋一賭可乎婦曰諾積薪私心奇之堂內素無燈燭又婦姑各在東西室積薪乃附耳門扉俄聞婦曰起東五南九置子矣姑應曰東五南十二置子矣婦又曰起西八南十置子矣姑又應曰西九南十置子矣每置一子皆良久思唯夜將盡四更積薪一一密記其下止三十六忽聞姑曰子已敗矣吾止勝九枰耳婦亦甘焉積薪遲明具衣冠請問孤姥曰爾可率己之意而按局置子焉積薪即出囊中局盡平生之祕妙而布子未及十數孤姥顧謂婦曰是子可教以常勢耳婦乃指示攻守殺奪救應防拒之法其意甚略積薪即更求其説孤老笑曰止此亦無敵於人間矣積薪虔謝而別行十數步再詣則失向來之室閭矣自是積薪之藝絶無其倫即布所記婦姑對敵之勢罄竭心力較其九枰之勝終不得也因名鄧艾開蜀勢至今棋圖有焉而世人終莫得而解矣出集異記一行一行本不解奕棋因會燕公宅觀王積薪棋一局遂與之敵笑謂燕公曰此但爭先耳若念貧道四句乘除語則人人為國手晉羅什與人棋拾敵死子空處如龍鳳形或言王積薪對玄宗棋局畢悉持出出酉陽雜俎韋延祐韋延祐圍棋與李士秀敵手士秀惜其名不肯先寧輸延祐籌終饒兩路延祐本應明經學道過大梁其護戎知其善棋表進之遂因言江淮足棋人就中奕棋明經者多解出嘉話録日本王子大中中日本國王子來朝獻寶器音樂上設百戲珍饌以禮焉王子善圍棋上敕待詔顧顧原作顏據明鈔本改師言對手王子出楸玉棋局冷暖玉棋子云本國之東三萬里有集真島島上有凝霞臺臺上有手談池池中出玉子不由製度自然黑白分明冬溫夏冷故謂之冷暖玉更産如楸玉狀類楸木琢之為棋局光潔可鑑及師言與之敵手至三十三下勝負未決師言懼辱君命而汗手凝思方敢落指即謂之鎮神頭乃是解兩征勢也王子瞪目縮臂已伏不勝回話鴻臚曰待詔第幾手耶鴻臚詭對曰第三手也師言實稱國手王子曰願見第一曰王子勝第三方得見第二勝第二得見第一今欲見躁第一其可得乎王子掩局而吁曰小國之第一不如大國之第三信矣今好事者尚有顧師言三十三下鎮神頭圖出杜陽編漢成帝漢成帝好蹙鞠群臣以蹙鞠勞體非尊者所宜帝曰朕好之可擇似而不勞者奏之劉向奏彈棋以獻上悅賜之青羔裘紫絲屢服以朝覲出小説魏文帝彈棋魏宮內用裝棋戲也文帝為之特妙用手巾角拂之無不中者有客自云能帝使為之客著葛巾角低頭拂棋妙殆踰於帝出世説又文帝嘗云豫於他戲弄之事少所喜唯彈棋略盡其妙少時嘗為之賦昔京師妙工有二焉合卿侯東方世安張公子常恨不得與之對也今彈棋用棋二十四色色別貴賤又魏戲法先立一棋於局中餘者間白黑圓繞之十八籌成都出世説藏鉤舊言藏鉤起於鉤弋蓋依辛氏三秦記云漢武鉤弋夫人手拳時人效之目為藏鉤也殷敬順敬訓曰彄與摳同衆人分曹手藏物探取之又令藏鉤剩一人則來往於兩朋謂之誐鴟風土記曰藏鉤之戲分二曹以較勝負若人偶則敵對若奇則使一人為遊附或屬上曹或屬下曹為飛鳥又令為此戲必於正月據風土記在臘祭後也庾闡藏鉤賦云豫以臘後命中外以行鉤為戲矣出酉陽雜俎桓玄殷仲堪與桓玄共藏鉤一朋百籌桓朋欲不勝唯餘虎探在顧愷之為殷仲堪參軍屬病疾在廨桓遣信請顧起病令射取虎探即來坐定語顧云君可取鉤顧答云賞百匹布顧即取得鉤桓朋遂勝出渚宮故事高映舊説藏彄令人生離或言占語有徵也舉人高映善意彄段成式常於荊州藏鉤每曹五十餘人十中其九同曹鉤亦知其處當時疑有他術訪之映言但意舉止辭色若察因視盜也出酉陽雜俎石旻山人石旻尤妙打彄與張又新兄弟善暇夜會客因試其意彄注之必中張遂置鉤於巾襞中旻良久笑曰盡張空拳有頃眼鉤在張君襆頭左翅中其妙如此旻後居揚州段成式因識之曾祈其術石謂成式可先畫人首數十遣胡越異貌辨其相當授疑其見紿竟不及畫出酉陽雜俎雜戲武帝時郭舍人善投壺以竹為矢不用棘也古之投壺取中而不求還故實小豆於中惡其矢躍而出也郭舍人則激矢令還一矢百餘反謂之為驍言如博之羿棋於輩中為驍傑也每為武帝投壺輒賜金帛出西京雜記小戲中於耍局一枰各布五子角遲速名蹙融段成式讀座右方為之蹙戎出酉陽雜俎貞元中董叔儒進博局並經一卷頗有新意不行於時洛陽令崔師本又好為古文樗蒱其法三分其子三百六十限以二關人執六馬其骰五枚分上為黑下為白黑者刻二為犢白者刻二為雉擲之全黑乃為盧其彩十六二雉三黑為雉其彩十四二犢三白為犢其彩十全白為白其彩八四者貴彩也開為十二塞為十一塔為五禿為四梟為二撅為三二六者雜彩也貴彩得連擲得打馬得過關餘彩則否新加進六兩彩出國史補貞元中有杜勸好長行皆有佳名各記有輕妙夏中用者為冷子取其似蕉葛之輕健而名之出嘉話録今之博戲有長行最盛其具有局有子子黑黃各十五擲采之骰有二其法生於握槊變於雙六天后嘗夢雙六不勝狄梁公言宮中無子是也後人新意長行出焉又有小雙六圍透大點小點遊談鳳翼之名然無如長行也監險易者喻時事焉適變通者方易象焉王公大人頗或耽玩至於廢慶弔忘寢食及博徒用之於是強各爭勝謂之撩零假借分畫謂之囊家囊家什一而取謂之乞頭有通宵而戰者有破産而輸者其工者近有談鎬崔師本首出圍棋次於長行其工者近有韋延祐楊芃首出如彈棋之戲甚古法雖設鮮有為之其工者近有吉達高越首出焉出國史補
