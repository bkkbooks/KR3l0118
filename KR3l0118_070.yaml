body:
  text: 許飛瓊許飛瓊唐開成初進士許瀍遊河中忽得大病不知人事親友數人環坐守之至三日蹶然而起取筆大書於壁曰曉入瑤臺露氣清坐中唯有許飛瓊塵心未盡俗緣在十里下山空月明書畢復寐及明日又驚起取筆改其第二句曰天風飛下步虛聲書訖兀然如醉不復寐矣良久漸言曰昨夢到瑤臺有仙女三百餘人皆處大屋內一人云是許飛瓊遣賦詩及成又令改曰不欲世間人知有我也既畢甚被賞歎令諸仙皆和曰君終至此且歸若有人導引者遂得回耳出逸史裴玄靜緱氏縣令昇之女鄠縣尉李言妻也幼而聰慧母教以詩書皆誦之不忘及笄以婦功容自飾而好道請于父母置一靜室披戴父母亦好道許之日以香火瞻禮道像女使侍之必逐於外獨居別有女伴言笑父母看之復不見人詰之不言潔思閑淡雖骨肉常見亦執禮曾無慢容及年二十父母欲歸於李言聞之固不可唯願入道以求度世父母抑之曰女生有歸是禮婦時不可失禮不可虧儻入道不果是無所歸也南嶽魏夫人亦從人育嗣後為上仙遂適李言婦禮臻備未一月告于李言以素修道神人不許為君妻請絕之李言亦慕道從而許焉乃獨居靜室焚修夜中聞言笑聲李言稍疑未之敢驚潛壁隙窺之見光明滿室異香芬馥有二女子年十七八鳳髻霓衣姿態婉麗侍女數人皆雲髻綃服綽約在側玄靜與二女子言談李言異之而退及旦問於玄靜答曰有之此崑崙仙侶相省上仙已知君窺以術止之而君未覺更來慎勿窺也恐君為仙官所責然玄靜與君宿緣甚薄非久在人間之道念君後嗣未立候上仙來當為言之後一夕有天女降李言之室經年復降送一兒與李言此君之子也玄靜即當去矣後三日有五雲盤旋仙女奏樂白鳳載玄靜昇天向西北而去時大中八年八月十八日在溫縣供道村李氏別業出續仙傳戚玄符戚玄符者冀州民妻也三歲得疾而卒父母號慟方甚有道士過其門曰此可救也抱出示之曰此必為神仙適是氣蹶耳衣帶中解黑符以救之良久遂活父母致謝道士曰我北嶽真君也此女可名玄符後得昇天之道言訖不見遂以為名及為民妻而舅姑嚴酷侍奉益謹常謂諸女曰我得人身生中國尚為女子此亦所闕也父母早喪唯舅姑為尊耳雖被箠楚亦無所怨夜有神仙降之授以靈藥不知其所修何道大中十年丙子八月十日昇天出墉城集仙錄徐仙姑徐仙姑者北齊僕射徐之才女也不知其師已數百歲狀貌常如二十四五歲耳善禁呪之術獨遊海內名山勝境無不周徧多宿巖麓林窟之中亦寓止僧院忽為豪僧十輩微詞所嘲姑罵之群僧激怒欲以力制詞色愈悖姑笑曰我女子也而能棄家雲水不避蛟龍虎狼豈懼汝鼠輩乎即解衣而臥遽徹其燭僧喜以為得志遲明姑理策出山諸僧一夕皆僵立尸坐若被拘縛口噤不能言姑去數里僧乃如故來往江表吳人見之四十餘年顏色如舊其行若飛所至之處人畏敬若神明矣無敢戲侮者咸通初謂剡縣白鶴觀道士陶蕢雲曰我先君仕北齊以方術聞名陰功及物今亦得道故我為福所及亦延年長生耳以此推之即之才女也出墉城集仙錄緱仙姑長沙人也入道居衡山年八十餘容色甚少於魏夫人仙壇精修香火十餘年孑然無侶壇側多虎遊者須結隊執兵而入姑隱其間曾無怖畏數年後有一青鳥形如鳩鴿紅頂長尾飛來所居自語云我南嶽夫人使也以姑修道精苦獨棲窮林命我為伴他日又言西王母姓緱乃姑之祖也聞姑修道勤至將有真官降而授道但時未至耳宜勉於修勵也每有人遊山必青鳥先言其姓字又曰河南緱氏乃王母修道之故山也又一日青鳥飛來曰今夕有暴客無害勿以為怖也其夕果有十餘僧來毀魏夫人仙壇乃一大石方可丈餘其下空浮寄他石之上每一人推之則搖動人多則屹然而震是夕群僧持火挺刃將害仙姑入其室姑在床上而僧不見僧既出門即摧壞仙壇轟然有聲山震谷裂謂已顛墜矣而終不能動僧相率奔走及明有遠村至者云十僧中有九僧為虎所食其一不共推故免歲餘青鳥語姑遷居他所因徙居湖南鳥亦隨之而往人未嘗會其語鄭畋畋原作略據明鈔本改下同自承旨學士左遷梧州師事於姑姑謂畋曰此後四海多難人間不可久居吾將隱九疑矣一旦遂去出墉城集仙錄王氏女王氏女者徽之姪也父隨兄入關徽之時在翰林王氏與所生母劉及嫡母裴寓居常州義興縣湖洑渚桂巖山與洞靈觀相近王氏自幼不食酒肉攻詞翰善琴好無為清靜之道及長誓志不嫁常持大洞三十九章道德章句戶室之中時有異香氣父母敬異之一旦小疾裴與劉於洞靈觀修齋祈福是日稍愈亦同詣洞靈佛像前焚香祈祝及曉歸坐於門右片石之上題絕句曰翫水登山無足時諸仙頻下聽吟詩此心不戀居人世唯見天邊雙鶴飛此夕奄然而終及明有二鶴棲於庭樹有仙樂盈室覺有異香遠近驚異共奔看之鄰人以是白於湖洑鎮吏詳驗鶴已飛去因囚所報者裴及劉焚香告之曰汝若得道卻為降鶴以雪鄰人勿使其濫獲罪也良久雙鶴降於庭旬日又降葬於桂巖之下棺輕但聞香氣異常發棺視之止衣舄而已今以桂巖所居為道室即乾符元年也出墉城集仙錄薛玄同薛氏者河中少尹馮徽妻也自號玄同適馮徽二十年乃言素志稱疾獨處焚香誦黃庭經日二三遍又十三年夜有青衣玉女二人降其室將至有光如月照其庭廡香風颯然時秋初殘暑方甚而清涼虛爽飄若洞中二女告曰紫虛元君主領南方下校文籍命諸真大仙於六合之內名山大川有志道者必降而教之玄同善功地司累奏簡在紫虛之府況聞女子立志君尤嘉之即日將親降於此如此凡五夕皆焚香嚴盛以候元君咸通十五年七月十四日元君與侍女群真二十七人降於其室玄同拜迎於門元君憩坐良久示以黃庭澄神存修之旨賜九華丹一粒使八年後吞之當遣玉女飆車迎汝於嵩嶽矣言訖散去玄同自是冥心靜神往往不食雖真仙降眄光景燭空靈風異香雲璈鈞樂奏於其室馮徽亦不知也常復毀笑及黃巢犯關馮與玄同寓晉陵中和元年十月舟行至瀆口欲抵別墅忽見河濱有朱紫官吏及戈甲武士立而序列若迎候狀所在寇盜舟人見之驚愕不進玄同曰無懼也即移舟及之官吏皆拜玄同曰未也猶在春中但去無速也遂各散去同舟者莫測之明年二月玄同沐浴餌紫靈所賜之丹二仙女亦密降其室十四日稱疾而卒有仙鶴三十六只翔集庭宇形質柔緩狀若生人額中有白光一點良久化為紫氣沐浴之際玄髮重生立長數寸十五日夜雲彩滿空忽爾雷電棺蓋飛在庭中失尸所在空衣而已異香群鶴浹旬不休時僖宗在蜀浙西節度使周寶表其事詔付史官出墉城集仙錄戚逍遙冀州南宮人也父以教授自資逍遙十餘歲好道清淡不為兒戲父母亦好道常行陰德父以女誡授逍遙逍遙曰此常人之事耳遂取老子仙經誦之年二十餘適同邑蒯潯舅姑酷責之以蠶農怠情而逍遙旦夕以齋潔修行為事殊不以生計在心蒯潯亦屢責之逍遙白舅姑請返於父母及父母家亦逼迫終以不能為塵俗事願獨居小室修道以資舅姑蒯潯及舅姑俱疑乃棄之於室而逍遙但以香水為資絕食靜想自歌曰笑看滄海欲成塵王母花前別眾真千歲卻歸天上去一心珍重世間人蒯氏及鄰里悉以為妖夜聞室內有人語聲及曉見逍遙獨坐亦不驚又三日晨起舉家聞屋裂聲如雷但見所服衣履在室內仰視半天有雲霧鸞鶴復有仙樂香軿彩仗羅列逍遙與仙眾俱在雲中歷歷聞分別言語蒯潯馳報逍遙父母到猶見之郭邑之人咸奔觀望無不驚歎出續仙傳茶姥廣陵茶姥不知姓氏鄉里常如七十歲人而輕健有力耳聰目明髮鬢滋黑耆舊相傳云晉之南渡後見之數百年顏狀不改每旦將一器茶賣於市市人爭買自旦至暮而器中茶常如新熟未嘗減少吏繫之於獄姥持所賣茶器自牖中飛去出墉城集仙錄張建章張建章為幽州行軍司馬先好經史聚書至萬卷所居有書樓但以披閱清淨為事曾府帥命往渤海遇風波泊舟忽有青衣泛一葉舟而至謂建章曰奉大仙命請大夫建章應之至一大島見樓臺巋然中有女仙處之侍翼甚盛器食皆建章故鄉之常味也食畢告退女仙謂建章曰子不欺暗室所謂君子也勿患風濤之苦吾令此青衣往來導之及還風波寂然往來皆無所懼及廻至西岸經太宗征遼碑半沒水中建章以帛裹麵麵原本作面據明分本改摸而讀之不失一字其篤學如此薊門之人皆能說之出北夢瑣言周寶周寶為浙西節度使治城隍至鶴林門得古冢棺櫝將腐發之有一女子面如生鉛粉衣服皆不敗掌役者以告寶親視之或曰此當時是嘗餌靈藥待時而發發則解化之期矣寶即命改葬之具車轝聲樂以送寶與僚屬登城望之行數里有紫雲覆輀車之上眾咸見一女子出自車中坐于紫雲冉冉而上久之乃沒開棺則空矣出稽神錄
