body:
  text: 楚州人楚州人近楚泗之間有人寄妻及奴婢數人於村落客遊數年一日歸至村中長少相率攜酒訪之延入共飲酒酣甚樂村人唯吹笛為樂神曲殆欲徹曙忽前舞者為著神下語云大王欲與主人相見合與主人論親情此子大驚呵責曰神道無欺我且無兒女與汝何親情神曰我合聘得君妻可速粧梳少頃即來迎娶此子大怒村人各散以為舞者村人醉言無識少頃即天明忽聞門外馬嘶鳴此子大怪欲出自叱之乃見一胡神紫衣多髯身長丈餘首出牆頭喚曰娘子可發去也此子不知所以其妻於室中仆倒而卒陷河神陷河神者雟州雟縣有張翁夫婦老而無子翁日往溪谷採薪以自給無何一日於巖竇間刃傷其指其血滂注滴在一石穴中以木葉窒之而歸他日復至其所因抽木葉視之仍化為一小蛇翁取於掌中戲玩移時此物眷眷然似有所戀因截竹貯而懷之至家則啖以雜肉如是甚馴擾經時漸長一年後夜盜雞犬而食二年後盜羊豕鄰家頗怪失其所畜翁嫗不言其後縣令失一蜀馬尋其迹入翁之居迫而訪之已吞在蛇腹矣令驚異因責翁蓄此毒物翁伏罪欲殺之忽一夕雷電大震一縣並陷巨湫渺彌無際唯張翁夫婦獨存其後人蛇俱失因改為陷河縣曰蛇為張惡子爾後姚萇遊蜀至梓潼嶺上憩于路傍有布衣來謂萇曰君宜早還秦秦人將無主其康濟者在君乎請其氏曰吾張惡子也他日勿相忘萇還後果稱帝于長安因命使至蜀求之弗獲遂立廟于所見之處今張相公廟是也僖宗幸蜀日其神自廟出十餘里列伏迎駕白霧之中髣佛見其形因解佩劍賜之祝令效順指期賊平駕回廣贈珍玩人莫敢窺王鐸有詩刊石曰夜雨龍拋三尺匣春雲鳳入九重城謇宗儒黔南軍校姓謇者不記其初名性鯁直貧而樂所居鄰宣父廟家每食必先薦之如是纍年咸通二年蠻寇侵境廉使閲兵擇將未獲謇忽夢一人冠服若王者謂曰吾則仲尼也愧君每傾心於吾吾當助若乃更名宗儒自此富貴矣既覺喜而請行兼請易名是時人盡難之忽聞宗儒請行遂遣之一戰而大破蠻寇餘孽皆遁黔帥表上其功授朗州刺史秩滿詣京師纍遷司農卿賜賚復多數年卒官滑能唐咸通中翰林待詔滑能棋品最高有張生者年可四十來請對局初饒一路滑生精思久之方下一子張隨手應之或起行庭際候滑生更下又隨應之及黃寇犯闕僖宗幸蜀滑將赴行在欲取金州路入張曰不必前適某非棋客天帝命我取公棋耳滑驚愕妻子啜泣奄然而逝柳晦河東人少有文學始以廕補咸通末官至拾遺因上疏不納乃去官廬於終南山一日入城訪故友於宣陽里忽遇一人求食晦與之此人但三嗅而已晦怪而問之答曰吾陰府掌事者蒙君設食深愧於心君自此三年當為相言訖不見晦未之信也及黃巢犯闕求能檄者或薦晦巢乃馳騎迎之逼使為檄檄達行在僖宗知晦所作乃曰晦自求退非朕遺棄何訕謗之甚耶賊平議不赦巢命晦為中書舍人尋授偽相劉山甫唐彭城劉山甫中朝士族也其父官於嶺外侍從北歸舟於青草湖登岸見有北方天王祠因詣之見廟宇摧頽香火不續山甫少有才思因題詩曰壞牆風雨幾經春草色盈庭一座塵自是神明無感應盛衰何得却由人是夜夢為天王所責自云我非天王南嶽神也主張此地何為見侮俄而驚覺風浪暴起殆欲沉溺遽起悔過令撤詩板然後方定爾朱氏咸通中有姓爾朱者家於巫峽每歲賈於荊益瞿塘之壖有白馬神祠爾朱嘗禱焉一日自蜀回復祀之忽聞神語曰愧子頻年相知吾將捨茲境故明言與君別耳客驚問神安適耶曰吾當為湖南城隍神上帝以吾有薄德於三峽民遂此升擢耳然天下將亂今天子亦不久馭世也爾朱復驚曰嗣君誰也曰唐德尚盛客請其諱神曰固不可泄客懇求之乃曰昨見天符但有雙日也語竟不復言是歲懿皇升遐僖宗以晉王即位李仲呂姑臧李仲呂咸通末調授汝之魯山令為政明練吏不敢欺遇旱請禱群望皆不應仲呂乃潔齋自禱於縣二十里魯山堯祠以所乘烏馬及騶人張翰為獻祭畢將下山雲霧暴起及平澤而大雨僕馬皆暴殞於是仲呂復設祭圖僕馬于東壁新昌坊民青龍寺西廊近北有繪釋氏部族曰毗沙門天王者精彩如動祈請輻湊有居新昌里者因時疫百骸綿弱不能勝衣醫巫莫能療一日自言欲從釋氏因肩置繪壁之下厚施主僧服食於寺廡逾旬夢有人如天王之狀持筋類綆以食病者復促迫之咀嚼堅韌力食袤丈遽覺綿骨木強又明日能步又明日能馳逾月以力聞先是禁軍懸六鈞弓於門曰能引起半者倍糧以賜至滿者又倍之民應募隨引而滿於是服厚祿以終身裴氏女唐黃巢之亂有朝士裴某挈妻子南趨漢中才發京都其室女暴亡兵難揮霍不暇藏瘞行及洛谷夜間其女有言不見其形父母詰之女云我為滻水神子強暴誘我歸其家其父責怒以妄殺生人遽笞之兼遜謝撫慰令人送來而旦夕未有所託且欲隨大人南行俾拔茅為抱致於箱笥之中庶以魂識依止飲食語言不異於常爾後又言已有生處悲咽告辭而去夏侯禎汝州魯山縣西六十里小山間有祠曰靈女觀其像獨一女子焉低鬟嚬蛾艷冶而有怨慕之色祠堂後平地左右圍數畝上擢三峰皆十餘丈森如太華父老云大中初斯地忽暴風疾雨一夕而止遂有此山其神見形於樵蘇者曰吾商於之女也帝命有此百里之境可告鄉里立祠於前山山名女靈吾持來者也咸通末縣主簿皇甫枚因時祭與友人夏侯禎偕行祭畢與禎縱觀禎獨眷眷不能去乃索巵酒酹曰夏侯禎少年未有匹偶今者仰覿靈姿願為廟中掃除之隸既舍爵乃歸其夕夏侯生惝恍不寐若為陰物所中其僕來告枚走視之則目瞪口噤不能言矣謂曰得非女靈乎禎頷之枚命吏禱之曰夏侯禎不勝盞斝之餘至有慢言瀆於神聽今疾作矣豈降之罰耶抑果其請耶若降之罰是以一言而斃一國士乎違好生之德當專戳之辜帝豈不降鑒而使神滋虐於下乎若果其請是以一言舍貞靜之道播淫佚之風念張碩而動雲軿顧交甫而解明珮若九閽一叫必貽幃箔不修之責言況天下多美丈夫何必是也神其聽之奠訖夏侯生康豫如故徐煥弋陽郡東南有黑水河河漘有黑水將軍祠太和中薛用弱自儀曹郎出守此郡為政嚴而不殘一夕夢贊者曰黑水將軍至延之乃魁岸丈夫鬚目雄傑介金附鞬既坐曰某頃溺於茲水自以秉仁義之心得展上訴於帝帝曰爾陰位方崇遂授此任郎中可為立祠河上當保佑斯民言許而寤遂命建祠設祭水旱災沴禱之皆應用弱有葛溪寶劍復夢求之遂以為贈仍刳神前柱并匣置之外設小扉加扃鐍焉乾符戊戌歲大理少卿徐煥以決獄平允授弋陽郡秋七月出京時方霖霪東道泥濘歷崤函度東周由許蔡略無霽日既渡長淮宿于嘉鹿館則弋陽之西境也時方苦雨淒風徒御多寒色煥具酒祈之其夕乃霽煥由是加敬每春秋常祀必躬親之明年冬十月賊黨數千人來攻郡城煥堅守城不可拔乃引兵西入義陽時有無賴者以廟劍言於賊裨將將乃率徒破柱取去既而曉出縱掠氣霧四合莫知所如忽遇一樵童遂執之令前導既越山霧開乃義營張周寨也卒與賊遇盡殺之張周親擒其首解其劍復歸諸廟至今時享不廢羅弘信中和年魏博帥羅弘信初為本軍步射小校掌牧圉之事曾宿於魏州觀音院門外其地有神祠俗號白鬚翁巫有宗千者忽詣弘信謂曰夜來神忽有語君不久為此地主弘信怒曰欲危我耶他日復以此言來告弘信因令密之不期歲果有軍變推弘信為帥弘信狀貌豐偉多力善射雖聲名未振衆已服之纍加至太尉臨淮王李嶢唐乾寧中劉昌美為夔州刺史屬夏潦峽漲湍險里俗云灩澦大如馬瞿塘不可下於是行旅輟棹以候之學士李嶢挈家自蜀沿流將之江陵昌美以水勢正惡止之嶢忽遽而行俄而舟覆一家溺死焉唯乳嫗一人隔夜為駭浪推送江岸而蘇先是永安鹽竈戶陳小奴棹空船下瞿塘見崖下有一人裹四縫帽著窄白衫青袴執鐵蒺䔧問嶢行程自云迎候及乳嫗既蘇亦言於刺史云李學士至一官署上事朱門白壁寮吏參賀又聞云此行無乳嫗名遂送出水
