body:
  text: 玉女玉女唐開元中華山雲臺觀有婢玉女年四十五大疾遍身潰爛臭穢觀中人懼其污染即共送于山澗幽僻之處玉女痛楚呻吟忽有道士過前遙擲青草三四株其草如菜謂之曰勉食此不久當愈玉女即茹之自是疾漸痊不旬日復舊初忘飲食惟恣淓覽但意中飄颻不喜人間及觀之前後左右亦不願過此觀中人謂其消散久矣亦無復有訪之者玉女周旋山中酌泉水食木實而已後於巖下忽逢前道士謂曰汝疾即瘥不用更在人間雲臺觀西二里有石池汝可日至辰時投以小石當有水芝一本自出汝可掇之而食久久當自有益玉女即依其教自後筋骸輕健翱翔自若雖屢為觀中人逢見亦不知為玉女耳如此數十年髮長六七尺體生緑毛面如白花往往山中之人過之則叩頭遙禮而已大曆中有書生班行達者性氣粗疏誹毀釋道為學於觀西序而玉女日日往來石池因以為常行達伺候窺覘又熟見投石採芝時節有準於一日稍先至池上及其玉女投小石水芝果出行達乃搴取玉女遠在山巖或棲樹杪即在採去則呼歎而還明日行達復如此積旬之外玉女稍稍與行達爭先步武相接歘然遽捉其髮而玉女騰去不得因以勇力挈其膚體仍加逼迫玉女號呼求救誓死不從而氣力困憊終為行達所辱扃之一室翌日行達就觀乃見皤然一媼尫瘵異常起止殊艱視聽甚昧行達驚異遽召觀中人細話其事即共伺問玉女玉女備述始終觀中人固有聞知其故者計其年蓋百有餘矣衆哀之因共放去不經月而歿出集異記邊洞玄唐開元末冀州棗強縣女道士邊洞玄學道服餌四十年年八十四歲忽有老人持一器湯餅來詣洞玄曰吾是三山仙人以汝得道故來相取此湯餅是玉英之粉神仙所貴頃來得道者多服之爾但服無疑後七日必當羽化洞玄食畢老人曰吾今先行汝後來也言訖不見後日洞玄忽覺身輕齒髮盡換謂弟子曰上清見召不久當往顧念汝等能不恨恨善修吾道無為樂人間事為土棺散魂耳滿七日弟子等晨往問訊動止已見紫雲昏凝遍滿庭戶又聞空中有數人語乃不敢入悉止門外須臾門開洞玄乃乘紫雲竦身空中立去地百餘尺與諸弟子及法侶等辭訣時刺史源復與官吏百姓等數萬人皆遙瞻禮有頃日出紫氣化為五色雲洞玄冉冉而上久之方滅出廣異記崔書生唐開元天寶中有崔書生於東州邏谷口居好植名花暮春之中英蕊芬鬱遠聞百步書生每初晨必盥盥原作與據明鈔本改漱看之忽有一女自西乘馬而來青衣老少數人隨後女有殊色所乘駿馬極佳崔生未及細視則已過矣明日又過崔生乃於花下先致酒茗樽杓鋪陳茵席乃迎馬首拜曰某性好花木此園無非手植今正值香茂頗堪流眄女郎頻日而過計僕馭當疲敢具單醪以俟憩息女不顧而過其後青衣曰但具酒饌何憂不至女顧叱曰何故輕與人言崔生明日又先及鞭馬隨之到別墅之前又下馬拜請良久一老青衣謂女曰馬大疲暫歇無爽因自控馬至當寢下老青衣謂崔生曰君即未未原作求據明鈔本改婚豫為媒妁可乎崔生大悅載拜跪請青衣曰事亦必定後十五六日大是吉辰君於此時但具婚禮所要并於此備酒肴今小娘子阿姊在邏谷中有小疾故日往看省向某去後便當咨啓期到皆至此矣於是俱行崔生在後即依言營備吉日所要至期女及姊皆到其姊亦儀質極麗送留女歸於崔生崔生母在故居殊不知崔生納室崔生以不告而娶但啓以婢媵母見新婦之姿甚美經月餘忽有人送食於女甘香殊異後崔生覺母慈顏衰悴因伏問几下母曰有汝一子冀得求全今汝所納新婦妖媚無雙吾於土塑圖畫之中未曾見此必是狐魅之輩傷害於汝故致吾憂崔生入室見女淚涕交下曰本侍箕帚望以終天不知尊夫人待以狐魅輩明晨即別崔生亦揮涕不能言明日女車騎復至女乘一馬崔生亦乘一馬從送之入邏谷三十里山間有一川川中有異花珍果不可言紀館宇屋室侈於王者青衣百許迎拜曰無行崔郎何必將來於是捧入留崔生於門外未幾一青衣女傳姊言曰崔郎遺遺原作遣據明鈔本改行太夫人疑阻事宜便絶不合相見然小妹曾奉周旋亦當奉屈俄而召崔生入責誚再三詞辨清婉崔生但拜伏受譴而已後遂坐於中寢對食食訖命酒召女樂洽奏鏗鏘萬變樂闋其姊謂女曰須令崔郎卻回汝有何物贈送女遂袖中取白玉盒子遺崔生生亦留別於是各嗚咽而出門至邏谷口回望千巖萬壑無有遠路因慟哭歸家常持玉盒子鬱鬱不樂忽有胡僧扣門求食曰君有至寶乞相示也崔生曰某貧士何有是請僧曰君豈不有異人奉贈乎貧道望氣知之崔生試出玉盒子示僧僧起請以百萬市之遂往崔生問僧曰女郎誰耶曰君所納妻西王母第三女玉巵娘子也姊亦負美名於仙都況復人間所惜君納之不得久遠若住得一年君舉家不死矣出玄怪録驪山姥不知何代人也李筌好神仙之道常歷名山博採方術至嵩山虎口巖石室中得黃帝陰符本絹素書緘之甚密題云大魏真君二年七月七日道士寇謙之藏之名山用傳同好以糜爛筌抄讀數千遍竟不曉其義理因入秦至驪山下逢一老母鬢髻當頂餘髮半垂弊衣扶杖神狀甚異路旁見遺火燒樹因自言曰火生於木禍發必剋筌聞之驚前問曰此黃帝陰符祕文母何得而言之母曰吾受此符已三元六周甲子矣三元一周計一百八十年六周共計一千八十年矣一千八十年矣原作一千八年據陳校本改少年從何而知筌稽首載拜具告得符之所因請問玄義使筌正立向明視之曰受此符者當須名列仙籍骨相應仙而後可以語至道之幽妙啓玄關之鎖鑰耳不然者反受其咎也少年顴骨貫於生門命輪齊於日角血脈未減心影不偏性賢而好法神勇而樂智真吾弟子也然四十五歲當有大厄因出丹書符一通貫於杖端令荃跪而吞之曰天地相保於是命坐為説陰符之義曰陰符者上清所祕玄臺所尊理國則太平理身則得道非獨機權制勝之用乃至道之要樞豈人間常典耶昔雖有明鈔本雖有作蚩尤暴橫黃帝舉賢用能誅強伐叛以佐神農之理三年百戰而功用未成齋心告天罪己請命九靈金母命蒙狐之使授以玉符然後能通天達誠感動天帝命玄女教其兵機賜帝九天六甲兵信之符此書乃行於世凡三百餘言一百言演道一百言演法一百言演術上有神仙抱一之道中有富國安民之法下有強兵戰勝之術皆出自天機合乎神智觀其精妙則黃庭八景不足以為玄察其至要則經傳子史不足以為文較其巧智則孫吳韓白不足以為奇一名黃帝天機之書非奇人不可妄傳九竅四肢不具慳貪愚癡驕奢淫佚者必不可使聞之凡傳同好當齋而傳之有本者為師受書者為弟子不得以富貴為重貧賤為輕違之者奪紀二十每年七月七日寫一本藏名山石巖中得加算本命日誦七遍益心機加年壽出三尸下九蟲祕而重之當傳同好耳此書至人學之得其道賢人學之得其法凡人學之得其殃職明鈔本陳校本職作識分不同也經言君子得之固躬小人得之輕命蓋泄天機也泄天機者沉三劫得不戒哉言訖謂筌曰日已晡矣吾有麥飯相與為食袖中出一瓠命筌於谷中取水既滿瓠忽重百餘斤力不能制而沉泉中卻至樹下失姥所在惟於石上留麥飯數升悵望至夕不復見姥筌食麥飯自此不食因絶粒粒字原闕據明鈔本許刻本補求道注陰符述二十四機著太白陰經述中台志閫外春秋以行於世仕為荊南節度副使仙州刺史出集仙傳黃觀福黃觀福者雅州百丈縣民之女也幼不茹葷血好清靜家貧無香以柏葉柏子焚之每凝然靜坐無所營為經日不倦或食柏葉飲水自給不嗜五穀父母憐之率任其意既笄欲嫁之忽謂父母曰門前水中極有異物女常時多與父母説奇事先兆往往信驗聞之因以為然隨往看之水果來洶涌乃自投水中良久不出漉之得一古木天尊像金彩已駁狀貌與女無異水即澄靜便以木像置路上號泣而歸其母時來視之憶念不已忽有綵雲仙樂引衛甚多與女子三人下其庭中謂父母曰女本上清仙人也有小過謫在人間年限既畢復歸天上無至憂念也同來三人一是玉皇侍女一是天帝侍辰女一是上清侍書此去不復來矣今來此地疾疫死者甚多以金遺父母使移家益州以避凶歲即留金數餅升天而去父母如其言移家蜀郡其歲疫毒黎雅尤甚十喪三四即唐麟德年也今俗呼為黃冠佛蓋以不識天尊道像仍是相傳語訛以黃冠福為黃冠佛也出集仙傳
