body:
  text: 蘇娥蘇娥漢何敞為交趾刺史行部蒼梧郡高要縣暮宿鵲奔亭夜猶未半有一女從樓下出自云妾姓蘇名娥字始珠本廣信縣修理廣信原作信廣據下文及明鈔本改理明鈔本作里人早失父母又無兄弟夫亦久亡有雜繒帛百二十匹及婢一人名致富孤窮羸弱不能自振欲往傍縣賣繒就同縣人王伯賃車牛一乘直錢萬二千載妾並繒令致富執轡以前年四月十日到此亭外于時已暮行人既絶不敢前行因即留止致富暴得腹痛妾往亭長舍乞漿取火亭長龔壽操刀持戟來至車傍問妾曰夫人從何所來車上何載丈夫安在何故獨行妾應之曰何勞問之壽因捉臂欲汙妾不從壽即以刀刺脅妾立死又殺致富壽掘樓下埋妾並婢取財物去殺牛燒車杠及牛骨投亭東空井中妾死痛酷無所告訴故來告於明使君敞曰今欲發汝尸骸以何為驗女子曰妾上下皆著白衣青絲履猶未朽也掘之果然敞乃遣吏捕壽拷問具服下廣信縣驗問與娥語同收壽父母兄弟皆繫獄敞表壽殺人於常律不至族誅但壽為惡隱密經年王法所不能得鬼神自訴千載無一請皆斬之以助陰誅上報聽之出還冤記涪令妻漢王忳字少琳為郿縣令之邰亭亭素有鬼忳宿樓上夜有女子稱欲訴冤無衣自進忳以衣與之進曰妾本涪令妻也欲往官過此亭宿亭長殺妾大小十口埋在樓下取衣裳財物亭長今為縣門下遊徼忳曰當為汝報之無復妄殺良善也鬼投衣而去忳且召遊徼問即服收同時十餘人並殺之掘取諸喪歸其家葬之亭永清寧原闕出處今見還冤記諸葛元崇琅琊諸葛覆宋永嘉年為九真太守家纍悉在揚都唯將長子元崇赴職覆於郡病亡元崇始年十九送喪欲還覆門生何法僧貪其資與伴共推元崇墮水而死因分其財元崇母陳氏夢元崇還具敘父亡及身被殺委曲尸骸流漂怨酷無雙奉違纍載一旦長辭銜悲茹恨如何可説覷欷不能自勝又云行速疲極因臥窗下床上以頭枕窗明日視兒眠處足知非虛矣陳氏悲怛驚起把火照兒眠處沾濕猶如人形於是舉家號泣便如發聞于時徐森之始除交州徐道立為長史道立即陳氏從姑兒也具疏夢託二徐驗之徐道立遇諸葛喪船驗其父子亡曰悉如鬼語乃收行凶二人即皆款服依法殺之差人送喪還揚都出還冤記呂慶祖宋永康人呂慶祖家甚殷富常使一奴名教子守視墅舍慶祖自往案行忽為人所殺族弟無期先貸舉慶祖錢咸謂為害無期便齎酒脯至柩所而祝曰君荼酷如此乃謂是我魂而有靈使知其主既還至三更見慶祖來云近履行見奴教子畦疇不理許當痛治奴遂以斧砍我背將帽塞口因得齧奴三指悉皆破醉便取刀刺我頸曳著後門初見殺時從行人亦在其中而不同執罪之失也奴今欲叛我已釘其頭著壁言卒而遂滅無期具以告其父母潛視奴所住壁果有一把髮以竹釘之又看其指並見傷破録奴詰驗承伏又問汝既反逆何以不叛奴曰頭如被繫欲逃不得諸同見者事相符即焚教子並其二息出還冤記元徽後魏莊帝永安中北海王皓入洛莊帝北巡城陽王徽捨宅為宣中寺爾朱兆擒莊帝徽投前洛陽令寇祖仁祖仁聞爾朱兆購徽乃斬徽首送兆兆夢徽曰我有金二百斤馬一百匹在祖仁家卿可取之兆於是懸祖仁首於高樹以大石墜其足鞭箠之問得金及馬而祖仁死時以為禍報出廣古今五行記明鈔本作出伽藍記及還冤記李義琰唐隴西李義琰貞觀年中為華州縣尉此縣忽失一人莫知所在其父兄疑一讎家所害詣縣陳情義琰案之不能得決夜中執燭委細窮問至夜義琰據案俯首不覺死人即在猶帶被傷之狀云某乙打殺置於某所井中公可早驗不然恐被移向他處不可尋覓義琰即親往果如所陳而讎家始具款伏當聞見者莫不驚歎出法苑珠林岐州寺主唐貞觀十三年岐州城內有寺主共都維那為隙遂殺都維那解為十二段置於廁中寺僧不見都維那久遂告別駕楊安共來驗檢都無蹤迹別駕欲出諸僧送別駕見寺主左臂上袈裟忽有些鮮血別駕勘問云當殺之夜不著袈裟有其鮮血是諸佛菩薩所為竟伏誅出廣古今五行記館陶主簿唐冀州館陶縣主簿姓周忘其名字顯慶中奉使於臨渝關牙市當去之時佐使等二人從往周將錢帛稍多二人乃以土囊壓而殺之所有錢帛咸盜將去唯有隨身衣服充斂至歲暮妻夢具説被殺之狀兼言所盜財物之處妻乃依此訴官官司案辨具得實狀錢帛並獲二人皆坐處死相州智力寺僧慧永云嘗親見明庭觀道士劉仁寬説之出法苑珠林僧曇暢唐乾封年中京西明寺僧曇暢將一奴二騾向岐州稜法師處聽講道逢一人著衲帽弊衣掐數珠自云賢者五戒講夜至馬嵬店宿五戒禮佛誦經半夜不歇暢以為精進一練至四更即共同發去店十餘里忽袖中出兩刃刀子刺殺暢其奴下馬入草走其五戒騎騾驅馱即去主人未曉夢暢告云昨夜五戒殺貧道須臾奴走到告之如夢時同宿三衛子披持弓箭乘馬趁四十餘里以弓箭擬之即下騾乞死縛送縣決殺之出朝野僉載午橋民唐衛州司馬杜某嘗為洛陽尉知捕寇時洛陽城南午橋有人家失火七人皆焚死杜某坐廳事忽有一人為門者所執狼狽至前問其故門者曰此人適來若大驚恐狀再馳入縣門復馳出故執之其人曰某即殺午橋人家之賊也故來歸命嘗為伴五人同劫其家得財物數百千恐事泄則殺其人焚其室如自焚死者故得人不疑將財至城舍於道德里與其伴欲出外輒坎軻不能去今日出道德坊南行忽見空中有火六七團大者如瓠小者如杯遮其前不得南出因北走有小火直入心中爇其心腑痛熱發狂因為諸火遮繞驅之令入縣門及入則不見火心中火亦盡於是出門火又盡在空中遮不令出自知不免故備言之由是命盡取其黨及財物於府殺之出紀聞盧叔敏唐盧叔敏居緱氏縣即故太傅文貞公崔祐甫之表姪時祐甫初拜相有書與盧生令應明經舉生遂自緱氏赴京行李貧困有驢兩頭叉袋一奴才十餘歲而已初發縣有一紫衣人擎小襆與生同行云送書狀至城辭氣甚謹生以僮僕小甚利其作侶扶接鞍乘每到店必分以茶酒紫衣者亦甚知愧至鄂嶺早發十餘里天才明紫衣人與小奴驅驢在後忽聞奴叫呼聲云被紫衣毆擊生曰奴有過但言必為科決何得便自打也言訖已見紫衣人懷中抽刀刺奴洞腸流血生乃驚走初尚乘驢行數十步已見紫衣人趁在後棄驢並靴馳十數步紫衣逐及以刀刺倒與奴同死於嶺上時緱氏尉鄭楚相與生中外兄弟晨起於廳中忽困睡夢生被髮血污面目謂尉曰某已被賊殺矣因問其由曰某枉死然此賊今捉未得乃牽白牛一頭來跛左腳曰兄但記此牛明年八月一日平明賊從河中府與同黨買牛來於此過入西郭門最後驅此者即是鄭君驚覺遂言於同僚至明日府牒令捉賊方知盧生已為賊所殺於書帙中得崔相手札河南尹捕捉甚急都無蹤迹至明年七月末鄭君與縣宰計議至其日五更潛布弓矢手力於西郭門外鄭君領徒自往伏於路側至日初出果有人驅牛自西來者後白牛跛腳行遲不及其隊有一人驅之其牛乃鄭君夢中所見盧生牽者遂擒掩之並同黨六七盡得驅跛牛者乃殺盧生賊也問之悉伏云此郎君於某有恩某見其囊中書謂是綾絹遂劫殺之及開之知非也唯得絹兩匹耳自此以來常髣佛見此郎君在側如未露尚欲歸死已就執豈敢隱諱乎因具言其始末與其徒皆死於市出逸史鄭生唐滎陽鄭生善騎射以勇悍趫捷聞家於鞏雒之郊嘗一日乘醉手弓腰矢馳捷馬獨驅田野間去其居且數十里會天暮大風雨生庇於大木下久之得雨霽已夕矣迷失道縱馬行見道傍有門宇乃神廟也生以馬繫門外將止屋中忽栗然心動即匿身東廡下聞廟左空舍中窣窣然生疑其鬼因引弓震弦以伺之俄見一丈夫身長衣短後卓衣負囊仗劍自空舍中出既而倚劍揚言曰我盜也爾豈非盜乎鄭生曰吾家於鞏雒之郊向者獨驅田間適遇大風雨迷而失道故匿身於此仗劍者曰子既不為盜得無害我之心乎且我遁去道必經東廡下願解弓弦以授我使我得去不然且死於豎子矣先是生常別以一弦致袖中既解弦投于劍客前密以袖中弦繫弓上賊既得弦遂至東廡下將殺鄭生以滅口急以矢繫弦賊遂去因曰吾子果智者某罪固當死矣生曰我不為害爾何為疑我賊再拜謝生即去西廡下以避賊既去生懼其率徒再來於是登木自匿久之星月始明忽見一婦人貌甚冶自空舍中出泣於庭問之婦人曰妾家於村中為盜見誘至此且利妾衣裝遂殺妾空舍中棄其尸而去幸君子為雪其冤又曰今夕當匿於田橫墓願急逐之無失生諾之婦人謝而去及曉生視之果見尸即馳馬至洛具白於河南尹鄭叔則尹命吏捕之果得賊於田橫墓中出宣室志
