body:
  text: 劉憲劉憲尚書李寰鎮平陽時有衙將劉憲者河朔人性剛直有膽勇一夕見一白衣來至其家謂憲曰府僚命汝甚急可疾赴召也憲怒曰吾軍中裨將未嘗有過府僚安得見命乎白衣曰君第去勿辭不然禍及憲震聲叱之白衣馳去行未數步已亡所在憲方悟鬼也夜深又至呼憲憲私自計曰吾聞生死有命焉可以逃之即與偕往出城數里至一公署見冥官在廳有吏數十輩列其左右冥官聞憲至整中幘降階盡禮已而延坐謂憲曰吾以子勇烈聞故遣奉命憲曰未委明公見召之旨冥官曰地府有巡察使以巡省嶽瀆道路有不如法者得以察之亦重事非剛烈者不可以委焉願足下俯而任之憲謝曰某無他才願更擇剛勇者委之冥官又曰子何拒之深耶于是命案掾立召洪洞縣吏王信訖即遣一吏送憲歸憲驚寤復數日寰命憲使北都行次洪洞縣因以事話於縣寮縣寮曰縣有吏王信者卒數日矣張汶右常侍楊潛嘗自尚書郎出刺西河郡時屬縣平遙有鄉吏張汶者無疾暴卒數日而寤初汶見亡兄來詣其門汶甚驚因謂曰吾兄非鬼耶何為而來兄泣曰我自去人間常常屬念親友若瞽者不忘視也思平生歡豈可得乎今冥官使我得歸而省汝汶曰冥官為誰曰地府之官權位甚尊吾今為其吏往往奉使至里中比以幽明異路不可詣汝之門今冥官召汝汝可疾赴汶懼辭之不可牽汶袂而去行十數里路矄黑不可辨但聞馬車馳逐人物喧語亦聞其妻子兄弟呼者哭者皆曰且議喪具汶但與兄俱進莫知道途之幾何因自念我今死矣然常聞人死當盡見親友之歿者今我即呼之安知其不可哉汶有表弟武季倫者卒且數年與汶善即呼之果聞季倫應曰諾既而俱悲泣汶因謂曰令弟之居為何所也何為矄黑如是季偷曰冥途幽晦無日月之光故也又曰恨不可盡今將去矣汶曰今何往季倫曰吾平生時積罪萬狀自委身冥途日以戮辱向聞兄之語故來與兄言今不可留又悲泣久之遂別呼親族中亡歿者數十咸如季倫應呼而至多言身被塗炭詞甚凄咽汶雖前去亦不知將止何所但常聞妻子兄弟號哭及語音歷然在左右因遍呼其名則如不聞焉久之有一人厲呼曰平遙縣吏張汶汶既應曰諾又有一人責怒汶問平生之過有幾汶固拒之於是命案掾出文之籍頃聞案掾稱曰張汶未死願遣之冥官怒曰汶未當死何召之掾曰張汶兄今為此吏向者許久處冥途為投且甚請以弟代雖未允其請今召至此冥官怒其兄曰何為自召生人不顧吾法即命囚之而遣汶歸汶謝而出遂獨行以道路熏晦惶惑且甚俄頃忽見一燭在數十里外光形極微汶喜曰此燭將非人居乎馳走望形而去可行百餘里方覺其形稍近迫而就之乃見己身偃臥于榻其室有燭果汶見者自是寤汶即以冥中所聞妻子兄弟號哭及議喪具訊其家無一異者隰州佐史隰州佐史死數日后活云初閻羅王追為典史自陳素不解案王令舉其所知某荐同曹一人使出帖追王問佐史汝算既未盡今放汝還因問左右此人在生有罪否左右云此人曾殺一犬一蛇王曰犬聽合死蛇復何故枉殺蛇者法合殊死令某回頭以熱鐵汁一杓灼其背受罪畢遣使送還吏就某索錢一百千文某云我素家貧何因得辦吏又覓五十千亦答云無吏云汝家有胡錢無數何得訴貧某答胡錢初不由己吏言取之即得何故不由領某至家取錢胡在床上臥胡兒在錢堆上坐未得取錢且暫入庭中狗且吠之某以腳蹴狗叫而去又見其婦營一七齋取面做飯極力呼之婦殊不聞某怒以手牽領巾婦躓于地久之外人催之及出胡兒猶在錢上某徑以拳拳其肋胡兒悶絶乃取五十千付使者因得放遂活活時胡兒病尚未愈后經紀竟折五十千也鄧儼會昌元年金州軍事典鄧儼先死數年其案下書手蔣古者忽心痛暴卒如人捉至一曹司見鄧儼喜曰我主張甚重籍爾録數百幅書也蔣見堆案繞壁皆涅楮朱書乃紿曰近損右臂不能搦管旁有一人謂鄧既不能書可令還也蔣草草被領還隕一坑中而覺因病右手遂廢貝禧義興人貝禧為邑之鄉胥乾寧甲寅歲十月宿於茭瀆別業夜分忽聞叩門者人馬之聲甚衆出視之見一人緑衣秉簡西面而立從者百餘禧攝衣出迎自通曰隆姓周弟十八即延入坐問以來意曰身為地府南曹判官奉王命召君為北曹判官爾禧初甚驚懼隆曰此乃陰府要職何易及此君無辭也俄有從者持床榻食案帷幕陳設畢滿置酒食對飲良久一吏趨入白殷判官至復有一緑衣秉簡二從者捧箱隨之箱中亦緑衣殷揖禧曰命賜君兼同奉召即以緑裳為禧衣之就坐共飲可至五更曰王命不可留矣即相與同行禧曰此去家不遠暫歸告別可乎皆曰君今已死縱歸可復與家人相接耶乃出門與周殷各乘一馬其疾如風涉水不溺至暮宿一村店店中具酒食而無居人雖設燈燭如隔帷幔云已行二千余里矣向曉復行久之至一城門衛嚴峻周殷先入復出召禧凡經三門左右吏卒皆趨拜復入一門正北大殿垂簾禧趨走參謁一同人間既出周謂禧曰北曹闕官多年第宅曹署皆須整緝君可暫止吾家也即自殿門東行可一里有大宅止禧于東廳頃之有同官可三十余人皆來造請慶賀遂置宴宴罷醉臥至曉遍詣諸官曹報謝復有朱衣吏以王命至錢帛車馬饔餼甚丰備翌日周謂禧曰可視事矣又相與向王殿之東北有大宅陳設甚嚴止禧于中有典吏可八十余人參請給使廳之南大屋數十間即曹局簿書充積其內廳之北別室兩間有幾案及數書廚皆雜寶飾之周以金鑰授禧曰此廚簿書最為祕要管鑰恆當自掌勿輕委人也周既去禧開視之書册積疊皆方尺余首取一册金題其上陝州字其中字甚細密諦視之乃可見皆世人之名簿也禧欲知其家事復開一廚乃得常州簿閲其家籍見身及家人世代名字甚悉其已死者以墨鉤之至晚周判官復至曰王以君世壽未盡遣暫還壽盡當復居此職禧即以金鑰還授于周禧始閲簿時盡記其家人及己禍福壽夭之事至是昏然盡忘矣頃之官吏俱至告別周殷二人送之歸翌日夜乃至茭瀆村中入室見己臥于床上周殷與禧各就寢俄而驚寤日正午時問其左右云死始半日而地府已四日矣禧既愈一如常人亦無小異又四十余年乃卒干慶晉有干慶者無疾而終時有術士吳猛語慶之子曰干侯算未窮我為試請命未可殯斂尸臥靜舍唯心下稍暖居七日猛凌晨至以水激之日中許慶蘇焉旋遂張目開口尚未發聲闔門皆悲喜猛又令以水含灑乃起吐血數聲兼能言語三日平復初見十數人來執縛桎梏到獄同輩十余人以次旋對次未至俄見吳君北面陳釋王遂敕脫械令歸所經官府皆見迎接吳君而吳君與之抗禮即不知悉何神也陳良大元中北地人陳良與沛國劉舒友善又與同郡李焉共為商賈曾獲厚利共致酒相慶焉遂害良以葦裹之棄之荒草經十許日良復生歸家説死時見一人著赤幘引良去造一城門門下有一床見一老人執朱筆點校籍赤幘人言曰向下土有一人姓陳名良遊魂而已未有統攝是以將來校籍者曰可令便去良既出忽見友人劉舒謂曰不圖于此相見卿今幸蒙尊神所遣然我家廁屋后桑樹中有一狸常作妖怪我家數數橫受苦惱卿歸豈能為我説此耶良然之既蘇乃詣官疏李焉而伏罪仍特報舒家家人涕泣云悉如言因伐樹得狸殺之其怪遂絶楊大夫楊大夫者宦官也亡其名年十八歲為冥官所攝無疾而死經日而蘇云既到陰冥間有廨署官屬與世無異陰官以案牘示之見名字歷歷然云年壽十八歲而已楊亦無言請托旁有一人為其請乞願許再生詞意極切久之而冥官許即令卻還其人亦送楊數百步將別楊愧謝之不知即今再生之恩何以為報問其所欲其人曰或遺鳴砂弓即相報也因以大銅錢一百餘與楊俄然而覺平復無苦自是求訪鳴砂弓亦莫能致或作小宮闕屋子焚而報之如是者數矣楊頗留心爐鼎志在丹石能制返魂丹有疾疫暴病死者研丹一粒拗開其口灌之即活嘗救數人有閹官夏侯得楊丹五粒戒云有急即吞一丸夏侯一旦得疾狀甚危篤取一粒以服之既而為冥官追去責問之次白云某曾服楊大夫丹一粒耳冥官即遣還夏侯得丹之效既蘇盡服四丸歲余又見黃衣者追捕之云非是冥曹乃太山追之耳夏侯隨去至高山之下有宮闕焉及其門見二道士問其平生所履一一對答徐啓曰某曾服楊大夫丹五粒矣道士卻令即回夏侯拜謝曰某是得神丹之力延續年命願改名延可乎道士許之復活因改名延矣楊自審丹之靈效常以救人其子暄因自畿邑歸京未明行二十余里歇于大莊之上忽聞莊中有驚喧哭泣之聲問其故主人之子暴卒暄解衣帶中取丹一粒令研而灌之良久亦活楊物産贍足早解所任縱意間放唯以金石為務未嘗有疾年九十七而終晚年遇人攜一弓問其名云鳴砂弓也於角面之內中有走砂楊買而焚之以報見救之者其返魂丹方云是救者授之自密修制故無能得其術者李主簿妻選人李主簿者新婚東過華嶽將妻入廟謁金天王妻拜次氣絶而倒唯心上微暖過歸店走馬詣華陰縣求醫卜之人縣宰曰葉仙師善符術奉詔投龍回去此半驛公可疾往迎之李公單馬奔馳五十余里遇之李生下馬拜伏流涕具言其事仙師曰是何魅怪敢如此遂與先行謂從者曰鞍馱速馳來待朱鉢及筆至店家已聞哭聲仙師入見事急矣且先將筆墨及紙來遂畫符焚香以水噀之符化北飛去聲如旋風良久無消息仙師怒又書一符其聲如雷又無消息少頃鞍馱到取朱筆等令李左右煮少許薄粥以候其起乃以朱畫一道符噴水叱之聲如霹靂須臾口鼻有氣漸開眼能言問之某初拜時金天王曰好夫人第二拜云留取遣左右扶歸院適已三日親賓大集忽聞敲門門者走報王王曰何不逐卻乃第一符也逡巡門外鬧甚門者數人細語於王耳王曰且發遣第二符也俄有赤龍飛入正扼王喉才能出聲曰放去某遂有人送乃第三符也李生罄裝以謝葉師一無所取是知靈廟女子不得入也
