body:
  text: 美婦人夷光越謀滅吳畜天下奇寶美人異味以進於吳得陰峰之瑤古皇之驥湘沅之鱓又有美女一名夷光二名修明以貢於吳吳處於椒花之房貫細珠以為簾幌朝下以蔽景夕卷以待月二人當軒並坐理鏡靚粧於珠幌之內竊窺者莫不動心驚魂謂之神人吳王夫差目之若雙鸞之在輕霧沚水之漾秋蕖妖惑既深怠於國政及越兵入國乃抱二人以逃吳苑越軍既入見二人在竹樹下皆言神女望而不侵今吳城虵門內有折株尚為祠神女之處麗娟漢武帝所幸宮人名曰麗娟年始十四玉膚柔軟吹氣如蘭身輕弱不欲衣纓拂恐傷為痕每歌李延年和之於芝生殿旁唱迴風之曲庭中樹為之翻落常致娟於琉璃帳恐垢污體也常以衣帶繫娟被閉於重幕中恐隨風起娟以琥珀為佩置衣裾裏不使人知乃言骨節自鳴相與為神怪也趙飛鷰漢趙飛鷰體輕腰弱善行步進退女弟昭儀不能及也但弱骨豐肌尤笑語二人並色如紅玉當時第一擅殊寵後宮薛靈芸魏文帝所愛美人薛靈芸常山人也父名鄴為酇鄉亭長母陳氏隨鄴舍於亭傍居生窮賤至夜每聚鄰婦績以麻藁自照靈芸年十五容貌絕世閭中少年多以夜時來窺終不得見咸熙元年谷習出守常山郡聞亭長有美女而家甚貧時文帝選良家子女以入六宮習以千金寶賂聘之既得便以獻文帝靈芸聞別父母歔欷累日淚下霑衣至升車就路之時以玉唾壺盛淚壺中即如紅色既發常山及至京師壺中淚凝如血帝遣車十乘以迎靈芸車皆鏤寶為輪丹畫其轂軛前有雜寶為龍鳳銜百子鈴鏘和鳴響於林野駕青色駢蹄之牛日行三百里此牛尸塗國所獻足如馬蹄也道側燒石葉之香此石重疊狀如雲母其氣辟惡厲之疾腹題國所獻也靈芸未至京師數十里膏燭之光相續不滅車徒噎路塵起蔽於星月時人謂為塵霄又築土為臺基高三十丈列燭於臺下而名曰燭臺遠望如列星之墜地又於大道之傍一里致一銅表高五尺以誌里數故行者歌曰青槐夾道多塵埃龍樓鳳闕望崔嵬清風細雨雜香來土上出金火照臺時為銅柱以誌里數於道側是土上出金之義以燭致臺而則火在土下之義漢火德王魏土魏王火伏而土興也土上出金魏滅而晉興也靈芸未至京師十里帝乘雕玉之輦以望車徒之盛嘆曰昔者言朝為行雲暮為行雨今非雲非雨非朝非暮因改靈芸之名為夜來入宮乘寵愛外國獻火珠龍鸞之釵帝曰明珠翡翠尚不勝況乎龍鳳之重乃止而不進夜來妙於女功雖處於深帷重幄之內不用燈燭裁制立成非夜來所縫製帝不服也宮中號曰神針孫亮姬朝姝孫亮作綠琉璃屏風甚薄而瑩澈每於月下清夜舒之嘗愛寵四姬皆振古絕色一名朝姝二名麗居三名洛珍四名潔華使四人坐屏風內而外望之如無隔唯香氣不通於外為四人合四氣香此香殊方異國所獻凡經歲踐躡宴息之處香氣沾衣歷年彌盛百浣不歇因名百濯香或以人名香故有朝姝麗居洛珍潔華香亮每遊此四人皆同與席使來侍皆以香名前後為次不得相亂所居室為思香媚寢蜀甘后蜀先主甘后沛人生於賤微里中相者云此女後貴位極宮掖及后生而體貌特異年至十八玉質柔肌態媚容冶先主致后於白綃帳中於戶外望者如月下聚雪河南獻玉人高三尺乃取玉人致后側晝則講說軍謀夕則擁后而玩玉人常稱玉之所貴比德君子況為人形而可不玩乎甘后與玉人潔白齊潤觀者殆相亂惑嬖寵者非唯嫉甘后而亦妬玉人后常欲琢毀壞之乃戒先主曰昔子罕不以玉為寶春秋美之今吳魏未滅安以妖玩經懷凡誣惑生疑勿復進焉先主乃撤玉人像嬖者皆退當時君子以甘后為神智婦人石崇婢翾風石季倫所愛婢名翾風魏末於胡中買得之年始十歲使房內養之至年十五無有比其容貌特以姿態見美妙別玉聲能觀金色石氏之富財比王家驕侈當世珍寶瑰奇視如瓦礫聚如糞土皆殊方異國所得莫有辨識其處者使翾風別其聲色並知其所出之地言西方北方玉聲沈重而性溫潤佩服益人性靈東方南方玉聲清潔而性清涼佩服者利人精神石氏侍人美艷者數千人翾風最以文辭擅愛石崇常語之曰吾百年之後當指白日以汝為殉答曰生愛死離不如無愛妾得為殉身其何朽於是彌見寵愛崇常擇美容姿相類者數十人裝飾衣服大小一等使忽視不相分別常侍于側使翾風調玉以付工人為倒龍之珮縈金為鳳冠之釵刻玉為倒龍之勢鑄金像鳳凰之形結袖繞楹而舞晝夜相接謂之常舞若有所召者不呼姓名悉聽珮聲視釵色玉聲輕者居前金色艷者居後以為行次而進也使數十人各含異香使行而笑語則口氣從風而颺又篩沈水之香如塵末布致象牀上使所愛踐之無跡即賜珍珠百粒若有跡者則節其飲食令體輕弱乃閨中相戲曰爾非細骨輕軀那得百粒真珠及翾風年至三十妙年者爭嫉之或言胡女不可為群競相排毀崇受譖潤之言即退翾風為房老使主群少乃懷怨懟而作五言詩詩曰春華誰不羨卒傷秋落時哽咽追自泣鄙退豈所期桂芬徒自蠹失愛在蛾眉坐見芳時歇憔悴空自嗤石氏房中並歌此為樂曲至晉末乃止浙東舞女寶曆二年浙東貢舞女二人一曰飛鷰一曰輕風修眉黟首蘭氣融冶冬不纊衣夏無汗體所食多荔枝榧實金屑龍腦之類帶輕金之冠軿羅衣無縫而成其文織巧人未能識輕金冠以金絲結之為鷰鶴之狀仍飾以五彩細珠玲瓏相續可高一尺秤之無三二錢上更琢玉芙蓉以為頂二女歌舞臺每夜歌舞一發如鸞鳳之音百鳥莫不翔集其上及於庭際舞態艷逸非人間所有每歌罷上令內人藏之金屋寶帳蓋恐風日故也由是宮中女曰寶帳香重重一雙紅芙蓉車武子妻俗說車武子妻大妬呼其婦兄宿取一絳裙衣挂屏風上其婦拔刀徑上牀發被乃其兄也慚而退段氏臨濟有妬婦津傳言晉太始中劉伯玉妻段氏字明光性妬忌伯玉嘗於妻前誦洛神賦語其妻曰取婦得如此吾無憾焉明光曰君何得以水神美而欲輕我吾死何患不為水神其夜乃自沈而死死後七日夢見與伯玉曰君本願神吾今得為神矣伯玉遂終身不復渡水有婦人渡此津者皆壞衣枉粧然後敢濟不爾風波暴發醜婦雖粧飾而渡其神亦不妬也婦人渡河無風浪者以為醜不能致水神醜婦諱之莫不皆自毀形容以塞嗤笑也故齊人語曰欲求好婦立在津口婦人水傍好醜自彰王導妻王導妻曹氏甚妬忌制丞相不得有侍御乃至左右小人有姘少者必加誚責乃密營別館眾妾羅列有數男曹氏知大驚恚乃將黃門及婢二十人人持食刀欲出討尋王公遽命駕患遲乃親以塵尾柄助御者打牛狼狽奔馳乃得先至司徒蔡謨聞乃詣王謂曰朝廷欲加公九錫知否王自敘謀志蔡曰不聞餘物惟聞短轅犢車長柄塵尾耳導大慚杜蘭香杜蘭香降張碩碩妻無子娶妾妻妬無已碩謂香如此云何香曰此易治耳言卒而碩妻患創委頓碩曰妻將死如何香曰此創所以治妬創已亦當瘥數日之間創損而妻無妬心遂生數男任瓌妻唐初兵部尚書任瓌敕賜宮女二女皆國色妻妬爛二女頭髮禿盡太宗聞之令上宮齎金胡缾酒賜之云飲之立死瓌三品合置姬媵爾後不妬不須飲之若妬即飲柳氏拜敕訖曰妾與瓌結髮夫妻俱出微賤更相輔翼遂致榮官瓌今多內嬖誠不如死遂飲盡然非酖也既睡醒帝謂瓌曰其性如此朕亦當畏之因詔二女令別宅安置又房玄齡夫人至妬太宗將賜美人屢辭不受乃令皇后召夫人語以媵妾之流令有常制且司空年近遲暮帝欲有優崇之意夫人執心不迴帝乃令謂曰寧不妬而生寧妬而死曰妾寧妬而死乃遣酌一巵酒與之曰若然可飲此一酖一舉便盡無所留難帝曰我尚畏見何況於玄齡乎楊弘武妻楊弘武為司戎少常伯高宗謂之曰某人何因輒授此職對曰臣妻韋氏性剛悍昨以此見屬臣若不從恐有後患帝嘉不隱笑而遣之房孺復妻房孺復妻氏性妬忌左右婢不得濃粧高髻見給臙脂一豆粉一錢有一婢新買粧稍佳崔怒謂曰汝好粧耶吾為汝粧乃令刻其眉以青填之燒鏁桁灼其兩眼角皮隨焦卷以朱傅之及痂落瘢如粧焉李廷璧妻李廷璧二十年應舉方於蜀中策名歌篇靡麗詩韻精能嘗為舒州軍倅其妻猜妬一日鈴閣連宴三宵不歸妻達意云來必刃之泣告州牧徙居佛寺浹辰晦迹因詠愁詩曰到來難遣去難留著骨黏心萬事休潘岳愁絲生鬢裏婕妤悲色上眉頭長途詩盡空騎馬遠鴈聲初獨倚樓更有相思不相見酒醒燈背月如鉤張褐妻張褐尚書典晉州外貯所愛營妓生一子其內蘇氏妬忌不敢取歸乃與所善張處士為子居江津間常致書題問其存亡資以錢帛及漸成長教其讀書有人告以非處士之子爾父在朝官高因竊其父與張處士緘札不告而遁歸京國褐已死至宅門僮僕無有識者但云江淮郎君兄弟皆愕然其嫡母蘇夫人泣而謂諸子曰誠有此子吾知之矣我少年無端致其父子死生永隔我罪矣家眷眾泣取入宅齒諸兄之列名仁龜有文學修詞應進士舉及第歷侍御史因奉使江浙而死吳宗文王蜀吳宗文以功勳繼領名郡少年富貴其家姬僕樂妓十餘輩皆其精選也其妻妬每怏怏不愜其志忽一日鼓動趨朝已行數坊忽報云放朝遂密戒從者潛入遍幸之至十數輩遂據腹而卒蜀功臣蜀有功臣忘其名其妻妬忌家畜妓樂甚多居常即隔絕之或宴飲即使隔簾奏樂某未嘗見也其妻左右常令老醜者侍之某嘗獨處更無侍者而居第器服盛甚後妻病甚語其夫曰我死若近婢妾立當取之及屬壙某乃召諸姬日夜酣飲為樂有掌衣婢尤屬意即幸之方寢息忽有聲如霹靂帷帳皆裂某因驚成疾而死秦騎將秦騎將石某者甚有戰功其妻悍且妬石常患之後其妻獨處乃夜遣人刺之妻手接其刃號救叫喊婢妾共擊賊遂折鐔而去竟不能害婦十指皆傷後數年秦亡入蜀蜀遣石將兵屯于褒梁復於軍中募俠士就家刺之褒蜀相去數千里俠士於是挾刃懷家書至其門曰褒中信至令面見夫人夫人喜出見俠拜而授其書捧接之際揮刃斫之妻有一女躍出舉手接刃相持久之竟不能害外人聞而救之女十指並傷後十年蜀亡歸秦邦竟與其夫偕老死於牖下
