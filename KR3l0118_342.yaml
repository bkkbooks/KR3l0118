body:
  text: 獨孤穆獨孤穆唐貞元中河南獨孤穆者客淮南夜投大儀縣宿未至十里餘見一青衣乘馬顏色頗麗穆微以詞調之青衣對答甚有風格俄有車路北下道者引之而去穆遽謂曰向者粗承顏色謂可以終接周旋何乃頓相捨乎青衣笑曰愧恥之意誠亦不足但娘子少年獨居性甚嚴整難以相許耳穆因問娘子姓氏及中外親族青衣曰姓楊第六不答其他既而不覺行數里俄至一處門館甚肅青衣下馬入久之乃出延客就館曰自絶賓客已數年矣娘子以上客至無所為辭勿嫌踈漏也於是秉燭陳榻衾褥備具有頃青衣出謂穆曰君非隋將獨孤盛之後乎穆乃自陳是盛八代孫青衣曰果如是娘子與郎君乃有舊穆詢其故青衣曰某賤人也不知其由娘子即當自出申達須臾設食水陸畢備食訖青衣數十人前導曰縣主至見一女年可十三四姿色絶代拜跪訖就坐謂穆曰莊居寂寞久絶賓客不意君子惠顧然而與君有舊不敢使婢僕言之幸勿為笑穆曰羈旅之人館縠是惠豈意特賜相見兼許敘故且穆平生未離京洛是以江淮親故多不相識幸盡言也縣主曰欲自陳敘竊恐驚動長者妾離人間已二百年矣君亦何從而識初穆聞姓楊自稱縣主意已疑之及聞此言乃知是鬼亦無所懼縣主曰以君獨孤將軍之貴裔世稟忠烈故欲奉託勿以幽冥見疑穆曰穆之先祖為隋室將軍縣主必以穆忝有祖風欲相顧託乃平生之樂聞也有何疑焉縣主曰欲自宣泄實增悲感妾父齊王隋帝第二子隋室傾覆妾之君父同時遇害大臣宿將無不從逆唯君先將軍力拒逆黨妾時年幼常在左右具見始末及亂兵入宮賊黨有欲相逼者妾因辱罵之遂為所害因悲不自勝穆因問其當時人物及大業末事大約多同隋史久之命酒對飲言多悲咽為詩以贈穆曰江都昔喪亂闕下多構兵豺虎恣吞噬戈干日縱橫逆徒自外至半夜開重城膏血浸宮殿刀鎗倚簷楹今知從逆者乃是公與卿白刃污黃屋邦家遂因傾疾風知徑草世亂識忠臣哀哀獨孤公臨死乃結纓天地既板蕩雲雷時未亨今者二百載幽懷猶未平山河風月古陵寢露煙青君子乘祖德方垂忠烈名華軒一會顧土室以為榮丈夫立志操存沒感其情求義若可託誰能抱幽貞穆深嗟嘆以為班婕妤所不及也因問其平生製作對曰妾本無才但好讀古集常見謝家姊妹及鮑氏諸女皆善屬文私懷景慕帝亦雅好文學時時被命當時薛道衡名高海內妾每見其文心頗鄙之向者情發於中但直敘事耳何足稱贊穆曰縣主才自天授乃鄴中七子之流道衡安足比擬穆遂賦詩以答之曰皇天昔降禍隋室若綴旒患難在雙闕干戈連九州出門皆凶豎所向多逆謀白日忽然暮頽波不可收望夷既結釁宗社亦貽羞溫室兵始合宮闈血已流憫哉吹蕭子悲啼下鳳樓霜刃徒見逼玉笄不可求羅襦遺侍者粉黛成仇讎邦國已滄覆餘生誓不留英英將軍祖獨以社稷憂丹血濺黼扆豐肌染戈矛今來見禾黍盡日悲宗周玉樹已寂寞泉臺千萬秋感茲一顧重願以死節酬幽顯儻不昧中焉契綢繆縣主吟諷數四悲不自堪者久之逡巡青衣數人皆持樂器而有一人前白縣主曰言及舊事但恐使人悲感且獨郎新至豈可終夜啼淚相對乎某請充使召來家娘子相伴縣主許之既而謂穆曰此大將軍來護兒歌人亦當時遇害近在於此俄頃即至甚有姿色善言笑因作樂縱飲甚歡來氏歌數曲穆唯記其一曰平陽縣中樹久作廣陵塵不意阿郎至黃泉重見春良久曰妾與縣主居此二百餘年豈期今日忽有佳禮縣主曰本以獨孤公忠烈之家願一相見欲豁幽憤耳豈可以塵土之質厚誣君子穆因吟縣主詩落句云求義若可託誰能抱幽貞縣主微笑曰亦大強記穆因以歌諷之曰金閨久無主羅袂坐生塵願作吹蕭伴同為騎鳳人縣主亦以歌答曰朱軒下長路青草啓孤墳猶勝陽臺上空看朝暮雲來氏曰曩日蕭皇后欲以縣主配后兄子正見江都之亂其事遂寢獨狐冠冕盛族忠烈之家今日相對正為嘉耦穆問縣主所封何邑縣主云兒以仁壽四年生於京師時駕幸仁壽宮因名壽兒明年太子即位封清河縣主上幸江都宮徙封臨淄縣主特為皇后所愛常在宮內來曰夜已深矣獨孤郎宜且成禮某當奉候於東閣伺曉拜賀於是群婢戲謔皆若人間之儀既入臥內但覺其氣奄然其身頗冷頃之泣謂穆曰殂謝之人久為塵灰幸將奉事巾櫛死且不朽於是復召來氏飲宴如初因問穆曰承君今適江都何日當回有以奉託可乎穆曰死且不顧其他有何不可乎縣主曰帝既改葬妾獨居此今為惡王墓所擾欲聘妾為姬妾以帝王之家義不為凶鬼所辱本願相見正為此耳君將適江都路出其墓下以妾之故必為其所困道士王善交書符於淮南市能制鬼神君若求之即免矣又曰妾居此亦終不安君江南回日能挈我俱去葬我洛陽北坂上得與君相近永有依託生成之惠也穆皆許諾曰遷葬之禮乃穆家事矣酒酣倚穆而歌曰露草芊芊頽榮未遷自我居此於今幾年與君先祖疇昔恩波死生契闊忽此相過誰謂佳期尋當別離俟君之北攜手同歸因下淚沾巾來氏亦泣語穆曰獨孤郎勿負縣主厚意穆因以歌答曰伊彼維陽在天一方驅馬悠悠忽來異鄉情通幽顯獲此相見義感疇昔言存繾綣清江桂州可以遨遊惟子之故不遑淹留縣主泣謝穆曰一辱佳貺永以為好須臾天將明縣主涕泣穆亦相對而泣凡在坐者穆皆與辭訣既出門回顧無所見地平坦亦無墳墓之象穆意恍惚良久乃定因徙柳樹一株以志之家人索穆頗甚忽復數日穆乃入淮南市果遇王善交於市遂獲一符既至惡王墓下為旋風所撲三四穆因出符示之乃止先是穆頗不信鬼神之事及縣主言無不明曉穆乃深嘆訝亦私為所親者言之時年正月自江南回發其地數尺得骸骨一具以衣衾斂之穆以其死時草草葬必有闕既至洛陽大具威儀親為祝文以祭之葬於安善門外其夜獨宿於村墅縣主復至謂穆曰遷神之德萬古不忘幽滯之人分不及此者久矣幸君惠存舊好使我永得安宅道途之間所不奉見者以君見我腐穢恐致嫌惡耳穆覩其車輿導從悉光赫於當時縣主亦指之曰皆君之賜也歲至己卯當遂相見其夕因宿穆所至明乃去穆既為數千里遷葬復倡言其事凡穆之故舊親戚無不畢知貞元十五年歲在己卯穆晨起將出忽見數車至其家謂穆曰縣主有命穆曰相見之期至乎其夕暴亡遂合葬於楊氏華州參軍華州柳參軍名族之子寡欲早孤無兄弟罷官於長安間遊上巳日曲江見一車子飾以金碧半立淺水之中後簾徐褰見摻手如玉指畫令摘芙蕖女之容色絶代斜睨柳生良久柳生鞭馬從之即見車子入永崇里柳生訪其姓崔氏女亦有母有青衣字輕紅柳生不甚貧多方賂輕紅竟不之受他日崔氏女有疾其舅執金吾王因候其妹且告之請為子納焉崔氏不樂其母不敢違兄之命女曰願嫁得前時柳生足矣必不允某與外兄終恐不生全其母念女之深乃命輕紅於薦福寺僧道省院達意柳生為輕紅所誘又悅輕紅輕紅大怒曰君性正粗奈何小娘子如此侍於君某一微賤便忘前好欲保歲寒其可得乎某且以足下事白小娘子柳生再拜謝不敏然始曰夫人惜小娘子情切今小娘子不樂適王家夫人是以偷成婚約君可三兩日內就禮事柳生極喜自備數百千財禮期內結婚後五日柳挈妻與輕紅於金城里居及旬月外金吾到永崇其母王氏泣云某夫亡子女孤獨被姪不待禮會強竊女去矣兄豈無教訓之道金吾大怒歸笞其子數十密令捕訪彌年無獲無何王氏殂柳生挈妻與輕紅自金城里赴喪金吾之子既見遂告父父擒柳生生云某於外姑王氏處納采娶妻非越禮私誘也家人大小皆熟知之王氏既歿無所明遂訟於官公斷王家先下財禮合歸王家金吾子常悅慕表妹亦不怨前橫也經數年輕紅竟潔己處焉金吾又亡移其宅於崇義里崔氏不樂事外兄乃使輕紅訪柳生所在時柳生尚居金城里崔氏又使輕紅與柳生為期兼賚看圃豎令積糞堆與宅垣齊崔氏女遂與輕紅躡之同詣柳生柳生驚喜又不出城只遷群賢里後本夫終尋崔氏女知群賢里住復與訟奪之王生情深崔氏萬途求免託以體孕又不責而納焉柳生長流江陵二年崔氏女與輕紅相繼而歿王生送喪哀慟之禮至矣輕紅亦葬於崔氏墳側柳生江陵間居春二月繁花滿庭追念崔氏女凝想形影且不知存亡忽聞扣門甚急俄見輕紅抱粧奩而進乃曰小娘子且至聞似車馬之聲比崔氏女入門更無他見柳生與崔氏女敘契闊悲歡之甚問其由則曰某已與王氏訣自此可以同穴矣人生意專必果夙願因言曰某少習樂箜篌中頗有功柳生即時買箜篌調弄絶妙二年間可謂盡平生矣無何王生舊使蒼頭過柳生之門見輕紅驚不知其然又疑人有相似者未敢遽言問閭里又云流人柳參軍彌怪更伺之輕紅亦知是王生家人因具言於柳生匿之王生蒼頭却還城具以其事言於王生王生聞之命駕千里而來既至柳生家門於隙窺之正見柳生坦腹於臨軒榻上崔氏女新粧輕紅捧鏡於其側崔氏勻鉛黃未竟王生門外極叫輕紅鏡墜地有聲如磬崔氏與王生無憾遂入柳生驚亦待如賓禮俄又失崔氏所在柳生與王生從容言事二人相看不喻大異之相與造長安發崔氏所葬驗之即江陵所施鉛黃如新衣服肌肉且無損敗輕紅亦然柳與王相誓却葬之二人入終南山訪道遂不返焉趙叔牙貞元十四年戊寅夏五月旱徐州散將趙叔牙移入新宅夜中有物窗外動搖窗紙聲問之其物自稱是鬼吳時劉得言窟宅在公牀下往來稍難公為我移出城南臺雨山下有雙大樹是我妻墓墓東埋之後必相報叔牙明旦出城視之信即日掘牀下深三尺得骸骨如其言葬之其夜鬼來言謝曰今時旱不出三日有雨公且告長史叔牙至明通狀請祈雨期三日雨足節度使司空張建封許之給其所須叔牙於石佛山設壇至三日且無雨當截耳城中觀者數千人時與寇鄰建封以為詐妄有謀晚衙杖殺之昏時大雨即令致祭補男為散騎時人以為事君當誠實今趙叔牙隱鬼所報雨至之期故自當死耳周濟川汝南人有別墅在楊州之西兄弟四人俱好學嘗一夜講授罷可三更各就榻將寐忽聞窗外有格格之聲久而不已濟川於窗間窺之乃一白骨小兒也於庭中東西南北趨走始則叉手俄而擺臂格格者骨節相磨之聲也濟川呼兄弟共覘之良久其弟巨川厲聲呵之一聲小兒跳上階再聲入門三聲即欲上牀巨川元呵罵轉急小兒曰阿母與兒乳巨川以掌擊之隨掌墮地舉即在牀矣騰趠之捷若猿玃家人聞之意有非遂持刀棒而至小兒又曰阿母與兒乳家人以棒擊之其中也小兒節節解散如星而復聚者數四又曰阿母與兒乳家人以布囊盛之提出遠猶求乳出郭四五里擲一枯井明夜又至手擎布囊拋擲跳躍自得家人輩擁得又以布囊如前法盛之以索括囊懸巨石而沉諸河欲負趨出於囊中仍云還同昨夜客耳餘日又來左手攜囊右手執斷索趨馳戲弄如前家人先備大木鑿空其中如鼓撲擁小兒於內以大鐵葉冒其兩端而釘之然後鎖一鐵懸巨石流之大江負欲趨出云謝以棺槨相送自是更不復來時貞元十七年
