body:
  text: 貫休貫休唐沙門貫休本婺州蘭溪人也能詩善書妙畫王氏建國時來居蜀中龍華之精舍因縱筆用水墨畫羅漢一十六身并一佛二大士巨石縈雲枯松帶蔓其諸古貌與他人畫不同或曰夢中所睹覺後圖圖原作圓據明鈔本改之謂之應夢羅漢門人曇域曇弗等甚祕重之蜀主曾宣入內歎其筆迹狂逸供養經月卻令分付院中翰林學士歐陽炯亦曾觀之贈以歌曰西嶽高僧名貫休孤情峭拔凌清秋天教水墨畫羅漢魁岸古容生筆頭時捐大絹泥高壁閉目焚香坐禪室或然夢裏見真儀脫去袈裟點神筆高抬節腕當空擲窸窣毫端任狂逸逡巡便是兩三軀不似畫工虛費日怪石安排嵌復枯真僧列坐連跏趺形如瘦鶴精神健頂似伏犀頭骨粗倚松根傍巖縫曲録腰身長欲動看經弟子擬聞聲瞌睡山童疑有夢不知夏臘幾多年一手搘頤偏袒肩口開或若共人語身定復疑初坐禪案前臥象低垂鼻岸畔戲猿斜展臂芭蕉花裏刷輕紅苔蘚文中暈深翠硬筇杖矮松床雪色眉毛一寸長繩開梵夾兩三片線補衲衣千萬行林間亂葉紛紛墮一印殘香斷煙火皮穿木屐不曾拖筍織蒲團鎮長坐休公休公逸藝無人加聲譽喧喧遍海涯五七字句一千首大小篆書三十家唐朝歷歷多名士蕭子雲兼吳道子若將書畫比休公只恐當時浪生死休公休公始自江南來入秦於今到蜀無交親詩名畫手皆奇絶覷你凡人爭是人瓦棺寺裏維摩詰舍衛城中辟支佛若將此畫比量看總在人間為第一出野人間話楚安西蜀聖壽寺僧楚安妙畫山水而點綴甚細至於尺素之上山川林木洞府峰巒寺觀煙嵐人物悉皆有之每畫一小團扇內安姑蘇臺或畫滕王閣其有千山萬水盡在目前然須一季已來方就一扇其時諸王宰輔競相有請得之者奉遺甚厚有不得畫者恨恨然楚安言山僧自以此適意而已歸寂後有好事者往往收得其筆蹤或謂之墨寶也出野人間話應天三絶唐僖宗皇帝翠華西幸之年有會稽山處士孫位隨駕止蜀位有道術兼攻書畫皆妙得筆精曾於應天寺門左壁上畫天王一座部從鬼神奇怪斯存筆勢狂縱莫之與京三十餘年無有敵者景煥其先亦專書畫嘗與翰林歐陽學士炯乃忘形之交一日連騎同遊茲寺偶畫右壁天王以對之渤海在旁在旁二字原空闕據黃本補觀其逸勢復書歌行一篇以紀之續有草書僧夢龜後至又請書之於廊壁上故書畫歌行一日而就傾城人看闐咽寺中成都之人故號為應天三絶歌行今亦録附曰錦城東北黃金地故迹何人興此寺白眉長老重名公曾識會稽山處士寺門左壁圖天王威儀部從來何方鬼神怪異滿壁走當簷颯颯生秋光我聞天王分理四天下水精宮殿琉璃瓦綵仗時驅拂琳裝金鞭頻策騏驎馬毗沙大像何光輝手擎巨塔凌雲飛地神對出寶瓶子天女倒披金縷衣唐朝説著名公畫周昉毫端善圖寫張僧繇是有神人吳道子稱無敵者奇哉妙手傳孫公能於此地留神蹤斜窺小鬼怒雙目直倚越狼高半胸寶冠動惚上聲生威容趨蹌左右來傾恭臂橫鷹爪尖纖利腰纏去聲虎皮斑剝紅飄飄但恐入雲中步驟還疑歸海東蟒蛇拖得渾身墮精魅搦來雙眼空當時此藝實難有鎮在寶坊稱不朽東邊畫了空西邊留與後人教敵手後人見者皆心驚盡為名公不敢爭誰知未滿三十載或有異人來間生匡山處士名稱朴頭骨高奇連五嶽曾持象簡纍為官又有蛇珠常在握昔年長老遇奇蹤今日門師識景公興來便請泥高壁亂搶去聲筆頭如疾風逡巡隊仗何顛逸散漫奇形皆湧出交加器械滿虛空兩面或然如鬥敵聖王怒色覽東西劍刃一揮皆整齊腕頭獅子咬金甲腳底夜叉擎絡鞮馬頭壯健多筋節烏觜彎環如屈鐵遍身蛇虺亂縱橫繞頷髑髏幹孑裂眉粗眼豎髮如錐怪異令人不可知科頭巨卒欲生鬼半面女郎安小兒況聞此寺初興置地脈沈沈當正氣如何請得二山人下筆咸成千古事君不見明皇天寶年畫龍致雨非偶然包含萬象藏心裏變現百般生眼前後來畫品列名賢唯此二人堪比肩人間是物皆求得此樣欲於何處傳嘗憂壁底生雲霧揭起寺門天上去出野人間話八仙圖西蜀道士張素卿神仙人也曾於青城山丈人觀繪畫五嶽四瀆真形並十二溪女數堵筆迹遒健精彩欲活見之者心竦神悸足不能進實畫中之奇絶也蜀主纍遣祕書少監黃筌令取模樣及下山終不相類因生日或有收得素卿所畫八仙真形八幅以獻孟昶觀古人之形相見古人之筆妙歡賞者久之且曰非神仙之人無以寫神仙之質也賜物甚厚一日令偽翰林學士歐陽炯次第讚之又遣水部員外郎黃居寶八分題之每觀其畫歎筆迹之縱逸覽其讚賞文詞之高古視其書愛點畫之宏壯顧為八仙不讓三絶八仙者李己容成董仲舒張道陵嚴君平李八百長壽葛永瑰出野人間話黃筌昔吳道子所畫一鍾馗衣藍衫鞹一足眇一目腰一笏巾裹而蓬髮垂鬢左手捉一鬼以右手第二指捥鬼眼睛筆迹遒徑實有唐之神妙收得者將獻偽蜀主甚愛重之常懸於內寢一日召黃筌令看之筌一見稱其絶妙謝恩訖昶謂曰此鍾馗若母指搯鬼眼睛則更校有力試為我改之筌請歸私第數日看之不足別絣絹素畫一鍾馗以母指搯鬼眼睛并吳本一時進納昶問曰比令卿改之何為別畫筌曰吳道子所畫鍾馗一身之力氣色眼貌俱在第二指不在母指所以不敢輒改筌今所畫雖不及古人一身之力意思並在母指昶甚悅賞筌之能遂以綵段銀器旌其別識出野人間話雜編敬愛寺復有雉尾病龍莫知畫者誰氏繪素奇巧皆入神之迹雉尾在東廓觀音院天王部從中緋衣神人抱野雞一隻遍而觀之勢若飛動也天王原作大王隻作身據劇談録改原闕出處明鈔本作出尚書談録今見出劇談録國朝李嗣真評畫云顧畫屈居第二然虎頭又伏衛協畫北風圖此圖嘗在韓吏部家張弘靖平康里宅乃崔司業融舊第有司業題壁處猶在出尚書故實僧道芬會稽人縈陽人鄭町處士梁洽處士項容青州處士吳恬一名汾字建康已上並畫山水道芬格高鄭町雅淡梁洽美秀項容頑澀吳恬險巧有畫山水録記平生所畫在絹素者凡百餘面傳之好事自云初夢有神人指授畫法恬好為頑石氣象深險能為雲雨氣象又有王默師項容風顛酒狂松石雖有高奇流俗所好醉後以頭髻抵於絹素王默早年受筆法於台州鄭虔貞元末於潤州歿舉柩若空時人多言化去平生大有奇事顧著作知新亭監時默請為海中都巡問其意云要見海中山水耳為職半年後解去爾後落筆有奇趣乃項生弟子耳彥遠從兄監察御史厚與余具言此事然余不甚覺默畫有奇也出名畫記有別畫者與人同遊寺看壁畫音聲一鋪鋪原作幅據明鈔本改曰此涼州第幾遍不信召樂官奏涼州至畫處用指更無差異出盧氏雜説故德州王使君椅家有筆一管約一寸粗於常用筆管兩頭各出半寸以來中間刻從軍行一鋪鋪原作幅據明鈔本改人馬毛髮屋木亭臺遠水無不精絶每一事刻從軍行兩句若庭前琪樹已堪攀塞外征人殊未還是也似非人功其畫迹若粉描向明方可辨之云用鼠牙刻故崔郎中鋋文有王氏筆管記是也類韓文公畫記椅玄質子紹孫高雅博古善琴阮余舊宅在東洛歸德坊南街廳屋是杏木梁西壁有韋旻郎中散馬七匹東壁有張旭草真蹤數行旭世號張顛宅之東果園兩京新記是馬周舊宅出盧氏雜説滎陽外郎贊宰萬年日有荷校者以賊呼之言嘗紿婦人廉廉原作盜據唐闕史改市馬畫贊責之命取以視則古絲煙晦幅聯三四蠻罽裁縹斑鼊皮軸贊曰是畫也太尉李公所寶惜有贊皇圖書篆焉人有七萬購獻牢盆者得漕渠橫梁梗倅職因出妓於閣又落民間言是寇幸其不鑒以卑價市之為妓人自他方歸所訴請以所虧價書罪贊不能決時延壽里有水墨李處士以精別畫品遊公卿門召之辨之瞪目三嘆云韓展之上品也黃沙之情已具丹筆之斷尚疑會有齎籍自禁軍來認者贊以且異姦盜非願苛留因並畫徑送後永絶其耗出唐闕史晉以前目所不睹難以平議晉以來厥迹存者可得而言顧長康張僧繇陸探微異才間出是為三祖後世雖有作者難可加焉昔蕭武帝博學好古鳩集圖畫令朝臣攻丹青者詳其名氏並定品第藏於祕府以備閲玩及侯景之亂元帝遷都而王府圖書悉歸荊土洎周師來伐帝悉焚之歷周隋至國朝重加購募稍稍復出無何遂盈祕府長安初張易之奏召天下名工修葺圖畫潛以同色故帛令各推所長共成一事仍舊縹軸不得而別也因而竊換張氏誅後為少保薛稷所收稷敗後悉入岐王初不奏聞竊有所慮因又焚之於是圖畫奇迹蕩然無遺矣出談賓録
