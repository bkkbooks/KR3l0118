body:
  text: 鯀鯀堯使鯀治洪水不胜其任遂誅之鯀于羽山化為黃能入于羽泉今會稽人祭禹廟不用能水居曰能陸居曰熊也桓沖晉桓沖為江州刺史遣人周行廬山冀睹靈異既陟崇巘有一湖匝生桑樹湖中有敗艑赤鱗魚使者渴极欲往飲水赤鱗魚張鬐向之使者不敢飲李湯唐貞元丁丑歲隴西李公佐泛瀟湘蒼梧偶遇征南從事弘農楊衡泊舟古岸淹留佛寺江空月浮征異話奇楊告公佐云永泰中李湯任楚州刺史時有漁人夜釣于龜山之下其釣因物所制不复出漁者健水疾沉于下五十丈見大鐵鎖盤繞山足尋不知极遂告湯湯命漁人及能水者數十獲其鎖力莫能制加以牛五十余頭鎖乃振動稍稍就岸時無風濤惊浪翻湧觀者大駭鎖之末見一獸狀有如猿白首長鬐雪牙金爪闖然上岸高五丈許蹲踞之狀若猿猴但兩目不能開兀若昏昧目鼻水流如泉涎沫腥穢人不可近久乃引頸伸欠雙目忽開光彩若電顧視人焉欲發狂怒觀者奔走獸亦徐徐引鎖拽牛入水去竟不复出時楚多知名士與湯相顧愕悚不知其由爾時乃漁者知鎖所其獸竟不复見公佐至元和八年冬自常州餞送給事中孟至朱方廉使薛公苹館待禮備時扶風馬植范陽盧簡能河東裴蘧皆同館之環爐會語終夕焉公佐复說前事如楊所言至九年春公佐訪古東吳從太守元公錫泛洞庭登包山宿道者周焦君廬入靈洞探仙書石穴間得古岳瀆經第八卷文字古奇編次蠹毀不能解公佐與焦君共詳讀之禹理水三至桐柏山惊風走雷石號木鳴五伯擁川天老肅兵不能興禹怒召集百靈搜命夔龍桐柏千君長稽首請命禹因囚鴻蒙氏章商氏兜盧氏犁婁氏乃獲淮渦水神名無支祁善應對言語辨江淮之淺深原隰之遠近形若猿猴縮鼻高額青軀白首金目雪牙頸伸百尺力窬九象搏擊騰踔疾奔輕利倏忽聞視不可久禹授之章律不能制授之鳥木由不能制授之庚辰能制鴟脾桓木魅水靈山妖石怪奔號聚繞以數十載庚辰以戰逐去頸鎖大索鼻穿金鈴徙淮陰之龜山之足下俾淮水永安流注海也庚辰之后皆圖此形者免淮濤風雨之難即李湯之見與楊衡之說與岳瀆經符矣齊浣唐開元中河南采訪使汴州刺史齊浣以徐城險急奏開十八里河達于清水其河隨州縣分掘亳州真源縣丞崔延禕糾其縣徒開數千步中得龍堂初開謂是虛穴然狀如新筑淨洁周廣北壁下有五色蟄龍長一丈余鯉魚五六枚各長尺有靈龜兩頭長一尺二寸眸長九分禕以白開河御史鄔元昌狀上齊浣浣命移龍入淮放龜入汴禕移龍及魚二百餘里至淮岸有魚數百萬首跳躍赴龍水為之沸龍入淮噴水云霧杳冥遂不复見初將移之也御史員錫拔其一須元昌遣人送龜至宋遇水泊暫放龜水中水闊數尺深不過五寸遂失大龜所在涸水求之亦不獲空致小龜焉子英春子英春者舒鄉人善入水捕得赤鯉愛其色持歸養之池中數以米谷食之一年長丈余遂生角有翅子英怖拜謝之魚言我來迎汝上我背與汝具升歲來歸見妻子魚复迎之故吳中門戶作神魚子英祠也洛水豎子有人洛水中見豎子洗馬頃之見一物如白練帶极光晶繳豎子之項三兩匝即落水死凡是水中及灣泊之間皆有之人澡浴洗馬死者皆謂黿所引非也此名白特宜慎防之蛟之類也鬼鱠魚狀如鱧其文赤斑長者尺余豫章界有之多居污泥池中或至數百能為鬼幻惑襖怪亦能魅人其污池側近所有田地人不敢犯或告而奠之厚其租值田即倍丰但匿己姓名佃之三年而后舍去必免其害其或為人患者能捩人面目反人手足祈謝之而后免亦能夜間行于陸地所經之處有泥蹤跡所到之處聞嗾嗾之聲北部二十五部大將軍有破泉符書于磚石上投其池中或書板刺釘于池畔而必因風雨雷霆以往他所善此術者方可行之羅州赤鱉岭南羅州辯州界內水中多赤鱉其大如匙而赫赤色無問禽獸水牛入水即被曳深潭吸血死或云蛟龍使曳之不知所以然也韓珣唐杭州富陽縣韓珣庄鑿井才深五六尺土中得魚數千頭土有微潤封令禛唐封令禛任常州刺史于江南沂流將木至洛造廟匠人截木于中得一鯽魚長數寸如刻安之凝真觀唐懷州凝真觀東廊柱已五十余年道士往往聞柱中有蝦蟆聲不知的處后因柱朽坏易之廚人砍以為薪柱中得一蝦蟆其柱先無孔也蜀江民唐蜀民有于江之上獲巨鱉者大于常長尺余其裙朱色煮之經宿游戲自若又加火一日水涸而斃不死舉家惊懼以為龍也投于江中浮泛而去不复見矣張胡子唐吳郡漁人張胡子嘗于太湖中釣得一巨魚腹上有丹書字曰九登龍門山三飲太湖水畢竟不成龍命負張胡子柏君唐金州洵陽縣水南鄉百姓柏君懷于漢江勒漠潭采得魚長數尺身上有字云三度過海兩度上漢行至勒漠命屬柏君葉朗之唐建中元年南康縣人葉朗之使奴當歸守田田下流有鳥陂陂中忽有物喚其聲似鵝而大奴因入水探視得一大物身滑宛轉內頭陂下奴乃操刀下水截得其后圍六尺余長二丈許牽置岸上剝皮剖之比舍數十人咸共食炙肉脆肥美眾味莫逮背上有白筋大如脛似鱘魚鼻食之特美余以為脯此物初死之夕朗之夢一人長大黑色曰我章川使者向醉孤游誤墮陂中為君奴所害既廢王命身罹戳辱又析肌刳髒焚腌充膳冤結之痛古今莫二與君素無隙恨若能殺奴謝責償過罪止凶身不爾法科恐貴門罹禍朗之惊覺不忍殺奴奴明年為竹尖刺入腹而死其年夏末朗之舉家得病死者八人柳宗元唐柳州刺史河東柳宗元常自省郎出為永州司馬途至荊門舍驛亭中是夕夢一婦人衣黃衣再拜而泣曰某家楚水者也今不幸死在朝夕非君不能活之儻獲其生不獨戴恩而已兼能假君祿益君為將為相且無難矣幸明君子一圖焉公謝而許之既寤嘿自異之及再寐又夢婦人且祈且謝久而方去明晨有吏來稱荊帥命將宴宗元宗元既命駕以天色尚早因假寐焉既而又夢婦人嚬然其容憂惶不暇顧謂宗元曰某之命今若縷之懸甚風危危將斷且飄矣而君不能念其事之急耶幸疾為計不爾亦與敗縷皆斷矣愿君子許之言已又祈拜既告去心亦未悟焉即俯而念曰吾一夕三夢婦人告我辭甚懇豈吾之吏有不平于人者耶抑將宴者以魚為我膳耶得而活之亦吾事也即命駕詣郡宴既而以夢話荊帥且召吏訊之吏曰前一日漁人网獲一巨黃鱗魚將為膳今已斷其首宗元惊曰果其夕之夢遂命挈而投江中然而其魚已死矣是夕又夢婦人來亡其首宗元益異之王瑤唐會昌中有王瑤者任恒州都押衙嘗為奕邑宰瑤將赴任所夜夢一人身懷甲胄形貌堂堂自云馮夷之宗將之海岸忽罹网罟為漳川漁父之所得將置之刀幾充膳于宰君命在詰朝故來相告儻垂救宥必厚報之瑤既覺言于左右曰此必縣吏相迎捕魚為饌急遣人至縣庖人果欲割鮮理鱠具以瑤命告之遂投于水中魚即鼓鬣揚鬐軒軒而去是夜瑤又夢前人泣以相感云免其五鼎之烹獲返三江之浪有以知長官之仁比宗元之惠遠矣因長跪而去柳沂唐河東柳沂者僑居洛陽因乘春釣伊水得巨魚挈而歸致于盆水中先是沂有嬰兒始六七歲是夕沂夢魚以喙嚙嬰兒臆沂悸然而寤果聞嬰兒啼曰向夢一大魚嚙其臆痛不可忍故啼焉與沂夢同沂異之乃視嬰兒之臆果有瘡而血沂益懼明旦以魚投伊水中且命僧轉經畫像僅旬余嬰兒瘡愈沂自后不复釣也崔梲晉太常卿崔梲游學時往至姑家夜與諸表昆季宿于學院來晨姑家方會客夜夢十九人皆衣青綠羅拜具告求生詞旨哀切崔曰某方閒居非有公府之事也何以相告咸曰公但許諾某輩獲全矣崔曰苟有階緣固不惜奉救也咸喜躍再拜而退既寤盥櫛束帶至堂省姑見缶中有水而泛鱉焉數之大小凡十九計其衣色亦略同也遂告于姑具述所夢再拜請之姑亦不阻即命仆夫置于器中躬詣水次放之染人廣陵有染人居九曲池南夢一白衣少年求寄居焉答曰吾家隘陋不足以容君也乃入廚中爾夕舉家夢之既日廚中得一白鱉廣尺余兩目如金其人送詣紫极宮道士李栖一所置之水中則色如金而目如丹出水則白如故犧一不能測复送池中遂不复見海上人近有海上人于魚扈中得一物是人一手而掌中有面七竅皆具能動而不能語傳玩久之或曰此神物也不當殺之其人乃放置水上此物浮水而去可數十步忽大笑數聲躍沒于水法聚寺僧法聚寺內有僧先在房至夜忽謂門人曰外有數萬人頭戴帽向貧道乞救命急開門出看見十余人擔蠡子因贖放生李延福偽蜀丰資院使李延福晝寢公廳夢裹烏帽三十人伏于階下但云乞命惊覺仆使報門外有村人獻鱉三十頭因悟所夢遂放之
