body:
  text: 鄭宏之鄭宏之唐定州刺史鄭宏之解褐為尉尉之廨宅久無人居屋宇頽毀草蔓荒涼宏之至官裛草修屋就居之吏人固爭請宏之無入宏之曰行正直何懼妖鬼吾性強御終不可移居二日夜中宏之獨臥前堂堂下明火有貴人從百餘騎來至庭下怒曰何人唐突敢居于此命牽下宏之不答牽者至堂不敢近宏之乃起貴人命一長人令取宏之長人升階循牆而走吹滅諸燈燈皆盡唯宏之前一燈存焉長人前欲滅之宏之杖劍擊長人流血灑地長人乃走貴人漸來逼宏之具衣冠請與同坐言談通宵情甚款洽宏之知其無備拔劍擊之貴人傷左右扶之遽言王今見損如何乃引去既而宏之命役徒百人尋其血至北垣下有小穴方寸血入其中宏之命掘之入地一丈得狐大小數十頭宏之盡執之穴下又掘丈余得大窟有老狐裸而無毛据土床坐諸狐侍之者十余頭宏之盡拘之老狐言曰無害豫豫祐汝宏之命積薪堂下火作投諸狐盡焚之次及老狐狐乃搏頰請曰吾已千歲能與天通殺豫不祥舍我何害宏之乃不殺鎖之庭槐初夜中有諸神鬼自稱山林川澤叢祠之神來謁之再拜言曰不知大王罹禍乃爾雖欲脫王而苦無計老狐領之明夜又諸社鬼朝之亦如山神之言后夜有神自稱黃撅多將翼從至狐所言曰大兄何忽如此因以手攬鎖鎖為之絶狐亦化為人相與去宏之走追之不及矣宏之以為黃撅之名乃狗號也此中誰有狗名黃撅者乎既曙乃召胥吏問之吏曰縣倉有狗老矣不知所至以其無尾故號為黃撅豈此犬為妖乎宏之命取之既至鎖系將就烹犬人言曰吾實黃撅神也君勿害我我常隨君君有善惡皆預告君豈不美歟宏之屏人與語乃釋之犬化為人與宏之言夜久方去宏之掌寇盜忽有劫賊數十人入界止逆旅黃撅神來告宏之曰某處有劫將行盜擒之可遷官宏之掩之果得遂遷秩焉后宏之纍任將遷神必預告至如殃咎常令回避罔有不中宏之大獲其報宏之自寧州刺史改定州神與宏之訣去以是人謂宏之祿盡矣宏之至州兩歲風疾去官汧陽令唐汧陽令不得姓名在官忽云欲出家念誦懇至月余有五色云生其舍又見菩薩坐獅子上呼令歎嗟云發心弘大當得上果宜堅固自保無為退敗耳因爾飛去令因禪坐閉門不食六七日家以憂懼恐以堅持損壽會羅道士公遠自蜀之京途次隴上令子請問其故公遠笑曰此是天狐亦易耳因與書數符當愈令子投符井中遂開門見父餓憊逼令吞符忽爾明晤不復論修道事后數載罷官過家家素郊居平陸澶漫直千里令暇日倚杖出門遙見桑林下有貴人自南方來前后十余騎狀如王者令入門避之騎尋至門通云劉成謁令令甚驚愕初不相識何以見詣既見升堂坐謂今曰蒙賜婚姻敢不拜命初令在任有室女年十歲至是十六矣令云未省相識何嘗有婚姻成云不許成婚姻事亦易耳以右手掣口而立令宅須臾震動井廁交流百物飄蕩令不得已許之婚期克翌日送禮成親成親后恆在宅禮甚丰厚資以饒益家人不之嫌也他日令子詣京求見公遠公遠曰此狐舊日無能今已善符菉吾所不能及奈何令子懇請公遠奏請行尋至所居于令宅外十余步設壇成策杖至壇所罵老道士云汝何為往來靡所忌憚公遠法成求與交戰成坐令門公遠坐壇乃以物擊成成仆于地久之方起亦以物擊公遠公遠亦仆如成焉如是往返數十公遠忽謂弟子云彼擊余殪爾宜大臨吾當以神法縛之及其擊也公遠仆地弟子大哭成喜不為之備公遠遂使神往擊之成大戰恐自言力竭變成老狐公遠既起以坐具撲狐重之以大袋乘驛還都玄宗視之以為歡矣公遠上白云此是天狐不可得殺宜流之東裔耳書符流于新羅狐持符飛去今新羅有劉成神土人敬事之李元恭唐吏部侍郎李元恭其外孫女崔氏容色殊麗年十五六忽得魅疾久之狐遂見形為少年自稱胡郎纍求術士不能去元恭子博學多智常問胡郎亦學否狐乃談論無所不至多質疑于狐頗狎樂久之謂崔氏曰人生不可不學乃引一老人授崔經史前后三載頗通諸家大義又引一人教之書涉一載又以工書著稱又云婦人何不會音聲箜篌琵琶此故凡樂不如諸曲備盡其妙及他名曲不可勝紀自云亦善廣陵散比屢見嵇中散不使授人其于烏夜啼尤善傳其妙李后問胡郎何以不迎婦歸家狐甚喜便拜謝云亦久懷之所不敢者以人微故爾是日遍拜家人歡躍備至李問胡郎欲迎女子宅在何所狐云某舍門前有二大竹時李氏家有竹園李因尋行所見二大竹間有一小孔竟是狐窟引水灌之初得猳貉及他狐數十枚最后有一老狐衣緑衫從孔中出是其素所著衫也家人喜云胡郎出矣殺之其怪遂絶焦練師唐開元中有焦練師修道聚徒甚衆有黃裙婦人自稱阿胡就焦學道術經三年盡焦之術而固辭去焦苦留之阿胡云己是野狐本來學術今無術可學義不得留焦因欲以術拘留之胡隨事酬答焦不能及乃于嵩頂設壇啓告老君自言己雖不才然是道家弟子妖狐所侮恐大道將隳言意懇切壇四角忽有香煙出俄成紫云高數十丈云中有老君見立因禮拜陳云正法已為妖狐所學當更求法以降之老君乃于云中作法有神王于云中以刀斷狐腰焦大歡慶老君忽從云中下變作黃裙婦人而去李氏唐開元中有李氏者早孤歸于舅氏年十二有狐欲媚之其狐雖不見形言語酬酢甚備纍月后其狐復來聲音少異家人笑曰此又別一是野狐矣狐亦笑云汝何由得知前來者是十四兄己是弟頃者我欲取韋家女造一紅羅半臂家兄無理盜去令我親事不遂恆欲報之今故來此李氏因相辭謝求其禳理狐云明日是十四兄王相之日必當來此大相惱亂可且令女掐無名指第一節以禳之言訖便去大狐至值女方食女依小狐言掐指節狐以藥顆如菩提子大六七枚擲女飯碗中纍擲不中驚歎甚至大言云會當入嵩嶽學道始得耳座中有老婦持其藥者懼復棄之人問其故曰野狐媚我狐慢罵云何物老嫗寧有人用此輩狐去之后小狐復來曰事理如何言有驗否家人皆辭謝曰后十余日家兄當復來宜慎之此人與天曹已通符禁之術無可奈何唯我能制之待欲至時當復至此將至其日小狐又來以藥裹如松花授女曰我兄明日必至明早可以車騎載女出東北行有騎相追者宜以藥布車后則免其橫李氏候明日如狐言載女行五六里甲騎追者甚衆且欲至乃布藥追者見藥止不敢前是暮小狐又至笑云得吾力否再有一法當得永免我亦不復來矣李氏再拜固求狐乃令取東引桃枝以朱書板上作齊州縣鄉里胡綽胡邈以符安大門及中門外釘之必當永無怪矣狐遂不至其女尚小未及適人后數載竟失之也韋明府唐開元有詣韋明府自稱崔參軍求娶韋氏驚愕知是妖媚然猶以禮遣之其狐尋至后房自稱女壻女便悲泣昏狂妄語韋氏纍延術士狐益慢言不能卻也聞峨嵋有道士能治邪魅求出為蜀令冀因其伎以禳之既至道士為立壇治之少時狐至壇取道士懸大樹上縛之韋氏來院中問尊師何以在此狐云敢行禁術適聊縛之韋氏自爾甘奉其女無復凱望家人謂曰若為女壻可下錢二千貫為聘崔令于堂檐下布席修貫穿錢錢從檐上下群婢穿之正得二千貫久之乃許婚令韋請假送禮兼會諸親及至車騎輝赫儐從風流三十余人至韋氏送雜彩五十匹紅羅五十匹他物稱是韋乃與女經一年其子有病父母令問崔郎答云八叔房小妹今頗成人叔父令事高門其所以病者小妹入室故也母極罵云死野狐魅你公然魅我一女不足更惱我兒吾夫婦暮年唯仰此子與汝野狐為壻絶吾繼嗣耶崔無言但歡笑父母日夕拜請紿云爾若能愈兒疾女實不敢復論久之乃云疾愈易得但恐負心耳母頻為設盟誓異日崔乃于懷出一文字令母效書及取鵲巢于幾房前燒之兼持鵲頭自衛當得免疾韋氏行其術數日子愈女亦效為之雄狐亦去罵云丈母果爾負約如何言今去之后五日韋氏臨軒坐忽聞庭前臭不可奈仍有旋風自空而下崔狐在焉衣服破弊流血淋漓謂韋曰君夫人不義作字太彰天曹知此事杖我幾死今長流沙磧不得來矣韋極聲訶之曰窮老魅何不速行敢此逗留耶狐云獨不念我錢物恩耶我坐偷用天府中錢今無可還受此荼毒君何無情至此韋深感其言數致辭謝徘徊復為旋風而去林景玄唐林景玄者京兆人僑居雁門以騎射畋獵為己任郡守悅其能因募為衙門將嘗與其徒十數輩馳健馬執弓矢兵杖臂隼牽犬俱騁于田野間得麋鹿狐兔甚多由是郡守縱其所往不使親吏事嘗一日畋于郡城之高岡忽起一兔榛莽中景玄鞭馬逐之僅十里余兔匿一墓穴景玄下馬即命二卒守穴傍自解鞍而憩忽聞墓中有語者曰吾命土也克土者木日次于乙辰居卯二木俱王吾其死乎已而咨嗟者久之又曰有自東而來者我將不免景玄聞其語且異之因視穴中見一翁衣素衣髯白而長手執一軸書前有死鳥鵲甚多景玄即問之其人驚曰果然禍我者且至矣即詬罵景玄默而計之曰此穴甚小而翁居其中豈非鬼乎不然是盜而匿此即毀其穴翁遂化為老狐帖然俯地景玄因射之而斃視其所執之書點畫甚異似梵書而非梵字用素縑為幅僅數十尺景玄焚之謝混之唐開元中東光縣令謝混之以嚴酷強暴為政河南著稱混之嘗大獵于縣東殺狐狼甚衆其年冬有二人詣台訟混之殺其父兄兼他贓物狼籍中書令張九齡令御史張曉往按之兼鎖系告事者同往曉素與混之相善先躡其狀令自料理混之遍問里正皆云不識有此人混之以為詐已各依狀明其妄以待辨曉將至滄州先牒系混之于獄混之令吏人鋪設使院候曉有里正從寺門前過門外金剛有木室扁護甚固聞金剛下有人語聲其肩以鎖非人所入里正因逼前聽之聞其祝云縣令無狀殺我父兄今我二弟詣台訴冤使人將至願大神庇廕令得理有頃見孝子從隙中出里正意其非人前行尋之其人見里正惶懼入寺至廁后失所在歸以告混之混之驚愕久之乃曰吾春首大殺狐狼得無是邪及曉至引訟者出縣人不之識訟者言詞忿爭理無所屈混之未知其故有識者勸令求獵犬獵犬至見訟者直前搏逐徑跳上屋化為二狐而去
