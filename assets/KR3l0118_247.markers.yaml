  - {type: variant, offset: 1896, length: 756, content: 明鈔本笑下多七百四十八字至高祖大笑動筩止今據補並將闕字用燉煌本啟顏錄校補又齊文宣帝曰曰恕臣萬死即得帝曰好曰臣昨落密瓮裡臣為陛下卻還復上天真乎對曰臣作夜夢隨陛下行落一廁中出來䑛之帝大怒付所司殺卻曰臣請一言而死帝曰陛下得臣頭極無用臣失頭笑而捨之高齋會大德法師開講道俗有疑滯者即論難議援引大義說法門言議幽深皆在雅正動筩最後論議謂法師曰且問法師一個小議佛常騎何物法師答曰或坐干葉蓮花或乘六牙白象動筩云法師今不讀經不知佛所乘騎物師即問云檀越讀經佛騎何物答曰騎牛法師曰何以知經云世尊甚奇特非騎牛座皆大笑又謂法師曰法師既不知佛常騎牛今更問法師一種法義比來每經之上皆云價值百千兩金未知百千兩金總有幾斤遂無以對嘗作內道場時有法師先立無一無二無是無非義高昇高坐講還令立舊義當呼儒生學士大德名僧義理百瑞無能得者動筩即講難此僧必令結舌高祖大高坐褰衣闊立問僧看弟子有幾箇腳僧曰兩腳又翹一腳向後一腳獨立問僧更看弟子有幾個腳僧曰兩腳動筩云向有兩腳今有一腳若為能無一無二僧答云若其二是直啟顏錄作真下同不應有一腳腳既得有一明二即非直動筩以僧義不窮無難得之理者乃謂僧曰向者劇問法師未是好義法師師云無一無二無是無非今問法師此義不得不答弟子問天無二日上無二王今者天子一人臨御四海法師豈更得云無一易有乾坤天有日月星辰配於天子即是二人法師豈更得云無二今者帝臨廣德無幽不燭昆蟲草木皆得其生法師豈更得無是今四海為家萬方歸順唯有宇文黑獺獨阻皇風法師豈更得云無非於是僧默然以無應高祖撫掌大笑高祖又常集儒生會講酬難非一動筩後來謂眾士曰先生知天何姓博士天子姓高動筩曰天子姓高天必姓高此乃學他蜀臣秦密本非新義正經之上自有天姓先生可引正文不須假託舊事博士云不知何經得有天姓動筩云先生全不讀書孝經亦似天本姓也先生可不見孝經云父子之道天姓也豈不是天姓高祖大笑動筩以上據明鈔本補, WYG: ''}
