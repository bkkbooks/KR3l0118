  - {type: variant, offset: 2618, length: 173, content: 縱轡飲馬而蘆枝有拂鞍者宥因閒援熟視忽見新絲箏弦周纏蘆心宥即收蘆伸弦其長倍尋試縱之應乎复結宥奇駭因置于懷行次江館其家室皆已維舟入亭矣宥故駙馬也家有妓即付箏妓曰我于蘆心得之頗甚新緊然沙洲江徼是物何自而來吾甚異之試施于器以聽其音妓將安之更無少異唯短三二寸耳方饌妓即置之隨置复結食罷視之則已蜿蜒搖動妓惊告眾競來觀之而雙眸瞭然矣宥駭曰得非龍乎命衣冠焚香致敬, WYG: ''}
