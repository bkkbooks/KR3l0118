  - {type: variant, offset: 2364, length: 253, content: 逸狀奇姿婉然可愛于是以水沃之其龍伸足振鬣已長數尺矣元裕大恐有白云自盆中而起其龍亦逐云而去元裕即翰之父也盧翰唐安太守盧元裕子翰言太守少時嘗結友讀書終南山日晚溪行崖中得一圓石瑩白如鑒方執玩忽次墮地而折中有白魚約長寸余隨石宛轉落澗中漸盈尺俄長丈余鼓鬐掉尾云雷暴興風雨大至李修唐浙西觀察使李修元和七年為絳郡守是歲其屬縣龍門有龍見時觀者千數郡以狀聞于太府時相國河東府張弘靖為河中節度使相國之子故舒州刺史以宗嘗為文以贊其事韋宥唐元和故都尉韋宥出牧溫州忽忽不樂江波修永舟船燠熱一日晚涼乃跨馬登岸依舟而行忽淺沙亂流蘆葦青翠, WYG: ''}
