  - {type: variant, offset: 1042, length: 466, content: 唐李紳既治淮南決吳湘獄持法峻犯者無宥狡吏奸豪潛形疊跡然出於獨見寮佐莫敢言評事李元將弟仲將僑寓江都李公羈旅時每館於元將而叔呼焉榮達後元將稱弟稱姪皆不悅及為孫方似相容又有崔巡官居鄭圃與紳同年之舊特來謁纔及旅次家僕與市人競詰其所以僕曰宣州館驛崔巡官下僕與市人皆抵極法令捕崔至曰昔常識君到此何不相見崔叩頭謝曰適憩旅舍日已遲晚相公尊重非時不敢具陳畢禮伏希哀憐獲歸鄉里遂縻之具罪笞二十送過秣陵貌若死灰莫敢慟哭時人相謂曰李公宗叔翻為孫子故人忽作流囚於是邑客黎人懼罹不測渡江淮者眾矣主吏啟曰戶口逃亡不少紳曰汝不見掬麥乎秀者在下秕隨流者不必報來忽有少年勢似疎簡自云辛氏子謁紳晤對間未甚周至先是白尚書寄元相公詩曰悶勸迂辛酒閒吟短李詩蓋謂辛丘度性迂嗜酒李紳短而能詩辛氏即丘度子也謂李曰小子每憶白二十二丈詩悶勸疇昔酒閒吟二十丈詩李笑曰辛大有此狂兒吾敢不存舊矣凡是官族相抉辛氏子之能忤誕丞相之受侮剛腸暫屈乎又有一曹官到任儀質頗似府公李見而惡之書其狀曰著青把笏也請料錢覩此形骸足可傷嘆左右皆竊笑焉又宿將有過請罰紳云老兵倚恃年老而刑不加若在軍門一百也決竟不免檟楚, WYG: 闕}
