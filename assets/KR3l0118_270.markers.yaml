  - {type: variant, offset: 3271, length: 0, content: '', WYG: 出玉堂閑話竇烈女烈女姓竇氏小字桂娘父良建中初爲汴州戸曹掾桂娘美顔色讀書甚有文李希烈破汴州使甲士至良門取桂娘去將出門顧其父曰愼無戚戚必能滅賊使大人取富貴于天子桂娘既以才色在希烈側復能巧曲取信凡希烈之宻雖妻子不知者悉皆得聞希烈歸蔡州桂娘嘗謂希烈曰忠而勇一軍莫如陳仙竒其妻竇氏仙竒竉且信之願得相徃來以姊妹叙齒因徐説之以堅仙竒之心希烈然之因以姊事仙竒妻嘗間謂曰賊凶殘不道遲晚必敗姊應早圖遺種之地仙竒妻然之興元元年四月希烈暴死其子不發喪欲盡誅老將校俾少者代之計未决有獻含桃者桂娘白希烈子請分遺仙竒妻且以示無事於外因爲蠟帛書曰前日已死殯在後堂欲誅大臣須自爲計次朱染帛丸如含桃仙竒發丸見之言於薛育曰兩日稱疾但怪樂曲雜發盡夜不絶此乃有謀未定示暇於外事不疑矣明日仙竒薛育各以所部兵譟於衙門請見希烈烈子迫出拜願去僞號一如李納仙竒曰爾悖逆天子有命因斬希烈妻及子函七首以獻陳尸於市後兩月吳少誠殺仙竒知桂娘謀因亦殺之出樊川集歌者婦}
