  - {type: variant, offset: 1029, length: 384, content: 姓竇氏小字桂娘父良建中初為汴州戶曹掾桂娘美顏色讀書甚有文李希烈破汴州使甲士至良門取桂娘去將出門顧其父曰慎無戚戚必能滅賊使大人取富貴于天子桂娘既以才色在希烈側復能巧曲取信凡希烈之密雖妻子不知者悉皆得聞希烈歸蔡州桂娘謂希烈曰忠而勇一軍莫如陳仙奇其妻竇氏仙奇寵且信之願得相往來以姊妹敘齒因徐說之以堅仙奇之心希烈然之因以姊事仙奇妻嘗間謂曰賊凶殘不道遲晚必敗姊因早圖遺種之地仙奇妻然之興元元年四月希烈暴死其子不發喪欲盡誅老將校俾少者代之計未決有獻含桃者桂娘曰希烈子謂分遺仙奇妻且以示無事於外因為蠟帛書曰前日已死殯在後堂欲誅大臣須自為計次朱染帛丸如含桃仙奇發丸見之言於薛育曰兩日稱疾但怪樂曲雜發盡夜不絕此乃有謀未定示暇於外事不疑矣明日仙奇薛育各以所部兵譟於衙門請見希烈烈子迫出拜願去偽號一如李納仙奇曰爾悖逆天子有命因斬希烈妻及子函七首以獻陳尸於市後兩月吳少誠殺仙奇知桂娘謀因亦殺之, WYG: ''}
