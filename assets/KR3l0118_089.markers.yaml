  - {type: variant, offset: 7884, length: 432, content: 晉代有個佛教僧侶康法朗修學佛道於中山永嘉年間與一個出家的僧人一起西遊去印度通過大沙漠後又走了一千餘里見道旁有一座破敗的寺廟殿堂已經沒有了雜草有一人高法朗等人走下路來前去拜謁見有兩個僧人分別坐在一旁一人正在讀經書一人患了痢疾滿屋子都是糞便那個讀經書的人都不聞不問法朗等人出於怜憫之心留下來為那個病人煮粥吃并為他打掃洗涮到第六天病人有些困乏痢瀉不止法朗等人一塊兒收拾料理這天夜晚法朗等人都說病人恐怕好不了了第二天早上去看他只見他容光煥發病狀全沒了但是屋里的糞便全變成了香花法朗等人這才省悟此人明明是個得道之士原來那副樣子是用來試驗他們的病人說隔壁房里那個僧人是我師父他已久得道惠你們可去見禮法朗等人原先嫌惡那人讀經的僧人毫無慈愛之心听了這番話後便向他賠禮道歉讀經和尚說諸位信守契約同時來到這里都應當得道但法朗平日學業尚成今生不能如願了對法朗的那個同伴說你的佛心植根很深現世即可如願於是把他留了下來法朗後來返回山中是一位大法師許多佛教徒無論是出家的還是從俗的都尊他為宗師, WYG: ''}
