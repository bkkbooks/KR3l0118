  - {type: variant, offset: 1341, length: 1703, content: 么又給他一卷成具光明經不少於一萬字他拿到手後還像讀上一本一樣第二天晚上收工回來又還給師父師父拿著經書讓他背誦結果一字不差師父甚為驚訝敬重他的才華改變了原來對他的態度後來為他受具足戒還特意允許他可以任意出外遊學道安到了鄴都遇見佛圖澄便師事佛圖澄後來石氏政權要發生內亂道安與弟子惠遠等四百餘人渡過黃河南下一天晚上赶路時遇上了雷雨他們借著閃電的光亮行進走著走著面前出現了一戶人家只見大門里面有個栓馬樁兩樁之間挂著個馬兜能盛一斛一百升為一斛東西道安讓別人呼喚林百升林百升說道安是個神人所以厚禮接待了他們後來弟子問他怎么能知道那個人的姓名道安說因為那兩根樁二木為林字那個馬兜可以盛下百升到達襄陽後道安就在那里宣講佛法當時襄陽有個習鑿齒能言善辯名噪一時原先他是因道安而使自己出了名听說道安到了襄陽便去拜訪他敘座之後習鑿齒自己炫耀說四海習鑿齒意思是說自己的名聲搖揚四海之間道安則說彌天釋道安意思是說普天之下無人不知道釋道安的名字這次對話在當時很有名氣尤其是道安的對答成為一時的名對符堅素聞釋道安的名氣常跟人說道襄陽有個釋道安是神才正想把他召致來讓他輔佐我後來他派符平南下攻打襄陽道安與朱序都被抓獲送給了符堅符堅對仆射權翼說朕以十萬大軍攻取襄陽只為得到一個半人權翼問道這一個半人是誰符堅說道安是一個人習鑿齒是半個人道安到了長後住在長安五重寺符堅當初接受了石氏的混亂江山到現在已經人口興旺生活富裕周圍邦國基本被平定唯獨建業一方面未能克服他常與大臣們談論時時刻刻都想平息江東一帶符堅的弟弟平陽公符融與朝廷大臣石越原紹等一起懇切地勸阻他但他一直不能改變自己的主意他們以為道安是符堅最為信服敬重的人便共同請求他道我主要向東南出兵您怎么能不為了蒼生而勸他一句呢正赶上符堅從東苑里出來命道安坐在自己車的一邊仆射權翼勸諫道臣聞天子的車駕只能由侍中陪坐道安剃度毀形哪能坐在您旁邊符堅厲聲斥道道安公的道德令人尊重朕以天下都換不過他讓他與我同車的榮譽也不能與他的道德相稱當即敕令仆射扶著道安上車不一會兒符堅看著道安對他說朕將要與你南遊吳越統領六軍南下巡視登上會稽以觀滄海不也是件很愜意的事嗎道安說陛下順應天命而管領天下今有八州之多的疆土居於中原而統治四方應當息神無元為而休養生息與堯舜二世比賽昌盛現在想以百萬之師要爭奪的不過是那塊不毛之地況且這東南一帶地處偏僻氣候惡劣大軍行動極為不利當年禹帝巡遊到那里就不能前進舜帝巡狩死在那里秦王到了那里也沒有回來以貧道之見不同意出兵吳越平陽公是至親吳越是重臣他們一致說不可以尚且被拒絕貧道如此輕淺我的話肯定不能應允但因既蒙陛下厚遇所以理當竭盡赤誠而已符堅說不是因為地盤不大人口不多不足以治理為的是要擴大天意的影響彰明天運無處不在罷了朕應天時而巡狩四方也符合前人的法則如果像大師所說的那樣那么先前的帝王豈不沒有視察四方的舉動和文字記載了嗎道安說如果鑾駕一定要出巡可以先到洛陽在那里抗御強敵的威脅積蓄自己的力量向江南下一道征討的文書如果他們不順服然後興兵討伐也不算晚符堅沒有听從派遣平陽公符融等精銳部隊二十五萬為前鋒符堅親率步騎六十萬揮師南下到了須城東晉派遣征虜將軍謝石徐州刺史謝玄統兵迎戰符堅的前鋒部隊大敗於八公山晉軍便向北推進了三十餘里符堅單人獨騎落荒而逃正像道安所勸諫他說的那樣道安注釋了許多佛經唯恐自己的注解不合於教義便發誓說如果所說的與佛理相差不大祈願佛祖顯示吉祥之象於是夢見一位道人滿頭白發長長的眉毛告訴道安你所注釋的經書非常符合佛理我不能入泥淖世俗住在西域會幫助你通達的你可時時擺設供食後十誦律至遠公乃知和尚所夢賓的頭顱了到了前秦建元二十一年正月二十七日忽然有個異僧形貌很髒很丑來到寺廟寄宿因為寺房狹窄便把他安置在講經堂上當時維那值班守殿夜里看見此僧從窗口出入立即報告了道安道安慌忙起床按照禮節去詢問他問及他的來意時答道特意為你而來道安說自覺罪孽深重怎么可以度脫答道完全可以超度了道安請問來生生在什么地方他便用手在空中撥了撥西北方向的天頓見那邊云霧散開清清楚楚地看見兜率妙勝之極道安於這年二月八日突然告訴大家說我要離去了這一天齋戒完畢後他沒有任何疾病就去世了安葬在城內五極寺中這一年是晉太元元年, WYG: ''}
