  - {type: variant, offset: 4784, length: 2831, content: 鳩摩羅什意譯為童壽天竺人通曉經律論三藏佛典遊化於西域東遊龜茲時龜茲王為他建造金獅子一座安置他當時符堅統治關中有外國前部王與龜茲王弟一起朝見符堅符堅召見他們二王說符堅道西域多有珍奇特產請出兵征伐讓其歸附符堅建元十三年正月太史奏道有一個星座在外國邊界出現要有大德賢能的人物前來輔助中國符堅說朕听說西域有個鳩摩羅什襄陽有個沙門道安莫不就是他么立即派使去求他到了建元十七年二月鄯善國原先那個前部王等人又來遊說符堅請他出兵西伐十八年九月符堅派遣驍將呂光凌江將軍姜飛由前部王與車師王等陪同領兵七萬西征龜茲出發前符堅於建章為呂光餞行他對呂光說帝王順應天命而治天下要以慈愛蒼生為根本豈能為了貪占其土地而攻伐他們正是因為懷念遠方山人的緣故朕听說西域有個人叫鳩摩羅什精通佛家教義善長陰陽之學成為後學者的楷模膚非常思念他賢哲之人是國家的珍寶如果攻克龜茲要立即把鳩摩羅什送回來呂光的軍隊還沒到達龜茲時鳩摩羅什就對龜茲國王白純說國家的氣運已經衰微了又有強敵從東方打來應當恭順地服從他們不要與其交鋒白純不听他的勸告出兵與呂光交戰呂光攻破龜茲殺死白純他的弟弟白震為龜茲國王呂光得到鳩摩羅什後不知道他有多大的才學見他年紀尚輕便以常人對待并且戲弄他強迫他與龜茲王女兒結婚鳩摩羅什極力拒絕向呂光苦苦哀求呂光卻說道士的操行不過像你父親而已為什么要拒絕呂光讓他喝了美酒與妻子關到一間房子里什被逼著與妻子同房之後便損失了自己的操守呂光還讓他騎牛或騎沒有馴服的馬想要他摔下來出丑什忍受這些屈辱毫無怨怒之色呂光只好感到慚愧呂光在返回關中的途中把軍隊安置在山下將士們已經休息了什說不應住在這個地方住在這里會有危險的應該把軍隊轉移到平坦的地方去呂光沒有採納他的意見到了夜間果然下起了大雨山洪暴發水漲數丈淹死了几千人由此呂光才暗暗佩服他是個不尋常的人什對光說這個凶險的地方不易於久留推究起來應該赶緊往回走去關中的路上肯定有好地方可以住下呂光听從了他的話部隊行進到涼州听說符堅已被姚萇殺害呂光三軍都穿上了孝服兵臨城南呂光於是占領涼州自立為涼主年號稱為太安太安二年正月姑臧刮起了狂風什說這是不祥之風會有奸賊叛亂然而不用出兵叛敵就會自動平息的不久梁謙與彭晃接連謀反很快就被扑滅了到了呂涼龍飛二年張掖臨松盧水的胡人渠男成及其從弟沮渠蒙遜反叛推舉建康太守段業為國主呂光派遣庶子秦州刺史太原公呂纂率兵五萬前去討伐當時人們都評論說段業的人馬乃是烏合之眾呂纂又素有聲威此次征討必獲全勝呂光為此事去問鳩摩羅什什說我看這次行動不會勝利後來呂纂敗於合黎不久又有郭作亂呂纂輕率地讓大軍往回行進果被郭打敗只有他一人逃了回來呂光的中書監張資很有文才為人溫文爾雅很受呂光器重張資病了呂光不惜代价多方營救治療有個外國人叫羅叉說能治好張資的病呂光非常高興送給他很多東西鳩摩羅什知道羅叉在撒謊騙人告訴張資說羅叉根本不能治你的病白白浪費而已壽命長短雖然看不出來但可用一件事來試驗你的病能不能治好他以五色絲線搓成繩打成結燒成灰末扔在水里說如果灰末從水里浮出來還原繩病不能治愈不一會兒只見灰末聚攏在一起浮出水面又變成了繩的原形既然羅叉治療無效沒過几天張資就死了不久呂光又死了兒子呂紹承襲其位過了几天呂光的庶子呂纂殺死呂紹自立為王年號稱為咸寧咸寧二年有口豬生的崽一只身子上長著三個腦袋一只龍從東箱井中飛出飛到宮殿前面蟠臥起來第二天早上又不見了呂纂以為這是吉祥之兆命名大殿為龍翔殿沒過多久又有一條黑龍飛到當陽九宮門上呂纂改名為龍興門鳩摩羅什奏道這几天潛藏著的龍飛了出來豬妖也生下來奇異之物龍屬於陰類并不輕易出動如今連續出現說明要有災禍降臨肯定有人犯上作亂應當克制自己廣施仁德借以報答上天的驚戒呂纂沒有採納他的建議他與鳩摩羅什打賭賭注是我要砍掉胡奴的頭鳩摩羅什說不能砍掉胡奴的頭胡奴反要砍掉別人的頭這句話是有所指的而呂纂始終不明白呂光的弟弟呂保有個兒子叫呂超小名叫胡奴胡奴後來果然殺死呂纂砍下了他頭立他的哥哥呂隆為涼王這時人們才驗證了鳩摩羅什打賭時所說的那句話鳩摩羅什在涼地住了多年因為呂光父子從不弘揚佛教他只蘊藏起自己對佛理的深刻見解沒有机會進行宣化符堅雖然深慕其名但他死了一直沒有見到他姚萇在長安稱帝之後也仰慕鳩摩羅什的高名曾經虛心邀請而呂光父子因為羅什足智多能怕他為姚萇出謀旬策不放他東行到了姚萇逝世其子姚興繼位之後又曾派人敦請姚興弘始三年三月皇宮院內的逍遙園長了一棵連理樹蔥變為菃人們都說這是吉祥之兆要有才智之人應召入關五月姚興派遣隴西公碩德西征討伐呂隆呂隆的軍隊被打敗到了九月呂降上表歸降羅什才被迎接入關於十二月二十日來到長安姚興以國師之禮待他羅什備受尊寵自從佛教東傳以來從漢明帝開始歷經魏晉流傳在中國的經書日漸增多但這些經書是用印度梵文寫成的艱澀難懂姚興年輕時就推崇佛教經典有志於收羅通曉經典的進行講解羅什既已來到長安住下便請他在西明閣與逍遙園開始翻譯各種經書這些經書羅什過去大都熟讀過深刻而全面地研究過其中的含義後又熟練地掌握了漢語翻譯起來流暢輕便他發現原來的譯本文義有許多乖訛之處都出自當時譯者在理解上存在的偏差與梵文原著不相符合姚興於是讓沙門學者僧契僧遷法欽道流道恒道標僧睿僧肇等八百餘人都來請教接受羅什的見解共同從事翻譯工作又讓他們重新譯出大品經羅什手持梵文原著姚興拿著舊譯的經書互相對照校訂新的譯文與舊譯不同的地方都比原譯文意義圓滿通達眾人讀了無不稱心佩服大為欣賞鳩摩羅什為人神情開朗秉性坦率對於佛理能夠應机領會卓有見地很少有人比得上他他對人坦誠熱情忠厚仁慈心存博愛情懷他虛懷若谷循循善誘終日不倦姚興常跟羅什說大師聰明超悟天下第一一旦百年之後怎能使法種沒有後代便給他舞女十人強令他接受從那之後羅什不再住在僧舍另外有了住宅日常供給十分丰盈每到講說教義的時候常常以自身作譬喻譬如臭泥中生蓮花但採蓮花之高洁勿取臭泥之污濁羅什當初在龜茲時跟從卑摩羅叉律師學習音律卑摩後來也來到長安羅什听說後非常高興對他極盡師敬之禮卑摩不知道被逼接受舞女的事僅問羅什道你在漢地極有緣分跟你受法的弟子能有多少人羅什答道漢地經律尚未完備新譯的經書與許多論著多是我所出的三千徒弟都跟我學習佛法但我守戒奉佛的功業經常受到深重的障礙所以得不到他們對師父的敬重還有僧人杯度住在彭城听說羅什在長安便歎道要跟這小子開開玩笑縱使三百多年見不著他來生總有遇見他的時候羅什在臨終的前几天感到身體不舒服便口出三番神咒讓外國弟子念誦借此救治自己沒等咒語生效又覺生命危殆於是來了重病他與眾僧告別道因緣佛法與諸位相遇深感情念未盡現在又要離去悲痛傷感之懷難以表達以我之愚昧不明謬充傳譯之任所出經論三百餘卷只有十誦一部未及刪訂薄耵其本來旨意必定沒有差失願我平生所宣講的教義能夠流傳於世與大家共同弘揚研討佛法今於眾位面前我發誠實之誓如果所傳經義無謬誤者當使焚身之後舌不焦爛弘始十一年八月二十日鳩摩羅什逝世於長安這年是東晉義熙五年逝世後就在逍遙園依照西域習俗予以火化柴火熄滅後形體粉碎唯獨舌頭沒有變成灰燼, WYG: ''}
