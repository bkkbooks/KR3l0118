  - {type: variant, offset: 1506, length: 0, content: '', WYG: 出瀟湘録周義周義者鄭人也性倜儻好急人之患難忽有一人年可弱冠已來衣故錦衣策杖而詣周義謂義曰我是孟州使君之子也偶出獵於郊坰既獲兎後其鷹犬與所從我十餘少年與所乗馬皆無故而死我亦有一流矢不知自何至傷我右足我是以不敢返歸恐少年家父母不捨我今聞君急人之患難故特來投君幸且容我我他日必厚報君之恵也義遂藏之于家經百餘日義既不聞孟州有此事乃夜與少年對酌問之曰君子始投我言是使君之子因出獵有死傷不敢返歸今何不𫝊聞此事我疑君子君子必以實告我我心無貳少年沉吟移時方起拜而言曰我始設此異詞者盖欲憫念納我今若必問我我實不敢更設詐也君當不移急人之心我即以實告君義曰我終無貳但言之少年曰我孟州境内虎也傷人多矣刺史發兵捜求我欲殺我聞君廣義因變形質以投君君憐恤我待之如賔但我已誓報君之恵不忘今夜既言誠實事也我不可住遂呌吼數聲化為一虎走去後月餘夜有一少年踰垣入義家抛下一金枕髙聲告周義我是昔受恩人也今將此枕答君之恵言訖復化為一虎去出瀟湘録中朝子有一中朝子弟性頗落拓少孤依於外家外家居在亳州永城界有荘舅氏一女甚有才色此子求娶焉舅曰汝且勵志求名名成吾不違汝此子遂發憤篤學求名京邑白於舅曰請三年以女見待如違此期任别適人舅許之此子入京四年未歸乃别求女壻行有日矣而生亦已成名歸去舅荘六七十里夜宿時暑熱此子從舟中起登㟁而望去舟半里餘有一空屋遂領一奴持刀棒居宿焉此乃一廢佛屋土榻尚存此子遂寝焉奴人於地持刀棒衛之忽覺榻下有物動聲謂是蟲鼠亦無所疑夜至三更月漸明忽一虎背負一物擲於門外草内將欲入屋此人遂持刀棒呌呼便驚走呼舟人持火來照草間所墮乃一女妝梳至美但所著故衣耳亦無所損傷熟視之乃其舅妹即許嫁之者為虎驚語猶未得遂扶入屋又照其榻後有虎子數頭皆殺之扶女却歸舟中明日至舅荘遥聞哭聲此子遂維舟荘外百餘歩入荘先慰問㐫故舅曰吾以汝來過期許嫁此女於人吉期本在昨夜一更後因如厠為虎所搏求尸不得生乃白其事舅聞悲喜驚嘆遂以女嫁此生也出原化記太平廣記卷四百三十一}
