  - {type: variant, offset: 2515, length: 517, content: 千古睽離之嘆仍乞留止此冀神會於髣髴之中章武乃求鄰婦為開門命從者市薪芻食物方將具絪席忽有一婦人持箒掃地鄰婦亦不之識章武因訪所從者云是舍中人又逼而詰之即徐曰王家亡婦感郎恩情深將見會恐生怪怖致使相聞章武許諾云章武所由來者正為此也雖顯晦殊途人皆忌憚而思念情至實所不疑言畢執箒人欣然而去逡巡映門即不復見乃具飲饌呼祭自食飲畢安寢至二更許燈在牀之東南忽爾稍暗如此再三章武心知有變因命移燭背墻置室東南隅旋聞室北角悉窣有聲如有人形冉冉而至五六歲即可辨其狀視衣服乃主人子婦也與昔見不異但舉止浮急音調輕清耳章武下牀迎擁攜手欸若平生之歡自云在冥錄以來都忘親戚但思君子之心如平昔耳章武倍與狎匿亦無他異但數請令人視明星若出當須還不可久住每交歡之暇即懇託在鄰婦楊氏云非此人誰達幽恨至五更有人告可還子婦泣下牀與章武連臂出門仰望天漢遂嗚咽悲怨却入室自於裙帶解錦囊囊中取一物以贈之其色紺碧質又堅密似玉而冷狀如小葉章武不之識也子婦曰此所謂靺鞨寶出崑崙玄圃中彼亦不可得妾近於西岳與玉京夫人戲見此物在眾寶璫上愛而訪之夫人遂假以相授云洞天群仙每得此一寶皆為光榮以郎奉玄道有精識故以投獻常願寶之此非人間之有遂贈詩曰河漢已傾斜神魂欲超越願郎更迴抱終天從此訣章武取白玉寶簪一以酬之並答, WYG: ''}
