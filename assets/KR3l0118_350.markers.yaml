  - {type: variant, offset: 1082, length: 986, content: 之即正色歛袵不對抵白沙各遷舟航青衣乃謝濬曰數日承君深顧某陋拙不足奉歡笑然亦有一事可以奉酬中元必遊瓦官閣此時當為君會一神仙中人況君風儀才調亦甚相稱望不踰此約至時某候于彼言訖各登舟而去濬誌其言中元日來遊瓦官閣士女闐咽及登閣果有美人從二女僕皆雙環而有媚態美人倚欄獨語悲歎久之濬注視不易美人亦訝之又曰幼芳之言不謬矣使雙鬟傳語曰西廊有惠鑒闍黎院則某舊門徒君可至是幼芳亦在彼濬甚喜躡其蹤而走果見同舟青衣出而微笑濬遂與美人敘寒暄言語畢日僧進茶果至暮謂濬曰今日偶此登覽為惜高閣病茲用功不久毀除故來一別幸接歡笑某家在清溪頗多松月室無他人今夕必相過某前往可與幼芳後來濬然之遂乘軒而去及夜幼芳引濬前行可數里而至有青衣數輩秉獨迎之遂延入內室與幼芳環坐曰孔家娘子相鄰使邀之曰今夕偶有佳賓相訪願同傾觴以解煩憤少頃而至遂延入亦多說陳朝故事濬因起白曰不審夫人復何姓第頗貯疑訝答曰某即陳朝張貴妃彼即孔貴嬪居世之時謬當後主采顧寵幸之禮有過嬪嬙不幸國亡為楊廣所殺然此賦不仁可甚于劉禪孔皓豈無嬪御獨有斯人行此冤暴且一種亡國我後主實即風流詩酒追歡琴樽取樂而已不似楊廣西築長城東征遼海使天下男冤女曠父寡子孤途窮廣陵死于匹夫之手亦上天降鑒為我報讎耳孔貴嬪曰莫出此言在坐有人不欲美人大叫笑曰渾忘却濬曰何人不欲斯言耶幼芳曰某本江令公家嬖者後為貴妃侍兒國亡之後為隋宮御女煬帝江都為侍湯膳者及化及亂兵入某以身蔽帝遂為所害蕭後憐某盡忠于主因使殉葬後改葬於雷塘側不得從焉時至此謁貴妃耳孔貴嬪曰前說盡是閑事不如命酒略延曩日之歡耳遂命雙鬟持樂器洽飲久之貴妃題詩一章曰秋草荒臺響夜蛬白楊聲盡減悲風綵牋曾擘欺江揔綺閣塵清玉樹空孔貴嬪曰寶閣排雲稱望仙五雲高艷擁朝天清溪猶有當時月夜照瓊花綻綺筵幼芳曰皓魂初圓恨翠娥繁華濃艷竟如何兩朝唯有長江水依舊行人逝作波濬亦和曰蕭管清吟怨麗華秋江寒月倚窗斜慚非後主題牋客得見臨春閣上花俄聞叩門曰江脩容何婕妤袁照儀來謁貴妃曰竊聞今夕佳賓幽會不免輒窺盛筵俱艷其衣裾明其璫珮而入坐及見四篇捧而泣曰今夕不意再逢三閣之會又與新狎客題詩也頃之聞雞鳴孔貴嬪等俱起各辭而去濬與貴妃就寢欲曙而起貴妃贈辟塵犀簪一枚曰異日覩物思人昨宵值客多未盡歡情別日更當一小會然須諮祈幽府嗚咽而別濬翌日懵然若有所失信宿更尋曩日地則近清溪松檜丘墟詢之于人乃陳朝宮人墓濬慘惻而返數月閣因寺廢而毀後至廣陵訪得吳公臺煬帝舊陵果有宮人趙幼芳墓因以酒奠之, WYG: 錄}
