  - {type: variant, offset: 2872, length: 332, content: 何殊性前聞文王嗜昌獨楚王嗜芹葅屈到嗜芰曾皙嗜羊棗宋劉雍嗜瘡痂本傳曰雍詣前吳興太守孟靈休靈休脫襪粘炙瘡痂墜地雍俯而取之餐焉宋明帝嗜蜜漬𧏿蛦每啖數升是知海上逐臭之談陳君愛醜之說何其怪歟天與其癖也出朝野僉載鮮于叔明劍南東川節度鮮于叔明好食臭蟲時人謂之蟠蟲每散令人採拾得三五升即浮之微熱水中以抽其氣盡以酥及五味熬之卷餅而啖云其味實佳出乾子權長孺長慶末前知福建縣明鈔本縣作院權長孺犯事流貶後以故禮部相國德輿之近宗遇恩復資留滯廣陵多日賓府相見皆鄙之將詣闕求官臨行群公飲餞於禪智精舍狂士蔣傳知長孺有嗜人爪癖乃於步健及諸傭保處薄給酬直得數兩削下爪或洗濯未精以紙裹候其酒酣進曰侍御遠行無以餞送今有少佳味敢獻遂進長孺長孺視之忻然有喜色如獲千金之惠涎流於吻連撮噉之神色自得合座驚異出乾子, WYG: ''}
