  - {type: variant, offset: 5941, length: 0, content: '', WYG: 出摭言薛能薛能以文章自負而累出戎鎮常鬱鬱歎息因有詩謝淮南寄天柱茶其落句云粗官乞與真抛却賴有詩情合得嘗意以節將為粗官也鎮許昌日幕吏咸集因令其子􅐤鞬參諸幕客幕客驚怪能曰俾渠消災時人以為輕薄出北夢瑣言髙逢休顧雲大順中制同羊昭業等十人修史雲在江淮遇諫議髙逢休時僕射劉崇龜清名雅譽充塞縉紳其弟崇望復在中書雲以逢休與崇龜舊交將造門希致先容逢休許之久矣雲臨岐請書逢休授之一函甚草創雲微有惑因取所授潛閱啓之凡一幅並不言雲但曰羊昭業擬將一尺三寸汗脚􅂿他燒殘龍尾道懿皇帝雖薄徳不任被前件人羅織執大政者亦大悠悠雲吁歎而已出摭言太平廣記卷二百六十五}
