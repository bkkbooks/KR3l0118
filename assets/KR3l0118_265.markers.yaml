  - {type: variant, offset: 394, length: 208, content: 彭城人幼聰敏七歲能屬文舅中書郎王融深賞異之每言天下文章若無我當歸阿士阿士孝綽小字也與到洽友善同侍東宮孝綽自以才優於洽每於宴坐嗤鄙其文洽銜之孝綽為廷尉正攜妾入官府其母猶停私宅洽為御史中丞劾奏之坐免官高祖為藉用詩奉詔作者數十人孝綽尤工即日敕起為諮議後遷黃門侍郎坐受賕為餉者所訟左遷孝綽少有盛名而仗氣負才多所凌忽有不合意極言詆訾領軍臧盾太府卿沈僧果等並被時遇孝綽尤輕之每於朝集會同處公卿間無所與語反呼騶卒訪道塗間事由此多忤, WYG: ''}
