  - {type: variant, offset: 5377, length: 0, content: '', WYG: 出北夢瑣言陳磻叟陳磻叟父岵富有詞學尤溺於内典長慶中常注維摩經進上有中㫖令與好官執政謂岵因内道塲僧進京頗抑挫之止授少列而已磻叟形質短小長喙疎齒尤富文學自負王佐之才大言騁辯雖接對公相旁若無人復自料非名教之器弱冠度為道士𨽻名於昊天觀咸通初降聖之辰三教論議黄衣屢北帝小不懌宣下令後輩新入内道塲有能折衝浮圖者許以自薦磻叟攝衣奉詔時釋門為主論目誤引湼槃經疏義磻叟應聲叱之曰皇帝山呼大慶阿師口稱獻夀而經引湼槃犯大不敬始其僧謂磻叟不通佛書既而錯愕殆至顛墮自是連挫數輩聖顔大恱左右呼萬嵗其日簾前賜紫衣一襲磻叟繇是恣其輕侮髙流宿德多患之潛聞帝聽云磻叟衣冠子弟不願在冠帔思理一邑以自効耳於是中㫖授池州至徳縣令磻叟莅事未終考秩抛官詣闕上事通義劉瞻引為羽翼非時詔對數刻磻叟所陳凡數十節備究時病復曰臣請破邊瑊一家可以贍軍一二年上問邊瑊何人對曰宰相路巖親吏既而大為巖恚怒翌日敕以磻叟誣㒺上聼詆訐大臣除名為民流愛州磻叟雖至顛蹶輙不以其道自屈素有重膇之疾歴聘藩后率以肩輿造墀廡所至無不仰止及巖貶磻叟得量移為鄧州司馬時屬廣明庚子之後劉巨容起徐將得襄陽不能知磻叟待以巡屬一州佐耳磻叟㳂漢南下中途與巨容幕吏書云已出無禮之鄉漸入逍遙之境巨容得之大怒遣健歩十餘輩移牒潭鄂追捕磻叟時天下喪亂無人為之隄防既而為卒伍所凌全家泝漢至賈壍後門殺之三十餘口無遺𩔖矣出摭言}
