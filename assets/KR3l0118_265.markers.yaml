  - {type: variant, offset: 3170, length: 1604, content: 宅速鞭而歸於通衢遇友人鄭賨見其喜形於色駐馬懇詰長樂遽以恩地之辟告之滎陽尋捧刺詣京兆門謁賀具言得於馮先輩也京兆嗟憤而鄙其淺露洎制下開幕馮不預焉心緒憂疑莫知所以廉車發日自灞橋乘肩輿門生咸在長樂拜別京兆公長揖馮曰勉旃由是囂浮之譽遍於搢紳竟不通顯中間又涉交通中貴愈招清議官止祠部郎中眉州刺史仕蜀至御史大夫溫庭筠太原人大中初應進士苦心研席長於詩賦然士行塵雜不脩邊幅能逐絃吹之音為測艷之詞公卿家無賴子弟裴誠令狐縞之徒相與蒲飲酣醉終日由是累年不第徐商鎮襄陽往依之署為巡官咸通中失意歸江東路由廣陵心怨令狐綯在位時不為成名既至與新進少年狂遊俠愈久不刺謁又乞索於揚子院醉而犯夜為虞候所繫敗面折齒方遷揚州訴之令狐綯捕虞候治之極言庭筠狹邪醜迹自是污行聞於京師開明中溫庭筠才名藉甚然而罕拘細行以文為貨識者鄙之無何執政間復有惡奏庭筠攪擾場屋出隨州方城縣尉時中書舍人裴坦當制忸怩含毫久之時有老吏在廁因訊之升黜對曰舍人合為責詞何者入策進士與望州長馬齊資坦釋然故有澤畔長沙之比庭筠之任文士爭為詞送唯記唐夫得其尤曰何事明時泣玉頻長安不見杏園春鳳凰詔下雖霑命鸚鵡才高却累身且飲醁醽消積恨莫辭黃綬拂行塵方城若比長沙遠遊隔千山與萬津陳磻叟者父名岵當有詞學尤溺於內典長慶中嘗注維摩經進上有中旨令與好官執政謂岵因為道場僧進經頗抑挫之止授少列而已磻叟形質短小長喙踈齒尤富文學自負王佐之才大言騁辯雖接對相公旁若無人復自料非名教之器弱冠度為道士隸名於昊天觀咸通中降聖之辰二教論議而黃衣屢奔上小不懌宣下令後輩新入內道場有能折衝浮圖者論以自薦磻叟攝衣奉詔時釋門為主論自誤引涅槃經疏磻叟應聲叱之曰皇帝山呼大慶阿師口稱獻壽而經引涅槃犯大不敬以其僧謂磻叟不通佛書既而錯愕殆至顛墜自是連挫數輩聖顏大悅左右呼萬歲其日簾前賜紫衣一襲磻叟由是恣其輕侮高流宿德多患之潛聞上聽云磻叟衣冠子弟不願在官帔頗思理一邑以自效耳於是中旨授至德縣令磻叟蒞事未經考秩拋官詣闕上封事通義劉公引為羽翼非時召對數刻磻叟所陳數十節侵窮時病復曰臣請破邊瑊家可以贍軍一二年上問邊瑊何人對曰宰相路巖親吏既而大為巖恚怒翌日敕以磻叟誣罔上聽訐斥大臣除名為民流愛州磻叟雖至顛蹶不敢以其道自屈素有重墜之疾歷聘藩后率以肩輿造犀廡所至無不仰止及巖貶磻叟得量移為鄧州司馬時屬廣明庚子之後劉巨容起徐將得襄陽不能知磻叟待以巡屬一州佐耳磻叟沿漢南下中途與巨容幕吏書云已出無禮之鄉漸入逍遙之境巨容得之大怒遣步健十餘輩移牒潭鄂追捕磻叟時天下喪亂無人為堤防既而為卒伍所凌全家泝漢至賈壍後門三十餘口無噍類矣薛能會昌間進士自負過高從事西川日每短諸葛功業為詩曰陣圖誰許可廟貌我揶揄又云焚却蜀書宜不讀武侯無可律吾身譏李白曰我生若在開元日爭遣名為李翰林又曰李白終無取陶潛固不刊自題其集云詩源何代失澄清處處狂波污後生常感道孤吟有淚却緣風壞語無情難甘惡少欺韓信枉被諸侯殺禰衡縱到緱山也無益四方聯絡盡蛙聲放誕如此後軍亂被害薛能以文章自負而累出戎鎮常鬱鬱歎息因有謝詩淮南寄天柱茶其落句云粗官乞與直拋却賴有詩情合得嘗意以節將為粗官也鎮許昌日幕吏咸集因令其子橐鞬參諸幕客幕客驚怪能曰俾渠消災時人以為輕薄高逢休顧雲大順中制同羊昭業等十人修史雲在江淮遇高逢休諫議時劉子長僕射清名雅譽充塞縉紳其弟崇望復在中書雲以逢休與子長舊交將造門希致先容逢休許之久矣雲臨期請書逢休授之一函甚草創雲微有惑因潛起閱之凡一幅並不言雲但曰羊昭業擬將一尺三寸汗腳踏他燒殘龍尾道懿宗皇帝雖薄德不任被前件人羅織執大政者亦大悠悠雲吁嘆而已汲師滑州人也自溧水尉拜監察御史時大夫李乾祐為萬年令師按縣獄乾佑差池而出晚師怒不顧而出銜之乾祐尋巡察韋務靜與師鄉里充乾祐判官會制書拜乾祐中丞乾祐顧謂務靜曰邑子可出矣足下可入矣遂左授新樂令性躁率時直長李沖寂即高宗從弟也微有犯師將彈而謂之呼沖寂為弟沖寂謂之曰沖寂主上從弟公姓汲於皇家何親而見呼為弟師慚而止嘗監享太廟責署官將彈之署官徹曉伺其失汲履赤舄如廁共訐之乃止, WYG: 劇談録}
