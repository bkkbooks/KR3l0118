  - {type: variant, offset: 1237, length: 147, content: 仁師之子弟澄液兄蒞並有文翰列居清要每私宴自比王謝之家謂人曰吾門戶及出身歷官未嘗不為第一大丈夫當先據要路以制人豈能默默受制於人湜執政時年三十六嘗暮出端門下天津馬上賦詩曰春還上林苑花滿洛陽城張說見之嘆曰文與位固可致其年不可及也後附韋后比相又附太平公主門下客獻海鷗賦以諷湜稱善而不悛蕭至忠誅流嶺外賜死, WYG: ''}
