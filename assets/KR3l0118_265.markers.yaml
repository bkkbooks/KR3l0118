  - {type: variant, offset: 2436, length: 277, content: 唐諸王孫也年七歲元和中以歌詩著名韓退之皇甫湜覽賀所作奇之相謂曰若是古人吾曹有不知者若是今人豈有不知之理因連騎造門請見賀總角荷衣而出二公面試一篇賀承命欣然操觚染翰傍若無人題曰高軒過二公大驚以所乘馬聯鑣而還元稹以明經中第願與賀交賀見刺曰明經及第何事來見李賀稹慚而退未幾制策登科為禮部郎官乃議賀父名晉不合舉進士時輩從而排之賀竟不第按唐李公藩嘗綴賀歌詩為之敘未成知賀有外兄與賀有筆研舊召見託以搜采放失其人諾且請曰某盡記賀篇詠然黵改處多願得公所輯視之當為是正公喜并付之彌年絕蹟復召詰之乃云某與賀中表自幼同處恨其倨忽常思報之今幸得公所藏并舊有者悉投堰中矣公大恚叱出之, WYG: ''}
