  - {type: variant, offset: 664, length: 0, content: '', WYG: 出家話録汲師汲師滑州人也自溧水尉拜監察御史時大夫李乾祐為萬年令師按縣獄乾祐差池而出晚師怒不顧而出銜之乾祐尋廵察韋務静與師鄉里充乾祐判官㑹制書拜乾祐中丞乾祐顧謂務静曰邑子可出矣足下可入矣遂左授新樂令性躁率時直長李冲寂即髙宗從弟也微有犯師將彈而謂之呼冲寂為弟冲寂謂之曰冲寂主上從弟公姓汲於皇家何親而見呼為弟師慙而止嘗監享太廟責署官將彈之署官徹曉伺其失汲履赤舄如厠共訐之乃止出御史臺記}
