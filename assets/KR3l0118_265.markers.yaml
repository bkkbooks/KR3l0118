  - {type: variant, offset: 2860, length: 309, content: 李群玉澧州人好吹笙常使家僮吹之性喜食鵝及授校書郎即歸故里盧肇送詩云妙吹應諾鳳工書定得鵝題黃陵廟詩有曰黃陵廟前春已空子規啼血淚春風不知精爽落何處疑是行雲秋色中群玉自以為春空便到秋色踟躕欲改恍若有物告以二年之兆至潯陽具述其事於段成式群玉亡後成式哭之詩曰酒裏詩中三十年縱橫唐突世喧喧明時不作禰衡死傲盡公卿歸九泉李群玉字文山性輕率多侮戲人常假江陵幕客書求丐於澧州刺史艾乙李謂艾曰小生病且甚矣幸使君痛救之李以戲其性之僻也群玉以其輕脫而濟之不厚矣馮涓大中四年進士馮涓登第榜中文譽最高是歲新羅國起樓厚齎金帛奏請撰記時人榮之初官京兆府參軍恩地即杜相審權也杜有江西之拜制書未行先召長樂公密話垂延辟之命欲以南昌牋奏任之戒令勿泄長樂公拜謝辭, WYG: ''}
