  - {type: variant, offset: 1726, length: 255, content: 審言之孫少貧不自振客吳越齊趙間舉進士不第天寶間奏賦三篇帝奇之使待制集賢院數上賦頌因寓自稱道且言先臣恕預以來承儒守官十一世迨審言以文章顯臣賴緒業自七歲屬辭且四十年然衣不蓋體常寄食於人竊恐轉死溝壑伏惟天子哀憐之若令執先世故事則臣之述作雖不足鼓吹六經至沈鬱頓挫隨時敏給楊雄枚皋可企及也有臣如此陛下其忍棄之祿山亂天子入蜀甫避走三川會嚴武節度劍南往依焉武以世舊待甫甚善親至其家甫見之或時不中而性褊躁傲誕嘗醉登武牀瞪視曰嚴挺之乃有此兒武亦暴猛外若不為忤中銜之好論天下大事高而不切然數嘗寇亂挺節無所污為詩歌情不忘君人憐其忠云, WYG: ''}
