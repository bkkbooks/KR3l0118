  - {type: variant, offset: 5053, length: 0, content: '', WYG: 出芝田録李羣玉李羣玉字文山性輕率多侮戲人常假江陵幕客書求丏於澧州刺史艾乙李謂艾曰小生病且甚矣幸使君痛救之李以戲其姓之僻也羣玉以其輕脫而濟之不厚矣出北夢瑣言馮涓大中四年進士馮涓登第榜中文譽最髙是嵗新羅國起髙樓厚齎金帛奏請撰記時人滎之初除京兆府參軍恩地即杜相審權也杜有江西之拜制書未行先召涓宻語延辟之命欲以牋奏任之戒令勿泄涓拜謝辭出速鞭而歸遇友人鄭賨見其喜形於色駐馬懇謁涓遽以恩地之辟告之賨尋捧刺詣京兆門謁賀具言得於馮先輩也京兆嗟憤而鄙其淺薄洎制下開幕馮不預焉心緒憂疑莫知所以連車發日自灞橋乗肩輿門生咸在長樂候别京兆長揖馮曰勉旃由是囂浮之譽徧於縉紳竟不通顯問又渉交通中貴愈招清議官至祠部郎中眉州刺史仕蜀至御史大夫出北夢瑣言温庭筠開明中温庭筠才名藉甚然而罕拘細行以文為貨識者鄙之無何執政間復有誣奏庭筠攪擾塲屋出隨州方城縣尉時中書舍人裴坦當制忸怩含毫久之時有老吏在側因訊之升黜對曰舍人合為責詞何者入䇿進士與望州長馬齊資坦釋然故有澤畔長沙之比庭筠之任文士争為詞送唯計唐夫得其尤曰何事明時泣玉頻長安不見杏園春鳯凰詔下雖霑命鸚鵡才髙却累身且飲醁􅌬消積恨莫辭黄綬拂行塵方城若比長沙逺遊隔千山與萬津出摭言}
