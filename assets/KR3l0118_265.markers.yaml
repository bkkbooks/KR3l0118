  - {type: variant, offset: 119, length: 237, content: 從側過曰作如此舉止羞面見人扇障何益淵曰寒士不遜祥曰不能殺袁劉安得免寒士永明初遷長沙諮議參軍撰宋書譏斥禪代王儉密以啟聞上銜而不問兄整官廣州卒祥就整妻求還資撰連珠多肆譏訕事聞上別遣敕祥曰卿素無行檢朝野所悉輕棄骨肉侮蔑兄嫂此是卿家行不足乃無關他人卿才識所知蓋何足論位涉清途於分非屈何意輕肆口噦詆目朝士造席立言必以貶裁為口實冀卿年齒已大能自感勵日望悛革如此所聞轉更增甚喧議朝廷不避尊師肆口極辭彰暴物聽近見卿連珠寄意悖慢彌不可長原卿性命令卿萬里思諐若能改革當令卿還後至廣州終日縱酒病卒, WYG: ''}
