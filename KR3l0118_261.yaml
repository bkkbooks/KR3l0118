body:
  text: 張茂昭張茂昭唐張茂昭為節鎮頻喫人肉及除統軍到京班中有人問曰聞尚書在鎮好人肉虛實昭笑曰人肉腥而且䏰爭堪喫出盧氏雜說唐淮南節度王王原作使據許本黃本改播以錢十萬貫賂遺恩幸以圖內以圖內三字原空闕據黃本補授諫議大夫獨孤朗張仲方起居郎孔敏行柳公權起居舍人宋申錫補闕韋仁實劉敦儒拾遺李景讓薛延口黃本延口作廷老等數數字原空闕據黃本補人前一日詣延英抗論其事後之賄遷其徒實繁自外官至內自下原空闕五字據黃本補外官至內四字學士三司使皆有定價因此致位者不少近有縣令録録字原空闕據黃本補事參軍亦列肆鬻之至有白身便為宰守者然所至多為四方諸侯不放上有以知其來也俾不遵王命抑有由由字原空闕據黃本補焉豈時之重利耶而諫省任非其人耶未嘗以一字整頓頽綱深所未諭出盧氏雜說李秀才唐郎中李播典蘄州日有李生稱舉子來謁會播有疾病子弟見之覽所投詩卷咸播之詩也既退呈于播驚曰此昔應舉時所行卷也唯易其名矣明日遣其子邀李生從容詰之曰奉大人咨問此卷莫非秀才有製乎李生聞語色已變曰是吾平生苦心所著非謬也子又曰此是大人文戰時卷也兼箋翰未更卻請秀才不妄言遽曰某向來誠為誑耳二十年前實於京輦書肆中以百錢贖得殊不知是賢尊郎中佳製下情不勝恐悚子復聞於播笑曰此蓋無能之輩也亦何怪乎饑窮若是實可哀也遂沾以生餼令子延食於書齊數日後辭他適遺之縑繒是日播方引見李生拜謝前事畢又云某執郎中盛卷遊於江淮間已二十載矣今欲希見惠可乎所貴光揚旅寓播曰此乃某昔歲未成事所懷之者今日老為郡牧無用處便奉獻可矣亦無愧色旋置袖中播又曰秀才今擬何之生云將往江陵謁表丈盧尚書耳播曰賢表丈任何官曰見為荊南節度使播曰名何也對曰名弘宣播拍手大笑曰秀才又錯也荊門盧尚書是某親表丈生慚悸失次乃復進曰誠君郎中之言則并荊南表丈一時曲取於是再拜而走出播歎曰世上有如此人耶蘄間悉話為笑端出大唐新語姓嚴人唐京兆尹龐嚴及第後從後從二字原倒置據許本改事壽春有江淮舉人姓嚴是登是登二字原空闕據因話録補科記誤本倒書龐嚴姓名遂賃舟丐食就謁時郡中止有止有二字原空闕據因話録補一判官亦更不問其氏便詣門投刺稱從姪龐之族人甚甚字原空闕據黃本補少覽刺極喜延納勤勤款曲同食語及族人都非龐氏之之字原空闕據黃本補事龐方訝之因問至竟郎君何姓曰某姓嚴龐撫掌大笑撫掌大笑四字原空闕據黃本補曰君誤矣嚴自名嚴預君何事揮之令去而猶自謂不誤自謂不誤四字原空闕據黃本補從容而退出因話録王初昆弟唐長慶太和中王初王哲俱中科名其父仲舒顯於時二子初宦不為祕書省官以家諱故也既而私相議曰曰原作而據許本改若遵典禮避私諱而吾昆弟不得為中書舍人中書侍郎列部尚書乃相與改諱只言仲字可矣又為宣武軍堂書記識者曰二子逆天忤神不永未幾相次殞謝出獨異志李據唐李據宰相絳之姪生綺紈間曾不知書門蔭調補澠池丞因歲節索魚不得怒追漁師云緣獺暴不敢打魚判云俯臨新歲猛獸驚人漁網至寬踈而不漏放又祗承人請假狀後判云白日黃昏須到夜即平明放歸祗承人竟不敢去又判決祗承人如此癡頑豈合喫杖決五下人有語曰豈合喫杖不合決他李曰公何會豈是助語共之乎者也何別出盧氏雜說教坊人唐有人衣緋於中書門候宰相求官人問前任答曰屬教坊作西方師子左腳來三十年出盧氏雜說南海祭文宣王自廣南祭海十數州多不立文宣王廟有刺史不知禮將將字原空闕據黃本補釋奠即署一胥吏為文宣王亞聖鞠躬候於門外或進止進止二字原空闕據黃本補不如儀即判云文宣亞聖決若干下出嶺南異物志太常寺唐有判太常寺行事禮官祭圓丘至時不到者判云太常大寺實自伽藍圓丘小僧不合無禮出傳載柳氏婢唐僕射柳仲郢鎮郪城有婢失意於成都鬻之刺史蓋巨源西川大校纍典支郡居苦竹溪女儈以婢導以巨源嘗其技巧他日巨源窗窺柳婢侍左通衢有鬻綾羅者召之就宅蓋於束縑內選擇邊幅舒卷掠之第其厚薄酬酢可否柳婢失聲而仆似中風命扶之而去都無言語但令還女儈家翌日而瘳詰其所苦青衣曰某雖賤人曾為僕射婢死則死矣安能事事原作自據許本改賣綾絹牙郎乎蜀都聞之皆嗟嘆世族之家率由禮則出北夢瑣言韓昶唐韓昶名父之子也雖教有義方而性頗暗劣常為集賢集賢二字原空闕據黃本補校理史傳中有說金根根原作銀據許本改車處皆臆斷之曰豈其豈其二字原空闕據黃本補誤歟必必字原空闕據黃本補金銀車悉改根字為銀字至除拾遺果為諫院不受不受二字原闕據黃本補王智興唐王智興為汴師有舉人投謁便詩卷智興智興二字原空闕據黃本補子謂鶴膝也遂善待之兼書舉子明年落第智興極怒應官土有得者以其例大故舉汴州一日致宴忽秀才飲冬必更奉薦明見諸判官曰智興咬韋氏子微姪流衣裳滿身徵召前劄而顯曰詩令狐綯宣宗以政事委令狐綯君臣道契人無間然舍人劉蛻者每訐訐原作計據許本改其短密奏之宣宗留中但以其事規於令狐綯而不言其失許本黃本失作人其間以丞相子不拔解就試疏略云號曰無解進士又以子弟納賄疏云白日之下見金而不見人令狐憾之乃俾一人為其書吏謹事之劉託以腹心都不疑慮因為經業舉人致名第受賄十萬為此吏所告由是貶焉君子曰彭城公將欲律人先須潔己安有自負贓污而發人之短乎宜其不躋大位也先是令狐自以單族每欲繁其宗與崔盧抗衡凡是當家率皆引進皇籍有不得官者欲進狀請改姓令狐時人以此少之出北夢瑣言鄭光唐鄭光除河中節度宣宗問曰卿在鳳翔判官是何人光曰馮三上不之會樞密使奏曰是馮兗臣曾充使至彼知之上曰便與馮三為副使及罷河中歸又詔對上曰卿在河中事大好光對曰臣須開始得又更對他事曰不得臣須裂始得上大笑後朝臣每遇延英入閣候對多以開始為號時裴思謙郎中為節判頃客於河中到使院裴曰某某原作其據許本改在身官爵為尚書削盡皆謂不以本官呼之光在河中時遇國忌行香便為判官及屈諸客就寺宴飲徵令時薛起居保遜為客在坐光把酒曰某改令身上取果子名云膍臍他人皆尋思不得至薛還令云腳杏滿座大笑出盧氏雜說鄭畋盧攜唐宰相鄭畋盧攜親表同在中書因公事不協更相詬詈詈字原空闕據黃本補乃至以硯相擲時人謂宰相鬥擊以此俱出官出北夢瑣言鄭綮唐宰相鄭綮雖有詩名本無廊廟之望時王綱已紊四方多故才既無取言必依違太原兵至渭北天子震恐渴求破賊術綮奏請於文宣王諡號中加一哲字率此類也同列以其忝竊每譏侮之出北夢瑣言鄭準唐滎陽鄭準以文筆依荊州成汭常欲自北陳阮集其所作為十卷號劉表軍書而書而二字原倒置據北夢瑣言七改辭體不雅至如祝朝貴書云中書舍人草麻通事舍人曰可又賀襄州趙洪嗣襲書云不沐浴佩玉為石祁兆不登山取符而無恤封是顯言其庶賤也應舉日詩卷題水牛曰護犢橫身立逢人揭尾跳朝士以為大笑出北夢瑣言張氏子唐張裼有五子文蔚彝憲濟美仁龜皆有名第至宰輔丞郎一子忘其名少年聞說壁魚入道經函中因蠹蝕神仙字身有五色人能取壁魚吞之以致神仙而上升張子感之乃書神仙字碎剪置於瓶中捉壁魚以投之冀其蠹蝕亦欲吞之遂成心疾每一發竟月不食言詞粗穢都無所避其家扃閉而守之候其愈既如常而倍食一月食料須品味而飫之歲久方卒是知心靈物也一傷神氣善猶不可況為惡乎即劉闢吞人張子吞神仙善惡不同其傷一也出北夢瑣言劉義方唐劉義方東府解試貂蟬冠賦韻腳以審之厚薄義方賦賦字原空闕據黃本補成云某於厚字韻有一聯破的乃吟曰懸之於壁有類乎兜鍪戴之於頭又同乎席帽莫后反無不以為歡笑鄭群玉唐東市鐵行有范生卜舉人連中成敗每卦一縑秀才秀才二字原空闕據黃本補鄭群玉短於呈試家寄海濱頗有生涯獻賦之來下視同輩同輩二字原空闕據黃本補意在必取僕馬鮮華遂齎緡三千並江南所出詣范生范喜於異禮卦成乃曰秀才萬全矣群玉之氣益高比入試又多齎珍品烹之坐享以至繼燭見諸會賦多多字原空闕據黃本補有寫淨者乃步於庭曰吾今下筆一字不得生鐵行范生須一打打字原空闕據黃本補二十突明竟製白而去出乾𦠆子梅權衡唐梅權衡吳人也入試不持書策人皆謂奇才及府題出青玉案賦以油然易直子諒之心為韻場中競講論如何押諒字權衡於庭樹下以短箠畫地起草日晡權衡詩賦成張季遐前趨請權衡所納賦押諒字以為師模權衡乃大言曰押字須商量爭應進士舉季遐且謙以薄劣乃率數十人請益權衡曰此韻難押諸公且廳上坐聽某押處解否遂朗吟曰恍兮惚兮其中有物惚兮恍兮其中有諒犬蹲其傍鴟拂其上權衡又講青玉案者是食案所以言犬蹲其傍鴟佛其上也衆大笑出乾𦠆子李雲翰周咸通中舉人李雲翰行口脂賦又羅虬詩云窗前遠岫懸生碧簾外殘霞卦熟紅又李罕披雲霧見青天詩顏回似青天皆遭主司庭責而遣舉子中有每年撰無名子前有舉人露布後皇甫松作齊夔凌纂要又李雲翰作吳王李謁天帝記無名子蕭相知舉年裴裕所製尤名近千餘首裕逐罷舉是年盧庸連旁文宣王廟前哭半日
