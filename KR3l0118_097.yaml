body:
  text: 秀禪師秀禪師洛都天宮寺有秀禪師者俗姓李汴州陳留人習禪精苦初至荊州後移此寺深為武太后所敬禮玄鑒默識中若符契長安中入京住資聖寺忽戒禪院弟子滅燈燭弟子留長明燈亦令滅之因說火災難測不可不備嘗有寺家不備火燭佛殿被災又有一寺鐘樓遭火一寺經藏焚爇殊可痛惜寺衆不知其意至夜失火果焚佛殿鐘樓及經藏三所唐玄宗在藩時常與諸王俱詣作禮留施一笛玄宗出後秀召弟子曰謹掌此後有要時當獻上也及玄宗登極達摩等方悟其言取笛以進秀師年百歲卒於此寺瘞於龍門山道俗奔赴數千人燕國公張說為其碑文出西京記義福唐開元中有僧義福者上黨人也梵行精修相好端潔縉紳士庶翕然歸依嘗從駕往東都所歷郡縣人皆傾向擅施巨萬皆委之而去忽一旦召其學徒告己將終兵部侍郎張均中書侍郎嚴挺之刑部侍郎房琯禮部侍郎韋陟常所禮謁是日亦同造焉義福乃升座為門徒演法乃曰吾沒於是日當以訣別耳久之張謂房曰某宿歲餌金丹爾來未嘗臨喪言訖張遂潛去義福忽謂房曰某與張公遊有數年矣張有非常之咎名節皆虧向來若終法會足以免難惜哉乃攜房之手曰必為中興名臣公其勉之言訖而終及祿山之亂張均陷賊庭授僞署房琯贊兩朝竟立大節出明皇雜録神鼎唐神鼎師不肯剃頭食醬一斗每巡門乞物得粗布破衣亦著得細錦羅綺亦著於利真師座前聽問真師曰萬物定否真曰定鼎曰闍梨言若定何因高岸為谷深谷為陵有死即生有生即死萬物相糾六道輪回何得為定耶真曰萬物不定鼎曰若不定何不喚天為地喚地為天喚月為星喚星為月何得為不定真無以應之時張文成見之謂曰觀法師即是菩薩行人也鼎曰菩薩得之不喜失之不悲打之不怒罵之不嗔此乃菩薩行也鼎今乞得即喜不得即悲打之即怒罵之即嗔以此論之去菩薩遠矣出朝野僉載廣陵大師唐貞元中有一僧客於廣陵亡其名自號大師廣陵人因以大師呼之大師質甚陋好以酒肉為食常以穗裘盛暑不脫由是蚤蟣聚其上僑居孝感寺獨止一室每夕闔扉而寢率為常矣性狂悖好屠犬彘日與廣陵少年鬭毆或醉臥道傍廣陵人俱俱原作懼據明鈔本陳校本改以此惡之有一少年以力聞常一日少年與人對博大師大怒以手擊其博局盡碎少年曰騃兒何敢逆壯士耶大師且罵而唾其面於是與少年鬭擊而觀者千數少年卒不勝竟遁去自是廣陵人謂大師有神力大師亦自負其力往往剽奪市中金錢衣物市人皆憚其勇莫敢拒後有老僧召大師至曰僧當死心奉戒奈何食酒食殺犬彘剽奪市人錢物又與少年同毆擊豈僧人之道耶一旦吏執以聞官汝不羞天耶大師怒罵曰蠅蚋徒嗜羶腥耳安能如龍鶴之心哉然則吾道亦非汝所知也且我清其中而混其外者豈若汝齪齪無大度乎老僧卒不能屈其詞後一日大師自外來歸既入室閉戶有於門隙視者大師坐於席有奇光自眉端發晃然照一室觀者奇之具告群僧群僧來見大師眉端之光相指語曰吾聞佛之眉有白毫相光今大師有之果佛矣遂相率而拜至明日清旦群僧俱集於庭候謁廣陵大師比及開戶而廣陵大師已亡去矣群僧益異其事因號大師為大師佛焉出宣室志和和唐代國公主適滎陽鄭萬鈞數年無子時有僧和和者如狂如愚衆號為聖言事多中住大安寺修營殿閣和和常至公主家萬鈞請曰吾無嗣願得一子惟師降恩可得乎師曰遺我三千匹絹主當誕兩男鈞如言施之和和取絹付寺云修功德乃謂鈞曰主有娠矣吾令二天人下為公主作兒又曰公主腹小能併娠二男乎吾當使同年而前後耳公主遂娠年初歲終各誕一子長曰潛耀少曰晦明皆美丈夫博通有識焉出紀聞録空如禪師空如禪師者不知何許人也少慕修道父母抑婚以刀割其勢乃止後成丁徵庸課遂以麻蠟裹臂以火爇之成廢疾入陸渾山坐蘭若虎不暴山中偶見野猪與虎鬭以藜杖揮之曰檀越不須相爭即分散人皆敬之無敢媟者出朝野僉載僧些唐貞元初荊州有狂僧些其名者善歌河滿子常遇伍伯乘醉於途中辱之令歌僧即發聲其詞皆陳伍伯從前隱慝也伍伯驚而自悔出酉陽雜俎阿足師阿足師者莫知其所來形質癡濁神情不慧時有所言靡不先覺居雖無定多寓閿鄉憧憧往來爭路禮謁山嶽檀施曾不顧瞻人或憂或疾獲其指南者其驗神速時陝州有富室張臻者財積巨萬止有一男年可十七生而愚騃既攣手足復懵語言惟嗜飲食口如溪壑父母鍾愛盡力事之迎醫求藥不遠千里十數年後家業殆盡或有謂曰阿足賢聖見世諸佛何不投告希其痊除臻與其妻來抵閿鄉叩頭抆淚求其拯濟阿足久之謂臻曰汝冤未散尚須十年愍汝勤虔為汝除去即令選日於河上致齊廣召衆多同觀度脫仍令齎致其男亦赴道場時衆謂神通而觀者如堵跂竦之際阿足則指壯力者三四人扶拽其人投之河流臻洎舉會之人莫測其為阿足顧謂臻曰為汝除災矣久之其子忽於下流十數步外立於水面戟手於其父母曰與汝冤仇宿世緣業賴逢聖者遽此解揮儻或不然未有畢日挺身高呼都不愚癡須臾沈水不知所適出集異記鑒師唐元和初有長樂馮生者家於吳以明經調選於天官氏是歲見黜於有司因僑居長安中有老僧鑒其名者一日來詣生謂生汝吾姓也因相與往來近歲餘及馮尉於東越既治裝鑒師負笈來告去馮問曰師去安所詣乎鑒師曰我廬於靈巖寺之西廡下且久其後遊長安中至今十年矣幸得與子相遇今將歸故居故來告別然吾子尉於東越道出靈巖寺下當宜一訪我也生諾曰謹受教後數月馮生自長安之任至靈巖寺門立馬望曰豈非鑒師所居寺乎即入而詣焉時有一僧在庭生問曰不知鑒師廬安在吾將詣之僧曰吾曹數輩獨無鑒其名者生始疑異默而計曰鑒師信士豈欺我耶於是獨遊寺庭行至西廡下忽見有群僧畫像其一人狀同鑒師生大驚曰鑒師果異人也且能神降於我因慨然泣下者久之視其題曰馮氏子吳郡人也年十歲學浮圖法以道行聞卒年七十八馮閲其題益異之出宣室志從諫東都敬愛寺北禪院大德從諫姓張氏南陽人徙居廣陵為土著姓身長八尺眉目魁奇越壯室之年忽頓悟真理遂捨妻子從披削焉於是研精禪觀心境明白不逾十載耆年宿德皆所推服及來洛遂止敬愛寺年德並成緇黃所宗每赴供皆與賓頭盧尊者對食其為人天欽奉若此唐武宗嗣曆改元會昌愛馭鳳驂鶴之儀薄點墨降龍之教乃下郡國毀塔廟令沙門復初諫公乃烏帽麻衣潛於皇甫枚之溫泉別業後岡上喬木駢鬱巨石砥平諫公夏日常於中入寂或補毳事忽一日穨雲駃雨霆擊石傍大檀雨至諸兄走往林中諫公恬然趺坐若無所聞者諸兄致問徐曰惡畜生而已至大中初宣宗復興內教諫公歸東都故居其子自廣陵來觀適與遇於院門威貌崇嚴不復可識乃拜而問從諫大德所居諫公指曰近東頭其子既去遂闔門不出其割裂愛網網原作剛據明鈔本改又如此咸通丙戌歲夏五月忽遍詣所信嚮家皆謂曰善建福業貧道秋初當遠行故相別耳至秋七月朔清旦盥手焚香念慈氏如來遂右𦵧而臥呼門人玄章等戒曰人生難得惡道易淪唯有歸命釋尊勵精梵行龍花會上當復相逢生也有涯與爾少別是日無疾奄化年有八十餘矣玄章等奉遺旨送尸於建春門外尸𧒰林中施諸鳥獸三日復視之肌貌如生無物敢近遂覆以餅餌經宿有狼狐跡唯啖餅餌而豐膚宛然乃依天竺法闍維訖收餘燼起白塔於道傍春秋奉香火之薦焉出三水小牘
