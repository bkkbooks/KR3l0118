body:
  text: 開業寺開業寺至德二年十月二十三日豐樂里開業寺有神人足跡甚長自寺外門至佛殿先是閽人宿門下夢一人長二丈餘被金甲執槊立於寺門外俄而以手曳其門扃鐍盡解神人即俯而入寺行至佛殿顧望久而沒閽人驚寤及曉視其門已開矣即具以夢白於寺僧寺僧共視見神人之跡遂告於京兆京兆以聞肅宗命中使驗之如其言女媧神肅宗將至靈武一驛黃昏有婦人長大攜雙鯉咤於營門曰皇帝何在衆以為狂上令潛視舉止婦止大樹下軍人有逼視見其臂上有鱗俄天黑失所在及上即位歸京闕虢州刺史王奇光奏女媧墳云天寶十三載大雨晦冥忽沈今月一日夜河上有人覺風雷聲曉見其墳湧出上生雙柳樹高丈餘下有巨石上初克復使祝史就其所祭之至是而見衆疑向婦人是其神也王籍王籍者太常璿之族子也乾元中客居會稽其奴病死數日復活云地下見吏吏曰汝誰家奴奴具言之吏云今見召汝郎做五道將軍因為著力得免回路中多見旌旗隊仗奴問為何所答曰迎王將軍爾既還數日籍遂死死之日人見車騎繽紛隊仗無數問其故皆是迎籍之人也暢璀暢璀自負才氣年六十餘始為河北相衛間一宰居常慷慨在縣唯尋術士日者問將來窮達而竟不遇或竊言於暢曰何必遠尋公部下伍伯判冥者也暢默喜其日入便具簪笏召伍伯升階答拜命坐設食伍伯恐聳不如所為良久謂之曰某自揣才業不後於人年已六十官為縣宰不辭碌碌守職但恐終不出下流要知此後如何苟能晚達即且守之若其終無即當解綬入山服餌尋道未能一決知公是幽冥主者為一言也伍伯避席色沮曰小人蒙公異禮如此是今日有隱於公即負深恩不隱即受禍然勢不得已而言也某非幽明主者所掌亦冥中伍伯耳但於杖數量人之死生凡人將有厄皆先受數杖二十已上皆死二十已下但重病耳以此斟酌往往誤言於里中未嘗差也暢即詰之曰當今主者為誰曰召慎不可泄露鄰縣令某是也聞即當來此公自求之必不可言得之於某旬日鄰宰果來與暢俱詣州季集暢凌晨遠迎館於縣宅燕勞加等既至乃一老翁七十餘矣當時天公承平河北簿尉皆豪貴子弟令長甚選名士老宰謝暢曰公名望高某寒賤以明法出身幸因鄰地豈敢當此優禮詞色感愧乃與之俱詣郡又與同歸館於縣宅益為歡洽明日將別其夜延於深室具簪笏再拜如問伍伯之詞而加懇切老宰厲聲曰是誰言耶詞色甚怒曰不白所言人終不為公言也如是久之暢不得已乃告伍伯之名既而俯首拗怒頃刻吏白曰伍伯于酒壚間暴卒暢聞益敬懼而乞曰轉懇乃徐謂暢曰愧君意深禮重固不可隱宜灑掃一院凡有孔隙悉塗塞之嚴戒家人切不得窺違者禍及其身堂上設一榻置案筆硯紙七八幅其夕宰入之令暢躬自扃鎖天明持籥相迓於此暢拂旦秉簡啓戶見之喜色被面而出遙賀暢曰官祿甚高不足憂也乃遺一書曰慎不可先覽但經一事初改一官即聞之後自此縣辟從事拜殿中侍御史入為省郎諫議大夫發其書則除授時日皆不差及貶辰州司馬取視之曰為某事貶也徵為左丞終工部尚書所記事無有異詞喬龜年喬龜年者善篆書養母甚孝大曆中每為人書大篆字得錢即供甘旨或見母稍失所必仰天號泣自恨貧乏夏月因自就井汲新水奉母忽有一青衣人自井躍出立於井旁謂龜年曰君之貧乏自前定也何每因母稍失所必號泣訴天也龜年疑是神靈遂拜而對曰余常恨自不能取富貴以豐侍養且母年老而旨甘每闕雖不憚勤苦於傭筆其如所得資助不足以濟是以不覺仰天號泣耳神人曰君之孝已極上天知之矣君當於此井中收取錢百萬天之賜也言訖而滅龜年乃取之得錢一百萬每建珍饌以奉母仍多不出遊貴達門後三年母亡龜年號慕幾滅性仍盡以餘錢厚葬其母復又貧乏纍年因閒步至先得錢之井悵然而言曰我往日貧天賜我錢今日貧天不賜之若天以我為孝子以賜我豈今日我非孝子耶俄爾神人復自井躍出謂龜年曰往日天知爾孝養老母故賜爾錢以為甘旨非濟爾貧乏今日無旨甘之用那得恨也若爾則昔日之意不為親乃為已也龜年驚愕慚懼復遂再拜神人又曰爾昔者之孝聞於上天今日之不孝亦聞上天也當自驅馳不然則凍餒而死今日一言罪已深矣不可追也言訖復滅龜年果貧困而卒張光晟賊臣張光晟其本甚微而有才用性落拓嗜酒壯年為潼關卒屢被主將鞭笞因奉役至華州盛暑驅馳心不平過嶽祠遂脫衣買酒致奠金天王朗言曰張光晟身負才器未遇知己富貴貧賤不能自料唯神聰鑒當賜誠告祀訖因極飲大醉晝寢于碑堂忽夢傳聲曰喚張光晟迫蹙甚急即入一府署嚴邃異常導者云張光晟到拜跪訖遙見當廳貴人有如王者謂之曰欲知官祿但光晟拜相則天下太平言訖驚寤洽汗獨怪之後頻立戰功積勞官至司農卿及建中德宗西狩光晟奔從已至開遠門忽謂同行朝官曰今日亂兵乃涇卒回戈耳無所統正應大掠而過如令有主禍未可知朱泚久在涇源素得人心今者在城儻收涇卒扶持則難制矣計其倉遑未暇此謀諸公能相逐徑往至泚宅召之俱西乎諸公持疑光晟即奔馬詣泚曰人主出京公為大臣豈是宴居之日泚曰願從公去命駕將行而涇卒已集其門矣光晟自將逃去因為泚所縻然而奉泚甚力每有戰常在其間及神𢉻之陳泚拜光晟僕射平章事統兵出戰大敗而還方寤神告為徵矣淮南軍卒陳少遊鎮淮南時嘗遣軍卒趙某使京師遺公卿書將行誡之曰吾有急事候汝還報以汝驍健故使西去不可少留計日不至當死趙日馳數百里不敢怠至華陰縣舍逆旅中寢未熟忽見一人緑衣謂趙曰我吏於金天王王命召君宜疾去趙不測即與使者偕行至嶽廟前使者入白趙某至既而呼趙趨拜階下其堂上列燭見一人據案而坐侍衛甚嚴徐謂趙曰吾有子壻在蜀數年欲馳使省視無可為使者聞汝善行日數百里將命汝使蜀可乎趙辭以相國命西使長安且有日期不然當死今為大王往蜀是棄相國命也實不敢還廣陵且某父母妻子俱在忍生不歸鄉里非敢以他辭不奉教唯大王察之王曰徑為我去當不至是自蜀還由長安未晚也即留趙宿廟後空舍中具食飲憂惑不敢寐遂往蜀且懼得罪固辭不往又慮禍及計未決俄而漸曉聞廟中喧闐有聲因出視見庭中虎豹麋鹿狐兔禽鳥近數萬又有奇狀鬼神千數羅列曲躬如朝謁禮頃有訴訟者數人偕入金天斷理甚明良久退去既而謂左右呼趙應聲而去王命上階於袖中出書一通付趙曰持此為我至蜀郡訪成都蕭敬之者與之吾此吏輩甚多但以事機密慮有所泄非生人傳之不可汝一二日當疾還無久留因以錢一萬遺之趙拜謝而行至門告吏曰王賜以萬錢我徒行者安所齎乎吏曰置懷中耳趙即以錢貯懷中輒無所礙亦不覺其重也行未數里探衣中皆紙錢耳即棄道傍俄有追者至以數千錢遺之曰向吾誤以陰道所用錢賜君固無所用今別賜此矣趙受之晝夜兼行踰旬至成都訪蕭敬之以書付之敬之啓視喜甚因命席謂趙曰我人也家汝鄭間昔歲赴調京師途至華陰遂為金天王所迫為親今我妻在與生人不殊向者力求一官今則遂矣故命君馳報即留趙一日贈縑數段以還書遣焉過長安遂達少遊書得還報日夜馳行至華陰金天見之大喜且慰勞非汝莫可使者今遣汝還設相國訊汝但言為我使遣汝為裨將無懼即以數十縑與之曰此人間縑帛可用之趙拜謝而徑歸淮南而少遊訊其稽留趙具以事對少遊怒不信繫獄中是夕少遊夢一人介金甲仗劍曰金天王告相國向者實遣趙某使蜀今聞得罪願釋之少遊悸寤奇歎之且久明日晨起話於賓僚即命釋趙署為裨將元和中猶在元載張謂元載布衣時常與故禮部侍郎張謂友善貧無僕馬弊衣徒行於陳蔡一日天暮忽大風雷原野曛黑二人相與詣道左神廟中以避焉時有盜數輩皆仗劍佩弧矢匿於廟宇下元張二人忽見之惶懼益甚且慮為其所害二人即負壁而立不敢動俄聞廟中有呼者曰元相國張侍郎且至群盜當疾去無有害於貴人群盜相目而驚遂馳去二人因偕賀吾向者以殍死為憂今日真神人之語也且喜且歎其後載果相代宗謂終禮部侍郎潁陽里正潁陽里正說某不得名曾乘醉還村至少婦祠醉因繫馬臥祠門下久之欲醒頭向轉未能起聞有人擊廟門其聲甚厲俄聞中問是何人答云所由令覓一人行雨廟中云舉家往嶽廟作客今更無人其人云只將門下臥者亦得廟中人云此過客那得使他苦爭不免遂呼某令起隨至一處濛濛悉是雲氣有物如駱駝某人抱某上駝背以一瓶授之誡云但正抱瓶無令傾側其物遂行瓶中水紛紛然作點而下時天久早下視見其居處恐雨不足因爾傾瓶行雨既畢所由放還至廟門見己尸在水中乃前入便活乘馬還家以傾瓶之故其宅為水所漂人家盡死某自此發狂數月亦卒
