body:
  text: 王苞王苞唐吳郡王苞者少事道士葉靜能中罷為太學生數歲在學有婦人寓宿苞與結歡情好甚篤靜能在京苞往省之靜能謂曰汝身何得有野狐氣固答云無能曰有也苞因言得婦始末能曰正是此老野狐臨別書一符與苞令含誡之曰至舍可吐其口當自來此為汝遣之無憂也苞還至舍如靜能言女人得符變為老狐銜符而走至靜能所拜謝靜能云放汝一生命不宜更至于王家自此遂絶唐參軍唐洛陽思恭里有唐參軍者立性修整簡于接對有趙門福及康三者投刺謁唐未出見之問其來意門福曰止求點心飯耳唐使門人辭云不在二人徑入至堂所門福曰唐都官何以云不在惜一餐耳唐辭以門者不報引出外廳令家人供食私誡奴令置劍盤中至則刺之奴至唐引劍刺門福不中次擊康三中之猶躍入庭前池中門福罵云彼我雖是狐我已千年千年之狐姓趙姓張五百年狐姓白姓康奈何無道殺我康三必當修報于汝終不令康氏子徒死也唐氏深謝之令召康三門福至池所呼康三輒應曰唯然求之不可得但余鼻存門福既去唐氏以桃湯沃灑門戶及懸符禁自爾不至謂其施行有驗久之園中櫻桃熟唐氏夫妻暇日檢行忽見門福在櫻桃樹上采櫻桃食之唐氏驚曰趙門福汝復敢來耶門福笑曰君以桃物見欺今聊復采食君亦食之否乃頻擲數四以授唐唐氏愈恐乃廣召僧結壇持咒門福遂逾日不至其僧持誦甚切冀其有效以為己功后一日晚霽之后僧坐楹前忽見五色云自西來徑至唐氏堂前中有一佛容色端嚴謂僧曰汝為唐氏卻野狐耶僧稽首唐氏長幼虔禮甚至喜見真佛拜諸降止久之方下坐其壇上奉事甚勤佛謂僧曰汝是修道請通達亦何須久蔬食而為法能食肉乎但問心能堅持否肉雖食之可復無纍乃令唐氏市肉佛自設食次以授僧及家人悉食食畢忽見壇上是趙門福舉家歎恨為其所誤門福笑曰無勞厭我我不來矣自爾不至也田氏子唐牛肅有從舅常過澠池因至西北三十里謁田氏子去田氏莊十余里經岌險多櫟林傳云中有魅狐往來經之者皆結侶乃敢過舅既至田氏子命老豎往澠池市酒饌天未明豎行日暮不至田氏子怪之及至豎一足又跛問何故豎曰適至櫟林為一魅狐所絆因蹶而仆故傷焉問何以見魅豎曰適下坡時狐變為婦人遽來追我我驚且走狐又疾行遂為所及因倒且損吾恐魅之為怪強起擊之婦人口但哀祈反謂我為狐屢云叩頭野狐叩頭野狐吾以其不自知因與痛手故免其禍田氏子曰汝無擊人妄謂狐耶豎曰吾雖苦擊之終不改婦人狀耳田氏子曰汝必誤損他人且入戶日入見婦人體傷蓬首過門而求飲謂田氏子曰吾適櫟林逢一老狐變為人吾不知是狐前趨為伴同過櫟林不知老狐卻傷我如此賴老狐去余命得全妾北村人也渴故求飲田氏子恐其見蒼頭也與之飲而遣之徐安徐安者下邳人也好以漁獵為事安妻王氏貌甚美人頗知之開元五年秋安游海州王氏獨居下邳忽一日有一少年狀甚偉顧王氏曰可惜芳艷虛過一生王氏聞而悅之遂與之結好而來去無憚安既還妻見之恩義殊隔安頗訝之其妻至日將夕即飾妝靜處至二更乃失所在逮曉方回亦不見其出入之處他日安潛伺之其妻乃騎故籠從窗而出至曉復返安是夕閉婦于他室乃詐為女子妝飾袖短劍騎故籠以待之至二更忽從窗而出徑入一山嶺乃至會所帷幄華煥酒饌羅列座有三少年安未及下三少年曰王氏來何早乎安乃奮劍擊之三少年死于座安復騎籠即不復飛矣俟曉而返視夜來所殺少年皆老狐也安到舍其妻是夕不復妝飾矣靳守貞霍邑古呂州也城池甚固縣令宅東北有城面各百步其高三丈厚七八尺名曰囚周厲王城則左傳所稱萬人不忍流王于彘城即霍邑也王崩因葬城之北城既久遠則魅狐居之或官吏家或百姓子女姿色者夜中狐斷其發有如刀截所遇無知往往而有唐時邑人靳守貞者素善符咒為縣送徒至趙城還歸至金狗鼻見汾河西岸水濱有女紅棠浣衣水次守貞目之女子忽爾乘空過河遂緣嶺躡虛至守貞所手攀其笠足踏其帶將取其發焉守貞送徒手猶持斧因擊女子墜從而斫之女子死則為雌狐守貞以狐至縣具列其由縣令不之信守貞歸遂每夜有老父及媼繞其居哭從索其女守貞不懼月會老父及媼罵而去曰無狀殺我女吾猶有三女終當困汝于是遂絶而截發亦亡嚴諫唐洛陽尉嚴諫從叔亡諫往吊之后十余日叔家悉皆去服諫召家人問答云亡者不許因述其言語處置狀有如平生諫疑是野狐恆欲料理后至叔舍靈便逆怒約束子弟勿更令少府侄來無益人家事只解相疑耳亦謂諫曰五郎公事似忙不宜數來也諫后忽將蒼鷹雙鶻皂雕獵犬等數十事與他手力百餘人悉持器械圍繞其宅數重遂入靈堂忽見一赤肉野狐仰行屋上射擊不能中尋而開門躍出不復見因而怪絶韋參軍唐潤州參軍幼有隱德雖兄弟不能知也韋常謂其不慧輕之后忽謂諸兄曰財帛當以道不可力求諸兄甚奇其言問汝何長進如此對曰今昆明池中大有珍寶可共取之諸兄乃與皆行至池所以手酌水水悉枯涸見金寶甚多謂兄曰可取之兄等愈入愈深竟不能得乃云此可見而不可得致者有定分也諸兄歎美之問曰素不出何以得妙法笑而不言久之曰明年當得一官無慮貧乏乃選拜潤州書佐遂東之任途經開封縣開封縣令者其母患狐媚前后術士不能療有道士者善見鬼謂令曰今比見諸隊仗有異人入境若得此人太夫人疾苦必愈令遣候之后數日白云至此縣逆旅宜自謁見令往見韋具申禮請笑曰此道士為君言耶然以太夫人故屈身于人亦可憫矣幸與君遇其疾必愈明日自縣橋至宅可少止人令百姓見之我當至彼為發遣且宜還家灑掃焚香相待令皆如言明日至舍見太夫人問以疾苦以柳枝灑水于身上須臾有老白野狐自床而下徐行至縣橋然后不見令有贈遺韋皆不受至官一年謂其妻曰后月我當死死后君嫁此州判司當生三子皆如其言楊氏女唐有楊氏者二女并嫁胡家小胡郎為主母所惜大胡郎謂其婢曰小胡郎乃野狐爾丈母乃不惜我反惜野狐婢還白母問何以知之答云宜取鵲頭懸戶上小胡郎若來令妻呼伊祈熟肉再三言之必當走也楊氏如言小胡郎果走故今人相傳云伊祈熟肉辟狐魅甚有驗也薛迥唐河東薛迥與其徒十人于東都狎娼婦留連數夕各賞錢十千后一夕午夜娼偶求去迥留待曙婦人躁擾求去數四抱錢出門迥敕門者無出客門者不為啓鎖婦人持錢尋審至水竇變成野狐從竇中出去其錢亦留辛替否唐辛替否母死之后其靈座中恆有靈語不異乎素家人敬事如生替否表弟是術士在京聞其事因而來觀潛于替否宅后作法入門見一無毛牝野狐殺之遂絶代州民唐代州民有一女其兄遠戍不在母與女獨居忽見菩薩乘云而至謂母曰汝家甚善吾欲居之可速修理尋當來也村人競往處置適畢菩薩馭五色云來下其宜村人供養甚衆仍敕衆等不令有言恐四方信心往來不止村人以是相戒不說其事菩薩與女私通有娠經年其兄還菩薩云不欲見男子令母逐之兒不得至因傾財求道士久之有道士為作法竊視菩薩是一老狐乃持刀入砍殺之祁縣民唐祁縣有村民因輦地征篘粟至太原府及歸途中日暮有一白衣婦人立路旁謂村民曰妾今日都城而來困且甚願寄載車中可乎村民許之乃升車行未三四里因脂轄忽見一狐尾在車之隙中垂于車轅下村民即以鐮斷之其婦人化為無尾白狐鳴嗥而去張例唐始丰令張例疾患魅時有發動家人不能制也恆舒右臂上作咒云狐娘健子其子密持鐵杵候例疾發即自后撞之墜一老牝狐焚于四通之衢自爾便愈也
