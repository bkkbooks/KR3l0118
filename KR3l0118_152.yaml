body:
  text: 鄭德璘鄭德璘貞元中湘潭尉鄭德璘家居長沙有親表居江夏每歲一往省焉中間涉洞庭歷湘潭多遇老叟棹舟而鬻菱芡雖白髮而有少容德璘與語多及玄解詰曰舟無糗糧何以為食叟曰菱芡耳德璘好酒長挈松醪春過江夏遇叟無不飲之叟飲亦不甚愧荷德璘抵江夏將返長沙駐舟於黃鶴樓下傍有鹺賈韋生者乘巨舟亦抵於湘潭其夜與鄰舟告別飲酒韋生有女居於舟之柁櫓鄰女亦來訪別二女同處笑語夜將半聞江中有秀才吟詩曰物觸輕舟心自知風恬浪靜月光微夜深江上解愁思拾得紅蕖香惹衣鄰舟女善筆札因覩韋氏粧奩中有紅箋一幅取而題所聞之句亦吟哦良久然莫曉誰人所製也及旦東西而去德璘舟與韋氏舟同離鄂渚信宿及暮又同宿至洞庭之畔與韋生舟楫頗以相近韋氏美而艷瓊英膩雲蓮蕊瑩波露濯蕣姿月鮮珠彩於水窗中垂鉤德璘因窺見之甚悅遂以紅綃一尺上題詩曰纖手垂鉤對水窗紅蕖秋色艷長江既能解珮投交甫更有明珠乞一雙強以紅綃惹其鉤女因收得吟玩久之然雖諷讀即不能曉其義女不工刀札又恥無所報遂以鉤絲而投夜來鄰舟女所題紅箋者德璘謂女所製凝凝原作疑據明鈔本改思頗悅喜暢可知然莫曉詩之意義亦無計遂其款曲由是女以所得紅綃繫臂自愛惜之明月清風韋舟遽張帆而去風勢將緊波濤恐人德璘小舟不敢同越然意殊恨恨將暮有漁人語德璘曰向者賈客巨舟已全家歿於洞庭耳德璘大駭神思恍惚悲婉久之不能排抑將夜為弔江姝詩二首曰湖面狂風且莫吹浪花初綻月光微沉潛暗想橫波淚得共鮫人相對垂又曰洞庭風軟荻花秋新沒青蛾細浪愁淚滴白蘋君不見月明江上有輕鷗詩成酹而投之精貫神祗至誠感應遂感水神持詣水府府君覽之召溺者數輩曰誰是鄭生所愛而韋氏亦不能曉其來由有主者搜臂見紅綃而語府君曰德璘異日是吾邑之明宰況曩有義相及不可不曲活爾命因召主者攜韋氏送鄭生韋氏視府君乃一老叟也逐主者疾趨而無所礙道將盡覩一大池碧水汪然遂為主者推墮其中或沉或浮亦甚困苦時已三更德璘未寢但吟紅箋之詩悲而益苦忽覺有物觸舟然舟人已寢德璘遂秉炬照之見衣服綵繡似是人物驚而拯之乃韋氏也繫臂紅綃尚在德璘喜驟良久女蘇息及曉方能言乃説府君感君而活我命德璘曰府君何人也終不省悟遂納為室感其異也將歸長沙後三年德璘常調選欲謀醴陵令韋氏曰不過作巴陵耳德璘曰子何以知韋氏曰向者水府君言是吾邑之明宰洞庭乃屬巴陵此可驗矣德璘志之選果得巴陵令及至巴陵縣使人迎韋氏舟楫至洞庭側值逆風不進德璘使傭篙工者五人而迎之內一老叟挽舟若不為意韋氏怒而唾之叟回顧曰我昔水府活汝性命不以為德今反生怒韋氏乃悟恐悸召叟登舟拜而進酒果叩頭曰吾之父母當在水府可省覲否曰可須臾舟楫似沒於波然無所若俄到往時之水府大小倚舟號慟訪其父母父母居止儼然第舍與人世無異韋氏詢其所須父母曰所溺之物皆能至此但無火化所食唯菱芡耳持白金器數事而遺女曰吾此無用處可以贈爾不得久停促其相別韋氏遂哀慟別其父母叟以筆大書韋氏巾曰昔日江頭菱芡人蒙君數飲松醪春活君家室以為報珍重長沙鄭德璘書訖叟遂為僕侍數百輩自舟迎歸府舍俄頃舟却出於湖畔一舟之人咸有所覩德璘詳詩意方悟水府老叟乃昔日鬻菱芡者歲餘有秀才崔希周投詩卷於德璘內有江上夜拾得芙蓉詩即韋氏所投德璘紅箋詩也德璘疑詩乃詰希周對曰數年前泊輕舟於鄂渚江上月明時當未寢有微物觸舟芳馨襲鼻取而視之乃一束芙蓉也因而製詩既成諷詠良久敢以實對德璘歎曰命也然後不敢越洞庭德璘官至刺史出德璘傳類説三二引作傳奇趙璟盧邁趙璟盧邁二相國皆吉州人旅衆呼為趙七盧三趙相自微而著蓋為是姚曠女壻姚與獨孤問俗善因託之得湖南判官纍奏官至監察蕭相復代問俗為潭州有人又薦於蕭蕭留為判官至侍御史蕭入主留務有美聲聞於德宗遂兼中丞為湖南廉使使原作史據許本改及李泌入相不知之俄而以李元素知璟湖南留務事而詔璟歸闕璟居京慕靜深巷杜門不出元素訪之甚頻元素乃泌相之從弟璟因訪別元素於青龍寺謂之曰趙璟亦自合有官職誓不敢怨人誠非偶然耳蓋得於日者仍密問元素年命曰據此年命亦合富貴人也元素因自負亦不言泌相兄也頃之德宗忽記得璟賜對拜給事中泌相不測其由會有和戎使事出新相關播為大使張薦張或為判官泌因判奏璟為副使未至蕃右丞有缺宰相上名德宗曰趙璟堪為此官追赴拜右丞不數月遷尚書左丞平章事作相五年薨於位出嘉話録趙璟趙相璟為入蕃副使謂二張判官曰前幾里合有河河之邊有柳樹樹下合有一官人著慘服立既而悉然官人置頓官也二張問之趙曰某年三十前已夢此行所以不怨他時相趙相將薨之時長安諸城門金吾家見一小兒豹犢鼻攜五色繩子覔趙相其人見者知異不經數日趙薨出嘉話録包誼唐包誼者江東人也有文詞初與計偕至京師赴試期不及宗人祭酒佶憐之館於私第誼多遊佛寺無何搪突中書舍人劉太真太真覩其色目即舉人也命一價詢之誼勃然曰進士包誼素不相識何勞致問太真甚銜之以至專訪其人於佶佶聞誼所為大怒因詰責遣徙他舍誼亦無怍色明年太真主文志在致其永棄故過雜文俟終場明遣之既而自悔曰此子既忤我從而報之是我為淺丈夫也但能永廢其人何必在此於是放入策太真將放榜先呈宰相榜中有姓朱人及第時宰以泚近為大逆未欲以此此字原本無據托言補姓及第亟遣易之太真錯諤趨出不記他人唯記誼及誼及誼二字原本無據托言補謝恩方悟己所惡也因明言及知得喪非人力也蓋假手而已出托言薛少殷河東薛少殷舉進士忽一日暴卒於長安崇義里有一使持牒云大使追引入府門既入見官府即鮮于叔明也少殷欲有所訴叔明曰寒食將至何為鏤雞子食也東面有一僧手持寶塔扇雙開少殷已在其中叔明曰日某方欲上事和尚何為救此人乃迫而出令引少殷見判官及出門之西院閽者入白逡巡聞命素服乃入所見乃亡兄也敘泣良久曰吾以汝未成名欲薦汝於此分主公事故假追來非他也少殷時新婚懇不願住兄曰吾同院有王判官職居西曹汝既來此可以一謁而去乃命少殷於西院見之接待甚厚俄聞備饌海陸畢備未食王判官忽起顧見向者持塔僧僧曰不可食食之則無由歸矣少殷曰飢甚奈何僧曰唯蜜煎薑可食乃取食之而王判官竟不至僧曰可去矣少殷復出詣兄泣且請去兄知不可留乃入白官府許之少殷曰既得歸人間願知當為何官兄曰此甚難言亦何用知之懇請乃召一吏取籍尋閲不令見之曰汝後年方成名初任當極西得之次歷畿赤簿尉又一官極南此外吾不得知臨別兄曰吾舊使祗承人李俊令隨汝去有危急即可念之既去每遇危際皆見其僧前引少殷曰弟子素不相識和尚何乃見護如此僧曰吾為汝持金剛經故相護爾既醒具述其事後年春果及第未幾授祕書省正字充和蕃判官及回改同官主簿秩滿遇趙昌為安南節度少殷與之有舊求為從事欲厭極南之官昌許之曰乘遞之鎮未暇有表至江陵當以表請及表至少殷尋以丁母憂服除選授萬年縣尉時青淄卒吏與駙馬家僮鬥死京兆府不時奏德宗赫怒時少殷主賊曹賊曹原作戒唐據明鈔本改一日乃貶高州雷澤縣尉十餘年備歷艱苦而李俊常有所護及順宗嗣位有詔收録貶官少殷移至桂桂原作圭據明鈔本陳校改陽與貶官李定同行過水勒馬與一從人言即李俊也云某月日已足拜別而去少殷曰吾兄言官止於此李俊復去將不久矣李定驚慘其事因問具以告之數日而卒出前定録袁孝叔袁孝叔者陳郡人也少孤事母以孝聞母嘗得疾恍惚逾日不痊孝叔忽夢一老父謂曰子母疾可治孝叔問其名居不告曰明旦迎吾於石壇之上當有藥授子及覺乃周覽四境所居之十里有廢觀古石壇而見老父在焉孝叔喜拜迎至於家即於囊中取九靈丹一丸以新汲水服之即日而瘳孝叔德之欲有所答皆不受或纍月一來然不詳其所止孝叔意其能曆算爵祿常欲發問而未敢言後一旦來而謂孝叔曰吾將有他適當與子別於懷中出一編書以遺之曰君之壽與位盡具於此事以前定非智力所及也今之躁求者適足徒勞耳君藏吾此書慎勿預視但受一命即開一幅不爾當有所損孝叔跪受而別後孝叔寢疾殆將不救其家或問後事孝叔曰吾為神人授書一編未曾開卷何遽以後事問乎旬餘其疾果愈後孝叔以門蔭調授密州諸城縣尉五轉蒲州臨晉縣令每之任輒視神人之書時日無差謬後秩滿歸閿鄉別墅因晨起欲就中櫛忽有物墜於鏡中類蛇而有四足孝叔驚仆於地因不語數日而卒後逾月其妻因閲其笥得老父所留之書猶餘半軸因嘆曰神人之言亦有誣矣書尚未盡而人已亡乃開視之其後唯有空紙數幅畫一蛇盤鏡中出前定録
