body:
  text: 盧君暢盧君暢故東都留守判官祠部郎中范陽盧君暢為白衣時僑居漢上嘗一日獨驅郊野見二白犬腰甚長而其臆丰飄然若墜俱馳走田間戶訝其異于常犬因立馬以望俄而其犬俱跳入于一湫中已而湫浪泛騰旋有二白龍自湫中起云氣噎空風雷大震盧懼甚鞭馬而歸未及行數里衣盡沾濕方悟二犬乃龍也元義方元義方使新羅發雞林州遇海島中有泉舟人皆汲水飲之忽有小蛇自泉中出海師遽曰龍怒遂發未數里風云雷電皆至三日三夜不絕及雨霽見遠岸城邑乃萊州平昌井平昌城舊與荊水通有神龍出入焉故名龍城外國有寺曰咀呵羅寺有神龍住米倉中奴取米龍輒卻奴若常取米龍即不與倉中米若盡奴向龍拜倉即盈溢虎頭骨南中旱即以長繩系虎頭骨投有龍處入水即數人牽制不定俄頃云起潭中雨亦隨降法喜寺政陽郡東南有法喜寺去郡遠百里而正居渭水西唐元和末寺僧有頻夢一白龍者自渭水來止于佛殿西楹蟠繞且久乃直東而去明日則雨如是者數矣其僧異之因語與人人曰福地蓋神祗所居固龍之宅也而佛寺亦為龍所依焉故釋氏有天龍八部其義在矣況郊野外寺殿宇清敞為龍之止不亦宜乎愿以土龍置于寺楹間且用識其夢也僧召工合土為偶龍具告其狀而于殿西楹置焉功畢甚得云間勢蜿蜒鱗鬣曲盡其妙雖丹青之巧不能加也至長慶初其寺居人有偃于外門者見一物從西軒直出飄飄然若升云狀飛馳出寺望謂水而去夜將分始歸西軒下細而觀之果白龍也明日因告寺僧僧奇之又數日寺僧盡赴村民會齋去至午方歸因入殿視像龍已失矣寺僧且歎且異相顧語曰是龍也雖假以土尚能變化無方去莫如其適來莫窮其自果靈物乎及晚有陰云起于渭水俄而將逼殿宇忽有一物自云中躍而出指西軒以入寺僧懼惊且視之乃見像龍已在西楹上迫而觀之其龍鬐鬣鱗角若盡沾濕自是因以鐵鎖系之其后里中有旱澇祈禱之應若影響龍廟汾水貫太原而南注水有二橋其南橋下嘗有龍見由是架龍廟于橋下故相國令狐楚居守北都時有一龍自廟中出傾都士女皆縱觀近食頃方拿奮而去旋有震雷暴雨焉又明年秋汾水延溢有一白蛇自廟中出既出而廟屋摧圮其橋亦坏時唐太和初也豢龍者牛僧孺鎮襄州日以久旱祈禱無應有處士自云豢龍者公請致雨處士曰江漢間無龍獨一湫泊中有之黑龍也強驅逐之慮為災難制公固命之果有大雨漢水漫漲漂溺萬戶處士懼罪亦亡去孔威唐咸通末舒州刺史孔威進龍骨一具因有表錄其事狀云州之桐城具善政鄉百姓胡舉有青龍斗死于庭中時四月尚有茧箔在庭忽云雷暴起聞云中擊触聲血如釃雨洒茧箔上血不水于箔漸旋結聚可拾置掌上須臾令人冷痛入骨初龍拖尾及地繞一泔桶即騰身入云及雨悉是泔也龍既死剖之喉中有大瘡凡長十余尺身尾相半尾本褊薄鱗鬣皆魚唯有須長二丈其足有赤膜翳之雙角各長二丈其腹相自齟齬時遣大云倉使督而送州以肉重不能全舉乃剸之為數十段載之赴官華陰湫唐咸通九年春華陰縣南十里余一夕風雷暴作有龍移湫自遠而至先其崖岸高無貯水之處此夕徙開數十丈小山東西直南北峰巒草樹一無所傷碧波回塘湛若疏鑿京洛行旅無不枉道就觀有好事者自輦轂蒲津相率而至車馬不絕音逮于累日京城南靈應台有三娘湫與炭谷相近水波澄明莫測深淺每秋風搖落常有草木之葉飄于其上雖片葉纖芥必而禽銜而去禱祈者多致花鈿錦綺之類啟視投之欻然而沒乾符初有朝士數人同游于終南山遂及湫所因話靈應之事其間不信者試以木石投之尋有巨魚躍出波心鱗甲如雪俄而風雨晦暝車馬幾為暴水所漂爾后人愈敬伏莫有犯者崔道樞唐中書舍人書顏子婿崔道樞舉進士者屢屢一年春下第歸寧漢上所居因井渫得鯉魚一頭長五尺鱗鬣金色其目光射人眾視異于常魚令仆者投于江中道樞與表兄韋氏密備鼎俎烹而食之經信宿韋得疾暴卒有碧衣使人引至府舍廨宇頗甚嚴肅既入門見廳事有女子戴金翠冠著紫繡衣据案而坐左右侍者皆黃衫巾櫛如宮內之飾有一吏人從后執簿領出及軒陛間付雙環青衣置于繡衣案上吏引韋生東廡曹署理殺魚之狀韋引過道樞云非某之罪吏曰此雨龍也若潛伏于江海湫湄雖為人所食即從而可辨矣但昨者得之于井中崔氏與君又非愚昧殺而食之但難獲免然君且還試與崔君廣為佛道功德庶幾稍減其過自茲浹旬當复相召韋忽然而寤且以所說話于親屬命道樞具述其事道樞雖懷憂迫亦未深信才及旬余韋生果歿韋乃道樞之姑子也數日后寄魂于母云已因殺魚獲罪所至之地即水府非久當受重譴可急修黃菉道齋尚冀得寬刑辭表弟之過亦成矣今夕當自知其事韋母泣告道樞及暝昏然而寢复見碧衣人引至公署俱是韋氏之所述俄有吏執黑紙丹文書字立道樞于屏側疾趨而入俄見繡衣舉筆而書訖吏接之而出令道樞覽之其初云崔道樞官至三品壽至八十后有判云所害雨龍事關天府原之不可案罪急追所有官爵并皆削除年亦減一半時道樞冬季其母方修崇福力才及春首抱疾數日而終時崔妻拿咸在京師韋顏備述其事舊傳夔及牛渚磯是水府未詳道樞所至何許金龍子唐昭宗文德二年正朔御武德殿有紫氣出于昭德殿東隅郁郁如煙令大內留后司尋其所出得金龍子一枚長五寸許群臣稱賀帝曰朕不以金龍為祥瑞以偃息干戈為祥瑞卿等各宜盡忠以體朕懷門下奏請改文德二年為龍紀元年黃馴荊州當陽縣倚山為廨宇內有井极深井中有龍窠旁入不知幾許欲晴霽及將雨往往有云氣自井而出唐光化中有道士稱自商山來入井中取龍窠及草藥而去其后有令黃馴者到任之后常系馬于井旁滓穢流漬盡入于井中或有譏之者飾詞以對歲余馴及馬皆瞽臨漢豕邛州臨漢縣內有湫往往人見牝豕出入號曰母豬龍湫唐天复四年蜀城大旱使俾守宰躬往靈跡求雨于時邑長具牢醴命邑寮偕往祭之三奠迨終乃張筵于湫上以神胙客坐于烈日舖席以湫為上每酒巡至湫則捧觴以獻俟雨沾足方撤此筵歌吹方酣忽見湫上黑氣如云氛氳直上狂電燁然玄云陡暗雨雹立至令長與寮吏鼓舞去蓋蒙濕而歸翌日此一境雨足他邑依然赤地焉夫人之至誠則龍畜亦能感動享德濟旱勿謂不智燒龍太江之南蘆荻之間往往燒起龍唐天复中澧州葉源村民鄧氏子燒畬柴草積于天井火勢既盛龍突出騰在半空縈帶為火所燎風力益壯狂焰彌熾擺之不落竟以仆地而斃長亙數百步村民徙居而避之朱梁末辰州民向氏因燒起一龍四面風雷急雨不能扑滅尋為煨燼而角不化瑩白如玉向氏寶而藏之湖南行軍高郁酬其价而強取于時術士曰高司馬其禍乎安用不祥之物以速之俄而被誅柳翁天祐中饒州有柳翁常乘小舟釣鄱陽江中不知其居處妻子亦不見其飲食凡水族之類與山川之深遠者無不周知之鄱陽人漁釣者咸諮訪而后行呂師造為刺史修城掘濠至城北則雨止后則晴或問柳翁翁曰此下龍穴也震動其上則龍不安而出穴龍出則雨矣掘之不已必得其穴則霖雨方將為患矣既深數丈果得方木長數十尺交构疊之累積數十重其下霧氣沖人不可入而止其木皆腥涎縈之刻削平正非人力所及自是果霖雨為患呂氏諸子將网魚于鄱陽江召問柳翁翁指南岸一處今日唯此處有魚然有一小龍在焉諸子不信网之果大獲舟中以巨盆貯之中有一鱔魚長一二尺雙目精明有二長須繞盆而行群魚皆翼從之將至北岸遂失所在柳翁竟不知所終
