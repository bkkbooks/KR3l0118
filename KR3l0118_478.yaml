body:
  text: 飯化飯化道士許象之言以盆覆寒食飯于暗室地入夏悉化為赤蜘蛛蜈蚣氣綏縣多蜈蚣氣大者能以氣吸兔小者吸蜥蜴相去三四尺骨肉自消蠮螉段成式書齋多此蟲蓋好窠于書卷也或在筆管中祝聲可聽有時開卷視之悉是小蜘蛛大如蠅虎旋以泥隔之方知不獨負桑蟲也顛當段成式書齋前每雨后多顛當窠深如蚓穴网絲其中吐蓋與地平大如榆莢常仰捭其蓋伺蠅蠖過輒翻蓋捕之才入復閉與地一色并無絲隙可尋也其形似蜘蛛爾雅謂之王蛛蜴鬼谷子謂之跌母秦中兒童戲曰顛當牢守門蠮螉寇汝無處奔蜾螺蜾嬴今謂之蠮螉也其為物純雄無雌不交不産取桑蟲之子祝之則皆化為己子蜂亦如此耳沙虱潭袁處吉等州有沙虱即毒蛇鱗中虱也細不可見夏月蛇為虱所苦倒挂身于江灘急流處水刷其虱或臥沙中碾虱入沙行人中之所咬處如針孔粟粒四面有五色文即其毒也得術士禁之乃剜其少許因以生肌膏救治之即愈不爾三兩日內死矣水弩水弩之蟲狀如蜣蜋黑色八足鉗曳其尾長三四寸尾即弩也常自四月一日上弩至八月卸之時彎其尾自背而上于頭前以鉗執之見人影則射中影之處人身隨有遼腫大小與沙虱之毒同矣速須禁氣制之剜去毒肉固保其命不爾一兩日死矣復多盅毒行者尤宜慎之凡入盅家慎告主人曰汝家有盅毒不得容易害我如此則毒不行矣徐玄之有徐玄之者自浙東遷于吳于立義里居其宅素有凶藉玄之利以花木珍異乃營之月余夜讀書見武士數百騎升自床之西南隅于花氈上置繒繳縱兵大獵飛禽走獸不可勝計獵訖有旌旗豹纛并導騎數百又自外入至西北隅有戴劍操斧手執弓槌凡數百挈幄幕簾榻盤碟鼎鑊者又數百負器盛陸海之珍味者又數百道路往返奔走探值者又數百玄之熟視轉分明至中軍有錯彩信旗擁赤幘紫衣者侍從數千至案之右有大鐵冠執鐵簡宣言曰殿下將欲觀漁于紫石潭其先鋒后軍并甲士執戈戟者勿從于是赤幘者下馬與左右數百升玄之石硯之上北設紅拂盧帳俄爾盤榻幄幕歌筵舞席畢備賓旅數十緋紫紅緑執笙竽簫管者又數十輩更歌迭舞俳優之類不可盡記酒數巡上客有酒容者赤幘顧左右曰索漁具復有舊网籠罩之類凡數百齊入硯中未頃獲小魚數百千頭赤幘謂上客曰豫深得任公之術請以樂賓乃持釣于硯中之南灘樂徒奏春波引曲未終獲魴鯉鱸鱖百餘遽命操膾促膳凡數十味皆馨香不可言金石絲竹鏗鞫齊奏酒至赤幘者持杯顧玄之而謂衆賓曰吾不習周公禮不習孔氏書而貴居王位今此儒發鬢焦禿肌色可掬雖孜孜矻矻而又奚為肯折節為吾下卿亦得陪今日之宴玄之乃以書卷蒙之執燭以觀一無所見玄之舍卷而寢方寐間見被堅執鋭者數千騎自西牖下分行布伍號令而至玄之驚呼仆夫數騎已至床前乃宣言曰蚍蜉王子獵于羊林之茸釣于紫石之潭玄之牖奴遽有迫脅士卒潰亂宮車振驚既無高共臨危之心須有晉文還國之伐付大將軍蛖虰追過宣訖以白練系玄之頸甲士數十羅曳而去其行迅疾倏忽如入一城門觀者架肩疊足逗五六里又行數里見子城有赤衣冠者唱言蚍蜉王大怒曰披儒服讀儒書不修前言往行而肆勇敢凌上付三事已下議乃釋縛引入議堂見紫衣冠者十人玄之遍拜皆瞋目踞受聽陳劾之詞尤炳煥于人間是時王子以驚恐入心厥疾彌甚三事已下議請置肉刑議狀未下太史令馬知玄進狀論曰伏以王子曰不遵典法遊觀失度視險如砥自貽震驚徐玄之性氣不回博識非淺況修天爵難以妖誣今大王不能度己返恣胸臆信彼多士欲害哲人竊見云物頻興沴怪屢作市言訛讖衆情驚疑昔者秦射巨魚而衰殷格猛獸而滅今大王欲害非類是躡殷秦但恐季世之端自此而起王覽疏大怒斬太史馬知玄于國門以令妖言者是時大雨暴至草澤臣飛上疏曰臣聞縱盤遊恣漁獵者位必亡罪賢臣戮忠讜者國必喪伏以王子獵患于絶境釣禍于幽泉信任幻徒熒惑儒士喪履之戚所謂自貽今大王不究遊務之非返聽詭隨之議況知玄是一國之元老實大朝之世臣是宜采其謀猷匡此顛仆全身或止于三諫犯上未傷于一言肝膽方期于畢呈身首俄驚于異處臣竊見兵書云無云而雨者天泣今直臣就戮而天為泣焉伏恐比干不恨死于當時知玄恨死于今日大王又不貸玄之峻法欲正名于肉刑是抉吾眼而觀越兵又在今日昔者虞以宮之奇言為謬卒并于晉公吳以伍子胥見為非果滅于句踐非敢自周秦悉數纍黷聰明竊敢以塵埃之卑少益嵩嶽王覽疏即拜飛為諫議大夫追贈太史馬知玄為安國大將軍以其子蚳為太史令賻布帛五百段米各三百石其徐玄之待后進旨于是蚳詣移市門進官表曰伏奉恩制云馬知玄有殷王子比干之忠貞有魏侍中辛毗之諫諍而我亟以用己昧于知人爇棟梁于將為大廈之晨碎舟楫于方濟巨川之日由我不德致爾非辜是宜褒贈其亡賞延于后者宸翰忽臨載驚載懼叩頭氣竭號斷血零伏以臣先父臣知玄學究天人藝窮歷數因玄鑒得居聖朝當大王采當芻蕘之晨是臣父展嘉謨之日逆耳之言難聽驚心之説易誅今蒙聖哲旁臨照此非罪鴻恩沾灑猶驚已散之精魂好爵彌縫難續不全之腰領今臣豈可因亡父之誅戮要國家之寵榮報平王而不能效伯禹而安忍況今天圖將變歷數堪憂伏乞斥臣遐方免逢喪亂王覽疏不悅乃返寢于候雨殿既寤宴百執事于凌云台曰適有嘉夢能曉之使我心洗然而亮者賜爵一級群臣有司皆頓首敬聽曰吾夢上帝云助爾金開爾國展爾疆土自南自北赤玉洎石以答爾德卿等以為如何群臣皆拜舞稱賀曰答鄰國之慶也飛曰大不祥何慶之有王曰何謂其然飛曰大王逼脅生人滯留幽穴錫茲咎夢由天怒焉夫助金者鋤也開國者辟也展疆土者分裂也赤玉洎石與火俱焚也得非玄之鋤吾土攻吾國縱火南北以答系領之辱乎王于是赦玄之之罪戮方術之徒自壞其宮以禳厥夢乃以安車送玄之歸才及榻玄之寤既明乃召家僮于西牖掘地五尺余得蟻穴如三石缶因縱火以焚之靡有孑遺自此宅不復凶矣短狐搜神記及鴻范五行傳曰蜮射生于南方謂之短狐者也南越夷狄男女同川而浴淫以女為主故曰多蜮蜮者淫女惑亂之氣所生蜘蛛怨頃有寺僧所住房前有蜘蛛為网其形絶大此僧見蜘蛛即以物戲打之蜘蛛見僧來即避隱如此數年一日忽盛熱僧獨于房因晝寢蜘蛛乃下在床嚙斷僧喉成瘡少頃而卒蜂蠆有毒非虛言哉蜥蜴曹叔雅異物志曰魚跳跳則蜥蜴從草中下稍相依近便共浮水上而相合事竟魚還水底蜥蜴還草中殷琅陳郡殷家養子名琅與一婢結好經年婢死后猶往來不絶心緒昏錯其母深察焉后夕見大蜘蛛形如斗樣緣床就琅便燕爾怡悅母取而殺之琅性理遂復豫章民婢豫章有一家婢在灶下忽有人長數寸來灶間婢誤以履踐殺一人遂有數百人著衰麻持棺迎喪凶儀皆備出東門入園中覆船下就視皆是鼠婦作湯澆殺遂絶南海毒蟲南海有毒蟲者若大蜥蜴眸子尤精朗土人呼為十二時蟲一日一夜隨十二時變其色乍赤乍黃亦呼為籬頭蟲傳云傷人立死既潛噬人急走于藩籬之上望其死者親族之哭新州西南諸郡絶不産蛇及蚊蠅余竄南方十年竟不睹蛇盛夏露臥無噆膚之苦此人謂南方少蛇以為夷獠所食別有水蛇形狀稍短不居陸地非噴毒嚙人者諾龍南海郡有蜂生橄欖樹上雖有手足頗類木葉抱枝自附與木葉無別南人取者先伐仆樹候葉凋落然后取之有水蟲名諾龍狀如蜥蜴微有龍狀俗云此蟲欲食即出水據石上凡水族遊泳過者至所據之石即跳躍自置其前因取食之有得者必雙雄者既死雌者即至雌者死亦然俗傳以雌雄俱置竹中以節間之少頃竹節自通里人貨其僵者幻人以蜂俱用為婦人惑男子術
