body:
  text: 洪昉禪師洪昉禪師陝州洪昉本京兆人幼而出家遂證道果志在禪寂而亦以講經為事門人常數百一日昉夜初獨坐有四人來前曰鬼王今為小女疾止造齊請師臨赴昉曰吾人汝鬼何以能至四人曰闍梨但行弟子能致之昉從之四人乘馬人持繩牀一足遂北行可數百里至一山山腹有小朱門四人請昉閉目未食頃人曰開之已到王庭矣其宮闕室屋崇峻非常侍衛嚴飾頗侔人主鬼王具冠衣降階迎禮王曰小女久疾今幸而痊欲造小福修一齊是以請師臨顧齊畢自令侍送無慮於是請入宮中其齊場嚴飾華麗僧且萬人佛像至多一如人間事昉仰視空中不見白日如人間重陰狀須臾王夫人後宮數百人皆出禮謁王女年十四五貌獨病色昉為贊禮願畢見諸人持千餘牙盤食到以次布於僧前坐昉於大牀別置名饌饌甚香潔昉且欲食之鬼王白曰師若常住此當餐鬼食不敢留師請不食昉懼而止齊畢餘食猶數百盤昉見侍衛臣吏向千人皆有欲食之色昉請王賜之餘食王曰促持去賜之諸官拜謝相顧喜笑口開達於兩耳王因跪曰師既惠顧無他供養有絹五百匹奉師請為受八關齊戒師曰鬼絹紙也吾不用之王曰自有人絹奉師因為受八關齊戒戒畢王又令前四人者依前送之昉忽開目已到所居天猶未曙門人但為入禪不覺所適昉忽開目命火照牀前五百絹在焉弟子問之乃言其故昉既禪行素高聲價日盛頃到鬼所但神往耳其形不動未幾晨坐有一天人其質殊麗拜謁請曰南天王提頭賴吒請師至天供養昉許之因敷天衣坐昉二人執衣舉而騰空斯須已到南天王領侍從曲躬禮拜曰師道行高遠諸天願覩師講誦是以輒請師因置高座坐肪其道場崇麗殆非人間過百千倍天人皆長大身有光明其殿堂樹木皆是七寶盡有光彩奪人目睛昉初到天形質猶人也見天王之後身自長大與天人等設諸珍饌皆自然味甘美非常食畢王因請入宮更設供具談話款至其侍衛天官兼鬼神甚衆後忽言曰弟子欲至三十三天議事請師且少留又戒左右曰師欲游覽所在聽之但莫使到後園再三言而去去後昉念曰後園有何利而不欲吾到之伺無人之際竊至後園其園甚大泉流池沼樹林花藥處處皆有非人間所見漸漸深入遙聞大聲呻呻原作叫據明鈔本改叫不可忍聽遂到其旁見大銅柱徑數百尺高千丈柱有穿孔左右傍達或有銀鐺鎖其項或穿其胸骨者至有數萬頭皆夜叉也鋸牙鉤爪身倍於天人見禪師至叩頭言曰我以食人故為天王所鎖今乞免我我若得脫但人間求他食必不敢食人為害為飢渴所逼發此言時口中火出問其鎖早晚或云毗婆師尸佛出世時動則數千萬年亦有三五輩老者志誠懇僧許解其縛而遽還斯須王至先問師頗遊後園乎左右曰否王乃喜坐定昉曰適到後園見鎖衆生數萬彼何過乎王曰師果遊後園然小慈是大慈之賊師不須問昉又固問王曰此諸惡鬼常害於人唯食人肉非諸天防護世人已為此鬼食盡此皆大惡鬼不可以禮待故鎖之昉曰適見三五輩老者發言頗誠言但於人間求他食請免之若此曹不食人餘者亦亦下原有不字據明鈔本刪可舍也王曰此鬼言不可信昉固請王目左右命解老者三五人來俄而解至叩頭言曰蒙恩釋放年已老矣今得去必不敢擾人王曰以禪師故放汝到人間若更食人此度重來當令若死皆曰不敢於是釋去未久忽見王庭前有神至自稱山嶽川瀆之神被甲面金色奔波而言曰不知何處忽有四五夜叉到人間殺人食甚衆不可制故白之王謂昉曰弟子言何如適語師小慈是大慈之賊此等惡鬼言寧可保王語諸神曰促擒之俄而諸神執夜叉到王怒何違所請命斬其手足以鐵鎖貫腦曳去而鎖之昉乃請還又令前二人送至寺寺已失昉二七日而在天猶如少頃昉於陝城中選空曠地造龍光寺又建病坊常養病者數百人寺極崇麗遠近道俗歸者如雲則為釋提柏國明鈔本柏國作恆因所請矣昉晨方漱有夜叉至其前左肩頭負五色毯而言曰帝釋帝釋原本作釋迦據許本改天王請師講大涅槃徑昉默然還座夜叉遂挈繩牀置於左膊曰請師合目因舉其左手而伸其右足曰請師開目視之已到善法堂禪師既到天堂天光眩目開不能得天帝曰師念彌勒佛昉遽念之於是目開不眩而人身卑小仰視天形不見其際天帝又曰禪師又念彌勒佛身形當大如言念之三念而身三長遂與天等天帝與諸天禮敬言曰弟子聞師善講大涅槃經為日久矣今諸天欽仰敬設道場故請大師講經聽受昉曰此事誠不為勞然病坊之中病者數百待昉為命常行乞以給之今若流連講經人間動涉年月恐病人餒死今也固辭天帝曰道場已成斯願已久固請大師勿為辭也昉不可忽空中有大天人身又數倍於釋天帝敬起迎之大天人言曰大梵天王有敕天帝憮然曰本欲留師講經今梵天有敕不許然師已至豈不能暫開經卷少講經旨令天人信受昉許之於是置食食器皆七寶飲食香美精妙倍常禪師食食原作日據陳校本改已身諸毛孔皆出異光毛孔之中盡能觀見諸物方悟天身騰妙也既登高座敷以天衣昉遂登座其善法堂中諸天數百千萬兼四天王各領徒衆同會聽法階下左右則有龍王夜叉諸鬼神非人等皆合掌而聽昉因開涅槃經首講一紙餘言辭典暢備宣宗旨天帝大稱贊功德開經畢又令前夜叉送至本寺弟子失昉已二十七日矣按佛經善法堂在歡喜園天帝都會天王之正殿也其堂七寶所作四壁皆白銀階下泉池交注流渠映帶其果木明鈔本陳校本果木作渠水皆與樹行相直寶樹花果亦皆奇異所有物類皆非世人所識昉略言其梗概階下寶樹行必相直每相表裏必有一泉夤緣枝間自葉流下水如乳色味佳於乳下注樹根灑入渠中諸天人飲樹本中泉其溜下者衆鳥同飲以黃金為地地生軟草其軟如綿天人足履之沒至足舉後其地自平其鳥數百千色名無定相入七寶林即同其樹色其天中物皆自然化生若念食時七寶器盛食即至若念衣時寶衣亦至無日月光一天人身光踰於日月須至遠處飛空而行如念即到肪既覩其異備言其見乃請畫圖為屏風凡二十四扇觀者驚駭昉初到寺毛孔之中盡能見物既而弟子進食食訖毛孔皆閉如初乃知人食天食精粗之分如此昉既盡出天中之相人以為妖時則天在位為人告之則天命取其屏兼徵昉昉既至則天問之而不罪也留昉宮中則天手自造食大申供養留數月則天謂昉曰禪師遂無一言教弟子乎昉不得已言曰貧道唯願陛下無多殺戮大損果報其言唯此則天信受之因賜墨敕昉所行之處修造功德無無原本作吾既二字據陳校本改得遏止昉年過下壽如入禪定遂卒於陝中焉出紀聞相衛間僧相衛間有僧自少博習經論善講說每有講筵自謂超絶然而聽者稀少財利寡薄如此積年其僧不憤遂將經論遍歷名山以訪知者後至衡嶽寺憩泊月餘常於寺閒齊獨坐尋繹經論又自咎曰所曉義理無乃乖於聖意乎沈思之次忽舉頭見一老僧杖錫而入曰師習讀何經論窮究何義理僧疑是異人乃述其由兼自咎曰儻遇知者分別此事即鉗口結舌不復開演耳老僧笑曰師識至廣豈不知此義大聖猶不能度無緣之人況其初心乎師只是與衆僧無緣耳僧曰若然者豈終世如此乎老僧曰吾試為爾結緣因問師今有幾許資糧僧曰自徂南縣歷行萬里糧食所費皆以竭矣今惟大衣七條而已老僧曰只此可矣可賣之以所得直皆作麋餅油食之物僧如言作之約數千人食遂相與攜至平野之中散掇焚香長跪呪曰今日食我施者願當來之世與我為弟子我當教之得至菩提言訖鳥雀亂下啄食地上螻蟻復不知數老僧謂曰爾後二十年方可歸開法席今且周遊未用講說也言訖而此僧如言後二十年却歸河北開講聽徒動千萬人皆年二十已下老壯者十無一二出原化記道林唐調露年中桂州人薛甲常供一僧法號道林道德甚高瞻敬尤切如是供給十有餘年忽一旦辭去云貧道在此撓瀆多年更無所酬今有舊經一函且寄宅中一周年不回即可開展經歲餘開鎖見有金數千兩後賣一半買地造菩提寺並建道林真身供養至今像儀見存薛甲今見有孫禹賓在桂林效職出桂林風土記淨滿則天朝恆州鹿泉寺僧淨滿有高行衆僧嫉之乃密畫女人居高樓而淨滿引弓射之狀藏於經笥令其弟詣闕告之則天大怒命御史裴懷古推案便行誅戮懷古執之不屈李昭德進曰懷古推事疏略請令重推懷古厲聲而言曰陛下法無親疏當與天下畫一奈何使臣誅無辜之人以希聖旨向使淨滿有不臣之狀臣復何顏能寬之乎臣守平典庶無冤濫死不恨矣則天意乃解懷古後副閻知微和親於突厥突厥突厥二字原闕據陳校補立知微為南面可汗而入寇趙定懷古因得逃歸素羸弱不堪奔馳乃懇誠告天願投死南土力倦而寢夢一僧如淨滿者引之曰可從此路出覺而從之果獲全人以為忠恕之報出大唐新語法通長安懿德禪院者唐中宗為懿德太子追福改名加飾焉禪院內有大石臼重五百斤隋末鄠縣沙門法通自南莊致於此寺法通自少出家初極尪劣同侶輕之乃發憤乞願壯健晝寢樹下忽口中涎沫流出三升其母驚遽呼覺法通云忽夢有人遺三馱筋使我噉之適噉一馱筋遽覺便壯健試舉大石臼不以為困有寺僧行戡本稱有力通於是遂乃竊其所服之袈裟舉堂柱而壓之行戡見而驚異盡力莫能取通徐舉柱而取衆大駭之通力兼百人時咸服之以為神助焉出西京記
