body:
  text: 周子恭周子恭唐天后朝地官郎中周子恭忽然暴亡見大帝于殿上坐裴子儀侍立子恭拜問為誰曰周子恭追到帝曰我喚許子儒何為錯將子恭來即放去子恭蘇問家中曰許侍郎好在否時子儒為天官侍郎已病其夜卒則天聞之馳驛向并州問裴子儀儀時為判官無恙李及李及者性好飲酒未嘗余瀝所居在京積善里微疾暴卒通身已冷唯心微暖或時尸語狀若詞訴家人以此日夜候其活積七八日方蘇自云初有鬼使追他人其家房中先有女鬼以及飲酒不澆漓乃引鬼使追及及知錯追己故屢尸語也其鬼大怒持及不舍行三十余里至三門狀若城府領及見官官問不追李及何忽將來及又極理稱枉官怒撻使者二十令送及還使者送及出門不復相領及經停曹司十日許見牛車百餘具因問吏此是何適答曰祿山反殺百姓不可勝數今日車般死按耳時祿山尚未反及言祿山不反何得爾為吏云尋當即反又見數百人皆理死按甚急及尋途自還久之至舍見家人當門不得入因往南曲婦家將息其婦若有所感悉持及衣服玩具等中路招之及乃隨還見尸臥在床力前便活耳阿六饒州龍興寺奴名阿六寶應中死隨例見王地下所由云汝命未盡放還出門逢素相善胡其胡在生以賣餅為業亦于地下賣餅見阿六欣喜因問家人并求寄書久之持一書謂阿六曰無可相贈幸而達之言畢堆落坑中乃活家人于手中得胡書讀云在地下常受諸罪不得托生可為造經相救詞甚凄切其家見書造諸功德奴夢胡云勞為送書得免諸苦今已托生人間故來奉謝亦可為謝妻子言訖而去崔君故崔寧鎮蜀時犍為守清河崔君既以啓尹真人函是夕崔君為冥司所召其冥官即故相呂諲也與崔君友善相見悲泣已而謂崔曰尹真人有石函在貴郡何為輒開今奉上帝命召君按諗將如之何崔謝曰昏俗聾瞽不識神仙事故輒開真人之函罪誠重然以三宥之典其不識不知者俱得原赦儻公寬之庶獲自新耳諲曰帝命至嚴地府卑屑何敢違乎即召按掾出崔君籍有頃按掾至白曰崔君余位五任余壽十五年今上帝有命折壽十三年盡奪其官崔又謝曰與公平生為友今日之罪誠自己招然故人豈不能宥之諲曰折壽削官則固不可逃然可以為足下致二年假職優其廩祿用副吾子之托崔又載拜謝言粗畢忽有云氣藹然紅光自空而下諲及庭掾仆吏俱驚懼而起曰天符下遂揖崔于一室中崔即于隙間潛視之見諲具巾笏率庭掾分立于庭咸俯而拱云中有一人紫衣金魚執一幅書宣道帝命于是諲及庭掾再拜受書使駕云而上頃之遂設諲命崔君出坐啓天符視之且歎且泣謂崔曰子識元三乎崔曰乃布衣之舊耳諲曰血屬無類吁可悲夫某雖與元三為友至是亦無能拯之徒積悲歎詞已又泣既而命一吏送崔君歸再拜而出與使者俱行入郡城廨中已身臥于榻妻孥輩哭而環之使者引崔俯于榻魂與身翕然而合遂寤其家云卒三日矣本郡以白廉使崔即治裝盡室往蜀具告于寧寧遂署攝副使月給俸錢二十萬時元載方執國政寧與載善書遺甚多聞崔之言懼其連坐因命親吏繼五百金賂載左右盡購得其書百餘幅皆焚之后月余元載籍沒又二年崔亦終矣劉溉彭城劉溉者貞元中為韓城令卒于官家甚貧因寄韓城佛寺中歲未半其縣丞竇亦卒三日而寤初竇生晝寐夢一吏導而西去經高原大澤數百里抵一城既入門導吏亡去生懼甚即出城門門有衛卒舉劍而列竇生訊之衛卒舉劍南指曰由此走生道耳竇始知身死背汗而髀栗即南去雖殆不敢息俄見十余人立道左有一人呼竇生挈其手以泣熟視之乃劉溉曰吾子何為而來竇具以告曰我自與足下別若委身于陷阱中念平生時安可得因涕泣竇即訊冥途事溉泣不語久之又曰我妻子安在得無恙乎竇曰賢子僑居韓城佛寺中將半歲矣溉曰子今去為我問訊我以窮泉困辱邈不可脫每念妻孥若肘而不忘步幽顯之恨何可盡道哉別謂竇曰我有詩贈君曰冥路杳杳人不知不用苦說使人悲喜得逢君傳家信后會茫茫何處期已而又泣竇遂告別未十余里聞擊鐘聲極震響因悸而寤竇即師錫從祖兄其甥崔氏子常以事語于人朱同朱同者年十五時其父為癭陶令暇日出門忽見素所識里正二人云判官令追倉卒隨去出癭陶城行可五十里見十余人臨河飲酒二里正并入廳坐立同于后同大忿怒罵曰何物里正敢作如此事里正云郎君已死何故猶作生時氣色同悲淚久之俄而坐者散去同復隨行行至一城城門尚閉不得入里正又與十余輩共食雖命同坐而不得食須臾城開內判官出里正拜謁道左以狀引同過判官判官問里正引同入城立衙門尚盤桓未有所適忽聞傳語云主簿退食尋有一青衫人從門中出曳履徐行從者數四其人見同識之因問朱家郎君何得至此同初不識無以敘展主簿云曾與賢尊連官情好甚篤遂領同至判官與極言相救久之判官云此兒算亦未盡當相為放去乃令向前二里正送還同拜辭欲出主簿又喚書其臂作主簿名以印印之戒曰若被拘留當以示之同既出城忽見其祖父奴下馬再拜云翁知郎君得還故令將馬送至宅同便上馬可行五十里至一店奴及里正請同下馬從店中過店中悉是大鑊煮人人熟乃將出幾上裁割賣之如是數十按交關者甚衆其人見同各欲烹煮同以臂印示之得免前出店門復見里正奴馬等行五十里又至店纍度二店店中皆持叉竿弓矢欲來殺同以臂印示之得全久之方至癭陶城外里正令同下馬云遠路疲極不復更能入城兼求還書與主簿云送至宅訖同依其言與書畢各拜辭去同還獨行入城未得至宅從孔子廟堂前過因入廨歇見堂前西樹下有人自縊心并不懼力郜澄郜澄者京兆武功人也嘗因選集至東都騎驢行槐樹下見一老母云善相手求澄手相澄初甚惡之母云彼此俱閒何惜來相澄坐驢上以手授之母看畢謂澄曰君安所居道里遠近宜速還家不出十日必死澄聞甚懼求其料理母云施食糧獄或得福助不然必不免澄竟如言市食糧獄事畢往見母令速還澄自爾便還至武功一日許既無疾意甚歡然因脫衫出門忽見十余人拜迎道左澄問所以云是神山百姓聞公得縣令故來迎候澄曰我不選何得此官須臾有策馬來者有持緑衫來者不得已著衫乘馬隨之而去行之十里有碧衫吏下馬趨澄拜問之答曰身任慈州博士聞公新除長史故此遠迎因與所乘馬載澄自乘小驢隨去行二十里所博士奪澄馬澄問何故相迎今復無禮博士笑曰汝是新死鬼官家捉汝何得有官乎其徒因驅澄過水水西有甲宅一所狀如官府門榜云中丞理冤屈院澄乃大叫冤屈中丞遣問有何屈答云澄算未盡又不奉符枉被鬼拘録中丞問有狀否澄曰倉卒被拘實未有狀中丞與澄紙令作狀狀后判檢旁有一人將檢入內中丞后舉一手求五百千澄遙許之檢云枉被追録算實未盡中丞判放又令檢人領過大夫通判至廳見一佛廩小胡頭冠氈帽著麂靴在廳上打葉錢令通云中丞親人令放卻還生胡兒持按入大夫依判遂出復至王所通判守門者就澄求錢領人大怒曰此是中丞親眷小鬼何敢求錢還報中丞中丞令送出外澄不知所適徘徊衢路忽見故妹夫裴氏將千余人西山打獵驚喜問澄何得至此澄具言之裴云若不相值幾成閒鬼三五百年不得變轉何其痛哉時府門有賃驢者裴呼小兒驢令送大郎至舍自出二十五千錢與之澄得還家心甚喜悅行五六里驢弱行不進日勢又晚澄恐不達小兒在后百余步唱歌澄大呼之小兒走至以杖擊驢驚澄墮地因爾遂活王勳華州進士王勳嘗與其徒趙望舒等入華嶽廟入第三女座悅其倩巧而盅之即時便死望舒惶懼呼神巫持酒饌于神前鼓舞元之方生怒望舒曰我自在彼無苦何令神巫彈琵琶呼我為衆人笑而問之云女初藏己于車中適繾綣被望舒彈琵琶告王令一黃門搜諸婢車中次諸女即不得已被推落地因爾遂活矣蘇履霜太原節度使馬侍中燧小將蘇履霜者頃事前節度使鮑防從行營日并將伐回紇時防臨陳指一旗劉明遠以不進鋒命履霜斬之履霜受命然數目明遠遽進得脫喪元之禍后十余年卒履霜亦游于冥間見明遠乃謂履霜曰曩日蒙君以生成之故無因酬德今日當展素願遂指一路路多榛棘云但趨此途必遇舍利王王平生曾為侍中之部將也見而訴之必獲免告之命去履霜遂行一二十里間果逢舍利王弋獵舍利素識履霜驚問曰何因至此答曰為冥司所召乃曰公不合來宜速反遂命判官王鳳翔令早放回兼附信耳謂履霜曰為余告侍中自此二年當罷節一年之內先須去入赴朝廷郎君早棄人世慎勿泄之鳳翔檢籍放歸至一關門逢平生飲酒之友數人謂履霜曰公獨行歸余曹企慕所不及也生五六日遂造鳳翔鳳翔逆已知之問曰舍利何詞曰有之不令告他人也鳳翔曰余亦知之汝且歸余候隙當白侍中旬日遂與履霜白之侍中召履霜訊之履霜亦具所見鳳翔陳告后所驗一如履霜所言蓋鳳翔生自司冥局隱而莫有知之者因履霜還生而泄也景生景生者河中猗氏人也素精于經籍授胄子數十人歲暮將歸途中偶逢故相呂談以舊相識遂以後乘載之而去群胄子乃散報景生之家而景生到家身已卒訖數日乃蘇云冥中見黃門侍郎嚴武朔方節度使張或然景生善周易早歲兼與呂相講授未終秩遇呂相薨乃命景生請終余秩時嚴張俱為左右台郎顧呂而怒曰景生未合來固非冥間之所勾留奈何私欲而有所害共請放回呂遂然之張尚書乃引景生屬兩男一名曾子一名夫子閏正月三日當起北屋妨曾子新婦為報止之令速罷當脫大禍及景蘇數日而后報其家屋已立其妻已亡矣又說曾子當經刺史夫子亦為刺史而不正拜后果如其言許琛王潛之鎮江陵也使院書手許琛因直宿二更后暴卒至五更又蘇謂其儕曰初見二人黃衫急呼出使院門因被領去其北可行六七十里荊棘榛莽之中微有徑路須臾至一所楔門高廣各三丈余橫楣上大字書標牌曰鴉鳴國二人即領琛入此門門內氣暗慘如人間黃昏以後兼無城壁屋宇唯有古槐萬萬株樹上群鴉鳴噪咫尺不聞人聲如此又行四五十里許方過其處又領到一城壁曾署牙門極緯亦甚嚴肅二人即領過曰追得取烏人到廳上有一紫衣官人据案而坐問琛曰爾解取鴉否琛即訴曰某父兄子弟少小皆在使院執行文案實不業取鴉官人即怒因謂二領者曰何得亂次追人吏良久惶懼伏罪曰實是誤官人顧琛曰即放卻還去又于官人所坐床榻之東復有一紫衣人身長大黑色以綿包頭似有所傷者西向坐大繩床顧見琛訖遂謂當案官人曰要共此人路語即近副階立呼琛曰爾豈不即歸耶見王仆射為我云武相公傳語仆射深愧每惠錢物然皆碎惡不堪行用今此有事切要五萬張紙錢望求好紙燒之燒時勿令人觸至此即完全矣且與仆射不久相見言訖琛唱喏走出門外復見二使者卻領回云我誤追你來幾不得脫然君喜當取別路歸也琛問曰所捕鴉鳴國周遞數百里其間日月所不及經日昏暗常以鴉鳴知晝夜是雖禽鳥亦有謫罰其陽道限滿者即捕來以備此中鳴噪耳又問曰鴉鳴國空地奚為二人曰人死則有鬼鬼復有死若無此地何以處之初琛死也已聞于潛既蘇復報之潛問其故琛所見即具陳白潛聞之甚惡即相見之說然問其形狀真武相也潛與武相素善纍官皆武相所拔用所以常于月晦歲暮焚紙錢以報之由是以琛言可驗遂市藤紙十萬張以如其請琛之鄰而姓許名琛者即此夕五更暴卒焉時大和二年四月至三年正月王仆射亡矣
