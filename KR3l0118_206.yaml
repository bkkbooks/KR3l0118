body:
  text: 古文古文按古文者黃帝史蒼頡所造也頡首有四目通於神明仰觀奎星圜曲之勢俯察龜文鳥跡之象博采衆美合而為字是曰古文孝經援神契云奎主文章蒼頡倣象是也出書斷大篆按大篆者周宣王太史史籀所作也或云柱下史始變古文或同或異謂之篆篆者傳也傳其物理施之無窮甄酆定六書三曰篆書八體書法一曰大篆又漢書藝文志史籀十五篇並此也以此官製之用以教授謂之史書凡九千字出書斷籀文周太史史籀所作也與古文大篆小異後人以名稱書謂之籀文七略曰史籀者周時史官教學童書也與孔氏壁中古文體異甄酆定六書二曰奇字是也出書斷小篆小篆者秦丞相李斯所作也增損大篆異同籀文謂之小篆亦曰秦篆出書斷八分按八分者秦時人上谷王次仲所作也王愔云王次仲始以古書方廣少波勢建初中以隸草作楷法字方八分言有模楷始皇得次仲文簡略赴急疾之用甚喜遣使召之三徵不至始皇大怒制檻車送之於道化為大鳥飛去出書斷隸書按隸書者秦下邽人程邈所作也邈字元岑始為縣吏得罪始皇幽繫雲陽獄中覃思十年益小篆方圓而為隸書三千字奏之始皇善之用為御史以奏事煩多篆字難成乃用隸字以為隸人佐書故曰隸書出書斷章草按章草漢黃門令史史游所作也衛恆李誕並云漢初而有草法不知其誰蕭子良云章草者漢齊相杜操始變稿法非也王愔云云字原闕據明鈔本補元帝帝原作章據明鈔本改時史游作急就章解散隸體粗書之漢俗簡惰漸以行之是也出書斷行書按行書者後漢隸川劉德升所造也行書即正書之小變變原作僞據明鈔本改務從簡易相聞流行故謂之行書王王原作云據明鈔本改愔云晉世以來工書者多以行書著名鍾元常善行書是也爾後王羲之王獻之並造其極焉出書斷飛白按飛白者後漢左中郎蔡雍所作也王隱王愔並云飛白變楷制也本是宮殿題署勢既徑文字宜輕微不滿名為飛白王僧虔云飛白八分之輕者雍在鴻都門見匠人施堊帚遂創意焉出書斷草書按草書者後漢徵士張伯英所造也梁武帝草書狀曰蔡雍云昔秦之時諸侯爭長羽檄相傳望烽走驛以篆隸難不能救急遂作赴急之書蓋今之草書是也出書斷汲冢書蓋魏安釐王時衛郡汲縣耕人於古冢中得之竹簡漆書科斗文字雜寫經史與今本校驗多有異同耕人姓不不字呼作彪其名曰淮出春秋後序文選中注出尚書故實李斯秦丞相李斯曰上古作大篆頗行於世但為古遠人多不能詳今刪略繁者取其合體參為小篆斯善書自趙高已下咸見伏焉刻諸名山碑璽銅人並斯之筆書秦望紀功石乃曰吾死後五百三十年當有一人替吾跡焉出蒙恬筆經斯妙篆始省改之為小篆著著原作者據明鈔本改蒼頡篇七章雖帝王質文世有損益終以文代質漸就澆醨則三皇結繩五帝畫象三王肉刑斯可況也古文可為上古大篆為中古小篆為下古三古為實草隸為華妙極於華者羲獻精窮其實者籀斯始皇以和氏之壁琢而為璽令斯書其文今泰山嶧山及秦望等碑並其遺跡亦謂傳國之偉寶百世之法式斯小篆入神大篆入妙李斯書知明鈔本知作如為冠蓋不易施乎出書評並出書斷蕭何前漢蕭何善篆籀為前殿成覃思三月以題其額觀者如流何使禿筆書出羊欣筆陳圖蔡雍後漢蔡雍字伯喈陳留人儀容奇偉篤孝博學能畫善音明天文術數工書篆隸絶世尤得八分之精微體法百變窮靈盡妙獨步今古又創造飛白妙有絶倫伯喈八分飛白入神大篆小篆隸書入妙女琰甚賢亦工書伯喈入嵩山學書於石室內得一素書八角垂芒篆寫李斯並史籀用筆勢伯喈得之不食三時乃大叫喜歡若對數十人伯喈因讀誦三年便妙達其旨伯喈自書五經於太學觀者如市出羊欣筆法蔡雍書骨氣風透精爽入神出袁昂書評並出書斷崔瑗崔瑗字子玉安平人曾祖蒙父駰子玉官至濟北相文章蓋世善章草書師於杜度媚趣過之點畫精微神變無礙利金百鍊美玉天姿可謂冰寒於水也袁昂云如危峰阻日孤松一枝王隱謂之草賢章草入神小篆入妙出書斷張芝張芝字伯英性好書凡家之衣帛皆書而後練尤善章草又善隸書韋仲將謂之草聖又云崔氏之肉張氏之骨其章草急就章字皆一筆而成伯英章草行入神隸書入妙出書斷伯英書如漢武愛道憑虛欲仙出袁昂書評張昶張昶字文舒伯英季弟為黃門侍郎尤善章草書類伯英時人謂之亞聖文舒章草入神八分入妙隸入能出書斷劉德升劉德升字君嗣潁川人桓靈世以造行書擅名即以草創亦甚妍美風流婉約獨步當時胡昭鍾繇並師其法世謂鍾繇善行狎書是也而胡書體肥鍾書體瘦亦各有君嗣之美也出書斷師宜官南陽人靈帝好書徵天下工書於鴻都門者數百人八分稱宜官為最大則一字徑丈小則方寸千言甚矜能而性嗜酒或時空至酒家因書其壁以售之觀者雲集酤酒多售則鏟滅之後為袁術將巨鹿耿球碑術所立宜官書也出書斷宜官書如鵰翅未息翩翩自逝出袁昂書評梁鵠梁鵠字孟皇安定烏氏人少好書受法於師宜官以善八分書知名舉孝廉為郎亦在鴻都門下遷選部郎靈帝重之魏武甚愛其書常懸帳中又以釘壁以為勝宜官也于時邯鄲淳亦得次仲法淳宜為小字鵠宜為大字不如鵠之用筆盡勢也出書斷左伯左伯字子邑東萊人特工八分名與毛弘等列小異於邯鄲淳亦擅名漢末又甚能作紙漢興有紙代簡至和帝時蔡倫工為之而子邑尤得其妙故蕭子良答王僧虔書云子邑之紙妍妙輝光仲將之墨一點如漆伯英之筆窮聲盡思妙物遠矣邈不可追出書斷胡昭胡昭字孔明潁川人少而博學不慕榮利有夷皓之節甚能籀書真行又妙衛恆云胡昭與鍾繇並師於劉德升俱善草行而胡肥鍾瘦尺牘之跡動見模楷羊欣云胡昭得張芝骨索靖得其肉韋誕得其筋張華云胡昭善隸書茂先與荀勗共整理記籍又立書博士置弟子教習以鍾胡為法可謂宿士矣出書斷鍾繇魏鍾繇字元常少隨劉勝入抱犢山學書三年遂與魏太祖邯鄲淳韋誕等議用筆繇乃問蔡伯喈筆法於韋誕誕惜不與乃自槌胸嘔血太祖以五靈丹救之得活及誕死繇令人盜掘其墓遂得之由是繇筆更妙繇精思學書臥畫被穿過表如廁終日忘歸每見萬類皆書象之繇善三色書最妙者八分出羊欣筆陳圖繇尤善書明鈔本無書字於曹喜蔡雍劉德升真書絶世剛柔備焉點畫之間多有異趣可謂幽深無際古雅有餘秦漢以來一人而已雖古之善政遺愛結人於心未足多也尚德哉若其行書則羲之獻之之亞草書則衛索之下八分則有魏受禪碑稱此為最也太和四年薨逮八十矣矣原作年據明鈔本改元常隸行入神草八分入妙出書斷鍾書有十二種意外巧妙實亦多奇出袁昂書評鍾會鍾會字士季元常子善書有父風稍備筋骨美兼行草尤工隸書遂逸致飄然有凌雲之志亦所謂劍則干將鏌鋣焉會嘗詐為荀勗書就勗母鍾夫人取寶劍兄弟以千萬造宅未移居勗乃潛畫元常形象會兄弟入見便大感慟勗書亦會之類也會隸行草章草並入妙出書斷韋誕魏韋誕字仲將京兆人太僕之子官至侍中伏膺於張伯英兼邯鄲淳之法諸書並善題署尤精明帝凌雲臺初成令仲將題榜高下異好宜就點正之因危懼以戒子孫無為大字楷法袁昂云如龍拏虎據劍拔弩張張茂先云京兆韋誕誕子熊潁川鍾繇繇子會並善隸書初青龍中洛陽許鄴三都宮觀始就詔令仲將大為題署以為永制給御筆墨皆不任用因奏蔡雍自矜能書兼斯喜之法非紈素不妄下筆夫欲善其事必利其器若用張芝筆左伯紙及臣墨兼此三者又得臣手然後可以逞徑丈之勢方寸千言然草跡之妙亞乎索靖也嘉平五年卒年七十五仲將八分隸書章草飛白入妙小篆入能兄康字元將工書子熊字少李明鈔本李作季亦善書時人云名父之子克有二事世所美焉出書斷又云魏明帝凌雲臺成誤先釘榜未題署以籠成誕轆轤長緪引上使就榜題去地二十五丈誕危懼誡子孫絶此楷法出書法録
