body:
  text: 劉薛劉薛晉太元九年西河離石縣有胡人劉薛者暴疾亡而心下猶暖其家不敢殯殮經七日而蘇言初見兩吏録去向北行不測遠近至十八重地獄隨報輕重受諸楚毒忽觀世音語云汝緣未盡若再得生可作沙門今洛下齊城丹陽會稽并有阿育王塔可往禮拜若壽終不墮地獄語竟如墜高岩忽然醒寤因此出家法名惠達遊行禮塔次至丹陽未知塔處乃登越西望見長干里有異氣色因就禮拜果是先阿育王塔之所也由是定知必有舍利乃聚衆掘之入地一丈得石牌三下有鐵函函中復有銀函函中又有金函盛三舍利及爪發薛乃于此處造一塔焉李清李清者吳興于潛人也仕桓溫大司馬府參軍督護于府得病還家而死經夕蘇活説云初見傳教持信幡喚之云公欲相見清謂是溫召即起束帶而去出門見一竹輿便令入中二人推之疾速如馳至一朱門見阮敬時敬死已三十年矣敬問清曰卿何時來知我家何似清云卿家暴惡敬便雨淚言知吾子孫如何答云且可敬云我今令卿得脫汝能料理吾家不清云若能如此不負大恩敬言僧達道人是官師甚被敬禮當苦告之還內良久遣人出云門前四層寺官所起也僧達常以平旦入寺禮拜宜就求哀清往其寺見一沙門語曰汝是我前七生時弟子已經七世受福迷著世樂忘失本業背正就邪當受大罪令可改悔和尚明出當相助清還先輿中夜寒噤凍至曉門開僧達果出清便隨逐稽顙僧達云汝當革為善歸命佛法歸命比丘僧受此三歸可得不橫死受持勤者亦不經苦難清便奉受又見昨所遇沙門長跪請曰此人僧達宿世弟子忘正失法方將受苦先緣朱所追今得歸余願垂慈愍答曰先是福人當易拔濟耳便還向朱門俄遣人出云李參軍可去敬時亦出與清一青竹杖令閉眼騎之清如其言忽然至家家中啼哭及鄉親塞堂欲入不得會買材還家人及客赴監視之唯尸在地清入至尸前聞其尸臭自念悔還得外人逼突不覺入少時于是而活即營理敬家分宅以居于是歸心法寶勸信法教遂作佳流弟子鄭師辨唐東官右監門兵曹參軍鄭師辨年未弱冠暴死三日而蘇自言初有數人見收將人入官府大門有見囚百餘人皆重行北面立凡為六行其前行者形狀肥白好衣服如貴人復行漸瘦惡或著枷鎖或但去巾帶偕行連袂嚴兵守之師辨至配入第三行東頭第三立亦巾帶連袂辨憂懼專心念佛忽見平生相識僧來入兵團內兵莫之止囚至辨所謂曰平生不修福今忽如何辨求請救僧曰吾今救汝得出可持戒耶諾須臾吏引入諸囚至官前以次詰問尋于門外僧為授五戒用瓶水灌其額謂曰日西當活又以黃帔一枚與辨曰披此至家置淨處也仍示歸路辨披之而歸至家掖帔至床角上既而目開身動家人驚散謂死欲起唯母不去問曰汝活耶辨曰日西當活辨意時疑日午問母母曰夜半方知死生相違晝夜相及既到日西能食而愈猶見帔在床頭及辨能起帔形漸滅而尚有光七日乃盡辨遂持五戒后數年有友人勸食豬肉辨不得已食一臠是夜夢己化為羅剎爪齒各長數尺捉生豬食之既曉覺口醒唾血使人視口盡是凝血辨驚不敢復食肉又數年娶妻家逼食后乃無驗然而辨自五六年來身臭有大瘡潰爛不愈或恐以破戒之故也唐臨昔與辨同直東宮見其自説法慶凝觀寺有僧法慶造丈六挾紵像未成暴死時寶昌寺僧大智同日亦卒三日并蘇云見官曹殿上有人似王者儀仗甚衆見法慶在前有一像忽來謂殿上人曰慶造我未成何乃令死便檢文簿云慶食盡命未盡上人曰可給荷葉以終壽言訖忽然皆失所在大智便蘇衆異之乃往凝觀寺問慶説皆符驗慶不復能食每日朝進荷葉六枝齋時八枝如此終身同流請乞以成其像開元選人吏部侍郎盧從願父素不事佛開元初選人有暴亡者以鼻未盡為地下所由放還既出門逢一老人著枷謂選人曰君以得還我子從願今居吏部若選事未畢當見之可以相諭己由不事佛今受諸罪備極苦痛可速作經像相救其人既活向銓司為説之從願流涕請假寫經像相救畢卻詣選人辭謝云已生人間可為白兒言訖不見崔明達小字漢子清河東武城人也祖元獎吏部侍郎杭州刺吏父庭玉金吾將軍冀州刺史明達幼於西京太平寺出家師事利涉法師通涅槃經為桑門之魁柄開元初齋后房中晝寢及寤身在簷外還房又覺出如是數四心甚惡之須臾見二牛頭卒悉持死人於房外炙之臭氣沖塞問其所以卒云正欲相召明達曰第無令臭不憚行卒乃於頭中拔出其魂既而引出城中所歷相識甚衆明達欲對人告訴則不可既出城西路徑狹小俄而又失二卒有赤索系片骨引明達行甚親之行數里骨復不見明達惆悵獨進僅至一城城壁毀壞見數百人洋鐵補城明達默然而過不敢問更行數里又至一城城前見卒吏數十人和墼修方丈室有緋衫吏呵問明達尋令卒吏推明達入室纍墼塞之明達大叫枉吏云聊欲相試無苦也須臾內傳王教召明達師明達隨入大廳見貴彩少年可二十許階上階下朱紫羅列凡數千人明達行入庭竊心念王召我不下階忽見王在階下合掌虔敬謂明達曰冥中深要陽地功德聞上人通涅槃經故使奉迎開題延壽明達又念欲令開講不致塔座何以敷演又見塔座在西廊下王指令明達上座開題仍於塔下設席王跪明達説一行王云得矣明達下座至王令左右送明達法師還臨別謂明達可為轉一切經既出忽於途中見車騎數十人云是崔尚書及至乃是其祖元獎元獎見明達不悅明達大言云己是漢子阿翁寧不識耶元獎引至廳初問藍田莊次問庭玉明達具以實對元獎云吾自沒后有職務未嘗得還家存亡不之知也尋有吏持案至元獎處明達竊見籍有明達名云太平寺僧嵩山五品既畢元獎問明達得窺也明達辭不見乃令二吏送明達詣判官令兩人送還家判官見不甚致禮左右數客云此是尚書嫡孫何得以凡客相待判官乃處分二吏送明達曰此輩送上人者歲五六輩可以微貺勞之出門吏各求五百千吏云至家宜便於市致鑿之吾等待錢方去及房見二老婢披發哭門徒等并歎息明不識其尸但見大坑吏推明達於坑遂活尚昏沉未能言唯纍舉手左右云要紙錢千貫明達頷之及焚錢訖明達見二人各持錢去自爾病愈初明達至王門見數吏持一老姥至明達所居云是鄠縣靈岩人及入王怒云何物老婢持菩薩戒乃爾不潔令放還可清潔也及出與明達相隨行可百餘步然后各去明達疾愈往詣靈岩見姥如舊識也王掄天寶十一年朔方節度判官大理司直王掄巡至中城病死凡一十六日而蘇初疾亟屬纊之際見二人追去恍惚以為人間不知其死也須臾入大城門見朔方節度李林甫相見拜揖以為平生時也又見李雍裴敦復數人於一府庭言責林甫命掄方悟死耳林甫手持紙筆與雍等辨對俄而見其案冥司斷曰林甫死后破家楊國忠代為相其冬林甫死楊國忠果代之掄兄攝亡已六年時見之攝云爾未當死若得錢三千貫即重生也掄家在西定遠去中城數百里便見一山下有崎嶇小道馳歸其家斯須而升堂告妻曰我已死矣若得錢三千貫即再生其夕畢家咸聞窗牖間窣然有物聲犬亦迎吠既明其妻泣言夢掄已死求錢三千貫即取紙剪為錢財召巫者焚之掄得之即與人間錢不殊矣冥中無晝夜長如十一月十二月太陰雪時有鬼王衣紫衣決罪福判官數十人其定罪以負心為至重其被考理者多僧尼及衣冠掄在生時無他過及定罪唯舉食肉罪旁見小吏曰此人雖食肉不故殺然食肉者信罪矣殺而食之罪又甚焉掄未病時曾解衣寫金光明經手自封裹置于佛堂內及冥中以此業得見地藏菩薩汝同此善當得更生即令取經經即掄所封裹之經也鬼王判官數人皆平生相友善相見恍惚不敘故亦見其先府君夫人拜伏之后都無問訊如不相識又見諸先亡兄弟亦無兄弟情兄攝近亡相睦如生當以日近故也至其視事之所見親故有當貴及壽夭皆宿命先定不可移改俄而放歸有一吏曰君有祿及壽然此中之事必不得泄之言畢奄然而活亡已十六日也費子玉天寶中犍為參軍費子玉官舍夜臥忽見二吏至床前費參軍子玉驚起問誰吏云大王召君子玉云身是州吏不屬王國何得見召吏云閻羅子玉大懼呼人備馬無應之者侖卒隨吏去至一城城門內外各有數千人子玉持誦金剛經爾時恆心誦之又切念云若遇菩薩當訴以屈須臾王命引入子玉再拜甚歡然俄見一僧從云中下子玉前致敬子玉復揚言欲見地藏菩薩王曰子玉此是也子玉前禮拜菩薩云何以知我耶因謂王曰此人一生誦金剛經以算未盡宜遣之去王視子玉忽怒問其姓名子玉對云嘉州參軍費子玉王曰犍為郡何嘉州也汝合死正為菩薩苦論且釋君去子玉再拜辭出菩薩云汝還勿復食肉當得永壽子玉禮聖容聖容是銅佛頭面手悉動菩薩禮拜手足悉展子玉亦禮禮畢出門子玉問門外人何其多乎菩薩云此輩各罪福不明已數百年為鬼不得記生子玉辭還舍復活后三年食肉又死為人引證菩薩見之大怒云初不令汝食肉何故違約子玉既重生遂斷葷血初子玉纍取三妻皆云被追之亦悉來見子玉問何得來耶妻云君勿顧之耳小妻君於我不足有恨而來所用己錢何不還之子玉云錢亦易得妻云用我銅錢今還紙錢耶子玉云夫用婦錢義無還理妻無以應遲回各去也梅先錢塘梅先恆以善事自業好持佛經兼造生七齋鄰里呼為居士天寶中遇疾暴卒而活自説初死為人所領與徒十余輩見閻羅王王問君在生復有何業先答曰唯持經念佛而已王曰此善君能行之冥冥之福不可虛耳令檢先簿喜曰君尚未合死今放卻生宜崇本業也再拜會未有人送留在署中王復訊問次至錢塘里正包直問何故取李平頭錢不為屬戶直曰直為里長團頭身常在縣夜歸早出實不知山乞追子問王令出帖追直子須臾有使者至今送直還遂活説其事時其子甚無恙衆人皆試之后五六日直子果病即二日死矣
