body:
  text: 張易之張易之張易之昌宗時初入朝官位尚卑諂附者乃呼為五郎六郎自後因以成俗張昌儀兄弟恃易之昌宗之寵所居奢溢逾於王者末年有人題其門曰一兩絲能得幾時絡昌儀見之遽命筆續其下曰一日即足未幾禍及張昌宗之貴也武三思謂之王子晉後身為詩以贈之詩至今猶存出國史異纂王準王鉷之子準為衛尉少卿出入宮中以鬥雞侍帝左右時李林甫方持權恃勢林甫子岫為將作監亦入侍帷幄岫常為準所侮而不敢發一言一旦準盡率其徒過駙馬王瑤私私原作弘據許刻本改第瑤望塵趨拜準挾彈命中於瑤巾冠之上因折其玉簪以為簪明皇雜録簪作取笑樂遂致酒張樂永穆公主親御匕公主即帝之長女也仁孝端淑頗推於戚里帝特所鍾愛準既去或有謂瑤曰鼠輩雖恃其父勢然長公主帝愛女君待之或闕帝豈不介意邪瑤曰天子怒無所畏但性命繫七郎安敢不爾時人多呼為七郎其盛勢橫暴人之所畏也如是出明皇雜録王毛仲王毛仲本高麗人玄宗在藩邸與李宜得服勤左右帝皆愛之每待宴與薑皎同榻坐於帝前既而貴倨恃舊益為不法帝常優容之每遣中官問訊毛仲受命之後稍不如意必恣其凌辱而後遣還高力士楊思勗忌之頗深而未嘗敢言於帝毛仲妻李氏既誕育三日帝命力士賜以酒食金帛甚厚仍命其子為五品官力士既還帝曰毛仲喜否復有何詞力士曰出其兒以示臣熟眄褓中曰此兒豈不消三品官帝大怒曰往誅韋氏此賊尚持兩端避事不入我未嘗言之今敢以赤子恨我邪由是恩義益衰帝自先天在位後十五年至開府者唯四人后父王仁皎姚崇宋璟王毛仲而已出明皇雜録李林甫張九齡在相位有謇諤匪躬之誠玄宗既在位年深稍怠庶政每見帝無不極言得失李林甫時方同列聞帝意陰欲中之時欲加朔方節度使牛仙客實封九齡因稱其不可甚不叶帝旨他日林甫請見屢陳九齡頗懷誹謗於時方秋帝命高力士持白羽扇以賜將寄意焉九齡惶恐因作賦以獻又為歸燕詩以貽林甫其詩曰海燕何微眇乘春亦暫來豈知泥滓賤只見玉堂開繡戶時雙入華軒日幾回無心與物競鷹隼莫相猜林甫覽之知其必退恚怒稍解九齡洎裴耀卿罷免之日自中書至月華門將就班列二人鞠躬卑遜林甫處其中抑揚自得觀者竊謂一雕挾兩兔俄而詔張裴為左右僕射罷知政事林甫視其詔大怒曰猶為左右丞相邪二人趨就本班林甫目送之公卿已下視之不覺股栗出明皇雜録盧絢玄宗宴於勤政樓下巷無居人宴罷帝猶垂簾以觀兵部侍郎盧絢謂帝已歸宮掖垂鞭按轡橫縱樓下絢負文雅之稱而復風標清粹帝一見不覺目送之問左右曰誰近臣具以絢名氏對之帝亟稱其蘊藉是時林甫方持權忌能帝之左右寵幸未嘗不厚以金帛為賄由是帝之動靜林甫無不知之翌日林甫召絢之子弟謂曰賢尊以素望清崇今南方藉才聖上有交廣之寄可乎若憚遐方即當請老不然以賓詹仍分務東洛亦優賢之命也子歸而具道建議可否於是絢以賓詹為請林甫恐乖衆望出於華州刺史不旬月誣其有疾為郡不理授太子詹事員外安置出明皇雜録李輔國玄宗為太上皇在興慶宮居久雨初晴幸勤政樓樓下市人及街中往來者喜且泫然曰不期今日再得見太平天子傳呼萬歲聲動天地時肅宗不豫李輔國誣奏云此皆九仙媛高力士陳玄禮之異謀也下矯詔遷太上皇於西內給明鈔本給作絶其扈從部曲不過老弱三二十人及中逵攢刃曜日輔國統之太上皇驚欲墜馬數四賴左右扶持乃上高力士躍馬而前厲聲曰五十年太平天子李輔國汝舊臣不宜無禮李輔國下馬輔國不覺失轡而下宣太上皇誥曰將士各得好生明鈔本生作在否二字於是輔國令兵士咸韜刃於鞘中齊聲云太上皇萬福一時拜舞力士又曰李輔國攏馬輔國遂著靴出行攏馬與兵士等護侍太上皇平安到西內輔國領衆既退太上皇泣持力士手曰微將軍阿瞞已為兵死鬼矣既而九仙媛力士玄禮長流遠惡處此皆輔國之矯詔也時肅宗大漸輔國專朝意西內之復有變故也出戎幕間談韋渠牟貞元末太府卿韋渠牟金吾李齊運度支裴延齡京兆尹嗣道王實皆承恩寵事薦人多得名位時劉師老穆寂皆應科目渠牟主持穆寂齊運主持師老會齊運朝對上嗟其羸弱許其致政而師老失授故無名子曰太府朝天升穆老尚書倒地落劉師又渠牟因對德宗德宗問之曰我擬用鄭絪作宰相如何渠牟曰若用此人必敗陛下公事他日又問對亦如此帝曰我用鄭絪定也卿勿更言絪即昭國司徒公也再入相位以清儉文學號為賢相於今傳之渠牟之毀濫也出嘉話録魚朝恩魚朝恩專權使氣公卿不敢仰視宰臣或決政事不預謀者則睚眥曰天下之事豈不由我乎於是帝惡之而朝恩幼子令徽年十四五始給事於內殿帝以朝恩故遂特賜緑未浹旬月同列黃門位居令徽上者因敘立於殿前恐其後至遂爭路以進無何誤觸令徽臂乃馳歸告朝恩以班次居下為同列所欺朝恩怒翌日於帝前奏曰臣幼男令徽位居衆寮之下願陛下特賜金章以超其等不言其緋而便求紫帝猶未語而朝恩已令所司捧紫衣而至令徽即謝於殿前帝雖知不可強謂朝恩曰卿男著章服大宜稱也魚氏在朝動無畏憚他皆倣此其同列黃門尋逐於嶺表及朝恩被殺天下無不快焉出杜陽雜編元載元載在中書有丈人自宣州貨所居來投求一職事中書度其人材不任職事贈河北一函書而遣之丈人惋怒不得已持書而去既至幽州念破産而來止得一書書若懇切猶可望乃折視之更無一詞唯署名而已大悔怒欲回念已行數千里試謁院寮院寮問既是相公丈人豈無緘題曰有判官大驚立命謁者上白斯須乃有大校持箱復請書書既入館之上舍留連積月及辭去奉絹一千匹出幽間鼓吹又元載子伯和勢傾中外福州觀察使寄樂妓十人既至半歲不得送使者窺伺門下出入頻者有琵琶康崑崙最熟厚遺求通既送妓伯和一試奏盡以遺之先有段和尚善琵琶自製西梁州崑崙求之不與至是以樂之半贈之乃傳焉今曲調梁州是也出幽間鼓吹路巖路巖出鎮坤維也開道中衢恣為瓦石所擊故京尹溫璋諸子之黨也巖以薛能自省郎權知京兆府事李蠙之舉也至是巖謂能曰臨行勞以瓦礫相餞能徐舉手板對曰舊例宰相出鎮府司無例發人防守巖有慚色懿宗晚節朝政多門巖年少固位邂逅致此一旦失勢當岐路者率多仇隙附麗音離之徒釣射時態志在諛媚雷同一詞中外騰沸其實未然也始巖淮南與崔鉉作支使除監察不十年城門不出而致位卿相物禁太盛暴貴不祥良有以哉初鉉以巖為必貴常曰路十終須與他那一位也自監察入翰林鉉猶在淮南聞之曰路十如今便入翰林如何到老皆如所言出玉泉子高湘元和初黜八司馬韋執誼崖州韓泰虔州柳宗元永州劉禹錫朗州韓曄饒州凌準連州程異柳州及咸通韋保衡路巖作相除不附己者十司戶崔沆循州李瀆繡州蕭遘播州崔彥融雷州高湘高州張顏潘州李貺勤州杜裔休端州鄭彥持義州李藻費州內繡州潘州雷州三人不回初高湜與弟湘少不相睦咸通末既出高州湜雅與路巖相善見巖陽救湘巖曰某與舍人皆是京兆府荷枷者先是劉瞻志欲除巖溫璋希旨別製新枷數十待之瞻以人情附己不甚緘密其計泄焉故居巖之後湜既知舉問巖所欲言時巖以去年停舉已潛奏恐有遺滯請加十人矣既託湜以五人湜喜其數寡形於言色不纍日十人制下湜未知之也巖執詔笑謂湜曰前者五人侍郎所惠也今之十人某自致也湜竟依其數放焉湘到任嗔湜不佑己嘗賦詩云唯有高州是當家出玉泉子盧隱盧隱李峭皆滑帥王鐸之門生前後黜辱者數矣隱峭物議以為咸袵席不修隱以從兄攜為相特除右司員外郎右丞崔沆不聽隱省上仍即見攜於私第攜未知之欣然而出沆曰員外前日入省時議未息今復除糾司員外省中固不敢辭按宋王讜唐語林七辭作從他曹惟相公命攜大怒馳入曰舍弟極屈即當上陳既上沆乃求假攜即時替沆官沆謂人曰吾見丞郎出省郎未見省郎出丞郎隱初自太常博士除水部員外為右丞李景溫揖焉逮右司之命景溫之旨也至是而遂其志矣是時諫官亦有陳其疏者攜曰諫官似狗一箇吠則一時有聲出玉泉子
