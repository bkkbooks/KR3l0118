body:
  text: 吳饌吳饌吳郡獻海鮸乾鱠四瓶瓶容一斗浸一斗可得徑尺數盤并狀奏作乾鱠法帝示群臣云昔術人介象于殿庭釣得海魚此幻化耳亦何足為異今日之鱠乃是真海魚所作來自數千里亦是一時奇味虞世基對曰術人之魚既幻其鱠固亦不真出數盤以賜達官作乾鱠之法當五六月盛熱之日于海取得鮸魚大者長四五尺鱗細而紫色無細骨不腥者捕得之即於海船之上作鱠去其皮骨取其精肉縷切隨成隨曬三四日須極乾以新白瓷瓶未經水者盛之密封泥勿令風入經五六十日不異新者取啖之時開出乾鱠以布裹大甕盛水漬之三刻久出帶布瀝卻水則皎然散置盤上如新鱠無別細切香柔葉鋪上箸撥令調勻進之海魚體性不腥然鱕鮸魚肉軟而白色經乾又和以青葉皙然極可噉又獻海蝦子三十梴梴長一尺闊一寸厚一寸許甚精美作之法取海白蝦有子者每三五斗置密竹籃中於大盆內以水淋洗蝦子在蝦腹下赤如覆盆子則隨水從籃目中下通計蝦一石可得子五升從盆內漉出縫布作小袋子如徑寸半竹大長二尺以蝦子滿之急繫頭隨袋多少以末鹽封之周厚數寸經一日夜出曬夜則平板壓之明日又出曬夜以前壓十日乾則拆破袋出蝦子梴色如赤琉璃光徹而肥美鹽於鯔魚數倍又獻鮸魚含肚千頭極精好作之法當六月七月盛熱之時取鮸魚長二尺許去鱗淨洗停二日待魚腹脹起方從口抽出腸去腮留目滿腹納鹽竟即以末鹽封周遍厚數寸經宿乃以水淨洗日則曝夜則收還安平板上又以板置石壓之明日又晒夜還壓如此五六日乾即納乾瓷甕封口經二十日出之其皮色光徹有如黃油肉則如糗又如沙棋之蘇者微鹹而有味味美於石首含肚然石首含肚亦年常入獻而肉彊不及此法出自隨口味使大都督杜濟濟會稽人能別味善於鹽梅亦古之符郎今之謝諷也出大業拾遺記又吳郡獻松江鱸魚乾鱠六瓶瓶容一斗作鱠法一同鮸魚然作鱸魚鱠須八九月霜下之時收鱸魚三尺以下者作乾鱠浸漬訖布裹瀝水令盡散置盤內取香柔花葉相間細切和鱠撥令調勻霜後鱸魚肉白如雪不腥所謂金虀玉鱠東南之佳味也紫花碧葉間以素鱠亦鮮潔可觀吳郡又獻蜜蟹三千頭作如糖蟹法蜜擁劍四甕擁劍似蟹而小二螯偏大吳郡賦所謂烏賊擁劍是也出大業拾遺記御廚御廚進饌凡器用有少府監進者用九飣食以牙盤九枚裝食味於其間置上前亦謂之看食見京都人說兩軍每行從進食及其宴設多食雞鵝之類就中愛食子鵝鵝每隻價值二三千每有設據人數取鵝燖去毛及去五臟釀以肉及糯米飯五味調和先取羊一口亦燖剝去腸胃置鵝于羊中縫合炙之羊肉若熟便堪去卻羊取鵝渾食之謂之渾羊歿忽翰林學士每遇賜食有物若畢羅形粗大滋味香美呼為諸王修事出盧氏雜說五侯鯖婁護字君卿歷游五侯之門每旦五侯家各遺餉之君卿口厭滋味乃試合五侯所餉之鯖而食甚美世所謂五侯鯖君卿所致出語林或云護兼善五侯不偏食故合而為之鯖也出世說又五侯不相能賓客不得往來婁護豐辭傳會五侯間各得其心競致奇膳護乃合以為鯖世稱五侯鯖以為奇味焉出西京雜記劉孝儀梁劉孝儀食鯖鮓曰五侯九伯今盡征之魏使崔劼李騫在坐劼曰中丞之任未應已得分陝騫曰若然中丞四履當至穆陸陵孝儀曰鄴中鹿尾乃酒肴之最劼曰生魚熊掌孟子所稱雞跖猩唇呂氏所問鹿尾乃有奇味竟不載書籍每用為恨孝儀曰實自如此或古今好尚不同梁賀季曰青州蟹黃乃為鄭氏所記此物不書未解所以騫曰鄭亦稱益州鹿𣨙但未是尾耳出酉陽雜俎䱉議何胤侈于味食必方丈後稍欲去其甚者猶食白魚䱉臘糖蟹使門人議之學士鍾𡵻議曰䱉之就臘驟于屈申蟹之將糖躁擾彌甚仁人用意深懷惻怛至于車螯蚶蠣眉目內缺慚渾淪之奇唇吻外緘非金人之慎不榮不悴曾草木之不若無馨無臭與瓦礫而何異故宜長充庖廚永為口實出酉陽雜俎䱉表後梁韋林京兆人南遷于襄陽天保中為舍人涉獵有才藻善劇談嘗為䱉表以譏刺時人其詞曰臣䱉言伏見除書以臣為糝敖將軍油蒸校尉𦞦州刺史脯臘如故肅承將命含灰屏息憑籠臨鼎載戰載兢臣美愧夏鱣味慚冬鯉常恐鮐腹之譏懼貽鱉巖五甘反之誚是以嗽流湖底枕石泥中不意高賞殊臨曲蒙鈞撥遂得超升綺席忝預玉盤遠廁玳筵猥頒象箸澤覃紫腴恩加黃腹方當鳴姜動桂紆蘇佩檔輕瓢才動則樞盤如烟濃汁暫停則蘭肴成列宛轉緑齏之中逍遙朱唇之內銜恩噬澤九殞弗辭無任屏營之誠謹詣銅鐺門奉表致謝以聞詔答曰省表具悉卿池沼縉紳陂渠俊乂穿蒲入荇肥滑有聞允堪茲選無勞致謝出酉陽雜俎熱洛河玄宗命射生官射鮮鹿取血煎明鈔本煎作鮮鹿腸腸原作賜據明鈔本改食之謂之熱洛河賜安祿山及哥舒翰出盧氏雜說名食今衣冠家名食有蕭家餫飩漉去其湯不肥可以瀹茗庾家粽子白瑩如玉韓約能作櫻桃饆饠其色不變又能造冷胡突鱠鱧魚臆連蒸麞麞皮索餅將軍曲良翰能為驢騣駝峰炙出酉陽雜俎敗障泥貞元中有一將軍家出飯食每說無物不堪吃唯在火候善均五味嘗取敗障泥胡盝修理食之其味佳出酉陽雜俎尚食令馮給事入中書祗候宰相見一老官人衣緋在中書門立候通報時夏譙公為相留坐論事多時及出日勢已晚其官人猶尚在乃遣人問是何官官人近前相見曰某新除尚食局令有事相見相公因令省官通之官人入給事偶未去官人見宰相了出謝云若非給事恩遇某無因得見相公某是尚食局造䭔子手不知給事宅在何處曰在親仁坊曰欲說薄藝但不知給事何日在宅曰來日當奉候然欲相訪要何物曰要大臺盤一隻木楔子三五十枚及油鐺炭火好麻油一二斗南棗爛麵少許給事素精于飲饌歸宅便令排比仍垂簾家口同觀之至日初出果秉簡而入坐飲茶一甌便起出廳脫衫靴帶小帽子青半肩明鈔本肩作臂三幅褲花襜襪肚錦臂韝遂四面看臺盤有不平處以一楔填之後其平正然後取油鐺爛麵等調停襪肚中取出銀盒一枚銀篦子銀笊籬各一候油煎熟于盒中取䭔子豏豏原作𨃰據明鈔本改以手于爛麵中團之五指間各有麵透出以篦子刮卻便置䭔子于鐺中候熟以笊籬漉出以新汲水中良久卻投油鐺中三五沸取出拋臺盤上旋轉不定以太圓故也其味脆美不可名狀出盧氏雜說大餅王蜀時有趙雄武者衆號趙大餅纍典名郡為一時之富豪嚴潔奉身精于飲饌居常不使膳夫六局之中中有二婢執役常廚者十五餘輩皆著窄袖鮮潔衣裝事一餐邀一客必水陸俱備雖王侯之家不得相倣焉有能造大餅每三斗麵擀一枚大於數間屋或大內宴聚或豪家有廣筵多于衆賓內獻一枚裁剖用之皆有餘矣雖親密懿分莫知擀造之法以此得大餅之號出北夢瑣言范汪晉范汪能噉生梅有人致一斛汪食之須臾而盡出晉書宋明帝宋明帝韋彧能食蜜漬鱁鮧一食數升噉豬肉炙常至二百臠出宋書苻堅三將苻堅以乞活夏默為左鎮郎胡人人原作又據明鈔本改護磨那為右鎮郎奄人申香為拂蓋郎並身長一丈三尺多力善射三人每食飯一石肉三十斤出前秦録茅容後漢茅容字季偉郭林宗曾寓宿焉及明旦容殺雞為饌林宗初以為己設既而容獨以供母自以草蔬與客同飯林宗因起拜之曰卿賢乎哉勸之就學竟以成德出陳留耆舊傳陸機陸機詣王武子有數斛羊酪指示陸曰卿江東無明鈔本無作何以二字敵此曰有千里蓴羹但未下鹽豉耳出世說羊曼晉羊曼為丹陽尹時朝士過江初拜官必飾供饌曼拜丹陽尹客來早者得佳設日晏即漸罄不復精珍隨客早晚不問貴賤有羊固者拜臨海太守備饌竟日皆精雖晚至者猶有盛饌論者以固之豐腆不如曼之真率也出晉書
