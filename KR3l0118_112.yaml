body:
  text: 史世光史世光晉史世光襄陽人咸和八年死於武昌七日沙門支法山轉小品疲而微臥聞靈座上如有人聲史家有婢字張信見世光在靈座著衣具如平日語信云我本應墮獄中支和尚為我轉經曇護曇堅迎我上第七梵天快樂處矣護堅並是山之沙彌已亡者也後支法山復往為轉大品又來在座世光生時以二幡供養時在寺中乃呼張信持幡送我信曰諾便絶死將信持幡俱西北飛上一青山如琉璃色到山頂望見天門世光乃自持幡遣信令還與一青香如巴豆曰以上支和尚信未還便遙見世光直入天門信復道而還倏忽乃活亦不復見手中香也幡亦在故寺中世光與信去時其家有六歲兒見之指語祖母曰阿爺飛上天婆為見否世光後復與天人十餘俱還其家徘徊而去每來必見簪帢去必露髻信問之答曰天上有冠不著此也後乃著此也後乃著五字據法苑珠林五補天冠與群天人鼓琴行歌徑上母堂信問何用屢來曰我來欲使汝輩知罪福也亦兼娛樂阿母琴音清妙不類凡聲家人悉聞之然其聲如隔壁障不得親察也唯信聞之獨分明焉有頃去信自送見世光入一黑門尋即出來謂信曰舅在此日見搒撻楚痛難勝省視還也舅坐犯殺罪故受此報可告舅母會僧轉經當稍免脫舅即輕輕字據明鈔本補車將軍出冥祥記董吉於潛人也奉法三世至吉尤精進恆齊戒誦首楞嚴經村中有病輒請吉誦經所救多愈同縣何晃亦奉法卒得山毒之病困困原作因據明鈔本改晃兄惶遽馳往請吉董何二舍相去六七十里復隔大溪五月中大雨晃兄初渡時水尚未至吉與期設中食後比往而山水暴漲不復可涉吉不能泅遲回嘆息良久吉既信直必欲赴期乃測然發心自誓曰吾救人苦急不計軀命冀如來大士當照乃誠便脫衣以囊經戴置頭上徑入水中量其深淺乃應至吉頸及渡才至膝耳既得上岸失囊經甚悲恨尋至晃家三禮懺悔流涕自責俯仰之間便見經囊在高座上吉悲喜取看浥浥如有濕氣開囊視經尚燥如故於是村人一時奉法吉家西北有山高險中多妖魅犯害居民吉以經戒之力欲降伏之於山際四五畝地手伐林木搆造小屋安設高座轉首楞嚴經百餘日寂然無妖民害稍止後有數人至與吉言語良久吉思惟非於潛人窮山幽絶何因而來疑是鬼神乃謂之曰諸君得無是此中鬼耶答曰是也聞君德行清肅故來相觀並請一事想必見聽吾世有此山遊居所託君既來止慮相犯冒恆懷不安今欲更作界分當殺樹為斷吉曰僕貪此寂靜讀誦經典不相干犯方喜為此願見祐助鬼答曰亦復憑君不侵克也言畢而去經宿所芟地四際之外樹皆枯死如焚焉出冥祥記宋吏國宋有一國與羅剎相近羅剎數入境食人無度王與羅剎約言自今已後國中人家各專一日當分送往忽復枉殺有奉佛家惟有一子始年十歲次當充行捨別之際父母哀號便至心念佛以佛威神力故大鬼不得近明日見子尚在歡喜同歸於茲遂絶國人賴焉出幽明録張元後周張元字孝始河北萬城人也年十六其祖喪明三載元懼憂泣晝夜經行以祈福祐復讀藥師經云盲者得視之言遂請七僧燃七層燈七晝夜轉讀藥師經每日行道祝曰元為孫不孝使祖喪明今以燈光並施法界乞祖目見明元求代暗如此辛勤至七日其夜夢有一翁以金篦療其祖目謂元曰勿憂悲也三日後祖目必瘥元於夢中喜踊驚覺乃遍告家人三日祖目果瘥出法苑珠林釋智興唐京師大莊嚴寺釋智興洛州人也勵行堅明依首律師誦經持律不輟昏曉至大業五年仲冬次當維那鳴鐘同寺僧名三果者有兄從煬帝南幸江都中路身亡初無凶告通夢於妻曰吾行達彭城不幸病死生無善行今墮地獄備經五苦賴今月初十日禪定寺僧智興鳴鐘發響聲振地獄同受苦者一時脫解今生樂處思報其恩汝可具絹十匹奉之並陳意殷勤及寤說之人無信者尋復夢如初後十餘日凶問與夢符同乃以絹奉興合寺大德至咸問興曰何緣鳴鐘乃感斯應興曰餘無他術見佛法藏傳云罽膩吒王受苦由鳴鐘得停及增一阿含經鳴鐘作福敬遵此事勵力行之嚴冬登樓風切皮肉露手鳴椎掌中破裂不以為苦鳴鐘之始先發善願諸賢聖同入道場同受法食願諸惡趣聞此鐘聲俱時離苦速得解脫如斯願行察志常奉修故致茲通感焉出異苑明鈔本作出高僧傳董雄唐董雄河南人貞觀中為太理丞幼奉佛法蔬食多年因非纍與同列李敬玄王欣俱維縶雄專念普門品日三十遍鎖忽夜解落雄驚告欣玄欣視其鎖堅全在地而鉤連不開相離數尺即告守者御史張守一宿直命吏燭之而甚怪重鎖封記而去雄但誦經不輟至五更又解落有聲雄復告欣玄等至明守一視之封題如故而鎖自相離敬玄素不信佛法其妻讀經常謂曰何為胡神所媚而讀此書耶及見雄此事乃深悟不信之咎方知佛大聖也時欣亦誦八菩薩名滿三萬遍晝鎖解落視之如雄無異不久俱免出法苑珠林孟知儉唐孟知儉并州人少時病忽亡見衙府如平生時不知其死逢故人為吏謂曰因何得來具報之乃知是冥途吏為檢尋曰君平生無修福處何以得還儉曰一生誦多心經及高王經雖不記數亦三四萬遍重檢獲之遂還吏問欲知官乎曰甚要遂以簿示之云孟知儉合運出身為曹州參軍轉鄧州司倉即掩卻不許看遂至荒榛入一黑坑遂活不知運是何事尋有敕募運糧因放選授曹州參軍乃悟曰此州吾不見小書耳滿授鄧州司倉去任又選唱晉州判司未過而卒出朝野僉載崔善沖先初任梓州桐山丞巂州刺史李知古奏充判官諸蠻叛殺知古善沖等二十餘人奔走擬投昆明夜不知道沖專念尊經俄見炬火在前衆便隨之至曉火滅乃達昆明出報應記唐晏梓州人持經日七遍唐開元初避事晉州安嶽縣與人有隙讒於使君劉肱肱令人捉晏夜夢一胡僧云急去驚起便走至遂州方義縣肱使奄至奔走無路遂一心念經捕者交橫並無見者由是獲免出報應記張御史張某唐天寶中為御史判官奉使淮南推覆將渡淮有黃衫人自後奔走來渡謂有急事特駐舟洎至乃云附載渡淮耳御船者欲驅擊之兼責讓何以欲濟而輒停留判官某云無擊反責所由云載一百姓渡淮亦何苦也親以餘食哺之其人甚愧恧既濟與某分路須臾至前驛已在門所某意是囑請心甚嫌之謂曰吾適渡汝何為復至可即遽去云己實非人欲與判官議事非左右所聞因屏左右云奉命取君合淮中溺死適承一饌固不忘已蒙厚恩只可一日停留耳某求還至舍有所遺囑鬼云一日之外不敢違也我雖為使然在地下職類人間里尹坊胥爾某欲前請救鬼云人鬼異路無宜相逼恐不免耳某遙拜鬼云能一日之內轉千卷續命經當得延壽言訖出去至門又回謂云識續命經否某初未了知鬼云即人間金剛經也某云今日已晚何由轉得千卷經鬼云但是人轉則可某乃大呼傳舍中及他百姓等數十人同轉至明日晚終千遍訖鬼又至云判官已免會須暫謁地府衆人皆見黃衫吏與某相隨出門既見王具言千遍續命經足得延壽命取檢云與所誦實同因合掌云若爾尤當更得十載壽便放重生至門前所追吏云坐追判官遲回今已遇捶乃袒示之願乞少錢某云我貧士且在逆旅多恐不辦鬼云唯二百千某云若是紙錢當奉五百貫鬼云感君厚意但我德素薄何由受汝許錢二百千正可某云今我亦鬼耳夜還逆旅未易辦得鬼云判官但心念令妻子還我自當得之某遂心念甚至鬼云已領訖須臾復至云夫人欲與阿嬭不肯又令某心念阿嬭須臾曰得矣某因冥然如落深坑因此遂活求假還家具說其事妻云是夕夢君已死求二百千紙錢欲便市造阿嬭故云夢中事何足信其夕阿嬭又夢因得十年後卒也出廣異記李昕唐李昕者善持千手千眼咒有人患瘧鬼昕乃咒之其鬼見形謂人曰我本欲大困辱君為懼李十四郎不敢復往十四郎即昕也昕家在東郡客遊河南其妹染疾死數日蘇說云初被數人領入墳墓間復有數十人欲相凌辱其中一人忽云此李十四郎妹也汝輩欲何之今李十四郎已還不久至舍彼善人也如聞吾等取其妹必以神咒相困辱不如早送還之乃相與送女至舍女活後昕亦到舍也出廣異記牛騰唐牛騰字思遠唐朝散大夫郟城令棄官從好精心釋教從其志者終身常慕陶潛五柳先生之號故自稱布衣公子即侍中中書令河東侯炎之甥也侯姓裴氏未弱冠明經擢第再選右衛騎曹參軍公子沉靜寡言少挺異操河東侯器其賢朝廷政事皆訪之公子清儉自守德業過人故王勃等四人皆出其門下年壯而河東侯遇害公子謫為牂牁建安丞將行時中丞崔察用事貶官皆辭之素有嫌者或留之誅殛甚衆時天后方任酷吏而崔察先與河東侯不協陷之公子將見崔察懼不知所為忽衢中遇一人形甚瑰偉黃衣盛服乃問公子欲過中丞得無懼死乎公子驚曰然又曰公有犀角刀子乎曰有異人曰公有刀子甚善授公以神咒見中丞時但俯伏掐訣言帶犀角刀子掐手訣乃可以誦咒其訣左手中指第三節橫文以大指爪掐之而密誦咒七遍當有所見可以無患矣咒曰吉中吉迦戍律提中有律阤阿婆迦呵公子俯而誦之既得仰視異人亡矣大異之即見察同過三十餘人公子名當二十前十九人各呼名過素有郤察則留處絞斬者且半焉次至公子如其言誦咒察久不言仰視之見一神人長丈餘儀質非常出自西階直至察前右拉其肩左捩其首面正當背而諸人但見崔察低頭不言手注定字而已公子遂得脫比至屏回顧見神人釋察而亡矣公子至牂牁素秉誠信篤敬佛道雖已婚宦如戒僧焉口不妄談目不妄視言無僞行無頗以是夷獠漸漬其化遂大布釋教於牂牁中常攝郡長吏置道場數處居三年而莊州獠反轉入牂牁郡人背殺長吏以應之建安大豪起兵相應乃劫公子坐於樹下將加戮焉忽有夷人持刀斬守者頭乃詈曰縣丞至惠汝何忍害若人因置公子於籠中令力者負而走於是兼以孥免事解後郡以狀聞詔書還公事許其還歸後宰數邑皆計日受俸其清無以加亦天性也後棄官精內教甚有感焉出紀聞李元平唐李元平故睦州刺史伯誠之子大曆五年客於東陽寺中讀書歲餘薄暮見一女子紅裙繡襦容色美麗娥冶自若領數青衣來入僧院元平悅之而窺見青衣問其所適及姓氏青衣怒曰誰家兒郎遽此相逼俱為士類不合形跡也元平拜求請見不許須臾女自出院四顧忽見元平有如舊識元平非意所望延入問其行李女曰亦欲見君以論宿昔之事請君無疑嫌也既相悅經七日女曰我非人頃者大人曾任江州刺史君前身為門吏長直君雖貧賤而容色可悅我是一小女子獨處幽房時不自思量與君戲調蓋因緣之故有此私情才過十旬君隨物故余雖不哭殆不勝情便潛以朱筆塗君左股將以為志常持千眼千手咒每焚香發願各生富貴之家相慕願為夫婦請君驗之元平乃自視實如其言及曉將別謂元平曰託生時至不可久留後身之父見任刺史我年十六君即為縣令此時正當與君為夫婦未間幸存思戀慎勿婚也然天命已定君雖別娶故不可得悲泣而去他年果為夫婦出異物志長沙人唐長沙人姓吳征蠻卒夫也平生以捕獵漁釣為業常得白龜羹而食之乃遍身患瘡悉皆潰爛痛苦號叫斯須不可忍眉鬢手足指皆墮落未即死遂乞於安南市中有僧見而哀之謂曰爾可回心念大悲真言吾當口授若能精進必獲善報卒依其言受之一心念誦後瘡痍漸復手足指皆生以至平愈遂削髮為僧號智益於伏波將軍舊宅基建立精舍住持泉州開元寺通慧大德楚彤親識智益常語之出報應録乾符僧唐乾符中有僧忘其名號恆以課誦為業未常暫廢因下峽泊舟白帝城夜深群動息持念之際忽覺有腥穢之氣見水面有一人漸逼船來僧問之曰某非人也姓許名道坤唐初為夔牧以貪殘暴虐歿受業報為灩預堆龍王三千年於今二百四十年矣適聞師持課大有利益故來遜謝耳僧問曰峽路險惡多覆溺之患盍敕諸龍而禁戢之可乎曰此類實煩皆業感所作非常力而能制也僧甚異之將復問忽失所在出報應録
