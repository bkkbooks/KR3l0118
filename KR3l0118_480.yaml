body:
  text: 四方蠻夷四方蠻夷東方之人鼻大竅通于目筋力屬焉南方之人口大竅通于耳西方之人面大竅通于鼻北方之人竅通于陰短中央之人竅通于口無啓民無啓民居穴食土其人死埋之其心不朽百年化為人録民膝不朽埋之百二十年化為人細民肝不朽八年化為人帝女子澤帝女子澤性妒有從婢散逐四山無所依托東偶狐狸生子曰殃南交猴有子曰溪北通玃猳所育為傖毛人八荒之中有毛人焉長七八尺皆如人形身及頭上皆有毛如獼猴毛長尺余短犛甡見人則目開口吐舌上唇覆面下唇覆胸喜食人舌鼻牽引共戲不與即去名曰髯公俗曰髯麗一名髯狎小兒髯可畏也軒轅國軒轅之國在窮山之際其不壽者八百歲諸天之野和鸞鳥舞民食鳳卵飲甘露白民國白民之國有乘黃狀若狐背上有角乘之壽三千年歐絲歐絲之野女子乃跪據樹歐絲輆沐國越東有輆沐之國其長子生則解而食之謂之宜弟父死則負其母而棄之言鬼妻不可與共居楚之南炎人之國其親戚死刳其肉而棄之然后埋其骨乃成孝子也秦之西有義渠之國其親戚死聚柴而焚之薰其煙上謂之登煙霞然后成為孝此上以為政下以為俗而未足為非也見墨子泥雜國成王即位三年有泥雜之國來朝其人稱自發其國常從云里而行聞雷震之擊在下或入潛穴又聞波瀾之聲在上或泛巨水視日月以知方面所向計寒暑以知年月考以中國正朔則序歷相符王接以外賓之禮也然丘成王六年然丘之國獻比翅鳥雌雄各一以玉為樊其國使者皆拳頭奓鼻衣云霞之布如今霞布也經歷百餘國方至京師越鐵屼泛沸海有蛇州蜂岑鐵屼峭厲車輪各金剛為輞比至京師皆訛説幾盡沸海皆涌起如剪魚也魚鱉皮骨堅強如石可以為鎧泛沸海之時以銅薄舟底龍蛇蛟不得近也經蛇州度則豹皮為屋于屋內推車經蜂岑燃胡蘇之木末以此木煙能殺百蟲經途五十余年乃至洛邑成王封太山禪社首使發其國之時人并童稚乃至京師鬢發皆白及還至然丘容貌還復壯比翼鳥多力狀似鵠銜南海之丹泥巢昆岑之玄木而至其中遇聖則來翔集以表周公輔聖之神力也盧扶國燕昭王時來朝渡玉河萬里方至其國國無惡禽獸水不揚波風不折枝人皆壽三百歲結草為衣是謂之卉服至死不老咸和孝讓壽登百歲已上拜敬如至親之禮葬于野外以香木靈草翳掩于尸閭里吊送號泣之聲動于林谷溪原為之止流春木為之改色居喪水漿不入口至死者骨為埃塵然后乃食昔大禹隨山導川乃表其地為無老純孝之國浮折國元封元年浮折歲貢蘭金之泥此金湯淵盛夏之時水常沸涌有若湯火飛鳥不能過國人行者常見水邊有人冶此金為器混若泥如紫磨之色百鑄其色變白有光如銀名曰銀燭常以為泥封諸函匣及諸宮門鬼魅不敢干當漢世上將出征及使絶國多以泥為印封衛青張騫蘇武傅介子之使皆受金泥之璽封也帝崩后乃絶頻斯魏帝為陳留王之歲有頻斯國人來朝以五色玉為衣如今之鎧不食中國滋味自有金壺中有神漿凝如脂嘗一滴則壽千年其國有大風木為林高六七十里善算者以里計之雷電常出樹之半其枝交陰上蔽不見日月之光其下平淨掃灑雨霧不能入焉樹東有大石室可容萬人坐壁上刻有三皇之像天皇十二頭地皇十一頭人皇九頭皆龍身亦有膏燭之處緝石為床床上有膝痕二三寸床前有竹簡長二寸如大篆之文皆言開辟已來事人莫能識言是伏羲畫卦之時有此書或言蒼頡造書之處旁有丹石井非人工所鑿下及漏泉水常沸涌諸仙欲飲之時以長綆引汲頻斯國民皆多力卷發不食五谷月中無影食桂漿其人發引之則長置則自縮如螺續此人發以為繩以及丹井方冬得升合之水水中有白蛙兩翅常去來井上征者食之至周王子晉臨井而窺有青雀吐杓以授子晉取而飲之乃有云起雪飛子晉以衣袖撝雪則云霽雪止白蛙化為白雁入云搖搖遂滅此則頻斯人所記蓋其人年不可測也使圖其山川地勢瑰異之屬以示張華華云此神異之國難可驗信使車馬珍服送之出關吳明國貞元八年吳明國貢常燃鼎鸞蜂蠻云其國去東海數萬里經揖婁沃沮等國其土宜五谷多珍玉禮樂仁義無剽劫人壽二百歲俗尚神仙術一歲之內乘云駕鶴者往往有之常望黃氣如車蓋知中國土德王遂願貢奉常燃鼎量容三斗光潔似玉其色紫每修飲饌不熾火而俄頃自熟香潔異于常等久而食之令人返老為少百疾不生也鸞蜂蜜云其蜂之聲有如鸞鳳而身被五彩大者可重十余斤為窠于深岩峻嶺間大者占地二三畝國人采其蜜不逾三二合如過度即有風雷之異若螫人生瘡以石上菖蒲根傅之即愈其色碧貯之于白玉碗表里瑩徹如碧琉璃久食令人長壽顏如童子發白者應時而黑逮及沉痾眇跛無不療焉女蠻國大中初女蠻國貢雙龍犀有二龍鱗鬣爪角悉備明霞錦云煉水香麻以為色光渾映耀芬馥著人五色相間而美于中華錦其國人危髻金冠纓絡被體故謂之菩薩蠻當時倡優遂制菩薩蠻曲文士亦往往聲其詞更女王國貢龍油綾魚油錦文采多異入水不濡云有龍油魚油也優者更作女王國曲音調宛暢傳于樂部矣都播都播國鐵勒之別種也分為三部自相統攝其俗結草為廬無牛羊不知耕稼多百合取以為糧衣貂鹿之皮貧者亦緝鳥羽為服國無刑罰偷盜者倍征其贓骨利骨利國居回紇北方瀚海之北勝兵四千地出名馬晝長夜短天色正曛煮一羊胛才熟東方已曙蓋近日入之所也突厥突厥事祆神無祠廟刻氈為形盛于毛袋行動之處以脂蘇塗或系之竿上四時祀之堅昆部落非狼種其先所生之窟在曲漫山北自謂上代有神與牸牛交于此窟其人發黃目緑赤髭髯其髭髯俱黑者漢將李陵及兵衆之后也西屠俗染齒令黑又突厥之先曰射摩舍利海有神在阿史得蜜西射摩有神異海神女每日暮以白鹿迎射摩入海至明送出經數十年后部落將大獵至夜中海神謂射摩曰明日獵時爾上代所生之窟當有金角白鹿出爾若射中此鹿畢形與吾來往或射不中即緣絶矣至明入圍果所生窟中有白鹿金角起射摩遣其左右固其圍將跳出圍遂殺之射摩怒遂手斬阿唲首領仍誓之曰自此之后須以人祭天常取阿唲即取部落子孫斬之以祭也至今突厥以人祭纛部落用之射摩既斬阿唲至暮還海神女執射摩曰爾手斬人血氣腥穢因緣絶矣吐蕃唐貞元中王師大破吐蕃于青海臨陳殺吐蕃大兵馬使乞藏遮遮及諸者或云是尚結贊男女吐蕃乃收尸歸營有百餘人行哭隨尸威儀絶異使一人立尸旁代語使一人問瘡痛乎代語者曰痛即膏藥塗之又問曰食乎代者曰食即為具食又問曰衣乎代者曰衣即命裘衣之又問歸乎代者曰歸即具輿馬載尸而去譯語者傳也若此異禮必其國之貴臣也西北荒西北荒中有玉饋之酒酒泉注焉廣一丈深三丈酒美如肉清澄如鏡有玉樽玉籩取一樽復生焉與天同休無干時石邊有脯焉味如獐脯飲此酒人不生死此井間人與天同生雖男女不夫婦故言不生死鶴民西北海戌亥之地有鶴民國人長三寸日行千里而步疾如飛每為海鶴所吞其人亦有君子小人如君子性能機巧每為鶴患常刻木為己狀或數百聚于荒野水際以為小人吞之而有患凡百千度后見真者過去亦不能食人多在山澗溪岸之旁穿穴為國或三十步五十步為一國如此不啻千萬春夏則食路草實秋冬食草根值暑則裸形遇寒則編細草為衣亦解服氣又一説四海之外有鵠國焉男女皆長七寸為人自然有禮好經諭跪拜其人皆壽三百歲行千里百物不敢犯之雖畏海鶴陳章與齊桓公言鵠遇吞之亦壽三百歲此人鵠中不死而鵠亦一舉千里陳章與齊桓公所言小人也契丹盧文進幽州人也至南封范陽王嘗云陷契丹中屢又絶塞射獵以給軍食正晝方獵忽天色晦黑衆星粲然衆皆懼捕得蕃人問之至所謂苴卻日也此地以為常尋當復矣頃之乃明日猶午也又云常于無定河見人胸骨一條大如柱長可七尺云沃沮毋丘儉遣王傾追高麗王官盡沃沮東東界問其耆老海東有人不耆老言國人嘗乘船捕魚遭風見吹數十日東得一島上有人言語不相曉其俗嘗以七月取童女沉海又言有一國亦在海中純女無男又説得一布衣從海中浮出其身如中人衣其兩袖長二丈又得一破船隨浪出在海岸邊有一人項中復有面生得之與語不相通不食而死其地皆在沃沮東大海中僬僥李章武有人臘三寸余頭髀肋成就眉目分明言是僬僥國人
