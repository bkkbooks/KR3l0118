body:
  text: 子韋子韋宋景公之史當景公之世有善星文者許以上大夫位處於層樓延閣之上以望氣象設以珍食施以珍衣食則有渠餐之鳧煎以桂醴叢庭之鷃承以蜜渠淇漳之醴拾遺記三醴作鱧脯以青茄九江之珠穟爨以蘭蘇華清夏結鹿以纖縞華清井水之澄華也饔人視時而扣鐘伺食而擊磬言每食輒擊鐘磬也懸四時之衣春夏以金玉為飾秋冬以翡翠為溫燒異香于壇臺之上忽有野人被草笈扣關而進曰聞君愛陰陽五行玄象經緯之祕請見景公延之崇堂語則及未來之兆次及已往之事萬不失一夜則觀星望氣晝則執算披圖不服寶衣不甘奇食景公謝曰今宋國喪亂微君何以輔之野人曰德之不均亂將及矣修德以乘仁則天應之祥人仰其化景公服其言賜姓曰子氏名之曰韋也錄曰宋子韋世司天部妙觀星律抑亦梓慎裨竈之徒也景公待之若神禮以上列服以絕世之衣膳以殊方之味雖復三清天廚之旨華蕤龍袞之服斯固為陋矣春秋生以賜姓亦緣事顯族乃號為司星氏至國之末著陰陽之書其事出班固藝文志也出王子年拾遺記趙廓武昌趙廓齊人也學道於吳永石公三年廓求歸公曰子道未備安可歸哉乃遣之及齊行極方止息同息吏以為法犯者將收之廓走百餘步變為青鹿吏逐之遂走入曲巷中倦甚乃蹲憩之吏見而又逐之復變為白虎急奔見聚糞入其中變為鼠吏悟曰此人能變斯必是也遂取鼠縛之則廓形復焉遂以付獄法應棄市永石公聞之歎曰吾之咎也乃往見齊王曰吾聞大國有囚能變形者王乃召廓勒兵圍之廓按前化為鼠公從坐翻然為老鴟攫鼠而去遂飛入雲中出列仙傳樊英漢樊英善圖緯洞達幽微永太中見帝因向西南噀之詔問其故對曰成都今日火後蜀郡言火災正符其日又云時有雨從東北來故火不大為害英嘗忽被髮拔刀斫擊舍中妻怪問其故英曰郗生遇賊郗生者名巡是英弟子時遠行後還說於道中逢賊賴一被髮老人相救故得全免永建時殿上鐘自鳴帝甚憂之公卿莫能解乃問英英曰蜀岷山崩母崩子故鳴非聖朝災也尋奏蜀山崩出英別傳楊由後漢楊由善占候郡文學掾曾從人飲敕御者曰酒若三行便宜嚴駕既而趨去後主人舍忽有鬭相殺者或問何以先知之由曰向者社木上鳩鬭此鬭兵之象也其言多類此出後漢書介象吳介象字元則與吳王論膾何者最美象曰海中鯔魚為上請於殿前作方坎汲水滿之象垂綸於坎中食頃得鯔魚作膾出建康實錄郭璞晉陳述字嗣祖有美名為大將軍掾甚見愛重及亡郭璞往哭之甚哀乃呼曰嗣祖焉知非福俄而大將軍作亂如其言出世說新語庾詵齊新野庾詵少孤以讀書自業玄象算數皆所妙絕武獻公蕭頴胄疾篤謂詵曰推其曆數當無辜否答曰鎮星在襄陽荊州自少福明府歸終於亂代齊名伊霍足貴子孫有何恨哉公曰君得之矣但昏主狂虐人思堯舜恨不見清廓天下息馬華山也歔欷而終果如其言頴胄赤斧之子出談藪張子信齊瑯琊王儼殺和士開也武衛奚永洛與河內人張子信對坐忽有鵲鳴鬭于庭而墮焉子信曰鵲聲不善向夕若有風從西南來歷樹間拂堂角必有口舌事今夜若有人相召慎不得往子信既去果有風至儼使召永洛且云敕喚永洛欲赴其妻勸令勿出因稱馬墜折腰遂免於難出三國典略管輅魏管輅曾至郭恩家忽有飛鳩來止梁上鳴甚悲切輅云當有客從東來相探候攜豕及酒因有小故耳至晚一如其言恩令節酒慎燔既而射雞作食箭發從籬間誤中數歲女子流血驚怖出魏志籌禪師隋煬帝宴祕書少監諸葛頴於觀文殿帝分御杯以賜頴乃曰朕昔有籌禪師為之合諸藥總納一竹筒內取以帽簪插筒藥中七日乃拔取以對賓客飲酒盃至取簪以畫酒中斷飲一邊盡一邊尚滿以勸賓客觀者皆以為大聖稀有之事出大業拾遺李淳風唐太史李淳風校新曆太陽合朔當蝕既於占不吉太宗不悅曰日或不食卿將何以自處曰如有不蝕臣請死之及期帝候於庭謂淳風曰吾放汝與妻子別之對曰尚早刻日指影於壁至此則蝕如言而蝕不差毫髮太史與張率同侍帝更有暴風自南至李以為南五里當有哭者張以為有音樂左右馳馬觀之則遇送葬者有鼓吹又嘗奏曰北斗七星當化為人明日至西市飲酒宜令候取太宗從之乃使人往候有婆羅門僧七人入自金光門至西市酒肆登樓命取酒一石持椀飲之須臾酒盡復添一石使者登樓宣敕曰今請師等至宮胡僧相顧而笑曰必李淳風小兒言我也因謂曰待窮此酒與子偕行飲畢下樓使者先下回顧已失胡僧因奏聞太宗異焉初僧飲酒未入其直及收具於座下得錢二千出國史異纂及紀聞袁天綱唐則天之在褓襁也益州人袁天綱能相士彠令相妻楊氏天綱曰夫人當生貴子乃盡召其子相之謂元慶元爽曰可至刺史終亦屯否見韓國夫人曰此女大貴不利其夫則天時在懷抱衣男子衣服乳母抱至天綱舉目一視大驚曰龍睛鳳頸貴之極也若是女當為天下主出感定錄安祿山術士唐安祿山多置道術人謂術士曰我對天子亦無恐懼唯見李相則神機悚戰即李林甫術士曰公有陰兵五百人皆銅頭鐵額常在左右何得畏李相公又謂祿山曰吾安得見之祿山因表請宴宰相令術士於簾下窺之驚曰吾初見報相公來有雙鬟二青衣捧香爐先入僕射侍衛銅頭鐵額之類皆穿屋踰垣而走某亦不知其故當是仙官暫謫居人間也出逸史唐盛唐令李鵬遇遇原作通據北夢瑣言改桑道茂曰長官官原作安據明鈔本改只此一邑而已賢郎二人大者位極人臣次者殆於數鎮子孫百世後如其言長子石出入將相子孫二世及第至次子福歷七鎮終於使相凡八男三人及第至尚書給諫郡牧諸孫皆朱紫建中元年道茂請城奉天為王者居列象龜別內分六街德宗素神道茂言遂命京尹嚴郢發眾數千與六軍士雜往城之時屬盛夏而土功大起人不知其故至播遷都彼乃驗朱泚之亂德宗幸奉天時沿邊藩鎮皆已舉兵扈蹕泚自率兇渠直至城下有西明寺僧陷在賊中性甚機巧教造攻城雲梯高九十餘尺上施板屋樓櫓可以下瞰城中渾瑊李晟奏曰賊鋒既盛雲梯甚壯若縱近城恐不能禦及其尚遠請以銳兵挫之遂率王師五千列陣而出于時束蘊居後約戰酣而燎風勢不便火莫能舉二公酹酒祝詞曰賊泚包藏禍心竊弄凶德敢以狂孽來犯乘輿今擁眾脅君將逼城壘某等誓輸忠節志殄妖氛若社稷再安威靈未泯當使雲梯就爇逆黨冰銷於是詞情慷慨人百其勇俄而風勢遽廻鼓噪而進火烈風猛煙埃漲天梯燼賊奔德宗御城樓以觀中外咸稱萬歲及克京國二公勳績為首寵錫茅土匡扶社稷終始一致李西平有子四人皆分節制忠崇榮顯初晟於左賁効職久未遷超聞桑道茂善相絹一匹凌晨而往時傾信者甚眾造詣多不即見之聞李在門親自迎接施設殽醴情意甚專既而謂曰他日建立勳庸貴甚無比或事權在手當以性命為託李莫測其言但慚唯而已請回所貺縑換李公身上汗衫仍請於衿上書名云他日見此相憶及泚叛道茂陷賊庭既克京師從亂者悉皆就戮時李受命斬決道茂將欲就刑請致詞遂以汗衫為請李公奏以非罪特原之司徒杜佑曾為楊炎判官故盧𣏌見忌欲出之杜見道茂曰年內出官則福壽無疆既而自某官九十餘日出為某官官名遺忘福壽果然出劇談錄鄉校叟唐宰相竇易直初名祕家貧就鄉校授業而叟有道術人不之知一日向暮風雪暴至學徒歸不得宿于漏屋下寒爭附火惟竇寢于側夜分叟自扶竇起曰竇祕君後為人臣貴壽之机勉勵自愛也及德宗幸奉天方舉進士亦隨駕而西乘蹇驢至開遠人稠路隘城扉將闔公懼勢不可進忽一人叱驢兼捶其後得疾馳而出顧見二黑衣卒呼曰秀才已後莫忘閭情及升朝訪得其子提挈于吏中甚達出因話錄相骨人唐貞元末有相骨山人瞽雙目人求相以手捫之必知貴賤房次卿方勇於趨進率先訪之及出戶時後謁者盈巷覩次卿已出迎問之曰如何答曰不足言不足言且道箇瘦長杜秀才位極人臣何必更云或有退者後杜循果帶相印鎮西蜀也出嘉語錄田良逸蔣含弘唐元和初南嶽道士田良逸蔣含弘皆道業絕高遠近欽敬時號田蔣君以虛無為心和煦待物不事浮飾而天格清峻人見者褊恡盡去侍郎呂渭楊憑相繼廉問湖南皆北面師事潭州大旱祈雨不獲或請邀致楊曰田先生豈為人祈雨者耶不得已迎之先生蓬首弊服欣然就車到郡亦終無言即日雨降所居岳觀建黃籙壇場法具已陳列而天陰晦弟子請祈晴田亦無言岸幘垂髮而坐及行齋左右代整冠履扶升壇天即開霽常有村姥持碧綃襦以奉對眾便服之坐者竊笑不以介意楊常迎至潭州田方跣足使至乘小舟便行侍者以履襪追及於衙門即坐階砌著襪傍若無人楊再拜亦不止之時喜飲酒而言不及吉凶是非及楊自京尹謫臨賀尉使候田遺銀器受之便悉付門人作法會使還曰報汝阿郎勿深憂也未幾量移杭州長史未嘗干人人至亦不逆性不多記人官位姓第與呂渭分最深後郎中呂溫刺衡州因來謁之左右先告以使君是侍郎之子及溫入下床拊其背曰你是呂渭兒子耶溫泫然降階田亦不止其真朴如此母為喜王寺尼尼眾皆呼先生為師常日負薪兩束奉母或有故不及往即弟子代送之或傳寺尼早起見一虎在田媼門外走因以告媼曰止應是小師使送柴來不足畏也蔣君混元之器雖不及田而修持趣尚亦相類兄事於田號為莫逆蔣始善符術自晦其道人莫之知後居九真觀曾命弟子至縣市齋物不及期還詰其故云於山口見一巨獸當路良久不去以故遲滯蔣曰我在此庇伊已多時何敢如是即以一符置所見處明日獸踣符下蔣聞之曰我本以符却之使其不來豈知不能自脫既以害物安用術為取符本焚之自此絕不復留意有歐陽平者行業亦高又兄事蔣於田君即鄰入室平一夕夢三金爐自天而下若有所召既寤譖告人曰二先生不久去矣我繼之俄而田蛻去蔣次之平亦逝逝原作遊據因話錄四改桐柏山陳寡言徐靈府馮雲翼三人皆田之弟子衡山周混沌蔣之門人陳徐在東南品第比田蔣而馮在歐陽之列周自幼入道利因話錄四利作科法清嚴今為南嶽首冠出因話錄
