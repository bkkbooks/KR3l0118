body:
  text: 廉儉陸績吳陸績為鬱林郡守罷秩泛海而歸不載寶貨舟輕用巨石重之人號鬱林石出傳載齊明帝齊明帝嘗飲食捉竹筯謂衛尉應昭光曰卿解我用竹筯意否答曰昔夏禹衣惡往誥流言象筯豢腴先先原作告據明鈔本改哲垂誡今睿情沖素還風反古太平之迹唯竹筯而已出談藪甄彬齊有甄彬者有器業嘗以一束苧於荊州長沙西庫質錢後贖苧於束中得金五兩以手巾裹之彬得金送還西庫道人大驚曰近有人以金質錢時忽遽不記録檀越乃能見歸恐古今未之有也輒以金之半仰酬往復十餘堅然不受因詠曰五月披羊裘負薪豈拾遺者也彬後為郫令將行辭太祖時同列五人上誡以廉慎至於彬獨曰卿昔有還金之美故不復以此誡也出談藪高允後魏高允字伯恭燕太尉中郎韜之子早有奇度博通經史神𢉻𢉻原作嘉據明鈔本改中與范陽盧玄趙郡李靈博陵崔鑒等以賢俊之胄同被詔徵拜中書侍郎領著作與崔浩同撰書及浩遇害以允忠直不苟特見原宥性清儉雖纍居顯貴而志同貧賤高宗幸其宅唯草屋數間布被縕袍廚中鹽菜而已帝嘆息曰古之清貧豈有此乎賜之粟帛出談藪崔光後魏自太和遷都之後國家殷富庫藏盈溢錢絹露積於廊廡間不可校數太后賜百姓負絹任意自量朝臣莫不稱力而去唯章武王融與陳留侯李崇負絹過任蹶倒傷踝太后即不與之令其空出時人笑焉侍中崔光止取兩匹太后問曰侍中何少對曰臣有兩手唯堪兩匹所獲多矣朝貴服其清廉出洛陽伽藍記長孫道生司空上黨王長孫道生代人性忠謹儉素雖為三公而居處卑陋出鎮之後子頗加修葺及還歎曰吾為宰相無以報國負乘是懼昔霍去病以胸奴未滅無用宅為今強寇尚遊魂漠北吾豈可安坐華美乎乃令毀之時人比之晏嬰焉出談藪唐玄宗肅宗為太子時常侍膳尚食置熟俎有羊臂臑上顧使太子割肅宗既割餘污漫在手以餅潔之上熟視不懌肅宗舉餅啖之上甚悅謂太子曰福當如是愛惜出柳氏史肅宗韓擇木奏賀肅宗節儉妓樂無綺繡之飾飲食無珍羞之具上因出衣袖以示之曰朕此三浣矣出談氏史盧懷慎唐盧懷慎清慎貞素不營資産器用屋室皆極儉陋既貴妻拏不免飢寒而於故人親戚散施甚厚為黃門侍郎在東都掌選事奉身之具才一布囊耳後為黃門監兼吏部尚書臥病既久宋璟盧從願常相與訪焉懷慎臥於弊簀單席門無簾箔每風雨至則以席蔽焉常器重璟及從願見之甚喜留連永日命設食有蒸豆兩甌菜數莖而已此外翛然無辦因持二人手謂曰二公當出入為藩輔聖上求理甚切然享國歲久近者稍倦於勤當有小人乘此而進君其志之不數日而終疾既篤因手疏薦宋璟盧從願李傑李朝隱上覽其表益加悼惜既歿家無留儲唯蒼頭自鬻以給喪事上因校獵於城南望墟落間環堵卑陋其家若有所營因馳使問焉還白懷慎大祥方設齋會上因為罷獵憫其貧匱即以縑帛贈之出明皇雜録又云盧懷慎無疾暴卒夫人崔氏止其兒女號哭曰公命未盡我得知之公清儉而潔廉蹇進而謙退四方賂遺毫髮不留與張説同時為相今納貨山積其人尚在而奢儉之報豈虛也哉及宵分公復生左右以夫人之言啓陳懷慎曰理固不同冥司有三十爐日夕為説鼓鑄橫財我無一焉惡可並哉言訖復絶出獨異志李勉天寶中有書生旅次宋州時李勉少年貧苦與一書生同店而不旬日書生疾作遂至不救不救二字原無據明鈔本補臨絶語勉曰某家住洪州將於北都求官於此得疾且死其命也因出囊金百兩遺勉曰某之僕使無知有此者足下為我畢死事餘金奉之勉許為辦事餘金乃密置於墓中而同葬焉後數年勉尉開封書生兄弟齎洪牒來而纍路尋生行止至宋州知李為主喪事專詣開封詰金之所勉請假至墓所出金付焉出尚書談録杜黃裳李師古跋扈憚杜黃裳為相未敢失禮乃命一幹吏寄錢數千繩并氈車子一乘亦近直千緡使者未敢遽送乃於宅門伺候纍日有緑輿自宅出從婢二人皆青衣襤褸問何人曰相公夫人使者遽歸以白師古師古乃折其謀終身不敢失節出幽間鼓吹陽城陽道州城未嘗有蓄積唯所服用不可闕者客稱某物可佳可愛陽輒喜舉而授之有陳萇者候其出始請月俸明鈔本無始字韓愈順宗實録四無出字常往稱其錢帛之美月有獲焉出傳載城之為朝士也家苦貪常以木枕布衾質錢數萬人爭取之出傳載鄭餘慶清儉有重德一日忽召親朋官數人會食衆皆驚朝僚以故相望重皆凌晨詣之至日高餘慶方出間話移時諸人皆囂然餘慶呼左右曰處分廚家爛蒸去毛莫拗折項諸人相顧以為必蒸鵝鴨之類逡巡舁臺盤出醬醋亦極香新良久就餐每人前下粟米飯一碗蒸胡蘆一枚相國餐美諸人強進而罷出盧氏雜説鄭浣鄭浣以儉素自居尹河南日有從父昆弟之孫自覃懷來謁者力農自贍未嘗干謁拜揖甚野束帶亦古浣子之弟僕御皆笑其疏質而浣獨憐之問其所欲則曰某為本邑以民侍之久矣思得承乏一尉乃錦遊鄉里也浣然之而浣之清譽重德為時所歸或書於郡守猶臂之使指也鄭孫將去前一日召甥姪與之會食有蒸餅鄭孫去其皮而後食之浣大嗟怒謂曰皮之與中何以異也僕嘗病澆態訛俗驕侈自奉思得以還淳反朴敦厚風俗是猶憐子力田弊衣必能知艱於稼穡奈何囂浮甚於五侯家綺紈乳臭兒耶因引手請所棄者鄭孫錯愕失據器而奉之浣盡食之遂揖歸賓闥贈五縑而遣之出闕史文宗文宗命中使宣兩軍中尉及諸司使內官等不許著紗穀綾羅巾其後駙馬韋處仁見巾夾羅巾以進上曰本慕卿門戶清素故俯從選尚如此巾服從他諸戚為之卿不須為也出盧氏雜説夏侯孜夏侯孜為左拾遺嘗著緑桂管布衫朝謁開成中文宗無忌諱好文問孜衫何太粗澀具以桂布為對此布厚可以欺寒他日上問宰臣朕察拾遺夏侯孜必貞介之士宰臣具以密行今之顏冉上嗟嘆久之亦效著桂管布滿朝皆仿效之此布為之貴也出芝田録裴坦楊收段文昌皆以孤進貴為宰相率愛奢侈楊收女適裴坦長子資裝豐厚什器多用金銀而坦尚儉聞之不樂一日與其妻及兒女宴飲臺上用楪盛果實坦欣然既視其器內有以犀為飾者坦盛怒遽推倒茶臺拂袖而出乃曰破我家也他日收果以納賂竟至不令宜哉出北夢瑣言溫璉幽州從事溫璉燕人也以儒學著稱與瀛王馮道幼相善曾經兵亂有賣漆燈椸於市者璉以為鐵也遂數錢買之纍日家人用然膏燭因拂試乃知銀也大小觀之靡不欣喜唯璉憫然曰非義之物安可寶之遂訪其賣主而還之彼曰某自不識珍奇鬻於街肆郎中厚加酬直非強買也不敢復收璉固還之乃拜受而去別賣四五萬將其半以謝之璉終不納遂施於僧寺用飾佛像冀祝璉之壽也當時遠近罔不推腹以其有仁人之行後官至尚書侍郎卒出劉氏耳目記仲庭預舊蜀嘉王召一經業孝廉仲庭預令教授諸子庭預雖通墳典常厄飢寒至門下亦未甚禮時方凝寒正以舊火爐送學院庭預方獨坐太息以筯撥灰俄灰中得一雙金火筯遽求謁見王王曰貧窮之士見吾必有所求命告庭預曰見為製衣庭預白曰非斯意嘉王素樂神仙多採方術恐其別有所長勉強而見庭預遽出金火筯陳其本末王曰吾家失此物已十年吾子得之還以相示真有古人之風贈錢十萬衣一襲米麥三十石竟以賓介相遇禮待甚厚薦授榮州録事參軍出玉溪編事漢世老人漢世有人年老無子家富性儉嗇惡衣蔬食侵晨而起侵夜而息營理産業聚斂無厭而不敢自用或人從之求丐者不得已而入內取錢十自堂而出隨步輒減比至於外才餘半在閉目以授乞者尋復囑云我傾家贍君慎勿他説復相效而來老人俄死田宅沒官貨財充於內帑矣出笑林沈峻吳沈峻字叔山有名譽而性儉吝張溫使蜀與峻別峻入內良久出語溫曰向擇一端布欲以送卿而無粗者溫嘉其無隱又嘗經太湖岸上使從者取鹽水已而恨多敕令還減之尋以自愧曰此吾天性也又説曰姚彪與張溫俱至武昌遇吳興沈珩守風糧盡遣人從彪貸鹽一百斛彪性峻直得書不答方與溫談論良久呼左右倒百斛鹽著江中謂溫曰明吾不惜惜所與耳沈珩弟峻有名譽而性儉吝出笑林李崇後魏高陽王雍性奢豪嗜食味厚自奉養一食必以數萬錢為限海陸珍羞方丈於前陳留候李崇謂人曰高陽一食敵我千日崇為尚書令儀同三司亦富傾天下僮僕千人而性多儉吝惡衣粗食食常無肉止有韭茹韭菹崇家客李元祐語人云李令公一食十八種人問其故元祐曰二韭十八聞者大笑出洛陽伽藍記南陽人南陽有人為生奧博性殊儉吝冬至日女壻謁之乃設一銅瓶酒數臠獐肉壻恨其單率一舉盡之主人愕然俯仰命益如此者再退而責其女曰某郎好酒故汝常貧及其死後諸子爭財逐兄殺之出顏氏家訓夏侯處信唐夏侯處信為荊州長史有賓過之處信命僕作食僕附耳語曰溲幾許麵信曰兩人二升即可矣仆入久不出賓以事告去信遽呼僕僕曰已溲訖信鳴指曰大異事明鈔本異作費事下有也字良久乃曰可總燔作餅吾公退食之信又嘗以一小瓶貯醯一升自食家人不沾餘瀝僕云醋盡信取瓶合於掌上餘數滴因以口吸之凡市易必經手乃授直識者鄙之出朝野僉載柳慶廣州録事參軍柳慶獨居一室器用食物並致臥內奴有私取鹽一撮者慶鞭之見血出朝野僉載夏侯彪夏月食飲生蟲在下未曾歷口嘗送客出門奴盜食臠肉彪還覺之大怒乃捉蠅與食令嘔出之出朝野僉載鄭仁凱鄭仁凱為密州刺史有小奴告以履穿凱曰阿翁為汝經營鞋有頃門夫著新鞋者至凱廳前樹上有鴷啄木也窠遺門夫上樹取其子門夫脫鞋而緣之凱令奴著鞋而去門夫竟至徒跣凱有德色出朝野僉載鄧祐安南都護鄧祐韶州人家巨富奴婢千人恆課口腹自供未曾設客孫子將一鴨私用祐以擅破家資鞭二十出朝野僉載韋莊韋莊頗讀書數米而炊稱薪而爨炙少一臠而覺之一子八歲而卒妻斂以時服莊剝取以故席裹尸殯訖擎其席而歸其憶念也嗚咽不自勝唯慳吝耳出朝野僉載王叟天寶中相州王叟者家鄴城富有財唯夫與妻更無兒女積粟近至萬斛而夫妻儉嗇頗甚常食陳物才以充腸不求豐厚莊宅尤廣客二百餘戶叟嘗巡行客坊忽見一客方食盤餐豐盛叟問其業客云唯賣雜粉香藥而已叟疑其作賊問汝有幾財而衣食過豐也此人云唯有五千之本逐日食利但存其本不望其餘故衣食常得足耳叟遂大悟歸謂妻曰彼人小得其利便以充身可謂達理吾今積財巨萬而衣食陳敗又無子息將以遺誰遂發倉庫廣市珍好恣其食味不數日夫妻俱夢為人所録枷鎖禁繫鞭撻俱至云此人妄破軍糧覺後數年夫妻並卒官軍圍安慶緒於相州盡發其廩以供軍焉出原化記王鍔王鍔纍任大鎮財貨成積有舊客諭以積而能散之義後數日復見鍔鍔曰前所見戒誠如公言已大散矣客請問其名鍔曰諸男各與萬貫女壻各與千貫矣出國史補裴璩裴司徒璩性靳嗇廉問江西日凡什器圖障皆新其制間屋貯之未嘗施用每有宴會即於朝士家借之出北夢瑣言歸登歸登尚書性甚吝嗇常爛一羊脾旋割旋噉封其殘者一日登妻誤於封處割食登不見元封大怒其內由是沒身不食肉登每浴必屏左右或有自外窺之乃巨龜也出北夢瑣言
