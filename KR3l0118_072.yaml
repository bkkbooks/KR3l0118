body:
  text: 張山人張山人唐曹王貶衡州時有張山人技術之士王常出獵因得群鹿十餘頭圍已合計必擒獲無何失之不知其處召山人問之山人曰此是術者所隱遂索水以刀湯禁之少頃於水中見一道士長才及寸負囊拄杖敝敝而行衆人視之無不見者山人乃取布針就水中刺道士左足遂見跛足而行即告曰此人易追止十餘里遂命走向北逐之十餘里果見道士跛足而行與水中見者狀貌同遂以王命邀之道士笑而來山人曰不可責怒但以禮求請之道士至王問鹿何在曰鹿在矣向見諸鹿無故即死故哀之所以禁隱亦不敢放今在山側耳王遣左右視之諸鹿隱於小坡而不動王問其患足之由曰行數里忽患之王召山人與之相視乃舊識焉其足尋亦平復乃是郴州連山觀侯生即從容遣之未期有一客過郴州寄宿此觀縛馬於觀門糞污頗甚觀主見而責之客大怒詬罵道士而去未十日客忽遇張山人山人謂曰君方有大厄蓋有所犯觸客即説前日與道士爭罵之由山人曰此異人也為君致禍卻速往辭謝之增強走去不然不可脫也此為震厄君今夕所至當截一柏木長與身齊致所臥處以衣衾蓋之身別處一屋以棗木作釘子七枝釘地依北斗狀仍建辰位身居第二星下伏當免矣客大驚登時却回求得柏木來郴州宿于山館如言設法半夜忽大風雨雷電震于前屋須臾電光直入所止客伏於星下不敢動電入屋數四如有搜獲之狀不得而止比明前視柏木已為粉矣客益懼奔謝觀主哀求生命久而方解謂客曰人不可輕也毒蛇之輩尚能害人豈合無狀相仵乎今已捨子矣客首罪而去遂求張山人厚報之也出原化記王旻太和先生王旻得道者也常遊名山五嶽貌如三十餘人其父亦道成有姑亦得道道高於父旻常言姑年七百歲矣有人知其姑者常在衡嶽或往來天台羅浮貌如童嬰其行比陳夏姬唯以房中術致不死所在夫壻甚衆天寶初有薦旻者詔徵之至則于內道場安置學通內外長於佛教帝與貴妃楊氏旦夕禮謁拜於床下訪以道術旻隨事教之然大約在于修身儉約慈心為本以帝不好釋典旻每以釋教引之廣陳報應以開其志帝亦雅信之旻雖長于服餌而常飲酒不止其飲必小爵移晷乃盡一杯而與人言談隨機應對亦神者也人退皆得所未得其服飾隨四時變改或食鯽魚每飯稻米然不過多至蔥韭葷辛之物鹹酢非養生者未嘗食也好勸人食蘆蔔根葉云久食功多力甚養生之物也人有傳世世見之而貌皆如故蓋及千歲矣在京多年天寶六年南嶽道者李遐周恐其戀京不出乃宣言曰吾將為帝師授以祕籙帝因令所在求之七年冬而遐周至與旻相見請曰王生戀世樂不能出耶可以行矣于是勸旻令出旻乃請于高密牢山合煉玄宗許之因改牢山為輔唐山許旻居之旻嘗言張果天仙也在人間三千年矣薑撫地仙也壽九十三矣撫好殺生命以折己壽是仙家所忌此人終不能白日升天矣出紀聞陸生唐開元中有吳人陸生貢明經舉在京貧無僕從常早就識就識原作欲試據明鈔本改自駕其驢驢忽驚躍斷韁而走生追之出啓夏門直至終南山下見一徑登山甚熟此驢直上生隨之上五六里至一處甚平曠有人家門庭整肅生窺之見茅齋前有葡萄架其驢繫在樹下生遂叩門良久見一老人開門延生入顏色甚異頗修敬焉遂命生曰坐生求驢而歸主人曰郎君止為驢乎得至此幸會也某故取驢以召君君且少留當自悟矣又延客入宅見華堂邃宇林亭池沼蓋仙境也留一宿饋以珍味飲酒歡樂聲技皆仙者生心自驚駭未測其故明日將辭主人曰此實洞府以君有道吾是以相召指左右童隸數人曰此人本皆城市屠沽皆吾所教道成者能興雲致雨坐在立亡浮遊世間人不能識君當處此而壽與天地長久豈若人間浮榮蠱菌之輩子願之乎生拜謝曰敬授教老人曰授學師資之禮合獻一女度君無因而得今授君一術求之遂令取一青竹度如人長授之曰君持此入城城中朝官五品以上三品以下家人見之投竹于彼而取其女來但心存吾約無慮也然慎勿入權貴家力或能相制伏生遂持杖入城生不知公卿第宅已入數家皆無女而人亦無見其形者誤入戶部王侍郎宅復入閣正見一女臨鏡晨粧生投杖於床攜女而去比下階顧見竹已化作女形殭臥在床一家驚呼云小娘子卒亡生將女去會侍郎下朝時權要謁請盈街宅門重邃不得出隱於中門側王聞女亡入宅省視左右奔走不絶須臾公卿以下皆至門矣時葉天師在朝奔遣邀屈生隱於戶下半日矣少頃葉天師至診視之曰此非鬼魅乃道術者為之爾遂取水噴呪死女立變為竹又曰此亦不遠搜尚在遂持刀禁呪繞宅尋索果於門側得生生既被擒遂被枷鎖捶拷訊其妖狀生遂述其本情就南山同取老人遂令錮項領從人至山下往時小徑都已無矣所司益以為幻妄將領生歸生向山慟哭曰老人豈殺我耶舉頭望見一徑見老人杖策而下至山足府吏即欲前逼老人以杖畫地遂成一水闊丈餘生叩頭哀求老人曰吾去日語汝勿入權貴家故違我命患自掇也然亦不可不救爾從人驚視之次老人取水一口噀之黑霧數里白晝如暝人不相見食頃而散已失陸生所在而枷鎖委地山上小徑與水皆不見矣出原化記輔神通道士輔神通者家在蜀州幼而狐貧恆為人牧牛以自給神通牧所恆見一道士往來因爾致敬相識數載道士謂神通曰能為弟子否答曰甚快乃引神通入水中謂通曰我入之時汝宜隨之無憚為也既入使至其居所屋宇嚴潔有藥囊丹竈床下悉大還丹遂使神通看火兼教黃白之術經三年神通已年二十餘思憶人間會道士不在乃盜還丹別貯一處道士歸問其丹何在神通便推不見道士嘆息曰吾欲授汝道要汝今若是曷足授我雖備解諸法然無益長生也引至他道逐去便出神通甚悅崎嶇洞穴以藥自資七十餘日方至人間其後厭世事追思道士聞其往來在蜀州開元觀遂請配度隸名于是其後聞道士至往候後輒云已出如是數十度終不得見神通私以金百斤與房中奴令道士來可馳報奴得金後頻來報更不得見蜀州刺史奏神通曉黃白玄宗試之皆驗每先以土鍋煮水銀隨帝所請以少藥投之應手而變帝求得其術會祿山之亂乃止出廣異記孫甑生唐天寶中有孫甑生者深於道術玄宗召至京師甑生善輳石纍卵折草為人馬乘之東西馳走太真妃特樂其術數召入宮試之及祿山之亂不知所知出明皇雜録葉靜能唐汝陽王好飲終日不亂客有至者莫不留連旦夕時術士葉靜能常過焉王強之酒不可曰某有一生徒酒量可為王飲客矣然雖侏儒亦有過人者明日使謁王王試與之言也明旦有投刺曰道士常持蒲王引入長二尺既坐談胚渾至道次三皇五帝歷代興亡天時人事經傳子史歷歷如指諸掌焉王呿口不能對既而以王意未洽更咨話淺近諧戲之事王則歡然謂曰觀師風度亦常飲酒乎持蒲曰唯所命耳王即令左右行酒已數巡持蒲曰此不足為飲也請移大器中與王自挹而飲之量止則已不亦樂乎王又如其言命醇酹數石置大斛中以巨觥取而飲之王飲中醺然而持蒲固不擾風韻轉高良久忽謂王曰某止此一杯醉矣王曰觀師量殊未可足請更進之持蒲曰王不知度量有限乎何必見強乃復盡一杯忽倒視之則一大酒榼受五斗焉出河東記袁隱居貞元中有袁隱居者家於湘楚間善陰陽占訣歌一百二十章時故相國李公吉甫自尚書郎謫官東南一日隱居來謁公公久聞其名即延與語公命算己之祿仕隱居曰公之祿真將相也公之壽九十三矣李公曰吾之先未嘗有及七十者吾何敢望九十三乎隱居曰運算舉數乃九十三耳其後李公果相憲宗皇帝節制淮南再入相而薨年五十六時元和九年十月三日也校其年月日亦符九十三之數豈非懸解之妙乎隱居著陽陰占訣歌李公序其首出宣室志騾鞭客茅山黃尊師法籙甚高於茅山側修起天尊殿講説教化日有數千人時講筵初合忽有一人排闥叫呼相貌粗黑言辭鄙陋腰插騾鞭如隨商客騾馱者罵曰道士汝正熟睡邪聚衆作何物不向深山學修道還敢謾語邪黃尊師不測下講筵遜詞衆人悉懼不敢抵牾良久詞色稍和曰豈不是修一殿卻用幾錢曰要五千貫曰盡搬破甑釜及雜鐵來約八九百斤掘地為爐以火銷之探懷中取葫蘆瀉出兩丸藥以物攪之少頃去火已成上銀曰此合得萬餘貫修觀計用有餘講講原作攪據明鈔本改則所獲無多但罷之黃生與徒弟皆相謝問其所欲笑出門去不知所之後十餘年黃生奉詔赴京忽於長街西見插騾鞭者肩一幞子隨騎驢老人行全無茅山氣色黃生欲趨揖乃搖手指乘驢者復連叩頭黃生但遙榼禮而已老人髮白如絲顏若十四五女子也出逸史許君仙人許君君世之時嘗因修觀動用既畢欲刻石記之因得古碑文字刓缺不可復識因剗去舊文刊勒新記自是恍惚不安暇日徐步庭砌聞空中言曰許君許君速詣水官求救不然即有不測之釁許愕然異之又聞其事杳不復答乃焚香虔祀願示求救之由良久復語曰所刻碑舊文雖已磨沒而此時為文之人見詣水官相訟云奪我之名顯己之名由此水官將有執對之命速宜求之許君乃訝得舊文立石刊紀一夕夢神人相謝再顯名氏無以相報請作水陸大醮普告山水萬靈得三官舉名可以證道許君依教修之遂成道果自此水陸醮法傳於人間出録異記杜巫杜巫尚書年少未達時曾於長白山遇道士貽丹一丸即令服訖不欲食容色悅懌輕健無疾後任商州刺史自以既登太守班位已崇而不食恐驚於衆於是欲去其丹遇客無不問其法歲餘有道士至甚年少巫詢之道士教以食豬肉仍吃血巫從之食吃道士命挲羅須臾巫吐痰涎至多有一塊物如栗道士取之甚堅固道士剖之若新膠之未乾者丹在中道士取以洗之置於手中其色緑瑩巫曰將來吾自收之暮年服也道士不與曰長白吾師曰杜巫悔服吾丹今願出之汝可教之收藥歸也今我奉師之命欲去其神物今既去矣而又擬留至耄年縱收得亦不能用也自宜息心遂吞之而去巫後五十餘年罄産燒藥竟不成出玄怪録
