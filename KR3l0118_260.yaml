body:
  text: 公羊傳公羊傳有甲欲謁見邑宰問左右曰令何所好或語曰好公羊傳後入見令問君讀何書答曰唯業公羊傳試問誰殺陳他者甲良久對曰平生實不殺陳他令察謬誤因復戲之曰君不殺陳他請是誰殺於是太怖徒跣走出人問其故乃大語曰見明府便以死事見訪後直不敢復來遇赦當出耳出笑林李文禮唐李文禮頓丘人也好學有文華纍遷至揚州司馬而質性遲緩不甚精審時在揚州有吏自京還得長史家書云姊亡請擇日發之文禮忽聞姊亡乃大號慟吏伺其便復白曰是長史姊文禮久而徐問曰是長史姊耶吏曰是文禮曰我無姊向亦怪矣出御史臺記殷安唐逸士殷安冀州信都人謂薛黃門曰自古聖賢數不過五人伏羲八卦窮天地之旨一也乃屈一指神農植百穀濟萬人之命二也乃屈二指周公制禮作樂百代常行三也乃屈三指孔子前知無窮卻知無極拔乎其萃出乎其類四也乃屈四指自此之後無屈得指者良久乃曰並我五也遂屈五指而疏籍卿相男徵諫曰卿相尊重大人稍敬之安曰汝亦堪為宰相徵曰小子何敢安曰汝肥頭大面不識今古噇徒江切食無意智不作宰相而何其輕物也皆此類姓房人唐有姓房人好矜門地但有姓房為官必認云親屬知識疾其如此乃謂之曰豐邑公相豐邑坊在上都是凶肆出方相也是君何親曰是是下原有姓字據明鈔本刪某乙再從伯父人大笑曰君既是方相姪兒只堪嚇鬼出啓顏録元宗逵唐元宗逵為果州司馬有婢死處分直典云逵家老婢死驅使來久為覓一棺木殯之逵初到家貧不能買得新者但得一經用者充事即得亦不須道逵買云君家自有須直典出門說之一州以為口實出大唐新語獨孤守忠唐杭州參軍獨孤守忠領租船赴都夜半急追集船人更無他語乃曰逆風必不得張帆衆大哂焉出朝野僉載王熊唐王熊為澤州都督府法曹斷略糧賊惟各明鈔本惟各作准格決杖一百通判熊曰總略幾人法曹曰略七人熊曰略七人熊曰略七人五字據明鈔本補合決七百法曹曲斷府司科罪時人哂之前尹正義為都督公平後熊來替百姓歌曰前得尹佛子後得王癩獺判事驢咬瓜喚人牛嚼鐵見錢滿面喜無鏹從頭喝常逢餓夜叉百姓不可活出朝野僉載麴崇裕唐冀州參軍麴崇裕送司功入京詩曰崇裕有幸會得遇明流行司士向京去曠野哭聲哀司功曰大才士先生其誰曰吳兒博士教此聲韻司功曰師明弟子哲出朝野僉載梁士會唐滑州靈昌尉梁士會官科烏翎里正不送舉牒判曰官喚烏翎何物里正不送烏翎佐使曰公大好判烏翎太多會索筆曰官喚烏翎何物里正不送雁翅有識之士聞而笑之出朝野僉載張懷慶唐李義府嘗賦詩曰鏤月成歌扇裁雲作舞衣自憐回雪影好取洛川歸有棗彊尉張懷慶好偷名士文章乃為詩曰生情鏤月為歌扇出意裁雲作舞衣照鏡自憐回雪影來時好取洛川歸時人謂之語曰活剝王昌齡生吞郭正一出大唐新語康噇唐玄宗既用牛仙客為相頗憂時議不叶因訪於高力士用仙客相外議以為如何力士曰仙客出於胥吏非宰相器上大怒曰即當用康噇蓋上一時恚怒之詞舉其極不可者或有竊報噇以為上之於君恩渥頗深行當為相矣噇聞之以為信然翌日盛服趨朝既就列延頸北望冀有成命觀之者無不掩口然時論亦以長者目焉噇為將作大匠多巧思尤能知地嘗謂人曰我居是宅中不為宰相耶聞之者益為嗤笑今新昌里西北牛相第即噇宅也出明皇雜録徵君唐肅宗之代爭於賢良下詔搜山林草澤有懷才抱德及匡時霸國者皆可爵而任之有徵君自靈武衣草衣躡芒屩詣于國門肅宗聞之喜曰果有賢士應募矣遂召對訪時事得失卒無一辭但再三瞻望聖顏而奏曰微臣有所見陛下知之乎對曰不知奏曰臣見陛下聖顏瘦於在靈武時帝曰宵旰所勞以至於是侍臣有匿笑不禁者及退更無他言帝知其妄人也恐閉將來賢路僶俯除授一邑宰洎將寒食京兆司逐縣索杏仁以備貢奉聞之大為不可獨力抗之遂詣闕請對京兆司亦慎此徵君必有異見將奈之何及召對奏曰陛下要寒節杏仁今臣敲將來烏復進渾杏仁上咍而遣之竟不置其罪出玉堂閒話李佐唐李佐山東名族少時因安史之亂失其父後佐進士擢第有令名官為京兆少尹陰求其父有識者告後往迎之於鬻凶器家歸而奉養如是纍月一旦父召佐謂曰汝孝行絶世然吾三十年在此黨中昨從汝來未與流輩謝絶汝可具大豬五頭白醪數斛蒜齏數甕薄餅十拌開設中堂吾與群黨一酬申欸則無恨矣佐恭承其教數日乃具父散召兩市善薤歌者百人至初即列坐堂中久乃雜謳及暮皆醉衆扶佐父登榻而薤歌一聲凡百齊和俄然相扶父出不知所在行路觀者億萬明日佐棄家人入山數日而卒出獨異志元載常袞唐代宗以庶務畢委宰相而元載專政益亂國典非良金重寶趦趄左道不得出入於朝廷及常兗為相雖賄賂不行而介僻自專失於分別故升陟多失或同列進擬稍繁別謂之沓伯是時京師語曰常無分別元好錢賢者愚愚者賢崔祐甫素公直因衆中唱言朝廷上下相蒙善惡同致清曹峻府為鼠輩養資考豈裨皇化耶出杜陽雜編崔阡唐順宗在東宮韋渠薦崔阡拜諭德為侍書阡觸事面牆對東宮曰臣山野鄙人不識朝典見陛下合稱臣否東宮曰卿是宮僚自合知也出嘉話録黎幹唐代宗朝京兆尹黎幹以久旱祈雨於朱雀門街造土龍悉召城中巫覡舞于龍所幹與巫覡更舞觀者駭笑彌月不雨又請禱于文宣王廟上聞之曰丘之禱久矣命毀土龍罷祈雨減膳節用以聽天命及是甘澤乃足出盧氏雜說崔叔清唐杜佑鎮淮南進崔叔清詩百篇德宗謂使者此惡詩焉用進時人呼為准敕惡詩出國史補常願唐劉禹錫云貞元中武臣常願好作本色語曾謂余曰昔在奉天為行營都虞候聖人門都有幾箇賢郎他悉如此且曰奉天城斗許大更被朱泚吃兵馬楦危危原作為據明鈔本改如纍雞子今拋向南衙被公措大偉齕鄧鄧把將他他原作化據明鈔本改官職去至永貞初禹錫為御史監察見常願攝事在焉因謂之曰更敢道紇鄧否曰死罪死罪出嘉話録劉士榮唐于頔之鎮襄陽也朝廷姑息除其子方為太常丞頔讓之表曰劉元佐兒士榮以佐之明鈔本之作命功先朝為太常丞時臣與士榮同登朝列見其凡劣實鄙之今臣功名不如元佐男某男某原作某之據明鈔本改凡劣不若士榮若授此爵更為叨忝德宗令將其表宣示百寮時士榮為南衙將軍目覩其表有渾鐻者錫之客客字原空闕據黃本補也時鎬宴客飲酒更為令曰徵近日凡劣不得即雨鐻鐻字原闕據黃本補曰劉士榮鎬曰于方鎬謂席人曰諸公並須精除出嘉話録袁德師唐竇群與袁德師同在浙西幕竇群知尉明鈔本尉作廚嘗嗔堂子曰須送伯禽問德師曰會否曰某乙亦不到如此也還曾把書讀讀字原空闕據黃本補何乃相輕輕原作卿據明鈔本改詰之且伯禽何人德師曰只是古之堂子也滿座人哂出嘉話録蔣乂唐蔣乂撰宰臣録每拜一相旬月必獻傳卷卷原作奉據明鈔本改故為物議所嗤出國史補崔損唐崔損性極謹慎每奏對不敢有所發揚兩省清要皆歷踐之在位無稱於人身居宰相母野殯不言展墓不議遷袝不議遷袝原作下議遷相據舊唐書一三六崔損傳改姊為尼沒於近寺終喪不臨士君子罪之過為恭遜不止於容身而卒用此中上意竊大位者八年上知物議不叶然憐而厚之出談賓録
