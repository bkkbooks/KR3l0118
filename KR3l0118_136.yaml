body:
  text: 唐玄宗唐玄宗唐玄宗之在東宮為太平公主所忌朝夕伺察纖微必聞于上而宮闈左右亦潛持兩端以附太平之勢時元獻皇后方妊玄宗懼太平欲令服藥除之而無可以語者張說以侍讀得進見太子宮玄宗從容謀及說說亦密贊其事他日說又入侍因懷去胎藥三煮劑以獻玄宗得藥喜盡去左右獨搆火於殿中煮未熟怠而假寤肸蠁之際有神人長丈餘馬具飾身被金甲操戈繞藥鼎三匝煮盡覆無餘焉玄宗起視異之復增搆火又投一劑煮於鼎因就榻瞬息以伺之而神見復煮如初凡三煮皆覆之乃止則明日說又至告之說降階肅拜賀曰天所命也不可去之厥後元獻皇后思食酸玄宗亦以告說說每因進講輒袖木瓜以獻故開元中說恩澤莫與為此肅宗之於說子均垍若親戚昆弟云出柳氏史叱金像初唐有神像用金而制傳云周隋間有術士鎔範而成之天后朝因命置于宮中扃其殿宇甚嚴玄宗嘗幸其殿啟而觀焉時肅宗在中宮代宗尚稚俱侍上上問內臣力士曰此神像何所異亦有說乎力士曰此前代所制可以占王者在位之幾何年耳其法當厲聲而叱之苟年甚永則其像搖震亦久不然一撼而止上即嚴叱之其像若有懼搖震移時仆于地上喜笑曰誠如說我為天子幾何時力士因再拜賀上即命太子叱之其像微震又命皇孫叱之亦動搖久之上曰吾孫似我其後玄帝在位五十載肅宗在位凡六年代宗在位十九年盡契其占也出宣室志天寶符唐開元末于弘農古函谷關得寶符白石赤文正成未字識者解之雲未者四十八所以示聖人御曆之數也及帝幸蜀之來歲正四十八年得寶之時天下歌之曰得寶耶弘農耶弘農耶得寶耶得寶之年遂改元為天寶出開天傳信記蜀當歸僧一行將卒遺物一封令弟子進於帝帝發視之乃蜀當歸也帝初不喻及幸蜀回乃知微旨深歎異之出開天傳信記萬里橋玄宗幸東都偶然秋霽與一行師共登天宮寺閣臨眺久之上遐顧淒然發歎數四謂一行曰吾甲子得終無患乎一行進曰陛下行幸萬里聖祚無疆西狩初至成都前望大橋上舉鞭問左右是橋何名節度崔圓躍馬前進曰萬里橋上因追歎曰一行之言今果符之吾無憂矣出松窗錄唐肅宗肅宗在東都為李林甫所搆勢幾危者數矣無何鬢髮斑白常早朝上見之愀然曰汝疾歸院吾當幸汝及上至顧見宮中庭宇不灑埽樂器屏幃塵埃積其間左右使令無有女妓上為動容顧謂力士曰太子居如此將軍盍使我聞乎上在禁中嘗呼力士為將軍原注嘗呼作不知為上有呼字據明鈔本改力士奏曰臣嘗欲上言太子不許云無以動上念上即詔力士下京兆尹亟選人家子女頎長潔白者五人將以賜太子力士趨去復還奏曰臣他日嘗宣旨京兆閱致子女人間囂囂而朝廷好言事者得以為口實臣以為掖庭中故衣冠以事沒入其家者宜可備選上大悅使力士詔掖庭令按籍閱視得三人乃以賜太子而章敬吳皇后在選中頃之后侍寢厭不寤吟呼若有痛氣不屬者肅宗呼之不解竊自計曰上賜我卒無狀不寤上安知非吾護視不謹耶遽秉燭視之良久乃寤肅宗問之后手掩其左脅曰妾向夢中有神人長丈餘介金甲而操劍顧謂妾曰帝命吾與汝為子自左脅劍決而入痛殆不可忍忍原作痛據明鈔本改及今尚未之已也肅宗檢之于燭下則若有綖而赤者存焉遽以狀聞遂生代宗代宗之載生三日也上幸東宮賜之金盆命以浴吳皇后年弱皇孫龍體未舒負嫗惶惑乃以宮中諸王子同日誕而體貌豐碩者以進上視之不樂曰此兒非吾兒也負嫗叩頭具服上睨曰非爾所知取吾兒來於是以太子進見上大喜置諸掌內向日視之笑曰此兒福祿遠過其父上還宮盡留內樂謂力士曰比一殿有三天子樂乎哉可與太子飲乎出柳氏史唐武宗唐會昌末年武宗忽改御名為火下火及宣宗以光王龍飛于古文光字實從光焉噫先兆之明若是耶出真陵十七史唐宣宗唐宣宗在藩時常從駕回而誤墜馬人不之覺比二更方能興時天大雪四顧悄無人聲上寒甚會巡警者至大驚上曰我光王也不悟至此方困且渴若為我求水警者即于旁近得水以進遂委而去上良久起舉甌將飲顧甌中水盡為芳醪矣上喜獨自負舉一甌已而體微煖有力步歸藩邸後遂即帝位出真陵十七史迎光王太子賓客盧真有猶子曾為沙門會昌中沙汰歸俗廕補為光王府參軍一日夢前師至其家而問訊焉盧則告卑卑原作畢據明鈔本改官屑屑然非其願也常思落髮再披緇褐師曰汝誠有是志像教興復非晚也語未竟俄四面見日月旌旆千乘萬騎喧言迎光王即皇帝位未幾武帝崩光王果即皇帝位至是竟符其事焉出宣室志唐懿宗唐懿宗器度沈厚形貌瑰偉在藩邸時疾疹方甚而郭淑妃見黃龍出於臥內上疾稍退妃具以狀告上曰無泄是言貴不相忘更嘗大雪盈尺而上寢室輒無分寸諸王見者無不異之大中末京城小兒疊布蘸水向日張之謂捩暈及上自鄆王即位捩暈之言應矣宣宗製泰邊陲曲撰其詞云海岳晏咸通上垂拱而號咸通上仁孝之道出于天性鄭太后厭代而蔬素悲毀同士人之禮公卿奉慰者無不動容出杜陽雜編唐僖宗唐丞相隴西公李蔚建大旆于廣陵日時咸通十二年也泗州狀言有女僧二人至普光寺將祈禮者睢盱顧視如病風狂云後二年國有變亂此寺大聖和尚當履寶位循廊喧叫聚人甚眾不跡其來釋徒大恐且欲拘縻之際則齊登峻塔投身而下其一不救其一墜傷狂痛昏迷詰問不獲丞相立命焚其狀仍牒州杖殺之至十四年果懿皇晏駕八月僖宗即位乃是普王出唐史李邰唐李邰為賀州刺史與妓人葉茂蓮江行因撰骰子選謂之葉子咸通以來天下尚之殊不知應本朝年祚正體書葉字廿世木子自武德至天祐恰二十世出感定錄後唐太祖在妊十三月而生載誕之夕母后甚危令族人市藥于雁門遇神人教以率部人被介持旄擊鉦鼓躍馬大噪環所居三周而止果如所教而生是時虹光燭室白氣充庭井水暴溢及能言喜道軍旅年十二三善騎射曾於新城北酒酹于毗沙門天王塑像請與交談天王被甲持矛隱隱出于壁間所居帳內時有火聚或有龍形人皆異之嘗隨火征龐勛臨陣出沒如神號為龍虎子出北夢瑣言後唐明宗後唐明宗皇帝微時隨蕃將李存信巡邊宿於雁門逆旅逆旅媼方妊帝至不時具食腹中兒語謂母曰天子至速宜具食聲聞于外媼異之遽起親奉庖爨敬事尤謹帝以媼前倨後恭詰之曰公貴不可言也問其故具道娠子腹語事帝曰老嫗遜言懼吾辱耳後果如言出北夢瑣言潞王清泰之在岐陽也有馬步判官何某年踰八十忽暴卒云有使者拘錄引出冥間見陰君曰汝無他過今放汝還與吾言於潞王曰來年三月當帝天下可速返達吾之旨言訖引出使者送歸及蘇遂以其事密白王之左右咸以妖妄而莫之信由是不得聞于王月餘又暴卒入冥復見陰君陰君怒而責之曰何故受吾教而竟不能達耶徐曰放汝去可速導吾言仍請王畫吾形及地藏菩薩像何惶恐而退見其庭院廊廡之下簿書雜亂吏胥交橫何問之使者曰此是朝代將變陞降去留將來之官爵也及再活託以詞訟見王及見之且曰某有密事上白王因屏左右問之備述所見王未之信何曰某年踰八十死在旦夕豈敢虛妄也王默遣之來春果下詔攻岐陽唯何叟獨喜知其必驗至期何叟之言毫髮無差矣清泰即位擢何叟為天興縣令固知冥數前定人力其能遏之乎出王氏見聞錄晉高祖清泰中晉高祖潛龍于并部也常一日從容謂賓佐云近因晝寢忽夢若頃年在洛京時與天子連鑣于路過舊第天子請某入其第其遜讓者數四不得已即促轡而入至廳事下馬升自阼階西向而坐天子已馳車去矣其夢如此群僚莫敢有所答是年冬果有鼎革之事出玉堂閒話偽蜀主舅偽蜀主之舅累世富盛於興義門造宅宅內有二十餘院皆雕牆峻宇高臺深池奇花異卉叢桂小山山川珍物無所不有秦州董城村院有紅牡丹一株所植年代深遠使人取之掘土方丈盛以木櫃自秦州至成都三千餘里歷九折七盤望雲九井大小漫天隘狹懸險之路方致焉乃植於新第因請少主臨幸少主歎其基構華麗侔於宮室遂戲命筆於柱上大書一孟字時俗謂孟為不堪故也明年蜀破孟氏入成都據其第忽睹楹間有絳紗籠迫而視之乃一孟字孟曰吉祥也吾無易此居孟之有蜀蓋先兆也出王氏見聞錄
