body:
  text: 成汭成汭唐天祐中淮師圍武昌杜洪中令乞師於梁王梁與荊方睦乃諷成中令汭帥兵援之汭欲往親征乃力造巨艦一艘三年而成號曰和州載艦上列廳宇洎司局有若衙府之制又有齊山截海之名其餘華壯即可知也飾非拒諫斷自其意幕寮俛仰不措一辭唯孔目吏楊厚贊成之舟次破軍山下為吳師縱燎而焚之汭竟溺死兵士潰散先是改名曰汭字即水內也水內之死豈前兆乎湖南及朗州軍入江陵俘載軍民職掌伎巧僧道伶官並歸長沙改汭之名和州之說前定矣出北夢瑣言楊蔚唐楊蔚使君典洋源道者陳休復每到州多止於紫極宮弘農甚思一見而頴川輒便他適乃謂諸道士曰此度更來便須申報或一日再至遽令申白俄而州將擁旆而至遂披揖楊公曰嚮風久矣幸獲祗奉敢以將來祿算為請勿訝造次頴川呼人為卿乃謂州牧曰卿三為刺史了更無言楊不懌以其曾典兩郡至此三也自是常以見任為終焉之所邇後秩滿無恙不諭其言無何又授此州亦終考限罷後又除是郡凡三任竟殞於是邦即三為刺史之說果在於此乎楊公季弟玭為愚話之出北夢瑣言歐陽澥歐陽澥者四門之孫也薄善詞賦出入場中近二十年善和韋中令在閣下澥則行卷及門凡十餘載未嘗一面而澥慶弔不虧韋公雖不言而意甚憐之中和初公隨駕至西川命相時澥寓居漢南公訪知行止以私書令襄帥劉巨容俾澥計偕巨容得書大喜待以厚禮首薦之外資以千餘緡復大宴於府幕既而撰日遵路無何一夕心病而卒巨容因籍澥答書呈於公公覽之撫然因曰十年不見灼然不錯出摭言伊璠黃巢汙踐宮闕與安朱之亂不侔其間尤異各為好事傳記軒裳農賈挈妻孥潛跡而出者不可勝記至有積月陷寇終日逃避竟不覩賊鋒者獨前涇陽令伊璠為戎所得屢脫命於刃下其後血屬相失村服晦行及藍關為猛獸搏而食之患禍之來其可苟免出唐闕史顧彥朗東川顧彥朗以蔡叔向為副使感微時之恩惟為戎倅而嘗加敬其弟彥暉嗣襲酷好潔淨嘗嫌人臭左右薰香而備給使幕寮皆中朝子弟亦涉輕薄韋太尉照度收復蜀城以彥暉為招討副使在軍中每旦率幕官同謁掌武而蜀先主預焉共輕忽之雖昭度亦嫌其不恭彥暉襲兄位爾後為蜀主所破手刃一家郎官溫術等斃焉先是蔡叔向向字原本闕據明鈔本補職居元寮乃顧氏之心膂與所辟朝士優游樽俎不相侔矣小顧既是尊崇嫌其掣肘王先生因其隙宣言以間之且曰拈却蔡中丞看爾得否由是叔向辭職閒居王乃舉軍而伐之在蜀有術士朱洽者常謂人曰二顧雖位尊方鎮生無第宅死無墳墓人莫諭之或曰二顧自天德軍小將際會立功便除東川弟兄迭據大顧相薨遺命焚骸歸葬豐州會多事未果至小顧狼狽之日送終之禮又闕焉即朱氏言於斯驗矣出北夢瑣言李甲唐天祐初有李甲本常山人逢歲饑饉徙家邢臺西南山谷中樵採鬻薪以給朝夕曾夜至大明山下值風雨暴至遂入神祠以避之俄及中宵雷雨方息甲即寢於廟宇之間松柏之下須臾有呵殿之音自遠而至見旌旗閃閃車馬闐闐或擐甲胄者或執矛戟者或危冠大履者或朝衣端簡者揖讓升階列坐於堂上者十數輩方且命酒進食歡語良久其東榻之長即大明山神也體貌魁梧氣岸高邁其西榻之首即黃澤之神也其狀疎而瘦其音清而朗更其次者云是漳河之伯餘即不知其名坐談論商搉幽明之事其一曰稟命玉皇受符金闕太行之面清漳之湄數百里間幸為人主不敢逸豫怠惰也不敢曲法而狥私也不敢恃尊而害下也兢兢惕惕以承上帝用治一方故歲有豐登之報民無扎瘥之疾我之所治今茲若是其一曰清冷之域泱漭之區西聚大巔東漸巨浸連陂湊澤千里而遙余奉帝符宅茲民庶雖雷電之作由己也風波之起由己也鼓怒馳驟人罔能制予予亦非其詔命不敢有為也非其時會不敢沿泝也正而御之靜而守之遂致草木茂焉魚鼈蕃焉鹹鹵磊塊而滋殖萑蒲蓊鬱而發生上天降鑒亦幸無橫沴爾又一曰岑崟之地岞崿之都分坱圠之一隅總飛馳之眾類熊罷虎豹烏鵲雕鶚動止咸若罔敢害民此故予之所職耳何假乎備言座上僉曰唯唯大明之神忽揚目盱衡咄嗟長歎而謂眾實曰諸公鎮撫方隅公理疆野或水或陸各有所長然而天地運行之數生靈厄會之期巨盜將興大難方作雖群公之善理其奈之何眾咸問言何謂也大明曰余昨上朝帝所竊聞眾聖論將來之事三十年間兵戎大起黃河之北滄海之右合屠害人民六十餘萬人當是時也若非積善累仁忠孝純至者莫能免焉兼西北方有華胥遮毘二國待茲人眾用實彼士焉豈此生民寡祐當其殺戮乎眾皆嚬蹙相視曰非所知也食既畢天亦將曙諸客各登車而去大明之神亦不知所在及平旦李甲神思怳然有若夢中所遇既歸具以始末書而誌之言於鄰里之賢者自後三十餘載莊皇與梁朝對壘河岸戰陣相尋及晉宋戎虜亂華干戈不息被其塗炭者何啻乎六十萬焉今詳李生所說殆天意乎非人事乎出劉氏耳目記房知溫故青帥房公知溫少年與外弟徐裀裀字原本闕據明鈔本補為盜於袞鄆之境晝則匿於古冢一夕遇雨未出間二鬼至一鬼曰此有節度上明鈔本上作土主宜緩之與外弟俱聞之二人相問曰適聞外面語否徐曰然房曰吾與汝未知孰是來宵汝當宿於他所吾獨在此以驗之迨夕二鬼又至一鬼復曰昨夜貴人尚在矣房聞之喜後果節制數鎮官至太師中書令東平王則知晉書說魏陽元聞鬼以三公呼之為不謬矣出玉堂閒話竇夢徵朱梁翰林竇學士夢徵以文學稱於世時兩浙錢尚父有元帥之命竇以錢公無功於本朝僻在一方坐邀渥澤不稱是命乃抱麻哭於朝翌日竇謫掾於東州及失意被譴嘗鬱鬱不樂曾夢有人謂曰君無自苦不久當復故職然將來慎勿為丞相苟有是命當萬計避之其後竇復居禁職有頃遷工部侍郎竇忽憶夢中所言深惡其事然已受命不能遜避未幾果卒出玉堂閒話許生汴州都押衙朱仁忠家有門客許生暴卒隨使者入冥經歷之處皆如郡城忽見地堆粟千石中植一牌曰金吾將軍朱仁忠食祿生極訝之洎至公署使者引入一曹司主吏按其簿曰此人乃誤追之矣謂生曰汝可止此吾將白於陰君然慎忽窺吾簿吏既出生潛目架上有簽牌曰人間食料簿生潛憶主人朱仁忠不食醬可知其由遂披簿求之多不曉其文逡巡主吏大怒已知其不慎裀目責之生恐懼謝過告吏曰某乙平生受朱仁忠恩知其人性不食醬是敢竊食簿驗之願恕其罪吏怒稍解自取食簿於仁忠名下注大豆三合吏遂遣前使者引出放還其徑路微細隨使者而行忽見一婦女形容顦顇衣服襤褸抱一孩子拜於道傍謂生曰妾是朱仁忠亡妻頃年因產而死竟未得受生飢寒尤甚希君濟以資緡數千貫生以無錢辭之婦曰所求者楮貨也君還魂後可致而焚之兼望仁忠與寫金光明經一部懺之可指生路也既而先行直抵相國寺將踰其閾為使者所推踣地而寤仁忠既悲喜問其冥間之事生曰君非久必任金吾將軍言其牌粟之事又話見君亡妻言其形實無差後與仁忠同食乃言自君亡後忽覺醬香今嗜之頗甚乃是注大豆三合之驗也自爾朱寫經畢許生燔紙數千其婦於寐中辭謝而去朱果為金吾將軍顯晦之事不差毫釐矣出玉堂閒話楊鼎夫進士楊鼎夫富於詞學為時所稱頃歲會遊青城山過皂江同舟者約五十餘人至於中流遇暴風漂蕩其船抵巨石傾覆於洪濤間同濟之流盡沉沒底獨鼎夫似有物扶助既達岸亦困頓矣遽有老人以杖接引且笑云元是鹽裏人本非水中物鼎夫未及致謝旋失老人所之因作詩以記後歸成都話與知己終莫究鹽裏人之義後為權臣安思謙幕吏判搉鹽院事遇疾暴亡男文則以屬分料鹽百餘斤裹束將上蜀郊營葬至是鹽里之詞方驗鼎夫舊記詩曰青城山峭皂江寒欲度當時作等閑棹逆狂風趨近岸舟逢怪石碎前灣手攜弱杖倉皇處命出洪濤頃刻間今日深恩無以報令人差記雀銜環出北夢瑣言牛希濟蜀御史中丞牛希濟文學繁贍超於時輩自云早年未出學院以詞科可以俯拾或夢一人介金曰郎君分無科名四十五已上方有官祿覺而異之旋遇喪亂流寓於蜀依季父也大阮即給事中嶠也仍以氣直嗜酒為季父所責旅寄巴南旋聆開國不預勸進又以時輩所排十年不調為先主所知召對除起居郎累加至憲長是知向者之夢何其神也出北夢瑣言陰君文字頃歲有一士人嘗於寢寐間若被官司追攝因隨使者而去行經一城云是鎮州其間人物稀少又經一城云是幽州其間人物眾廣士人乃詢使者曰鎮州蕭疎幽州繁盛何其異乎使者曰鎮州雖然少人不日亦當似幽州矣有頃至一處有若公府中有一大官見士人至前即曰誤追此人來宜速放去士人知是陰司乃前啟陰官曰某雖蒙放還願知平生官爵所至陰官命取紙一幅以筆墨畫紙作九箇圍子別取青筆於第一箇圍子中點一點而與之士人置諸懷袖拜謝而退及寤其陰君所賜文字則宛然在懷袖間士人收藏甚秘其後鎮州兵士相繼殺傷甚眾故知陰間鎮州即日人眾當不謬耳其士人官至冀州錄事參軍繿縷而卒陰官畫九圍子者乃九州也冀州為九州之第一故點之其點青者言士人只止於錄事參軍綠袍也出玉堂閒話貧婦諺云一飲一啄繫之於分斯言雖小亦不徒然常見前張賓客澄言頃任鎮州判官日部內有一民家婦貧且老平生未嘗獲一完全衣或有哀其窮賤形體袒露遺一單衣其婦得之披展之際而未及體若有人自後掣之者舉手已不知衣所在此蓋為鬼所奪也出玉堂閒話支戩江左有支戩者餘干人世為小吏至戩獨好學為文竊自稱秀才會正月望夜時俗取飯箕衣之衣服插箸為嘴使畫盤粉以卜戩見家人為之即戲祝曰請卜支秀才他日至何官乃畫粉宛成司空字又戩嘗夢至地府盡閱名簿至己籍云至司空年五十餘他人籍不可記唯記其友人鄭元樞云貧賤無官年四十八元樞後居浙西廉使徐知諫賓禮之將薦於執政行有日矣暴疾而卒實年四十八戩後為金陵觀察判官檢校司空恒以此事話於親友竟卒於任年五十一出稽神錄
