body:
  text: 歷陽媼歷陽媼歷陽縣有一媼常為善忽有少年過門求食媼待之甚恭臨去謂媼曰時往縣門見門閫有血可登山避難自是媼日往之門吏問其狀媼具以少年所教答之吏即戲以雞血塗門閫明日媼見有血乃攜雞籠走上山其夕縣陷為湖今和州歷陽湖是也出獨異記孫權湓口城漢高祖六年灌嬰所築建安中孫權經住此城自標作井地遂得故井井中有銘石云漢六年潁陰侯開此井卜云三百年當塞塞後不度百年當為應運者所開權見銘欣悅以為己瑞人咸異之出張僧鑒潯陽記高頴西京朝堂北頭有大槐樹隋曰唐興村門首文皇帝移長安城將作木明鈔本木作大匠高頴常坐此樹下檢校後栽樹行不正欲去之帝曰高頴坐此樹下不須殺之至今先天一百三十年其樹尚在柯葉森竦根株盤石礡與諸樹不同承天門正當唐興村門首今唐家居焉出朝野僉載神堯隋煬帝與神堯高祖俱是獨孤外家然則神堯與煬帝常悔吝明鈔本然則作因是悔吝作侮狎每朝謁退煬帝背有詞然明鈔本背作皆然作謔後因賜宴煬帝於衆因戲神堯神堯高顏面皺帝目為阿婆面神堯忿恚不樂洎歸就第怏悵不已見文皇已下告文皇皆無言告文皇皆無言六字明鈔本作但流涕而不言次告竇皇后曰某身世可悲今日更被上顯毀云阿婆面據是兒孫不免飢凍矣竇后欣躍曰此言可以室家相賀神堯不喻謂是解免之詞後曰公封於唐阿婆乃是堂主堂者唐也神堯渙然冰釋喜悅與秦齊諸王私相賀焉出芝田録唐高祖唐北京受瑞壇隋大業十三年高祖令齊王元吉留守辛丑獲青石若龍形文有丹書四字曰李淵萬吉齊王獻之文字映徹宛若龜形帝乃令水漬磨以驗之數日其字愈明內外畢賀帝曰上天明命貺以萬吉宜以少牢祀石龜而爵龜人因立受瑞壇出太原事跡雜記太行山唐武德初太行山大聲曰唐國興理萬年出太原事跡雜記桑條歌唐永徽年以後人唱桑條歌云桑條女韋也樂至神龍年中逆韋應之諂佞者鄭愔作桑條樂詞十餘首進之逆韋大喜擢為吏部侍郎賞縑百匹出朝野僉載突厥鹽唐龍朔已來人唱歌名突厥鹽後周聖歷年中差閻知微和胸奴授三品春官尚書送武延秀娶成默啜女送金銀器物錦綵衣裳以為禮聘不可勝紀突厥翻動漢使並沒立知微為可汗突厥鹽之應出朝野僉載封中嶽唐調露中大帝欲封中嶽屬突厥叛而止後又欲封土蕃入寇又停至永淳年又駕幸嵩嶽謠云嵩山凡幾層不畏登不得只畏不得登三度徵兵馬傍道打騰騰嶽下遘疫不愈回至宮而崩出朝野僉載楊柳謠唐永淳之後天下皆唱楊柳楊柳漫頭駝後徐敬業犯事出柳州司馬遂作僞敕自授揚州司馬殺長史陳敬之據江淮反使李孝逸討之斬業首驛馬馱入洛楊柳楊柳漫頭駝此其應也出朝野僉載黃麞歌周如意年已來始唱黃麞歌其詞曰黃麞黃麞草裏藏彎弓射你傷俄而契丹反叛殺都督趙翽營府陷沒差總管曹仁師張玄遇麻仁節王孝傑前後百萬衆被賊敗於黃麞谷諸軍並沒罔有孑遺黃麞之歌斯為驗矣出朝野僉載苾挈兒周垂拱已來京都唱苾挈兒歌詞皆是邪曲後張易之小名苾挈出朝野僉載安樂寺唐景龍年安樂公主于于字原本無據明鈔本補洛州道光坊造安樂寺用錢數百萬童謠曰可憐安樂寺了了樹頭縣後誅逆韋並殺安樂斬首懸於竿上改為悖逆庶人出朝野僉載烏鵲窠唐神龍已後謠曰山南烏鵲窠山北金駱駝鐮柯不鑿孔斧子不施柯此突厥彊盛百姓不得斫桑養蠶種禾刈穀之應也出朝野僉載鯉魚兒唐景龍中謠曰可憐聖善寺身著緑毛衣牽來河裏飲踏殺鯉魚兒至景雲中譙王從均州入都作亂敗走投洛川而死出朝野僉載挽天樞唐景雲中謠曰一條麻線挽天樞絶去也神武即位敕令推倒天樞收銅並入尚方此其應驗出朝野僉載黃犢子唐景龍中謠云黃柏犢子挽紖斷兩腳踏地鞋𧳽斷六月平王誅逆韋挽紖斷者韋欲作亂鞋𧳽斷者事不成阿韋是黃犢之後也出朝野僉載駱賓王唐明堂主簿駱賓王帝京篇曰倏忽搏風生羽翼須臾失浪委泥沙賓王後與徐敬業興兵揚州大敗投江水而死此其讖也出朝野僉載天后唐太宗之代有祕記云唐三代之後即女主武王代有天下太宗密召李淳風以詢其事淳風對曰臣據玄象推算其兆已成然其人已生在陛下宮內從今不踰四十年當有天下誅殺唐氏子孫殆將殲盡帝曰求而殺之如何淳風曰天之所命不可廢也王者不死雖求恐不可得且據占已長成復在宮內已是陛下眷屬更四十年又當衰老老則仁慈其於陛下子孫或不甚損今若殺之即當復生更四十年亦堪御天下矣少壯嚴毒殺之為血讎即陛下子孫無遺類矣出談賓録明鈔本作出朝野僉載閻知微唐麟德已來百姓飲酒唱歌由終而不盡者號為族鹽後閻知微從突厥領賊破趙定後知微來則天大怒磔於西市命百官射之河內王武懿宗去七步射三發皆不中其怯懦也如此知微身上箭如蝟毛銼其骨肉夷其九族踈親先不相識者皆斬之小兒年七八歲驅抱向西市百姓哀之擲餅果與者仍相爭奪以為戲笑監刑御史不忍害奏捨之其族鹽之言於斯應矣出朝野僉載長孫無忌唐趙公長孫無忌以烏羊毛為渾脫氈帽天下慕之其帽為趙公渾脫後坐事長流嶺南深脫之言於是效焉出朝野僉載魏王唐魏王為巾子向前踣天下欣欣慕之名為魏王踣後坐死至孝和時陸頌亦為巾子同此樣時人又名為陸頌踣未一年而陸頌殞出朝野僉載武媚娘唐永徽後天下唱武媚娘歌後立武氏為皇后大帝崩則天臨朝改號大周二十餘年武氏彊盛武氏三王梁魏定等並開府自餘郡五朝野僉載四五作王十餘人幾遷鼎矣出朝野僉載孝和唐咸亨已後人皆云莫浪語阿婆嗔三叔聞時笑殺人後果則天即位至孝和嗣之阿婆者則天也三叔者孝和為第三也出朝野僉載魏叔麟唐魏僕射子名叔麟識者曰叔麟反語身戮也後果被羅織而殺之出朝野僉載武三思梁王武三思唐神龍初改封德靖王識者言德靖鼎賊也果有窺鼎之志被鄭克等斬之出朝野僉載孫佺唐孫佺為幽州都督五月北征時軍師李處郁諫五月南方火北方水火入水必滅佺不從果沒八萬人昔竇建德救王世充於牛口谷時謂竇入牛口豈有還期果被秦王所擒其孫佺之北也處郁曰飧若入咽百無一全山東人謂濕飯為飧音孫幽州以北並為燕地故云出朝野僉載張易之天后時謠言曰張公喫酒李公醉張公者斥易之兄弟也李公者言李氏太盛也出朝野僉載飲酒令唐龍朔年已來百姓飲酒作令云子母相去離連臺拗倒子母者盞與盤也連臺者連盤拗盞倒也及天后永昌中羅織事起有宿衛十餘人於清化坊飲為此令此席人進狀告之十人皆棄市自後廬陵徙均州則子母相去離也連臺拗倒者則天被廢諸武遷放之兆出朝野僉載白馬寺唐神武皇帝七月即位東都白馬寺鐵像頭無故自落於殿門外自後捉搦僧尼嚴急令拜父母等未成者並停革後出者科決還俗者十八九焉出朝野僉載李蒙開元五年春司天奏玄象有謫見其災甚重玄宗震驚問曰何祥對曰當有名士三十人同日冤死今新及第進士正應其數其年及第李蒙者貴主家壻上不言其事密戒主曰每有大遊宴汝愛壻可閉留其家主居昭國里時大合樂音曲遠暢曲江漲水聯舟數艘進士畢集蒙間明鈔本間作聞之乃踰垣奔走群衆愜望才登舟移就水中畫舸平沉聲妓篙工不知紀極三十進士無一生者出獨異志李進周天寶中李進明鈔本進作遐周頗有道術多在禁署徙居宮觀於所居院內題詩不啻千言皆預紀上皇幸蜀祿山僭位之事初亦不悟後方豁然略舉一篇云燕市人皆去函關馬不歸如逢山下鬼環上繫羅衣貴妃小字阿環山下鬼嵬字也出抒情詩志公詞劉禹錫曰逆胡之將亂中原梁朝志公大師已贈詞曰兩角女子緑衣裳却背太行邀君王一止之月必消亡兩角女子安字也緑者祿也一止正月也果正月敗亡聖矣符志公之寓言也出劉公嘉話録李懷光馬燧討李懷光自太原引兵至實明鈔本實作寶鼎下營問其地名埋懷村乃大喜曰擒賊必矣出國史補王鐸唐乾符中荊州節度使晉公王鐸後為諸道都統時木星入南斗數夕不退鐸觀之問諸星者吉凶安在咸曰金火土犯斗即為災惟木當為福耳或然之時有術士邊岡洞曉天文精通曆數謂晉公曰惟斗帝王之宮宿惟木為福神當以帝王占之然則非福於今必當有驗於後未敢言之他日晉公屏左右密問岡曰木星入斗當王之兆木在斗中朱字也識者言唐世嘗有緋衣之讖或言將來革運或姓裴或姓牛以裴字為緋衣牛字著人即朱也所以裴晉公度牛相國僧孺每罹此謗李衛公斥周秦行記乃斯事也安知鍾於碭山之朱乎出北夢瑣言木成文梁開平二年使其將李思安攻潞州營於壺口關伐木為柵破一大木木中朱書隸文六字曰天十四載石進思安表上之其群臣皆賀以為十四年必有遠夷貢珍寶者其司天少監徐鴻謂所親曰自古無一字為年號者上天符命豈闕文乎吾以丙申之年當有石氏王此地者移四字中兩豎畫置天字左右即丙字也移四之外圍以十字貫之即申字也後至丙申歲晉高祖以石姓起并州如鴻之言出稽神録草重生初董昌未敗前狂人於越中旗亭客舍多題詩四句曰日日草重生悠悠傍素城諸侯逐白兔夏滿鏡湖平初人不曉其詞及昌敗方悟草重董字日日昌字素城越城隋越國公楊素所築也諸侯者猴乃錢鏐申生屬也白兔昌卯生屬也夏滿六月也鏡湖者越中也出會稽録唐國閏僞蜀後主王衍以唐襲宅建上清宮於老君尊像殿中列唐朝十八帝真乃備法駕竭之識者以為拜唐乃歸命之先兆也先是司天監胡秀林進曆移閏在丙戌年正月有向隱者亦進曆用宣明法閏乙酉年十二月既有異同彼此紛訴仍於界上取唐國曆日近臣曰宜用唐國閏月也因更改閏十二月街衢賣曆者云只有一月也其年十二月二十八日國滅胡秀林是唐朝司天少監任蜀別造永昌正象曆推步之妙天下一人然移閏之事不爽曆議常人不可輕知之出北夢瑣言竹𧳽竹𧳽者食竹之鼠也生於深山溪谷竹林之中無人之境非竹不食巨如野狸其肉肥脆山民重之每發地取之甚艱岐梁睚眥之年秦隴之地無遠近巖谷之間此物爭出投城隍及所在民家或穿墉壞城或自門閾而入犬食不盡則並入人家房內秦民之口腹飫焉忽有童謠曰𧳽𧳽引黑牛天差不自由但看戊寅歲楊在蜀江頭智者不能議之庚午歲大梁同州節度使劉知俊叛梁入秦家於天水天水破流入蜀居數年間蜀人又謠曰黑牛無繫絆棕繩一時斷僞蜀先主聞之懼曰黑牛者劉之小字棕繩者吾子孫之名也蓋前輩連宗字後輩連承字為名棕繩與宗承同音吾老矣得不為子孫之患乎於是害劉公以厭之明年歲在戊寅先主不豫合眼劉公在目前蜀人懼之遂粉劉之骨揚入於蜀江先主尋崩議者方知𧳽者劉也黑牛者劉之小字戊寅歲揚骨入於蜀江之應出王氏見聞
