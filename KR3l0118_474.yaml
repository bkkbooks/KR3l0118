body:
  text: 胡充胡充宋豫章胡充元嘉五年秋夕有大蜈蚣長二尺落充婦與妹前令婢挾擲婢裁出戶忽睹一姥衣服臭敗兩目無精到六年三月闔門時患死亡相繼盧汾妖異記曰夏陽盧汾字士濟幼而好學晝夜不倦后魏莊帝永安二年七月二十日將赴洛友人宴于齋中夜闌月出之后忽聞廳前槐樹空中有語笑之音并絲竹之韻數友人咸聞訝之俄見女子衣青黑衣出槐中謂汾曰此地非郎君所詣奈何相造也汾曰吾適宴罷友人聞此音樂之韻故來請見女子笑曰郎君真姓盧耳乃入穴中俄有微風動林汾歎訝之有如昏昧及舉目見宮宇豁開門戶迥然有一女子衣青衣出戶謂汾曰娘子命郎君及諸郎相見汾以三友俱入見數十人各年二十余立于大屋之中其額號曰審雨堂汾與三友歷階而上與紫衣婦人相見謂汾曰適會同宮諸女歌宴之次聞諸郎降重不敢拒因此請見紫衣者乃命汾等就宴后有衣白者青黃者皆年二十余自堂東西閣出約七八人悉妖艷絶世相揖之后歡宴未深極有美情忽聞大風至審雨堂梁傾折一時奔散汾與三友俱走乃醒既見庭中古槐風折大枝連根而墮因把火照所折之處一大蟻穴三四螻蛄一二蚯蚓俱死于穴中汾謂三友曰異哉物皆有靈況吾徒適與同宴不知何緣而入于是及曉因伐此樹更無他異來君綽隋煬帝征遼十二軍盡沒總管來護坐法受戮煬帝盡欲誅其諸子君綽憂懼連日與秀才羅巡羅逖李萬進結為奔友共亡命至海州夜黑迷路路旁有燈火因與共頓之扣門數下有一蒼頭迎拜君綽因問此是誰家答曰科斗郎君姓威即當府秀才也遂啓門門又自閉敲中門曰蝸兒今有四五個客蝸兒耶又一蒼頭也遂開門秉燭引客就館客位床榻茵褥甚備俄有一小童持燭自中出門曰六郎子出來君綽等降階見主人主人辭采朗然文辨紛錯自通姓名曰威污蠖敘寒溫訖揖客由阼階坐曰污蠖忝以本州鄉賦得與足下同聲青霄良會殊是欣願即命酒洽坐漸至酣暢談謔交至衆所不能對君綽頗不能平欲以理挫之無計因舉觴曰君綽請起一令以坐中姓名雙聲者犯罰如律君綽曰威污蠖實譏其姓衆皆撫手大笑以為得言及至污蠖改令曰以坐中人姓為歌聲自二字至三字令曰羅李羅來李衆皆慚其辨捷羅巡又問君風雅之士足得自比云龍何玉名之自貶耶污蠖曰仆久從賓興多為主司見屈以仆后于群士何異尺蠖于污池乎巡又問公華宗氏族何為不載污蠖曰我本田氏出于齊威王亦猶桓丁之類何足下之不學耶既而蝸兒舉方丈盤至珍羞水陸充溢其間君綽及仆無不飽飫夜閣徹燭連榻而寢遲明敘別恨悵俱不自勝君綽等行數里猶念污蠖復來見昨所會之處了無人居唯污池邊有大蚓長數尺又有癱螺丁子皆大常有數倍方知污蠖及二豎皆此物也遂共惡昨宵所食各吐出青泥及污水數升傳病隋煬帝大業末年洛陽人家中有傳尸病兄弟數人相繼亡歿后有一人死氣猶未絶家人并哭其弟忽見物自死人口中出躍入其口自此即病歲余遂卒臨終謂其妻曰吾疾乃所見物為之害吾氣絶之后便可開我腦喉視有何物欲知其根本言終而死弟子依命開視腦中得一物形如魚而并有兩頭遍體悉有肉鱗弟子致鉢中跳躍不止試以諸味致中雖不見食悉須臾皆成水諸毒藥因皆隨銷化時夏中藍熟寺衆如水次作靛青一人往因以小靛致鉢中此物即遽奔馳須臾間便化為水傳靛以療噎滕庭俊文明元年毗陵滕庭俊患熱病積年每發身如火燒數日方定名醫不能治后之洛調選行至滎水西十四五里天向暮未達前所遂投一道傍莊家主人暫出未至庭俊心無聊賴因歎息曰為客多苦辛日暮無主人即有老父鬢發疏禿衣服亦弊自堂西出拜曰老父雖無所解而性好文章適不知郎君來止與和且耶連句次聞郎君吟為客多苦辛日暮無主人雖曹丕門客子常畏人不能過也老父與和且耶同作渾家門客雖貧亦有斗酒接郎君清話耳庭俊甚異之問曰老父住止何所老父怒曰仆忝渾家掃門之客姓麻名來和行一君何不呼為麻大庭俊即謝不敏與之偕行繞堂西隅遇見二門門啓華堂復閣甚奇秀館中有樽酒盤核麻大揖讓庭俊同坐良久中門又有一客出麻大曰和至矣即降階揖讓坐且耶謂麻大曰適與君欲連句君詩題成未麻大乃書題目曰同在渾家平原門館連句一首豫已為四句矣麻大詩曰自與渾家鄰馨香遂滿身無心好清靜人用去灰塵仆作四句成矣且耶曰仆是七言韻又不同如何麻大曰但自為一章亦不惡且耶良久吟曰冬朝每去依煙火春至還歸養子孫曾向苻王筆端坐爾來求食渾渾門庭俊猶不悟見門館華盛因有淹留歇為之計詩曰田文稱好客凡養幾多人如欠馮諼在今希廁下賓且耶麻大相顧笑曰何得相譏向使君在渾家門一日當厭飫矣于是餐膳肴饌引滿數十巡主人至覓庭俊不見使人叫喚之庭俊應曰唯而館宇并麻和二人一時不見乃坐廁屋下傍有大蒼蠅禿掃帚而已庭俊先有熱疾自此已后頓愈更不復發矣張思恭唐天后中尚食奉御張思恭進牛窟利上蚰蜒大如箸天后以玉合貯之召思恭示曰昨窟利上有此極是毒物近有雞食烏百足蟲忽死開腹中有蚰蜒一抄諸蟲并盡此物不化朕昨日以來意惡不能食思恭頓首請死赦免之與宰夫并流嶺南蝗唐開元四年河南北螽為災飛則翳日大如指食苗草樹葉連根并盡敕差使與州縣相知驅逐采得一石者與一石粟一斗粟亦如之掘坑埋卻埋一石則十石生卵大如黍米厚半寸蓋地浮休子曰昔文武聖皇帝時繞京城蝗大起帝令取而觀之對仗選一大者祝之曰朕政刑乖僻仁信未孚當食我心無害苗稼遂吞之須臾有烏如鸛百萬為群拾蝗一日而盡此乃精感所致天若偶然則如勿生天若為厲埋之滋甚當明德慎罰以答天譴奈何不見福修以禳災而欲逞殺以消禍此宰相姚文崇失燮理之道矣冷蛇申王有肉疾腹垂至骭每出則以白練束之至暑月鼾息不可過玄宗詔南方取冷蛇二條賜之蛇長數尺色白不螫人執之冷如握冰申王腹有數約夏月置于約中不復覺煩暑李揆唐李揆乾天中為禮部侍郎嘗一日晝坐于堂之前軒忽聞堂中有聲極震若牆圮揆驚入視之見一蝦蟆俯于地高數尺魅然殊狀揆且驚且異莫窮其來即命家童以巨缶蓋焉有解曰夫蝦蟆月中之蟲亦天使也今天使來公堂豈非上帝以密命付公乎其明啓而視之已亡見矣后數日果拜中書侍郎平章事主簿蟲潤州金壇縣大歷中有北人為主簿以竹筒繼蝎十余枚置于廳事之樹后遂育至百餘枚為土氣所蒸而不能螫人南民不識呼為主簿蟲朱牙之東陽太守朱牙之元興中忽有一老公從其妾董床下出著黃裳襟帽所出之坎滑澤有泉遂與董交好若有吉凶遂以告牙之兒病瘧公曰此應得虎卵服之持戟向山東得虎陰尚余暖氣使兒炙噉瘧即斷公常使董梳頭發如野豬牙后諸祭酒上章于是絶迹作沸湯試澆此坎掘得數斛大蟻不日村人捉大刀野行逢一丈夫見刀操黃金一餅求以易刀授刀奄失其人所在重察向金乃是牛糞計此即牙家鬼樹蚓上都渾瑊宅戟門外一小槐樹樹有穴大如錢每夏月霽后有蚓大如巨臂長二尺余白頸紅斑領蚓數百條如索緣樹枝干及曉悉入穴或時衆驚往往成曲學士張乘言渾瑊時堂前忽有樹從地踊出蚯蚓遍挂其上已有出處忘其書名目木師古遊子木師古貞元初行于金陵界村落日暮投古精舍宿見主人僧主人僧乃送一陋室內安止其本客廳乃封閉不開師古怒遂詰責主人僧僧曰誠非吝惜于此而卑吾人于彼俱以承前客宿于此者未嘗不大漸于斯自某到已三十余載殆傷三十人矣閉止已周歲再不敢令人止宿師古不允其詞愈生猜責僧不得已令啓戶灑掃乃實年深朽室矣師古存心信而口貌猶怒及入寢亦不免有備預之志遂取篋中便手刀子一口于床頭席下用壯其膽耳寢至二更忽覺增寒驚覺乃漂沸風冷如有扇焉良久其扇復來師古乃潛抽刀子于幄中以刀子一揮如中物乃聞墮于床左亦更無他師古復刀子于故處乃安寢至四更已來前扇又至師古亦依前法揮刀中物又如墮于地握刀更候了無余事須臾天曙寺僧及側近人同來扣戶師古乃朗言問之為誰僧徒皆驚師古之猶存詢其來由師古具述其狀徐徐拂衣而起諸人遂于床右見蝙蝠二枚皆中刀狼藉而死每翅長一尺八寸珠眼圓大如瓜銀色按神異祕經法云百歲蝙蝠于人口上服人精氣以求長生至三百歲能化形為人飛遊諸天據斯未及三百歲耳神力猶劣是為師古所制師古因之亦知有服練術遂入赤城山不知所終宿在古舍下者亦足防矣
