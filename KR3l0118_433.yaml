body:
  text: 張俊張俊宣州溧水縣尉元澹家在懷州先將一莊客張俊祇承至官官滿卻歸俊亦從之俊有妻一子三歲亦與同行至宋地衝夜俊抱兒從澹其妻乘驢在後十步忽聞叫聲俊奔視之妻已被虎所取俊白元妻今為虎所殺傷誓欲報仇今以孩子奉上某儻生歸當酬哺養之恩不爾便為僕賤終身元固止之不可復挾兩矢攜弓腰斧下道乘黑而行去三十餘里皆深林重阻既而漸至一處依近山谷有大樹百餘株疑近虎穴俊上樹伺之時漸明見山下數十步內如有物蹲伏起動之狀更候之欲明乃是虎也其妻已死為虎所禁屍自起拜虎訖自解其衣裸而復僵虎又于窟中引四子皆大如狸掉尾歡躍虎以舌舐死人虎子競來爭食俊在樹上見之遂發一箭正中虎額其虎騰躍又發一箭中其脅箭皆傅毒虎遂驚躍狂亂吼怒頃刻而死俊復下樹以斧截虎頭并殺四子亦取其首葛蔓貫之亦負妻屍走步而歸日曉追及澹感激之至潯陽獵人潯陽有一獵人常取虎為業於徑施弩弓焉每日視之見虎跡而箭已發未曾得虎舊說云人為虎所食即作倀鬼之事即于其側樹下密伺二更後見一小鬼青衣髡髮齊眉蹩躄而來弓所撥箭發而去後食頃有一虎來履弓而過既知之更攜一隻箭而去復如前狀此人速下樹下架箭而登樹覘之少頃虎至履弓箭發其虎貫脅而死其倀鬼良久卻回見虎死遂鼓舞而去也柳并河東柳并為監察御史入嶺推覆將一書吏隨行常所委任至嶺下宿孤館中從吏皆在廳內席地而寢時半夜月初上眾皆臥并獨覺忽見一小鬼長尺餘狀若獮猴手持一紙幡子步上階以幡插書吏頭邊而去并乃潛起拔去之復臥伺焉少頃一虎入來遍嗅諸人而去須臾小鬼又來別以幡子插之復又拔去之少頃虎又來遍嗅而去如此者三度而天向明乃至旦召吏言其事旦日汝當難免自須為計不可隨我并有劍取與之乃令逃難此吏素強勇攜劍入山尋逐虎穴行二十里至一茅菴入其中不見有人惟見席上案硯朱筆有一卷文書皆是人名或有勾者有未勾者己名在寫屋上見一領虎皮吏懷其書并取皮仗劍而去行未數里見一胡僧從後來趁呼之曰且住君不如告某為計即可免矣吏即止與之言見其人狀異不敢殺之僧曰吾非彊害君者是天配合食之豈不見適來文簿昨日已愆數期今彊脫終恐無益不如以小術厭之吏問其術僧令登一樹以帶自縛用劍自刺少血塗一單衣投之我以衣為禳之耳吏如言登樹投皮與僧衣之便作虎狀哮吼怒目光如電掣吏懼將欲墮者數過即取單衣刺血塗之投於地虎得衣跳躍擘扯而吞之良久復為人形曰子免矣乃遣去竟無患焉僧虎袁州山中有一村院僧忘其法名偶得一虎皮戲被於身搖尾掉頭頗克肖之或於道旁戲鄉人皆懼而返走至有遺其所遺之物者僧得之喜潛於要衝伺往來有負販者欻自草中躍出昂然虎也皆棄所齎而奔每蒙皮而出常有所獲自以得計時時為之忽一日被之覺其衣著于體及伏草中良久試暫脫之萬方皆不能脫自視其手足虎也爪牙虎也乃近水照之頭耳眉目口鼻尾毛皆虎矣非人也心又樂于草間遂捕狐兔以食之拏攫飲啖皆虎也是後常與同類遊處復為鬼神所役使夜則往來于山中寒暑雨雪不得休息甚厭苦之形骸雖虎而心歷歷然人也但不能言耳周歲餘一旦餒甚求無所得乃潛伏道傍忽一人過于前遂躍而噬之既死將分裂而食細視之一衲僧也心自惟曰我本人心幸而為僧不能守禁戒求出輪回自為不善活變為虎業力之大無有是者今又殺僧以充腸地獄安容我哉我寧餒死弗重其罪也因仰天大號聲未絕忽然皮落如脫衣狀自視其身一裸僧也奔舊院院已荒廢乃用草遮身投于俗家得破衣數件走于鄰境佛寺因遊方止臨川崇壽院眾堂中是時圓超上人居看經堂其僧侍立不懈上人念其恭勤乃問爾何處人出家幾夏臘修習何等法而勤勤若此對曰某心有悔行願因上人決之但不欲他僧聞耳乃屏侍者問之其僧言為虎之事叩頭作禮求讖罪業上人謂曰生死罪福皆由念作剎那之間即分天堂地獄豈在前生後世耶爾惡念為虎善念為人豈非證哉茍有志乎脫離者趣無上菩提還元反本念不著則人不為虎虎不為人矣方今閩中大善知識比肩爾其往哉僧乃奉教上人尋話于智作長老長老往見之以上人向者事問皆無異同雙目猶赤耽然可畏也後入嶺不知所適王瑤漢州西四十五里有富叟王瑤所居水竹園林占一川之勝境而往來之人多迂道以經焉既至瑤心盡誠接待有賣瓦金石生者常言住在西山每來必休於此積十數年率五日一至瑤密異之外視其所買又非山中所用者一日瑤伺其來因竭力奉之石亦無媿近晚將去瑤曰思至生居為日久矣今者幸願偕焉石生曰吾敝土窮山不足為訪瑤即隨行十數里暝色將起石生曰爾可還矣瑤曰竊慕高躅願效誠力但生所欲皆可以奉所以求知其居焉石生固辭瑤追從不已石生忽以拄杖畫地遂為巨壑而身亦騰為白虎哮吼顧瞻瑤驚駭惶怖因蒙面匍匐而走明日再往曾無人跡自是石生不復經過矣劉牧成應元事統云劉牧字子仁常居南沙野中樂山鳥之啼愛風松之韻植果種蔬野人欺之多伐樹踐囿牧曰我不負人人何負我有一虎近其居作穴見牧則搖尾牧曰汝來護我也虎輒俛首歷數年野人不敢侵後牧卒虎乃去姨虎劍州永歸葭萌劍門益昌界嘉陵江側有婦人年五十已來自稱十八姨往往來民家不飲不食每教諭於人曰但作好事莫違負神理居家和順孝行為上若為惡事者我常令貓兒三五箇巡檢汝語未畢遂去或奄忽不見每歲約三五度有人遇之民間知其虎所化也皆敬懼之焉崔韜蒲州人也旅遊滁州南抵歷陽曉發滁州至仁義館宿館吏曰此館凶惡幸無宿也韜不聽負笈昇廳館吏備燈燭訖而韜至二更展衾方欲就寢忽見館門有一大足如獸俄然其門豁開見一虎自門而入韜驚走於暗處潛伏視之見獸於中庭脫去獸皮見一女子奇麗嚴飾昇廳而上乃就韜衾出問之曰何故宿余衾而寢韜適見汝為獸入來何也女子起謂韜曰願君子無所怪妾父兄以畋獵為事家貧欲求良匹無從自達乃夜潛將衾皮為衣知君子宿於是館故欲託身以備灑掃前後賓旅皆自怖而殞妾今夜幸逢達人願察斯志韜曰誠如此意願奉懽好來日韜取獸皮衣棄廳後枯井中乃挈女子而去後韜明經擢第任宣城時韜妻及男將赴任與俱行月餘復宿仁義館韜笑曰此館乃與子始會之地也韜往視井中獸皮衣宛然如故韜又笑謂其妻子曰往日卿所著之衣猶在妻曰可令人取之既得妻笑謂韜曰妾試更著之接衣在手妻乃下階將獸皮衣著之纔畢乃化為虎跳躑哮吼奮而上廳食子及韜而去王行言秦民有王行言以商賈為業常販鹽鬻於巴渠之境路由興元之南曰大巴路曰小巴路危峰峻壑猿徑鳥道路眠野宿杜絕人煙鷙獸成群食啖行旅行言結十餘輩少壯同行人持一拄杖長丈餘銛鋼鐵以刃之即其短鎗也纔登細徑為猛虎逐之及露宿於道左虎忽自人叢中攫行言而去同行持刃杖逐而救之呼喊連山於數十步外奪下身上拏攫之蹤已有傷損平旦前行虎又逐至其野宿眾持搶圍使行言處於當心至深夜虎又躍入眾中攫行言而去眾人又逐而奪下則傷愈多行旅復衛而前進白晝逐人略不暫捨或跳於前或躍于後時自于道左而出於稠人叢中捉行言而去竟救不獲終不傷其同侶須得此人充其腹不知是何冤報逃之不獲
