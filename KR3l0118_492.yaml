body:
  text: 靈應傳靈應傳涇州之東二十里有故薛舉城城之隅有善女湫廣袤數里蒹葭叢翠古木蕭疏其水湛然而碧莫有測其淺深者水族靈怪往往見焉鄉人立祠于旁曰九娘子神歲之水旱祓禳皆得祈請焉又州之西二百餘里朝那鎮之北有湫神因地而名曰朝那神其肸蠁靈應則居善女之右矣乾符五年節度使周寶在鎮日自仲夏之初數數有云氣狀如奇峰者如美女者如鼠如虎者由二湫而興至于激迅風震雷電發屋拔樹數刻而止傷人害稼其數甚多寶責躬勵己謂為政之未敷致陰靈之所譴也至六月五日府中視事之暇昏然思寐因解巾就枕寢猶未熟見一武士冠鍪被鎧持鉞而立于階下曰有女客在門欲申參謁故先聽命寶曰爾為誰乎曰某即君之閽者效役有年矣寶將詰其由已見二青衣歷階而升長跪于前曰九娘子自郊墅特來告謁故先使下執事致命于明公寶曰九娘子非吾通家親戚安敢造次相面乎言猶未終而見祥云細雨異香襲人俄有一婦人年可十七八衣裙素淡容質窈窕憑空而下立庭廡之間容儀綽約有絕世之貌侍者十余輩皆服飾鮮洁有如妃主之儀顧步徊翔漸及臥所寶將少避之以候期意侍者趨進而言曰貴主以君之高義可申誠信之托故將冤抑之懷訴諸明公明公忍不救其急難乎寶遂命升階相見賓主之禮頗甚肅恭登榻而坐祥煙四合紫氣充庭斂態低鬟若有憂戚之貌寶命酌醴設饌厚禮以待之俄而斂袂離席逡巡而言曰妾以寓止郊園綿歷多祀醉酒飽德蒙惠誠深雖以孤枕寒床甘心沒齒煢嫠有托負荷逾多但以顯晦殊途行止乖互今乃迫于情禮豈暇緘藏倘鑒幽情當敢披露寶曰愿聞其說所冀識其宗系苟可展分安敢以幽顯為辭君子殺身以成仁徇其毅烈蹈赴湯火旁雪不平乃寶之志也對曰妾家世會稽之鄮縣卜筑于東海之潭桑榆墳隴百有余代其后遭世不造瞰室貽災五百人皆遭庾氏焚炙之禍纂紹幾絕不忍戴天潛遁幽岩沈冤莫雪至梁天監中武帝好奇召人通龍宮入枯桑島以燒燕奇味結好于洞庭君寶藏主第七女以求異寶尋聞家仇庾毗羅自鄮縣白水郎棄官解印欲承命請行陰懷不道因使得入龍宮假以求貨覆吾宗嗣賴杰公敏鑒知渠挾私請行欲肆無辜之害慮其反貽伊戚辱君之命言于武帝武帝遂止乃令合浦郡落黎縣歐越羅子春代行妾之先宗羞共戴天慮其后患乃率其族韜光滅跡易姓變名避仇于新平真寧縣安村披榛鑿穴筑室于茲先人弊廬殆成胡越今三世卜居先為靈應君尋受封應聖侯后以陰靈普濟功德及民又封普濟王威德臨人為世所重妾即王之第九女也笄年配于象郡石龍之少子良人以世襲猛烈血氣方剛憲法不拘嚴父不禁殘虐視事禮教蔑聞未及期年果貽天譴覆宗絕嗣削跡除名唯妾一身僅以獲免父母抑遣再行妾終違命王侯致聘接軫交轅誠愿既堅遂欲自劓父母怒其剛烈遂遣屏居于茲土之別邑音問不通于今三紀雖慈顏未复溫清久違離群索居甚為得志近年為朝那小龍以季弟未婚潛行禮聘甘言厚幣峻阻复來滅性毀形殆將不可朝那遂通好于家君欲成其事遂使其季弟權徙居于王畿之西將質于我王以成姻好家君知妾之不可奪乃令朝那縱兵相逼妾亦率其家僮五十余人付以兵仗逆戰郊原眾寡不敵三戰三北師徒倦弊掎角無怙將欲收拾余燼背城借一而慮晉陽水急台城火炎一旦攻下為頑童所辱縱沒于泉下無面石氏之子故詩云泛彼柏舟在彼中河髡彼兩髦實維我儀之死矢靡他母也天只不諒人只此衛世子孀婦自誓之詞又云誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從此邵伯聽訟衰亂之俗微貞信之教興強暴之男不能侵凌貞女也今則公之教可以精通顯晦貽范古今貞信之教故不為姬奭之下者幸以君之余力少假兵鋒挫彼凶狂存其鰥寡成賤妾終天之誓彰明公赴難之心輒具志誠幸無見阻寶心雖許之訝其辨博欲拒以他事以觀其詞乃曰邊徼事繁煙塵在望朝廷以西郵陷虜蕪沒者三十余州將議舉戈复其土壤曉夕恭命不敢自安匪夕伊朝前茅即舉空多憤悱未暇承命對曰昔者楚昭王以方城為城漢水為池盡有荊蠻之地籍父兄之資強國外連三良內助而吳兵一舉鳥迸云奔不暇嬰城迫于走兔寶玉遷徙宗社凌夷萬乘之靈不能庇先王之朽骨至申胥乞師于嬴氏血淚污于秦庭七日長號晝夜靡息秦伯憫其禍敗竟為出師复楚退吳僅存亡國況芊氏為春秋之強國申胥乃衰楚之大夫而以矢盡兵窮委身折節肝腦涂地感動于強秦矧妾一女子父母斥其孤貞狂童凌其寡弱綴旒之急安得不少動仁人之心乎寶曰九娘子靈宗異派呼吸風云蠢爾黎元固在掌握又焉得示弱于世俗之人而自困如是者哉對曰妾家族望海內咸知只如彭蠡洞庭皆外祖也陵水羅水皆中表也內外昆季百有余人散居吳越之間各分地土咸京八水半是宗親若以遣一介之使飛咫尺之書告彭蠡洞庭召陵水羅水率維揚之輕銳征八水之鷹揚然后檄馮夷說巨靈鼓子胥之波濤混陽侯之鬼怪鞭驅列缺指揮丰隆扇疾風翻暴浪百道俱進六師鼓行一戰而成功則朝那一鱗立為齏粉涇城千里坐變污瀦言下可觀安敢謬矣頃者涇陽君與洞庭外祖世為姻戚后以琴瑟不調棄擲少婦遭錢塘之一怒傷生害稼懷山襄陵涇水窮鱗尋斃外祖之牙齒今涇上車輪馬跡猶在史傳具存固非謬也妾又以夫族得罪于天未蒙上帝昭雪所以銷聲避影而自困如是君若不悉誠款終以多事為詞則向者之言不敢避上帝之責也寶遂許諾卒爵撤饌再拜而去寶及晡方寤耳聞目覽恍然如在翼日遂遣兵士一千五百人戍于湫廟之側是月七日雞初鳴寶將晨興疏牖尚暗忽于帳前有一人經行于帷幌之間有若侍巾櫛者呼之命燭竟無酬對遂厲而叱之乃言曰幽明有隔幸不以燈燭見迫也寶潛知異乃屏氣息音徐謂之曰得非九娘子乎對曰某即九娘子之執事者也昨日蒙君假以師徒救其危患但以幽顯事別不能驅策苟能存其始約幸再思之俄而紗窗漸白注目視之悄無所見寶良久思之方達其義遂呼吏命按兵籍選亡沒者名得馬軍五百人步卒一千五百人數內選押衙孟遠充行營都虞候牒送善女湫神是月十一日抽回戍廟之卒見于廳事之前轉旋之際有一甲士仆地口動目瞬問無所應亦不似暴卒者遂置于廊廡之間天明方悟遂使人詰之對曰某初見一人衣青袍自東而來相見甚有禮謂某曰貴主蒙相公莫大之恩拯其焚溺然亦未盡誠款假爾明敏再通幽情幸無辭免也某急以他詞拒之遂以袂相牽懵然顛仆但覺與青衣者繼踵偕行俄至其廟促呼連步至于帷薄之前見貴主謂某云昨蒙相公憫念孤危俾爾戍于弊邑往返途路得無勞止余近蒙相公再借兵師深愜誠愿觀其士馬精強衣甲銛利然都虞候孟遠才輕位下甚無机略今月九日有游軍三千余來掠我近郊遂令孟遠領新到將士邀擊于平原之上設伏不密反為彼軍所敗甚思一權謀之將俾爾速歸達我情素言訖拜辭而出昏然似醉余無所知矣寶驗其說與夢相符意欲質前事遂差制胜關使鄭承符以代孟遠是月三日晚衙于后球場瀝酒焚香牒請九娘子神收管至十六日制胜關申云今月十三日夜三更已來關使暴卒寶惊歎息使人馳視之至則果卒唯心背不冷暑月停尸亦不敗坏其家甚異之忽一夜陰風慘冽吹砂走石發屋拔樹禾苗盡偃及曉而止云霧四布連夕不解至暮有迅雷一聲划如天裂承符忽呻吟數息其家剖棺視之良久复蘇是夕親鄰咸聚悲喜相仍信宿如故家人詰其由乃曰余初見一人衣紫綬乘驪駒從者十余人至門下馬命吾相見揖讓周旋手捧一牒授吾云貴主得吹塵之夢知君負命世之才欲遵南陽故事思殄邦仇使下臣持茲禮幣聊展敬于君子而冀再康國步幸不以三顧為勞也余不暇他辭唯稱不敢酬酢之際已見聘幣羅于階下鞍馬器甲錦彩服玩橐鞬之屬咸布列于庭吾辭不獲免遂再拜受之即相促登車所乘馬異常駿偉裝飾鮮洁仆御整肅倏忽行百餘里有甲馬三百騎已來迎候驅殿有大將軍之行李余亦頗以為得志指顧間望見一大城其雉堞穹崇溝洫深浚余惚恍不知所自俄于郊外備帳樂設享宴罷入城觀者如堵傳呼小吏交錯其間所經之門不記重數及至一處如有公署左右使余下馬易衣趨見貴主貴主使人傳命請以賓主之禮見余自謂既受公文器甲臨戎之具即是臣也遂堅辭具戎服入見貴主使人复命請去橐鞬賓主之間降殺可也余遂舍器仗而趨入見貴主坐于廳上余拜謁一如君臣之禮拜訖連呼登階余乃再拜升自西階見紅妝翠眉蟠龍髻鳳而侍立者數十余輩彈弦握管花異服而執役者又數十輩腰金拖紫曳組攢簪而趨隅者又非止一人也輕裘大帶白玉橫腰而森羅于階下者其數甚多次命女客五六人各有侍者十數輩差肩接跡累累而進余亦低視長揖不敢施拜坐定有大校數人皆令預坐舉酒進樂酒至貴主斂袂舉觴將欲興詞敘向來征聘之意俄聞烽燧四起叫噪喧呼云朝那賊步騎數萬人今日平明攻破堡寨尋已入界數道齊進煙火不絕請發兵救應侍坐者相顧失色諸女不及敘別狼狽而散及諸校降階拜謝佇立聽命貴主臨軒謂余曰吾受相公非常之急憫其孤煢繼發師徒拯其患難然以車甲不利權略是思今不棄弊陋所以命將軍者正為此危急也幸不以幽僻為辭少匡不迨遂別賜戰馬二疋黃金甲一副旌旗旄鉞珍寶器用充庭溢目不可胜計彩女二人給以兵符錫賚甚丰余拜捧而出傳呼諸將指揮部伍內外響應是夜出城相次探報皆云賊勢漸雄余素諳其山川地里形勢孤虛遂引軍夜出去城百餘里分布要害明懸賞罰號令三軍設三伏以待之遲明排布已畢賊汰其前功頗甚輕進猶謂孟遠之統眾也余自引輕騎登高視之見煙塵四合行陣整肅余先使輕兵搦戰示弱以誘之接以短兵且戰且行金革之聲天裂地坼余引兵詐北彼亦盡銳前趨鼓噪一聲伏兵盡起千里轉戰四面夾攻彼軍敗績死者如麻再戰再奔朝那狡童漏刃而去從亡之卒不過十余人余選健馬三十騎追之果生置于麾下由是血肉染草木脂膏潤原野腥穢蕩空戈甲山積賊帥以輕車馳送于貴主貴主登平朔樓受之舉國士民咸來會集引于樓前以禮責問唯稱死罪竟絕他詞遂令押赴都市腰斬臨刑有一使乘傳來自王所持急詔令促赦之曰朝那之罪吾之罪也汝可赦之以輕吾過貴主以父母再通音問喜不自胜謂諸將曰朝那妄動即父之命也今使赦之亦父之命也昔吾違命乃貞節也今若又違是不祥也遂命解轉使單騎送歸未及朝那已羞而卒于路余以克敵之功大被寵錫尋備禮拜平難大將軍食朔方一萬三千戶別賜第宅輿馬寶器衣服婢仆園林邸第旌旃鎧甲次及諸將賞賚有差明日大宴預坐者不過五六人前者六七女皆來侍坐風姿艷態愈更動人竟夕酣飲甚歡酒至貴主捧觴而言曰妾之不幸少處空閨天賦孤貞不從嚴父之命屏居于此三紀矣蓬首灰心未得其死鄰童迫脅幾至顛危若非相公之殊恩將軍之雄武則息國不言之婦及為朝那之囚耳永言斯惠終天不忘遂以七寶鐘酌酒使人持送鄭將軍余因避席再拜而飲余自是頗動歸心詞理懇切遂許給假一月宴罷出明日辭謝訖擁其麾下三十余人返于來路所經之處聞雞犬頗甚酸辛俄頃到家見家人聚泣靈帳儼然麾下一人令余促入棺縫之中余欲前而為左右所聳俄聞震雷一聲醒然而悟承符自此不事家產唯以後事付妻孥果經一月無疾而終其初欲暴卒時告其所親曰余本机鈐入用效節戎行雖奇功蔑聞而薄效粗立洎遭釁累譴謫于茲平生志氣郁而未申丈夫終當扇長風摧巨浪摧太山以壓卵決東海以沃螢奮其鷹犬之心為人雪不平之事吾朝夕當有所受與子分襟固不久矣其月十三日有人自薛舉城晨發十余里天初平曉忽見前有車塵競起旌旗煥赫甲馬數百人中擁一人氣概洋洋然逼而視之鄭承符也此人惊訝移時因佇于路左見瞥如風云抵善女湫俄頃悄無所見
