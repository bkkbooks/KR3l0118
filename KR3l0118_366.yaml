body:
  text: 杜元穎杜元穎杜無穎鎮蜀年資州方丈大石走行盤礡數畝新都縣大道觀老君旁泥人須生數寸拔之俄頃又出都下諸處有栗樹樹葉結實食之味如李鹿頭寺泉水涌出及貓鼠相乳之妖蠻欲圍城城西門水有人見一龍與水牛斗俄頃皆滅又說李樹上皆得木瓜而空中不實朱道士朱道士者大和八年常游廬山憩于澗石忽見蛇蛇如堆繒錦俄變為巨龜訪之山叟云是玄武朱道士又曾游青城山丈人觀至龍橋見岩下有枯骨背石平坐接手膝上鉤鎖附苔絡蔓色白如雪云祖父已常見鄭生俗傳人之死凡數日當有禽自柩中而出者曰殺大和中有鄭生者常于韅川與郡官略于野有网得一巨鳥色蒼高五尺余主將命解而視之忽無所見生驚即訪里中民訊之民有對者曰里中有人死且數日卜人言今日殺當去其家伺而視之有巨鳥色蒼自柩中出君之所獲果是乎天寶中京兆尹崔光遠因游略常遇一妖鳥事與此同也趙士宗會昌元年戎州水漲浮木塞江刺史趙士宗召水軍接木段公署卑小地窄不復用因并修開元寺后月余日有夷人逢一人如猴著故青衣亦不辨何制云關將軍遣來采木被此州接去不知為計要須明年卻來收夷人說于州人至二年七月天欲曙忽暴水至州城臨江枕山每大水猶去州五十余丈其時水高百丈漂二十余人州基地有陷十丈外大石如三間屋者積堆于州基水黑而腥至晚方退知州官虞藏及吏才及船投岸旬月后州水方干除大石外更無一物唯開元寺玄宗真容去舊處十余步卓立沙上其他鐵石一無有者曹朗進士曹朗文宗時任松江華亭令秩將滿于吳郡置一宅又買小青衣名曰花紅云其價八萬貌甚美其家皆憐之至秋受代令朗將其家人入吳郡宅后逼冬至朗緣新堂修理未畢堂內西間貯炭二百斤東間窗下有一榻新設茵席其上有修車細蘆席十領東行南廈西廊之北一房充庫一房即花紅及乳母一間充廚至除前一日朗姊妹乃親皆辦奠祝之用鐺中及煎三升許油旁堆炭火十余斤妹作餅家人并在左右獨花紅不至朗親意其惰寢遂召之至又無所執作朗怒笞之便云頭痛忽有大磚飛下幾中朗親俄又一大磚擊油鐺于是驚散廚中食器亂在階下日已晚俱入西舍遂移入堂并將小兒及扃堂門子母相依而坐汗流如水不諭其怪朗取炭數斤燃火俄又空中轟榻之聲火又空中上下忽見東窗下床上有一女子可年十四五作兩髻衣短黃襦褲跪于床似效人碾茶朗走起擒之繞屋不及逡巡匿蘆席積中朗又踏之啾然有聲遂失所在坐以至旦雞鳴方敢開門乳母花紅熟寢于西室朗召玉芝觀顧道士作法數日有人長吁曰吾是梁苑客枚皋前因節日求食于此君家不知云何見捕朗具茶酒引之與坐皋謂朗曰吾元和初游上元瓦棺閣第二層西隅壁上題詩一首朗苦請皋曰方心事無悰幸相悉他日到金陵可自録之足下之祟非吾所為其人不遠但問他人當自知朗遂白顧道士舍之里中有女巫朱二娘又召令占巫悉召家人出唯花紅頭痛未起巫強呼之出責曰何故如此娘子不知汝何不言遂拽其臂近肘有青脈寸余隆起曰賢聖宅于此夫人何故驚之花紅拜唯稱不由己朗懼減價賣之歷二家皆如此遂放之無所容身常于諸寺紉針以食后有包山道士申屠千齡過說花紅本是洞庭山人戶共買人家一女令守洞庭山廟后為洞庭觀拓北境二百餘步其廟遂除人戶賣與曹時用廟中山魅無所依遂與其類巢于其臂東吳人盡知其事籽兒彭城劉剌夫會昌中進士上第大中年授鄠縣尉卒妻王氏歸其家居洛陽敦化里第禮堂之后院咸通丁亥歲夜聚諸子侄藏鉤食煎餅廚在西廂小童籽兒持器下食時月晦云慘指掌莫分籽兒者忽失聲仆地而絶秉炬視之則體冷面黑口鼻流血矣擢發炙指少頃而蘇復令數夫束縕火循廊之北于倉后得所持器倉西則大廁廁上得一煎餅溷中復有一餅焉李約咸通丁亥歲隴西李夷遇為邠州從事有仆曰李約乃夷遇登第時所使也願捷善行故常令郵書入京其年秋七月李約自京還邠早行數坊鼓始絶倦憩古槐下時月映林杪余光尚明有一父皤然傴而曳杖亦來同止既坐而呻吟不絶良久謂約曰老夫欲至咸陽則蹣跚不能良行若有義心能負我乎約怒不應父請之不已約乃謂曰可登背父欣然而登約知其鬼怪也陰以所得哥舒棒自后束之而趨時及開遠門東方明矣父數請下約謂曰何相侮而見登何相憚而欲舍束之愈急父言語無次求哀請命約不答忽覺背輕有物墜地視之乃敗柩板也父已化去擲于里垣下后亦無咎張縝處士張縝多能善琴其妻早亡于江陵納妾甚麗未旬日主庖小青衣于灶下得一銅人長可一寸色如火須臾漸大長丈余形狀極異走入縝室取其妾食之毛發皆盡食訖漸小復如舊形入灶下而失馬舉常為山南步奏官間道入蜀時兵后僻路絶無人煙夜至一館聞東廊下有人語聲因往告之有應者云中堂有床自往宿去舉至中堂唯有土榻求火答云無火求席隔屋擲出一席可重十余斤舉亦壯士殊不介意中夜有一物如猴升榻而來舉以鐵椎急擊之叫呼而走及明告別其人怒去更云夜來見伊獨處令兒子往伴打得幾死舉推其門不可開自隙窺之積壤而已舉后為太原大將官至淮南節度使韋琛昭義從事韋琛幼年時尚在學院冬節夜捧書以歸及寢堂絶無人獨廚中有篝火烹油之所因窺之則鐺長數尺久而復低如是者三四琛大恐奔出于門方見其家悉于外寢營享奠之所矣琛神色慘栗且告之故家人咸叱之以為稚子妄語也俄頃廚中有主庖青衣就鐺作食仍映小兒于懷抱間兒踊身索哺因誤墜鐺中沸油涌溢青衣大叫火已及屋長幼奔救或沃以水焰則轉熾蓋膏水相激也乃雜擲瓮盎茵毯之類久之方滅火滅兒已焦矣闔室驚怖為之罷節青衣亦以此發悸而死張謀孫廣州副使張謀孫雖出于闒葺有口辨善心計纍為王府參佐咸通初從交廣辟遂為元寮性貪侈聚斂不倦南海多奇貨若犀象珠貝之類不可勝計及府罷北歸止于汝墳于郡西三十里郁陽驛南汝水之上構別業窮極華敞常鑿一池欲北引官渠水漲之或曰此處今年太歲所在也謀孫誡役夫曰掘得太歲則止明日及泉獲一土囊破之中有物升余色白如粟粒忽跳躍四散而隱謀孫遂中暴病信宿而死李黃渠州刺史李黃夏日憩于小廳見鼠穴中有一人長數寸執篲掃穴前而入有二人亦長三二寸舁一鑊添水爨薪須臾鑊前有一夜叉執鐵杈叉一人披紫袍執象笏長三二寸形色狀貌乃李也黃雖懼而不敢驚之乃咄黃脫衣入鑊中須臾而出黃衣服而入穴中又見一婦人出火中乃黃之孀婦寓嶽州久矣主鑊者挹黃娣入鑊中須臾又出娣服衣亦入穴中主鑊者亦入又二人舁鑊入而擁篲者又掃去其灰盡數日如此黃大憂遣訪其娣亦無恙數年方卒黃十余年方卒宋洵進士宋洵下第南歸兄波為金州石泉令洵以縣邑喧雜于縣東數里葺一山居未畢役者聞山石中有婦人語云宋三郎來矣及洵居之因月夜于書堂側屣步又自聞石中云宋三郎來矣駐步聽之石門忽開見婦人數輩再拜笑曰請三郎入來洵欲走為數輩所擒入其室石門遂閉仆夫急告波穿石求之終不能得張氏子唐文德中京官張忘其名寓蘇台子弟少年時往文人陸評事院往來為一美人所悅來往多時心疑之尋病瘠遇開元觀道士吳守元云有不祥之氣授一以符果一盟器婢子背書紅英字在空舍柱穴中因焚之其妖乃絶聞于劉山甫僧十朋劉建封寇豫章僧十朋與其徒奔分寧宿澄心僧院初夜見窗外有光視之見團火高廣數尺中有金車子與火俱行嘔軋有聲十朋始懼其主人云見之數年矣每夜必出于僧堂西北隅地中繞堂數周復沒于此以其不為禍福故無掘視之者宜春人天祐初有人游宜春止空宅中兵革之后井邑蕪沒堂西至梁上有小窗窗外隙荒數十畝日暮窗外有一物正方自下而上頃之全蔽其窗其人引弓射之應弦而落時已夕不能即視明旦尋之西百餘步有方杉板帶一矢即昨所射也朱從本李遇為宣州節度使軍政委大將朱從本本家廄中畜猴圉人夜起秣馬見一物如驢黑而毛手足皆如人据地而食此猴見人乃去猴已食其半明年遇族誅宣城故老云郡中常有此怪每軍城有變此物輒出出則滿城皆臭田頵將敗出于街中巡夜者見之不敢逼旬月禍及周本信州刺史周本入覲揚都舍于邸第遇私諱日獨宿外齊張燈而寐未熟聞室中有聲划然視之見火爐冉冉而升直傅于屋良久乃下飛灰勃然明日滿室浮埃覆物亦無他怪王宗信唐末蜀人攻岐還至于白石鎮裨將王宗信止普安禪院僧房時嚴冬房中有大禪爐熾炭甚盛信擁妓女十余人各据僧床寢息信忽見一姬飛入爐中宛轉于熾炭之上宗信忙遽救之及離火衣服并不焦灼又一姬飛入如前又救之頃之諸妓或出或入各迷悶失音有親吏隔驛牆告都招討使王宗儔宗儔至則徐入一一提臂而出視之衣裾纖毫不毀但驚悸不寐訊之云被胡僧提入火中所見皆同宗信大怒悉索諸僧立于前令妓識之有周和尚者身長貌胡皆曰是此也宗信遂鞭之數百云有幻術此僧乃一村夫新落發一無所解又縛手足欲取熾炭爇之宗儔知其屈遂解之使逸訖不知何妖怪薛老峰福州城中有鳥石山山有峰大鑿三字曰薛老峰癸卯歲一夕風雨聞山上如數千人喧噪之聲及旦則薛老峰倒立峰字反向上城中石碑皆自轉側其年閩亡歐陽璨三傳歐陽璨住徐州南五十里有故到城薄晚方回不一二里已昏瞑矣是夕陰晦約行三十里則夏雨大澍雷電震發路之半有山林夾道密林邃谷而多鷙獸生怖懼不已既達山路兩勢彌盛俄見巨物出于面前裁十余步長丈余色正白亦不辨首足之狀但導前而行生恐悸尤極口常諷大悲神咒欲朗諷之口已噤矣遂心存念之三數遍則能言矣誦之不輟俄失其妖去家漸近雨亦稍止自爾昏暝則不敢出庭戶之間矣
