body:
  text: 唐若山唐若山魯郡人也唐先天中歷官尚書郎連典劇郡開元中出為潤州頗有惠政遠近稱之若山嘗好長生之道弟若水為衡嶽道士得胎元谷神之要嘗徵入內殿尋懇求歸山詔許之若山素好方術所至之處必會爐鼎之客雖術用無取者皆禮而接之家財逮盡俸祿所入未嘗有餘金石所費不知紀極晚歲尤篤志焉潤之府庫官錢亦以市藥賓佐骨肉每加切諫若山俱不聽納一日有老叟形容羸瘠狀貌枯稿詣款謁自言有長生之道見者皆笑其衰邁若山見之盡禮加敬留止月餘所論皆非丹石之要若山博採方訣歌誦圖記無不研究問叟所長皆蔑如也復好肥鮮美酒珍饌品膳雖瘦削老叟而所食敵三四人若山敬奉承事曾無倦色一夕從容謂若山曰君家百口所給常若不足貴為方伯力尚多闕一旦居間何以為贍況帑藏錢帛頗有侵用誠為君憂之若山驚曰某理此且久將有交代亦常為憂而計無所出若緣此受譴固所甘心但慮一家有凍餒之苦耳叟曰無多慮也促命酒連舉數杯若山飲酒素少是日亦挹三四爵殊不覺醉心甚異之是夜月甚明朗徐步庭下良久謂若山曰可命一僕運鐺釜鐵器輩數事於藥室間使僕布席壘爐曰鼎鐺之屬為二聚熾炭加之烘然如窑窯不可向視叟於腰間解小瓠出二丹丸各投其一闔扉而出謂若山曰子有道骨法當度世加以篤尚正直性無忿恚仙家尤重此行吾太上真人也遊觀人間以度有心之士憫子勤志故來相度耳吾所化黃白之物一以留遺子孫旁濟貧乏一以支納帑藏無貽後憂便可命棹遊江為去世之計翌日相待於中流也言訖失其所在若山凌晨開閲所化之物爛然照屋復扃閉之即與賓客三五人整棹浮江將遊金山寺既及中流江霧晦冥咫尺不辨若山獨見老叟棹漁舟直抵舫側揖若山入漁舟中超然而去久之風波稍定昏霧開霽已失若山矣郡中几案間得若山訣別之書指揮家事又得遺表因以奏聞其大旨以世祿暫榮浮生難保惟登真脫屣可以後天為期昔范丞相泛舟五湖是知其主不堪同樂也張留侯去師四皓是畏其主不可久存也二子之去與臣不同臣運屬休明纍叨榮爵早悟升沉之理深知止足之規棲心玄關偶得丹訣黃金可作信淮王之昔言白日可延察真經之妙用既得之矣餘復何求是用揮手紅塵騰神碧海扶桑在望蓬島非遙遐瞻帝閽不勝犬馬戀主之至唐玄宗省表異之遽命優恤其家促召唐若水與內臣齎詔於江表海濱尋訪杳無音塵矣其後二十年有若山舊吏自浙西奉使淮南於魚市中見若山鬻魚於肆混同常人睨其吏而延之入陋巷中縈回數百步乃及華第止吏與食哀其久貧命市鐵二十梃明日復與相遇已化金矣盡以遺之吏姓劉今劉子孫世居金陵亦有修道者又相國李紳字公垂常習業於華山山齋糧盡徒步出谷求糧于遠方逮暮方還忽暴雨至避於巨巖之下雨之所沾若浼焉既及巖下見一道士艤舟於石上一村童擁楫而立與之揖道士笑曰公垂在此耶言語若深交而素未相識因問紳曰頗知唐若山乎對曰常覽國史見若山得道之事每景仰焉道士曰余即若山也將遊蓬萊偶值江霧維舟於此與公垂曩昔之分得暫相遇詎忘之耶乃攜紳登舟江霧已霽山峰如晝月光皎然其舟凌空泛泛而行俄頃已達蓬島金樓玉堂森列天表神仙數人皆舊友也將留連之中有一人曰公垂方欲佐國理務數畢乃還耳紳亦務經濟之志未欲棲止衆仙復命若山送歸華山後果入相連秉旌鉞去世之後亦將復登仙品矣出仙傳拾遺司命君司命君者常生於民間幼小之時與唐元瓌同學元瓌云君家世奉道晨夕香燭持高上消災經老君枕中經纍有祥異奇香瑞雲生於庭宇母因夢天人滿空皆長丈餘麾斾旌蓋蔭其居宅有黃光照其身若金色因孕之而生生即張目開口若笑之容幼而頴悟誦習詩書元瓌所不及十五六歲忽不知所之蓋遊天下尋師訪道矣不知師何人得神仙之訣寶應二年元瓌為御史充河南道採訪使至鄭州郊外忽與君相見君衣服藍縷容貌憔悴元瓌深憫之與語敘舊問其所學曰相別之後但修真而已邀元瓌過甚家留騎從於旅次相候君與元瓌同往引入市側門巷低小從者一兩人才入外門便閉從者不得入第二門稍寬廣又入一門屋宇甚大揖元瓌於門下先入為席良久出迎元瓌見其容狀偉爍可年二十許雲冠霞衣左右玉童侍女三五十輩皆非世所有元瓌莫之測相引升堂所設饌食珍美器皿瑰異雖王者宴賜亦所不及徹饌命酒君與妻同坐乃曰不可令侍御獨坐即召一人坐於元瓌之側元瓌視之乃其妻也奏樂酣飲既醉各散終不及相問言情遲明告別君贈元瓌金尺玉鞭出門行數里因使人訪其處無復蹤迹矣及還京問其妻曾有異事乎具言某日昏然思睡有黑衣人來稱司命君召某便隨去既至司命宮中見與君同飲所見歷然皆同不謬後十年元瓌奉使江嶺又於江西泊舟見君在岸上邀入一草堂又到仙境留連飲饌但音樂侍衛稍多於前皆非舊人矣及散贈元瓌一飲器如玉非玉不言其名自此敘別不復再見亦不知司命所主何事所修何道品位仙秩定何高卑復何姓字耳一日有胡商詣東都所居謂元瓌曰宅中有奇寶之氣願得一見元瓌以家物示之皆非也乃出司命所贈飲器與商起敬而後跪接之捧而頓首曰此天帝流華寶爵耳致於日中則白氣連天承以玉盤則紅光照宜即與元瓌就日試之白氣如雲鬱勃徑上與天相連日明鈔本日作曰夜更試之此不謬也此寶太上西北庫中鎮中華二十四寶也頃年已旋降今此第二十二寶亦不久留於人間即當飛去得此寶者受福七世敬之哉元瓌以玉盤承之夜視紅光滿室出仙傳拾遺玄真子玄真子姓張名志和會稽山陰人也博學能文擢進士第善書雲笈七籤一一三下書作畫飲酒三斗不醉守真養氣臥雪不寒入水不濡天下山水皆所遊覽魯國公顏真卿與之友善真卿為湖州刺史與門客會飲乃唱和為漁父詞其首唱即志和之詞曰西塞山邊白鳥飛桃花流水鱖魚肥青箬笠緑蓑衣斜風細雨不須歸真卿與陸鴻漸徐士衡李成矩共和二十五首遞相誇賞而志和命丹青剪素寫景天雲笈七籤一一三下天作夾詞須臾五本花木禽魚山水景像奇絶蹤迹今古無倫而真卿與諸客傳玩嘆服不已其後真卿東遊平望驛志和酒酣為水戲鋪席於水上獨坐飲酌笑詠其席來去遲速如刺舟聲復有雲鶴隨覆其上真卿親賓參佐觀者莫不驚異尋於水上揮手以謝真卿上升而去今猶有寶傳其畫在人間出續仙傳劉白雲劉白雲者揚州江都人也家富好義有財帛多以濟人亦不知有陰功修行之事忽在江都遇一道士自稱為樂子長家寓海陵曰子有仙籙天骨而流浪塵土中何也因出袖中兩卷書與之白雲捧書開視篇目方欲致謝子長嘆曰子先得變化而後受道此前定也乃指摘次第教之良久失子長所在依而行之能役致風雨變化萬物乃於襄州隔江一小山上化兵士數千人于其中結紫雲帳幄天人侍衛連月不散節度使于頔疑其妖幻使兵馬使李西華引兵攻之帳幄侍衛漸高弓矢不能及判官竇處約曰此幻術也穢之即散乃取尸穢焚於其下果然兵衛散去白雲乘馬與從者四十餘人走於漢水之上蹙波起塵如履平地追之不得謂追者曰我劉白雲也後於江西湖南人多見之彌更少年潔白時湖南刺史王遜好道白雲時來郡中忽一日別去謂遜曰將往洪州即與鍾陵相見一揖而行初不曉其旨辰發靈川午時已在湘潭人多識者驗其所行頃刻七百里矣旬日王遜果除洪州到任後白雲亦來相訪復於江都值樂真人曰爾周遊人間固有年矣金液九丹之經太上所敕令授於爾可選名嶽福地鍊而服之千日之外可以登雲天矣乾符中猶在長安市賣藥人有識之者但不可親炙無由師匠耳出仙傳拾遺
