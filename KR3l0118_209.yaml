body:
  text: 程邈已下程邈已下秦獄吏程邈善大篆得罪始皇囚於雲陽獄增減大篆篆體去其繁復始皇善之出為御史名書曰隸書扶風曹喜後漢人不知其官善篆隸小異李斯見師一時陳留蔡雍後漢人左中郎將善篆採喜之法真定直父碑文猶傳於世篆者師焉杜陵陳遵後漢人不知官善篆隸每書一坐皆驚時人謂為陳驚坐上谷王次仲後漢人作八分楷法師宜官後漢不知何許人宜官為大字方一丈小字方寸千言耿球碑是宜官書甚自矜重或空至酒家先書其壁觀者雲集酒因大售至飲足削書而退安定梁鵠後漢人官至選部尚書乃師宜官法魏武重之常以書懸帳中宮殿題署多是鵠手也出王僧虔名書録邯鄲淳已下陳留邯鄲淳為魏臨淄侯文學得次仲法法字原闕據法書要録補名在鵠後毛弘鵠弟子祕書八分皆傳弘法又有左子邑與淳小異亦有名京兆杜度為魏齊相始有草名安平崔瑗後漢濟北相亦善草書平符堅得摹崔瑗書王子敬去極似張伯英瑗子湜官至尚書亦能草弘農張芝高尚不仕善草書精徑絶倫家之衣帛必先書而後練臨池學書池水盡墨每書云匆匆不暇草時人謂為草聖芝弟昶漢黃門侍郎亦能草今世人所云芝書者多是昶也出王僧虔名書録薑詡已下薑詡梁宣田彥和及司徒韋誕皆伯英弟子並善草誕最優魏宮館寶器皆是誕書魏明帝起凌雲臺誤先釘榜而未之題以籠盛誕轆轤引上書之去地二十五丈誕甚危懼乃戒子孫絶此楷法子少季亦有能稱羅暉趙恭不詳何許人與伯英同時見稱西州而矜許自與衆頗惑之伯英與朱寬書自敘云上比崔杜不足下方羅趙有餘河間張起亦善草書不及崔張劉德升善為行書不詳何許人潁川鍾繇魏太尉同郡胡昭公車徵二家俱學於德升而胡書肥鍾書瘦有三體一曰銘石之書最妙者也二曰章程書三曰狎書相聞者也繇子會鎮西將軍絶能學人書改易鄧艾上章事莫有知者河東魏明鈔本魏作衛覬魏尚書僕射善草及古文略盡其妙草體微瘦而筆迹精熟覬子瓘為晉太保採芝法以覬法參之更為草稿稿是相聞書也瓘子恆亦善書博識古文字燉煌索靖張芝姊子孫晉征西司馬亦善草陳國何元公亦善草書吳人皇象能草世稱沉著痛快滎陽陳陳原作姊據法書要録改暢晉祕書令史善八分出名書録王羲之王羲之告誓文今之所傳即其稿本不具年月日朔其真本維永和十年三月癸卯九月辛亥劉禹錫嘉話録癸卯九月辛亥作癸卯朔九日辛亥此有脫誤而書亦真開元初潤州江寧縣瓦棺寺修講堂匠人於鴟吻內竹筒中得之與一沙門至八年縣丞李延業求得上歧王王以獻上留內不出或云其後卻借歧王十二年王家失火圖書悉為灰燼此書亦見焚矣出國史異纂王廙羲之之叔也善書畫嘗謂右軍曰吾諸事不足道唯書畫可法晉明帝師其畫王右軍學其書出尚書故實潞州盧東都頃年創造防秋館穿掘多蔡雍鴻都學所書石經後洛中人家往往有之王羲之借船帖書之尤工者也故山北盧匡寶惜有年盧公致書借之不得云只可就看未嘗借人也盧除潞州旌節在途才數程忽有人將書帖就盧求售閲之乃借船帖也驚異問之云盧家郎君要錢遣賣耳盧歎異移時不問其價還之後不知落於何人京師書儈孫盈者名甚著盈父曰仲容亦鑒書畫精於品目豪家所寶多經其手真偽無所逃焉公借船帖是孫盈所蓄人以厚價求之不果盧公時其急切減而賑之日久滿百千方得盧公韓太仲外孫也故書畫之尤者多閲而識焉出尚書故實桓玄晉書中有飲食名寒具者亦無注解處後於齊民要術並食經中檢得是今所謂䬼餅桓玄嘗盛陳法書名畫請客觀之客有食寒具不濯手而執書畫因有污玄不懌自是會客不設寒具出尚書故實褚遂良貞觀十年太宗謂魏徵曰世南沒後無人可與論書徵曰褚遂良後來書流甚有法則於是召見太宗嘗以金帛購王羲之書迹天下爭齎古書詣闕以獻時莫能辨其真偽遂良備論所出咸為證據一無舛誤十四年四月二十三日太宗為真草書屏風以示群臣筆力遒利為一時之絶購求得人間真行凡二百九十紙裝為七十卷草書二十紙裝為八十卷每聽政之暇時閲之嘗謂朝臣曰書學小道初非急務時或留心亦勝棄日凡諸藝未嘗有學而不得者也病在心力懈怠不能專精耳今人學古人之書殊不學其形勢唯在求其骨力得其形勢筆力自生出談賓録蘭亭真迹太宗酷學書法有大王真迹三千六百紙率以一丈二尺為一軸寶惜者獨蘭亭為最置於座側朝夕觀覽嘗一日附耳語高宗曰吾千秋萬歲後與吾蘭亭將去也及奉諱之日用玉匣貯之藏於昭陵出尚書故實王方慶龍朔二年四月高宗自書與遼東諸將許敬宗曰上謂鳳閣侍郎王方慶曰卿家合有書法方慶奏曰臣十代再從伯祖羲之先有四十餘紙貞觀十二年先臣進訖有一卷臣近已進訖臣十一代祖導十代祖導十代祖四字原闕據法書要録補洽九代祖詢八代祖曇首七代祖僧綽六代祖仲寶五代祖騫高祖規曾祖褒並九代三從伯祖晉中書令獻之以下二十八人書共十卷見在上御武成殿召群臣取而觀之仍令鳳閣舍人崔融作序自為寶章集以賜方慶朝野榮之出談賓録二王真迹開元十六年五月內出二王真迹及張芝張昶等書總一百六十卷付集賢院令集字拓兩本進賜諸王其書皆是貞觀中太宗令魏徵虞世南褚遂良等定其真偽右軍之迹凡得真行二百九十紙裝為七十卷草書二千紙裝為按上自右軍之迹至裝為共二十五字原闕據法書要録補八十卷小王張芝等迹各隨多少勒帙以貞觀字為印印縫及卷之首尾其草迹又令褚遂良真書小字帖紙影之其中古本亦有是梁隋官本者梁則滿騫徐僧權沈熾文朱隋則江總姚察等署記太宗又令魏褚等卷下更署名以記之其蘭亭本相傳云在昭陵玄宮中樂毅論長安中太平公主奏借出外拓寫因此遂失所在五年敕陸元悌魏哲劉懷信等檢校換褾每卷分為兩卷總見在有八十卷餘並失墜元悌又割去前代記署以己之名氏代焉玄宗自書開元二字為印記之右軍凡一百三十卷小王二十八卷張芝張昶各一卷右軍真行書惟有黃庭告誓等卷存焉又得滑州人家所藏右軍扇上真尚書宣示及小王行書白騎遂等二卷其書有貞觀年舊摽織成字出談賓録八體張懷瓘書斷曰篆籀八分隸書章草草書飛白行書通謂之八體而右軍皆在神品右軍嘗醉書數字點畫類龍爪後遂有龍爪書如科斗玉箸偃波之類諸家共二十五般出尚書故實李都李都荊南從事時朝官親熟自京寓書蹤甚惡李寄詩戲曰草緘千里到荊門章草縱橫任意論應笑鍾張虛用力卻教羲獻枉勞魂惟堪愛惜為珍寶不敢留傳誤子孫深荷故人相厚處天行時氣許教吞出抒情詩東都乞兒大曆中東都天津橋有乞兒無兩手以右足夾筆寫經乞錢欲書時先用擲筆高尺餘以足接之未嘗失落書迹官楷書不如也出酉陽雜俎盧弘宣李德裕作相日人獻書帖德裕得之執玩頗愛其書盧弘宣時為度支郎中有善書名召至出所獲者書帖令觀之弘宣持帖久之不對德裕曰何如弘宣有恐悚狀曰是某頃年所臨小王帖太尉彌重之出盧氏雜説嶺南兔嘗有郡牧得其皮使工人削筆醉失之大懼因剪己鬚為筆甚善更使為之工者辭焉詰其由因實對遂下令使一戶輸人鬚或不能致輒責其直出嶺南異物志
