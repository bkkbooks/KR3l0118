body:
  text: 卷第二百七十婦人一此卷宋板原闕豫考家藏諸書得十一人補之其餘闕文尚俟他日十山談愷志洗氏高涼人世為南越首領部落十餘萬幼賢明在父母家能撫循部衆壓服諸越高涼太守馮寶聞其志行娉為妻每與夫寶參決詞訟政令有序侯景反都督蕭勃徵兵入援遺刺史李遷仁召寶寶欲往氏疑其反止之後果反寶卒嶺表大亂氏懷集之百越晏然子僕尚幼以氏功封信都侯詔册氏為高涼郡太夫人賚繡幰油絡駟馬安車鼓吹麾幢旌節如刺史之儀僕卒百越號夫人為聖母王仲宣反夫人帥師敗之親披甲乘馬巡撫諸州嶺南悉定封譙國夫人幕府署長史官屬給印章便宜行事皇后賜以首飾及宴服一襲時番州總管趙納貪虐黎獠多亡叛夫人上封事論之敕夫人招慰夫人親載詔書自稱使者歷十餘州宣述德意所過皆降文帝賜夫人臨振縣湯沐邑卒諡誠敬洗氏高州保寧人也身長七尺多智謀有三人之力兩乳長二尺餘或冒熱遠行兩乳搭在肩上秦末五嶺喪亂洗氏點集軍丁固護鄉里蠻夷酋長不敢侵軼及趙陀稱王遍霸嶺表洗氏乃齎軍裝物用二百擔入覲趙陀大慰悅與之言時政及論兵法智辨縱橫陀竟不能折扙委其治高梁恩威振物鄰郡賴之今南道多洗姓多其枝流也衛敬瑜妻年十六而夫亡父母舅姑欲嫁之乃截耳為誓不許戶有巢燕常雙飛後忽孤飛女感其偏栖乃以縷繫腳為志後歲此燕果復來猶帶前縷妻為詩曰昔年無偶去今春又獨歸故人恩義重不忍更雙飛周迪妻某氏迪善賈往來廣陵會畢師鐸亂人相略賣以食迪飢將絶妻曰今欲歸不兩全君親在不可並死願見賣以濟君行迪不忍妻固與詣肆售得數千錢以奉迪至城門守者誰何疑其詒與迪至肆問狀見妻首已在於枅矣迪裹餘體歸葬之鄒待徵妻薄者武康尉自牧之女也從待徵官江陰袁朝亂待徵解印竄匿薄為賊所掠將汙之不從語家媼使報待徵曰我義不辱即死於水賊去得其尸義聲動江南聞人李華作哀節婦賦曰昔歲群盜並起橫行海浙江陰萬戶化為凝血無石不焚無玉不折峨峨薄媛炯然名節自牧之子鄒徵之妻玉德蘭姿女之英兮鄒也避禍伏於榛莽婉如之賓執為囚虜匍匐泥沙極望無睹出授官之告託垂白之姥姥感夫人爰達鄒君兵解求尸在於江濱哀風起為連波痛氣結為孤雲鳧雁為之哀鳴日月為之蒙昏端標移景而恆直徑芳貫霜而猶存知子莫如父誠哉長者之言奉天縣竇氏二女伯娘仲娘雖長於村野而幼有志操住與邠州接界永泰中草賊數千人持兵刃入其村落行剽劫聞二女有容色姊年十九妹年十六藏於巖窟間賊徒擬為逼辱乃先曳伯娘出行數十步又曳仲娘出賊相顧自慰行臨深谷伯娘曰我豈受賊汙辱乃投之於穀賊方驚駭仲娘又投於穀谷深數百尺姊尋卒仲娘腳拆面破血流被體氣絶良久而蘇賊義之而去京兆尹第五琦感其貞烈奏之詔旌表門閭長免丁役二女葬事官給京兆尹曹陸海首賦以美之烈女姓竇氏小字桂娘父良建中初為汴州戶曹掾桂娘美顏色讀書甚有文李希烈破汴州使甲士至良門取桂娘去將出門顧其父曰慎無戚戚必能滅賊使大人取富貴于天子桂娘既以才色在希烈側復能巧曲取信凡希烈之密雖妻子不知者悉皆得聞希烈歸蔡州桂娘謂希烈曰忠而勇一軍莫如陳仙奇其妻竇氏仙奇寵且信之願得相往來以姊妹敘齒因徐説之以堅仙奇之心希烈然之因以姊事仙奇妻嘗間謂曰賊凶殘不道遲晚必敗姊因早圖遺種之地仙奇妻然之興元元年四月希烈暴死其子不發喪欲盡誅老將校俾少者代之計未決有獻含桃者桂娘曰希烈子謂分遺仙奇妻且以示無事於外因為蠟帛書曰前日已死殯在後堂欲誅大臣須自為計次朱染帛丸如含桃仙奇發丸見之言於薛育曰兩日稱疾但怪樂曲雜發盡夜不絶此乃有謀未定示暇於外事不疑矣明日仙奇薛育各以所部兵譟於衙門請見希烈烈子迫出拜願去偽號一如李納仙奇曰爾悖逆天子有命因斬希烈妻及子函七首以獻陳尸於市後兩月吳少誠殺仙奇知桂娘謀因亦殺之大中五年兗州瑕丘縣人鄭神佐女年二十四先許適馳雄牙官李玄慶神佐亦為官健戍慶州時黨項叛神佐戰死其母先亡無子女以父戰歿邊城無由得還乃剪髮壞形自往慶州護父喪還至瑕丘縣進賢鄉馬青村與母合葬便廬於墳所手植松檜誓不適人節度使蕭俶以狀奏之曰伏以閭里之中罕知禮教女子之性尤昧義方鄭氏女痛結窮泉哀深陟岵投身沙磧歸父遺骸遠自邊陲得還閭里感蓼莪以積恨守丘墓以誓心克彰孝理之仁足勵貞方之節詔旌表門閭贊曰政教隆平男忠女貞禮以自防義不苟生彤管有煒蘭閨振聲關睢合雅始號文明盧夫人房玄齡妻也玄齡微時病且死諉曰吾病革君年少不可寡居善事後人盧泣入帷中剔一目示玄齡明無他會玄齡良愈禮之終身按妬婦記亦有夫人何賢於微時而妬於榮顯邪豫於是而有感玉英唐時符鳳妻也尤姝美鳳以罪徙儋州至南海為獠賊所殺脅玉英私之對曰一婦人不足以事衆男子請推一長者賊然之乃請更衣有頃盛服立於舟上罵曰受賊辱不如死遂自沉於海許升妻呂氏字榮升少為博徒不理操行榮嘗躬勤家業以奉養其姑數勸升修學每有不善輒流涕進規榮父積忿疾升乃呼榮欲改嫁之榮嘆曰命之所遭義無離二終不肯歸升感激自勵乃尋師遠學遂以成名尋被本州辟命行至壽春為盜所殺刺史尹耀捕盜得之榮迎喪於路聞而詣州請甘心讎人耀聽之榮乃手斷其頭以祭升靈所郡遭寇賊賊欲犯之榮踰垣走賊拔刀追之賊曰從我則生不從我則死榮曰義不以身受辱寇虜遂殺之是日疾風暴雨雷電晦冥賊惶懼叩頭謝罪乃殯葬之殷保晦妻封敖孫也名絢字景文能文章草隸保晦歷校書郎黃巢入長安共匿蘭陵里明日保晦逃賊悅封色欲取之固拒賊誘悅萬詞不答賊怒勃然曰從則生不然正膏我劍封罵曰我公卿子守正而死猶生也終不從逆賊手遂遇害保晦歸左右曰夫人死矣保晦號而絶高愍女名妹妹父彥昭事正己及納拒命質其妻子使守濮陽建中二年挈城歸河南都統劉玄佐屠其家時女七歲母李憐其幼請免死為婢許之女不肯曰母兄皆不免何賴而生母兄將被刑遍拜四方女問故答曰神可祈也女曰我家以忠義誅神尚何知而拜之問父所在西嚮哭再拜就死德宗駭嘆詔太常諡曰愍諸儒爭為之誄彥昭從玄佐救寧陵復汴州授潁州刺史朝廷録其忠居州二十年不徙卒贈陝州都督東越閩中有庸嶺高數十里其下北隰中有大蛇長七八丈圍一丈土俗常懼東治都尉及屬城長吏多有死者祭以牛羊故不得福或與人夢或喻巫祝欲得噉童女年十二三者都尉令長患之共求人家生婢子兼有罪家女養之至八月朝祭送蛇穴口蛇輒夜出吞嚙之纍年如此前後已用九女一歲將祀之募索未得將樂縣李誕家有六女無男其小女名寄應募欲行父母不聽寄曰父母無相留今惟生六女無有一男雖有如無女無緹縈濟父母之功既不能供養徒費衣食生無所益不如早死賣寄之身可得少錢以供父母豈不善耶父母慈憐不聽去終不可禁止寄乃行請好劍及咋蛇犬至八月朝便詣廟中坐懷劍將犬先作數石米餈蜜麨以置穴口蛇夜便出頭大如囷目如二尺鏡聞餈香氣先噉食之寄便放犬犬就嚙咋寄從後斫蛇因踊出至庭而死寄入視穴得其九女髑髏悉舉出吒言曰汝曹怯弱為蛇所食甚可哀愍於是寄女緩步而歸越王聞之聘寄為后拜其父為將樂令母及姊皆有賜賞自是東治無復妖邪之法其歌謠至今存焉漢源縣人義成妻壯年無子夫死將葬及先殯時含毒藥酒至未入墓時撫棺吞之而死乃為合葬焉時以狀聞有詔賜帛事見常琥國志唐工部尚書魏知古性雅正善屬文年七十卒於位妻蘇氏不哭比至香水洗浴唅襲訖舉聲一慟而絶與尚書同日合喪時奇其節以為前代未之有至德元年史思明未平衛州有婦人侯四娘等三人刺血謁於軍前願入義營討賊鄭路昆仲有為江外官者維舟江渚群偷奄至即以所有金帛羅列岸上而恣賊運取賊一不犯曰但得侍御小娘子足矣其女則美色賊潛知之矣骨肉相顧不知所以答女欣然請行其賊即具小舟載之而去謂賊曰君雖為偷得無所居與親屬焉然吾家衣冠族也既為汝妻豈以無禮見逼若達所止一會親族以託好仇足矣賊曰諾又指所偕來二婢曰公既以偷為名此婢不當有為公計不若歸吾家賊以貌美其言且順顧已無不可者即自鼓其棹載二婢而去女於是赴江而死梁末龍德壬午歲襄州都軍務鄒景溫移職于徐亦綰都軍之務有徑僕自恃拳勇獨與妻策驢以路至宋州東芒碭澤素多賊盜行旅或孤則鮮有獲免者其日與妻偕憩于坡之半雙柳樹下大吒曰聞此素多豪客豈無一人與吾曹決勝負乎言粗畢有五六盜自叢薄間躍出一夫自後雙手交抱搏而仆之其徒遽扼其喉抽短刃以斷之斯僕隨身兵刃略無所施蓋掩其不備也唯妻在側殊無惶駭但矯而大呼曰快哉今日方雪吾之恥也吾比良家之子遭其俘掠以致於此孰謂無神明也賊謂誠至而不殺與行李並二驢驅以南邁近五六十里至亳之北界達孤莊南而息焉莊之門有器甲蓋近戍巡警之卒也其婦遂徑入村人之中堂盜亦謂其謀食不疑也乃泣拜其總首且告其夫適遭屠戮之狀總首聞之潛召其徒俱時執縛唯一盜得逸械送亳城咸棄於市其婦則返襄陽還削為尼誓終焉之志南中有大帥世襲爵位然頗恣橫有善歌者與其夫自北而至頗有容色帥聞而召之每入輒與其夫偕至更唱迭和曲有餘態帥欲私之婦拒而不許帥密遣人害其夫而置婦于別室多其珠翠以悅其意逾年往詣之婦亦欣然接待情甚婉孌及就榻婦忽出白刃於袖中擒帥而欲刺之帥掣肘而逸婦逐之適有二奴居前闔其扉由是獲免旋遣人執之已自斷其頸矣
