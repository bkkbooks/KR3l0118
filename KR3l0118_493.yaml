body:
  text: 夏侯亶夏侯亶梁夏侯亶為九列家貧而好置樂妓無衣裝飾客至即令隔帘奏曲時人以帘為夏侯妓衣王肅后魏尚書令王肅字恭懿琅邪人肅齊雍州刺史奐之子贍學多通才辭美茂為齊祕書丞太和十八年北歸后魏時高祖新營洛邑凡所造制肅博識舊事大有裨益高祖甚重之常呼曰王生肅在江南之日聘謝氏女為妻及至京師復尚公主其后謝氏入道為尼亦來奔肅見肅尚主謝作五言詩以贈之其詩曰本為薄上蠶今作機上絲得絡逐勝去頗憶纏綿時公主代肅答謝云針是貫線物目中恆任絲得帛縫新去何能納故時肅甚悵恨遂造正覺寺以憩之李延實后魏太傅李延實者莊帝舅也永安中除青州刺史將行奉辭帝謂實曰懷磚之俗世號難治舅宜好用心副朝廷所委實答曰臣年迫桑榆氣同朝露人間稍遠日近松丘臣已久乞閒退陛下渭陽興念寵及老臣使夜行非人裁錦萬里謹奉明敕不敢失墮時黃門侍郎楊寬在帝側不曉懷磚之義私問舍人溫子升子升曰吾聞至尊兄彭城王作青州刺史聞其賓客從至青州者云齊土之民風俗淺薄虛論高談專在榮利太守初欲入境百姓皆懷磚叩頭以美其意及其代下還家以磚擊之言其向背速于反掌是以京師謠語曰獄中無系囚舍內無青州假令家道惡腸中不懷愁懷磚之義起在于此也穎川苟濟風流名士高鑒妙識獨出當世清河崔淑仁稱齊士大夫曰齊人者外矯庶幾內懷鄙吝輕同毛羽利等錐刀好馳虛譽阿附成名威勢所在促共歸之苟無所資隨即舍去言囂薄之甚也李義琛隴西人居于魏自咸陽主簿拜監察少孤貧唐初草創無復生業與再從弟義琰三從弟上德同居事從姑定省如親焉武德中俱進士共有一驢赴京次潼關大雨投逆旅主人鄙其貧辭以客多不納進退無所舍徙倚門旁有咸陽商客見而引之同舍多喑嗚商客曰此三人游學者今無所止奈何睹其狼狽乃引與同寐處數日方晴道開義琛等議鬻驢以一醉商客竊知固止之乃資以道糧琛既擢第歷任咸陽召商客與之抗禮商客不復識但悚懼遜退琛語其由乃悟因引升堂后任監察劉龍劉龍后名義節武德初進計于高祖曰今義師數萬并在京師樵薪貴而布帛賤若采街衢及苑中樹木作樵以易帛歲取數十萬匹又藏內繒絹每匹皆有余軸之饒使截剩物以供雜費動盈萬段矣高祖并從之裴玄智武德中有沙門信義習禪以三階為業于化度寺置無盡藏貞觀之后舍施錢帛金玉積聚不可勝計常使此僧監當分為三分一分供養天下伽藍增修之備一分以施天下饑餒悲田之苦一分以充供養無礙士女禮懺闐咽施舍爭次不得更有連車載錢絹舍而棄去不知姓名貞觀中有裴玄智者戒行精勤入寺灑掃積十數年寺內徒衆以其行無玷缺使守此藏后密盜黃金前后所取略不知數寺衆莫之覺也因僧使去遂便不還驚疑所以觀其寢處題詩云放羊狼頷下置骨狗前頭自非阿羅漢安能免得偷更不知所之度支郎貞觀中尚藥奏求杜若敕下度支有省郎以謝朓詩云坊州采杜若乃委坊州貢之本州曹官判云坊州不出杜若應由讀謝朓詩誤郎官做如此判事豈不畏二十八宿笑人耶太宗聞之大笑改授雍州司法虞世南太宗將致櫻桃于酅公稱奉則尊言賜則卑問于虞世南世南對曰昔梁武帝遺齊巴陵王稱餉從之尉遲敬德尉遲敬德善奪槊齊王元吉亦善用槊高祖于顯德殿前試之謂敬德曰聞卿善奪槊令元吉執槊去刃敬德曰雖加刃亦不能害于是加刃頃刻之際敬德三奪之元吉大慚虞世基虞世南兄世基與許敬宗父善心同為宇文化及所害封德彝時為內史舍人備見其事因謂人曰世基被戮世南匍匐以請代善心之死敬宗蹈舞以求生來恆侍中濟之弟弟兄相繼秉政時人榮之恆父護兒隋之猛將也時虞世南子無才術為將作大匠許敬宗聞之歎曰喊事之倒置乃至于斯來護兒兒為宰相虞世南男作木匠歐陽詢文德皇后喪百官坷率更令歐陽詢狀貌丑異衆指之中書舍人許敬宗見而大笑為御史所劾左授洪州司馬許敬宗太宗征遼作飛梯臨其城有應募為梯首者城中矢石如雨因競為先登英公李世績指之謂中書舍人許敬宗此人豈不大健敬宗曰非健要是未解思量帝聞將罪之元萬頃為遼東道管記作檄文譏議高麗不知守鴨緑之險莫離支報云謹聞命矣遂移兵守之萬頃坐是流于嶺南郭務靜滄州南皮丞郭務靜性糊涂與主簿劉思莊宿于逆旅謂莊曰從駕大難靜嘗從駕失家口三日于侍官幕下討得之莊曰公夫人在其中否靜曰若不在中更論何事又謂莊曰今大有賊昨夜二更后靜從外來有一賊忽從靜房內走出莊曰亡何物靜曰無之莊曰不亡物安知其賊靜曰但見其狼狽而走不免致疑耳唐臨唐臨性寬仁多恕常欲吊喪令家僮歸取白衫僮乃誤持余衣懼未敢進臨察之謂曰今日氣逆不宜哀泣向取白衫且止又令煮藥不精潛覺其故乃謂曰今日隱晦不宜服藥可棄之終不揚其過也蘇瑰李嶠子中宗常召宰相蘇瑰李嶠子進見二子皆僮年上迎撫于前賜與甚厚因語二兒曰爾宜憶所通書可謂奏吾者言之矣頲應之曰木從繩則正后從諫則聖嶠子亡其名亦進曰斫朝涉之脛剖賢人之心上曰蘇瑰有子李嶠無兒婁師德天后朝宰相婁師德溫恭謹慎未嘗與人有毫發之隙弟授代州刺史戒曰吾甚憂汝與人相競弟曰人唾面亦自拭之而去師德曰只此不了凡人唾汝面其人怒也拭之是逆其心何不待其自干而其保身遠害皆類于此也又則天禁屠殺頗切吏人弊于蔬菜師德為御史大夫因使至于陝廚人進肉師德曰敕禁屠殺何為有此廚人曰豺咬殺羊師德曰大解事豺乃食之又進鱠復問何為有此廚人復曰豺咬殺魚師德因大叱之智短漢何不道是獺廚人即云是獺師德亦為荐之李晦李晦為雍州長史私第有樓下臨酒肆其人嘗候晦言曰微賤之人雖則禮所不及然家有長幼不欲外人窺之家逼明公之樓出入非便請從此辭晦即日毀其樓宋之問天后朝求為北門學士不許作明河篇以見其意詩云明河可望不可親願得乘槎一問津更將織女支機石還訪城都賣卜人則天見其詩謂崔融曰吾非不知之問有才調但以其有口過蓋以之問患齒疾口常臭故也之問終身慚憤陸元方陸元方為鸞台鳳閣侍郎居相國則天將有遷除必先訪之元方密以進不露其恩人莫之知者先所奏進狀章緘于函中子弟未嘗見臨終命焚之曰吾陰德于人多矣其后福必不衰也吾本當壽但以領選曹銓擇流品吾傷心神耳言畢而終陳希閔司刑司丞陳希閔以非才任官庶事凝滯司刑府史目之為高手筆言秉筆之額半日不下故名高手筆又號按孔子言竄削至多紙面穿穴故名按孔李詳李詳字審己趙郡人祖機衡父穎代傳儒素詳有才華膽氣放蕩不羈解褐鹽亭尉詳在鹽亭因考為録事參軍所擠詳謂刺史曰録事恃糾曹之權當要害之地為其妄褒貶耳若使詳秉筆亦有其詞刺史曰公試論録事考狀遂授筆詳即書録事考曰怯斷大按好勾小稽自隱不清言他總濁階前兩競斗困方休獄里囚徒非赦不出天下以為談笑之最焉
