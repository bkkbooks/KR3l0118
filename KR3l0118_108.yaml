body:
  text: 何軫何軫何軫以鬻販為業妻劉氏少斷酒肉常持金剛經先焚香像前願年止四十五臨終心不亂先知死日至唐大和四年冬四十五矣悉捨資裝供僧欲入歲遍別親故何軫以為病魅不信至歲除日請僧授入關沐浴更衣獨處一室趺坐高聲念經及辨色悄然兒女排室看之已卒頂熱灼手軫以僧禮塔葬在荊州北部出酉陽雜俎王殷蜀左營卒王殷常讀金剛經不茹葷飲酒為賞設庫子前後為人誤纍合死者數四皆非意得免至唐大和四年郭釗鎮蜀郭性嚴急小不如意皆死王殷因呈錦纈郭嫌其惡弱令袒背將斃之郭有蕃狗隨郭臥起非使宅人逢之輒噬忽吠聲立抱王殷之背驅逐不去郭異之怒遂解出酉陽雜俎王翰唐大和五年漢州什邡縣百姓王翰常在市日逐小利忽暴卒經三日卻活云冥中有十六人同被追十五人散配他處翰獨至一司見一青衫少年稱是己侄為冥官廳子遂引見推典又云是己兄貌皆不類其兄語云有冤牛一頭訴爾燒畬枉燒殺之又曾賣竹與殺狗人作箜篌殺狗二頭狗亦訴爾爾今名未注死籍尤可以免為作功德翰欲為設齊及寫法華經金光明經皆曰不可乃請曰持金剛經七遍與之其兄喜曰足矣及活遂捨業出家出酉陽雜俎寧勉寧勉者雲中人年少有勇氣善騎射能以力格猛獸不用兵仗北都守健其勇署為衙將後以兵四千軍於飛狐城時薊門帥驕悍棄天子法反書聞闕下唐文宗皇帝詔北都守攻其南詔未至而薊門兵夜伐飛狐鉦鼓震地飛狐人洶然不自安謂寧勉曰薊兵豪健不可敵今且至矣其勢甚急願空其邑以遁去不然旦暮拔吾城吾不忍父子兄弟盡血賊刃下悔寧可及雖天子神武安能雪吾冤乎幸熟計之勉自度兵少固不能折薊師之鋒將聽邑人語慮得罪於天子欲堅壁自守又慮一邑之人悉屠於賊手憂既甚而策未決忽有諜者告曰賊盡潰矣有棄甲在城下願取之勉即登城垣望時月明朗見賊兵馳走顛躓者不可數若有大兵擊其後勉大喜開邑門縱兵逐之生擒數十人得遺甲甚多先是勉好浮圖氏常閲佛書金剛經既敗薊師擒其虜以訊焉虜曰向夕望見城上有巨人數四長二丈餘雄俊可懼怒目呿吻袒裼執劍薊人見之慘然汗栗即走避又安有鬥心乎勉悟巨人乃金剛也益自奇之勉官御史中丞後為清塞副使出宣室志倪勤梓州人唐大和五年以武略稱因典涪州興教倉素持金剛經倉有廳事面江甚為勝概乃設佛像而讀經其中六月九日江水大漲惟不至此廳下勤讀誦益勵洎水退周視數里室屋盡溺唯此廳略不沾漬倉亦無傷人皆禮敬出報應記高涉唐大和七年冬給事中李石為太原行軍司馬孔目高涉因宿使院鼕鼕鼓起時詣鄰房忽遇一人長六尺餘呼曰行軍喚爾涉遂行行稍遲其人自後拓之不覺向北約行數十里至野外漸入一谷底後上一山至頂四望邑屋盡在眼下至一曹司所追者呼云追高涉到其中人多朱緑當按者似崔行信郎中判云付司對復至一處數百人露坐與豬羊雜處領至一人前乃涉妹壻杜則也逆謂涉曰君初得書手時作新人局遣某買羊四口記得否今被相責意甚苦毒涉遽云爾時祗使市肉非羊也則遂無言因見羊人立嚙則逡巡被領他去倏忽又見一處露架方梁梁上釘大鐵環有數百人皆持刀以繩繫人頭牽入環中刳剔之涉懼走出但念金剛經倏忽逢舊相識楊演云李說尚書時杖殺賊李英道為劫賊事已於諸處受生三十年今卻訴前事君常記得否涉辭己年幼不省又遇舊典段怡先與涉為義兄弟逢涉云弟先念金剛經莫廢忘否向來所見未是極苦處勉樹善業今得還亦經之力因送至家如夢死已經宿向拓處數日青腫出酉陽雜俎張政邛州人唐開成三年七月十五日暴亡初見四人來捉行半日至大江甚闊度深三尺許細看盡是膿血便小聲念金剛經使者色變入城見胡僧長八尺餘罵使者曰何不依帖亂捉平人盡皆驚拜及領見王僧與對坐曰張政是某本宗弟子被妄領來王曰待略勘問僧色怒王判放去見使者四人皆著大枷僧自領政出城不見所渡之水僧曰吾是汝所宗和尚汝識我否我是須菩提乃知是持經之力再三拜禮僧曰弟子合眼僧以杖一擊不覺失聲乃活死已三日唯心上暖出報應記李琚唐李琚成都人大中九年四月十六日忽患疫疾恍惚之際見一人自稱行病鬼王罵琚云抵犯我多未領汝去去原本作云據明鈔本改明日復共三女人同來速設酒食皆我妻也琚亦酬酢曰汝何得三妻但聞呵叱啾唧不睹人也卻四度來至二十一日辭去琚亦拜送卻回便覺身輕於佛堂作禮將喫粥卻行次忽被風吹去住足不得乃至一大山見江海無涯人畜隨琚立岸邊不知所向良久有黃衫人問曰公是何人隨我來才四五步已見江山甚遠又問作何善事若無適已於水上作豬羊等也細說恐王問琚云在成都府曾率百餘家於淨衆寺造西方功德一堵為大聖慈寺寫大藏經已得五百餘卷兼慶讚了使者引去約五十里見一大城入門數里見殿上僧長六七尺語王云此人志心造善無有欺諂王詰黃衫人如何處得文帖追平人來答云山下見領來無帖追王云急送去便見所作功德在殿上碑記分明石壁造廣利方在後使者領去又入一院令坐向琚說緣漢州刺史韋某亡欲令某作刺史琚都不諭六七日已來放歸凡過十二處皆云王院悉有侍衛總云與寫一卷金剛經遂到家使人臨別執手亦曰乞一卷金剛經便覺頭痛至一塔下聞人云我是道安和尚作病卓頭兩下願得爾道心堅固遂醒見觀音菩薩現頭邊立笑自此頓寤妻兒環哭云沒已七日唯心上暖寫經與所許者自誦不怠出報應記巴南宰巴南宰韋氏常念金剛經唐光化中至泥溪遇一女人著緋衣挈二子偕行同登山嶺行人相駐叫噪見是赤狸大蟲三子母也逡巡與韋分路而去韋終不覺是持經之力也出述異記明鈔本作出北夢瑣言元初唐元初九江人販薪於市年七十常持金剛經晚歸江北中流風浪大起同涉者俱沒唯初浮於水上即漂南岸群舟泊者悉是大商見初背上光高數尺意其貴人既得活爭以衣服遺之及更召以與飯語漸熟乃知村叟因詰光所自云某讀金剛經五十年矣在背者經也前後厄難無不獲免知是經之力也出報應記兗州軍將乾符中兗州節度使崔尚書法令嚴峻嘗有一軍將衙參不到崔大怒令就衙門處斬其軍將就戮後顏色不變衆咸懼之是夜三更歸家妻子驚駭謂是鬼物軍將曰初遭決斬時一如醉睡無諸痛苦中夜覺身倒街中因爾還家妻子罔知其由明旦入謝崔驚曰爾有何幻術能致軍將云素無幻術自少讀金剛經日三遍昨日誦經所以過期崔問記得斬時否云初領到戟門外便如沉醉都不記斬時崔又問所讀經何在云在家鎖函子內及取到鎖如故毀鎖見經已為兩斷崔大驚自悔慰安軍將仍賜衣一襲命寫金剛經一百卷供養今兗州延壽寺門外蓋軍將衙門就法并斬斷經之像至今尚存出報應記楊復恭弟唐內臣姓楊忘其名復恭之弟也陷秦宗權鹿晏洪劉巨容賊內二十餘年但讀金剛經雖在城中未嘗廢會宗權男為襄陽節度使楊為監軍使楊因人心危懼遂誘麾下將趙德言攻殺宗權男發表舉德言為節度使由是軍府稍定民復舊業矣楊於課誦之功益加精勵嘗就牙門外柳樹下焚香課誦之次欻有金字金剛經一卷自空中飛下楊拜捧而立震駭心目得非信受精虔獲此善報也故陷於賊黨二十年間終能梟巨盜立殊勳克保福祿者蓋佛之冥祐也出報應記蔡州行者唐宋汶牧黃州日秦宗權阻命作亂將欲大掠四境蔡州有念金剛經行者郡人咸敬之宗權差為細作令入黃州探事行者至黃州未逾旬為人告敗宋汶大怒令於軍門集衆決殺忽報有加官使到將校等上言方聞喜慶不欲遽行殺戮由是但令禁錮逾月使臣不到又命行刑出狴牢次報使入境復且停止使已發引出就刑值大將入衙見之遽白於宋曰黃州士馬精彊城壘嚴峻何懼姦賊窺覘細作本非惡黨受制於人將軍曲貸性命足示寬恕汶然之命髡髮負鉗緣化財物造開元新寺寺宇將就之一夜夢八金剛告日負鉗僧苦行如此締構既終盍釋其鉗以旌善類汶覺大異之遂令釋鉗待以殊禮自後一州悉呼為金剛和尚出報應記販海客唐有一富商恆誦金剛經每以經卷自隨嘗賈販外國夕宿於海島衆商利其財共殺之盛以大籠加巨石并經沉於海平明衆商船發而夜來所治之島乃是僧院其院僧每夕則聞人念金剛經聲深在海底僧大異之因命善泅者沉於水訪之見一老人在籠中讀經乃牽挽而上僧問其故云被殺沉於海不知是籠中忽覺身處宮殿常有人送飲食安樂自在也衆僧聞之悉普加讚歎蓋金剛經之靈驗遂投僧削髮出家於島院出報應記
