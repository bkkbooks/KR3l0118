body:
  text: 利俗坊民利俗坊民長慶初洛陽利俗坊有民行車數兩將出長夏門有一人負布囊求寄囊于車中且戒勿妄開因返入利俗坊才入有哭聲受寄者因發囊視之其口結以生綆內有一物其狀如牛胞及黑繩長數尺民驚遽斂結之有頃其人亦復曰我足痛欲憩君車中行數里可乎民知其異乃許之其人登車覽囊不悅顧謂民曰君何無信民謝之又曰我非人冥司俾豫録五百人明歷陝虢晉絳及至此人多蟲唯得二十五人耳今須往徐泗又曰君曉豫言蟲乎患赤瘡即蟲耳車行二里遂辭有程不可久留君有壽不復憂矣忽負囊下車失所在其年夏諸州人多患赤瘡亦有死者太原部將長慶中裴度為北部留守有部將趙姓者病熱且甚其子煮藥于室既置藥于鼎中搆火趙見一黃衣人自門來止于藥鼎傍挈一囊囊中有藥屑其色潔白如麥粉狀已而致屑于鼎中而去趙告其子子曰豈非鬼乎是欲重吾父之疾也遂去藥趙見向者黃衣人再至又致藥屑于鼎中趙惡之亦命棄去復一日晝寢其子又煮藥藥熟而趙寤遂進以飲之後數日果卒成公逵李公顏居守北都時有部將成少儀者其子曰公逵常夢一白衣人入曰地府命令我召汝逵拒之使者曰冥官遣召一屬龍人汝既屬龍何以逃之公逵紿曰某非屬龍者君何為見誣使者稍解顧曰今捨汝歸當更召屬龍者公逵驚寤且以其夢白於少儀少儀有卒十餘人常在其門下至明日一卒無疾而卒少儀因訊其年其父曰屬龍果公逵之所夢也送書使者昔有送書使者出蘭陵坊西門見一道士身長二丈餘長髯危冠領二青裙羊髻亦長丈餘各擔二大甕甕中數十小兒啼者笑者兩兩三三自相戲樂既見使者道士回顧羊髻曰庵庵羊髻應曰納納甕中小兒齊聲曰嘶嘶一時北走不知所之臧夏上都安邑坊十字街東有陸氏宅製度古醜人常謂凶宅後有進士臧夏僦居其中與其兄咸嘗晝寢忽夢魘良久方寤曰始見一女人緑裙紅袖自東街而下弱質纖腰如霧濛花收泣而云聽妾一篇幽恨之句其辭曰卜得上峽日秋天風浪多江陵一夜雨腸斷木蘭歌踏歌鬼長慶中有人於河中舜城北鸛鵲樓下見二鬼各長三丈許青衫白袴連臂踏歌曰河水流溷溷山頭種蕎麥兩箇胡孫門底來東家阿嫂決一百言畢而沒盧燕長慶四年冬進士盧燕新昌里居晨出坊北街槐影扶疏殘月猶在見一婦人長三丈許衣服盡黑驅一物狀若羝羊亦高丈許自東之西燕惶駭却走婦人呼曰盧五見人莫多言竟不知是何物也李湘盧從史以左僕射為澤潞節度使坐與鎮州王承宗通謀貶歡州賜死於康州寶曆元年蒙州刺史李湘去郡歸闕自以海隅郡守無臺閣之親一旦造上國若滄海泛扁舟者聞端溪縣女巫者知未來之事維舟召焉巫曰某乃見鬼者也見之皆可召然鬼有二等有福德者精神俊爽往往自與人言貧賤者氣劣神悴假某以言事盡在所遇非某能知也湘曰安得鬼而問之曰廳前楸樹下有一人衣紫佩金者自稱澤潞盧僕射可拜而請之湘乃公服執簡向樹而拜女巫曰僕射已答拜湘遂揖上階空中曰從史死於此廳為弓弦所迫今尚惡之使君牀上弓幸除去之湘命去焉時驛廳副階上唯有一榻湘偶忘其貴將坐問之女巫曰僕射官高何不延坐乃將吏視之僕射大怒去矣急隨拜謝或肯却來湘匍匐下階問其所向一步一拜凡數十步空中曰公之官未敵吾軍一裨將奈何對我而自坐湘再三辭謝巫曰僕射回矣於是拱揖而行及階巫曰僕射上矣別置榻設裀褥以延之巫曰坐矣湘乃坐空中曰使君何所問對曰湘遠官歸朝伏知僕射神通造化識達未然乞賜一言示其榮悴空中曰大有人接引到城一月當刺梧州湘又問不復言湘因問曰僕射去人寰久矣何不還生人中而久處冥寞曰吁是何言哉人世勞苦萬愁纏心盡如燈蛾爭撲名利愁勝而髮白神敗而體羸方寸之間波瀾萬丈相妬相賊猛如豪獸吾已免離下視湯火豈復低身而臥其間乎且夫據其生死明晦未殊學仙成敗則無所異吾已得鍊形之術也其術自無形而鍊成三尺之形則上天入地乘雲駕鶴千變萬化無不可也吾之形所未圓者三寸耳飛行自在出幽入明亦可也萬乘之主不及吾況平民乎湘曰鍊形之道可得聞乎曰非使君所宜聞也復問梧州之後終不言乃去湘至京以奇貨求助助者數人未一月拜梧州剌史竟終于梧州盧所以不復言其後事也歟馬震扶風馬震居長安平康坊正晝聞扣門往看見一賃驢小兒云適有一夫人自東市賃某驢至此入宅未還賃價其家實無人來且付錢遣之經數日又聞扣門亦又如此前後數四疑其有異乃置人於門左右日日候之是日果有一婦人從東乘驢來漸近識之乃是震母亡十一年矣葬于南山其衣服尚是葬時者震驚號奔出已見下驢被人覺不暇隱滅震逐之環屏而走既而窮迫入馬廄中匿身後墻而立馬生連呼竟不動遂牽其裾卒然而倒乃白骨耳衣服儼然而體骨具足細視之有赤脈如紅線貫穿骨間馬生號哭舉扶易之往南山驗其墳域如故發視棺中已空矣馬生遂別卜遷窆之而竟不究其理劉惟清平陰北把關南禦並山濱濟空闊百里無人居地勢險厄用兵者先據此為勝迄今天陰日暮鬼怪往往而出長慶三年春平盧節度使薛蘋遣衙門將劉惟清使于東平途出於此時日已落忽於野次遙見幕幄營伍旌旗人馬甚衆煙火極遠惟清少在戎旅計其部分可五六萬人也惟清不知甚駭之俄有輜重鼓角部隊紛紜或歌或語喧然競進惟清乃緩轡出於其中忽有衣縗者徒行叩惟清將奪馬惟清與之力爭因躍馬絶道而縗者執之愈急惟清有膂力以所執鐵鞭連箠其背縗者不甚拒良久捨去惟清復路則向之軍旅已過矣夜闌方及前驛會同列將渾釗自滑使還亦館於此聞惟清至迎之則惟清冥然無所知衆扶持環視久之乃寤遂話此事不二三日至東平既就館亦不為他人道先是東平有術士皇甫喈者落魄不仕衣屩藍縷衆甚鄙之一日惟清出遊喈於途中遙指曰劉押衙惟清素衣未識因與相欸喈曰本恐他人取馬故牽公避道奈何却以鐵鞭相苦賴我金鎧在身不爾巨力堅策豈易當哉笑而竟去惟清從人辭謝將問其故喈躍入稠人中不可復見後四年李同捷反於滄景時大下兵皆由平陰以入賊境豈陰兵先致討歟董觀太原人善陰陽占候之術唐元和中與僧靈習善偕適吳楚間習道卒觀亦歸并州寶曆中觀遊汾涇至泥陽郡會于龍興寺堂宇宏麗有經書千百編觀遂留止期盡閲乃還先是院之東廡北室空而扃鐍觀因請居寺僧不可曰居是室者多病或死且多妖異觀少年恃氣力曰某願得之遂居焉旬餘夜寐輒有胡人十數挈樂持酒來歌笑其中若無人如是數夕觀雖懼尚不言于寺僧一日經罷時已曛黑觀怠甚閉室而寢未熟忽見靈習在榻前謂觀曰師行矣觀驚且恚曰師鬼也何為而至習笑曰子運窮數盡故我得以候子即牽觀袂去榻觀回視見其身尚偃如寢熟乃歎曰嗟乎我家遠父母尚在今死此誰蔽吾尸耶習曰何子之言失而憂之深乎夫所以為人者以其能運手足善視聽而已此精魂扶之使然非自然也精魂離身故曰死是以手足不能為視聽不能施雖六尺之軀尚安用乎子寧足念觀謝之因問習常聞我教中有陰去身者誰為耶習曰吾與子謂死而未更生也遂相與行其所向雖關鍵甚嚴輒不礙於是出泥陽城西去其地多草茸密紅碧如毳毯狀行十餘里一水廣不數尺流而西南觀問習習曰此俗所謂奈河其源出於地府耶觀即視其水皆血而腥穢不可近又見岸上有冠帶袴襦凡數百習曰此逝者之衣由此趨冥道耳又望水西有二城南北可一里餘草樹蒙蔽廬舍駢接習與觀曰與子俱往彼君生南城徐氏為次子我生北城侯氏為長子生十年當重與君捨家歸佛氏觀曰吾聞人死當為冥官追捕案籍罪福苟平生事行無大過然後更生人間今我死未盡夕遂能如是耶曰不然冥途與世人無異脫不為不道寧桎梏可及身哉言已習即牽衣躍而過觀方攀岸將下水豁然而開廣丈餘觀驚眙惶惑忽有牽觀者觀回視一人盡體皆毛狀若獅子其貌即人也良久謂觀曰師何往曰往此南城耳其人曰吾命汝閲大藏經宜疾還不可久留遂持觀臂急東西指郡城而歸未至數里又見一人狀如前召觀者大呼曰可持去將無籍頃之逐至寺時天以曙見所居室有僧數十擁其門視己身在榻二人排觀入門忽有水自上沃其體遂寤寺僧曰觀卒一夕矣於是具以事語僧後數日于佛宇中見二土偶人像為左右侍乃觀前所見者觀因誓心精思留閲藏經雖寒暑無少墮凡數年而歸時寶曆二年五月十五也會昌中詔除天下佛寺觀亦斥去後至長安以占候遊公卿門言事往往而中常為沂州臨沂縣尉余在京師聞其事于觀也錢方義殿中侍御史錢方義故華州剌史禮部尚書徽之子寶曆初獨居長樂第夜如廁僮僕從者忽見蓬頭青衣數尺來逼方義初懼欲走又以鬼神之來走亦何益乃強謂曰君非郭登耶曰然曰與君殊路何必相見常聞人若見君莫不致死豈方義命當死而見耶方義家居華州女兄衣佛者亦在此一旦溘死君手命不敢惜顧人弟之情不足能相容面辭乎蓬頭者復曰登非害人出亦有限人之見者正氣不勝自致夭橫非登殺之然有心曲欲以託人以此久不敢出惟貴人福祿無疆正氣充溢見亦無患故敢出相求耳方義曰何求對曰登久任此職積效當遷但以福薄須人助貴人能為寫金字金剛經一卷一心表白回付與登即登之職遂乃小轉必有後報不敢虛言方義曰諾蓬頭者又曰登以陰氣侵陽貴人雖福力正強不成疾病亦當有少不安宜急服生犀角生玳瑁麝香塞鼻則無苦方義至中堂悶絶欲倒遽服麝香等并塞鼻則無苦父門人王直方者居同里久於江嶺從事飛書求得生犀角又服之良久方定明旦選經工令寫金字金剛經三卷令早畢功功畢飯僧回付郭登後月餘歸同州別墅下馬方憩丈人有姓裴者家寄鄂渚別已十年忽自門入徑至方義階下方義遂遽拜之丈人曰有客且出門遂前行方義從之及門失之矣見一紫袍象笏導從緋紫吏數十人俟於門外俯視其貌乃郭登也斂笏前拜曰斃職當遷只消金剛經一卷貴人仁念特致三卷今功德極多超轉數等職位崇重爵位貴豪無非貴人之力雖職已驟遷其廚仍舊頃者當任實如鮑肆之人今既別司復求就食方知前苦殆不可堪貴人量察更為轉金剛經七遍即改廚矣終身銘德何時敢忘方義曰諾因問丈人安在曰賢丈江夏寢疾今夕方困神道求人非其親導不可自已適詣先歸耳又曰廁神每月六日例當出巡此日人逢必致災難人見即死見人即病前者八座抱病六旬蓋言登巡畢將歸瞥見半面耳親戚之中遞宜相戒避之也又曰幽冥吏人薄福者衆無所得食率常受餓必能食推食泛祭一切鬼神此心不忘咸見斯衆暗中陳力必救災厄方義曰晦明路殊偶得相遇每一奉見數日不平意欲所言幸於夢寐轉經之請天曙為期唯唯而去及明因召行敬僧念金剛經四十九遍及明祝付與郭登功畢夢曰本請一七數又六之纍計其功食天廚矣貴人有難當先奉白不爾不來黷也泛祭之請記無忘焉
