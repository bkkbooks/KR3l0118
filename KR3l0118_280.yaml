body:
  text: 煬帝煬帝武德四年東都平後觀文殿寶廚新書八千許卷將載還京師上官魏夢見煬帝大叱云何因輒將我書向京師于時太府卿宋遵貴監運東都調度乃於陝州下書著大船中欲載往京師於河值風覆沒一卷無遺上官魏又夢見帝喜云我已得書帝平存之日愛惜書史雖積如山丘然一字不許外出及崩亡之後神道猶懷愛吝按寶廚新書者並大業所祕之書也豆盧榮上元初豆盧榮為溫州別駕卒榮之妻即金河公主女也公主嘗下嫁辟葉辟葉內屬其王卒公主歸來榮出佐溫州公主隨在州數年寶應初臨海山賊袁朝攻下台州公主女夜夢一人被髮流血謂曰溫州將亂宜速去之不然必將受禍及覺説其事公主云夢想顛倒復何足信須臾而寢女又夢見榮謂曰適被髮者即是丈人今為陰將浙東將敗欲使妻子去耳宜遵承之無徒戀財物女又白公主説之時江東米貴唯溫州米賤公主令人置吳綾數千匹故戀而不去他日女夢其父云浙東八州袁朝所陷汝母不早去必罹艱辛言之且泣公主乃移居栝州栝州陷輕身走出竟如夢中所言也楊昭成開元末洛陽賈氏為廣漢什邡令將其家之任欲至白土店東七里其妻段氏馬驚墮坑而死即殯於山中經兩載弘農楊昭成為益州倉曹之廣漢曉發其妻竇氏忽於馬上而睡向後傾倒昭成自下馭馬頻呼問猶不覺將至白土方寤云向夢有一婦人衣緑單裙白布衫年甫三十容色艷麗來控我馬悲啼久之自稱段姓是什邡賈明府之妻至此身死見留山中孤魂飄泊不勝羈獨夫人後若還京我有兄名某見任京兆功曹可相為訪令收己魂歸於故鄉深以相囑言訖乃去昭成其夕宿白土具以夢問店者店人云賈明府妻墳去此六七里墜坑而死殯在山中已二年矣其言始末與夢相類昭成深異之因記其事後奉入京尋其段族具為説之段氏舉家悲泣遂令人往取神柩葬之扶溝令扶溝令某霽者失其姓以大曆二年卒經半歲其妻夢與霽遇問其地下罪福霽曰吾生為進士陷於輕薄或毀讟詞賦或詆訶人物今被地下所主每日送兩蛇及三蜈蚣出入七竅受諸痛苦不可堪忍法當三百六十日受此罪罪畢方得托生近以他事為閻羅王所剝舊褌狼藉為人所笑可作一褌與我婦云無物可作霽曰前者萬年尉蓋又玄將二絹來何得云無兼求鑄像寫法華經婦並許之然後方去爾王諸大曆中邛州刺史崔勵親外甥王諸家寄綿州往來秦蜀頗諳京中事因至京與倉部令史趙盈相得每齎左綿等事盈並為主之諸欲還盈固留之中夜盈謂諸曰某長姊適陳氏唯有一笄女前年長姊喪逝外甥女子某留撫養所惜聰惠不欲託他人知君子秉心可保歲寒非求於伉儷所貴得侍巾櫛如君他日禮娶此子但安存不失所即某之望也成此親者結他年之好耳諸對曰感君厚意敢不從命固當期於偕老耳諸遂備纁幣迎之後二年遂挈陳氏歸于左綿是時勵方典邛商諸往覲焉勵遂責諸浪迹又恐年長不婚諸具以情白舅勵曰吾小女寬柔欲與汝重親必容汝舊納者陳氏亦曰豈敢他心哉但得衣食粗充夫人不至怪怒是某本意諸遂就表妹之親既成姻崔氏女便令取陳氏同居相得更無分毫失所勵令其子鏗與諸江陵卜居兼將金帛下峽而去三月諸發五月勵受替遂盡室江陵而行諸與鏗方買一宅修葺停午諸忽夢陳氏被髮來哀告諸曰某他鄉一賤人崔氏夫人本許終始奈何三峽舟中沐髮使人聳某令於崩湍中而卒永葬魚鱉腹中哀泣沾襟俄而鏗於東廂寐亦夢陳氏訴冤崔夫人不仁致我性命三峽鏗與諸偶坐方訝其事其夜二人夢復如前鏗甚慚謂諸曰某娘情性不當如是何有此冤且今日江頭望信若聞陳氏不平安此則必矣後數日果有信説陳氏溺三峽及勵到諸家諸泣説前事崔氏為其兄所責不能自明遂斷髮暗嗚而卒諸亦蕩遊他處數年間忽於夏口見水軍營之中東門廂見一女人姿狀即陳氏也諸流眄久之其婦又殷勤瞻矚問僮僕云郎君豈不姓王僮走告諸及白姨弟令詢其本末陳氏曰實不為崔氏所擠某失足墜於三峽經再宿泊尸于磧遇鄂州回易小將梁璨初欲收葬後因吐無限水忽然而蘇某感梁之厚恩遂妻梁璨今已誕二子矣諸由是疑負崔氏之冤入羅浮山而為頭陀僧矣西市人建中年京西市人忽夢見為人所録至府縣衙府甚嚴使人立於門屏外遂去亦不見召唯聞門內如斷獄之聲自屏隙窺之見廳上有貴人紫衣據案左右緑裳執案簿者三四人中庭朱泚械身鎖項素服露首鞠躬如有分雪哀請之狀言詞至切其官低頭視事了不與言良久方謂曰君合當此事帝命已行訴當無益泚辭不已及至泫泣其官怒曰何不知天命令左右開東廊下二院聞開鎖之聲門內有三十餘人皆衣朱紫行列階下貴人指示曰此等待君富貴辭之何益此人視之乃李尚韋駱之輩也諸人復入院門又叱泚入西廊一院焉貴人問左右云是何時事答曰十月又問何適而可曰奉天如此詰問良久乃已前追使者復出謂百姓曰誤追君來可速歸尋路而返夢覺話於親密其後事果驗也王方平太原王方平性至孝其父有疾危篤方平侍奉藥餌不解帶者逾月其後侍疾疲極偶于父牀邊坐睡夢一鬼相語欲入其父腹中一鬼曰若何為入一鬼曰待食漿水粥可隨粥而入既約方平驚覺作穿碗以指承之置小瓶於其下候父啜乃去承指粥入瓶中以物蓋上於釜中煮之百沸開視乃滿瓶是肉父因疾愈議者以為純孝所致也張詵以貞元中以前王屋令調於有司忽夢一中使來詵即具簪笏迎之謂詵曰有詔召君可偕去詵驚且喜以為上將用我即命駕與中使俱出見門外有吏十餘為驅殿者詵益喜遂出開遠門西望而去其道左有吏甚多再拜於前近二百里至一城輿馬人物喧譁闐咽於路槐影四矗煙幕邐迤城之西北數里又一城外有被甲者數百羅立門之左右執戈戟列幡幟環衛甚嚴若王者居既至門中使命詵下馬詵整巾笏中使引入門兵士甚多見宮闕臺閣既峻且麗又至一門中使引入百餘人具笏組列於庭儀甚謹肅又有一殿峙然瓊玉華耀真天子殿殿左右有士數十具甲倚劍殿上有朱紫中使甚多一人峨冠被袞龍衣憑玉几而坐殿之東宇又有一冠衣者貌若婦人亦據玉几殿之西宇有宮嬪數十列於前中使謂詵曰上在東宇可前謁即趨之東宇前再拜有朱衣中使立於殿之前軒宣曰卿今宜促治吾宮庭事無使有不如法者詵又再拜舞蹈即而中使又引至西宇下其儀度如東宇既拜中使遂引出門詵悸且甚因謂之曰某久處外藩未得見天子向者朝對無乃不可於禮乎中使笑曰吾君寬無懼耳言畢東望有兵士數百馳來中使謂詵曰此警夜之兵也子疾去無犯嚴禁即呼吏命駕惶惑之際而寤竊異其夢不敢語於人後數日詵拜乾陵令及凡所經歷皆符所夢又天后祔葬詵所夢殿東宇下峨冠被袞龍衣者乃高宗也殿西宇下冠衣貌如婦人者乃天后也後數月因至長安與其友數輩會宿具話其事有以列聖真圖示詵者高宗及天后果夢中所見也麻安石唐貞元中至壽春謁太守楊承恩安石在道門習學推步自言大夫四月加官合得旌節是年武成刺史三人安州伊公慎宋州劉公逸壽州楊公淮並加散騎常侍後安石忽夜夢壽州子城內路西院中殿內見戴冠幘神人乘白馬朱尾鬣稱是宋武帝呼安石向前曰楊承恩無節度使卿不用住至明方問人此乃宋武帝升壇拜將處有記見在安石檢解夢書言見戴冠幘神與人言者善惡如其言遂再三懇辭暫歸山是月離壽州後楊公風疾罷歸朝果驗也閻陟閻陟幼時父任密州長史陟隨父在任嘗晝寢忽夢見一女子年十五六容色妍麗來與己會如是者數月寢輒夢之後一日夢女來別音容悽斷曰己是前長史女死殯在城東南角明公不以幽滯卑微用薦枕席我兄明日來迎己喪終天永別豈不恨恨今有錢百千相贈以伸允眷言訖令婢送錢于寢牀下乃去陟覺視牀下果有百千紙錢也劉景復吳泰伯廟在東閶門之西每春秋季市肆皆率其黨合牢醴祈福於三讓王多圖善馬綵輿女子以獻之非其月亦無虛日乙丑春有金銀行首糾合其徒以綃畫美人捧胡琴以從其貌出於舊繪者名美人為勝兒蓋戶牖墻壁會前後所獻者無以匹也女巫方舞有進士劉景復送客之金陵置酒于廟之東通波館而欠伸思寢乃就榻方寢見紫衣冠者言曰讓王奉屈劉生隨而至廟周旋揖讓而坐王語劉生曰適納一胡琴藝甚精而色殊麗吾知子善歌故奉邀作胡琴一章以寵其藝初生頗不甘命酌人間酒一杯與歌逡巡酒至并獻酒物視之乃適館中祖筵者也生飲數杯醉而作歌曰繁絃已停雜吹歇勝兒調弄邏逤發四絃攏撚三四聲喚起邊風駐寒月大聲漕漕奔淈淈浪蹙波翻倒溟浡小絃切切怨颸颸鬼泣神悲低悉率側腕斜挑掣流電當秋直戛騰秋鶻漢妃徒得端正名秦女虛誇有仙骨我聞天寶年前事涼州未作西戎窟麻衣右袵皆漢民不省胡塵暫蓬勃太平之末狂胡亂犬豕崩騰恣唐突玄宗未到萬里橋東洛西京一時沒一朝漢民沒為虜飲恨吞聲空咽嗢時看漢月望漢天怨氣衝星成彗孛國門之西八九鎮高城深壘閉間卒河湟咫尺不能收挽粟推車徒矻矻今朝聞奏涼州曲使我心魂暗超忽勝兒若向邊塞彈征人血淚應闌干歌既成劉生乘醉落洎草札而獻王尋繹數四召勝兒以授之王之侍兒有不樂者妬色形於坐王恃酒以金如意擊勝兒首血淋襟袖生乃驚起明日視繪素果有損痕歌今傳於吳中
