body:
  text: 張方張方廣陵下市廟宋元嘉十八年張方女道香送其夫壻北行日暮宿祠門下夜有一物假作其壻來云離情難遣不能便去道香俄昏惑失常時有王纂者能治邪疑道香被魅請治之始下針有一獺從女被內走入前港道香疾便愈鐘道宋永興縣吏鐘道得重病初差情欲倍常先樂白鶴墟中女子至是猶存想焉忽見此女子振衣而來即與燕好是后數至道曰吾甚欲雞舌香女曰何難乃掬香滿手以授道道邀女同含咀之女曰我氣素芳不假此女子出戶狗忽見隨咋殺之乃是老獺口香即獺糞頓覺臭穢晉安民晉安郡民斷溪取魚忽有一人著白帢黃練單衣來詣之即同飲饌饌畢語之曰明日取魚當有大魚甚異最在前慎勿殺明日果有大魚長七八丈徑來沖网其人即賴殺之破腹見所食飯悉有其人家死亡略盡劉萬年宋后廢帝元徽三年京口戍將劉萬年夜巡于北固山西見二男子容止端麗潔白如玉遙呼萬年謂曰君與今帝姓族近遠萬年曰望異姓同一人曰汝雖族異恐禍來及萬年曰吾有何過答曰去位禍即不及萬年見二人所言益異之萬年謂二人深謝預聞何用見酬萬年欲請歸鎮二人曰吾非世人不食世物萬年與語之次化為魚飛入江去萬年翌日托疾遂罷其位后果如魚所言微生亮明月峽中有二溪東西流宋順帝升平二年溪人微生亮釣得一白魚長三尺投置船中以草覆之及歸取烹見一美女在草下潔白端麗年可十六七自言高唐之女偶化魚游為君所得亮間曰既為人能為妻否女曰冥契使然何為不得其后三年為亮妻忽曰數已足矣請歸高唐亮曰何時復來答曰情不可忘者有思復至其后一歲三四往來不知所終蘆塘耒陽縣東北有蘆塘八九頃其深不可測中有大魚當至五日一奮躍出水大可三圍其狀異常每出水則小魚奔迸隨水上岸不可勝計又云此塘有鮫魚五日一化或為美婦人或為美男子至于變亂尤多郡人相戒故不敢有害心后為雷電所擊此塘遂干彭城男子彭城有男子娶婦不悅之在外宿月余日婦曰何故不復入男曰汝夜輒出我故不入婦曰我初不出壻驚婦云君自有異志當為他所惑耳后有至者君便抱留之索火照視之為何物后所願還至故作其婦前卻未入有一人從后推令前即上床壻捉之曰夜夜出何為婦曰君與東舍女往來而驚欲托鬼魅以前約相掩耳壻放之與共臥夜半心悟乃計曰魅迷人非是我婦也乃向前攬捉大呼求火稍稍縮小發而視之得一鯉魚長二尺朱法公山陰朱法公者嘗出行憩于台城東桔樹下忽有女子年可十六七形甚端麗薄晚遣婢與法公相聞方夕欲詣宿至人定后乃來自稱姓檀住在城側因共眠寢至曉而云明日復來如此數夜每曉去婢輒來迎復有男子可六七歲端麗可愛女云是其弟后曉去女衣裙開見龜尾及龜腳法公方悟是魅欲執之向夕復來即然火照覓尋失所在王奐齊王奐自建業將之渚宮至江州泊舟于岸夜深風生月瑩忽聞前洲上有十余人喧噪皆女子之音奐異之謂諸人曰江渚中豈有是人也乃獨棹小舟取葭蘆之陰循洲北岸而于藂葦中見十余女子或衣緑或衣青碧半坐半立坐者一女子泣而言曰我始與姊妹同居陰宅長在江漢不意諸娘虛為上峽小兒所娶乃至分離立者一女子歎曰潮水有回而我此去應無返日言未竟北風微起立者曰潮至矣可以還家奐急從蘆葦中出捕悉化為龜入水而去蔡興晉陵民蔡興忽得狂疾歌吟不恆常空中與數人言笑或云當再取誰女復一人云家已多后夜忽聞十余人將物入里人劉余之家余之拔刀出后戶見一人黑色大罵曰我湖長來詣汝而欲殺我即喚群伴何不助余耶余之即奮刀亂砍得一大鼉及狸李增永陽人李增行經大溪見二蛟浮于水上發矢射之一蛟中焉增歸因復出市有女子素服銜淚捉所射箭增怪而問焉女答之何用問焉為暴若是便以相還授矢而滅增惡而驟走未達家暴死于路蕭騰襄陽金城南門外道東有參佐廨舊傳甚凶住者不死必病梁昭明太子臨州給府寮呂休茜休茜常在廳事北頭眠鬼牽休茜休茜墜地久之悟俄而休茜有罪賜死后今肖騰初上至羊口岸忽有一丈夫著白紗高室帽烏布褲披袍造騰疑其服異拒之行數里復至求寄載騰轉疑焉如此數回而騰有妓妾數人舉止所為稍異常日歌笑悲啼無復恆節及騰至襄陽此人亦經日一來后纍辰不去好披袍縛褲跨狗而行或變易俄頃詠詩歌謠言笑自若自稱是周瑜恆止騰舍騰備為禳遣之術有時暫去尋復來騰又領門生二十人拔刀砍之或跳上室梁走入林中來往迅速竟不可得乃入妾屏風里作歌曰逢歡羊口岸結愛桃林津胡桃擲去肉訝汝不識人頃之有道士趙曇義為騰設壇置醮行禁自道士入門諸妾并悲叫若將遠別俄而一龜徑尺余自到壇而死諸妾亦差騰妾聲貌悉不多咨議參軍韋言辨善戲謔因宴而啓云常聞世間人道黠如鬼今見鬼定是癡鬼若黠不應魅蕭騰妓以此而度足驗鬼癡柳鎮河東柳鎮字子元少樂閒靜不慕榮貴梁天監中自司州游上元便愛其風景于鐘山之西建業里買地結茅開泉種植隱操如耕父者其左右居民皆呼為柳父所居臨江水嘗曳策臨眺忽見前洲上有三四小兒皆長一尺許往來游戲遙聞相呼求食聲鎮異之須臾風濤洶涌有大魚驚躍誤墜洲上群小兒爭前食之又聞小兒傳呼云雖食不盡留與柳父鎮益驚駭乃乘小舟徑捕之未及岸諸小兒悉化為獺入水而去鎮取巨魚以分鄉里未幾北還洛陽于所居書齊柱題詩一首云江山不久計要適暫時心況念洛陽士今來歸舊林是歲天監七年也隋文帝隋文帝開皇中掖庭宮每有人來挑宮人司宮以聞帝曰門衛甚嚴人從何而入當妖精耳因戒宮人曰若來但砍之其后夜來登床宮人抽刀砍之若中枯骨其物走落宮人逐之因入池而沒明日帝令涸池得一龜尺余其上有刀痕殺之遂絶大興村隋開皇末大興城西南村民設佛會一老翁皓首白裙襦求食而去衆莫識追而觀之行二里許遂不見但有一陂水中有白魚長丈余小而從者無數人爭射之或弓折弦斷后竟中之割其腹得粳米飯后數日漕梁暴溢射者家皆溺死萬頃陂唐齊州有萬頃陂魚鱉水族無所不有咸亨中忽一僧持鉢乞食村人長者施以蔬供食訖而去于是漁人网得一魚長六七尺緝鱗鏤甲錦質寶章特異常魚欲繼赴州餉遺至村而死遂共剖而分之于腹中得長者所施蔬食儼然并在村人遂于陂中設齊過度自是陂中無水族至今猶然絶長須國唐大足初有士人隨新羅使風吹至一處人皆長須語與唐言通號長須國人物甚盛棟宇衣冠稍異中國地曰扶桑洲其署官品有正長戢波日沒島邏等號士人歷謁數處其國皆敬之忽一日有車馬數十言大王召客行兩日方至一大城甲士門焉使者導士人入伏謁殿宇高敞儀衛如王者見士人拜伏小起乃拜士人為司風長兼駙馬其主甚美有須數十根士人威勢烜赫富有珠玉然每歸見其妻則不悅其王多月滿夜則大會后遇會士人見嬪姬悉有須因賦詩曰花無葉不妍女有須亦丑丈人試遣總無未必不如總有王大笑曰駙馬竟未能忘情于小女頤頷間乎經十余年士人有一兒二女忽一日其君臣憂蹙士人怪問之王泣曰吾國有難禍在旦夕非駙馬不能救士人驚曰苟難可弭性命不敢辭也王乃令具舟令兩使隨士人謂曰煩駙馬一謁海龍王但言東海第三浥第七島長須國有難求救我國絶微須再三言之因涕泣執手而別士人登舟瞬息至岸岸沙悉七寶人皆衣冠長大士人乃前求謁龍王龍宮狀如佛寺所圖天宮光明迭激目不能視龍王降階迎士人齊級升殿訪其來意士人且說龍王即命速勘良久一人自外白境內并無此國士人復哀祈具言長須國在東海第三浥第七島龍王復叱使者細尋勘速報經食頃使者返曰此島蝦合供大王此月食料前日已追到龍王笑曰客固為蝦所魅耳吾雖為王所食皆稟天符不得妄食今為客減食乃令引客視之見鐵鑊數十如屋滿中是蝦有五六頭色赤大如臂見客跳躍似求救狀引者曰此蝦王也士人不覺悲泣龍王命放蝦王一鑊令二使送客歸中國一夕至登州顧二使乃巨龍也
