body:
  text: 王騁之王騁之琅邪王騁之妻陳郡謝氏生一男小字奴子經年後王以婦婢招利為妾謝元嘉八年病終王之墓在會稽假瘞建康東岡既窆反虞輿靈入屋憑几忽于空中擲地便有嗔聲曰何不作挽歌令我寂寂而行耶聘之云非為永葬故不具儀耳孟襄字寶稱元嘉十一年為吳寧令其妻蔡氏在縣亡未幾忽有推窗打戶長嘯歌吟撒擲燥土復于空中揮運刀矛狀欲加人數數起火或發箱篋之內衣服燋而外不覺因假作蔡氏言語一如平生襄因問曰卿何以短壽答曰是天命耳然有一罪為女時曾宰一雞被録到地獄三日聞人説鑄銅像者可以免因脫金指環一雙以助之故獲解免時縣有巫覡者襄令召而看之鬼即震懼良久巫者云見二物其一如豕一似雄雞兩目直豎作亡人言是雞形者時又有慧蘭道人善于呪術即召之令誦經呪鬼初猶學之有頃失所在司馬文宣河內人也頗信佛元嘉元年丁母艱弟喪數月望旦見其弟在靈座上不異平日回惶嘆吒諷求飲食文宣試與言曰汝平生勤修行善若如經言應得生天或在人道何故乃墜此鬼中即沈吟俯仰默然無對文宣即夕夢見其弟云生所修善蒙報生天靈牀之鬼是魔魅耳非某身也恐兄疑怪故以白兄文宣明旦請僧轉首楞嚴經令人撲擊之鬼乃逃入牀下又走戶外形稍醜惡舉家駭懼詈叱遣之鬼云飢乞食耳經日乃去頃之母靈牀頭有一鬼膚體赤色身甚長壯文宣長子孝祖與言往反答對周悉妝雖恐懼久稍安習之鬼亦轉相附狎居處出入殆同家人于京師轉相報告往來觀者門限疊迹時南林寺有僧與靈珠寺僧舍沙門與鬼言倫亦甚款曲鬼云昔世嘗為尊貴以犯衆惡受報未竟果此鬼身云寅年有四百部鬼大行疾癘所應罹災者不悟道人耳而犯橫極衆多濫福善故使我來監察之也僧以食與之鬼曰我自有糧不得進此食也舍曰鬼多知我生來何因作道人答曰人中來出家因緣本誓願也問諸存亡生死所趣略皆答對具有靈驗條次繁多故不曲載舍曰人鬼道殊汝既不求食何為久留鬼曰此間有一女子應在收捕而奉戒精勤故難可得比日稽留因此故也籍亂主人有愧不少自此以後不甚見形復往視者但聞語耳時元嘉十年也至三月二十八日語文宣云暫來寄住而汝傾家營福見畏如此那得久留孝祖云聽汝寄住何故據人先亡靈筵耶答曰汝家亡者各有所屬此座空設故權寄耳於是辭去虞德嚴猛武陵龍陽虞德流寓益陽止主人夏蠻舍中見有白紙一幅長尺餘標蠻女頭乃起扳取俄頃有虎到戶而退尋見何老母摽如初德又取之如斯三返乃具以語蠻於是相與執杖伺候須臾虎至即共格之同縣黃期具説如此又會籍嚴猛婦出採薪為虎所害後一年猛行至蒿中忽見妻云君今日行必遭不善我當相免也既而俱前忽逢一虎跳梁向猛婦舉手指撝狀如遮護須臾有二胡人前過婦因指之虎即擊胡壻得無他郭慶之黃州治下有黃父鬼出則為崇所著衣夾皆黃至人家張口而笑必得疫癘長短無定隨籬高下自不出已十餘年土俗畏怖廬陵人郭慶之有家生婢名採薇年少有色宋孝建中忽有一人自稱山靈如人裸身長丈餘臂腦皆有黃色膚貌端潔言音周正土俗呼為黃父鬼來通此婢婢云意事如人鬼遂數來常隱其身時或露形形變無常乍大乍小或似煙氣或為石或作小兒或婦人或如鳥如獸足迹如人長二尺許或似鵝迹掌大如盤開戶閉墉其入如神與婢戲笑如人薄紹之薄紹之嘗為臧質參軍元嘉二十四年寄居東府之西賓別宅中與祖法開鄰舍開母劉寢疾彌旬以二十二年五月一日夜半亡二日紹之見群鼠大者如豚鮮澤五色或純或駁或著平上幘或著籠頭大小百數彌日纍夜至十九日黃昏內屋四簷上有一白鼠長二尺許走入壁下入處起火以水灌之火不滅良久自滅其夜見人修壯赤色身光如火從燒壁中出徑入牀下又出壁外雖隔一壁當時光明洞徹了不覺又隔障四更復有四人或與紹之言相佑或瞋目吐舌自暮迄旦後夕復燒屋有二人長九尺許騎馬挾弓矢賓從數十人呼為將軍紹之問汝行何向答云被使往東邊病人還二十一日群黨又至家先有一白狗自有鬼怪暮常失之至曉輒還爾夕試繫之須臾有一女子來云忽繫此狗願以見乞答便以相與投繩竟不敢解倏然走出狗於是呻喚垂死經日不能動有一人披錦袍彎弧注鏃直向紹之謂汝是妖邪敢干恐人我不畏汝汝若不速去令大道神尋收治汝鬼弛弦縱矢策馬而去索萬興敦煌索萬興晝坐廳事東間齋中一奴子忽見一人著幘牽一驄馬直從門入負一物狀如烏皮隱囊置砌下便牽馬出門囊自輪轉徑入齋中緣牀腳而上止于興膝前皮即四處卷開見其中周匝是眼動瞬甚可憎惡良久又還更舒合仍輪轉下牀落砌西去興令奴子逐至廳事東頭滅惡之因得疾亡郭秀之寓居海陵宋元嘉二十九年年七十三病止堂屋北有大棗樹高四丈許小婢晨起開戶掃地見棗樹上有一人修壯黑色著皂襆帽烏韋袴褶手操弧矢正立南面舉家出看見了了秀之扶杖視之此人謂秀之曰僕來召君君宜速裝日出便不復見積五十三日如此秀之亡後便絶庾季隨有節概膂力絶人宋元嘉中得疾晝臥有白氣如雲出于室內高五尺許有頃化為雄雞飛集別牀季隨斫之應手有聲形即滅地血滂流仍聞蠻嫗哭聲但呼阿子自遠而來徑至血處季隨復斫有物類猴走出戶外瞋目顧視季隨忽然不見至晡有二青衣小兒直從門入唱云庾季隨殺官俄而有百餘人或黑衣或朱衣達屋齊喚云庾季隨殺官季隨揮刀大呼鬼皆走出滅形還步忽投寺中子勿失父所在至寺見父有鬼逐後以皮囊收其氣數日遂亡申翼之廣陵盛道兒元嘉十四年亡託孤女于婦弟申翼之服闋翼之以其女嫁北卿嚴齊息寒門也豐其禮賂始成道兒忽室中怒曰吾喘唾乏氣舉門戶以相託如何昧利忘義結婚微族翼大惶愧王懷之元嘉二十年丁母憂葬畢忽見樹上有嫗頭戴大髮身服白𧟌裙足不踐柯亭然虛立還家敘述其女遂得暴疾面仍變作向樹杪鬼狀乃與麝香服之尋如常世云麝香辟惡此其驗也柳叔倫宋孝武大明初太尉柳叔倫住故衡陽王故第大明五年忽見一腳迹長二寸倫有婢細辛使取水浣衣空中有物傾器倒水倫拔刀呼婢在側聞有物行聲以刀斫之覺有所中以火照之流血覆地後二十日婢病死倫即移尸出外明日覓尸不知所在劉廓宋沈攸之在鎮朱道珍嘗為孱陵令劉廓為荊州戶曹各相並居江陵皆好圍棋日夜相就道珍元徽三年六日亡至數月廓坐齋中忽見一人以書授廓云朱孱陵書題云每思棋聚非意致闊方有來緣想能近顧廓讀畢失信所在寢疾尋卒王瑤宋大明三年在都病亡瑤亡後有一鬼細長黑色袒著犢鼻褌恆來其家或歌嘯或學人語常以糞穢投人食中又于東鄰庾家犯觸人不異王家時庾語鬼以土石投我了非所畏若以錢見擲此真見困鬼便以新錢數十正擲庾額庾復言新錢不能令痛唯畏烏錢耳鬼以烏錢擲之前後六七過合得百餘錢王文明宋太始末江安令妻久病女于外為母作粥將熟變而為血棄之更作復如初母尋亡其後兒女在靈前哭忽見其母臥靈牀上如平生諸兒號戚奄然而滅文明先愛其妻所使婢妊身將産葬其妻日使婢守屋餘人悉詣墓所部伍始發妻便入戶打婢其後諸女為父辦食殺雞割洗已竟雞忽跳起軒首長鳴文明尋卒諸男相續喪亡夏侯文規夏侯文規居京亡後一年見形還家乘犢車賓從數十人自云北海太守家設饌見所飲食當時皆盡去後器滿如故家人號泣文規曰勿哭尋便來或一月或四五十日輒來或停半日其所將赤衣騶導形皆短小坐息籬間及廂屋中不知文規當去時家人每呼令起玩習不為異物文規有數歲孫念之抱來其左右鬼神抱取以進此兒不堪鬼氣便絶不復識人文規索水噀之乃醒見庭中桃樹乃曰此桃我所種子甚美好其婦曰人言亡者畏桃君何為不畏答曰桃東南枝長二尺八寸向日者憎之或亦不畏見地有蒜殼令拾去之觀其意似憎蒜而畏桃也
