body:
  text: 漢武帝漢武帝漢孝武皇帝景帝子也未生之時景帝夢一赤彘從雲中下直入崇芳閣景帝覺而坐閣下果有赤龍如霧來蔽戶牖宮內嬪御望閣上有丹霞蓊蔚而起霞滅見赤龍盤回棟間景帝召占者姚翁以問之翁曰吉祥也此閣必生生原作主據明鈔本陳校本改命世之人攘夷狄而獲嘉瑞為劉宗盛主也然亦大妖景帝使王夫人移居崇芳閣欲以順姚翁之言也乃改崇芳閣為猗蘭殿旬餘景帝夢神女捧日以授王夫人夫人吞之十四月而生武帝景帝曰吾夢赤氣化為赤龍占者以為吉可名之吉至三歲景帝抱於膝上撫念之知其心藏洞徹試問兒樂為天子否對曰由天不由兒願每日居宮垣在陛下前戲弄亦不敢逸豫以失子道景帝聞而愕然加敬而訓之他日復抱之几前試問兒悅習何書為朕言之乃誦伏羲以來群聖所録陰陽診候及龍圖龜策數萬言無一字遺落至七歲聖徹過人景帝令改名徹及即位好神仙之道常禱祈名山大川五嶽以求神仙元封元年正月甲子登嵩山起道宮帝齊七日祠訖乃還至四月戊辰帝閒居承華殿東方朔董仲君君原作舒據明鈔本陳校本改在側忽見一女子著青衣美麗非常帝愕然問之女對曰我墉宮玉女王子登也向為王母所使從崑崙山來語帝曰聞子輕四海之祿尋道求生降帝王之位而屢禱山嶽勤哉有似可教者也從今日清齊不間人事至七月七日王母暫來也帝下席跪諾言訖玉女忽然不知所在帝問東方朔此何人朔曰是西王母紫蘭宮玉女常傳使命往來扶桑出入靈州交關常陽傳言玄都阿母昔出配北燭仙人近又召還使領命祿真靈官也帝於是登延靈之臺盛齊存道其四方之事權委於冢宰焉到七月七日乃修除宮掖設坐大殿以紫羅薦地燔百和之香張雲錦之幃燃九光之燈列玉門之棗酌蒲萄之醴宮監明鈔本宮作躬香果為天宮之饌帝乃盛服立於階下敕端門之內不得有妄窺者內外寂謐以候雲駕到夜二更之後忽見西南如白雲起鬱然直來徑趨宮庭須臾轉近聞雲中簫鼓之聲人馬之響半食頃王母至也縣投殿前有似鳥集或駕龍虎或乘白麟或乘白鶴或乘軒車或乘天馬群仙數千光耀庭宇既至從官不復知所在唯見王母乘紫雲之輦駕九色斑龍別有五十天仙側近鸞輿皆長丈餘同執彩旄之節佩金剛靈璽戴天真之冠咸住殿下王母唯挾二侍女上殿侍女年可十六七服青綾之袿容眸流盼神姿清發真美人也王母上殿東向坐著黃金褡䙱文采鮮明光儀淑穆帶靈飛大綬腰佩分景之劍頭上太華髻戴太真晨嬰之冠履玄璚鳳文之舄視之可年三十許修短得中天姿掩藹容顏絶世真靈人也下車登床帝跪拜問寒暄畢立因呼帝共坐帝面南王母自設天廚真妙非常豐珍上果芳華百味紫芝萎蕤芬芳填樏清香之酒非地上所有香氣殊絶帝不能名也又命侍女更索桃果須臾以玉盤盛仙桃七顆大如鴨卵形圓青色以呈王母母以四顆與帝三顆自食桃味甘美口有盈味帝食輒收其核王母問帝帝曰欲種之母曰此桃三千年一生實中夏地薄種之不生帝乃止於坐上酒觴數遍王母乃命諸侍女王子登彈八琅之璈又命侍女董雙成吹雲和之笙石公子擊昆庭之金許飛瓊鼓震靈之簧婉淩華拊五靈之石范成君擊湘陰之磬段安香作九天之鈞於是衆聲徹朗靈音駭空又命法嬰歌玄靈之曲歌畢王母曰夫欲修身當營其氣太仙真經所謂行益易之道益者益精易者易形能益能易名上仙籍不益不易不離死厄行益易者謂常思靈寶也靈者神也寶者精也子但愛精握固閉氣吞液氣化為血血化為精精化為神神化為液液化為骨行之不倦神精充溢為之一年易氣二年易血三年易精四年易脈五年易髓六年易骨七年易筋八年易髮九年易形形易則變化變化則成道成道則為仙人吐納六氣口中甘香欲食靈芝存得其味微息揖吞從心所適氣者水也無所不成至柔之物通致神精矣此元始天王在丹房之中所說微言今敕侍笈玉女李慶孫書録之以相付子善録而修焉於是王母言語既畢嘯命靈官使駕龍嚴車欲去帝下席叩頭請留殷勤王母乃止王母乃遣侍女郭密香與上元夫人相問云王九光之母敬謝比比原作但據明鈔本陳校本改不相見四千餘年矣天事勞我致以愆面劉徹好道適來視之見徹了了似可成進然形漫神穢腦血淫漏五臟不淳關胄彭孛骨無津液脈浮反升肉多精少瞳子不夷三尸絞亂玄白失時雖當語之以至道殆恐非仙才也吾久在人間實為臭濁然時復可遊望以寫細念庸明鈔本陳校本庸作客主對坐悒悒不樂夫人可暫來否若能屈駕當停相須帝見侍女下殿俄失所在須臾郭侍女返上元夫人又遣一侍女答問云阿環再拜上問起居遠隔絳河擾以官事遂替顏色近五千年仰戀光潤情係無違密香至奉信承降尊於劉徹處聞命之際登當命駕先被太帝君敕使詣玄洲校定天元正爾暫住如是當還還便束帶願暫少留帝因問王母不審上元何真也王母曰是三天上元之官統領十萬明鈔本萬作方玉女名籙者也俄而夫人至亦聞雲中簫鼓之聲既至從官文武千餘人並是女子年皆十八九許形容明逸多服青衣光彩耀目真靈官也夫人年可二十餘天姿精耀靈眸絶朗服青霜之袍雲彩亂色非錦非繡不可名字頭作三角髻餘髮散垂至腰戴九雲夜光之冠曳六出火玉之珮垂鳳文林華之綬腰流黃揮精之劍上殿向王母拜王母坐而止之呼同坐北向夫人設廚廚亦精珍與王母所設者相似王母敕帝曰此真元之母尊貴之神汝當起拜帝拜問寒溫還坐夫人笑曰五濁之人耽酒榮利嗜味淫色固其常也且徹以天子之貴其亂目者倍於凡焉而復於華麗之墟拔嗜欲之根願無為之事良有志矣王母曰所謂有心哉夫人謂帝曰汝好道乎聞數招方術祭山嶽祠靈神禱河川亦為勤矣勤而不獲實有由也汝胎性暴胎性淫胎性奢胎性酷胎性賊五者恆舍於榮衛之中五藏之內雖獲良針固難愈也暴則使氣奔而攻神是故神擾而氣竭淫則使精漏而魄疲是故精竭而魂消奢則使真離而魄穢是故命逝而靈失酷則使喪仁而自攻是故失仁而眼亂賊則使心鬭而口乾是故內戰而外絶此五事者皆是截身之刀鋸刳命之斧斤矣雖復志好長生不能遣茲五難亦何為損性而自勞乎然由是得此小益以自知往爾若從今已捨爾五性反諸柔善明務察下慈務矜冤惠務濟貧賑務施勞念務存孤惜務及愛身恆為陰德救濟死厄旦夕孜孜不泄精液於是閉諸淫養汝神放諸奢從至儉勤齊戒節飲食絶五穀去羶腥鳴天鼓飲玉漿蕩華池叩金梁按而行之當有異耳今阿母迂天尊之重下降於蟪蛄之窟明鈔本陳校本窟作戶屈二字戶屬上為句屈屬下為句霄虛之靈而詣狐鳥之俎且阿母至誠妙唱玄音驗其敬勗節度明修所奉比及百年阿母必能致汝於玄都之墟迎汝於昆閬之中位以仙官遊於十方信吾言矣子勵之哉若不能爾無所言矣帝下席跪謝曰臣受性凶頑生長亂濁面墻不啓無由開達然貪生畏死奉靈敬神今日受教此乃天也徹戢聖命以為身範是小醜之臣當獲生活唯垂哀護願賜上元明鈔本陳校本願賜上元作賜其元元夫人使帝還坐王母謂夫人曰卿之為戒言甚急切更使未解之人畏於志意夫人曰若其志道將以身投餓虎忘軀破滅蹈火履水固於一志必無憂也若其志道則心凝真性嫌惑之徒不畏急言急言之發欲成其志耳阿母既有念必當賜以尸解之方耳王母曰此子勤心已久而不遇良師遂欲毀其正志當疑天下必無仙人是故我發閬宮暫舍塵濁既欲堅其仙志又欲令向化不惑也今日相見令人念之至於尸解下方吾甚不惜後三年吾必欲賜以成丹半劑石象散一具與之則徹不得復停當今胸奴未彌邊陲有事何必令其倉卒舍天下之尊而便入林岫但當問篤向之志必卒何如如字原闕據明鈔本許本黃本補其回改吾方數來王母因拊帝背曰汝用上元夫人至言必得長生可不勗勉耶帝跪曰徹書之金簡以身模模原作莫據明鈔本陳校本改黃本作佩之焉帝又見王母巾笈中有一卷書盛以紫錦之囊帝問此書是仙靈方耶不審其目可得瞻盼否王母出以示之曰此五嶽真形圖也昨青城諸仙就吾請求今當過以付之乃三天太上所出文祕禁重豈汝穢質所宜佩乎今且與汝靈光生經可以通神勸心也帝下地叩頭固請不已王母曰昔上皇清虛元年三天太上道君下觀六合瞻河海之長短察丘山之高卑立天柱而安於地理植五嶽而擬諸鎮輔貴昆陵以舍靈仙尊蓬丘以館真人安水神于極陰之源棲太帝于扶桑之墟於是方丈之阜為理命之室滄浪海島養九老之堂祖瀛玄炎長元流流下原有光字據明鈔本陳校本刪生鳳麟聚窟各為洲名並在滄流大海玄津之中水則碧黑俱流波則震蕩群精諸仙玉女聚居滄溟其名難測其實分明乃因山源之規矩覩河嶽之盤曲陵回阜轉山高隴長周旋逶迤形似書字是故因象制名定實之號書形祕於玄臺而出為靈真之信諸仙佩之皆如傳章道士執之經行山川百神群靈尊奉親近汝雖不正然數訪仙澤扣求不忘于道欣子有心今以相與當深奉慎如事君父泄示凡夫必禍及也上元夫人語帝曰阿母今以瓊笈妙韞發紫臺之文賜汝八會之書五嶽真形可謂至珍且貴上帝之玄觀矣子自非受命合神弗見此文矣今雖得其真形觀其妙理而無五帝六甲左右靈飛之符太陰六丁通真逐靈玉女之籙太陽六戊招神天光策精之書左乙混沌東蒙之文右庚素收攝殺之律壬癸六遁隱地八術丙丁入火九九字原闕據明鈔本陳校本補赤班符六辛入金致黃水月華之法六己石精金光藏景化形之方子午卯酉八稟十訣六靈咸明鈔本咸作威儀丑辰未戌地真素訣明鈔本素上有曲字訣下有辭字長生紫書三五順行寅申巳亥紫度炎光內視中方凡缺此十二事者當何以召山靈朝地神攝總萬精驅策百鬼束虎豹役蛟龍乎子所謂適知其一未見其他也帝下席叩頭曰徹下土濁民不識清真今日聞道是生命會遇聖母今當賜以真形修以度世夫人云今告徹應須五帝六甲六丁六符致靈之術既蒙啓發弘益無量唯願告誨濟臣飢渴使已枯之木蒙靈陽之潤焦炎之草幸甘雨之溉不敢多陳帝啓叩不已王母又告夫人曰夫真形寶文靈宮所貴此子守求不已誓以必得故虧科禁特以與之然五帝六甲通真招神此術眇邈必須清潔至誡殆非流濁所宜施行吾今既賜徹以真形夫人當授之以致靈之途矣吾嘗憶與夫人共登玄隴朔野及曜真之山視王子童王子立就吾求請太上隱書吾以三元祕言不可傳泄於中仙夫人時亦有言見助於子童之言志矣明鈔本言志矣作至以雲笈七籤卷七九作至矣疑當從七籤作至矣為是吾既難違來意不獨執惜至於今日之事有以相似後造朱火丹陵食靈瓜味甚好憶此未久而已七千歲矣夫人既以告徹篇目十二事畢必當匠而成之緣何令人主稽首請乞叩頭流血耶上元夫人曰阿環不苟惜向不持來耳此是太虛群文真人赤童所出傳之既自有男女之限禁又宜授得道者恐徹下才未應得此耳王母色不平乃曰天禁漏泄犯違明科傳必其人授必知真者夫人何向下才而說其靈飛之篇目乎妄說則泄泄而不傳是衒天道此禁豈輕於傳耶別敕三官司直推夫人之輕泄也吾之五嶽真形太寶乃太上天皇所出其文寶妙而為天仙之信豈復應下授於劉徹耶直以徹孜孜之心數請川嶽勤修齊戒以求神仙之應志在度世不遭明師故吾等有以下眄之耳至於教仙之術不復限惜而弗傳夫人且有致靈之方能獨執之乎吾今所以授徹真形文者非謂其必能得道欲使其精誠有驗求仙之不惑可以誘進向化之徒又欲令悠悠者知天地間有此靈真之事足以卻不信之狂夫耳吾意在此也此子性氣淫暴服精不純何能得成真仙浮空參差十方乎勤而行之適可度於不死耳明科所云非長生難聞道難也非聞道難非聞道難四字原闕據明鈔本陳校本補行之難非行之難也終之難良匠能與人規矩不能使人必巧也何足隱之耶夫人謝曰謹受命矣但環環下原有倒字據明鈔本陳校本刪昔蒙倒景君無常先生二君傳靈飛之約以四千年一傳女授女不授男太上科禁已表於昭生之符矣環受書以來并賢大女即抱蘭凡傳六十八女子固不可授男也伏見扶廣山青真小童受六甲靈飛於太甲中元凡十二事與環所授者同青真是環入火弟子所受六甲未聞別授於人彼男官也今止敕取之將以授徹也先所以告篇目者意是愍其有心將欲堅其專氣令且廣求他日與之亦欲以男授男承科而行使勤而方獲令知天真之珍貴耳非徒苟執衒泄天道阿環主臣願不罪焉阿母真形之貴愍於勤志亦已授之可謂大不宜矣王母笑曰亦可恕乎上元夫人即命侍女紀離容徑到扶廣山敕青真小童出六甲左右靈飛致神之方十二事當以授劉徹也須臾侍女還捧五色玉笈鳳文之蘊以出六甲之文曰弟子何昌言向奉使絳河攝南真七元君檢校群龍猛獸之數事畢授教承阿母相邀邀字原闕據明鈔本陳校本補詣劉徹家不意天靈至尊乃復下降於臭濁中也不審起居比來何如侍女紀離容至云尊母欲得金書祕字六甲靈飛左右策精之文十二事欲授劉徹輒封一通付信曰徹雖有心實非仙才詎宜以此傳泄於行尸乎昌近在帝處見有上言者甚衆云山鬼哭於叢林孤魂號於絶域興師旅而族有功忘賞勞而刑士卒縱橫白骨煩擾黔首淫酷自恣罪己彰於太上怨已見於天氣囂言互聞必不得度世也奉尊見敕不敢違耳王母歎曰言此子者誠多然帝亦不必推也夫好道慕仙者精誠志念齊戒思愆輒除過一月克己反善奉敬真神存真守一行此一月輒除過一年徹念道纍年齊亦勤矣纍禱名山願求度脫校計功過殆已相掩但今以去勤修至誠奉上元夫人之言不宜復奢淫暴虐使萬兆勞殘冤魂窮鬼有被掘之訴流血之尸忘功賞之辭耳夫人乃下席起立手執八色玉笈鳳文之蘊仰帝而祝曰九天浩洞太上耀靈神照玄寂清虛朗明登虛者妙守氣者生至念道臻寂感真誠役神形辱安精年榮授徹靈飛及此六丁左右招神天光策精可以步虛可以隱形長生久視還白留青我傳有四萬之紀授徹傳在四十之齡違犯泄漏禍必族傾反是天真必沉幽冥爾其慎禍敢告劉生爾師主是真青童小君太上中黃道君之師真明鈔本師真作司直元始十天王入室弟子也姓延陵名陽字庇華形有嬰孩之貌故仙宮以青真小童為號其為器也玉朗洞照聖周萬變玄鏡幽覽才為真俊游於扶廣權此始運館於玄圃治仙職分子在師居從爾所願不存所授命必傾淪言畢夫人一一手指所施用節度以示帝焉凡十二事都畢又告帝曰夫五帝者方面之天精六甲六位之通靈佩而尊之可致長生此書上帝封於玄景之臺子其寶祕焉王母曰此三天太上之所撰藏於紫陵之臺隱以靈壇之房封以華琳之函韞以蘭繭之帛約以紫羅之素印以太帝之璽受之者四十年傳一人無其人八十年可頓授二人得道者四百年一傳得仙者四千年一傳得真者四萬年一傳升太上者四十萬年一傳非其人謂之泄天道得其人不傳是謂蔽天寶非限妄傳是謂輕天老受而不敬是謂慢天藻泄蔽輕慢四者取死之刀斧延禍之車乘也泄者身死於道路受上刑而骸裂蔽者盲聾於來世命凋枉而卒歿輕者鍾禍於父母詣玄都而考罰慢則暴終而墮惡道棄疾於後世此皆道之科禁故以相戒不可不慎也王母因授以五嶽真形圖帝拜受俱畢夫人自彈雲林之璈歌步玄之曲王母命侍女田田原作曰據明鈔本陳校本改四非答哥哥畢乃告帝從者姓名及冠帶執佩物名所以得知而紀焉至明旦王母與上元夫人同乘而去人馬龍虎導從音樂如初而時雲彩鬱勃盡為香氣極望西南良久乃絶帝既見王母及上元夫人乃信天下有神仙之事其後帝以王母所授五真圖靈光經及上元夫人所授六甲靈飛十二事自撰集為一卷及諸經圖皆奉以黃金之箱封以白玉之函以珊瑚為軸紫錦為囊安著柏梁臺上數自齊潔朝拜燒香灑掃然後乃執省焉帝自受法出入六年意旨清暢高韻自許為神真見降必當度世恃此不修至德更興起臺館勞弊萬民坑降殺服遠征夷秋路盈怒歎流血膏城每事不從至太初元年十一月乙酉天火燒柏梁臺真形圖靈飛經録十二事靈光經及自撰所受凡十四卷并函並失王母當知武帝既不從訓故火災耳其後東方朔一旦乘龍飛去同時衆人見從西北上冉冉仰望良久大霧覆之不知所適至元狩二年二月帝病行盩至西憩五柞宮丁卯帝崩入殯未央宮前殿三月葬茂陵是夕帝棺自動而有聲聞宮外如此數遍又有芳香異常陵畢墳埏間大霧門柱壞霧經一月許日帝冢中先有一玉箱一玉杖此是西胡康渠王所獻帝甚愛之故入梓宮中其後四年有人於扶風市中買得此二物帝時左右侍人有識此物是先帝所珍玩者因認以告有司詰之買者乃商人也從關外來宿鄽市其日見一人於北車巷中賣此二物青布三十匹錢九萬即售交原作之據明鈔本陳校本改度實不知賣箱杖主姓名事實如此有司以聞商人放還詔以二物付太廟又帝崩時遺詔以雜經三十餘卷常讀玩之使隨身斂到元元原誤建據緯略引校改康二年河東功曹李友入上黨抱犢山採藥於巖室中得此經盛以金箱卷後題東觀臣姓名記月日武帝時也河東太守張純以經箱奏進帝問武帝時左右侍臣有典書中郎冉登見經及箱流涕對曰此孝武皇帝殯殮時物也臣當時以著梓宮中不知何緣得出宣帝大愴然驚愕以經付孝武帝廟中按九都龍真經云得仙之下者皆先死過太陰中鍊尸骸度地戶然後乃得尸解去耳且先斂經杖乃忽顯出貨於市中經見山室自非神變幽妙孰能如此者乎出漢武內傳
