body:
  text: 嵩嶽嫁女嵩嶽嫁女三禮田璆者甚有文通熟群書與其友鄧韶博學相類皆以人昧不能彰其明家於洛陽元和癸巳歲中秋望夕攜觴晚出建春門期望月於韶別墅行二三里遇韶亦攜觴自東來駐馬道周未決所適有二書生乘驄復出建春門揖璆韶曰二君子挈榼得非求今夕望月地乎某弊莊水竹臺榭名聞洛下東南去此三二里儻能迂轡冀展傾蓋之分耳璆韶甚愜所望乃從而往問其姓氏多他語對行數里桂輪已升至一車門始入甚荒涼又行數百步有異香迎前而來則豁然真境矣泉瀑交流松桂夾道奇花異草照燭如晝好鳥騰翥和月闋璆韶請疾馬飛觴書生曰足下榼中厥味何如璆韶曰乾和五酘雖上清醍醐計不加此味也書生曰某有瑞露之酒釀於百花之中不知與足下五酘熟愈耳謂小童曰折燭夜一花傾與二君子嘗其花四出而深紅圓如小瓶徑三寸餘緑葉形類杯觸之有餘韻小童折花至於竹葉中凡飛數巡其味甘香不可比狀飲訖又東南行數里至一門書生揖二客下馬觴以燭夜花中之餘賚諸從者飲一杯皆大醉各止於戶外乃引客入則有鸞鶴數十騰舞來迎步而前花轉繁酒味尤美其百花皆芳香壓枝於路傍凡歷池館堂榭率皆陳設盤筵若有所待但不留璆韶坐璆韶飲多行又甚倦請暫憩盤筵書生曰坐以何難但不利於君耳璆韶詰其由曰今夕中天群仙會於茲嶽籍君神魄不雜腥羶請以知禮導升降此皆神仙位坐不宜塵觸耳言訖見直北花燭亘天簫韶沸空駐雲母雙車於金堤之上設水晶方盤於瑤幄之內群仙方奏霓裳羽衣曲書生前進命璆韶拜夫人夫人褰帷笑曰下域之人而能知禮然服食之氣猶然射人不可近他貴壻可各賜薰髓酒一杯璆韶飲訖覺肌膚溫潤稍異常人呼吸皆異香氣夫人問左右誰人召來曰衛符卿李八百夫人曰便令此二童接待於是二童引璆韶於神仙之後縱目璆問曰相者誰曰劉綱侍者誰曰茅盈東鄰女彈箏擊築者誰曰麻姑謝自然幄中座者誰曰西王母俄有一人駕鶴而來王母曰久望有玉女問曰禮生來未於是引璆韶進立於碧玉堂下左劉君笑曰適緣蓮花峰士奏章事須決遣尚多未來客何言久望乎王母曰奏章事者有何所為曰浮梁縣令求延年矣以其人因賄賂履官以苛虐為政生情於案牘忠恕之道蔑聞唯錐於貨財巧為之計更作自貽覆餗以促餘齡但以蓮花峰叟徇從於人奏章甚懇特紆死限量延五年璆問劉君誰曰漢朝天子續有一人駕黃龍戴黃旗道以笙歌從以嬪嫡及瑤幄而下王母復問曰李君來何遲曰為勑龍神設水旱之計作彌淮蔡以殲妖逆漢主曰奈百姓何曰上帝亦有此問豫一表斷其惑矣曰可得聞乎曰不能悉記略舉大綱耳其表云某縣某克搆丕華德洽兆庶臨履深薄匪敢怠荒不勞師車平中夏巴蜀之孽不費天府掃東吳上黨之妖九有已見其廓清一方尚屯其氛祲伏以虺蝪肆毒痛於淮蔡豺狼尚猜其口喙螻蟻猶固其封疆若遣時豐人安是稔群醜但使年餓厲作必搖人心如此倒戈而攻可以席捲禍三州之逆黨所損至微安六合之疾氓其利則厚伏請神龍施水厲鬼行災由此天誅以資戰力漢主曰表至嘉弟既允許可矣前賀誅鋤矣書生謂璆韶此開元天寶太平之主也未頃聞簫韶自空而來執絳節者前唱言穆天子來奏樂群仙皆起王母避位拜迎二主降階入幄環坐而飲王母曰何不拉取老軒轅來曰他今夕主張月宮之宴非不勤請耳王母又曰瑤池一別後陵谷幾遷移向來觀洛陽東城已丘墟矣定鼎門西路忽焉復新市朝云名利如舊可以悲歎耳穆王把酒請王母歌以珊瑚鉤擊盤而歌曰勸君酒為君悲且吟曰自從頻見市朝改無復瑤池晏樂心王母持杯穆天子歌曰奉君酒休嘆市朝非早知無復瑤池興悔駕驊騮草草歸歌竟與王母話瑤池舊事乃重歌一章云八馬回乘汗漫風猶思往事憩昭宮晏移南圃情方洽樂奏鈞天曲未終斜漢露凝殘月冷流霞杯泛曙光紅崑崙回首不知處疑是酒酣魂夢中王母酬穆天子歌曰一曲笙歌瑤水濱曾留逸足駐征輪人間甲子周千歲靈境杯觴初一巡玉兔銀河終不夜奇花好樹鎮長春悄知碧海饒詞句歌向俗流疑誤人酒至漢武帝王母又歌曰珠露金風下界秋漢家陵樹冷翛翛當時不得仙桃力尋作浮塵飄隴頭漢主上王母酒曰五十餘年四海清自親丹竈得長生若言盡是仙桃力看取神仙簿上名帝把酒曰吾聞丁令威能歌命左右召來令威至帝又遣子晉吹笙以和歌曰月照驪山露泣花似悲仙帝早升遐至今猶有長生鹿時繞溫泉望翠華帝持持杯久之王母曰應須召葉靜能來唱一曲當時事靜能續至跪獻帝酒復歌曰幽薊煙塵別九重貴妃湯殿罷歌鐘中宵扈從無全仗大駕蒼黃發六龍粧匣尚留金翡翠暖池猶浸玉芙蓉荊榛一閉朝元路唯有悲風吹晚松歌竟帝悽慘良久諸仙亦慘然於是黃龍持杯亦於車前再拜祝曰上清神女玉京仙郎樂此今夕和鳴鳳凰鳳凰和鳴將翱將翔與天齊休慶流無央仙郎即以鮫綃五千匹海人文錦三千端琉璃琥珀器一百床明月驪珠各十斛贈奏樂仙女乃有四鶴立於車前載仙郎並相者侍者兼有寶花臺俄進法膳凡數十味亦霑及璆韶璆韶飲有仙女捧玉箱托紅箋筆硯而至請催粧詩於是劉綱詩曰玉為質兮花為顏蟬為鬢兮雲為鬟何勞傅粉兮施渥丹早出娉婷兮縹渺間於是茅盈詩云水晶帳開銀燭明風搖珠珮連雲清休勻紅粉飾花態早駕雙鸞朝玉京巢父詩曰三星在天銀河回人間曙色東方來玉苗瓊蘂亦宜夜莫使一花衝曉開詩既入內有環珮聲即有玉女數十引仙郎入帳召璆韶行禮禮畢二書生復引璆韶辭夫人夫人曰非無至寶可以相贈但爾力不任挈耳各賜延壽酒一杯曰可增人間半甲子復命衛符卿等引還人間無使歸途寂寞於是二童引璆韶而去折花傾酒步步惜別衛君謂璆韶曰夫人白日上升驂鸞駕鶴在積習而已未有積德纍仁抱才蘊學卒不享爵祿者吾未之信儻吾子塵牢可踰俗桎可脫自今十五年後待子於三十六峰願珍重自愛復出來時車門握手告別別訖行四五步杳失所在唯有嵩山嵯峨倚天得樵徑而歸及還家已歲餘室人招魂葬于北邙之原墳草宿矣於是璆韶棄家室同入少室山今不知所在出纂異記裴航唐長慶中有裴航秀才因下第遊于鄂渚謁故舊友人崔相國值相國贈錢二十萬遠挈歸于京因傭巨舟載于湘漢同載有樊夫人乃國色也言詞問接帷帳昵洽航雖親切無計道達而會面焉因賂侍妾裊煙而求達詩一章曰同為胡越猶懷想況遇天仙隔錦屏儻若玉京朝會去願隨鸞鶴入青雲詩往久而無答航數詰裊煙煙曰娘子見詩若不聞如何航無計因在道求名醞珍果而獻之夫人乃使裊煙召航相識及褰帷而玉瑩光寒花明麗景雲低鬟鬢月淡修眉舉止煙霞外人肯與塵俗為偶航再拜揖良久之夫人曰妾有夫在漢南將欲棄官而幽棲巖谷召某一訣耳深哀草擾慮不及期豈更有情留盻他人的不然耶但喜與郎君同舟共濟無以諧謔為意耳航曰不敢飲訖而歸操比冰霜不可干冒夫人後使裊煙持詩一章曰一飲瓊漿百感生玄霜搗盡見雲英藍橋便是神仙窟何必崎嶇上玉清航覽之空愧佩而已然亦不能洞達詩之旨趣後更不復見但使裊煙達寒暄而已遂低襄漢與使婢挈粧奩不告辭而去人不能知其所造航遍求訪之滅迹匿形竟無蹤兆遂飾粧歸輦下經藍橋驛側近因渴甚遂下道求漿而飲見茅屋三四間低而復隘有老嫗緝麻苧航揖之求漿嫗咄曰雲英擎一甌漿來郎君要飲航訝之憶樊夫人詩有雲英之句深不自會俄於葦箔之下出雙玉手捧瓷航接飲之真玉液也但覺異香氤鬱透于戶外因還甌遽揭箔覩一女子露裛瓊英春融雪彩臉欺膩玉鬢若濃雲嬌而掩面蔽身雖紅蘭之隱幽谷不足比其芳麗也航驚怛植足而不能去因白嫗曰某僕馬甚飢願憩於此當厚答謝幸無見阻嫗曰任郎君自便且遂飯僕秣馬良久謂嫗曰向覩小娘子艷麗驚人姿容擢世所以躊蹰而不能適願納厚禮而娶之可乎嫗曰渠已許嫁一人但時未就耳我今老病只有此女孫昨有神仙遺靈丹一刀圭但須玉杵臼搗之百日方可就吞當得後天而老君約取此女者得玉杵臼吾當與之也其餘金帛吾無用處耳航拜謝曰願以百日為期必攜杵臼而至更無他許人嫗曰然航恨恨而去及至京國殊不以舉事為意但於坊曲鬧市喧衢而高聲訪其玉杵臼曾無影響或遇朋友若不相識衆言為狂人數月餘日或遇一貨玉老翁曰近得虢州藥鋪卞老書云有玉杵臼貨之郎君懇求如此此君吾當為書導達航愧荷珍重果獲杵臼卞老曰非二百緡不可得航乃瀉囊兼貨僕貨馬方及其數遂步驟獨挈而抵藍橋昔日嫗大笑曰有如是信士乎吾豈愛惜女子而不酬其勞哉女亦微笑曰雖然更為吾搗藥百日方議姻好嫗於襟帶間解藥航即搗之晝為而夜息夜則嫗收藥臼於內室航又聞搗藥聲因窺之有玉兔持杵臼而雪光輝室可鑒毫芒於是航之意愈堅如此日足嫗持而吞之曰吾當入洞而告姻戚為裴郎具帳幃遂挈女入山謂航曰但少留此逡巡車馬僕隸迎航而往別見一大第連雲珠扉晃日內有帳幄屏幃珠翠珍玩莫不臻至愈如貴戚家焉仙童侍女引航入帳就禮訖航拜嫗悲泣感荷嫗曰裴郎自是清冷裴真人子孫業當出世不足深愧老嫗也及引見諸賓多神仙中人也後有仙女鬟髻霓衣云是妻之姊耳航拜訖女曰裴郎不相識耶航曰昔非姻好不醒拜侍女曰不憶鄂渚同舟回而抵襄漢乎航深驚怛懇悃陳謝後問左右曰是小娘子之姊雲翹夫人劉綱仙君之妻也已是高真為玉皇之女吏嫗遂遣航將妻入玉峰洞中瓊樓殊室而居之餌以絳雪瓊英之丹體性清虛毛髮紺緑神化自在超為上仙至太和中友人盧皓遇之於藍橋驛之西因説得道之事遂贈藍田美玉十斤紫府雲丹一粒敘話永日使達書于親愛盧皓稽顙曰兄既得道如何乞一言而教授航曰老子曰虛其心實其腹今之人心愈實何由得道之理盧子懵然而語之曰心多妄想腹漏精溢即虛實可知矣凡人自有不死之術還丹之方但子未便可教異日言之盧子知不可請但終宴而去後世人莫有遇者出傳奇
