body:
  text: 木怪下竇寬唐扶風竇寬者家于梁山太和八年秋自大理評事解縣推鹽使判官罷職退歸因治園屋命家仆伐一樹既伐而有血滂溜汪然注地食頃而盡寬異之且知為怪由是閉門絶人事至明年冬十一月鄭注李訓反寬與注連遂誅死于左禁軍中吳偃有厲泉縣民吳偃家于田野間有一女十歲余一夕忽遁去莫知所往后數余日偃夢其父謂偃曰汝女今在東北隅蓋木神為祟偃驚而寤至明日即於東北隅窮其迹果聞有呼吟之聲偃視之見其女在一穴內口甚小然其中稍寬敞傍有古槐木盤根極大于是挈之而歸然兀若沈醉者會有李道士至偃請符術呵禁其女忽瞬而語曰地東北有槐木木有神引某自樹腹空入地下穴內故某病于是伐其樹后數日女病始愈董觀有董觀者嘗為僧居于太原佛寺太和七年夏與其表弟王生南遊荊楚后將入長安道至商於一夕舍山館中王生既寐觀獨未寢忽見一物出燭下既而掩其燭狀類人手而無指細視燭影外若有物觀急呼王生生起其手遂去觀謂王曰慎無寢魅當再來因持挺而坐伺之良久王生曰魅安在兄妄矣既就寢頃之有一物長五尺余蔽燭而立無手及面目觀益恐又呼王生生怒不起觀因以挺椹其首其軀若草所穿挺亦隨入其中而力取不可得俄乃退去觀慮又來逮曉不敢寢明日訪館吏吏曰此西數里有古杉常為魅疑即所見也即與觀及王生徑尋果見古杉有挺貫其柯葉間吏曰人言此為妖且久未嘗見其真今則信矣急取斧盡伐去之京洛士人京洛間有士人子弟失其姓名素善雕鏤因行他邑山路見一大槐樹蔭蔽數畝其根旁瘤癭如數斗甕者四焉思欲取之人力且少又無斧鋸之屬約回日采取之恐為人先采乃于衣簣中取紙數張割為錢系之于樹瘤上意者欲為神樹不敢采伐也既舍去數月而還大率人夫并刀斧欲伐之至此樹側乃見畫圖影旁挂紙錢實繁復有以香醮奠之處士人笑曰村人無知信此可惑也乃命斧伐之次忽見紫衣神在旁容色屹然叱仆曰無伐此木士人進曰吾昔行次見槐瘤欲取之以無斧鋸恐人采之故權以紙錢占護耳本無神也君何止遏神曰始者君權以紙錢系樹之后咸曰神樹能致禍福相與祈祀冥司遂以某職受享酹今有神也何言無之若必欲伐之禍甚至矣士人不聽神曰君取此何用客曰要雕刻為器耳神曰若爾可以善價贖之乎客曰可神曰所須幾何士人曰可遺百千神曰今奉百絹于前五里有壞墳絹在其中如不得者即復此相見士人遂至壞墳中果得絹一無欠焉江叟開成中有江叟者多讀道書廣尋方術善吹笛往來多在永樂縣靈仙閣時沈飲酒適閿鄉至盤豆館東官道大槐樹下醉寢及夜艾稍醒聞一巨物行聲舉步甚重叟暗窺之見一人崔嵬高數丈至槐側坐而以毛手捫叟曰我意是樹畔鋤兒乃甕邊畢卓耳遂敲大樹數聲曰可報荊館中二郎來省大兄大槐乃語云勞弟相訪似聞槐樹上有人下來與語須臾飲酌之聲交作荊山槐曰大兄何年拋卻兩京道上槐王耳大槐曰我三甲子當棄此位荊山槐曰大兄不知老之將至猶顧此位直須至火入空心膏流節斷而方知退大是無厭之士何不如今因其震霆自拔于道必得為材用之木構大廈之梁棟尚存得重重碎錦片片真花豈他日作朽蠹之薪同入爨為煨燼耳大槐曰雀鼠尚貪生吾焉能辦此事邪槐曰老兄不足與語告別而去及明叟方起數日至閿鄉荊山中見庭槐森聳枝干扶疏近欲十圍如附神物遂伺其夜以酒脯奠之云某昨夜聞槐神與盤豆官道大槐王論語云云某臥其側并歷歷記其説今請樹神與我言語槐曰感子厚意當有何求殊不知爾夜爛醉于道夫乃子邪叟曰某一生好道但不逢其師樹神有靈乞為指教使學道有處當必奉酬槐神曰子但入荊山尋鮑仙師脫得見之或水陸之間必獲一處度世蓋感子之請慎勿泄吾言也君不憶華表告老狐禍及余矣叟感謝之明日遂入荊山緣岩循水果訪鮑仙師即匍匐而禮之師曰子何以知吾而來師也須實言之叟不敢隱具陳荊山館之樹神言也仙師曰小鬼焉敢專輒指人未能大段誅之且飛符殘其一枝叟拜乞免仙師曰今不誅后當繼有來者遂謂叟曰子有何能一一陳之叟曰好道癖于吹笛仙師因令取笛而吹之仙師歎曰子之藝至矣但所吹者枯竹笛耳吾今贈子玉笛乃荊山之尤者但如常笛吹之三年當召洞中龍矣龍既出必銜明月之珠而贈子子得之當用醍醐煎之三日凡小龍已腦疼矣蓋相感使其然也小龍必持化水丹而贖其珠也子得當吞之便為水仙亦不減萬歲無煩吾之藥也蓋子有琴高之相耳仙師遂出玉笛與之叟曰玉笛與竹笛何異師曰竹者青也與龍色相類能肖之吟龍不為怪也玉者白也與龍相克忽聽其吟龍怪也所以來觀之感召之有能變耳義出于玄叟受教乃去后三年方得其音律后因之嶽陽刺史李虞館之時大旱叟因出笛夜于聖善寺經樓上吹果洞庭之渚龍飛出而降云繞其樓者不一遂有老龍果銜珠贈叟叟得之依其言而熬之二晝果有龍化為人持一小藥合有化水丹匍匐請贖其珠叟乃持合而與之珠餌其藥遂變童顏入水不濡凡天下洞穴無不歷覽后居于衡陽容發如舊耳龍蛇草後漢靈帝中平年夏陳留郡濟陽濟陰冤句離狐城皋陽武城郭路邊生草悉備龍蛇鳥獸之形續漢志曰其狀五色毛羽頭目足翅皆具或作人形操持弓弩牛馬萬物之狀是歲黑山賊張牛角等十余輩并起抄掠后兄何進秉權漢遂微弱又董卓起兵焚燒宮闕之應鮮卑女晉有士人買得鮮卑女名懷順自説其姑女為赤莧所魅始見一丈夫容質姘淨著赤衣自云家在側北女于是恆歌謠自得每至將夕輒結束去屋后其家伺候唯見有一株赤莧女手指環挂其莧莖芟之而女號泣經宿遂死焉蕨蛇太尉郗鑒鎮丹陽也曾出獵時二月中蕨始生有一甲士折食一莖即覺心中潭潭欲吐因歸家仍成心腹疼痛經半年許忽大吐吐一赤蛇長尺余尚動搖乃挂于簷前蛇漸焦經宿視之乃是一莖蕨耳猶昔之所食也病遂差芥蟲五嶺春夏率皆霪水晴日既少涉秋入冬方止凡物皆易蠹敗朋膠氈罽無逾年者嘗買芥菜置壁下忘食數日皆生四足有首尾能行走大如螳螂但腰身細長耳崔玄微唐天寶中處士崔玄微洛東有宅耽道餌術及茯苓三十載因藥盡領僮仆輩入嵩山采芝一年方回宅中無人蒿萊滿院時春季夜間風清月朗不睡獨處一院家人無故輒不到三更后有一青衣云君在院中也今欲與一兩女伴過至上東門表姨處暫借此歇可乎玄微許之須臾乃有十余人青衣引入有緑裳者前曰某姓楊指一人曰李氏又一人曰陶氏又指一緋小女曰姓石名阿措各有侍女輩玄微相見畢乃坐于月下問行出之由對曰欲到封十八姨數日云欲來相看不得今夕衆往看之坐未定門外報封家姨來也坐皆驚喜出迎楊氏云主人甚賢只此從容不惡諸亦未勝于此也玄微又出見封氏言詞冷冷有林下風氣遂揖入坐色皆殊絶滿座芳香馥馥襲人諸人命酒各歌以送之玄微志其二焉有紅裳人與白衣送酒歌曰皎潔玉顏勝白雪況乃當年對芳月沉吟不敢怨春風自歎容華暗消歇又白衣人送酒歌曰絳衣披拂露盈盈淡染胭脂一朵輕自恨紅顏留不住莫怨春風道薄情至十八姨持盞性頗輕佻翻酒汗阿措衣阿措作色曰諸人即奉求余即不知奉求耳拂衣而起十八姨曰小女弄酒皆起至門外別十八姨南去諸人西入苑中而別玄微亦不知異明夜又來云欲往十八姨處阿措怒曰何用更去封嫗舍有事只求處士不知可乎阿措又言曰諸侶皆住苑中每歲多被惡風所撓居止不安常求十八姨相庇昨阿措不能依回應難取力處士倘不阻見庇亦有微報耳玄微曰某有何力得及諸女阿措曰但處士每歲歲日與作一朱幡上圖日月五星之文于苑東立之則免難矣今歲已過但請至此月二十一日平旦微有東風即立之庶夫免患也玄微許之乃齊聲謝曰不敢忘德拜而去玄微于月中隨而送之逾苑牆乃入苑中各失所在依其言至此日立幡是日東風振地自洛南折樹飛沙而苑中繁花不動玄微乃悟諸女曰姓楊李陶及衣服顏色之異皆衆花之精也緋衣名阿措即安石榴也封十八姨乃風神也后數夜楊氏輩復至愧謝各裹桃李花數斗勸崔生服之可延年卻老願長如此住衛護某等亦可致長生至元和初玄微猶在可稱年三十許人又尊賢坊田弘正宅中門外有紫牡丹成樹發花千余朵花盛時每月夜有小人五六長尺余遊于花上如此七八年人將掩之輒失所在
