body:
  text: 楊副使楊副使壬午歲廣陵瓜州市中有人市果實甚急或問所用云吾長官明日上事有問長官為誰云楊副使也又問官署何在云金山之東遂去不可復問時浙西有副使被召之揚都明日船至金山無故而沒僧鈱楚廣陵法云寺僧鈱楚常與中山賈人章某者親熟章死鈱楚為設齋誦經數月忽遇章于市中楚未食章即延入食店為置胡餅既食楚問君已死那得在此章曰然吾以小罪而未得解免今配為揚州掠剩鬼復問何為掠剩曰凡吏人賈販利息皆有數常過數得之即為余剩吾得掠而有之今人間如吾輩甚多因指路人男女曰某人某人皆是也頃之有一僧過于前又曰此僧亦是也因召至與語良久僧亦不見楚也頃之相與南行遇一婦人賣花章曰此婦人亦鬼所賣花亦鬼用之人間無所見也章則出數錢買之以贈楚曰凡見此花而笑者皆鬼也即告辭而去其花紅芳可愛而甚重楚亦昏然而歸路人見花頗有笑者至寺北門自念吾與鬼同遊復持鬼花亦不可即擲花溝中濺水有聲既歸同院人覺其色甚異以為中惡競持湯藥以救之良久乃復具言其故因相與覆視其花乃一死人手也楚亦無恙陳守規軍將陳守規者常坐法流信州寓止公館館素凶守規始至即鬼物晝見奇形怪狀變化倏忽守規素剛猛親持弓矢刀杖與之斗久之乃空中語曰吾鬼神不欲與人雜居君既堅正願以兄事可乎守規許之自是常與交言有吉凶輒先報或求飲食與之輒得錢物既久頗為厭倦因求方士手書章疏奏之上帝翌日鬼乃大罵曰吾與君為兄弟奈何上章訴我大丈夫結交當如是耶守規曰安得有此事即于空中擲下章疏紙筆宛然又曰君圖我居處謂我無所止也吾今往蜀川亦不下于此矣由是遂絶廣陵賈人廣陵有賈人以柏木造床凡什器百餘事制作甚精其費已二十萬載之建康賣以求利晚至瓜步微有風起因泊山下頃之有巨舟其中空惟篙工三人乘之亦泊于其側賈人疑之相與議此為群盜也將伺夜而劫我前浦既遠風又益急逃避無所夜即相與登岸深林中以避之俄而風雨雷電蒙覆舟所岸上則星月了然食頃雨止云散見巨舟稍稍前去乃敢歸舟中所載柏木什器都不復見余物皆在巨舟猶在東岸有人呼曰爾無恨當還爾價賈人所載既失復歸廣陵至家已有人送錢三十萬置之而去問其人即泊瓜步之明日也浦城人浦城人少死于路家有金一斤其妻匿之不聞于其姑逾年忽夜扣門號哭而歸其母驚駭相與哀慟曰汝真死耶曰兒實已死有不平事是以暫歸因坐母膝言語如平生但手足冷如冰耳因起握刀責其妻曰我此有金爾何供老母而自藏耶即欲殺之其母曰汝已死矣倘殺是人必謂吾所殺也于是哭辭母而去復自提刀送其妻還父家逮曉及門數十步忽然不見劉道士廬山道士劉某將遊南嶽路出宜春宿一村家其家至貧復喪其子未有以斂既夕忽有一男子行哭而來但撫膺而呼曰可惜可惜劉出視之見面白如雪作兩髽結徑入其家負其去莫知所之清源都將清源都將楊某為本郡防過營副將有大第在西郭某晨趨府未歸有人方食忽有一鵝負紙錢自門而入徑詣西廊房中家人云此鵝自神祠中來耶乃令奴逐之奴入房但見一雙髻白髯老翁家人莫不驚走某歸聞之怒持杖擊之鬼出沒四隅變化倏忽杖莫能中某益怒曰食訖當復來擊杖之鬼乃折腰而前曰諾楊有二女長女入廚切肉且食肉落砧輒失去女執刀向空四斫乃露一大黑毛手曰請斫女走氣殆絶因而成病次女于大甕中取鹽有一猴自甕突出上女子背女走至堂前復失之亦成疾乃召巫女壇召之鬼亦立壇作法愈甚于巫巫不能制亦懼而去頃之二女及妻皆卒后有善作魔法者名曰明教請為持經一宿鬼乃唾罵某而去爾因遂絶某其年亦卒王妻王者南安縣大盈村人也妻林氏忽病有鬼憑之言我陳九娘也以香花祠我當有益于主人許之乃呼林為阿姐為人言禍福多中半余歲乃見形自腰已下可見人未常來者亦未見也但以言語相接鄉人有召者不擇遠近與林偕往人有祭祀但具酒食陳氏自召神名祝詞明惠聽者忘倦林拱坐而已二年間獲利甚博一旦忽悲泣謂林曰我纍生為人女年未笄而夭聞于地府乃前生隱沒阿姐錢二十萬故主者令我為神以償此錢訖即生為男子而獲壽今酬已足請置酒為別乃盡見其形容質端媚言辭婉轉殷勤致謝嗚咽云珍重珍重遂不見林昌業漳浦人也博覽典籍精究術數性高雅人不可干嘗為泉州軍事衙推年七十余退居本郡龍溪縣關額山之陽鄉里宗敬之有良田數頃嘗欲舂谷為米載詣州貨之功力未集忽有雙髻男子年可三十須髯甚長來詣林林問何人但微笑唯唯不對林知其鬼物令家人食之致飽而去翌日忽聞倉下礱谷聲視之乃昨日男子取谷礱之而林問無故辛苦耶鬼亦笑不言復置丰饌飯蔬而已凡月余礱谷不輟鬼復自斗量得米五十余石拜辭而去卒無一言不復來矣潘襲潘襲為建安令遣一手力繼牒下鄉有所追攝手力新受事未嘗行此路至夕道左有草舍扣門求宿其家唯一婦人應門云主人不在又將移居無暇延客也手力以道遠多虎苦苦求之婦人即召入門側席地而寢婦人結束箱篋什器之類達旦不寐手力向曉辭去行數里乃覺失所繼牒復返求之宿處乃是一墳方見其家人改葬及開棺席下得一書即所失之牒也胡澄池陽人胡澄傭耕以自給妻卒官給棺以葬其平生服飾悉附棺中后數年澄偶至市見到肆賣首飾者熟視之乃妻送葬物也問其人云一婦人寄于此約某日來取澄如期復往果見其妻取直而去澄因躡其后至郊外及之妻曰我昔葬時官給祕器雖免暴骨然至今為所司督責其直計無所出賣此以償之爾言訖不見澄遂為僧王攀高郵縣醫工王攀鄉里推其長者恆往來廣陵城東每數月輒一直縣自念明日當赴縣今夕即欲出東水門夜泛小舟及明可至既而與親友飲于酒家不覺大醉誤出參佐門投一村舍宿向曉稍醒東壁有燈而不甚明仰望屋室知非常宿處因獨歎曰吾明日須至縣今在何處也久之乃聞其內躡履聲有婦人隔壁問曰客將何之因起辭謝曰欲之高郵醉中誤至于是婦曰此非高郵道也將使人奉送至城東無憂也乃有一村豎至隨之而行每歷艱險豎輒以手捧其足而過既隨至城東嘗所宿店告辭而去攀解其襦以贈之豎不受固與之乃持去既而入店易衣乃見其襦故在腰下即復詣處尋之但古冢耳并無人家鄭守澄廣陵裨將鄭守澄新買婢旬日有夜叩門者曰君家買婢其名籍在此不可留也開門視之無所見方怪之數日廣陵大疫此婢亦病遂卒既而守澄亦病卒而吊客數人轉相染者皆卒甲寅歲春也劉騭洪州高安人劉騭少遇亂有姊曰糞掃為軍將孫金所虜有妹曰烏頭生十七年而卒卒后三歲孫全為常州團練副使糞掃從其女君會宴于大將陳氏乃見烏頭在焉問其所從來云頃為人所虜至嶽州與劉翁媼為女嫁得北來軍士任某即陳所將卒也從陳至此爾通信至其家騭時為縣手力后數年因事至都遂往昆陵省之晚止逆旅翌日先謁孫金即詣任營中先遣小仆覘之方見灑掃庭內曰我兄弟將至矣仆良久扣門問為誰曰高安劉之家使乃曰非二兄名騭多髯者乎昨日晚當至何為遲也即自出營門迎之容貌如故相見悲泣了無少異頃之孫金遣其諸甥持酒食至任之居宴敘良久烏頭曰今日乃得二兄來證我為人向者恆為諸生輩呼我為鬼也任亦言其舉止輕捷女工敏速恆夜作至旦若有人為同作者飲食必待冷而后食騭因密問汝昔已死那得至是對曰兄無為如此問我將不得相見矣騭乃不敢言之久任卒再適軍士羅氏隸江州陳承昭為高安制置使召騭問其事令發墓視之墓在米嶺無人省視數十年矣伐木開路而至見墓上有穴大如碗其深不測衆懼不敢發相與退坐大樹下筆疏其事以白承昭是歲烏頭病騭往省之乃曰頃為鄉人十余輩持刀杖劫我幾中我面我大責罵力拒之乃退坐大樹下作文書而去至今舉身猶痛騭乃知恆出入墓中也因是亦懼而疏之羅后移隸
