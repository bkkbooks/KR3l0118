body:
  text: 徐慶徐慶唐高宗時徐慶為征遼判官有一典不得姓名慶在軍忽夢己化為羊為典所殺覺後悸懼流汗至曉此典詣慶慶問夜來有所夢否典云夢公為羊手加屠割意甚不願為官所使制不自由所使制不自由六字明鈔本作則解制使之惑慶自此不食羊肉矣慶自此不食羊肉矣八字明鈔本作慶慰留之遂不食葷至則天時慶纍加至司農少卿雍州司馬時典已任大理獄丞後慶被誣與內史令裴炎通謀應節明鈔本節作接英公徐敬業揚州反被執送大理忽見此丞押獄慶便流涕謂之曰征遼之夢今當應之及被殺戮之日竟是此丞引出出廣古今五行記周仁軌唐周仁軌京兆萬年人也孝和皇后韋氏母黨纍遷金吾大將軍除并州長史性殘酷好殺在州忽於堂階下見一人臂如新斷來血流瀝瀝仁軌令人送去州二十餘里外數日令看其臂尚在時盛暑毒肉色無變人威怪之其月孝和崩仁軌以韋氏黨伏誅介士抽刀斫之仁軌舉臂承刃所中其臂墮地與比見者無異又馳騎往於先送處看之至彼一無所見出廣古今五行記徐敬業唐徐敬業舉兵有大星蓬蓬如筐籠經三宿而失俄而敬業敗出朝野僉載杜景佺唐司刑卿杜景佺授并州長史馳驛赴任其夜有大星如斗落於庭前至地而沒佺至并州祁縣界而卒群官迎祭回所上食為祭盤出朝野僉載黑齒常之唐將軍黑齒常之鎮河源軍城極嚴峻有三口狼入營繞官舍不知從何而至軍士射殺黑齒惡之移之外奏討三曲党項奉敕許遂差將軍李謹行充替謹行到軍旬日病卒出朝野僉載顧琮唐天官侍郎顧琮新得三品有子壻來謁時大門造成琮乘馬至門鼓鼻踣地不進鞭之跳躍而入從騎亦如之有頃門無故自倒琮不悅遂病郎中員外已下來問疾琮云未合入三品為諸公成就至此自知不起矣旬日而薨出朝野僉載路敬淳唐則天如意中著作郎路敬淳莊在濟源有水碾碾上柱去水五六尺一柱將壞已易之家人取充樵柱中有一鮎魚尺餘尚活至數年敬淳坐罪被殺出廣古今五行記張易之唐張易之初造一大堂甚壯麗計用數百萬紅粉泥壁文柏帖柱琉璃沉香為飾夜有鬼書其壁曰能得幾時易之令削去明日復書之前後六七削易之乃題其下曰一月即令足自是不復更書經半年易之籍沒入官出朝野僉載鄭蜀賓唐長壽中有滎陽鄭蜀賓頗善五言竟不聞達年老方授江左一尉親朋餞別於上東門蜀賓賦詩留別曰畏途方萬里生涯近百年不知將白首何處入黃泉酒酣自詠聲調哀感滿座為之流涕竟卒於官出大唐新語劉希夷唐劉希夷一名庭芝汝州人少有文華好為宮體詩詞旨悲苦不為時人所重善彈琵琶嘗為白頭翁詠云今年花落顏色改明年花開復誰在既而自悔曰我此詩讖與石崇白首同所歸何異也乃更作一聯云年年歲歲花相似歲歲年年人不同既而歎曰此句復似向讖矣然死生由命豈復由此乃兩存之詩成未周歲為奸人所殺或云宋之問害之後孫昱撰正聲集以希夷詩為集中之最由是大為時人所稱出大唐新語崔玄暐唐崔玄暐初封博陵王身為益府長史受封令所司造輅初成有大風吹其蓋傾折識者以為不祥無何弟暈為雲陽令部人殺之雍州衙內暐三從以上長流嶺南斯亦咎徵之先見也出朝野僉載宋善威唐瀛州饒陽人宋善威曾任一縣尉嘗晝坐忽然取靴衫笏走出門迎接拜伏引入諸人不見但聞語聲威命酒饌樂飲仍作詩曰月落三株樹日映九重天良夜歡宴罷暫別庚申年後威果至申年而卒出朝野僉載李處鑒唐開元三年有熊晝日入廣府城內經都督門前過軍人逐十餘里射殺之後月餘都督李處鑒死自後長史朱思賢被告反禁身半年才出即卒司馬宋慶賓長史竇崇嘉相繼而卒出朝野僉載麴先沖唐開元四年尚書考功院廳前一雙桐樹忽然枯死旬日考功員外郎邵某卒尋而麴先沖為郎中判邵舊案月餘西邊樹又枯死省中憂之未幾而先沖又卒出朝野僉載呂崇粹唐開元中諫議大夫呂崇粹東平人美秀魁梧薄有詞彩宅在京永崇坊於家忽見數箇小兒腳脛自膝下自踝已上流血淋瀝如新截來旬日粹遇疾而卒出廣古今五行記源乾曜唐源乾曜為宰相移政事床時姚元崇歸休及假滿來見床移忿之曜懼下拜玄宗聞之而停曜宰相諱移床移則改動曜停後元崇罷此其應也出朝野僉載毋旻唐右補闕毋旻博學有著術才上表請修古史先撰目録以進玄宗稱善賜絹一百匹性不飲茶著代飲茶序其略曰釋滯消壅一日之利暫佳瘠氣侵精終身之纍斯大獲益則歸功茶力貽患則不謂茶災豈非福近易知禍遠難見云後直集賢無何以熱疾暴終初嘗夢著衣冠上北邙山親友相送及至山頂回顧不見一人意甚惡之及卒僚友送葬北邙果如初夢玄宗聞而悼之贈朝散大夫出大唐新語楊慎矜唐楊慎矜隋室之後其父崇禮太府卿葬少陵原封域之內草木皆流血守者以告慎矜大懼問史敬忠忠有術謂慎矜可以禳之免禍乃於慎矜後園大陳法事罷朝歸則裸袒桎梏坐於叢棘如是者數旬而流血亦止敬忠曰可以免禍慎矜愧之遣侍婢明珠明珠有美色路由八姨門貴妃妹也姨方登樓臨大道姨與敬忠相識使人謂曰何得從車乎敬忠未答使人去簾觀之姨於是固留邀敬忠坐樓乃曰後車美人請以見遺因駕其車以入敬忠不敢拒姨明日入宮以侍婢從帝見而異之問其所來明珠曰楊慎矜家人也近贈史敬忠帝曰敬忠何人而慎矜輒遺其婢明珠乃具言厭勝之事上大怒以告林甫林甫素忌慎矜才必為相以吉溫陰害有憾於慎矜遂搆成其事下溫案之溫求得敬忠於汝州誣慎矜以自謂亡隋遺裔潛謀大逆將復宗祖之業於是賜自盡皆不全其族出明皇雜録王儦唐太子僕通事舍人王儦肅宗克復後降官為人所告繫御史臺儦未繫之前年九月儦與嬖姬夜坐堂下有流星大如盎光明照耀墜於井中在井久猶光明使人求之無所得儦懼出宅竟徙播州儦殊不意行至鳳州疽背裂死出紀聞崔曙唐崔曙舉進士作明堂火珠詩贖帖曰夜來雙月滿曙後一星孤當時以為警句及來年曙卒唯一女名星星人始悟其自讖也出本事詩元載唐元載為相時正晝有書生詣焉既見拜語曰聞公高義好士輒獻詩一篇以寄其意詞曰城南路長無宿處荻花紛紛如柳絮海燕銜泥欲作窠空屋無人卻飛去載亦不曉其意既出門而沒後歲餘載被法家破矣出通幽録彭偃唐大曆中彭偃未仕時嘗有人謂曰君當得珠而貴後且有禍尋為官得罪謫為澧州司馬既至以江中多多原作名據明鈔本改蚌偃喜以為珠可取即命人採之獲蚌甚多而卒無有應及朱泚反召偃為僞中書舍人偃方悟得珠乃朱泚也後誅死出宣室志劉沔唐貞元中淮西用兵時劉沔為小將每捉生踏伏沔必在數前後重創將死數四後因月黑風甚又令捉生沔憤激深入意必死行十餘里因坐將睡忽有人覺之授以雙燭曰君方大貴但心存此燭在即無憂也沔後拜將常見燭影在雙旌上後不復見燭乃輿疾歸京卒出酉陽雜俎韓滉唐丞相韓滉自金陵入朝歲餘後於楊子江中有龜鱉滿江浮下而悉無頭當此時滉在城中薨人莫知其故出戎幕閒談嚴震唐司空嚴震梓州鹽亭縣人所居枕釜戴山但有鹿鳴即嚴氏一人必殞或一日有親表對坐聞鹿鳴其表曰釜戴山中鹿又鳴嚴曰此際多應到表兄其表兄遽對曰表兄不是嚴家子合是三兄與四兄不日嚴氏子一人果亡是何異也出北夢瑣言李德裕唐衛公李德裕初為太原從事睹公牘中文水縣解牒稱武士文水縣墓前有碑元和中忽失龜頭所在碑上有武字十一處皆鐫去之其碑大高於華嶽者非人力攀削所及不經半年武相遇害出戎幕閉談李師道唐李師道既以青齊叛章武帝將討之凡數年而王師不勝師道益驕嘗一日坐於堂其榻前有銀鼎忽相鼓其一鼎耳足盡墜後月餘劉悟手刃師道青齊遂平蓋銀鼎相鼓之兆也出宣室志韋溫唐韋溫為宣州病瘡於首因託後事於女壻且曰豫年二十九為校書郎夢渡滻水中流見二吏齎牒相召一吏言彼墳至大功須萬日今未也今正萬日豫豈免乎纍日而卒出酉陽雜俎
