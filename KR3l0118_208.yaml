body:
  text: 唐太宗唐太宗唐太宗貞觀十四年自真草書屏風以示群臣筆力遒徑為一時之絶嘗謂朝臣曰書學小道初非急務時或留心猶勝棄日凡諸藝業未有學而不得者也病在心力懈怠不能專精耳又云吾臨古人之書殊不學其形勢惟在骨力及得骨力而形勢自生耳嘗召三品已上賜宴於玄武門帝操筆作飛白書衆臣乘酒就太宗手中相競散騎常侍劉洎登御床引手然後得之其不得者咸稱洎登床罪當死請付法太宗笑曰昔聞婕妤辭輦今見常侍登床出尚書故實購蘭亭序王羲之蘭亭序僧智永弟子辨才嘗於寢房伏梁上鑿為暗檻以貯蘭亭保惜貴重於師在日貞觀中太宗以聽政之暇鋭志玩書臨羲之真草書帖構募備盡唯未得蘭亭尋討此書知在辨才之所乃敕追師入內道場供養恩賚優洽數日後因言次乃問及蘭亭方便善誘無所不至辨才確稱往日侍奉先師實常獲見自師沒後荐經喪亂墜失不知所在既而不獲遂放歸越中後更推究不離辨才之處又敕追辨才入內重問蘭亭如此者三度竟靳固不出上謂侍臣曰右軍之書朕所偏寶就中逸少之蹟莫如蘭亭求見此書勞於寤寐此僧耆年又無所用若得一智略之士設謀計取之必獲尚書左僕射房玄齡曰臣聞監察御史蕭翼者梁元帝之曾孫今貫魏州莘縣負才藝多權謀可充此使必當見獲太宗遂召見翼奏曰若作公使義無得理臣請私行詣彼須得二王雜帖三數通太宗依給翼遂改冠微服至洛潭隨商人船下至越州又衣黃衫極寬長潦倒得山東書生之體日暮入寺巡廊以觀壁畫過辨才院止於門前辨才遙見翼乃問曰何處檀越翼就前禮拜云弟子是北人將少許蠶種來賣歷寺縱觀幸遇禪師寒溫既畢語議便合因延入房內即共圍碁撫琴投壺握槊談說文史意甚相得乃曰白頭如新傾蓋如舊今後無形跡也便留夜宿設缸面藥酒果等江東云缸面猶河北稱甕頭謂初熟酒也酣樂之後請賓賦詩辨才探得來字韻其詩曰初醞一缸開新知萬里來披雲同落寞步月共徘徊夜久孤琴思風長旅鴈哀非君有祕術誰照不燃灰蕭翼探得招字韻詩曰邂逅款良宵殷勤荷勝招彌天俄若舊初地豈成遙酒蟻傾還泛心猿躁似調誰憐失群翼長苦業風飄妍蚩略同彼此諷詠恨相知之晚通宵盡歡明日乃去辨才云檀越間即更來翼乃載酒赴之興後作詩如此者數四詩酒為務其俗混然經旬朔翼示師梁元帝自書職貢圖師嗟賞不已因談論翰墨翼曰弟子先傳二王楷書法弟子自幼來耽玩今亦數帖自隨辨才欣然曰明日來可把此看翼依期而往出其書以示辨才辨才熟詳之曰是即是矣然未佳善也貧道有一真跡頗是殊常翼曰何帖才曰蘭亭翼笑曰數經亂離真跡豈在必是響榻僞作耳辨才曰禪師在日保惜臨亡之時親付於吾付受有緒那得參差可明日來看及翼到師自於屋梁上檻內出之翼見訖故駮瑕指纇曰果是響榻書也紛競不定自示翼之後更不復安於伏梁上並蕭翼二王諸帖並借留置于几案之間辨才時年八十餘每日於窗下臨學數遍其老而篤好也如此自是翼往還既數童第等無復猜疑後辨才出赴邑汜橋南嚴遷家齊翼遂私來房前謂童子曰翼遺卻帛子在床上童子即為開門翼遂于案上取得蘭亭及御府二王書帖便赴永安驛告驛長陵訴曰我是御史奉敕來此今有墨敕可報汝都督知都督齊善行聞之馳來拜謁蕭翼因宣示敕旨具告所由善行走使人召辨才辨才仍在嚴遷家未還寺遽見追乎不知所以又遣云侍御須見及師來見御史乃是房中蕭生也蕭翼報云奉敕遣來取蘭亭蘭亭今已得矣故喚師來別辨才聞語而便絶倒良久始蘇翼便馳驛南法書要録南作而發至都奏御太宗大悅以玄齡舉得其人賞錦綵千段擢拜翼為員外郎加五品賜銀瓶一金縷瓶一馬腦碗一並實以珠內廄良馬兩匹兼寶裝鞍轡宅莊各一區太宗初怒老僧之祕吝俄以其年耄不忍加刑數月後仍賜物三千段穀三千石便敕越州支給辨才不敢將入己用乃造三層寶塔塔甚精麗至今猶存老僧因驚悸患重不能彊飯唯啜粥歲餘乃卒帝命供奉榻書人趙模韓道政馮承素諸葛真等四人各榻數本以賜皇太子諸王近臣貞觀二十三年聖躬不豫幸玉華宮含風殿臨崩謂高宗曰吾欲從汝求一物汝誠孝也豈能違吾心耶汝意何如高宗哽咽流涕引耳而聽受制命太宗曰吾所欲得蘭亭可與我將去後隨仙駕入玄宮矣今趙模等所榻在者一本尚直錢數萬也出法書要録又一說王羲之嘗書蘭亭會序隋末廣州好事僧得之僧有三寶寶而持之一曰右軍蘭亭書二曰神龜以銅為之龜腹受一升以水貯之龜則動四足行所在能去三曰如意以鐵為文光明洞徹色如水晶太宗特工書聞右軍蘭亭真跡求之得其他本若第一本知在廣州僧而難以力取故令人詐僧果得其書僧曰第一寶亡矣其餘何愛乃以如意擊石折而棄之又投龜一足傷自是不能行矣出紀聞漢王元昌唐漢王元昌神堯之子善行書諸王仲季並有能名韓王曹王亦其亞也曹則妙於飛白韓則工於草行魏王魯王亦韓王之倫也出書斷歐陽詢唐歐陽詢字信本博覽今古官至銀青光祿大夫率更令書則八體盡能筆力徑險高麗愛其書遣使請焉神堯歎曰不意詢之書名遠播夷狄真觀十五年卒年八十五詢飛白隸行草入妙大篆章草入能出書斷又率更嘗出行見古碑索靖所書駐馬觀之良久而去數步復下馬佇立疲則布毯坐觀因宿其傍三日而後去今開通元寶錢武德四年鑄其文乃歐陽率更書也出國史異纂歐陽通唐歐陽通詢子善書瘦怯明鈔本瘦怯作取法於父常自矜能書必以象牙犀角為筆管狸毛為心覆以秋兔毫松煙為墨末以麝香紙必須堅薄白滑者乃書之蓋自重其書薛純陀亦效歐草傷於肥鈍亦通之亞也出朝野僉載虞世南虞世南字伯施會稽人也仕隋為祕書郎煬帝知其才嫉其鯁直一為七品十餘年仕唐至祕書監文皇曰世南一人遂兼五絶一曰博學二曰德行三曰書翰四曰詞藻五曰忠直有一於此足謂名臣而世南兼之行草之際尤所偏工本師於釋智永及其暮齒加以遒逸卒年八十九伯施隸草行入妙出書斷褚遂良河南人父亮太常卿遂良官至僕射善書少則伏膺虞監長則師祖右軍真書甚得其媚趣顯慶中卒年六十四遂良隸行入妙亦嘗師受史陵然史亦有古直傷於疏瘦也出書斷又遂良問虞監曰某書何如永師曰吾聞彼一字直五萬官豈得若此者曰何如歐陽詢虞曰聞詢不擇紙筆皆能如志官豈得若此褚曰既然某何更留意於此虞曰若使手和筆調遇合作者亦深可貴尚褚喜而退出國史異纂薛稷河南人官至太子少保書學褚尤尚綺麗媚好膚肉得師之半矣可渭河南公之高足甚為時所珍尚稷隸行入能出書斷又稷外祖魏徵家富圖籍多有虞褚舊跡鋭精模倣筆態遒麗當時無及之者又善畫畫原作書據明鈔本改博采古跡埒於祕書出談賓録高正臣廣平人官至衛尉卿習右軍之法睿宗愛其書張懷素之先與高有舊朝士就高乞書或憑書之高常為人書十五紙張乃戲換其五紙又令示高再看不悟客曰有人換公書高笑曰必是張公也乃詳觀之得其三紙客曰猶有在高又觀之竟不能辨高嘗許人書一屏障逾時未獲其人乃出使淮南臨別大悵惋高曰正臣故人在申州正與僕書一類公可便往求之遂立申此意陸柬之嘗為高書告身高常嫌之不將入秩後為鼠所傷乃持示張公曰此鼠甚解正臣意風調不合一至於此正臣隸行草入能出書斷王紹宗王紹宗字承烈官至祕書少監祖述子敬欽羡柬之其中小真書體象尤異其行書及章草次於真常與人書云鄙夫書翰無工者特由水墨之積習恆精心率意虛神靜思以取之每與吳中陸大夫論及此道明朝必不覺已進陸後與密訪知之嗟賞不少將余比虞七以虞亦不臨寫故也但心準目想而已聞虞眠布被中恆手畫腹皮與余正同也承烈隸行草入能出書斷鄭廣文鄭虔任廣文博士學書而病無紙知慈恩寺有柿葉數間屋遂借僧房居止日取紅葉學書歲久殆遍後自寫所製詩并畫同為一卷封進玄宗御筆書其尾曰鄭虔三絶出尚書故實李陽冰李陽冰善小篆自言斯翁之後且且原作耳據明鈔本改至小生曹喜蔡雍不足言開元中張懷瓘撰書斷陽冰張旭並不載絳州有篆字與古不同頗為怪異李陽冰見之寢臥其下數日不能去驗其書是唐初不載書者名姓碑有碧落二字時人謂之碧落碑出國史補張旭張旭草書得筆法後傳崔邈顏真卿旭言始吾聞公主與擔夫爭路而得筆法之意後見公孫氏舞劍器而得其神飲醉輒草書揮筆大叫以頭搵水墨中而書之天下呼為張顛醒後自視以為神異不可復得後輩言筆札者歐虞褚薛或有異論至長史無間言出國史補又旭釋褐為蘇州常熟尉上後旬日有老父過狀判去不數日復至乃怒而責曰敢以閒事屢擾公門老父曰某實非論事但睹少公筆跡奇妙貴為篋笥之珍耳長史異之因詰其何得愛書答曰先父受書兼有著述長史取視之信天下工書者也自是備得筆法之妙冠於一時出幽閒鼓吹僧懷素長沙僧懷素好草書自言得草聖三昧棄筆堆積埋於山下號曰筆冢出國史補
