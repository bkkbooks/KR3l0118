body:
  text: 李宗閔李宗閔李德裕在維揚李宗閔在湖州拜賓客分司德裕大懼遣專使厚致信好宗閔不受取路江西而過非久德裕入相過洛宗閔憂懼多方求厚善者致書乞一見欲以解紛復書曰怨則不怨見則無端初德裕與宗閔早相善在中外交致勢力及位高稍稍相傾及宗閔在位德裕為兵部尚書自得歧路必當大用宗閔多方沮之及邠公杜悰入朝即宗閔之黨也時為京兆尹一日詣宗閔值宗閔深念杜曰何念之深也答曰君揣我何念杜曰得非大戎乎曰是也然何以相救曰某則有策顧相公必不能用耳曰請言之杜曰大戎有詞學而不由科第若與知舉則必喜矣宗閔默然良久曰更思其次曰更有一官亦可平其慊宗閔曰何官曰御史大夫曰此即得矣邠公再三與約乃馳詣曰適宗相有意旨令某傳達遂言亞相之拜德裕驚喜雙淚遽落曰此大門官也小子豈敢當此荐拔寄謝重疊杜還報宗閔復與楊虞卿議之竟為所隳終致后禍馮宿文宗朝揚歷中外甚有美譽垂入相者數矣又能曲事北司權貴咸得其歡心焉一日晚際中尉封一合送與之開之有烏中二頂暨甲煎面藥之屬時班行結中貴者將大拜則必先遺此以為信馮大喜遂以先呈相國楊嗣復蓋常佐其幕也馮又性好華楚鮮潔自夕達曙重衣數襲選駿足數匹鞍韉照地無與比馮以既有的信即不宜序班欲窮極稱愜之事遂修容易服而入至幕次吏報有按則偽為不知比就果有按謁者捧麻必相也將宣則謁者向殿執敕罄折朗呼所除拜大僚之姓名既而大呼曰蕭倣馮乃驚仆于地扶而歸第得疾而卒蓋其夕擬狀將付學士院之時文宗謂近臣曰馮宿之為人似非沉靜蕭倣方判鹽鐵朕察之頗得大臣之體遂以易之李回太和初李回任京兆府參軍主試不送魏謨謨深銜之會昌中回為刑部侍郎謨為御史中丞常與次對官三數人候對于閣門謨曰某頃歲府解蒙明公不送何事今日同集于此回應聲曰經如今也不送謨為之色變益懷憤恚后回謫刺建州謨大拜回有啓狀謨悉不納既而回怒一衙官決杖勒停建州衙官能庇徭役求隸籍者所費不下數十萬其人不恚于杖止恨停廢耳因亡命至京師投時相訴冤諸相皆不問會亭午憩于槐陰顏色憔悴旁人察其有故私詰之其人具述本志于是誨之曰建陽相公素與中書相公有隙子盍詣之言訖見魏導騎自中書而下其人常懷文狀即如所誨望塵而拜導從問之對曰建州百姓訴冤魏聞之倒持塵尾敲鞍子令止及覽狀所論事二十余件第一件取同姓子女入宅于是為魏極力鍛成大獄時李已量移鄧州刺史行次九江遇御史鞫獄卻回建陽竟坐貶撫州司馬終于貶所周復元稹在鄂州周復為從事稹嘗賦詩命院中屬和復乃簪笏見稹曰某偶以大人往還謬獲一第其實詩賦皆不能稹嘉之曰質實如是賢于能詩者矣楊希古靖泰諸楊也朋黨連結率相期以死權勢熏灼力不可拔與同里崔氏相埒而敦厚過之希古性迂僻初應進士舉以文投丞郎丞郎獎之希古乃起而對曰斯文也非希古之作也丞郎訝而話之曰此舍弟源嶓為希古作也丞郎大異之曰今子弟之求名者太半假手也苟袖一軸投知于先達靡不私自炫耀以為莫我若也如子之用意足以整頓頽波矣性酷嗜佛法常置僧于第陳列佛像雜以幡蓋所謂道場者每凌旦輒入其內以身俯地俾僧據其上誦金剛經三遍性又潔淨內逼如廁必散衣無所有然后高屐以往劉禹錫劉禹錫自屯田員外左遷朗州司馬凡十年始征還方春作贈看花諸君子詩曰紫陌紅塵拂面來無人不道看花回玄都觀里桃千樹盡是劉郎去后栽其詩當日傳于都下有嫉其名者白于執政又誣其有怨憤他見日時宰與坐慰其厚既辭即曰近者新詩未免其纍奈何不數日出為連州刺史禹錫自敘云貞元二十一年春豫為屯田員外時此觀未有花是歲出牧連州至荊南又貶朗州司馬居十年詔至京師人人皆言有道士手植仙桃滿觀盛如紅霞遂有前篇以志一時之事耳旋又出牧于連州至十四年始為主客郎中重遊玄都蕩然無復一樹唯兔葵燕麥動搖于春風耳因再題二十八字以俟后遊時太和二年三月也詩曰百畝庭中半是苔桃花靜盡菜花開種桃道士今何在前度劉郎今獨來催陳使會昌中王師討昭義久未成功賊之遊兵往往散出山下剽掠邢洛懷孟又發輕卒數千偽為群羊散漫山谷以啖官軍官軍自遠見之乃分頭掩捕因不成列且無備焉于是短兵接斗蹂踐相乘凡數十里王師大敗是月東都及境上諸州聞之大震咸加備戒嚴都統王宰石雄等皆堅壁自守武宗坐朝不怡召宰臣李德裕等謂之曰王宰石雄不與朕殺賊頻遣中使促之尚聞逗撓依違豈可使賊黨坐至東都耶卿今日可為朕晚歸別與制置軍前事宜奏來時宰相陳夷行鄭肅拱默聽命德裕歸中書即召御史中丞李回具言上意曰中丞必一行責戎帥早見成功慎無違也回刻時受命于是具名以聞曰今欲以御史中丞李回為催陳使帝曰可即日李自銀台戒路有邸吏五十導從至于河中緩轡以進俟王宰等至河中界迎候乃行二帥至翼城東道左執兵如外府列校迎候儀回立馬受起居寒溫之禮二帥復前進數步罄折致詞回掉鞭亦不甚顧之禮成二帥旁行俯首俟命回于馬上厲聲曰今日當直令史安在群吏躍馬聽命回曰責破賊限狀來二帥鞠躬流汗而請以六十日破賊過約請行軍中令于是二帥大懼率親軍而鼓之士卒齊進凡五十八日攻拔潞城梟劉稹首以獻功成回復命后六十日由御史中丞拜中書侍郎平章事李群玉李群玉既解天祿之任而歸涔陽經二妃廟題詩二首曰小孤洲北浦云邊二女明妝尚儼然野廟向江春寂寂古碑無字草芊芊東風近墓吹芳芷落日深山哭杜鵑猶似含顰望巡狩九疑如黛隔湘川又曰黃陵廟前莎草春黃陵女兒茜裙新輕舟小楫唱歌去水遠山長愁殺人后又題曰黃陵廟前春已空子規滴血啼松風不知精爽落何處疑是行云秋色中李自以第二篇春空便到秋色踟蹰欲改之乃有二女郎見曰兒是娥皇女英也二年后當與郎君為云雨之遊李乃志其所陳俄而影滅遂禮其神像而去重涉湖嶺至于潯陽太守段成式素與李為詩酒之友具述此事段因戲之曰不知足下是虞舜之辟陽侯也群玉題詩后二年乃逝于洪州段乃為詩哭之曰酒里詩中三十年縱橫唐突世喧喧明時不作彌衡死傲盡公卿歸九泉又曰增話黃陵事今為白日催老無兒女纍誰哭到泉台溫庭筠溫庭筠有詞賦盛名初將從鄉里舉客遊江淮間揚子留后姚勗厚遺之庭筠少年其所得錢帛多為狹邪所費勗大怒笞且逐之以故庭筠卒不中第其姊趙顓之妻也每以庭筠下第輒切齒于勗一日廳有客溫氏偶問客姓氏左右以勗對溫氏遂出廳事前執勗袖大哭勗殊驚異且持袖牢固不可脫不知所為移時溫氏方曰我弟年少宴遊人之常情奈何笞之迄今無有成遂得不由汝致之復大哭久之方得解勗歸憤訝竟因此得疾而卒苗耽苗耽進士登第間居洛中有年矣不堪其窮或意為將來通塞可以響卜耽即命子侄掃灑廳事設幾焚香束帶秉笏端坐以俟一言所居窮僻久之無所聞日晏有貨枯魚者至焉耽復專其志而諦聽之其家童連呼之遂挈魚以入其實無一錢良久方出貨者遲其出固怒之矣又見或微割其魚貨者視之因罵曰乞索兒卒餓死耳何滯我之如是邪初耽嘗自外遊歸途遇疾甚不堪登升忽見有以輦棺而回者以其價賤即僦而寢息其間至洛東門閽者不知其中有人詰其所由來耽謂其訝己徐答曰衣冠道路得病食不能致他物相與無怪也閽者曰吾守此三十年矣未嘗見有解語神柩后耽終江州刺史裴勳裴勳容貌麼麼而性尤率易與父垣會飲垣令飛盞每屬其人輒自言狀垣付勳曰矬人饒舌破車饒楔裴勳千分勳飲訖而復其盞曰蝙蝠不自見笑他梁上燕十一郎十分垣第十一也垣怒笞之慈恩寺連接曲江及京輦諸境每歲新得第者畢列姓名于此勳常與親識遊見其父及諸家榜率多物故謂人曰此皆鬼録也鄧敞封教之門生初比隨計以孤寒不中第牛蔚兄弟僧孺之子有氣力且富于財謂敞曰吾有女弟未出門子能婚乎當為君展力寧一第耶時敞已壻李氏矣其父常為福建從事官至評事有女二人皆善書敞之所行卷多二女筆迹敞顧己寒賤必不能致勝踔私利其言許之既登第就牛氏親不日敞挈牛氏而歸將及家敞紿牛氏曰吾久不到家請先往俟卿可乎牛氏許之洎到家不敢泄其事明日牛氏奴驅其輜橐直入即出牛氏居常所玩好幕帳雜物列于庭廡間李氏驚曰此何為者奴曰夫人將到令某陳之李氏曰吾即妻也又何夫人焉即撫膺大哭頓地牛氏至知其賣己也請見李氏曰吾父為宰相兄弟皆在郎省縱嫌不能富貴豈無一嫁處耶其不幸豈唯夫人乎今願一與夫人同之夫人縱憾于鄧郎寧忍不為二女計耶時李氏將列于官二女共牽挽其袖而止后敞以祕書少監分司慳嗇尤甚黃巢入洛避亂于河陽節度使羅元杲請為副使后巢寇又來與元杲竄焉其金帛悉藏于地中并為群盜所得
