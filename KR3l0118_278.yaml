body:
  text: 夢休徵下張鎰大曆中守工部尚書判度支因奏事稱旨代宗面許宰相恩澤甚厚張公日日以冀而纍旬無信忽夜夢有人自門遽入抗聲曰任調拜相張公驚寤思中外無其人尋譯不解有外甥李通禮者博學善智張公因召面示之令研其理李生沉思良久因賀曰舅作相矣張公即詰之通禮答曰任調反語饒甜饒甜無逾甘草甘草獨為珍藥珍藥反語即舅名氏也公甚悅俄有走馬吏報曰白麻下公拜中書侍郎平章事楚實著作佐郎楚實大曆中疫癘篤重四十日低迷不知人後一日忽夢見黃衣女道士至實所謂之曰汝有官祿初未合死因呼范政將藥來忽見小兒持琉璃瓶大角碗寫藥飲畢便愈及明許叔冀令送藥來實疾久困初不開目見小兒及碗藥皆昨夜所見因呼小兒為范政問之信然其疾遂愈楊炎故相國楊炎未仕時嘗夢陟高山之巔下瞰人境杳不可辨仰而視之見瑞日在咫尺紅光赫然洞照萬里公因舉左右手以捧之炎燠之氣如熱心目久而方寤視其手尚瀝然而汗公異之因語於人有解者曰夫日者人君像也今夢登山以捧日將非登相位而輔人君乎其後楊公周歷清貫遂登相位果叶捧日之祥也竇參貞元中相國竇參為御史中丞嘗一夕夢德宗召對於便殿問以經國之務上喜因以錦半臂賜之及寤奇其夢默而念曰臂者庇也大邑所以庇吾身也今夢半臂者豈上以我叨居顯位將給半俸俾我致政乎蹙然久之因以夢話於人客有解曰公之夢祥符也且半臂者蓋被股肱之衣也今公夢天子賜之豈非上將以股肱之位而委公乎明日果拜中書侍郎平章事李逢吉李逢吉未掌綸誥前家有老婢好言夢後多有應李公久望除官因訪於婢一日婢至慘然公問故曰昨夜與郎君作夢不好意不欲說公彊之婢曰夢有人舁一棺至堂後云且置在此不久即移入堂中此夢恐非佳也公聞甚喜俄爾除中書舍人後知貢舉未畢而入相王播王播少貧賤居揚州無人知識唯一軍將常接引供給無不罄盡杜僕射亞在淮南端午日盛為竟渡之戲諸州徵伎樂兩縣爭勝負綵樓看棚照耀江水數十年未之有也凡揚州之客無賢不肖盡得預焉唯王公不招惆悵自責宗人軍將曰某有棚子弟悉在八郎但於棚內看却勝居盤筵間也王公曰唯遂往棚時夏初日方照宗人令送法酒一榼曰此甚好適令求得王公方憤悶自酌將盡棚中日色轉熱酒濃昏憊遂就枕才睡夢身在宴處居杜之坐判官在下多於杜公近半良久驚覺亦不敢言於人後為宰相將除淮南兼鹽鐵使敕久未下王公甚悶因召舊從事在城者語之曰某淮南鹽鐵此必定矣當時夢中判官數多一半此即並鹽鐵從事也數日果除到後偶臨江宴會賓介皆在公忽覺如已至者思之乃昔年夢風景氣候無不皆同時五月上旬也豆盧署本名輔貞少年旅於衢州刺史鄭式瞻厚待之謂曰子復姓不宜二名吾為子易之乃書署著助三字授之曰吾恐子群從中有同者子自擇焉其夕夢老父告之聞使君與君易名君當四舉成名四者甚佳又曰君後二十年牧茲郡又指一方地曰此處可建亭臺既寤因改名署後已再下第又二舉後復不第又二舉乃成名蓋自改名後四舉也後二十年果為衢州刺史於所夢之地立徵夢亭韋詞元和六年京兆韋詞為宛陵廉使房武從事秋七月微雨詞於公署因晝寢忽夢一人投刺視之瞭然見題其字曰李故言俄於恍惚間空中有人言明年及第狀頭是時元和初有李顧言及第意甚訝其事為名中少有此故字者焉得復有李故言哉秋八月果有取解舉人具名投刺一如夢中但故為固耳即今西帥李公也詞閟夢中之事不泄乃曰足下明年必擢第仍居衆君之首是冬兵部侍郎許孟容知舉果擢為榜首初固言嘗夢著宋景衣元和十年已後景甚著時望籍甚有拜大憲之耗及景自司刑郎中知雜出為澤州刺史尋又物故固言心疑其夢長慶初穆宗有事于圓丘時固言居左拾遺舊例諫官從駕行禮者太常各頒禮衣一襲固言所服因褰衣觀其下乃見書云左補闕宋景衣因言自說於班行皇甫弘皇甫弘應進士舉華州取解酒忤于刺史錢徽被逐出至陝州求解訖將越城關聞錢自華知舉自知必不中第遂東歸行數程因寢夢其亡妻乳母曰皇甫郎方應舉今欲何去具言主司有隙乳母曰皇甫郎須求石婆神乃相與去店北草間行數里入一小屋中見破石人生拜之乳母曰小娘子壻皇甫郎欲應舉婆與看得否石人點頭曰得乳母曰石婆言得即必得矣他日莫望報賽生即拜謝乳母却送至店門遂驚覺曰吾夢如此分明安至無驗乃却入城應舉錢侍郎意欲挫之放雜文過侍郎私心曰人皆知我怒弘今若庭辱之即不可但不豫及第即得又令帖經及榜成將寫錢心恐懼欲改一人換一人皆未決反覆籌度近至五更不睡謂子弟曰汝試取次把一帙舉人文章來既開乃皇甫文卷錢公曰此定於天也遂不改移及第東歸至陝州問店人曰側近有石婆神否皆笑曰郎君安得知本頑石一片牧牛小兒戲為敲琢似人形狀謂之石婆耳只在店二三里生乃具酒脯與店人共往皆夢中經歷處奠拜石婦而歸杜牧杜牧頃於宰執求小儀不遂請小秋又不遂嘗夢人謂曰辭春不及秋昆腳與皆頭後果得比部員外高元裕襄陽節度使高元裕大和三年任司勳員外郎寓宿南宮晝夢有人告曰十年作襄刺史既寤髣佛儀質蓋偉秀士也私異之因援毫以隱語記于廳之東楹掩映之處曰大三寤襄刺十年洎開成三年為御史中丞既渝前夢遂謂夢固虛耳是後出入中外揚歷貴位清望碩德冠冕時流海內傾注佇升鼎鉉視刺襄乃優賢之舉耳大中二年由天官尚書授鉞漢南去前夢二十年矣公謂楹上之字無復存也因話其事於都官韋好奇之士往詣求焉自公題記後廨署補葺亦屢矣而毫翰煥然獨存非神靈扶持而明徵于今日耶公因屈指以今之年加曩之十乃二十年矣何陰騭之顯晦微婉及期而朗悟之如此哉楊敬之楊敬之生江西觀察使戴江西應舉時敬之年長天性尤切時已秋暮忽夢新榜四十進士歷歷可數寓目及半其子在焉其鄰則姓濮陽而名不可別既寤大喜訪於詞場則云有濮陽願者為文甚高且有聲譽時搜訪草澤方急雅在選中遂尋其居則曰閩人未至京國楊公誡其子令聽之俟其到京與之往來以應斯夢一日楊公祖客灞上客未至間休于逆旅有目遠來者試命詢之乃貢士也偵所自曰自閩問其娃曰濮陽審其名曰願楊公曰吁斯天啓也安有既夢於彼復遇於此哉遂命相見濮陽逡巡不得讓執所業以進始閲其人眉宇清朗次與之語詞氣安詳終閲其文體理精奧問其所抵則曰今將僦居楊公令盡驅所行置于庠序命江西與之朝夕同處是冬大稱濮陽藝學于公卿間人情翕然升第必矣試期有日而生一夕暴卒楊公惋痛嗟駭搜囊其貧鄉路且遠力為營辨歸骨閩間仍謂其子曰我夢無徵汝之一名亦不可保明年其子及第而同年無濮陽者夏首將關送于吏部時宰相有言前輩重族望輕官職竹林七賢曰陳留阮籍沛國劉伶河間向秀得以言高士矣是歲慈恩寺題名咸以族望題畢楊間步塔下仰視之曰弘農楊戴濮陽吳當恍然如夢中所覩盧貞猶子太子賓客盧尚書貞猶子為僧會昌中沙汰僧徒斥歸家以蔭補光王府參軍一夕夢為僧時所奉師來慰問其出處再三告以佛氏淪破已無所歸今為一官徒遣旦夕期再落頂上髮方畢志願且泣且訴之良久曰若我志果遂與佛法語未竟見八面屯兵千乘萬騎旌旗日月衣裳錦繡儀衛四合真天子大駕軍中人喧喧言迎光王部整行列以次前去盧方駭愕不能測遽驚覺魂悸流汗久之方能言卒不敢泄於人無幾宣宗自光邸踐祚録王府屬吏盧以例不拘常調格遷敘自是稍稍興起釋教寺宇僧尼舊制一契夢中語盧校夢中所謂本師蓋參軍事府主近師弟子故以為冥兆豈神之意以是微而顯乎國子監明經柳璟知舉年有國子監明經失姓名晝夢依徙于監門有一人負衣囊訪明經姓氏明經語之其人笑曰君來春及第明經遂邀入長興里畢羅店常所過處店外有犬競驚曰差矣夢覺遽呼鄰房數人語其夢忽見長興店子入門曰郎君與客食畢羅計二斤何不計直而去也明經大駭解衣質之且隨驗所夢相其榻器省如夢中乃謂店主曰我與客俱夢中至是客豈食乎店主驚曰初怪客前畢羅悉完疑其嫌置蒜也來春明經與鄰房三人中所訪者悉上第薛義祕省校書河東薛義其妹夫崔祕者為桐廬尉義與叔母韋氏為客在祕家久之遇痁疾數月綿輟幾死韋氏深憂夜夢神人白衣冠夾單衣韋氏因合掌致敬求理義病神人曰此久不治便成勃瘧則不可治矣因以二符兼呪授韋氏呪曰勃瘧勃瘧四山之神使我來縛六丁使者五道將軍收汝精氣攝汝神魂速去速去免逢此人急急如律令但疾發即誦之及持符其疾便愈是時韋氏少女年七歲亦患痁疾旁見一物狀如黑犬而蚝毛神云此正病汝者可急擒殺之汝疾必愈不爾汝家二小婢亦當患瘧韋氏夢中殺犬及覺傳呪於義義至心持之疾遂愈韋氏女子亦愈皆如其言也鄭光淄青鄭尚書光會昌六年春夢自御牛車車中載瑞日光燭天地自執靷行通衢中俄而驚寤且奇歎後月餘宣宗即位以元舅之故纍拜尚書淄青節度果契前夢宋言近十舉而名未播大中十一年將取府解本名嶽因晝寢似有人報云宋秀才若頭上戴山無因成名但去之自當通泰覺來便思去之不可名獄遂去二犬乃改為言及就府試馮涯侍郎作掾而為試官以解首送也時京兆尹張毅夫以馮參軍解送舉人有私奏譴澧州司戶再次退解頭為第六十五人知聞來唁宋曰來春之事甘已參差及李潘舍人放榜言第四人及第曹確曹確判度支亦有台輔之望或夢剃髮為僧心甚惡之有一士云占夢多驗確召之具以所夢話之此人曰前賀侍郎旦夕必登庸出家者號剃度也無何杜相出鎮江西而相國大拜劉仁恭梁劉仁恭微時曾夢佛幡於手指飛出占者曰君年四十九必有旌幢之貴後如其說果為幽帥焉唐僖宗僖宗自晉王即位幼而多能素不曉碁一夕夢人以碁經三卷焚而使吞之及覺命待詔觀碁凡所指畫皆出人意劉檀王蜀員外郎劉檀本名審義忽夢一孝子引令上檀香樹而謂曰君速登劉乃登遂向懷內出緋衣令服之覺因改名檀未及一年蜀郡牧請一杜評事充倅職奏授殿中侍御史內供奉賜緋敕下杜丁憂不行杜遂舉劉于郡侯郡侯乃奏檀而所授官與杜先奏擬無別是時劉方間居力困杜因遺劉新緋公服一領果徵夢焉晉少主開運甲辰歲暮冬晉帝遣中使至內署宣問諸學士云朕昨夜夢一玉盤中有一玉碗及一玉帶皆有碾文光熒可愛是何徵也宜即奏來承旨李慎儀與同僚併表奏賀以為玉者帝王之寶也帶者有誓功之兆盤盂者乃守器之象為吉夢不敢有他占辛夤遜孟蜀翰林學士辛夤遜頃年在青城山居其居則古道院在一峰之頂內塑像皇姑則唐玄宗之子也一夕夢見皇姑召之謂曰汝可食杏仁令汝聰利老而彌壯心力不倦亦資於年壽矣汝有道性不久住此須出佐理當代夤遜夢中拜請法制則與申天師怡神論中者同夤遜遂日日食之令老而輕健年逾從心猶多著述又夢掌中草不絶後來內制草數年復掌選心力不倦因知申天師怡神論中仙方盡可驗矣何致雍何致雍者賈人之子也幼而爽俊好學嘗從其叔父泊舟皖口其叔夜夢一人若官吏乘馬從數僕來往岸側遍閲舟船人物之數復一人自後呼曰何僕射在此勿驚之對曰諾不敢驚既寤遍訪鄰舟之人皆無姓何者乃移舟入深浦中翌日大風濤所泊之舟皆沒唯何氏存叔父乃謂致雍曰我家世貧賤吾復老矣何僕射必汝也善自愛致雍後從知於湖南為節度判官會楚王殷自稱尊號以致雍為戶部侍郎翰林學士致雍自謂當作相而居師長之任後楚王希範嗣立復去帝號以致雍為節度判官檢校僕射竟卒於任郭仁表僞吳春坊吏郭仁表居冶城北甲寅歲因得疾沉痼忽夢道士衣金花紫帔從一小童自門入坐其堂上仁表初不甚敬因問疾何時可愈道士色厲曰甚則有之即寤疾甚數夜復夢前道士至因叩頭遜謝久之道士色解索紙筆仁表以為將疏方即跪奉之道士書而授之其辭曰飄風暴雨可思惟鶴望巢門斂翅飛吾道之宗正可依萬物之先數在茲不能行此欲何為夢中不曉其義將問之童子搖手曰不可拜謝道士自西北而去因爾疾愈王璵僞吳鄂帥王璵少為小將從軍圍潁州夜夢道士告之曰旦有流星墮地能避之當至將相明日衆軍攻城城中矢石如雨璵仗劍倚柵木而督戰俄有大石正中其柵木及璵鎧甲之半皆糜碎而璵無傷因歎曰流星正爾耶由是自負卒至大官謝諤進士謝諤家於南康舍前有溪常遊戲之所也諤為兒時嘗夢浴溪中有人以珠一器遺之曰郎吞此則明悟矣諤度其大者不可吞即吞細者六十餘顆及長善為詩進士裴說為選其善者六十餘篇行於世崔萬安江南司農少卿崔萬安分務廣陵常病苦脾泄困甚其家禱於后土祠是夕萬安夢一婦人珠珥珠履衣五重皆編貝珠為之謂萬安曰此疾可治今以一方相與可取青木香肉豆蔻等分棗肉為丸米飲下二十丸又云此藥太熱疾平即止如其言服之遂愈江南李令江南有李令者纍任大邑假秩至評事世亂年老無復宦情築室於廣陵法雲寺之西為終焉之計嘗夢束草加首口銜一刀兩手各持一刀入水而行意甚異之俄而孫儒陷廣陵儒部將李瓊屯兵於法雲寺恆止李令家父事令及儒死宣城裨將馬殷劉建封輩率衆南走瓊因彊令俱行及殷據湖南瓊為桂管觀察使用令為荔浦令則前夢之驗也毛貞輔僞吳毛貞輔纍為邑宰應選之廣陵夢吞日既寤腹猶熱以問侍御史楊廷式楊曰此夢至大非君所能當若以君而言當得赤烏場官也果如其言
