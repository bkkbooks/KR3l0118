body:
  text: 蕭昕蕭昕唐故兵部尚書蕭昕常為京兆尹時京師大旱炎郁之氣蒸為疾厲代宗命宰臣下有司禱祀山川凡月余暑氣愈盛時天竺僧不空三藏居于靜住寺三藏善以持念召龍興云雨昕于是詣寺謂三藏曰今茲驕陽纍月矣聖上懸憂撤樂貶食歲凶是念民瘵為憂幸吾師為結壇場致雨也三藏曰易與耳然召龍以興云雨吾恐風雷之震有害于生植又何補于稼穡耶昕曰迅雷甚雨誠不能滋百谷適足以清暑熱而少解黔首之病也願無辭焉三藏不獲已乃命其徒取華木皮僅尺余纘小龍于其上而以爐甌香水置于前三藏轉咒震舌呼祝咒者食頃即以纘龍授昕曰可投此于曲江中投訖亟還無冒風雨昕如言投之旋有白龍才尺余搖鬣振鱗自水出俄而身長數丈狀如曳素倏忽亙天昕鞭馬疾驅未及數十步云物凝晦暴雨驟降比至永崇里道中之水已若決渠矣遺尺潭昆山縣遺尺潭本大歷中村女為皇太子元妃遺玉尺化為龍至今遂成潭劉貫詞唐洛陽劉貫詞大歷中求丐于蘇州逢蔡霞秀才者精彩俊爽一相見意頗殷勤以兄呼貫詞既而攜羊酒來宴酒闌曰兄今泛游江湖間何為乎曰求丐耳霞曰有所抵耶泛行郡國耶曰蓬行耳霞曰然則幾獲而止曰十萬霞曰蓬行而望十萬乃無翼而思飛者也設令必得亦廢數年霞居洛中左右亦不貧以他故避地音問久絶意有所懇祈兄為回途中之費蓬游之望不擲日月而得如何曰固所願耳霞于是遺錢十萬授書一緘白曰逆旅中遽蒙周念既無形跡輒露心誠霞家長鱗蟲宅渭橋下合眼叩橋柱當有應者必邀入宅娘奉見時必請與霞少妹相見既為兄弟情不合疏書中亦令渠出拜渠雖年幼性頗慧聰使渠助為主人百緡之贈渠當必諾貫詞遂歸到渭橋下一潭泓澄何計自達久之以為龍神不當我欺試合眼叩之忽有一人應因視之則失橋及潭矣有朱門甲第樓閣參差有紫衣使拱立于前而問其意貫詞曰來自吳郡郎君有書問者執書以入頃而復出曰太夫人奉屈遂入廳中見太夫人者年四十余衣服皆紫貌可愛貫詞拜之太夫人答拜且謝曰兒子遠游久絶音耗勞君惠顧數千里達書渠少失意上官其恨未減一從遁去三歲寂然非君特來愁緒猶積言訖命坐貫詞曰郎君約為兄弟小妹子即貫詞妹也亦當相見夫人曰兒子書中亦言渠略梳頭即出奉見俄有青衣曰小娘子來年可十五六容色絶代辨慧過人既拜坐于母下遂命具饌亦甚精潔方對食太夫人忽眼赤直視貫詞女急曰哥哥憑來宜且禮待況令消患不可動搖因曰書中以兄處分令以百緡奉贈既難獨舉須使輕繼今奉一器其價相當可乎貫詞曰已為兄弟寄一書札豈宜受其賜太夫人曰郎君貧游兒子備述今副其請不可推辭貫詞謝之因命取鎮國碗來又進食未幾太夫人復瞪視眼赤口兩角濕下女急掩其口曰哥哥深誠托人不宜如此乃曰娘年高風疾發動祗對不得兄宜且出女若懼者遣青衣持碗自隨而授貫詞曰此罽賓國碗其國以鎮災厲唐人得之固無所用得錢十萬可貨之其下勿鬻某緣娘疾須侍左右不遂從容再拜而入貫詞持碗而行數步回顧碧潭危橋宛似初到視手中器乃一黃色銅碗也其價只三五環耳大以為龍妹之妄也執鬻于市有酬七百八百者亦酬五百者念龍神貴信不當欺人日日持行于市及歲余西市店忽有胡客來視之大喜問其價貫詞曰二百緡客曰物宜所直何止二百緡尚非中國之寶有之何益百緡可乎貫詞以初約只爾不復廣求遂許之交受客曰此乃罽賓國鎮國碗也在其國大禳人患厄此碗失來其國大荒兵戈亂起吾聞為龍子所竊已近四年其君方以國中半年之賦召贖君何以致之貫詞具告其實客曰罽賓守龍上訴當追尋次此霞所以避地也陰冥吏嚴不得陳首藉君為由送之耳殷勤見妹者非固親也慮老龍之饞或欲相陷以其妹衛君耳此碗既出渠亦當來亦消患之道也五十日后漕洛波騰浼灂晦日是霞歸之候也曰何以五十日然后歸客曰吾攜過嶺方敢來復貫記之及期往視誠然矣韋氏京兆韋氏名家女也適武昌孟氏唐大歷末孟與妻弟韋生同選韋生授揚子縣尉孟授閬州録事參軍分路之官韋氏從夫入蜀路不通車輿韋氏乘馬從夫至駱谷口中忽然馬驚墜于岸下數百丈視之杳黑人無入路孟生悲號一家慟哭無如之何遂設祭服喪舍去韋氏至下墜約數丈枯葉之上體無所損初似悶絶少頃而蘇經一日饑甚遂取木葉裹雪而食傍視有一岩罅不知深淺仰視墜處如大井焉分當死矣忽于岩谷中見光一點如燈后更漸大乃有二焉漸近是龍目也韋懼甚負石壁而立此龍漸出可長五六丈至穴邊騰孔而出頃又見雙眼復是一龍欲出韋氏自度必死寧為龍所害候龍將出遂抱龍跨之龍亦不顧直躍穴外遂騰于空韋氏不敢下顧任龍所之如半日許意疑已過萬里試開眼下視此龍漸低又見江海及草木其去地度四五丈恐負入江遂放身自墜落于深草之上良久乃蘇韋氏不食已經三四日矣氣力漸憊徐徐而行遇一漁翁驚非其人韋氏問此何所漁翁曰此揚子縣韋氏私喜曰去縣幾里翁曰二十里韋氏具述其由兼饑渴漁翁傷異之舟中有茶粥飲食之韋氏問曰此縣韋少府上未到翁曰不知到未韋氏曰某即韋少府之妹也倘為載去至縣當厚相報漁翁與載至縣門韋少府已上數日矣韋氏至門遣報孟家十三姊韋生不信曰十三姊隨孟郎入蜀那忽來此韋氏令具說此由韋生雖驚亦未深信出見之其姊號哭話其迍厄顏色痿瘁殆不可言乃舍之將息尋亦平復韋生終有所疑后數日蜀中凶問果至韋生意乃豁然方更悲喜追酬漁父二十千遣人送姊入蜀孟氏悲喜無極后數十年韋氏表弟裴綱貞元中猶為洪州高安尉自說其事任頊唐建中初有樂安任頊者好讀書不喜塵俗事居深山中有終焉之志嘗一日閉關晝坐有一翁叩門來謁衣黃衣貌甚秀曳杖而至頊延坐與語既久頊訝其言訥而色沮甚有不樂事因問翁曰何為而色沮乎豈非有憂耶不然是家有疾而翁念之深耶老人曰果如是吾憂俟子一問固久矣且我非人乃龍也西去一里有大湫吾家之數百歲今為一人所苦禍且將及非子不能脫我死輒來奉訴子今幸問我故得而言也頊曰某塵中人耳獨知有詩書禮樂他術則某不能曉然何以脫翁之禍乎老人曰但授我語非藉他術獨勞數十言而已頊曰願受教授翁曰后二日願子為我晨至湫上當亭午之際有一道士自西來者此所謂禍我者也道士當竭我湫中水且屠我子伺其湫水竭宜厲聲呼曰天有命殺黃龍者死言畢湫當滿道士必又為術子因又呼之如是者三我得完其生矣必重報幸無他為慮頊諾之已而祈謝甚懇久之方去后二日頊遂往山西果有大湫即坐于湫旁以伺之至當午忽有片云自西冉冉而降于湫上有一道士自云中下頎然而長約丈余立湫之岸于袖中出墨符數道投湫中頃之湫水盡涸見一黃龍帖然俯于沙頊即厲聲呼天有命殺黃龍者死言訖湫水盡溢道士怒即于袖中出丹字數符投之湫水又竭即震聲呼如前詞其水再溢道士怒甚凡食頃乃出朱符十余道向空擲之盡化為赤云入湫湫水即竭呼之如前詞湫水又溢道士顧謂頊曰吾一十年始得此龍為食奈何子儒士也奚救此異類耶怒責數言而去頊亦還山中是夕夢前時老人來謝曰賴得君子救我不然幾死道士手深誠所感千萬何言今奉一珠可于湫岸訪之用表我心重報也頊往尋之果得一粒徑寸珠于湫岸草上光耀洞徹殆不可識頊后特至廣陵市有胡人見之曰此真驪龍之寶也而世人莫可得以數千萬為價而市之趙齊嵩貞元十二年趙齊嵩選授成都縣尉收拾行李兼及仆從負札以行欲以赴任然棧道甚險而狹常以馬鞭拂小樹枝遂被鞭梢繳樹猝不可脫馬又不住遂墜馬枝柔葉軟不能礙挽直至谷底而無所損視上直千余仞旁無他路分死而已所從仆輩無計遂聞于官而歸趙子進退無路墜之翌日忽聞雷聲殷殷乃知天欲雨須臾石窟中云氣相旋而出俄而隨云有巨赤斑蛇粗合拱鱗甲煥然擺頭而雙角出蜿身而四足生奮迅鬐鬣搖動首尾乃知龍也趙生自念曰我住亦死乘龍出亦死寧出而死攀龍尾而附其身龍乘云直上不知幾千仞趙盡死而攀之既而至中天施體而行趙生方得跨之必死于泉矣南視見云水一色南海也生又歎曰今日不葬于山卒于泉矣而龍將到海飛行漸低去海一二百步舍龍而投諸地海岸素有蘆葦雖墮而靡有所損半日乃行路逢人問之曰清遠縣也然至于縣且無伴從憑据人不之信不得繾綣迤邐以至長安月余日達舍家內始作三七齊僧徒大集忽見趙生至皆驚恐奔曰魂來歸趙生當門而坐妻孥輩亦恐其有復生云請于日行看有影否趙生怒其家人之詐恐不肯于日行疏親曰若不肯日中行必是鬼也見趙生言猶云乃鬼語耳良久自敘其事方大喜行于危險乘騎者可以為戒也
