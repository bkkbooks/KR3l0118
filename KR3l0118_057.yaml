body:
  text: 太真夫人太真夫人王母之小女也年可十六七名婉字羅敷遂事玄都太真王有子為三天太上府司直主總糾天曹之違錯比地上之卿佐年少好遊逸委官廢事有司奏劾以不親局察降主事東嶽退真王之編司鬼神之師五百年一代其職夫人因來視之勵其使修守政事以補其過過臨淄縣小吏和君賢為賊所傷殆死夫人見愍問之君賢以實對夫人曰汝所傷乃重刃關於肺腑五髒泄漏血凝絳府氣激傷外此將死之厄也不可復生如何君賢知是神人扣頭求哀夫人於肘後筒中出藥一丸大如小豆即令服之登時而愈血絶創合無復慘痛君賢再拜跪曰家財不足不知何以奉答恩施唯當自展駑力以報所受耳夫人曰汝必欲謝我亦可隨去否君賢乃易姓名自號馬明生隨夫人執役夫人還入東嶽岱宗山峭壁石室之中上下懸絶重岩深隱去地千餘丈石室中有金床玉几珍物奇瑋人迹所不能至明生初但欲學授金創方既見神仙來往及知有不死之道旦夕供給掃灑不敢懈倦夫人亦以鬼怪虎狼及眩惑衆變試之明生神情澄正終不恐懼又使明生他行別宿因以好女戲調親接之明生心堅靜固無邪念夫人他行去十日五日一還或一月二十日輒見有仙人賓客乘龍驎駕虎豹往來或有拜謁者真仙彌日盈坐客到輒令明生出外別室中或立致精細廚食殽果香酒奇漿不可名目或呼坐與之同飲食又聞空中有琴瑟之音歌聲宛妙夫人亦時自彈琴有一絃而五音並奏高朗響激聞於數里衆鳥皆聚集於岫室之間徘徊飛翔驅之不去殆天人之樂自然之妙也夫人棲止常與明生同石室中而異榻幽寂之所唯二人或行去亦不道所往但見常有一白龍來迎夫人即著雲光繡袍乘龍而去袍上專是明月珠綴衣領帶玉珮戴金華太玄之冠亦不見有從者既還龍即自去所居石室玉床之上有紫錦被褥紫羅帳帳中服玩瑰金函玉玄黃羅列非世所有不能一一知其名也有兩卷素書題曰九天太上道經明生亦不敢發視其文唯供灑掃守巖室而已如此五年愈加勤肅夫人嘆而謂之曰汝真可教必能得道者也以子俗人而不淫不慢恭仰靈氣終莫之廢雖欲求死焉可得乎因以姓氏本末告之曰我久在人間今奉天皇命又按太上召不復得停念汝專謹故以相語欲教汝長生之方延年之術而我所受服以太和自然龍胎之醴適可授三天真人不可以教始學固非汝所得聞縱或聞之亦不能用以持身也有安期先生燒金液丹法其方祕要立可得用是元君太乙之道白日升天者矣明日安期當來吾將以汝付囑焉汝相隨稍久其術必傳明日安期先生果至乘駮驎著朱衣遠遊冠帶玉佩及虎頭般革囊視之年可二十許潔白嚴整從可六七仙人皆執節奉衛見夫人拜揖甚敬自稱下官須臾設酒果廚膳飲宴半日許安期自説昔與夫人遊安息國西海際食棗異美此間棗殊不及也憶此未久已二千年矣夫人云吾昔與君共食一棗乃不盡此間小棗那可比耶安期曰下官先日往九河見司陰與西漢夫人共遊見問以陽九百六之期聖主受命之劫下官答以幼稚未識運厄之紀別當咨太真王夫人今既賜坐願請此數夫人曰期運漫汗非君所能卒知夫天地有大陽九大百六小陽九小百六天厄謂之陽九地虧謂之百六此二災是天地之否泰陰陽九地之孛蝕也大期九千九百年小期三千三十年而此運所鐘聖人所不能禳今大厄猶未然唐世是小陽九之始計訖來甲申歲百六將會矣爾時道德方隆凶惡頓肆聖君受命乃在壬辰無復千年亦尋至也西漢夫人俱已經見所以相問當是相試耳然復是司陰君所局夫陽九者天旱海消而陸自憔百六者海竭而陵自填四海水減滄溟成山連城之鯨萬丈之鮫不達期運之度唯叩天而索水詞訟紛紜布於上府三天煩於省察司命亦疲於按對九河之口是赤水之所衝其深難測今已漸枯入氣蒸於山澤流沙塵於原口於是四海俱會群龍鼓舞爾乃須甲申之年將飛洪倒流今水毋上天門而告期積石開萬泉而通路飛陰風以撓蒼生注玄流以布遐邇洋溢在數年之中漫衍終九載之暮既得道之真體靈合妙至其時也但當騰虛空而盼山陂遊浮嶽而視廣川乘玄鴻以湊州城御虬輦而邁景雲耳咄嗟之間忽焉便適可以翔身娛目豈足經意乎當今日且論酒事何用此為也因指明生向安期曰此子有心向慕殆可教訓昔遇因緣遂來見隨雖質穢未靈而淫欲已消今未可授玄和太真之道且欲令就君受金液丹方君可得爾便宜將去夫流俗之人心肺單危經胃內薄血津疲嬴肝肝原作用據明鈔本改膂不注其眼唇口不辨其機蓋大慈而不合夫夫原作天據明鈔本改人欲奔走而不及靈飛適宜慰撫以成其志不可試以仙變八威也切勿刻令其失正矣安期曰諾但恐道淺術薄不足以訓授耳下官昔受此方於漢成丈人此則先師之成法實不敢倉卒而傳要當令在二千年之內必使其窺天路矣下官往與女郎俱會玄丘觀九陔之壘硌望弱水而東流賜酣玄碧之香酒不覺高卑而詠同當開尊笈靈籙偶見玉胎瓊膏之方服之刀圭立登雲天解形萬變上為真皇此術徑妙蓋約於金液之華又速於霜雪九轉之鋒今非敢有譏捨近而從遠棄徑而追煩實思聞神方之品第願知真仙之高尊苟卑降有時非所宜論瓊腴之方必是侍者未可得用邪夫人曰君未知乎此是天皇之靈方乃天真所宜用非俗流下尸所能窺𨵦也仙方凡有九品一名太和自然龍胎之醴二名玉胎瓊液之膏三名飛丹紫華流精四名朱光雲碧之腴五名九種紅華神丹六名太清金液之華七名九轉霜雪之丹八名九鼎雲英九名雲光石流飛丹此皆九轉之次第也得仙者亦有九品第一上仙號天九真王第二次仙號三天真王第三號太上真人第四號飛天真人第五號靈仙第六號真人第七號靈人第八號飛仙第九號仙人此九仙之品第也各有差降不可超學彼知金液已為過矣至於玉皇之所餌非淺學所宜聞君雖得道而久在世上囂濁染於正氣塵垢鼓於三一猶未可登三天而朝太上邁扶桑而謁太真玉胎之方尚未可諭何況下才而令聞其篇目耶安期有慚色退席曰下官實不知靈藥之妙品殊乃爾信駭聽矣因自陳曰下官曾聞女郎有九天太真道經清虛鏡無鑒朗玄冥誠非下才可得仰瞻然受遇彌久接引每重不自省量希乞教訓不審其書可得見乎如暫覩盻太真則魚目易質矣夫人哂爾而笑良久曰太上道殊真府遐邈將非下才可得交關君但當弘今之功無代非分之勞矣我正爾暫北到玄洲東詣方丈漱龍胎於玄都之宮試玉女於衆仙之堂天事靡鹽將俟事暇相示以太上真經也君能勤正一於太清役恆華而命四瀆然後尋我於三天之丘見索於鍾山王屋則真書可得而授焉如其不然無為屈逸駿而步滄津損舟楫而濟溟海矣如向所論陽九百六應期輒降夫安危無專否泰有對超然遠鑒悵懷感慨亢極之災可避而不可禳明期運所鍾聖主不能知是以伯陽棄周關令悟其國弊天人之事彰於品物君何為杳杳久為地仙乎孰若先覺以高飛超風塵而自潔避甲申於玄塗並真靈而齊列乎言為爾盡君將勗之安期長跪曰今日受教輒奉修焉夫人語明生曰吾不得復停汝隨此君去勿憂念也我亦時當往視汝因以五言詩二篇贈之可以相勗明生流涕而辭乃隨安期負笈入女几山夫人乘龍而去後明生隨師周遊青城廬潛凡二十年乃受金液之方鍊而升天出神仙傳萼緑華萼緑華者女仙也年可二十許上下青衣顏色絶整以晉穆帝升平三年己未十一月十日夜降於羊權家自云是南山人不知何仙也自此一月輒六過其家權字道學即晉簡文黃門郎羊欣祖也權及欣皆潛修道要耽玄味真緑華云我本姓楊又云是九嶷山中得道羅郁也宿命時曾為其師母毒殺乳婦玄洲以先罪未滅故暫謫降臭濁以償其過贈權詩一篇並火濣布手巾一金玉條脫各一枚條脫似指環而大異常精好謂權曰慎無泄我下降之事泄之則彼此獲罪因曰修道之士視錦繡如弊帛視爵位如過客視金玉如礫石無思無慮無事無為行人所不能行學人所不能學勤人所不能勤得人所不能得何者世人行嗜欲我行介獨世人行俗務我學恬淡世人勤聲利我勤內行世人得老死我得長生故我行之已九百歲矣授權尸解藥亦隱景化形而去今在湘東山中出真誥
