body:
  text: 寒山子寒山子寒山子者不知其名氏大曆中隱居天台翠屏山其山深邃當暑有雪亦名寒岩因自號寒山子好為詩每得一篇一句輒題於樹間石上有好事者隨而録之凡三百餘首多述山林幽隱之興或譏諷時態能警勵流俗桐柏徵君徐靈府序而集之分為三卷行於人間十餘年忽不復見咸通十二年毗陵道士李褐性褊急好凌侮人忽有貧士詣褐乞食褐不之與加以叱責貧者唯唯而去數日有白馬從白衣者六七人詣褐褐禮接之因問褐曰頗相記乎褐視其狀貌乃前之貧士也逡巡欲謝之慚未發言忽語褐曰子修道未知其門而好凌人侮俗何道可冀子頗知有寒山子邪答曰知曰即吾是矣吾始謂汝可教今不可也修生之道除嗜去欲嗇神抱和所以無纍也內抑其心外檢其身所以無過也先人後己知柔守謙所以安身也善推於人不善歸諸身所以積德也功不在大立之無怠過不在大去而不二所以積功也然後內行充而外丹至可以冀道於髣佛耳子之三毒未剪以冠簪為飾可謂虎豹之鞹而犬豕之質也出門乘馬而去竟不復見出仙傳拾遺軒轅彌明軒轅彌明者不知何許人在衡湘間來往九十餘年善捕逐鬼物能囚拘蛟螭虎豹人莫知其壽進士劉師服常於湘南遇之元和七年壬辰十二月四日將自衡山遊太白還明鈔本還作過京師與師服相值師服招其止宿有校書郎侯喜新有詩名擁爐夜坐與劉説詩彌明在其側貌極醜白鬢黑面長頸而高結喉中又作楚語喜視之若無人彌明忽掀衣張眉指爐中古鼎謂喜曰子云能詩與我賦此乎師服以衡湘舊識見其老貌頗敬之不知其有文也聞此説大喜即援筆而題其首兩句曰巧匠琢山骨刳中事煎烹次傳與喜喜踴躍而綴其下曰外苞乾蘚文中有暗浪驚題訖吟之彌明啞然笑曰子詩如是而已乎即袖手竦肩倚北墻坐謂劉曰吾不解世俗書子為吾書之因高吟曰龍頭縮菌蠢豕腹脹彭亨初不似經意詩旨有似譏喜二子相顧慚駭然欲以多窮之即賦兩句以援喜曰大若烈士膽圓如戴馬纓喜又成兩句曰在冷足自安遭焚意彌貞彌明又令師服書曰秋瓜來落蒂凍芋強抽萌師服又吟曰磨礱去圭角浮潤著光精訖又授喜喜思益苦務欲壓彌明每營度欲出口吻吟聲益悲操筆欲書將下復止亦竟不能奇曰旁有雙耳穿上為孤髻撑吟竟彌明曰時於蚯蚓竅微作蒼蠅聲其不用意如初所言益奇不可附説語皆侵二子夜將闌二子起謝曰尊師非常人也某等伏矣願為弟子不敢更詩彌明奮曰不然此章不可以不成也謂劉曰把筆把筆吾與汝就之即又連唱曰何當出灰灺無計離瓶罌謬居鼎鼐間長使水火爭形模婦女笑度量兒童輕徒爾堅貞性不過升合盛寧依暖熱敝不與寒冷并忽罹翻溢愆實負任使誠陋質荷斟酌狹中愧提擎豈能煮仙藥但未污羊羹區區徒自效瑣瑣安足呈難比俎豆用不為手所撜願君勿嘲誚此物方施行師服書訖即使讀之畢謂二子曰此皆不足與語此寧為文耶吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也豈獨文乎哉吾閉口矣二子大懼皆起立床下拜曰不敢他有問也願一言而已先生稱吾不解人間書敢問解何書請聞此而已纍問不應二子不自得即退就坐彌明倚墻睡鼻息如雷鳴二子但恐失色不敢喘息斯須曙鼓鼕鼕二子亦困遂坐睡及覺驚顧已失彌明所在問童奴曰天且明道士起出門若將便旋然久不返覔之已不見矣二子驚惋自責因攜詩詣昌黎韓愈問此何人也愈曰余聞有隱君子彌明豈其人耶遂為石鼎聯句序行於代焉出仙傳拾遺蔡少霞蔡少霞者陳留人也性情恬和幼而奉道早歲明經得第選蘄州參軍秩滿漂寓江浙間久之再授兗州泗水丞遂於縣東二十里買山築室為終焉之計居處深僻俯瞰龜蒙水石雲霞境象殊勝少霞世纍早絶尤諧夙尚偶一日沿溪獨行忽得美蔭因憩焉神思昏然不覺成寐因為褐衣鹿幘之人夢中召去隨之遠遊乃至城廓一所碧天虛曠瑞日瞳朧人俗潔淨卉木鮮茂少霞舉目移足惶惑不寧即被導之令前經歷門堂深邃莫測遙見玉人當軒獨立少霞遽修敬謁玉人謂曰愍子虔心今宜領事少霞靡知所謂復為鹿幘人引至東廊止於石碑之側謂少霞曰召君書此賀遇良因少霞素不工書即極辭讓鹿幘人曰但按文而録胡乃拒違俄有二童自北而來一捧牙箱內有兩幅紫絹文書一齎筆硯即付少霞凝神搦管頃刻而畢因覽讀之已記于心矣題云蒼龍溪新宮銘紫陽真人山玄卿撰良常西麓源澤東泄新宮宏宏崇軒䡾䡾雕珉盤礎鏤檀楝臬碧瓦鱗差瑤瑎昉截閣凝瑞霞樓橫祥霓騶虞巡徼昌明捧𨵚珠樹規連玉泉矩拽靈飆遐集聖日俯晰太上遊詣無極便闕百神守護諸真班列仙翁鵠立道師水潔飲玉成漿饌瓊為屑桂旗不動蘭幄互設妙樂兢奏流鈴間發天簌虛徐風簫泠徹鳳歌諧律鶴舞會節三變玄雲九成絳雪易遷徒語童初詎説方更周視遂為鹿幘人促之忽遽而返醒然遂寤急命紙筆登即紀録自是兗豫好奇之人多詣少霞謁訪其事有鄭還古者為立傳焉且少霞乃孝廉一叟耳固知其不妄矣出集異記鄭居中鄭舍人居中高雅之士好道術常遇張山人者多同遊處人但呼為小張山人亦不知其所能也居襄漢間除中書舍人不就開成二年春往東洛嵩嶽攜家僮三四人與僧登歷無所不到數月淹止日晚至一處林泉秀潔愛甚忘返會院僧不在張燭爇火將宿遣僕者求之兼取筆似欲為詩者操筆之次燈滅火盡一僮在側聞鄭公仆地之聲喉中氣粗有光如雞子繞頸而出遽吹薪明之已不救矣紙上有四字云香火願畢畢字僅不成後居山者及獵人時見之衣服如遊涉之狀當應是張生潛出言其終竟之日鄭公捨家以避耳若此豈非達命者歟出逸史伊用昌熊皎補闕説頃年有伊用昌者不知何許人也其妻甚少有殊色音律女工之事皆曲盡其妙夫雖飢寒丐食終無愧意或有豪富子弟以言笑戲調常有不可犯之色其夫能飲多狂逸時人皆呼為伊風子多遊江左廬陵宜春等諸郡出語輕忽多為衆所毆擊愛作望江南詞夫妻唱和或宿於古寺廢廟間遇物即有所詠其詞皆有旨熊只記得詠鼓詞云江南鼓梭肚兩頭欒釘著不知侵骨髓打來只是沒心肝空腹被人漫餘多不記江南有芒草貧民採之織屨緣地士卑濕此草耐水而貧民多著之伊風子至茶陵縣門大題云茶陵一道好長街兩畔栽柳不栽槐夜後不聞更漏鼓只聽鎚芒織草鞋時縣官及胥吏大為不可遭衆人亂毆逐出界江南人呼輕薄之詞為覆窠其妻告曰常言小處不要覆窠而君須要覆窠之譬如騎惡馬落馬足穿鐙非理傷墮一等君不用苦之如是夫妻俱有輕薄之態天祐癸酉年夫妻至撫州南城縣所有村民斃一犢夫妻丐得牛肉一二十斤於鄉校內烹炙一夕俱食盡至明夫妻為肉所脹俱死于鄉校內縣鎮吏民以蘆席裹尸於縣南路左百余步而瘞之其鎮將姓丁是江西廉使劉公親隨一年後得替歸府劉公已薨忽一旦於北市棚下見伊風子夫妻唱望江南詞乞錢既相見甚喜便敘舊事執丁手上酒樓三人共飲數斗丁大醉而睡伊風子遂索筆題酒樓壁云此生生在此生先何事從玄不復玄已在淮南雞犬後而今便到玉皇前題畢夫妻連臂高唱而出城遂渡江至遊帷觀題真君殿後其御云定億萬兆恆沙軍國主南方赤龍神王伊用昌詞云日日祥雲瑞氣連應儂家作大神仙筆頭灑起風雷力劍下驅馳造化權更與戎夷添禮樂永教胡虜絶烽煙列仙功業只如此直上三清第一天題罷連臂入西山時人皆見躡虛而行自此更不復出其丁將於酒樓上醉醒懷內得紫金一十兩其金並送在淮海南城縣後人開其墓只見蘆席兩領裹爛牛肉十餘斤臭不可近餘更無別物熊言六七歲時猶記識伊風子或著道服稱伊尊師熊嘗於頂上患一癰癤疼痛不可忍伊尊師含三口水噀其癰便潰並不為患至今尚有痕在熊言親覩其事非謬説也出玉堂間話
