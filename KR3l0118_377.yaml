body:
  text: 趙泰趙泰晉趙泰字文和清河貝丘人也祖父京兆太守泰郡察孝廉公府辟不就精思聖典有譽鄉里當晚乃仕終中散大夫泰年三十五時嘗卒心痛須臾而死下尸于地心暖不冷屈申隨意既死十日忽然喉中有聲如雨俄而蘇活說初死之時夢有一人來近心下复有二人乘黃馬從者二人夾持泰腋徑將東行不知可幾里至一大城崔峷高峻城邑青黑色遂將泰向城門八經兩重門有瓦室可數千間男女大小亦數千人行列而吏著皂衣有五六人條疏姓字云當以科呈府君泰名在三十須臾將泰與數千人男女一時俱進府君西向坐閱視名簿訖复遣泰南入里門有人著絳衣坐大屋下以次呼名問生時何作罪行何福善諦汝等以實言也此恒遣六部使者在人間疏記善惡具有條狀不可得虛泰答父兄仕官皆二千石我少在家修學而已無所事也亦不犯惡乃遣泰為水官監作吏將二千余人運沙裨岸晝夜勤苦后轉泰水官都督知諸獄事給泰兵馬令案行地獄所至諸獄楚毒各殊或針貫其舌流血竟體或被頭露發裸形徒跣相牽而行有持大仗從后催促鐵床銅柱燒之洞然驅迫此人抱臥其上赴即焦爛尋复還生或炎爐巨鑊焚煮罪人身首碎墜隨沸翻轉有鬼持叉倚于其側有三四百人立于一面次當入鑊相抱悲泣或劍樹高廣不知限极根莖枝葉皆劍為之人眾相訾自登自攀若有欣競而身體割截尺寸離斷泰見祖父母及二弟在此獄中涕泣泰出獄門見有二人繼文書來說獄吏言有三人其家為于塔寺中懸幡燒香救解其罪可出福舍俄見三人自獄而出已有自然衣服完整在身南詣一門名開光大舍有三重門朱彩照發見此三人即入舍中泰亦隨入前有大殿珍寶周飾精光耀目金玉為床見一神人姿容偉異殊好非常坐此座上邊有沙門立倚甚眾見府君來恭敬作禮泰問此是何人府君致敬吏曰號名世尊度人之師有頃令惡道中人皆出聽經時有萬九千人皆出地獄入百里城在此到者奉法眾生也行雖虧殆尚當得度故開經法七日之中隨本所作善惡多少差次免脫泰未出之頃已見十人升虛而去出此舍复見一城方二百餘里名為受變形城地獄考治已畢者當于此城更受變報泰入其城見有土瓦屋數千區各有房舍正中有瓦屋高壯欄檻采飾有數百局吏對校文書云殺生者當作蜉蝣朝生暮死劫盜者當作豬羊受人屠割淫逸者作鶴鶩鷹麋兩舌作鴟梟鵂鶹捍債者為騾驢牛馬泰案行畢還水官處主者語泰卿是誰者子以何罪過而來在此泰答祖父兄弟皆二千石我舉孝廉公府辟不行修志念善不染眾惡主者曰卿無罪故相使為水官都督不爾與地獄中人無以異也泰問主者曰人有何行死得樂報主者言唯奉法弟子精進持戒得樂報無有謫罰也泰复問曰人未事法時所行罪過事法之后得以除否答曰皆除也語畢主者開藤篋檢年紀尚有余算三十年在乃遣泰還臨別主者曰已見地獄罪報如是當告世人皆令作善善惡隨人其猶影響可不慎乎時親表內外候視泰者五六十人同聞泰說泰自書記以示時人時晉太始五年七月十三日也乃為祖父母二弟延請僧眾大設福會皆命子孫改意奉法課觀精進士人聞泰死而复生多見罪福互來訪問時有太中大夫武城孫丰關內侯常山郝伯平等十人同集泰會款曲尋問莫不懼然皆即奉法袁廓宋袁廓字思度陳郡人也元徽中為吳郡丞病經少日奄然如死但余息未盡棺衾之具并備待畢而殮三日而能轉動視瞬自說云有使者稱教喚廓隨去既至有大城池樓堞高整階闈崇麗既命廓進主人南面與廓溫涼畢命坐設酒炙果粽菹者等味不異世中酒數行主人謂廓曰主簿不幸有缺以君才穎故欲相屈當能顧懷不廓意知是幽途乃固辭凡薄非所克堪加少窮孤兄弟零落乞蒙恩放主人曰君當以幽顯異方故辭耳此間榮祿服御乃胜君世中甚貪共事想必降意副所期也廓复固請曰男女藐然并在齠齔仆一旦供任養視無托父子之戀理有可矜廓因流涕稽顙主人曰君辭讓乃爾何容相逼愿言不獲深為歎恨就案上取一卷文書勾點之既而廓謝恩辭歸主人曰君不欲定省先亡乎乃遣人將廓行經歷寺署甚眾末得一垣門蓋囹圄也將廓入中敘趣一隅有諸屋宇駢闐相接次有一屋弊陋見其所生母羊氏在焉容服不佳甚異平生見廓惊喜戶邊有一人身面傷疾呼廓廓惊問誰羊氏曰此王夫人汝不識耶王夫人曰吾在世時不信報應雖無餘罪正坐鞭撻婢仆過苦受此罰亡來痛楚殆無暫休今特小時寬隙耳前喚汝姊來望以自代竟無所益徒為憂聚言畢涕泗王夫人即廓嫡母也廓娣時亦在側有頃使人复將廓去經涉巷陌閭里整頓似是民居末有一宅竹篱茅屋見父憑案而坐廓入門父揚手遣廓曰汝既蒙罷可速歸去不須遲也廓跪辭而歸至家即活曹宗之高平曹宗之元嘉二十五年在彭城夜寢不寤旦亡晡時氣息還通自說所見一人單衣幘執手板稱北海王使者殿下相喚宗之隨去殿前中庭有輕云去地數十丈流蔭徘徊帷幌之間有紫煙飄搖風吹近人其香非常使者曰君停階下今入白之須臾傳令謝曹君君事能可稱久懷欽遲今欲相屈為府佐君今年幾曾經鹵簿官未宗之答才干素弱仰慚聖恩今年三十一未曾經鹵簿官又報曰君年算雖少然先有福業應受顯要當經鹵簿官乃辭身可且歸家后當更議也尋見向使者送出門恍惚而醒宗之后任廣州年四十七明年職解遂還州病亡孫回璞唐殿中侍醫孫回璞濟陰人也貞觀十三年從車駕幸九成宮三善谷與魏征鄰家嘗夜二更聞外有一人呼孫侍醫者璞謂是魏征之命既出見兩人謂璞曰官喚璞曰我不能步行即取馬乘之隨二人行乃覺天地如晝日光明璞怪而不敢言出谷歷朝堂東又東北行六七里至苜蓿谷遙見有兩人持韓鳳方行語所引璞二人曰汝等錯追所得者是汝宜放彼人即放璞璞循路而還了了不異平生行處既至家系馬見婢當戶眠喚之不應越度入戶見其身與婦并眠欲就之而不得但著南壁立大聲喚婦終不應屋內极明光壁角中有蜘蛛网中二蠅一大一小并見梁上所著藥物無不分明唯不得就床自知是死甚憂悶恨不得共妻別倚立南壁久之微睡忽惊覺身已臥床上而屋中暗黑無所見喚婦令起然火而璞方大汗流起視蜘蛛网歷然不殊見馬亦大汗鳳方是夜暴死后至十七年璞奉敕驛馳往齊州療齊王佑疾還至洛州東孝義驛忽見一人來問曰君子是孫回璞曰是君何問為答我是鬼耳魏太監追君為記室因出書示璞璞視之則魏征署也璞惊曰鄭公不死何為遣君送書鬼曰已死矣今為太陽都錄太監令我召君回璞引坐共食鬼甚喜謝璞請曰我奉敕使未還鄭公不宜追我還京奏事畢然后聽命可乎鬼許之于是晝則同行夜便同宿遂至閿鄉鬼辭曰吾今先行度關待君次日度關出西門見鬼已在門外复同行到滋水鬼又與璞別曰待君奏事訖相見也君可勿食葷辛璞許諾既奏事畢訪征已薨校其薨日則孝義驛之前日也璞自以必死與家人訣別而請僧行道造像寫經可六七夜夢前鬼來召引璞上高山山巔有大宮殿既入見眾君子迎謂曰此人修福不得留之可放去即推璞墮山于是惊悟遂至今無恙矣李強友李強友者御史如璧之子強友天寶末為剡縣丞上官數日有素所識屠者詣門再拜問其故答曰因得病暴死至地下被所由領過太山見大郎做主簿因往陳訴未合死至蒙放得還故來拜謝大郎者強友也強友聞惆悵久之曰死得太山主簿辦复何憂因問職事何如屠者云太山有兩主簿于人間如判官也儐從甚盛鬼神之事多經其所后數日強友親人死得活复去被收至太山太山有兩主簿一姓李即強友也一姓王其人死在王下苦自論別年尚未盡忽聞府君召王主簿去頃便回云官家設齋須漆器萬口謂人曰君家有此物可借一用速宜取之事了即當放此人來詣強友云被借漆器實無手力強友為囑王候久之未決又聞府君喚李主簿走去卻回謂親吏曰官家嗔王主簿不了事轉令與覓漆器此事已急無可至辭宜速取也其人不得已將手力來取揀閱之聲家人悉聞事畢強友領過府君因而得放既愈又為強友說之強友于官嚴毅典吏甚懼衙后多在門外忽傳贊府出莫不罄折有竊視見強友著帽從百餘人不可复識皆怪訝之如是十余日而強友卒韋廣濟上元中暴死自言初見使持帖云閻羅王追己為判官己至門下而未見王須臾衢州刺史韋黃裳复至廣濟拜候黃裳與廣濟為從兄弟問汝何由而來答云奉王帖追為判官裳笑曰我已為之汝當得去命坐久之命所司辦食頃之食至盤中悉是人鼻手指等謂濟曰此鬼道中食弟既欲還不宜复吃因令向前人送廣濟還及蘇說其事而黃裳猶無恙后數日而暴卒其年呂延為浙東節度有術士謂曰地下所由云王追公為判官速作功德或當得免延之惶懼大造經像數十日術者曰公已得免矣今王取韋衢州其牒已行延之使人至信安遽報消息后十日黃裳競亡也卻惠連大歷中山陽人卻惠連始居泗上以其父嘗為河朔官遂從居清河父歿惠連以哀瘠聞廉使命吏臨吊贈粟帛既免喪表授漳南尉歲余一夕獨處于堂忽見一人衣紫佩刀趨至前謂惠連曰上帝有命拜公為司命主者以冊立閻波羅王即以錦紋箱貯書進于惠連曰此上帝命也軸用瓊鈿標以紋錦又象笏紫綬金龜玉帶以賜惠連且喜且懼心甚惶惑不暇顧問遂受之立于前軒有相者趨入贊曰驅殿吏卒且至已而有數百人繡衣紅額左右佩兵器趨入羅為數行再拜一人前曰某幸得為使之吏敢以謝詞竟又拜拜訖分立于前相者又曰五岳衛兵主將复有百餘人趨入羅為五行衣如五方色皆再拜相者又曰禮器樂懸吏鼓吹吏車輿乘馬吏符印簿書吏帑藏廚膳吏近數百人皆趨而至有頃相者曰諸岳衛兵及禮器東懸車輿乘馬等請使躬自閱之惠連曰諸岳衛兵安在對曰自有所自有所耳惠連即命駕于是控一白馬至具以金玉其導引控御從輩皆向者繡衣也數騎夾道前驅引惠連東北而去傳呼甚嚴可行數里兵士萬余或騎或步盡介金執戈列于路槍槊旗飾文繡交煥俄見朱門外有數十人皆衣綠執笏曲躬而拜者曰此屬吏也其門內悉張帷帟幾榻若王者居惠連既升階据幾而坐俄綠衣者十輩各繼簿書請惠連判署己而相者引惠連于東廡下一院其前庭有車輿乘馬甚多又有樂器鼓簫及符印管鑰盡致于榻上以黃紋帊蔽之其榻繞四墉又有玉冊用紫金填字以篆籀書盤屈若龍鳳之勢主吏白曰此閻波羅王之冊也有一人具簪冕來謁惠連與抗禮既坐謂惠連曰上帝以鄴郡內黃縣南蘭若海悟禪師有德立心畫一冊有閻波羅王禮甚言以執事有至行故拜執事為司命主者統冊立使某幸列賓掾故得侍左右惠連問曰閻波羅王居何府掾曰地府之尊者也摽冠岳瀆總幽冥之務非有奇特之行者不在是選惠連思曰吾行冊禮于幽冥豈非身已死乎又念及妻子怏怏有不平之色府掾已察其旨謂惠連曰執事有憂色得非以妻子為念乎惠連曰然府掾曰冊命之禮用明日執事可暫歸治其家然執事官至崇幸不以幽顯為恨言訖遂起惠連即命駕出行而昏然若醉者即据案假寐及寤已在縣時天才曉惊歎且久自度上帝命固不可免即具白妻子為理命又白于縣令令曹某不信惠連遂湯沐具紳冕臥于榻是夕縣吏數輩皆聞空中有聲若風雨自北來直入惠連之室食頃惠連卒又聞其聲北向而去歎駭因遣使往鄴郡內黃縣南問果是蘭若院禪師海悟者近卒矣
