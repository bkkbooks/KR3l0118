body:
  text: 東陽夜怪録東陽夜怪録前進士王洙字學源其先琅琊人元和十三年春擢第嘗居鄒魯間名山習業洙自云前四年時因隨籍入貢暮次滎陽逆旅值彭城客秀才成自虛者以家事不得就舉言旋故里遇洙因話辛勤往復之意自虛字致本語及人間目睹之異是歲自虛十有一月八日東還翼翌日到渭南縣方屬陰曀不知時之早晚縣宰黎謂留飲數巡自虛恃所乘壯乃命僮仆輜重悉令先于赤水店俟宿聊踟蹰焉東出縣郭門則陰風刮地飛雪霧天行未數里逮將昏黑自虛僮仆既悉令前去道上又行人已絶無可問程至是不知所屆矣路出東陽驛南尋赤水谷口道去驛不三四里有下塢林月依微略辨佛廟自虛啓扉投身突入雪努愈甚自虛竊意佛宇之居有住僧將求委焉則策馬入其后才認北橫數間空屋寂無燈燭久之傾聽微似有人喘息聲遂系馬于西面柱連問院主和尚今夜慈悲相救徐聞人應老病僧智高在此適僮仆已出使村中教化無從以致火燭雪若是復當深夜客何為者自何而來四絶親鄰何以取濟今夕脫不惡其病穢且此相就則免暴露兼撤所藉芻稿分用委質可矣自虛他計既窮聞此內亦頗喜乃問高公生緣何鄉何故栖此又俗姓云何既接恩容當還審其出外曰貧道俗姓安生在磧西本因舍力隨緣來詣中國到此未幾房院𩜱蕪秀才卒降無以供待不垂見怪為幸自虛如此問答頗忘前倦乃謂高公曰方知探寶化城如來非妄立喻今高公是我導師矣高公本宗固有如是降伏其心之教俄則沓沓然若數人聯步而至者遂聞云極好雪師丈在否高公未應間聞一人云曹長先行或曰朱八丈合先行及聞人曰路其寬曹長不合苦讓偕行可也自虛竊謂人多私心益壯有頃即似悉造座隅矣內謂一人曰師丈此有宿客乎高公對曰適有客來詣宿耳自虛昏昏然莫審其形質唯最前一人俯簷映雪仿佛若見著皂裘者背及肋有搭白補處其人先發問自虛云客何故瑀瑀然犯雪昏夜至此自虛則具以實告其人因請自虛姓名對曰進士成自虛自虛亦從而語曰暗中不可悉揖清揚他日無以為子孫之舊請各稱其官及名氏便聞一人云前河陰轉運巡官試左驍衛胄曹參軍盧倚馬次一人云桃林客副輕車將軍朱中正次一人曰去文姓敬次一人曰鋭金姓奚此時則似周坐矣初因成公應舉倚馬旁及論文倚馬曰某兒童時即聞人詠師丈聚雪為山詩今猶記得今夜景象宛在目中師丈有之乎高公曰其詞謂何試言之倚馬曰所記云誰家掃雪滿庭前萬壑千峰在一拳吾心不覺侵衣冷曾向此中居幾年自虛茫然如失口呿眸貽尤所不測高公乃曰雪山是吾家山往年偶見小兒聚雪屹有峰巒山狀西望故國悵然因作是詩曹長大聰明如何記得貧道舊時惡句不因曹長誠念在口實亦遺忘倚馬曰師丈騁逸步于遐荒脫塵機于維系巍巍道德可謂首出儕流如小子之徒望塵奔走曷敢窺其高遠哉倚馬今春以公事到城受性頑鈍闕下桂玉煎迫不堪旦夕羈旅雖勤勞夙夜料入況微負荷非輕常懼刑責近蒙本院轉一虛銜意在苦求脫免昨晚出長樂城下宿自悲塵中勞役慨然有山鹿野麋之志因寄同侶成兩篇惡詩對諸作者輒欲口占去放未敢自虛曰今夕何夕得聞佳句倚馬又謙曰不揆荒淺況師丈文宗在此敢呈丑拙邪自虛苦請曰願聞願聞倚馬因朗吟其詩曰長安城東洛陽道車輪不息塵浩浩爭利貪前競著鞭相逢盡是塵中老日晚長川不計程離群獨步不能鳴賴有青青河畔草春來猶得慰羈情合座咸曰太高作倚馬謙曰拙惡拙惡中正謂高公曰比聞朔漠之士吟諷師丈佳句絶多今此是穎川況側聆盧曹長所念開洗昏鄙意爽神清新制的多滿座渴詠豈不能見示三兩首以沃群矚高公請俟他日中正又曰眷彼名公悉至何惜兔園雅論高談抑一時之盛事今去市肆若遠夜艾興余杯觴固不可求炮炙無由而致賓主禮闕慚恧空多吾輩方以觀心朵頤而諸公通宵無以充腹赧然何補高公曰吾聞嘉話可以忘乎飢渴秪如八郎力濟生人動循軌轍攻城犒士為己所長但以十二因緣皆從觴起茫茫苦海煩惱隨生何地而可見菩提何門而得離火宅中正對曰以愚所謂覆轍相尋輪回惡道先后報應事甚分明引領修行義歸于此高公大笑乃曰釋氏尚其清淨道成則為正覺覺則佛也如八郎向來之談深得之矣倚馬大笑自虛又曰適來朱將軍再三有請和尚新制在小生下情實願觀寶和尚豈以自虛遠客非我法中而見鄙之乎且和尚器識非凡岸谷深峻必當格韻才思貫絶一時妍妙清新擺落俗態豈終祕咳唾之余思不吟一兩篇以開耳目乎高公曰深荷秀才苦請事則難于固違況老僧殘疾衰羸習讀久廢章句之道本非所長卻是朱八無端挑抉吾短然于病中偶有兩篇自述匠石能聽之乎曰願聞其詩曰擁褐藏名無定蹤流沙千里度衰容傳得南宗心地后此身應便老雙峰為有閻浮珍重因遠離西國赴咸秦自從無力休行道且作頭陀不系身又聞滿座稱好聲移時不定去文忽于座內云昔王子猷訪戴安道于山陰雪夜皎然及門而返遂傳何必見戴之論當時皆重逸興今成君可謂以文會友下視袁安蔣詡吾少年時頗負雋氣性好鷹鸇曾于此時畋遊馳騁吾故林在長安之巽維御宿川之東畤詠雪有獻曹州房一篇不覺詩狂所攻輒污泥高鑒耳因吟詩曰愛此飄颻六出公輕瓊洽絮舞長空當時正逐秦丞相騰躑川原喜北風獻詩訖曹州房頗甚賞仆此詩因難云呼雪為公得無檢束乎余遂征古人尚有呼竹為君后賢以為名論用以證之曹州房結舌莫知所對然曹州房素非知詩者烏大嘗謂吾曰難得臭味同斯言不妄今涉彼遠官參東州軍事相去數千苗十氣候啞吒憑恃群親索人承事魯無君子者斯焉取諸鋭金曰安敢當不見苗生幾日曰涉旬矣然則苗子何在去文曰亦應非遠知吾輩會于此計合解來居無幾苗生遽至去文偽為喜意拊背曰適我願兮去文遂引苗生與自虛相揖自虛先稱名氏苗生曰介立姓苗賓主相諭之詞頗甚稠沓鋭金居其側曰此時則苦吟之矣諸公皆由老奚詩病又發如何如何自虛曰向者承奚生眷與之分非淺何為尚吝瑰寶大失所望鋭金退而逡巡曰敢不貽廣席一噱乎輒念三篇近詩云舞鏡爭鸞彩臨場定鶻拳正思仙仗日翹首仰樓前養斗形如木迎春質似泥信如風雨在何憚迹卑栖為脫田文難常懷紀涓恩欲知𩜱野態霜曉叫荒村鋭金吟訖暗中亦大聞稱賞聲高公曰諸賢勿以武士見待朱將軍此公甚精名理又善屬文而乃猶無所言皮里臧否吾輩抑將不可況成君遠客一夕之聚空門所謂多生有緣宿鳥同樹者也得不因此留異時之談端哉中正起曰師丈此言乃與中正樹荊棘耳苟衆情疑阻敢不唯命是聽然盧探手作事自貽伊戚如何高公曰請諸賢靜聽中正詩曰亂魯負虛名遊秦感寧生候驚丞相喘用識葛盧鳴黍稷滋農興軒車乏道情近來筋力退一志在歸耕高公歎曰朱八文華若此未離散秩引駕者又何人哉屈甚屈甚倚馬曰扶風二兄偶有所系吾家龜茲蒼文斃甚樂喧厭靜好事揮霍興在結束勇于前驅此會不至恨可知也去文謂介立曰胃家兄弟居處匪遙莫往莫來安用尚志詩云朋友攸攝而使尚有遐心必須折簡見招鄙意頗成其美介立曰某本欲訪胃大去方以論文興酣不覺遲遲耳敬君命豫今且請諸公不起介立略到胃家即回不然便拉胃氏昆季同至可乎皆曰諾介立乃去無何去文于衆前竊是非介立曰蠢茲為人有甚爪距頗聞潔廉善主倉庫其如蠟姑之丑難以掩于物論何殊不知介立與胃氏相攜而來及門瞥聞其説介立攘袂大怒曰天生苗介立斗伯比之直下得姓于楚遠祖棼皇茹分二十族祀典配享至于禮經奈何一敬去文盤瓠之余長細無別非人倫所齒只合馴狎稚子獰守酒旗諂同妖狐竊脂媚灶安敢言人之長短我若不呈薄藝敬子謂我咸秩無文使諸人異日藐我今對師丈念一篇惡詩且看如何詩曰為慚食肉主恩深日晏蟠蜿臥錦衾且學志人知白黑那將好爵動吾心自虛頗甚佳歎去文曰卿不詳本末厚加矯誣我實春秋向戌之后卿以我為盤瓠樀如辰陽比房于吾殊所華闊中正深以兩家獻酬未絶為病乃曰吾願作宜僚以釋二忿可乎昔我逢丑父實與向家棼皇春秋時屢同盟會今座上有名客二子何乃互毀祖宗語中忽有綻露是取笑于成公齒冷也且盡吟詠固請息喧于是介立即引胃氏昆仲與自虛相見初襜襜然若自色二人來前長曰胃藏瓠次曰藏立自虛亦稱姓名藏瓠又巡座云令兄令弟介立乃于廣衆延譽胃氏昆弟潛迹草野行著及于名族上參列宿親密內達肝膽況秦之八水實貫天府故林二十族多是咸京聞弟新有題舊業詩時稱甚美如何得聞乎藏瓠對曰小子謬廁賓筵作者云集欲出口吻先增慚怍今不得已塵汙諸賢耳目詩曰鳥鼠是家川周王昔獵賢一從離子卯應見海桑田介立稱好弟他日必負重名公道若存斯文不朽藏瓠斂躬謝曰藏瓠幽蟄所宜幸陪群彥兄揄揚太過小子謬當重言若負芒刺座客皆笑時自虛方聆諸客嘉什不暇自念己文但曰諸公清才綺靡皆是目牛遊刃中正將謂有譏潛然遁去高公求之不得曰朱八不告而退何也倚馬對曰朱八世與炮氏為仇惡聞發硎之説而去耳自虛謝不敏此時去文獨與自虛論詰語自虛曰凡人行藏卷舒君子尚其達節搖尾求食猛虎所以見幾或為知己吠鳴不可以主人無德而廢斯義也去文不才亦有兩篇言志奉呈詩曰事君同樂義同憂那校糟粳滿志休不是守株空待兔終當逐鹿出林丘少年嘗負飢鷹用內願曾無寵鶴心秋草毆除思去宇平原毛血興從禽自虛賞激無限全忘一夕之苦方欲自夸舊制忽聞遠寺撞鐘則比膊鍧然聲盡矣注目略無所睹但覺風雪透窗臊穢撲鼻唯窣颯如有動者而厲聲呼問絶無由答自虛心神恍惚未敢遽前捫攖退尋所系之馬宛在屋之西隅鞍韉被雪馬則齕柱而立遲疑間曉色已將辨物矣乃于屋壁之北有橐駝一貼腹跪足儑耳齠口自虛覺夜來之異得以遍求之室外北軒下俄又見一瘁瘠烏驢連脊有磨破三處白毛茁然將滿舉視屋之北拱微若振迅有物乃見一老雞蹲焉前及設像佛宇塌座之北東西有隙地數十步牖下皆有彩畫處土人曾以麥穩之長者積于其間見一大駁貓兒眠于上咫尺又有盛餉田漿破瓠一次有牧童所棄破笠一自虛因蹴之果獲二刺蝟蠕然而動自虛周求四顧悄未有人又不勝一夕之凍乏乃攬轡振雪上馬而去繞出村之北道左經柴欄舊圃睹一牛踣雪齕草次此不百餘步合村悉輦糞幸此蘊崇自虛過其下群犬喧吠中有一犬毛悉齊裸其狀甚異睥睨自虛自虛驅馬久之值一叟辟荊扉晨興開徑雪自虛駐馬訊焉對曰此故友右軍彭特進莊也郎君昨宵何止行李間有似迷途者自虛語及夜來之見叟倚篲驚訝曰極差極差昨晚天氣風雪莊家先有一病橐駝慮其為所斃遂覆之佛宇之北念佛社屋下有數日前河陰官腳過有乏驢一頭不任前去某哀其殘命未舍以粟斛易留之亦不羈絆彼欄中瘠牛皆莊家所畜適聞此説不知何緣如此作怪自虛曰昨夜已失鞍馱今餒凍且甚事有不可率話者大略如斯難于悉述遂策馬奔去至赤水店見僮仆方訝其主之相失始忙于求訪自虛慨然如喪魂者數日
