body:
  text: 李惟燕李惟燕建德縣令李惟燕少持金剛經唐天寶末惟燕為餘姚郡參軍秩滿北歸過五丈店屬上虞江埭塘破水竭時中夜晦暝四回無人此路舊多劫盜惟燕舟中有吳綾數百匹懼為賊所取因持一劍至船前誦經三更後見堤上兩炬火自遠而至惟燕疑是村人衛己火去船百步便卻復回心頗異之愈益厲聲誦經亦竊自思云火之所為得非金剛經力乎時塘水竭而塘外水滿惟燕便心念塘破當得水助半夕之後忽聞船頭有流水聲驚云塘闊數丈何由得破久之稍覺船浮及明河水已滿對船所一孔大數尺乃知誦金剛經之助云惟燕弟惟玉見任虔州別駕見其兄誦經有功因效之後泛舟出峽水急櫓折船將欲敗乃力念經忽見一櫓隨流而下遂獲濟其族人亦常誦金剛經遇安祿山之亂伏於荒草賊將至思得一鞋以走俄有物落其背驚視乃新鞋也出廣異記孫明唐孫明者鄭州陽武人也世貧賤為盧氏莊客善持金剛經日誦二十遍經二十年自初持經便絶葷血後正念誦次忽見二吏來追明意將是縣吏便縣去行可五六里至一府門門人云王已出巡吏因閉明於空室中其室從廣五六十間蓋若蔭雲經七日王方至吏引明入府王問汝有何福答云持金剛經已二十年王言此大福也顧謂左右曰昨得祗洹家牒論明念誦勤懇請延二十載乃知修道不可思議所延二十載以償功也令吏送還舍其家殯明已畢神雖復體家人不之知也會獵者從殯宮過聞號呼之聲報其家人因爾得活矣天寶末明活已六七年甚無恙也出廣異記三刀師唐三刀師者俗姓張名伯英乾元中為壽州健兒性至孝以其父在潁州乃盜官馬往以迎省至淮陰為守遏者所得刺史崔昭令出城腰斬時屠劊號能行刀再斬初不傷損乃換利刀罄力砍不損如故劊者驚曰我用刀砍至其身則手懦不知何也遽白之昭問所以答曰昔年十五曾絶葷血誦金剛經十餘年自胡亂以來身在軍中不復念誦昨因被不測罪唯志心念經爾昭嘆息舍之遂削髮出家著大鐵鈴乞食修千人齊供一日便辦時人呼為三刀師謂是起敬菩薩出廣異記宋參軍唐坊州宋參軍少持金剛經及之官權於司士宅住舊知宅凶每夕恆誦經忽見婦人立於戶外良久宋問汝非鬼耶曰然又問幽明理殊當不宜見得非有枉屈之事乎婦人便悲泣曰然言身是前司士之婦司士奉使其弟見逼拒而不從因此被殺以氈褁尸投於堂西北角溷廁中不勝穢積人來多欲陳訴俗人怯懦見形必懼所以幽憤不達凶惡驟聞執事以持念為功當亦大庇含識眷言枉穢豈不憫之宋云己初官位卑不能獨救翌日必為上白府君其鬼乃去及明具白掘地及溷不獲其尸宋誦經婦人又至問何以不獲答云西北只校一尺明當求之以終惠也依言乃獲之氈內但餘骨在再為洗濯移於別所其夕又來拜謝歡喜謂曰垂庇過深難以上答雖在冥昧亦有所通君有二子大者難養小者必能有後且有榮位兼言宋後數改明鈔本改作政官祿又云大愧使君不知何以報答宋見府君具敘所論府君令問己更何官至夕婦人又至因傳使君意云一月改官然不稱意當遷桂州別駕宋具白其事皆有驗初宋問身既為人所殺何以不報云前人今尚為官命未合死所以未復云也出廣異記劉鴻漸劉鴻漸者御史大夫展之族子唐乾元初遇亂南徙有僧令誦金剛經鴻漸日誦經至上元年客於壽春一日出門忽見二吏云奉太尉牒令追鴻漸云初不識太尉何以見命意欲抗拒二吏忽爾直前拖曳鴻漸請著衫吏不肯放牽行未久倏過淮至一村須臾持大麻衫及腰帶令鴻漸著笑云真醋大衫也因而向北行路漸梗澀前至大城入城有府舍甚嚴麗忽見向勸讀經之僧從署中出僧後童子識鴻漸徑至其所問十六郎何以至此因走白和尚云劉十六郎適為吏追以誦經功德豈不往彼救之鴻漸尋至僧所虔禮求救僧曰弟子行無苦須臾吏引鴻漸入詣廳事案後有五色浮圖高三四尺回旋轉動未及考問僧已入門浮圖變成美丈夫年三十許云是中丞降階接僧問和尚何以復來僧云劉鴻漸是己弟子持金剛經功力甚至其算又未盡宜見釋也王曰若持金剛經當願聞耳因令跪誦鴻漸誦兩紙訖忽然遺忘廳西有人手持金鉤龍頭幡幡上碧字書金剛經布於鴻漸前令分明誦經畢都不見人但餘堂宇闃寂因爾出門唯見追吏忽有物狀如兩日來擊鴻漸鴻漸惶懼奔走忽見道傍有水鴻漸欲止而飲之追吏云此是人膏澄久上清耳其下悉是餘皮爛肉飲之不得還矣須臾至舍見骸形臥在床上心頗惆悵鬼自後推之冥然如入房戶遂活鬼得錢乃去也出廣異記張嘉猷廣陵張嘉猷者唐寶應初為明州司馬遇疾卒載喪還家葬於廣陵南郭門外永泰初其故人有勞氏者行至郭南坐浮圖下忽見猷乘白馬自南來見勞下馬相尉如平生然不脫席帽低頭而語勞問冥中有何罪福猷云罪福昭然莫不隨所為而得但我素持金剛經今得無纍亦當別有所適在旬月間耳卿還為白家兄令為轉金剛經一千遍何故將我香爐盛諸惡物卿家亦有兩卷經幸為轉誦增己之福言訖遂訣而去勞昏昧久之方寤云出廣異記魏恂唐魏恂左庶子尚德之子持金剛經神功初為監門衛大將軍時京有蔡策者暴亡數日方蘇自云初至冥司怪以追人不得將撻其使者使者云將軍魏恂持金剛經善神擁護追之不得即別遣使覆追須臾還報並同冥官曰且罷追恂聞尤加精進出廣異記杜思訥唐潞州銅匙縣人杜思訥以持金剛經力疾病得愈每至持經之日必覿神光出廣異記龍興寺主唐原州龍興寺因大齊會寺主會僧夏臘既高是為宿德坐麗賓頭下有小僧者自外後至以無坐所唯寺主下曠一位小僧欲坐寺主輒叱之如是數次小僧恐齊失時竟來就坐寺主怒甚倚柱而坐以掌摑之方欲舉手大袖為柱所壓不得下合掌驚駭小僧慚沮不齊而還房衆議恐是小僧道德所致寺主遂與寺衆同往禮敬小僧惶懼自言初無道行不敢濫受大德禮數逡巡走去因問平生作何行業云二十年唯持金剛經衆皆讚嘆謂是金剛護持之力便於柱所焚香頂禮咒云若是金剛神力當還此衣於是隨手而出也出廣異記陳哲唐臨安陳哲者家住餘杭精一練行持金剛經廣德初武康草賊朱潭寇餘杭哲富於財將搬移産避之尋而賊至哲謂是官軍問賊今近遠群賊大怒曰何物老狗敢辱我爭以劍刺之每下一劍則有五色圓光徑五六尺以蔽哲身刺不能中賊驚嘆謂是聖人莫不慚悔捨之而去出廣異記豐州烽子唐永泰初豐州烽子暮出為党項縛入西蕃養馬蕃王令穴肩骨貫以皮索以馬數百蹄配之經半歲馬息一倍蕃王賞以羊革數百因轉近牙帳贊普子愛其了事遂令執纛左右有剩肉餘酪與之又居半年因與酪肉悲泣不食贊普問之云有老母頻夜夢見贊普頗仁聞之悵然夜召帳中語云蕃法嚴無放還例我與爾馬有力者兩匹於某道縱爾歸無言我也烽子得馬極騁俱乏死遂晝潛夜走數日後為刺傷足倒磧中忽風吹物窸窣過其前因攬之褁足有頃不復痛試起步走如故經宿方及豐州界歸家其母尚存悲喜曰自失爾我唯念金剛經寢食不廢以祈見爾今果其誓因取經縫斷亡數幅不知其由子因道磧中傷足事母令解足視之褁瘡乃數幅經也其瘡亦愈出酉陽雜俎張鎰唐丞相張鎰父齊丘酷信釋氏每旦更新衣執經於像前念金剛經十五遍積數十年不懈永泰初為朔方節度使衙內有小將負罪懼事露乃扇動軍人數百定謀反叛齊丘因衙退於小廳閒行忽有兵數十露刃走入齊丘左右唯奴僕遽奔宅門過小廳數步回顧又無人疑是鬼物將及宅其妻女奴婢復叫呼出門云有兩甲士身出廳屋上時衙隊軍健聞變持兵亂入至小廳前見十餘人仡然庭中垂手張口投兵於地衆遂擒縛五六人瘖不能言餘者具首云欲上廳忽見二甲士長數丈瞋目叱之初如中惡齊丘聞之因斷酒肉出酉陽雜俎崔寧唐崔寧大曆初鎮西蜀時會楊林反健兒張國英與戰射中腹鏃沒不出醫曰一夕必死家人將備葬具與同伍泣別國英常持金剛經至夜夢胡僧與一丸藥至旦瀉箭鏃出瘡便合瘥出報應記
