body:
  text: 樂廣樂廣晉樂令廣女適大將軍成都王頴王兄長沙王乂執權於洛遂構兵相圖長沙親近小人遠外君子凡在朝者人懷危懼樂令既處朝望加有婚親小人讒於長沙嘗問問原作聞據明鈔本改樂令神色自若徐答曰廣豈以五男易一女由是釋然無復疑意出世說新語劉仁軌唐劉仁軌為左僕射戴至德為右僕射皆多劉而鄙戴時有一老婦陳牒至德方欲下筆老婦顧左右曰此劉僕射戴僕射左右以戴僕射言急就前曰此是不解事僕射却將牒來至德笑令授之戴僕射在職無異迹當朝似不能言及薨後高宗歎曰自吾喪至德無所復聞當其在時事有不是者未嘗放我過因出其前後所陳章奏盈篋閲而流涕朝廷始追重之出國史異纂婁師德納言婁師德鄭州人為兵部尚書使并州接境諸縣令隨之日高至驛恐人煩擾驛家令就廳同食尚書飯白而細諸人飯黑而粗呼驛長責之曰汝何為兩種待客驛將恐對曰邂逅浙米不得死罪尚書曰卒客無卒主人亦復何損遂換取粗飯食之檢校營田往梁州先有鄉人姓婁者為屯官犯贓都督許欽明欲決殺令衆鄉人謁尚書欲救之尚書曰犯國法師德當家兒子亦不能捨何況渠明日宴會都督與尚書犯國法俱坐尚書尚書二字上原有謂字據朝野僉載五刪曰聞有一人犯國法云是師德鄉里師德實不識但與其父為小兒時共牧牛耳都督莫以師德寬國家法都督遽令脫枷至尚書切責之曰汝辭父娘求覓官職不能謹潔知復奈何將一楪䭔餅與之曰噇却作箇飽死鬼去都督從此捨之後為納言平章事父明鈔本父作又檢校屯田行有日矣咨執事早出婁先足疾待馬未來於光政門外橫木上坐須臾有一縣令不知其納言也因訴身名遂與之並坐令有一丁遠覘之走告曰納言也令大驚起曰死罪納言曰人有不相識法有何死罪令因訴云有左嶷以其年老眼暗奏解某夜書表狀亦得眼實不暗納言曰道是夜書表狀何故白日裏不識宰相令大慚曰願納言莫說向宰相納言南無佛不說公左右皆笑使至靈州果驛上食訖索馬判官咨意家漿水亦索不得全不祇承納言曰師德已上馬與公料理往呼驛長責曰判官與納言何別不與供給索杖來驛長惶怖拜伏納言曰我欲打汝一頓大使打驛將細碎事徒涴却名聲若向你州縣道你即不存生命且放却驛將跪拜流汗狼狽而走婁目送之謂判官曰與公躓頓之矣衆皆怪歎其行事皆此類浮休子曰司馬徽劉寬無以加也出朝野僉載李昭德為內史師德為納言相隨入朝婁體肥行緩李屢顧待不即至乃發怒曰可明鈔本作叵耐殺人田舍漢婁聞之乃笑曰師德不是田舍漢更阿誰是師德弟拜代州刺使將行謂之曰吾以不才位居宰相汝今又得州牧叨遽過分人所嫉也將何以全先人髮膚弟長跪曰自今後雖有人唾某面上某亦不敢言但拭之而已以此自勉庶不為兄憂師德曰此適為我憂也夫人唾汝者發怒也汝今拭之是惡其唾惡而拭是逆人怒也唾不拭將自乾何如弟笑而受之武后年竟保寵祿出國史異纂李績唐英公李績為司空知政事有一番官者參選被放來辭英公公曰明朝早向朝堂見我來及期而至郎中並在傍番官至辭英公嚬眉謂之曰汝長生不知事尚書侍郎我老翁不識字無可教汝何由可得留深負愧汝努力好去侍郎等惶懼遽問其姓名令南院看榜須臾引入注與吏部令史英公時為宰相有鄉人嘗過宅為設食客裂却餅緣英公曰君大年少此餅犁地兩遍熟概下種鋤塒收刈打揚訖磑羅作麵然後為餅少年裂却緣是何道此處猶可若對至尊前公作如此事參差砍却你頭客大慚悚浮休子曰宇文朝華州剌史王羆有客裂餅緣者羆曰此餅大用功力然後入口公裂之只是未饑且擎却客愕然又臺使致羆食飯使人割瓜皮大厚投地羆就地拾起以食之使人極悚息今輕薄少年裂餅緣割瓜侵瓤以為達官兒郎通人之所不為也出朝野僉載李日知唐刑部尚書李日知自為畿赤不曾行杖罰其事克濟及為刑部尚書有令使受敕三日忘不行者尚書索杖剝衣喚令使總集欲決之責曰我欲笞汝一頓恐天下人稱你云撩得李日知嗔喫李日知杖你亦不是人妻子亦不禮汝遂放之自是令史無敢犯者設有稽失衆共責之出朝野僉載盧承慶盧尚書承慶總章初考內外官有一官督運遭風失米米原作水據明鈔本改盧考之曰監運失糧考中下其人容止自若無一言而退盧重其雅量改注曰非力所及考中中既無喜容亦無愧詞又改曰寵辱不驚可中上出國史異纂裴冕李齊物天寶初為陝州刺史開砥柱之險石中鐵犁鏵有平陸字因改河北縣為平陸縣齊物性褊急怒陝縣尉裴冕於洲城大路冠冕之士鄙之後冕為宰相除齊物太子賓客時人嘉冕不報私怨出談賓録郭子儀郭子儀為中書令觀容使魚朝恩請游章敬寺子儀許之丞相意其不相得使吏諷請君無往邠吏自中書馳告郭公軍容將不利於公亦告諸將須臾朝恩使至子儀將行士衷甲請從者三百人子儀怒曰我大臣也彼非有密旨安敢害我若天子之命爾曹胡為獨與童僕十數人赴之朝恩候之驚曰何車騎之省也子儀以所聞對且曰恐勞恩慮耳朝恩撫胸捧手嗚咽揮涕曰非公長者得無疑乎出談賓録子儀有功高不賞之懼中貴人害其功遂使盜於華州掘公之先人墳墓公裨將李懷光等怒欲求物捕其黨及公入奏對揚之曰但號泣自罪因奏曰臣領師徒出外征伐動經歲年害人之兄殺人之父多矣其有節夫義士刃臣於腹中者衆今搆隳辱宜當其辜辜原作幸據明鈔本改但臣為國之心雖死無悔由是中外翕然莫測公子弘廣常於親仁里大啓其第里巷負販之人上至公子簪纓之士出入不問或云王夫人趙氏愛女方粧梳對鏡往往公麾下將吏出鎮去及郎吏皆被召令汲水持帨視之不異僕隸他曰子弟焦列啓諫公三不應於是繼之以泣曰大人功業已成而不自崇重以貴以賤皆游臥內某等以為雖伊霍不當如此也公笑而謂曰爾曹固非所料且吾官馬粟者五百匹官餼者一千人進無所往退無所據向使崇垣扃戶不通內外一怨將起搆以不臣其有貪功害能徒成就其事則九族齏粉噬臍莫追今蕩蕩無間四門洞開雖讒毀是興無所加也吾是以爾諸子皆伏郭氏舊史說辛雲景曾為公子之吏使後除潭州都督將辭纍日不獲見夫人王氏及趙氏愛女及謂雲景曰汝弟去吾為汝言於令公雲景拜於庭夫人傅粉於內曰吾大喜且喜汝得一喫飯處趙氏女臨階濯手令雲景汲水夫人曰放伊去雲景始趨而去矣明鈔本郭氏舊史作郭氏舊吏永泰元年僕固懷恩卒諸蕃犯京畿子儀統衆禦之至涇陽而虜已合子儀率甲士二千出入虜見而問曰此何人也報曰郭令公回紇曰令公在乎乎原作曰據明鈔本改懷恩謂吾天可汗已棄四海令公殂謝中國無主故某來今令公在天可汗在乎子儀報曰皇帝萬壽無疆回紇皆曰懷恩欺我子儀使諭之回紇曰令公若在安得見之子儀出諸將皆曰戎狄不可信也請無往子儀曰虜有數十倍之衆今力不敵奈何但至誠感神況虜乎諸將請選鐵騎五百為從子儀曰此適足為害也及傳呼曰令公來初疑皆持兵注目以待之豫儀乃數十騎徐出免胄勞之曰安乎久同忠義何至於是回紇皆捨兵降馬曰是吾父也子儀長六尺餘貌秀傑於靈武加平章事封汾陽王加中中原作平據明鈔本改書令圖形淩煙閣加號尚父配饗代守廟庭有子八人壻七人皆重官子暖尚升平公主諸孫數十人每諸生問安頷之而已事上誠盡臨下寬厚每降城下邑所至之處必得志前後連罹幸臣程元振魚朝恩等譖毀百端時方握強兵或臨戎敵詔命徵之未嘗以危亡回顧亦遇天幸竟免患難田承嗣方跋扈狠傲無禮子儀嘗遣使至魏州承嗣輒望拜指其膝謂使者曰此膝不屈於人若干歲矣今為公拜麾下老將若李懷光輩數十人皆王侯重貴子儀麾指進退如僕隸焉始光弼齊名雖威略不見而寬厚得人過之歲入官俸二十四萬私利不預焉其宅在親仁里居其地四分之一通永巷家人三千相出入者不知其居代宗不名呼為大臣天下以其身存亡為安危者殆二十年校中書令考二十四年權傾天下而朝不忌功蓋一代而主不疑侈窮人欲而君子不罪富貴壽考繁衍安泰終始人倫之盛無缺焉卒年八十五出談賓録宋則宋則家奴執弩絃斷誤殺其子則不之罪出獨異志
