body:
  text: 韓愈韓愈泉州之南有山焉其山峻起壁立下有潭水深不可測周十余畝中有蛟螭嘗為人患人有誤近或馬牛就而飲者輒為吞食泉人苦之有年矣由是近山居者咸挈引妻子徙去他郡以逃其患元和五年一夕聞山南有雷震暴興震數百里若山崩之狀一郡驚懼里人洎牛馬雞犬俱失聲仆地流汗被體屋瓦交擊木樹顛拔自戌及子雷電方息明旦往視之其山摧墮石壁數百仞殆盡俱填其潭水溢流注滿四野蛟螭之血遍若玄黃而石壁之上有鑿成文字一十九言字勢甚古郡中士庶無能知者自是居人無復患矣懼者既息遷者亦歸結屋架廬接比其地郡守因之名其地為石銘里蓋因字為銘且識其異也后有客于泉者能傳其字持至東洛時故吏部侍郎韓愈自尚書郎為何南令見而識之其文曰詔示黑水之鯉魚天公卑殺牛人壬癸神書急急然則詳究其義似上帝責蛟螭之詞令戮其害也其字則蝌蚪篆書故泉人無有識者矣裴度元和元年秋九月淮西帥吳少誠死子元濟拒命詔鄰淮西焉以兵四攻之凡數年不克十三年召丞相晉國公裴度將而擊焉度既至因命封人深池濠且發其地有得一石者上有雕出文字為銘封人持以獻度文曰井底一竿竹竹色深緑緑雞未肥酒未熟障車兒郎且須縮度得之以示從事令辨其義焉咸不能究度方念之俄有一卒自行間躍而賀曰吳元濟逆天子命縱狂兵為反謀賴天子威聖與丞相德合今日逆豎成擒矣敢賀丞相功度驚訊之對曰封人得石銘是其兆也且井底一竿竹竹色深緑緑者言吳少誠由行間一卒遂擁十萬兵為一方帥且喻其榮也雞未肥者言無肉也夫以肥去肉為己字也酒未熟者言無水也以酒去水為酉字障車兒郎謂兵革之士也且縮者謂宜退守其所也推是言之則己酉日當克也苟未及期則可俟矣度喜顧左右曰卒辨者也歎而異之是歲冬十月相國李訴將兵入淮西生得元濟盡諸反者度因校其日果己酉焉于是度益奇卒之辨擢為裨將張惟清黑山之陰有李衛公廟寶歷中張惟清都護單于其從事盧立嘗夢一人頎長黑衣告立曰吾居于衛公廟且久矣子幸遷我于軍城中已而遂去及曉立不諭即入白于惟清曰衛公于國有大勳今廟宇隳殘飄濡且甚願新其土木之制惟清喜而可其語先是單于府以惟清有美化狀其政績請護軍駱忠表聞于上有詔命中書舍人高公釴文事其刻于碑詔既至而未有碑石惟清方命使采石于云中郡未還及修衛公廟鏟其西得一石方而長其下有刻出張字歷然可辨工人持以獻惟清惟清喜曰天賜吾之碑石即召從事視之立且驚且異因起賀而白前夢于是以石為碑刻高公之文焉王璠太和中王璠廉問丹陽因溝其城既鑿深數尺得一石銘文曰山有石石有玉玉有瑕即休也工人得之具以事告白獻于璠詳其義久而不能解即命僚左辨之皆無能析其理者數日有一吏請謁璠之吏且密謂曰吾聞王公得石銘今有辨者乎吏曰公方念之其義為何如君豈即能究耶叟曰是不祥也夫山有石石有玉玉有瑕即休也皆敘王公之世也且公之先曰崟崟生礎以文而觀是山有石也礎生璠是石有玉也璠之子曰瑕休是玉有瑕即休休者絶之兆推是而辨其絶緒乎吏謝之叟言竟而去至大和九年冬璠卒夷其宗果符叟之解也柳光太和中有柳光者嘗南游因行山道會日晚誤入山崦中松引盤曲行數里至一石室云水環擁清泉交貫室有茵榻若人居者前對霞翠固非人境光因臨流凝佇忽見一缶合于地光即趨之其缶下有泉周不盡尺其水清激舉卮以飲若甘醴盡十余卮而已醉甚遂偃于榻及曉方寤因祝石壁有雕刻文字極多遂寫其字置於袖詞曰武之在卯堯王八季我棄其寢我去其扆深深然高高然人不吾知又不吾謂由今之后二百餘祀焰焰其光和和其始東方有兔小首元尾經過吾道來至吾里飲吾泉以醉登吾榻而寐刻乎其壁奧乎其義人誰辨其東平子光先閲閲而異之遂行出徑數十步回望其室盡亡見矣光究之不得有呂生者視而解之未幾告曰吾盡詳矣此乃得道者語也夫唐氏之初建號武德武之二年其歲己卯則武之在卯其義見矣蓋武德二年也堯王者謂高祖之號神堯曰八季者亦二年也我棄其寢我去扆者言其去蓋絶去之時乃武德二年也深深然高高然人不吾知人不吾謂者言其隱而人不知也由今之后二百餘祀者言君者來也且唐氏之初今果二百餘矣焰焰其光和和其始者焰焰其光謂歲在丁未也焰者火豈非南方之丙丁之謂乎未亦火之位也和和其始謂今天子建號曰太和其始蓋元年也東方有兔小首元尾者敘君之名氏東方甲乙木也兔者卯也卯以附木是柳字也小首元尾是光也經吾道來吾里言君之來也飲吾泉以醉登吾榻而寐言君之止也刻乎其壁奧乎其義誰人以辨其東平子謂其義奧而隱獨吾能辨之東平吾之邑也即又信矣如是而辨果得道者之遺記也李福洛京北邙太清觀鐘樓唐咸通年中忽然摧塌有屋檁一條其中空虛每撐動觸動轉內敲磕有聲人遂相傳來競觀之道士李威儀不欲聚人乃令破之于其間得一黑漆板上有陷金之字曰山水誰無言元年遇福重修道士繼呈洛中諸官皆不能詳文李福相公罷鎮西川歸洛見此隱文反復詳讀數四遂謂觀主曰但請度工鳩徒當以俸余之金獨立完葺也百年之前智者勒其志已冥合今日安得不重興觀宇乎洎觀成或請其由福曰山水誰無言者今上御名也元年遇福者改元之初作鎮獲俸而回福其不修復待何人者哉熊博熊博者本建安津吏岸崩得一古冢藤蔓纏其棺旁有石銘云欲陷不陷被藤縛欲落不落被沙閣五百年后遇熊博博時貧老僧為率錢葬之博后至建州刺史王敬之故鄴都之西北門曰芳林鄉齊村民王敬之編戶中尤貧者常以樵蘇為業丙午歲秋九月因掘一株銅雀台下其地欻然小陷隨而鍤之三尺許得一蒼石大如盆遂力索之石忽破為二若摧殼然中有蒼石匣長尺有咫厚三寸廣四寸敬之駭內諸畚中以歸潔之以水則溫潤昭爛真奇寶也四旁及背引起龍驤鳳翥及花葩之狀雕鏤奇詭殆非人工徐啓之中有白玉板上刻大篆六行文曰上土巴灰除虛除伊尹東北八九余秦趙多應分五玉白絲竹木子世世居但看六六百中外世主留難如國如于是敬之持以獻魏帥樂彥真彥真繼以束帛而蠲其地征焉亦無能洞達其隱詞者噫當曹氏石氏高氏之代斯則鄴之王氣休運所鐘于是諸賢衆矣焉知不有陰睹後代總括風云幅裂山河之事而瘞玉以讖之今石既出其事將兆矣王承檢王蜀秦州節度使王承檢筑防蕃城至上邽山下獲瓦棺內無尸唯有一片舌肉色紅潤堅如鐵石其舌上只有一髑髏中有一古錢有二蠅振然飛去片石刻篆字曰大隋開皇二年渭州刺史游崇妻夫人王氏年二十五嫁于崇三年而娠惡其妊娠遂卒銘曰車道之北邽山之陽深深葬玉郁郁埋香刻斯貞石煥乎遺芳地變陵谷嶮列城隍乾德丙年壞者合郎是歲僞乾德六年丙子歲也言壞者合郎即王承檢小字也
