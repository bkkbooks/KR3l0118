body:
  text: 僧惠祥僧惠祥東晉義熙初金陵長干寺僧惠祥與法向連堂而居夜四更中惠祥遙喚向暫來向往視祥祥仰眠交手胸胸原作腦據明鈔本改上云可解我手足繩向曰並無繩也惠祥因得轉動云適有人衆縛我手足鞭箠交下問何故齧虱又語祥云若更不止當入於兩山間磕之祥自後戒於齧虱焉出三教珠英阿育王像長沙寺有阿育王像相傳是阿育王女所造太元中夜浮至江津漁人見異光如晝而諸寺以千人迎之嶷然不動長沙寺翼法師者操行精苦乃率十僧至誠祈啓即時就輦至齊末像常夜行不知者以槊刺之作銅聲而倒每南朝大事及災役必先流汗數日自像教已來最為靈應也出渚宮遺事王淮之宋王淮之字元曾琅琊人也世尚儒業不信佛法常謂身神俱滅寧有三世耶元嘉中為丹陽令十年得病絶氣少時還復暫蘇時建康令賀道力省疾適會下剻淮之語道力曰始知釋教不虛人死神存信有徵矣道力曰明府生平置論不爾今何見而乃異之耶淮之斂眉答云神實不盡佛教不得不信語訖而終出冥祥記惠凝元魏時洛中崇真寺有比丘惠凝死七日還活云閻羅王檢閲以錯名放免惠凝具説過去之事有比丘五人同閲一比丘云寶明寺智聖以坐禪苦行得升天堂有一比丘是般若寺道品以誦涅槃經四十卷亦升天堂有一比丘云是融覺寺曇謨最講涅槃華嚴領衆千人閻羅王曰講經者心懷彼我以驕凌物比丘中第一粗行今唯試坐禪誦經不問講經其曇謨最曰貧身立道已來唯好講經實不諳誦閻羅王令付司即有青衣十人送曇謨最向西北門屋舍皆黑似非好處有一比丘云是禪林寺道弘自云教化四輩檀越造一切經人中像十軀閻羅王曰沙門之體必須攝心守道志在禪誦不干世事不作有為雖造作經像正欲得他人財物既得財物貪心既起明鈔本陳校本既起作即起下又有既懷貪心四字便是三毒不出具足煩惱亦付司仍與曇謨最同入黑門有一比丘云是靈覺寺寶明自云出家之先常常原作帝據明鈔本陳校本改作隴西太守造靈覺寺成即棄官入道雖不禪誦禮拜不缺閻羅王曰卿作太守之日曲理枉法假奪民財假作此寺非卿之力何勞説此亦付青衣送入黑門時魏太后聞之遣黃門侍郎徐紇依惠凝所説即訪寶明等寺城東有寶明寺城中有般若寺城西有融覺禪林靈覺等三寺並問智聖道品曇謨最道弘寶明等皆實有之即請坐禪僧一百人常在殿中供養之詔不聽持經像在巷路乞索若私用財物造經像者任意惠凝亦入白鹿山隱居修道自此以後京邑之比丘皆事禪誦不復以講經為意出洛陽記靈隱寺高齊初沙門寶公者嵩山高棲士也且從林慮向白鹿山因迷失道日將禺中忽聞鐘聲尋嚮而進巖岫重阻登陟而趨乃見一寺獨據深林山門正南赫奕輝煥前至門所看額靈隱寺門外五六犬其犬如牛白毛黑喙或踴或臥眸眄寶寶怖將返須臾見胡僧外來寶喚不應亦不顧直入門內犬亦隨之良久寶見人漸次入門屋宇四周門房並閉進至講堂唯見剻榻高座儼然寶入西南隅剻上坐久之忽聞東間有聲仰視見開孔如井大比丘前後從孔飛下遂至五六十人依位坐乞自相借問今日齋時何處食來或言豫章成都長安隴右薊北嶺南五天竺等無處不至動即千萬餘里末後一僧從空而下諸人競問來何太遲答曰今日相州城東彼岸寺鑒禪師講會各各居義有一後生聰俊難問詞音鋒起殊為可觀不覺遂晚寶本事鑒為和尚既聞此語望得參話因整衣而起白諸僧曰鑒是寶和尚諸僧直視寶頃之已失靈隱寺所在矣寶但獨坐於柞木之上一無所見唯覩巖谷禽鳥翔集喧亂及出山以問於尚統法師法師曰此寺石趙時佛圖澄法師所造者年歲久遠賢聖居之非凡所住或沈或隱遷徙無定今山行者猶聞鐘聲焉出侯君素旌異記侯慶宋南陽人侯慶有銅像一軀可高尺餘慶有牛一頭擬貨為金色遇有急事遂以牛與他用之經二年慶妻馬氏忽夢此像謂之曰卿夫婦負我金色久而不償今取卿兒醜多以充金色馬氏寤覺而心不安至曉醜多得病而亡慶年五十餘唯有一子悲哀之聲感於行路醜多亡日像忽自有金色光照四里之內咸聞香氣道俗長幼皆來觀矚焉出法苑珠林大業客僧隋大業中有客僧行至泰山廟求寄宿廟令曰此無別舍唯神廟廡下可宿然而來此寄宿者輒死僧曰無苦也不得已從之為設剻於廡下僧至夜端坐誦經可一更聞屋中環佩聲須臾神出為僧禮拜僧曰聞此宿者多死豈檀越害之耶願見護之神曰遇死者將至聞弟子聲因自懼死非殺之也願師無慮僧因延坐談説如食頃時因問神曰聞世人傳説云泰山治鬼寧有之耶神曰弟子薄福有之豈欲見先亡者乎僧曰有兩同學僧先死願見之神問其名曰一人已生人間一人在獄罪重不可喚來師就見可也僧聞甚悅因起出不遠而至一所見獄火光焰甚盛神將僧入一院遙見一人在火中號呼不能言形變不復可識而血肉焦臭令人傷心師不欲歷觀愍然求出俄而至廟又與神坐因問欲救同學有得理耶神曰可能有為寫法華經者便應得脫既而將曙神辭僧入堂旦而廟令視僧不死怪異之僧因為説仍即時為寫法華經一部經既成莊嚴畢又將經就廟宿其夜神出如初歡喜禮拜慰問來意以事告之神曰弟子知之師為寫經始書題目彼以脫免令出生在人間也然此處不潔不可安經願師還為彼送向在寺中言語久之將曉辭訣而去出冥報記蛤像隋帝嗜蛤所食必兼蛤味逾數千萬矣忽有一蛤椎擊如舊帝異之安置幾上乙夜有光及明肉自脫中有一佛二菩薩像帝悲悔誓不食蛤出酉陽雜俎一説唐文宗皇帝好食蛤蜊一日左右方盈盤而進中有劈之不原無不字據陳校補裂者文宗疑其異即焚香祝之俄頃之間其蛤自開中有二人形貌端秀體質悉備螺髻瓔珞足履菡萏謂之菩薩文宗遂置金粟檀香合以玉屑覆之賜興善寺令致敬禮至會昌中毀佛像遂不知所在出杜陽雜編光明寺洛陽宜壽里有苞信縣令段暉宅地下常聞鐘聲時見五色光明照於堂宇暉甚異之遂掘地得金像一軀可高三尺並有二菩薩趺上銘云晉泰始二年五月十五日侍中中書監荀勗造暉遂舍宅為光明寺咸云此是荀勗故宅其後盜者欲竊此像像與菩薩合聲喝賊盜者驚怖即時殞倒衆僧聞像叫聲遂擒之出洛陽伽藍記十光佛興福寺西北隅有隋朝佛堂其壁有畫十光佛者筆勢甚妙為天下之摽冠有識者云此國手蔡生之迹也蔡生隋朝以善畫聞初建堂宇既成有僧以百金募善畫者得蔡生既畫謂人曰吾平生所畫多矣獨今日下筆若有鬼神翼而成者由是長安中盡傳其名貞觀初寺僧以此堂年月稍久慮一旦有摧圯遂召數工及土木之費且欲新其製忽一日群僧齋於寺庭既坐有僧十人俱白皙清瘦貌甚古相次而來列於席食畢偕起入佛堂中群僧亦繼其後俄而十人忽亡所見群僧相顧驚歎者久之因視北壁十光佛見其風度與向者十人果同自是僧不敢毀其堂且用旌十光之易也出宣室志李大安唐隴西李大安工部尚書大亮之兄也武德中大亮任越州總管大安自京往省之大亮遣奴婢數人從兄歸至穀州鹿橋宿於逆旅其奴有謀殺大安者候大安眠熟夜已過半奴以小劍刺大安項洞之刃著於剻奴因不拔而逃大安驚覺呼奴其不叛者奴婢欲拔刃大安曰拔刃便死可先取紙筆作書書畢縣官亦至因為拔刃洗瘡加藥大安遂絶忽如夢者見一物長尺餘闊厚四五寸形似豬肉去地二尺許從戶入來至剻前其中有語曰急還我豬肉大安曰我不食豬肉緣何負汝耶聞戶外有言曰錯也此物即還從戶出大安仍見庭前有池水清淺可愛池西岸上有金像可高五寸須臾漸大俄化為僧披袈裟甚新淨語大安曰被傷耶我今為汝痛將去汝當平復還家念佛修善也因以手摩大安頸瘡而去大安視其形狀見僧有紅繒補袈裟可方寸許甚分明既而大安覺遂蘇而瘡亦不復痛能起坐食數十日京宅子弟迎至家家人親故來視大安為説被傷由狀及見像之事有一婢在旁聞説因言大安之初行也安妻使婢請匠工為造一佛初成以綵畫其衣有一點朱污像之背上當令工去之不肯今仍在形狀如郎君所説大安因與妻及家人共起觀相乃同所見無異其背點朱宛然補處於是歎異信知聖教不虛遂加崇信焉出冥報記韋知十唐右金吾衛曹京兆韋知十於永徽中煮一羊腳半日猶生知十怒家人曰用柴十倍於常不知何意如此知十更命重煮還復如故乃命割之其中遂得一銅像長徑寸焉光明照灼相好成就其家自此放生不敢食酒肉出冥報記劉公信妻唐龍朔三年長安城內通軌坊三衛劉公信妻陳氏母先亡陳因患暴死見人將入地獄備見諸苦不可具述末後見一地獄石門牢固有兩大鬼形容偉壯守門左右怒目瞋陳曰汝是何人到此見石門忽開亡母在中受苦不可具述受苦稍歇母子近門相見母語女言汝還努力為吾寫經女云娘欲寫何經母曰為吾寫法華經言訖石門便閉陳還得蘇具向夫説即憑妹夫趙師子欲寫法華經其師子舊解寫經有一經生將一部新寫法華經未裝潢者轉向趙師子處質錢且云經主姓范師子許乃與婦婦原作父據下文義改兄云今既待待原作得據法苑珠林五七改經在家幸有此一部法華兄贖取此經可否陳夫從之裝潢既訖授與其妻在家為母供養後夢見母從女索經云吾先遣汝為吾寫一部法華何因迄今不得女報母言已為為原作得據明鈔本陳校本改娘贖得一部法華見裝潢了在家供養母語女言止為此經吾轉受苦冥道中獄卒打吾脊破汝看吾身瘡獄官語云汝何因取他范家經將為己經汝有何福大是罪過女見母説如此更為母引寫法華其經未了女夢中復見母來催經即見一僧手捉一卷法華語母云汝女已為汝寫經第一卷了功德已成何須急急後寫經成母來報女因汝為吾寫經今已得出冥途好處受生得汝恩力故來報汝汝當好住善為婦禮信心為本言訖悲淚共別後問前贖法華經主果是姓苑出法苑珠林
