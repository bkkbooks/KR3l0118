body:
  text: 張子房張子房名良韓國人也避地於南陽徙居於沛後為沛國人焉童幼時過下邳圯橋風雪方甚遇一老叟著烏巾黃單衣墜履於橋下目子房曰孺子為我取之子房無倦色下橋取履以進老叟引足以納之子房神意愈恭叟笑曰孺子可教也明旦來此當有所教子房昧爽至叟已在矣曰期而後至未可傳道如是者三子房先至亦無倦怠老叟喜以書授之曰讀此當為帝王師若復求吾乃穀城山下黃石也子房讀其書能應機權變佐漢祖定天下後人謂其書為黃石公書修之於身能煉氣絕力輕身羽化與綺里季東園公甪里先生夏黃公為雲霞之交漢初遇四五小兒路上群戲一兒曰著青裙入天門揖金母拜木公時人莫知之子房知之往拜之曰此東王公之玉童也所謂金母者西王母也木公者東王公也此二元尊乃陰陽之父母天地之本源化生萬靈育養群品木公為男仙之主金母為女仙之宗長生飛化之士昇天之初先覲金母後謁木公然後昇三清朝太上矣此歌乃玉童教世人拜王公而揖王母也子房佐漢封留侯為大司徒解形於世葬於龍首原赤眉之亂人發其墓但見黃石枕化而飛去若流星焉不見其尸形衣冠得素書一篇及兵略數章子房登仙位為太玄童子常從老君於太清之中其孫道陵得道朝崑崙之夕子房往焉出仙傳拾遺東方朔小名曼倩父張氏名夷字少平母田氏夷年二百歲顏若童子朔出三日而田氏死死時漢景帝三年也鄰母拾朔養之時東方始明因以姓焉年三歲天下秘識一覽暗誦於口恒指揮天上空中獨語鄰母忽失朔累月暫歸母笞之後復去經年乃歸母見之大驚曰汝行經年一歸何以慰吾朔曰兒暫之紫泥之海有紫水污衣仍過虞泉湔浣朝發中還何言經年乎母又問曰汝悉經何國朔曰兒湔衣竟暫息冥都崇臺一寤眠王公啗兒以丹栗霞漿兒食之既多飽悶幾死乃飲玄天黃露半合即醒還遇一蒼虎息於路初兒騎虎而還打捶過痛虎囓兒腳傷母便悲嗟乃裂青布裳裹之朔復去家萬里見一枯樹脫布掛樹布化為龍因名其地為布龍澤朔以元封中遊鴻濛之澤忽遇母採桑於白海之濱俄而有黃眉翁指母以語朔曰昔為我妻託形為太白之精今汝亦此星之精也吾卻食吞氣已九十餘年目中童子皆有青光能見幽隱之物三千年一返骨洗髓二千年一剝皮伐毛吾生來已三洗髓五伐毛矣朔既長仕漢武帝為太中大夫武帝暮年好仙術與朔狎暱一日謂朔曰朕欲使愛幸者不老可乎朔曰臣能之帝曰服何藥曰東北地有芝草西南有春生之魚帝曰何知之曰三足烏欲下地食此草羲和以手掩烏目不許下畏其食此草也鳥獸食此即美悶不能動問曰子何知之朔曰小兒時掘井陷落井下數十年無所託有人引臣往取此草乃隔紅泉不得渡其人與臣一隻履臣乃乘履泛泉得而食之其國人皆織珠玉為簟要臣入雲韍之幕設玄珉雕枕刻鏤為日月雲雷之狀亦曰鏤空枕亦曰玄雕枕又薦毫之珍褥以百之毫織為褥此毫褥而冷常以夏日舒之因名柔毫水藻之褥臣舉手拭之恐水濕席定視乃光也其後武帝寢於靈光殿召朔於青綺窗綈紈幕下問朔曰漢年運火德統以何精何瑞為祥朔對曰臣嘗游昊然之墟在長安之東過扶桑七萬里有雲山山頂有井雲從井中出若土德則黃雲火德則赤雲金德則白雲水德則黑雲帝深信之太初二年朔從西那邪國還得聲風木十枝以獻帝長九尺大如指此木出因洹之水則禹貢所謂因桓是來即其源也出甜波上有紫燕黃鵠集其間實如細珠風吹珠如玉聲因以為名帝以枝遍賜群臣年百歲者頒賜此人有疾枝則有汗將死者枝則折昔老聃在周二千七百年此枝未汗洪崖先生堯時年已三千歲此枝亦未一折帝乃賜朔朔曰臣見此枝三遍枯死死而復生何翅汗折而已語曰年末年枝忽汗明鈔本末作未忽作勿御覽卷九五三引洞冥記作年未半枝不汗此木五千歲一濕萬歲一枯也帝以為然又天漢二年帝升蒼龍館思仙術召諸方士言遠國遐鄉之事唯朔下席操筆䟽曰臣游北極至鏡火山日月所不照有龍銜火以照山四極亦有園囿池苑皆植異草木有明莖草如金燈折為燭照見鬼物形仙人甯封嘗以此草然於於原作為據明鈔本改夜朝見腹內外有光亦名洞腹草帝剉此草為蘇以塗明雲之觀夜坐此觀即不加燭亦名照魅草採以籍足則入水不沉朔又嘗東遊吉雲之地得神馬一匹高九尺帝問朔何獸曰王母乘雲光輦以適東王公之舍稅此馬於芝田東王公怒棄此馬於清津天岸臣至王公壇因騎而反遶日三匝此馬入漢關關門猶未掩臣於馬上睡不覺還至帝曰其名云何朔曰因事為名名步景駒朔曰自馭之如駑馬蹇驢耳朔曰臣有吉雲草千頃種於九景山東二千年一花明年應生臣走往刈之以秣馬馬立不饑朔曰臣至東極過吉雲之澤帝曰何為吉雲曰其國常以雲氣占凶吉若有喜慶之事則滿室雲起五色照人著於草樹皆成五色露露味皆甘帝曰吉雲五露可得否曰臣負吉雲草以備馬此立可得日可三二往乃東走至夕而還得玄白青黃露盛以青琉璃各受五合授帝帝徧賜群臣其得之者老者皆少疾者皆除也又武帝常見彗星朔折指星木以授帝帝指彗星應時星沒時人莫之測也朔又善嘯每曼聲長嘯輒塵落漫飛朔未死時謂同舍郎曰天下人無能知朔知朔者唯太王公耳朔卒後武帝得此語即召太王公問之曰爾知東方朔乎公對曰不知公何所能曰頗善星歷帝問諸星皆具在否曰諸星具獨不見歲星十八年今復見耳帝仰天歎曰東方朔生在朕旁十八年而不知是歲星哉慘然不樂其餘事跡多散在別卷此不備載出洞冥記及朔別傳王喬河東人也漢顯宗時為葉令有神術每月朔望常詣京朝帝怪其來數而不見車騎密令太史伺望之言臨至必有雙鳧從東南飛來於是候鳧至舉羅張之但得一舄焉乃四年時所賜尚書官屬履也每當朝時葉縣門下鼓不擊自鳴聞於京師後天忽下玉棺於庭前吏人推排終不搖動喬曰天帝欲召我耶乃沐浴服餌臥棺中蓋便立復宿昔乃葬城東土自成墳其夕縣中牛羊皆流汗喘乏人莫知之百姓為立廟號葉君祠禱無不應遠近尊崇帝詔迎取其鼓置都亭下略無復聲或云即古仙人王喬也示變化之跡於世耳出仙傳拾遺周隱遙洞庭山道士自云甪里先生之孫山上有其祖甪里廟甪里村言其數世得道嘗居焦山中學太陰鍊形之道死於崖窟中囑其弟子曰檢視我屍勿令他物所犯六年後若再生當以衣裳衣我弟子視之初則臭穢蟲壞唯五臟不變依言閉護之至六年往看乃身全卻生弟子備湯沐以新衣衣之髮鬒而黑髭麤而直若獸鬣也十六年又死如前更七年復生如此三度已四十年餘近八十歲狀貌如三十許人隋煬帝聞之徵至東郡頒賜豐厚恩禮隆異而懇乞歸山尋還本郡真觀中召至長安於內殿安置問修習之道對曰臣所修者匹夫之志功不及物利唯一身帝王修道一言之利萬國蒙福得道之效速於人臣區區所學非九重萬乘之所修也懇求歸山尋亦隨其所適出仙傳拾遺劉商劉商者中山靖王之後舉孝廉歷官合淝令而篤好無為清簡之道方術服鍊之門五金八石所難致者必力而求之人有方疏未合鍊施效者必資其藥石給其鑪鼎助使成之未嘗有所覬覦也因泛舟苕霅間遂卜居武康上強山下有樵童藥叟雖常草木之藥詣門而售者亦答以善价一旦樵夫鬻樵有朮一把商亦厚價致之其庭廡之下籬落之間草木諸藥已堆積矣忽閑步杖策逍遙田畝蹊隧之傍聊自怡適聞藂林間有人相與言曰中山劉商今日已賜真朮矣蓋陰功篤好之所感乎窺林中杳無人跡奔歸取朮修而服之月餘齒髮益盛貌如嬰童舉步輕速可及馳馬登涉雲巖無復困憊又月餘坐知四方之事驗若符契乃入上彊洞中咸通初有酒家以樵叟稍異盡禮接之累月復一至因謂酒家曰我山中劉商也夙攻水墨願留一圖以酬見待之厚使備繒素而約以再來一日果至酒家援毫運思頃刻而千山萬水非世工之所及將去謂酒家曰我祖淮南王今為九海總司居列真之任授我以南溟都水之秩旬日遠別不復來矣如是十許日天色晴霽香風瑞雲彌布山谷樵者見空中騎乘飛舉南去出仙傳拾遺
