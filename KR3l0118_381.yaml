body:
  text: 趙文若趙文若隋大業中雍州長安縣人趙文若死經七日家人大殮將欲入棺乃縮一腳家人懼怕不敢入棺文若得活眷屬喜問所由文若云初有人引至王所王問汝生存之時作何福業文若答王受持金剛般若經王歎云善哉此福第一汝雖福善且將示汝其受罪之處令人一引文若北行十步至一牆孔令文若入隔壁有人引手從孔中捉文若頭引出極大辛苦得度牆外見大地獄鑊湯苦具罪人受苦不可具述乃有衆多豬羊雞鴨之屬竟來從文若債命文若云吾不食汝身何故見逼諸畜生云汝往時某處食我頭腳四肢節節分張人各飲啖何諱之文若一心念佛深悔諸罪不出余言求為修福報謝諸畜各散使人將文若卻至王所王付一碗釘令文若食之并用五釘釘文若頭頂及手足然后放回文若得蘇其説此事然患頭痛及手足久后修福痛漸得差后爾已來精勤誦持金剛般若經不敢遺漏寸陰但見道俗親疏并勸受持后因使至一驛廳上暫時偃息於時夢見一青衣婦女急來乞命文若驚寤即喚驛長問曰汝為吾欲殺生不驛長答云實為公欲殺一小羊文若問云其羊做何色答云是青牸羊文若報云汝急放卻吾與價直贖取放之良由般若威力冥資感應也孔恪唐武德中遂州總管府記室參軍孔恪暴病死一日而蘇自説被收至官所問何故殺牛兩頭恪云不殺官曰汝弟證汝殺何故不承因呼恪弟死已數年矣既至枷械甚嚴官問汝所言兄殺牛虛實弟曰兄前奉使招慰獠賊使某殺牛會之實奉兄命非自殺也恪曰使弟殺牛會是實然國事也恪有何罪官曰汝殺牛會獠以招慰為功用求官賞以為己利何為國事也因謂恪弟曰汝以證兄故久留汝兄既遣殺汝便無罪放任受生言訖弟忽不見亦竟不得言敘官又問恪因何復殺兩鴨恪曰前任縣令殺鴨供客豈恪罪也官曰客自有料殺鴨供之將求美譽非罪而何又問何故殺雞卵六枚曰平生不食雞卵唯憶九歲時寒食日母與六枚因煮食之官曰然欲推罪母也恪曰不敢但説其因耳官曰汝殺他命當自受之言訖忽有數十人來執恪將出去恪大呼曰官府亦大枉濫官聞之呼還曰何枉濫恪曰生來有罪皆不遺生來修福皆不見記者豈非濫耶官問主司恪有何福何為不録主司對曰福亦皆録量罪多少若福多罪少先令受福罪多福少先令受罪然恪福少罪多故未論其福官怒曰雖先受罪何不唱福示之命鞭主司一百倏忽鞭訖血流濺地既而唱恪生來所修之福亦無遺者官謂恪曰汝應先受罪我更令汝歸七日可勤追福因遣人送出遂蘇恪大集僧尼行道懺悔精勤苦行自説其事至七日家人辭訣俄而命終也霍有鄰開元末霍有鄰為汲縣尉在州直刺吏刺史段崇簡嚴酷會察長之日中后索羊腎有鄰催促屠者遑遽未及殺羊破肋取腎其夕有鄰見吏曰王追有鄰隨吏見王王云有訴君云不待殺了生取其腎何至如是耶有鄰對曰此是段使君殺羊初不由己王令取崇簡食料為閲畢謂羊曰汝實合供段使君食何得妄訴霍少府驅之使出令本追吏送歸有鄰還經一院云御史大夫院有鄰問吏此是何官乎吏云百司并是何但於此復問大夫為誰曰秋仁杰也有鄰云狄公是亡舅欲得一見吏令門者為通須臾召入仁杰起立見有鄰悲哭畢問汝得放還耶呼令上坐有佐史過案仁杰問是何案云李適之得宰相又問天曹判未對曰諸司并了已給五年仁杰判紙余方畢回謂有鄰汝來多時屋室已壞令左右取兩丸藥與之持歸可研成粉隨壞摩之有鄰拜辭訖出門十余里至一大坑為吏推落遂活時炎暑有鄰死經七日方活心雖微暖而形體多壞以手中藥作粉摩所壞處隨藥便愈數日能起崇簡占見問其事嗟歎久之后月余李適之果拜相皇甫恂安定皇甫恂以開元中初為相州參軍有疾暴卒數食頃而蘇刺史獨孤思莊好名士也聞其重生親至恂所問其冥中所見云甚了了但苦力微稍待徐説之頃者恂初至官嘗攝司功有開元寺主僧送牛肉二十斤初亦不了其故但受而食之適而被追乃是為僧所引既見判官判官問何故殺牛恂云生來蔬食不曾犯此判官令呼僧俄而僧負枷至謂恂曰已殺與君君實不知所以相引欲求為追福耳因白判官殺牛己自當之但欲與參軍有言判官曰唯僧乃至恂所謂恂曰君后至同州判司為我造阤羅尼幢恂問相州參軍何由得同州掾官且余甚貧幢不易造如何僧云若不至同州則已必得之幸不忘所托然我辨伏今便受罪及君得同州我罪亦畢當托生為豬君造幢之后必應設齋慶度其時會有所睹恂乃許之尋見牛頭人以股叉叉其頸去恂得放還思莊素與僧善召而謂之僧甚悲懼因敬其私財為功德后五日患頭痛尋生三癰如叉之狀數日死恂自相州參軍遷左武衛兵曹參軍數載選受同州司士既至舉官錢百千建幢設齋有小豬來師前跪伏齋畢繞幢行道數百轉乃死裴齡開元中長安縣尉裴齡常暴疾數日至正月十五日夜二更后堂前忽見二黃衫吏持牒云王追齡辭已疾病呼家人取馬久之不得乃隨吏去見街中燈火甚盛吏出門行十余里煙火乃絶唯一徑在衰草中可行五十里至一城牆壁盡黑無諸樹木忽逢白衣居士狀貌瑰偉謂二吏曰此人無罪何故追來顧視齡曰君知死未齡因流涕合掌白居士生不曾作罪業至此今為之奈何求見料理居士謂吏曰此人衣冠且又無過不宜去其巾帶吏乃還之因復入城數里之間見朱門爽麗奇樹郁茂前謂一官云是主簿主簿遣領付典勘其罪福典云君無大罪理未合來齡便苦請救助檢案云殺一驢所以追耳然其驢執是市吏殺君第不承事當必釋須臾王坐主簿引齡入王問何故追此人主簿云市吏便引適以詰問云實求腸不遣殺驢言訖見市吏枷項在前有驢羊雞豕數十輩隨其后王問市吏何引此人驢便前云實為市吏所殺將肉賣與行人不關裴少府事市吏欲言其他羊豕等各如所執王言此人尚有數政官祿不可久留宜速放去若更遲延恐形骸隳壞因謂齡曰令放君回當萬計修福齡再拜出王復令呼謂主簿可領此人觀諸地獄主簿令引齡前行入小孔中見牛頭卒以叉刺人隨業受罪齡不肯觀出小孔辭主簿畢復往別吏吏云我本戶部令史一人曰我本京兆府史久在地府求生人間不得君可為寫金光明經法華維摩涅痏等經兼為設齋度我即得生人間齡悉許之吏復求金銀錢各三千貫齡云京官貧窮實不能辦吏云金錢耳是世間黃紙錢銀錢者白紙錢耳齡曰若求紙錢當亦可辦不知何所送之吏云世作錢於都市其錢多為地府所收君可呼鑿錢人於家中密室作之畢可以袋盛當於水際焚之我必得也受錢之時若橫風動灰即是我得若有風揚灰即為地府及地鬼神所受此亦宜為常占然鬼神常苦飢燒錢之時可兼設少佳酒飯以兩束草立席上我得映草而坐亦得食也辭訖行數里至舍見家人哭泣因爾覺痛遍身恍惚迷悶久之開視遂活造經像及燒錢畢十數日平復如常六合縣丞六合縣丞者開元中暴卒數日即蘇云初死被拘見判官云是六合劉明府相見悲喜問家安否丞云家中去此甚邇不曾還耶令云冥陽道殊何由得往丞云郎君早擢第家甚無橫但夫人年老微有風疾耳令云君算未盡為數羊相訟所以被追宜自剖析當為速返須臾有黑云從東來云中有大船轟然墜地見羊頭四枚判官云何以枉殺此輩答云刺史正料非某之罪二頭寂然判官罵云汝自負刺史命何得更訟縣丞船遂飛去羊大言云判官有情會當見帝論之判官謂丞曰帝是天帝也此輩何由得見如地上天子百姓求見不亦難乎然終須為作功德爾言畢放丞還既出見一女子狀貌端麗來前再拜問其故曰身是揚州談家女頃被召至以無罪蒙放回門吏以色美曲相留連離家已久恐舍宅頽壞今君得還幸見料理我家素富若得隨行當奉千貫兼永為姬妾無所吝也以此求哀丞入白判官判官謂丞曰千貫我得二百我子得二百余六百屬君因為書示之判官云我二百可為功德便呼吏問何得勾留談家女子決吏二十遣女子隨丞還行十余里分路各活丞既痊平便至談家訪女至門女聞語聲遽出再拜辭曰嘗許為妾身不由己父母遣適他人今將二百千贖身余一千貫如前契丞得錢與劉明府子兼為設齋功德等天寶末其人尚在焉薛濤江陵尉薛濤以乾元中死三日活自言初逢一吏持帖云王使追押帖作祜字濤未審是何王馬便去行可十余里至一城其吏排闥便入廳中一人羽衛如王者濤入再拜王問君是荊州吏耶濤曰是王曰罪何多也今訴君者不可勝數對曰往任成固縣尉成固主進鷹鷂濤典其事不得不殺殺多誠有之王曰殺有私乎曰亦有之公私孰多曰私少于公王曰誠之然君祿福有厚壽命未已彼亦無如君何不得不追對耳令濤出門遍謝諸命濤至見雉兔等遍滿數頃皆飛走逼濤濤云天子按鷹鷂非我所為觀君輩意旨盡欲殺我其何故也適奉命為君寫經像使皆託生何必衆人殺一命也王又令人傳語久之稍稍引去濤入王謂之曰君算未盡故特為君計還宜作功德以自贖耳濤再拜數四王問君讀書否曰頗常讀之又問知晉朝有羊祜否曰知之王曰即我是也我昔在荊州曾為刺史卒官舍故見君江陵之吏增依依耳言訖辭出命所追之吏送之歸舍遂活趙裴明經趙裴貞元中選授巴州清化縣失志成疾惡明不飲食四十余日忽覺室中雷鳴頃有赤氣如鼓輪轉至床騰空上當心而住初覺精神遊散奄如夢中有朱衣平幘者引之東行出山斷處有水東西流久立視之又東行一橋飾以金碧過北入一城至曹司中人吏甚衆見妹壻賈奕與己爭殺牛事疑是冥司遽逃避至一壁間牆如石黑高數丈廳有呵喝聲朱衣者遂領入大院吏通曰司命過人復見賈奕因與辨對奕固執之無以自明忽有巨鏡徑丈虛懸空中仰視之宛見賈奕鼓刀業負明有不忍之色奕始伏罪朱衣人又引至司入院一人褐帔紫霞冠狀如尊像責曰何故竊他袱頭二事在滑州市隱橡子三升因拜之無數朱衣復引出謂曰能遊上清乎乃共登一山下臨流水其水懸注騰沫人隨流而入者千萬不覺身亦隨流良久住大石上有青白暈道朱衣者變成兩人一導之一促之乃升石崖上立坦然無塵行數里旁有草如紅蘭莖葉密無刺其花拂拂然飛散空中又有草如苣附地亦飛花初出如馬勃破大如疊赤黃色過此見火如山橫亙天候焰絶乃前至大城城上重譙街列果樹仙子為伍迭謠鼓樂仙姿絶世凡歷三重門舟艨交煥其地及壁澄光可鑒上不見天若有絳暈都復之正殿三重悉列尊像見道士一人如舊相識趙求為弟子不許諸樂中有如琴者長四尺九弦近頭尺余方廣中有兩道橫以變聲又一如酒榼三弦長三尺腹面上廣下狹背丰隆項有過録乃引出闕南一院中有絳冠紫帔命與二朱衣人坐廳事乃命先過戊申録録如人間辭狀首冠人生辰次言姓名年紀下注生月日別行橫布六旬甲子所有功德日下具之如無即無字趙自視其録姓名生辰日月一無差也過録者數盈億兆朱衣人言每六十年天下人一過録以考校善惡增算也朱衣者引出北門至向路執手別曰遊此是子之魂可尋此行勿反顧當達家矣依其言行稍急蹶倒如夢覺死已七日矣趙著魂遊上清記敘事甚該悉鄧成鄧成者豫章人也年二十余曾暴死所由領至地獄先過判官判官是刺史黃麟麟即成之表丈也見成悲喜具問家事成語之悉皆無恙成因求哀麟云我亦欲得汝歸傳語于我諸弟遂入白王既出曰已論放汝訖久之王召成問云汝在生作何罪業至有爾許冤對頭然算猶未盡當得復還無宜更作地獄冤也尋有畜生數十頭來噬成王謂曰鄧成已殺爾輩復殺鄧成無益之事我今放成卻回令為汝作功德皆使汝托生人間不亦善哉悉云不要功德但欲殺鄧成耳王言如此於汝何益殺鄧成汝亦不離畜生之身曷若受功德即改為人身也諸輩多有去者唯一驢頻來踏成一狗嚙其衣不肯去王苦救衛然后得免遂遣所追成吏送之出過麟麟謂成曰至喜莫過重生汝今得還深足欣慶吾雖為判官然日日恆受罪汝且住此少當見之俄有一牛頭卒持火來從麟頂上然至足麟成灰遂滅尋而復生悲涕良久謂成曰吾之受罪如是其可忍也汝歸可傳語弟努力為造功德令我得離此苦然非我本物雖為功德終不得之吾先將官料置得一莊子今將此造經佛即當得之或恐諸弟為恍惚不信汝言持吾玉簪還以示之因攏頭上簪與成麟前有一大水坑令成合眼推入坑中遂活其父母富於財憐其子重生數日之內造諸功德成既愈遂往黃氏為説麟所托以玉簪還之黃氏識簪舉家悲泣數日乃賣莊造經也張瑤東陽張瑤病死數日方活云被所由領過一府舍中有貴人儐從如王者瑤至庭內見其所殺衆生盡來對瑤曾殺一牛以布兩端與之追福其牛亦在中庭角戴兩布又曾供養病僧其僧亦來謂所司曰張瑤持金剛經滿三千遍功德已入骨又寫法華經一部福多罪少故未合死所司命稱之畜生盡起而瑤猶在地上所司取司命簿勘之一紫衣引黃衫吏抱黃簿至云張瑤名已掩了合死視簿有紙帖掩其名又命取太山簿頃之亦紫衣吏人引黃衫吏持簿至云張瑤掩了合死又命取閣內簿檢使者云名始掩半未合死王問瑤汝名兩處全掩一處掩半六分之內五分合死故不合復生以功德故放汝歸閻浮地勿復殺生命瑤入地獄遍見受罪火坑鑊湯無不見有僧曰汝勿復為罪遂即以印印其股曰將此為信既活印甚分明至今未滅
