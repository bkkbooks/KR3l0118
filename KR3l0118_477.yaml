body:
  text: 張景張景平陽人張景者以善射為本郡裨將景有女始十六七甚敏惠其父母愛之居以側室一夕女獨處其中寢未熟忽見軋其戶者俄見一人來被素衣貌充而肥自欹身于女之榻懼為盜默不敢顧白衣人又前迫以笑女益懼且慮為怪焉因叱曰君豈非盜乎不然是他類也白衣者笑曰東選吾心謂吾為盜且亦誤矣謂吾為他類不其甚乎且吾本齊人曹氏子也謂我美風儀子獨不知乎子雖拒我然猶寓子之舍耳言已遂偃于榻且寢焉女惡之不敢竊視逮將曉方去明夕又來女懼益甚又明日具事白于父父曰必是怪也即命一金錐貫縷于其末且利鋩以授女教曰魅至以此表焉是夕又來女強以言洽之魅果善語夜將半女密以錐倳其項其魅躍然大呼曳縷而去明日女告父命僮逐其跡出舍數十步至古木下得一穴而繩貫其中乃窮之深不數尺果有一蠐螬約尺余蹲其中焉錐表其項蓋所謂齊人曹氏子也景即殺之自此遂絶蛇醫王彥威鎮汴之二年夏旱時表王傅李過汴因宴王以旱為慮李醉曰欲雨甚易耳可求蛇醫四頭十石瓮二每瓮實以水浮二蛇醫覆以木蓋密泥之分置于鬧處瓮前設席燒香選小兒十歲已下十余令執小青竹晝夜更擊其瓮不得少輟王如其言試之一日兩度雨大注數百里舊說龍與蛇師為親家山蜘蛛相傳裴旻山行有山蜘蛛垂絲如匹布將及旻旻引弓射卻之大如車輪因斷其絲數尺收之部下有金瘡者剪方寸貼之血立止蟲變河南少尹韋絢少時嘗于夔州江岸見一異蟲初疑一棘刺從者驚曰此蟲有靈不可犯之或致風雨韋試令踏地驚之蟲飛伏地如滅細視地上若石脈焉良久漸起如舊每刺上有一爪忽入草疾走如箭竟不知何物蝎化蝎負蟲巨者多化為蝎蝎子多負于背段成式嘗見一蝎負十余子子色猶白才如稻粒又嘗見張希復言陳州古倉有蝎形如錢螫人必死江南舊無虱建草舊說虱蟲症飲赤龍所浴水則愈虱惡水銀人有病虱者雖香衣沐浴不能已惟水銀可去之道士崔白言荊州秀才張告嘗捫得兩頭虱又有草生山足濕處葉如百合對葉獨莖莖微赤高一二尺名虱建草能去蟣虱法通荊州有帛師號法通本安西人少于東天出家言蝗蟲腹下有梵字或自天下來者及忉利天梵天來西域驗其字作本天壇法禳之今蝗蟲首有王字固自可曉或言魚子變近之矣舊言蟲食谷者部吏所致侵漁百姓則蟲食谷蟲身黑頭赤武官也頭黑身赤儒吏也登封士人唐嘗有士人客游十余年歸莊莊在登封縣夜久士人睡未著忽有星火發于牆堵下初為螢稍稍芒起大如彈丸飛燭四隅漸低輪轉來往去士人面才尺余細視光中有一女子貫叉紅衫碧裙搖首擺臂具體可愛士人因張手掩獲燭之乃鼠糞也大如雞栖子破視有蟲首赤身青殺之虱征相傳人將死虱離身或云取病者虱于床前可以卜病將差虱行向病者背則死壁鏡一日江楓亭會衆說單方段成式記治壁鏡用白礬重訪許君用桑柴灰汁三度沸取汁白礬為膏涂瘡口即差兼治蛇毒自商鄧襄州多壁鏡毒人必死坐客或云已年不宜殺蛇大蝎安邑縣北門縣人云有一蝎如琵琶大每出來不毒人人猶是恐其靈積年矣紅蝙蝠劉君云南中紅蕉花時有紅蝙蝠集花中南人呼為紅蝙蝠青蚨青蚨似蟬而狀稍大其味辛可食每生子必依草葉大如蠶子人將子歸其母亦飛來不以近遠其母必知處然后各致小錢于巾埋東行陰牆下三日開之即以母血涂之如前每市物先用子即子歸母用母者即母歸子如此輪還不知休息若買金銀珍寶即錢不還青蚨者一名魚伯滕王圖一日紫極宮會秀才劉魯封云嘗見滕王蜂蝶圖有名江夏斑大海眼小海眼村里來菜花子異蜂有蜂狀如蠟蜂稍大飛徑疾好圓裁樹葉卷入木竅及壁罅中作窠段成式嘗發壁尋之每葉卷中實以不潔或云將化為蜜寄居寄居之蟲如螺而有腳形似蜘蛛本無殼入空螺殼中載以行觸之縮足如螺閉戶也火炙之乃出走始知其寄居也異蟲溫會在江州與賓客看打魚漁子一人忽上岸狂走溫問之但反手指背不能語漁者色黑細視之有物如黃葉大尺余眼遍其上嚙不可取溫令燒之方落每對一眼底有嘴如釘漁子出血數升而死莫有識者蠅長安秋多蠅段成式嘗日讀百家五卷頗為所擾觸睫隱字驅不能已偶拂殺一焉細視之翼甚似蜩冠甚似蜂性察于腐嗜于酒肉按理首翼其類有蒼者聲雄壯負金者聲清聽其聲在翼也青者能敗物巨者首如火或曰大麻蠅芋根所化壁魚補闕張周封言嘗見壁上白瓜子化為白魚因知列子言朽瓜為魚之義天牛蟲黑甲蟲也長安夏中此蟲或出于篱壁間必雨段成式七度驗之皆應白蜂窠段成式修行里私第果園數畝壬戌年有蜂如麻子蜂膠土為巢于庭前檐大如雞卵色正白可愛家弟惡而壞之其冬果疊鐘手足南史言宋明帝惡言白問金樓子言子婚日疾風雪下帷幕變白以為不祥抑知俗忌白久矣毒蜂嶺南有毒菌夜明經雨而腐化為巨蜂黑色喙若鋸長三分余夜入人耳鼻中斷人心系竹蜂蜀中有竹蜜蜂好于野竹上結窠窠大如雞卵有蒂長尺許窠與蜜并紺色可愛甘倍于常蜜水蛆南中水溪澗中多此蟲長寸余色黑夏深變為虻螫人甚毒水蟲象浦其川渚有水蟲攢木食船數十日船壞蟲甚細微抱搶水蟲形似蛣蜣大腹下有刺有棘針螫人有毒避役南中有蟲名避役應一日十二辰其蟲狀如蛇醫腳長色青赤肉鬣暑月時見于篱壁間俗見者多稱意事其首倏忽更變為十二辰狀段成式再從兄尋常睹之蜳蝺蜳蝺形如蟬其子如蟲著草葉得其子則母飛來就之煎食辛而美灶馬灶馬狀如促織稍大腳長好穴于灶側俗言灶有馬足食之兆謝豹虢州有蟲名謝豹常在深土中司馬裴沈子嘗掘穴獲之小類蝦蟆而圓如球見人以前兩腳交覆首如羞狀能穴地如蚡鼠頃刻深數尺或出地聽謝豹鳥聲則腦裂而死俗因名之碎車蟲碎車蟲狀如唧聊蒼色好栖高樹上其聲如人吟嘯終南有之度古度古似書帶色類別長二尺許首如鏟背上有黑黃襴稍觸則斷常趁蚓蚓不復動乃上蚓掩之良久蚓化唯腹泥如涎有毒雞食則死俗呼土盅雷蜞雷蜞大如蚓以物觸之及蹙縮圓轉若鞠良久引首鞠形漸小復如蚓焉或云嚙人毒甚腹育蟬未脫時名腹育相傳言蛣蜣所化秀才韋翾莊在杜曲嘗冬中掘樹根見腹育附于朽處怪之村人言蟬固朽木所化也翾因剖一視之腹中猶實爛木蛺蝶尺蠖繭所化也秀才顧非熊少時嘗見郁栖中壞緑裙幅旋化為蝶工部員外郎張周封言百合花合之泥其隙經宿化為大蝴蝶蟻秦中多巨黑蟻好斗俗呼為馬蟻次有色竊赤者細蟻中有黑遲鈍力舉等身鐵有竊黃者最有兼弱之智段成式兒戲時常以棘刺摽蠅直其來路此蟻觸之而返或去穴一尺或數寸入穴中者如索而出疑有聲而相召也其行每六七有大首者間之整若隊伍至徙蠅時大首者或翼或殿如備異蟻狀也蟻樓程執恭在易定野中見蟻樓高二尺余
