body:
  text: 韋氏韋氏唐平王誅逆韋崔日用將兵杜曲誅諸韋略盡繃子中嬰孩亦捏殺之諸杜濫及者非一浮休子曰此逆韋之罪疏族何辜亦如冉閔殺胡高鼻者橫死董卓誅閹人無鬚者狂戮死生命也出朝野僉載張嘉福唐逆韋之變吏部尚書張嘉福河北道存撫使至懷州武陟驛有敕所至處斬之尋有敕放使人馬上昏睡遲行一驛比至已斬訖命非天乎天非命乎出朝野僉載宋惲明皇在府之日與絳州刺史宋宣遠兄惲有舊及登極之後常憶之欲用為官惲自知命薄乃隱匿外州緣親老歸侍至定鼎門外逢一近臣其人入奏云適見宋惲上喜遂召入經十數年每欲與官即自知無祿奏云若與惲官是速微命後因國子監丞杜幼奇除左贊善大夫詔令隨例與一五品官遂除右贊善大夫至夜卒出定命録房琯開元中房琯之宰盧氏也邢真人和璞自太山來房琯虛心禮敬因與攜手間步不覺行數十里至夏谷村遇一廢佛堂松竹森映和璞坐松下以杖叩地令侍者掘深數尺得一瓶瓶中皆是婁師德與永公書和璞笑謂曰省此乎房遂灑然方記其為僧時永公即房之前身也和璞謂房曰君歿之時必因食魚鱠既歿之後當以梓木為棺然不得歿於君之私第不處公館不處玄壇佛寺不處親友之家其後譴於閬州寄居州之紫極宮臥疾數日使君忽具鱠邀房於郡齋房亦欣然命駕食竟而歸暴卒州主命攢櫝於宮中棺得梓木為之出明皇雜録孫生開元末杭州有孫生者善相人因至睦州郡守令遍相僚吏時房琯為司戶崔渙自萬年縣尉貶桐廬丞孫生曰二君位皆至台輔然房神器大寶合在掌握中崔後合為杭州刺史某雖不見亦合蒙其恩惠既而房以宰輔齎册書自蜀往靈武授肅宗崔後果為杭州刺史下車訪孫生即已亡旬日矣署其子為牙將以粟帛賑恤其家出明皇雜録張嘉貞開元中上急於為理尤注意於宰輔常欲用張嘉貞為相而忘其名夜令中人持燭於省中訪其直宿者誰誰原作諸據明鈔本改還奏中書侍郎韋抗上即令召入寢殿上曰朕欲命一相常記得風標為當時重臣姓張而重名今為北方侯伯不欲訪左右旬曰念之終忘其名卿試言之抗奏曰張齊丘今為朔方節度上即令草詔仍令宮人持燭抗跪於御前援筆而成上甚稱其敏捷典麗因促命寫詔敕抗歸宿省中上不解衣以待旦將降其詔書夜漏未半忽有宮人復促抗入見上迎謂曰非張齊丘乃太原節度張嘉貞別命草詔上謂抗曰誰朕志先定可以言命矣適朕因閲近日大臣章疏首舉一通乃嘉貞表也因此灑然方記得其名此亦天啓非人事也上嘉其得人復歎用捨如有人主張出明皇雜録杜暹杜暹幼時曾自蒲津濟河河流湍急時入舟者衆舟人已解纜岸上有一老人呼杜秀才可暫下其言極苦暹不得已往見與語久之船人待暹不至棄襆於岸便發暹與老人交言未盡顧視船去意甚恨恨是日風急浪粗忽見水中有數十手攀船沒徒侶皆死唯暹獲存老人謂暹曰子卿業貴極故來相救言終不見暹後纍遷至公卿出廣異記鄭虔開元二十五年鄭虔為廣文博士有鄭相如者年五十餘自隴右來應明經以從子謁虔虔待之無異禮他日復謁禮亦如之相如因謂虔曰叔父頗知某之能否夫子云其或繼周者雖百世可知也某亦庶幾於此若存孔門未敢鄰於顏子如言偃子夏之徒固無所讓虔大異之因詰所驗其應如響虔乃杜門纍日與言狎因謂之曰若然君何不早為進取而遲暮如是相如曰某來歲方合成名所以不預來者時未至耳虔曰君當為何官曰後七年選授衢州信安縣尉秩滿當卒虔曰吾之後事可得聞乎曰自此五年國家當改年號又十五年大盜起幽薊叔父此時當被玷污如能赤誠向國即可以遷謫不爾非所料矣明年春相如果明經及第後七年調改衢州信安尉將之官告以永訣涕泣為別後三年有考使來虔問相如存否曰替後數月暴終於佛寺至二十九年改天寶天寶十五年安祿山亂東都遣偽署西京留守張通儒至長安驅朝官就東洛虔至東都偽署水部郎中乃思相如之言佯中風疾求攝市令以自污而亦潛有章疏上肅宗即位靈武其年東京平令三司以按受逆命者罪虔以心不附賊貶溫州司戶而卒出前定録崔圓崔相國圓少貧賤落拓家於江淮間表丈人李彥允為刑部尚書崔公自南方至京候謁將求小職李公處於學院與子弟肄業然待之蔑如也一夜李公夢身被桎梏其輩三二百人為兵杖所擁入大府署至廳所皆以姓名唱入見一紫衣人據案彥允視之乃崔公也遂於階下哀叫請命紫衣笑曰且收禁驚覺甚駭異語於夫人夫人曰原本無曰字據明鈔本補宜厚待之安知無應乎自此優禮日加置於別院會食中堂數月崔公請出將求職於江南李公及夫人因具盛饌兒女悉坐食罷崔公拜謝曰恩慈如此不知何以報效某每度過分未測其故願丈人示之李公笑而不為答夫人曰親表姪與子無異但慮不足亦何有恩慈之事李公起夫人因謂曰賢丈人昨有異夢郎君必貴他日丈人迍難事在郎君能特達免之乎崔公曰安有是也李公至復重言之崔公踧踖而已不復致詞李公云江淮路遠非求進之所某素熟楊司空以奉託時國忠以宰相領西川節度崔既謁見甚為楊所禮乃奏崔公為節度巡官知留後事發日李公厚以金帛贈送至西川未一歲遇安祿山反亂玄宗播遷遂為節度使旬日拜相時京城初剋復脅從偽官陳希烈等並為誅夷彥允在數中既議罪崔公為中書令詳決之果盡以兵仗圍入具姓名唱過判云準法至李公乃呼曰相公記昔年之夢否崔公頷之遂判收禁既罷具表其事因請以官贖彥允之罪肅宗許之特詔免死流嶺外出逸史
