body:
  text: 長樂村聖僧長樂村聖僧開元二十二年京城東長樂村有人家素敬佛教常給僧食忽於途中得一僧座具既無所歸至家則寶之後因設齋以為聖僧座齋畢眾散忽有一僧扣門請飡主人曰師何由知弟子造齋而來此也僧曰適到滻水見一老師坐水濱洗一座具口仍怒曰請我過齋施錢半於眾僧汙我座具苦老身自浣之吾前禮謁老僧不止因問之曰老闍梨何處齋來何為自澣僧具言其由兼示其家所在故吾此來主人大驚延僧進戶先是聖僧座座上有羹汁翻汙處主人乃告僧曰吾家貧卒辦此齋施錢少故眾僧皆三十佛與聖僧各半之不意聖僧親臨而又汙其座具愚戇盲冥心既差別又不謹慎於進退皆是吾之過也出紀聞屈突仲任同官令虞咸頗知名開元二十三年春往溫縣道左有小草堂有人居其中刺臂血朱和用寫一切經其人年且六十色黃而羸瘠而書經已數百卷人有訪者必丐焉或問其所從亦有助焉其人曰吾姓屈突氏名仲任即仲將季將兄弟也父亦典郡莊在溫唯有仲任一子憐念其少恣其所為性不好書唯以樗蒱弋獵為事父卒時家僮數十人資數百萬莊第甚眾而仲任縱賞好色荒飲博戲賣易且盡數年後唯溫縣莊存焉即貨易田疇拆賣屋宇又已盡矣唯莊內一堂巋然僕妾皆盡家貧無計乃於堂內掘地埋數甕貯牛馬等肉仲任多力有僮名莫賀咄亦力敵十夫每昏後與僮行盜牛馬盜處必五十里外遇牛即執其兩角翻負於背遇馬驢皆繩蓄其頸亦翻負之至家投於地皆死乃皮剝之皮骨納之堂後大坑或焚之肉則貯於地甕晝日令僮於城市貨之易米而食如此者又十餘年以其盜處遠故無人疑者仲任性好殺所居弓箭羅網叉彈滿屋焉殺害飛走不可勝數目之所見無得全者乃至得刺蝟赤以泥裹而燒之且熟除去其泥而蝟皮與刺皆隨泥而脫矣則取肉而食之其所殘酷皆此類也後莫賀咄病死月餘仲任暴卒而心下煖其乳母老矣猶在守之未瘞而仲任復蘇言曰初見捕去與奴對事至一大院廳事十餘間有判官六人每人據二間仲任所對最西頭判官不在立仲任於堂下有頃判官至乃其姑夫鄆州司馬張安也見仲任驚而引之登階謂曰郎在世為惡無比其所殺害千萬頭今忽此來何方相拔仲任大懼叩頭哀祈判官曰待與諸判官議之乃謂諸判官曰僕之妻姪屈突仲任造罪無數今召入對事其人年命亦未盡欲放之去恐被殺者不肯欲開一路放生可乎諸官曰召明法者問之則有明法者來碧衣跼蹐判官問曰欲出一罪人有路乎因以具告明法者曰唯有一路可出然得殺者肯若不肯亦無益官曰若何明法者曰此諸物類為仲任所殺皆償其身命然後託生合召出來當誘之曰屈突仲任今到汝食噉畢即託生羊更為羊馬亦為馬汝餘業未盡還受畜生身使仲任為人還依舊食汝汝之業報無窮已也今令仲任略還令為汝追福使汝各捨畜生業俱得人身更不為人殺害豈不佳哉諸畜聞得人身必喜如此乃可放若不肯更無餘路乃鎖仲任於廳事前房中召仲任所殺生類到判官庭中地可百畝仲任所殺生命填塞皆滿牛馬驢騾猪羊巛鹿雉兔乃至刺蝟飛鳥凡數萬頭皆曰召我何為判官曰仲任已到物類皆咆哮大怒騰振蹴踏之而言曰巨盜盍還吾債方忿怒時諸猪羊身長大與馬牛比牛馬亦大倍於常判官乃使明法入曉諭畜聞得人身皆喜形復如故於是盡驅入諸畜乃出仲任有獄卒二人手執皮袋兼秘木至則納仲任於袋中以木秘之仲任身血皆於袋諸孔中流出灑地卒秘木以仲任血遂遍流廳前須臾血深至階可有三尺然後兼袋投仲任房中又扃鎖之乃召諸畜等皆怒曰逆賊殺我身今飲汝血於是兼飛鳥等盡食其血血既盡皆共舐之庭中土見乃止當飲血時畜生盛怒身皆長大數倍仍罵不止既食已明法又告汝已得債今放屈突仲任歸令為汝追福令汝為人身也諸畜皆喜各復本形而去判官然後令袋內出仲任身則如故判官謂曰既見報應努力修福若刺血寫一切經此罪當盡不然更來永無相出望仲任蘇乃堅行其志焉出紀聞婺州金剛婺州開元寺門有二金剛世稱其神鳥雀不敢近疾病祈禱者累有驗往來致敬開元中州判司於寺門樓上宴會眾人皆言金剛在此不可一人曰土耳何能為乃以酒肉內口須臾樓上雲昏電掣既風且雷酒肉飛揚眾人危懼獨汙金剛者曳出樓外數十丈而震死出廣異記菩提寺猪唐開元十八年京菩提寺有長生猪體柔肥碩在寺十餘年其歲猪死僧焚之火既燼灰中得舍利百餘粒出紀聞李思元唐天寶五載夏五月中左清道率府府史李思元暴卒卒後心煖家不敢殯積二十一日夜中而纔蘇即言曰有人相送來且作三十人供又曰要萬貫錢與送來人思元父為署令其家頗富因命具饌且鑿紙為錢饌熟令堂前布三十僧供思元白曰蒙恩相送薄饌單蔬不足以辱大德須臾若食畢因令焚五千張紙錢於庭中又令具二人食置酒肉思元向席曰蒙恩釋放但懷厚惠又令焚五千張紙錢畢然後偃臥至天曉漸平和乃言曰被捕至一處官不在有兩吏存焉一曰馮江靜一曰李海朝與思元同召者三人兩吏曰能遺我錢五百萬當舍汝二人不對思元獨許之吏喜俄官至謂三人曰要使典二人三人內辦之官因領思元等至王所城門數重防衛甚備見王居有高樓十間當王所居三間高大盡垂簾思元至未進見有一人金章紫綬形狀甚貴令投刺謁王王召見思元隨而進至樓下王命卻簾召貴人登樓貴人自階陛方登王見起延至簾下貴人拜王答拜謂貴人曰今既來此即須置對不審在生有何善事貴人曰無王曰在生數十年既無善事又不忠孝今當奈何因嚬蹙曰可取所司處分貴人辭下未數級忽有大黑風到簾前直吹貴人將去遙見貴人在黑風中吹其身忽長數丈而狀隳壞或大或小漸漸遠去便失所在王見佇立謂階下人曰此是業風吹此人入地獄矣官因白思元等王曰可捻籌定之因簾下投三疋絹下令三人開之二人開絹皆有當使字唯思元絹開無有王曰留二人舍思元思元出殿門門西牆有門東向門外眾僧數百持旛花迎思元云菩薩要見思元入院院內地皆於清池院內堂閣皆七寶堂內有僧衣金縷袈裟坐寶䣙思元之禮謁也左右曰此地藏菩薩也思元乃跪諸僧皆為贊歎聲思元聞之泣下菩薩告眾曰汝見此人下淚乎此人去亦不久聞昔之梵音故流涕耳謂曰汝見此間事到人間一一話之當令世人聞之改心修善汝此生無雜行常正念可復來此因令諸僧送歸思元初蘇具三十人食別具二人肉食皆有贈益由此也思元活七日又設大齋畢思元又死至曉蘇云向又為菩薩所召怒思元曰吾令汝具宣報應事何不言之將杖之思元哀請乃放思元素不食酒肉及得再生遂乃潔淨長齋而其家盡不過中食而思元每人集處必具言冥中事人皆化之焉出紀聞僧齊之勝業寺僧齊之好交游貴人頗曉醫術而行多雜天寶五載五月中病卒二日而蘇因移居東禪定寺院中建一堂極華飾長座橫列等身像七軀自此絕交游精持戒自言曰初死見錄至鬼王庭見一段肉臭爛在地王因問曰汝出家人何因殺人齊之不知所對王曰汝何故杖殺寺家婢齊之方悟先是寺中小僧何馬師與寺中青衣通青衣後有異志馬師怒之因搆青衣於寺主其青衣不臧之人也寺主亦素怨之因眾僧堂食未散召青衣對眾且箠殺之齊之諫寺主曰出家之人護身口意戒律之制造次不可違而況集眾殺乎馬師贊寺主寺主大怒不納齊之遂箠朴交至死於堂下故齊之悟王之問乃言曰殺人者寺主得罪者馬師今何為見問王前臭肉忽有聲曰齊之殺我王怒曰婢何不起而臥言臭肉忽起為人則所殺青衣與齊之辯對數反乃言曰當死時楚痛悶亂但聞旁有勸殺之聲疑是齊之所以訴之王曰追寺主階吏曰福多不可追曰追馬師吏曰馬師命未盡王曰且收青衣放齊之初齊之入見王座有一僧一馬及門僧亦出齊之禮謁僧曰吾地藏菩薩也汝緣福少命且盡所以獨追今可堅持僧戒舍汝俗事住閒靜寺造等身像七軀如不能得錢彩畫亦得齊之既蘇遂乃從其言焉出紀聞張無是唐天寶十二載冬有司戈張無是居在布政坊因行街中夜鼓絕門閉遂趨橋下而跧夜半忽有數十騎至橋駐馬言使乙至布政坊將馬一乘往取十餘人其二人一則無是妻一則同曲富叟王翁無是聞之大驚俄而取者至云諸人盡得唯無是妻誦金剛經善神護之故不得因喝所得人名皆應曰唯無是亦識王翁應聲答曰畢俄而鼓動無是歸家見其妻猶誦經坐待無是既至妻曰汝常不外宿吾恐汝犯夜故誦經不眠相待天曉聞南鄰哭聲無是問之則王翁死矣無是大懼因以具告其妻妻亦大懼因移出宅謁名僧發誓願長齋日則誦經四十九遍由是得免出紀聞張應歷陽張應本是魔家娶佛家女為婦妻病困為魔事不差妻曰我本佛家女乞為佛事應便往精舍中見竺曇鎧鎧曰佛普濟眾生但當一心受持耳曇鎧明當往其家其夜應夢見一人長一丈四五尺於南面趨走入門曰此家乃爾不淨夢中見鎧隨此人後而白曰此處如欲發意未可以一二責之應眠覺遂把火作高座鎧明日食時往應家高座已成夫妻受戒病亦尋瘥咸康二年應病甚遣人呼鎧連不在應死得蘇說時說時原作時說據明鈔本改有數人以鐵鉤鉤將北下一板岸岸下見鑊湯刀山劍樹楚毒之具應忘曇鎧字但喚和尚救我語原無語字據明鈔本補鉤將去人曰我是佛子人曰汝和尚字何等應忘其字但喚佛而已俄轉近鑊湯有一人長一丈四五尺捉金杵欲撞應走人怖散去長人將應歸曰汝命盡不得復生與汝三日中期誦三偈取和尚字還當令汝生本書卷一一三張應條當令汝生下有三日當復命過即生天矣十字遂推應著門內便活後三日復死出神鬼傳道嚴有嚴師者居於成都實曆寺明鈔本實歷作寶應唐開元十四年五月二十一日於佛殿前軒燃長明燈忽見一巨手在殿西軒道嚴悸且甚俯而不動久之忽聞空中語云無懼無懼吾善神也且不敢害師之一毫何俯而不動耶道嚴既聞懼少解因問曰檀越為何人明鈔本人作佛匿其軀而見其手乎已而聞空中對曰天命我護佛寺之地以世人好唾佛祠地我即以背接之受其唾由是背有瘡漬吾肌且甚願以膏油傅其上可乎道嚴遂以清油置巨手中其手即引去道嚴乃請曰吾今願見檀越之形使畫工寫於屋壁且書其事以表之冀世人無敢唾佛祠之地者神曰吾貌甚陋師見之無得慄然耶道嚴曰檀越但見其身勿我阻也見西軒下有一神質甚異豐首巨準嚴目呀口體狀魁碩長數丈道嚴一見背汗如沃其神即隱去於是具以神狀告畫工命圖於西軒之壁出宣室志
