body:
  text: 李亭李亭漢茂陵少年李亭好馳駿狗逐狡獸或以鷹鷂逐雉兔皆為嘉名狗則有修豪釐睫白望青曹之名鷹則有青翅黃眸青冥金距之屬鷂則有從風孤飛之號出西京雜記虬髯客隋煬帝之幸江都也命司空楊素守西京素驕貴又以時亂天下之權重望崇者莫我若也奢貴自奉禮異人臣每公卿入言賓客上謁未嘗不踞牀而見令美人捧出侍婢羅列頗僭於上末年益甚一日衛公李靖以布衣來謁獻奇策素亦踞見之靖前揖曰天下方亂英雄競起公為帝室重臣須以收羅豪傑為心不宜踞見賓客素斂容而起與語大悅收其策而退當靖之聘辨也一妓有殊色執紅拂立於前獨目靖靖既去而拂妓臨軒指吏問曰去者處士第幾住何處吏具以對妓頷而去靖歸逆旅其夜五更初忽聞扣門而聲低者靖起問焉乃紫衣戴帽人杖揭一囊靖問誰曰妾楊家之紅拂妓也靖遽延入脫衣去帽乃十八九佳麗人也素面華衣而拜靖驚答曰妾侍楊司空久閲天下之人多矣未有如公者絲蘿非獨生願託喬木故來奔耳靖曰楊司空權重京師如何曰彼尸居餘氣不足畏也諸妓知其無成去者衆矣彼亦不甚逐也計之詳矣幸無疑焉問其姓曰張問伯仲之次曰最長觀其肌膚儀狀言詞氣性真天人也靖不自意獲之益喜懼瞬息萬慮不安而窺戶者足無停屨既數日聞追訪之聲意亦非峻乃雄服乘馬排闥而去將歸太原行次靈石旅舍既設牀爐中烹肉且熟張氏以髮長委地立梳牀前靖方刷馬忽有一人中形赤髯而虬乘蹇驢而來投革囊於爐前取枕欹臥看張氏梳頭靖怒甚未決猶刷馬張氏熟觀其面一手握髮一手映身搖示令忽怒急急梳頭畢斂袂前問其姓臥客曰姓張對曰妾亦姓張合是妹遽拜之問第幾曰第三問妹第幾曰最長遂喜曰今日多幸遇一妹張氏遙呼曰李郎且來拜三兄靖驟拜遂環坐曰煮者何肉曰羊肉計已熟矣客曰飢甚靖出市買胡餅客抽匕首切肉共食食竟餘肉亂切爐前食之甚速客曰觀李郎之行貧士也何以致斯異人曰靖雖貧亦有心者焉他人見問固不言兄之問則無隱矣具言其由曰然則何之曰將避地太原耳客曰然吾故非君所能致也曰有酒乎靖曰主人西則酒肆也靖取酒一斗酒既巡客曰吾有少下酒物李郎能同之乎靖曰不敢於是開華囊取出一人頭并心肝却收頭囊中以匕首切心肝共食之曰此人乃天下負心者心也銜之十年今始獲吾憾釋矣又曰觀李郎儀形器宇真丈夫亦知太原之異人乎曰嘗見一人愚謂之真人其餘將相而已其人何姓曰同姓曰年幾曰近二十今何為曰州將之愛子也曰似矣亦須見之李郎能致吾一見否曰靖之友劉文靜者與之狎因文靜見之可也兄欲何為曰望氣者言太原有奇氣使吾訪之李郎明發何時到太原靖計之某日當到曰達之明日方曙我於汾陽橋待耳訖乘驢而其行若飛回顧已遠靖與張氏且驚懼久之曰烈士不欺人固無畏但速鞭而行及期入太原候之相見大喜偕詣劉氏詐謂文靜曰以善相思見郎君迎之文靜素奇其人方議論匡匡原作厈據明鈔本改輔一旦聞客有知人者其心可知遽致酒延焉既而太宗至不衫不履裼裘而來神氣揚揚貌與常異虬髯默居坐末見之心死飲數巡起招靖曰真天子也靖以告劉劉益喜自負既出而虬髯曰吾見之十八九定矣亦須道兄見之李郎宜與一妹復入京某日午時訪我於馬行東酒樓下下有此驢及一瘦騾即我與道兄俱在其所也公到即見二乘攬衣登樓即虬髯與一道士方對飲見靖驚喜召坐環飲十數巡曰樓下匱中有錢十萬擇一深隱處駐一妹畢某日復會我於汾陽橋如期登樓道士虬髯已先坐矣共謁文靜時方奕棋揖起而語心焉文靜飛書迎文皇看棋道士對奕虬髯與靖旁立為侍者俄而文皇來長揖而坐神清氣朗滿坐風生顧盼暐如也道士一見慘然下棋子曰此局輸矣輸矣於此失却局奇哉救無路矣知復奚言罷奕請去既出謂虬髯曰此世界非公世界也他方可圖勉之勿以為念因共入京虬髯曰計李郎之程某日方到到之明日可與一妹同詣某坊曲小宅愧李郎往復相從一妹懸然如磬欲令新婦祗謁略議從容無令前却言畢吁嗟而去靖亦策馬遄征俄即到京與張氏同往乃一小板門扣之有應者拜曰三郎令候一娘子李郎久矣延入重門門益壯麗奴婢三十餘人羅列於前奴二十人引靖入東廳非人間之物巾粧梳櫛畢請更衣衣又珍奇既畢傳云三郎來乃虬髯者紗帽褐裘有龍虎之姿相見歡然催其妻出拜蓋天人也遂延中堂陳設盤筵之盛雖王公家不侔也四人對坐牢饌畢陳女樂二十人列奏於前似從天降非人間之曲度食畢行酒而家人自西堂舁出二十牀各以錦繡帕覆之既呈盡去其帕乃文簿鑰匙耳虬髯謂曰盡是珍寶貨泉之數吾之所有悉以充贈何者某本欲於此世界求事或當龍戰三二年建少功業今既有主住亦何為太原李氏真英主也三五年內即當太平李郎以英特之才輔清平之主竭心盡善必極人臣一妹以天人之姿蘊不世之略從夫之貴榮極軒裳非一妹不能識李郎非李郎不能遇一妹聖賢起陸之漸際會如期虎嘯風生龍騰雲萃固當然也將余之贈以奉真主贊功業勉之哉此後十餘年東南數千里外有異事是吾得志之秋也妹與李郎可瀝酒相賀顧謂左右曰李郎一妹是汝主也言畢與其妻戎裝乘馬一奴乘馬從後數步不見靖據其宅遂為豪家得以助文皇締構之資遂匡大業貞觀中靖位至僕射東南蠻奏曰有海賊以千艘積甲十萬人入扶餘國殺其主自立國內已定靖知虬髯成功也歸告張氏具禮相賀瀝酒東南祝拜之乃知真人之興非英雄所冀況非英雄乎人臣之謬思亂乃螳蜋之拒走輪耳或曰衛公之兵法半是虬髯所傳也出虬髯傳彭闥高瓚唐貞觀中恆州有彭闥高瓚二人鬭豪於時大酺場上兩朋競勝闥活捉一豬從頭咬至頂放之地上仍走瓚取貓兒從尾食之腸肚俱盡仍鳴喚不止闥於是乎帖然心服出朝野僉載嘉興繩技唐開元年中數敕賜州縣大酺嘉興縣以百戲與監司競勝精技監官屬意尤切所由直獄者語與獄中云倘有諸戲劣於縣司我輩必當厚責然我等但能一事稍可觀者即獲財利歎無能耳乃各相問至於弄瓦緣木之技皆推求招引獄中有一囚笑謂所由曰某有拙技限在拘繫不得略呈其事吏驚曰汝何所能囚曰吾解繩技吏曰必然吾當為爾言之乃具以囚所能白於監主主召問罪輕重吏云此囚人所纍逋婚未納餘無別事官曰繩技人常也又何足異乎囚曰某所為者與人稍殊官又問曰如何囚曰衆人繩技各繫兩頭然後於其上行立周旋某只須一條繩粗細如指五十尺不用繫著拋向空中騰躑翻覆則無所不為官大驚悅且令收録明日吏領戲場諸戲既作次喚此人令效繩技遂捧一團繩計百餘尺置諸地將一頭手擲於空中徑如筆初拋三二丈次四五丈仰直如人牽之衆大驚異後乃拋高二十餘丈仰空不見端緒此人隨繩手尋身足離地拋繩虛空其勢如鳥旁飛遠揚望空而去脫身行狴在此日焉出原化記車中女子唐開元中吳郡人入京應明經舉至京因間步坊曲忽逢二少年著大麻布衫揖此人而過色甚卑敬然非舊識舉人謂誤識也後數日又逢之二人曰公到此境明鈔本境作竟未為主今日方欲奉迓邂逅相遇實慰我心揖舉人便行雖甚疑怪然強隨之抵數坊於東市一小曲內有臨路店數間相與直入舍宇甚整肅二人攜引升堂列筵甚盛二人與客據繩牀坐定於席前更有數少年各二十余禮頗謹數出門若佇貴客至午後方云來矣聞一車直門來數少年隨後直至堂前乃一鈿車卷簾見一女子從車中出年可十七八容色甚佳花梳滿髻衣則紈素二人羅拜此女亦不答此人亦拜之女乃答遂揖客入女乃升牀當局而坐揖二人及客乃拜而坐又有十餘後生皆衣服輕新各設拜列坐於客之下陳以品味饌至精潔飲酒數巡至女子執杯顧問客聞二君奉談今喜展見承有妙技可得觀乎此人卑遜辭讓云自幼至長唯習儒經絃管歌聲輒未曾學女曰所習非此事也君熟思之先所能者何事客又沈思良久曰某為學堂中著靴於壁上行得數步自餘戲劇則未曾為之女曰所請只然請客為之遂於壁上行得數步女曰亦大難事乃回顧坐中諸後生各令呈技俱起設拜有於壁上行者亦有手撮椽子行者輕捷之戲各呈數般狀如飛鳥此人拱手驚懼不知所措少頃女子起辭出舉人驚嘆恍恍然不樂經數日途中復見二人曰欲假盛駟可乎舉人曰唯至明日聞宮苑中失物掩捕失賊唯收得馬是將馱物者驗問馬主遂收此人入內侍省勘問驅入小門吏自後推之倒落深坑數丈仰望屋頂七八丈唯見一孔才開尺餘自旦入至食時見一繩縋一器食下此人飢急取食之食畢繩又引去深夜此人忿甚悲惋何訴仰望忽見一物如鳥飛下覺至身邊乃人也以手撫生謂曰計甚驚怕然某在無慮也聽其聲則向所遇女子也共君出矣以絹重繫此人胸膊訖絹一頭繫女人身女人縱身騰上飛出宮城去門數十里乃下云君且便歸江淮求仕之計望俟他日此人大喜徒步潛竄乞食寄宿得達吳地後竟不敢求名西上矣出原化記
