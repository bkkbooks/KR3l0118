body:
  text: 李顧言李顧言唐監察御史李顧言貞元末應進士舉甚有名稱歲暮自京西客遊迴詣南省訪知己郎官適至日已晚省吏告郎官盡出顧言竦轡而東見省東南北街中有一人挈小囊以烏紗蒙首北去徐吟詩曰放牓只應三月暮登科又校一年遲又稍朗吟若令顧言聞顧言策馬逼之於省北有驚塵起遂失其人所在明年京師自冬雨雪甚畿內不稔停舉貞元二十一年春德宗皇帝晏駕果三月下旬放進士牓顧言元和元年及第出續定命錄元和二相元和中宰相武元衡與李吉甫齊年又同日為相及出鎮又分領揚益至吉甫再入元衡亦還吉甫前一年以元衡生月卒元衡以吉甫生月遇害年五十八先長安忽有童謠云打麥麥打三三三既而旋其袖曰舞了也解者曰以為打麥刈麥時也麥打謂暗中突擊也三三三謂六月三日也舞了謂元衡卒也至元和六月盜殺元衡批其顱骨而去元衡初從蜀歸熒惑犯上相星云三相皆不利始輕末重月餘李絳以足疾免明年十月李吉甫暴卒又一年元衡遇害出感定錄李源洛城北惠林寺住以其父憕為祿山所害誓不履人事不婚不役僮僕暮春之際蔭樹獨處有一少年挾彈而至源愛其風秀與之馴狎問其氏行但曰武十三甚依阿不甚顯揚訊其所居或東或西或南或北不定源叔父為福建觀察使源修覲禮武生亦云有事東去同舟共載行及宋之穀熟橋攜手登岸武曰與子訣矣源驚訊之即曰某非世人也為國掌陰兵百有餘年凝結此形今夕託質於張氏為男子十五得明經後終邑令又云子之祿亦薄年登八十朝廷當以諫議大夫徵後二年當卒矣我後七年復與君相見言訖抵村戶執手分袂既而張氏舉家驚喜新婦誕一男源累載放跡閩南及還省前事復詣村戶見一童兒形貌類武者乃呼曰武十三相識耶答曰李七健乎其後憲宗讀國史感歎李憕盧奕之事有薦源名遂以諫議大夫徵不起明年源卒於惠林寺張終於宣州廣德縣令出獨異志鄭權初有日者夢滄州衙門署牓皆作權字以告程執恭遂奏請改名未幾朝命鄭權代之時人深異其事出廣德神異錄樊陽源唐山南節判殿中侍御史樊陽源元和中入奏岐下諸公攜樂於岐郊漆方亭餞飲從事中有監察陳庶獨孤乾禮皆在幕中六七年各歎淹滯陽源乃曰人之出處無非命也某初名源陽及第年有人言至西府與取事某時閒居洛下約八月間至其年七月有表兄任密縣令使人招某驟到密縣某不得已遂出去永通門宿夜夢見一高塚上一著麻衣人似欲鄉飲之禮顧視左右又有四人塚上其人乃以手招陽源陽源不樂去次一人從陽源前而上又一人躡後而上左右四人皆上陽源意忽亦願去遂繼陟之比及五人見塚上袖一文書是河南府送舉解第六人有樊陽源時無樊源陽矣及覺甚異之不日到密縣便患痢疾聯綿一月困憊甚稍間徑歸洛中謂表兄曰兩府取解舊例先須申某或恐西府不得兄當與首送密宰矣曰不可處但令密縣海送固不在託及到洛中已九月半洛中還往乃勸不如東府取解已與西府所期違違明鈔本作連矣陽源心初未決忽見密縣解申府陽源作第六人不得源陽處士石洪曰陽源實勝源陽遂話夢於洪洪曰此夢固往塚者丘也豈非登塚為丘徒哉於此大振亦未可知況縣申名第一如夢中未必不為祥也是歲許孟容為川守又謔陽源密縣第六人某已處分試官更升三兩路比府牓出陽源依縣申第六人孟容怒責試官陽源具以夢告明年權侍郎不及第出續定命錄吳少誠貧賤時為官健逃去至上蔡凍餒求丐於儕輩上蔡縣獵師數人於中山得鹿本法獲巨獸者先取其腑臟祭山神祭畢獵人方欲聚食忽聞空中有言曰待吳尚書眾人驚駭遂止良久欲食又聞曰尚書即到何不且住逡巡又一人是腳力攜小襆過見獵者揖而坐問之姓吳眾皆驚食畢獵人起賀曰公即當貴幸記某等姓名具述本末少誠曰某輩軍健兒苟免擒獲效一卒之用則足矣安有富貴之事大笑執別而去後數年為節度使兼工部尚書使人求獵者皆厚以錢帛齎之出續定命錄陳彥博陳彥博與謝楚同為大學廣文生彥博將取解忽夢至都堂見陳設甚盛若行大禮然庭中幃幄飾以錦綉中設一榻陳列几案上有尺牘望之照耀如金字彥博私問主事曰此何禮也答曰明年進士人名將送上界官司閱視之所彥博驚喜因求一見其人引至案牓有一紫衣執象簡彥博見之歛衽而退紫衣曰公有名矣可以視之遂前見有三十二彥博名在焉從上二人皆姓李而無謝楚既悟獨喜不以告人及與楚同策試有自中書見名者密以告楚而不言彥博彥博聞之不食而泣楚乃諭曰君之能豈後於我設使一年未利何若是乎彥博方言其夢且曰若果無驗吾恐終無成矣大學諸生曰誠如說事未可知明旦視牓即果如夢中焉彥博以元和五年崔樞侍郎及第上二人李顧行李仍叔謝楚明年於尹躬下擢第出前定錄陸賓虞陸賓虞舉進士在京師常有一僧曰惟瑛者善聲色兼知術數賓虞與之往來每言小事無不必驗至寶曆二年春賓虞欲罷舉歸吳告惟瑛以行計瑛留止一宿明旦謂賓虞曰若來歲成名不必歸矣但取京兆薦送必在高等賓虞曰某曾三就京兆未始得事今歲之事尤覺甚難瑛曰不然君之成名不以京兆薦送他處不可也至七月六日若食水族則殊等與及第必矣賓虞乃書於晉昌里之牖日省之數月後因於靖恭北門候一郎官適遇朝客遂迴憩於從孫聞禮之舍既入聞禮喜迎曰向有人惠雙鯉魚方欲候翁而烹之賓虞素嗜魚便令作羹至者輒盡後日因視牖間所書字則七月六日也遽命駕詣惟瑛且紿之曰將遊蒲關故以訪別瑛笑曰水族已食矣遊蒲關何為賓虞深信之因取薦京兆府果得殊等明年入省試畢又訪惟瑛瑛曰君已登第名籍不甚高當在十五人之外狀元姓李名合曳腳時有廣文生朱俅者時議當及第監司所送之名未登料賓虞因問其非姓朱乎瑛曰三十三人無姓朱者時正月二十四日賓虞言於從弟原本無弟字據明鈔本補符符與石賀書書原作聿據明鈔本改壁後月餘放牓狀頭李郃賓虞名在十六即三十人也惟瑛又謂賓虞曰君成名後當食祿於吳越之分有一事甚速疾賓虞後從事於越半年而暴終出前定錄王璠王璠以元和五年登科夢為河南尹平旦視事有二客來謁一衣紫而東坐一衣緋而西坐緋者謂紫者曰崙邦如何處置曰已決二十遞出界訖覺乃書於告牒之後別紙上後二十年果除河南尹既上洛陽令與分司郎官皆故人從容宴語郎官謂令曰崙邦如何處置令曰已決二十遞出界璠聞之遽起還內良久不出二客甚訝曰吾等向者對答率易王尹得非怒耶頃之璠持告牒所記出示二客徐徵其人乃郎官家奴竊財而遁擒獲送縣縣為斷之如此出續定命錄崔玄亮元和十一年監察御史段文昌與崔植同前入臺先是御史崔玄亮察院之長每以二監察後至不由科名接待間多所脫略段與崔深銜之元和十五年春穆宗皇帝龍飛命二公入相段自翰長中書舍人拜植自御史中丞拜同在中書時玄亮罷密州刺史謁宰相二相相顧搯玄亮名曰此人不久往他役而有心求官時門下侍郎蕭俛亦在長安因問二相二相具以事對蕭相曰若如此且令此漢閑三五年可矣不數日宣州奏歙州刺史闕其日印在段相宅便除歙州刺史明日段入朝都忘前事到中書大怒責吏房主事陽述云威權在君更須致宰相必是此賊納賄除官若不是人吏取錢崔玄亮何由得歙州刺史述惶怖謝罪云文書都不到本房昨日是相公手書擬名進黃及檢勘翻省述忘實是自書植欲改擬覆奏段曰安知不是天與假吾手耳遂放敕下出續定命錄韋貫之武元衡與韋貫之同年及第武拜門下侍郎韋罷長安尉赴選元衡以為萬年丞過堂日元衡謝曰某與先輩同年及第元衡遭逢濫居此地使先輩未離塵土元衡之罪也貫之嗚咽流涕而退後數月除補闕是年元衡帥西川三年後入相與貫之同日宣制出續定命錄
