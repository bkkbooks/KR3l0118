body:
  text: 奴官冢奴官冢酇縣有後漢奴官冢初村人田于其側每至秋獲近冢地多失穗不稔積數歲已苦之后恆夜往伺之見四大鵝從冢中出食禾逐即入去村人素聞奴官冢有寶乃相結開之初入埏前見有鵝鼓翅擊人賊以棒反擊之皆不復動乃銅鵝也稍稍入外廳得寶劍二枚其它器物不可識者甚衆次至大藏水深有紫衣人當門立與賊相擊賊等群爭往擊次其人沖賊走出入縣大叫云賊劫吾墓門主者曰君墓安在答曰正奴官冢是也縣令使里長逐賊至皆擒之開元末明州刺史進三十余事盧渙黃門侍郎盧渙為洺州刺史屬邑翁山縣溪谷迥無人嘗有盜發墓云初行見車轍中有花磚因揭之知是古冢乃結十人縣投狀請路旁居止縣許之遂種麻令外人無所見即悉力發掘入其隧路漸至壙中有三石門皆以鐵封之其盜先能誦咒因齋戒近之至日兩門開每門中各有銅人銅馬數百持執干戈其制精巧盜又齋戒三日中門半開有黃衣人出曰漢征南將軍劉使來相聞某生有征伐大勳及死敕令護葬又鑄銅人馬等以象存日儀衛奉計來此必要財貨所居之室實無他物且官葬不瘞寶貨何必苦以神咒相侵若更不已當不免兩損言訖復入門合如初又誦咒數日不已門開一青衣又出傳語盜不聽兩扇欻辟大水漂蕩盜皆溺死一盜能泅而出自縛詣官具説本末渙令復視其墓中門內有一石床骷髏枕之水漂已半垂子床下因卻為封兩門窒隧路矣趙冬曦華陰太守趙冬曦先人壟在鼓城縣天寶初將合附焉啓其父墓而樹根滋蔓圍繞父棺懸之于空遂不敢發以母柩置于其旁封墓而返宣城太守刁緬改葬二親緬亦納母棺于其側封焉后門緒昌盛也冬曦兄弟七人皆秀才有名當世四人至二千石緬三為將軍門施長戟開元二十年萬年有人父歿后家漸富遂葬母父櫬亦為縈繞不可解其人遂刀斷之根皆流血遂以葬即而家道稍衰死亡俱盡丁永興高唐縣南有鮮卑城舊傳鮮卑聘燕享于此城旁有盜跖冢冢極高大賊盜嘗私祈焉天寶初縣令丁永興有群盜劫其部內興乃密令人冢旁伺之果有祀者乃執詣縣按殺之自后祀者頗絶皇覽言盜跖冢在河東按盜跖死于東陵此地古名東平陵疑此近之嚴安之天寶初嚴安之為萬年縣捕賊官亭午有中使黃衣乘馬自門馳入宣敕曰城南十里某公主墓見被賊劫宣使往捕之不得漏失安之即領所由并器杖往掩捕見六七人方穴地道才及埏路一時擒獲安之令求中使不得因思之曰賊方開冢天子何以知之至縣乃盡召賊訊其事賊曰才開墓即覺有異自知必敗至第一門有盟器敕使數人黃衣騎馬內一人持鞭狀如走勢袱頭腳亦如風吹直豎眉目已來悉皆飛動某即知必敗也安之即思前敕使狀貌兩盟器敕使耳女媧墓潼關口河灘上有樹數株雖水暴漲亦不漂沒時人號為女媧墓唐天寶十三年五月內因大風吹失所在乾元二年六月虢州刺使王晉光上言今月一日河上側近忽聞風雷曉見墳踊出上有雙柳樹下巨石柳各高丈余李邈劉晏判官李邈莊在高陵莊客欠租課積五六年邈因罷歸莊方將責之見倉庫盈美輸尚未畢邈怪問悉曰某久為盜近聞一古冢冢西去莊十里極高大入松林二百步方至墓墓側有碑斷倒草中字磨滅不可讀初旁掘數十丈遇一石門錮以鐵計纍日洋糞沃之方開開時箭出如雨射殺數人衆懼欲出某審無他必設機耳乃令投石其中每投箭輒出投十余石箭不復發因列炬而入至開重門有木人數十張目運劍又傷數人衆以棒擊之兵杖悉落四壁各畫兵衛之像南壁有大漆棺懸以鐵索其下金玉珠璣堆積衆懼未即掠之棺兩角忽颯颯風起有沙撲人面須臾風甚沙出如注遂沒至髁衆驚恐退走比出門已塞矣一人復為沙埋死乃同酹地謝之誓不發冢水經言越王句踐都琅琊欲移尤常冢冢中生風飛沙射人人不得近遂止按漢舊儀將作營陵之內方丈外設伏弩伏火弓矢與沙蓋古制有此機也賈耽賈耽在滑州境內天旱耽召大將二人謂曰今歲荒煩君二人救民也皆言當利軍州死不足辭耽笑曰君可辱為健步明日當有兩騎衣慘緋所乘馬蕃步鬣長經市出城可隨之識其所滅處則吾事諧矣二將乃裹糧衣皂衣尋之果有二緋衣經市至野行二百餘里映大冢而滅遂壘石喪之信宿而返耽大喜發數百人具畚鍤與二將偕往發冢獲陳粟數十萬斛人竟不之測張式張式幼孤奉遺命葬于洛京時周士龍識地形稱郭璞青烏之流也式與同之外野歷覽三日而無獲夜宿村舍時冬寒室內唯一榻式則籍地士龍據榻以憩士龍夜久不寐式兼衣擁爐而寢欻然驚魘曰親家士龍遽呼之式固不自知久而復寐又驚魘曰親家士龍又呼之式亦自不知所謂及曉又與士龍同行出村之南南有土山士龍駐馬遙望曰氣勢殊佳則與式步履久之南有村夫伐木遠見士龍相地則荷斧遽至曰官等得非擇葬地乎此地乃某之親家所有如何則某請導致焉士龍謂式曰疇昔夜夢再驚皆曰親家豈非神明前定之證與遂卜葬焉而式纍世清貴樊澤樊澤為襄陽節度使有巡官張某者父為雍管經略史葬于鄧州北數十里張兄第三人忽同時夢其父曰我葬墓某夜被劫賊將衣物今日入城來停在席帽行汝宜速往擒之日出后即不得矣張兄弟夜起泣涕相告未明扣州門見澤具白其事立召都虞候令捕之同黨六人并賊帥之妻皆獲澤引入面問之曰汝劫此墓有異耶賊曰某今日之事亦無所隱必是為神理所殛某夫妻業劫冢已十余年每劫夫妻攜酒爇火諸徒黨即開墓至棺蓋某夫妻與其亡人遞為斟酌某自飲一盞曰客欲一盞即以酒瀝于亡人口中云主人飲一盞又妻飲一盞遍便云酒錢何處出其妻應云酒錢主人出遂取夜物寶貨等某昨開此墓見棺中人紫衣玉帶其狀如生某依法飲酒及瀝酒云至主人一盞言訖亡人笑某等驚甚便扶起唯枯骨耳遂解腰帶亡人呼曰緩之我腰痛某輩皆驚懼遂馳出自此神魂惝恍即知必敗悉殺之數日鄧州方上其事齊景公墓貝邱縣東北齊景公墓近世有人開之下入三丈石函中得一鵝鵝回轉翅以撥石復下入一丈便有青氣上騰望之如陶煙飛鳥過之輒墮死遂不敢入郭誼潞州軍校郭誼先為邯鄲郡牧使因兄亡遂入鄆州舉其先同營于磁州滏陽縣接山土中多石有力者卒共鑿石為穴誼之所卜亦鑿焉即日倍加忽透一穴穴中有石長可四尺形如守宮支體首尾畢具役者誤斷焉誼惡之將別卜地白于劉從諫從諫不許因葬焉后月余誼陷于廁幾死骨肉奴婢相繼死者二十余口自是常恐悸寤寐不安因表請罷職從諫以都押衙焦長楚之務與誼對換及劉稹阻兵誼為共魁軍破梟首其家無少長悉投死井中鹽州從事鄭賓于言石守宮見在磁州官庫中壽安土棺壽安之南有土峰甚峻乾寧初因雨而圯半壁銜土棺棺下有木橫亙之木見風成塵而土形尚固邑令滌之泥汩于水粉膩而蠟黃剖其腹依稀骸骨因徵近代無以土為周身之器者載記云夏后氏堲周蓋其時也李思恭乾寧三年丙辰蜀州刺史節度參謀李思恭埋弟于成都錦浦里北門內西回第一宅西與李冰祠鄰距宅之北地形漸高岡走西南與祠相接于其堂北鑿地五六尺得大冢磚甓甚固于磚外得金錢數十枚各重十七八銖徑寸七八分圓而無孔去緣二分有隱起規規內兩面各有書二十一字其緣甚薄有刃焉督役者馳其二以白思恭命使者入青城云溪山居以示道士杜光庭云此錢得有石余思恭命并金錢復瘞之但不知誰氏之墓也其地北百步所有石筍知石筍即此墓之闕矣自此甚靈人不敢犯其后蜀主改置祠堂享之武瑜安州城東二十余里有大墓群賊發之數日乃開得金叉百餘枚合重百斤有石座雜寶古腰帶陳列甚多取其一帶隨手有水涌俄頃滿墓所開之處尋自閉塞盜以二叉子獻刺史武瑜夜夢一人古服侍從極多來謁云南蠻武相公也為群盜壞我居處以君宗姓願為修之盜當發狂勿加擒捕即命修之群盜三十余人同時發狂相次皆卒曹王墓永平乙亥歲有説開封人發曹王皋墓取其石人羊馬磚石之屬見其棺宛然而隨手灰滅無復形骨但有金器數事棺前有鑄銀盆廣三尺滿盆貯水中坐玉嬰兒高三尺水無減耗則泓師所云墓中貯玉則草木溫潤貯金多則草木焦枯曹王自貞元之后歷二百歲矣盆水不減玉之潤也韓建韓建喪母卜葬地有術云只有一穴可置大錢而不久即散若華州境內莫如于此也建乃于此葬母明年大駕來幸四海之人罔不臻湊建乃廣收商稅二載之后有錢九百萬貫復三年為朱梁所有海陵夏氏戊戌歲城海陵縣為郡侵人冢墓有市儈夏氏其先嘗為鹽商墓在城西夏改葬其祖百一十年矣開棺唯有白骨而衣服器物皆儼然如新無所損污有紅錦被文彩尤異夏方貧皆取賣之人競以善價買云其余冢雖歷年未及而皆腐敗矣廬陵彭氏廬陵人彭氏葬其父有術士為卜地曰葬此當世為藩牧郡守彭從之又掘坎術士曰深無過九尺久之術士暫憩他所役者遂掘丈余欻有白鶴自地出飛入云中術士歎恨而去今彭氏子孫有為縣令者武夷山建州武夷山或風雨之夕聞人馬簫管之聲及明則有棺槨在懸崖之上中有脛骨一節土人謂之仙人換骨函近代有人深入絶壑俯見一函其上題云潤州朝京門內染師張某第三女好事者記之后至潤州果得張氏之居云第三女未嫁而卒已數歲因發其墓則空棺矣林贊堯丙午歲漳州裨將林贊堯殺監軍中使據郡及保山岩以為營掘地得一古冢棺槨皆腐中有一女子衣服容貌皆如生舉體尤有暖氣軍士取其金銀叉環而棄其尸又發一冢開棺見一人被發復面蹲于棺中軍士駭懼致死者數人贊堯竟伏誅張紹軍卒丙午歲江南之師圍留安軍政不肅軍士發掘冢墓以取財物諸將莫禁監軍使張匡紹所將卒二人發城南一冢得一椰實杯以獻匡紹因曰某發此冢開棺見緑衣人面如生懼不敢犯墓中無他珍唯得此杯耳既還營而緑衣人已坐某房矣一日數見意甚惡之居一二日二卒皆戰死馬黃谷冢安州城南馬黃谷冢左有大冢棺槨已腐唯一髑髏長三尺陳人左鵬親見之焉秦進崇周顯德乙卯歲偽連水軍使秦進崇修城發一古冢棺槨皆腐得古錢破銅鏡數枚復得一瓶中更有一瓶黃質黑文成隸字云一雙青烏子飛來五兩頭借問船輕重寄信到揚州其明年周師伐吳進崇死之和文蜀人王昭遠戊午歲為巡邊制置使及文州遇軍人喧聚問之言舊冢內有尸不壞或以磚石投之其聲鏗然昭遠往見其形質儼然如新逝冢中得石版云有唐故文州馬步都虞侯和文年五十八大中五年辛未五月五日卒葬于此昭遠致祭復令掩閉之于墓側刻石以銘之
