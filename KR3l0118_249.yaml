body:
  text: 令狐德棻令狐德棻唐趙元楷與令狐德棻從駕至陝元楷召德棻河邊觀砥柱德棻不去遂獨行及還德棻曰砥柱共公作何語答曰砥柱附參承公德棻應聲曰石不能言物或憑焉時群公以為佳對出啓顏録崔行功唐崔行功與敬播相逐播帶櫚木霸刀子行功問播云此是何木播對曰是栟櫚木行功曰唯問刀子不問佩人出啓顏録邊仁表唐四門助教弘綽與弟子邊仁表論議弘綽義理將屈乃高聲大怒表遂報曰先生聞義即怒豈曰弘是事皆弘弘又報云我姓即曰弘邊又應聲曰先生雖曰弘義終不綽座下大笑弘竟被屈而歸出啓顏録辛郁唐辛郁管城人也舊名太公弱冠遭太宗於行所問何人曰辛太公太宗曰何如舊太公郁曰舊太公八十始遇文王臣今適年十八已遇陛下過之遠矣太宗悅命直中書出御史台記尹君唐楊纂華陰人也纍遷雍州長史吏部尚書纂之在雍州司法參軍尹君嘗任坊州司戶省符科杜若尹君判申曰坊州本無杜若天下共知省符忽有此科應由讀謝眺詩誤華省曹郎如此判事不畏二十八宿向下笑人由是知名及雍州司法時有胡盜金城坊者纂判京城諸胡盡禁問尹君不同之曰賊出萬端詐偽非一亦有胡著漢帽漢著胡靴亦須漢里兼求不可胡中直覓請西市胡禁余請不問纂怒不同判遽命筆復沉吟少選乃判曰纂輸一籌余依太宗聞而笑曰朕用楊纂聞義伏輸一籌朕伏得幾籌出御史台記裴玄本唐裴玄本好諧謔為戶部郎中時左仆射房玄齡疾甚省郎將問疾玄本戲曰仆射病可須問之既甚矣何須問也有泄其言者既而隨例看玄齡玄齡笑曰裴郎中來玄齡不死也出大唐新語長孫玄同唐長孫玄同幼有譏辨坐中每劇談無不歡笑永徽中在京會宴衆因語論及民間事一人云醴泉縣去京不遠百姓遂行盅毒此邑須遠配流豈得令在側近一人乃云若令配流處還有百姓此人復行盅毒豈不還更損人其人云若如此欲令何處安置玄同即云若令玄同安置必令得所諸人大喜同即問之答云但行盅毒人并送與莫離支作食手明鈔本手作子衆皆歡笑貞觀中嘗在諸公主席衆莫能當高密公主乃云我段家兒郎亦有人物走令喚取段恪來令對玄同段恪雖微有辭其容儀短小召至始入門玄同即云為日已暗公主等并大驚怪云日始是齋時何為道暗玄同乃指段恪若不日暗何得短人行坐中大笑段恪面大赤更無以答玄同初上府中設食其倉曹是吳人言音多帶其聲喚粉粥為糞粥時肴饌畢陳蒸炙俱下倉曹曰何不先將糞粥來舉坐咸笑之玄同曰倉曹乃是公侯之子孫必復其始諸君何為笑也坐中復大笑玄同任荊王友所司差攝祭官祠社於壇所清齋玄同在幕內坐有犬來遺糞穢於牆上玄同乃取支床磚自擊之傍人怪其率問曰何為自徹支床磚打狗玄同曰可不聞苟利社稷專之亦可出啓顏録王福畤唐王福畤名行溫恭纍授齊澤二州世以才學稱子勉據勃俱以文筆著天下福畤與韓琬父有舊福畤及婚崔氏生子勃勃原作勸據明鈔本改嘗致書韓父曰勉據勃文章并清俊近小者欲似不惡韓復書曰王武子有馬癖明公有譽兒癖王氏之癖無乃多乎要當見文章方可定耳福畤乃致諸子文章韓與名人閲之曰生子若是信亦可夸出御史台記許敬宗唐吏部侍郎楊思玄恃外戚之貴待選流多不以禮而排斥之為選人夏侯彪之所訟御史中丞郎余慶彈奏免中書令許敬宗曰固知楊吏部之敗也或問之宗曰一彪一狼共著一羊不敗何待敬宗性輕傲見人多忘之或謂其不聰曰卿自難記若遇何劉沈謝暗中摸索著亦可識出國朝雜記高崔嵬唐散樂高崔嵬善弄癡太宗命給使捺頭向水下良久出而笑之帝問曰見屈原云我逢楚懷王無道乃沉汨羅水汝逢聖明主何為來帝大笑賜物百段出朝野僉載元晉唐曹懷舜金鄉人父維叔明鈔本維叔作繼奴下同死王事贈云麾將軍懷舜襁褓授遊擊將軍歷內外文武官則天云懷舜久歷文資而屈於武職自左鷹揚衛郎將拜右玉鈐衛將軍有宋州司馬曹元本父名乞伯明汲縣丞元晉好談多警策或問元晉元本懷舜從叔元晉應聲答曰雖則同堂俱非本族人怪而問之晉曰元本乞伯子懷舜繼叔兒以此知矣出御史台記趙謙光唐諸郎中不自即員外郎拜者謂之土山頭果毅言便拜崇品有似長征兵士便授邊遠果毅趙謙光自彭州司馬入為大理正遷戶部郎中戶部員外賀遂涉詠曰員外由來美郎中望不優寧知粉署里翻作土山頭趙謙光答詩曰錦帳隨情設金爐任意薰唯愁員外置明鈔本置作署不應列星文人以為奇句出談賓録沈佺期唐沈佺期以罪謫遇恩復官秩而未還朱衣因內宴群臣皆歌回波樂詞起舞由是多求遷擢佺期詞曰回波爾時佺期流向嶺外生歸身名已蒙齒録袍笏未復牙緋中宗即以緋魚袋賜之出本事詩崔日用崔日用為御史中丞賜紫是時佩魚須有特恩亦因宴會命群臣撰詞日用曰臺中鼠子直須諳信足跳梁上壁龕倚翻燈脂污張五還來囓帶報韓三莫浪語直王相大家必苦賜金龜賣卻貓兒相賞中宗以金魚賜之出本事詩裴談唐中宗朝御史大夫裴談崇釋氏妻悍妬談畏之如嚴君時韋庶人頗襲武后之風中宗漸畏之內宴玄唱回波詞有優人詞曰回波爾時栲栳怕婦也是大好外邊秪有裴談內裏無過過字原闕據明鈔本補李老韋后意色自得以束帛賜之出本事詩李鎮惡唐李鎮惡即趙公嶠之父選授梓子州郪縣令與友人書云州帶子號縣帶郪名由來不屬老夫併是婦兒官職出傳載盧廙唐殿中內供奉盧廙持法細密雖親故貴勢無所回避舉止間雅必翔而後集嘗於景龍觀監官行香右臺諸御史亦預焉臺中先號右臺為高麗僧時有一胡僧徙倚於前庭右臺侍御史黃守禮指之曰何胡僧而至此廙徐謂之曰亦有高麗僧何獨怪胡僧為一時歡笑廙與李畬俱非善射者嘗三元禮射廣畬雖引滿射俱不及垛而墜互互原作玄據明鈔本改言其工拙畬戲曰畬與盧箭俱三十步左右不曉畬曰畬箭去垛三十步盧箭去身三十步歡笑久之出御史臺記松壽唐韋慶本女選為妃詣朝堂欲謝而慶本兩耳先卷朝士多呼為卷耳時長安公松壽見慶本而賀之因曰僕固知足下女得妃慶本曰何以知之松壽乃自摸其耳而卷之曰卷耳后妃之德出啓顏録封抱一唐封包一任益州九隴尉與同列戲白打賭錢座下數百錢輸已略略原作客據明鈔本改盡便欲斂手傍人謂之曰何不更戲戲字原闕據明鈔本補覓錢回取之抱一乃舉手摸錢曰同明鈔本同作賜賜也何敢望回山東人謂盡為賜故言賜也出啓顏録尹神童唐尹神童每説伯樂令其子執馬經畫樣以求馬經年無有似者歸以告父更令求之出見大蝦蟆謂父曰得一馬略與相同而不能具伯樂曰何也對曰其隆顱跌目脊郁縮但蹄不如纍趍耳伯樂曰此馬好跳躑不堪也子笑乃止出朝野僉載
