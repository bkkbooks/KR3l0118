body:
  text: 閻浮龍閻浮龍龍在閻浮提者五十七億龍于翟阤尼不降濁水西洲人食濁則夭單越人惡冷風龍不發冷于弗姿提洲不作雷聲不起電光東洲惡之也其雷聲兜率天作歌頌音閻浮提作海潮音其雨兜率天上雨摩尼獲世城雨美膳海中注雨不絶如連阿修中雨羅丘伏閻浮提中雨清浮水吳山人隴州吳山縣有一人乘白馬夜行凡縣人皆夢之語曰我欲移居暫假爾牛言訖即過其夕數百家牛及明皆被體汗流如水于縣南山曲出一湫方圓百餘步里人以此湫因牛而遷謂之特牛湫也白將軍僧元可言近傳有白將軍者嘗于曲江洗馬馬忽跳出驚走前足有物色白如衣帶縈繞數匝遽令解之血流數升白異之遂封紙帖中藏于衣箱一日送客至滻水出示諸客客曰盍以水試之白以劍划地成竅置蟲于中沃盥其上少頃蟲蠕而長竅中泉涌倏忽自盤若一席有黑氣如香煙徑出簷外衆懼曰必龍也遂急歸未數里風雨驟至大震數聲溫媼溫媼者即康州悅城縣孀婦也績布為業嘗于野岸拾菜見沙草中有五卵遂收歸置績筐中不數日忽見五小蛇殼一斑四青遂送于江次固無意望報也媼常濯浣于江邊忽一日見魚在水跳躍戲于媼前自爾為常漸有知者鄉里咸為龍之母敬而事之或詢以災福亦言多徵應自是媼亦漸丰足朝廷知之遣使徵入京師至全義嶺有疾卻返悅城而卒鄉里共葬之江東岸忽一夕天地晦暝風雨隨作及明移其冢于西而草木悉于西岸柳子華唐時為城都令一旦方午忽有犢車一乘前后女騎導從徑入廳事使一介告柳云龍女且來矣俄而下車左右扶衛升階與子華相見云宿命與君合為匹偶因止命酒樂極歡成禮而去自是往復為常遠近咸知之子華罷秩不知所之俗云入龍宮得水仙矣斑石京邑有一士子因山行拾得一石子青赤斑斕大如雞子甚異之置巾箱中五六年因與嬰兒弄遂失之數日晝忽風雨暝晦庭前樹下降水不絶如瀑布狀人咸異其故風雨息樹下忽見此石已破中如雞卵出殼焉乃知為龍子也張公洞義興縣山水秀絶張公洞尤奇麗里人云張道陵修行之所也中有洞壑衆未敢入土氓姚生習道挈杖瓶火負囊以入約行數百步漸漸明朗云樹依稀近通步武又十余里見二道士對奕曰何人焉得來此具言始末曰大志之士也姚生餒甚因求食旁有青泥數斗道士指曰可食此試探咀嚼覺芳馨食之遂飽道士曰爾可去慎勿語世人再拜而返密懷其余以訪市肆偶胡賈見驚曰此龍食也何方而得乃述其事俱往尋之但黑巨穴不復有路青泥出外已硬如石不可復食五台山池五台山北台下有龍池約二畝有余佛經云禁五百毒龍之所每至亭午昏霧暫開比丘及淨行居士方可一睹比丘尼及女子近即雷電風雨時大作如近池必為毒氣所吸逡巡而沒張老荊湘有僧寺背山近水水中有龍時或雷風大作損壞樹木寺中有撣鐘張老者術士也而僧不知張老惡此龍損物欲禁殺之密為法此龍已知化為人潛告僧曰某實龍也住此水多年或因出風雨損物為張老所禁性命危急非和尚救之不可倘救其命奉一寶珠以伸報答某即移于別處僧諾之夜喚張老求釋之張老曰和尚莫受此龍獻珠否此龍甚窮唯有此珠性又吝惡今若受珠他時悔無及僧不之信曰君但為我放之張老不得已乃放龍夜后送珠于僧而移出潭水張老亦辭僧去后數日忽大雷雨壞此僧舍奪其珠果如張老之言費雞師蜀川有一費雞師者善知將來之事而亦能為人禳救多在邛州蜀人皆神之時有一僧言往者雙流縣保唐寺寺有張二師者因巡行僧房見有空院將欲住持率家人掃灑之際于柱上得一小瓶子二師觀之見一蛇在瓶內覆瓶出之約長一尺文彩斑駁五色備具以杖觸之隨手而長衆悉驚異二師令一物挾之送于寺外當攜掇之際隨觸隨大以至丈余如屋椽矣二人擔之方舉送者愈懼觀者隨而益多距寺約二三里所在撼動之時增長不已衆益懼遂擊傷至于死明日此寺院中有虹蟪亭午時下寺中僧有事至臨邛見雞師説之雞師曰殺龍女矣張二師與汝寺之僧徒皆當死乎后卒如其言他應驗不可勝記竟不知是何術韋絢長足為杜元穎從事其弟妹皆識費師于京中已悉知有此事自到即詢訪雞師之術凡有病者來告雞師發即抱一雞而往及其門乃持咒其雞令入內抵病者之所雞入而死病者差雞出則病者不起矣時人遂號為費雞師又以石子置病者腹上作法結印其石子斷者其人亦不起也又能書符先焚符為灰和湯水與人吞之俄復吐出其符宛然如不燒又云城南建昌橋下其南岸先有龍窟歲常損人至有連馬而溺者如有攫拿于水當韋皋時前后運石凡幾萬數頃之石復失焉后命道士投簡于內以土築之方滿自此之后龍窟移于建昌寺佛殿下與西廊龍井通焉而建昌橋下往往損人而不甚也詢問吏卒往時人馬溺于其間良久尸浮皆白其血被吮吸已盡而尸乃出焉汾水老姥汾水邊有一老姥獲一赤鯉顏色異常不與衆魚同既攜歸老姥憐惜且奇之鑿一小池汲水養之經月余后忽見云霧興起其赤鯉即騰躍逡巡之間乃漸升霄漢其水池即竭至夜又復來如故人見之者甚驚訝以為妖怪老姥恐為禍頗追悔焉遂親至小池邊禱祝曰我本惜爾命容爾生反欲禍我耶言才絶其赤鯉躍起云從風至即入汾水唯空中遺下一珠如彈丸光晶射人其老姥得之衆人不敢取后五年老姥長子患風病漸篤醫莫能療老姥甚傷忽意取是珠以召良醫其珠忽化為一丸丹老姥曰此赤鯉遺我以救我子答我之惠也遂與子服之其病尋愈李宣李宣宰陽縣縣左有潭傳有龍居而鱗物尤美李之子惰學愛釣術日住潭上一旦龍見滿潭火發如舒錦被李子褫魄委竿而走蓋釣術多以煎燕為餌果發龍之嗜欲也濛陽湫彭州濛陽縣界地名清流有一湫鄉俗云此湫龍與西山慈母池龍為昏每歲一會新繁人王睿乃博物者多所辨正嘗鄙之秋雨后經過此湫乃遇西邊雷雨冥晦狂風拔樹王睿縶馬障樹而避須臾雷電之勢止于湫上倏然而霽天無纖云詰彼居人正符前説也云安縣西有小湯溪土俗云此溪龍與云安溪龍為親此乃不經之談也或一日風雷自小湯溪循蜀江中而下至云安縣云物回薄入溪中疾電狂霆誠可畏有柳毅洞庭之事與此相符小湯之事自目睹鹽井龍王蜀時夔州大昌鹽井水中往往有龍或白或黃鱗鬣光明攪之不動唯沮沫而已彼人不以為異近者秭歸永濟井鹵槽亦有龍蟠與大昌者無異識者曰龍之為靈瑞也負圖以升天今乃見于鹵中豈能云行雨施乎云安縣漢成宮絶頂有天池深七八丈其中有物如蜥蜴長咫尺五色備具躍于水面象小龍也有高遇者為刺史詣宮設醮忽浮出或問監官李德符曰是何祥也符曰某自生長于此且未常見漢成池中之物高既無善政諂佛佞神亦已至矣安可定其是非也夷陵清江有狼山潭其中有龍土豪李務求禱而事之往見錦衾覆水或浮出大木橫塞水面號為龍巢遂州高棟溪潭每歲龍見一如狼山之事尹皓朱梁尹皓鎮華州夏將半出城巡警時蒲雍各有兵戈相持故也因下馬于荒地中得一物如石又如卵其色青黑光滑可愛命左右收之又行三二十里見村院佛堂遂置于像前其夜雷霆大震猛雨如注天火燒佛堂而不損佛像蓋龍卵也院外柳樹數百株皆倒植之其卵已失
