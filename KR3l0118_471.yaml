body:
  text: 水族為人鄧元佐鄧元佐者穎川人也游學于吳好尋山水凡有勝境無不歷覽因謁長城宰延挹托舊暢飲而別將抵姑蘇誤入一徑其險阻紆曲凡十數里莫逢人舍但見蓬蒿而已時日色已暝元佐引領前望忽見燈火意有人家乃尋而投之既至見一蝸舍惟一女子可年二十許元佐乃投之曰余今晚至長城訪別乘醉而歸誤入此道今已侵夜更向前道慮為惡獸所損幸娘子見容一宵豈敢忘德女曰大人不在當奈何況又家貧無好茵席祗侍君子不棄即聞命矣元佐餒因舍焉女乃嚴一土塌上布軟草坐定女子設食元佐餒而食之極美女子乃就元佐而寢元佐至明忽覺其身臥在田中傍有一螺大如升子元佐思夜來所餐之物意甚不安乃嘔吐視之盡青泥也元佐歎吒良久不損其螺元佐自此栖心于道門永絶游歷耳姚氏東州靜海軍姚氏率其徒捕海魚以充歲貢時已將晚而得魚殊少方憂之忽网中獲一人黑色舉身長毛拱手而立問之不應海師曰此所謂海人見必有災請殺之以塞其咎姚曰此神物也殺之不祥乃釋而祝之曰爾能為我致群魚以免闕職之罪信為神矣毛人卻行水上數十步而沒明日魚乃大獲倍于常歲矣宋氏江西軍吏宋氏嘗市木至星子見水濱人物喧集乃漁人得一大黿黿見宋屢顧宋即以錢一千贖之放于江中后數年泊船龍沙忽有一仆夫至云元長史奉召宋恍然不知何長史也既往欻至一府官出迎與坐曰君尚相識耶宋思之實未嘗識又曰君亦記星子江中放黿耶曰然身即黿也頃嘗有罪帝命謫為水族見囚于漁人微君之惠已骨朽矣今已得為九江長相召者有以奉報君兒某者命當溺死名籍在是后數日鳴山神將朝廬山使者行必以疾風雨君兒當以此時死今有一人名姓正同亦當溺死但先期歲月間耳吾取以代之君兒宜速登岸避匿不然不免宋陳謝而出不覺已在舟次矣數日果有風濤之害死甚衆宋氏之子竟免史氏女溧水五壇村人史氏女因蒔田倦偃息樹下見一物鱗角爪距可畏來据其上已而有娠生一鯉魚養于盆中數日益長乃置投金瀨中頃之村人刈草誤斷其尾魚即奮躍而去風雨隨之入太湖而止家亦漸富其后女卒每寒食其魚輒從群魚一至墓前至今每閏年一至爾又漁人李黑獺恆張网于江忽獲一嬰兒可長三尺网為亂涎所縈浹旬不解有道士見之曰可取鐵汁灌之如其言遂解視嬰兒口鼻眉發如畫而無目口猶有酒氣衆懼復投于江漁人近有漁人泊舟馬當山下月明風恬見一大黿出水直上山頂引首四望頃之江水中涌出一彩舟有十余人會飲酒妓樂陳設甚盛獻酬久之上流有巨艦來下櫓聲振于坐中彩舟乃沒前之黿亦下未及水忽死于岸側意者水神使此黿為候望而不知巨艦之來故殛之黃氏母後漢靈帝時江夏黃氏之母浴而化為黿入于深淵其后時時出見初浴簪一銀叉及見猶在其首宋士宗母魏清河宋士宗母以黃初中夏天于浴室里浴遣家中子女闔戶家人于壁穿中窺見沐盆水中有一大黿遂開戶大小悉入了不與人相承嘗先著銀叉猶在頭上相與守之啼泣無可奈何出外去甚駛逐之不可及便入水后數日忽還巡行舍宅如平生了無所言而去時人謂士宗應行喪士宗以母形雖變而生理尚存竟不治喪與江夏黃母相似宣騫母吳孫皓寶鼎元年丹陽宣騫之母年八十因浴化為黿騫兄弟閉戶衛之掘堂內作大坎實水其黿即入坎游戲經纍日忽延頸外望伺戶小開便輒自躍赴于遠潭遂不復見江州人晉末江州人年百餘歲頂上生角后因入舍前江中變為鯉魚角尚存首自后時時暫還容狀如平生與子孫飲數日輒去晉末以來絶不復見獨角獨角者巴郡人也年可數百歲俗失其名頂上生一角故謂之獨角或忽去積載或纍旬不語及有所說則旨趣精微咸莫能測焉所居獨以德化亦頗有訓導一旦與家辭因入舍前江中變為鯉魚角尚在首后時時暫還容狀如平生與子孫飲宴數日輒去薛偉薛偉者唐乾元元年任蜀州青城縣主簿與丞鄒滂尉雷濟裴寮同時其秋偉病七日忽奄然若往者連呼不應而心頭微暖家人不忍即斂環而伺之經二十日忽長吁起坐謂家人曰吾不知人間幾日矣曰二十日矣曰即與我覷群官方食膾否言吾已蘇矣甚有奇事請諸公罷箸來聽也仆人走視群官實欲食膾遂以告皆停餐而來偉曰諸公敕司戶仆張弼求魚乎曰然又問弼曰魚人趙干藏巨鯉以小者應命汝于葦間得藏者攜之而來方入縣也司戶吏坐門東糾曹吏坐門西方奕棋入及階鄒雷方博裴啕挑實弼言干之藏巨魚也裴五令鞭之既付食工王士良者喜而殺乎遞相問誠然衆曰子何以知之曰向殺之鯉我也衆駭曰願聞其說曰吾初疾困為熱所逼殆不可堪忽悶忘其疾惡熱求涼策杖而去不知其夢也既出郭其心欣欣然若籠禽監獸之得逸莫我知也漸入山山行益悶遂下游于江畔見江潭深淨秋色可愛輕漣不動鏡涵遠虛忽有思浴意遂脫衣于岸跳身便入自幼狎水成人以來絶不復戲遇此縱適實契宿心且曰人浮不如魚快也安得攝魚而健游乎旁有一魚曰顧足下不願耳正授亦易何況求攝當為足下圖之決然而去未頃有魚頭人長數尺騎鯢來導從數十魚宣河伯詔曰城居水游浮沉異道苟非其好則昧通波薛主簿意尚浮深跡思閒曠樂浩汗之域放懷清江厭巘崿之情投簪幻世暫從鱗化非遽成身可權充東潭赤鯉嗚呼恃長波而傾舟得罪于晦昧纖鉤而貪餌見傷于明無或失身以羞其党爾其勉之聽而自顧即已魚服矣于是放身而游意往斯到波上潭底莫不從容三江五湖騰躍將遍然配留東潭每暮必復俄而饑甚求食不得循舟而行忽見趙干垂鉤其餌芳香心亦知戒不覺近口曰我人也暫時為魚不能求食乃吞其鉤乎舍之而去有頃饑益甚思曰我是官人戲而魚服縱吞其鉤趙干豈殺我固當送我歸縣耳遂吞之趙干收綸以出干手之將及也偉連呼之干不聽而以繩貫我腮乃系于葦間既而張弼來曰裴少府買魚須大者干曰未得大魚有小者十余斤弼曰奉命取大魚安用小者乃自于葦間尋得偉而提之又謂弼曰我是汝縣主簿化形為魚游江何得不拜我弼不聽提之而行罵亦不已弼終不顧入縣門見縣吏坐者奕棋皆大聲呼之略無應者唯笑曰可畏魚直三四斤余既而入階鄒雷方博裴啕桃實皆喜魚大促命付廚弼言干之藏巨魚以小者應命裴怒鞭之我叫諸公曰我是公同官而今見殺竟不相舍促殺之仁乎哉大叫而泣三君不顧而付膾手王士良者方礪刃喜而投我于幾上我又叫曰王士良汝是我之常使膾手也因何殺我何不執我白于官人士良若不聞者按吾頸于砧上而斬之彼頭適落此亦醒悟遂奉召爾諸公莫不大驚心生愛忍然趙干之獲張弼之提縣司之奕吏三君之臨階王士良之將殺皆見其口動實無聞焉于是三君并投膾終身不食偉自此平愈后纍遷華陽丞乃卒
