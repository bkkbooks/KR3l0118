body:
  text: 李舟弟李舟弟李舟之弟患風或説蛇酒可療乃求黑蛇生覆甕中加之曲薛數日蛇聲不絶及熟香氣酷烈引滿而飲須臾悉化為水唯毛發存之簷生昔有書生路逢小蛇因而收養數月漸大書生每自簷之號曰簷生其后不可簷負放之范縣東大澤中四十余年其蛇如覆舟號為神蟒人往于澤中者必被吞食書生時以老邁途經此澤畔人謂曰中有大蛇食人君宜無往時盛冬寒甚書生謂冬月蛇藏無此理遂過大澤行二十里余忽有蛇逐書生尚識其形色遙謂之曰爾非我簷生乎蛇便低頭良久方去回至范縣縣令問其見蛇不死以為異系之獄中斷刑當死書生私忿曰簷生養汝翻令我死不亦劇哉其夜蛇遂攻陷一縣為湖獨獄不陷書生獲免天寶末獨孤暹者其舅為范令三月三日與家人于湖中泛舟無故覆沒家人幾死者數四也嵩山客元和初嵩山有五六客皆寄山習業者也初秋避熱于二帝塔下日晚于塔下見一大蛇長數丈蟠繞塔心去地十數丈衆駭而觀之一客曰可充脯食之廚咸和之中一客善射或曰大者或龍神殺之恐為禍也晝脯之膳豈在此乎不如勿為諸客決議不可復止善射發一箭便中再箭蛇蟠解墜地衆共殺之諸客各務庖事操刀剸割者或有入寺求柴炭鹽酤者其勸不取者色不樂遂辭而歸其去寺數里時天色已陰天雷忽起其中亦有各歸者而數客猶在塔下須臾云霧大合遠近晦冥雨雹如泄飄風四卷折木走石雷雹激怒山川震蕩數人皆震死于塔下有先歸者路亦死其一客不欲殺者未到山居投一空蘭若闔門雷電隨客入大懼自省且非同謀令其見害乃大言曰某不與諸人共殺此蛇神理聰明不可濫罰無辜幸宜詳審言訖雷霆并收風雨消歇此客獨存鄧甲寶歷中鄧甲者事茅山道士峭岩峭岩者真有道之士藥變瓦礫符召鬼神甲精懇虔誠不覺勞苦夕少安睫晝不安床峭岩亦念之教其藥終不成受其符竟無應道士曰汝于此二般無分不可強學授之禁天地蛇術環宇之內唯一人而已甲得而歸焉至烏江忽遇會稽宰遭毒蛇螫其足號楚之聲驚動閭里凡有術者皆不能禁甲因為治之先以符保其心痛立止甲曰須召得本色蛇使收其毒不然者足將刖矣是蛇疑人禁之應走數里遂立壇于桑林中廣四丈以丹素周之乃飛篆字召十里內蛇不移時而至堆之壇上高丈余不知幾萬條耳后四大蛇各長三丈偉如汲桶蟠其堆上時百餘步草木盛夏盡皆黃落甲乃跣足攀緣上其蛇堆之上以青條敲四大蛇腦曰遣汝作五主掌界內之蛇焉得使毒害人是者即住非者即去甲卻下蛇堆崩倒大蛇先去小者繼往以至于盡只有一小蛇土色肖箸其長尺余懵然不去甲令舁宰來垂足叱蛇收其毒蛇初展縮難之甲又叱之如有物促之只可長數寸耳有膏流出其背不得已而張口向瘡吸之宰覺其腦內有物如針走下蛇遂裂皮成水只有脊骨在地宰遂無苦厚遺之金帛時維揚有畢生有常弄蛇千條日戲于闤闠遂大有資産而建大第及卒其子鬻其第無奈其蛇因以金帛召甲甲至與一符飛其蛇過城垣之外始貨得宅甲后至浮梁縣時逼春凡是茶園之內素有蛇毒人不敢掇其茗斃者已數十人邑人知甲之神術斂金帛令去其害甲立壇召蛇王有一大蛇如股長丈余煥然錦色其從者萬條而大者獨登壇與甲較其術蛇漸立首隆數尺欲過甲之首甲以杖上拄其帽而高焉蛇首竟困不能逾甲之帽蛇乃踣為水余蛇皆斃倘若蛇首逾甲即甲為水焉從此茗園遂絶其毒虺甲后居茅山學道至今猶在焉蘇閏俗傳有媼嫗者嬴秦時嘗得異魚放于康州悅城江中后稍大如龍嫗汲浣于江龍輒來嫗邊率為常他日嫗治魚龍又來以刀戲之誤斷其尾嫗死龍擁沙石墳其墓上人呼為掘尾為立祠宇千余年太和末有職祠者欲神其事以惑人取群小蛇術禁之藏祠下目為龍子遵令飲酒置巾箱中持詣城市越人好鬼怪爭遺之職祠者輒收其半開成初滄州故將蘇閏為刺史心知其非且利其財益神之得金帛用修佛寺官舍他日軍吏為蛇嚙閏不使治乃整簪笏命走語嫗所嚙者俄頃死乃云慢神罰也愚民遽唱其事信之益堅嘗有殺其一蛇乾于火藏之已而祠中蛇逾多迄今猶然利州李録事開成中有隴西李生為利州録事參軍居于官舍中嘗曉起見蛇數百在庭生大懼盡命棄于郊野外其明旦群蛇又集于庭生益懼之且異也亦命棄去后一日群蛇又至李生驚曰豈天將禍我乎戚其容者且久后旬余生以贓罪聞于刺史遣吏至門將按其罪且聞于天子生惶駭無以自安縊于庭樹絶脰而死生有妻感生不得其死亦自縊焉于是其家僮震懾委身于井者且數輩果符蛇見之禍刺史即李行樞也咱老長壽老僧聾言他時在衡山村人為毒蛇所噬須臾而死發解腫起尺余其子曰咱老若在當勿慮遂迎咱至乃以灰圍其尸開四門先曰若從足入則不救矣遂踏步據固久而蛇不至咱大怒乃取飯數升搗蛇形詛之忽蠕動出門有頃飯蛇引一蛇從死者頭入徑及其瘡尸漸低蛇縮而死村人遂活馮但馮但者常有疾醫令浸蛇酒服之初服一甕于疾減半又令家人園中執一蛇投甕中封閉七日及開蛇躍出舉首尺余出門因失所在其過迹地墳起數寸陸紹郎中陸紹言嘗記一人浸蛇酒前后殺蛇數十頭一日自臨甕窺酒有物跳出嚙其鼻將落視之乃蛇頭骨也因瘡毀其鼻如削焉鄭翬進士鄭翬説家在高郵有親表盧氏莊近水其鄰人數家共殺一白蛇未久忽大震電雨發洪數家陷溺無遺唯盧宅當中一家無恙張堊子梓潼縣張堊子神乃五丁拔蛇之所也或云雋州張生所養之蛇因而祠時人謂為張堊子其神甚靈偽蜀王建世子名元膺聰明博達騎射絶倫牙齒常露多以袖掩口左右不敢仰視蛇眼而黑色凶惡鄙褻通夜不寐竟以作逆伏誅就誅之夕梓潼廟祝亟為堊子所責言我久在川今始方歸何以致廟宇荒穢如是耶由是蜀人乃知元膺為廟蛇之精矣選仙場南中有選仙場場在峭崖之下其絶頂有洞穴相傳為神仙之窟宅也每年中元日拔一人上升學道者築壇于下至時則遠近冠帔咸萃于斯備科儀設齋醮焚香祝數七日而后衆推一人道德最高者嚴潔至誠端簡立于壇上余人皆摻袂別而退遙頂禮顧望之于時有五色祥云徐自洞門而下至于壇場其道高者冠衣不動合雙掌躡五云而上升觀者靡不涕泗健羡望洞門而作禮如是者年一兩人次年有道高者合選忽有中表間一比丘自武都山往與訣別比丘懷雄黃一斤許贈之曰道中唯重此藥請密置于腰腹之間慎勿遺失之道高者甚喜遂懷而升壇至時果躡云而上后旬余大覺山岩臭穢數日后有獵人自岩旁攀緣造其洞見有大蟒蛇腐爛其間前后上升者骸骨山積于巨穴之間蓋五色云者蟒之毒氣常呼吸此無知道士充其腹哀哉狗仙山巴賨之境地多岩崖水怪木怪無所不有民居溪壑以弋獵為生涯嵌空之所有一洞穴居人不能測其所往獵師縱犬于此則多呼之不回瞪目搖尾瞻其崖穴于時有彩云垂下迎獵犬而升洞如是者年年有之好道者呼為狗仙山偶有智者獨不信之遂絏一犬挾弦弧往之至則以粗緪系其犬腰系于拱木然后退身而觀之及彩云下犬縈身而不能隨去嗥叫者數四旋見有物頭大如甕雙目如電鱗甲光明冷照溪谷漸垂身出洞中觀其犬獵師毒其矢而射之既中不復再見頃經旬日臭穢滿山獵師乃自山頂縋索下觀見一大蟒腐爛于岩間狗仙山之事永無有之李黃元和二年隴西李黃鹽鐵使遜之猶子也因調選次乘暇于長安東市瞥見一犢車侍婢數人于車中貨易李潛目車中因見白衣之姝綽約有絶代之色李子求問侍者曰娘子孀居袁氏之女前事李家今身依李之服方除服所以市此耳又詢可能再從人乎乃笑曰不知李子乃出與錢帛貨諸錦繡婢輩遂傳言云且貸錢買之請隨到莊嚴寺左側宅中相還不負李子悅時已晚遂逐犢車而行礙夜方至所止犢車入中門白衣姝一人下車侍者以帷擁之而入李下馬俄見一使者將榻而出云且坐坐畢侍者云今夜郎君豈暇領錢乎不然此有主人否且歸主人明晨不晚也李子曰乃今無交錢之志然此亦無主人何見隔之甚也侍者入復出曰若無主人此豈不可但勿以疏漏為誚也俄而侍者云屈郎君李子整衣而入見青服老女郎立于庭相見曰白衣之姨也中庭坐少頃白衣方出素裙粲然凝質皎若辭氣間雅神仙不殊略序款曲翻然卻入姨坐謝曰垂情與貨諸彩色比日來市者皆不如之然所假如何深憂愧李子曰彩帛粗繆不足以奉佳人服飾何敢指價乎答曰渠淺陋不足侍君子巾櫛然貧居有三十千債負郎君倘不棄則願侍左右矣李子悅拜于侍側俯而圖之李子有貨易所先在近遂命所使取錢三十千須臾而至堂西間門然而開飯食畢備皆在西間姨遂延李子入坐轉盼炫煥女郎旋至命坐拜姨而坐六七人具飯食畢命酒歡飲一住三日飲樂無所不至第四日姨云李郎君且歸恐尚書怪遲后往來亦何難也李亦有歸志承命拜辭而出上馬仆人覺李子有腥臊氣異常遂歸宅問何處許日不見以他語對遂覺身重頭旋命被而寢先是婚鄭氏女在側云足下調官已成昨日過官覓公不得某二兄替過官已了李答以愧佩之辭俄而鄭兄至責以所往行李已漸覺恍惚祗對失次謂妻曰吾不起矣口雖語但覺被底身漸消盡揭被而視空注水而已唯有頭存家大驚懾呼從出之仆考之具言其事及去尋舊宅所乃空園有一皂莢樹樹上有十五千樹下有十五十余了無所見問彼處人云往往有巨白蛇在樹下便無別物姓袁者蓋以空園為姓耳復一説元和中鳳翔節度李聽從子琯任金吾參軍自永寧里出遊及安化門外乃遇一車子通以銀裝頗極鮮麗駕以白牛從二女奴皆乘白馬衣服皆素而姿容婉媚琯貴家子不知檢束即隨之將暮焉二女奴曰郎君貴人所見莫非麗質某皆賤質又粗陋不敢當公子厚意然車中幸有姝麗誠可留意也琯遂求女奴乃馳馬傍車笑而回曰郎君但隨行勿舍去某適已言矣琯既隨之聞其異香盈路日暮及奉誠園二女奴曰娘子住此之東今先去矣郎君且此回翔某即出奉迎耳車子既入琯乃駐馬于路側良久見一婢出門招手琯乃下馬入座於廳中但聞名香入鼻似非人世所有琯遂令人馬入安邑里寄宿黃昏后方見一女子素衣年十六七姿艷若神仙琯自喜之心所不能諭及出已見人馬在門外遂別而歸才及家便覺腦疼斯須益甚至辰巳間腦裂而卒其家詢問奴仆昨夜所歷之處從者具述其事云郎君頗聞異香某輩所聞但蛇臊不可近舉家冤駭遽命仆人于昨夜所止之處復驗之但見枯槐樹中有大蛇蟠屈之迹乃伐其樹發掘已失大蛇但有小蛇數條盡白皆殺之而歸
