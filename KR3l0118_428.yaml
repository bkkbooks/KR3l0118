body:
  text: 裴旻裴旻裴旻為龍華軍使守北平北平多虎旻善射嘗一日斃虎三十有一既而于山下四顧自矜有父老至曰此皆彪也似虎而非將軍若遇真虎無能為也旻曰真虎安在老父曰自此而北三十里往往有之旻躍馬而往次叢薄中果有一虎騰出狀小而勢猛據地一吼山石震裂旻馬辟易弓矢皆墜殆不得免自此慚懼不復射虎斑子山魈者嶺南所在有之獨足反踵手足三歧其牝好傅脂粉于大樹空中作窠有木屏風帳幔食物甚備南人山行者多持黃脂鉛粉及錢等以自隨雄者謂之山公必求金錢遇雌者謂之山姑必求脂粉與者能相護唐天寶中北客有嶺南山行者多夜懼虎欲上樹宿忽遇雌山魈其人素有輕繼因下樹再拜呼山姑樹中遙問有何貨物人以脂粉與之甚喜謂其人曰安臥無慮也人宿樹下中夜有二虎欲至其所山魈下樹以手撫虎頭曰斑子我客在宜速去也二虎遂去明日辭別謝客甚謹其難曉者每歲中與人營田人出田及種余耕地種植并是山魈谷熟則來喚人平分性質直與人分不取其多人亦不敢取多取多者遇天疫病劉荐天寶末劉荐者為嶺南判官山行忽遇山魈呼為妖鬼山魈怒曰劉判官我自遊戲何纍于君乃爾罵我遂于下樹枝上立呼班子有頃虎至令取劉判官荐大懼策馬而走須臾為虎所攫坐腳下魈乃笑曰劉判官荐大懼更罵我否左右再拜乞命徐曰可去虎方舍荐荐怖懼幾絶扶歸病數日方愈荐每向人説其事勤自勵漳浦人勤自勵者以天寶末充健兒隨軍安南及擊吐蕃十年不還自勵妻林氏為父母奪志將改嫁同縣陳氏其婚夕而自勵還父母具言其婦重嫁始末自勵聞之不勝忿怒婦宅去家十余里當破吐蕃得利劍是晚因杖劍而行以詣林氏行八九里屬暴雨天晦進退不可忽遇電明見道左大樹有旁孔自勵權避雨孔中先有三虎子自勵并殺之久之大虎將一物納孔中須臾復去自勵聞有人呻吟徑前捫之即婦人也自勵問其為誰婦人云己是林氏女先嫁勤自勵為妻自勵從軍未還父母無狀見逼改嫁以今夕成親我心念舊不能再見憤恨莫已遂持巾于宅后桑林自縊為虎所取幸而遇君今猶未損倘能相救當有后報自勵謂曰我即自勵也曉還至舍父母言君適人故拔劍而來相訪何期于此相遇乃相持而泣頃之虎至初大吼叫然后倒身入孔自勵以劍揮之虎腰中斷恐又有虎故未敢出尋而月明后果一虎至見其偶斃吼叫愈甚自爾復倒入又為自勵所殺乃負妻還家今尚無恙宣州兒天寶末宣州有小兒其居近山每至夜恆見一鬼引虎逐己如是已十數度小兒謂父母云鬼引虎來則必死世人云為虎所食其鬼為倀我死為倀必矣若虎使我則引來村中村中宜設阱于要路以待虎可得也后數日果死于虎久之見夢于父云身已為倀明日引虎來宜于西偏速修一阱父乃與村人作阱阱成之日果得虎笛師唐天寶末祿山作亂潼關失守京師之人于是鳥散梨園弟子有笛師者亦竄于終南山谷中有蘭若因而寓居清宵朗月哀亂多思乃援笛而吹嘹唳之聲散漫山谷俄而有物虎頭人形著白夾單衣自外而入笛師驚懼下階愕眙虎頭人曰美哉笛乎可復吹之如是纍奏五六曲曲終久之忽寐乃咍嘻大鼾師懼覺乃抽身走出得上高樹枝葉陰密能蔽人形其物覺后不見笛師因大懊歎云不早食之被其逸也乃立而長嘯須臾有虎十余頭悉至狀如朝謁虎頭云適有吹笛小兒乘我之寐因而奔竄可分路四遠取之言訖各散去五更后復來皆人語云各行四五里求之不獲會月落斜照忽見人影在高樹上虎顧視笑曰謂汝云行電滅而乃在茲遂率諸虎使皆取攫既不可及虎頭復自跳身亦不至遂各散去少間天曙行人稍集笛師乃得隨還張竭忠天寶中河南緱氏縣東太子陵仙鶴觀常有道士七十余人皆精專修習法菉齋戒咸備有不專者不之住矣常每年九月三日夜有一道士得仙已有舊例至旦則具姓名申報以為常其中道士每年到其夜皆不扃戶各自獨寢以求上升之應后張竭忠攝緱氏令不信至時乃令二勇士持兵器潛覘之初無所睹至三更后見一黑虎入觀來須臾銜出一道士二人射之不中虎棄道士而去至明無人得仙者具以此物白竭忠申府請弓矢大獵于太子陵東石穴中格殺數虎有金簡玉菉洎冠帔及人之發骨甚多斯皆謂每年得仙道士也自后仙鶴觀中即漸無道士今并休廢為陵使所居裴越客唐乾元初吏部尚書張鎬貶扆州司戶先是鎬之在京以次女德容與仆射裴冕第三子前藍田尉越客結婚焉已克迎日而鎬左遷遂改期來歲之春季其年越客則速裝南邁以畢嘉禮春仲拒扆百里鎬知其將至矣張斥在遠方抱憂惕深喜越客遵約而至因命家族宴于花園而德容亦隨姑姨妹遊焉山郡蕭條竹樹交密日暮衆將歸或后或先紛紜笑語忽有猛虎出自竹間遂擒德容跳入翳薈衆皆驚駭奔告張夜色已昏計力俱盡舉家號哭莫知所為及曉則大發人徒求骸骨于山野間周回遠近曾無蹤迹由是夕之前夜越客行舟去郡三二十里尚未知其妻之為虎暴乃召仆夫十數輩登岸徐行其船亦隨焉不二三里遇水次板屋屋內有榻因掃拂即之憩焉仆從羅列于前后俄聞有物來自林木之間衆乃靜伺微月之下忽見猛虎負一物至衆皆惶撓則共闞喝之仍大擊板屋并物其虎徐行尋俯于板屋側留下所負物遂入山間共窺看云是人尚有余喘越客即令舁之登舟因促使解纜然后船中烈燭熟視乃是十六七美女也容貌衣服固非村間之所有越客深異之則遣群婢看疹之雖髻被散衣破服裂而身膚無少損群婢漸以湯飲灌之即能微微入口久之神氣安集俄復開目與之言語莫肯應夜久即有自郡至者皆云張尚書次女昨夜遊園為暴虎所食至今求其殘骸未獲聞者遂以告之于越客即遣群婢具以此詢德容因號啼不止越客既登岸遂以其事列于鎬鎬凌晨躍馬而至既悲且喜遂與同歸而婚媾果諧其期自是黔峽往往建立虎媒之祠焉今尚有存者盧造汝州葉縣令盧造者有幼女大歷中許嫁同邑鄭楚之子元方俄而楚録潭州軍事造亦辭而寓葉后楚卒元方護喪居江陵數年間音問兩絶縣令韋計為子娶焉其吉辰元方適到會武昌戍邊兵亦止其縣縣隘天雨甚元方無所容徑往縣東十余里佛舍舍西北隅有若小獸號鳴者出火視之乃三虎雛目尚未開以其小未能害人且不忍殺閉門堅拒而已約三更初虎來觸其門不得入其西有窗亦甚堅虎怒搏之櫺拆陷頭于中為左右所轄進退不得元方取佛塔磚擊之虎吼怒拿攫終莫能去連擊之俄頃而斃既而門外若女人呻吟氣甚困劣元方問曰門外呻吟者人耶鬼耶曰人也曰何以到此曰妾前盧令女也今夕將適韋氏親迎方登車為虎所執負荷而來投此今夕無損而甚畏其復來能救乎元方奇之執炬出視乃真衣纓也年十七八禮服儼然泥水皆徹扶入復固其門遂拾佛塔毀像以繼其明女曰此何處也曰縣東佛舍爾元方言姓名且話舊諾女亦能記之曰妾父曾許妻君一旦以君之絶耗也將嫁韋氏天命難改虎送歸君莊去此甚近君能送歸請絶韋氏而奉巾櫛及明送歸其家其家以虎攫去方將制服忽見其來喜若天降元方致虎于縣且具言其事縣宰異之以盧氏歸于鄭焉當時聞者莫不歎異之
