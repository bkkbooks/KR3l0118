body:
  text: 宋子賢宋子賢隋煬帝大業九年唐縣人宋子賢善為幻術每夜樓上有光明能變作佛形自稱彌勒佛出世又懸鏡於堂中壁上盡為獸形有人來禮謁者轉其鏡遣觀來生像或作蛇獸形子賢輒告之罪業當更禮念乃轉人形示之遠近惑信聚數千百人遂潛作亂事泄官捕之夜至繞其所居但見火坑兵不敢進其將曰此地素無坑止妖妄耳及進復無火遂擒斬之胡僧唐貞觀中西域獻胡僧呪術能死人能生人太宗令于飛騎中取壯勇者試之如言而死如言而生帝以告太常少卿傅奕奕曰此邪法也臣聞邪不犯正若便呪臣必不能行帝召僧呪奕奕對之無所覺須臾胡僧忽然自倒若為所擊便不復蘇矣祖珍儉唐咸亨中趙州祖珍儉有妖術懸水甕於梁上以刀砍之繩斷而甕不落又於空房內密閉門置一甕水橫刀其上人良久入看見儉支解五段水甕皆是血人去之後平復如初冬月極寒石臼冰凍呪之拔出賣卜於信都市日取百錢蓋君平之法也後被人糾告引向市斬之顏色自若了無懼命紙筆作詞精彩不撓葉道士唐陵空觀葉道士呪刀盡力斬病人肚橫桃柳於腹上桃柳斷而肉不傷後將雙刀砍一女子應手兩段血流遍地家人大哭道士取續之噴水而呪須臾平復如故河南妖主唐河南府立德坊及南市西坊皆有胡妖神廟每歲商胡祈福烹豬殺羊琵琶鼓笛酣歌醉舞酬神之後募一胡為妖主看者施錢並與之其妖主取一橫刀利同霜雪吹毛不過以刀刺腹刃出於背仍亂擾腸肚流血食頃噴水呪之平復如故此蓋西域之幻法也梁州妖主唐梁州妖神祠至祈禱日妖主以利鐵從額上釘之直洞腋下即出門身輕若飛須臾數百里至西妖神前舞一曲即却至舊妖所乃拔釘一無所損臥十餘日平復如初莫知其所以然也明崇儼唐明崇儼有術法大帝試之為地窖遣妓奏樂引儼至謂曰此地常聞絃管是何祥也卿能止之儼曰諾遂書二桃符於其上釘之其聲寂然上笑喚妓人問云見二龍頭張口向下遂怖懼不敢奏樂也上大悅劉靖妻唐蜀縣令劉靖妻患正諫大夫明崇儼診之曰須得生龍肝食之必愈靖以為不可得儼乃書符乘風放之上天須臾有龍下入甕水中剔取肝食之而差大帝盛夏須雪及枇杷龍眼子儼坐頃間往陰山取雪至嶺取果子並到食之無別時瓜未熟上思之儼索百錢將去須臾得一大瓜云緱氏老人園內得之上追老人至問之云土埋一瓜擬進適看唯得百錢耳儼獨臥堂中夜被刺死刀子仍在心上勑求賊甚急竟無蹤緒或以為儼役鬼勞動被鬼殺之孔子曰攻乎異端斯害也已信哉鼎師唐則天朝有鼎師者瀛博野人有奇行太平公主進則天試之以銀甕盛酒三斗一舉而飲盡又曰臣能食醬即令以銀甕盛醬一斗鼎師以匙抄之須臾即竭則天欲與官鼎曰情願出家即與剃頭後則天之復辟也鼎曰如來螺髻菩薩寶首若能修道何必剃除遂長髮使張潛決一百不廢行動亦無瘡痍時人莫測李慈德唐大足年中有妖妄人李慈德自云能行符書厭則天於內安置布豆成兵馬畫地為江河與給使相知削竹為鎗纏被為甲三更於內反宮人擾亂相投者十二三羽林將軍楊玄基聞內裏聲叫領兵斬關而入殺慈德閹豎數十人惜哉慈德以厭為容以厭而喪葉法善唐孝和帝令內道場僧與道士各述所能久而不決玄都觀葉法善取胡桃二升並殼食之並盡僧仍不伏法善燒一鐵鉢赫赤兩手欲合老僧頭上僧唱賊袈裟掩頭而走孝和撫掌大笑羅公遠唐道士羅公遠幼時不慧遂入梁山數年忽有異見言事皆中勑追入京先天中皇太子設齋遠從太子乞金銀器物太子靳固不與遠曰少時自取太子自封署房門須臾開視器物一無所見東房先封閉往視之器物並在其中又借太子所乘馬太子怒不與遠曰已取得來見於後園中放在太子急往櫪上檢看馬在如故侍御史袁守一將食器數枚就羅公遠看年命奴擎衣襆在門外不覺須臾在遠公衣箱中諸人大驚莫知其然北山道者唐張守圭之鎮范陽檀州密雲令有女年十七姿色絶人女病踰年醫不愈密雲北山中有道者衣黃衣在山數百年稱有道術令自至山請之道人既至與之方女病立已令喜厚其貨財居月餘女夜臥有人與之寢而私焉其人每至女則昏魘及明人去女復如常如是數夕女懼告母母以告令乃移牀近己夜而伺之覺牀動掩焉擒一人遽命燈至乃北山道者令縛而訊之道者泣曰吾命當終被惑乃爾吾居北山六百餘載未常到人間吾今垂千歲矣昨蒙召殷勤所以到縣及見公女意大悅之自抑不可於是往來吾有道術常晝日能隱其形所以家人不見今遇此厄夫復何言令竟殺之東明觀道士唐開元中宮禁有美人忽夜夢被人邀去縱酒密會極歡而歸歸輒流汗倦怠後因從容奏於帝帝曰此必術士所為也汝若復往但隨宜以物識之其夕熟寐飄然又往美人半醉見石硯在前乃密印手文於曲房屏風之上寤而具啓帝乃潛以物色令於諸宮觀中求之果於東明觀得其屏風手文尚在所居道士已遁矣東巖寺僧博陵崔簡少敏惠好異術嘗遇道士張元肅曉以道要使役神物坐通變化唐天寶二載如蜀郡郡有呂誼者遇簡而厚幣以遺意有所為簡問所欲乃曰繼代有女未嘗見人閨帷之中一夕而失意者明公蘊非常之術願知所捕瞑目無恨矣簡曰易耳即於別室夜設几席焚名香以降神靈簡令呂生伏劍於戶若胡僧來可執之求女慎無傷也簡書符呵之符飛出食頃間風聲拔樹發屋忽聞一甲卒進曰神兵備願王所用簡曰主人某日失女可捕來卒曰唯東山上人每日以呪水取人得非是乎簡曰若然可速捕來卒去須臾還曰東山上人聞之駭怒將下金剛伐君奈何簡曰無苦又書符飛之倏忽有神兵萬計皆奇形異狀執劍戟列庭俄而西北上見一金剛來長數十丈張目叱簡兵簡兵俯伏不敢動簡劍步於壇前神兵忽隱即見金剛駭矣久之無所見忽有一物豬頭人形著豹皮水褌云上人願起居仙官簡踞坐而命之紫衣胡僧趨入簡讓曰僧盜主人女安敢妄有役使初僧拒詐呂生忽於戶間躍出執而尤之僧迫不隱即曰伏矣貧道行大力法蓋聖者致耳非僧所求今即歸之無苦相逼向非仙宮之命君豈望乎願令聖者取來俄頃見豬頭負女至冥然如睡簡曰宜取井花水為桃湯洗之即醒遂自陳云初睡中夢一物豬頭人身攝去不知行近遠至一小房中見胡僧相淩問何處乃云天上也便禁閉無得出是夜有兵騎造門豬頭又至云崔真人有命方得歸然某來時私於僧房門上塗少脂粉有三指迹若以此尋可獲呂生厚遺簡而陰求僧門所記餘數月遊東巖寺入曲房忽見指迹於門右扇遽追之僧宿昔已去莫知所之寺與呂生居處可十里有餘耳荊術士唐大曆中有荊士從南來止於陟圯寺好酒少有醒時因寺中大齋會人衆數千術士忽曰余有一技可代抃瓦廅珠之歡也乃合彩色於一器中驔步抓目徐祝數十言方飲水再三噀壁上成維摩問疾變相五色相宜如新寫逮半日餘色漸薄至暮都滅惟金粟綸巾鶖子衣上一花經兩日猶在梵僧難陀唐丞相魏公張延賞在蜀時有梵僧難陀得如幻三昧入水火貫金石變化無窮初入蜀與三尼俱行或大醉狂歌戍將將斷之乃僧至且曰某寄迹桑門別有藥術因指三尼此妙於歌管戍將反敬之遂留連為辦酒夜會客與劇飲僧假襔襠巾幗市鉛黛飾其三尼及坐含睇調笑逸態絶世飲將闌僧謂尼曰可謂押衙踏某曲也因徐進對舞曳緒回雪迅赴摩趺技又絶倫也良久曲終而舞不已僧喝曰婦女風耶忽起取戍將佩刀衆謂酒狂驚走僧乃拔刀砍之皆踣於地血及數尺戍將大懼呼左右縛僧僧笑曰無草草徐舉尼三枝筇枝也血乃酒耳又嘗在飲會令人斷其頭釘耳於柱無血身坐席上酒至瀉入脰瘡中面赤而歌手復抵節會罷自起提首安之初無痕也時時預言人凶衰皆迷語事過方曉成都有百姓供養數日僧不欲住閉關留之僧因走入壁間百姓遽牽漸入惟餘袈裟角頃亦不見來日壁上有畫僧焉其狀形似日月漸薄積七日空有黑迹至八日黑迹亦滅已在彭州矣後不知所之太白老僧大唐中有平陽路氏子性好奇少從道士遊後廬於太白山嘗一日有老僧叩門路君延坐與語久之僧曰檀越好奇者然未能臻玄奧之樞徒為居深山中莫若襲輕裘馳駿馬遊朝市可不快平生志寧能與麋鹿為伍乎路君謝曰吾師之言若真有道者然而不能示我玄妙之迹何為張虛詞以自炫耶僧曰請弟子觀我玄妙之蹤言訖即於衣中出一合子徑寸餘其色黑而光既啓之即以身入俄而化為一鳥飛沖天
