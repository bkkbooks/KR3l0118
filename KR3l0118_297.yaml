body:
  text: 丹丘子丹丘子隋開皇末有老翁詣唐高祖神堯帝狀貌甚異神堯欽遲之從容置酒飲酣語及時事曰隋氏將絶李氏將興天之所命其在君乎願君自愛神堯惕然自失拒之翁曰既為神授寧用爾耶隋氏無聞前代繼周而興事踰晉魏雖偷安天位平定南土蓋為君驅除天將有所啓耳神堯陰喜其言因訪世故翁曰公積德入門又負至貴之相若應天受命當不勞而定但當在丹丘子之後帝曰丹丘為誰翁曰與公近籍但公不知耳神器所屬唯此二人然丹丘先生凝情物外恐不復以世網纍心儻或俯就公若不相持於中原當為其佐神堯曰先生安在曰隱居鄠杜間帝遂袖劍詣焉帝之來雖將不利於丹丘然而道德玄遠貌若冰壺覩其儀而必駭神聳至則伏竭於苫宇之下先生隱几持頤塊然自處拜未及起先生遽言曰吾久厭濁世汝羶於時者顯晦既殊幸無見忌帝愕而謝之因跪起曰隋氏將亡已有神告當天祿者其在我宗僕夙叶冥徵謂鍾末運竊知先生之道亦將契天人之兆夫兩不相下必將決雄雌於鋒刃衒智力於權詐苟修德不競僕懼中原久罹劉項之患是來也實有心焉欲濟斯人於塗炭耳殊不知先生棄唐虞之揖讓躡巢許之遐蹤僕所謂醯雞夏蟲未足以窺大道也生先笑而頷之帝復進曰以天下之廣豈一心一慮所能周哉余視前代之理亂在輔佐得其人耳苟非伊周皋夔之徒秦漢以還皆璅璅庸材不足數漢祖得蕭張而不盡其用可為太息今先生尚不屈堯舜之位固蔑視伊皋矣一言可以致昌運得無有以誨我乎先生曰昔陶朱以會稽五千之餘衆卒殄彊吳後去越相齊於齊不足稱者豈智於越而愚於齊蓋功業隨時不可妄致廢興既自有數時之善否豈人力所為且非吾之知也訖不對帝知其不可挹也悵望而還武德初密遣太宗鄠杜訪焉則其室已墟矣瀚海神并州北七十里有一古冢貞觀初每至日夕即有鬼兵萬餘旗幡鮮潔圍繞此冢須臾冢中又出鬼兵數千步騎相雜於冢傍力戰夜即各退如此近及一月忽一夕復有鬼兵萬餘自北而至去冢數里而陳一耕夫見之驚走有一鬼將令十餘人擒之至前謂曰爾勿懼我瀚海神也被一小將竊我愛妾逃入此冢中此冢張公又借之兵士與我力戰我離瀚海月餘未獲此賊深憤之君當為我詣此冢造張公言我自來收叛將何乃藏之冢中仍更借兵拒我當速逐出不然即終殺爾仍使兵百人監此耕夫往耕夫至冢前高聲傳言良久冢中引兵出陳有二神人並轡而立於大旗下左右劍戟如林遽召此耕夫前亦令傳言曰我生為鋭將三十年死葬此從我者步騎五千餘盡皆精彊今有爾小將投我我已結交有誓不可不借助也若堅欲與我力爭我終敗爾不使爾得歸瀚海若要且保本職當速回耕夫又傳於瀚海神神大怒引兵前進令其衆曰不破此冢今夕須盡死於冢前遂又力戰三敗三復戰及初夜冢中兵敗生擒叛將及入冢獲愛妾拘之而回張公及其衆並斬於冢前縱火焚冢賜耕夫金帶耕夫明日往觀此冢之火猶未滅冢傍有枯骨木人甚多薛延陀突厥沙多彌可汗貞觀年馭下無恩多有殺戮國中震恐皆不自安常有客乞食於主人引入帳命妻具饌其妻顧視客乃狼頭主人不之覺妻告鄰人共視之狼頭人已食其主人而去相與逐之至鬱督軍山見二人追者告其故二人曰我即神人薛延陀當滅我來取之追者懼而返太宗命將擊之其衆相驚擾諸部大亂尋為回紇所殺族類殆盡睦仁蒨唐睦仁蒨者趙郡邯鄲人也少時經學不信鬼神常欲試其有無就見鬼人學之十餘年不能得見後徙家向縣於路見一人如大官衣冠甚偉乘好馬從五十餘騎視仁蒨而不言後數見之經十年凡數十相見後忽駐馬呼仁蒨曰比頻見君情相眷慕願與君交游仁蒨即拜之問公何人耶答曰吾是鬼耳姓成名景本弘農人西晉時為別駕今任臨湖國長史仁蒨問其國何在王何姓名答曰黃河以北總為臨湖國國都在樓煩西北沙磧是也其王即故趙武靈王今統此國總受泰山控攝每月各使上相朝於泰山是以數來至此與君相遇也吾乃能有相益令君預知禍難而先避之可免橫苦唯死生之命與大禍福之報不能移動耳仁蒨從之景因命其從騎常掌事以贈之遣隨蒨行有事則令先報之即爾所不知當來告我如是便別掌事恆隨遂如侍從者每有所問無不先知時大業初江陵岑之象為邯鄲令子文本年未弱冠之象請仁蒨於家教文本仁蒨以此事告文本仍謂曰成長史語我有一事羞君不得道既與君交亦不能不告鬼神道亦有食然不能得飽常苦飢若得人食便得一年飽衆鬼多偷竊人食我既貴重不能偷之從君請一食仁蒨既告文本文本既為具饌備設珍羞仁蒨曰鬼不欲入人屋可於外水邊張幕設席陳酒食於上文本如其言至時仁蒨見景與兩客來至從百餘騎既坐文本向席再拜謝以食之不精亦傳景意辭謝初文本將設食仁蒨請有金帛以贈之文本問是何等物仁蒨云鬼所用物皆與人異唯黃金及絹為得通用然亦不如假者以黃金塗大錫作金以紙為絹帛最為貴上文本如言作之及景食畢令其從騎更代坐食文本以所作金錢絹贈之景深喜謝曰因睦生煩郎君供給郎君頗欲知壽命乎文本辭云不願知也景笑而去數年後仁蒨遇病不因困篤而不起月餘仁蒨問常掌事掌事不知便問長史長史報云國內不知後月因朝泰山為問消息而相報至後月長史來報云是君鄉人趙某為泰山主簿主簿一員闕薦君為此官故為文案經紀召君耳案成者當死仁蒨問計將安出景云君壽應年六十餘今始四十但以趙主簿橫徵召耳當為請之乃曰趙主簿相問睦兄昔與同學恩情深至今幸得為泰山主簿適遇一員官闕明府令擇人吾已啓公公許相用兄既不得長生命當有死死遇濟會未必當官何惜一二十年苟生耶今文案已出不可復止願決作來意無所疑也仁蒨憂懼病愈篤景謂仁蒨曰趙主簿必欲致君君可自往泰山於府君陳訴則可以免仁蒨問何由見府君景曰往泰山廟東度一小嶺平地是其都所君往自當見之仁蒨以告文本文本為具行裝數日又告仁蒨曰文書欲成君訴懼不可免急作一佛像彼文書自消告文本以三千錢為畫一座像於寺西壁訖而景來告曰免矣仁蒨情不信佛意尚疑之因問景云佛法說有三世因果此為虛實答曰皆實仁蒨曰即如是人死當分入六道那得盡為鬼而趙武靈王及君今尚為鬼耶景曰君縣內幾戶仁蒨曰萬餘戶又曰獄囚幾人仁蒨曰常二十人已下又曰萬戶之內有五品官幾人仁蒨曰無又曰九品以上官幾人仁蒨曰數十人景曰六道之義分一如此耳其得天道萬無一人如君縣內無一五品官得人道者萬有數人如君縣內九品數十人入地獄者萬亦數十如君獄內囚唯鬼及畜生最為多也如君縣內課役戶就此道中又有等級因指其從者曰彼人大不如我其不及彼者尤多仁蒨曰鬼有死乎曰然仁蒨曰死入何道答曰不知如人知生而不知死仁蒨問曰道家章醮為有益否景曰道者彼天帝總統六道是為天曹閻羅王者如人間天子泰山府君如尚書令録五道神如諸尚書若我輩國如大州郡每人間事道士上章請福如求神之恩大曹受之下閻羅王云以某月日得某申訴云宜盡理忽令枉濫閻羅敬受而奉行之如人奉詔也無理不可求免有枉必當得申何為無益也仁蒨又問佛家修福何如景曰佛是大聖無文書行下其修福者天神敬奉多得寬宥若福厚者雖有惡道文簿不得追攝此非吾所識亦莫知其所以然言畢即去仁茜一二日能起便愈文本父卒還鄉里仁蒨寄書曰鬼神定是貪諂往日欲郎君飲食乃爾殷勤比知無復利相見殊落漠然常掌事猶見隨本縣為賊所陷死亡略盡僕為掌事所導故賊不見竟以獲全貞觀十六年九月八日文官賜射於玄武門文本時為中書侍郎自語人云爾兗州人唐兗州鄒縣人姓張忘字曾任縣尉貞觀十六年欲詣京赴選途經泰山謁廟祈福廟中府君及夫人并諸子等皆現形像張遍拜訖至第四子旁見其儀容秀美同行五人張獨祝曰但得四朗交游賦詩舉酒一生分畢何用仕官及行數里忽有數十騎馬揮鞭而至從者云是四郎曰向見兄垂顧故來仰謁又曰承欲選然今歲不合得官復恐在途有災不復須去也張不從執別而去行百餘里張及同伴夜行被賊劫掠裝具並盡張遂祝曰四郎豈不相助有頃四郎車騎畢至驚嗟良久即令左右追捕其賊顛仆迷惑却來本所四郎命決杖數十其賊䏶膊皆爛已而別去四郎指一大樹兄還之日於此相呼也是年張果不得官而歸至本期處大呼四郎俄而郎至乃引張云相隨過宅即有飛樓綺觀架迥淩空侍衛嚴峻有同王者張即入四郎云須參府君始可安乃引入經十餘重門趨而進至大堂下謁拜見府君絶偉張戰懼不敢仰視判事似用朱書字皆極大府君命使者宣曰汝乃能與吾兒交游深為善道宜停一二日宴聚隨便好去即令引出至一別館盛設珍羞海陸畢備奏樂盈耳即與四郎同室而寢已經三宿張至明旦遊戲庭序徘徊往來遂窺一院正見其妻於衆官人前荷枷而立張還甚不悅四郎怪問其故張具言之四郎大驚云不知嫂來此也即自往造諸司法所其類乃有數十人見四郎來咸去下陛重足而立以手招一司法近前具言此事司法報曰不敢違命然須白録事知遂召録事録事諾云乃須夾此案於衆案之中方便同判始可得耳司法乃斷云此婦女勘別案內常有寫經持齊功德不合即死遂放令歸家與四郎涕泣而別仍云唯作功德可以益壽張乘本馬其妻從四郎借馬與妻同歸妻雖精魂事同平素行欲至家可百步許忽不見張大怪懼走至家中即逢男女號哭又知已殯張即呼兒女急往發之開棺妻忽起即坐囅然笑曰為憶男女勿怪先行於是已死經六七日而蘇也兗州人說之云爾
