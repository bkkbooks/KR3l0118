body:
  text: 于昶于昶唐于昶天后朝任并州録事參軍每至一更後即喘息流汗二更後愈妻柳氏將召醫工昶密曰自無他苦但晝決曹務夜判冥司事力不任耳每知有災咎即陰為之備都不形言凡六年後丁母艱持金剛經更不復為冥吏因極言此功德力令子孫諷轉後為慶州司馬年八十四將終忽聞異香非代所有謂左右曰有聖人迎我往西方言訖而沒出報應記裴宣禮唐裴宣禮天后朝為地官侍郎常持金剛經坐事被繫宣禮憂迫唯至心念經枷鎖一旦自脫推官親訪之遂得雪免御史任植同禁亦念經獲免出報應記吳思玄唐吳思玄天后朝為太學博士信釋氏持金剛經日兩遍多有靈應後稍怠日夜一遍思玄在京病有巫褚細兒言事如神星下祈禱思玄往就見細兒驚曰公有何術鬼見皆走思玄私負知是經力倍加精勵日念五遍兄疾醫無效思玄至心念經三日而愈思玄曾於渭橋見一老人年八十餘著粗縗服問之曰為所生母也思玄怪之答曰母年四十三時有異僧教云汝欲長壽否但念金剛經母即發心日念兩遍終一百七姨及鄰母誦之並過百歲今遵母業已九十矣出報應記銀山老人饒州銀山採戶逾萬並是草屋延和中火發萬室皆盡唯一家居中火獨不及時本州楊體幾自問老人老人對曰家事佛持金剛經出報應記崔文簡唐崔文簡先天中任坊州司馬屬吐蕃奄至州城同被驅掠鎖械甚嚴至心念經三日鎖忽自開虜疑有奸箠撻具以實對問曰汝有何術答云念金剛經復令鎖之念未終又解衆皆嘆異遂送出境出報應記姚待唐姚待梓州人常持金剛經並為母造一百部忽有鹿馴戲見人不驚犬亦不吠逡巡自去有人宰羊呼待同食食了即死使者引去見一城門上有額遂令入見王王呼何得食肉待云雖則食肉比元持經王稱善曰既能持經何不斷肉遂得生為母寫經有屠兒李回奴請一卷焚香供養回奴死後有人見於冥間枷鎖自脫亦生善道出報應記呂文展唐呂文展開元三年任閬中縣丞雅好佛經尤專心持誦金剛經至三萬餘遍靈應奇異年既衰暮三牙並落念經懇請牙生如舊在閬中時屬亢旱刺史劉浚令祈雨僅得一遍遂獲沛然又若霖潦別駕使祈晴應時便霽前後證驗非一不能遍舉出報應記長安縣繫囚唐長安縣死囚入獄後四十餘日誦金剛經不輟口臨決脫枷枷頭放光長數十丈照耀一縣縣令奏聞玄宗遂釋其罪出廣異記李虛唐開元十五年有敕天下村坊佛堂小者並拆除功德移入側近佛寺堂大者皆令閉封天下不信之徒並望風毀拆雖大屋大像亦殘毀之敕到豫州新息令李虛嗜酒倔強行事違戾方醉而州符至仍限三日報虛見大怒便約胥正界內毀拆者死於是一界並全虛為人好殺愎戾行必違道當時非惜佛宇也但以忿限故全之全之亦不以介意歲餘虛病數日死時正暑月隔宿即斂明日將殯母與子繞棺哭之夜久哭止聞棺中若指爪戛棺聲初疑鼠未之悟也斯須增甚妻子驚走母獨不去命開棺左右曰暑月恐壞母怒促開之而虛生矣身頗瘡爛於是浴而將養之月餘平復虛曰初為兩卒拘至王前王不在見階前典吏乃新息吏也亡經年矣見虛拜問曰長官何得來虛曰適被録而至吏曰長官平生唯以殺害為心不知罪福今當受報將若之何虛聞懼請救之吏曰去歲拆佛堂長官界內獨全此功德彌大長官雖死亦不合此間追攝少間王問更勿多言但以此對虛方憶之頃王坐主者引虛見王王曰索李明府善惡簿來即有人持一通案至大合抱有二青衣童子亦隧文案王命啓牘唱罪階吏讀曰專好割羊腳吏曰合杖一百仍割其身肉百斤王曰可令割其肉虛曰去歲有敕拆佛堂毀佛像虛界內獨存之此功德可折罪否王驚曰審有此否吏曰無新息吏進曰有福簿在天堂可檢之王曰促檢殿前垣南有樓數間吏登樓檢之未至有二僧來至殿前王問師何所有一答曰常誦金剛經一曰常讀金剛經王起合掌曰請法師登階王座之後有二高座右金左銀王請誦者坐金座讀者坐銀座坐訖開經王合掌聽之誦讀將畢忽有五色雲至金座前紫雲至銀座前二僧乘雲飛去空中遂滅王謂階下人曰見二僧乎皆生天矣於是吏檢善簿至唯一紙因讀曰去歲敕拆佛堂新息一縣獨全合折一生中罪延年三十仍生善道言畢罪簿軸中火出焚燒之盡王曰放李明府歸仍敕兩吏送出城南門見夾道並高樓大屋男女雜坐樂飲笙歌虛好絲竹見而悅之兩吏謂曰急過此無顧顧當有損虛見飲處意不能忍行佇立觀之店中人呼曰來吏曰此非善處既不相取信可任去虛未悟至飲處人皆起就坐奏絲竹酒至虛酬酢畢將飲之乃一杯糞汁也臭穢特甚虛不肯飲即有牛頭獄卒出於床下以叉刺之洞胸虛遽連飲數杯乃出吏引虛南入荒田小徑中遙見一燈炯然燈旁有大坑昏黑不見底二吏推墮之遂蘇李虛素性凶頑不知罪福而被酒違戾以全佛堂明非己之本心也然猶身得生天火焚罪簿獲福若此非為善之報乎與夫日夜精勤孜孜為善既持僧律常行佛言而不離生死未之有也出紀聞盧氏唐開元中有盧氏者寄住滑州晝日間坐廳事見二黃衫人入門盧問為誰答曰是里正奉帖追公盧甚愕然問何故相追因求帖觀見封上作衛縣字遂開文字錯謬不復似人書怪而詰焉吏言奉命相追不知何故俄見馬已備在階下不得已上馬去顧見其尸坐在床上心甚惡之倉卒之際不知是死又見馬出不由門皆行牆上乃驚愕下泣方知必死恨不得與母妹等別行可數十里至一城城甚壯麗問此何城吏言乃王國即追君所司入城後吏欲將盧見王經一院過問此何院吏曰是御史大夫院因問院大夫何姓名云姓李名某盧驚喜白吏曰此我表兄令吏通刺須臾便出相見甚喜具言平昔延入坐語大夫謂曰弟之念誦功德甚多良由金剛經是聖教之骨髓乃深不可思議功德者也盧初入院中見數十人皆是衣冠其後太半繫在網中或無衣或露頂盧問此悉何人云是陽地衣冠網中悉緣罪重弟若能為一說法見之者悉得升天遂命取高座令盧升坐誦金剛般若波羅密經網中人已有出頭者至半之後皆出地上或褒衣大袖或乘車御雲誦既終往生都盡及入謁見王呼為法師致敬甚厚王云君大不可思議算又不盡歎念誦之功尋令向吏送之回既至舍見家人披頭哭泣尸臥地上心甚惻然俄有一婢從庭前入堂吏令隨上階及前魂神忽已入體因此遂活出廣異記陳利賓陳利賓者會稽人弱冠明經擢第善屬文詩入金門集入金門集四字據明鈔本補釋褐長城尉少誦金剛經每至厄難多獲其助開元中賓自會稽江行之東陽會天久雨江水彌漫賓與其徒二十餘船同發乘風掛帆須臾天色昧暗風勢益壯至界石竇上水擁原本此處空一格據明鈔本補擁字閼衆流而下波濤衝擊勢不得泊其前輩二十餘舟皆至竇口而敗舟人懼利賓忙遽誦金剛經至衆流所忽有一物狀如赤龍橫出扶舟因得上議者為誦經之功出廣異記王宏王宏者少以漁獵為事唐天寶中嘗放鷹逐兔走入穴宏隨探之得金剛般若經一卷自此遂不獵云出廣異記田氏易州參軍田氏性好畋獵恆養鷹犬為事唐天寶初易州放鷹於叢林棘上見一卷書取視之乃金剛經也自爾發心持誦數年已誦二千餘遍然畋獵亦不輟後遇疾暴卒數日被追至地府見諸鳥獸周回數畝從己徵命頃之隨到見王問罪何多也田無以對王令所由領往推問其徒十人至吏局吏令啓口以一丸藥擲口中便成烈火遍身須臾灰滅俄復成人如是六七輩至田氏纍三丸而不見火狀吏乃怪之復引見王具以實白王問在生作何福業田氏云初以畋獵為事王重問云在生之時於易州棘上得金剛經持誦已二千餘遍王云正此滅一切罪命左右檢田氏福簿還白如言王自令田氏誦經才三紙回視庭中禽獸並不復見誦畢王稱美之云誦二千遍延十五年壽遂得放還出廣異記
