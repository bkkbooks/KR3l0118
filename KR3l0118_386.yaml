body:
  text: 賈偶賈偶漢建安中南陽賈偶字文合得病而亡時有吏將詣太山司命閱簿謂吏曰當召某郡文合何以召此人可速遣之時日暮遂至郭外樹下宿見一少女子獨行文合問曰子類衣冠何乃徒步姓字為誰女曰某三河人父見為弋陽令昨被召而來今得卻還遇日暮懼獲瓜田李下之譏望君之容必是賢者是以停留依馮左右文合曰悅子之心愿交歡于今夕女曰聞之諸姑女子以貞專為德洁白為稱文合反复與言終無動志天明各去文合卒以再宿停喪將殮視其面有色捫心下稍溫少頃卻蘇文合欲驗其事遂至弋陽修刺謁令因問曰君女寧卒而卻蘇耶具說女子姿質服色言語相反复本末令入問女所言皆同初大惊歎竟以女配文合焉章泛臨海樂安章泛年二十余死經日未殯而蘇云被錄天曹天曹主者是其外兄料理得免初到時有少女子同被錄送立住門外女子見泛事散知有力助因泣涕脫金釧三隻及臂上雜寶托泛與主者求見救濟泛即為請之并進釧物良久出語泛已論秋英亦同遣去秋英即此女之名也于是俱去腳痛疲頓殊不堪行會日亦暮止道側小屈狀如客舍而不見主人泛共宿嬿接更相問女曰我姓徐家吳縣烏門臨瀆為居門前倒棗樹即是也明晨各去遂并活泛先為護軍府吏依假出都經吳乃對烏門依此尋索得徐氏舍與主人敘闊問秋英何在主人云女初不出入君何知其名泛因說昔日魂相見之由秋英先說之所言因符主人乃悟惟羞不及寢嬿之事而其鄰人或知以語徐氏徐氏試令侍婢數人遞出示泛曰非也乃令秋英見之則如舊識徐氏謂天意遂以妻泛生子名曰天賜謝弘敞妻唐吳王文學陳郡謝弘敞妻高陽許氏武德初遇患死經四日而蘇說云被二三十人拘至地獄未見官府即聞喚雖不識面似是姑夫沈吉光語音許問云語聲似是沈丈何因無頭南人呼姑姨夫皆為某姓丈也吉光即以手提其頭置于膊上而誡許曰汝且在此勿向西院待吾汝造請即應得出許遂住吉光經再宿始來語許云汝今此來王欲令汝作女伎倘引見不須道解妶管如不為所悉可引吾為證也少間有吏抱案引入王果問解妶管不許云不解沈吉光具知王問吉光答曰不解王曰宜早放還不須留也于時吉光欲發遣即共執案人籌度許不解其語執案人曰娘子功德雖強然為先有少罪隨便受卻身業具淨豈不怪哉吏東引入一院其門极小見有人受罪許甚惊懼乃求于主者曰平生修福何罪而至斯耶答曰娘子曾以不淨碗盛食與親須受此罪方可得去遂以銅汁灌口非常苦毒比蘇時口內皆爛吉光即云可于此人處受一本經記取將歸受持勿怠自今已去保年八十有余許生時素未誦經蘇后遂誦得一卷詢訪人間所未曾有今見受持不缺吉光其時尚存后二年方始遇害凡諸親屬有欲死者三年前并于地下預見許之從父弟仁則說之梁氏咸陽有婦人姓梁貞觀年中死經七日而蘇自云被收至一大院見廳上有官人据案執筆翼侍甚盛令勘問此婦人合死不有吏人繼一案云與合死者同姓名所以誤追官人敕左右即放還吏白官人云不知梁有何罪請即受罪而歸官人即令勘案云梁生平唯有兩舌惡罵之罪更無別罪即令一人拔舌一人執斧砍之日常數四凡經七日始送令歸初似落深崖少時如睡覺家人視其舌上猶大爛腫從此以後永斷酒肉至令猶存朱氏唐鄭州武陽縣婦女姓朱其夫先負外縣人絹夫死之后遂無人還貞觀末因病死經再宿而蘇自云被人執至一所見一人云我是司命府史汝夫生時負我家若干匹所以追汝今放汝歸宜急具物至某縣某村送還我母如其不送追捉更切兼為白我娘努力為造像修福朱即告某乙鄉閭得絹送還其母具言其男貌狀有同平生其母亦對之流涕覷欷久之李強名妻隴西李強名妻清河崔氏甚美其一子生七年矣開元二十二年強名為南海丞方署月妻因暴疾卒廣州囂熱死后埋棺于土其外以墼圍而封之強名痛其妻夭年而且遠官哭之甚慟日夜不絕聲數日妻見夢曰吾命未合絕今帝許我活矣然吾形已敗帝命天鼠為吾生肌膚更十日后當有大鼠出入墼棺中即吾當生也然當封閉門戶待七七日當開吾門出吾身吾即生矣及旦強名言之而其家仆妾夢皆協十余日忽有白鼠數頭出入殯所其大如狘強名異之試發其柩見妻骨有肉生焉遍體皆爾強名复閉之積四十八日其妻又見夢曰吾明晨當活盍出吾身既曉強名發之妻則蘇矣扶出浴之妻素美麗人也及乎再生則美倍于舊膚體玉色倩盼多姿袨服靚妝人間殊絕矣強名喜形于色時廣州都督唐昭聞之令其夫人觀焉于是別駕已下夫人皆從強名妻盛服見都督夫人與抗禮頗受諸夫人拜薄而觀之神仙中人也言語飲食如常人而少言眾人訪之久而一對若問冥間事即杜口雖夫子亦不答明日唐都督夫人置饌請至家諸官夫人皆同觀之悅其柔姿艷美皆曰目所未睹既而別駕長史夫人等次其日列筵請之至宅而都督夫人亦往如是已二十日矣出入如人唯沉靜異于疇日既強名使于桂府七旬乃還其妻去后為諸家所迎往來無恙強名至數日妻复言病病則甚間一日遂亡計其再生才百日矣或曰有物憑焉荊州女子開元二十三年荊州女子死三日生自言具見冥途善惡國家休咎鬼王令其傳語于人主荊州以聞朝廷駭異思見之敕給驛騎令至洛行至南陽遂喑不能言更無所識至都以其妄也遽歸周哲滯妻汝南周哲滯妻者戶部侍郎席豫之女也天寶中暴疾危亟殆死平生素有衣服悉舍為功德唯有一紅地繡珠綴背襠是母所賜意猶惜之未施其疾轉劇又命佛工以背襠于疾所鑄二軀佛未畢而卒初群鬼搏撮席氏登大山忽聞背后有二人喚令且住群鬼乃遷延不敢動二人既至顏色滋黑灰土滿面群鬼畏懼莫不駭散遂引席氏還家聞家人號哭二人直至尸前令入其中乃活二人即新鑄二佛也劉長史女吉州劉長史無子獨養三女皆殊色甚念之其長女年十二病死官舍中劉素與司丘掾高廣相善俱秩滿與同歸劉載女喪還高廣有子年二十余甚聰慧有姿儀路次豫章守水不得行兩船相去百餘步日夕相往來一夜高氏子獨在船中披書二更后有一婢年可十四五容色甚麗直詣高云長史船中燭滅來乞火耳高子甚愛之因與戲調妾亦忻然就焉曰某不足顧家中小娘子艷絕無雙為郎通意必可致也高甚惊喜意為是其存者因與為期而去至明夜婢又來曰事諧矣即可便待高甚踊躍立候于船外時天無纖云月甚清朗有頃遙見一女自后船出從此婢直來未至十步光彩映發馨香襲人高不胜其意便前持之女縱體入懷姿態橫發乃與俱就船中倍加款密此后夜夜輒來情念彌重如此月余日忽謂高曰欲論密事得無嫌難乎高曰固請說之乃曰兒本長史亡女命當更生業得承奉君子若垂意相采當為白家令知也高大惊喜曰幽明契合千載未有方當永同枕席何樂如之女又曰后三日必生使為開棺夜中以面乘霜露飲以薄粥當遂活也高許諾明旦遂白廣廣未之甚信亦以其絕異乃使詣劉長史具陳其事夫人甚怒曰吾女今已消爛寧有玷辱亡靈乃至此耶深拒之高求之轉苦至夜劉及夫人俱夢女曰某命當更生天使配合必謂喜而見許今乃靳固如此是不欲某再生耶及覺遂大感悟亦以其姿色衣服皆如所白乃許焉至期乃共開棺見女姿色鮮明漸有暖氣家中大惊喜乃設幃幕于岸側舉置其中夜以面承露晝哺飲父母皆守視之一日轉有氣息稍開目至暮能言數日如故高問其婢云先女死尸柩亦在舟中女既蘇遂臨悲泣與決乃擇吉日于此地成婚后生數子因名其地號為禮會村也盧頊表姨洛州刺史盧頊表姨常畜一狗子名花子每加念焉一旦而失為人所斃后數月盧氏忽亡冥間見判官姓李乃謂曰夫人天命將盡有人切論當得重生一十二年拜謝而出行長衢中逢大宅有麗人侍婢十余人將游門屏使人呼夫人入謂曰夫人相識耶曰不省也麗人曰某即花子也平生蒙不以獸畜之賤常加育養某今為李判官別室昨所囑夫人者即某也冥司不廣其請只加一紀某潛以改十二年為二十以報養育之恩有頃李至伏愿白之本名無為夫人之號懇將力祈李逡巡而至至別坐語笑麗人首以圖乙改年白李李將讓之對曰妾平生受恩以此申報萬不獲一料必無難之李欣然謂曰事則匪易感言請之切遂許之臨將別謂夫人曰請收余骸為痤埋之骸在履信坊街之北牆委糞之中夫人既蘇驗而果在遂以子禮葬之后申謝于夢寐之間后二十年夫人乃亡也劉氏子妻劉氏子者少任俠有膽氣常客游楚州淮陰縣交游多市井惡少鄰人王氏有女求聘之王氏不許后數歲因饑遂從戎數年后役罷再游楚鄉與舊友相遇甚歡常恣游騁晝事弋獵夕會狹邪因出郭十余里見一坏墓棺柩暴露歸而合飲酒時將夏夜暴雨初至眾人戲曰誰能以物送至坏冢棺上者劉秉酒恃氣曰我能之眾曰若審能之明日眾置一筵以賞其事乃取一磚同會人列名于上令生持去余人飲而待之生獨行夜半至墓月初上如有物蹲踞棺上諦視之乃一死婦人也生舍磚于棺背負此尸而歸眾方歡語忽聞生推門如負重之聲門開直入燈前置尸于地卓然而立面施粉黛髻發半披一座絕倒亦有奔走藏伏者生曰此我妻也遂擁尸至床同寢眾人惊懼至四更忽覺口鼻微微有氣診視之即已蘇矣問所以乃王氏之女因暴疾亡不知何由至此未明生取水與之洗面濯手整釵髻疾已平复乃聞鄰里相謂曰王氏女將嫁暴卒未殮昨夜因雷遂失其尸生乃以告王氏王氏悲喜乃嫁生焉眾咸歎其冥契亦伏生之不懼也延陵村人妻延陵靈寶觀道士謝又損近縣村人有喪婦者請又損為齋婦死已半月矣忽聞推棺而呼眾皆惊走其夫開棺視之乃起坐頃之能言云為舅姑所召去云我此無人使之執爨其居處甚閒洁但苦無水一日見溝中水甚清因取以漉饋姑見之大怒曰我不知爾不洁如是用爾何為因逐之使回走出門遂蘇今尚無恙趙某妻丁亥歲浙西有典客吏趙某妻死未及大殮忽大叫而活云為吏所錄至鶴林門內有府署侍衛嚴整官吏諮事及領囚禁者甚眾吏持己入至庭下堂上一綠衣一白衣偶坐綠衣謂吏曰汝誤非此人也急遣之白衣曰已追至此何用遣也綠衣不從相質食頃綠衣怒叱吏遣之吏持己疾趨出路經一橋數十人方修橋無板有釘吏持之走過釘傷足因痛失聲遂活視足果傷俄而鄰婦暴卒不复蘇矣
