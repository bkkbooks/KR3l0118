body:
  text: 常袞常袞唐德宗初即位宰相常袞為福建觀察使治其地袞以辭進鄉縣小民有能讀書作文辭者親與之為主客之禮觀遊宴饗必召與之時未幾皆化翕然於時歐陽詹獨秀出袞加敬愛諸生皆推服閩越之人舉進士繇詹始也詹死於國子四門助教隴西李翱為傳韓愈作哀辭出韓愈歐陽詹哀詞序文宋濟唐德宗微行一日夏中至西明寺時宋濟在僧院過夏上忽入濟院方在窗下犢犢原作特據明鈔本改鼻葛巾抄書上曰茶請一碗濟曰鼎水中煎此有茶味請自潑之上又問曰作何事業兼問姓行濟云姓宋第五應進士舉又曰所業何曰作詩又曰聞今上好作詩何如宋濟云聖意不測語未竟忽從輦遞到曰官家官家濟惶懼待罪上曰宋五大坦率後禮部放榜上命內臣看有濟名使回奏無名上曰宋五又坦率也出盧氏小說或有客譏宋濟曰白袍子何紛紛濟曰為朱袍紫袍紛紛耳出國史補牛錫庶牛錫庶性靜退寡合纍舉不舉貞元元年因問日者曰君明年合狀頭及第錫庶但望偶中一第爾殊不信也時已八月未命主司偶至少保蕭昕宅前值昕杖策將獨遊南園錫庶遇之遽投刺並贄所業昕獨居方思賓友甚喜延與之語及省文卷再三稱賞因問曰外間議者以何人當知舉錫庶對曰尚書至公為心必更出領一歲昕曰必不見命若爾君即狀頭也錫庶起拜謝復坐未安忽聞馳馬傳呼曰尚書知舉昕遽起錫庶復再拜曰尚書適已賜許皇天后土實聞斯言昕曰前言期矣明年果狀頭及第出逸史崔元翰崔元翰為楊炎所引欲拜補闕懇曰願舉進士由此獨步場中然不曉程試先求題目為地崔敖知之旭日都堂始開敖盛氣白主司曰若出白雲起封中題敖請退主司為其所中卒愕然換之是歲二崔俱捷出國史補湛賁彭伉湛賁俱袁州宜春人伉妻又湛姨也伉舉進士擢第湛猶為縣吏妻族為置賀宴皆官人名士伉居席之右一座盡傾湛至命飯於後閣甚無難色其妻忿然責之曰男子不能自勵窘辱如此復何為容湛感其言孜孜學業未數載一舉登第伉常侮之其時伉方跨驢縱遊於郊郛忽有家僮馳報湛郎及第伉失聲而墜故袁人謔曰湛賁及第彭伉落驢出托言尹極貞元七年杜黃裳知舉聞尹極玉泉子極作樞下同時名籍籍乃微服訪之問場中名士極唯唯黃裳乃具告曰某即今年主司也受命久矣唯得一人某他不能盡知敢以為請極聳然謝曰既辱下問敢有所隱即言子弟有崔元略孤進有沐明鈔本許本沐作休清徐松唐登科記考十二沐作林藻令孤楚數人黃裳大喜其年極狀頭及第試珠還合浦賦藻賦成忽假寐夢人告曰何不敘珠來去之意既寤乃改數句又謝恩黃裳謂藻曰敘珠來去如有神助出閩川名士傳李程李程貞元中試日五色賦先榜落矣初出試楊於陵省宿歸第遇程於省門詢之所試程探靴靿中得賦藁示之其破題曰德動天鑒祥開日華於陵覽之謂程曰公今須作狀元翌日雜文無名於陵深不平乃於故冊子末末原作未據唐托言改繕寫而斥其名氏攜之以詣主文從容紿之曰侍郎今者新賦試奈何用舊題主文辭以非也於陵曰不止題目向有人賦此韻腳亦同主文大驚於陵乃出程賦示之主文歎賞不已於陵曰當今場中若有此賦侍郎何以待之主文曰無則已有即非狀元不可也於陵曰苟如此侍郎已遺賢矣此乃李程所作亟命取程所納而對不差一字主文因而致謝謀之於陵於是擢為狀元前榜不復收矣或云出榜重收程後出鎮大梁聞浩虛舟應宏詞復賦此題頗慮浩愈於己專馳一介取原本既至將啓緘尚有憂色及覩浩破題曰麗日焜煌中含瑞光程喜曰李程在裹出托言蔡南史貞元十二年駙馬王士平與義陽公主反目蔡南史獨孤申叔播為樂曲號義陽子有團雪散雪之歌德宗聞之怒欲廢科舉後但流斥南史乃止出國史補牛僧孺牛僧孺始舉進士致琴書於灞滻間先以所業謁韓愈皇甫湜時首造愈值愈他適留卷而已無何愈訪湜時僧孺亦及門二賢覽刺欣然同契延接詢及所止對曰某方以薄伎小醜呈於宗匠進退惟命一囊猶置於國門之外二公披卷卷首有說樂一章未閲其詞遽曰斯高文且以拍板為何等對曰謂之樂句二公相顧大喜曰斯高文必矣僧孺因謀所居二公沈然良久乃曰可於客戶稅一廟院僧孺如所教造門致謝二公又誨之曰某日可遊青龍寺薄暮而歸二公聯鏕至彼因大署其門曰韓愈皇甫湜同訪幾官不遇翌日輦轂名士咸觀焉奇章之名由是赫然矣僧孺既及第過堂宰相謂曰掃廳奉候僧孺獨出曰不敢衆聳異之出托言楊虞卿楊虞卿及第後舉宏詞為校書來淮南就李鄘婚姻遇前進士陳商啓護窮窘虞卿未相識聞之倒囊以濟出托言苗纘苗粲子纘應舉而粲以中風語澀而心緒至切臨試又疾亟纘乃為狀請許入試否粲猶能把筆淡墨為書曰入入其父子之情切如此其年纘及第出嘉話録費冠卿費冠卿元和二年及第以祿不及親永懷罔極之念遂隱於池陽九華山長慶中殿中侍御史李行修舉冠卿孝節徵拜右拾遺制曰前進士費冠卿嘗與計偕以文中第祿不及於榮養恨每積於永懷遂乃屏身丘園絶跡仕進守其至性十有五年峻節無雙清颷自遠夫旌孝行舉逸人所以厚風俗而敦名教也宜陳高獎以警薄夫擢參近侍之榮載佇移忠之效可右拾遺冠卿竟不應徵命出托言李固言李固言生於鳳翔莊墅性質厚未熟造謁始應進士舉舍於親表柳氏京第諸柳昆仲率多謔戲以固言不間人事俾信趨揖之儀候其磬折密於頭巾上貼文字云此處有屋僦賃固言不覺及出朝士見而笑之許孟容為右常侍於時朝中薄此官號曰貂腳頗不能為後進延譽固言始以所業求見謀於諸柳諸柳與導行卷去處先令投許常侍固言果詣之孟容謝曰某官緒間冷不足發君子聲彩雖然亦藏之於心又睹頭巾上文字知其朴質無何來年許知禮闈乃以固言為狀頭出托言殷堯藩元和九年韋貫之榜殷堯藩雜文落矣陽明鈔本陽作楊漢公乃貫之前榜門生盛言堯藩之屈貫之為之重收出托言施肩吾施肩吾元和十年及第以洪州之西山乃十二真君羽化之地靈跡具存慕其真風高蹈於此嘗賦閒居遣興七言詩一百韻大行於世出托言張正甫張正甫為河南尹裴度銜命伐淮西置宴府西亭裴言一舉人詞藝好解頭張正色曰相公此行何為也爭記得河南解頭裴有慚色出托言明鈔本作出幽間鼓吹馮陶馮宿之三子陶韜圖兄弟連年進士及第連年登宏詞科一時之盛代無比焉當太和初馮氏進士及第者海內十人而公家兄弟叔姪八人出傳載故實張環張環兄弟七人並舉進士出談賓録楊三喜楊敬之拜國子司業次子載進士及第長子三史登科時號楊三喜出托言
