body:
  text: 蟻子蟻子南方尤多蟻子凡柱楣戶牖悉游蟻循途奔走居有所營里棟相接莫窮其往來蛙蛤南方又有水族狀如蛙其形尤惡土人呼為蛤為臞食之味美如鷓鴣及治男子勞虛金龜子甲蟲也春夏間生于草木上大如小指甲飛時即不類泊草蔓上細視之真金色龜兒也行必成雙南人采之陰干裝以金翠為首飾之物亦類黔中所産青蟲子也海山又珠崖人每晴明見海中遠山羅列皆如翠屏而東西不定悉蜈蚣也蝦須長四五十尺此物不足怪也蜈蚣南越志云大者其皮可以鞔鼓取其肉曝為脯美于牛肉又云大者能噉牛里人或遇之則鳴鼓然火炬以驅逐之蚊翼南方蚊翼下有小蜚蟲焉目明者見之每生九卵復未嘗曾有復成九子蜚而俱去蚊遂不知亦食人及百獸食者知言蟲小食人不去也此蟲既細且小因曰細蠛陳章對齊桓公小蟲是也此蟲常春生而以季夏冬藏于鹿耳中名嬰婗嬰婗亦細小也壁虱壁虱者土蟲之類化生壁間暑月嚙人其瘡雖愈每年及期必發數年之后其毒方盡其狀與牛虱無異北都廄中之馬忽相次瘦劣致斃所損日甚主將雖督審芻藥勤至終莫能究而斃者狀類相似亦莫知其疾之由掌廄獲罪者已數人矣皆傾家破産市馬以陪納然后伏刑有一裨將干敏多識凡所主掌皆能立功衆所推舉俾其掌廄馬此人勤心養膳旦夕躬親旬月之后馬之殞斃如舊疑其有他乃明燭以守之二鼓之后馬皆立不食黑者變白白者變黑秉炬以視諸馬之上有物附之不可勝數乃壁虱所噆也五鼓之后壁虱皆去一道如繩連亙不絶翌日而以其事白于帥臣尋其去蹤于樓中得巨穴焉以湯灌之壞樓門穴得壁虱死者數十斛穴中大者一枚長數尺形如琵琶金色焚而殺之筑塞其處其害乃絶白蟲有人忽面上生瘡暑月即甚略無完皮異常楚痛涂嘗餌藥不能致效忽一日既臥余燭未滅同寢者見有物如弦如線以著其面因執燭視之白蟲如虱自瓷枕穴中出以噆其面既明遂道其事剖枕以視之白蟲無數因盡殺之面瘡乃愈蠶女蠶女者當高辛帝時蜀地未立君長無所統攝其人聚族而居遞相侵噬蠶女舊跡今在廣漢不知其姓氏其父為鄰邦掠去已逾年唯所乘之馬猶在女念父隔絶或廢飲食其母慰撫之因告誓于衆曰有得父還者以此女嫁之部下之人唯聞其誓無能致父歸者馬聞其言驚躍振迅絶其拘絆而去數日父乃乘馬歸自此馬嘶鳴不肯飲齕父問其故母以誓衆之言白之父曰誓于人不誓于馬安有配人而偶非類乎能脫我于難功亦大矣所誓之言不可行也馬愈跑父怒射殺之曝其皮于庭女行過其側馬皮蹶然而起卷女飛去旬日皮復栖于桑樹之上女化為蠶食桑葉吐絲成繭以衣被于人間父母悔恨念之不已忽見蠶女乘流云駕此馬侍衛數十人自天而下謂父母曰太上以我孝能致身心不忘義授以九宮仙殯之任長生于天矣無復憶念也乃沖虛而去今家在什邡綿竹德陽三縣界每歲祈蠶者四方云集皆獲靈應宮觀諸化塑女子之像披馬皮謂之馬頭娘以祈蠶桑焉稽聖賦曰安有女感彼死馬化為蠶蟲衣被天下是也砂俘效陳藏器本草云砂俘又云倒行拘子蜀人號曰俘郁旋干土為孔常睡不動取致枕中令夫妻相悅愚有親表曾得此物未嘗試驗愚始游成都止于逆旅與賣草藥李山人相熟見蜀城少年往往欣然而訪李生仍以善價酬因詰之曰媚藥征其所用乃砂俘與陳氏所說信不虛語李生亦祕其所傳之法人不可得也武陵山川媚草無賴者以銀換之有因其術而男女發狂罹禍非細也舍毒舍毒者蚊蚋之屬江嶺間有之郴連界尤甚為客中者慎勿以手搔之但布鹽于上以物封裹半日間毒則解矣若以手搔癢不可止皮穿肉穴其毒彌甚湘衡北間有之其毒稍可峽江至蜀有蟆子色黑亦能咬人毒亦不甚視其生處即麩鹽樹葉背上春間生之葉卷成窠大如桃李名為五倍子治一切瘡毒收者晒而殺之即不化去不然者必竅穴而出飛為蟆子矣黔南界有微塵色白甚小視之不見能晝夜害人雖帳深密亦不可斷以粗茶燒之煙如焚香狀即可斷之又如席鋪油帔隔之稍可滅老蛛泰嶽之麓有岱嶽觀樓殿咸古制年代寢遠一夕大風有聲轟然響震山谷及旦視即經樓之陊也樓屋徘徊之中雜骨盈車有老蛛在焉形如矮腹五升之茶鼎展手足則周數尺之地矣先是側近寺觀或民家亡失幼兒不計其數蓋悉罹其啖食也多有网于其上或遭其黏然縻絆而不能自解而脫走則必遭其害矣于是觀主命薪以焚之臭聞十余里李禪楚州刺史承嗣少子也居廣陵宣平里大第晝日寢庭前忽有白蝙蝠繞庭而飛家僮輩竟以帚撲皆不能中久之飛去院門撲之亦不中又飛出門至外門之外遂不見其年禪妻卒輀車出入之路即白蝙蝠飛翔之所也蝗化唐天祐末歲蝗蟲生地穴中生訖即衆蝗銜其足翅而拽出帝謂蝗曰豫何罪食豫苗遂化為蜻蜓洛中皆驗之是歲群雀化燕水蛙徐之東界接沂川有溝名盤車相傳是奚仲試車之所溝有水水有蛙可大如五石瓮目如碗昔嘗有人于其項上得藥服之度世蚓瘡天祐中浙西重造慈和寺治地既畢每為蚯蚓穿穴執事者患之有一僧教以石灰覆之由是得定而殺蚯蚓無數頃之其僧病苦舉身皆癢恆須得長指爪者搔之以至成瘡瘡中輒得死蚯蚓一條殆數百千條肉盡至骨而卒蜂餘廬陵有人應舉行遇夜詣一村舍求宿有老翁出見客曰吾舍窄人多容一榻可矣因止其家屋室百餘間但窄小甚久之告饑翁曰居家貧所食唯野菜耳即以設客食之甚甘美與常菜殊及就寢唯聞訌訌之聲既曙而寤身臥田中旁有大蜂窠客嘗患風因爾遂愈蓋食蜂之余爾熊乃信州有版山川谷深遠采版之所因以名之州人熊乃嘗與其徒入山伐木其弟從而追之日暮不及其兄忽見甲士清道自東來傳呼甚厲乃弟懼恐伏于草間俄而旗幟戈甲絡繹而至道旁亦有行人其犯清道者輒為所戮至軍中擁一人若大將者西馳而去度其遠乃敢起行逮曉方見其兄具道所見衆皆曰非巡邏之所而西去溪灘險絶往無所詣安得有此人即共尋之可十余里隔溪灘猶見旌旗紛若布圍畋獵之狀其徒有勇者遙呼叱之忽無所見就視之人皆樹葉馬皆大蟻取而碎之皆有血云螽斯蝗之為孽也蓋沴氣所生斯臭腥或曰魚卵所化每歲生育或三或四每一生其卵盈百自卵及翼凡一月而飛故詩稱螽斯子孫衆多螽斯即蝗屬也羽翼未成跳躍而行其名蝻晉天福之末天下大蝗連歲不解行則蔽地起則蔽天禾稼草木赤地無遺其蝻之盛也流引無數甚至浮河越嶺逾池渡塹如履平地入人家舍莫能制御穿戶入牖井溷填咽腥穢床帳損嚙書衣積日連宵不勝其苦鄆城縣有一農家豢豕十余頭時于陂澤間值蝻大至群豢豕躍而啖食之斯須復飫不能運動其蝻又饑唼嚙群豕有若堆積豕竟困頓不能御之皆為蝻所殺癸卯年其蝗皆抱草木而枯死所為天生殺也蝻化己酉年將軍許敬遷奉命于東洲按夏苗上言稱于陂野間見有蝻生十數里才欲打捕其蟲化為白蛺蝶飛去
