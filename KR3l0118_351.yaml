body:
  text: 邢群邢群刑部員外邢群大中二年以前歙州刺史居洛中疾甚群素與御史朱琯善時琯自淮河從事罷居伊洛病卒而群未知嘗晝臥忽聞扣門者令視之見琯騎而來群即延入坐先是群聞琯病及見來甚喜曰向聞君疾亦無足憂琯曰某嘗病今則愈矣然君之疾亦無足憂不一二日當聞耳言笑久之方去琯訪群之時乃琯卒也李重大中五年檢校郎中知鹽鐵河陰院事李重罷職居河東郡被疾旬日益甚沈然在榻一夕告其仆曰我病不能起矣即令扃鍵其門忽聞庭中窣然有聲重視之見一人衣緋乃河西令蔡行己也又有一人衣白疊衣在其后重與行己善即驚曰蔡侍御來因命延上與白衣者俱坐頃之見行己身漸長手足口鼻亦隨而大焉細視之乃非行己也重心異也然因以侍御呼焉重遂覺身稍可舉即負壁而坐問曰某病旬月矣今愈甚得不中于此乎其人曰君之疾當間矣即指白衣者吾之季弟善卜乃命卜重白衣者于袖中出一小木猿置榻上既而其猿左右跳躑數四而定白衣者曰卦成矣郎中之病固無足憂當至六十二然亦有災重曰侍御飲酒乎曰安敢不飲重遂命酒以杯置于前朱衣者曰吾自有飲器乃于衣中出一杯初似銀及既酌而其杯翻翻不定細視乃紙為者二個各盡二杯已而收其杯于衣中將去又誡重曰君愈之后慎無飲酒禍且及矣重謝而諾之良久遂去至庭中乃無所見視其外門扃鍵如舊又見其榻前酒在地蓋二鬼所飲也重自是病愈既而飲酒如初其年謫為杭州司馬王坤太原王坤大中四年春為國子博士有婢輕云卒數年矣一夕忽夢輕云至榻前坤甚懼起而訊之輕云曰某自不為人數年矣嘗念平生時若縶而不忘解也今夕得奉左右亦幸會耳坤懵然若醉不寤為鬼也輕云即引坤出門門已扃鐍隙中導坤而過曾無礙行至衢中步月徘徊久之坤忽饑語于輕云輕云曰里中人有與郎善者乎可以詣而求食也坤素與太學博士石貫善又同里居坤因與偕行至貫門而門已鍵閉輕云叩之有頃閽者啓扉曰向聞叩門今寂無睹何也因闔扉輕云又扣之如是者三閽者怒曰厲鬼安得輒扣吾門且唾且罵之輕白坤云石生已寢固不可詣矣願郎更詣他所時有國子監小吏亦同里每出常經其門吏與主月俸及條報除授坤甚委信之因與俱至其家方見啓扉有一人持水缶注入衢中輕云曰可偕入既入見小吏與數人會食初坤立于庭以為小吏必降階迎拜既而小吏不禮俄見一婢捧湯餅登階輕云即毆婢背遽仆于階湯餅盡覆小吏與妻奴俱起驚曰中惡即急召巫者巫曰有一人朱祓銀印立于庭前因祭之坤與輕云俱就坐食已而偕去女巫送到門焚紙錢于門側輕云謂坤曰郎可偕某而行坤即隨出里中望啓夏而去至郊野數十里見一墓輕云曰此妾所居郎可隨而入焉坤即俯首曲躬而入墓口曛黑不可辨忽悸然驚寤背汗股栗時天已曉心惡其夢不敢語于人是日因召石貫既坐貫曰昨夕有鬼扣吾門者三遣視之寂無所睹至曉過小吏則有焚紙錢跡即立召小吏訊其事小吏曰某昨夕方會食忽有婢中惡巫云鬼為祟由是設祭于庭焚紙于此盡與坤夢同坤益懼因告妻孥是歲冬果卒蘇太玄陽朔人蘇太玄農夫也其妻徐氏生三子而卒既葬忽一日還家但聞語而不見形云命未合終冥司未録每至必憐撫其子為之紉補經旬月鄰仵乃知或占卜吉凶述善惡一一符驗有鄉人在府充職被疾其家請卜之俄頃云至涼風館南地名柘木林遇虎當道不敢過遂卻回卜者請逼因請再往俄頃曰至府見所疾已愈疑其不實遂問其所居坊曲病人形貌徐氏先不曾至府又未識病者一一言之無差異又有人來卜謝無物奉酬深為不足徐氏曰公家三斗粟在西房何得稱無卜者請取之逡巡負致其前衆皆愕然如此不一忽一旦言帝舜發兵討蠻有人求至驛助擎熟食更一兩日當遠如期而歸將一分細食致夫前曰此飯曷若人間過軍者夫嘗之倍珍于他食又一旦泣告曰無端泄陰事獲罪被追此去難再還好看兒女泣別遂絶房千里春州南門外有仙署館館中有盧公亭房千里貶官尋醫于斯州太守館之于是東廂有內室仆夫假寐忽有朱衣人甚魁偉直來其前仆輩驚走告千里既一二夕又然千里不信然不復置于室內后纍月徒居溪亭復有假掾吏寄與東室晝日見一男子披紗裳屣履而來曰若無久駐此掾驚出戶俱以狀白于僚吏有老牙門將陸建宗曰元和中誅李師道其從事陸行儉流于是州賜死于是掾所白之狀果省不謬韋氏子京兆韋氏子舉進士門閲甚盛嘗納妓于洛顏色明秀尤善音律韋曾令寫杜工部詩得本甚舛妓隨筆改正文理曉然是以韋頗惑之年二十一而卒韋悼痛之甚為羸瘠棄事而寐意其夢見一日家僮有言嵩山任處士者得返魂之術韋召而求其術任命擇日齊戒除一室舒幃于室焚香仍須一經身衣以導其魂韋搜衣笥盡施僧矣惟余一金縷裙任曰事濟矣是夕絶人屏事且以昵近悲泣為誡燃蠟炬于香前曰睹燭燃寸即復去矣韋潔服斂息一稟其誨是夜萬籟俱止河漢澄明任忽長歎持裙面幃而招如是者三忽聞吁歎之聲俄頃蚑幃微出斜睇而立幽芳怨態若不自勝韋驚起泣任曰無庸恐迫以致倏回生忍淚揖之無異平生或與之言頷首而已逾刻燭盡及期欻欲逼之紛然而滅生乃捧幃長慟既絶而蘇任生曰某非獵食者哀君情切故來奉救漚沫槿艷不必置懷韋欲酬之不顧而別韋嘗賦詩曰惆悵金泥簇蝶裙春來猶見伴行云不教布施剛留得渾似初逢李少君悼亡甚多不備録韋自此郁郁不懌逾年而歿李潯咸通中中牟尉李潯寓居圃田別墅性剛戾不以鬼神為意每見人酹酒必怒而止之一旦暴得風眩方臥于廡下忽有田父立于榻前云鄰伍間欲來省疾見數人形貌尪劣服飾或紫或青有矮仆提酒兩壺歷階而上左右妻子悉無所睹謂潯曰爾常日負氣忽于我曹醪醴之間必為他人愛惜今有醇酎數斗衆欲為君一醉俄以巨杯滿酌飲潯兩壺俱盡余瀝滿席謂潯曰何以常時惜酒也耶自爾百骸昏悴如宿宿酲惙然數月方愈段成式太常卿段成式相國文昌子也與舉子溫庭筠親善咸通四年六月卒庭筠居閒輦下是歲十一月十三日冬至大雪凌晨有扣門者仆夫視之乃隔扉授一竹筒云段少常送書來庭筠初謂誤發筒獲書其上無字開之乃成式手札也庭筠大驚馳出戶其人已滅矣乃焚香再拜而讀但不諭其理辭曰慟發幽門哀歸短數平生已矣后世何云況復男紫悲黃女青懼緑杜陵分絶武子成腆自是井障流鸚庭鐘舞鵠交昆之故永斷私情慷慨所深力占難盡不具荊州牧段成式頓首自后寂無所聞書云腆字字書所無以意讀之當作群字耳溫段二家皆傳其本子安節前沂王傅乃庭筠壻也自說之鬼葬辰州漵浦縣西四十里有鬼葬山黃閔沅川記云其中岩有棺木遙望可長十余丈謂鬼葬之墟故老云鬼造此棺七日晝昏唯聞斧鑿聲人家不覺失器物刀斧七日霽所失之物悉還其主鐺斧皆有肥膩腥臊見此棺儼然橫据岸畔董漢勳汝墳部將董漢勳善騎射力兼數人矯捷能斗纍戍于西北邊羌人憚之乾符丙申歲為汝之龍興鎮將忽一日謂其妻曰來日有十余故人相訪可丰備酒食其家以為常客也翌日盛設廳事至辰巳間漢勳束帶出鎮門向空連拜或呼行第或呼字言笑揖讓而登廳其家大愕具酒食若陳祭焉既罷其妻詰之漢勳曰皆曩日邊上陳沒同儕也久別一來耳何異之有後漢勳終亦無恙至明年秋八月晦青土賊王仙芝數萬人奄至時承平之代郡國悉無武備是日郡選鋭卒五百人令勇將爨洪主之出郡東二十里苦慕店盡為賊所擒唯一騎走至郡郡人大驚遂閉門登陴部分固守漢勳以五百人据此門九月朔旦賊至合圍一鼓而陷南門執太守王鐐漢勳于北門乘城苦戰中矢者皆應弦飲羽所殺數十人矢盡賊已入漢勳運劍復殺數十人劍既折乃抽屋椽擊之又殺數十人日上饑疲為兵所殪賊帥亦嗟異焉
