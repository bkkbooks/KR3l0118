body:
  text: 九天使者九天使者唐開元中玄宗夢神仙羽衛千乘萬騎集於空中有一人朱衣金冠乘車而下謁帝曰我九天採訪巡糾人間欲於廬山西北置一下宮自有木石基址但須工力而已帝即遣中使詣山西北果有基迹宛然信宿有巨木數千段自然而至非人所運堂殿廊宇隨類致木皆得足用或云此木昔九江王所採擬作宮殿沉在江州湓浦至是神人運來以供所用廟西長廊柱礎架虛在巨澗之上其下汨流奔響泓窅不測久歷年歲曾無危墊初作廟時材木併至一夕巨萬皆有水痕門殿廊宇之基自然化出非人版築常有五色神光照燭廟所常如晝日揮斤運工略無餘暇人力忘倦旬日告成畢工之際中使夢神人曰赭堊丹緑廟北地中尋之自得勿須遠求於是訪之採以充用略無所闕既而建昌渡有靈官五百餘人若衣道士服者皆言詣使者廟今圖象存焉初玄宗夢神人日因召天台道士司馬承禎以訪其事承禎奏曰今名山嶽瀆血食之神以主祭祠太上慮其妄作威福以害蒸黎分命上真監蒞川嶽有五嶽真君焉又青城丈人為五嶽之長潛山九天司命立九天生籍廬山九天使者執三天之符彈劾萬神皆為五嶽上司盍各置廟以齋食為饗玄宗從之是歲五嶽三山各置廟焉出録異記十仙子唐玄宗常夢仙子十餘輩御卿雲而下列於庭各執樂器而奏之其度曲清越真仙府之音也及樂闋有一仙人前而言曰陛下知此樂乎此神仙紫雲曲也今願傳授陛下為聖唐正始音與夫咸池大夏固不同矣玄宗喜甚即傳受焉俄而寤其餘響猶若在聽玄宗遽命玉笛吹而習之盡得其節奏然默不泄及曉聽政於紫宸殿宰臣姚崇宋璟入奏事于御前玄宗俯若不聞二相懼又奏之玄宗即起卒不顧二相二相益恐趨出時高力士侍於玄宗即奏曰宰相請事陛下宜面決可否向者崇璟所言皆軍國大政而陛下卒不顧豈二相有罪乎玄宗笑曰我昨夕夢仙人奏樂曰紫雲曲因以授我我失其節奏由是默而習之故不暇聽二相奏事即於衣中出玉笛以示力士是日力士至中書以事語於二相二相懼少解曲後傳於樂府出神仙感遇傳陳校本作出宣室志二十七仙唐開元中玄宗皇帝晝景宴居昏然思寐夢二十七仙人云我等二十八宿也一人寓直在天不下我等寄羅底間三年矣與陛下鎮護國界不令戎虜侵邊衆仙每易形混迹遊處耳既寤敕天下山川郡縣有羅底字處訪之竟不能得他夕又夢云有音樂處是也再再字原闕據明鈔本陳校本補詔訪焉於寧州東南五里有地名羅川川上有縣縣以川名有羅州山相傳有洞穴而翳薈不通樵牧者聞音樂之聲詔使尋之久而不見忽有白兔出于林中徑入崖下尋所入而得嵌竇焉石室寬博中有石像二十七真得之以進乃於內殿設位晨夕焚香躬自聸謁命夾紵工作二十七像送于本洞於其處置通聖觀改縣為真寧以旌之賜寶香及爐爐今猶在鄉里之人言昔年有底老者不知所來龐眉皓發異於他叟或出或處鄉俗咸敬之於山下賣酒常有異人來飲或藥童樵父來往其家一旦衆人謂底老曰加其醞更一飲不復來矣如其言加釀以待焉釀熟群仙果至飲酣居下者一人與坐云我請刻衆仙之形以留於世乃取石二十七片刻成二十七人俄頃之間備得衆仙真容置於洞中依飲時列坐皆志仙之名氏於其背安訖而散去底老亦不復知所之時人咸謂仙舉也底老者疑其氐宿耳後著作郎東門誥為贊序以紀之出神仙感遇傳姚泓唐太宗年有禪師行道精高居於南嶽忽一日見一物人行而來直至僧前緑毛覆體禪師懼謂為梟之屬也細視面目即如人也僧乃問曰檀越為山神耶野獸耶復乃何事而特至此貧道禪居此地不擾生靈神有知無相惱也良久其物合掌而言曰今是何代僧曰大唐也又曰和尚知晉宋乎自爾至是復幾載僧曰從晉及今向百四年矣其物乃曰和尚博古知今寧不知有姚泓乎僧曰知之物曰我即泓也僧曰吾覽晉史言姚泓為劉裕所執遷姚宗于江南而斬泓於建康市據其所記泓則死矣何至今日子復稱為姚泓耶泓曰當爾之時我國實為裕所滅送我於建康市以徇天下奈何未及肆刑我乃脫身逃匿裕既求我不得遂假一人貌類我者斬之以立威聲示其後耳我則實泓之本身也僧因留坐語之曰史之説豈虛言哉泓笑曰和尚豈不聞漢有淮南王劉安乎其實升仙而遷固狀以叛逆伏誅漢史之妄豈復逾於後史耶斯則史氏妄言之證也我自逃竄山野肆意遊行福地靜廬無不探討既絶火食遠陟此峰樂道逍遙唯餐松柏之葉年深代久遍身生此緑毛已得長生不死之道矣僧又曰食松柏之葉何至生毛若是乎泓曰昔秦宮人遭亂避世入太華之峰餌其松柏歲祀浸久體生碧毛尺餘或逢世人人自驚異至今謂之毛女峰且上人頗信古豈不詳信之乎僧因問請須所食泓言吾不食世間之味久矣唯飲茶一甌仍為僧陳晉宋歷代之事如指諸掌更有史氏闕而不書者泓悉備言之既而辭僧告去竟不復見耳出逸史李衛公蘇州常熟縣元陽觀單尊師法名以清大歷中常往嘉興入船中聞香氣頗甚疑有異人遍目舟中客皆賈販之徒唯船頭一人顏色頗殊旨趣恬靜單君至中路告船人令易席座船頭就與言也既並席之後香氣亦甚單君因從容問之答曰某本此地人也少染大風眉髮皆落自惡不已遂私逃於深山意任虎豹所食數日山路轉深都無人迹忽遇一老人問曰子何人也遠入山谷某具述本意老人哀之視曰汝疾得吾今能差矣可隨吾行因隨老人行入山十餘里至一澗過水十餘步豁然廣闊有草堂數間老人曰汝未可便入且於此堂中待一月日後吾自來看汝因遺丸藥一裹令服之又云此堂中有黃精百合茯苓薯蕷棗栗蘇蜜之類恣汝所食某入堂居老人遂行更入深去某服藥後亦不飢渴但覺身輕如是凡經兩月日老人方至見其人笑曰爾尚在焉不亦有心哉汝疾已差知乎曰不知老人曰於水照之鬢眉皆生矣色倍少好老人曰汝未合久居此既服吾藥不但祛疾可長生人間矣且修行道術與汝二十年後為期因令卻歸人間臨別某拜辭曰不審仙聖復何姓名願垂告示老人曰子不聞唐初衛公李靖否即吾身是也乃辭出山今以所修恐未合聖旨年限將及再入山尋師耳單君因記其事為人説之出原仙記明鈔本作出原化記
