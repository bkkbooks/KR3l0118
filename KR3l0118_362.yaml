body:
  text: 長孫繹長孫繹長孫繹之親曰鄭使君使君惟二子甚愛之子年十五鄭方典郡常使蒼頭十余人給其役夜中蒼頭皆食子獨坐忽聞戶東有物行來履地聲甚重每移步殷然俄到戶前遂至床下乃一鐵小兒也長三尺至粗壯朱目大口謂使君子曰嘻阿母呼令吮乳來子驚叫跳入戶蒼頭既見遽報使君使君命十余人持棒擊之如擊石徐而下階望門南出至以刀斧鍛終不可傷命舉火爇之火焚其身則開口大叫聲如霹靂聞者震倒于是以火驅之既出衙門舉足驀一車轍遂滅其家亦無休咎韋虛心戶部尚書韋虛心有三子皆不成而死子每將亡則有大面出手床下嗔目開口貌如神鬼子懼而走大面則化為大鴟以翅遮擁令自投于井家人覺遽出之已愚猶能言其所見數日而死如是三子皆然竟不知何鬼怪裴錦微河東裴鏡微曾友一武人其居相近武人夜還莊操弓矢方馳騎后聞有物近焉顧而見之狀大有類方相口但稱渴將及武人武人引弓射中之怪乃止頃又來近又射之怪復住斯須又至武人遽至家門已閉武人逾垣而入入后自戶窺之怪猶在武人不敢取馬明早啓門馬鞍棄在門馬則無矣求之數里墓林中見馬被啖已盡唯骨在焉李虞全節李虞好大馬少而不逞父嘗為縣令虞隨之官為諸漫游每夜逃出自竇從人飲酒后至竇中有人背其身以尻窒穴虞排之不動以劍刺之劍沒至鐔猶如故乃知非人也懼而歸又歲暮野外從禽禽入墓林訪之林中有死人面仰其身洪脹甚可憎惡巨鼻大目挺動其眼眼仍光起直視于虞虞驚怖殆死自是不敢畋獵焉武德縣婦人開元二十八年武德有婦娠將生男其姑憂之為具儲糗其家窶有面數豆有米一區及産夕其夫不在姑與鄰母同膳之男既生姑與鄰母具食食未至婦若饑渴求食不絶聲姑饋之盡數人之餐猶言餒姑又膳升面進之婦食食無遺而益稱不足姑怒更為具之姑出后房內餅盎在焉歸下床親執器取餅食之餅又盡姑還見之怒且恐謂鄰母曰此婦何為母曰吾自幼及長未之見也姑方詢怒新婦曰姑無怒食兒乃已因提其子食之姑奪之不得驚而走俄卻入戶婦已食其子盡口血猶丹因謂姑曰新婦當臥且死亦無遺若側猶可收矣言終仰眠而死懷州民開元二十八年春二月懷州武德武陟修武三縣人無故食土云味美異于他土先是武德期城村婦人相與采拾聚而言曰今米貴人饑若為生活有老父紫衣白馬從十人來過之謂婦人曰何憂無食此渠水傍土甚佳可食汝試嘗之婦人取食味頗異遂失老父乃取其土至家拌其面為餅餅甚香由是遠近竟取之渠東西五里南北十余步土并盡牛肅時在懷親遇之武德縣民武德縣逆旅家有人鎖閉其室寄物一車如是數十日不還主人怪之開視囊皆人面衣也懼而閉之其夕門自開所寄囊物并失所在張司馬定州張司馬開元二十八年夏中夜與其妻露坐聞空中有物飛來其聲頨頨然過至堂屋為瓦所礙宛轉屋際遂落檐前因走司馬命逐之逐者以蹴之乃為狗音擒得火照則老狗也赤而鮮毛身甚長足甚短可一二寸司馬命焚之深憂其為怪月余改深州長史李適之李適之既貴且豪常列鼎于前以具膳羞一旦庭中鼎躍出相斗家僮告適之乃往其所酹酒自誓而斗亦不解鼎耳及足皆落明日適之罷知政事拜太子少保時人知其禍未止也俄為李林甫所陷貶宜春太守適之男霅為衛尉少卿亦貶巴陵郡別駕適之至州不旬月而終時人以林甫迫殺之霅乃迎喪至都李林甫怒猶未已令人巫告于河南府杖殺之適之好飲退朝后即速賓朋親戚談話賦詩曾不備于林甫初適之在相位日曾賦詩曰朱門長不備親友恣相過今日過五十不飲復如何及罷相作詩曰避賢初罷相樂聖且銜杯借問門前客今朝幾個來及死非其罪時人冤歎之李林甫李林甫宅亦屢有怪妖其南北隅溝中有火光大起或有小兒持火出入林甫惡之奏于其地立嘉猷觀林甫將疾晨起將朝命取書囊即常時所要事目也忽覺書囊頗重于常侍者開視之即有二鼠出焉投于地即變為狗蒼色壯大雄目張牙仰視林甫命弓射之殷然有聲狗形即滅林甫惡之稱疾不朝其日遂病不逾月而卒又平康坊南街廢蠻院即李林甫舊第也林甫于正寢之后別創一堂制度彎曲有卻月之形名曰偃月堂土木華麗剞劂精巧當時莫儔也林甫每欲破滅人家即入月堂精思極慮喜悅而出其家不存矣及將敗林甫于堂上見一物如人遍體被毛毛如豬立鋸身鉤瓜長三尺余以手戟林甫目如電光而怒視之林甫連叱不動遽命弧矢毛人笑而跳入前堂堂中青衣遇而暴卒經于廄廄中善馬亦卒不纍月而林甫敗楊慎矜楊慎矜兄弟富貴常不自安每詰朝禮佛象默祈冥衛一日像前土榻上聚塵三堆如冢狀慎矜惡之且慮兒戲命掃去一夕如初尋而禍作姜皎姜皎常游禪定寺京兆辦局甚盛及飲酒座上一妓絶色獻酒整鬟未嘗見手衆怪之有客被酒戲曰非支指乎乃強牽視妓隨牽而倒乃枯骸也姜竟及禍焉朝良貞朝良貞能判知名性剛鷙不懼鬼每年恆掘太歲地豎屋后忽得一肉大于食魁良貞鞭之數百送通衢其夜使人陰影聽之三更后車騎衆來至肉所問太歲兄何故受此屈辱不仇報之太歲云彼正榮盛如之奈何明失所在李氏上元末復有李氏家不信太歲掘之得一塊肉相傳云得太歲者鞭之數百當免禍害李氏鞭九十余忽然騰上因失所在李氏家有七十二口死亡略盡惟小蒯公尚存李氏兄弟恐其家滅盡夜中令奴悉作鬼裝束劫小蒯便藏之唯此子得存其后襲封蒯公又寧州有人亦掘得太歲大如方狀類赤菌有數千眼其家不識移至大路遍問識者有胡僧驚曰此太歲也宜速埋之其人遽送舊處經一年人死略盡張周封工部員外張周封言舊莊在城東狗架觜西嘗筑牆于太歲上一夕盡崩且意其基虛工不至率莊客指揮復筑之高未數尺炊者驚叫曰怪作矣遽視之飯數斗悉躍出列地著牆勻若蠶子無一粒重者矗牆之半如界焉因謁巫酹地謝之亦無他王丰萊州即墨縣有百娃王丰兄弟三人丰不信方位所忌嘗于太歲上掘坑見一肉塊大如斗蠕蠕而動遂填其坑肉隨填而出丰懼棄之經宿肉長塞于庭兄弟奴婢數日內悉暴卒惟一女子存焉房集唐肅宗朝尚書郎房集頗持權勢暇日私弟獨坐廳中忽有小兒十四五髡發齊眉而持一布囊不知所從來立于其前房初謂是親故家遣小兒相省問之不應又問囊中何物小兒笑曰眼睛也遂傾囊中可數升眼睛在地四散緣牆上屋一家驚怪便失小兒所在眼睛又不復見后集坐事誅張寅范陽張寅嘗行洛陽故城南日已昏暮欲投宿故人家經狹路中馬忽驚顧蹐局不肯行寅疑前有異因視路旁墳大柱石端有一物若似紗籠形大如橋柱上慈台漸漸長大如數斛及地飛如流星其聲如雷所歷林中宿鳥驚散可百餘步墮一人家寅竊記之乃去后月余重經其家長幼無遣矣乃詢之鄰人云其婦養姑無禮姑死遂有此禍燕鳳祥平陽燕鳳祥頗涉六藝聚徒講授夜與其妻在家中忽聞外間喑鳴之聲以為盜屣履視之正見一物白色長丈許在庭中遽掩入戶漸聞登階呼鳳祥曰夜未久何為閉戶默不敢應明燈自守須臾門隙中有一面如猴即突入呼其侶數百頭悉從隙中入皆長二尺余著豹皮犢鼻褌鼓唇睚目貌甚丑惡或緣屋壁或在梁棟間跳躑在后勢欲相逼鳳祥左右惟有一枕及婦琵琶即以擲之中者便去至明方盡遂得免恍惚常見室中有衣冠大人列在四壁云我平陽堯平使者諸巫祝祠禱之終不能去乃避于精舍中見佛榻下有大面瞪目視之又將逃于他所出門復見群鬼悉戲巷中直赴鳳祥不得去既無所出而病轉篤乃多請僧設齊結壇持咒亦迎六丁道士為作符禁咒鬼乃稍去數日鳳祥夢有一人朱衣墨幘住空中云還汝魂魄因而以物擲鳳祥有如婦人發者有如絳衣者數十枚鳳祥悉受明日遂愈焉王生永泰初有王生者住楊州孝感寺北夏日被酒臥手垂于床其妻恐風射舉之忽有巨手出于床前牽王臂墜床身漸入地其妻與奴婢共曳之不禁地如裂狀初余衣帶頃亦不見其家并力掘之深二丈許得枯骨一具已如數百年者竟不知何怪梁仲朋葉縣人梁仲朋家在汝州西郭之街南渠西有小莊常朝往夕歸大歷初八月十五日天地無氛埃去十五六里有豪族大墓林皆植白楊是時秋景落木仲朋跨馬及此二更聞林間槭槭之聲忽有一物自林飛出仲朋初謂是驚栖鳥俄便入仲朋懷鞍橋上坐月照若五斗栲栳大毛黑色頭便似人眼膚如珠便呼仲朋為弟謂仲朋曰弟莫懼頗有膻羯之氣言語一如人直至汝州郭門外見人家未寐有燈火光其怪欻飛東南去不知所在如此仲朋至家多日不敢向家中說忽一夜更深月上又好天色仲朋遂召弟妹于庭命酌或嘯或吟因語前夕之事其怪忽從屋脊上飛下來謂仲朋曰弟說老兄何事也于是小大走散獨留仲朋云為兄作主人索酒不已仲朋細視之頸下有癭子如生瓜大飛翅是雙耳又是翅鼻烏毛斗轄大如鵝卵飲數斗酒醉于杯筵上如睡著仲朋潛起礪闊刃當其項而刺之血流迸灑便起云大哥大哥弟莫悔卻映屋脊不復見庭中血滿三年內仲朋一家三十口蕩盡
