body:
  text: 江淮士人江淮士人江淮有士人莊居其子年二十余嘗病厭其父一日飲茗甌中忽皰起如甌高出甌外瑩淨若琉璃有人長一寸立于漚上高出甌中細視之衣服狀貌乃其子也食頃爆破一無所見茶碗如舊但有微璺耳數日其子遂著神譯神言斷人休咎不差李鵠前秀才李鵠覲于穎川夜至一驛才臥見物如豬者突上廳階鵠驚走透后門投驛廄潛身草積中屏息伺之怪亦隨至聲繞草積數匝瞪目視鵠所潛處忽變為巨星騰起數道燭天鵠左右取炬索鵠于草積中鵠已卒矣半日方蘇因說所見未旬無疾而卒僧智圓鄭余慶在梁州有龍興寺僧智圓善總持敕勤之術制邪理病多著效日有數十人候門智圓老稍倦鄭頗敬之因求住城東隙地起草屋而居有沙彌行者各一人數年暇日智圓向陽科腳甲有布衣婦人甚端麗至階作禮泣曰妾不幸夫亡子幼老母危病知師神咒助力乞加救護智圓曰貧道本厭城隍喧湫兼煩于招謝弟子母病可就此為加持也婦人復再三泣請且言母病亟不可舉扶智圓亦哀而許之乃言從此向北二十余里至一村村側近有魯家莊但訪韋十娘所居也智圓詰朝如言行二十余里歷訪不得乃還明日婦人復至僧責曰貧道昨日遠赴約何差謬如此婦人言只去師所止處二三里耳師慈悲必為再往僧怒曰老僧衰暮今誓不出婦人乃大聲言慈悲何在耶今事須去因上階牽僧臂僧驚迫亦疑其非人恍惚以小刀刺之婦人遂倒乃沙彌誤中刀流血死矣僧遽與行者瘞于飯瓮下沙彌本村人家去蘭若十余里其日家人悉在田有人皂衣褐袱乞漿于田中且說其事沙彌父母舉家號哭詣僧僧猶紿焉其父及鍬索而獲即訴于官鄭公大駭俾求盜吏細按意其必冤也僧具陳狀復白貧道宿債有死而已按者亦以死論僧求假七日命持念為將來資糧余慶哀而許之僧沐浴設壇急印契縛輂考其魅凡三夕婦人見于壇上言我類不少所求食處輒為師破除沙彌且在能為誓不持念必相還也智圓懇為設誓婦人喜曰沙彌在城南某村古丘中僧言于官吏如其言尋之沙彌果在神已癡矣發沙彌棺中乃一苕帚也僧自是絶其術南孝廉唐南孝廉失其名莫知何許人能作鱠彀薄縷細輕可吹起操刀響捷若合節奏因會客炫伎先起架以陳之忽暴風雨震一聲鱠悉化為胡蝶飛去南驚懼遂折刀誓不復作謝翱陳郡謝翱者嘗舉進士好為七字詩其先寓居長安升道里所居庭中多牡丹一日晚霽出其居南行百步眺終南峰佇立久之見騎自西馳來繡繢仿佛近乃雙鬟高髻靚妝色甚姝麗至翱所因駐謂翱郎非見侍耶翱曰步此徙望山耳雙鬟笑降拜曰願郎歸所居翱不測即回望其居見一青衣三四人偕立其門外翱益駭異入門青衣俱前拜既入見堂中設茵毯張帷帘錦繡輝映異香遍室翱愕然且懼不敢問一人前曰郎何懼固不為損耳頃之有金車至門見一美人年十六七風貌閒麗代所未識降車入門與翱相見坐于西軒謂翱曰聞此地有名花故來與君一醉耳翱懼稍解美人即命設饌同食其器用物莫不珍丰出玉杯命酒遞酌翱因問曰女郎何為者得不為他怪乎美人笑不答固請之乃曰君但知非人則已安用問耶夜闌謂翱曰某家甚遠今將歸不可久留此矣聞君善為七言詩願有所贈翱悵然因命筆賦詩曰陽台后會杳無期碧樹煙深玉漏遲半夜香風滿庭月花前竟發楚王時美人覽之泣下數行曰某亦嘗學為詩欲答來贈幸不見誚翱喜而請美人求絳箋翱視笥中唯碧箋一幅因與之美人題曰相思無路莫相思風里花開只片時惆悵金閨卻歸處曉鶯啼斷緑楊枝其筆札甚工翱嗟賞良久美人遂顧左右撒帳帘命燭登車翱送至門揮淚而別未數十步車與人馬俱亡見矣翱異其事因貯美人詩笥中明年春下第東歸至新丰夕舍逆旅因步月長望感前事又為詩曰一紙華箋麗碧云余香猶在墨猶新空添滿目凄涼事不見三山縹眇人斜月照衣今夜夢落花啼雨去年春紅閨更有堪愁處窗上蟲絲鏡上塵既而朗吟之忽聞數百步外有車音西來甚急俄見金閨從數騎視其從者乃前時雙鬟也驚問之雙鬟遽前告即駐車使謂翱曰通衢中恨不得一見翱請其舍逆旅固不可又問所適答曰將之弘農翱因曰某今亦歸洛陽願偕東可乎曰吾行甚迫不可即褰車帘謂翱曰感君意勤厚故一面耳言竟嗚咽不自勝翱亦為之悲泣因誦以所制之詩美人曰不意君之不忘如是也幸何厚焉又曰願更酬此一篇翱即以紙筆與之俄頃而成曰惆悵佳期一夢中五陵春色盡成空欲知離別偏堪恨只為音塵兩不通愁態上眉凝淺緑淚痕侵臉落輕紅雙輪暫與王孫駐明日西馳又向東翱謝之良久別去才百餘步又無所見翱雖知為怪眷然不能忘及到陝西遂下道至弘農留數日冀一再遇竟絶影響乃還洛陽出二詩話于友人不數月以怨結遂卒僧法長河南龍門寺僧法長者鄭州原武人寶歷中嘗自龍門歸原武家有田數頃稔則未刈一夕因乘馬行田間馬忽屹不前雖鞭抶輒不動唯瞪目東望若有所見時月明隨其望數百步外有一物如古木色兀然而來長懼即回馬走道左數十步伺之其物來漸近乃白氣高六七尺腥穢甚愈于鮑肆有聲綿綿如呻吟西望而去長策馬隨其后常遠數十步行一里余至里民王氏家遂突入焉長駐馬伺之頃之忽聞其家呼曰車宇下牛將死可偕來視之又頃聞呼后舍驢蹶仆地不可救又頃聞驚哭有出者長佯過訊之曰主人有子十余歲忽卒語未竟又聞哭音或驚叫聯聯不已夜分后聲漸少逮明而絶長駭異即具告其鄰偕來王氏居偵之其中悄然無聞因開戶而其家十余人皆死雞犬無存焉河北村正處士鄭賓于言嘗客河北有村正妻新死未斂日暮其兒女忽覺有樂聲漸進至庭宇尸已動矣及入房如在梁棟間尸遂起舞樂聲復出尸倒旋出門隨樂聲而去其家驚懼時月黑亦不敢尋逐一更村正方歸知之乃折一桑枝如臂被酒大罵尋之入墓林約五六里復覺樂聲在一柏林上乃近樹樹下有火熒熒然尸方舞矣村正舉杖擊之尸倒樂聲亦止遂負而還僧弘濟醫僧行儒說福州有僧弘濟齊戒精苦嘗于沙岸得一顱骨遂貯衣籃中歸寺數日忽眠中有物嚙其耳以手撥之落聲如數升物疑其顱骨所為也及明果墜在床下遂破為六片零置瓦溝中夜半有火如雞卵次第入瓦下燭之弘濟責曰爾不能求生人天憑朽骨何也于是怪絶金友章金友章者河內人隱于蒲州中條山凡五載山有女子日常挈瓶而汲溪水容貌殊麗友章于齊中遙見心甚悅之一日女子復汲友章躡屣企戶而調之曰誰家麗人頻此汲耶女子笑曰澗下流泉本無常主須則取之豈有定限先不相知一何造次然兒止居近里少小孤遺今且托身于姨舍艱危受盡無以自適友章曰娘子既未適人友章方謀婚媾既偶夙心無宜遐棄未委如何耳女曰君子既不以貌陋見鄙委焉敢拒違然候夜而赴佳命言訖女子汲水而去是夕果至友章迎之入室夫婦之道久而益敬友章每夜讀書常至宵分妻常坐伴之如此半年矣一夕友章如常執卷而妻不坐但佇立侍坐友章詰之以他事告友章乃令妻就寢妻曰君今夜歸房慎勿執燭妾之幸矣既而友章秉燭就榻即于被下見其妻乃一枯骨耳友章惋歎良久復以被覆之須臾乃復本形因大悸怖而謂友章曰妾非人也乃山南枯骨之精居此山北有恆明王者鬼之首也常每月一朝妾自事金郎半年都不至彼向為鬼使所録榜妾鐵杖百妾受此楚毒不勝其苦向以化身未得豈意金郎視之也事以彰矣君宜速出更不留戀蓋此山中凡物總有精魅附之恐損金郎言訖涕泣嗚咽因爾不見友章亦凄恨而去于凝岐人于凝者性嗜酒常往來邠涇間故人宰宜祿因訪飲酒涉旬乃返既而宿醒未愈令童仆先路以備休憩時孟夏麥野韶潤緩轡而行遙見道左嘉木美蔭因就焉至則系馬藉草坐未定忽見馬首南顧鼻息恐駭若有睹焉凝則隨向觀之百步外有枯骨如雪箕踞于荒冢之上五體百骸無有不具眼鼻皆通明背肋玲瓏枝節可數凝即跨馬稍前枯骨乃開口吹噓槁葉輕塵紛然自出上有烏鳶紛飛嘲噪甚衆凝良久稍逼枯骨乃竦然挺立骨節絶偉凝心悸馬亦驚走遂馳赴旅舍而先路童仆出迎相顧駭曰郎君神思一何慘悴凝即說之適有涇倅十余各執長短兵援蕃覘以東皆曰豈有是哉洎逆旅少年輩集聚極衆凝即為之導前仍與衆約曰倘或尚在當共碎之雖然恐不得見矣俄到其處而端坐如故或則叫噪曾不動搖或則彎弓發矢又無中者或欲環之前進則亦相顧莫能先焉久之枯骸欻然自起徐徐南去日勢已晚衆各恐讋稍稍遂散凝亦鞭馬而回遠望尚見烏鵲翔集逐去不散自后凝屢經其地及詢左近居人乃無復見者
