body:
  text: 巫師舒禮巴丘縣有巫師舒禮晉永昌元年病死土地神將送詣太山俗常謂巫師為道人初過冥司福舍前土地神問門吏此云何所門吏曰道人舍也土地神曰舒禮即道人便以相付禮入門見千百間屋皆懸簾置榻男女異處有念誦者唄唱者自然飲食快樂不可言禮名已送太山而身不至忽見一人八手四眼提金杵逐禮禮怖走出神已在門外遂執禮送太山太山府君問禮卿在世間何所為禮曰事三萬六千神為人解除祠祀府君曰汝佞神殺生其罪應重付吏牽去禮見一物牛頭人身持鐵叉捉禮投鐵牀上身體燋爛求死不得經纍宿備極冤楚府君問主者知禮壽未盡命放歸仍誡曰勿復殺生淫祀禮既活不復作巫師女巫秦氏義熙五年宋武帝北討鮮卑大勝進圍廣固軍中將佐乃遣使奉牲薦幣謁岱嶽廟有女巫秦氏奉高人同縣索氏之寡妻也能降靈宣教言無虛唱使使者設禱因訪克捷之期秦氏乃稱神教曰天授英輔神魔所擬有征無戰蕞爾小虜不足制也到來年二月五日當剋如期而三齊定焉楊林宋世焦湖廟有一柏枕或云玉枕枕有小坼時單父縣人楊林為賈客至廟祈求廟巫謂曰君欲好婚否林曰幸甚巫即遣林近枕邊因入坼中遂見朱樓瓊室有趙太尉在其中即嫁女與林生六子皆為祕書郎歷數十年並無思歸之志忽如夢覺猶在枕旁林愴然久之來俊臣唐載初年中來俊臣羅織告故庶人賢二子夜遣巫祈禱星月呪詛不道栲楚酸痛奴婢妄證二子自誣並鞭殺之朝野傷痛浮休子張鷟曰下里庸人多信厭禱小兒婦女甚重符書蘊匿崇姦構虛成實坎土用血誠伊戾之故為掘地埋桐乃江充之擅造也唐武后唐武后將如洛至閿鄉東騎忽不進召巫者問之巫言晉龍驤將軍王濬云臣墓在道南每為採樵者所苦聞大駕至故來求哀后敕去墓百步禁耕植今荊棘森然阿來唐韋庶人之全盛日好厭禱並將昏鏡以照人令其迷亂與崇仁坊邪俗師婆阿來專行厭魅平王誅之後往往於殿上掘得巫蠱逆韋之輩為之也雍文智唐韋庶人葬其父韋貞號酆王葬畢葬官人賂見鬼師雍文智詐宣酆王教曰當作官人甚大艱苦宜與賞著緑者與緋韋庶人悲慟欲依鬼教與之未處分間有告文智詐受賄賂驗遂斬之彭君卿唐中宗之時有見鬼師彭君卿被御史所辱他日對百官總集詐宣孝和敕曰御史不存檢校去却巾帶即去之曰有敕與一頓杖大使曰御史不奉正敕不合決杖君卿曰若不合有敕且放却御史裹頭仍舞蹈拜謝而去觀者駭之何婆唐浮休子張鷟為德州平昌令大旱郡符下令以師婆師僧祈之二十餘日無效浮休子乃推土龍倒其夜雨足江淮南好神鬼多邪俗病即祀之無醫人浮休子曾於江南洪州停數日遂聞土人何婆善琵琶卜與同行人郭司法質焉其何婆士女填門餉遺滿道顏色充悅心氣殊高郭再拜下錢問其品秩何婆乃調絃柱和聲氣曰箇丈夫富貴今年得一品時年得二品後來得三品更後年得四品郭曰何婆錯品少者官高品多者官小何婆曰今年減一品明年減二品後年減三品更後年減四品忽更得五六年總沒品郭大罵而起來婆唐崇仁坊阿來婆彈琵琶卜朱紫填門浮休子張鷟曾往觀之見一將軍紫袍玉帶甚偉下一匹細綾請一局卜來婆鳴絃柱燒香合眼而唱東告東方朔西告西方朔南告南方朔北告北方朔上告上方朔下告下方朔將軍頂禮既告請甚多必望細看以決疑惑遂即隨意支配曾勤唐曾勤任魏州館陶縣尉敕捕妖書人王直縣界藏失刺史蔣欽緒奏請一百日捉不獲與中下考其時限已過半有巫云少府必無事不用過憂後遇按察史邊沖寂奏奉敕却奪刺史曾勤俸會十一月二十二日巡陵恩赦遂得無事其時遣人分捕王直不得又有日者云至某月某日必獲王直反縛送來果有人於相州界捉得別一王直以月日反縛送到推問逗遛不是畜妖書者遂却放之阿馬婆唐玄宗東封次華陰見嶽神數里迎謁帝問左右左右莫見遂召諸巫問神安在獨老巫阿馬婆奏云在路左朱𩮉紫衣迎候陛下帝顧笑之仍敕阿馬婆敕神先歸帝至廟見神橐鞬俯伏殿庭東南大柏之下又召阿馬婆問之對如帝所見帝加禮敬命阿馬婆致意而旋尋詔先諸嶽封為金天王帝自書製碑文以寵異之其碑高五十餘尺闊丈餘厚四五尺天下碑莫大也其陰刻扈從太子王公已下官名制作狀麗鐫琢精巧無比倫白行簡唐郎中白行簡太和初因大醉夢二人引出春明門至一新冢間天將曉而回至城門店有鬻餅䬪飥者行簡餒甚方告二使者次忽見店婦抱嬰兒使者便持一小土塊與行簡令擊小兒行簡如其言擲之小兒便驚啼悶絶店婦曰孩兒中惡令人召得一女巫至焚香彈琵琶召請曰無他故小魍魎為患耳都三人一是生魂求酒食耳不為祟可速作䬪飥取酒逡巡陳設巫者拜謁二人與行簡就坐食飽而起小兒復如故行簡既寤甚惡之後逾旬而卒許至雍許至雍妻某氏儀容淡雅早歲亡沒至雍頗感歎每風景間夜笙歌盡席未嘗不歎泣悲嗟至雍八月十五日夜於庭前撫琴玩月已久忽覺簾屏間有人行吁嗟數聲至雍問曰誰人至此必有異也良久聞有人語云乃是亡妻云若欲得相見遇趙十四莫惜三貫六百錢至雍驚起問之乃無所見自此常記其言則不知趙十四是何人也後數年至雍間遊蘇州時方春見少年十餘輩皆婦人裝乘畫船將謁吳太伯廟許君因問曰彼何人也而衣裾若是人曰此州有男巫趙十四者言事多中為土人所敬伏皆趙生之下輩也許生問曰趙生之術所長者何也曰能善致人之魂耳許生乃知符其妻之說也明日早詣趙十四具陳懇切之意趙生曰某之所致者生魂耳今召死魂又令生人見之某久不為不知召得否知郎君有重念之意又神理已有所白某安得不為召之乃計其所費之直果三貫六百耳遂擇良日於其內灑掃焚香施牀几於西壁下於簷外結壇場致酒脯呼嘯舞拜彈胡琴至夕令許君處於堂內東隅趙生乃於簷下垂簾臥不語至三更忽聞庭際有人行聲趙生乃問曰莫是許秀才夫人否聞吁嗟數四應云是趙生曰以秀才誠意懇切故敢相迎夫人無怪也請夫人入堂中逡巡似有人謁簾見許生之妻淡服薄粧拜趙生徐入堂內西向而坐許生涕泗嗚咽君行若此無枉橫否妻曰此皆命也安有枉橫因問兒女家人及親舊閭里等事往復數十句許生又問人間尚佛經呼為功德此誠有否妻曰皆有也又問冥間所重何物春秋奠享無不得然最重者漿水粥也趙生致之須臾粥至向口如食收之復如故許生又曰要功德否妻云某平生無惡豈有罪乎足下前與為者亦已盡得良久趙生曰夫人可去矣恐多時即有譴謫妻乃出許生相隨泣涕曰願惠一物可以為記妻泣曰幽冥唯有淚可以傳於人代君有衣服可投一事於地許生脫一汗衫置之於地其妻取之於庭樹前懸一樹枝以汗衫蔽其面大哭良久揮手却許生掛汗衫樹枝間若乘空而去許生取汗衫視之淚痕皆血也許生痛悼數日不食盧求著幽居蘇州識趙生趙生名何蘇州人皆傳其事韋覲唐太僕卿韋覲欲求夏州節度使有巫者知其所希忽詣韋曰某善禱祝星辰凡求官職者必能應之韋不知其誑詐令擇日夜深於中庭備酒果香燈等巫者乘醉而至請韋自書官階一道虔啓於醮席既得手書官銜仰天大叫曰韋覲有異志令我祭天韋合族拜曰乞山人無以此言百口之幸也凡所玩用財物盡與之時崔侃充京尹有府囚叛獄謂巫者是其一輩里胥詰其衣裝忽異巫情窘乃云太僕卿韋覲曾令我祭天我欲陳告而以家財求我非竊盜也既當申奏宣宗皇帝召覲至殿前獲明冤狀復召宰臣論曰韋覲城南上族軒蓋承家昨為求官遂招誣謗無令酷吏加之罪愆其師巫便付京兆處死韋貶潘州司馬高駢唐高駢嘗誨諸子曰汝曹善自為謀吾必不學俗物死入四板片中以纍於汝矣及遭畢師鐸之難與諸甥姪同坎而瘞焉唯駢以舊氈苞之果符所言後呂用之伏誅有軍人發其中堂得一石函內有桐人一枚長三尺許身披桎口貫長釘背上疏駢鄉貫甲子官品姓名為厭勝之事以是駢每為用之所制如有助焉厭盜法七日以鼠九枚置籠中埋於地稱九百斤土覆坎深各二尺五寸築之令堅固雜五行書曰亭部地上土塗竈水火盜賊不經塗屋四角鼠不食蠶塗倉廩雍益堅唐雍益堅云主夜神呪持之有功德夜行及寐可已恐怖惡夢呪曰婆珊婆演底宋居士唐宋居士說擲骰子呪云伊帝彌帝彌揭羅帝念蒲十萬遍彩隨呼而成
