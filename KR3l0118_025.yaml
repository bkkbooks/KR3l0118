body:
  text: 採藥民採藥民唐高宗顯慶中有蜀郡青城民不得姓名嘗採藥於青城山下遇一大薯藥斸之深數丈其根漸大如甕此人斸之不已漸深五六丈而地陷不止至十丈餘此人墮中無由而出仰視穴口大如星焉分必死矣忽旁見一穴既入稍大漸漸匍匐可數十步前視如有明狀尋之而行一里餘此穴漸高繞穴行可一里許乃出一洞口洞上有水闊數十步岸上見有數十人家村落桑柘花物草木如二三月中有人男女衣服不似今人耕夫釣童往往相遇一人驚問得來之由遂告所以乃將小舠子渡之民告之曰不食已經三日矣遂食以胡麻飯柏子湯諸葅止可數日此民覺身漸輕問其主人此是何所兼求還蜀之路其人相與笑曰汝世人不知此仙境汝得至此當是合有仙分可且留此吾當引汝謁玉皇又其中相呼云明日上巳也可往朝謁遂將此人往其民或乘雲氣或駕龍鶴此人亦在雲中徒步須臾至一城皆金玉為飾其中宮闕皆是金寶諸人皆以次入謁獨留此人於宮門外門側有一大牛赤色形狀甚異閉目吐涎沫主人令此民禮拜其牛求乞仙道如牛吐寶物即便吞之此民如言拜乞少頃此牛吐一赤珠大踰徑寸民方欲捧接忽有一赤衣童子拾之而去民再求得青珠又為青衣童子所取又有黃者白者皆有童子奪之民遂急以手捧牛口須臾得黑珠遽自吞之黑衣童子至無所見而空去主人遂引謁玉皇玉皇居殿如王者之像侍者七人冠劍列左右玉女數百侍衛殿庭奇異花果馨香非世所有玉皇遂問民具以實對而民貪顧左右玉女玉皇曰汝既悅此侍衛之美乎民俯伏請罪玉皇曰汝但勤心妙道自有此等但汝修行未到須有功用不可輕致敕左右以玉盤盛仙果其果紺赤絶大如拳狀若世之林檎而芳香無比以示民曰恣汝以手捧之自其果紺赤起至恣汝以手捧之止原作示民曰恣汝以手拱之所得之數也其果紺赤絶大如拳狀若世之林檎而芳香無比自手拱之今據明鈔本改所得之數即侍女之數也自度盡拱可得十餘遂以手捧之唯得三枚而已玉皇曰此汝分也初至未有位次且令前主人領往彼處敕令三女充侍別給一屋居之令諸道侶導以修行此人遂卻至前處諸道流傳授真經服藥用氣洗滌塵念而三侍女亦授以道術後數朝謁每見玉皇必勉其至意其地草木常如三月中無榮落寒暑之變度如人間可一歲餘民自謂仙道已成忽中夜而歎左右問曰吾今雖得道本偶來此耳來時妻産一女才經數日家貧不知復如何思往一省之玉女曰君離世已久妻子等已當亡豈可復尋蓋為塵念未袪至此誤想民曰今可一歲矣妻亦當無恙要明其事耳玉女遂以告諸鄰諸鄰共嗟嘆之復白玉皇玉皇命遣歸諸仙等于水上作歌樂飲饌以送之其三玉女又與之別各遺以黃金一鋌曰恐至人世歸求無得以此為費耳中女曰君至彼倘無所見思歸吾有藥在金鋌中取而吞之可以歸矣小女謂曰恐君為塵念侵不復有仙金中有藥恐有明鈔本有作不固耳吾知君家已無處尋唯舍東一搗練石尚在吾已將藥置石下如金中無但取此服可矣言訖見一群鴻鵠天際飛過衆謂民曰汝見此否但從之而去衆捧民舉之民亦騰身而上便至鵠群鵠亦不相驚擾與飛空回顧猶見岸上人揮手相送可百來人乃至一城中人物甚衆問其地乃臨海縣也去蜀已甚遠矣遂鬻其金資糧經歲乃至蜀時開元末年問其家無人知者有一人年九十餘云吾祖父往年因採藥不知所之至今九十年矣乃民之孫也相持而泣云姑叔父皆已亡矣時所生女適人身死其孫已年五十餘矣相尋故居皆為瓦礫荒榛唯故砧尚在民乃毀金求藥將吞之忽失藥所在遂舉石得一玉合有金丹在焉即吞之而心中明了卻記去路此民雖仙洞得道而本庸人都不能詳問其事時羅天師在蜀見民說其去處乃云是第五洞寶仙九室之天玉皇即天皇也大牛乃馱龍也所吐珠赤者吞之壽與天地齊青者五萬歲黃者三萬歲白者一萬歲黑者五千歲此民吞黑者雖不能學道但於人世上亦得五千歲耳玉皇前立七人北斗七星也民得藥服卻入山不知所之蓋去歸洞天矣出原仙記明鈔本作出原化記元柳二公元和初有元徹柳實者居於衡山二公俱有從父為官浙右李庶人連纍各竄於歡愛州二公共結行李而往省焉至於廉州合浦縣登舟而欲越海將抵交址艤舟於合浦岸夜有村人饗神簫鼓喧譁舟人與二公僕吏齊往看焉夜將午俄颶風欻起斷纜漂舟入于大海莫知所適罥長鯨之鬐搶巨鼇之背浪浮雪嶠日涌火輪觸蛟室而梭停撞蜃樓而瓦解擺簸數四幾欲傾沉然後抵孤島而風止二公愁悶而陟焉見天王尊像瑩然於嶺所有金爐香燼而別無一物二公周覽之次忽覩海面上有巨獸出首四顧若有察聽牙森劍戟目閃電光良久而沒逡巡復有紫雲自海面湧出漫衍數百步中有五色大芙蓉高百餘丈葉葉而綻內有帳幄若繡綺錯雜耀奪人眼又見虹橋忽展直抵於島上俄有雙鬟侍女捧玉合持金爐自蓮葉而來天尊所易其殘燼炷以異香二公見之前告叩頭辭理哀酸求返人世雙鬟不答二公請益良久女曰子是何人而遽至此二公具以實白之女曰少頃有玉虛尊師當降此島與南溟夫人會約子但堅請之將有所遂言訖有道士乘白鹿馭彩霞直降於島上二公並拜而泣告尊師憫之曰子可隨此女而謁南溟夫人當有歸期可無礙矣尊師語雙鬟曰余暫修真畢當詣彼二子受教至帳前行拜謁之禮見一女未笄衣五色文彩皓玉凝肌紅流膩艷神澄沆𤅈瀣氣肅滄溟二子告以姓字夫人哂之曰昔時天台有劉晨今有柳實昔有阮肇今有元徹昔時有劉阮今有元柳莫非天也設二榻而坐俄頃尊師至夫人迎拜遂還坐有仙娥數輩奏笙簧簫笛旁列鸞鳳之歌舞雅合節奏二子恍惚若夢于鈞天即人世罕聞見矣遂命飛觴忽有玄鶴銜彩箋自空而至曰安期生知尊師赴南溟會暫請枉駕尊師讀之謂玄鶴曰尋當至彼尊師語夫人曰與安期生間闊千年不值南遊無因訪話夫人遂促侍女進饌玉器光潔夫人對食而二子不得餉尊師曰二子雖未合餉然為求人間之食而餉之夫人曰然即別進饌乃人間味也尊師食畢懷中出丹籙一卷而授夫人夫人拜而受之遂告去回顧二子曰子有道骨歸乃不難然邂逅相遇合有靈藥相貺子但宿分自有師吾不當為子師耳二子拜尊師遂去俄海上有武夫長數丈衣金甲仗劍而進曰奉使天真清道道原作進據陳校本改不謹法當顯戮今已行刑遂趨而沒夫人命侍女紫衣鳳冠者曰可送客去而所乘者何侍女曰有百花橋可馭二子二子感謝拜別夫人贈以玉壺一枚高尺餘夫人命筆題玉壺詩贈曰來從一葉舟中來去向百花橋上去若到人間扣玉壺鴛鴦自解分明語俄有橋長數百步欄檻之上皆有異花二子於花間潛窺見千龍萬蛇遽相交繞為橋之柱又見昔海上獸已身首異處浮於波上二子因詰使者使者曰此獸為不知二君故也使者曰我不當為使而送子蓋有深意欲奉託強為此行遂襟帶間解一琥珀合子中有物隱隱若蜘蛛形狀謂二子曰吾輩水仙也水仙陰也而無男子吾昔遇番禺少年情之至而有子未三歲合棄之夫人命與南嶽神為子其來久矣聞南嶽回鴈峰使者有事於水府返日憑寄吾子所弄玉環往而使者隱之吾頗為恨望二君子為持此合子至回鴈峰下訪使者廟而投之當有異變倘得玉環為送吾子吾子亦自當有報效耳慎勿啓之二子受之謂使者曰夫人詩云若到人間扣玉壺鴛鴦自解分明語何也曰子歸有事但扣玉壺當有鴛鴦應之事無不從矣又曰玉虛尊師云吾輩自有師師復是誰曰南嶽太極先生耳當自遇之遂與使者告別橋之盡所即昔日合浦之維舟處回視已無橋矣二子詢之時已一十二年歡愛二州親屬已殞謝矣問道將歸衡山中途因餒而扣壺遂有鴛鴦語曰若欲飲食前行自遇耳俄而道左有盤饌豐備二子食之而數日不思他味尋即達家昔日童稚已弱冠矣然二子妻各謝世已三晝家人輩悲喜不勝曰人云郎君亡沒大海服闋已九秋矣二子厭人世體以清虛覩妻子喪不甚悲感遂相與直抵回鴈峰訪使者廟以合子投之倏有黑龍長數丈激風噴電折樹揭屋霹靂一聲而廟立碎二子戰栗不敢熟視空中乃有擲玉環者二子取之而送南嶽廟及歸有黃衣少年持二金合子各到二子家曰郎君令持此藥曰還魂膏而報二君子家有斃者雖一甲子猶能塗頂而活受之而使者不見二子遂以活妻室後共尋雲水訪太極先生而曾無影響悶卻歸因大雪見大叟負樵而鬻二子哀其衰邁飲之以酒覩樵擔上有太極字遂禮之為師以玉壺告之叟曰吾貯玉液者亡來數十甲子甚喜再見二子因隨詣祝融峰自此而得道不重見耳出續仙傳
