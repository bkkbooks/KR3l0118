body:
  text: 楊準楊準唐楊準者宋城人士流名族因出郊野見一婦人容色殊麗準見挑之與野合經月餘日每來齊中復求引準去準不肯從忽爾心痛不可忍乃云必不得已當隨君去何至苦相料理其疾遂愈更隨婦人行十餘里至舍院宇分明而門戶卑小婦人為準設食每一舉盡碗心怪之然亦未知是鬼其後方知每準去之時閉房門尸臥牀上積六七日方活如是經二三年準兄渭準曰汝為人子當應紹績奈何忽與鬼為匹乎準慚懼出家被緇服鬼遂不至其後準反初服選為縣尉別婚家人子一年後在廳事理文案忽見婦人從門而入容色甚怒準惶懼下階乞命婦人云是度無放君理極辭搏之準遇疾而卒王乙臨汝郡有官渠店店北半里許李氏莊王乙者因赴集從莊門過遙見一女年可十五六相待欣悅使侍婢傳語乙徘徊槐陰便至日暮因詣莊求宿主人相見甚歡供設亦厚二更後侍婢來云夜尚未深宜留燭相待女不久至便敘綢繆事畢女悄然忽病乙云本不相識幸相見招今敘平生義即至重有何不暢耶女云非不盡心但適出門閉逾垣而來牆角下有鐵爬爬齒刺腳貫徹心痛痛不可忍便出足視之言訖辭還云已應必死君若有情回日過訪以慰幽魂耳後乙得官東歸塗次李氏莊所聞其女已亡私與侍婢持酒饌至殯宮外祭之因而痛哭須臾見女從殯宮中出乙乃伏地而卒侍婢見乙魂魄與女同入殯宮二家為冥婚焉韋栗韋栗者天寶時為新淦丞有少女十餘歲將之官行上揚州女向栗欲市一漆背金花鏡栗曰我上官艱辛焉得此物待至官與汝求之歲餘女死栗亦不記宿事秩滿載喪北歸至揚州泊河次女將一婢持錢市鏡行人見其色甚艷狀如貴人家子爭欲求賣有一少年年二十餘白皙可喜女以黃錢五千餘之少年與漆背金花鏡徑尺餘另一人云有鏡勝此只取三千少年復減兩千女因留連色授神與須臾辭去少年有意淫之令人隨去至其所居須臾至鋪但得黃紙三貫少年持至栗船所云適有女郎持錢市鏡入此船中今成紙錢栗云唯有一女死數年矣君所見者其狀如何少年具言服色容貌栗夫妻哭之女正復如此因領少年入船搜檢初無所得其母剪黃紙九貫置在櫬邊案上檢失三貫衆頗異之乃復開棺見鏡在焉莫不悲歎少年云錢已不論具言本意復贈十千為女設齊河間劉別駕河間劉別駕者常云世間無婦人何以適意後至西京通化門見車中婦人有美色心喜愛悅因隨至其舍在資聖寺後曲婦人留連數宵彼此兼暢劉侯不覺有異但中宵寒甚茵衾纍重然猶肉不暖心竊怪之後一日將曙忽失婦人并屋宇所在其身臥荒園中數重亂葉下因此遇痼病王玄之高密王玄之少美風彩為蘄春丞秩滿歸鄉里家在郭西嘗日晚徙倚門外見一婦人從西來將入郭姿色殊絶可年十八九明日出門又見如此數四日暮輒來王戲問之曰家在何處向暮來此女笑曰兒家近在南岡有事須至郭耳王試挑之女遂欣然因留宿甚相親昵明旦辭去數夜輒一來後乃夜夜來宿王情愛甚至試謂曰家既近許相過否答曰家甚狹陋不堪延客且與亡兄遺女同居不能無嫌疑耳王遂信之寵念轉密於女工特妙王之衣服皆其裁製見者莫不歎賞之左右一婢亦有美色常隨其後雖在晝日亦不復去王問曰兄女得無相望乎答曰何須強預他家事如此積一年後一夜忽來色甚不悅啼泣而已王問之曰過蒙愛接乃復離去奈何因嗚咽不能止王驚問故女曰得無相難乎兒本前高密令女嫁為任氏妻任無行見薄父母憐念呼令歸後乃遇疾卒殯於此今家迎喪明日當去王既愛念不復嫌忌乃便悲惋問明日得至何時曰日暮耳一夜敘別不眠明日臨別女以金縷玉杯及玉環一雙留贈王以繡衣答之握手揮涕而別明日至期王於南岡視之果有家人迎喪發襯女顏色不變粉黛如故見繡衣一箱在棺中而失其所送金杯及玉環家人方覺有異王乃前見陳之兼示之玉杯與環皆捧之而悲泣因問曰兄女是誰曰家中二郎女十歲病死亦殯其旁婢亦帳中木人也其貌正與從者相似王乃臨柩悲泣而別左右皆感傷後念之遂恍惚成病數日方愈然每思輒忘寢食也鄭德懋滎陽鄭德懋常獨乘馬逢一婢姿色甚美馬前拜云崔夫人奉迎鄭郎鄂然曰素不識崔夫人我又未婚何故相迎婢曰夫人小女頗有容質且以清門令族宜相匹敵鄭知非人欲拒之即有黃衣蒼頭十餘人至曰夫人趣郎進輒控馬其行甚疾耳中但聞風鳴奄至一處崇垣高門外皆列植楸桐鄭立於門外婢先白須臾命引鄭郎入進歷數門館宇甚盛夫人著梅緑羅裙可年四十許姿容可愛立於東階下侍婢八九皆鮮整鄭趨謁再拜夫人曰無怪相屈耶以鄭郎清族美才願託姻好小女無堪幸能垂意鄭見逼不知所對但唯而已夫人乃堂上命引鄭郎自西階升堂上悉以花罽薦地左右施局腳牀七寶屏風黃金屈膝門垂碧箔銀鉤珠絡長筵列饌皆極豐潔乃命坐夫人善清談敘置輕重世難以比食畢命酒以銀貯之可三斗餘琥珀色酌以鏤杯侍婢行酒味極甘香向暮一婢前白女郎已嚴粧訖乃命引鄭郎出就外間浴以百味香湯左右進衣冠履珮美婢十人扶入恣為調謔自堂及門步致花燭乃延就帳女年十四五姿色甚豔目所未見被服粲麗冠絶當時鄭遂欣然其後遂成禮明日夫人命女與就東堂堂中置紅羅繡帳衾褥茵席皆悉精絶女善彈箜篌曲詞新異鄭問所迎婚前乘來馬今何在許曰今已反矣如此百餘日鄭雖情愛頗重而心稍嫌忌因謂女曰可得同歸乎女慘然曰幸託契會得侍巾櫛然幽冥理隔不遂如何因涕泣交下鄭審其怪異乃白夫人曰家中相失頗有疑怪乞賜還也夫人曰適蒙見顧良深感慕然幽冥殊塗理當暫隔分離之際能不泫然鄭亦泣下乃大宴會與別曰後三年當相迎也鄭因拜辭婦出門揮淚握手曰雖有後期尚延年歲歡會尚淺乖離苦長努力自愛鄭亦悲惋婦以襯體紅衫及金叉一雙贈別曰若未相忘以此為念乃分袂而去夫人敕送鄭郎乃前青驄被帶甚精鄭乘馬出門倏忽復至其家奴遂云家中失已一年矣視其所贈皆真物也其家語云郎君出行後其馬自歸不見有人送來鄭始尋其故處唯見大墳旁有小冢塋前列樹皆已枯矣而前所見悉華茂成陰其左右人傳崔夫人及小郎墓也鄭尤異之自度三年之期必當死矣後至期果見前所使婢乘車來迎鄭曰生死固有定命苟得樂處吾得何憂乃悉分判家事預為終期明日乃卒朱敖杭州別駕朱敖舊隱河南之少室山天寶初陽翟縣尉李舒在嶽寺使騎招敖乘馬便騁從者在後稍行至少姨廟下時盛暑見緑袍女子年十五六姿色甚麗敖意是人家臧獲亦訝其暑月挾纊馳馬問之女子笑而不言走入廟中敖亦下馬不見有人遂壁上觀畫見緑袍女子乃途中覩者也嘆息久之至寺具說其事舒等尤所歎異爾夕既寐夢女子至把被欣悅精氣越泆纍夕如此嵩嶽道士吳筠為書一符辟之不可又吳以道術制之亦不可他日宿程道士房程於法清淨神乃不至敖後於河南府應舉與渭南縣令陳察微往詣道士程谷神為設薯藥不托蓮花鮮胡麻饌留連笑語日暮方回去少室五里所忽嵩黑雲騰踊中掣火電須臾暗昧驟雨如瀉敖與察微從者一人伏櫪林下旁抵巨壑久之有異光與日月殊狀忽於光中遍是松林見天女數人持一舞筵周竟數里施為松林上有天女數十人狀如天仙對舞筵上兼有諸神若觀世音終其兩舞如半日許曲終有數人狀如俳優卷筵回去便天地昧黑復不見人敖等夤緣夜半方至舍耳裴虬蘇州山人陸去奢亭子者即宋散騎戴顒宅也天寶末河東裴虬常旅寄此亭暴亡久之方悟說云初一人來云戴君見召虬問戴為誰人曰君知宋散騎常侍戴顒乎虬曰知之曰今呼君者即是人也虬至見顒顒求以己女妻虬云先以結婚不當再娶顒曰人神殊道何苦也虬言已適有祿位不合為君女壻久之言相往來顒笑虬不可屈乃釋之遂活也趙佐趙佐者天寶末補國子四門生常寢疾恍惚有二黃衣吏拘行至溫泉宮觀風樓西別有府署吏引入始見一人如王者佐前拜謁王謂佐曰君識我否佐辭不識王曰君聞秦始皇乎我即是也君人主於我家側造諸宮殿每奏妓樂備極奢侈誠美王也故我亦如此起樓以觀樂因訪問人間事甚衆又問佐曰人間不久大亂宜自謀免難無久住京城也言訖使人送還岐州佐史岐州佐史嘗因事至京停興道里忽見二人及一無頭人來云王令追己佐史知其鬼因問君在地下並何職掌云是捉事佐史謂曰幸與諸君臭味頗同能相救否事了當奉萬張紙錢王人許諾期後五日若不復來者即是事了其錢可至天門街燒之至五日不來吏乃燒錢畢因移居崇仁里後京中事了西還岐州至杏樹店復逢二人問何所來頃於舊處相訪不是所處分事已得免勞致錢賤地所由已給永年優復牒訖非大期至更無疾病耳
