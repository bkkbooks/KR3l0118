body:
  text: 劉子南劉子南劉子南者乃漢冠軍將軍武威太守也從道士尹公受務成子螢火丸辟疾病疫氣百鬼虎狼虺蛇蜂蠆諸毒及五兵白刃賊盜凶害用雄黃明鈔本雄黃下有雌黃二字各二兩螢火鬼箭蒺䔧各一兩鐵槌柄燒令焦黑鍜竈中灰羖羊角各一分半研如粉麵以雞子黃並丹雄雞冠血丸如杏仁大者以三角絳囊盛五丸常帶左臂上從軍者繫腰中居家懸戶上辟盜賊諸毒物子南合而佩之永平十二年於武威邑界遇虜大戰敗績餘眾奔潰獨為寇所圍矢下如雨未至子南馬數尺矢輒墮地終不能中傷虜以為神人也乃解圍而去子南以教其子及兄弟為軍者皆未嘗被傷喜得其驗傳世寶之漢末青牛道士封君達得之以傳安定皇甫隆隆授魏武帝乃稍傳於人間一名冠軍丸亦名武威丸今載在千金翼中出神仙感遇傳郭文字文舉洛陽人也晉書有傳隱餘杭天柱山或居大璧巖太和真人曾降其室授以沖真之道晦跡潛修世所不知有虎張口至石室前若有所告文舉以手探虎喉中得骨去之明日虎啣一死鹿致石室之外自此虎常馴擾於左右亦可撫而牽之文舉出山虎必隨焉雖在城市眾人之中虎俛首隨行不敢肆暴如犬羊耳或以書策致其背上亦負而行文嘗採木實竹葉以貨鹽米置於筐中虎負而隨之晉帝聞之徵詣闕下問曰先生馴虎有術邪對曰自然耳人無害獸之心獸無傷人之意何必術為撫我則後虎猶民也虐我則讎民猶虎也理民與馴虎亦何異哉帝高其言拜官不就歸隱鰲亭山得道而去後人於其臥床席下得蒻葉書金雄詩金雌記其言皆當時讖詞其蛻如蛇也出神仙拾遺嵩山叟晉時人也世說云嵩山北有大穴莫測其深淺百姓每歲遊觀其上叟嘗悞墮穴中同輩冀其儻不死投食於穴墮者得而食之巡穴而行十許日忽曠然見明有草屋一區中有二仙對碁局下有數杯白飲墮者告以饑渴碁者與之飲飲畢氣力十倍碁者曰汝欲留此否答不願停碁者教云從此西行數十步有大井井中多怪異慎勿畏之必投身井中自當得出若饑可取井中物食之如其言入井中多蛟龍然見叟輒避其路於是隨井而行井中物如青泥而香美食之了不饑半年許乃出蜀青城山因得歸洛下問張舉明鈔本陳校本舉作華舉曰此仙館丈夫所飲者玉漿所食者龍穴石髓子其得仙者乎遂尋洞卻往不知所之玄中記云蜀郡青城山有洞穴分為三道西北通崑崙茅君傳云青城是第五洞九仙寶室之天周廻二千里十洞天之一也入山十里得至焉出神仙拾遺許真君許真君名遜字敬之本汝南人也祖琰父肅世慕至道東晉尚書郎邁散騎常侍護軍長史穆皆真君之族子也真君弱冠師大洞君吳猛傳三清法要鄉舉孝廉拜蜀旌陽令尋以晉室棼亂棄官東歸因與吳君同遊江左會王敦作亂真君乃假為符竹求謁於敦蓋將欲止敦之暴以存晉室也一日真君與郭璞同候於敦敦蓄怒以見之謂真君曰孤昨得一夢擬請先生圓之可乎真君曰請大將軍具述敦曰孤夢將一木上破其天孤禪帝位果十全乎許君曰此夢固非得吉敦曰請問其說真君曰木上破天是未字也明公未可妄動晉祚固未衰耳王敦怒因令郭璞筮之卦成景純曰無成又問其壽璞曰明公若起事禍將不久若住武昌壽不可測敦大怒又問曰卿壽幾何璞曰余壽盡今日敦怒令武士執璞出將赴刑焉是時二真君方與敦飲酒許君擲杯梁上飛遶梁間敦等舉目看盃許君坐中隱身於是南出晉關抵廬江口因召船師載往鍾陵是時船師曰我雖有此船且無人力乘駕無由載君真君曰汝但以船載我我當自與行船仍謂船師曰汝宜入船閉門深隱若聞船行疾速不得輒有潛窺於是騰舟離水凌空入雲真君談論端坐頃刻之間已抵廬山金闕洞之西北紫霄峰頂真君意欲暫過洞中龍行既低其船拽撥林木戛刺響駭其聲異常舟師不免偷目潛窺二龍知人見之峰頂委舟而去真君謂船師曰汝違吾教驚觸二龍委棄此船萬仞峰頂吾緣貪與眾真除盪妖害暫須離此遊涉江湖汝既失船徒返人世汝可隱此紫霄峰上遊覽匡廬示之以服餌靈草之門指之以遁跡地仙之術由是舟師之船底遺跡尚存後於豫章遇一少年容儀修整自稱慎郎許君與之談話知非人類指顧之間少年告去真君謂門人曰適來年少乃是蛟蜃之精吾念江西累為洪水所害若非翦戮恐致逃遁蜃精知真君識之潛於龍沙洲北化為黃牛真君以道眼遙觀謂弟子施大王曰彼之精怪化作黃牛我今化其身為黑牛仍以手巾掛膊將以認之汝見牛奔鬭當以劍截彼彼原作後據陳校本改真君乃化身而去俄頃果見黑牛奔趁黃牛而來大王以劍揮牛中其左股因投入城西井中許君所化黑牛趁後亦入井內其蜃精復從此井奔走徑歸潭州卻化為人先是蜃精化為美少年聰明爽雋而又富於寶貨知潭州刺史賈玉有女端麗欲求貴壻以匹之蜃精乃廣用財寶賂遺賈公親近遂獲為伉儷焉自後與妻於衙署後院而居每至春夏之間常求旅遊江湖歸則珍寶財貨數餘萬計賈使君之親姻僮僕莫不賴之而成豪富至是蜃精一身空歸且云被盜所傷舉家歎惋之際典客者報云有道流姓許字敬之求見使君賈公遽見之真君謂賈公曰聞君有貴壻略請見之賈公乃命慎即出與道流相見慎郎怖畏託疾潛藏真君厲聲而言曰此是江湖害物蛟蜃老魅焉敢遁形於是蜃精復變本形宛轉堂下尋為吏兵所殺真君又令將其二子出以水噀之即化為小蜃妻賈氏幾欲變身父母懇真君遂與神符救療仍令穿其宅下丈餘已旁亘無際矣真君謂賈玉曰汝家骨肉幾為魚鼈也今須速移不得暫停賈玉倉皇徙居俄頃之間官舍崩沒白浪騰涌即今舊跡宛然在焉真君以東晉孝武帝太康二年八月一日於洪州西山舉家四十二口拔宅上昇而去唯有石函藥臼各一所車轂一具與真君所御錦帳復自雲中墮於故宅鄉人因於其地置遊帷觀焉出十二真君傳吳真君吳真君名猛字世雲家於豫章武寧縣七歲事父母以孝聞夏寢臥不驅蚊蚋蓋恐其去而噬其親也及長事南海太守鮑靖因語至道將遊鍾陵江波浩淼猛不假舟楫以白羽扇畫水而渡觀者奇之猛有道術忽一日狂風暴起猛乃書符擲于屋上有一青鳥銜符而去須臾風定人或問之答曰南湖有遭此風者其中二道人呼天求救故以此拯焉後人訪尋果如所述時武寧縣令干慶死三月未殯猛往哭之因云令長固未合死今吾當為上天訟之猛遂臥慶屍旁數日俱還時方盛暑屍柩壞爛其魂惡不欲復入猛強排之乃復重蘇慶弟晉著作郎寶感其兄及覩亡父殉妾復生因撰搜神記備行于世猛後於西平乘白鹿寶車沖虛而去出十二真君傳萬寶常萬寶常不知何許人也生而聰頴妙達鍾律徧工八音常於野中遇十許人車服鮮麗麾幢森列如有所待寶常趨避之此人使人召至前曰上帝以子天授音律之性將傳八音於季末之世救將壞之樂然正始之聲子未備知也使鈞天之官以示子玄微之要命坐而教以歷代之樂理亂之音靡不周述寶常畢記之良久群仙凌空而去寶常還家已五日矣自此人間之樂無不精究嘗與人同食之際言及聲律時無樂器寶常以食器雜物以筯扣之品其高下宮商畢備諧作絲竹大為時人所賞歷周泊隋落拓不仕開皇初沛國公鄭譯定樂成奏之文帝召寶常問其可否常曰此亡國之音哀怨浮散非正雅之聲極言其不可詔令寶常創造樂器而其聲率下不與舊同又云世有周禮旋宮之義自漢魏以來知音者皆不能通之寶常創之人皆哂笑於是試令為之應手成曲眾咸嗟異由是損益樂器不可勝紀然其聲雅澹不合於俗人皆不好卒寢而不行寶常聽太常之樂泣謂人曰淫厲而哀天下不久相殺盡當時海內晏安天下全盛人聞其言大為不爾及大業之末卒驗其事是時鄭譯何妥盧賁蘇道蕭吉王令言皆能於雅樂安馬駒曾妙達王長通敦金樂等陳校本曾作曹敦作郭能作新聲皆心服寶常言其天天原作久據明鈔本陳校本改假矣寶常無子嘗謂其友曰吾不堪病則孤矣因病妻竊其財物而逃幾至餓殞忽一夕先所遇神仙來降其家曰汝捨九天之高逸念下土之塵愛淪沒於茲限將畢矣須記得雲亭宮之會乎寶常懵然良久乃悟他日謂鄰人曰吾偶自仙宮謫於人世即將去矣旬日不知所之出仙傳拾遺黃刻本作出神仙拾遺李筌李筌號達觀子居少室山好神仙之道常歷名山博採方術至嵩山虎口巖得黃帝陰符經本絹素書朱漆軸緘以玉匣題云大魏真君二年七月七日上清道士寇謙之藏諸名山用傳同好其本糜爛筌抄讀數千遍竟不曉其義理因入秦至驪山下逢一老母髽髻當頂餘髮半垂弊衣扶杖神狀甚異路旁見遺火燒樹因自語曰火生於木禍發必剋筌驚而問之曰此黃帝陰符上文母何得而言之母曰吾授此符已三元六周甲子矣少年從何而得之筌稽首載拜具告所得母曰少年顴骨貫於生門命輪齊於日角血脈未減減原作滅據明鈔本陳校本改心影不偏性賢而好法神勇而樂至明鈔本至作智真是吾弟子也然四十五當有大厄因出丹書符一通貫於杖端令筌跪而吞之曰天地相保於是坐於石上與筌說陰符之義曰此符凡三百言一百言演道一百言演術一百言演法上有神仙抱一之道中有富國安民之法下有強兵戰勝之術皆內出心機外合人事觀其精微黃庭內景不足以為玄鑒其至要經傳子史不足以為文孫吳韓白不足以為奇非有道之士不可使聞之故至人用之得其道君子用之得其術常人用之得其殃職明鈔本職作識分不同也如傳同好必清齋而授之有本者為師受書者為弟子不得以富貴為重貧賤為輕違者奪紀二十本命日誦七遍益心機加年壽每年七月七日寫一本藏名山石巖中得加算久之母曰已晡時矣吾有麥飯相與為食袖中出一瓠令筌谷中取水水既滿矣瓠忽重百餘斤力不能制而沉泉中及還已失老母但留麥飯數升於石上而已筌有將略作太白陰符十卷有相業著中台志十卷時為李林甫所排位不顯竟入名山訪道不知所終出神仙感遇傳
