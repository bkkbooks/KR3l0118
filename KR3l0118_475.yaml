body:
  text: 淳于棼淳于棼東平淳于棼吳楚游俠之士嗜酒使氣不守細行纍巨産養豪客曾以武藝補淮南軍裨將因使酒忤帥斥逐落魄縱誕飲酒為事家住廣陵郡東十里所居宅南有大古槐一株枝干修密清陰數畝淳于生日與群豪大飲其下唐貞元七年九月因沈醉致疾時二友人于坐扶生歸家臥于堂東廡之下二友謂生曰子其寢矣余將秣馬濯足俟子小愈而去生解巾就枕昏然忽忽仿佛若夢見二紫衣使者跪拜生曰槐安國王遣小臣致命奉邀生不覺下榻整衣隨二使至門見青油小車駕以四牡左右從者七八扶生上車出大戶指古槐穴而去使者即驅入穴中生意頗甚異之不敢致問忽見山川風候草木道路與人世甚殊前行數十里有郛郭城堞車輿人物不絶于路生左右傳車者傳呼甚嚴行者亦爭辟于左右又入大城朱門重樓樓上有金書題曰大槐安國執門者趨拜奔走旋有一騎傳呼曰王以駙馬遠降令且息東華館因前導而去俄見一門洞開生降車而入彩檻雕楹華木珍果列植于庭下幾案茵褥帘幃肴膳陳設于庭上生心甚自悅復有呼曰右相且至生降階祗奉有一人紫衣象簡前趨賓主之儀敬盡焉右相曰寡君不以弊國遠僻奉迎君子托以姻親生曰某以賤劣之軀豈敢是望右相因請生同詣其所行可百步入朱門矛戟斧鉞布列左右軍吏數百辟易道側生有平生酒徒周辨者亦趨其中生私心悅之不敢前問右相引生升廣殿御衛嚴肅若至尊之所見一人長大端嚴居正位衣素練服簪朱華冠生戰栗不敢仰視左右侍者令生拜王曰前奉賢尊命不棄小國許令次女瑤芳奉事君子生但俯伏而已不敢致詞王曰且就賓宇續造儀式有旨右相亦與生偕還館舍生思念之意以為父在邊將因沒虜中不知存亡將謂父北蕃交通而致茲事心甚迷惑不知其由是夕羔雁幣帛威容儀度妓樂絲竹肴膳燈燭車騎禮物之用無不咸備有群女或稱華陽姑或稱青溪姑或稱上仙子或稱下仙子若是者數輩皆侍從數千冠翠鳳冠衣金霞帔采碧金鈿目不可視遨游戲樂往來其門爭以淳于郎為戲弄風態妖麗言詞巧艷生莫能對復有一女謂生曰昨上巳日吾從靈芝夫人過禪智寺于天竹院觀右延舞婆羅門吾與諸女坐北牖石榻上時君少年亦解騎來看君獨強來親洽言調笑謔吾與窮英妹結絳巾挂于竹枝上君獨不憶念之乎又七月十六日吾于孝感寺侍上真子聽契玄法師講觀音經吾于講下舍金鳳叉兩隻上真子舍水犀合子一枚時君亦講筵中于師處請叉合視之賞歎再三嗟異良久顧余輩曰人之與物皆非世間所有或問吾民或訪吾里吾亦不答情意戀戀矚盼不舍君豈不思念之乎生曰中心藏之何日忘之群女曰不意今日與君為眷屬復有三人冠帶甚偉前拜生曰奉命為駙馬相者中一人與生且故生指曰子非馮翊田子華乎田曰然生前執手敘舊久之生謂曰子何以居此子華曰吾放游獲受知于右相武成侯段公因以栖托生復問曰周辨在此知之乎子華曰周生貴人也職為司隸權勢甚盛吾數蒙庇護言笑甚歡俄傳聲曰駙馬可進矣三子取劍佩冕服更衣之子華曰不意今日獲睹盛禮無以相忘也有仙姬數十奏諸異樂婉轉清亮曲調凄悲非人間之所聞聽有執燭引導者亦數十左右見金翠步障彩碧玲瓏不斷數里生端坐車中心意恍惚甚不自安田子華數言笑以解之向者群女姑娣各乘鳳翼輦亦往來其間至一門號修儀宮群仙姑姊亦紛然在側令生降車輦拜揖讓升降一如人間撤障去扇見一女子云號金枝公主年可十四五儼若神仙交歡之禮頗亦明顯生自爾情義日洽榮曜日盛出入車服游宴賓御次于王者王命生與群寮備武衛大獵于國西靈龜山山阜峻秀川澤廣遠林樹丰茂飛禽走獸無不蓄之師徒大獲竟夕而還生因他日啓王曰臣頃結好之日大王云奉臣父之命臣父頃佐邊將用兵失利陷沒胡中爾來絶書信十七八歲矣王既知所在臣請一往拜覲王遽謂曰親家翁職守北土信問不絶卿但具書狀知聞未用便去遂命妻致饋賀之禮一以遣之數夕還答生驗書本意皆父平生之跡書中憶念教誨情意委屈皆如昔年復問生親戚存亡閭里興廢復言路道乖遠風煙阻絶詞意悲苦言語哀傷又不令生來覲云歲在丁丑當與女相見生捧書悲咽情不自堪他日妻謂生曰子豈不思為政乎生曰我放蕩不習政事妻曰卿但為之余當奉贊妻遂白于王纍日謂生曰吾南柯政事不理太守黜廢欲藉卿才可曲屈之便與小女同行生敦受教命王遂敕有司備太守行李因出金玉錦繡箱奩仆妾車馬列于廣衢以餞公主之行生少游俠曾不敢有望至是甚悅因上表曰臣將門余子素無藝術猥當大任必敗朝章自悲負乘坐致覆餗今欲廣求賢哲以贊不逮伏見司隸穎川周辨忠亮剛直守法不回有毗佐之器處士馮翊田子華清慎通變達政化之源二人與臣有十年之舊備知才用可托政事周請署南柯司憲田請署司農庶使臣政績有聞憲章不紊也王并依表以遣之其夕王與夫人餞于國南王謂生曰南柯國之大郡土地丰壤人物豪盛非惠政不能以治之況有周田二贊卿其勉之以副國念夫人戒公主曰淳于郎性剛好酒加之少年為婦之道貴乎柔順爾善事之吾無憂矣南柯雖封境不遙晨昏有間今日暌別寧不沾巾生與妻拜首南去登車擁騎言笑甚歡纍夕達郡郡有官吏僧道耆老音樂車輿武衛鑾鈴爭來迎奉人物闐咽鐘鼓喧譁不絶十數里見雉堞台觀佳氣郁郁入大城門門亦有大榜題以金字曰南柯郡城是朱軒棨戶森然深邃生下車省風俗療病苦政事委以周田郡中大理自守郡二十載風化廣被百姓歌謠建功德碑立生祠宇王甚重之賜食邑錫爵位居台輔周田皆以政治著聞遞遷大位生有五男二女男以門蔭授官女亦娉于王族榮耀顯赫一時之盛代莫比之是歲有檀蘿國者來伐是郡王命生練將訓師以征之乃表周辨將兵三萬以拒賊之衆于瑤台城辨剛勇輕進師徒敗績辨單騎裸身潛遁夜歸城賊亦收輜重鎧甲而還生因囚辨以請罪王并舍之是月司憲周辨疽發背卒生妻公主遘疾旬日又薨生因請罷郡護喪赴國王許之便以司農田子華行南柯太守事生哀慟發引威儀在途男女叫號人吏奠饌攀轅遮道者不可勝數遂達于國王與夫人素衣哭于郊候靈輿之至諡公主曰順儀公主備儀仗羽葆鼓吹葬于國東十里盤龍岡是月故司憲子榮信亦護喪赴國生久鎮外藩結好中國貴門豪族靡不是洽自罷郡還國出入無恆交游賓從威福日盛王意疑憚之時有國人上表云玄象謫見國有大恐都邑遷徙宗廟崩壞釁起他族事在蕭牆時議以生侈僭之應也遂奪生侍衛禁生游從處之私第生自恃守郡多年曾無敗政流言怨悖郁郁不樂王亦知之因命生曰姻親二十余年不幸小女夭枉不得與君子偕老良用痛傷夫人因留孫自鞠育之又謂生曰卿離家多時可暫歸本里一見親族諸孫留此無以為念后三年當令迎生生曰此乃家矣何更歸焉王笑曰卿本人間家非在此生忽若惛睡瞢然久之方乃發悟前事遂流涕請還王顧左右以送生生再拜而去復見前二紫衣使者從焉至大戶外見所乘車甚劣左右親使御仆遂無一人心甚歎異生上車行可數里復出大城宛是昔年東來之途山川源野依然如舊所送二使者甚無威勢生逾怏怏生問使者曰廣陵郡何時可到二使謳歌自若久之乃答曰少頃即至俄出一穴見本里閭巷不改往日潸然自悲不覺流涕二使者引生下車入其門升自階己身臥于堂東廡之下生甚驚畏不敢前近二使因大呼生之姓名數聲生遂發寤如初見家之僮仆擁篲于庭二客濯足于榻斜日未隱于西垣余樽尚湛于東牖夢中倏忽若度一世矣生感念嗟歎遂呼二客而語之驚駭因與生出外尋槐下穴生指曰此即夢中所驚入處二客將謂狐狸木媚之所為祟遂命仆夫荷斤斧斷擁腫折查蘗尋穴究源旁可袤丈有大穴根洞然明朗可容一榻上有積土壤以為城郭台殿之狀有蟻數斛隱聚其中中有小台其色若丹二大蟻處之素翼朱首長可三寸左右大蟻數十輔之諸蟻不敢近此其王矣即槐安國都也又窮一穴直上南枝可四丈宛轉方中亦有土城小樓群蟻亦處其中即生所領南柯郡也又一穴西去二丈磅礡空朽嵌窞異狀中有一腐龜殼大如斗積雨浸潤小草叢生繁茂翳薈掩映振殼即生所獵靈龜山也又窮一穴東去丈余古根盤屈若龍虺之狀中有小土壤高尺余即生所葬妻盤龍岡之墓也追想前事感歎于懷披閲窮跡皆符所夢不欲二客壞之遽令掩塞如舊是夕風雨暴發旦視其穴遂失群蟻莫知所去故先言國有大恐都邑遷徙此其驗矣復念檀蘿征伐之事又請二客訪跡于外宅東一里有古涸澗側有大檀樹一株藤蘿擁織上不見日旁有小穴亦有群蟻隱聚其間檀蘿之國豈非此耶嗟乎蟻之靈異猶不可窮況山藏木伏之大者所變化乎時生酒徒周辨田子華并居六合縣不與生過從旬日矣生遽遣家僮疾往候之周生暴疾已逝田子華亦寢疾于床生感南柯之浮虛悟人世之倏忽遂栖心道門絶棄酒色后三年歲在丁丑亦終于家時年四十七將符宿契之限矣公佐貞元十八年秋八月自吳之洛暫泊淮浦偶覿淳于生棼詢訪遺跡翻復再三事皆托實輒編録成傳以資好事雖稽神語怪事涉非經而竊位著生冀將為戒后之君子幸以南柯為偶然無以名位驕于天壤間云前華州參軍李肇贊曰貴極祿位權傾國都達人視此蟻聚何殊
