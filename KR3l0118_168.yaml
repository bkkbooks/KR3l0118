body:
  text: 熊執易熊執易熊執易赴舉行次潼關秋霖月餘滯於逆旅俄聞鄰店有一士吁嗟數次執易潛問之曰前堯山令樊澤舉制科至此馬斃囊空莫能自進執易造焉遽輟所乘馬倒囊濟之執易其年罷舉澤明年登科出托言李約李約為兵部員外汧公之子也識度清曠迥出塵表與主客張員外諗同官並韋徵君況墻東遁世不婚娶不治生業李獨厚於張每與張匡牀靜言達旦不寢人莫得知贈張詩曰我有心中事不與韋二說秋夜洛陽城明月照張八約嘗江行與一商胡舟楫相次商胡病固邀相見以二女託之皆絶色也又遺一珠約悉唯唯及商胡死財寶約數萬悉籍其數送官而以二女求配始殮商胡時約自以夜光唅之人莫知也後死胡有親屬來理資財約請官司發掘檢之夜光果在其密行皆此類也出尚書故實鄭還古東都間居與柳當將軍者甚熟柳宅在履信東街有樓臺水木之盛家甚富妓樂極多鄭往來宴飲與諸妓笑語既熟因調謔之妓以告柳憐鄭文學又貧亦不之怪鄭將入京求官柳開筵餞之酒酣與妓一章曰冶豔出神仙歌聲勝管絃眼看白苧曲欲上碧雲天未擬生裴秀如何乞鄭玄莫教金谷水橫過墜樓前柳見詩甚喜曰某不惜此妓然吾子方求官事力空困將去固不易支持專待見榮命便發遣入京充賀禮及鄭入京不半年除國子博士柳見除目乃津置入京妓行及嘉祥驛鄭已亡歿旅襯尋到府界柳聞之悲歎不已遂放妓他適出盧氏雜說江陵士子江陵寓居士子忘其姓名有美姬甚貧求尺題於交廣間遊索去萬計支持五年糧食且戒其姬曰我若五年不歸任爾改適士子去後五年未歸姬遂為前刺史所納在高麗坡底及明年其夫歸已失姬之所在尋訪知處遂為詩求媒標寄之詩云陰雲漠漠下陽臺惹著襄王更不回五度看花空有淚一心如結不曾開纖蘿自合依芳樹覆水寧思返舊杯惆悵高麗坡底宅春光無復下山來刺史見詩遂給一百千及資裝便遣還士子出盧氏雜說鄭畋鄭文公畋字台文父亞曾任桂管觀察使畋生於桂州小字桂兒時西門思恭為監軍有詔徵赴闕亞餞於北郊自以衰年因以畋託之曰他日願以桂兒為念九泉之下不敢忘之言訖泣然流涕思恭志之及為神策軍中尉亞已卒思恭使人召畋館之於第年未及冠甚愛之如甥姪因選師友教導之畋後官至將相黃巢之入長安西門司空逃難於終南山畋以家財厚募有勇者訪而獲之以歸岐下溫清侍膳有如父焉思恭終於畋所畋葬於鳳翔西岡松柏皆手植之未幾畋亦卒葬近西門之墳百官造二壠以弔之無不墮淚咸伏其義也出北夢瑣言章孝子章孝子名全益東蜀涪城人少孤為兄全啓養育母疾全啓割股肉以饋其疾果廖也他日全啓出遊殂於逆旅全益感天倫之恩制斬縗之服又以全啓割肉啖母遂以火煉指以申至痛仍以銀字寫法華經一部日夕諷誦仍通大義後於成都府樓巷舍於其間傍有丹竈不蓄童僕塊然一室鬻丹得錢數及兩金即刻一象今華亭禪院即居士高樓之所人謂之黃白之術嘗言於道友曰點水銀一兩止一兩銀價若丸作三百粒每粒百錢乃三十千矣其利博哉但所鬻之丹亦神矣居士到蜀之後制土偶於丹竈之側以代執熱之用護惜不毀殆四十年大順中物故年至九十八寺僧寫真於壁節度判官前眉州刺史馮涓撰讚以美之出北夢瑣言發冢盜光啓大順之際褒中有盜發冢墓者經時搜索不獲長吏督之甚嚴忽一日擒獲置於所司淹延經歲不得其情拷掠楚毒無所不至款古既具連及數人皆以為得之不謬矣及臨刑傍有一人攘袂大呼曰王法豈容枉殺平人者乎發冢者我也我日在稠人之中不為獲擒而斯人何罪欲殺之速請釋放旋出丘中所獲之贓驗之略無差異具獄者亦出其贓驗之無差及藩帥躬自誘而問之曰雖自知非罪而受箠楚不禁遂令骨肉僞造此贓希其一死藩帥大駭具以聞於朝廷坐其獄吏枉陷者獲免自言者補衙職而賞之出玉堂閒話鄭雍鄭雍學士未第時求婚於白州崔相公遠才允許而博陵有事女則隨例填宮至朱梁開平之前崔氏在內託疾敕令出宮還其本家鄭則復託媒氏致意選日親迎士族婚禮隨其豐儉亦無所闕尋有莊盆之感又杖經期周莫不合禮士林以此多之美稱籍甚場中翹足望之一舉中中原作之據明鈔本改甲科封尚書榜下脫白授祕校兼內翰與丘門同敕入不數載而卒出玉堂閒話楊晟始事鳳翔節度使李昌符纍立軍功因而疑之潛欲加害昌符愛妾周氏憫其無辜密告之由是亡去而獲免後為駕前五十四軍都指揮使除威勝軍節度使建節於彭州撫綏士民延敬賓客洎僧道輩各得其所厚於禮敬人甚懷之李昌符之敗因令求周氏既至以義母事之周氏自以少年復有美色懇有好合之情晟告誓天地終不以非禮偶之每旦未視事前必申問安之禮雖厄在重圍未嘗廢也新理之郡兵力不完遽為王蜀先主攻圍保守孤壘救兵不至凡千日為西川所破而害焉有馬步使安師建者楊氏之腹心也城克執之蜀先主知其忠烈冀為其用欲寬之師建曰某受某受原作其授據明鈔本改楊司徒提拔不敢惜死先主嗟賞而行戮為其設祭而葬之出北夢瑣言王殷梁開封尹瓚之猶子也乾化中為徐州連率衆叛拒命殺害使臣點閲市井而授甲焉有親隨苗溫與數輩度其必不濟竊謀作亂吏明鈔本吏作事泄被擒刳心而死其妻配隸別部軍校殊不甘挾短刃割乳而殞聞者無下嗟尚出玉堂閒話
