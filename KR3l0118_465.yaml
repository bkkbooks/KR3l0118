body:
  text: 峰州魚峰州魚峰州有一道水從吐蕃中來夏冷如冰雪有魚長一二寸來去有時蓋水上如粥人取烹之而食千萬家取不可盡不知所從來海蝦劉恂者曾登海舶入舵樓忽見窗板懸二巨蝦殼頭尾鉗足具全各七八尺首占其一分嘴尖利如鋒刃嘴上有須如紅箸各長二三尺雙腳有鉗鉗粗如人大指長二尺余上有芒刺如薔薇枝赤而銛硬手不可触腦殼烘透彎環尺余何止于杯盂也北戶錄云滕循為廣州刺史有客語循曰蝦須有一丈長者堪為拄杖循不之信客去東海取須四尺以示循方伏其異瓦屋子蓋蚌蛤之類也南中舊呼為蚶子頃因盧鈞尚書作鎮遂改為瓦屋子以其殼上有棱如瓦故以此名焉殼中有肉紫色而滿腹廣人猶重之多燒以荐酒俗呼為天臠炙食多即壅氣背膊煩疼未測其性也印魚長一尺三寸額上四方如印有字諸大魚應死者先以印印之石斑魚僧行儒言建州有石斑魚好與蛇交南中多隔蜂窠窠大如壺常群螫人土人取石斑魚就蜂側炙之標于竿上向日令魚影落其窠上須臾有鳥大如燕數百互擊其窠窠碎落如葉蜂亦全盡井魚唐段成式云井魚腦有穴每嗡水輒于腦穴蹙出如飛泉散落海中舟人競以空器貯之海水咸苦經魚腦穴出反淡如泉水焉成式見梵僧善提胜說異魚東海人常獲魚長五六尺腹胃成胡鹿刀槊之狀或號秦皇魚螃趽傍海大魚脊上有石十二時一名篱頭溺一名螃趽其溺甚毒鱔魚郫縣侯生者于漚麻池側得鱔魚大可尺圍烹而食之發白复黑齒落复生自此輕健玳瑁玳瑁形狀似龜唯腹背甲有烘點本草云玳瑁解毒其大者悉婆薩石兼云辟邪廣南盧亭獲活玳瑁龜一枚以獻連帥嗣薛王王令生取背甲小者二片帶于左臂上以辟毒龜被生揭其甲甚极苦楚后養于使宅后北池伺其揭處漸生复遣盧亭送于海畔或云玳瑁若生帶之有驗是飲饌中有盅毒玳瑁甲即自搖動若死無此驗海術南海有水族前左腳長前右腳短口在肋旁背上常以左腳捉物置于右腳右腳中有齒嚙之方內于口大三尺余其聲術術南人呼為海術海鏡廣人呼為膏葉盤兩片合以成形殼圓中甚瑩滑日照如云母光內有少肉如蚌胎腹中有紅蟹子其小如黃豆而螯具足海鏡饑則蟹出拾食蟹飽歸腹海鏡亦飽或迫之以火則蟹子走出離腸腹立斃或生剖之有蟹子活在腹中逡巡亦斃水母廣州謂之水母閩謂之魠其形乃渾然凝結一物有淡紫色者有白色者大如覆帽小者如碗腸下有物如懸絮俗謂之足而無口眼常有數十蝦寄腹下咂食其涎浮泛水上捕者或遇之即欻然而沒乃是蝦有所見耳南中好食之云性暖治河魚之疾然甚腥須以草木灰點生油再三洗之瑩淨如水精紫玉肉厚可二寸薄處亦寸余先煮椒桂或豆蔻生姜縷切而炸之或以五辣肉醋或以蝦醋如鱠食之最宜蝦醋亦物類相攝耳水母本陰海凝結之物食而暖補其理未詳蟹八月腹內有芒芒真稻芒也長寸許向東輸與海神未輸芒不可食百足蟹善苑國出百足蟹長九尺四螯煎為膠謂之螯膠胜鳳喙膠也螗蟹平原郡貢螗蟹采于河間界每年生貢斫冰火照懸老犬肉蟹覺犬肉即浮因取之一枚直百錢以氈密束于驛馬上馳之至京魚章安縣出焉子朝出索食暮還入母腹中容四子頰赤如金甚健网不能制俗呼為河伯健兒鸚鵡螺旋尖處屈而咮如鸚鵡嘴故以此名殼上青綠斑大者可受二升殼內光瑩如云母裝為酒杯奇而可玩紅螺大小亦類鸚鵡螺殼薄而紅亦堪為酒器刳小螺為足綴以膠漆尤可佳尚也鴦龜初寧縣里多鴦龜殼薄狹而燥頭似鵝不與常龜同而能嚙犬也鯢魚鯢魚如鯰四足長尾能上樹天旱輒含水上山以草葉覆身張口鳥來飲水輒吸食之聲如小兒峽中人食之先縛于樹鞭之身上白汁出如构汁去此方可食不爾有毒鱟鱟雌常負雄而行漁者必得其雙南人列肆賣之雄者少肉舊說過海輒相積于背高尺余如帆乘風游行今鱟殼上有物高七八寸如石珊瑚俗呼鱟帆至今閩岭重鱟醬十二足殼可為冠次于白角南人取其尾為小如意飛魚朗山朗水有之魚長一尺能飛即凌云空息即歸潭底虎蟹殼上有虎斑可裝為酒器與紅蟹皆產瓊崖海邊雖非珍奇亦不易采得也蠔蠔即牡蠣也其初生海島邊如拳石四面漸長有高一二丈者巉岩如山每一房內蠔肉一片隨其所生前后大小不等每潮來諸蠔皆開房伺虫蟻入即合之海夷盧亭者以斧楔取殼燒以烈火蠔即啟房挑取其肉貯以小竹筐赴虛市以易西骨米蠔肉大者醃為炙小者炒食肉中有滋味食之即甚壅腸骨赤鯇公鯉脊中鱗一道每鱗上有黑點大小皆三十六鱗唐朝律取得鯉魚即宜放仍不得吃說赤鯇公賣者決六十雷穴魚興州有一處名雷穴水常半穴每雷聲水塞穴流魚隨流而出百姓每候雷聲繞樹布网獲魚無限非雷聲漁子聚鼓擊于穴口魚亦輒出所獲半于雷時韋行規為興州刺史時與親故書說其事虯尾東海有魚虯尾似鴟鼓浪即降雨遂設像于屋脊牛魚海上取牛魚皮懸之海潮至即毛豎蝤石多大者長尺余兩螯至強八月能與虎斗虎不如隨大潮退殼一退一長奔魚孚一名瀱非魚非蛟大如舡長二三丈若鯰有兩乳在腹下雄雌陰陽類人取其子著岸上聲如嬰兒啼項上有孔通頭氣出哧哧作聲必大風行者以為候相傳懶婦所化殺一頭得膏三四斛取之燒燈照讀書紡績輒暗照歡樂之處則明係臂係臂如龜入海捕之必先祭又陳所取之數則自出因取之若不信則風浪覆舡雞嘴魚李德裕幼時常于明州見一水族有兩足嘴似雞身如魚劍魚海魚千歲為劍魚一名琵琶魚形似琵琶而喜鳴因以為名虎魚老則為蛟江中小魚化為蝗而食五谷者百歲為鼠懶婦魚淮南有懶婦魚俗云昔楊氏家婦為姑所怒溺水死為魚其脂膏可燃燈燭以之照鼓琴瑟博奕則爛然有光若照紡績則不復明黃雀化蛤淮水中黃雀至秋化為蛤至春复為黃雀雀五百年化為蜃蛤天牛魚方員三丈眼大如斗口在肋下露齒無唇兩肉角如臂兩翼長六尺尾五尺
