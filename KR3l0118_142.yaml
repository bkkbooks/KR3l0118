body:
  text: 劉德願劉德願宋太始中豫州刺史彭城劉德願鎮壽陽住內屋閉戶未合輒有人頭進門扉窺看戶內是丈夫露髻團面內人驚告把火搜覓了不見人劉明年被誅出異苑李鎮廬山自南行十餘里有雞山山上有石雞冠距如生道士李鎮於此下住常寶玩之雞一日忽摧毀鎮告人曰雞忽如此吾其終乎因與知故訣別後月餘遂卒出幽明録柳元景宋驃騎大將軍河東柳元景大明八年少帝即位元景乘車行還使人於中庭洗車卸轅曬之有飄風中門而入直來衝車明年而闔門被誅出神鬼傳向玄季宋河南向玄季為南郡太守其妻煮練忽爛如粥汁赤如血夜有人扣閣而呼曰府君今可去矣俄而刺史南郡王義宣作逆玄季力弱不能自固以附於逆父子並伏法出渚宮故事滕景直宋滕景直家在廣州元徽中使婢炊釜中有聲如雷婢驚白景直及家人走視釜聲更壯釜上花數十漸長如蓮花而大赤色俄頃萎絶旬日景直病死出廣古今五行記王晏齊王晏字休默位勢隆極而驕盈怨望伏誅焉其將及禍也見屋桷悉是大蛇就視之則滅焉晏惡之乃令以紙裹桷猶紙內動搖簌簌有聲出廣古今五行記留寵東陽留寵字道弘居於湖熟每夜門庭自有血數升不知所從來如此三四後寵為折衝將軍受命北征將行而炊飯盡變為蟲其家人蒸麨亦變為蟲其火逾猛其蟲逾壯寵遂北征軍敗於壇丘為徐龍所殺出法苑珠林爾朱世隆後魏僕射爾朱世隆晝寢妻奚氏忽見有一人攜世隆頭出奚氏遽往視之隆寢如故及隆覺謂妻曰向夢見有人斷我頭將去數日被誅出廣古今五行記劉敏梁侯景亂支江人劉敏於江中接得一豫章木大數十圍敏求以施入寺陸法和曰此木正可與君家自用敏不悟此語後十餘日敏婦亡即解用此木為棺法和曰猶未了更一月敏弟亡用此木僅足出廣古今五行記李廣北齊文宣天保年御史李廣勤學博物拜侍御史夜夢見一人出於其身中謂廣曰君用心過苦非精神所堪今辭君去因而惚恍數日便遇疾積年而終出廣古今五行記王氏北齊後主武平初平邑王氏與同邑人李家為婚載羊酒欲就親家宴會行不過三里日沒漸暗見東南五十步外有赤物大如升若流星曳影直來著車輪牛即不動見者並怖其妻遂下車向而再拜張裙引之便入裙下升車還家照看乃真金遂盛於庫匱每至良晨恆以香火祈恩後四方異貨畢集其家田蠶每年百倍至春其庭生一桑樹枝葉異於衆木數年之間遍滿一院奇禽異鳥莫不棲集其家大富將三十年王氏妻以老病終後凌朝有白鳥似鷺飛至桑樹側吐血久之墮地而死日午後西北大旋風漲天而來繞旋此樹竦上其枝柯如掃帚形不經十日奴婢逃走首尾相繼家資略盡及開匱取金唯見螢火蚰蜒腐草之餘耳出廣古今五行記張雕虎北齊末監吏待詔張雕虎未死一日前騎馬在路有人望不見其頭俄而見殺出廣古今五行記強練後周武帝時有強練者岐山人佯狂號曰強練冢宰晉國公宇文護未敗之日強練執一瓠到其門前撲破之云瓠破憐你子苦護被殺護之諸子皆楚毒而卒時皋公侯龍思兄弟被冢宰寵遇燻灼當時強練度其門思妻嫗等遣婢呼入為設飲食察其言語練謂思等云與我作婢衆嫗大笑練又云作婢會不免他人將去安能勝我未幾冢宰誅思兄弟亦同被戮出廣古今五行記李密隋李密既會衆屯洛口設壇大張旌旗告天即公位其夜狐狸鳴於壇側翌日臨行事大風四起飛沙拔木旗竿有折者其後果敗出感定録張鷟唐永徽年中張鷟築馬槽廠宅正北掘一坑丈餘時陰陽書云子地穿必有人墮井死鷟有奴名永進淘井土崩壓死又鷟故宅有一桑高四五丈無故枯死尋而祖亡沒後有明陰陽云喬木先枯衆子必孤此其驗也出朝野僉載唐望之唐咸亨四年洛州司戶唐望之冬選科五品進止未出聞有一僧來覓初不相識延之共坐少頃云貧道出家人得飲食亦少以公名人故暗相託能設一頓鱠否司戶欣然即處置買魚此僧云看有蒜否司戶家人云蒜盡此僧云既蒜盡去也即起司戶留之云蒜盡遣買即得僧云蒜盡不可更住者留不得司戶無疾至夜暴亡蒜者算也年盡所以異僧告之
