body:
  text: 陳實陳實陳實嘗歎曰若周子居者真棟梁之器譬諸寶劍則世之龍泉客有問陳季方曰足下家君有何功德而荷天下重名季方曰吾家君譬如桂樹生於泰山之阿上有萬仞之高下有不測之淵上為甘露所霑下為淵泉所潤當斯之時桂樹焉知泰山之高淵泉之深不知有功德與無出世説黃叔度郭泰至汝南造袁奉高車不停軌鸞不輟軛詣黃叔度乃彌日信宿人問其故林宗曰叔度汪汪如千頃之波澄之不清撓之不濁其器深廣難測矣出世説郭泰郭泰秀立高峙淡然淵停九州之士悉懍懍宗仰以為覆蓋蔡伯喈告盧子幹馬日磾曰吾為天下作碑銘多矣未嘗不有慚唯為郭先生碑頌無愧色耳出世説馬融鄭玄在馬融門下融嘗不解割裂書七事而玄思其五別令盧子幹思其二融告幹曰孔子謂子貢回也聞一知十吾與汝弗如也今我與子可謂是矣出世説蔡雍蔡雍評陳蕃李膺先後曰陳仲舉強於犯上李元禮嚴於攝下易明鈔本易上有犯上難攝下五字仲舉三君之下謝沈漢記曰三君者一時之所重竇武劉淑陳蕃元禮八俊之上上原作重據明鈔本陳校本改薛瑩漢書曰李膺王暢荀鯤朱宇魏明劉佑杜楷趙典為八俊出世説顧邵顧邵嘗獨謂龐士元曰聞子孫人吾與足下孰愈士元曰陶冶世俗與時沉機吾不如子論霸王之餘策覽倚伏之要最吾亦有一日之長邵亦能為之乎出世説諸葛瑾兄弟諸葛瑾弟亮及從弟誕並有盛名各事一國時以蜀得其龍吳得其虎魏得其狗出世説龐士元龐士元至吳吳人並友之見陸績顧邵全琮而為之目曰陸子所謂駑馬有逸逸字原闕據世説補足之用顧子所謂駑牛可以負重致遠或問如目陸為勝邪曰駑馬雖精速能致一人耳駑牛一日行百里所致豈一人哉吳人無以難全子好聲名似汝南樊樊原作楚據世説改子昭出世説武陔司馬文王問武陔曰陳泰何如其父司空陔曰通雅博暢能以天下聲教為己任者不如也明練簡至立功立事過之出世説裴頠冀州刺史楊淮二子喬與髦俱總角為成器淮與裴頠樂廣友善遣見之頠性弘放愛喬之有風韻謂淮曰喬當及卿髦小減也廣性清淳愛髦之有神檢謂淮曰喬自及卿然髦尤精出淮笑曰我二兒之優劣乃裴樂之優劣也論者評之以為喬雖高韻而無檢局樂言為得然並為後之雙雋出世説胸奴使魏武將見胸奴使自以形陋不足懷遠國使崔季圭代當之自捉刀立牀頭事畢令間諜問曰魏王何如使曰魏王雅望非常然牀頭捉刀人乃英雄也王聞之馳殺此使出商藝小説恆溫晉殷浩既廢桓溫語諸人曰少時與之共騎竹馬我棄去已浩輒取之故當出我下出世説新書謝鯤明帝問謝鯤君自謂何如庾亮答曰端委廟堂使百寮準則臣不如亮一丘一壑自謂過之出世説新書唐太宗貞觀五年上謂長孫無忌等曰朕聞主賢則臣直人固不自知公宜論朕得失無忌曰陛下武功文德跨絶古今發號施令事皆利物臣順之不暇實不見陛下有愆失上曰朕欲聞己過公乃妄相諛悅今面談公等得失以為鑑誡言之者可以無過聞之者足以自改因曰無忌善於籌算應對敏速求之古人亦當無比兵機政術或恐非其所長高士廉涉獵古今心術聰悟臨難不改節為官亦無朋黨所少者骨鯁規諫耳唐儉言辭俊利善和解人酒杯流行發言啓齒事朕三載遂無一言論國家得失楊師道性純善自無愆過而情實怯懦未甚更事急緩不可得力岑文木性道敦厚文章所長持論恆據經遠自不負於理劉洎性最堅貞言多利益然其意尚然諾朋友能自補闕亦何以尚焉馬周見事敏速性甚貞正至於論量人物直道而言朕比任使多所稱意褚遂良學問稍長性亦堅正既寫忠誠甚親附於朕譬如飛鳥依人自加憐愛出唐會要李績武德初李績得黎陽倉就食者數十萬人魏徵高季輔杜正倫郭孝恪皆客遊其所一見於衆人之中即加禮敬平武牢獲鄭州長史戴胄釋放推薦之當時認為有知人之鑒出唐會要又貞觀元年績為并州都督時侍中張文瓘為參軍事績曾歎曰張稚圭後來管蕭吾不如也待以殊禮時有二寮亦被禮接績將入朝一人贈以佩刀一人贈以玉帶文瓘獨無所及因送行二十餘里績曰諺云千里相送歸於一別稚圭何行之遠也可以還矣文瓘曰均承尊獎彼皆受賜而返鄙獨見遺以此於悒績曰吾子無苦老夫有説某遲疑少決故贈之以刀戒令果斷也某放達小拘故贈之以帶戒令檢約也吾子宏才特達無施不可焉用贈焉因極推引後文瓘纍遷至侍中出廣人物志薛收唐薛收與從父兄子元敬族兄子德音齊名時人謂之河東三鳳收與元敬俱為文學館學士時房杜等處心腹之寄深相友託元敬畏於權勢竟不狎如晦常云小記室不可得而親不可得而疏出談賓録王圭貞觀六年上宴侍臣謂王圭曰卿識鑒精通尤善談論自房玄齡等咸宜品藻又可自量與諸子孰賢圭對曰孜孜奉國知無不為臣不如玄齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如彥博剸繁理劇衆務必舉臣不如戴胄諫諍為心恥君不及堯舜臣不如魏徵至於激濁揚清嫉惡好善臣於數子亦有微長太宗深然其言群公亦各以為盡己所能謂之確論出唐會要王師旦貞觀十九年考功員外郎王師旦知舉考張昌齡王公瑾策下太宗嘆曰二人咸有詞華對曰體性輕薄文絶浮艷必不成令器臣不上拔者恐變陛下風雅帝以為名言後如其言也出談賓録楊素封德彝之少也僕射楊素見而奇之遂妻以姪女常撫座曰封郎必居此坐後討遼東封公船沒衆皆謂死楊素曰封郎當得僕射此必未死使人求之公抱得一板沒於大海中力盡欲放之忽憶楊公之言復勉力持之胸前為板所摩擊肉破至骨衆接救得之後果官至僕射出定命録王義方員半千本名餘慶師事王義方義方重之嘗謂曰五百年一賢足下當之矣因改名半千出談賓録選將李績每臨陳選將必相有福祿者而後遣之人問其故對曰薄命之人不足與成功名君子以為知言出談賓録英公高宗時蠻群聚為寇討之輒不利乃以徐敬業為刺史彼州發卒郊迎敬業盡放令還單騎至府賊聞新刺史至皆繕理以待敬業一無所問處分他事畢方曰賊皆安在曰在南岸乃從一二佐吏而往觀者莫不駭愕賊初持兵覘望及見船中無所有乃更閉營藏隱敬業直入其營內告云國家知汝等為貪吏所苦非有他惡可悉歸田後去者為賊唯召其魁首責以不早降各杖數十而遣之境內肅然其祖英公聞之壯其膽略曰吾不辦此然破家者必此兒也出國史異纂劉奇唐證聖中劉奇為侍郎注張文成司馬鍠為御史二人因申屠瑒以謝奇正色曰舉賢無私何見謝出談賓録自號浮休子唐婁師德滎陽人也為納言客問浮休子曰婁納言何如答曰納言直而溫寬而栗外愚而內敏表晦而裏明萬頃之波渾而不濁百練之質磨而不磷可謂淑人君子近代之名公者焉客曰狄仁傑為納言何如浮休子曰粗覽經史薄間文筆針規切諫有古人之風剪伐淫祠有烈士之操心神耿直涅而不淄膽氣堅剛明而能斷晚途錢癖和嶠之徒與客曰鳳閣侍郎李昭德可謂名相乎答曰李昭德志大而器小氣高而智薄假權制物扼險凌人剛愎有餘而恭寬不足非謀身之道也俄伏法焉又問洛陽令來俊臣雍容美貌忠赤之士乎答曰俊臣面柔心狠行險德薄巧辨似智巧諛似忠傾覆邦家誣陷良善其汪充之徒歟蜂蠆害人終為人所害無何為太僕卿戮於西市又問武三思可謂名王哉答曰三思憑藉國親位超袞職貌象恭敬心極殘忍外示公直內結陰謀弄王法以復仇假朝權而害物晚封為德靜王乃鼎賊也不可以壽終竟為節愍太子所殺又問中書令魏元忠耿耿正直近代之名臣也答曰元忠文武雙闕名實兩空外示貞剛內懷趨附面折張食其之黨勇若熊羆諂事武士開之儔怯如駑犬首鼠之士進退兩端虺蜥之夫曾無一志亂朝敗政莫匪斯人附三思之徒斥五王之族以吾熟察終不得其死然果坐事長流思州憂恚而卒又問中書令李嶠何如答曰李公有三戾性好榮遷憎人升進性好文章憎文才筆性好貪濁憎人受賂亦如古者有女君性嗜肥鮮禁人食肉性愛綺羅斷人衣錦性好淫縱憎人畜聲色此亦李公之徒也又問司刑卿徐有功何如答曰有功耿直之士也明而有膽剛而能斷處陵夷之運不偷媚以取容居版蕩之朝不遜辭以苟免來俊臣羅織者有功出之袁智弘鍛鍊者有功寬之躡虎尾而不驚觸龍鱗而不懼鳳跱鴟梟之內直以全身豹變豺狼之間忠以遠害若值清平之代則張釋之于定國豈同年而語哉又問司農卿趙履溫何如答曰履溫心不涉學眼不識文貌恭而性狠智小而謀大趦趄狗盜突忽豬貪晨羊誘外不覺其死夜蛾覆燭不覺其斃頭寄於頸其能久乎後從事韋氏為逆夷其三族又問鄭愔為選部侍郎何如答曰愔猖獗小子狡猾庸人淺學浮詞輕才薄德狐蹲貴介雉伏權門前託俊臣後附張易折支德靜之室舐痔安樂之庭鸋鳷栖於葦苕鯊鱨遊於沸鼎既無雅量終是凡材以此求榮得死為幸後果謀反伏誅出朝野僉載李嶠御史裴周使幽州日見參謀姓胡云是易州人不記名項有刀痕問之對曰某昔為番官曾事特進李嶠嶠獎某聰明每有詩什皆令收掌常熟視謂之曰汝甚聰明然命薄少官祿年至六十已上方有兩政三十有重厄不知得過否爾後轗軻不得覔身名胡至三十忽遇孫孫原作張據本書卷一六三孫佺條改佺北征便隨入軍軍敗賊刃頸不斷於積尸中臥經一宿乃得活自此已後每憶李公之言更不敢覔官於寺中灑掃展轉至六十因至鹽州於刺史郭某家為客有日者見之謂刺史曰此人有官祿今合舉薦前十月當得官刺史曰此邊遠下州某無公望豈敢輒薦舉人俄屬有恩赦今天下刺史各舉一人某年五月郭舉此人有兵謀至十月策問及第得東宮衛佐官仍參謀范陽軍事出定命録鄭杲唐聖曆中侍郎鄭杲注韓思復太常博士元希聲京兆府士曹參軍嘗謂人曰今年當選得韓元二子是吏部不負朝廷矣出談賓録盧從願唐景雲中盧從願為侍郎杜暹自婺婺原作虢據本書一八六杜暹條改州參軍注鄭縣尉後為戶部尚書盧自益州長史入朝杜立於上乃曰選人定如何盧曰亦由僕藻鑒遂使明公展千里之足出談賓録裴寬尚書裴寬罷郡西歸泝流停午因維舟暫駐見一人坐樹下衣服故弊因命與語大奇之遂為知心曰以君才識必自富貴何貧也舉一船錢帛奴婢貺之客亦不讓所惠語訖上船偃蹇者鞭撲之裴公益奇之其人乃張徐州州下原有人字據幽間鼓吹刪也出幽間鼓吹韋詵潤州刺史韋詵自以族望清華嘗求子壻雖門地貴盛聲名籍甚者詵悉以為不可遇歲除日間無事妻孥登城眺覽見數人方於園圃有所瘞詵異之召吏指其所使訪求焉吏還白曰所見乃參軍裴寬所居也令與寬俱來詵詰其由寬曰某常自戒義不以苞苴污其家今日有人遺鹿置之而去既不能自欺因於家童瘞於後園以全其所守不謂太守見之詵因降階曰某有息女願授君子裴拜謝而去歸謂其妻曰嘗求佳壻今果得之妻問其誰即向之城上所見瘞物者明日復召來韋氏舉家視其簾下寬衣碧衫踈瘦而長舊制八品已下衣碧入門其家大噱呼為鸛鵲詵妻涕泣於帷下既退詵謂其妻曰愛其女當令作賢公侯之妻奈何白如瓠者人奴之材詵竟以女妻之而韋氏與寬偕老其福壽貴盛親族莫有比焉故開元天寶推名家舊望以寬為稱首出明皇雜録裴談蘇頲年五歲裴談過其父頲方在乃試誦庾信枯樹賦將及終篇避談字因易其韻曰昔年移柳依依漢陰今看搖落悽愴江潯樹猶如此人何以任談駭嘆久之知其他日必主文章也出廣人物志
