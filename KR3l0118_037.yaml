body:
  text: 韋仙翁韋仙翁唐代宗皇帝大曆中因晝寢常夢一人謂曰西嶽太華山中有皇帝壇何不遣人求訪封而拜之當獲大福即日詔遣監察御史韋君馳驛詣山尋訪至山下州縣陳設一店具飯店中所有行客悉令移之有一老翁謂店主曰韋侍御一飡即過吾老病不能遠去但於房中坐得否店主從之少頃韋君到店良久忽聞房中嗽聲韋問有何人在此遣人視之乃曰有一老父韋君訪老父何姓答曰姓韋韋君曰相與宗盟合有繼敘邀與同席老父因訪韋公祖父官諱又訪高祖為誰韋君曰曾祖諱某任某官高祖奉道不仕隋朝入此山中不知所在老父喟然歎曰吾即爾之高祖也吾名集有二子爾即吾之小子曾孫也豈知於此與爾相遇韋君涕泣載拜老父止之謂曰爾祖母見在爾有二祖姑亦在山中今遇寒食故入郭與渠輩求少脂粉耳有一布襆襆內有茯苓粉片欲貨此市買問韋君爾令何之韋君曰奉勑於此山中求真壇州縣及山中人莫有知者不審翁能知此處否老父曰蓮花中峰西南上有一古壇髣髴餘址此當是也但不定耳遂與韋君同宿老父絕糧不食但飲少酒及人參茯苓湯明日韋君將入山老父曰吾與爾同去韋君乃以乘馬讓之老父曰爾自騎吾當杖策先去韋君乘馬奔馳竟不能及常在馬前三十步至山足道路嶮阻馬不能進韋君遂下隨老父入谷行不里許到室見三嫗老父曰此乃爾之祖母及爾之二祖姑也韋君悲涕載拜祖母年可七八十姑各四十餘俱垂髮皆以木葉為嶮峻韋君殆不可堪老父行步若飛廻顧韋君而笑直至中峰西南隅果有一壇韋君灑掃拜謁立標記而廻卻到老父石室辭出谷韋君曰到京奏報畢當請假卻來請覲老父曰努力好事君主韋君遂下山返到闕庭具以事奏代宗歎異乃遣韋君齎手詔入山令刺史以禮邀致韋君到山中求覔遂失舊路數日尋訪不獲訪山下故老皆云自少年已來三二年則見此老父一到城郭顏狀只如舊不知其所居韋君望山慟哭而返代宗悵恨具以事跡宣付史館出異聞集楊越公弟唐建中初楚州司馬楊集自京之任至華陰宿夜有老人戴大帽到店就鑪向火楊君見其耆耄因與酒食問姓氏曰姓楊又詰其祖先云越公最近楊公乃越姪孫復重問曰為君所迫我乃盡言我是越公季弟也遭兄亡命遂遇道真集聞姓氏再拜復坐曰吾亦知汝過此故來相看祖母與姑數人悉在汝欲見否吾先報去少頃復至明旦與楊君入山約里餘有大澗闊數丈老父超然而越廻首謂楊君曰當止此吾與汝喚阿婆去逡巡間老母及女與六七人遶巖而至楊君望拜隔水與語皆嗟嘆亦有泣者良久曰且去妨汝行役楊君乃拜廻數十步卻望猶有揮袖者明日復來深水高峰並不見矣出逸史陽平謫仙不言姓氏初九隴人張守珪仙君山有茶園每歲召採茶人力百餘人男女傭功者雜處園中有一少年自言無親族賃為摘茶甚勤愿了慧守珪憐之以為義兒又一女子年二十亦云無親族願為義兒之妻孝義端恪守珪甚善之一旦山水泛溢市井路隔鹽酪既闕守珪甚憂之新婦曰此可買耳取錢出門十數步置錢於樹下以杖叩樹得鹽酪而歸後或有所需但令叩樹取之無不得者其術夫亦能之因與鄰婦十數人於塴口市相遇為買酒一椀與婦飲之皆大醉而椀中酒不減遠近傳說人皆異之守珪問其術受於何人少年曰我陽平洞中仙人耳因有小過謫於人間不久當去守珪曰洞府大小與人間城闕相類否對曰二十四化各有一大洞或方千里五百里三百里其中皆有日月飛精謂之伏晨之根下照洞中與世間無異其中皆有仙王仙官卿相輔佐如世之職司有得道之人及積功遷神返生之士皆居其中以為民庶每年三元大節諸天各有上真下遊洞天以觀其所為善惡人世生死興廢水旱風雨預關於洞中焉龍神祠廟血食之司皆為洞府所統二十四化之外青城峨嵋益登慈母繁陽嶓冢皆亦有洞不在十大洞天三十六小洞天之數洞中仙曹如人間郡縣聚落耳不可一一詳記也旬日之間忽失其夫婦出仙傳拾遺賣藥翁莫知其姓名人或詰之稱祇此是真姓名有童稚見之逮于暮齒復見其顏狀不改常提一大葫蘆賣藥人告疾求藥得錢不得錢皆與之無阻藥皆稱有效或無疾戲而求藥者得藥尋必失之由是人不敢妄求敬如神明常醉於城市間得錢亦與貧人或戲問之有大還丹賣否曰有一粒一千貫錢人皆笑之以為狂多於城市笑罵人曰有錢不買藥喫盡作土饅頭去人莫曉其意益笑之後於長安賣藥方買藥者多抖擻葫蘆已空內只有一丸出極大光明安於掌中謂人曰百餘年人間賣藥過卻億兆之人無一人肯把錢買藥吃深可哀哉今之自喫卻藥纔入口足下五色雲生風起飄飄飛騰而去出續仙傳嚴士則宋文宗末文宗末劇談錄作大中末明鈔本訛太宗末建州刺史嚴士則本穆宗朝為尚衣奉御頗好真道因午日於終南山採藥迷路徘徊巖嶂之間數日所齎糧糗既盡盡字原闕據明鈔本補四望無居人計其道路去京不啻五六百里然而林岫深僻風景明麗忽有茅屋數間出於松竹之下煙蘿四合纔通小徑士則連扣其門良久竟無出者因窺籬隙內見有一人於石榻偃臥看書士則推戶直造其前方乃攝衣而起士則拜罷自陳行止因遣坐於盤石之上亦問京華近事復問天子嗣位幾年云自安史犯闕居此迄至今日士則具陳奔馳陟歷資糧已絕迫於枵腹請以飲饌救之隱者曰自居山谷且無烟爨有一物可以療饑念君遠來相過自起於棟梁間脫紙囊開啟其中有百餘顆如褊豆之形俾於藥室取鐺拾薪汲水以一粒煮之良久微有香氣視之已如掌大曰可以食矣渴即取鐺中餘水飲之士則方啗其半自覺豐飽復曰汝得至此當有宿分自茲三十年間無復饑渴俗慮塵情將澹泊也他時位至方伯當於羅浮相近倘能脫去塵華兼獲長生之道辭家日久可以還矣士則將欲告歸且恐迷失道路曰勿憂去此三二里與採薪者相值可隨之而去此至國門不遠既出果有人採薪路側因問隱者姓名竟返山無所對纔經信宿已及樊川村野既還輦轂不喜更嘗滋味日覺氣壯神清有驂鸞馭鶴之意衣褐杖藜多依巖岫居守盧僕射躭味玄默思覩異人有道流具述其由遂致之門下及聞方伯之說因以處士奏官自梓州別駕作牧建溪時年已九十到郡纔周歲即解印歸羅浮及韋宙相公出鎮江南使人訪之猶在山谷大中十四年之任建安路由江表時蕭相公觀風浙右於桂樓開宴召之唯飲酒數盃他無所食也出劇談錄
