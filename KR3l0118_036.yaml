body:
  text: 徐佐卿徐佐卿唐玄宗天寶十三載重陽日獵於沙苑時雲間有孤鶴徊翔玄宗親御弧矢中之其鶴即帶箭徐墜將及地丈許欻然矯翼西南而逝萬衆極目良久乃滅益州城西十五里有道觀焉依山臨水松桂深寂道流非修習精愨者莫得而居之觀之東廊第一院尤為幽寂有自稱青城山道士徐佐卿者清粹高古一歲率三四至焉觀之耆舊因虛其院之正堂以俟其來而佐卿至則棲焉或三五日或旬朔言歸青城甚為道流所傾仰一日忽自外至神彩不怡謂院中人曰吾行山中偶為飛矢所加尋已無恙矣然此箭非人間所有吾留之於壁後年箭主到此即宜付之慎無墜失仍援毫記壁云留箭之時則十三載九月九日也及玄宗避亂幸蜀暇日命駕行遊偶至斯觀樂其嘉境因遍幸道室既入此堂忽覩其箭命侍臣取而玩之蓋御箭也深異之因詢觀之道士具以實對則視佐卿所題乃前歲沙苑從田之箭也佐卿蓋中箭孤鶴耳究其題乃沙苑翻飛當日而集于斯歟玄宗大奇之因收其箭而寶焉自後蜀人亦無復有遇佐卿者出廣德神異録拓跋大郎天寶中有扶風令者家本權貴恃勢輕物賓客寒素者無因趨謁由是謗議盈路時主簿李尉裴者好賓客裴頗好道亦常隱於名山又好施與時亦補令之闕常因暇日會宴邑中客皆通貴裴尉疾不赴賓客方集忽有一客廣顙長七尺餘策杖攜帽神色高古謂謁者曰拓拔大郎要見府君謁者曰長官方食不可通謁請俟罷宴客怒曰是何小子輒爾拒客吾將自入謁者懼走以白令令不得已命邀之升階令意不悅而客亦不平既而宴會率不謙讓及終宴皆不樂客不揖去令亦長揖而已客色怒甚流言而出時李主簿疑為異人李歸召裴尉而告之云宴不樂為此客耳觀其狀恐是俠者懼且為害吾當召而謝之遂與裴共俟命吏邀客客亦不讓而至時已向夜李見甚敬裴尉見之忽趨避他室李揖客坐定復起問裴裴色兢懼甚謂李曰此果異人是峨嵋山人道術至高者曾師事數年中路捨之而逃今懼不可見李子因先為裴請裴即衣公服趨入鞠躬載拜而謝罪客顧之良久李又為言方命坐言議皆不相及裴益敬肅而李益加敬焉兼言令之過李為辭謝再三仍宿於李廳李夙夜省問已失所在而門戶扃閉如故益以奇之比旦吏人奔走報云令忽中惡氣將絶而心微暖諸寮相與省之至食時而蘇令乃召李主簿入見叩頭謝之曰賴君免死耳李問故云昨晚客蓋是神人吾昨被録去見拓跋據胡床坐責吾之不接賓客遂命折桑條鞭之杖雖小而痛甚吾無辭謝之約鞭至數百乃云賴主簿言之不然死矣勑左右送歸方得蘇耳舉示杖痕猶在也命駕往縣北尋之行三十里果見大桑林下有人馬跡甚多地有折桑條十餘莖血猶在地焉令自是知懼而拓跋從此不知所之蓋神仙也出原化記魏方進弟唐御史大夫魏方進有弟年十五餘不能言涕沫滿身兄弟親戚皆目為癡人無為恤養者唯一姊憫憐之給與衣食令僕者與洗沐略無倦色一旦於門外曝日搔癢其鄰里見朱衣使者領數十騎至問曰仙師何在遂走到見搔癢者鞠躬趨前俯伏稱謝良久忽高聲叱曰來何遲勾當事了未曰有次第又曰何不速了卻且去神彩洞徹聲韻朗暢都無癡疾之狀朱衣輩既去依前涕下至口搔癢不已其夜遂卒魏公等雖驚其事而不異其人遂隨事瘞埋唯姊悲慟有加潛具葬禮至小殮之日乃以一黃繡披襖子平日所惜者密置棺中後魏公從駕至馬嵬其姊亦隨去禁兵亂誅楊國忠魏公親也與其族悉預禍焉時其姊偶出在店外聞難走遺其男女三人皆五六歲已分為俎醢矣及明早軍發試往店內尋之僵尸相接東北稍深一床上若有衣服就視之兒女三人悉在其中所覆乃是葬癡弟黃繡襖子也悲感慟哭母子相與入山俱免於難出逸史李清北海人也代傳染業清少學道多延齊魯之術士道流必誠敬接奉之終無所遇而勤求之意彌切家富於財素為州里之豪氓子孫及內外姻族近百數家皆能游手射利於益都每清生日則爭先饋遺凡積百餘萬清性仁儉來則不拒納亦不散如此相因填纍藏舍年六十九生日前一旬忽召姻族大陳酒食已而謂曰吾賴爾輩勤力無過各能生活以是吾獲優贍然吾布衣蔬食逾三十年矣寧復有意於華侈哉爾輩以吾老長行每餽吾生日衣裝玩具侈亦至矣然吾自以久所得緘之一室曾未閲視徒損爾之給用資吾之糞土竟何為哉幸天未録吾魂氣行將又及吾之生辰吾固知爾輩又營續壽之禮吾所以先期而會蓋止爾之常態耳子孫皆曰續壽自遠有之非此將何以展卑下孝敬之心願無止絶俾姻故之不安也清曰苟爾輩志不可奪則從吾所欲而致之可乎皆曰願聞尊旨清曰各能遺吾洪纖麻縻百尺總而計之是吾獲數千百丈矣以此為紹續吾壽豈不延長哉皆曰謹奉教然尊旨必有所以卑小敢問清笑謂曰終亦須令爾輩知之吾下界俗人妄意求道精神心力夙夜勤勞於今六十載矣而曾無影響吾年已老耄朽蠹殆盡自期筋骸不過三二年耳欲乘視聽步履之尚能將行早志爾輩幸無吾阻先是青州南十里有高山俯壓郡城峰頂中裂豁為關崖州人家家坐對嵐岫歸雲過鳥歷歷盡見按圖經云雲門山俗亦謂之劈山而清蓄意多時及是謂姻族曰雲門山神仙之窟宅也吾將往焉吾生日坐大竹蕢以轆轤自縋而下以纖縻為媒焉脫不可前吾當急引其媒而則出吾於媒末設有所遇而能肆吾志亦當復來歸子孫姻族泣諫曰冥寞深遠不測紀極況山精木魅蛇虺怪物何類不儲忍以千金之身自投於斯豈久視永年之階乎清曰吾志也汝輩必阻則吾私行矣是不獲行竹簣洪縻之安也衆知不可回則共治其事及期而姻族鄉里凡千百人競齎酒饌遲明大會於山椒清乃揮手辭謝而入焉良久及地其中極暗仰視天才如手掌捫四壁止容兩席許東南有穴可俯僂而入乃棄簣遊焉初甚狹細前往則可伸腰如此約行三十里晃朗微明俄及洞口山川景象雲煙草樹宛非人世曠望久之惟東南十數里隱映若有居人焉因徐步詣之至則陡絶一臺基級極峻而南向可以登陟遂虔誠而上頗懷恐懼及至窺其堂宇甚嚴中有道士四五人清於是扣門俄有青童應門問焉答曰青州染工李清青童如詞以報清聞中堂曰李清伊來也乃令前清惶怖趨拜當軒一人遙語曰未宜來何即遽至因令遍拜諸賢其時日已午忽有白髮翁自門而入禮謁啓曰蓬萊霞明觀丁尊師新到衆聖令邀諸真登上清赴會於是列真偕行謂清曰汝且居此臨出顧曰慎無開北扉清巡視院宇兼啓東西門情意飄飄然自謂永棲真境因至堂北見北戶斜掩偶出顧望下為青州宛然在目離思歸心良久方已悔恨思返諸真則已還矣其中相謂曰令其勿犯北門竟爾自惑信知仙界不可妄至也因與瓶中酒一甌其色濃白既而謂曰汝可且歸清則叩頭求哀又云無路卻返衆謂清曰會當至此但時限未耳汝無苦無途但閉目足至地則到鄉也清不得已流涕辭行或相謂曰既遣其歸須令有以為生清心恃豪富訝此語為不知己一人顧清曰汝於堂內閣上取一軸書去清既得謂清曰脫歸無倚可以此書自給清遂閉目覺身如飛鳥但聞風水之聲相激須臾履地開目即青州之南門其時才申末城隍阡陌髣佛如舊至於屋室樹木人民服用已盡變改獨行盡日更無一人相識者即詣故居朝來之大宅宏門改張新舊曾無倣像左側有業染者因投詣與之語其人稱姓李自云我本北海富家因指前後閭閈此皆我祖先之故業曾聞先祖於隋開皇四年生日自縋南山不知所終因是家道淪破清悒怏久之乃換姓氏寓遊城邑因取所得書閲之則療小兒諸疾方也其年青州小兒癘疫清之所醫無不立愈不旬月財産復振時高宗永徽元年天下富庶而北海往往有知清者因是齊魯人從而學道術者凡百千輩至五年乃謝門徒云吾往泰山觀封禪自此莫知所往出集異記
