body:
  text: 關羽關羽蜀將關羽善撫士卒而輕士大夫張飛敬禮士大夫而輕卒伍二將俱不得其中亦不得其死出獨異志簡文晉簡文道光武云漢世祖雄豪之中最有俊令之體賢達之風高祖則倜儻疏達魏武則猜忌狹𠫤出簡文談疏李密唐高祖報李密書曰天生蒸人必有司牧當今為牧非子而誰老夫年餘知命願不及此欣戴大弟攀鱗附翼唯冀早膺圖菉以寧兆庶宗盟之長屬籍見容復封於唐斯榮足矣殪商辛於牧野所不忍言執子嬰於咸陽非敢聞命密得書甚悅示其部下曰唐公見推天下不足可定後密兵敗王伯當保河陽密以輕騎歸之謂伯當曰兵敗矣久苦諸君我今自刎請以謝衆伯當抱密號叫密復曰諸公幸不相棄當共歸關中密身雖愧無功諸君必保富貴伯當贊其計從入關者尚二萬人高祖遣使迎勞相望於道密大喜謂其徒曰吾雖舉事不成而恩結百姓山東連城數百知吾至盡當歸唐比於竇融勳亦不細豈不以一台司見處乎及至京禮數益薄執政者又來求財意甚不平尋拜光祿卿封邢國公未幾聞其所部將帥皆不附世充高祖復使密領本兵往黎陽招其將士故時者以經略王充王伯當為左武衛亦令副密行至桃林高祖復徵之密懼謀叛伯當止密不從密據桃林縣城驅掠畜産直趨南山乘險而東遣人使告張善相令應接時史萬寶留鎮熊州遣盛彥師率步騎數十追躡至陸渾縣南七十里彥師伏兵山谷密軍半度橫出擊之遂斬密年三十七時徐績在黎陽為密堅守高祖遣使將密首以招之績發喪行服備君臣之禮表請收葬大具威儀三軍皆縞素葬於黎陽山南五里故人哭之多有嘔血者出談賓録劉文靜劉文靜者為晉陽令坐與李密連姻隋煬帝繫於郡獄太宗以文靜可與謀議入禁所視之文靜大喜曰天下大亂非湯武高光之才不能定也太宗曰卿安知無人禁所非兒女之情相憂而已故來與君圖舉大計文靜曰乘虛入關號令天下不盈半歲帝業可成太宗笑曰尹言正合人意後使於突厥文靜謂曰願與可汗兵馬同入京師人衆土地入唐公財帛金寶入突厥即遣騎二千隨文靜而至高祖每引重臣同座共食文靜奏曰宸極位尊帝座嚴重乃使太陽俯同萬物臣下震恐無以措身出談賓録李金才太宗嘗進白高祖曰代傳李氏姓膺圖籙李金才位望崇貴一朝族滅大人受命討捕其可得乎誠能平賊即又功當不賞以此求免其可得乎高祖曰我一夜思量汝言大有理今日破家滅身亦由汝化家為國亦由汝出談賓録李靖貞觀十四年侯君集薛萬鈞等破高昌降其王麯智盛執之獻捷於觀德殿以其地為西州置交河柳中等縣其界東西八百里南北五百里漢戊巳校尉之地初突厥屯兵浮圖城與高昌為影響至是懼而來降其地為延明鈔本延作庭州突厥頡利可汗使執失思力入朝謝罪請為藩臣太宗遣唐儉等持節出塞安撫之李靖張公謹於定襄謀曰詔使到彼虜必自寬選精騎齎二十日糧乘間掩襲遇其斥候皆以俘隨奄到縱擊遂滅其國獲義城公主虜男女十萬頡利乘千里馬奔於西偏靈州行軍張寶相擒之以獻出談賓録郭齊宗高宗問兵書所云天陳地陳人陳各何謂也員半千越次對曰臣覩載籍此事多矣或謂天陳星宿孤虛也地陳山川向背也人陳編伍彌縫也郭齊宗對曰以臣愚見則不然夫師出以義有若時雨得天陳也兵在足食足兵且耕且戰得地之利此地陳也卒乘輕利將帥和睦此人陳也若用兵使三者去一其何以戰高宗嗟賞之擢拜左衛胄曹也出盧氏雜說唐休璟西突厥諸蕃不和舉兵相攻安西道絶表奏相繼天后命唐休璟與宰相商度事勢俄頃間草奏使施行後十餘日安西諸州表奏兵馬應接程期一如休璟所畫天后謂休璟曰恨用卿晚因任之為相出談賓録李盡忠李盡忠唐天后中契丹李盡忠萬榮之破營府也以地牢囚漢俘數百人聞麻仁節等諸軍欲至乃令守囚霫等紿之曰家口饑寒不能存活求待國家兵到吾等即降其囚日別與一頓粥引出安慰曰吾此無飲食養汝又不忍殺汝總放歸若何衆皆拜伏乞命乃紿放去至幽州具說饑凍逗留兵士聞之爭欲先入至黃麞峪賊又令老者投官軍送遺老牛瘦馬於道側麻仁節等三軍棄步卒將馬先爭入被賊設伏橫截軍將被索搨之生擒節等死者填山谷罕有一遺出朝野僉載封常清封常清細瘦目纇腳短而跛高仙芝為夫蒙靈察都知兵馬使常清為仙芝傔會達覽部落皆叛自黑山北向西趨碎葉使仙芝以騎二千邀截之常清於幕中潛作捷書仙芝所欲言無不周悉仙芝異之軍回仙芝見判官劉眺獨孤峻等遂問曰前者捷書何人所作副大使何得有此人仙芝曰即傔人封常清也見在門外馬邊眺等揖仙芝命常清進坐與語如舊相識後仙芝為安西節度使奏常清為節度判官仙芝每出征討常令常清知留後事常清有才學果決仙芝乳母子鄭德詮已為郎將威望動三軍德詮見常清出其門素易之走馬突常清而去常清至使院命左右密引至廳經數重門皆隨後閉之常清案後起謂之曰常清起自細微預中丞傔中丞再不納郎將豈不知乎今中丞過聽以常清為留後使郎將何得無禮對中使相凌因叱之命勒回即杖六十面仆地曳出仙芝妻及乳母於門外號哭救之不得後仙芝見常清遂無一言常清亦不之謝後充安西節度使天寶十四載朝於華清宮玄宗問以凶逆之事計將安出常清乃大言以慰玄宗之意曰臣請挑馬箠渡河計日取逆胡首懸於闕下玄宗憂而壯其言至東都旬朔召募六萬頻戰不利遂與高仙芝退守潼關仙芝副榮王琬領五萬人進擊十二月十日至陝州十一日常清敗於東京十三日祿山入東京常清奔至陝州以賊鋒不可當乃燒太原倉引兵退趨潼關繕修守具賊尋至關不能入仙芝之力乃削常清官爵令白衣於仙芝軍效力監軍邊令誠每事干之仙芝多不從令誠入奏事具言奔敗之狀玄宗怒遣令誠斬之常清臨刑上表既刑陳其尸於蘧蒢之上令誠謂仙芝曰大夫亦有恩命仙芝遽下至常清所刑處仙芝曰我退罪他死不敢辭然以我為減截兵糧及賜物則誣我也謂令誠曰上是天下是地兵士皆在豈不知乎兵士齊呼曰枉其聲殷地仙芝目常清尸曰封二子從微至著我引拔子代我為節度今日又與子同死於此豈命也乎遂斬之出談賓録李光弼李光弼討史思明師於野水渡既夕還軍留其卒一千人謂雍皓曰賊將高暉李日越喻文景皆萬人敵也思明必使一人劫我我且去之子領卒待賊於此至勿與戰降則俱來其日思明召日越曰李君引兵至野水此成擒也汝以鐵騎宵濟為我取之命曰必獲李君不然無歸日越引騎五百晨壓皓軍皓阻濠休卒吟嘯相視日越怪之問曰太尉在乎曰夜去矣兵幾何曰千人將謂誰曰雍皓也日越沉吟久謂其下曰我受命必得李君今獲皓不塞此望必見害不如降之遂請降皓與之俱至光弼悉又嘗伏軍守河陽與史思明相持經年思明有戰馬千匹每日洗馬於河南以示其多光弼乃於諸營檢獲牝馬五百匹待思明馬至水際盡驅出之有駒縶於城中群牝嘶鳴無復間斷思明戰馬悉浮渡河光弼盡驅入營光弼又嘗在河陽聞史思明已過河遠回趨東京至謂留守韋陟曰賊乘我軍之敗難與爭鋒洛城無糧又不可守公計若何陟曰加兵陝州退守潼關光弼曰此蓋兵家常勢非用奇之策也不若移軍河陽北阻澤潞據三城以抗之勝即擒之敗即自守表裡相應使賊不敢西侵此則猿臂之勢也思明至偃師光弼令將士赴河陽獨以麾下五百餘騎為殿軍當石橋路秉燭徐行賊不敢逼乙夜達城遲明思明悉衆來攻諸將決死而戰殺賊萬餘衆生擒八十人器械糧儲萬計擒其大將徐璜王李秦按新唐書一三六李光弼傳作徐璜玉李秦授思明大懼退築城以相拒光弼將戰謂左右曰凡戰危事勝負擊之光弼位為三公不可死於賊手事之不捷誓投於河適城上見河稍遠恐或急事難至遂置劍於鞾中有必死之志及是戰勝於城西西望拜舞三軍感動移鎮臨淮舁疾而行徑赴泗州光弼之未至河南也田神功平劉展後逗留於楊府尚衡殷仲卿相攻於兗鄆來瑱旅拒而還襄陽朝廷患之及光弼至徐州史朝義退走田神功遽歸河南尚衡殷仲卿來瑱皆懼其威名相繼赴關吐蕃將犯上都手詔追光弼率衆赴長安光弼與程元振不叶觀天下之變遷延不至初光弼用師嚴整天下服其威名凡所號令諸將不敢仰視及其有田神功等諸軍皆不受其制因此不得志愧恥成疾薨於徐州年五十七其母衰老莊宅使魚朝恩弔問出談賓録
