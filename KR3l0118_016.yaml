body:
  text: 杜子春杜子春杜子春者蓋周隋間人少落拓不事家産然以志氣間曠縱酒間遊資産蕩盡投於親故皆以不事事見棄方冬衣破腹空徒行長安中日晚未食倣徨不知所往于東市西門飢寒之色可掬仰天長吁有一老人策杖於前問曰君子何歎春言其心且憤其親戚之疏薄也感激之氣發于顏色老人曰幾緡則豐用子春曰三五萬則可以活矣老人曰未也更言之十萬曰未也乃言百萬亦曰未也曰三百萬乃曰可矣于是袖出一緡曰給子今夕明日午時候子於西市波斯邸慎無後期及時子春往老人果與錢三百萬不告姓名而去子春既富蕩心復熾自以為終身不復羈旅也乘肥衣輕會酒徒徵絲管歌舞於倡樓不復以治生為意一二年間稍稍而盡衣服車馬易貴從賤去馬而驢去驢而徒倏忽如初既而復無計自歎于市門發聲而老人到握其手曰君復如此奇哉吾將復濟子幾緡方可子春慚不應老人因逼之子春愧謝而已老人曰明日午時來前期處子春忍愧而往得錢一千萬未受之初憤發以為從此謀身治生石季倫猗頓小豎耳錢既入手心又翻然縱適之情又卻如故不一二年間貧過舊日復遇老人于故處子春不勝其愧掩面而走老人牽裾止之又曰嗟乎拙謀也因與三千萬曰此而不痊則子貧在膏肓矣子春曰吾落拓邪遊生涯罄盡親戚豪族無相顧者獨此叟三給我我何以當之因謂老人曰吾得此人間之事可以立孤孀可以衣食於名教復圓矣感叟深惠立事之後唯叟所使老人曰吾心也子治生畢來歲中元見我於老君雙檜下子春以孤孀多寓淮南遂轉資揚州買良田百頃郭中起甲第要路置邸百餘間悉召孤孀分居第中婚嫁甥姪遷祔族親恩者煦之讎者復之既畢事及期而往老人者方嘯于二檜之陰遂與登華山雲臺峰入四十里餘見一處室屋嚴潔非常人居彩雲遙覆驚鶴飛翔其上有正堂中有藥爐高九尺餘紫焰光發灼煥窗戶玉女九人環爐而立青龍白虎分據前後其時日將暮老人者不復俗衣乃黃冠縫帔士也持白石三丸酒一巵遺子春令速食之訖取一虎皮鋪於內西壁東向而坐戒曰慎勿語雖尊神惡鬼夜叉猛獸地獄及君之親屬為所困縛萬苦皆非真實但當不動不語宜安心莫懼終無所苦當一心念吾所言言訖而去子春視庭唯一巨甕滿中貯水而已道士適去旌旗戈甲千乘萬騎遍滿崖谷呵叱之聲震動天地有一人稱大將軍身長丈餘人馬皆著金甲光芒射人親衛數百人皆杖劍張弓直入堂前呵曰汝是何人敢不避大將軍左右竦劍而前逼問姓名又問作何物皆不對問者大怒摧斬爭射之聲如雷竟不應將軍者極怒而去俄而猛虎毒龍狻猊獅子蝮蝎萬計哮吼拏攫而爭前欲搏噬或跳過其上子春神色不動有頃而散既而大雨滂澍雷電晦暝火輪走其左右電光掣其前後目不得開須臾庭際水深丈餘流電吼雷勢若山川開破不可制止瞬息之間波及坐下子春端坐不顧未頃而將軍者復來引牛頭獄卒奇貌鬼神將大鑊湯而置子春前長槍兩叉四面周匝傳命曰肯言姓名即放不肯言即當心取叉置之鑊中又不應因執其妻來拽于階下指曰言姓名免之又不應及鞭捶流血或射或斫或煮或燒苦不可忍其妻號哭曰誠為陋拙有辱君子然幸得執巾櫛奉事十餘年矣今為尊鬼所執不勝其苦不敢望君匍匐拜乞但得公一言即全性命矣人誰無情君乃忍惜一言雨淚庭中且呪且罵春終不顧將軍且曰吾不能毒汝妻耶令取銼碓從腳寸寸銼之妻叫哭愈急竟不顧之將軍曰此賊妖術已成不可使久在世間敕左右斬之斬訖魂魄被領見閻羅王曰此乃雲臺峰妖民乎捉付獄中于是鎔銅鐵杖碓搗磑磨火坑鑊湯刀山劍樹之苦無不備嘗然心念道士之言亦似可忍竟不呻吟獄卒告受罪畢王曰此人陰賊不合得作男宜令作女人配生宋州單父縣丞王勸家生而多病針灸藥醫略無停日亦嘗墜火墮床痛苦不齊終不失聲俄而長大容色絶代而口無聲其家目為啞女親戚狎者侮之萬端終不能對同鄉有進士盧圭者聞其容而慕之因媒氏求焉其家以啞辭之盧曰苟為妻而賢何用言矣亦足以戒長舌之婦乃許之盧生備六禮親迎為妻數年恩情甚篤生一男僅二歲聰慧無敵盧抱兒與之言不應多方引之終無辭盧大怒曰昔賈大夫之妻鄙其夫才不笑然觀其射雉尚釋其憾今吾陋不及賈而文藝非徒射雉也而竟不言大丈夫為妻所鄙安用其子乃持兩足以頭撲於石上應手而碎血濺數步子春愛生于心忽忘其約不覺失聲云噫噫聲未息身坐故處道士者亦在其前初五更矣見其紫焰穿屋上大火起四合屋室俱焚道士歎曰錯大誤余乃如是因提其髮投水甕中未頃火息道士前曰吾子之心喜怒哀懼惡欲皆忘矣所未臻者愛而已向使子無噫聲吾之藥成子亦上仙矣嗟乎仙才之難得也吾藥可重鍊而子之身猶為世界所容矣勉之哉遙指路使歸子春強登基觀焉其爐已壞中有鐵柱大如臂長數尺道士脫衣以刀子削之子春既歸愧其忘誓復自效以謝其過行至雲臺峰絶無人迹嘆恨而歸出續玄怪録張老張老者揚州六合縣園叟也其鄰有韋恕者梁天監中自揚州曹掾秩滿而來有長女既笄召里中媒媼令訪良壻張老聞之喜而候媒于韋門媼出張老固延入且備酒食酒闌謂媼曰聞韋氏有女將適人求良才于媼有之乎曰然曰某誠衰邁灌園之業亦可衣食幸為求之事成厚謝媼大罵而去他日又邀媼媼曰叟何不自度豈有衣冠子女肯嫁園叟耶此家誠貧士大夫家之敵者不少顧叟非匹吾安能為叟一杯酒乃取辱於韋氏叟固曰強為吾一言之言不從即吾命也媼不得已冒責而入言之韋氏大怒曰媼以我貧輕我乃如是且韋家焉有此事況園叟何人敢發此議叟固不足責媼何無別之甚耶媼曰誠非所宜言為叟所逼不得不達其意韋怒曰為吾報之今日內得五百緍則可媼出以告張老乃曰諾未幾車載納于韋氏諸韋大驚曰前言戲之耳且此翁為園何以致此吾度其必無而言之今不移時而錢到當如之何乃使人潛候其女女亦不恨乃曰此固命乎遂許焉張老既娶韋氏園業不廢負穢钁地鬻蔬不輟其妻躬執爨濯了無怍色親戚惡之亦不能止數年中外之有識者責恕曰君家誠貧鄉里豈無貧子弟奈何以女妻園叟既棄之何不令遠去也他日恕致酒召女及張老酒酣微露其意張老起曰所以不即去者恐有留念今既相厭去亦何難某王屋山下有一小莊明旦且歸耳天將曙來別韋氏他歲相思可令大兄往天壇山南相訪遂令妻騎驢戴笠張老策杖相隨而去絶無消息後數年恕念其女以為蓬頭垢面不可識也令其男義方訪之到天壇南適遇一崑崙奴駕黃牛耕田問曰此有張老家莊否崑崙投杖拜曰大郎子何久不來莊去此甚近某當前引遂與俱東去初上一山山下有水過水連綿凡十餘處景色漸異不與人間同忽下一山其水北朱戶甲第樓閣參差花木繁榮煙雲鮮媚鸞鶴孔雀徊翔其間歌管廖亮耳目崑崙指曰此張家莊也韋驚駭莫測俄而及門門有紫衣人吏拜引入廳中鋪陳之華目所未覩異香氤氳遍滿崖谷忽聞珠珮之聲漸近二青衣出曰阿郎來此次見十數青衣容色絶代相對而行若有所引俄見一人戴遠遊冠衣朱綃曳朱履徐出門一青衣引韋前拜儀狀偉然容色芳嫩細視之乃張老也言曰人世勞苦若在火中身未清涼愁焰又熾而無斯須泰時兄久客寄何以自娛賢妹略梳頭即當奉見因揖令坐未幾一青衣來曰娘子已梳頭畢遂引入見妹于堂前其堂沉香為梁玳瑁帖門碧玉窗珍珠箔階砌皆冷滑碧色不辨其物其妹服飾之盛世間未見略敘寒暄問尊長而已意甚魯莽有頃進饌精美芳馨不可名狀食訖館韋于內廳明日方曙張老與韋生坐忽有一青衣附耳而語長老笑曰宅中有客安得暮歸因曰小妹暫欲遊蓬萊山賢妹亦當去然未暮即歸兄但憩此張老揖而入俄而五雲起於庭中鸞鳳飛翔絲竹並作張老及妹各乘一鳳餘從乘鶴者十數人漸上空中正東而去望之已沒猶隱隱聞音樂之聲韋君在後小青衣供侍甚謹逮暮稍聞笙篁之音倏忽復到及下於庭張老與妻見韋曰獨居大寂寞然此地神仙之府非俗人得遊以兄宿命合得到此然亦不可久居明日當奉別耳及時妹復出別兄殷勤傳語父母而已張老曰人世遐遠不及作書奉金二十鎰並與一故席帽曰兄若無錢可于揚州北邸賣藥王老家取一千萬持此為信遂別復令崑崙奴送出卻到天壇崑崙奴拜別而去韋自荷金而歸其家驚訝問之或以為神仙或以為妖妄不知所謂五六年間金盡欲取王老錢復疑其妄或曰取爾許錢不持一字此帽安足信既而困極其家強逼之曰必不得錢亦何傷乃往揚州入北邸而王老者方當肆陳藥韋前曰叟何姓曰姓王韋曰張老令取錢一千萬持此帽為信王曰錢即實有席帽是乎韋曰叟可驗之豈不識耶王老未語有小女出青布幃中曰張老常過令縫帽頂其時無皂線以紅線縫之線色手蹤皆可自驗因取看之果是也遂得載錢而歸乃信真神仙也其家又思女復遣義方往天壇南尋之到即千山萬水不復有路時逢樵人亦無知張老莊者悲思浩然而歸舉家以為仙俗路殊無相見期又尋王老亦去矣後數年義方偶遊揚州間行北邸邸原作邙據明鈔本改前忽見張家崑崙奴前曰大郎家中何如娘子雖不得歸如日侍左右家中事無巨細莫不知之因出懷金十斤以奉曰娘子令送與大郎君阿郎與王老會飲于此酒家大郎且坐崑崙當入報義方坐于酒旗下日暮不見出乃入觀之飲者滿坐坐上並無二老亦無崑崙取金視之乃真金也驚嘆而歸又以供數年之食後不復知張老所在出續玄怪録
