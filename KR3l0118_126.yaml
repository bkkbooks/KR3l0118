body:
  text: 程普程普字嘉謀吳孫權將也領江夏太守蕩寇將軍嘗殺叛者數百人皆使投火即日普病熱百餘日便死原闕出處今見三國志吳志普傳裴注引吳書羊聃字彭祖晉廬江太守為人剛克粗暴恃國姻親縱恣尤甚睚眥之嫌輒加刑戮征西大將軍庾亮檻送具以狀聞右司馬奏聃殺郡將吏及民簡良等二百九十人徒謫一百餘人應棄市依八議請宥顯宗詔曰此事古今所未有此而可忍孰不可忍何八議之有下下明鈔本作可獄所賜命聃兄子賁先尚南郡公主自表解婚詔不許琅琊孝王妃山氏聃之甥也苦以為請於是司徒王導啓聃罪不容恕宜極重法山太妃憂感動疾陛下罔極之恩宜蒙生全之宥於是詔下曰山太妃唯此一舅發言摧鯁乃至吐血情慮深重朕丁荼毒受太妃撫育之恩同於慈親若不堪難忍之痛以致頓斃朕亦何顏自處今便原聃生命以慰太妃渭陽之恩於是除名為民少時聃病疾恆見簡良等曰枉豈可受今來相取自由黃泉經宿死出還冤記劉毅宋高祖平桓玄後以劉毅為撫軍荊州刺史到州便收牧牛寺主云藏桓家兒慶為沙彌併殺四道人後夢見此僧來云君何以枉殺貧道貧道已白於天帝恐君亦不得久因遂得疾不食日彌羸瘦當毅發揚都時多有爭競侵凌宰輔宋高祖因遣人征之毅敗後夜單騎突投牧牛寺僧僧曰撫軍昔枉殺我師我道人自無報仇之理然何宜來此主師屢有靈驗云天帝當收撫軍於寺殺之毅便歎吒出寺因上大樹自縊而死出還冤記張和思北齊張和思斷獄囚無問善惡貴賤必被枷鎖杻械困苦備極囚徒見者破膽喪魂號生羅剎其妻前後孕男女四人臨産即悶絶求死所生男女皆著肉鎖手腳並有肉杻束縛連絆墮地後和思為縣令坐法杖死梁元帝後周文帝宇文泰初為魏丞相值梁朝喪亂梁孝元帝為湘東王時在荊州遺使通和禮好甚至與泰斷金立盟結為兄弟後平侯景孝元即位泰猶人臣頗行凌侮又求索無厭乃不愜意遂遣兵襲江漢虜係朝士至于民庶百四十萬口而害孝元又魏文帝先納茹茹主郁久閭阿那壞女為后親愛殊篤害梁主之明年壞為齊國所敗因率餘衆數千奔魏而突厥舊與茹茹怨讎即遣餉泰馬三千匹求誅壞等泰許諾伏突厥兵馬與壞宴會醉便縛之即日滅郁久閭姓五百餘人茹茹臨死仰天而訴明年冬泰獵於隴右得病見孝元及壞為祟泰發怒肆罵命索酒食與之兩月泰卒竇軌唐洛州都督酇國公竇軌太穆皇后三從兄性剛嚴好殺為益州行臺僕射多殺將士又害行臺尚書韋雲起貞觀二年在洛病甚忽言有人餉我瓜來左右報之冬月無瓜軌曰一盤好瓜何謂無耶既而驚視曰非瓜並是人頭軌曰從我償命又曰扶我起見韋尚書言畢而薨武攸寧唐建昌王武攸寧任明鈔本任作別置勾任明鈔本任作使法外枉徵財物百姓破家者十而九告冤於天吁嗟滿路為大庫長百步二百餘間所徵獲者貯在其中天火燒之一時蕩盡衆口所咒攸寧尋患足腫粗於甕其酸楚不可忍數月而終崔進思唐虔州參軍崔進思恃郎中孫尚容之力充綱入都送五千貫每貫取三百文裹頭百姓怨歎號天哭地至瓜步江遭風船沒無有孑遺家資田園貨賣並盡解官落職求活無處此所謂聚斂之怨祁萬壽唐乾封縣録事祁萬壽性好殺人縣官每決罰人皆從索錢時未得與間即取粗杖打之如此死者不可勝數囚徒見之皆失魂魄有少不稱心即就獄打之困苦至垂死其妻生子或著肉枷或有肉杻或無口鼻或無手足生而皆死郭霸唐侍御史郭霸奏殺宋州三百人暴得五品經月患重臺官問疾見老巫曰郭公不可救也有數百鬼遍體流血攘袂璹齒皆云不相放有一碧衫人喝緋衣人曰早合去何因許時答曰比緣未得五品未合放俄而霸以刀子自刺乳下攪之曰大快家人走問之曰御史孫容師刺我其子經御史顧琮訟容師琮以荒亂言不理其夜而卒容師以明年六月霸死日而終皆不知其所以司勳郎中張元一云自春大旱至霸死雨足天后問在外有何事元一曰外有三慶旱降雨一慶中橋新成萬代之利二慶郭霸身死百姓皆歡三慶也天后笑曰霸見憎如此耶曹惟思唐蜀郡法曹參軍曹惟思當章仇兼瓊之時為西山運糧使甚見委任惟思白事於兼瓊瓊與語畢令還運惟思妻生男有疾因以情告兼瓊請留數日兼瓊大怒叱之令出集衆斬之其妻聞之乘車攜兩子與之訣惟思已辮髮束縛兼瓊出監斬之惟思二男叩頭乞命來抱馬足馬為不行兼瓊為之下泣云業已斬矣猶未釋郡有禪僧道行至高兼瓊母師之禪僧乃見兼瓊曰曹法曹命且盡請不須殺免之兼瓊乃赦惟思明日使惟思行盧府長史事賜緋魚袋專知西山轉運使仍許與其妻行惟思至瀘州因疾夢僧告之曰曹惟思一生中負心殺人甚多無分毫善事今冤家債主將至為之奈何惟思哀祈甚至僧曰汝能度兩子為僧家中錢物衣服盡用施寺仍合家素餐堂前設道場請名僧晝夜誦經禮懺可延百日之命如不能即當死矣惟思曰諸事易耳然苦不食若之何僧曰取羊肝水浸加以椒醬食之即能餐矣既覺具告其妻妻贊之即僧二子又如言置道場轉經且食羊肝即飯矣如是月餘晨坐其亡母亡姊皆來視之惟思大驚趨走迎候有一鬼子手執絳幡前引升自西階植絳幡焉其亡姊不言但於幡下舞僛僛不輟其母泣曰惟思在生不知罪殺人無數今冤家欲來吾不忍見汝受苦辛故來視汝惟思命設祭母母食之其姊舞更不已不交一言母食畢與姊皆去惟思疾轉甚於是羊肝亦不食常臥道場中晝日眠覺有二青衣童子其長等僬僥也一坐其頭一坐其足惟思問之童子不與語而童子貌甚間暇口有四牙出於脣外明日食時惟思見所殺人或披頭潰腸斷截手足或斬首流血盛怒來詬惟思曰逆賊與我同事急反殺我滅口我今訴於帝故來取汝言畢升階而二童子推之不得進但謾罵曰終須去惟思知不免具言其事如此每日常來皆為童子所推不得至惟思所月餘忽失二童子惟思大懼與妻子別於是死者大至衆見惟思如被曳狀墜於堂下遂卒惟思不臧人也自千牛備升為澤州相州判司常養賊徒數十人令其所在為盜而館之及事發則殺之以滅口前後殺百餘人故禍及也邢唐邢之使新羅也還歸泊于炭山遇賈客百餘人載數船物皆珍翠沈香象犀之屬直數千萬因其無備盡殺之投於海中而取其物至京懼人知也則表進之敕還賜恣用之後子縡與王謀反邢氏遂亡亦其報也萬國俊唐侍御史萬國俊令史出身殘忍為懷楚毒是務奏六道使誅斬流人殺害無數後從臺出至天津橋南有鬼滿路遮截馬足不得前進口云叩頭緩我連聲忍痛俄而據鞍舌長數尺遍身青腫輿至宅夜半而卒王瑤會昌中有王瑤者自云遠祖本青州人事平盧節使時主公姓李不記其名常患背疽衆醫莫能愈瑤祖請以牲幣禱於岱宗遂感現形留連顧問瑤祖因叩頭泣血願垂矜憫嶽神言曰爾之主帥位居方伯職在養民而虐害生靈廣為不道淫刑濫罰致冤魂上訴所患背瘡蓋鞭笞之驗必不可愈也天法所被無能宥之瑤祖因拜乞一見主公洎歸青丘主公已殂歿矣瑤祖具以泰山所睹之事白於主公夫人云何以為驗瑤祖曰某當在冥府之中亦慮歸之不信請謁主公備窺縲絏主公遂裂近身衣袂方圓寸餘以授某曰爾歸將此示吾家具衣袂見在夫人得之遂驗臨終服之衣果有裁裂之處瘡血猶在知其言不謬矣出耳目記陳峴閩王審知初入晉安開府多事經費不給孔目吏陳峴獻計請以富人補和市官恣所徵取薄酬其直富人苦之峴由是寵遷為支計官數年有二吏執文書詣峴里中問陳支計家所在人問其故對曰渠獻計置和市官坐此破家者衆凡破家者祖考皆訴於水西大王王使來追爾峴方有勢人懼不敢言翌日峴自府馳歸急召家人設齋置祭意色慞惶是日里中復見二吏入峴家遂暴卒初審知之起事其兄潮首倡及審知據閩中為潮立廟於水西故俗謂之水西大王云蕭懷武偽蜀有尋事團亦曰中團小院使蕭懷武主之蓋軍巡之職也懷武自所團捕捉賊盜多年官位甚隆積金巨萬第宅亞於王侯聲色妓樂為一時之冠所管中團百餘人每人各養私名十餘輩或聚或散人莫能別呼之曰狗至于深坊僻巷馬醫酒保乞丐傭作及販賣童兒輩並是其狗民間有偶語者官中罔不知又有散在州郡及勳貴家當庖看廄御車執樂者皆是其狗公私動靜無不立達于懷武是以人懷恐懼常疑其肘臂腹心皆是其狗也懷武殺人不知其數蜀破之初有與己不相協及積金藏鏹之夫日夜捕逐入院盡殺之冤枉之聲聞于街巷後郭崇韜入蜀人有告懷武欲謀變者一家百餘口無少長戮于市出王氏見聞李龜禎乾德中偽蜀御史李龜禎久居憲職嘗一日出至三井橋忽睹十餘人摧頭及被髮者叫屈稱冤漸來相逼龜禎懾懼回馬徑歸説與妻子仍誡其子曰爾等成長筮仕慎勿為刑獄官以吾清慎畏懼猶有冤枉今欲悔之何及自此得疾而亡陳潔偽蜀御史陳潔性慘毒讞刑定獄嘗以深刻為務十年內斷死千人因避暑行亭見蟢子懸絲面前公引手接之成大蜘蛛銜中指拂落階下化為厲鬼云來索命驚訝不已指漸成瘡痛苦十日而死
