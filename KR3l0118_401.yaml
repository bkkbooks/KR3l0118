body:
  text: 金下張珽咸通末年張珽自徐之長安至圃田東時于大樹下俄頃有三書生繼來環坐珽因問之一書生曰我李特也一曰我王象之也一曰我黃真也皆曰我三人俱自汴水來欲一游龍門山耳乃共閒論其王象之曰我去年游龍門山經于是路北一二里有一子亦儒流也命我于家再宿而回可同一謁之珽因亦同行至路北一二里果見一宅甚荒毀既叩門有一子儒服自內而出見象之頗喜問象之曰彼三人者何人哉象之曰張珽秀才也李特黃真即我同鄉之書生也其儒服子乃并揖入升堂設酒饌其所設甚陳故儒服子謂象之曰黃家弟兄將大也象之曰若皇上修德好生守帝王之道下念黎庶雖諸黃齒長又將若何黃真遽起曰今日良會正可盡歡諸君何至亟預人家事波及我孫耶珽性素剛決因大疑其俱非人也乃問之曰我偶與二三子會于一樹下又攜我至此適見高論我實疑之黃家弟兄竟是誰也且君輩人也非人也我平生性不畏懼但實言之象之笑曰黃氏將亂東夏弟兄三人也我三人皆精也儒服子即鬼也珽乃問曰是何物之精也是何鬼也象之曰我玉精也黃真即金精也李特即枯樹精也儒服子即是二十年前死者鄭適秀才也我昔自此自化精又去年復遇鄭適今詣之君是生人當怯我輩既君不怯故聊得從容耳珽又問曰鄭秀才既與我同科奚不語耶鄭適曰某適思得詩一首以贈詩曰昔為吟風嘯月人今是吟風嘯月身冢壞路邊吟嘯罷安知今日又勞神珽覽詩愴然歎曰人之死也反不及物物猶化精人不復化象之輩三人皆聞此歎怒而出適亦不留珽乃拂衣及至門外回顧已見一壞冢因逐三精以所佩劍擊之金玉精皆中劍而踣唯枯樹精走疾追擊不及遂回反見一故玉帶及一金杯在路傍王廷拾得之長安貨之了無別異焉矣龔播龔播者峽中云安監鹽賈也其初甚窮以販鬻蔬果自業結草廬于江邊居之忽遇風雨之夕天地陰黑見江南有炬火復聞人呼船求濟急時已夜深人皆息矣播即獨棹小艇涉風而濟之至則執炬者仆地視之即金人也長四尺余播即載之以歸于是遂富經營販鬻動獲厚利不十余年間積財巨萬竟為三蜀大賈宜春郡民宜春郡民章乙其家以孝義聞數世不分異諸從同爨所居別墅有亭屋水竹諸子弟皆好善積書往來方士高僧儒生賓客至者皆延納之忽一日晚際有一婦人年少端麗被服靚妝與一小青衣詣門求寄宿章氏諸婦欣然近接設酒饌至夜深而罷有一小子弟以文自業年少而敏俊見此婦人有色遂囑其乳嫗別灑掃一室令其宿止至深夜章生潛身入室內略不聞聲息遂升榻就之其婦人身體如冰生大驚命燭照之乃是銀人兩頭可重千百斤一家驚喜然恐其變化即以炬炭燃之乃真白金也其家至今巨富群從子弟婦女共五百餘口每日三就食聲鼓而升堂江西郡內富盛無比張彥巴巫間民多積黃金每有聚會即于席上羅列三品以夸尚之云安民有李仁表者施澤金台盤以此相高亂離之后州將皆武人競于貪虐蜀將張彥典忠州暴惡尤甚將校苦之因而作叛連及党與數千家張攫其金銀莫知紀極后于蜀中私第別構一堂以貯其金忽一旦屋外有火煙頻起駭入驗之乃無延爇之處由是疑焉及開篋視之悉已空矣即向時火煙乃金化矣康氏僞吳楊行密初定揚州遠坊居人稀少煙火不接有康氏者以傭賃為業僦一室于太平坊空宅中康晨出未返其妻生一子方席蒿忽有一異人赤面朱衣冠据門而坐妻驚怖叱之乃走如舍西踣然有聲康適歸欲至家路左忽有錢五千羊半邊尊酒在焉伺之久無行人因持之歸妻亦告其所見即往舍西尋之乃一金人仆于草間亦曳之歸因烹羊飲酒得以周給自是出必獲利日以富贍而金人留為家寶所生子名曰平平長遂為富人有李潯者為江都令行縣至新寧鄉見大宅即平家也其父老為李言如此豫章人天復中豫章有人治舍掘地得一木匱發之得金人十二頭各長數寸皆古衣冠首戴十二辰屬數款精麗殆非人功其家寶祠之因以致福時兵革未定遂為戍將劫取之后不知所終陳浚江南陳浚尚書自言其諸父在鄉里好為詩里人謂之陳白舍人比之樂天也性疏簡喜賓客嘗有二道士一黃衣一白衣詣其家求宿舍之廳事夜間聞二客床壞訇然有聲久之若無人者秉燭視之見白衣臥于壁下乃銀人也黃衣不復見矣自是致富建安村人建安有人村居者常使一小奴出入城市經舍南大冢冢傍恆有一黃衣兒與之較力為戲其主遲之奴以實告覘之信然一日挾撾而住伏于草間小奴至黃衣兒復出即起擊之應手而踣乃金兒也因持以歸家自是富蔡彥卿廬州軍吏蔡彥卿為拓皋鎮將暑夜坐鎮門外納涼忽見道南桑林中有白衣婦人獨舞就視即滅明夜彥卿挾杖先往伏于草間久之婦人復出方舞即擊之墮地乃白金一瓶復掘地獲銀千兩遂為富人云呂生大歷中有呂生者自會稽上虞尉調集于京師既而僑居永崇里嘗一夕與其友數輩會食于其室食畢將就寢俄有一嫗容服潔白長二尺許出于室之北隅緩步而來其狀極異衆視之相目以笑其嫗漸迫其榻且語曰君有會不能一命耶何待吾之薄歟呂生叱之遂退去至北隅乃亡所見且驚且異莫知其來也明日生獨寤于室又見其嫗在北隅下將前且退惶然若有所懼生又叱之遂沒明日生默念曰是必怪也今夕將至若不除之必為吾患不朝夕矣即命一劍置其榻下是夕果是北隅徐步而來顏色不懼至榻前生以劍揮之其嫗忽上榻以臂揕生胸余又躍于左右舉袂而舞久之又有一嫗忽上榻復以臂揕生生遽覺一身盡凜然若霜被于體生又以劍亂揮俄有數嫗亦隨而舞焉生揮劍不已又為十余嫗各長寸許雖愈多而貌如一焉皆不可辨環走四垣生懼甚計不能出中者一嫗謂書生曰吾將合為一矣君且觀之言已遂相望而來俱至榻前翕然而合又為一嫗與始見者不異生懼益甚乃謂曰爾何怪而敢如是撓生人耶當疾去不然吾求方士將以神術制汝汝又安能為耶嫗笑曰君言過矣若有術士吾願見之吾之來戲君耳非敢害也幸君無懼吾亦還其所矣言畢遂退于北隅而沒明日生以事語于人有田氏子者善以符術除去怪魅名聞長安中見說喜躍曰是我事也去之若爪一蟻耳今夕願往君舍且伺焉至夜生與田氏子俱坐于室未幾而嫗果來至榻前田氏子叱曰魅疾去嫗揚然其色不顧左右徐步而來去者久之謂田生曰非吾之所知也其嫗忽揮其手手墮于地又為一嫗甚小躍而升榻突入田生口中田生驚曰吾死乎嫗謂生曰吾比言不為君害君不聽今田生之疾果何如哉然亦將成君之富耳言畢又去明日有謂呂生者宜于北隅發之可見矣生喜而歸命家僮于其所沒窮焉果不至丈得一瓶可受斛許貯水銀甚多生方怪其嫗乃水銀精也田生竟以寒栗而卒沈攸之宋順帝升明中荊州刺史沈攸之廄中群馬輒躑踏驚嘶如似見物攸之令人伺之見一白駒又緑繩系腹直從外來圉者具言攸之使人夜伏櫪邊候之俄而見白駒來忽然復去視廄門猶閉計其蹤跡直入閣內時人見者咸謂為怪檢內人唯愛妾馮月華臂上一玉馬以緑絲繩穿之至夜輒脫置枕邊至夜有時失去曉時則還試取看之見蹄下有泥后攸之敗不知所在玉龍梁大同八年戍主楊光欣獲玉龍一枚長一尺二寸高五寸雕鏤精妙不似人作腹中容斗余頸亦空曲置水中令水滿倒之水從口出出聲如琴瑟水盡乃止江嚴江嚴于富春縣清泉山遙見一美女紫衣而歌嚴就之數十步女遂隱唯見所据石如此數四乃得一紫玉廣一尺又邴浪于九田山見鳥狀如雞色赤鳴如吹笙射之中即入穴浪遂鑿石得一赤玉如鳥形狀也唐玄宗唐天后嘗召諸皇孫坐于殿上觀其嬉戲因出西國所貢玉環釧杯盤列于前后縱令爭取以觀其志莫不奔競厚有所獲獨玄宗端坐略不為動后大奇之撫其背曰此兒當為太平天子因命取玉龍子以賜玉龍子太宗于晉陽宮得之文德皇后常置之衣箱中及大帝載誕之三日后以珠絡衣褓并玉龍子賜焉其后常藏之內府雖其廣不數寸而溫潤精巧非人間所有及玄宗即位每京師僣雨必虔誠祈禱將有霖注逼而視之若奮鱗鬣開元中三輔大旱玄宗復祈禱而涉旬無雨帝密投南內之龍池俄而云物暴起風雨隨作及幸西蜀車駕次渭水將渡駐蹕于水濱左右侍御或有臨流濯弄者於沙中得之上聞驚喜視之泫然流泣曰此吾昔時所寶玉龍子也自后每夜中光彩輝燭一室上既還京為小黃門攘竊以遺李輔國李輔國常置于櫃中輔國將敗夜聞櫃中有聲開視之已亡其所五色玉天寶初安思順進五色玉帶又于左藏庫中得五色玉上怪近日西貢無五色玉令責安西諸蕃蕃言此常進皆為小勃律所劫不達上怒欲征之群臣多諫獨李林甫贊成上意且言武臣王天運謀勇可將乃命王天運將四萬人兼統諸蕃兵伐之及逼勃律城下勃律君長恐懼請罪悉出寶玉願歲貢獻天運不許即屠城虜二千人及其珠璣而還勃律中有術者言將軍無義不祥天將大風矣行數百里忽驚風四起雪花如翼風激小海水成冰柱起而復摧經半日小海漲涌四萬人一時凍死唯蕃漢各一得還具奏玄宗大驚異即命中使隨二人驗之至小海側冰猶崢嶸如山隔水見兵士尸立者坐者瑩徹可數中使將返冰忽消釋衆尸亦不復見玉辟邪肅宗賜李輔國香玉辟邪二各高一尺五寸工巧殆非人工其玉之香可聞數百步雖鎖之于金函石櫃中不能掩其氣或以衣裾誤拂芬馥經年縱瀚濯數四亦不消歇輔國常置之坐側一日方巾櫛而辟邪一則大笑一則悲號輔國驚愕失据而囅然者不已悲號者更涕泣交下輔國惡其怪遂碎之為粉沒于廁中自后常聞冤痛之聲其輔國所居安邑里芬馥彌月猶在蓋舂之為粉愈香故也不周歲而輔國死焉始碎辟邪輔國嬖奴慕容宮知異常物隱屑二合魚朝恩不惡輔國之禍以錢三十萬買之而朝恩將伏誅其香化為白蝶沖天而去當時議者以奇香異寶非人臣之所蓄也輔國家藏珍玩皆非世人所識夏即于堂中設迎涼草其色類碧而干似苦竹葉細于杉雖若乾枯未嘗凋落盛暑朿之窗戶間涼自至鳳首木高一尺而凋刻如鸞鳳之形其木頗似枯槁故毛羽禿落不甚盡雖嚴凝之時置于高堂大廈中而和煦之氣如二三月故別名曰常春木縱以烈火焚之終不焦黑涼草鳳木或出于薛王宅十洲記云火林國出也軟玉鞭德宗嘗幸興慶宮于復壁間得寶匣中獲玉鞭其末有文曰軟玉鞭即天寶中異國所獻也瑞妍節文光明可鑒雖藍田之美不能過也屈之則首尾相就舒之則徑直如繩雖以斧鑕鍛斫終不傷缺德宗歎為神物遂命聯蟬繡為囊碧蠶絲為鞘碧蠶絲即永泰元年東海彌羅國所貢也云其國有桑枝干盤屈覆地而生大者亦連延十數里小者亦蔭百畝其上有蠶可長四寸其色金其絲碧亦謂之金蠶絲縱之一尺引之一丈反撚為鞘表里通瑩如貫瑟雖并十夫之力挽之不斷為琴弦鬼神愁為弩弦則箭出一千步為弓弦則箭出五百步上令藏于內府至朱泚犯禁闕其鞭不知所在玉豬子執金吾陸大鈞從子某其妻常夜寢中聞有物啁啾斗聲既覺於枕下攬之得二物遽以火照皆白玉豬子也大數寸狀甚精妙置之枕中而寶之自此財貨日增家轉蕃衍有求必遂名位遷騰如此二十年一夕忽失所在而陸氏亦不昌矣
