body:
  text: 鬼神下李進士有進士姓李忘記名嘗夢見數人來追去至一城入門有廳室宇宏壯初不見人李徑升堂側坐牀角忽有一人持杖擊己罵云何物新鬼敢坐王牀李徑走出頃之門內傳聲王出因見紫衣人升坐所由引領人王問其何故盜妹夫錢初不之悟王曰汝與他賣馬合得二十七千汝須更取三十千此非盜耶須臾見緋衣人至為李陳謝此人尚有命未合即留住但令送錢還耳王限十五日計會不了當更追對李既覺為夢是誕事理不足信後十餘日有磨鏡人至其家自行善占家人使占有驗競以白李李親至其所問云何物小人誑惑諸下磨鏡者怒云賣馬竊資王令計會今限欲滿不還一錢王即追君君何敢罵國士也李驚怪是夢中事因拜謝之問何由知此磨鏡云昨朱衣相救者是君曾祖恐君更被追所以令我相報李言妹夫已死錢無還所磨鏡云但施貧丐及散諸寺云為亡妹夫施則可矣如言散錢亦不追也侯生上谷侯生者家于荊門以明經入仕調補宋州虞城縣初娶南陽韓氏女五年矣韓氏嘗夕夢黃衣者數輩召出其門偕東行十餘里至一官署其宇下列吏卒數十輩軒宇華壯人物極衆又引至一院有一青衣危冠方屨壯甚峻峙左右者數百几案茵席羅列前後韓氏再拜俄有一婦人年二十許身長豐麗衣碧襦絳袖以金玉叉為首飾自門而來稱盧氏謂韓氏曰妾與子仇敵且久子知之乎韓氏曰妾一女子未嘗出深閨安得有仇敵耶盧氏色甚怒曰我前身嘗為職官子誣告我罪而代之使吾擯斥草野而死豈非仇敵乎今我訴於上帝且欲雪前身冤帝從吾請汝之死不朝夕矣韓氏益懼欲以詞拒而盧氏喋喋不已青衣者謂盧氏曰汝之冤誠如是也然韓氏固未當死不可為也遂令吏出案牘吏曰韓氏餘壽一年青衣曰可疾遣歸無久留也命送至門行未數里忽悸而寤惡之不敢言自是神色摧沮若有疾者侯生訊之具以夢告後數月韓氏又夢盧氏者至其家謂韓氏曰子將死矣韓氏驚寤由是疾益加歲餘遂卒侯生竊歎異未嘗告于人後數年旅遊襄漢途次富水郡僚蘭陵蕭某慕生之善以女妻之及蕭氏歸常衣絳袖碧襦以金玉叉為首飾而又身長豐麗與韓氏先夢同生固以韓氏之夢告焉蕭氏聞之甚不樂曰妾外族盧氏妾自孩提時為伯舅見念命為己女故以盧為小字則君亡室之夢信矣袁繼謙殿中少監袁繼謙為兗州推官東鄰即牢城都校呂君之第呂以其第卑湫命卒削子城下土以培之削之既多遂及城身稍薄矣袁忽夢乘馬自子城東門樓上有人達意請推官登樓自稱子城使也與袁揖讓乃謂袁曰呂君修私第而削子城之土此極不可推官盍言之乎袁曰某雖忝賓僚不相統攝又曰推官既不言某自處置不一年呂公被軍寨中追之有過禁繫久而停職其宅今屬袁氏張沆嘗借居之邵元休晉右司員外郎邵元休嘗説河陽進奏官潘某為人忠信明達邵與之善嘗因從容話及幽冥且惑其真偽仍相要云異日吾兩人有先物故者當告以地下事使生者無惑焉後邵與潘別數歲忽夢至一處稍前進見東序下帟幕鮮華乃延客之所有數客潘亦與焉其間一人若大僚衣冠雄毅居客之右邵即前揖大僚延邵坐觀見潘亦在下坐頗有恭謹之色邵因啓大僚公舊識潘某耶大僚唯而已斯須命茶應聲已在諸客之前則不見有人送至者茶器甚偉邵將啜之潘即目邵映身搖手止邵勿啜邵達其旨乃止大僚復命酒亦應聲而至諸客之前亦不見執器者樽斝古樣而偉大僚揖客而飲邵將飲之潘復映身搖手而止之邵亦不敢飲大僚又食即有大餅餤下於諸客之前馨香酷烈將食潘又止邵有頃潘目邵令去邵即告辭潘白大僚曰某與邵故人今欲送出大僚頜而許之二人俱出公署因言及頃年相邀幽冥之事邵即問曰地下如何潘曰幽冥之事固不可誣大率如人世但冥冥漠漠愁人耳言竟邵辭而去及寤因訪潘之存歿始知潘已卒矣周藹湘湖有大校周藹者居常與同門生姻好最厚每以時人不能理命致不肖子爭財紛詬列于訟庭慨此為鑑乃相約曰吾徒他年勿遵其轍倘有不諱先須區分俾其不露醜惡胎責後人也他日同門生奉職襄邸一夕周校夢見揮涕告訴曰姨夫姨夫某前言已乖今為異物矣昨在通衢急風所中已至不救但念家事今且來歸略要處理周校忽然驚覺通夕不寐遲明抵其家説之家人亦夢不旬日凶問至矣自是傳靈語均財産戒子辭妻言善意勤殆一月而去不復再來鄭起進士鄭起謁荊州節度高從誨館於空宅其夕夢一人告訴曰孔目官嚴光楚無禮意甚不平比夕又夢起異其事召嚴而説之嚴命巫祝祈謝靡所不至莫知其由明年鄭生隨計嚴光楚愛其宅有少竹徑多方面致之才遷居不日以罪笞而停職竟不知其故朱拯偽吳玉山主簿朱拯赴選至揚州夢入官署堂上一紫衣正坐旁一緑衣紫衣起揖曰君當以十千錢見與拯拜許諾遂寤頃之補安福令既至謁城隍神廟宇神像皆如夢中其神座後屋漏梁壞拯歎曰十千豈非此耶即以私財葺之費如數韋建江南戎帥韋建自統軍除武昌節度使將行夢一朱衣人道從數十來詣韋曰聞公將鎮鄂渚僕所居在焉棟宇頽毀風雨不蔽非公不能為僕修完也韋許諾及至鎮訪之乃宋無忌廟視其像即夢中所見因新其廟祠祀數有靈驗云鄭就壽春屠者鄭就家至貧常夢一人自稱廉頗謂己曰可與屋東握地取吾寶劍當令汝富然不得改舊業就如其言果獲之踰年遂富後泄其事於是失劍櫻桃青衣天寶初有范陽盧子在都應舉頻年不第漸窘迫嘗暮乘驢遊行見一精舍中有僧開講聽徒甚衆盧子方詣講筵倦寢夢至精舍門見一青衣攜一籃櫻桃在下坐盧子訪其誰家因與青衣同餐櫻桃青衣云娘子姓盧嫁崔家今孀居在城因訪近屬即盧子再從姑也青衣曰豈有阿姑同在一都郎君不往起居盧子便隨之過天津橋入水南一坊有一宅門甚高大盧子立於門下青衣先入少頃有四人出門與盧子相見皆姑之子也一任戶部郎中一前任鄭州司馬一任河南功曹一任太常博士二人衣緋二人衣緑形貌甚美相見言敘頗極歡暢斯須引入北堂拜姑姑衣紫衣年可六十許言詞高朗威嚴甚肅盧子畏懼莫敢仰視令坐悉訪內外備諳氏族遂訪兒婚姻未盧子曰未姑曰吾有一外甥女子姓鄭早孤遺吾妹鞠養甚有容質頗有令淑當為兒平章計必允遂盧子遂即拜謝乃遣迎鄭氏妹有頃一家並到車馬甚盛遂檢曆擇日云後日大吉因與盧子定議姑云聘財函信禮席兒並莫憂吾悉與處置兒有在城何親故並抄名姓並具家第凡三十餘家並在臺省及府縣官明日下函其夕成結事事華盛殆非人間明日拜席大會都城親表拜席畢遂入一院院中屏帷牀席皆極珍異其妻年可十四五容色美麗宛若神仙盧生心不勝喜遂忘家屬俄又及秋試之時姑曰禮部侍郎與姑有親必合極力更勿憂也明春遂擢第又應宏詞姑曰吏部侍郎與兒子弟當家連官情分偏洽令渠為兒必取高第及榜出又登甲科授祕書郎姑云河南尹是姑堂外甥令渠奏畿縣尉數月敕授王屋尉遷監察轉殿中拜吏部員外郎判南曹銓畢除郎中餘如故知制誥數月即真遷禮部侍郎兩載知舉賞鑒平允朝廷稱之改河南尹旋屬車駕還京遷兵部侍郎扈從到京除京兆尹改吏部侍郎三年掌銓甚有美譽遂拜黃門侍郎平章事恩渥綢繆賞賜甚厚作相五年因直諫忤旨改左僕射罷知政事數月為東都留守河南尹兼御史大夫自婚媾後至是經二十年有七男三女婚宦俱畢內外諸孫十人後因出行却到昔年逢攜櫻桃青衣精舍門復見其中有講筵遂下馬禮謁以故相之尊處端揆居守之重前後導從頗極貴盛高自簡貴輝映左右升殿禮佛忽然昏醉良久不起耳中聞講僧唱云檀越何久不起忽然夢覺乃見著白衫服飾如故前後官吏一人亦無回遑迷惑徐徐出門乃見小豎捉驢執帽在門外立謂盧曰人驢並飢郎君何久不出盧訪其時奴曰日向午矣盧子罔然歎曰人世榮華窮達富貴貧賤亦當然也而今而後不更求官達矣遂尋仙訪道絶迹人世矣獨孤遐叔貞元中進士獨孤遐叔家于長安崇賢里新娶白氏女家貧下第將遊劍南與其妻訣曰遲可周歲歸矣遐叔至蜀羈栖不偶逾二年乃歸至鄠縣西去城尚百里歸心迫速取是夕及家趨斜徑疾行人畜既殆至金光門五六里天已暝絶無逆旅唯路隅有佛堂遐叔止焉時近清明月色如晝繫驢于庭外入空堂中有桃杏十餘株夜深施衾幬於西窗下偃臥方思明晨到家因吟舊詩曰近家心轉切不敢問來人至夜分不寐忽聞墻外有十餘人相呼聲若里胥田叟將有供待迎接須臾有夫役數人各持畚鍤箕帚于庭中糞除訖復去有頃又持牀席牙盤蠟炬之類及酒具樂器闐咽而至遐叔意謂貴族賞會深慮為其斥逐乃潛伏屏氣於佛堂梁上伺之鋪陳既畢復有公子女郎共十數輩青衣黃頭亦十數人步月徐來言笑宴宴遂于筵中間坐獻酬縱橫履舄交錯中有一女郎憂傷摧悴側身下坐風韻若似遐叔之妻窺之大驚既下屋袱稍於暗處迫而察焉乃真是妻也方見一少年舉杯矚之曰一人向隅滿坐不樂小人竊不自量願聞金玉之聲其妻冤抑悲愁若無所控訴而強置於坐也遂舉金爵收泣而歌曰今夕何夕存耶沒耶良人去兮天之涯園樹傷心兮三見花滿座傾聽諸女郎轉面揮涕一人曰良人非遠何天涯之謂乎少年相顧大笑遐叔驚憤久之計無所出乃就階陛間捫一大磚向座飛擊磚才至地悄然一無所有遐叔悵然悲惋謂其妻死矣速駕而歸前望其家步步悽咽比平明至其所居使蒼頭先入家人並無恙遐叔乃驚愕疾走入門青衣報娘子夢魘方寤遐叔至寢妻臥猶未興良久乃曰向夢與姑妹之黨相與玩月出金光門外向一野寺忽為凶暴者數十輩脅與雜坐飲酒又説夢中聚會言語與遐叔所見並同又云方飲次忽見大磚飛墜因遂驚魘殆絶才寤而君至豈幽憤之所感耶
