body:
  text: 永那跋摩永那跋摩永那跋摩者西域僧也宋元嘉中東遊渡江居於金陵祗園寺宋文帝常謂之曰弟子恆願持齊不殺生命以身徇物不獲其志法師不遠萬里來化此國將何以教之對曰道在心不在事法由己非由人且帝王與凡庶所修亦有殊矣若凡庶者身賤名微德不及遠其教不出於門庭其言不行於僕妾若不苦身刻己行善持誡將何以用其心哉帝王以四海為家萬民為子出一嘉言則士庶咸悅布一善政則人神以和刑清則不夭其命役簡則無勞其力然後辨鐘律正時令鐘律辨則風雨調號令時則寒暑節如此則持齊亦已大矣不殺亦已衆矣安在乎缺一時之膳全一禽之命然後乃為弘濟也文帝撫幾嗟歎稱善者良久乃曰俗人迷於遠理沙門滯於近教迷遠理者謂為虛說滯近教者拘戀章句如法師者真所謂開悟明達可以言天人之際矣出劇談録法度釋法度黃龍人也南齊初游于金陵高士齊郡名僧紹隱居琅琊之攝山挹度清真待以師友及亡捨所居山為棲霞寺先是有道士欲以寺地為觀住者輒死後為寺猶多恐懼自度居之群妖皆息經歲餘忽聞人馬鼓角之聲俄見一人投刺於度曰靳尚度命前之尚形甚閒雅羽衛亦衆致敬畢乃言弟子主有此山七百餘年矣神道有法物不得干前後棲託或非真實故死病繼之亦其命也法師道德所歸謹捨以奉給並願受五戒永結來緣度曰人神道殊無容相屈且檀越血食世祀此最五戒所禁尚曰若備門庭輒先去殺於是辭去明旦一人送錢一萬並香燭等疏云弟子靳尚奉供至其月十五日度為設會尚又來同衆禮拜行道受戒而去既而攝山廟巫夢神告曰吾已受戒於度法師矣今後祠祭者勿得殺戮由是廟中薦獻菜飯而已出歙州圖經通公梁末有通公道人者不知其姓氏居處無常所語狂譎然必有應驗飲酒食肉遊行民間侯景甚信之揚州未陷之日多拾無數死魚頭積於西明門外又拔青草荊棘栽市里及侯景渡江先屠東門明鈔本門作府一城盡斃置其首于西明門外為京觀焉市井破落所在荒蕪通公言說得失於景不便景惡之又憚非常人不敢加害私遣小將于子悅將武士四人往候之景謂子悅云若知殺則勿害不知則密捉之子悅立四人於門外獨入見通脫衣燎火逆謂子悅曰汝來殺我我是何人汝敢輒殺子悅作禮拜云不敢於是馳往報景景禮拜謝之卒不敢害景後因宴召僧通僧通取肉捏鹽以進於景問曰好否景曰大鹹僧通曰不鹹則爛及景死數日衆以鹽五石置腹中送尸于建康市百姓爭屠膾羹食之皆盡後竟不知所去出廣古今五行記阿專師侯景為定州刺史之日有僧不知氏族名阿專師多在州市聞人有會社齊供嫁娶喪葬之席或少年放鷹走狗追隨宴集之處未嘗不在其間鬭爭喧囂亦曲助朋黨如此多年後正月十五日夜觸他長幼坐席惡口聚罵主人欲打死之市道之徒救解將去其家兄弟明旦捕覓正見阿專師騎一破墻上坐嘻笑謂之曰汝等此間何厭賤我我捨汝去捕者奮杖欲擲前人復遮約阿專師復云定厭賤我我去以杖擊墻口唱叱叱所騎之墻一堵忽然升上可數十仞舉手謝鄉里曰好住百姓見者無不禮拜悔咎須臾映雲而滅可經一年聞在長安還如舊態於後不如所終出廣古今五行記阿禿師北齊初并州阿禿師者亦不知鄉土姓名所出爾朱未滅之前已在晉陽遊諸郡邑不居寺舍出入民間語譎必有徵驗每行市里人衆圍繞之因大呼以手指胸曰憐你百姓無所知不識并州阿禿師人遂以此名焉齊神武遷鄴之後以晉陽兵馬之地王業所基常鎮守并州時來鄴下所有軍國大事未出惟幄者禿師先于人衆間泄露末年執置城內遣人防守不聽輒出若其越逸罪及門司當日并州時三門各有一禿師蕩出遍執不能禁未幾有人從北州來云禿師四月八日於鴈門郡市捨命郭下大家以香花送之埋於城外并州人怪笑此語謂之曰禿師四月八日從汾橋過東出一腳有鞋一腳徒跣但不知入何巷坊人皆見之何云鴈門死也此人復往北州報語鄉邑衆共開冢看之唯有一隻鞋耳後還遊并州齊神武以制約不從浪語不出慮動民庶遂以妖惑戮之沙門無髮以繩鉤首伏法之日舉州民衆詣寺觀之禿師含笑更無言語刑後六七日有人從河西部落來云道逢禿師形狀如故但背負一繩籠禿師頭頭原作欲據明鈔本改與語不應急走西去出廣古今五行記稠禪師北齊稠禪師鄴人也初落髮為沙彌時輩甚衆每休暇常角力騰趠為戲而禪師以劣弱見淩紿侮毆擊者相繼禪師羞之乃入殿中閉戶抱金剛足而誓曰我以羸弱為等類輕負為辱已甚不如死也汝以力聞當祐我我捧汝足七日不與我力必死于此無還志約既畢因至心祈之初一兩夕恆爾念益固至六日將曙金剛形見手執大鉢滿中盛筋謂稠曰小子欲力乎曰欲念至乎曰至能食筋乎曰不能神曰何故稠曰出家人斷肉故耳神因操鉢舉匕以筋視之禪師未敢食乃怖以金剛杵稠懼遂食斯須入口神曰汝已多力然善持教勉旃神去且曉乃還所居諸同列問曰豎子頃何至稠不答須臾於堂中會食食畢請同列又戲毆禪師曰吾有力恐不堪於汝同列試引其臂筋骨彊徑殆非人也方驚疑禪師曰吾為汝試因入殿中橫踏壁行自西至東凡數百步又躍首至於梁數四乃引重千鈞其拳捷驍武動駭物聽先輕侮者俯伏流汗莫敢仰視禪師後證果居於林慮山入山數千里搆精廬殿堂窮極土木諸僧從其禪者常數千人齊文宣帝怒其聚衆因領驍勇數萬騎躬自往討將加白刃焉禪師是日領僧徒谷口迎候文宣問曰師何遽此來稠曰陛下將殺貧道恐山中血污伽藍故至谷口受戮文宣大驚降駕禮謁請許其悔過禪師亦無言文宣命設饌施畢請曰聞師金剛處祈得力今欲見師效少力可乎稠曰昔力者人力耳今為陛下見神力欲見之乎文宣曰請與同行寓目先是禪師造寺諸方施木數千根臥在谷口禪師呪之諸木起空中自相搏擊聲若雷霆鬭觸摧拆繽紛如雨文宣大懼從官散走文宣叩頭請止之因敕禪師度人造寺無得禁止後於并州營幢子未成遘病臨終歎曰夫生死者人之大分如來尚所未免但功德未成以此為恨耳死後願為大力長者繼成此功言終而化至後三十年隋帝過并州見此寺心中渙然記憶有似舊修行處頂禮恭敬無所不為處分并州大興營葺其寺遂成時人謂帝為大力長者云出紀聞及朝野僉載釋知苑唐幽州沙門知苑精練有學識隋大業中發心造石室一切經藏以備法戒既而於幽州西山鑿巖為石室即摩四壁而以寫經又取方石別更摩寫藏諸室內每一室滿即以石塞門鎔鐵固之時隋煬帝幸涿郡內史侍郎蕭瑀皇后弟也性篤信佛法以其事白后後施絹千匹瑀施絹五百匹朝野聞之爭共捨施故苑得成功苑常以役匠既多道俗奔湊欲與巖前造木佛堂並食堂寐而念木瓦難辦恐繁經費未能起作忽一夜暴雷震電明旦既晴乃見山下有大木松柏數千萬為水所漂積於道次道俗驚駭不知來處於是遠近歎服苑乃使匠擇取其木餘皆分與邑里邑里喜悅而助造堂宇頃之畢成如其志焉苑所造石經已滿七室以貞觀十三年卒弟子繼其功焉出冥報録法喜隋煬帝時南海郡送一僧名法喜帝令宮內安置於時內造一堂新成師忽升堂觀看因驚走下階回顧云幾壓殺我其日中夜天大雨堂崩壓殺數十人其後又於宮內環走索羊頭帝聞而惡之以為狂言命鎖著一室數日三衛于市見師還奏云法喜在市內慢行敕責所司檢驗所禁之處門鎖如舊守者亦云師在室內於是開戶入室見袈裟覆一叢白骨鎖在項骨之上以狀奏聞敕遣長史王恆驗之皆然帝由是始信非常人也敕令勿驚動至日暮師還室內或語或笑守門者奏聞敕所司脫鎖放師出外隨意所適有時一日之中凡數十處齊供師皆赴會在在見之其間亦飲酒噉肉俄而見身有疾常臥床去薦席令人於床下鋪炭火甚熱數日而命終火炙半身皆焦爛葬于香山寺至大業四年南海郡奏云法喜見還在郡敕開棺視之則無所有出拾遺記明鈔本作出大業拾遺記法琳唐武德中終南山宣律師修持戒律感天人韋將軍等十二人自天而降旁加衛護內有南天王子張璵常侍於律師時法琳道人飲酒食肉不擇交遊至有妻子律師在城內法琳過之律師不禮焉天王子謂律師曰自以為何如人律師曰吾頗聖也王子曰師未聖四果人耳法琳道人即是聖人律師曰彼破戒如此安得為聖王子曰彼菩薩地位非師所知然彼更來師其善待之律師乃改觀後法琳醉猝造律師直坐其床吐於床下臭穢雖甚律師不敢嫌之因以手攫造功德錢納之袖中徑去便將沽酒市肉錢盡復取律師見即與之後唐高祖納道士言將滅佛法法琳與諸道士競論道士慚服又犯高祖龍顏固爭佛法佛法得全琳之力也佛經護法菩薩其琳之謂乎出感通記徐敬業唐則天朝徐敬業揚州作亂則天討之軍敗而遁敬業竟養一人貌類於己而寵遇之及敬業敗擒得所養者斬其元以為敬業而敬業實隱大孤山與同伴數十人結廬不通人事乃削髮為僧其侶亦多削髮天寶初有老僧法名住括年九十餘與弟子至南嶽衡山寺訪諸僧而居之月餘忽集諸僧徒懺悔殺人罪咎僧徒異之老僧曰汝頗聞有徐敬業乎則吾身也吾兵敗入於大孤山精勤修道今命將終故來此寺令世人知吾已證第四果矣因自言死期果如期而卒遂葬於衡山出紀聞駱賓王唐考功員外郎宋之問以事纍貶黜後放還至江南遊靈隱寺夜月極明長廊行吟且為詩曰鷲嶺鬱岧嶢龍宮鎖寂寥第一聯搜奇覃思終不如意有老僧點長命燈坐大禪床問曰少年夜久不寐而吟諷甚苦何耶之問答曰弟子業詩適遇欲題此寺而興思不屬僧曰試吟上聯即吟與之再三吟諷因曰何不云樓觀滄海日門對浙江潮之問愕然訝其遒麗又續終篇曰桂子月中落天香雲外飄捫蘿登塔遠刳木取泉遙霜薄花更發冰輕葉未凋待入天台路看余度石橋僧所贈句乃為一篇之警策遲明更訪之則不復見矣寺僧有知者曰此駱賓王也之向詰之答曰當徐敬業之敗與賓王俱逃捕之不獲將帥慮失大魁得不測罪時死者數萬人因求類二人者函首以獻後雖知不死不敢捕送故敬業得為衡山僧年九十餘乃卒賓王亦落髮遍遊名山至靈隱以周歲卒當時雖敗且以興復唐朝為名故人多獲脫之出本事詩
