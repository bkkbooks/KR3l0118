body:
  text: 李曜李曜唐尚書李曜罷歙州與吳圓交代有佐酒録事名媚川聰明敏慧李頗留意而已納營籍妓韶光託於替人令存恤之臨發洪飲不勝離情有詩曰經年理郡少歡娛為習干戈間飲徒今日臨行盡交割分明收取媚川珠吳答曰曳履優容日日歡須言達德倍汍瀾韶光今已輸先手領得蠙珠掌內看出抒情詩王鐸唐中書令王鐸位望崇顯率由文雅然非定亂才出鎮渚渚原作清據許本改宮為都統以禦黃巢攜姬妾赴鎮而妻妬忌忽報夫人離京在道鐸謂從事曰黃巢漸似南來夫人又自北至旦夕情味何以安處幕僚戲曰不如降黃巢王亦大笑洎荊州失守復把潼關黃巢傳語云令公儒生非是我敵請自退避無污鋒刃於是棄關隨僖皇播遷于蜀再授都統收復京都大勳不成竟罹非命出北夢瑣言薛昭緯唐薛昭緯未登第前就肆買鞋肆主曰秀才腳第幾對曰昭緯作腳來未曾與立行第出北夢瑣言孔緯唐宰相孔緯嘗拜官教坊伶人繼至求利市有石野豬獨行先到有所賜乃謂曰宅中甚闕不得厚致若見諸野豬幸勿言也復有一伶至乃召俯階索其笛指笛竅問曰何者是浣溪沙孔子伶大笑之出北夢瑣言宇文翰唐道士程子宵登華山上方偶有顛仆郎中宇文翰致書戲之曰不知上得不得且怪懸之又懸出北夢瑣言千字文語乞社敬白社官三老等切聞政本於農當須務茲稼穡若不雲騰致雨何以稅熟貢新聖上臣伏戎羌愛育黎首用能閏餘成歲律呂調陽某人等並景行維賢德建名立遂乃肆筵設席祭祀蒸嘗鼓瑟吹笙絃歌酒宴上和下睦悅豫且康禮別尊卑樂殊貴賤酒則川流不息肉則似蘭斯馨非直菜重芥薑兼亦果珍李奈莫不矯首頓足俱共接杯舉觴豈徒戚謝歡招信乃福緣善慶但某乙某索居間處孤陋寡聞雖復屬耳垣墻未曾攝職從政不能堅持雅操專欲逐物意移憶內則執熱願涼思酒如骸垢想浴老人則飽飫烹宰某乙則飢厭糟粳欽風則空谷傳聲仰惠則虛堂習聽脫蒙仁慈隱惻庶有濟弱扶傾希垂顧答審詳望咸渠荷滴歷某乙即稽顙再拜終冀勒碑刻銘但知悚懼恐惶實若臨深履薄出啓顏録山東佐史唐山東一老佐史前後縣令無不遭侮家致巨富令初至者皆以文案試之即知強弱有令初至因差丁造名簿將身點過有姓向名明府者姓宋名郎君者姓成名老鼠者姓張名破袋者此佐史故超越次第使其名一處以觀明府強弱先喚張破袋成老鼠宋郎君向明府其縣令但點頭而已意無所問佐史出而喜曰帽底可知竟還即賣之出啓顏録羅隱唐羅隱與周繇分深謂隱曰閣下有女障子詩極好乃為絶唱隱不喻何為也曰若教解語應傾國任是無情也動人是隱題花詩隱撫掌大笑出抒情詩盧延讓唐盧延讓業詩二十五舉方登第卷中有狐衝官道過狗觸店門開之句租庸調張濬親見此事每稱賞之又有餓貓臨鼠穴饞犬舐魚砧句為中書令成汭所賞又有栗爆燒氈破貓跳觸鼎翻為蜀王建所賞盧謂人曰平生投謁公卿不意得力於貓鼠狗子也人聞而笑之出北夢瑣言俳優人唐咸通中俳優人李可及滑稽諧戲獨出輩流雖不能託誼諭然巧智敏捷亦不可多得嘗因延慶節緇黃講論畢次及倡優為戲可及褒衣博帶攝齊以升座自稱三教論衡偶坐者問曰既言博通三教釋迦如來是何人對曰婦人問者驚曰何也曰金剛經云敷座而座或非婦人何煩夫坐然後兒坐也上為之啓齒又問曰太上老君何人曰亦婦人也問者益所不諭乃曰道德經云吾有大患為吾有身及吾無身吾有何患儻非為婦人何患於有娠乎上大悅又問曰文宣王何人也曰婦人也問者曰何以知之曰論語云沽之哉沽之哉我待價者也向非婦人待嫁奚為上意極歡寵錫頗厚出唐闕史又天復元年鳳翔李茂貞請入朝奏事昭宗御安福樓茂貞涕泣陳匡救之言時崔相胤密奏曰此姦人也未足為信陛下宜寬懷待之翌日宴於壽春殿茂貞肩輿披褐明鈔本肩作乘褐作甲入金鑾門易服赴宴咸以為前代跋扈未之有也時中官韓全誨深結茂貞崔相懼之自此亦結朱全忠竟致汴州迎駕劫遷入洛之始以明鈔本始以作禍矣王子帶召戎崔胤比之先是茂貞入關放火燒京闕居人殆盡是宴也教坊優人安轡新號茂貞為火龍子茂貞慚惕俯首仍竊怒曰他日會殺此豎子安聞之因請告往岐下謁茂貞茂貞見之大詬曰此賦胡顏敢來邪當求乞耳安曰只思上謁非敢有干也茂貞曰貧儉若斯胡不求乞安曰京城近日但賣麩炭便足一生何在求乞茂貞大笑而厚賜之出北夢瑣言又光化中朱朴自毛詩博士拜相而朴恃其口辨謂可安致太平由藩王引導聞於昭宗遂有此命對之日而陳言數條每言臣必為陛下致之洎操大柄殊無所成自是恩澤日衰中外騰沸內宴日俳優穆刀綾作念經行者至前朗諷曰若見朱相即是非相翌日出宮時人語曰故為相自古有之君子不恥其言之不出恥恭之不逮況未明鈔本未作今喪亂天下阻兵雖負荷奇才不能為計而朱朴一儒生恃區區之辨欲其整亂祗取辱焉宜其涓縷未申而黜放已至故大為識者之所嗤也出北夢瑣言又太祖入覲昭宣昭宗開宴坐定伶倫百戲在焉俳恆聖先祝帝德然後説元勳梁王之功業曰我元勳梁王五百年間生之賢九優太史胡趲應曰酌然如此固教朝廷如向侍宴臣僚無不失色梁太祖但笑而已昭宗不懌如無奈何趲又自好博奕嘗獨跨一驢日到故人家棋多早去晚歸年歲之間不曾暫輟每到其家主人必戒家童曰與都知於後院餵飼驢子趲甚感之夜則跨歸一日非時宣召趲倉忙索驢及牽前至則覺喘氣通體汗流乃正與主人拽磑耳趲方知自來與其家拽磨明早復展步而至主人亦曰與都知擡舉驢子曰驢子今日偶來不得主人曰何也趲曰只從昨回宅便患頭旋惡心起止未得且乞假將息主人亦大笑以趲之黠也如是而不知其所乘經年與人旋磑亨利亦數為同人對銜揶揄之出玉堂間話王舍城偽蜀王先主未開國前西域僧至蜀蜀人瞻敬如見釋迦舍於大慈三學院蜀主復謁坐於廳傾都士女就院不令止偽蜀王先主至就院不令止四十五安原闕據黃本補之婦女列次禮拜俳優王舍城飄言曰女弟子勤苦禮拜願後身面孔一切似和尚蜀主大笑出北夢瑣言顧敻偽蜀王先主起自利閬號親騎軍皆拳勇之士四百人分執紫旗凡戰陳若前軍將敗麾紫旗以副之莫不靡霆駭星散未嘗挫衄此團將卒多達或至節將至散員亦享官祿以之定霸皆資福人于時南黑雲都皆紫旗之類也此從各有名號時顧亦嘗典郡多雜談謔曾造武舉助曰大順侍郎李吒吒下進士及第三憨子薑癩子張打胸長小許李嗑蛆李破肋李吉了樊忽雷日遊神王號駝郝牛屎貢陳波斯羅蠻子試亡命山澤賦到處不生草詩斯亦麥鐵杖韓擒虎之流也出北夢瑣言不調子有不調子恆以滑稽為事輩流間有慧黠過人性識機警者皆被誘而玩之嘗與一秀士同舟泛江湖中將欲登路同船客有驢瘦劣尾仍偏不調子堅勸秀士市之秀士鄙其瘦劣勉之曰此驢有異相不同常等不得已高價市之既捨楫登途果尪弱不堪乘跨而苦尤之不調曰勿悔此不同他等其夕忽值雪不調曰得之矣請貰酒三五杯然後奉為話其故事秀士又僶俯貰而飲之及舉爵言之曰君不聞杜荀鶴詩云就船買得魚偏美明鈔本魚作驢美作尾踏雪沽來酒倍香乎請君買驢沽酒者蓋為杜詩有之非無證據秀士被買而玩之殊不知覺至是方悟焉出玉堂間話司馬都前進士司馬都居于青丘嘗以錢二萬託戎帥王師範下軍將市絲經年絲與金並為所沒都因月旦趨府謁王公偶見此人問之其人貌狀魁偉鬍腮凶頑發怒欲自投于井都徐曰何至如此足下吒一抱之髭鬚色斯舉矣望千尋之玉甃井有人焉王公知之斃軍將于枯木出玉堂間話吳堯卿唐吳堯卿家于廣陵初傭之保於逆旅善書計因之出入府庭遂聞於搢紳間始為鹽鐵小吏性敏辨於事之利病皆心記能調悅人耳目故丞相李蔚以其能自首任之高駢因署堯卿知泗州院兼利國監尋奏為刺史制命未行會軍變復歸廣陵頃之知浙西院數月而罷又知揚州院兼榷糶使偽朝授堯卿御史大夫堯卿託附權勢不問貴賤苟有歧路縱廝養輩必斂袵枉以金玉餌之微以失勢雖素約為之死交則相對終日不復與言趨利背義如此權貴無不以賄賂交結之故不離淮泗僣竊朱紫塵污官省三數年間盜用鹽鐵錢六十萬緡時王棨知兩使句務下堯卿獄將窮其事為諸葛殷所保持獲全及城陷軍人識是堯卿者咸請啖之畢師鐸不許夜令堯卿以他服而遁至楚州遇變為仇人所殺棄尸衢中其妻以紙絮葦棺斂之未及就壙好事者題其上云信物一角附至阿鼻地獄請去斜封送上閻羅王時人以為笑端出妖亂志李任為賦天成年盧文進鎮鄧因出城賓從偕至舍人韋吉亦被召年老無力控馭既醉馬逸東西馳桑林之中被橫枝骨挂巾冠露禿而奔突僕夫執從則已墜矣舊患肺風鼻上癮疹而黑臥于道周幕客無不笑者從事令左司郎中李任祠部員外任瑤各占一韻而賦之賦項云當其廳子潛窺衙官共看誼呼於麥壠之裏偃仆於桑林之畔藍攙鼻孔真同生鐵之椎靦甸骷髏宛是熟銅之罐餘不記之聞之者無不解頤出玉堂間話
