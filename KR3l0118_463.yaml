body:
  text: 飛涎鳥飛涎鳥南海去會稽三千里有狗國國中有飛涎鳥似鼠兩翼如鳥而腳赤每至曉諸栖禽未散之前各各占一樹口中有涎如膠繞樹飛涎如雨沾灑衆枝葉有他禽之至而如网也然乃食之如竟午不獲即空中逐而涎惹之無不中焉人若捕得脯治渴其涎每布后半日即干自落落即布之精衛有鳥如烏文首白喙赤足名曰精衛昔赤帝之女名女婧往游于東海溺死而不返其神化為精衛故精衛常取西山之木石以填東海仁鳥晉文公焚林以求介推有白鴉繞煙而噪或集介子之側火不能焚晉人嘉之起一高台名曰思煙台種仁壽之木木似柏而枝長軟其花堪食故呂氏春秋云木之美者有壽木之華即此是或云此鴉有識于焚介之山數百里不復織网羅呼之曰仁鳥俗亦謂仁鳥白臆為慈烏則此類也鸐幽州之墟羽山之北有善鳴禽人面鳥喙八翼一足毛色如雉行不踐地名曰鸐其聲似鐘磬笙竽也世語曰青鸐鳴時太平乃盛明之世翔鳴藪澤音中律呂飛而不行禹平水土栖于川嶽所集之地必有聖人出焉自上古鑄諸鼎器皆圖象其形銘贊至今不絶韓朋韓朋鳥者乃鳧鷖之類此鳥為雙飛泛溪浦水禽中鸂鷖鴛鴦𧉈鶄嶺北皆有之唯韓朋鳥未之見也案干寶搜神記云大夫韓朋其妻美宋康王奪之朋怨王囚之朋遂自殺妻乃陰腐其衣王與之登台自投台下左右提衣衣不勝手遺書于帶曰願以尸還韓氏而合葬王怒令埋之以相望經宿忽見有梓木生二冢之上根交于下枝連其上又有鳥如鴛鴦恆栖其樹朝暮悲鳴南人謂此禽即韓朋夫婦之精魂故以韓氏名之帶箭帶箭鳥鳴如野鵲翅羽黃緑間錯尾生兩枝長二尺余直而不梟唯尾稍有毛宛如箭羽因目之為帶箭鳥細鳥漢元封五年勒畢國貢細鳥以方尺玉籠盛數百頭大如蠅其狀如鸚鵡聞聲數里如黃鵠之音國人常以此鳥候時亦名曰候蟲上得之放于宮內旬日之間不知所止惜甚求不復得明年此鳥復來集于帷幄之上或入衣袖因更名曰蟬鳥宮人婕妤等皆悅之但有此鳥集于衣上者輒蒙愛幸武帝末稍稍自死人尤愛其皮服其皮者多為男子媚也王母使者齊郡函山有鳥足青嘴赤素翼絳顙名王母使者昔漢武帝登此山得玉函長五寸帝下山玉函忽化為白鳥飛去世傳山上有王母藥函常令鳥守之鴛鴦漢時鄢縣南門兩扇忽一聲稱鴛一聲稱鴦晨夕開閉聲聞京師漢末惡之令毀其門兩扇化為鴛鴦相隨飛去后遂改鄢為晏城縣五色鳥楊震卒未葬有大鳥五色高丈余從天飛下到震棺前舉頭悲鳴淚出沾地至葬日沖天上升新喻男子豫章新喻縣男子見田中有六七女皆衣毛衣不知是鳥匍匐往得其一女所解毛衣取藏之即往就諸鳥諸鳥各飛去一鳥獨不得去男子取以為婦生三女其母后使女問父知衣在積稻下得之衣而飛去后復以衣迎三兒亦得飛去張氏京兆有張氏獨處一室有鳩自外入止于床張氏祝曰鳩為禍也飛上承塵為福也即入我懷以手探之而得一金鉤是后子孫漸盛資財萬倍蜀賈客至長安聞之乃厚賂婢婢竊鉤以與客張氏既失鉤漸漸衰耗而蜀客亦罹窮厄于是繼鉤以反張氏張氏復昌漱金鳥魏時昆明國貢漱金鳥國人云其地去然州九千里出此鳥形如雀色黃毛羽柔密常翾翔海上羅者得之以為至祥聞大魏之德被于荒遠乃越山航海來獻大國帝得此鳥蓄于靈禽之圃飴以真珠飲以龜腦鳥常吐金屑如粟鑄之可以為器昔漢武時有獻大雀此之類也此鳥畏霜雪乃起小室以處之名曰辟寒台皆用水晶為戶牖使內外通光而常隔于風雨塵霧宮人爭以所吐之金飾叉珮謂之辟寒金故宮人相嘲言曰不服辟寒金那得君王心不服辟寒鈿那得君王憐于是媚惑爭以寶為身飾及行臥皆懷挾以要寵也魏代喪滅珍寶池台鞠為茂草漱金之鳥亦自高翔鶖晉永嘉二年有鶖集于始安縣木矢貫之鐵鏃其長六寸有半以箭計之其射者當身長丈五六尺營道令晉太元中營道令何偕之去職于縣界山中得一鳥大如白鷺青色赤目膝上髀下自然有銅環形大小刻畫轉輾如攬子絶妙人功于是京邑皆傳觀之營道經今屬道州紙鳶化鳥梁武太清三年侯景圍台城遠不通問簡文作紙鳶飛空告急于外侯景謀臣王偉謂景曰此紙鳶所至即以事達外令左右善射者射之及墮皆化為鳥飛入云中不知所往鶉安定原土筑時奠祭以觚爵忽有一鶉飛于觚上因名鶉觚城后魏文帝大統中立為鶉觚縣戴文謀有戴文謀者隱居陽城山中曾于客堂食際忽聞有呼曰我天帝使者欲下憑君可乎文謀聞甚驚又曰君疑我也文謀乃跪曰居貧恐不足降下耳既而灑掃設位朝夕進食甚謹后謀于室內竊言之其婦曰此恐是狐魅依憑耳文謀曰我亦疑之乃祠饗之時神乃言曰吾相從方欲相利不意有疑心異議文謀辭謝之際忽堂上如數十人呼聲出視之見一大鳥五色白鳩數十隨之東北入云而去瑞鳥煬帝征遼回次于柳城郡之望海鎮步出觀望有大鳥二素羽丹嘴狀同鶴鷺出自霄漢翻翔雙下高一丈四五尺長八九尺徘徊馴擾翔舞御營敕著作佐郎虞綽制瑞鳥銘以進上命鐫于其所仍敕殿內丞閻毗圖寫其狀祕書郎虞世南上瑞鳥頌敕令寫于圖首報春鳥顧渚山中有鳥如鴝鵒而小蒼黃色每至正二月作聲云春起也至三月四月作聲云春去也采茶人呼為報春鳥冠鳧石首魚至秋化為冠鳧冠鳧頭中有石也秦吉了容管廉白州産此鳥大約似鸚鵡嘴腳皆紅兩眼后夾腦有黃肉冠善效人言語音雄大分明于鸚鵡以熟雞子和飯如棗飼之或云容州有純赤純白色者俱未之見也韋氏子陽郡有張女郎廟上元中有韋氏子客于陽途至其廟遂解鞍以憩忽見廟宇中有二屐子在地上生視之乃結草成者文理甚細色白而制度極妙韋生乃收貯于橐中既而別去及至郡郡守舍韋生于館亭中是夕生以所得屐致于前而寐明日已亡所在莫窮其處僅食頃乃于館亭瓦屋上得焉仆者驚愕告于韋生生即命升屋而取之即得又致于前明日又失其所復于瓦屋上得之如是者三韋生竊謂仆曰此其怪乎可潛伺之是夕其仆乃竊于隙中伺之夜將半其屐忽化為白鳥飛于屋上韋生命取焚之乃飛去鳥賊李靖弟客師官至右武衛將軍四時從禽無暫止息京師之西南際澧水鳥獸皆識之每出鳥鵲競逐噪之人謂之鳥賊鳥省馮兗給事親仁坊有宅南有山亭院多養鵝鴨及雜禽之類極多常遣一家人掌之時人謂之鳥省劉景陽天后時左衛兵曹劉景陽使嶺南得吉了鳥雄雌各一隻解人語至都進之留其雌者雄煩怨不食則天問曰何乃無聊也鳥為言曰其配為使者所得今頗思之乃呼景陽曰卿何故藏一鳥不進景陽叩頭謝罪乃進之則天不罪也食蝗鳥開元中貝州蝗蟲食禾有大白鳥數千小白鳥數萬盡食其蟲盧融開元初范陽盧融病中獨臥忽見大鳥自遠飛來俄止庭樹高四五尺狀類梟目大如柸嘴長尺余下地上階頃之入房登床舉兩翅翅有手持小槍欲以擊融融伏懼流汗忽復有人從后門入謂鳥云此是善人慎勿傷也鳥遂飛去人亦隨出融疾自爾永差張氏濮州刺史李全璋妻張牛肅之姨也開元二十五年卒于伊闕莊張寢疾有鳥止于庭樹白首赤足黃腹丹翅其鳴但云懊恨也母兮如是晝夜不絶聲十余日張殂鳥遂不見王緒天寶末台州録事參軍王緒病將死有大鳥飛入緒房行至床所引嘴向緒聲云取取緒遂卒武功大鳥大歷八年大鳥見武功群噪之行營將張日芬射獲之肉翅狐首四足足有爪廣四尺狀類蝙蝠鸛一名墮羿形似鵲人射之則銜矢反射人吐綬鳥魚復縣南山有鳥大如鴝鵒羽色多黑雜以黃白頭頗似雉有時吐物長數寸丹采彪炳形色類綬因名為吐綬鳥又食必蓄嗉臆前大如斗慮觸其嗉行每遠草木故一名避株鳥杜鵑始陽相推而鳴先鳴者吐血死嘗有人出行見一群寂然聊學其聲即死初鳴先聽者主離別廁上聽其聲不祥厭之之法當為犬聲應之蚊母鳥形如鷁嘴大而長池塘捕魚而食每叫一聲則有蚊蚋飛出其口俗云采其翎為扇可辟蚊子亦呼為吐蚊鳥桐花鳥劍南彭蜀間有鳥大如指五色畢具有冠似鳳食桐花每桐結花即來桐花落即去不知何之俗謂之桐花鳥極馴善止于婦人叉上客終席不飛人愛之無所害也真臘國大鳥真臘國有葛浪山高萬丈半腹有洞先有浪鳥狀似老鴟大如駱駝人過即攫而食之騰空而去百姓苦之真臘王取大牛肉中安小劍子兩頭尖利令人載行鳥攫而吞之乃死無復種矣百舌百舌春囀夏至唯食蚯蚓正月后凍開蚓出而來十月后蚓藏而往蓋物之相感也鸛江淮謂群鸛旋飛為鸛井鸛亦好旋飛必有風雨人探巢取鸛子六十里旱能群飛薄霄激雨雨為之散又南方有鸛食蛇每遇巨石知其下有蛇即于石前如道士禹步其石阞然而轉因得而噉里人學其法者伺其養雛緣樹以蔑緪縛其巢鸛必作法而解之乃鋪沙樹底俾足跡所印而仿學之甘蟲大中末舒州奏衆鳥成巢闊七尺高一丈而燕雀鷹鸇水禽山鳥無不馴狎如一更有鳥人面緑毛嘴爪皆紺其聲曰甘蟲因謂之甘蟲時人畫圖鬻于坊市戴勝王蜀刑部侍郎李仁表寓居許州將入貢于春官時薛能尚書為鎮先繕所業詩五十篇以為贄濡翰成軸于小亭憑幾閲之未三五首有戴勝自檐飛入立于案幾之上馴狎良久伸頸嚲翼而舞向人若將語久之又轉又舞如是者三超然飛去心異之不以告人翌日投詩薛大加禮待居數日以其子妻之北海大鳥北海有大鳥其高千里頭文曰天胸文曰候左翼文曰鷖右翼文曰勒頭向東正海中央捕魚或時舉翼飛而其羽相切如雷風也鴉溫璋為京兆尹勇于殺戮京邑憚之一日聞挽鈴而不見有人如此者三乃一鴉也尹曰是必有人探其雛而來訴耳命吏隨鴉所在而捕之其鴉盤旋引吏至城外樹間果有人探其雛尚憩樹下吏執送之府尹以事異于常乃斃捕雛者仙居山異鳥王蜀永平二年得北邙山章弘道所留瑞文于什邡之仙居山遂出緡錢委漢州馬步使趙弘約締構觀宇洎創天尊殿材石宏博功用甚多是日將架巨梁工巧丁役三百餘人縛拽鼓噪震動遠近忽有異鳥三隻一紅赤色二皆潔白尾如曳練各長二尺余栖于梁上隨緪索上下在衆人中略無驚怖工人撫搦戲玩之如所馴養者梁既上畢鳥亦飛去鶯頃年有人取得黃鶯雛養于竹籠中其雌雄接翼曉夜哀鳴于籠外絶不飲喙乃取雛置于籠外則更來哺之人或在前略無所畏忽一日不放出籠其雄雌繚繞飛鳴無從而入一投火中一觸籠而死剖腹視之其腸寸斷
