body:
  text: 蔡廓蔡廓宋廢帝時以蔡廓為吏部尚書録尚書徐羡之謂中書令傅亮曰黃門已下悉委蔡吾徒不復歷懷自此已上故宜共參同異廓聞之曰我不能為徐羡之署紙尾也遂辭不拜出建康實録謝莊宋謝莊字希逸侍中微之子黃門思之孫美儀容善談論工書屬文好言玄理少為文帝所賞帝一見之輒歎曰藍田生美玉豈虛也哉莊代顏峻為吏部尚書峻容貌嚴毅常有不可犯之色莊風姿溫美人有喧訴常歡笑答之故時人語曰顏吏部瞋而與人官謝吏部笑不與人官莊遷中書令侍中諡曰憲莊家世無年五十者莊年四十二祖四十七曾祖四十三高祖三十子朏瀹並知名出談藪劉林甫唐武德初因隋舊制以十一月起選至春即停至貞觀二年劉林甫為吏部侍郎以選限促多不究悉遂奏四時聽選隨到注擬當時以為便出唐會要張説武德七年高祖謂吏部侍郎張説曰今年選人之內豈無才用者卿可簡試將來欲縻之好爵於是説以張行成張知運等數人應命時以為知人出唐會要溫彥博貞觀元年溫彥博為吏部郎中知選意在沙汰多所擯抑而退者不伏囂訟盈庭彥博惟騁辨與之相詰終日喧擾頗為識者所嗤出唐會要戴胄貞觀四年杜如晦臨終請委選舉於民部尚書戴胄遂以兼檢校吏部尚書及在銓衡頗抑文雅而獎法吏不適輪轅之用物議議字原闕據明鈔本補以是刺之出唐會要唐皎唐貞觀八年十一月唐皎除吏部侍郎常引人入銓問何方穩便或云其家在蜀乃注與吳復有云親老先住江南即唱之隴右論者莫測其意有一信都人希河朔因紿云願得江淮即注與河北一尉由是大被選人紿言欺之出唐會要楊師道貞觀十七年楊師道為吏部尚書貴公子四海人物未能委練所署多非其才深抑勢貴及親黨將以避嫌時論譏之出唐會要高季輔貞觀十七年吏部侍郎高季輔知選凡所銓綜時稱允愜至十八年於東都獨知選事上賜金鏡一面以表清鑒出唐會要薛元超永徽元年中書舍人薛元超好汲引寒俊嘗表薦任希古高智周郭正一王義方孟利真等十餘人時論稱美出唐會要楊思玄龍朔二年司列少常伯楊思玄恃外戚貴待選流多不以禮而排斥之為選者夏侯彪所訟御史中丞郎餘慶彈奏免官時中書令許敬宗曰必知楊吏部之敗或問之對曰一彪一狼共著一羊不敗何待出唐會要張仁禕唐總章二年十一月吏部侍郎李敬玄委事於員外張仁禕有識略幹能始造姓曆改修狀抹銓替等程式敬玄用仁禕之法銓總式序仁禕感國士見委竟以心勞嘔血而死出唐會要裴行儉咸亨二年有楊炯王勃盧照鄰駱賓王並以文章見稱吏部侍郎李敬玄咸為延譽引以示裴行儉行儉曰才名有之爵祿蓋寡楊應至令長餘並鮮能令終是時蘇味道王勮未知名因調選遂為行儉深禮異仍謂曰有晚生子息恨不見其成長二公十數年當居衡石願識此輩明鈔本識此輩作此為託其後果如其言行儉嘗所引偏裨將有程務挺張虔勗崔智聾王方翼黨金毗劉敬同郭待封李多祚黑齒常之盡為名將出唐會要三人優劣長壽二年裴子餘為鄠縣尉同列李隱朝程行諶皆以文法著稱子餘獨以詞學知名或問雍州長史陳崇業三人優劣孰先崇業曰譬之春蘭秋菊俱不可廢劉奇證聖元年劉奇為吏部侍郎注張文長唐會要七五長作成司馬鍠為監察御史二人因申屠瑒以謝之奇正色曰舉賢本自無私二君何為見謝出唐會要狄仁傑聖曆初狄仁傑為納言頗以藻鑒自任因舉桓彥範敬暉崔玄暐張柬之袁恕己等五人後皆有大勳復舉姚元崇等數十人悉為公相聖曆中則天令宰相各舉尚書郎一人仁傑獨薦其子光嗣由是拜地官員外蒞事有聲則天謂之曰祁奚內舉果得人也出唐會要鄭杲聖曆二年吏部侍郎鄭杲注韓思復為太常博士元稀聲京兆士曹嘗謂人曰今年掌選得韓元二子則吏部不負朝廷矣出唐會要薛季昶長安三年則天令雍州長史薛季昶擇僚吏堪為御史者季昶以問録事參軍盧齊卿齊卿舉長安縣尉盧盧原作處據唐會要七五改懷慎李體光唐會要作季休光萬年縣尉李義崔湜咸陽縣丞倪若冰盩厔縣尉田崇壁新豐縣尉崔日用後皆至大官出唐會要鄧渴弘道元年十二月吏部侍郎魏克己銓綜人畢放長榜遂出得留人名於是衢路喧譁大為冬集人授明鈔本授作援引指摘貶為太子中允遂以中書舍人鄧玄挺替焉又無藻鑒之目及患消渴選人因號鄧渴出唐會要李至遠如意元年九月天官郎中李至遠權知侍郎事時有選人姓刁又有王元忠並被放乃密與令史相知減其點畫刁改為丁王改為士擬授官後即添成文字至遠一覽便覺曰今年銓覆萬人惣識姓名安有丁士者哉此刁某王某者省內以為神明出唐會要張文成唐張文成曰乾封以前選人每年不越數千垂拱以後每歲常至五萬人不加衆選人益繁者蓋有由矣嘗試論之祗如明經進士十周三衛勳散雜色國官直司妙簡實材堪入流者十分不過一二選司考練總是假手冒名勢家囑請手不把筆即送東司眼不識文被舉南館正員不足權補試攝檢校之官賄貨縱橫贓污狼籍流外行署錢多即留或帖司助曹或員外行案更有挽郎輦腳營田當屯無尺寸功夫明鈔本夫作效並優與處分皆不事學問唯求財賄是以選人冗冗甚於羊群吏部喧喧多於蟻聚若銓實用百無一人積薪化薪所從來遠矣出朝野僉載鄭愔崔湜唐鄭愔為吏部侍郎掌選贓污狼籍引銓有選人繫百錢於靴帶上愔問其故答曰當今之選非錢不行愔默而不言時崔湜亦為吏部侍郎掌銓有選人引過分踈云某能翹關負米湜曰若壯何不兵部選答曰外邊人皆云崔侍郎下有氣力者即得出朝野僉載糊名武后以吏部選人多不實乃令試日自糊其名暗考以定等第判之糊名自此始也武后時投匭者或不陳事而有嘲謔之言於是乃置使先閲其書奏然後投之匭院有司自此始也出國史異纂
