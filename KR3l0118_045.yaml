body:
  text: 賈耽賈耽唐相國賈耽滑州節度使常令造鹿皮衣一副既成選一趫捷官健操書緘付之曰汝往某山中但荊棘深處即行覓張尊師送此書任汝遠近使者受命挈糧而去甚惶惑入山約行百餘里荊棘深險無不備歷至一峰半腰中石壁聳拔見二道流碁次使者遂拜道流曰賈相公使來開書大笑遂作報書一曰傳語相公早歸何故如此貪著富貴使者齎書而返賈公極喜厚賞之亦不知其故也又嘗令一健卒入枯井中取文書果得數軸皆道書也遂遣十餘人寫才畢有道士突入呼賈公姓名叫罵曰爭敢偷書賈公遜謝道士曰復持去鄭州僕射陂東有一浮圖乃遣使齎牒牒州於此浮圖內取一白鴉遂令掩之果得以籠送亦不知何故賈公謫仙事甚衆此三篇尤明顯者也出逸史丁約唐大曆中有韋行式為西州採訪使有姪曰子威年及弱冠聰敏溫克耽玩道書溺惑神仙修煉之術有步卒丁約者執廝役於部下周旋恪勤未嘗少怠子威頗私之一日辭氣慘栗云欲他適子威怒曰籍在軍中焉容自便丁曰去計已果不可留也然某肅勤左右二載于茲未能忘情思有以報某非碌碌求食者尚縈俗間耳有藥一粒願以贈別此非能長生限內無他恙矣因褫衣帶內得藥類粟以奉子威又謂曰郎君道情深厚不欺暗室終當棄俗尚隔兩塵子威曰何謂兩塵對曰儒謂之世釋謂之劫道謂之塵善堅此心亦復遐壽五十年近京相遇此際無相訝也言訖而出子威驚愕亟命追之已不及矣主將以逃亡上狀請落兵籍爾後子威行思坐念留意尋訪竟亡其蹤後擢明經第調數數原作素據明鈔本改邑宰及從心之歲毛髮皆鶴時元和十三年也將還京輦夕于驪山旅舍聞通衢甚喧詢其由曰劉悟執逆賊李師道下將校至闕下步出視之則兵仗嚴衛桎梏纍纍其中一人乃丁約也反接雙臂長驅而西齒髮彊壯無異昔日子威大奇之百千人中驚認之際丁已見矣微笑遙謂曰尚記臨卭別否一瞬五十年矣幸今相見請送至前驛須臾到滋水驛則散縶于廊舍開一竅以給食物子威窺之俄見脫置桎梏覆之以席躍自竇出與子威攜手上旗亭話闊別之恨且歎子威之衰耄子威謂曰仙兄既有先見之明聖朝奄宅天下何為私叛臣耶丁曰言之久矣何逃哉蜀國暌辭豈不云近京相遇慎勿多訝乎又問曰果就刑否對曰道中有尸解兵解水解火解實繁有徒稽康郭璞皆受戕害我以此委蛻耳異韓彭與糞壤并也某或思避自此而逃孰能追也他問不對唯云須筆子威搜書囊而進亦愧領之威曰明晨法場寓目豈蛻于此乎丁曰未也夕當甚雨不克行刑兩晝雨止國有小故十九日天限方及君於此時幸一訪別言訖還館復自穴入荷校以坐子威卻往溫泉日已晡矣風埃忽起夜中果大雨澍遲明泥及骭詔改日行刑兩宿方霽則王姬有薨於外館者復三日不視朝果至十九日方獻廟巡鄽始行大戮子威是日飯僕飽馬吉旦往棘圍候焉亭午間方號令回觀者不啻億兆衆矣面語不辨寸步相失俘囚才至丁已志焉遙目子威笑頷三四及揮刃之際子威獨見斷筆霜鋒倏忽之次丁因躍出而廣衆之中躡足以進又登酒肆其言如蜀脫衣換觴與威對飲云某自此遊適矣勉於奉道猶隔兩塵當奉候于崑崙石室矣言訖下旗亭冉冉西去數步而滅出廣異記瞿道士黃尊師修道於茅山法籙絶高靈應非一弟子瞿道士年少不甚精懇屢為黃師所笞草堂東有一小洞高八尺荒蔓蒙蔽似蛇虺所伏一日瞿生又怠惰為師所箠逡巡避杖遂入此洞黃公驚異遣去草搜索一無所見食頃方出持一碁子曰適觀碁碁原作秦據明鈔本改時人留餐見遺此秦人碁子也黃公方怪之尚意其狐狸所魅亦不甚信茅山世傳仙府學道者數百千皆宗黃公悉以為德業階品尋合上升每至良辰無不瞻望雲鶴明年八月望夜天氣晴肅月光如晝中宵雲霧大起其雲五色集於窗牖間仙樂滿庭復有步虛之聲弟子皆以為黃公上仙之期至矣遽備香火黃公沐浴朝服以候真侶將曉氛煙漸散見瞿生乘五色雲自東方出在庭中靈樂鸞鶴彌漫空際於雲間再拜黃公曰尊師即當來更務修造亦不久矣復與諸徒訣別乘風遂去漸遠不見隱隱猶聞衆樂之音金陵父老每傳此事出逸史王卿唐真元年中郢中有酒肆王卿者店近南郭每至節日常有一道士過之飲訖出郭而去如是數年後因道士復來卿遂結束潛行尋之數里道士顧見大驚曰何來卿乃禮拜願神人許為僕使道士固辭卿固隨之每過澗壑或高闊丈餘道士踰越輕舉而過卿輕踵之亦能渡也行數十里一巖高百餘丈道士騰身而起卿不能登遂哀求禮拜道士自上謂曰汝何苦從我自速歸不爾坐受困躓也卿曰前所渡險阻皆賴尊師命今卻歸無路必死矣願見救護道士垂手巖下令卿舉手閉目躍身翕飛已至巖上上則平曠煙景不類人間又從行十餘里至道士舍門庭整肅止卿於舍外草間謂曰汝且止此吾為汝送飯食候便令汝得見天師卿潛草間道士三日每送飯食亦皆充足後一日忽見天師出門杖策道士四五人侍從天師形狀瓌偉眉目疏朗道士私招卿令於道左禮謁天師驚曰汝何因得至此卿方謂說諸道士曰此人謹厚恐堪役使可且令守竈天師令且收之遂延卿入院至廚下見一大竈下燃火上有鐵筒閉蓋數重道士令卿守竈專看之不得妄覩令失墜餘道士四人或汲水採藥蒸曝造食以供天師夜亦令卿臥廚下守火經六七日都不見人來看視釜中物者後一日卿無何竊開窺藥忽見一白兔從鐵筒中走出騞然有聲道士曰藥已失矣競來窺看惶懼失色須臾天師大怒曰何忽引俗人來令失藥俄召前道士責辱欲鞭之道士叩頭請卻擒覔道士數人於庭施香禹步道士二人變成白鶴冲天而飛食頃鶴已擒得白兔來令投釜中固濟鍊之天師令速逐俗人遣歸道士遂領出曰卿幾誤我卿心未堅可且歸去遂引送至高巖下執手而別後二十年於汾州市中相見耳卿復尋路歸數日方至郭已經年遂為道士十餘年後遊太原竟不知當有所遇否出原化記衡山隱者不知姓名數因賣藥往來嶽寺寄宿或時四五日無所食僧徒怪之復賣藥至僧所寺衆見不食知是異人敬接甚厚會樂人將女詣寺其女有色衆欲取之父母求五百千莫不引退隱者聞女嫁邀僧往看喜欲取之仍將黃金兩挺正二百兩謂女父曰此金直七百貫今亦不論付金畢將去樂師時充官便倉卒使別隱者示其所居云去此四十餘里但至山當知也女父母事畢憶女乃往訪之正見朱門崇麗扣門隱者與女俱出迎接初至一食便不復饑留連五六日亦不思食父母將還隱者以五色箱盛黃金五挺贈送謂父母曰此間深邃不復人居此後無煩更求也其後父母重往但見山草無復人居方知神仙之窟出廣異記梅真君汝陰人崔景唐家甚富嘗有道士自言姓梅來訪崔崔客之數月景唐市得玉鞍將之壽春以獻節度使高審思謂梅曰先生但居此吾將詣壽春旬月而還使兒姪輩奉事無所憂也梅曰吾乃壽春人也將此訪一親知比將還矣君其先往也久居於此思有以奉報君家有水銀乎曰有即以十兩奉之梅乃置鼎中以水銀煉之少久即成白銀矣因此與景唐曰以此為路糧君至壽春可於城東訪吾家也即與景唐分路而去景唐至壽春即詣城東訪梅氏數日不得村人皆曰此中無梅家亦無為道士者唯淮南嶽廟中有梅真君像得非此耶如其言訪之果梅真君矣自後竟不復遇出稽神録
