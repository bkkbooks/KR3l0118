body:
  text: 花卉怪下光化寺客兗州徂徠山寺曰光化客有習儒業者堅志栖焉夏日涼天因閲壁畫于廊序忽逢白衣美女年十五六姿貌絶異客詢其來笑而應曰家在山前客心知山前無是子亦未疑妖但心以殊尤貪其觀視且挑且悅因誘致于室交歡結義情款甚密白衣曰幸不以村野見鄙誓當永奉恩顧然今晚須去復來則可以不別矣客因留連百端遍盡而終不可素寶白玉指環因以遺之曰幸視此可以速還因送行白衣曰恐家人接迎願且回去客即上寺門樓隱身目送白衣行計百步許奄然不見客乃識其滅處徑尋究寺前舒平數里纖木細草毫發無隱履歷詳熟曾無蹤跡暮將回草中見百合苗一枝白花絶偉客因斸之根本如拱瑰異不類常者及歸乃啓其重付百疊既盡白玉指環宛在其內乃驚歎悔恨恍惚成病一旬而斃僧智聾上元中蜀郡有僧智聾在寶相寺持經夜久忽有飛蟲五六大如蠅金色迭飛赴燈焰或蹲于燈花上鼓翅與火一色久乃滅于焰中如此數夕童子擊墮其一乃董陸花也亦無形狀自是不復見鄧圭晉陽西有童子寺在郊牧之外貞元中有鄧圭者寓居于寺是歲秋與朋友數輩會宿既闔扉后忽見一手自牖間入其手色黃而瘦甚衆視之俱栗然獨圭無所懼反開其牖聞有吟嘯之聲圭不之怪訊之曰汝為誰對曰吾隱居山谷有年矣今夕縱風月之游聞先生在此故來奉謁誠不當列先生之席願得坐牖下聽先生與客談足矣圭許之既坐與諸客談笑極歡久之告去將行謂圭曰明夕當再來願先生未見擯既去圭與諸客議曰此必鬼也不窮其跡且將為患矣于是緝絲為緡數百尋候其再來必縛之明夕果來又以手出于牖間圭即以緡系其臂牢不可解聞牖外問何罪而見縛其議安在得無悔邪遂引緡而去至明日圭與諸客俱窮其跡至寺北百餘步有蒲桃一株甚蕃茂而緡系其枝有葉類人手果牖間所見者遂命掘其根而焚之劉皂靈石縣南嘗夜中妖怪由是里中人無敢夜經其地者元和年董叔經為西河守時有彭城劉皂假孝義尉皂頃嘗以書忤董叔怒甚遂棄職入汾水關夜至靈石南逢一人立于路旁其狀絶異皂馬驚而墜久之乃起其路旁立者即解皂衣袍而自衣之皂以為劫不敢拒既而西走近十余里至逆旅因言其事逆旅人曰邑南夜中有妖怪固非賊爾明日有自縣南來者謂皂曰縣南野中有蓬蔓狀類人披一青袍不亦異乎皂往視之果己之袍也里中人始悟為妖者乃蓬蔓耳由是盡焚其妖遂絶田布唐田布田悅之子也元和中嘗過蔡比路側有草如蒿莖大如指其端聚葉若鷦鷯巢在葦折視之葉中有小鼠數十才若皂莢子目猶未開啾啾有聲梁生唐興平之西有梁生別墅其后園有梨樹十余株太和四年冬十一月初雪霽其梨忽有花發芳而且茂梁生甚奇之以為吉兆有韋氏謂梁生曰夫木以春而榮冬而瘁固其常矣焉可謂之吉兆乎生聞之不悅后月余梁生父卒蘇昌遠中和中有士人蘇昌遠居蘇州屬邑有小莊去官道十里吳中水鄉率多荷芰忽一日見一女郎素衣紅臉容質艷麗閲其色恍若神仙中人自是與之相狎以莊為幽會之所蘇生惑之既甚嘗以玉環贈之結系殷勤或一日見檻前白蓮花開敷殊異俯而玩之見花房中有物細視乃所贈玉環也因折之其妖遂絶上党人隋文帝時上党有人宅后每夜有人呼聲求之不見去宅一里但見一人參枝掘之入地五尺如人體狀掘去之后呼聲遂絶時晉王廣陰有奪宗之計諂事權要上君也党與也言朋党比而譖太子竟見廢隋室因此而亂田登娘陝州西北白徑嶺上邏村村之田氏嘗穿井得一根大如臂節中粗皮若茯苓香氣似術其家奉釋有像設數十遂置于像前田氏女名登娘十六七有容質其父常令供香火焉經歲余女嘗日見一少年出入佛堂中白衣躡屐女遂私之精神舉止有異于常矣其物根每歲至春萌芽其女有妊乃具白于母母疑其怪嘗有衲僧過門其家因留之供養僧將入佛宇輒為物拒之一日女隨母他出僧入佛堂門才啓有一鴿拂僧飛去其夕女不復見其怪視其根亦成朽蠹女娠才七月産物三節其形如象前根也田氏并火焚之其怪亦絶舊說枸杞茯苓人參術形有異服之獲上壽或不葷血不色欲遇之必能降真為地仙矣田氏非冀故見怪而去之宜乎趙生天寶中有趙生者其先以文學顯生兄弟數人俱以進士明經入仕獨生性魯鈍雖讀書然不能分句詳義由是年壯尚不得為郡貢常與兄弟友生會宴盈座朱緑相接獨生白衣甚為不樂及酒酣或靳之生益慚且怒后一日棄其家遁去隱晉陽山葺茅為舍生有書百餘編笈而至山中晝習夜息雖寒熱切肌食粟襲紵不憚勞苦而生蒙懵力愈勤而功愈少生愈恚怒終不易其志后旬余有翁衣褐來造之因謂生曰吾子居深山中讀古人書豈有志于祿仕乎雖然學愈久而卒不能分句詳議何蔽滯之甚邪生謝曰仆不敏自度老且無用故入深山讀書自悅雖不能達其精微然必欲死于志業不辱先人又何及于祿仕也翁曰吾子之志甚堅老夫雖無術能有補于郎君但幸一謁我耳因徵其所止翁曰吾段氏子家于山西大木之下言訖忽亡所見生怪之以為妖遂徑往山西尋其跡果有段樹蕃茂生曰豈非段氏子乎因持鍤發其下得人參長尺余甚肖所遇翁之貌生曰吾聞人參能為怪者可愈疾遂瀹而食之自是醒然明悟目所覽書盡能窮奧后歲余以明經及第歷官數任而卒郭元振郭元振嘗山居中夜有人面如盤瞬目出于燈下元振了無懼色徐染翰題其頰曰久戍人偏老長征馬不肥元振之警句也題畢吟之其物遂滅久之元振隨樵閒步見巨木上有白耳大如數斗所題句在焉宣平坊官人京宣平坊有官人夜歸入曲有賣油者張帽馱桶不避道導者搏之頭隨而落遂遽入一大宅門官人異之隨入至一大槐樹下遂滅因告其家其家即掘之深數尺并樹枯根下有大蛤蟆如疊挾二筆錔樹溜津滿其中也及有巨白菌如殿門浮漚釘其蓋已落蛤蟆乃驢也筆錔乃油桶也菌則其人矣里人有買其油者月余怪其油好而賤及怪發食者悉病嘔豫章人豫章人好食菌有黃姑菌者尤為美味有民家治舍烹此菌以食工人工人有登屋施瓦者下視無人唯釜煮物以盆覆之俄有小兒裸身繞釜而走倏忽沒于釜中頃之主人設菌工獨不食亦不言既暮食菌者皆卒
