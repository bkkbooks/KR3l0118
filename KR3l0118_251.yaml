body:
  text: 周願周願唐周願嘗奉使魏州節度使田季安引之連轡路見一驢極肥季安指示願曰此物大王世充應願曰下九字原空闕據因話録補聲答曰總是小竇竇字原空闕據因話録補建德李巽性嚴毅不好戲笑時願嚴毅下八字原空闕據因話録補知河西鹽鐵留事將至李戒從事曰周生好諧謔忝僭無禮幸諸賢稍莊以周生下十五字原空闕據因話録補待之及願至數宴李公寒溫外不與之言周溫外下七字原空闕據因話録補亦無由得發一日饌親賓願亦預焉李公有故人子弟來投公有下八字原空闕據因話録補落拓不事遍問舊別墅及家童有技者圖書有名技原作之名原作笞者圖二字原空闕據因話録改補者悉云貨卻李責曰未官家貧産業從貨何至至字原空闕據因話録補書籍古畫店彼除惆悵久之復問一曰有一本虞永興手書尚書此又在否某人慚懼不敢言貨云暫將典錢願忽言曰此尚書大迍厄都忘先拒其詼諧是遂問曰尚書何迍願曰已遭堯典舜典之苦此而即典明鈔本之苦作又被而即作兒郎李之顏大開自更不捨原闕出處今見因話録四又陸長源以舊德為宣武軍行軍軍字原闕據明鈔本補司馬韓愈為巡官同在使幕或譏年輩相懸願曰大蟲老鼠俱為十二屬何怪之有旬日布於長安出國史補劉禹錫唐劉禹錫牧連州替高寓寓後入羽林將軍自京附書曰以承眷輒舉目代矣劉答書云昔答書云昔四字原空闕據黃本補有一話曾有老嫗山行見大蟲羸然跬步而不進若傷其足嫗目之而虎遂自舉足以示嫗乃有芒刺在掌因為拔之俄奮迅闞吼而愧其恩自後擲麋鹿狐兔於庭日無闕焉嫗登垣視之乃前傷虎也因為親族具言其事而心異之一旦忽擲一死人血肉狼藉嫗乃被村胥訶捕嫗具說其由始得釋縛嫗乃登垣伺其虎至而語曰感矣叩頭大王已後更莫拋死人來也出嘉話録袁德師唐汝南袁德師故給事高之子嘗於東都買得婁師德故園地起書樓洛人語曰昔日婁師德園今乃袁德師樓原闕出處明鈔本作出嘉話録李程唐劉禹錫云李二十六丞相程善謔為夏口日有客辭焉李曰且更三兩日客曰業已行矣舟船已在漢口李曰但相信住那漢口不足信其客胡盧掩口而退又因與堂弟堂弟原作裳以據明鈔本改丞相留守石投店酒飲石收頭子糾者罰之石曰何罰之有程曰汝忙鬧時把他堂印將去又何辭焉酒家謂重四為堂印蓋譏石太和九年冬朝廷有事之際而登庸用也出嘉話録楊虞卿唐郎中張又新與虔州楊虞卿齊名友善楊妻李氏即鄜相女有德無容楊未嘗介意敬待特甚張嘗語楊曰我年少成美名不憂仕矣唯得美室平生之望斯足楊曰必求是但與我同好定諧君心張深信之既婚殊不愜心楊秉笏觸之曰君何太癡言之數四張不勝其忿回應之曰與君無間以情告君君誤我如是何為癡楊於是歷數求名從宦之由曰豈不與君皆同耶曰然然則我得醜婦君詎不同耶張色解問君室何如我曰特甚張大笑遂如初張既成家乃為詩曰牡丹一朵直千金將謂從來色最深今日滿欄開似雪一生辜負看花心出本事詩沈亞之唐沈亞之常客游為小輩所試曰某改令書俗各兩句伐木丁丁鳥鳴嚶嚶東行西行遇飯遇羹亞之答曰如切如磋如琢如磨欺客打婦不當婁羅出托言張祜唐張祜客淮南幕中赴宴時舍人杜牧為御使座有妓人索骰子賭酒牧微吟曰骰子逡巡裹手拈無因得見玉纖纖祜應聲答曰但知報道金叉落髣佛還應路指尖祜未識識字原空闕據明鈔本補白居易白刺史蘇州始來謁才相見白謂曰久欽藉甚嘗記得右款頭詩祜愕然曰舍人何所謂白曰鴛鴦鈿帶拋何處孔雀羅衫付阿誰非款頭何邪張俯微笑仰而答之曰祜亦嘗記得舍人目連變白曰何也曰上窮碧落下黃泉兩處茫茫皆不見非目連變何邪遂歡宴竟日趙公令狐綯鎮維揚祜常預狎宴公因熟視祜改令曰上水船風太急帆下人須好立祜答曰上水船船底破好看客莫倚柁出托言交廣客交廣間遊客各求館帖所至迎接甚厚贐路每處十千廣帥盧鈞深知其弊凡求館帖者皆云纍路館驛供菜飯而已有客齎帖到驛驛司依帖供訖客不發驛吏曰恐後更有使客前驛又遠此非宿處客曰食帖如何處分吏曰供菜飯而已客曰菜飯供了還我而已來驛吏吏字原闕據明鈔本補相顧莫知所為客又迫促無計吏問曰不知而已曰曰字原闕據明鈔本補大於驢小於騾若無可供但還我價直驛吏問每一而已其價幾何客曰三五千驛吏逐斂送耳出盧氏雜說盧肇唐盧肇初舉先達或問所來肇曰某袁民也或曰袁州出舉人邪肇曰袁州出舉人亦猶沅江出鱉甲九肋者蓋稀矣又肇就江西解試為試官末送肇有啓事謝曰巨鼇屭贔首冠蓬山試官謂之曰某昨限以人數擠排雖獲申展深慚名第奉浼焉得翻有首冠蓬山之謂肇曰必知明公垂問大凡頑石處上巨鼇載之豈非首冠邪一座座字原空闕據明鈔本補聞之大笑出托言章孝標唐章孝標及第後寄淮南李紳詩曰及第全勝十政官金湯渡了出長安馬頭漸入揚州郭為報時人洗眼看紳亟以一絶答之曰假金只用真金鍍若是真金不鍍金十載長安得一第何須空腹用高心出托言南卓唐郎中南卓與李修古親表昆弟李性迂僻卓常輕之李俄授許州從事奏官勑下時許帥方大宴忽遞到開角有卓與李書遂執書喜白帥曰某與卓二十三表兄弟多蒙相輕今日某忝為尚書賓幕又奏署敕下遽與某書大奇及啓緘云即日卓老不死生見李修古上除因明鈔本因作目帥請書看合座大笑李修古慚甚出盧氏雜說王智興唐王智興帶使侍中罷鎮歸京親戚間有以選事求智興論薦固不允遂請致一函與吏部侍郎吏部印尾狀云選人名銜謹領訖智興曰不如侍中也有用處出盧氏雜說盧發唐中書令白敏中鎮荊南杜蘊廉問長沙請從事盧發致聘焉發酒酣傲睨公少不懌因改著詞令曰十姓胡中第六胡也曾金閣掌洪爐少年從事誇門地莫向樽前氣色粗發答曰十姓胡中第六胡文章官職勝崔盧暫來關外分憂寄不稱賓筵語氣粗公極歡而罷出托言裴休曲江池本秦時豈洲唐開元中疏鑿為勝境南即紫雲樓芙蓉苑西即杏園慈恩寺花卉環周煙水明媚都人遊賞盛於中和上巳節即錫宴臣僚會於山亭賜太常教坊樂池備綵舟唯宰相三使北省官翰林學士登焉傾動皇州以為盛觀裴休廉察宣城未離京值曲江池荷花盛發同省閣名士遊賞自慈恩寺各屏左右隨以小僕步至紫雲樓見數人坐於水濱裴與朝士憩其旁中有黃衣半酣軒昂自若指諸人笑語輕脫裴意稍不平揖而問之吾賢所任何官率爾對曰喏郎明鈔本郎作即下同不敢新授宣州廣德令反問裴曰押衙所任何職裴效之曰喏郎不敢新授宣州觀察使於是狼狽而走同座亦皆奔散朝士撫掌大笑不數日布於京華後於銓司訪之云有廣德令請換羅江矣宣皇在藩邸聞是說與諸王每為戲談其後龍飛裴入相因書麻制回謂樞近曰喏郎不敢新授中書門下平章事矣出松窗雜録按見劇談録卷下馮袞唐馮袞牧蘇州江外優佚暇日多縱飲博因會賓僚擲盧馮突勝以所得均遺一座乃吟曰八尺臺盤照面新千金一擲斗精神合是賭時須賭取不妨回首乞閒人更因飲酣戲酒妓而軍倅留情索然無緒馮眄之曰老夫過戲無能為也倅斂袵而謝因吟曰醉眼從伊百度斜是他家屬是他家低聲向道人知也隔坐剛拋豆蔻花出抒情詩鄰夫有覩鄰人夫婦相諧和者夫自外歸見婦吹火乃贈詩曰吹火朱唇動添薪玉腕斜遙看煙裏面大似霧中花其妻亦候夫歸告之曰每見鄰人夫婦極甚多情適來夫見婦吹火作詩詠之君豈不能學也夫曰彼詩道何語乃誦之夫曰君當吹火為別製之妻亦效吹乃為詩曰吹火青唇動添薪黑腕斜遙看煙裏面恰似鳩盤茶出笑言明鈔本作出笑林關圖唐荊州衣冠藪澤每歲解送舉人多不成名號曰天荒解劉蛻以荊州解及第號為破天荒爾來關圖常翛皆荊人也率有高文連登上科圖即戎校之子及第歸鄉都押衙輩為其張筵乃指盤上醬甌戲老校曰要校卒為者其人以醋樽進之曰此亦校卒為者也席人大噱關圖妻即常翛妹才思婦也有祭夫文行於世出北夢瑣言唐咸咸字原空闕據明鈔本補通中中字原闕據明鈔本補楊玄翼怒舉子車服太盛欲令騎驢時有詩曰今年今年原作有看三字據明鈔本改詔下盡騎驢紫軸緋氈滿九衢清瘦兒郎猶自可就中愁殺鄭昌圖出盧氏雜說裴慶餘唐裴慶餘咸通末佐北門李蔚淮南幕常遊江舟子刺船誤以篙竹濺水濕妓人衣蔚為之色變慶餘遽請彩箋紀一絶曰滿額蛾黃金縷衣翠翹浮動玉叉垂從教水濺羅裙濕知道巫山行雨歸蔚覽之極歡謔命宴者傳之出托言趙崇雖盧氏衣冠之盛而纍代未嘗知舉乾符中盧攜在中書以宗人無掌文柄者乃擢群從陝虢觀察使盧渥司禮闈是年秋黃巢犯闕僖皇播遷舉人星迸逮復京都裴贄連知三舉渥有羡色趙崇戲之曰閣下所謂出腹不生養主司也出北夢瑣言鄭光業中表間有同人試者時舉子率以白紙糊案子光業潛紀之曰新糊案子其白如銀入試出試千春萬春光業弟兄共有一巨皮箱凡同人投獻詞有可嗤者即投其中號苦海昆季或從容用資諧戲即命二僕舁苦海於前人閲一編皆極歡而罷光業常言及第之歲策試夜一同人突入試鋪為吳語謂光業曰必先必先可以相容否光業為輟半鋪之地又曰必先必先咨仗取一杓水亦為取之又曰便干託煎一碗茶得否欣然與烹煎居二日光業狀元及第其人首貢一啓頗敘一宵之素略曰既蒙取水又使煎茶當時不識貴人凡夫肉眼今日俄為後進窮相骨頭出托言
