body:
  text: 張華張華晉張華生挺聰慧好觀奇異圖緯之學捃拾天下遺逸自書契之始考驗神怪及世間里閭所說撰博物志四百卷奏武帝帝曰卿才十倍萬代博識無倫記事採言多所浮妄宜刪翦無據以見成交昔仲尼刪詩書不不字原闕據拾遺記補及鬼神幽昧之事不言怪力亂神今見卿此志驚所未聞異所未見將繁于耳目也可更芟截浮疑分為十卷即于御前賜青鐵硯此鐵是于闐國所獻鑄為硯又賜麟角管此遼西國所獻也側理紙萬番南越所獻也漢言陟釐陟釐與側理相亂南人以海苔為紙其理縱橫斜側因為名焉出王子年拾遺記晉惠帝晉惠帝元康三年武庫火燒漢高祖斬白蛇劍孔子履咸見此劍穿屋飛去莫知所向出異苑許遜西晉末有旌陽縣令許遜者得道于豫章西山江中有蛟蜃為患旌陽沒水拔劍斬之後不知所在頃魚人網得一石甚鳴擊之聲聞數十里唐朝趙王為洪州刺史破之得劍一雙視其銘一有許旌陽字一有萬仞字一有萬仞師出焉出朝野僉載陶貞白梁陶貞白所著太清經一名劍經凡學道術者皆須有好劍鏡隨身又說干將莫耶劍皆以銅鑄非鐵也出尚書故實又貞白隱居貝都山中嘗畜二刀一名善勝一名寶勝往往飛去人望之如二條青蛇本傳具載出芝田録張祖宅唐乾封年中有人于鎮州東野外見二白兔捕之忽卻入地絶跡不見乃于入處掘之才三尺許獲銅劍一雙古制殊妙于時長史張祖宅以聞出朝野僉載唐儀唐上元年中令九品以上佩刀礪等袋彩帨為魚形結帛作之取魚之象明鈔本之象作衆鯉強之兆也至天后朝乃絶景雲之後又復前飾出朝野僉載唐中宗唐中宗令揚州造方丈鏡鑄銅為桂樹金花銀葉帝每常騎馬自照人馬並在鏡中出朝野僉載宋青春唐開元中河西騎將宋青春驍果暴戾為衆所推西戎嘗歲犯邊境青春每臨陳必獨運劍大呼執馘而旋未嘗中鋒鏑西戎憚之一軍咸賴焉後吐蕃大北獲生口數千軍軍原作里據明鈔本改帥令譯問衣大蟲皮者爾何不能害之答曰但見青龍突陳而來兵刃所及若叩銅鐵以為神助將軍也青春乃知劍之靈青春死後劍為瓜州刺史季廣琛所得或風雨後迸光出室環燭方丈哥舒翰鎮西涼知之求易以他寶廣琛不與因贈之詩曰刻舟尋已化彈鋏未酬恩出酉陽雜俎武勝之唐開元末太原武勝之為宣州司士知靜江事忽于灘中見雷公踐微雲逐小黃蛇盤繞灘上靜江夫戲投以石中蛇鏗然作金聲雷公乃飛去使人往視得一銅劍上有篆許旌陽斬蛟第三劍云出廣異記李守泰唐天寶三載五月十五日揚州進水心鏡一面縱橫九寸青瑩耀日背有盤龍長三尺四寸五分勢如生動玄宗覽而異之進鏡官揚州參軍李守泰曰鑄鏡時有一老人自稱姓龍名護鬚髮皓白眉如絲垂下至肩衣白衫有小童相隨年十歲衣黑衣龍護呼為玄冥以五月朔忽來神采有異人莫之識為鏡匠呂暉曰老人家住近聞少年鑄鏡暫來寓目老人解造真龍欲為少年制之頗將愜于帝意遂令玄冥入爐所扃閉戶牖不令人到經三日三夜門左洞開呂暉等二十人于院內搜覓失龍護及玄冥所在鏡爐前獲素書一紙文字小隸云鏡龍長三尺四寸五分法三才象四氣稟五行也縱橫九寸類九州分野鏡鼻如明月珠焉開元皇帝聖通伸靈吾遂降祉斯鏡可以辟邪鑒萬物秦始皇之鏡無以加焉歌曰盤龍盤龍隱于鏡中分野有象變化無窮興雲吐霧行雨生風上清仙子來獻聖聰呂暉等遂移鏡爐置船中以五月五日午時乃于揚子江鑄之未鑄前天地清謐興造之際左右江水忽高三十餘尺如雪山浮江又聞龍吟如笙簧之聲達于數十里稽諸古老自鑄鏡以來未有如斯之異也帝詔有司別掌此鏡至天寶七載秦中大旱自三月不雨至六月帝親幸龍堂祈之不應問昊天觀道士葉法善曰朕敬事神靈以安百姓今亢陽如此朕甚憂之親臨祈禱不雨何也卿見真龍否乎對曰臣亦曾見真龍臣聞畫龍四肢骨節一處得以似真龍即便有感應用以祈禱則雨立降所以未靈驗者或不類真龍耳帝即詔中使孫知古引法善于內庫遍視之忽見此鏡遂還奏曰此鏡龍真龍也帝幸凝陰殿並召法善祈鏡龍頃刻間見殿棟有白氣兩道下近鏡龍龍鼻亦有白氣上近梁棟須臾充滿殿庭遍散城內甘雨大澍凡七日而止秦中大熟帝詔集賢待詔吳道子圖寫鏡龍以賜法善出異聞録陳仲躬唐天寶中有陳仲躬家居金陵多金帛仲躬好學修詞未成攜數千金于洛陽清化里假居一宅其井甚大常溺人仲躬亦知之以靡有家室無所懼仲躬常習學不出月餘日有鄰家取水女可十數歲怪每日來于井上則逾時不去忽墜井而死井水深經宿方索得尸仲躬異之閒日窺于井上忽見水中一女子其形狀少麗依時樣妝飾以目仲躬凝睇之際以紅袂半掩其面微笑妖冶之姿出于世表仲躬神魂恍惚若不支持乃嘆曰斯為溺人之由也遂不顧而退後數月炎旱此井水不減忽一日水竭清旦有人叩門云敬元穎請謁仲躬命入乃井中所見者衣緋緑之衣其裝飾鉛粉悉時製耳仲躬與坐訊曰卿何以殺人元穎曰妾非殺人者此井有毒龍自漢朝絳侯居于茲遂穿此井洛城內有五毒龍斯其一也緣與太一左右侍龍相得每為蒙蔽天命追徵多託故不赴集好食人血自漢以來殺三千七百人矣而水不耗涸某乃國初方墜于井遂為龍所驅使為妖惑以誘人用供龍所食甚于辛苦情所非願昨為太一使者交替天下龍神盡須集駕昨夜子時已朝太一矣兼為河南旱勘責三數日方回今井內已無水君子誠能命匠淘之則獲脫斯難矣若然願終君子一生奉養世間之事無不致言訖便失所在仲躬當時即命匠命一親信與匠同入井囑曰但見異物即收至底無別物唯獲古銅鏡一枚闊七寸七分仲躬令洗淨貯匣內焚香以奉之斯所謂敬元穎也一更後元穎忽自門而入直造燭前設拜謂仲躬曰謝生成之恩照濁泥之下某昔本師曠所鑄十二鏡之第七者也其鑄時皆以日月為大小之差元穎則七月七日午時鑄者也貞觀中為許敬宗婢蘭苕所墜以此井水深兼毒龍氣所苦人入者悶絶故不可取遂為毒龍所役幸遇君子正直者乃獲重見人間耳然明晨內望君子移出此宅仲躬曰某已用錢僦居今移出何以取措足之所元穎曰但請君子飾裝一無憂也將辭去仲躬復留之問曰汝安得有紅緑脂粉狀乎對曰某變化無常非可具述言訖即無所見明旦忽有牙人叩戶兼領宅主來謁謁原作謂據明鈔本改仲躬便請移居並夫役並足未到齊時前至立德坊一宅中其大小價數一如清化者其牙人云價值契本一無遺缺並交割訖後三日其清化宅井無故自崩兼延及堂隅東廂一時陷地仲躬後文戰纍勝為大官有所要事未嘗不如移宅之效也其鏡背有二二原作三據博異志改十八字皆科斗書以今文推而寫之曰維晉新公二年七月七日午時於首陽山前白龍潭鑄成此鏡千年在世于背上環書一字管天文列宿依方列之則左有日而右有月龜龍虎雀并如其位于鼻四旁題云夷則之鏡出博異志曹王皋唐嗣曹王皋有巧思精于器用為荊荊原作邢據本書卷二五曹王皋條改州節度使有羈旅士人懷二羯鼓棬欲求通謁先啓于賓府賓府觀者咸訝議曰豈足尚耶對曰但啓之尚書當解矣及見皋捧而嘆曰不意今日獲逄至寶指其鋼勻之狀賓佐唯唯或腹非之皋曰諸公心未信乎命取食拌自選其極平正者令置棬于拌心以油注棬中棬滿而油無涓滴滲漏皋曰此必開元天寶中供御棬不然無以至此問其所自士人曰某先人在黔中得于高力士之家衆方深伏賓府又潛問士人宜償幾何士人曰不過三萬及遺金帛器皿其直果稱是焉出羯鼓録漁人蘇州太湖入松江口唐貞元中有漁人載明鈔本載作為小網數船共十餘人下網取魚一無所獲網中得物乃是鏡而不甚大漁者忿其無魚棄鏡於水移船下網又得此鏡漁人異之遂取其鏡視之才七八寸照形悉見其筋骨臟腑潰然可惡其人悶絶而倒衆人大驚其取鏡鑒形者即時皆倒嘔吐狼藉其餘一人不敢取照即以鏡投之水中良久扶持倒吐者既醒遂相與歸家以為妖怪明日方理網罟則所得魚多于常時數倍其人先有疾者自此皆愈詢于故老此鏡在江湖每數百年一出人亦常見但不知何精靈之所恃也出原化記
