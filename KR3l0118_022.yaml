body:
  text: 羅公遠羅公遠本鄂州人也刺史春設觀者傾郡有一白衣人長丈餘貌甚異隨群衆而至門衛者皆怪之俄有小童傍過叱曰汝何故離本處驚怖官司耶不速去其人遂攝衣而走吏乃擒小童至宴所具白於刺史刺史問其姓名云姓羅名公遠自幼好道術適見守江龍上岸看某趣令回刺史不信曰須令我見本形曰請俟後日至期於水濱作一小坑深才一尺去岸丈餘引水入刺史與郡人並看逡巡有魚白色長五六寸隨流而至騰躍漸大青煙如線起自坎中少頃黑氣滿空咫尺不辨公遠曰可以上津津原作律據明鈔本許刻本改亭矣未至電光注雨如瀉須臾即定見一大白龍於江心頭與雲連食頃方滅時玄宗酷好仙術刺史具表其事以進時玄宗與張果葉法善碁二人見之大笑曰村童事亦何解乃各握碁子十數枚問曰此有何物曰空手及開果無並在公遠處方大駭異令與張葉等齒坐劍南有果初進名為日熟子張與葉以術取每過午必至其日暨夜都不到相顧而語曰莫是羅君否時天寒圍爐公遠笑於火中素樹一筯及此除之遂至葉詰使者云欲到京焰火亘天無路可過適火歇方得度從此衆皆敬伏開元中中秋望夜時玄宗於宮中玩月公遠奏曰陛下莫要至月中看否乃取拄杖向空擲之化為大橋其色如銀請玄宗同登約行數十里精光奪目寒色侵人遂至大城闕公遠曰此月宮也見仙女數百皆素練寬衣舞於廣庭玄宗問曰此何曲也曰霓裳羽衣也玄宗密記其聲調遂回卻顧其橋隨步而滅且召伶官依其聲調作霓裳羽衣曲時武惠妃尤信金剛三藏玄宗幸功德院忽苦背癢公遠折竹枝化七寶如意以進玄宗大悅顧謂三藏曰上人能致此乎曰此幻化耳臣為陛下取真物乃袖中出七寶如意以進公遠所進者即時化為竹枝耳及玄宗幸東洛武妃同行在上陽宮麟趾殿方將修殿其庭有大方梁數丈經六七尺時公遠葉尊師金剛三藏皆侍從焉玄宗謂葉尊師曰吾方間悶可試小法以為樂也師試為朕舉此方木葉受詔作法方木一頭揭數尺而一頭不起玄宗曰師之神力何其失耶葉曰三藏使金剛善神衆壓一頭故不舉時玄宗奉道武妃宗釋武妃頗有悅色三藏亦陰心自歡惟公遠低頭微哂玄宗謂三藏曰師神呪有功葉不能及可為朕呪法善入澡瓶乎三藏受詔置瓶使法善敷座而坐遂呪法大佛頂真言未終遍葉身歘歘就瓶不三二遍葉舉至瓶嘴遍訖拂然而入瓶玄宗不悅良久謂三藏曰師之功力當得自在既使其入能為出乎三藏曰是僧之本法也即咒之誦佛頂真言數遍葉都不出玄宗曰朕之法師今為三藏所呪而沒不得見矣武妃失色三藏大懼玄宗謂公遠曰將若之何得法善旋矣公遠笑曰法善不遠良久高力士奏曰葉尊師入玄宗大驚曰銅瓶在此自何所來引入問之對曰寧王邀臣喫飯面奏的不放臣適寧王家食訖而來不因一呪何以去也玄宗大笑武妃三藏皆賀已而使葉設法籙於是取三藏金襴袈裟摺之以盆覆之葉禹步叩齒繞三匝曰太上老君攝去盆下袈裟之縷隨色皆攝各為一聚三藏曰惜哉金襴至毀如此玄宗曰可正乎葉曰可又覆之呪曰太上老君正之啓之袈裟如故葉又取三藏鉢燒之烘赤手捧以合三藏頭失聲而走玄宗大笑公遠曰陛下以為樂乃道之末法也葉師何用逞之玄宗曰師不能為朕作一術以歡朕耶公遠曰請更問三藏法術何如三藏曰貧道請收固袈裟試令羅公取取不得則羅公輸取得則僧輸於是令就道場院為之三藏結壇焚香自於壇上跏趺作法取袈裟貯之銀合又安數重木函皆有封鎖置於壇上玄宗與武妃葉公皆見中有一重菩薩外有一重金甲神人外以一重金剛圍之賢聖比肩環繞甚嚴三藏觀守目不暫捨公遠坐繩床言笑自若玄宗與葉公皆視之數食頃玄宗曰何太遲遲得無勞乎公遠曰臣鬥力安敢自衒其能但在陛下使三藏啓觀耳令開函取袈裟雖封鎖依然中已空矣玄宗大笑公遠奏曰請令人於臣院內勑弟子子字原闕據明鈔本補開匱取來即令中使取之須臾袈裟至玄宗問之公遠曰菩薩力士聖之中者甲兵諸神道之小者皆可功參上界至於太上至真之妙非術士所知適使玉清神女取之則菩薩金剛不見其形取若坦途何礙之有玄宗大悅賞賚無數而葉公三藏然後伏焉時玄宗欲學隱遁之術對曰陛下玉書金格以簡於九清矣真人降化保國安人誠宜習唐虞之無為繼文景之儉約卻寶劍而不御棄名馬而不乘豈可以萬乘之尊四海之貴宗廟之重社稷之大而輕狥小術為戲玩之事乎若盡臣術必懷璽入人家困於魚服矣玄宗怒罵之遂走入殿柱中數玄宗之過玄宗愈怒易柱破之復入玉磶中又易磶破之為數十片悉有公遠之形玄宗謝之乃如故玄宗後又堅學隱形之術強之不已因而教焉然託身隱常有不盡或露裾帶或見影跡玄宗怒斬之其後數歲中使輔仙玉奉使入蜀見公遠於黑水道中披雲霞衲帔策杖徐行仙玉策馬追之常去十餘步竟莫能及仙玉呼曰天師雲水適意豈不念內殿相識耶公遠方佇立顧之仙玉下馬拜謁訖從行數里官道側俯臨長溪旁有巨石相與渡溪據石而坐謂仙玉曰吾棲息林泉以修真為務自晉咸和年入蜀訪師諸山久晦名跡聞天子好道崇玄乃捨煙霞放曠之樂冒塵世腥羶之路混跡雞鶩之群窺閲蜉蝣之境不以為倦者蓋欲以至道之貴俯教於人主耳聖上延我於別殿遽以靈藥為索我告以人間之腑臟葷血充積三田未虛六氣未潔請俟他日以授之以十年為限不能守此誡約加我以丹頸之戮一何遑遽哉然得道之人與道氣混合豈可以世俗兵刃水火害於我哉但念主上列丹華之籍有玉京交契之舊躬欲度之眷眷之情不能已已因袖中出書一緘謂仙玉曰可以此上聞云我姓維名某某靜真先生弟子也上必寤焉言罷而去仍以蜀當歸為寄遂失所在仙玉還京師以事及所寄之緘奏焉玄宗覽書惘然不懌仙玉出公遠已至因即引謁玄宗曰先生何改名姓耶對曰陛下嘗去臣頭固改之耳羅字去頭維字也公字去頭字也遠字去頭字也玄宗稽首陳過願捨其尤公遠欣然曰蓋戲之耳夫得神仙之道者劫運之災陽九之數天地淪毀尚不能害況兵刃之屬那能為害也異日玄宗復以長生為請對曰經有之焉我命在我匪由於他當先內求而外得也刳心滅智草衣木食非至尊所能因以三峰歌八首以進焉其大旨乃玄素黃赤之使還嬰泝流之事玄宗行之逾年而神逸氣旺春秋愈高而精力不憊歲餘公遠去不知所之天寶末玄宗幸蜀又於劍門奉迎鑾輅衛至成都拂衣而去乃玄宗自蜀還京方悟蜀當歸之寄矣出神仙感遇傳及仙傳拾遺逸史等書僕僕先生不知何許人也自云姓僕名僕莫知其所由來家於光州樂安縣黃土山凡三十餘年精思餌杏丹衣服飲食如常人賣藥為業開元三年前無棣縣令王滔寓居黃土山下先生過之滔命男辨為主善待之先生因授以杏丹術時辨舅吳明圭為光州別駕辨在圭舍頃之先生乘雲而度人吏數萬皆覩之辨乃仰告曰先生教辨丹術未成奈何捨我而去時先生乘雲而度已十五過矣人莫測及辨與言觀者皆愕或以告刺史李休光休光召明圭而詰之曰子之甥乃與妖者友子當執其舅因令辨往召之辨至舍而先生至具以狀白先生曰余道者不欲與官人相遇辨曰彼致禮便當化之如妄動失節當威之使心伏於道不亦可乎先生曰善乃詣休光府休光踞見且詬曰若仙當遂往矣今去而復來妖也先生曰麻姑蔡經王方平孔申二茅之屬問道於余余說之未畢故止非他也休光愈怒叱左右執之龍虎見於側先生乘之而去去地丈餘玄雲四合斯須雷電大至碎庭槐十餘株府舍皆震壞觀者無不奔潰休光懼而走失頭巾直吏收頭巾引妻子跣出府因徙宅焉休光以狀聞玄宗乃詔改樂安縣為仙居縣就先生所居舍置仙堂觀以黃土村為仙堂村縣尉嚴正誨護營築焉度王辨為觀主兼諫議大夫號通真先生辨因餌杏丹卻老至大曆十四年凡六十六歲而狀可四十餘筋力稱是其後果州女子謝自然白日上升當自然學道時神仙頻降有姓崔者亦云名崔有姓杜者亦云名杜其諸姓亦爾則與僕僕先生姓名相類矣無乃神仙降於人間不欲以姓名行於時俗乎後有人於義陽郊行者日暮不達前村忽見道旁草舍因往投宿室中唯一老人問客所以答曰天陰日短至此昏黑欲求一宿老人云宿即不妨但無食耳久之客苦饑甚老人與藥數丸食之便飽既明辭去及其還也忽見老人乘五色雲去地數十丈客便遽禮望之漸遠客至安陸多為人說之縣官以為惑衆繫而詰之客云實見神仙然無以自免乃向空祝曰仙公何事見今受不測之罪言訖有五色雲自北方來老人在雲中坐客方見釋縣官再拜問其姓氏老人曰僕僕野人也有何姓名州司畫圖奏聞勑令於草屋之所立僕僕先生廟今見在出異聞集及廣異記藍采和不知何許人也常衣破藍衫六銙黑木腰帶闊三寸餘一腳著靴一腳跣行夏則衫內加絮冬則臥於雪中氣出如蒸每行歌於城市乞索持大拍板長三尺餘常醉踏歌老少皆隨看之機捷諧謔人問應聲答之笑皆絶倒似狂非狂行則振靴唱唱原作言據明鈔本改踏歌踏歌藍采和世界能幾何紅顏一春樹流年一擲梭古人混混去不返今人紛紛來更多朝騎鸞鳳到碧落暮見蒼田生白波長景明暉在空際金銀宮闕高嵯峨歌詞極多率皆仙意人莫之測但以錢與之以長繩穿拖地行或散失亦不回顧或見貧人即與之及與酒家周遊天下人有為兒童時至及斑白見之顏狀如故後踏歌於濠梁間酒樓乘醉有雲鶴笙簫聲忽然輕舉於雲中擲下靴衫腰帶拍板冉冉而去出續神仙傳
