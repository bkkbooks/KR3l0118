body:
  text: 王王唐尚書刑部郎中宋行質博陵人也性不信佛有慢謗之言永徽二年五月病死至六月九日尚書都官令吏王暴死經二日而蘇言初死之時見四人來云官府追汝隨行入一大門見廳事甚壯西間有一人坐形容肥黑東間有一僧坐與官相當皆面向北各有床幾案褥侍童二百許人或冠或辨皆美容貌階下有吏執文案有一老人著枷被縛立東階下至庭亦已被縛吏執紙筆問曰貞觀十八年在長安佐史之日因何改李須達籍答曰前任長安佐史貞觀十六年轉選至十七年蒙授司農寺府史十八年改籍非罪也廳上大官讀其辭辨顧謂東階下老囚曰何因妄訴耶囚曰須達年實未至由改籍加須達年豈敢妄耶云至十七年改任告身見在請追驗之官呼領者三人解縛將取告身既至大官自讀之謂老囚曰他改任分明汝無理令送老囚出門外門外昏暗有城城上皆有女牆似是惡處大官因書案上謂曰汝無罪放汝去辭拜吏引至東階拜辭僧印臂曰好去吏引出東南行度三重門皆勘視臂印然后出至四門門甚壯大重樓朱粉三戶并開狀如城門守衛嚴切又驗印聽出門東南行數十步聞有人從后喚回顧見郎中宋行質面色慘黑色如濕地露頭散腰著故緋袍頭發短垂如胡人者立於廳事階下有吏主守之西近城有一大木牌高一丈二尺許大書牌曰此是勘當過王人其字大方尺余甚分明廳上有床座幾案如官府者而無人坐行質見悲喜云汝何故得來曰官追勘問改籍無事放還行質捉其兩手謂曰吾被官責問功德簿吾平生無受此困苦加之饑渴寒苦不可說君可努力至我家急語令作功德也如是殷勤數四囑之乃辭去行數十步又呼還未及言廳上有官人來坐怒曰我方勘事如何人輒至囚處使卒搭其耳推令去走又至一門門吏曰汝被搭耳耳當聾吾為汝卻其中物因以手挑其耳耳中鳴乃驗印放出門外黑如漆不知所在以手模西及南皆是牆壁唯東無障礙而暗不可行立待少時見向者追之吏從門來曰君尚能待我甚善可乞我錢一千因愧謝曰依命吏曰吾不用銅錢欲得白紙錢期十五日來取許因問歸路吏曰但東行二百步有牆穿破見明可推倒即至君家如言已至所居隆政坊南門矣于是歸家見人坐泣入戶而蘇至十五日忘與錢明日復病困絶見吏來怒曰君果無行期與我錢遂不與今復將汝因即驅行出金光門令入坑拜謝百餘遂即放歸又蘇告家人買紙百張作錢送之明日又病困復見吏曰君幸能與我錢而錢不好辭謝請更作許之又蘇至二十日令用錢別買白紙作錢并酒食自於隆政坊西渠水上燒之既而身輕體健遂平復如故魏靖巨鹿人解褐武城尉時曹州刺史李融令靖知捕賊賊有叔為僧而止盜贓靖案之原其僧刺史讓靖以寬典自案之僧辭引伏融令靖杖殺之載初二年夏六月靖會疾暴卒權殮已畢將冥婚男女故未果葬經十二日靖活呻吟棺中弟侄俱走其母獨命斧開棺以口候靖口氣微暖久之目開身肉俱爛徐以牛乳乳之既愈言初死經曹司門衛旗戟甚肅引見一官謂靖何為打殺僧僧立于前與靖相論引僧辭窮官謂靖曰公無事放還左右曰肉已壞官令取藥以紙裹之曰可還他舊肉既領還至門聞哭聲驚懼不願入使者強引之及房門使者以藥散棺中引靖臂推入棺頽然不復覺矣既活肉蠹爛都盡月余日知故初到宅中犬馬雞鵝悉鳴當有所見矣楊再思神龍元年中書令楊再思卒其日中書供膳亦死同為地下所由引至王所王問再思在生何得有許多罪狀既多何以收贖再思言己實無罪王令取簿來須臾有黃衣吏持簿至唱再思罪云如意元年默啜陷瀛檀等州國家遣兵赴救少不敵有人上書諫再思違諫遣行為默啜所敗殺千余人大足元年河北蝗蟲為災蒸人不粒再思為相不能開倉賑給至令百姓流離餓死者二萬余人宰相燮理陰陽再思刑政不平用傷和氣遂令河南三郡大水漂溺數千人如此者凡六七件示再思再思再拜伏罪忽有手大如床毛鬣可畏攫再思指間血流騰空而去王問供膳何得至此所由對云欲問其人云無過宜放回供膳既活多向人說其事為中宗所聞召問具以實對中宗命列其事跡於中書廳記之云金壇王丞開元末金壇縣丞王甲以充綱領戶稅在京於左藏庫輸納忽有使者至庫所云王令召丞甲倉卒隨去出城行十余里到一府署入門聞故左常侍崔希逸語聲王與希逸故三十年因問門者具知所以求為通刺門者入白希逸問此人何在遽令呼入相見驚喜謂甲曰知此是地府否甲始知身死悲感久之復問曾見崔翰否翰是希逸子王云入城已來為開庫司未暇至宅希逸笑曰真輕薄士以死生易懷因問其來由王云適在庫中隨使至此未了其故有頃外傳王坐崔令傳語白王云金壇王丞是己親友計未合死事了願早遣時熱恐其舍壞王引入謂甲曰君前任縣丞受贓相引見丞著枷坐桐樹下問云初不同情何故見誣丞言受罪辛苦權救倉卒王云若不相關即宜放去出門詣希逸別希逸云卿已得還甚善傳語崔翰為官第一莫為人作枉后自當之取錢必折今生壽每至月朝十五日宜送清水一瓶置寺中佛殿上當獲大福甲問此功德云何逸云冥間事卿勿預知但有福即可言畢送出至其所遂活韓朝宗天寶中萬年主簿韓朝宗嘗追一人來遲決五下將過縣令令又決十下其人患天行病而卒后於冥司下狀言朝宗宗遂被追至入烏頸門極大至中門前一雙桐樹門邊一閣垂帘幕窺見故御史洪子輿坐子輿曰韓大何為得此來朝宗云被追來不知何事子輿令早過大使入屏牆見故刑部尚書李乂朝宗參見云何為決殺人朝宗訴云不是朝宗打殺縣令重決因患天行病自卒非朝宗過又問縣令決汝何牽他主簿朝宗無事然亦縣丞悉見例皆受行杖亦決二十放還朝宗至晚始蘇脊上青腫疼痛不復可言一月已后始可於后巡檢坊曲遂至京城南羅城有一坊中一宅門向南開宛然記得追來及吃杖處其宅空無人居問人云此是公主凶宅人不敢居乃知大凶宅皆鬼神所處信之韋延之睦州司馬韋延之秩滿寄居蘇州嘉興大歷八年患痢疾夏月獨寐廳中忽見二吏云長官令屈延之問長官為誰吏云奉命追公不知其他延之疑是鬼魅下地欲歸吏便前持其袂云追君須去還欲何之延之身在床前神乃隨出去郭復不見陂澤但是陸路行數十里至一所有府署吏將延之過大使大使傳語領過判官吏過延之判官襴笏下階敬肅甚謹因謂延之曰有人論訟事須對答乃令典領於司馬對事典引延之至房房在判官廳前廳如今縣令廳有兩行屋屋間悉是房房前有斜眼格子格子內板床坐人典令延之坐板床對事須臾引囚徒六七人或枷或鎖或露首者至延之所典云汝所論訟韋司馬取錢今冥獻酬自直也問云所訴是誰曰是韋冰司馬實不識此人典便賀司馬云今得重生甚喜乃引延之至判官所具白判官亦甚相賀處分令還白大使放司馬回典復領延之至大使廳大使已還內傳語放韋司馬去遣追韋冰須臾緑衫吏把案來呵追吏何故錯追他人各決六十流血被地令便送還延之曰欲見向后官職吏云何用知之延之苦請吏開簿延之名后但見白紙不復有字因爾遂出行百餘步見吏拘清流縣令鄭晉客至是延之外甥延之問汝何故來答曰被人見訟晉客亦問延之云何故來延之云吾錯被追今得放還晉客稱善數四欲有傳語吏拘而去意不得言但纍回顧云舅氏千萬延之至舍乃活問晉客云死來五六日韋冰宅住上元即以延之重生其明日韋冰卒張質張質者猗氏人貞元中明經授亳州臨渙尉到任月余日暮見數人持符來追其仆亦持馬俟於階下乘馬隨之出縣門縣吏列坐門下略無起者質怒曰州司暫追官不遽廢人吏敢無禮耶人亦不顧出數十里至一柏林使者曰到此宜下馬遂步行百餘步入城直北有大府門署曰北府入府徑西有門題曰推院吏士甚衆門人曰臨渙尉張質遂入見一美須髯衣緋人据案而坐責曰為官本合理人因何曲推事遣人枉死質被捽搶地呼曰質本任解褐得到官月余未嘗推事又曰案牘分明訴人不遠府命追勘仍敢言欺取枷枷之質又曰訴人既近請與相見曰召冤人來有一老人眇目自西房出疾視質曰此人年少非推某者仍刺録庫檢猗氏張質貞元十七年四月二十七日上臨渙尉又檢訴狀被屈事又牒陰道亳州其年三月臨渙見任尉年名如已受替替人年名并受上月日得牒其年三月見任尉江陵張質年五十一貞元十一年四月十一日任十七年四月二十一日受替替人猗氏張質年四十七檢狀過判官曰名姓偶同遂不審勘本典決十下改追正身執符者復引而回若行高山墜于岩下如夢覺乃在柏林中伏于馬項上兩肋皆痛不能自起且不知何處隱隱聞樵歌之聲知其有人遂大呼救命樵人來驚曰縣失官人及馬此非耶競來問質不能對扶正其身策以送歸縣質之馬為鬼所取仆人不知縣既失質其宰惑之且疑質之初臨嚴於吏吏怨而殺之是夜坐門者及門人當宿之吏莫不禁錮尋求不得者已七日矣質歸憩數日方能言然神識遂闕鄭潔本榮陽人寓於壽春郡嘗以假攝丞尉求食婚李氏則善約之猶子也潔假攝停秩寄跡安丰之里開成五年四月中旬日向暮李氏忽得心痛疾乃如狂言拜於空云且更乞須臾間而卒唯心尚暖耳一家號慟呼醫命巫竟無效者唯備死而已至五更雞鳴一聲忽然回轉衆皆驚捧良久口鼻間覺有噓吸消息至明方語云鬼兩人把帖來追初將謂州縣間猶冀從容而俄被使人曳將怕懼行亦不覺甚難至一城郭引入見一官人似曹官之輩又領入曹司聆讀元追之由云某前生姓劉是丈夫有妻曰馬氏馬氏悍戾劉乃殺而剔其腹令馬氏無五髒不可托生所訴者馬母某便告本司云居欲得馬氏托生即放某回盡平生所有與作功德為計即可也若今追某徒置于無間獄亦何裨於馬氏哉本司云此則自辨之須臾馬氏者到李恐馬氏無禮遂對官人云何得如此狡毒李具以私中之言對之官人問馬氏曰何如馬氏曰冤系多年別罪受畢合歸生路無計伏取裁斷李氏又云且請檢某算壽幾何若未合來即請依前說若合命盡伏聽處分官人云灼然有理遂召司命須臾一主者抱案入來云李未合來昨追時已檢訖須臾更檢檢出捧呈官云更有十八年合在人間本司云且令隨衙勘責夜則放歸耳彼處欲夜所司放出似夢而歸也自是人間日暮追使即來雞鳴即放回如常矣鄭雖貧苦百計祇待來使三五日后使人慚謝鄭曰百味之物深所反側然不如賜茶漿水粥耳茶酒不如賜漿水又貧居易辨自是每晚則備漿水及粥紙錢三五張月十日后每來皆語言商議出拔李氏李氏初每歸來并不敢言自使人同和兼許微說冥間事常言人罪之重者無如枉法殺人而取金帛又曰布施者不必造佛寺不如先救骨肉間饑寒如有余即分錫類更有余則救街衢間也其福最大鄭君兼憑問還往間一人壽命官爵回報云此人好受金帛今被折壽已欲盡矣然更有一官如能改即得終此秩若踵前則不離任矣又云每燒錢財如明旦欲送錢與某神祇即先燒三十二張紙錢以求五道其神祇到必獲矣如尋常燒香多不達如是春秋祭祀者即不假告報也其燒時輒不得就地須以柴或草荐之從一頭以火爇不得攪碎其錢即不破碎一一可達也至八月中李卻回忽喜曰已有計可脫矣鄭詢之曰奈何然須致紙錢三五萬令他行下可矣鄭乃求於還往一邑官吏并知之共與同力依言救之后數日方肯說因云冥司又有剔五髒而殺人者冥司勘覆未畢且取彼五髒置諸馬氏腹令托生矣自是追呼稍稀或十日方一去但云磨勘文案未畢所言受罪亦不見其余但拷問科決而已又嘗言當邑某坊曲某姓名人合至某月日卒至時更無差謬又鄭君自云某即合得攝安丰尉至明年正月三日果為崔中丞邀攝安丰縣尉皆其妻素知之自正月已后更免其追呼矣鄭君自有記録四十余紙此略而言也
