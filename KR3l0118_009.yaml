body:
  text: 李少君李少君李少君者齊人也漢武帝招募方士少君於安期先生得神丹爐火之方家貧不能辦藥謂弟子曰老將至矣而財不足雖躬耕力作不足以致辦今天子好道欲往見之求為合藥可得恣意乃以方上帝云丹砂可成黃金金成服之升仙臣常遊海上見安期先生食棗大如瓜天子甚尊敬之賜遺無數少君嘗與武安侯飲食座中有一老人年九十餘少君問其名乃言曾與老人祖父遊夜明鈔本夜作射見小兒從其祖父吾故識之時一座盡驚又少君見武帝有故銅器因識之曰齊桓公常陳此器於寢座帝按言觀其刻字果齊之故器也因知少君是數百歲人矣視之如五十許人面色肌膚甚有光澤口齒如童子王公貴人聞其能令人不死莫不仰慕所遺金錢山積少君乃密作神丹丹成謂帝曰陛下不能絶驕奢遣聲色殺伐不止喜怒不勝萬里有不歸之魂市曹有流血之刑神丹大道未可得成乃以少藥方與帝少君便稱疾是夜帝夢與少君俱上嵩高山半道有使者乘龍持節雲中來言太乙請少君帝遂覺即使人問少君消息且告近臣曰朕昨夢少君捨朕去少君乃病困帝往視之並使人受其方事未竟而卒帝曰少君不死故化去耳及斂忽失尸所在中表衣悉不解如蟬蛻也帝猶增歎恨求少君不勤也初少君與朝議郎董仲躬相親愛仲躬宿有疾體枯氣少少君乃與其成藥二劑並其方用戊巳之草後土脂黃精根獸沈肪先莠之根百卉花釀亥月上旬合煎銅器中使童子沐浴潔淨調其湯火使合成雞子三枚為程服盡一劑身體便輕服三劑齒落更生五劑年壽長而不復傾仲躬為人剛直博學五經然不達道術笑世人服藥學道頻上書諫武帝以為人生則命衰老有常非道術所能延意雖見其有異將為天性非術所致得藥竟不服又不問其方少君去後數月仲躬病甚常聞武帝說前夢恨惜少君仲躬憶少君所留藥試服之未半乃身體輕壯其病頓愈服盡氣力如年少時乃信有長生不死之道解官行求道士問其方竟不能悉曉仲躬唯得髮不白形容盛甚年八十餘乃死囑其子道生曰我少得少君方藥初不信事後得力無能解之懷恨于黃泉矣汝可行求人間方術之事解其方意長服此藥必度世也時有文成將軍亦得少君術事武帝帝後遣使誅之文成謂使者曰為吾謝帝不能忍少日而敗大事乎帝好自愛後三十年求我於成山方共事不相怨也使者還具言之帝令發其棺視之無所見唯有竹筒一枚帝疑其弟子竊其尸而藏之乃收捕檢問其跡帝乃大悔誅文成後復徵諸方士更於甘泉祀太乙又別設一座祀文成帝親執禮焉原闕出處查出神仙傳孔元方許昌人也常服松脂茯苓松實等藥老而益少容如四十許人郤元節左元放皆為親友俱棄五經當世之人事專修道術元方仁慈惡衣蔬食飲酒不過一升年有七十餘歲道家或請元方會同飲酒次至元方元方作一令以杖拄地乃手把杖倒豎頭在下足向上以一手持杯倒飲人莫能為也元方有妻子不畜餘財頗種五穀時失火諸人並來救之出屋下衣糧床几元方都不救唯箕踞籬下視火其妻促使元方助收物元方笑曰何用惜此又鑿水邊岸作一窟室方廣丈餘元方入其中斷穀或一月兩月乃復還家人亦不得往來窟前有一柏樹生道後棘草間委曲隱蔽弟子有急欲詣元方窟室者皆莫能知後東方有一少年姓馮名遇好道伺候元方便尋窟室得見曰人皆來不能見我汝得見似可教也乃以素書二卷授之曰此道之要言也四十年得傳一人世無其人不得以年限足故妄授若四十年無所授者即八十年而有二人可授者即頓接二人可授不授為閉天道不可授而授為泄天道皆殃及子孫我已得所傳吾其去矣乃委妻子入西嶽後五十餘年暫還鄉里時人尚有識之者出神仙傳王烈王烈者字長休邯鄲人也常服黃精及鉛年三百三十八歲猶有少容登山歷險行步如飛少時本太學書生學無不覽常以人談論五經百家之言無不該博中散大夫譙國嵇叔夜甚敬愛之數數就學共入山遊戲採藥後烈獨之太行山中忽聞山東崩圮圮原作地明鈔本作玘今改殷殷如雷聲烈不知何等往視之乃見山破石裂數百丈兩畔皆是青石石中有一穴口經闊尺許中有青泥流出如髓烈取泥試丸之須臾成石如投熱蠟之狀隨手堅凝氣如粳米飯嚼之亦然烈合數丸如桃大用攜少許歸乃與叔夜曰吾得異物叔夜甚喜取而視之已成青石擊之𤩧𤩧如銅聲叔夜即與烈往視之斷山以復如故烈入河東抱犢山中見一石室室中白石架架上有素書兩卷烈取讀莫識其文字不敢取去卻著架上暗書得數十字形體以示康康盡識其字烈喜乃與康共往讀之至其道徑了了分明比及又失其石室所在烈私語弟子曰叔夜未合得道故也又按神仙經云神山五百年輒開其中石髓出得而服之壽與天相畢烈前得者必是也河東聞喜人多纍世奉事烈者晉永寧年中出洛下遊諸處與人共戲鬭射烈挽二石弓射百步十發矢九破的一年復去又張子道者年九十餘拜烈烈平坐受之座人怪之子道曰我年八九歲時見顏色與今無異吾今老矣烈猶有少容後莫知所之出神仙傳焦先焦先者字孝然河東人也年一百七十歲常食白石以分與人熟煮如芋食之日日入山伐薪以施人先自村頭一家起周而復始負薪以置人門外人見之鋪席與坐為設食先便坐亦不與人語負薪來如不見人便私置於門間便去連年如此及魏受禪居河之湄結草為庵獨止其中不設床席以草褥襯坐其身垢污濁如泥潦或數日一食行不由徑不與女人交游衣弊則賣薪以買故衣著之冬夏單衣太守董經因往視之又不肯語經益以為賢彼遭野火燒其庵人往視之見先危坐庵下不動火過庵燼先方徐徐而起衣物悉不焦灼又更作庵天忽大雪人屋多壞先庵倒人往不見所在恐已凍死乃共拆庵求之見先熟臥於雪下顏色赫然氣息休休如盛暑醉臥之狀人知其異多欲從學道先曰我無道也或忽老忽少如此二百餘歲後與人別去不知所適所請者竟不得一言也出神仙傳孫登孫登者不知何許人也恆止山間穴地而坐彈琴讀易冬夏單衣天大寒人視之輒被髮自覆身發長丈餘又雅容非常歷世見之顏色如故市中乞得錢物轉乞貧下更無餘資亦不見食時楊駿為太傅使傳迎之問訊不答駿遺以一布袍亦受之出門就人借刀斷袍上下異處置於駿門下又復斫碎之時人謂為狂後乃知駿當誅斬故為其象也駿録之不放去登乃卒死駿給棺埋之於振橋後數日有人見登在董馬坡因寄書與洛下故人嵇叔夜有邁世之志曾詣登登不與語叔夜乃扣難之而登彈琴自若久之叔夜退登曰少年才優而識寡劣於保身其能免乎俄而叔夜竟陷大辟叔夜善彈琴於是登彈一絃之琴以成音曲叔夜乃歎息絶思也出神仙傳呂文敬呂恭字文敬少好服食將一奴一婢於太行山中採藥忽見三人在谷中問恭曰子好長生乎乃勤苦艱險如是耶恭曰實好長生而不遇良方故採服此藥冀有微益耳一人曰我姓呂字文起次一人曰我姓孫字文陽次一人曰我姓王字文上三人皆太清太和府仙人也時來採藥當以成新學者公既與我同姓又字得吾半支此是公命當應常生也若能隨我採藥語公不死之方恭即拜曰有幸得遇仙人但恐暗塞多罪不足教授耳若見采收是更生之願也即隨仙人去二日乃授恭祕方一首因遣恭去曰可視鄉里恭即拜辭三人語恭曰公來二日人間己二百年矣恭歸家但見空宅子孫無復一人也乃見鄉里數世後人趙輔者問呂恭家人皆何所在輔曰君從何來乃問此久遠人也吾昔聞先人說云昔有呂恭者持奴婢入太行山採藥遂不復還以為虎狼所食已二百餘年矣恭有數世子孫呂習者居在城東十數里作道士民多奉事之推求易得耳恭承輔言到習家扣門問訊奴出問公從何來恭曰此是我家我昔隨仙人去至今二百餘年習聞之驚喜跣出拜曰仙人來歸悲喜不能自勝公因以神方授習而去習已年八十服之即還少壯至二百歲乃入山中子孫世世不復老死出神仙傳沈建丹陽人也世為長吏建獨好道不肯仕宦學導引服食之術還年卻老之法又能治病病無輕重治之即愈奉事之者數百家建嘗欲遠行寄一婢三奴驢一頭羊十口各與藥一丸語主人曰但纍屋不煩飲食也便去主人大怪之曰此客所寄十五口不留寸資當若之何建去後主人飲奴婢奴婢聞食氣皆逆吐不用以草飼驢羊驢羊避去不食或欲抵觸主人大驚愕百餘日奴婢體貌光澤勝食之時驢羊皆肥如飼建去三年乃還各以藥一丸與奴婢驢羊乃飲食如故建遂斷穀不食輕舉飛行或去或還如此三百餘年乃絶跡不知所之也出神仙傳
