body:
  text: 狗國狗國陵州刺史周遇不茹葷血嘗語劉恂云頃年自青杜之海歸閩遭惡風飄五日夜不知行幾千里也凡歷六國第一狗國同船有新羅云是狗國逡巡果見如人裸形抱狗而出見船驚走又經毛人國形小皆被發蔽面身有毛如狖又到野叉國船抵暗石而損遂般人物上岸伺潮落閣船而修之初不知在此國有數人同入深林采野蔬忽為野叉所逐一人被擒余人驚走回顧見數輩野叉同食所得之人同舟者驚怖無計頃刻有百餘野叉皆赤發裸形呀口怒目而至有執木槍者有雌而挾子者篙工賈客五十余人遂齊將弓弩槍劍以敵之果射倒二野叉即舁拽明嘯而遁既去遂伐木下寨以防再來野叉畏弩亦不復至駐兩日修船方畢隨風而逝又經大人國其人悉長大而野見船上鼓噪即驚走不出又經流虯國其國人麼麼一概皆服麻布而有禮競將食物求易釘鐵新羅客亦半譯其語遣客速過言此國遇華人飄泛至者慮有災禍既而又行經小人國其人裸形小如五六歲兒船人食盡遂相率尋其巢穴俄頃果見捕得三四十枚以歸烹而充食后行兩日遇一洲島而取水忽有群山羊見人但聳視都不驚避既肥且偉初疑島上有人牧養而又絶無人蹤捕之僅獲百口皆食之南蠻南道之酋豪多選鵝之細毛夾以布帛絮而為被復縱橫納之其溫柔不下于挾纊也俗云鵝毛柔暖而性冷偏宜覆嬰兒辟驚癇也縛婦民縛婦民喜他室女者率少年持白梃往趨墟路值之俟過即共擒縛歸一二月與其妻首罪俗謂之縛婦也南海人南海男子女人皆縝發每沐以灰投流水中就水以沐以彘膏其發至五六月稻禾熟民盡髡鬻于市既髡復取彘膏涂來歲五六月又可鬻又南海解牛多女人謂之屠婆屠娘皆縛牛于大木執刀以數罪某時牽若耕不得前某時乘若渡水不時行今何免死耶以策舉頸揮刀斬之南海貧民妻方孕則詣富室指腹以賣之俗謂指腹賣或己子未勝衣鄰之子稍可賣往貸取以鬻折杖以識其短長俟己子長與杖等即償貸者鬻男女如糞壤父子兩不戚戚日南天寶實録云日南廄山連接不知幾千里裸人所居白民之后也刺其胸前作花有物如粉而紫色畫其兩目下去前二齒以為美飾拘彌國順宗即位年拘彌之國貢卻火雀一雌一雄履水珠常堅冰變晝草其卻火雀純黑大小類燕其聲清亮不并尋常禽鳥置于烈火中而火自散上嘉其異遂盛于火精籠懸于寢殿夜則宮人并蠟炬燒之終不能損其毛羽履水珠色黑類鐵大如雞卵其上鱗皴其中有竅云將入江海可長行洪波之上下上始不謂之實遂命善游者以五色絲貫之系之于左臂毒龍畏之遣入龍池其人則步驟于波上若在平地亦潛于水中良久復出而遍體略無沾濕上奇之因以御饌賜使人至長慶中嬪御試弄于海池上遂化為異龍入于池內俄而云煙暴起不復追討矣常堅冰云其國有大凝山其中有冰千年不釋及繼至京師潔冷如故雖盛暑赫日終不消嚼之即與中國冰凍無異變晝草類芭蕉可長數尺而一莖千葉樹之則百步內昏黑如夜始藏于百寶匣其上緘以胡畫及上見而怒曰背明向暗此草何足貴也命并匣焚之于使前使初不為樂及退謂鴻臚曰本國以變晝為異今皇帝以向暗為非可謂明德矣南詔南詔以十二月十六日謂之星回節日游于避風台命清平官賦詩驃信詩曰避風善闡台極目見藤越悲哉古與今依然煙與月自我居震旦翊衛類夔契伊昔經皇運艱難仰忠烈不覺歲云暮感極星回節元昶同一心子孫堪貽厥清平官趙叔達曰法駕避星回波羅毗勇猜河闊冰難合地暖梅先開下令俚柔洽獻賝弄揀來願將不才質千載侍游台獠婦南方有獠婦生子便起其夫臥床褥飲食皆如乳婦稍不衛護其孕婦疾皆生焉其妻亦無所苦炊爨樵蘇自若又云越俗其妻或誕子經三日便澡身于溪河返具糜以餉壻壻擁衾抱雛坐于寢榻稱為産翁其顛倒有如此南中僧南人率不信釋氏雖有一二佛寺吏課其為僧以督責釋之土田及施財間有一二僧喜擁婦食肉但居其家不能少解佛事土人以女配僧呼之為師郎或有疾以紙為圓錢置佛像旁或請僧設食翌日宰羊豕以啖之目曰除齊又南中小郡多無緇流每宣德音須假作僧道陪位唐昭宗即位柳韜為容廣宣告使赦文到下屬州崖州自來無僧皆臨事差攝宣時有一假僧不伏排位太守王弘夫怪而問之僧曰役次未當差遣編并去歲已曾攝文宣王今年又差作和尚見者莫不絶倒番禺廣州番禺縣常有部民諜訴云前夜亡失蔬圃今認得在于某處請縣宰判狀往取之有北客駭其說因詰之民云海之淺水中有藻荇之屬被風吹沙與藻荇相雜其根既浮其沙或厚三五尺處可以耕墾或灌或圃故也夜則被盜者盜之百餘里外若桴篾之乘流也以是植蔬者海上往往有之又有在番禺逄端午聞街中喧然賣相思藥聲訝笑觀之乃老媼荷揭山中異草鬻于富婦人為媚男藥用此日采取為神又云采鵲巢中獲兩小石號鵲枕此日得之者佳婦人遇之有抽金簪解耳璫而償其直者嶺南女工嶺南無問貧富之家教女不以針縷績紡為功但躬庖廚勤刀機而已善醯鹽菹鮓者得為大好女矣斯豈遐裔之天性歟故俚民爭婚聘者相與語曰我女裁袍補襖即灼然不會若修治水蛇黃鱔即一條必勝一條矣芋羹百越人好食蝦蟆凡有筵會斯為上味先于釜中置水次下小芋烹之候湯沸如魚眼即下其蛙乃一一捧芋而熟如此呼為抱芋羹又或先于湯內安筍笴后投蛙及進于筵上皆執筍笴瞪目張口而座客有戲之曰賣燈心者又云疥皮者最佳擲于沸湯即躍出其皮自脫矣皮既脫乃可以修饌時有一叟聞茲語大以為不可云切不得除此錦襖子其味絶珍聞之者莫不大笑蜜唧嶺南僚民好為蜜唧即鼠胎未瞬通身赤蠕者飼之以蜜釘之筵上囁囁而行以箸挾取咬之唧唧作聲故曰蜜唧南州王蜀有劉隱者善于篇章嘗說少年繼益部監軍使書索于黔巫之南謂之南州州多山險路細不通乘騎貴賤皆策杖而行其囊橐悉皆差夫背負夫役不到處便遣縣令主薄自荷而行將至南州州牧差人致書迓之至則有一二人背籠而前將隱入籠內掉手而行凡登山入谷皆絶高絶深者日至百所皆用指爪攀緣寸寸而進在于籠中必與負荷者相背而坐此即彼中車馬也洎至近州州牧亦坐籠而迓于郊其郡在桑林之間茅屋數間而已牧守皆華人甚有心義翌日牧曰須略謁諸大將乎遂差人引之衙院衙各相去十里亦在林木之下一茅齊大校三五人逢迎極至于是烹一犢兒乃先取犢兒結腸中細糞置在盤筵以箸和調在醯中方餐犢肉彼人謂細糞為聖齊若無此一味者即不成局筵矣諸味將半然后下麻蟲裹蒸裹蒸乃取麻蕨蔓上蟲如今之刺猱者是也以荷葉裹而蒸之隱勉強餐之明日所遺甚多
