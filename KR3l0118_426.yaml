body:
  text: 白虎白虎秦昭襄王時白虎為害自秦蜀巴漢患之昭王乃重募國中有能殺虎者邑萬家金帛如之于是夷朐韌廖仲藥何射虎秦精等乃作白竹弩如高樓上射白虎中頭三矢白虎常從群虎瞋恚盡搏殺群虎大吼而死昭王嘉之曰虎歷四郡害千二百人一朝患除功莫大焉欲如約且嫌其夷人乃刻石為盟約復夷人頃田不租十妻不井傷人不論殺人不死秦犯夷輸黃金一兩夷犯秦輸清酒一壺夷人安之漢景帝漢景帝好游獵見虎不能得之乃為珍饌祭所見之虎帝乃夢虎曰汝祭我欲得我牙皮耶我自殺從汝取之明日帝入山果見此虎死在祭所乃命剝取皮牙余肉復為虎種僮種僮為畿令常有虎害人僮令設檻得二虎僮曰害人者低頭一虎低頭僮取一虎放之自是猛獸皆出境吏目之為神君封邵漢中有虎生角道家云虎千歲則牙蛻而角生漢宣城郡守封邵一日忽化為虎食郡民民呼曰封使君因去不復來故時人語曰無作封使君生不治民死食民亭長長沙有民曾作檻捕虎忽見一亭長赤幘大冠在檻中因問其故亭長怒曰昨被縣召誤入此中耳于是出之乃化為虎而去嚴猛晉時會稽嚴猛婦出采薪為虎所害此后猛行至蒿中忽見婦云君今日行必遭不善我當相免也既而俱前忽逢一虎跳梁向猛婦舉手指麾狀如遮護須臾有一胡人荷戟而過婦因指之虎即擊胡猛方獲免袁雙晉孝武太元五年譙郡譙縣袁雙家貧客作暮還家道逢一女年十五六姿容端正即與雙為婦五六年后家資甚丰又生二男至十歲家乃巨富后里有新死者葬后此女逃往至墓所乃解衣脫釧挂樹便變形作虎發冢曳棺出墓外取死人食之食飽后還變作人有見之者竊語其壻卿婦非人恐將相害雙聞之不信經時復有死者輒復如此后將其壻共看之述知其實后乃越縣趨墟還食死人吳道宗晉義熙四年東陽郡太末縣吳道宗少失父與母居未娶婦一日道宗他適鄰人聞屋中窣磕之聲窺不見其母但有烏斑虎在屋中鄰人恐虎食道宗母遂鳴鼓會里人共救之圍宅突進不見有虎但見其母語如平常不解其意兒還母語之曰宿罪見譴當有變化事后一月忽失母縣界內虎災屢起皆云烏斑虎百姓患之衆共格之傷數人后人射虎箭帶膺并戟刺中其腹然不能即死經數日后虎還其家不能復人形伏床上而死其兒號泣葬之如母牧牛兒晉復陽縣里民家兒常牧牛牛忽舐此兒舐處肉悉白兒俄而死其家葬此兒殺牛以供賓客凡食此牛肉男女二十余人悉變作虎師道宣晉太元元年江夏郡安陸縣師道宣年二十二少未了了后忽發狂變為虎食人不可紀后有一女子樹上采桑虎取食之竟乃藏其叉釧于山石間后復人形知而取之經年還家復為人遂出仕官為殿中令史夜共人語忽道天地變怪之事道宣自云吾嘗得病發狂遂化作虎啖人言其姓名同坐人或坐人或有食其父子兄弟者于是號哭捉送赴官遂餓死建康獄中謝允歷陽謝允字道通少為賊所掠為奴于蔣鳳家常于山中見阱中虎饑因出之后詣具自白令長不為申理考訊無不至允夜夢人曰此中易入難出汝自有慈惠當相拯拔覺見一少年通身黃衣遙在柵外與允語獄吏以告令長令長由是不敢誣辱即還乃上武當山時唐公亮聞而愍之給以資履遂于襄陽見道士曰吾師戴先生者成人君子嘗言有志者與之俱來得非爾耶隨入山齊三日進見之乃昔日所夢人也問允欲見黃衣童否賜以神藥三丸服之不饑渴無所思欲先生亦無常處時有祥光紫氣蔭其上芬馥之氣遍于山谷鄭襲滎陽鄭襲晉太康中為太守門下騶忽如狂奄失其所經日尋得裸身呼吟膚血淋漓問其故社公令其作虎以斑皮衣之辭以執鞭之士不堪號躍神怒還使剝皮皮已著肉瘡毀慘痛旬日乃差劉廣雅彭城劉廣雅以太元元年為京府佐被使還路經竹里亭多虎劉防衛甚至牛馬系于前手戟布于地中宵與士庶同睡虎乘間跳入獨取劉而去易拔晉時豫章郡吏易拔義熙中受番還家違遁不返郡遣追見拔言語如常亦為設食使者催令束妝拔因語曰女看我面乃見眼目角張身有黃斑色便豎一足徑出門去家先依山為居至麓即變成三足大虎豎一足即成其尾也蕭泰梁衡山侯蕭泰為雍州刺史鎮襄陽時虎甚暴村門設檻機發村人炬火燭之見一老道士自陳云從村丐乞還誤落檻里共開之出檻即成虎奔馳而去黃乾梁末始興人黃乾有妹小珠聘同縣人李肅小妹共嫂入山采木實過神廟而小珠在廟戀慕不肯歸及將還復獨走上廟見人即入草中乾妻來告肅肅以為更有他意肅被縣召將一伴夜還值風雨見廟屋有火二人向火炙衣見神床上有衣少間聞外有行聲二人惶怖入神床屏風后須臾見一虎振尾奮迅直至火邊自脫牙爪卷其皮置床上著衣向火坐肅看乃小珠也肅徑出抱之與語不應明日將歸送向乾家乃閉置一室擲生肉則接食之其恆看守少日又成虎郡縣檢驗村人乃將弓弩上舍即發屋射殺之明日有虎暴百姓白日閉門太守熊基表聞之酋耳獸唐天后中涪州武龍界多虎暴有一獸似虎而絶大日正午逐一虎直入人家噬殺之亦不食由是縣界不復有虎矣録奏檢瑞圖乃酋耳不食生物有虎暴則殺之也虎塔唐天后中成王千里將一虎子來宮中養損一宮人遂令生餓數日而死天后令葬之其上起塔設千人供勒碑號為虎塔至今猶在傅黃中唐傅黃中為越州諸暨縣令有部人飲大醉夜中山行臨崖而睡忽有虎臨其上而嗅之虎須入醉人鼻中遂噴嚏聲震虎遂驚躍便落崖腰胯不遂為人所得郴州佐史唐長安年中郴州佐史因病而為虎將啖其嫂村人擒獲乃佐史也雖形未全改而尾實虎矣因系樹數十日還復為人長史崔玄簡親問其故佐史云初被一虎引見一婦人盛服諸虎恆參集各令取當日之食時某新預虎列質未全不能別覓他人將取嫂以供遂為所擒今雖作虎不得尚能其聲耳簡令試之史乃作虎聲震駭左右檐瓦振落巴人巴人好群伐樹木作板開元初巴人百餘輩自褒中隨山伐木至太白廟廟前松樹百餘株各大數十圍群巴喜曰天贊也止而伐之已倒二十余株有老人戴帽拄杖至其所謂巴曰此神樹何故伐之群巴初不輟作老人曰我是太白神已倒者休乞君未倒者無宜作意巴等不止老人曰君若不止必當俱死無益也又不止老人乃登山呼斑子倏爾有虎數頭相繼而至噬巴殆盡唯五六人獲免神謂之曰以汝好心因不令殺宜速去也其倒樹至天寶末尚存有詔修理內殿楊國忠令人至山所宣敕取樹作板以用焉神竟與之峽口道士開元中峽口多虎往來舟船皆被傷害自后但是有船將下峽之時即預一人充飼虎方舉船無患不然則船中被害者衆矣自此成例船留二人上岸飼虎經數日其后有一船內皆豪強數內有二人單窮被衆推出令上岸飼虎其人自度力不能拒乃為出船而謂諸人曰某貧窮合為諸公代死然人各有分定苟不便為其所害某別有懇誠諸公能允許否衆人聞其語言甚切為之愴然而問曰爾有何事其人曰某今便上岸尋其虎蹤當自別有計較但懇為某留船灘下至日午時若不來即任船去也衆人曰我等如今便泊船灘下不止住今日午時兼為爾留宿俟明日若不來船即去也言訖船乃下灘其人乃執一長柯斧便上岸入山尋虎并不見有人蹤但見虎跡亦已林木深邃其人乃見一路虎蹤甚稠乃更尋之至一山隘泥極甚虎蹤轉多更行半里即見一大石室又有一石床見一道士在石床上而熟寐架上有一張虎皮其人意是變虎之所乃躡足于架上取皮執斧衣皮而立道士忽驚覺已失架上虎皮乃曰吾合食汝汝何竊吾皮其人曰我合食爾爾何反有是言二人爭競移時不已道士詞屈乃曰吾有罪于上帝被謫在此為虎合食一千人吾今已食九百九十九人唯缺汝一人其數當足吾今不幸為汝竊皮若不歸吾必須別更為虎又食一千人矣今有一計吾與汝俱獲兩全可乎其人曰可也道士曰汝今但執皮還船中剪發及須鬢少許剪指爪甲兼頭面腳手及身上各瀝少血二三升以故衣三兩事裹之待吾到岸上汝可拋皮與吾吾取披已化為虎即將此物拋與吾取而食之即與汝無異也其人遂披皮執斧而歸船中諸人驚訝而備述其由遂于船中依虎所教待之遲明道士已在岸上遂拋皮與之道士取皮衣振迅俄變成虎哮吼跳躑又拋衣與虎乃嚙食而去自后更不聞有虎傷人衆言食人數足自當歸天去矣
