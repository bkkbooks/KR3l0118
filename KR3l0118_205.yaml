body:
  text: 卷第二百五樂三羯鼓羯鼓出外夷樂以戎羯之鼓故曰羯鼓其音主太簇一均均原作云據羯鼓録及太平御覽五三八改龜茲部高昌部疏勒部天竺部皆用之次在都曇鼓答臘鼓之下都曇鼓狀腰鼓而小答臘者即揩鼓也雞婁鼓之上如漆桶山桑木為之下以牙床承之擊用兩杖其聲焦殺鳴烈尤宜促促原作但據羯鼓録改曲急破作戟杖連碎之又宜高樓玩景明月清風凌空透遠極異衆樂杖用黃檀狗骨花椒等木須至乾緊絶濕氣而復柔膩乾取發越響膩取戰裊健舉捲用剛鐵鐵當精鍊卷當至勻若不剛即應絛高下搊捩不停不勻即鼓面緩急若琴徽之㪇病矣出羯鼓録玄宗唐玄宗洞曉音律由之天縱凡是管絃必造其妙若製作調曲隨意即成不立章度取適短長應指散聲皆中點指至於清濁變轉律呂呼召君臣事物迭相制使雖古之夔曠不能過也尤愛羯鼓常云八音之領袖諸樂不可為比嘗遇二月初詰旦巾櫛方畢時宿雨始晴景色明麗小殿內亭柳杏將吐睹而歎曰對此景物豈可不與他判斷之乎左右相目將命備酒獨高力士遣取羯鼓上旋命之臨軒縱擊一曲曲名春光好上自製也神思自得及顧柳杏皆已發拆指而笑謂嬪嬙內官曰此一事不喚我作天公可乎皆呼萬歲又製秋風高每至秋空迥徹纖翳不起即奏之必遠風徐來庭葉徐下其妙絶入神如此出羯鼓録玄宗嘗伺察諸王寧王夏中揮汗鞔鼓所讀書乃龜茲樂譜也上知之喜曰天子兄弟當極此樂出酉陽雜俎又汝陽王璡寧王長子也姿容妍美秀出藩邸玄宗特鍾愛焉自傳授之又以其聰悟敏慧妙達其旨每隨遊幸頃刻不捨璡嘗戴砑絹帽打曲上自摘紅槿花一朵置於帽上其二物皆極滑久之方安遂奏舞山香一曲而花不墜本色所謂定頭項難在不搖動也上大喜笑賜金器因誇曰花奴璡小名姿質明瑩肌髮光細非人間人必神仙謫墜也寧王謙謝隨而短斥之上笑曰大哥不必過慮阿瞞自是相師夫帝王之相且須英特越逸之氣不然有深沈包育之度花奴但秀邁人悉無此狀固無猜也而又舉止閒雅當更得公卿間令譽耳寧王又謝之而曰若於此臣乃輸之上曰若此一條阿瞞亦輸大哥矣寧王又謙謝上笑曰阿瞞贏處多大哥亦不用撝揖衆皆歡賀玄宗性俊邁酷不好琴曾聽彈正弄未及畢叱琴者曰待詔出去謂內官曰速召花奴將羯鼓來為我解穢又黃幡綽亦知音上曾使人召之不時至上怒絡繹遣使尋捕之綽既至及殿側聞上理鼓固止謁者不令報俄頃上又問侍官奴來未綽又止之曲罷復改曲才三數十聲綽即走入上問何處來曰有親故遠適送至城外上頷之鼓畢上謂曰賴稍遲我向來怒意至必禍焉適方思之長入供奉五十餘日暫一日出外不可不許他東西過往綽拜謝畢內官有相偶語笑者上詰之具言綽尋至聽鼓而候其時入上問綽綽語上方怒其解怒之際皆無少差誤上奇之復厲聲謂之曰我心脾骨下事安有侍官奴聽小鼓能料之耶今且謂我如何綽遂走下階面北鞠躬大聲曰奉敕監明鈔本監作豎金雞上大笑而止並出羯鼓録宋璟宋開府璟雖耿介不群亦深好聲樂尤善羯鼓始承恩顧與玄宗論鼓事曰不是青州石末即是魯山花甕明鈔本甕作瓷下同撚小碧上掌下須有朋去聲肯聲據此乃是漢震第一鼓也且磉用石末花甕固是腰鼓掌不明鈔本不作下朋去聲肯聲是以手指非羯鼓明矣第二鼓者左以杖右以手指杖字原闕據明鈔本補璟又謂上曰頭如青山峰手如白雨點按此即羯鼓之能事山峰取不動雨點取其急玄宗與璟兼善兩鼓也而羯鼓偏好以其比漢震稍雅細焉開府之家悉傳之東都留守鄭叔明祖母即開府之女令尊賢里鄭氏第有小樓即宋夫人習鼓之所也出羯鼓録李龜年李龜年善羯鼓玄宗問卿打多少杖對曰臣打五十杖訖上曰汝殊未我打卻三豎匱也後數年又聞打一豎匱因錫一拂枚羯鼓捲出傳記曹王皋嗣曹王皋有巧思精於器用為荊州節度使有羈旅士人懷二捲欲求通謁先啓於賓府觀者訝之曰豈足尚耶士曰但啓之尚書當解矣及見皋捧而歎曰不意今日獲逢至寶指其剛勻之狀賓坐唯唯或腹非之皋曰諸公未必信命取食柈自選其極平者遂重二捲於柈心以油注捲滿而油不寖漏相蓋契際也皋曰此必開元天寶中供御捲不然無以至此問其所自客曰先人在黔得於高力士之家衆方深伏原闕出處據本書卷二百三十一作出羯鼓録李琬廣德中蜀客前雙流縣丞李琬者亦能之調集至長安居務本里嘗夜聞羯鼓曲頗工妙於月下步尋至一小宅門戶極卑隘叩門請謁謂鼓工曰君所擊者豈非耶婆色雞乎一本作耶婆娑雞雖至精能而無尾何也工大異之曰君固知音者此事無有知某太常工人也祖父傳此藝尤能此曲近者張儒入長安其家流散父沒河西此曲遂絶今但按舊譜數本尋之竟無結尾之聲因夜夜求之也琬曰曲下意盡乎工曰盡琬曰意盡即曲盡又何索焉工曰奈聲不盡何琬曰可言矣夫曲有如此者須以他曲解之方可盡其聲也夫耶婆娑雞當用屈柘急遍解工如所教果相諧協聲意皆盡如柘枝用渾解甘州用急了解之類也明鈔本急了作吉子工泣而謝之即言於寺卿奏為主簿後纍官至太常少卿宗正卿出羯鼓録杜鴻漸代宗朝宰相杜鴻漸亦能羯鼓永泰中為三按羯鼓録三下有州字副元帥西川節度使至成都李琬有削杖者在蜀一杖獻鴻漸鴻得之示與衆曰此尤物也當衣衾中收貯積時矣匠曰某與脊溝中養者十年及出出字原闕據羯鼓録補蜀至利州西界望嘉驛路入漢川矣自西南來始會嘉陵江頗有山水景致其夜月色又佳乃與從事楊炎杜悰明鈔本悰作亞輩登驛樓望江月行酒宴語曰今日出艱危猜迫外即不辱命於朝廷內即免中禍於微質既保此安步又瞰此殊境安得不自賀乎遂命家僮取鼓與板笛以所得杖奏數曲四山猿鳥皆驚飛噭走從事悉異之曰昔夔之搏拊百獸舞庭此豈遠耶鴻漸曰若某於此稍曾致力猶未臻妙尚能及是況至聖御天御天原作遇夫據羯鼓録改賢臣考樂飛走之類何有不感因言此有別墅近花巖閣每遇風景清明即時或登閣奏此初見群羊牧於川下忽數頭躑躅不已某不謂之以鼓然也及止鼓亦止復鼓之亦復然遂以疾徐高下而節之無不應之而變旋有二犬自其家走而吠之及群羊側遂漸止聲仰首若有所聽少選又復宛頸搖尾亦從而變態是知率舞固無難矣近士林中無習之者唯僕射韓皋善亦不甚露為鄂州節度使時聞於黃鶴樓一兩習而已出羯鼓録銅鼓蠻夷之樂有銅鼓焉形如腰鼓而一頭有面鼓面圓二尺許面與身連全用銅鑄其身遍有蟲魚花草之狀通體均勻厚二分以來爐鑄之妙實為奇巧擊之響亮不下鳴鼉貞元中驃國進樂有玉螺銅鼓玉螺皆螺之白者非琢玉所為也即知南蠻酋首之家皆有此鼓也張直方咸通末幽州張直方貶龔州刺史到任後修葺州城因掘土得一銅鼓滿任載以歸京到襄漢以為無用之物遂捨延壽慶院用大木魚懸於齊室今見存焉並出嶺表録異鄭續僖宗朝鄭續鎮番禺日有林藹者為高州太守有牧兒因放牛聞田中有蛤鳴蛤即是蝦蟆牧童遂捕之蛤跳入一穴掘之深大即蠻酋冢也蛤乃無蹤穴中得一銅鼓其色翠緑土蝕數處損缺其上隱起多鑄蛙黽之狀疑其鳴哈即鼓精也遂狀其緣由納於廣帥懸於武庫今尚存焉出嶺表録異羅黑黑太宗時西國進一胡善彈琵琶作一曲琵琶絃撥倍粗上每不欲番人勝中國乃置酒高會使羅黑黑隔帷聽之一遍而得謂胡人曰此曲吾宮人能之取大琵琶遂於帷下令黑黑彈之不遺一字胡人謂是宮女也驚歎辭去西國聞之降者數十國出朝野僉載裴洛兒貞觀中彈琵琶裴洛兒始廢撥用手今俗所謂搊琵琶是也出國史異纂楊妃開元中有中官白秀貞自蜀使回得琵琶以獻其槽邏皆桫檀為之溫潤如玉光耀可鑒有金縷紅文影成雙鳳楊妃每抱是琵琶奏於梨園音韻淒清飄如雲外而諸王貴主自虢國已下競為貴妃琵琶弟子每受曲畢皆廣有進獻出談賓録段師古琵琶絃用鶤雞筋開元中段師能彈琵琶用皮絃賀懷智破撥彈之不能成聲出酉陽雜俎漢中王瑀漢中王瑀見康崑崙彈琵琶云琵聲多琶聲琶聲二字原闕據傳載補少亦未可彈五十四絃大絃也自下而上謂之琵自上而下謂之琶出傳記明鈔本作出傳載韋應物韋應物為蘇州刺史有屬官因建中之亂得國工康崑崙琴瑟琵琶至是送官表進入內出國史補宋沇宋開府孫沇有音律之學貞元中進樂書二卷德宗覽而嘉焉又知是璟之孫遂召賜對坐與論音樂喜數日又召至宣徽張樂使觀焉曰有舛誤乖濫悉可言之沇曰容臣與樂官商榷講論具狀條奏上使宣徽使教坊與樂官參議數日然後奏進樂工多言沇不解聲律不審節拍兼又瞶疾不可議樂上頗異之又宣召見對曰臣年老多疾耳實失聰若逮於音律不至無業上又使作樂曲罷問其得失承稟舒遲衆工多笑之沇顧笑忿怒作色奏曰曲雖妙其間有不可者上驚問之即指一琵琶云此人大逆戕忍不日間即抵法不宜在至尊前又指一笙云此人神魂已遊墟墓不可更令供奉上大駭焉令主者潛伺察之既而琵琶者為同儕告訐稱其六七年前其父自縊不得端由即今按鞠遂伏罪笙者乃憂恐不食旬日而卒上轉加欽重面賜章服纍召對每令察樂樂工悉惴恐脅息不敢正視沇懼罹禍辭病而退出羯鼓録皇甫直蜀將皇甫直別音律擊陶器能知時月好彈琵琶元和中嘗造一調乘涼臨水池彈之本黃鍾而聲入蕤賓因更絃再三奏之聲尤蕤賓也直甚惑不悅自意不祥隔日又奏於池上聲如故試彈於他處則黃鍾也直因切調蕤賓夜復鳴於池上覺近岸波動有物激水如魚跳及下絃則沒矣直遂集客車水竭池窮泥索之數日泥下丈餘得鐵一片乃方響蕤賓鐵也出酉陽雜俎王沂王沂者平生不解絃管忽旦睡至夜乃寤索琵琶絃之成數曲一名雀啅蛇一名胡王調一名胡瓜苑人不識聞聽之者莫不流淚其妹請學之乃教數聲須臾總忘不復成曲出朝野僉載關別駕昭宗末京都名娼妓兒皆為強諸侯所有供奉彈琵琶樂工號關別駕小紅者小名也梁太祖祖原作宗據明鈔本改求之既至謂曰爾解彈手明鈔本手作羊不採桑乎關俯而奏之及出又為親近者俾其彈而飲酒由是失意不久而殂復有琵琶石潀者號石司馬自言早為相國令狐綯見賞俾與諸子渙渢連水邊作名亂後入蜀不隸樂籍多遊諸大官家皆以賓客待之一日會軍校數員飲酒作歡石潀以胡琴在坐非知音者喧譁語笑殊不傾聽潀乃撲檀槽而詬曰某曾為中朝宰相供奉今日與健兒彈而不我聽何其苦哉于時識者歎訝之出北夢瑣言王氏女王蜀黔南節度使王保義有女適荊南高從誨之子保節未行前暫寄羽服性聰敏善彈琵琶因夢異人頻授樂曲所授之人其形或道或俗其衣或紫或黃有一夕而傳數曲有一聽而便記者其聲清越與常異類於仙家紫雲之亞也乃曰此曲譜請元昆製序刊石於甲寅之方其兄即荊南推官王少監貞範也為製序刊石所傳曲有道調宮王宸宮夷則宮神林宮蕤賓宮無射宮玄宗宮黃鐘宮散水宮仲呂宮商調獨指泛清商好仙商側商紅綃商鳳抹商玉仙商角調雙調角醉吟角大呂角南呂角中呂角高大殖角蕤賓角羽調鳳吟羽背風香背南羽背平羽應聖羽玉宮羽玉宸羽風香調大呂調其曲名一同人世有涼州伊州胡渭州甘州緣腰莫靼項明鈔本項作頃疑當作傾盆樂安公子水牯子阿濫泛之屬凡二百以上曲所異者徵調中有湘妃怨哭顏回當時胡琴不彈徵調也王適高氏數年而亡得非謫墜之人乎孫光憲子婦婦原作父據明鈔本改即王氏之姪也記得一兩曲嘗聞彈之亦異事也出北夢瑣言趙辟趙辟彈五絃人或問或問原作聞無據明鈔本改其術辟曰吾之於五絃也始則神遇之終則天隨之方吾浩然眼如耳目如鼻不知五絃為辟辟之為五絃也出國史補徐月華魏高楊王雍美人徐月華能彈臥箜篌為明妃出塞之聲有田僧起能吹笳為壯士歌項羽吟將軍崔延伯出師每臨敵令僧起為壯士聲遂單馬入陳出酉陽雜俎
