body:
  text: 侯元侯元侯元者上黨郡銅鞮縣山村之樵夫也家道貧窶唯以鬻薪為事唐乾符己亥歲於縣西北山中伐薪回憩谷口傍有巨石嶷然若廈屋元對之太息恨己之勞也聲未絕石砉然豁開若洞中有一叟羽服烏帽髯髮如霜曳杖而出元驚愕遽起前拜叟曰我神君也汝何多歉自可於吾法中取富但隨吾來叟復入洞中元從之行數十步廓然清朗田疇砥平時多異花芳草數里過橫溪碧湍流苔鴛鷁泝洄其上長梁夭矯如晴虹焉過溪北左右皆喬松修篁高門渥丹臺榭重複引元之別院坐小亭上簷楹階砌皆奇寶煥然及進食行觴復目所未覩也食畢叟退少頃二童揖元詣便室具湯沐進新衣一襲冠帶竟復導至亭上叟出命僕設淨席於地令元跪席上叟授以祕訣數萬言皆變化隱顯之術元素惷戇至是一聽不忘叟誡曰汝雖有少福合於至法進身然面有敗氣未除亦宜謹密自固若圖謀不軌禍必喪生且歸存思如欲謁吾但至心扣石當有應門者元因拜謝而出仍令一童送之既出洞穴遂泯然如故視其樵蘇已失至家其父母兄弟驚喜曰去一旬謂已碎於虎狼之吻元在洞中如一日耳又訝其服裝華潔神氣激揚元知不可隱乃謂其家人言已遂入靜室中習熟其術期月而術成能變化百物役召鬼魅草木土石皆可為步騎甲兵於是悉收鄉里少年勇悍者為將卒出入陳旌旂幢蓋鳴鼓吹儀比列國焉自稱曰賢聖官有三老左右弼左右將軍等號每朔望必盛飾往謁神君神必戒以無稱兵若固欲舉事宜待天應至庚子歲聚兵數千人縣邑恐其變乃列上上黨帥高公尋命都將以旅討之元馳謁神君請命神君曰既言之矣但當偃旗臥鼓以應之彼見兵威若是必不敢內薄而攻我志之慎勿輕接戰元雖唯諾心計以為我奇術制之有餘且小者不能抗後其大者若之何復示眾以不武也既歸令其黨戒嚴是夜潞兵去元所據險三十里見步騎戈甲蔽山澤甚難之明方陣以前元領千餘人直突之先勝後敗酒酣被擒至上黨縶之府獄嚴兵圍守旦視枷穿中唯燈臺耳失元所在夜分已達銅鍉經詣神君謝罪君怒曰庸奴終違我教今日雖幸而免斧鑕亦行將及矣非吾徒也不顧而入鬱悒趨出後復謁神君虔心扣石石不為開矣而其術漸歇猶為其黨所說是秋率徒掠并州之大谷而并騎適至圍之數重術既不神遂斬之於陣其黨與散歸田里焉功德山唐巢寇將亂中原汴中有妖僧功德山遠近桑門皆歸之至於士庶無不降附者能於紙上畫神寇放入人家令作禍祟幻惑居人通宵繼畫不能安寢或致人疾苦及命功德山贈金作法則患立除之又畫紙作甲兵夜夜與街坊嘶鳴騰踐城郭天明即無所見又多畫其犬焚祝之夜則鳴吠相咬囓於街衢居人不得安眠命而贈之即悄無影響人既異其術趍術者愈眾又滑州亦有一僧頗善妖術與功德山無異公私頗患之時中書令王鐸鎮滑臺遂下令曰南燕地分有災宜善禳之遂自公衙至于諸軍營開啟道場延僧數千人僧數不足遂牒汴州請功德山一行徒眾悉赴之遂以幡花螺鈸迎至衛赴道場之夕分選近上名德入于公衙其餘并令散赴諸營禮懺洎入營悉鍵門而坑之方袍而死者數千人衙中只留功德山已下奠長訊之並是巢賊之黨將欲自二州相應而起咸命誅之襄陽老叟唐并華者襄陽鼓刀之徒也嘗因遊春醉臥漢水濱有一老叟叱起謂曰觀君之貌不是徒博耳我有一斧與君君但持此造作必巧妙通神他日慎勿以女子為累華因拜受之華得此斧後造飛物即飛造行物即行至於上棟下宇危樓高閣固不煩餘刃後因遊安陸間止一富人王枚家枚知華機巧乃請華臨水造一獨柱亭工畢枚盡出家人以觀之枚有一女已喪夫而還家容色殊麗罕有比倫既見深慕之其夜乃踰垣竊入女之室其女甚驚華謂女曰不從我必殺汝女荏苒同心焉其後每至夜竊入女室中他日枚潛知之即厚以賂遺遣華華察其意謂枚曰我寄君之家受君之惠已多矣而復厚賂我我異日無以為答我有一巧妙之事當作一物以奉君枚曰何物也我無用必不敢留華曰我能作木鶴令飛之或有急但乘其鶴即千里之外也枚既嘗聞因許之華即出斧斤以木造成飛鶴一雙唯未成其目枚怪問之華曰必須君齋戒始成之能飛若不齋戒必不爾飛枚遂齋戒其夜華盜其女俱乘鶴而歸襄陽至曙枚失女求之不獲因潛行入襄陽以事告州牧州牧密令搜求果擒華州牧怒杖殺之所乘鶴亦不能自飛青城道士偽蜀青城山道士能幻術往往入錦城施其法有所獲即潛挈歸洞穴或聞其行甚穢官吏中有識者頗惡之後於成都誘引富室及勳貴子弟皆潛而隨之或於幽僻宅院中灑掃焚香設榻張陳帷幌則獨於室內作法或召西王母或巫山神女或麻姑鮑姑神仙皆應召而至與之盃饌寢處生人無異則令學者隙而窺之歡笑罷則自簾帷之前躡而去又忽城中化出金樓眾皆覩之惑眾頗甚其民間少年膏梁子弟滿城如狂少主知其妖密使人擒之累月不獲後有人報云已出笮橋門去因使人逐之乃以豬狗血齎行至青城路上三十餘里及之遂傾血沃之不能施其術及下獄訊之云年年採民家處子住山中行黃帝之道死於巖穴者不知其數豪貴之家頗遭穢淫所通詞款指貴達之門甚多少主不欲彰其惡潛殺之蜀都婦人元和子嘗因暇日出蜀都東郭門見二人踞坐江岸排治舟艦方怒篙棹者且呼且叫忽有婦人衣布襦拜於前有所乞焉其人盛怒且叱之久而不去將加毆擊婦人乃去傍江岸佇立四顧久之以手推腰引步直視二客船其船即似有物牽拽飄然而逝直抵大岸應時粉碎財貨悉皆溺于水二人大駭疑婦人所為欲擒之已亡去矣
