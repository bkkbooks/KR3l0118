body:
  text: 羊祜羊祜晉羊祜三歲時乳母抱行乃令于東鄰樹孔中探得金環東鄰之人云吾兒七歲墮井死曾弄金環失其處所乃驗祜前身東鄰子也王練王練字玄明琅琊人宋侍中父鈱字悉琰晉中書令相識有一胡沙門每瞻鈱風采甚敬悅之輒語同學云若我后生得為此人作子于近願亦足矣鈱聞而戲之曰法師才行正可為弟子耳頃之沙門病亡亡后歲余而練生焉始能言便解外國語及絶國奇珍銅器珠貝生所不見未聞其名即而名之識其産出又自然親愛諸胡過于漢人咸謂沙門審其先身故鈱字之曰阿練遂為大名云向靖女向靖字奉仁河內人也在吳興郡有一女數歲而亡女始病時弄小刀子母奪取不與傷母手喪后一年母又産一女女年四歲謂母曰前時刀子何在母曰無也女曰昔爭刀子故傷母手云何無耶母甚驚怪具以告靖靖曰先刀子猶在不母曰痛念前女故不録之靖曰可更取數個刀子合置一處令女自識女見大喜即取先者崔彥武隋開皇中魏州刺史博陵崔彥武因行部至一邑愕然驚喜謂從者曰吾昔常在此中為婦人今知家處因乘馬入修巷屈曲至一家命叩門主人公年老走出拜謁彥武入家先升其堂視東壁上去地六七尺有高隆處客謂主人曰吾者所讀法華經并金叉五只藏此壁中高處是也其經第七卷尾后紙火燒失文字吾今每誦此經至第七卷尾恆忘失不能記得因令左右鑿壁果得經函開第七卷尾及金叉并如其言主人涕泣曰己妻存日常誦此經叉亦是其物彥武指庭前槐樹吾欲産時自解發置此樹空中試令人探樹中果得發于是主人悲喜彥武留衣物厚給主人而去岐王范開元初岐王范以無子求葉道士淨能為奏天曹聞天曹報答云范業無子淨能又牒天曹為范求子天曹令二人取敬愛寺僧為岐王子鬼誤至善慧寺大德房大德云此故應誤我修兜率天業不當為貴人作子當敬愛寺僧某乙耳鬼遂不見竟以此亡經一年岐王生子年六七歲恆求敬愛寺禮拜王亦知其事任意遊歷至本院若有素及年十余竟不行善唯好持彈彈寺院諸鴿逮盡耳太華公主世傳太華公主者高宗王皇后后身雖為武妃所生而未嘗歡顏見妃輒嗔年數歲忽求念珠左右問何得此物恆言有但諸人不知始皇后雖惡終然其所居之殿及平素玩弄俱在后保母抱公主從殿所過因回指云我珠在殿寶帳東北角使人求之果得焉馬家兒相州滏陽縣智力寺僧玄高俗姓趙氏其兄子先身于同村馬家為兒至貞觀末死臨死之際顧謂母曰兒于趙宗家有宿因緣死后當與宗為孫宗即與其同村也其母弗信乃以墨點兒右肘趙家妻又夢此兒來云當與娘為息因而有娠夢中所見宛然馬家之子産訖驗其黑子還在舊處及兒年三歲無人導引乃自向馬家云此是兒舊舍也采娘鄭氏肅宗時為潤州刺史兄侃嫂張氏女年十六名采娘淑慎有儀七夕夜陳香筵祈于織女是夜夢云輿羽蓋蔽空駐車命采娘曰吾織女汝求何福曰願工巧耳乃遺一金針長寸余綴于紙上置裙帶中令三日勿語汝當奇巧不爾化成男子經二日以告其母母異而觀之則空紙矣其針迹猶在張數女皆卒采娘忽病而不言張氏有娠歎曰男女五人矣皆夭復懷何為將服藥以損之藥至將服采娘昏奄之內忽稱殺人母驚而問之曰某之身終當為男子母之所懷是也聞藥至情急是以呼耳母異之乃不服藥采娘尋卒既葬母悲念乃收常所戲之物而匿之未逾月遂生一男人有動所匿之物兒啼哭張氏哭女其兒亦哭罷即止及能言常收戲弄之物官至柱史劉三復劉三復者以文章見知于李德裕德裕在浙西遣詣闕求試及登第歷任台閣三復能記三生事云曾為馬馬常患渴望驛嘶傷其蹄則連心痛后三復乘馬磽確之地必為緩轡有石必去之其家不施門限慮傷馬蹄也其子鄴敕賜及第登廊廟上表雪德裕以朱崖靈樞歸葬洛中報先恩也士大夫美之圓觀圓觀者大歷末洛陽惠林寺僧能事田園富有粟帛梵學之外音律貫通時人以富僧為名而莫知所自也李諫議源公卿之子當天寶之際以遊宴歌酒為務父居守陷于賊中乃脫粟布衣止于惠林寺悉將家業為寺公財寺人日給一器食一杯飲而已不置仆使絶其知聞唯與圓觀為忘言交促膝靜話自旦及昏時人以清濁不倫頗招譏誚如此三十年二公一旦約遊蜀州抵青城峨嵋同訪道求藥圓觀欲遊長安出斜谷李公欲上荊州出三峽爭此兩途半年未訣李公曰吾已絶世事豈取途兩京圓觀曰行固不由人請出從三峽而去遂自荊江上峽行次南洎維舟山下見婦女數人鞗達錦鐺負甕而汲圓觀望而泣下曰某不欲至此恐見其婦人也李公驚問曰自此峽來此徒不少何獨泣此數人圓觀曰其中孕婦姓王者是某托身之所逾三載尚未娩懷以某未來之故也今既見矣即命有所歸釋氏所謂循環也謂公曰請假以符咒遣某速生少駐行舟葬某山下浴兒三日亦訪臨若相顧一笑即其認公也更后十二年中秋月夜杭州天竺寺外與公相見之期也李公遂悔此行為之一慟遂召婦人告以方書其婦人喜躍還家頃之親族畢至以枯魚酒獻于水濱李公往為授朱字圓觀具湯沐新其衣裝是夕圓觀亡而孕婦産矣李公三日往觀新兒襁褓就明果致一笑李公泣下具告于王王乃多出家財厚葬圓觀明日李公回棹言歸惠林詢間觀家方知已有理命后十二年秋八月直詣余杭赴其所約時天竺寺山雨初晴月色滿川無處尋訪忽聞葛洪川畔有牧豎歌竹枝詞者乘牛叩角雙髻短衣俄至寺前乃圓觀也李公就謁曰觀公健否卻問李公曰真信士矣與公殊途慎勿相近俗緣未盡但願勤修勤修不墮即遂相見李公以無由敘話望之潸然圓觀又唱竹枝步步前去山長水遠尚聞歌聲詞切韻高莫知所謂初到寺前歌曰三生石上舊精魂賞月吟風不要論慚愧情人遠相訪此身雖異性長存又歌曰身前身后事茫茫欲話因緣恐斷腸吳越溪山尋己遍卻回煙棹上瞿塘后三年李公拜諫儀大夫二年亡
