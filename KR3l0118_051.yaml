body:
  text: 侯道華侯道華河中永樂縣道淨院居蒲中之勝境道士寓居有以十數唐文宗時道士鄧太玄鍊丹於藥院中藥成疑功未究留貯院內人共掌之太玄死死原作師據明鈔本改門徒周悟仙主院事時有蒲人侯道華事悟仙以供給使諸道士皆奴畜之灑掃隸役無所不為而道華愈欣然又常好子史手不釋卷一覽必誦之於口眾或問之要此何為答曰天上無愚懵仙人咸大笑之蒲中多大棗天下人傳歲中不過一二無核者道華比三年輒得啗之一旦道華執斧科古松枝垂且盡如削院中人無喻其意明日昧爽眾晨起道華房中亡所見古松下施案致一盃水仍脫雙履案前道華衣掛松上院中視之中留一首詩云帖裏大還丹多年色不移前宵盜喫卻今日碧空飛慚愧深珍重珍重鄧天師他年煉得藥留著與內芝吾師知此術速煉莫為遲三清專相待大羅的有期下列細字稱去年七月一日蒙韓君賜姓李名內芝配住上清善進院以次十數言時唐大中五年五月二十一日院中人方驗道華竊太玄藥仙去因相率白節度使尚書鄭公光按視蹤跡不誣即以其事聞奏詔齎絹五百匹並賜御衣修飾廊殿賜名昇仙院出宣室志宜君王老王老坊州宜君縣人也居於村墅頗好道愛客務行陰德為意其妻亦同心不倦一旦有藍縷道士造其門王老與其妻俱延禮之居月餘間日與王老言談盃酌甚相歡狎俄患遍身惡瘡王老乃求醫藥看療益加勤切而瘡日甚逮將逾年道士謂王老曰此瘡不煩以凡藥相療但得數斛酒浸之自愈於是王老為之精潔釀酒及熟道士言以大瓮盛酒吾自加藥浸之遂入瓮三日方出鬚髮俱黑面顏復少年肌若凝脂王老闔家視之驚異道士謂王老曰此酒可飲能令人飛上天王老信之初瓮酒五斛餘及窺二三斗存耳清冷香美異常時方打麥王老與妻子並打麥人共飲皆大醉道士亦飲云可上天去否王老願隨師所適於是祥風忽起綵雲如蒸屋舍草樹全家人物雞犬一時飛去空中猶聞打麥聲數村人共觀望驚嘆唯猫棄而不去風定其傭打麥二人乃遺在別村樹下後亦不食皆得長年宜君縣西三十里有昇仙村存焉出續仙傳陳師豫章逆旅梅氏頗濟惠行旅僧道投止皆不求直恒有一道士衣服藍縷來止其家梅厚待之一日謂梅曰吾明日當設齋從君求新瓷碗二十事及七筯君亦宜來會可於天寶洞前訪陳師也梅許之道士持碗渡江而去梅翌日詣洞前問其村人莫知其處久之將廻偶得一小逕甚明淨試尋之果見一院有青童應門問之乃陳之居也入見道士衣冠華楚延與之坐命具食頃之食至乃熟蒸一嬰兒梅懼不食良久又進食乃蒸一犬子梅亦不食道士歎息命取昨所得椀贈客視之乃金椀也謂梅曰子善人也然不得仙千歲人參枸𣏌皆不肯食乃分也謝而遣之比不復見矣出稽神錄陳金陳金者少為軍士隸江西節度使劉信圍虔州金私與其徒五人發一大冢開棺見一白髯老人面如生通身白羅衣衣皆如新開棺即有白氣衝天墓中有非常香氣金獨視棺蓋上有物如粉微作硫黃氣金素聞棺中硫黃為藥即以衣襟掬取懷歸墓中無他珍寶即共掩塞之而出既至營中營中人皆驚云今日那得有香氣金知硫黃之異旦輒汲水服之至盡城平平原作中據明鈔本改入舍僧寺偶與寺僧言之僧曰此城中富人之遠祖也子孫相傳其祖好道有異人教餌硫黃云數盡當死死後三百年墓當開即解化之期也今正三百年矣即相與復視之棺中空唯衣尚存如蟬蛻之狀金自是無病今為清海軍小將年七十餘矣形體枯瘦輕健如故出稽神錄
