body:
  text: 陶侃陶侃字士竹曾如廁見數十人悉持大印有一人單衣平上幘自稱後帝云君長者故出見三載勿言富貴至極侃便起旋失所在有大印作公字當其穢所雜五行書曰廁神曰後帝也謝尚夏侯弘自云見鬼與其言語鎮西謝尚所乘馬忽死憂惱甚至謝曰卿若能令此馬生者卿真為見鬼也弘去良久還曰廟神樂君馬故取之當活尚對死馬坐須臾馬忽自門外走還至馬尸間便滅應時能動起行謝曰我無嗣是我一身之罰弘經時無所告曰頃所見小鬼耳必不能辨此源由後忽逢一鬼乘新車從十許人著青絲布袍弘前提牛鼻車中人謂弘曰何以見阻弘曰欲有所問鎮西將軍謝尚無兒此君風流令望不可使之絶祀車中人動容曰君所道正是僕兒年少時與家中婢通誓約不再婚而違約今此婢死在天訴之是故無兒弘具以告尚曰吾少時誠有此事弘于江陵見一大鬼提矛戟有小鬼隨從數人弘畏懼下路避之大鬼過後捉得一小鬼問此何物曰殺人以此矛戟若中心腹者無不輒死弘曰治此病有方否鬼曰以烏雞薄之即差弘又曰今欲何行也鬼曰當至荊揚二州爾時比日行心腹病無有不死者弘乃教人殺烏雞以薄之十不失八九今有中惡輒用烏雞薄之弘之由也襄陽軍人晉太元初苻堅遣將楊安侵襄陽其一人于軍中亡有同鄉人扶喪歸明日應到家死者夜與婦夢云所送者非我尸倉樂面下者是也汝昔為吾作結髮猶存可解看便知迄明日送喪者果至婦語母如此母不然之婦自至南豐細檢他家尸髮如先分明是其手迹呂順呂順喪婦要娶妻之從妹因作三墓搆纍垂就輒無成一日順晝臥見其婦來就同寢體冷如冰順以死生之隔語使去後婦又見其妹怒曰天下男子復何限汝乃與我共一壻作冢不成我使然也俄而夫婦俱殪桓恭桓恭與桓安民參軍在丹陽所住廨牀前有一陷穴詳見古冢視之果有壞棺恭每食常先以飯投穴中如此經年忽見一人在牀前云吾沒已來七百餘年嗣息絶滅蒸嘗莫及常食見餐感君之德報君以寧州刺史也未幾果遷庾崇庾崇者建元中于江州溺死爾日即還家見形一如平生多在妻樂氏室中妻初恐懼每呼諸從女作伴于是作伴漸踈時或暫來輒恚罵云貪與生者接耳反致疑惡豈副我歸意耶從女在內紡績忽見紡績之具在空中有物撥亂或投之於地從女怖懼皆去鬼即常見有一男才三歲就母求食母曰無錢食那可得鬼乃悽愴撫其兒頭曰我不幸早世令汝窮乏愧汝念汝情何極也忽見將二百錢置妻前云可為兒買食如此經年妻轉貧苦不立鬼云卿既守節而貧苦若此直當相迎耳未幾妻得疾亡鬼乃寂然曹公船濡須口有大船船覆在水中水小時便出見長老云是曹公船常有漁人夜宿其旁以船繫之但聞竽笛絃歌之音又香氣非常漁人始得眠夢人驅遣云勿近官妓傳曰曹公載妓船覆于此至今在焉王志都馬仲叔王志都並遼東人也相知至厚叔先亡後年忽形見謂曰吾不幸早亡心恆相念念卿無婦當為卿得婦期至十一月二十日送詣卿家但掃除設牀席待之至日都密掃除施設天忽大風白日晝昏向暮風止寢室中忽有紅帳自施發視其中牀上有一婦花媚莊嚴臥牀上才能氣息中表內外驚怖無敢近者唯都得往須臾便蘇起坐都問卿是誰婦曰我河南人父為清河太守臨當見嫁不知何由忽然在此都具語其意婦曰天應令我為君妻遂成夫婦往詣其家大喜亦以為天相與也遂與之生一男後為南郡太守唐邦恆山唐邦義熙中聞扣門者出視見兩朱衣吏云官欲得汝遂將至縣東缸殷安冢中冢中有人語吏云本取唐福何以濫取唐邦敕鞭之遣將出唐福少時而死王矩衡陽太守王矩為廣州矩至長沙見一人長丈餘著白布單衣將奏在岸上呼矩奴子過我矩省奏為杜靈之入船共語稱敘希闊矩問君京兆人何時發來答矩朝發矩怪問之杜曰天上京兆身是鬼見使來詣君耳矩大懼因求紙筆曰君必不解天上書乃更作折卷之從矩求一小箱盛之封付矩曰君今無開比到廣州可視耳矩到數月悁悒乃開視書云令召王矩為左司命主簿矩意大惡因疾卒周義汝南周義取沛國劉旦孫女為妻義豫章艾縣令弟路中得病未至縣十里義語弟必不濟便留家人在後先與弟至縣一宿死婦至臨尸義舉手別婦婦為梳頭因復拔婦叉殮訖婦房宿義乃上牀謂婦曰與卿共事雖淺然情相重不幸至此兄不仁離隔人室家終沒不得執別實為可恨我向舉手別又拔卿叉因欲起人多氣逼不果自此每夕來寢息與平生無異袁乞吳興袁乞妻臨亡把乞手云我死君再婚否乞曰不忍後遂更娶白日見其婦語云君先結誓何為負言因以刀割陰雖不致死人理永廢也王恆之沙門竺法師會稽人與北中郎王恆之周旋甚厚共論死生罪福報應之事茫昧難明因便共要若有先死當先報語後王於廟中忽見法師來曰貧道以某月日命過罪福皆不虛應若影響檀越當勤修道德以升躋神明耳先與君要先死者相報故來相語言訖不復見劉遁安帝義熙中劉遁母憂在家常有一鬼來住遁家搬徙牀几傾覆器物歌哭罵詈好道人之陰私僕役不敢為罪遁令弟守屋遁見繩繫弟頭懸著屋梁狼狽下之因失魂踰月乃差遁每爨欲熟輒失之遁密市野葛煮作糜鬼復竊之於屋北乃聞吐聲從此寂滅故世傳劉遁藥鬼遁後為劉毅參軍為宋高祖所殺王思規長沙王思規為海鹽令忽見一吏思規問是誰吏云命召君為主簿因出板置牀前吏又曰期限長遠在十月若不信我到七月十五日日中時視天上當有所見思規敕家人至期看天聞有哭聲空中見人垂旐羅列狀為送葬華逸廣陵華逸寓居江陵亡後七年來還初聞語聲不見其形家人苦請求得見之答云我因瘁未忍見汝問其所由云我本命雖不長猶應未盡坐平生時罰撻失道又殺卒反奴以此減算云受使到長沙還當復過如期果至教其二子云我既早亡汝等當勤自勗勵門戶淪沒豈是人子又責其兄不垂教誨色甚不平乃曰孟禺已名配死録正餘有日限耳爾時禺氣強力壯後到所期暴亡張君林吳縣張君林居東鄉楊里隆安中忽有鬼來助驅使林原有舊藏器物中破甑已無所用鬼使撞甕底穿為甑比家人起飯已熟此鬼無他須唯啖甘蔗自稱高褐或云此鬼為反語高褐者葛號丘壠纍積尤多古冢疑此物是其鬼也林每獨見之形如少女年可十七八許面青黑色遍身青衣乃令林家取白罌盛水覆頭明旦視之有物在中林家素貧遂致富嘗語毋惡我日月盡自去後果去蠻兵南平國蠻兵義熙初隨衆來姑熟便有鬼附之聲呦呦細長或在簷宇之際或在庭樹上若占吉凶輒先索琵琶隨彈而言於時郤倚為府長史問當遷官云不久持節也尋為南蠻校尉豫為國郎中親領此土荊州俗語云是老鼠所作名曰鬼侯陳皋平原陳皋於義熙中從廣陵樊梁後乘船出忽有一赤鬼長可丈許首戴絳冠形如鹿角就皋求載倏爾上船皋素能禁氣因歌俗家南地之曲鬼乃吐舌張服以杖竿擲之即四散成火照於野皋無幾而死袁無忌晉陳國袁無忌寓居東平永嘉初得疫癘家百餘口死亡垂盡徙避大宅權住田舍有一小屋兄弟共寢板牀薦席數重夜眠及曉牀出在戶外宿昔如此兄弟怪怖不能得眠後見一婦人來在戶前知忌等不眠前却戶外時未曙月明共窺之綵衣白粧頭上有花插及銀叉象牙梳無忌等共逐之初繞屋走而倒頭髻及花插之屬皆墮無忌悉拾之仍復出門南走臨道有井遂入其中無忌還眠天曉視花叉牙梳並是真物遂壞井得一楸棺具已朽壞乃易棺並服遷於高燥處葬之遂斷新蔡王昭平晉世新蔡王昭平犢車在廳事上夜無故自入齊室中觸壁而後出又數聞呼噪攻擊之聲四面而來昭乃聚衆設弓弩戰鬥之備指聲弓弩俱發而鬼應聲接矢數枚皆倒入土中遠學諸生有諸生遠學其父母夜作兒忽至歎息曰今我但魂魄耳非復生人父母問之兒曰此月初病以今日某時亡今在琅邪任子成家明日當殮來迎父母父母曰去此千里雖復顛倒那得及汝兒曰外有車乘但乘之自得至矣父母從之上車忽若睡比雞鳴已至所在視其駕乘但魂車木馬遂與主人相見臨兒悲哀問其疾消息如其言
