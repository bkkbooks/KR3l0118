body:
  text: 火賈耽唐相賈耽退歸第急令召上東門卒至耽嚴戒之曰明日當午有異色人入門爾必痛擊之死且無妨門卒稟命自巳至午果有二尼自東百步相序而至更無他異直至門其尼施朱傅粉冶容艷佚如娼人之婦其內服殷紅下飾亦紅二尼悉然卒計曰尼髡未之有也因以撾痛擊之傷腦流血叫號稱冤返走疾如奔馬旋擊又旋傷其足殆狼籍毀裂百步已上落草映樹已失所在更無蹤焉門卒報耽具述別無異色只遇二尼衣服容色之異耽曰打得死否具對傷腦折足痛楚殆极但打不死而失所在無可尋之耽歎曰然不免小有災矣翌日東市奏失火延袤百千家救之得止劉希昂元和中內侍劉希昂將遇禍家人上廁忽聞廁中云即來且從容家人惊報希昂希昂自往聽之又云即出來即出來昂曰何不出來遂有一小人可長尺余一家持槍跨馬而走出迅疾趁不可及出門而無所見未幾而复至七月十三日中忽有一白衣女人獨行至門曰緣游看去家遠暫借后院盤旋可乎希昂令借之勒家人領過姿質甚分明良久不見出遂令人覘之已不見希昂不信自去觀之無所見唯有一火柴頭在廁門前家屬相謂曰此是火災欲起覓術士鎮厭之當鎮厭日火從廚上發燒半宅且盡至冬希昂忤憲宗罪族誅范璋寶歷二年明經范璋居梁山讀書夏中深夜忽廳廚中有拉物聲范慵省之至明見束薪長五寸余齊整可愛積于灶上地上危累蒸餅五枚又一夜有物扣門因拊掌大笑聲如嬰兒如此經三夕璋素有膽氣乃乘其笑曳巨薪逐之其物狀如小犬連卻擊之變成火滿川而滅胡榮長慶元年春楚州淮岸屯官胡榮家有精物或隱或見或作小兒為著女人紅裙扰亂于人或稱阿姑時复一處火發所燒即少皆救得之三月火大起延燒河市營戍廬舍殆盡歲中胡云亦死楊禎進士楊禎家于渭橋以居處繁雜頗妨肄業乃詣昭應縣長借石瓮寺文殊院居旬余有紅裳既夕而至容色姝麗姿華動人禎常悅者皆所不及徐步于帘外歌曰涼風暮起驪山空長生殿鎖霜葉紅朝來試入華清宮分明憶得開元中禎曰歌者誰耶何清苦之若是紅裳又歌曰金殿不胜秋月斜石樓冷誰是相顧人褰帷吊孤影禎拜迎于門既即席問禎之姓氏禎具告禎祖父母叔兄弟中外親族曾游石瓮寺者無不熟識禎異之曰得非鬼物乎對曰吾聞魂氣升于天形魄歸于地是無質矣何鬼之有曰又非狐狸乎對曰狐狸者接人矣一中其媚禍必能及某世業功德實利生民某雖不淑焉能苟媚而欲奉禍乎禎曰可聞姓氏乎某燧人氏之苗裔也始祖有功烈于人乃統丙丁鎮南方复以德王神農陶唐氏后又王于西漢因食采于宋遠祖無忌以威猛暴耗人不可親遂為白澤氏所執今樵童牧豎得以知名漢明帝時佛法東流摩胜竺法蘭二羅漢奏請某十四代祖令顯揚釋教遂封為長明公魏武季年滅佛法誅道士而長明公幽死魏文嗣位佛法重興复以長明世子襲之至開元初玄宗治驪山起至華清宮作朝元閣立長生殿以余材因修此寺群象既立遂設東幢帝與妃子自湯殿宴罷微行佛廟禮阤伽竟妃子謂帝曰當于飛之秋不當今東幢巋然無偶帝即日命立西幢遂封某為西明夫人因賜琥珀膏潤于饑骨設珊瑚帳固予形貌于是選生及蛾即不复強暴矣禎曰歌舞絲竹四者孰妙曰非不能也蓋承先祖之明德稟炎上之烈信故奸聲亂色不入于心某所能者大則鑠金為五兵為鼎鼐鐘鏞小則化食為百品為炮燔烹炙動即煨山岳而燼原野靜則燭幽暗而破昏蒙然則撫朱弦咀玉管騁纖腰矜皓齒皆冶容之末事是不為也昨聞足下有幽隱之志籍甚既久愿一款顏由斯而來非敢自獻然宵清月朗喜覿良人桑中之譏亦不能恥倘運與時會少承周旋必無累于盛德禎拜而納之自是晨去而暮還唯霾晦則不复至常遇風雨有嬰兒送紅裳詩其詞云煙滅石樓空悠悠永夜中虛心怯秋雨艷質畏飄風向壁殘花碎侵階墜葉紅還如失群鶴飲恨在雕籠每侵星請歸禎追而止之答曰公違晨夕之養就岩谷而居者得非求靜專習文乎奈何欲使采過之人稱君為親而就偶一被瑕玷其能洗滌乎非但損公之盛名亦當速某之生命耳歸半年家童歸告禎乳母母乃潛伏于佛榻俟明以觀之果自隙而出入西幢澄澄一燈矣因扑滅后遂絕紅裳者盧郁進士盧郁者河朔人徙家長安嘗北游燕趙遂客于內黃郡守館郁于廨舍先是其舍無居人及郁至見一姥發盡白身庳而肥被素衣來謂郁曰妾僑居于此且久矣故相候謁已而告去是夕郁獨居堂之前夜潮寒有風雪其姥又至謂郁曰貴客獨處何以為歡耶命坐語謂姥曰妾姓石氏家于華陰郡后隨呂御史者至此且四十年家苦貧幸貴客見哀于是郁命食而老姥卒不顧郁問之曰姑何為不食姥曰妾甚饑然不食粟以故壽而安郁好奇聞之甚喜且以為有道術者因問曰姑既不食粟何胞其腹耶豈常餌仙藥乎姥曰妾家于華陰先人好神仙廬于太華妾亦常隱于山中從道士學長生法道士教妾吞火自是絕粒今已年九十矣未審一日有寒暑之疾郁又問曰某早歲常遇至人教吸氣之術自謂其妙后以奔走名利從都國之貢晝趨而夜息不意今夕遇姑語及平生之好然不知吞火豈神仙之旨乎姥曰子不聞至人寒暑不能侵者耶故入火火不能焚入水水不能溺如是則吞火固其宜也郁曰愿觀姑吞火可乎姥曰有何不可哉于是以手采爐中火而吞之火且盡其色不動郁且惊且異遂起束帶再拜謝曰鄙野之人未嘗聞神仙事今夕遇仙姑以吞火之異實平生所未聞者姥曰此小術爾何足貴哉言訖且告去郁因降階送之既別郁遂歸于寢堂既深有仆者告郁曰西廡下有火發郁惊起而視之其西廡舍已焚于是里中人俱至競以水沃之迨旦方絕及窮火發之跡于廡下坎中得一石火通中有火甚多先是有敗草積其上故延而至燒郁方悟老姥乃此火通耳果所謂姓石氏居于華山者也郁因質問呂御史有郡中老吏謂郁曰呂御史魏之從事也居此宅迨今四十年矣咸如老姥言也又青州濟南平陵城北石虎一夜自移城東南善石溝上有狼狐千余跡隨之跡皆成路劉威丁卯歲廬州刺史劉威移鎮江西既去任而郡中大火廬候吏巡火甚急而往往有持火夜行者捕之不獲或射之殪就視之乃棺材板腐木敗帚之類郡人愈恐數月除張宗為廬州刺史火災乃止馬希范楚王馬希范修長沙城開濠畢忽有一物長十丈余無頭尾手足狀若土山自北岸出游泳水上久之入南岸而沒出入俱無蹤跡或謂之土龍無幾何而馬氏亡
