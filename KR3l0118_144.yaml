body:
  text: 呂群呂群唐進士呂群元和十一年下第遊蜀性粗褊不容物僕使者未嘗不切齒恨之時過褒斜未半所使多逃去唯有一廝養群意悽悽行次一山嶺復歇鞍放馬策杖尋徑不覺數里見杉松甚茂臨溪架水有一草堂境頗幽邃似道士所居但不見人復入後齋有新穿土坑長可容身其深數尺中植一長刀傍置二刀又於坑傍壁上大書云兩口加一口即成獸矣群意謂術士厭勝之所亦不為異即去一二里問樵人向之所見者誰氏所處樵人曰近並無此處因復窺之則不見矣後所到衆會之所必先訪其事或解曰兩口君之姓也加一口品字也三刀州字亦象也君後位至刺史二千石矣群心然之行至劍南界計州郡所獲百千遂於成都買奴馬服用行李復泰矣成都人有曰南豎者凶猾無狀貨久不售群則以二十緡易之既而鞭撻毀罵奴不堪命遂與其傭保潛有戕殺之心而伺便未發耳群至漢州縣令為群致酒宴時群新制一緑綾裘甚華潔縣令方燃蠟炬將上於臺蠟淚數滴污群裘上縣令戲曰僕且拉君此裘群曰拉則為盜矣復至眉州留十餘日冬至之夕逗宿眉西之正見寺其下且欲害之適遇院僧有老病將終侍燭不絶其計不行群此夜忽不樂乃於東壁題詩二篇其一曰路行三蜀盡身及一陽生賴有殘燈火相依坐到明其二曰社後辭巢燕霜前別蒂蓬願為蝴蝶夢飛去覓關中題訖吟諷久之數行淚下明日冬至抵彭山縣縣令訪群群形貌索然謂縣令曰某殆將死乎意緒不堪寥落之甚縣令曰聞君有刺使三品之説足得自寬也縣令即為置酒極歡至三更群大醉舁歸館中凶奴等已於群所寢床下穿一坑如群之大深數尺群至則舁置坑中斷其首又以群所攜劍當心釘之覆以土訖各乘服所有衣裝鞍馬而去後月餘日奴黨至成都貨鬻衣物略盡有一人分得緑裘徑將北歸卻至漢州街中鬻之適遇縣令偶出見之識其燭淚所污擒而問焉即皆承伏時丞相李夷簡鎮西蜀盡捕得其賊乃發群死處於褒中所見如影響焉出河東記朱克融唐寶曆二年春范陽節度使朱克融獵鹿鹿膽中得珠如彈丸黑色初軟後硬如石光明或問麻安石曰是何祥也安石曰此事自古未有請以意推之鹿膽得珠克融以為己瑞鹿者祿也鹿死是祿盡也珠初軟後硬是珠變也祿盡珠變必有變易之事衰亡之兆也自此克融言辭輕發是年五月果帳下軍亂而全家被殺出祥驗集王涯唐丞相王涯大和九年掌邦賦又主簿鹽鐵其子仲翔嘗一日避暑於山亭忽見家僮數十皆無首被血來仲翔前僅食頃方不見仲翔驚異且甚即具白之願解去權位涯不聽是歲冬十一月果有鄭注之禍出宣室志溫造新昌里尚書溫造宅桑道茂嘗居之庭有二柏樹甚高桑生曰夫人之所居古木蕃茂者皆宜去之且木盛則土衰由是居人有病者乃土衰之致也於是以鐵數十鈞鎮于柏樹下既而告人曰後有居發吾所鎮之地者其家長當死唐大和九年溫造居其宅因修建堂宇遂發地得桑生所鎮之鐵後數日造果卒出宣室志李宗閔唐丞相李宗閔大和七年夏出鎮漢中明年冬再入相又明年夏中嘗退朝於靖安里第其榻前有尉斗忽跳擲久之宗閔異且惡是時李訓鄭注以姦詐得幸數言於帝訓知之遂奏以致其罪後旬日有詔貶為明州刺史連貶朝州司戶蓋其兆也出宣室志柳公濟柳公濟尚書唐大和中奉詔討李同揵既出師無何麾槍忽折客有見者歎曰夫大將軍出師其門旗及麾槍折者軍必敗不然上將死後數月公濟果薨凡軍出征有烏鳶隨其後者皆敗亡之徵有曾敬云者嘗為北都裨將李師道叛時曾將行營兵士數千人每出軍有烏鳶隨其後即軍必敗率以為常後捨家為僧住於太原凝定寺大和九年羅立言為京兆尹嘗因入朝既冠帶引鏡自視不見其首遂語於季弟約言後果為李訓連坐誅死出宣室志唐唐原作宋據明鈔本陳校本改永寧王相涯三怪淅米作人蘇閨本是王家炊人至荊州方知因問王家咎徵言宅南有一井每夜常沸湧有聲晝窺之或見銅叵羅或見銀尉斗者水腐不可飲又王相內齋有禪床柘材絲繩工極精巧無故解散各聚一處王甚惡之命焚於灶下又長子孟博晨興見堂地上有凝血數瀝蹤至大門方絶孟博遽令鏟去王相初不知也未數月及難出酉陽雜俎王潛唐大和王潛為荊南節度使無故有白馬馳入府門而斃殭臥塞途是歲而潛卒此近馬禍也出因話録韓約唐大和中為安南都護時土産有玉龍膏南人用之能化銀液耆舊相傳其膏不可齎往犯者則為禍耳約不之信及受代還闕貯之以歸時為執金吾果首罹甘露之禍乃貪利冒貨之所致也出補録記傳王氏唐河陽城南百姓王氏莊有小池池邊巨柳數栽開成末葉落池中旋化為魚大小如葉食之無味至冬其家有官事出酉陽雜俎王哲唐虔州刺史王哲在平康里治第西偏家人掘地拾得一石子朱書其上曰修此不吉家人揩拭轉分明乃呈哲哲意家人惰於畚鍤自磨朱深若石脈哲甚惡之其月哲卒出酉陽雜俎杜牧唐杜牧自宣城幕除官入京有詩留別云同來不得同歸去故國逢春一寂寥其後二十餘年連典四郡後自湖州刺史拜中書舍人題汴河云自憐流落西歸疾不見春風二月時自郡守入為舍人未為流落至京果卒出感定録盧獻卿范陽盧獻卿唐大中中舉進士詞藻為同流所推作愍征賦數千言時人以為庾子山哀江南之亞連年不中第蕩遊衡湘到郴而病夢人贈詩云卜築郊原古青山唯四鄰扶疏繞屋樹寂寞獨歸人獻卿旬日而歿郴守為葬之近郊果以夏初皆符所夢者出本事詩盧駢唐盧駢員外才俊之士忽一日晏抵青龍精舍休僧院詞氣悽慘如蓄甚憂其呼嗟往復於軒檻間僧問不對逮夜將整歸騎徘徊四顧促命毫硯題於南楣曰壽夭雖云命榮枯亦太偏不知雷氏劍何處更衝天題畢草草而去涉旬出官未逾月卒其詩至今在院僧逢其人輒話其異出唐闕史封望卿唐封望卿僕射敖之子杜邠公悰鎮岐下自省中請為判官其所常居室壁有筆灑墨迹者望卿一日忽以指爪盡掐去之其色如喪洎侍兒或問其故望卿默不應無何病甚謂侍兒曰記吾前日以指瓜掐墨迹否吾其時惡之不能語汝每點乃一鬼字數日而卒出玉泉子崔彥曾滎陽郡城西有永福湖引鄭水以漲之平時環岸皆臺樹花木乃太守郊勞班餞之所西南壖多修竹喬林則故徐帥崔常侍彥曾之別業也唐咸通中龐勛作亂彥曾為賊執湖水赤如凝血者三日未幾而凶問至昔河間王之征輔公祏也江行舟中宴群帥命左右以金碗酌江水將飲之水至忽化為血合座失色王徐曰碗中之血公祏授首之徵果破之則禍福之難明也如是出三水小牘崔雍崔雍起居譽望清美尤嗜古書圖畫故鍾王韓展之迹萃於其家常寶太真上馬圖一軸以為畫品之上者唐咸通戊子歲授祿二千石于和州值龐勛搆逆豐沛間賊鋒四掠歷陽麼麼原作歷據明鈔本改郡右史儒生非枝拒所及矣乃命小將齎持牛酒犒賊師且以全雉堞活黎庶為請由是境亡剽戮之患雖矯為款諭而密表自陳時宰有不協者因置之以法士君子相弔後有得崔君所寶畫者軸杪題云上蔡之犬堪嗟人生到此華亭之鶴虛唳天命如何字雖真迹不書時日識者云聞命之後無暇及此其預知耶復偶然耶出唐闕史龐從唐昭宗乾寧丙辰歲朱梁太祖誅不附己者兗師朱瑾亡命淮海梁祖命徐師龐從舊名師古會軍五萬于青口東晉命謝安伐青州堰呂梁水樹柵立七埭為泒擁其流以利運漕故謂之青州泒其實泗水也浮磬石在下邳所屯之地蓋兵書謂之絶地人不駕肩行一舍方至夷坦之處時梁祖命腹心者監護之統師莫之能禦明鈔本之能禦作敢自主未信宿朱瑾果自督數萬而至從聞瑾親至一軍喪魄及戰無敢萌鬥志或溺或浮唯一二獲免先是瑾軍未至前部伍虛驚尤多怪異刁斗架自行於軍帳之前家屬在徐州亦凶怪屢見使宅之後素有妖狐之穴或府主有災即見時命僧於雕堂建道場蓋多狐妖故畫雕於中統未亡之前家人望見燕子樓上有婦人衣紅白晝憑欄而立見人窺之漸移身退後而沒時登樓之門皆扃鐍之不數日凶問至出玉堂間話
