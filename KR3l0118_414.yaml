body:
  text: 香藥茶蕪香燕昭王時有波弋之國貢茶蕪香若焚著衣彌月不絶所遇地土石皆香經朽木腐草皆榮秀用薰枯骨則肌肉再生三名香漢雍仲子進南海香物拜為涪陽尉時人謂之香尉日南郡有香市商人交易諸香處南海郡有村香戶日南郡有千畝香林名香出其中香州在朱崖郡洲中出諸異香往往不知其名千年松香聞十里亦謂之三香也五名香聚窟洲在西海中申未洲上有大樹與楓木相似而葉香聞數百里名此為返魂樹叩其樹樹亦能自聲聲如牛吼聞之者皆心振神駭伐其根心于玉釜中煮取汁更火煎之如黑飴可令丸名曰驚精香或名之為振靈丸或名之為返生香或名之為人鳥精香或名為卻死香一種五名斯靈物也香氣聞數百里死尸在地聞氣乃活沉香唐太宗問高州首領馮盎云卿宅去沉香遠近對曰宅左右即出香樹然其生者無香唯朽者始香矣龍腦香龍腦香樹出婆利國婆利呼為個不婆律亦出波斯國樹高八九丈大可六七圍葉圓而背白無花實其樹有肥有瘦瘦者出婆律膏香在木心中斷其樹劈取之膏于樹端流出斫樹作坎而承之入藥用別有法安息香安息香樹出波斯國波斯呼為辟邪樹長三大皮色黃黑葉有四角經寒不凋二月開花黃色心微碧不結實刻其葉而其膠如飴名安息香六七月堅凝乃取之燒之通神明辟衆惡一木五香根旍檀節沉花雞舌葉藿膠薰陸訶黎勒高仙芝伐大食得訶黎勒長五六寸初置抹肚中便覺腹痛因快痢十余行初謂訶黎勒為祟因欲棄之以問大食長老長老云此物人帶一切病消痢者出惡物耳仙芝甚寶惜之天寶末被誅遂失所在白豆蔻出加古羅國呼為多骨形如芭蕉葉似杜若長八九尺冬夏不凋花淺黃色子作朵如蒲萄其子初出微青熟則變白七月采齊香出波斯國佛林呼為頂勃梨他長一丈圍一尺許皮青色薄而極光淨葉似阿魏每三葉生于條端無花實西域人常八月伐之致臘月更抽新條極滋茂若不剪除枯死七月斷其枝有黃汁其狀如蜜微有香氣入缶療百病無石子出波斯國波斯呼為摩賊樹長六七丈圍八九尺葉如桃葉而長三月開花白色花心微紅子圓如彈丸初青熟乃黃白蟲食成孔者正熟皮無孔者入藥用其樹一年生無石子一年生跋屢子大如指長三寸上有殼中仁如栗黃可啖紫馡紫馡樹出真臘國真臘呼為勒佉亦出波斯國樹長一丈枝條郁茂葉似桔經冬不凋三月開花白色不結子天大霧露及雨沾其樹枝條即出紫馡波斯國使烏海及沙利深所説并同真臘國使折沖都尉沙門陀沙尼拔陀言蟻運土于樹作窠蟻壤得雨露凝結而成紫馡昆侖國者善波斯國者次之阿魏出伽闍那國即北天竺也伽闍那呼為形虞亦出波斯國波斯呼為阿虞截樹長八九丈皮青黃三月生葉形似鼠耳無花實斷其枝汁出如飴久乃堅凝佛林國僧變所説同摩伽陀國僧提婆言取其汁和米豆屑合成阿魏蓽撥出摩伽陀國呼為蓽撥梨佛林國呼為阿梨訶他苗長三四尺莖細如箸葉似蕺葉子似桑椹八月采胡椒出摩伽陀國呼為昧履支其苗蔓生莖極柔弱葉長寸半有細條與葉齊條上結子兩兩相對其葉晨開暮合合則裹其子于葉中子形似漢椒至芳辣六月采今作胡盤肉食皆用之阿勃參出佛林國長一丈余皮色青白葉細兩兩相對花似蔓菁正黃子似胡椒赤色斫其枝汁如油以塗癬疥無不瘳其油極貴價重于金山薯熙穆縣里多山薯本草云南山之陰曰署預消熱下氣補五髒麻黃莖端開花花小而黃簇生子如覆盆可食至冬枯死如草及春卻青荊三稜唐河東裴同父患腹痛數年不可忍囑其子曰吾死后必出吾病子從之出得一物大如鹿條脯懸之久干有客竊之其堅如骨削之文彩煥發遂以為刀把子佩之在路放馬抽刀子割三稜草坐其上把盡消成水客怪之回以問同同泣具言之后病狀同者服三稜草汁多驗服松脂上黨有趙瞿者病癩歷年衆治之不愈垂死或云不如及活流棄之否則后子孫轉相注易其家乃為繼糧而送之置山穴中瞿居穴中自怨不幸晝夜悲歎涕泣經日有仙人行過穴口而哀之具問訊焉瞿知其異人乃叩頭自陳乞哀于仙人以囊藥賜之教其服法瞿服之百許日愈瘡顏色丰悅肌膚玉澤仙人又過視之瞿謝受更生活之恩乞丐其方仙人告之云此是松脂耳此山中更多此物汝煉之服可以長生不死瞿乃歸家人初謂之鬼也甚驚愕遂具言狀后服松脂不撤身體轉輕氣力百倍登高越險終日不倦年百七十歲齒不墮發不白夜臥忽見屋間有光大如鏡者以問左右皆云不見久而漸大一室盡明如晝日又夜見面上有婇女二人長二三寸面目皆具但為小耳遊戲其口鼻之間如是且一年此女稍長如大人在側又常聞琴瑟之音欣然獨笑在人間二百許年色如少童乃抱犢入山去必地仙也其間聞瞿服松脂如此于是競服其多力者乃車運驢負誓積之盈室服之遠者不過一月未覺有大益輒止有志者難得如是也餌松蕊遁甲經云沙土之福云陽之墟可以隱居云陽氏古之仙人方記曰南嶽百里有福地松高一千尺圍即數尋而蕊甘仙人可餌相傳服食煉行之人采此松膏而服不苦澀與諸處松別賜茯苓沈約謝始安王賜茯苓一枝重一十二斤八兩有表服茯苓任子季服茯苓十八年仙人玉女往從之能隱能彰不復食谷炙瘢皆滅面體玉光服菖蒲韓衆服菖蒲十三年身生毛日視書萬言皆誦之冬袒不寒又菖蒲須生得石上一寸九節已上紫花者尤善服桂趙他子服桂二十一年毛生日行五百里力舉千斤餌檸實檸木實之赤者餌之一年老者還少令人徹食見鬼昔道士梁頃年七十乃服之轉更少年至百四十歲能夜書走及奔馬入青龍山去服五味子移門子食服五味子六十年色如玉女入水不沾入火不灼食術南陽文氏説其先祖漢末大亂逃壺山中飢困欲死有一人教之食術云遂不飢十年乃來還鄉里顏色更少氣力勝故自説在山中時身輕欲跳登高履險歷日不倦行冰雪中了不知寒常見一高岩上有數人對博戲者有讀書者俯而視之文氏因聞其相問言此子可呼上否其一人答未可也林子明服術十一年耳長五寸身輕如飛能超逾淵谷二丈許服桃膠桃膠以桑木灰漬服之百病愈久久身有光在晦夜之地如月出也多服之則可以斷谷矣服地黃楚子服地黃八年夜視有光手上車弩服遠志陵陽子仲服遠志二十年有子二十七人開書所視不忘服天門冬杜子微服天門冬八十年妾有子百四十人日行三百里飲菊潭水荊州菊潭其源旁芳菊被涯澳其滋液極甘深谷中有三十余家不得穿井仰飲此水上壽二三百中壽百餘其七十八十猶以為夭菊能輕身益氣令人久壽有征飲甘菊谷水南陽酈縣山中有甘谷水所以甘者谷上左右皆生甘菊菊花墮其中歷世彌久故水味為變其臨此谷中居民皆不穿井悉飲甘谷水飲者無不考壽高者百四五十歲下者不失八九十無夭年人得此菊力也故司空王暢太尉劉寬太傅表隗皆為南陽太守每到官常使酈縣月送甘谷水四十斛以為飲食此諸公多患風痹及眩冒皆得愈但不能大得其益如甘谷上居民小生便飲食此水者耳又菊花與薏花相似直以甘苦別之耳菊甘而薏苦諺言所謂苦如薏也今所在有貢菊但為少耳率多生于水側也緱氏山與酈縣最多仙方所謂白精更生周盈皆一菊而根莖花實異名其説甚美而近來服之者略無效正由不得真菊也夫甘菊谷水南方氣味亦未足言而其上居民以延年況得服好藥安得無益乎食黃精臨川有士人虐遇其所使婢婢不堪其毒乃逃入山中久之糧盡飢甚坐水邊見野草枝葉可愛即拔取濯水中連根食之甚美自是恆食久之遂不飢而更輕健夜息大樹下聞草中獸走以為虎而懼因念得上樹梢乃佳也正爾念之而身已在樹梢矣及曉又念當下平地又欻然而下自是意有所之身即飄然而去或自一峰之一峰頂若飛鳥焉數歲其家人伐薪見之以告其主使捕之不得一日遇其在絶壁下即以細繩三面圍之俄騰上山頂其主益駭異必欲致之或曰此婢也安有仙骨不過得靈藥餌之爾試以盛饌多其五味令甚香美值其往來之路觀其食之否如其言果來就食食訖不復能遠去遂為所擒具述其故問其所食草之形即黃精也復使之遂不能得其婢數年亦卒
