body:
  text: 費忠費忠費州蠻人舉族姓費氏境多虎暴俗皆樓居以避之開元中狄光嗣為刺史其孫博望生于官舍博望乳母壻費忠徑勇能射嘗自州負米還家山路見阻不覺日暮前程尚三十余里忠懼不免以所持刃刈薪數束敲石取火焚之自守須臾聞虎之聲震動林藪忠以頭巾冒米袋腰帶束之立于火光之下挺身上大樹頃之四虎同至望見米袋大虎前蹶既知非人相顧默然次虎引二子去大虎獨留火所忽爾脫皮是一老人枕手而寐忠素徑捷心頗輕之乃徐下樹扼其喉以刀擬頭老人乞命忠縛其手而詰問之云是北村費老被罰為虎天曹有日歷令食人今夜合食費忠故候其人適來正值米袋意甚郁怏留此須其復來耳不意為君所執如不信可于我腰邊看日歷當知之忠觀歷畢問何以救我答曰若有同姓名人亦可相代異時事覺我當為受罰不過十日饑餓耳忠云今有南村費忠可代我否老人許之忠先持其皮上樹杪然后下解老人老人曰君第牢縛其身附樹我若入皮則不相識脫聞吼落地必當被食事理則然非負約也忠與訣上樹擲皮還之老人得皮從后腳入復形之后大吼數十聲乃去忠得還家數日南村費忠鋤地遇啖也虎婦唐開元中有虎取人家女為妻于深山結室而居經二載其婦不之覺后忽有二客攜酒而至便于室中群飲戒其婦云此客稍異慎無窺覷須臾皆醉眠婦女往視悉虎也心大驚駭而不敢言久之虎復為人形還謂婦曰得無窺乎婦言初不敢離此后忽云思家願一歸覲經十日夫將酒肉與婦偕行漸到妻家遇深水婦人先渡虎方褰衣婦戲云卿背后何得有虎尾出虎大慚遂不渡水因爾疾馳不返稽胡慈州稽胡者以弋獵為業唐開元末逐鹿深山鹿急走投一室室中有道士朱衣憑案而坐見胡驚愕問其來由胡具言姓名云適逐一鹿不覺深入辭謝沖突道士謂胡曰我是虎王天帝令我主施諸虎之食一切獸各有對無枉也適聞汝稱姓名合為吾食案頭有朱筆及杯兼簿籍因開簿以示胡胡戰懼良久固求釋放道士云吾不惜放汝天命如此為之奈何若放汝便失我一食汝既相遇必為取免久之乃云明日可作草人以己衣服之及豬血三斗絹一匹持與俱來或當得免胡遲回未去見群虎來朝道士處分所食遂各散去胡尋再拜而還翌日乃持物以詣道士笑曰爾能有信故為佳士因令胡立草人庭中置豬血于其側然后令胡上樹以下望之高十余丈云止此得矣可以絹縛身著樹不爾恐有損落尋還房中變作一虎出庭仰視胡大嗥吼數四向樹跳躍知胡不可得乃攫草人擲高數丈往食豬血盡入房復為道士謂胡曰可速下來胡下再拜便以朱筆勾胡名于是免難碧石開元末渝州多虎暴設機阱恆未得之月夕人有登樹候望見一倀鬼如七八歲小兒無衣輕行通身碧色來發其機及過人又下樹正之須臾一虎徑來為陷機所中而死久之小兒行哭而返因入虎口及明開視有碧石大如雞子在虎喉焉黿嚙虎天寶七載宣城郡江中黿出虎搏之黿嚙虎二瘡虎怒拔黿之首而虎瘡甚亦死李徵隴西李徵皇族子家于虢略微少博學善屬文弱冠從州府貢焉時號名士天寶十載春于尚書右丞楊沒榜下登進士第后數年調補江南尉徵性疏逸恃才倨傲不能屈跡卑僚嘗郁郁不樂每同舍會既酣顧謂其群官曰生乃與君等為伍耶其僚佐咸嫉之及謝秩則退歸閉門不與人通者近歲余后迫衣食乃具妝東游吳楚之間以干郡國長吏吳楚人聞其聲固久矣及至皆開館以俟之宴游極歡將去悉厚遺以實其囊橐徵在吳楚且周歲所獲饋遺甚多西歸虢略未至舍于汝墳逆旅中忽被疾發狂鞭捶仆者仆者不勝其苦如是旬余疾益甚無何夜狂走莫知其適家僮跡其去而伺之盡一月而徵竟不回于是仆者驅其乘馬挈其囊橐而遠遁去至明年陳郡袁參以監察御史奉詔使嶺南乘傳至商于界晨將發其驛者白曰道有虎暴而食人故過于此者非晝而莫敢進今尚早願且駐車決不可前參怒曰我天子使衆騎極多山澤之獸能為害耶遂命駕去行未盡一里果有一虎自草中突出參驚甚俄而虎匿身草中人聲而言曰異乎哉幾傷我故人也參聆其音似李徵參昔與徵同登進士第分極深別有年矣忽聞其語既驚且異而莫測焉遂問曰子為誰得非故人隴西子乎虎呻吟數聲若嗟泣之狀已而謂參曰我李徵也君幸少留與我一語參即降騎因問曰李君李君何為而至是也虎曰我自與足下別音問曠阻且久矣幸喜得無恙乎今又去何適向者見君有二吏驅而前驛隸挈印囊以導庸非為御史而出使乎參曰近者幸得備御史之列今乃使嶺南虎曰吾子以文學立身位登朝序可謂盛矣況憲台清峻分糾百揆聖明慎擇尤異于人心喜故人居此地甚可賀參曰往者吾與執事同年成名交契深密異于常友自聲容間阻時去如流想望風儀心目俱斷不意今日獲君念舊之言雖然執事何為不我見而自匿于草莽中故人之分豈當如是耶虎曰我今不為人矣安得見君乎參即詰其事虎曰我前身客吳楚去歲方還道次汝墳忽嬰疾發狂走山谷中俄以左右手据地而步自是覺心愈狠力愈倍及視其肱髀則有厘毛生焉又見冕衣而行于道者負而奔者翼而翱者毳而馳者則欲得而啖之既至漢陰南以饑腸所迫值一人腯然其肌因擒以咀之立盡由此率以為常非不念妻孥思朋友直以行負神祗一日化為異獸有靦于人故分不見矣嗟夫我與君同年登第交契素厚今日執天憲耀親友而我匿身林藪永謝人寰躍而吁天俯而泣地身毀不用是果命乎因呼吟咨嗟殆不自勝遂泣參且問曰君今既為異類何尚能人言耶虎曰我今形變而心甚悟故有撐突以悚以恨難盡道耳幸故人念我深恕我無狀之咎亦其願也然君自南方回車我再值君必當昧其平生耳此時視君之軀猶吾機上一物君亦宜嚴其警從以備之無使成我之罪取笑于士君子又曰我與君真忘形之友也而我將有所托其可乎參曰平昔故人安有不可哉恨未知何如事願盡教之虎曰君不許我我何敢言今既許我豈有隱耶初我于逆旅中為疾發狂既入荒山而仆者驅我乘馬衣囊悉逃去吾妻孥尚在虢略豈念我化為異類乎君若自南回為繼書訪妻子但云我已死無言今日事幸記之又曰吾于人世且無資業有子尚稚固難自謀君位列周行素秉夙義昔日之分豈他人能右哉必望念其孤弱時賑其乏無使殍死于道途亦恩之大者言已又悲泣參亦泣曰參與足下休戚同焉然則足下子亦參子也當力副厚命又何虞其不至哉虎曰我有舊文數十篇未行于代雖有遺稿盡皆散落君為我傳録誠不敢列人之閾然亦貴傳于子孫也參即呼仆命筆隨其口書近二十章文甚高理甚遠參閲而歎者再三虎曰此吾平生之素也安敢望其傳乎又曰君銜命乘傳當甚奔迫今久留驛隸兢悚萬端與君永訣異途之恨何可言哉參亦與之敘別久而方去參自南回遂專命持書及撐賻之禮寄于徵子月余徵子自虢略來京詣參門求先人之柩參不得已具疏其事后參以己俸均給徵妻子免饑凍焉參后官至兵部侍郎天寶選人天寶年中有選人入京路行日暮投一村僧房求宿僧不在時已昏黑他去不得遂就榻假宿鞍馬置于別室遲明將發偶巡行院內至院后破屋中忽見一女子年十七八容色甚麗蓋虎皮熟寢之次此人乃徐行掣虎皮藏之女子覺甚驚懼因而為妻問其所以乃言逃難至此藏伏去家已遠載之別乘赴選選既就又與同之官數年秩滿生子數人一日俱行復至前宿處僧有在者延納而宿明日未發間因笑語妻曰君豈不記余與君初相見處耶妻怒曰某本非人類偶爾為君所收有子數人能不見嫌敢且同處今如見恥豈徒為語耳還我故衣從我所適此人方謝以過言然妻怒不已索故衣轉急此人度不可制乃曰君衣在北屋間自往取女人大怒目如電光猖狂入北屋間尋覓虎皮披之于體跳躍數步已成巨虎哮吼回顧望林而往此人驚懼收子而行
