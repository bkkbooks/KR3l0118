body:
  text: 司馬喬卿司馬喬卿唐大理司直河內司馬喬卿天性純謹有志行永徽中為揚州司戶曹丁母憂居喪毀瘠骨立刺血寫金剛般若經二卷未幾於廬側生芝草二莖九日長尺有八寸緑莖朱蓋日瀝汁一升食之味甘如蜜取而復生喬卿同寮數人並目覩其事出法苑珠林孫壽唐顯慶中平州人孫壽於海濱遊獵遇野火草木蕩盡唯有一叢茂草獨不焚疑草中有伏獸遂燭之以火竟不爇壽甚怪之入草中窺視乃獲一函金剛般若經其傍又有一死僧顏色不變火不延燎蓋由此也始知經像非凡所測孫壽親自說之出法苑珠林李觀唐隴西李觀顯慶中寓止滎陽丁父憂乃刺血寫金剛般若心經隨願往生經各一卷自後院中恆有異香非常馥烈鄰側亦常聞之無不稱歎中山郎徐明抄本徐作餘令過鄭州見彼親友具陳其事出法苑珠林豆盧夫人唐陳國竇公夫人豆盧氏芮公寬之姊也夫人信罪福常誦金剛般若經未盡卷一紙許忽頭痛至夜逾甚夫人自念儻死遂不得終經欲起誦之令婢然燭而火悉已滅婢空還夫人深益歎恨忽見廚中有燭炬漸升堂陛直入臥內去地三尺許而無人執光明若晝夫人驚喜取經誦之有頃家人鑽鐩得火燭光即滅自此日誦五遍以為常法後芮公將死夫人往視公謂夫人曰吾姊以誦經之福當壽百歲生好處也夫人年至八十無疾而終出法苑珠林尼修行唐龍朔元年洛州景福寺比丘尼修行房中有侍僮伍五娘死後修行為五娘立靈座經月餘日其姊及弟於夜中忽聞靈座上呻吟其弟初甚恐懼後乃問之答曰我生時於寺中食肉坐此大苦痛我體上有瘡恐污牀席汝可多將灰置牀上也弟依其言置灰後看牀上大有膿血又語弟曰姊患不能縫衣汝太藍縷宜將布來我為汝作衫及襪弟置布於靈牀上經宿即成又語其姊曰兒小時染患遂殺一螃蟹取汁塗瘡得差今入刀林地獄肉中見有折刀七枚願姊慈愍為作功德救助之姊煎迫卒難濟辦但隨身衣服無益死者今并未壞請以用之姊未報間乃曰兒自取去良久又曰衣服以來見在牀上其姊試往觀之乃所斂之服也遂送淨土寺寶獻師處憑寫金剛般若經每寫一卷了即報云已出一刀凡寫七卷了乃云七刀並得出訖今蒙福業助即往託生與姊及弟哭別而去吳興沈玄法說淨土寺僧智整所說亦同出冥報記陳文達唐陳文達梓州郪縣人常持金剛經願與亡父母念八萬四千卷多有祥瑞為人轉經患難皆免銅山縣人陳約曾為冥司所追見地下築臺問之云此是般若臺待陳文達其為冥司所敬如此出法苑珠林高紙隋僕射潁之孫也唐龍朔二年出長安順義門忽逢二人乘馬曰王喚紙不肯從去亦不知其鬼使策馬避之又被驅擁紙有兄是化度寺僧欲往寺內至寺門鬼遮不令入紙乃毆鬼一拳鬼怒即拽落馬曰此漢大凶粗身遂在地因便昏絶寺僧即令舁入兄院明旦乃蘇云初隨二使見王王曰汝未合來汝曾毀謗佛法旦令生受其罪令左右拔其舌以犁耕之都無所傷王問本吏曰彼有何福德如此曰曾念金剛經王稱善即令放還因與客語言次忽悶倒如吞物狀咽下有白脈一道流入腹中如此三度人問之曰少年盜食寺家果子冥司罰令吞鐵丸後仕為翊衛專以念經為事出報應記白仁皙唐白仁皙龍朔中為虢州朱陽尉差運米遼東過海遇風四望昏黑仁皙憂懼急念金剛經得三百遍忽如夢寐見一梵僧謂曰汝念真經故來救汝須臾風定八十餘人俱濟出報應記竇德玄麟德中為卿奉使揚州渡淮船已離岸數十步見岸上有一人形容憔悴擎一小襆坐於地德玄曰日將暮更無船渡即令載之中流覺其有飢色又與飯乃濟及德玄上馬去其人即隨行已數里德玄怪之乃問曰今欲何去答曰某非人乃鬼使也今往揚州追竇大使曰大使何名云名德玄德玄驚懼下馬拜曰某即其人也涕泗請計鬼曰甚愧公容載復又賜食且放公急念金剛經一千遍當來相報至月餘經數足其鬼果來云經已足保無他慮然亦終須相隨見王德玄於是就枕而絶一宿乃蘇云初隨使者入一宮城使者曰公且住我當先白王使者乃入於屏障後聞王遙語曰你與他作計漏泄吾事遂受仗三十使者卻出袒以示公曰喫杖了也德玄再三愧謝遂引入見一著紫衣人下階相揖云公大有功德尚未合來請公還出墮坑中於是得活其使者續至云飢未食及乞錢財並與之問其將來官爵曰熟記取從此改殿中監次大司憲次太子中允次司元太常伯次左相年至六十四言訖辭去曰更不復得來矣後皆如其言出報應記宋義倫唐宋義倫麟德中為虢王府典籤暴卒三日方蘇云被追見王王曰君曾殺狗兔鴿今被論君算合盡然適見君師主云君持金剛經不惟滅罪更合延年我今放君君能不喫酒肉持念尊經否義倫拜謝曰能又見殿內床上有一僧年可五六十披衲義倫即拜禮僧曰吾是汝師故相救可依王語義倫曰諾王令隨使者往看地獄初入一處見大鑊行列其下燃火鑊中煮人痛苦之聲莫不酸惻更入一處鐵床甚闊人臥其上燒炙焦黑形容不辨西顧有三人枯黑佇立頗似婦人向義倫叩頭云不得食喫已數百年倫答曰我亦自無何可與汝更入一獄向使者云時熱恐家人見斂遂去西南行數十步後呼云無文書恐門司不放出遂得朱書三行字並不識門司果問看了放出乃蘇出報應記李岡唐兵部尚書李岡得疾暴卒唯心上暖三日復蘇云見一人引見大將軍蒙令坐索案看云錯追公有頃獄卒擎一盤來中置鐵丸數枚復舁一鐺放庭中鐺下自然火出鐺中銅汁湧沸煮鐵丸赤如火獄卒進盤將軍以讓岡岡懼云飽將軍吞之既入口舉身洞然又飲銅汁身遂火起俯仰之際吞並盡良久復如故岡乃前問之答云地下更無他饌唯有此物即吸食之若或不餐須臾即為猛火所焚苦甚於此唯與寫佛經十部轉金剛經千卷公亦不來吾又離此岡既復生一依所約深加敬異出報應記王阤唐王阤為鷹揚府果毅因病遂斷葷肉發心誦金剛經日五遍後染瘴疾見群鬼來阤即急念經鬼聞便退遙曰王令追汝且止誦經阤即為歇鬼悉向前阤乃昏迷欲絶須臾又見一鬼來云念經人王令權放六月既寤遂一心持誦晝夜不息六月雖過鬼亦不來夜聞空中有聲呼曰汝以持經功德當壽九十矣竟如其言出報應記王令望唐王令望少持金剛經還邛州臨溪路極險阻忽遇猛獸振怖非常急念真經猛獸熟視曳尾而去流涎滿地曾任安州判司過揚子江夜風暴起租船數百艘相接盡沒唯令望船獨全後終亳州譙令出報應記陳惠妻唐陳惠妻王氏初未嫁表兄褚敬欲婚王氏父母不許敬詛曰若不嫁我我作鬼必相致後歸於惠惠為陵州仁壽尉敬陰恚之卒後王夢敬旋覺有娠經十七月不産王氏憂懼乃發心持金剛經晝夜不歇敬永絶交鬼胎亦銷從此日持七遍出報應記何澋唐何澋天授初任懷州武德令常持金剛經至河陽水漲橋倒日已夕人爭上船岸遠未達欲沒澋懼且急念經須臾近岸遇懸蘆攀緣得出餘溺死八十餘人出報應記張玄素唐張玄素洛陽人少持金剛經天授初任黃梅宰家有厄難應念而消年七十遘疾忽有花蓋垂空遂澡浴與家人訣別奄然而卒出報應記李丘一唐李丘一好鷹狗畋獵萬歲通天元年任揚州高郵丞忽一旦暴死見兩人來追一人自云姓段時同被追者百餘人男皆著枷女即反縛丘一被鎖前驅行可十餘里見大槐樹數十下有馬槽段云五道大神每巡察人間罪福於此歇馬丘一方知身死至王門段指一胥云此人姓焦名策是公本頭遂被領見王曰汝安忍無親好殺他命以為己樂須臾即見所殺禽獸皆為人語云乞早處分焦策進云丘一未合死王曰曾作何功德云唯曾造金剛經一卷王即合掌云冥間號金剛經最上功德君能書寫其福不小即令焦策領向經藏令驗至一寶殿衆經充滿丘一試抽一卷果是所造之經既回見王知造有實乃召所殺生類令懇陳謝許造功德丘一依王命願寫金剛經一百卷衆歡喜盡散王曰放去焦策領出城門云盡力如此豈不相報丘一許錢三百千不受云與造經二十部至一坑策推之遂活身在棺中惟聞哭聲已三日矣驚呼人至破棺乃起旬日寫經二十卷了焦策來謝致辭而去尋百卷亦畢揚州刺史奏其事敕加丘一五品仍充嘉州招討使出報應記
