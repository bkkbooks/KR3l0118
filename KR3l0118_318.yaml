body:
  text: 陸機陸機陸機初入洛次河南入偃師時陰晦望道左若有民居因投宿見一少年神姿端遠置易投壺與機言倫妙得玄微機心伏其能無以酬抗既曉便去稅驂逆旅逆旅嫗曰此東十數里無村落有山陽王家冢耳機往視之空野霾雲拱木蔽日方知昨所遇者信王弼也趙伯倫秣陵人趙伯倫曾往襄陽船人以猪豕為禱及祭但㹠肩而已爾夕倫等夢見一翁一姥鬢首蒼素皆著布衣手持橈楫怒之明發輒觸沙衝石皆非人力所禁更施厚饌即獲流通朱彥永嘉朱彥居永寧披荒立舍便聞絃管之聲及小兒啼呼之音夜見一人身甚壯大吹殺其火彥素膽勇不以為懼即不移居亦無後患桓回并州祭酒桓回以劉聰建元三年於途遇一老父問之云有樂工成憑今何職我與其人有舊為致清談得察孝廉君若相見令知消息回問姓字曰我吳郡麻子軒也言畢而失回見憑具宣其意憑歎曰昔有此人計去世近五十年中郎荀彥舒聞之為造祝文令憑設酒飯祀於通衢之上周子長居武昌五大浦東岡頭咸康三年子長至寒溪中嵇家家去五大數里合暮還五大未達先是空岡忽見四匝瓦屋當道門卒便捉子長頭子長曰我佛弟子何足捉我吏曰若是佛弟子能經唄不子長先能誦四天王及庶子經誦之三四過捉故不置便罵之曰武昌癡鬼語汝我是佛弟子為汝誦經數偈故不放人捉者便放不復見屋鬼故逐之過家門前鬼遮不得入亦不得作聲而將鬼至寒溪寺中過子長便擒鬼胸云將汝至寺中和尚前鬼擒子長胸相拖渡五丈塘西行後鬼謂捉者曰放為西將牽我入寺中捉者曰已擒不放子長復為後者曰寺中正有禿輩乃未肯畏之後一鬼小語曰汝近城東逢禿時面何以敗便共大笑子長比達家已三更盡矣荀澤潁川荀澤以太元中亡恆形見還與婦魯國孔氏嬿婉綢繆遂有娠焉十月而産産悉是水別房作醬澤曰我知喪家不當作醬而故為之今上官責我數豆粒致令劬不復堪徑少時而絶桓軏太原中為巴東太守留家江陵妻乳母姓陳兒道生隨軏之郡墮瀨死道生形見云今獲在河伯左右蒙假二十日得暫還母哀至軏有一黑鳥以翅掩其口舌上遂生一瘤從此便不得復哭朱子之東陽郡朱子之有一鬼恆來其家子之兒病心痛鬼語之我為汝尋方云燒虎丸飲即差汝覓大戟與我我為汝取也其家便持戟與鬼鬼持戟去須臾還放戟中庭擲虎丸著地猶尚暖楊羡孝武帝太元末吳縣楊羡有一物似猴人面有髮羡每食鬼恆奪之羡婦在機織羡提刀殺鬼鬼走向機婦形變為鬼羡因斫之見鬼跳出撫掌大笑鬼去羡始悟視婦成十餘段婦妊身殆六月腹內兒髮已生羡惋痛而死王肇宗太原王肇宗病亡亡後形見於其母劉及妻韓共語就母索酒舉杯與之曰好酒語妻曰與卿三年別耳及服終妻疾曰同穴之義古之所難幸者如存豈非至願遂不服藥而歿張禹永嘉中黃門將張禹曾行經大澤中天陰晦忽見一宅門大開禹遂前至廳事有一婢出問之禹曰行次遇雨欲寄宿耳婢入報之尋出呼禹前見一女子年三十許坐帳中有侍婢二十餘人衣服皆燦麗問禹所欲禹曰自有飯唯須飲耳女敕取鐺與之因燃火作湯雖聞沸聲探之尚冷女曰我亡人也冢墓之間無以相共慚愧而已因歔欷告禹曰我是任城縣孫家女父為中山太守出適頓丘李氏有一男一女男年十一女年七歲亡後李氏幸我舊使婢承貴者今我兒每被捶楚不避頭面常痛極心髓欲殺此婢然亡人氣弱須有所憑託君助濟此事當厚報君禹曰雖念夫人言緣殺人事大不敢承命婦人曰何緣令君手刃唯欲因君為我語李氏家說我告君事狀李氏念惜承貴必做禳除君當語之自言能為厭斷之法李氏聞此必令承貴蒞事我因伺便殺之禹許諾及明而出遂語李氏具以其言告之李氏驚愕以語承貴大懼遂求救於禹既而禹見孫氏自外來侍婢二十餘人悉持刀刺承貴應手仆地而死未幾禹復經過澤中此人遣婢送五十匹雜綵以報禹邵公邵公者患瘧經年不差後獨在墅居痁作之際見有數小兒持公手足公因陽暝忽起捉得一小兒化成黃鷁其餘皆走仍縛以還家懸於窗將殺食之及曙失鷁所在而瘧遂愈于時有患瘧者但呼邵公即差吳士季嘉興令吳士季者曾患瘧乘船經武昌廟過遂遣人辭謝乞斷瘧鬼焉既而去廟二十餘里寢際忽夢塘上有一騎追之意甚疾速見士季乃下與一吏共入船後縛一小兒將去既而瘧疾遂愈周子文元帝末譙郡周子文小字阿鼠家在晉陵郡延陵縣少時獵射常入山射獵伴侶相失忽山岫間見一人長五尺許捉弓箭箭鏑頭廣二尺許白如霜雪此人忽出喚曰阿鼠子文不覺應諾此人牽弓滿向子文便伏不能復動遂不見此人獵伴尋求子文都不能語輿還家數日而卒王恭伯晉世王恭伯字子升會稽人美姿容善鼓琴為東宮舍人求假休吳到閶門郵亭望月鼓琴俄有一女子從一女謂恭伯曰妾平生愛琴願共撫之其姿質甚麗恭伯留之宿向曉而別以錦褥香囊為訣恭伯以玉簪贈行俄而天曉聞鄰船有吳縣令劉惠基亡女靈前失錦褥主香囊斯須有官吏遍搜鄰船至恭伯船獲之恭伯懼因述其言我亦贈其玉簪惠基令檢果於亡女頭上獲之惠基乃慟哭因呼恭伯以子壻之禮其女名稚華年十六而卒李經桂陽人李經與朱平帶戟逐焉行百餘步忽見一鬼長丈餘止之曰李經有命豈可殺之無為必傷汝手平乘醉直往經家鬼亦隨之平既見經方欲奮刃忽屹然不動如被執縛果傷左手指焉遂立庭間至暮乃醒而去鬼曰我先語汝云何不從言終而滅謝邈之謝邈之為吳興郡帳下給使鄒覽乘樵船在部伍後至平望亭夜風雨前部任頓住覽露船無所庇宿顧見塘下有人家燈火便往投之至有一茅屋中有一男子年可五十夜織薄別牀有小兒年十歲覽求寄宿此人欣然相許小兒啼泣歔欷此人喻止之不住啼遂至曉覽問何意曰是僕兒其母當嫁悲戀故啼耳將曉覽去顧視不見向屋唯有兩冢草莽湛深行逢一女子乘船謂覽曰此中非人所行君何故從中出覽具以昨夜所見事告之女子曰此是我兒實欲改適故來辭墓因哽咽至冢號咷不復嫁彭虎子少壯有膂力常謂無鬼神母死俗巫誡之云某日殃煞當還重有所殺宜出避之合家細弱悉出逃隱虎子獨留不去夜中有人排門入至東西屋覓人不得次入屋向廬室中虎子遑遽無計牀頭先有一甕便入其中以板蓋頭覺母在板上有人問板下無人耶母云無相率而去司馬恬鄧艾廟在京口止有一草屋晉安北將軍司馬恬於病中夢見一老翁曰我鄧公屋舍傾壞君為治之後訪之乃知艾廟為立瓦屋隆安中有人與女子會於神座上有一蛇來繞之數四匝女家追尋見之以酒脯禱神然後得解阮德如嘗於廁見一鬼長丈餘色黑而眼大著白單衣平上幘去之咫尺德如心安氣定徐笑而謂之曰人言鬼可憎果然鬼赧而退陳慶孫潁川陳慶孫家後有神樹多就求福遂起廟名天神廟慶孫有烏牛神於空中言我是天神樂卿此牛若不與我來月二十日當殺爾兒慶孫曰人生有命命不由汝至日兒果死復言汝不與我至五月殺汝婦又不與至時婦果死又來言汝不與我秋當殺汝又不與至秋遂不死鬼乃來謝曰君為人心正方受大福願莫道此事天地聞之我罪不細實見小鬼得作司命度事幹見君婦兒終期為此欺君索食耳願深恕亮君録籍年八十三家方如意鬼神祐助吾亦當奴僕相事遂聞稽顙聲甄沖字叔讓中山人為雲社令未至惠懷縣忽有一人來通云社郎須臾便至年少容貌美淨既坐寒溫云大人見使貪慕高援欲以妹與君婚故來宣此意甄愕然曰僕長大且已有家何緣此議社郎復云僕妹年少且令色少雙必欲得佳對云何見拒甄曰僕老翁見有婦豈容違越相與反覆數過甄殊無動意社郎有恚色云大人當自來恐不得違爾既去便見兩岸上有人著幘捉馬鞭羅列相隨行從甚多社公尋至鹵簿導從如方伯乘馬輿青幢赤絡覆車數乘女郎乘四望車錦步障數十張婢子八人來車前衣服文彩所未嘗見便於甄傍邊岸上張幔屋舒薦席社公下隱膝几坐白旃坐褥玉唾壺以玳瑁為手巾籠捉白塵尾女郎却在東岸黃門白拂夾車立婢子在前社公引佐吏令前坐當六十人命作樂器悉如琉璃社公謂甄曰僕有陋女情所鍾愛以君體德令茂貪結親援因遣小兒已具宣此旨甄曰僕既老悴已有室家兒子且大雖貪貴聘不敢聞命社公復云僕女年始二十姿色淑令四德克備今在岸上勿復為煩但當成禮耳甄拒之轉苦謂是邪魅便拔刀橫膝上以死拒之不復與語社公大怒便氣呼三斑兩虎來張口正赤號呼裂地徑跳上如此者數十次相守到天明無如之何便去留一牽車將從數十人欲以迎甄甄便移至惠懷上縣中住所迎車及人至門中有一人著單衣幘向之揖於此便住不得前甄停十餘日方敢去故見二人著幘捉馬鞭隨至家至家少日而染病遂亡
