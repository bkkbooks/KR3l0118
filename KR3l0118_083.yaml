body:
  text: 續生續生濮陽郡有續生者莫知其來身長七八尺肥黑剪髮留二三寸不著褌袴破衫齊膝而已人遺財帛轉施貧窮每四月八日市場戲處皆有續生郡人張孝恭不信自在戲場對一續生又遣奴子往諸處看驗奴子來報場場悉有以此異之天旱續生入泥塗偃展久之必雨土人謂之猪龍市內有大坑水潦停注常有群豬止息其間續生向夕來臥冬月飛霜著體睡覺則汗氣衝發無何夜中有人見北市竈火洞赤徑往視之有一蟒蛇身在竈裏首出在竈外大於猪頭並有兩耳伺之平曉乃是續生拂灰而出後不知所之出廣古今五行記張佐開元中前進士張佐常為叔父言少年南次鄠杜郊行見有老父乘青驢四足白腰背鹿革囊顏甚悅懌旨趣非凡始自斜徑合路佐甚異之試問所從來叟但笑而不答至再三叟忽怒叱曰年少子乃敢相逼吾豈盜賊椎埋者耶何必知從來佐遜謝曰嚮慕先生高躅願從事左右耳何賜深責叟曰吾無術教子但壽永者子當嗤吾潦倒耳遂復乘促走佐亦撲馬趁之俱至逆旅叟枕鹿囊寢未熟佐乃疲貰白酒將飲試就請曰單瓢期先生共之叟跳起曰此正吾之所好何子解吾意耶飲訖佐見翁色悅徐請曰小生寡昧願先生賜言以廣聞見他非所敢望也叟曰吾之所見梁隋陳唐耳賢愚治亂國史已具然請以身所異者語子吾宇文周時居歧扶風人也姓申名宗慕齊神武因改宗為觀十八從燕公子謹征梁元帝於荊州州陷大將軍旋夢青衣二人謂余曰呂走天年人向主壽不千吾乃詣占夢者於江陵市占夢者謂余曰呂走回字也人向主住字也豈子住乃壽也時留兵屯江陵吾遂陳情於校尉拓跋烈許之因却詣占夢者曰住即可矣壽有術乎占者曰汝前生梓潼薛君胄也好服朮蘂散多尋異書日誦黃老一百紙徙居鶴鳴山下草堂三間戶外駢植花竹泉石縈繞八月十五日長嘯獨飲因酣暢大言曰薛君胄疏淡若此豈無異人降止止原作旨據明鈔本改忽覺兩耳中有車馬聲因穨然思寢頭才至席遂有小車朱輪青蓋駕赤犢出耳中各高三二寸亦不覺出耳之難車有二童緑幘青帔亦長二三寸憑軾呼御者踏輪扶下而謂君胄曰吾自兜玄國來向聞長嘯月下韻甚清激私心奉慕願接清論君胄大駭曰君適出吾耳何謂兜玄國來二童子曰兜玄國在吾耳中君耳安能處我君胄曰君長二三寸豈復耳有國土儻若有之國人當盡焦螟耳二童曰胡為其然吾國與汝國無異不信請請原作盡據明鈔本改從吾遊或能便留則君離生死苦矣一童因傾耳示君胄君胄覘之乃別有天地花卉繁茂甍棟連接清泉縈繞巖岫杳冥因捫耳投之已至一都會城池樓堞窮極壯麗君胄倣徨未知所之顧見向之二童已在其側謂君胄曰此國大小於君國既至此盍從吾謁蒙玄真伯蒙玄真伯居大殿墻垣階陛盡飾以金碧垂翠簾帷帳中間獨坐真伯身衣雲霞日月之衣冠通天冠垂旒皆與身等玉童四人立侍左右一執白拂一執犀如意二人既入拱手不敢仰視有高冠長裾緣緑衣人宣青紙制曰肇分太素國既有億爾淪下土賤卑萬品聿臻于如此實由冥合況爾清乃躬誠叶于真宰大官厚爵俾宜享之可為主籙大夫君胄拜舞出門即有黃帔三四人引至一曹署其中文簿多所不識每月亦無請受但意有所念左右必先知當便供給因暇登樓遠望忽有歸思賦詩曰風軟景和煦異香馥林塘登高一長望信美非吾鄉因以詩示二童子童子怒曰吾以君質性冲寂引至吾國鄙俗餘態果乃未去鄉有何憶耶遂疾逐君胄如陷落地仰視乃自童子耳中落已在舊去處隨視童子亦不復見因問諸鄰人云失君胄已七八年矣君胄在彼如數月未幾而君胄卒生於君家即今身也占者又云吾前生乃出耳中童子以汝前生好道以得到兜玄國然俗態未盡不可長生然汝自此壽千年矣吾受汝符即歸因吐朱絹尺餘令吞之占者遂復童子形而滅自是不復有疾周行天下名山逮茲向二百餘歲然吾吾原作無據明鈔本改所見異事甚多並記在鹿革中因啓囊出二軸書甚大字頗細佐不能讀請叟自宣略述十餘事其半昭然可記其夕將佐略寢及覺已失叟後數日有人於灰谷湫見之叟曰為我致意於張君佐遽尋之已不復見出玄怪録陸鴻漸竟陵僧有於水邊得嬰兒者育為弟子稍長自筮得蹇之漸繇曰鴻漸于陸其羽可用為儀乃姓陸字鴻漸名羽羽有文學多意思狀一物莫不盡其妙茶術最著鞏縣陶者多為𤮀偶人號陸鴻漸買十器得一鴻漸市人沽茗不利輒灌注之羽於江湖稱竟陵子於南越稱桑苧公貞元末卒出國史補賈耽賈耽相公鎮滑臺日有部民家富於財而父偶得疾身體漸瘦糜粥不通日飲鮮血半升而已其家憂懼乃多出金帛募善醫者自兩京及山東諸道醫人無不至者雖接待豐厚率皆以無效而旋後有人自劍南來診候旬日亦不識其狀乃謂其子曰某之醫家傳三世矣凡見人之疾則必究其源今觀叟則惘然無知豈某之藝未至而叟天降之災乎然某聞府帥博學多能蓋異人也至於卜筮醫藥罔不精妙子能捐五十千乎其子曰何用曰將以遺御吏候公之出以車載叟於馬前使見之儻有言則某得施其力矣子如其言公果出行香見之注視將有言為監軍使白事不覺馬首已過醫人遂辭去其父後語子曰吾之疾是必死之徵今頗煩躁若厭人語爾可載吾城外有山水處置之三日一來省吾如死則葬之於彼其子不獲已載去得一磐石近池置之悲泣而歸其父忽見一黃犬來池中出沒數四狀如沐浴既去其水即香叟渴欲飲而氣喘力微乃肘行而前既飲則覺四體稍輕飲之不已既能坐子驚喜乃復載歸家則能飲食不旬日而愈他日賈帥復出至前所置車處問曰前度病人在否吏報今已平復公曰人病固有不可識者此人是虱癥世間無藥可療須得千年木梳燒灰服之不然即飲黃龍浴水此外無可治也不知何因而愈遣吏問之叟具以對公曰此人天與其疾而自致其藥命矣夫時人聞之咸服公之博識則醫工所謂異人者信矣出會昌解頤治針道士德宗時有朝士墜馬傷足國醫為針腿去針有氣如煙出夕漸困憊將至不救國醫惶懼有道士詣門云某合治得視針處責國醫曰公何容易死生之穴乃在分毫人血脈相通如江河針灸在思其要津公亦好手但誤中孔穴乃令舁床就前於左腿氣滿處下針曰此針下彼針跳出當至於簷板言訖遂針入寸餘舊穴針拂然躍至簷板氣出之所泯然而合疾者當時平愈朝士與國醫拜謝以金帛贈遺道士不受啜茶一甌而去竟不知所之矣出逸史貞元末布衣貞元末有布衣於長安中遊酒肆吟詠以求酒飲至夜多酣醉而歸旅舍人或以為狂寄寓半載時當素秋風肅氣爽萬木凋落長空寥廓塞鴈連聲布衣忽慨然而四望淚下沾襟一老叟怪而問之布衣曰我來天地間一百三十之春秋也每見春日煦春風和花卉芳菲鸚歌蝶舞則不覺喜且樂及至此秋也未嘗不傷而悲之也非悲秋也悲人之生也韶年即宛若春及老耄即如秋因朗吟曰陽春時節天地和萬物芳盛人如何素秋時節天地肅榮秀叢林立衰促有同人世當少年壯心儀貌皆儼然一旦形羸又髮白舊遊空使淚連連老叟聞吟是詩亦泣下沾襟布衣又吟曰有形皆朽孰不知休吟春景與秋時爭如且醉長安酒榮華零悴總奚為老叟乃歡笑與布衣攜手同醉於肆後數日不知所在人有於西蜀江邊見之者出瀟湘録柳城貞元末開州軍將冉從長輕財好士儒生道者多依之有畫人寧采圖為竹林會甚工坐客郭萱柳城二秀才每以氣相軋柳忽眄圖謂主人曰此畫巧於體勢失於意趣今欲為公設薄伎不施五色令其精彩殊勝如何冉驚曰素不知秀才此藝然不假五色其理安在柳歎曰我當出入畫中治之萱抵掌曰君欲紿三尺童子乎柳因要其賭郭請以五千抵負冉亦為保柳乃騰身赴圖而滅坐客大駭圖表於壁衆摸索不獲久之柳忽語曰郭子信未聲若出畫中也食頃瞥自圖上墜下指阮籍像曰工夫祗及此衆視之覺阮籍圖像獨異脣若方嘯寧采覩之不復認冉意其得道與郭俱謝之數日竟他去宋存壽處士在冉家時目擊其事出酉陽雜俎蘇州義師蘇州貞元中有義師狀如風狂有百姓起店十餘間義師忽運斤壞其簷禁之不止主人素知其神禮曰弟子活計賴此顧曰爾惜乎乃擲斤於地而去其夜市火唯義師所壞簷屋數間存焉常止於廢寺殿中無冬夏常積火燒明鈔本燒作壞幡木像悉火之好活燒鯉魚不具湯而食垢面不洗洗之輒雨其中以為雨候將死飲灰汁數斛乃念佛坐不復飲食百姓日觀之坐七日而死時盛暑色不變支不摧出酉陽雜俎吳堪常州義興縣有鰥夫吳堪少孤無兄弟為縣吏性恭順其家臨荊溪常於門前以物遮護溪水不曾穢污每縣歸則臨水看玩敬而愛之積數年忽於水濱得一白螺遂拾歸以水養自縣歸見家中飲食已備乃食之如是十餘日然堪為鄰母哀其寡獨故為之執爨乃卑謝鄰母母曰何必辭君近得佳麗修事何謝老身堪曰無因問其母母曰子每入縣後便見一女子可十七八容顏端麗衣服輕豔具饌訖即却入房堪意疑白螺所為乃密言於母曰堪明日當稱入縣請於母家自隙窺之可乎母曰可明旦詐出乃見女自堪房出入廚理爨堪自門而入其女遂歸房不得堪拜之女曰天知君敬護泉源力勤小職哀君鰥獨勑余以奉媲幸君垂悉無致疑阻堪敬而謝之自此彌將敬洽閭里傳之頗增駭異時縣宰豪士聞堪美妻因欲圖之堪為吏恭謹不犯笞責宰謂堪曰君熟於吏能久矣今要暇蟆毛及鬼臂二物晚衙須納不應此物罪責非輕堪唯而走出度人間無此物求不可得顏色慘沮歸述於妻乃曰吾今夕殞矣妻笑曰君憂餘物不敢聞命二物之求妾能致矣堪聞言憂色稍解妻曰辭出取之少頃而到堪得以納令令視二物微笑曰且出然終欲害之後一日又召堪曰我要蝸斗一枚君宜速覓此若不至禍在君矣堪承命奔歸又以告妻妻曰吾家有之取不難也乃為取之良久牽一獸至大如犬狀亦類之曰此蝸斗也堪曰何能妻曰能食火奇奇原作其據明鈔本改獸也君速送堪將此獸上宰宰見之怒曰吾索蝸斗此乃犬也又曰必何所能曰食火其糞火宰遂索炭燒之遣食食訖糞之於地皆火也宰怒曰用此物奚為令除火掃糞方欲害堪吏以物及糞應手洞然火飆暴起焚爇牆宇煙焰四合彌亘城門宰身及一家皆為煨燼乃失吳堪及妻其縣遂遷於西數步今之城是也出原化記
