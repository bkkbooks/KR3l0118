body:
  text: 木怪張叔高桂陽太守江夏張遼字叔高留其使家居買田田中有大樹十余圍扶疏蓋數畝地不生谷遣客伐之有赤汁六七斗出客驚怖歸具白叔高高怒曰樹老赤汁有何等血因自行復斫之血大流灑叔高使先斫其枝有一空處見白頭公可長四五尺忽出往叔高叔高乃逆格之如此凡數回頭左右皆怖伏地而叔高恬如也徐熟視非人非獸遂伐其木是歲司空辟高為侍御史兗州刺史以居二千石之尊過鄉里荐祝祖孝竟無他怪陸敬叔吳先主時陸敬叔為建安郡太守使人伐大樟樹不數斧有血出樹斷有物人面狗身從樹中出敬叔曰此名彭侯乃烹食之白澤圖曰木之精名彭侯狀如黑狗無尾可烹食之聶友吳聶友字文悌豫章新塗人少時貧賤常好射獵見一白鹿射之中尋蹤血盡不知所在飢困臥梓樹下仰見所射鹿箭著樹枝怪之于是還家繼糧命子弟持斧伐之樹有血遂截為二板牽置陂中常沉時復浮出出家必有吉友欲迎賓客常乘此板或于中流欲沒客大懼友呵之復浮仕官如願位至丹陽太守其板忽隨至石頭友驚曰此陂中板來必有意因解職還家二板挾兩邊一日即至自爾后板出或為凶禍今新塗北二十里余曰封溪有聶友截梓樹板濤牂柯處牂柯有樟樹今猶存乃聶友回日所栽枝葉皆向下生董奇京兆董奇庭前有大樹陰映甚佳后霖雨奇獨在家鄉有小吏言太承云府君來乃見承云著通天冠長八尺自言為方伯某第三子有雋才方當與君周旋明日覺樹下有異每晡后無人輒有一少年就奇語戲或命取飲食如是半年奇氣強壯一門無疾奇后適下墅其仆客三人送護言樹材可用欲貸之郎常不聽今試共斬斫之奇遂許之神亦自爾絶矣趙翼永嘉松陽趙翼以義熙中與大兒鮮共伐山桃樹有血流驚而止后忽失第三息所在經十日自歸聞空中有語聲或歌哭翼語之曰汝既是神何不與我相見答曰我正氣耳舍北有大楓樹南有孤峰名曰石樓四壁絶立人獸莫履小有失意便取此兒著樹杪及石樓上舉家叩頭請之然后得下魏佛陀梁末蔡州布席家空宅相承云凶不可居有回防都督軍人魏佛陀將火入宅前堂止息曛黃之際堂舍有一物人面狗身無尾在舍跳躑佛陀挽弓射之一發即不復見明日發屋看箭飲羽得一朽木可長尺許下有凝血自后遂絶臨淮將上元中臨淮諸將等乘夜宴集燔炙豬羊芬馥備至有一巨手從窗中入言乞一臠衆皆不與頻乞數四終亦不與乃潛結繩作彄施于孔所紿云與肉手復入因而系其臂牽挽甚至而不能脫欲明乃朴然而斷視之是一楊枝持以求樹近至河上以碎斷往往有血崔導唐荊南有富人崔導者家貧乏偶種桔約千余株每歲大獲其利忽一日有一株化為一丈夫長丈余求見崔導導初怪之不敢出丈夫苦求之導遂出見之丈夫曰我前生欠君錢百萬未償而死我家人復自欺君乃上訴于天是以令我合門為桔計傭于君僅能滿耳今上帝有命哀我族屬復我本形兼我自省前事止如再宿耳君幸為我置一敝廬我自耕鑿以卒此生君仍盡剪去桔樹端居守常則能自保不能者天降禍矣何者昔百萬之資今已足矣導大驚乃皆如其言即為葺廬且盡伐去桔樹后五年而導卒家復貧其人亦不知所在賈祕順宗時書生賈祕自睢陽之長安行至古洛城邊見緑野中有數人環飲自歌自舞祕因詣之數人欣然齊起揖祕同席祕既見七人皆儒服俱有禮乃問之曰觀數君子士流也乃敢聚飲于野四望無人有一人言曰我輩七人皆負濟世之才而未用于時者亦猶君之韜蘊而方謀仕進也我輩適偶會論之間君忽辱臨幸且共芳樽惜美景以古之興亡為警覺以人間用舍為擬議又何必涉綺閣入龍舟而方盡一醉也祕甚怪之不覺肅然致敬及歡笑久而七人皆遞相目若有所疑乃問祕曰今既接高論奚不一示君之芳猷使我輩服君而不疑也祕乃起而言曰余睢陽人也少好讀書頗識古者王霸之道今聞皇上纂嗣大寶開直言之路欲一叩象闕少伸愚誠亦不敢取富貴但一豁鄙懷耳適見七君子高會故來詣之幸無遐棄可也其一人顧諸輩笑曰他人自道必可無傷吾屬斷之行當敗缺其一人曰己雖勿言人其舍我一人曰此君名祕固當為我匿瑕矣乃笑謂祕曰吾輩是七樹精也其一曰松二曰柳三曰槐四曰桑五曰棗六曰栗七曰樗今各言其志君幸聽而祕之其松精乃起而言曰我本處空山非常材也負堅貞之節雖霜凌雪犯不能易其操設若哲匠構大廈揮斤斧長短之木各得其用榱桷雖衆而欠梁棟我即必備棟梁之用也我得其用則永無傾危之患矣其次一人起言曰我之風流之名聞于古今但恨煬帝不回無人見知張緒效我空耀載籍所喜者絮飛則才子詠詩葉嫩則佳人學畫柔勝剛強且自保其性也其次者曰我受陽和之恩為不材之木大川無梁人不我取大廈無棟人不我用若非遭郢匠之堊則必不合于長短大小也噫倚我者有三公之名矣其次者言曰我平生好蠶無辭吐飼不異推食蠶即繭繭而絲絲為褲綺褲綺入貴族之用設或貴族之流見褲綺之美麗以念我我又豈須大為梁棟小為榱桷者也其次者曰我自辨士蘇秦入燕之日已推我有兼濟之名也不唯漢武帝號為束束投我者足表赤心我又奚慮不為人所知也其次曰我雖處蓬蓽性實恬然亦可以濟大國之用也倘人主立宗廟虔祀饗而法古以用我我實可以使民之戰栗也其次曰我與衆何殊也天亦覆我地亦載我春即榮秋即落近世人以我為不材我實常懷憤惋我不處澗底怎見我有凌云之勢我不在宇下焉知我是構廈之材驥不騁即駑馬也玉不剖即頑石也固不必松即可構廈凌云我即不可構廈凌云此所謂信一人之言大喪其真矣我所以慕隱淪之輩且韜藏其迹我若逢陶侃之一見即又用之有余也言訖復自歌自舞祕聞其言大怖坐不安席遽起辭之七人乃共勸酒一杯謂祕曰天地間人與萬物皆不可測慎勿輕之祕飲訖謝之而去薛弘機東都渭橋銅駝坊有隱士薛弘機營蝸舍渭河之隈閉戶自處又無妻仆每秋時鄰樹飛葉入庭亦掃而聚焉盛以紙囊逐其強而歸之常于座隅題其詞曰夫人之計將徇前非且不可執我見不從于衆亦不可人生實難唯在處中行道耳居一日殘陽西頽霜風入戶披褐獨坐仰張邴之余芳忽有一客造門儀狀瑰古隆隼龐眉方口廣顙嶷然四皓之比衣早霞裘長揖薛弘機曰足下性尚幽道道著嘉肥仆所居不遙向慕足下操履特相詣弘機一見相得切磋今古遂問姓氏其人曰藏經姓柳即便歌吟清夜將艾云漢興叔孫為禮何得以死喪婚姻而行二載制度吾所感焉歌曰寒水停圓沼秋池滿敗荷杜門窮典籍所得事今多弘機好易因問藏經則曰易道深微未敢學也且劉氏六説只明詩書禮樂及春秋而亡于易其實五説是道之難弘機甚喜此論言訖辭去窣颯有聲弘機望之隱隱然丈余而沒后問諸鄰悉無此色弘機苦思藏經又不知所尋月余又詣弘機弘機每欲相近藏經輒退弘機逼之微聞朽薪之氣藏經隱至明年五月又來乃謂弘機曰知音難逢日月易失心親道曠室邇人遐吾有一絶相贈請君記焉詩曰誰謂三才貴余觀萬化同心虛嫌蠹食年老怯狂風吟訖情意搔然不復從容出門而西遂失其蹤是夜惡風發屋拔樹明日魏王池畔有大枯柳為烈風所拉折其內不知誰人藏經百餘卷盡爛壞弘機往收之多為雨漬斷皆失次第內唯無周易弘機歎曰藏經之謂乎建中年事盧虔東洛有故宅其堂奧軒級甚宏特然居者多暴死是以空而鍵之且久故右散騎常侍萬陽盧虔貞元中為御史分察東台常欲貿其宅而止焉或曰此宅有怪不可居虔曰吾自能弭之后一夕虔與從吏同寢其堂命仆使盡止于門外從吏勇悍善射于是執弓矢坐前軒下夜將深聞有叩門者從吏即問之應聲曰柳將軍遣奉書于盧侍御虔不應已而投一幅書軒下字似濡筆而書者點畫纖然虔命從吏視其字云吾家于此有年矣堂奧軒級皆吾之居也門神戶靈皆吾之隸也而君突入吾舍豈其理耶假令君有余吾入之可乎既不懼吾寧不愧于心耶君速去勿招敗亡之辱讀既畢其書飄然四散若飛燼之狀俄又聞有言者柳將軍願見盧御史已而有大厲至身長數十尋立庭手執一瓢其從吏即引滿而發中所執其厲遂退委其瓢久之又來俯軒而立俯其首且窺焉貌甚異從吏又射之中其胸厲驚若有懼遂東向而去至明虔命窮其迹至宅東隙地見柳高百餘尺有一矢貫其上所謂柳將軍也虔伐其薪自此其宅居者無恙后歲余因重構堂室于屋瓦下得一瓢長約丈余有矢貫其柄即將軍所執之瓢也僧智通臨湍寺僧智通常持法華經入禪宴坐必求寒林淨境殆非人迹所至處經年忽夜有人環其院呼智通至曉聲方息歷三夜聲侵戶智通不耐因應曰呼我何事可入來言也有物長六尺余皂衣青面張目巨吻見僧初亦合手智通熟視良久謂曰爾寒乎就此向火物乃就坐智通但念經至五更物為火所醉因閉目開口據爐而鼾智通觀之乃以香匙舉灰火置其口中物大呼起至門若蹶聲其寺背山智通及明視蹶處得木皮一片登山尋之數里見大青桐樹梢已老矣其下凹根若新缺僧以木皮附之合無綖隙其半有薪者創成一蹬深六七寸余蓋魅之口灰火滿其中久猶熒熒智通焚之其怪遂絶江夏從事太和中有從事江夏者其官舍嘗有怪異每夕見一巨人身盡黑甚光見之即悸而病死后有許元長者善視鬼從事命元長以符術考召后一夕元長坐于堂西軒下巨人忽至元長出一符飛之中其臂然有聲遂墮于地巨人即去元長視其墮臂乃一枯木枝至明日有家僮謂元長曰堂之東北隅有枯樹焉先生符今在其上即往視之其樹有枝梢折者果巨人所斷臂也即伐而焚之宅遂無怪
