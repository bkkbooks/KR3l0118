body:
  text: 苗晉卿苗晉卿苗晉卿困於名場一年似得復落第春景暄妍策蹇衛出都門貰酒一壺籍草而坐酣醉而寐久之既覺有老父坐其傍因揖敘以餘杯飲老父愧謝曰郎君縈悒耶寧要知前事耶晉卿曰某應舉已久有一第分乎曰大有事但更問苗曰某困於窮然愛一郡寧可及乎曰更向上曰廉察乎曰更向上苗公乘酒猛問曰將相乎曰更向上苗公怒全不信因肆言曰將相更向上作天子乎老父曰天子真者即不得假者即得苗都以為怪誕揖之而去後果為將相德宗升遐攝冢宰三日出幽間鼓吹義寧坊狂人元和初上都義寧坊有婦人風狂俗呼為五娘常止宿於永穆墻下時中使茹大夫使于金陵金陵有狂者衆名之信夫或歌或哭往往驗未來事盛暑擁絮未嘗沾汗沍寒袒露體無跔圻中使將返信夫忽扣馬曰我有妹五娘在城今有少信必為我達也中使素知其異欣然許之乃探懷中一襆納中使靴中仍曰謂語五娘無事速歸也中使至長樂坡五娘已至攔馬笑曰我兄有信大夫可見還中史遽取信授之五娘因發襆有衣三事乃衣之而舞大笑而歸復至墻下一夕而死其坊率錢葬之經年有人自江南來言信夫與五娘同日死矣出酉陽雜俎張儼元和末鹽城腳力張儼遞牒入京至宋州遇一人因求為伴其人朝宿鄭州因謂張曰君受我料理可倍行數百乃掘二小坑深五六寸令張背立垂踵坑口針其兩足張初不知痛又自膝下至骭再三捋之黑血滿坑中張大覺舉足輕捷才午至汴復要於陝州宿張辭力不能又曰君可暫卸膝蓋骨且無所苦當行八百張懼辭之其人亦不強乃曰我有事須暮及陝遂去行如飛頃刻不見出酉陽雜俎奚樂山上都通化門長店多是車工之所居也廣備其財募人集車輪轅輻轂皆有定價每治片輞通鑿三竅懸錢百文雖敏手健力器用利鋭者日止一二而已有奚樂山者攜持斧鑿詣門自售視操度繩墨頗精徐謂主人幸分別輞材某當併力主人訝其貪功笑指一室曰此有六百片可可原作甘據明鈔本改任意施為樂山曰或欲通宵請具燈燭主人謂其連夜當倍常功固不能多辦矣所請皆依樂山乃閉戶屏人丁丁不輟及曉啓主人曰並已畢矣願受六十緡而去也主人洎鄰里大奇之則視所為精妙錙銖無失衆共驚駭即付其錢樂山謝辭而去主人密候所之其時嚴雪纍日都下薪米翔貴樂山遂以所得遍散於寒乞貧窶不能自振之徒俄頃而盡遂南出都城不復得而見矣出集異記王居士有常樂王居士者耄年鶴髮精彩不衰常持珠誦佛施藥里巷家屬十餘口豐儉適中一日遊終南山之靈應臺臺有觀音殿基詢其僧則曰梁棟欒櫨悉已具矣屬山路險峻輦負上下大役工徒非三百緡不可集事居士許諾期旬曰齎鏹而至入京乃託於人曰有富室危病醫藥不救者某能活之得三百千則成南山佛屋矣果有延壽坊鬻金銀珠玉者女歲十五遘病甚危衆醫拱手不能措願以其價療之居士則設盟於箋期之必效且曰滯工役已久今留神丹不足多慮某先馳此鏹付所主僧冀獲雙濟鬻金者亦奉釋教因許之留丹於小壺中齎緡而往涉旬無耗女則物化其家始營哀具居士杖策而回乃詬罵因拘將送于邑居士居士原作且據明鈔本改曰某苟大妄安敢復來請入戶視之則殭絶久矣乃命密一室焚槐柳之潤者湧煙於其間人不可邇中平一榻藉尸其上褫藥數粒雜置於頂鼻中又以銅器貯溫水置於心上則謹戶屏衆伺之及曉煙盡薰黔其室居士染指於水曰尚可救亟命取乳碎丹數粒滴於脣吻俄頃流入口中喜曰無憂矣則以纖纊蒙其鼻復以溫水置於心及夜又執燭以俟銅壺下漏數刻鼻纊微噓又數刻心水微灩則以前藥復滴於鼻須臾忽嚏黎明胎息續矣一家驚異愧謝王生生乃更留藥而去或許再來竟不復至後移家他適不知所從女適人育數子而卒出闕史俞叟江陵尹王潛有吏才所在致理但薄於義在江陵日有京兆呂氏子以飢寒遠謁潛潛不為禮月餘在逆旅未果還有市門監俞叟者見呂生往來有不足色召而問之呂曰我居渭北貧苦未達無以奉親府帥王公中表丈也以親舊自遠而來雖入謁未嘗一問亦命之所致耶叟曰我亦困者無以賙吾子之急今夕可泊我宇下展宿食之敬呂諾之既延入摧簷破牖致席於地坐語且久所食陶器脫粟而已叟曰吾嘗學道於四明山偶晦於此適聞王公忘舊甚訝之因覆一缶於地俄頃乃舉以視之有一紫衣人長五寸許叟指之謂呂曰此王公也呂熟視酷類焉叟因戒曰呂生爾之中表姪也以旨甘無朝夕之給自輦下千里而至爾宜厚其館穀當金帛為贈何恃貴忘故之如是耶紫衣者卑揖若受教之狀遂不復見及旦叟促呂歸其逆旅潛召呂館之宴語纍日將戒途助以僕馬橐裝甚厚出補録記傳衡嶽道人衡嶽西原近朱陵洞其山嶮絶多大木猛獸人到者率迷路或遇巨蛇不得進長慶中有頭陀悟空常裹糧持錫夜入山林越尸侵虎初無所懼至朱陵原遊覽纍日捫蘿垂踵無幽不迹因是趼拆憩於巖下長吁曰飢渴如此不遇主人忽見前巖有道士坐繩床僧詣之不動遂責其無賓主意復告以飢困道士欻起指石地曰此有米及钁斸石深數寸令僧探之得陳米斗餘即置於釜承瀑水敲火煮飯觀僧食一口未盡辭以未熟道士笑曰君餐止此可謂薄食我當畢之遂喫硬飯又曰我為客設戲乃處木亡裊枝投蓋危石猿懸鳥跂真捷閃目有頃又旋繞繩床蓬轉甚急但覩衣色成規倏忽失所僧尋路歸寺數月不復飢渴出酉陽雜俎李業李業舉進士因下第過陝虢山路值暴雷雨投村舍避之鄰里甚遠村家只有一小童看舍業牽驢拴於簷下左軍李生與行官楊鎮亦投舍中李有一馬相與入止舍內及稍霽已暮矣小童曰阿翁即欲歸不喜見賓客可去矣業謂曰此去人家極遠日勢已晚固不可前去也須臾老翁歸見客欣然異禮延接留止宿既曉懇留欲備饌業愧謝再三因言曰孫子云阿翁不愛賓客某又疑夜前去不得甚憂怪及不意過禮周旋何以當此翁曰某家貧無以佇賓慚於接客非不好客也然三人皆節度使何敢不祗奉耶業曰三人之中一人行官耳言之過矣翁曰行官領節鉞在兵馬使之前秀才節制在兵馬使之後然秀才五節鉞勉自愛也既數年不第業從戎幕矣明年楊鎮為仇士良開府擢用纍職至軍使除涇州節度使李與鎮同時為軍使領邠州節度業以黨頊功除振武邠涇凡五鎮旄鉞一如老翁之言出録異記石旻會昌中有石旻者蘊至術嘗遊宛陵宿雷氏林亭時雷之家僮網獲一巨魚以雷宴客醉臥未及啓之值天方蒸暑及明日其魚已敗將棄去旻曰吾有藥可令活何棄之有雷則請焉旻遂以藥一粒投魚口中俄而鱗尾皆動鮮潤如故雷大奇之因拜請延年之餌旻曰吾之藥至清至潔爾曹嗜欲無節臟腑之內諸穢委集若遽食之若水火相攻安能全其人乎但神仙可學人自多纍如籠禽檻猿徒有騫翔騰躍之志安可致焉出補録記傳管涔山隱者李德裕嘗云三遇異人非卜祝之流皆遁世者也初掌記北門有管涔山隱者謂德裕曰君明年當在人君左右為文翰之職然須值少主德裕聞之愕眙灑然變色隱者似悔失言避席求去德裕問曰何為而事少主對曰君與少主已有纍世因緣是以言之德裕其年秋登朝至明年正月穆宗篡緒召入禁苑及為原無為字據明鈔本補中丞有閩中隱者叩門請見德裕下榻與語曰時事非久公不早去冬必作相禍將至矣若亟請居外代公者受患公後十年終當作相自西而入是秋出鎮吳門經歲入覲尋又杖鉞南燕秋暮有邑子于生引鄴郡道士而至才升賓階未及命席謂德裕曰公當授西南節制孟冬望舒前符節至矣三者皆與言協不差歲月自憲闈竟十年居相由西蜀而入代德裕執憲者俄亦竄逐唯再調南服未嘗有前知之士為德裕言之豈禍患不可前告神道所祕莫得預聞乎出窮愁志宋師儒宋師儒者纍為鹽鐵小職預知吉凶之事淮南王太尉璠甚重之時淮南有僧常監者言事亦有中常監在從事院話道師儒續入常監甚輕之微不為禮師儒不樂曰和尚有重厄厄在歲盡常監瞋目曰有何事莫相恐嚇某還自辨東西師儒曰和尚厄且至但記取去歲數日莫出城莫騎駿馬子常監勃然而去後數月從事鄭侍御新買一駿馬甚豪駿將迎常監常監曰此非宋師儒之言駿馬子且要騎來未行數里下橋會有負巨竹束者擲之於地正當馬前驚走入隘巷中常監身曳於地足懸於鐙行數里人方救得腦破血流被體食頃不知人事床舁歸寺太尉及從事召宋君曰此可免乎曰彼院竹林中有物未去須慎空隙之所常監飲藥酒服地黃太多因腹疾夜起如廁弟子不知被一黑物推之陷於廁中叫呼良久弟子方來自頸已下悉被沾汙時正寒淋洗凍凜又少頃不知人事王太尉與從事速召宋君大是奇事今復得免否曰須得鄰近有僧暴卒者方可王公專令人伺之其西屋老僧疾困而斃王公曰此免矣曰須得強壯無疾者此不得免數日有少僧剃頭傷刀中風一疾而卒宋君曰此則無事也王公益待以厚禮常監因與宋君親善出逸史會昌狂士會昌開成中含元殿換一柱勑右軍采造選其材合尺度者軍司下盩至山場彌年未搆懸重賞有工人貪賞窮幽捫險人迹不到猛獸成群遇一巨材徑將袤丈其長百餘尺正中其選伐之倒以俟三伏潦水澗流方及谷口千百夫運曳始及砥平之處兩軍相賀奏聞矣淨材以俟有司選日之際欻有一狂士狀若術人繞材太息惋咨唧唧聲甚厲守衛者叱責欲縻之其人略無所懼俄頃主者執之聞於君明鈔本君作軍主中外異之聽其所説須當中鋸解至二尺見驗矣解一尺八寸但訝霏色紅殷至二寸血流矣急命千百人推曳渭流聽下其人云深山大澤實生龍蛇此材中是巨蟒更十年當出樹杪而去未聞長養於中若為殿柱十年後必載此殿而之他國吁可畏也言訖失人所在出芝田録唐慶壽州唐慶中丞栖泊京都偶雇得月作人頗極專謹常不言錢冬首暴處雪中親從外至見臥雪中呼起雪厚數寸都無寒色與唐君話深異之唐後為摧鹽使過河中乃別歸唐曰汝極勤勞吾方請厚俸得以報爾又懇請唐固留不許行至蒲津酒醉與人相毆節帥令嚴決脊二十唐君救免不得無緒便發厚恤酒肉才出城乃至唐曰汝爭得來曰來別中丞唐令袒背視之並無傷處驚甚因語雪臥之事遂下馬與語曰某所不欲經河中過者為有此報今已償了別中丞去與錢絹皆不受置于地再拜而逝出逸史盧鈞盧相國鈞初及第頗窘於牽明鈔本牽作日費俄有一僕願為月傭服飾鮮潔謹幹不與常等覩鈞之乏往往有所資時俯及關關原作開據唐托言改宴鈞未辦醵率撓形於色於是僕輒請罪鈞具以實告對曰極細事耳幾郎可以處分最先合勾當何事鈞初疑其妄既而將覘之紿而命之曰爾若有技吾當主宴第一要一大第為備宴之地次即徐圖其僕唯然而去頃刻乃回白鈞曰已稅得宅矣請幾郎檢校翌日鈞強為觀之既而朱門甲第擬於宮禁鈞不覺欣然又曰會宴處即大如法此尤不易張陳對曰第請選日啓聞待郎明鈔本待郎作若其唐托言待作侍張陳某請專掌鈞始慮其為非反覆詰問但微笑不對或意其非常人亦不固於猜疑暨宴除之日鈞止於是俄覩幕帟茵毯華煥無比此外松竹花卉皆稱是鈞之醵率畢至由是公卿間靡不誇詫詰朝其僕請假給還諸色假借什物因之一去不返始去旬日鈞異其事馳往舊遊訪之則向之花竹一無所有但頽垣壞棟而已議者以鈞之仁感通神明故為曲贊一春之盛而成終身之美也出托言
