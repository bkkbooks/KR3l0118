body:
  text: 裴冕裴冕裴冕為王鉷判官鉷得罪伏法李林甫操竊權柄咸懼之鉷賓佐數人不敢窺鉷門冕獨收鉷尸親自護喪瘞於近郊出談賓録李宜得本賤人背主逃當玄宗起義與王毛仲等立功宜得官至武衛將軍舊主遇諸塗趨而避之不敢仰視宜得令左右命之主甚惶懼至宅請居上座宜得自捧酒食舊主流汗辭之留連數日遂奏云臣蒙國恩榮祿過分臣舊舊原作曹據明鈔本改主卑瑣曾無寸祿臣請割半俸解官以榮之願陛下遂臣愚款上嘉其志擢主為郎將宜得復其秩朝廷以此多之出朝野僉載穆寧穆寧不知何許人顏真卿奏為河北道支使寧以長子屬母弟曰唯爾所適苟不乏嗣吾無纍矣因往平原謂真卿曰先人有嗣矣古所謂死有輕於鴻毛者寧是也願畢佐公以定危難其後寧計或不行真卿棄平原夜渡河出談賓録趙驊趙驊因脅於賊中見一婦人問之即江西廉察韋環之族女也夫為畿官以不往賊軍遇害韋氏沒入為婢驊哀其冤抑以錢贖之俾其妻致之別院而驊竟不見焉明年收復東都驊以家財贍給而求其親屬歸之議者咸重焉出談賓録曹文洽鄭滑之裨將也時姚南仲為節度使被監軍薛盈珍怙勢干奪軍政南仲不從數為盈珍讒於上上頗疑之後盈珍遣小使程務盈馳表南仲誣讒頗甚文洽時奏事赴京師竊知盈珍表中語文洽憤怒遂晨夜兼道追務盈至長樂驛及之與同舍宿中夜殺務盈沉盈珍表於廁中乃自殺日旰驛吏開門見血傷滿地傍得文洽二緘一狀告盈珍一表理南仲冤且陳謝殺務盈德宗聞其事頗疑南仲慮釁深遂入朝初至上曰盈珍擾卿甚耶南仲曰盈珍不擾臣自隳陛下法耳如盈珍輩所在雖羊杜復生撫百姓御三軍必不能成愷悌父母之政師律善陳之制矣德宗默然久之出談賓録陽城貞元中與三弟隱居陝州夏陽山中相誓不婚啜菽飲水莞菌布衾熙熙怡怡同於一同於一三字原作難名其據明鈔本改室後遇歲荒屏迹不與同里往來懼於求也或採桑榆之皮屑以為粥講論詩書未嘗暫輟有蒼頭曰都兒與主協心蓋管寧之比也里人敬以哀饋食稍豐則閉戶不納散於餓禽後里人竊令於中戶致粳核十數杯乃就地食焉他日山東諸侯聞其高義發使寄五百縑城固拒却使者受命不令返城乃標於屋隅未嘗啓緘無何有節土鄭俶者迫於營舉投人不應因途經其門往謁之俶戚容瘵貌城留食旬時問俶所之及其瘠瘁之端俶具以情告城曰感足下之操城有諸侯近貺物無所用輒助足下人子終身之道俶固讓城曰子苟非妄又何讓焉俶對曰君子既施不次之恩某願終志後為奴僕償之遂去俶東洛塋事罷杖歸城以副前約城曰子奚如是苟無他繫同志為學可也何必云役己以相依俶泣涕曰若然者微軀何幸俶於記覽苦不長月餘城令諷毛詩雖不輟尋讀及與之討論如水投石也俶大慚城曰子之學與吾弟相昵不能舍有以致是耶今所止阜北有高顯茅齋子可自玩習也俶甚喜遽遷之復經月餘城訪之與論國風俶雖加功竟不能往復一辭城方出未三二十步俶縊於梁下供餼童窺之驚以告城城慟哭若裂支體乃命都兒將酒祭之及作文親致祭自咎不敏我雖不殺俶俶因我而死自脫衣令僕夫負之都兒行檟楚十五仍服緦麻厚瘞之由是為縉紳之所推重後居諫議大夫時極諫裴延齡不合為國相其言至懇唐史書之及出守江華都日炊米兩斛魚羹一大鬻自天使及草衣村野之夫肆其食之並置瓦甌樿杓有類中衢樽也出乾𦠆子王義即裴度之隸人也度為御史中丞武元衡遇害之日度為人所刺義扞刃而死度由是獲免乃自為文以祭厚給其妻子是歲進士撰王義傳者十二三焉出國史補裴度元和中有新授湖州録事參軍未赴任遇盜勷剽殆盡告敕歷任文薄悉無孑遺遂於近邑求丐故衣迤𨓦假貨却返逆旅旅舍俯逼裴晉公第時晉公在假因微服出遊側近邸遂至湖紏之店相揖而坐與語周旋問及行止紏曰某之苦事人不忍聞言發涕零晉公憫之細詰其事對曰某主京數載授官江湖遇冠蕩盡唯殘微命此亦細事爾其如某將娶而未親迎遭郡牧強以致之獻於上相裴公位亞國號矣裴曰子室之姓氏何也答曰姓某字黃娥裴時衣紫褲衫謂之曰某即晉公親校也試為子偵遂問姓名而往紏復悔之此或中令之親近入而白之當致其禍也寢不安席遲明詣裴之宅側偵之則裴已入內至晚有頳衣吏詣店頗匆遽稱令公召紏聞之惶懼倉卒與吏俱往至第斯須延入小廳拜伏流汗不敢仰視即延之坐竊視之則昨日紫衣押牙也因首過再三中令曰昨見所話誠心惻然今聊以慰其憔悴矣即命箱中官誥授之已再除湖紏矣喜躍未已公又曰黃娥可于飛之任也特令送就其逆旅行裝千貫與偕赴所任出玉堂間話廖有方元和乙未歲下第遊蜀至寶雞西適公館忽聞呻吟之聲潛聽而微惙也乃於間室之內見一貧病兒郎問其疾苦行止強而對曰辛勤數舉未偶知音眄睞叩頭久而復語唯以殘骸相託餘不能言擬求救療是人俄忽而逝遂賤鬻所乘鞍馬於村豪備棺瘞之恨不知其姓字苟為金門同人臨歧悽斷復為銘曰嗟君歿世委空囊幾度勞心翰墨場半面為君申一慟不知何處是家鄉後廖君自西蜀回取東川路至靈龕驛驛將迎歸私第及見其妻素衣再拜嗚咽情不可任徘徊設辭有同親懿淹留半月僕馬皆飫掇熊虎之珍極賓主之分有方不測何緣悚惕尤甚臨別其妻又悲啼贈賮繒錦一馱其價值數百千驛將曰郎君今春所葬胡綰秀才即某妻室之季兄也始知亡者姓字復敘平生之弔所遺物終不納焉少婦及夫堅意拜上有方又曰僕為男子粗察古今偶然葬一同流不可當茲厚惠遂促轡而前驛將奔騎而送復逾一驛尚未分離廖君不顧其物驛將執袂各恨東西物乃棄於林野鄉老以義事申州州將以表奏朝廷文武宰寮願識有方共為導引明年李逢吉知舉有方及第改名遊卿聲動華夷皇唐之義士也其主驛戴克勤堂帖本道節度甄升至於極職克勤名義與廖君同遠矣出雲溪友議
