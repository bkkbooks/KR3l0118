body:
  text: 李斯李斯周末有發冢得方玉石上刻文八十字當時莫識遂藏書府至秦時李斯識八字云上天作命皇辟迭王至漢時叔孫通識二字夏侯嬰漢夏侯嬰以功封滕公及死將葬未及墓引車馬踣地不前使人掘之得一石室室中有銘曰佳城郁郁三千年見白日吁嗟滕公居此室遂改卜焉張恩后魏天賜中河東人張恩盜發湯冢得志云我死后二千年困于恩恩得古鐘磬皆投于河此又別見聖賢城冢記高流之后魏高流之為徐州刺史決滹沱河水繞城破一古墓得銘曰吾死后三百年背底生流泉賴逢高流之遷吾上高原流之為造棺槨衣物取其柩而改葬焉高顯洛洛陽大統寺南有三公令史高顯洛宅洛每于夜見赤光行于堂前如此者非一向光所掘地丈余得黃金百斤銘云蘇秦家金得者為吾造功德洛遂造招福寺世又謂此地蘇秦舊時宅當時元義秉政聞其得金就洛索之以二十斤與之案蘇秦時未有佛法功德者不必起寺或是碑銘之類頌聲績也謝靈運宋浦陽江有琵琶圻圻有古冢墮水甓有隱起字云筮吉龜凶八百年落江中謝靈運取甓詣京咸傳視焉乃驗龜繇古冢已八百矣王果唐左衛將軍王果被責出為雅州刺史于江中泊船仰見岩腹中有一棺臨空半出乃緣崖而觀之得銘曰欲墮不墮逢王果五百年中重收我果喟然歎曰吾今葬此人被責雅州固其命也乃收窆而去丰都冢東都丰都市在長壽寺之東北初築市垣掘得古冢土藏無磚甓棺木陳朽觸之便散尸上著平上幘朱衣得銘云筮道居朝龜言近市五百年間于斯見矣當時達者參驗是魏黃初二年所葬也樊欽賁寇天師謙之后魏時得道者也常刻石為記藏于嵩山上元初有洛川郜城縣民因采藥于山得之以獻縣令樊文言于州州以上聞高宗皇帝詔藏于內府其銘記文甚多奧不可解略曰木子當天下又曰止戈龍又曰李代代不可移宗又曰中鼎顯真容又曰基千萬歲所謂木子當天下者蓋言唐氏受命也止戈龍者言天后臨朝也止戈為武武天后氏也李代代不移宗者謂中宗中興再新天地中鼎顯真容者實真宗之廟諱真為睿聖之徽諡得不信乎基千萬歲者基玄宗名也千萬歲蓋歷數久長也后中宗御歷樊文男欽賁以石記本上獻上命編于國史薑師度衛先生大經解梁人以文學聞不狎俗常閉門絶人事生而敏悟周知天文歷象窮冥索玄后以壽終墓于解梁之野開元中大水薑師度奉詔鑿無咸河以溉鹽田剷室廬潰丘墓甚多解梁人皆病之既至衛先生墓前發其地得一石刻字為銘蓋先生之詞也曰薑師度更移向南三五步工人得之以狀言之于師度師度異其事歎詠久之顧謂僚吏曰衛先生真奇士也即命工人遷其河遠先生之墓數十步塢載開元中江南大水溺而死者數千郡以狀聞玄宗詔侍御史塢君載往巡之載至江南忽見道旁有古墓水潰其穴公念之命遷其骸于高原上既發墓得一石鑿而成文蓋志其墓也志后有銘二十言乃卜地者之詞詞曰爾后一千歲此地化為泉賴逢塢侍御移我向高原載覽而異之因校其年果千歲矣鄭欽悅天寶中有商洛隱者任升之嘗貽右補闕鄭欽悅書曰升之白頃退居商洛久闕披陳山林獨往交親兩絶意有所問別日垂訪升之五代祖仕梁為太常初住南陽王帳下于鐘山懸岸圯壙之中得古銘不言姓氏小篆文云龜言土蓍言水甸服黃鐘啓靈趾瘞在三上庚墮遇七中巳六千三百浹辰交二九重三四百圯文雖剝落仍且分明大雨之后才墮而獲即梁武大同四年數日遇盂蘭大會從駕同泰寺録示史官姚訾并諸學官詳議數月無能知者筐笥之內遺文尚在足下學乃天生而知計舍運籌而會前賢所不及近古所未聞願采其旨要會其歸趣著之遺簡以成先祖之志深所望焉樂安任升之白數日欽悅即復書曰使至忽辱簡翰用浣襟懷不遺舊情俯見推訪又示以大同古銘前賢未達仆非遠識安敢輕言良增懷愧也屬在途路無所披求據鞍運思頗有所得發壙者未知誰氏之子卜宅者實為絶代之賢藏往知來有若指掌契終論始不差錙銖隗照之預識龔使無以過也不説葬者之歲月先識圮時之日辰以圯之日卻求初兆事可知矣姚史官亦為當世達識復與諸儒詳之沉吟月余竟不知其指趣豈止于是哉原卜者之意隱其事微甚言當待仆為龔使耳不然何忽見顧訪也謹稽諸歷術測以微詞試一探言庶會微旨當梁武帝大同四年歲次戊午言甸服者五百也黃鐘者十一也五百一十一年而圯從大同四年上求五百一十一年得漢光武帝建武四年戊子歲也三上庚三月上旬之庚也其年三月辛巳朔十日得庚寅是三月初葬于鐘山也七中巳乃七月戊午朔十二日得己巳是初圯墮之日是日己巳可知矣浹辰十二也從建武四年三月至大同四年七月總六千三百一十二月每月一交故云六千三百浹辰交也二九為十八重三為六末言四百則六為千十八為萬可知從建武四年三月十日庚寅初葬至大同四年七月十二日己巳初圯計一十八萬六千四百日故云二九重三四百圯也其所言者但説年月日數耳據年則五百一十一會于甸服黃鐘言月則六千三百一十二會于六千三百浹辰交論日則一十八萬六千四百會于二九重三四百圯從三上庚至于七中巳據歷計之無所差也所言年則月日但差一數則不相照會矣原卜者之意當待仆言之吾子之問契使然也從吏已久藝業荒蕪古人之意復難遠測足下更詢能者時報焉使還不代鄭欽悅白記貞元中李吉甫任尚書屯田員外郎兼太常博士時宗人巽為戶部郎中於南宮暇日語及近代儒術之士謂吉甫曰故右補闕集賢殿直學士鄭欽悅于術數研精思通玄奧蓋僧一行所不逮以其夭閼當世名不甚聞子知之乎吉甫對曰兄何以核諸巽曰天寶中商洛隱者任升之自言五代祖仕梁為太常大同四年于鐘山下獲古銘其文隱祕博求時儒莫曉其旨因緘其銘誡諸子曰我代代子孫以此銘訪于通人倘有知者吾無所恨至升之頗耽道博雅聞欽悅之名即告以先祖之意欽悅曰子當録以示我我試思之升之書遺其銘會欽悅適奉朝使方授駕于長樂驛得銘而釋之行及滋水凡三十里則釋然悟矣故其書曰據鞍運思頗有所得不亦異乎辛未歲吉甫轉駕部員外郎欽悅子克鈞自京兆府司録授司門員外郎吉甫數以巽之説質焉雖且符其言然克鈞自云亡其草每想其微言至賾而不獲見吉甫甚惜之壬申歲吉甫貶明州長史海島之中有隱者姓張氏名玄陽以明易經為州將所重召置閣下因講周易卜筮之事即以欽悅之書示吉甫吉甫喜得其書手卡逾獲寶即編次之仍為著論曰夾一丘之土無情也遇雨而圯偶然也窮象數者已懸定于十八萬六千四百日之前矧于理亂之運窮達之命聖賢不逢君臣偶合則薑牙得璜而尚父仲尼無鳳而旅人傅説夢達于岩野子房神授于圯上亦必定之符也然而孔不暇暖其席墨不俟黔其突何經營如彼孟去齊而接淅賈造湘而投吊又眷戀如此豈大聖大賢猶惑于性命之理歟將浼身存教示人道之不可廢歟余不可得而知也欽悅尋自右補闕歷殿中侍御史為時宰李林甫所惡斥擯于外不顯其身故余敘其所聞系于二篇之后以著蓍筮之神明聰哲之懸解奇偶之有數貽諸好事為后學之奇玩焉時貞元九年十一月二十八日趙郡李吉甫記
