body:
  text: 張魚舟張魚舟唐建中初青州北海縣北有秦始皇望海台台之側有別濜泊泊邊有取魚人張魚舟結草庵止其中常有一虎夜突入庵中值魚舟方睡至欲曉魚舟乃覺有人初不知是虎至明方見之魚舟驚懼伏不敢動虎徐以足捫魚舟魚舟心疑有故因起坐虎舉前左足示魚舟魚舟視之見掌有刺可長五六寸乃為除之虎躍然出庵若拜伏之狀因以身劘魚舟良久回顧而去至夜半忽聞庵前墜一大物魚舟走出見一野豕腯甚幾三百斤在庵前見魚舟復以身劘之良久而去自后每夜送物來或豕或鹿村人以為妖送縣魚舟陳始末縣使吏隨而伺之至二更又送麋來縣遂釋其罪魚舟為虎設一百一齋功德其夜又銜絹一匹而來一日其庵忽被虎拆之意者不欲魚舟居此魚舟知意遂別卜居焉自后虎亦不復來申屠澄申屠澄者貞元九年自布衣調補濮州什邠尉之官至真符縣東十里許遇風雪大寒馬不能進路旁茅舍中有煙火甚溫煦澄往就之有老父嫗及處女環火而坐其女年方十四五雖蓬發垢衣而雪膚花臉舉止妍媚父嫗見澄來遽起曰客沖雪寒甚請前就火澄坐良久天色已晚風雪不止澄曰西去縣尚遠請宿于此父嫗曰苟不以蓬室為陋敢不承命澄遂解鞍施衾幬焉其女見客更修容靚飾自帷箔間復出而間麗之態尤倍昔時有頃嫗自外挈酒壺至于火前暖飲謂澄曰以君冒寒且進一杯以御凝冽因揖讓曰始自主人翁即巡行澄當婪尾澄因曰座上尚欠小娘子父嫗皆笑曰田舍家所育豈可備賓主女子即回眸斜睨曰酒豈足貴謂人不宜預飲也母即牽裙使坐于側澄始欲探其所能乃舉令以觀其意澄執盞曰請徵書語意屬目前事澄曰厭厭夜飲不醉無歸女低鬟微笑曰天色如此歸亦何往哉俄然巡至女女復令曰風雨如晦雞鳴不已澄愕然歎曰小娘子明慧若此某幸未昏敢請自媒如何翁曰某雖寒賤亦嘗嬌保之頗有過客以金帛為問某先不忍別未許不期貴客又欲援拾豈敢惜即以為托澄遂修子壻之禮祛囊以遺之嫗悉無所取曰但不棄寒賤焉事資貨明日又謂澄曰此孤遠無鄰又復湫溢不足以久留女既事人便可行矣又一日咨嗟而別澄乃以所乘馬載之而行既至官俸祿甚薄妻力以成其家交結賓客旬日之內大獲名譽而夫妻情義益浹其于厚親族撫甥侄洎僮仆廝養無不歡心后秩滿將歸已生一男一女亦甚明慧澄尤加敬焉常作贈內詩一篇曰一官慚梅福三年愧孟光此情何所喻川上有鴛鴦其妻終日吟諷似默有和者然未嘗出口每謂澄曰為婦之道不可不知書倘更作詩反似嫗妾耳澄罷官即罄室歸秦過利州至嘉陵江畔臨泉藉草憩息其妻忽悵然謂澄曰前者見贈一篇尋即有和初不擬奉示今遇此景物不能終默之乃吟曰琴瑟情雖重山林志自深常憂時節變辜負百年心吟罷潸然良久若有慕焉澄曰詩則麗矣然山林非弱質所思倘憶賢尊今則至矣何用悲泣乎人生因緣業相之事皆由前定后二十余日復至妻本家草舍依然但不復有人矣澄與其妻即止其舍妻思慕之深盡日涕泣于壁角故衣之下見一虎皮塵埃積滿妻見之忽大笑曰不知此物尚在耶披之即變為虎哮吼拿攖突門而去澄驚走避之攜二子尋其路望林大哭數日竟不知所之丁岩貞元十四年中多虎暴白晝噬人時淮上阻兵因以武將王徵牧申州焉徵至則大修擒虎具兵仗坑阱靡不備設又重懸購得一虎而酬十縑焉有老卒丁岩者善為陷阱遂列于太守請山間至路隅張設以圖之徵既許不數日而獲一虎焉虎在深坑無施勇力岩遂俯而下視加以侮誚虎則跳躍哮吼怒聲如雷而聚觀之徒千百其衆岩炫其計得夸喜異常時方被酒因為衣襟罥挂樹根而墜阱中衆共嗟駭謂靡粉于暴虎之爪牙矣及就窺岩乃端坐而虎但瞪視耳岩之親愛憂岩乃共設計以轆轤下巨索伺岩自縛當遽引上或希十一之全岩得索則纏縛腰肢揮手外人則共引之去地三二尺其虎則以前足捉其索而留焉意態極仁如此數四岩因而謂之曰爾輩縱暴入郭犯人事須剪除理宜及此顧爾之命且在頃刻吾因沉醉誤落此中衆所未便屠者蓋以我故也爾若損我固激怒衆人我氣未絶即當薪火亂投爾為灰燼矣爾不若從吾當啓白太守舍爾之命冀爾率領群輩遠離此土斯亦渡河他適爾所知者矣我當質之天日不渝此約其虎諦聽若有知解岩則引繩衆共出之虎乃弭耳矚目不復留岩既得出遂以其事白于邦伯曰今殺一虎不足禳群輩之暴況與試約乞舍之冀其率侶四出管界獲寧耳徵許之岩遂以太守之意丁寧告諭虎于陷中踊躍盤旋如荷恩施岩即積土坑側稍益淺猶深丈許虎乃躍而出奮迅躑騰嘯風而逝自是旬朔之內群虎屏迹而山野晏然矣吁保全軀命之計雖在異類亦有可觀者焉若暴虎之猛悍況厄陷阱得人固當恣其狂怒決裂噬嚙以豁其情斯虎乃因岩以圖全而果諧焉何其智哉而岩能以言詞誘諭通于強戾果致族行出境之異況免挂罥之害又何智哉斯乃信誠交感之致耳于戲信誠之為物也何其神歟王用虢州王成縣黑魚谷貞元中百姓王用業炭于谷中谷中有水方數步常見二黑魚長尺余遊水上用伐木飢困遂食一魚其弟驚曰此魚或是谷中靈物兄奈何殺之有頃其妻餉之用運斤不已久乃轉面妻覺狀貌有異呼其弟視之忽脫衣嗥躍變為虎焉徑入山時時殺獐鹿類以食如此三年一日日昏叩門自名曰我用也弟應曰我兄變為虎三年矣何鬼假其姓名又曰我往年殺黑魚冥謫為虎又因殺人冥官笞余一百今放免傷遍體汝第視余無疑也弟喜遂開門見一人頭猶是虎因怖死舉家叫呼奔避竟為村人格殺驗其身有黑信王用也但首未變元和中處士趙齊約嘗至谷中見村人説張逢南陽張逢貞元末薄遊嶺表行次福州福唐縣橫山店時初霽日將暮山色鮮媚煙嵐靄然策杖尋勝不覺極遠忽有一段細草縱廣百餘步碧藹可愛其旁有一小樹遂脫衣挂樹以杖倚之投身草上左右翻轉既而酣睡若獸蹍然意足而起其身已成虎也文彩爛然自視其爪牙之利胸膊之力天下無敵遂騰躍而起越山超壑其疾如電夜久頗飢因傍村落徐行犬彘駒犢之輩悉無可取意中恍惚自謂當得福州鄭録事乃旁道潛伏未幾有人自南行乃候吏迎鄭者見人問曰福州鄭録事名璠計程當宿前店見説何時發來人曰吾之主人也聞其飾裝到亦非久候吏曰只一人來且復有同行吾當迎拜時慮其誤也曰三人之中參緑者是其時逢方伺之而彼詳問若為逢而問者逢既知之手替身以俟之俄而鄭到導從甚衆衣參緑甚肥昂昂而來適到逢銜之走而上山時天未曙人雖多莫敢逐得恣食之唯余腸發既而行于山林孑然無侶乃忽思曰我本人也何樂為虎自囚于深山盍求初化之地而復焉乃步步尋求日暮方到其所衣服猶挂杖亦在細草依然翻復轉身于其上意足而起即復人形矣于是衣衣策杖而歸昨往今來一復時矣初其仆夫驚失乎逢也訪之于鄰或云策杖登山多岐尋之杳無形迹及其來驚喜問其故逢紿之曰偶尋山泉到一山院共談釋教不覺移時仆夫曰今旦側近有虎食福州鄭録事求余不得山林故多猛獸不易獨行郎之未回憂負實極且喜平安無他逢遂行元和六年旅次淮陽舍于公館館吏宴客坐有為令者曰巡若到各言己之奇事事不奇者罰巡到逢逢言橫山之事末坐有進士鄭遐者乃鄭糾之子也怒目而起持刀將殺逢言復父仇衆共隔之遐怒不已遂入白郡將于是送遐南行敕津吏勿復渡使逢西邁且勸改名以避之或曰聞父之仇不可以不報然此仇非故殺若必死殺逢遐亦當坐遂遁去而不復其仇焉吁亦可謂異矣
