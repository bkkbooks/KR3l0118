body:
  text: 崔季舒崔季舒北齊崔季舒位至侍中特進忽爾其家池中蓮皆化為人面著鮮卑帽又其妻曾晝寢見一神人身長丈余黑體黑毛前來逼己巫曰此是五道將軍入宅者不祥也又庭中忽流血有一白物大如斛自天而下當其子首未至尺余乃滅季舒又見其家內廳中有一大手長丈余從地而出滿室光耀問左右皆云不見尋以非罪見誅安陽黃氏北齊武成時安陽縣有黃家者住古城南其先纍世巨富有巫師占君家財物欲出好自防守若去家即大貧其家每夜使人分守夜有一隊人盡著黃衣乘馬從北門出一隊白衣人乘馬從西門出一隊青衣人乘馬從東園門出悉借問趙虞家此去近遠當時并忘去后醒覺撫心懊悔不可復追所出黃白青者皆金銀錢貨良之復見一人跛腳負薪而來亦問趙虞家人念極命奴擊之就視乃家折腳鐺也自此之后漸貧死亡都盡齊后主北齊后主武平五年如晉陽在路兵人于幕下忽唱叫訊之曰見無數人皆騎小馬如狐爭揮刀梢故叫之王惠照武平末廣平都省主事王惠照息休為郡學生刻木作一小兒盛衣帶里每食必食之告云奴啖方自食自此后迷為魍魎著之時餉不飼則病友垂死漸不饗菜蔬要索酒肉休兄竊取以火焚之休病轉困其家事急顧工匠刻木妙寫形狀為置靈床之處下語云燒毀我如此重刻何益歲余休成狂病卒獨孤陀隋獨孤陀字黎邪文帝時為延州刺史性好左道其外家高氏先事貓鬼已殺其舅郭沙羅因轉入其家帝微聞之而不信其姊為皇后與楊素妻鄭氏俱有疾召醫視之皆曰此貓鬼疾帝以陀后之異母弟陀妻乃楊素之異母妹也由是疑陀所為陰令其兄穆以情喻之上又遣左右諷陀言無有上不悅左遷陀陀遂出怨言上令左仆射高穎納言蘇威大理楊遠皇甫孝緒雜按之而陀婢徐阿尼供言本從陀母家來常事貓鬼每以子日夜祀之言子者鼠也貓鬼每殺人被殺者家財遂潛移于畜貓鬼家帝乃以事問公卿奇章公牛弘曰妖由人興殺其人可以絶矣上令犢車載陀夫妻將死弟詣闕哀求于是免死除名以其妻楊氏為尼先王有人訴其母為貓鬼殺者上以為妖妄怒而遣之及是乃詔赦訴行貓鬼家焉陀亦未幾而卒楊素大業五年尚書令楊素于東都造宅潛于宮省遣人就衛尉少卿蕭吉請擇良日入新宅吉知其不終乃以書一卷付之此書專是述死喪之事素開而惡之乃焚于前庭素宅內造沉香堂甚精麗初成閉之三日然后擇日始開視之四壁如新血所灑流于地腥氣觸人素甚惡之竟遇鴆而死九年素長子禮部尚書楊玄感庭中無故有血灑地玄感懼遂舉兵反伏誅滕景貞滕景貞在廣州七層寺永徽中罷職歸家婢炊釜中忽有聲如雷米上芃芃隆起滕就視聲轉壯甑上生花數十長似蓮花色赤如金俄頃萎滅旬日景貞卒元邃永淳初同州司功元邃其母白日在堂坐忽見屏外有小人騎小馬入來人長二三尺馬亦相稱衣甲具裝光彩輝日于庭內巡牆馳走良久方滅此后每常欲自殺合家守之經年稍怠母夜臥以衣置被中自代便即走出侍者覺之分覓以投于井比及出之殆亦絶矣劉志言長安劉志言任華州下邽縣尉此廨素凶遂于里內借宅然宅內不免有怪婢晨起理發梳墮地婢俯取梳見床下有布袋中似有數歲小兒婢引手取之袋內跳出婢驚懼走出舉家就視了無所見志言秩滿而卒素娥素娥者武三思之妓人也三思初得喬氏青衣窈娘能歌舞三思曉知音律以窈娘歌舞天下至藝也未幾沉于洛水遂族喬氏之家左右有舉素娥曰相州鳳陽門宋媼女善彈五弦世之殊色三思乃以帛三百段往聘焉素娥既至三思大悅遂盛宴以出素娥公卿大夫畢集唯納言狄仁杰稱疾不來三思怒于座中有言宴罷有告仁杰者明日謁謝三思曰某昨日宿疾暴作不果應召然不睹麗人亦分也他后或有良宴敢不先期到門素娥聞之謂三思曰梁公強毅之士非款狎之人何必固抑其性再宴不可無請不召梁公也三思曰儻阻我宴必族其家后數日復宴客未來梁公果先至三思特延梁公坐于內寢徐徐飲酒待諸賓客請先出素娥略觀其藝遂停杯設榻召之有傾蒼頭出曰素娥藏匿不知所在三思自入召之皆不見忽于堂奧隙中聞蘭麝芬馥乃附耳而聽即素娥語音也細如屬絲才能認辨曰請公不召梁公今固召之不復生也三思問其由曰某非他怪乃花月之妖上帝遣來亦以多言蕩公之心將興李氏今梁公乃時之正人某固不敢見某嘗為仆妾敢無情願公勉事梁公勿萌他志不然武氏無遣種矣言迄更問亦不應也三思出見仁杰稱素娥暴疾未可出敬事之禮仁杰莫知其由明日三思密奏其事則天歎曰天之所授不可廢也張易之張易之將敗也母韋氏號阿藏在宅坐家人報云有車馬騎從甚多至門而下疑其內官也藏出迎之無所見又野狐數擎飯瓮牆頭而過未旬日而禍及垂拱之后諸州多進雌雞化為雄雞者則天之應也李承嘉唐神龍中戶部尚書李承嘉不識字不解書為御史大夫兼洛州長史名判司為狗罵御史為驢威振朝廷西京造一堂新成坊人見野狐無數直入宅須臾堂舍四裂瓦木一聚判事筆管手中直裂別取筆復裂如初數日出為藤州員外司馬卒泰州人太定年中泰州赤水店有鄭家莊有一兒年二十余日晏于驛路上見一青衣女子獨行姿容殊麗問之云欲到鄭縣待二婢未來躊躇伺候此兒屈就莊宿安置廳中供給酒食將衣被同寢至曉門久不開呼之不應于窗中窺之惟有腦骨頭顱在余并食訖家人破戶入于梁上暗處見一大鳥沖門飛出或云是羅剎魅也梁載言唐懷州刺史梁載言晝坐廳事忽有物如蝙蝠從南飛來直入口中翕然似吞一物腹中遂絞痛數日而卒范季輔鄜城尉范季輔未娶有美人崔氏宅在永平里常依之開元二十八年二月崔氏晨起下堂有物死在階下身如狗項有九頭皆如人面面狀不一有怒者喜者妍者丑者老者少者蠻者夷者皆大如拳尾甚長五色崔氏恐以告季輔問諸巫巫言焚之五道災則消矣乃于四達路積薪焚之后數日崔氏母殂又數日崔氏死又數日季輔亡洛陽婦人玄宗時洛陽婦人患魔魅前后術者治之不愈婦人子詣葉法善道士求為法遣善云此是天魔彼自天上負罪為帝所譴暫在人間然其譴已滿尋當自去無煩遣之也其人意是相解之詞故求祐助善云誠不惜往乃攜人深入陽翟山中絶嶺有池水善于池邊行禁久之水中見一頭髻如三間屋冉冉而出至兩目睒如電光須臾云霧四合因失所在裴休貞金吾將軍裴休貞微時居教業里有客過之休貞飲客其弟皆預日晚客去休貞獨臥廳事昏后休貞醒繞床有聲曰哥哥去娘子如此不絶休貞視呼者狀甚可畏繞之不止休貞懼跳門呼奴奴以燈來其弟亦至于是怪依燈影中狀若昆侖齒大而白長五尺休貞弟休元素多力擊之以拳應手有聲如擊鐵石怪形即滅其歲休貞母殂牛成京城東南五十里曰孝義坊坊之西原常有怪開元二十九年牛肅之弟成因往孝義晨至西原遇村人任杲與言忽見其東五百步有黑氣如車凡十余其首者高二三丈余各丈余自北徂南將至原窮又自南還北纍纍相從日出后行轉急或出或沒日漸高皆失杲曰此處常然蓋不足怪數月前有飛騎者番滿南歸忽見空中有物如角馱之像飛騎刀刺之角馱涌出為人身長丈余而逐飛騎飛騎走且射之中怪道少留又來踵飛騎又射之乃止既明尋所射處地皆有血不見怪因遇疾還家數日而卒張翰右監門衛録事參軍張翰有親故妻天寶初生子方收所生男更有一無首孩子在傍跳躍攬之則不見手去則復在左右按白澤圖曰其名曰常依圖呼名至三呼奄然已滅南鄭縣尉南鄭縣尉孫旻為山南采訪支使嘗推覆在途舍于山館忽有美婦人面出于柱中顧旻而笑旻拜而祈之良久方滅懼不敢言也后數年選授桑泉尉在京疾友人問疾旻乃言之而卒李泮咸陽縣尉李泮有甥勇而頑常對客自言不懼神鬼言甚夸誕忽所居南牆有面出焉赤色大尺余跌鼻睔目鋒牙利口殊可憎惡甥大怒拳毆之應手而滅俄又見于西壁其色白又見東壁其色青狀皆如前拳擊亦滅后黑面見于北牆貌益恐人其大則倍甥滋怒擊數拳不去拔刀刺之乃中面乃去牆來掩甥手推之不能去黑面遂合于甥面色如漆甥仆地死及殯殮其色終不改元自虛開元中元自虛為汀洲刺史至郡部衆官皆見有一人年垂八十自稱蕭老一家數口在使君宅中纍世幸不占廳堂言訖而沒自后凡有吉凶蕭老為預報無不應者自虛剛正常不信之而家人每夜見怪異或見有人坐于檐上腳垂于地或見人兩兩三三空中而行或抱嬰兒問人乞食或有美人濃妝美服在月下言笑多擲磚瓦家人乃白自虛曰常聞廚后空舍是神堂前人皆以香火事之今不然故妖怪如此自虛怒殊不信忽一日蕭老謁自虛云今當遠訪親舊以數口為托言訖而去自虛以問老吏吏云常聞使宅堂后枯樹中有山魈自虛令積柴與樹齊縱火焚之聞樹中冤枉之聲不可聽月余蕭老歸縞素哀哭曰無何遠出委妻子于賊手今四海之內孑然一身當令公知之耳乃于衣帶解一小合大如彈丸擲之于地云速去速去自虛俯拾開之見有一小虎大才如繩自虛欲捉之遂跳于地已長數寸跳擲不已俄成大虎走入中門其家大小百餘人盡為所斃虎亦不見自虛者亦一身而已
