body:
  text: 蒼龍蒼龍孔子當生之夜二蒼龍亙天而下來附徵在之房因而生夫子有二神女擎香露空中而來以沐浴徵在曹鳳後漢建武中曹鳳字仲理為北地太守政化尤異黃龍見于九里谷高岡亭角長二丈大十圍梢至十余丈天子嘉之賜帛百匹加秩中二千石張魯女張魯之女曾浣衣于山下有白霧濛身因而孕焉恥之自裁將死謂其婢曰我死后可破腹視之婢如其言得龍子一雙遂送于漢水既而女殯于山后數有龍至其墓前成蹊江陵姥江陵趙姥以沽酒為業義熙中居室內忽地隆起姥察為異朝夕以酒酹之嘗見一物出頭似驢而地初無孔穴及姥死家人聞土下有聲如哭后人掘地見一異物蠢然不測大小須臾失之俗謂之土龍甘宗秦使者甘宗所奏西域事云外國方士能神咒者臨川禹步吹氣龍即浮出初出乃長數十丈方士吹之一吹則龍輒一縮至長數寸乃取置壺中以少水養之外國常苦旱災于是方士聞有旱處便繼龍往出賣之一龍直金數十斤舉國會斂以顧之直畢乃發壺出龍置淵中復禹步吹之長數十丈須臾雨四集矣南鄩國南鄩國有洞穴陰源其下通地脈中有毛龍毛魚時蛻骨于曠澤之中魚龍同穴而處其國獻毛龍一于殷殷置豢龍之官至夏代不絶因以命族至禹導川及四海會同乃放于洛汭龍場王子年拾遺曰方丈山東有龍場地方千里龍皮骨如山阜布散百餘頃述異記晉寧縣有龍葬洲父老云龍蛻骨于此洲其水今猶多龍骨按山阜岡岫能興云雨者皆有龍骨或深或淺多在土中齒角尾足宛然皆具大者數十丈或盈十圍小者才一二尺或三四寸體皆具焉嘗因采取見之論衡云蟬生于腹育開背而出必因雨而蛻如蛇之蛻皮云近蒲洲人家拆草屋于棟上得龍骨長一丈許宛然皆具五色石天目山人全文猛于新丰后湖觀音寺西岸獲一五色石大如斗文彩盤蹙如有夜光文猛以為神異抱獻之梁武梁武喜命置于大極殿側將年余石忽光照廊廡有聲如雷帝以為不祥召杰公示之對曰此上界化生龍之石也非人間物若以洛水赤礪石和酒合藥煮之百餘沸柔軟可食琢以為飲食之器令人延壽福德之人所應受用有聲者龍欲取之帝令馳取赤石如其法命工琢之以為甌各容五斗之半以盛御膳香美殊常以其余屑置于舊處忽有赤龍揚須鼓鬣掉尾入殿擁石騰躍而去帝遣推驗乃是普通二年始平郡石鼓村斗龍所競之石其甌遭侯景之亂不知所之震澤洞震澤中洞庭山南有洞穴深百餘尺有長城乃仰公誤墮洞中旁行升降五十余里至一龍宮周圍四五里下有青泥至膝有宮室門闕龍以氣辟水霏如輕霧晝夜光明遇守門小蛟龍張鱗奮爪拒之不得入公在洞百有余日食青泥味若粳米忽仿佛說得歸路尋出之為吳郡守時乃具事聞梁武帝帝問杰公公曰此洞穴有四枝一通洞庭湖西岸一通蜀道青衣浦北岸一通羅浮兩山間穴溪一通枯桑島東岸益東海龍王第七女掌龍王珠藏小龍千數衛護此珠龍畏蠟愛美玉及空青而嗜燕若遣使信可得寶珠帝聞大嘉乃詔有能使者厚賞之有會稽郡鄮縣白水鄉郎庾毗羅請行杰公曰汝五世祖燒殺鄮縣東海談之龍百餘頭還為龍所害汝龍門之宄也可行乎毗羅伏實乃止于是合浦郡洛黎縣甌越羅子春兄弟二人上書自言家代于陵水羅水龍為婚遠祖矜能化惡龍晉簡文帝以臣祖和化毒龍今龍化縣即是臣祖住宅也象郡石龍剛猛難化臣祖化之化石龍縣是也東海南天台湘川彭蠡銅鼓石頭等諸水大龍皆識臣宗祖亦知臣是其子孫請通帝命杰公曰汝家制龍石尚在否答曰在在謹繼至都試取觀之公曰汝石但能制微風雨召戎虜之龍不能制海王珠藏之龍又問曰汝有西海龍腦香否曰無公曰奈之何御龍帝曰事不諧矣公曰西海大船求龍腦香可得昔桐柏真人數揚道義許謐茅容乘龍各贈制龍石十斤今亦應在請訪之帝敕命求之于茅山華龍隱居陶弘景得石兩片公曰是矣帝敕百工以于闐舒河中美玉造小函二以桐木灰發其光取宣州空青汰其甚精者用海魚膠之成二缶火燒之龍腦香尋亦繼至杰公曰以蠟涂子春等身及衣佩又乃繼燒燕五百枚入洞穴至龍宮守門小蛟聞蠟氣俯伏不敢動乃以燒燕百事賂之令其通問以其上上者獻龍女龍女食之大嘉又上玉函青缶具陳帝旨洞中有千歲龍能變化出入人間有善譯時俗之言龍女知帝禮之以大珠三小珠七雜珠一石以報帝命子春乘龍載珠還國食頃之間便至龍辭去子春荐珠帝大喜得聘通靈異獲天人之寶以珠示杰公杰公曰三珠其一是天帝如意珠之下者其二是驪龍珠之中者七珠二是蟲珠五是海蚌珠人間之上者雜珠是蚌蛤等珠不如大珠之貴帝遍示百僚朝廷咸謂杰公虛誕莫不詰之杰公曰如意珠上上者夜光照四十余里中者十里下者一里光之所及無風雨雷電水火刀兵諸毒厲驪珠上者夜光百步中者十步下者一室光之所及無蛇虺豸之毒蟲珠七色而多赤六足二目當其凹處有臼如鐵鼻蚌珠五色皆有夜光及數尺無瑕者為之上有瑕者為下珠蚌五于時與月盈虧蛇珠所致隋侯噲參即其事也又問蛇鶴之異對曰使其自適帝命杰公記蛇鶴二珠斗余雜珠散于殿前取大黃蛇玄鶴各十數處布珠中間于是鶴銜其珠鳴舞徘徊蛇銜其珠盤曲宛轉群臣觀者莫不歎服帝復出如意龍蟲等珠光之遠近七九八數皆如杰公之言子春在龍宮得食如花如藥如青如飴食之香美繼食至京師得人間風日乃堅如石不可咀咽帝令祕府藏之拜子春為奉車都尉二弟為奉朝請賜布帛各千匹追訪公往不為龍害之由為用麻油和蠟以作照魚衣乃身有蠟氣故也梁武后梁武郗皇后性妒忌武帝初立未及冊命因忿怒忽投殿庭井中衆趨井救之后已化為毒龍煙焰沖天人莫敢近帝悲歎久之因冊為龍天王便于井上立祠劉甲宋劉甲居江陵元嘉中女年十四姿色端麗未嘗讀佛經忽能暗誦法華經女所住屋尋有奇光女云已得正覺宜作二七日齊家為置高座設寶帳女登座講論詞玄又說人之災祥諸事皆驗遠近敬禮解衣投寶不可勝數衡陽王在鎮躬率參佐觀之經十二日有道士史玄真曰此怪邪也振褐往焉女即已知遣人守門云魔邪尋至凡著道服咸勿納之真變服奄入女初猶喝罵真便直前以水灑之即頓絶良久乃蘇問以諸事皆云不識真曰此龍魅也自是復常嫁為宣氏妻宋云后魏宋云使西域至積雪山中有池毒龍居之昔三百商人止宿池側值龍忿怒泛殺商人果阤王聞之舍位與子向鳥場國學婆羅門咒四年之中善得其術還復王位就池咒龍龍化為人悔過向王王即從之蔡玉弘農郡太守蔡玉以國忌日于崇敬寺設齊忽有黑云甚密從東北而上正臨佛殿云中隱隱雷鳴官屬猶未行香并在殿前聚立仰看見兩童子赤衣兩童子青衣俱從云中下來赤衣二童子先至殿西南角柱下抽出一白蛇身長丈余仰擲云中雷聲漸漸大而下來少選之間向白蛇從云中直下還入所出柱下于是云氣轉低著地青衣童子乃下就住一人捧殿柱離地數寸一童子從下又拔出一白蛇長二丈許仰擲云中于是四童子亦一時騰上入云而去云氣稍高布散遍天至夜雷雨大霪至晚方霽后看殿柱根乃蹉半寸許不當本處寺僧謂此柱腹空乃鑿柱至心其內果空為龍藏隱李靖唐衛國公李靖微時嘗射獵靈山中寓食山中村翁奇其為人每丰饋焉歲久益厚忽遇群鹿乃遂之會暮欲舍之不能俄而陰晦迷路茫然不知所歸悵悵而行因悶益甚極目有燈火光因馳赴焉既至乃朱門大第牆宇甚峻扣門久之一人出問靖告迷道且請寓宿人曰郎君已出獨太夫人在宿應不可靖曰試為咨白乃入告復出曰夫人初欲不許且以陰黑客又言迷不可不作主人邀入廳中有頃一青衣出曰夫人來年可五十余青裙素襦神氣清雅宛若士大夫家靖前拜之夫人答拜曰兒子皆不在不合奉留今天色陰晦歸路又迷此若不容遣將何適然此乃山野之居兒子還時或夜到而喧勿以為懼既而食頗鮮美然多魚食畢夫人入宅二青衣送床席裀褥衾被香潔皆極鋪陳閉戶系之而去靖獨念山野之外夜到而鬧者何物也懼不敢寢端坐聽之夜將半聞扣門聲甚急又聞一人應之曰天符報大郎子當行雨周此山七百里五更須足無慢滯無暴厲應者受符入呈聞夫人曰兒子二人未歸行雨符到固辭不可違時見責縱使報之亦以晚矣僮仆無任專之理當如之何一小青衣曰適觀廳中客非常人也盍請乎夫人喜因自扣其門曰郎覺否請暫出相見靖曰諾遂下階見之夫人曰此非人宅乃龍宮也妾長男赴東海婚禮小男送妹適奉天符次當行雨計兩處云程合逾萬里報之不及求代又難輒欲奉煩頃刻間如何靖曰靖俗人非乘云者奈何能行雨有方可教即唯命耳夫人曰苟從吾言無有不可也遂敕黃頭靸青驄馬來又命取雨器乃一小瓶子系于鞍前戒曰郎乘馬無勒銜勒信其行馬跑地嘶鳴即取瓶中水一滴滴馬鬃上慎勿多也于是上馬騰騰而行倏勿漸高但訝其隱疾不自知其云上也風急如箭雷霆起于步下于是隨所躍輒滴之既而電掣云開下見所憩村思曰吾擾此村多矣方德其人計無以報今久旱苗稼將悴而雨在我手寧復惜之顧一滴不足濡乃連下二十滴俄頃雨畢騎馬復歸夫人者泣于廳曰何相誤之甚本約一滴何私下二十尺之雨此一滴乃地上一尺雨也此村夜半平地水深二丈豈復有人妾已受譴杖八十矣但視其背血痕滿焉兒子亦連坐奈何靖慚怖不知所對夫人復曰郎君世間人不識云雨之變誠不敢恨只恐龍師來尋有所驚恐宜速去此然而勞煩未有以報山居無物有二奴奉贈總取亦可取一亦可唯意所擇于是命二奴出來一奴從東廊出儀貌和悅怡怡然一奴從西廊出憤氣勃然拗怒而立靖曰我獵徒以斗猛事今但取一奴而取悅者人以我為怯也因曰兩人皆取則不敢夫人既賜欲取怒者夫人微笑曰郎之所欲乃爾遂揖與別奴亦隨去出門數步回望失宅顧問其奴亦不見矣獨尋路而歸及明望其村水已極目大樹或露梢而已不復有人其后竟以兵權靜寇難功蓋天下而終不及于相豈非取奴之不得乎世言關東出相關西出將豈東西喻邪所以言奴者亦下之象向使二奴皆取即極將相矣
