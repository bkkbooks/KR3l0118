body:
  text: 周隱克周隱克唐道士周隱克有術數將相大僚咸敬如神明宰相李宗閔修弟子禮手狀皆云然前宰相段文昌鎮淮南染疾曰尊師去年云我有疾須臥六日段公與賓客博戲飲茶周生連喫數碗段起旋溺不已良久驚語尊師曰乞且放虛憊交下不自持笑曰與相公為戲也蓋飲茶慵起遣段公代之出逸史張士政唐王潛在荊州百姓張士政善治傷折有軍人損脛求張治之張飲以一藥酒破肉取碎骨一片大如兩指涂膏封之數日如舊經二年餘脛忽痛復問於張張曰前君所出骨寒則痛可遽覓也果獲於床下令以湯洗貯於絮中其痛即愈王子弟與之狎嘗祈其戲術張取草一掬再三揉之悉成燈蛾飛去又畫一婦女於壁酌滿杯飲之酒無遺滴逡巡畫婦人面赤半日許其術終不傳人出逸史陳休復唐李當鎮興元褒城縣處士陳休復號陳七子狎於博徒行止非常李以其妖誕械之而市井中又有一休復無何殞於狴牢遽都腐敗所司收而瘞之爾後宛在褒城李驚異不敢復問一旦愛女暴亡妻追悼成疾無能療者幕客白曰陳處士真道者必有少君之術能祈之乎李然之因敬而延召陳曰此小事爾於初夜帷裳設燈炬畫作一門請夫人下簾屏氣至夜分亡者自畫門入堂中行數遭夫人愊憶失聲而哭亡魂倏然滅矣然後戒勉令其抑割李由是敬之出北夢瑣言費雞師唐蜀有費雞師目赤無黑睛本濮人段成式長慶初見之已年七十餘或為人解疾必用一雞設祭於庭又取江石如雞卵令疾者握之乃踏步作氣噓叱雞旋轉而死石亦四破成式舊家人永安初不信嘗謂曰爾有大厄因丸符逼令吞之復去其左足鞋及襪符展在足心矣又謂奴滄海爾將病令袒而負戶以筆再三畫於外大言曰過過墨跡遂透著背焉出酉陽雜俎岳麓僧唐廣南節度下元隨軍將鐘大夫忘其名晚年流落旅寓陵州多止佛寺仁壽縣主簿歐陽衎愍其衰老常延待之三伏間患腹疾臥於歐陽舍踰月不食慮其旦夕溘然欲陳牒州衙希取鍾公一狀以明行止鍾曰病即病矣死即未也既此奉煩何妨申報於是聞官爾後疾愈孫光憲時為郡倅鍾惠然來訪因問所苦之由乃曰曾在湘潭遇干戈不進與同行商人數輩就岳麓寺設齋寺僧有新合知命丹者且云服此藥後要退即飲海藻湯或大期將至即肋下微痛此丹自下便須指揮家事以俟終焉遂各與一緡吞一丸他日入蜀至樂溫縣遇同服丹者商人寄寓樂溫得與話舊且說所服之効無何此公來報肋下痛不日其藥果下急區分家事後凡二十日卒某方神其藥用海藻湯下之香水洗沐却吞之昨來所苦藥且未下所以知未死兼出藥相示然鍾公面色紅潤強飲啗似得藥力也他日不知其所終以其知命有驗故記之焉出北夢瑣言強紳唐鳳州東谷有山人強紳妙於三戒尤精雲氣屬王氏初併秦鳳張黃於通衢強公指而謂孫光憲曰更十年天子數員又曰并汾而來悠悠梁蜀後何為哉於時蜀兵初攻岐山謂其旦夕屠之強曰秦王久思妄動非四海之主雖然死於牖下乃其分也蜀人終不能克秦而秦川亦成丘墟矣爾後大鹵與王鳳翔不羈秦王令終王氏絕祚果叶強生言有鹿盧蹻術自云老夫耄矣無人可傳其書藏在深穩處古杉樹中因與孫光憲偕詣開樹皮發蠟緘取出一通絹書選吉辰以授為強嫗止之謂孫少年矣慮致發狂俾服膺三年方議可否出北夢瑣言彭釘筋唐彭濮間有相者彭克明號彭釘筋言事多驗人以其必中是有釘筋之名九隴村民唐氏子家富穀食彭謂曰唐郎即世不挂一縷唐氏曰我家粗有田隴衣食且豐可能裸露而終哉後一日江水泛漲潭上有一兔在水中央唐謂必致之乃脫衣泅水無何為汎波漂沒而卒所謂一縷不挂也其他皆此類繁而不載出北夢瑣言崔無斁偽王蜀先主時有道士李暠亦唐之宗室生於徐州而遊三蜀詞辯敏捷粗有文章因棲陽平化為妖人扶持上有紫氣乃聚眾舉事而敗妖輩星散而暠獨罹其禍先是李暠有書召玉局仙楊德輝赴齋有老道士崔無斁自言患聾有道而託算術往往預知吉凶楊德輝問曰將欲北行如何令崔書地作字乃書北千兩割字崔公以千插北成乖字曰去即乖覺楊坐不果去而暠齋日就擒道士多罹其禍楊之幸免由崔之力也出北夢瑣言蜀士偽王蜀有王氏子承協幼承蔭有文武才性聰明通于音律門下常養一術士潛授戰陣之法人莫知之術士褸弊衣亦不受承協之資鏹承協後因蜀主講武於星宿山下忽於主前呈一鐵鎗重三十餘斤請試之由是介馬盤鎗星飛電轉萬人觀之咸服其神異及入城又請盤城門下鐵關五十餘斤兩人舁致馬上當街馳之亦如電閃大賞之擢為龍捷指揮使其諸家兵法三令五甲懸之口吻以其年幼終不付大兵柄奇異之術信而有之出王氏見聞錄陳岷後唐莊宗世子魏王繼岌伐蜀廻軍在道而有鄴都之變莊宗與劉后命內臣張漢賓齎急詔所在催魏王歸闕張漢賓乘驛倍道急行至興元西縣逢魏王宣傳詔旨王以本軍方討漢州康延孝相次繼來欲候之出山以陳凱歌漢賓督之有軍謀陳岷比事梁與漢賓熟密問張曰天子改換且是何人張色莊曰我當面奉宣詔魏王況大軍在行談何容易陳岷曰久忝知聞故敢諮問兩日來有一信風新人已即位矣復何形跡張乃說來時聞李嗣元過河未知近事岷曰魏王且請盤桓以觀其勢未可前邁張以莊宗命嚴不敢遷延督令進發魏王至渭南遇害出王氏見聞錄鄭山古偽蜀王先主時有軍校黃承真就糧于廣漢綿竹縣遇一叟曰鄭山古謂黃曰此國於五行中少金氣有剝金之號曰金煬鬼此年蜀宮大火至甲申乙酉則殺人無數我授汝祕術詣朝堂陳之儻行吾教以禳鎮庶幾減於殺伐救活之功道家所重延生試於我而取之然三陳此術如不允行則止亦不免蓋洩於陰機也子能從我乎黃亦好奇乃曰苟稟至言死生以之乃齎祕文詣蜀三上不達乃嘔血而死其大火與乙酉亡國殺戮之事果驗孫光憲與承真相識竊得窺其祕緯題云黃帝陰符與今陰符不同凡五六千言黃云受於鄭叟一畫一點皆以五行屬配通暢亹亹實奇書也然漢代數賢賢原作言據明鈔本改生於綿竹妙於讖記之學所云鄭叟豈黃扶之流乎出北夢瑣言馬處謙偽王蜀葉逢少明悟以詞筆求知常與孫光憲偕詣術士馬處謙問命通塞馬曰四十已後方可圖之未間苟或先得於壽不永于時州府交辟以多故參差不成其事後充湖南通判官未除官之前夢見乘船赴任江上候吏旁午而至迎入石窟覺後話於廣成先生杜光庭次忽報敕下授檢校水部員外郎廣成曰昨宵之夢豈小川之謂乎自是解維覆舟於犍為郡青衣灘而死即處謙之生知葉逢之凶夢何其効哉光憲自蜀沿流一夕夢葉生云子於青衣亦不得免覺而異之泊發嘉州取陽山路乘小舟以避青衣之險無何篙折為汎流吸入青衣幸而獲濟豈鬼神尚能相戲哉出北夢瑣言趙聖人偽蜀有趙溫圭善袁許術占人災祥無不神中蜀謂之趙聖人武將王暉事蜀先主累有軍功為性凶悍至後主時為一二貴人擠抑久沈下位王深銜之嘗一日於朝門逢趙公見之驚愕乃屏人告之曰今日見君面有殺氣懷兵刃欲行陰謀但君將來當為三任郡守一任節制自是晚達不宜害人以取殃禍王大駭乃於懷中控一匕首擲於地泣而言曰今日比欲刺殺此子便自引決不期逢君為開釋請從此而止勤勤拜謝而退王尋為郡遷秦州節度蜀亡老於咸陽宰相范質親見見字原闕據明鈔本補王話其事出玉堂閒話黃萬戶偽王蜀時巫山高唐觀道士黃萬戶本巴東萬戶村民學白虎七變術又云學六丁法於道士張君常持一鐵鞭療疾不以財物介懷然好與鄉人爭訟州縣不之重也戎州刺史文思輅亦有戲術曾剪紙魚投於盆內而活萬戶投符化獺而食之其鐵鞭為文思輅收之歸至涪州亡其鞭而却歸黃矣有楊希古欲傳其術坐未安忽云子家中已有喪穢不果傳俄得家訃母亡又蜀先主召入宮列示諸子俾認儲後萬戶乃指後主其術他皆倣此唯一女為巫山民妻有男傳授祕訣將卒戒戒字原闕據明鈔本補家人勿殮經七八日再活不久却殞也青城縣舊有馬和尚宴坐三十五年道德甚高萬戶將卒謂家人曰青城馬和尚來我遂長逝也是年馬師亦遷化出北夢瑣言何奎偽王蜀時閬州人何奎不知何術而言事甚効既非卜相人號何見鬼蜀之近貴咸神之鬻銀肆有患白癲者傳於兩世矣何見之謂曰爾所苦我知之矣我為嫁聘少鐶釧釵篦之屬爾能致之乎即所苦立愈矣癩者欣然許之因謂曰爾家必有他人舊功德或供養之具在焉亡者之魂所依故遣為此崇但去之必瘳也患者歸視功德堂內本無他物忖思久之老母曰佛前紗窗乃重圍時他人之物曾取而置之得非此乎遽徹去仍修齋懺疾遂痊竟受其鐶釧之贈何生未遇不汲汲於官宦末年祈於大官自布衣除興元小尹金紫兼妻邑號子亦賜緋不之任便歸閬州而卒顯知死期也雖術數通神而名器踰分識者知後主政悉此類也出北夢瑣言孫雄嘉州夾江縣人孫雄號孫卯齋其言事亦何奎之流偽蜀主歸命時內官宋愈昭將軍數員舊與孫相善亦神其術將赴洛都咸問將來昇沈孫俛首曰諸官記之此去無災無福但行及野狐泉已來稅駕處曰孫雄非聖人耶此際新舊使頭皆不見矣諸官咸疑之爾後量其行邁合在咸京左右後主罹偽詔之禍莊宗遇鄴都之變所謂新舊使頭皆不得見之驗也出北夢瑣言李漢雄李漢雄者嘗為欽州刺史罷郡居池州善風角推步之奇術自言當以兵死天祐丙子歲遊浙西始入府而歎曰府中氣候甚惡當有兵亂期不遠矣吾必速廻既見府公厚待之留旬日未得遽去一日晚出逆旅四顧而歎曰禍在明日吾不可留翌日晨入府辭坐客位中良久曰禍即今至速出猶或可遂出至府門遇軍將周交作亂遂遇殺害於門下出稽神錄
