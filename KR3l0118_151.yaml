body:
  text: 李稜李稜故殿中侍御史李稜貞元二年擢第有別業在江寧其家居焉是歲渾太師瑊鎮蒲津請稜為管記從事稜乃曰公所欲稜者然奈某不間檢束夙好藍田山水據使銜合得畿尉雖考秩淺如公勳望崇重特為某奏請必諧矣某得此官江南迎老親以及寸祿即某之願畢矣渾遂表薦之德宗令中書商量當從渾之奏稜聞桑道茂先生言事神中因往詣焉問所求成敗茂曰公求何官稜具以本末言之對曰從此二十年方合授此官如今則不得稜未甚信經月餘稜詣執政謂曰足下資歷淺未合入畿尉如何憑渾之功高求僥幸耳遂檢吏部格上時帝方留意萬機所奏遂寢稜歸江南果丁家艱已近七八年又忽得躄疾殆將一紀元和元年冬始入選吏曹果注得藍田縣尉一唱欣而授之乃具説於交友出續定命録豆盧署本名輔真貞元六年舉進士下第將遊信安以文謁郡守鄭武前定録武作式瞻瞻甚禮之館給數日稍狎因謂署曰子復姓不宜兩字為名將改之何如署因起謝且求其所改武瞻書數字若著者助者署者曰吾慮子宗從中有同者故書數字當自擇之其夕宿於館夢一老人謂署曰聞使君與子更名子當四舉成名四者甚佳後二十年為此郡守因指郡隙地曰此可以建亭臺既寤思之四者署字也遂以為名既二年又下第以為夢無徵知者或誚之後二年果登第蓋自更名後四舉也大和九年署自祕書少監為衢州刺史既至周覽郡內得夢中所指隙地遂搆一亭因名之曰徵夢亭矣出前定録孟君貞元中有孟員外者少時應進士舉久不中第將罷舉又無所歸託於親丈人省郎殷君宅為殷氏賤厭近至不容染瘴瘧日甚乃白於丈人曰某貧薄疾病必不可救恐污丈人華宇願委運乞待盡他所殷氏亦不與語贈三百文出門不知所適街西有善卜者每以清旦決卦盡後則閉肆下簾孟君乃謁之具陳羈蹇將填溝壑盡以所得三鐶環為卜資卜人遂留宿及時為決一卦封成驚曰郎君更十日合處重職俸入七十千錢何得言貧賤卜人遂留厚供給已至九日並無消息又卻往殷君宅殷氏見甚薄之亦不留連寄宿馬廄至明有敕以禁兵將為賊境觀察使其人與殷友善馳扣殷氏之門武人都不知書云便須一謝表兼鎮撫寇勷事故頗多公有親故文士頗能相助否殷良久思之無可應者忽記得孟君久曾應舉可以充事遽引見之令草一表詞甚精敏因請為軍中職事知表奏數日授官月俸正七十千乃卜後十日也出逸史盧常師祕書少監盧常師進士擢第性淡薄不樂軒冕於世利蔑然棄官之東洛謂所親曰某浙西魚尚書故舊旬日看去又曰某前生是僧座禪處猶在會稽亦擬自訪遺迹家人亦怪其欲遠行而不備舟楫不逾旬遂歿矣出逸史韓滉韓晉公滉在中書嘗召一吏不時而至公怒將撻吏曰某有所屬不得遽至乞寬其罪晉公曰宰相之吏更屬何人吏曰某不幸兼屬陰司晉公以為不誠乃曰既屬陰司有何所主吏曰某主三品已上食料晉公曰若然某明日當以何食吏曰此非細事不可顯之請疏於紙過後為驗乃恕之而繫其吏明旦遽有詔命既對適遇太官進食有糕糜一器上以一半賜晉公食之美又賜之既退而腹脹歸私第召醫者視之曰有物所壅宜服少橘皮湯至夜可啖漿水粥明旦疾愈思前夕吏言召之視其書則皆如其所云因復問人間之食皆有籍耶答曰三品已上日支五品已上而有權位者旬支凡六品至於九品者季支其有不食祿者歲支出前定録李頧貞元中有舉人李頧方就舉聲價極振忽夢一人紫衣云當禮部侍郎顧少連下及第寐覺省中朝並無姓顧者及頃有人通刺稱進士顧少連謁頧驚而見之具述當為門生顧曰某才到場中必無此事來年頧果落第自此不入試罷歸至貞元九年顧少連自戶部侍郎權知貢舉頧猶未第因潛往造焉臨放榜時相特囑一人頧又落但泣而已來年秋少連拜禮部侍郎頧乃登第出感定録崔造崔丞相造布衣時江左士人號為白衣夔時有四人一是盧東美其餘亡姓字崔左遷在洪州州帥曹王將辟為倅時德宗在興元以曹王有功且親奏無不允時有趙山人言事多中崔問之曰地主奏某為副使且得過無對曰不過崔詰曰以時以事必合得時山人曰却得一刺史不久敕到更遠於此崔不信再問必定耳州名某亦知之不可先言且曰今月某日敕到必先弔而後賀崔心懼久之蓋言其日既崔之忌日也即便呼趙生謂曰山人言中奉百千不中則輕撻五下可乎山人哂曰且某不合得崔員外百千只合得崔員外起一間竹屋其語益奇崔乃問之且我有宰相分否曰有即遠近曰只隔一雨政官不致三矣又某日私忌同寮諸公皆知其説其日夕矣悉至江亭將慰崔忌衆皆北望人信至酉時見一人從北岸入舟袒而招舟甚急使人遙問之乃曰州之腳力將及岸問曰有何除政且有崔員外奏副使過否曰不過却得虔州刺史敕牒在茲諸公驚笑其暮果先慰而後賀焉崔明日説於曹王曹王與趙山人鏹百千不受崔與起竹屋一間欣然徙居之又謂崔曰到虔州後須經大段驚懼即必得入京也既而崔舅源休與朱泚為宰相憂悶堂帖追入甚憂惕時故人竇參作相拜兵部郎中俄遷給事中平章事與齊映相公同制出嘉話録薛雍薛雍侍郎有宰相望時有張山人善相崔造方為兵部郎中與前進士薑公輔同在薛侍郎坐中薛問張山人且坐中有宰相否心在己身多矣張答云有薛曰幾人曰有兩人薛意其一人即己也曰何人曰崔薑二公必宰相也同時耳薛訝忿之默然不悅既而崔郎中徐問張曰何以同時意謂薑公今披褐我已正郎勢不相近也張曰命合如此事須同時仍郎中在薑之後後薑為京兆功曹充翰林學士時衆知涇將姚令言入城取朱泚泚曾帥涇得軍人心薑乃上疏請察之疏入十日德宗幸奉天悔不納薑言遂於行在擢薑為給事中平章事崔後薑半年以夕郎拜相果同時而在薑之後薛竟終於列曹始知前輩不可忽後輩出嘉話録
