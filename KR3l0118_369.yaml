body:
  text: 雜器用蘇丕女武功蘇丕天寶中為楚丘令女適李氏李氏素寵婢因與丕女情好不篤其婢求術者行魘盅之法以符埋李氏宅糞土中又縛綵婦人形七枚長尺余藏于東牆窟內而泥飾之人不知也數歲李氏及婢相繼死亡女寡居四五年魘盅術成綵婦人出遊宅內蘇氏因爾疾發悶絶李婢已死莫知所由經一載纍求術士禁咒備至而不能制后伺其復出乃率數十人掩捉得一枚視其眉目形體悉具在人手中恆動不止以刀斫之血流于地遂積柴焚之其徒皆來焚所號叫或在空中或在地上燒畢宅中作炙人氣翌日皆白衣號哭數日不已其后半歲纍獲六枚悉焚之唯一枚得而復逸逐之忽乃入糞土中蘇氏率百餘人掘糞深七八尺得桃符符上朱書字宛然可識云李氏婢魘蘇氏家女作人七枚在東壁上土龕中其后九年當成遂依破壁又得一枚丕女自爾無恙蔣惟嶽不懼鬼神常獨臥窗下聞外有人聲嶽祝云汝是冤魂可入相見若是鬧鬼無宜相驚于是窣然排戶而欲升其床見嶽不懼旋立壁下有七人焉問其所為立而不對嶽以枕擊之皆走出戶因走趁沒于庭中明日掘之得破車輻七枚其怪遂絶又其兄常患重疾嶽親自看視夜深又見三婦人鬼至兄床前叱退之三遍鬼悉倒地久之走出其兄遂愈華陰村正華陰縣七級趙村村路因嚙成谷梁之以濟往來有村正常夜渡橋見群小兒聚火為戲村正知甚魅射之若中木聲火即滅聞啾啾曰射著我阿連頭村正上縣回尋之見破車輪六七片有頭杪尚銜其箭者韋諒乾元中江寧縣令韋諒堂前忽見小鬼以下唇掩面來至燈所去又來使人逐之沒于階下明旦掘其沒處得一故門扇長尺余頭作卷荷狀東萊客東都郡有館亭其西軒常有怪異客有寢其下者夜常聞有犬吠聲甚微以燭視之則一無所見如是者纍年矣其后郡守命扃鍵為庫嘗一夕月皎有庫吏見一犬甚小蒼色自軒下環庭而走庫吏怪其與常犬異因投石擊之其犬吠而去入西軒下明日庫吏以其事白于郡守郡守命于西軒窮其迹見門上狗有蒼毛甚多果庫吏所見蒼犬之色衆方悟焉交城里人交城縣南十數里常夜有怪見于人多悸而病且死焉里人患之久矣其后里中人有執弧矢夜行者縣南見一魁然若巨人狀衣朱衣以皂中蒙其首緩步而來欹偃若其醉者里人懼即引滿而發果中焉其怪遂退里人懼少解即北走至旅舍且語其事明日抵縣城見郭之西丹桂有一矢貫其上果里人之矢取之以歸鏃有血甚多白于縣令令命焚之由是縣南無患岑順汝南岑順字孝伯少好學有文老大尤精武略旅于陝州貧無第宅其外族呂氏有山宅將廢之順請居焉人有勸者順曰天命有常何所懼耳卒居之后歲余順常獨坐書閣下雖家人莫得入夜中聞鼓鼙之聲不知所來及出戶則無聞而獨喜自負之以為石勒之祥也祝之曰此必陰兵助我若然當示我以富貴期數夕后夢一人被甲胄前報曰金象將軍使我語岑君軍城夜警有喧諍者蒙君見嘉敢不敬命君甚有厚祿幸自愛也既負壯志能猥顧小國乎今敵國犯壘側席委賢欽味芳聲願執旌鉞順謝曰將軍天質英明師真以律猥煩德音屈顧疵賤然犬馬之志惟欲用之使者復命順忽然而寤恍若自失坐而思夢之征俄然鼓角四起聲愈振厲順整巾下床再拜祝之須臾戶牖風生帷簾飛揚燈下忽有數百鐵騎飛馳左右悉高數寸而被堅執鋭星散遍地倏閃之間云陳四合順驚駭定神氣以觀之須臾有卒繼書云將軍傳檄順受之云地連獯虜戎馬不息向數十年將老兵窮姿霜臥甲天設勍敵勢不可止明公養素畜德進業及時屢承嘉音願托神契然明公陽官固當享大祿于聖世今小國安敢望之緣天那國北山賊合從克日會戰事圖子夜否滅未期良用惶駭順謝之室中益燭坐觀其變夜半后鼓角四發先是東面壁下有鼠穴化為城門壘敵崔嵬三奏金革四門出兵連旗萬計風馳云走兩皆列陳其東壁下是天那軍西壁下金象軍部后各定軍師進曰天馬斜飛度三止上將橫行系四方輜車直入無回翔六甲次第不乖行王曰善于是鼓之兩軍俱有一馬斜去三尺止又鼓之各有一步卒橫行一尺又鼓之車進如是鼓漸急而各出物包矢石亂交須臾之間天那軍大敗奔潰殺傷塗地王單馬南馳數百人投西南隅僅而免焉先是西南有藥王栖臼中化為城堡金象軍大振收其甲卒輿尸橫地順俯伏觀之于時一騎至禁頒曰陰陽有厝得之者昌亭亭天威風驅連激一陳而勝明公以為何如順曰將軍英貫白日乘天用時竊窺神化靈文不勝慶快如是數日會戰勝敗不常王神貌偉然雄姿罕儔宴饌珍宴與順致寶貝明珠珠璣無限順遂榮于其中所欲皆備焉后遂與親朋稍絶間間不出家人異之莫究其由而順顏色憔悴為鬼氣所中親戚共意有異詰之不言因飲以醇醪醉而究泄之其親人僭備鍬鍤因順如廁而隔之荷鍤亂作以掘室內八九尺忽坎陷是古墓也墓有磚堂其盟器悉多甲胄數百前有金床戲局列馬滿枰皆金銅成形其干戈之事備矣乃悟軍師之詞乃像戲行馬之勢也既而焚之遂平其地多得寶貝皆墓內所畜者順閲之恍然而醒乃大吐自此充悅宅亦不復凶矣時寶應元年也元無有寶應中有元無有常以仲春末獨行維揚郊野值日晚風雨大至時兵荒后人戶多逃遂入路旁空莊須臾霽止斜月方出無有坐北窗忽聞西廊有行人聲未幾見月中有四人衣冠皆異相與談諧吟詠甚暢乃云今夕如秋風月若此吾輩豈不為一言以展平生之事也其一人即曰云云吟詠既朗無有聽之具悉其一衣冠長人即先吟曰齊褲魯縞如霜雪寥亮高聲豫所發其二黑衣冠短陋人詩曰嘉賓良會清夜時煌煌燈燭我能持其三故弊黃衣冠人亦短陋詩曰清冷之泉候朝汲桑綆相牽常出入其四故黑衣冠人詩曰爨薪貯泉相煎熬充他口腹我為勞無有亦不以四人為異四人亦不虞無有之在堂隍也遞相褒賞羡其自負則雖阮嗣宗詠懷亦若不能加矣四人遲明方歸舊所無有就尋之堂中惟有故杵燈台水桶破鐺乃知四人即此物所為也李楚賓李楚賓者楚人也性剛傲惟以畋獵為事凡出獵無不大獲時童元范家住青山母嘗染疾晝常無苦至夜即發如是一載醫藥備至而絶無瘳減時建中初有善易者朱邯歸豫章路經范舍邯為筮之乃謂元范曰君今日未時可具衫服于道側伺之當有執弓挾矢過者君能求之斯人必愈君母之疾且究其原矣元范如言果得楚賓張弓驟馬至元范拜請過舍賓曰今早未有所獲君何見留元范以其母疾告之賓許諾元范備飲膳遂宿楚賓于西廡是夜月明如晝楚賓乃出戶見空中有一大鳥飛來元范堂舍上引喙啄屋即聞堂中叫聲痛楚難忍楚賓揆之曰此其妖魅也乃引弓射之兩發皆中其鳥因而飛去堂中哀痛之聲亦止至曉楚賓謂元范曰吾昨夜已為子除母害矣乃與元范繞舍遍索俱無所見因至壞屋中碓桯古址有箭兩隻所中箭處皆有血光元范遂以火燔之精怪乃絶母患自此平復
