body:
  text: 東海大魚東海大魚東方之大者東海魚焉行海者一日逢魚頭七日逢魚尾魚産則百里水為血鼉魚博物志云南海有鼉魚斬其首干之椓去其齒而更復生者三乃已南州志亦云然又聞廣州人説鱷魚能陸追牛馬水中覆舟殺人值网則不敢觸有如此畏慎其一孕生卵數百于陸地及其成形則有蛇有龜有鱉有魚有鼉有為蛟者凡十數類及其被人捕取宰殺之其靈能為雷電風雨比殆神物龍類南海大魚嶺南節度使何履光者朱崖人也所居傍大海云親見大異者有三其一曰海中有二山相去六七百里晴朝遠望青翠如近開元末海中大雷雨雨泥狀如吹沫天地晦黑者七日人從山邊來者云有大魚乘流入二山進退不得久之其鰓挂一崖上七日而山拆魚因而得去雷魚聲也雨泥是口中吹沫也天地黑者是吐氣也其二曰海中有洲從廣數千里洲上有物狀如蟾蜍數枚大者周回四五百里小者或百餘里每至望夜口吐白氣上屬于月與月爭光其三曰海中有山周回數十里每夏初則有大蛇如百仞山長不知幾百里開元末蛇飲其海而水減者十余日意如渴甚以身繞一山數十匝然后低頭飲水久之為海中大物所吞半日許其山遂拆蛇及山被吞俱盡亦不知吞者是何物也鯨魚開元末雷州有雷公與鯨斗身出水上雷公數十在空中上下或縱火或詬擊七日方罷海邊居人往看不知二者何勝但見海水正赤鯉魚開元中台州臨海大蛇與鯉魚斗其蛇大如屋長繞孤島數匝引頭向水其魚如小山鬐目皆赤往來五六里作勢交擊魚用鱗鬐上觸蛇蛇以口下咋魚如是斗者三日蛇竟為魚觸死海人魚東海有之大者長五六尺狀如人眉目口鼻手爪頭皆為美麗女子無不具足皮肉白如玉無鱗有細毛五色輕軟長一二寸發如馬尾長五六尺陰形與丈夫女子無異臨海鰥寡多取得養之于池沼交合之際與人無異亦不傷人南海大蟹近世有波斯常云乘舶泛海往天竺國者已六七度其最后舶漂入大海不知幾千里至一海島島中見胡人衣草葉懼而問之胡云昔與同行侶數十人漂沒唯己隨流得至于此因而采木實草根食之得以不死其衆哀焉遂舶載之胡乃説島上大山悉是車渠瑪瑙玻璃等諸寶不可勝數舟人莫不棄己賤貨取之既滿船胡令速發山神若至必當懷惜于是隨風挂帆行可四十余里遙見峰上有赤物如蛇形久之漸大胡曰此山神惜寶來逐我也為之奈何舟人莫不戰懼俄見兩山從海中出高數百丈胡喜曰此兩山者大蟹螯也其蟹常好與山神斗神多不勝甚懼之今其螯出無憂矣大蛇尋至蟹許盤斗良久蟹夾蛇頭死于水上如連山船人因是得濟也海鱝海鱝魚即海上最偉者也小者亦千余尺吞舟之説固非謬矣每歲廣州常發銅船過南安貨易北人有偶求此行往復一年便成斑白云路經調黎深闊處又見十余山或出或沒初甚訝之篙工曰非山海鱝魚背也果見雙目閃爍鬐鬣若簸米箕危沮之際日中忽雨霂霢舟子曰此鱝魚噴氣水散于空風勢吹來若雨耳及近魚即鼓船而噪倏爾而沒去交趾回乃舍舟取雷州緣岸而歸不憚苦辛蓋避海鱝之難也乃靜思曰設使老鱝瞋目張喙我舟若一葉之墜眢井耳寧得不為人皓首乎鱷魚其身土黃色有四足修尾形狀如鼉而舉止矯疾口森鋸齒往往害人南中鹿多最懼此物鹿走崖岸之上群鱷嗥叫其下鹿必怖懼落崖多為鱷魚所得亦物之相攝伏也故太尉相國李德裕貶官潮州經鱷魚灘損壞舟船平生寶玩古書圖畫一時沈失遂召舶上昆侖取之見鱷魚極多不敢輒近乃是鱷魚之窟宅也吳余鱠魚吳王孫權曾江行食鱠有余因棄之中流化而為魚今有魚猶名吳余鱠者長數寸大如箸尚類鱠形也石頭魚狀如鱝魚隨其大小腦中有二石子如喬麥瑩白如玉有好奇者多市魚之小者貯于竹器任其壞爛即淘之取其魚腦石子以植酒籌頗脫俗黃臘魚即江湖之橫魚頭嘴長鱗皆金色臠為炙雖美而毒或煎干夜即有光如籠燭北人有寓南海者市此魚食之棄其頭于糞筐中夜后忽有光明近視之益恐懼以燭照之但魚頭耳去燭復明以為不祥各啓食奩窺其余臠亦如螢光達明遍詢土人乃此魚之常也憂疑頓釋烏賊魚烏賊舊説名河伯從事小者遇大魚輒放墨方數尺以混身江東人或取其墨書契以脫人財物書迹如淡墨逾年字消唯空紙耳海人言昔秦王東遊棄算袋于海化為此魚形如算袋兩帶極長一説烏賊有碇遇風則前一須下碇橫公魚北方荒中有石湖方千里岸深五丈余恆冰唯夏至左右五六十日解耳有橫公魚長七八尺形如鯉而赤晝在水中夜化為人刺之不入煮之不死以烏梅二枚煮之則死食之可止邪病骨雷扶南國出鱷魚大者二三丈四足似守宮狀常生吞人扶南王令人捕此魚置于塹中以罪人投之若合死鱷魚乃食之無罪者嗅而不食鱷魚別號忽雷熊能制之握其嘴至岸裂擘食之一名骨雷秋化為虎三爪出南海思雷二州臨海英潘村多有之彭刖蟹屬名彭刖以螯取土作丸從潮來至潮去或三百丸因名三百丸大彭刖鯪魚鯪魚吐舌蟻附之因吞之又開鱗甲使蟻入其中乃奮迅則舐取之鯢魚金義嶺之西南有盤龍山山有乳洞斜貫一溪號為靈水溪溪內有魚皆修尾四足丹其腹遊泳自若漁人不敢捕之爾雅云鯢似鮎四足聲如小兒金商州溪內亦有此魚謂之魶魚比目魚南人謂之鞋底魚江淮謂之拖沙魚爾雅云東方有比目魚焉不比不行其名謂之鰈狀如牛脾細鱗紫色一面一目兩片相合乃行鹿子魚色其尾鬣皆有鹿斑赤黃色羅州圖經云州南海中有洲每春夏此魚跳出洲化而為鹿曾有人拾得一魚頭已化鹿尾猶是魚南人云魚化為鹿肉腥不堪食子歸母楊孚交州異物志云鮫之為魚其子既育驚必歸母還其腹小則如之大則不復潘州記云魚昔魚長二丈大數圍初生子子小隨母覓食暮驚則還入母腹吳録云魚昔魚子朝出索食暮入母腹南越志云暮從臍入旦從口出也鮒魚文斑如虎俗云煮之不熟食者必死相傳以為常矣饒州有吳生者家甚丰足妻家亦富夫婦和睦曾無隙間一旦吳生醉歸投身床上妻為整衣解履扶舁其足醉者運動誤中妻之心胸其妻蹶然而死醉者不知也遽為妻族所凌執云毆擊致斃獄訟經年州郡不能理以事上聞吳生親族懼敕命到而必有明刑為舉族之辱因餉獄生鮒如此數四竟不能害益加充悅俄而會赦獲免還家之后胤嗣繁盛年洎八十竟以壽終且烹之不熟尚能殺人生陷數四不能為害此其命與鯽魚東南海中有祖州鯽魚出焉長八尺食之宜暑而避風此魚狀即與江湖小鯽魚相類耳潯陽有青林湖鯽魚大者二尺余小者滿尺食之肥美亦可止寒熱也魚濟南郡東北有坑傳云魏景明中有人穿井得魚大如鏡其夜河水溢入此坑坑中居人皆為魚焉黃魟魚黃魟魚色黃無鱗頭尖身似大槲葉口在頷下眼后有耳竅通于腦尾長一尺末三刺甚毒蟲雋蟲雋者俗謂之茲夷乃山龜之巨者人立其背可負而行産潮循山中鄉人采之取殼以貨要全其殼須以木楔出肉龜吼如牛聲響山谷廣州有巧匠取其甲黃明無日腳者煮而拍之陷黑玳瑁花以為梳篦杯器之屬狀甚明媚海燕齊監官縣石浦有海魚乘潮來去長三十余丈黑色無鱗其聲如牛土人呼為海燕鮫魚鮫魚出合浦長三丈背上有甲珠文堅強可以飾刀口又可以鑢物
