body:
  text: 吳王夫差吳王夫差吳王夫差築姑蘇臺三年乃成周環詰屈橫亙五里崇飾土木殫耗人力宮妓千人又別立春霄宮為長夜飲造千石酒鍾又作大池池中造青龍舟陳妓樂日與西施為水戲又於宮中作靈館館娃閣銅鋪玉檻宮之欄楯皆珠玉飾之出述異記漢武帝漢武帝時身毒國獻連環羈皆以白玉作之瑪瑙石為勒白光琉璃為鞍在暗室中常照十餘丈如晝焉自是長安始盛飾鞍馬競加雕鏤或一馬之飾直百金皆以南海白蜃為珂紫金為花以飾其上猶以不鳴為患或加鈴鑷飾以流蘇走如鍾磬動若飛幡後得二師天馬常以玫瑰石為鞍鏤以金銀鍮石以緑地五色錦為蔽泥後稍以熊羆皮為之熊毛有緑光皆長三尺者直百金卓王孫百餘雙詔使獻二十枚出西京雜記丁媛長安巧工丁媛者為恆滿燈七龍五鳳雜以芙蓉蓮藕之屬又作臥褥香爐又一名被中香爐本出房風其法後絶至媛始更為之設機環轉運四周而爐體常平可置之被褥故取被褥以為名又作九層慱山香爐鏤刻為奇禽怪獸窮諸靈異皆能自然運動又作七輪扇其輪大皆徑尺遞相連續一人運之滿堂皆寒凜焉出西京雜記淋池漢昭帝元始元年穿淋池廣千步中植分枝荷一莖四葉狀如駢蓋日照則葉低蔭根若葵之衛足也名曰低光荷實如玄珠可以飾珮花葉雜萎芬芳之氣徹十餘里食之令人口氣常香益人肌理宮人貴之每遊宴出入皆含咀或剪以為衣或折以蔽日相為戲楚詞謂折芰荷以為衣意在斯也又有倒生菱莖如亂絲一花十葉根浮水上實沉泥裡泥如紫色謂之紫泥菱食之令人不老時命水戲遊宴永日工人進一巨槽帝曰栝楫松舟嫌其重朴況乎此槽豈可得而乘也乃命文梓為舟木蘭為枻刻飛鸞翔鷁飾其船首隨風輕漾畢景忘歸乃至通夜使宮人為歌歌曰商秋素景泛洪波誰云好手折芰荷涼風凄凄揭棹歌雲光開曙月低河萬歲為樂豈為多帝大悅起遊商臺於池上及乎末歲諫者多遂省遊蕩奢侈堙毀臺池鸞舟荷芰隨時廢滅今臺址無遺池亦平焉出拾遺録霍光妻漢霍光妻遺淳于衍蒲桃錦二十匹散花綾二十五匹綾出巨鹿陳寶光妻傳其法霍顯召入第使作之機用一百二十躡六十日成一匹直萬錢又與越珠一斛琲緑綾七百端直錢百萬黃金百兩又為起第宅奴婢不可勝數衍猶怨薄曰吾為若何成功而報我若是哉出西京雜記韓嫣韓嫣好彈常以金為丸一日所失者十餘長安為之語曰苦飢寒逐金丸京師兒童每聞嫣出彈輒隨逐之望丸之所落而競拾取焉出西京雜記袁廣漢茂陵富人袁廣漢藏鏹巨萬家童八九百人於北芒山下築園東西四里南北三里引流注其內搆石為山高十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兔西京雜記三兔作兕奇禽怪獸積委其間移沙為洲嶼激水為波潮其中育江鷗海鶴孕雛産鷇延漫林池奇樹異草靡不具植屋徘徊重屬間以修廊行之移晷不能遍也袁廣漢後得罪誅沒入官其園鳥獸草木皆移植於上苑中矣出西京雜記霄遊宮漢成帝好微行於太液池旁起霄遊宮以漆為柱鋪黑締之幕器服乘輿皆尚黑色悅於暗行憎燈燭之照宮中之美御皆服皂衣自班姬以下咸帶玄綬衣珮明鈔本衣珮作翳被雖加錦繡更以木蘭紗綃罩之至霄遊宮方秉炬燭宴幸既罷靜鼓息罩而步不揚塵好夕出遊造飛行殿方一丈如今之輦選期門羽林之士負之以趨帝於輦上坐但覺耳中若聞風雷之聲以其疾也一名雲雷宮所行之處咸以氈締藉地惡車轍馬迹之喧也雖惑于微行昵宴民無勞怨每乘輿返駕以愛幸之姬寶衣珍食捨于道旁國之窮老皆呼萬歲是以鴻嘉永始之間國富家豐兵戈長戢故劉向谷永竊言指諫于是焚霄遊飛行之殿罷宴逸之樂所謂從繩則直如轉丸焉出拾遺録沙棠舟漢成帝常以三秋暇日與飛燕遊戲太液池以沙棠為舟貴其不沉也以雲母飾于鷁首一名雲舟又刻大桐木為虯龍雕飾如真象以夾雲舟而行以紫文桂為柂枻每觀雲棹水玩擷菱渠則憂輕蕩以驚飛燕命佽飛之士乃以金鎖纜雲舟使佽飛于水底引之值輕風時至飛燕殆以風飄颻隨風入水帝以翠纓結飛燕之裾遊倦乃返飛燕後漸見疏常怨恚曰以妾微何時復預纓裾之遊漾雲舟于波上耶帝為之憮然今液池中尚有成帝避風臺飛燕結裾處出拾遺録趙飛燕趙飛燕為皇后其女弟昭儀在昭陽殿遺飛燕書曰今日佳晨貴姊懋膺洪册上貢明鈔本貢作燧三十五條以陳踴躍之至金花紫綸帽金花紫羅面衣織成下裾同心七寶叉七寶綦履玉環五色文綬鴛鴦褥雲母屏風琉璃屏風雲母七寶扇琥珀枕龜文枕金錯繡襠琉璃瑪瑙彄珊瑚玦黃金步搖金博山爐七支燈回風席茆葉席金蒲圓璫孔雀扇五明扇九華扇同心梅合枝李三清木香螺卮出南中螺田麝香沉水香九真黃鴛鴦襦及被出西京雜記郭況漢郭況光武皇后之弟也纍金數億家童四百人以金為器皿鑄冶之聲徹于都鄙時人謂郭氏之室不雨而雷言鑄冶之聲盛也于庭中起高閣厝衡石于其上以稱量下有藏金窟列武士衛之錯雜寶以飾臺榭懸明珠于梁棟間光彩射目間光彩射目五字原空闕據黃本補晝視如星夜望如月里語曰洛陽多錢郭氏室夜月晝星室夜月晝星五字原空闕據拾遺記六補富難匹其內寵者皆以玉器盛食故東京謂郭氏家為瓊廚金窟況小心畏慎雖居富勢閉門優遊未曾干世為一時所知也出拾遺録後漢靈帝靈帝初平三年于西園起裸遊館十間採緑苔以被階引渠水以繞砌周流澄徹乘小舟以遊漾宮人乘之選玉色輕體者以執篙楫搖蕩于渠中其水清淺以盛暑之時使舟覆沒視宮人玉色奏招商七言之歌以來涼氣也其歌曰涼風起兮日照渠青荷晝偃葉夜舒唯日不足樂有餘清絃流管歌玉鳧千年萬歲喜難渝渠中植蓮大如蓋枝長一丈南國所獻也其葉夜舒晝捲一莖有四蓮叢生名曰夜舒荷亦言月出見葉舒亦名望舒荷帝乃盛夏避暑于裸遊館長夜飲宴帝嘆曰使萬年如此則為上仙矣宮人年二七以上三六以下皆靚粧而解上衣或共裸浴西域所獻茵墀香煮為浴湯宮人以之沐浴浴畢餘汁入渠名曰流香渠又欲內監為雞鳴于館北起雞鳴堂多畜雞每醉樂迷于天曉內閹競作雞鳴以亂真聲也仍以炬燭投于殿下帝乃驚寤及董卓破京師收其美人焚其堂館至魏咸熙中于先帝投燭處溟溟有光如星後人以為神光于此地建屋名曰餘光祠以祈福至魏明之末乃掃除焉出王子年拾遺記石崇晉石崇與王愷爭豪晉武帝愷甥也嘗以一珊瑚樹與愷高二尺許枝柯扶疏世間罕比愷以示崇崇視訖舉鐵如意擊碎之應手丸裂愷甚惋惜又以為嫉己之寶聲色方厲崇曰不足恨今還卿乃命左右悉取珊瑚樹有高三尺條幹絶俗光彩溢目者六七枚如愷比者甚衆愷悵然自失出世説王敦王敦初尚主如廁見漆箱盛乾棗本以塞鼻王謂上廁果食至盡既還婢擎金盆貯水琉璃碗盛澡豆因倒置水中而飲之群婢莫不掩口出世説新書魏高陽王雍後魏高陽王雍居近清陽門外數里御道西旁洛中之甲第也正光中雍為丞相給羽葆鼓吹虎賁班劍百人貴極人臣富兼山海居第匹于帝宮白壁丹檻窈窕連亙飛簷華宇膠葛周通僮僕六千妓女五百隋珠照日羅綺從風自漢晉以來諸王豪侈未之有也出則鳴騶御道文物成行鐃吹嚮發發字原闕據洛陽伽藍記補笳聲哀囀入則歌姬舞女擊築吹笙而絲管迭奏連宵盡日竹林魚池侔于禁苑芳草如積珍木連陰及雍薨後諸妓女悉令入道或有出家者美人徐月華善箜篌能為明妃出塞之歌聞者莫不動容永安中與衛衛原作衙據伽藍記改將軍原士康為側室士康宅亦近清陽外徐鼓箜篌而歌哀聲入雲行路聽者俄而成市徐常語士康云王有二美姬一名修容一名艷姿並蛾眉皓齒潔貌傾城修容能為緑水歌艷姿善為逐鳳舞並愛傾後室寵冠諸姬士康聞此常令徐歌緑水文鳳之曲焉出伽藍記元琛後魏王侯外戚公王擅擅原作阻據明鈔本改山海之富居川林之饒爭修園宅互相誇競崇門豐室阿戶連房飛館生風重樓起霧高臺芳樹家家而築花林曲池園園而有莫不桃李夏緑竹柏冬青而河間王琛最為豪首常與高陽爭衡造文柏堂如徽音殿置玉井金罐以五色絲為繩妓女三百人盡皆國色有婢朝雲善吹篪能為團扇歌隴上聲琛為秦州刺史諸羌外叛屢討之不降琛令朝雲假為貧嫗吹篪而乞諸羌聞之悉皆流涕迭相謂曰何為棄墳井在山谷為寇耶相率歸降秦民語曰快馬健兒不如老嫗吹篪琛在秦中多無政績遣使向西域求名馬遠至波斯國得千里馬號曰追風赤次有七百里者十餘皆有名字以銀為槽金為環鎖諸王服其豪富琛嘗語人云晉室石崇乃是庶姓猶能雉頭狐腋畫卵雕薪況我大魏天王不為華侈造迎風館于後園窗戶之上列錢青瑣玉鳳銜鈴金龍吐旆素奈朱李枝條入簷妓女樓上坐而摘食琛嘗會宗室陳諸寶器金瓶銀甕百餘口甌擎盤合稱是其餘酒器有水晶鉢瑪瑙琉璃碗赤玉卮數十枚作工奇妙中土所無皆從西來又陳女樂及諸名馬復引諸王按行庫藏錦罽珠璣冰羅霧穀充積其內琛謂章武王融曰不恨我不見石崇恨石崇不見我融立性貪暴志欲無厭見之歎惋不覺成疾還家臥三日不能起江陽王繼來省疾諭之曰卿之財産應得抗衡何為羡歎以至於此融曰常謂高陽一人寶貨多于融誰知河間瞻之在前繼曰卿欲作袁術之在淮南不知世間復有劉備也及爾朱氏亂後王侯第宅多題為寺宇壽丘里閭列剎相望祗洹鬱起寶塔高壯四月八日京都士女多至河間寺觀其堂廡綺麗無不歎息以為蓬萊仙室亦不是過也出伽藍記隋煬帝煬帝巡狩北邊作大行殿七寶帳容數百人飾以珍寶光輝洞徹引胸奴啓民可汗宴會其中可汗恍然疑非人世之有識者云大行殿者不祥之兆也是非王莽輕車之比此實天心非關人事也出朝野僉載又唐貞觀初天下乂安百姓富贍公私少事時屬除夜太宗盛飾宮掖明設燈燭殿內諸房莫不綺麗后妃嬪御皆盛衣服金翠煥爛設庭燎於階下其明如晝盛奏歌樂乃延蕭后與同觀之樂闋帝謂蕭曰朕施設孰與隋主蕭后笑而不答固問之后曰彼乃亡國之君陛下開基之主奢儉之事固不同矣帝曰隋主何如后曰隋主享國十有餘年妾常侍從見其淫侈隋主每當除夜至及歲夜殿前諸院設火山數十盡沉香木根也每一山焚沉香數車火光暗則以甲煎沃之焰起數丈沉香甲煎之香旁聞數十里一夜之中則用沉香二百餘乘甲煎二百石又殿內房中不燃膏火懸大珠一百二十以照之光比白日又有明月寶夜光珠大者六七寸小者猶三寸一珠之價直數千萬妾觀陛下所施都無此物殿前所焚盡是柴木殿內所燭皆是膏油但乍覺煙氣薰人實未見其華麗然亡國之事亦願陛下遠之太宗良久不言口刺其奢而心服其盛出紀聞則天后則天造明堂于頂上鑄鐵為鸑鷟高二丈以金飾之軒軒若飛數年大風吹動猶存其址更鑄銅為大火珠飾以黃金煌煌耀日今見存焉又造天樞于定鼎門並番客胡商聚錢百萬億所成其高九十尺下以鐵山為腳鑄銅為二麒麟以鎮四方上有銅盤徑三丈蛟龍人立兩足捧大火珠望之如日初出鐫文于柱曰大周萬國述德天樞後開元中推倒銅入上方出大唐新語許敬宗唐許敬宗奢豪嘗造飛樓七十間令妓女走馬于其上以為戲樂出獨異記張易之張易之為母阿臧造七寶帳金銀珠玉寶貝之類罔不畢萃曠古以來未曾聞見鋪象牙床織犀角簟鼲貂之褥蛩蚊之氈汾晉之龍鬚臨河之鳳翮以為席阿臧與鳳閣侍郎李迥秀私通逼之也以鴛鴦盞一雙共飲取其常相逐迥秀畏其盛嫌其老乃荒飲無度昏醉是務常頻喚不覺出為恆州刺史易之敗阿臧入官迥秀被坐降為衛州長史出朝野僉載宗楚客宗楚客造一宅新成皆是文柏為梁沉香和紅粉以泥壁開門則香氣蓬勃磨文石為階砌及地著吉莫靴者行則仰仆楚客被建昌王推得贓萬餘貫兄弟配流太平公主就其宅看歎曰觀其行坐處我等虛生浪死一年追入為鳳閣侍郎景龍中為中書令韋民之敗被誅出朝野僉載安樂公主洛州昭成佛寺有安樂公主造百寶香爐高三尺開四門絳橋勾欄花草飛禽走獸諸天妓樂麒麟鸞鳳白鶴飛仙絲來線去鬼出神入隱起鈒鏤窈窕便娟真珠瑪瑙琉璃琥珀頗梨珊瑚車渠琬琰一切寶貝用錢三萬庫藏之物盡于是矣出朝野僉載又安樂公主改為悖逆庶人奪百姓莊田造定昆池四十九里直抵南山擬昆明池纍石為山以象華嶽引水為澗以象天津飛閣步簷斜牆磴道被以錦繡畫以丹青飾以金銀瑩以珠玉又為九曲流杯池作石蓮花臺泉于臺中流出窮天下之壯麗言之難盡悖逆之敗配入司農每日士女遊觀車馬填咽奉敕輒到者官人解見任凡人決一頓乃止出朝野僉載又安樂公主造百鳥毛裙以後百官百姓家效之山林奇禽異獸搜山蕩谷掃地無遺至于網羅殺獲無數開元中焚寶器于殿前禁人服珠玉金銀羅綺之屬於是採捕乃止出朝野僉載楊慎交景龍中妃主家競為奢侈駙馬楊慎交武崇訓至以油灑地築毬場出國史異纂唐睿宗唐睿宗先天二年正月十四十五十六夜于京師安福門外作燈輪高二十丈被以錦綺飾以金銀燃五萬盞燈俱俱字原空闕據黃本補豎之如花樹宮女千數衣綺羅曳錦繡耀珠翠施香粉一花冠一巾帔皆至萬錢裝束一妓女皆至三百貫妙簡長安萬年縣年少婦女千餘人衣服花叉媚子亦稱是於燈下踏歌三日夜觀樂之極未始有之出朝野僉載玄宗玄宗幸華清宮新廣湯池制作宏麗安祿山于范陽以白玉石為魚龍鳧鴈仍為石梁及石蓮花以獻雕鐫巧妙殆非人功上大悅命陳于湯中又以石梁橫亙湯上而蓮花才出於水際上因幸華清宮至其所解衣將入而魚龍鳧鴈皆若奮鱗舉翼狀欲飛動上甚恐遽命撤去其蓮花至今猶存又嘗于宮中置長湯屋數十間環回甃以文石為銀鏤漆船及白香木船置于其中至于楫櫓皆飾以珠玉又于湯中壘瑟瑟及沉香為山以狀瀛洲方丈上將幸華清宮貴妃姊妹競飾車服為一犢車飾以金翠間以珠玉一車之費不啻數十萬貫既而重甚牛不能引因復上聞請各乘馬於是競購名馬以黃金為銜蹶蹶字原闕據明鈔本補組繡為障泥共會于國忠宅將同入禁中炳炳照燭觀者如堵自國忠宅至于城東南隅僕御車馬紛紜其間國忠方與客坐于門下指而謂客曰某家起于細微因緣椒房之親以至于是吾今未知稅駕之所念終不能致令名要當取樂于富貴耳由是驕奢僭侈之態紛然而昧處滿持盈之道矣太平公主玉葉冠虢國夫人夜光枕楊國忠鎖子帳皆稀代之寶不能計其直出明皇雜録虢國夫人楊貴妃姊虢國夫人恩寵一時大治第宅棟宇之盛舉無與比所居韋嗣嗣原作副據黃本改立舊宅韋氏諸子方午偃息于堂廡間忽見婦人衣黃羅帔衫降自步輦有侍婢數十人笑語自若謂韋氏諸子曰聞此宅欲貨其價幾何韋氏降階曰先人舊廬所未忍捨語未畢有工數百人登東西廂撤其瓦木韋氏諸子乃率家童挈其琴書委于路中而授韋氏隙池十數畝其宅一無所酬虢國中堂既成召匠汙鏝授二百萬賞其值而復以金盞瑟瑟三斗為賞後曾有暴風拔樹委其堂上已而視之略無所傷既撤瓦以觀之皆乘以木瓦其制作精緻皆此類也虢國每入禁中常乘驄馬使小黃門御紫驄之俊健黃門之端秀皆冠絶一時出明皇雜録
