body:
  text: 邢曹進邢曹進唐故贈工部尚書邢曹進至德已來河朔之健將也守職魏郡因為田承嗣所縻曾因討叛飛矢中肩左右與之拔箭而鏃留於骨微露其末焉即以鐵鉗遣有力者拔而出之其鏃堅然不可動曹進痛楚計無所施妻孥輩但為廣修佛事用希慈蔭不數日則以索縛身於牀復命出之而特牢如故曹進呻吟忍耐俟死而已忽因晝寢夢一胡僧立於庭中曹進則以所苦訴之胡僧久而謂曰能以米汁注於其中當自愈矣及寤言於醫工醫工曰米汁即泔豈宜漬瘡哉遂令廣詢於人莫有諭者明日忽有胡僧詣門乞食因遽召入而曹進中堂遙見乃昨之所夢者也即延之附近告以危苦胡僧曰何不灌以寒食餳當知其神驗也曹進遂悟餳為米汁況所見復肖夢中則取之如法以點應手清涼頓減酸疼其夜其瘡稍癢即令如前鑷之鉗才及瞼鏃已突然而出後傅藥不旬日而瘥矣吁西方聖人恩祐顯灼乃若此之明徵乎出集異記韋氏子韋氏子有服儒而任於唐元和朝者自幼宗儒非儒不言故以釋氏為胡法非中國宜興有二女長適相里氏幼適胡氏長夫執外舅之論次夫則反之常敬佛奉教攻習其文字其有不譯之字讀宜梵音者則屈舌效之久而益篤及韋氏子寢疾命其子曰我儒家之人非先王之教不服吾今死矣慎勿為俗態鑄釋飯僧祈祐於胡神負吾平生之心其子從之既除服而胡氏妻死凶問到相里氏以其婦臥疾未果訃之俄而疾殆其家泣而環之且屬纊焉歘若鬼神扶持驟能起坐呼其婦曰妾季妹死已數月何不相告因泣下嗚咽其夫紿之曰安得此事賢妹微恙近聞平復荒惑之見未可憑也勿遽惆悵今疾甚且須將息又泣曰妾妹在此自言今年十月死甚有所見命吾弟兄來將傳示之昨到地府西曹之中聞高墉之內冤楚叫悔之聲若先君聲焉觀其上則火光迸出焰若風雷求入禮覲不可因遙哭呼之先君隨聲叫曰吾以平生謗佛受苦彌切無曉無夜略無憩時此中刑名言説不及惟有罄家回向冥明鈔本冥作竭資撰福可救萬一輪劫而受難希降減但百刻之中一刻暫息亦可略舒氣耳妹雖宿罪不輕以夫家積善不墮地獄即當上生天宮也妾以君心若先君亦當受數百年之責然委形之後且當神化為烏再七飯僧之時可以來此其夫泣曰洪爐變化物固有之雀為蛤蛇為雉雉為鴿鳩為鷹田鼠為鴽腐草為螢人為虎為猿為魚為鱉之類史傳不絶為烏之説豈敢深訝然烏群之來數皆數十何以認君之身而加敬乎曰尾底毛白者妾也為妾謝世人為不善者明則有人誅暗則有鬼誅絲毫不差因其所迷隨迷受化不見天寶之人多而今人寡乎蓋為善者少為惡者多是以一廁之內蟲豸萬計一磚之下螻蟻千萬而昔之名城大邑曠蕩無人美地平原目斷草莽得非其驗乎多謝世人勉植善業言訖復臥其夕遂卒其為婦也奉上敬事夫順為長慈處下謙故合門憐之憫其芳年而變異物無幼無長泣以俟烏及期烏來者數十唯一止於庭樹低枝窺其姑之戶悲鳴屈曲若有所訴者少長觀之莫不嗚咽徐驗其尾果有二毛白如霜雪姑引其手而祝之曰吾新婦之將亡也言當化為烏而尾白若真吾婦也飛止吾手言畢其烏飛來馴狎就食若素養者食畢而去自是日來求食人皆知之數月之後烏亦不來出續玄怪録殭僧唐元和十三年鄭滑節度使司空薛公平陳許節度使李光顏並準詔各就統所部兵自衛入討東平抵濮陽南七里駐軍焉居人盡散而村內有窣堵波者中有殭僧瞪目而坐佛衣在身以物觸之登時塵散衆爭集視填咽纍日有許卒郝義曰焉有此事因此刀刺其心如棖上壤義下塔不三四步捧心大叫一聲而絶李公遂令標蕝其事瘞於其下明日陳卒毛清曰豈有此乎昨者郝義因偶會耳即以刀環築去二齒清下塔不三四步捧頤大叫一聲而絶李公又令標蕝其事瘞於其下自是無敢犯者而軍人祈福乞靈香火大集往環三四里人稠不得入焉軍人以錢帛衣裝檀施環一二里而滿焉司空薛公因令軍卒之戰傷瘡重者許其落籍居不旬日則又從軍東入而所聚之財為盜賊挈去則無怪矣至今刀瘡齒缺分明猶在出集異記雞卵唐敬宗皇帝御曆以天下無事視政之餘因廣浮屠教由是長安中緇徒益多及文宗嗣位親閲萬機思除其害於人者嘗顧左右曰自吾為天子未能有補於人今天下幸無兵革吾將盡除害物者使億兆之民指今日為堯舜之世足矣有不能補化而蠹於物者但言之左右或對曰獨浮屠氏不能有補於大化而蠹於物亦甚可以斥去於是文宗病之始命有司詔中外罷緇徒説佛書義又有請斥其不修教者詔命將行會尚食廚吏修御膳以鼎烹雞卵方燃火於其下忽聞鼎中有聲極微如人言者迫而聽之乃群卵呼觀世音菩薩也聲甚悽咽似有所訴尚食吏異之具其事上聞文宗命左右驗之如尚食所奏文帝嘆曰吾不知浮屠氏之力乃如是耶翌日敕尚食吏無以雞卵為膳因頒詔郡國各於精舍塑觀世音菩薩像出宣室志高高本作岐據明鈔本改陽許文度唐太和中僑居岐陽郡後以病熱近月餘一日臥於榻若沉醉狀後數日始寤初文度夢有衣黃袍數輩與俱行田野四望間迥然無雞犬聲且不知幾百里其時天景曛晦愁思如結有黃袍者謂文度曰子無苦夫壽之與夭固有涯矣雖聖人安能逃其數文度忽悟身已死恐甚又行十餘里至一水盡目無際波若黑色杳不知其深淺黃衣人俱履水而去獨文度懼不敢涉已而有二金人皆長五寸餘奇光皎然自水上來黃衣者望見金人沮色震栗即辟易馳去不敢偷視二金人謂文度曰汝何為來地府中我今挈汝歸生途慎無恐文度懼稍解因再拜謝之於是金人與文度偕行數十里俄望見里門喜不勝忽聞有厲聲呼文度者文度悸而醒見妻子方泣於前且奇且嘆而羸憊不能運支體故未暇語其事後旬日疾少間策而步於庭忽見二金人皆長五寸餘在佛舍下即昔時夢中所見者視其儀狀無毫縷之異心益奇之始以其事告於妻妻曰昨者以君病且亟妾憂不解然常聞釋氏有救苦之力由是棄資玩鑄二金人之像每清旦常具食祭之自是君之苦亦瘳除蓋其力也文度感二金人報效之速不食生牢常閲佛書因盡窮其指歸焉出宣室志玄法寺長安安邑坊玄法寺者本里人張頻宅也頻嘗供養一僧念法華經為業積十餘年張門人譖僧通其婢因以他事殺之僧死後合宅常聞經聲不絶張尋知其冤慚悔不及因舍宅為寺出酉陽雜俎商居士有商居士者三河縣人年七歲能通佛氏書里人異之後廬於三河縣西田中有佛書數百編手卷目閲未嘗廢一日從而師者百輩往往獨遊城邑偕其行者聞居士每運支體壠然若戛玉之音聽者奇之或曰居士之骨真鎖骨也夫鎖骨連絡如蔓故動搖之體則有清越之聲固其然矣昔聞佛氏書言佛身有舍利骨菩薩之身有鎖骨今商居士者豈非菩薩乎然葷俗之人固不可辨也居士後年九十餘一日湯沐具冠帶悉召門弟子會食因告之曰吾年九十矣今旦暮且死汝當以火燼吾尸慎無逆吾旨門弟子泣曰謹聽命是夕坐而卒後三日門弟子焚居士於野及視其骨果鎖骨也支體連貫若紉綴之狀風一拂則纖韻徐引於是里人競施金錢建一塔以居士鎖骨瘞於塔中出宣室志黃山瑞像魯郡任城野黃山瑞像蓋生於石狀如胚混焉昔有採梠者山中見像因往祈禱如願必得由是遠近觀者數千人知盜官恐有姦起因命石工破山石輦瑞像致之邑中大寺門樓下於是邑人於寺建大齋凡會數千人齋畢衆散日方午忽然大風黑雲覆寺雲中火起電擊門樓飛雨河注邑人驚曰門樓災矣先是僧造門樓高百餘尺未施丹雘而樓勢東傾以大木撑之及雨止樓已正矣蓋鬼神以像故而共扶持焉出紀聞馬子雲涇縣尉馬子雲為人數奇以孝廉三任為涇縣尉皆數月丁憂而去在官日充本郡租綱赴京途由淮水遇風船溺凡沉官米萬斛由是大被拘繫子雲在繫乃專心念佛凡經五年後遇赦得出因逃於南陵山寺中常一食齋天寶十年卒於涇縣先謂人曰吾為人坎軻遂精持內教今西方業成當往生安樂世界爾明日沐浴衣新衣端坐合掌俄而異香滿戶子雲喜曰化佛來矣且迎吾行言訖而歿出紀聞雲花寺觀音長安雲花寺有觀音堂在寺西北隅大中末百姓屈巖患瘡且死夢一菩薩摩其瘡曰我在雲花寺巖驚覺汗流數日而愈因詣寺尋檢至聖畫堂見菩薩一如其覩傾城百姓瞻禮巖遂立社建堂移之出酉陽雜俎李舟唐虔州刺史李舟與妹書曰釋迦生中國設教如周孔周孔生西方設教如釋迦天堂無則已有則君子登地獄無則已有則小人入識者以為知言出國史補惠原沙門惠原本姓春氏義陽人也少以弓弩為業至武陵山射一孕鹿將死能言曰吾先身只殺汝汝今遂併殺害我母子既是緣對應為汝死復向言曰吾尋當成佛也汝可行善生生代代勿復結冤惠原即悟前緣遂落髮於鹿死之處而置迦藍名耆闍窟山寺王融別傳言惠死後十年有人於武當山下見之出朗州圖經延州婦人昔延州有婦女白皙頗有姿貌年可二十四五孤行城市年少之子悉與之遊狎昵薦枕一無所却數年而歿州人莫不悲惜共醵喪具為之葬焉以其無家瘞於道左大曆中忽有胡僧自西域來見墓遂趺明鈔本趺作敷坐具敬禮焚香圍繞讚嘆數日人見謂曰此一淫縱女子人盡夫也以其無屬故瘞於此和尚何敬耶僧曰非檀越所知斯乃大聖慈悲喜捨世俗之欲無不徇焉此即鎖骨菩薩順緣已盡聖者云耳不信即啓以驗之衆人即開墓視遍身之骨鉤結皆如鎖狀果如僧言州人異之為設大齋起塔焉出續玄怪録鎮州鐵塔唐天祐中太原僧惠照因夢鎮州南三十里廢相國寺中埋鐵塔特往訪之至界上為元戎王中令鎔所知延在衙署供養衙將任友義慮是鄰道諜人或致不測懇要詰而逐之元戎始疑惠具以尋塔為對遽差於府南三十里訪之果得相國寺古墓掘其殿砌之前得鐵塔上刻三千人姓名悉是見在常山將校親軍唯任友義一人無名乃知冥數前定刻斯塔者何神異哉出北夢瑣言渭濱釣者清渭之濱民家之子有好垂釣者不農不商以香餌為業自壯及中年所取不知其紀極仍得任公子之術多以油煎燕肉置於纖鉤其取鮮鱗如寄之於潭瀨其家數口衣食綸竿是賴忽一日垂釣於大涯硤竟日無所得將及日晏忽引其獨繭頗訝沉重迤邐挽之獲一銅佛像既悶甚擲之於潭心遂移釣於別浦亦無所得移時又牽出一銅佛於是折其竿斷其綸終身不復其業出玉堂間話
