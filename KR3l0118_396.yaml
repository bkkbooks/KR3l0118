body:
  text: 雨房玄齡唐貞觀末房玄齡避位歸第時天旱太宗將幸芙蓉園觀風俗玄齡聞之戒其子曰鑾輿必當見幸亟使灑掃兼備饌具有頃太宗果先幸其第便載入宮其夕大雨咸以為優賢之應不空三藏唐梵僧不空得總持門能役百神玄宗禮之歲旱命祈雨不空言可過某日今祈之必暴上乃命金剛三藏設壇請雨果連淋注不止坊市有漂溺者遽召不空止之遂於寺庭建泥龍五六乃溜水胡言詈之良久復置之大笑有頃雨霽玄宗又嘗詔術士羅公遠與不空祈雨互陳其效俱召問之不空曰臣昨焚白檀香龍上命左右掬庭水嗅之果有檀香氣每祈雨無他軌則但設數繡座手旋數寸木神念咒擲之自立于座上伺木神口角牙出目瞚雨輒至一行僧一行開元中嘗旱玄宗令祈雨曰當得一器上有龍狀者方可致之命如內府遍視皆言不類后指一鏡鼻盤龍喜曰此真龍矣持入道場一夕而雨或云是揚州新進初范模時有異人至請閉戶入室數日開戶模成其人已失有圖并傳見行于世此鏡五月五日于楊子江心鑄之無畏三藏玄宗嘗幸東都大旱聖善寺竺乾國三藏僧無畏善召龍致雨術上遣力士疾召請雨奏云今旱數當然召龍必興烈風雷雨適足暴物不可為之上強之曰人苦暑病久矣雖暴風疾雷亦足快意不得已乃奉詔有司陳請雨之具幡幢像設甚備笑曰斯不足以致雨悉命撤之獨盛一鉢水以小刀子攪旋之胡言數百祝之須臾有龍狀類其大指赤色首撤水上俄復沒于鉢中復以刀攪咒之三頃之白氣自鉢中興如爐煙徑上數尺稍稍引出講堂外謂力士曰亟去雨至矣力士絶馳去還顧白氣旋繞亙空若一匹素既而昏霾大風震雷而雨力士才及天津之南風雨亦隨馬而至天衢大樹多拔力士比復奏衣盡沾濕玉龍子唐玄宗至渭水侍者得玉龍子進上皇曰吾為嬰兒時天后召諸孫坐於殿上觀其嬉戲因出西國所貢玉環兼杯盤羅列殿上縱令爭取以觀其志莫不奔競厚有所得時吾在其中獨坐略不為動后撫吾背曰此兒當為太平天子因取玉龍子賜吾本太宗於晉陽宮得之文德皇后嘗置之衣中及大帝載誕日后以珠絡衣褓并玉龍子賜焉其后嘗藏于內府雖廣不數寸而溫潤精巧非人間所有以為國瑞帝帝相傳上皇即位初每京師憫雨即禱之必有霖注逼而視之苦奮鱗鬣開元中三輔大旱上皇復祈禱而涉旬無應乃密投于南內龍池俄而云物暴起風雨隨作及上皇幸西蜀車駕回次渭水將渡駐蹕于水濱左右侍者因臨流濯弄沙中得之自后夜中必有光彩輝煥一室上皇還京為小黃門私竊以遺李輔國常致匱中輔國將敗夜聞匱中如有聲開而視之已亡所在人有詩曰聖運潛符瑞玉龍自興云雨更無縱不如渭水沙中得爭保鑾輿復九重狄惟謙唐會昌中北都晉陽令狄惟謙仁杰之后守官清恪不畏強御屬邑境亢陽自春徂夏數百里田皆耗璪禱于晉祠略無其應時有郭天師暨并州女巫少攻符術多行厭勝監軍使攜至京國因緣中貴出入宮掖遂賜天師號旋歸本土僉曰若得天師一至晉祠則不足憂矣惟謙請于主帥初甚難之既而敦請主帥遂親往迓焉巫者唯唯乃具車輿列幡蓋惟謙躬為控馬既至祠所盛設供帳磬折庭中翌日語惟謙曰我為爾飛符上界請雨已奉天地命必在至誠三日雨當足矣繇是四郊士庶云集期滿無征又曰災沴所興良由縣令無德我為爾再告天七日方合有雨惟謙引罪奉之愈謹竟無其效乃驟欲入州復拜留曰天師已為萬姓來更乞至心祈請悖然而詈曰庸瑣官人不知天道天時未肯下雨留我將復奚為乃謝曰非敢更煩天師俟明相餞耳于是宿戒左右我為巫者所辱豈可復言為官耶詰旦有所指揮汝等咸須相稟是非好惡豫自當之逮曉時門未開郭已嚴飾歸騎而狄酒肴供設一無所施郭乃坐堂中大恣訶責惟謙遂曰左道女巫妖惑日久當須斃在此日焉敢言歸叱左右于神前鞭背二十投于漂水祠后有山高可十丈遽命設席焚香從吏悉皆放還簪笏立其上于是闔城駭愕云邑長杖殺天師馳走紛紜觀者如堵時砂石流爍忽起片云大如車蓋先覆惟謙立所四郊云物會之雷震數聲甘雨大澍原野無不滂流士庶數千自山擁惟謙而下州將以殺巫者初亦怒之既而精誠感應深加歎異表列其事詔書褒異云惟謙劇邑良才忠臣華胄睹茲天厲將疸下民當請禱于晉祠類投巫于鄴縣曝山椒之畏景事等焚軀起天際之油云情同剪爪遂使旱風潛息甘澤旋流昊天猶監克誠豫意豈忘褒善特頒朱紱俾耀銅章勿替令名更昭殊績乃賜錢五十萬子郎偽蜀王氏梁州天旱祈禱無驗僧子郎詣州云能致雨乃具十石甕貯水僧坐其中水滅于頂者凡三日雨足州將王宗儔異禮之檀越云集后莫知所適僧令藹他日于興州見之因問其術曰此閉氣耳習之一月就本法于湫潭中作觀與龍相系龍為定力所制必致驚動因而致雨然不如甕中為之保無他害秦始皇秦始皇二十八年渡淮至衡山浮江至湘遇大風博士云堯女舜妻葬于此始皇怒使刑徒三千人伐湘山樹王莽王莽地皇四年大風毀路堂其年司徒王尋司空王邑守昆陽光武起兵南陽至昆陽敗之風雷屋瓦皆飛雨下如注滍川盛溢尋邑乘死人而渡王尋見殺軍人皆散走王邑還長安莽敗俱被誅賈謐西晉八年六月飄風吹賈謐朝衣飛數百丈明年謐誅其年十一月京都大風發屋折木十二月愍懷太子幽廢死于許昌三子幽于金墉殺太子母謝氏喪還洛又大風雷電帷蓋風裂張華西晉永康元年大風飛石沙折木其年四月張華舍風飄起折木飛繒軸六七枚是月趙王倫矯制廢賈后害張華裴頠等劉曜前趙劉曜葬父母費用億計發掘古冢暴骸骨原野哭聲盈衢大霖雨震曜父墓門屋大風飄散發父寢堂于外垣五十余步松柏植已成林至是悉枯死曜竟為石勒所擒劉裔東晉成帝時劉裔鎮守潯陽有回風從東來入裔船中狀如匹練長五六丈術人戴洋曰有刀兵死喪之亂頃為郭默所殺徐羡之宋徐羡之文帝初任揚州有飄風起自西門須臾合直至廳事繞帽及席徑造西際尋而羡之為文帝所誅柳世隆宋孝武時柳太尉世隆乘車行還於庭中洗車有大風從門而入直來沖車有聲車蓋覆向天是年明帝立合門被殺崔惠景宋崔惠景圍台城有五色幡風吹飛在云中半日乃下衆見驚異相謂曰幡者事當翻覆數日而惠景敗許世宗北齊北海王許世宗時轉為録尚書拜命其夜暴風震雷拔庭中桐樹六十圍者倒立本處識者知其不終竟為高肇所譖旬日處死徐妃梁元帝妃徐妃初嫁夕車至西州而疾風大起發屋折木無何雪霰交下帷簾皆白及長還之日又大雷電西州廳事兩柱俱碎帝以為不祥妃竟以淫穢自殺不中之應李密隋大業十三年二月李密于鞏縣南設壇刑白馬祭天稱魏公置僚佐改元升壇時黑風從西北暴至吹密衣冠及左右僚屬皆倒于壇下沙塵暗天咫尺不相見良久乃息賊軍惡之俄而密敗夏世隆故越王無諸舊宮上有大杉樹空中可坐十余人越人夏世隆高尚不仕常之故宮因雨霽欲暮斷虹飲于宮池漸漸縮小化為男子著黃赤紫之間衣而入樹良久不出世隆怪異乃召鄰之年少十數人往視之見男子為大赤蛇盤繞衆懼不敢逼而少年遙擲瓦礫聞樹中有聲極異如婦人之哭須臾云霧不相見又聞隱隱如遠雷之響俄有一彩龍與赤鵠飛去及曉世隆往觀之見樹中紫蛇皮及五色蛟皮欲取以歸有火生樹中樹焚蕩盡吳景帝永安三年七月也陳濟妻廬陵巴丘人陳濟為州吏其婦秦在家一丈夫長大端正著絳碧袍衫色炫耀來從之后常相期于一山澗至于寢處不覺有人道相感接如是積年村人觀其所至輒有虹見秦至水側丈夫有金瓶引水共飲后遂有身生兒如人多肉濟假還秦懼見之內于盆中丈夫云兒小未可得我去自衣即以絳囊盛時出與乳之時輒風雨鄰人見虹下其庭丈夫復少時來將兒去人見二虹出其家數年而來省母后秦適田見二虹于澗畏之須臾見丈夫云是我無所畏從此乃絶薛願東晉義熙初晉陵薛願有虹飲其釜鬲吸響便竭願輦酒灌之隨投隨竭乃吐金滿器於是日益隆富劉義慶宋長沙王道鄰子義慶在廣陵臥疾食粥次忽有白虹入室就飲其粥義慶擲器于階遂作風雨聲振于庭戶良久不見首陽山后魏明帝正光二年夏六月首陽山中有晚虹下飲于溪泉有樵人陽萬于嶺下見之良久化為女子年如十六七異之問不言乃告蒲津戍將宇文顯取之以聞明帝召入宮見其容貌姝美問云我天女也暫降人間帝欲逼幸而色甚難復令左右擁抱聲如鐘磬化為虹而上天韋皋唐宰相韋皋鎮蜀嘗與賓客從事十余人宴郡西亭暴風雨俄頃而霽方就食忽虹霓自空而下直入庭垂首于筵韋與賓偕悸而退吸其食飲且盡首似驢霏然若晴霞狀紅碧相靄虛空五色四視左右久而方去公懼且惡之遂罷宴時故河南少尹豆盧署客于蜀亦列坐因起曰公何為色憂乎曰吾聞虹霓者妖沴之氣今宴方酣而沴氣止吾筵豈非怪之甚者乎吾竊懼此署曰真天下祥符也固不為人之怪耳夫虹霓天使也降于邪則為戾降于正則為祥理宜然矣公正人也是宜為慶為祥敢以前賀于是具以帛書其語而獻公覽而喜后旬余有詔就拜中書令
