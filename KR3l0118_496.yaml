body:
  text: 趙存趙存馮翊之東窟谷有隱士趙存者元和十四年壽逾九十服精術之藥體甚輕健自云父諱君乘亦享遐壽嘗事兗公陸象先言兗公之量固非凡可以測度兗公崇信內典弟景融竊非曰家兄溺此教何利乎象先曰若果無冥道津梁百歲之后吾固當與汝等萬一有罪福吾則分數勝汝及為馮翊太守參軍等多名族子弟以象先性仁厚于是與府僚共約戲賭一人曰我能旋笏于廳前硬努眼眶衡揖使君唱喏而出可乎衆皆曰誠如是甘輸酒食一席其人便為之象先視之如不見又一參軍曰爾所為全易吾能于使君廳前墨涂其面著碧衫子作神舞一曲慢趨而出群僚皆曰不可誠敢如此吾輩當斂俸錢五千為所輸之費其二參軍便為之象先亦如不見皆賽所賭以為戲笑其第三參軍又曰爾之所為絶易吾能于使君廳前作女人梳妝學新嫁女拜舅姑四拜則如之何衆曰如此不可仁者一怒必遭叱辱倘敢為之吾輩願出俸錢十千充所輸之費其第三參軍遂施粉黛高髻笄叉女人衣疾入深拜四拜象先又不以為怪景融大怒曰家兄為三輔刺史今乃成天下笑具象先徐語景融曰是渠參軍兒等笑具我豈為笑哉初房琯嘗尉馮翊象先下孔目官党芬于廣衢相遇避馬遲琯拽芬下決脊數十下芬訴之象先曰汝何處人芬曰馮翊人又問房琯何處官人芬曰馮翊尉象先曰馮翊尉決馮翊百姓告我何也琯又入見訴其事請去官象先曰如党芬所犯打亦得不打亦得官人打了去亦得不去亦得后數年琯為弘農湖城令移攝閔鄉值象先自江東征入次閔鄉日中遇琯留逮至昏黑琯不敢言忽謂琯曰攜衾綢來可以霄話琯從之竟不交一言到闕日荐琯為監察御史景觸又曰比年房琯在馮翊兄全不知之今別四五年因途次會不交一詞到闕荐為監察御史何哉公曰汝不自解房琯為人百事不缺只缺不言今則不言矣是以為用之班行間大伏其量矣嚴震嚴震鎮山南有一人乞錢三百千去就過傲震召子公弼等問之公弼曰此誠不可旨輒如此乃患風耳大人不足應之震怒曰爾必墜吾門只可勸吾力行善事奈可勸吾吝惜金帛且此人不辨向吾乞三百千的非凡也命左右准數與之于是三川之士歸心恐后亦無造次過求者盧杞盧杞為相令李揆入蕃揆對德宗曰臣不憚遠恐死于道路不達君命帝惻然憫之謂盧曰李揆莫老無杞曰和戎之使且須諳練朝廷事非揆不可且使揆去則君臣少于揆年者不敢辭遠使矣揆既至蕃蕃長曰聞唐家有第一人李揆公是否揆曰非也他那李揆爭肯到此恐為拘留以謾之也揆門地第一文學第一官職第一揆致仕歸東都司徒杜佑罷淮海入洛見之言及第一之說揆曰若道門戶門戶有所自承余裕也官職遭遇耳今形骸凋悴看即下世一切為空何第一之有韋皋韋皋在西川凡軍士將吏有婚嫁則以熟錦衣給其夫氏以銀泥衣給其女氏各給錢一萬死喪稱是訓練稱是內附者富贍之遠游者將迎之極其賦斂坐有余力以故軍府盛而黎氓重困及晚年為月進終致劉辟之亂天下譏之陸暢李白嘗為蜀道難歌曰蜀道難難于上青天白以刺嚴武也后陸暢復為蜀道易曰蜀道易易于履平地暢佞韋皋也初暢受知于皋乃為蜀道易獻之皋大喜贈羅八百匹及韋薨朝廷欲繩其既往之事復閲先所進兵器刻定秦二字不相與者因欲構成罪名暢上疏理之云臣在蜀日見造所進兵器定秦者匠名也由是得釋馬暢馬燧之子暢以第中大杏饋竇文場以進德宗德宗未嘗見頗怪之令中使就封杏樹暢懼進宅廢為奉誠園屋木皆拆入內吳湊德宗非時召拜吳湊為京兆尹便令赴上湊疾驅諸客至府已列筵矣或問曰何速吏曰兩市日有禮席舉鐺釜而取之故三五百人饌常可立辦袁參袁參之破袁眺擒其僞公卿數十人州縣大具桎梏謂必生致闕下參曰此惡百姓何足煩人乃遣笞臀逐之李勉故相李勉任江西觀察使時部人有父病盅乃為木偶人置勉名位瘞于其壟或發以告勉勉曰為父禳災是亦可矜也舍之或曰李勉失守梁城亦宜貶黜議曰不然當李希烈之怙亂其鋒不可當天方厚其罪而降之罰也矧應變非長援軍不至又其時關輔已俶擾矣人心搖動矣以文吏之才當虎狼之隧乃全師南奔非量力者能乎于公異李晟平朱泚之亂德宗覽收城露布曰臣已肅清宮禁祗謁寢園鐘虡不移廟貌如故上感涕失聲左右六宮皆嗚咽露布乃于公異之辭也議者以朝廷捷書露布無如此者公異后為陸贄所忌誣以家行不謹賜孝經一卷故坎坷而終邢君牙貞元初邢君牙為隴右臨洮節度進士劉師老許堯佐往謁焉二客方坐一人儀形甚異頭大足短衣麻衣而入都不待賓司引報直入見君牙拱手于額曰進士張汾不敢拜君牙從戎多年殊不以為怪乃揖汾坐曾不顧堯佐師老俄而有吏過桉宴設司缺失錢物君牙閲歷簿書有五十余千散落為所由隱漏君牙大怒方令分折去處汾乃拂衣而起曰且奉辭牙謝曰某適有公事略須決遣未有所失于君子不知遽告辭何也汾對曰汾在京之日每聞京西有邢君牙上柱天下柱地今日于汾前與設吏論牙三五十千錢此漢爭中君牙甚怪便放設吏與汾相親汾謂君牙曰某在京應舉每年常用二千貫文皆出往還劍南韋二十三徐州張十三一日之內客有數等上至給舍即須法味中至補遺即須煮雞豚或生或鱠既而指師老堯佐云如舉子此公之徒遠相訪君僎胡而已何不如此耶堯佐矍然逡巡二客告辭而退君牙各贈五縑張汾灑掃內廳安置留連月余贈五百縑汾卻至武功堯佐方臥病在館汾都不相揖后二年及第又不肯選遂患腰腳疾武元衡鎮西川哀其龍鐘奏充安撫巡官仍攝廣都縣令一年而殂張造貞元中度支欲取兩京道中槐樹為薪更栽小樹先下符牒華陰華陰尉張造判牒曰召伯所憩尚不翦除先皇舊游豈宜斬伐乃止呂元膺呂元膺為鄂嶽團練夜登城女牆已鎖守者曰軍法夜不可開乃告之曰中丞自登守者又曰夜中不辨是非中丞亦不可元膺乃歸及明擢為大職李章武李章武學識好古有名于時唐太和末敕僧尼試經若干紙不通者勒還俗章武時為成都少尹有山僧來謁云禪觀有年未嘗念經今被追試前業棄矣願長者念之章武贈詩曰南宗向許通方便何處心中更有經好去苾篘云水畔何山松拍不青青主者免之元稹元稹為御史奉使東川于襄城題黃明府詩其序云昔年曾于解縣飲酒余恆為觥録事嘗于竇少府廳有一人后至頻犯語今連飛十數觥不勝其困逃席而去醒后問人前虞卿黃丞也此后絶不復如元和四年三月奉使東川十六日至裒城望驛有大池樓榭甚盛逡巡有黃明府見迎瞻其形容仿佛以識問其前銜即曩日之逃席黃丞也說向事黃生惘然而悟因饋酒一尊艤舟邀余同載余時在諸葛所征之路次不勝感今懷古遂作贈黃明府詩云昔年曾痛飲黃令困飛觥席上當時走馬前今日迎依稀迷姓字即漸識平生故友身皆遠他鄉眼暫明便邀聯榻坐兼共刺船行酒思臨風亂霜棱拂地平不堪深淺酌還愴古今情邐迤七盤路坡阤數丈城花疑褒女笑棧想武候征一種埋幽石老閒千載名于丞相牛僧孺應舉時知于奇俊特詣襄陽求知住數日兩見以游客遇之牛怒而去去后忽召客將問曰纍日前有牛秀才發未曰已去何以贈之曰與錢五百受乎曰擲于庭而去于大恨謂賓佐曰某事繁總蓋有闕遺者立命小將繼絹五百匹書一函追之曰未出界即領來如已出界即以書付小將界外追及牛不折書揖回薛尚衍于方熾于襄陽朝廷以大閹薛尚衍監其軍尚衍至初不厚待尚衍晏如也后旬日請出游及暮歸第幄幕茵毯什器一以新矣又列犢車五十乘實以彩綾尚衍頷之亦不言歎曰是何祥也
