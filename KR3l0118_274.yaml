body:
  text: 買粉兒買粉兒有人家甚富止有一男寵恣過常遊市見一女子美麗賣胡粉愛之無由自達乃託買粉日往市得粉便去初無所言積漸久女深疑之明日復來問曰君買此粉將欲何施答曰意相愛樂不敢自達然恆欲相見故假此以觀姿耳女悵然有感遂相許以私剋以明夕其夜安寢堂屋以俟女來薄暮果到男不勝其悅把臂曰宿願始伸於此歡踴遂死女惶懼不知所以因遁去明還粉店至食時父母怪男不起往視已死矣當就殯斂發篋笥中見百餘裹胡粉大小一積其母曰殺我兒者必此粉也入市遍買胡粉次此女比之手迹如先遂執問女曰何殺我兒女聞嗚咽具以實陳父母不信遂以訴官女曰妾豈復吝死乞一臨尸盡哀縣令許焉徑往撫之慟哭曰不幸致此若死魂而靈復何恨哉男豁然更生具説情狀遂為夫婦子孫繁茂崔護博陵崔護資質甚美而孤潔寡合舉進士第清明日獨遊都城南得居人莊一畝之宮花木叢草寂若無人扣門久之有女子自門隙窺之問曰誰耶護以姓字對曰尋春獨行酒渴求飲女入以杯水至開門設牀命坐獨倚小桃斜柯佇立而意屬殊厚妖姿媚態綽有餘妍崔以言挑之不對彼此目注者久之崔辭去送至門如不勝情而入崔亦眷盻而歸爾後絶不復至及來歲清明日忽思之情不可抑徑往尋之門院如故而已扃鎖之崔因題詩於左扉曰去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風後數日偶至都城南復往尋之聞其中有哭聲扣門問之有老父出曰君非崔護耶曰是也又哭曰君殺吾女崔驚怛莫知所答父曰吾女笄年知書未適人自去年已來常恍惚若有所失比日與之出及歸見在左扉有字讀之入門而病遂絶食數日而死吾老矣惟此一女所以不嫁者將求君子以託吾身今不幸而殞得非君殺之耶又持崔大哭崔亦感慟請入哭之尚儼然在牀崔舉其首枕其股哭而祝曰某在斯須臾開目半日復活老父大喜遂以女歸之武延嗣唐武后載初中左司郎中喬知之有婢名窈娘藝色為當時第一知之寵待為之不婚武延嗣聞之求一見勢不可抑既見即留無復還理知之痛憤成疾因為詩寫以縑素厚賂閽守以達窈娘窈娘得詩悲咽結三章於裙帶赴井而死延嗣見詩遣酷吏誣陷知之破其家知之詩曰石家金谷重新聲明珠十斛買娉婷昔日可憐君自許此時歌舞得人情君家樓閣不曾難好將歌舞借人看富貴雄豪非分理驕奢勢力橫相干別君去君終不忍徒勞掩袂傷紅粉百年離別在高樓一代紅顏為君盡開元製衣女開元中頒邊軍纊衣製於宮中有兵士於短袍中得詩曰沙場征戍客寒苦若為眠戰袍經手作知落阿誰邊蓄意多添線含情更著綿今生已過也結取後身緣兵士以詩白於帥帥進之玄宗命以詩遍示六宮曰有作者勿隱吾不罪汝有一宮人自言萬死玄宗深憫之遂以嫁得詩人仍謂之曰我與汝結今身緣邊人皆感泣韋皋唐西川節度使韋皋少遊江夏止於薑使君之館薑氏孺子曰荊寶已習二經雖兄呼於韋而恭事之禮如父也荊寶有小青衣曰玉簫年才十歲常令祗侍韋兄玉簫亦勤於應奉後二載薑使入關求官家纍不行韋乃易居止頭陀寺荊寶亦時遣玉簫往彼應奉玉簫年稍長大因而有情時廉使陳常侍得韋季父書云姪皋久客貴州切望發遣歸覲廉使啓緘遺以舟楫服用仍恐淹留請不相見洎舟江瀨俾篙工促行韋昏瞑拭淚乃裁書以別荊寶寶頃刻與玉簫俱來既悲且喜寶命青衣往從侍之韋以違覲日久不敢俱行乃固辭之遂與言約少則五載多則七年取玉簫因留玉指環一枚並詩一首遺之既五年不至玉簫乃靜禱於鸚鵡洲又逾二年至八年春玉簫歎曰韋家郎君一別七年是不來矣遂絶食而殞薑氏憫其節操以玉環著於中指而同殯焉後韋鎮蜀到府三日詢鞠獄囚滌其冤濫輕重之繫近三百餘人其中一輩五器所拘偷視廳事私語云僕射是當時韋兄也乃厲聲曰僕射僕射憶薑家荊寶否韋曰深憶之即某是也公曰犯何罪而重繫答曰某辭韋之後尋以明經及第再選青城縣令家人誤爇廨舍庫牌印等韋曰家人之犯固非己尤即與雪冤仍歸墨綬乃奏眉州牧敕下未令赴任遣人監守朱紱其榮且留賓幕時屬大軍之後草創事繁凡經數月方向玉簫何在薑曰僕射維舟之夕與伊留約七載是期既逾時不至乃絶食而終因吟留贈玉環詩云黃雀銜來已數春別時留解贈佳人長江不見魚書至為遣相思夢入秦韋聞之益增悽歎廣修經像以報夙心且想念之懷無由再會時有祖山人者有少翁之術能令逝者相親但令府公齋戒七日清夜玉簫乃至謝曰承僕射寫經造像之力旬日便當托生却後十三年再為侍妾以謝鴻恩臨去微笑曰丈夫薄情令人死生隔矣後韋以隴右之功終德宗之代理蜀不替是故年深纍遷中書令天下響附瀘僰歸心因作生日節鎮所賀皆貢珍奇獨東川盧八座送一歌姬未當破瓜之年亦以玉簫為號觀之乃真薑氏之玉簫也而中指有肉環隱出不異留別之玉環也韋歎曰吾乃知存歿之分一往一來玉簫之言斯可驗矣歐陽詹歐陽詹字行周泉州晉江人弱冠能屬文天縱浩汗貞元年登進士第畢關試薄遊太原於樂籍中因有所悅情甚相得及歸乃與之盟曰至都當相迎耳即灑泣而別仍贈之詩曰驅馬漸覺遠回頭長路塵高城已不見況復城中人去意既未甘居情諒多辛五原東北晉千里西南秦一屨不出門一車無停輸流萍與繫瓠早晚期相親尋除國子四門助教住京籍中者思之不已經年得疾且甚乃危粧引髻刃而匣之顧謂女弟曰吾其死矣苟歐陽生使至可以是為信又遺之詩曰自從別後減容光半是思郎半恨郎欲識舊時雲髻樣為奴開取縷金箱絶筆而逝及詹使至女弟如言徑持歸京具白其事詹啓函閲文又見其詩一慟而卒故孟簡賦詩哭之序曰閩越之英惟歐陽生以能文擢第爰始一命食太學之祿助成均之教有庸績矣我唐貞元年已卯歲曾獻書相府論大事風韻清雅詞旨切直會東方軍興府縣未暇慰薦久之倦遊太原還來帝京卒官靈臺悲夫生於單貧以徇名故心專勤儉不識聲色及茲筮仕未知洞房纖腰之為蠱惑初抵太原居大將軍宴席上有妓北方之尤者屢目於生生感悅之留賞纍月以為燕婉之樂盡在是矣既而南轅妓請同行生曰十目所視不可不畏辭焉請待至都而來迎許之乃去生竟以蹇連不克如約過期命甲遣乘密往迎妓妓因積望成疾不可為也先夭之夕剪其雲髻謂侍兒曰所歡應訪我當以發為貺甲至得之以乘空歸授髻於生生為之慟怨涉旬而生亦歿則韓退之作何蕃書所謂歐陽詹生者也河南穆玄道訪豫常歎息其事嗚呼鍾愛於男女素其效死夫亦不蔽也大凡以時斷割不為麗色所汨豈若是乎古樂府詩有華山畿玉臺新詠有廬江小吏更相死或類於此暇日偶作詩以繼之云有客非北逐驅馬次太原太原有佳人神艷照行雲座上轉橫波流光注夫君夫君意蕩漾即日相交歡定情非一詞結念誓青山生死不變易中誠無間言此為太學徒彼屬北府官中夜欲相從嚴城限軍門白日欲同居君畏仁人聞忽如隴頭水坐作東西分驚離腸千結滴淚眼雙昏本達京師回駕期相追攀宿約始乖阻彼憂已纏綿高髻若黃鸝危鬢如玉蟬纖手自整理剪刀斷其根柔情託侍兒為我遺所歡所歡使者來侍兒因復前收淚取遺寄深誠祈為傳封來贈君子願言慰窮泉使者回復命遲遲蓄悲酸詹生喜言施倒屨走迎門長跪聽未畢驚傷涕漣漣不飲亦不食哀心百千端襟情一夕空精爽旦日殘哀哉浩然氣潰散歸化元短生雖別離長夜無阻難雙魂終會合兩劍遂蜿蜒大夫早通脫巧笑安能干防身本苦節一去何由還後生莫沈迷沈迷喪其真薛宜僚會昌中為左庶子充新羅册贈使由青州泛海船頻阻惡風雨至登州却漂回泊青州郵傳一年節使烏漢真尤加待遇籍中飲妓段東美者薛頗屬情連帥置於驛中是春薛發日祖筵嗚咽流涕東美亦然乃於席上留詩曰阿母桃花方似錦王孫草色正如煙不須更向滄溟望惆悵歡情恰一年薛到外國未行册禮旌節曉夕有聲旋染疾謂判官苗甲曰東美何故頻見夢中乎數日而卒苗攝大使行禮薛旋櫬回及青州東美乃請告至驛素服執奠哀號撫柩一慟而卒情緣相感頗為奇事戎昱韓晉公滉鎮浙西戎昱為部內刺史郡有酒妓善歌色亦間妙昱情屬甚厚浙西樂將聞其能白滉召置籍中昱不敢留俄於湖上為歌詞以贈之且曰至彼令歌必首唱是詞既至韓為開筵自持杯令歌送之遂唱戎詞曲既終韓問曰戎使君於汝寄情耶妓悚然起立曰然淚下隨言韓令更衣待命席上為之憂危韓召樂將責曰戎使君名士留情郡妓何故不知而召置之成余之過乃十笞之命妓與百縑即時歸之其詞曰好去春風湖上亭柳條藤蔓繫人情黃鶯久住渾相戀欲別頻啼四五聲
