body:
  text: 魏人鑽火魏人鑽火魏人夜暴疾命門人鑽火是夕陰暝督迫頗急門人忿然曰君責人亦大無理今暗如漆何以不把火照我當得覓鑽火具然後易得耳孔文舉聞之曰責人當以其方也出笑林齊俊士漢書王莽贊云紫色蛙聲餘分閏位謂以僞亂真顏之推常言吾近共人讀書與言及王莽形狀有一俊士自許知史學名價甚高乃云王莽非直鴟目虎吻亦紫色蛙聲出顏氏家訓元魏臣元魏之世在洛京時有一才學重臣新得史記音而頗紕誤及見顓頊字為許緑錯作許緣其人遂謂朝士言從來謬音專旭當專翲耳此人先有高明翕然行信期年之後更更原作史據明鈔本改有碩儒苦相究討方知誤焉出顏氏家訓并州士族北齊并州有士族好為可笑詩賦輕蔑邢魏諸公衆共嘲弄虛相稱讚必擊牛釃酒延之其妻明鑒人也泣而諫之此人嘆曰才華不為妻子所容容下原有與字據明鈔本刪何況況原作兄據明鈔本改行路至死不覺出顏氏家訓高敖曹高敖曹常為雜詩三首云冢子地握槊星宿天圍棋開罈甕張口卷席床剝皮又相送重相送相送至橋頭培堆兩眼淚難按滿胸愁又桃生毛彈子瓠長棒槌兒牆欹壁亞肚河凍水生皮出啓顏録梁權貴梁有一權貴讀誤本蜀都賦注解蹲鴟芋也而為羊字後有人餉羊肉答書云損惠蹲鴟舉朝驚駭不解事義久後尋繹方知如此出顏氏家訓柳騫之隋內史舍人河東柳騫之奏事好錯嘗有周家公主表請出家騫之奏云周家公主上表求作道人上大笑及出虞僕射慶則問之曰奏事若為錯騫之復錯答曰周家公主欲得還俗騫之歷位光祿卿阮嵩唐貞觀中桂陽令阮嵩妻閻氏極妬嵩在廳會客飲召女奴歌閻被髮跣足袒臂拔刀至席諸客驚散嵩伏牀下女奴狼狽而奔刺史崔邈為嵩作考詞云婦強夫弱內剛外柔一妻不能禁止百姓如何整肅妻既禮教不修夫又精神何在考下省符解見任出朝野僉載郝象賢唐郝象賢侍中處俊之孫頓丘令南容之子也弱冠諸友生為之字曰寵之每於父前稱字父紿之曰汝朋友極賢吾為汝設饌可命之也翊日象賢因邀致十數人南容引生與之飲謂曰諺云三公後出死狗小兒誠愚勞諸君製字損南容之身尚可豈可波及侍中也因泣涕衆慚而退寵之者反語為癡種也出朝野僉載朱前疑周朱前疑淺鈍無識容貌極醜上書云臣夢見陛下八百歲即授拾遺俄遷郎中出使回又上書云聞嵩山唱萬歲聲即賜緋魚袋未入五品於緑衣衫上帶之朝野莫不怪笑後契丹反有敕京官出馬一匹供軍者即酬五品前疑買馬納訖表索緋上怒批其狀即放歸丘園憤恚而卒出朝野僉載張由古唐張由古有吏才而無學術纍歷臺省嘗於衆中歎班固有大才而文章不入文選或謂之曰兩都賦燕山銘典引等並入文選何為言無由古曰此並班孟堅文章何關班固事聞者掩口而笑又謂同官曰昨買得王僧襦集蓋僧孺也大有道理杜文範知其誤應聲曰文範亦買得佛袍集倍勝僧襦襦原作儒據許本改集由古竟不知覺纍遷司計員外以罪放于庭州時中書令許敬宗綜理詔獄帖召之由古喜至則為所責懼而手戰笏墜於地口不能言初為殿中正班以尚書郎有錯立者謂引駕曰員外郎小兒難共語可鼻衝上打朝士鄙之出大唐新語侯思正唐侯思正出自皂隸言音不正以告變授侍書御史按制獄苛酷日甚嘗按中丞魏元忠曰急承白司馬不然即吃孟青白司馬者洛陽有坂號曰白司馬坂孟青者將軍姓孟名青曾杖殺琅琊王沖者也思正閭巷庸人常以此言逼諸囚元忠辭氣不屈思正怒而倒曳之元忠徐起曰我薄命如乘惡驢而墜腳為鐙鐙字原空缺據明鈔本補所挂遂被賊曳耳思正大怒又曳之曰汝拒捍制使奏斬之元忠曰侯思正汝今為國家御史須識禮儀輕重如此須魏元忠頭何不以鋸截去無為抑我反奈何佩服朱紱親銜天命不能行正道之事乃言白司馬孟青是何言也若非魏元忠無人仰教思正驚起悚怍怍字原空闕據明鈔本補曰思正死罪實不解幸蒙中丞見教乃引上階禮坐而問之元忠徐就坐自若又思正言音不正時斷屠殺思正曰今斷屠殺雞古梨反魚愚豬計驢蔞俱居不得吃苦豉反謂謂字原闕據明鈔本補空吃米弭麵滅之去聲如檽齊何得飽侍御史霍獻可笑之思正訴於則天則天怒謂獻可曰我知思正不識字我已用之卿笑何也獻可具言雞豬之事則天亦大笑思正嘗命作籠餅謂謂字原空闕據明鈔本補膳者曰與我作籠餅可縮葱作比市籠餅蔥多而肉少故令縮葱加肉也時人號為縮葱侍御史時來俊臣棄故妻奏逼娶太原王慶詵女思正亦奏請娶趙郡李自挹女敕政事商量鳳閣侍郎李昭德撫掌謂諸相曰大可笑大可笑諸相問之昭德曰往年來俊臣賊劫王慶慶字原闕據明鈔本補詵女已大辱國今日此奴又請娶娶字原空闕據明鈔本補李自挹女無乃復辱國耶事遂寢竟為李昭德榜殺之出御史臺記王及善唐王及善才行庸猥風神鈍濁為內史時人號為鳩集鳳池俄遷文昌右相無他政但不許令史之之原作雙據明鈔本改驢入臺終日迫逐無時暫捨時人號驅驢宰相出朝野僉載逯仁傑周朝有逯仁傑河陽人自地官令史出尚書改天下帳式頗甚繁細法令滋章每村立社官仍置平直老三員掌簿案設鎖鑰十羊九牧人皆散逃而宰相淺識以為萬代皆可行授仁傑地官郎中數年百姓苦之其法逐寢出朝野僉載袁琰周考功令史袁琰國忌衆人聚會充録事勾當遂判曰曹司繁鬧無時暫閒不因國忌之辰無以展其歡笑合坐嗤之出朝野僉載臺中語周夏官侍郎侯知一年老敕放致仕上表不伏於朝堂踴躍馳走以示輕便張悰丁憂自請起復吏部主事高筠母喪親戚為舉哀筠曰我不能作孝員外郎張栖貞被訟詐遭母憂不肯起對時臺中為之語曰侯知一不伏致仕張琮自請起復高筠不肯作孝張栖貞情願遭憂皆非名教中人並是王化外物獸心人面不其然乎出朝野僉載沈子榮周大官選人沈子榮誦判二百道試日不下筆人問之榮曰無非命也今日誦判無一相當有一道蹟同人名又別至來年選判水磑又不下筆人問之曰我誦水磑乃是藍田今問之富平如何下筆聞者莫不撫掌焉出朝野僉載武懿宗周則天內宴甚樂河內王懿宗忽然起奏曰臣急告君子急告父則天大驚引前問之對曰臣封物承前府家自徵近敕州縣徵送大有損折則天大怒仰觀屋椽良久曰朕諸親飲正樂汝是親王為三二百戶封幾驚殺我不堪作王令曳下懿宗免冠拜伏諸王救之曰懿宗愚鈍無意矣上乃釋之出朝野僉載張衡周張衡令史出身位至四品加一階合入三品已團甲因退朝路旁見蒸餅新熟遂市其一馬上食之被御史彈奏則天降敕流外出身不許入三品遂落甲出朝野僉載李良弼周右拾遺李良弼自矜唇頰好談玄理請使北蕃說骨篤祿胸奴以木盤盛糞飼之臨以白刃弼懼食一盤並盡乃放還人譏之曰李拾遺能拾突厥之遺出為真源令秩滿還瀛州遇契丹賊孫萬榮使何阿小取滄瀛冀冀原作糞據明鈔本改具入明鈔本無入字良弼謂鹿城令李懷璧曰孫者胡孫即是獼猴難可當也萬字者有草即是草中藏勸懷璧降何阿小授懷璧三品將軍阿小敗懷璧及良弼父子四人並為河內王武懿宗斬之出朝野僉載來子珣唐來子珣則天委之按制獄多希旨賜姓武氏字家臣丁父憂起復纍加游擊將軍右羽林軍中郎將常衣錦半臂言笑自若朝士誚之諭德張元一好譏謔曰豈有武家兒為你來家老翁制服耶出御史臺記閻知微周春官尚書閻知微庸瑣駑怯使入蕃受默啜封為漢可汗賊入恆定遣知微先往趙州招慰將將軍陳令英等守城西面知微謂令英曰陳將軍何不早降下可汗兵到然後降者剪土無遺令英不答知微城城原作成據明鈔本改下連手踏歌稱萬歲樂令英英原作兵據明鈔本改曰尚書國家八座受委非輕翻為賊踏歌無慚也知微仍唱曰萬歲樂萬歲年不自由萬歲樂時人鄙之出朝野僉載崔湜唐崔湜為吏部侍郎貪縱兄憑弟力父挾子威咸受囑求贓污狼籍父挹為司業受選人錢湜不之知也長名放之其人訴曰公親將略去何為不與官湜曰所親為誰吾捉取鞭殺曰鞭即遭憂湜大怒慚主上以湜父年老瓜初熟賜一顆湜以瓜遺妾不及其父朝野誚之時崔岑鄭愔並為吏部京中謠之曰岑義獠子後崔湜令公孫三人相比接莫賀咄最渾出朝野僉載權龍襄唐左衛將軍權龍襄性褊急常自矜能詩通天年中為滄州剌史初到乃為詩呈州官曰遙看滄海城楊柳鬱青青中央一群漢聚坐打杯觥諸公謝曰公有逸才襄曰不敢趁韻而已又秋日述懷曰簷前飛七百雪白後園彊飽食房里側家糞集野蜋參軍不曉請釋襄曰鷂子簷前飛值七百文洗衫挂後後原作彼據明鈔本改園乾白如雪飽食房中側臥家裏裏原作襄據明鈔本改便轉集得野澤蜣蜋談者嗤之皇太子宴夏日賦詩嚴霜白浩浩明月赤團團太子授筆為讚曰龍襄才子秦州人士明月晝耀嚴霜夏起如此詩章趁韻而已襄以張易之事出為容山府折衝神龍中追入乃上詩曰無事向容山今日向東都陛下敕進來今作右金吾又為喜雨詩曰暗去也沒雨明來也沒雲日頭赫赤出地上緑氳氤為瀛州史日新過歲京中數人附書曰改年多感敬想同之正新喚官人集云有詔改年號為多感元年將書呈判司已下衆人大笑龍襄復側聽怪赦書來遲高陽博野兩縣競地陳牒龍襄乃判曰兩縣競地非州不裁既是兩縣於理無妨付司權龍襄示典曰比來長官判事皆不著姓龍襄曰餘人不解若不著姓知我是誰家浪驢也龍襄不知忌日謂府史曰何名私忌對曰父母亡日請假獨坐房中不出襄至日於房中靜坐有青狗突入龍襄大怒曰沖破我忌更陳牒改作明朝好作忌日談者笑之出朝野僉載
