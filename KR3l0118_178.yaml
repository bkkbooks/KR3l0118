body:
  text: 總敘進士科總敘進士科進士科始於隋大業中盛於貞觀永徽之際縉紳雖位極人臣不由進士者終不為美以至歲貢恆不減八九百其推重謂之白衣公卿又曰一品白衫其艱難謂之三十老明經五十少進士其負倜儻之才變通之術蘇張之辨說荊聶之膽氣仲由之武勇子房之籌畫弘羊之書算方朔之詼諧咸以是而晦之修身慎行雖處子之不若其有老死於文場者亦無所恨故有詩曰太宗皇帝真長算賺得英雄盡白頭李肇曰進士為時所尚久矣是故俊人由此出者終身為文人故爭名常切為時所弊其都會謂之舉場通稱謂之秀才投刺謂之鄉貢得第謂之前進士互相推敬謂之先輩俱捷謂之同年近年及第未過關試皆稱新及第進士所以韓中丞儀常有知聞近過關試議以一篇記之日短行軸了付三銓休把新銜惱必先今日便稱前進士好留春色與明年明鈔本議作儀又明鈔本許刻本記之日作記之曰軸作納街作詩有司謂之座主京兆府考而升者謂之等第外府不試而貢者謂之拔解然拔解亦須預託人為詞賦非為白薦將試相保謂之合保群居而賦謂之私試造請權要謂之關節激揚聲價謂之還往既捷列姓名於慈恩寺塔謂之題名大宴於曲江亭子謂之曲江會曲江大會在關試後亦謂聞喜宴後同年各有所之亦謂之為離會可也明鈔本聞作關籍而入選謂之春闈不捷而醉飽謂之打毷氉匿名造榜謂之無名子退而肄業謂之過夏執業以出謂之夏課挾藏入試謂之畫策此其大略者也其風俗繫於先達其制置存於有司雖然賢者得其大者故位極人臣常十有二三登顯列十有六七而元魯山張睢陽有焉劉關國史補關作闢元修有焉出國史補進士歸禮部俊秀等科此皆考功主之開元二十四年員外郎李昂性不容物乃集貢士與之約曰文之美惡悉之矣考校取檢存乎至公如有請託於人當悉落之昂外舅常與進士李權鄰居相善遂言之於昂昂果怒集貢人數權之過權謝曰人或猥知竊聞於左右非求之也昂因曰觀衆君子之文信美矣然古人云瑜不掩瑕忠也其詞或有不典雅與衆詳之若何皆曰唯權出謂衆曰向之言其意屬我也昂意在此吾落必矣又何籍焉乃陰求昂瑕他日昂果摘權章句小疵榜于通衢以辱之權拱而前謂昂曰禮尚往來鄙文之不臧既得而聞矣而執事昔以雅什嘗聞於道路愚將切磋可乎昂怒而應曰有何不可權曰耳臨清渭洗心向白雲間豈執事之詞乎昂曰然權曰昔唐堯老耄厭倦天下將禪許由由惡聞故洗耳今天子春秋鼎盛不揖讓於足下而洗耳何哉昂聞惶駭訴於執政謂權狂不遜遂下權吏初昂強復不受囑請及有勢位明鈔本勢位作吏議求者莫不允從由是廷議以省郎位輕不足以伏多士乃命吏部侍郎專知焉出托言府解京兆府解送自開元天寶之際率以在上十人謂之等第必求名實相副以滋教化之源小宗伯倚而選之或悉中第不然十得其七八苟異於是則往往牒貢院請放落之由暨咸通乾符則為形勢吞爵臨制近同及第得之者首相誇詫車服多侈靡不以為僭仍期集人事真實之士不復齒矣所以廢置不定職此之由出托言諸州解同華解與京兆無異若首送無不捷者元和中令狐楚鎮三峰時及秋賦榜云特置五場試蓋詩歌文賦帖經為五常年以清要詩題求薦者率不減十數人其年莫有至者雖不遠千里而來聞是皆寢去惟盧弘正獨詣華請試公命供帳酒饌侈靡於往時華之寄客畢縱觀於側弘正自謂獨步楚命日試一場務精不務敏也弘正已試兩場馬植下解狀植將家子從事輩皆竊笑楚曰此未可知既而試登山採珠賦略曰文豹且異於驪龍採斯疏矣白石又殊於老蚌割莫得之楚大伏其精當遂奪弘正解頭後弘正自丞郎使判鹽鐵俄而為植所據弘正以手札戲植曰昔日華元已遭毒手今來鹺務又中老拳拳原作權據明鈔本改大中中紇干峻與魏爭府元而紇干屈居其下翌日暴卒時父臮父臮原作又泉唐托言二作時峻父方鎮南海峻父當是紇干泉曾為嶺南節度使見文苑英華沈詢撰制詞及裴廷裕東觀奏記方當作鎮南海由是為無名子所謗曰離南海之日應得數斤當北鬥唐托言二鬥作闕之前未銷一捻因此峻兄弟皆罷舉皆斯唐托言三皆斯作張又新于時號張三頭進士狀頭宏詞敕頭京兆解頭原闕出處今見托言卷二試雜文垂拱元年吳道古等二十七人及第榜後敕批云略觀其策並未盡善若依令式及第者惟止一人意欲廣收通滯並許及第後至調露二年考功員外劉恩唐托言一恩作思立奏議加試帖經與雜文文高者放入策尋以則天革命事復因循至神龍二年方行三場試故恆列詩賦題目於榜中矣出托言內出題開成中高諧知舉內出霓裳羽衣曲賦太學創置石經詩進士試詩賦自此始也出盧氏雜說放雜文榜常兗為禮部判雜文榜後云他日登庸心無不鋭通宵絶筆恨即有餘所放雜文過者常不過百人鮑祭酒防為禮部帖經落人亦甚時謂之常雜鮑帖出傳載故實放榜貞觀初放榜日太宗私幸端門見進士於榜下綴行而出喜謂侍臣曰天下英雄入吾彀中矣進士榜頭豎粘黃紙四張以氈筆淡墨袞轉書曰禮部貢院四字或曰文皇頃以飛帛書之又云象陰注陽受之狀進士舊例於都省御考試南院放榜南院乃禮部主事受領文書於此凡版樣及諸色條流多於此例之明鈔本例作列張榜牆乃南院東牆也別築起一堵高丈餘外有壖垣未辨色即自北院將榜就南院張之元和六年為監生郭東里決破棘籬籬在壖垣之下南院正門外亦有之坼裂文榜因之後來多以虛榜自省門而出正榜張亦稍晚出托言又鄭薰知舉放榜日唯舍人畢諴到宅謝恩至蕭倣放榜日並無朱紫及門時論誚之出盧氏雜說五老榜天復元年杜德祥榜放曹松王希羽劉象柯崇鄭希顏等及第時上新平內難聞放新進士喜甚詔選中有孤貧屈人宜令以名聞特敕授官故德祥以松等塞詔各授校正制略曰念爾登科之際當豫反正之年宜降異恩各膺寵命松舒州人學賈司倉為詩此外無他能時號松啓事為送羊腳狀希羽歙州人詞藝優博松希羽甲子皆七十餘象京兆人崇希顏閩人皆以詩卷及第亦俱年逾耳順矣時謂五老榜出托言謝恩放榜後狀元已下到主司宅門下馬綴行而立斂名紙通呈門人按唐托言三門人作入門並敘立於階下北上東向主司列席褥東面西向主事揖狀元已下與主司對拜拜訖狀元出行致詞又退著行各拜主司答拜拜訖主司云請諸郎君敘中外狀元已下各各齒敘便謝恩餘人如狀元禮禮訖主事云請狀元曲謝謝原作謀據唐托言三改名第第幾人謝衣鉢衣鉢謂得主司名第其或與主司先人同名第即謝大衣鉢如踐世科即感泣而謝謝訖登即狀元與主司對座于時公卿來看皆南行敘座飲酒數巡便起赴期集院或云此禮部不恆即有於都省至謝公卿來看者或不坐而即回馬也明鈔本部作即三日後又曲謝其日主司方一一言及薦導之處俾其各謝挈維之力苟特達而取亦要言之矣出托言期集謝恩後方詣期集院大凡未敕下已前每日期集兩度詣主司之門然三日後主司堅請已即止同年初到集所團團原作國據唐托言三改司所由輩輩原作輦據唐托言三改參狀元後更參衆郎君拜訖俄有一吏當中庭唱曰諸郎君就坐雙東隻西其日醵日醵二字原闕據明鈔本補罰不少又出抽名紙錢每人十貫文其敘名紙見狀元俄於衆中騫抽三五箇便由此錢唐托言三騫作驀鋪底錢自狀元已下每人三十貫文出托言過堂敕下後新及第進士過堂其日團司團司原作園日據明鈔本改先於光範門裏東廊廊字原闕據明鈔本補供帳備酒食同年於此候宰相上堂後于時主司亦命召知聞三兩人會於他處此筵罰錢不少宰相既集堂吏來請名紙生徒隨座主至中書宰相橫行都堂門裏敘立堂吏通云禮部某姓侍郎領新及第進士見相公俄而有一吏抗聲屈主司及登階長揖而退立於門側東向然後狀元以下敘立階上狀元出行行致詞云今月某日禮部放榜某等幸忝成名皆在相公陶鎔之下不任感懼狀元在左右即云夢瞿唐托言三夢瞿作慶懼言揖退位乃自狀元已下一一自稱姓名訖堂吏云典明鈔本典作與唐托言三典作無客主司復長揖領生徒退詣舍人院主司欄入舍人公服靸鞋延接主司然舍人禮貌謹敬有加隨事敘杯酒然於階前鋪席褥舍人登席諸生皆拜拜字原闕據明鈔本補舍人答拜狀元出行致詞答拜又拜如初便出於廊下候主司出一揖而已當時詣宅謝恩便致飲席出托言題名神龍已來杏園宴後皆於慈恩塔下題名同年中推一善書者已時他有將相則朱書之及第後知聞或遇未及第時題名處則為添前字故昔人有詩云曾題名處添前字送出城人乞舊衣出托言關試吏部員外於南省試判兩節試後授春關謂之關試諸生謝恩其日稱門生謂之一日門生自此方屬吏部矣原闕出處今見托言卷三宴集曲江亭子安史未亂前諸司皆有列於岸滸幸蜀之後皆燼於兵火矣唯尚書省亭子存焉進士開宴常寄其間既撤饌則移樂泛舟都為恆例宴前數日行市駢闐於江頭頭原作顏據唐托言三改其日公卿家傾城縱觀於此有若東榻之選者十八九鈿車珠幕櫛比而至或曰乾符中薛能為大京兆尹楊知至將攜家遊致書於能假舫子已為新人所假能答書曰已為四十子之鳩居知至得書怒曰昨日郎吏敢此無禮能自吏部郎中拜京兆少尹權知大尹開成五年李景讓中榜於時上在諒暗乃放新人遊宴率常雅飲詩人趙嘏以詩寄之曰天上高高月桂叢分明三十一枝風滿懷春色向人動遮路亂花迎馬紅鶴馭迥飄雲雨外蘭亭不在管絃中居然自是前賢事何必青樓倚翠空寶曆楊嗣復具慶下繼放兩榜時於陵自東洛入覲嗣復率生徒迎於潼關既而大宴於新昌里第於陵與所執坐於正寢公領諸生翊坐於兩序時元白俱在皆賦詩於席上唯刑部侍郎楊汝士詩後成元白覽之失色詩曰隔坐應須賜御屏盡將仙仙原作佃據唐托言三改明鈔本作先翰入高冥文章舊價留鴛掖桃李新陰在鯉庭再歲生徒陳賀宴一時良史盡傳馨當時疏傳雖云盛詎有茲筵醉醁醽汝士其日大醉歸來謂子弟曰我今日壓倒元白出托言
