body:
  text: 庾翼庾翼庾翼為南蠻校尉南郡太守夜登廁忽見廁中一物頭如方相兩眼大而有光從土中出庾乃攘袂以拳擊之應拳有聲忽失所在庾謹新野庾謹母病兄弟三人悉在侍疾忽聞床前狗斗聲非常舉家共視了不見狗只見一死人頭在地猶有血兩眼尚動其家怖懼夜持出于后園中埋之明旦視之出在土上兩眼猶爾即又埋之后旦已復出乃以磚著頭令埋之不復出后數日其母遂亡商仲堪晉商仲堪曾從桓玄行至鶴穴逢一老公驅一青牛形色瑰異堪即以所乘牛易而取之行至零陵溪牛忽駿駃非常因息駕顧之牛乃徑走入江伺之終日不出堪心以為怪未幾玄敗堪亦被誅戮矣壽頒晉孝武大元十二年吳郡壽頒道志邊水為居渚次忽生一雙物狀若青藤而無枝葉數日盈拱試共伐之即有血出聲在空中如雄鵝叫兩音相應腹中得一卵形如鴨子其根頭似蛇面眼李勢蜀王李勢宮人張氏有妖容勢寵之一旦化為大斑理蛇長丈余送于苑中夜復求寢床下勢懼遂殺之復有鄭美人勢亦寵之化為雌虎一夕食勢寵姬未幾勢為桓溫所殺郗恢安帝隆安初雍州刺史高平郗恢家內忽有一物如蜥蜴每來輒先扣戶則便有數枚便滅燈火兒女大小莫不驚懼以白郗不信須臾即來至龍安二年郗恢與殷仲堪謀議不同下奔京師道路遇害并及諸子庾實義熙中新野庾實妻滎陽毛氏五月暴晒葦席忽有三歲女在席下臥驚怛乃滅女真形在別床如故不旬日而女夭乞佛熾盤西秦乞佛熾盤都長安端門外又有井人常宿汲亭水之下而夜聞磕磕有聲驚起照視瓮中如血中有丹魚長可三寸而有寸光時東羌西虜互相攻伐國尋滅亡姚紹后秦姚泓義熙十三年遣叔父大將軍紹帥衆攻函谷關廚人為紹炊飯氣蒸汗溜輒成血腥甚如此積日紹心惡之令勿復炊乞飯于諸軍后八十日紹病死泓為晉將劉裕所擒斬于建康市桓振桓振在淮南夜聞人登床聲振聽之隱然有聲求火看之見大聚血俄為義師所滅桓振玄從父之弟賈弼之河東賈弼之晉義熙中為琊琅府參軍夜夢一人面查丑甚多須大鼻詣之曰愛君之貌欲易頭可乎弼曰人各有頭面豈容此理明晝又夢意甚惡之乃于夢中許之明朝起不覺而人見悉驚走弼取鏡自看方知怪異還家家人悉驚入內婦女走藏曰那得異男子弼自陳說良久并遣至府檢閲方信后能半面笑兩手各執一筆俱書辭意皆美俄而安帝崩恭帝立江陵趙姥以酤酒為業義熙中屋內土忽自隆起察為異朝夕以酒酹土嘗見一物出頭似驢而地初無孔穴及姥死鄰人聞土下朝夕有聲如哭后人掘宅見一異物蠢而動不測大小須臾失之謂土龍諸葛長民安帝時諸葛長民為豫州刺史有搗衣杵相與語如人聲不可解令移各一處俱遙相喚又長民在豫州時見屋中柱及椽梠間悉見有如蛇頭令人以刀砟之應刃藏隱或一月或數十日輒于夜眠中驚起跳踉如與人相打毛修之嘗與之同宿駭愕不達此意長民曰此物奇健非我無以制之毛曰是何物長民曰我正見一物甚黑而有手足不分明莫知其形狀而來輒共斗深自懼焉長民俄而伏誅鹽官張氏晉末有張氏在鹽官閒居端坐忽聞煎食香斯須風吹一盤食至酒肉肴饌畢備有黃袍人乘輿來上床與張共食問其姓含笑不答久之登輿而去后張為孫恩所害而已王愈王愈字茂和義熙初愈在庭中行帽忽自脫仍乘空如人所著及愈母喪月朝上祭酒器在幾上酒器須臾下地覆還登床尋而第三兒綏懷二伏誅朱宗之會稽國司理令朱宗之常見亡人殯去頭三尺許有一青物狀如覆瓮人或當其處則滅人去隨復見凡尸頭無不有此青物者又云人殯時鬼無不暫還臨之虞定國余姚虞定國有好儀容同縣蘇氏女亦有美色定國嘗見悅之后見定國來主人留宿中夜告蘇公曰賢女令色意甚欽之此夕寧能令暫出否主人以其鄉里貴人便令女出從之往來漸數語蘇公無以相報若有官事其為君任之主人喜自爾后有役召事往造定國定國大驚曰都未嘗面命何由便爾此必有異具說之定公曰仆寧當請人之父而人之女君復見來便斫之后果得怪丁譁東陽丁譁出郭于方山亭宿亭渚有劉散騎遭母艱于京葬還夜中忽有一婦自通云劉女郎患瘡聞參軍統治故來耳譁使前姿形端媚從婦數人命仆具肴饌酒酣歎曰今夕之會令人無復貞白之操丁云女郎盛德豈顧老夫便令婦取琵琶彈之歌曰久聞欣重名今遇方山亭肌體雖朽老亦足悅人情放琵琶上膝抱頭又歌曰女形雖薄賤願得欣作壻繾綣覯良宵千載結同契聲氣婉媚令人絶倒便令滅火共展好情比曉忽不見吏云此亭舊有妖魅富陽王氏宋元嘉初富陽人姓王于窮瀆中作蟹斷旦往視之見一材長二尺許在斷中而斷裂開蟹都出盡乃修治斷出材岸上明往視之材復在斷中斷敗如前王又治斷出材晨視所見如初王疑此材妖異乃取內蟹籠中束頭擔歸云至家當斧斫然之未至家三里聞籠中窸窣動轉頭見向材頭變成一物人面猴身一手一足語王曰我性嗜蟹比日實入水破君蟹斷入斷食蟹相負已爾望君見恕開籠出我我是山神當相祐助并令斷大得蟹王曰汝犯暴人前后非一罪自應死此物懇告苦請乞放王回顧不應物曰君何名我欲知之頻問不已王遂不答去家轉近物曰既不放我又不告我何姓名當復何計但應就死耳王至家熾火焚之后寂然無復異土俗謂之山猱云知人姓名則能中傷人所以勤勤問王欲害人自免樂遐元嘉九年南陽樂遐嘗在內坐忽聞空中有人呼其夫婦名甚急半夜乃止殊自驚懼后數日婦屋后還忽舉體衣服悉是血未一月夫婦相繼病卒劉斌劉斌在吳郡時婁縣有一女忽夜乘風雨恍恍至郡城內自覺去家正一炊頃衣不沾濡曉在門上求通言我天使也府君宜起延我當大富貴不爾必有凶禍劉問所來不自知后二十許日劉被誅王徵元嘉中交州刺史太原王徵始拜乘車出行聞其前錚錚有聲見一輛車當路而余人不見至州遂亡張仲舒元嘉十七年七月中晨夕間輒見門側有赤氣赫然后空中忽雨絳羅于其庭廣七八寸長五六寸皆以箋系之紙廣長亦與羅等紛紛甚駃仲舒惡而焚之信宿暴疾而死蕭思話蕭思話在清州常所用銅升覆在藥廚下忽于其下得二死雀思話歎曰升覆雀殯其不祥乎既而被系傅氏女北地傅尚書小女嘗拆荻作鼠以狡獪放地荻鼠忽能行徑入戶限土中又拆荻更作咒之云汝若為家怪者當更行不者不動放地便復行如前即掘限內覓入地數尺了無所見后諸女相繼喪亡郭仲産郭仲産宅在江陵枇杷寺南宋元嘉中起齊屋竹以為窗櫺竹遂漸生枝葉長數丈郁然成林仲産以為吉祥及孝建中被誅劉順宋大明中頓丘令劉順酒酣蚤入妾許眼晨起見榻上有一聚凝血如覆盆形劉是武人了不驚怪乃令作薺親自切血染薺食之棄其有余后十許載至元徽二年為王道隆所害王談大明中琅琊王談字思玄為南陽太守母喪去職寄郡城南設廬位于庭有一光大如鴨卵黃色分明從東來入廳事上俄頃又二枚續至其狀如前良久乃去自此夕夕來往或單至雙來久停則滅一夜或四五來如此十許日不見其年談二婢死明年弟亡談患疾至都而卒周登之周登之家在都宋明帝時統諸靈廟甚被恩寵母謝氏奉佛法泰始三年夏月暴雨有物形隱煙霧垂頭屬廳事前地頭如大赤馬飲庭中水登之驚駭謂是善神降之汲水益之飲百餘斗水竭乃去二年而謝氏亡后半歲而明帝崩登之自此事業衰敗黃尋后魏宣武帝景明年中海陵人黃尋先居家單貧忽風雨飛錢于其家后巨富錢至數萬其年被誅荊州人梁元帝天監元年荊州刑人殺了其人不僵首墮于地動口張目血如箭直上丈余然后如雨細下是歲荊州大旱與晉愍帝督運令史淳于伯同田騷南陽人梁末晚暮執弓箭從婦家還去余十里無伴畏懼遙望前路板頭有緋衣小兒急逐之及到問曰汝何村小兒小兒曰家在樹頭騷謂欺己謂之曰吾長者與爾童稚共語何為輕薄見報更行百許步至板頭道邊有極大樹小兒徑上樹狀如猿猴心以為異乃張弓繞樹覓見一物如幡長數丈高而滅至家困病幾死鄧差梁鄧差南郡臨沮人于麥城耕地得古銅數斛因此大富行值雨止于皂莢樹下遇一老公謂差曰君雖富明年舍神若出方衰耗之后君必因火味獲殃差以為此叟假稱邪術妄求施與都不采録明年宅內見一物青黑色似鱉而非可長二尺許自出自入或隱或見伸縮舉頭狗見輒圍繞共吠吠則縮頭家人亦不敢觸如此者百餘日后有人種作黃昏從外入見之謂是蚖乃以鐮砟之傷其足血曳腳入稻積下因失所在自后遭火兒侄喪亡官役連及差又于道逢估人先不相識道邊相對共食羅布甘美味皆珍味二人呼差同飲謂曰觀君二人游行商估勢在不丰何為頓爾珍差美食估人曰寸光可惜人生在世終止為身口耳一朝病死安能復進甘美乎終不如臨沮鄧生平生不用為守錢奴耳差亦不告姓名默然歸至家宰鵝以自食動筋咬骨哽其喉病而死司馬申陳后主時幸臣司馬申任右衛將軍常譖毀朝臣后于尚書省晝寢有鳥啄其口流血及席時論以譖毀之效而陳漸微之征后主竟降段暉字長祚有一童子辭歸從暉請馬暉戲作木馬與之童子謂暉曰吾泰山府君子謝子厚贈言終乘木馬騰空而去
