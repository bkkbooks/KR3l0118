body:
  text: 聰明花樹聰明花樹李正字弘卿學道見東王父教之十七年后正身死家人埋之于武陵而冢上生花樹高七尺有人遇見此花皆聰明文章盛相思木晉戰國時衛國苦秦之難有民從征戍秦不返其妻思之而卒既葬冢上生木枝葉皆向夫所在而傾因謂之相思木廣川王廣川王去疾好聚無賴少年游獵罼弋無度國內冢藏一皆發掘爰猛說大父為廣川王中尉每諫王不聽病免歸家說王所發掘冢墓不可胜數其奇異者百數為劉向說十許事記之如左魏襄王冢以文石為槨高八尺許廣狹容三十人以手捫槨滑易如新中有石床石屏風宛然周正不見棺柩明器蹤跡但見床上玉唾盂一枚銅劍二枚金雜具皆如新王自取服之襄王冢以鐵灌其上穿鑿三日乃開黃氣如霧触人鼻目皆辛苦不可入以兵守之七日乃歇初至戶無扇鑰石床方四尺上有石幾左右各三石人立侍皆武冠帶劍复入一戶石扇有關鎖扣開見棺柩黑光照人刀斫不能入燒鋸截之乃漆雜兕革為棺厚數寸累積十余重力少不能開乃止复入一戶亦石扇開鑰得石床方六尺石屏風銅帳葉一具或在床上或在地下以幬帳糜朽而銅葉墮落床上石枕一枚床上塵埃朏朏甚高似是衣服床左右婦人各二十悉皆立侍或有執巾梳鏡鑷之象或有執盤奉食之形無余異物但有鐵鏡數百枚魏王子且渠冢甚淺狹無柩但有石床廣六尺長一丈石屏風床下悉是云母床上兩尸一男一女皆二十許俱東首裸臥無衣食肌膚顏色如生人鬢發齒牙爪不異生人王懼不敢侵還擁閉如舊袁盎冢以瓦為棺槨器物都無唯有銅鏡一枚晉靈公冢甚瑰壯四角皆以石為鷹犬捧燭石人男女四十余皆立侍棺器無复形兆尸猶不坏九竅中皆有金玉其余器物皆朽爛不可別唯玉蟾蜍一枚大如拳腹空容五合水光潤如新王取以成水書滴幽公冢甚高壯羡門既開皆是石堊撥除丈余乃得云母深尺所乃得百餘尸縱橫相枕皆不朽唯一男子余悉女子或坐或臥亦有立者衣服形色不異生人欒書冢棺柩明器朽爛無余有白狐兒見人惊走左右逐戟之莫能得傷其左腳夕王夢一丈夫鬢眉盡白來謂王曰何故傷吾腳仍以杖叩王左腳王覺腳腫痛生瘡至此不差袁安袁安父亡母使安以雞酒詣卜貢問葬地道逢三書生問安何之具以告書生曰吾知好葬地安以雞酒禮之畢告安地處云當葬此地世為貴公便與別數步顧視皆不見安疑是神人因葬其地遂登司徒子孫昌盛四世五公丁姬王莽秉政貶丁姬號開其槨戶火出炎四五丈吏卒以水沃滅乃得入燒燔冢中器物公卿遣子弟及諸生四夷十余萬人操持作具助將作掘平恭王母傅太后墳及丁姬冢二旬皆平又周棘其處以為世戒云時有群燕數千銜土投丁姬穿中今其墳冢巍然尚秀隅阿相承列郭數周面開重門渾子昆明池中有冢俗號渾子相傳昔居民有子名渾子者嘗違父語若東則北若水則火父病且死欲葬于高陵之處矯謂曰我死必葬于水中及死渾子泣曰我今日不可更違父命遂葬于此盛弘之荊洲記云固城臨洱水水之北岸有五女墩西漢時有人葬洱北墓將為所坏其人有五女共創此墩以防墓又云一女嫁陰縣佷子家資萬金自少及長不從父言臨死經意欲葬山上恐子不從乃言必葬我渚下磧上佷子曰我由來不取父教今當從此一語遂盡散家財作石冢以土繞之遂成一洲長數百步元康中始為水所坏今余石如半榻許數百枚聚在水中王粲魏武北征蹋頓升岭眺矚見一崗不生百草王粲曰必是古冢此人在世服生礜石死而石氣蒸出外故卉木焦滅即令鑿看果大墓有礜石滿塋一說粲在荊州從劉表登鄣山而見此異曹武之平烏桓粲猶在江南此言為當孫鐘孫鐘家于富春幼失父事母至孝遭歲荒以種瓜自業忽有三少年詣鐘乞瓜鐘厚待之三人謂曰此山下善可葬之當出天子君下山百許步顧見我去即可葬處也鐘去三四十步便反顧見三人成白鶴飛去鐘記之后死葬其地地在縣城東冢上常有光怪云五色氣上屬天及堅母孕堅夢腸出繞吳閶門以告鄰母曰安知非吉祥吳綱魏黃初末吳人發吳芮冢取木于縣立孫堅廟見芮尸容貌衣服并如故吳平后預發冢人于壽春見南蠻校尉吳綱曰君形貌何類長沙王吳芮乎但君微短耳綱瞿然曰是先祖也自芮卒至冢開四百年至見綱又四十余年矣陸東美吳黃龍年中吳都海鹽有陸東美妻朱氏亦有容止夫妻相重寸步不相離時人號為比肩人夫婦云皆比翼恐不能佳也后妻卒東美不食求死家人哀之乃合葬未一歲冢上生梓樹同根二身相抱而合成一樹每有雙鴻常宿于上孫權聞之嗟歎封其里曰比肩墓又曰雙梓后子弘與妻張氏雖無異亦相愛慕吳人又呼為小比肩潘章潘章少有美容儀時人競慕之楚國王仲先聞其美名故來求為友章許之因愿同學一見相愛情若夫婦便同衾共枕交好無已后同死而家人哀之因合葬于羅浮山冢上忽生一樹柯條枝葉無不相抱時人異之號為共枕樹胡邕吳國胡邕為人好色娶妻張氏怜之不舍后卒邕亦亡家人便殯于后園中三年取葬見冢上化作二人常見抱如臥時人競笑之戴熙武昌戴熙家道貧陋墓在樊山南占者云有王氣桓溫仗鋮西下停武昌鑿之得一物大如水牛青色無頭腳時亦動搖砍刺不陷乃縱著江中得水便有聲如雷響發長川熙后嗣淪胥殆盡王伯陽王伯陽家在京口宅東有一冢傳云是魯蕭墓伯陽婦郗鑒兄女也喪王平墓以葬后數日伯陽晝坐廳上見一貴人乘肩輿侍人數百人馬絡繹遙來謂曰身是魯子敬君何故毀吾冢因目左右牽下床以刀鐶擊之數百而去絕而复蘇被擊處皆發疽潰數日而死一說伯陽亡其子營墓得二漆棺移置南岡夜夢肅怒云當殺汝父尋复夢見伯陽云魯肅與吾爭墓吾日夜不得安后于靈座褥上見數升血疑魯肅之故也墓今在長廣橋東一里羊祜晉有相羊祜墓者云后應出受命君祜惡其言遂掘斷以坏其相相者云墓勢雖坏猶應出折臂三公俄而祜墮馬折臂果至三公閭丘南陽范陽粉水口有一墓石虎石柱號文將軍冢晉安帝隆安中閭丘南陽將葬婦于墓側是夕從者數十人皆夢云何故危人以自安覺說之人皆夢同雖心惡之恥為夢回及葬但鳴鼓角為聲勢聞墓上亦有鼓角及鎧甲聲轉近及至墓死于墓門者三人既葬之后閭丘為楊佺期所誅族人皆為以文將軍之祟古層冢在武陵縣北一十五里二百步周回五十步高三丈亡其姓名古老相傳云昔有開者見銅人數十枚張目視俄聞冢中擊鼓大叫竟不敢進后看冢土還合如初隋王齊隋王嘗率佐使上樊姬墓酣宴其夕夢樊姬怒曰獨不念封崇之義奈何溷我當令爾知詰旦王被病使巫覡引過設祀積日方愈楚王冢南齊襄陽盜發楚王冢獲玉屐玉屏風青絲編簡盜以火自照王僧虔見十余簡曰是科斗書考工記周官闕文舒綽東陽人稽古博文尤以陰陽留意善相冢吏部侍郎楊恭仁欲改葬其親求善圖墓者五六人并稱海內名手停于宅共論藝互相是非恭仁莫知孰是乃遣微解者馳往京師于欲葬之原取所擬之地四處各作歷記其方面高下形勢各取一斗土并歷封之恭仁隱歷出土令諸生相之取殊不同言其行勢與歷又相乖背綽乃定一土堪葬操筆作歷言其四方形勢與恭仁歷無尺寸之差諸生雅相推服各賜絹十匹遣之綽曰此所擬處深五尺之外有五谷若得一谷即是福地公侯世世不絕恭仁即將綽向京令人掘深七尺得一穴如五石瓮大有粟七八斗此地經為粟田蟻運粟下入此穴當時朝野之士以綽為聖葬竟賜細馬一匹物二百段綽之妙能今古無比李德林隋內史令李德林深州饒陽人也使其子卜葬于饒陽城東遷厝其父母遂問之其地奚若曰卜兆云葬后當出八公其地東村西郭南道北堤林曰村名何答曰五公林曰唯有三公在此其命也知复云何遂葬之子伯藥孫安期并襲安平公至曾孫與徐敬業反公遂絕郝處俊唐郝處俊為侍中死葬訖有一書生過其墓歎曰葬壓龍角其棺必斫后其孫象賢坐不道斫俊棺焚其尸俊發根入腦骨皮托毛著骷髏亦是奇毛異骨貴相人也徐勣唐英公徐勣初卜葬繇曰朱雀和鳴子孫盛榮張景藏聞之私謂人曰所占者過也此所謂朱雀悲哀棺中見灰后孫敬業揚州反弟敬貞答款曰敬業初生時于蓐下掘得一龜云大貴之象英公今秘而不言果有大變之象則天怒斫英公棺焚其尸灰之應也韋安石神龍中相地者僧泓師與韋安石善嘗語安石曰貧道近于鳳栖原見一地可二十余畝有龍起伏形勢葬于此地者必累世為台座安石曰老夫有別業在城南待閒時陪師往詣地所問其价幾何同游林泉又是高興安石妻聞謂曰公為天子大臣泓師通陰陽術數奈何一旦潛游郊野又買墓地恐禍生不測矣安石懼遂止泓歎曰國夫人識達先見非貧道所及公若要買地不必躬親夫人曰欲得了義兼地不要買安石曰舍弟縚有中殤男未葬便與買此地泓曰如賢弟得此地即不得將相位止列卿已而縚竟買其地葬中殤男縚后為太常卿禮儀使卒官源乾曜泓師自東洛回言于張說缺門道左有地甚善公試請假三兩日有百僚至者貧道于帘間視其相甚貴者付此地說如其言請假兩日朝士畢集泓云或已貴大福不再或不稱此地反以為禍及監察御史源乾曜至泓謂說曰此人貴與公等試召之方便授以此說召乾曜與語源云乾曜大塋在缺門先人尚未啟今請告歸洛赴先遠之期故來拜辭說具述泓言必同行尤佳源辭以家貧不辦此言不敢煩師同行后泓复經缺門見其地已為源氏墓矣回謂說曰天贊源氏者合洼處本高今則洼矣合高處本洼今則高矣其安墳及山門角缺之所皆作者問其价乃賒買耳問其卜葬者村夫耳問其術乃憑下俚斗書耳其制度一一自然如此源氏子大貴矣乾曜自京尹拜相為侍中近二十年楊知春開元中忽相傳有僵人在地一千年因墓崩僵人复生不食五谷飲水吸風而已時人呼為地仙者或有呼為妄者或多知地下金玉積聚焉好行吳楚齊魯間有二賊乘僵人言乃結凶徒十輩于濠壽開發墓至盛唐縣界發一冢時呼為白茅冢發一丈其冢有四房閣東房皆兵器弓矢槍刃之類悉備南房皆繒綵中奩隔皆錦綺上有牌云周夷王所賜錦三百端下一隔皆金玉器物西房皆漆器其新如昨北房有玉棺中有玉女儼然如生綠發稠直皓齒編貝穠纖修短中度若素畫焉衣紫帔繡襪珠履新香可愛以手循之體如暖焉玉棺之前有一銀樽滿凶徒競飲之甘芳如人間上樽之味各取其錦彩寶物玉女左手無名指有玉環賊爭脫之一賊楊知春者曰何必取此諸寶已不少久不可脫競以刀斷其指指中出血如赤豆汁知春曰大不仁有物不能贖卒斷其指痛哉眾賊出冢以知春為詐共欲殺之一時舉刀皆不相識九人自相斫俱死知春獲存遂卻送所掠物于冢中相以土瘞之而去知春詣官自陳其狀官以軍人二十余輩修复复尋討銘志終不能得唐堯臣張師覽善卜冢弟子王景超傳其業開元中唐堯臣卒于鄭州師覽使景超為定葬地葬后唐氏六畜等皆能言罵云何物虫狗葬我著如此地家人惶懼遽移其墓怪遂絕陳思膺本名聿修福州龍平人也少居鄉里以博學為志開元中有客求宿聿修奇其客厚待之明日將去乃曰吾識地理思有以報遙見此州上里地形貴不可言葬之必福昆嗣聿修欣然同詣其處視之客曰若葬此可世世為郡守又指一處曰若用此可一世為都督聿修謝之居數載喪親遂以所指都督地葬焉他日拜墓忽見其地生金筍甚眾遂采而歸再至金筍又生及服闋所獲多矣因攜入京以計行賂以所業繼之頗致聞達后有宗人名思膺者以前任誥牒與因易名干執政久之遂除桂州都督今壁記具列其名亦有子孫仕本郡者
