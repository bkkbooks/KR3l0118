body:
  text: 趙高趙高秦王子嬰常寢於望夷宮夜夢有人身長十丈鬢髮絶偉納玉舄而乘丹車駕朱馬至宮門云欲見秦王嬰閽者許進焉子嬰乃與之言謂嬰曰豫是天使也從沙丘來天下將亂當有欲誅暴者翌日乃起子嬰既疑趙高因囚高於咸陽獄納高於井中七日不死更以鑊煮之亦七日不沸戮之子嬰問獄吏曰高其神乎獄吏曰初囚高之時見高懷有一青丸大如雀卵時方士説云趙高先世受韓衆丹法受此丹者冬日坐於冰夏日臥於爐上不覺寒熱也及高戮子嬰棄尸於九逵之路泣送者千家咸見一青雀從高尸中出直飛入雲九轉之驗信於是乎出王子年拾遺記董仲君漢武帝嬖李夫人及夫人死後帝欲見之乃詔董仲君與之語曰朕思李氏其可得見乎仲君曰可遠見而不可同於帷席帝曰一見足矣可致之仲君曰黑河之北有對野之都也出潛英之石其色青質輕如毛羽寒盛則石溫夏盛則石冷刻之為人像神語不異真人使此石像往則夫人至矣此石人能傳譯人語有聲無氣故知神異也帝曰此石可得乎仲君曰願得樓船百艘巨力千人能浮水登木者皆使明於道術不死之藥乃至暗海經十年而還昔之去人或升雲不歸或托形假死獲反者四五人得此石即令工人依先圖刻作李夫人形俄而成置於輕紗幕中婉若生時帝大悅問仲君曰可得近乎仲君曰譬如中宵忽夢而晝可得親近乎此石毒特宜近望不可迫也勿輕萬乘之尊惑此精魅也帝乃從其諫見夫人畢仲君使人舂此石人為九段不復思夢乃築夢靈臺時祀之出王子年拾遺記葛玄字孝先從左元放受九丹金液仙經未及合作常服餌術尤長於治病鬼魅皆見形或遣或殺能絶穀連年不飢能積薪烈火而坐其上薪盡而衣冠不灼飲酒一斛便入深泉澗中臥酒解乃出身不濡濕玄備覽五經又好談論好事少年數十人從玄遊學嘗船行見器中藏書札符數十枚因問此符之驗能為何事可得見否玄曰符亦何所為乎即取一符投江中流而下玄曰何如客曰吾投之亦能爾玄又取一符投江中自流而下至投江中句原闕據明鈔本補逆流而上曰何如客曰異矣又取一符投江中停立不動須臾下符上上符下三符合一處玄乃取之又江邊有一洗衣女玄謂諸少年曰吾為卿等走此女何如客曰善乃投一符於水中女便驚走數里許不止玄曰可以使止矣復以一符投水中女即止還人問女何怖而走答曰吾自不知何故也玄常過主人主人病祭祀道精精精字原闕據明鈔本補人使玄飲酒精人言語不遜玄大怒曰姦鬼敢爾敕五伯曳精人縛柱鞭脊即見如有人牽精人出者至庭抱柱解衣投地但聞鞭聲血出流漓精人故作鬼語乞命玄曰赦汝死罪汝能令生人病愈否精人曰能玄曰與汝三日期病者不愈當治汝精人乃見放玄嘗行過廟此神常使往來之人未至百步乃下騎乘中有大樹數十株上有衆鳥莫敢犯之玄乘車過不下須臾有大風回逐玄車塵埃漫天從者皆辟易玄乃大怒曰小邪敢爾即舉手止風風便止玄還以符投廟中樹上鳥皆墮地而死後數日廟樹盛夏皆枯尋廟屋火起焚燒悉盡玄見買魚者在水邊玄謂魚主曰欲煩此魚至何伯處可乎魚人曰魚已死矣何能為玄曰無苦也乃以魚與玄玄以丹書紙納魚腹擲魚水中俄頃魚還躍上岸吐墨書青色如大葉而飛去玄常有賓後來者出迎之坐上又有一玄與客語迎送亦然時天寒玄謂客曰貧居不能人人得爐火請作火共使得暖玄因張口吐氣赫然火出須臾滿屋客盡得如在日中亦不甚熱諸書生請玄作可以戲者玄時患熱方仰臥使人以粉粉身未及結衣答曰熱甚不能起作戲玄因徐徐以腹揩屋棟數十過還復床上及下冉冉如雲氣腹粉著屋棟連日猶在玄方與客對食食畢漱口口中飯盡成大蜂數百頭飛行作聲良久張口群蜂還飛入口中玄嚼之故是飯也玄手拍床蝦蟆及諸蟲飛鳥燕雀魚鱉之屬使之舞皆應絃節如人玄止之即止玄冬中能為客設生瓜夏致冰雪又能取數十錢使人散投井中玄徐徐以器於上呼錢出於是一一飛從井中出悉入器中玄為客致酒無人傳杯杯自至人前或飲不盡杯亦不去畫流水即為逆流十丈餘于時有一道士頗能治病從中國來欺人言我數百歲玄知其誑後會衆坐玄謂所親曰欲知此公年否所親曰善忽有人從天上下舉座矚目良久集地著朱衣進賢冠入至此道士前曰天帝詔問公之定年幾許而欺誑百姓道士大怖下床長跪答曰無狀實年七十三玄因撫手大笑忽然失朱衣所在道士大慚遂不知所之吳大帝請玄相見欲加榮位玄不聽求去不得以客待之常共遊宴坐上見道間人民請雨帝曰百姓請雨安可得乎玄曰易得耳即便書符著社中一時之間天地晦冥大雨流注中庭可平地水尺餘帝曰水寧可使有魚乎玄曰可復書符水中須臾有大魚百許頭亦各長一二尺走水中帝曰可食乎玄曰可遂使取治之乃真魚也常從帝行舟遇大風百官船無大小多濡沒玄船亦淪失所在帝嘆曰葛公有道亦不能免此乎乃登四望山使人船鉤船沒已經宿忽見玄從水上來既至尚有酒色謝帝曰昨因侍從而伍子胥見強牽過卒不得捨去煩勞至尊暴露水次玄每行卒逢所親要於道間樹下折草刺樹以杯器盛之汁流如泉杯滿即止飲之皆如好酒又取土石草木以下酒入口皆是鹿脯其所刺樹以杯承之杯至即汁出杯滿即止他人取之終不為出也或有請玄玄意不欲往主人強之不得已隨去行數百步玄腹痛止而臥地須臾死舉頭頭斷舉四肢四肢斷更臭爛蟲生不可復近請之者遽走告玄家更見玄故在堂上此人亦不敢言之走還向玄死處已失玄尸所在與人俱行能令去地三四尺仍並而步又玄遊會稽有賈人從中國過神廟廟神使主簿教語賈人曰欲附一封書與葛公可為致之主簿因以函書擲賈人船頭如釘著不可取及達會稽即以報玄玄自取之即得語弟子張大言曰吾為天子所逼留不遑作大藥今當尸解八月十三日日中時當發至期玄衣冠入室臥而氣絶其色不變弟子燒香守之三日夜半忽大風起發屋折木聲如雷炬滅良久風止忽失玄所在但見委衣床上帶無解者旦問鄰家鄰家人言了無大風風止止一宅籬落樹木皆敗拆也出神仙傳竇玄德河南人也貞觀中任都水使者時年五十七奉使江西發路上船有一人附載竇公每食余恆啖附載者如是數日欲至揚州附載辭去公問曰何速答曰某是司命使者因竇都水往揚州司命遣某追之公曰都水即是某也何不早言答曰某雖追公公命合終於此地此行未至不可漏泄可以隨公至此在路蒙公余食常愧於懷意望免公此難以報長者深惠公曰可禳否答曰頗聞道士王知遠乎公曰聞之使者曰今見居揚州府幽冥間事甚機密幸勿泄之但某在船日恆賴公賜食懷愧甚深今不拯拯原作極據明鈔本改公遂成負德王尊師行業幽顯衆共尊敬其所施為人天欽尚與人章醮有厄難者天曹皆救公可屈節咨請得度斯難明晚當奉報滅否公既奉敕初到揚州長史已下諸官皆來迎公未論事但問官僚見王尊師乎於時諸官莫測其意催遣迎之須臾王尊師至屏左右具陳情事師曰比內修行正法至干祭醮之業皆所不為公銜命既重勉勵為作法之效驗未敢懸知於是命侍童寫章登壇拜奏明晚使者來報公曰不免矣公又求哀甚切使者曰事已如此更令奏之明晚當報仍買好白紙作錢於淨處咨白天曹吏使即燒卻若不燒還不得用不爾曹司稽留行更得罪公然之又白師師甚不悅公曰惟命是遵願垂拯濟師哀之又奏明晚使者來還報云不免公苦問其故初不肯言後俯首答曰道家章奏猶人間上章表耳前上之章有字失體次上之章復草書仍乞二字表奏人主猶須整肅況天尊大道其可忽諸所上之章咸被棄擲既不聞徹有何濟乎公又重使令其請託兼具以事白師師甚悅云審爾乎比竊疑章表符奏繆妄而已如公所言驗若是乎乃於壇上取所奏之章見字誤書草一如公言師云今奏之章貧道自寫再三合格如法奏之明旦使者報公云事已諧矣師曰此更延十二年公謂親表曰比見道家法未嘗信之今蒙濟拔其驗如茲從今以往請終身事之便就清都觀尹尊師受法籙舉家奉道春秋六十九而卒出玄門靈妙記
