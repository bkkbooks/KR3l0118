body:
  text: 牟穎牟穎洛陽人牟穎少年時因醉誤出郊野夜半方醒息于路旁見一發露骸骨穎甚傷念之達曙躬身掩埋其夕夢一少年可二十已來衣白練衣仗一劍拜穎曰我強寇耳平生咨意殺害作不平事近與同輩爭遂為所害埋于路旁久經風雨所以發露蒙君复藏我故來謝君我生為凶勇人死亦為凶勇鬼若能容我栖托但君每夜微奠祭我我常應君指使我既得托于君不至饑渴足得令君所求徇意也穎夢中許之及覺乃試設祭饗暗以祀禱祈夜又夢鬼曰我已托君矣君每欲使我即呼赤丁子一聲輕言其事我必應聲而至也穎遂每潛告令竊盜盜人之財物無不應聲遂意后致富有金寶一日穎見鄰家婦有美色之乃呼赤丁子令竊焉鄰婦至夜半忽至外逾垣而至穎惊起款曲問其所由來婦曰我本無心忽夜被一人擒我至君室忽如夢覺我亦不知何怪也不知何計卻得還家悲泣不已穎甚閔之潛留數日而其婦家人求訪甚切至于告官穎知之乃與婦人詐謀令婦人出別墅卻自歸言不知被何妖精取去今卻得回婦人至家后再每三夜或五夜依前被一人取至穎家不至曉即卻送歸經一年家人皆不覺婦人深怪穎有此妖術后因至切問于穎曰若不白我我必自發此事穎遂具述其實鄰婦遂告于家人共圖此患家人乃密請一道流洁淨作禁法以伺之赤丁子方夜至其門見符菉甚多卻反白于穎曰彼以正法拒我但力微耳與君力爭當惡取此婦人此來必須不放回也言訖复去須臾鄰家飄驟風起一宅俱黑色但是符菉禁法之物一時如掃复失婦人至曙其夫遂去官同來穎宅擒捉穎乃攜此婦人逃不知所之游氏子許都城西之北陬有趙將軍宅主父既沒子孫流移其處遂凶莫敢居者親近乃榜于里門曰有居得者便相奉乾符初許有游氏子者性剛悍拳捷過人見榜曰仆猛士也縱奇妖異鬼必有以制之時盛夏既夕攜劍而入室宇深邃前庭廣袤游氏子設簟庭中絺綌而坐一鼓盡聞寂無惊游氏子倦乃枕劍面堂而臥再鼓將半忽聽軋然開后門聲蜡炬齊列有役夫數十于堂中洒掃辟前軒張朱帘繡幕陳筵席寶器異香馥于檐楹游子心謂此小魅耳未欲迫之將觀其終少頃執樂器紆朱紫者數十輩自東廂升階歌舞妓數十輩自後堂出入于前堂紫衣者居前朱綠衣白衣者次之亦二十許人言笑自若揖讓而坐于是絲竹合奏飛觴舉白歌舞間作游氏子欲前突擒其渠魁將起乃覺髀間為物所壓冷且重不能興欲大叫口哆而不能聲但觀堂上歡洽直至嚴鼓席方散燈火既滅寂爾如初游氏子駭汗心悸匍伏而出至里門良久方能語其宅后卒無敢居者李云前南鄭縣尉李云于長安求納一姬其母未許云曰予誓不婚乃許之號姬曰楚賓數年后姬卒卒后經歲遂婚前南鄭令沈氏女及婚日云及浴于淨室見楚賓執一藥來徑前謂云曰誓余不婚今又與沈家作女婚無物奉贈君香一貼以資浴湯瀉藥末入浴斛中釵子攪水訖而去云甚覺不安困羸不能出浴遂卒肢體如棉筋骨并散鄭總進士鄭總以妾病欲不赴舉妾曰不可為一婦人而廢舉固請之總遂入京其春下第東歸及家妾年既葬旬月后夜深偶未寢聞室外有人行聲開戶觀之乃亡妾也召入室而坐問其所要但求好茶總自烹與之啜訖總以小兒女也睡欲呼與相見妾曰不可渠年小恐惊之言訖辭去才出戶不見王紹明經王紹夜深讀書有人隔窗借筆紹借之于窗上題詩曰何人窗下讀書聲南斗闌干北斗橫千里思家歸不得春風腸斷石頭城詩訖寂然無聲乃知非人也王鮪鳳翔少尹王鮪禮部侍郎凝之叔父也年十四五與童兒輩戲于果園竹林下見二枯首為糞壤所沒乃令小仆擇淨地瘞之祭以酒饌其后數夕陰晦忽聞窗外窸窣有聲良久問之云某等受君深恩免在蕪穢未知所酬聊愿驅策爾后凡有吉凶肸饗間必來報如此數年遂與靈物通徹崔珙為度支使雅知于鮪一夕留飲家釀酒酣稍歡云有妓善歌者令召之良久不至珙自入視之云理妝才罷忽病心痛請飲湯而出珙复坐鮪具言歌者儀貌珙怪問之云適見一人著短綾緋衣控馬而去語未畢家仆報中惡救不返矣珙甚悲之鮪密言有一事或可活之須得白牛頭及酒一斛因召左右試令求覓有度支所由甚干事以善价取之不逾時而至鮪令扶歌者置于淨室榻上前以大盆盛酒橫取板安牛頭于其上設席焚香密封其戶且誡曰專伺之曉鼓一動聞牛吼當急開戶可以活矣鮪遂去禁鼓忽鳴果聞牛吼開戶視之歌者微喘盆酒悉干牛怒目出于外數日方能言云其夕治汝既畢有人促召出門乘馬而行約數里見室宇華麗開筵張樂四座皆朱紫少年見歌者至大喜致于妓席歡笑方洽忽聞有人大呼聲振庭廡座者皆失色相視妓樂俱罷俄見牛頭人長丈余執戟徑趨前無不狼狽而走唯歌者在焉牛頭引于階前背負而出行十數步忽覺臥于室內珙后密詢其事鮪終不言李戴仁江河多倀鬼往往呼人姓名應之者必溺乃死魂者誘之也李戴仁嘗維舟于枝江縣曲浦中月色皎然忽見一嫗一男子出水面四顧失聲云此有生人遽馳水面若履平地登岸而去當陽令蘇汭居江陵嘗夜歸月明中見一美人被發所著裾裾殆似水濕汭戲云非江倀耶婦人怒曰喚我作鬼奔而逐之汭走遇更巡方止見婦卻返所來之路劉璪漢江北鄧州界地名穴口本無鎮戍有小河南流入于漢久為沙擁水道甚隘前江陵令劉璪丙子歲往彼州訪親知至穴口宿舊知韓氏家家人曰鄰村張家新婦卒來三日適來卻活主人暫往省之至夜韓家歸云張婦為側近廟神召去見其中外親眷亡者咸在焉為廟神造軍頓無人作餅故令召來見廳上門外將士列坐言開穴口江水士卒踣沙手皆血流供頓畢乃放回鄉里未之信不久沙壖相次摧墊江路乃通李矩成汭鎮荊州有墊江縣令崔令與主簿李矩不協鄰于水火一旦群盜劫縣殺崔令賊過后矩入宅檢校有一廳子方避賊見矩以為與賊通明日言鎮將眾咸知矩與崔失歡頗疑之執送中州推問不伏遂解送江陵禁右廂獄廂吏速于具獄推吏常某言于判官范某曰李矩詆讕須栲究之范固不許常竟鍛煉以成之矩臨刑戒家人多燒紙筆訟于地下才一月常某暴亡后李矩主簿見身范見矩至曰某受判官深恩非感造次但冥府只要為證耳及妻子以誠祈之乞容旬日區分家事雖無痛苦飲食如常但困憊逾月而卒陶福蜀將陶福少年無賴偷狗屠牛后立功至郡守屯戍興元府之西縣暴得疾急命從人朱軍將詣府迎醫李令藹令藹與朱軍將連騎馳往至夜抵西縣近郭諸葛亮廟前見秉炬三對前導擁一人步行荷校摯縛眾人相從后有陶親叟抱衣裘而隨之令藹先未識陶福朱軍將指謂令藹曰此是我家太尉胡為如此逡巡恐悚亦疑是鬼曉至其營已聞家人哭聲向來執錄乃福之魂也巴川崔令合州巴川縣亂后官舍殘毀移居塞中稍可自固崔某為令嘗有健卒盜寨木令擒送鎮將斬之卒家先事壁山神卒死神乃與令家為祟或見形往來或空中詬罵擲火毀器錢帛衣服無敵遺失箱匣鎖閉如初其中衣服率皆剪碎求方術禳解都不能制令罷官還千里鬼亦隨之又日夕飲食與人無異一家承事不敢有怠費用甚多吏力將困忽一旦舉家聞大鳥鼓翼之聲止于屋久之空中大呼自稱大王曰汝比有災值我雍溪兄弟非理破除汝家活計損失財物作諸怪異計汝必甚畏之今已遣去矣汝災盡福生吾自來暫駐亦將不久且借天蓬龕子中居此天蓬樣极好借上天上傳寫一本三五日即送來數日后置天蓬于舍檐上自此日夕常在恒與主人語今大小誦詩賦作音樂一一隨聲唱之所誦文字或有謬誤必為改正其言多勸人為善亦令學氣術修道或云尋常乘鶴往來天上初邑中有群鶴現神云數內只有兩隻真鶴我所騎來其余皆常鳥矣又自云姓張每日飲食與人無異有女名錦繡娘及妻妾食物所費亦不少凡見善人君子即肯與言稍強暴之人即不與語亦云上天去忽有醉僧健卒三人來謁之言詞無度有所凌毀因不語僧去后徐謂人曰此僧食狗肉凶暴無良不欲共語人之所行善惡災福言無不中至于小名第行一一皆知細問之即以他語為對未知是何神也馮生遂寧有馮生見鬼知人吉凶穎川陳絢為武信軍留后而劉知俊代之捃其舊事馮謂絢曰劉公雖號元戎前無幢節殆不久乎幸勿憂也未逾歲而知俊被殺有林泳者閩人常謂其僚友曰安有生人而終日見鬼乎無聽其襖馮聞之對眾謂之曰君為宜多不克終蓋曾殺一女人為祟以公祿壽未盡莫致其便我能言其姓名公信之乎于是慚懼言誠于馮許為解其冤也
