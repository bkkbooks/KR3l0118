body:
  text: 羅元則羅元則歷陽羅元則嘗乘舟往廣陵道遇雨有一人求寄載元則引船載之察其似長者供待甚厚無他裝囊但有書函一枚元則竊異之夜與同臥旦至一村乃求暫下岸少頃當還君可駐船見待慎無發我函中書也許之乃下去須臾聞村中哭聲則知有異乃竊其書視之曰某日至某村當取某乙某村名良是元則名次在某下元則甚懼而鬼還責曰君何視我書函元則乃前自陳伏因乞哀甚苦鬼愍然謂君嘗負人否元則熟思之曰平生唯有奪同縣張明道十畝田遂至失業其人身已死矣鬼曰此人訴君耳元則泣曰父母年老惟恃元則一身幸見恩貸良久曰念君厚恩相載今捨去君當趨歸三年無出門此後可延十年耳即下船去元則歸家中歲餘其父使至田中收稻即固辭之父怒曰田家當自力乃欲偷安甘寢妄為妖辭耶將杖之元則不得已乃出門即見前鬼髡頭裸體背盡瘡爛前持曰吾為君至此又不能自保惜今既相逢不能相置元則曰捨我辭二親鬼許具以白父言訖奄然遂絶其父方痛恨之月餘亦卒李元平李元平者睦州刺史伯成之子以大曆五年客於東陽精舍讀書歲餘暮際忽有一美女服紅羅裙襦容色甚麗有青衣婢隨來入元平所居院他僧房中平悅而趨之問以所適及其姓氏青衣怒云素未相識遽爾見逼非所望王孫也元平初不酬對但求拜見須臾女從中出相見欣悅有如舊識歡言者久之謂元平曰所以來者亦欲見君論宿昔事我已非人君無懼乎元平心既相悅略無疑阻謂女曰任當言之僕亦何懼女云己大人昔任江州刺史君前生是江州門夫恆在君家長直雖生於貧賤而容止可悅我以因緣之故私與交通君才百日患霍亂沒故我不敢哭哀倍常情素持千手千眼菩薩呪所願後身各生貴家重為婚姻以朱筆塗君左股為志君試看之若有朱者我言驗矣元平自視如其言益信因留之宿久之情契既洽歡愜亦甚欲曙忽謂元平曰託生時至不得久留意甚恨恨言訖悲涕云後身父為今為縣令及我年十六當得方伯此時方合為婚姻未間幸無婚也然天命已定君雖欲婚亦不可得言訖訣去劉參唐建中二年江淮訛言有厲鬼自湖南來或曰毛鬼或曰毛人或曰棖不恆其稱而鬼變化無方人言鬼好食人心少女稚男全取之民恐懼多聚居夜烈火不敢寐持弓刀以備每鬼入一家萬家擊板及銅器為聲聲振天地人有狂懾而死者所在如此官禁不能息前兗州功曹劉參者舊業淮泗因家廣陵有男六人皆好勇劉氏率其子操弓矢夜守有數女閉堂內諸郎巡外夜半後天色暝晦忽聞堂中驚叫言鬼已在堂中諸郎駭既閉戶無因入救乃守窺之見一物方如牀毛鬣如蝟高三四尺四面有足轉走堂內旁又有鬼玄毛披體爪牙如劍把小女置毛牀上更擒次女事且迫矣諸郎壞壁而入以射毛牀毛牀走其鬼亦走須臾失鬼所在而毛牀東奔中鏃百數且不能走一人擒得抱其毛力扦之食頃俱墮河梁大呼曰我今抱得鬼鬼困急以火相救及以火照之但見抱橋柱耳劉子盡爪損小女遺於路居數日營中一卒夜見毛鬼飛馳屋上射之不可叫呼頗動衆明日伏罪以令百姓因而有盜竊託以妖妄既而自彌亦不知其然閻敬立興元元年朱泚亂長安有閻敬立為段秀實告密使潛途出鳳翔山夜欲抵太平館其館移十里舊館無人已久敬立誤入之但訝萊蕪鯁澀即有二皂衫人迎門而拜控轡至廳即問此館何以寂寞如是皂衫人對曰亦可住既坐亦如當館驛之禮須臾皂衫人通曰知館官前鳳州河池縣尉劉俶敬立見之問曰此館甚荒蕪何也對曰今天下榛莽非獨此館宮闕尚生荊棘矣敬立奇其言語論皆出人右俶乃云此館所由並散逃因指二皂衫人曰此皆某家崑崙奴一名道奴一名知遠權且應奉爾敬立因於燭下細目其奴皂衫下皆衣紫白衣面皆崑崙兼以白字印面分明信是俶家人也令覘廚中有三數婢供饌具甚忙信是無所由良久盤筵至食精敬立與俶同餐甚飽畜僕等皆如法乃寢敬立問俶曰緣倍程行馬瘦甚可別假一馬耶答曰小事耳至四更敬立命駕欲發俶又具饌亦如法俶處分知遠取西槽馬送大使至前館兼令道奴被東槽馬我餞送大使至上路須臾馬至敬立乃乘西槽馬而行俶亦行可二里俶即却回執別異於常館官別後數里敬立覺所借馬有人糞之穢俄而漸盛乃換己馬被馱而行四五里東方似明前館方有吏迎拜敬立驚曰吾才發館耳曰前館無人大使何以宿大訝及問所送僕馬俱已不見其所馱輜重已却回百餘步置路側至前館館吏曰昔有前官鳳州河池縣尉劉少府殯宮在彼館後園久已頽毀敬立却回驗之廢館更無物唯墻後有古殯宮東廠前有搭鞍木馬西側中有高腳木馬門前廢堠子二殯宮前有冥器數人漸覺喉中有生食氣須臾吐昨夜所食皆作杇爛氣如黃衣麴塵之色斯乃櫬中送亡人之食也童僕皆大吐三日方復舊崔書生博陵崔書生往長安永樂里先有舊業在渭南貞元中嘗因清明節歸渭南行至昭應北墟壠之間日已晚歇馬於古道左比百餘步見一女人靚粧華服穿越榛莽似失路於松柏間崔間步劘逼漸近乃以袂掩面而足趾跌蹶屢欲仆地崔使小童逼而覘之乃二八絶代之姝也遂令小童詰之曰日暮何無儔侶而愴惶於墟間耶默不對又令一童將所乘馬逐之更以僕馬奉送美人回顧意似微納崔乃僂而緩逐之以觀其近遠耳美人上馬一僕控之而前才數百步忽見女奴三數人哆口坌息踉蹌而謂女郎曰何處來數處求之不得擁馬行十餘步則長年青衣駐立以俟崔漸近乃拜謝崔曰郎君愍小娘失路脫驂僕以濟之今日色已暮邀郎君至莊可矣崔曰小娘子何忽獨步悽惶如此青衣曰因被酒興酣至此取北行一二里復到一樹林室屋甚盛桃李甚芳又有青衣七八人迎女郎而入少頃一青衣出傳主母命曰小外生因避醉逃席失路賴遇君子恤以僕馬不然日暮或值惡狼狐媚何所不加闔室戴佩且憩即當奉邀青衣數人更出候問如親戚之密頃之邀崔入宅既見乃命食食畢酒至從容敘言某王氏外生女麗艷精巧人間無雙欲侍君子巾櫛何如崔放逸者因酒拜謝於座側俄命生出實神仙也一住三日宴遊歡洽無不酣暢王氏常呼其姨曰玉姨玉姨好與崔生長行愛崔口脂合子玉姨輸則有玉環相酬崔輸且多先於長安買得合子六七枚半已輸玉姨崔亦贏玉指環二枚忽一日一家大驚曰有賊至其妻推崔生於後門出才出妻已不見但自於一穴中唯見芫花半落松風晚清黃萼紫英草露沾衣而已其贏玉指環猶在衣帶却省初見美人之路而行見童僕以鍬鍤發掘一塞穴已至櫬中見銘記曰原周趙王女玉姨之墓平生憐重王氏外生外生先歿後令與生同葬棺柩儼然開櫬中有一合合內有玉環六七枚崔比其睹者略無異矣又一合中有口脂合子數枚乃崔生輸者也崔生問僕人但見郎君入柏林尋覔不得方尋掘此穴果不誤也玉姨呼崔生奴僕為賊耳崔生感之急為掩瘞仍舊矣李則貞元初河南少尹李則卒未斂有一朱衣人來投刺申弔自稱蘇郎中既入哀慟尤甚俄頃尸起與之相搏家人子驚走出堂二人閉門毆擊及暮方息孝子乃敢入見二尸共臥在牀長短形狀姿貌鬚髯衣服一無差異於是聚族不能識遂同棺葬之陸憑吳郡陸憑少有志行神彩秀徹篤信謙讓家於湖州長城性悅山水一聞奇麗千里而往其縱逸未嘗寧居貞元乙丑三月遊永嘉遘疾而歿憑素與吳興沈萇友善萇夢憑顏色憔悴曰我遊至永嘉苦疾將困君為知我者願託家事萇悲之又敘舊歡宴語久之因述文章話虛無之事乃謂萇曰贈君浮雲詩一篇以寄其懷詩曰虛虛復空空瞬息天地中假合成此像吾亦非吾躬悲吟數四臨去曰憑船已發來明日午時到此執手而去及覺所記甚分明乃書而録之如期而憑喪船至萇撫孤而慟賻助倍禮詞人楊丹為之志具旌神感銘曰篤生府君美秀而文沒而不起寄音浮雲潯陽李生李生者貞元中舉進士下第歸潯陽途次商洛會漢南節使入覲為道騎所迫四顧唯蒼山萬重不知所適時日暮馬劣無僕徒見荊棘之深有殯宮在焉生遂投匿其中使既過方將前去又不知道途之幾何乃嘆曰吾之寄是豈非命哉於是止于殯宮中先拜而祝曰某家廬山下第南歸至此為府公前驅所迫既不得進又不得退是以來魂如有知願容一夕之安既而間望時風月澄霽雖郊原數里皆可洞見又有殯宮在百步外仿佛見一人漸近乃一女子粧飾嚴麗短不盡尺至殯宮南入穴中生且聽之聞其言曰金華夫人奉白崔女郎今夕風月好可以肆目時難再得願稍留念穴中應曰屬有貴客寄吾之舍吾不忍去乖一夕之歡不足甚矣其人乃去歸殯宮下生明日至逆旅問之有知者是博陵崔氏女也隨父為尉江南至此而歿遂藁葬焉生感之乃以酒膳致奠而去
