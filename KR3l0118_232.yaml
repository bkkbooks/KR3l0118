body:
  text: 符載符載唐符載文學武藝雙絶常畜一劍神光照夜為晝客游至淮浙遇巨商舟艦遭蛟作梗不克前進擲劍一揮血灑如雨舟舸安流而逝後遇寒食于人家裹匱粽粗如桶食刀不可用以此劍斷之訖其劍無光若頑鐵無所用矣古人云千鈞之弩不為鼷鼠發機其此劍之謂乎出芝田録破山劍近世有士人耕地得劍磨洗詣市有胡人求買初還一千纍上至百貫士人不可胡隨至其家愛玩不捨遂至百萬已剋明日持直取劍會夜佳月士人與其妻持劍共視笑云此亦何堪至是貴價庭中有搗帛石以劍指之石即中斷及明胡載錢至取劍視之嘆曰劍光已盡何得如此不復買士人詰之胡曰此是破山劍唯可一用吾欲持之以破寶山今光鋩頓盡疑有所觸士人夫妻悔恨向胡說其事胡以十千買之而去出廣異記揚州貢揚州舊貢江心鏡五月五日揚子江所鑄也或言無百煉者六七十煉則止易破難成往往有鳴者出國史補鄭雲逵唐鄭云逵少時得一劍鱗鋏星錍有時而吼常莊居橫膝玩之忽有一人從庭樹窣然而下紫衣朱幘被髮露劍而立黑氣周身狀如重霧鄭素有膽氣佯若不見其人因言我上界人知公有異劍願借一觀鄭謂曰此凡鐵耳君居上界豈藉此乎其人求之不已鄭伺便良久疾斫之不中刜墜黑氣著地數日方散出酉陽雜俎張存唐段成式其友人溫介云大曆中高郵百姓張存以踏藕為業嘗于陂中見旱藕稍大如臂遂盡力掘之深二丈大至合抱以不可窮乃斷之中得一劍長二尺色青無刃存不之寶邑人有知者以十束薪獲焉其藕無絲出酉陽雜俎百合花唐元和末海陵夏侯一庭前生百合花大如常數倍異之因發其下得臂匣十三重各匣一鏡至第七者光不觸照日光環一丈其餘規銅而已出酉陽雜俎浙右漁人唐李德裕長慶中廉問浙右會有漁人于秦淮垂機網下深處忽覺力重異于常時及斂就水次卒不獲一鱗但得古銅鏡可尺餘光浮于波際漁人取視之歷歷盡見五臟六腑血縈脈動竦駭氣魄因腕戰而墜漁人偶話于旁舍遂聞之于德裕盡周歲萬計窮索水底終不復得出松囪録元禎唐丞相元禎之鎮江夏也常秋夕登黃鶴樓遙望其江之湄有光若殘星焉遂令親信一人往視之其人棹小舟直詣光所乃釣船中也詢彼漁者云適獲一鯉光則無之其人乃攜鯉而來既登樓公命庖人剖之腹中得鏡二如錢大而面相合背則隱起雙龍雖小而鱗鬣爪角悉具精巧且澤常有光耀公寶之置臥內巾箱之中及相國甍鏡亦亡去出三水小牘李德裕唐太尉衛公李德裕嘗有老叟詣門引五六輩舁巨桑木請謁焉閽者不能拒之德裕異而出見叟曰此木某家寶之三世矣某今年耄感公之仁德且好奇異是以獻耳木中有奇寶若能者斷之必有所得洛邑有匠計其年齒已老或身已歿子孫亦當得其旨設非洛匠無能有斷之者公如其言訪于洛下匠已殂矣子隨使而至玩視良久曰可徐而斷之因解為二琵琶槽自然有白鴿羽翼嘴足巨細畢備匠料之微失厚薄不中一鴿少其翼公以形全者進之自留其一今猶在民間水部員外盧延讓見太尉之孫道其事出録異記甘露僧唐潤州甘露寺僧某者道行孤高名重江左李衛公德裕廉問日常與之游及罷任以方竹杖一枝留贈焉方竹出大宛國堅實而正方節眼鬚牙四面對出實衛公之所寶也及再鎮浙右其僧尚在公問曰前所奉竹杖無恙否僧對曰已規圓而漆之矣公嗟惋彌日出桂苑叢談令狐綯唐丞相令狐綯因話奇異之物自出鐵筒徑不及寸長四寸內取小卷書於日中視之乃九經並足其紙即蠟蒲團其文勻小首尾相似其精妙難以言述又傾其中復展看輕絹一匹度之四丈無少稱之才及半兩視之似非人世所按所字下脫佚甚多返報二字以下似系虔州刺史條之下半中脫裴嶽等四條返報太守懼追叟欲加刑叟曰乞使君不草草某知書褚輩只須此筆乞先見相公書跡然後創製太守示之叟笑曰若如此不消使君破三十錢者且更寄五十管如不稱甘鼎鑊之罪仍乞械繫俟使回期太守怒稍解且述叟事云睹相公神翰宜此等筆相府得之試染翰甚佳復書云筆大可意宜優賜匠人也太守喜以束帛贈叟而遣之出芝田録周邯唐周邯自蜀沿流嘗市得一奴名曰水精善於探水乃崑崙白水之屬也邯疑瞿塘之深命水精探之移時方出云其下有關不可越渡但得金珠而已每遇深水潭洞皆命奴探之多得寶物聞汴州八角井多有龍神時有異手出於井面欲使水精探之而猶豫未果其友邵澤有利劍常自神之解劍授奴遣之入井邯與澤於外以俟之悄然經久忽見水精高躍出井未及投岸有大金手拏之復入劍與奴自此並失邯悲其水精澤恨其寶劍終莫窮其事他日有人謂邯曰此井乃龍神所處水府靈司豈得輒犯可祭而謝之邯乃祭謝而去出原化記明鈔本作出録異記類說三十二引作出傳奇真陽觀新浙縣有真陽觀者即許真君弟子曾真人得道之所其常住有莊田頗為邑民侵據唐僖宗朝南平王鍾傳據江西八州之地時觀內因修元齊忽有一香爐自天而下其爐高三尺下有一盤盤內出蓮花一枝花有十二葉葉間隱出一物即十二屬也爐頂上有一仙人戴遠遊之冠著雲霞之衣相儀端妙左手搘頤右手垂膝坐一小磐石石上有花竹流水松檜之狀雕刊奇怪非人工所及也其初降時凡有邑民侵據本觀莊田即蜚於田所放大光明邑民驚懼即以其田還觀莫敢逗留南平王聞其靈異遣使取爐至江西供養忽一夕失爐尋之卻至舊觀道俗目之為瑞爐故丞相樂安公孫偓南遷路經此觀留題末句云好是步虛明月夜瑞爐蜚下醮壇前其瑞爐比如金色輕重不定尋常舉之只可及六七斤曾有一盜者竊之雖數人亦不能舉至今猶在本觀而不能復蜚矣出玉堂閒話陴湖漁者徐宿之界有陴湖周數百里兩州之莞薊萑葦逮芰荷之類賴以資之唐天祐中有漁者於網中獲鐵鏡亦不甚澀光猶可鑒面闊六五寸攜以歸家忽有一僧及門謂漁者曰君有異物可相示乎答曰無之僧曰聞君獲鐵鏡即其物也遂出之僧曰君但卻將往所得之處照之看有何睹如其言而往照見湖中無數甲兵漁者大駭復沉于水僧亦失之耆老相傳湖本陴州淪陷所致圖籍亦無載焉原闕出處明鈔本作出玉堂閒話文谷僞蜀詞人文谷好古之士也嘗詣中書舍人劉光祚喜曰今日方與二客為約看豫桃核杯文方欲問其由客至乃青城山道士劉雲次乃升宮客沈默也劉謂之曰文員外亦奇士因令取桃核杯出視之杯闊尺餘紋彩燦然真蟠桃之實也劉云豫少年時常游華嶽逢一道士以此核取瀑泉盥漱豫睹之驚駭道士笑曰爾意欲之耶即以半片見授豫寶之有年矣道士劉雲出一白石圓如雞子其上有文彩隱出如畫乃是二童子持節引仙人眉目毛髮冠履衣帔纖悉皆具云於麻姑洞石穴中得之沈默亦出一石闊一寸餘長二寸五分上隱出盤龍鱗角爪鬣無不周備云於巫峽山中得之文谷一日盡睹此奇物幸矣出野人閒話
