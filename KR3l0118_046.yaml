body:
  text: 白幽求白幽求唐真元十一年秀才白幽求頻年下第其年失志後乃從新羅王子過海於大謝公島夜遭風與徒侶數十人為風所飄南馳兩日兩夜不知幾千萬里風稍定徐行見有山林乃整棹望之及前到山高萬仞南面半腹有城壁臺閣門宇甚壯麗維舟而升至城一二里皆龍虎列坐於道兩邊見幽求乃耽耽而視幽求幽求進路甚恐懼欲求從者失聲倣徨次於大樹枝為風相磨如人言誦詩聲幽求諦聽之乃曰玉幢亘碧虛此乃真人居徘徊仍未進邪省猶難除幽求猶疑未敢前俄有朱衣人自城門而出傳勑曰西嶽真君來遊諸龍虎皆俯伏曰未到幽求因趨走前見朱衣人不顧而入幽求進退不得左右諸龍虎時時目幽求盤旋次門中數十人出龍虎奔走人皆乘之下山幽求亦隨之至維舟處諸騎龍虎人皆履海面而行須臾沒於遠碧中幽求未知所適舟中具饌次忽見從西旗節隊伍僅千人鸞鶴青鳥飛引於路騎龍控虎乘龜乘魚有乘朱鬣馬人衣紫雲日月衣上張翠蓋如風而至幽求但俯伏而已乃入城門幽求又隨覘之諸龍虎等依前列位與樹木花藥鳥雀等皆應節盤回如舞幽求身亦不覺足之蹈之食頃朱衣人持一牒出謂龍虎曰使水府真君龍虎未前朱衣人乃顧幽求授牒幽求未知所適朱衣曰使水府以手指之幽求隨指而身如乘風下山入海底雖入水而不知為水朦朧如日中行亦有樹木花卉觸之珊珊然有聲須臾至一城宮室甚偉門人驚顧俯伏於路俄而有數十人皆龍頭鱗身執旗仗引幽求入水府真君於殿下北面授符牒拜起乃出門已有龍虎騎從儼然遂行瞬息到舊所幽求至門又不敢入雖未食亦不覺餒少頃有覔水府使者幽求應唯而入殿前拜引於西廊下接諸使下坐飯食非人間之味徐問諸使中此何處也對曰諸真君遊春臺也主人是東嶽真君春夏秋冬各有位各在諸方主人亦隨地分也其殿東廊下列玉女數百人奏樂白鶴孔雀皆舉翅動足更應玄歌日晚乃出殿於山東西為迎月殿又有一宮觀望日至申時明月出矣諸真君各為迎月詩其一真君詩曰日落煙水黯驪珠色豈昏寒光射萬里霜縞遍千門又一真君詩曰玉魄東方開嫦娥逐影來洗心兼滌目光影遊春臺又一真君詩曰清波滔碧烏天藏黯黮連二儀不辨處忽吐清光圓又一真君詩曰烏沉海西岸蟾吐天東頭忘下句其餘詩並忘之矣賦詩罷一真君乃命夜戲須臾童兒玉女三十餘人或坐空虛或行海面笙簫衆樂更唱迭和有唱步虛歌者數十百輩幽求記其一焉詞曰鳳凰三十六碧天高太清元君夫人踏雲語冷風颯颯吹鵝笙至四更有緋衣人走入鞠躬屈膝白天欲曙唯而趨出諸君命駕各辭次日昨朱衣人屈膝言曰白幽求已充水府使有勞績諸真君議曰便與遊春臺灑掃幽求恓惶拜乞卻歸故鄉一真君曰卿在何處對曰在秦中又曰汝歸鄉何戀戀也幽求未答又曰使隨吾來朱衣人指隨西嶽真君諸真君亦各下山並自有龍虎鸞鳳朱鬣馬龜魚幡節羽旄等每真君有千餘人履海面而行幽求亦操舟隨西嶽真君後自有便風迅速如電平明至一島見真君上飛而去幽求舟為所限乃離舟上島目送真君猶見旗節隱隱而漸沒幽求方悔恨慟哭而迢迤上島行乃望有人煙漸前就問云是明州又卻喜歸舊國幽求自是休糧常服茯苓好遊山水多在五嶽永絶宦情矣出博異志王太虛東極真人王太虛隱居王屋山中咸通壬辰歲王屋令王㻌夙志崇道常念黃庭經每欲自為注解而未了深玄之理但日誦五六千遍聞王屋小有洞天神仙之府求為王屋令欲結廬於其中冀時得遊禮耳罷官乃絶粒咽氣數月稍覺神旺身輕入洞屋誓不復返初行三二十里或寬廣明朗或幽暗泥黑捫壁俯行經三五日忽坦然平闊峭崖倚空直拔萬仞下有嵌室可坐數百人石床案几儼若有人居之案上古經一軸未敢遂取稽首載拜言曰下土賤臣形濁氣穢輒慕長生之道幸入洞天仰窺靈府是萬劫良會今覩上天遺跡玉案玄經不敢輒取願真仙鑒祐許塵目一披篇卷則受罔極之恩良久叩頭乞報應之兆忽有一人坐於案側曰子其忘乎緱氏仙裔聿能好道可以名列青簡矣吾東極真人子之同姓也此黃庭寶經吾之所注使授於子復贈以桃得數斗曰此食之者白日飛行此核磨而服之不唯愈疾亦可延算子雖有志未可居此二十年期於茲山矣勉而勤之得道也言訖不復見㻌亦不敢久住攜桃核與經而歸磨服桃核身康無疾顏狀益少人間因有傳寫東極真人所注黃庭經本矣出仙傳拾遺王子芝王子芝字仙苗白云河南緱氏人常遊京洛間耆老云五十年來見之狀貌恆如四十許人莫知其甲子也好養氣而嗜酒故蒲帥琅琊公重盈作鎮之初年仙苗居於紫極宮王令待之甚厚又聞其嗜酒日以三榼餉之間日仙苗出遇一樵者荷擔於宮門貌非常意甚異焉因市其薪厚償厥直樵者得金亦不讓而去子芝潛令人躡其後以伺之樵者徑趨酒肆盡飲以歸他日復來子芝謂曰知子好酒吾有中令所餉醇醪償子薪價可乎曰可乃飲之數盂因謂子芝是酒佳矣然殊不及解縣石氏之醞也余適自彼來恨向者無侶不果盡於斯酌子芝因降階執手與之擁爐祈於樵者曰石氏芳醪可致否樵者頷之因命丹筆書一符置於火上煙未絶有一小豎立于前樵者勑之爾領尊師之僕挈此二榼但往石家取酒吾待與尊師一醉時既昏夜門已扃禁小豎謂芝僕曰可閉其目因搭其頭人與酒壺偕出自門隙已及解縣攜酒而還因與子芝共傾焉其甘醇郁烈非世所儔中宵樵者謂子芝曰已醉矣余召一客伴子飲可乎子芝曰諾復書一朱符置火上瞬息聞異香滿室有一人來堂堂美鬚眉拖紫秉簡揖樵者而坐引滿兩巡二壺且竭樵者燒一鐵筯以焌焌原作授明鈔本作焌今據雲笈七籤一一二改紫衣者云可去時東方明矣遂各執別樵者因謂子芝曰識向來人否少頃可造河瀆廟視之子芝送樵者訖因過廟所覩夜來共飲者乃神耳鐵筯之驗宛然趙均均原作君據雲笈七籤改郎中時在幕府目驗此事弘文館校書郎蘇悅亦寓於中條甚熟蹤跡其後子芝再遇樵仙別傳修鍊之訣且為地仙矣出神仙感遇録劉商彭城人也家於長安少好學強記精思攻文有胡笳十八拍盛行於世兒童婦女咸悉誦之進士擢第歷臺省為郎性耽道術逢道士即師資之鍊丹服氣靡不勤切每歎光陰甚促筋骸漸衰朝馳暮止但自勞苦浮榮世官何益於己古賢皆隳官以求道多得度世幸畢婚嫁不為俗纍豈劣於許遠遊哉由是以病免官道服東遊入廣陵於城街逢一道士方賣藥聚衆極多所賣藥人言頗有靈效衆中見見原作間據明鈔本改商目之相異乃罷藥攜手登樓以酒為勸道士所談自秦漢歷代事皆如目覩商驚異師敬之復言神仙道術不可得也及暮商歸僑止道士下樓閃然不見商益訝之商翌日又於城街訪之道士仍賣藥見商愈喜復挈上酒樓劇談勸醉出一小藥囊贈商並戲吟曰無事到揚州相攜上酒樓藥囊為贈別千載更何求商記其吟暮乃別去後商纍尋之不復見也乃開囊視重紙裹一葫蘆子得九粒藥如麻粟依道士口訣吞之頓覺神爽不饑身輕醒然過江遊茅山久之復往宜興張公洞當遊之時愛罨畫溪之景遂於胡父渚葺居隱於山中近樵者猶見之曰曰字原闕據雲笈七籤一一三補我劉郎中也而莫知所止已為地仙矣出續仙傳
