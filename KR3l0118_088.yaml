body:
  text: 佛圖澄佛圖澄佛圖澄者西域人也本姓帛氏少出家清真幼學誦經數百萬言以晉懷帝永嘉四年來適洛陽志弘大法善念神呪能役使鬼物以麻油雜煙灰塗掌千里外事皆徹見掌中如對面焉亦能令潔齊者見又聽鈴音以言事無不效驗欲於洛陽立寺值劉曜寇斥洛臺帝京擾亂澄立寺之志遂不果乃潛身草野以觀世變時石勒屯兵葛陂專以殺戮為威沙門遇害者甚衆澄憫念蒼生欲以道化勒於是杖策到軍門勒大將郭黑略素奉法澄即投止略家略從受五戒崇弟子之禮略後從勒征伐輒預克勝負勒疑而問曰孤不覺卿有出衆智謀而每知行軍吉凶何也略曰將軍天挺神武幽靈所助有一沙門術智非常云將軍當略有區夏己應為師臣前後所白皆其言也勒喜曰天賜也召澄問曰佛道有何靈驗澄知勒不達深理正可以道術為教因言曰至道雖遠亦可以近事為證即取器盛水燒香呪之須臾生青蓮華光色曜日勒由此信伏澄因諫曰夫王者德化洽於宇內則四靈表瑞政弊道消則彗孛見於上恆象著見休咎隨行斯乃古今之常理天人之明戒勒甚悅之凡應被誅殘蒙其益者十有八九於是中州之胡皆願奉佛時有痼疾世莫能知者澄為醫療應時瘳損陰施默益者不可勝記勒自葛陂還河北過坊頭人夜欲斫營澄語黑略曰須臾賊至可令公知果如其言有備故不敗勒欲試澄夜冠胄衣甲執刃而坐遣人告澄云夜來不知大將軍所在使人始至未及有言澄逆問曰平居無寇何故夜嚴勒益敬之勒後因忿欲害諸道士並欲苦澄澄乃避至黑略舍語弟子曰若將軍使至問吾所在者報云不知所之使人尋至覓澄不得使還報勒勒驚曰吾有惡意向聖人聖人捨我去矣通夜不寢思欲見澄澄知勒意悔明旦造勒勒曰昨夜何行澄曰公有怒心昨故權避公今改意是以敢來勒大笑曰道人謬耳襄國城塹水源在城西北五里其水源暴竭勒問澄何以致水澄曰今當勑龍取水勒字世龍謂澄嘲己答曰正以龍不能致水故相問耳澄曰此誠言非戲也水泉之源必有神龍居之往以敕語告之水必可得乃與弟子法首等數人至故泉源上其源故處久已乾燥坼如車轍從者心疑致水難得澄坐繩床燒安息香呪願數百言如此三日水泫然微流有一小龍長五六寸許隨水來出諸道士競往視之澄曰龍有毒勿臨其上有頃水大至隍塹皆滿澄間坐歎曰後二日當有一小人驚動此下既而襄國人薛合有二子既小且驕輕侮鮮卑奴奴忿抽刃刺殺其弟執兄于室以刀擬心若人入屋便欲加手謂薛合曰送我還國我活汝兒不然共死於此內外驚愕莫敢往觀勒乃自往視之謂薛合曰送奴以全卿子誠為善事此法一開方為後害卿且寬情國有常憲命人取奴奴遂殺兒而死鮮卑段末波攻勒其衆甚盛勒懼問澄澄曰昨日寺鈴鳴云明旦食時當擒段末波與勒登城望波軍不見前後失色曰豈可獲是公安我辭耳更遣夔安問澄澄曰已獲波矣時城北伏兵出遇波執之澄勸勒宥波遣還本國勒從之卒獲其用時劉載已死載從弟曜篡襲僞立稱元光初光初八年曜遣從弟中山王嶽將兵攻勒勒遣石虎率步騎拒之大戰洛西嶽敗保石梁塢虎堅柵守之澄與弟子自官寺至中寺始入寺門歎曰劉嶽可憫弟子法祚問其故澄曰昨亥時嶽已被執果如所言光初十一年曜自率兵攻洛陽勒欲自往拒曜內外僚佐無不畢諫勒以訪澄澄曰相輪鈴音云秀支替戾岡僕谷劬禿當此羯語也秀支替戾岡出也僕谷劉曜胡位劬禿當捉也此言軍出捉得曜也時徐光聞澄此言苦勸勒乃留長子石弘共澄以鎮襄國自率中軍步騎直指洛城兩陳才交曜軍大潰曜馬沒水中石堪生擒之送勒澄時以物塗掌觀之見有大衆中縛一人朱絲約其肘因以告弘當爾之時正生擒曜也時平之後勒乃僭稱趙天王行皇帝事改元建平是歲晉成皇帝咸和五年也勒登位已後事澄益篤時石葱叛其年澄戒勒曰今年葱中有蟲食必害人可令百姓無食葱也勒頒告境內慎無食葱到八月石葱果走勒益加尊重有事必咨而後行號大和尚石虎有子名斌後勒以為子勒愛之甚重忽暴病而亡已涉二日勒曰朕聞虢太子死扁鵲能生大和尚國之神人可急往告必能致福澄乃取楊枝呪之須臾能起有頃平復由是勒諸稚子多在佛寺中養之每至四月八日勒躬自詣寺觀佛像而發願至建平四年四月天靜無風而塔上一鈴獨鳴澄謂衆曰鈴音云國有大喪不出今年矣是歲七月勒死太子弘襲位少時虎廢弘自立遷都於鄴改元建武傾心事澄又重於勒乃下書曰和尚國之大寶榮爵不加高祿不受榮祿匪頒何以旌德從此已往宜衣以綾錦乘以雕輦朝會之日和尚升殿常侍已下悉助舉舁太子諸公扶輦而上主者唱大和尚衆座皆起以彰其尊又勑僞司空李農旦夕親問太子諸公五日一朝表朕敬焉澄時止鄴城內中寺遣弟子法常北至襄國弟子法佐從襄國還相遇在梁塞城下共宿對車夜談言及和尚比旦各去法佐至始入覲澄澄逆笑曰昨夜爾與法常交車共說汝師耶先民有言不曰敬乎幽而不改不曰慎乎獨而不怠幽獨者敬慎之本而不識乎佐愕然愧懺於是國人每共相語曰莫起惡心和尚知汝及澄之所在無敢向其方面涕唾便利者時太子石邃有二子在襄國澄語邃曰小阿彌比當得疾可往迎之邃即馳信往視果已得疾太醫殷騰及外國道士自言能治澄告弟子法常曰正使聖人復出不愈此疾況此等乎後三日果死石邃荒酒將圖為逆謂內豎曰和尚神通儻發吾謀明日來者當先除之澄月望將入覲虎謂弟子僧會曰昨夜天神呼我曰明日若入還勿過人我儻有所過汝當止我澄常入必過邃知澄入要候甚苦澄將上南臺僧惠引衣澄曰事不得止坐未安便起邃固留不住所謀遂止還寺歎曰太子作亂其形將成欲言難言欲忍難忍乃因事從容針虎虎終不解俄而事發方悟澄言後郭黑略將兵征長安北山羌墮羌伏中時澄在堂上坐弟子法常在側澄忽慘然改容曰郭公陷狄令衆生呪願澄又自呪願須臾更白若東南出者活餘向則困復更呪願有頃曰脫矣後月餘日黑略還說隨羌圍中東南走馬乏正遇帳下人推馬與之曰公乘此小人乘公馬濟與不濟任命也略得其馬故獲免推驗日時正是澄呪願時也僞大司馬燕公石斌虎以為幽州牧鎮有群凶湊聚因以肆暴澄戒虎曰天神昨夜言疾牧馬還至秋齊當癱爛虎不解此語即敕諸處牧馬送還其秋有人譖斌於虎虎召斌鞭之三百殺其所生齊氏虎彎弓捻矢自視行斌罰罰輕虎乃手殺五百人澄諫曰心不可縱死不可生禮不親殺以傷恩也何有天子親行罰乎虎乃止後晉軍出淮泗隴北瓦城皆被侵逼三方告急人情危擾虎乃瞋曰吾之奉佛而更致外寇佛無神矣澄明旦早入虎以事問澄因讓虎曰王過世經為大商主至罽賓寺嘗供大會中有六十羅漢吾此身亦預斯會時得道人謂吾曰此主人命盡當更化身後晉王地今王為王豈非福耶疆場軍寇國之常耳何為怨謗三寶夜興毒念乎虎乃信悟跪而謝焉虎常問澄佛法不殺朕為天下之主非刑殺無以肅清海內既違戒殺生雖復事佛誰獲福耶澄曰帝王事佛當在體恭心順顯揚三寶不為暴虐不害無辜至於凶暴無賴非化所遷有罪不得不殺有惡不得不刑但當殺可殺當刑可刑耳若暴虐恣意殺害非罪雖復輕刑事法無解殃禍願陛下省欲興慈廣及一切則佛教永隆福祚方遠虎雖不能盡從而為益不少虎尚書張離張良家富事佛各起大塔澄謂曰事佛在於清靜無欲慈矜為心檀越雖儀奉大法而貪吝未已遊獵無度積聚不窮方受玩世之罪何福報之可希耶離等後並被戮滅時又久旱自正月至六月虎遣太子詣臨漳西釜口祈雨久而不降虎令澄自行即有白龍二頭降於祠所其日大雨方數千里其年大收戎貊之徒先不識法聞澄神驗皆遙向禮拜並不言而化焉澄常遣弟子向西城中市香既行澄告餘弟子掌中見買香弟子在某處被劫垂死因燒香呪願遙救護之弟子後還云某月某日某處為賊所劫垂當見殺忽聞香氣賊無故自驚曰救兵已至棄之而走虎於臨漳修治舊塔少承露盤澄曰臨緇城內有古阿育王塔地中有承露盤及佛像其上林木茂盛可掘取之即畫圖與使依言掘取果得盤像虎每欲伐燕澄諫曰燕國運未終卒難可克屢行敗績方信澄戒澄道化既行以人多奉佛皆營造塔廟相競出家真僞混淆多生愆過虎下書問中書曰佛號世尊國家所奉里閭小人無爵秩者為應得事佛與不又沙門皆應高潔貞正行能精進然後可為道士今沙門甚衆或有姦宄避役多非其人卿可同議僞中書著作郎王度奏曰夫王者郊祀祀原作視據明本改天地祭奉百神載在祀典禮有常饗佛出西域外國之神功不施民非天子諸華所應祠奉往者漢明感夢初傳其道唯聽西域人得立寺都邑以奉其神漢人皆不得出家魏承漢原本漢下有後字據高僧傳刪制亦循前軌今大趙受命率由舊章華戎制異人神流別外不同內饗祭殊禮荒下服禮不宜雜錯國家可斷趙人悉不聽詣寺燒香禮拜以尊典禮其百辟卿士下逮衆隸例皆禁之其有犯者與淫祀同罪趙人為沙門者還從四民之服僞中書令王波同度所奏虎下書曰度議云佛是外國之神非天子諸華所可宜奉朕生自邊壤忝當期運君臨諸夏夏原作下據明本改至於饗禮應兼從本俗佛是戎神正所應奉夫制由上行永世作則苟事克無虧何拘前代其夷趙百蠻有捨其淫禮樂事佛者悉聽為道於是慢戒之徒因之以厲黃河中舊不生黿忽得一以獻虎澄見而歎曰桓溫其入河不久溫字元子後果如言也時魏縣有一流民莫識氏族恆著麻襦布裳在魏縣市中乞丐時人謂之麻襦言語卓越狀如狂病乞得米穀不食輒散置大路云飼天馬趙興太守藉拔收送詣虎先是澄謂虎曰國東二百里某月某日當送一非常人勿殺之也如期果至虎與共語了無異言唯道陛下當終一柱殿下虎不解此語令送以詣澄麻襦謂澄曰昔在元和中會奄至今日有戎受玄命絶歷終有期金離銷于壤邊荒不能尊驅除靈期迹莫已已之懿裔苗葉繁其來方積休期如何斯永以歎之澄曰天回運極否將不支九木水為難無可以術學玄哲雖存世莫能基必馥高僧傳馥作穨久遊閻浮利擾擾多此患行登凌雲宇會於虛遊間澄與麻襦講語終日人莫能解有竊聽者唯得此數言推計似如論數百年事虎遣馬驛送還本縣既出城外辭能步行云我當有所過未便得發至合口橋可留見待使如言馳去未至合口而麻襦已在橋上考其行步有若飛也澄有弟子道進學通內外為虎所重嘗言及隱士虎謂進曰有楊軻者朕之民也徵之十餘年不恭王命故往省視傲然而臥雖不得君臨萬邦乘輿所向天沸地涌雖不能令木石屈膝何匹夫而長慠耶昔太公之齊先誅華士太公賢哲豈其謬乎進對曰昔舜優蒲衣禹造伯成魏飾干木漢美周黨管寧不應曹氏皇甫不屈晉世二聖四君共嘉其節將欲激厲貪競以峻清風願陛下遵舜禹之德勿效太公用刑君舉必書豈可令趙史遂無隱遁之傳乎虎悅其言即遣軻還其所止遣十家供給之進還具以白澄澄睆然笑曰汝言善也但軻命有所縣矣後秦州兵亂軻弟子以牛負軻西奔戍軍追擒並為所害虎嘗晝寢夢見群羊負魚從東北來寤已訪澄澄曰不祥也鮮卑其有中原乎慕容氏後果都之澄嘗與虎共處中堂澄忽驚曰幽州當火災仍取酒灑之久而笑曰救已得矣虎遣驗幽州云爾日火從四門起西南有黑雲來驟雨滅之雨亦頗有酒氣至虎建武十四年七月石宣石韜將圖相殺宣時到寺與澄同坐浮圖一鈴獨鳴澄謂宣曰解鈴音乎鈴云胡子子原作于據高僧傳改洛度宣變色曰是何言與澄謬曰老胡為道不能山居無言重茵美服豈非洛度乎石韜後至澄熟視良久韜懼而問澄澄曰怪公血臭故相視耳至八月澄使弟子十人齊于別室澄時暫入東閣虎與后杜氏問訊澄曰脅下有賊不出十日自佛圖以西北殿以東當有流血慎勿東行走杜后曰和尚耄耶何處有賊澄即易語云六情所受皆悉是賊老自應耄但使少者不惛遂便寓言不復章的後二日宣果遣人害韜於佛寺中欲因虎臨喪仍行大逆虎以澄先戒故獲免及宣事發被收澄諫虎曰既是陛下之子何為重禍耶陛下若忍怒加慈者尚可六十餘歲如必誅之宣當為彗星下掃鄴宮也虎不從以鐵鎖穿宣領牽上薪積而焚之收其官屬三百餘人皆車裂支解投之漳河澄乃敕弟子罷別室室原作空據明本改齊也後月餘日有一妖馬耄尾皆有燒狀入中陽門出顯陽門東首東宮皆不得入走向東北俄爾不見澄聞而歎曰災其及矣至十一月虎大饗群臣於太武前殿澄吟曰殿乎殿乎棘子成林將壞人衣虎令發殿石下視之有棘生焉澄還寺視佛像曰悵恨不得莊嚴獨語曰得三年乎自答不得不得又曰得二年一年百日一月乎自答不得乃無復言還房謂弟子法祚曰戊申歲禍亂漸萌己酉石氏當滅吾及其未亂先從化矣既遣人與虎辭曰物理必遷身命非保貧道焰幻之軀化期已及既荷恩殊重故逆以仰聞虎愴然曰不聞和尚有疾乃忽爾告終即自出至寺而慰諭焉澄謂虎曰出入生死道之常也修短分定非所能言夫道重行全德貴無怠苟業操無虧雖亡若在違而獲延非其所願今意未盡者以國家心存佛理奉法無吝興起寺廟崇顯壯麗稱斯德也宜享休祉而布政猛烈刑酷罪原本無罪字據明鈔本補濫顯違違原作為據明鈔本改聖典幽背法戒以不自懲革終無佛祐若降心易慮惠此下民則國祚延長道俗慶賴畢命就盡沒無遺恨虎悲動嗚咽知其必逝即為鑿壙營墳至十二月八日卒於鄴宮寺是歲晉穆帝永和四年也士庶悲哀號赴傾國春秋一百一十七歲矣仍窆於臨漳西紫陌即虎所創冢也俄而梁犢作亂明年虎死冉閔篡戮石種都盡閔小字棘奴澄先所謂棘子成林者也澄左乳旁先有一孔圍四五寸通徹腹內有時光從中出或以絮塞孔夜欲讀書輒拔絮則一室洞明又齊日輒至水邊引腸洗之還復內中澄身長八尺風姿甚美妙解深經旁通世論講說之日正標宗致使始末文明鈔本始末文三字作如來之言昭然可了加復慈洽蒼生拯救危苦二石凶強虐害非道若不以與澄同日熟可言哉但百姓蒙益日用而不知耳佛天高僧傳天作調須菩提等數十名僧出自天竺康居不遠數萬之路足涉流沙詣澄受訓樊淝釋道安中山竺法雅並跨越關河聽澄講說皆妙達精理研測幽微澄自說生處去鄴九萬餘里棄家入道一百九年酒不踰齒過中不食非戒不履無欲無求受業追隨常有數百前後門徒幾且一萬所歷州郡興立佛寺八百九十三所弘法之盛莫與先矣初虎殮澄以生時錫杖及鉢內棺中後冉閔篡位開棺唯得鉢杖不得見尸或言澄死之日有人見澄於流沙虎疑其不死因發墓開棺視之唯見一石虎曰石者朕也師葬我而去矣未幾虎死後慕容雋都鄴處石虎宮中每夢見虎囓其臂意謂石虎為崇乃募覓虎尸於東明館掘得之尸殭不毀雋踏之罵曰死胡敢怖生天子汝作宮殿成而為汝兒所圖況復他耶鞭撻毀辱投之漳河尸倚橋柱不移秦將王猛乃收而葬之麻襦所言一柱殿也後苻堅征鄴雋子暐為堅大將郭神虎所執實先夢虎之驗也田融趙趙原作起據高僧傳改記云澄未亡數年自營冢壙澄既既原作記據明鈔本改知冢必開又尸不在中何容預作恐融之謬矣澄或言佛圖澄或言佛屠澄皆取梵音之不同耳出高僧傳
