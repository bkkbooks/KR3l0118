body:
  text: 王承休王承休蜀後主王衍宦官王承休後主以優笑狎昵見寵有美色恆侍少王寢息久而專房承休多以邪僻姦穢之事媚其主主愈寵之與韓昭為刎頸之交所謀皆互相表裏承休一日請從諸軍揀選官健得驍勇數千號龍武軍承休自為統帥並特加衣糧日有優給因乞秦州節度使且云願與陛下於秦州採掇美麗旦説秦州之風土多出國色仍請幸天水少主甚悅即遣仗節赴鎮應所選龍武精鋭並充衙隊從行到方鎮下車當日毀拆衙庭發丁夫採取材石創立公署使宅一如宮殿之制兼以嚴刑峻法婦女不免土木之役又密令強取民間子弟明鈔本弟作女使教歌舞伎樂被獲者令畫工圖真及録名氏急遞中送韓昭昭又密呈少主少主覩之不覺心狂遂決幸秦之計因下制曰朕聞前王巡狩觀土地之慘舒歷代省方慰黎元之傒望西秦封域遠在邊隅先皇帝畫此山河歷年征討雖歸王化未浹惠風今耕稼既屬有年軍民頗聞望幸用安疆場聊議省巡朕選取今年十月三日幸秦州布告中外咸使聞之由是中外切諫不從母后泣而止之以至絶食前秦州節度使判官蒲禹卿叩馬泣血上表諫曰臣聞堯有敢諫之鼓舜有誹謗之木湯有司過之士周有誡慎之鞀蓋古者明君克全帝道欲知己過要納讜言將引咎而責躬庶理人而修德陛下自承祧秉録正位當天愛聞逆耳之忠言每犯顏而直諫且先皇帝許昌發迹閬苑起身歷艱辛於草昧之中受危險於虎爭之際胼胝戈甲寢寤風霜申武力而拘諸原立戰功而平多壘亡軀致命事主勤王方得成家至于開國今日鴻基霸盛大業雄崇地及雍涼界連南北德通吳越威定蠻陬郡府頗多關河漸廣人物秀麗土地繁華當四海輻裂之秋成萬代龍興之業陛下生居富貴坐得乾坤但好歡娛不思機變臣欲望陛下以名教而自節以禮樂而自防循道德之規受師傅之訓知社稷之不易想稼穡之最難惜高祖之基扃似太宗之臨御賢賢易色孜孜為心無稽之言勿聽弗詢之謀勿用聽五音而受諫以三鏡而照懷少止息於諸處林亭多觀覽於前王經史別修上德用卜遠圖莫遣色荒母令酒惑常親政事勿恣間遊臣竊聞陛下欲出成都往巡邊壘且天水地遠峻惡難行險棧欹雲危峰插漢微雨則吹摧閣道稍泥則沮滑山程豈可鳴鑾那堪叱馭又復敵京咫尺塞邑荒涼民雜蕃戎地多嵐瘴別無華風異景不可選勝尋幽隴水聲悲胡笳韻咽營中止帶甲之士城上宿枕戈之人看探虜於孤峰朝朝疑慮覩望旗於峻嶺日日隄防是多山足水之鄉即易動難安之地麥積崖無可瞻戀米谷峽何亞連知明鈔本知作如路遇嗟山程通怨水秦穆圉馬之地隗囂僭位之邦是以一人出行百司參從千群霧擁萬衆星馳當路州縣摧殘所在館驛隘少止宿尚猶不易供須固是為難縱若就中指揮自破屬省錢物未免因依擾踐觸處凌遲以此商論不合輕動其類蒼龍出海雲行雨施豈教浪靜風恬必見傷苗損稼所以鑾輿須止天步難移況頃年大駕只到山南猶不關進發兵士此時直至天水未審如何制宜自當初打破梁原城池虜掠義寧戶口截腕者非一斬首者甚多匪惟生彼人心抑亦損茲聖德今去洛京不遠復聞大駕重來若彼預有計謀此則便須征討況鳳翔久為進敵必貯姦謀切慮妄搆妖詞致生釁隙又陛下與唐主始申歡好信幣交馳但慮聞道聖駕親行別懷疑忌其必特差使命請陛下境上會盟未審聖躬去與不去若去則相似秦趙爭強彼此難屈若不去即便同魯衛不睦戰伐尋興酌彼未萌料其先見願陛下思忖臣伏聞自古帝王省方巡狩弔民伐罪展義觀風然後便歸九重別安萬姓今陛下纍曾遊歷未聞一件教條止於跋涉山川驅馳馳字原闕據明鈔本補人馬秦苑則舟船幾溺青城則嬪綵將沈自取驚憂為何切事卻還京輦不悅軍民但鬱衆情莫彰帝德憶昔先皇在日未嘗無故巡遊陛下纂承已來率意頻離宮闕勞心費力有何所為此際依前整蹕又擬遠別宸居昔秦皇之鸞駕不回煬帝之龍舟不返陛下聖逾秦帝明甚隋皇且無北築之虞焉有南遊之弊寬仁大度篤孝深慈知稼穡之艱難識古今之成敗自防得失不縱襟懷忍教致卻宗言將明鈔本致卻宗言將作政衰可言道斷使蒸民以何託令慈母以何辜若何明鈔本何作不慮以危亡但恐乖於仁孝況玉京金闕寶殿珠樓內苑上林瓊池環圃香風滿檻瑞露盈盤鈞天之樂奏九韶回雪之舞呈八佾簇神仙於清虛之境列歌舞於閬苑之中人間勝致天下所無時或賞遊足觀奇趣何必須於遠塞看彼荒山不惜聖軀有何裨益方今岐陽不順梁園已亡中原有人大事未了且當國生靈受弊盜賊橫行縱邊延無峰火之危而內地有腹心之患陛下千年膺運一國稱尊文德武功經天緯地考逾於舜仁甚於湯百行皆全萬機不擾聰明博達識量變通深負智謀獨懷英傑方居大寶正是少年既成社稷之基復把山河之險但不遠聽深察居安慮危闢四門以求賢總萬邦而行事咸有一德端坐九重使恩威並行賞罰必當平分雨露遍及瘡痍令表裏以寬舒使子孫以昌盛布臨人之惠化立濟衆之玄功選揀雄師思量大計振彼鴟張之勢壯茲虎視之威秣馬訓兵豐糧利器彼若稍有微釁此即直下平吞正取時機大行王道自然百靈垂佑四海歸仁衆心成城天下治理即目蜀都強盛諸國不如賢士滿朝聖人當極臣願百姓樂於貞觀萬乘明於太宗采藥石之言聽芻蕘之説愛惜社稷醫療軍民似周武諤諤而昌知辛紂唯唯而滅無飾非拒諫之事有面折廷爭之人因我睿朝益我皇化陛下莫見居人稠壘謂言京輦繁華蓋是外處凌殘住止不得所以競來臻湊貴且偷安今諸州虐理處多百姓失業欲盡荒田不少盜賊成群乞陛下廣布腹心特令聞見且蜀國從來創業多乏永謀或德不及於兩朝或祚不延於七代劉禪俄降於鄧艾李勢遽歸於桓溫皆為不取直言不恤政事不行王道不念生靈以至國人之心無一可保山河之險不足可憑陛下至聖至明如堯如舜豈後主之相匹豈子仁之比倫有寬慈至孝之名有遠見長謀之策不信諂媚不恣耽荒出入而有所可徵動靜而無非經久必致萬年之業終為四海之君臣願陛下且住鑾輿莫離京國候中原無事八表來王天下人心咸歸我主若群流赴海衆蟻慕羶有道自彰無思不服匪惟要看天水直可便坐長安是微臣之至懇舉國之深願臣聞天子有諍臣七人雖無道不失其天下是以輒傾丹懇仰諫聖明不藉官榮不沽多譽情非訕上理直憂君雖無折檻之能但有觸鱗之罪不避誅殛輒扣天庭臣死如萬類之中去一螻蟻陛下或全無忖度須向邊陲遺聖母以憂心令庶寮以懷慮全迷得失自取疲勞事有不虞悔將何在臣願陛下稍開諫路微納臣言勿違聖后之情且允國人之望俯存大計勿出遠邊後主竟不從之韓昭謂禹卿曰我取汝表章候秦州回日下獄逐節勘之勿悔至十月三日發離成都四日到漢州鳳州王承捷飛驛騎到秦云東朝差興聖令公統軍十餘萬取九月到鳳州少主猶謂臣下設計要沮其東行曰朕恰要親看相殺又何患乎不顧而進上梓潼山少主有詩云喬巖簇冷煙幽徑上寒天下瞰峨嵋嶺上窺華嶽巔驅馳非取樂按幸為憂邊此去將登陟歌樓路幾千宣令從官繼和中書舍人王仁裕和曰綵杖拂寒煙鳴騶在半天黃雲生馬足白日下松巔盛得安疲俗仁風扇極邊前程問成紀此去尚三千成都尹韓昭翰林學士李浩弼徐光浦並繼和亡其本至劍州西二十里已來夜過一磎山忽聞前後數十里軍人行旅振革鳴金連山叫噪聲動溪谷問人云將過稅稅原作視據明鈔本改人場場原作傷據明鈔本改懼有鷙獸搏人是以噪之其乘馬亦亦原作不據明鈔本改咆哮恐懼箠之不肯前進衆中有人言曰適有大駕前鷙獸自路左叢林間躍出於萬人中攫將一夫而去其人銜到溪洞間尚聞唱救命之聲況天色未曉無人敢捕逐者路人罔不流汗遲明有軍人尋之草上委其餘骸矣少主至行宮顧問臣僚皆陳恐懼之事尋命從臣令各賦詩王仁裕詩曰劍牙釘舌血毛腥窺算勞心豈暫停不與天朝除患難惟於當路食生靈從將將字原闕據明鈔本補戶口資饞口未委三丁稅幾丁今日帝王親出狩白雲巖下好藏形翰林學士李浩弼進詩曰巖下年年自寢訛生靈餐盡意如何爪牙衆後民隨減溪壑深來骨已多天子紀綱猶被弄客人窮獨困難過長途莫怪無人迹盡被山王稅殺他少王覽此二篇大笑曰此二臣之詩各有旨也朕亦於馬上搆思三十餘里終不就於是命各官從臣翰林學士徐光浦水部員外王巽亦進詩至劍門少主乃題曰緩轡踰雙劍行行躡石稜作千尋壁壘為萬祀依憑道德雖無取江山粗可矜回看成闕路雲壘樹層層後侍臣繼成都尹韓昭和曰閉關防外寇孰敢振威稜險固疑天設山河自古憑三川奚所賴雙劍最堪矜鳥道微通處煙霞鎖百層王仁裕和曰孟陽曾有語刊在白雲稜李杜常挨托孫劉亦恃憑庸才安可守上德始堪矜暗指長天路濃巒蔽幾層又命制秦中父老望幸賦一首進之今亡其本過白衛嶺大尹韓昭進詩曰吾王巡狩為安邊此去秦享尚數千夜照路歧山店火曉通消息戍瓶煙為雲巫峽雖神女跨鳳秦樓是謫仙八駿似龍人似虎何愁飛過大漫天少主和曰先朝神武力開邊畫斷封疆四五千前望隴山屯劍戟後憑巫峽鎖烽煙軒皇尚自親平寇嬴政徒勞愛學仙想到隗宮尋勝處正應鶯語暮春天王仁裕和曰龍旆飄颻指極邊到時猶更二三千登高曉踏巉巖石冒冷朝充斷續煙自學漢皇開土字不同周穆好神仙秦民莫遣無恩及大散關東別有天洎至利州州原作周據許本改已聞東師下固鎮矣旬日內又聞金牛敗卒塞硤而至其時蜀師十餘萬自綿漢至于深渡千餘里首尾相繼皆無心鬥敵遣使臣逼促則回槍刺之曰請喚取龍武軍相戰不惟勇敢況且偏請衣糧我等揀退不堪何能相殺實無奈何十月二十九日狼狽而歸於棧閣懸險溪巖壑之中連夜繼晝卻入成都康延孝與魏王繼踵而入少主於是樹降東軍未入前王宗弼殺韓昭樞密使宋光嗣景嗣景二字原闕據黃本補潤澄宣徽州明鈔本無州字使李周輅歐陽冕明鈔本冕作晃等王承休握鋭兵於天水兵刃不舉既知東軍入蜀遂擁麾下之師及婦女孩幼萬餘口金銀繒帛於西蕃買路歸蜀沿路為左袵虜奪并經溪山凍餓相踐而死逮至蜀存者百餘人唯與田宗汭等脫身而至魏王使人詰之曰親握鋭兵何得不戰曰憚大王神武不敢當其鋒曰何不早降曰蓋緣王師不入封部無門輸款曰其初入蕃部幾許人同行曰萬餘口今存者幾何曰才及百數魏王曰汝可償此萬人之命遂盡斬之蜀師不戰坐取亡滅者蓋承休韓昭之所致也人多不知之出王氏聞見録
