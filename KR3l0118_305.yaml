body:
  text: 王法智王法智桐廬女子王法智者幼事郎子神大曆中忽聞神作大人語聲法智之父問此言非聖賢乎曰然我姓滕名傳胤本京兆萬年人宅在崇賢坊本與法智有因緣與酬對深得物理前後州縣甚重之桐廬縣令鄭鋒好奇之士常呼法智至舍令屈滕十二郎久之方至其辨對言語深有士風鋒聽之不倦每見詞人談經誦詩歡言終日常有客僧詣法智乞丐者神與交言贈詩云卓立不求名出家長懷片志在青霞今日英雄氣衝蓋誰能久坐寶蓮花又曾為詩贈人云平生才不足立身信有餘自歎無大故君子莫相疏六年二月二十五日夜戴孚與左衛兵曹徐晃龍泉令崔向丹陽縣丞李從訓邑人韓謂蘇修集於鋒宅會法智至令召滕傳胤久之方至與晃等酬獻數百言因謂諸賢請人各誦一章誦畢衆求其詩率然便誦二首云浦口潮來初渺漫蓮舟搖揚採花難春心不愜空歸去會待潮平更折看云衆人莫廝笑又誦云忽然湖上片雲飛不覺舟中雨濕衣折得蓮花渾忘却空將荷葉蓋頭歸自云此作亦頗蹀躞又囑法智弟與鋒獻酬數百言乃去李佐時山陰縣尉李佐時者以大曆二年遇勞病數十日中愈自會稽至龍丘會宗人述為令佐時止令廳數日夕復與客李舉明燈而坐忽見衣緋紫等二十人悉秉戎器趨謁庭下佐時問何人答曰鬼兵也大王用君為判官特奉命迎候以充驅使佐時曰己在哀制為是非禮且王何以得知有我答云是武義縣令竇堪舉君佐時云堪不相知何故見舉答云恩命已行難以辭絶須臾堪至禮謁蘊籍如平人坐謂佐時曰王求一子壻兼令取甲族所以奉舉亦由緣業使然佐時固辭不果須臾王女亦至芬香芳馥車騎雲合佐時下階迎拜見女容姿服御心頗悅之堪謂佐時曰人誰不死如君蓋稀無宜數辭以致王怒佐時知終不免久之王女與堪去留將從二百餘人祗承判官翌日述並弟造同詣佐時佐時且說始末云的以不活為求一頓食述為致盛饌佐時食雉臛忽云不見碗呵左右何以收羹仆于食案便卒其妻鄭氏在會稽喪船至之夕婢忽作佐時靈語云王女已別嫁但遣我送妻還言甚悽愴也韋皋韋皋初薄游劍外西川節度使兵部尚書平章事張延賞以女妻之既而惡焉厭薄之情日露公鬱鬱不得志時入幕府與賓朋從游且攄其忿延賞愈惡之謂皋曰幕僚無非時奇延賞尚敬憚之韋郎無事不必數到其輕之如此他日其妻尤憫之曰男兒固有四方志今厭賤如此不知歡然度日奇哉妾辭家事君子荒隅一間茅屋亦君之居炊菽羹藜簞食瓢飲亦君之食何必忍愧彊安為有血氣者所笑於是入告張行意延賞遺帛五十匹夫人薄之不敢言時有女巫在焉見皋入西院問夫人曰向之緑衣入西院者為誰曰韋郎曰此人極貴位過宰相遠矣其祿將發不久亦鎮此宜殊待之問其所以曰貴人之所行必有陰吏相國之侍一二十人耳如韋郎者乃百餘人夫人聞之大喜遽言于延賞延賞怒曰贈薄請益可矣奈何假託巫妖以相調乎韋行月餘日到歧歧帥以西川之貴壻延置幕中奏大理評事尋以鞫獄平允加監察以隴州刺史卒出知州事俄而朱泚亂駕幸奉天隴州有泚舊卒五百人兵馬使牛雲光主之雲光謀作亂不克率其衆奔朱泚道遇泚使以僞詔除皋御史中丞因與之俱還皋受其命謂雲光曰受命必無疑矣可悉納器械以明不相詐雲光從之翌日大饗伏甲盡殺之立壇盟諸將泚復許皋鳳翔節度皋斬其使行在聞之人心皆奮乃除隴州刺史奉義軍節度使及駕還宮乃授兵部尚書西川節度使延賞聞之將自抉其目以懲不知人竇參竇參常為蒲圻縣令縣有神祠前後令宰皆祀之竇至即欲除毀有日矣夢神謂己曰欲毀吾所居吾害公未得者蓋以公當為相然幸且相存自知與君往來可以預知休咎既驚覺乃自入祠祭酹以兄事之後凡有遷命皆先報之頗與神交焉其神欲相見必具盛饌於空室之內圍以簾幕竇入之後左右聞二人笑語聲竇為柳州別駕官舍有空院竇因閉之俄聞有呼聲三四尋之則無人竇心動乃具服仰問之曰得非幾兄乎曰是也君宜促理家事三兩日內有北使到君不免矣竇依言處置訖坐待使不數日王人遽至果有後命李伯禽貞元五年李伯子伯禽充嘉興監徐浦下場糴鹽官場界有蔡侍郎廟伯禽因謁廟顧見廟中神女數人中有美麗者因戲言曰娶婦得如此足矣遂瀝酒祝語之後數日正晝視事忽聞門外有車騎聲伯禽驚起良久具服迎於門乃折旋而入人吏驚愕莫知其由乃命酒殽久之祗敘而去後乃語蔡侍郎來明日又來傍人並不之見伯禽迎於門庭言敘云幸蒙見録得事高門再拜而坐竟夕飲食而去伯禽乃告其家曰吾已許蔡侍郎論親治家事別親黨數日而卒蕭復弟蕭復親弟少慕道不仕服食芝桂能琴尤善南風因遊衡湘維舟江岸見一老人負書攜琴蕭生揖坐曰父善琴得南風耶曰素善此因請撫之尤妙絶遂盡傳其法飲酒數杯問其所居笑而不答及北歸至沅江口上岸理南風有女子雙鬟挈一小竹籠曰娘子在近好琴欲走報也蕭問何來此曰採果耳去頃却回曰娘子召君蕭久在船頗思閒行遂許之俄有蒼頭棹畫舸至蕭登之行一里餘有門館甚華召生升堂見二美人於上前拜美人曰無怪相迎知君善南風某亦素愛久不習理忘其半願得傳受生遂為奏美人亦命取琴蕭彈畢二美人及左右皆掩泣問生授於何人乃言老父具言其狀美人流涕曰舜也此亦上帝遣君子受之傳與某某即舜二妃舜九天為司徒已千年別受此曲年多忘之遂留生啜茶數碗生辭去曰珍重厚惠然亦不欲言之於人遂出門復乘畫舸至彈琴之所明日尋之都不見矣李納貞元初平盧帥李納病篤遣押衙王祐禱于岱嶽齊戒而往及嶽之西南遙見山上有四五人衣碧汗衫半臂其餘三四人雜色服飾乃從者也碧衣持彈弓彈古樹上山鳥一發而中鳥墮樹從者爭掩捉王祐見前到山下人盡下車却蓋向山齊拜比祐欲到路人皆止祐下車此三郎子七郎子也遂拜碧衣人從者揮路人令上車路人躊躇碧衣人自揮手又令人上持彈弓於殿西南以彈弓斫地俯視如有所伺見王祐乃召之前曰何為來祐具以對碧衣曰君本使已來矣何必更為此行要見使者乎遂命一人曰引王祐見本使遂開西院門引入見李納荷校滅耳踞席坐於庭王祐驚泣前伏抱納左腳噬其膚引者曰王祐可退却引出碧衣猶在殿階謂祐曰要見新使邪又命一人從東來形狀短闊神彩可愛碧衣曰此君新使也祐拜訖無言祐似缺嚏而遲者久之忽無所見唯蒼苔松柏悄然嚴靜乃薦奠而回見納納呼入臥內問王祐祐但以薦奠畢擲樗蒲投具得吉兆告納納曰祐何不實言何故噬吾足於是舉足乃祐所噬足跡祐頓首具以實告納曰適見新使為誰祐曰見則識不知其名也納乃召三人出至師古曰此是也納遂授以後事言畢而卒王祐初見納荷校問曰僕射何故如此納曰平生為臣之辜也蓋不得已如何今日復奚言也崔汾澧泉尉崔汾仲兄居長安崇賢里夏夜乘涼於庭際月色方午風過覺有異香俄聞南垣土動簌簌崔生意其蛇鼠也忽見一道士大言曰大好月色崔驚懼避之道士緩步庭中年可四十風儀清古良久妓女十餘排大門而入輕綃翠翹艷色絶世有從者具香茵列坐月下崔生疑其妖魅以枕擊門驚之道士小顧怒曰我以此差靜復貪月色初無延佇之意敢此粗率乃厲聲曰此處有地界耶欻有二人長才三尺巨首儋耳唯伏其前道士頤指崔生所止曰此人合有親屬入陰籍可領來二人趨出俄見其父母及兄悉至衛者數人捽拽批抶之道士叱曰我在此敢縱子無禮乎父母叩頭曰幽明隔絶誨責不及道人叱遣之復顧二鬼曰捉此疑人來二鬼跳及門以赤物如彈丸遙投崔生口中乃細赤綆也遂釣出於庭又叱辱崔驚失音不得自理崔僕妾悉哭泣其妓羅拜曰彼凡人因訝仙官無狀而至似非大過怒解乃拂衣由大門而去崔生病如中惡五六日方差因迎祭酒醮謝亦無他崔生初隔隙見亡兄以帛抹唇如損狀僕使共訝之一婢泣曰幾郎就木之時面衣忘開口其時匆匆就剪誤傷下吻然旁人無見者不知幽冥中二十餘年尤負此苦辛祕辛祕五經擢第後常州赴婚行至陝因息於樹陰旁有乞兒箕坐痂面蟣衣訪辛行止辛不對即去乞兒亦隨之辛馬劣不能相遠乞兒彊言不已前及一緑衣者辛揖而與之俱行里餘緑衣者忽前馬驟去辛怪之獨言此人何忽如是乞兒曰彼時至豈自由乎辛覺語異始問之曰君言時至何也乞兒曰少頃當自知之將及店見數十人擁店門問之乃緑衣者卒矣辛驚異遽卑下之因解衣衣之脫乘乘之乞兒初無謝意語言往往有精義至汴謂辛曰某止是矣公所適何事也辛以娶約語之乞兒笑曰公士人業不可止此行然非君妻公婚期甚遠隔一日乃扛一器酒與辛別指相國寺剎曰及午而焚可遲此而別如期剎無故火發壞其相輪臨去以綾帊復贈辛帶有一結語辛異時有疑當發視也積二十餘年辛為謂南尉始婚裴氏洎裴生日會親賓客忽憶乞兒之言解帊復結得幅紙大如手板署曰辛祕妻河東裴氏某月日生乃其日也辛計別乞兒之日妻尚未生
