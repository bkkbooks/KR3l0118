body:
  text: 泰山老父泰山老父泰山老父者莫知姓字漢武帝東巡狩見老翁鉏於道傍頭上白光高數尺怪而問之老人狀如五十許人面有童子之色肌膚光華不與俗同帝問有何道術對曰臣年八十五時衰老垂死頭白齒落遇有道者教臣絶穀但服朮飲水並作神枕枕中有三十二物其三十二物中有二十四物以當二十四氣八毒以應八風臣行之轉老為少黑髮更生齒落復出日行三百里臣今一百八十歲矣帝受其方賜玉帛老父後入岱山中每十年五年時還鄉里三百餘年乃不復還出神仙傳巫炎巫炎字子都北海人也漢駙馬都尉武帝出見子都於渭橋其頭上鬱鬱紫氣高丈餘帝召問之君年幾何所得何術而有異氣乎對曰臣年已百三十八歲亦無所得將行詔東方朔使相此君有何道術朔對曰此君有陰道之術武帝屏左右而問之子都對曰臣年六十五時苦腰痛腳冷不能自溫口乾舌苦滲涕出百節四肢疼痛又痹不能久立得此道以來七十三年今有子二十六人身體雖明鈔本陳校本雖作強勇無所疾患氣力乃如壯時無所憂患帝曰卿不仁有道而不聞於朕非忠臣也子都對曰臣誠知此道為真然陰陽之事宮中之利臣子之所難言又行之皆逆人情能為之者少故不敢以聞帝曰勿謝戲君耳遂受其法子都年二百歲服餌水銀白日升天武帝頗行其法不能盡用之然得壽最長於先帝也出神仙傳劉憑劉憑者沛人也有軍功封壽光金鄉侯學道於稷丘子常服石桂英及中嶽石硫黃年三百餘歲而有少容尤長於禁氣嘗到長安諸賈人聞憑有道乃往拜見之乞得侍從求見祐護憑曰可耳又有百餘人隨憑行並有雜貨約直萬金乃於山中逢賊數百人拔刃張弓四合圍之憑語賊曰汝輩作人當念溫良若不能展才布德居官食祿當勤身苦體夫何有靦面目豺狼其心相教賊道危人利己此是伏尸都市肉饗烏鳶之法汝等弓箭當何所用於是賊射諸客箭皆反著其身須臾之間大風折木飛沙揚塵憑大呼曰小物輩敢爾天兵從頭刺殺先造意者憑言絶而衆兵一時頓地反手背上不能復動張口短氣欲死其中首帥三人即鼻中出血頭裂而死餘者或能語曰乞放余生改惡為善於是諸客或斫殺者憑禁止之乃責之曰本擬盡殺汝猶復不忍今赦汝猶敢為賊乎皆乞命曰便當易行不敢復耳憑乃勑天兵赦之遂各能奔走去嘗有居人妻病邪魅纍年不愈憑乃勑之其家宅傍有泉水水自竭中有一蛟枯死又有古廟廟間有樹樹上常有光人止其下多遇暴死禽鳥不敢巢其枝憑乃勑之盛夏樹便枯死有大蛇長七八丈懸其間而死後不復為患憑有姑子與人爭地俱在太守坐姑子少黨而敵家多親助為之言者四五十人憑反覆良久忽然大怒曰汝輩敢爾應聲有雷電霹靂赤光照耀滿屋於是敵人之黨一時頓地無所復知太守甚怖為之跪謝曰願君侯少寬威靈當為理斷終不使差失日移數丈諸人乃能起漢孝武帝聞之詔徵而試之曰殿下有怪輒有數十人絳衣披髮持燭相隨走馬可效否憑曰此小鬼耳至夜帝僞令人作之憑於殿上以符擲之皆面搶地以火焠口無氣帝大驚曰非此明鈔本非此作此非鬼也朕以相試耳乃解之後入太白山中數十年復歸鄉里顏色更少出神仙傳欒巴欒巴者蜀郡成都人也少而好道不修俗事時太守躬詣巴請屈為功曹待以師友之禮巴到到原作陵據明鈔本改太守曰聞功曹有道寧可試見一奇乎巴曰唯即平坐卻入壁中去冉冉如雲氣之狀須臾失巴所在壁外人見化成一虎人並驚虎徑還功曹舍人往視虎虎乃巴成也後舉孝廉除郎中遷豫章太守廬山廟有神能於帳中共外人語飲酒空中投杯人往乞福能使江湖之中分風舉帆行各相逢巴至郡往廟中便失神所在巴曰廟鬼詐為天官損百姓日久罪當治之以事付功曹巴自行捕逐若不時討恐其後遊行天下所在血食枉病良民責以重禱乃下所在推問山川社稷求鬼蹤跡此鬼於是走至齊郡化為書生善談五經太守即以女妻之巴知其所在上表請解郡守往捕其鬼不出巴謂太守賢壻非人也是老鬼詐為廟神今走至此故來取之太守召之不出巴曰出之甚易請太守筆硯設案巴乃作符符成長嘯空中忽有人將符去亦不見人形一坐皆驚符至書生向婦涕泣曰去必死矣須臾書生自齎符來至庭見巴不敢前巴叱曰老鬼何不復爾形應聲即便為一貍叩頭乞活巴勑殺之皆見空中刀下貍頭墮地太守女已生一兒復化為貍亦殺之巴去還豫章郡多鬼又多獨足鬼為百姓病巴到後更無此患妖邪一時消滅後徵為尚書郎正旦大會巴後到有酒容賜百官酒又不飲而西南向噀之有司奏巴不敬詔問巴巴曰臣鄉里以臣能治鬼護病生為臣立廟今旦有耆老皆來臣廟中享臣不能早飲明鈔本陳校本飲作委之是以有酒容臣適見成都市上火臣故漱酒為爾救之非敢不敬當請詔問虛詔抵罪乃發驛書問成都已奏言正旦食後失火須臾有大雨三陳從東北來火乃止雨著人皆作酒氣後一旦忽大風雨天地晦冥對坐不相見因失巴所在尋聞巴還成都與親故別稱不更還老幼皆於廟中送之云去時亦風雨晦冥莫知去處也出神仙傳左慈左慈字元放廬江人也明五經兼通星氣見漢祚將衰天下亂起乃嘆曰值此衰亂官高者危財多者死當世榮華不足貪也乃學道尤明六甲能役使鬼神坐致行廚精思於天柱山中得石室中九丹金液經能變化萬端不可勝記魏曹公聞而召之閉一石室中使人守視斷穀期年及出之顏色如故曹公自謂生民無不食道而慈乃如是必左道也欲殺之慈已知求乞骸骨曹公曰何以忽爾對曰欲見殺故求去耳公曰無有此意公卻高其志不苟相留也乃為設酒曰今當遠曠乞分杯飲酒公曰善是時天寒溫酒尚熱慈拔道簪以撓酒須臾道簪都盡如人磨墨初公聞慈求分杯飲酒謂當使公先飲以與慈耳而拔道簪以畫杯酒中斷其間相去數寸即飲半半與公公不善之未即為飲慈乞盡自飲之飲畢以杯擲屋棟杯懸搖動似飛鳥俯仰之狀若欲落而不落舉坐莫不視杯良久乃墜既而已失慈矣尋問之還其所居曹公遂益欲殺慈試其能免死否乃勑收慈慈走入群羊中而追者不分乃數本羊果餘一口乃知是慈化為羊也追者語主人意欲得見先生暫還無怯也俄而有大羊前跪而曰為審爾否吏相謂曰此跪羊慈也欲收之於是群羊咸向吏言曰為審爾否由是吏亦不復知慈所在乃止後有知慈處者告公公又遣吏收之得慈慈非不能隱故示其神化耳於是受執入獄獄吏欲拷掠之戶中有一慈戶外亦有一慈不知孰是公聞而愈惡之使引出市殺之須臾忽失慈所在乃閉市門而索或不識慈者問其狀言眇一目著青葛巾青單衣見此人便收之及爾一市中人皆眇目著葛巾青衣卒不能分公令普逐之如見便殺後有人見知便斬以獻公公大喜及至視之乃一束茅驗其尸亦亡處所後有人從荊州來見慈刺史劉表亦以慈為惑衆擬收害之表出耀兵慈意知欲見其術乃徐徐去因又詣表云有薄禮願以餉軍表曰道人單僑吾軍人衆安能為濟乎慈重道之表使視之有酒一斗器盛脯一束而十人共舉不勝慈乃自出取之以刀削脯投地請百人奉酒及脯以賜兵士酒三杯脯一片食之如常脯味凡萬餘人皆周足而器中酒如故脯亦不盡坐上又有賓客千人皆得大醉表乃大驚無復害慈之意數日乃委表去入東吳有徐墮者有道術居丹徒慈過之墮門下有賓客車牛六七乘欺慈云徐公不在慈知客欺之便去客即見牛在楊樹杪行適上樹即不見下即復見行樹上又車轂皆生荊棘長一尺斫之不斷推之不動客大懼即報徐公有一老翁眇目吾見其不急之人因欺之云公不在去後須臾牛皆如此不知何等意公曰咄咄此是左公過我汝曹那得欺之急追可及諸客分布逐之及慈羅布叩頭謝之慈意解即遣還去及至車牛等各復如故慈見吳主孫討逆復欲殺之後出游請慈俱行使慈行於馬前欲自後刺殺之慈在馬前著木履掛一竹杖徐徐而行討逆著鞭策馬操兵逐之終不能及討逆知其有術乃止後慈以意告葛仙公言當入霍山合九轉丹遂乃仙去出神仙傳大茅君大茅君盈南至句曲之山漢元壽二年八月己酉南嶽真人赤君西城王君及諸青童並從王母降於盈室頃之天皇大帝遣繡衣使者冷廣子期賜盈神璽玉章大微帝君遣三天左宮御史管修條賜盈八龍錦與紫羽華衣太上大道君遣協晨大夫叔門賜盈金虎真符流金之鈴金闕聖君命太極真人正一止玄王郎王忠鮑丘等賜盈以四節咽胎流明神芝四使者授訖使盈食芝佩璽服衣玉冠帶符握鈴而立四使者告盈曰食四節隱芝者位為真卿食金闕玉芝者位為司命食流明金英者位為司祿食長曜雙飛者位為司命真伯食夜光洞草者總主在左御史之任子盡食之矣壽齊天地位為司命上真東嶽上卿統吳越之神仙綜江左之山源矣言畢使者俱去五帝君各以方面車服降於其庭傳太帝之命賜紫玉之版黃金刻書九錫之文拜盈為東嶽上卿司命真君太元真人事畢俱去王母及盈師西城王君為盈設天廚酣宴歌玄靈之曲宴罷王母攜王君及盈省顧盈之二弟各授道要王母命上元夫人授茅固茅衷太霄隱書丹景道精等四部寶經王母執太霄隱書命侍女張靈子執交信之盟以授於盈固及衷事訖西王母升天而去其後紫虛元君魏華存夫人請齊於陽洛之山隱元之臺西王母與金闕聖君降於臺中乘八景之輿同詣清虛上宮傳玉清隱書四卷以授華存是時三元夫人馮雙珠紫陽左仙公石路成太極高仙伯延蓋公子西城真人王方平太虛真人南嶽真人赤松子桐柏真人王喬等三十餘真各歌太極陰歌之曲王母為之歌曰駕我八景輿歘然入玉清龍群拂霄上虎斾挕朱兵逍遙玄津際萬流無暫停哀此去留會劫盡天地傾當尋無中景不死亦不生體彼自然道寂觀合太冥南嶽擬貞幹玉英耀頴精有任靡其事虛心自受靈嘉會降河曲相與樂未央王母歌畢三元夫人答歌亦畢王母及三元夫人紫陽左公太極仙伯清靈王君乃攜南嶽魏華存同去東南行俱詣天台霍山過句曲之金壇宴太元真人茅升明鈔本陳校本許刻本升作叔申於華易洞天留華存於霍山洞宮玉宇之下衆真皆從王母升還龜臺矣出集仙傳
