body:
  text: 侯白侯白隋侯白州舉秀才至京機辨捷時莫之比嘗與僕射越國公楊素並馬言話路傍有槐樹憔悴死素乃曰侯秀才理道過人能令此樹活否曰能素云何計得活曰取槐樹子於樹枝上懸著即當自活素云因何得活答曰可不聞論語云子在回何敢死素大笑開皇中有人姓出名六斤欲參素齎名紙至省門遇白請為題其姓乃書曰六斤半名既入素召其人問曰卿姓六斤半答曰是出六斤曰何為六斤半曰向請侯秀才題之當是錯矣即召白至謂曰卿何為錯題人姓名對云不錯素曰若不錯何因姓出名六斤請卿題之乃言六斤半對曰向在省門會卒無處見稱既聞道是出六斤斟酌只應是六斤半素大笑之素關中人白山東人素嘗卒難之欲其無對而關中下俚人言音謂水為霸山東亦言擎將去為搩音其朝反刀去素嘗戲白曰山東固多仁義借一而得兩曰若為得兩答曰有人從其借弓者乃曰搩刀去豈非借一而得兩白應聲曰關中人亦甚聰明問一知二素曰何以得知白曰有人問比來多雨渭水漲否答曰霸長豈非問一知二素於是伏其辨捷白在散官隸屬楊素愛其能劇談每上番日即令談戲弄或從旦至晚始得歸才出省門即逢素子玄感乃云侯秀才可以玄惑説一箇好話白被留連不獲已乃云有一大蟲欲向野中覓肉見一刺蝟仰臥謂是肉臠欲銜之忽被蝟卷著鼻驚走不知休息直至山中因乏不覺昏睡刺蝟乃放鼻而去大蟲忽起歡喜走至橡樹下低頭見橡斗乃側身語云旦來遭見賢尊願郎君且避道素與白劇談因曰今有一深坑可有數百尺公入其中若為得出白曰入中不須餘物唯用一針即出素曰用針何為答曰針頭中令水飽坑拍浮而出素曰頭中何處有爾許水白曰若無爾許水何因肯入爾許深坑素又謂白曰僕為君作一謎君射之不得遲便須罰酒素曰頭長一分眉長一寸未到日中已打兩頓白應聲曰此是道人素曰君須作謎亦不得遲白即云頭長一分眉長一寸未到日中已打兩頓素曰君因何學吾作道人談白曰此是阿歷素大笑白仕唐嘗與人各為謎白云必須是實物不得虛作解釋浪惑衆人若解訖無有此物即須受罰白即云背共屋許大肚共碗許大口共盞許大衆人射不得皆云天下何處有物共盞許大口而背共屋許大者定無此物必須共賭白與衆賭訖解云此是胡燕窠衆皆大笑又逢衆宴衆皆笑白後至俱令作謎必不得幽隱難識及詭譎希奇亦不假合而成人所不見者白即應聲云有物大如狗面貌極似牛此是何物或云是麞或云是鹿皆云不是即令白解云此是犢子白又與素路中遇胡負青草而行素曰長安路上乃見青草湖須臾又有兩醉胡衣孝重服騎馬而走俄而一胡落馬白曰真所謂孝乎惟孝有之矣白初未知名在本邑令宰初至白即謁謂知識曰白能令明府作狗吠曰何有明府得遣作狗吠誠如言我輩輸一會飲食若妄君當輸於是入謁知識俱門外伺之令曰君何須得重來相見白曰公初至民間有不便事望咨公公未到前甚多賊盜請命各家養狗令吠驚自然賊盜止息令曰若然我家亦須養能吠之狗若為可得白曰家中新有一群犬其吠聲與餘狗不同曰其聲如何答曰其吠聲怮怮者明鈔本者作怮令曰君全不識好狗吠聲好狗吠聲當作號號怮怮聲者全不是能吠之狗伺者聞之莫不掩口而笑白知得勝乃云若覔如此能吠者當出訪之遂辭而出出啓顏録盧嘉言隋盧嘉言就寺禮拜因入僧房一僧善於論議嘉言即與談話因相戲弄此僧理屈同坐二僧即助此僧酬對往復數回三僧並屈嘉言乃笑謂曰三箇阿師並不解樗蒱僧未喻嘉言即報言可不聞樗蒱人云三箇禿不敵一個盧觀者大笑僧無以應出啓顏録陸操隋七兵尚書河間陸操無姿貌有辨嘗新婚太子少保趙郡李謂之曰屢逢射雉幾度啓顏操曰息媯二子不言不笑出談藪薛道衡隋前內史侍郎薛道衡以醴和麥粥食之謂盧思道曰禮之用和為貴先王之道斯為美思道答曰知和而和不以禮節之亦不可行也出談藪隋河間郡劉焯之明鈔本無之字從姪炫並有儒學俱犯法被禁縣吏不知知字原闕據明鈔本黃本補其大儒也咸與之枷著焯曰終日枷中坐而不見家炫曰亦終日負枷坐而不見婦出啓顏録山東人山東人娶蒲州女多患癭其妻母項癭甚大成婚數月婦家疑壻不慧婦翁置酒盛會親戚欲以試之問曰某郎在山東讀書應識道理鴻鶴能鳴何意曰天使其然又曰松柏冬青何意曰天使其然又曰道邊樹有骨𩨳何意曰天使其然婦翁曰某郎全不識道理何因浪住山東因以戲之曰鴻鶴能鳴者頸項長松柏冬青者心中強道邊樹有骨𩨳者車撥傷豈是天使其然壻曰請以所聞見奉酬不知許否曰可言之壻曰蝦蟆能鳴豈是頸項長竹亦冬青豈是心中強夫人項下癭如許大豈是車撥傷婦翁羞愧無以對之出啓顏録吃人隋朝有人敏慧然而口吃楊素每間悶即召與劇談嘗歲暮無事對坐因戲之云有大坑深一丈方圓亦一丈遣公入其中何法得出此人低頭良久乃問云有梯出否素云只論無梯若論有梯何須更問其人又低頭良久問曰白白白白日夜夜夜夜地素云何須云白日夜地若為得出乃云若不是夜地眼眼不瞎為甚物入入裏許素大笑又問云忽命公作軍將有小城兵不過一千已下糧食唯有數日城外被數萬人圍若遣公向城中作何謀計低頭良久問云有有救救兵否素云只緣無救所以問公沈吟良久舉頭向素云審審如如公言不免須敗素大笑又問云計公多能無種不解今日家中有人蛇蛟足若為醫治此人即應聲報云取取五月五日南牆下雪雪塗塗即即治素云五月何處得有雪答云若五月五日無雪臘月何處有蛇咬素笑而遣之出啓顏録趙小兒隋有三藏法師父本商胡法師生於中國儀容面目猶作胡人行業極高又有辨捷嘗以四月八日設齋講説時朝官及道俗觀者千餘人大德名僧官人辨捷者前後十餘人論議法師隨難即對義理不窮最後有小兒姓趙年十三即出於衆中法師辨捷既已過人又復向來皆是高明舊德忽見此兒欲來論議衆咸怪笑小兒精神自若即就座大聲語此僧昔野狐和尚自有經文未審狐作阿闍黎出何典語僧語云此郎郎原作即據明鈔本改子聲高而身小何不以聲而補身兒即應聲報云法師以弟子聲高而身小何不以聲而補身法師眼深而鼻長何不截鼻而補眼衆皆驚異起立大笑是時暑月法師左手把如意右手搖扇衆笑聲未定法師又思量答語以所搖扇掩面低頭兒又大聲語云團圓形如滿月不藏顧兔翻掩雄狐衆大笑法師即去扇以如意指麾別送問並語未得盡忽如意頭落兒即起謂法師曰如意既折義鋒亦摧即於座前長揖而去此僧既怒且慚更無以應無不驚歎稱笑出啓顏録長孫無忌唐太宗宴近臣戲以嘲謔趙公長孫無忌嘲歐陽詢曰聳膊成山字埋肩不出頭誰家麟閣上畫此一獼猴詢應曰縮縮原作索據明鈔本改頭連背暖𧚁當畏肚寒只因心溷溷所以面團團帝斂容曰歐陽詢汝豈不畏皇后聞趙公皇后之兄也出國朝雜記任瓌唐管國公任瓌酷怕妻太宗以功賜二侍子瓌拜謝不敢以歸太宗召其妻賜酒謂之曰婦人妬忌合當七出若能改行無妬則無飲此酒不爾可飲之曰妾不能改妬請飲酒遂飲之比醉歸與其家死訣其實非鴆也既不死他日杜正倫譏弄瓌瓌曰婦當怕者三初娶之時端居若菩薩豈有人不怕菩薩耶既長生男女如養兒大蟲豈有人不怕大蟲耶年老面皺如鳩盤荼鬼豈有人不怕鬼耶以此怕婦亦何怪焉聞者歡喜出御史臺記曹明鈔本曹作唐左司郎中封道弘身形長大而臠甚闊道弘將入閣奏事英公李績在後謂道弘曰封道弘你臀斟酌坐得即休何須爾許大出啓顏録李榮唐有僧法軌形容短小於寺開講李榮往共論議往復數番僧有舊作詩詠榮於高座上誦之云姓李應須李言榮又不榮此僧未及得道下句李榮應聲接曰身長三尺半頭毛猶未生四座歡喜伏其辨捷出啓顏録
