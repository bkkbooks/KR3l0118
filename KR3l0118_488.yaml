body:
  text: 鶯鶯傳鶯鶯傳唐貞元中有張生者性溫茂美風容內秉堅孤非禮不可入或朋從遊宴擾雜其間他人皆洶洶拳拳若將不及張生容順而已終不能亂以是年二十三未嘗近女色知者詰之謝而言曰登徒子非好色者是有凶行余真好色者而適不我值何以言之大凡物之尤者未嘗不留連于心是知其非忘情者也詰者識之無幾何張生遊于蒲蒲之東十余里有僧舍曰普救寺張生寓焉適有崔氏孀婦將歸長安路出于蒲亦止茲寺崔氏婦鄭女也張出于鄭緒其親乃異派之從母是歲渾瑊薨于蒲有中人丁文雅不善于軍軍人因喪而擾大掠蒲人崔氏之家財産甚厚多奴仆旅寓惶駭不知所托先是張與蒲將之黨有善請吏護之遂不及于難十余日廉使杜確將天子命以總戎節令于軍軍由是戢鄭厚張之德甚因飾饌以命張中堂宴之復謂張曰姨之孤嫠未亡提攜幼稚不幸屬師徒大潰實不保其身弱子幼女猶君之生豈可比常恩哉今俾以仁兄禮奉見冀所以報恩也命其子曰歡郎可十余歲容甚溫美次命女出拜爾兄爾兄活爾久之辭疾鄭怒曰張兄保爾之命不然爾且虜矣能復遠嫌乎久之乃至常服睟容不加新飾垂鬟接黛雙臉銷紅而已顏色艷異光輝動人張驚為之禮因坐鄭旁以鄭之抑而見也凝睇怨絶若不勝其體者問其年紀鄭曰今天子甲子歲之七月終于貞元庚辰生年十七矣張生稍以詞導之不對終席而罷張自是惑之願致其情無由得也崔之婢曰紅娘生私為之禮者數四乘間遂道其衷婢果驚沮腆然而奔張生悔之翼日婢復至張生乃羞而謝之不復云所求矣婢因謂張曰郎之言所不敢言亦不敢泄然而崔之姻族君所詳也何不因其德而求娶焉張曰余始自孩提性不苟合或時褲綺間居曾莫流盼不為當年終有所蔽昨日一席間幾不自持數日來行忘止食忘飽恐不能逾旦暮若因媒氏而娶納采問名則三數月間索我于枯魚之肆矣爾其謂我何婢曰崔之貞慎自保雖所尊不可以非語犯之下人之謀固難入矣然而善屬文往往沉吟章句怨慕者久之君試為喻情詩以亂之不然則無由也張大喜立綴春詞二首以授之是夕紅娘復至持彩箋以授張曰崔所命也題其篇曰明月三五夜其詞曰待月西廂下近風戶半開拂牆花影動疑是玉人來張亦微喻其旨是夕歲二月旬有四日矣崔之東有杏花一株攀援可逾既望之夕張因梯其樹而逾焉達于西廂則戶半開矣紅娘寢于床生因驚之紅娘駭曰郎何以至張因紿之曰崔氏之箋召我也爾為我告之無幾紅娘復來連曰至矣至矣張生且喜且駭必謂獲濟及崔至則端服嚴容大數張曰兄之恩活我之家厚矣是以慈母以弱子幼女見托奈何因不令之婢致淫逸之詞始以護人之亂為義而終掠亂以求之是以亂易亂其去幾何試欲寢其詞則保人之姦不義明之于母則背人之惠不祥將寄與婢仆又懼不得發其真誠是用托短章願自陳啓猶懼兄之見難是用鄙靡之詞以求其必至非禮之動能不愧心特願以禮自持無及于亂言畢翻然而逝張自失者久之復逾而出于是絶望數夕張生臨軒獨寢忽有人覺之驚駭而起則紅娘斂衾攜枕而至撫張曰至矣至矣睡何為哉并枕重衾而去張生拭目危坐久之猶疑夢寐然而修謹以俟俄而紅娘捧崔氏而至至則嬌羞融冶力不能運支體曩時端莊不復同矣是夕旬有八日也斜月晶瑩幽輝半床張生飄飄然且疑神仙之徒不謂從人間至矣有頃寺鐘鳴天將曉紅娘促去崔氏嬌啼宛轉紅娘又捧之而去終夕無一言張生辨色而興自疑曰豈其夢邪及明睹妝在臂香在衣淚光熒熒然猶瑩于茵席而已是后又十余日杳不復知張生賦會真詩三十韻未畢而紅娘適至因授之以貽崔氏自是復容之朝隱而出暮隱而入同安于曩所謂西廂者幾一月矣張生常詰鄭氏之情則曰我不可奈何矣因欲就成之無何張生將之長安先以情喻之崔氏宛無難詞然而愁怨之容動人矣將行之再夕不可復見而張生遂西下數月復遊于蒲會于崔氏者又纍月崔氏甚工刀札善屬文求索再三終不可見往往張生自以文挑亦不甚睹覽大略崔之出人者藝必窮極而貌若不知言則敏辨而寡于酬對待張之意甚厚然未嘗以詞繼之時愁艷幽邃恆若不識喜慍之容亦罕形見異時獨夜操琴愁弄凄惻張竊聽之求之則終不復鼓矣以是愈惑之張生俄以文調及期又當西去當去之夕不復自言其情愁歎于崔氏之側崔已陰知將訣矣恭貌怡聲徐謂張曰始亂之終棄之固其宜矣愚不敢恨必也君亂之君終之君之惠也則歿身之誓其有終矣又何必深感于此行然而君既不懌無以奉寧君常謂我善鼓琴向時羞顏所不能及今且往矣既君此誠因命拂琴鼓霓裳羽衣序不數聲哀音怨亂不復知其是曲也左右皆噓唏崔亦遽止之投琴泣下流連趨歸鄭所遂不復至明旦而張行明年文戰不勝張遂止于京因貽書于崔以廣其意崔氏緘報之詞粗載于此曰捧覽來問撫愛過深兒女之情悲喜交集兼惠花勝一合口脂五寸致耀首膏唇之飾雖荷殊恩誰復為容睹物增懷但積悲歎耳伏承使于京中就業進修之道固在便安但恨僻陋之人永以遐棄命也如此知復何言自去秋已來常忽忽如有所失于喧譁之下或勉為語笑間宵自處無不淚零乃至夢寢之間亦多感咽離憂之思綢繆繾綣暫若尋常幽會未終驚魂已斷雖半衾如暖而思之甚遙一昨拜辭倏逾舊歲長安行樂之地觸緒牽情何幸不忘幽微眷念無斁鄙薄之志無以奉酬至于終始之盟則固不忒鄙昔中表相因或同宴處婢仆見誘遂致私誠兒女之心不能自固君子有援琴之挑鄙人無投梭之拒及荐寢席義盛意深愚陋之情永謂終托豈期既見君子而不能定情致有自獻之羞不復明侍巾幘沒身永恨含歎何言倘仁人用心俯遂幽眇雖死之日猶生之年如或達士略情舍小從大以先配為丑行以要盟為可欺則當骨化形銷丹誠不泯因風委露猶托清塵存沒之誠言盡于此臨紙嗚咽情不能申千萬珍重珍重千萬玉環一枚是兒嬰年所弄寄充君子下體所佩玉取其堅潤不渝環取其終使不絶兼亂絲一絇文竹茶碾子一枚此數物不足見珍意者欲君子如玉之真弊志如環不解淚痕在竹愁緒縈絲因物達情永以為好耳心邇身遐拜會無期幽憤所鐘千里神合千萬珍重春風多厲強飯為嘉慎言自保無以鄙為深念張生發其書于所知由是時人多聞之所善楊巨源好屬詞因為賦崔娘詩一絶云清潤潘郎玉不如中庭蕙草雪銷初風流才子多春思腸斷蕭娘一紙書河南元稹亦續生會真詩三十韻詩曰微月透簾櫳螢光度碧空遙天初縹眇低樹漸蔥朧龍吹過庭竹鸞歌拂井桐羅綃垂薄霧環珮響輕風絳節隨金母云心捧玉童更深人悄悄晨會雨濛濛珠瑩光文履花明隱繡龍瑤叉行彩鳳羅帔掩丹虹言自瑤華浦將朝碧玉宮因遊洛城北偶向宋家東戲調初微拒柔情已暗通低鬟蟬影動回步玉塵蒙轉面流花雪登床抱綺叢鴛鴦交頸舞翡翠合歡籠眉黛羞偏聚唇朱暖更融氣清蘭蕊馥膚潤玉肌丰無力傭移腕多嬌愛斂躬汗流珠點點發亂緑蔥蔥方喜千年會俄聞五夜窮留連時有恨繾綣意難終慢臉含愁態芳詞誓素衷贈環明運合留結表心同啼粉流宵鏡殘燈遠暗蟲華光猶苒苒旭日漸瞳瞳乘鶩還歸洛吹簫亦上嵩衣香猶染麝枕膩尚殘紅冪冪臨塘草飄飄思渚蓬素琴鳴怨鶴清漢望歸鴻海闊誠難渡天高不易沖行云無處所蕭史在樓中張之友聞之者莫不聳異之然而張志亦絶矣稹特與張厚因征其詞張曰大凡天之所命尤物也不妖其身必妖于人使崔氏子遇合富貴乘寵嬌不為云不為雨為蛟為螭吾不知其所變化矣昔殷之辛周之幽據百萬之國其勢甚厚然而一女子敗之潰其衆屠其身至今為天下僇笑豫之德不足以勝妖孽是用忍情于時坐者皆為深歎后歲余崔已委身于人張亦有所娶適經所居乃因其夫言于崔求以外兄見夫語之而崔終不為出張怨念之誠動于顏色崔知之潛賦一章詞曰自從消瘦減容光萬轉千回懶下床不為旁人羞不起為郎憔悴卻羞郎竟不之見后數日張生將行又賦一章以謝絶云棄置今何道當時且自親還將舊時意憐取眼前人自是絶不復知矣時人多許張為善補過者豫常與朋會之中往往及此意者夫使知者不為為之者不惑貞元歲九月執事李公垂宿于豫靖安里第語及于是公垂卓然稱異遂為鶯鶯歌以傳之崔氏小名鶯鶯公垂以命篇
