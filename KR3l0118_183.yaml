body:
  text: 劉鄴劉鄴劉鄴字漢藩咸通中自長春宮判官召入內庭特賜及第韋保義以兄在相位應舉不得特賜及第擢入內庭出摭言葉京建州人也極有賦名向遊大梁常預公宴因與監軍使面熟及至京師時已遂登科與同年連鑣而行逢其人於通衢馬上相揖因之謗議喧然後頗至沈棄終於太學博士出摭言李藹李藹應舉功勤敏妙絕倫人謂之束翅鷂子咸通二年及第出盧氏雜說房珝河南人太尉之孫咸通四年垂成而敗先是名第定矣無何寫試之際仰泥土落擊翻硯瓦污試紙珝以中表重地祗薦珝一人主事不獲已須應之珝既臨曙更請印副試主司不諾遂罷出摭言汪遵許棠宣州涇縣人早修舉業鄉人汪遵者幼為小吏洎棠應二十餘舉遵猶在胥徒然善為絕句詩而深晦密一旦辭役就貢會棠送客至灞滻忽遇遵於途中棠訊之曰汪都都者吏之呼也何事至京遵對曰此來就貢棠怒曰小吏無禮而果與棠同硯席棠甚侮之後遵成名五年棠始及第出摭言劉允章劉允章題目天下為家賦給事中杜裔體按唐摭言十三體作休進疏論事雖不行時以為當崔澹至仁伐不仁賦亦頗招時議薛耽盛德日新賦韻腳云循乃無已劉子震通狀請改為修字當時改正出盧氏雜說王凝王凝清族重德冠絕當時每就寢息必叉手而臥或慮夢中見其先祖曾牧絳州於時司空圖方應進士舉自別墅到郡謁見後更不訪親知閽吏遽申司空秀才出郭矣或入郭訪親知即不造郡齊王知之謂其專敬愈重之及知舉司空一捷列第四人登科同年訝其名姓甚暗成事太速有浮薄者號之為司徒空王知有此說因召一牓門生開筵宣言於眾曰某切忝文柄今年牓貼全為司空先輩一人而已由是圖聲彩益振出北夢瑣言盧尚卿咸通十一年以龐勛盜據徐州久屯戎卒連年飛輓物力方虛因詔權停貢舉一年是歲進士盧尚卿自遠至關聞詔而迴乃賦東歸詩曰九重丹詔下塵埃深璅文闈罷選才桂樹放教遮月長杏園終待隔年開自從玉帳論兵後不許金門諫獵來今日霸陵橋上過關人應笑臘前迴出年號記李堯李堯及第在偏侍下俯逼起居宴霖雨不止因遣賃油幕以張去聲之堯先人舊廬昇平里凡用錢七百緡自所居連亘通衢迨之一里餘參御輩不啻千餘人韉馬車輿闐咽門巷往來無有霑濕者而金壁照耀別有嘉致堯時為丞相韋保衡所委干預政事號為李八郎其妻又南海韋宙女恒資之金帛不可勝紀出摭言高湜咸通十二年禮部侍郎高湜知舉牓內孤貧貧原作平據明鈔本改者公乘億有賦三百首人多書於壁許棠有洞庭詩尤工時人謂之許洞庭最者有聶夷中少貧苦精於古體有公子家詩云種花滿西園花發青樓道花下一禾生去之為惡草又詠田家詩云父耕原上田子斸山下荒六月禾未秀官家已修倉又云鉏田當日午汗滴禾下土誰念盤中餐粒粒皆辛苦又云二月賣新絲五月糶新穀醫得眼前瘡剜却心頭肉我願君王心化為光明燭不照綺羅筵只照逃亡屋所謂言近意遠合三百篇之旨也出摭言公乘億魏人也以詞賦著名咸通十三年垂三十舉矣嘗大病鄉人誤傳已死其妻自河北來迎喪會億送客至坡下遇其妻始夫妻闊別積十餘歲億時在馬上見一婦粗纕跨驢依稀與妻類因睨之不已妻亦如是乃令人詰之果億內子與之相持而泣路人嘆異之後旬日億登第矣出摭言孫龍光崔殷夢下狀元及第前一年嘗夢積木數百龍光踐履往復既而請一李處士圓之處士曰賀郎君喜來年必是狀元何者已居眾材之上出摭言王璘長沙日試萬言王璘詞學富贍非積學所致崔詹事廉問持表薦之於朝先是試之於使院璘請書吏十人皆給几硯璘袗絺捫腹往來口授十吏筆不停輟首題黃河賦三十字數刻而成又鳥散餘花落詩三十首援毫而就時忽風雨暴至數幅為迴飆所卷泥滓霑漬不勝舒卷璘曰勿取但將紙來復縱筆一揮斯須復十餘篇矣時未停午已積七千餘言崔公語試官曰萬言不在試限但請召來飲酒黃河賦復有僻字百餘請璘對眾朗宣旁若無人至京時路巖方當軸遣一介召之璘意在沽激曰請俟見帝巖聞之大怒亟命奏廢萬言科璘杖策而歸放曠於杯酒間雖屠沽無間然矣出摭言蔣凝乾符中蔣凝應宏宏原作寵據明鈔本改詞為賦止及四韻遂白而去試官不之信逼請所謂凝以實告既而比之諸公凝有德色試官歎息久之頃刻之間播於人口或稱之曰白頭花鈿滿面不若徐妃半粧出摭言吳融吳融字子華廣明中和間久負屈聲雖未擢第同人率多執贄謁之如先達有王圖者工詞賦投卷凡旬月融既見之殊不言圖之臧否但問圖曰吏明鈔本吏作向曾得盧休信否何堅臥不起惜哉融所得不如他休圖之中表長於八韻向與融同硯席晚年拋廢歸鏡中別墅出摭言盧光啟盧光啟先人伏法光啟兄弟修飾赴舉謂親知曰此乃開荒也然其立性周謹著初舉子一卷即進取諸事皆此類也策名後揚歷臺省受知於租庸張濬濬出征并汾盧每致書疏凡一事別為一幅朝士至今學之蓋重疊別紙自光啟始也唐末舉人不問事行文藝但勤於請謁號曰精切亦皆法於光啟爾其族弟汝弼嘗為張濬出征判官傳檄四方其略云致赤子之流離自朱耶之版蕩自謂人曰天生朱耶赤子供我之筆也出北夢瑣言王彥昌王彥昌太原人家世簪冕推於鼎甲廣明歲駕幸西蜀敕賜及第後為嗣薛王知柔判官昭宗幸石門時宰臣學士不及隨駕知柔以京兆尹權中書事屬近輔表章繼至勤於批答知柔以彥昌名聞遂命權知學士居半歲出拜京兆尹加左常侍大理卿為寺胥所累南遷出摭言杜昇杜昇父宣猷終宛陵昇有詞藻廣明歲蘇導給事刺劍州昇為軍卒駕幸西蜀例得召見特敕賜緋導尋入內庭韋中令自翰長拜主文昇時已拜小諫抗表乞就試從之登第數日有敕復前官并并原作拜據明鈔本陳校本改服色議者榮之出摭言昇自拾遺賜緋却應舉及第又拾遺時號著緋進士出盧氏雜說鄭昌圖廣明年中鳳翔副使鄭侍郎昌圖未及第前嘗自任以廣度弘襟不拘小節出入遊處悉恣情焉洎至輿論喧然且欲罷舉其時同里有親表家僕自宋亳莊上至告其主人云昨過洛京於穀水店邊逢見二黃衣使人西來某遂與同行至華嶽廟前二黃衣使與某告別相揖於店後面謂某曰君家郎君應進士舉無無原作元據明鈔本陳校本改僕曰我郎主官已高諸郎君見修學次又問曰莫親戚家兒郎應無曰有使人曰吾二人乃是今年送牓之使也自泰山來到金天處押押原作抑據明鈔本改署其牓子幸相遇僕遂請竊窺其牓使者曰不可汝但記之遂畫其地曰此年狀頭姓偏傍有阝名兩字下一字在口中牓尾之人姓偏傍亦有此阝名兩字下一字亦在口中記之記之遂去鄭公親表頗異其事遂訪岐副具話之具勉以就試昌圖其年狀頭及第牓尾鄒希回也姓名畫點皆同出玉堂閑語又咸通中以進士車服僭差不許乘馬時場中不減千人誰勢可熱手亦皆騎驢或嘲之曰今年敕下盡騎驢短袖長鞦滿九衢清瘦兒郎猶自可就中愁殺鄭昌圖相國魁偉甚故有此句出摭言程賀唐崔亞郎中典眉州程賀以鄉役充廳僕其弟在州曹為小書吏崔公見賀風味有似儒生因詰之曰爾讀書乎賀降階對曰薄涉藝文崔公指一物俾其賦詠雅有意思因令歸選日裝寫所業執贄甚稱獎之俾稱進士依崔之門更不他岐凡二十五舉及第每入京館於博陵之第常感提拔之恩亞卒之日賀為崔公衰服三年人皆美之出北夢瑣言陳嶠陳嶠謁安陸鄭諴三年方一相面從容諴謂嶠曰識閔廷言否嶠曰偶未知聞諴曰不妨與之往還其人文似西漢出摭言秦韜玉秦韜玉出入田令孜之門車駕幸蜀韜玉已拜丞郎判鹺及小歸公主文韜玉准敕放第仍編入其年牓中韜玉致書謝新人皆呼同年略曰三條燭下雖阻文闈數仞墻邊幸同恩地出摭言陸扆陸扆舉進士屬僖宗幸梁洋隨駕至行在與中書舍人鄭損同止逆旅扆為宰相韋昭度所知欲身事之速了屢告昭度昭度曰奈已深夏復使何人為主司扆以鄭損對昭度從之因令扆致意牓帖皆扆自定其年六月狀頭及第後在翰林署時苦熱同列戲之曰今日好造牓矣然扆名冠一時兄弟三人時謂三陸希聲及威也出北夢瑣言張曙張曙崔昭緯中和初西川同舉相與詣日者問命時曙自恃才名籍甚人皆目為將來狀元崔亦分居其下無何日者殊不顧曙第目崔曰將來萬全高第曙有慍色日者曰郎君亦及第然須待崔家郎君拜相當此時過堂既而曙果以慘恤不終場昭緯其年首冠曙以篇什刺之曰千里江西陪驥尾五更風小失龍鱗昨夜浣花溪上雨綠楊芳草為何人崔甚不平會夜飲崔以巨觥飲張張推辭再三崔曰但喫却待我作宰相與郎君取狀頭張拂衣而去因之大不叶後七年崔自內廷大拜張後於裴贄下及第果於崔下過堂出摭言崔昭矩大順中裴贄下狀元及第翌日兄昭緯登庸王倜丞相魯公損之子倜及第翌日損登庸倜過堂別見歸點按唐摭言八點作黯親迎拜席曰狀元及第牓下版巡脫白期月無疾而卒出摭言賈泳賈泳父修有義聲泳落拓不拘細碎嘗佐武臣倅晉州時昭宗幸蜀三牓裴相贄時為前主客員外客游至郡泳接之傲睨裴嘗簪笏造泳泳戎裝一揖曰主公尚書邀放鷂子勿怪如此偬偬而退裴贄頗銜之後裴三主文柄泳兩舉為裴所黜既而謂門人曰賈泳老倒可哀吾當報之以德遂放及第出摭言
