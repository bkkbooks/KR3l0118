body:
  text: 麻秋麻秋後趙石勒將麻秋者大原胡人也植性虓險鴆毒有兒啼母輒恐之麻胡來啼聲絶至今以為故事宋幼帝明帝崩昱嗣位是為幼帝幼帝狂暴恣行誅戮出入無度從者並執鋌矛錐鋸自隨有忤意擊腦椎陰刺心剖腹之誅日有數十孝武帝二十八子明帝殺其十六餘皆帝殺之子孫無在朝者高洋北齊高洋以光武中興為誅劉氏不盡於是大誅諸元死者千餘棄之漳水有捕魚者得爪甲為之元郎魚人不忍食之唯元巒元長春元景安三家免誅巒以其女為常山王妃春安等以其多力善射故也景安兄景皓曰寧為玉碎不作瓦全景安奏其言帝復殺之自是元氏子孫老幼貴賤無遺矣南陽王北齊南陽王入朝上問何以為樂王曰致蠍最樂遂收蠍一宿得五斗置大浴斛中令一人脫衣而入被蠍所螫宛轉號叫苦痛不可言食頃而死帝與王看之極喜朱粲隋末荒亂狂賊朱粲起于襄鄧間歲飢米斛萬錢亦無得處人民相食粲乃驅男女小大仰一大銅鍾可二百石煮人肉以餧賊生靈殲于此矣陳承親周恩州刺史陳承親嶺南大首領也專使子弟兵劫江有一縣令從安南來承親憑買二婢令有難色承親每日重設邀屈甚殷勤送別江亭即遣子弟兵從後劫殺盡取財務將其妻及女至州妻叩頭求作婢不許亦縊殺之取其女前後官人家過承親禮遇厚者必隨後劫殺無有免者薛震周杭州臨安尉薛震好食人肉有債主及奴詣臨安於客舍遂飲之醉殺而臠之以水銀和煎並骨消盡後又欲食其婦婦覺而遁縣令詰得其情申州録事奏奉敕杖殺之陳元光周嶺南首陳元光設客令一袍袴行酒光怒令曳出遂殺之須臾爛煮以食諸客後呈其二手客懼攫喉而吐獨狐莊周瀛州刺史獨孤莊酷虐有賊問不承莊引前曰若健兒一一具吐放汝遂還巾帶賊並吐之諸官以為必放頃莊曰將我作具來乃一鐵鉤長尺餘甚銛利以繩掛於樹間謂賊曰汝不聞健兒鉤下死令以胲鉤之遣壯士掣其繩則鉤出於腦矣謂司法曰此法何如答曰弔民伐罪深得共宜莊大笑後莊左降施州刺史染病唯憶人肉部下有奴婢死者遣人割肋下肉食之歲餘卒索元禮周推事使索元禮時人號為索使訊囚作鐵籠頭𧤴其頭仍加楔焉多至腦裂髓出又為鳳晒翅彌猴鑽火等以椽關手足而轉之並研骨至碎又懸囚於梁下以石縋頭其酷法如此元禮故胡人薛師之假父後坐髒賄流死嶺南羅織人周來俊臣羅織人罪皆先進狀敕依奏即籍沒徐有功出死囚亦先進狀某人罪合免敕依然後斷雪有功好出罪皆先奉進止非是自專張湯探人主之情蓋為此也元楷唐羽林將元楷三代告密得官男彥瑋告劉城之破家彥瑋處侍御先天二年七月三日楷以反逆誅家口配嶺南所謂積惡之家必有餘殃也武承嗣周補闕喬知之有婢碧玉姝艷能歌舞有文章知之特幸為之不婚僞魏王武承嗣暫借教姬人粧梳納之更不放還知之乃作緑珠怨以寄之焉其詞曰石家金谷重新聲明珠十斛買娉婷此日可憐偏自許此時歌舞得人情君家閨閣不曾觀好將歌舞借人看意氣雄豪非分理驕矜勢力橫相干辭君去君終不忍徒勞掩袂傷鉛粉百年離恨在高樓一代容顏為君盡碧玉得詩飲泣不食三日投井而死承嗣出其尸于裙帶上得詩大怒乃諷羅織人告之遂斬知之于南市破家籍沒張易之兄弟周張易之為控鶴監弟昌宗為祕書監昌儀為洛陽令競為豪侈易之為大鐵籠置鵝鴨于其內當中爇炭火銅盆貯五味汁鵝鴨繞火走渴即飲汁火炙痛旋轉表裏皆熟毛落盡肉赤烘烘乃死昌宗活係驢于小室內爇炭火置五味汁如前法昌儀取鐵橛釘入地縛狗四足于橛上放鷹鷂活按共肉食肉盡而狗未死號叫酸楚不復忍聽易之曾過昌儀憶馬腸儀取從騎破肋取腸良久方死後誅易之昌宗等百姓臠割其肉肥白如豬肪煎炙而食昌儀打雙腳折抉取心肝而後死斬其首送都時云狗馬報郝象賢處俊孫也武后宿怒其祖戮及其孫象賢臨刑極罵而死自此法司恐是將殺人必先以木丸塞口然後加刑周興周秋官侍郎周興推劾殘忍法外苦楚無所不為時人號牛頭阿婆百姓怨謗興乃榜門判曰被告之人問皆稱枉斬決之後咸悉無言侯思止周侍御史侯思止醴泉賣餅食人也羅告准例酬五品于上前索御史上曰卿不識字對曰獬豸豈識字但為國觸罪人而已遂授之凡推勘殺戮甚衆更無餘語唯謂囚徒曰不用你書言筆語止還我白司馬若不肯來俊即與你孟青橫遭苦楚非命者不可勝數白司馬者北邙山白司馬坂也來俊者中丞來俊臣也孟青者將軍孟青棒也後坐私畜錦朝堂決殺之來俊臣雍人也父操松州長史俊臣少詭譎無賴反覆險詖殘忍荒慝舉世無比則天朝羅告諸王貴臣授朝散大夫拜侍御史按制獄少不會意者必牽引之前後坐族滅千餘家朝廷纍息無敢言者道路以目與侍御史王弘義侯思止腹心羅告衣冠無間春夏誅斬人不絶時于麗景門內置制獄亦號為新開門但入新開門百不全一弘義戲謂麗景門為例竟門言入此門例竟也俊臣與其黨朱南山等十餘輩造告密羅織經數十言皆有條貫支節張本布置事狀由緒令其黨告之或投匭以聞則天多委俊臣按問俊臣別造枷號為突地吼遭其枷者輪轉于地斯須悶絶矣又作枷有十號棒名見即承復有鐵圈籠頭當訊囚圈中下楔其餘名號數十大略如此也囚人無貴賤必先例枷棒于地召囚前曰此是作具見之魂膽飛越無不自誣者則天重其爵賞以酬之故更競勸為酷矣由是告密之徒紛然道路名流僶俯閲日而已朝士因朝默遭掩襲至於族滅與其家訣曰不知重相見否天授中春官尚書狄仁傑天官侍郎任令暉文昌右丞盧獻等五人並為其羅告俊臣既以族人家為功欲引人承反乃奏請降敕一問既承同首例得減死以脅仁傑等令承反傑欸曰大周革命萬物惟新唐室舊臣某從誅戮反是實俊臣乃少寬之其判官王德壽謂傑曰尚書事已爾且得減死壽今業已受驅策意欲求少階級憑尚書牽楊執柔可乎傑曰若之何壽曰尚書昔在春官執柔任某司員外引之可也傑曰皇天后土遣狄仁傑行此事耶以頭觸柱血流被面德壽懼而謝焉仁傑既承反所司待日行刑不復嚴防得憑首者求筆硯折被頭帛書之敘冤苦置于綿衣中遣謂德壽曰時方熱請赴家人去其綿德壽不復疑也家人得衣中書傑子光遠持之稱變得召見則天覽之惘然召問俊臣曰卿言仁傑等承反今其子弟訟冤何也俊臣曰此等何能自伏其罪臣寢處之甚安亦不去其巾帶則天令通事舍人周綝往視之俊臣遂命獄人令假傑等巾帶行立於西命綝視之懼俊臣莫敢西顧但視東唯諾而已俊臣令綝少留附進狀乃令判官妄為傑等作謝死表代署而進之鳳閣侍郎樂思誨男年八九歲其家已族且隸于司農上變得召見言俊臣等苛毒願陛下假條反狀以付之無大小皆如狀矣則天意少解乃召見傑等曰卿承反何也傑等曰向不承已死于枷棒矣則天曰何為作謝死表傑等曰無因以表示之乃知其代署因釋此五家俊臣復奏大將軍張乾勗大將軍給使范雲仙于洛陽牧院虔勗等不堪苦自訟于國有功言辭頗厲俊臣命衛士亂刀斫殺之雲仙亦言歷事先朝稱使司冤苦俊臣命截去其舌士庶破膽無敢言者俊臣纍坐贓出同州參軍逼奪同列參軍妻仍辱其母莫敢言者尋授河南尉纍遷太僕卿則天賜其奴婢十人當授于司農時西番酋長大將軍斛瑟羅家有細婢善歌舞俊臣且止司農賜令其黨羅告斛瑟羅反將圖其婢諸酋長詣闕割耳剺面訟冤者數十人乃得不族時綦連耀與劉思禮等有議長安尉吉頊知之以語俊臣俊臣發之連坐族者數十俊臣恃擅其功復羅遘頊頊得召見庭訴僅而免俊臣先逼取太原王慶詵女俊臣素與河東衛遂忠有舊忠名行雖不著然好學有詞辨酒酣詣俊臣俊臣方與妻族宴集應門者妄云已出矣遂忠知妄入其家慢罵辱之俊臣恥其親族命毆擊反接既而免之自此構隙俊臣將羅告武氏諸僞王及太平公主張易之等遂忠發之則天屢保持而諸武及公主可懼共毀之乃棄市國人無少長皆怨恨競剮其肉斯須而盡則天覺悟降敕曰來俊臣閭巷小人輕險有素以其頗申糾謫當謂微效欸誠諸王等磐石宗枝必期毀敗南北衙文武將相咸擬傾危宜加赤族之誅以雪蒼生之憤既族之無問士庶男女相慶于道路咸曰自此後臥乃背得著床不爾朝不謀夕矣
