body:
  text: 李泌李泌李泌字長源趙郡中山人也六代祖弼唐太師父承休唐吳房令休娶汝南周氏初周氏尚幼有異僧僧伽泗上來見而奇之且曰此女後當歸李氏而生三子其最小者慎勿以紫衣衣之當起家金紫為帝王師及周氏既娠泌凡三周年方寤而生泌生而髮至於眉先是周每産必纍日困憊唯娩泌獨無恙由是小字為順泌幼而聰敏書一覽必能誦六七歲學屬文開元十六年玄宗御樓大酺夜於樓下置高坐召三教講論泌姑子員俶年九歲潛求姑備儒服夜升高坐詞辨鋒起談者皆屈玄宗奇之召入樓中問姓名乃曰半千之孫宜其若是因問外更有奇童如兒者乎對曰舅子順年七歲能賦敏捷問其宅居所在命中人潛伺於門抱之以入戒勿令其家知玄宗方與張説觀棊中人抱泌至俶與劉晏偕在帝側及玄宗見泌謂説曰後來者與前兒絶殊儀狀真國器也説曰誠然遂命説試為詩即令詠方圓動靜泌曰願聞其狀説應曰方如棊局圓如棊子動如棊生靜如棊死説以其幼仍教之曰但可以意虛作不得更實道棊字泌曰隨意即甚易耳玄宗笑曰精神全大於身泌乃言曰方如行義圓如用智動如逞才靜如遂意説因賀曰聖代嘉瑞也玄宗大悅抱於懷撫其頭命果餌啖之遂送忠王院兩月方歸仍賜衣物及綵數十且諭其家曰年小恐於兒有損未能與官當善視之乃國器也由是張説邀至其宅命其子均垍相與若師友情義甚狎張九齡賀知章張庭圭韋虛心一見皆傾心愛重賀知章嘗曰此稚子目如秋水必當拜卿相張説曰昨者上欲官之某言未可蓋惜之待其成器耳當其為兒童時身輕能於屏風上立薰籠上行道者云年十五必白日升天父母保惜親族憐愛聞之皆若有甚厄也一旦空中有異香之氣及音樂之聲李公之血屬必迎罵之至其年八月十五日笙歌在室時有綵雲挂於庭樹李公之親愛乃多搗蒜虀至數斛伺其異音奇香至潛令人登屋以巨杓揚濃蒜潑之香樂遂散自此更不復至後二年賦長歌行曰天覆吾地載吾天地生吾有意無不然絶粒升天衢不然鳴珂遊帝都焉能不貴復不去空作昂藏一丈夫一丈夫兮一丈夫平生志氣是良圖請君看取百年事業就扁舟泛五湖詩成傳寫之者莫不稱賞張九齡見獨誡之曰早得美名必有所折宜自韜晦斯盡善矣藏器於身古人所重況童子耶但當為詩以賞風景詠古賢勿自揚己為妙泌泣謝之爾後為文不復自言九齡尤喜其有心言前途不可量也又嘗以直言矰諷九齡九齡感之遂呼為小友九齡出荊州邀至郡經年就於東都肄業遂遊衡山嵩山因遇神仙桓真人羡門子安期先生降之羽車幢節流雲神光照灼山谷將曙乃去仍授以長生羽化服餌之道且戒之曰太上有命以國祚中危朝廷多難宜以文武之道佐佑人主功及生靈然後可登真脫屣耳自是多絶粒咽氣修黃光谷神之要及歸京師寧王延於第玉真公主以弟呼之特加敬異常賦詩必播於王公樂章及丁父憂絶食柴毀服闋復遊嵩華終南不顧名祿天寶十載玄宗訪召入內獻明堂九鼎議應制作皇唐聖祚文多講道談經肅宗為太子勑與太子諸王為布衣交為楊國忠所忌以其所作感遇詩謗議時政搆而陷之詔於蘄春郡安置天寶十二載母周亡歸家太子諸王皆使吊祭尋祿山陷潼關玄宗肅宗分道巡狩泌嘗竊賦詩有匡復意虢王巨為河洛節度使使人求泌於嵩少間會肅宗手札至虢王備車馬送至靈武肅宗延於臥內動靜顧問規畫大計遂復兩都泌與上寢則對榻出則聯鑣代宗時為廣平王領天下兵馬元帥詔授侍謀軍國天下兵馬元帥府行軍長史判行軍事仍於禁中安置崔圓房琯自蜀至册肅宗為皇帝並賜泌手詔衣馬枕被等既立大功而幸臣李輔國害其能將不利之因表乞遊衡嶽優詔許之給以三品祿俸山居纍年夜為寇所害投之深谷中及明乃攀緣他徑而出為稿葉所藉略無所損初肅宗之在靈武也常憂諸將李郭等皆已為三公宰相崇重既極慮收復後無以復為賞也泌對曰前代爵以報功官以任能自堯舜以至三代皆所不易今收復後若賞以茅土不過二三百戶一小州豈難制乎肅宗曰甚善因曰若臣之所願則特與他人異肅宗曰何也泌曰臣絶粒無家祿位與茅土皆非所欲為陛下帷幄運籌收京師後但枕天子膝睡一覺使有司奏客星犯帝座一動天文足矣肅宗大笑及南幸扶風每頓必令泌領元帥兵先發清行宮收管鑰奏報然後肅宗至至保定郡泌稍懈先於本院寐肅宗來入院不令人驚之登床捧泌首置於膝良久方覺上曰天子膝已枕矣剋復之期當在何時可促償之泌遽起謝恩肅宗持之不許因對曰是行也以臣觀之假九廟之靈乘一人之威當如郡名必保定矣既達扶風旬日而西域河隴之師皆會江淮庸調亦相繼而至肅宗大悅又肅宗嘗夜坐召穎王等三弟同於地爐罽毯上食以泌多絶粒肅宗每自為燒二梨以賜泌時穎王恃恩固求肅宗不與曰汝飽食肉先生絶粒何乃爭此耶頴王曰臣等試大家心何乃偏耶不然三弟共乞一顆肅宗亦不許別命他果以賜之王等又曰臣等以大家自燒故乞他果何用因曰先生恩渥如此臣等請聯句以為他年故事頴王曰先生年幾許顏色似童兒其次信王曰夜抱九仙骨朝披一品衣其次益王曰不食千鍾粟唯餐兩顆梨既而三王請成之肅宗因曰天生此間氣助我化無為泌起謝肅宗又不許曰汝之居山也棲遁幽林不交人事居內也密謀匡救動合玄機社稷之鎮也泌恩渥隆異故元載輔國之輩嫉之若仇代宗即位纍有頒錫中使旁午於道別號天柱峰中嶽先生賜朝天玉簡已而徵入翰林元載奏以朝散大夫檢校祕書少監為江西觀察判官載伏誅追復京師又為常衮所嫉除楚州刺史未行改豐朗二州團練使兼御史中丞又改授杭州所至稱理興元初徵赴行在遷左散騎常侍尋除陝府長史充充原作先據唐書一三泌傳改陝虢防御使陳許戍卒三千自京西逃歸至陝州界泌潛師險隘盡破之又開三門陸運一十八里漕米無砥柱之患大濟京師二年六月就拜中書侍郎平章事加崇文館大學士修國史封鄴侯時順宗在春宮妃蕭氏母郜國公主交通於外上疑其有他志連坐貶黜者數人皇儲危懼泌周旋陳奏德宗意乃解頗有讜正之風五年春德宗以二月一日為中和節泌奏今有司上農書獻穜稑之種王公戚里上春服士庶乃各相問訊泌又作中和酒祭勾芒神以祈年穀至今行之泌曠達敏辨好大言自出入中禁纍為權臣所擠恆由智免終以言論縱橫上悟聖主以躋相位是歲三月薨贈太子太傅是月中使林遠於藍關逆旅遇泌單騎常服言暫往衡山話四朝之重遇慘然久之而別遠到長安方聞其薨德宗聞之尤加愴異曰先生自言當匡佐四聖而復脫屣也斯言驗矣泌自丁家艱無復名宦之冀服氣修道周遊名山詣南嶽張先生受録德宗追諡張為玄和先生又與明瓚禪師遊著明心論明瓚釋徒謂之懶殘泌嘗讀書衡嶽寺異其所為曰非凡人也聽其中宵梵唱響徹山林泌頗知音能辨休戚謂懶殘經音先悽愴而後喜悅必謫墮之人時至將去矣候中夜潛往謁之懶殘命坐撥火出芋以餡之謂泌曰慎勿多言領取十年宰相泌拜而退天寶八載在表兄鄭叔則家已絶粒多歲身輕能自屏風上引指使氣吹燭可滅每導引骨節皆珊然有聲時人謂之鎖子骨在鄭家時忽兩日冥然不知人事既寤見身自頂踊出三二寸傍有靈仙揮手動目如相勉助者如自足及頂乃念言大事未畢復有庭闈之戀願終家事於是在傍者皆見一人儀狀甚巨衣冠如帝王者前有婦人禮服而跪如帝王者責曰情之未得因欲令來使勞靈仙之重跪者對曰不然且教伊近天子於是遂寤後二歲為玄宗所召後常有隱者八人容服甚異來過鄭家數自言仙法嚴備事無不至臨去歎曰俗緣竟未盡可惜心與骨耳泌求隨去曰不可姑與他為卻宰相耳出門不復見因作八公詩敘之復有隱者攜一男六七歲來過云有故須南行旬月當還緣此男有痢疾既同是道者願且寄之又留一函曰若疾不起望以此瘞之既許乃問男曰不驕留此得乎曰可遂去泌求藥療之終不愈八九日而殂即以函盛瘞庭中薔薇架下纍月其人竟不回試發函視之有一黑石天然中方上有字如錐畫云神真鍊形年未足化為我子功相續丞相瘞之刻玄玉仙路何長死何促泌每訪隱選異採怪木蟠枝持以隱居號曰養和人至今效而為之乃作養和篇以獻肅宗泌去三四載二聖登遐代宗踐祚乃詔追至闕舍於蓬萊殿延喜閣由給事以上及方鎮除降降字原闕據明鈔本補代宗必令商量軍國大事亦皆泌參決因語及建寧王靈武之功請加贈太子代宗感悼久之云吾弟之功非先生則世人不知豈止贈太子也即勑於彭原迎喪贈承天皇帝葬齊陵引至城門奏以龍輀不動代宗自蓬萊院謂曰吾弟似欲見先生宜速往酹祝兼宣朕意且吾弟定策大功追加大號時人未知可作一文以傳不朽用慰玄魂泌曰已發引矣他文不及作挽歌詞可乎代宗曰可即於御前製之詞甚悽愴代宗覽之而泣命中人馳授挽者泌至宣代宗命祝酹歌此二章於是龍輴行疾如風都人觀之莫不感涕先是建寧王倓有艱難定策之功於代宗為弟人或譖於肅宗云有圖嗣害兄之心遂遇害及肅宗追悟倓無罪泌慮復及諸王因事言曰昔高宗有子八人皇祖睿宗最幼武後生者自為行第故皇祖第四長曰孝敬皇帝監國而仁明為武後所忌而鴆之次曰雍王賢為太子中宗睿宗常所不安晨夕憂懼雖父母之前無由敢言乃作黃台摘詞令樂人歌之欲微悟父母之意冀天皇天後聞之歌曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘猶尚可四摘抱蔓歸然太子竟亦流廢終於黔州建寧之事已一摘矣慎無再摘肅宗曰先生忠於宗社憂朕家事言皆為國龜鏡豈可暫離朕耶時玄宗有誥只要劍南一道自奉未議北回泌請肅宗奉表請歸東宮次作功臣表述馬嵬靈武之事請上皇還京初肅宗表至玄宗徘徊未決及功臣表至乃大喜曰吾方得為天子父下誥定行日且曰必李泌也肅宗召泌且泣且喜曰上皇已下誥還京皆卿力也又天寶末員外郎竇庭芝分司洛邑常敬事卜者葫蘆生每言吉凶無不中者一旦凌晨生至竇門頗甚嗟歎庭芝請問良久乃言君家大禍將成舉家啼泣請問求生之路生曰若非遇中黃君但見鬼谷子亦可無患矣生乃具述形貌服飾仍戒以浹旬求之於是與昆弟群從奴僕曉夕求訪殆遍洛下時泌居于河清因省親友策蹇入洛至中橋遇京尹避道所乘騾忽驚軼而走徑入庭芝所居與僕者共造其門車馬羅列將出忽見泌皆驚愕而退俄有人云分司竇員外宅所失騾收在馬廄請客入座主人當願修謁泌不得已就其廳庭芝即出降階載拜延接殷勤遂至信宿至于妻子咸備家人之禮數日告去贈遺殊厚但云遭遇之辰願以一家奉託時泌居於河清信使旁午於道庭芝初與泌相值葫蘆生適在其家云既遇斯人無復憂矣及朱泚搆逆庭芝方廉察陝西車駕出幸奉天遂於賊庭歸款鑾輿反正德宗首令誅之時泌自南嶽徵還行在便為宰相因第臣僚罪狀遂請庭芝減死德宗意不解云卿以為寧王姻懿耶寧王以庭芝妹為妃以此論之尤為不可然莫有他事俾其全否卿但言之於是具以前事聞由是特原其罪泌始奏上密遣中使乘傳於陝問之庭芝録奏其事德宗曰言中黃君蓋指朕耶未知呼卿為鬼谷子何也或曰泌先塋在河清谷前鬼谷恐以此言之也興元四年二月德宗謂泌曰朕即位以來宰相皆須姑息不得與其較量理道自用卿以來方豁朕意是乃天授卿於朕耳雖夷吾騏驥傅説霖雨何可以及茲其軍謀相業載如國史事迹終始具鄴侯傳泌有集二十卷行於世出鄴侯外傳
