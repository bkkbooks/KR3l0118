body:
  text: 杜正玄杜正玄隋仁壽中杜正玄正藏正倫俱以秀才擢第隋代舉進士總一十人正倫一家三人出談賓録李義琛武德五年李義琛與弟義琰三從弟上德同年三人進士義琛等隴西人世居鄴城國初草創未定家業素貧之與上德同居事從姑定省如親焉隨計至潼關遇大雪逆旅不容有咸陽商人見而憐之延與同寢處居數日雪霽而去琛等議鬻驢以一醉酬之商人竊知不辭而去復先贈以稻糧琛後宰咸陽召商人與之抗禮親厚位至刑部侍郎雍州長史義琰相高宗上德司門郎中出托言陳子昂蜀射洪人十年居京師不為人知時東市有賣胡琴者其價百萬日有豪貴傳視無辨者子昂突出於衆謂左右可輦千緡市之衆咸驚問曰何用之答曰余善此樂或有好事者曰可得一聞乎答曰余居宣陽里指其第處並具有酒明日專候不唯衆君子榮顧且各宜邀召聞名者齊赴乃幸遇也來晨集者凡百餘人皆當時重譽之士子昂大張宴席具珍羞食畢起捧胡琴當前語曰蜀人陳子昂有文百軸馳走京轂碌碌塵土不為人所知此樂賤工之役豈愚留心哉遂舉而棄之舁文軸兩案遍贈會者會既散一日之內聲華溢都時武攸宜為建安王辟為記室後拜拾遺歸覲為段段原作假據新舊唐書陳子昂傳改簡所害出獨異志王維王維右丞年未弱冠文章得名性間音律妙能琵琶遊歷諸貴之間尤為岐王之所眷重時進士張九臬聲稱籍甚客有出入公主之門者為其地公主以詞牒京兆試官令以九臬為解頭維方將應舉言於岐王仍求庇借岐王曰貴主主原作生據明鈔本改之強不可力爭吾為子畫焉子之舊詩清越者可録十篇琵琶新聲之怨切者可度一曲後五日至吾維即依命如期而至岐王謂曰子以文士請謁貴主何門可見哉子能如吾之教乎維曰謹奉命岐王乃出錦繡衣服鮮華奇異遣維衣之仍令齎琵琶同至公主之第岐王入曰承貴主出內故攜酒樂奉宴即令張筵諸伶旅進維妙年潔白風姿都美立於行公主顧之謂岐王曰斯何人哉答曰知音者也即令獨奉新曲聲調哀切滿坐動容公主自詢曰此曲何名維起曰號鬱輪袍公主大奇之岐王因曰此生非止音律至於詞學無出其右公主尤異之則曰子有所為文乎維則出獻懷中詩卷呈公主公主既讀驚駭曰此皆兒所誦習常謂古人佳作乃子之為乎因令更衣升之客右維風流蘊藉語言諧戲大為諸貴之欽矚岐王因曰若令京兆府今年得此生為解頭誠為國華矣公主乃曰何不遣其應舉岐王曰此生不得首薦義不就試然已承貴主論託張九臬矣公主笑曰何預兒事本為他人所託顧謂維曰子誠取當為子力致焉維起謙謝公主則召試官至第遣宮婢傳教維遂作解頭而一舉登第矣及為太樂丞為伶人舞黃師子坐出官黃師子者者非一人不舞也天寶末祿山初陷西京維及鄭虔張通等皆處賊庭洎剋復俱囚於宣楊里楊國忠舊宅崔圓因召於私第令畫數壁當時皆以圓勳貴無二望其救解故運思精巧頗絶其能能原作皆據明鈔本改後由此事皆從寬典至於貶黜亦獲善地今崇義里竇丞相易直私第即圓舊宅也畫尚在焉維纍為給事中祿授以偽官及賊平凡縉為北都副留守請以己官爵贖之由是免死纍為尚書右丞於藍田置別業留心釋典焉出集異記楊暄楊國忠之子暄舉明經禮部侍郎達奚珣考之不及格將黜落懼國忠而未敢定時駕在華清宮珣子撫為會昌尉珣遽召使以書報撫令候國忠具言其狀撫既至國忠私第五鼓初起列火滿門將欲趨朝軒蓋如市國忠方乘馬撫因趨入謁於燭下國忠謂其子必在選中撫蓋微笑意色甚歡撫乃白曰奉大人命相君之子試不中然不敢黜退國忠却立大呼曰我兒何慮不富貴豈籍一名為鼠輩所賣即即原作耶據明鈔本改不顧乘馬而去撫惶駭遽奔告於珣曰國忠恃勢倨貴使人之慘舒出於咄嗟奈何以校其曲直因致暄於上第既為戶部侍郎珣才自禮部侍郎轉吏部侍郎與同列暄話於所親尚嘆己之淹徊而謂珣遷改疾速出明皇雜録蕭頴士蕭頴士開元二十三年及第恃才傲物曼無與比常自攜一壺逐勝郊野偶憩於逆旅獨酌獨吟會有風雨暴至有紫衣老人領一小僮避雨於此頴士見之散冗頗肆陵侮逡巡風定雨霽車馬卒至老人上馬呵殿而去穎士倉忙覘之左右曰吏部王尚書尚書名丘穎士常造門未之面極驚愕明日具長箋造門謝丘命引至廡下坐責之且曰所恨與子非親屬當庭訓之耳頃曰子負文學之名踞忽如此止於一第乎穎士終揚州功曹出明皇雜録喬彝京兆府解試時有二試官彝日午扣門試官令引入則已矄醉視題曰幽蘭賦彝不肯作曰兩箇漢相對作得此題速改之遂改渥窪馬賦曰此可矣奮筆斯須而成警句云四蹄曳練翻瀚海之驚瀾一噴生風下湘山之亂葉便欲首送京兆曰喬彝崢嶸甚以解副薦之可也出幽間鼓吹許孟容許孟容進士及第學究登科時號錦襖子上著莎衣蔡京與孟容同出托言張正甫李丞相絳先人為襄州督部方赴舉求鄉薦時樊司空澤為節度使張常侍正甫為判官主鄉薦張公知絳有前途啓司空曰舉人中悉不如李秀才請只送一人諸人之資悉以奉之欣然允諾又薦絳弟為同舍郎絳感澤殊常之恩不十年登庸澤之子宗易為朝官人問宗易之文於絳絳戲而答曰蓋代時人因以蓋代為口實相見論文必曰莫是李三蓋代否及絳為戶部侍郎也常侍為本司郎中因會把酒請侍郎唱歌李終不唱而哂之滿席大噱出嘉話録閻濟美前朝公司卿許與定分一志明鈔本志作忘不為某三舉及第初舉劉單侍郎下雜文落第二舉坐王明鈔本王作主侍郎雜文落第某當是時年已蹭蹬常於江激往徑山欽大師處問法是春某既下第又將出關因獻坐主六韻律詩曰謇諤王臣直文明雅量全望爐金自躍應物鏡何偏南國幽沈盡東堂禮樂宣轉轉原作輪據唐詩紀事改今遊異士更昔至公年芳樹歡新景青雲泣暮天唯愁鳳池拜孤賤更誰憐座主覽焉問某今年何者退落具以實告先榜落第座主赧然變色深有遺才之歎乃曰所投六韻必展後效足下南去幸無疑將來之事某遂出關秋月江東求薦名到省後兩都置舉座主已在洛下比某到洛更無相知便投迹清化里店屬時物翔貴囊中但有五縑策蹇驢而已有舉公盧景莊已為東府首薦亦同處焉僕馬甚豪與某相揖未交一言久乃問某曰閻子自何至止對曰從江東來敬奉不敢怠景莊一旦際暮醉歸忽蒙問某行第乃曰閻二十消息絶好景莊大險某對曰不然必先大府首薦聲價已振京洛如某遠地一送豈敢望有成哉景莊曰足下定矣十一月下旬遂試雜文十二月三日天津橋放雜文榜景莊與某俱過其日苦寒是月四日天津橋作鋪帖經景莊尋被絀落某具前白主司曰某早留心章句不工帖書必恐不及格主司曰可不知禮闈故事亦許詩贖某致詞後紛紛去留某又遽前白主司曰侍郎開獎勸之路許作詩贖帖未見題出主司曰賦天津橋望洛陽城殘雪詩某只作得二十字某詩曰新霽洛城端千家積雪寒未收清禁色偏向上陽殘已聞主司催約詩甚急日勢又晚某告主司天寒水凍書不成字便聞主司處分得句見在將來主司一覽所納稱賞再三遂唱過其夕景莊相賀云前與足下並鋪試蠟日祈天宗賦竊見足下用魯丘丘原作血據明鈔本改對衛賜據義衛賜則子貢也足下書衛賜作駟馬字唯以此奉憂耳某聞是説反思之實作駟馬字意甚惶駭比榜出某濫忝第與狀頭同參座主座主曰諸公試日天寒急景寫札雜文或有不如法今恐文書到西京須呈宰相請先輩等各買好紙重來請印如法寫淨送納抽其退本諸公大喜及某撰本却請出駟字上朱點極大座主還闕之日獨揖前曰春間遺遺原作遣據明鈔本改才所投六韻不敢慚忘聊副素約耳出乾𦠆子潘炎侍郎潘炎進士榜有六異朱遂為朱滔太子王表為李納女壻彼軍呼為駙馬趙博宣為冀冀原作異據許本改定押衙袁同直入番為阿師竇常二十年稱前進士奚某亦有事時謂之六差竇常新及第薛某給事宅中逢桑道茂給事曰竇秀才新及第早晚得官桑生曰二十年後方得官一坐皆哂不信然果耳五度奏官皆敕不下即攝職數四其如命何出嘉話録令狐峘大曆十四年改元建中禮部侍郎令狐峘下二十二人及第時執政間有怒薦託不從勢擬頃覆峘惶恐甚因進其私書上謂峘無良放榜日竄逐不得與生徒相面後十年門人田敦為明州刺史峘量移本州別駕敦始使陳謝恩之禮出托言熊執易熊執易通於易義建中四年侍郎李紓試易簡知險阻論執易端座割析傾動場中一舉而捷出國史補
