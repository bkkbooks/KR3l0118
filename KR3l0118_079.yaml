body:
  text: 慈恩僧慈恩僧唐王蒙與趙憬布衣之舊知其吏才及趙入相自前吉州新淦令來謁大喜給䘏甚厚時憲府官頗闕德宗每難其授而趙將將字據明鈔本加授之一日偶詣慈恩氣色僧占之曰觀君色殊無喜兆他年當得一年邊上御史矣蒙大笑而歸翌日趙乘間奏御史府殊闕人就中監察尤為急要欲擇三數人德宗曰非不欲補此官須得孤直茂實者充料卿秖應取輕薄後生中朝子弟耳不如不置趙曰臣之愚見正如聖慮欲於錄事參軍縣令中求上大喜曰如此即是朕意卿有人未遂舉二人既出逢裴延齡時以度支次對曰相公奏何事稱意喜色充溢趙不之對延齡慍詈而去云看此老兵所為得行否奏事畢因問趙憬向論請何事上曰趙憬極公心因說御史事延齡曰此大不可陛下何故信之且趙憬身為宰相豈諳諳原作請據許本改州縣官績効向二人又因話錄六又下有不字為人所稱說憬何由自知之必私也陛下但詰其所自即知矣他日果問云卿何以知此二人曰一是故人一與臣微親知之上無言他日延齡入上曰趙憬所請果如卿料遂寢行蒙卻歸故林而趙薨於相位後數年邊帥奏為從事得假御史焉出因話錄朱悅唐鄂州十將陳士明幼而俊健常鬭雞為事多畜於家始雛知其後之勇怯聞其鳴必辨其毛色時里有道者朱翁悅得縮地術居於鄂築室穿池環布果藥手種松桂皆成十圍而未嘗遊於城市與士明近鄰為佑因與之遊而士明褻狎於翁多失敬翁曰爾孺子無賴以吾為東家丘吾戲試爾可否士明之居相去三二百步翁以酒飲之使其歸取雞鬭自辰而還至酉不達家度其所行逾五十里及顧視不越百步士明亟返拜翁求恕翁笑曰孺子更侮於我乎士明云適於中途已疲詎敢復爾因垂涕翁乃釋之後敬事翁之禮與童孫齒焉士明至元和中戍於巴丘遂別朱翁出廣德神異記王生唐韓晉公滉鎮潤州以京師米貴進一百萬石且請敕陸路觀察節度使發遣時宰相以為鹽鐵使進奉不合更煩累沿路州縣帝又難違滉請遂下兩省議左補闕穆質曰鹽鐵使自有官使勾當進奉不合更煩累沿路州縣為節度使亂打殺二十萬人猶得何惜差一進奉官坐中人密聞滉遂令軍吏李栖華就諫院詰穆公滉云不曾相負何得如此即到京與公廷辯遂離鎮過汴州挾劉玄佐俱行勢傾中外穆懼不自得潛衣白衫詣興趙王生卜與之束素王謝曰勞致重幣為公夜蓍占之穆乃留韓年命並自留年命明日令妹夫裴往請卦王謂裴曰此中一人年命大盛其間威勢盛於王者是誰其次一命與前相刻太甚頗有相危害意然前人必不見明年三月卦今已是十一月縱相害事亦不成韓十一月入京穆曰韓爪距如此犯著即碎如何過得數月又質王生終云不畏韓至京威勢愈盛日以橘木棒殺人判桉郎官每候見皆奔走公卿欲謁逡巡莫敢進穆愈懼乃歷謁韓諸子皋群等求解皆莫敢為出言者時滉命三省官集中書視事人皆謂與廷辯或勸穆稱疾穆懷懼不決及眾官畢至乃曰前日除張嚴常州刺史昨日又除常州刺史緣張嚴曾犯贓所以除替恐公等不諭告公等知諸人皆賀穆非是廷辯無何穆有事見滉未及通聞閤中有大聲曰穆質爭敢如此贊者不覺走出以告質質懼明日度支員外齊抗五更走馬謂質曰公以左降邵州邵陽尉公好去無言握手留贈促騎而去質又令裴問王生生曰韓命祿已絕不過後日明日且有國故可萬全無失矣至日晚內宣出王薨輟朝明日制書不下後日韓入班倒床舁出遂卒時朝廷中有惡韓而好穆者遂不放穆敕下並以邵陽書與穆出異聞集賈籠穆質初應舉試畢與楊憑數人會穆策云防賢甚於防姦楊曰公不得矣今天子方禮賢豈有防賢甚於防姦穆曰果如此是矣遂出謁鮮于弁弁待穆甚厚食未竟僕報云尊師來弁奔走具靴笏遂命徹食及至一眇道士爾質怒弁相待之薄且來者是眇道士不為禮安坐如故良久道士謂質曰豈非供奉官耶曰非也又問莫曾上封事進書策求名否質曰見應制已過試道士曰面色大喜兼合官在清近是月十五日午後當知之矣策是第三等官是左補闕故先奉白質辭去至十五日方過午聞扣門聲即甚厲遣人應問曰五郎拜左補闕當時不先唱第三等便兼官一時拜耳故有此報後鮮于弁詣質質怒前不為畢饌不與見弁復來質見之乃曰前者賈籠也言事如神不得不往謁之質遂與弁俱往籠謂質曰後三月至九月勿食羊肉當得兵部員外郎知制誥德宗嘗賞質曰每愛卿對言事多有行者質已貯不次之望意甚薄知制誥仍私謂人曰人生自有豈有不喫羊肉便得知制誥此誠道士妖言也遂依前食羊至四月給事趙憬忽召質云同尋一異人及到即前眇道士也趙致敬如弟子禮致謝而坐道士謂質曰前者勿令食羊肉至九月得制誥何不相取信今否矣莫更有災否曰有厄質曰莫至不全乎曰初意過於不全緣識聖上得免死矣質曰何計可免曰今無計矣質又問若遷貶幾時得歸曰少是十五年補闕却廻貧道不見執手而別遂不復言無何宰相李泌奏穆質盧景亮於大會中皆自言頻有章奏諫曰明鈔本無曰字國有善即言自己出有惡事即言苦諫上不納此足以惑眾合以大不敬論請付京兆府決殺德宗曰景亮不知穆質曾識不用如此又進決六十流崖州上御筆書令與一官遂遠貶後至十五年憲宗方徵入賈籠即賈直言之父也出異聞集軒轅集唐宣宗晚歲酷好長年術廣州監軍吳德鄘離京日病足頗甚及罷已三載矣而疾已平宣宗詰之且言羅浮山人軒轅集醫之遂驛詔赴京既至館山亭院後放歸拜朝散大夫廣州司馬堅不受臨別宣宗問理天下當得幾年集曰五十年宣宗大悅及至晏駕春秋五十出感定錄杜可筠唐僖宗末廣陵貧人杜可筠年四十餘好飲不食多云絕粒每酒肆巡座求飲亦不見醉人有憐與之酒又終不多飲三兩杯即止有樂生旗亭在街西常許或陰雨往他所不及即約詣此率以為常一旦大雪詣樂求飲值典事者白樂云既已嚙損即須據物賠前人樂不喜其說杜問曰何故樂曰有人將衣服換酒收藏不謹致為鼠囓杜曰此間屋院幾何曰若干杜曰弱年曾記得一符甚能却鼠即不知今有驗否請以試之或有徵當可盡此室宇永無鼠矣樂得符依法焚之自此遂絕鼠跡杜屬秦彥畢師鐸重圍際容貌不改皆為絕糧故也後孫儒渡江乃寓毗陵犯夜禁為刃死傳其劍解矣出桂苑叢談許建宗唐濟陰郡東北六里左山龍興古寺前路西第一院井其水至深人不可食腥穢甚色如血鄭還古明鈔本鄭還古三字下有太和初與許建宗同寓佐山僅月餘聞此井建宗謂還古二十二字曰可以同詣之及窺其井曰某與回此水味何如還古及院僧曰幸甚遂命朱甌紙筆書符置井中更無他法遂宿此院二更後院風雨黯黑還古於牖中窺之電光間有一力夫自以釣索於井中如有所釣凡電三發光洎四電光則失之矣及旦建宗封其井三日後甘美異於諸水至今不變還古意建宗得道者遂求之云某非道者偶得符術求終不獲後去太山不知所在出傳異記向隱唐天復中成汭鎮江陵監軍使張特進元隨溫克修司藥庫在坊郭稅舍止焉張之門人向隱北鄰隱攻曆算仍精射覆無不中也一日白張曰特進副監小判官已下皆帶災色何也張曰人之年運不同豈有一時受災吾不信矣於時城中多犬吠隱謂克脩曰司馬元戎某年失守此地化為丘墟子其誌之他日復謂克脩曰此地更變且無定主五年後東北上有人依稀國親一鎮此邦二十年不動子誌之他日又曰東北來者二十年後更有一人五行不管此程更遠但請記之溫以為憑虛殊不介意復謂溫曰子他時婚娶無男但生一隊女也到老却作醫人後果密敕誅北司張特進與副監小判官同日就戮方驗其事成汭鄂渚失律不還江陵為朗朗原作郎據明鈔本改人雷滿所據襄州舉軍軍原作君據許本改奪之以趙匡明為留後大梁伐伐原作代據許本改襄州匡明棄城自固為梁將賀環所據而威望不著朗朗原作郎據明鈔本改蠻侵凌不敢出城自固而已梁主署武信王高季昌自潁州刺史為荊南兵馬留後下車日擁數騎至沙頭朗朗原作郎據明鈔本改軍懾懼稍稍而退先是武信王賜姓朱後復本姓果符國親之說克修失主流落渚宮收得名方仍善修合賣藥自給亦便行醫娶婦後唯生數女盡如向言唐明宗天成二年丁亥天軍圍江陵軍府懷憂溫克脩上城白文獻王具道此文獻未之全信溫以前事累驗必不我欺俄而朝廷抽軍來年武信薨凡二十一年而文獻嗣位亦二十一年迨至南平王即此程更遠果在茲乎出北夢瑣言趙尊師趙尊師者本遂州人飛符救人疾病於鄉里間年深矣又善役使山魈令挈書囊席帽故所居前後百里內絕有妖怪鬼物為人患者有民阮瓊女為精怪所惑每臨夜別梳粧似有所伺必迎接忻喜言笑自若召人醫療即先知姓名瓊迺奔請尊師救解趙曰不勞親去但將吾符貼於戶牖間自有所驗乃白絹朱書大符與之瓊貼於戶至一更聞有巨物中擊之聲如冰墜地遂攢燭照之迺一巨鼉宛轉在地逡巡而死符即不見女迺醒然自悟驚駭涕泣瓊遂碎鼉之首棄於壑間卻詣尊師備陳其事趙慰勞之又與小符令女吞之自後無恙大符即却歸於案上出野人閑話權師唐長道縣山野間有巫曰權師善死卜至於邪魅鬼怪隱伏逃亡地祕山藏生期死限罔不預知之或人請命則焚香呼請神僵仆於茵褥上奄然而逝移時方喘息瞑目而言其事奏師之親曰郭九舅豪俠強梁積金甚廣妻臥病數年將不濟召令卜之閉目而言曰君堂屋後有伏屍其數九遂令斸之依其尺寸獲之不差其一旋遣去除之妻立愈贈錢百萬却而不受強之方受一二萬云神不令多取又一日臥於民家瞑目輪十指云算天下死簿數其遐邇州縣死數甚多次及本州村鄉亦十餘人合死者內有豪士張夫子名行儒與焉人有急告行儒者聞而懼遂命之至謂張曰可以奉為牒閻罪山明鈔本罪作羅又山字疑誤當是出字免之於是閉目於紙上書之半如篆籀祝焚之既訖張以含胎馬奔奉之巫曰神只許其母子即奉還以俟異日所言本州十餘人算盡者應期而歿惟張行儒免之及牝誕駒遂還其主其牝呼為和尚云此馬曾為僧不了有是報自爾為人廷算者不少為人掘取地下隱伏者亦多言人算盡者不差晷刻以至其家大富取民家牛馬資財遍山盈室出玉堂閒話
