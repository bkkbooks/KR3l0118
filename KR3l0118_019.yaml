body:
  text: 馬周馬周馬周者華山素靈宮仙官也唐氏將受命太上敕之下佐於國而沈緬於酒汨沒風塵間二十年棲旅困餒所向拘礙幾為磕仆聞袁天綱自蜀入秦善於相術因詣之以決休咎天綱目之良久曰五神奔散尸居旦夕耳何相之有邪周大驚問以禳制之術天綱曰可自此東直而行當有老叟騎牛者不得迫而與語但隨其行此災可除矣周如言而行未出都門果有老叟騎牛出城默隨其後繚繞村徑登一大山周隨至山頂叟顧見之下牛坐於樹下與語曰太上命汝輔佐聖孫創業拯世何為昏沉於酒自掇困餓五神已散正氣凋淪旦夕將死而不修省邪周亦懵然未曉叟曰汝本素靈宮仙官今太華仙王使人召汝即引入宮闕經歷宮門數重至大殿之前羽衛森肅若帝王所居趨至簾前有宣言責之者以其受命不恭墮廢所委使還其舊署自責省愆叟與所使數人送於東廡之外別院中室宇宏麗視其門則姓名存焉啓鑰而入爐火鼎器床榻茵席宛如近所棲止沉吟思之未能了悟忽有五人服五方之衣長大奇偉立於前曰我皆先生五臟之神也先生酣酒流蕩濁辱於身我等久歸此矣但閉目將復於神室也周瞑目頃之忽覺心智明悟併憶前事二十餘年若旬日之間耳復扃鐍所居出仙王之庭稽首謝過再稟其命來詣長安明日復謁天綱天綱驚曰子何所遇邪已有瘳矣六十日當一日九遷百日位至丞相勉自愛也如是貞觀中敕文武官各貢理國之策周之所貢意出人表是日拜拾遺監察御史裏行自此纍居大任入相中書令數年一旦群仙降其室曰佐國功成可以退矣太乙徵命無復留也翌日無疾而終諡曰忠公其所著功業匡贊國政揚歷品秩國史有傳此不備書出神仙拾遺李林甫唐右丞相李林甫年二十尚未讀書在東都好遊獵打毬馳逐鷹狗每於城下槐壇下騎驢擊略無休日既憊捨驢以兩手返據地歇一日有道士甚醜陋見李公踞地徐言曰此有何樂郎君如此愛也李怒顧曰關足下何事道者去明日又復言之李公幼聰悟意其異人乃攝衣起謝道士曰郎君雖善此然忽有顛墜之苦則悔不可及李公請自此修謹不復為也道士笑曰與郎君後三日五更會於此曰諾及往道士已先至曰為約何後李乃謝之曰更三日復來李公夜半往良久道士至甚喜談笑極洽且曰某行世間五百年見郎君一人已列仙籍合白日升天如不欲則二十年宰相重權在己郎君且歸熟思之後三日五更復會於此李會回計之曰我是宗室少豪俠二十年宰相重權在己安可以白日升天易之乎計已決矣及期往白道士嗟嘆咄叱如不自持曰五百始見一人可惜可惜李公悔欲復之道士曰不可也神明知矣與之敘別曰二十年宰相生殺權在己威振天下然慎勿行陰賊當為陰德廣救拔人無枉殺人如此則三百年後白日上升矣官祿已至可使入京李公匍匐泣拜道士握手與別時李公堂叔為庫部郎中在京遂詣叔父以其縱蕩不甚記録之頗驚曰汝何得至此曰某知向前之過今故候覲請改節讀書願受鞭箠庫部甚異之亦未令就學每有賓客遣監杯盤之飾無不修潔或謂曰汝為吾著某事雖雪深沒踝亦不去也庫部益親憐之言於班行知者甚衆自後以蔭敘纍官至贊善大夫不十年遂為相矣權巧深密能伺上旨恩顧隆洽獨當衡軸人情所畏非臣下矣數年後自固益切大起大獄誅殺異己冤死相繼都忘道士槐壇之言戒也時李公之門將有趨謁者必望之而步不敢乘馬忽一日方午有人扣門吏驚候之見一道士甚枯瘦曰願報相公聞者呵而逐之外吏又鞭縳送於府道士微笑而去明日日中復至門者乘間而白李公曰吾不記識汝試為通及道士入李公見之醒然而悟乃槐壇所覩也慚悸之極若無所措卻思二十年之事今已至矣所承教戒曾不暫行中心如疾乃拜道士迎笑曰相公安否當時之請並不見從遣相公行陰德今枉殺人上天甚明譴謫可畏如何李公但搕額而已道士留宿李公盡除僕使處於中堂各居一榻道士唯少食茶果餘無所進至夜深李公曰昔奉教言尚有升天之挈今復遂否道士曰緣相公所行不合其道有所竄責又三百年更六百年乃如約矣李公曰某人間之數將滿既有罪譴後當如何道士曰莫要知否亦可一行李公降榻拜謝曰相公安神靜慮萬想俱遣兀如枯株即可俱也良久李公曰某都無念慮矣乃下招曰可同往李公不覺便隨道士去大門及春明門到輒自開李公援道士衣而過漸行十數里李公素貴尤不善行困苦頗甚道士亦自知之曰莫思歇否乃相與坐於路隅逡巡以數節竹授李公曰可乘此至地方止慎不得開眼李公遂跨之騰空而上覺身泛大海但聞風水之聲食頃止見大郭邑介士數百羅列城門道士至皆迎拜兼拜李公約一里到一府署又入門復有甲士升階至大殿帳榻華侈李公困欲就帳臥道士驚牽起曰未可恐不可回耳此是相公身後之所處也曰審如是某亦不恨道士笑曰茲介癬鱗鱗原作癬據明鈔本改之屬其間苦事亦不少遂卻與李公出大門復以竹杖授之一如來時之狀入其宅登堂見身瞑坐於床上道士乃呼曰相公相公李公遂覺涕泗交流稽首陳謝明日別去李公厚以金帛贈之俱無所受但揮手而已曰勉旃六百年後方復見相公遂出門而逝不知所在先是安祿山常養道術士每語之曰我對天子亦不恐懼唯見李相公若無地自容何也術士曰公有陰兵五百皆有銅頭鐵額常在左右何以如此某安得見之祿山乃奏請宰相宴於己宅密遣術士於簾內窺伺退曰奇也某初見李相公有一青衣童子捧香爐而入僕射侍衛銅頭鐵額之類皆穿屋踰墻奔逆而走某亦不知其故也當是仙官暫謫在人間耳出逸史郭子儀華州人也初從軍沙塞間因入京催軍食回至銀州十數里日暮忽風砂陡暗行李不得遂入道傍空屋中籍地將宿既夜忽見左右皆有赤光仰視空中見軿輜車繡屋中有一美女坐床垂足自天而下俯視子儀拜祝云今七月七日必是織女降臨願賜長壽富貴女笑曰大富貴亦壽考言訖冉冉升天猶正視子儀良久而隱子儀後立功貴盛威望烜赫大曆初鎮河中疾甚三軍憂懼子儀請御醫及幕賓王延昌孫宿趙惠伯嚴郢等曰吾此疾自知未到衰殞因話所遇之事衆稱賀欣悅其後拜太尉尚書令尚父年九十而薨出神仙感遇傳韓滉唐宰相韓滉廉問浙西頗強悍自負常有不軌之志一旦有商客李順泊船於京口堰下夜深碇斷漂船不知所止及明泊一山下風波稍定上岸尋求微有鳥徑行五六里見一人烏巾岸幘古服與常有異相引登山詣一宮闕臺閣華麗逮非人間入門數重庭除甚廣望殿遙拜有人自簾中出語之曰欲寓金陵韓公一書無訝相勞也則出書一函拜而受之贊者引出門送至舟所因問贊者曰此為何處也恐韓公詰問又是何人致書答曰此東海廣桑山也是魯國宣父仲尼得道為真官理於此山韓公即仲由也性彊自恃夫子恐其掇刑網致書以諭之言訖別去李順卻還舟中有一使者戒舟中人曰安坐勿驚懼不得顧船外逡巡則達舊所若違此戒必致傾覆舟中人皆如其言不敢顧視舟行如飛頃之復在京口堰下不知所行幾千萬里也既而詣衙投所得之書韓公發函視之古文九字皆科斗之書了不可識詰問其由深以為異拘縶李順以為妖妄欲加嚴刑復博訪能篆籀之人數輩皆不能辨有一客疣眉古服自詣賓位言善識古文韓公見以書示之客捧書於頂再拜賀曰此孔宣父之書乃夏禹科斗文也文曰告韓滉謹臣節勿妄動公異禮加敬客出門不知所止韓慘然默坐良久了然自憶廣桑之事以為非遠厚禮遣謝李順自是恭黜謙謹克保終始焉出神仙感遇傳
