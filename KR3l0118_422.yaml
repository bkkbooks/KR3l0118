body:
  text: 許漢陽許漢陽本汝南人也貞元中舟行于洪饒間日暮江波急尋小浦路入不覺行三四里到一湖中雖廣而水才三二尺又北行一里許見湖岸竹樹森茂乃投以泊舟漸近見亭宇甚盛有二青衣雙鬟方鴉素面如玉迎舟而笑漢陽訝之而調以游詞又大笑復走入宅漢陽束帶上岸投謁未行三數步青衣延入宅內廳揖坐云女郎易服次須臾青衣命漢陽入中門見滿庭皆大池池中荷芰芬芳四岸斐如碧玉作兩道虹橋以通南北北有大閣上階見白金書曰夜明宮四面奇花果木森聳連云青衣引上閣一層又有青衣六七人見者列拜又引第二層方見女郎六七人目未嘗睹皆拜問所來漢陽具述不意至此女郎揖坐訖青衣具飲食所用皆非人間見者食訖命酒其中有奇樹高數丈枝干如梧葉似芭蕉有紅花滿樹未吐盎如杯正對飲所一女郎執酒命一青衣捧一鳥如鸚鵡置飲前欄干上叫一聲而樹上花一時開芳香襲人每花中有美人長尺余婉麗之姿掣曳之服各稱其質諸樂弦管盡備其人再拜女郎舉酒衆樂俱作蕭蕭冷冷窨如神仙才一巡已夕月色復明女郎所論皆非人間事漢陽所不測時因漢陽以人事辨之則女郎一無所酬答歡飲至二更筵宴已畢其樹花片片落池中人亦落便失所在一女郎取一卷文書以示漢陽覽之乃江海賦女郎令漢陽讀之遂為讀一遍女郎又請自讀一遍命青衣收之一女即謂諸女郎兼語漢陽曰有感懷一章欲請誦之女郎及漢陽曰善及吟曰海門連洞庭每去三千里十載一歸來辛苦瀟湘水女郎命青衣取諸卷兼筆硯請漢陽與録之漢陽展卷皆金花之素上以銀字札之卷大如拱斗已半卷書過矣觀其筆乃白玉為管研乃碧玉以玻璃為匣研中皆研銀水寫畢令以漢陽之名押之展向前見數首皆有人名押署有名仲方者有名巫者有名朝陽者而不見姓女郎遂收索卷漢陽曰有一篇欲奉和擬繼此可乎女郎曰不可此亦每歸呈父母兄弟不欲雜爾漢陽曰適以弊名押署復可乎曰事別非君子所諭四更已來命悉收拾揮霍次一青衣曰郎可歸舟矣漢陽乃起諸女郎曰欣此旅泊接奉不得鄭重耳恨恨而別歸舟忽大風云色陡暗寸步黯黑至平明觀夜來飲所乃空林樹而已漢陽解纜行至昨晚櫺口江岸人家見十數人似有非常因泊舟而訊人曰江口溺殺四人至二更后卻撈出三人已卒其一人雖似死而未甚有巫女以楊柳水灑拂禁咒久之能言曰昨夜水龍王諸女及姨姊妹六七人歸過洞庭宵宴于此取我輩四人作酒掾客少不多飲所以我卻得來漢陽異之乃問曰客者謂誰曰一措大耳不記姓名又云青衣言諸小娘子苦愛人間文字不可得常欲請一措大文字而無由又問今在何處已發舟也漢陽乃念昨宵之事及感懷之什皆可驗也漢陽默然而歸舟覺腹中不安乃吐出鮮血數升知悉以人血為酒爾三日方平劉禹錫唐連州刺史劉禹錫貞元中寓居滎澤首夏獨坐林亭忽然間大雨天地昏黑久方開霽獨亭中杏樹云氣不散禹錫就視樹下有一物形如龜鱉腥穢頗甚大五斗釜禹錫因以瓦礫投之其物即緩緩登階止于檐柱禹錫乃退立于床下支策以觀之其物仰視柱杪款以前趾抉去半柱因大震一聲屋瓦飛紛亂下亭內東壁上下罅裂丈許先是亭東紫花苜蓿數畝禹錫時于裂處分明遙見雷既收聲其物亦失而東壁之裂亦已自吻合矣禹錫亟視之苜蓿如故壁曾無動處周邯貞元中有處士周邯文學豪俊之士也因彝人賣奴年十四五視其貌甚慧黠言善入水如履平地令其沉潛雖經日移時終無所苦云蜀之溪壑潭洞無不屆也邯因買之易其名曰水精異其能也邯自蜀乘舟下峽抵江陵經瞿塘灩澦遂令水精沉而視其邃遠水精入移時而出多探金銀器物邯喜甚每艤船于江潭皆令水精沉之復有所得沿流抵江都經牛渚磯古云最深處是溫嶠爇犀照水怪之濱又使沒入移時復得寶玉云甚有水怪莫能名狀皆怒目戟手身僅免禍因茲邯亦至富贍后數年邯有友人王澤牧相州邯適河北而訪之澤甚喜與之游宴日不能暇因相與至州北隅八角井天然磐石而甃成八角焉闊可三丈余且暮煙云蓊郁漫衍百餘步晦夜有光如火紅射出千尺鑒物若晝古老相傳云有金龍潛其底或亢陽禱之亦甚有應澤曰此井應有至寶但無計而究其是非耳邯笑曰甚易遂命水精曰汝可與我投此井到底看有何怪異澤亦當有所賞也水精已久不入水欣然脫衣沉之良久而出語邯曰有一黃龍極大鱗如金色抱數顆明珠熟寐水精欲劫之但手無刃憚其龍忽覺是以不敢觸若得一利劍如龍覺當斬之無憚也邯與澤大喜澤曰吾有劍非常之寶也汝可持往而劫之水精飲酒伏劍而入移時四面觀者如堵忽見水精自井面躍出數百步續有金龍亦長數百尺爪甲鋒穎自空拿攫水精卻入井去左右懾栗不敢近睹但邯悲其水精澤恨失其寶劍逡巡有一老人身衣褐裘貌甚古朴而謁澤曰某土地之神使君何容易而輕其百姓此穴金龍是上玄使者宰其瑰璧澤潤一方豈有信一微物欲因睡而劫之龍忽震怒作用神化搖天關擺地軸捶山嶽而碎丘陵百里為江湖萬人為魚鱉君之骨肉焉可保昔者鐘離不愛其寶孟嘗自返其珠子不之效乃肆其貪婪之心縱使猾韌之徒取寶無憚今已啖其驅而鍛其珠矣澤赧恨無詞而對又曰君須火急悔過而禱焉無使甚怒耳老人倏去澤遂具牲牢奠之資州龍韋皋鎮蜀末年資州獻一龍身長丈余鱗甲悉具皋以木匣貯之蟠屈于內時屬元日置于大慈寺殿上百姓皆傳縱觀二三日為香煙薰死國史闕書是何祥也韋思恭元和六年京兆韋思恭與董生王生三人結友于嵩山嶽寺肄業寺東北百餘步有取水盆在岩下圍丈余而深可容十斛旋取旋增終無耗一寺所汲也三人者自春居此至七月中三人乘暇欲取水路臻于石盆見一大蛇長數丈黑若純漆而有白花似錦蜿蜒盒中三子見而駭視之良久王與董議曰彼可取而食之韋曰不可昔葛陂之竹漁父之梭雷氏之劍尚皆為龍安知此名山大鎮豈非龍潛其身耶況此蛇鱗甲尤異于常者是可戒也二子不納所言乃投石而扣蛇且死縈而歸烹之二子皆咄韋生之詐潔俄而報盆所又有蛇者二子之盆所又欲擊韋生諫而不允二子方舉石欲投蛇騰空而去及三子歸院烹蛇未熟忽聞山中有聲殷然地動覘之則此山間風云暴起飛沙走石不瞬息至寺天地晦暝對面相失寺中人聞風云暴起中云莫錯擊須臾雨火中半下書生之宇并焚蕩且盡王與董皆不知所在韋子于寺廊下無事故神化之理亦甚昭然不能全為善但吐少善言則蛟龍之禍不及矣而況于常行善道哉其二子尸逮兩日于寺門南隅下方索得斯乃韋自說至于好殺者足以為戒矣盧元裕故唐太守盧元裕未仕時嘗以中元設幡幢像置盂蘭于其間俄聞盆中有唧唧之音元裕視見一小龍才寸許逸狀奇姿婉然可愛于是以水沃之其龍伸足振鬣已長數尺矣元裕大恐有白云自盆中而起其龍亦逐云而去元裕即翰之父也盧翰唐安太守盧元裕子翰言太守少時嘗結友讀書終南山日晚溪行崖中得一圓石瑩白如鑒方執玩忽次墮地而折中有白魚約長寸余隨石宛轉落澗中漸盈尺俄長丈余鼓鬐掉尾云雷暴興風雨大至李修唐浙西觀察使李修元和七年為絳郡守是歲其屬縣龍門有龍見時觀者千數郡以狀聞于太府時相國河東府張弘靖為河中節度使相國之子故舒州刺史以宗嘗為文以贊其事韋宥唐元和故都尉韋宥出牧溫州忽忽不樂江波修永舟船燠熱一日晚涼乃跨馬登岸依舟而行忽淺沙亂流蘆葦青翠因縱轡飲馬而蘆枝有拂鞍者宥因閒援熟視忽見新絲箏弦周纏蘆心宥即收蘆伸弦其長倍尋試縱之應乎復結宥奇駭因置于懷行次江館其家室皆已維舟入亭矣宥故駙馬也家有妓即付箏妓曰我于蘆心得之頗甚新緊然沙洲江徼是物何自而來吾甚異之試施于器以聽其音妓將安之更無少異唯短三二寸耳方饌妓即置之隨置復結食罷視之則已蜿蜒搖動妓驚告衆競來觀之而雙眸瞭然矣宥駭曰得非龍乎命衣冠焚香致敬盛諸盂水之內投之于江才及中流風浪皆作蒸云走雷咫尺昏晦俄有白龍百尺拿攫升天衆咸觀之良久乃滅尺木龍頭上有一物如博山形名尺木龍無尺木不能升天史氏子有史氏子者唐無和中曾與道流游華山時暑甚憩一小溪忽有一葉大如掌紅殷可愛隨流而下史獨接得置于懷中坐食頃覺懷中冷重潛起觀之其上鱗栗栗而起史警懼棄林中遂白衆人此必龍也可速去須臾林中白煙生彌布一谷史下山未半風雨大至
