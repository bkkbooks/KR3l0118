body:
  text: 梁武帝梁武帝梁武帝蕭衍殺南齊主東昏侯以取其位誅殺甚衆東昏死之日侯景生焉復景亂梁破建業武帝禁而餓終簡文幽而壓死誅梁子弟略無孑遺時人謂景是東昏侯之復身也出朝野僉載張裨下邳張裨者家世冠族末葉衰微有孫女殊有姿貌鄰人欲聘為妾裨以舊門之後而不許鄰人忿之乃焚其屋裨遂燒死其息邦先行不在後還亦知情狀而畏鄰人之勢又貪其財而不言嫁女與之後經一年邦夢見裨曰汝為兒子逆天不孝棄親就怨潛同凶黨便捉邦頭以手中桃杖刺之邦因病兩宿嘔血而死邦死日鄰人又見裨排門戶直入張目攘袂曰君恃勢縱惡酷暴之甚枉見殺害我已上訴事獲申雪却後數日令君知之鄰人得病尋亦隕歿出還冤記羊道生梁太山羊道生為邵陵王中兵參軍其兄海珍任溠州刺史道生乞假省之臨別兄于近路設頓祖送道生道生見縛一人于樹就視乃故舊部曲也見道生涕泣哀訴云溠州欲賜殺乞求救濟道生問汝何罪答云失意逃叛道生便曰此最可忿即下馬以佩刀刳其眼睛吞之部曲呼天大哭須臾海珍來又囑兄決斬道生良久方覺眼睛在喉內噎不下索酒咽之頓盡數杯終不能去轉覺脹塞遂不成咽而別在路數日死當時莫不以為有天道焉出還冤記釋僧越梁東徐州刺史張皋僕射永之孫也嘗因敗入北有一土民與皋盟誓將送還南土民遂即出家法名僧越皋供養之及在東徐且隨至任恃其勳舊頗以言語忤皋皋怒遣兩門生夜往殺之爾後忽夢見僧越云來報怨少時出射而箭栝傷指才可見血不以為事後因破梨梨汁浸漬乃加膿爛停十許日膊上無故復生一瘡膿血與指相通月餘而死出還冤記江陵士大夫江陵陷時有關內人梁元暉俘獲一士大夫姓劉此人先遭侯景喪亂失其家口唯餘小男始數歲躬自擔負又值雪泥不能前進梁元暉監領入關逼令棄兒劉甚愛惜以死為請遂彊奪取擲之雪中杖棰交下驅蹙使去劉乃步步回顧號叫斷絶辛苦頓斃加以悲傷數日而死死後元暉日見劉伸手索兒因此得病雖復悔謝來殊不已元暉載病到家而卒出還冤記徐鐵臼東海徐甲前妻許氏生一男名鐵臼而許氏亡甲改娶陳氏凶虐之甚欲殺前妻之子陳氏産一男生而祝之曰汝若不除鐵臼非吾子也因名之為鐵杵欲以搗臼也于是捶打鐵臼備諸毒苦飢不給食寒不加絮甲性暗弱又多不在舍復妻得意行其酷暴鐵臼竟以凍餓甚被杖死時年十六亡後旬餘鬼忽還家登陳氏牀曰我鐵臼也實無罪橫見殘害我母訴怨于天得天曹符來雪我冤當令鐵杵疾病與我遭苦時同將去自有期日我今停此待之聲如生時家人不見其形皆聞其語恆在屋梁上住陳氏跪謝頻為設奠鬼云不須如此餓我令死豈是一餐所能酬謝陳氏夜中竊語道之鬼應聲云何故道我今當斷汝屋棟便聞鋸聲屑亦隨落拉然有聲響如棟實崩舉家走出炳燭照之亦無異又罵鐵杵曰殺我安坐宅上為快耶當燒汝屋即見火然煙爛火盛內外狼籍俄而自滅茅茨儼然不見虧損日日罵詈時復謳歌歌云桃李花嚴霜落奈何桃李子嚴霜落早已聲甚傷悽似是自悼不得成長也于是鐵杵六歲鬼至病體痛腹大上氣妨食鬼屢打之打處青黶月餘而死鬼便寂然出還冤記蕭續梁廬陵王蕭續為荊州刺史時有武寧太守張延康甚便弓馬頗為人伏代下將還王要伏要伏二字據明抄本補事延康意貪進上辭不肯留王遂尋延康為郡時罪鎖繫在獄發使啓申意望朝廷委州行決梁主素識延康兼疑王啓不實乃敕送都王既懷恨又懼延康申雪翻復獲罪乃未宣敕使獄卒說延康曰如聞王欲見殺君何不拔身還都自理若能去當為方便延康然之遂夜逃王遣游軍設伏刺延康於城下乃表叛獄格戰而死又有支江令吳某將還揚州被王要結亦不肯住遂使人於道擊殺之舉家數十口並從沉溺後數年得疾王日夜常見張吳二人王但曰寬我寬我少時而薨出還冤記樂蓋卿廬陵王在荊州時嘗遣從事量括民田南陽樂蓋卿亦充一使公府舍人韋破虜發遣誡敕失王本意及蓋卿還以數誤得罪破虜惶懼不敢引愆但誑蓋云自為分雪無勞訴也數日之間遂斬于市蓋卿號叫無由自陳唯語人以紙筆隨殮死後少日破虜在槽上看牛忽見蓋卿挈頭而入持一碗蒜齏與之破虜驚呼奔走不獲已而服之因得病未幾卒出還冤記康季孫康季孫性好殺滋味漁獵故恆事奴婢愆罪亦或死之常病篤夢人謂曰若能斷殺此病當差不爾必病即于夢中誓不復殺驚悟戰悸汗流浹體病亦漸瘳後數年三門生竊其兩妾以叛追獲之即並毆殺其夕復夢見前人來曰何故負信此人罪不至死私家不合擅殺今改亦無濟理逮明嘔血數日而卒出還冤記張絢梁武昌太守張絢嘗乘船行有一部曲役力小不如意絢便躬捶之杖下臂折無復活狀絢遂推江中須臾見此人從水而出對絢撫手曰罪不當死官枉見殺今來相報即跳入絢口因得病少日而殂出還冤記楊思達梁楊思達為西陽郡守值侯景亂時復旱歉饑民盜田中麥思達遣一部曲守視所得盜者輒截手腕凡戮十餘人部曲後生一男自然無手出還冤記弘氏梁武帝欲為文皇帝陵上起寺未有佳材宣意有司使加採訪先有曲阿人姓弘家甚富厚乃共親族多齎財貨往湘州治生經年營得一筏可長千步材木壯麗世所稀有還至南津南津校尉孟少卿希朝廷旨乃加繩墨弘氏所賣衣裳繒綵猶有殘餘誣以涉道劫掠所得并造作過制非商賈所宜結正處死沒入其財充寺用奏遂施行弘氏臨刑之日敕其妻子可以黃紙筆墨置棺中死而有知必當陳訴又書少卿姓名數十吞之經月少卿端坐便見弘來初猶避捍後乃款服但言乞恩嘔血而死凡諸獄官及主書舍人預此獄事署奏者以次殂歿未及一年零落皆盡其寺營搆始訖天火燒之略無纖芥所埋柱木亦入地成灰出還冤記朱貞梁秣陵令朱貞以罪下獄廷尉虞獻者覆其事結正入重貞遣相知謂獻曰我罪當死不敢祈恩但猶冀主上萬一弘宥我明日即是國家忌曰乞得過此奏聞可乎獻答曰此於理無爽何謂不然謹聞命矣而朱事先明日奏來獻便遇客共飲頗醉遂忘抽文書旦日家人合束內衣箱中獻復不記比至帝前頓束香案上次第披之方見此事勢不可隱便爾上聞武帝以為合死付外詳決貞聞之大恨曰虞小子欺罔將死之人鬼若無知固同灰土儻有識誓必報之貞於市始當命絶而獻已見其來自爾之後時時恆見獻甚惡之又夢乘車在山下行貞於山上推石壓之居月餘獻除曲阿令拜之明日詣謝張門下其婦平常平常二字原書闕據明鈔本補于宅暴卒獻狼狽而還入室哭婦舉頭見貞在梁上獻曰朱秣陵在此我婦豈得不死于時屋無故忽崩獻及男女婢使十餘人一時併命虞騭是其宗室助喪事見獻如是走下堂避之僅乃得免出還冤記北齊文宣帝北齊文宣高洋既死太子嗣位年號乾明文宣母弟常山王演在并州權勢甚重因文宣山陵留為録尚書事王遂怒潛生異計上省之日內外官僚皆來奔集即收縛乾明腹心尚書令楊遵彥等五人皆為事狀奏斬之尋廢乾明而自立是為孝昭帝后在并州望氣者奏鄴中有天子氣平秦王高歸彥勸殺乾明遂録向并州盡殺之其年孝昭數見文宣作諸妖怪就其索兒備為厭禳終不能遣而死出還冤記梁武帝陳霸先初立梁元帝第九子晉安王為主而輔戴之會稽虞涉本梁武世為中書舍人尚書右丞于時夢見梁武帝謂涉曰卿是我舊左右可語陳公篡殺于公不利事甚分明涉即未見篡殺形迹不敢言之數日復夢如此並語涉曰卿若不傳意卿亦不佳涉雖嗟惋決無言理少時之間太史啓云殿有急兵霸先曰急兵正是我耳倉卒遣亂兵害少主而自立爾後涉便得病又夢梁武曰卿不為我語致令禍及卿與陳主尋當知也涉方封啓報夢之由陳主為人甚信鬼物聞此大驚遣輿迎涉面相詢訪乃尤涉曰卿那不道奇事六七日涉死尋有韋戴之事出還冤記韋戴陳武帝霸先既害梁大司空王僧辨次討諸將義興太守韋戴黃門郎放之第四子也為王公固守陳主頻遣攻圍不克後重征之誘說戴曰王公親黨皆已殄滅此一孤城何所希冀過爾相拒耶若能見降不失富貴戴曰士感知己本為王公抗禦大軍致成讎敵今亦承明公盡定江左窮城自守必無路活但鋒刃屢交殺傷過甚軍人忿怨恐不見全老母在堂彌懼禍及所以苟延日月未能束手耳必有誓約不敢久勞神武乃遣刑白馬為盟戴遂開門陳主亦寬信還揚都復陳主即位遣戴從征以小遲晚因宿憾斬之尋于大殿視事便見戴來驚走入內移坐光嚴殿戴又逐入顧訪左右皆無所見因此得病死出還冤記隋庶人勇隋煬帝元德太子寢疾帝遣見鬼人崔善影看祟善影幼來無目而言見庶人勇瞋目攘袂大呼云我不放你善影具述勇狀貌如舊相識出法苑珠林京兆獄卒隋煬帝大業中京兆獄卒失其名酷暴諸囚囚不堪其苦而獄卒以為戲樂後生一子頤下肩上有若肉枷無頸數歲不能行而死出廣古今五行記邛人唐武德中邛人姓韋與一婦人言誓期不相負纍年寵衰婦人怨恨韋懼其反己自縊殺之後數日韋遍身癢因發癩瘡而死出法苑珠林
