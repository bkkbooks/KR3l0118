body:
  text: 晏嬰晏嬰齊晏嬰短小使楚楚為小門於大門側乃延晏子嬰不入曰使狗國狗門入今臣使楚不當從狗門入王曰齊無人耶對曰齊使賢者使賢王不肖者使不肖王嬰不肖故使王耳王謂左右曰晏嬰辭辨吾欲傷之坐定縛一人來王問何謂者左右曰齊人坐盜王視嬰曰齊人善盜乎對曰嬰聞橘生於江南至江北為枳枝葉相似其實味且不同水土異也今此人生於齊不解為盜入楚則為盜其實不同水土使之然也王笑曰寡人反取病焉出啓顏録東方朔漢武帝嘗問東方朔曰先生視朕何如主朔對曰自唐虞之後成康之際未足以喻臣伏觀陛下功德陳五帝之上在三王之右非徒若此而已誠得天下賢士公卿在位咸得其人矣警若以周邵為丞相孔丘為御史大夫太公為將軍畢公高拾遺於後卞嚴子為衛尉皋陶為大理後稷為司農伊尹為少府子貢使外國顏閔為博士子夏為太常益為右扶風季路為執金吾契為鴻臚龍逢為宗正伯夷為京兆管仲為馮翊魯般為將作仲山甫為光祿申伯為太僕延陵季子為水衡百里奚為典屬國柳下惠為大長秋史魚為司直孔父為詹事蘧伯玉為太傅孫叔敖為諸侯相王慶忌為期門子産為郡守夏育為鼎官羿為旄頭羿善射宋萬為式道侯上乃大笑復問今公孫丞相兒大夫董仲舒夏侯始昌司馬相如吾丘壽王主父偃朱買臣嚴助汲黯膠倉終軍嚴安徐樂司馬遷之倫皆辨知閎達溢於文辭先生自視何與比哉對曰臣觀其函齒牙樹頰胲音改吐唇吻擢項頤結股腳連脽尻遺蛇其迹行步禹旅臣朔雖不肖尚兼此數子者朔之進退淡詞皆此類也上嘗使諸數家射覆置守宮于盆下射之皆不能中朔自讚曰臣嘗受易請射之乃別蓍布卦而對曰臣以為龍又無角謂之為蛇又有足跂跂脈脈善緣壁非是守宮即蜥蜴帝曰善賜帛十匹復使射他物連中輒賜帛時有幸倡郭舍人滑稽不窮常侍左右曰朔狂幸中耳非至數也臣願令朔復射朔中之臣榜百不能中臣賜帛乃覆樹上寄生令朔射之朔曰是窶藪也舍人曰果知朔不能中也朔曰生肉為膾乾肉為脯著樹為寄生盆下為窶藪上令倡監榜舍人舍人不勝痛呼謈朔笑之曰咄口無毛聲謷謷尻益高舍人恚曰朔擅詆欺天子從官當棄市上問朔何故詆之對曰臣非敢詆之乃與為隱耳上曰隱云何朔曰夫口無毛者狗竇也聲謷謷者烏哺鷇也尻益高者鶴俯啄也舍人不服因曰臣願復問朔隱語不知亦當榜即妄為諧語曰令壺齟老柏塗伊優亞狋吽牙何謂也朔曰令者命也壺者所以盛也齟者齒不正也老者人所敬也柏者之廷也塗者漸洳徑也伊優亞者辭未窮窮字原空闕據明鈔本補也狋吽呀者兩犬爭也舍人所問朔應聲輒對變詐鋒出莫能窮者左右大驚上以朔為常侍郎遂得愛幸久之伏日詔賜從官肉大官丞日晏不來朔獨拔劍謂其同官曰伏日當蚤歸請受賜即懷肉去大官奏之朔入上曰昨賜肉不待詔以劍割肉而去之何也朔免冠謝上曰先生起自責朔再拜曰朔來朔來受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何廉也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君邊韶後漢邊韶字孝先教授數百人曾晝日假寐弟子私嘲之曰邊孝先腹便便懶讀書但欲眠孝先潛聞之應曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢靜與孔子同意師而可嘲出何典記嘲者大慚原闕出處明鈔本作出啓顏録袁次陽後漢袁次陽妻扶風馬季長女初婚裝遣甚盛次陽曰婦奉箕帚而已何乃過珍麗乎對曰慈親垂愛不敢逆命君若欲慕鮑宣梁鴻之高者妾亦請從少君孟光之事矣次陽又問曰弟先兄舉世以為笑今處姊未適先行可乎曰妾姊高行殊邈未遭良匹不如鄙薄苟然而已次陽默然不能屈帳外聽者為慚出本傳伊籍蜀先主以伊籍為左將軍從事中郎使吳孫權聞其才辨欲逆折其辭籍適入拜權曰勞事無道之君籍應聲對曰一拜一起未足為勞吳主大慚無語對出三國志張裔蜀張裔為益州太守為郡人雍闓縛送孫權武侯遣鄧芝使吳令言次從權請裔裔自至吳流徙伏匿權未之知故許芝遣裔臨發乃引見問裔曰蜀卓氏寡女亡奔相如貴土風俗何以乃爾裔對曰愚以為卓氏寡女猶賢於買臣之妻出啓顏録張裕劉璋會涪時張裕為從事侍坐其人饒鬚先主嘲之曰吾涿縣特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎裕即答曰昔有作上黨潞長遷為涿令者去官還家時人與書欲署潞則失涿署涿則失潞乃署曰潞涿君先主大笑先主無鬚故裕云及之藝文類聚卷二五引蜀志蜀志十二周群傳文文略同疑出啓顏録吳薛綜見吳薛綜見四字原空闕據黃本補蜀使張奉嘲尚書令闞澤姓名澤不能答薛綜下行乃云蜀者何也有犬為獨無犬為蜀橫目句身蟲入其腹奉曰不當復嘲君吳耶綜應聲曰無口為天有口為吳君臨萬邦天子之都於是衆坐喜笑而奉無以對也出啓顏録諸葛恪諸葛恪對南陽韓文晃誤呼其父字晃詰之曰向人子而字父而字父三字原空闕據黃本補子為是禮也恪大笑答曰向天穿針而不見者非不明意不明二字原空闕意原作澺據黃本補改有所在耳孫權使太子嘲恪曰諸葛元遜食馬矢一矢一二字原空闕據黃補本石恪答曰臣得戲君子得戲父答曰明太子未敢上曰可恪可恪二字原空闕據黃本補曰乞令太子食雞卵三百枚上問恪曰人令君食馬矢君矢君二字原空闕據許本補令人食雞卵何也恪答曰所出同耳吳主大笑出啓顏録費褘孫權嘗饗蜀使費褘逆敕群臣使至伏食勿起褘至權為輟食而群下不起褘嘲云鳳凰來翔麒麟吐哺驢騾無知伏食如故諸葛恪曰愛植梧桐以待鳳凰有何燕鳥自稱來翔何不彈射使還故鄉咸稱善出啓顏録王戎妻晉王戎妻語戎為卿戎謂曰婦那得卿壻於禮不順答曰我親卿愛卿是以卿卿我不卿卿誰當卿卿戎笑遂聽出啓顏録鄧艾鄧艾口吃語稱艾艾晉文王戲之曰艾艾為是幾艾對曰鳳兮鳳兮故是一鳳御覽四六四引作出語林又四六六引作出世說文同安陵人晉鍾育兄弟警悟過人每嘲謔未嘗困躓嘗語會聞有女善調謔往觀之於是盛飾共載行至西門一女子笑曰車中央殊高育等初不覺車後門生云向已被嘲鍾愕然門生曰中央高兩頭低也蓋言羝也兄弟多髯故云楊修晉楊修九歲甚聰慧孔君平詣其父不在楊修時為君平設有果楊梅君平以示修此實君家果應聲答曰未聞孔雀是夫子家禽也出啓顏録孫子荊晉孫子荊年少時欲隱語王武子云當枕石漱流誤曰漱石枕流王曰流可枕石可漱乎子荊曰所以枕流欲洗其耳所以漱石欲礪其齒出世說新語明鈔本作出啓顏録蔡洪晉蔡洪赴洛洛中問曰募府初開群公辟命求英奇於仄陋采賢俊於巖穴君吳楚之士亡國之餘有何異才而應斯舉蔡答曰夜光之珠不必出於盟津之河盈握之璧不必采於崑崙之山大禹生於東夷文王生於西羌聖賢所出何必常處昔武王伐紂遷頑民於洛邑諸君得無是其苗裔乎出啓顏録陸機陸機詣王武子武子有百斛羊酪指以示之曰卿東吳何以敵此陸曰有千里蓴羹未下鹽豉耳機在坐潘安至陸便起安仁曰清風至亂物起陸應聲答曰衆鳥集出啓顏録
