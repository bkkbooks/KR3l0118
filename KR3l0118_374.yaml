body:
  text: 鱉靈鱉靈鱉靈于楚死尸乃溯流上至汶山下忽復更生乃見望帝望帝立以為相時巫山甕江蜀民多遭洪水靈乃鑿巫山開三峽口蜀江陸處后令鱉靈為刺史號曰西州皇帝以功高禪位與靈號開明氏玉梁觀漢武帝時玉笥山民感山之靈異或愆旱災蝗祈之無不應乃相謂曰可置一觀彰表靈迹既構殿缺中梁一條邑民將選奇材經數旬未獲忽一夜震雷風裂達曙乃晴天降白玉梁一條可以尺度嚴安其上光彩瑩目因號為玉梁觀至魏武帝時遣使取之至其山門去觀數里亭午之際雷電大鎮裂殿脊化為白龍擘煙霧而去沒觀之東山下晉永嘉中有戴氏不知其誰之子每好遊岩谷偶入郁木山下見兩座青石搘指一條白玉梁于岩下戴氏俯近看之以手捫摸其上見赤書五行皆天文云篆試以手斧敲之聲如鐘又如隱雷之聲鱗甲張起戴氏驚異奔走告人再求尋之不知其所唐大歷初有無瑤黃生因獵亦見后數數有人見之皆隱而不聞于人自玉梁飛去后其處莫能居之皆為猛獸毒蛇所逼湘穴湘穴中有黑土歲旱人則共壅水以塞此穴穴淹則大雨立至耒陽水耒陽縣有雨瀨此縣時旱百姓共壅塞之則甘雨普降若一鄉獨壅雨亦遍應隨方所祈信若符刻孫堅得葬地孫堅喪父行葬地忽有一人曰君欲百世諸侯乎欲四世帝乎答曰欲帝此人因指一處喜悅而沒堅異而從之時富春有沙漲暴出及堅為監丞鄰黨相送于上父老謂曰此沙狹而長子后將為長沙矣果起義兵于長沙聶友新淦聶友少時貧嘗獵見一白鹿射中后見箭著梓樹八陳圖夔州西市俯臨江岸沙石下有諸葛亮八陳圖箕張翼舒鵝形鸛勢象石分布宛然尚存峽水大時三蜀雪消之際澒涌混漾可勝道哉大樹十圍枯槎百丈破磑巨石隨波塞川而下水與岸齊人奔山上則聚石為堆者斷可知也及乎水落川平萬物皆失故態唯諸葛陳圖小石之堆標聚行列依然如是者僅已六七百年年年淘灑推激逮今不動海畔石龜海畔有大石龜俗云魯班所作夏則入海冬則復止于山上陸機詩云石龜常懷海我寧忘故鄉又臨邑縣北有燕公墓碑碑尋失唯趺龜存焉石趙世此龜夜常負碑入水至曉方出其上常有萍藻有伺之者果見龜將入水因叫呼龜乃走墜折碑焉釣台石大業七年二月初造釣台之時多運石者將船兵丁困弊于役嗟歎之聲聞于道路時運石者將船至江東岸山下取石纍構為釣台之基忽有大石如牛十余自山頂飛下直入船內如人安置船無傷損汾州女子隋末築汾州城惟西南隅不合朝成夕敗如此數四焉城中一童女年十二三告其家人云非吾入築城終無合理家人莫信鄰里哂之此后築城敗如初童女曰吾今日死死后甕盛吾埋于築處言訖而終如其言瘞之瘞訖即板築城不復毀波斯王女吐火羅國縛底野城古波斯王烏瑟多習之所築也王初築此城即壞歎曰吾今無道天令築此城不成矣有小女名那息見父憂恚問曰王有鄰敵乎王曰吾是波斯國王領千余國今至吐火羅中欲築此城垂功萬代既不遂心所以憂耳女曰願王無憂明旦令匠視我所履之迹築之即立王異之至明女起步西北自截右手小指遺血成蹤匠隨血築之城不復壞女遂化為海神其海至今猶在堡下水澄清如鏡周五百餘步程顏程顏稅居新昌里調選不集貧而復病有老嫗謂曰君貧病吾能救之復能與君致妻言訖而去是夜三更果有人云陳尚令持禮來顏莫測其由開關乃送綾絹數十束顏問陳尚何人也使者曰醫也乃附藥一丸令帶之能愈一切疾顏帶之果疾愈數日后夕有大旋風入顏居須臾風定見擔輿三乘有一女三青衣從之問其故曰越州扶余縣趙明經之女父母配事前扶余尉程顏適為大風飄至此顏無所遣因納之既而以其事驗之信然而越州自有人與顏姓名同文水縣墜石唐貞觀十八年十月文水縣天大雷震云中落一石下大如碓觜脊高腹平縣丞張孝靜奏時有西域摩伽簹菩提寺長年師到西京頗推博識敕問之是龍食二龍相爭故落下耳玄宗聖容玄宗皇帝御容夾苧作本在周至修真觀中忽有僧如狂負之置于武功潛龍宮宮即神堯故第也今為佛宇御容唯衣絳紗衣幅巾而已寺僧云莊宗入汴明宗入洛洎清泰東赴伊瀍之歲額上皆有汗流學士張沆嘗聞之而未之信及經武功乃細視之果如其説又意其雨漏所致而幅巾之上則無自天福之后其汗遂絶高陵縣又有神堯先世莊田今亦為宮觀矣有柏樹焉相傳云高祖在襁褓之時母即置放柏樹之陰而往餉田比餉回日斜而樹影不移則今柏樹是也史傳不載而故老言之渝州蓮花渝州西百里相思寺北石山有佛迹十二皆長三尺許闊一尺一寸深九寸中有魚文在佛堂北十余步貞觀二十年十月寺側泉內忽出紅蓮花面廣三尺遊旅往還無不歎訝經月不滅昔齊荊州城東天子井出錦于時士女取用與常錦不異經月乃歇亦此類也玉馬沈傅師為宣武節度使堂前忽馬嘶其聲甚近求之不得他日嘶聲漸近似在堂下掘之深丈余遇小空洞其間得一玉馬高三二寸長四五寸嘶則如壯馬之聲其前致碎朱砂貯以金槽糞如緑豆而赤如金色沈公恆以朱砂喂之華山道侶處士元固言貞元初嘗與道侶遊華山谷中見一人股襪履甚新斷處如膝頭初無痕迹鄭仁本弟唐大和中鄭仁本表弟不記姓名常與一王秀才遊嵩山捫羅越澗境極幽忽迷歸路將暮不知所之徙倚間忽覺叢中鼾聲披榛窺之見一人布衣衣甚潔白枕一袱物方眠熟即呼之曰某偶入此徑迷路君知向官道無其人舉首略視不應復寢又再三呼之乃起坐顧曰來此二人因就之且問其所自其人笑曰君知月七寶合成乎月勢如丸其影多為日爍其亞處也常有八萬二千戶修之子即一數因開袱有斤鑿事玉屑飯兩裹授與二人曰分食此雖不足長生無疾耳乃起與二人指一歧徑曰但由此自合官道矣言已不見楚州僧楚州界內小山山上有室而無水僧智一掘井深三丈遇石鑿石穴及土又深五十尺得一玉長尺二闊四寸赤如榴花每面有六龜子紫色可愛中若可貯水狀僧偶擊一角視之遂瀝血半月日方止胡氏子洪州胡氏子亡其名胡本家貧有子五人其最小者氣狀殊偉此子既生家稍充給農桑營贍力漸丰足鄉里咸異之其家令此子主船載麥溯流詣州市未至間江岸險絶牽路不通截江而渡船勢抵岸力不制沙摧岸崩穴中得錢數百萬乃棄麥載錢而歸由是其家益富市置仆馬營飾服裝咸言此子有福不欲久居村落因令來往城市稍親狎人事行及中道所乘之馬跪地不進顧謂其仆曰船所抵處得錢今馬跪地亦恐有物因令左右副斫之得金五百兩繼之還家他日復詣城市因有商胡遇之知其頭中有珠使人誘而狎之飲之以酒取其珠而去初額上有肉隱起如球子形失珠之后其肉遂陷既還家親友眷屬咸共嗟訝之自是此子精神減耗成疾而卒其家生計亦漸亡落焉王蜀先主唐僖宗皇帝播遷漢中蜀先主建為禁軍都頭與其儕于僧院擲骰子六只次第相重自麼至六人共駭之他日霸蜀因幸興元訪當時僧院其僧尚在問以舊事此僧具以骰子為對先主大悅厚賜之廬山漁者廬山中有一深潭名落星潭多漁釣者后唐長興中有釣者得一物頗覺難引迤邐至岸見一物如人狀戴鐵冠積歲莓苔裹之意其木則太重意其石則太輕漁者置之潭側后數日其物上有泥滓莓苔為風日所剝落又經雨淋洗忽見兩目俱開則人也欻然而起就潭水盥手面衆漁者驚異共觀之其人即詢諸漁者本處土地山川之名及朝代年月甚詳審問訖卻入水中寂無聲迹然竟無一人問彼所從來者南中吏民神異之為建祠壇于潭上桂從義池陽建德縣吏桂從義家人入山伐薪常所行山路忽有一石崩倒就視之有一室室有金漆柏床六張茭荐芒簟皆新金翠積疊其人坐床上良久因揭簟下見一角柄小刀取內懷中而出扶起崩石塞之以物為記歸呼家人共取及至則石壁如故了無所見金精山木鶴虔州虔化縣金精山昔長沙王吳芮時仙女張麗英飛升之所道館在焉岩高數百尺有二木鶴二女仙乘之鐵鎖懸于岩下非榜道所及不知其所從其二鶴恆隨四時而轉初不差忒順義道中百勝軍小將陳師粲者能卷簟為井躍而出入嘗與鄉里女子遇于岩下求娶焉女子曰君能射中此鶴目即可師粲即一發而中臂即無力歸而病臥如夢非夢見二女道士饒床而行每過輒以手拂師粲之目數四而去竟失明而卒所射之鶴自爾不復轉其一猶轉如故辛酉歲其女子猶在師粲之子孫亦為軍士賣餅王老廣陵有賣餅王老無妻獨與一女居王老晝日自賣餅所歸家見其女與他少年共寢于北戶下王老怒持刀逐之少年躍走得免王老怒甚遂殺其女而少年行至中路忽流血滿身吏呵問之不知所對拘之以還王老之居鄰伍方案驗其事王老見而識之遂抵罪桃林禾閩王審知初為泉州刺史州北數十里地名桃林光啓初一夕村中地震有聲如鳴數百面鼓及明視之禾稼方茂了無一莖試掘地求之則皆倒懸在土下其年審知剋晉安盡有甌閩之地傳國六十年至于延羲立桃林地中復有鼓聲時禾已收惟余梗在田及明視之亦無一莖掘地求之則亦倒懸土下其年延羲為左右所殺王氏遂滅王延政王延政為建州節度延平村人夜夢人告之曰與汝富旦入山求之明日入山終無所得爾夕復夢如前村人曰旦已入山無所得也其人曰但求之何故不得于是明日復入向暮息大樹下見方丈之地獨明淨試掘之得赤土如丹既無他物則負之歸飾以牆壁煥然可愛人聞者競以善價從此人求市延政聞之取以飾其宮室署其人以牙門之職數年建州亦敗洪州樵人入西山岩石之下藤蘿甚密中有一女冠姿色絶世閉目端坐衣帔皆如新衆觀之不能測或為整其冠髻即應手腐壞衆懼散去復尋之不能得
