body:
  text: 裴氏子裴氏子唐開元中長安裴氏子於延平門外莊居兄弟三人未仕以孝義聞雖貧好施惠常有一老父過之求漿衣服顏色稍異裴子待之甚謹問其所事云以賣藥為業問其族曰不必言也因是往來憩宿於裴舍積數年而無倦色一日謂裴曰觀君兄弟至窶而常能恭己不倦於客君實長者積德如是必有大福吾亦厚君之惠今為君致少財物以備數年之儲裴敬謝之老父遂命求炭數斤坎地為爐熾火少頃命取小磚瓦如手指大者數枚燒之少頃皆赤懷中取少藥投之乃生紫煙食頃變為金矣約重百兩以授裴子謂裴曰此價倍於常者度君家事三年之蓄矣吾自此去候君家罄盡當復來耳裴氏兄弟益敬老父拜之因問其居曰後當相示焉訣別而去裴氏乃貨其金而積糧明年遇水旱獨免其災後三年老父復至又燒金以遺之裴氏兄弟一人願從學老父遂將西去數里至大白山西巖下一大盤石左有石壁老父以杖叩之須臾開乃一洞天有黃冠及小童迎接老父引裴生入洞初覺暗黑漸即明朗乃見城郭人物內有宮闕堂殿如世之寺觀焉道士玉童仙女無數相迎入盛歌樂諸道士或琴碁諷誦言論老父引裴氏禮謁謂諸人曰此城中主人也遂留一宿食以胡麻飯麟脯仙酒裴告歸相與訣別老父復送出洞遺以金寶遣之謂裴曰君今未合久住且歸後二十年天下當亂此是太白左掩洞君至此時可還來此吾當迎接裴子拜別比至安史亂裴氏全家而去隱於洞中數年居處仙境咸受道術亂定復出兄弟數人皆至大官一家良賤亦蒙壽考焉出原化記崔煒貞元中有崔煒者故監察向之子也向有詩名於人間終於南海從事煒居南海意豁然也不事家産多尚豪俠不數年財業殫盡多棲止佛舍時中元日番禺人多陳設珍異於佛廟集百戲于開元寺煒因窺之見乞食老嫗因蹶而覆人之酒甕當壚者毆之計其直僅一緡耳煒憐之脫衣為償其所直嫗不謝而去異日又來告煒曰謝子為脫吾難吾善灸贅疣今有越井岡艾少許奉子每遇疣贅只一炷耳不獨愈苦兼獲美艷煒笑而受之嫗倏亦不見後數日因遊海光寺遇老僧贅于耳煒因出艾試灸之而如其說僧感之甚謂煒曰貧道無以奉酬但轉經以資郎君之福祐耳此山下有一任翁者藏鏹巨萬亦有斯疾君子能療之當有厚報請為書導之煒曰然任翁一聞喜躍禮請甚謹煒因出艾一爇而愈任翁告煒曰謝君子痊我所苦無以厚酬有錢十萬奉子幸從容無草草而去煒因留彼煒善絲竹之妙聞主人堂前彈琴聲詰家童對曰主人之愛女也因請其琴而彈之女潛聽而有意焉時任翁家事鬼曰獨腳神每三歲必殺一人饗之時已逼矣求人不獲任翁俄負心召其子計之曰門下客既不來明鈔本無不來二字無血屬可以為饗吾聞大恩尚不報況愈小疾耳遂令具神饌夜將半擬殺煒已潛扃煒所處之室而煒莫覺女密知之潛持刃於窗隙間告煒曰吾家事鬼今夜當殺汝而祭之汝可持此破窗遁去不然者少頃死矣此刃亦望持去無相纍也煒恐悸汗流揮刃攜艾斷窗櫺躍出拔鍵而走任翁俄覺率家僮十餘輩持刃秉炬追之六七里幾及之煒因迷道失足墜于大枯井中追者失蹤而返煒雖墜井為槁葉所藉而無傷及曉視之乃一巨穴深百餘丈無計可出四旁嵌空宛轉可容千人中有一白蛇盤屈可長數丈前有石臼巖上有物滴下如飴蜜注臼中蛇就飲之煒察蛇有異乃叩首祝之曰龍王某不幸墜于此願王憫之幸不相害因飲其餘亦不饑渴細視蛇之唇吻亦有疣焉煒感蛇之見憫欲為灸之奈無從得火既久有遙火飄入于穴煒乃燃艾啓蛇而灸之是贅應手墜地蛇之飲食久妨礙及去頗以為便遂吐徑寸珠酬煒煒不受而啓蛇曰龍王能施雲雨陰陽莫測神變由心行藏在己必能有道拯援沉淪儻賜挈維得還人世則死生感激銘在肌膚但得一歸不願懷寶蛇遂咽珠蜿蜒將有所適煒遂載拜跨蛇而去不由穴口只於洞中行可數十里其中幽暗若漆但蛇之光燭兩壁時見繪畫古丈夫咸有冠帶最後觸一石門門有金獸齧環洞然明朗蛇低首不進而卸下煒煒將謂已達人世矣入戶但見一室空闊可百餘步穴之四壁皆鐫為房室當中有錦繡幃帳數間垂金泥紫更飾以珠翠炫晃如明星之連綴帳前有金爐爐上有蛟龍鸞鳳龜蛇鸞雀皆張口噴出香煙芳芬蓊鬱傍有小池砌以金壁貯以水銀鳧鷖之類皆琢以瓊瑤而泛之四壁有床咸飾以犀象上有琴瑟笙篁鼗鼓柷敔不可勝記煒細視手澤尚新煒乃恍然莫測是何洞府也良久取琴試彈之四壁戶牖咸啓有小青衣出而笑曰玉京子已送崔家郎君至矣遂卻走入須臾有四女皆古環髻曳霓裳之衣謂煒曰何崔子擅入皇帝玄宮耶煒乃捨琴再拜女亦酬拜煒曰既是皇帝玄宮皇帝何在曰暫赴祝融宴爾遂命煒就榻鼓琴煒乃彈胡笳女曰何曲也曰胡笳也曰何為胡笳吾不曉也煒曰漢蔡文姬即中郎雍之女也沒于胡中及歸感胡中故事因撫琴而成斯弄像胡中吹笳哀咽之韻女皆怡然曰大是新曲遂命酌醴傳觴煒乃叩首求歸之意頗切女曰崔子既來皆是宿分何必匆遽幸且淹駐羊城使者少頃當來可以隨往謂崔子曰皇帝已許田夫人奉箕帚便可相見崔子莫測端倪不敢應答遂命侍女召田夫人夫人不肯至曰未奉皇帝詔不敢見崔家郎也再命不至謂煒曰田夫人淑德美麗世無儔匹願君子善奉之亦宿業耳夫人即齊王女也崔子曰齊王何人也女曰王諱橫昔漢初亡齊而居海島者逡巡有日影入照坐中煒因舉首上見一穴隱隱然覩人間天漢耳四女曰羊城使者至矣遂有一白羊自空冉冉而下須臾至座背有一丈夫衣冠儼然執大筆兼封一青竹簡上有篆字進於香几上四女命侍女讀之曰廣州刺史徐紳死安南都護趙昌充替女酌醴飲使者曰崔子欲歸番禺願為挈往使者唱喏謂煒曰他日須與使者易服緝宇以相酹勞煒但唯唯四女曰皇帝有勑令與郎君國寶陽燧珠將往至彼當有胡人具十萬緍而易之遂命侍女開玉函取珠授煒煒載拜捧受謂四女曰煒不曾朝謁皇帝又非親族何遽貺遺如是女曰郎君先人有詩于越臺感悟徐紳遂見修緝皇帝愧之亦有詩繼和賚珠之意已露詩中不假僕說郎君豈不曉耶煒曰不識皇帝何詩女命侍女書題于羊城使者筆管上云千歲荒臺隳路隅一煩太守重椒塗感君拂拭意何極報爾美婦與明珠煒曰皇帝原何姓字女曰已後當自知耳女謂煒曰中元日須具美酒豐饌于廣州蒲澗寺靜室吾輩當送田夫人往煒遂再拜告去欲躡使者之羊背女曰知有鮑姑艾可留少許煒但留艾即不知鮑姑是何人也遂留之瞬息而出穴履于平地遂失使者與羊所在望星漢時已五更矣俄聞蒲澗寺鐘聲遂抵寺僧人以早糜見餉遂歸廣州崔子先有舍稅居至日往舍詢之曰已三年矣主人謂崔煒曰子何所適而三秋不返煒不實告開其戶塵榻儼然頗懷悽愴問刺史則徐紳果死而趙昌替矣乃抵波斯邸潛鬻是珠有老胡人一見遂匍匐禮手曰郎君的入南越王趙他墓中來不然者不合得斯寶蓋趙他以珠為殉故也崔子乃具實告方知皇帝是趙他他亦曾稱南越武帝故耳遂具十萬緍易之崔子請胡人曰何以辨之曰我大食國寶陽燧珠也昔漢初趙他使異人梯山航海盜歸番禺今僅千載矣我國有能玄象者言來歲國寶當歸故我王召我具大舶重資抵番禺而搜索今日果有所獲矣遂出玉液而洗之光鑒一室胡人遽泛舶歸大食去煒得金遂具家産然訪羊城使者竟無影響後有事于城隍廟忽見神像有類使者又覩神筆上有細字乃侍女所題也方具酒脯而奠之兼重粉繢及廣其宇是知羊城即廣州城廟有五羊焉又徵任翁之室則村老云南越尉任囂之墓耳又登越王殿臺覩先人詩云越井岡頭松柏老越王臺上生秋草古墓多年無子孫野人踏踐成官道兼越王繼和詩蹤跡頗異乃詢主者主者曰徐大夫紳因登此臺感崔侍御詩故重粉飾臺殿所以煥赫耳後將及中元日遂豐潔香饌甘醴留蒲澗寺僧室夜將半果四女伴田夫人至容儀艷逸言旨雅淡四女與崔生進觴諧謔將曉告去崔子遂再拜訖致書達於越王卑辭厚禮敬荷而已遂與夫人歸室煒詰夫人曰既是齊王女何以配南越人夫人曰某國破家亡遭越王所虜為嬪御王崩因以為殉乃不知今是幾時也看烹酈生如昨日耳每憶故事輒一潸然煒問曰四女何人曰其二甌越王搖所獻其二閩越王無諸所進俱為殉者又問曰昔四女云鮑姑何人也曰鮑靚女葛洪妻也多行灸於南海煒方歎駭昔日之嫗耳又曰呼蛇為玉京子何也曰昔安期生長跨斯龍而朝玉京故號之玉京子煒因在穴飲龍餘沫肌膚少嫩筋力輕健後居南海十餘載遂散金破産棲心道門乃挈室往羅浮訪鮑姑後竟不知所適出傳奇
