body:
  text: 儒行劉獻之後魏劉獻之少好學尤精詩傳泛觀子史見名法之言掩卷而笑曰若使楊墨之流不為此書千載誰知少也又謂所親曰觀屈原離騷之作自是狂人死何足惜時人有從之學者獻之曰立身雖百行殊途准之四科要以德行為首子若能入孝出悌忠信仁讓不待出戶天下自知儻不能然雖復下帷針股躡履從師止可博聞強識不過為土龍乞雨眩惑將來其於立身之道何益乎孔門之徒初亦未悟見吾丘之歎方乃歸而養親嗚呼先達之人何自學之晚也由是四方學者慕之歎曰吾不如莊周樗散遠矣固以疾辭出談藪盧景裕范陽盧景裕太常靜之子司空同之猶子少好間默馳騁經史守道恭素不以榮利居心時號居士焉初頭生一叢白毛數之四十九莖故偏好老易為注解至四十九而卒故小字白頭性端謹雖在暗室必矜莊自持盛暑之月初不露袒妻子相對有若嚴賓歷位中書侍郎出談藪蕭德言唐蕭德言篤志於學每開五經必盥濯束帶危坐對之妻子謂曰終日如是無乃勞乎德言曰敬先師之言豈憚於此乎出談賓録張楚金張楚金與越石同預鄉貢進士州司將罷越石而貢楚金楚金辭曰以順即越石長以才即楚金不如固請俱退李績為都督歎曰貢士本求才行相推如此何嫌雙舉乃薦擢第出談賓録沈約梁琅邪王筠幼而清隸文采逸艷為沈約所賞及沈為尚書令筠為郎謂筠曰僕昔與王謝諸賢為文會之賞自零落以來朽疾相繼平生玩好殆欲都絶而一文一詠此事不衰不意疲暮復遇盛德都伯喈見王仲宣歎曰此王公之孫吾家書籍萬卷必當相與僕雖不敏請慕斯言每商確書史流流字原闕據明鈔本補閲篇章畢夜闌景以為得志之賞筠歷位司徒左長史度支尚書出談藪唐高宗胡楚賓屬文敏速每飲酒半酣而後操筆高宗每令作文必以金銀杯盛酒令飲便以杯賜之出談賓録天后則天幸龍門令從官賦詩左史東方虯詩先成則天以錦袍賜之及宋之問詩成則天稱詞更高奪袍以賜之出談賓録源乾曜源乾曜因奏事稱旨上悅之於是驟拔用歷戶部侍郎京兆尹以至宰相異日上獨與高力士語曰汝知吾拔用乾曜之速乎曰不知也上曰吾以容貌言語類蕭至忠故用之對曰至忠不嘗負陛下乎陛下何念之深也上曰至忠晚乃謬計耳其初立朝得不謂賢相乎上之愛才宥過聞者莫不感悅出國史補張建封崔膺性狂張建封愛其文以為客隨建封行營夜中大叫驚軍軍士皆怒欲食其肉建封藏之明日置宴監軍曰某有與尚書約彼此不得相違建封曰唯監軍曰某有請請崔膺建封曰如約逡巡建封又曰某亦有請卻請崔膺座中皆笑後乃得免出國史補李實李實為司農卿促責官租蕭祐居喪輸不及期實怒召至租車亦至故得不罪會有賜與當為謝狀常秉筆者方有故實急乃曰召衣齊衰者祐至立為草狀實大喜延英薦之德宗令問喪期屈指以待及釋服之明日自處士拜拾遺祐有文章善畫好鼓琴其拔擢乃偶然耳出國史補韓愈李賀字長吉唐諸王孫也父瑨肅邊上從事賀年七歲以長短之歌名動京師時韓愈與皇甫湜賢賀所業奇之而未知其人因相謂曰若是古人吾曹不知者若是今人豈有不知之理會有以瑨肅行止言者二公因連騎造門請其子既而總角荷衣而出二公不之信因面試一篇賀承命欣然操觚染翰旁若無人仍目曰高軒過曰華裾織翠青如蔥金環壓轡搖玲瓏馬蹄隱隱聲隆隆入門下馬氣如虹云是東京才子文章巨公二十八宿羅心胸殿前作賦聲磨空筆補造化天無功元精耿耿貫當中龐眉書客感秋蓬誰知死草生華風我今垂翅負天鴻他日不羞蛇作龍二公大驚遂以所乘馬命聯鑣而還所居親為束髮年未弱冠丁內艱他日舉進士或謗賀不避家諱文公時著辨諱一篇不幸未壯室而終出托言又韓愈引致後輩為舉科第多有投書請益者時人謂之韓門弟子後官高不復為也出國史補楊敬之楊敬之愛才公正嘗知江表之士項斯贈詩曰處處見詩詩總好及觀標格過於詩平生不解藏人善到處相逢說項斯因此遂登高科也出尚書故實盧肇王鐐富有才情數舉未捷門生盧肇等公薦於春官云同盟不嗣賢者受譏相子負薪優臣致誚乃旌鐐嘉句曰擊石易得火扣人難動心今日朱門者曾恨朱門深聲聞藹然果擢上第出抒情詩令狐綯宣皇坐朝次對官趨至前必待氣息平勻上然後問事令狐綯進李遠為杭州刺史宣皇曰我聞李遠詩云長日唯銷一局棋豈可以臨郡哉對曰詩人之言不足有實也仍薦遠廉察可任乃俞之出幽間鼓吹崔鉉鄭愚尚書廣州人擢進士第第下原有士字據北夢瑣言三刪揚歷清顯聲甚高而性好華以錦為半臂崔魏公鉉鎮荊南鄭授廣南節制路由渚宮鉉以常禮待之鄭為進士時未嘗以文章及魏公門至是乃贄所業魏公覽之深加歎賞曰真銷得半臂也出北夢瑣言孔稚圭齊會稽孔稚圭光祿靈産之子侍中道隆之孫張融之內弟稚圭富學與陸思曉謝瀹為君子之交圭不樂世務宅中草沒人南有山池春日蛙鳴僕射王晏嘗鳴笳鼓造之聞群蛙鳴晏曰此殊聒人耳答曰我聽卿鼓吹殆不及此晏有愧色歷位太子詹事贈光祿大夫出談藪李元誠北齊趙郡李元誠巨鹿貞公恢之孫巨鹿簡介靈之靈之原作之公據北齊書二二李元忠傳改曾孫性放誕不好世務以飲酒為務為太常卿太祖欲以為僕射而疑其多酒子騷諫之元誠曰我言作僕射不如飲酒樂爾爾原作耳據明鈔本改愛僕射宜勿飲酒行臺尚書司馬子如及孫騰嘗詣元誠其庭宇蕪曠環堵頽圯在樹下以被自擁獨對一壺陶然樂矣因見見字原闕據明鈔本補其妻衣不曳地撒所坐在褥質酒肉以盡歡意焉二公嗟尚各置餉饋受之而不辭散之親故元誠一名元忠拜儀同領衛尉封晉陽公卒贈司徒諡曰文宣出談藪陶弘景丹陽陶弘景幼而惠博通經史覩葛洪神仙傳便有志於養生每言仰視青雲白日不以為遠初為宜都王侍讀後遷奉朝請永明永明原作水平按梁書五陶弘景傳謂永明十年上表辭祿據改中謝職隱茅山山是金陵洞穴周回一百五十里名曰華陽洞天有三茅司命之府故時號茅山由是自稱華陽隱居人間書疏皆以此代名亦士安之玄晏稚川之抱朴也惟愛林泉尤好著述縉紳士庶稟道伏膺承流向風千里而至先生嘗曰我讀外書未滿萬卷以內書兼之乃當小出耳齊高祖問之曰山中何所有弘景賦詩以答之詞曰山中何所有嶺上多白雲只可自怡悅不堪持寄君高祖賞之出談藪田遊巖唐田遊巖初以儒學纍徵不起侍其母隱嵩山甘露中中宗幸中嶽因訪其居遊巖出拜詔命中書侍郎薛元超入問其母御題其門曰隱士田遊巖宅徵拜弘文學士出翰林盛事朱桃椎蜀人也淡泊無為隱居不仕披裘帶索沈浮人間竇軌為益州聞而召之遺以衣服逼為鄉正桃椎不言而退逃入山中夏則裸形冬則以樹皮自覆凡所贈遺一無所受織芒屩置之於路上見者皆曰朱居士之屩也為鬻取米置之本處桃椎至夕取之終不見人高士廉下車深加禮敬召至降階與語桃椎一答既而便去士廉每加褒異蜀人以為美談出大唐新語盧鴻玄宗徵嵩山隱士盧鴻三詔乃至及謁見不拜但磬折而已問其故鴻對曰臣聞老子云禮者忠信之薄不足可依山臣鴻敢以忠信奉上玄宗異之召入賜宴拜諫議大夫賜章服並辭不受給米百石絹百匹送還隱居之處出大唐新語元結天寶之亂元結自汝濆大率鄰里南投襄漢保全者千餘家乃舉義師宛葉之間有嬰城捍寇之力結天寶中師中行子始在商於之山稱元子逃難入猗玗之山稱猗玗子或稱浪士漁者呼為叟酒徒呼為漫叟及為官呼漫郎出國史補賀知章賀知章性放曠美談笑當時賢達咸傾慕陸象先即知章姑子也知章特相親善象先謂人曰賀兄言論調態真可謂風流之士晚年縱誕無復規檢自號四明狂客醉後屬詞動成篇卷文不加點咸有可觀又善草隸書好事者共傳寶之請為道士歸鄉捨宅為觀上許之仍拜子為會稽郡司馬御製詩以贈行出談賓録顧況顧況志尚疏逸近於方外有時宰曾招致將以好官命之況以詩答之曰四海如今已太平相公何事喚狂生此身還似籠中鶴東望滄溟叫數聲後吳中皆言況得道解化去出尚書故實陳琡鴻之子也鴻與白傅傳長恨詞文格極高蓋良史也咸通中佐廉使郭常侍銓之幕于徐性尤耿介非其人不與之交同院有小計姓武亦元衡相國之後蓋汾陽之坦床也乃心不平之遂挈家居于茅山與妻子隔山而居短褐束絛焚香習禪而已或一年半載與妻子略相面焉在職之時唯流溝寺長老與之款接亦具短褐相見自述檀經三卷今在藏中臨行留一章與其僧云行若獨輪車常畏大道覆止若圓底器常恐他物觸行止既如此安得不離俗乾符中弟璉復佐薛能幕于徐自丹陽棹小舟至于彭門與弟相見薛公重其為人延請入城遂堅拒之曰某已有誓不踐公門矣薛乃攜舟造之話道永日不宿而去其志尚之介僻也如此出玉堂閒話孔拯孔拯侍郎為遺補時嘗朝回值雨而無雨備乃於人家簷廡下避之過食時雨益甚其家乃延入廳事有一叟出迎甚恭備酒饌亦甚豐潔公侯家不若也拯慚謝之且假雨具叟曰某閒居不預人事寒暑風雨未嘗冒也置此欲安施乎令於他處假借以奉之拯退而嗟嘆若忘宦情語人曰斯大隱者也出北夢瑣言
