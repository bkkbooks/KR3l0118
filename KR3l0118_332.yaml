body:
  text: 唐烜唐烜唐烜者晉昌人也其姑適張恭即安定張輒之後隱居滑州衛南人多重之有子三人進士擢第女三人長適辛氏次適梁氏小女姑鍾念習以詩禮頗有令德開元中父亡哀毀過禮烜常慕之及終制乃娶焉而留之衛南莊開元十八年烜以故入洛纍月不得歸夜宿主人夢其妻隔花泣俄而窺井笑及覺心惡之明日就日者問之曰隔花泣者顏隨風謝窺井笑者喜於泉路也居數日果有凶信烜悲慟倍常後數歲方得歸衛南追其陳迹感而賦詩曰寢室悲長簟粧樓泣鏡臺獨悲桃李節不共夜泉開魂兮若有感髣佛夢中來又曰常時華堂靜笑語度更籌恍惚人事改冥寞委荒丘陽原歌薤露陰壑悼藏舟清夜莊臺月空想畫眉愁是夕風露清虛烜耿耿不寐更深悲吟前悼亡詩忽聞暗中若泣聲初遠漸近烜驚側覺有異乃祝之曰儻是十娘子之靈何惜一相見敘也勿以幽冥隔礙宿昔之愛須臾聞言曰兒郎張氏也聞君悲吟相念雖處陰冥實所惻愴愧君誠心不以沉魂可棄每所記念是以此夕與君相聞烜驚嘆流涕嗚咽曰在心之事卒難申敘然須一見顏色死不恨矣答曰隱顯道隔相見殊難亦慮君亦有疑心妾非不欲盡也烜詞益懇誓無疑二俄而聞喚羅敷取鏡又聞暗中颯颯然人行聲羅敷先出前拜言娘子欲敘夙昔正期與七郎相見烜問羅敷曰我開元八年典汝與仙州康家聞汝已于康家死矣今何得在此答曰被娘子贖來今看阿美阿美即烜之亡女也烜又惻然須臾命燈燭立於阼階之北烜趨前泣而拜妻答拜烜乃執手敘以平生妻亦流涕謂烜曰陰陽道隔與君久別雖冥寞無據至於相思嘗不去心今六合之日冥官感君誠懇放兒暫來千年一遇悲喜兼集又美娘又小囑付無人今夕何夕再遂申款烜乃命家人列拜起居徙燈入室施布帷帳不肯先坐乃曰陰陽尊卑以生人為貴君可先坐烜即如言笑謂烜曰君情既不易平生然聞已再婚新故有間乎烜甚怍妻曰論業君合再婚君新人在淮南吾亦知甚平善因語人生修短固有定乎答曰必定矣又問佛稱宿因不謬乎答曰理端可鑒何謬之有又問佛與道孰是非答曰同源異派耳別有太極仙品總靈之司出有入無之化其道大哉其餘悉如人間所說今不合具言彼此為纍烜懼不敢復問因問欲何膳答曰冥中珍羞亦備唯無漿水粥不可致耳烜即令備之既至索別器攤之而食向口如盡及徹之粥宛然烜悉飯其從者有老姥不肯同坐妻曰倚是舊人不同群小謂烜曰此是紫菊嬭豈不識耶烜方記念別席飯其餘侍者烜多不識聞呼名字乃是烜從京回日多剪紙人奴婢所題之名問妻妻曰皆君所與者乃知錢財奴婢無不得也妻曰往日常弄一金鏤合子藏于堂屋西北斗栱中無有人知處烜取果得又曰豈不欲見美娘乎今已長成烜曰美娘亡時繈褓地下豈受歲乎答曰無異也須臾美娘至可五六歲烜撫之而泣妻曰莫抱驚兒羅敷却抱忽不見烜令下簾帷申繾綣宛如平生烜覺手足呼吸冷耳又問冥中居何處答曰在舅姑左右烜曰娘子神靈如此何不還返生答曰人死之後魂魄異處皆有所録杳不關形骸也君何不驗夢中安能記其身也兒亡之後都不記死時亦不知殯葬之處錢財奴婢君與則知至如形骸實總不管既而綢繆夜深烜曰同穴不遠矣妻曰曾聞合葬之禮蓋同形骸至精神實都不見何煩此言也烜曰婦人沒地不亦有再適乎答曰死生同流貞邪各異且兒亡堂上欲奪兒志嫁與北庭都護鄭乾觀姪明遠兒誓志確然上下矜閔得免烜聞撫然感懷而贈詩曰嶧陽桐半死延津劍一沈如何宿昔內空負百年心妻曰方見君情輒欲留答可乎烜曰曩日不屬文何以為詞妻曰文詞素慕慮君嫌猜而不為言志之事今夕何爽遂裂帶題詩曰不分殊幽顯那堪異古今陰陽途自隔聚散兩難心又曰蘭階兔月鈄銀燭半含花自憐長夜客泉路以為家烜含涕言敘悲喜之間不覺天明須臾聞扣門聲翁婆使丹參傳語令催新婦恐天明冥司督責妻泣而起與烜訣別烜修啓狀以附之整衣聞香郁然不與世同此香何方得答言韓壽餘香兒來堂上見賜烜執手曰何時再一見答曰四十年耳留一羅帛子與烜為念烜答一金鈿合子即曰前途日限不可久留自非四十年內若於墓祭祀都無益必有相饗但於月盡日黃昏時於野田中或於河畔呼名字幾盡得也匆匆不果久語願自愛言訖登車而去揚袂久之方滅舉家皆見事見唐烜手記蕭正人琅邪太守許誡言嘗言幼時與中外兄弟夜中言及鬼神其中雄猛者或言吾不信邪何處有鬼言未終前簷頭鬼忽垂下二脛脛甚壯大黑毛且長足履於地言者走匿內弟蕭正人沈靜少言獨不懼直抱鬼脛以解衣束之甚急鬼拳脛至簷正人束之不得升復下如此數四既無救者正人放之鬼遂滅而正人無他韋鎰監察御史韋鎰自貶降量移虢州司戶參軍鎰與守有故請開虢州西郭道鎰主之凡開數里平夷丘墓數百既而守念鎰至湖按覆有人至湖告鎰妻死鎰妻亡七日召寺僧齊鎰神傷喪志諸僧慰勉齊罷鎰送僧出門言未畢若有所見則揖僧退且言曰弟子亡妻形見則若揖讓酬答至堂仆地遂卒人以為平夷丘墓之禍焉趙夏日寧王文學趙夏日文章知名以文學卒官終後每處理家事如平生家內大小不敢為非常於靈帳中言其聲甚厲第二子常見之率常在宅及三歲令其子傳語遍別人因絶去茹子顏吳人茹子顏以明經為雙流尉頗有才識善醫方由是朝賢多識之子顏好京兆府博士及選請為之既拜常在朝貴家及歸學車馬不絶子顏之婭張虛儀選授梓州通泉尉家貧不能與其妻行仍有債數萬請子顏保虛儀去後兩月餘子顏夜坐忽簷間語曰吾通泉尉張虛儀也到縣數日亡今吾柩還已發縣矣吾平生與君特善赴任日又債負纍君吾今亡家又貧匱進退相擾深覺厚顏子顏問曰君何日當至京吾使人迎候鬼乃具言發時日且求食子顏命食於坐談笑如故至期喪果至子顏為之召債家而歸其負鬼又旦夕來謝恩其言甚懇月餘而絶子顏亦不以介意數旬子顏亦死劉子貢京北人劉子貢五月二十二日在病熱卒明日乃蘇自言被録至冥司同過者十九人官召二人出木括其頭加釘鐷焉命繫之曰此二人罪重留餘者且釋去又引子貢歷觀諸獄但空墻垣為數十院不見人子貢問曰此為何處人曰此皆地獄也緣同光王生故休罪人七日此中受罪者暫停若遇其鼓作罪人受苦可驚駭耳目子貢娶于難江縣令蘇元宗見元宗於途問之曰丈人在生好善何得在此元宗曰吾前生有過故留然事已辦今將生天不久矣又問二子先死者何在長者願而信死便生天少兒賊而殺見在地獄又遇鄰人季暐暐曰君為傳語吾兒吾坐前坐罪大被拘留為吾造觀世音菩薩像一寫妙法蓮花經一部則生天矣又遇其父慎慎曰吾以同光王生故得假在外不然每日受罪苦不可言坐吾彈殺鳥獸故每日被牛頭獄卒燒鐵彈數千其色如火破吾身皮數百道納熱彈其中痛苦不可忍又見身存者多為鬼子貢以二十三日生生七日至二十九日又殂遂不活矣劉平唐咸通中有五經博士廬斝得神仙補養之道自言生於隋代宿舊朝士皆云童幼時見奕世奉之不窮其壽安史之亂隱於終南山中其後或出或處令狐綯喻以柱下漆園之事稍從宦於京師常言與處士劉平善天寶中居於齊魯尤善吐納之術能夜中視物不假燈燭安祿山在范陽厚幣致於門下平見祿山左右常有鬼物數十殊形詭狀持爐執蓋以為導從平心異之謂祿山必為人傑及祿山朝覲與平俱至華陰縣值葉法善投龍西嶽平旋見二青衣童子乘虛而至所謂祿山鬼物皆棄爐投蓋狼狽而走平因知祿山為邪物所輔必不以正道克終及祿山歸范陽遂逃入華山而隱蕭穎士蘭陵蕭穎士為揚州功曹秩滿南遊濟瓜洲渡船中有二少年熟視穎相顧曰此人甚似鄱陽忠烈王也穎士即鄱陽曾孫乃自欸陳二子曰吾識爾祖久矣穎士以廣衆中未敢詢訪俟及岸方將問之二子忽遽負擔而去穎士必謂非神即仙虔心向囑而已明年穎士比歸至于旴𣅿方與邑長下簾晝坐吏白云擒獲發冢盜六人登令召入束縛甚固旅之于庭二人者亦在其中穎士大驚因具述曩事邑長即令先窮二子須臾欸伏左驗明著皆云發墓有年嘗開鄱陽公冢大獲金玉當門有貴人顏色如生年方五十許鬚鬢斑白僵臥于石塌姿狀正與穎士相類無少差異昔舟中相遇又知蕭氏固是鄱陽裔也豈有他術哉
