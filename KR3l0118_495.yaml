body:
  text: 宇文融宇文融玄宗命宇文融為括田使融方恣睢稍不附己者必加誣譖密奏以為盧從愿廣置田園有地數百頃帝素器重亦倚為相者數矣而又族望宦婚鼎盛于一時故帝亦重言其罪但目從愿為多田翁從愿少家相州應明經常從五舉制策三等授夏縣尉自前明經至吏部侍郎才十年自吏部員外至侍郎只七個月歌舒翰天寶中歌舒翰為安西節度控地數千里甚著威令故西鄙人歌之曰北斗七星高歌舒翰夜帶刀吐蕃總殺盡更筑兩重濠時差都知兵馬使張擢上都奏事值楊國忠專權黷貨擢逗留不返因納賄交結翰續入朝奏擢知翰至懼求國忠拔用國忠乃除擢兼御史大夫充劍南西川節度使敕下就第辭翰翰命部下捽于庭數其事杖而殺之然后奏聞帝卻賜擢尸更令翰決尸一百崔隱甫梨園弟子有胡雛善吹笛尤承恩嘗犯洛陽令崔隱甫已而走入禁中玄宗非時托以他事召隱甫對胡雛在側指曰就卿乞此得否隱甫對曰陛下此言是輕臣而重樂人也臣請休官再拜而去玄宗遽曰朕與卿戲也遂令曳出至門外立杖殺之俄而复敕釋已死矣乃賜隱甫絹百匹蕭嵩玄宗嘗器重蘇頲欲倚以為相禮遇顧問與群臣特異欲命相前一日上秘密不欲令左右知迨夜艾乃令草詔訪于侍臣曰外庭直宿誰遂命秉燭召來至則中書舍人蕭嵩上即以頲姓名授嵩令草制書既成其詞曰國之瑰寶上尋繹三四謂嵩曰頲瑰之子朕不欲斥其父名卿為刊削之上仍命撤帳中屏風與嵩嵩慚懼流汗筆不能下者久之上以嵩杼思移時必當精密不覺前席以觀唯改曰國之珍寶他無更易嵩既退上擲其草于地曰虛有其表耳左右失笑上聞遽起掩其口曰嵩雖才藝非長人臣之貴亦無與比前言戲耳其默識神覽皆此類也陳懷卿岭南人也養鴨百餘頭后于鴨欄中除糞糞中有光爛然試以盆水沙汰之得金十兩乃覘所食處于舍后山足下土中有麩金消得數千斤時人莫知卿遂巨富仕至梧州刺史鄒鳳熾西京懷德坊南門之東有富商鄒鳳熾肩高背曲有似駱駝時人號為鄒駱駝其家巨富金寶不可胜計常與朝貴游邸店園宅遍滿海內四方物盡為所收雖古之猗白不是過也其家男女婢仆錦衣玉食服用器物皆一時惊異嘗因嫁女邀諸朝士往臨禮席賓客數千夜擬供帳備极華麗及女郎將出侍婢圍繞綺羅珠翠垂釵曳履尤艷麗者至數百人眾皆愕然不知孰是新婦矣又嘗謁見高宗請市終南山中樹估絹一匹自云山樹雖盡臣絹未竭事雖不行終為天下所誦后犯事流瓜州會赦還及卒子孫窮匱又有王元寶者年老好戲謔出入里市為人所知人以錢文有元寶字因呼錢為王老盛流于時矣又一說玄宗嘗召王元寶問其家私多少對曰臣請以絹一匹系陛下南山樹南山樹盡臣絹未窮又玄宗御含元殿望南山見一白龍橫亙山間問左右皆言不見令急召王元寶問之元寶曰見一白物橫在山頂不辨其狀左右貴臣啟曰何故臣等不見玄宗曰我聞至富可敵貴朕天下之貴元寶天下之富故見耳高力士高力士既譴于巫州山谷多薺而人不食力士感之因為詩寄意兩京作斤賣五溪無人采夷夏雖有殊氣味終不改其后會赦歸至武溪道遇開元中羽林軍士坐事謫岭南停車訪舊方知上皇已厭世力士北望號泣嘔血而死王維天寶末群賊陷兩京大掠文武朝臣及黃門宮嬪樂工騎士每獲數百人以兵仗嚴衛送于洛陽至有逃于山谷者而卒能羅捕追脅授以冠帶祿山尤致意樂工求訪頗切于旬日獲梨園弟子數百人群賊因相與大會于凝碧池宴偽官數十人大陳御庫珍寶羅列于前后樂既作梨園舊人不覺歔欷相對泣下群逆皆露刃持滿以脅之而悲不能已有樂工雷海清者投樂器于地西向慟哭逆党乃縛海清于戲馬殿支解以示眾聞之者莫不傷痛王維時為賊拘于菩提佛寺中聞之賦詩曰萬戶傷心生野煙百官何日更朝天秋槐葉落空宮里凝碧池頭奏管弦史思明安祿山敗史思明繼逆至東都遇櫻桃熟其子在河北欲寄遺之因作詩同去詩云櫻桃一籠子半已赤半已黃一半與懷王一半與周至詩成左右贊美之皆曰明公此詩大佳若能言一半周至一半懷王即與黃字聲勢稍穩思明大怒曰我兒豈可居周至之下思明長驅至永寧縣為其子朝義所殺思明曰爾殺我太早祿山尚得至東都而爾何亟也思明子偽封懷王周至即其傅也豆谷至德初安史之亂河東大饑荒地十五里生豆谷一夕掃而复生約得五六千石其實甚圓細美人皆賴此活焉潤州樓潤州城南隅有樓名萬歲樓俗傳樓上煙出刺史即死不死即貶開元已前以潤州為凶闕董琬為江東采訪使嘗居此州其時晝日煙出刺史皆憂懼狼狽愁情至死乾元中忽然又晝日煙出圓可一尺余直上數丈有吏密伺之就視其煙乃出于樓角隙中更近而視之乃蚊子也樓下有井井中無水黑而且深小虫后分胛之類色黑而小每晚晴出自于隙中作團而上遙看類煙以手攬之即蚊蚋耳從此知非刺史亦無慮矣丘為丘為致仕還鄉特給祿俸之半既丁母喪州郡疑所給請于觀察使韓滉滉以為授官致仕本不理務特令給祿以恩養老臣不可以在喪為異命仍舊給之唯春秋二時羊酒之直則不給雖程式無文見稱折衷裴佶朱泚既亂裴佶與衣冠數人佯為奴求出城佶貌寢自出稱甘草門兵曰此數子必非人奴如甘草不疑之李抱貞李抱貞鎮潞州軍資匱缺計無所為有老僧大為郡人信服抱貞因請之曰假和尚之道以濟軍中可乎僧曰無不可抱貞曰但言擇日鞠場焚身謀當于使宅鑿一地道通連俟火作即潛以相出僧喜從之遂陳狀聲言抱貞命于鞠場積薪貯油因為七日道場晝夜香燈焚唄雜作抱貞亦引僧入地道使之不疑僧乃升壇執爐對眾說法抱貞率監軍僚屬及將吏膜拜其下以俸入擅施堆于其旁由是士女駢填舍財億計滿七日遂送柴積灌油發焰擊鐘念佛抱貞密已遣人填塞地道俄頃之際僧薪并灰數日籍所得貨財輦入軍資庫別求所謂舍利者數十粒造塔貯焉楊志堅顏真卿為撫州刺史邑人有楊志堅者嗜學而居貧鄉人未之知也其妻以資給不充索書求離志堅以詩送之曰當年立志早從師今日翻成鬢有絲落托自知求事晚蹉跎甘道出身遲金釵任意撩新發鸞鏡從他別畫眉此去便同行路客相逢即是下山時其妻持詩詣州公牒以求別適真卿判其牘曰楊志堅早親儒教頗負詩名心雖慕于高科身未沾于寸祿愚妻睹其未遇曾不少留靡追冀缺之妻贊成好事專學買臣之婦厭棄良人污辱鄉間傷敗風教若無懲誡孰遏浮囂妻可笞二十任自改嫁楊志堅秀才餉粟帛仍署隨軍四遠聞之無不悅服自是江表婦人無敢棄其夫者
