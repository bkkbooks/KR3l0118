body:
  text: 張法義張法義唐張法義華州鄭縣人年少貧野不修禮度貞觀十一年入華山伐樹見一僧坐巖穴中法義就與語晦冥不歸僧因設松柏末以供食之謂法義曰貧道久不欲外人知檀越出慎勿言相見因為説俗人多罪纍死皆惡道志心懺悔可以滅之乃令淨浴被僧衣為懺悔旦而別去十九年法義病卒埋於野外貧無棺槨以薪木瘞之而蘇自推木出歸家家人驚愕法義自説初有兩人來取乘空行至官府入門又巡巷南行十許里左右皆有官曹門閭相對不可勝數法義至一曹院見官人遙責使者曰是華州張法義也本限三日至何因乃淹七日使者云義家狗惡兼有祝師祝師見打甚苦袒衣而背青腫官曰稽限過多各與杖二十言訖杖亦畢血流灑地官曰將法義過録事録事署發文書令送付判官召主典取法義前案簿盈一床主典對法義前披檢云其簿多先朱勾畢有未勾者則録之曰貞觀十一年法義父使刈禾法義反顧張目私罵父不孝合杖八十始録一條即見昔巖穴中僧來判官起迎問何事僧曰張法義是貧道弟子其罪盡懺悔滅除訖天曹案中已勾畢今枉追來不合死主典云經懺悔者此案勾了至如張目罵父雖蒙懺悔事未勾了僧曰若不如此當取案勘之應有福利仰判官令典將法義過王宮殿宇宏壯侍衛數十人僧亦隨至王所王起迎僧王曰師當直來耶答曰未當次直有弟子張法義被録來此人宿罪並貧道勾訖未合死主典又以張目視父事過王王曰張目懺悔此不合免然師為來請可放七日法義白僧曰日既不多後來恐不見師請即往隨師師曰七日七年也可早去法義固請隨僧因請王筆書法義掌中作一字又請王印印之曰可急去還家憑作福報後來不見我宜以掌印呈王王自放汝也法義乃辭出僧令送出至其家內至黑義不敢入使者去之遂活覺在土中甚輕薄以手推排得出因入山就僧修福義掌中所印處文不可識然皆為瘡終莫能愈至今尚存焉出法苑珠林王弘之唐王弘之貞觀中為沁州和川令有女適博陵崔軌於和川病卒經數十日其家忽於夜中聞崔語初時傾家驚恐其後乃以為常云軌是女壻雖不合於妻家立靈然而苦無所依但為置立也妻從其請朝夕置食不許置肉唯要素食恆勸禮佛又具説地獄中事云人一生恆不免殺生及不孝自餘之罪蓋亦小耳又云軌雖無罪然大資福助為軌數設齋供並寫法華金剛觀音等經各三兩部自茲已後即不復來王家一依其言寫經設供軌忽更來愧謝因云今即取別舉家哭而送之軌有遺腹之子已年四五六歲軌云此子必有名官願善養育自此不復來矣出法苑珠林崔義起妻唐司元少常伯崔義起妻蕭氏父文鏗少不食葷茹酒肉蕭氏以龍朔三年五月亡其家為修初七齋僧方食其婢素玉忽云夫人來語某曰生時聞佛經説地獄今身當之苦不可言賴男女等與我追福蒙放暫歸即向諸僧懺悔欲去又云我至二十日更來將素玉看受罪即如期素玉便昏絶三日乃蘇云初隨夫人到一大城中有一別院夫人所住亦兼有湯鑊鐵床來至夫人尋被燒煮酷毒難説其夫人父文鏗忽乘雲在空呼曰早放素玉回語素玉女曰我女生時不受戒故恣行貪嫉汝歸令崔郎多造功德為拔此厄又見一婆羅門僧從空中下作梵語教素玉念金剛法華藥師經各一遍令去既活並不遺忘有梵僧聽之云素玉所傳如同西國語與中國異也出報應記襄陽老姥唐神龍年中襄陽將鑄佛像有一老姥至貧營求助施卒不能能原作成據明鈔本改得姥有一錢則為女時母所賜也寶之六十餘年及鑄像時姥持所有因發重願投之爐中及破爐出像姥所施錢著佛胸臆因磨錯去之一夕錢又如故僧徒驚異錢至今存焉乃知至誠發心必有誠應姥心至誠故諸佛感之令後人生希有此事也出紀聞普賢社開元初同州界有數百家為東西普賢邑社造普賢菩薩像而每日設齋東社邑家青衣以齋日生子於其齋次名之曰普賢年至十八任為愚豎廝役之事蓋所備嘗後因設齋之日此豎忽推普賢身像而坐其處邑老觀者咸用怒焉既加詬罵又苦鞭撻普賢笑曰吾以汝志心故生此中汝見真普賢不能加敬而求此土像何益於是忽變其質為普賢菩薩身身黃金色乘六牙象空中飛去放大光明天花綵雲五色相映於是遂滅邑老方悟賢聖大用驚慚其西社為普賢邑齋者僧徒方集忽有婦人懷妊垂産云見欲生子因入菩薩堂中人呵怒之不可禁止因産一男子於座之前既初産生甚為汙穢諸人不可提挈出深用詬辱忽失婦人所在男變為普賢菩薩光明照燭相好端麗其所汙穢皆成香花於是乘象騰空稍稍而滅諸父老自恨愚暗不識普賢刺眇其目者十餘人由是言之菩薩變觀豈凡人能識出紀聞李洽山人李洽自都入京行至灞上逢吏持帖云追洽洽視帖文字錯亂不可復識謂吏曰帖書乃以狼籍吏曰此是閻羅王帖洽聞之悲泣請吏暫還與家人別吏與偕行過市見諸肆中饋饌吏視之久洽問君欲食乎曰然乃將錢一千隨其所欲即買止止原作正據明鈔本改得一味味原作床據明鈔本改與吏食畢甚悅謂洽曰今可速寫金光明經或當得免洽至家寫經畢畢字原本無據明鈔本補別家人與與原作畢據明鈔本改吏去行數十里至城壁宇峻嚴因問此為何城吏云安祿山作亂所司恐賊越逸故作此城以遏之又問城主為誰曰是塢元昌洽素與城主有故請為通之元昌召入相見悲喜須臾有兵馬數十萬至城而過元昌留洽坐出門迎候久之乃回洽問此兵云何曰閻羅王往西京大安國寺也既至寺登百尺高座王將簿閲云此人新造金光明經遂得延算故未合死元昌歎羡良久令人送回因此得活出廣異記王乙王乙者自少恆持如意輪咒開元初徒侶三人將適北河有船夫求載乙等不甚論錢直云正爾自行故不計價乙初不欲去謂其徒曰彼賤其價是誘我也得非苞藏禍心乎船人云所得資者只以供酒肉之資但因長者得不滯行李爾其徒信之乃渡仍市酒共飲頻舉酒屬乙乙屢聞空中言勿飲心愈驚駭因是有所疑酒雖入口者亦潛吐出由是獨得不醉洎夜秉燭其徒悉已大鼾乙慮有非道默坐念咒忽見船人持一大斧刀長五六寸從水倉中入斷二奴頭又斬二伴次當至乙乙伏地受死其燭忽爾遂滅乙被斫三斧背後有門久已釘塞忽有二人從門扶乙投水岸下水深又投於岸血雖被體而不甚痛行十餘里至一草舍揚聲云被賊劫舍中人收乙入房以為拒閉及報縣吏人引乙至劫所見岸高數十丈方知神咒原本咒下有明字據明鈔本刪之力後五六日汴州獲賊問所以云燭光忽暗便失王乙不知所之一瘡雖破而不損骨尋而平愈如故此持如意輪咒之功也出廣異記鉗耳含光竺山縣丞鉗耳含光者其妻陸氏死經半歲含光秩滿從家居竺山寺有大墩暇日登望忽於墩側見陸氏相見悲喜問其死事便爾北望見一大城云所居在此邀含光同去入城城中屋宇壯麗與人間不殊傍有一院院內西行有房數十間陸氏處第三房夫婦之情不異平素衣玩服具亦爾久之日暮謂含光曰地府嚴切君宜且還後日可領兒子等來欲有所囑明日不煩來也及翌日含光又往陸氏見之驚愕曰戒卿勿來何得復至頃之有緋衣吏侍從數十人來入院陸氏令含光入床下垂氈至地以障之戒使勿視恐主客有犯俄聞外呼陸四娘陸氏走出含光初甚怖懼後稍竊視院中都有二十八婦人緋衣各令解髻兩兩結投釜中冤楚之聲聞乎數里火滅乃去陸氏徑走入房含光見入接手床上良久悶絶既寤含光問平生齋菜誦經念佛何以更受此苦答云昔欲終時有僧見詣令寫金光明經當時許之病亟草草遂忘遺囑坐是受妄語報罹此酷罰所欲見兒子者正為造金光明經今君已見無煩兒子也含光還家乃具向諸子説其事悲泣終夕及明往視已不復見但荒草耳遂貨家産得五百千刺史已下各有資助滿二千貫文乃令長子載往五臺寫經至山中遍歷諸臺未有定居尋而又上臺山路之半遇一老僧謂之曰寫經救母何爾遲回留錢於臺宜速還寫金剛經也言訖不見其子知是文殊菩薩留錢而還乃至舍寫經畢上墩又見地獄因爾直入遇閉門乃扣之門內問是誰鉗耳贊府即云是我明鈔本無誰字我字即作耶久之有婦人出曰貴閣令相謝寫經之力已得託生人間千萬珍重含光乃問夫人何故居此答云罪狀頗同故復在此爾出廣異記席豫唐開元初席豫以監察御史按覆河西去河西兩驛下食求羊肝不得撻主驛吏外白肝至見肝在盤中搖動不息豫顰蹙良久令持去乃取一絹為羊鑄佛半日許豫暴卒隨吏見見原作問據明鈔本改王王曰殺生有道何故生取其肝獨能忍乎豫云初雖求肝肝至見動實不敢食言訖見一小佛從雲飛下王起頂禮佛言如豫所陳王謂羊曰他不食汝肝今欲如何尋放豫還也出廣異記裴休唐開成元年宰相裴休留心釋氏精於禪律師圭峰密禪師得達摩頓間密師注法界觀禪詮皆相國撰文序常被毳衲於歌妓院中持鉢乞食自言曰不為俗情所染可以説法為人每自發願願世世為國王弘護佛法後於闐國王生一子手文中有裴休二字聞於中朝其子弟請迎之彼國不允而止出北夢瑣言牙將子唐東蜀大聖院有木像製度瑰異耆老相傳云頃自荊湘泝流而上歷歸峽等郡郡人具舟揖取之千夫牽挽不至岸至渝州人焚香祈請應聲而往郡守及百姓遂搆大聖院安置之東川有牙將者其子常瘖忽一日畫地告其父曰某宿障深重被茲業病聞大聖院神通欲舍身出家依止供養冀消除罪根耳父許之由是虔潔焚修夙夜無怠經數載倏爾能言抗音清辨超於群輩復有跛童子者睹茲奇異發願於大聖院終身苦行懺悔求福未逾期歲忽能起行筋骨自伸步驟無礙事悉具本院碑殿有東廡見有瘖僧跛童子二畫像並存焉出報應録
