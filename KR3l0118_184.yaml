body:
  text: 昭宗昭宗昭宗皇帝頗為孤進開路崔凝覆試但是子弟無問文章高下率多退落其間屈人頗多孤寒中唯程晏黃韜擅場之外其餘以呈試考之濫得亦不少矣然如王貞白張蠙律詩趙觀文古風之作皆臻前輩之閫閾者也出托言韋甄韋甄及第勢固萬全矣然未知名第高下未免撓懷俄聆於光德里南街忽睹一人扣一板門甚急良久軋然門開呼曰十三官尊體萬福既而甄果是第十三人矣出托言劉纂劉纂者商州劉蛻之子也亦善為文乾寧中寒栖京師偶與一醫士為鄰纂待之甚至往往假貸之其人即樞密使門徒嗣薛王為大京兆醫工因為知柔診脈從容之際盛言纂之窮且屈知柔甚領覽會試官以解送等第稟於知柔知柔謂纂是開府門前人醫者之言必開府之意也非解元不可由是以纂居首送纂亦莫知其由自是纂落數舉方悟竟無以自雪出托言鍾傅唐朝自廣明庚子之亂甲辰天下大荒車駕再幸岐梁飢殣相望郡國率不以貢士為意江西節帥鍾傅起於義聚奄有疆土充庭述職為諸侯表式而乃孜孜以薦賢為急務雖州里白丁片文只字求貢於有司者莫不盡禮接之至於考試之辰設會供帳甲於治平行鄉飲之禮嘗率賓佐臨視拳拳然有喜色後大會以餞之筐篋之外率皆資以桂王解元三十萬解副二十萬其餘皆不減十萬垂三十載此志未嘗稍息時舉子者以公卿關節不遠千里而求首薦歲常不下數輩盧文煥光化二年狀元及第頗以宴醵為急務常府開宴同年皆患貧無以致之一旦紿以遊齊國公亭子既自皆解帶從容煥命團司牽驢時柳璨告文煥以驢從非己有文煥曰藥不瞑眩厥疾弗瘳璨甚銜之居四年璨登庸文煥憂戚日加璨每遇之曰藥不瞑眩厥疾弗瘳出托言趙光逢光化二年趙光逢放柳璨及第光逢後三年不遷時璨自內庭大拜光逢始以左丞徵入未幾璨坐罪誅死光逢膺大用居重地十餘歲上表乞骸守司空致仕二年復徵拜上相出托言盧延讓盧延讓光化三年登第先是延讓師薛能為詩詞意入癖時人多笑之吳融向為侍御史出官峽中延讓時薄遊荊渚貧無卷軸未遑贄謁會融表弟滕籍者偶得延讓百篇融既覽大奇之且曰此無他貴語不尋常耳於是稱之於府主成汭時故相張公職於是邦常以延讓為笑端及融言之咸所改觀由是大獲舉糧延讓深所感激然猶困循竟未相面值融赴急徵尋入內庭孜孜於公卿間稱譽不已光化戊午歲來自襄之南融一見如舊相識延讓嗚咽流涕於是攘臂成之矣出托言韋貽範羅隱顧雲俱受知於相國令狐綯顧雖鹺賈之子而風韻詳整羅亦錢塘人鄉音乘刺相國子弟每有宴會顧獨預之風韻談諧莫辨其寒素之士也顧文賦為時所稱而切於成名嘗有啓事陳於所知只望丙科盡處竟列於尾株之前也羅既頻不得意頗怨望竟為貴遊子弟所排契闊東歸黃寇事平朝賢議欲召之韋貽範沮之曰某與同舟而載雖未相識舟人告云此有朝官羅曰是何朝官我腳夾筆亦可敵得數輩必若登科通籍吾徒為秕粳也由是不果召出北夢瑣言楊玄同唐天祐年河中進士楊玄同老於名場是歲頗亦倣徨未涯兆朕宜祈吉夢以卜前途是夕夢龍飛天乃六足及見榜乃名第六則知固有前定矣出玉堂間話封舜卿封舜卿梁時知貢舉後門生鄭致雍同受命入翰林為學士致雍有俊才舜卿才思拙澀及試五題不勝困弊因託致雍秉筆當時識者以為座主辱門生同光初致士出北夢瑣言高輦禮部貢院凡有榜出書以淡墨或曰名第者陰注陽受淡墨書者若鬼神之迹耳此名鬼書也范質云未見故實塗説之言未敢為是嘗記未應舉日有登第者相告舉子將策名必有異夢今聊記憶三數夢載之於此高輦應舉夢雷電晦冥有一小龍子在前吐出一石子輦得之占者曰雷電晦冥變化之象一石十科也將來科第其十數矣及將放榜有一吏持主文帖子至問小吏姓名則曰姓龍詢其名第高卑則曰第十人又郭俊應舉時夢見一老僧屐於臥榻上𨃞跚而行既寤甚惡之占者曰老僧上座也著屐於臥塌上行屐高也君其巍峨矣及見榜乃狀元也王汀應舉時至滑州旅店夢射王慎徵一箭而中及將放榜或告曰君名第甚卑汀答曰苟成名當為第六人及見榜果如所言或者問之則告以夢王慎徵則前年第六人及第今射而中之故知亦此科第也質於癸巳年應舉考試畢場自以孤平明鈔本孤平作幼年初舉不敢決望成名然憂悶如醉晝寢於逆旅忽有所夢寐未吪間有九經蔣之才相訪即驚起而坐且告以夢夢被人以朱筆於頭上亂點己牽一胡孫如驢許大蔣即以夢占之曰君將來必捷兼是第三人矣因問其説即曰亂點頭者再三得也朱者事分明也胡孫大者為猿算法圈三徑一故知三數也及放榜即第十三人也出玉堂間話李氏後魏孝文帝定四姓隴西李氏大姓恐不入星夜乘鳴駝倍程至洛時四姓已定訖故至今謂之駝李焉出朝野僉載王氏太原王氏四姓得之為美故呼為鈒鏤王家喻銀質而金飾也出國史補七姓高宗朝以太原王范陽盧滎陽鄭清河博陵二崔趙郡隴西二李等七姓其族望恥與諸姓為婚乃禁其自相姻娶於是不敢復行婚禮密裝飾其女以送夫家出國史異纂李積李積酒泉公義琰姪孫門戶第一而有清名常以爵位不如族望官至司封郎中懷州刺史與人書札唯稱隴西李積出國史補崔仁師之孫崔湜滌滌原作滫據明鈔本改等昆仲數人並有並有二字原闕據唐托言十二補文翰列官清要每私宴之際自比王謝之家謂人曰吾之門第門第原作人門據明鈔本改及出身官歷未嘗不為第一丈夫當先據要路以制人豈能默默受制於人故進取不已而不以令終出托言類例世有山東士大夫類例三卷其有非士族及假冒者多不見録署云相州僧曇剛撰後柳沖亦明族姓中宗朝為相州刺史詢問舊老云自隋已來不聞有僧曇剛蓋懼嫉於時故隱其名氏出國史補李嶠初李嶠與李迥秀同在廟堂奉詔為兄弟又西祖王璋與信安王禕同産故趙郡隴西二族昭穆不定一會之中或孫為祖或祖為孫出國史補張説張説好求山東婚姻當時皆惡之及後與張氏親者乃為甲門甲門原作申明據明鈔本改四姓鄭氏不離滎陽又岡頭盧澤底李土門崔皆為鼎甲出國史補楊氏自楊震號關西孔子葬於潼關亭至今七百餘年子孫猶在閿鄉故宅天下一家而已出國史補李益李尚書益有宗人庶子同名俱出於姑臧公時人謂尚書為文章李益庶子為門戶李益而尚書亦兼門地焉嘗姻族間有禮會尚書歸笑謂家人曰太甚笑今日局席兩箇坐頭總是李益出因話録莊恪太子妃文宗為莊恪選妃朝臣家子女者明鈔本子女者作有女子悉被進名士庶為之不安帝知之召宰臣曰朕欲為太子婚娶本求汝鄭門衣冠子女為新婦明鈔本婦下有扶出來田舍齁齁地如九字聞在外朝臣皆不願共朕作親情明鈔本情作家何也朕是數百年衣冠無何神堯打明鈔本打作把朕二字家羅訶去因遂罷其選出盧氏雜説白敏中白敏中為相嘗欲以前進士侯溫為子壻且有日矣其妻盧氏曰身為宰相願為我壻者多矣己既姓白又以侯氏兒為壻必為人呼作侯白爾敏中為之止焉敏中始婚也已朱紫矣嘗戲其妻為接腳夫人又妻出輒導之以馬妻既憾其言每出必命撤其馬曰吾接腳夫人安用馬也出玉泉子汝州衣冠無非望族多有子女有汝州參軍亦令族內於一家求親其家不肯曰某家世不共軒冕家作親情出盧氏雜説黃生有黃生者擢進士第人問與頗同房否對曰別洞黃本溪洞豪姓生故以此對人雖咍之亦賞其直實也出尚書故實
