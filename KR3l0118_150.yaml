body:
  text: 玄宗玄宗唐德宗降誕三日玄宗視之肅宗代宗以次立視之九字原本作肅宗次之代宗又次之保母襁褓德宗來呈德宗色不白皙龍身仆前肅宗代宗皆不悅二帝以手自下遞傳呈上玄宗玄宗一顧之曰真我兒也謂肅宗曰汝不及他又謂代宗曰汝亦不及他髣佛似我德宗德宗二字原作而兒據明鈔本改在位二十七年六十三崩肅宗登位五年代宗登位十五年是不及也後明皇幸蜀至中路曰岧郎亦一遍到此來裏及德宗幸梁是驗也乃知聖人應天授命享國年深豈是徒然出嘉話録喬琳喬琳以天寶元年冬自太原赴舉至大梁舍於逆旅時天寒雪甚琳馬死傭僕皆去聞浚儀尉劉彥莊喜賓客遂往告之彥莊客申屠生者善鑒人自云八十已上頗箕踞傲物來客雖知名之士未嘗與之揖讓及琳至則言款甚狎彥莊異之琳既出彥莊謂生曰他賓客賢與不肖未嘗見先生之一言向者喬生一布衣耳何詞之密歟生笑曰此固非常人也且當為君之長吏宜善視之必獲其報向與之言蓋為君結歡耳然惜其情反於氣心不稱質若處極位不至百日年過七十當主非命子其志之彥莊遂館之數日厚與車馬遂至長安而申屠生亦告去且曰吾辱君之惠今有以報矣請從此辭竟不知所在琳後擢進士第纍佐大府大曆中除懷州刺史時彥莊任修武令誤斷獄有死者為其家訟冤詔下御史劾其事及琳至竟獲免建中初徵拜中書侍郎平章事在位八十七日以疾罷後朱泚搆逆琳方削髮為僧泚知之竟逼受逆命及收復亦陳其狀太尉李晟欲免其死上不可遂誅之時年七十一出前定録張去逸肅宗張皇后祖母竇氏玄宗之姨母也玄宗先後早薨竇有鞠養之恩景雲中封鄧國夫人帝甚重之其子去惑去盈去奢去逸依倚恩寵頗極豪華一日弟兄同獵渭曲忽有巨蛇長二丈騰趕草上迅捷如飛去逸因蹤轡彎弧一發而中則命從騎挂之而行俄頃霧起於渭上咫尺昏晦驟雨驚電無所遁逃偶得野寺去逸即棄馬徑依佛廟烈火震霆隨而大集方霆火交下之際則聞空中曰勿驚僕射霆火遽散俄而復臻又聞空中曰勿驚司空霆火登止俄復藂集又聞空中曰勿驚太尉既而陰翳廓然終無所損然死蛇從馬則已失矣去逸自負坐須富貴不數年染疾而卒官至太僕卿天寶中其女選東宮充良媛及肅宗收復兩京良媛頗有輔佐之力至德二載冊為淑妃乾元元年詔中書令崔圓持節冊為皇后而去逸以后父前後三贈官皆如空中之告耳出紀聞李泌天寶十四載李泌三月三日自洛乘驢歸別墅從者未至路旁有車門而驢徑入不可制遇其家人各將乘驢馬群出之次泌因相問遂並入宅邀泌入既坐又見妻子出羅拜泌莫測之疑是妖魅問姓竇潛令僕者問鄰人知實姓竇泌問其由答曰竇廷芬且請宿續言之勢不可免泌遂宿然甚懼廷芬乃言曰中橋有筮者胡蘆生神之久矣昨因筮告某曰不出三年當有赤族之禍須覔黃中君方免問如何覔黃中君曰問鬼谷子又問安得鬼谷子言公姓名是也宜三月三日全家出城覔之不見必籍死無疑若見但舉家悉出衷祈則必免矣適全家方出訪覔而卒遇公乃天濟其舉族命也供待備至明日請去且言歸潁陽莊廷芬堅留之使人往潁陽為致所切取季父報而還如此住十餘日方得歸自此獻遺不絶及祿山亂肅宗收西京將還秦收陝府獲刺史竇廷芬肅宗令誅之而籍其家又以玄宗外家而事賊固囚誅戮泌因具其事且請使人問之令其手疏驗之肅宗乃遣使使回具如泌說肅宗大驚遽命赦之因問黃中君鬼谷子何也廷芬亦云不知而胡蘆生已卒肅宗深感其事因曰天下之事皆前定矣出感定録劉邈之天寶中調授岐州陳倉尉邈之從母弟吳郡陸康自江南同官前定録無同官二字疑應在來字下來有主簿楊豫尉張頴者聞康至皆來賀邈之時冬寒因飲酒方酣適有魏山人琮來邈之命下簾帷迎於庭且問其所欲琮曰某將入關關原本作門據前定録改請一食而去邈之顧左右命具芻米於館琮曰館則慮不及請於此食而過邈之以方飲有難色琮曰某能知人若果從容亦有所獻邈之聞之而喜遂命褰帷而坐客亦樂聞其說咸與揖讓而坐時康以醉臥於東榻邈之乃具饌既食之有所請琮曰自此當再名聞官止二邑宰而不主務二十五年而終言訖將去豫頴固止之皆有所問謂豫曰君後八月勿食驢肉食之遇疾當不可救次謂頴曰君後政官宜與同僚善如或不叶必為所害豫頴不悅琮知其意乃曰某先知者非能為君禍福也因指康曰如醉臥者不知為誰明年當成名歷官十餘政壽考祿位諸君子不及也言訖遂去亦不知所往明年逆胡陷兩京玄宗幸蜀陳倉當路時豫主郵務常念琮之言記之於手板及驛騎交至或有與豫舊者因召與食誤啖驢腸數臠至暮脹腹而卒頴後為臨濮丞時有寇至郡守不能制為賊所陷臨濮令薛景元率吏及武士持兵與賊戰賊退郡平節度使以聞既拜景為長史領郡務而頴果常與不叶及此因事陷陷原作答據明鈔本改之遂陰污而卒邈之後某下登科拜汝州臨汝縣令轉潤州上元縣令在任無政皆假掾掾明鈔本作祿以終考明年康明經及第授祕書省正字充隴右巡官府罷調授咸陽尉遷監察御史盩厔令比部員外郎連典大郡歷官二十二考出前定録張仁褘唐沈君亮見冥道事上元年中吏部員外張仁褘延坐問曰明公看褘何當遷亮曰臺郎坐不暖席何慮不遷俄而褘如廁亮謂諸人曰張員外總十餘日活何暇憂官職乎後七日而褘卒出朝野僉載裴諝寶應二年戶部郎中裴諝出為盧州刺史郡有二遷客其一曰武徹自殿中侍御史貶為長史其一曰于仲卿自刑部員外郎貶為別駕諝至郡三日二人來候謁諝方與坐俄而吏持一刺云寄客前巢縣主簿房觀請謁諝方與二客話舊不欲見觀語吏云謝房主簿相訪方對二客請俟他日吏以告觀觀曰某以使君有舊宜以今日謁固不受命吏又入白諝諝曰吾中外無有房氏為舊者乃令疏其父祖官諱觀具以對又於懷中探一紙舊書以受吏諝覽之愀然遽命素服引於東廡而弔之甚哀既出未及易服顧左右問曰此有府職月請七八千者乎左右曰有名逐要者是也遽命吏出牒以署觀時二客相顧甚異之而莫敢發問諝既就榻歎息因謂二客曰君無為復患遷謫事固已前定某某原作其據許本改開元七年罷河南府文學時至大梁有陸仕佳為浚儀尉某往候之仕佳座客有陳留尉李揆開封主簿崔器方食有前襄州功曹參軍房安禹繼來時坐客聞其善相人皆請安禹無所讓先謂仕佳曰官當再易後十三年而終次謂器曰君此去二十年當為府寺官長有權位而不見曹局亦有壽考次謂揆曰君今歲名聞至尊十三年間位極人臣後十二年廢棄失志不知其所以然也次謂某曰此後歷踐清要然無將相年至八十言訖將去私謂某曰少間有以奉托幸一至逆旅安禹既歸某即繼往至則言款甚密曰君後二十八年當從正郎為江南郡守某明年當有一子後合為所守郡一官君至三日當令奉謁然此子命薄不可厚祿顧假俸十千已下此即安禹子也徹等咸異其事仕佳後再受監察御史卒器後為司農丞肅宗在靈武以策稱旨驟拜大司農及歸長安纍奉使後十餘年竟不至本曹局揆其年授右拾遺纍至宰相後與時不叶放逐南中二十年除國子祭酒充吐蕃會盟使既將行而終皆如其言安禹開元二十一年進士及第官止南陽令出前定録李揆李相國揆以進士調集在京師聞宣平坊王生善易筮往問之王生每以五百文決一局而來者雲集自辰及酉不次而有空反者揆時持一縑晨往生為之開卦曰君非文章之選乎當得河南道一尉揆負才華不宜為此色悒忿而去王生曰君無怏怏自此數月當為左拾遺前事固不可涯也揆怒未解生曰若果然幸一枉駕揆以書判不中第補汴州陳留尉始以王生之言有徵後詣之生於几下取一緘書可十數紙以授之曰君除拾遺可發此緘不爾當大咎揆藏之既至陳留時採訪使倪若冰以揆才華族望留假府職會郡有事須上請擇與中朝通者無如揆乃請行開元中郡府上書姓李者皆先謁宗正時李璆為宗長適遇上尊號揆既謁璆璆素聞其才請為表三通以次上之上召璆曰百官上表無如卿者朕甚嘉之璆頓首謝曰此非臣所為是臣從子陳留尉揆所為乃下詔召揆時揆寓宿於懷遠坊盧氏姑之舍子弟聞召且未敢出及知上意欲以推擇遂出既見乃宣命宰臣試文詞時陳黃門為題目三篇其一曰紫絲盛露囊賦二曰答吐蕃書三曰代南越獻白孔雀表揆自午及酉而成既封請曰前二首無所遺限後一首或有所疑願得詳之及許拆其緘塗八字旁注兩句既進翌日授左拾遺旬餘乃發王生之緘視之三篇皆在其中而塗注者亦如之遽命駕往宣平坊訪王生則竟不復見矣出前定録道昭永泰中有沙門道昭自云蘭州人俗姓康氏少時因得疾不救忽寤云冥司見善惡報應之事遂出家住太行山四十年戒行精苦往往言人將來之事初若隱晦後皆明驗嘗有二客來一曰姚邈舉明經其二曰張氏以資蔭不記名僧謂張曰君授官四政慎不可食祿范陽四月八日得疾當不可救次謂邈曰君不利簪笏如能從戎亦當三十年無乏有疾勿令胡人療之其年張授官於襄鄧間後纍選常求南州亦皆得之後又赴選果授虢州盧氏縣令到任兩日而卒卒之日果四月八日也後方悟范陽即盧氏望也邈後舉不第從所知於容州假軍守之名三十年纍轉右職後因別娶婦求為儐者因得疾服嫗黃氏之藥而終後訪黃氏本末乃洞主所放出婢是胡女也出前定録
