body:
  text: 沈七沈七有沈七者越州人善卜李丹員外謂之曰聞消息李侍郎知政事某又得給事中如何沈七云李侍郎即被追不得社日肉喫後此無祿公亦未改不得給事中其時去社纔十四日果有敕追李侍郎去社兩日而上道至汴卒李亦不得給事中出定命錄又天寶十四年王諸應舉欲入京於越州沈七處卜得純乾卦下四位動變觀卦沈云公今應舉得此卦觀國之光利用賓于王本是嘉兆然交動群陰咸陽下成乾卦上變至四又不至五五是君位未得利見大人恐公此行不至京而迴果至東京屬安祿山反奔走卻歸江東出定命錄潁陰日者陳澍為潁陰太守屬安祿山反遣縣尉姓孫向東京孫不肯行陳怒撻撻原作促據明鈔本改之至東京遇祿山請往潁陰取陳澍頭祿山補孫為潁陰太守賜緋並領二十餘人取澍澍聞便欲至薄晚出城走錄事參軍扣馬令迴澍憂悶服痢藥託疾令一日者卜之曰從今五日當有家便未取公然有五百車祿在必亦不死至七日食時公無恙矣然當去此求住不得後五日孫到陳於是潛以庫物遺諸衙內人至夜後偽作敕書追入京令向西兩驛上差人逆來夜半敕書至明早召集諸官宣敕便令手刃明鈔本刃作力下同就館中誅殺孫並手刃二十餘人殺錄事參軍其孫尉先令人取妻及女等夜半齊到明日平明盡殺之令上住知州事便發入京以官絹五匹賞卜者出定命錄王栖巖王栖巖自湘川寓江陵鷺白湖善治易窮律候陰陽之術所居桃杏手植成數十列四藩其宇時人比董奉栖巖笑曰吾獨利其花核祛風導氣耳安取跡古人餘事每清旦布蓍為人決事取資足一日為生則閉齋治園大曆中嘗有老父持百錢求筮卦成參驗其年栖巖驚曰家去幾何父往矣不然將仆於道老父出栖巖顧百錢乃紙也因悟其所驗之辰則栖巖甲子乃歎曰吾雖少而治易不自意能幽入鬼鑒死復何恨乃沐浴更新衣與妻子訣少時而卒出渚宮舊事路生趙自勤嘗選訪卜於長安縣路生路云公之官若非重日即是重口後六月六日又卜路云公之官九日不出十二日出至九日宰相果索吏部由曆至十二日敕出為左拾遺拾遺之字各有一口又補闕王晃七月內訪卜於路生路云九月當入省官有禮字時禮部員外陶翰在座乃曰公即是僕替人九月陶病請假敕除王禮部員外後又令卜云必出當為倉字官果貶溫州司倉既而路生以其二子託晃晃又問畢竟當何如路云某所以令兒託公其意可知也鄒生武宗朝宰相李回舊名躔喱累舉未捷嘗之洛橋有二術士一能筮一能龜乃先訪筮者曰某欲改名赴舉如之何筮者曰改名甚善不改終不成事也又訪龜者鄒生生曰君子此行慎勿易名名將遠布矣然則成遂之後二十年終當改名今則已應玄象異時方測余言將行又戒之曰郎君必策榮名後當重任接誘後來勿以白衣為隙他年必為深釁矣長慶二年李及第至武宗登極與上同名始改為回從辛丑至庚申二十年矣乃曰筮短龜長鄒生之言中矣李公既為丞郎魏謨為給事因省會謂回曰昔求府解侍郎為試官送一百二人獨小生不蒙一解今日還忝金章廁諸公之列也合坐皆驚此說欲其遜客回曰如今脫卻紫衫稱魏秀才僕為試官依前不送公公何以得舊事相讓耳回乃尋秉獨坐之權三臺肅畏而昇相府後三五年魏公亦自同州入相而回累被貶謫跋涉江湖喟然歎曰洛橋先生之誡吾自取尤耳然亦命之所牽也出雲溪友議五明道士長慶之代鄴中有五明道士者不知何許人善陰陽曆數尤攻卜筮成德軍節度田弘正御下稍寬而冒於財賄誅求不息民眾怨咨時王庭湊為部將遣使於鄴既至忽有微恙數日求醫未能愈因詣五明究平生否泰道士即為卜之卦成而三錢並舞良久方定而六位俱重道士曰此卦純乾變為坤坤土也地也大夫將來秉旄不遠兼有士地山河之分事將集矣宜速歸乎庭湊聞其言遽自掩其耳是夜又夢白鬚翁形容偉異侍從十餘人皆手持小玉斧召王公而前前字原闕據黃本補謂曰患難將及不可久留既覺庭湊疑懼即辭魏帥而迴比及還家未踰旬值軍民大變弘正為亂兵所害士大夫將校共推庭湊庭湊再三退讓眾不聽擁脅而立之翌日飛章上奏朝廷聞之大駭徵兵攻討以裴度為元帥趙人拒命二年王師不能下俄而敬宗即世文皇帝嗣位詔曰念彼生靈久罹塗炭雖元兇是罪而赤子何辜宜一切赦而宥之就加節制仍詔庭湊子元逵入侍因以壽春公主妻焉庭湊既立甚有治聲朝廷稱之在位十三年卒贈太師子元逵繼立官至太尉二十六年薨長子紹懿立二年荒淫暴亂眾議廢而殺之立其弟紹鼎紹鼎立六年卒子景崇立十三年官至中書令爵常山王卒子鎔立即趙王也後恣橫不道為下所殺立四十一年自庭湊至鎔凡五世六主一百餘年滅初庭湊之立也遣人詣鄴取五明置於府為營館舍號五明先生院公曾從容問曰某今已忝藩侯將來祿壽更為推之道人曰三十年願明公竭節勤王愛民恤物次則保神嗇氣常以清儉為心必享殊壽後裔兼有二王皆公餘慶之所致也春秋所謂五世其昌八世之後莫之與京公曰幸事已多素無勳德此言非所敢望因以數百金為壽道士固辭不受公亦固與之載歸其室數日盡施之一無留焉二王景崇封常山王鎔為趙王也出耳目記黃賀唐昭宗時有黃賀者自云鞏洛人也因避地來涉河遊趙家於常山以卜筮為業而言吉凶必效時趙王鎔方在幼沖而燕軍寇北鄙王方選將拒之有勇士陳立劉幹投刺於軍門願以五百人嘗寇必面縛戎首王壯而許之翌日二夫率師而出夜擊燕壘大振捷音燕人駭而奔退立卒於鋒刃之下幹即凱唱而還王悅賜上廄馬數匹金帛稱是俄為閹人所譖曰此皆陳立之功非幹之效王母何夫人聞之曰不必身死為君明鈔本君作忠未若全身為國即賜錦衣銀帶加錢二十萬擢為中堅尉初幹曾詣賀卜卦成而謂幹曰是卦也火水未濟終有立也九二之動曳輪貞吉以正救難往有功也變而之晉明出地中奮發光揚恩澤相接子令行也利用禦戎大獲慶捷王當有車馬之賜其間小釁不足憂之行軍司馬路晏曾夜適廁有盜伏焉晏忽心動取燭照之盜即告言請無驚懼其稟命有自察公正直不忍倳刃即匣劍而去晏由是晝夜警惕以備不虞召黃生筮之卦成賀曰惕號暮夜有戎勿恤察象徵辭人有害公之意然難已過矣但守其中正請釋憂心晏亦終無患也又贊皇縣尉張師曾臥病經年日覺危殆良醫不復進藥請賀卜之卦就黃生告曰旡妄之疾勿藥有喜請停理療五日必大瘳也師果應期而愈又數十年師夢白鳥飛翔墜於雲際既覺心神恍惚召賀卜筭之賀即決卦慘然而問師曰朝來寢息不有夢乎必若有夢其飛禽之象乎且雷震山上鳥墜雲間聲跡兩消不可復見願加保愛樂天委命而已張竟不起時年七十一也又有段誨者任蒿城鎮將曾夜宿郵亭馬斷韁而逸數日不知所適使人詣肆而筮之賀曰據卦暌也初九動者應有亡失之事無乃喪馬乎勿逐自復必有縶而送之者也迴未及舍已有邊鄙惡少牽而還之賀所占卜皆此類也時人謂之易聖公劉巖曾詣之生謂曰君他日必成偉器然勿以春日為恨初不曉其意及老悟蓋遲遲之謂也出耳目記鄧州卜者有書生住鄧州嘗遊郡南數月不返其家詣卜者占之卜者觀卦曰甚異吾未能了可重祝祝畢拂龜改灼復曰君所卜行人兆中如病非病如死非死逾年自至矣果半稔書生歸云遊某山深洞入值物蟄如中疾四支不能動昏昏若半醉見一物自明入穴中卻返良久又至直附身引頸臨口鼻細視之乃巨龜也十息頃方去書生酌其時日其家卜時吉焉出酉陽雜俎
