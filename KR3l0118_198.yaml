body:
  text: 司馬相如司馬相如漢司馬相如賦詩時人皆稱典而麗雖詩人之作不能加也楊子雲曰長卿賦不似從人間來其神化所至耶子雲學相如之賦而弗逮也故雅服焉相如為上林賦意思蕭散不復與外物相關控引天地錯綜古今忽然而睡躍然而興幾百日而後成其友人盛覽字長卿明鈔本卿作通牂柯名士嘗問以作賦相如曰合篡組以成文列錦繡而為質一經一緯一宮一商此賦之迹也賦家必包括宇宙總覽人物斯乃得之於內不可得而博覽乃作合組歌列錦賦而退終身不敢言作賦之心矣出西京雜記謝朓梁高祖重陳郡謝朓詩常曰不讀謝詩三日覺口臭出談藪沈約梁奉朝請吳均有才器常為劍騎詩云何當見天子畫地取關西高祖謂曰天子今見關西安在焉均默然無答均又為詩曰秋風瀧白水鴈足印黃沙沈隱侯約語之曰印黃沙語太險均曰亦見公詩云山櫻發欲然約曰我始欲然即已印訖出談藪庾信梁庾信從南朝初至北方文士多輕之信將枯樹賦以示之於後無敢言者時溫子升作韓陵山寺碑信讀而寫其本南人問信曰北方文士何如信曰唯有韓陵山一片石堪共語薛道衡盧思道少解把筆自餘驢鳴狗吠聒耳而已出朝野僉載王勃唐王勃每為碑頌先磨墨數升引被覆面而臥忽起一筆書之初不點竄時人謂之腹藁出談藪盧照鄰唐盧照鄰字升之范陽人弱冠拜鄧王府典籤王府書記一以委之王有書十二車照鄰總披覽略能記憶後為益州新都縣尉秩滿婆娑於蜀中放曠詩酒故世稱王楊盧駱照鄰聞之曰喜居王後恥在駱前時楊之為文好以古人姓名連用如張平子之略談陸士衡之所記潘安仁宜其陋矣仲長統何足知之號為點鬼簿駱賓王文好以數對如秦地重關一百二漢家離宮三十六時人號為算博士如盧生之文時人莫能評其得失矣惜哉不幸有冉耕之疾著幽憂子以釋憤焉文集二十卷出朝野僉事崔融唐國子司業崔融作武后册文因發疾疾原作席據明鈔本改而卒時人以為二百年來無此文出國史纂異張説唐張説徐堅同為集賢學士十餘年好尚頗同情契相得時諸學士凋落者衆説堅二人存焉説手疏諸人名與堅同觀之堅謂説曰諸公昔年皆擅一時之美敢問藝之先後説曰李嶠崔融薛稷宋之問之文皆如良金美玉無施不可富嘉謨之文如孤峰絶岸壁立萬仞叢雲鬱興震雷俱發誠可異乎若施之於廊廟則為駭矣閻朝隱之文則如麗色靚粧衣之綺繡燕歌趙舞觀者忘憂然類之風雅則為俳矣堅又曰今之後進文詞孰賢説曰韓休之文有如大羹玄酒雖雅有典則而薄於滋味許景先之文有如豐肌膩體雖穠華可愛而乏風骨張九齡之文有如輕縑素練實濟時用而窘於邊幅王翰之文有如瓊林玉斝雖爛然可珍而多有玷缺若能針其所短濟其所長亦一時之秀也出大唐新語崔曙唐崔曙應進士舉作明堂火珠詩續明鈔本續作以贖貼三字有佳句曰夜來雙月滿曙後一星孤其言深為工文士推服既夭歿一女名星星而無男當時咸異之出明皇雜録王維唐王維好釋氏故字摩詰性高致得宋之問輞川別業山水勝絶今清涼寺是也維有詩名然好取人章句如行到水窮處坐看雲起時人以為含英集中詩也漠漠水田飛白鷺陰陰夏木囀黃鸝乃李嘉佑詩也出國史補李翰唐李翰文雖宏暢而思甚苦澀晚居陽翟常從邑令皇甫曾求音樂思涸則奏樂神全則綴文出國史補顧況唐顧況在洛乘間與一二詩友遊於苑中流水上得大梧葉上題詩曰一入深宮裏年年不見春聊題一片葉寄與有情人況明日於上遊亦題葉上泛於波中詩曰愁見鶯啼柳絮飛上陽宮女斷腸時君恩不禁東流水葉上題詩寄與誰後十日餘有客來苑中尋春又於葉上得一詩故以示況詩曰一葉題詩出禁城誰人愁和獨含情自嗟不及波中葉蕩漾乘風取次行出本事詩盧渥中書舍人盧渥應舉之歲偶臨御溝見一紅葉命僕搴來葉上及有一絶句置於巾箱或呈於同志及宣宗既省宮人初不詔許從百官司吏獨不許貢舉人渥後亦一任范陽獨獲其退宮人覩紅葉而吁怨久之曰當時偶題隨流不謂郎君收藏巾篋驗其書迹無不訝焉詩曰流水何太急深宮盡日間殷勤謝紅葉好去到人間出雲溪友議唐德宗唐德宗每臨朝多令徵四方丘園才能能字原闕據杜陽雜編補學術直言極諫之士由是題筆貢藝者滿於闕下上多親自考試故絶請託之門是時文學相高公道大振得路者咸以推賢進善為意上試制科於宣政殿或有乖謬者即濃點筆抹之或稱旨者翹足朗吟翌日即遍示宰臣學士曰此皆朕門生也公卿大夫已下無不服上藻鑒宏詞獨孤綬試放馴象賦及進其本上覽稱歎久之因吟其詞云化之式孚則必愛明鈔本愛作受乎來獻物或違性斯用感於至仁上甚嘉之故特書第三等先是代宗朝文單國纍進馴象三十有二上悉令放於荊山之南而綬不斥受獻不傷放棄上賞為知去就也出杜陽雜編貞元五年初置中和節御製詩朝臣奉和詔寫本賜戴叔倫於容州天下榮之出國史補戎昱唐憲宗皇帝朝以北狄頻侵邊境大臣奏議古者和親有五利而無千金之費帝曰比聞有一卿能為詩而姓氏稍僻是誰宰相對曰恐是包子虛冷朝陽皆不是也帝遂吟曰山上青松陌上塵雲泥豈合得相親世路盡嫌良馬瘦唯君不棄臥龍貧千金未必能移姓一諾從來許殺身莫道書生無感激寸心還是報恩人侍臣對曰此是戎昱詩也京兆尹李鑾擬以女嫁昱令其改姓昱固辭焉帝悅曰朕又記得詠史一篇此人若在便與朗州刺史武陵桃源足稱詩人之興詠聖旨如此稠疊士林之榮也其詠史詩云漢家青史內計拙是和親社稷依明主安危託婦人豈能將玉貌便欲靜胡塵地下千年骨誰為輔佐臣帝笑曰魏絳之功何其懦也大臣公卿遂息和戎之論者矣出雲溪友議李端唐郭曖尚升平公主盛集文士即席賦詩公主帷而觀之李端中宴詩成有荀令何郎之句衆稱絶妙或謂宿搆端曰願賦一韻錢起曰請以起姓為韻復有金埒銅山之句曖大喜出名馬金帛為贈是會也端擅場送丞相王縉之鎮幽朔韓翃擅場送丞相劉晏之巡江淮錢起擅場出國史補韓翃唐韓翃少負才名侯希逸鎮青淄翃為從事後罷府間居十年李勉鎮夷門又署為幕吏時韓已遲暮同職皆新進後生不能知韓共目為惡詩韓翃翃殊不得意多辭疾在家唯末職韋巡官者亦知名士與韓獨善一日夜將半韋扣門急韓出見之賀曰員外除駕部郎中知制誥韓大愕然曰必無此事定誤矣韋就座曰留底狀報制誥闕人中書兩進名御筆不點出又請之德宗批曰與韓翃時有與翃同姓名者為江淮刺史又具二人同進御筆復批曰春城無處不飛花寒食東風御柳斜日暮漢宮傳臘燭輕煙散入五侯家又批云與此韓翃韋又賀曰此非員外詩也韓曰是也是知不誤矣質明而李與僚屬皆至時建中初也出本事詩楊憑唐京兆尹楊憑兄弟三人皆能文為學甚苦或同賦一篇共坐庭石霜積襟袖課成乃已出傳載符載唐符載字厚之蜀郡人有奇才始與楊衡宋濟栖青城山習業楊衡擢第宋濟先明鈔本先作老死無成唯載以王霸自許恥於常調韋皋鎮蜀辟為支使雖曰受知尚多偃蹇皋嘗於二十四化設醮請撰齋詞于時陪飲於摩訶池載離席盥漱命小吏十二人捧硯人分兩題緩步池間各授口占其敏速也如此劉闢時為金吾倉曹參軍始依皋焉載與撰真贊云矯矯化初氣傑文雄靈螭出水秋鶚乘風行義則固輔仁乃通他年良覿麟閣之中及皋卒闢總留務載亦在幕中及闢敗載亦免禍出北夢瑣言王建唐王建初為渭南縣尉值內官王樞密者盡宗人之分然彼我不均復懷輕謗之色忽因過飲語及桓靈信任中官起黨錮興廢之事樞密深憾其譏詰曰吾弟所有宮詞天下皆誦於口禁掖深邃何以知之建不能對故元稹以嘗有宮詞詔令隱其文朝廷以為孔光不言溫樹者慎之至也及王建將被奏劾因為詩以讓之乃脫其禍也建詩曰先朝行坐鎮相隨今上春宮見長時脫下御衣偏得著進來龍馬每交騎常承密旨還家少獨奏邊情出殿遲不是當家頻向説九重爭遣外人知出雲溪友議裴度唐憲宗以玉帶賜裴度臨薨却進門人作表皆不如意公令子弟執筆口占曰內府之珍先朝所賜既不敢將歸地下又不合留在人間聞者歎其簡切而不亂出因話録白居易唐白居易有妓樊素善歌小蠻善舞嘗為詩曰櫻桃樊素口楊柳小蠻腰年即高邁而小蠻方豐艷因楊柳詞以託意曰一樹春風萬萬枝嫩於金色軟於絲永豐坊裏東南角盡日無人屬阿誰及宣宗朝國樂唱是詞上問誰詞永豐在何處左右具以對遂因東使命取永豐柳兩枝植於禁中自感上知其名且好尚風雅又為詩一章其末句云定知此後天文裏柳宿光中添兩星後除蘇州刺史自峽沿流赴郡時秭歸縣繁知一聞居易將過巫山先於神女祠粉壁大署之曰蘇州刺史今才子行到巫山必有詩為報高唐神女道速排雲雨候清詞居易覩題處暢然邀知一至曰歷陽劉郎中劉禹錫三年理白帝欲作一詩於此怯而不為罷郡經過悉去千餘詩但留四章而已此四章者乃古今之絶唱也而人造次不合為之沈佺期詩曰巫山高不極合沓狀奇新暗谷疑風雨幽崖若鬼神月明三峽曙潮滿九江春為問陽臺客應知入夢人王無兢詩曰神女向高唐巫山下夕陽徘徊作行雨婉孌逐荊王電影江前落雷聲峽外長霽雲無處所臺館曉蒼蒼李端詩曰巫山十二重皆在碧空中回合雲藏日霏微雨帶風猿聲寒渡水樹色暮連空愁向高唐去千秋見楚宮皇甫冉詩曰巫峽見巴東迢迢出半空雲藏神女館雨到楚王宮朝暮泉聲落寒暄樹色同清猿不可聽偏在九秋中白居易吟四篇詩與繁生同濟而竟不為出雲溪友議元和沙門唐元和中長安有沙門不記名善病人文章尤能捉語意相合之處張籍頗恚之冥搜愈切思得句曰長因送人處憶得別家時徑往誇揚乃曰此應不合前輩意也僧笑曰此有人道了也籍曰向有何人僧冷吟曰見他挑李發思憶後園春籍因撫掌大笑出托言
