body:
  text: 蜮射蜮射玄中記蜮以氣射人去人三十步即射中其影中人死十六七紀年云晉獻公二年春周惠王居于鄭鄭人入王府取玉馬玉化為蜮以射人也化蟬齊王后怨王怒死尸化為蟬遂登庭樹嘒唳而鳴后王悔恨聞蟬鳴即悲歎揖怒蛙越王勾踐既為吳辱常盡禮接士思以平吳一日出遊見蛙怒勾踐揖之左右曰王揖怒蛙何也答曰蛙如是怒何敢不揖于是勇士聞之皆歸越而平吳怪哉漢武帝幸甘泉馳道中有蟲赤色頭牙齒耳鼻盡具觀者莫識帝乃使東方朔視之還對曰此蟲名怪哉昔時拘系無辜衆庶愁怨咸仰首歎曰怪哉怪哉蓋感動上天憤所生也故名怪哉此地必秦之獄處即按地圖信如其言上又曰何以去蟲朔曰凡憂者得酒而解以酒灌之當消于是使人取蟲置酒中須臾糜散小蟲漢光武建武六年山陽有小蟲皆類人形甚衆明日皆懸于樹枝死蔣蟲蔣子文者廣陽人也嗜酒好色挑達無度每自言我死當為神也漢末為秣陵尉逐賊至山下被賊擊傷額因解印綬縛之有傾而卒及吳先主之初其故吏見子文于路間乘白馬執白羽扇侍從如平生見者驚走子文追之謂曰我當為此地神福爾下民可宣告百姓為我立祠不爾將有大咎是歲夏大疾疫百姓輒恐動頗竊祀之者未幾乃下巫祝曰吾將大啓福孫氏官宜為我立祠不爾將使蟲入人耳為災也俄而果有蟲虻入人耳即死醫所不治百姓愈恐孫主尚未之信既而又下巫祝曰若不祀我將以大火為災是歲火災大發百數火漸延及公宮孫主患之時議者以神有所歸乃不為厲宜告饗之于是使使者封子文為中都侯其子緒為長水校尉皆加印綬為立祠宇以表其靈今建康東北蔣山是也自是疾厲皆息百姓遂大事之幽明録亦載焉園客園客者濟陰人也姿貌好而良邑人多願以女妻之終不娶常種五色香草積數十年服其實一旦有五色蛾止其旁客收而荐之至蠶時有女夜半至自稱客妻道蠶之狀客與具蠶得百二十頭繭皆如甕繅一頭六十日乃盡訖則俱去莫知所如濟陰人設祠祀焉烏衣人吳富陽縣有董昭之者曾乘船過錢塘江江中見一蟻著一短蘆遑遽畏死因以繩系蘆著船船至岸蟻得出其夜夢一烏衣人謝云仆是蟻中之王也感君見濟之恩君后有急難當相告語歷十余年時所在劫盜昭之被橫録為劫主系余姚昭之忽思蟻王之夢結念之際同被禁者問之昭之具以實告其人曰但取三兩蟻著掌中語之昭之如其言夜果夢烏衣云可急投余杭山中天下既亂赦令不久也既寤蟻嚙械已盡因得出獄過江投余杭山旋遇赦遂得無他朱誕給使淮南內史朱誕字永長吳孫皓世為建安太守誕給使妻有鬼病其夫疑之為姦后出行密穿壁窺之正見妻在機中織遙瞻桑樹上向之言笑給使仰視樹上有年少人可十四五衣青襟袖青幧頭給使以為信人也張弩射之化為鳴蟬其大如箕翔然飛去妻亦應聲驚曰噫人射汝給使怪其故役久時給使見二小兒在陌上共語曰何以不復見汝其一即樹上小兒也答曰前不謹為人所射病瘡積時彼兒曰今何如曰賴朱府君梁上膏以傅之得愈給使白誕曰人盜君膏藥頗知之否誕曰吾膏久致梁上人安得盜之給使曰不然府君視之誕殊不信為試視之封題如故誕曰小人故妄作膏自如故給使曰試開之則膏去半焉所掊刮見有趾迹誕自驚乃詳問之給使具道其本末葛輝夫晉烏傷葛輝夫義熙中在婦家宿三更有兩人把火至階前疑是凶人往打之欲下杖悉變成蝴蝶繽紛飛散有沖輝夫腋下便倒地少時死偱蜓博物志偱蜓以器養之食以朱砂體盡赤稱滿七斤治搗萬杵以點女子肢體終不滅淮南萬畢術云取守宮新合陰陽以牝牡各藏之甕中陰干百日以點女臂則生文章與男子合輒滅去也肉芝肉芝者謂萬歲蟾蜍頭上有角領下有丹書八字再重以五月五日中時取之陰干百日以其足畫地即為流水帶其左手于身辟五兵若敵人射己者弓弩失皆反還自向也千歲蝙蝠色如白雪集則倒懸腦重故也此物得而陰干末服之令人壽四萬歲蠅觸帳晉明帝常欲肆勝祕而不泄乃屏曲室去左右下帷草詔有大蒼蠅觸帳而入萃于筆端須臾亡出帝異焉令人看蠅所集處輒傳有赦喧然已遍矣蒼梧蟲博物志云蒼梧人卒便有飛蟲大如麥有甲或一石余或三五斗而來食之如風雨之至斯須而盡人以為患不可除唯畏梓木自后因以梓木為棺更不復來蚱蜢徐邈晉孝武帝時為中書侍郎在省直左右人恆覺邈獨在帳內以與人共語有舊門生一夕伺之無所見天時微有光始開窗戶瞥觀一物從屏風里飛出直入前鐵鑊中仍逐視之無余物唯見鑊中聚菖蒲根下有大青蚱蜢雖疑此為魅而古來未聞但摘除其兩翼至夜遂入邈夢云為君門生所困往來道絶相去雖近有若山河邈得夢甚凄慘門生知其意乃微發其端邈初時疑不即道語之曰我始來直者便見一青衣女子從前度猶作兩髻姿色甚美聊試挑謔即來就己且愛之仍溺情亦不知其從何而至此兼告夢門生因具以狀白亦不復追殺蚱蜢施子然晉義熙中零陵施子然雖出自單門而神情辨悟家大作田至稜時作蝸牛廬于田側守視恆宿在中其夜獨自未眠之頃見一丈夫來長短是中形人著黃練單衣夾直造席捧手與子然語子然問其姓名即答云仆姓盧名鉤家在粽溪邊臨水復經半旬中其作人掘田塍西溝邊蟻垤忽見大坎滿中螻蛄將近斗許而有數頭極壯一個彌大子然自是始悟曰近日客盧鉤反音則螻蛄也家在粽溪即西坎也悉灌以沸湯于是遂絶龐企晉廬陵太守龐企自云其祖坐系獄忽見螻蛄行其左右因謂曰爾有神能活我死否因投食與之螻蛄食飯盡而去有頃復來形體稍大意異之復投食與之數日間其大如豚及將刑之夜螻蛄夜掘壁為大穴破械得從之出亡后遇赦免故企世祀螻蛄焉蟾蜍晉孝武太元八年義興人周客有一女年十八九端麗潔白尤辨惠性嗜膾啖之恆苦不足有許纂者小好學聘之為妻到壻家食膾如故家為之貧于是門內博議恐此婦非人命歸家乘車至橋南見罟家取魚作鮓著案上可有十許斛便于車中下一千錢以與魚主令搗齏乃下車熟食五斗生食五斗當啖五斛許便極悶臥須臾據地大吐水忽有一蟾蜍從吐而出遂絶不復啖病亦愈時天下大兵蠅赦前秦苻堅欲放赦與王猛苻融密議甘露堂悉屏左右堅親為赦文有一大蒼蠅集于筆端聽而復出俄而長安街巷人相告曰官今大赦有司以聞堅驚曰禁中無耳屬之理事何從泄也敕窮之咸曰有小人青衣大呼于市曰官今大赦須臾不見歎曰其向蒼蠅也發妖晉安帝義熙年琅玡費縣王家恆失物謂是人偷每以扃鑰為意而零落不已見宅后籬一孔穿可容人臂滑澤試作繩罝施于穴口夜中聞有擺撲聲往掩得大發長三尺許而變為從此無慮桓謙桓謙字敬祖太元中忽有人皆長寸余悉被鎧持槊乘具裝馬從坎中出精光耀日遊走宅上數百為群部陳指麾更相撞刺馬既輕快人亦便能緣幾登灶尋飲食之所或有切肉輒來叢聚力所能勝者以槊刺取徑入穴中寂不復出出還入穴蔣山道士朱應子令作沸湯澆所入處因掘之有斛許大蟻死在穴中謙后誅滅青蜓司馬彪莊子注言童子埋青蜓之頭不食而舞曰此將為珠人笑之博物志云埋青蜓頭于西向戶下則化成青色之珠朱誕宋初淮南郡有物取人頭髻太守朱誕曰吾知之矣多買黐以塗壁夕有一蝙蝠大如雞集其上不得去殺之乃絶觀之鉤簾下已有數百人頭髻白蚓劉德願兄子太宰從事中郎道存景和元年忽有白蚓數十登其齋前砌上通身白色人所未嘗見也蚓并張口吐舌大赤色其年八月與德願并誅王雙孟州王雙宋文帝元嘉初忽不欲見明常取水沃地以菰蔣覆上眠息飲食悉入其中云恆有女著青裙白巾來就其寢每聽聞荐下歷歷有聲發之見一青色白頸蚯蚓長二尺許云此女常以一奩香見遺氣甚精芬奩乃螺殼香則草莆根于時咸以雙暫同阜螽矣
