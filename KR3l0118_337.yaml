body:
  text: 韋璜韋璜潞城縣令周混妻者姓韋名璜容色妍麗性多黠惠恆與其嫂妹期曰若有先死幽冥之事期以相報後適周氏生二女乾元中卒月餘忽至其家空間靈語謂家人曰本期相報故以是來我已見閻羅王兼親屬家人問見鑊湯劍樹否答云我是何人得見是事後復附婢靈語云太山府君嫁女知我能粧梳所以見召明日事了當復來耳明日婢又靈語云我至太山府君嫁女理極榮貴令我為女作粧今得胭脂及粉來與諸女因而開手有胭脂極赤與粉並不異人間物又云府君家撒帳錢甚大四十鬼不能舉一枚我亦致之因空中落錢錢大如盞復謂府君知我善染紅乃令我染我辭己雖染親不下手平素是家婢所以但承己指揮耳府君令我取婢今不得已暫將婢去明日當遣之還女云一家唯仰此婢奈何奪之韋云但借兩日耳若過兩日汝宜擊磬呼之夫磬聲一振鬼神畢聞婢忽氣盡經二日不返女等鳴磬少選復空中語云我朝染畢已遣婢還何以不至當是迷路耳須臾婢至乃活兩手忽變作深紅色又制五言詩與姊嫂夫數首其寄詩云修短各有分浮華亦非真斷腸泉壤下幽憂難具陳淒淒白楊風日暮堪愁人又二章寄夫題云泉臺客人韋璜詩云不得長相守青春夭舜華舊遊今永已泉路却為家其一早知別離切人心悔作從來恩愛深黃泉冥寞雖長逝白日屏帷還重尋贈嫂一章序云阿嫂相疑留詩曰赤心用盡為相知慮後防前秪定疑案牘可申生節目桃符雖聖欲何為見其親説云爾薛萬石河東人廣德初浙東觀察薛兼訓用萬石為永嘉令數月忽謂其妻曰後十日家內食盡食盡時我亦當死米穀荒貴為之奈何婦曰君身康強何為自作不詳之語萬石云死甚可惡有言者不得已耳至期果暴卒殮畢棺中忽令呼録事佐史等既至謂曰萬石不幸身死言之悽愴然自此未嘗擾君今妻子飢窮遠歸無路所相召者欲以親愛纍君爾時永嘉米貴斗至萬錢萬石於録事已下求米有差吏人凶懼罔不依送逮至丞尉亦有贈後數日謂家人曰我暫往越州謁見薛公汝輩既有糧食吾不憂矣自爾十餘日無言婦悲泣疲頓晝寢忽聞其語驚起曰君何所求答云吾從越還中丞已知吾亡見令張卿來迎又為見兩女擇得兩壻兄弟之情可為厚矣宜速裝飾張卿到來即可便發不爾當罹山賊之劫第宜速去也家人因是裝束會卿至即日首途去永嘉二百里溫州為賊所破家人在道危急即焚香咨白必有所言不問即否親見家人白之范俶范俶者廣德初於蘇州開酒肆日晚有婦人從門過色態甚異俶留宿婦人初不辭讓乃秉燭以髮覆面向暗而坐其夜與申宴私之好未明求去云失梳子覔不得臨別之際嚙俶臂而去及曉於牀前得一紙梳心甚惡之因而體痛紅腫六七日死矣李浣河中少尹李浣以廣德二年薨初七日家人設齋畢忽於中門見浣獨騎從門而入奴等再拜持浣下馬入座於西廊諸子拜謁泣浣云生死是命何用悲耶只攪亡者心耳判囑家事久之浣先娶項妃妹生子四人項卒再娶河東竇滔女有美色特為浣所愛爾竇懼不出浣使呼之逆謂之曰生死雖殊至於恩情所未嘗替何懼而不出耶每在地下聞君哭聲輒令悽斷悲卿亦壽命不永於我相去不出二年夫妻義重如今同行豈不樂乎人生會當有死不必一二年在人間為勝卿意如何竇初不言浣云卿欲不從亦不及矣後日當使車騎至此相迎幸無辭也遂呼諸婢謂四人曰汝等素事娘子亦宜從行復取其妻衣服手自別之分為數袋以付四婢曰後日可持此隨娘子來又謂諸子曰吾雖先婚汝母然在地下殊不相見不宜以汝母與吾合葬可以竇氏同穴若違吾言神道是殛言畢便出奴等送至門外見浣駛騎走而從東轉西不復見後日車騎至門他人不之見唯四婢者見之便裝束竇取所選衣服與家人訣遂各倒地死亡張勍代宗時河朔未寧寇賊劫掠張勍者恆陽人也因出遊被掠其後亦自聚衆因殺害行旅而誓不傷恆陽人一日引衆千人至恆陽東界夜半月明方息大林下忽逢百餘人列花燭奏歌樂與數婦人同行見勍遙叱之曰官軍耶賊黨耶勍左右曰張將軍也行人曰張將軍是緑林將軍耶又何軍容之整士卒之整也左右怒白勍請殺之因領小將百人與戰行人持戈甲者不過三二十人合戰多傷士卒勍怒自領兵直前又數戰不利內一人自稱幽地王得恆陽王女為妻今來新迎此夜靜月下涉原野欲避繁雜不謂偶逢將軍候從無禮方叱止之因不犯將軍之怒然素聞將軍誓言不害恆陽人將軍幸不違言以恆陽之故勍許捨之乃曰君輩皆捨婦人即留對曰留婦人即不可欲鬥即可勍又入戰復不利勍欲退左右皆憤怒願死格遂盡出其兵分三隊更鬥又數戰不利見幽地王揮劍出入如風勍懼乃力止左右勍獨退而問曰君兵士是人也非人也何不見傷幽地王笑言曰君為短賊之長行不平之事而復欲與我陰軍競力也勍方下馬再拜又謂勍曰安祿山父子死史氏僣命君為盜奚不以衆歸之自當富貴勍又拜曰我無戰術偶然賊衆推我為長我何可佐人幽地王乃出兵書一卷以授之而去勍得此書頗達兵術尋以兵歸史思明果用之為將數年而卒牛爽永泰中牛爽授廬州別駕將之任有乳母乘驢為鐙研破股歲餘瘡不差一旦苦瘡癢抑搔之若蟲行狀忽有數蟬從瘡中飛出集庭樹悲鳴竟夕家人命巫卜之有女巫頗通神鬼巫至向樹呵之咄咄語詰之答見一鬼黑衣冠據枝間以手指蟬以導其詞曰東堂下余所處享我致福欺我致禍及三女巫又言黑衣者竈神耳爽不信之網蟬殺之逐巫者後歲餘無異變爽有三女在閨房夏月夜褰闈爽忽覺前牀有一長大尸白衾覆而殭臥爽大怖私語其妻妻見甚懾爽嘗畜寶劍潛取擊之劃然而內驚叫及燭失其鬼而閨中長女腰斷矣流血滿地爽驚慟失據大小亂哭莫知其由既後半年夜晦冥爽列燈於奧方寢心動驚覺又見前鬼在牀爽神迷倉卒復刎之斷去閨中亂喧次女又斷腰矣舉家惶振議者令爽徙居明鬼神不可與競爽終不改明年又見卒殺三女而親友強徙之他第爽抱疾亦卒果如蟬言後有華嶽道士褚乘霞善驅除素與爽善聞之而來郡以是宅凶廢之霞至獨入結壇守其日暮內聞雷霆搜索及明發屋拔木道士告郡命鍬鍤發堂下丈餘得古墳銘曰卓女墳道士説宵中初有甲兵與霞戰鬼敗而潰散須臾有一女子年二十許叩頭謝言是卓女郎霞讓之答曰非某過也宿命有素值爽及女命盡且不修德而強梁誣欺自當爾乘霞遂徙其墳宅後不復凶矣李咸太原王容與姨弟趙郡李咸居相衛間永泰中有故之荊襄假公行乘傳次鄧州夜宿郵之廳時夏月二人各據一牀於東西間僕隸息外舍二人相與言論將夕各罷息而王生竊不得寐三更後雲月朦朧而王臥視庭木蔭宇蕭蕭然忽見廚屏間有一婦人窺覘去而復還者再三須臾出半身緑裙紅衫素顏奪目時又竊見李生起坐招手以挑之王生謂李昔日有契又必謂婦人是驛吏之妻王生乃佯寐以窺其變俄而李子起就婦人相執於屏間語切切然久之遂攜手大門外王生潛行陰處遙覘之二人俱坐言笑殊狎須臾見李獨歸行甚急婦人在外屏立以待李入廚取燭開出書笥顏色慘悽取紙筆作書又取衣物等皆緘題之王生竊見之直謂封衣以遺婦人輒不忍驚伺其睡乃擬掩執封衣畢置牀上却出顧王生且睡遂出屏與婦人語久之把被俱入下廳偏院院中有堂堂有牀帳供樹森森然既入食頃王生自度曰我往襲之必同私狎乃持所臥枕往潛欲驚之比至入簾正見李生臥於牀而婦人以披帛絞李之頸咯咯然垂死婦人白面長三尺餘不見面目下按悉力以勒之王生倉卒驚叫因以枕投之不中婦人遂走王生乘勢奔逐直入西北隅廚屋中據牀坐頭及屋梁久之方滅童隸聞呼聲悉起見李生斃七竅流血猶心稍暖耳方為招魂將養及明而蘇王生取所封書開視之乃是寄書與家人敘以辭訣衣物為信念不陳所往但詞句鄭重讀書惻愴及李生能言問之都不省記但言髣佛夢一麗人相誘去耳諸不記焉驛之故吏云舊傳廁有神失天中已曾殺一客使此事王容逢人則説勸人夜不令獨寐李晝李晝為許州吏莊在扶溝永泰二年春因清明歸欲至泊梁河先是路傍有冢去路約二十步其上無草牧童所戲其夜李晝忽見冢上有穴大如盤兼有火光晝異之下馬躋冢焉見五女子衣華服依五方坐而紉針俱低頭就燭矻矻不歇晝叱之一聲五燭皆滅五女亦失所在晝恐上馬而走未上大路五炬火從冢出逐晝晝走不能脫以鞭揮拂為火所爇近行十里方達伯梁河有犬至方滅明日看馬尾被燒盡及股脛亦燒損自後遂目此為五女冢今存焉元載大曆九年春中書侍郎平章事元載早入朝有獻文章者令左右收之此人若欲載讀載云侯至中書當為看人言若不能讀請自誦一首誦畢不見方知非人耳詩曰城東城西舊居處城裡飛花亂如絮海燕銜泥欲下來屋裡無人却飛去載後竟破家妻子被殺云蕭審蕭審者工部尚書旻之子永泰中為長洲令性貪暴然有理迹邑人懼憚焉審居長洲三年前後取受無紀極四年五月守門者見紫衣人三十餘騎從外入門迎問所以騎初不言直至堂院廳內治書者皆見門者走入白審曰適有紫衣將軍三十騎直入不待通審問其人安在焉得不見門者出至廳須臾見騎從內出以白衫蒙審步行門者又白奇事審顧不言諸吏送至門不復見俄聞內哭方委審卒後七日其弟宇復墓忽倒地作審靈語責宇不了家事數十百言又云安胡者將吾米二百石絹八十匹經紀求利今幸我死此胡辜恩已走矣明日食時為物色捉之宇還至舍記事白嫂嫂爾日亦靈語云然宇具以白刺史常元甫元甫令押衙候捉果得安胡米絹具在初又云米是己錢絹是枉法物可施之宇竟施絹
