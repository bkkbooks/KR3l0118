body:
  text: 呂望呂望呂望釣于渭濱獲鯉魚剖腹得書曰呂望封于齊出說苑仲尼周靈王二十一年孔子生魯襄之代夜有二神女擎香露沐浴徵在天帝下奏鈞天樂空中有言曰天感生聖子故降以和樂有五老列徵在之庭中五老者蓋五星精也夫子未生之前麟吐玉書於闕里人家文云水精子繼衰周為素王徵在以繡紱繫麟之角相者云夫子殷湯之後水德而為素王至定公二十四年鉏商畋于大澤得麟示夫子繫紱尚存夫子見之抱而解紱涕下沾襟出王子年拾遺記文翁漢文翁當起田斫柴為陂夜有百十野豬鼻載土著柴中比曉塘成稻常收嘗欲斷一大樹欲斷處去地一丈八尺翁先咒曰吾得二千石斧當著此處因擲之正砍所欲後果為蜀郡守出小說董仲舒漢董仲舒常夢蛟龍入懷中乃作春秋繁露出小說何比干漢何比干夢有貴客車騎滿門覺以語妻子未已門首有老姥年可八十餘求避雨雨甚盛而衣不沾濡比干延入禮待之乃曰君先出自后稷佐堯至晉有陰功今天賜君策如簡長九寸凡九百九十枚以授之曰子孫能佩者富貴言訖出門不復見出幽明録五鹿充宗漢五鹿充宗受學于弘成子成子少時嘗有人過己授以文石大如燕卵成子吞之遂大明悟為天下通儒成子後病吐出此石以授充宗又為名學也出西京雜記王溥後漢永初三年國用不足令民吏入錢者得為官琅琊王溥其先吉為昌邑中尉溥奕世衰凌及安帝時家貧無資不得仕乃挾竹簡搖筆洛陽市傭書為人美形貌又多文詞僦其書者丈夫賜其衣冠婦人遺其金玉一日之中衣寶盈車而歸積粟十廩九族宗親莫不仰其衣食洛陽稱為善而富也溥先時家貧穿井得鐵印銘曰傭力得富至億庾一土三田軍門主溥以億錢輸官得中壘校尉三田一土壘字校尉掌北軍壘門故曰軍門主也出拾遺録應樞後漢汝南應樞生四子見神光照社樞見光以問卜人卜人曰此天符也子孫其興乎乃探得黃金自是諸子官學並有才名至瑒七世通顯出孝子傳袁安漢袁安父亡母使安以雞酒詣卜工問葬地道逢三書生問安何之具以告書生曰吾知好葬地安以雞酒禮之畢告安地處云當此世為貴公便與別數步顧視皆不見安疑是神人因葬其地遂登司徒子孫昌盛四世五公焉出幽明録陳仲舉陳仲舉微時嘗行宿主人黃申家申家夜産仲舉不知夜三更有扣門者久許聞應云門裏有貴人不可前宜從後門往俄聞往者還門內者問之見何兒名何當幾歲還者云是男兒名阿奴當十五歲又問曰後當若為死答曰為人作屋落地死仲舉聞此默志之後十五年為豫章太守遣吏往問昔兒阿奴所在家云助東家作屋墮棟而死矣仲舉後果大貴出幽明録張承孫氏懷張承時乘輕舠于江浦忽見白蛇長三丈騰入舟中咒曰若為吉祥勿毒噬我縈而將還置于房中一宿不復見母嗟惜之鄰中相謂曰昨者張家有白鵠聳翮入雲以告承母母使筮之筮者曰吉祥鵠是延年之物從室入雲自卑升高之象昔吳闔閭葬其妹殉以美人寶劍珍物窮江南之富未及千年雕雲覆其溪谷美女遊於冢上白鵠翔乎林中白虎嘯於山側皆昔時之精靈今出於世當使子孫位極人臣擅名江表若生子可以名為白鵠後承生昭位輔吳將軍年九十蛇鵠之祥也出王子年拾遺記張氏晉長安有張氏者晝獨處室有鳩自外入止于床張氏惡之披懷而咒曰鳩爾來為我禍耶飛上承塵為我福耶飛入我懷鳩飛入懷乃化為一銅鉤從爾資産巨萬出法苑編珠明鈔本作出法苑珠林司馬休之晉司馬休之安帝族子遇難出奔所乘騅常於床前養之忽連鳴不食注目視鞍休之即試彠之則不動休之還坐馬又驚因騎馬即驟出行十里餘慕容超收使已至奔馳僅得歸晉出廣古今五行記杜慈秦符生壽光年每宴集後入者皆斬之尚書郎杜慈奔馳疲倦假寢省中夢一人乘黑驢曰寧留而同死將去而獨生慈聞驚覺取馬遁走乃免餘皆斬出廣古今五行記武士鞴唐武士鞴太原文水縣人微時與邑人許文寶以鬻材為事常聚材木數萬莖一旦化為叢林森茂因致大富士鞴與文寶讀書林下自稱為厚材文寶自稱枯木私言必當大貴及高祖起義兵以鎧胄從入關故鄉人云士鞴以鬻材之故果逢構夏之秋及士鞴貴達文寶依之位終刺史出太原事跡張文成唐率更令張文成梟晨鳴於庭樹其妻以為不祥連唾之文成云急灑掃吾當改官言未畢賀客已在門矣出國史異纂又一說文成景雲二年為鴻臚寺丞帽帶及緑袍並被鼠囓有蜘蛛大如栗當寢門懸絲上經數日大赦加階授五品男不宰鼠亦囓腰帶欲斷尋選授博野尉出朝野僉載上官昭容唐上官昭容者侍郎儀之孫也儀子有罪婦鄭氏填宮遺腹生昭容其母將誕之夕夢人與稱曰持此稱量天下文士鄭氏冀其男也及生昭容母視之曰稱量天下豈是妝耶口中嘔嘔如應曰是出嘉話録崔行功唐祕書少監崔行功未得五品前忽有鴝鵒銜一物入其室置案上去乃魚袋鉤鐵不數日加大夫也出國史異纂李正己唐李正己本名懷玉侯希逸之內弟也侯鎮淄青署懷玉為兵馬使尋搆飛語侯怒囚之將置於法懷玉抱冤無訴於獄中疊石像佛默祈冥助時近臘月心慕同儕歎吒而睡覺有人在頭上語曰李懷玉汝富貴時至即驚覺顧不見人天尚黑意甚怪之復睡又聽人謂曰汝看牆上有青鳥子噪即是富貴時至即驚覺復不見人有頃天曙忽有青鳥數十大如雀時集牆上俄聞三軍叫呼逐出希逸壞鎖取懷玉權知留後出酉陽雜俎唐代宗將將原作帝據明鈔本改臨軒送上計郡守百僚外辦御輦俯及殿之橫門帝忽駐輦召北省官謂曰我常記先朝每餞計吏皆有德音以申誡勵今獨無有可乎宰相匆遽不暇奏對帝曰且罷朝撰詞以俟異日中書舍人李揆越班伏奏曰陛下送計吏敕下已久遠近咸知今忽臨朝改移或恐四方乍聞妄生疑惑今止須制詞臣請立操翰伏乞陛下稍駐鑾輅帝俞之遂命紙筆即令御前起草隨遣書工寫録頃刻而畢及宣詔每遇要處帝必目揆於班中外日俟揆之新命時方盛暑揆夜寢於堂之前軒而空其中堂為晝日避暑之所於一夜忽有巨狐鳴噪於庭仍人立跳躍目光迸射久之踰垣而去揆甚惡之是夜未艾忽聞中堂動蕩喧豗若有異物即令執燭開門以視人輩驚駭返走皆曰有物甚異揆即就窺乃有蝦蟆大如三斗釜兩目朱殷蹲踞嚼沫揆不令損害階前素有漬瓜果大銅盆可受一斛遂令家人覆其盆而合之因扃其門亦無他變將曉揆入朝其日拜相及歸親族列賀因話諸怪即遣啓戶揭盆視之已失其物矣出異苑賈隱林唐德宗欲西幸有知星者奏云逢林即住帝曰豈敢令朕止於林木間姜公輔曰不然但地亦應乃奉天尉賈隱林謁帝於行在帝觀隱林氣色雄傑兼是忠烈之家而名葉星者所奏之語隱林即天寶末賈修之猶子帝因召於臥內以探籌略之深淺隱林於御榻前以手板畫地陳攻守之策帝甚異之隱林奏曰臣昨夢日墮於地臣以頭戴日上天帝曰朕此來也乃已前定遂拜隱林為侍御史糾劾行在尋遷左常侍出神異録張子良唐永貞二年春三月彩虹入潤州大將張子良宅初入漿漿字原缺據明鈔本補甕水盡入井飲之是月九日節度使李錡詔召不赴闕欲亂令子良領兵收宣歙子良翻然反兵圍城李錡就擒子良拜金吾將軍尋拜方鎮出祥異集驗鄭絪唐丞相鄭絪宅在昭國坊南門忽有物來投瓦礫五六夜不絶及移於安仁西門宅避之瓦礫又隨而至久之復遷昭國鄭公歸心釋門宴處常在禪室及歸昭國入方丈蟢子滿室懸絲去地一二尺不知其數其夕瓦礫亦絶翌日拜相出祥異集驗
