body:
  text: 王將軍王將軍驍騎將軍王某者代郡人隋開皇末年出鎮蒲州性好畋獵所殺無數有五男無女後生一女端美見者皆愛憐之父母猶鍾愛既還鄉里女年七歲一旦忽失所在皆疑鄰里戲藏匿之訪問不見諸兄馳馬遠尋去家三十餘里得於荒野中冥然已無所識口中唯作兔鳴足上得荊棘盈掬經月餘不食而死父母悲痛甚以為畋獵殺害之報也後合家持齊不復食肉大理寺丞蔡宣明曾為代府法曹親說之出冥報記姜略隋鷹揚郎將天水姜略少好畋獵善放鷹犬後遇病見群鳥千數皆無頭圍繞略床叫鳴曰急還我頭來略輒頭痛氣絶久而後蘇因請衆僧急為諸鳥追福許之皆去既而得愈終身絶酒肉不殺生命姜略嘗自說其事出冥報記賀悅唐武德中隰州大寧人賀悅為鄰人牛犯其稼乃以繩勒牛舌斷後生三子並皆瘖啞不能言出法苑珠林李壽唐交州都督遂安公李壽貞觀初罷職歸京第性好畋獵常籠鷹數聯殺鄰狗餧鷹既而公疾見五犬來責命公謂之曰殺汝者奴通達之過非我罪也犬曰通達豈得自任耶且我等既不盜汝食自於門首過而枉殺我等要當相報終不休也公謝罪請為追福四犬許之一白犬不許曰既無罪殺我我未死間汝又生割我肉臠臠苦痛我思此毒何有放汝耶俄見一人為之請於犬曰殺彼於汝無益放令為汝追福不亦善乎犬乃許之有頃公蘇遂患偏風肢體不遂於是為犬追福而公疾竟不差出冥報記方山開唐曹州武城人方山開少善弓矢尤好遊獵以之為業所殺無數貞觀十一年死經一宿蘇云初死之時被二十人引去行可十餘里即上一山三鬼共引山開登梯而進上欲至頂忽有一大白鷹鐵為觜爪飛來攫山開左頰而去又有一黑鷹亦鐵觜爪攫其右肩而去及至山頂引至廳事見一官人被服緋衣首冠黑幘謂山開曰生平有何功德可具言之對曰立身已來不修功德官曰可宜引向南院觀望二人即引南行至一城非常險峻二人扣城北門數下門遂開見其城中赫然總是猛火門側有數毒蛇皆長十餘丈頭大如五斗斛口中吐火如欲射人山開恐懼不知所出唯知叩頭念佛而已門即自開乃還見官人欲遣受罪侍者諫曰山開未合即死但恐一入此城不可得出未若且放令修功德官人曰善令前二人送之依舊道而下復有鷹欲攫之賴此二人援護得免及下山見一大坑極穢惡忽被二人推入須臾即蘇面及右膊之上爪蹟宛然終身不滅遂舍妻子以宅為佛院恆以誦經為業出法苑珠林王遵唐王遵者河內人也兄弟三人並時疾甚宅有鵲巢旦夕翔鳴忿其喧噪兄弟共惡之及病瘥因張鵲斷舌而放之既而兄弟皆患口齒之疾家漸貧以至行乞出宣驗志明鈔本作出宣室志按御覽七四引作出靈驗記李知禮唐隴西李知禮少趫捷善弓射能騎乘兼攻放彈所殺甚多有時捕魚不可勝數貞觀十九年病數日即死乃見一鬼並牽馬一匹大於俗間所乘之馬謂知禮曰閻羅王追公乃令知禮乘馬須臾之間忽至王前王約束云遣汝討賊必不得敗敗即殺汝有同侶二十四人向東北望賊不見邊際天地盡昏埃下如雨知禮等敗知禮語同行曰王教嚴重寧向前死不可敗歸知禮回馬射三箭以後諸賊已稍退卻箭五發賊遂敗散事畢謁王王責知禮曰曰原作汝據明鈔本改敵雖退何為初戰之時之時法苑珠林四二作即敗即便以麻辮髮並縛手足臥在石上以大石鎮而磨之前後四人體並潰爛次列知禮厲聲叫曰向者賊退原本無退字據明鈔本補並知禮之力還被王殺無以勵後王遂釋放不管束凡經三日忽向西北出行入一牆院見飛禽走獸可滿三四畝總來索命漸相逼近曾射殺一雌犬此犬直向前囓其面次及身體無不被傷復見三大鬼各長丈餘其剝知禮皮肉須臾總盡面及明鈔本面上有唯字無及字目白骨並五臟等得存乃以此肉分乞禽獸其肉剝而復生生而復剝如此三日苦毒之甚不可勝紀事畢大鬼及禽獸等忽然總失知禮回顧不見一物遂踰牆南走莫知所之意中似如一跳千里復有一鬼逐及知禮乃以鐵籠罩之有無數魚競來唼食食畢鬼遂倒回魚亦不見其家舊供養一僧其僧先死來與知禮去籠語知禮曰檀越大飢授以白物三丸如棗令知禮噉之應時而飽乃云檀越宜還家僧亦別去知禮所居宅北見一大坑其中有諸槍槊攢植不可得過見其兄女並婢齎箱箱內有錢絹及別置一器飲食在坑東北知禮心中謂此婢及姪女遊戲意甚怪之回首北望即見一鬼挺劍直進知禮惶懼委身投坑即得蘇也自從初死至於重生凡經六日後問家中乃是姪女持紙錢絹及飯饌為奠禮當時所視乃是銅錢絲絹也出冥報記陸孝政唐雍州陸孝政貞觀中為右衛隰川府左果毅孝政為性躁急多為殘害府內先有蜜蜂一龕分飛聚於宅南樹上孝政遣人移就別龕蜂未去之間孝政大怒遂以湯就樹沃死殆無孑遺至明年五月孝政於廳晝寢忽有一蜂螫其舌上遂即紅腫塞口數日而死出法苑珠林果毅唐貞觀永徽間盩厔鄠縣界有果毅每客來恆買豚設饌衛士家生十豚總買盡其最後買者煮尚未熟果毅對客坐遂聞婦人哭聲意疑其妻向家看之不哭至廳又聞哭聲看妻還不哭如此數回後更向家即聞哭聲在門外若門外即聞哭聲在家中其客大驚不安席似聞哭聲云男女生十箇總被果毅吃盡其客數遍聽之了了聞此客惻之即去果毅驚因此得病數旬而終長安安原作客據明鈔本改共傳此事焉出法苑珠林劉摩兒唐汾州孝義縣泉村人劉摩兒顯慶四年八月遇病而終男師保明日又死父子平生行皆險詖比鄰有祁隴威因採樵被車碾死經數日而蘇乃見摩兒男師保在鑊湯中須臾之間皮肉俱盡無復人形唯見白骨如此良久還復本形隴威問其故對曰我為射獵故受此罪又謂保曰卿父何在對曰我父罪重不可卒見卿既即還請白家中為修齊福言訖被使催促前至府舍見館宇崇峻執杖者二十餘人一官人問曰汝比有何福業對曰隴威去年正月在獨村看誦一切經脫衫一領布施兼受五戒至今不犯官人乃云若如所云無量功德何須來此遂索簿勘及見簿乃曰其人合死不虛側注云受戒布施福助更合延壽乃遣人送還當時蘇活出法苑珠林店婦唐顯慶中長安城西路側有店家新婦誕一小男月滿日親族慶會欲殺羊羊數向屠人跪拜屠人報家內家內大小不以為徵遂即殺之將肉就釜煮餘人貪料理蔥蒜餅食令産婦抱兒看煮肉抱兒火前釜忽然自破湯衝灰火直射母子母子俱亡店人見聞之者多斷殺生焉出法苑珠林屠人唐總章咸亨中京師有屠人積代相傳為業因病遂死乃被衆羊懸之一如殺羊法兩羊捉手諸羊捉腳一羊持刀刺頸出血數斗乃死少頃還蘇此人未活之前家人見繞頸有鮮血驚共看之頸有被刺處還似刺羊一邊刀孔小一邊刀孔大數年瘡始合出廣古今五行記劉知元唐虔州司士劉知元攝判司倉大酺時司馬楊舜臣謂之曰買肉必須含胎肥脆可食餘瘦不堪知元乃揀取懷孕牛犢及豬羊驢等殺之其胎仍動良久乃絶無何舜臣一奴無病而死心上仍暖七日而蘇云見一水犢白額并子隨之見王訴云懷胎五箇月枉殺母子須臾又見豬羊驢等皆領子來訴見劉司士答款引楊司馬處分如此居三日而知元卒亡又五日而舜臣死出朝野僉載季全聞唐則天初京兆人季全聞家富於財性好殺戮豬羊驢犢皆烹宰於前常養鷹鷂數十聯春夏採魚鱉秋冬獵狐兔常與諸子取鳥雀以刀齊刈其頭即放飛看其飛得近遠遠者為勝近者為負以此戲樂在家極嚴殘婢妾及奴客有小事或懸開其心或剜去其眼其妻初生一子自眼上睫有皮垂下至於鼻從額已後又有一片皮垂至於項有似人著帽焉後生一子牙爪如虎口似鷹吻又生一子從項至腰有縫撥看見其心肺五臟生而俱死其人有兄亦好鷹犬弋獵性又殘忍酷毒其妻生男項上有肉枷或如鳥獸魚鱉形或無眼鼻者數矣出廣古今五行記當塗民吳俗取鮮魚皆生之欲食則投之沸湯偃轉移時乃死天寶八載當塗有業人取鱔魚是春得三頭鱔其子去鱔皮斷其頭燃火將羹之其鱔則化為蛇赤文斒斕長數尺行趨門外其子走反顧餘二鱔亦已半為蛇須臾化畢皆去其子遂病明日死於是一家七人皆相繼死十餘日且盡當塗令王休愔以其無人也命葬之出紀聞張縱唐泉州晉江縣尉張縱者好啖鱠忽被病死心上猶暖後七日蘇云初有黃衫吏告云王追縱隨行尋見王王問吏我追張縱何故將張縱來宜速遣去旁有一吏白王曰此人好啖膾暫可罰為魚王令縱去作魚又曰當還本身便被所白之吏引至河邊推縱入水化成小魚長一才許日夕增長至七日長二尺餘忽見罟師至河所下網意中甚懼不覺已入網中為罟師所得置之船中草下須臾聞晉江王丞使人求魚為鱠罟師初以小魚與之還被杖復至網所搜索乃於草下得鯉持還王家至前堂見丞夫人對鏡理粧偏袒一膊至廚中被膾人將刀削鱗初不覺痛但覺鐵冷泓然尋被剪頭本身遂活時殿下侍御史李萼左遷晉江尉正在王家餐鱠聞縱活遽往視之既入縱迎接其手謂萼曰餐膾飽耶萼因問何以得知縱具言始末方知所餐之鱗是縱本身焉出廣異記
