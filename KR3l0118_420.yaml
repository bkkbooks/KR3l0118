body:
  text: 俱名國俱名國僧祗律云佛住舍衛城南方有邑名大林時有商人驅八牛到北方俱名國有一商人在澤中牧牛時有離車捕龍食之捕得一龍離車穿鼻牽行商人問離車今汝牽此龍何用云我將殺而為啖商人欲以一牛易之捕者邀至八牛方許商人即放龍令去既而復慮離車追逐復捕取放別池中龍忽變為人語謂商人曰君施我命今欲報恩可共入宮當報大德商人答言龍性率暴嗔恚無常或能殺我答云不爾前人系我我力能殺彼人但以我受菩薩法都無殺心何況君今施我壽命顧當加害若不去者少住此中我先往掃除商人后入宮內見龍門邊二龍系在一處因問汝為何被系答言此龍女半月中三日受齊法我兄弟守護此龍女不為堅固為離車所捕以是被系龍女俄出呼商人入宮坐寶床上龍女言龍中有食能盡壽而消者有二十年消者有七年消者有閻浮提人食者未知君欲何食答言須欲閻浮提食即時種種飲食俱備商人問龍女此龍何故被系龍女言此有過我欲殺之商人言汝莫殺乃言不爾要當殺之商人言汝放彼者我當食耳復言曰不得直放之當罰六月擯置人間商人見龍宮中寶物莊嚴飾宮殿即問汝有如是莊嚴因受菩薩何為答言我龍法有五事苦何等為五謂生時眠時淫時嗔時死時一日之中三過皮肉落地熱沙簇身商言汝欲何求耶答言人道中生為畜生苦不知法故欲就如來出家龍女即與八餅金言此金足汝父母眷屬終身用之不盡復言汝合眼即以神變持著本國以八餅金與父母曰此是龍金說己更生盡壽用之不可盡時思念仁慈不得不行暫救龍女恩報彌重況持大齊受福寧小釋玄照釋玄照修道于嵩山白鵲谷操行精愨冠于緇流常願講法華經千遍以利于人既講于山中雖沍寒酷熱山林險邃而來者恆滿講席焉時有三叟眉須皓白容狀瑰異虔心諦聽如此纍日玄照異之忽一旦晨謁玄照曰弟子龍也各有所任亦頗勞苦已歷數千百年矣得聞法力無以為報或長老指使願效微力玄照曰今愆陽經時國內荒饉可致甘澤以救生靈即貧道所願也三叟曰召云致雨固是細事但雨禁絶重不奉命擅行誅責非細身首為憂也試說一計庶幾可矣長老能行之乎玄照曰願聞其說三叟曰少室山孫思邈處士道高德重必能脫弟子之禍則雨可立致矣玄照曰貧道知孫處士之在山也而不知其所行又何若此邪三叟曰孫公之仁不可診度著千金翼方惠利濟于萬代名已籍于帝宮誠為貴真也如一言救庇當保無恙但長老先與之約如其許諾即便奉依即以拯護之方授于玄照玄照詣思邈所居懇誠祗謁情禮甚謹坐定久之乃曰處士以賢哲之度濟拔為心今者亢陽寸苗不植嗷嗷百姓焦枯若此仁哲之用固在于今幸一開恩以救危歉思邈曰仆之無堪遁棄山野以何功力濟于人也苟有可施固無所吝玄照曰貧道昨遇三龍令其致雨皆云不奉上帝之命擅行雨者誅罪非輕唯處士德尊功大救之則免特布腹心仰希裁度思遜曰但可施設仆無所惜玄照曰既雨之后三龍避罪投處士后沼中以隱當有異人捕之處士喻而遣之必得釋罪矣思邈許之玄照歸見三叟于道左玄照以思邈之旨示之三叟約一日一夜千里雨足于是如期泛灑澤甚廣被翌日玄照來謁思邈對語之際有一人骨狀殊異徑往后沼之畔喑啞叱吒斯須水結為冰俄有三獺二蒼一白自池而出此人以赤索系之將欲挈去思邈召而謂曰三物之罪死無以贖然昨者擅命是鄙夫之意也幸望脫之兼以此誠上達恕其重責也此人受教登時便解而釋之攜索而去有頃三叟致謝思邈願有所酬孫曰吾山谷之中無所用者不須為報回詣玄照願陳力致效玄照曰山中一食一衲此外無闕不須酬也三叟再為請玄照因言前山當路不便往來卻之可否三叟曰固是小事耳但勿以風雷為責即可為之是夕雷霆震擊及曉開霽寺前豁然數里如掌三叟復來告謝而去思邈至道不求其報尤為奇特矣王景融唐前侍御史王景融瀛州平舒人也遷父靈柩就洛州於埏道掘著龍窟大如瓮口景融俯而觀之有氣如煙直上沖其目遂失明旬日而卒凌波女玄宗在東都晝寢于殿夢一女子容色濃艷梳交心髻大帔廣裳拜于床下上曰汝是何人曰妾是陛下凌波池中龍女衛宮護駕妾實有功今陛下洞曉鈞天之音乞賜一曲以光族類上于夢中為鼓胡琴拾新舊之聲為凌波曲龍女再拜而去及覺盡記之因命禁樂自與琵琶習而翻之遂宴從官于凌波宮臨池奏新曲池中波濤涌起復定有神女出于波心乃昨夜之女子也良久方沒因遣置廟于池上每歲祀之陶峴陶峴者彭澤令孫也開元中家于昆山富有田業擇家人不欺能守事者悉付之家事身則泛游于江湖遍行天下往往數載不歸見其子孫成人皆不辨其名字也峴之文學可以經濟自謂疏脫不謀仕宦有知生者通于八音命陶人為甓潛記歲時取其聲不失其驗嘗撰集樂録八音以定音之得失自制三舟備極空巧一舟自載一舟置賓一舟貯飲饌客有前進士孟彥深進士孟云卿布衣焦遂各置仆妾共載而峴有夕樂一部常奏清商曲逢其山泉則窮其境物乘興春行峴且名聞朝廷又值天下無事經過郡邑無不招延峴拒之曰某麋鹿閒人非王公上客亦有未招而詣者系水仙之為人江山之可駐耳吳越之土號為水仙曾有親戚為南海守因訪韶石而往省焉郡守喜其遠來贈錢百萬及遇古劍長二尺許又玉環徑四寸及海船昆侖奴名摩訶善游水而勇捷遂悉以錢而貫之曰吾家至寶也乃回棹下白芷入湘江每遇水色可愛則遺劍環于水命摩訶取之以為戲樂如是數歲因渡巢湖亦投劍環而令取之摩訶才入獲劍環而便出曰為毒蛇所嚙遽刃去一指乃能得免焦遂曰摩訶所傷得非陰靈怒乎蓋水府不欲人窺也峴曰敬奉喻然某常慕謝康樂之為人云終當樂死山水但徇所好莫知其他且栖遲逆旅之中載于大塊之上居布素之賤擅貴游之歡浪跡怡情僅三十載固亦分也不得升玉墀見天子施功惠養逞志平生亦其分也乃命移舟曰要須一到襄陽山便歸吳郡也行次西塞山維舟吉祥佛舍見江水黑而不流曰此必有怪物乃投劍環命摩訶下取見汩沒波際久而方出氣力危絶殆不任持曰劍環不可取也有龍高二丈許而劍環置前某引手將取龍輒怒目峴曰汝與劍環吾之三寶今者二物既亡爾將安用必須為吾力爭之也摩訶不得已被發大呼目眥流血窮泉一入不復還也久之見摩訶支體磔裂污于水上如有示于峴也峴流涕水濱乃命回棹因賦詩自敘不復議游江湖矣詩曰匡廬舊業自有主吳越新居安此生白發數莖歸未得青山一望計還程鶴翻楓葉夕陽動鷺立蘆花秋水明從此舍舟何所詣酒旗歌扇正相迎齊浣唐開元中河南采訪使汴州刺使齊浣以徐城險急奏開十八里河達于青水平長淮之險其河隨州縣分掘亳州真源縣丞崔延禕糾其縣徒開數千步中得龍堂初開謂是古墓然狀如新筑淨潔周視北壁下有五色蟄龍長丈余頭邊鯉魚五六枚各長尺余又有靈龜兩頭長一尺二寸眸長九分如常龜禕以白開河御史塢元昌狀上齊浣浣命移龍入淮取龜入汴禕移龍及魚二百餘里至淮岸白魚數百萬跳躍赴龍水為之沸龍入淮噴水云霧杳冥遂不復見初將移之也御史員錫拔其一須元昌差网送龜至宋遇水泊大龜屢引頸向水网戶憐之暫放水中水闊數尺深不過五寸遂失大龜所在涸水求之亦不獲空致龜焉沙州黑河北庭西北沙州有黑河深可駕舟其水往往泛濫蕩室廬瀦原野由是西北之禾稼盡去地荒而不可治居人亦遠徙用逃墊溺之患其吏于北庭沙洲者皆先備牲酎望祀于河滸然后敢視政否即淫雨連月或大水激射圮城邑則里中民盡魚其族也唐開元中南陽張嵩奉詔都護于北庭挈符印至境上且召郊迎吏訊其事或曰黑河中有巨龍嗜羔特犬彘故往往漂浪騰水以凱郡人望祀河滸我知之久矣即命致牢醴布筵席密召左右執弓矢以俟于側嵩率僚吏班于河上峨冠斂板罄折肅躬俄頃有龍長百尺自波中躍而出俄然升岸目有火光射人離人約有數十步嵩即命彀矢引滿以伺焉既而果及于幾筵身漸短而長數尺方將食未及而嵩發矢一時衆矢共發而龍勢不能施而摧龍既死里中俱來觀之譁然若市嵩喜已除民害遂以獻上上壯其果斷詔斷其舌函以賜嵩且子孫承襲在沙州為刺史至今號為龍舌張氏興慶池龍唐玄宗嘗潛龍于興慶宮及即位其興慶池嘗有一小龍出游宮外御溝水中奇狀蜿蜒負騰逸之狀宮嬪內豎靡不具瞻后玄宗幸蜀鑾輿將發前一夕其龍自池中御素云躍然亙空望西南而去環列之士率共觀之及上行至嘉陵江乘舟將渡見小龍翼舟而進侍臣咸睹之上泫然泣下顧謂左右曰此吾興慶池中龍也命以酒沃酹上親自祝之龍乃自水中振鬣而去井龍開元末西國獻獅子至安西道中系于驛樹近井獅子吼若不自安俄頃風雷大至有龍出井而去旃然玄宗將封泰山進次滎陽旃然河上見黑龍命弓矢親射之矢發龍滅自爾旃然伏流于今百餘年矣按旃然即濟水也濟水溢而為滎遂名旃然左傳云楚師濟于旃然是也龍門舊說春水時至魚發龍門則有化者至今汾晉山中龍有遺骨遺角甚衆采以為藥有五色者
