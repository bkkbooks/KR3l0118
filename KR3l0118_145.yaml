body:
  text: 李鈞李鈞唐李鈞之蒞臨汝也郡當王仙芝大兵之後民間多警李鈞以兵力單寡抗疏聞奏詔以昭義軍三千五百人鎮焉乾符戊戌歲也兵至營於郡西郭明年春鈞節制上黨雜報到於是鎮兵部將排隊於州前通衢率其屬入衙展君臣之禮忽有暴風揚塵起自軍門而南蟠折行伍拔大旆十餘以登州人愕眙而顧沒於天際明日州北二十里大牛谷野人得旆以獻帛無完幅枝幹皆摺拉矣鈞至上黨統衆出雁門兵既不戢暴殘居民遂為猛虎軍所殺矣出三水小牘高駢唐光啓三年中書令高駢鎮淮海有蝗行而不飛自郭西浮濠緣城入子城聚於道院驅除不止松竹之屬一宿如剪幡幀畫像皆囓去其頭數日之後又相啖食九月中暴雨方霽溝瀆間忽有小魚其大如指蓋雨魚也占有兵喪至十月有大星夜墮於延和閣前聲若奔雷迸光碎響洞照一庭自十一月至明年二月昏霧不解或曰下謀上之兆是時粒食騰貴殆逾十倍寒僵雨仆日輦數千口棄之郭外及霽而達坊靜巷為之一空是時浙西軍變周寶奔毗陵駢聞之大喜遽遣使致書於周曰伏承走馬已及奔牛奔牛堰名在常州西今附虀一瓶葛粉十斤以充道途所要蓋諷其虀粉也三月使院致看花宴駢有與諸從事詩其末句云人間無限傷心事不得樽前折一枝蓋亡滅之讖也及為秦彥幽辱計口給食自五月至八月外圍益急遂及於難出妖亂志巨鹿守唐文德戊申歲巨鹿郡南和縣街北有紙坊長垣悉曝紙忽有旋風自西來卷壁紙略盡直上穿雲望之如飛雪焉此兵家大忌也夏五月郡守死出三水小牘陝師唐乾寧末分陝有蛇鼠鬥於南門之內觀者如堵蛇死而鼠亡去未旬而陝師遇禍則知內蛇死而鄭厲入群鼠奔而蒲山亡妖由人興可為戒懼出三水小牘嚴遵美唐左軍容使嚴遵美閹官中仁人也嘗言北司為供奉官胯衫給事無秉簡之儀又云樞密使廨署三間屋書匱而已亦無視事之廳堂狀後帖黃指揮公事乃楊復泰泰明鈔本作恭奪宰相權也遵美嘗發狂手足舞蹈之傍有一貓一犬貓謂犬曰軍容改常也犬曰何用管俄而舞定且異貓犬之言遇昭宗播遷鳳翔乃求致仕漢中尋徙於劍南青城山下卜別墅以居之年過八十而終其忠正謙約與西門李玄為季孟于時誅宦官唯西川不奉詔由是脫禍家有北司治亂記八卷備載閹官忠佞好惡蓋巷伯之流也未必俱為邪僻良由南班輕忌大過以致怨怒蓋邦國不幸也先是路巖自成都移鎮渚宮所乘馬忽作人語且曰蘆荻花此花開後路無家不久及禍然畜類之語豈有物憑之乎石言於晉殆斯比也出北夢瑣言成汭荊州成汭唐天復中準詔統軍救援江夏帥次公安縣寺有二金剛神土人號曰二聖頗有靈驗艤舟而謁之且以勝負為禱汭兆皆不吉汭惑之孔目官楊師厚曰公業已行安可疑阻於是不得已而進竟有覆軍之敗身死家亡非偶然也出北夢瑣言劉知俊梁彭城王劉知俊鎮同州日因築營牆掘得一物重八十餘斤狀若油囊召賓幕將校問之或曰地囊或曰飛廉或曰金神七殺獨留源曰此是冤氣所結也古來囹圄之地或有焉昔王充據洛陽修河南府獄亦獲此物而遠祖記之乃冤死囚人精爽入地聚為此物經百千年凝結不散源聞酒能忘憂請奠以醇醪或可消釋耳然此物之出亦非吉徵也知俊命具酒饌視酹復瘞之尋有扳城背主奔秦之事乃驗之矣出鑒戒録田頵宣州節度田頵將作亂一日向暮有鳥赤色如雉而大尾有火光如散星之狀自外飛入止戟門而不見翌日府中大火曹局皆盡唯甲兵存焉頵資以起事明年遂敗出稽神録桑維翰魏公桑維翰尹開封一日嘗中夜於正寢獨坐忽大驚悸如有所見向空厲聲云汝焉敢此來如是者數四旬日憤悶不已雖齊明鈔本齊作貼體亦不敢有所發問未幾夢己整衣冠嚴車騎將有所詣就乘之次忽所乘馬亡去追尋莫之所在既寤甚惡之不數日及難出玉堂間話鍾傅南平王鍾傅在江西有衙門吏孔知讓新治第晝有一星隕於庭中知讓甚惡之求典外戎以空其地歲餘御史中丞薛紹緯貶官至豫章傅取此地第以居之遂卒於此出稽神録頓金袁州刺史頓金罷郡還都有人以紫襆包一物詣門遺之開視則白爛衫也遽追其人則亡矣其年金卒出稽神録湖南馬氏湖南武穆王巡邊回舟至洞庭宜春江口暴風忽至波如連山乃見波中恢詭譎怪蛟螭出沒雲霧昏蒙有如武夫執戈戟者有文吏具襴簡者有如捧盤盂者或緋或緑倏閃睢盱莫知何物左右大駭衣服器皿悉投之舟人欲以姬妾為請王不聽移時風定僅獲存焉後數年武穆王薨於位出北夢瑣言王慎辭江南通事舍人王慎辭有別墅在廣陵城西慎辭常與親友遊其上一日忽自愛其岡阜之勢歎曰我死必葬於此是夜村中聞太吠或起視之見慎辭獨騎徘徊於此逼之遂不見自是夜夜恆至月餘慎辭卒竟葬其地出稽神録安守範偽蜀彭州刺史安思謙男守範嘗與賓客遊天台禪院作聯句詩守範云偶到天台院因逢物外僧定戎軍推官楊鼎夫云忘機同一祖出語離三乘前懷遠軍巡官周述云樹老中庭寂窗虛外境澄前眉州判官李仁肇云片時松柏下聯續百千燈因紀於僧壁而去翌日有貧子乞食見之朗言曰人道有初無尾此則有尾無初卻後五年首頷俱碎洎不如尾句者撫掌大笑院僧驅邇之貧子走且告曰此後主人不遠千里即欲到來衆以為狂莫測其由後數年守範伏法鼎夫暴亡此首領俱碎之義周與李纍授官資此不如尾句之義也院主僧尋亦卒相承住持者來自興元則主不遠千里也貧子之説一無謬焉出野人間話
