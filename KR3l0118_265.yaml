body:
  text: 卷第二百六十五輕薄一余聞藏書家有宋刻蓋闕七卷云其三卷余考之得十之七已付之梓其四卷僅十之二三博洽君子其明以語我庶幾為全書云隆慶改元秋七月朔日十山談愷志劉祥東莞莒人也宋世解褐為征西行參軍少好文學性韻剛疏輕言肆行不避高下司徒褚淵入朝以腰扇障日祥從側過曰作如此舉止羞面見人扇障何益淵曰寒士不遜祥曰不能殺袁劉安得免寒士永明初遷長沙咨議參軍撰宋書譏斥禪代王儉密以啓聞上銜而不問兄整官廣州卒祥就整妻求還資撰連珠多肆譏訕事聞上別遣敕祥曰卿素無行檢朝野所悉輕棄骨肉侮蔑兄嫂此是卿家行不足乃無關他人卿才識所知蓋何足論位涉清途於分非屈何意輕肆口噦詆目朝士造席立言必以貶裁為口實冀卿年齒已大能自感勵日望悛革如此所聞轉更增甚喧議朝廷不避尊師肆口極辭彰暴物聽近見卿連珠寄意悖慢彌不可長原卿性命令卿萬里思愆若能改革當令卿還後至廣州終日縱酒病卒東莞劉祥恃才傲物嘗謂一驢曰汝努力如汝輩已為令僕矣復作連珠譏諷朝廷尋被誅劉孝綽彭城人幼聰敏七歲能屬文舅中書郎王融深賞異之每言天下文章若無我當歸阿士阿士孝綽小字也與到洽友善同侍東宮孝綽自以才優於洽每於宴坐嗤鄙其文洽銜之孝綽為廷尉正攜妾入官府其母猶停私宅洽為御史中丞劾奏之坐免官高祖為藉用詩奉詔作者數十人孝綽尤工即日敕起為咨議後遷黃門侍郎坐受賕為餉者所訟左遷孝綽少有盛名而仗氣負才多所凌忽有不合意極言詆訾領軍臧盾太府卿沈僧果等並被時遇孝綽尤輕之每於朝集會同處公卿間無所與語反呼騶卒訪道塗間事由此多忤梁劉孝綽輕薄到洽洽本灌園者洽謂孝綽曰某宅東家有好地擬買被本主不肯何計得之孝綽曰卿何不多輦其糞置其墉下以苦之洽怨恨孝綽竟被傷害許敬宗新城人武德初太宗聞其名召補學士文德皇后喪百官衰絰率更令歐陽詢狀貌醜異衆共指之敬宗見而大笑為御史所劾左授洪州司馬纍遷給事中兼修國史禮部尚書嫁女於蠻酋馮盎之子多納金寶為有司所劾左授鄭州刺史永徽間復拜禮部尚書帝將立昭儀大臣切諫敬宗陰揣帝私即妄言曰田舍子賸穫十斛麥尚欲更故婦天子富有四海立一后謂之何哉帝意遂定第舍華僭至造連樓使諸妓走其上縱酒奏樂自娛及卒博士袁思古議曰敬宗位以才升歷居清級然棄長子于荒徼嫁少女於夷落聞詩學禮事絶於趨庭納采問名惟聞於黷貨請諡為繆唐許敬宗性輕見人多忘之或謂其不聰曰卿自難識若是曹劉沈謝暗中摸索著亦可識盈川令楊炯華陰人幼聰敏博學以神童舉與王勃盧照鄰駱賓王齊名嘗謂人曰吾愧在盧前恥居王後當時以為然拜校書郎為崇文館學士則天初坐事左轉梓州司法參軍秩滿授盈川令炯為政殘酷人吏動不如意輒搒殺之又所居府舍多進士亭臺皆書榜額為之美名大為遠近所笑楊炯華陰人幼聰敏博學以神童舉與王勃盧照鄰駱賓王齊名嘗謂人曰吾愧在盧前恥居王後當時以為然拜校書郎為崇文館學士則天初坐事左轉梓州司法參軍秩滿授盈川令炯為政殘酷人吏動不如意輒搒殺之又所居府舍多進士亭臺皆書榜額為之美名大為遠近所笑唐衢州盈川令楊炯詞學優長恃才簡倨不容於時每見朝官目為麒麟楦許怨人問其故楊曰今餔樂假弄麒麟者刻畫頭角修飾皮毛覆之驢上巡場而走及脫皮褐還是驢馬無德而衣朱紫者與驢覆麟皮何別矣崔湜仁師之子弟澄液兄蒞並有文翰列居清要每私宴自比王謝之家謂人曰吾門戶及出身歷官未嘗不為第一大丈夫當先據要路以制人豈能默默受制於人湜執政時年三十六嘗暮出端門下天津馬上賦詩曰春還上林苑花滿洛陽城張說見之嘆曰文與位固可致其年不可及也後附韋后比相又附太平公主門下客獻海鷗賦以諷湜稱善而不悛蕭至忠誅流嶺外賜死崔湜之為中書令張嘉真為舍人湜輕之常呼為張底後曾量數事意皆出人右湜驚美久之謂同列曰知否張底乃我輩一般人此終是其坐處湜死後十餘年河東竟為中書令杜審言襄陽人擢進士為隰城尉恃才高以傲世見疾蘇味道為天官侍郎審言集判出為人曰味道必死人驚問故答曰彼見吾判必羞死又嘗語人曰吾文章當得屈宋作衙官吾筆當得王羲之北面其矜誕類此後病甚宋之問等候之答曰甚為造化小兒相苦尚何言然吾在久壓公等今且死固大慰但恨不見替人云杜審言初舉進士恃才謇傲甚為時輩所妬蘇味道為天官侍郎審言參選試判後謂人曰蘇味道必死人問其故審言曰見吾判即當羞死矣又問人曰吾之文章合得屈宋作衙官書跡合得王羲之北面其矜誕如此貶吉州司戶司馬周季重員外司戶郭若訥共構審言罪狀繫獄將因事殺之既而季重等酣宴審言子并年十三懷刃以擊季重重中創而死并也為左右所殺杜甫審言之孫少貧不自振客吳越齊趙間舉進士不第天寶間奏賦三篇帝奇之使待制集賢院數上賦頌因寓自稱道且言先臣恕預以來承儒守官十一世逮審言以文章顯臣賴緒業自七歲屬辭且四十年然衣不蓋體常寄食於人竊恐轉死溝壑伏惟天子哀憐之若令執先世故事則臣之述作雖不足鼓吹六經至沈鬱頓挫隨時敏給楊雄枚皋可企及也有臣如此陛下其忍棄之祿山亂天子入蜀甫避走三川會嚴武節度劍南往依焉武以世舊待甫甚善親至其家甫見之或時不中而性褊躁傲誕嘗醉登武牀瞪視曰嚴挺之乃有此兒武亦暴猛外若不為忤中銜之好論天下大事高而不切然數嘗寇亂挺節無所污為詩歌情不忘君人憐其忠云杜工部甫在蜀醉後登嚴武之案厲聲問武曰公是嚴挺之兒否武色變甫復曰僕乃杜審言兒武少解矣陳通方登正元進士第與王播同年播年五十六通方甚少因期集撫播背曰王老奉贈一第言其日暮途窮及第同贈官也播恨之後通方丁家難辛苦萬狀播捷三科為正郎判鹽鐵方窮悴求助不甚給之時李虛中為副使通方以詩為汲引云應念路傍憔悴翼昔年喬木幸同遷播不得已薦為江南院官陳通方閩縣人貞元十年顧少連下進士第時屬公道大開採掇孤俊通方年二十五第四人及第以其年少名高輕薄自負與王播同年王時年五十六通方薄其成事後時因期集戲附其背曰王老王老奉贈一第言其日暮途遠及第同贈官也王曰擬應三篇通方又曰王老一之謂甚其可再乎王心每貯之通方尋值家難還歸王果纍捷高科官漸達矣通方後履人事入關王已丞郎判監鐵通方窮悴寡坐不知王素銜其言投之求救同年李虛中時為副使通方亦有詩扣之求為汲引云應念路傍憔悴翼昔年喬木幸同遷王不得已署之江西院官赴職未及其所又改為浙東院僅至半程又改與南陵院如是往復數四困躓日甚退省其咎謂甥姪曰吾偶戲謔不知王生遽為深憾人之於言豈合容易哉尋值王真拜禮分懸絶追謝無地悵望病終李賀唐諸王孫也年七歲元和中以歌詩著名韓退之皇甫湜覽賀所作奇之相謂曰若是古人吾曹有不知者若是今人豈有不知之理因連騎造門請見賀總角荷衣而出二公面試一篇賀承命欣然操觚染翰傍若無人題曰高軒過二公大驚以所乘馬聯鑣而還元稹以明經中第願與賀交賀見刺曰明經及第何事來見李賀稹慚而退未幾制策登科為禮部郎官乃議賀父名晉不合舉進士時輩從而排之賀竟不第按唐李公藩嘗綴賀歌詩為之敘未成知賀有外兄與賀有筆研舊召見託以搜采放失其人諾且請曰某盡記賀篇詠然黵改處多願得公所輯視之當為是正公喜并付之彌年絶蹟復召詰之乃云某與賀中表自幼同處恨其倨忽常思報之今幸得公所藏并舊有者悉投堰中矣公大恚叱出之元和中進士李賀善為歌篇翰愈深所知重於縉紳間每為延譽由此聲華藉甚時元稹年少以明經擢第一攻篇什常交結於賀一日執贄造門賀覽刺不容遽入僕者謂曰明經及第何事來看李賀稹無復致情慚憤而退其後自左拾遺制策登科日當要路及為禮部郎中因議賀祖諱晉不合應舉賀亦以輕薄為時輩所排遂致撼軻韓愈惜其才為著諱辨録明之然竟不成名李群玉澧州人好吹笙常使家僮吹之性喜食鵝及授校書郎即歸故里盧肇送詩云妙吹應諾鳳工書定得鵝題黃陵廟詩有曰黃陵廟前春已空子規啼血淚春風不知精爽落何處疑是行雲秋色中群玉自以為春空便到秋色踟蹰欲改恍若有物告以二年之兆至潯陽具述其事於段成式群玉亡後成式哭之詩曰酒裏詩中三十年縱橫唐突世喧喧明時不作禰衡死傲盡公卿歸九泉李群玉字文山性輕率多侮戲人常假江陵幕客書求丐於澧州刺史艾乙李謂艾曰小生病且甚矣幸使君痛救之李以戲其性之僻也群玉以其輕脫而濟之不厚矣馮涓大中四年進士馮涓登第榜中文譽最高是歲新羅國起樓厚齎金帛奏請撰記時人榮之初官京兆府參軍恩地即杜相審權也杜有江西之拜制書未行先召長樂公密話垂延辟之命欲以南昌箋奏任之戒令勿泄長樂公拜謝辭出宅速鞭而歸於通衢遇友人鄭賨見其喜形於色駐馬懇詰長樂遽以恩地之辟告之滎陽尋捧刺詣京兆門謁賀具言得於馮先輩也京兆嗟憤而鄙其淺露洎制下開幕馮不預焉心緒憂疑莫知所以廉車發日自灞橋乘肩輿門生咸在長樂拜別京兆公長揖馮曰勉旃由是囂浮之譽遍於搢紳竟不通顯中間又涉交通中貴愈招清議官止祠部郎中眉州刺史仕蜀至御史大夫溫庭筠太原人大中初應進士苦心研席長於詩賦然士行塵雜不修邊幅能逐絃吹之音為測艷之詞公卿家無賴子弟裴誠令狐縞之徒相與蒲飲酣醉終日由是纍年不第徐商鎮襄陽往依之署為巡官咸通中失意歸江東路由廣陵心怨令狐綯在位時不為成名既至與新進少年狂遊俠愈久不刺謁又乞索於揚子院醉而犯夜為虞候所繫敗面折齒方遷揚州訴之令狐綯捕虞候治之極言庭筠狹邪醜迹自是污行聞於京師開明中溫庭筠才名藉甚然而罕拘細行以文為貨識者鄙之無何執政間復有惡奏庭筠攪擾場屋出隨州方城縣尉時中書舍人裴坦當制忸怩含毫久之時有老吏在廁因訊之升黜對曰舍人合為責詞何者入策進士與望州長馬齊資坦釋然故有澤畔長沙之比庭筠之任文士爭為詞送唯記唐夫得其尤曰何事明時泣玉頻長安不見杏園春鳳凰詔下雖霑命鸚鵡才高却纍身且飲醁醽消積恨莫辭黃綬拂行塵方城若比長沙遠遊隔千山與萬津陳磻叟者父名岵當有詞學尤溺於內典長慶中嘗注維摩經進上有中旨令與好官執政謂岵因為道場僧進經頗抑挫之止授少列而已磻叟形質短小長喙踈齒尤富文學自負王佐之才大言騁辨雖接對相公旁若無人復自料非名教之器弱冠度為道士隸名於昊天觀咸通中降聖之辰二教論議而黃衣屢奔上小不懌宣下令後輩新入內道場有能折衝浮圖者論以自薦磻叟攝衣奉詔時釋門為主論自誤引涅槃經疏磻叟應聲叱之曰皇帝山呼大慶阿師口稱獻壽而經引涅槃犯大不敬以其僧謂磻叟不通佛書既而錯愕殆至顛墜自是連挫數輩聖顏大悅左右呼萬歲其日簾前賜紫衣一襲磻叟由是恣其輕侮高流宿德多患之潛聞上聽云磻叟衣冠子弟不願在官帔頗思理一邑以自效耳於是中旨授至德縣令磻叟蒞事未經考秩拋官詣闕上封事通義劉公引為羽翼非時召對數刻磻叟所陳數十節侵窮時病復曰臣請破邊瑊家可以贍軍一二年上問邊瑊何人對曰宰相路巖親吏既而大為巖恚怒翌日敕以磻叟誣罔上聽訐斥大臣除名為民流愛州磻叟雖至顛蹶不敢以其道自屈素有重墜之疾歷聘藩后率以肩輿造犀廡所至無不仰止及巖貶磻叟得量移為鄧州司馬時屬廣明庚子之後劉巨容起徐將得襄陽不能知磻叟待以巡屬一州佐耳磻叟沿漢南下中途與巨容幕吏書云已出無禮之鄉漸入逍遙之境巨容得之大怒遣步健十餘輩移牒潭鄂追捕磻叟時天下喪亂無人為堤防既而為卒伍所凌全家泝漢至賈塹後門三十餘口無噍類矣薛能會昌間進士自負過高從事西川日每短諸葛功業為詩曰陳圖誰許可廟貌我揶揄又云焚却蜀書宜不讀武侯無可律吾身譏李白曰我生若在開元日爭遣名為李翰林又曰李白終無取陶潛固不刊自題其集云詩源何代失澄清處處狂波污後生常感道孤吟有淚却緣風壞語無情難甘惡少欺韓信枉被諸侯殺禰衡縱到緱山也無益四方聯絡盡蛙聲放誕如此後軍亂被害薛能以文章自負而纍出戎鎮常鬱鬱歎息因有謝詩淮南寄天柱茶其落句云粗官乞與直拋却賴有詩情合得嘗意以節將為粗官也鎮許昌日幕吏咸集因令其子橐鞬參諸幕客幕客驚怪能曰俾渠消災時人以為輕薄高逢休顧雲大順中制同羊昭業等十人修史雲在江淮遇高逢休諫議時劉子長僕射清名雅譽充塞縉紳其弟崇望復在中書雲以逢休與子長舊交將造門希致先容逢休許之久矣雲臨期請書逢休授之一函甚草創雲微有惑因潛起閲之凡一幅並不言雲但曰羊昭業擬將一尺三寸汗腳踏他燒殘龍尾道懿宗皇帝雖薄德不任被前件人羅織執大政者亦大悠悠雲吁嘆而已汲師滑州人也自溧水尉拜監察御史時大夫李乾祐為萬年令師按縣獄乾佑差池而出晚師怒不顧而出銜之乾祐尋巡察韋務靜與師鄉里充乾祐判官會制書拜乾祐中丞乾祐顧謂務靜曰邑子可出矣足下可入矣遂左授新樂令性躁率時直長李沖寂即高宗從弟也微有犯師將彈而謂之呼沖寂為弟沖寂謂之曰沖寂主上從弟公姓汲於皇家何親而見呼為弟師慚而止嘗監享太廟責署官將彈之署官徹曉伺其失汲履赤舄如廁共訐之乃止崔駢李德裕退朝歸第多與親表裴璟無間破體笑與李多詢以內外新事李問更有何說裴曰別無新事但昨日坡下郎官集送某郎官出牧江湖飲餞郵亭人客甚衆有倉部白員外末至崔駢郎中作録事下四籌白自以卑秩人乘凌兢更不敢固辭上次酌四大器白連引三器訖餘一持之而請第四器名崔郎中云亦別無事但何必要到處出脫時白踉蹌仆於下座竟不飲而去坐上有笑者有縮頸者但不知此官人今日起得否李聞之大怒曰何由可耐不斯言必有之乎曰固然又問弟知白員外所止否璟曰是人在某坊某曲李曰為某傳語白員外請至宅白捧命又憂恐比至李曰久欲從容中外事併然旬朔不要出人事既而白授翰林學士崔駢汾州刺史續改洺州刺史流落外任不復更遊郎署終鴻臚卿西川人蜀東西川之人常互相輕薄西川人言梓州者乃我東門之草市也豈得與我為耦哉節度柳仲郢聞之為幕客曰吾立朝三十年清華備歷今日始得與西川作市令聞者皆笑之故世言東西兩川人多輕薄河中幕客相國劉瞻父景連州人少為漢南鄭司徒掌箋奏因題商山驛側泉石鄭大奇之勉以進修俾前驛換麻衣執贄見之後致解薦擢進士第歷臺省瞻孤平有藝雖登第不預急流任大理評事日饘粥不給嘗於安國寺相識僧處求餐留所業文數軸置在僧几致仕軍容劉玄翼遊寺見瞻文卷甚奇之憐其貧窶厚有濟恤又知其連山人朝無彊授謂僧曰其雖閒棄必能為此人致宰相爾後授河中少尹幕寮有貴族浮薄者蔑視之一旦有命徵人府尹祖之前之輕薄幕客呼瞻為尹公曰歸朝作何官職瞻對曰得路即作宰相同舍郎大笑之在席亦有異其言者瞻自是以水部員外知制誥旋入翰林以致大拜也崔昭符皮日休南海鄭愚門生春關內嘗宴於曲江醉寢於別榻衣囊書笥羅列傍側率皆新飾同年崔昭符鐐之子固蔑視之矣亦醉更衣見日休謂其素所熟狎者即伺問且欲戲之日休僮僕遽前欲呼之昭符之其日休也曰勿呼之渠方宗會矣以其囊笥皆皮也時人傳之以為口實日休嘗遊江漢間時劉允章鎮江夏幕中有穆判官者允章親也或譖日休薄焉允章素使酒一日方宴忽怒曰君何以薄穆判官乎君知身之所來否鸚鵡洲在此即黃祖沈禰衡之所也一席為之懼日休南涕而已又一說東都留守劉允章文學之宗氣頗高介後進循常之士罕有敢及門者咸通中自禮部侍郎授鄂州觀察使明年皮日休登第將歸覲於蘇臺路由江夏困投刺焉劉待之甚厚至于饔餼有加等留連纍日仍致宴於黃鶴樓以命之監軍使與參佐悉集後日休方赴召已酒酣矣既登樓劉以其末至復乘酒應命心薄之及酒數行而日休吐論紛擾頓亡禮敬劉作色謂曰吳兒勿恃蕞爾之子且可主席日休答曰大夫豈南嶽諸劉乎何倨貴如是劉大怒戟手遙指而詬曰皮日休知鸚鵡洲是禰衡死處無日休不敢答但嵬峨如醉掌客者扶出翌日微服而遁于浙左溫定乾符四年新進士曲江春宴甲於常年有溫定者久困場籍坦率自恣尤憤時之浮薄因設奇以侮之至其日蒙衣肩輿金翠之飾敻出于衆侍婢皆稱是徘徊於柳蔭之下俄頃諸公自露棚移樂登鷁首既而謂是豪貴其中姝麗必矣因遣促舟而進莫不注視於此或肆調謔不已群興方酣定乃於簾間垂足定膝脛極偉而長毳衆忽覩之皆掩袂亟命回舟避之或曰此必溫定也
