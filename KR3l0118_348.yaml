body:
  text: 辛神雍辛神雍平盧從事御史辛神雍太和五年冬以前白水尉調集於京師時有傭者劉萬金與家僮自勤同室而居自勤病數月將死一日萬金他出自勤偃於塌忽有一人紫衣危冠廣袂貌枯形瘠巨準修髯自門而入至塌前謂自勤曰汝強起疾當間矣於是扶自勤負壁而坐先是室之東垣下有食案列數器紫衣人探袖中出一掬物狀若稻實而色青即以十餘粒置食器中謂自勤曰吾非人間人今奉命召萬金萬金當食而死食爾勿泄吾言不然則禍及矣言訖遂去是日萬金歸臉赤而喘且曰我以腹虛熱上殆不可治即就其器而食食且盡自勤疾愈萬金果卒唐燕士晉昌唐燕士好讀書隱于九華山常日晚天雨霽燕士步月上山夜既深有群狼擁其道不得歸懼既甚遂匿於深林中俄有白衣丈夫戴紗中貌孤俊年近五十循澗而來吟步自若佇立且久乃吟曰澗水潺潺聲不絶溪壠茫茫野花發自去自來人不歸長時唯對空山月燕士常好為七言詩頗稱于時人聞此驚歎將與之言未及而沒明日燕士歸以貌問里人有識者曰是吳氏子舉進士善為詩卒數年矣郭鄩郭鄩罷櫟陽縣尉久不得調窮居京華困甚肸饗間常有二物如猿玃衣青碧出入寢興無不相逐凡欲舉意求索必與鄩俱往所造詣如礙枳棘親友見之俱若讎隙或厭之以符術或避之於山林數年竟莫能絶一夕忽來告別云某等承君厄運不相別者久今則候曉而行無復至矣鄩既喜其去遂問所詣云世路如某者甚多但人不見耳今之所詣乃勝業坊富人王氏將往散之鄩曰彼之聚斂豐盈何以遽散云先得計于安品子矣曉鼓忽鳴遂失所在鄩既興盥櫛便覺愁憤開豁試詣親友無不改觀相接未旬見宰相面白遂除通事舍人鄩有表弟張生者為金吾衛佐交游皆豪俠少年好奇聞之未信之也知勝業王氏隸左軍自是常往伺之王氏性儉約所費未常過分家有妓樂端麗者至多外之袨服冶容造次莫回其意一日與賓朋過鳴珂曲有婦人靚粧立于門首王生駐馬遲留喜動顏色因召同列者置酒為歡張生預焉訪之即安品子之弟也品子善歌是日歌數曲王生悉以金綵贈之衆皆訝其廣費自此輿輦資貨日輸其門未經數年遂至貧匱耳李全質隴西李全質少在沂州嘗一日欲大蹴踘昧爽之交假寐于沂州城橫門東庭前忽有一衣紫衣首戴圓笠直造其前曰奉追全質曰何人相追紫衣人曰非某之追別有人來奉追也須臾一緑衣人來曰奉追其言忽遽勢不可遏全質曰公莫有所須否緑衣人曰奉命令追敢言其所須紫衣人謂緑衣人曰不用追以手麾出橫門紫衣人承間謂全質曰適蒙問所須豈不能終諾乎全質曰所須何物答曰犀佩帶一條耳全質曰唯言畢失所在主者報蹴踘遂令畫犀帶日晚具酒脯並紙錢佩帶于橫門外焚之是夜全質才寐即見戴圓笠紫衣人來拜謝曰蒙賜佩帶慚愧之至無以奉答然公平生水厄但危困處某則必至焉洎太和歲初大水全質已為太平軍裨將兼監察有切務自中都抵梁郡城西走百歇橋二十里水深而冰薄素不諳委程命峻速片時不可駐行從等面如死灰信轡委命而行才三數十步有一人後來大呼之曰勿過彼而來此吾知其徑安而且捷全質荷之反轡而從焉才不三里止泥濘而曾無尺寸之阻得達本土以財物酬其人人固讓不取固與之答曰若仗我而來則或不讓今因我而行亦何所苦終不肯受全質意其鮮焉乃益之須臾復來已失所在却思其人衣紫衣戴圓笠豈非橫門之人歟開成初銜命入關回宿壽安縣夜未央而情迫時復昏晦不得已而出逆旅三數里而大雨回亦不可須臾馬旁見一人全質詰之誰歟對曰郵牒者更於馬前行寸步不可覩其人每以其前路物導之或曰樹或曰樁或曰險或曰培塿或曰窮全質皆得免咎久而至三泉驛憩焉才下馬訪郵牒者欲酬之已不見矣問從者形狀衣服固紫衣而首戴笠復非橫門之人歟會昌壬戌歲濟陰大水谷神子與全質同舟訝全質何懼水之甚詢其由全質乃語此又云本性無懼水紫衣屢有應故兢栗之轉切也沈恭禮閿鄉縣主簿沈恭禮太和中攝湖城尉離閿鄉日小疾暮至湖城堂前臥忽有人繞牀數匝意謂從行廳吏雷忠順恭禮問之對曰非雷忠順李忠義也問曰何得來此對曰某本江淮人因飢寒傭於人前月至此縣卒于逆旅然飢寒甚今投君祈一食兼丐一小帽可乎恭禮許之曰遣我何處送與汝對曰來暮遣驛中廳子張朝來取語畢立于堂之西楹恭禮起坐忠義進曰君初止此更有事輒敢裨補恭禮曰可遂言此廳人居多不安少間有一女子年可十七八強來參謁名曰蜜陀僧君慎不可與之言或託是縣尹家人或假四鄰為附輒不可交言言則中此物矣忠義語畢却立西楹未定堂東果有一女子峨鬟垂鬢肌膚悅澤微笑轉盼謂恭禮曰秋室寂寥蛩啼夜月更深風動梧葉墮階如何罪責羈囚如此耶恭禮不動又曰珍簟牀空明月滿室不飲美酒虛稱少年恭禮又不顧又吟曰黃帝上天時鼎湖元在茲七十二玉女化作黃金芝恭禮又不顧逡巡而去忠義又進曰此物已去少間東廊下有敬寡婦王家阿嫂雖不敢同蜜陀僧然亦不得與語少頃果有一女郎自東廡下衣白衣簪白簪手整披袍回命曰王家阿嫂何不出來俄然有曳紅裙紫袖銀帔而來步庭月數匝却立于東廡下忠義又進曰此兩物已去可高枕矣少間縱有他媚來亦不足畏也忠義辭去恭禮止之為我更駐候怪物盡即去忠義應諾而四更已有一物長二丈餘手持三數髑髏若躍丸者漸近廳簷忠義謂恭禮曰可以枕擊之應聲而擊㩧然而中手墮下髑髏俯身掇之忠義跳下以棒亂毆出門而去恭禮連呼忠義不復見而東方已明與從者具語之遂令具食及市帽子召廳子張朝詰之曰某本巫人也近者假食為廳吏具知有新客死客鬼李忠義恭禮便付帽子及盤餐等去其夜夢李忠義辭謝曰蜜陀僧大須防備猶二三年奉擾耳言畢而去恭禮兩月在湖城夜夜蜜陀僧來終不敢對後即歸閿鄉即隔夜而至然終亦不能為患半年後或三夜五夜一來一年餘方漸稀有僧令斷肉及葷辛此後更不復來矣牛生牛生自河東赴舉行至華州去三十里宿一村店其日雪甚令主人造湯餅昏時有一人窮寒衣服藍縷亦來投店牛生見而念之要與同食此人曰某窮寒不辦得錢今朝已空腹行百餘里矣遂食四五碗便臥於牀前地上其聲如牛至五更此人至牛生牀前曰請公略至門外有事要言之連催出門曰某非人冥使耳深愧昨夜一餐今有少相報公為置三幅紙及筆硯來牛生與之此人令牛生遠立自坐樹下袖中抽一卷書牒之看數張即書兩行如此三度訖求紙封之書云第一封第二封第三封謂牛生曰公若遇災難危篤不可免者即焚香以次開之視若或可免即不須開言訖行數步不見矣牛生緘置書囊中不甚信也及至京止客戶坊飢貧甚絶食忽憶此書故開第一封題云可於菩提寺門前坐自客戶坊至菩提寺可三十餘里飢困且雨雪乘驢而往自辰至鼓聲欲絶方至寺門坐未定有一僧自寺內出叱牛生曰雨雪如此君為何人而至此若凍死豈不見纍耶牛生曰某是舉人至此值夜略借寺門前一宿明日自去耳僧曰不知是秀才可止貧道院也既入僧仍為設火具食會語久之曰賢宗晉陽長官與秀才遠近牛生曰是叔父也僧乃取晉陽手書令識之皆不謬僧喜曰晉陽常寄錢三千貫文在此絶不復來取某年老一朝溘至便無所付今盡以相與牛生先取將錢千貫買宅置車馬納僕妾遂為富人又以求名失路復開第二封書題云西市食店張家樓上坐牛生如言詣張氏獨止於一室下廉而坐有數人少年上樓來中有一人白衫坐定忽曰某本只有五百千令請添至七百千此外即力不及也一人又曰進士及第何惜千緡牛生知其貨及第矣及出揖之白衫少年即主司之子生曰某以千貫奉郎君別有二百千奉諸公酒食之費不煩他議也少年許之果登上第歷任臺省後為河東節度副使經一年疾困遂開第三封題云可處置家事乃沐浴修遺書才訖而遂終焉韋齊休擢進士第纍官至員外郎為王璠浙西團練副使太和八年卒于潤州之官舍三更後將小斂忽於西壁下大聲曰傳語娘子且止哭當有處分其妻大驚仆地不蘇齊休于衾下厲聲曰娘子今為鬼妻聞鬼語忽驚悸耶妻即起曰非為畏悸但不合與君遽隔幽明孤惶無所依怙不意神識有知忽通言語不覺惛絶誠俟明教豈敢有違齊休曰死生之期涉於真宰夫婦之道重在人倫某與娘子情義至深他生亦未相捨今某尸骸且在足寬襟抱家事大小且須商量不可空為兒女悲泣使某幽冥間更憂妻孥也夜來諸事並自勞心總無失脫可助僕喜妻曰何也齊休曰昨日湖州庚七寄買口錢蒼遑之際不免專心部署今則一文不缺亦足為慰良久語絶即各營喪事才曙復聞呼適到張清家近造得三間草堂前屋舍自足不煩勞他人更借下處矣其夕張清似夢中忽見齊休曰我昨日已死先令買塋三畝地可速支關布置一一分明張清悉依其命及將歸自擇發日呼喚一如常時婢僕將有私竊無不發摘隨事捶撻及至京便之塋所張清準擬皆畢十數日向三更忽呼其下曰速起報堂前蕭三郎來相看可隨事具食款待如法妨他忙也二人語歷歷可聽蕭三郎者即職方郎中蕭徹是日卒於興化里其夕遂來俄聞蕭呼嘆曰死生之理僕不敢恨但可異者僕數日前因至少陵別墅偶題一首詩今思之乃是生作鬼詩因吟曰新搆茅齊野澗東松楸交影足悲風人間歲月如流水何事頻行此路中齊休亦悲咤曰足下此詩蓋是自識僕生前忝有科名粗亦為人所知死未數日便有一無名小鬼贈一篇殊為著鈍然雖細思之已是落他蕪境乃詠曰澗水濺濺流不絶芳草綿綿野花發自去自來人不知黃昏惟有青山月蕭亦歎羡之曰韋四公死已多時猶不甘此事僕乃適來人也遽為遊岱之魂何以堪處即聞相別而去又數日亭午間呼曰裴二十一郎來慰可具食我自迎去其日裴氏昆季果來至啓夏門外瘁然神聳又素聞其事遂不敢行弔而回裴即長安縣令名觀齊休之妻兄也其部曲子弟動即罪責不堪其懼及今未已不知竟如之何
