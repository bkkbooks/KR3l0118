body:
  text: 韋陟韋陟韋斌雖生于貴門而性頗質厚然其地望素高冠冕特盛雖門風稍奢而斌立朝侃侃容止尊嚴有大臣之體每會朝未嘗與同列笑語舊制群臣立于殿庭既而遇雨雪亦不移步于廊下忽一日密雪驟降自三事以下莫不振其簪裙或更其立位獨斌意色益恭俄雪甚至膝朝既罷斌于雪中拔身而去見之者咸嘆重焉斌兄陟早以文學識度著名于時善屬文攻草隸書出入清顯踐歷崇貴自以門地才華坐取卿相而接物簡傲未嘗與人款曲衣服車馬尤尚奢侈侍兒閹豎左右常數十人或隱几搘頤度日懶為一言其于饌羞尤為精潔仍以鳥羽擇米每食畢視廚中所委棄不啻萬錢之直若宴于公卿雖水陸具陳曾不下箸每令侍婢主尺題往來復章未嘗自札受意而已詞旨重輕正合陟意而書體遒利皆有楷法陟唯署名常自謂所書陟字如五朵雲當時人多倣效謂之郇公五雲體常以五彩紙為緘題其侈縱自奉皆此類也然家法整肅其子允課習經史日加誨勵夜分猶使人視之若允習讀不輟旦夕問安顏色必悅若稍怠惰即遽使人止之令立于堂下或彌旬不與語陟雖家僮數十人應門賓客必遣允為之寒暑未嘗輟也頗為當時稱之然陟竟以簡倨特才常為持權者所忌出酉陽雜俎藝輝堂元載造藝輝堂于私第藝輝香草名也出於闐國其香潔白如玉入土不朽爛舂之為屑以塗其壁故號藝輝而更以沉香為梁棟金銀為戶牖內設懸黎屏風紫綃帳其屏風本楊國忠之寶也其上刻前代美女妓樂之形外以玳瑁水晶為押絡飾以真珠瑟瑟精巧之妙殆非人工所及紫綃帳得于南海溪洞之帥首即絞綃類也輕疏而薄如無所礙雖當時凝寒風不能入盛夏則清涼自至其色隱隱或不知其帳也謂載臥內有紫氣其餘服玩奢僭率皆擬于帝王家藝輝堂前有池以文石砌其岸中有蘋陽花亦類于白蘋其花紅而且大如有牡丹更有碧芙蓉香潔萏菡偉于常者載因暇日憑欄以觀忽聞歌聲清亮若十四五女子唱焉其曲則玉樹後庭花也載驚異莫知所在及審聽之乃芙蓉中也俯而視之聞喘息之音載大惡遂剖其花一無所見因祕不令人說及載受戮而逸奴為平廬軍卒人故得其實載龍髯拂紫色如爛椹可長三尺削水晶以為柄刻紅玉以為環鈕或風雨晦暝臨流沾濕則光彩動搖奮然如怒置之于堂中夜則蚊蚋不能近拂之為聲則雞犬牛馬無不驚逸若垂之于池潭則鱗甲之屬悉俯伏而至引水于空中即成瀑布長三五尺而未嘗輒斷燒燕肉薰之則㶿㶿焉若生雲霧厥後上知其異載不得已而進內載自云得之于洞庭道士張知和出杜陽編又載之妻王氏字韞秀縉之女也初王縉鎮北京以韞秀嫁元載歲久而見輕怠韞秀謂夫曰何不增學妾有奩幌資裝盡為紙筆之費王氏父母未知或知明鈔本知或知作或知之親屬以載夫妻皆乞兒厭薄之甚元遂游秦為詩別韞秀曰年來誰不厭龍鍾雖在侯門似不容看取海山寒翠樹苦遭霜霰到春風妻請偕行曰路掃饑寒跡天哀志氣人休淋離別淚攜手入西秦載既到京屢陳時務深符上旨肅宗擢拜中書王氏喜元郎入相寄諸姊妹詩曰相國已隨麟閣貴家風第一右丞詩笄年解笑鳴機婦恥見蘇秦富貴時載肅宗代宗兩朝宰相貴盛無比廣葺亭臺交游貴族客候其門或多間阻王氏復為一篇以喻之曰楚竹燕歌動畫梁春蘭重換舞衣裳公孫開館招嘉客知道浮榮不久長載於是稍減太原內外親屬悉來謁賀韞秀安置于閒院忽因天晴之景以青紫絲條四十條各長三十丈皆施羅紈綺繡之飾每條下排金銀爐二十枚皆焚異香香至其服乃命諸親戚西院閒步韞秀問是何物侍婢對曰今日相公與夫人曬曝夜服王氏謂諸親曰豈料乞索兒婦還有兩事蓋形粗衣也於是諸親羞赧稍稍辭去韞秀常分饋服飾于他人而不及太厚之骨肉每曰非兒不禮于姑姊其奈當時見辱何載後貪恣為心竟招罪纍上惡誅之而亡其家韞秀少有識量節概亦高載被戮上令入宮備彤管針規之任歎曰王家十二娘子二十年太原節度使女十六年宰相妻誰能書得長信昭陽之事死亦幸矣堅不從命或云上宥其罪或云京兆笞而斃之載寵姬薛瑤英能詩書善歌舞仙姿玉質肌香體輕雖旋波移光飛燕緑珠不能過也瑤英之母趙娟亦岐岐原作妓據明鈔本改王之愛妾也後出為薛氏之妻生瑤英而幼以香啖之故肌香及載納為姬處金絲之帳卻塵之褥出自勾驪國云卻塵獸毛為之其色紅殷光軟無比衣龍綃之衣一襲無二三兩搏之不盈一握載以瑤英體輕不勝重衣故于異國求之唯賈至楊炎與載友善故往往得見歌舞時至因贈詩曰舞怯銖衣重笑疑桃臉開方知漢武帝虛築避風臺炎亦作長歌褒美其略曰雪面淡娥天上女鳳簫鸞翅欲飛去玉叉翹碧步無塵纖腰如柳不勝春瑤英善為巧媚載惑之怠于相務而瑤英之父曰宗本兄曰從義與趙娟遞相出入以搆賄賂號為關節更與中書主吏卓倩等為心腹而宗本輩以事告者載未嘗不從之天下齎貨求官職者無不恃載雄勢指薛卓為梯媒及載死瑤英為里人妻論者以元載喪令德自一婦人致也出杜陽編裴冕裴冕代裴鴻漸秉政小吏以俸錢文簿白之冕顧子弟喜見于色其嗜財若此冕性本侈靡好尚車服名馬數百金鑄者明鈔本無鑄字者作常十匹每會客滋味品數多有不知名者出朝野僉載明鈔本作出盧氏雜記于頔于頔為襄州點山燈一上油二千石李昌夔為荊南打獵大修粧飾其妻獨孤氏亦出女隊二千人皆著乾紅紫繡襖子錦鞍韉此郡因而空耗出傳載王涯文宗朝宰相王涯奢豪庭穿一井金玉為欄明鈔本金玉為欄作合為玉匱嚴其鎖鑰天下寶玉真珠悉投于中汲其水供涯所飲未幾犯法為大兵梟戮赤其族涯骨肉色並如金出獨異志李德裕武宗朝宰相李德裕奢侈每食一杯羹其費約三萬為雜以珠玉寶貝雄黃朱砂煎汁為之過三煎則棄其柤出獨異志楊收咸通中崔安潛以清德峻望為鎮時風宰相楊收師重焉欲設食相召無由可入先請崔公之門人方便為言至于再三終未許楊意轉堅稍稍亦有流言或勸崔曰時相不可堅拒不得已而許之楊甚喜遽令排比然後請日祗候先是崔公親情間人亦與楊通舊欲求事請公言之終難啓口將赴楊之召謂親情曰修行今召我食明日爾但與側近祗候此際必言之倘或要見爾便須即來及崔到楊舍見廳館鋪陳華煥左右執事皆雙鬟珠翠崔公不樂飲饌及水陸之珍臺盤前置一香爐煙出成樓閣之狀崔別聞一香氣似非煙爐及珠翠所有者心異之時時四顧終不諭香氣移時楊曰相公意似別有所矚崔公曰某覺一香氣異常酷烈楊顧左右令于廳東間閣子內縷金案上取一白角楪子盛一漆毬子呈崔公曰此是罽賓國香崔大奇之宴罷返歸竟不說得親情求事據太宗實録云罽賓國進拘物頭花香聞數里疑此近是又見楊門人說相公每下朝常弄一玉婆羅門子高數寸瑩徹精巧可愛云是於闐王內庫中物出盧氏雜說同昌公主咸通九年同昌公主出降宅于廣化里錫錢五百萬貫更罄內庫珍寶以實其宅而房櫳戶牖無不以衆寶飾之更以金銀為井欄藥臼食匱水槽鐺釜盆瓮之屬縷金為笊籬箕筐製水晶火齊琉璃玳瑁等為床搘以金龜銀鹿更琢五色玉為器皿什物合百寶為圓案賜金麥銀粟共數斛此皆太宗朝條支國所獻也堂中設連珠之帳卻寒之簾犀簟牙席龍鳳繡連珠帳續真珠以成也卻寒簾類玳瑁斑有紫色云卻寒鳥骨之所為也但未知出于何國更有鷓鴣枕翡翠匣神絲繡被其枕以七寶合為鷓鴣之斑其匣飾以翠羽神絲繡被三千鴛鴦仍間以奇花異葉精巧華麗可得而知矣其上綴以靈粟之珠如粟粒五色輝煥更有蠲忿犀如意玉其犀圓如彈丸入土不朽爛帶之令人蠲忿怒如意玉類枕頭按杜陽雜編枕作桃明鈔本頭作實上有七孔云通明之象更有瑟瑟幕紋布巾火蠶綿九玉叉其幕色如瑟瑟闊三尺長一百尺輕明虛薄無以為比向空張之則疏朗之紋如碧絲之貫其珠雖大雨暴降不能沾濕云以蛟人瑞香膏所傅故也紋布中即手巾也潔白如雪光軟絶倫拭水不濡用之彌年亦未嘗垢二物稱得鬼谷國火蠶綿出火洲絮衣一襲止用一兩稍過度則熇蒸之氣不可奈九玉叉上刻九鸞皆九色其上有字曰玉兒精巧奇妙殆非人製有得于金陵者因以獻公主酬之甚厚一日晝寢夢絳衣奴傳語云南齊潘淑妃取九鸞叉及覺具以夢中之言告于左右公主薨其叉亦不知其處韋氏異其事遂以實語諸門人或曰玉兒即潘妃小字逮諸珍異不可具載自漢唐公主出降之盛未之有也公主乘七寶步輦四角綴五色錦香囊囊中貯辟邪香瑞麟香金鳳香此皆異國獻者仍雜以龍腦金屑鏤水晶瑪瑙辟塵犀為龍鳳花木狀其上悉絡真珠玳瑁更以金絲為流蘇雕輕玉為浮動每一出遊則芬香街巷晶光耀日觀者眩其目時有中貴人買酒於廣化旗亭忽相謂曰坐來香氣何太異也同席曰豈非龍腦乎曰非也豫幼給事于嬪妃宮故常聞此未知今日何由而致因顧問當壚者云公主步輦夫以錦衣質酒于此中貴人共請視之益歎異焉上日賜御饌湯藥而道路之使相屬其饌有消靈炙紅虬脯其酒則有凝露漿桂花醅其茶則有緑花紫英之號靈消炙一羊之肉取四兩雖經暑毒終不臭敗紅虬脯非虬也但貯于盤中縷健如紅絲高一尺以箸抑之無三四分撤即復故其諸品味他人莫能識而公主家人餐飫如里中糠粃一日大會韋氏之族于廣化里玉饌具陳暑氣將甚公主命取澄水帛以蘸之挂於南軒滿座皆思挾纊澄水帛長八九尺似布而細明薄可鑒云其中有龍涎故能消暑也韋氏諸宗好為葉子戲夜則公主以紅琉璃盤盛夜光珠令僧祁捧於堂中則光明如晝焉公主始有疾召術士米賓為禳法乃以香蠋燭遺之米氏之鄰人覺香氣異常或詣門詰其故賓具以事對出其燭方二寸長尺餘其上施五彩爇之竟夕不盡鬱烈之氣可聞於百步餘煙出於上即成樓閣臺殿之狀或云燭中有蜃脂也公主疾既甚醫者欲難其藥奏云得紅蜜白猿膏食之可愈上令檢內庫得紅蜜數石本兜離國所貢白猿膏數瓮本南海所獻雖日加藥餌終無其驗公主薨上哀痛遂自製挽歌詞令朝臣繼和反庭祭曰百司內官皆用金玉飾車輿服玩以焚于韋氏庭韋家爭取灰以擇金寶及葬於東郊上與淑妃御延興門出內庫金駱駝鳳凰麒麟各高數尺以為儀從其衣服玩具與人無異每一物皆至一百二十輿刻木為數殿龍鳳花木人畜之象者不可勝計以絳羅綺繡絡以金珠瑟瑟為帳幕者千隊其幢節傘蓋彌街翳日旌旗珂珮鹵簿率多加等敕紫尼及女道士為侍從引翼焚升霄百靈之香而擊歸天紫金之磬繁華輝煥殆將二十餘里上又賜酒一百斛餅啖三十駱駝各徑闊二尺飼役夫也京城士庶罷業觀者流汗相屬唯恐居後及靈輀過延興門上與淑妃慟哭中外聞者無不傷痛同日葬乳母上更作祭乳母文詞質而意切人多傳誦自後上日夕注心挂意李可及進歎百年曲聲詞哀怨聽之莫不淚下更教數十人作歎百年隊取內庫珍寶雕成首飾取絹八百匹畫作魚龍波浪文以為地衣每舞竟珠翠滿地可及官歷大將軍賞賜盈萬甚無狀左軍容使西門季玄素頗梗直乃謂可及曰爾恣巧媚以惑天子族無日矣可及恃寵無有少改可及善囀喉舌于天子前弄眼作頭腦連聲著詞唱明鈔本唱下有雜聲二字曲須臾間變態百數不休是時京城不調少年相效謂之拍彈去聲一日可及乞假為子娶婦上曰即令送酒麵及米以助汝嘉禮可及歸至舍俄一中貴人監二銀榼各高二尺餘宣賜可及始以為酒及啓皆實以金寶上賜可及銀麒麟高數尺可及取官庫車載往私第西門季玄曰今日受賜用官車他日破家亦須輦還內府不道受賞徒勞牛足後可及果流於嶺表舊賜珍玩悉皆進入君子謂季玄有先見之明出杜陽編李璋李絳子璋為宣州觀察使楊收造白檀香亭子初成會親賓觀之先是璋潛遣人度其廣袤織成地毯其日獻之及收敗璋亦從坐出杜陽編李使君乾符中有李使君出牧罷歸居在東洛深感一貴家舊恩欲召諸子從容有敬愛寺僧聖剛者常所往來李因以具宴為說僧曰某與為門徒久矣每觀其食窮極水陸滋味常饌必以炭炊往往不愜其意此乃驕逸成性使君召之可乎李曰若朱象髓白猩唇恐未能致止于精辦小筵亦未為難於是廣求珍異俾妻孥親為調鼎備陳綺席雕盤選日邀致弟兄列坐矜持儼若冰玉肴羞每至曾不入口主人揖之再三唯沾果實而已及至冰餐俱置一匙於口各相眄良久咸若囓蘗吞針李莫究其由但以失飪為謝明日復見聖剛備述諸子情貌僧曰前者所說豈謬哉既而造其門問之曰李使君特備一筵肴饌可謂豐潔何不略領其意諸子曰燔炙煎和未得法僧曰他物縱不可食炭炊之餐又嫌何事乃曰上人未知凡以炭炊饌明鈔本饌作飯先燒燒原作暖據明鈔本改令熟謂之煉炭方可入爨不然猶有煙氣李使君宅炭不經煉是以難食僧拊掌大笑曰此則非貧道所知也及巢寇陷洛財産剽掠俱盡昆仲數人乃與聖剛同竄潛伏山谷不食者至於三日賊鋒稍遠徒步將往河橋道中小店始開以脫粟為餐而賣僧囊中有錢數百買于土杯同食腹枵既甚膏梁之美不如僧笑而謂之曰此非煉炭所炊不知堪與郎君吃否皆低頭慚靦無復詞對出劇談録
