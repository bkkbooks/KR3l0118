body:
  text: 韋安道韋安道京兆韋安道起居舍人真之子舉進士久不第唐大定年中於洛陽早出至慈惠里西門晨鼓初發見中衢有兵仗如帝者之衛前有甲騎數十隊次有官者持大杖衣畫袴袽夾道前驅亦數十輩又見黃屋左纛有月旗而無日旗又有近侍才人宮監之屬亦數百人中有飛傘傘下見衣珠翠之服乘大馬如后之飾美麗光艷其容動人又有後騎皆婦人才官持鉞負弓矢乘馬從亦千餘人時天后在洛安道初謂天后之遊幸時天尚未明問同行者皆云不見又怪衢中金吾街吏不為靜路久之漸明見其後騎一宮監馳馬而至安道因留問之前所過者非人主乎宮監曰非也安道請問其事宮監但指慈惠里之西門曰公但自此去由里門循墻而南行百餘步有朱扉西向者扣之問其由當自知矣安道如其言扣之久之有朱衣官者出應門曰公非韋安道乎曰然官者曰后土夫人相候已久矣遂延入見一大門如戟門者官者入通頃之又延入有紫衣宮監與安道敘語於庭延一宮中置湯沐頃之以大箱奉美服一襲其間有青袍牙笏綬及巾靴畢備命安道服之宮監曰可去矣遂乘安道以大馬女騎道從者數人宮監與安道聯轡出慈惠之西門由正街西南自通利街東行出建春門又東北行約二十餘里漸見夾道戍守者拜於馬前而去凡數處乃至一大城甲士守衛甚嚴如王者之城凡經數重遂見飛樓連閣下有大門如天子之居而多宮監安道乘馬經翠樓朱殿而過又十餘處遂入一門內行百步許復有大殿上陳廣筵重樂羅列樽俎九奏萬舞若鈞天之樂美婦人十數如妃主之狀列於筵左右前所與同行宮監引安道自西階而上頃之見殿內宮監如贊者命安道西間東向而立頃之自殿復門見衛從者先羅立殿中乃微聞環珮之聲有美婦人備首飾褘衣如謁廟之服至殿間西向與安道對立乃是昔於慈惠西街飛傘下所見者也宮監乃贊曰后土夫人乃冥數合為匹偶命安道拜夫人受之夫人拜安道受之如人間賓主之禮遂去禮服與安道對坐於筵上前所見十數美婦人亦列坐於左右奏樂飲饌及昏而罷則以其夕偶之尚處子也如此者蓋十餘日所服御飲饌皆如帝王之家夫人因謂安道曰某為子之妻子有父母不告而娶不可謂禮願從子而歸廟見尊舅姑得成婦之禮幸也安道曰諾因下令命車駕即日告備夫人乘黃犢之車車有金翠瑤玉之飾蓋人間所謂庫車也上有飛傘覆之車徒儐從如慈惠之西街所見安道乘馬從車而行安道左右侍者十數人皆材官宦者之流行十餘里有朱幕城供帳女吏列後乃行宮供頓之所夫人遂入供帳中命安道與同處所進飲饌華美頃之又去下令命所從車騎減去十七八相次又行三數里復下令去從者乃至建春門左右才有二十騎人馬如王者之遊既入洛陽欲至其家安道先入家人怪其車服之異安道遂見其父母二親驚愕久之謂曰不見爾者蓋月餘矣爾安適耶安道拜而明言曰偶為一家迫以婚姻言新婦即至故先上告父母驚問未竟車騎已及門矣遂有侍婢及閹奴數十輩自外正門傳繡茵綺席羅列於庭及以翠屏畫帷飾於堂門左右施細繩牀一請舅姑對坐遂自門外設二錦步幛夫人衣禮服垂珮而入修婦禮畢奉翠玉金瑤羅紈蓋十數箱為人間賀遺之禮置於舅姑之前爰及叔伯諸姑家人皆蒙其禮因曰新婦請居東院遂又有侍婢閹奴持房帷供帳之飾置於東院修飾甚周遂居之父母相與憂懼莫知所來是時天后朝法令嚴峻懼禍及之乃具以事上奏請罪天后曰此必魅物也卿不足憂朕有善呪術者釋門之師九思懷素二僧可為卿去此妖也因詔九思懷素往僧曰此不過妖魅狐狸之屬以術去之易耳當先命於新婦院中設饌置坐位請期翌日而至真歸具以二僧之語命之新婦承命具饌設位輒無所懼明日二僧至既畢饌端坐請與新婦相見將施其術新婦遽至亦致禮於二僧二僧忽若物擊之俯伏稱罪目眥鼻口流血又具以事上聞天后問之二僧對曰某所以呪者不過妖魅鬼物此不知其所從來想不能制天后曰有正諫大夫明崇儼乙太一異術制錄天地諸神祗此必可使也遂召崇儼崇儼謂真曰君可以今夕於所居堂中潔誠坐以候新婦所居室上見異物至而觀其勝則已或不勝則當更以別法制之真如其言至甲夜見有物如飛雲赤光若驚電自崇儼之居飛躍而至及新婦屋上忽若為物所撲滅者因而不見使人候新婦乃平安如故乙夜又見物如赤龍之狀拿攫噴毒聲如群鼓乘黑雲有光者至新婦屋上又若為物所撲有呦然之聲而滅使人候新婦又如故又至子夜見有物朱髮鋸牙盤鐵輪乘飛雷輪鋩角呼奔而至既及其屋又如物所殺稱罪而滅既而質明真怪懼不知其所為計又具以事告崇儼曰前所為法是太乙符籙法也但可攝制狐魅耳今既無効請更賾之因致壇醮之籙使徵八紘厚地山川河瀆丘墟水木主職鬼魅之屬其數無闕崇儼異之翌日又徵人世上天界部八極之神其數無闕崇儼曰神祗所為魅者則某能制之若然則不可得而知也請試自見而頤之因命於新婦院設饌請崇儼崇儼至坐請見新婦新婦方肅答將拜崇儼崇儼又忽若為物所擊奄然斥倒稱罪請命目眥鼻口流血於地真又益驚懼不知所為其妻因謂真曰此九思懷素明正諫所不能制也為之奈何聞昔安道初與偶之時云是后土夫人此雖人間百術亦不能制之今觀其與安道夫婦之道亦甚相得試使安道致詞請去之或可也真即命安道謝之曰某寒門新婦靈貴之神今幸與小子伉儷不敢稱敵又天后法嚴懼因是禍及幸新婦且歸為舅姑之計語未終新婦泣涕而言曰某幸得配偶君子奉事舅姑夫為婦之道所宜奉舅姑之命今舅姑既有命敢不敬從因以即日命駕而去遂具禮告辭於堂下因請曰新婦女子也不敢獨歸願得與韋郎同去真悅而聽之遂與安道俱行至建春門外其前時車徒悉至其所都城僕使兵衛悉如前至城之明日夫人被法服居大殿中如天子朝見之像遂見奇容異人之來朝或有長丈餘者皆戴華冠長劍被朱紫之服云是四海之內嶽瀆河海之神次有數千百人云是諸山林樹木之神而已又乃天下諸國之王悉至時安道與夫人坐側置一小牀令觀之因最後通一人云大羅天女安道視之天后也夫人乃笑謂安道曰此是子之地主少避之令安道入殿內小室中既而天后拜於庭下禮甚謹夫人乃延天后上天后數四辭然後登殿再拜而坐夫人謂天后曰某以有冥數當與天后部內一人韋安道者為匹偶今冥數已盡自當離異然不能與之無情此人苦無壽某當在某家本願與延壽三百歲使官至三品為其尊父母厭迫不得久居人間因不果與成其事今天女幸至為與之錢五百萬與官至五品無使過此恐不勝之安道命薄耳因而命安道出使拜天后夫人謂天后曰此天女之屬部人也當受其拜天后進退色若不足而受之於是諾而去夫人謂安道曰以郎常善畫某為郎更益此藝可成千世之名耳因居安道於一小殿使垂簾設幕召自古帝王及功臣之有名者於前令安道圖寫凡經月餘悉得其狀集成二十卷於是安道請辭去夫人命車駕於所都城西設離帳祖席與安道訣別涕泣執手情若不自勝並遺以金玉珠寶盈載而去安道既至東都入建春門聞金吾傳令於洛陽城中訪韋安道已將月餘既至謁天后坐小殿見之且述前夢與安道所敘同遂以安道為魏王府長史賜錢五百萬取安道所畫帝王功臣圖視之與秘府之舊者皆驗至今行於代焉天策中安道竟卒於官
