body:
  text: 竹敘竹類竹譜竹類有三十九涕竹南方荒中有涕竹長數百丈圍三丈六尺厚八九寸可以為船其筍甚美煮食之可止瘡癘棘竹棘竹一名笆竹節皆有刺數十莖為叢南夷種以為城猝不可攻或自崩根出大如酒甕縱橫相承狀如繅車食之下人發勒竹皮薄而空多大者徑不逾二寸皮上有粗澀文可為錯子錯甲利勝于鐵若鈍以漿水澆之還復快利菡苰竹大如腳指腹中白幕攔隔狀如濕面將成而筒皮未落輒有細蟲嚙處成赤迹似繡畫可愛慈竹夏月經雨滴汁下地生蓐似鹿角色白食之已痢筋竹南方以為矛筍未成竹時堪為弩弦百葉竹一枝百葉有毒桃枝竹東官郡漢順帝時屬南海西接高涼郡又以其地為司監都尉東有蕪地西接臨大海有長洲多桃枝竹緣岸而生癭竹東洛勝境有三溪張文規有莊近溪忽有竹一竿生癭大如李羅浮竹唐貞元中有鹽戶犯禁逃于羅浮山深入第十三嶺遇巨竹萬千竿連直岩谷竹圍皆二丈余有三十九節二丈許逃者遂取竹一竿破以為蔑會赦宥遂挈以歸有人得一蔑奇之獻于太守李復乃圖而紀之豫嘗覽竹譜曰云丘帝竹一節為船又何偉哉南海以竹為甑者類見之矣皆羅浮之竹也童子寺竹唐李衛公言北都唯童子寺有竹一窠才長數尺相傳其寺綱維每日報竹平安竹花山海經曰竹生花其年便枯竹六十年易根易根必花結實而枯死實落復生六年而成町子作穗似小麥竹箹竹復死曰箹六十年一易根易根則結實枯死竹實唐天復甲子歲自隴而西逮于褒梁之境數千里內亢陽民多流散自冬經春飢民啖食草木至有骨肉相食者甚多是年忽山中竹無巨細皆放花結子飢民采之舂米而食珍于粳糯其子粗顏色紅纖與今紅粳不殊其味尤更馨香數州之民皆挈纍入山就食之至于溪山之內居人如市人力及者競置囤廩而貯之家有羡糧者不少者又取與葷茹血肉而同食者嘔噦如其中毒十死其九其竹自此千蹊萬谷并皆立枯十年之后復産此君可謂百萬圓顱活之于貞筠之下雨稻夏禹時天雨稻古詩云安得天雨稻飼我天下民雨粟呂后三年秦中天雨粟雨麥漢武帝時廣陽縣雨麥雕葫太液池邊皆是雕葫紫蘀緑節蒲叢之類菰之有米者長安人謂為雕葫葭蘆之未解葉者謂為紫蘀菰之有首者謂為緑節其間鳧雛子布滿充積又多紫龜緑鱉池邊多平沙沙上鵜鶘珕鸆𧉈䃁鴻鶂動輒成群雨谷漢宣帝時江淮飢饉人相食天雨谷三日尋魏地奏亡谷二千頃搖枝粟宣帝地節元年樂浪之東有背明之國人至貢方物言其鄉土在扶桑之東見日出于西方其國昏昏恆開宜五谷名日融澤方三千里五谷皆良食者延年清腹一粒歷年不飢有搖枝粟言其枝長而弱無風常搖食之益髓鳳冠粟似鳳鳥之冠食者多力有遊龍粟枝葉屈曲如遊龍有瓊膏色白如銀食此二粟令人骨輕繞明豆言其莖弱自相縈纏有挾劍豆言莢形似人挾劍而橫斜生有傾籬豆言見日則葉垂覆地食者不老不疾延精麥言延壽益氣有昆和麥調暢六腑有輕心麥食者體輕有淳和麥面以釀酒一醉纍月食之凌冬不寒有含露麥糲中有露甘如飴紫沉麻其實不浮有云水麻實冷而光宜為油澤有光通麻食者行不待燭則巨勝也食之延壽后天而死雨五谷吳桓王時金陵雨五谷于貧民家富民家則不雨野粟石殼宋高祖之初當晉末飢饉之后既即位而江表二千余里野粟生焉又淮南諸山石殼生石上生殼也袁安云石殼藥名穗之尤小者是也芋天芋生終南山中葉如荷而厚雀芋狀如雀頭置干地反濕置濕處反干飛鳥觸之墮走獸遇之僵甘蔗南方山有柑柘之林其高百丈圍三尺八寸促節多汁甜如蜜作嚙其汁令人涌澤可以節蛔蟲人腹中蛔蟲其狀如蚓此消谷蟲也多則傷人少則谷不消是甘蔗能滅多益少凡蔗亦然敘茶茶之名器益衆劍南有蒙頂石花或小方或散芽號為第一湖州有顧渚之紫筍東川神泉昌明硤州有碧澗明月芳蕊茱萸簝福州有方山之生芽夔州有香山江陵有楠木湖南有衡山嶽州有浥湖之含膏常州有義興紫筍婺州有來白睦州有鳩坑洪州有西山白露壽州有霍山黃芽蘄州有蘄門團黃浮梁商賈不在焉獲神茗神異記曰余姚人虞茫入山采茗遇一道士牽三百青羊飲瀑布水曰吾丹丘子也聞子善茗飲常思惠山中有大茗可以相給祈子他日有甌檥之余必相遺也因立茶祠后常與人往山獲大茗焉饗茗獲報劉敬叔異苑曰剡縣陳婺妻少與二子寡居好飲茶茗以宅中有古冢每飲先輒祀之二子恚之曰冢何知徒以勞祀欲掘去之母苦禁而止及夜母夢一人曰吾止此冢三百餘年母二子恆欲見毀賴相保護又饗吾嘉茗雖泉壤朽骨豈忘翳桑之報及曉于庭內獲錢十萬似久埋者唯貫新母告二子二子慚之從是禱酹愈至消食茶唐有人授舒州牧李德裕謂之曰到彼郡日天柱峰茶可惠三數角其人獻之數十斤李不受退還明年罷郡用意精求獲數角投之德裕悅之而受曰此茶可以消酒食毒乃命烹一甌沃于肉食內以銀合閉之詰旦開視其肉已化為水矣衆伏其廣識也
