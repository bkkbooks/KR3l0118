body:
  text: 王次仲王次仲王次仲者古之神仙也當周末戰國之時合縱連衡之際居大夏小夏山以為世之篆文功多而用寡難以速就四海多事筆扎所先乃變篆籀之體為隸書始皇既定天下以其功利於人徵之入秦不至復命使召之勑使者曰吾削平六合一統天下孰敢不賓者次仲一書生而逆天子之命若不起當殺之持其首來以正風俗無肆其悍慢也詔使至山致命次仲化為大鳥振翼而飛使者驚拜曰無以復命亦恐見殺惟神人憫之鳥徘徊空中故墮三翮使者得之以進始皇素好神仙之道聞其變化頗有悔恨今謂之落翮山在幽州界鄉里祠之不絶出仙傳拾遺墨子墨子者名翟宋人也仕宋為大夫外治經典內修道術著書十篇號為墨子世多學者與儒家分途務尚儉約頗毀孔子有公輸般者為楚造雲梯之械以攻宋墨子聞之往詣楚腳壞裂裳裹足七日七夜到見公輸般而説之曰子為雲梯以攻宋宋何罪之有餘於地而不足於民殺所不足而爭所有餘不可謂智宋無罪而攻之不可謂仁知而不爭不可謂忠爭而不得不可謂強公輸般曰吾不可以已言於王矣墨子見王曰於今有人舍其文軒鄰有一弊輿而欲竊之舍其錦繡鄰有短褐而欲竊之舍其梁肉鄰有糟粳而欲竊之此為何若人也王曰若然也必有狂疾翟曰楚有雲夢之麋鹿江漢之魚龜為天下富宋無雉兔鮒魚猶梁肉與糟粳也楚有𣏌梓豫章宋無數丈之木此猶錦繡之與短褐也臣聞大王更議攻宋有與此同王曰善哉然公輸盤已為雲梯謂必取宋於是見公輸般墨子解帶為城以幞為械公輸般乃設攻城之機九變而墨子九拒之公輸之攻城械盡而墨子之守有餘也公輸般曰吾知所以攻子矣吾不言墨子曰吾知子所以攻我我亦不言王問其故墨子曰公輸之意不過殺臣謂宋莫能守耳然臣之弟子禽滑釐等三百人早已操臣守禦之器在宋城上而待楚寇矣雖殺臣不能絶也楚乃止不復攻宋墨子年八十有二乃歎曰世事已可知榮位非常保將委流俗以從赤松子遊耳乃入周狄山精思道法想像神仙於是數聞左右山間有誦書聲者墨子臥後又有人來以衣覆足墨子乃伺之忽見一人乃起問之曰君豈非山嶽之靈氣乎將度世之神仙乎願且少留誨以道要神人曰知子有志好道故來相候子欲何求墨子曰願得長生與天地相畢耳於是神人授以素書朱英丸方道靈教戒五行變化凡二十五篇告墨子曰子有仙骨又聰明得此便成不復須師墨子拜受合作遂得其驗乃撰集其要以為五行記乃得地仙隱居以避戰國至漢武帝時遣使者楊違束帛加璧以聘墨子墨子不出視其顏色常如五十許人周遊五嶽不止一處出神仙傳劉政劉政者沛人也高才博物學無不覽以為世之榮貴乃須臾耳不如學道可得長生乃絶進趨之路求養生之術勤尋異聞不遠千里苟有勝己雖奴客必師事之復治墨子五行記兼服朱英丸年百八十餘歲色如童子能變化隱形以一人分作百人百人作千人千人作萬人又能隱三軍之衆使成一叢林木亦能使成鳥獸試取他人器物易置其處人不知覺又能種五果立使華實可食坐致行廚飯膳俱數百人又能吹氣為風飛砂揚石以手指屋宇山陵壺器便欲頽壞復指之即還如故又能化生美女之形及作水火又能一日之中行數千里能噓水興雲奮手起霧聚土成山刺地成淵能忽老忽少乍大乍小入水不沾步行水上召江海中魚鱉蛟龍黿鼉即皆登岸又口吐五色之氣方廣十里直上連天又能躍上下去地數百丈後去不知所在出神仙傳孫博孫博者河東人也有清才能屬文著書百餘篇誦經數十萬言晚乃好道治墨子之術能令草木金石皆為火光照數里亦能使身成火口中吐火指大樹生草則焦枯更指還如故又有人亡奴藏匿軍中者捕之不得博語奴主曰吾為卿燒其營舍奴必走出卿但諦伺捉之於是博以一赤丸子擲軍門須臾火起燭天奴果走出乃得之博乃復以一青丸子擲之火即滅屋舍百物如故不損博每作火有所燒他人以水灌之終不可滅須臾自止之方止行水火中不沾灼亦能使千百人從己蹈之俱不沾灼又與人往水上布席而坐飲食作樂使衆人舞於水上又山間石壁地上盤石博入其中漸見背及兩耳良久都沒又能吞刀劍數千枚及壁中出入如孔穴也能引鏡為刀屈刀為鏡可積時不改須博指之乃復如故後入林慮山服神丹而仙去出神仙傳天門子天門子者姓王名綱尤明補養之要故其經曰陽生立於寅純木之精陰生立於申純金之精天以木投金無往不傷故陰能疲陽也陰人所以著脂粉者法金之白也是以真人道士莫不留心注意精其微妙審其盛衰我行青龍彼行白虎取彼朱雀煎我玄武不死之道也又陰人之情也每急於求陽然而外自收收原作戕據明鈔本改抑不肯請陽者明金不為木屈也陽性氣剛躁志節踈略至於遊宴言和氣柔辭語卑下明木之畏於金也天門子既行此道年二百八十歲猶有童子之色乃服珠醴得仙入玄洲山去也出神仙傳玉子玉子者姓韋明鈔本韋作章名震南郡人也少好學衆經周幽王徵之不出乃歎曰人生世間日失一日去生轉遠去死轉近而但貪富貴不知養性命命盡氣絶則死位為王侯金玉如山何益於灰土乎獨有神仙度世可以無窮耳乃師長桑子具受衆術乃別造一家之法著道書百餘篇其術以務魁為主而精於五行之意演其微妙以養性治病消災散禍能起飄風發屋折木作雷雨雲霧能以木瓦石為六畜龍虎立成能分形為百千人能涉江海含水噴之皆成珠玉亦不變或時閉氣不息舉之不起推之不動屈之不曲伸之不直或百日數十日乃起每與子弟行各丸泥為馬與之皆令閉目須臾成大馬乘之日行千里又能吐氣五色起數丈見飛鳥過指之即墮臨淵投符召魚鱉之屬悉來上岸能令弟子舉眼見千里外物亦不能久也其務魁時以器盛水著兩肘之間噓之水上立有赤光輝輝起一丈以此水治病病在內飲之在外者洗之皆立愈後入崆洞山合丹白日升天而去出神仙傳茅濛字初成咸陽南關人也即東卿司命君盈之高祖也濛性慈憫好行陰德廉靜博學逆覩周室將衰不求進於諸侯常歎人生若電流出處宜及其時於是師北郭鬼谷先生受長生之術神丹之方後入華山靜齋絶塵修道合藥乘龍駕雲白日升天先是其邑歌謠曰神仙得者茅初成駕龍上升入太清時下玄洲戲赤城繼世而往在我盈帝若學之臘嘉平秦始皇聞之因改臘為嘉平出洞仙傳沈羲沈羲者吳郡人學道於蜀中但能消災治病救濟百姓不知服食藥物功德感天天神識之羲與妻賈共載詣子婦卓孔寧家還逢白鹿車一乘青龍車一乘白虎車一乘從者皆數十騎皆朱衣仗矛帶劍輝赫滿道問羲曰君是沈羲否羲愕然不知何等答曰是也何為問之騎人曰羲有功於民心不忘道自少小以來履行無過壽命不長年壽將盡黃老今遣仙官來下迎之侍郎薄延之乘白鹿車是也度世君司馬生青龍車是也迎使者徐福白虎車是也須臾有三仙人羽衣持節以白玉簡青玉介丹玉字授羲羲不能識遂載羲升天升天之時道間鉏耘人皆共見不知何等斯須大霧霧解失其所在但見羲所乘車牛在田食苗或有識是羲車牛以語羲家弟子恐是邪鬼將羲藏山谷間乃分布於百里之內求之不得四百餘年忽還鄉里推求得數世孫名懷喜懷喜告曰聞先人説家有先人仙去久不歸也留數十日説初上天時云不得見帝但見老君東向而坐左右勑羲不得謝但默坐而已宮殿鬱鬱如雲氣五色玄黃不可名狀侍者數百人多女少男庭中有珠玉之樹衆芝叢生龍虎成群遊戲其間聞琅琅如銅鐵之聲不知何等四壁熠熠有符書著之老君身形略長一丈披髮文衣身體有光耀須臾數玉女持金按玉杯來賜羲曰此是神丹飲者不死夫妻各一杯壽萬歲乃告言飲服畢拜而勿謝服藥後賜棗二枚大如雞子脯五寸遺羲曰暫還人間治百姓疾病如欲上來書此符懸之竿杪吾當迎汝乃以一符及仙方一首賜羲羲奄忽如寐已在地上多得其符驗也出神仙傳陳安世京兆人也為權叔本家傭賃稟性慈仁行見禽獸常下道避之不欲驚之不踐生蟲未嘗殺物年十三四叔本好道思神有二仙人託為書生從叔本遊以觀試之而叔本不覺其仙人也久而意轉怠叔本在內方作美食而二仙復來詣門問安世曰叔本在否答曰在耳入白叔本叔本即欲出其婦引還而止曰餓書生輩復欲來飽腹耳於是叔本使安世出答言不在二人曰前者云在旋言不在何也答曰大家君教我云耳二人善其誠實乃謂叔本勤苦有年今適值我二人而乃懈怠是其不遇幾成而敗乃問安世曰汝好遊戲耶答曰不好也又曰汝好道乎答曰好而無由知之二人曰汝審好道明日早會道北大樹下安世承言早往期處到日西不見一人乃起欲去曰書生定欺我耳二人已在其側呼曰安世汝來何晚也答曰早來但不見君耳二人曰吾端坐在汝邊耳頻三期之而安世輒早至知可教乃以藥二丸與安世誡之曰汝歸勿復飲食別止於一處安世承誡二人常來往其處叔本怪之曰安世處空室何得有人語往輒不見叔本曰向聞多人語聲今不見一人何也答曰我獨語耳叔本見安世不復食但飲水止息別位疑非常人自知失賢乃歎曰夫道尊德貴不在年齒父母生我然非師則莫能使我長生先聞道者即為師矣乃執弟子之禮朝夕拜事之為之灑掃安世道成白日升天臨去遂以要道術授叔本叔本後亦仙去矣出神仙傳
