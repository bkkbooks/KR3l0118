body:
  text: 支法衡支法衡晉沙門支法衡得病旬日亡經三日而蘇說死時有人將去見如官曹舍者數處不肯受之俄見有鐵輪輪上有爪從西轉來無持引者而轉駛如風有一吏呼罪人當輪立輪轉來轢之翻還如此數人碎爛吏呼衡道人來當輪立衡恐怖自責悔不精進今當此輪乎語畢吏謂衡曰道人可去于是仰首見天有孔不覺倏爾上升以頭穿中兩手搏兩邊四向顧視見七寶官船及諸天人衡甚踊躍不能得上疲而复下所將衡去人笑曰見何物不能上乎乃以衡付船官船官行船使為舵工衡曰我不能持舵強之有船數百皆隨衡后衡不曉捉舵蹌沙洲上吏司推衡以法應斬引衡上岸雷鼓將斬忽有五色二龍推船還浮吏乃原之衡大恐懼望見西北有講堂上有沙門甚眾聞經唄之聲衡遽走趣之堂有十二階始躡一階見亡師法柱踞胡床坐見衡曰我弟子也何以而來因起臨階以手巾打衡面曰莫來衡甚欲上复舉步登階柱复推令下至三乃上見平地有一井深三四丈磚無隙際衡心念言此井自然井邊有人謂曰不自然者何得成井雖見法柱故倚望之謂衡可复道還去狗不嚙汝衡還水邊亦不見向來船也衡渴欲飲水乃墮水中因便得蘇于是出家持戒菜食盡夜精思為至行沙門比丘法橋衡弟子也程道惠字文和武昌人也世奉五斗米道不信有佛常云古來正道莫逾李老何乃信惑胡言以為胜教太元十五年病死心下尚暖家不殯殮數日得蘇說初死時見十許人縛錄將去逢一比丘云此人宿福未可縛也乃解其縛散驅而去道路修平而兩邊棘刺森然略不容足驅諸罪人馳走其中身隨著刺號呻聒耳見道惠行在平路皆歎羡曰佛弟子行路复胜人也道惠曰我不奉法其人笑曰君忘之耳道惠因自憶先身奉佛已經五生五死忘失本志今生在世幼遇惡人未達邪正乃惑邪道既至大城徑進廳事見一人年可四五十南面而坐見道惠惊曰君不應來有一人著單衣幘持簿書對曰此人伐社殺人罪應來此向逢比丘亦隨道惠入申理甚至云伐社非罪也此人宿福甚多殺人雖重報未至也南面坐者曰可罰所錄人命道惠就坐謝曰小鬼謬濫枉相錄來亦由君忘失宿命不知奉正法故也將遣道惠還乃使暫兼覆校將軍歷觀地獄道惠欣然辭出導從而行行至諸城皆是地獄人眾巨億悉受罪報見有猘狗嚙人百節肌肉散落流血蔽地又有群鳥其嘴如鋒飛來甚速入人口中表里貫洞其人宛轉呼叫筋骨碎落觀歷既遍乃遣道惠還复見向所逢比丘與道惠一銅物形如小鈴曰君還至家可棄此門外勿以入室某年月日君當有厄誡慎過此壽延九十時道惠家于京師大桁南自還達皂莢橋見親表三人駐車共語悼道惠之亡至門見婢行哭而市彼人及婢咸弗見也道惠將入門置向銅物門外樹上光明舒散流飛屬天良久還小奄爾而滅至戶聞尸臭惆悵惡之時賓親奔吊哭道惠者多不得徘徊因進入尸忽然而蘇說所逢車人及市婢咸皆符同道惠后為廷尉預西堂聽誦未及就列欻然頓悶不識人半日乃愈計其時日即道人所戒之期頃之遷為廣州刺史元嘉六年卒八十九矣僧善道僧善道者在新野時見有一人來寺中會叉手恭敬精進過常善道問賢者何乃用心如此其人曰我曾死三日見有十余間瓦屋下有數吏有一輪如作瓮均徑廣二丈余有鐵叉又著均上均轉如風求死不得一宿二日眼眩心悶有赤幘吏來捉數枚簡及一筆問此是何人均邊人曰佛弟子時不精進但持生禮行就人無有慈心吏問曰此人罪略當畢遣歸于是得去乃活弟子未更此一死實喜以生禮行就人嫁女取婦家恒五升面二雙雞禮士大夫今日叉手呼佛手適相離已后恐墮均上李旦宋李旦字世則廣陵人也以孝謹質素著稱鄉里元嘉三年正月十四日暴病心不冷七日而蘇唅以飲粥宿昔复常云有一人將信幡來至床頭稱府君教喚旦便隨去直向北行道甚平淨既至城闕高麗似今宮闕遣傳教慰勞呼旦可前至大廳上見有三十人單衣青幘列坐森然一人東坐被袍隱幾左右侍衛可有百餘視旦而語坐人云當示以諸獄令世知也旦聞言已舉頭四視都失向處乃是地獄中見群罪人受諸苦報呻吟號呼不可忍視尋有傳教稱府君放君還去當更相迎因此而還至六年正月复死七日又活述所見事較略如先或有罪人寄語報家道生時犯罪使為作福稍說姓字親識鄉伍旦依言尋求皆得之又云甲申年當行疾癘殺諸惡人佛家弟子作八關齋修心善行可得免也旦本作道家祭洒即欲棄錄本法道民諫制故遂兩事而常勸化作八關齋梁甲北齊時有仕人姓梁甚豪富將死謂其妻子曰吾平生所愛奴馬使用日久稱人意吾死可以為殉不然吾所棄也及死家人囊盛土壓奴殺之馬猶未殺奴死四日而蘇說云初不覺去忽至官府留止在門經宿見亡主被鎖兵衛引入見奴謂曰我謂死人得使奴婢故遺言喚汝今各自受其苦全不相關今當白官放汝言畢而入奴從屏外窺之見官問守衛人曰昨日壓脂多少乎對曰得八斗官曰更將去壓取一斛六斗主則被牽出竟不得言明旦又來有喜色謂奴曰今當為汝白也又入官問得脂乎對曰不得官問何以吏曰此人死三日家人為請僧設會每聞經唄聲鐵梁輒折故不得也官曰且將去吏白官請放奴官即令放與主俱出門主遣傳語妻子曰賴汝追福獲免大苦然猶未脫更能造經像以相救冀因得免自今無設祭既不得食而益無罪言畢而別奴遂重生而具言之家中果以其日設會于是傾家追福合門練行任義方唐括州刺史樂安任義方武德年中死經數日而蘇自云被引見閻羅王王令人引示地獄之處所說與佛經不殊又云地下晝日昏暗如霧中行時其家以義方心上少有溫氣遂即請僧行道義方乃于地下聞其贊唄之聲王檢其案謂吏曰未合即死何因錯追遂放令歸義方出度三關關吏皆睡送人云但尋唄聲當即到舍見一坑當道意欲跳過遂落坑中應時即起論說地獄畫地成圖其說得奉祿皆造經像曾寫金剛般若千余部義方自說齊士望魏州武強人齊士望貞觀二十一年死經七日而蘇自云初死之后被引見王即付曹司別遣勘當經四五日勘簿云與合死者同姓字然未合即死判官語士望曰汝生平好燒雞子宜受罪而歸即命人送其出門去曹司一二里即見一城門城中有鼓吹之聲士望忻然趨走而入之入后城門已閉其中更無屋宇遍地皆是熱灰士望周章不知所計燒灼其足殊常痛苦士望四顧城門并開及走向門其扉即掩凡經一日有人命門者曰開門放昨日罪人出即命人送歸使者辭以路遙遷延不送之始求以錢絹士望許諾遂經歷川涂踐履荊棘行至一處有如環堵其中有坑深黑士望懼之使者推之遂入坑內不覺漸蘇尋乃造紙錢等待焉使者依期還到士望妻亦同見之楊師操雍州醴泉縣人楊師操貞觀中任藍田縣尉尉后以身老還家躬耕為業然立性毒惡喜見人過每鄉人有事無問大小即錄告官縣令裝瞿曇用為煩碎初不與理師操或上表聞天人皆不喜每謂人曰吾性雖急暴從武德已來四度受戒日誦經論然有人侵己則不能忍到永徽元年四月七日夜見著青衣人騎白馬從東來云東陽大監追汝須臾不見師操身忽倒已到東陽都錄處于時府君大衙未散師操遂私行曹司皆有幾案床席見囚人或著枷鎖露頭散腰或坐立行住如是不可算數師操向東行到一處有孔极小唯見小星流出臭煙蓬勃有兩人手把鐵棒修理門首師操問此是何曹司答云是猛火地獄擬著持戒不全人聞有楊師操一生喜論人過逢人詐言慚愧有片言侵凌實不能忍欲遣入此故修理之今日是四月八日其家為師操身死布施齋供曹司平章欲放歸未得進止我在此待師操便叩頭禮謝云楊師操者弟子身是愿作方便答云爾但志禮十萬佛勤心忏悔改卻毒心即往生樂處師操依語聲發愿遂蒙放還經三日卻活操具述于慧靖禪師改過忏悔今見年七十五每一食長齋六時禮念后夢前追使者云爾既止惡更不來追但勤誠修善而已裴則子唐曹州離狐人裴則男貞觀末年二十死經三日而蘇自云初死被一人將至王所王遣將牛耕地訴云兄弟幼小無人扶侍二親王即愍之乃遣使將向南至第三重門入見鑊湯及刀山劍樹數千人頭皆被斬布列地上此頭并口云大饑當村有一老母年向七十時有未死見在鑊湯前燃火觀望訖還至王前見同村人張成亦未死有一人訴成云毀破某屋王遣使檢之報云是實成曰犁地不覺犁破其冢非故然也王曰汝雖非故心終為不謹且遂令人杖其腰七下有頃王曰汝更無事放汝早還乃使人送去遣北出逾牆及登牆望見己舍遂聞哭聲乃跳下牆忽覺起坐既蘇之后具為鄉曲言之邑人視張成腰上有杖跡跡极青黑問其毀墓答云不虛老母尋病未幾而死河南府史洛陽郭大娘者居毓財里以當壚為業天寶初物故其夫姓王作河南府史經一年暴卒數日复活自說初被追見王王云此人雖好酒且無狂亂亦不孤負他人算又未盡宜放之去處分訖令所追人引入地獄示以罪報初至糞池獄從廣數頃悉是人糞見其妻糞池中受穢惡出沒數四某悲涕良久忽見一人頭從空中落墮池側流血滂沱某問此是何人頭也使者云是秦將白起頭某曰白起死來已千余載那得复新遇害答曰白起以詐坑長平卒四十萬眾天帝罰之每三十年一斬其頭迨一劫方已又去一城中悉是煻煨火有數千人奔走其間遙望城間馳欲出至輒已閉盤回其間苦痛備急事了別王王言汝好飲酒亦是罪終須與一疾不然無誡將來令左右以竹杖染水點其足上因推坑中遂活腳上點處成一釘瘡痛不可忍卻后七年方死周頌周頌者天寶中進士登科永泰中授慈溪令在官夜暴卒為地下有司所追至一城其人將頌見王門外忽逢吉州刺史梁乘問頌何以至此地獄耶初頌雖死意猶未悟聞道地獄心甚凄然因哽咽悲涕向乘云母老子幼漂寄異城奈何而死求見修理乘言當相為白君第留此入門聞呵叱云判官見王久之乃出謂頌曰已論遣君宜暫見王無苦也有頃使者引頌入見王王形貌甚偉頭有兩角問頌曰公作官不橫取人財否頌云身是平時進士出身官至慈溪縣令皆是累歷未常非理受財王令檢簿檢訖云甚善甚善既無勾當即宜還家衣裳得無隳坏耶頌意謂衣裳是形骸便答云適爾辭家衣裳故當未損再拜辭出乘甚喜云王已相釋理可早去頌云道路茫昧何爾歸去乘令追人送頌行數里其人大罵云何物等流使我來去迎送如是獨不解一言相識孤恩若是如得五千貫當送汝還頌云紙錢五千貫理易辦因便許之使者乃行十余里至一石井坐其側复求去人言入井即活更何所之遂推頌落井而活盧弁盧弁者其伯任湖城令弁自東都就省夜宿第二谷夢中見二黃衣吏來追行至一所有城壁入城之后欲過判官屬有使至判官出迎吏領住一舍下其屋上有蓋下無梁柱下有大磨十枚磨邊有婦女數百磨恒自轉牛頭卒十余以大箕抄婦人置磨孔中隨磨而出骨肉粉碎痛苦之聲所不忍聞弁于眾中見其伯母即湖城之妻也相見悲喜各問其來由弁曰此等受罪云何曰坐妒忌以至于此弁曰為之奈何伯母曰汝素持金剛經試為我誦或當減罪弁因持經磨遂不轉受罪者小息牛頭卒持叉來弁所怒曰何物郎君來此誦經度人作事弁對曰伯母在此卒云若惜伯母可與俱去弁遂將伯母奔走出城各歸就活初弁唯一小奴同行死已半日其奴方欲還報會弁已蘇后數日至湖城入門遇伯設齋家人見弁惊喜還報伯母迎執其手曰不遇汝當入磨中今得重生汝之力也
