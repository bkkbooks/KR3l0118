body:
  text: 龜陶唐氏陶唐之世趙裳國獻千歲神龜方三尺余背上有文皆科斗書記開辟以來帝命錄之龜歷伏滔述帝功德銘曰朱書龜歷之文禹禹盡力渠溝導川夷岳黃龍曳尾于前玄龜負青泥于后玄龜河精之使者也龜頷下有印文皆古言作九州山水之字禹所穿鑿之處皆以青泥封記其所使玄龜印其上今人聚土為界此之遺像也葛洪葛洪云千歲靈龜五色具焉其雄額上兩骨起似角以未朱浴之乃剔取其甲火炙搗服方寸七日三盡一具壽千歲張廣定陳仲弓異聞記曰張廣定遭亂避地有一女四歲不能步又不忍棄之乃縣籠于古冢中冀他日得收其骨及三年歸取之見其尚活問之女答曰食盡即餒見其傍有一物引頸呼吸效之故能活廣定入冢視之乃一龜也陳實之言固不妄矣贛縣吏晉義熙中范寅為南康郡時贛縣吏說先入山采薪得二龜皆如二尺盤大薪未足遇有兩樹駢生吏以龜側置樹間复行采伐去龜處稍遠天雨懶复取后經十二年复入山見先龜一者甲已枯一者尚生极長樹木夾處可厚四寸許兩頭厚尺余如馬鞍狀郗世了郗世了在會稽造墓其地多石后破大石得一龜長尺二寸許在石中石了無孔也得非龜石俱生乎既破出之龜行動如常龜無異石受龜如人刻安之孟彥暉武成三年庚午六月五日癸亥廣漢太守孟彥暉奏西湖有金龜徑寸游于荷葉之上畫圖以上聞營陵道州營陵中鼉甲長八尺下自然有文字前后四足各踏一龜踏龜有時行或逾山越水俗莫敢犯興業寺九曲靈龜池在襄陽縣東北三里遍學寺東古城舊有興業寺今并入遍學寺唐景龍元年有陳留阮氏寓居襄陽舍財于此寺東院創造堂宇時歲旱池涸即掘廣深之急暴雨池溢乃是一大龜高數尺如半張床大岸側而行眾即惊呼龜遂躍入池中寺僧靈岫云院有折碑云興業寺碑碑文梁散騎常侍庾元威撰其文可傳者云此寺有靈龜一頭長三尺五寸冬潛春現多歷年所隨眾上堂應時而食刺史安陸王照頻遇此龜其坏碑因即扶豎今在遍學寺東院阮氏所修寺堂庭中浮屠前池見在深五尺方二十步唐太宗唐武德末太宗欲平內難苑池內有白龜游于荷葉之上太宗取之化為白石瑩洁如玉登极之后降制曰皇天眷祐錫以寶龜劉彥回唐劉彥回父為湖州刺史有下寮于銀坑得一龜長一尺持獻刺史群官畢賀云得此龜食壽一千歲使君謝己非其人故自騎馬送龜即至坑所其后十余年刺史亡彥回為房州司士將家屬之官屬山水泛溢平地盡沒一家惶懼不知所適俄有大龜來引其路彥回與家人謀曰龜乃靈物今來相導狀若神三十余口隨龜而行悉是淺處歷十余里乃至平地得免水難舉家惊喜亦不知其由至此夕彥回夢龜云己昔在銀坑蒙先使君之惠故此報恩吳興漁者唐開元中吳興漁者于苕溪上每見大龜四足各踏一龜而行漁者知是靈龜持石投之中而獲焉久之以獻州從事裴裴召龜人龜人云此王者龜不可以卜小事所卜之物必死裴素狂妄時庭中有鵲其雛尚珗乃驗志之令卜者鑽龜焉數日大風損鵲巢鵲雛皆死尋又命卜其婢所懷娠是兒女兆云當生兒兒生尋亦死裴后竟進此龜也唐明皇帝唐明皇帝嘗有方士獻一小龜徑寸而金色可愛云此龜神明而不食可置之枕笥之中辟巨蛇之毒上常貯巾箱中有小黃門恩渥方深而坐親累將竄南徼不欲屈法免之密授此龜曰南荒多巨蟒常以龜置于側可以無苦閹者拜受之及象郡之屬邑里市館舍悄然無一人投宿于旅館是夜月明如晝而有風雨之聲其勢漸近因出此龜置于階上良久神龜伸頸吐氣其火如綖直上高三四尺徐徐散去已而龜游息如常向之風雨聲亦已絕矣及明驛吏稍稍而至羅拜庭下曰昨知天使將至合備迎奉適緣行旅誤殺一蛇眾知報冤蛇必此夕為害側近居人皆出三五十里外避其毒氣某等不敢遠出止在近山岩穴之中伏而待旦今則天使無恙乃神明所祐非人力也久之行人漸至云當道有巨蛇十數皆已糜爛自此無复報冤之物人莫測其由逾年黃門召歸長安复以金龜進上泣而謝曰不獨臣之性命賴此生全南方之人永祛毒類所全人命不知紀极實聖德所及神龜之力也寧晉民唐建中四年趙州寧晉縣沙河北有大棠梨百姓常祈禱忽有群蛇數千自東南來渡北岸集棠梨樹下為二積留南岸者為一積俄見三龜徑寸才繞行積蛇盡死乃各登積視蛇腹悉有瘡若矢所中刺史康日知圖甘棠梨三龜來獻史論唐史論作將軍時忽覺妻所居房中有光異之因與妻索房中且無所見一日妻早妝開奩奩中忽有金色龜如錢吐五色氣彌滿一室后常養之徐仲福州唐貞元末有村人賣一籠龜其數十三販藥人徐仲以五鍰獲之村人云此聖龜不可殺徐置庭中一龜藉龜而行八龜為導悉大六寸徐遂放于乾元寺后林中一夕而失高崇文唐贊皇公李德裕曰蜀傳張儀筑成都城屢有頹坏時有龜周行旋走至是一龜行路筑之既而城果就予未至郡日嘗聞龜殼猶在城內昨詢訪意舊有軍資庫官宇文遇者言比常在庫中元和初節度使高崇文知之命工人截為腰帶胯具自張儀至崇文千余載龜殼尚在而武臣毀之深可惜也汴河賈客唐有賈客維舟汴河上獲了一巨龜于灶火中煨之是夕忘出之明日取視殼已焦矣拂拭去灰置于食床上欲食良久伸頸足動徐行床上其生如常眾共異之投于水中游泳而去南人南人采龜溺以其性妒而與蛇交或雌蛇至有相趁斗噬力小致斃者采時取雄龜置瓷碗及小盤中于龜后以鏡照之既見鏡中龜即淫發而失溺又以紙炷火上焰熱點其尻亦致失溺然不及鏡照也得于道士陳釗又海上人云龍生三卵一為吉吊也其吉吊上岸與鹿交或于水邊遺精流槎遇之粘裹木枝如蒲桃焉色微青黃复似灰色號紫稍花益陽道別有方說閻居敬新安人閻居敬所居為山水所浸恐屋坏移榻于戶外而寢夢一烏人曰君避水在此我亦避水至此于君何害而迫迮我如是不快甚矣居敬寤不測其故爾夕三夢居敬曰豈吾不當止此耶因命移床乃床腳斜壓一龜于戶限外放之乃去池州民池州民楊氏以賣鮓為業嘗烹鯉魚十頭令兒守之將熟忽聞釜中乞命者數四兒惊懼走告其親共往視之釜中無复一魚求之不得期年所畜犬恒窺戶限下而吠數日其家人曰去年鯉魚得非在此耶即撒戶視之得龜十頭送之水中家亦無恙李宗李宗為楚州刺史郡中有尼方行于市忽据地而坐不可推挽不食不語者累日所由司以告宗命武士扶起掘其地得大龜長數尺送之水中其尼乃愈
