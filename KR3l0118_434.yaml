body:
  text: 太平廣記卷四百三十四畜獸一牛大月支及西胡有牛名曰白及今日割取其肉明日其瘡即愈故漢人有至其國者西胡以此牛示之漢人對曰吾國蟲名為蠶為人衣食樹葉而吐絲外國人復不信有蠶新昌穴出山犢似秦牛常與蛇同穴人以鹽著手夜入坎中取之其舌滑者是蛇其舌燥者則牛也因引之而出焉野牛高丈餘其頭若鹿其角了戾長一丈白毛尾似鹿出西域唐先天中有田父牧牛嵩山而失其牛求之不得忽見山穴開中有錢焉不知其數田父入穴負十千而歸到家又往取之迷不知道逢一人謂曰汝所失牛其直幾耶田父曰十千人曰汝牛為山神所將已付汝牛價何為妄尋言畢不知所在田父乃悟遂歸焉金牛長沙西南有金牛岡漢武帝時有一田父牽赤牛告漁人曰寄渡江漁人云船小豈勝得牛田父曰但相容不重君船于是人牛俱上及半江牛糞於船田父曰以此相贈既渡漁人怒其污船以橈撥糞棄水欲盡方覺是金訝其神異乃躡之但見人牛入嶺隨而掘之莫能及也今掘處猶存增城縣東北二十里深洞無底北岸有石周圍三丈漁人見金牛自水出盤于此石義熙中縣人常於此潭石得金鎖尋之不已俄有魚從水中引之握不禁以刀扣斷得數段人遂致富年登上壽其後義興周靈甫常見此牛宿伏石上旁有金鎖如繩焉靈甫素驍勇往掩之此牛掣斷其鎖得二丈許遂以財雄也銀牛太原縣北有銀牛山漢建武二十四年有一人騎白牛蹊人田田父訶詰之乃曰吾北海使將看天子登封遂乘牛上山田父尋至山上唯見牛跡遺糞皆銀也明年世祖封禪焉青牛桓玄在南常出詣殷荊州於鸛穴逢一老翁群驅青牛形色瑰異玄即以所乘牛易取乘之至靈溪駿駃非常玄息駕飲牛牛走入水不出桓使覘守經日絶跡當時以為神物又京口居人晚出江上見石公山下有二青牛腹嘴皆紅戲於水際一白衣老翁長可三丈執鞭於其旁久之翁回顧見人即鞭二牛入水翁即跳躍而上倏忽漸長一舉足徑上石公山頂遂不復見牛鬥九真牛乃生溪上時時怒共鬥即海沸湧或出鬥岸上家牛皆怖人或遮捕即霹靂號曰神牛潛牛勾漏縣大江中有潛牛形似水牛每上岸鬥角軟還入江水角堅復出涼州人牛天寶時涼州人家生牛多力而大及長不可拘制因爾縱逸他牛從之者甚衆恆於城西數十里作群人不能制其後牛漸凌暴至數百鄉里不堪其弊都督謀所以擊之會西胡獻一鷙獸狀如大犬而色正青都督問胡獻此何用胡云搏噬猛獸都督以狂牛告之曰但有賞錢當為相取於是以三百千為賞胡乃撫獸咒願如相語之狀獸遂振迅跳躍解繩縱之徑詣牛所牛見獸至分作三行已獨處中埋身於土獸乃前鬥揚塵暗野須史便還百姓往視坌成潭竟不知是何獸初隨望其鬥見獸大如蜀馬鬥畢牛已折項而死胡割牛腹取其五臟盆盛以飼獸纍啖之漸小如故也洛水牛咸通四年秋洛中大水苑囿廬舍靡不淹沒厥後香山寺僧云其日將暮見暴雨水自龍門川北下有如決海潰江鼓怒之間殷若雷震有二黑牛於水上掉尾躍空而進衆僧與居人憑高望之謂城中悉為魚矣俄見定鼎長夏二門陰曀開有二青牛奮勇而出相去約百步黑牛奔走而回向之怒浪驚瀾翕然遂低桓冲桓冲鎮江陵正會當烹牛牛忽熟視帳下都督目中淚下都督咒之曰汝若向我跪當啓活也牛應聲而拜衆皆異之都督復曰謂汝若須活遍拜衆人牛涕淚如雨遂遍拜值冲醉不得啓遂殺牛冲聞大怒都督痛加鞭罰也光祿屠者太和中光祿廚欲宰牝牛牛有胎非久合生或曰既如此可換卻屠者操刀直前略不介意牛乃屈膝拜之亦不肯退此牛與子遂殞於刀下屠者忽狂惑失常每日作牛啼食草少許身入泥水以頭觸物良久乃定朱氏子廣陵有朱氏子家世勳貴性好食黃牛所殺無數常以暑月中欲殺一牛其母止之曰暑熱如此爾已醉所食幾何勿殺也子向牛言曰汝能拜我我赦汝牛應聲下淚而拜朱反怒曰畜生安能會人言立殺之數日乃病恆見此牛為厲竟作牛聲而死卞士瑜卞士瑜者其父以平陳功授儀同慳吝常顧人築宅不還其價作人求錢卞父鞭之曰若實負錢我死當與爾作牛須臾之間卞父死作人有牛産一黃犢腰下有黑文橫給周匝如人腰帶右胯有白紋斜貫大小正如笏形牛主呼之曰卞公何為負我犢即屈前膝以頭著地瑜以錢十萬贖之牛主不許死乃收葬路伯達永徽中汾州義縣人路伯達負同縣人錢一千文後共錢主佛前為誓曰我若未還公吾死後與公家作牛畜話訖逾年而卒錢主家牸牛生一犢子額上生白毛成路伯達三字其子姪恥之將錢五千文求贖主不肯與乃施與隰成縣啓福寺僧真如助造十五級浮圖人有見者發心止惡競投錢物以布施焉戴文貞元中蘇州海鹽縣有戴文者家富性貪每鄉人舉債必須收利數倍有鄰人與之交利剝刻至多鄉人積恨乃曰必有神明照鑒數年後戴文病死鄰人家牛生一黑犢脅下白毛字曰戴文閭里咸知文子恥之乃求鄰人以物尉去其字鄰人從之既而文子以牛身無驗乃訟鄰人妄稱牛犢有字縣追鄰人及牛至則白毛復出成字分明但呼戴文牛則應聲而至鄰人恐文子盜去則夜閉於別廡經數年方死河內崔守有崔君者貞元中為河內守崔君貪而刻河內人苦之常於佛寺中假佛像金凡數鎰而竟不酬直僧以太守竟不敢言未幾崔君卒於郡是日寺有牛産一犢其犢頂上有白毛若縷出文字曰崔某者寺僧相與觀之且嘆曰崔君常假此寺中佛像金而竟不還今日事果何如哉崔君家聞之即以他牛易其犢既至命剪去文字已而復生及至其家雖豢以芻粟卒不食崔氏且以為異竟歸其寺焉王氏老姥廣陵有王氏老姥病數日忽謂其子曰我死必生西磎浩氏為牛子當尋而贖我腹下有王字是也頃之遂卒西磎者海陵之西地名也其民浩氏生牛腹有白毛成王字其子尋而得之以束帛贖之而去邵桃根梁末邵桃根襄陽人家有一犢肥充可愛桃根恆自飼之此犢恆逐桃根遊行每往官府聚會犢雖繫在家而吼喚終不住後一日桃根晨起開門犢忽從後抵根肋穿流血舉家打去已復嗔目復來抵傷數日氣絶洛下人唐先天年洛下人牽一牛腋下有一人手長尺餘巡坊而乞寧茵大中年有寧茵秀才假大寮莊于南山下棟宇半墮墻垣又缺因夜風清月朗吟詠庭際俄聞叩門聲稱桃林斑特處士相訪茵啓關睹處士形質瑰瑋言詞廓落曰某田野之士力耕之徒向畎畝而辛勤與農夫而齊類巢居側近睹風月皎潔聞君吟詠故來奉謁茵曰某山林甚僻農具為鄰蓬蓽既深輪蹄罕至幸此見訪頗慰羈懷遂延入語曰然處士之業何如願聞其說特曰某少年之時兄弟競生頭角每讀春秋之潁考叔挾輈以走恨不得佐輔其間讀史記至田單破燕之計恨不得奮擊其間讀東漢至於新野之戰恨不得騰躍其間此三事俱快意俱不能逢今恨恨耳今則老倒又無嗣子空懷舐犢之悲況又慕徐孺子弔郭林宗言曰生芻一束其人如玉其人如玉即不敢當生芻一束堪令諷味俄又聞人扣關曰南山斑寅將軍奉謁茵遂延入氣貌嚴聳旨趣剛猛及二斑相見亦甚欣慰寅曰老兄知得姓之根本否特曰昔吳太伯為荊蠻斷髮文身因茲遂有斑姓寅曰老兄太妄殊不知根本且斑氏出自鬥榖於菟有文斑之像因以命氏遠祖固婕妤好詞章大有稱於漢朝又皆有傳於史其後英傑間生蟬聯不絶後漢有班超投筆從戎相者曰君當封侯萬里外超詰之曰君燕頷虎頭飛而食肉萬里公侯相也後果守玉門關封定遠侯某世為武賁中郎在武班因有過竄於山林晝伏夜遊露跡隱形但偷生耳適聞松吹月高墻外閒步聞君吟詠因來追謁況遇當家尤增慰悅寅因睹棋局在床謂特曰願接老兄一局特遂欣然為之良久未有勝負茵玩之教特一兩著寅曰主人莫是高手否茵曰若管中窺豹時見一斑兩斑笑曰大有微機真一發兩中茵傾壺請飲及局罷而飲數巡寅請備脯修以送酒寅設鹿脯寅嚙決須臾而盡特即不茹茵詰曰何故不茹特曰無上齒不能咀嚼故也數巡後特稱小疾便不敢過飲寅曰談何容易有酒如澠方學紂為長夜之飲覺面已赤特曰弟大是鐘鼎之戶一坐耽更不動後二斑飲過語紛拏特曰弟倚是爪牙之士而苦相凌何也特曰弟誇猛毅之軀若值人如卞莊子當為粉矣寅曰兄誇壯勇之力若值人如庖丁當為頭皮耳茵前有削脯刀長尺餘茵怒而言曰寧老有尺刀二客不得喧競但且飲酒二客悚然特吟曹植詩曰箕在釜下燃豆在釜中泣此一聯甚不惡寅曰鄙諺云鵓鳩樹上鳴意在麻子地俱大笑茵曰無多言各請賦詩一章茵曰曉讀雲水靜夜吟山月高焉能履虎尾豈用學牛刀寅繼之曰但得居林嘯焉能當路蹲渡河何所適終是怯劉琨特曰無非悲寧戚終是怯庖丁若遇龔為守蹄涔向北溟茵覽之曰大是奇才寅怒拂衣而起曰寧生何黨此輩自古即有班馬之才豈有斑牛之才且我生三日便欲噬人此人況偷我姓氏但未能共語者蓋惡傷其類而遂怒曰終不能搖尾於君門下乃長揖而去特亦怒曰古人重者白眉君今白額豈敢有人言譽耳何相怒如斯特遂告辭及明視其門外唯虎跡牛蹤而已寧生方悟尋之數百步人家廢莊內有一老牛臥而猶帶酒氣虎即入山矣茵後更不居此而歸京矣仲小小臨洮之境有山民曰仲小小衆號仲野牛平生以採獵為務臨洮已西至於疊宕嶓岷之境數郡良田自祿山以來陷為荒徼其間多産竹牛其色純黑其一可敵六七駱駝肉重千萬斤者其角二壯夫可勝其一每飲齕之處則拱木叢竹踐之成塵獵人先縱火逐之俟其奔迸則毒其矢向便射之洎中鏃則挈鍋釜負糧糗躡其蹤緩逐之矢毒既發即斃踣之如山積肉如阜一牛致肉數千金新鮮者甚美縷如紅絲線乾寧中小小之獵遇牛群于石家山嗾犬逐之其牛驚擾奔一深谷谷盡南抵一懸崖犬逐既急牛相排蹙居其首者失腳墮崖居次者不知其偶墮纍纍接跡而進三十六頭皆斃于崖下積肉不知紀極秦成階三州士民荷擔之不盡
