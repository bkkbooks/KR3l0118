body:
  text: 因祗國因祗國周成王五年有因祗國去王都九萬里來獻女功一人善工巧體貌輕潔披纖羅繡縠之衣長袖修裾風至則結其襟帶恐飄颻不能自止也其人善織以五色絲內口中引而結之則成文錦其國人又獻雲崑錦文似雲從山嶽中出也有列堞錦文似雲霞覆城雉樓堞也有雜珠錦文似貫珮珠也有篆文錦文似大篆之文也有列明錦文似羅列燈燭也幅皆廣三尺其國丈夫皆勤於耕稼一日鋤十頃之地又貢嘉禾一莖盈車故時俗四言詩曰力耕十頃能致嘉穎出拾遺録葛由蜀羌人能刻木為羊賣之一旦乘羊入蜀城蜀之豪貴或隨之上綏山綏山高峻在峨眉之西隨者皆得道不復還故里語曰得綏山一桃雖不能仙亦足以豪山下多立祠焉出法苑珠林魯般燉煌人莫詳年代巧侔造化於涼州造浮圖作木鳶每擊楔三下乘之以歸無何其妻有妊父母詰之妻具説其故其父後伺得鳶楔十餘下乘之遂至吳會吳人以為妖遂殺之般又為木鳶乘之遂獲父尸怨吳人殺其父於肅州城南作一木仙人舉手指東南吳地大旱三年卜曰般所為也齎物巨千謝之般為斷其一手其月吳中大雨國初土人尚祈禱其木仙六國時公輸班亦為木鳶以窺宋城出酉陽雜俎弓人宋景公造弓九年乃成而進之弓人歸家三日而卒蓋匠者心力盡於此弓矣後公登獸圈之臺用此弓射之矢越西霸之山彭城之東餘徑中石飲羽焉出淮南子燕巧人燕王徵巧術人請以棘之端為沐母猴母猴成巧人曰人主欲觀之必半歲不入宮不飲酒食肉而霽曰出視之宴陰之間而棘刺之母猴乃可見矣燕王恩養不能觀也出藝文類聚雲明臺始皇起雲明臺窮四方之珍木天下巧工南得煙丘碧樹酈水燃沙賁都朱泥雲岡素竹東得蔥巒錦柏縹檖龍杉寒河星柘岏山雲梓西得漏海浮金浪淵羽璧條章霞桑沈唐員籌北得冥阜乾漆陰阪梓褰流黑魄暗海香瓊珍異是集有二人皆虛騰椽木運斤斧於雲中子時起功至午時已畢秦人皆言之子午臺也亦言於子午之地各起一臺二説有疑出拾遺録淫淵浦日南之南有淫泉之浦言其水浸淫從地而出以成淵故曰淫泉也或言此泉甘軟男女飲之則淫其水小處可濫觴褰涉大處可方舟沿泝隨流屈直其水激石之聲似人之歌笑聞者令人淫動故俗謂之淫泉時有鳧鴈色如金群飛戲於沙瀨羅者得之乃真金鳧也昔秦破酈山之墳行野者見金鳧向南面飛至淫泉寶鼎元年張善為日南太守郡民有得金鳧以獻太守張善善博識多通考其年月既是秦始皇墓金鳧也昔始皇為冢斂天下瑰異生殉工人傾遠方奇寶於冢中為江海川瀆及列山嶽之形以沙棠沉檀為舟楫金銀為鳧鴈以琉璃雜寶為龜魚又於海中作玉象黥魚銜火珠為星以代膏燭光出冢間精靈之偉也皆生埋巧匠於冢裏又列燈燭如皎日焉先所埋工匠於冢內至被開時皆不死巧人於冢裏琢石為龍鳳仙人之像及作碑辭讚漢初發此冢驗諸史傳皆無列仙龍鳳之製則知生埋匠者之所作也後人更寫此碑文而辭多怨酷之言乃謂怨碑史記略而不録矣出拾遺録新豐高祖既作新豐並移舊社街巷棟宇物色如舊士女老幼相攜路首各知其室放犬羊雞鴨於通衢望塗亦競識其家匠人朝寬所為也移者皆喜其似而憐之故競加賞贈月餘致纍百金出西京雜記張衡後漢張衡字平子造候風地動儀以精銅鑄之圓徑八尺蓋合隆起形如酒樽飾以篆文及山龜鳥獸之狀中有都柱傍行八道施關發機外八龍首各銜銅丸下有蟾蜍張口承之其牙機巧制皆隱在樽中覆蓋周密無際如有地震則樽動機發龍吐丸而蟾蜍銜之震動激揚伺者因此覺知一龍發機而七首不動尋其方面乃知震動之所在儀之合契若神自書典所記未之有也曾一龍發機而地不動京師學者初咸怪其無徵數日驛至果地動於是皆服其神妙出後漢書王肅王肅造逐鼠丸以銅為之晝夜自轉出酉陽雜俎凌雲臺凌雲臺樓觀極精巧先稱平衆材輕重當宜然後造構乃無錙銖相負揭臺雖高峻恆隨風搖動而終無崩殞魏明帝登臺懼其勢危別以大材扶持之樓即便頽壞論者謂輕重力偏故也出世説陳思王魏陳思王有神思為鴨頭杓浮於九曲酒池王意有所勸鴨頭則回向之又為鵲尾杓柄長而直王意有所到處於樽上鏇之鵲則指之吳夫人吳主趙夫人趙達之妹也善畫巧妙無雙能於指間以彩絲織為雲龍虯鳳之錦大則盈尺小則方寸宮中謂之機絶孫權常嘆魏蜀未夷軍旅之隙思得善畫者使圖作山川地勢軍陳之像達乃進其妹權使寫九州江湖方嶽之勢夫人曰丹青之色甚易歇滅不可久寶妾能刺繡列萬國於方帛之上寫以五嶽河海城邑行陳之形乃進於吳主時人謂之針絶雖棘刺木猴雲梯飛鳶無過此麗也權居昭陽宮倦暑乃褰紫綃之帷夫人曰此不足貴也權使夫人指其意思焉答曰妾欲窮慮盡思能使下絹帷而清風自入視外無有蔽礙列侍者飄然自涼若馭風而行也權稱善夫人乃析髮以神膠續之神膠出鬱夷國接弓弩之斷絃者百斷百續乃織為羅縠纍月而成裁之為幔內外視之飄飄如煙氣輕動而房內自涼時權尚在軍旅常以此幔自隨以為征幕舒之則廣縱數丈卷之則可內於枕中時人謂之絲絶故吳有三絶四海無儔其妙後有貪寵求媚者言夫人多耀於人主因而致退黜雖見疑墜猶存録其巧工及吳亡不知所在出王子年拾遺記區純大興中衡陽區純作鼠市四方丈餘開四門門有木人縱四五鼠於中欲出門木人輒以椎椎之出晉陽秋水芝欹器西魏文帝造二欹器其一為二仙人共持一鉢同處一盤蓋有山山有香氣別有一仙人持一金瓶以臨器上以水灌山則出於瓶而注於器煙氣通發山中謂之仙人欹器也其一為二荷同處一盤相去盈尺中有芙蓉下垂器上以水注芙蓉而盈於器又為鳧鴈蟾蜍以飾之謂之水芝欹器二盤各有一床一鉢鉢圓而床方中有人焉言三才之象也器如觥形滿則平溢則傾置之前殿以警滿盈焉原闕出處明鈔本作出三國典略蘭陵王北齊蘭陵王有巧思為舞胡子王意欲所勸胡子則捧盞以揖之人莫知其所由也出朝野僉載僧靈昭北齊有沙門靈昭甚有巧思武成帝令於山亭造流杯池船每至帝前引手取杯船即自住上有木小兒撫掌遂於絲竹相應飲訖放杯便有木人刺還上飲若不盡船終不去未幾靈昭忽拊心疑有刀刺須臾吐血而終七寶鏡臺胡太后使靈昭造七寶鏡臺合有三十六室別有一婦人手各執鎖才下一關三十六戶一時自閉若抽此關諸門咸啓婦人各出戶前出皇覽御覽七一七引作出三國典略
