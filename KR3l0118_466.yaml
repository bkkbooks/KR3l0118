body:
  text: 夏鯀夏鯀堯命夏鯀治水九載無績鯀自沉于羽淵化為玄魚時植胄振鱗橫游波上見者謂為河精羽淵與河海通源也上古之人于羽山之下修立鯀廟四時以致祭祀常見此黑魚與蛟龍瀺灂而出觀者驚而畏之至舜命禹疏川奠嶽行遍日月之下唯不踐羽山之地濟巨海則黿龜為梁逾峻山則神龍為負皆聖德之感也鯀之化其事互說神變猶一而色狀不同玄魚黃熊四音相亂傳寫流誤并略記焉東海人昔人有游東海者既而風惡船破補治不能制隨風浪莫知所之一日一夜得一孤洲共侶歡然下石植纜登洲煮食食未熟而洲沒在船者砍斷其纜船復漂蕩向者孤洲乃大魚也吸波吐浪去疾如風在洲上死者十余人昆明池刻石為鯨魚每至雷雨魚常鳴吼胄尾皆動漢世祭之以祈雨往往有驗徐景山魏明帝游洛水水中有白獺數頭美淨可憐見人輒去帝欲取之終不可得侍中徐景山奏云臣聞獺嗜鯔魚乃不避死可以此誑之乃畫板作兩鯔魚懸置岸上于是群獺競逐一時執得帝甚嘉之謂曰聞卿能畫何以妙也答曰臣未嘗執筆然人之所作自可庶幾耳帝曰是善用所長也潘惠延平原高苑城東有魚津傳云魏末平原潘府君字惠延自白馬登舟之部手中算囊遂墜于水囊中本有鐘乳一兩在郡三年濟水泛溢得一魚長三丈廣五尺刳其腹中得頃時墜水之囊金針尚在鐘乳消盡其魚得脂數十斛時人異之葛玄葛玄見遺大魚者玄云暫煩此魚到河伯處乃以丹書紙內魚口擲水中有頃魚還躍上岸吐墨書青墨色如木葉而飛又玄與吳主坐樓上見作請雨土人玄曰雨易得耳即書符著社中一時之間大雨流淹帝曰水中有魚乎玄復書符擲水中須臾有大魚數百頭使人取食之介象介象與吳主共論鯔魚之美乃于殿庭作坎汲水滿之并求釣象起餌之須臾得鯔魚帝驚喜乃使廚人切食之龍門龍門山在河東界禹鑿山斷門闊一里余黃河自中流下兩岸不通車馬每暮春之際有黃鯉魚逆流而上得者便化為龍又林登云龍門之下每歲季春有黃鯉魚自海及諸川爭來赴之一歲中登龍門者不過七十二初登龍門即有云雨隨之天火自后燒其尾乃化為龍矣其龍門水浚箭涌下流七里深三里池中魚風俗通曰城門失火禍及池魚舊說池仲魚人姓字也居宋城門城門失火延及其家仲魚燒死又云宋城門失火人汲取池中水以沃灌之池中空竭魚悉露死喻惡之滋并傷良謹也通川河通川界內多獺各有主養之并在河側岸間獺若入穴插雉尾于獺孔前獺即不敢出去卻尾即出取得魚必須上岸人便奪之取得多然后自吃吃飽即鳴板以驅之還插雉尾更不敢出行海人昔有人行海得洲木甚茂乃維舟登岸爨于水傍半炊而林沒于水遽斷其攬乃得去詳視之大蟹也陰火海中所生魚蜄置陰處有光初見之以為怪異土人常推其義蓋咸水所生海中水遇陰晦波如然火滿海以物擊之迸散如星火有月即不復見木玄虛海賦云陰火退然豈謂此乎裴胄唐裴胄開元七年都督廣州仲秋夜漏未艾忽然天曉星月皆沒而禽鳥飛鳴矣舉郡驚異之未能諭然已晝矣裴公于是衣冠而出軍州將吏則已集門矣遽召參佐洎賓客至則皆異之但謂衆惑固非中夜而曉即詢挈壺氏乃曰常夜三更尚未也裴公罔測其倪因留賓客于廳事共須日之升良久天色昏暗夜景如初官吏則執燭而歸矣詰旦裴公大集軍府詢訪其說而無能辨者裴因命使四訪闔界皆然即令北訪湘嶺湘嶺之北則無斯事數月之后有商舶自遠南至因謂郡人云我八月十一日夜舟行忽遇巨鰲出海舉首北向而雙目若日照耀千里毫末皆見久之復沒夜色依然征其時則裴公集賓寮之夕也王旻之唐王旻之在牢山使人告琅琊太守許誡言曰貴部臨沂縣其沙村有逆鱗魚要之調藥物願與太守會于此誡言許之則令其沙村設儲峙以待太和先生先生既見誡言誡言命漁者捕所求其沙村西有水焉南北數百步東西十丈色黑至深岸有神祠鄉老言于誡言曰十年前村中少年于水釣得一物狀甚大引之不出于是下釣數十道方引其首出狀如猛獸閉目其大如車輪村人謂其死也以繩束縛繞之樹十人同引之猛獸忽張目大震聲若霹靂近之震死者十余人因怖喪去精魂為患者二十人猛獸還歸于水乃建祠廟祈禱之水旱必有應若逆鱗魚未之有也誡言乃止韓愈唐吏部侍郎韓文公愈自刑部侍郎貶潮陽守先是郡西有大湫湫有鱷魚約百餘尺每一怒則湫水騰蕩林嶺如震民之馬牛有濱其水者輒吸而噬之不瞬而盡為所害者莫可勝計民患之有年矣及愈刺郡既至之三日問民不便事俱曰郡西湫中之鱷魚也愈曰吾聞至誠感神昔魯恭宰中牟雉馴而蝗避黃霸治九江虎皆遁去是知政之所感故能化禽獸矣即命庭掾以牢醴陳于湫之旁且祝曰汝水族也無為生人患既而沃以酒是夕郡西有風雷聲動山野逮夜分霽焉明日里民視其湫水已竭公命使窮其跡至湫西六十里易地為湫巨鱷亦隨而徙焉自是郡民獲免其患故工部郎中皇甫湜撰愈神道碑敘曰刑部為潮陽守云洞僚海彝陶然皆化鱷魚稻蟹不暴民物蓋謂此矣鄖鄉民唐元和末均州鄖鄉縣有百姓年七十養獺十余頭捕魚為業隔日一放將放時先閉于深溝斗門內令饑然后放之無网罟之勞而獲利甚厚令人抵掌呼之群獺皆至緣襟藉膝馴若守狗戶部郎中李福親見之赤嶺溪歙州赤嶺下有大溪俗傳昔有人造橫溪魚梁魚不得下半夜飛從此嶺過其人遂于嶺上張网以捕之魚有越网而過者有飛不過而變為石者今每雨其石即赤故謂之赤嶺而浮梁縣得名因此按吳都賦云文鰩夜飛而觸綸蓋此類也
