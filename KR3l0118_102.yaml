body:
  text: 盧景裕盧景裕後魏盧景裕字仲儒節閔初為國子博士信釋氏注周易論語從兄神禮據鄉人反叛逼其同力以應西魏繫晉陽獄至心念金剛經枷鎖自脫齊神武作相特見原宥出報應記趙文若隋趙文若開皇初病亡經七日家人初欲斂忽縮一腳遂停既蘇云被一人來追即隨行入一宮城見王曰卿在生有何功德答云唯持金剛經王曰此最第一卿算雖盡以持經之故更為申延又曰諸罪中殺生甚重卿以猪羊充飽如何即遣使領文若至受苦之處北行可三二里至高墻下有穴才容身從此穴出登一高阜四望遙闊見一城極高峻煙火接天黑氣溢地又聞楚痛哀叫之聲不忍聽乃掩蔽耳目叩頭求出仍覺心破口中出血使者引回見王曰卿既噉肉不可空回即索長釘五枚釘頭及手足疼楚從此專持經更不食肉後因公事至驛忽夢一青衣女子求哀試問驛吏曰有何物食報云見備一羊甚肥嫩詰之云青牸也文若曰我不喫肉遂贖放之出報應記趙文昌隋開皇十一年大府寺丞趙文昌忽暴卒唯心上微暖家人不敢斂後復活說云吾初死有人引至閻羅王所王問曰汝一生已來作何福業昌答云家貧無力可營功德唯專心持誦金剛般若經王聞語合掌低首讚言善哉汝既持般若功德甚大王即使人引文昌向經藏內取金剛般若經文昌向西行五六里見數十間屋甚華麗其中經典遍滿金軸寶帙莊飾精好文昌合掌閉目信手抽取一卷開看乃是金剛般若文昌捧至王所令一人執卷在西文昌東立面經讀誦一字不遺王大歡喜即放昌還家令引文昌從南門出至門首見周武帝在門側房內著三重鉗鎖喚昌云汝是我本國人暫來至此要與汝語文昌即拜之帝曰汝識我否文昌答云臣昔宿衛陛下武帝云卿既是我舊臣今還家為吾向隋皇帝說吾諸罪並欲辨了唯滅佛法罪重未可得免望與吾營少功德冀茲福祐得離地獄昌受辭而行及出南門見一大糞坑中有人頭髮上出昌問之引人答云此是秦將白起寄禁於此罪尤未了昌至家得活遂以其事上奏帝令天下出口錢為周武帝轉金剛般若經設大供三日仍録事狀入於隋史出法苑珠林新繁縣書生益州新繁縣西四十里王李村隋時有書生姓苟氏善王書而不顯迹人莫能知之嘗於村東空空原作室據明鈔本改中四面書金剛般若經數日便了云此經擬諸天讀誦人初不之覺也後值雷雨牧牛小兒於書經處立而不沾濕其地乾燥可有丈餘及暗村人怪之爾後每雨小兒常集其中衣服不濕唐武德中有異僧語村人曰此地空中有金剛般若經諸天於上設寶蓋覆之不可輕犯自爾於四周設欄楯以阻人畜履踐每至齊日村人四遠就設佛供常聞天樂聲震寥泬繁會盈耳出三寶感通記蒯武安隋蒯武安蔡州人有巨力善弓矢常射大蟲會嵩山南為暴甚往射之漸至深山忽有異物如野人手開大蟲皮冒武安身上因推落澗下及起已為大蟲矣惶怖震駭莫知所為忽聞鐘聲知是僧居往求救果見一僧念金剛經即閉目俯伏其僧以手摩頭忽爆作巨聲頭已破矣武安乃從中出即具述前事又撫其背隨手而開既出全身衣服盡在有少大蟲毛蓋先灸瘡之所粘也從此遂出家專持金剛經出報應記睦彥通睦彥通隋人精持金剛經日課十遍李密盜起彥通宰武牢邑人欲殺之以應義旗彥通先知之遂投城下賊拔刀以逐之前至深澗迫急躍入如有人接右臂置盤石上都無傷處空中有言曰汝為念經所致因得還家所接之臂有奇香之氣纍日不滅後位至方伯九十餘終出報應記杜之亮隋杜之亮仁壽中為漢王諒府參軍後諒於并州舉兵反敗亮與僚屬皆繫獄亮惶懼日夜涕泣忽夜夢一僧曰汝但念誦金剛經即此厄可度至曉即取經專誠習念及主者並引就戮亮身在其中唱者皆死唯無亮姓名主典之者皆坐罰俄而會赦得免顯慶中卒於黃州刺史出報應記慕容文策慕容文策隋人常持金剛經不喫酒肉大業七年暴卒三日復活云初見二鬼把文牒追至一城門顧極嚴峻入行四五里見有宮殿羽衛王當殿坐僧道四夷不可勝數使者入見文策最在後一一問在生作善作惡東西令立乃唱策名問曰作何善對曰小來持金剛經王聞合掌嘆曰功德甚大且放還忽見二僧執火引策即捉袈裟角問之僧云緣公持經故來相衛可隨燭行遂出城門僧曰汝知地獄處否指一大城門曰此是也策不忍看求速去二僧即領至道有一橫垣塞路僧以錫扣之即開云可從此去遂活出報應記柳儉唐邢州司馬柳儉隋大業十年任岐州岐陽宮監義寧元年坐誣枉繫大理寺儉至心誦金剛般若經有兩紙未通不覺眠睡夢一婆羅門僧報云檀越宜誦經令遍即應得出儉忽寤勤誦不懈經二日忽有敕喚就朝堂放免又儉別時夜誦經至三更忽聞有異香散漫滿宅至曉不絶蓋感應所致也儉至終計誦經得五千餘遍出法苑珠林蕭瑀梁武帝玄孫梁王巋之子梁滅入隋仕至中書令封宋國公女煬帝皇后篤信佛法常持金剛經議伐高麗不合旨上大怒與賀若弼高熲同禁欲置於法瑀就其所八日念金剛經七百遍明日桎梏忽自脫守者失色復為著至殿前獨宥瑀二人即重罰因著般若經靈驗一十八條乃造寶塔貯經檀香為之高三尺感一鍮石像忽在庭中奉安塔中獲舍利百粒貞觀十一年見普賢菩薩冉冉向西而去出報應記趙文信唐遂州人趙文信貞觀元年暴死三日後還蘇自說云初死時被人遮擁驅逐同伴十人相隨至閻羅王所其中有一僧王先問云師在世修何功德師答云道徒自明鈔本道徒自三字作貧道從生以來唯誦金剛般若經王聞此語忽即驚起合掌讚言善哉善哉師審誦般若當得升天何因錯來至此言未訖忽有天衣來下引師上天去王復喚遂州人前曰汝在生有何功德其人報言臣一生以來不讀佛經唯好庾信文章集王言庾信是大罪人見此受苦汝見庾信頗識否答云雖讀渠文章然不識其人王即令引出庾信乃見是龜身王又令引去少時復作人來語云我為生時好作文章妄引佛經雜揉俗書又誹謗佛法謂言不及孔老之教今受罪報龜身苦也此人活已具述其事遂州人多好捕獵及聞所說共相鑒戒永斷殺業各發誠心受持般若迄今不絶出法苑珠林劉弼唐劉弼貞觀元年任江南縣尉忽一日有烏於房前樹上鳴土人云是烏所止為不祥弼聞之恐懼思欲修崇功德不知何者為勝夜夢一僧偏讚金剛般若經令誦百遍及寤依命即誦至百遍忽有大風從東北來拔此樹隔舍遙擲巷外其拔處土坎縱廣一丈五尺察暴風來處小枝纖葉並隨風回靡風止還起如故乃知經力不可思議出法苑珠林袁志通唐袁志通天水人常持金剛經年二十被驅為軍士敗走巖嶮經日不得食而覺二童子持滿盂飯來與之志通拜忽然不見既食訖纍日不飢後得還鄉貞觀八年病死兩日即蘇曰被人領見王王問在生善業答云常持金剛經王甚喜曰且令送出遂活出報應記韋克勤唐韋克勤少持金剛經為中郎將從軍伐遼沒高麗貞觀中太宗征遼克勤少持金剛經望見官軍乃夜出投之暗不知路乃至心念經俄見炬火前導克勤隨火而去遂達漢軍出報應記沈嘉會唐沈嘉會貞觀中任校書郎以事配蘭州思歸甚切每旦夕常東向拜太山願得生還積二百餘日永徽六年十月三日夜見二童子儀服甚秀云是太山府君之子府君愧公朝夕拜禮故遣奉迎嘉會云太山三千餘里何能可去童子曰先生閉目勿憂道遠即依其言瞬息之間便到宮殿宏麗童子引入謁拜府君即延入曲室對坐談笑無所不知謂嘉會曰人之為惡若不為人誅死後必為鬼得而治無有徼幸而免者也若日持金剛經一遍即萬罪皆滅鬼官不能拘矣又云前府君有過天曹黜之某姓劉嘉會亦不敢問其他也嘗與嘉會雙陸兼設酒肴嘉會起於小廳東見姑臧令慕容仁軌執笏端坐云府君帖追到此已六十日未蒙處分嘉會坐啓府君便令召仁軌入謂曰公縣下有婦人阿趙被縣尉無狀拷殺阿趙來訴遂誤追公庭前有盆水府君令洗面仍遣一小兒送歸嘉會亦辭復令二男送凡在太山二十八日家人但覺其精神昏昧既還如舊嘉會話仁軌於衆長史趙持滿令人驗之無不同自此常持金剛經遇赦得歸出報應記陸懷素唐吳郡陸懷素貞觀二十年失火屋宇焚燒並從煙滅惟金剛般若波羅密經獨存函及標軸亦盡惟經字竟如故聞者莫不驚歎懷素即高陽許仁則妻之兄也仁則當時目覩常與人言之出冥報記
